body:
  text: 浙江通志卷一百八十四人物七孝友二湖州府漢許頤西吴里語故鄣人父患惡疾醫曰啖人肉可差頤割兩股為羹以進父栗瘥刺史周澤以聞旌其門晉王談晉書本傳吴興烏程人年十嵗父為隣人竇度所殺談隂有復讐志而懼為度所疑寸刃不畜日夜伺度未得至年十八乃宻市利鍤陽若耕鉏者度常乗船出入經一橋下談伺度行還伏草中度既過談於橋上以鍤斬之應手而死歸罪有司太守孔巖義其孝勇列上宥之元興三年舉孝㢘不應召終於家南北朝錢延慶宋書孫棘傳泰始二年長城吴慶恩殺同縣錢仲期仲期子延慶屬役在都聞父死馳還於庚浦埭逢慶恩手刅殺之自繫烏程獄吴興太守郗顒表不加罪許之孫法宗南史本傳一名宗之吴興人父隨孫恩入海澨被害屍骸不收母兄並餓死法宗年小流迸至十六方得還單身勤苦葬送母兄儉而有禮以父屍不測入海尋求聞世間論是至親以血瀝骨當悉漬浸乃操刀沿海見枯骨則刻肉灌血十餘年臂脛無完皮血脉枯竭終不能逢遂裒絰終身常居墓所山禽野獸皆悉馴附宋孝武初掦州辟為文學従事不就卒王文殊南史本傳字令章吴興故鄣人父沒魏思慕泣血終身蔬食服麻不婚不交人物吴興太守謝瀹聘為功曹不就立小屋於縣西嵗時伏臘月朝十五北望長悲如此三十餘年太守孔琇之表其行詔㮄門改所居為孝行里丘傑南史本傳字偉跱吴興烏程人年十四遭喪以熟菜有味不嘗於口嵗餘忽夢母曰死生自分别耳何事乃爾荼苦汝噉生菜遇蝦蟇毒靈牀前有三丸藥可取服之傑驚起果得甌中藥服之下科斗子數升邱氏世保此甌沈文叔南史沈慶之傳慶之吴興武康人長子文叔位侍中慶之之死也不肯飲藥攸之以被掩殺之文叔宻取藥藏録或勸文叔逃避文叔見帝㫁截江夏王義恭支體慮奔亡之日帝怒容致義恭之變乃飲藥自殺文叔子昭明位祕書郎聞父死曰何忍獨生亦自縊死昭明弟昭光聞收兵至家人勸逃去昭光不忍捨母入執母手悲泣遂見殺時昭明子曇亮已得逃去聞昭光死乃曰家門屠滅獨生何為又絶吭而死時人嘆其累世孝義潘綜宋書本傳吴興烏程人孫恩之亂綜與父驃共走避賊驃年老行遲賊轉逼驃語綜我不能去汝走可脱幸勿俱死驃困乏坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今為老子不去老子不惜死乞活此兒賊因斫驃綜抱父於膝下賊斫綜頭面凡四創當時悶絶有一賊従旁來相謂曰此兒以死救父云何可殺殺孝子不祥賊良久乃止父子並得免太守王韶之臨郡綜與吴逵並察孝㢘元嘉四年有司奏改其里為純孝里蠲租布三世吴逵宋書本傳吴興烏程人經荒饑饉繼以疾疫父母兄嫂及羣従男女死者十三人惟逵夫妻獲全家徒四壁冬無被繚晝則傭賃夜則伐木燒磚無有懈倦夜行遇虎虎輒下道避之期年成七墓葬十三棺鄰里嘉其志義葬日悉出赴助逵一無所受太守王韶之擢補功曹史辭不就舉為孝㢘晉王韶之贈潘綜吴逵舉孝㢘詩仁義伊在惟吴與潘心積純孝事著艱難投死如歸淑聞若蘭吴實履仁心力皆殫固此苦節易彼嵗寒霜雪雖厚松柏丸丸沈顗南史沈演之傳顗吴興武康人字處黙清静有至行慕黄叔度徐孺子之為人内行甚修事母兄孝友兄昂以家貧仕為始安令兄弟不能分離相隨之任及昂卒逢齊末兵亂與家人并日而食樵採自資怡然不改其樂聞人夐南史韓係伯傳吴興人聞人夐年十七結客報父仇為髙帝所賞位至長水校尉朱文濟南史解叔謙傳文濟字敬達吴興人自賣以葬母太守謝瀹命為儒林不就于敷嘉靖安吉州志少失母年十嵗求母遺物惟得一盡扇乃緘簏之每至感思輒開篋涕泗好讀書能屬文齊髙祖見而奇之以為世子中軍叅軍沈崇傃梁書本傳字思整吴興武康人父懐明宋兖州刺史崇傃六嵗丁父憂哭踊過禮及長傭書以養母齊建武初起家為奉朝請永元末遷司徒行恭軍天監初為前軍鄱陽王恭軍事三年太守栁惲辟為主簿崇傃徒惲到郡還迎其母母卒崇傃以不及侍疾将欲致死水漿不入口晝夜號哭旬日殆将絶氣兄弟謂之日殯葬未申遽自毁滅非全孝之道也崇傃之瘞所不避雨雪倚墳哀慟每夜恒有猛獸來望之有聲狀如歎息者家貧無以遷窆乃行乞經年始獲葬焉既而廬於墓側自以初行䘮禮不備葬後更治服三年久食麥屑不噉鹽酢坐臥於單薦因虛腫不能起髙祖聞擢補太子洗馬辭不受經年乃為永寧令自以祿不及養怛恨愈甚哀思不自堪至縣卒時年三十九唐沈嶠𢎞治湖州府志烏程人父卒廬墓六年不櫛不沐醯醤不入口哭則嘔血刺血書經年三十卒董滿崇禎長興縣志天寳三年父亡廬墓生芝九莖大中元年表其鄉曰嘉瑞于元損西吴里語烏程人父母卒廬墓四十年墓側生芝草九莖武后詔旌其門沈景筠續文獻通考烏程人性至孝母懼雷及卒葬宅西每雷鳴則奔墓所號哭云某在此賀知章為作孝徳傳陳承堅西吴里語吴興人年九嵗大中三年母亡葬後廬墓所墓前生芝草三莖詔旌其門石昻吴興掌故純孝嶺絶壁削立黄巢之亂邑人石昻負母避於此宋曹清𢎞治湖州府志烏程人其父嘗殺人繫獄清痛父不可脱乃自誣曰是吾手刅也非父罪於是代受重辟後屍泝流至家葬烏程之西陽村今春秋奉祀號曹孝子祠朱泰墨客揮犀武康人事母孝嘗為虎所摶負之而去泰大呼曰虎暴殺我我母将無所依虎遽棄於地驚竄入山後安徤如故鄉里號為朱虎殘沈氏子徳清縣志失其名縣之金鵞鄉人宋世居勾壘家貧養母以孝聞母病亟割心肉一臠為糜以進病竟愈知縣章丞議嘉其孝行特名其里曰慈孝朱天錫𢎞治湖州府志歸安人父嗣發仕至朝奉郎天錫好義敬愛老幼見貧乏者濟恵之父䘮哭泣過禮既葬廬墓三年有司以聞旌表門閭後仕至諸暨州判官曽霅之烏程縣志寳祐間父獲罪當刑霅之代父死上聞追刲之武康人慕其孝立廟於縣南曰靈祐昭應廟吴可㡬明一統志安吉人好古博雅與弟知㡬同登景祐間進士可㡬仕至太常少卿知㡬為郎官守其父屯田墓三年平地出泉時號孝子泉元趙本道沈貞趙本道傳字中立長興人少失母事父以孝聞嵗乙未有强冦壓境擄其父本道號泣隨之跪告冦曰吾父病痿而瘠又貧寠無以賄賂願以身丐父之生冦愈肆狠欲手刃厥父本道奮身捍之卒遇害而其父獲免明朱允恭西吴里語烏程人父華洪武十八年以老人除監察御史二十三年以事繫獄允恭上疏申父寃帝念其孝命代父為御史仍宥父罪人稱孝子朱御史張淵明詩綜傳字子静歸安人母失明朝夕䑛之父好飲醉或罵詈則握髯請解長跪移時晚遊四方與沈唘南史明古僧月舟最善湖州勞太守鉞修府志出其手筆馮添孫𢎞治湖州府志歸安人早孤奉母惟謹永樂間居金陵母病歴延諸醫無效添孫稽顙北辰哀哭乞母夀猶未愈一夕沐浴割肝和粥進母母食而愈有司上其事詔旌其門後官至工部侍郎沈康𢎞治湖州府志字士寜歸安人號雪月敦内行母患瘡疾将不起康以舌餂之又割股燃香尋愈父喪值隆冬袒括徒跣日夜哀號鄰人葉姓者素强悍聞康哭之慟亦為改容既而母卒哀毁亦如之寢苫枕塊前後居䘮次六載尤究心於禮著延夀錄一冊以警世郡邑尚其賢每鄉飲延致三賓之席後以無疾終夀八十一長興孝子耿定向二孝子傳逸其名氏其一居浙之長興事母有至性舊業衰落僅餘屋數椽其従父贏於貲一日飲諸婣呼孝子侍婣多豪貴人饌具腆甚孝子未及舉即私念曰何緣得致我母前耶時時目左右盼每視賔所不顧急摘諸甘脆品襄納袖中㑹燕闌酒酣主人出金巵飲貴客容不勝酒以巵置樓簷間覆以瓦先間歸俄侍者報亡其巵衆欲自明請急扄户令人人袒檢之孝子兩手捫袖中倉卒不得計即謬曰由我詰出之則曰匿他所矣再詰之則又曰求諸所不得或為他人乗也當卒償之詰辰従父責所償孝子願鬻其屋且曰幸稍寛我懼傷母氏心無何貴客憶前巵乃折簡主人語以故主人如言檢得之急呼孝子至猶謬對如初従父曰吾已得巵矣若何苦自誑孝子始吐實淚下曰某苦不能奉母氏而兒女態若此比諸貴客在設令把我袖将大詬我且重為叔父羞故寧爾也従父大感悟乃召前坐上客遍語曰是子如是忍與吾兒二視哉三分其產令得終奉母氏焉其族里至今多禮讓人謂遺風所漸云吴人驥黄汝亨吴叔良傳字叔良吴興人父太平公以清特聞死官公嘗發里中盜置於法盜父子為魁恨入骨乃集羣盜睨月下排户入獲吴母人驥倉皇奮身越垣牆赴救為同匿者環抱掙不得前乃升屋大號賊怒發流矢中左右股又中偏頂墜地被血鏃匍匐抵母所賊皆露刃立人驥忍死前捍母令罄搜筐中簮珥奉賊不能得賊益怒其餘黨復自外發勁矢中右脇㑹救者至賊去母幸無恙人驥越三日病創死嘉靖庚申十月十五日也年二十有七沈之章烏程縣志嘉靖乙卯倭冦雙林掠其父思賢以去之章赴倭壘父将就刃之章悲號奮躑願以身代倭俱釋之沈賁沈鼎烏程縣志與兄晉同居有賊入室行劫晉逐之被殺移屍舟中欲載以去賁偕鼎奮入賊舟奪還殯於堂因矢曰不獲賊報兄仇不復歸同出求賊踪跡無所得越半載泊舟後林與賊舟隣賊羡二人奪屍之義中夜述其事以告同黨二人聞其語待旦宻告村人共執之送官論死歸設祭於兄告之沈如松武康縣志字忠宇母病膈取藥三橋歸至中野遇雷震同行兩人眩而甦曰空中有人叱云沈孝子不可擊持藥進母母病起巡按書旌揚孝行四字扁其門嗣以明經司教嘉興縣學張夢徴湖州府志歸安人父組南京工部郎中方病疽青陷作嘔逆皆惡症夢徴年十三姊錦繡年十五傷父之危日夜謀活父夢徴吮疽得膿輒嚥展轉疽畔審視顔色錦繡焚香割臂肉一臠作糜進父時正昏眩得粥覺甘美食既汗瀉下遂漸瘥江右吴宣為作雙孝傳董悌見只編長興農家子年十三大母滕病為刲股進疾遂起又十年復刲股療其母費延算至三十年而復作費年八十餘病劇於前董居山傍有祠黙禱於神以刀破腹左出肝割二寸許於時肝臟迸出以一手持肝一手障創口馳下山計二里許不少痛眩忽逢一閹豕人見其流血灑灑問之得其故急取索桑皮縫其創口血遂止用肝煮藥進費病遂起又三月始卒子世徳以父䘮痛之餘貧匱不能致養賣其妻朱用供朝夕縣令熊得畧買一婦㫁配之潘振歸安縣志字藻生崇禎庚午舉人性純孝痛父不及見捷書辛未不上公車廬墓三年天唘初直指以孝子請旌力辭振為孝㢘二十八載不通干謁子廣福順治辛卯舉人董樵崇禎長興縣志唐興山負薪人也母年七十患心疾思肉食無能辦樵剜胷前肉熟而薦之疾以瘥諸生姚光佑聞於縣縣令熊明遇召詢之血痕故在遂月給米一石又與之妻山中人但呼曰董樵潘喬烏程縣志字𠂻元増廣生幼齡䘮父事孀母孝析㸑復将已産分給其姪撫之如子有族弟被訪将逮喬以百口保之得免終未有一言也著有焚餘草施新嘉靖湖州府志歸安人弟震以催科殺人法應抵罪新念母愛所鍾以身當之㑹赦免嚴有芑歸安縣志字豐思年十六補博士弟子員父覺令居巢崇禎乙亥流冦破巢為賊所害有芑以身蔽父屍號慟罵賊不已賊磔之肩臂俱㫁猶怒目而視越三日始殮面色如生同時殉難死者有三孝子注一姓易一姓萬失記其名偕有芑為三焉沈角歸安縣志字麟弓孩提喪母六嵗時焚母靈長號慟絶即抱母主躍入烈焰中左右驚掖之出折其一股終身舉股念母淚出不止事繼母嚴至孝嚴沒一慟仆絶家人救之被囓㫁一指始甦王家零孝豐縣志割股廬墓墓前產靈芝數本人以為至孝所感國朝朱鼎舊浙江通志字冠英長興人少失怙哀毁骨立事大母及母至孝撫諸弱弟備極恩勤祖姑父三柩在殯祝融震鄰鼎抱輀號籲風焰頓息營窆山中忽遇虎奮袂前行虎旋斂跡及母歿合葬廬墓十年長興縣志巡撫朱昌祚表其門曰孝友嚴廷瓚戴􅌧嚴孝子傳驥村人震直九世孫父遜修為姪某所殺廷瓚甫二齡母朱氏撫之稍長泣述父寃死状廷瓚泣血囓指即蓄利刅自隨遷於雉城訓蒙養母或勸之婚以他故辭間歸故里且與讐暱共飲食康熙己未春廷瓚一夕語刃曰我與若同寝食二十餘年盍亦思用命乎刅作錚錚聲晨起告母曰兒年二十有八矣父仇未報更奚待號慟累日托辭歸里適春社演劇讐在儔伍中乃㧞腰間刃奮擊之中腦腦裂復斫其頸斃焉遂棄刃入郡自酋請就獄縣令嘉其志欲上間宥之未果竟死獄中嚴有榖鄉賢留祀冊字既方歸安人崇禎癸酉副㮄父覺明末居鄛令死流冦之難有榖従亂離中負骨歸葬躬自負土手指俱裂夜有虎至墓門盤旋而去葬後廬墓三年所著有嗜退軒語存語皆警世周國璠題旌冊徳清人父病龥天請代衣不解帶者四十餘日及卒居喪盡禮廬墓三年雍正四年具題奉旌陳子英題旌冊字念齋烏程人十嵗䘮父哀毁如成人事庶母克盡子職親不懌輒長跪請罪必得歡心乃已雍正四年具題奉旌楊汝欽題旌冊徳清人年十六喪父家甚貧負土成墳每覩親所嗜即悲傷號泣事母善承色笑母年八十一而卒廬墓三載始歸雍正六年具題奉旌寧波府漢董黯純徳録字叔達句章人江都相仲舒六世孫居闕湖之涘少孤力學事母黄氏惟謹母恙思大𨼆溪水逺莫時致黯築室溪濱板輿就養疾瘳乃歸後斵土塪居傍進以奉母泉味如大隠僉謂孝感所致比隣王寄甚富縦酒無行其母與董母相善謂董母曰我衣食頗足而瘠且弱汝不吾若而肥且健何也曰吾雖貧黯孝心常泰而健耳王母歸以喻其子冀其有所悔悟而寄反懐忿伺黯出遂歐董母黯還而母卧床不知所為跪而言曰黯不孝貽母之憂乎曰非也我失言致寄辱耳黯極力祈療母竟不起哀毁負土營葬廬於墓側思復大懟以寄母在未忍枕戈不言俟其母卒且終三年䘮手刃寄首祭於母墓自囚以告有司有司以為抱義而行仁復讐而全法事聞和帝嘉其異行遣考功郎邱霖賫詔釋専殺罪召拜為諫議大夫累徴不就年八十終勅封孝子命即故居立祠靈應廟西贈慈母賢淑夫人由是以慈名溪以溪署縣云三國志虞翻曰句章董黯盡心色養喪致其哀單身林野鳥獸歸懐怨親之辱白日報讐海内聞名昭然先著唐張無擇成化四明郡志無擇字君選慈溪人永隆初由進士舉明經刺史和州丁父叙憂奉䘮歸里三年不櫛七日絶漿都督竇懐正聞於朝屬神龍初國家多事未遂旌表服禫辭禄廬墓以夀終宋嘉定十四年邑令趙崇附祠於董孝子廟之東焉樓鑰董孝子廟記唐神龍中有張孝子無擇父墓在慈溪之虎脾山結廬負土有湧泉芝草之異仕至和州刺史宋楊慶宋史本傳鄞人父病貧不能召醫廼刲股肉啖之良已後母病不能食慶取右乳焚之以灰和藥進焉入口遂差久之乳復生紹興十三年詔表其門張超延祐四明志昌國縣人年十九父縈患氣疾寖篤懇禱無效超乃刲脅取肝煮粥以進不踰日父病愈乾道二年十二月守趙伯圭舉楊慶例命縣厚加優䘏嘉泰四年令葛洪與免徭役仍封植其父母墓禁樵採孫之翰延祐四明志字文舉慈溪金川鄉雞鳴山人母疾革刲體取肝為粥以進越夕母如醉自醒乃底於寧郡守趙伯圭将聞於朝之翰曰本心救母他無所覬年六十六卒吴璿延祐四明志定海人父璋以邊功補副尉璋妻宋氏病璿刲股療之而愈年九十三乃終璿與妻楊氏更病男安禮安時皆刲股以進安禮療其母且至再焉守李沐聞於朝嘉泰三年有㫖存䘏縣令王自揆建崇孝門以旌之袁鎮嘉靖寧波府志奉化人事親奉養備至端平初父年七十病羸醫禱弗效乃一再刲股和藥以進父病垂絶復存者十五年異母兄有虐之者友事益謹孝弟之稱無間戴表元為作遷祔記以表其行陶椿卿嘉靖定海縣志字均夀以禮經魁宋末癸酉覆試又魁父回孫登咸淳進士倅平江府卒椿卿廬墓終身元初被選舉力辭不赴鄉邦異之元夏永慶戴良夏孝子詩序字章甫定海人父文徳大徳中轉粟以供京師浮海而北舟至海津鎮溺焉永慶倉皇號救躍入洪波載其父以出文徳得不死永慶以力竭沉水舟人求之弗獲人皆驚嘆稱曰夏孝子厥後三弟痛其兄之死孝也益以孝義維其家居同室食同㸑有司上於朝旌其門曰孝義之門陳汝檝嘉靖寧波府志字傳巖象山人親歿未葬鄰家失火将及與妻徐氏伏柩號慟誓不獨存既而風返火熄柩獲全人皆謂孝感弟汝舟疾且死以幼子為托汝檝泣曰而子即吾子忍異視耶汝舟死育其子長為娶婦以其遺物畀之唐轅唐轂續文獻通考鄞人父復禮以匿官鹺事被陷拘以歸京師轅詣吏代父命叩頭流血吏閔其請脱父梏梏之行至越州轂自杭回遇諸塗請代兄行轅不従轂曰兄訥於言往必不免弟有一計可生竟奪其梏加己手吏亦閔而従之轂抵京繫獄旬日近臣奏其罪得免華韶嘉靖寜波府志鄞人生未睟父亡母沈氏家貧不能自存父母欲奪其志誓死弗許勤紡績以教育其子後病亟昭尚幼刲左股和藥以進母愈至正十年尹許廣大書節孝字以表其閭史懋祖陳墓史孝子傳字時可鄞人新昌主簿賀之孫公麟之子懋祖甫三嵗而母卒未㡬父亦卒庶祖母莫氏與兩叔公燾公秀及懋祖二妹獨存初主簿有田八十畝為錢塘浮屠所侵主簿與公麟相繼訴官不能復家用益落莫氏復携公燾公秀與懋祖二妹往訴浙江行省復不省窘不能歸乃棄懋祖及二妹於人懋祖再轉為時貴家奴每思其親輒嗚咽至夜率淚漬其枕如是者十有七年㑹時貴以罪斥因得放還莫氏洎公燾公秀尚無恙家徒四壁勢不能存懋祖盡變衣裝竭力奉養父骨寄僧舍四十年至是始買地營葬泣血如初喪莫氏俄傷足病卧床褥懋祖扶侍療治得愈尋人仆於火體煅潰殆半復侍療半載始瘥因念奉蒸嘗者惟田耳田不復祖父之志未伸也乃奮力與浮屠争於官總管范公察其實悉㫁還之懋祖得田即以分諸叔後公燾公秀莫氏卒䘮葬各盡禮家門雍睦子亦克肖云明盧顯盧敬兩浙名賢録鄞人父祥卿洪武初以世職漕運命督造海運船已而船破運折坐侵漁逮獄将就戮顯敬詣闕請代顯泣訴曰督造雖臣父名而侵漁實臣顯臣罪當死敬曰兄顯佐父周旋運事造船之謀敬獨知之臣罪當死上矜之㢘得其寃遂兩釋之樂枅名山藏定海亭戸也洪武中㑹稽錢許二家嵗輸鹽厚自縮而迫小民倍輸以掩已數上聞以浙東亭戸悉起赴京鞫訊坐罪輸作枅亦在逮中方治行弟棁請往枅曰吾行雖生死不可知顧吾有三子爾未也棁走詣縣請代枅白縣曰力鹽皆枅也棁烏能知之使往必失對遂行一一舍許棁追及枅叱之去不聽即乗危垣以塊提棁垣之塊去者半枅行已逺棁慟哭而還枅至京師果死陳思禮徐一夔書宋學士所書陳思禮孝事後思禮四明儒家甫七嵗父蚤世母石氏鞠育之母歿思禮創鉅痛深欲隨母死親戚力慰解之乃止年二十四親友勸之娶思禮掩耳不答衆迫之曰娶妻以為養也親歿何以娶為既而親友據義責之不得已乃従及期合卺危坐誦蓼莪之篇凡七晝夜不輟哀慟路人後以貢至京師入太學為上舍朝士咸稱之李仕開三子兩浙名賢錄仕開鄞人操履方正州曲有爭必往質之三子長孝謙次悌謙次忠謙皆天性孝友依依親側弗忍斯湏去有事兄必先弟而弟恒代兄親瘵蹙額聚謀分走東西求醫藥旦夕迭侍床下親食後食親或旬日不食則水飲充腹而已終弗御匕箸洪武初郡國例造戰艦官以仕開富室率編户成之既成使者騐艦以苦窳坐法逮讞秋官時孝謙弱冠請代父囚曰父老我壮宜往悌謙甫十八已出為従伯後請曰兄素多疾弗能任勞願留養親我當往使者恐其非情兩械之而偵其所以兄弟終不易辭遂囚其長者孝謙至秋官論輸作都門涉氷雪負土石手足痠瘃流血備嘗艱苦閲嵗㑹赦免歸居十年仕開又以富室主科量米耗法當坐辟忠謙年十九即荷械詣官曰盜米者囚罪在囚身幸釋吾父官偉其氣貌許之送御史院有㫖免死黥而戍竟沒於遼東父卒二子號哭㡬絶永樂中屢舉孝謙明經以母老乞終養辭不起比母卒二子哀毁如喪父己亥詔天下纂修圖志太守汪馗起孝謙總裁郡乗書成而卒後七年悌謙亦卒陳敬成化四明郡志奉化人年十三家貧業樵洪武十一年十一月五日隨父入山虎攫其父去敬攘臂大呼疾追及之乃履其尾而以杖擊之虎怒舍其父囓敬而啖之其父屍賴以全鄉人哀之李道宗定海縣志年七嵗父世顯以吏員中禍戍甘肅二十餘年道宗長補弟子員日夜西望號泣告大父及母往尋之徒步抵玉闗時世顯為邊帥記室遇於途聞道宗語南音詰所従來知為父子抱持相向泣中丞㢘得之欲以戍籍留應甲子秋試道宗長跪曰大父與吾母望父二十餘年今相遇而淹留非初意中丞知不可强檄鎮道釋世顯仍捐俸助之而還道宗初號懷西謂父在西也至此更曰見泉以父號東泉故云丘緒名山藏鄞邑諸生父鑑娶余而妾黄黄生緒以不得於余被出鑑卒緒年十五事余至孝余愛如已出臨卒告緒曰汝自有母不可失也顧緒母出二十年所矣始鬻於包既而轉徙杳不可跡一夕夢神告曰台州金鰲寺前君母處也明日赴郡憇於途一人識緒問奚自則故包氏養馬厮也緒求跡母厮曰周平者曽語其事今戍京師矣是時緒姊夫方舉進士需次京師緒貽書物色平㑹天雨平避雨邸舍姊夫聞其鄉音問之平也為緒問母曰適台州李憲副子以報緒緒立之台至李家李巳歿無子所後者漫不知前事緒徬徨道中或告之曰此中有媒老矣導往詢則云黄居李無依適仙居之吴氏緒遂之仙居厯覸數十家見一門頗跼蹐而入有兄弟二人皆諸生止緒宿為問其家諸母則黄故主母也然亦不詳所往呼舊蒼頭問之曰適於金鰲寺前去嵗經之已殯其傍矣緒泣曰此吾夢中語也雖然得撫棺泣母亦畢吾志於是吴氏二生送與偕往道犯一牛觸緒墜溝溝在金氏之門金氏兄弟二人為馬長傭肩輿緒従溝中起吴氏二生告馬長所繇馬長曰吾昔傭肩輿舁一婦人至縉雲蒼嶺下其是乎存亡不可知顧寺旁棺非其人也馬長入門縛輿送緒蒼嶺下徘徊旬餘有織屨者曰去此三舍地名王碧川者有陳氏媪年六十矣君邑人也緒詢諸陳倀倀委巷中忽一媪竚立門次探之鄞人也扣其従來具悉媪亦轉詢邱氏緒乃抱持悲號驚動閭巷陳無子多負緒悉為償理迎母歸率妻子孝事亡怠緒屢舉不第年六十餘貢而卒嘉靖中旌表夏道昌兩浙名賢録道昌居鄞之月湖以漁為業幼孤聽母教惟謹既長而漁日所得魚擇巨者以奉母母得痒疾日在申大作非沸湯沃之弗止道昌出必申歸以供湯沐無後時者一日漁於新荘之河得巨鱗里人厚與之直堅弗與問其故答曰歸以奉母由是名益著及母卒哀毁如不欲生㑹有詔錫民孝弟力田者粟帛有差道昌力辭弗受嚴端甬上耆舊傳字克正號謙齋以進士累遷南車駕員外郎為積忤所中解組歸性至孝母年六十奉養歴四十餘年母年百四嵗朝夕不離左右母齒豁不能餐端手屑良米煮粥操七箸以進母有所欲輒力致之少疾即東帶至旦身嘗五藥至母體復始就寢及居喪哀毁彌至其學貫串百氏著有謙齋集虞讙沈愷虞孝子傳字静人寧波人成化間兄謙以富民籍安定亡歸有司逮捕甚亟父憐其衰老命讙代之行讙曰父命焉敢辭行抵安定毅然就役楊文懿公為之請得免歸宏治間父遘疾讙每夜稽顙北辰祝曰寧悔予身無灾吾親久之顙為抆赤血縷見及卒哭絶復甦三日水漿不入口母勸之陽為一舉母入復撤去坐卧苫塊袒髪面黒如囚垢母卒一如其父讙體貌壯偉至是哀毁骨立不復舊容自號曰痩齋陳良言鄞縣志字志行副使槐之子父患目疾歴醫不效因以舌䑛之旬日即愈母得瘋疾七年不能起身親抱持便溺浣濯悉以躬任夜則卧於床側及卒枕塊三年既葬廬墓三載先是父柩在堂鄰家失火将及良言望北號呼風返火滅居室有鵲來巢貓相乳之異陳浩淵嘉靖定海縣志一名䀳字智寧善騎射工詩繼父伯瑞卒哀毁逾禮廬墓三年従孫韜宏治十七年以貢授歴城訓導善事母母疾衣不解帶既卒廬墓三年致雉鹿芝草之瑞縣令錢如京為式其廬許敬觀鄞縣志明州衞軍事母至孝一日與同伍十人駕舟販鹽至江北渡忽暴風雷電挈舟中人上泥塗中皆震死敬觀昏絶黙念我死母将誰依忽若有人援之去衆死所三丈許而甦雷火燎髪如禿人以為孝心所感謝矩嘉靖寧波府志字原規鄞人以父命為人後兄員坐事謫戍凉州矩裹糧匍匐走萬里資送終其身不衰後以例籍父及妻子俱赴戍所矩獨以别籍免矩曰奈何使父與嫂姪獨困苦耶力請與偕抵吴門父病死矩哀毁㡬絶以父柩權厝旅舍相嫂姪抵京師適遇例以家屬放還遂復至吴門迎櫬歸葬眀年兄沒戍所矩又問闗數千里函骨歸祔先壟撫其遺孤薦紳髙其行扁其堂曰孝義韓鼎嘉靖寧波府志字廷陳定海人父仕昭貢入南京病卒無力歸櫬權瘞江寧隙地鼎甫弱冠奔號千里蹤跡故地以求父屍感江神示夢卒得父骨返葬發解壬子尹句容許瓏嘉靖寧波府志字廷璧鄞人少孤依其母無頃刻舍一日母擲竹誤中瓏暈仆地母急抱持泣瓏稍蘓即睁目笑語曰兒故嚇母非真暈也長竭力奉養凡母欲必致平居恒言聖門以色養為難此不假外求不費貲貨直易易耳至今茅山之陽稱純孝焉子元祥成進士劉晉籌海圖編昌國人嘉靖三十二年倭入城其祖老疾不能行晉負祖而逃賊将及祖曰我老甘死汝宜速去晉不肯遂俱被殺馮履祥嘉靖寧波府志字君徳慈谿庠生嘉靖丙辰倭犯縣履祥隨父出奔賊㫁父左手履祥以身蔽之泣訴曰此吾父也願無加害寧殺我賊竟刃之其妻袁氏遁於靈山時孕已彌月夜夢神告曰爾夫為父死當與爾一子次日婦果生一子倭将入馬策之不前不越境而去人謂孝感所致聞宗時嘉靖寧波府志鄞人教授聞理之子幼喪母奉繼母陳承順篤至嘉靖丙辰倭冦突至宗時扶父出遇賊㧞刀欲殺父宗時以身翼蔽泣求代遂飲刃而死父得釋時家奴李三抱宗時幼子不忍舍亦被賊截左耳併刲其面屢死屢甦人共傷之王應麒嘉靖寧波府志慈谿人年十七躭學習文性至孝倭寇卒至應麒扶母姜氏嬸余氏奔匿鄰圃賊窺見二婦輙㧞刀追之二婦亟赴池水余氏溺死應麒見母遇害以身翼蔽賊亂刃之子母傷甚卒沈良十籌海圖編賊犯嗚鶴鎮良十時年七十餘尚有九十餘嵗母賊至負母至五里外力竭不能行息山谷舍中賊追至乃跪拜請死願貸其母賊見母子俱皤髮頽老舍之而去良十憐母飢渇方圖飲食賊又至舉刃欲斫其母良十以身覆母號哭遂被殺母竟得全鮑倫嘉靖寧波府志字孟彞鄞人甫七嵗父䲖遊學吴楚莫知所向母孫氏撫倫少長朔望輒焚香哀禱願父子相見如是者二十年忽有老人自慈谿來謂倫曰汝父曩與我客湖廣至漢陽東塢授徒贅婦生二女不幸死矣盍往歸其尸已而至慈谿遍訪老人不得乃従指示詣漢陽跡之皆符婦家懼有他意訟於縣弗即白繫獄數年縣上府府上監司監司謂疑獄有刺血騐骸事臨按墓所發棺令倫咬指滴血直入枯骨其情始决即棺殮乞歸葬允之監司即慈溪顧英也鄭十三定海縣志嘉靖間倭犯東山族人倉卒避難十三請其父偕族行父不急去為倭所及遂執其父刃之十三抱父尸大哭倭怒并刃之棄尸道上越數日族人歸収其尸十三身首異處右手猶抱父牢不可解縣尹宋繼祖擬以事聞不果向叙籌海圖編字叔禮慈谿人獻令七世孫年十六入府庠賊入縣叙掖母而逸遇倭東溪踣叙仆地直前斫其母叙急起抱母頸連呼曰寧殺我乃殺叙舍其母而去巡按上其事詔旌其門聞繼龍聞繼泰鄞縣志繼龍字隠鱗五嵗喪母哀號如成人事父晨起察色切脈寢則伺瑞息以為常體稍不安輒不離左右夜不解帶手調藥食惟謹奉養三十年執喪哀毁逾節諱日必服絰麻昧爽櫛沐誦經祭哭盡哀終身如一日卒年八十一従弟繼泰字治甫父賢臣娶陳氏生繼泰甫五嵗而賢臣歿陳撫繼泰成立娶妻莫合巹翌日仍與母同室共寢夫妻侍養不離左右母年八十六而終哀泣如嬰兒身傍柩側凡三載始出葬後廬墓宗戚以年耄力挽之歸乃供母像榻前晨茶午膳如是者終身卒年七十一子世麟字瑞宇事大母及父母靡弗如父之事母董司農守諭為之傳其畧馮象臨寧波府志慈谿諸生家被火徧覔父母烟焰彌空迷失户庭象臨大呼初得母即従火中負出再入負父并挾一弟以出半體已焦爛聞妹尚留卧内母號呼将自入亟止之復觸烈焰擕妹出竟焦灼而死事聞旌表錢敬忠鄞縣志字孝直幼穎悟性篤摰父以事擬重辟覊江西獄敬忠受經獄中業日益進聞有恩赦輒匐匍求援當事不能得萬歴己未成進士熹宗即位入京誓以必死草疏辨寃乞代父死囚服伏禁門外疏下法司議獄者憫之父竟得釋謁選得刑部主事遷守寧國西河詩話甬東錢孝子父臨江君初為儀部以不附江陵出守臨江㑹江陵修憾於吉安故御史劉臺陷之死其羅織成獄者王開府也江陵死御史江君白臺寃命下行勘委君及瑞州守究其事適新開府曹君為王開府導地冀以倖全而君持不詘竟坐王戍曹大怒乃取他事劾君嚴㫖提問擬奪職不可擬杖不可擬遣戍不可遂擬辟復御筆判状曰即決於是舉朝大震九卿及臺省以下皆互疏切爭政府申公時行亦具宻掲然後得更秋後其後申公隂檄江省令是年勿决囚而漸以菑𤯝暵溢使連停秋決者若干年孝子初生之時即君入獄之嵗歴嵗若干始受書獄中又嵗若干始就試又嵗若干始登鄉薦登第然猶未敢訟寃至神廟升遐而後號呼詣闕下猶不敢訟言不宜死即宜死願以身代如是者有年而後出獄暨出獄數年而後死然則孝子之用心如是其疢且久也當君死時距出獄不滿三嵗孝子哀痛㡬殉之倪文正元璐有慰孝子書一篇傳人間孝子先世自侍郎副使君下暨孝子俱以進士起家後臨江君孫肅樂亦以進士為刑部郎殉國難謝瀚吴偉業謝瀚傳字愛夫號泮池其先有令定海者遂家焉瀚年十二一日見家不能炊因謂其仲曰需青紫何時萬一吾父母枵羸至不及待奈何爾執不律吾行且逐烏兔走矣遂棄制舉義修業吴越間壹意奉父母歡仲廼得卒學成進士瀚父性好晏處㑹嵗除隣失火蕩其室僦㫄舍以居輒忽忽不樂瀚廼慮材鳩傭落成父始喜然以無樓居且未陽也瀚復自為臿築楯㮌之屬以意審面於拮据中竭蹶成之父乃樂甚為加餐仲為恭政宦遊萬里外瀚家居養母備極情志恭政無内顧憂與瀚沒齒友愛視曩者青紫數言始終無間云王伯化天唘慈谿縣志字子魚父沒哀毁如禮嘉靖丙辰倭入縣治士民倉皇出走伯化掖母出郭外同行者曰賊迫矣曷求活計伯化曰母活我活安用求為頃之僕又告曰賊廹甚子母恐不相顧矣僕亦去伯化掖母以前母曰母子同死無益汝急去詰朝可收吾骸伯化號泣掖之如初望賊呼曰余饋汝金毋傷吾母賊揚刃向母伯化以身承之遂遇害賊見伯化死竟掠金不兵其母而去至隆慶壬申母始以夀終伯化之子大韶抆淚走四方以旌父孝母亡空山廬墓猛虎為馴姜國望天唘慈谿縣志字道卿邑博士弟子貟嘉靖丙辰四月倭突入居民逃竄時母陸初喪在殯國望抱棺痛哭誓不相離賊至柩前似以為不祥不敢逼近已乃蹤暗室従隙中窺見将舉火忽聞外間哨聲輒投火去如是者三抵暮聞里人音急出紏衆排墻遷柩舁至空地不及於難董得偁鄞縣志字天鑑父應圭知易州直流冦侵逼得偁従一蒼頭奔候歴荒原叢骨中又遭雨雹傾仆頭目皆損惟冀得覲父雖艱險不顧也及遷知鄧州復為冦所圍得偁聞之又兼程而往時父以憂勞成疾相持而泣未㡬父卒扶櫬歸崇禎丙子赴省試聞母病旱涸無舟徒步亟返已而母愈復徒步往至則適當試期是科領鄉薦家貧與昆弟羣従極友愛子允瑫己酉登賢書李士模鄞縣志字叔範父坤元卒營壙於西嶴深山遂廬墓焉嘗丙夜有虎窺之色不為動夢父遣之歸涕泣復居一年子如玉明經髙第授龍泉博士國朝陸崑舊浙江通志字華星鄞人有至性在親側未嘗疾言遽色家貧祖父年八十餘惟崑侍食能當其意喪母晝夜哭哀動鄰里藉館榖以養父遇其母諱日雖甚風雨必従館中手擕母所嗜為祀品己亥夏五月海冦入郡東崑父匿其親殷家冦入門先執其父欲刃之崑直前哀詞丐生願以身代遂遇害父得釋謝泰交鄉賢留祀冊字時際號天童山人家定海幼敏博學補諸生貢入京師丁酉舉順天鄉試踰嵗卒年四十八幼痛母周早卒誓以其身服勞於父嘗為吮癰而愈與諸兄考方書搔疴癢經營别墅以娱奉之事其兄祗敬篤愛家無餘財執親喪孺慕泣血其葬也廣輪掩坎挈畚把土手足皸瘃攀號松柏不忍舍去著思親雜咏百篇朱金誥題旌冊鄞縣人父病刲股和藥以進疾遂已時山賊掠鄉邑金誥負親避難父為賊所執金誥跪求哀懇曰寧殺我勿傷我父賊憐之父子俱得釋又嘗刺血書經以延母夀母卒入山號泣虎為斂跡順治九年奉旌范洪震鄞縣志字驚百鄞縣人母卒廬於墓側寢苫枕塊疏食飲水旦夕哭奠如初喪三年然後歸後父疾憂痛徬徨至為嘗矢順治十五年具題奉旌陶顯曽題旌冊鄞縣人事父孝數十年無倦容父病焚香龥天願以身代一夕夢神告曰爾孝格天當増爾親夀疾遂愈康熙四十五年具題奉旌李景濂題旌冊鄞縣人父母早歿繼母撫養之得成立母病癱景濂扶持左右躬親藥食歴七載無倦色康熙四十五年具題奉旌李秉誠題旌冊鄞縣人年八嵗嫡母亡擗踊哀號見者流涕後繼母卒廬墓三年父病癱染床第者六載秉誠醫儔弗倦康熙四十五年具題奉旌董道權題旌冊鄞縣人父病時值大雪求醫弗至道權雪夜負醫而行嚴冬冒寒弗顧也奉繼母尤孝兩親歿葬後廬墓三年雍正六年具題奉旌浙江通志卷一百八十四
