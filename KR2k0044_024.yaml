body:
  text: 浙江通志卷二十五學校一書院附記曰建國君民教學為先蓋自虞夏商周以來美風俗而育賢才未有不本諸此也兩浙人文萃於庠序禮陶樂淑涵濡於教澤者深矣聖朝廣勵學宫有加無已增進取之數辨優劣以示勸懲士生其間能無鼓舞而振興乎志學校杭州府杭州府儒學在府治東咸淳臨安志舊在通越門外紹興元年始以凌家橋今名凌雲橋西慧安寺故基建嘉定九年教授袁肅黃灝告於府上之朝拓而大之成化杭州府志紹定四年大尹余天錫增置學田周端朝為記淳祐八年安撫趙與籌重建增置學廪元至正十年守保格又新之十二年燬於寇守特穆爾魯斯購寺地重建王火本為記尋燬守夏思忠盡購寺基新之孟昉楊翮各冇記明一統志洪武八年重建嘉靖浙江通志永樂十八年燬宣德四年巡撫大理卿胡槩重建自為記萬歷杭州府志正統初左布政使孫原貞按察使軒輗鼎新廟學增置學舍未幾遷去按察使陳璇卒成之陳循為記成化二十一年郡守張縉修夏時正為記𢎞治六年尊經閣圮縉重修之吳伯通為記十年立科目題名碑於櫺星門外程敏政為記是年巡按吳一貫撤民居之障其前者拓之李旻杭州府儒學記𢎞治丙辰監察御史吳公一貫巡按浙江屢至廟學見其外門與南向之路旁出而隘塞慨然興懷乃謀諸監察御史黃公世經藩臬長閻公仲宇劉公福等撤民居之阻其前者給地以易之願售者歸其直拓地廣十丈袤三倍於廣以為南出之路東南為高墉中立石柱巨坊題曰泮宫坊坊南行折而東跨河為石橋橋下為坊牌曰育才橋橋東通道為坊南北各一南曰文明北曰聚奎泮池在廟前門之內故有橋復翼以二以通左右趨廟之行為碑亭二於廟中門之前為學門三間於廟前門之右凡廟學之隤壞者皆葺而完之經始於丁巳八月之朔至十月既望落成於是廟學之門與路旁出隘塞者既正而通之又擴而大之士之逰於斯者必將無往而非正且大也正且大斯無沗於士矣十八年巡按車梁重新廟學楊守址重新杭州府儒學記𢎞治甲子監察御史車君梁巡按兩浙以興學造士為務至乙丑之秋會三司諸大夫於學宫僉議興作衆情惟允乃具材役工凡大成殿明倫堂尊經閣鄉賢祠以次修葺櫺星門外建兩翼門東曰義路西曰禮門又建樓一所題曰應魁皆前所未有也守址以天下事興廢補敝易為力極敝大壞難為功為難於其易圖大於其細始敝而修之日新又新則不至於極敝大壞矣杭為文獻之邦士之逰於學而冇志於天下事者其味於斯言乎修德講學日新又新無或廢墜以成可久可大之德業亦若是也正德十二年巡按宋廷佐檄知府留志淑遷仁和縣學石經於戟門外兩偏道統十三贊於尊經閣下楊一清石經碑記監察御史宋君廷佐按治浙江嘗求所謂石經者曰在仁和學因往視之多棄斥瓦礫中曰噫此南宋太學中故物也蓋高宗初渡江都臨安即詔建學養士手書易書詩春秋論孟中庸儒行諸篇刻石於學京兆尹趙磻老建尊經閣以儲之二十六年復製宣聖洎顔曽以下七十二賢贊并李伯時舊所繪像皆刻石置之學理宗紹定五年又以所製伏羲來道統贊刻之附諸石經之末宋亡學廢元西楊璉真伽謀運置諸石為寺塔址賴亷訪經歷申屠致逺之力而止然亦僅存其半矣後改學為西湖書院諸殘碑實在焉國朝洪武十一年即書院建仁和縣學宣德二年巡按御史吳訥慨石經殘缺屬知府盧玊潤搜集之得全刻及斷裂者若干移麗其中天順三年改建縣學於今所其諸石悉徙以從六十年於兹宋君乃檄府命移置於府學因徙圖贊於尊經閣之下甃以瓴甓石經及表忠觀諸碑則徙於櫺星門北之兩偏周廊覆之其屋之數左二十有二楹右如之石之數圖像十有五贊八易二書七詩十春秋四十有八論孟中庸十有九表忠觀諸碑十有四既訖工留守肅使者謁子記慨惟經書之在世猶日麗天水行地不假形器而存者也顧秦燔漢鑿之餘不斷如線有斯文之責者不得不託諸貞石以夀於無窮漢中郎筆迹已不可見唐長安石經與臨安後先並美今長安故無恙而仁和學宫獨委棄至此凡吏於兹士於兹者不均有責哉高宗史稱其博學強記繼體守文有足嘉者理宗之嗣能表章先賢崇正學變士習功不可少觀其所以圖不朽者而其所存可知矣雖物興廢有數然振厲修舉每存乎其人必有儒者之心然後能及此其他非惟不暇為亦固有不肯為者矣是年提學副使劉瑞請廷佐購書藏尊經閣劉瑞杭州府學藏書記杭學無藏書頒於廷者惟經書性理漢宋諸史瑞董學請於監察御史宋公公慨然曰吾方石經是葺盍并圖之於是出刑金遣訓導林鳯鳴劉銛往求約計萬卷經史子集秩然略備櫝藏於閣師生誦觀籍其出納既成瑞進師生告之曰古之君子未有不學而成者吾夫子設教曰博學曰多聞見曰前言往行畜其德從可知矣讀天下之書斯可與論天下之事此監察公藏書之意也夫經者天也史者四時五行也子集者萬彚也天者道之原也宰物而不宰於物者也四時五行經緯乎天而不容己者也乃若萬彚斯微矣飛者躍者纖者巨者蠢而動者各聲聲色色於覆幬雖或反戻恣睢而天亦莫之絶也其諸子集之謂乎簡之裁之神而明之存乎其人可耳嘉靖八年詔建敬一亭貯御製敬一針宋儒程頤視聽言動四針注范浚心針注九年奉制易大成殿曰先師廟建啓聖祠正聖賢祀典自敬一亭以下各學皆同後不備載十五年左布政使任忠以展謁時輿從直廟門行非禮購地闢為便道今稱新路嘉靖浙江通志射圃久圮嘉靖三十一年重修薛應旗射圃記三學射圃者杭州仁和錢塘三學諸生習射之圃也洪武初三學各有射圃成化辛卯乃即開元宫廢址總建督學者就以涖政繼遷代偶間屯田憲竂因以居之𢎞治戊午提學副使趙公寬至遂議度圃之左右隙地左建提學書院右建是圃以専習射迤北乃築街通書院用便督率竟以原圃讓為屯田公署其事具趙公書院記中嵗久是圃亦就蕪圮嘉靖辛亥子叨視學政屬有司葺之明年壬子八月秋試畢事始克經理冬十二月訖工凡為前堂前軒各三楹東西兩廡各五楹穿堂一楹後堂五楹厨屋三楹中外門各一座左右候館各一楹其諸弓矢決拾侯鵠旌旗鐘鼓琴瑟笙簫塤磬尊罍豆籩勺篚洗禁爼案豐觶之屬悉鼎新如制癸丑春遂進師生習射值有石仆庭中蓋前人礱而置之者豫因為文勒之以紀其事應旗惟先王為弧矢以威天下其選士也必校射於澤宫以行慶讓惟時天子諸侯卿大夫士靡不盡志於射斯其微義豈徙在於進退周旋儀文器數之間哉蓋實以隂陽並運迭用柔剛斯仁義成德而人道立矣故曰射者男子之所有事而君子之所貴也吾夫子矍相之射公罔之裘序點揚觶之語丁寧反覆意義具在然識其微者蓋鮮應旗承乏兩浙日切兢懼誠願與爾有司學官弟子實心相與凡可以裨化理者不憚舉行故於省城首善之地是圃之修復自不容緩而按圖據經講明肄習以為諸郡倡者不得不汲汲也杭州府志萬厯二年提學副使滕伯輪改三司廳為名宦祠三年火延文明樓候廳燬郡守吳自新重建撤民居而逺之陳善為記二十三年提學僉事伍袁萃增置學田沈瑞臨為記二十四年巡撫劉元霖重修馬夢禎為記四十年巡撫高舉重修自為記崇禎十年巡撫喻思恂巡按趙繼鼎張任學暨諸司重修喻思恂為記十二年巡撫熊奮渭修明倫堂黃鳴俊為記國朝順治五年巡臺諸司修葺聖廟李際期為記十五年總督李率泰巡撫陳應泰巡按王元曦重修谷應泰為記康熙十七年巡撫陳秉直重修文廟二十二年教授章潤竒訓導宋重建文昌祠二十三年知府顧岱修兩廡二十四年巡撫趙士麟修聖殿明倫堂并重造兩廡廟門廟懸聖祖仁皇帝御書萬世師表扁額二十五年御製先師孔子贊及顔曽思孟四子贊并序頒行天下府州縣學勒石置碑御製先師孔子贊并序蓋自三才建而天地不居其功一中傳而聖人代宣其藴有行道之聖得位以綏猷有明道之聖立言以垂憲此正學所以常明人心之所以不泯也粵稽往緒仰溯前徽堯舜禹湯文武達而在上兼君師之寄行道之聖人也孔子不得位窮而在下秉刪定之權明道之聖人也行道者勛業炳於一朝明道者教思周於百世堯舜文武之後不有孔子則學術紛淆仁義湮塞斯道之失傳也久矣後之人而欲探二帝三王之心法以為治國平天下之準其奚所取衷焉然則孔子之為萬古一人也審矣朕巡厯東國謁祀闕里景仰滋深敬摛筆而為之贊曰清濁有氣剛柔有質聖人參之人極以立行著習察舍道莫由惟皇建極惟后綏猷作君作師垂統萬古曰惟堯舜禹湯文武五百餘嵗至聖誕生聲金振玊集厥大成序書刪詩定禮正樂既窮象繫亦嚴筆削上紹往緒下示來型道不終晦秩然大經百家紛紜殊途異趣日月無踰羮牆可晤孔子之道惟中與庸此心此理千聖所同孔子之德仁義中正秉彛之好根本天性庶幾夙夜朂哉令圖遡源洙泗景躅唐虞載厯庭除式觀禮器摛毫仰贊心焉遐企百世而上以聖為歸百世而下以聖為師非師夫子惟師於道統天御世惟道為寶泰山嚴巖東海泱泱牆高萬仞夫子之堂孰窺其藩孰窺其徑道不逺人克念作聖御製顔子贊聖道早聞天資獨粹約禮博文不遷不二一善服膺萬德來萃能化而齊其樂一致禮樂四代治法兼備用舍行藏王佐之器御製曽子贊洙泗之傳魯以得之一貫曰唯聖學在兹明德新民至善為期格致誠正均平以推至德要道百行所基纂承統緒修明訓辭御製子思子贊於穆天命道之大原靜養動察庸行德言以育萬物以贊乾坤九經三重大法是存篤恭慎獨成德之門養之藏密擴之無垠御製孟子贊哲人既萎楊墨昌熾子輿闢之曰仁曰義性善獨闡知言養氣道稱堯舜學屏功利煌煌七篇並垂六藝孔學攸傳禹功作配雍正元年三月欽奉上諭追封先師五代王爵五世祖為肇聖王高祖為裕聖王曽祖為詒聖王祖為昌聖王父為啓聖王易啓聖祠為崇聖祠增設神牌祭器典禮加隆三年御書生民未有額懸大成殿五年四月總督臣李衛大新廟學委教授蘇滋恢董理九月訖工規制悉備先師廟四配復聖顔子宗聖曽子述聖子思子亞聖孟子十哲閔子損冉子耕冉子雍宰子子端木子賜冉子求仲子由言子偃卜子商顓孫子師國朝康熙五十一年奉聖祖仁皇帝上諭以朱子熹發明聖道軌於至正使六經之旨大明聖學之傳有繼舊在東廡先賢之列升配大成殿十哲之次兩廡從祀先賢淡臺子滅明宓子不齊原子憲公治子長南宫子適公晢子哀商子瞿高子柴漆雕子開樊子須司馬子耕商子澤有子若公西子赤巫馬子施梁子鱣顔子辛冉子孺曹子恤伯子虔公孫子龍冉子季秦子商漆雕子徒父顔子髙漆雕子哆壤駟子赤任子不齊石作子蜀公良子孺公夏子首公肩子定后子處鄡子單奚容子蒧罕父子黑顔子祖榮子旗句子井疆左人子郢秦子祖縣子成鄭子國公祖子句兹原子亢燕子伋亷子潔樂子咳叔仲子會狄子黑公西子輿如孔子忠邽子巽公西子蒧陳子亢顔子之僕琴子張施子之常步叔子乘申子棖秦子非顔子噲左邱子明周子敦頤張子載程子皓程子頤邵子雍國朝雍正三年奉旨復入從祀者四賢蘧子瑗林子放秦子冉顔子何增入從祀者六賢縣子亶牧子皮樂正子克公都子萬子章公孫子丑兩廡從祀先儒公羊子高榖梁子赤毛子萇伏子勝孔子安國后子蒼高堂子生董子仲舒杜子子春王子通韓子愈胡子瑗歐陽子修司馬子光楊子時胡子安國羅子從彥李子侗吕子祖謙張子栻陸子九淵蔡子沈真子德秀許子衡薛子瑄陳子獻章胡子居仁王子守仁國朝康熙五十五年江南學臣余正健疏請宋儒范子仲淹從祀奉旨準入兩廡雍正三年奉旨復入從祀者二人鄭子康成范子寧增入從祀者十有四人諸葛子亮尹子焞陳子淳魏子了翁黃子幹何子基王子柏趙子復金子履祥許子謙陳子皓羅子欽順蔡子清陸子龍其崇聖祠配享先賢顔氏無繇曽氏點孔氏鯉孟孫氏激從祀先儒周氏輔程氏珦朱氏松蔡氏元定雍正三年奉旨增入從祀者一人張氏迪已上配享從祀各府縣學皆同後不復載射圃在提學道署西與仁和錢塘同一圃後改校士館仍習射於此今地入駐防營內名宦祠祀任延以下一百五十人鄉賢祠祀嚴光以下二百一十五人康熙四十一年正月聖祖仁皇帝御製訓飭士子文頒行學宫國家建立學校原以興行教化作育人才典至渥也朕臨馭以來隆重師儒加意庠序近復慎簡學使釐剔弊端務期風教修明賢材蔚起庶幾棫朴作人之意乃比來士習未端儒效罕著雖因內外臣工奉行未能盡善亦由爾諸生積錮已久猝難改易之故也兹特親製訓言再加警飭爾諸生其敬聽之從來學者先立品行次及文學學術事功源委有敘爾諸生幼聞庭訓長列宫牆朝夕誦讀寧無究心必也躬行實踐砥礪亷隅敦孝順以事親秉忠貞以立志窮經考義勿雜荒誕之談取友親師悉化憍盈之習文章歸於醇雅毋事浮華軌度式於規繩最防蕩軼子襟佻㒓自昔所譏茍行止有虧雖讀書何益若夫宅心弗淑行已多愆或蜚語流言脅制官長或隱糧包訟出入公門或唆撥姦猾欺孤凌弱或招呼朋類結社要盟乃如之人名教不容鄉黨弗齒縱幸逃褫撲濫竊章縫返之於衷能無愧乎鄉會科名乃掄才大典關係尤巨士子果有真才實學何患困不逢年顧乃標榜虛名暗通聲氣夤緣詭遇罔顧身家又或改竄鄉貫希圖進取囂凌騰沸網利營私種種弊情深可痛恨且夫士子出身之始尤貴以正若兹厥初拜獻便已作姦犯科則異時敗檢踰間何所不至又安望其秉公持正為國家宣猷樹績膺後先疏附之選哉朕用嘉惠爾等故不禁反復惓惓兹訓言頒到爾等務共體朕心恪遵明訓一切痛加改省爭自濯磨積行勤學以圖上進國家三年登造束帛弓旌不特爾身有榮即爾祖父亦增光寵矣逢時得志寧俟他求哉若乃視為具文玩愒弗警毁方躍冶暴棄自甘則是爾等冥頑無知終不能率教也既負栽培復干咎戾王章具在朕亦不能為爾等寬矣自兹以往內而國學外而直省鄉校凡學臣師長皆有司鐸之責者並宜傳集諸生多方董勸以副朕懷否則職業弗修咎亦難逭勿謂朕言之不預也爾多士尚敬聽之哉雍正四年九月二十七日欽奉上諭為士者乃四民之首一方之望凡屬編氓皆尊之奉之以為讀聖賢之書列膠庠之選其所言所行俱可以為鄉人法則也故必敦品勵學謹言慎行不愧端人正士然後以聖賢詩書之道開示愚民則民必聽從其言服習其教相率而歸於謹厚或小民偶有不善之事即懷愧恥之心相戒勿令某人知之如古人之往事則民風何患不淳世道何患不復古耶朕觀今日之士雖不乏閉户勤修讀書守法之輩而蕩檢踰間不顧名節者亦復不少或出入官署包攬詞訟或武斷鄉曲欺壓平民或違抗錢糧藐視國法或代民納課私潤身家種種卑汚下賤之事難以悉數彼為民者見士子誦讀聖賢之書而行止尚且如此則必薄待讀書之人而並且輕視聖賢之書矣士習不端民風何由而正其間關係最為重大朕自即位以來加恩學校培養人才所以教育士子者無所不至宜乎天下之士皆鼓舞奮興爭自濯磨盡去其佻達之習矣而內外諸臣條奏中臚列諸生之劣迹請行嚴懲者甚多朕思轉移化導之法當先端其本原教官者多士之儀型也學臣者教官之表率也教官多屬中材又或年齒衰邁貪位竊祿與士子為朋儔視考課為故套而學臣又但以衡文為事任教官之因循怠惰茍且塞責漫不加察所以倡率之本不立無怪乎士習之不端而風俗之未淳也朕孜孜圖治欲四海之大萬民之衆皆向風而慕義革薄而從忠故特簡督學之臣慎重教官之職欲使自上而下端本澄源以收實效也凡為學臣者務須持正秉公宣揚風化於教官之稱職者即加薦拔溺職者即行參革為教官者訓誨士子悉秉誠心如父兄之督課子弟至於分别優劣則至公至當不涉偏私如此各盡其道則士子崇尚品詣砥礪亷隅且不但自淑其身而羣黎百姓日聞善言日覩善行以生其感發之念風俗之丕變庶幾其可望也特諭訓旨謹按杭州府學為十一郡膠庠之首凡奉到於此率先奉行而各郡邑咸蒸蒸向化焉故恭紀敷文書院在鳯凰山萬松嶺仁和縣志舊報恩寺明𢎞治十一年浙江右參政周木廢寺建萬松書院上有芙蓉巖石匣泉如圭峯中為大成殿東西號房後為明道堂育秀閣中有飛躍軒稍西為留月臺掬湖臺振衣亭可汲亭水雲亭前為戟門曰仰聖門左有曽唯亭右有顔樂亭外有萬松門萬松書院石坊東西有德侔天地道貫古今二石坊嘉靖乙酉增修王守仁萬松書院記萬松書院在浙省南門外當湖山之間𢎞治初參政周君近仁因廢寺之址而改為之廟貌規制略如學宫延孔氏之裔以奉祀事近年以來有司相繼葺理地益以勝然亦止為逰觀之所而講誦之道未偹也嘉靖乙酉侍御潘景哲奉命來巡憲度丕肅文教聿新乃增修書院益廣樓居齋舍為三十六楹具其器用置贍田若干頃揭白鹿之規掄彥選俊肄習其間以倡列郡之士而屬之提學僉事萬君汝信汝信曰是固潮之責也藩臬諸君咸贊厥成使知事嚴綱董其役知府陳力推官陳箎相協經理閲月踰旬工訖事舉乃請紀其事惟我明自國都至於郡邑咸建廟學羣士之秀専官列職而教育之其於學校之制可謂詳且備矣而名區勝地往往復有書院之設何哉所以匡翼夫學校之不逮也夫三代之學皆所以明人倫今之學宫皆以明倫名堂則其所以立學者固未嘗非三代意也然自科舉之業盛士皆馳騖於記誦辭章而功利得喪分惑其心於是師之所教弟子之所學者遂不復知有明倫之意矣懷世道之憂者思挽而復之卒亦未知所措其力譬之兵事當玩弛偷惰之餘則必選將閲伍更其號令旌旗懸非格之賞以倡勇敢然後士氣可得而振也今書院之設固亦此類也歟士之集於此者其必相與思之曰既進我於學校矣而復優我於是何為乎寧獨以精吾之舉業便吾之進取而已乎是固期我以古聖賢之學也古聖賢之學明倫而已明倫之學孩提之童亦無不能而及其至也雖聖人有所不能盡也人倫明於上小民親於下家齊國治而天下平矣是故明倫之外無學外此而學者謂之異端非此而論者謂之邪説假此而行者謂之霸術飾此而言者謂之支辭背此而馳者謂之功利之徒亂世之政雖今之舉業必自此而精之而後不愧於敷奏明試雖今之仕進必由此而施之而後無忝於行義達道斯固國家建學之初意諸君葺書院以興多士之盛心也故為多士誦之三十三年杭州知府孫孟重建明道堂翼以居仁由義二齋萬厯五年巡鹽御史馬應夢即育秀閣北建繼道堂翼以窮理居敬二齋祀周程張朱五先生八年毁各書院巡按御史謝師啓提學僉事喬因阜謂萬松書院祀先聖不當毁具疏得存國朝康熙十年巡撫范承謨修五十五年巡撫徐元夢重修奉聖祖仁皇帝御書浙水敷文扁額懸於中堂頒賜古文淵鑒淵鑒類函周易折中朱子全書藏於院內鹽驛道黃炳捐置學田康熙五十七年巡撫朱軾復捐益贍産雍正四年巡撫臣李衛重修十一年欽奉上諭各省學校之外地方大吏每有設立書院聚集生徒講誦肄業者朕臨御以來時時以教育人材為念但稔聞書院之設實有禆益者少而浮慕虛名者多是以未曽敕令各省通行蓋欲徐徐有待而後頒降諭旨也近見各省大吏漸知崇尚實政不事沽名邀譽之為而讀書應舉之人亦頗能屏去浮囂之習則建立書院擇一省文行兼優之士讀書其中使之朝夕講誦整躬飭行有所成就俾逺近士子觀感奮發亦興賢育才之一道也督撫駐劄之所為省會之地著該督撫商酌舉行各賜帑金一千兩將來士子羣聚讀書須預為籌畫資其膏火以垂永久其不足者在於存公銀內支用封疆大吏等並有化導士子之職各宜殫心奉行黜浮從實以儲國家菁莪棫朴之選如此則書院之設有禆益於士習文風而無流弊乃朕之所厚望也特諭欽此浙江總督管巡撫事臣程元章欽遵酌議生息增置田畝以為永逺膏火之資俾全浙士子均沐皇仁益勤講肄翕然向風以仰副聖天子樂育人才之至意云天真書院在天真山麓杭州府志王文成守仁講學之所萬厯間行人薛侃等建以祀文成崇文書院在西湖跨虹橋西兩浙鹽法志明萬厯間巡鹽御史葉永盛視鹺之餘集內商子弟於西湖之跨虹橋西授以題命各就舫中屬文舫皆散去少焉書角一聲羣舫畢集各以文進面定甲乙名曰舫課去官後商士思之就其地建書院中奉朱子而祠永盛於後寢春秋饗祀焉國朝康熙四十四年聖祖仁皇帝南巡御題正學闡教四字賜為額爰鼎新之榜曰崇文中為饗堂闢其左為亭敬摹御書勒石崇奉後為敬修堂為諸生齋舍雍正十一年鹽驛道張若震重修規制大備姚之駟重修崇文書院記治世教育人材成均以萃八方之士郡縣學以萃鄉國之士而又設為書院以講學其中鵝湖鹿洞自昔為昭今聖天子在上特於省會書院大沛殊恩良以書院之建學校之助也然非宦斯土者以教育人材是亟為之振興而鼓舞則其事亦難永久而不敝西湖故冇書院名崇文為新安人士肄業之所明直指葉公雅有造士之德因創斯地以尸祝之堂皇之上敬祠徽國文公嵗祀罔缺吾鄉士大夫習禮於斯兼課文藝聲華鵲起科弟蟬聯蓋百數十年於兹矣康熙四十四年恭遇聖祖南巡闡教之額頒賜院內日華雲爛朗耀湖山多士御書正學益爭自濯磨文風日上雍正十一年大都運桐城張公來督鹺政公以黃閣世家鴻文駿業昭昭在人耳目涖任後恤商惠民庶政具修尤以教育人材為己任春秋書院祀事必躬必親酹爵之餘恆集諸生諄諄以進德修業相朂因環顧祠宇多為風雨剝蝕且講堂誦舍缺焉未周無臯比之座學徙末由矜式慨然思所以振興而鼓舞之爰命鹺商閲其廢缺酌所修舉凡木石之需甓堊之費計鏹如干延師之脡脯集課之膳修優奬之楮穎閲年計鏹如干兩分鹺各為捐資餘俱按引輸費嵗以為常鹺業諸君罔不踴躍從事一時祠宇堂舍煥然稱巨麗觀公乃慎擇經師延進士施君學川為設絳帳由是䇿杖負笈之徒蒸然雲集會而課者月至三四百人校其文而甲乙之公加以品題優其奬賞多士莫不舉手加額曰而今乃知文之崇也夫崇文者豈徒揚芳摛藻掇青拾紫而已哉周子曰文所以載道程子曰編之乎詩書而不愧措之乎天地而不疑此為傳世之文夫文章性道原自吻合學者習其辭究其義以之澡身而浴德以之經天而緯地皆於文焉始終之今者敬瞻宸翰當思學何以正教何以闌昔文公誨士必先器識而後文藝凡我同學之人務期砥躬礪行上以答盛朝造士之𢎞恩下以體我公樂育之雅意橫經問業一惟徽國公是景是仰由是發為文章可以麗日星垂金石顯為事業可以立丹陛奠蒼生則其文斯為大文其崇斯為至崇矣多士戴公之德謀一言以鑱諸石余不敏向附崇文之末班恭承嘉惠竊與有榮觀焉遂不辭而為之記敬一書院在孤山杭州府志康熙二十四年巡撫趙士麟構講堂於孤山每月朔日會紳襟耆老宣講聖諭望日集師儒講學於此紫陽書院在紫陽山麓兩浙鹽法志康熙四十二年兩浙鹽運司高熊徴買宅於鳳山門內之馨如坊改作書院鹺商亦踴躍捐資共勷厥成顔曰紫陽别墅以其地為紫陽山麓而適與新安之紫陽同名遂以别墅别之其中為樂育堂奉朱子木主堂後有簪花閣五雲深處講堂東為近水樓南宫舫瀛洲榭生徒於此弦誦焉又折而東為春草池為垂釣磯為看湖臺為别有天為尋詩徑循徑而入為層梯疊巘躡其巔為巢翠亭逺矚錢塘聖湖如在襟帶間其他如小瞿塘石蕊峯梧桐岡鸚鵡石筆架峯螺泉葡萄石諸勝皆巖石瘦削壑谷幽邃當事延名師主講席日有課月有程一秉鹿洞規則雍正三年寧紹分司徐有緯捐葺七年總督臣李衛重建巢翠閣為文昌祠錢塘縣儒學在府治東北咸淳臨安志舊附京庠成化杭州府志宋紹興間昉建於長生老人橋西嘉熙四年尹趙與歡大其址建學六齋元因之至正十二年燬於兵嘉靖浙江通志明洪武三年知縣邵復亨徙今所萬歷杭州府志洪武九年知縣王益德改建宣德間重建正統初增建號舍景泰五年按察使陳璇率諸寮寀協修廟學魏驥為記𢎞治三年按察使于大節提學副使吳伯通協力修葺因立科第題名石李旻為記嘉靖三十年知府孫孟四十二年提學副使屠羲英繼飾廟學萬厯二年廟壞訓導黃金粲潘桂芳白於提學副使滕伯輪并啓聖祠明倫堂皆一新之陳善重修錢塘縣儒學記錢塘縣學在省城東隅形勝獨竒風氣攸聚萬厯二年先師廟脊為風雨所壞司訓黃君金粲潘君桂芳具狀白於督學憲副滕公修之始先師廟次兩廡次敬一亭次五針亭次南戟門又南櫺星門門之南新樹石欄東西凡若干丈廟之北修明倫堂堂之西修啓聖祠始於三月落成於六月內外煥然改觀諸生詣豫請紀成事善因拜手言曰休哉滕公興學之績不可以不紀也今夫立教不外明倫聖學莫先主敬自敬敷五教之説虞廷倡之而萬世教人者宗焉是以三綱正九疇敘庠序成風里閭向化何則教養之道素豫而聖學大明也諸士服習有素遊於黌宫弗戾聖人之教以仰承滕公興學造士之盛心而二三師儒締構之勞亦非無補矣萬歷錢塘縣志萬厯二十四年縣令湯沐建文昌閣二十八年縣令陳瑛建第一流坊三十二年縣令朱光祚建尊經閣金學曾為記杭州府志萬厯三十五年知縣聶心湯重建先師廟崇禎十三年巡鹽御史梁雲構重修吳太沖為記十七年知縣顧咸建移建啓聖宫國朝順治十三年燬十五年提學谷應泰重建康熙二十四年諸生共建石坊題曰宫牆第一流五十二年圮巡鹽御史顓圖重修五十七年總督覺羅滿保重修廟學舉人潘兆新生員范玉鉁施廷儀等重建尊經閣於明倫堂後復褒忠祠於學東祀方正學以下一十四人滿保為記雍正六年總督臣李衛大加修治煥然一新射圃與杭州府學同名宦祠祀白居易以下一十六人鄉賢祠祀范平以下一百三人社學十所在城七在鄉三仁和縣儒學在縣治北府學右咸淳臨安志舊附京庠紹興三年令孫廷直於縣治東建廟成化杭州府志嘉定五年令姚師虎建學於廟左八年令趙希言創齋四嘉熙四年尹趙與歡遷縣簿之廨以廣其基淳祐九年令李從重建嘉靖仁和縣志元至元中教諭余志賢改作明洪武三年令徐圭復闢射圃置觀德亭嘉靖浙江通志洪武十一年即西湖書院改為學天順三年徙今所魏驥仁和縣遷建儒學記巡按浙江監察御史古灤閻鼐以仁和縣學卑隘且東接按察司西連司之囹圄嘆曰此豈可為崇清廟肅弦誦之所乎乃謀之左布政使梁楘按察使曽蒙簡等咸以為然於是相地得舊貢院之址高亢為宜言於朝擇日始事委布政使檢校駱義監督杭州知府胡濬往來經營之其材則本諸舊而易以新者半禮殿五間兩廡三十間前蔽戟門外列櫺星明倫堂五間兩齋一十間下至倉庫庖湢之類凡學所宜有者無不備具肇工於天順己卯之夏六月訖工於是年之十月既落成教諭畢升請記於余夫學校實風化賢才攸繫故厯代重之學既新矣為士子者亦當一新其志去凡近進高明一以古之名臣賢相自期應時展藴上不負朝廷崇重之意下不負諸臣作興之美而後可萬歷杭州府志成化十七年同知李杲修夏時正為記正德十三年郡守留志淑嘉靖四年知縣李義壯繼修二十七年教諭陳助以廟宇傾圯言於郡守嚴寬新之童漢臣為記萬厯元年知府塗淵知縣張譽重建明倫堂馬三才為記杭州府志萬厯四年知縣梁鵬重修改建學門陳善為記國朝順治八年督撫藩臬諸司重修廟學大門移東首由府學出入康熙八年教諭鄒鐄與諸生邵泰卿構殿餘工未竣二十四年泰卿子學士逺平重建明倫堂雍正九年總督臣李衛重修射圃與杭州府學錢塘縣學同名宦祠祀許璞以下九人鄉賢祠祀王琦以下七十三人社學十所今存六所在城內海寧縣儒學在縣治東南咸淳臨安志在縣治西紹興五年令刁雍撤故老氏宫材即舊址建學胡程為記淳熙四年令魏伯恂廣之十年令陳申重建戟門等嘉泰四年令沈紡復新之鍾必萬為記成化杭州府志淳祐中令范慶重修寶祐二年令施濆建藏書室嘉靖海寧縣志元元貞二年升州學知州張圭以廟學湫隘改闢之萬歷杭州府志至正六年知州何濛修十二年教諭朱鸞又修十九年邑人賈用中捐學田夏泰亨為記明洪武二年改縣學三年知縣王忠闢射圃七年知縣朱恪修廟學建觀德亭九年知縣黃守政重建齋舍永樂十五年知縣盧質中修顧孟時為記正統三年知縣伍服修正德十二年教諭侯泰建名宦鄉賢二祠嘉靖十年知縣胡堯時建啓聖祠尊經閣饌堂四十二年知縣殷登瀛置學田四十四年知縣許天贈修董鯤為記杭州府志萬歷初學宫圮教諭張學易重建二十七年通判張汝賢新尊經閣柳希點為記國朝順治十年知縣秦嘉系教諭陸熙運訓導李芳穎重修張安茂為記康熙八年教諭金昌尹修尊經閣十五年知縣許三禮教諭謝三聘修啓聖祠五十二年貢生陳克鑑修聖殿六十一年署縣黃在瓚捐建明倫堂射圃在學北名宦祠祀朱公綽以下一十六人鄉賢祠祀顧歡以下四十九人社學二所一在學東一在學西黃岡書院在縣東三十六里明一統志宋邑人賈氏置義孰元至正間改為書院正學書院在縣治東海寧縣志康熙十三年知縣許三禮建富陽縣儒學在縣治東咸淳臨安志唐武德七年建萬歷杭州府志景雲二年重修永泰元年令崔仕元重建宋景祐二年知縣陳執禮始建廟錢禴為記紹興十五年令徐端輔重新之淳熙十二年主簿葉延年修自為記嘉泰中令范之柔復拓其基嘉定中令程珌李彌高前後重修元至正末燬於兵明洪武元年知縣楊敬重建今處十年知縣孟斌建戟門兩廡堂舍闢射圃永樂三年縣丞汪文立東西齋十一年知縣陶觀修建大成殿明倫堂日新齋東西廡櫺星門宣德十年知縣吳堂重修大成殿教諭陳興建學門改學路修齋舍𢎞治初又移廟學於西嘉靖九年推官劉望之重修龔用卿重修富陽縣儒學記富陽縣學創自國初至𢎞治初又稍移於西厯有年嵗然以其地臨大江之濵每洪水泛漲輒被淹沒重以風雨震凌悉就傾圮嘉靖九年杭州府推官劉君望之與教諭陳君針謀新之移文廟於前十六丈翼以兩廡樹之戟門門之左右列名宦鄉賢二祠前鑿小池石梁其上又前為櫺星石門門之前貿民居而闢之俯臨大江立石表於江涘扁曰仰聖興賢下聨石級廣二丈有六長倍之有半左建儒學大門進為聚英之門又進為樂育之門又進為明倫堂堂之左右興賢達道二齋堂之後創敬一亭亭之東有隙地闢為射圃亭其中曰觀德東西立號房二十楹以至庫厨庖湢倉舍之屬各有定所繚以周垣規制大備十三年按察僉事焦煜建一鑑樓十五年建尊經閣自為記四十年知縣謝中立修周美為記隆慶六年知縣劉汝昭建文明門章楷為記杭州府志萬厯三年知縣李啓十一年知縣管九臯三十二年知縣王僑崇禎四年教諭方國儒十三年知縣何吾濬重修國朝康熙二年知縣朱永盛教諭方兆日修先師廟建兩廡名宦鄉賢啓聖祠三年知縣徐啓業教諭虞士彥建明倫堂九年知縣牛奐修葺未備二十年知縣錢晉錫教諭趙嗣萬訓導楊思蟾重修大成殿建明倫堂錢晉錫為記射圃在學東名宦祠祀李濬以下二十六人鄉賢祠祀嚴光以下三十一人社學在縣東餘杭縣儒學在縣治東北咸淳臨安志宋初有廟景德三年令章得一重建廟學章得一餘杭縣儒學記得一由廷尉授餘杭令以為禮不可廢教所由興昔文翁興蜀郡范寧牧豫章皆大設學校充立政績是邑也錢氏土疆聲教遐邈至太平興國中宰邑者始撤城隍神祠塑像於中庭户喧卑几筵牢落風雨不庇藜蒿並興得一與寮寀等謀改舊貫别新儒宫役公僕以輸材就鎮城而卜地未克全繕尚多闕如邑人進士卜文舉服勤於兹龜勉不怠剞劂圬墁朴斫丹艧工善其事人無告勞十旬之內厥功告成紹興五年令范仲將徙於法喜寺基成化杭州府志淳熙六年簿范某建門設戟元至元四年達嚕噶齊額森特穆爾重修徐一清為記明洪武初知縣魏本初重建廟於縣治東按嘉靖通志亦云明初知縣魏本初復徙於此而萬厯府志則云洪武三年知縣胡伊蘇岱爾建廟於縣治東故學基四年知縣魏本初建齋舍闢射圃創庖湢縣丞韓修爵建明倫堂萬歷杭州府志洪武九年知縣梁初建兩齋十年知縣王原良建廟學未完十六年知縣史原逺繼建徐一夔為記永樂五年知縣林源重建正統十二年知縣吳鑑建饌堂教諭褚文量徙射圃天順三年知縣朱倫新廟學成化十四年僉事錢山闢學門併拓基址𢎞治七年知縣冉繼志改建明倫堂正德五年教諭林誠通建青雲樓十三年提學副使劉瑞重修廟學巡按吳華重建尊經閣杭州府志嘉靖三十年教諭李鵬舉謀於知縣周之冕遷於法喜寺基改今學萬厯三十三年教諭王琪增修自為記國朝順治三年訓導汪之涵修嚴沆為記十四年訓導孫楚如重建明倫堂十八年知縣宋士言重建先師廟名宦祠康熙二十二年知縣龔嶸重修射圃在學西名宦祠祀陳渾以下一十一人鄉賢祠祀卜天與以下一十三人社學二所一在館西一在儒學東龜山書院在縣治南續文獻通考宋崇寧末楊時知縣事有遺愛於民民請立書院祀之延師教子弟其中臨安縣儒學在縣治東南咸淳臨安志學在縣西咸平三年建後徙於縣城南紹興十六年令王傳重建孫覿重建臨安縣儒學記臨安縣舊有學在治所東南自三舍罷廢再更方臘之亂掃地盡矣而縣以春秋釋菜著於令蓋嘗改寓西郭佛舍之保錦院以祀孔子紹興十四年詔天下州縣皆立學左朝請郎知縣事王侯傳字慶長相其宫湫隘破露上無蓋障傍無師生之廬不足以稱天子隆儒重道教養多士之意乃議徙故地少西屋而垣之一邑之豪欲進子弟於學者相與圖之恐不及於是門闥覩深殿寢崇邃講藝之堂棲士之舍庖湢庫庾皆具涓日齋戒屬民之秀者陳牲幣三獻之禮禮成父老聚觀太息以為未嘗有也乃為書抵故人孫覿記之臨安在山谷中桑麻絲枲之富自足而無貧民惟侯好學知方不務出竒以立聲威而以教化禮義為標表及是奉詔修起學宫士民向化興於行誼彬彬然比齊魯焉凡為屋若干楹經始於詔下之十二月而落成於明年九月之望寶祐二年令王橚重修景定三年令家之巽建師善堂成化杭州府志明洪武元年知縣袁思謙建殿廡兩齋八年知縣賈鵬程建戟門櫺星門明倫堂闢射圃九年知縣李宗本縣丞聶源相繼重修徐一夔為記洪熙元年主簿張升重建廟殿正統五年縣丞程原慶重建明倫堂嘉靖臨安縣志景泰二年知縣李素縣丞蕭鳳陽重建櫺星門易以石柱𢎞治十二年知縣王翔鳳重建大成殿萬歷杭州府志嘉靖間知縣廖瑜闢學前路建名宦鄉賢二祠國朝順治間知縣戴祚升重建康熙九年教諭孫震修文昌閣濬泮池康熙五十八年令張淑郿教諭謝嗣暉訓導胡德裕典史顧廷標與闔邑紳襟協力重建射圃在泮池南名宦祠祀陳師錫以下九人鄉賢祠祀吳喜以下九人社學西門外於潛縣儒學在金鵝山緑筠軒下咸淳臨安志學舊在縣南崇寧間遷縣北攀龍坊紹興丙寅令何佾重修嘉泰甲子令胡衛建藏書閣寶慶初方熙重建咸淳五年令李仲熊重修按萬厯府志云咸淳五年邑人禮部侍郎趙景緯捐資重建令李仲熊贊成之德祐間令趙時祝重新之成化杭州府志元至元間主簿李霖按縣志作趙霖重建明倫堂吳度為記二十九年江浙行省參知政事董摶霄修萬歷杭州府志洪武二年知縣梁誠重建於縣西十年縣丞趙義遷於攀龍坊之右𢎞治十六年知縣嵇鋼重建嘉靖十五年教諭陳鐸復遷攀龍坊故址二十六年署縣事衛經厯濮效建青雲樓為外門汪心為記於潛縣志嘉靖二十七年教諭夏汝礪徙樓於堂北名尊經閣自為記二十八年按察司僉事謝體升移名宦鄉賢祠於廢學基黃珦為記杭州府志萬厯四十一年御史李邦華遷於金鵝山崇禎間知縣金性和遷啓聖祠於西齋故址國朝康熙二年教諭屠夀徴建明倫堂九年知縣趙之珩移學基於右王之臯為記射圃在明倫堂西名宦祠祀刁璹以下七人鄉賢祠祀章成緬以下六人社學在縣西新城縣儒學在縣治東北咸淳臨安志學在縣東唐長夀中置宋乾道四年修徙學門西面崤峯成化杭州府志紹興中令陸演重建孫清為記萬歷杭州府志乾道中令耿秉紹興五年令劉景修重修錢厚為記慶元六年令唐大本增置學田于柔為記端平間主簿謝夢生又加繕治自為記元至正末燬於兵明洪武三年知縣徐弼重建按嘉靖浙江通志作徐夔知縣李可立繼成之正統十一年知縣張杲教諭陳光重建明倫堂景泰元年杲重建廟廡戟門櫺星門泮池石梁神厨宰牲所三賢祠𢎞治五年知縣林著重建明倫堂嘉靖二年教諭陳希登新之邑民助建櫺星門戟門書庫祭器庫三賢祠何瑭為記五年助建東西廡儒學門十七年訓導唐堯儒請於巡按周汝員遷廟學於多福院地吳鼎新城縣遷建儒學記新城為杭下邑洪武十年建學於縣治東偏地隘堂序不足士無弦誦之舍前臨大壑岸善潰築障無已蓋百六十年於此矣嘉靖十有七年春訓導唐堯儒以諸生言白於御史吉水周公曰邑中有應毁淫祠曰多福院其地高塏正方以學較之僅五之一茍捐數載防壑之費舉此遷彼不勝大願周公如諸生言亟下諸縣當是時縣乏長吏或沮以浮言訓導乃會邑中父老告之故諸父老曰吾有子弟教之而不為之所敢煩有司請相與經營分役蓋僅僅草創而己未幾教諭曽廷梅至白於侍御應山傅公使經歷朱淵亟往相度凡百役經費務終厥功經厯奉令惟謹議鬻故學地及縣官棄地取其直益以贖刑之金為築作費會灊山聶瑩為令以學事為己任於是即浮屠之宫以祠先聖先賢中為四楹東序八楹西序八楹前重門門之南鑿泮池宫左明倫堂四楹東西齋如之前儀門後講堂堂之後尊經閲亦皆四楹其東北隅為啓聖祠又東敬一亭亭之南為射圃亭傍列諸生房凡三十號前竪稟庾官師異館庖湢潔清是役也訓導實倡厥始而聶令克成厥終焉十八年冬十一月落成四十四年郡守毛鋼通判薛璠知縣廖詔增修方亷為記杭州府志崇禎五年知縣吳徴芳遷於縣治東北黃山下國朝康熙八年訓導盧懋藴建繪雲亭三十二年教諭毛士儀四十五年知縣陳騰章五十六年知縣黎陳錫教諭吳光庭訓導陸廷梴雍正六年知縣羅爌教諭沈堂訓導徐綸揆相繼重修羅爌改建文昌閣九年沈堂别建新閣祀文昌而以舊閣為尊經閣李清植新城學尊經閣記學之有尊經閣所以儲六籍資講肄也而御製聖訓暨欽頒御纂諸書咸敬謹藏奉以時宣講俾諸生服習於此為典甚巨新城縣學明倫堂後舊有閣祀文昌之神而尊經閣獨闕焉雍正七年教諭沈堂既修學宫復創一閣於學之東偏移祀文昌而以舊文昌閣聖人為尊經閣倚山橫阜聳然傑峙於霄漢之上使之言昭然如日星之麗天所以尊之者至矣射圃在敬一亭西名宦祠祀耿秉劉秉二人鄉賢祠祀許逺以下四人社學在縣東昌化縣儒學在縣治東咸淳臨安志熙寧中建乾道八年令卞圜始增廣淳熙七年令錢孜改卜故饒氏園重建按杭州府志云學建自唐宋熙寧中建廟而學未建元祐中遷廟於鼓樓外又遷於尉廨西紹興中遷於南門內乾道中令卞圜復遷於熙寧舊基淳熙七年令錢孜始改卜故饒氏毬場園地建廟及學陳居仁為記成化杭州府志元至元庚寅燬惟藏書閣存延祐中達嚕噶齊義德寧國禮更名尊經閣至正末燬於兵嘉靖浙江通志明初知縣李質重建萬歷杭州府志洪武六年知縣王剛中建堂暨齋舍十年知縣李􅰖拓地重建廟殿併新門廡齋舍正德十六年知縣王升重修嘉靖十六年知縣方鋐復新之二十三年知縣塗勳重建昌化縣志嘉靖四十一年署縣事臨安縣丞李朝陽徙建明倫堂於文廟後華文甫為記杭州府志隆慶五年知縣周易重修王文科為記萬厯十七年知縣周洛都重修陶懋欽為記三十八年國子生陳灼重建廟學國朝康熙十六年知縣周頌孫建騰蛟起鳳二坊射圃在學西名宦祠祀趙希以下七人鄉賢祠祀陳斗龍以下五人社學二所一在下余村一在府館西浙江通志卷二十五
