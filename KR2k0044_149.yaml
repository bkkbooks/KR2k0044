body:
  text: 浙江通志卷一百五十名宦五嘉興府三國吳步騭吳志本傳字子山臨淮淮隂人孫權召隲為主記除海鹽長還辟車騎將軍東曹掾黄武五年權稱尊號拜驃騎將軍領冀州牧上疏曰郡守百里各得其人共相經緯庶政豈不康哉竊聞諸縣並有備吏小人因緣衘命不務奉公而作威福無益視聽更為民害可一切罷省權采其言多䝉濟賴赤烏九年代陸遜為丞相嘉興府志隲長海鹽性寛雅博研道藝訓齊風俗晉鄧攸晉書本傳字伯道平陽襄陵人元帝時吳郡闕守帝以授攸攸載米之郡俸禄無所受唯飲吳水而已時郡中大饑攸表賑貸未報乃輒開倉救之在郡刑政清明百姓歡悦為中興良守後稱疾去職太寧二年遷會稽太守高使君𢎞治嘉興府志逸其名建武中為嘉興監屯田校尉領兵三千屯田於此久而鎭静歲遇豐稔公儲有餘有功德於民立廟祀之鮑陋萬厯嘉興府志隆安中任海鹽令會稽賊孫恩攻縣陋禦之恩走復遣子嗣之以兵一千為劉裕前鋒追恩裕慮吳人不習戰命之後嗣之竟前戰死南北朝劉霽冊府元龜字士湮平原人天監中為海鹽令以和理著稱徐份陳書徐儉傳份陵之子有父風解褐為祕書郎累遷太子洗馬出為海鹽令甚有治績唐趙居貞嘉興府圖記彭城人天寶九年吳郡太守以嘉興海鹽地廣奏割華亭縣又海鹽多盗置海寧鎭節束之朱自勉嘉靖浙江通志為嘉禾屯田都知修水利畎畝之政民始殷冨大厯間為長興令士民頌之如嘉禾李諤唐書地理志長慶中令海鹽開古涇三百以禦水旱海鹽縣圖經諤爲縣令察俗利病引河流資灌溉民到今利之嘗於西郊立望城館張祐過之題詩宋桞植宋史本傳字子春眞州人舉進士甲科為大理評事遷著作郎知秀州擢知制誥求知蘓州徙杭州累遷吏部侍郎植平居畏慎寡言笑所至官舍蔬果不輒採家無長物時稱其亷王恕萬厯嘉興府志深州饒陽人開寶中知秀州盗起城䧟殺恕其子濟方丱角賊刀脇之濟伏尸號慟曰父死吾安用生恨不能殺汝報仇耳賊義釋之官軍至濟謁帥陳討賊計帥賜束帛聞於朝假驛以歸後以死事孤試學士院補官劉師道宋史本傳字損之一字宗聖開封人舉進士厯祠部員外郎出爲京東轉運使咸平四年擢樞密直學士坐事謫降以郊祀恩起知秀州師道敏於吏事所至有聲吏民畏愛加樞密院直學士羅拯宋史新編字道濟祥符人第進士厯知秀州諸所興革民便之加天章閣待制李餘慶王安石李餘慶墓誌字昌宗家於福之連江起家應天府法曹㕘軍知湖州歸安縣後通判秀州州近鹽塲餘慶作華亭海鹽二監以業盗販之民歲入緡錢八十萬又爲石堤自平望至吳江五十里以除水患錢藻萬厯嘉興府志字純老和州人進士大中祥符間判秀州善持法擊奸仆强郡中大治終翰林學士魯宗道東都事畧字貫之亳州人舉進士為海鹽令縣治東南舊港口導海水至邑下人以為利號魯公浦仁宗即位除龍圖閣直學士拜為諌議大夫㕘知政事遷禮部侍郎贈兵部尚書諡肅簡龎籍宋史本傳字醇之單州武城人及進士第爲黄州司理㕘軍知州夏竦以為有宰相器為刑部詳覆官久之出知秀州景祐三年進天章閣待制爲樞密副使改㕘知政事拜同中書門下平章事以太子太保致仕諡莊敏籍曉律令長於吏事持法深峭治民有惠愛蘓袞萬厯嘉興府志武功人皇祐間知嘉興文學吏治皆有聲稱聶厚載𢎞治嘉興府志皇祐中知秀州攘敝活疲邦用熙靖以循政聞李惟幾𢎞治嘉興府志字幾道河内人嘉祐中為海鹽令時方洊饑會漕使元絳行郡李上書乞啟郡帑假官錢貸民糴種濬治溝洫以備水旱又植木爲閘及置鄉底堰三十餘所民賴以稔葛宮宋史本傳字公雅江隂人舉進士授中正軍掌書記知南充縣以惠政聞徙知秀州秀介江湖間吏為關涇瀆上以徵往來間有昏葬趨期者多不克宫命悉毁之積官祕書監太子賓客轉工部侍郎范世京嘉興府圖記字延祖吳人文正公孫進士熙寧間令海鹽勸民孝友力田治聲冠浙右時新法行召至京將用之以論不合還治民歡呼相迎尋以疾乞休詔進祕書丞高覿宋史本傳字會之宿州蘄人進士爲嘉興縣主簿累官集賢院學士萬厯嘉興府志覿為主簿謙已愛民有循吏風韓瓘萬厯嘉興府志字德全開封人㕘政億之曾孫元豐間知秀州蒞官敏鋭事無壅滯吏不敢欺人稱有忠獻家法高元常晁補之高元常墓志字復明世家符離用恩爲將作監主簿徙嘉興丞嘉興劇縣令不任事則求持檄出旁郡訟牒如山元常暫領其事一朝剖遣立盡先是佃戸靳輸主租訟由此多元常揭而書之曰田人田嗇其入權且奪田民競往償訟於是衰守吳安世黷貨私委令市竹元常語令毋受令阿安世飫其欲後安世繫獄令欲告之元常曰前戒君母受受而告之可愧後轉奉議郎喬大臨𢎞治嘉興府志政和三年為海鹽令時平江朱勔以花石得幸浙江之西一花一石不問何人家朱氏蒼頭排闥而入以黃紙封之戒主人曰善䕶御前物蒼頭至海鹽入僧房將盡封花石僧徒少拂其意即箠之訴於縣大臨命追逮杖十餘人朱氏誣劾之坐是罷免宋昭年𢎞治嘉興府志宣和間知秀州盗發嚴州昭年謂吾州次當受敵於是大修城隍明年賊果抵城下昭年與民乘城自固賊畱三日無敢薄城者朝廷嘉其功進職鄧根𢎞治嘉興府志字深伯昭武人建炎初知崇德縣有風力高宗南渡陳通叛於杭根率揮杖手鮑貽遜與戰辛道宗軍潰賊勢益張根善射有勇畧卒誅通次年徐明叛根討平之代程俱爲知州黃灝嘉興府圖記字高昌都昌人進士建炎中知秀州兼提舉浙西常平州大饑莩殣相望時有停閣夏税之旨灝乃更請併閣秋苗不俟報遽行之言者罪其專削兩秩而從其請人尸祝之趙士醫宋史趙士嶐傳士醫任秀州兵馬都監建炎四年兀术入州士醫乗城拒戰城䧟死之後贈武翼大夫朱良續文獻通考字良伯吳郡人仕海鹽尉時金人分兵入境良集射士百餘奮而前力不敵竟死事聞官其子思孜等姚憲海鹽縣圖經字令則剡人以父任補海鹽丞惠利及人後知秀州王豪錢安國舍匿亡命為奸盗州縣莫敢詰憲擒之并其支黨悉置於法焚其巢穴州里遂安浙西大水民饑憲請輸粟萬斛以賑朝廷賜書奬諭累官叅知政事邱耒嘉靖浙江通志字少潛常熟人紹興中知海鹽治學宫築海堤二十里民有宿逋檢縣藏得羡餘悉為代輸郡有疑獄一時平反徐光實海鹽縣圖經字德充晉江人進士紹興間知海鹽清白慈愛歲旦輒縱囚歸省吏恐亡去囚輒如期至無敢脱者丁安義海鹽縣圖經紹興閒爲海鹽丞値歲旱詔復民租十之八而和糴尚未罷安義語令曰歲饑常賦且減不應復有和糴即上官怒安義請以身當之檄屢下抗諭反覆卒賴以免唐璘嘉靖浙江通志字伯玉古田人紹興間爲監察御史出知嘉興府政通人和及去父老出涕遮送數十里不絶官至太常卿張琯陸游張琯墓志字子律寧州真寧人知嘉興府中貴人藍氏殖產於崇德縣名田過制而役不及有鍾淳者糾之藍迫期去產以規免官吏欲許之琯判曰兩家物力相去遠甚而藍又白腳必如法乃可一郡稱快民張瑨得臨安營妓與之歸欲棄妻出子其兄止之復悖兄兄以告琯為逐妓以大義開諭之於是瑨兄弟夫婦父子如初丘崈宋史本傳字宗卿江陰軍人隆興元年進士遷太常博士出知秀州時華亭縣捍海堰廢且百年鹹潮歲大入壞並海田蘓湖皆被其害崈至海口訪遺址已淪没乃奏剏築三月堰成三州潟鹵復為良田除直祕閣升龍圖閣移帥紹興府寧宗即位知慶元府陞寳文閣學士刑部尚書同知樞密院事諡忠定汪彦端萬厯嘉興府志字充之黟縣人乾道己丑廷對第三人厯知秀州時有勢戸占田數千畝不輸賦彦端責其輸而以田歸之民李大卞𢎞治海鹽縣志乾道中為海鹽令縣境有常豐二閘歲久僅存其一日就隳壊大卞重修以復其舊且置堰以通往來民便之徐蕆萬厯嘉興府志字子禮吳人進士初知江隂軍厯浙東提舉常平乾道末知秀州以文章飭吏事無苛猛之政吏民舉安李陟嘉興府圖記字允昇内黄人進士厯殿中丞令嘉興强果辦治遺愛為人所思韓彦質嘉興府圖記淳熙中守嘉興遇事精敏無阿私奸猾畏憚政既成優游撫馭郡以無事吳柔勝萬厯嘉興府志字勝之宣州人淳熙進士為伊洛持敬之學丞相趙汝愚知其賢將寘之館閣乃權差嘉興府敎授日切磨諸生講學不怠浙右大水常平使委以荒政竭力推行多所全活會汝愚去國罷後知太平州加祕閣修撰李直養𢎞治海鹽縣志字無害維揚人紹熙元年為海鹽令興修水利增置鄉底堰八十餘所重葢閘屋易閘板自是農被其利黃幹宋史新編字直卿閩縣人受業朱熹遂以其子妻幹寧宗即位補將仕郎監台州酒務調嘉興府石門酒庫厯知安慶府諡文肅正徳崇徳縣志石門酒庫前此庫官多武夫子弟為之既律身不亷而吏恣為姦官酤醨薄私釀横行故積負上司錢以萬計幹既至以官本錢自往市米於產米之地凡纎悉必躬親雖隆冬烈暑不憚也歲入霈然或謂瑣瑣者何足以煩君子幹笑曰孰非公家事耶在官申酒庫利弊見於諸劄陳仲微宋史本傳字致廣瑞州高安人嘉泰二年舉進士遷海鹽丞鄰邑有疑獄十年郡命仲微按之一問立決知贑州江西提㸃刑獄迕賈似道罷德祐二年遷祕書監尋拜右正言左司諌殿中侍御史彭欽嘉興府圖記字仲恭清江人嘉定間以父廕授軍器監主簿添差嘉興通判監司表其亷平皮龍榮宋史本傳字起霖一字季遠潭州醴陵人淳祐進士遷著作郎入對因及眞德秀崔與之亷龍榮曰今天下豈無亷者願陛下崇奬之以風天下執賞罰之公以示勸懲帝以爲然兼兵部郎官差知嘉興府召赴闕遷侍右郎官景定二年拜叅知政事舊浙江通志龍榮知嘉興德政著聞朱炎萬厯嘉興府志字叔明吳人寳祐初尉海鹽廉恕决獄平郡帥多屬以事元高仁黃溍高仁墓碑字壽之世居無棣縣少以材推擇為吏會元兵南伐署招討司提控案牘厯萬戸府知事改江浙行中書省檢校官尋擢工部主事復入江浙行中書省爲左右司員外郎授嘉興路總管府治中時列郡方祠奉帝師凡庀材用召匠傭一出於民力仁獨諭浮屠氏之籍於白雲中者俾任其役官無一粟之耗民無半餉之勞而祠事以儲部使者以最聞辛仲寶嘉興府圖記字仲和彰德人大德初守郡政事修明興利舉廢悉中民情鄭大中虞集鄭大中墓碣字義甫除嘉興路推官嘉興浙大郡獄尤夥大中决遣之數月乃至無事貢師道萬厯嘉興府志字道甫宣城人舉茂才累遷國史院編修會修宋遼金史忤當事出爲府治中上下憚其亷明褚不華元史本傳字君實石樓人沉黙有器局泰定初授海道副千戸轉嘉興路治中萬厯嘉興府志政事精明奸猾屏息傍郡寃滯者多赴訴之後為淮東亷訪副使守城城䧟死節追封衛公諡忠肅盧禮𢎞治嘉興府志字仲敬太平人至順元年知崇德州時旱澇相仍民多流離禮捐米賑濟州境宴然杜浦劉貞嘉興府圖記浦嘉興府總管勸農桑除民疾苦振興學校教化大行後有劉貞撫循鰥寡愛民造士有浦之風陳伯顔嘉興府圖記字大有睢州人至正問尹嘉興時兵興征調繁苛伯顏勸率巨室寛假貧窮細大無擾而事亦辦給禁暴戢奸邑賴以安王雍正德崇德縣志字元肅至正二十年任崇德州律已公亷臨事明敏遷改儒學建明倫堂及東西齋陞蘓州府同知陳春𢎞治嘉興府志爲嘉興路推官有能聲至正中民販私鹽事覺牽連千餘人獄久不决春往治之即得其情釋被誣者數百人闔境稱為神明時久旱至是雨號陳公雨石光著明一綂志字仲明海陵人至正間爲嘉興尹多善政士民立碑頌德陳良弼嘉興府圖記字公輔寧國人至正間嘉興路學教授律身敎人皆存古道一錢斗粟不入私室修葺學宫經費鉅萬以屬良弼良弼辭非儒官所預守益賢之明薛祥嘉興府圖記字彦祥無為州人洪武初為工部尚書數直言全活人以千計丞相胡惟庸惡之左遷北平布政使有惠愛謫守嘉興愛民節用稱為循良惟庸誅召入復爲工部尚書魏誠嘉興縣志河東人洪武初為嘉興丞鎮撫新附之民興舉學校撫字有方一時名士皆其造就查覆戸籍之隱匿者三百餘家遷戸部郎中謝天錫萬厯嘉興府志字純父吳縣人為嘉興簿明初羽檄交馳傳使所經科索繁重天錫優柔處之民孚事集兵後田多荒蕪勉有力者墾之繫囚病疫為湯藥饘粥以濟有殺人情眞而未獲尸久繫稱寃天錫亷得之囚具服民稱神明趙豫明一統志嘉興府推官讞獄平恕郡有貧民搆訟繫獄久之餽餉屢絶豫審其情縦使就食民亦感服不忍逸去鄭深道舊浙江通志龍溪人洪武中視兩浙鹽運使司獄亷得數人非其罪出之比還其人各懐白金尾舟以謝深道却之授程鄉縣敎諭改嘉興秩滿遷寧波府學敎授畢輝齊摶石門縣志輝洪武中知縣事摶為丞協恭爲政有旗軍小劉以公幹來自京師直馳甬道械繫以聞上嘉之遣行人齎勑勞之曰爾在官執法不容姦慝較諸有司可謂出衆特勞爾醴酒其竭心力以光初志輝爲政尤重風化龎安萬厯嘉興府志洪武中通判嘉興是時鹽禁殊嚴安獲鹽徒械送京師而以鹽賞捕獲者戸部以安違例取罪狀安上書曰律者萬世之常例者一時之㫖今欲准例而行則與給賞應捕之律相違而使陛下失大信於天下也上是其言劉燾江南通志字尚載太湖人洪武貢士任桞州知府厯嘉興寧波咸有政績舊浙江通志永樂中移守嘉興慈祥愷悌不任威刑郡人愛之戴􅒐獻徵錄字士儀浮梁人永樂甲辰舉禮部乙科授順德府學訓導調嘉興府哻病文勝先行檢重經術故士多實才而哻亦以績最進德清縣敎諭一新學政士不舉凡十科自是舉者不絶父喪服闋改慈谿縣士恨得􅒐晚秩滿擢敎授再蒞嘉興學者益衆有富民數輩遣養子入學􅒐不可民賂按察官彊􅒐􅒐執愈確坐是忤意竟以他事去􅒐意識所到輒抗言高論不嫌越職杭湖諸府漕倉去河遠奏徙之嘉興吏胥時被繡乘馬觀海諸衛進表牋多不如制皆奏禁之齊政萬厯嘉興府志山陽人進士永樂中知嘉興府時徵役鑄錢民苦妨農政乃分爲三畨使得更代迄役而民不知勞上官廉𢎞治海鹽縣志江西南豐人舉人永樂十三年知海鹽縣公平正直和易近民殁於官歸葬之日民有執紼號泣者蔡楫獻徵錄沛縣人舉孝廉為嘉興知縣初至官出滯囚二百餘人勸率富民納逋糧四十八萬有奇縣多亡賴楫於縣㕔置善惡二牌民有善則志之有過惡弗率敎令亦志之由是民感媿皆趨善而去惡擢監御史陞浙江僉事趙緯嘉興縣志字大經洪熙改元以浙江憲副謫嘉興典史遇事剛决縣無畱事吏部侍郎黄宗載以清軍行部至嘉興苦籍伍漏匿軍民訟訐積年不清首以委緯宿食於外定條約絶請託不數月籍成檄諸縣視以為法傅霖嘉興縣志字佐時貴溪人宣德初任嘉興縣丞督徵有法賦完為諸邑先勤於幹辦邑無廢事陞東平知州楊懋嘉興縣志四川人宣德三年任魏塘巡檢地當松秀要衝有中使夜過舟重命懋括民挽舟懋怒畱其舟將搜閲其行裝中使恐易小舟去有鹽徒販鹺白晝行刼懋率兵追捕縳渠魁下獄梟市當道上其功遷主簿及嘉善分邑相土度宜其力居多生用和桐鄉縣志蓬萊人國子生宣德五年桐始分縣用和為令經營草昧凡衙暑城郭一切所為俱得其要領民皆樂從聶如斌正德嘉善縣志豐城人宣德十年爲嘉善縣典史綽有能聲遇難事輒命理之無不濟者職董水利廣築堤防常潛乘小舸察民勤惰而行勸懲未幾境内大水憲臣驗荒者意有齟齬如斌即自投田間水深没頂憲臣動容民得免税又以北鄉田久荒民苦賠輸為之區畫督民高其岸塍以備水患民皆賴之黃懋分省人物考字子勉元氏人永樂乙未進士累官嘉興知府力除宿弊盗息賦均尤篤意學政好賢樂善有古循良風後遷福建左布政使舊浙江通志正綂中知嘉興築捍海堤建濟衆倉繕完澉乍二城李遜𢎞治嘉興府志字時敏江西南豐人由進士知嘉善縣性機警諳達下情民不能欺秩滿將行上官徇民之畱奏陞六品俸仍掌縣事陞廣東亷州知府黃憲𢎞治嘉興府志萍鄉人由貢生正綂十三年知秀水縣聽訟詳明善撫字期年之間民風丕變次年領民壯討處州冦葉宗畱死於行陣民咸惜之汪貴正德嘉善縣志字良貴歙縣人以進士知嘉善愛民如子汰無名之費凡數十萬錢朔望必造學講授寒暑不廢爲人簡黙短於應對不爲當道所容送部調用瀕行囊篋蕭然畱者數千人王端𢎞治海鹽縣志字宗正直𨽻河間人由監生正綂十四年任鹽令勤愼亷平苞苴不行刑罰不濫景泰五年朝覲還卒于途聞者莫不嘆息田玉桐鄉縣志字德潤四川内江人國子生正綂中知桐鄉勤恤民隱時閩浙盗起軍需繁重玉寛假奬率貧富適宜民用不匱以艱歸父老上疏乞畱服闋復任與民益親六載陞知瑞州府舒敬萬厯嘉興府志字守中靖安人進士厯守嘉興能燭吏民情偽篤意教化營郡縣學課諸生以道術燕語從容咨訪得失忤鎮守中貴坐免郁綸正德崇德縣志字理之德州人由進士景泰六年任崇德時縣署廢久綸自學校壇壝街巷河渠市肆之𩔖悉規畫繕理大盗章正等為患設方略擒之民賴以安性剛直忤當道罷去鄧玭萬厯嘉興府志順昌人國子生景泰中桐鄉丞有公清勤慎之操滿任如一日李翥天啟平湖縣志東光人成化間任平湖時周家涇併獨山海塘衝塌鹹水浸入民田翥奏乞將在官折贖納米銀計工修築從之郭珙萬厯嘉興府志字元圭閩縣人進士成化中知秀水練達吏治洞悉民隠暮夜有投金者亟捕之不獲暴其金於市孟俊桐鄉縣志字世傑咸寧人舉人成化中知桐郷亷明有胆畧理棼剔弊敬老恤孤威惠並著尤加意學校召為監察御史厯布政司叅政譚秀嘉靖浙江通志江西龍泉人成化中知海鹽縣先是海塘修築役七邑民夫爲陂陀形易圮秀僱役改築植椿叠石稍殺其外以禦潮水自此無患梅清萬厯嘉興府志字本潔大足人由國子生為平湖丞催徵餘日佐其長以廣治化或權借旁郡按獄治海隄所至輒有茂績徐霖舊嘉興府志字用濟金谿人成化中知嘉興府夏旱霖具題減賦中有齟齬再三申請卒得蠲免桞琰萬厯嘉興府志字邦用儀眞人進士𢎞治初守嘉興亷愼淳確政有條理後病劇僚友傷其廉悉索琰在郡所積羡贖得銀若干請以歸之琰曰吾豈以埀盡易守哉言畢而逝郡故無志琰輯之王緒正德嘉善縣志字紹夫江西樂平人為嘉善學訓導嚴立敎條盡心啟迪時學就傾圯緒不請有司勸鄉之尚義者集助金建學門構庫舍梵石闌新聖賢之像飾祭祀之器營為皆有程式擢知忠州湯沐分省人物考字新之江隂人𢎞治丙辰進士知崇德崇德政積弛至則裁決無畱務亷問民間利苦罷行之流愛於人徵拜監察御史巡撫四川厯官清白殁之日家無餘財王昊嘉興府圖記字汝欽衡陽人進士𢎞治中知桐鄉除田糧詭欺之弊修舉廢墜以亷介有為見稱召為監察御史劉子厲嘉興府圖記字克温安福人進士𢎞治中知嘉善亷敏精悍斷獄律比銖兩重輕皆自其手胥吏奉成案而已政雖尚嚴中實慈惠操履清白不爲勢惕召爲監察御史王璽海鹽縣圖經字仲信廬陵人進士𢎞治十二年知海鹽外剛内和以文章飾吏事新縣治興廟學築海塘捍海砥方石縱橫相制尤為得法人呼爲龍王廟前様塘擢知德慶州李廷梧桐鄉縣志字仲陽莆田人進士𢎞治十三年知桐鄉遇事迎刃立解吏不能爲奸脩學校平賦役正祀典平聽斷文章政事一時稱美召為監察御史陞大理寺卿藍郁正德嘉善縣志字國馨鹽城人進士知嘉善操履清白愛民好士為政以厚民風俗袪民患為急民有訟者以義言動之不俟刑罰而自無不服何天衢獻徵錄字道亨世居營道之瀟川𢎞治丙辰進士授嘉興令縣多豪右天衢至誅悖逆戒嚚訟治圯族恤煢尫緩逋役六載績用丕彰拜監察御史晉工部右侍郎洪範嘉興府圖記字邦正金谿人進士𢎞治末知嘉興縣初至三月如不事事者及編差糧長呼里書集庭中申令曰聞審此役多集人廢時日致多嚇取人今每區只用里老二人敢有妄舉里老為代役母貸庭中肅然皆以實舉盡日而畢里老皆曰自耳目所聞見審此役不擾而辦者獨此令耳終範之治吏畏民懷縣以無事召為監察御史終提學副使任洛桐鄉縣志字仲伊河南釣州人由進士正德初知桐鄉明敏公亷修舉廢墜輯桐鄉志以憂去行李蕭然厯都御史王德明嘉善縣志字宗周直𨽻清苑人正德進士知嘉善縣持法平允吏不能欺當道移文有不便者黙寢之尤禮貌諸生文治武備具有成畫累官山西巡撫陳伯諒正德崇德縣志字執之福清人由進士正德六年任崇徳政尚簡嚴凡學校公署敎塲多其修建措置有方民不知擾抑豪强禁健訟在任三載境内肅然擢河南道監察御史洪異萬厯嘉興府志字大同龍溪人由舉人正德八年知崇德盡心民力多所建力嘗鑿闕長河灌田新學校置義塚修建橋梁皆計久遠擢御史時典史李滋宜興人亦廉能稱任使異舉善政輒佐之李錫正德嘉善志字天祐河南登封人為嘉善主簿剛介有為正德癸酉江西姚源盗起錫應選率民兵往禦奮勇直前斬獲盗首力窮爲賊所得錫罵不絶口遂遇害事聞贈本縣知縣陳相嘉靖浙江通志洛陽人正德中知崇德縣爲人剛果時中貴用事其黨至邑者賂遺之相獨不爲禮一切裁抑巡按廉得其狀有不畏彊禦之稱徐盈萬厯嘉興府志字子謙貴溪人正德時守嘉興時常熟濬白茅港當事者檄發郡丁數萬盈曰白茅水患於吾郡差緩驅我民逺役何忍即移文助費不就徵發巡鹽御史行郡鞭撾亭竈勒報鹽丁里胥乘機虐民盈爭之御史曰此有例盈曰例自公作亦自公止豈國憲耶獲止又加意學校士皆興行李伸萬厯嘉興府志字道甫三原人進士為監察御史出守嘉興言笑不茍對吏民不怒而威有大豪侵官錢事覺在繫奸利益甚伸令并收其子子聞胆破有殺兄謀奪其官者不具輸狀伸一訊即服去郡久士民頌思如一日伍文定萬厯嘉興府志字時泰松滋人進士正德中為嘉興府同知時流賊猖獗練兵訓士爲防禦計民以無恐後官至兵部尚書孟津嘉興府圖記字有涯信陽人正德中以御史左遷同知嘉興莅官清白不事矯飾官終南京大理卿郭田舊浙江通志長安人正德中知嘉善堅持氷蘗人有餽遺輒峻拒每見解銀指謂左右曰此能亡身敗家爾等毋為所汚時有上書陳其過者即榜之縣門引以自責吕湯民海鹽縣圖經南河人正德中爲海鹽丞事母至孝為政清平卒於官歸無行資張濓海鹽縣圖經字景周薊州人正德中以進士知海鹽涖政三年民歌之曰前堂無吏人後堂無優人堂下無犯人擢監察御史王學孔萬厯嘉興府志安福人進士嘉靖初守嘉興時旱蝗相仍齋戒步禱甘雨時應歲復疫癘乃大洗犴狴又爲發粟賑饑全活甚衆聽訟從未嘗妄撻一人至豪右有權力者毫不假借遷湖廣副使蕭世賢江南通志字若愚桐城人𢎞治進士守嘉興歲革羡金十餘減織造様絹三百餘匹立三館以造士文風蔚興監司上其治行第一擢湖廣副使何天啟萬厯嘉興府志字義占江西貴溪人嘉靖十一年進士令嘉善前此訟多停寢天啓至三日一聽剖决無畱勾攝不遣吏卒民無騷擾値歲潦力請蠲税竟爲當道所阻乃以贖鍰抵賦由是益得廉譽張守約萬厯嘉興府志字彦博華容人嘉靖中進士知崇德縣為政務舉大綱崇學校端習尚摧强撫疲豪右惕息興傳貽書院復樹先達諸坊表陞大理評事去之日惟圖書數篋而已洪遇舊浙江通志厯城人進士嘉靖中知秀水先是民覬輕役多析戸寄産遇令民自疏歸併賦均而不擾歲大饑自鬻者衆不待上聞亟發廩賑之全活者無算曾曙天啟平湖縣志字暘谷桂林人由舉人嘉靖甲辰除平湖令性介不妄取與剔蠧除奸與民休息歲大饑殍殣相望曙力請出粟賑之復廣設粥以食饑者會催徵甚急毅然曰吾職可罷民不可毒有逋税者咸使歸業弗之繫民免轉徙竞以緩征罷去張海鹽縣圖經字鵠舉泰興人進士以諫武廟南巡廷杖後起海鹽令為政得大體民困征役至減十之五陞湖州同知官至戸部侍郎楊挺高萬厯嘉興府志字叔謙山東金鄉人進士嘉靖二十八年授平湖知縣性狷介督家人紡績種蔬自給以菜饋士夫曰不可一日不知此味排里供費一切裁省在任三年冰蘗之聲聞於逺近趙瀛萬厯嘉興府志三原人進士嘉靖中知嘉興府禁賭博逐娼妓疏濬城河以其土運之南湖建烟雨樓時田糧多則吏胥緣而爲奸乃分田地山塲爲二則賦額均平百世賴之又修郡志陳松舊嘉興府志青州人嘉靖中進士以御史左遷秀水令刻意爲民鋤强扶弱邑有柄臣子弟奴𨽻橫甚松裁抑不少貸遷平凉同知陳道基萬厯嘉興府志字以忠晉江人進士嘉靖二十九年知嘉善初下車悉籍里中惡少嚴行苛校重困辱之仍詳申請有犯必懲故事日輪里長一人所費不闕道基酌一年公用之數通融計𣲖有逋負鬻妻孥以償者輒爲代補間有窮民困迫請借公用餘銀以自活隨數給之民無負者三年未嘗入一重辟囹圄幾空劉慤萬厯嘉興府志字致卿萬安人進士嘉靖辛亥守嘉興時値夏旱慤率僚屬拜禱赤日中不懈卒得㴻雨歲大稔癸丑倭冦侵境率軍民防守每冦至洞啟四門納郊闗男婦多所全活且身自出城激勵三軍以致大㨗時撫按交集視師新置督察大臣供億百出慤殫力承事無擾於民其經營平善崇桐四城委曲調停民不知費舊額瀕海歲貢費魚以兵興特疏停免至亷介之守終始不渝王應顯萬厯秀水縣志漳浦人進士嘉靖二十九年知秀水攻苦茹淡時倭冦患亟應顯與郡守劉慤合謀守禦日給糧餉治器械撫循士卒夜巡行城壘無頃刻息肩士女避冦從田間來以萬計監司令繇女牆縋入母啟門應顯泣曰民衆縋者寡賊猝至盡捐鋒鏑耳竟矯令啟之皆得入入甫畢而倭薄城無一遇害者厯官太常卿鄭茂萬厯嘉興府志字士元莆田人進士嘉靖三十二年知海鹽有應變之才倭冦擾境盡力守禦克完民社擢兵科給事中金燕分省人物考字尚賓潛山人進士嘉靖三十三年知桐鄉始涖任倭冦圍城盛爲攻具以計禦之城得全補禮科給事中張師載嘉興縣志字以道潛江人嘉靖進士知嘉興縣政務寛大會編里甲委曲調停使富貧適均先是以海寇殺掠人情洶洶思遁師載曉以去止禍福民安如堵廉介自守行囊蕭然擢給事中終巡撫都御史殷廷蘭萬厯嘉興府志廣東人嘉靖進士授嘉興理刑每聽訟詳審精密郡無寃獄會署平湖事倭冦猝至僅隔一水時未有城廷蘭令為疑兵以却賊晝則揚兵夜則列炬舟卒市人聲應若十萬師賊駭遁百姓歡呼相賀廷蘭曰是倖也不可以再亟申請為城以守經畫措置盡得其宜郭東舊嘉興府志字仁府高平人嘉靖進士知嘉興縣凡遇訐訟每爲和解不事鞭朴催徵尚寛恕亦無逋負以艱去劉存義天啟平湖縣志字漢樓襄陽人嘉靖癸丑進士知平湖邑受倭患尤劇始議城守存義至旦夕負土築埤埤成而倭至雉堞屹然倭不能上悉力來攻存義擐甲援枹立矢石下倭見堅守遣酋至城下祼衣跳詈欲激戰手弓射之應弦而倒倭大驚解圍去總督胡宗憲率師數萬屯城中土漢交雜供費億計存義盡心調䕶卒以用間受降殱冦沈莊邑賴以全民爲立報功祠顧廷對萬厯嘉興府志字子俞嘉靖己未進士知平湖遇事敢為辨疑獄洞得其情先是校田多寡以役民民以田爲仇廷對創條鞭均役法總計而年徵之貯於官以貼役者力均而不病上官初未之許反覆陳利害十數條始得如請令下民若更生逾年南海龎尚鵬來按浙以其法行各郡邑所在稱便遷御史去何源獻徵錄字仲深廣昌人嘉靖已未進士爲嘉興令凡聽訟曲直已判徐復委曲開諭皆得其情而去公庭寂然郭杰以鍜獄誣服沉寃十年亷知行奸謀殺者郭明也釋杰而罪明邑人稱神歲當攢造鄉官以受寄為常忽一日五鼓遣吏取圖書實數即集胥吏於衙扃鑰之一時不得高下其手詭寄之弊十去七八當道有總理鹽法者欲增課額源謂民方苦倭萬一鹽徒朋引禍且不測止之年饑申請緩徵銀通查五年銀米之條抵所請之數額不虧而民自便在任二年官舍蕭然民有喫水還錢之謡内召厯太常少卿何址萬厯嘉興府志字德徵進賢人守郡方嚴不假人以嚬笑衣無重彩食不兼味遇事侃侃以忤權貴去畧無慍色蔡廷臣萬厯嘉興府志江西人嘉靖進士任嘉興司理抗直不阿斷獄詳允時有豪右骫法置諸理不少貸召爲御史分守嘉湖轉觀察使張任萬厯嘉興府志字希尹嘉定人丁未進士爲嘉興府同知涖任時倭冦侵境軍費不貲任與郡守劉慤恊心撫字民得安堵厯官巡撫都御史劉邦寀分省人物考字君亮號師泉南昌人王陽明弟子嘉靖七年鄉試中式授敎諭陞嘉興府同知舊浙江通志邦寀清慎端恪待民以慈而能弭盗禁奸發隱摘伏地方賴之王宗載萬厯嘉興府志字仲勉京山人嘉靖壬戌進士知海鹽問民疾苦省刑薄稅僉審徭役親自撿括里胥不能爲奸溥水利農不苦旱他如修理海塘禁捕私鹽清覈軍匠查革虛名兵餉靡不精心悉慮政暇進諸士子横經講藝多所成就云周寀萬厯嘉興府志字濟甫安福人嘉靖進士四十二年知嘉善年少英敏剖决如流尤屬意學校啓書院擇士有志者漸摩之厚給以廩餼躬爲品題官至吏部侍郎盧楩嘉興縣志字木伯崑山人嘉靖進士令嘉興加意黌序延名孝廉爲生儒師日講月課寒暑無間更捐俸置田二百七十畝給贍黃獻可萬厯嘉興府志字堯俞莆田人嘉靖進士知嘉興府愛民好士儒學僻處西城獻可擇治東興聖寺址徙置之自此人文蔚起甲於他邑喬登天啓平湖縣志字子高延津人以吏員任平湖典史嘉靖癸丑倭冦突至登捧檄禦於邑東南之曹家橋所將民兵猝然見敵皆望風逃竄惟登一人戰殁於陣列祀報功祠中趙書萬厯嘉興府志字同文桐城人歲貢嘉靖末爲平湖敎諭勤課士諸生中貧者至典衣以周之嘗作明倫十二事以訓德義之士輒稱舉以爲儀表學使者聞而褒賚即以所賚鑄鼎文廟爲銘以見志云方揚萬厯嘉興府志歙縣人隆慶辛未進士同知嘉興府事志行端方兢兢以古人自律時吏胥有父死欲火者揚給棺以葬禁民焚屍荒歲疫興捐俸施藥署嘉善時丈田皆躬親覈刷豪右莫得肆其奸公餘與諸生講論經學有餽遺者面斥之擢守杭郡尋卒囊無餘貲李橡萬厯嘉興府志豐城人嘉靖壬戌進士隆慶五年守嘉興首重學校加意窮獨均賦平役省刑簡訟濬漕河築海塘調梧州守去士民爲立徳政碑艾鰲萬厯嘉興府志新建人隆慶五年由舉人知崇德性甘淡泊所食蔬魚不取民間時秋霖當道督課亟鰲曰青黄不給吾寧以官博民乎調知長樂張道萬厯嘉興府志字以中湖口人進士初令姚江著賢聲補秀水治獄不煩敲扑里中徭役輒絮語慰勞之農氓孺婦以時入籲雖牽裾引案無愠容召拜御史李實萬厯嘉興府志字若虛瀘州人隆慶辛未進士知平湖究心民隱搜剔吏蠧有神君之稱獄訟日減諸役無所事事多散去乙亥夏海溢害稼周視賑恤安集者數千人邑有把持税牘積蠧其中者洞燭之毫不得隠僉徭煩簡各以力任民咸便之黃清湧幢小品上饒人起吏員積官嘉興府同知築海塘有功萬厯嘉興府志清有智畧砌石有法又開裏河以運石鑄鐵獸以鎮海稱一時能吏云黃希憲舊嘉興府志金谿人進士萬厯間知嘉興府以清白自矢置天鑒簿登記贖鍰毫不自私聽訟必情理相參有欺罔者按以三尺不少貸又勤於課士爲論俗文以諷戒小民水旱步禱輒應金和萬厯嘉興府志字元節長洲人萬厯甲戌進士知嘉善持政縝密監司下令築圩和每鄉擇巨姓有行者董其事民不擾而功集謝應祥嘉興府志安福人進士萬厯中知嘉善先是邑賦役無定貧富不均應祥乃立照田起役法豪右不能漏税細民不至賠累民德之厯官都御史陳履舊浙江通志廣東人萬厯中知崇德縣爲政務長厚鎮躁以静養威以寛不爲苛察而政平訟理蔡逢時海鹽縣圖經字應期寧國人進士知海鹽廉潔自持行均甲法以三百二十畝管一役又革坊廂丁田役立門攤僱夫法邑咸稱平曹光德舊嘉興府志黃州人進士萬厯時授推官政稱清簡勵操貞白涖任三載以憂去所攜惟圖書而已朱邦喜嘉興府志江西臨川人萬厯時以舉人為嘉興同知才優煩劇而性仁慈羡餘不入一錢署平湖篆清查尺籍以除蠧弊折疑獄片言立解佐郡十載解組去囊槖蕭然王義民平湖縣志字若惺江隂人萬厯進士知平湖縣明無不察胥吏畏若神明徵糧僉役曲盡規畫朱維京萬厯嘉興府志萬安人進士令崇德先是丈量田畝屬之平湖令截弓三寸致浮舊額五千餘畝維京悉照舊額民大感悦逾年陞工部主事曹代蕭嘉興府志歸德人萬厯時知嘉興府宅心平恕禁胥吏擾民省罰鍰甦舖行清驛傳設立社學義倉義塚旣去民祠之鄒東魯萬厯嘉興府志兗州人萬厯癸已以貢任嘉興縣丞職司國賦賦長歲有常饋纎毫不受又捐俸賞蚤畢賦者清操自堅甚至鬻衣以供饘粥陞魯府紀善劉士瑗平湖縣志安福人萬厯中知平湖縣立均田法剏設歸单以杜飛詭那移之弊文廟災先捐俸爲士紳倡不旬月告成時有議通金山渠者以去就爭之孫承謨石門縣志字若沖進士知石門縣往年漕糧皆由糧長收發謂之九收一發此甲値糧長彼九甲漠然不顧致糧長賠累無不破家承謨創立各收各發例一時便之加意學校培植士子蕭鳴甲天啓平湖縣志字爾先漢陽人以進士知平湖明達不苛兩造盈庭片言心折各唯唯去戊申霪雨浹旬旁邑預訪富室待賑中人之産無寧居鳴甲下令曰賑在官毋需民也一邑安堵竟亦有秋每造士大夫問民疾苦坦衷洞達至於事所不可即上官無以易也秩滿遷戸部郭如川萬厯秀水縣志字元玉富順人進士萬厯十四年知秀水縣歲洊饑加賑恤全活以萬計抱羸疾一日行閭巷三日卧齋閣而豪猾舞文者亦衰息非大獄輒移鄉三老諭之問遺無所受請託不行陞儀部主事朱來遠嘉興府志字文臣廬江人進士萬厯中知秀水縣善察民隱人莫能欺讞獄必委曲勸諭尤加意黌序治行稱最官太常少卿蔡時鼎桐鄉縣志號調吾福建漳浦人萬厯甲戍進士弱冠治桐初至不露圭角吏人數欺之時鼎亷知其槩一日將平日所欺之事一一摘發合邑驚爲神擢御史鄭振先嘉興縣志字太初武進人萬厯進士宰嘉邑年甚少馭下嚴胥徒市魁惴惴守功令經理賊法酌北運之宜條上四欵一曰議改𣲖二曰議抵給三曰議供應四曰應捐解皆曲中事窽民困以蘇建常平二倉以備存捄時有豪民匿賦者廉得其實戍其人而没其田以實倉贍學會大祲駕小舫村落問民疾苦發滯穀萬斛民得更生更設仁文書院置義田以興起斯文為己任王臨亨海鹽縣圖經字止之崑山人進士萬厯二十年知海鹽縣遇事精敏察獄不越宿縣城久圮加築高廣海警無恐後爲杭州太守喬拱璧海鹽縣圖經字穀侯上海人進士萬厯三十六年任海鹽令時衞卒餉多冐濫悉覈之絶其弊築捍海塘增設漕糧倉厫吏廨及甃街葺堰民多賴之朱欽相舊浙江通志字如容臨川人萬厯中令平湖時値編審剔釐飛灑花詭之弊設官圖立頑甲卻公費永著為例修城之費舊設里甲欽相請𣲖入條鞭凡所興除皆務便民初欽相父邦喜爲郡司馬再署平湖篆有善政欽相繼之邑人為建世德祠張問達嘉興縣志字德孚内江人萬厯進士知嘉興縣會江陵柄國下清畝之令問達出丈餘畝獨多編審里甲不寄耳目於胥吏富不得規避貧寠甦息時稱神明他若興學校清義倉厝注皆有法度以治行最擢御史湯齊嘉興縣志號麗河武進人萬厯己未進士知嘉興縣清儉自砥寛贖鍰蠲羡耗平繇役釐積弊民戴其德縣向無專志齊纂修之仕至太僕卿羅尚忠平湖縣志字孝可青陽人萬厯癸丑進士令平湖為政清簡執法不撓北白南糧陋規洗刷殆盡捐俸立義田置義塚以艱去後擢給事中何杲海鹽縣圖經字白夫懷寧人進士萬厯四十一年任海鹽初政尚嚴後濟以寛故民畏而見德縣市肆有門攤商税報𣲖多失均杲核而差等之困大蘇行鹽票多至六千滯正引且累肩挑賠貱杲請減票二千鹽課以足擢監察御史陳熙昌嘉興府志字景菴南海人萬厯丙辰進士令平湖在任六載未嘗妄撻一人或干法紀輒霽顔諭之捐羡金貸贖鍰寛徭賦減貼役編審最稱弊藪熙昌先清官戸實田照例優免以溢額者充役不及額而取寄莊以漁利者盡數還民役田遂溢四萬二千有奇歲歉穀貴平糶賑䘏擢給事中顧雲程嘉興縣志字襟宇常熟人萬厯進士初任淳安調嘉興歲大稔穀賤不售舊例徵賦以十月始雲程緩至歲盡不徵部使者怪之正月朔雲程集耆老而問曰榖價視冬時幾何曰益一鐶矣曰若是趣完賦耆老曰諾五日而入四萬金旦日上之部使者大驚推治行第一樊維城舊浙江通志字亢宗黄岡人萬厯中知海鹽徵賦令民自行投櫃省漕兌贈耗數千百石修海鹽圖經康元穗西江志字曰穎安福人萬厯進士爲嘉興令其俗不能葬者多棄棺郊外元穗至即置漏澤園瘞之汰運糧浮額報最陞南禮部主事林先春嘉善縣志字狷菴福建閩縣人天啓進士任嘉善風采凝然魏忠節斃詔獄追鍰力爲幹旋恤死庇生恩施至渥愛士尤篤顧國寶平湖縣志字元善南通州人天啟進士性剛介政主愛人而務必行其法漕規久弛力裁額外加耗又酌收兑永制軍民帖然文德翼嘉興府志九江人崇禎進士為嘉興推官察吏精明長於折獄作興士𩔖著述甚多李陳玉嘉善縣志字謙菴江西吉水人崇禎進士任嘉善知縣甫下車漕兒紛呶旗弁勒索加横陳玉執持甚力得復舊規撫字催科俱有良法動中利弊覽邑形勝購地築鶴湖書院建鶴鳴樓於縣治後陞監察御史吳春枝陶嘉祉嘉興府志春枝字元蕚宜興人崇禎丁丑進士令平湖才敏而機警徵輸有法歲饉加意賑恤全活無算署海鹽嘉善篆俱有惠政嘉祉武進人崇禎甲戌進士知平湖縣事一月卒有異政民並稱之鄭瑄舊嘉興府志字鴻逵崇禎進士知嘉興府政務簡静聽訟必折以理不少假借革除利弊興起文敎修郡學建𢎞文館又濬城河築官塘以便往來遷寧紹副使累擢大理寺卿張鳳翥嘉興縣志字澹存宿松人崇禎辛未進士知發嘉興縣初涖事簡静無爲或易視之不一月弊懲奸吏皆畏懾民苦役久値編審始行均田法至今倣行興學校勤月課造就諸生以憂去後爲荆西道國朝史載舊浙江通志字筆公蘭陽人進士順治十二年知嘉興府每鞫盜得實立斃杖下由是盜靖民安性亷介餽遺一切屏却尹從王嘉興府志字含美山東人進士順治乙未任嘉興府執法清嚴一時豪右避跡立漕糧交兌法軍民不相見至今遵行之鄭鈺殉難册順天大興人任嘉協中軍守備順治十七年會勦石門賊力戰陣亡事聞䘏廕一拖沙喇哈番世襲賜李見龍舊浙江通志字德中蒙隂人進士康熙七年知秀水縣布衣蔬食刻苦自勵賦役驛逓皆有條理絶不累民行取給事中莫大勲嘉興縣志字魯巖宜興人順治辛丑進士康熙八年知嘉善御下不假顔色胥吏皆股栗退聽撫民寛和待士有禮大造清丈平役均賦實行官收官兑法上官嘉之頒行通省以爲式在任七載清介之守始終不易舉卓異不能治裝士民感恩輸助父老扶笻扳卧三十里臨别洒泣猶惓惓以虚糧未盡去蕩糧未盡清三歎息焉考選擢給事中張素仁名宦畱祀册遼東人康熙九年以廕生知海鹽縣催科力行滾單不假敲朴漕糧耗贈盡革陋規嚴絶假命以安善良實心造士以興文敎修築海塘發粟賑饑士民尸祝之季舜有嘉興府志字闢山揚州人監生康熙戊午任嘉興府同知發奸摘伏積弊盡革所决疑獄甚夥郡人奉爲神明樊咸修嘉興府志字慈東陜西三原人進士康熙戊辰知嘉興縣寛猛得宜民情帖服邑有豪惡剪除不遺遇窮民則加意撫恤之斷獄如神以才能擢給事中浙江通志卷一百五十
