body:
  text: 浙江通志卷一百風俗台州府臨海縣附郭晉書地理志火耕水耨漁獵山樵飲食頗給民無千金之家陳公輔台州風俗記台介東南之陬里無貴遊百姓樂業但食魚稻習樵獵而不識官府之嚴洪適通判廳記壤僻民願牒訴簡少輸調有常赤城志台士皆激昻奮厲以禮義廉恥為先以行檢名節為貴民皆質直願慤以耕鑿芻蕘為生以安土重遷為業非貧困無聊不肯自墮於商販胥徙之役赤城志州負山瀕海沃土少而瘠地多民生其間轉側以謀衣食寸壤以上未有萊而不耕者也鄉户不足於財而有餘於行其真朴敦厚里黨多化焉胡榮文廟記地應上台士秀而文質均王士琦平賦碑記浙以東瀕海諸郡利饒魚鹽商舶輳集民逐什一而擁厚資獨台途錯孔道無末業而鮮蓋藏金賁亨台學源流序台古荒域厯漢及吳二三君子始以幽操正行有聞當世晉唐之際節概文章之士亦班班見典籍吳時來志學書院記成𢎞間人才最盛其樹立皆足表表於世其登科者嵗至七八人與浙以東相雄長王士昌平圖記土瘠人窳然其先多賢俗尚忠孝喜廉讓無豪暴欺詐故浙中稱樂郊臨海縣志臨海山川峭厲人皆秉性堅貞百姓務本力農無興販境外素封家惟積粟萟桕麻以資饒足仕者侃侃立朝以言利為恥黃巖縣晉書地理志氣躁性輕好佛信鬼王士琦明倫堂記扶輿磅礴氣日益久士日益奮家詩書而户絃誦黃巖縣志其民秀而敏人人殊異皆以文藝相應有鄒魯風天台縣車若水平價倉記天台邑治去江百里米舶鮮至而為閩甌入京孔道往來屝屨增叨其間市井貴糴扇及村落數日辛勤之傭不營一飽孟夢恂縣學記天台為邑山藴水融民淳物茂前哲之典型具存文華之穎發踵進赤城新志天台以山水擅名域內隋梁間多棲仙釋故有洞天福地之説及晉唐來俗尚詩書人敦孝弟而人文漸蒸起矣天台縣志土瘠民貧室廬儉素人不習工巧匠作器皿多取給他處魚鹽山海之利皆異郡專之惟坐肆售貨覔什一之利朝貴還城不乘車馬深山窮谷稚子皆知讀書牧豎樵夫亦識字守分者多抗法者少仙居縣赤城新志仙居枕山趾海雖若蠶叢其風俗與首邑不少異仙居縣志山川秀美土風朴茂賢士大夫多光明俊偉能世其業即編户之民類不能具什一以求尺寸之贏於四方寧海縣吳子良縣學記井聚僻寂迫山海民力耕釣安賦輸産慳食嗇陸瑜縣學記名儒輩出甲於他邑薛三才林公祠碑記寧邑僻居海隅其民執固勇敢士多穎質胡獻來胡侯德政碑記緱城故忠節禮義之鄉素稱易治金學賢葛氏族譜序其大家多優裕和雅喜學而好文其小民力業寡求罕爭而鮮訟其俗最為得文質之中寧海縣志男耕女織有勤儉風力本右文無浮靡習故家尚清議士矜名節婚嫁擇先門第慶弔罔敢失禮營室必作家廟燕享以時婦女不出街市此其俗之美者太平縣鮑復泰三台采風詩序風俗敦龎習尚簡質台州府志連山濱海舟楫不通其地止農漁不習上國之奢華故其民尤朴茂近古太平縣志明初地曠人稀土田不過畝一金是時法尚嚴密縉紳士庶罔敢侈肆衣不過細布土縑仕非達官不得輒用紵絲女子非受封不得長衫束帶居室無廳事高廣惟式至宣德正統法網漸疏奢侈競起成化𢎞治間役輕省費生理滋殖田或畝十金屋有廳事正德以來貧耗而無高資鮮所借貸民由是困台州府志男子年十六以上始冠亦有及婚而冠者此禮惟世族間一行之女臨嫁前數日行笄禮受母訓戒議婚必憑媒氏納采請期奠雁諸禮悉如古制惟親迎未行嫁娶日各擇其族之賢者相與迎送以成姻禮初喪含殮畢即成服開喪姻戚赴弔貧富稱家有無不用鼓樂頗為近禮葬用石槨親友執紼哀送不事梵音仙響祭祀大家各有宗祠細民從寢室設龕四時之祭元旦清明端午中元重九冬至除夕各以時物為薦子姓享餕餘墓祭或用羊豕或用牲醴合隨其祭田之厚薄而頒胙亦以是為差台州府志元旦長幼夙興拜天地宗祖因相慶賀元宵張燈五日俗以十四日為重室內皆燃燈婦女行百步以去病清明採菁草雜米麵為餌謂之寒食家無貧富必擕酒祭墓且插栁於門或簪之謂之驅香九娘蓋指螫蟲云四月八日浮屠於是日浴佛人家取烏相葉染飯作青色以相饋謂之送烏飯立夏拭麵為薄餅裹肉葅啖之謂之醉夏六月六日各曬衣與書籍老者食雞粥謂時極陰以補陽云中秋玩月酌酒俗以十六日為重猶元宵之重十四也臘月二十四日掃屋塵謂之除殘星夜祀竈謂送神上天除夕先期備牲醴祭賽天地是夕祭祖飲餕餘分嵗或燃燈達旦又謂守嵗云金華府金華縣附郭王柏跋八行家傳習尚忠厚公論坦明宋濂呂東萊祠堂記俗勤耕織士知所學王一寧送張宗原赴金華序其民淳其訟簡其豐裕雖不及於浙右而易理過之章懋縣志序男勤生業女事婦工不出閨門鮮鑽穴踰牆之行務營田宅無聲色狗馬之好慶生弔死禮尚往來嫁女婚男擇先門第金華府志民朴而勤勇決而尚氣族居巖谷不輕去其土以耕種為生不習工商其富人雅好義喜延儒碩士愛誦讀厯産名賢巍科執政踵相接也登仕者多尚風節蘭溪縣陳子巒縣學記蘭溪山川朗爽秀拔故其人往往有穆叔所謂三不朽者蘭溪縣志蘭溪風俗古今凡幾變宋南遷中原文物之漸漬諸賢禮樂之講明蔚然為文獻之邦氣習醇厚此其俗之可取者也但居市者多誇詐處田里者或粗鄙或輕諾而致訟或論財而鬻女此其俗之未盡善者也東陽縣成化東陽縣志士愛讀書大家子弟無不從師受學有志者習舉業遲鈍者亦求通章句知禮義之方農知服業父子力作以耕植為事故衣食恆足婦人女子深處閨門雖親戚鄰里亦不少接專以紡織為事日用飲食服飾器具一以簡素為尚不事文飾其聲色遊燕玩賞花石之樂舉不崇尚有商人尚質之風隆慶東陽縣志俗居巖谷不輕去其鄉以耕種為生不習工商富人雅好義舉大姓重門第崇祀譜士人能談性命登仕者多尚風節義烏縣隋書地理志風俗澄清道教隆洽黃中輔忠孝堂記人物風流孝行卓異劉濬登科題名記俗尚儒雅甲於他邑萬厯義烏縣志男子服耕稼婦女勤織紡商賈鬻魚鹽工習器械以利民用無淫巧奇邪之物永康縣洪垣縣治廳壁記永康舊俗重儉嗇好強戾張元楨永康縣譙樓記俗故謹厚士民樂業永康縣志宋淳熙間先儒晦菴朱子與東萊龍川二先生設講席於五峰洞天永之人士其得沾先賢風教者有由然矣明初承舊俗為士者多樂田野及成化𢎞治間文采蔚然倍於往昔正靖隆萬之際不惟掄科擢第比肩林立而議論政事亦往往可觀永康縣志永之溪漂悍而衝激易涸而不沈蓄其土重實而剛燥寒淡而磽瘠民生其間遂有勇悍夸詐之習民鮮淫巧工多粗劣持斧鑿者不及雕鏤操機杼者不及錦綺秉針線者不及組繡攻澤飾者不及文章而縣治四境之俗亦復不同東邊東陽南邊括蒼西邊武義北邊義烏東陽之俗文其弊也飾括蒼之俗武其弊也悍武義之俗質其弊也野義烏之俗智其弊也黠武義縣呂祖謙徐公墓記負山之民氣俗敦慤樂田畝而畏官府遨嬉侈麗之習獨不入其鄉許謙送逯公平赴武義教序地狹而土肥其民富庶而風俗徑急舊為東萊講業之地流風餘韻猶有存者士大夫能道詩書通今古楊本儒學記其民剛悍不相下故其俗獷猛號難治武義縣志男勤生業女工紡織家尚儉朴而安質素無狗馬踏踘之戲鮮綺繡戴勝之觀無論村落僻塢即城市之民無不笠糾餉黍稼穡是事浦江縣陳亮縣志序浦江山邑非賓客商賈之所奔輳民生其間者往往朴茂質實以不欠租賦相尚以不厯公庭為常長吏至則相與安樂其俗而已栁貫明倫堂記介然下邑無名山大澤以發舒其奇無珍寶絶産以阜通其利民業稼外以儉嗇自全其生戴良浦陽人物記後序人物之生不一而足以忠孝貞節著者有之以政事文學顯者有之宋濂深溪王氏義門碑浦陽婺山邑朴美淳質力農務本恥於華言偽行而以士自命古者禮義之俗殆不是過湯溪縣胡森縣學記其俗朴而固其民勞以思襏襫秉耒而無外慕胡森陳侯弭盜却金記湯朴俗也勤而嗇樹本而滋野處而不昵其室家保聚椎結之風蔑如也洪啓睿縣志序其土確其俗龎湯溪縣志湯溪割四縣邊隅之地為邑故習俗各隨其方如遂昌多強悍蘭溪多澆詐金華多儉嗇龍遊多鬭訟湯溪則兼而有之然士好禮讓農務力田不喜牽車服賈以走四方且里不朝歌巷不夜遊依然有古之遺湯溪縣志家絃户誦人知自奮登賢書者代不乏人金畢府志冠禮民間鮮行惟士大夫家間行之昏禮士大夫家鮮親迎始至設香燭令師巫咒而撒沙童子羅揖誦詩及夜以紅綵繫而牽之行合巹禮三日廟見後盛服出拜姑嫜次及家衆喪禮沐浴含襲及殮倣佛文公家禮朝夕哭奠每以七日一舉祭禮至日則宗族親戚相率持香燭哭拜謂之炷香又率用僧道作佛事謂之追薦葬埋富者多用石槨其次用灰隔祭禮士大夫家用四時民間多用俗節近又多會其族人立大小宗祠因以嵗首聚拜祠內謂之合族會金華府志元旦舉家夙興盛服焚香拜天及懸祖先遺像或祠堂神主率長幼拜之然後尊長輩以次交拜詣族黨親友之門投刺相賀名曰賀嵗立春前一日官率僚屬迎春於東郊春日官祀太嵗行鞭春禮碎土牛家設酒肴以祭土神謂之作春福正月十五日夜各家懸燈於門首街衢接竹為棚繫燈其上笙歌鼓樂喧閙徹旦社日四鄉各有社祭以祀土榖之神清明日人家門户插栁枝少長行賞郊外名曰踏青前後十餘日祭掃先墳四月初八釋迦佛生日為浴佛節俗染烏飯競相饋遺端陽日龍舟競渡男女闐視親族相欵民費不資是日取篛葉裹粘米為角黍相餽置菖蒲雄黃於酒飲之婦女佩符艾或以繭作虎小兒絲繩繫臂綴繡符於衣帶謂可消災採藥合藥者俱以是日為最效七夕女子夜間陳瓜果祭賽乞巧中元素食祀先僧含作盂蘭盆會或放水燈爛若列星八月十五日家各置酒燕集祭祠廟九日佩萸泛菊蒸米作五色糕士人或具酒榼遊山為登高會冬至各設酒肴以祀其先十二月二十四日夜祀竈品用糖糕人家各拂塵換桃符門神年終親戚互為嵗餽交錯於道除日灑掃堂室懸祖先像燔柴於庭燃紙炮以代爆竹相應答響至元宵不絶終夜圍爐集少長歡飲羣坐不寢名曰守嵗永康縣志元夕張燈街市城中各以會為大燭導以鼓樂舁置神廟最大者或用蠟四五百斤此一郡所無也清明男女上冢祭掃挂紙錢於上謂之標靑十二月二十五日謂之年頭禁是日不出財以赤豆和米煮粥曰蠶花粥食之利養蠶也東陽縣志社日農家用青麵作果橘葉夾之名曰社果以獻其先乃食夏至凡治田者不論多少必具酒肉祭土榖之神束草立標插諸田間就而祭之謂祭田婆六月六日農家復祀榖神謂之六六福重陽提壺挈搕登高攬勝雨則以十二補之謂之賽重陽義烏縣志三月上已先十餘日沿溪民泛龍舟至是日止俗呼競渡蘭溪縣志七月二十四日邑有東嶽廟先期廟祝散會號至期童男女往廟銷號謂之孩童會衢州府西安縣附郭漢書地理志地邊楚習於戰鬭李華刺史廳壁記俗尚文學有古遺風毛幵超覽堂記其君子多亢言而厲行易知而難狎𢎞治衢州府志風土朴野民俗醇厚士力學操觚安貧砥行無越禮犯分告訐狡獪之事尤多師範經師人師後先輩出故後進人品學問皆有原本極重試事以低昻為榮辱各樹壇坫爭自濯磨顧惜朋儔矜尚意氣農能茹苦食貧不輕改業西安縣志士修禮義俗尚敦朴自漢以來浹洽政化宋南渡後士風益競至今敦行古道雅尚禮文君子重廉恥惜名節小民畏刑憲寡詞訟居市者文而浮處野者質而鄙西安縣志穀賤民貧恆産所入不足以供賦稅而賈人皆重利致富於是人多馳騖奔走競習為商商日益衆吉凶婚嫁一切隨其豐儉故宕佚簡易無頭會拮據之煩龍遊縣程俱保安院記其風悍以果其君子耿耿好氣而敏於事衢州圖經其俗嗇其民尚氣而誇功徐伯彪文廟記儒風甲於一郡商輅縣學記居室富庶人物奇偉余杰縣城記民庶饒喜商賈士則緝學綴文取仕進萬廷謙龍遊縣志序民靜而安俗朴而儉閭閈不識胥史幾於摽枝野鹿之風萬厯龍遊縣志苫塊之艱不御羞饌數世之忌弗忍舉葷宗黨十世亦周恩意姻戚百年尚相贈遺其叔世之古道哉龍遊縣志農勤於力田治無隙地工不務淫巧皆能自食其力風俗敦厚婦人少出戶庭瀫水以南務耕北尚行商士力學操觚發一第不為炫耀及謝政還與往時同舍生及布衣交出遊如常龍遊縣志賈挾資以出守為恆業即秦晉滇蜀萬里視若比舍故俗有遍地龍遊之語常山縣楊韓科貢題名記常山衢之名邑自昔號為文獻鍾山川清淑之氣賢才後先相望常山縣志地狹民稠人尚勤儉事醫賈趨利尚氣信鬼神好淫祀宋朱晦菴呂東萊張南軒講學於此故學者知向方民無終訟婦女不踰閨閫昏嫁尚簡朴常山縣志其産多聰明俊傑負氣尚志知廉恥謹修飾江山縣張斗縣令題名記民朴魯而鯁直正德江山縣志山峻水駛故士多志尚講究理學地僻土腴故居民饒裕俗尚奢靡徐文溥縣志序士知向方有古遺風江山縣志江邑沃壤民殷富人肩摩廬舍鱗次商賈輻輳江山縣志士尚氣節厲德行民務稼穡而健於訟向時人務本業野無曠土邇來清湖為閩越孔道至有釋耒而逐負擔者開化縣程遂縣學記民生山谷無繁華盛麗之見無聲色臭味之娛男子耕稼婦人蠶織早作暮息勤生安業故其習多務本其秀民知讀書識道理愛親戚敬賓客睦鄉里非法之事懼不敢為胡儼厯科題名記士嗜讀書重名檢登科厯顯他邑莫儷邵驥三達尊記山川環秀風俗醇雅人皆樂善好儒汪慶伯傅公祠碑記土磽瘠民鮮蓋藏開化縣志士鍾靈秀工葩藻以凌雲民鮮出疆甘田舍而肆志其在土著鄉民有不識縣縣民有不識郡者衢州府志冠禮男子年十六以上始冠父兄擇日告廟以冠之婚禮凡品官婚娶或為子聘婦先遣媒氏通書次遣使及媒行六禮婦至壻家主人饗燕送者明日謁見祖禰次見舅姑行盥饋之禮舅姑饗婦如家人儀喪禮厥明小殮明日大殮遂成服三月而葬遇柔日再虞剛日三虞三虞後卒哭遷主入家廟祭凡品官立祠堂奉高曽祖禰四世之主以四仲之月祭之又有臘日忌辰及掃墓之祭與夫歲時俗節之薦享庶人得祀其祖父母父母而時享於寢其祭與品官略同西安縣志元旦昧爽具衣冠禮拜天地神祇及祖先賀尊長然後謁拜宗族及過里黨親舊交相謁賀擇日上墓具酒果挂楮錢元宵街市張燈鼓樂市井家植竹木為棚懸燈當道更以紙剪走馬諸燈及為龍燈周行巷陌士民競觀是月也農家以秫米搗為糍釀酒市肉祭田祖先嗇祝有秋清明日往墓培土具牲醴挂紙錢會族人飲餕餘插栁於門四月八日家造青精飯相遺謂之烏飯端午懸蒲艾於門泛雄黃菖蒲酒食餛飩以角黍相遺以綵絲為索繫兒童項臂曰百嵗索以避邪延夀七夕小兒以五日所繫之綵索剪之泛以水送置屋上以為鵲橋之渡中元俗稱鬼節設齋素以祀其先里民集浮屠為盂蘭盆會亦有夜放河燈者中秋戶邀賓朋置酒賞月秋社報成與春社同重陽各置酒登高以秫米發之雜以肉果蒸為糕以會賓朋習禮之家前後省墓祭以時食冬至祀祖先於宗祠長幼咸集以次羅拜拜畢受胙其外姓不行拜賀之禮惟官師士紳行之十二月二十四日夜祀竈神謂神以是日上天啓事具糖米果茶以祀之除夕陳設祖先像易門神桃符燒火爐放爆竹骨月團圞坐飲謂之守嵗嚴州府建德縣附郭方逢辰新定續志序嚴介萬山之窟土堅而隔上不受潤下不斥鹵雨則潦霽則稿土淺而源枯其民苦而耐其俗儉而野其户富者畝不滿百民僅以山蠶入帛官兵月廩率取米於鄰郡以給而百姓日糴則取給於衢婺蘇秀之客舟余植進士題名記瑰奇特杰之觀瀟灑清絶之氣獨萃斯邑士氣夙醇文風寖盛方來者尚源源也新定續志郡人物表表相望大抵尚氣節而輕功名有子陵之風太平御覽睦州取俗阜人和內外輯睦為義嚴陵志山高水深人性貞介君子好禮小人勤生男女有正性而無淫行明一統志民貧而嗇多文學之士宋賢條議嚴絹疏民淳事簡訟少糧完文獻則三元及第風俗則九世同居從來易治之善地也建德縣志建邑山多田少磽確者半耕讀之外别無餘蓄嵗或不登借糴他邦食云艱矣戶習詩書家敦仁讓嫁娶槩從其儉喪葬稱其有無淳安縣范鎔勤清堂記地大而民衆訟繁而賦廣嚴陵志邑名淳安其風非無存者人物彬彬代有其人淳安縣志土磽産薄民貧俗願鎮之以無事則易治也桐廬縣方輿勝覽山嶮土磽蠶桑是務蒸茶割漆以要商賈貿易之利嚴陵志多居山谷地狹且瘠穀食不足仰給他縣桐廬縣志君子多輕世而傲物小人多勤生而務本遂安縣嚴陵志僻居巖谷附山依水俗尚勤朴少奇邪遂安縣志嫁尚粧資高者至破産不計卑者或勒索聘財喪遵家禮服制如儀而崇尚醮事張燈設食飯闍黎羽士費用不資服飾尚儉朴近亦稍華焉壽昌縣嚴陵志俗號輯睦可以無事治不可以多事理壽昌縣志邑介四山之中地狹而瘠民嗇而野舟車不通商賈不行俗儉而易足頗惑於鬼神富豪多以華麗相尚分水縣嚴陵志山多田少水淺户磽地狹民稠木炭紙茶之利終嵗所入不足以給饔飱三分之一大率貿易販糴仰賴他郡以為生分水縣志人士雋良多好文雅喜誦讀重功名文武登雋蟬聨不絶分水縣志崇奉象教信鬼神嚴州府志男子既長擇日而冠拜天地祖宗父母三加請戒之禮不行久矣女子于歸始為加笄婚必擇門第相當者以媒通之女家即以女之年庚書帖付之為允嗣方納聘於女家臨娶先數日仍送羮飯禮以便女家告祖娶之日不親迎盛張鼓樂雜用傳席交杯諸儀有即日出拜公姑亦有三朝拜者喪大率用文公家禮惟不行斂不用布絞墓多砌磚為槨不甚用浮屠皆於旬日之內舉殯先是受親友賻弔葬畢孝子服麻絰踵門謝之祭以忌日終身不廢元旦必拜墓清明日則掃墓中元則祭於家多用蔬食下元亦有墓祭皆習簡朴不尚華麗嚴州府志元旦昧爽而興設香燭拜天地祖宗男女成禮畢親友互相賀嵗立春前一日縣令迎靑帝上牛於東郊散春花撒春豆春米茹春餅粧露臺元宵各張燈結棚放花爆和麵圓薦先更相賀食新婦之家設醴祭床社日各鄉為牲醴祭社神以祈報畢則飲福清明插栁於門寢竈陘人簪栁葉展墓祀祖立夏日煮夏粥亦有饋送者四月八日作烏飯端午包角黍餽節懸艾虎小兒佩夀源道符門貼符篆飲菖蒲雄黃酒六月六日曬衣曝書七夕婦女設祭於庭穿針乞巧中元祭享祖先亦有倩僧作焰口法事者社日各鄉設牲醴迎社神閲苗中秋設尊罍以觀月華燕飲至夜分乃止重陽炊糍餅薦先飲茱萸酒下元展墓冬至祭祖於家廟相見稱賀如元旦禮臘月二十四夜設果送竈儺戲於街除夕懸祖父遺像奉祀饋節懸桃符祀竈骨月團圞而飲坐以守嵗建德縣志立春前一日田家擊長秧鼓桐廬縣志二月十二日俗傳以此日之晴雨卜衆卉之艷否名曰花朝備牡醴合祭先祖謂之春祭九月九日有作角黍以相遺者謂之重陽粽溫州府永嘉縣附郭隋書地理志少爭訟尚歌舞婦人勤於紡織有夜綄紗而旦成布者俗謂之雞鳴布元和郡縣志永嘉蠶一年八熟王十朋送葉秀才序誼理之學甲於東南筆橫渠而口伊洛者紛如也取科第登仕籍多自此途出王褘送顧仲明序永嘉東南名郡山川峻清偉人間出號稱六藝文章之府嘉靖浙江通志始東甌王信鬼故甌俗多敬鬼樂祠甌江逸志東甌向稱沃壤名小杭州甌江逸志溫州自夏徂秋常觀雲以候風一日之間風稍息則雨大傾雨稍霽則風復作謂之風癡居民海賈咸以為憂萬厯溫州府志永嘉尚禮文重喪制婦女無故不出户庭恥向官府不行鬻於市林汝詔遊雁蕩記東甌去浙逺其間地僻民醇城市清楚人好修飾舊浙江通志君子尚文小人習於機巧溫州府志土薄難藝民以力勝故地不宜桑而織絍工不産漆而器用備永嘉縣志晉立郡城生齒日繁王右軍導以文教謝康樂繼之乃知向方自是家務為學至宋遂稱小鄒魯永嘉縣志其俗剽悍其貨纎靡其士風任氣而矜節樂清縣王十朋待士説樂士服詩書勤職業聖賢之是師臭味之與遊謹門户時租稅忍以省訟愼以免禍萬厯溫州府志樂清多剛直尚節概樂清縣志東甌限山阻海而樂尤土瘠竭力稼穡僅支一嵗地多桑柘女勤紡績瀕海之家多藉魚鹽樂清縣志山水奇迥仕多忠亮剴靖之臣校多𢎞介孤正之士民多磊落俊特之耆平陽縣萬厯溫州府志平陽尚簡朴不事爭鬭平陽縣志平陽瀕海禮樂文物至宋而盛時陳經正兄弟陳殖林湜諸君子皆從遊程朱之門家洙泗而户濂洛學有淵源名士相繼而顯至今敦尚詩書勤於教子義孰之設殆遍閭里平陽縣志俗淳厚尚朴素男子務耕種不事商賈女子不尚刺繡夏績苧冬紡棉晝夜無間雖高門巨室始齔之女垂白之嫗皆然瑞安縣陳傅良義學序家務為學人務省事其俗甚厚萬厯溫州府志瑞安俗近永嘉然尚儉約瑞安縣志恭叔篤行水心正學忠定如陳學士正定如卓侍郎道德文章代有稱述泰順縣萬厯溫州府志泰順俗視平陽更質泰順縣志泰居甌極西山勢高下大小有序無刻峭頑怪狀水清徹可鑒而鮮奔潰故風土溫和民質不戾泰順縣志土瘠民貧男耕女織其俗有唐風蟋蟀之遺民而秀者齒讓相先雖至貴不相假弦誦之聲居然小鄒魯也溫州府志民間久不行冠禮惟士大夫家間一行之議婚以男女生辰互易卜算名曰開合卜筮既吉媒妁通好其納采曰起帖具禮儀外多致紅箋茶果以通知女氏宗戚納幣曰言定備叉釧羊酒之屬以白金代色繒請期曰送日納幣時有未備者此時補之昏日婦至門未下車壻揖婦者四婦乃入門交拜拜舅姑畢歸房合巹三朝廟見以女紅獻尊長以次分送姻婭有差喪大殮時親鄰皆至名曰送殮喪家多備筵席士大夫家多用鼓樂崇尚浮屠多作佛事葬日親串來視不其賻臨衢多設路祭主人受之即以餕餘餉客閲三日復祭於墓標插紙毬而歸祠祭近家禮俗節及祖考忌辰誕日獻時食於寢室或獻於家堂清明孟冬則展祭於墓終身不忍廢也溫州府志元旦祀先序拜尊長畢出謁親族鄰里或留飲月朔至五日謂之節假立春日燒樟葉燃爆竹啖欒實煮茗以宣逹陽氣名曰煨春端午各鄉俱操龍舟競渡祈年賽願七夕以綵縷穿針陳瓜果以乞巧臘月二十四日前掃塵淨宇逮此夕則祀竈鳴爆竹謂之交年平陽縣志上元通衢上結竹棚挂綵夜間懸各色花燈放花炮裝鰲山廟宇尤盛近多滚龍獅子沿門慶賀七夕作巧食以啖以巧食擲屋脊上謂雀含此布橋以使牛女相會是夕羣兒取瓦片敲擊以慶其會處州府麗水縣附郭王褘少微倡和集序州在浙東最左僻其土俗簡以質其田賦薄以寡自昔易為陳希點勸儲倉記括蒼負山為郡土田瘠薄泝溪而西幾三百里為邑曰龍泉其地與閩接平時小民重本力穡僅僅自足然非舟車走集之便稍遇旱潦則移粟告糴於他邦者倍費事力崇禎處州府志躬儉嗇尚朴素崇禎處州府志其地多山少田勤於樹藝而衣食自足安土重遷雖貧不至鬻子女但信鬼尚巫雖士大夫之家亦不免麗水縣志俗尚儉嗇人重本業守禮奉公頗稱易治青田縣劉基湖山義孰記士多俊彥室常殷阜宋濂縣學記素稱文華之邦聲猷相尚青田縣志俗尚簡朴衣用大布飲食不貴異物貧士帶經而鋤里巷市㕓所至輒聞讀書聲縉雲縣崇禎處州府志自郡守李蕃興學之後家習儒業楊億與章廷評書獄訟甚稀賦輸素辦宋濂樹萱堂記躬服儉素弗憚勤勞括蒼彚紀道當甌婺之衝疲於陸運拮據樹藝豐年僅資俯仰縉雲縣志士厲廉隅俗尚儉節庶幾太古之遺力田敦行敬業樂羣士風閨操為十邑最松陽縣程愈松陽縣經界記邑號樂土閭井周聯風俗淳厚以賦入後期為恥松陽縣志人崇信義家置祭田地無他業一意力本磽確之區蓄泄及時始有秋男女盡力於耕織安土重遷儒雅以儉嗇自持遂昌縣古括遺芳遂昌雖山邑詩書之族後先相望其間或以名節著或以經學聞在山澤有韜晦而閭閻有孝義遂昌縣志民甘儉約而勤耕讀士崇禮義而尚儒雅古稱好訟而喜鬬今殆庶幾遂昌縣志崇禮甘儉不尚浮屠各建家祠有古立宗法崇祭祀之意人文彬起禮讓成俗而好氣夙習稍衰龍泉縣崇禎處州府志民力耕種尚儉嗇商旅憚於逺出貿遷不越鄰封積書教子宦業相望龍泉縣志平居里巷絃誦相聞重本力穡僅僅自足其士操觚較藝好學而尚文其農則火田粒食力勤而尚儉慶元縣崇禎處州府志地僻民朴舟楫不通市無商賈耕讀之外無餘事士守名節婦不外見敦詩書飭廉隅安土重遷寧變産輸將不忍受辱事非切已不至公庭慶元縣志敦讓厚别號為易治近矜尚服物轉薄文藝無一登鄉薦者雲和縣崇禎處州府志山多田少土瘠民貧俗儉嗇尚朴素李鄴侯興學以後儒業文風漸盛崇禎處州府志質實浮靡彼此相半雲和縣志俗敦廉恥尚節概力耕勤織衣食聊足自給惟工藝貿易悉資外販故流移僑居者十六宣平縣王深源通遷渡記宣慈土壤衍沃民物富庶商旅肩踵相摩屬崇禎處州府志俗本古朴始以坑冶致患民習不淳繼乃崇儉務本漸異於舊宣平縣志民多惑於浮屠而訟訐求勝夙習猶有存者景寧縣崇禎處州府志山谷遐阻商賈罕集人惟力田務穡爭訟鮮少士務禮讓自昔記之景寧縣志頗習靡麗禮讓未興山居朴魯猶為近古處州府志重親迎禮姻婭皆肅衣冠陪壻至門奠雁禮甚整聘遣宴賀從儉喪禮不事觀飾不舉音樂親朋賻贈厚意猶存歲春秋聚族合祭其祖於家廟生辰諱日各祭於家新歲寒食祭於墓雖極貧不敢弛處州府志元旦姻里交賀家折柏枝肖鳳形繫橘柿於中俗呼百事吉懸中堂上元節市巷皆懸燈神廟競列古銅器名畫以比賽於通衢迎春日士女皆出觀各坊以童子粧像古人故事皆乘牛以應土牛之令五日為角黍懸蒲艾鄉都各造龍舟競渡士女泛舟觀遊八月望日大潮至清溪門女子著淡素衣於門外浣手徘徊江月以當祓除之意至日家為小米米調以薑糖祀其先家人共相勸食為延年之祀臘盡餽脯栗相酬酢除夕用粉蒸糕設饌為分嵗飲親朋更相邀致以敦欵好聖訓康熙九年十月初九日欽奉上諭朕惟至治之世不專以法令為務而以教化為先其時人心醇良風俗朴厚刑措不用比屋可封長治久安茂登上理蓋法令禁於一時而教化維於可久若徒恃法令而教化不先是舍本而務末也近見風俗日敝人心不古囂凌成習僭濫多端狙詐之術日工獄訟之興靡已或豪富陵轢孤寒或劣紳武斷鄉曲或惡襟出入衙署或蠧棍詐害善良萑苻之劫掠時聞讐忿之殺傷疊見陷罹法網刑所必加誅之則無知可憫宥之則憲典難寬念兹刑辟之日繁良由化導之未善朕今欲法古帝王尚德緩刑化民成俗舉凡敦孝弟以重人倫篤宗族以昭雍睦和鄉黨以息爭訟重農桑以足衣食尚節儉以惜財用隆學校以端士習黜異端以崇正學講法律以警愚頑明禮讓以厚風俗務本業以定民志訓子弟以禁非為息誣告以全良善誡窩逃以免株連完錢糧以省催科聨保甲以弭盜賊解讐忿以重身命等項作何訓迪勸導及作何責成內外文武該管各官督率舉行爾部詳察典制定議具奏特諭雍正元年二月十三日欽奉上諭致治之要首在風化移風易俗莫先於鼓厲良善使人人知彞倫天則之為重忠孝節義之宜敦古帝王勞來匡直所以納民於軌物者舍是無由也朝廷每遇覃恩詔欵內必有旌表孝義貞節之條實係巨典邇來直省大吏往往視為具文並未廣咨逺訪祗將有力之家囑託賂遺者漫憑郡縣監司之申詳即為題請建坊而山村僻壤窮民耕織之人或菽水養親大性篤孝或柏舟矢志之靡他鄉鄰嗟嘆為可欽而姓氏不傳於域邑幽光湮鬱潛德消沈者何可勝數爾部即傳諭督撫學政諸臣嗣後務期各屬搜羅虛公核詢據本人鄉評實迹題奏旌奬勿以匹夫匹婦而輕為阻抑勿以富家巨族而濫為表揚以副朕成俗化民實心彰善至意特諭雍正二年二月初二日御製聖諭廣訓序書曰每歲孟春遒人以木鐸徇于路記曰司徒修六禮以節民性明七教以興民德此皆以敦本崇實之道為牖民覺世之模法莫良焉意莫厚焉我聖祖仁皇帝久道化成德洋恩普仁育萬物義正萬民六六十年來宵衣旰食祗期薄海內外興仁講讓革薄從忠共成親遜之風永享升平之治故特頒上諭十六條曉諭八旗及直省兵民人等自綱常名教之際以至於耕桑作息之間本末精粗公私巨細凡民情之所習皆睿慮之所周視爾編氓誠如赤子聖有謨訓明徴定保萬世守之莫能易也朕纘承大統臨御兆人以聖祖之心為心以聖祖之政為政夙夜黽勉率由舊章惟恐小民遵信奉行久而或怠用申詔誡以示提撕謹將上諭十六條尋繹其義推衍其文共得萬言名曰聖諭廣訓旁徴逺引往復周詳意取顯明語多直朴無非奉先志以啓後人使羣黎百姓家喻而户曉也願爾兵民等仰體聖祖正德厚生之至意勿視為條教號令之虛文共勉為謹身節用之庶人盡除夫浮薄囂凌之陋習則風俗淳厚家室和平在朝廷德化樂觀其成爾後嗣子孫並受其福積家之必有餘慶其理豈或爽哉雍正四年十月初六日欽奉上諭恭紀首卷以王國棟為浙江觀風整俗使雍正四年十一月二十七日欽奉上諭恭紀首卷停浙江鄉會試雍正五年三月初三日欽奉上諭自古帝王致治諴民莫不以重農為首務書陳無逸先知稼穡之艱難詩載豳風備敘力家之力作論語云百姓足君孰與不足孟子云民事不可緩也蓋國以民為本民以食為天農事者帝王所以承天養人久安長治之本也我國家撫綏寰宇聖祖仁皇帝臨御六十餘年深仁厚澤休養生息户口日增生齒日繁而直省之內地不加廣近年以來各處皆有收成其被水歉收者不過州縣數處耳而米價遂覺漸貴閩廣之間頗有不敷之慮望濟於鄰省良由地土之所産如舊而民間之食指愈多所入不足以供所出是以米少而價昻此亦理勢之必然者也夫米榖為養命之寶既賴之以生則當加意愛惜而不可存輕棄之心且資之者衆尤當隨時撙節而不可縱口腹之欲每人能省一勺在我不覺其少而積少成多便可多養數人若人人如此則所積豈不更多所養豈不更衆乎飬生家以食少為要訣固所以頤神養和亦所以節用惜福也況脾主於信習慣便成自然每見食少之人其精神氣體未嘗不壯此顯而可見者至於各省地土其不可以種植五榖之處則不妨種他物以取利其可以種植五榖之處則當視之如寶勤加墾治樹藝菽粟安可舍本而逐末棄膏腴之沃壤而變為果木之場廢饔飱之恆産以幸圖贏餘之利乎至於煙葉一種於生人日用毫無裨益而種植必擇肥饒善地尤為妨農之甚者也小民較量錙銖且但顧目前而不為久逺之計故當圖利之時若令其舍多取寡棄重就輕必非其情之所願而地方官遽然繩之以法則勢有所難行轉滋紛擾惟在良有司勤勤懇懇諄切勸諭俾小民豁然醒悟知稼穡為身命之所關非此不能生活而其他皆不足恃則羣情踴躍不待督課而皆盡力於南畝矣朕聞江南江西湖廣廣東數省有一嵗再熟之稻風土如此而仍至於乏食者是地土之力有餘而播種之功不足豈非小民習於怠惰而有司之化導者有未至耶或者曰米穀太多則價賤而難於糶賣昔人有穀賤傷農之説諺語所謂熟荒者此則不必過慮假若小民勤於耕作收穫豐盈價賤而難於出糶朕必多發官價以糴買之使重農務本之良民獲利有餘資也朕平生愛惜米榖每食之時雖顆粒不肯拋棄以朕玉食萬方豈慮天庾之不給而所以如此撙節愛惜者實出於天性自然之敬慎並不由於勉強且以米榖乃上天所以生養萬物者朕為天下生民主惟有敬謹寶重仰冀天心默佑雨暘時若歲獲有秋俾小民家有蓋藏人歌樂土朕既為億萬生民計不敢輕忽天貺爾等紳襟百姓獨不自為一身一家計乎朝夕生養之需既受上天之賜若果加意愛惜隨時撙節則天必頻頻賜賚長享盈寧之福若恣情縱欲暴殄天物則必上干天怒不蒙賜賚而水旱災祲之事皆所不免其理豈或爽哉又聞江西廣西地方竟有以米榖飼養豚豕者試思榖食之與肉食孰重孰輕孰緩孰急而乃以上天之所賜小民終歲勤苦之所獲者為豢養物類之用豈不干天和而輕民命乎朕所以惓惓訓諭者惟期天下之人專務本業以杜浮靡愛惜物力以圖久逺共體朕敬迓天庥勤恤民隱之意則爾等家室必益至於豐饒爾等子孫必永綿其福澤思之思之毋忽朕言將此曉諭內外官民人等並通行逺鄉僻壤咸使聞知特諭雍正六年三月初三日欽奉上諭覽福建巡撫常賚奏稱羅源縣孝子李盛山割肝救其母病母病愈後李盛山傷重身故請加旌表部議以割肝乃小民輕生愚孝向無旌表之例應不準行朕念割肝療疾事雖不經而其迫切救母之心實難得而可憫已加恩準其旌表矣嘗讀韓愈之文曰母疾則止於烹粉藥石以為事未聞毁傷肢體以為養茍不傷於義則聖賢當先衆而為之矣又讀朱子書曰割股固自不是若誠心為之不求人知亦庶幾今乃有以要譽者是先儒論及此者屢矣本朝順治年間定例割股或致傷生卧冰或致凍死恐民倣效不準旌表伏思我世祖皇帝聖祖皇帝臨御萬方立教明倫與人為善而於此例慎豫旌表者誠乃天地好生之盛心聖人覺世之要道也視人命為至重不可以愚昧而誤戕念孝道為至𢎞不可以毁傷為正理立法垂訓實有深意存焉但向來地方有司未嘗以聖賢經常之道與國家愛養之心明白曉諭開導編氓是以愚夫愚婦救親而捐殉夫而殞命者往往有之既有其事若不豫以旌表恐無以彰其苦志而慰其幽魂所以數十年來雖定不豫旌表之例而仍許其奏聞且有邀恩於常格之外者仰見聖祖皇帝哀矜下民之聖心固如是之周詳而委曲也孝經曰身體髮膚受之父母不敢毁傷孝之始也孟子曰事孰為大事親為大守孰為大守身為大此皆言人子一身為父母之遺體雖一髮一指不可偶有虧損以傷父母之所貽也孔子曰父母惟其疾之憂蓋父母愛子之心無所不至倘有疾病尚以為憂設有不肖忤逆之子父母且恕而矜之其純孝之子而父母之憐愛又當如何也豈有以已身患病之故割其子之肝肉充飲饌而和湯藥其父母之心斷無有不驚憂慘惕不安之理也若因此而至於傷生又豈父母所忍聞者乎夫父母有疾固人子所當盡心竭力之時而孝道多端實不容效命捐軀於一節孔子曰生事之以禮死葬之以禮祭之以禮是人生孺慕之誠原通百年而無間者也人子一身承先啓後負荷甚巨若舍生殞命於倉卒之間而忘宗祀繼續之重恐非所以為孝也況人子於親本乎天性儻能盡至誠純孝之實則親病雖篤呼籲請禱力省一身之過誓願為一正人如此必能感天地動鬼神何須割肝刲股以為圖生之良劑乎家庭之行惟在至誠至敬善體親心不必以驚世駭俗之為著奇於日用倫常之外也至若婦人從一之義醮而不改乃天下之正道而其間節婦烈婦亦有不同者烈婦以死殉夫慷慨相從於地下固為人所難能然烈婦難而節婦尤難蓋從死者取決於一時而守貞者必歷夫永久從死者致命而遂已而守貞者備嘗其艱難且烈婦之殉節捐軀其間情事亦有不同者或迫於貧窶而寡自全之計或出於憤激而不暇為日後之思不知夫亡之後婦職之當盡者更多上有翁姑則當奉養以代為子之道下有後嗣則當教育以代為父之道他如修治蘋蘩經理家業其事難以悉數安得以一死畢其責乎是以節婦之旌表載在典章而烈婦不在定例之內者誠以烈婦捐生與割肝刲股之愚孝其事相類假若倣效者多則戕生者衆為上者之所不忍也向來未曽通行曉諭朕今特頒諭旨著地方有司廣為宣布務期僻壤荒村家喻户曉俾愚民咸知孝子節婦之自有常道可行而保全生命之為正理則倫常之地皆合中庸不負國家教養矜全之德矣倘訓諭之後仍有不愛軀命蹈於危亡者朕亦不概加旌表以成閭閻激烈之風長愚民輕生之習思之思之特諭雍正六年八月二十九日欽奉上諭恭紀首卷浙江士風丕變著照舊鄉會試雍正七年三月初四日欽奉上諭直省各處富户其為士民殷實者或由於祖父之積纍或已身之經營操持儉約然後能致此饒裕此乃國家之良民也其為鄉紳有餘者非由於先世之遺留即已身之俸祿節制謹度始能成其家計此乃國家之良吏也是以紳襟士庶中之家道殷實者實居五福之一而為國家所愛養保護之人則爾等本身安可不思孳孳為善以永保其身家乎夫保家之道若奢侈糜費固非所以善守而慳吝刻薄亦非所以自全周禮以鄉三物教萬民有曰孝友睦姻任恤可知公財行惠任恤之道與孝友而並重者也蓋凡民之情賤者忌人之貴貧者忌人之富彼窮乏之人既遊間破耗自困其生又皆不知已過轉懷忌於溫飽之家若富户復以慳吝刻薄為心朘削侵牟與小民爭利在太平盛世年穀順成之時固可相安從來遇荒歉之時貧民肆行搶奪先衆人而受其害者皆為富不仁之家也逮富家被害之後官法究擬必將搶奪之貧民置之重典是富戶以斂財而傾其家貧民以貪財而喪其命豈非兩失之道大可憫惻者乎朕為此勸導各富户等平時當以體恤貧民為念凡鄰里佃户中之窮乏者或遇年穀歉收或值青黃不接皆宜平情通融切勿坐視其困苦而不為之援手如此則富户濟貧民之急貧民感富户之情居常能緩急相周有事可守望相助忮求之念既忘親睦之心必篤豈非富户保家之善道乎從來家國一理若富户能自保其身家貧民共知衛夫富户一鄉如此則一鄉永靖一邑如此則一邑長寧是富户之自保其家猶富户之宣力於國也朕臨御以來屢經人條奏民間貧富不勻請行限田之法乃至逆賊曽靜私著謗書謂方今輕徭薄賦惟利於豪強兼并之家與貧民無涉非復行井田不能養贍百姓等語朕思此等怪謬支離之説乃理勢所萬不能行者夫天下富者一而貧者百以一人之有餘欲濟衆人之不足貧者未必便能成立而富户無辜已受摧殘矣此乃懷欲窮天下之賊論有此情理乎朕既知其必不可行若但令地方出示曉諭陽奉陰違朕實恥而不為若以不能行之事委之各督撫以示德於貧民使之感朕恩意而以奉行不力之故歸怨於各督撫等又朕所不忍為者是以特頒諭旨告誡爾等富户為富户者當知已之得於天者甚厚常存濟人利物之心行救困扶危之事敦睦宗族賙恤鄉鄰下逮佃户傭工皆加惠養則人人感其德意即可消患於未萌況積善之家必有餘慶種福果於天地之間子孫必長享豐厚豈不美歟著各省督撫將朕此旨通行該屬之鄉紳士民人等共知之料朕赤子良民必不負朕期望之誠意也特諭雍正七年六月初六日欽奉上諭遊惰之民自昔治天下者之所深惡若好為賭博之人又不止於遊惰而已荒棄本業蕩費家資品行日即於卑汚心術日趨於貪詐父習之則無以訓其子主習之則無以制其奴鬭毆由此而生爭訟由此而起盜賊由此而多匪類由此而聚其為人心風俗之害誠不可以悉數也大凡為不善之事者雖干犯功令猶可得微利於一時而獨至賭博則今日之所得明日未必能保若合一年數月而計之勝者與負者同歸於盡此天下之人所共知者而無如邪僻之人一入其中即迷而不悟且甘為下賤而不辭亦大可悲矣數年以來屢次降旨嚴禁而此風尚未止息者則以製造賭具之尚有其人而有司之禁約未曾盡力也百工技巧之事可以獲利營生者何事不可為而乃違條犯法製此壞風俗惑人心之具其罪尚可言乎嘗思賭博之風所以盛行父兄為之子弟在旁見而效之家主為之奴僕在旁見而效之甚至婦人女子亦沈溺其中而不以為怪總因習此者多故從風而靡者衆也假若嚴行禁止使人不敢再犯則日積月纍後生子弟無從而見即無從而學此風自然止息無俟條教號令之煩矣凡地方大吏有司均有化民成俗之責而乃悠悠忽忽視為泛常安辭溺職之咎今特定本地方官員勸懲之法以清其源嗣後拏獲賭博必窮究賭具之所由來其製造賭具之家果審明確有證據出於某縣將該縣知縣照溺職例革職知府革職留任督撫司道等官各降一級留任如本地有私造賭具之家而該縣能緝拏懲治者知縣著加二級知府著加一級督撫司道等官紀録二次將此勸懲之法永著為例於雍正庚戌年為始著該督撫通行曉諭咸使聞知特諭雍正八年十一月二十一日欽奉上諭民間借貸一事所以通彼此之有無濟一時之緩急意本善也乃有貪利營私之徒往往乘人匱之勒索重利如借貸米穀則不但加三起息竟有加五或多至加倍者小民偶爾窘迫止顧目前及禾稼登場終歲辛苦之所獲不能復為己有雖豐稔之嵗僅足供償債之需一遇歉收之年則束手無策必致息上起息纍年不能楚結且貽纍於子孫而挾資射利乘急多取者視為固然全無矜憐憫息之意貪叨為性澆薄成風此亦世道人心之患也夫緩急亦人所有周禮三物六行孝友睦姻而繼以任恤蓋儕類里黨有急則相倚任有困則相賑恤此鄉鄰風俗之美王化所先而其人以仁厚居心亦所以長享福澤於勿替此即仰邀天地神明賜佑休徴之根本也從來窮通富貴境遇不常幸而富貴有餘是天之待我獨厚則當思濟人利物恤災扶困以廣行善事仰答天恩若以天之厚我者特為剝削貧人之具不獨上天覽臨必加譴責即返之於心亦忍為之乎凡屬貪鄙之人利令智昏以為如此可以致富獨不思貧富有一定之數善惡有不爽之報假令為富不仁者皆得擁厚資以長子孫而樂善好施者必致匱乏終身矣自古迄今有此天理乎嘗見不義之財得之若易乃享受未久或耗於意外之災患或敗於不肖之後人是知刻薄之行損人適以自損仁厚之風利人還以自利也此種盤算惡薄之俗若不曉諭化導遽以官法繩之恐轉開其借貸之路非所以為便於窮民故特將天道好還循環往復之道委曲詳明覺悟貪夫薄夫而啓其良心杜其敝俗凡有借貸銀錢米穀者加一加二起息尚屬情理可行若太多則誠為富不仁矣著該地方有司將天理人心時時訓諭所屬之人以化其殘忍刻薄之習倘勸導既久如下愚頑惡之性不移尚有為富不仁重利盤放者確訪一二人加以懲治以警其餘如此庶惡習可以轉移貪風可以止息也如有無藉棍徒因朕此勸導之訓諭或借端圖賴或生事強借以擾害良善溫飽人家者尤當加以重懲不可寬貸但全賴地方有司奉行勸導之公當勤誠也特諭雍正十三年十一月初二日欽奉上諭朕聞外省百姓有生計稍裕之家每遇喪葬之事多務虛文侈靡過費其甚者至於招集親朋鄰族開筵劇飲謂之閙喪且有於停喪處所連日演戲而舉殯之時又復在途扮演雜劇戲具者從來事親之道生事死葬皆必以禮得為而不為與不得為而為之者均為非孝是知各循其分乃能各盡其孝而初不在以奢靡相尚也況當哀痛迫切之時而顧聚集親朋飲酒演劇相習成風恬不知怪非惟於理不合抑亦於情何忍此甚有關於風俗人心不可不嚴行禁止著各省督撫等通行明切曉諭嗣後民間遇有喪葬之事不許仍習陋風聚飲演戲以及扮演雜劇等類違者按律究處務在實力奉行毋得姑為寬縱特諭雍正十三年十一月初十日欽奉上諭朕聞吉凶異道不得相干故娶在三年之外而聘在三年之內者春秋猶以為非禮記稱大功之末可以冠子可以嫁子父小功之末可以娶婦已雖小功既卒哭可以冠娶妻三年之喪創深痛巨茍有人心者必宜於此焉變矣乃愚民不知禮教起於皂𨽻編氓之家有慮服喪之後不得嫁娶乘父母疾篤及殯殮未終而成婚者其後商賈中家多有之士大夫亦間為之而八旗效之朕實憫焉自今伊始自齒朝之士下逮門內有生監者三年之喪未終喪不得嫁娶違者奪爵褫服其極貧皂𨽻編氓父母臥疾呻吟床褥必賴子婦以供薪水治饔飱者聽其迎娶盥饋俟疾愈喪畢而後成婚古者禮不下庶人其斯之類歟曽子問親迎女在途而壻之父母死女改服布深衣縞總以趨喪亦此義也其商賈中家不必以士大夫禮繩之然人性皆善朕知其必有觀感興起而不忍自同於氓隸者矣特諭雍正十三年十一月二十三日欽奉上諭民間惡習無過於博戲有或陷溺於其中則子弟欺其父兄奴僕背其家主逃亡盜賊之源鮮不由此又有市井姦凶十五為羣聚黨鬭狠為患於鄉閭或強爭市肆或凌挾富人朝罹官法夕復逞凶其惡不減於劫盜至耕牛為農事之本民賴以生故惟郊壇宗廟社稷嶽瀆之重乃用太牢而愚民妄肆屠宰價賤於羊豕悖莫甚焉是以皇考涖政之初即為大禁嚴飭百吏訪緝姦凶造賭具者有刑屠耕牛者有罰執法不移由是鬬狠􅒬博之莠民屏息而不敢出內則五城衢巷市竊之賊日稀外則商旅恬安宵行夜宿少逢劫盜田疇益治井里宴眠摩以歲月乃克致此朕承百度肅清之後故庶政皆從寬大欲中外吏民蒸然向化遷善逺罪而不自知然所宥者災眚所恤者善良非謂怙終不悛者舉可縱釋也近聞姦民倡為流言以惑衆志詭云步軍統領緝獲賭博已經奏聞朕置而不問又屠牛之禁亦開昔周公立造言之刑重罷民之罰謂非此不足以定民志而成化道也敕下步軍統領暨五城御史密訪嚴緝造為此言者以正典刑各直省州縣有不能治其境內犯此三禁者該督撫即時參究其或失察朕亦不能為大吏寬昔皇考多方鼓舞故告發賭博𨽻民加賞有司議敘而奉行失宜間或有生事自以為功者自今以往其各實心查禁若不能禁賭及造賭具者必以不職罪之打降及屠牛亦然惡萌復生將隳皇考已成之治化朕滋懼焉爾諸臣其共凛之特諭欽此謹按浙土風俗各郡屬邑雖有不同而觀感興起喁喁嚮化之心則無不同也百年以來伏荷聖訓屢頒諄切教誨恩威並濟化導多方不啻面命而耳提家喻而戶曉由是十一郡之民莫不感恩戴上諭德返朴還淳以成一道同風之治雍正五年欽奉令和碩怡親王大學士張廷玉等傳諭各省大吏諭旨將厯年所奉日用者即敬謹刋刻通行頒示所屬凡切於民生聖訓地方令百姓抄録記載俾僻邑逺鄉咸聞各遂其生各復其性以仰副聖主教養萬方之至意隨經欽遵刋刻頒行尚恐小民或有未經抄録或久而記載偶遺者兹特恭紀於風俗門內以垂訓萬世云浙江通志卷一百
