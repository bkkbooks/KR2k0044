body:
  text: 浙江通志卷二十二形勝周禮有司險之掌凡山林川澤之阻咸周知之所以順地利而奠民生也兩浙環地數千里江山四塞雖金城天塹何以加兹聖朝徳孚寰宇衆志成城所恃以鞏金湯者不徒在險而慎固封守必因地利則形勢宜審焉志形勝浙江全省周禮職方氏東南曰揚州其山鎮曰㑹稽藪曰具區川曰三江浸曰五湖國語吳之與越三江環之越絶書吳越為鄰同俗并土西州大江東絶大海兩邦同城相亞門户吳越春秋東至於句甬西至於欈李南至於姑末北至於平原史記貨殖𫝊浙江南則越東有海鹽之饒章山之銅三江五湖之利亦江東一都㑹也漢書嚴助傳㑹稽東接於海南近諸越北枕大江晉書諸葛恢傳今之㑹稽昔之闗中左思吳都賦江湖陂險物産殷充唐書天文志自南河下流南涉江淮為吳越負海之國貨殖之所阜也宋史地里志東際海西控震澤北又濵於海蘇軾表忠觀碑吳越地方千里帶甲十萬鑄山煮海象犀珠玉之富甲天下大城其居包絡山川左江右湖控引島蠻歐陽元江浙行省興造記北枕江淮西放彭蠡南極於海供給當天下半圖書編浙江古揚州地崇山巨嶺所在限隔然嘉湖與江淮相表裏嚴衢以徽饒為郛郭左信都右閩闗大海東蟠繞出淮揚之域四通八達之區也嘉靖浙江通志維浙隨山坼土積岨盤岡瀦為大澤環以巨海維浙西山導自天目西北折於卞山南達於富春峯巒起伏雲矗霄馳越垂霤踰百丈萃於餘杭之徑山錢唐之龍山東北達於金牛以入於澉浦諸山維浙東山導自江郎泉山浮葢至於翠光岑山爛柯東北折至於勲山九際臺湖縉雲大陽金華覆釜大盆至於東北勾乗玉京秦望㑹稽東過嵊山天姥達於天台華頂北至囬明太白東折於蛟門虎蹲峙為海門西達於括蒼少微至於大梁南田大羅天臺底於雁蕩横為海嶠維浙源西南導瀫水合東白大盆之源出為婺水至於蘭溪東南導烏傷東白大盆之陽東流為浣浦西絡漁浦皆北流以入於江開化夀昌導歙西來流入於江導新安水自遂昌達淳安絶分水下於桐溪紫溪導天目之南過新城下富陽皆東南流以入於江天目導苕滙為霅溪入於具區栝蒼導洄溪出於青田東南至永嘉滙為蜃江過飛雲横陽而入於海導剡溪合東小江踰東江為曹娥之水達於海四明導姚江東帶慈谿達於鄞江傳於大浹入於海浙之山川兹其大都云萬厯杭州府志壤地千里山川序列遐邇錯布道路四達方輿紀要崇山巨浸包絡四維舊浙江通志浙江析揚之南跨閩之北梅嶺僊霞為咽喉具區三江為藩蔽龕赭虎蹲松門大羅為門户龍鬬蒼嶺為屛障舊浙江通志環地數千里聨絡江海郡邑之間莫不倚高阻深置亭列障而僊霞一山為入閩孔道尤有一夫當闗之勢杭州府錢塘縣附郭仁和縣附郭水經浙江經其南范仲淹知杭州謝表江海上游東南巨屛蔡襄雙門記杭於浙為大州提支郡數十道通四方海外諸國蘇軾六井記潮水避錢塘而東擊西陵所從來逺矣沮洳斥鹵化為桑麻之區久乃為城邑聚落凡今州之平陸皆江之故地程珌淨慈羅漢堂記有濕紅映地飛翠侵霄簷轉鸞翎堦排鴈齒星垂珠網寳殿洞乎琉璃日耀璇題金椽聳乎玳瑁楊簡莫能名齋記東望大江巨濤際天西望錢湖玉潔如鏡程珌三賢堂記眷言吳越之中夙號東南之盛雲擁雉堞侵漢連霄鱗比坊衢飛塵踏霧李良民順濟廟記南薄海門江水浩淼無際天造是險以示東南形勢桯史行都之山肇自天目清淑扶輿之氣鍾而為吳葛灃錢塘賦據東南之都㑹號繁盛之樂土山川秀麗井邑浩穰周袤連亘五十餘里虎踞鱗伏羅峯列岫内足以衛居止外足以禦戎冦盧襄西征記杭州横空列城為國大藩羣水赴衆山截褧伯宣浙江潮候圖説龍山踞其首西湖蟠其腹天竺聳其肩東山臥其背逺引甌閩而近控吳越楊孟瑛開西湖路疏南跨吳山北兠武林左帶長江右隣湖曲山停水聚元氣融結西湖游覽志山奔水導而逆以海潮則氣脈不解故東南雄藩形勢浩偉生聚繁茂徐渭鎮海樓記城跨湖山其四面有名山大海江湖潮汐之勝一望蒼茫可數百里至於島嶼浩渺亦宛在掌股之間髙翥長搴真有俯壓百蠻之氣舊浙江通志錢塘天目西来龍飛鳳舞右臨湖曲左帶長江形勢壯於東南山川甲於郡國仁和外帶江海内抱湖山浙右名區南隣句踐北枕闔閭海寧縣釋贊寧重修志愿寺序錢塘屬邑鹽官為最有浙之朝陽為吳之右白鋪江練青㸃海門元史地里記海寧東南皆濵巨海舊浙江通志邑據三吳上游邊臨大海文堂峽石之對峙黄灣石墩之聫綿海寧縣志東俯滄溟西極沃壤南為藩郡之股肱北作崇桐之屏蔽富陽縣葉廣居城隍廟記濤江杭其陽羣山走其隂雉堞周宏淵渟瀦冽陳觀吳公隄記居杭上游背山而江下通錢塘潮汐往來上接衢婺睦歙諸水會流毎天風撼濤奔湧激射號為險絶張居傑城隍廟記形勝雄偉風氣完厚長江縈帶乎南羣山旋繞乎北高城深隍山水自然之險餘杭縣洪咨夔餘杭縣署記餘杭苕霅之津㑹嘉靖餘杭縣志西去九十里皆深山大谷崎嶇險峻中有平壤流泉冬夏不竭自南以東地漸寛衍諸水支脈通接戴日强南湖記苕溪去縣治不數武横不越尋丈上接天目下通武林吳興嘉禾諸郡邑天目萬山之水支分派合㑹歸於此陳善南湖考餘杭居天目萬山之下扈大亮陳明府君廟記大溪横截衆水合流臨安縣蔡襄遊徑山記偃松之南一目千里吳江之濤可挹越岫之桂可攀蘇軾表忠觀碑天目之山苕水出焉龍飛鳳舞萃於臨安黄鼎象臨安縣舊志序山􅌑瓏九折自東天目之勝迤北而通徑山幽䆳奇曠吳越希有其水為苕溪合九水雲源碧澗相映帶臨安縣志東有天柱西有天目前有石鏡後有凌霄新城縣羅隠東安城記大藩襟帶許自譙樓記邑在叢山石齒間孫清新城縣學記山迴以秀水繞以清謝夢生新城縣學記白道穿村清溪照郭山有千丈之高懸水有七溪之交織新城縣志四面皆山二溪合注以達於江險阻之區於潛縣水經注於潛縣北山極高峻崕嶺竦疊東南連山挾水兩峯對峙反項對石往往相捍邵文炳興復水利記崇岡峻嶺回繞重列水之發於山三十六源張崑玉岞崿山記武林山脈發源天目潛邑適踞其麓枕西目為屛障綿亘極天中藏峭壁絶巘詭奇不可殫述舊浙江通志金樓南峙岞崿西圍於潛縣志九鎖交陳雙峯對峙於潛縣志潛為山國岡巒盤錯川原紆迴袤衍廣輪甲於省會大縣昌化縣王禕昱嶺關銘序昱嶺在杭徽之交因山為險與千秋獨松稱三闗而三闗莫險於昱嶺錢鉞譙樓記昌邑僻介萬山中山深而水縈華文甫昌化縣志序重山疊嶂南北要津江浙襟喉萬厯昌化縣志東連省㑹西接徽饒高山崇嶺崒嵂插天培塿崦嵫起伏綿亘彌望皆是昌化縣志紫㣲銅坑峙其東南千秋黄花枕其西北邃壑深溪環列四塞嘉興府嘉興縣附郭秀水縣附郭水經注柴辟呉楚之戰地備候於此故謂之辟塞是以越絶稱呉故從由拳辟塞渡㑹稽凑山陰郁皋老建興寺碑左控姑蘇右接毘陵陳世昌南湖賦東㑹呉淞西控禦兒支流旁達聨絡相維良田沃衍灌木叢泓溝塍綺錯原隰縱横方輿勝覽封圻廣袤是為㩦李之區井田豐登庸表嘉禾之瑞貝瓊環碧堂記㩦李幽湖自南湖來洄而為洑旋而為渦至是左右囘抱青停黛畜尤形勝之所萃焉𢎞治嘉興府志巨海環其東南具區浸其西北左杭右蘇襟江控湖四望如砥海濵廣斥鹽田相望鎮海諸山隱隱列拱百川環繞而鴛鴦一湖渟蓄其南誠為澤國之雄東南一大都㑹也屠中孚嘉興縣志序距溟海漘大澤控峯􅍩引錢塘延袤廣輪幾及千里李貞開煙雨樓賦控壓呉岫彈赫越疆南引㑹稽以濴滙北連震澤以清漻許煥烟雨樓詩序鄉名醉李邑號嘉禾控天目而引具區帶諸溪而枕滄海舊浙江通志嘉興居山澤相錯之介迺呉越交戰之區秀水東㑹滬瀆西控語溪襟帶具區獨攬其秀嘉善縣姚𢎞謨築城碑記三吳門户通海臨􅍩萬厯嘉善縣志地當江浙之交為古吳奥區北枕長洲東接吳淞西連震澤其幅員雖不甚廣而控馭逺矣海鹽縣𢎞治嘉興府志大海環其東南諸山踞乎左右西引苕溪北控吳淞河水百折縈迴甫田一望如掌王穉登海鹽城記維此鹽官聿稱巖邑輔檇李而作鎮枕滄溟以奠域海鹽縣圖經鹽故疆前浙汜後淞浦至寥廓矣秦駐山縣之主山體既雄拔峯尤逺秀山脚半插海中海鹽縣志秦駐山獨秀聳長牆石帆紫雲金粟參差環列登高南望翠屛青㦸奇峭千狀而俯瞰雲濤浩然東際一碧萬里亦大形勝也石門縣沈括崇徳縣學記崇徳居山澤之介孔道四出墟壠網絡祝文彦語溪學宫賦地當浙右土號上腴脈發崑崙乳長天目苕水出其南霅水拱其北舊浙江通志左玉灣右金鵞南枕皋亭北通震澤走馬為吳越分疆之地語兒乃吳人棲兵之所平湖縣陸杲東湖戲珠亭記九水洋洋會而為湖山川靈淑之氣所鍾過銘簋九山志序乍浦海陬巋然九峯列峙以扼南溟之衝舊浙江通志九山列其南三􅍩滙其北溪塘接其西滄海瀕其東蔽金山於右翼海鹽於左桐鄉縣𢎞治嘉興府志四境皆平疇環以支港負具區面海鹽東接秀水西連玉溪桐鄉縣志地多平衍無名山大川然地脈盤旋發源者逺一丘一壑不可謂非三吳秀麗之所毓也湖州府烏程縣附郭歸安縣附郭越絶書太湖周三萬六千頃其千頃烏程也顧況湖州刺史㕔壁記江表大郡吳興為一山澤所通舟車所會元和郡縣志五湖之表倪思經鉏堂記霅川平波漫流有水之利而無水之害羣山秀氣可掬城中二溪横貫此天下所無也李直方白蘋亭記吳江之南震澤之隂幅員千里棊布九邑弁山屈盤而為之鎖五溪叢流以導其氣魯伯能東禪寺記崇巒逺峯盤礴秀氣深澤碧灣曲折浚流其流出於天目以入苕霅山澤之勢雄深秀拔葉適北村記天下山水之美吳興特為第一其山脈地絡融液而浸灌者莫非氣之至清渟止演漾澄瑩紺澈數百千里趙孟頫吳興賦蒼峯北峙羣山西迤雙溪夾流泓渟皎澈山川映發沖和攸集星列乎斗野勢雄乎楚越宇文公諒府治記吳興為東南望郡天目分秀雙溪合流金葢諸峯峙其陽蒼弁具區亘其隂貝瓊西翠樓記吳興七十二弁連延若海濤起伏潘士遴康山壩記峙隱包秀棲賢居其隂康山居其陽兩山環抱回固谾谾范公榘重建溪光亭記吳興僻處東南山水之秀以清逺聞苕霅二溪交流蜿蜒一瀉二百里許而達於震澤四山環拱羅列光景㝠晦昔人以水晶宫稱之劉麟逸老堂記郡城蹲踞弁山三川五浸布濩其北天目諸峯薈萃於南其陂塘沼渚循山而下者漸廣諸山環繞者漸近漸伏道塲車葢二山又南扼諸水導漾其中王叔承道塲山集序郡之南峻峯迴嶺樹刹雲霄控五湖引苕霅瞰武林天目鬱鬱巨麗西吳最勝舊浙江通志烏程五溪迎碧萬疇圍青疊障右環太湖後枕坡公賦峴山之句司馬有嘉郡之稱歸安虎疊千巒龍灣百灌含山隱起浮玉參差覩山水之清逺真東吳之善地烏程縣志烏程山脈發於天目南支由武康北支由長興入境西北迤南巒嶂層突勢若遊龍散而之東則㸃㸃星羅天然圖畫陸幼學峴山逸老堂社田記峴山首峙郡城南道塲車葢諸峯如簪筆几案碧湖如鑑浮玉如螺蕩漾岩崿於空明藻荇間歸安縣志東潯港西餘不南含塘北運河流環而生氣結前含山後飛英右東林左烏鎮秀列而人文開張邦彦浙西水災疏湖州水壑也雖與杭嘉稱為唇齒之郡然杭則上流也嘉則杭之分流也至於湖則兩引天目諸山之水獨滙於太湖譬則釜底也長興縣志長興之水自南來者於梅溪入境為苕溪自西南来者為四安港從西来者為合