勢操七閩之闗鍵鞏兩浙之藩籬開化縣胡儼厯科題名碑記衢之上游山秀而卓水清而駛開化縣志縣居郡西北據浙江上游與嚴徽饒信接界金錢左聳臥佛右偃鳳凰翔其前鍾山峙其後嚴州府建徳縣附郭余植建徳縣題名記面受二江背負一龍六邑冠冕余植進士登科題名記千峯聳翠雙湍瀉玉周望建徳縣學記原隰平衍川湖襟帶壯麗之觀舊浙江通志面受重江背負峻嶺高峯聳秀於其東建蒼環繞於其西建徳縣志北枕龍山南襟丁水東眺雙臺雲烟聳翠西連疊嶂漸歙分流淳安縣王遂清溪橋記邑之山溪宏麗清泚葢上受歙流下過錢塘而注之海南達婺衢饒信逺及甌閩無不於此焉出方回峽石賦厯故鄣之遺區溯桐江而西上百灘跳以湍駛萬峯閴其清朗維還淳之古邑割歙封之東壤商輅淳安縣學尊經閣記峯巒環拱如屏如障徐楚蜀阜十景賦羣峯龍驤而北注衆壑馬突而南來東山埒泰岱之雄三峽比瞿塘之險舊浙江通志東連建徳西接新安青溪環其前蛟峯鎮其後吳越封疆從兹交㑹桐廬縣吳均與朱元思書奇山異水天下獨絶皇甫師中桐廬縣城門記睦州之境桐廬最居其要雙溪合流而泛於江陸之所至西達閩廣北連吳越舟車旁午左右輻輳井閭繡錯古號佳邑新定續志桐廬溪山秀妙陸魯望所號為清凉國舊浙江通志桐君拱揖牛山突起襟大江而趨吳㑹帶兩浙而赴錢塘桐廬縣志桐地襟山帶河控吳越之上游作徽寧之外蔽江右閩廣往返必經綏一隅以絡四方實稱扼要之區遂安縣水經注浙江又左合絶溪溪水出始新縣西北逕縣故城南為東西長溪溪有四十七瀨迅流驚急奔波聒天舊浙江通志南呈織宿西拱石英婺峯當牛女之墟義山據武强之勢夀昌縣方道叡夀昌縣學記邑治負山面溪山川高深風氣完厚貝瓊翠屛軒記夀昌羣山旁圍一水中亘而東北一山却立千仞者曰屏風嚴州府志嚴山鎮其背艾溪環其膺羣峯迴合如城郭狀夀昌縣志據嚴陵之上游扼甌歙之要險分水縣胡宗憲夘巽二峯建塔記嚴以烏龍為鎮崚嶒雄峙盤踞百餘里折而東雙峯矗起是為夘方其馬目山蜿蜒自西南來昂伏攅蹙駐於南是為㢲方徽婺二水紆徐縈迴繞夘㢲而東之夘於先天卦位為離離㢲相薄二塔並聳則形勢全而靈光煥其文明之象乎溫州府永嘉縣附郭丘遲永嘉郡教控山帶海利兼水陸東南之沃壤一都之巨會王十朋夀聖白巖院記震旦東南名山雁蕩白巖仙溪峯聳而奇水清而駛王十朋綠畫軒記峯巒奇偉林麓靜深環合映帶藍黛之色與天連碧方輿勝覽郡當甌越之衝負山海之隘環地千里元史地理志東界鉅海西際重山黄溍海堤記俯瞰大海江出郡城之後東與海合王瓚溫州府志序溫在浙東極處枕江界溟天設奇勝危峯層巒環拱四境蟠幽宅阻一巨都㑹鄧淮溫州府志序浙十有一郡而溫獨逺枕閩福控台括實東南沃壤依山為城環海為池溫州府志山川秀麗甲於寰中二雁爭雄九斗交映舊浙江通志楠溪太平險要扼絶江繞郡城東與海會斗山錯立冦不能入溫州府志左連海岸右接括山閩浙二水作其襟帶台明兩州為其堂奥葢瀕海之國此亦一保障云樂清縣侯一元城鶚頭碑記後所犄角内地斯固其外海壖要害之處列障戍兵舊浙江通志樂清前臨巨海後擁羣山九斗文峯蟠其左蕭臺西岑居其右樂清縣志小山中峙正當海口名曰印嶼為邑之案自南而東列置烽堠以控制盤石蒲岐防遏海道其山川宏麗葢他邑鮮儷焉平陽縣嘉靖浙江通志雙鳯前分蛾眉後列江貫横陽地連雁蕩平陽縣志平邑東南濵海西北抵山兩浙咽喉八閩唇齒瑞安縣林孚濟涉亭記瑞邑城臨江滸南達平陽西抵泰順逺連閩越舊浙江通志左繞文峯後環棲隠瑞安縣志大海巨浸界其東大羅雲峯諸山亘其北雲江襟其南西南則閩括萬山之支腠泰順縣葉適泰順縣城垣記泰順為甌之西鄙接壤閩括重山迴谷實為深僻之地萬厯溫州府志泰順為邑東有龍鬬大川西抵福安高山飛龍山峙其南舞鳳山倚於縣治之北山川秀麗林木深阻舊浙江通志飛龍南繞舞鳳北環栝閩交壤形勝天設處州府麗水縣附郭陶𢎞景對謝中書啓高峯入雲清流見底兩岸石壁五色交輝青林翠竹四時具備元和郡縣志湍流險阻九十里間三十六灘方輿勝覽連浙郡控閩山栝蒼彚紀東飲甌江西挽閩嶠大溪繞其南層峯鎮其北東南之名區也栝蒼彚紀麗水東北以桃花隘稽勾嶺為門户以圳頭石塘為襟喉崇禎處州府志處州在浙南鄙接壤閩建北界台婺東引甌越西交三衢萬山中一都會也青田縣方輿勝覽羣山倚天湍流據險劉基湖山義墪記青田之山有泉滙而為潭入谷是為高湖之源其上有奇峯絶巘大小盤迴獻奇納秀崇禎處州府志青田東南接壤永嘉水陸所會實山海襟帶之區舊浙江通志左盤括蒼右據永嘉前臨大川後負崇岡南田環匝地勢平曠青田縣志羅山為城塹江為池百盤棧石險鑿天梯七十飛灘直奔斗口右接括州為材木薪芻之外府左連蜃海實魚鹽粟米之中庖縉雲縣崇禎處州府志羣峯倚天所在阨塞蒼嶺桃花之隘有一夫當闗之勢茭嶺黄龍屯集防禦亦磐石之固也縉雲縣志蒼嶺峙其東茭嶺阻其西桃花隘其南黄龍控其北松陽縣嘉靖浙江通志馬鞍青䝉列乎其東雲巖翠屏峙乎其西崇禎處州府志松陽郡西上游西北以赤溪龍虎坳為扄鑰而竹峪為尤要東南以寨頭大隂口為藩籬而南嶺為最高松陽縣志龍脈逢源擁馬峯而立極鰲輿列蔓憑牛嶺以為宗趨東則萬脈分流以入於海踰西則千溪共滙以入於江遂昌縣湯顯祖遂昌縣土城碑記遂昌治萬山谿壑中介長松龍泉猶毘境也西北而南走衢嚴婺鄣犬牙信州以達於閩綿迤奥絶崇禎處州府志遂昌郡西北巖邑北抵龍游西南通龍泉而以新嶺貴義為襟喉西北接西安西距江山而以龍鼻頭周公嶺為鎖鑰北設礱口寨以横遏閩浦之衝處州府志環邑山倍於水左有土鼔之異右有文筆之奇瑞山屹其前兑谷擁其後白馬蜿蜒飛鶴迴翔兩溪夾流一水東㑹括西名區也遂昌縣志襟帶龍泉聨續麗水景寧星峯錯落於前松陽喬阜環翠於後紆徐秀特隠然形勝之美龍泉縣宋濓看松菴記龍泉多大山其西南百餘里諸山為尤深崇禎處州府志龍泉當浙閩之交層巒疊聳雙溪横貫鳳凰翶翔石馬騰踏北山舒翼抱於左桃源回首拱於右直前則修橋傑閣擁後則九姑靈蹤地勢夷曠他邑莫及龍泉縣志縈迴盤錯於東者武溪吳嶺屹立雄峙於西者匡山玉山北則鶴嶺壬峯以擁以蔽南則湖臺安渢乃障乃屛雲和縣崇禎處州府志雲和萬山環峙四塞之封可稱地險舊浙江通志雲和羣山翕聚二水交流聨續麗水襟帶龍泉路僻溪迴攝乎閩越雲和縣志大金坑通慶景二處巖崖深峻鳥道﨑嶇要害之地慶元縣富嘉謨慶元縣建縣始事記巉巖之峯谽谺之石屹立於甌南閩越之交嶺複而益峻道隘而逾險陳垣慶元縣築城記樓堞門鍵延袤相屬如鐵甕如金斗煌煌哉百里之壯觀也何鏜慶元縣學記龜石砥於中流龍潭滙於西北誠風雨之交隂陽之會崇禎處州府志慶元距郡最逺介在閩越若横嶺巒頭溫陽烏石九蟠足稱四塞其水夾障而下分注激射竹口為三面藩蔽慶元縣志南拱霞帔北依象山溫陽聳其左石龍蟠其右仙桃列於東南薰錦峙乎西北石壁馬蹄為門户棘蘭喜鵲為咽喉宣平縣崇禎處州府志宣平四山環匝二水合流南有瀑布之奇西有榲樣之秀若寨頭大高北足以拒武湯九盤竹溪西足以蔽松遂小妃渠溪洗灘槁嶺無不可隨地扼控王深源通濟渡記驚湍洪流衝激怪石險與三峽等王塤何村三元橋記宣慈原野之沃溪山之勝北抵金華南通甌海沿浚源於樊岡春湍夏潦衝激悍駛景寧縣崇禎處州府志景寧四山環繞前挹溪流南有石佛蜂桶隘東有綠銅龍首闗可遏泰順青田之衝截夀景雙港之患舊浙江通志景寧北枕桂山南連勅木登高望逺氣勢蟠鬱景寧縣志湍流阻險羣峯插天青田上㳺甌閩門户玉環海防類考續編玉環山與蒲岐相對懸居海中聨絡深長楚門霓嶴必經乎此最為險要玉環志外臨大海内近溫台海疆諸郡之屛障洋面往來之要區謹按玉環山雄峙海面外截東洋内資保障所在崇岡峻嶺周匝環列西達烏洋東逼黄花西北楚門霓嶴嶻嶪拱衛出此則為黄坎二門實為溫台門户東海咽喉有山可以瞭逺番舶之往來畢照有口可以巡查洋匪之伏匿潛消浙東防禦此為要津其展復始末剙制事宜俱詳建置城池海防兵制諸志中浙江通志卷二十二
