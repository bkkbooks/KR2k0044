body:
  text: 浙江通志卷二百七十一藝文十三詩五言古遊赤石進帆海宋謝靈運首夏猶清和芳草亦未歇水宿淹晨暮陰霞屢興沒周覽倦瀛壖况乃凌窮髪川后時安流天吳静不發揚帆采石華挂席拾海月溟漲無端倪虚舟有超越仲連輕齊組子牟戀魏闕矜名道不足適已物可忽請附任公言終然謝夭伐於南山往北山經湖中瞻眺宋謝靈運朝旦發陽崖景落憇陰峯舍身眺廻渚停策倚茂松側徑既窈窕環洲亦玲瓏俛眎喬木杪仰聆大壑灇石橫水分流林密蹊絶踪解作竟何感升長亦丰容初篁苞綠籜新蒲含紫茸海鷗戲春岸天雞弄和風撫化心無厭覽物眷彌重不惜去人逺但恨莫與同孤遊非情歎賞廢理難通發歸瀨三瀑布望兩溪宋謝靈運我行乘日埀放舟候月圓泳江免風濤渉情弄漪漣積石竦兩溪飛泉倒三山亦既窮登陟荒靄横目前窺巖不睹景披林豈見天陽烏尚傾翰幽篁未爲邅退尋平常時安知巢穴難風雨非攸恡擁志誰與宣倘有同枝條此日即千年永嘉郡東望溟海宋謝靈運開春獻初歲白日出悠悠蕩志將愉樂瞰海庶忘憂策馬歩蘭臯緤控息椒邱采蕙遵大薄搴若履長洲白花皜陽林紫囂曅春流非徒不弭忘覽物情彌遒萱蘇始無慰寂寞終可求初去永嘉郡宋謝靈運彭薛裁知耻貢公未遺榮或可優貪競豈足稱達生伊予秉微尚拙訥謝浮名廬園當栖巖卑位代躬耕顧已雖自許心迹猶未并無庸方周任有疾象長卿畢娶𩔖尚子薄遊似邴生恭承古人意促裝返柴荆牽絲及元興解龜在景平負心二十載於今廢將迎理棹遄還期遵渚鶩修坰溯溪終水渉登嶺始山行野曠沙岸淨天髙秋月明憇石挹飛泉攀林搴落英戰勝臞者肥鑒止流歸停即是羲唐化獲我擊壤情吳興黄浦亭庾郎中别宋鮑照風起洲渚亂雲上日無輝連山𣺌烟霧長波迥難依旅鴈方南過浮客未西歸已經江海别復與親婘違奔景易以窮離袖安可揮懽觴爲悲酌歌服成泣衣温念終不渝藻志逺存追役人多牽滯顧路慙奮飛昧心附逺翰炯言藏佩韋自礪山東望震澤宋鮑照瀾漫潭洞波合沓崿嶂雲漲島逺不測岡澗近難分幽篁愁暮見思鳥傷夕聞以此藉沉疴栖跡别人羣結言非盡書有念豈敷文從庾郎中園山石室宋鮑照荒塗趨山楹層崖隱靈室岡澗紛縈抱林嶂杳重密昏昏磴路深活活梁水疾幽隅秉晝燭地墉窺朝日怪石似龍章瑕壁麗錦質洞庭安可窺漏井終不溢沉空絶景聲崩危坐驚慄神化豈有方妙象竟無述至哉鍊玉人處此長自畢贈吳均梁桞惲寒雲晦滄洲奔潮溢南浦相思白露亭永望秋風渚心知别路長不謂若燕楚關候日遼絶何因附行旅願作野飛鳥飄然自輕舉迎桞吳興道中梁吳均團團日西靡客念已蹉跎長風倒危葉輕練網寒波白雲光采麗青山意氣多所言飽恩德忘我北山羅同柳吳興烏亭集送柳舍人梁吳均河陽一悵望南浦送將歸雲山離晻曖花霧共依霏流連反舌弄下上渚禽飛桂舟無掩枻玉軫有離徽願君嗣蘭桂時拂東臯薇同桞吳興何山梁吳均王孫重離别置酒婘峯畿逶迤川上草參差澗裏薇輕雲紉逺岫細雨沐山衣簷端水禽息窻上野螢飛君隨綠波逺我逐清風歸采藥大布山梁吳均我本此山北緣澗采山麻九莖日返照三葉長生花可以蠲憂疾聊持駐景斜景斜不可駐年來果如漚安得崑崙山偃蹇樹三株三株樹如荄綘葉凌朱臺玉壺白鳯肺金鼎青龍胎韓終及王子何代無仙才安期儻欲顧相見在蓬萊别夏侯故鄣梁吳均白馬黄金覊青驪紫絲鞚新知關山别故人河梁送置此一函書爲予達雲夢富陽浦口和朗上人梁何遜客心愁日暮徙倚空望歸山烟斂樹色江水映霞輝獨鶴凌空逝䨇鳬出浪飛故郷千餘里兹夕寒無衣上虞郷亭觀濤梁劉孝綽昔予筮賔始衣冠仕洛陽無貲秖有任一命忝爲郎再踐神仙側三入崇賢坊東朝禮髦俊虚薄厠賢良遊談侍名理搦管創文章引籍陪下膳横經忝上庠誰謂服事淺契濶變炎凉一朝謬爲吏結綬去承光烹鮮徒可習治民終未長化雞仰季智馴雉推仲康此城臨夏穴橚植茂筠篁孝碑黄絹女神濤白鷺翔遨遊佳可望釋事上川梁秋江凍雨絶返景照移塘纎羅殊未動駭水忽如湯乍出連山合時如高蓋張漂沙黄沫聚礐石素波揚榜人不敢唱舟子詎能航離家復臨水眷言思故郷中來不可制奕奕苦人腸泝洄若無阻謝病返清漳入若耶溪梁王籍艅艎何汎汎空水共悠悠陰霞生逺岫陽景逐回流蟬噪林逾静鳥鳴山更幽此地動歸念長年悲倦遊登天台山梁李巨仁台山稱地鎮千仞上凌霄雲開金闕迥霧暗石梁遥翠微横鳥道珠澗入星橋風急清溪晩霞起赤城朝寓目幽棲地駕言逸綺季避世桃源士忘情􅃮園吏抽簪傲九辟脱屣輕千駟沈㝠負俗心瀟灑凌雲意蒼蒼聳極天伏眺盡山川疊峯如積浪分崖若斷烟淺深聞過渡輕重聽飛泉採藥逢三島尋真値九仙藏書凡㡬代看博已經年逝將追羽客千載一來旋黄蘖洞梁江淹長望竟何極閩雲連越邊南州饒竒怪赤縣多雲仙金峯各蔽日銅石共臨天陽岫照鸞采陰谿噴龍泉殘磯十代木廧崒萬古烟禽鳴丹壁上猿嘯青崖間秦皇慕隱淪漢武願長年昔負雄豪威棄劍藏名山况我葵藿志松木横眼前所願同游好臨風載悠然罷古鄣縣陳陰鏗秩滿三秋暮舟虚一水濵漫漫遵故道悽悽對别津晨風下散葉岐路起飛塵長岑舊知逺萊蕪本自貧被裏恒客吏正朝不繫民惟當有一犢留持贈後人浣紗篇贈陸上人唐宋之問越女顧如花越王聞浣紗國微不自寵獻作吳宫娃山藪半潛匿苧蘿更蒙遮一行覇句踐再笑傾夫差艷色奪人目斆嚬亦相誇一朝還舊都靚粧尋若耶鳥驚入松網魚畏沉荷花始覺冶容妄方悟羣心邪欽子秉幽意世人共稱嗟願言托君懐倘𩔖蓬生麻家住雷門曲高閣凌飛霞淋漓翠羽帳旖旎綵雲車春風艷楚舞秋月纒胡笳自昔專嬌愛襲玩惟矜奢達本知空寂棄彼猶泥沙永割偏執性自長薰修芽擕妾不障道來止妾西家景龍四年春祠海唐宋之問肅事祠春溟宵齋洗塵慮雞鳴見日出鷺下驚濤鶩地濶八荒近天回百川㴻筵端接空曲目外惟雰霧暖氣物象來周遊晦明互致牲匪元享禋滌期靈煦的的波際禽沄沄島間樹安期今何在方丈蔑尋路仙事與世隔㝠搜徒已屢四明背羣山遺老莫辨處撫中良自慨弱齡忝恩遇三入文史林兩拜神仙署雖嘆出關逺始知臨海趣賞來空自多理勝孰能喻留楫竟何待徙倚忽云暮宿雲門寺唐宋之問雲門若邪裏泛鷁路纔通夤緣緑篠岸遂得青蓮宫天香衆壑滿夜梵前山空漾漾潭際月飀飀杉上風兹焉多嘉遯數子今莫同鳯歸慨處士鹿化聞仙公樵路鄭州北舉井阿巖東永夜豈云寐曙華忽葱蘢谷鳥囀尚澁源桃驚未紅再來期春暮當造林端窮庶幾蹤謝客開山投剡中郡宅中齋唐宋之問郡宅枕層嶺春湖繞芳甸雲甍出萬家臥覽皆已徧漁商汗成雨廨邑明若練越俗鏡中行夏祠雲表見兹都洵盤鬱英逺常棲眄王子事黄老獨樂恣遊衍謝公念蒼生同憂感推薦靈越多秀士運濶無由面神理翳青山風流滿黄卷揆予謬承奨自昔從纓弁瑶水執仙覊金閨負時選晨趨博望苑夜直明光殿一朝罷臺閣萬里違郷縣風土足慰心況悦年芳變淮廩佇滋實沂歌非所羡訟寢歸四明齡頽親九轉微尚本江海少留豈交戰惟餘後凋色竊比東南箭登東陽沈隱侯八詠樓唐崔融旦登西北樓樓峻石墉厚宛生長定嵐俯壓三江口排堦銜鳥衡交疏過牛斗左右會稽鎮出入具區藪越巖森其前浙江漫其後此地實東陽由來山水郷隱侯有遺詠落簡尚餘芳具物昔未改斯人今已亡粤余忝藩左束髪事文場悵不見夫子神期遥相望夜泊越州逢北使唐沈佺期天地降雷雨放逐還故都重以風潮事年月戒回艫容顔荒外老心想域中愚憇泊在兹夜炎雲逐斗樞䬓䬔縈海若霹靂耿天吳鰲抃羣島失鯨吞衆流輸偶逢京華使握手淚相濡饑共嗜齊棗眠共席秦蒲既北思攸躋將南睿所圖往來固無咎何忽憚前桴嚴陵祠唐洪子輿漢主召子陵歸宿洛陽殿客星今安在隱迹猶可見水石空潺湲松篁尚葱蒨岸深翠陰合川廻白雲徧幽徑滋蕪没荒祠羃霜霰埀釣想遺芳掇蘋羞野薦高風激終古語理忘榮賤方驗道可尊山林情不變和登會稽山唐孫逖稽山碧湖上勢入東溟近烟景晝清明九峯争隱嶙望中厭朱紱俗内探元牝野老聽鳴騶山童擁行軫仙花寒未落古蔓柔堪引竹磵入山多松崖向天迥雲從海天去日就江村隕能賦邱嘗聞和歌參不敏𡨕搜信沖漠多士期標凖願奉濯纓心長謡反招隱送楊法曹按括州唐孫逖東海天台山南方縉雲驛溪澄問吏隱巖險煩登陟潭壑隨星使軒車繞春色儻尋琪樹人爲報長相憶杭州北郭戴氏荷池送侯愉唐崔國輔秋近萬物肅況當臨水時折花贈歸客離緒斷荷絲誰謂江國永故人感在兹道存過北郭情極望東菑喬木故國意鳴蟬窮巷悲扁舟竟何待中路每遲遲送縉雲苖太守唐王維手疏謝明主腰章爲長吏方從會稽邸更發汝南騎按節下松陽清江響鐃吹露冕見三吳方知百城貴泛若耶溪唐丘爲結廬若耶溪左右若耶水無日不釣魚有時向城市溪中水流急渡口水流寛每得樵風便往來殊不難一川草長綠四時那得辨短褐衣妻兒餘糧及雞犬日暮鳥雀稀稚子呼牛歸住處無鄰里柴門獨掩扉酬綦母校書夢耶溪見贈之作唐儲光羲校文在仙掖每有滄洲心況以北窗下夢遊清溪陰春看湖水漫夜入廻塘深往往纜埀葛出舟望前林山人松下飯釣客蘆中吟小隱何足貴長年固可尋還車首東道惠言若黄金以我採薇意傳之天姥吟送歐陽會稽之任唐王昌齡懐禄貴心賞東流山水長官移會稽郡地邇上虞郷緩帶屏紛雜漁舟臨訟堂逶迤廻溪趣猿嘯飛鳥行萬室霽朝雨千峯迎夕陽輝輝逺洲映曖曖澄湖光白髪有髙士青春期上皇應須枉車歇爲我訪荷裳宿天竺寺唐陶翰松栢亂巖口山西微徑通天開一峯見宫闕生虚空正殿倚霞壁千樓標石叢夜來猿鳥静鐘梵響雲中岑翠映湖月泉聲亂溪風心超諸境外了與懸解同明發惟改視朝日長崖東湖色濃蕩漾海光漸曈曨葛仙跡尚在許氏道猶崇獨往古來事幽懐期二公遊天竺寺唐崔顥晨登天竺山山殿朝陽曉厓泉争噴薄江岫相縈繞直上孤頂髙平看衆峰小南州十二月地暖氷雪少青翠滿寒山藤蘿覆冬沼花龕瀑布側青壓石林杪鳴鐘集人天施飰謝猿鳥洗意歸清浄澄心悟凡了始知世上人萬物一何擾謝陸處士杼山折青桂花見寄之作唐顔真卿羣子遊杼山山寒桂花白綠荑含素萼采折自逋客忽枉巖中詩芳香潤金石全髙南越蠧豈謝東堂策會愜名山期從君恣幽覿贈僧皎然唐顔真卿秋意西山多别岑縈左次繕亭歴三癸趾趾鄰什寺元化隱靈跡始君啟髙致誅榛養翹楚鞭草埋芳穗俯砌披水容逼天掃峰翠境新耳目換物逺風塵異倚石忘世情援雲得真意嘉林幸勿翦禪侣欣可庇衛法大臣過佐遊羣英萃龍池䕶清激虎節到深邃徒想嵊頂期于今没遺記登江中孤嶼贈白雲先生王迥唐孟浩然悠悠清江水水落沙嶼出回潭石下深綠篠岸旁密鮫人潛不見漁父歌自逸憶與君别時泛舟如昨日夕陽開返照中坐興非一南望鹿門山歸來恨如失將適天台留别臨安李主簿唐孟浩然枳棘君尚棲匏𤓰吾豈繫念離當夏首漂泊指炎裔江海非墮游田園失歸計定山既早發漁浦亦宵濟泛泛隨波瀾行行任艫枻故林日已逺林木坐成翳羽人在丹邱吾亦從此逝早發漁浦潭唐孟浩然東旭早光芒渚禽已驚聒臥聞漁浦口橈聲暗相撥日出氣象分始知江湖濶美人常宴起照影弄流沫飲水畏驚猿祭魚時見獺舟行自無悶況值晴景豁經七里灘唐孟浩然予奉埀堂誡千金非所輕爲多山水樂頻作泛舟行五嶽追向子三湘弔屈平湖經洞庭濶江入新安清復聞嚴陵瀨乃在兹湍路疊嶂數百里沿洄非一趣彩翠相氛氲别流亂奔注釣磯平可坐苔磴滑難歩猿飲石下潭鳥還日邊樹觀竒恨來晩倚櫂惜將暮揮手弄潺湲從兹洗塵慮雲門寺西六七里聞符公蘭若最幽與薛八同往唐孟浩然謂余獨迷方逢子亦在野結交指松柏問法尋蘭若小溪劣容舟怪石屢驚馬所居最幽絶所住皆静者雲簇興座隅天空落堦下上人亦何聞塵念都已捨四禪合真如一切是虚假願承甘露潤喜得東風灑依止託山門誰能效邱也越中逢天台太乙子唐孟浩然仙穴逢羽人停艫向前拜問余渉風水何處逺行邁登陸尋天台順流下吳會兹山夙所尚安得問靈怪上逼青天髙俯臨滄海大雞鳴見日出常覿仙人斾往來赤城中逍遥白雲外莓苔異人間瀑布當空界福庭長自然華頂舊稱最永此從之遊何當濟所屆送崔十二遊天竺寺唐李白還聞天竺寺夢想懐東越每年海樹霜桂子落秋月送君遊此地已屬流芳歇待我來歲行相隨浮溟渤同友人舟行遊台越作唐李白楚臣傷江楓謝客拾海月懐沙去瀟湘挂席泛溟渤蹇予訪前跡獨往造窮髪古人不可攀去若浮雲沒願言弄倒影從此鍊真骨華頂窺絶溟蓬壺望超忽不知青春度但怪綠芳歇空持釣鰲心從此謝魏闕天台曉望唐李白天台鄰四明華頂髙百越門標赤城霞樓栖蒼島月憑高登逺覽直下見溟渤雲埀大鵬飜波動巨鰲沒風潮真洶湧神怪何翕忽觀竒跡無倪好道心不歇攀條摘朱實服葯錬金骨安得生羽毛千春臥蓬闕越中秋曙唐李白越水遶碧山周廻數千里乃是天鏡中分明畫相似愛此從㝠搜永懐臨湍遊一爲滄波客十見紅蕖秋觀濤壯天險望海令人愁路遐迫西照歲晚悲東流何必探禹穴逝將歸蓬邱不然五湖上亦可乘扁舟寶林寺作唐徐浩兹山昔飛來逺自瑯琊臺孤岫龜形在深泉鰻井開越王屢登陟何相傳詞才塔廟崇其巔規模稱壯哉禪堂清溽暑髙閣無恢炱照耀珠吐月鏗轟鐘隱雷揆予乆纓弁末路遭邅迴一棄滄海曲六年稽嶺隈逝川惜東駛馳景憐西頽腰帶愁疾减容顔衰悴催頼居兹寺中法士多瓌能洗心聽經論禮足蠲凶災永願依勝侣清江乘渡杯謁禹廟唐徐浩畝澮敷四海川源滌九州既膺九命錫乃建洪範疇鼎革固天啟運興非人謀肇開宅土業永庇昬墊憂山足靈廟在門前清鏡流象筵陳玉帛容衛儼戈矛探穴圖書朽卑宫堂殿修梅梁今不壊松祏古仍留負責故郷近朅來申爼羞爲魚知造化嘆鳯仰徽猷不復聞夏樂惟餘奏楚幽婆娑非舞羽鏜鞳異鳴球盛德吾無間髙功誰與儔災淫被凶慝助聖擁神休出谷鶯初語空山猿獨愁春暉生草樹柳色暖汀洲恩貸題輿重榮殊衣錦遊宦情同械繫生理任桴浮地極臨滄海天遥過斗牛精誠如可諒他日寄㝠搜有懐台州司戸鄭十八䖍唐杜甫天台隔三江風浪無晨暮鄭公縱得歸老病不識路昔如水上鷗今如置中兔性命由他人悲辛但狂顧山鬼獨一脚蝮蛇長如樹呼號傍孤城嵗月誰與度從來禦魑魅多爲才名誤夫子嵇阮流更被時俗惡海隅微小吏眼暗髪埀素黄帽映青袍非供折腰具平生一杯酒見我古人遇相望無所成乾坤莽回互東陽郡齋中詣南山招韋十唐錢起霽來海半山隱映城上起中峰落照時殘雪翠微裏同心乆爲别孤興那對此良會何遲遲清揚瞻則邇西陵口觀海唐薛據長江漫湯湯近海勢彌廣在昔胚渾凝融爲百川泱地形失端倪天色渾滉漾東南際萬里極目逺無象山影乍浮沉潮波忽來往孤帆或不見櫂歌猶想像日暮長風起客心空振蕩浦口霞未收潭心月初上林嶼幾邅迴亭臯時偃仰歲晏訪蓬瀛真游非外奬嚴公釣臺作唐顧況靈芝產遐方威鳯家重霄嚴生何耿潔託志肩夷巢漢后雖則貴子陵不知髙糠粃當世道長揖夔龍朝掃門彼何人升降不同朝捨舟遂長往山谷多清飈酬房杭州唐顧況郡樓何其曠亭亭廣而深故人牧餘杭留我披胸襟滿篋閲新作璧玉誕清音流水入洞天窅豁欲凌臨闢險延北阜薙道陟南岑朝從山寺還醒醉動笑吟荷花十餘里月色攅湖林父老惜使君却欲速華簪嚴陵灘下寄常建唐奚賈日入溪水静尋真此亦難乃知滄洲人道成仍釣竿漾檝乘微月振衣生早寒紛吾成獨往自昔耽考槃已息漢陰誚且同濠上觀曠然心無涯誰問容膝安奉使過石門觀瀑并序唐丘丹謝康樂宋景平中爲永嘉守有宿石門巖上詩余六代叔祖梁中書侍郎天監中有過石門瀑布詩後亦爲此郡小子大歴中奉使竊有繼作雖不足克紹祖德追踪昔賢蓋造竒懐感之志也溪上望懸泉耿耿雲中見披榛上巖岫峭壁正東面千仞瀉聯珠一潭噴飛霰嵯㵵滿山響坐覺炎氛變照日𩔖虹霓從風似綃練靈竒既天造惜處窮海甸吾祖昔登臨謝公亦遊衍王程懼淹泊下磴空延眷千里雷尚聞巒迴樹葱蒨此來共賤役探討愧前彥永欲洗塵纓終當愜此願爛柯山三首唐劉迥白雲引策杖苔徑誰往還漸見松樹偃時聞鳥聲閒豁然喧氛盡獨對萬重山石橋架絶壑蒼翠横鳥道憑檻雲脚下頽陽日猶蚤霓裳倘一遇千載長不老繩牀宴坐久石窟絶行跡能在人代中遂將人代隔白雲風颺飛非欲待歸客游爛柯山四首唐李幼卿拂霧理孤策薄霄眺層岑迥升烟霧外豁見天地心物象不可及遲囬空詠吟巨石何崔嵬横橋架山頂傍通日月過仰望虹霓迥聖者開津梁誰能度兹嶺二仙自圍棊偶與樵夫會仙家異人代俄頃千年外笙鶴何時還儀形尚相對石室過雲外二僧儼禪寂不語對空山無心向來客作禮未及終忘循舊形跡游爛柯山四首唐李深尋源路不迷絶頂與雲齊坐引羣峰小平看萬木低雙林春色上正有子規啼嵌空横洞天磅礴倚崖巘宛如虹勢出可賞不可轉真興得津梁抽簮永游衍羽客無姓名仙棊但聞見行看負薪客坐使桑田變懐古正怡然前山早鶯囀稽首期發䝉吾師豈無説安禪即方丈演法皆寂滅鳴磬雨花香齋堂飯松屑游爛柯山三首唐羊滔歩登春巖裏更上最逺山聊見宇宙濶遂令身世閒清輝賞不盡髙駕何時還石梁聳千尺髙盼出林嶺亘壑躡丹虹排雲弄清影路期訪道客游衍空井井沙門何處人擕手俱滅跡深入不動境乃知真圓寂有時歸羅浮白日見飛錫游爛柯山三首唐薛戎登巖已寂歴絶頂更岧嶤響像如天近窺臨與世遥悠然暢心目萬慮一時銷聖游本無跡留此示津梁架險知何適遺名但不忘只今成佛宇化度果難量二仙行自適日月徒遷徙不語寄手談無心引樵子䝉分一丸藥相偶窮年祀游爛柯山三首唐謝劇獨凌清景出不視衆山中雲日遥相對川原無不通自致髙標末何心待馭風仙奕示樵夫能言忘歸路因看斧柯爛孫子髪已素孰云遺跡久舉意如旦暮仙僧會真要應物常淵黙惟將無住理轉與信人説月影清江中可觀不可得早發杭州泛富春江寄陸三十一公佐唐權德輿候曉起徒馭春江多好風白波連青雲蕩漾晨光中四望浩無際沈憂將此同未離奔走途但恐成悲翁俯見觸餌鱗仰目凌霄鴻纓塵日已厚心累何時空區區此人世所向皆樊籠惟應杯中物醒醉為窮通故人懸圃姿瓊樹紛青蔥終當從此去共結蘭桂叢嚴陵釣臺下作唐權德輿絶頂聳蒼翠清湍石磷磷先生晦其中天子不得臣心靈棲顥氣纓冕猶緇塵不樂禁中臥却歸江上春潛驅東漢風日使薄者醇焉用佐天子持此報故人人知大賢心不獨私其身弛張有深致耕釣陶天真奈何清風後擾擾論屈伸交情同市道利欲相紛綸我行訪遺臺仰古懐逸民矰繳鴻鵠逺雪霜松桂新江流去不窮山色凌秋旻人世自今古清輝照無垠越中山水唐孟郊日覺耳目勝我來山水州蓬瀛若髣髴田野如泛浮碧嶂幾千遶清泉萬餘流莫窮合沓歩孰盡𣲖别遊越水浄難汚越天陰易收氣鮮無隱物目視逺更周舉俗媚蔥蒨連冬擷芳柔菱湖有餘翠茗圃無荒疇賞異忽已逺探竒誠淹留永言終南色去矣銷人憂桐廬山中贈李明府唐孟郊静境無濁氛清雨零碧雲千山不隱響一葉動亦聞即此佳志士精微誰相羣欲識楚章句袖中蘭茝薰送超上人歸天台唐孟郊天台山最髙動躡赤城霞何以静雙目掃山除妄花何以潔其性濾泉去泥沙靈境物皆直萬松無一斜月中見心近雲外將俗賖山獸䕶方丈山猿捧袈裟遺身獨得身笑我牽名華代杭人作使君一朝去二首唐元稹使君一朝去遺愛在人口惠化境内春才名天下首爲問龔黄軰兼能作詩否使君一朝去斷腸如剉檗無復見氷壺惟應鏤金石自此一州人生男盡名白郡中即事唐白居易漫漫潮初平熈熈春日至空濶逺江山晴明好天氣外有適意物中無繋心事數篇對竹吟一杯望雲醉行擕杖扶力臥讀書取睡久養病形骸深諳閒氣味遥思九城陌擾擾趨名利今朝是雙日朝謁多軒騎寵者防悔尤權者懐憂畏爲報髙車蓋恐非真富貴嚴十八郎中在郡日改制東南樓因名清輝未立標牓徵歸郎署予既到郡性愛樓居宴遊其間頗有幽致聊成十韻兼戲寄嚴唐白居易嚴郎置兹樓立名曰清輝未及署花牓遽徵還粉闈去來三四年塵土登者稀今春新太守灑埽施簾幃院桞煙婀娜檐花雪霏㣲看山倚前戸待月闡東扉碧窻戛瑶瑟朱䦨飄舞衣燒香卷幕坐風燕雙雙飛君作不得住我來幸因依始知天地間靈境有所歸三年爲刺史二首唐白居易三年為刺史無政在人口唯向郡城中題詩十餘首慙非甘棠詠豈有思人不三年為刺史飲氷復食蘖唯向天竺山取得兩片石此抵有千金無乃傷清白天竺寺七葉堂避暑唐白居易鬱鬱復鬱鬱伏熱何時畢行入七葉堂煩暑隨歩失簷雨稍霏㣲窻風正蕭瑟清宵一覺睡可以銷百疾題天竺南院贈閑元旻清四上人唐白居易雜芳澗草合繁綠巖樹新山深景候晩四月有餘春竹寺過㣲雨石逕無纖塵白衣一居士方袍四道人地是佛國土人非俗交新城中山下別相送亦殷勤越女詞唐鮑溶越女芙蓉妝浣紗清淺水忽驚春心晚不敢思君子君子縱我思寧來浣溪裏宿吳興道中苕村唐鮑溶浮客倦長道秋深夜如年久行惜日月常起雞鳴前夕計今日程息車在苕川霜中水南寺金磬泠泠然疇昔此林下歸心巢頂禪身依寤昬寐智月生虚圓羇旅違我程去留難雙全觀身話往事如夢遊青天明發止賓從寄聲琴上弦聊書越人意此曲名思仙聞韋駙馬使君遷拜台州唐鮑溶溟藩軫帝憂見説初鳴騶德勝禍先戢情閒思自流蠶殷桑柘空廩實雀鼠稠諌虎昔賜駿安人將問牛曾陪後乘光共逐平津遊旌斾擁追賞歌鐘催獻酬音徽一寂寥貴賤雙沉浮北郭乏中産東方稱上頭躋山望百城目盡增遐愁海逼日月近天髙星漢秋無階異漸鴻有志慙馴鷗終期促孤櫂暫訪天台幽游天台山唐張祜崔嵬海西鎮靈跡傳萬古羣峰日來朝累累孫侍祖三茅即拳石二室猶塊土傍洞窟神仙中巖宅龍虎名從乾取象位與坤作輔鸞鶴自相羣前人空若瞽巉巉割秋碧媧女徒巧補視聽出塵埃處髙心漸苦纔登招手石肘底笑天姥仰看華蓋尖赤日雲上午奔雷撼深谷下見山脚雨回首望四明矗若城一堵昬晨邈千態恐動非自主控鵠大夢中坐覺身詡詡東溟子時月却孕元化母彭蠡不盈杯浙江微辨縷石梁屹横架萬仞青壁竪却瞰赤城顛勢來如刀弩盤松圍清道九里天莫覩穹崇上攅三突兀傍聳五空崖絶凡路癡立麋與塵邈崚極天門覻深窺地戸金庭路非逺徒歩將欲舉身樂道家流惇儒若一矩行尋白雲叟禮象登峻宇佛闕繞杉嵐仙壇半榛莽懸崖與飛瀑險噴難足俯海眼三井通洞門雙闕拄瓊臺下昬側手足前採乳但造不死郷前勞何足數早春錢塘湖晩眺唐張祜落日下林坂撫襟睇前蹤輕澌流迴浦殘雪明髙峰仰視天宇曠俯登雲樹重聊當問真界昨夜西巒鐘釣臺懐古唐劉駕澄流可濯纓嚴子但埀綸孤坐九層石逺笑清渭濵潛龍飛上天四海豈無雲清氣不零雨安使洗塵氛我來吟髙風髣髴見斯人江月尚皎皎江石亦磷磷如何臺下路明日又迷津玉笥山留題宋徐鉉仙郷會應逺王事知何極征傳莫辭勞玉峰聊一息形骸已銷散心想都凝寂真氣自清虚非關好松石九仙皆積學洞壑留遺跡游子歸去來胡爲但行役冬日陪胡武平游西余精舍宋梅堯臣侵晨霜氣嚴溪口氷已合烏榜將進遲寒篙旋摧拉遥看松竹深雪屋藏山衲登臨興都盡薄暮沿清霅送慧勤歸餘杭宋歐陽修越俗僣宫室傾貲事雕墻佛屋尤其侈耽耽擬侯王文彩瑩丹漆四壁金焜煌上懸百寶蓋宴坐以方牀胡爲棄不居栖身客京坊辛勤營一室有𩔖燕巢梁南方精飲食菌笋鄙羔羊飯以玉粒粳調之甘露漿一饌費千金百品羅成行晨興未飯僧日昃不敢嘗乃兹隨北客枯粟充饑腸東南地秀絶山水澄清光餘杭幾萬家日夕焚清香烟霏四面起雲霧雜芬芳豈知車馬塵髩髪染成霜三者孰苦樂子奚勤四方乃云慕仁義奔走不自遑始知仁義力可以治膏肓有志誠可樂及時宜自彊人情重懐土飛鳥思故郷夜枕聞北鴈歸心逐南檣歸兮能來否送子以短章越州飛來山宋孔平仲物之體性重惟有石最堅迴風捲黄沙直下萬丈淵如何崔嵬山乃解飛青天瑯琊趨㑹稽道理固甚懸想當初來時詭異可得言豈非巨靈擘或謂秦帝鞭雷公挾電母歘霍相後先夸娥負崖脚天丁撮其顛北斗借神兵虎豹下九關海王驅魚送百里聞腥羶悲號與憊喘灑汗成流川呼雲以自蔽日月不得宣栖鳥失其巢哀哀啼白猿草木困擺撼枝葉半不全置之秦望陰百怪散蒼烟有龍走不輟化爲錦色鰻攅身入竅穴噴出清冷泉都人駭相報平地見巍然既來亦能去惟恐復騰鶱浮屠鎮其上副以屋蟬聫朝吟諸佛經暮誦西方禪以此相縶縳覊孤㡬千年我聞已有日今朝始攀援髙堂置美酒逺目凌孤鳶老僧爲我説指畫當我前是否難致詰且進黄金船和晏相公湖上遇雨宋韓維公堂日多暇薄暮游清池孤雲從西來若與飛蓋期急雨亂荷芰紅綠左右披沙禽帶濕起簇簇守前坻烟樹晦空曲蟬聲寂無遺殘炎一洗濯霽景開林西禽飛還清波蟬噪復故枝晩槿揚朱華秋草含碧滋篙舟出隄去微風滿平漪卷幔極悵望正見隗與箕舉酒無塵情慨然起遐思永懐古先訓黙道通介宜乃知賢哲心所得非游嬉送謝景初廷評宰餘姚宋范仲淹世德踐甲科青紫信可拾故郷特榮輝髙門復樹立餘姚二山下東南最名邑煙水萬人家熈熈自翔集又得賢大夫坐堂恩信敷春風爲君來綠波滿平湖乘興訪隱淪今逢賀老無文藻凌雲處定喜江山助未能同仙舟離樽少留駐行行道不孤明月相隨去送錢藻出守婺州得英字宋蘇軾老手便劇郡髙懐厭承明聊紆東陽綬一濯滄浪纓東陽嘉山水未到意已清過家父老喜出郭壺漿迎子行得所願愴悢居者情吾君方急賢日旰坐邇英黄金招樂毅白璧賜虞卿子不少自貶陳義空峥嶸古稱爲郡樂漸恐煩敲搒臨分敢不盡醉語醒還驚僧清順新作埀雲亭宋蘇軾江山雖有餘亭榭苦難穩登臨不得要萬象各偃蹇惜哉埀雲軒此地得何晚天功争向背詩眼巧增損路窮朱欄出山破石壁很海門浸坤軸湖尾抱雲巘葱葱城郭麗淡淡烟村逺紛紛鳥雀去一一漁樵返雄觀快新獲微景收昔遁道人真古人嘯吟慕嵇阮空齋臥蒲褐芒屨每自捆天憐詩人窮乞與供詩本我詩久不作荒澁旋鉏墾從君覔佳句咀嚼廢朝飯懐西湖寄晁美叔同年宋蘇軾西湖天下景遊者無愚賢深淺隨所得誰能識其全嗟我本狂直早爲世所捐獨專山水樂付與寧非天三百六十寺幽尋遂窮年所至得其妙心知口難傳至今清夜夢耳目餘芳鮮君持使者莭風采爍雲烟清流與碧巘安肯爲君妍胡不屏騎從暫借僧榻眠讀我壁間詩清涼先煩煎策杖無道路直造意所便應逢古漁父葦間自延緣問道若有得買魚勿論錢杭州故人信至齊安宋蘇軾昨夜風月清夢到西湖上朝來聞好語扣戸得吳餉輕圓白曬荔脆釅紅螺醬更將西崦茶勸我洗江瘴故人情義重説我必西向一年兩僕夫千里問無恙相期結書社故人相約醵錢雇僕未一歲再至黄未怕供詩帳僕頃以詩得罪有司移杭取境内所留詩杭州供數百詩謂之詩帳還將夢魂去一夜到江漲江漲杭州橋名次韻趙景貺春思且懐吳越山水宋蘇軾歲華來無窮老眼久已静春風如繋馬未動意先騁西湖忽破碎鳥樂魚動鏡縈城理枯瀆放閘起膠艇顧君營此樂宦事何時竟清河西湖三閘君督成之思吳信偶然出處付前定飄然不繋舟乘此無盡興醉翁行樂處草木皆可敬明朝游北渚急掃黄葉徑白酒真到齊紅裙已放鄭酒尚有香泉一壺爲樂全先生服不作樂也寄參寥宋陳師道平生西方願擺落區中緣惟於世外人相從可忘年道人賛公徒相識㡬生前早作歩兵語晩參雲門禪拾策孤山下一室頗蕭然林昏出幽磬竹杪横疏烟昨日寄書至坐想參寥泉此泉如此公遇物作清妍一别今幾時綠首成白顛子亦憐我老我豈要子憐會逢萬里風一繋五湖船酌我巖下水吟子山中篇泊吳興觀音院宋秦觀金刹負城闉閴然美栖止卞山直穹窿苕水相依倚霜檜鬱㝠㝠海棕鮮薿薿廣除庇夏陰飛棟明朝晷溪光鳬鶩邊天色菰蒲裏緒風傳晝焚壁月窺夜禮洩雲彗層空規荷鑑幽沚艅艎烟際下鐘磬林端起聱牙戲清深􅋂崟撲空紫所過信悠然此生如寄耳志士耻溝瀆征夫念桑梓攬衣軒楹間歗歌何窮已餘姚飯宋陳造昨暮浴上虞今晨飯餘姚官期有餘日我行得逍遥盤實剝芡芰羮魚薦蘭椒一飽老人事茗飲亦復聊捫腹每自愧昔賢尚簞瓢僧垣棲翠微金碧煥山椒龍泓甘可茹塔鈴如見招遲留本不惡況復待晚潮遊慈溪龍虎軒軒有石湖碑如新刻宋陳造坐曹可勝勞出郭復行役半年定海令三度慈溪客慈溪足勝處山秀江繚碧終然縈夢寐遑此事遊歴髙軒閟龍虎表表市闤側得興不暇慵徙倚且數刻洞戸初推敲階除漸登陟向來攫怒勢枯幹抱頑石乃知名實間未易膠今昔尚喜詩翁碑不受蒼蘚蝕何但神所䕶人未忘翁德使非老眼明斯遊竟無得清明西湖次韻宋陳造蘇公舊堤東增築更千歩右爲縈回溪夾以青葱樹晴湖映碧山詩客更多助醉郷赴新約書癡悔前悞況此好清明酒果隨意具向來計追歡㡬番陰雨沮今者成清遊仍免俗子汚斜陽不無情似戀花桞住春光念報答襞牋須好句五言天台山送僧象微歸山宋沈遘吾聞天台久常讀興公賦兹爲東南鎮神靈之所據竒挺究萬狀嵩岱不足語頗疑説過夸特為辭之嫭象微乃州民能識山之故從容試爲問聊得一一疏赤城建霞標上與斗牛附萬有八千丈矗若天一柱瀑布發髙源飛流翻四注雪霜浮虚空晦明亂朝暮巖足多丹石光華燦寶璐楢溪百餘仞欲濟毛骨怖九折凌峻梁五界窮幽路芝蘭散竒草松桂羅嘉樹祥風吹白雲飄然若可御幽閟足瓌怪纖悉難畢具凡迹古不到神物陰自䕶傳聞昔人説中有洞天處是名不死墟衆真所游聚玉堂敞金庭碧林列瑤圃有能從而求得之乃仙去斯言寧可信良非吾所慕吾志本邱壑久已失厥趣誰言石渠客乃甚轍中鮒秋風日已髙歸心浩欲騖兹山夙所愛送爾𬗟東顧吾廬因爾卜伻來審繪素勸農道場山宋王炎練日遵詔條行春勸耕事擁斾有傳呼據鞍小馳騖児童喜聚觀父老歡來詣松徑度坡陀蓮宫得清閟此行非遨遊所職在撫字示之淺易語諭以丁寧意扶杖既言歸解衣聊少憇山中無俗情物外有幽趣僧閒衆所羡農困吾甚媿不敢飽登臨肩輿下山去浦江華藏寺如勝上人欲募施者開田佐僧供以長老皎公書來求予詩作二十韻奉勉宋范浚浮屠謝朋親屏跡藏巖幽多規脱徭賦豈必皆禪流自言佛遺經墾土為愆尤不耕徒榖腹何異鼠雀偷告之勿浮食當須力鋤耰前修舉鍬事千載埀風猷奈何啞羊僧百語不頷頭皎公老禪伯雅慕吾孔周其徒有如勝用意非常儔欲開千畦田更辦兩具牛率彼枯木衆躬耕食其秋釋門有添丁乃翁坐無憂與國助耘耔疲氓庶其瘳此意良足嘉感之歎綢繆昔聞白黑衆十萬俱清修鳩金置千畝給供無時休於今豈無人勝也當尋求長途觸隆冬一衲寒颼飀朱門立雪久歡喜無生愁作詩勸勇往以俟嵗晚收寄開化李令光二首宋程俱我行阡陌間苖麥已復清茅茨間新藁雞犬有和聲不見吏索錢田家得其生雞犬亦肥字不遭無事烹於斯可觀政豈在赫赫名父老亦相語驩然就春耕官租及時了卒嵗樂無營山間古梅林有鴞集其端不飛亦不鳴彈射不敢干下窺羣雀雛啄顙刳其肝欣然䑛兩爪意得良自安飛來多凡鳥助此凶且殘安知萬山曲亦復鳴棲鸞相咻固不可見嚇技亦殫衆鳥既有恃相期在嵗寒寄題淳安陳令君讀書林宋吳儆能吏事深刻商利謹毫釐俗吏趨期會簿書自覊縻寥寥弦歌聲千古空餘思還淳山水邑令君邱壑姿邑民本無事君亦何所爲治己物自治化行風漸移君復何所欲讀書常不足拄腹五千卷挿架三萬軸曾未出毫芒萬室已䝉福堂東松竹林昔時閟荒榛堂中燈燭光昔時照紅裙今何聲吾伊蕭蕭風雨晨問君有社稷亦復有人民奈何徒自苦學道則愛人寄題陳同甫抱膝亭宋陳傅良稻粱不難謀軒冕亦易得胡為抱膝翁惻惻復惻惻秋風墮碧梧鳯鳥去無迹愁吟草際蛩児女淚盈臆忽然一長嘯孤響起空寂令人識雅頌一唱三歎息室廬在路旁耕鑿在民籍行人聽笑語稚子共眠食讀書果何罪鬚髪又半白此意太勞勞此身長抑抑抱膝且不可出門更何適但勿問門外蓬蒿若干尺次韻曹守懐玲瓏山宋沈與求泉石有膏肓客游夢想半如饜極羊酪投匕念郷饌懐哉小玲瓏舊賞常酣宴玉女下雲窗輕我年未冠誅茅老三間此意已懸斷少須草堂資兩足那可絆謝公愛東山自結尋幽伴詩筒忽相先紙價豈容賤流傳從使君感此歸思亂擷蘭躡危根漱石俯長磵野性等麋鹿百嗜寧食薦攬衣中夜興測漏疾流眄扃怒愧駑筋卑飛傷短翰正使屐齒折未改柯斧爛時節脱駛徂遲暮空浩歎何當脂下澤去路鬱交貫和喻叔竒游天衣宋王十朋稽山髙入雲鑑湖逺浮空夏后留遺跡晋宋多名公我來歲及周夢寐懐清風兹欣天氣佳扶桑欲曈曨駕言天衣游盍簪盡鴛鴻經夕戒行李如期集仙宫聯騎出城南行行指秦峰千巖競吐秀眼界殊清空招提在何許十里松陰濃林端忽鐘磬與客為先容羣簮擁花界雙佩鳴寒淙試將比天台大畧如思豐天台有思豐堂首讀邕浩碑妙理開昬䝉細觀元白詩邱壑羅胸中蕭壁尚堪面梁薪㡬經烘寺有梁時薪火兹宫現有相禪客談無同朝陽最嶄絶白雲抹其胸杜鵑天下無至今滿山紅雞僧始開山道業聞清𠂻思舉照不起髙價傾江東袈裟縷黄金宫女百針工昭明親抱送禮意何太恭白馬忽渡江臺城困英雄國破遺衣在丹青落塵客寺舊有昭明像我軰皆書生意氣飄如虹蠟屐共尋幽寧求香火功載酒懐賀老招隱思戴顒賦詩追吹臺一飯敢忘忠況我賢使君德宇尤疏通楚醴餉百榼白衣走山中嗟予何為者天資愧空侗謬與酒中仙適同蕺山松蕺山有八松同年妙詞章況有山水供古詩如古琴山髙水溶溶背嚢小奚奴捧硯長髯翁勝游與佳作二美悉具逢品題徧羣英波瀾及竒蹤掬水弄花句比擬猶凡庸兹會如蘭亭同行𩔖荀龍盛事在詩史奚用呼畫工同錢用明用章游白石巖宋王十朋謝公好山水得郡古東甌造物惜佳境雅志多不酬松蘿蔽雁蕩烟靄埋龍湫行田經白石不到仙山頭寥寥數百年天賦黄冠流巍然萬仞崖壁立東南州誰將補天手化出白玉樓兩龕藏洞府中有羣仙遊上通尺五天下接三神洲飛泉落巖腰碧澗鳴山陬羣峰真培塿滄海為渠溝隘視人間世萬象同蜉蝣我家鴈蕩陽崎嶇厭經邱翩翩錢公子呼我尋巖幽初驚小雨密忽掃羣陰浮杖履窮㠝岏一洗塵埃眸山林有真樂富貴何足求但願乞二山不願萬戸侯度雁山宋王十朋雁山五經眼兹行尤可觀初冬天氣佳雁歸山未寒有日照幽谷無雲翳層巒入境見祥雲振衣登馬鞍瀑水飛玉龍羽旗導翔鸞石柱屹天外卓筆書雲端靈峰觀石室杖履穿㠝岏山禽知我來好音若相歡羣峰列春笋丹青狀尤難行色愧匆匆更約它時看過瑞安宋王十朋我家古樂成老未識安固偶把清源麾首問南塘路解維日已晏入境天欲暮張子自陶山扁舟惠然顧沈君壯年别相見髪埀素訪舊多不存來觀莫知數平原二十人邂逅喜相遇謂我宜少留欲敕不腆具我驅不敢疾曲為一宵住臨江有髙閣登覽可以賦瀾同孟子觀目作少陵注燈火照魚龍談笑驚鷗鷺含杯鄉意濃竊食君恩誤晨起酒未醒潮來報催渡夜出偏門還三山宋陸游月行南斗邊人歸西郊路水風吹葛衣草露濕芒屨漁歌起逺汀鬼火出破墓凄清醒醉魂荒怪入詩句到家夜已半佇立叩蓬戸穉子猶讀書一笑慰遲暮稽山行宋陸游稽山何巍巍浙江水湯湯千里亘大野勾踐之所荒春雨桑柘綠秋風秔稲香村村作蟹椵處處起魚梁陂放萬頭鴨園覆千畦薑舂碓聲如雷私債逾官倉禹廟爭奉牲蘭亭共流觴空巷看競渡倒社觀戲塲項里楊梅熟采摘日夜忙翠籃滿山路不數荔枝筐星馳入侯家那惜黄金償湘湖蓴菜出賣者環三郷何以共烹煮鱸魚三尺長芳鮮初上市羊酪何足當鏡湖滀衆水自漢無旱蝗重樓與曲檻瀲灔浮湖光舟行以當車小繖遮新粧淺坊小陌間深夜理絲簧我老述此詩妄繼古樂章恨無季札聽大國風泱泱石堰村宋陸游木落山不蔽水縮舟自獻寒日晚更明村巷曲折見小婦鳴機杼童子陳筆硯農家雖苦貧終勝異鄉縣君看宦遊子豈無墳墓戀牛一死在故鄉切勿慕乘傳於潛道中宋洪邁山行厭犖确理策扶欹危綠野三兩家一息知可期冉冉青林端炊烟裊晴暉居民豐且樂恐是太古遺那知都邑間百索困鞭笞繁華今何有半作道旁羸釣臺阻風去得風便宋薛季宣先生非釣名魚釣清冷水太空長廓然浪迹秋光涘人憂我何憂忘怒亦忘喜建武非漢元詎有留侯起神明旋地軸姓氏更七里雲臺已埋沒嚴瀨殊清泚峩峩二釣臺髙挿烟霞裏首陽逺相比萬祀恒不圯我來經舊廬敢卜瞻遺几東風廻我舟江歩時須艤仰觀嚴像設敬拜豁煩鄙層臺暢登臨無復徒仰止縈紆古道屈望望攀蘿藟崇基介巖石特立端不倚削成二山碧平止章如砥衆山鬱青葱環合紛碨礧清塵森萬象觸睫同一視古人不可見可見安仁美旅情殆忘返回棹西風駛青蒲挂一席入望俄城市瞥如周變秦物物非古始乃知主人意待我非朱紫送迎因下風忙遽均倒屣烹茶出清泉盤饌羅雙鯉飫之以珍羞浣濯予塵滓相忘語黙間不假談名理去留維我意今昔交爾汝此情固㝠契何必親之子宿石門宋葉適好溪瀉百壑南北傾萬峰山凡堆阜俗映岸羞為容石門忽秀出老幹蔭渟洪捨舟從口入便已離塵中衆芳拱窟宅環峒獻竒穠藤蘿異態度尺寸疑施功錦茵翠織成照耀無春冬水行千丈髙歕薄不可窮更有洗頭盆雲深霧常封昔年謝康樂築居待其終繼作者邱裴語言亦稱雄邈然百世後未忝騷人風栖栖三羽衣日晏齋廚空之子歇過槳暫洗氛埃胸自歎苦淹留寂莫不易供嗟我老無用佞山久成翁結廬㑹昌側勢落魚蝦叢種竹似束葦栽松如斷蓬小児餖盆盂何時至周公㑹當同此住代輸助之舂入餘杭縣宋髙似孫明發遵西陸驅車月流光佳山迎車來知是古餘杭危樹露如雨平野日未陽支流滀清源弱羽無髙翔人家叢灌下世載山水鄉扣門作午憇白飰羞文魴邂逅有足歡離合非其常主人不予鄙予留亦徜徉重經洞霄宋周文璞曩既負幽討今敢萌遐心扶桑下陽馭砮磬浮空林瓊臺渺泆蕩蘂佩棲髙深屢見仙驥舞遥聆元女吟如遂都開闢那復憂﨑嶔抱關職貴重啟閉非所任靈飈掣虬戸同此琅琅音願併翠綃水寫之朱絲琴月夜泛舟姚江宋樓鑰秋暑不可耐㡬思泛中川晩來興有適溪船偶及門凉月纔上弦平潮可黄昏倚楫縱所如臥看龍泉山長虹跨空濶過之凜生寒坐穩興益佳夜氣方漫漫草蟲鳴東西飛鳥相與還仰頭數明星埀手摇碧瀾坐客惜此景不及擕清樽無酒要不惡徜徉足幽歡幽歡有何好叩舷澹無言求仲抑招遊山歸途遇雨宋樓鑰竹輿繞湖濵宿霧尚厭浥徑到玉岑下坐久客始集起穿靈石山萬松介而立梅天氣清潤空翠行可挹古藤㡬百年枝蔓兩山及見説暮春時花繁紅熠熠直疑老潛虬初起夜來蟄俯玩嵗寒泉齒冷不敢吸相將上龍泓塵鞅謝覊馽洞有靈獸居臨深心岌岌魚游明鏡中巨浪無三級寒苔載水去萬頃潤原隰濛濛山雨來歸僕鳥飛急野興殊未巳日昃不暇給衝泥上湖船雨陣遽奔襲飄風將急㸃回旋驚四入中流益蕩兀短篷不當笠停篙亦久之怒勢不少戢我徒方嘯歌弗為改豪習但耻缾罍罄莫問衣裳濕送丞上虞宋樓鑰我老不復仕行將掛衣冠兩子俱貳令官職恰一般列川且書考上虞亦之官人言易捧檄歸奉重親歡我意正不爾期汝政可觀食焉怠其事古訓戒捨鏝汝職去民親簿書當細看一邑無不問正爾良獨難江海匝三埀長堤捍驚湍埭髙幾如山潮至不留殘宣和有遺迹能使潮浸灘陂湖謹蓄洩可以救旱乾長溝濟漕運浚治令通寛此皆丞所職勿憚心力殫江頭有東山永懐謝家安邑有李與豐況復居二潘尚友更從游問學加研鑽平時固知汝廉謹無欺謾渉世終未深戒汝能無言故鄉去帝鄉舟馭多往還失己固不可待人亦多端罔求違道譽善遣非意干窮達自有時此理真如丹聚散不足較豈得長團欒閒静我所便汝其自加餐有時或乘興往來二子間蹈雨送汝行浮家當游般走筆如家書誰能苦雕剜過舒臨海故宅宋謝翺破壁濕海蘚水邊日氣蒸云是舒公宅其孫艾且仁昔公初作尉視事即斬人上書稱臣亶待罪滄海濵天子有詔至汝亶可治民爾時荆文公上方邑之鄞聞此輙異之久㑹公秉鈞謂此非狂狷引用至中丞立朝思蹇諤庶以報君親蘇公下詔獄讒者用事新於此與有力豈為重其身晴風吹海雨山川尚橫陳俛仰勿太息徒為驚爾鄰會稽秋日觀山宋陳鑒之荒塍間流水槖落風颼飀前山與幽人亭亭共清秋逺近日明晦隱見雲去留木末一叟歸犬鳴茅舍幽憶昔典午東劒佩森名流勝地慰逺懐兹焉久綢繆漁磯與樵徑今有斯人不池石老苔髪空餘螺蚌游世有古今異郢歌聊自酧醉眼時摩挲此山即前修洞霄宫宋林景熙洞天有别雲福地無凡土嘉名此兼擅靈氣適專聚峰巒互重掩雲霧自吞吐飄然乘泠風一瓣謁瓊宇住山老黄冠迎客琪樹午魚魚美少年華裾集齋鼓往者修鍊人飛昇接髙武爾來何寂寥山川亦今古甲第疑王侯億萬富倉庾所以氣體移學道不精苦吾聞郭許儔卓菴老林莽終日對白雲餐松飲石乳大滌洞天宋林景熙九鎻絶人寰一嶂聳天柱自從開闢來著此洞天古竒石千萬姿元不費神斧帝勅守六丁山夔孰敢侮白晝中㝠㝠游者必持炬或絢若霞敷或蹙若波詭或竪若旌幢或懸若鐘鼓或虎而爪鋸或鳯而翅舞異狀紛獻酬清音起撃拊不知金堂仙恍惚在何許褰衣下側徑層嵐結瓊乳逕極罅轉深幽潭蓄風雨劣容童豎入恐觸蛟龍怒凛乎不可留長嘯出巖戸遊仙華山宋方鳯仙華矗萬仞我乃廬其東日夕與山對今兹踏玲瓏起左信奔鹿當前任啼狨大嘯厓石裂一覽天宇空蒼松飽風雨絶壑掛老龍樵斧不得睨撫根憇吾躬邈哉軒轅氏問道由崆峒龍髯一以逺千載非遺弓猶傳少女靈鍊玉於髙宫山林重帝胄香火明我衷我來重懐古攬涕臨西風何當刺飛流一洗磊磈胸浙江通志卷二百七十一
