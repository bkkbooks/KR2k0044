body:
  text: 浙江通志卷七建置四寧波府太平寰宇記古舜後為餘姚之墟史記吳世家越王句踐遷吳王夫差於甬東注韋昭曰句章東海口外州也清類天文分野之書秦以地置鄞縣屬會稽郡宋書州郡志漢會稽東部都尉治鄞清類天文分野之書元鼎五年於章安為會稽東部治所章安即今奉化之南也成帝時移句章漢書地理志會稽郡句章鄞鄮謹按漢順帝分會稽立吳郡鄮鄞句章三縣仍屬會稽三國吳及晉宋齊梁陳皆仍舊隋書地理志句章平陳併餘姚鄞鄮三縣入唐書地理志武德四年析故句章縣置鄞州八年州廢更置鄮縣隸越州舊唐書地理志象山神龍二年分寧海及越州鄮縣置屬台州唐書地理志開元二十六年採訪使齊浣奏以越州之鄮縣置明州以境有四明山為名通志地理略開元十道圖明州江南東道舊唐書地理志奉化慈溪翁山己上皆鄮縣地開元二十六年析置舊唐書地理志天寶元年改為餘姚郡乾元元年復為明州天寶領縣四鄮奉化慈溪翁山唐書地理志象山廣德二年來屬唐書地理志翁山大歷六年省嘉靖寧波府志元和四年置望海鎮於甬江之海口資治通鑑注望海鎮在明州界今定海縣即其地唐會要長慶元年移明州置於鄮縣成化四明郡志浙東觀察使薛戎上言明州北臨鄞江地形卑隘請移明州置於鄮縣而以州舊城近南髙處置縣從之唐書地理志明州餘姚郡上縣四鄮奉化慈溪象山輿地廣記梁開平三年升明州為望海軍節度十國春秋梁敕置明州靜安縣注一作望海縣又改定海縣十國春秋吳越改鄮曰鄞十國春秋吳越明州領縣六鄞奉化慈溪象山望海翁山謹按翁山省自大歷其何年復置十國春秋失載姑闕之宋史地理志建隆元年升奉國軍節度宋史地理志昌國熙寧六年析鄞縣地置元豐九域志上明州奉化郡奉國軍節度宋史地理志兩浙路明州宋史地理志紹興初置沿海制置使八年以浙東安撫使兼制司十一年罷隆興元年復置資治通鑑紹熙五年詔改明年為慶元元年尋升明州為慶元府宋史地理志以寧宗潛邸升為府文獻通考明州屬浙東路宋史地理志慶元府為東路宋史地理志慶元府縣六鄞奉化慈溪定海象山昌國元史地理志至元十三年改置宣慰司十四年改為慶元路總管府升昌國縣為州元史地理志江浙等處行中書省為路慶元元史地理志元貞元年升奉化縣為州續文獻通考大德六年移浙東道宣慰司都元帥府治慶元元史地理志慶元路上領縣四鄞象山慈溪定海州二奉化昌國函史明改明州府嘉靖浙江通志洪武二年昌國奉化復為縣續文獻通考洪武十四年改明州府為寧波府嘉靖寧波府志洪武十四年以郡有定海縣海定則波寧因改明州為寧波府明一統志浙江承宣布政使司領寧波府明實録洪武二十年廢寧波府昌國縣續文獻通考寧波府領鄞慈溪奉化定海象山五縣國朝定為寧波府屬浙江布政使司領縣五鄞縣慈溪奉化定海象山聖祖仁皇帝康熙二十三年巡撫趙士麟總兵官孫惟統等疏言舟山為寧郡藩籬請移定海總兵駐劄鎮守二十五年五月總兵官黃大來又會同督撫題請設立縣治二十六年五月奉上諭山名為舟則動而不靜因易名定海山頒賜宸翰二十七年建縣治賜名定海縣而以舊定海為鎮海縣鄞縣名勝志夏禹時有堇子國謹按地有堇山堇加邑為鄞清類天文分野之書吳敗越於夫椒越及吳平更封句踐東至於鄞即今鄞縣是也清類天文分野之書漢句章縣地東漢曰鄞又曰鄮王應麟鄞縣辨證越語句踐之地東至於鄞韋昭注今鄞縣是也後漢書注鄞故城在鄮縣東南圖經曰白社里冇鄞城山漢志鄞有鮚﨑亭今在奉化有天門山今象山之天門山然則奉化象山二縣漢之鄞也鄞城山其古鄞城歟今鄞縣有鄞塘鄉接奉化蓋鄞之境鄮縣辨證鄞縣東有鄮郭古鄮縣城也漢地理志會稽郡鄮縣五代改鄮曰鄞圖經云唐有鄞縣非也唐地理志無鄞陸雲集秦始皇南巡登稽嶽在鄮縣三十餘日圖經云後漢改鄞為鄮既而復為鄞非也西漢已有鄮句章辨證史記正義句章故城在鄮縣西一百里此張守節以開元之鄮言之元和郡縣志句章故城在今州西一里此李吉甫以元和之明州言之圖經古句章城在鄞縣南六十里此今之地理也虞翻傳注句章董黯則慈溪乃漢句章之地今鄞縣有句章鄉自此鄉及慈溪皆句章境謹按應麟之辨甚詳然則今之鄞縣在兩漢時實與句章鄮縣壤地相錯張時徹府志云鄞今奉化是鄮今鄞是句章在慈溪城山渡後徙句章鄉小溪鎮俱有舊址存焉並録之以備參考漢書地理志會稽郡鄞縣謹按鄞縣在平帝時莽改堇縣東漢建武初復舊名後仍屬會稽郡三國吳因之晉書地理志會稽郡統縣鄞宋書州郡志會稽太守領縣鄞謹按齊梁陳並因之方輿紀要隋平陳省縣入句章隋書地理志會稽郡統縣句章方輿紀要唐復置鄮縣為鄞州治州尋廢以縣屬越州太平寰宇記開元二十六年於縣置明州唐書地理志明州餘姚郡鄮縣上十國春秋吳越明州領縣鄞注故鄮縣吳越改曰鄞宋史地理志明州奉化郡鄞縣望謹按紹熙後屬慶元府元史地理志慶元路領鄞縣上倚郭舊浙江通志明鄞縣屬明州府尋屬寧波府國朝鄞縣屬寧波府附郭編户四百五十一里慈溪縣輿地廣記漢句章縣地太平寰宇記唐鄮縣地清類天文分野之書慈溪實鄮封內地元和郡縣志開元二十六年採訪使齊浣奏置慈溪縣延祐四明志句章董黯母嘗寢疾喜大隱溪水不以時得於是築室溪傍以便日汲溪在今縣南一舍故以慈名溪又以溪名縣唐書地理志明州餘姚郡慈溪上十國春秋吳越明州領縣慈溪宋史地理志明州奉化郡慈溪上謹按紹熙後屬慶元府元史地理志慶元路領縣慈溪中舊浙江通志明慈溪縣屬明州府尋屬寧波府嘉靖寧波府志永樂十六年令有失印者請更鑄印議者恐所失之印覆出為姦更印文從谷而慈溪為慈溪國朝慈溪縣屬寧波府編户二百八里奉化縣輿地廣記本漢鄞縣地清類天文分野之書隋開皇九年并鄞入句章太平寰宇記唐鄮縣地元和郡縣志開元二十六年採訪使齊浣奏置奉化縣嘉靖寧波府志治東有鄞城山下有鄞城院院即古鄞治也唐改鄞州尋廢為鄮縣開元間鄮立為明州因析其地為四屬縣而鄞故地改為今奉化名勝志以其民淳易於遵奉王化故名唐書地理志明州餘姚郡縣奉化上十國春秋吳越明州領縣奉化宋史地理志明州奉化郡奉化謹按紹熙後屬慶元府元史地理志元貞元年升奉化州隸慶元路下舊浙江通志明復為奉化縣屬明州府尋屬寧波府國朝奉化縣屬寧波府編户一百二十九里鎮海縣清類天文分野之書秦會稽句章縣地續文獻通考唐為鄮縣望海鎮地太平寰宇記梁開平三年吳越錢鏐以地濵海口有魚鹽之利因置望海縣後改定海縣十國春秋注武肅王奏置望海縣吳越備史又作靜海縣後改定海文獻通考云宋改定海未知孰是十國春秋吳越明州領縣望海清類天文分野之書宋熙寧十年分鄞之海晏靈巖大丘三鄉屬焉宋史地理志明州奉化郡定海上謹按紹熙後屬慶元府元史地理志慶元路領縣定海中明一統志以昌國縣省入定海縣名勝志昌國城在東海中翁洲本翁山縣洪武二十年以其縣居海島分徙其民僅存在城五百户隸定海縣舊浙江通志明定海縣屬明州府尋屬寧波府國朝康熙二十七年更名鎮海縣屬寧波府編户九十六里象山縣清類天文分野之書本漢鄞縣晉分臨海之北與鄞縣之安化鄉置寧海縣屬臨海郡隋開皇九年省寧海入臨海屬永嘉郡方輿紀要神龍元年析寧海及鄮縣地置象山縣屬台州廣德二年改屬明州唐書地理志明州餘姚郡象山中十國春秋吳越明州領縣象山宋史地理志明州奉化郡象山下謹按紹熙後屬慶元府元史地理志慶元路領縣象山中舊浙江通志明象山縣屬明州府尋屬寧波府國朝象山縣屬寧波府編户二十里定海縣史記注越東鄙甬江東也元和郡縣志翁州入海二百里即春秋所謂甬東地清類天文分野之書秦漢並屬句章縣唐開元二十六年置明州分鄮縣置翁山大歷六年罷成化四明郡志大歷六年袁朝據翁山鄮二縣久不克復遂移治鄞是年廢翁山十國春秋吳越明州領縣翁山清類天文分野之書宋端拱二年置鹽場熙寧六年乃置尉以治之尋立縣曰昌國文獻通考昌國居海心定海縣志元豐元年割定海縣之金塘鄉益之宋史地理志明州奉化郡昌國下謹按紹興間升望紹熙後屬慶元府元史地理志元至元十四年升州仍置昌國縣以隸之後止立昌國州隸慶元路下定海縣志明洪武二年以昌國州復為縣隸明州府十七年廢縣改昌國衛二十年移於象山縣三都海口東門二十五年改隸定海衛謹按明初信國公湯和以昌國外連倭國為清野之䇿因虛其地嘉靖中倭患亟每以官兵戍守之唐順之曰江南控扼在崇明浙東控扼在舟山天設此險以障蔽江浙門户諸哨船皆自此分而南北總會於洋山信國廢昌國而內徙之誠千慮之一失也國朝順治八年遣將略定十三年徙人民入內地康熙二十三年海氛既靖議復溫寧台沿海地移定海總兵於舟山二十五年題請設立縣治二十六年改舟山為定海山二十七年建縣治賜名定海縣總四鄉十九圖內昌國鄉為附郭定海縣志夏在樞翁州辨考夏少康封其庶子無餘為諸侯以奉禹祀是為越國其東境皆其采地也至周元王三年戊辰句踐滅吳欲置夫差於甬東君百家左傳注云甬東即句章東海中州也吳語曰甬句東注句章東海中洲也越語注云甬甬江句句章通典曰越徙夫差於甬東韋昭曰即句章東浹口外洲輿地廣記定海有大浹江是浹口外洲即翁洲也翁洲之地為甬東自周而已然矣漢武帝元鼎六年遣橫海將軍韓説自句章浮海九域志云句章即山為名斯時寧府及諸縣皆未立名而幅員所轄甚廣歷漢晉宋梁陳皆因之至隋文帝開皇九年平陳并餘姚皆入句章而隸於吳州改隸越州至唐髙祖武德四年始析句章置姚州鄞州七年廢姚州入餘姚八年廢鄞州為鄮縣而並隸於越州唐明皇開元二十六年因採訪使齊浣奏分為四縣屬明州曰鄮縣曰奉化曰慈溪曰翁山翁山即今之定海也始自為一邑唐代宗大歷六年海寇袁朝據翁山縣鄮縣久不克是年廢翁山尋復之至宋神宗熙寧六年改翁山為昌國縣元世祖至元十五年户口倍萬升邑為州今厯考之定海雖處海中周屬甬東秦屬句章五代因之唐名翁也山宋改昌國元升為州典籍俱存不得斷以臆説紹興府越絶書禹到大越上茅山大會計爵有德封有功更名茅山曰會稽謹按茅山皇覽作苗山通鑑綱目前編夏后少康五十有二歲封庶子無餘於越以奉先王墓祀通典春秋時越國之都太平寰宇記秦滅楚以越并入吳立會稽郡漢書地理志注漢髙帝六年為荆國十二年更名吳景帝四年會稽郡屬揚州謹按漢會稽郡所領縣在今紹興府者有餘暨諸暨山隂餘姚上虞剡六縣宋書州郡志永建漢順帝年號四年分會稽為吳郡會稽移治山隂三國吳志注山隂朱育仕郡門下書佐太守濮陽府君曰吾聞秦始皇二十五年以吳越地為會稽郡治吳漢封諸侯王以何年復為郡而分治於此育對曰劉賈為荆王賈為英布所殺又以劉濞為吳王景帝四年濞誅復為郡治於吳元鼎元年除東越國因以其地為治來屬於此而東部都尉後徙章安陽朔元年又徙治鄞或有寇害復徙句章到永建四年劉府君上書浙江之北以為吳郡會稽還治山隂府君稱善焉宋書州郡志餘暨吳更名永興三國吳志太平二年