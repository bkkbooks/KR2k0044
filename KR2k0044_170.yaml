body:
  text: 浙江通志卷一百七十一人物四武功一易重丈人詩稱元老揆文奮武二者兼資兩浙雖以文物稱而虎臣輩出莫不謀勇並施奇正互用其有保障一方效忠宣力者均為民社之賴邦家之光皇朝聲靈赫濯將帥盡干城選凡折衝禦侮建樹勳庸載在旗常用昭史册矣志武功杭州府漢轅終古史記東越列傳東海王餘善聞漢兵臨境發兵距漢道天子遣樓船將軍楊僕出武林元封元年入東越東越使徇北將軍守武林敗樓船軍數校尉殺長吏樓船將軍率錢唐轅終古斬徇北將軍為禦兒侯注正義曰轅姓終古名孫堅三國吳志本傳字文臺富春人年十七與父共載船至錢唐會海賊胡玉等掠取賈人財物於岸上分之堅謂父曰此賊可擊操刀上岸以手東西指麾賊望見以為官兵捕之即委財物散走堅追斬得一級以還由是顯聞府召署假尉會稽妖賊許昌起句章堅以郡司馬募召精勇得千餘人與州郡合討破之除鹽瀆丞徙盱眙下邳丞中平元年黃巾賊張角起中郎將朱俊表堅為左軍司馬與俊并力奮擊所向無前汝潁賊走保宛城堅身當一面登城先入衆乃蟻附遂大破之拜堅别部司馬邊章韓遂作亂涼州中郎將董卓拒討無功司空張溫行車騎將軍西討表請堅與參軍事屯長安章遂聞大軍至皆乞降軍還拜議郎時長沙賊區星攻圍城邑以堅為長沙太守到郡親率將士施設方略旬月之間克破星等周朝郭石亦帥徒衆起零桂與星相應遂越境尋討三郡肅然録前後功封堅烏程侯董卓擅朝政橫恣諸州郡並興義兵討卓堅亦舉兵前到魯陽與袁術相見術袁堅領豫州刺史卓尋徙都西入關堅乃至雒修諸陵引軍還術使堅擊劉表表遣黃祖逆於樊鄧之間堅擊破之追渡漢水遂圍襄陽單馬行峴山為祖軍士所射殺堅子權稱尊號諡曰武烈皇帝孫策三國吳志本傳堅子字伯符堅初興義兵策居舒與周瑜相友收合士大夫江淮間人咸向之堅薨渡江居江都吳景時為丹陽太守策就景因緣召募得數百人興平元年從袁術術甚竒之以堅部曲還策術常歎曰使術有子如孫郎死復何恨遣策攻廬江太守陸康拔之策説術平定江東術表策為折衝校尉行殄寇將軍兵才千餘騎數十匹賓客願從者數百人比至歷陽衆五六千策渡江轉鬭所向皆破莫敢當其鋒吳人嚴白虎等衆各萬餘人處處屯聚策曰虎等羣盜非有大志此成禽耳遂引兵渡浙江據會稽屠東冶乃攻破虎等盡更置長吏策自領會稽太守時袁術僭號策以書責而絶之曹公表策為討逆將軍封吳侯建安五年曹公與袁紹相拒於官渡策陰欲襲許迎漢帝密治兵部署諸將未發為故吳郡太守許貢客所殺策創甚呼權佩以印綬謂曰舉江東之衆決幾於兩陳之間與天下爭衡卿不如我舉賢任能各盡其心以保江東我不如卿卒年二十六權追諡曰長沙桓王三國吳孫靜通志宗室傳字幼臺堅季弟也堅始舉事靜糾合鄉曲宗族以為保障策破劉繇進攻會稽靜與策會於錢唐時太守王朗拒策於固陵策不能克靜説策曰朗負阻城守難可卒拔查瀆南去此數十里道之要徑宜從彼據其內所謂攻其無備出其不意者也策曰善至昏暮四維然火誑朗便分軍夜投查瀆道襲髙遷屯朗大驚帥兵前戰策破之遂定會稽表拜靜為奮武校尉權統事遷昭義中郎將終於家子瑜字仲異建安九年領丹陽太守十一年與周瑜兵討麻保二屯破之後從權拒曹公於濡須遷奮威將軍建安二十年卒瑜弟皎字叔朗拜護軍校尉時曹公數出濡須皎每赴拒號為精鋭遷都護督夏口輕財能施善於交結常下令曰今所誅者曹氏其百姓何罪自今以往不得擊其老弱由是江淮間多歸附者後吕蒙襲南郡命皎為後繼定荆州建安二十四年卒皎弟奐字季明皎卒代統其衆以揚武中郎將領江夏太守黃武五年權攻石陽奐使所部將軍鮮于丹帥五千人先斷淮道自帥五千人為軍前鋒降髙城得三將大軍引還權過其軍見軍陳整齊歎曰初吾憂其遲鈍今治軍諸將少能及者吾無憂矣拜揚威將軍封沙羡侯孫賁通志宗室傳字伯陽父羌堅同産兄也堅於長沙起義兵賁從征伐堅薨依袁術術表賁領豫州刺史轉丹陽都尉討平山越時策已平吳會二郡賁與策征廬江太守劉勳江夏太守黃祖軍旋定豫章賁領太守後封都亭侯卒子鄰嗣鄰年九嵗代領豫章討平叛賊政績修理召還武昌為繞帳督遷夏口沔中督威遠將軍所居任職赤烏十二年卒賁弟輔字國儀以揚武校尉佐策平二郡策討丹陽七縣使輔西屯歷陽以拒袁術又從策討陵陽生得祖郎等策西襲廬江太守劉勳輔隨從身先士卒有功策上輔廬江太守遷平南將軍領交州刺史吳景三國吳志吳夫人傳夫人弟景吳人徙錢唐常隨堅征伐有功拜騎都尉袁術上景領丹陽太守孫策與孫河吕範依景合衆共討涇縣山賊祖郎郎敗走會景為劉繇所迫復北依術術以為督軍中郎將與孫賁共討樊能于麋於橫江又擊笮融薛禮於秣陵時策被創牛渚降賊復反景攻討盡禽之從討劉繇繇奔豫章策以景為丹陽太守漢遣議郎王誧銜命南行表景為揚武將軍領郡如故徐琨三國吳志徐夫人傳夫人父琨富春人隨堅征伐有功拜偏將軍隨策討樊能于麋等於橫江擊張英於當利口而船少欲駐軍更求琨母時在軍中謂琨曰恐州家多發水軍來逆人則不利矣如何可駐耶宜伐蘆葦以為泭佐船渡軍琨具啓策策即行之衆悉俱濟遂破英擊走笮融劉繇策表琨領丹陽太守會吳景復為丹陽守琨以督軍中郎將領兵從破廬江太守李術封廣德侯後從討黃祖中流矢卒子矯嗣侯討平山越拜偏將軍矯弟祚亦以戰功至於蕪湖督平魏將軍凌統三國吳志本傳字公績餘杭人父操輕俠有膽氣孫策初興每從征伐常冠軍履鋒遷破賊校尉及權統軍從討江夏入夏口先登破其前鋒輕舟獨進中流矢死統年十五權以操死國事拜統别部司馬使攝父兵從擊山賊統率厲士卒身當矢石所攻一面應時披壞遂大破之權復征江夏統為前鋒行入右江斬黃祖將張碩時吕蒙敗其水軍而統先摶其城於是大獲權以統為承烈都尉與周瑜拒破曹公於烏林遂破曹仁遷為校尉又從破皖拜蕩寇中郎將從往合肥為右都督時權徹軍前部己發魏將張遼奄至津北前兵已遠勢不相及統率親近三百人陷圍扶扞權出敵已毁橋橋之屬者兩版權策馬驅馳統復還戰左右盡死身亦被創度權已免乃還橋敗路絶統被甲潛行權既御船見之驚喜拜偏將軍權敕屬城凡統所求皆先給統素愛士士亦慕焉得精兵萬餘人會病卒權聞之減膳流涕二子烈封內養於宫追録統功封烈亭侯全琮三國吳志本傳字子璜錢唐人父柔會稽東部都尉孫策到吳柔舉兵先附策表柔為丹陽都尉琮顯名遠近權以為奮威校尉授兵數千人使討山越因開募召得精兵萬餘人出屯牛渚稍遣偏將軍建安二十四年封陽華亭侯黃武元年魏以舟軍大出洞口權使吕範督諸將拒之軍營相望敵數以輕船鈔擊琮常帶甲仗兵伺敵數千人出江中擊破之梟其將軍尹盧進封錢唐侯四年假節領九江太守七年權到皖使琮與陸遜擊曹休破之於石亭是時丹陽吳會山民復為寇賊攻沒屬縣權分三郡險地為東安郡琮領太守明賞罰招誘降附數年中得萬餘人權召琮還牛渚罷東安郡嘉禾二年督步騎五萬征六安六安民皆散走諸將欲分兵捕之琮曰夫乘危徼幸舉不百全者非國家大體也今分兵捕民得失相半縱有所獲猶不足以弱敵而副國望如或邂逅虧損非小與其獲罪寧以身受之不敢徼功以負國也赤烏九年遷右大司馬左軍師十二年卒全緒三國志注琮長子緒幼知名奉朝請出授兵稍遷揚武將軍牛渚督孫亮即位遷鎮北將軍東關之役緒與丁奉建議引兵先出以破魏軍封一子亭侯南北朝吳喜宋書本傳臨安人涉獵史漢頗見古今為主圖令史沈慶之征蠻請喜自隨建義事平以喜為主書擢河東太守大明中黟歙二縣有亡命數千人攻破縣邑世祖遣喜將數十人至二縣誘説羣賊賊即日歸降太宗即位東兵急喜請得精兵三百致死於東上大悅即假建武將軍簡羽林勇士配之議者以喜刀筆主者不嘗為將不可遣巢尚之曰喜昔隨沈慶之屢經軍旅性既勇決又習戰陳若能任之必有成績喜乃東討百姓聞吳河東來便望風解散故喜所至克捷封竟陵縣侯東土平定又率所領南討遷輔國將軍尋陽太守南賊退走喜追討平定荆州泰始四年改封東興縣侯除淮陵太守五年魏寇豫州喜統諸軍出討大破魏於荆亭六年又率軍向豫州拒魏加假節督豫州諸軍事明年還京死子徽民襲爵杜稜南史本傳字雄盛錢唐人少落泊遊嶺南事梁廣州刺史蕭映映卒從陳武帝平蔡路養李遷仕皆有功梁元帝承制授石州刺史上陌縣侯侯景平後武帝鎮朱方以稜監義興琅琊二郡武帝誅王僧辨召與同行東征杜龕留稜與安都居守徐嗣徽任約引齊師濟江攻臺城安都與稜隨方抗拒未嘗解帶以功除右衛將軍丹陽尹文帝即位遷領軍將軍改封永城縣侯太建元年出為吳興太守二年徴為侍中尋加特進護軍將軍稜歷事三帝並見恩寵卒於家駱牙陳書本傳字旗門臨安人梁太清末世祖避地臨安牙母陳覩世祖儀表知非常人賓待甚厚及世祖為吳興太守引牙為將帥從平杜龕張彪等每戰輒先鋒陷陳勇冠衆軍世祖即位封常安縣侯遷越州刺史初牙母之卒也於時飢饉兵荒至是始葬詔贈牙母常安國太夫人諡曰恭太建八年遷散騎常侍入直殿省十年授豐州刺史至德二年卒隋陸知命隋書本傳字仲通富春人性好學通識大體釋褐陳始興王行參軍陳亡歸於家會髙智慧等作亂於江左晉王廣鎮江都以其三吳之望召令諷諭反者知命説下賊十七城得其渠帥陳正緒蕭思行等三百餘人以功拜儀同三司知命見天下太平勸髙祖都洛陽因上太平頌以諷焉詣朝堂上表請使髙麗曰昔軒轅馭厯既緩夙沙之誅虞舜握圖猶稽有苗之伐陛下當百代之末膺千載之期四海廓清三邊底定惟髙麗小豎狼顧燕垂王度舍𢎞每懷遵養者良由惡殺好生欲諭之以德也臣請以一節宣示皇風使彼君臣面縛闕下授普寧鎮將煬帝嗣位拜治書侍御史遼東之役為東暆道受降使者卒於師唐褚璆唐書褚遂良傳璆字伯玉遂良曽孫擢進士第纍拜監察御史裏行先天中突厥圍北廷詔璆持節監總督諸將破之遷侍御史拜禮部員外郎五代錢鏐五代史吳越世家字具美臨安人里中有大木鏐幼時與羣兒戲木上鏐坐大石指麾羣兒為隊伍號令頗有法羣兒皆憚之壯善射與槊稍通圖緯諸書唐乾符二年浙西裨將王郢作亂石鑑鎮將董昌募鄉兵討賊表鏐偏將擊郢破之時黃巢攻掠浙東至臨安鏐出竒兵邀之與徑卒二十人伏山谷中巢先鋒度險皆單騎鏐伏弩射殺其將巢兵亂鏐引徑卒蹂之斬首數百級乃引兵趨八百里八百里地名也告道旁媪曰後有問者告曰臨安兵屯八百里巢衆至聞媪語皆曰十餘卒不可敵况八百里乎急引兵過都統髙駢表昌為杭州刺史昌以鏐為都指揮使中和二年越州觀察使劉漢宏與昌有隙遣弟漢宥屯兵西陵鏐率八都兵渡江竊取軍號斫其營營中驚擾因焚之漢宥敗走漢宏復遣將黃圭何肅屯諸暨蕭山鏐皆擊破之四年漢宏遣將朱褒施堅實等以舟兵屯望海鏐出平水破褒等於曹娥埭進屯豐山堅實降遂攻降越州漢宏走台州刺史執漢宏送鏐斬於會稽鏐奏昌代漢宏而自居杭州光啓三年拜鏐左衛大將軍杭州刺史是嵗潤州帥周寶奔常州鏐遣將成及杜稜等攻常州取寶以歸昭宗拜鏐杭州防禦使是時楊行密據淮南鏐取蘇常唐升越州威勝軍以昌為節度使杭州武陵軍拜鏐都團練使景福二年拜鎮海軍節度使乾寧二年董昌反鏐以狀聞昭宗下詔封鏐彭城郡王浙江東道招討使昌遣將崔溫等屯香巖石侯鏐遣顧全武攻昌斬溫昌兵敗全武執昌歸杭州行至西小江昌投水死拜鏐鎮海鎮東軍節度使加檢校太尉中書令賜鐵劵鏐如越州受命還治錢塘號越州為東府光化元年移鎮海軍於杭州加鏐檢校太師改鏐鄉里曰廣義鄉勳貴里鏐素所居營曰衣錦營婺州刺史王壇叛楊行密遣將康儒應壇鏐敗儒於軒渚壇奔宣州詔鏐圖形凌煙閣升衣錦營為衣錦城石鑑山曰衣錦山大官山曰功臣山天復二年封越王天祐元年封吳王鏐建功臣堂立碑紀功四年升衣錦城為衣錦軍梁太祖即位封吳越王開平二年加鏐守中書令改臨安縣為安國縣廣義鄉為衣錦鄉四年楊渥將周本陳章圍蘇州鏐遣弟鋸鏢救之大敗本等乾化元年加鏐守尚書令兼淮南宣潤等道四面行營都統制貞明三年加鏐天下兵馬都元帥開府置官屬唐莊宗入洛賜鏐玉册金印鏐以鎮海等軍節度授其子元瓘自稱吳越國王長興三年卒年八十一諡曰武肅錢元瓘五代史吳越世家原名傳瓘字明寶少為質於田頵頵叛於吳楊行密會越兵攻之頵戰死元瓘得歸鏐臥病諸將皆曰元瓘從王征伐最有功請立之鏐召元瓘曰諸將許爾矣襲封吳越國王天福六年卒諡文穆十國春秋處州刺史盧約弟佶寇永嘉傅瓘承王命伐永嘉佶列巨舟四十艘於清澳海門以邀我師傅瓘謂諸將曰賊鋭卒盡在此矣姑弗與戰當由他道竟襲賊壘出其不意必成擒也於是自安固江登陸而襲之遂斬佶資治通鑑吳行營招討使李濤帥衆二萬出千秋嶺攻吳越衣錦軍鏐以傅瓘為北面應援都指揮使救之千秋嶺險狹傳瓘使人伐木以斷吳軍之後而擊之吳軍大敗擒濤以歸吳遣宣州副指揮使花虔將兵會廣德鎮使渦信屯廣德將復寇衣錦軍傅瓘就攻之拔廣德獲虔信以歸文獻通考錢鏐大舉伐吳以傳瓘為諸軍都指揮使帥戰艦五百艘自東洲以進吳遣將拒之傅瓘命每船皆載灰豆及沙戰於浪山江吳船乘風而進傅瓘引舟避之既過自後隨之吳回船與戰傅瓘使順風揚灰吳人不能開目及船舷相接傅瓘使散沙於己船而散豆於吳船豆為戰血所漬吳人踐之皆僵仆傳瓘因縱火焚吳船吳兵大敗錢𢎞佐十國春秋字元祐文穆王第六子天福六年即王位開運三年南唐李景攻閩閩李𢎞達更名達遣將徐仁宴等奉表稱臣乞師王召諸將計事諸將皆不欲行惟內牙都監使水邱昭劵以為當救王曰吾為天下元帥曽不能恤鄰難將安用之命昭劵專掌用兵內都監使程昭悅掌應援餽運而以軍謀委丞相元德昭遣統軍使張筠趙承泰將兵二萬水陸救福州十一月兵至福州自罾浦南潛入州城唐兵進據東武門禦之不利十二年三月王遣將余安自海道救福州兵至白蝦浦海岸泥淖方布竹簀以行唐軍聚射之簀不得施縱兵登岸大呼奮擊大破唐兵獲其將楊匡業蔡遇等器械數十萬遂引兵入福州李達舉所部歸附五月凱旋王饗將帥於光册堂賞賚有差六月王薨諡忠獻錢俶東都事略字文德吳越王佐卒弟倧繼倧廢俶時鎮浙東遂渡江襲位漢授以東南面兵馬都元帥仍領鎮海鎮東節度使至周以天下兵馬都元帥處之宋興改大元帥開寶六年俶幕吏入貢太祖謂之曰汝歸語元帥常訓甲練兵江南倔強不朝我將討之元帥當助我無惑人言云皮之不存毛將安附命有司造禮賢宅以待兩浙江南之先來朝者王師討江南以俶為升州東面招討制置使李煜貽書於俶曰今日無我明日豈有君一旦易地酬勳王亦大梁一布衣耳俶以其書來上加守太師又遣大將沈承禮率兵隨王師平潤州詔俶歸國江南平俶來朝太祖待俶甚厚自晉王宰相及中外臣僚上章請留俶太祖曰俶委質來朝若利其土宇而留之何以示信於天下及俶歸國太祖以黃絹封文字一復付俶曰侯到國即開之俶至國啓封皆留俶章也俶上表謝太平興國三年復來朝遂以國歸有司太宗改封俶淮海國王以禮賢宅賜之俶以天下既平求去元帥之稱從之改漢南國王雍熙四年出為武勝軍節度使徙國南陽既又辭國號改封許王端拱元年薨諡曰忠懿成及吳越備史字𢎞濟錢塘人咸通中捍山賊逐齊寇隸八都以富春鎮為靜江都將屬劉漢宏作亂與武肅王同事攻討漢宏鎮將孟安謀亂即席奮劍直犯王及舉胡牀制之因執孟安就戮復為靜江鎮將光啓中命征潤州薛朗常州刺史丁從實具牛酒犒師遺美女於諸將及取而斬之餘悉不納因克之尋平潤州授充常州防禦使尋為蘇州刺史乾寧時淮人圍姑蘇常熟鎮將陸郢巡檢郭用與其黨趙邯以城應城陷及至淮南楊行密辟為行軍司馬及曰以百口托於錢塘不幸城陷至此豈宜復以本道符竹援富貴於鄰境乃引佩刀自刺行密遽止之厚禮而歸焉署鎮海軍節度副使天復中王巡衣錦軍命武勇都將士治溝洫軍中作亂及護王駕回至北郭王微服將入城及乃代乘王車行與賊鬭王遂得入纍授保大彰義等軍節度使杜稜十國春秋字騰雲新城人唐乾符廣明間盜賊寇掠兩浙杭州練諸縣鄉兵討之稜為東安都將更號武安營八都董昌為長武肅王副之僖宗拜王為杭州刺史稜傾心事之潤州牙將劉浩逐其帥周寶奔常州浩推薛朗為帥王命稜與成及阮結討之敗其將丁重德趙君度取常州奉寶歸杭除常州制置使大順二年王以淮南數侵邊境令稜築東安城自固稜相險易度資用因山為城環城以池越十月而訖事王領鎮海節度使稜充副使王討董昌昌乞師淮南淮南將田頵安仁義率衆攻東安稜憑城自守會乏水穿井百尺不得泉稜默禱於神泉即湧地出頵仁義號勇將樓櫓翔空矢石交迸稜隨機應敵斃淮南兵於城外者無算唐進稜行軍司馬纍官潤州刺史阮結十國春秋字韜文錢塘人唐末杭州建八都結亦與為副焉結出入武肅王左右號親校中和二年以征劉漢宏功奏授散騎常侍光啓三年征常州又平潤州四年充潤州制置使卒吳公約十國春秋字處仁餘杭人黃巢之亂杭州八都既建已而析號十三都公約其一也初負膽略為縣豪會朱直起兵應募西討以功置西桂鎮遏使未幾從董昌禦黃巢於西鄙加御史中丞奏置都額改峽石為訓兵之所摧鋒破鋭日有聲稱武肅王破越州公約驍果先登兵罷拜千牛衛將軍劉浩平録功擢散騎常侍徐約陷蘇州王委公約專征授北面諸軍行營招討使克蘇州授義和鎮遏使兼本軍水陸都遊奕使淮人侵擾公約扞禦疆域屢挫敵鋒遷工部尚書俄改刑户二部乾寧四年卒馬綽吳越備史餘杭人初與錢鏐俱事董昌昌使鏐閲部伍亡其名籍鏐因歷唱之存亡健悴皆無遺失綽密謂鏐曰老子忌猜駭公強記當必相圖乃以白紙數番授鏐若代軍籍者鏐深德之因以其妹歸綽綽隨昌於越州尋棄家奔鏐授諸城都指揮使徐綰之亂綽有發懸門功鏐命子元瓘納綽女綽纍職鎮東軍節度副使兩浙行軍司馬睦州刺史雄武軍節度使卒曹圭曹師魯嘉靖仁和縣志圭少有膽氣唐末仕吳越為嘉興都將淮人圍嘉禾圭與其族人師魯守之淮人望氣者曰此雖孤城中有貴人不可圖也嘉禾平以功授蘇州刺史開平中淮人復圍姑蘇屬正月望夜師魯第盛陳燒燈之宴賊俘執者咸縱觀之圭以浙西營田副使終於蘇州師魯形短小而多智鏐嘗稱曰今之晏嬰人因號為曹晏嬰吳敬忠十國春秋於潛人從武肅王以八都兵討劉漢宏有功及王出師討田頵敬忠先登陷陳奏捷而歸王封吳越兩國敬忠授浙西營田副使兄順以功擢鎮海軍保城都指揮使弟欣子八人仕本國皆貴顯錢元璙吳越備史字德輝武肅王第四子起家授沂王府咨議參軍纍遷散騎常侍馬軍廳事指揮使天復二年徐綰叛顧全武請奉王子之𨝍溝武肅以淮帥常請結姻好乃遣元璙微服為全武僕而去比及望亭有逆旅媪輒識之至潤州安仁義亦知其非常將以其下十人易之全武懼因賂閽中宵而去及抵𨝍溝指陳逆順之理淮帥為之動容即日遣使命田頵還軍廣陵尋逆婦而歸後纍征縉雲新定皆有功授邵州刺史尋征吳興髙澧及攻東洲復授睦州刺史遷蘇州纍授中吳建武等軍節度使太傅同中書門下平章事侍中中書令文穆王即位以王兄尤加禮遇封廣陵郡王卒諡宣義杜建徽吳越備史稜子少強勇嘗於山莊構小茆齋私署軍州押衙紀於棟稜加督責對曰大丈夫何止一軍事押衙即稜歸武肅王建徽以父命盡心於王稜在常州為淮南所逼建徽馳赴父難未及境而城己拔乃率部還新登及稜自淮南歸軍中嚴整無改稜稱之纍從征伐皆單衣入陳賊衆無不披靡軍中謂之虎子徐綰之叛馳入援賊將聚木焚北門建徽持火鈎取其木先焚之賊計遂罷睦州陳詢叛王以建徽為詢姻婭使馬綽伺其意建徽曰陳氏負恩背義徽既姻婭義當見疑然纍書敦諭皇天后土茍或鑒照則拔城獲書方明徽心耳俄有睦州廳吏來降持建徽所遺書至王嘉歎久之每朝會王必指之曰此杜丞相今日忝有一方多其力也忠獻王時建徽春秋髙尚能騎射嘗從擊毬於廣場興酣有宿中箭鏃自臂中飛出人皆壯之歷官自武安都將至涇源昭化等軍節度使吳越國丞相封鄖國公年八十八卒曹仲達吳越備史圭子少時圭嘗節其衣食雖嚴冬尚未挾纊品膳悉與僕隸等又日令運甓武肅王見而竒之以妹儷焉纍授台處二州刺史文穆即位命仲達權知政事國建拜丞相忠獻王即位復攝政事時大賚中外軍中有言不均者輒舉仗不受賜諸將不能制仲達諭之因皆釋仗而致謝卒諡安成水丘昭劵傳詳忠臣宋錢惟濬宋史新編字禹川俶子裁數嵗俶表授節度副使檢校太保宋初領建武軍節度加至太尉後授鎮東等軍節度大軍征金陵惟濬從俶下毗陵以功加平章事太宗即位加兼侍中俶獻地徙淮南節度加檢校太師從平太原征幽薊又從幸大名雍熙中歷鎮安州端拱初封肅國公加兼中書令淳化初卒追封邠王諡安僖錢惟治宋史新編字和世琮子俶養為已子纍遷檢校太保台州團練使乾德中制授寧遠軍節度檢校太傅與惟濬節旄同日而至國人榮之王師討江南惟治從俶率兵下常州策勳改奉國軍節度使太宗嗣位進檢校太尉俶既納土惟治歸朝改領鎮國軍節度雍熙三年大出師征幽州命惟治知鎮定軍府事兼兵馬都部署訓兵饗士勤政務纍上表請罷節鎮優詔不許景德中轉右武衛上將軍纍加左騎衛上將軍左神武統軍卒贈太師孫承祐宋史吳越世家錢塘人俶納其姊為妃因擢處要職纍遷鎮海鎮東兩軍節度副使知靜海軍節度事開寶初隨俶子惟濬入貢詔授鎮東鎮海等軍行營司馬王師渡江詔俶以所部會攻常潤承祐從俶克毗陵功居多太平興國中俶獻其地徙承祐泰寧軍節度使五年從幸大名留知府事雍熙二年改知滑州卒贈太子太師崔仁冀續資治通鑑長編字子遷錢塘人事吳越為通儒院學士太祖召吳越進奏使任知果令諭旨於其王俶曰元帥克毗陵有大功俟平江南可暫來與朕相見仁冀告俶曰主上英武所向無敵今天下事勢已可知保族全民策之上也太平興國三年俶入朝與仁冀決策表獻所管十三州一軍以仁冀為淮南節度使錢禹卿朝補之錢禹卿墓志字仲謨俶曾孫以父任為太廟齋郎調雲安尉徙令繁昌改大理丞擢通判霸州遷通直郎在霸州有告𣙜場火者衆相傳遼兵至守陴警備禹卿曰何至是遣捕之果小偷也在環州屬靈武用兵守辟禹卿提舉糧草夏縱抄而禹卿崎嶇獨全霸環西北要害郡朝廷方欲用之而禹卿於元豐五年卒沈晦宋史新編字元用錢塘人遘之孫宣和進士除校書郎遷著作佐郎金人攻汴京從肅王樞出質斡喇布軍還為給事中髙宗即位除集賢殿修撰歷知建康府紹興四年為廣西經略兼知靜江府先是南州蠻酋莫公晟歸朝授本路鈐轄羈縻之嵗久遁去旁結諸洞蠻為邊患晦招誘諸酋喻以威信皆詣府請降晦犒遺之結誓而去自是公晟孤立不復犯邊晦在郡嵗買馬三千匹進徽猷閣學士召赴行在除知衢州改潭州奉祠卒俞灝咸淳臨安志字商卿世居杭登紹熙四年第仕淮東宣撫佐畢再遇救山陽灝料金必窺采石請回軍石梁河以遏其鋒金搗虛不入而遁再遇知揚州蕩平湖海多灝計畫再遇欲誅脅從者灝救活甚衆開禧議開邊灝言輕脫寡謀之人不可信趙良嗣張覺往轍可鑒歷秉旄節皆有聲寶慶二年致仕元許懋嘉靖海寧縣志字國器元季值嵗飢發家儲振貸復以萬户長督海運抵大都授杭州路治中不就紅巾賊起懋倡子弟義勇力戰却之明楊寧獻徵録字彥謐錢塘人宣德進士拜刑部主事正統己未隨征麓川師次境上賊遣人欵軍門約降主將欲許之寧曰不可兵未加而敵降是誘我也弗聽曰必欲許之請嚴兵以備不虞衆謂寧迂檄令督運於金齒不旬月賊衆奄至士卒多陷還京將兵者率被譴寧升郎中辛酉大舉伐麓川總督王驥仍以寧行寧督戰渡江攻上江賊寨賊矢石如兩寧奮不顧身督戰益力士卒咸用命遂克之又進攻杉木籠山賊柵險拒守寧曰賊狃於前勝當多方以誤之使不暇併力乃可圖驥用其言令諸將各視形便以進諸道俱奮連破七寨乘勢搗賊巢圍之因乘風舉火煙焰漲天賊不知所為死鋒鏑及墮崖溺水者不計其數師還升刑部右侍郎奉命參贊雲南軍務至則練兵伍督耕屯懷撫遠人民夷悅服時麓川賊首逸於緬寧簡鋭師若將有所向者先遣使奉詞責緬緬人懼求出賊自效卒誅大憝函其首以獻還朝未幾閩浙東廣寇竊發江右密邇三境命寧巡撫寧至按視郡縣當賊衝者增城垣立排柵以斷要路團集鄉兵訓以武藝賊有侵軼者輒擊斬之以故賊聞風畏避不敢犯景泰初還京拜禮部尚書調南京刑部天順改元致仕鄭顒獻徵録字士昂錢塘人宣德舉人授江西樂安縣教諭邑無賴曾子良輩嘯聚大槃山顒率民兵出戰賊潰邑賴以寧擢監察御史升雲南按察司副使時麓川思機發不靖靖遠伯王驥薦顒參贊總兵征南將軍沐昂軍務苗賊攻圍貴州地方告急顒曰唇亡則齒寒即與總兵調兵策應賊聞之宵遁烏撒畢節赤水永寧站路營堡被賊燒燬遣指揮使楊濬率軍整葺之騰衝與麓川接壤添設衛所顒區畫布置立營以居分田以耕立市井有無相易保障益固升大理寺少卿督運糧餉升右僉都御史參贊如舊思機發竄伏緬甸朝廷欲發兵征捕顒奏遣都指揮等官往諭之緬甸即出思機發之母子妻女械送京師升左僉都御史調福建按察司副使沈慶嘉靖餘杭縣志字仲會學博才贍尤精兵法宣德舉人官翰林院五經博士大學士陳循薦宜大用升湖廣按察司僉事時靖州五開等處苗賊生發把截道路慶相地設官鑿山濬河自偏道鎮直抵黃平迂道千餘里據壕立兵以地利制賊賊李珍蒙能大肆猖獗慶親率兵突陳殲厥渠魁擒其黨二百餘人升本司副使巡邊整飭兵備成化初復領漢土官兵十萬餘衆進攻臘屋桃林武岡南洞等處一鼓擒獲賊境悉平進階亞中大夫請老歸鄭暹天啓贛州府志錢塘人正統初由鄉舉任贛州通判十三年閩廣盜起暹躬率丁壯萬餘人設法防禦境賴保全超升知府王業兩浙名賢録字時泰世襲仁和衛副千户祖父世其職業年十六襲職京師適車駕北征例當扈從業在軍中動循紀律而勇略過人既凱還任吉安專督屯事而一軍政務咸咨焉梅花洞寇作業往平之永豐大盤山賊首曾子良聚衆劫殺郡守陳本深謀於業業奮然曰兵固不敢擅調然民患之急如此可坐視乎古有先發後間者即日選精兵二百餘人倍道以行或諷其急業曰彼賊烏合之衆耳若少緩則有備猝至逼其營壘一鼓而勝之捷聞升本所正千户閩浙寇起遣大將寧陽侯往討之吉安軍當調業統以往從都督劉某殺丁公崔賊大軍潰而業軍獨全因歎曰吾不得用其智而徒制於人上不能為朝廷殺賊下不能為生民除害何以為人臣遂以鬱憤卒業為人輕財好義撫馭士卒嚴而有恩臨陳勇氣勃發目光如電橫戈而往前無堅敵有古名將風蔣琳成化杭州府志錢塘人驥子清強鷙鋭勇於立功巡撫貴州提督總兵軍馬先是草塘寇叛官軍屢挫琳至計須獮剃而總兵以下難之琳乃躬為之奮率先以征一鼓直抵巢穴掃汛而還璽書褒嘉有忠誠謀勇盡心為國之語自是諸苗斂畏後坐于謙黨論死崔端兩浙名賢録字惟正海寧衛指揮僉事偉軀幹多膂力精騎射景泰間倭入貢還所過求索至攘敓手刃人浙藩檄端防護端耀兵戢旅臨之以威倭酋帖服無何處婺山民相扇弗靖都督徐恭統兵剿之聞端才檄為前鋒端率徑兵搗其巢生擒賊首陶得禮上功幕府進指揮同知備倭把總分守浙東端感激自奮水陸之行無一日休而勞頓困憊疽發於背疾革大呼曰大丈夫不以馬革裹尸竟死於牀第間乎言畢而逝彭信杭州府志字中孚仁和人景泰進士巡按廣東時嶺南未靖武將専征頗易信儒生及出師誓衆為帥指陳方略揆度事機切中肯綮卒之殄滅狡寇兵無挫衄信功為多俘奏帥以所得賞讓信信曰吾文士也吾身有階奚以武為人多其不伐改按陜西成化初擢順天府丞卒於官洪鐘毛奇齡洪鐘傳字宣之錢塘人成化進士授刑部主事江西福建賊新定鐘奉使安置歸言福建武平上杭清流永定及江西安遠龍南與廣東程鄉率流移混雜習鬭爭以武力相尚故易亂宜令有司立鄉社學銷兵器教之詩書禮讓以化其姦慝時謂知本之言𢎞治中升四川按察使時安氏世據馬湖恃力為一方患鐘設策去之而請吏治其地歷升右副都御史巡撫順天兼整飭薊州諸邊備鐘增築邊牆自山海關界嶺口西北至密雲古北口黃花鎮直抵居庸延亘千餘里繕復城堡二百七十且憑城沿邊諸縣使各有所守改雲貴巡撫督理漕運正德中以左都太子少保出總川陜湖北四省軍務時沔陽洞庭水寇邱仁楊清攻掠城邑鐘調土漢官兵分道進𠞰敗賊於麻穰灘賊平藍五鄢老人倡亂烏合十萬餘人鐘督兵進𠞰賊敗求撫然意在緩師依山為營預邀裂營山縣地且欲得旗牌官為質劫掠如故鐘佯許之會藍五以所掠女為已女飾嫁永順土舍彭世麟以結歡世麟白軍門受之鐘令藍五所親鮮于金説五及老人帥賊衆王金珠等二十八人來會伏發盡擒之衆聞變大潰鐘遣諸路兵分道追𠞰擒斬七百餘人招降十餘萬露布以聞其後上官楊友楊愛相仇激為變流劫重慶保寧諸州縣鐘隨調兵𠞰平之進太子少保未幾乞歸嘉靖改元遣有司勞問卒諡襄惠邵梗閩書字良用仁和人嘉靖進士任福建巡海道駐漳州時海禁廢弛姦民闌出入賈禍召寇梗下令曰凡姦民為賊間及違禁出物廉有狀者殺無赦羅織相告者勿詰於是反側帖然益濬隍增陴選卒厲兵徙四郊積蓄入城中使賊無所掠倭寇合兵犯長泰選火藥手百人躡擊之賊宵遁又遣舟師攻海寇於月港銅山清浦諸處凡七克捕斬無算餘寇自月港掠舟入海將遁遣義士沈講率所部兵與官兵犄角邀賊舟於東燈以巨艦衝沈之擒斬二百餘寇盜悉平陳洪濛弇州史料字元卿臨安人嘉靖進士刑部主事歷遷江西按察副使九江兵備除戎器搜卒補艘完城堞盜起必窮其窟而洗之歷升右副都御史巡撫貴州兼督川東辰沅諸軍時施州蠻黃中叛跳川東支羅牛欄坪囤剽掠旁郡邑詔洪濛偕楚蜀二鎮合兵討之洪濛自川東率大軍入深箐多張疑兵誘其毒矢石殆盡而間道募死士繞出其後急擊大破殺虜千五百餘級焚洞寨百餘蜀兵亦從西北躡之黃中迫挺身跳入楚叩軍門請死當是時貴與蜀有戰功而楚坐得酋首蜀與楚爭功不能決洪濛第謂楚蜀勢異不有勦者誰與撫地不有撫者誰與𠞰窟且皆天威也三省安得徼之疏上大司馬推洪濛能讓而洪濛又與都督石邦憲合策破叛酋楊珂之六洞十二寨悉俘其父子兄弟餘黨歸農者以萬計屬疾疏請骸骨許之當候代傳鎮逺卭水巴狠苗普面等叛輿疾剗平御史上前後功賜白金文綺加等馮覲海寧縣志字晉叔嘉靖進士授職方郎庚戌之事覲守西直門撫軍詰姦威令整肅轉武選歷升廣東左參政行部樂昌猝遇猺賊橫掠從者皆走覲獨衣冠端坐賊與之入巢求犒覲正色曰若不知馮參政耶安得犒賊乃復輿覲出駐韶州覲於入巢時已窺其要害尋集徑卒千人出不意間道襲之遂獲巨魁俘其黨百餘以出事聞擢按察使吳玭獻徵録字汝瑩錢塘人嘉靖進士拜行人歷廣東布政司參政搜士卒立保伍明法令察盜出沒根苗而芟除之境以大寧連寇作督師征之殺二千餘人降千餘人清遠峽險而多盜以卒六百人鑿山三十里為梁二十有一舟用得挽以濟籍民舟之賈於海者什伍為綱紀約寇至共擊之其去為盜者衆發之不發與坐海寇頓輯玭固知兵更習吏事會有事安南治益勤以羸卒顧言杭州府志字子行仁和人嘉靖進士知惠州府島寇交訌言知千户王招才勇授以方略擒殺賊李烏蛇李文沖及其黨千餘人願為農者釋之時又有花腰蜂等三千餘人流劫鄉鎮言圖畫進軍機宜山川險隘為書曰惠陽圖説上之軍府請調發時以潮寇為急兵力未能及惠言乃令辨士入賊巢陳説利害賊感悔悉降歷遷雲南按察使萬厯五年以貴州左布政致仕歸宋應昌獻徵録號桐岡仁和人嘉靖進士知絳州歷進副都御史巡撫山東首請加意防海復營衛巡司諸舊制萬厯壬辰倭突入朝鮮國王李昖走竄義州拜應昌兵部右侍郎經略薊遼山東保定等處防海禦倭軍務應昌出關臘月與提督李如松踏冰渡江正月兵薄平壤倭將平行長築飛樓鑿墻穴守牡丹峯以相犄角應昌指授方略圍其三門外布鐵蒺藜數重火器齊發毒煙蔽空大軍含解藥仰面攀附而上諸門盡破斬首焚溺死者無算行長捲營遁時聚倭三十餘萬當八道之中去釜山千五百里倭不退朝鮮不可復應昌畫依山俯攻之策夜令死士以明火箭射燒龍山倉十三座糧盡倭棄去應昌又遣兵追擊至南原又追及晉州斬級甚衆倭自此仍還釡山舊巢復遠遁熊川西生浦是役也索回王子陪臣宫眷百餘人斬倭首二千餘級克復平壤開城還故地二千五百里甲午三月留劉綎兵居守乞骸歸郭孝仁和縣志字可忠嘉靖進士任刑部主事歷湖廣僉事備兵惠潮嶺表盜賊充斥巨寇曾一本林道乾為之魁巨艦乘風出沒波濤間孝至大修戰具遣人諭以禍福道乾倒戈降而一本獨頑梗不受撫因檄閩廣兵尅日大舉孝親執枹鼓立矢石間士氣百倍遂大破之一本遁去調河南再遷江西副使分巡饒南饒襟帶長江洪濤千里盜賊剽掠行旅苦之孝增置戰艦星布要津賊即受捕江道遂清嘗獲礦盜數百人悉杖而遣之曰此貧乏者求延旦夕耳不以功聞也尋轉福建左參政過莆陽環視城形三面平曠東南外擁髙山城俯接其下孝曰此窬竇也增闢城址圍其山於城中升貴州按察使致仕歸盛德於潛縣志字大本以明經入太學授南城兵馬司副遷鎮江府通判時海寇王艮勢猖獗臺司命德領前隊往𠞰德鼓衆乘風夜抵賊舟艮驚以為神赴水遁去衆亂遂殲之隨撫其降卒二人為鄉導直搗其巢生擒艮以歸大帥湯震駐師四十里外聞報揚帆遽至盡攘其功僅獲賞宴加級尋以疾致仕歸江鐸獻徵録字士振仁和人萬厯進士授刑部主事出守福州歷升山西參政晉按察使會播酋楊應龍反於蜀朝議擢鐸僉都御史巡撫偏沅時總督李化龍分八道進兵川師四路黔師三路鐸統楚師次黃沙囤一路分兩翼由白泥由龍泉夾攻板角關破之再進破瑪瑙長坎保子等囤奪楛木關進屯青蛇囤遂入三渡關乘勝直抵海龍囤海龍於諸險中為最賊負嵎時暑雨甚藂箐中多重嵐毒霧師深入而餉不繼鐸改長運為接運每三十里設營置運卒數千前運未行後運已東載而待士乃宿飽破土月二城應龍自縊論功廕一子世錦衣指揮洞蠻皮林在湖貴交與九股苗相接有吳國佐者洪州司特洞寨苗也桀黠無賴通漢語略知文義素往來諸苗洞習其酋酋咸推服之遂反合其黨石纂太攻上黃堡敗參將黃沖霄縱掠屯堡七十餘時方征播未暇討既平播鐸移駐靖州命總兵陳璘率副將李遇文等七道以進擒苖酋銀貢等攻破特洞焚之國佐逃天浦追獲之石纂太逃廣西上巖山指揮徐時達誘縳之賊黨楊永祿率衆萬餘屯白沖遊擊沈𢎞猷等夾攻生擒永祿諸苗悉平初鐸語諸將曰皮林外有衢內有險諸苗營窟甚固非先以文告解散凶黨則渠魁未可旦夕平也下令禁妄殺開招撫明賞格戒騷擾逮進攻又嚴禁各軍之殺奪者以是諸苗歸順易以成功旋以勞疾歸卒贈兵部右侍郎洪瞻祖杭州府志字貽孫鐘曾孫也萬厯進士由庶吉士為兵科給事中烏江當貴播之界南岸則烏江關循江而下北屬播南屬貴水西稍侵界土總督王象乾責水西退出所侵地欲以為功瞻祖謂安氏二百年來與流官無異其兵則勇冠諸苗其人則戅而戀主其地則滇南門户督臣何故爭之且沙溪撮土所爭幾何全播之間得不償失智者不為也神宗以兵科議是會延綏總兵麻承恩陳璘納賂兵部尚書有所改授瞻祖疏劾本兵通贓私汚廷議首輔沈一貫不能庇乃得罪去中察典補嘉定丞擢南行人副歷升右都御史巡撫南贛時閩廣黠賊匿深箐中官軍多失利瞻祖檄諸郡兵分路合𠞰身歷蠻瘴中越贛渡汀冒矢石執桴鼓斬賊渠了婆等一千餘人燬員子山等三十餘巢奪還男婦牛馬器械無算四省合奏其功而瞻祖已乞骸歸家居四十餘年卒陳九思萬厯錢塘縣志本姓鐵始祖堅為元守和州降明明太祖賜姓陳世襲杭州前衛百户九思長身偉幹有氣槩萬厯十年襲職又以武科授吳淞參將嘗操小舟出沒三江間大盜竄伏輒復擒獲倭勢披猖沿海亡命相為窟穴一夕悉戮之轅門與倭戰禦之海上敘功升永平副總兵歷真保薊津等處總兵官所至有竒績以病回籍卒盛本一於潛縣志字子元萬歷選貢授山東平度州同知劇盜劉鳯鸞兄弟五人久為州患本一聽其四掠故弗救密遣心腹投賊遂設伏要害獲鳯鸞等餘衆悉就撫老稚羅拜曰十年之寇賴公殲於一旦因立石頌功陳起龍富陽縣志字雲從崇禎進士授建昌府推官纍擢福建布政司參政分守漳南時賊首江世英等往來剽掠漳潮間起龍修理城具選練精鋭全郡恃以無恐未幾雲霄撫寇告警起龍單車赴之及至浦城賊已據盤陀嶺起龍曰險易未習宿衛未周法當先守後戰乃分隊登陴四門懸燈布列率先周巡三晝夜口不嘗飱目不交睫賊勢不支其首徐連等鳩黨數百乞撫起龍度此屬忽撫忽叛法在不赦審其桀驁者盡斬之諸寇悉平許當俊餘杭縣志崇禎間由吏員任廣東曲江主簿值流寇圍城據帽頂山俯瞰城中當俊夜簡壯士斫其營一鼓奪之賊善妖術城門忽自開當俊急撤屋材沿城樹柵賊不得入又詗知賊間在城中者啖以重利使反為我用誘妖首近城取賞伏壯士出不意擒之賊計阻解圍去城賴以全巡撫張鍾心上其功升本省惠州經歷國朝吳六竒廣東通志號葛如少落拓不事家人産明季從戎委守豐順殱山寇王師定粵六竒中路迎謁率衆景附授總兵官開閫饒平會土寇江龍踞大埔鄭儼據湯坑六竒悉討平之順治十年潮鎮郝尚久叛各鎮多從六竒抗不肯附攻甚力潮既恢復紀功獨多特詔褒美賜蟒貂刀馬等物以左都督加太子少保六竒在潮修府庠建明倫堂又建饒平大埔兩學及置鳯城驛太平公館卒贈少師諡順恪謹按吳六竒海陽籍本海寧人趙廷標錢塘縣志字叔文錢塘人順治三年以諸生從軍除福建永定縣知縣境久藪賊廷標至會迎眷東郊廷標覆甲隍間而集諸耆老率兒童伎樂張綵設伏闢闉都以迎賊不疑有備羣趨之覆起掩殺環數十里餘賊散去遷湖廣衡州府同知攝府事督撫共薦遷常保分守道康熙辛丑備兵安普撫爨僰諸蠻而寧州彌勒州各土官誘諸蠻反征蠻軍四出以廷標監軍決策行間復故時維摩地安慰巴盤八甸間諸蠻以寧調廣東廣肇南韶道川湖兩廣八排嶺諸寇聞廷標至立解連州寇起鎮臣以𠞰捕方略委之廷標諸寇聞廷標至亦即就撫補長沙鹽驛道先是長沙陷賊甫恢復軍書旁午一切芻茭械杖舟師笮役征徭去來者絡繹於路廷標砥力辦給不誤晷刻因併理糧儲道事康熙戊辰遷陜西糧儲道以病牒上會武昌兵變羽書來湘潭廷標強起視事晝課儲峙夜巡警以防竊發纍月而病甚丐歸卒於家廣東通志廷標在粵東盜聞其名輒遁去舊有分巡使者柴薪錢屏不受給民之煢弱無告者湖廣通志廷標在楚接士以禮御民以慈除鹽務陋規禁漕糧夙弊每行部至衡父老子弟咸曰吾慈父至矣王玉公舉事實字楚珩仁和人武鄉試第一順治壬辰會試復第一殿試第一甲第一授福建都督僉事時海寇屯漳攻泉州興化屬邑惠安同安告失而漳之南靖長泰漳浦詔安四縣先陷於賊玉復惠安同安解泉州圍隨從提督恢復漳城并四縣玉以諸邑淪陷且漳城兵燹之餘傾廢已盡請免諸邑罪民以築城海寇復突陷閩安鎮直逼省城巡撫宜永貴命玉偕撫標分頭堵禦帶兵不滿三百出奇力戰用大炮破賊木城於西城龍腰斬奪雲梯生擒賊首楊炯韓泰等賊遁去而城獲全升陜西延綏定邊都督同知調天津衛總兵致仕家居三十年年九十卒嘉興府漢朱買臣漢書本傳字翁子會稽吳人武帝時召待詔時東越數反覆買臣因言故東越王居保泉山一人守險千人不得上今聞東越王更徙南行去泉山五百里居大澤中令發兵浮海直指泉山陳舟列兵席卷南行可破滅也帝拜買臣會稽太守居嵗餘買臣受詔將兵與橫海將軍韓説等俱擊東越有功徵入為主爵都尉南北朝陸黯海鹽縣圖經黯海鹽人太清之亂侯景遣其將宋子仙攻沒吳郡以偽太守蘇單于守之黯舉義有衆數千人乘子仙進兵錢唐夜襲破郡殺單于推鄉人前度支尚書陸襄行郡事黯與襄兄子映公帥衆拒子仙子仙還兵來攻戰于淞江時同義者有陸緝戴文舉等黯以鹽人起義破吳因分海鹽胥浦二縣為武原郡不復令屬吳云五代髙彥十國春秋海鹽人初與同縣沈夏受武肅王意密謀誅都將徐及以其首歸王前後從征多顯功擢海昌鎮將會湖州刺史李繼徽棄郡奔淮南彥隨王親巡其地王由是雅屬意彥題詩嬰蘭堂壁曰我以此州授汝奏遷湖州制置使旋升刺史封渤海公朱行先朱府君墓志字藴之開元府海鹽人少親戎律長習武經始隸職於建寧都從髙彥所在征討纍有功績尋彥分符霅渚行先亦隨於治所用為心膂鄰境有寇總握兵柄仗劍前驅無不望風瓦解彥卒髙禮亂行行先奮臂一呼率衆歸國吳越王鏐封協力勤王功臣尋封佐正匡國功臣加封右僕射仍委之靜海劇鎮行先版築城壘不日而就不勞於民卒乘輯睦鎮縣和同恩威並行緩猛得所以寶大元年秋終於靜海官舍謹按朱行先墓志作者姓氏無考海鹽文獻志僅載鶚名故闕之宋王子武兩浙名賢録嘉興人初為統軍睦寇方臘作亂橫行州邑來攻秀州去城南一舍而陳衆號十萬子武白太守曰今日之政公職守子武職戰請背城借一以報國乃下令簡精鋭五百人長兵在前短兵在後弓矢分左右翼夾射遂啓門鼓噪而出太守復率百姓登陴擂鼓發喊以助之屋瓦皆震戰士勇氣百倍以一當百賊大駭奔潰追奔數十里斬首五千級築京觀五以表其功賊遂退據臨安不敢北向以窺江淮者由子武以孤軍遏之之力也陳之經嘉興府圖記字仲綸崇德人教授德安會有邊警與諸生習兵法金入寇郡將命奉檄求援夜縋城以出至鄂告宣司發兵二千人又倍道星馳達行在所得兵符調江池孟師齊等軍赴援金遁去陳攻守得失軍政繆戾數十事請加賞罰以肅軍旅時皆壯之元楊樞黃溍楊樞墓志字伯機嘉興人大德五年年甫十九致用院俾以官本船浮海至西洋遇親王合贊所遣使臣那懷等如京師遂載之以來那懷等朝貢事畢請仍以樞護送西還丞相如其請奏授樞忠顯校尉海運副千户佩金符與俱行以八年發京師十一年乃至其登陸處曰忽魯謨斯云是役也往來長風巨浪中歷五星霜凡舟楫糗糧物器之類一出於已不以煩有司既又用私錢市其土物白馬黑犬琥珀蒲萄番酒之屬以進平章政事察納等引見宸慶殿而退方議旌擢而樞疾作歸家二十載泰定四年起為昭信校尉常熟江隂等處海運副千戶給慶紹溫台漕挽之直力剗宿蠧掊尅之弊至順二年升松江嘉定等處海運千户命下而卒明李文榮萬厯嘉興府志嘉善人歷太僕寺丞謫戍北平遇靖難以守城功擢江西參議賜以奉天征討鐵牌一面部內寇發隨宜誅𠞰既而入覲賜襲衣致仕彭程海鹽文獻志襲指揮僉事素負膽略知天文正統十三年寇鄧茂七據延平程率兵往征十四年正月哨延平下營遇某帥招飲程移營不赴夜賊偷營不值明發帥問故程曰下營時有怪風占必有偷營者以故移營軍中欽其神明是時都閫帥大兵屯一山程兵寡傍溪下營寇首朱必森率衆隔溪呼而指之曰我去先殺盡大營回鋒盡殺此營程聞謂衆兵曰賊回我等虀粉矣衆須奮勇盡死力一戰方得生寇乘勝回下溪水挑戰程兵跣足迎之半渡寇鞋襪沍水擊之大敗追數里程初率兵赴沿山圍木柵作城以拒寇寇數挑戰軍士郭阿保善舞牌劉蠻驢善使鐵義郭先跳出木城有騎寇從髙斧之郭以牌迎斧隨勢伏地劉繼以義架其斧郭閃牌起斬馬足寇墜劉刺之斃乘勝進攻寇大敗牌盡黑邊寇望見黑邊牌輒驚曰彭軍至矣急遁去攻後洋前洋寨鵝峯山大竹口嚴家島黃金井纍斬首數百級擒首寇三招撫一千二百三十餘九月凱還景泰元年二月寇葉宗留復叛率兵往征五月守永康七月遊義沙灘渡大戰十一月次麗水西溪搜山十二月哨白姆沿滄攻麻洋龍潭破二年五月天井背大戰追至紫草菴周尞寨斬首撫算擒首寇五三年升指揮同知金禮正德嘉善志字敬之景泰進士授部郎升雲南參議時鐵索箐土寇竊發大肆剽掠禮親為率兵建策討之抵賊巢折馘不下數百渠魁數十亦相繼成擒民逃竄者布令撫集邊方以寧陳情終養歸陶照獻徵録字時明秀水人𢎞治進士授主事出為廣東僉事時大盜唐大鬢起惠潮梁閏琛起清遠照察土兵陳時亮有才識召入授以進止襄糧逮捕廣中悉定改四川參議蒞鄢作亂蜀人驚擾先是道過新都地衝而無城即日命城之城畢而寇至人賴以安升副使備兵威戎威戎邊郡瘠耗而守臣除參將者性鷙酷日鞭撾軍吏羌夷聚四萬衆謀奪參將照單騎出撫諭以威福衆泣拜解散乃繩參將部下以壓羌夷心而參將怏怏弗平反誣照致變竟罷歸數年復官河南升雲南右布政時有盜稱大眼者鳩衆橫行嶍峨間照至即平定之升四川左布政姚鵬兩浙名賢録字鳴南崇德人𢎞治進士授龍溪知縣升工部主事歷知韶州府時廣寇髙快馬長朱白毛者嘯聚數千餘人焚劫州縣當道以鵬才請於朝特給令牌便宜進討甫三月而殱其魁餘黨悉平又土酋岑猛據險犯順莫敢攖其鋒鵬身入其巢百計開誘圖其形勢而出提督按圖期會進兵除𠞰擢福建鹽運司使尋升山東布政使以疾卒陶炳萬厯嘉興府志嘉興人世襲海寧衛左所百户喜談兵工騎射正德初以將材舉從討開常纍征蔡六二王浩八陳邦四俘獲甚夥升本衛正千户王三錫桐鄉縣志字汝命嘉興人嘉靖進士任保定府推官守制歸里家桐鄉適倭寇數萬至參將宗禮軍覆皂林督學阮鶚移鎮邑城賊首徐海陳東等四處結圍攻甚急鶚同令金燕趣召士紳共議守禦三錫散千金懸賞格募敢死士夜出劫賊多所斬獲海製雲梯二座夜牽其一於城下焚之其一傍北水門樓髙於城數尺賊鎗己進垜矣時用鐵鎔汁灌灑之賊墮樓死者甚衆海訃略窮東又力為撞木攻東水門城幾陷有為緡挽計者三錫親挽之船來不得去隨用鐃鈎布索縛而鋸之賊懼宵遁相待月餘流矢貫髮九石過脅下終不肯避事平鶚薦於朝不果用馮臯謨海鹽縣圖經字明卿海鹽人嘉靖進士授刑部郎歷廣東左參議分守惠潮賊張璉據饒平西聨大埔蕭雲峯程鄉林朝曦而外與倭寇及海盜相犄角督府以臯謨行兵備事先計招海寇王伯宣協力遂倭復用吳孝廉説降雲峯璉勢孤遂成擒久之朝曦亦敗三穴盡平是時督府以兵七哨進攻臯謨統烏槎哨居中功最多擢福建左參政歸後臺臣數以邊才薦卒於家沈伯龍分省人物考字雲卿嘉興人嘉靖乙丑進士為內江令有惠政時直指貪悍數伺其隙而不得及伯龍內召將行直指盛氣而前盡發其行槖止俸數金直指赧顔退補禮科給事中出守川南會有九絲之亂九絲負險以抗有司束手不敢問伯龍奮然語諸從事曰人臣委身事君政在今日諸君更何待耶諸將皆奮遂躬自督陳親冒矢石捷聞升俸一級時番猓作叛督撫以兵五萬専屬之伯龍謂解甲未久不堪復戰遂呼猓衆諭以國威猓歡呼動地縛三渠魁以獻仕至山東按察使歸吳鵬萬厯秀水縣志字萬里秀水人嘉靖進士參議黔中適福酋桀驁不恭奉詔往諭福伏地稽首謝罪安南遂定黠賊陳日輝據險以叛鵬親冒矢石率驍將擒之諸洞悉平督理漕河師尚詔攻陷歸德鵬倉卒調兵擒其梟將王千斤等賊宵遁斬捕無算升工部尚書朱先萬厯嘉興府志秀水人膂力膽氣辟易千人嘉靖間胡宗憲懸賞格購倭首先手刃凡數十以首級獻不受賞曰丈夫志在立功何以賞為宗憲竒而用之歷疆場凡四十年纍官總兵絶聲伎之好亦不置田宅園圃輕裘緩帶有古儒將風金丹萬厯秀水縣志嘉善人居秀水少為諸生喜談淮陰睢陽事龍韜虎鈐無所不窺尤精著數會倭寇內犯制府檄為間諜嘗從戚繼光行間多所俘獲纍功官至參將已而家居人不知其為故帥云馬千乘嘉禾徴獻録字國良平湖人隆慶進士知分宜縣歷遷廣東僉事所屬羅䧛山洪流深塹為盜賊嘯聚會兵𠞰平之歷廣東按察使值黎人叛聞千乘在粵威名遂解散去秩滿歸卒馬繼武萬厯嘉興府志海寧衛指揮呈圖子呈圖與倭戰死繼武每以父讐為恨萬厯八年四月有倭船泊岸繼武親督官兵戰於西磯海洋犁沈倭船生擒倭數十親斬酋首徭戍郎又於大陳洋岐外生擒倭數名斬首數十師旋松門設父呈圖位集前後倭首列祭於前慟哭再拜擢江南副總兵纍升都督僉事提督大教場水陸官兵總理備倭等務卒於官盛萬年嘉禾徴獻録字伯恭秀水人萬厯進士授刑部主事歷遷廣東參政分守嶺西辛丑四月倭寇吳川邑故濱海憑限門為天險閩有海舶名曰艚者往來貿易姦徒勾倭藏其中入限門登陸焚劫萬年購義勇配狼兵協力出戰賊宵遁五月倭大舉寇雷州萬年在髙州聞報曰髙雷相去六百里從陸往賊必知之非拒則遁若從海道一日可至出其不意必成擒矣乃料戰艦六十艘揚帆抵雷倭方踞民廬轟飲官軍從市口撤屋而焚之賊奔突不得出殱焉六月倭寇廉州萬年又令逰擊黃某拒之俘馘五十沈其艨艟二自是賊不敢復寇粵制請添右江監司部議以萬年往建署賓州時栁賓剗賊寇暴召土司黃文輝授以方略出奇搗其巢攻破石牌中埠岜敲岜雨等寨賓州平惟遷江縣洛春感岸中謝等賊桀驚難制萬年請調廣東兵二千東會於賓佐以本營分路搜賊寨深入俘斬二百餘悉招降遷江亦平時桞州劉天仙陸大成等賊謂官軍急賓未暇及已萬年别檄土司各以計擒其渠魁餘皆潰散桞州平明年巡至桞州諜報賊衆數千將以夜半渡江乃令移舟載火其夜往伺賊半渡而擊之賊大潰自是遂無賊患遷江西按察使致仕賀萬祚朱彝尊賀萬祚祠堂碑字孝延秀水人萬厯進士歷遷山東按察使僉事提督學政妖賊徐鴻儒倡白蓮教遠近煽惑萬祚佐巡撫指畫卒以決勝遷廣西布政司參政分守左江道土寇胡扶記為亂萬祚以方略獲之招降莫敬龍所部千人置之內地别部帥扶黎三以兵出掠敬龍生擒以獻羣蠻懾服境內盜賊悉平鎮安土司岑繼祥與歸順土司岑大倫為仇潛通安南莫敬寬密以騎象掩殺大倫劫官男州印去當事者欲徼功謀討安南萬祚曰鎮安土司世受冠帶一旦敢為禍首舍此不問問安南非訃也宜治鎮安以漢法詰責安南聽其服罪當事者從其言敬寬果輸服送還官男州印轉江西右布政使分守嶺北道流賊方肆焚劫圍定安破安遠萬祚至相視羊角口背諸營堡賊聞有備引去朱泰楨嘉興府志字道子海鹽人萬厯進士授龍巖知縣擢御史巡按雲南黔寇斷滇道泰楨自成都發蜀中兵開道建昌踰大小丞相嶺絶金沙江擒賊首烏利長驅入雲南水西川東烏撒三大寇合數十萬犯霑益守兵僅六千泰楨董率道將擊走之斬首數千水藺烏三大寇復犯炎方泰楨樹柵為城設伏待之賊殊死關諸軍驅象陳橫擊之賊大奔擒龍戈資俘斬之築四石城於炎方曰懷德畏威招㩦懷遠樹京觀立銘紀功焉黔國公啓元不奉法泰楨奬誘啓元共理兵事滇黔以安謫徽州府知事升南京刑部主事卒於官項夢原嘉禾徵獻録字元海嘉善人萬厯進士授刑部主事歷遷山西副使備兵懷隆鎮距京師止四百里又為陸寢肩背而羣帥暨諸偏裨合計兵不滿三千夢原自以家世起武功誓死盡職至居庸關聞有鼓噪者令帳下問變答曰宣大兵非我汛地夢原曰等王事耳張巡守睢陽李騎戰順昌豈皆汛地乎單騎問之衆訴以衣食未充夢原諭以五日為期衆歡騰叩首如期給發令就道插漢與敖目七慶毛乞炭兄弟來侵夢原預為備命守備髙璉率徑兵拒之乞炭中大炮死敖目逼城下斬其九級又合衆數萬攻永寧且及延慶夢原遣千總馬如蛟參將王應祥等統師馳擊之合戰數日殺傷甚衆射中七慶墜馬以捷多傷亦多論降一級歸許士竒嘉興府志字雅正海鹽人萬厯進士為黃州推官纍遷成都知府值奮崇明亂後士竒勞徠安集之擢川南副使時藺酋合諸巨寇焚劫黔中制府檄士竒搗藺援黔士竒監將吏練士卒築城興屯守禦備至藺酋合水西據險矗古箐中陡峻不可攻士竒搆離其黨與遂破巢殄滅之升楚臬擢布政使康承爵嘉興府志字德徵萬厯武進士授衛鎮撫遷浙撫中軍升神機營遊擊清勾羽林軍時魏璫用事承爵力求外補出守廣東破惠州山寇葉文林海寇劉香等轉廣西右參平龍山賊崇禎初分守台金嚴破海寇張𢎞銘捷聞晉秩副總兵明亡遂歸死於當湖陸敷錫嘉禾徴獻録字德承嘉善人以任為光祿丞遷桞州通判署象州事安仁土司何公思等聲言花蘆古陳諸賊倡亂請為朝廷除之其實欲藉是剽掠為姦邊地居民騷然聚衆數萬與土司相攻殺上官遣吏往慰諭之不解賊曰即欲撫我須陸通判來敷錫單騎往撫遂帖然散去尋署賓州事時斷藤峽雖平然道險民少間為山賊竊踞敷錫乃相要害移置衛所一十九處由是山賊遠遁桴鼓不聞以母老乞歸姚以誠嘉禾微獻録字衷一嘉興人天啓副榜入國學授蒙城縣丞流寇剽掠近境知縣托故去以誠攝縣事嬰城固守流民被害奔城者悉納之門甫閉賊大至圍城十日募壯士出竒兵擊之賊去未幾檄解通州急餉至通兵部侍郎仇維正復檄令解部户部尚書侯恂左都御史唐世濟交薦之授南京兵馬司指揮引疾歸柯元方曹學佺柯元方墓志字月傳嘉善人崇禎進士授建寧府推官署篆甌浦浦城接壤夀寧江山麻靛賊盤互剽掠元方募壯勇設關諜擒賊首五大王餘黨竄伏元方還郡監司僨師顧以遺寇嗾元方坐鐫一級已而賊嘯柘浦約日取浦城元方詗知之午夜勒郡邑兵分道掩捕質明七十餘酋反手就縛諸大吏驚相告曰是果能辦賊非縮朒縱賊者當元方鐫級時屬邑令夏允彝與直指抗辨而閩人亦相率訟言之卒用得直解官歸居十五年而卒方戡之嘉興府志字耆定海鹽人以世官升南京大教場坐營都司大閲營兵挾餉離伍歷階上戡之按劍叱之兵逡巡退密告司馬捕斬亂首擢瀏河遊擊金山參將轉臨沅副總兵安奢二賊梗滇黔戡之自廣林烏蠻灘越棧度崑崙關自交趾界達臨安扼守楊林水藺烏寇大至進屯馬龍州掘塹設伏對山多張旗幟以疑之賊閍壘不出戡之驅象馬直衝之賊大潰斬首四千級捷聞升漳泉副總兵策普名聲必反瀕行告之黔國及撫臣既至漳將舟師逐鍾斌合鄭芝龍烏尾船圍之斌窮蹙沈海死舟積金銀七艙戡之禁官兵秋毫無取捷聞論功名聲賄搆飛語中之落職歸及名聲反黔國上其書稱先見雲撫錢士晉議起戡之討名聲以老病辭卒馬孟驊嘉興府志海鹽人工騎射以世官歷升鎮浙總兵官時海寇劉香流突浙閩三省會𠞰孟驊督兵出海香敗死於閩其父鳯以餘衆詣浙降鎮浙六載海氛寂然國朝錢江鄉賢留祀朋字珥信秀水人順治己丑進士歷官山東提學道改陜西岷洮道贛州府志順治庚寅江知瑞金縣縣有劇盜三曰陳其綸許勝可僧超忠忠據銅鉢山聚僧兵千餘江廉得忠之仇為盜者移檄營將勒兵討之佯諭忠使助官兵擊賊自效忠喜殲其仇也信之以百餘騎來赴復遣人説之使偕數騎間道疾行來謁條畫賊情行數十里伏兵中路縛之餘黨駭散因諷其綸曰汝地險衆徑孰與銅鉢不釋甲且為超忠續其綸懼出租稅用吏教猶間與其徒借交仇殺既而掠商賈市物會閩賊劉芳羅承俊等率衆附勝可嘯聚羅漢巖江請於虔撫大發兵𠞰之甲午八月大兵至江誡其帥曰賊據絶險攻未易拔當長圍以困之帥如誡賊既窘江察軍中與勝可有舊者遣往諭降勝可欲就撫而餘黨多不服江語帥曰當乘其懈疾擊之遂潛師夜進果擒勝可及閩賊十三人斬馘以千計帥旋江預訂來嵗師期密陳幕府乙未春虔撫出師聲言援漳實圖其綸遣别將將兵直趨縣境江會之進兵大柏山親部勒鄉勇攻其北赴漳之師轉而繞其南陳獲俘斬無算其綸潰圍走移諸將分地搜捕獲之於烏橋崠一時賊渠皆被擒無一脫者江在任興復雲龍橋民不病涉均里役俾貧富無相貿政績多可紀陸翔華廣西通志嘉善人順治進士十四年任鬱林州知州時李定國餘黨未散侵擾諸州縣鬱林參將提兵遠出賊乘虛猝至圍城翔華率衆登陴固守賊攻不克引去大兵在陸川𠞰賊者苦糧不繼翔華運米充餉卒用滅賊在官未久去任歸里談吉璁嘉興府志字舟石嘉興人由內閣中書遷榆林同知會滇蜀用兵上官檄吉璁轉餉入蜀至寧羌州遇亂撫軍撤餉還棧道路絶吉璁間道從黑水峪七畫夜達盩厔康熙十四年二月定邊副將朱龍反直逼波羅堡堡距榆不百里榆林道髙光祉問計安出吉璁具畫利害狀光祉是之入關帝廟聚士民誓神死守募壯士立忠義大會編什伍明號令製幡幟畫陴而守吉璁間出私財以享士而自宿城上畫夜調兵食衆賴以安四月綏德周繼明聚衆數千入神木與叛將孫崇雅合攻陷延安榆兵迎戰不利城中偶語藉藉多欲出降光祉夜呼吉璁曰事急矣鎮兵疲不足仗奈何吉璁奮􅐖大呼曰死談吉璁分也出諭士民曰忠臣我與髙公為之豈責若輩死然所以死守者正為若輩計耳賊一入城子女玉帛皆賊有且若輩今日降明日大軍至無噍類矣衆泣且拜曰公言是光祉出千金吉璁益以數百金間道渡河買粟於保德河曲以兵突圍衛之入人心始堅閏五月王師至圍始解榆林既解嚴響水清平鎮羅諸堡猶為賊保聚吉璁單騎諭降之馳至神木檄崇雅繼明曉以禍福崇雅繼明亦以衆降事平上功加一級久之調知登州遘疾卒吉璁好學工文章在揄修延綏鎮志論者謂可方康海武功志云浙江通志卷一百七十一
