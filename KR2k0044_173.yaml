body:
  text: 浙江通志卷一百七十四人物四武功四金華府漢楊璇後漢書本傳字璣平烏傷人舉孝亷靈帝時為零陵太守時蒼梧桂陽猾賊相聚攻郡縣賊衆多而璇力弱吏人憂恐璇乃特制馬車數十乘以排囊盛石灰於車上繫布索於馬尾又為兵車專彀弓弩尅共會戰令馬車居前順風鼓灰賊不得視因以火燒布布然馬驚奔突賊陳因使後車弓弩亂發鉦鼓鳴震羣盜波駭破散追逐傷斬無數梟其渠帥郡境以清荆州刺史趙凱誣奏璇身非破賊而妄有其功遂檻車徵璇乃噬臂出血書衣為章具陳破賊形勢又言凱所誣狀潛令親屬詣闕通之詔原璇拜議郎三遷為渤海太守免後徵拜尚書僕射以病乞骸卒於家三國吳駱統三國吳志本傳字公緒烏傷人試為烏程相孫權召為功曹行騎都尉出為建忠郎將領武射吏三千人凌統卒復領其兵時徵役繁數重以疫癘民户損耗統上疏曰民以君安君以民濟今強敵未殄海內未乂三軍有無已之役江境有不釋之備願深圖逺計育殘餘之民阜人財之用權感統言深加意焉隨陸遜破蜀軍於宜都遷偏將軍黃武初曹仁政濡須使别將常雕等襲中洲統與嚴圭等共拒破之封新陽亭侯後為濡須督數陳便宜前後書數十上所言皆善黃武十年卒留贊三國志注字正明會稽長山人少為郡吏與黃巾賊帥吳桓戰手斬桓贊一足被創遂屈不伸性烈好讀兵書及三史每覽古良將戰攻之勢輒對書獨歎因呼諸近親謂曰天下英豪並起厯觀前世富貴非有常人而我屈躄在里巷之間存亡無以異今欲割引吾足幸不死而足伸幾復見用死則已矣親戚皆難之贊引刀自割其筋血流滂沱氣絶良久家人驚怖亦以既爾遂引伸其足足伸創愈以得蹉步凌統聞之請與相見甚竒之乃表薦贊遂被試用有戰功稍遷屯騎校尉諸葛恪征東興贊為前部合戰先陷陳大敗魏師遷左將軍贊為將臨敵必先被髮叫天因抗音而歌左右應之畢乃進戰戰無不克後以病困被害二子略平並為大將唐厲文才傳詳循吏宋杜伯僖兩浙名賢録字安常東陽人猿臂善射熟韜略多智訃宣和盜起大將楊惟中率師進討伯僖仗䇿謁於軍門惟中與言大喜留之幕下運籌制勝出竒無窮每與賊對勇氣溢發橫戈而前賊無堅陳賊平授誠忠郎轉台州鎮將厯史館檢閲紹興間妖賊嘯聚東鄉鎮將王公雅問計於伯僖曰愚民迫飢寒弄兵山谷間非其本心但殱厥渠魁則脅從自解若縱兵窮討必且濫及無辜公雅從之民獲保全後其子幼常幼偉孫士賢俱登右科躐顯仕人以為隂德之報黃仁環浦陽人物志縣之上洛人以武悍為閭里雄方臘起睦州往往曹聚從賊仁環以能自歸得官受沿邊差遣建炎元年山賊何三五作亂仁環呼諸子謂曰吾受國恩恨無以報誓當以計擒賊乃與唐子容謀偽與賊合賊信不疑仁環謂其酋曰今欲破縣兩主首俱行誰守洞汝等留此吾先破陳於是引衆鼓而東行十餘里至朱村分路口乃詭分兩道出攻虛整部伍密令子容等各插竹葉為標識部分既定仁環大呼曰轉陳殺賊子容奮兵夾擊賊千餘人無得脫者初仁環有女嫁盜黨中或曰如愛女何仁環曰吾苐恐事不就耳一女何惜其女竟為盜所殺後官至訓武郎卒鄉人祀之陳宗譽陸遊陳宗譽墓志字彥聲東陽人宣和中盜發旁郡東陽民有將應之者宗譽為言逆順禍福得不從亂安撫使因令悉將其鄉兵宗譽設方略明部伍悉出家資激使用命有潰卒阻林莽且數百人宗譽馳一馬往招之皆感泣願效死東陽當橫潰中而能獨全不為盜區者皆其力也安撫竒其材欲官之辭不受建炎初羣盜四合州縣復以禦賊事屬宗譽所立尤奇偉以功補承信郎遇登極恩遷承節郎盱眙軍守奏為沿淮巡檢不赴卒陳嚴成化東陽縣志守伯威狀貌奇偉膂力絶人睦冦陷睦州嚴與弟叟倡義集鄉兵禦之大破賊徒宣撫上其功授承事郎弟士澄字彥清當禦賊時年尚幼值二兄嚴叟他出忽一人稱朝使叩寨求入大言曰有旨逮汝兄弟士澄徐曰吾兄為國禦冦有功無過汝必姦人叱左右縳之果賊所使憲使聞之辟置南劍州都巡檢使趙權萬厯義烏縣志義烏人宣和初睦冦猖獗羣盜相挺而起權詣大將楊惟中請獨當所居縣北永寧鄉一面而以官軍分布縣東西南三境連破青口光明上清諸洞擒其洞主權乃令鄰里協力守北鄙親部鎗杖手四出殺賊事平安撫使劉韐上其功於朝補迪功郎充本縣尉高亷正德蘭溪縣志蘭溪人世以資豪於邑始為諸生試有司不利父曰仕進非一軌能佐國用如卜式可也乃入粟補太廟齋郎調授迪功郎主簿弋陽攝尉臨海又辟昌化尉未行會青溪賊冦陷郡邑亷募勇士合理衆揚兵固壘盜不敢犯以功當超五階適兄之仇與在賞中乃不受賞防遏使録亷他功奏遷右修職郎何渠萬厯金華府志義烏人多材略睦冦竊發詣軍門獻䇿主帥楊惟中用其言以取勝補承信郎監恩州酒稅營卒謀為變密白郡守而往誅其元惡釋其詿誤上功轉承節郎神武後軍統制劉光世辟主管本府機宜文字江渙嘉靖武義縣志字德濟其父有膂力渙亦壯勇睦冦起縣檄其父子防守柵隘屢以少擊衆保全鄉邑冦平渙應效用得官後隸淮西酈瓊麾下紹興七年瓊叛殺參謀吕祉舉軍降劉豫將出境渙與其屬謀曰吾儕誓忠義死國詎可為降俘夜與其徒還得祉首至楊子江乏舟渡埋其首江臯識其處遂解甲揭槍浮渡達行在所時方收祉家屬鞫之渙明其不叛且告所以命押渙取祉首得之埋處已不可辨獨祉女與父行時將括髮我製以紫羅紉以皂線按驗不誣赦其家出獄紹興末任廣東水軍統領克海冦以一矢殪其渠魁後卒於官葉介金華賢達傳字方叔武義人淳熙進士厯官通判邵武軍泉南海冦為亂介召軍將密授方略遂擒羣盜後以奉直大夫主管台州崇道觀卒吕渭孫金華先民傳字希祖東陽人紹熙武舉及第開禧初從軍為殿前司統領官薛象先宣撫荆湖用為本司神勇軍統制使募兵禦金悉帳前千人授之渭孫坐教場立紅白二旗於下謂衆曰此行當以死報國能偕死則偕往願行者立紅旗下不願者立白旗下趨立紅旗下者僅四百人渭孫以六百人還宣司因下堂勞四百人遍拜之然後出軍有軍士入人家擊碎二釡者渭孫立笞之所過秋毫無犯更募士得四千人率守樊城纍立戰功後為副統制魏有諒見疑被其壻所殺王霆宋史本傳字定叟東陽人少有竒氣試武舉中絶倫異等授承節郎從軍於鄂帥鍾興嗣以霆為隨軍都錢糧官專一教閲總效軍尋委帥師守禦黃州沿江制置副使李􅐉辟置幕下霆於軍事無所不言謂招幕良家子不可以夤緣關節冒濫防守江面全藉正軍用兵不以人數多寡惟教習精則勝理宗即位充浙西副都監鎮江都統趙勝辟為計議官李全冦鹽城攻海陵勝出戍揚州霆從行至揚子橋人言賊兵昨日在南門去將安之霆竟至南門以帥憲之命董三城事勝次第出城接戰霆身先士卒大小十八戰無一不利奪賊濠築土城焚城門賊氣為懾差知應州兼沿邊都巡檢使諸道兵將往收復楚州霆帥所部為犄角之助召試為閣門舍人入對言恢復之説有二曰規橅曰機會規橅既立然後義旗一麾諸道並進臣願效前驅北兵至以霆知光州冒雪夜行倍道馳至州整飭戰守之具大戰於謝令橋光人遂安召為吉州刺史仍知光州霆固辭丞相鄭清之制置使史嵩之皆以書留霆霆不從曰士大夫當以世從道不可以道從世也再授閣門舍人遷淮西馬步軍副總管知高郵軍充沿江制置副使同計議官霆撰沿江等邊志一編上之知夀昌軍改蘄州嘗曰兩淮籓籬也大江門戶也三輔堂奧也貽書杜範乞瞰江審察形勢置三新城蘄春置於龍眼磯安慶置於孟城滁陽置於宣化不報王野宋史本傳字子文寶章閣待制介之子嘉定進士紹定初汀邵盜作辟議幕參贊攝邵武縣後復攝軍事盜起唐石親勒兵討之後為樞密院編修兼檢討襄蜀事急史嵩之帥武昌首進和議野言今日之事宜先並力攻守上疏言八事繼為副都承旨奏請出師絶和使命淮東西夾攻理宗深然之淳祐初赴闕奏祈天永命十事拜禮部尚書為兩浙轉運判官以訪察使出視江防首嘉興至京口增修官民兵船守險備具為江西轉運副使知隆興府改知鎮江府兼都大提舉浙西兵船江面幾千里調兵捍禦以守江尤重於淮瓜洲一渡甚狹請免鎮江水軍調發專一守江置遊兵萬人巡江上增創水艦就揚子江習水戰登金山指麾之是冬楊子橋有警急調遊兵救之而退淳祐末遷沿江制置使江東安撫使節制和州無為軍安慶府兼三郡屯田行營留守巡江引水軍大閲舳艫相銜幾三十里憑高望逺考求山川險厄謂要務莫如屯田講行事宜推京口法創遊擊軍萬二千蒙衝萬艘江上晏然寶祐二年拜端明殿學士簽書樞密院事封吳郡侯主管洞霄宫卒贈七官位特進唐韶趙與諲唐韶墓志字子和蘭溪人嘉泰四年以漕魁中南省第二嘗辟沿江制置司幹辦公事制使史嚴之使往襄陽勞師時元兵在境江面繹騷韶駕舟直上使其子良嗣率死士前進所向皆克直造襄陽吕文煥喜乃出軍數萬攻其兩端韶與元兵大戰中流破敵而出巖之上其功升南陵知縣范士表傳詳循吏元王安國金華先民傳字靖翁霆之孫也倜儻有志略宋以門功授成忠郎及元平宋江南兵起安國以䇿干大帥髙興厯陳撫綏之計與語意合即署東陽尉能布威立信以馭其民玉山人婁覃等恃險為亂殺宣慰使陳天祐行省左丞史弼將兵來討安國詣軍前效謀親入賊窟手縛渠魁以獻弼喜曰使兵不血刃而獲賊者爾力也將薦用之以親老辭後妖賊楊鎮反玉山境接寧海據為巢穴勢甚張安國率鄉兵扼險拒之賊從間道出義烏遇官軍與戰賊衆奔潰遂擒其酋安國為人謹厚重然諾民服從之訟不直於官而惟尉言是直鄉閭賴以安靜者二十年陳萍金華先民傳蘭溪人宋丞相宜中弟之子宋亡育於外家楊氏元世祖物色宜中子孫得之竒其骨相厚遇之萍刻意於學兼通梵教於騎射亦時精賜名年扎克䇿喇實入侍東宫日見親幸成宗吐蕃強盛邊人告警以萍領吐蕃宣慰使帥兵討平之悉定其地賜上樽襲衣獎諭甚至武宗朝以萍習知西事特命撫寧邊陲初入境有數千騎整衆而來猝與之遇亟令從騎解鞍列坐環以重車如城郭左右指揮外示間暇敵疑有伏懼莫敢前有以所戴白帽揭於竿首者萍引弓一發中之遂驚駭而遁由是諸部服從不敢叛入朝以功拜大司徒進階銀青榮祿大夫陳逺大柳貫陳逺大墓志字宏父浦江人元興邑里初附山谷獷強猶負固間出冦攘逺大釋儒服從軍首建購捕之方次陳綏靖之略凶渠既得餘孽悉平幕府上其功而逺大亦隨計至京師得試將仕郎辰州路施容州判官未上而鄰土有警郡復檄逺大至麾下資其智勇多所俘獲大帥府材之改全州路清湘縣丞時方有事交址全當孔道餽餉所出徵發調遣郡獨倚逺大以辦在官八年進從仕郎贛州路信豐縣尹贛有廢縣龍南居獠中而以其地隸信豐南安萬户府蓋僑處其縣官命分卒為六屯使耕龍南曠土自食其力以備捍禦久之招納亡命槖鑰姦私民甚患之逺大上其事請復置縣徙其軍轉承事郎溫州路平陽州判官免歸泰定三年卒蘇友龍傳詳循吏明吕文燧史槩字用明永康人元末處州盜起掠永康文燧散家財募壯士得三千人與盜屢戰盜敗走三授以官皆不受太祖克婺置永康翼以文燧為左副元帥兼知縣事復召為營田司經厯擢知廬州浙西平更授嘉興知府松江民作亂襲嘉興文燧柵內衙集壯士拒守而請救於李文忠移兵擒之諸將欲屠城文燧爭曰據城者賊也氏何罪得釋滿三載入朝奉詔持節諭闍婆國次興化疾卒吳文秀浦陽人物補遺字啓明有膂力習騎射兵法元季冦盜縱橫文秀集鄉人纍石為寨以捍患明兵取紹興率衆歸附以計開錢清濠兵遂大捷免其家差役以旌其義後授宣武使卒陳顯道金華先氏傳字如晦東陽人好學明經旁通天文地理律厯兵機元季兵起悉散家財團結義旅以衛鄉井據險守要冦不敢侵戊戌明太祖下婺城駐蹕赤松宫顯道詣行在上謁具陳濟世安民之略上悅留置左右參決大事時方國珍據台溫明越未下特命顯道往諭國珍納欵上賜顯道手劄和其詩以寵嘉之厯官江南湖廣二行省都事擢將作少監督造宫殿尋復遣諭國珍兄弟納土入覲升尚寶司少卿出為臨洮知府俄召還復職卒蔣鏞宋濓蔣鏞墓志字可大其先安吉人遷浦江少豪縱不羈喜結賔客嘗慷慨曰大丈夫不能致君於朝廷之上則當封侯於萬里外元季兵動鏞奮身與鄉人保聚嵩山境內怗之老幼妻拏煦嫗相養雞犬無恙如平時明兵南抵蘭溪以檄召鏞至轅門上愛其才惜其年曰老矣大將胡大海薦之俾逐突冦常昌軍於義烏鏞率義兵數萬人大破之殱其渠帥梟首及獲俘馘以獻上嘉之命為浦江翼右副元帥攝分閫事以治浦江軍肅民安明年伐越得諸暨又命移鎮諸暨又明年以老告大海為請於朝以職授其子珹歸十年而卒王威萬厯金華府志字仕龍義烏人倜儻有勇力元季冦犯永康威集兵聚戰黃龍寨破之明兵下婺威率衆歸附從征以功升紹興衛後所副千户吳志德金華賢達傳字惠卿幼尚氣節從祖直方器之元季盜起志德率義勇保安鄉里明兵下浦江志德率衆迎謁從取諸暨及處州皆著勞績戮偽將獻馘轅門以功授浦江翼左元帥尋以疾辭歸周德璇金華先民傳東陽人少好勇有大志明兵克婺城德璇委身歸附纍立戰功授正千户升駕前親軍指揮僉事太祖以其勇而有謀命鎮守北平永樂間嘗帥兵逐北追至黑松林獲其輜重斬級功多升隆慶衛指揮同知子孫世襲王應金華賢逹傳字思正浦江人洪武中授廣東布政使司左參議時盜發南海官軍不能平應率義旅以蛋船為聲援入其巢穴擒渠魁而殱之餘黨悉平轉河南左參議盧睿傳詳名臣龔永吉獻徵録字天民父給事中泰死建文之難永吉領鄉薦宣德丙午授兵部主事扈駕征樂安正統時升郎中被誣謫戌平涼以兵部尚書王驥薦詔驛騎取之時副總兵趙安兵部侍郎柴車將兵出涼州以永吉為佐軍執馘而還驥討麓川緬甸西巡延綏寧夏莊涼甘肅等處永吉俱佐軍奏功凱旋擢大理少卿天順初纍升兵部右侍郎改南禮部乞休卒劉琮西江志金華人正統中為南安通判石溪妖民孫志榮作亂琮親冒矢石一鼓平之吳百朋獻徵録字惟錫義烏人嘉靖進士授永豐令徵拜御史按淮揚猝遇倭亂被甲登城籌兵食畫戰守賊不敢逼纍升右僉都御史撫治鄖陽改提督南贛軍務會倭冦海陽與兩廣都御史督諸道兵四面擊之捕斬無算已又敗倭於烏石又戰􅚉水神山賊兵熸又敗倭於海豐初賊酋楊一戕殺長吏勢張甚而蘇阿普賴忠潭等依山阻險百朋懸賞格陽為招附隂督大軍張左右翼擊之遂平洪田再破香寮又移師擊藍松山程鄉擒之轉戰大田俘梁國相等别攻乳原始興賊殱之又會師破吳平漳潮遣將士擊二原冦盡殪時二巢最稱桀黠賴清規巢下厯李文彪巢岑岡謝允樟巢高沙衆號數萬盤牙纍嵗攻之甚難百朋請移鎮信豐授參將蔡汝蘭等方略率師討之擒清規於苦竹嶂餘黨悉平隆慶時擢兵部右侍郎萬厯初命閲視三鎮百朋條上便宜四事曰繕垣屯田備邊防河又進邊圖凡關塞險隘與士馬強弱亭障逺近厯厯如指掌升刑部尚書卒於官徐瓚獻徵録字朝儀永康人嘉靖間任雲南按察使土舍安銓叛撫按知瓚才凡軍事悉以咨瓚乃議以土司攻土司調元江蒙化鎮沅等處土兵佐以漢軍分統進勦已獨留中議處糧餉閲習召募事皆立具晝夜登城𧾱師至廢寢食立招降大旗隂誘脅從仍造小旗千餘書同心協力各保身家八字於上令各執聽撫緣是降歸者日衆賊勢遂衰明年春土舍鳯朝文繼叛與銓合進圍省城瓚登埤呼冦諭以朝廷恩旨冦皆伏地請降且以復官為言瓚諭令退舍俟命冦遂退瓚即夕走使掣回各哨官軍厥明合擊賊盡潰渠魁逃逸設方略擒之俘獲萬餘簡審無辜悉為開釋擢本省右布政使進左布政陳大成萬厯義烏縣志義烏人嘉靖三十七年八寶山礦徒生發嘯聚萬人大成糾率義旅勦除之遂以武生應募統親兵五千赴台防守四十年四月倭犯台州花街白水洋等處參將戚繼光遣大成領兵衝鋒俘斬倭首百餘救回男婦三千名口既而調往江西援勦流賊戰於弋陽斬獲甚多四十一年倭犯太平又敗之於烏根嶺時福建寧德縣被倭陷久據大成統衆隨繼光直抵寧德克復城濠前後告捷凡十二授台州衛指揮僉事升浙江中軍都司時倭冦既殄而士卒多虛縻廩糧大成建議領兵屯操每年春汛四箇月照舊給糧出守六箇月減糧回縣逄五赴操遇警聽調兵既得以附家地方又可保守院道是其議裁省銀九千七百餘兩減𣲖山蕩額稅之半吳良知隆慶東陽縣志字廷通幼業儒既冠習孫吳法通弓馬戰陳之術嘉靖時倭冦為患海道談綸薦授把總何家長平街等處將兵不滿千人三戰三捷救還被掠男婦數千人升台州衛指揮守備討南韶龍眼洞賊與官祖政等會戰於李村一鼓擒之又大捷於大羅山斬賊首吳子和等前後數十餘戰皆莫當其鋒升浙江都司厯廣東瓊崖參將每戰必誓師令毋妄殺鹵掠故所向成功葉大正崇禎義烏縣志字子中義烏人尚氣節以諸生入太學與戚繼光邂逅知契從事於戚如閩平倭恢復興化政和夀寧救被掠男女二千餘當事上其功授延平府判王如龍閩書義烏人以功授北路守備時南路尚梗總兵戚繼光留之援仙遊城破漳浦圍皆有功復發卒舁石為寧德築城臨陳每衝鋒陷敵倭據橫嶼小石嶺二處皆搗其穴升福建都指揮擢廣東參將金傑廣西通志湯溪人嘉靖三十三年以舉人知富川縣會潦溪冦起傑定計勦之賊大挫而遁嗣是諸洞帖服境賴以寧虞德華崇禎義烏縣志字光卿隆慶進士授行人進兵科給事中出守揚州備兵辰沅時漕卒稱亂糾合唐喬奉若等六十餘寨并廣西貴州諸苗入犯德華奉命勦撫得賊間張好一安松等於靖州囚籍中因曰昔王文成用王受輩平恩州以夷攻夷吾其得志於此二人也因釋其縛隂約之還寨隨簡精鋭嚴陳臨之果得唐奉二渠首賊黨悉解後以雲南參政謝事歸王世德金華府志字長民永康人萬厯進士由閩縣令升工部主事纍擢湖廣副使備兵下江屢擒劇盜遷右參政監軍貴州安邦彥謀犯省城世德請駐節威清待之邦彥圍威清世德募死士守御會大風遂破賊營升本省按察使仍監軍平苗冦升廣東左布政劉香老犯廣州世德調閩將鄭芝龍夾擊香老於廣洋香老溺死敘功擢左副都御史巡撫雲南去廣時庫中羡金數萬世德悉籍以充軍需抵雲南萬民結黨為亂世德築堡建屯諸逆斂迹以疾卒於官贈兵部右侍郎衢州府晉毛璩晉書毛寶傳字叔連弱冠右將軍桓豁以為參軍尋為謝安衛將軍參軍除尚書郎安復請為參軍轉征北司馬淮淝之役苻堅迸走璩與田次之共躡堅至中陽遷寧朔將軍淮南太守尋補鎮北將軍譙王恬司馬海陵縣界地名青蒲四面湖澤皆是菰葑逃亡所聚璩建議率千人討之時大旱因放火菰葑盡燃亡户窘迫悉出詣璩自首近有萬户皆以補兵朝廷嘉之轉西中郎司馬龍驤將軍譙梁二郡內史安帝初進征北將軍桓元加璩散騎常侍左將軍璩執留元使不受命元以桓希為梁州刺史以防之璩傳檄逺近列元罪狀遣巴東太守栁約之建平太守羅述征北司馬甄季之擊破希等仍率衆次於白帝安帝詔曰益州刺史璩體識𢎞正誠契義旗受命偏師次於近畿匡翼之勳實感朕心可進征西將軍加散騎常侍都督益梁秦涼寧五州軍事義熙中論討桓元功追封歸鄉公明一統志晉毛璩西安人祖寶仕為廬江太守自寶至璩凡三葉皆擁節旄隋祝桃根正德江山縣志字伯芝平賊蔡通仁羅惠方都督柏懋上其功授開府儀同三司唐張自勉衢州府志原名御字子平開化人少習戎事唐末盜起屯戍捍禦鄉郡以安調隸征南行營父曰汝宜自勉成功遂更名自勉後以破黃巢王仙芝功拜淮南招討使宋張瓊宋史新編少有勇力隸太祖帳下周顯德中攻夀春太祖乘皮船入城濠城上軍弩遽發矢大如椽瓊以身蔽矢中股死而復蘇鏃著髀骨不可拔瓊索杯酒滿飲破骨出之血流數升神色自若擢典禁軍纍遷都虞候嘉州防禦使兩浙名賢録字伯玉其先自館陶徙衢遂為常山人趙嵎西吳里語字景東衢州人宋宣和時青溪盜起嵎時知德清縣他邑令聞盜望風而遁嵎獨發倉廪集寠健團保甲賊犯境嵎邀之擒其首二人賊二百餘斬首數百奪其器械以千計邑賴以全邑人立生祠於乾元寺鄧熹正德江山縣志江山人有勇略客遂昌梭溪睦冦餘黨洪載犯遂昌松陽熹與父合鄉民禦之大小百餘戰載降二邑獲全父子皆補官熹因尉遂昌孝宗朝擢為王府官劉敏士謝諤劉敏士墓志字文伯西安人為臨川糾曹賊白氊笠破吉州敏士與判官江山柴紱保城嶽飛至欲奏以功辭曰若爾守倅必被罪飛歎服繼知楚州金欲取海州圍甚急詔敏士救之與張子善謀攻淮陽金必棄海州已而果然張浚奏其功除淮南運判移浙漕終於湖南余玠宋史本傳字義夫少為白鹿洞諸生以功補進義副尉纍功至大理少卿淮東制置副使進對言今世胄之彥場屋之士田里之豪一或即戎即指為粗人斥為噲伍願視文武為一理宗曰卿人物議論皆不常可獨當一面乃授權兵部侍郎四川宣諭使玠自許當手挈全蜀還朝廷其功日月可冀尋授四川安撫制置使兼四川總領夔路轉運使玠入蜀大更弊政遴選守宰築招賢之館供帳一如帥所居下令集衆思廣忠益豪傑之士趨朝立事播州冉氏兄弟璡璞有文武才隱居蠻中聞玠賢詣府上謁即與抗禮賓館之居數月請見曰某兄弟辱明公禮遇思有以少裨益為今日全蜀計其在徙合州城乎蜀口形勢之地莫若釣魚山請徙諸此若任得其人積粟以守之賢於十萬師逺矣巴蜀不足守也玠大喜密陳於朝詔以璡為承事郎權發遣合州璞為承務郎權通判州事徙城之事悉以任之築青居大獲釣魚雲頂天生凡十餘城皆因山為壘碁布星分為諸郡治所屯兵聚糧為必守計誅潰將以肅軍令開屯田於成都蜀以富實玠率諸將巡邊直搗興化與元兵大戰又大戰於嘉定寶祐初卒特贈五官玠之治蜀也輕徭以寬民力薄征以通商賈蜀既富實乃罷京湖之餉撤東南之戍自寶慶以來蜀閫未有能及之者𢎞治開化縣志玠祖籍蘄水渡江後居開化縣之金水鄉徐汝一衢州府志字伯東西安人文武兼資好謀能斷景定二年以戰功敕授武翼郎福建路馬步軍副總管纍升至通州守忤賈似道歸至鎮江疾卒元徐仲正德江山縣志字景吾有勇略鄉冦金曾三剽掠鄉邑殺官吏焚廬舍仲率義兵數千人搗賊巢生致其酋以功授縣尹明楊順𢎞治龍遊縣志字伯康明師克東陽率衆歸命督一軍當栝冦連戰於靈山安仁皆破之從常遇春攻衢州斬萬户一人獲百户二人尋命從胡大海取江西信州加武德將軍歸安衛正千户子孫世襲又於海上捕倭駐師金山感疾卒席永萬厯龍遊縣志字孟常祖貴以功授小旗正統初永襲職時賊葉宗留鄧茂七相繼反冦福建漳泉等郡朝廷遣將討之永在伍中大小三十戰生擒賊渠數人升總旗尋隸石亨北征遇於雷公山遂北三十里冦為披靡授百户天順初從征兩廣有功升副千户明年從平荆襄獻俘於朝進火寧中衛指揮僉事子孫世襲汪金恩兩浙名賢録字天錫江山人以進士主政刑部厯員外郎中知桂林府時土番干紀屢挫官軍當事議撫金恩曰小夷陸梁是不一大創則朝廷聲教將有不訖於逺者前委用非才以致挫衄奈何因噎而廢食乎當事即以檄委之金恩乃揀精鋭授以方略適大霧連日不解乘霧銜枚疾走令勇士數百人攀附而上先據巖險然後縱火焚其林箐大兵鼓噪而進連破一十八巢火焚墮崖死者不可數計俘斬七百餘當事上其功劉瑾抑之不敘轉致鳯陽勒令致仕歸其時饒冦搶攘力贊縣令為立城池邑人賴之李承勛續處州府志西安人世襲處州衛指揮同知嘉隆時海上多警撫案搜羅各所將材萬厯元年檄取標下練兵能尚節制號令森不可犯九年改領軍門總務十年浙撫標下東西二營悍卒以減餉故要挾撫臣承勛殫力拊諭始克安戢十二年春計擒首惡馬文英等九人厯升操捕都司南北遊擊參將會倭酋關白搆亂改山東備倭晉秩副總兵尋推鎮守山東總兵官署都督僉事朝鮮倭平督撫交章薦往鎮守用圖善後以原官提督南北水陸官兵防海禦倭綏柔安定且設備甚嚴釡山望倭之對馬島僅隔一洋水陸操演炮聲相聞島倭畏甚屏迹不敢窺伺鮮人賴以安枕接母訃堅請奔喪格於例不得因割股寄奠二十八年推鎮守貴州尋改鎮守浙江左軍都督僉事總兵官卒贈驃騎將軍徐大鵬龍遊縣志字翔雲少負膂力麻貴劉綎將兵征倭荷戟從之渡海屢戰悉捷播酋楊應龍反綎往征討以大鵬為前驅直入婁山平其地後從熊文燦征鄭芝龍芝龍降以功纍授總兵崇禎己巳上書下兵部尚書張鳯翼誤國首輔溫體仁黨庇之罪繫獄將斬會鳯翼得罪遂末減戍榆林赦歸年九十四終於家吕之節舊浙江通志字次公龍遊人天啓舉人新昌教諭擢廣州同知嶺表不逞之徒往往煽亂之節密訃討捕反側遂寧尋擢嶺南道參政粵東盜賊蜂起之節因時制變民賴以安未幾旋里七十餘歲卒嚴州府南北朝周文育南史本傳字景德少孤貧本居新安夀昌縣姓項氏年十一能反覆遊水中數里跳高六尺與羣兒戲衆莫能及義興人周薈為夀昌浦口戌主見而奇之養為己子教之書計文育曰誰能學此取富貴但有大槊耳教之騎射大悅司州刺史陳慶之使薈將五百人往懸瓠慰勞白水蠻蠻謀執薈以入魏事覺薈興文育拒之賊徒甚盛一日中戰數十合文育前鋒陷陳勇冠軍中薈戰死文育馳取其尸身被九創創愈辭請還葬慶之壯其節遣之葬訖盧安興為南江督護啓文育同行除南海令安興死文育與杜僧朋攻廣州為陳武帝所獲赦之隸麾下帝討侯景文育為前軍尅蘭裕援歐陽頠皆有功帝破蔡路養於南野文育為路養所圍四面數重矢石雨下所乘馬死文育右手摶戰左手解鞍潰圍而出復進大敗之帝發南康遣文育將兵開通江路景將王伯醜據豫章文育擊走之帝軍至白茅灣文育常為軍鋒至姑孰與景將侯子鑒戰破之景平封南移縣侯帝誅王僧辨令文育督軍會文帝於吳興尅杜龕又襲破會稽太守張彪侯瑱據江州命文育討之未尅徐嗣徽引齊人渡江據蕪湖徵文育還都嗣徽列艦於青墩至於七磯以斷文育歸路文育鼓譟而發反攻嗣徽嗣徽驍將鮑砰以小艦殿文育乘單舴艋跳入砰艦斬砰牽其艦而還因留船蕪湖自丹陽步上帝拒嗣徽於白城適與文育會將戰風急帝曰矢不逆風文育曰事急矣何用古法抽槊上馬而進衆軍隨之風亦尋轉殺傷數百人有功進爵夀昌縣公及廣州刺史蕭勃舉兵踰嶺文育督衆軍討之新吳洞主余孝頃應勃出豫章據石頭勃遣將歐陽頠頓苦竹灘傅泰據塶口城以拒官軍官軍船少孝頃有舴艋三百艘艦百餘乘在上牢文育潛軍襲之悉取而歸仍於豫章立柵時官軍食盡乃使人遺周迪書陳利害迪饋以糧於是文育乘船舫沿流俱下燒豫章所利柵偽退孝頃望之大喜因不設備文育由間道信宿逹芊韶上流則頠勃下流則泰孝頃文育據其中間築城饗士賊徒大駭頠退入泥溪文育遣周鐵武襲擒之盛陳兵甲與頠乘舟而宴以巡泰城下因攻泰克之勃在南康聞之衆皆股栗其將談世逺斬勃以降孝頃猶據石頭帝遣侯安都助文育攻之孝頃退走新吳廣州平以功授開府儀同三司及周迪破孝頃孝頃弟孝勱猶據舊柵擾動南土帝復遣文育討之豫章內史熊曇朗率衆來會謀害文育文育推心撫之曇朗害之於坐帝聞贈侍中司空諡忠愍五代童頵十國春秋青溪人素有勇力武肅王時多著勤勞拜西扇都巖將擢檢校太子賔客兼監察御史陸仁章十國春秋睦州人少有大志以窮困為武肅王園卒王嘗遊園見仁章術萟有智而志之及淮南兵圍孫琰於蘇州繞城三匝無路可通使仁章設計入城果得琰報而出由是益加稱賞纍遷兩府軍糧都監使轉內牙指揮使王薨文穆王與兄弟同幄行喪仁章進曰令公嗣先王霸業將吏旦暮趨謁當與諸公子異處乃命主者更設一幄扶文穆王居之告將吏曰自今惟謁令公禁諸公子從者無得妄入晝夜警衛未嘗休息厯官至保大軍節度使同參相府事宋錢嶨錢觷新定續志嶨淳安人與弟觷俱讀書尚氣節不仕宣和中方臘黨類尚熾嶨觷起鄉兵勦平之未幾金師大入嶨觷與同里方庚引兵桐廬據牛山之險以敗之功聞各補承信郎衢冦張花項尋犯歙且逼陸境又率兵敗之兩郡賴以安方庚兩浙名賢録字彥通淳安人家世業農庚躬耕隴上喟然歎曰大丈夫當隨時立功以不朽奈何沾體塗足甘以老農終耶昔周文育以大槊取富貴鄉里以為美談吾能荷七尺鋤獨不能運丈二槊乎遂擲鋤於地從人學兵法賣牛買劍橫磨之曰以此自立足矣已而平方臘破烏珠屢立戰功拜承信郎子五人文燧文博文郁文思文韜俱從庚於戎馬間有膽力能戰鬬淳熙間金人再冦乃裒義兵取勝文燧以承信郎出身官統制文博承信郎文郁進義校尉王馬嚴陵志遂安人宣和初方臘反從之者衆馬與里人余木杓獨不從朝廷遣王稟討之馬與木杓請為先鋒遂擒臘及其妻子朝廷論功欲官之辭不就余宗德嘉靖遂安縣志宗德與王功勇力絶倫方臘始亂使人招之逃匿及王師至乃自請為先鋒與韓世忠同擒臘朝廷論功纍授秉義郎王功授承忠郎有告身二道藏其家童淑夀昌縣志淑身長八尺面如紫玉青晴虎鬚有膂力能挽強弓宣和中童貫討方臘淑從征有功擢殿前將軍建炎中汪來一來二冦亂命淑討平之授江南路安撫使卒贈太尉詹至張栻詹至墓志字及甫嚴州人崇寧進士建炎初除陜西轉運使金騎再沒河由陜洛長驅至秦隴將及鞏郡守假他檄去至即日合兵民七千人授甲登陴金騎至城下大呼趣降至命以徑弩射之圍合數重部分既定歸與家人訣竭家資犒軍金盡力攻五日不能破會至所乞熙河兵至金遂遁去城卒全以親老辭改御營平冦左將軍隨軍轉運判官主管臨安府洞霄宫起為江淮招討使司隨軍轉運副使紹興初知常州改徽州丞相張忠獻督師辟主管機宜文字是時金日窺邉諸將列屯淮漢幕府議軍事曲折必委至往諭意析理會情無不切當會母有疾力辭歸服闋提舉台州崇道觀知處州紹興十年卒積官至中奉大夫封建德縣男俞汝霖嘉靖遂安縣志字季澤深沈有智略慶元元年辰州溆浦縣山猺猖獗朝廷遣都帥官石子慶發大兵討之汝霖應募乃同將官丁順等入洞生擒之毁其巢而還又捕九溪全洞之賊授承信郎官至都轉運使進階金紫光祿大夫姚仁夀萬厯桐廬縣志字靜山以進士充饒州路節制督監兵馬德祐初私募義勇據守關要有兵犯關親冒矢石敵敗去元興歸隱山中世祖求遺逸州郡以仁夀應不起卒於家元周士顯夀昌縣志字晦翁宋漕貢進士德祐二年元巴延入臨安命裨將索多至建德安撫縱兵摽掠至夀昌士顯與邑人李炎等具酒物勞之説以戢暴索多大悅表士顯為本縣主簿領部伍共征閩海克捷有功升授千户卒於家明王舉嚴陵志字彥高桐廬人少有大志及長嗜學好施鄉里歲歉發私廩以濟之元末兵亂與里人謀曰四境冦盜竊發非集鄉民為之備則吾邑無噍類矣且坐以待斃與戰死等耳衆皆曰然遂相與協力保障明兵臨境舉等率鄉民歸附授義兵萬户未幾謫戌鳯陽洪武間授其子瑄世襲所鎮撫至孫昱升授武略將軍青藍千户所千户何春嚴陵志字時熙淳安人膂力絶人至正十八年明太祖自徽而嚴春仗劍歸附纍立軍功授百户子斌武襲隸武昌衛景泰初捍禦黃江升副千户余仲友萬厯遂安縣志任廣西布政司都事宣德間太平酋長趙暹叛藩臬薦其才奉敕主討抵其巢出竒計平之升河南布政司參議應皓淳安縣志字文明正統進士授御史十四年奉命巡視福建銀場賊林開三等鳩集處盜千餘人剽掠皓調軍擒其賊首餘黨悉平景泰改元清福建軍伍升南京大理寺丞成化二年升湖廣按察司僉事總兵李震巡撫羅箎知其才檄治平溪清浪衛選調官軍征勦靖州黃強苗寇事竣都御史吳琛委修築江岸一千餘丈未幾都御史項忠復遣平荆襄流民之為亂者升福建按察副使巡視海道漳州賊林輝英聚衆下海為亂皓遣官軍齎榜曉諭卒擒輝英以獻既而龍溪賊錢有定五千餘人劫掠皓命巡海官軍督捕悉就擒升布政司左參政致仕周瑄兩浙名賢録字𢎞壁淳安人正統進士授南吏部主事改刑部員外郎遷福建按察使副使分巡建寧時官軍調征沙遊盜將乘虛而入瑄募民兵修武備且守且禦民賴以安已而盜犯政和松溪瑄嚴號令親披堅鋭夾攻而進擒賊六百人追還所掠婦女以千計未幾高陽盜起瑄分遣儒生抵賊營諭以禍福寇亂遂解尚書薛希璉上其功賜文綺寶鏹進秩三品方漢兩浙名賢録字孔殷淳安人景泰舉人天順二年授御史巡按甘肅適北部入邉人民驚潰漢厯邉招輯撫治番夷畏服成化三年巡按四川川貴夷獠竊發朝廷命官征勦敕漢軍前紀功依軍法便宜行事漢督軍深入賊境設法搜捕地方以寧積功升南通政司右參議轉北通左參議升南京大僕寺卿卒於官吳倬湯斌吳倬傳字克大淳安人成化進士授南刑部主事遷貴州按察使僉事程番盜起守臣遁走三司議發兵倬曰此可撫而定也單車諭降之都勻地形險阻蠻獠跳梁屢征不克𢎞治三年巡撫都御史鄧廷瓚薦倬才擢都勻兵備副使時廷瓚討黑苗乜富架等倬遣熟苗詐降誘令入寇因伏兵擒之並執其二子諸路乘勝深入抵其巢穴凡破一百一十餘寨又賊圍官兵於合江州復率師援之賊解圍走時倬威名大著賊望風奔潰是時菜蘭和壁梨田諸洞悉下平麻六洞九名九姓等諸苗亦皆歸附設府州縣控馭之貴州為之一靖廷瓚上平賊功倬進秩二級七年遷雲南按察使移廣西十四年入覲卒於興安驛俞諫毛奇齡俞諫傳字良佐桐廬人𢎞治庚戌進士授長治令擢御史遷河南按察僉事雪花崖賊吕梅聚衆亂諫率兵擒之正德三年遷江西參議平大帽賊鍾仕高纍擢南右副都御史操江備賊會東鄉新民王浩八叛詔諫督兵江西時浩八自萍鄉流劫諸縣轉入浙之開化而石埭生章仁與浩八合副使胡世寧統新民艾如七往擊如七亦叛去陶琰發所部兵命參將李隆同知伍文定等戰於華埠賊遁還江西乞撫隨撫隨叛連營十里諫乃合大兵攻之獲浩八餘賊奔玉山復推浩三為帥諫督兵追擊浩三殱焉萬年賊首王重七鼓衆焚廨舍諸賊嚮應諫調湖廣官軍二千并永順土軍討之獲重七而如七亦就擒復討平臨川安逺新塗諸餘賊論功進右都御史建昌撫賊徐九齡復叛諫追討之斬九齡班師加秩一等先是宸濠蓄異謀聲言得上賜欲撫臣以下朝服入賀諫不可濠諷所親御史張鼇山劾罷之章甫下而捷音至得不問還引疾家居嘉靖初起督漕運平河南賊之流淮上者召入理院事致仕卒贈太子太保諡忠襄俞夔兩浙名賢録字舜臣建德人正德進士授安福知縣宸濠之亂多保障功擢長沙府同知擒劇盜彭思昶等五千餘衆升四川按察司僉事兵備安綿番夷玻柘等糾結神溪諸番入寇夔出奇擒畨酋千萬山等三十七人復古雉州侵地千餘頃築平番赤土二堡升本司副使兵備建昌建昌土畨雜居無肯躬至徼外者夔深入不毛番人吐舌失氣鹽井土官刺馬仁等相讐殺夔督兵悉討平之升江西按察使厯左右布政使卒於官戴東旻建德縣志字日文萬厯進士授歙縣令遷儀部轉河南汝寧兵備副使時流氛日熾洛陜川湖所在被寇束旻躬擐甲胄率祖寬左良玉陳洪範諸將與劇寇張獻忠羅汝才李自成等四十餘戰前後告捷以僉都御史撫治勛陽初獻忠入楚破穀城圍光化東旻單騎馳赴賊乃解圍大破之於雙溝等處獻忠勢窮乞降總理熊文燦主撫東旻請先勦後撫閣臣楊嗣昌左袒文燦獻忠因得安插穀城而東旻坐免未幾獻忠叛焚襄樊罪主撫者文燦辭速東旻亦被逮後帝省東旻疏前言盡驗欲再用而東旻已病卒章可試遂安縣志字星華萬厯舉人崇禎中授舒城縣張獻忠陷霍巢諸邑攻舒城可試選義勇設奇制勝賊奔潰明年復來攻伏炮創之前後被圍十有四卒賴以全尋以養母歸宋賢建德縣志字又希天啓進士授常熟令民有前楊漣後宋賢之謡擢御史掌河南道大計黜陟一切書儀峻拒不受進太僕卿會山西巡撫缺人當召對帝曰若非掌河南道不受書儀者耶遂命往山西為神京右臂劇寇交訌賢增埤濬隍蓄糧置炮擒賊首過山龍番天鷂等乞歸加兵部侍郎豫告癸未冬金華土寇竊發賢與知府胡崇德遏寇黨王麒生加葺雉堞設法勦禦民賴安堵卒於家陳熙廷建德縣志字君穆天啓舉人為廣東連山縣知縣連為古廣德區徭獞雜處前令以勦猺啓釁兵連四載熙廷甫下車遂入巢招撫諭以禍福猺蠻悉平洞民虞山陽等謀為亂擒獲有功制撫交薦其才遷廣西象州知州吳希哲淳安縣志字睿卿崇禎進士司李惠州勦九連山寇九連深阻交逵賊竄伏負嵎希哲設竒制勝掃穴殱渠餘從解釋巨寇劉香肆毒海濵希哲以撫羈縻之潛修戢備約閩師會勦時寇舟薄潮城聞吳司理至曰是官亷潔不為利誘願就撫希哲開壁諭之乃引舟退舍會閩師至希哲贊畫出竒占風縱火焚擊寇艦巨憝殱焉擢刑科督理浙直練餉念東南賦役繁疲額外加輸一百八十萬人吳門與撫案酌議急公復糾墨吏賕以佐軍需以紓民力漸次報完復命以年例調外朱國玘廣西通志嚴州人崇禎間任思恩知府隆安土賊馬日仙以妖術惑衆肆橫猖獗率衆犯思恩國犯分遣官兵竒正互用一戰禽之餘黨盡散士民刻石紀其功溫州府漢蔡敬則溫州府志安固人少負氣節靈帝光和間舉孝亷授南陽令尋罷官歸建安中起義兵捍寇有功授東郡都尉號令明肅境內乂安進安鄉侯三國時江東盡為吳地敬則率兵歸農時邑有虎患倡勇除之殁後里人為立祠宋薛弼葉適薛弼墓志字直老溫州人政和進士任懷州刑曹厯遷光祿丞提舉淮東鹽事湖南運判王􅊅捕楊么久無功更命嶽飛么據洞庭陸耕水戰樓船十餘丈官軍徒仰視不得近飛謀益造大舟弼曰彼之所長可避而不可鬬也幸今大旱水落若重購舟勿與戰逐筏斷江路藁其上流使彼之長坐廢而以精騎直搗其堅則破在目前矣飛曰善兼旬積寇盡平進直祕閣為户部郎再知荆南桃源伍俊既招復謀叛弼許用為靖州喜曰我得據一州過桃源逺矣即出謝伏發擒之進祕閣修撰知虔州復知福州廣州厯南雄南安五州前後討蕩俞三古五官朱關索吳錦等賊相謂剝皮殿撰而閩八郡伍黑龍卓和尚嶽崇廖七嫂滿山紅之屬數十萬弼教竒兵立左翼軍校陳敏為統制積四年平豪賊百七十部汀人李谷反信宿三萬人弼急會師斷其首尾夾擊之浹辰谷敗海寇陳小三載艘六十距境上給鄭廣兵三百與期三日求濟師不許二日大風賊不能進退盡虜以獻請曰吾以一擊十初意不能自全公料三日何也弼曰第從吾令無問所以然蓋機速神敏多此類紹興二十年卒於廣州沈希稷括蒼彚紀溫州人宣和初知龍泉縣事睦賊洪載寇郡諸邑皆陷龍泉三面通為賊區希稷力為守禦得陳沔勇而知兵葉植勇而善謀相與練鄉兵設險守隘復乞師建安兵至寇師脅從之民以數萬計破浮雲攻東界沔分兵自安仁武溪軍於七赤賊黨遁去追至浮雲進柵石塘與戰大破之事平朝廷嘉其功增秩一級石礪𢎞治溫州府志字商老州學生宣和間方臘連陷州縣郡守二將棄城走教授劉士英奮身議守推礪為謀主學掾盧璿及邑義士丁仲修周承已婁淵潘守真等佐之治兵儲糧籍保伍分地為八隅委官統率又置戰艦五十餘分屯梅嶴白沙與賊堵禦越五十六日王師至賊乃遁已而臘黨俞道安自樂清進攻郡城礪復與士英創立戰具郡將張理暨仲修承已淵守真等爭先迎敵力戰俱死賊亦敗去事平賞功士英通守太原礪辭祿不受以布衣終薛開兩浙名賢録字彥明永嘉人徽言族子少喜讀孫吳書宣和末愈寇猖獗開與兄誾閎及誾子居實里人鮑若雨包汝諧議鳩材積穀隂合里中少年族中子弟授以兵器分地自保時教授劉士英與石礪畫城為八界率義兵以守之開自與誾守城南之西隅而使居實總其綱寇至攻永泰門肉薄而登居實發弩開擲槊從兄謹言奮撾斃具先登者冦氣懾而退開復簡精勇數十人夜縋城下斫其營寇驚走自相蹂躪死者不計其數遂棄寨去事平口不言功鄉人高之陳文萬厯溫州府志平陽人嘗從韓世忠