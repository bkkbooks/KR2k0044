之觀慨然請行以義屈賊成約而還授承信郎靖康初本路帥命部衢婺處三州兵赴雄霸州及還遇高宗渡江領兵勤王特旨轉三官凡𩔶九任積官至武翼大夫王逹兩浙名賢録縉雲人有勇力善劍槊能步鬬宣和間方臘寇縣縣尉詹良臣力戰死逹率壯士數百人從間道至仙居會吕師囊為內應取道檄官軍夾攻之遂大破賊鄉邑乃全事定身退口不言功郡守上其事授承信郎不受梁孚將括蒼彚紀麗水人宣和間睦寇方臘犯郡境孚將與兄孚光弟孚錫孚惠倡勇率衆糾合懿德宣慈三鄉民戮力與戰賊將洪載逃去郡聞於朝會衢寇倪從慶嘯聚朝廷召孚將兄弟勦賊賊平賞以爵孚將授迪功郎詹度括蒼彚紀字世安縉雲人宣和中為燕山路安撫使奏郭藥師不可任後藥師叛果如度言改帥中山戰守忠勤欽宗御書獎曰爾秉節不移嬰城固守能出竒策屢挫敵鋒昔張許守睢陽二顏守朔郡不足道也除資政殿大學士封信國公何志同龍泉縣志字彥時元祐進士調錢塘尉遷合肥丞入為中都官校讎麟閣靖康二年金犯穎昌守臣曽開懼甚宰相以志同代之至郡旬日金騎大集志同淬勵士衆竭力抗禦衆皆死戰凡五十日會金驍將宗弼以數萬敵至勢不敵乃挺身出城招散亡以圖恢復時康王以大元帥開府濟州志同率壯士三十騎赴之見王密陳宗社大計請於南都興王之地正位號以率天下及王移駐南都復申前説從之以志同攝應天府元黃道俊隆慶遂昌縣志字彥俊元至正問賊寇建陽震動郡邑道俊倡募襲之俘於官以功授本邑簿轉江山令建寧判官兄道傳弟道佺俱協濟有功道傳授本邑巡檢道佺授松陽縣副簿明季汶宋濓季汶墓志字彥父龍泉人元至正中率壯明士從舒穆嚕宜孫討賊數有斬獲授義兵萬户兵破處州擢安南翼總管會賀李二將叛殺總制孫炎處大擾汶部駐白巖出其不意攻之中書平章政事邵某亦引兵至左右夾擊遂誅賀李復其城升處州翼同知元帥青田盜葉賢三燒浦城政和兩縣掠婦女畜産而南㳊告總制胡深伏兵平山嶺邀擊斬之出私財贖軍中所掠耄倪遣還其家民德㳊肖像而祝者甚衆洪武元年乞骸骨賜襲衣冠帶遣歸周德閭兩浙名賢録松陽人少通書史尤精武略值元季寇亂率子弟保障鄉邑及明師下栝蒼辟德閭守禦處州復合兵數萬東取甌城屢立奇功後上論功頌賞懇辭不受人益髙其節乞身家居捐資築白龍堰灌東鄉田數百頃耕穫以饒因更名曰周公堰樊觀生括蒼彚紀字進德縉雲人善騎射多謀略洪武初為縉雲郡伯胡深參謀授處州翼鎮撫從征福建厯建寧燕山平陽成都四衛以武節將軍致仕楊本名山藏處州人建文初以太學生應募授錦衣衛鎮撫使從軍常自操鐵棒馳陳中所向披靡李景隆妒其功不與上白溝之戰請為陳首景隆陽許之而隂尼之諸將不繼竟無功本乃疏劾耿炳文李景隆不足將請自將以行卒不用後為燕人所擒王使擊北平趙王髙燧恐為內應遂殺本燕王歸北平太息曰吾直困之耳奈何不為我儲良將時哲崇禎處州府志遂昌人正統間礦賊突攻縣治哲散金募兵率弟志邀擊於麻車嶺志死之哲力戰賊郤郡司上其功授馬步司巡檢丁庫萬厯縉雲縣志正統間陳鑑胡寇栝郡守檄召庫征勦挺身格鬬而還賊黨追躡將濟河庫撤石橋斷其渡隨拔貓竹數株示曰以此擊賊賊駭奔遁城賴以全撫案上其事欲加職庫曰為國出身分也固辭賜寶幣帛書效勞二字旌之時人稱丁拔竹云李琮獻徵録字義方景寧人籍錦衣衛天順進士成仁時授南吏部主事厯郎中擢知平陽府垣曲縣盜作聚一千餘人拒殺官兵勢甚熾衆議欲進勦琮告於都御史葉琪曰民苦飢耳請撫之乃攜從者五六人冒雪以往賊迎見曰是李府尊也遂下山羅拜擁入寨中琮召其酋六十餘人諭以利害皆感泣聽命事遂定擢湖廣布政司左參議施州夷殺其上官因作亂調兵五千搗之擒賊首三十還所掠男婦二千人擢山西按察使厯福建左布政使卒於官周南獻徵録字文化縉雲人成化進士除六合知縣擢御史出按畿輔𢎞治初再按廣東劾總兵官柳景厯江西右布政使擢右副都御史巡撫大同正德四年督南贛軍務南贛巡撫之設自南始汀州大帽山賊張時旺黃鏞劉隆李四仔等聚衆攻剽城邑延及江西廣東之境數年不靖南集諸道兵擊之龍牙擒時旺義民林富斬鏞於鐵坑其他諸寨皆破副使楊璋僉事凌相等亦擊隆四仔禽之先後斬獲五千人南乃移師會總督陳金共平姚源諸賊境內遂寧九年進右都御史總督兩廣軍務踰年乞歸卒贈太子少保葉廣獻徵録字大用景寧人襲錦衣衛為總旗領東厰緝事詳慎不泄成化八年以功擢仕百户􅊩本所事屢奉敕出勘重獄所在餽贐悉辭弗納實授百户遷副千户𢎞治六年擢指揮僉事督捕中外盜賊獲數千百人纍遷都指揮僉事北山賊號靠山王者勢甚猖獗官軍出捕比至則廣已遣官屬搗其巢滅之矣遷指揮同知正德元年遷都指揮使掌衛事戒諭官校必以天道國法為説隱然有隂德焉夀至七十贈右軍都督府都督同知牛桓括蒼彚紀字允武麗水人由處州衛指揮厯升都督同知沈靜嚴毅清勤禮士兩鎮貴州夷人仰之如父母分守江左士民不忍舍所至屢立戰功未嘗妄殺雖致位樞府被服如寒士云鄭汝璧獻徵録縉雲人隆慶進士授刑部主事厯遷井陘兵備副使改赤城參政赤城在上谷為塞外地汝璧時衣袴褶與諸將馳走郊原校武技講戰略越陽和謁制府皆以馬不以輿晉河南左參政遷榆林中路按察使風勵諸將勤訓練戎務改觀尋遷山東右布政使纍擢至僉都巡撫青州賊魏邦齊倡亂殱之倭破朝鮮駐釡山者幾二年隔一水揚帆即至汝壁募標兵調浙兵以束伍法整齊之士皆可用以憂歸起南太常少卿擢延綏巡撫延綏故所宦地悉諳其形勢要害兵為天下雄諸將多舊材官指使如意敵炒兒忽明愛等入紅崖墩大帥杜松擊走之復窺懷逺遊擊沈應蛟戰却之皆汝璧發縱指示之功也遷兵部右侍郎總督宣大山西軍務講戰守檄行諸道修城堡練士卒治器械間召故大將麻貴董一元等談用兵之略旋以疾乞骸歸陶起翺續處州府志縉雲人萬厯二十四年倭酋關白寇朝鮮國王季昖乞援命兵部尚書邢玠總督提兵征討起翺父良性為南昌府通判玠素重其才略奏改銜永平府督餉禦倭起翺因同兄弟學夔夀國侍父抵朝鮮隨以義勇應募隨征屢對敵奮擊親斬倭級數十奏凱班師起翺學夔俱授處州衛世襲百户夀國世襲總旗起翺後升處州衛世襲指揮僉事署掌本衛印務統兵把總溫區金鄉衛珠炎營續蒙勳崇禎處州府志字世階襲處州衛指揮多膂力馬上運槊如飛握兵甌海禦寇九年水陸二十餘戰斬級三百七十有竒生擒百餘母病歸服闋掌衛篆升廣東白鴿門總築兩埠修營房八戰擒倭寇百三十餘斬首二百級遷都閫坐營合𠞰瓊崖黎寇以破巢功最升西山參將撫土司有恩兼攝東山四年轉湖廣鎮筸兼制九永荆湖等處土司入犯禦之斬級五百生擒三百九十餘舊例解上請功蒙勳曰徒膏斧鑕耳何益令土司以人口生換逺近恱服解組歸二十餘年夀八十卒樊獻科福建通志縉雲人為御史按閩島夷犯瀕海諸郡汀盜阻山為潢池巡撫與諸將鍵城門獻科慨然曰人臣奉璽書境外茍利社稷專之可也山海方螫毒在事者鍵城自守如元元何投袂起視師諸將始決戰島夷就殱張榜崇禎處州府志字汝元處州衛人以祖父死難功廕襲千户少業業通大義初襲職即委管團練領兵往瑞安禦倭獲功升松海北窗江西都司廣西潯梧參將𠞰平狼寇又統兵往上林三畔等巢征𠞰猺獞斬獲無算升狼山副總兵督兵前赴朝鮮應援事平留防善後把守汛地後以撤兵凱旋所過秋毫無犯榜自束髮從戎以至功成雅有儒將風清操不染兵民立石以頌功德李繼堯錢塘縣志字汝唐縉雲人以諸生遊學武林值楊應龍之叛毅然投筆曰吾祖恭愍公巡撫西粵羣酋叛服靡常猶討捕招徠今豈異時耶乃以儒生躬厯行問屢出奇計奮勇先登著有勞續纍官廣東參將謝職後家於西湖自號凌虛子田正春德安府志字體端縉雲人機警多智略喜談兵由進士授德安推官時流寇方獗單車就道至則設鄉社募官兵利器械賊以有備不克而遁遂攻蒲鄉去府稍逺猝被寇人震恐正春趨戰却之城中呼為田老子以忤柄紳降開封府知事厯太康令轉刑曹晉東兖道卒於官周士多縉雲縣志字思皇崇禎貢生廷試召對稱旨特賜庚辰進士授輝縣知縣時流寇嘯聚太行山肆殺掠士多親統官鄉兵擒獲賊首仍行招撫輝民以安督撫奏題委署新設衛輝兵備兼河北三府監軍道事卒於官浙江通志卷一百七十四
