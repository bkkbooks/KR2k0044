body:
  text: 浙江通志卷二百七列女六湖州府歸安縣元孟之縉妻趙氏兩浙名賢録名妙惠之縉卒後以補蔭事攜子淳至京有近臣悅其色請於世祖欲委禽焉使者傳旨到門趙曰妾寡婦請於簾內受旨既而出見使者則剃髮毁容矣使者大驚上其事乃已洪春春靜志居詩話洪德源女至正十八年兵亂父引之避居新市賊至匿空舍中賊入將逼之女投水死明卞文銘妻張氏𢎞治湖州府志夫早卒父母憫其年少子幼諷之改嫁氏入閨良久而出則髮皆剪矣正統間旌表林文妻王氏張寧林節婦詩卷序吳興王景賢之女年十九適林方九日而林以事死于官節婦不再從未幾其娣亦以孀居願守家法迄三十餘年所志無愧里人歌詠之久而成卷題其首曰無價珍施敏妻王氏歸安縣志敏客湖湘遇盜死氏于是夕夢夫語以故及寤號慟齋素踰月而凶問至時年甫二十餘毁容屏守婢亦感化終身奉之陳敏八妻倪氏西吳里語許字未婚而敏八從征不返傳聞匕死氏守志不嫁踰五十載敏八歸還成姻禮時氏年六十一陳年六十八時號白頭花燭張貞女歸冇先張女貞節記張𢎞裕女許聘烏程嚴大臨大臨疾甚將死女聞閉門悉斂平時所製女工及裝送衣物焚之家人驚問女曰吾已無用此矣語聞嚴氏姑遣嫗往覘之女私謂嫗曰病不可為當歸汝家沒吾世而已舅姑感動遣人往迎父母難之大臨卒張氏往哭遂居次不遷是時女年十九因為置嗣及長娶婦而嗣子亦卒遂婦姑相守以終嚴四英籌海圖編桂林知府鳯之從女寇入鄉傷其父虜四英以行至跳街橋曰英投水溺焉山隂徐渭為之立傳蔣衍章妻陸氏舊浙江通志年十六未嫁間夫疾篤遂往奉侍湯藥甫三日而夫卒堅守六十餘年萬歷中具題建坊嚴正度妻施氏歸安縣志早孀勵志里中有無行者隔垣窺之施大聲疾呼遍告宗黨自刎死時方炎暑越三日始殮顔色如生郡守陳幼學遣官致祭張氏三節歸安縣志徐氏張問仁妻年二十二夫亡無子守節三十二年周氏張存義妻年二十夫亡無子守節三十年黃氏張體信妻年十八夫亡無子守節三十年藩司表其廬曰一門三節潘翊卿妻沈氏歸安縣志年二十四而寡事孀姑孝後姑老患痿扶掖牀第間躬親湯藥寒暑無間雖垢穢必親滌如是者三年竟以積勞成疾而卒吳景元妻顧氏歸安縣志景元病篤迎氏到門未一月景元卒守志不移繼姪啓新為後娶陸氏啓新又夭姑婦孀居年皆八十餘人稱雙節沈臻卿妻臧氏歸安縣志夫殁子鍾觀在襁褓臧號慟欲絶姑勸慰之強起撫孤遇盜欲刃其姑氏請以身代得免後俱以夀終王瑞圖妻沈氏歸安縣志年十七歸瑞圖未三年夫殁遺言必罄家力行善事沈乃悉典簪珥傾囷粟凡施捨賑救事無巨細有聞必行撫遺孤成立年六十四無疾而終應道和妻盧氏孫溥妻李氏唐謹妻潘氏沈鏜妻簡氏沈復妻孫氏施艮妻沈氏項奕顯妻沈氏沈警燦妻吳氏張維妻陳氏沈警㸅妻王氏沈輶妻嚴氏張承亮妻劉氏張鄖錫妻黃氏陸警凡妻張氏應霖妻張氏張日省妻費氏國朝徐廷賢妻吳氏歸安縣志年二十五夫亡氏毁容砥節誓死靡他事姑嫜撫幼孤屢值歉旨建歲艱苦備嘗順治中巡按王元曦具題奉坊旌表楊敬塘妻王氏歸安縣志夫亡氏年十九生男女各一矢志守節宗族因其年少勸之嫁旨建氏佩刀欲刎如是者二十年康熙十一年具題奉坊旌表盧明棟妻馬氏舊浙江通志康熙二十年巡撫李本晟具題奉旨建坊旌表沈鏐妻董氏題旌册結褵七載夫亡事翁姑至孝撫繼嗣成名守節三十七年康熙三十九旨建年具題奉坊旌表王炳鳯妻陸氏題旌册年十六歸炳鳯半載炳鳯亡事姑孝撫遺腹子成人經史皆由親旨建授貞操六十載康熙四十四年具題奉坊旌表費爾莊妾蔣氏題旌册年十五歸費二十三歲夫殁撫孤成立苦節三十二年康熙五十旨建八年具題奉坊旌表崔寀妻嚴氏題旌册年十五歸崔三十歲夫亡守節四十一年雍正二年具題奉旨建坊旌表俞爾鼎妻金氏題旌册年二十五而寡守節五十九年王永昌妻費氏題旌册年二十而寡撫遺腹子守節五十一年以上二氏俱雍正三年旨建具題奉坊旌表史啓昱妻朱氏題旌册年二十九而寡姑患痺症體如蜂螫不能就席氏以身翼姑衣不解帶及姑愈翁又癱瘓十年氏拮據湯藥艱苦備嘗訓子嚴而有法子園登丙午鄉薦氏守節二十旨建年雍正四年具題奉坊旌表鈕獻琛妻曹氏題旌册年二十五而寡守節三十七年雍正五年具題奉旨建坊旌表沈坦妻嚴氏題旌册年二十一而寡事舅姑歷久彌敬以夫棺未葬積二十年澼絖之資搆地營窀穸撫子直方成立守節三十二年王耀妻江氏題旌册年二十三而寡事孀姑養葬盡禮撫姪承祧守節二十四年潘旭妻周氏題旌册年十八而寡奉衰翁撫猶子為嗣守節五十七年鮑溶妻髙氏題旌册年二十九而寡事翁姑撫子守節五十一年沈士俊妻江氏題旌册年二十九而寡守節四十一年以上五氏俱雍正六年具題奉旨建坊旌表潘兆發妻倪氏題旌册年十七夫亡撫姪為嗣家貧訓女徒自給守節三十四年潘子韓妻吳氏題旌册年二十九夫殁守節四十二年吳傑妻卞氏題旌册年十九歸吳甫一月夫殁繼姪峙泰為嗣長為娶婦生孫三月而媳亡氏又撫孫成立守節三十三年正七年具題奉以上三氏俱雍旨建坊旌表潘志英妻沈氏題旌册年二十夫亡遺腹生一女繼姪承祧守節三十二年潘燕發妻孫氏題旌册年二十九夫亡止一女撫姪承祧守節四十年沈正妻孫氏題旌册年二十夫殁長孤方二齡遺腹復生一子晝夜縫紉奉翁姑撫二孤守節五十九年徐濟善妻楊氏題旌册年二十二濟善殁撫子藉女紅自給守節二十五年章宸策妻沈氏題旌册年十九夫亡繼甥為子守節五十六年以上五氏俱雍正八年旨建具題奉坊旌表沈氏二節題旌册姚氏沈銓妻陳氏銓子徹妻銓亡姚年十六無子繼姪徹為嗣姚上事孀姑下撫繼嗣嘗身受凍餒而姑與子衣食不缺所居僅數椽親操井臼外人無識其面者故時人為之語曰銅墻鐵壁姚氏之室守節三十二年卒徹亡陳氏年二十八恪承家法鬻手以奉孀姑教兩孤有成守節三十二年黃士元妻蔡氏題旌册年二十四而寡事姑孝姑殁喪葬皆出自十指訓繼嗣嚴而有法守節二十七年而卒施介膺妻嚴氏題旌册年二十三而寡姑早亡後姑性卞急氏委曲承順姑亦化之撫姪為嗣并撫無母之姪共七人由襁褓以至嫁娶靡不盡心守節三十七年卒慎蒔彥妻張氏題旌册年二十四而寡遺孤僅三齡翁姑老氏事之益謹訓子以義方守節三十二年而卒朱廷槐妻沈氏題旌册年十八適朱為繼室十九而夫亡元配子有瑛孱弱多病氏保護備至卒能成立姑亡遺兩幼叔氏并撫之守節四十六年費元銘妻沈氏題旌册年二十九而寡長子未離襁褓遺腹生次子翁姑老且病氏上事下撫歷盡艱辛守節三十一年孫洢妻唐氏題旌册年二十三姑亡夫繼殁遺女止四歲孤甫五月翁藉館榖糊口疊遭兩喪饔飱不繼氏勤十指以給守節三十一年馮秉恆妻姚氏題旌册年十九而寡遺腹生子殤撫夫前妻幼子三人而伯仲又夭復撫諸孫成立守節四十七年孫兆行妻諸氏題旌册年二十一而寡無子嗣猶子夫弟又夭與嬸張氏共相朂勉積資合售一地葬其夫及叔守節五十四年沈振妻蔡氏題旌册年二十而寡無子姑先亡祖姑在堂老而多病氏侍湯藥不離左右祖姑及翁殁氏拮據殯殮立繼承祧守節五十八年孫偕行妻張氏題旌册年二十二而寡無子欲殉翁姑為立繼嗣乃晝夜操作撫孤守節旨建五十年坊旌表以上十二氏俱雍正九年具題奉朱元玠妻宗氏題旌册年二十九而寡撫子守節三十三年沈汝楫妻李氏題旌册年二十三而寡守節四十六年王廷臣妻陳氏題旌册年二十八而寡孀姑年邁遺子女五人旁無伯叔家貧甚籍女工以上事下撫孝慈兼盡守節三十三年董稚圭妻龔氏題旌册年二十五而寡事姑孝撫姪為嗣守節四十一年陳鳴鶴妻邵氏題旌册年二十六而寡事舅姑撫子守節四十三年鈕士球妻凌氏題旌册年二十八而寡撫子守節三十年以上六氏俱雍正十年具題旨建奉旌表坊吳景運妻潘氏題旌册年二十四而寡事姑克盡孝道遺孤婚配復夭撫育遺孫長成婚娶守節五十年沈爾霖妻邵氏題旌册年二十九歲而寡仰事俯育竭盡心力喪葬婚娶豐儉合宜守節五十七年陳于王妻范氏題旌册年二十二夫亡哀慟欲絶姑曰節與烈無異理當以未亡者為亡者任其職遂飲泣從命無子撫姪為後姑疾寢食俱廢居喪盡禮守節五十五年錢氏二節題旌册錢師韓妻貝氏年二十九而寡事舅姑撫姪天府為嗣葬錢氏三世守節五十二年天府早殁妻謝氏年十九事姑共矢荼苦無子撫兩女長齋終身守節三十一年沈徴階妻張氏題旌册年二十一夫亡撫前室之子女婚嫁逾于已出自以不及奉侍舅姑每逢忌辰必盡誠敬事之如生守節四十七年王國泰妻費氏題旌册年二十二夫亡家無生産侍奉舅姑曲意承順殁後哀毁盡禮遺孤相繼而夭孤孫在襁褓中復與寡媳共為撫育以延宗祀守節六十七年吳陳爻妻凌氏題旌册年二十五而寡翁復遘疾十有餘年侍奉不怠竭力以完喪葬老姑年屆八十親操井臼以供甘旨守節三十七年吳啓成妻孫氏題旌册年二十一而寡姑病侍奉湯藥晨昏無間翁年近八旬氏親自扶掖不任婢僕遺孤成立能文皆由母教守節三十二年沈汝俊妻崔氏題旌册汝俊贅于婦家以疾卒得一遺腹氏辭母家歸沈而沈實無家從叔收而養之子復夭躬自作苦以佐食早年耳聾人呼為聾寡婦守節四十四年費文光妻宋氏題旌册年二十三夫亡絶食投繯者再翁泣諭乃撫姪為嗣事翁存殁盡禮而所撫之姪既長復亡媳有遺腹氏再為恩育教誨因得成立守節三十九年金寧基妻馮氏題旌册年十八夫亡水米不入口者纍日上事翁姑晨昏定省未嘗或間姑病身侍湯藥衣不解帶者三月殁後哀毁骨立繼姑年少于氏而事之克盡誠敬翁殁典衣搜篋以營喪葬教子義方克著文譽守節三十四年錢廣生妻王氏題旌册年二十九而寡事姑撫子守節四十九年程嗣興妻王氏題旌册年二十九而寡事舅姑撫子守節二十六年史進妻崔氏題旌册年二十三而寡事舅姑撫姪為嗣守節二十八年以上十五氏俱雍旨建正十一年具題奉坊旌表賈大姑部咨案驗年二十許字髙成龍未婚浣衣河口李二調之大姑羞忿歸訴其母遂扃戶自經死李二依律究擬大姑節烈捐軀雍正十一年具題奉旨建坊旌表沈夢曾妻慎氏題旌册年二十二夫亡生子甫百日氏鞠育教誨長為娶婦復早夭僅遺寡媳孤孫煢煢孑立氏荼苦經營得延一線守節三十一年陳其凝繼妻沈氏題旌册年二十八適其凝二十九其凝亡前妻遺冇五子長與次方就傅幼者襁褓氏撫如已出延師訓課長子登賢書餘俱讀書有成守節二十年費存筬妻陸氏題旌册年二十八夫亡事繼姑甚孝教子掄元讀書有聲庠序守節三十一年鄭嘉績妻吳氏題旌册氏幼喪父母育於嫂年十七結褵二十二而寡無子夫弟繼卒遺一子與娣楊氏同撫之又遭舅喪竭蹶營葬事孀姑以孝謹稱後姪長生子遂以為嗣守節六十六年費名賢妻沈氏題旌册年二十七夫亡未二載舅又亡氏晝夜勤機杼營窀穸教遺孤口授經書守節一十五年卒卞澧妻唐氏題旌册年二十七夫亡子在襁褓氏足不踰戶勤紡織事舅姑撫子守節四十七年丁江妻朱氏題旌册年二十一適江二十四而寡無子撫猶子恩勤鞠育稍長延師訓課俾克成立事兩世尊嫜尤稱孝謹守節二十九年莫尚瑗妻凌氏題旌册年二十三夫亡舅姑老子幼氏忍死以守終身不御鉛華布衣蔬食守節三十年陸鳴鑾妻吳氏題旌册年二十二夫亡時結褵甫二載生子未睟氏欲以身殉舅姑泣諭之曰汝死則兒亦死陸氏之鬼不其餒而遂矢志靡他事舅姑生奉甘旨殁營喪葬俱竭盡心力鄉黨咸稱其孝教子具有法度守節二十九年周輔臣妻諸氏題旌册年二十一夫亡遺孤二藉針指以給饔飱旁無伯叔竭蹶葬舅姑及夫守節四十六年具題奉以上十氏俱雍正十二年旨建坊旌表王張嗣妻盧氏題旌册年二十九夫亡子起熊甫九歲撫長擇配又夭氏痛不欲生親黨議立族孫至健為起熊後氏復撫長擇配生子女宗祀賴以不墜守節五十六年張致妻董氏題旌册年二十六夫亡無子舅姑老且病氏奉侍不離左右殁則卜地營葬建宗祠備祭器撫姪潮青為後守節四十七年沈四鎮妻張氏題旌册四鎮病其父以本支三世皆立繼豕祧四鎮又未有子即命以姪後之氏撫育如已出四鎮卒氏年二十九舅繼殁逾月之間連遭大故百計質貸完喪葬艱苦訓子守節二十三年陸叔英繼妻湯氏題旌册年二十八而寡二子幼舅姑殁而未葬夫兄二人力不能營宅兆氏典鬻衣飾罄盡由是三棺並舉教子耕讀已日夜勤紡績守節二十九年歸應洪妻吳氏題旌册年十七適應洪十八而寡遺孤甫百日上無舅姑家貧甚惟日勤女紅及屋旁隙地種瓜蔬易衣食子長為娶婦又夭宗族皆獨子無可繼者乃親負土築墳葬舅姑及夫性耿介雖炊煙常絶而人有遺之者堅不受守節六十五年金秉柄妻周氏題旌册年二十六夫亡事姑孝謹教二子讀書早歲遊庠孫曽林立守節五十七年吳啓黯妻陳氏題旌册年二十三夫亡遺孤在襁褓稍長氏節衣縮食俾從師問學守節四十一年吳子易妻沈氏題旌册年二十一夫亡無子立姪景臣為後長為娶婦復夭又繼兩孫延師課讀完娶後各授以産計家資視夫亡時有加焉守節六十三年吳翀妻孫氏題旌册年十九適翀甫七日姑殁即脫簪珥以備殮具二十五夫亡舅繼殁子振宗幼家無寸椽僦屋以居值歲侵流離播遷然必擇鄰而處經書皆口授子入邑庠守節三十三年李貢妻陳氏題旌册年二十八夫亡三子二女俱幼舅姑柩未葬氏株積數載克營兆域教子耕作其秀者則令就學子女長各為婚嫁守節三十五年茅源妻吳氏題旌册年二十四夫亡無子止一女立族屬之應繼者為後舅卒于京家益窘乏藉針指以養姑歷八載孝謹彌篤姑殁拮據治殮具守節四十一年費志逺妻沈氏題旌册年二十七夫亡甫三月舅又亡遺孤在抱氏孝養老姑撫子成立守節一十八年卒吳貽燕妻沈氏題旌册年二十一夫亡無子以猶子為子家貧夜漏三下猶於燈下織績而令子誦讀于旁守節三十二年潘二巡妻費氏題旌册年十八夫亡時曽祖姑以下三世咸在堂氏謹定省供甘旨並得歡心後疊遭大故力營窀穸夫亦祔焉夫弟生子即育為已嗣守節三十四年俞廷詠妻沈氏題旌册年二十七夫亡撫姪為子延師課讀凡衣食膏火之資皆從十指間出事孀姑以孝聞守節二十五年邵純祖妻童氏題旌册年二十五夫亡遺孤甫五齡又殤夫之姊亦早寡無依氏迎養於家同室共處氷霜之操鄉黨咸稱之守節二十七年汪子華妻宋氏題旌册子華為瘈犬所噬兩目俱瞽氏鬻衣飾延醫治之終不愈子華卒氏年二十九無子止一女繼姪文燦為嗣撫訓成立女亦有歸守節三十一年唐永成妻丘氏題旌册年二十六夫亡遺妊生子氏力勤紡績事孀姑撫子長姒嫠居無子氏命子事之如母殁為治喪營葬守節三十三年姚子含妻潘氏題旌册年二十七夫亡撫四歲子世隆娶婦生孫子復夭遺孤瑞麟復撫之成立兩世一線賴以不墜守節五十六年朱以莊繼妻邵氏題旌册年二十五夫亡前室遺一子年九齡矣家貧夫多宿負取償者接踵或至厲聲辱詈氏鬻所居償所負至棲托無所有嫂嫠居遂往依焉守節二十八年柴起蛟妻吕氏題旌册年二十九夫亡二子俱幼氏屏膏沐足迹不出戶外守節二十五年沈建竒妾陳氏題旌册年二十八夫亡子三錫幼氏誓死不二子稍長令之學遂遊庠守節三十四年年以上十八氏俱雍正十三具題候旌汪逢源妻丘氏歸安縣志嫁未期而夫死欲自盡舅姑止之順治乙酉夏冦據湖城氏恐見汚亟投井為汲者所出氏即鍵戶登夫棺自經死家人舁尸以土覆之越三日始殮面如生茅允旗妻周氏歸安縣志周文鳳女性至孝翁瑞徵官京師氏躬操節儉相夫朂子順治中羣盜入室氏恐見汚潛赴水死次日尸浮水面顔色如生郡邑旌之孫華妻陳氏舊浙江通志年二十七夫卒撫孤士傑不能延師晝夜紡績伴讀後舉順治戊子鄉試守志五十八年卒沈鍾元妻嚴氏舊浙江通志年二十八夫亡撫前妻之子角長娶茅氏角又夭遺孤雍尚在襁褓嚴與茅竭力撫訓俱以夀終姚貞女歸安縣志姚文成女許字楊文􅕩未幾連喪舅姑癸丑夏文􅕩卒氏聞仍為父母理家事至更餘從容紉衣自經死里人迎女棺與文􅕩合葬呈縣請旌潘世暹妻胡氏歸安縣志年二十三夫亡守節撫伯氏子璜為嗣璜娶費氏生子銓未幾璜又殁煢煢二孀撫孤成立孫龍行妻李氏馮景孫烈婦傳李維申女龍行將娶嘔血結褵後病間發氏異牀而寢其所以嘗藥雪穢者勤為之無怨色及龍行病革泣謝李曰吾纍汝吾死命也汝則奈何氏曰君果不諱亦惟隨君後耳相期冥會不出十日龍行殁以康熙癸酉六月二十一日及月晦而李氏果不食死氏初絶粒時母強灌以粥咬碗碗碎至五日蛔自口出氏且吐且咽七日五臟團結上衝忍痛按之下終不言死之日顔色如生蚊蠅不集年十八王燾妻吳氏馮景王烈婦傳吳訒伯女年十九歸燾燾故家貧為村孰師病嘔血不止氏鬻資粧營參藥百治不驗燾自念必死母老子稚以言偵婦志吳氏曰君即不起婦自有處不煩慮也燾尋殁含殮後數日氏遍拜族人以寡姑託之又率其九齡之孤託從兄昌言屬幼子於其兄懬越日稽顙與姑别姑恚曰夫肉未寒奈何即舍我而去已各如寢夜半微聞啓扉聲久之寂然姑疑之即束緼吹火求鄰子蹤迹之天微明見氏兀立深湍中顔色如生起之內衵外衰下至裳襪皆連紉層結時康熙乙亥夏六月十九日距其夫死之辰止九日也沈應來妻嚴氏鄭文鼎妻宋氏沈坰妻趙氏姚宗裕妻方氏嚴爾圭妾蔡氏施偉妻閔氏嚴鋽妻鮑氏閔穆臣妻王氏潘仲禮妻劉氏李自禎妻施氏金道淵妻費氏閔無偏妻朱氏周魯華妻陸氏長興縣明臧奴子妻倪氏舊長興縣志年二十五夫亡遺腹生子福齡父戍西安欲攜往嫁之倪不從勉奉舅姑教子成立孀居三十年永樂年旌臧應奎妻嚴氏舊長興縣志應奎為禮部主事以諍大禮子杖卒氏年二十八孀居矢節隆慶年旌李大元妻龍氏舊長興縣志年十六歸大元不數月大元客死氏自度俯仰內外必不可一日生歎曰我生不辰安知夜臺非白日乎遣侍女歸寧與妯娌欵洽竟日夜半紉衣裳自經死萬歷年旌周貞女熊明遇貞女碑記許字姚光裕光裕殁女密燬其所御錦茵麗服割髮謝粉黛將臨姚喪父多方縻之三年而知其必不可奪乃治縞車輦女歸姚及門而笄曰吾今日得為姚氏婦矣命髙墉嚴扃置壞通飲食奉夫木主禮拜紡績室中傷亡人殮薄出機杼所積購巨材為槨卜葬唐興山事竣請嗣既得受命曰可報亡人于地下矣稱疾却醫絶食旬日而逝年僅三十董廷虎妻王氏舊長興縣志生子三歲廷虎卒氏年二十四俯仰無依惡少朱電慕其姿強贅焉氏割一耳血淋漓從門隙投之電驚遁伶仃四十餘載萬歷年旌韋佑妻李氏舊長興縣志年十七歸佑踰年佑卒遺腹舉一子舅姑諷之他適氏抱子號泣自矢益堅卒年五十八李蕙妻費氏丁元薦李節婦傳蕙死氏年二十五遺以妊舉一子名之曰倫值歲不登鬻奩具供堂上甘毳姑病疽日夕侍湯藥禱于神願以身代尋果愈倫婚姚氏舉六子詩書之業三世而卒光火焉李鵾妻錢氏舊長興縣志年十六歸鵾閲十載鵾卒子大中二歲大正甫五月宗姓將不利於二子氏外禦其侮教之成立丁元薦為傳李貞女舊長興縣志李良謨女許字宋林未婚林疾篤舅姑促歸父母不忍也時氏年十三自笄而往躬湯藥者二十七日而訣兩叔耽耽不利其在室氏曰産可讓志不可奪甘貧茹素年五十三而卒李大韶妻錢氏舊長興縣志大韶不得于父暴死氏年二十二子良棟方兩歲氏以子故亦失愛于翁奪之者屢矣終矢志靡他焚其嫁衣以見志翁死為營葬厝大韶于墓側于是早夜拮據以十指為生良棟長娶婦歲除丐米他舍無應者姑婦對泣度歲良棟就試武林徒步以往舉于鄉成進士伏闕上籲奉旨旌表丁應詔妾嚴氏舊長興縣志農家女也年十九侍應詔應詔年追桑榆甫四載應詔卒遺命嫁之嚴矢志不二龕大士于室遂不肉食卒年五十五朱天然妻錢氏舊長興縣志年十七歸朱兩歲而得子甫晬而天然死氏事翁姑育藐姑辟纑以佐饔飱拮據黽勉以至于聾族人稱聾寡婦周思亷妻石氏長興縣志年十七為思亷繼室前妻王氏生一子甫周歲氏鞠育如已出越二年思亷死家貧嗣幼有欲奪其志者氏割髮自誓撫孤成立以夀終費氏二節舊長興縣志王氏費繼元妻年二十三繼元卒遺孤應期甫三齡家酷貧撫之成立娶丁氏而應期復卒丁氏方十七遺孤九思猶未晬也姑媳砥行邑大夫表其門臧氏二節舊浙江通志閔氏年十四贅臧世基數年世基卒氏素服歸臧年二十一卒蔡氏年十五歸臧國基即世基兄孀居十四年足不踰閾椎髻布衣年三十卒稱一門雙節臧斐基妻吳氏舊長興縣志歸安人幼許字臧斐基父登賢書且宦矣聞臧生貧甚悔焉復以女改字一新貴女恚曰不有初命在乎是時臧雖補弟子員年甫成童鳴學使者暨直指皆掣於勢不得仲女憤惋欲死奉母抵父任削牘泣請父怒謾署其女札曰女不從父非吾女聼所歸女得札呼保姆買艇竟赴臧成禮椎髻操作絶無怨咨居二載舉一子鞠育盡瘁而卒趙貞女長興縣志許字周宗制未行而宗制病篤俗以迎婦為沖喜謀諸趙趙拒焉氏泣曰身許周生豈以病故二其心即束髮偕母往比至宗制病革矣猶能盱目一視氏年甫十八卒哭母勸之歸不可翁姑貧老欲奪其志氏截指以誓十指所入絲粒不費越十餘年始得厝夫骨後殁從宗制同穴焉丁紹稷妻姚氏長興縣志年十九而寡志矢靡他姑病痰以口承沫刲股作羮含辛茹荼六十年臺使旌其門胡駿妻韋氏舊長興縣志明末兵亂駿攜氏避紫梅溪突遇數十騎氏知不免躍入池中而死時相繼赴水死者駿兄端妻過氏駿伯育秀妾柏氏及馮遵祖妻陳氏馮與胡為姻婭人稱四烈云孫忭妻濮氏舊長興縣志婚三載涉亂襁幼兒隨姑避匿道逢騎兵欲俱驅之去氏曰姑老矣茍釋姑我願隨行從之離里許兒啼置之田間顧道旁有池奮身躍入死兒為里中收抱得存李世彩妻徐氏舊長興縣志孀居避亂猝與兵遇紿以金瘞近處請往取兵許諾急趨池畔入水死又楊發妻梁氏被掠不從自沈于河劉國美妻施氏并女秀大楊亨妻周氏馮聖源妻朱氏俱不屈被刃死孫氏二烈舊長興縣志一為孫文明女欽授衮之妻兵至義不受汚赴水死一為孫枝茂妹王選之妻兵掠其資欲及其身抽兵刃自刎死徐彥名妻郭氏孫應福妻姚氏錢塘妻費氏商綸妻李氏畢文信妻費氏臧葵妻馮氏髙鳳翔妻劉氏陳輻妻盛氏楊蒙妻宋氏徐浚妻潘氏鍾經書妻沈氏錢大選妻劉氏髙名世妻潘氏沈觀瀾妻費氏王泮妻皇甫氏沈紹宗妻費氏孫伯鯨妻李氏欽沛妻徐氏國朝徐聖妻莫氏長興縣志年二十七而寡孝事翁姑撫課二子成立康熙十年具題奉旨建坊旌表吳中元妻周氏長興縣志年十六歸吳甫一月中元墜水死氏紡織拮據以奉尊嫜已則旨建日僅一粥無子以姪兆興嗣年七十七卒奉坊旌表陳鈺妻錢氏題旌册年十九夫亡無子翁姑老病氏辟績以供及殁喪葬盡禮苦守四十餘旨建年康熙二十四年具題奉坊旌表周召妻朱氏題旌册年二十七夫亡事舅姑撫孤子守節四十六年康熙五十年具題奉旨建坊旌表丁氏二節題旌册丁景達妻李氏年二十八夫亡撫教二子守節四十四年丁偉妻錢氏年二十五夫亡撫子守節二十六年二氏俱善事孀姑人稱節孝兼盡焉臧時敘妻吳氏題旌册年二十四夫亡事姑撫子守節三十六年姚灝妻李氏題旌册年二十七夫亡守節二十四年蔣嶽妻張氏題旌册年二十九夫亡事衰翁撫周歲稚子守節三十六年以上五氏俱雍旨建正三年具題奉坊旌表黃燦如妻趙氏題旌册年二十七而寡事翁及後姑俱孝撫二子成立氏性好施凡宗黨以窘迫告者必應之小姑早孀無所依倚氏迎歸同處勵以氷操殁為殯葬焉守節三十四年而卒旨建雍正九年具題奉坊旌表丁植妻錢氏題旌册年二十九而寡無子繼族子上之為嗣事姑孝姑卒即擇地為兩世營葬教嗣子為諸生守節三十三年鬢髮盡白猶勤蠶績不少休孫偉績妻鄒氏題旌册年二十九而寡遺子二教之讀書兼業農事氏敬事翁姑母孀無依迎養二十餘年兩姓咸稱其孝守節五十二年滕士竒妻嚴氏題旌册年二十一而寡無子繼姪象巽為嗣勤儉持家能使家業裕于夫在時守節四十一年朱汝楫妻葉氏題旌册年二十五而寡遺孤未周歲舅姑老病氏百計醫藥侍奉十餘年卒擇地以葬撫孤讀書氏生平知大義伯氏家貧絶嗣夫婦繼亡氏親為殯殮堂姪單丁貧不能婚氏捐資為娶婦守節三十三年欽允文妻朱氏題旌册年二十一而寡無子止一女旁無伯叔族人覬覦遺産欲奪氏志氏之死靡他乃立堂姪為嗣事姑甚孝性更好施凡親族之無力婚葬者咸助之守節六十二年施任龍妻李氏題旌册年十八歸施為繼室二十三而寡遺娠生子文華前室子以痘殤媳徐氏年甫十六矢志同守共撫文華成立以文華之子為其後李氏守節五十六年以上六氏旨建俱雍正十年具題奉坊旌表朱煒妻吳氏題旌册年二十六而寡因前室有二子并妾出者一勉稱未亡人恩勤撫育後皆登仕藉性復好施捨棺槨修橋梁凶年煮粥以食餓者遇疾疫則設茶湯藥餌置道周以濟行路旨建守節三十一年雍正十一年具題奉坊旌表吳桂芳妻俞氏題旌册家貧貞潔自守偶從田間歸路遇道士沈淨理以手犯之氏大聲詈罵里人環集淨理乘間逸去氏哭訴憤恨衆勸其歸至夜鍵戶自經死時年二十二雍正十三年獄成具題候旌章貞女長興縣志年十三受陳傅聘十四而傅殁女即奔赴守志順治初沿山冦起相戒勿犯所居不蔽風雨一夕虎咆其室竟無害年四十三卒姚雲妻金氏長興縣志順治初遇遊騎牽其臂恚甚遽引刀自斷投水死邑令通詳載入憲綱册邵鶴林妻蔡氏讞牘年二十四夫亡守節十載里豪徐益世覸氏色美以利啖其舅舅許之氏適歸寧紿以舅病篤速之返中途廾往益世家逼氏成婚氏毁容堅拒赴水死雍正十三年控理得實候題請旌丁明妻李氏徐三聘妻蔣氏徐元中妻蔣氏周鶴年妻姚氏丘之球妻陳氏德清縣元沈回奴靜志居詩話元末兵亂匿蘆溝中賊獲之求合從容語曰我閨女也必擇日具禮乃可賊信之攜至營是夜拔頭上簪刺喉死明沈妙圓𢎞治湖州府志幼許聘何姓者未及嫁而何亡沈亟奔其喪解衣殮之畢葬而返績絍以傭衣食卒年八十餘成化間旌表嵇瑢妻孫氏李琮安節精舍記年三十喪夫即屏棄脂澤立伯氏之子升為嗣日惟蔬食究心內孀居四十載與升之生母沈並居一室如兩氷壺雙節輝映嗣子升以學行升成均蔡玉妻沈氏嘉靖德清縣志玉卒氏年二十四一子在襁褓沈誓志堅守所親有諭以改操者輒流涕不聽𢎞治丙辰旌表卒年八十三沈濤妻康氏嘉靖德清縣志濤卒氏年方少守志堅苦凡內外婚喪一無所預購書教子至於成立孀居三十五年人無聞其笑語者正德間旌表車貞女德清縣志車鏊女許配房煥如將嫁而夫死氏年十五即奔喪守志服闋祖姑勸之茹葷不從日食果十餘枚水一二杯而已如是者八年乃擇族姪承嗣為後隨與娶婦婦入門氏執其手曰我忍死至此因汝翁無後今無以生為矣遂併果與水絶之數日而死時年二十三巡按方元彥題請建坊沈萬鍾妻章氏德清縣志年二十二夫亡抱孤付叔囑曰好看承之閉戶自經以救蘇尋服滷而殞二尸傫然一室見者哀之沈明道妻張氏德清縣志年十九夫亡遺二孤氏以死自誓撫孤成立姑病割股以救姑死畚鍤以葬孀居五十八年陳大章妻談氏德清縣志年十七歸陳甫七月而夫亡守制踰七載偶歸寧父諭以更適氏趨就夫家面翁姑泣言其志旋仆地扶之入室是夕竟緝衣閉户自經死劉氏二節德清縣志胡氏嫁劉逵年二十六而夫亡哺四孤養舅姑備極慈孝其仲子崇節妻邱氏年二十四亦寡遺孤在明方十月少多病鞠養倍艱後成進士陳情得旨建坊陳貞女德清縣志陳楫女許聘莊炎未嫁夫亡請于夫家得地築室獨居布衣蔬食炊用瓦缶不解衣不踰國者三十八年王道基妻吳氏德清縣志年二十二夫亡欲引刀自決姑謹護之不得死甘貧撫孤姑病割股以救砥節四十餘年徐彥鯉妻胡氏德清縣志進士徐灝徐之祖母也年二十餘彥鯉早世家貧撫孤慈訓三世年及耄猶先諸孫婦操作崇禎年孫陳情建坊胡子觀妻吳氏蔡汝楠妻吳氏姚珊妻蔡氏張雲路妻施氏許志逺妻馬氏章瑤妻許氏馬三省妻徐氏沈一鴻妻蔡氏徐燮明妻蔡氏許受恩妻徐氏談崇妻髙氏陳學思妻徐氏沈金妻吳氏吳羽振妻許氏房炳如妻嚴氏國朝金鏡肅妻陳氏德清縣志年十六適金閔三年夫殁氏淚盡出血目幾失明坐卧一小樓足不踰閾者三十載教子有成康熙十一年具題奉旨建坊旌表車爾翼妻蔡氏題旌册年二十五夫殁守節五十二年康熙四十二年具題奉旨建坊旌表沈人傑妻盧氏題旌册年二十八夫殁勤紡績蔬食終身守節四十七年康熙五十年具旨建題奉表坊旌胡石麒妻沈氏題旌册年十四歸胡匝歲夫亡遺娠五月産一男撫訓成立康熙五十五旨建年具題奉坊旌表沈貞女題旌册許字阮淳未婚淳卒女聞訃自經以殉時年十八康熙五十七年具題奉旨建坊旌表蔡俊生妻沈氏題旌册年二十九夫卒守節三十三年蔡思贊妻凌氏題旌册年十九夫亡守節三十四年王綍妻姚氏題旌册年二十四夫亡無子孝事衰翁撫姪為子又殤遂悲慟疾卒守節二十二年虞士森妻陳氏題旌册年二十五夫亡守節四十六年蔡昌聞妻金氏題旌册年十七夫亡事舅姑孝守節五十一年沈文龍妻潘氏題旌册年十九夫卒翁姑貧病氏紡績供膳人稱其孝守節四十八年朱玉文妻蔡氏題旌册年二十六夫卒守節五十二年費興仁妻金氏題旌册年二十九夫亡撫前妻子如出教以成立守節四十五年以上旨建八氏俱雍正三年具題奉坊旌表蔡新楘妻韓氏題旌册年二十夫亡堅矢不二後姑逼之嫁迎婚者至門氏潛自縊死雍旨建正四年具題奉坊旌表蔡雲衢妻唐氏題旌册年二十一夫卒無子立繼承祧守節四十七年雍正六年具題奉旨建坊旌表楊貞女題旌册楊元佺女許字沈純未婚純卒女年二十二聞訃投繯以救蘇遂赴沈守志事舅姑盡孝撫姪為嗣守節至四十二歲卒雍正八年具題奉旨建坊旌表蔡啓緒妻張氏題旌册年二十二而寡前妻遺子三人俱幼啓緒彌留之際指諸孤為囑氏即引簪自剔一目血淋漓以示不二卒能撫訓有成守節二十九年而卒沈完璧妻戴氏題旌册年二十八而寡遺孤及兩女俱幼上有兩世末葬氏力圖窀穸以竟夫志訓子為諸生女亦有歸守節三十年而卒戴辨妻陳氏題旌册年二十一而寡撫六月孤子成立至老足不出庭面無喜色守節五十四年而卒陳亮采妻童氏題旌册年二十五而寡孤僅四齡遺腹生一女氏藉針紉紡績以撫訓成立守節四十八年而卒沈士璸妻蔡氏題旌册年二十一而寡無子立姪為後舅姑殁伯叔不能襄事氏竭蹶殯殮營窀穸旁祔其夫雙塜並峙子長婚配夫婦俱夭遺子女各一氏又撫之守節四十一年胡志朂妻吳氏題旌册年二十九而寡遺三男一女教以義方俱有成立先是氏父夢日早喪母嚴青年守志至是子媳繼夭無所依氏迎養于家三十餘年殁則與父合葬守節四十一年胡承裕妻楊氏題旌册年二十五而寡翁繼殁姑病癱瘓卧牀十餘年氏侍奉湯藥歷久不懈又遭祝融之厄歷盡艱辛卒能撫子成立守節三十三年以上七氏俱雍正九年具題奉旨建坊旌表髙盛宗妻孫氏題旌册年二十九而寡遺孤二孀姑繼殁氏連舉兩喪力營窀穸守節三旨建十一年雍正十年具題奉坊旌表姚以誠妻張氏題旌册年二十四夫亡因懷孕七月勉進飲食果得一子翁老子幼隻身撑持門戶豐儉得宜親黨中有死喪疾病及貧不能自存者必盡力周恤雖典鬻衣飾亦所不惜守旨建節二十四年雍正十一年具題奉坊旌表髙永嘉妻施氏題旌册年二十二夫卒太公舅姑相繼殁氏以隻身經營四喪鬻衣飾不足則輾轉稱貸家益貧窘終身敝衣百結晝夜紡績完兒女嫁娶守節五十二年楊天瑞妻潘氏題旌册年十九夫亡遺腹生子事姑先意承志年九十猶在堂也宗黨以貧乏來告者雖處窶乏不吝周急訓子以義方守節三十三年以上二氏俱雍正十三年具題候旌王法妻沈氏舊浙江通志年二十順治間寇亂匿林莽間為寇所迫以手格刃奔河而死吳允培妻沈氏德清縣志年十八歸吳順治初被寇氏行避中途遇盜奔于河盜以弓絃扣其頸氏遂縱入深淵而死沈元復妻徐氏德清縣志適沈一年夫死無子舅姑皆亡家貧日鬻女紅自給常終日不舉火或歆以富室諷之再嫁者憤而呼天齧指以誓至順治辛丑家貧日甚家人謀移其守婦微聞之為不語者竟日母窺其意與共寢是夕伺母睡熟從窗牖躍出投入清潭而死沈日煥妻計氏德清縣志年十九生子半齡日煥死上無姑嫜中鮮兄弟歷遭兵荒食止粳粃固窮矢節年七十而卒徐士敏妻戚氏德清縣志年二十歸徐甫半載夫死以紡績所入奉舅姑舅姑殁躬為營葬飢寒因苦極孀居之慘歷五十八年談嘉期妻沈氏德清縣志嘉期死氏年十八遺孤可範家業零落薪水不支氏備極艱苦卒使遺孤成立朱𢎞緒妻蔡氏德清縣志年十八贅𢎞緒為壻甫三載𢎞緒死姑嫜亦逝父母繼殁孑身無依績絍自給或竟日不能得食親族間有饋遺拒不納清操五十餘年忍餓而死沈貞女德清縣志許字蔡啓齊年十七啓齊夭矢不再字遂赴其喪至則翁殁髽髮扱袵執婦喪哭泣如禮死與啓齊同厝焉蔡葉璥妻夏氏沈熙績妻黃氏薑應璧妻嚴氏李惟義妻陳氏姚應珍妻陸氏蔡慎德妻嚴氏蔡冠英妻許氏徐行妻孫氏蔡泮妻俞氏徐文烺妻吳氏蔡祚顯妻陳氏吳壇妻嵇氏吳從禮妻夏氏鄭善隆妻吳氏吳寅妻顔氏沈㺾妻卞氏武康縣明蔡孝女西吳里語天順間常隨母入山採桑有虎突至攫其母孝女即挺身扳樹枝格鬬行三百餘步女益奮擊虎舍其母傷女其血上噴髙丈許竹葉盡赤虎亦舍女而去尋卒孝女家方飼蠶三日悉成繭鄉里以為孝感所致丁久妻金氏武康縣志年十九而夫亡遺腹三月生子坎撫育顧復獨守一樓足不踰閾沈氏二女武康縣志沈茂程女長許聘于盛未婚而盛夭女時年十九守志不嫁父母欲奪贅章姓者女聞絶食死次適丁思孝半載夫死臨葬求廣其穴不得請遂斷指以矢靡他撫伯氏子為嗣人稱一門雙烈朱子明妻韓氏武康縣志年二十夫死食貧荼苦有勸之嫁者曰餓死事小奈何以我敗儒家風乎竟以夀終徐大成妻張氏武康縣志年二十一而寡氷霜守志女紅歷四十載不惰撫子成人至六十歲而卒國朝仰旭妻韋氏題旌册年二十四而寡孝事舅姑守節六十餘年康熙五十八年具題奉旨建坊旌表張禹鼎妻夏氏題旌册安吉人年二十適禹鼎未逾月禹鼎亡旁無伯叔氏慮翁絶後泣勸置妾貧無資氏乃罄鬻奩具為翁納妾生子時翁年六十六遂名雙六長而多男氏之功也雍正旨建四年具題奉坊旌表徐景明妻何氏題旌册年十九夫卒事舅姑先意承志撫子及孫備嘗荼苦守節六十三旨建年雍正六年具題奉坊旌表徐振聲妻沈氏題旌册年二十三夫亡無子家貧甚鬻針指自給後依叔嬸以居躬操井旨建臼撫諸姪如子守節三十五年雍正七年具題奉坊旌表闕妻施氏題旌册年二十八而寡翁老子幼氏勤蠶績鬻針指以度日翁殁喪葬中禮氏闕節年邁無嗣氏迎養于家殁為合葬人稱其孝守闕十八年而卒雍正九年具題奉旨建坊旌表胡濟熙妻張氏題旌册年二十五而寡事姑撫子守節四十八年胡國模妻沈氏題旌册年二十七而寡事姑撫子守節三十八年以上二氏俱雍正十旨建年具題奉坊旌表汪文斗妻程氏題旌册年十九適文斗生子女各一舅與夫同時染病氏侍湯藥者五閲月舅殁夫病益篤氏預藏裙刃欲自裁夫覺之指所抱子曰爾死是藐諸者誰為乳哺乎乃不死夫卒時氏年二十七事姑孝教子不為姑息守節四十七年雍正十二年具題奉旨建坊旌表趙秉鏻妻葉氏舊浙江通志年二十九秉鏻殁子甫六歲氏誓死以守延師訓子姑疾割股以進年六十終安吉州宋潘師仲妻朱氏沈與求朱夫人墓志安吉人配師仲生子曰已曰莘曰蕡潘卒時夫人盛年既終喪宜改適聞之慟絶自誓弗許三子稍長即招聘四方知名士館之門下授以儒術蕡莘相次中第歸拜堂下夫人疾已侵攝衣強起一視之歎曰吾婺矛牙居三十年天卒相吾二子成名吾死何憾疇昔嗜內典因索其書誦之彌月忽若有得默然宴坐而逝年五十三元朱甲妻郎氏元史本傳朱仕浙東以郎氏從至元間朱歿郎護喪還至玉山里留居避盜勢家栁氏欲強聘之郎誓不從夜棄裝奉柩遁栁邀之中道復死拒得免家居養姑甚謹姑嘗病郎禱天刲股肉進啖而愈後姑喪以哀聞大德年旌明郎理妻沙氏續文獻通考洪武中從理官京師理以諫死氏曰夫為忠臣妾獨不得為烈婦乎遂自經賜祭馳驛歸葬李榮妻章氏嘉靖安吉州志年二十八夫死葬畢父母欲奪其志章以死誓養族子為嗣元末兵亂備遭艱苦志操益確洪武間旌表至永樂十年卒年一百二歲徐圭妻范氏𢎞治湖州府志名瓊英年二十三夫死族人欲奪其志乃截髮以誓成化間旌表吳忠妻王氏續文獻通考家甚貧正德初夫死婦無依有欲收之者婦不應乃為麥飯瘞夫塜前痛哭良久以草簀裹身自沈溪死陳滿妻都氏萬歷湖州府志幼即割股愈母疾父嘗傷足生蛆輒齧蛆吞之及長歸滿滿死都年十九撫其孤良謨才十月備歷艱苦年五十六卒嘉靖間旌表路烈女嘉靖安吉州志梅溪路奇女年二十美姿容其夫貌甚惡且多病有富民見而恱之欲買為妾厚賂其父令諭意女知勢不可拒佯許之比來迎女曰少緩須臾當整容以行乃入卧內自經衆怪其久不出視之則死矣李茂妻髙氏舊浙江通志茂死髙買棺葬之遂縊于墓側章鑑妻何氏嘉靖安吉州志年二十八鑑死方乳一女父母憐其無子欲奪其志乃令老嫗微示其意氏詈而逐之無何母令其子來言又拒之逾年母自往勸何持刀欲刎母懼止之自是不復言年八十一而終章增奴嘉靖安吉州志章敏二女許字薑氏子未歸而薑亡增奴時年十八矢死不嫁或勸之增奴曰吾心許久矣焉敢有二父母知其不可奪不復言家居至老而卒張省侯妻趙氏安吉州志歸二載省侯亡氏時年十九遺一子復以瘖廢族之無良者欲奪其志氏秉志屹然撫護瘖子雖多方誘之卒不能奪後得孫四人卒年九十四趙日泓妻楊氏安吉州志年十七嫁日泓甫二月日泓為怨家所斃氏誓死報之寃竟以雪未幾父母欲奪其志氏固守不從年五十三無疾而逝郎童四妻潘氏金六妻郎氏莫文會妻朱氏徐學經妻湯氏郎鳳岐妻吳氏國朝金楣妻歸氏題旌册年十七結褵甫二載而夫亡撫襁褓姪為子不育復繼幼姪為嗣事嫡庶兩姑備極孝養姒顔氏亦相繼早寡氏朂以大義同居守志子長娶婦令其服賈治生至于生孫而兩姑始殁喪葬盡禮苦節三十九年金廷槐妻顔氏題旌册年二十四夫亡無子止二女撫三歲姪為子鞠育教導長為婚娶媳又亡復為續娶夫有兄五人不能葬父母棺久暴露氏鬻其室之半力營窀穸尤為女子中所難能者守節四十九年具題奉以上二氏俱雍正十二年旨建坊旌表童道行妻邵氏安吉州志道行亡邵年僅十七家貧無後父母欲嫁之邵聞號哭投繯姑救之得免堅貞四十餘載卒黃中色妻胡氏舊浙江通志中色殁遺子未期舅姑欲奪其志氏截髮毁容為夫營窀穸虛其一以自待示無二志徐朝聘妻張氏安吉州志歸徐五年朝聘卒家計蕭然氏篤志苦守子熙浸長令就學一褚一墨悉以辟纑取給云張慎衍妻錢氏安吉州志慎衍死家貧甚子福慶甫襁褓氏矢志不二後為子娶養媳凌氏年方十四時值飢饉母子不能自存或謀鬻其媳媳誓死不更奉侍尤謹孝豐縣明吳七妻施氏嘉靖安吉州志吳卒施年二十一自誓守節服除父母憫其早寡無子欲改嫁之不從年七十一卒吳祥九妻沈氏歸有光沈節婦傳歸吳時年十六間歲祥九病劇婦割股以進不愈祥九死婦每哭輒死復生比葬哭泣如初殯時久之父母謀奪其志即引刀截髮自誓居三日忽晨起出户走數里之祥九墓山深無人多虎狼獨居塜間哭不絶聲舅姑從求得之乃相謂曰始謂婦少年難守故計令他適今其志如此殆不可強因為置後遂安之祥九與其弟有分婦獨取田數𤱔才足自贍曰叔子衆吾不可以多取舅姑死喪之六年如禮蓋年十八而寡至七十二而終沈能女嘉靖安吉州志京軍沈能之女生營中名阿治母死父鞠之攜歸原籍許施澄未嫁時年二十三父當復營不以女行又不以歸施女請于父不應明日復請父曰吾三年當復歸以汝贅壻女曰兒豈謂此顧家無主者異時萬一罹謗兒雖死父且疑之不如今日引決以潔吾身入厨舉刃自刎妹奪之復以手抉其喉而死髙季六妻吳氏孝豐縣志年二十四而寡矢心不二繼姑欲嫁之婦慟哭抱石將自沈姑止之以貞烈聞王氏二節孝豐縣志楊氏王萬妻年二十三夫亡守節足迹不踰戶外一子希賢早世婦章氏誓奉姑守志楊曰汝年方艾奈何以我纍汝不如早嫁章泣曰姑所仗惟一媳媳去姑復誰托不如同死為一處鬼姑媳抱持而哭楊卒章勉襄喪事畢哀毁踰月而卒許積妻朱氏孝豐縣志年十九夫亡家貧遺腹子六月氏誓死不嫁姑病割股救之隆慶年旌表許鳴周妻濮陽氏孝豐縣志年二十一夫亡有羅姓者聘之氏即斷髮截指抱棺嘔血竟不能強姑疾篤割股療之即愈子嘉謨課訓成立至七十七歲卒章文煒妻吳氏孝豐縣志年十九而寡翁姑勸其嫁氏咬指斷髮誓死不從後侍孀姑竭力定省撫繼子盡義方自始至終足不出廬王元旭妻郎氏孝豐縣志夫卒時年十七遺腹生女不舉撫前妻章氏二子一女長子志容娶諸氏生二子容亦早世氏與媳苦志撫字先後四十餘年如一日施之華妻吳氏孝豐縣志夫亡父母因氏年艾勸令改適氏截髮斷指未幾扼吭而死章雲祺妻潘氏孝豐縣志夫亡氏年二十欲赴火以殉姑勸乃止未終制傷悼不已絶粒而終梅禮妻王氏邢智妻夏氏萬平妻吳氏王尚禮妻吳氏王庭妻邵氏吳棟妻徐氏吳楫妻嚴氏董可賢妻髙氏王元幹妻沈氏王學智妻柏氏章歷元妻郎氏王元溥妻李氏許昌福妻嚴氏郎文化妻吳氏王紹中妻諸氏國朝章氏二節題旌册章函履妻楊氏結褵四載夫亡撫孤鏞長亦娶楊氏生一子而鏞又亡姑媳旨建雙寡撫孤成立康熙五十九年具題奉坊旌表倪日將妻潘氏題旌册年二十七夫亡葬時欲自殉孤雛牽裾而泣乃止家業貧窘甘旨奉親而已則忍飢常終日不食教子讀書食餼于庠守節四十五年諸亢宗妻吳氏題旌册年二十八夫亡以頭觸柱流血被面幾至氣絶叔姑救蘇遂毁容守制舅姑未葬雖有伯叔氏肩為已任竭誠盡禮撫育遺孤咸有義方守節二十五年以上三氏旨建俱雍正十一年具題奉坊旌表王應蓮妻郎氏題旌册年二十九夫亡子甫二齡姑汪衰年病篤氏侍湯藥不離牀第左右姑卒喪葬盡禮子稍長教之曰吾聞寡婦之子非有見焉弗與為友能為人所友斯善矣子受教旨建奮勵能自立守節四十九年雍正十二年具題奉坊旌表許貞女孝豐縣志許有為女幼字陳國是未嫁夫亡氏年十四聞訃欲往母有難色即引刀自決母姑從之既往弔姑勸之歸氏不可易服守制預營壙室誓以終身繼姪為後弗克嗣家愈落以女紅自給孑立五十餘年以節終順治間知縣李憲為立石表墓諸貞女孝豐縣志諸元聲女受許昌爵聘未婚而夫亡父母方别議氏偵得之遂抵夫家至柩前卒哭易服守制父母駭愕往迓之氏以死訣曰兒不得事父母矣飲水茹藥竟以節終浙江通志卷二百七
