body:
  text: 浙江通志卷一百六十一人物一名臣四台州府宋陳公輔宋史本傳字國佐臨海人政和三年上舍及第調平江府教授朱勔方嬖幸當宫者奴事之公輔絶不與交勔有兄喪諸生欲往弔公輔不豫告勔不悅諷權要移越州纍遷權應天府少尹除祕書郎擢右司諌論蔡京父子懷姦誤國又奏朱勔罪惡時有指公輔為李綱之黨鼓倡士庶伏闕者公輔自列因辭位後陳三事語觸時宰遂斥監全州稅高宗即位召還除吏部員外郎疏言今日之禍實由公卿大夫無氣節忠義非王安石學術壞之耶議者謂安石政事雖不善學術尚可取臣謂政事害人才學術害人心馮道事四姓八君安石乃曰道最善避難以存身使公卿大夫皆師安石之言宜其無氣節忠義也復授左司諌感知遇益罄忠鯁言正心在務學治國在用人朝廷之禍在朋黨仍乞增輪對官時有詔將駐蹕建康公輔上疏陳攻守之䇿遷尚書禮部侍郎請祠以徽猷閣待制提舉太平觀卒贈大中大夫吳芾朱子吳芾墓碑字明可仙居人紹興二年進士始為樂清尉遷祕書正字秦檜與芾有舊欲芾附之而終不能得諷言者罷之檜死乃知處州以薦除監察御史兩淮戰不利廷臣爭陳退避之計芾獨奮然曰今日之事進為上䇿退為無䇿若誤聽此大事去矣上至建康芾又言宜駐蹕以繫天下心時朝廷上下因循芾言欲求死節之士於倉卒之時不若進剛直之臣於間暇之日去歲兩淮失守望風奔潰此秦檜塞言路摧士氣之餘毒也反其道則見危授命者有人矣薦周操陳良翰良佑為御史皆以諌顯俄以集英殿修撰知婺州改知紹興鏡湖廢不治歲大飢芾為民請賑并發米募民為役民甚利之除刑部侍郎充兩浙安撫使以龍圖閣直學士致仕陳良翰宋史本傳字邦彥臨海人紹興五年進士知溫州瑞安縣吳芾薦為監察御史孝宗初除右正言金移書求故疆良翰言中原皆吾故土況唐鄧淮泗又金渝盟後以兵取之安得以故疆為言而歸之湯思退主遣小使盧仲賢李栻良翰言仲賢輕儇無恥栻自北來難信又言廟堂督府議論不同邊奏上聞皆陽唯諾而陰沮敗之萬一失事機督府安得獨任其責上矍然稱善俄李栻不敢涉淮良翰奏奪其官仲賢輒許金人疆土歲幣而還上怒欲誅之宰相請得免遂以胡昉楊由義為審議官與敵議四郡不合困辱而歸思退尚執前論正言尹穡附思退撼督府良翰為左司諌疏論思退姦邪誤國宜早罷黜孝宗曰思退前議固失然朕愛其警敏冀可效卿其置之良翰曰宰相縱無全才寧取朴實緩急猶可倚賴思退庸狡小黠大癡將誤國且警敏二字恐非明主卜相之法既退以語同列穡勃然變色明日亦請對遂罷良翰言職兩淮既撤備金大入孝宗始深悔太學生數百人伏闕乞召用良翰而斬思退等思退由是始敗良翰除右諫議大夫進給事中以敷文閣待制提舉太平興國宫召為太子詹事召對選德殿俾極陳今日所未至者良翰上疏曰仁德治之本功利治之效務本而效自至今承天意結民心任賢能退小人擇將帥收軍情擇監司吏久任皆行之有未至誠能革此八弊則仁德無纍功利自致矣上嘉歎詔兼侍講未幾以疾告老卒光宗立特諡獻肅陳騤宋史本傳字叔進臨海人紹興二十四年試春官第一纍遷守祕書少監崔淵以外戚張説進除祕書郎騤封還詞頭未幾出知贛州召還遷祕書監淳熙五年試中書舍人兼侍講同修國史以言者罷光宗受禪召試吏部侍郎紹熙二年詔陳時政得失騤疏三十條皆切時病寧宗即位知樞密院事兼參知政事吏部侍郎彭龜年論韓托胄將為國患不報請祠騤曰以閣門去經筵何以示天下托胄語人曰彭侍郎不貪好官元樞亦欲為好人耶遂詔提舉洞霄宫嘉泰三年卒贈少傅諡文簡謝深甫宋史本傳字子肅臨海人乾道二年進士調崑山丞為浙曹考官一時士望皆在選中孝宗召見深甫言今日人才激昻者急於披露或鄰於好夸剛介者果於植立或鄰於太鋭靜退簡默者寡有所合或鄰於立異故言未及酬而已齟齬事未及成而已挫抑於是趨時徇利之人專務身謀習為軟熟畏避因循茍且年除歲遷亦志通顯一有緩急莫堪倚仗臣願任使之際必察其實既悉其實則涵養之以蓄其才振作之以厲其氣栽培封植勿使沮傷上嘉納遷大理丞江東大旱擢為提舉常平講行救荒條目所全活一百六十餘萬人紹熙改元遷起居郎兼權給事中韓托胄破格轉遙郡州史深甫封還內降請罷其命右司諌鄧馹論近習左遷深甫請還馹謂不可以近習故變易諌官薑特立復詔用深甫力爭竟不得入張子仁除節度使深甫疏十一上命遂寢每禁庭燕私左右有希恩澤者上曰恐謝給事有不可耳慶元元年拜右丞相余嚞上書乞斬朱熹絶偽學且指蔡元定為偽黨深甫擲其書語同列曰朱元晦蔡季通自相與講明其學果有何罪余嚞蟣蝨臣乃敢狂妄如此當相與奏之行遣以厲其餘拜少保致仕薨諡惠正黃宜台州府志字達之天台人淳熙二年進士厯官至敷文閣待制卒贈太子少師宜在朝多所建明力排和議不為權勢所屈死之日家無餘資商飛卿宋史本傳字翬仲臨海人淳熙初登進士纍官監察御史以言事忤托胄罷為太常後改司農卿總領江東淮西軍馬錢糧金陵故有帥漕治所合戎騎二帥留鑰內侍號六司宴飲餽遺費動萬計飛卿以身率儉節縮浮苛糧餉以裕開禧中擢戶部侍郎王居安宋史本傳字資道黃巖人淳熙十四年進士為祕書丞遷著作郎兼權考功郎官帝誅韓托胄居安實贊其決翼日擢右司諌首論陳自強乞追責遠竄為朋邪誤國者之戒又劾郭倪郭僎竄嶺表天下快之繼兼侍講疏言人主公聽則治偏信則亂政事歸外朝則治歸內庭則亂如用人稍誤是一托胄死一托胄生也趙彥逾與樓鑰林大中並召居安言彥逾以趙汝愚不與同列政地遂啓托胄專政之謀汝愚之斥死彥逾之力居多陛下乃使與二人者同升不幾於薰蕕同器乎疏已具有微聞者除目夜下遷起居郎既供職即直前奏曰陛下特遷臣柱下史者豈非欲使臣不得言耶二史得直前奏事祖宗法也且臣為陛下耳目官諌紙未乾乃以忤權要徙他職不得其言則去臣不復留矣帝為改容御史中丞雷孝友論其越職奪官踰年復知太平州入對帝曰卿有用之才也權工部侍郎知隆興府初盜起郴黑風洞羅世傳為之倡於是五合六聚各以洞名其鄉並起為賊江西列城皆震朝廷憂之以居安為帥羣盜次第平始終用以賊擊賊之䇿故兵民無傷者徙鎮襄陽以言罷嘉定十五年與魏了翁同召遷工部侍郎理宗即位以敷文閣待制知福州卒贈少保杜範宋史本傳字成之黃巖人嘉定元年進士拜監察御史丞相鄭清之妄邀邉功兵民死者十數萬中外大困範率合臺論其事清之忌之改太常少卿遷祕書監拜殿中侍御史因講筵奏臣常冒耳目之寄輒忤宰相陛下以其言之不可用又從而超遷之則是臺諌之官專為仕途捷徑陛下但知崇奬臺諌為盛德而不知阻抑直言為弊政則外有好諫之名內有拒諌之實遂極言清之橫啓邊釁幾危宗社並言簽書樞密院事李鳴復與史寅午彭大雅以賄交結帝以清之潛邸舊臣鳴復未見大罪未即行範渡江而歸嘉熙四年還朝遷權吏部侍郎改禮部尚書淳祐二年擢同簽書樞密院事凡行事有得失除授有是非悉抗言無隱丞相史嵩之忌之四年遷同知樞密院事以李鳴復參知政事範去之帝遣中使召回會嵩之遭喪謀起復不果於是拜範右丞相力疾入覲上五事曰正治本肅宫闈擇人才惜名器節財用仍乞早定國本以繫人心帝命宰執各條當今利病與政事可行者範上十二事曰公用舍儲材能嚴薦舉懲贓貪專職任久任使抑僥幸重閫寄選軍實招土豪疏溝洫治邊理財未幾卒贈少傅諡清獻郭磊卿赤城新志字子竒仙居人嘉定七年進士端平初拜右正言尋擢右吏彈劾權幸無所避初理宗微時與鄞人余天錫善既即位擢至執政而人材猥劣朝論不與磊卿既劾之章凡三上天錫竟罷去史嵩之怙權不法磊卿疏已具俟召對奏之而為嵩之耳目所得亟除磊卿起居郎磊卿憤不得言徑出國門求去磊卿與徐元杰劉漢弼等號端平六君子卒諡正肅立正諌坊以旌之葉夢鼎宋史本傳字鎮之寧海人以上舍試入優等釋褐又試中書授祕書省正字遷司封員外郎進權禮部侍郎兼侍講丁大全柄國欲挽夢鼎卒辭謝之纍遷吏部尚書進簽書樞密院事丞相賈似道欲造關子罷十七十八兩界會子夢鼎以為厲民乃止罷十七界公田法行夢鼎又以為厲民故行之浙右而止進參知政事力辭引疾咸淳三年拜特進右丞相兼樞密使纍辭不許乃與似道分任利州轉運使王價嘗以言去官及死其子訴求遺澤夢鼎明其無罪似道以恩不已出罷省部吏數人榜其姓名於朝夢鼎怒曰我斷不為陳自強即求去四年册楊妃宰相無拜禮吏贊拜夢鼎以笏揮之趨出明日乞還田里詔勉留之進少保力辭疏奏願上收人心固邦本勵將帥飭州縣重賑恤扁舟徑歸瀛國公即位咨訪故老夢鼎上封事二年益王即位於閩召為少師太乙宫使航海遂行道梗不能進後二年卒元陳孚赤城新志字剛中臨海人至元中以布衣上大一統賦署上蔡書院山長擢禮部郎中副尚書梁會奉使安南詰責其世子陳日燇不庭之罪往復三書辭氣正直名重當時尋厯建德衢州兩路治中召為翰林侍制卒追封臨海郡公諡文惠明張純誠兩浙名賢録字尹誠寧海人洪武初擢江南提刑行部至婺源見黃山民病於茶鹽奏免之升監察御史與修律令定官制持議徑正中外肅然一日乞歸省高帝因令招集鄉郡之舊為方氏兵者純誠曰臣事陛下十年無絲毫惠利及鄉里今歸省而首招集鄉里子弟以為兵父老其謂臣何帝動容稱歎而止山東初定欲擇管鹽策者而難其人帝曰前張純誠奏免黃山茶稅不可邪遂以為長蘆運使未至官而卒夏迪兩浙名賢録字廷簡台州人洪武丁卯舉於鄉試政刑部授溧陽丞薦升大理左寺副廷中稱平升文選司郎中拜四川左參政時朝廷遣使採辦木植踰越歲時厲氣盛行民多橫夭迪因入覲備陳民艱得寬免仁宗即位召拜南京左副都御史詔督常州府稅先是常困於水災迪至令郡守等勘實遍召鄉之巨室諄切諭之發倉廪賑濟公私賴以給助陳祥舊浙江通志字從儉天台人永樂甲午舉人授南昌府學教授升工科給事中奉詔核諸衙倉糧綜理周密人不敢私漢庶人叛隨征有功又奉命與平江伯陳瑄選調江北軍吏垣李培言事忤旨免官祥上疏力救後以觸近侍歸杜寧舊浙江通志天台人宣德丁未進士第二厯翰林修撰侍講遷南京兵部侍郎土木之變寧與于忠肅謙建議請郕王監國社稷賴以復安者寧與有力焉居官清介人不敢犯范理獻徵録字道濟天台人宣德庚戍進士用薦知德安府隨州民數百家田為楚府護衛所占猶輸租理奏盡歸其田以最超陟福建布政使時大兵勦賊鄧茂七等理司饋餉兵皆給食民不加賦擢南工部右侍郎奏各處饋南京糧者自船抵倉多所費每米石費三斗請兵就其船人支三月之餉官取費米歲可十萬石以備賑貸從之尋轉南吏部左侍郎卒林鶚獻徵録字一鶚太平人景泰辛未進士拜監察御史當是時朝廷方重臺諌一時言事之臣捃托過實鶚獨持大體略細故有不言言必當其實英廟復辟擢知鎮江舉偏補弊凡前政之廢弛者次第興之漕河經孟瀆頗險言者請鑿河自七里港引金山上流通丹陽以避之巡撫主其議鶚以其迂遠多石且壞民田廬甚多言於大臣請按京口閘甘露壩故迹因而浚之春夏以閘秋冬以壩則道里近而功力省從之廉憲江西多所平反嘗以歲飢奏蠲恆賦十五萬石遏嶺南洞寇不使入境厯升刑部右侍郎罪無大小必加研審務得其情合於法而後已故獄經鶚所決咸稱無寃夏塤獻徵録字宗成天台人景泰進士為御史出按廣西除姦貪通錢弊民皆便之尋厯江西中貴人葉達怙勢衆莫敢攖塤纍章劾之削其權成化初擢右副都御史巡撫四川川歲多劇寇塤立互知會捕法賊得以不熾引病歸魯崇志分省人物考字懋功天台人景泰甲戍進士授吏科給事中彈擊不避權要天順初武臣曹欽跋扈崇志適待漏闕下即馳馬與一偏裨格鬭大軍尋亦合而曹就誅升南京太僕寺少卿成化癸巳升應天府尹先是七邑民阻飢逋賦數萬石為勸貸以代之輸而賑其貧者中人王敬怙勢以鹽二萬引懇鬻規重利厲色拒之秩滿加正二品祿仍掌府事終於位黃孔昭吾學編名曜以字行太平人天順四年進士為屯田主事升文選郎中持銓清慎汲汲以人才為重常曰國家之用才猶農之積粟粟積於豐年乃可以濟飢才儲於平時乃可以濟事頃自人矯激沽名以閉門謝客為高天下人才何由知之公退客至輒見詢訪有得必書於册隨其地望參之輿論薦用各當其才或因勢家干請欲私用其人輒力言不可升右通政南工部侍郎卒嘉靖中贈禮部尚書諡文毅子俌亦為文選郎中俌子綰從張桂後論大禮厯禮部尚書余鐖臨海縣志字懋器成化乙未進士知崑山縣邑瀕江多水患鐖為設法疏築事不勞而集為政舉大要民甚德之擢監察御史巡廣右地多瘴毒按部之日父老遮道請勿遍厯鐖曰吾不忍慮土瘴之自病而坐視人瘴之病民也因出瘴説以遺之所至安插流亡招徠狼兵多為效用梧柳諸寨斂迹地方賴以敉寧事竣還京以疾卒陳世良分省人物考字崇之臨海人成化丁未進士授樂安令補南和四方流民歸之者千餘家召為御史彈糾不畏強禦時逆瑾干政竄逐忠良世良抗疏言之為所忌遷南京大理寺丞未幾中以事罰贖米三百餘石瑾敗擢大理少卿拜右僉都御史兼管操江憲度振肅時倚為重適流賊猖獗悉心防禦朝夕申號令刻期督戰所至克捷屢疏乞休得請歸起應天府尹未任卒夏鍭兩浙名賢録字德樹天台人成化丁未進士會主事李文祥庶吉士鄒智御史湯鼐等以論列大臣言直得罪鍭抗章論救并劾大臣詔逮錦衣衛獄推治無所得釋送銓曹謝病歸𢎞治十四年復起赴選自台至輦下數千里間見百姓流離科差繁重乃備述其狀以疏進不報久之當受職當局者忌其剛鯁不欲置近要除南京大理寺評事守備內臣違例準受民詞即論奏削其權軍民稱快以母老乞養歸王啓獻徵録字景昭黃巖人成化丁未進士授霍邱知縣擢監察御史言皇親張鶴齡家奴生事及守備內官董讓不法升江西按察僉事進副使以事觸怒劉瑾降廣西容縣知縣瑾敗復為四川蓬州知州厯升江西右布政使奏罷寧濠私貢新茶新笋數事時寧濠威焰方熾人皆以為難尋以右副都御史巡撫雲南輯綏有方升刑部右侍郎王純舊浙江通志仙居人成化辛丑進士授工部主事會王恕致仕純言恕社稷臣無容輕棄上怒命詔獄隨謫思南推官𢎞治元年吏部主事儲瓘言王純以直言殉國乞置之風紀論思之地與其旋求敢諌之士不若先用已試之人報可當事忌其戅乃外擢湖廣督學純較士先行誼抑浮競士類翕然向風未竟厥用而卒王爌獻徵録字存約黃巖人𢎞治壬戍進士授太常博士擢工科給事正德初轉刑科時中官多橫御史林有年僉事韓邦竒咸以駕帖被逮爌言錦衣乃扈從爪牙之寄駕帖非尋常勾攝之文今不問巨細虛實一概施之非盛事也謫惠州府推官嘉靖改元擢應天府尹疏數十上如議罷京尹種馬議發內帑絲織神帛議輕荒稅蘇流亡議料田出賦均貧富皆不避嫌怨為之升南刑部侍郎擢右都御史舊內守備進表取御史兩人監禮爌曰中人行禮奈何輕用朝廷耳目官乎執不與奉表北上大學士夏言尊貴京堂官率多隅坐爌獨據正席贄惟一幣夏不悅因乞骸歸應良台州府志字元忠仙居人正德戊辰進士辛未廷試選庶吉士時劉瑾雖誅閹焰仍熾遂解組歸世宗御極用臺諫交薦起為侍從會議大禮忤旨杖闕下尋奉使册唐王悉却贐餽出督學山東升廣西參政齎表北上張桂二老欲招致之密曰北司成正以遲公良正色曰朝廷官爵奈何私許人乃外升廣東右布政無何致仕歸遺文曰間存集余寬舊浙江通志字仲栗臨海人正德辛未進士厯文選郎中嘉靖甲申翰林部寺臺諌諸臣力爭興獻帝興國太后本生二字不宜削於金水橋南伏哭帝命司禮監諭退不去大怒命録諸姓名收繫為首者八人於獄寬與焉次日命拷訊謫寬戍海南丙戍以御史謝汝儀言放歸卒於家隆慶改元褒録先朝直言諸臣復寬職贈大理寺卿陳器台州府志字德器臨海人正德甲戍進士授淮安推官持法不畏權貴郡有鎮守總戎丞以下咸以屬禮見器力爭於督撫獨與抗禮遂著為令升刑部主事多所平反會武宗巡遊儲二未定器抗章奏請言甚激切尋以終養回里張孚敬秉政器服闋竟不赴補年七十五卒吳廉獻徴録字介夫仙居人正德甲戍進士授禮科給事中時郭勛張鶴齡以勳戚貴幸廉首論二家驕蹇武廟巡行西北邊廉皆同官泣留跪午門外三日正德末儲二未建逆奄畢鎮表宸濠孝行於朝冀召入亷據法駁還事遂寢未幾濠果以叛誅又請罷江西鎮守轉戶科右給事中世廟嗣統首條四事曰正君心開言路時經筵近儒臣上嘉納之轉禮科左給事出為四川參議按蜀蠲害興利糾重臣之使蜀殃民者性耿介不能逐時好為俯仰三疏乞歸何贊舊浙江通志黃巖人嘉靖壬辰進士授行人擢監察御史上疏乞賑山西飢民全活甚衆按河東鹺政解池鹵源久嗇公私告病贊至齋沐為文禱於神數日凝液如初巡厯期滿所司循故事以羡鏹進贊斥去歸諸公安南之亂以翊贊征討功賜金帛錫燕例得遷卿佐以忤嚴嵩轉福建按察副使趙大佑分省人物考號方崖太平人嘉靖乙未進士為鳯陽推官即有聲拜御史按貴州宣慰萬銓所為多不法大佑械其黨指揮張仁李木斃諸獄將遂按銓巡撫劉某納銓賄移文諸司指仁木之死為召釁以脅之大佑曰人臣茍利社稷死生以之吾何愛一身哉更遣吏按銓反狀銓知不可撼即囚服出就理比還條八事詔下貴州編諸令甲厯刑部侍郎奉命勘伊庶人嚴嵩屬大佑寬之至則盡發庶人所為僭擬及事之與祖訓違者嵩怒甚出大佑掌南臺轉南刑部尚書有寃獄逮繫數年大佑曰死重辟也法官固知其寃不為白乎遂以疑讞改南兵部尚書卒王宗沐臨海縣志字新甫嘉靖甲辰進士授刑部主事升江西提學副使調廣西右布政丁父憂除服補山東會膠河淤塞朝廷遣給事中相視開鑿宗沐條議海運之法十二利詳考顛末如指掌擢右副都御史總督漕運兼巡撫鳯陽先是屢年運路不通宗沐飭法振弊首申全單之法舊例各州縣每年應運糧米由運糧把總分𣲖而各衛各幫水次有難易高下之分官旗吏書因而作弊自全單設凡某幫運某州縣米悉由漕司派定每幫各給一紙遵行陋規頓革又自淮安至清江閘築為雙堤高壯若城墉西增高家舊堰以遏橫潰東濬澗河以泄霖積每大水漲溢隄以內民廬安堵升工部侍郎改刑部卒諡襄裕吳時來兩浙名賢録字惟修仙居人嘉靖癸丑進士授松江推官倭犯境時來攝城守雨甚城崩十餘丈時來以強弩數十人扼其衝急興版築三日而城完賊知有備棄而北走召為刑科給事中時嚴嵩父子橫甚時來疏其不法事逮詔獄廷杖得不死遣戍嶺表隆慶改元起官洊晉南京右都御史致仕盧明諏續獻徵録字君發黃巖人萬厯丙戌進士授太常博士擢刑科給事中內侍頓隆犯罪已下部議尋見原滇南歲進礦金初議量減尋復故明諏並疏參駁忤中官意因給假歸尋補戶科右給事倭陷朝鮮力陳石星議欵之失又言經略並建事鮮責成後所言皆驗卒年四十二天啓癸亥追論遺直贈光祿卿應朝卿舊浙江通志字行叔仙居人萬厯己丑進士授建安令課最調繁晉江擢山西道御史巡按貴州轉兩淮巡鹽兩淮鹽賦半天下弊政較他處倍多朝卿湔剔殆盡商困得蘇復命巡按湖廣風裁益著以母老歸省為隙者所議左遷永平道終按察司使吳執御黃巖縣志字君駕天啓壬戌進士任濟南推官德州建魏忠賢祠獨不往崇禎庚午授刑科給事中時有加派捐助搜括之議執御疏曰理財加派不得已而用之未有年餘不罷者捐助搜括二者尤難為訓不聽又論沿邊諸邑宜選補賢守令以本地錢糧訓練土著此法一行餉不取償於司農兵不待援於戍卒計無便於此者亦不聽復疏指首輔周延儒攬權壅蔽私其鄉人塘報章奏一字涉邊疆輒借軍機密封下部明畏廷臣摘發短長他日敗可以捷聞功可以罪按也凡三上俱留中帝責其多言而戅尋釋之家居謝客年四十六卒金華府唐馮宿唐書本傳字拱之婺州東陽人貞元中與弟定並擢進士第長慶時進知制誥厯工部刑部二侍郎修格後敕三十篇行於世擢東川節度使完城郛增兵械涪水數壞民廬舍宿修利防庸一方便賴疾革將斷重刑家人請宥之宿曰命之修短天也撓法以求祐吾不敢卒諡曰懿馮定唐書本傳字介夫偉儀觀與兄宿齊名人以方漢二馮第進士異等厯國子司業遷太常少卿文宗嘗詔開元霓裳舞參以雲韶肄於庭定部諸工立縣間端凝若植帝異之遷諌議大夫是歲訓注敗多誅公卿中外危惴及改元天子御前殿仇士良請以神䇿仗衛殿門定力爭罷之鄭覃兼太子太師上日欲會尚書省定據禮當集詹事府詔可論者多其正以左散騎常侍致仕卒諡曰節初源寂使新羅其國人傳定黑水碑畫鶴記韋休符使西番所館寫定商山記於屏其名播如此宋胡則金華先民傳字子正永康人端拱己丑進士釋褐調許田尉以幹辦聞改著作郎僉書貝州觀察判官會遣使省冗役檄則行河北道凡去籍者十萬餘民用休息遷屯田員外郎提舉江南路銀銅場鑄錢監得吏所匿銅數萬斤咸懼且死則曰吾豈重貨而輕數人之生耶籍為羡餘不之罪轉戶部郎中遷太常少卿初丁謂客許田則待之甚厚及謂為執政雅故之情不絶謂徙朱崖坐纍謫知福州有官田數百頃已佃為民業計臣上言請鬻之責其估三十萬貫民不勝弊則章三上竟得報減其直之半進給事中入權三司使不以尅下為功時朝廷方以兩京陜西𣙜鹽病民議改通商有司憚於改作則首請如詔事遂行進刑部侍郎知杭州加兵部侍郎致仕卒則嘗奏免衢婺二州身丁錢民懷其德戶皆立像祠之滕元發宋史本傳字達道東陽人舉進士授大理評事通判湖州召試為集賢校理同修起居注英宗書其姓名藏禁中未及用神宗即位召問治亂之道對曰治亂之道如黑白東西所以變色易位者朋黨汨之也神宗曰卿知君子小人之黨乎曰君子無黨譬之草木綢繆相附者必蔓草非松柏也神宗以為名言進知制誥拜御史中丞种諤擅築綏州發諸路兵剽掠夏人元發疏言諒祚已納欵不當失信邊隙一開兵連民疲必為內憂又宰相以其子判鼓院諌官謂不可神宗曰鼓院傳達而已何與於事元發曰人有訴宰相使其子達之可乎神宗悟為罷之河北地大震命元發為安撫使時城舍多圮吏民懼壓皆幄寢茇舍元發獨處屋下曰屋摧民死吾當以身同之瘞死食飢除田租修隄障察貪殘督盜賊北道遂安除翰林學士知開封府王安石方立新法元法以翰林侍讀學士出知定州初入郡言新法之害曰臣始以意度其不可耳既為郡乃親見之歲旱求言又疏奏新法害民皆不聽厯知齊鄧二州哲宗登位除龍圖閣直學士知鄆州時淮南京東飢元發慮流民且至將蒸為癘疫先度城外廢營地召諭富室使出力為席屋一夕成二千五百間井竈器用皆具民至如歸所全活五萬徙真定又徙太原治邊凛然威行西北號稱名帥以龍圖閣學士知揚州未至而卒贈左銀青光祿大夫諡章敏宗澤宋史本傳字汝霖義烏人登元祐六年進士第調龍遊令民未知學澤為建庠序設師儒講論經術風俗一變通判登州境內官田數百頃皆不毛之地歲輸萬餘緡率橫取於民澤奏免之朝廷遣使由登州結女真盟海上謀夾攻契丹澤語所親曰天下自是多事矣退居東陽結廬山谷間靖康元年中丞陳過庭等列薦假宗正少卿充和議使澤曰是行不生還矣或問之澤曰敵能悔過退師固善否則安能折節北庭以辱君命乎議者謂澤剛方不屈恐害和議上不遣命知磁州時太原失守官兩河者率托故不行澤曰食祿而避難不可也即日單騎就道磁經敵騎蹂躪之餘人民逃徙帑廪枵然澤至繕城壁浚隍池治器械募義勇為固守計上言邢洺磁趙相五州各蓄精兵二萬人敵攻一郡則四郡皆應是一郡之兵常有十萬人上嘉之除河北義兵都總管康王再使金行至磁澤迎謁曰肅王一去不返今敵又詭辭以致大王願勿行王遂回相州冇詔以澤為副元帥從王起兵入援時康王開大元帥府檄兵會大名澤履氷渡河見王謂京城受圍日久入援不可緩會曹輔齎蠟封欽宗手詔至自京師言和議可成澤曰金人欲欵我師耳君父之望入援何啻飢渴宜急引軍直趨澶淵次第進兵以解京城之圍萬一敵有異謀則吾兵已在城下汪伯彥等難之勸王遣澤先行自是澤不得預府中謀議二年正月澤至開德十三戰皆捷康王承制以澤為徽猷閣待制時金人逼二帝北行澤聞即提軍趨滑趨黎陽至大名欲徑渡河據金人歸路邀還二帝而勤王之兵卒無一至者又聞張邦昌僭位欲先行誅討會得大元帥府書約移師近都按甲觀變澤復書于王因纍表勸進王即帝位於南京澤入見涕泗交頤陳興復大計上欲留澤黃潛善等沮之除龍圖閣學士知襄陽府改知青州開封尹闕李綱言綏復舊都非澤不可尋徙知開封府時敵騎留屯河上金鼓之聲日夕相聞而京城樓櫓盡廢兵民雜居盜賊縱橫澤至首捕誅舍賊者數人下令曰為盜者贓無輕重並從軍法由是盜賊屏息民賴以安王善者河東巨寇也擁衆七十萬楊進號沒角牛兵三十萬王再興李貴王大郎等各擁衆數萬往來京西淮南河南北侵掠為患澤悉招降上疏請上還京除延康殿學士京城留守兼開封尹澤乃渡河約諸將共議收復而於京城四壁各置使以領招集之兵又據形勢立堅壁二十四所於城外沿河鱗次為連珠寨連結河東河北山水寨忠義民兵於是陜東西諸路人馬咸願聽澤節制秉義郎嶽飛犯法將刑澤一見竒之以五百騎授飛使立功贖罪飛大敗金人而還升飛為統制飛由是知名詔遣官迎奉六宫往金陵澤上疏言南幸之非金將烏珠渡河謀攻汴京諸將請先斷河梁嚴兵自固澤笑曰去冬金騎直來正坐斷河梁耳乃命部將劉衍趨滑劉達趨鄭以分敵勢戒諸將竭力保護河梁以俟大兵之集金人聞之夜斷河梁遁去自是不復犯東京王䇿者本遼酋為金將往來河上澤擒之解其縛坐堂上因問敵國虛實盡得其詳遂決大舉之計召諸將謂曰汝等有忠義心當協謀勦敵期還二聖以立大功言訖泣下諸將皆泣聽命金人戰不利悉引兵去澤威聲日著北方聞其名常尊憚之對南人言必曰宗爺爺澤前後請還京二十餘奏每為潛善等所抑憂憤成疾疽發於背諸將入問疾澤曰吾以二帝蒙塵積憤至此汝等能殱敵則我死無恨衆皆流涕曰敢不盡力諸將出澤嘆曰出師未捷身先死長使英雄淚滿襟翼日風雨晝晦澤無一語及家事但呼過河者三而薨都人號慟遺表猶贊上還京贈觀文殿學士通議大夫諡忠簡子穎居戎幕素得士心澤薨都人請以穎繼父任會朝廷已命杜充留守以穎為判官充反澤所為穎屢爭之不從乃請持服歸官終兵部郎中潘良貴宋史本傳字子賤婺州金華人以上舍釋褐為辟雍博士遷祕書郎時宰相蔡京與其子攸方以爵祿釣知名士親故數為京致願交意良貴正色謝絶除主客郎中尋提舉淮南東路常平靖康元年召還賜對欽宗問孰可秉鈞軸者良貴極言何栗唐恪等四人不可用他日必誤社稷語徹於外當國者指為狂率黜監信州汭口排岸高宗即位召為左司諌請封宗室賢者於山東河北以壯國體巡幸維揚養兵威以圖恢復黃潛善汪伯彥惡其言改除工部良貴以不得其言求去主管明道宫越數年除考功郎遷左司宰相吕頤浩謂良貴曰旦夕相引入兩省良貴正色對曰親老方欲乞外兩省官非良貴可為也退語人曰宰相進退一世人才何可握手密語先示私恩若士大夫受其牢籠何以立朝即日乞補外以直龍圖知嚴州起為中書舍人會戶部侍郎向子諲入見語言煩褻良貴故善子諲是日攝起居立殿上徑至榻前厲聲曰子諲以無益之談久煩聖聽子諲欲退高宗顧良貴曰是朕問之諭子諲且欵語子諲語久不止良貴叱之退者再高宗色變閣門併彈之於是良貴求去以徽猷閣待制提舉亳州明道宫李光得罪坐嘗與通書降二官卒其諌疏多焚稿僅存雜著十五卷新安朱熹為之序樓照宋史本傳字仲暉婺州永康人政和五年進士紹興六年召為左司員外明年遷起居郎言監司郡守係民甚切乞令侍從官各舉通判資序或嘗任監察御史以上可任監司郡守者一二人詔從之厯除端明殿學士簽書樞密院事命往陜西宣諭德意至長安會李世輔自夏國欲歸朝照以書招之世輔以二十人赴行在照還朝以親老求歸省許之十四年除簽書樞密院事兼權參知政事尋與祠卒諡襄靖王師心金華先民傳字與道金華人政和八年進士調海州沭陽縣尉敗劇賊宋江境上纍遷太府丞除知袁州時秦檜方用事監司郡守皆爭獻羡餘以希進師心獨取以代貧民逋租檜死召除户部侍郎上曰卿以不附秦檜故去國久朕知卿未嘗忘也遷權吏部尚書兼侍讀前後進見從容盡規者非一浙東水災充兩浙安撫使寬逋債振乏絶民不流亡乾道初以左奉議大夫致仕卒諡莊敏鄭剛中金華先民傳字亨仲金華人紹興二年進士纍遷殿中侍御史胡銓上書欲斬秦檜帝怒禍且不測剛中率同列論救銓得編置除端明殿學士四川宣撫使宣司舊治河池饋餉不繼剛中奏移治利州大開營田自階成抵秦墾土三千餘頃歲收十八萬斛蠲民間常所斂錢七百萬又即州置監鑄錢以救川引之弊先是川口屯兵十萬分𨽻三大將建節而統制官亦皆領沿邉安撫剛中請分利州為東西路東路治興元命楊政為安撫西路治興州命吳璘為安撫諸裨將領安撫者皆罷璘等皆宿將驕悍難制剛中每折之以威接之以恩無不帖服在蜀凡六年儲蓄豐積將士用命金人不敢犯秦檜見蜀富饒諷使進金三萬兩又令下米荆門剛中曰今時講和正為他時恢復計要當息民儲備為先拒之不從檜不悅召剛中還文致其罪罷職責桂陽軍居住再徙封州卒檜死追復原官諡忠愍章服金華先民傳字德文永康人紹興二年進士纍遷朝奉郎除兩浙提舉市舶公事自常俸外例所可得者一不取然對人亦不輒非前例轉朝請郎差知建州省教條寬科率與吏民相安於法守州以大治召除吏部員外郎遷侍御史上疏言淮堧瘡痍江浙飢饉邦財未裕軍政久隳此皆當今急務不宜以偃兵而置度外中官梁彥俊幹辦皇城司轉官不行臺謝服劾其廢法彥俊坐論贖會服除吏部侍郎辭免彥俊摘其章有不遜語上怒罷汀州居住在汀七年杜門觀書世念泊如得旨放還提舉太平興國宫卒葉衡宋史本傳字夢錫金華人紹興十八年進士知臨安府於潛縣徵科為期限榜縣門俾里正諭民不遣一吏而賦自足歲災蝗不入境治為諸邑最擢知常州時水潦為災衡發倉為糜以食飢者或言常平不可輕發衡曰儲蓄正備緩急可視民飢而不救耶疫大作衡單騎命醫藥自隨遍問疾苦活者甚衆除太府少卿合肥瀕湖有墟田四十里衡奏募民以耕歲可得穀數十萬蠲租稅二三年後阡陌成倣營田官私各收其半從之除戶部侍郎時鹽課大虧衡奏年來課入不增私販害之也宜自煮鹽之地為之制司火之起伏稽竈之多寡亭戶本錢以時給之鹽之委楨以時收之擇亷能吏察之私販自絶矣厯除簽書樞密院事拜參知政事衡奏二事一牧守將帥必擇才以稱其職久任以盡其材二令戶部取湖廣會子實數盡以京會立限易之從之拜右丞相兼樞密使上鋭意恢復凡將帥器械山川防守衡悉經思慮奏對畢從容賜坐講論機密或不時召對年六十二薨贈資政殿學士陳良祐宋史本傳字天與金華人紹興二十四年進士乾道三年除起居舍人遷右司諌首言會子之弊願捐內帑以紓細民之急上慨然發內府白金數萬兩換會子收銅版勿造軍民翕然除給事中遷吏部尚書時議遣北使請地良祐奏今之求地欲得河南曩歲嘗歸版圖不旋踵而又失如其不許徒費往來若其許我必邀重幣經理未定根本內虛又將隨而取之矣奏入忤旨貶瑞州居住淳熙四年起知徽州尋除敷文閣待制知建寧府林大中宋史本傳字和叔永康人紹興三十年進士光宗受禪除殿中侍御史奏言進退人才當觀其趨向之大體不當責其行事之小節又論今日之事莫大於讐恥之未復此事未就則此念不可忘時江浙四路民苦折帛和買重輸大中曰有産則有稅於稅絹而科折帛猶可言也如和買折帛則重為民害蓋自咸平馬元方建言於春預支本錢濟其乏絶至夏秋使之輸納則是先支錢而後輸絹其後則錢鹽分給又其後則直取於民今又令納折帛錢以兩縑折一縑之直大失立法初意朝廷以其言為減所輸者三歲馬大同為戶部大中劾其用法太峻章三上不報又論大理少卿宋之瑞章四上不報以言不行求去改吏部侍郎辭不拜乃除直寶謨閣朱熹貽書朝士曰聞林和叔入臺無一事不中的去國一節風義凛然當於古人中求之寧宗即位遷給事中韓托胄來謁陰請納交大中笑而却之會吏部侍郎彭龜年抗論托胄與郡大中繳奏請留龜年經筵而命托胄以外任不聽吕祖險以攻托胄謫韶州大中救之汪義端以論趙汝愚為右史大中駁之改吏部侍郎不拜以煥章閣待制知慶元府城南民田潮溢不可種大中捐公帑治石築之民不知役而蒙其利郡訛言夜有妖大中謂此必黠賊所為立捕黥之人情遂安後乞休歸屏居十二年未嘗以得喪關其心或勸大中通托胄書大中曰吾為夕郎時一言承意豈間居至今日耶客曰縱不求福盍亦免禍大中曰福不可求而得禍詎可懼而免及托胄誅即召試吏部尚書言吕祖儉彭龜年朱熹宜優加旌表其他因譏切托胄以得罪者望量其輕重而旌别之嘉定改元兼太子賔客卒諡正惠應孟明宋史本傳字仲實永康人隆興元年進士以薦為敕令所刪定官輪對首論南北通好當選將練兵常如大敵之在境次乞申嚴監司庇貪吏之禁薦舉徇私情之禁帝嘉奬久之拜大理寺丞出為福建提舉常平陛辭帝曰朕知卿愛百姓惡贓吏事有不便於民宜悉意以聞因問當世人才孟明對曰有才而不學則流為刻薄惟上之教化明取舍正使回心嚮道則成就必倍於人帝曰誠為人上者之責孟明至部具以臨遣之意咨訪之尋除浙東提點刑獄進直祕閣知靜江府兼江西經略安撫初廣西鹽易官搬為客鈔客戶無多折閲逃避遂抑配於民公私交病孟明條具驛奏除其弊禁卒朱興結侣弄兵雷化間聲勢漸長孟明遣將縛致斬之光宗即位召為吏部員外郎慶元初權吏部侍郎卒孟明以儒學奮受知人主官職未嘗幸遷韓托胄嘗遣其密客誘以諌官俾誣趙汝愚孟明不答士論以此重之楊大法金華先民傳字元範婺州武義人淳熙二年進士纍遷監察御史時四方多水旱大法疏論三事一曰民訴災傷不可疑其不實二曰減放租稅當使民被實惠三曰禁遏糴使穀粟流通尋除侍御史兼侍講乞置言事官章簿以備燕覽內侍鄧彰等指使毆人至死奏行法當自近始乞付有司以竟獄事除兵部侍郎卒贈中奉大夫武義開國男葛洪宋史本傳字容父婺州東陽人淳熙十一年進士遷工部員外郎上疏乞嚴飭將帥申覆軍實帝嘉納之纍遷工部尚書拜參知政事封東陽郡公致仕卒諡端獻杜範嘗稱其侃侃守正有大臣風章徠金華先民傳永康人淳熙甲辰進士厯官右文殿修撰時陳賈議貶道學徠與劉光祖極論道學之正光宗嘉納及趙汝愚罷相徠抗疏劾韓托胄專擅坐罷官歸寶慶間召為宗正少卿兼侍講卒贈少師王介宋史本傳字元石金華人紹興元年進士除國子録寧宗即位介上疏言陛下即位未三月䇿免宰相遷易臺諫悉出內批非治世事時韓托胄居中潛弄威福疑介詆已且其弟仰胄嘗以舊識求通介拒絶之托胄怨益深會學禁起諫大夫姚愈劾介與袁燮皆偽學之黨主管台州崇道觀托胄誅召還除國子祭酒升太子右諭德篤意輔導因事規諫遷權中書舍人繳駁不避權貴張允濟以閣職為州鈐介卦還詞頭丞相語介曰此中宫意介曰宰相而逢宫禁意向給舍而奉宰相風旨朝廷紀綱掃地矣以疾奉祠卒特贈中大夫寶章閣待制諡忠簡喬行簡宋史本傳字夀朋東陽人紹熙四年進士厯官祕書監權工部侍郎理宗即位拜參知政事時議收復三京行簡上疏曰臣不憂出師之無功而憂事力之不可繼因陳所憂者三不果從尋拜右丞相或又陳進取之計行簡奏今內外事勢可憂而不可恃者七言甚懇切師得不出嘉熙三年拜平章軍國重事四年加少師封魯國公薨贈太師諡文惠行簡厯練老成識量宏遠居官無所不言薦錢時吳如愚皆當時隱逸之賢者徐邦憲宋史本傳字文子義烏人紹熙四年進士遷祕書郎韓托胄開兵端無敢議其非者邦憲獨首言之丐外知處州陛辭力諌用兵不可太驟再歲召還言求名義以息兵莫若因建儲而肆赦借殊常之恩洗弄兵之咎托胄惡其言嗾御史徐柟擊之鐫秩罷祠托胄誅尚書倪思舉邦憲自代除權工部侍郎知臨安府丐祠知江州卒諡文肅范鍾宋史本傳字仲和蘭溪人嘉定二年進士厯遷尚書右郎官兼崇政殿説書進對帝曰仁宗時甚多事對曰仁宗始雖多事乃以憂勤致治徽宗始雖無事餘患至於今日帝悅厯遷權兵部尚書兼侍講嘉熙四年授參知政事淳祐五年特拜左丞相兼樞密使封東陽郡公鍾為相直清守法重惜名器雖無赫赫可稱而清德雅量與杜範李宗勉齊名連贈少師諡文肅李大同金華先民傳字從仲東陽人嘉定十六年進士纍遷右正言兼侍講首陳謹獨之戒上為之改容遷禮部侍郎進尚書乞祠卒大同資稟純厚神氣清和至於忠言嘉謨上裨緝熙下濟民生嘉熙端平之治大同之助為多朱元龍王闕朱左司集序字景雲義烏人嘉定十六年進士選除宗正丞兼權左司郎官宦官陳恂益求建節事下都司議元龍擬曰優異內官寵賁節鉞雖出於特恩主張國是愛惜名器必由於公論不可宰臣傳旨令改擬對曰吾職可罷筆不可改也有宗室與民訟爭田衆莫敢決元龍曰於法品官不許佃民田奈何天子屬籍之親乃爭田訟耶毅然決之時議括兩淮浮鹽元龍謂朝廷而行商賈之事廟堂而踵諸國之規使史氏書曰括浮鹽自今日始不可又兩上封事自宫禁朝廷以及百官萬民皆痛切言之先是史嵩之在督府元龍劾其殺富民王倫為非已而嵩之入相遂斥去豫祠王萬宋史本傳字處一家世婺州嘉定十六年進士差知台州事至立斷吏無所售往往改業散去民亦化之不復訟上下肅然郡以大治遷屯田員外郎擢監察御史史嵩之自江上董師入相萬首論之謂其事體迫遽氣象傾搖然當時論相之事已決疏入遷大理少卿力辭乞休特轉朝奉郎守太常少卿致仕卒嵩之罷相衆方交論其非上思萬先見親賜御札謂萬立朝謇諤古之遺直為郡亷平古之遺愛贈新會五千貫田五百畝以贍給其家馬光祖宋史本傳字華文金華人寶慶二年進士纍遷江東安撫使知建康府減租稅養鰥寡興學校禮賢才辟召僚屬皆極一時之選拜端明殿學士知江陵府去建康之民思之不已帝聞命以資政殿學士沿江制置使再知建康士女相慶光祖益思寬養民力興廢起壞知無不為蠲前逋負錢百餘萬緡魚利稅課悉罷減與民建平糴倉貯米十五萬石又為庫貯糴本二百餘萬緡補其折閲發糴常減於市價以利小民修飭武備防拓要害邊賴以安其為政寬猛適宜事存大體公田法行光祖移書賈似道言公田法非便乞不以及江東必欲行之罷光祖乃可召遷提領戶部財用兼知臨安府浙西安撫使會嵗飢榮王府積粟不發廪光祖謁王得粟活民甚多再以沿江制置江東安撫使知建康民為建祠六所咸淳三年拜參知政事五年拜知樞密院事以金紫光祿大夫致仕卒諡莊敏元吳直方宋濓吳直方行略字行可婺之浦陽人泰定使元年太師滿齊勒噶台留守灤京延入賔館教其子托克托元統二年托克托方執法中臺言於上命為江浙等處儒學提舉歷遷宣政院長史秦王巴延恃定䇿功專權自恣上深患之召托克托問計托克托謀於直方直方曰宜急黜之以謝天下托克托以親嫌辭直方曰傳有之大義滅親大夫知有朝廷耳托克托曰事不成奈何直方曰事不成天也一死復何惜即死亦不失為忠義耳托克托頓足曰吾意決矣乃入奏久之適巴延侍太子出獵柳林托克托欲發直方曰太子在軍中設挾之以生他變何以處之托克托悟急白太后傳旨趣以歸遣使持詔散遣諸軍出巴延為河南行省一反舊政民大悅上多直方協贊功召對慰諭超授集賢院侍講學士有大事必定於直方直方亦毅然以澤被斯民為己任科舉廢已久直方力言於丞相曰科舉之行家有讀書之人人讀書則自不敢為非其有繫於治道不小丞相因奏復之二浙鹽值漸增至數倍民不堪命直方為言之減其額而下其估他如楮幣銅錢相𣙜之宜有司公田多科之擾官寺建設之冗繁江南雇役之長利咸一一建白多已見諸行事後年老乞骸遂以榮祿大夫致仕明宋濓史槩字景濓號潛溪先金華人後遷浦江六歲授蒙求一日而盡受業於聞人夢吉得春秋三傳之旨兼通五經從淵穎吳萊學悉得其閫奧柳貫黃溍深器重之至正己丑薦為國史編修固辭入龍門山著書曰龍門子高帝徵入金陵問定亂大計濓以不嗜殺人對上悅除江南儒學提舉授世子經召講左氏傳濓曰春秋褒善貶惡遵而行之賞罰適中天下可定洪武二年總修元史除翰林學士知制誥兼修國史時甘露屢降上問災祥之故對曰受命不於天於其人休符不於祥於其仁遷國子司業贊善大夫上問帝王宜讀何書濓謂讀真德秀大學衍義上立取覽令人書揭兩廡壁上坐西應令講司馬遷論黃老事講畢復言曰人主能義理養性則邪説不能侵興學教民則禍亂不能作刑罰非所先也升侍講學士兼資善大夫集厯代事為辨姦録纂大明日厯倣唐貞觀政要輯成寶訓五卷上之其他禮樂律厯之制勳臣名卿焯德耀功之文並命編摩潤色每燕見詢舊章講治道甚條析至論廷臣但言其善者問否者為誰對以善者與臣友故知之否者縱有臣不知也凡命為詩文必寓忠告性謹密不泄禁中語有奏輒焚其稿除翰林學士承旨日本使奉勑求文獻百金不受上問濓對曰入朝侍從受外夷金非所以崇國體上然之致仕居青蘿山閉門著述人不見其面後以孫慎坐法安置茂州行至夔卒年七十三正德八年賜諡文憲劉辰獻徵録字伯靜金華人洪武初師下婺州辰首上謁署典籖後為湖廣道御史以謇諤聞擢知鎮江府興廢舉墜勤於其政郡有瀕江田五十餘頃歲久淪沒仍責賦於民辰請於朝除之京口閘廢舟楫不通東南漕運者轉新河江陰二港以出江多為風濤阻溺辰乃於京口至吕城百二十里作壩修閘順水勢之出入漕河源淺易涸每仰練湖以益水而湖有三斗門亦廢辰又修築之及成漕運既通而湖下之田亦稔永樂元年升江西參政至則以久雨江水泛溢九江諸郡等田皆潦檄郡邑勸富民出粟以賑飢者蠲其役以當其息官為之劵約明年償本粟由是富者樂從飢者得食南安贑州等九府荒田糧六萬石有司歲抑取於民辰以聞悉蠲其額後以同官坐事相連免歸永樂六年起為刑部左侍郎以老致仕邵玘楊士竒邵玘墓碑字以先蘭溪人永樂丙戌進士授監察御史升江西按察使先是南昌新建二縣苦上官和買長里役者供一日費家為之空玘立罷之宣德三年召為南京都察院左副都御史時南京諸司緩弛玘奉敕簡擇奏黜其不肖及庸懦者綱紀復振玘為人外肅內寬仕二十餘年所厯中外皆風憲糾劾官邪舉大體而略瑣細亷潔之操始終一轍宣德五年卒盧睿分省人物考字仲思東陽人永樂辛丑進士拜監察御史正統己巳升右僉都御史巡撫大同宣府至則嚴法令剗蠧弊節浮費廣儲蓄人賴以安辛酉改命參贊寧夏軍務增築鳴沙州興武二城列置𤇺堠十餘所益廣屯種繕甲兵校士馬以固邊備而於軍民利病可施罷者尤盡心焉升右副都御史後以病乞歸李敘金華先民傳字秉彞東陽人永樂中由鄉薦入太學宣德初試授監察御史嘗奉命録囚辨出交址俘囚三千餘人出巡淮甸首擒豪右范端操等十餘人置之獄餘皆屏迹官吏有貪墨者一切汰去中使取珍禽異獸至淮者敘陳其害民悉報罷及還朝權貴搆以事下獄會八百車里二番讐殺屢遣廷臣招撫不服朝議以為惟敘可乃左遷行人領旨往諭至則曉以禍福逆順皆聽命息兵通貢上喜復以為御史天順改元致仕歸趙艮金華先民傳字時中永康人成化己丑進士授給事中因災異條陳四事忤旨廷杖幾斃歲丙午左右請立宫媵所生二歲子為太子艮抗疏力諫止之及孝廟正位東宫請簡正人為師傅以職輔導升本科都給事中先是重臣王越被劾銜之譖於中官汪直誣以言事不謹謫四川廬山令𢎞治改元擢江西按察副使卒於官徐沂金華先民傳字希曾永康人𢎞治癸丑進士授刑科給事中時壽寧侯張鶴齡等恃恩冒法及中官李廣矯命干政沂皆抗章論之改南京工科奏罷歲取蘇州樞密苧布福建改機陜西駝絨民稱便焉升廣東參政卒於官章拯萬厯金華府志字以道蘭溪人𢎞治壬戌進士授工部主事忤逆瑾謫梧州通判瑾誅召為南吏部主事升廣東提學副使振孤寒抑僥幸標示正學士習一變尋升右副都御史改總理河道時河決魯橋有獻議欲挽河使北漸復禹故道者拯議為今計當迹前績而度時宜增卑培薄塞潰疏壅分殺其怒斯為實幹若羞出漢人下䇿欲求夏禹全功工役一興必至疲民誤國所不敢為也得旨升工部侍郎治其事乃請浚孫家渡分殺河勢甫興工而夏潦驟溢未及底績言者論之改督視顯陵工程以盛應斯代别議開昭陽湖新河功竟不就更以潘希曾代之迄用拯議河以無患拯還朝升工部尚書時夏言建請分祭四郊拯上議乞如舊制合享忤旨鐫秩歸隆慶初贈太子少保諡恭惠潘希曾程文德潘希曾傳字仲魯金華人𢎞治壬戍進士授兵科給事中有汪鈺者故太監汪直義男也乞升錦衣衛鎮撫帶俸守塋希曾疏奪之曰內官本無後而強求世祿之恩義男本異姓而欲冒他鬼之蔭疏上中官切齒復因災異陳八事語皆剴切直指近幸由是逆瑾謀中傷之正德丁卯差往湖貴二省計處邊儲時瑾焰方熾凡差者必重賂蘄免禍有司為備千金希曾毅然却之曰我為諫官不能為朝廷除惡我之罪也奈何復賂之瑾又風以多參劾為賄地不從瑾大怒矯命下詔獄考訊杖闕下除籍為民瑾誅起工科給事中時方營建二宫內官復請修蓋太素殿天鵝房船塢諸役費纍巨萬希曾抗疏爭之不報遷南太僕寺少卿滁和之民困於納馬希曾奏更折色民大稱便晉右副都御史提督南贑汀漳等處軍務惠州寇賴貴聚衆肆虐發兵洗其巢穴浰頭餘黨曾蛇仔等七巢並興遠近震恐希曾督兵進戰賊大敗俘馘千餘捷奏召為工部右侍郎值河溢淤漕任事者興新河之役費且數十萬死者數千人而歲運不繼命希曾往涖事希曾以沛漕之淤塞因黃河之旁衝黃河之旁衝因上流之未疏宜疏支河以殺其勢築長堤以防其衝然後挑通沛漕自無復淤之患乃築堤起單至沛凡百四十餘里不期年而功成沛漕流通歲運如故每河漲隄下水退沙回民多耕作焉召改兵部侍郎卒贈兵部尚書唐龍獻徵録字虞佐號漁石蘭溪人正德戊辰進士知郯城時荒甚龍使民貸粟於官而薄其息却羡餘以佐轉輸民用不困盜起燕齊間至郯龍督兵捕之斬首三百餘級賊怒合其黨大至龍發碗口長柄諸炮斃其驍鋭賊乃遁拜監察御史寧庶人誅江西新免於兵歲荐飢龍以選往按賑災恤貧江西乃寧嘉靖丁亥拜太僕卿擢吏部左侍郎壬辰關中飢而濟農數寇邊詔遷兵部尚書兼右都御史統制三邊兼理賑濟龍入關奏平糶節用等十事民賴全活者二十餘萬濟農自將十萬衆犯安會龍擊敗之兵部上功會執政有忌龍者不報丙辰改刑部尚書劉東山與其徒乘時為姦利至搆問兩宫株連貴近吏坐怵不窮竟去者數十人龍獨以抵法無所懾九廟成疏大禮大獄諸臣名以請得赦歸者二十餘人尋改吏部卒贈少保諡文襄戚雄兩浙名賢録字世英金華人正德辛未進士授建陽知縣調南海剸繁就簡植良剪惡治為百粵最召拜南京監察御史巡江聞寧藩變起疾走儀真調兵要害為防守計上下長江厯暑雨風濤無所顧恤迄逆濠就縛始解嚴又奏免南京守備太監及條處河患疏運道足邊餉等事多見施行嘉靖六年疏劾李福達之凶熖及郭勛之比黨以風聞妄奏逮問落職錢學孔金華府志字以時金華人嘉靖癸未進士授推官擢御史巡視京城畿內肅清奉差刷卷疏五事切中時弊清軍蘇松等處奏行補伍之法差滿復奏置巡江設兵備等四事按順天上興革四議俱見採納尋升大理少卿僉都御史巡撫保定引疾歸厯官二十餘年蕭然四壁鄉人高其清節程文德兩浙名賢録字舜敷永康人嘉靖己丑進士授翰林編修以言事忤旨廷杖下獄謫信宜典史纍遷兵部郎中上禦邊四事及車戰事宜多見採納擢南國子祭酒晉禮部左侍郎尋改吏部門無私謁直𨽻江南河南山東四省大飢開例納銀以便賑濟文德具奏救飢如救焚溺緩則何及聚銀為難米粟頗易乞隨民所有凡可以充飢者悉得輸官散給帝可其奏於是餉米粟者踵至四省之民得以全活大內歲例大祈文德撰釐詞多寓規諫忤上意奪官回籍卒萬厯初贈禮部尚書諡文恭分省人物考文德從楓山先生遊授以誠篤自治之學又從陽明先生授良知訣歸籍聚徒講學清苦若寒士卒不能葬總督胡宗憲賻之王崇金華府志字仲德永康人嘉靖己丑進士授吏科給事中寇犯寧夏總兵趙英逗留敗績欲以賄脫崇奉命往正其罪謝駙馬侵馬場崇時巡青州發之貴戚畏其直出為廣東僉事轉山西副使備兵井陘親簡閲明賞罰兵雄諸鎮轉湖廣參政諸苗陷印江崇破之遂聽約束升貴州按察山西左布政巡撫山西以保障為急繕城厲兵倡勇敢嚴斥堠寇至輒以捷聞召二本兵丁已湖廣川貴苗民犯順命崇以原官出鎮二年苗穴底定蔭一子致仕趙志臯獻徵録字汝邁蘭溪人隆慶戊辰進士授翰林院編修萬厯初升侍讀會張居正以父喪奪情諸疏劾者皆暗激上怒廷杖竄戍而疏悉不付史局志臯以職掌堅請之使不得祕居正怒甚遂出為廣東按察副使辛巳例察京僚黜官歸居正卒起解州同知擢南京國子監司業厯官吏部左侍郎升禮部尚書兼東閣大學士時開採之使四出志臯疏諫甚懇其臺省部僚因事激觸至斥逐貶竄者營救無不力卒贈太傅諡文懿程正誼舊浙江通志字叔明永康人隆慶辛未進士司理武昌屬邑向無雉堞正誼建議築五城分巡雲南時土司八百老撾等負固正誼開誠宣諭遂悅服升廣西參政靖江王薨悍宗煽亂諭以威德無敢譁者轉四川左布政三殿大工興採木為厲正誼立折算法刋為書商民不困升順天府尹時蜀帑羡餘數萬金吏以請正誼毅然拒之赴京以蜀扇不工罰及僚屬引罪自陳遂歸黃卷金華府志字惺吾永康人萬厯丁丑進士授中書選河南道御史遇事敢言巡鹽長蘆請建學滄州以處鹽商子弟癸已下三王並封之詔建言諸臣皆以批鱗削籍卷抗疏救之留中放歸光宗登極詔起用而卷已殁子一鵾濟南州同闔門殉難人稱濟美云盧洪春金華府志字思仁東陽人萬厯丁丑進士授旌德令升禮部主事皇三子生封母鄭氏為貴妃洪春抗疏爭之帝不悅越數月孟冬當享太廟傳旨遣官代祭洪春復具疏切諫帝益怒發午門外杖六十褫職為民卒後贈光祿少卿徐學聚金華府志字敬輿蘭溪人萬厯癸未進士任浮梁知縣盜賊充斥窑鎮無賴多窟穴其中學聚設法解散之調吉水會連年水旱斗米千錢學聚多方賑濟民賴以生擢吏科給事中疏請勤召對建元良蚤諭教出為湖廣僉事升福建布政姦民吳建糾白蓮教數千人謀叛將發學聚設計擒之晉巡撫漳有守備劉某謀不軌亷知捕之伏辜姦商引紅毛泊彭湖求互市倚高稅監為奧援勢甚張學聚抗疏陳八誣五患毋輕縱致貽閩海禍高監擅利復疏其惡而以稅額歸有司後乞歸卒薑應甲舊浙江通志字叔乙金華人崇禎戊辰進士授行人選刑科給事中時冡宰缺員吏部侍郎張捷以吕某對蓋魏忠賢黨也舉朝無敢言者應甲獨發其姦帝遂去吕名京師旱方齋戒祈禱一夕有旨決罪囚應甲封還詔書帝不允嘆曰不得其言尚可留乎即以親老乞養歸會東陽許都反應甲傾家資募死士迎敵於孝順街寇遂退晚乃披緇自號頑石結茅於北山巔年七十有六卒國朝朱之錫鄉賢留祀册字梅麓義烏人順治丙戍進士授𢎞文院編修厯遷兵部尚書兼右副都御史總督河道時黃河秋決漕運維艱之錫竭力經營不避寒暑凡所修築無不悉心擘畫以圖經久凡夫役工程錢糧職守及諸利弊因革損益之宜一一條上幾數十疏俱覆議報可於是運艘無阻而近河之民得免水患壬寅歲祲山東淮南道殣相望之錫設法倡賑全活甚衆會奉敕兼任巡方剖決若神民無寃者在任十一年加太子太保卒賜祭葬蔭一子瀕河之民立廟祀之衢州府宋趙抃宋史本傳字閲道西安人進士及第為武安軍節度推官以薦為殿中侍御史彈劾不避權幸聲稱凛然京師目為鐵面御史其言務欲朝廷别白君子小人謂小人雖小過當力遏而絶之君子不幸詿誤當保全愛惜以成就其德言宰相陳執中不學無術宣徽使王拱辰奉使不法皆罷去知益州地遠民弱吏肆為不法州郡公相餽餉抃以身帥之蜀風為變召為右司諫內侍鄧保信引董吉燒煉禁中抃引文成五利鄭注為比力論之陳升之副樞密抃言升之姦邪交結宦官進不以道章二十餘上升之去位抃亦罷知虔州虔素難治抃召戒諸縣令使人自為治令皆喜爭盡力獄以屢空召為侍御史改河北都轉運使時賈昌朝以故相守魏抃將按視府庫使來告曰前此監司未有按視吾藏者抃曰舍是則他郡不服竟往昌朝不悅初詔募義勇過期不辦官吏當坐者八百餘人抃奏言河朔頻歲豐應募者少請寬其罪從之坐者獲免而募亦隨足昌朝始愧服知成都以寬為治蜀民大悅神宗立召知諌院及謝帝曰聞卿匹馬入蜀以一琴一鶴自隨為政簡易亦稱是乎未幾擢參知政事王安石用事抃屢斥其不便韓琦上疏極論青苗法安石持之愈堅抃上言安石強僻自用詆天下公論以為流俗違衆罔民順非文過近者臺諫侍從多以言不聽而去司馬光除樞密不肯拜且事有輕重體有大小財利於事為輕而民心得失為重青苗使者於體為小而禁近耳目之臣用舍為大今去重而取輕失大而得小懼非宗廟社稷之福也奏入懇乞去位拜資政殿學士知杭州改青州會成都以戌卒為憂遂以大學士復知成都至蜀治益尚寬召卒長立堂下諭之曰吾與汝年相若吾以一身人蜀為天子撫一方汝亦宜清謹畏戢以率衆比戍邊得餘資持歸為室家計可也人喜轉相告莫敢為惡蜀郡晏然乞歸知越州復徙杭以太子少保致仕元豐七年薨贈太子少師諡清獻抃長厚清修人不見其喜愠平生不治資業不畜聲伎日所為事夜必衣冠露香以告於天不可告則不敢為也其為政善因俗施設猛寬不同要之以惠利為本韓琦嘗稱抃真世人標表蓋以為不可及云子屼趙屼宋史本傳字景仁由蔭登第通判江州改溫州神宗擢為御史以父老請外提舉兩浙常平元祐中復為御史言治平以前大臣不敢援置親黨子弟多處管庫自王安石持內舉不避親之説以子雱列侍從由是循習為當今宜杜絶其源又言臺諌之臣或稍遷其位而陰奪言責或略行其言而退與善地或兩全並立茍從講解或置而不問外示包容使忠鯁之士蒙羞難退皆朝廷所宜深察也傅堯俞王巖叟梁燾孫升以事去屼言諸人才能學術為世推稱忠言嘉謨見於已試宜悉召還朝所言皆切時務元符中厯鴻臚太僕少卿卒王渙之宋史新編字彥舟常山人未冠擢上第厯官太學博士徽宗立以日食求言渙之用大臣薦召對稱旨欲任以諌官辭曰臣由大臣薦不可居是官纍擢中書舍人崇寧中進吏部侍郎以寶文閣待制知廣州言者論渙之當元祐末與陳瓘遊解職入黨籍卒渙之恬於仕進每云乘車常以顛墜處之乘舟常以覆溺處之仕宦常以不遇處之則無事矣毛注宋史本傳字聖可西安人舉進士大觀中權殿中侍御史蔡京免相留京師注疏其擅持威福引凶朋林攄置政府用所親宋喬年尹京其門人播傳咸謂恩眷不衰行且復用京遂致仕四年彗再見注又言京罪積惡大天人交譴宜早令去國以消弭災咎京始出居錢塘注尋遷左諫議大夫徐嚞𢎞治衢州府志字吉卿西安人宣和進士以趙鼎薦除教授王邸纍遷侍御史擢二戶部兼權吏部尚書言者論其有黨上曰嚞朕親擢安得是紹興三十二年金使請和命嚞館伴既覲金使不肯以書授中使嚞徑前奪書以進上嘉之孝宗登極以舊職守泉徙帥越俄進職守平江高宗語孝宗曰是嘗手奪國書者詔過闕覲兩宫至蘇踰年致仕劉章宋史本傳字文孺龍遊人紹興十五年廷對第一遷祕書郎兼王府教授事以經誼文字啓迪掖導秦檜當國嗛不附已諷言者媒蘖其罪出倅筠州檜死擢祕書少監議郊廟禮文當置局討論詔行其説孝宗受禪念舊學拜禮部侍郎奏禁遏淫祀進權禮部尚書對選德殿問章今年幾而容貌未衰頗嘗學道否章對曰臣書生無他長惟菲儉自度晏嬰一狐裘三十年人以為難臣以為易上嘉嘆久之以資政殿學士致仕卒諡文靖鄭仲熊兩浙名賢録字行可西安人登進士第厯官簽書樞密院拜參知政事時秦檜當國誣搆趙令襟謗訕欲加重典高宗猶豫未決檜於上前授仲熊助已言鄭仲熊與令襟同里備知其惡陛下試叩之上顧仲熊仲熊正笏却立徐對曰臣雖與令襟同鄉素不識其人檜失色令襟遂得免死檜下殿忿色相誚亟諷言者劾仲熊與令襟密友故飾為不知以欺陛下章上仲熊待罪都亭帝聞之遣中使宣押是時執政去國者久不舉此恩例特行之檜恚益甚復使臺諌交攻之仲熊遂力祈避位以原官奉祠言者不置竟落職寓居蕭寺二十年孝宗即位復端明殿學士致仕梁辨梁揔𢎞治衢州府志辨西安人登進士第秦檜當軸以辨乃辟雍同舍召拜御史欲使承風旨辨謂臺諫天子耳目安得為人作鷹犬終不附檜稱疾丐祠子揔字責全以明法擢廷評時有欲入人罪者揔堅執不見聽乃求去為淮西檢法林光朝薦之召丞大理稍遷少卿孝宗稱其忠正亷恪出為浙江憲平丹陽盜救嚴陵荒厯晉戶部侍郎使於金既還除刑部侍郎尋致仕劉穎宋史本傳字公實西安人紹興二十七年進士纍官刑部侍郎以寶謨閣直學士致仕在孝宗朝人臣爭承意自獻穎奏今日之失在輕聽人言昔之施為今復棄置大損盛德孝宗嘉納之光宗時論人主難克而易流者有四曰逸豫無節賜豫無度儒臣易疏近幸易昵寧宗時學禁初起黨論日興穎奏願陛下御之以道容之以德不然元祐崇觀之事可鑒也其言皆切中於時江溥兩浙名賢録字叔源江山人紹興十五年進士厯遷右司郎中拜殿中侍御史資性忠亮疾惡如讐多為當事所忌而上獨知之溥感知遇益明目張膽無所諱忌魏邸親吏馬校嘗繕私居矯令役民屋摧壓死者十三人傷者倍之閲月而上不聞溥奉白簡彈之請以次第議罪上覽疏曰父子之間人所難言不謂卿能如此亟從無少忤於是權貴斂迹一時稱為真御史余端禮宋史本傳字處恭龍遊人第進士知湖州烏程縣民間賦丁絹錢率三氓出一縑不輸絹而折其估每縑千錢後增至五千民不勝病端禮以請於府事得上聞又自詣中書陳便宜歲捐緡錢六萬時孝宗志在恢復端禮言謀敵決勝之道有聲有實敵弱者先聲後實以讋其氣敵強者先實後聲以俟其機今日之事願陰設其備而密為之謀觀變察時機之未至不可以先機之已至不可以後上喜曰卿可謂通事體矣以為監察御史纍遷吏部侍郎光宗立拜吏部尚書擢同知樞密院事興州帥吳挺死端禮謂趙汝愚曰吳氏世握蜀兵今若復令承襲將為後患汝愚是其言合辭以奏不聽後挺子曦以蜀叛如端禮言汝愚去右丞相位端禮代之始端禮與汝愚同心共政汝愚嘗曰士論未一非余處恭不能任及韓托胄寖竊威柄端禮不能遏但長吁而已在相位期年頗擁護善類然為托胄所制一鬱不愜志稱疾求退卒諡忠肅劉甲宋史本傳字師文其先東光人父著葬龍遊因家焉淳熙二年進士纍官至樞密院檢討使金還擢權工部侍郎除知江陵府移知興元府利東安撫使時程松為四川宣撫使吳曦副之蜀口出師敗衄曦已遣人獻四川於金金鑄印立曦為蜀王甲未至鎮金人破大散關甲告急於朝乞下兩宣撫司協力松謀遁甲固留不可曦以書致甲甲援大義拒之因卧疾曦又遣其弟邀甲相見甲叱去之乃欲自拔歸朝先募二兵持帛書遺參知政事李璧告變曦僭王位甲遂去官璧袖帛書進上覽之稱忠臣者再召甲赴行在甲舟行至重慶聞安丙等誅曦復還漢中上奏待罪詔趣還任甲奏叛臣子孫族屬及附偽罪狀公論快之會楊巨源死軍情叵測除甲宣撫使未幾金自鶻嶺關進屯八里山甲分兵進守諸關截潼川戍兵駐饒風以待之金人知有備引去拜寶謨閣學士賜衣帶鞍馬西邊諸事多於甲取決會罷宣撫司合利東西為一帥治興元甲進知興元府利路安撫使權四川制置司事先是大臣撫蜀諸將有互送禮甲下令首罷之凡安丙所立茶鹽柴邸悉廢丙增多田稅甲命屬吏討論由一府言之歲減凡百六十萬緡米麥萬七千石邊民感泣嘉定七年卒於官理宗詔諡清惠徐霖宋史本傳字景説西安人淳祐四年試禮部第一授沅州教授時宰相史嵩之挾邊功要君植黨專國霖上疏厯言其姦深之狀以為其先也奪陛下之心其次奪士大夫之心而其甚也奪豪傑之心疏奏見者吐舌未幾嵩之匿喪求起復君子並起攻之上大感悟思霖之忠擢祕書省正字會日食應詔上封事遷校書郎七年夏大旱霖應詔言諌議大夫不易則不雨京兆尹不易則不雨不報改宣教郎霖屢辭曰向為身死而不敢欺其君父今以官高而自眩於平生失其本心何以暴其忠志十二年授祕書省著作郎纍辭不許兼崇政殿説書乃言葉大有陰柔姦黠為羣憸冠不宜久長臺諌乞斥去兼權左司霖知無不言於是讒嫉思以中傷而上亦不悅乞外知撫州以言去開慶元年差主管崇禧觀景定二年知汀州卒度宗賜祭田百畝以旌直臣徐夢鱗衢州府志字樂水常山人紹定己丑進士初任江陵簿纍官至御史蕭山尉丁大全夤緣入臺夢鱗抗疏沮之不得遂謝病致仕胡大昌萬厯龍遊縣志字師言端平二年進士授衡州教授厯戶部侍郎理宗嘗曰若大昌行事朝廷何患不治度宗立內侍盧董用事抗章纍劾不報出為太平守京北轉運使明鄭辰獻徴録字文樞西安人永樂進士授監察御史江西福安民有告謀逆事辰往亷得其誣狀抵以罪谷庶人有異謀遣辰陰察之比還語其不軌之狀甚悉上語尚書方賔曰是真國家耳目臣矣尋擢山西按察使潞州盜起朝廷欲遣兵往討辰謂此貧民懼徭役竄入山谷間者不宜加兵乃躬往撫諭遂皆安業召升工部左侍郎奉敕濬漕河有言宜自大名開渠通衛河以便行舟辰以勞民奏罷之正統中升兵部左侍郎以疾致仕鄭林兩浙名賢録字伯森常山人正統進士景泰初授兵科給事中遇事敢言權貴無不斂迹嘗杭疏論團營將不知兵操練無法當事者請委林操練軍士林以軒轅破蚩尤之陳教閲軍伍復具疏繪圖以進曰黃帝按井田作陳法大軍歸中專主旗鼓八節旋繞悉聽指揮若正北受敵則東北西北為竒兵張左右翼以援之正南受敵則東南西南為竒兵張左右翼以援之其正東正西及四隅受敵亦如之所謂常山之蛇擊首則尾應擊尾則首應擊中則首尾俱應者也時于謙為大司馬深嘆賞以為得古兵法之祕奏請頒其法於天下凡練兵官悉以是教閲隊伍始整其法至今不廢徐鑾衢州府志字用和開化人景泰甲戍進士任監察御史刷卷江西亷公嚴明權貴不敢干以私時稱為風憲第一樊瑩獻徵録字廷璧常山人天順甲申進士擢監察御史山東盜起奉璽書追捕不旬日得其渠首以歸清理淮揚軍所條畫事宜至今為例出知松江府松賦重役繁弊蠧百出其大者運夫耗折稱貸積纍而倉場書手侵盜害人衆皆知之未有以處瑩至晝夜講畫盡得其要領曰運之耗以衆皆齊民靡所統一利歸狡猾害及善良而夏稅軍需糧運綗用與凡供應等費皆出自秋糧餘米既收復糶展轉迂回此弊所由生也乃請革民夫俾糧長自運而寬其綱用以優之除常運本色外其當變易者盡徵白銀見數支遣於是積年之弊十去八九巡撫下其法於他州俾悉遵之以母憂去𢎞治初起知平陽府擢河南按察使時河溢境內漂流數萬家瑩躬請賑恤所全活甚衆升應天府尹守備蔣琮怙寵作姦與言官奏訐連歲蔓引甚衆而事終不決瑩承命推鞫初若不與異者琮覘知之不為意最後及山陵龍脈事琮遂得罪去瑩在府屢治大獄舉法不苛升南京工部侍郎尋改左副都御史巡撫湖廣錦田賊與兩廣猺獞為冦聚衆幾三萬瑩謂賊不可盡殺不開其生路將致死於我乃下令除首惡餘悉貰不問賊聞之稍稍散去遂得倡亂十八人置之法而牒其餘歸本貫一方以寧改南京刑部左侍郎兼左僉都御史巡視雲貴時瑩年幾七十單車屏從躬訪利病奏劾鎮守及巡撫官罪狀黜不職文武吏七百餘員威惠大行召為南京刑部尚書致仕卒贈太子少保諡清簡王璣獻徵録字在叔西安人嘉靖己丑進士拜兵科給事中上疏論時政乞分內閣重權以防壅蔽外補山東按察僉事遷江西參議屬歲歉饒之樂平業瓷浮梁者輒盜兵讐殺璣亷得其情先為曉諭乃拘逮首禍者置於法餘並解散轉山東按察副使兵備天津沿河姦人悉駕小艇名假貿鹽實窺便攘劫被害者莫能指實璣為籍其船戶官為編類令船尾各畫一禽以相識别許徑指其船禽以訴盜無弗得河道肅清升福建參政進右僉都御史充淮徐兖等處招撫營田使所屬五府三州久罹災歉千里蕭條璣節浮費勤勸課流民復業者四萬二千九百有竒所墾田地八千頃凡厯再期漸就緒而以言官論列裁革添設重臣回籍聽用遂歸儒林録别號在菴少時聞陳白沙之學心亟仰之渡江受業陽明之門陽明稱其篤實補山東按察僉事輒進諸生論學齊魯士彬彬向風家居以禮為訓每身先之接後學溫然若家人年七十餘卒嘗言平生無過人處唯出處分明未嘗屈身降志云毛愷獻徵録字達和江山人嘉靖乙未進士授監察御史以言事與執政忤左遷寧國府推官升南工部主事抽稅蕪湖關蕪湖當荆湖下流商稅不資愷獨勵清操出納委之縣佐稅銀貯之縣庫一毫不染其歲額之盈者則蠲以與商商咸頌之厯員外郎中升瑞州府知府瑞俗多嚚訟且多積逋愷率以禮義而申之禁令怙終不馴者始繩之以法追積逋必寬其期限度貧甚者則以俸餘代為之償民感激若更生厯升左僉都御史巡撫保定擢左副都穆宗嗣位改刑部尚書嚴飭邦禁慎讞刑獄中貴不法則抗疏極論請發部問擬以彰公道其以過誤繫獄者亦為之疏請明示犯由以昭勸懲疾作乞休歸卒贈太子少保諡端簡愷性喜講學躬行實踐一以養心寡欲為主先儒語録罔不參訂其異同究極其歸趣厯官二十四任終始一節所著有讀書録抄釋二卷文集四卷奏議八卷享年六十有五趙鏜丁元復趙鏜傳字仲聲江山人嘉靖丁未進士授河南道御史督長蘆鹺政時軍興需鹽課急鏜悉心經理尋究弊源條上封事皆中肯綮改應天巡按慎舉刺勵風裁威名大振提督南畿學政號稱得士擢順天府丞時方缺尹諸務蝟集鏜以臺臣夙望飭典法繩之大府帖然無敢闌出入者改大理少卿擢右僉都御史穆宗改元以疾乞歸徐世蔭衢州府志字爾繩開化人天啓乙丑進士授南兵部主事時三王並封供具百億世蔭措置井井大司農鄭三俊欲清屯田之冒濫者諸軍譁而圍其署世蔭單騎諭散之厯遷按察司副使備兵常鎮宜興民變白晝攻剽官不能禁或請𠞰之世蔭曰此亂民非冦也為開陳禍福間取不職者創懲之事遂寧息升福建按察使未幾巡撫安廬書浙江通志安廬流冦披猖世蔭晝夜登陴調兵借餉日無寧晷民恃以無恐解任家居以孝友敦朴式訓鄉里余日新衢州府志字君又龍遊人崇禎甲戍進士知漳浦縣有善政擢監察御史巡按山東時山東方被兵謀國者日督綱課不已日新奏請蠲逋緩徵疏凡三上又陳三府俵馬之害止關寧米豆之供停登萊海運之議議者韙之尋加太僕卿豫告歸浙江通志卷一百六十一
