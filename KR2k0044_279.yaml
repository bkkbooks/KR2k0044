body:
  text: 浙江通志卷二百八十雜記下山居新語元至元間杭州尚有火禁高彥敬克恭為江浙行省郎中知杭民藉手業以供衣食禁火則小民屋狹夜作點燈必遮藏隱蔽而為之是以數至火患遂弛其禁杭民賴是以安與亷叔度除成都火禁一意也至正直記羅太無錢唐人故宋宦官也侍三宫入京後以疾得賜外居閉門絶人事好讀書善識天文地理藝術武夷杜伯原嘗師問之因得其祕乃姪官至司徒權勢炎炎公卿莫不諛附遇嵗朝司徒請謁太無太無掩門不納司徒大呼以首觸扃太無於戶內呼司徒名應之曰人道汝是太山我道汝是氷山我老且病願乞骸骨若奏我歸杭州即是敬我司徒於是特奏可其請太無以所積金帛玩好皆散與鄰坊故人惟存書籍數十部束於車後屬司徒曰我不依汝汝亦不可依勢至於再三遂到杭逾年卒司徒者不遵其訓弄權不已遂以妄受湖州人田土坐罪流逺方卒而太無乃得終於鄉里可謂有先識矣杭州七寶寺乃羅司徒所建者輟耕録汪佛奴歌兒也嘉興富户濮樂間以中統鈔一千錠買為妾一日桂花盛開濮置酒佛奴奉觴濮有感於中澘然垂淚曰吾老矣非久於人世者汝宜善事後人佛奴亦泣下誓無二志既而濮果死佛奴獨居尼寺操行潔白以終其身元史文宗本紀至順三年十月命浙江行省範銅造和寧宣聖廟祭器凡百三十有五事農田餘話至正庚寅江浙鄉試貢院中驚喧以為見大蛇或言見怪獸莫測所在故試場以角端為題樂郊私語海鹽私販每操兵飛棹往來賈販雖吏兵莫之敢攖至正丁酉灤城范廉卿以廕補蘆瀝巡檢為人恂恂儒者顧長騎射無論鳥獸不及飛竄雖海塗上跳魚子蟹之細射之百不失一夜每懸火竿上去竿三百步從暗中射火無不滅也於是亡命心懼毋敢私販境內為之肅然先是本路推官陳春以平反鹽獄數百人至是本路大僚曰使巡官人人如范何必陳司理平反也樂郊私語海鹽州學有至元六年知州趙孟貫賈禧重修碑至正六年知州葉彥中再修有碑三州守皆有治聲趙字子唯台州黃巖人其祖子英為宋宗室少卿南遷時以宗室從為黃巖丞遂家焉有子六人皆以文學登膴仕至其孫師淵為太常丞師夏為判宗皆受業紫陽之門且締姻焉故能以禮世其家云賈字吉甫宛丘人治行以正羣佐老胥肅然若家之奉其尊也葉字大中松陽人以才敏有風操為江南行御史臺架閣管勾所至有績可紀至於崇道重學則三君之雅意均也輟耕録武林錢思復先生明善年十六七時以詩見息齋李公於州橋寓居既拜公公答拜命坐辭之再公曰仲尼之席童子隅坐因不敢辭徐永之為江浙提舉日客往訪之者無間親疏貴賤必送之門外凡客請納步則曰不可婦人送迎不踰閾前輩謙抑汲引後進者如此蘭溪縣志金仁山先生履祥篤於分義有故人子坐纍母子分配隔逺不相聞者十年先生傾資營購以歸其子後貴先生終不自言相見勞問而已農田餘話金華黃晉卿溍早年為湖州長興吏因簿書被箠乃棄吏發憤讀書登進士為世名儒雙槐嵗抄四明陳桱嘗作宋鑑網目筆其先世曰户部尚書顯者嘗論蔡京之姦不復仕顯孫曰吏部尚書伸上章辨偽學諫韓托胄北伐遂致仕伸子曰工部尚書德剛請復濟王官爵端平中左遷而卒德剛子曰太學博士著上書論賈似道姦邪出判臨安府桱即著之孫也湧幢小品顧圭上虞人死方國珍之難里人瘞尸於江岸為風濤蕩析而塜獨完越七月其孤謀返葬啓視面如生次日其地盡為江矣蘭溪縣志吳綺字季可當蘭溪升為州時季可尚未冠趨事於官衆嘉其能明初越國胡公大海下蘭溪逰兵四出居民竄匿季可見旗者曰願見總兵安業以給軍餉引至帳下越國見之壯其言授以大杖曰違律暴掠者用此杖之軍士皆懼衆賴以安嚴州府志張士誠令其部將劉真據桐廬謀築城毁安樂塔及牛山臨江扶欄取其磚石掘地作河以取土居民苦於力役真性慘酷築土不堅者遂和土築其中死者相枕藉既而真登鳯皇山瞰視曰即此可以觀城中之虛實矣事遂寢今市心及橫港一帶隱然隆起者皆新城基也水東日記洪武庚戌太祖將大封功臣遣使至台郡訪唐和陵所賜錢武肅王鐡劵十五世孫尚德捧劵及五王像以進寵遇優渥已而還其劵與像以禮敦遣而歸吾學編周王橚洪武三年封吳國錢唐七年置杭州護衛上以浙江財賦重地不可封王罷護衛改封周萬歷野獲編洪武四年辛亥始開科取士時自畿輔外加行中書省凡十有一列中式者一百二十名而吾浙得三十一人蓋居四分之一而會元俞友仁復為仁和人首藩首科盛事如此是時劉基宋濂章溢王褘輩俱浙人一時同為開創名臣宜其聲氣之相感也池北偶談明兩浙人物劉文成基為謀臣之首宋文憲濂為文臣之首方正學孝孺為忠臣之首于忠肅謙為功臣之首禮賢録劉基以母喪至家營葬事時語所親以上必當有天下之狀於是鄉里及鄰附郡縣翕然心服方氏雖據溫台明三郡其士大夫皆仰基如景星慶雲上時使人以手書訪軍國事於基其書多自製皆稱御諱頓首奉書伯溫老先生閣下而不名古今竒聞類紀誠意伯劉公疾革時語其子云吾家封爵當中絶然至五世後應得武職從兹可傳繼矣至孫薦襲爵後果被革𢎞治初詔録公後為處州指揮使正五世矣時嫡孫以罪繫獄有司脫桎梏而冠服之人以為竒遇玉劍尊聞章溢奏定處州七縣稅糧比宋制畝加五合上特命青田縣糧止作五合起科餘準所擬曰使劉伯溫子孫世世為美談也仰山脞録章公溢始生時其音如鐘父母疑為不祥幾不舉及成童嶷然莊重不習鄉井輕儇態至正壬辰蘄寇犯龍泉公與從子存仁避亂山中存仁為賊所得公曰吾兄止有一子不可使無後挺身出語賊曰兒幼無所知我願代之賊素聞公名方出重購求之及得公大喜欲問計公正色曰若等皆有父母妻子顧為此滅族事耶賊怒繫之柱磨其脅曰不降者死公曰吾終不為不義屈賊壯之不敢加害公夜紿守者乘間脫歸避地閩中太祖以束帛召公遂起為佐命勳臣金華雜識宋濂師聞人夢吉又師吳萊萊師方韶父永康胡長孺青田余學古學古師同邑王夢松夢松師王味道味道則晦翁弟子也淵源之有自如此碧里雜存宋太史濂乞歸時御製詩二句餞之云白下開尊話别離知君此後迹應稀濂續云臣身願作衡陽雁一度秋風一度歸上悅賜白金緡幣文綺曰與汝作百嵗衣也自是嵗一朝焉菽園雜記宋景濂歿夔州府葬蓮花池山下成化間墓壞巡撫池州孫公仁為遷葬成都適蜀王府宋承奉新作壽藏於成都東門外孫公求以葬先生承奉慨然許因此葬焉傳信録方孝孺先生未生時其父將葬其祖已擇某日矣忽夜夢一朱衣人前跪曰聞執事作尊翁藏於某山之原然吾九族居此已數百年子孫蕃衍不知其數再緩三日吾當徙避言訖辭去明日起工即得一穴濶六丈許中有赤蛇千共一穴其長數尺蓋所夢之朱衣也先生父素不信鬼神積薪縱火焚之有煙一道直指先生之家是時母方妊數日先生生焉狀甚異舌能入鼻中後盡忠於建文君遭赤九族蓋蛇之報云蒹葭堂雜抄天台方孝孺少時嘗過嚴陵釣臺有古詩一章敬賢當逺色治國須齊家如何廢郭后寵此隂麗華糟粳之妻尚如此貧賤之交安足倚羊裘老子早見幾却向桐江釣煙水此不獨工於詩亦天下第一等議論也名勝志刑部尚書魏澤謫臨海典史時捕方正學家不許容留一人公為悉力營護以出其孤謝文肅詩所謂孫枝一葉存者也澤字彥恩名勝志洪武初瑞安人卓敬年十三讀書山中夜歸遇暴風雨遙見火光趨赴之乃一小院扁題體元入見一老翁坐長明燈下起相勞苦令童子燃枯葉為燎濕衣敬密問翁為誰童子曰先生不欲人知其名惟自稱逍遙翁耳敬復修謹詢翁翁曰吾世業醫往來中條山聞陶隱居有丹室在此南來採藥不久將還郎君無用知也因與一牛騎歸及抵家牛忽咆哮化一黑虎逸去比明尋訪小院不可得數日後乃在縣西四十里陶𢎞景丹室故址有古廟是雨夜所經行者其壁有潘閬夏日宿西禪院詩筆墨猶新循其路歸見虎迹厯厯尚存間中今古録象山錢唐元末隱而不見年將六旬見四海定於一赴京敷陳王道先獻一詩詩曰大明洪武元年春春雷一聲天地響龍飛在天雨如膏天地山河增氣象山人昔住東海山山形如象山名丹丹山之南有白石山人隱遁松林間一朝隂氣蔽白日天地昏暗人變顔人既變顔心鐡黑山人鐡心仍鐡肝山人名不挂唇齒山人不與人相似吳江江上吳山青吳山有城髙百雉好風吹步上京師鐡杖麻鞋見天子天顔悅懌天開明謹身殿中承聖旨致君堯舜端有時山人事業當如此詩奏即授刑部尚書鎮海縣志鄞人單仲友能詩洪武中徴至南京獻詩稱旨因奏本府名同國號請改之上喜曰彼處有定海海定則波寧改明州曰寧波時洪武十四年賜仲友還鄉考終於家慈溪縣志陸俊入胄監明太祖視學令講論語問為治何先俊對以敬事而信三句上悅即日命知汀州府西園雜記寧海布衣葉兑上太祖書論武事一綱三目其大意謂用兵之要在胸中有一定之規宜北絶李察罕之招誘南併張九四之僣據督方國珍之歸順取閩越之上地即建康以定都招江廣以自資進則越兩淮窺中原而取天下退則保全方面而自守此一定規模之綱領也其三目即一取張九四二取溫台處三取福建時偽漢雖平而元李平章察罕方以書招誘太祖故兑云云卒之平吳平越平閩然後北伐混一天下次第皆如兑言餘冬序録黃巖徐宗實垕洪武中為兵部侍郎奉使兩淮多所建白海州有節婦侍小花年十六許嫁而夫亡婦往夫家成喪持服養姑送終剪髮自誓守節不二採訪使上其事所司以其年未五十不合例宗實上言曰隨事處中始為合義守文執一豈曰得宜厥婦既能哭夫於筮嫁之初又能剪髮於葬姑之後雖剜目截耳亦無以加自當與立志卓異同科豈與守節尋常比例朝論是其言下郡邑旌之萬厯野獲編嘉興有王嘉會者字元禮元末纍舉不第入明以明經應聘至京授翰林檢討洪武十五年升國子右司業與祭酒宋訥左司業龔斆嚴立楷範三人俱春秋髙鬚眉皓然太學數千人肅而畏之以老疾乞歸特賜致仕未行而卒於官舍時年八十餘上命禮部應天府給舟車還葬發引之日又詔沿途有司祭之今鄉人已無能名之者矣歸田詩話洪武間臨安宰王謙嵗終行鄉飲酒禮選諸生少俊者十人習歌鹿鳴等篇吹笙撫琴以調其音節至日就講堂設宴席地而歌之器用罍爵執事擇吏卒巾服潔淨者賔主歡飲父老嘆息稱頌儼然有古風後遂以為常凡宴飲如會友則歌伐木勞農則歌南山賀新居則歌斯干送征役則歌無衣待使客則歌皇華之類不用世俗伎樂識者是之雙槐嵗抄舟山下舊有狀元橋童謡謂狀元出定海洪武二十七年縣人張信果應其讖西湖遊覽志餘洪武間詔選識字良家女及能讀大誥者杭州以江干蔡氏應詔入宫署為女官永樂初命蔡氏選識字女子於杭州後得其甥張氏應詔亦為女官云鳯洲雜編洪武三十年起取天下稅户鄭沂入見授禮部尚書以其從子幹為御史永樂十二年御史七十二嵗乞歸上曰教翰林院寫策書禮部宴用正官陪教坊伎樂陛辭賜金繡衣楮帛幹舉從子煁可用上曰御史舉也除御史後纍遷大理寺丞永樂十七年北京初受賀致仕御史幹及弟致仕楷來朝賜宴及楮幣與為善隂隲二部上曰他家人多與二十部十九年翰林檢討鄭叔美以告病例為民仁宗立與子弟來朝上顧長者非鄭檢討乎何為冠平巾吕震以故對上特詔豫冠帶致仕各賜鈔二千貫給驛舟還家都公談纂鄭尚書暘浦江義門人太祖嘗一日問尚書汝家纍世同居何以致之尚書叩首曰但不聽婦人言耳上深然之崇禎浦江縣志鄭氏五皓者監察御史幹蜀府長史楷詹事府丞柎翰林檢討棠清逸處士柏也一門伯仲學優文行求之古今亦希覯焉萬厯野獲編金實者金華人永樂初生員上書陳王道其綱有四其目有五上嘉納之又試䇿三道俱稱旨遂命入文淵閣預修太祖實録書成授翰林典籍又預修永樂大典晉春坊司直郎洪熙中升衛王府長史正統四年充會試同考官以青襟為纂修一異也以青宫近臣曵裾王門二異也以藩府外僚膺衡文重任三異也是時官制已久定而金實獨承異數如此天順日録吏部尚書魏驥浙江人初為松江教官汲汲成就人才諸生在學者候一更盡必擕茶往視之見書聲者供茶一甌而反至三更將盡必擕粥以隨尚有誦書者供粥一碗且嘉其勤如此亦不頻數間旬一行士子咸感激後出其門者顯宦甚盛萬厯野獲編仁宗初即位故宫僚左春坊左贊善徐善述卒於官贈太子少保諡文肅命有司立祠祀之宣宗初為文以祭徐字好古天台人起嵗貢為桂陽州學正遷國子博士至今官凡考鄉試者二會試者二贊善從六品超九階而贈宫保且得諡賜祠儲君親灑翰祭之實為前所未有湧幢小品袁栁莊珙之父號菊村其先有袁天與者以進士死德祐之難全家俱覆凡十七人僅一孤救免又百餘年而有栁莊云水東日記于節庵謙之先世有顯宦至其父幼孤貧流落雖知其先世之貴而不能詳所知者黃鶴山有先塋其兄弟名山壽海壽耳節庵既長為董鏞先生壻先生藏書有黃文獻公溍集載湖南宣慰于九思行狀可考節庵能知其先以得此文焉爾董先生子中書舍人璵語及此事云畜德録孫原貞以實録事至杭屬諸學生給事筆硯時于肅愍公在列進曰學校之設將養賢以為用耶抑供事書辦耶孫下席迎上座謝過遂與定交水東日記于節庵以兵部侍郎巡撫河南遷大理少卿入京不持土物賄當路汴人嘗誦其詩曰手帕蘑菰與線香本資民用反為殃清風兩袖朝天去免得閭閻話短長玉劍尊聞于謙為兵部尚書寇犯西北貴州苗大起二廣四川復用兵警報旁午謙目視指屈口為奏二吏從旁録録常不及瑣綴録景泰間用人多密訪於少保謙時缺祭酒翰林徐有貞求補以門生楊宜為少保內姻託為之請至於再四少保曲意從之因中使言於上一日退朝宣少保至文華殿辟左右諭曰徐有貞雖有詞華然其存心姦邪豈堪為祭酒若從汝用之將使後生秀才皆被他教壞了心術少保不能對惟叩頭而已退則汗出浹背左右遙聞祭酒之説而未悉有貞竟不得知遂銜少保後果誣以重罪萬厯野獲編宣德初年添設浙江杭嘉二府屬縣勸農主簿菽園雜記吳文恪公訥為御史巡按兩浙時壞秦檜碑因刻石記曰右宣聖及七十二弟子贊宋髙宗製并書其像則李龍眠所畫也髙宗南渡建行宫於杭紹興十四年正月始即嶽飛第作太學三月臨幸首製先聖贊後自顔淵而下亦撰辭以致褒崇之意二十六年十二月刻石於學附以太師尚書左僕射同中書門下平章事兼樞密使秦檜記檜之言曰孔聖以儒道設教弟子皆無邪雜背違於道者今縉紳之習或未純乎儒術顧馳狙詐權譎之説以僥幸於功利其意蓋為當時言恢復者發也嗚呼靖康之禍汴都淪覆當時臣子正宜枕戈嘗膽以圖恢復而檜力主和議攘斥衆謀盡指一時忠義之言為狙詐權譎之論先儒朱熹謂其倡邪説以誤國其罪上通於天萬死不足以贖者是也昔龜山楊先生時嘗建議罷王安石孔廟配享識者韙之訥一介書生幸際聖明備員風紀兹於仁和縣學得觀石刻見檜之記尚與圖贊並存因命磨去其文使邪詖之説姦穢之名不得厠於聖賢圖像之後然念流傳已久謹用備識俾後覽者得有所考云萬厯嘉善縣志大理卿胡槩將析縣命知府齊公政相地齊欲定縣於西塘鎮有成議矣胡詢諸父老陶莊里民袁皓方弱冠進曰建邑者最上論國計次論人情又次論地勢西塘僻處一隅非扼塞要會武塘海濵孔道郡之東藩地方有警可以扼吭又商旅往來民易成聚胡大然之遂挾輿偕行自嘉興東來先閲武塘四水皆直胡不甚樂及抵西塘見南北諸流皆會於文水漾召皓語云國計民情爾言當矣如地勢何皓曰西塘二水雖合勢實傾邪武塘雖直勢甚平正觀形者得其偽察理者得其真古者太史覛土較輕重試稱之優劣判矣胡命取二鎮土稱之果武塘重遂定治焉天啓慈溪縣志王母張氏其父為餘姚張雲航先生有隱德善識鑒每奇其女教之經義適慈溪王明白之子伯塤為金溪令有能聲雲航嘗囑其女曰得甥當告我舉首子以告視之曰來矣名之曰來再舉子再告曰復來矣名之曰復既以第三甥告曰亦足與兄鼎足而立名之曰鼎來復同中宣德丙午科來為工部尚書復為刑部主事鼎為御史終廣東僉事張封太夫人相夫教子一以古人為法金溪既歿手書針訓諄諄以竭忠報主為規來征湖廣時手製汗衫遺之云非為不足汝所特使汝知我尚康庶得安心王事不以我老為念耳及凱還復戒以毋自矜伐以全居美之道母賢而子並顯真盛事也靜志居詩話漏侍御瑜潛迹江湖締交耆舊宣德中在烏墩為九老之會時趙嶬伯髙年九十一吳煥汝文年九十趙岐伯通年八十九孫孟吉兆禎唐其諒年八十五水宗逹朝宗年八十二叔瑜與壺敏中行錢郁耀宇年皆八十餘時人有詩紀其事云景迫桑榆盡日間更邀同志效香山尋常樽酒頻酬勸適意林泉任往還心逺自忘塵世事年來不鎖利名關莫言九老非前比養得天和總一般流傳以為佳話嶬宋安定郡王後洪武中官儀鸞司序班岐安康郡王後孟吉革除間太常博士其諒革除間以文史院出署天長丞郁湖廣石門知縣嶬煥孟吉敏皆烏墩人岐青鎮人宗達吳江人其諒鳯陽人郁臨安人烏墩一曰烏戍亦曰烏鎮又曰烏陀青鎮即青墩也宛委餘編杭州耆老會在正統間大理正卿郎子貞八十一封吏部員外郎孔希德八十禮部郎中蔣廷暉七十八處士項伯藏九十三孫適郭文敏皆七十三又有稽勳郎中鄧林布政使姚肇以寓公與會而年不及水東日記商𢎞載輅家藏宋時公牒一紙內凡朝廷語言皆朱書蓋其先本西夏人以獻密有功送浙中意與今安插降人相類所居淳安族頗繁衍蓋四百年於兹矣菽園雜記商文毅公輅父為府吏公生時知府夜遙見吏舍有光迹之非火也翼日問羣吏云商某生一子知府異之語其父善撫之後仕至大學士天順初罷歸有醫善太素脈公命診之云歇祿十年當再起成化初復起入閣數年致仕玉劍尊聞商文毅致政歸劉文安定之見其子孫多賢嘆曰吾與公同處未嘗見筆下妄殺一人宜子孫若是萬厯野獲編景泰自郕王即位推恩藩邸舊臣以審理正俞綱為太僕寺少卿嘉興人也以伴讀俞山為鴻臚寺丞秀水人也二邑俱附郭同時同姓綱以生員習字選山以舉人副榜起綱次年即以兵部左侍郎入內閣山次年亦至吏部左侍郎為經筵講官尋因易儲綱加太子少保山加太子少傳俱為宫銜二品而不得正拜六卿然得兼支二俸後山密請復儲不聽遂引疾以優禮致仕天順元年卒綱於天順復辟再起南京禮部左侍郎成化二年致仕十四年卒賜祭葬如例則景泰舊臣所無者綱字元立山字積之湯斌明史稿孝惠皇太后邵氏杭州昌化人知書年十四聘者七人皆死一指揮聘之已上馬迎矣墜而死其父林充漕卒擕至京師入掖庭成化十二年册為宸妃二十三年封貴妃生興王祐杭岐王祐榆雍王祐橒世宗入繼大統上尊號曰夀安皇太后封弟喜昌化伯嘉禾徴獻録安妃姚氏名妙莊嘉興人父敬生妃有異徴嘗因盥潄見靧水中羽扇夾兩旁日月雲霞爛然五色長而端靜家貧習䌟績貿易每出必俟日中後市囂屏息乃就市行止必從中道目無忤視人多奇之年十五憲廟遣中人懷恩選淑女江南妃名上籍中素寡髮不盈尺一夕髮長委地入宫生第九皇子夀王祐稽尋拜安妃父母皆已物故惟敬弟玉之子福員貧甚販菜於市詔下有司訪親屬物色得之即授錦衣衛千户時人為之語曰誰氏子賣青梅朝藍縷夕錦衣王以𢎞治四年册封藩邸在蜀之保寧妃亦從之尋薨諡曰端懿福員子錦孫承勳皆世襲承勳子思孝無子工部尚書思仁蓋福員五世孫也西園雜記成化庚子浙江鄉試填榜第一卷得餘姚王冡宰華時憲長楊公子方以華儒士抑置第二而以仁和李亞卿旻為榜首明年辛丑王狀元及第至甲辰科李亦及第一科二狀元盛矣李之會試也癸卯冬十二月發舟行至毗陵同行二人好飲博相忿爭一人持刀刺之誤中李肩李驚悔即别二人返舟扺家已嵗除矣甲辰新正親友促其行李乃齋沐禱於響卜以決行止至清河坊北有唱新狀元花生滿路來者李聞之即治裝初六日起程二月扺京明日赴部投文則席舍圖已挂部中不納李苦告尚書云汝第往觀席舍圖有空處便收汝李亟往觀圖尚缺其一禮部方為收卷填圖尚書笑曰那爭汝一個作狀元耶是春果及第間中今古録吾浙狀元自正統元年丙辰科周旋十年乙丑科商輅成化十一年乙未科謝遷十七年辛丑科王華二十年甲辰科李旻五人之中周與商王與李俱同鄉舉一舉兩狀元固可美而商謝李俱發解首商之三元開科以來一人商與謝又皆入閣尤為盛事也玉劍尊聞有以王華同年事誣毁華者人謂華當速白王曰若白之是我訐吾同年友矣是焉能凂我哉竟不辨華四世祖性廣東參議洞苗為亂死之曽祖與凖精於易嘗筮易得震之大有曰吾後再世其興興其久乎七修類稿浙省十一府七十二縣一州成化間分縣後共七十六矣有演成歌括云杭九嘉湖七台嚴皆六邑寧衢與溫五紹金八處十菽園雜記浙江銀課洪武間嵗辦二千八百七十餘兩永樂間增至七萬七千五百五十餘兩宣德間增至八萬七千五百八十餘兩後鎮守太監李德兵部尚書孫原貞奏坑户實辦銀二萬五千七百九十餘兩賠納六萬一千七百八十餘兩正統間減數止辦三萬八千九百三十餘兩景泰七年實得一萬六千零六十五兩天順六年三萬零四十八兩成化三年奉敕辦銀二萬一千二百五十兩成化五年減數一萬零二百三十七兩有竒因太監盧永之奏也未幾又奉敕照天順六年三萬四十八兩成化十九年又因太監張慶之奏照成化三年二萬一千二百五十兩以後額辦處州府所屬各縣二萬一千二百五十兩溫州府泰順縣九百九十一兩八錢共二萬二千二百四十一兩比之成化三年額數多九百九十一兩𢎞治三年減免一萬一千四百兩止辦解一萬零八百四十一兩又禁取額外耗銀三千餘兩從巡按御史暢亨之請而刑部侍郎彭韶核實其事也續停驂録天下稅糧共二千九百四十三萬餘浙江一布政司二百七十五萬二千餘當天下九分之一篝燈碎語𢎞治四年浙西大飢致仕太子少保禮部尚書餘杭鄒康靖公幹疏聞乞差官體勘災荒地方寬免今年租稅敬皇帝嘉納之敕有司綵帛羊酒存問萬厯野獲編𢎞治五年壬子浙江鄉試首場遇大雨漂沒號舍不能坐立士子譁擾競散而出約束之不能止監臨御史監察憲臣俱欲罷試左布政劉大夏曰暴雨必有息時可令自揣能文者聽其願留勿隨衆去當以留者為凖閲其文登榜於是留者尚有八百餘人悉命還號舍雨果止於是仍如額取足數比出榜人謂得人勝他科兩湖塵談𢎞治初鏡川楊公守陳以少詹事視院篆碧川楊公守址以侍讀掌南京翰林縉紳相語以為兄弟對掌南北詞林近世所未有碧川有詩曰天風吹斷鴈鴻行霄漢平分兩玉堂小弟初懷南署印大兄又綰北門章纍纍不是權家客奕奕同依帝德光仰止前修稱二趙絲綸對掌並流芳西園雜記楊守陳為學士弟守址從弟守隅守隨子茂元茂仁皆相繼登進士同宦於京好事者作春聫以侈之云半壁宫花春宴罷滿床牙笏早朝回後文懿官至吏侍守址至吏書守隨至工書諡康簡守隅至大理卿茂元至刑侍茂仁至按察使皆有賢名昆弟子姓一時之盛江浙文獻之家鮮能儷焉先進遺風謝文正公遷初入翰林有御史驟升都憲臺中循例丐公言為賀公諗其人素不為公議所與竟辭不作萬厯野獲編謝木齋遷之相也以丁憂召用時𢎞治乙卯尚為侍講學士從五品特起以少詹兼學士入直內閣因服未滿留家半年扺京甫到任即升正詹二年即晉太子少保兵部尚書東閣大學士一時大臣崇進未有如此之迅捷者玉劍尊聞雁山五珍謂龍湫茶觀音竹金星草山藥官香魚也朱太守諌無宦情嘗曰豈以五斗易我五珍見聞紀訓歸安施相之名佐翊之名佑兄弟俱為知州致仕家居田産參差有唇齒之隙親友日為處分不能解同邑溪亭嚴公鳯素以孝友著聞事兄如父是時偶過翊之舟中語及産事公頻蹙曰吾兄懦吾正苦之使得如令兄力量可以盡奪吾田吾復何憂翊之乃惻然感悟遂拉溪亭同至兄宅且拜且泣深自悔責而相之亦涕泣慰解各欲以田相讓遂友愛終身靜志居詩話項襄毅忠以功業顯其里居日結檇李耆英之會月一集於僧房道院中同會者雲南布政司參議金禮敬之四川按察司僉事梅江文淵福建按察司僉事戴祐元吉漳州知府薑諒用真武岡知州伍方公矩碭山知縣包鼐汝和通判湯彥和教授陳蒙福主之者公也始於𢎞治戊午春所賦詩文文淵彚為一集府學教授新淦蕭子鵬序之比於香山洛社云嘉禾徴獻録沈氏秀水人聰慧能屬文少選入宫為女給事中孝宗嘗試六宫守宫論沈文最佳其發端云甚矣秦之無道也宫何必守哉上悅擢為第一弟溥為貢士就試春官沈贈以詩云自少辭家侍禁闈人間天上兩依稀朝隨鳯輦趨青瑣夕捧鸞書入紫薇銀燭燒殘空有淚玉叉敲斷竟無歸年來望爾登仙籍同補山龍上衮衣時競傳誦之靜志居詩話南元善大吉好青紫囊書妙善占基其守紹興謂窆石非禹葬處别於廟東南建豐碑題曰大禹陵其後望秩於是處焉杭州府志仁和縣學石經正德中巡按御史張承仁欲徙置府學教諭李璧力爭之承仁曰吾徙府學非私之也何執焉璧曰璧官仁和學知為學守故物而已他非所知也承仁怒欲撻之璧曰官可去身不可辱去官而移石經非典守責矣官猶在也豈可以威奪乎承仁異之事竟寢逮璧去後巡按宋廷佐遂遷之府學萬厯杭州府志正德十五年御史唐鳯儀巡按浙江時胡世寧初起拜湖廣按察之命未上鳯儀重其人欲為建坊世寧謝曰賴主上寬仁得免罪戾幸矣何以坊為唐有僕射褚遂良者里人也當時諌易后忠莫大焉明四川按察僉事王琦兵部郎中項麒皆與同里清望重一時若移樹坊之工為三公表世教民風所益良厚鳯儀遂為樹忠清里坊於褚家堂南巷口禪寄筆談胡端敏公世寧志節清峻以昌化諸生中鄉試第二登進士方舉時牌坊路費例百金公以嵗侵僅受五十金公起家力田即迥異儔輩如此今言王陽明守仁初見宸濠佯言售意以窺逆謀宴時李士實在坐濠言康陵政事缺失外示愁嘆士實曰世豈無湯武耶陽明曰湯武亦須伊吕濠又曰有湯武便有伊吕陽明曰若有伊吕何患無夷齊自是陽明始知宸濠逆謀決矣乃遣其門生舉人冀元亨往來濠邸覘其動靜益得其詳於是始上疏言臣據江西上流連嵗盜起乞假臣提督軍務之權以便行事意在濠也司馬王晉溪知陽明意覆奏稱王某有本之學有用之才今此奏相應準允給與旗牌便宜行事江西一應大小緩急賊情悉聽王某隨機撫勦以故濠反陽明竟得起兵擒賊捷奏歸功本兵新都故不喜晉溪見陽明奏遂怒故封爵久不行四友齋叢説陽明既擒宸濠囚於浙省時武宗南幸駐蹕留都中官誘陽明令放還江西以待聖駕親征差二中貴至浙省諭旨陽明責中官具領狀中官懼其事乃寢因張燕於鎮海樓酒半撤梯出書簡二篋示之皆此輩關通之迹也盡數與之二中貴感謝不已返南都力保陽明無他遂免於禍緒山文録敘説陽明先生甲申年居越中秋月白如洗乃燕集羣弟子於天泉橋酒半行先生命歌詩諸弟子比音而作翕然如協金石少間能琴者理絲善簫者吹竹或投壺聚算或鼓棹而歌逺近相答先生顧而樂之遂即席賦詩有曰鏗然舍瑟春風裏點也雖狂得我情先生自辛巳年初歸越侍者尚寥落既而四方來者日衆癸未以後環先生之室而居每一室常合食者數十人夜無臥所更番就席歌聲徹昏旦南鎮禹穴陽明洞諸山逺近古剎無非同志寓遊之地解頤詩話王陽明嘗遊一僧寺見一室封鎖甚密欲開視之寺僧不可云中有入定僧閉門五十年矣陽明固使開視之見一僧儼然如生貌酷肖已曰此豈吾之前身乎既而見壁間一詩云五十年前王守仁開關即是閉關人精靈剝後還歸復始信禪門不壞身陽明悵然久之建塔以瘞而去見只編劉方伯炌居官最廉嘗見其手録私記自縣令以至藩司每官識其所積蓋守令積俸亦有數百金若臬副至方伯每任不過百金而已鄭端簡公曉撰方伯父威縣公墓志以縣令進部郎尋卒盎中止餘脫粟數斗不能具殮清白家風傳之有素也四友齋叢説章朴菴拯清操朴略與楓山等其致仕回家有俸四五百金楓山知之大不樂曰汝此行大有生息朴菴有慚色見只編鄭端簡公曉家規雖宴貴客不使粉墨登場雖給用有羡不營子母之利雖子孫繁衍無一人入歌妓之室者此規至今行之誠縉紳家久逺之藥石也長興縣志長城縉紳大家城中有三曰顧大司冦應祥姚京兆一元徐方伯中行司冦位望差勝京兆而京兆子孫繁衍彬彬文彩大勝司冦京兆與方伯同時里居方伯坐客恆滿京兆杜門不妄交一人家法清肅即諸孫方童自鄉孰歸入揖必正衣冠見之有萬石君家風靜志居詩話韋南苕商臣世為廉吏時以比胡威父子歸田後與蔣恭靖瑶劉清惠麟孫僉事濟蔡同知屺唐主事樞陳參政良謨顧尚書應祥吳太僕龍朱太守懷幹張通政寰施知州佑李知縣丙吳副使麟參政龍一十五人結峴山逸老之社雖饎㸑不給而春秋必赴能不改其樂云靜志居詩話徐東濵咸為豐崖同母弟昆友皆嫺風雅歸田後築園城闉名曰餘春中疊石為小東山與錢東畬太守朱西村山人輩結小瀛洲十老社其後倭人入冦所在焚儲積遂舍園基以為倉焉嘉興縣志屠應埈居秋涇有鄉人貧甚負其子孟元銀以屋基及小塋立契償之其子故長者不肯受曰吾當另酬汝直前銀不復追也鄰人不勝感激及埈歸鄰人來訪訴其子之厚德埈曰房已售爾今何居曰移某所埈命其子取還前契且為築其墳基玉劍尊聞明制不得兼封本生父母諸大綬修撰滿考疏請貤封情詞懇惻肅皇許之生母卒制不得服大綬衰絰疏水不赴闕當事矜其情為請於上得服本生嗣是廷臣凡為人後者咸得貤封及服本生人推大綬為孝能錫類簣齋雜著常濵何侯祉涖郡有萬參政廷彩者欲加賦嘉興什之一名以濕潤嘉興賦六十萬餘其濕潤亦六萬餘而濕潤例自湖州守劉公天和病取民之濫也欲為畫一令於平米外輸十一繼守刻核謂是已在官遂令正支萬公謂嘉湖一也於是白巡撫欲如湖例用代浙東災傷之輸運艘渡江之費檄下侯曰嘉興固無濕潤非湖比也乃自治文書陳不可狀萬公怒以為抗已督責愈嚴間以言侵侯侯弗為動因又陳之御史逹撫臺咸如議報罷萬厯野獲編吾浙科名最盛嘉靖戊戍慈溪袁元峰煒以鄉舉第二人登會元廷試探花刻一印記曰天下一二三人向來無與為對者至萬厯已丑會稽陶石簣望齡繼之其鄉會大對名次與袁不爽相去五十年又同二百里內人也後又十五年而慈溪楊崑阜守勤亦以鄉試第二登甲辰會狀科名又勝袁且同一邑志趣亦頗相似云又有楊守址為鄞縣人以鄉試第三登成化戊戍會試第四廷試第二亦分占三名而少第一其嫡兄守陳已先中浙江解元恰補之後守陳守址同官詞林又同為翰林學士對掌南北詞林印且與袁文榮同郡亦浙中佳話也窺天外乘有一邑而前後盛事若合符節者台州金學憲賁亨三子長立愛次立敬又次立相俱中式計偕立愛立敬俱第立相次科亦中俱官南都迎父以養又王宗沐三子長士琦次士嵩又次士昌亦同計偕士琦士嵩俱第士昌次科亦中討桂編倭巢沈莊總制胡公宗憲覔善説者衆莫應庠生沈維錡慨然請往胡問汝何䇿以動之錡曰倭巢錡室當以主人禮進錡有繞舍田數百畝因冦荒蕪國課無措誘彼屯田徐圖説之胡服其議錡儒服入倭叢中為敘主客禮談論頗洽因説以耕種之利并為畫久逺計而隂俟大兵四集後卒殲倭實錡本謀也戒菴漫筆蔣生名洲字信之陳生名可願字敬修皆鄞人同為郡庠生嘉靖二十九年倭人王直冦邉無虛日言官奏請懸立賞格曰有能生獲王直者豫萬金封伯有能使海致王直降者豫世襲指揮僉事人難之莫敢行蔣生請行又薦陳生行三十四年八月以蔣生為正使陳生副之充市舶司員率若干人以往九月出鄞江桃花渡至馬觜滙風颶舟半覆得救起至小衢山遇冦二生率衆與戰賊敗去則兵器火藥等大半耗矣乃回舟舟山蔣生念緩急惟已移書家人貰田産備具官為給劵紀之凡六日夜入大洋又四日抵五島其長來見譯知上國使甚修禮敬二生因諭宣諭日本王意其長曰日本王權在豐後山口二國當往諭豐後山口天使行吾以船人導則又密知王直處使密使往諭直來殊倨傲又密諭之曰即不念汝祖宗墳墓獨不為老母妻子計乎今中國知汝出無奈不甚罪汝募汝歸誠以此時歸正朝廷豈薄汝將官之海藩節鎮矣乃借區區數島與中國之衆久抗衡不祥莫甚况倭情貪狡即一日下片紙檄曰能以叛賊某來者勞千金恐汝頭與貢使俱北也去醜穢而就榮名孰與身死纍老母妻子哉直悟謹拜諾因定歸計二生與直同行二國先至平户平户長禮敬導送如五島會聞巨賊徐海且率衆入冦恐我軍無備三十五年春陳生先以王直子滶養子毛臣葉宗滿王汝賢善譯辨者夏正等歸報已而蔣生行至博多知山口國荒亂不可往謀先往豐後國豐後王源義鎮與山口王源義長兄弟也源義鎮接蔣生禮恭蔣生曲諭以邉冦利害義鎮引罪會山口國使來蔣生又至山口源義長接禮尤恭又會同豐後禁諸倭冦邊又遣使修貢獻以謝罪三十六年蔣生以王直歸歸途安焉無盜賊如去時方陳生歸時適徐海冦桐鄉桐鄉大困都御史阮鶚困不知計陳生及夏正説海而解其圍計擒海等又葉宗滿覆舟山賊黨皆陳生以賊攻賊云王直至城下猶觀望持兩端時直衆猶盛乃胡宗憲與王滶等同臥起甚交歡遂授計夏正為好辭以滶易直乃執之竟論誅死王滶亡海葉宗滿王汝賢末減論戍直死時再呼蔣洲陳可願誤我誤我直誅而黨與散矣當時有害功者并二生譖之漫為蜚語二生竟落格廢賞宗憲為之輸粟為太學生天啓平湖縣志沈坤居平湖之西麓家頗饒嘉靖間以門戶充役集收銀米遇嵗飢坤悉散家資并所收銀米以療飢民官督之無以應甘罪獄中會倭冦猝臨總督胡公募勇敢之士聞坤名出獄留幕下一日值戰王江涇我軍失利胡被圍坤子惟敬甫弱冠單騎突圍中挾胡而出胡益愛重坤授千總職部兵三千父子設計偽裝犒軍藥酒手執公文經倭營度倭追將近棄舟度水走倭得酒喜爭飲而死者無算靜志居詩話嘉則沈明臣文長徐渭同在胡少保宗憲幕府並受知遇督府周防嚴密文長恆戴敝烏巾衣白布浣衣非時闖入或出昵飲夜深猶開戟戶以待嘉則嶽嶽不阿少保遙望見必起立嘗宴將士於爛柯山酒酣樂作嘉則於席上賦凱歌十章吟至狹巷短兵相接處殺人如草不聞聲少保起將其鬚曰何物沈郎雄快乃爾命刻石置山上列朝詩集小傳茅順甫坤自命有文武才好談兵事嘉靖末年東南中倭胡績溪為制府以同年生虛心咨訪料敵設諜用順甫之䇿為多順甫亦沾沾自喜以為扣囊砥餘智猶足以辦倭也歐餘漫録孫太初一元寓武林南屏山常畜一鶴自隨與許給諌杞泉子相卿善許為置田三畝嵗輸粟於萬峰深處以充鶴糧而作劵與之曰太白山人鶴田在九杞山書院之陽倚山面湖左林右塗廣從百步計嵗入粟三石有竒以其竒為道里費而歸其成數於杭之西湖南屏山歉嵗則汰其半以主人潤筆金取盈焉佃之者主人之鄰某輸之者主人之僕某董之者主人之弟某主人謂誰山人之友杞泉子許台仲甫也後太初開籠調鶴飛去乃用唐人想伊只在秋江上之句首尾作詩六律兩人風趣雖林君復亦當欣讓矣見只編許九杞先生相卿以敢諫肥遁最為夏文愍公言所重文愍再召道經嘉禾以書致先生與決進止時藩臬郡縣艤舟祇候道相望也先生葛巾荔帶刺一小舠詣夏夏問僕此出何如許不答苐言可惜李長源受觀察判官夏正襟起謝曰便當疏辭以奉明教須臾撾鼓回帆諸祗候一時星散夏憮然遂不果辭卒及於難靜志居詩話京尹查性甫秉彛為諸生時夢受杖暗室中仰見廟額懸天上春回四字後任户科給事中上疏劾嚴氏父子詔廷杖六十謫定邊典史恍憶前夢因賦詩云九重天上春回日二十年前夢裏身榖山筆塵山隂大司馬吳兑新鄭髙拱門人也隆慶丁卯新鄭為華亭徐階所逐門生故吏無一敢送者惟吳送至潞河舟中握手垂泣而别玉劍尊聞吳司馬兑居塞上熢燧頻告檄書紛然將吏還集方閉户就睡意飽後起據案酬務應機曲當玉劍尊聞大司馬郭宗臯甚貧其長子學書不成無所資賴故人同里咸薄其落魄乃走宣大軍門求見吳兑自效吳憐而收之存恤甚至每與諸將大會面命曰若等母以郭公子厄不相提挈視之當如吾子兑嘗言吾總六鎮錢流沒踝為富翁易耳每思多財則多田業僮僕徵責訟訴嵗且百出守之甚勞居之甚苦今雖稍貧然省事少爭其樂差勝耳家居十餘嵗未嘗入郡郭就見長吏韻石齋筆談項元汴墨林生嘉隆承平之世資力雄贍購求法書名畫及鼎彛竒器三吳珍祕歸之如流癸酉嵗兵至嘉禾項氏纍世之藏盡為千夫長汪六水所掠蕩然無遺萬厯野獲編浙東誠意新建二家俱世襲劉傳至裔孫世延以狠戾好訐逐回青田受錮後始得釋王氏封而旋奪至隆慶初始復故爵其子正億得襲子承勛繼之彤史拾遺記神宗皇后王氏餘姚人生京師父偉以后貴封永年伯萬歷六年孝定太后為神宗擇配册后為皇后后性端謹上因承平久天下無事中年好靜攝一切章奏盡留中不下后封識藏弆每語一事即隨取上之光宗在東宫危疑數矣后調護備至且善事太后得其歡心上寵幸鄭貴妃置之不較宫中皆稱后盛德比孝貞焉后與新建伯守仁同族時守仁孫承勛方襲爵上嘗問后家有官乎后對曰猶記新建伯妾猶子行也見在京翼日召見坤寧宫賞賚甚厚時稱餘姚王氏有二伯聞者榮之玉劍尊聞孫文恪妻楊氏為詩麗而則教諸子如嚴師礦嘗戒其友曰以札來者幸母詭母謔歷吾母而後及我慎之也由此子姓所交無匪人所聞無匪言玉劍尊聞倪凍字霖仲上虞人户部尚書元璐之父也為荆州太守相居正卒羣張栗甚屬所親乘間言倪笑曰往者令傴僂致恭事即不可知茍云強項又何虞乎待羣張有加田千頃為勢家所侵悉徵豫之人以是服倪厚德玉劍尊聞丁賔為句容令當嵗大歉輕輿簡從遍歷下户噢咻勞來至一舍進麥飯棘口賔飽嘗而倍酬之比過其鄰出白粲新韭賔嘆曰胡不均乃爾責其人分五斗遺進麥飯者臨海縣志萬歷癸未甲申間大宗伯秦公鳴雷冡宰何公寬少司空金公立敬少司冦王公宗沐俱在林下時人謂之四京堂倣古九老耆英終日稱觴聚會談涉時事與人短長輒默不置一言其風致如此萬厯嘉善縣志邑民李懷玉等始為真率飲尊齒德也適孫詢致政還改為耆英文會約里中斑白知禮讓者十二人按一年月朔之數併詢為十三則餘閏也月朔謀小酌自初至末周而復始其日不宰牲不用樂不戲言不談世務殽以魚肉果以時品命子弟講禮讀法歌詩撫琴習奢惡儉者弗與焉嗣後此會不復再舉至萬歷丙申邑侯章士雅加意敬老延邑士大夫之耋耄者為耆英勝會時與會者盛唐八十八曹德修八十五吕洙八十一薑圻八十一孫嵐八十八張可大八十三凡六人市廛皆結綵列綺筵張聲樂社師率童子歌南山之章邑中侈為曠典焉萬厯野獲編萬歷壬辰孫立峰鑨拜吏部尚書紹興餘姚人也左侍郎羅康洲萬化則紹興之會稽人右侍郎陳心榖百年則又餘姚人一時同領銓柄最為我浙盛事未幾孫去位而陳即以南冡宰改北孫之前又平湖之陸五臺光祖亦浙人也此後不可得矣萬厯野獲編父子得諡以為盛事然未有三世得之者餘姚孫氏第一世右副都御史贈禮部尚書諡忠烈燧第二世南京禮部尚書贈太子少保諡文恪升第三世吏部尚書贈太子太保諡恭簡鑨且世以忠孝清白見稱鑨兄弟四人俱致位列卿名德無忝真盛事也靜志居詩話劉蕺山先生宗周家居恆服紫花布衣士大夫爭效之布為長價吳江趙士諤知會稽縣嘗問先生疾造榻前出而嘆曰豈意今日得覩管幼安萬歷丁巳京察議及先生士諤時為考功郎爭曰劉大行之清節人所不堪此士諤所親見者乃止象山縣志萬厯末年邑大疫忽一人儒冠道服貌甚修潔語人曰西城內行祠後樟木大可數十圍枝柯覆出城外蓋千餘年物也久飫霜雪其性清涼可消疫氣曷削其皮煎飲焉如其言服之果愈疫乃息其人不言姓名後亦不知所往人疑為仙家者流肖像行祠祀之稱為樟樹先生朱彛尊徐先生墓志崇禎三年秋漳浦黃公道周來典浙江鄉試榜既放以力學朂門弟子久之公以言事獲罪出至杭州愛大滌山治精舍著書門弟子皆從講學其後忠節則慈溪劉振之而強錢塘姚竒引有僕經術則海寧朱朝瑛美之仁和孟應春長民餘姚何瑞圖羲兆書法則嘉興汪挺之無上而徐先生伯齡節之以詩畫頡頏其門靜志居詩話倪元璐尚書晚築室於紹興府城南隅窗檻法式皆手自繪畫巧匠見之束手既成始嘆其精工時方患目疾取程君房方于魯所製墨塗壁默坐其中堂東飛閣二層扁曰衣雲憑闌則萬壑千嵓皆在舄下適石齋黃公至越施以錦帷張燈四照黃公不怡謂公國步多艱吾輩不宜宴樂尚書曰會與公訣爾既北行遂殉冦難池北偶談寶應喬聖任可聘崇禎中以御史巡按浙江至金華遇山水暴漲舟不得進索挽舟者縣令盛王贊呼曰農忙矣令請以身挽喬遂改而陸行仍薦之於朝時兩賢之下方寺志余煌跋三元雲臥額云寺負山面流竒石鑱削梧竹蓊鬱為山隂第一名剎士人多僦僧寮以為藏修地先是山隂南石俞公咨益聚徒寺中羅公萬化張公元忭皆從之遊隆慶戊辰羅廷試第一越三年辛未張廷試復第一嵗甲子煌亦肄業此地明年乙丑臚唱亦先多士煌自揣疏陋何能繼兩先生芳躅而回念斗室嘯歌先後科名相望爰新其廬顔曰三元雲臥亦足紀一時之盛云西河詩話吳鍾巒進士崇禎末為廣西按察使甲申以後遁至舟山中夜起自念潰然驚曰吾同窗馬素修門下生李仲逹俱已殉節吾年垂八十一旦疾病身死將何以見數君地下急呼僕取火視已面曰吾不病否僕曰不也乃伸紙作數詩且為札召同行者飲於寓飲畢别去遂燔山中薪而竄身其中其一詩有云只因老友相從急故遣臨行火浣衣聞者流涕鍾巒字巒稚毗陵人池北偶談順治甲午浙江熊鍾陵伯龍主試一榜狀元及第者三人乙未史大成鄞人甲辰嚴我斯歸安人庚戍蔡啓僔德清人象山縣志康熙壬辰五月朔亭午無雲而雷聲甚烈望之擊西山千丈巖下次日有好事者登山覔之得一小石碑長尺餘濶六寸許鐫有靈符其碑隂載宋邑令毛遇順為禳災立碑鎮此因捧歸逺近傳視爭以硃砂摹碑貼室中却疫已瘧甚驗置匣貯之藏石窗菴中池北偶談范忠貞承謨撫浙日杭之西溪有虎攫人遣卒往捕一日自詣水月和尚卜之告以故和尚答云山頭大蟲任打門內大蟲休惹范不悟而去未幾遷閩督遇逆藩之變竟以身殉始悟門內大蟲之語香祖筆記武林陸圻字麗京晚號講山隱居賣藥後遊嶺南禮天然禪師法名今龍又常遊溫台諸山中無定所或云有見之武當者終不詳其蹤迹也或以問洪升昉思答以口號曰君問西泠陸講山飄然瓶鉢竟忘還乘雲或作孤飛鶴來往天台雁蕩間香祖筆記會稽女子商婉人能詩工楷法常仿吳彩鸞寫唐韻作草三先草四仙武林沈澗芳為題絶句云簪花舊格自嫣然顆顆明珠貫作編始識彩鸞真韻本草三草四是先仙蘆浦筆記四明奉化縣凡七鄉皆有一管名如曰廣平松賢履信鳴雁黃甘嵩溪靈泉棲鳯他處未聞也天祿識餘明州高亭鹽場在海中或天宇晴霽時見如匹練橫天其色淡白則晴雨中分土人名之曰短篷亦蜃氣之類也象山縣志每嵗六月十二日必有颶風皆云鋸門龍神實主之早禾正穎常為所敗康熙五十一年當事於南門外設牲醴望而祭焉果靜息不為災嗣後嵗禱以為例蘆浦筆記四明城北鹽倉之西有荆次飛廟無碑載神姓氏考淮南子荆有佽非得寶劍還渡江中流暴風揚波兩蛟夾舟佽非謂洫船者曰有如此而得活者乎曰未嘗見也於是佽非瞋目攘臂拔劍曰武士可以仁義説不可劫而奪此江中之腐肉朽骨棄劍而已余又奚愛焉赴江刺蛟遂斷其頭舟人盡活今廟稱荆次飛侯圖經亦謂州北有蛟池故老云蛟嘗自江來窟於此人患之故即其旁立佽非廟以鎮之是則真以為荆之佽非矣然豫觀吕氏春秋荆有勇士佽非蓋是姓佽名非豈應以神姓名為廟號而况加為侯封哉且次與佽非與飛皆不同而好事者附會斬蛟之説以鎮蛟池強名之傳流至今竟未有辨之者漢百官表武帝太初元年更名左弋為佽飛掌弋射則佽飛之名實始此又宣帝紀神爵元年發應募佽飛射士服虔亦謂以材力名官若據建隆中鄞令金翊纂異記謂唐武德時為鄞州至開元中改鄞為明郡名奉化城號甬東地名句章軍號佽飛則此廟必因軍將之有功於人故人為之祠爾官於此者合討論而正其名庶幾神歆其祀也墨莊漫録寶他山去昌國兩潮山下居民百許家以魚鹽為業亦有耕稼有一寺僧五六十人佛殿上有頻伽鳥二枚營巢梁棟間大如鴨鵊毛羽紺翠其聲清越如擊玉每嵗生子必引去不知所之山有洞其深罔測洞中水聲如考數百面鼓鼙語不相聞其上復有洞穴日光所射可見數十步外三韓外國諸山在杳冥間海舶至此必有祈禱寺有鐘磬銅物皆雞林商賈所施者多刻彼國之年號亦有外國人留題頗有文采者洞前大石下有白玉晶瑩謂之菩薩石居易録寒山子有二皆載天台山志其一即寒山拾得文殊化身其一道士李褐遇貧士去數日復乘白馬來謂褐曰頗知寒山子乎即吾是也因話録越州名僧二人一曰清江一曰清晝故號二清七修類稿宋有杭州僧參寥唐亦有道士參寥見孟浩然集唐有蘭亭僧辨才宋亦有髙僧辨才隱天竺見淮海集湧幢小品東坡謂杭州有西湖如人之有眉目王梅溪謂越之有鑑湖如人之有腸胃臨平記臨平古稱重鎮凡鎮皆有屯軍故許村稱寨他可類推矣惜兵制古不可考蓋肇見於唐杭有八都臨平曹信其一也逮髙宗南渡於杭城外俱置戎壘臨平蓋為要地德祐元年元人果從此而入軍於臯亭焉入眀建鋪司於安隱寺西每鋪設兵船一兵四人有事則出哨海門無事則駐防冦賊絶屯戍之擾得捍禦之嚴誠良法也二老堂雜志臨安土人諺云東門菜西門水南門柴北門米蓋東門彌望皆菜圃西門則引湖水注城中以小舟散給坊市嚴州富陽之柴聚於江下由南門而入蘇湖米則來自北關云西溪梵隱志西溪有三橋多植栁濃隂夾道東西兩涯民居臨水花木周廬亦稱花市香祖筆記宋時武林馬塍藏花之法紙糊密室鑿地作坎覆竹置花其上糞以牛溲硫黃然後置沸湯於坎中候湯氣薰蒸則扇之經宿而花放辟寒部餘杭萬氏有水盆一尋常瓦盆耳然冬月以水沃之冰凝成花跗萼檀蘂皆成真花時為梅為菊為桃李以至芍藥牡丹諸名花皆交出也萬氏嵗必一燕客觀冰花焉夢溪筆談錢塘人有一劍削十大丁皆截而劍無纖迹用力屈之如鉤縱之鏗然有聲復直如弦古之所謂靈寶劍也紫桃軒雜綴唐以前自杭至嘉皆懸流其南則水草沮洳以逹於海故水則設閘以啓閉陸則設棧以通行古胥山碑謂石棧自錢塘北扺禦兒之胥口乃其證也至今有石門斗門之名而其迹則湮於阡陌久矣後山談叢浙西地下積水故春夏厭雨諺曰夏旱修倉秋旱離鄉浙東地髙燥過雨即乾故春得雨即耕然常患少耳富陽縣志富春土俗相傳凡近江處若樟巖山赤松山鹿山之巔石上有縴纜痕土中有螺蚌殼驗之不爽因是見鱉子門未鑿則富陽錢塘為巨浸聞家堰未築則諸暨蕭山皆澤國也嚴陵志張又新作煎茶水記載陸羽與李秀卿論水第為二十等而以揚子江中南泠水為第一嚴陵灘水為第十九又載劉伯芻言曰凡較水與茶宜者有七等而以揚子江中南泠水為第一嚴陵灘水不與焉又新自謂嘗挹而比之誠如其説又云客有熟於兩浙者言搜訪未盡嘗志之及刺永嘉過桐廬至嚴子灘其溪至清水色深翠家人輩用陳黑壞茶潑之皆至芳香又以煎佳茶不可名其鮮馥也逾於揚子江南泠逺矣蓋又新所記云爾而歐陽公乃取羽茶經論水謂山水上江水次井水下山水乳泉石池漫流者上江水取去人逺者井水取多汲者又新所載二説與茶經不合疑又新妄附益之今州城北玉泉出烏龍山之麓其水甘香尤宜茶殆所謂乳泉石池漫流者邪惜前此未有知之者菽園雜記嚴州山中灌田之法有水輪其制約水靣至岸髙若干尺如其度為輪輪之輻以細木幹為之每輻出栒處繫一竹筒但微繫其腰使兩頭活動可以俯仰置軸半岸貫輪其上岸上近輪處置木槽以承水溪水散緩則以石約歸輪下使急水急則輪轉如飛每筒得水則砥重口仰及輪至上則筒口向下水瀉木槽分流田中不勞人力而水利自足蓋利器也菽園雜記新昌嵊縣有冷田不宜早禾夏至前後始插秧秧已成科更不用水任烈日暴土不恤也至七月盡八月初得雨則土蘇爛而禾茂長此時無雨然後汲水灌之若日暴未久而得水太早則稻科冷瘦多不叢生山隂會稽有田灌鹽滷或壅鹽草灰不然不茂寧波台州近海處田禾犯鹽潮則死故作碶堰以拒之嚴州壅田多用石灰台州則煅螺蚌蠣蛤之灰不用人畜糞云人畜糞壅田禾草皆茂蠣灰則草死而禾茂故用之嘉興縣志相河俗名相家蕩距城外東塔寺十餘里而塔影現湖中真如寺塔影映射殿壁七層皆具其影倒垂他處無有亦一竒也靜志居詩話柿林今之新城鎮也去嘉興府治西北三十里近城本作塍宋曽魯公嘗監秀州新塍酒稅經鋤堂雜志霅川自唐末五代以來不經兵火此非天幸蓋其地險可守也城外險處南路陸路當守何山嶺水路當守衡山東門當守舊館升山水路當守河口毗山青塘門西門當守法華仁王山路水路當守永夀北門水路當守大錢等處險不能拒然後守城盡拆橋梁輦去石環城港汊皆施樁陸路當掘坑用油泥茭葑暗施鐡蒺藜苦竹槍使之川陸無路舟馬皆不可近城先之以守逺險次之以守近險然後守城是三重城也靜志居詩話王氏為永嘉族望其先世育生七子七子生二十八子二十八子生九十四子九十四子生二百六子二百六子生三百五十子三百五十子生四百九十子其枝葉亦繁昌矣浙江通志卷二百八十
