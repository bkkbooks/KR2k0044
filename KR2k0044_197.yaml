body:
  text: 浙江通志卷一百九十八仙釋一三教雖殊其理則一蓋三歸二諦原本自修抱一守中實參儒訓究其指趣皆足以覺牖羣蒙助揚教化浙地藴靈育秀緇流羽士多托迹於此考宗風而披仙籙其人斯在有可稱述者志仙釋杭州府上古赤松子列仙傳神農時雨師也杭州府志富陽赤松子山相傳赤松子駕鶴往來時憩於此故山以名周董雙成歐陽經妙庭觀記西王母之侍女其得仙不知幾千百年之久而金丹迄今不變富春西北有山秀拔雲煙縹眇邑人曰此董雙成宅也富陽縣志宅即臨湖妙庭觀雙成煉丹宅中丹成自吹玉笙駕鶴升仙邑人立橋望之因名望仙橋宋紹興初道士董行元掘土得銅牌有字云我有蟠桃樹千年一度生是誰來竊去須問董雙成字畫精楷其背有王母乘鳯傍有雲氣亦一竒事云漢張道陵神仙通鑑字輔漢留侯八世孫建武十年生於吳郡天目山時黃雲覆室紫氣盈庭年及冠身長九尺二寸龎眉廣顙緑睛朱頂垂手過膝美鬚髯望之儼然從學者十餘人天目山南三十里西北八十里皆有講誦之堂臨安神仙觀餘杭通仙觀即其地也永元四年樂蜀之溪嶺深秀遂隱其山按方煉龍虎大丹三年丹成年六十餘餌之而容貌益少永壽二年九月九日在巴西赤城渠亭山中太上遣使者并五帝部從持玉册授正一真人之號以盟威都功等諸品祕籙斬邪二劔玉册玉印授其長子衡於雲臺峰白日升天時年一百二十三歲也筆叢道陵教法凡祈禱服罪之人以三符授之一著山上一地下一水中桃俊太平御覽字翁仲錢塘人少為郡吏漢末棄世入增城山中學道遇東郭幼平幼平秦時人久隱增城得道者也教俊服九精煉氣輔星存心之術俊修之道成晉葛洪晉書本傳字稚川句容人性寡欲不好榮利遊餘杭山見何幼道郭文舉目擊而已各無所言時或尋書問義不逺數千里崎嶇冒涉期於必得尤好神仙導養法從祖玄得仙以丹術授弟子鄭隱洪乃就隱學悉得其法後師鮑玄玄以女妻洪洪傳玄業兼綜醫術咸和初選為散騎常侍不就聞交趾出丹砂求為勾漏令乃止羅浮山煉丹優遊閍養著內外篇凡一百一十六篇自號抱朴子因以名書仙苑編珠年八十一兀然若睡而蛻方輿勝覽天竺山乃葛稚川得道之所杜子恭宋書自序錢塘人通靈有道術東土豪家及京邑貴望並事之為弟子執在三之敬搜神後記子恭常就人借瓜刀其主求之子恭曰當即相還耳既而刀主行至嘉興有魚躍入船中破魚腹得瓜刀南齊書孔稚圭傳稚圭父靈産東出過錢塘北郭輒於舟中遙拜杜子恭墓許邁初學記字叔元一名映嘗謂餘杭垂霤山延陵之茅山是洞庭西門濳通五嶽陳安世茅季偉常所遊處於是立精舍於垂霤而往來茅嶺之洞室晉永和二年移入臨安西山登巖茹芝渺然自得有終焉之志乃更名元字逺遊著詩十二首論神仙事嘗與王羲之書曰自山陰至臨安多有金堂玉室仙人芝草左元放之徒漢末諸得道者在焉後人莫測逺遊所終好道者謂之羽化名勝志大滌山其中峰曰白鹿山又名嚴山山有許邁升天壇及丹竈遺迹杜昺洞仙傳字叔恭錢塘人早孤事後母至孝師餘杭陳文子受治為正一弟子夜有神人降云我張顛南也汝應傳吾道法故來授諸祕要昺每入靜燒香能見百姓三五世禍福章書符水應手即驗桓溫北伐問以捷不昺云明年三月專征當挫其鋒溫至枋頭水涸糧盡為鮮卑所躡謂弟子桃葉云恨不從杜先生言苻堅未至壽春車騎將軍謝玄領兵伐堅問以勝負昺曰我不可往往必無功彼不可來來必覆敗是將軍效命之秋也堅果敗隆安中示期化去諸道民弟子為之立碑諡曰明師裴氏姥名勝忘餘杭人嫁西湖農家方輿勝覽姥採衆花醖酒經數年忽有三人至姥所各飲數斗不醉謂姥云豫非常士知姥當仙故來相命因授藥數九姥餌之月餘不知所在王介甫詩緑淨堂前湖水緑歸來正復有荷花花前若見餘杭姥為道仙人憶酒家慧理佛祖統紀咸和元年西天沙門竺慧理至錢塘武林山驚曰中天竺靈鷲小嶺何年飛來此地邪因名天竺山飛來峰建寺曰靈隱仙翁葛洪書額釋氏稽古略有洞舊有白猿呼之應聲而出宴坐之巖號理公巖今瘞塔存焉寶掌西湖髙僧事略中印土人魏晉間東遊自云六百七十三歲周威烈王十二年丁卯生左手握拳有珠在掌中因以為名始抵峨嵋五臺南返衡廬入建鄴與逹摩遇於梁朝遂扣法焉洎來二浙愛天竺之勝結茅而居者四十五年復往匹明天台及諸名山遊歷將遍唐貞觀十五年還竺峰久之移居浦江寶巖顯慶二年正旦手揑一像九日而成與其貌無異即告徒曰吾誓住世千歲自來支那忽四百歲今已過七十有二年矣説偈而化世稱千歲和尚遺記滅後有僧來取吾骨勿拒越五十四年刺浮長老至彼作禮塔户倐開得其骨皆連鎖金色因持來别建塔藏之為中竺開山始祖曇翼蓮社高賢傳餘杭人初入廬山依逺公後入關中見羅什東還會稽入秦望山誦法華經十二年有女子身披綵服攜筠籠一白豕蒜兩根至師前曰妾入山採薇日已斜豺狼縱橫歸無生理敢托一宿師却之力復哀鳴不已遂令居草牀上夜半號呼腹痛告師按摩師辭以持戒不應手觸女號呼愈甚師乃布裹錫杖遙為按之翌日女以綵服化祥雲豕變白象蒜化雙蓮凌空而上謂師曰我普賢菩薩特來相試郡太守孟顗聞於朝敕建法華寺初餘杭山沙門法志常誦法華有雉巢於菴側翔集座隅若聽受狀如是七年雉殞即為瘞之夜夢童子拜曰因聽經得脫羽類今生山前王氏後其家設齋志方踵門兒曰我和尚來志撫之曰汝我雉兒也解衣視腋下有雉毳三莖七歲出家十六落髮以腋有毳因名以異南北朝慧靜咸淳臨安志本姓邵餘杭人勵行精苦容止可觀顔延之嘆曰荆山之玉惟靜是焉著文翰集十卷僧瑜咸淳臨安志本姓周餘杭人宋孝建二年滅度後十有四日房中生雙桐其徒以為娑羅寶木因號為雙桐沙門吳郡張辨為傳讚曇超佛祖通載居錢唐靈苑山一夕有異人至曰此邦蒙師留蒼生之福然富陽民無故鑿山麓斷壞羣龍之室龍忿不致雨今二百日矣欲法師一往誨龍為蒼生請福豈有意乎超曰此檀越事吾何能為神曰弟子力能吐雲不能致雨超諾之至赤庭山為龍説法俄大雨因止臨溪縣令聞超在辦舟迎之超即日遁還靈苑西湖髙僧事略超姓張氏清河人常夜講經有一老人來聽詰其姓曰我龍也師曰吾此地無水汝能致之乎老人即撫掌泉自湧出今玉泉是也嘉定三年賜號靈悟大師僧旻續髙僧傳天監七年帝以法海浩瀚淺識難尋敕莊嚴寺僧旻於定枯上寺纘衆經要鈔八十八卷咸淳臨安志本姓孫富陽人普通後隱居虎邱時蕭昂出守吳興欲過山展禮旻曰吾山藪病人無事見二千石堯遁去寶逵髙僧傳號利利法師以持密咒為恆務其院中有印沙牀照佛鑑浙江潮大至激射湖上諸山逵哀其桑麻之地悉變為江遂誦咒止之夜有偉人玄冠未衣謂逵曰師慈心為物員聞命矣自爾西岸沙漲彌年還為百姓殖利後罔知所之隋貞觀西湖髙僧事略字聖逹錢塘范氏世本顯仕師生有奇相出家通經律論謁天台智者請受禪觀智者以師齊年止為法兄弟開皇十五年於靈隱山頭陀石室宴坐衆建南天竺寺請師居焉是為開山始祖常講法華以為心要感臯亭神請講捨祠宇為佛殿每盥洗餘滴地不為濡人尤異之師有雅操文帝三徴秦王兩延皆以疾辭大業中因山行自標葬地夢與智者同輩翼佛還山覺而嘆曰吾六十二應終以講法華力延一紀今七十四生期畢矣中夜入寂塔在東岡天中記貞觀左掌仙丈右掌人字口流津液充潤榮府八歲通詩禮和庾尚書林檎之作沙門洪偃謂曰顴髙多知耳白有名我有四絶爾具八能謂義導書詩辨貌聲恭是也時人語曰錢唐有貞觀佛法當天下一半唐徐五真人東天目志兄弟二人號大徐五小徐五大歷初於東天目山學道上升後梁乾化中建太清觀即今紫陽宫又有石室嘗見陰靈怪氣生於白晝乃其修仙煉丹之所妹徐仙姑隱於東天目山北有石菴與深坑相鄰形若道家輪藏姑於此成道徐靈府全唐詩傳自號默希子錢塘人西天目志靈府由天目趨天台憩雲蓋二十餘年俄結廬層石屬睇松竹外環池島名以方瀛修煉其間作言志詩辭武宗之徴絶粒久之凝寂而化著元鑑五卷及三洞要略馬湘續仙傳字自然杭州鹽官人世為縣小吏湘獨好經史攻文學乃隨道士遍遊後歸江南嘗醉於湖州墮霅溪經日而出衣不溼永康縣東天寶觀前有大枯松湘指之曰此松已三千餘年即化為石自後果化為石或有以疾告者以竹杖指之口吹杖頭如雷鳴便愈所遊行之處或宫觀巖洞多題詩句後歸故鄉省兄遽卒乃葬於東園時大中十年也明年東川奏劍州梓潼縣道士馬自然白日上升潘先生名勝志潘先生建天柱觀禁樵採為長生林嘗有少年寄止其居六十日不飲食將去傳以異術能知九州內外吉凶既而曰間人何用知是乃却之一夕少年復來授之符篆祛疾法赴之者如市十餘年尸解閭丘方逺吳越備史其先齊人嬰之後也父閏以文學節行稱方逺幼辨慧學於廬州道士陳元悟尋傳法籙於洞霄宫詮太平經為十三篇景福庚戌歲始居餘杭大滌洞彭城王厚加禮遇重建天柱宫俾居之王奏請賜紫又敕賜號元同先生江東羅隱每就方逺授子書方逺必瞑目而授餘無他論門人夏隱言謂方逺曰羅記室令公上客先生何不與之語方逺曰隱才髙性下吾非授書不欲及他事而隱亦盡師弟之禮降聖節前一日王使人以香花至方逺授訖乃入齋中作控鶴坐怡然而逝異香滿室惠明續髙僧傳姓王杭州人少出家後至蔣州巖禪師所一經十年咨請禪法在山經雪路塞七日不食至荆州二虎爭鬬自往分解龍朔年從南山至京不久旋返云往曲江依間修道莫知定所德秀髙僧傳姓孫氏富陽人少棲梵宇留神律府嘗哀鬼神乏食恆以深更施其飲食浙汭之民傾誠畏服及終於定山遷神入塔天降舍利七顆門人以瓶盛之緘於其塔或發之見秀齒上生舍利紛紛而墜後人遂纍甓成浮圖恆有白蛇蟠屈樵牧之童無敢近者道光髙僧傳住杭州華巖寺姓禇氏踰齓出家方冠受具學通毗尼為東南義虎持法華經創塔廟洎沒身不怠也上元二年終於本寺初光未沒其月三日質明支疾凝神依色身觀彌陀具相現在其前至五日曼陀羅華自天而雨道欽西湖髙僧事略吳郡崑山人姓朱氏世服儒業年二十八貢於禮部道由丹徒遇鶴林元素禪師得指入道之要遂出家大悟宗旨久之辭去素曰汝乘流而行遇徑即止師至臨安東北山下問途於樵者曰此徑山也師至東北而登涉重岡西至髙峰北巖中據石牀而坐俄有老人素衣拜於前曰我龍也自師至此吾屬五百皆不安居當挈歸天目願以此地為立錫之所言訖不見北峰之陽有草菴可居蓋龍所造也大歷三年代宗詔至闕下禮遇有加一日在內廷帝至起立帝曰師何以起師曰檀越何得向四威儀中見貧道帝悅賜號國一逾年辭歸杭州即其菴所建寺是為開山始祖示寂後諡號大覺酉陽雜爼道欽住徑山有問道者率爾而對皆造宗極劉忠州晏嘗乞心偈令執爐而聽再三稱諸惡莫作衆善奉行晏曰此三尺童子皆知之欽曰三尺童子皆知之百歲老人行不得至今以為名理道標西湖髙僧事略富陽人姓秦氏年七歲有沙門過而識之勸令出家至德二年詔通佛經七百紙者命為比邱師中選得度居南天竺寺嘗於靈鷲峰之南西嶺下葺茅為堂號西嶺草堂稱西嶺和尚髙僧傳為靈隱白雲峰海和尚弟子經行之外尤練詩章當時吳興清晝會稽靈徹相與酬倡諺云霅之晝能清秀越之徹洞氷雪杭之剽摩雲霄守直髙僧傳字堅道錢塘人姓范氏詣蘇州支硎寺圓大師所受具足律儀是夜眼中光現長一丈餘遲久方滅立願誦華嚴經於中宵夢神人施珠一夥及覺炯炯然如在握後移籍天竺住靈隱峯大歷五年三月寓龍興淨土院謂左右曰至人乘如而來乘如而去示其心然也而愚夫欲以長繩繫白日安可得乎逐告寂道林錦繡萬花谷杭州道林禪師號圓修見西湖秦望山有長松枝葉盤屈如蓋遂棲止其上人謂之鳥窠和尚復有鵲巢其上自然馴狎名勝志元和中白居易守杭入山謁師問曰禪師住處危險答曰太守危險甚白曰守位鎮山河何險之有師曰薪火相交識性不停得非險乎西湖髙僧事略師富陽潘氏子幼出家詣長安西明學華嚴代宗詔國一禪師至闕師謁之得法南歸長慶四年入滅塔於北山喜鵲寺續空西湖志餘吳人本齊君房也唐元和初遊錢塘至孤山寺飢臥莽中有胡僧顧君房曰法師旅况諳否君房拭目而應曰汝何為者僧曰汝不憶講法華經於洛中同德寺乎探囊中出一棗如拳曰食之能憶過去未來君房食訖而寐頃之悟昨講經事遂落髮孤山寺中靈隱寺志續空一作鑑空姓齊名佐韜光七修類藁莫詳族里唐穆宗時結茅杭州靈隱寺西峯巢構塢與鳥窠布毛為友刺史白居易重其道具撰飯之以詩邀師答云山僧野性好林泉每向巖阿枕石眠不解栽松陪玉勒惟能引水種金蓮白雲乍可來青嶂明月難教下碧天城市不堪飛錫去恐妨鶯囀翠樓前其髙致如此菴以師得名會通景德傳燈録杭州人姓吳氏本名元卿德宗時為六宫使見昭陽宫華卉敷榮玩久之倐聞空中有聲曰空幻之相開謝不停能壞善根仁者安可嗜之因願從釋帝曰如果願往選日奏來尋得鄉信言母患乞歸省會韜光法師勉之謁鳥窠即與披剃具戒師常卯齋晝夜精進誦大乘經而習安般三昧尋固辭遊方鳥窠以布毛示之悟旨時謂布毛侍者今招賢寺乃師道場靈祐溈山禪師語録福州長溪趙氏子年十五出家依本郡建善寺法常律師剃髮於杭州龍興寺究大小宗乘教二十三遊江西參百丈丈一見許之入室遂居參學之首後住溈山天下禪學輻湊焉國朝雍正十一年師敕封靈覺大圓禪寰中五燈會元蒲坂盧氏子於并州童子寺出家受心印於百丈海禪師結第於南嶽後住大慈示衆云説得一丈不如行取一尺説得一尺不如行取一寸後屬武宗廢教師短褐隱居大中壬申歲重剃染大揚宗旨西湖髙僧事略師居大慈山學者甚衆山素缺水師擬飛錫夜夢神人告曰勿他之我移南嶽小童子泉就師取用詰旦見二虎以瓜跑地泉自湧出味甘如飴有僧自南嶽至曰小童子泉涸矣咸通三年無疾而逝壽八十三僖宗諡曰性空大師塔曰定慧之塔齊安舊浙江通志海門李氏子生時神光照室有異僧謂曰建無勝幢使佛日回照者非汝乎馬祖見而深器之密示正法後諡悟空禪師指月録住鹽官海昌院有講僧來參師問座主藴何事業對曰講華嚴經曰有幾種法界曰廣説則重重無盡略説有四種師豎起拂子曰這箇是第幾種法界主沉吟師曰思而知慮而解是鬼家活計日下孤燈果然失照義存舊浙江通志號雪峯南安曾氏子嗣法德山嘗結廬鹽官夜光亘天因號光明禪院今雪峯井其手鑿也與巖頭至澧州鰲山阻雪自言初到鹽官見上堂聞色空義得箇入處巖頭喝曰道從聞入不是家珍他後若欲播揚大教一一從自己胸中流出蓋天蓋地去存大悟曰今日始得鰲山成道楚南釋氏稽古略福州張氏子得旨於黃蘗初抵姑蘇報恩寺精修禪定尋住錢塘慈雲光啓間刺史錢鏐請師下山供養僖宗聞其道化就賜紫衣文德元年入寂塔於院之西隅著破邪論行世全宰髙僧傳姓沈氏錢塘人投徑山法濟大師削染及修禪觀得石霜禪師印證入天台山暗巖二十餘年惡鳥革音山精讓窟其出入經行鬼神執役後歸鎮國院終焉五代暨齊物十國春秋一作濟物字子虛杭州人師玊清觀朱君緒受法籙神符祕方後隨入大滌山中依巖洞為室又構垂象樓貯道書幾千卷朝夕討論貫穿精微聽者莫不忘倦忠懿王欲為賜度弟子齊物對曰樂靜已久不願有也所居室壁東西各置一隙采日月光華久之忽語左右曰吾將復往羅浮石樓間矣遂不知所之道翊西湖髙僧事略不知何許人石晉天福四年卓菴天竺山西北草衣木食髙行絶塵一夕見前峯有光燭天迹視得異木人莫能名師乃取之命匠者孔仁謙刻為觀音大士像夜夢白衣人曰雕像已就明日有僧自洛陽來腰間有古佛舍利當求之已而僧果至如夢求之得舍利三夥納於大士頂門自是靈異大著宋治平二年郡守蔡襄表其事上之賜靈感觀音院額可周髙僧傳俗姓傳晉陵人出家建元寺友生勉之曰非其地樹之不生今豫章經謂之江論謂之海胡不往請業乎周遂挈囊逹致遇雲表法師盛集窮法華慈恩大疏日就月將幹運深趣梁乾化二年受杭州龍興寺召開演黑白衆恆有半千武肅王錢氏命於天寶堂夜為冥司講經鬼神現形扈衛往往人覩焉王聞而重之賚金如意并鉢紫衣一副加號精志通明以天成元年終於觀音院本房道潛西湖髙僧事略河中武氏初謁清涼法眼一見異之許入室問答言下開悟法眼曰子向後有毳徒五百為王侯所重尋辭往三衢古寺閲藏經錢忠懿王命入府受菩薩戒署慈化定慧之號周顯德元年建慧日永明寺請師居之為開山始祖衆常五百果符法眼之語永明至宋改名淨慈志逄五燈會元餘杭人幼歲出家臨安之東山朗瞻院嘗夢升須彌山覩三佛列坐初釋迦次彌勒皆禮其足惟不釋第三尊釋尊謂之曰此是補彌勒處獅子月佛師方作禮覺後因閲大藏經乃符所夢天福中抵天台雲居參韶國師賔主緣契頓發元祕一日入普賢殿晏坐有神人跪膝於前曰凡拆鉢水亦施主物傾棄非所宜也言訖而隱自此洗鉢水盡飲之吳越國王召賜紫署普覺禪師住功臣山西湖髙僧事略忠懿王建普門精舍請揚宗要為開山始祖後五雲山新創華嚴道場施以終老出入常擕大扇乞錢買肉飼虎虎每迎之載以還山行修十國春秋號法真泉州人本陳氏子生而長耳垂肩七歲猶不言或曰啞耶忽應聲曰不遇作家徒撞破煙樓耳長至金陵瓦棺寺祝髮受具參雪峯義存至四明山中獨棲松下説法天花紛雨又趺坐龍尾巖百鳥銜花飛繞來杭之法相院依石為室禪定其中乏水卓錫巖際清泉迸出乾祐初忠懿王以誕辰飯僧永明寺僧延壽告王曰長耳和尚定光佛應身也王趣駕參禮行修默然但云永明饒舌俄頃跏趺而化久之肌膚津澤爪髮復長月必三淨寺僧恐其久而毁乃髹塗其骸體崇寧三年賜號崇慧大師宗季髙僧傳俗姓愈臨安人出家欣平寺後往衢州回伉龍興寺召講時僧正藴讓給慧縱橫兩面之敵也與閭邱方逺羅隱為莫逆之交見而申問季作二百語酬之讓正嘆賞遂請開講四十餘年出弟子七八百人漢乾祐戊申歲􅔂終於本房初季眇二目曽夜行感神光引之嘗覽古師之述作曰可俯而窺也遂撰諸經疏鈔别行義章數十卷並行於世延壽惠洪智覺禪師行業記餘杭王氏子兒時知敬佛乘及冠日惟一食誦法華經五行俱下有羣羊跪聽年二十八為華亭鎮將見漁船萬尾戢戢皆易之放於江投翠巖岑公學出世法吳越文穆王聞而慕悅聽其剃髮嘗習定天台天柱峯下有尺鷃巢衣褶中初説法雪竇建隆元年移靈隱又移之永明衆至二千時號慈氏下生十國春秋延壽以心為宗以悟為旨著宗鏡録一百卷又注心賦抱一子若干卷賜號智覺大師西湖髙僧事略師字沖元得法於天台韶國師初住雪竇尋歸西湖忠懿王請為永明第二代居十五年移天台夜施食朝放生六時散花行道日課一百八事未嘗暫廢别號抱一子國朝雍正十年奉智覺禪師敕加封妙圓正修宋張契真神仙通鑑字齊一錢塘人幼孤依上清宫胡法師浮遊江浙上會稽探禹穴歷縉雲遊赤城以訪仙道時朱天師居天台目而器之以其有青骨方瞳因度為道士久之還錢塘居吳山真聖宫周顯德五年受正一明威靈寶法籙於大元樊先生繇是紫蘂玉笈之書無不歷覽名振江浙宋太平興國中召見欵對稱旨賜紫衣以道書魚魯未定詔兩街道録選優學者刋正既畢賜玄靜大師之號管歸真咸淳臨安志錢塘人雍熙初有青衣過之問所從來則曰西人也姓邉氏有點化黃金之術願以為贈歸真曰歷歲綿逺能無變否曰五百年後當復故耳歸真笑曰得不為悮後人耶青衣以手加額曰先生真人也吾有紫府符法今得其人尚可隱乎於是跪而受之不踰年符法大振祥符初詔赴闕行符水法凡病在膏肓者悉為平治後以京師大旱召作法雲龍飛躍膏雨大霈天聖初賜正白先生號四年十月呼其徒告之曰繡衣使者告我功業上逹帝宸今將往任職矣遂偃然而化熙寧中趙抃守杭記其行事沈若濟神仙通鑑臨安人結菴茅山以施藥為務宣和間召對封洞元先生嘗指華陽洞之東隙地曰必葬我於是紹興十五年解化其徒奉治命掘地六尺許得石板大書六字曰沈公瘞劍於此觀者異焉唐子霞洞霄宮志未詳其字宋政和間入道洞霄宫著書名大滌洞天真境録嘉靖浙江通志子霞自號渾淪道人宣和元年詔主洞霄宫明年盜起臨安官吏散走其徒治舟請行曰吾被天子命主此宫守死職也公等第去已而賊至正色叱之遂遇害門人程用光叩閽言狀憫其忠賻錢三十萬贈正素大師王元悟通元觀志自北海來至臨安見吳山有五色雲遂登絶頂趺坐竟日士民乃編茅為庵設三道像供以香花坐一木榻日進一蔬食足不下山者三十年一日召衆曰豫辭世矣乃作偈畢蛻去是為寧壽開山祖也蔡道像通元觀志不知何許人宋髙宗渡江遇風舟不能進問左右曰此去何神對曰三茅山有茅君焉禱之立應後幸臨安之吳山有三絳衣人頃之不見訪其地惟茅庵中有三茅真君像因感江中之事遂賜為三茅寧壽觀選髙行者充知觀事以道像主焉兩浙名賢外録每建金籙齋輒有仙鶴百餘盤旋醮壇之上因賜七寶以鎮其山李笑神仙通鑑字定國寓臨安軍營中以聚學自給暇則縱遊湖山嘗詣淨慈寺過長橋於竹徑迷路見青衣道人劚筍笑揖之道人問所往曰將往淨慈曕禮五百羅漢道人曰未須去且來同食燒筍食之甚美俄風雨晦冥失道人所在少頃雨止而出至寺門覺身輕神逸行步如飛歸舍不復飲食其從兄大猷為諸王宫教授將之任遣僕致書見其顔如桃花且能辟榖以語大猷及大猷至則已去遊茅山矣後又聞入蜀隱青城山大猷為梓路提刑使人至眉訪所在眉守復書云數年前已輕舉乘雲而去白玉蟾紫桃軒又綴本姓葛名長庚閩清人父亡隨母改適雷之白氏因改姓名神仙通鑑玉蟾號海瓊子得翠虛陳泥丸先生之道喜飲酒不及醉博洽儒書究竟禪理大字草書視之若龍蛇飛動兼善篆隸尤妙梅竹受上清籙行諸階法所用雷印常佩肘間祈讓輒有異應嘗遊西湖至暮墮水舟人驚尋不見逹旦則在水上猶醺然也續文獻通考嘉定中命館太乙宫一日不知所在封紫清明道真人唐道録宋度宗敕住持宗陽宮詔爾唐道録品行清真法術精妙特崇道級闡厥元風佑國福民無負職掌爾其欽哉萬歷錢塘縣志道録素以精虔章醮得名沈敬疑仙傳浙右人自幼學道後遊鍾山遇一老姥謂之曰爾骨秀神清心復正後十年當得道與一白石教之曰但以山泉煮此石待軟如藥劑即食之若未軟不得停火言訖不見敬因於山中結茅汲泉煮石不停火几十載石不軟敬乃不煮忽一夜老姥復來謂曰此非常石是瓊樹之實也若虔誠煮之即復軟軟而食即得道矣敬遂齋戒煮至明日其石忽軟香馥滿山敬盡食之頓覺童顔髭髮如漆心清體輕後數日不知所之兩浙名賢外録敬錢塘人延治佛祖通載汝州風穴禪師諱延沼餘杭劉氏從開元寺智恭剃髮受具修止觀定慧宿師爭下之遊名山謁鏡清機語不契見南院俯就弟子之列從容承稟日聞智證後唐長興二年至汝水見草屋數椽田父曰古風穴寺乃留止日乞村落夜然松脂單丁者七年州牧聞其風禮致之上元日開法嗣南院有宋太師者施第為寶坊號新寺迎居焉法席冠天下周廣順元年賜寺名廣惠宋開寶六年八月旦登座説偈至十五日跏趺而逝紹巖髙僧傳俗姓劉雍州人七歲出家於高安禪師十八進具於懷暉律師凡百經書覽同溫習洎入吳會棲息天台四明山與德韶禪師共決疑滯於臨川益公遂請於錢塘湖水心寺住錫恆諷持法華經無晝夜俄感陸地生蓮舉城人曕矚巖亟命搴而蹂之續居上方淨院有疾不求藥石作偈纍篇示門徒曰吾誦經二萬部決以安養為期跏趺坐亡茶毗於龍井山晤恩武林梵志字修已常熟人姓路年十三聞誦彌陀經遂求出家乃投破山興福寺受訓後晉開運中造錢塘慈光寺志因師講貫彌年通逹法華光明經止觀論雍熙三年八月朔日於中夜覩白光自井而出明滅不恆乃絶粒禁言一心念佛至二十五日為弟子説止觀旨歸及觀心儀辰時端坐面西而化慶祥五燈會元九曲禪師餘杭人辨才冠衆多聞強記天台門下推為傑出成化杭州府志姓祝氏受業於祥符寺學南山律兼通六籍史書莊老百氏之學撰髙僧傳三十卷淳化二年預史館集新書五年遷左街僧録智圓佛祖通載字無外自號濳夫生錢塘徐氏八歲受其二十一歲聞奉先源清師傳天台三觀之旨問辨凡二年而清沒遂居西湖孤山西湖髙僧事略師早勤儒學兼涉老莊自號中庸子居孤山瑪瑙院有髙世之節時王文穆罷相來牧郡僧悉迎於關外慈雲遣使邀師偕往師以疾辭曰為我致意慈雲錢塘且駐却一僧聞者嘆服杜門獨居與林逋為鄰友以詩文自娛雜著五十一卷題曰間居編乾興元年二月十七日自作祭文挽詞越二日示寂門人奉遺教斫院之後山斂以陶器合而瘞之後十五年積雨山頽啓陶視之真身不壞爪髮俱長其唇微開齒若珂雪諡號法慧治平二年改院為寶勝紹興二年創延祥觀有司移額山北併塔遷焉師範釋氏稽古略無凖禪師師範生蜀郡梓潼雍氏謁破菴先禪師於平江西華秀峯頓悟元旨住明州清涼遷雪竇詔住育王遷徑山召入對修政殿賜金襴僧衣宣詣慈明殿升髙座説法帝垂簾而聽賜號佛鑑禪師道誠武林紀事錢塘慧悟大師道誠居月輪山撰釋氏要覽三卷又注王勃釋迦成道記丞相王隨守杭有詩贈之契嵩僧寶傳藤州鐔津李氏受記莂於洞山聰公夜則頂戴觀音像誦其號必滿十萬乃寢經書章句不學而能作源教論十餘萬言明儒釋一貫未幾遊衡嶽歸著禪宗定祖圖傳法正宗記書成遊京師仁宗覽之嘉歎付傳法院編次入藏賜號明教韓琦歐陽修延見尊禮之東還居錢塘佛日禪院應密學蔡公襄所請也夢梁録契嵩字仲靈自號潛子熙寧歲季夏入滅以釋氏法茶毗六根不壞者三曰眼曰舌曰童真頂骨數珠五物存焉名其塔曰五根不壞之塔慧辨西湖髙僧事略字訥翁華亭富氏子受業普照從天台韶及浮石矩傳天台教觀韶將老命師代講夢章安以金篦擊其口曰汝勤於誨人當得辨智久之卒繼其席嘉祐中翰林沈公遘帥郡以嚴為理察師道行獨異之俾涖僧職遷都僧正東坡時為通守嘗與師為方外之遊講授二十五年往來常千人無何歸隱草堂但六事隨身而已熙寧六年冬旦起盥濯别衆而化遺戒須待東坡至方可合棺四日坡始抵山中見其趺坐如生頂尚溫暖作三絶哭之師沒二十一年東坡追序其事云余去杭夢至西湖上有大殿榜曰彌勒下生故人海月辨師之流皆行道其間乃作贊辭潁濵銘其塔了元僧寶傳字覺老饒州浮梁林氏為開先暹道者嗣四住雲居曹王以其名奏之神宗賜號佛印錢氏私志東坡在惠州佛印居江浙致書云子瞻負髙才逺放寂寞之濵權臣忌子瞻為相耳人生如白駒過隙三二十年功名富貴轉盼成空何不一筆勾斷尋取本來面目西湖遊覽志餘杭之蠟燭菴聖水寺皆其道場也元淨武林梵志字無象於潛徐氏生而左肩肉起如袈裟縧八十一日乃滅父嘆曰是宿世沙門也幼出家受業於慈雲慈雲沒復事明智年二十五賜紫衣及辨才號太守沈遘謂上天竺觀音道場以音聲懴悔為佛事非禪那居請師以教易之師至鑿山增室萬礎學者數倍居十七年有奪之者逾年奪者敗復以畀師趙抃贊之云師去天竺空山鬼哭天竺師歸道場光輝越二年謝去老於南山龍井之上精修行業行成力具著應非一嘗與僧熙仲同食仲視師眉間有光如螢覽之得舍利元祐八年示寂壽八十一果符初生肩痕之徴塔成東坡志其事法照夢梁録不妄交遊與和靖先生同時僧志圓為友崇寧歲賜號元照大師惠勤續文獻通考餘杭人嘗從歐陽修遊三十餘年修稱其為人聰明才智有學問尤長於詩蘇軾有送錢塘勤上人詩序遵式西湖髙僧事略字知白台州寧海葉氏母夢咽明珠而生出家於東掖山傳天台教於寶雲通未幾繼其席祥符八年刺史薛公請居靈山天竺寺寺久廢師按其舊而新之王文穆出守重師之道奏復天竺名尋請賜慈雲號依經撰集諸懴法盛行於世常行三昧以九十日為期感應非一凡為法祈禱必然指唯存三焉及建光明懴堂每架一椽一甃必誦大悲咒七遍屢經兵火巋然獨存願力致也天聖九年歸東嶺草堂明年示寂纍諡法寶禪慧淳祐八年其徒明禋禱晴獲應加諡聖應淳祐十一年復應加諡正覺兩浙名賢外録時北宗多輕台教乃伏闕上書請以止觀入藏因章獻太后命修懴著金光明護國懴儀行懴多異人稱慈雲懴主道潛墨莊漫録參寥本名曇潛子瞻改曰道潛廣輿記於潛人通內外典有詩名蘇軾在黃州時夢參寥子賦詩有寒食清明都過了石泉槐火一時新之句後守錢塘而參寥子居智果院軾於寒食後訪參寥汲泉鑽火烹黃蘖茶忽悟所夢詩作應夢記守璋夢梁録姓王戒行精潔尤工於詩號文慧禪師有柿園集行於世髙廟於紹興二年幸圓覺寺因覩其集宸翰親灑晚春一絶刻石於亭曰山深煙景重林茂夕陽微不雨花猶落無風絮自飛宗杲普燈録寧國奚氏嗣法佛果園悟勤禪師紹興七年詔住徑山孝宗即位賜號大慧禪師張浚普覺禪師塔銘宗杲示寂於徑山明月堂詔以明月堂為妙喜庵賜諡普覺塔曰寶光德朋夢梁録姓顧字淡堂入徑山講論禪教四年因觀竹溜以杵通節有聲豁然開悟遂號為竹筒和尚紹興年嘗選入慈寧殿升座講般若經法髙廟奇之賜號及法衣慧才釋氏稽古略居杭州南山解行入四明法智尊者之室每持大悲咒必八百遍嘗夢觀世音脫袈裟以衣之是春三月為靈芝元照及道俗千人授菩薩大戒於雷峯方羯磨觀音像放光明初貫寶焰漸散講堂燈炬日光皆為映奪淨慈禪師守一作證戒光記米芾書淨源西湖髙僧事略字伯長姓楊氏生而敏慧依東京報慈寺渡逹大師得度奮志參尋初見華嚴承遷次見橫海明潭後見長水子璿盡得華嚴與旨住泉之清涼蘇之觀音杭之祥符湖之寶閣秀之善住左丞蒲公守杭以慧因院易禪為教命師居之所至緇素景慕師合華嚴證聖正元二疏為一以便觀覽製華嚴楞嚴圓覺三懴法及法華集義通要十四卷又疏解仁王般若等經元祐三年冬示寂茶毗得舍利無數瘞於慧因院之西北壽七十八先世泉之晉水人故學者以晉水稱之思淨西湖髙僧事略錢塘喻氏子好畫阿彌陀佛臻其妙世呼喻彌陀棄家學佛就北關僦舍飯僧不二十年及三百萬賜妙行額廣所居為寺至今接待不絶屬離亂師造賊壘願以一身代一城之命賊聞之悚然為之少戢或問師畫彌陀何不參禪答曰平生只解念彌陀不解參禪可奈何但得五湖風月在太平何用起干戈兒時遊西湖多寶山輒作念曰異時當鐫此石為佛後果為彌勒像侍郎薛公問曰彌勒現在天宫説法鑿石奚為答曰咄哉頑石頭全憑巧匠修只今彌勒佛莫待下生求平生務實際不事虛飾紹興七年趺坐而化侍郎張九成銘其塔惟政西湖髙僧事略字渙然華亭黃氏居功臣山出入常跨一黃牛或問師何不談禪曰徒費言語性簡率冬不附爐惟以荻花作毬納足其中客至共之特好玩月盤膝坐大盆浮池中自旋轉之吟嘯逹旦率以為常世稱為政黃牛惟尚寧志備考鹽官人出家善慶寺遍參古德住壽聖禪院本雪峯結菴故地師住八年為創殿宇遂成叢林已又住薦福因病復還未幾示寂張九成為作記淨元春渚紀聞錢塘楊村法輪寺僧政和癸巳海岸崩毁至紹興癸丑師忽謂衆曰我釋迦文佛歷劫以來救護有情捐棄命軀初無稍靳即振履經行至蜀山海風激濤噴涌山立將褰衣而前衆爭挽引舉手謝衆踴身沉海謂葬魚腹矣移時風止海波如鏡師端坐海面如有物供戴者順流而來直抵崩岸視師衣服不濡也岸側有數大魚昂首久之沿波而去自此海毁不患蜀山民營庵居之至紹興乙卯四月八日忽集衆説偈安坐而化寶印續禪燈録嘉州李氏子幼通六經依密印於中峯一日印舉僧問巖頭起滅不停時如何巖叱曰是誰起滅師啓悟即首肯後至徑山謁大慧慧掃室延之連主數剎住雪竇徑山開堂説座孝宗召對選德殿稱旨賜肩輿於東華門內紹熙元年十一月往見智䇿與之言别䇿問行日曰水到渠成歸索紙書十二月初七夜雞鳴時九字如期而化道沖釋氏稽古略武信長江茍氏紹熙三年出峽參松源嶽禪師於饒州薦福會松源舉首座曹溪生和尚出世妙果聽其入門法語有省遍歷叢林皆分半座嘉定十二年由徑山首座出世嘉興天寧淳祐四年奉旨住靈隱八年詔住育王使者三返不起明年二月開山吳之法華八月詔住臨安府徑山宗印續文獻通考字元實鹽官陳氏子寧宗嘗召對便殿錫號惠行法師以營觀室行化吳中至松江謂其徒曰吾緣畢此乃袒右脅而化慧逺普燈録佛海禪師名慧逺生眉山彭氏年十三從藥師院宗辨為僧會圜悟復領昭覺逺依之因悟普説舉龎居士問馬祖不與萬法為侣者是甚麼人馬祖曰待汝一口吸盡西江水即向汝道聞之大悟東下由虎邱奉詔住臯亭山崇先屢遷名剎稟法嗣佛果園悟勤禪師道濟淨慈寺志字湖隱天台李茂春子母王氏夢吞日光而生年十八就靈隱瞎堂逺落髮風狂嗜酒肉寺衆訐之瞎云佛門廣大豈不容一顛僧自是人稱濟顛逺寂往依淨慈德輝為記室嘗欲重新藏殿夢感皇太后臨賜帑金嘉泰四年火發燬寺濟乃自為募疏行化嚴陵以袈裟籠罩諸山山木自拔浮江而出報寺衆云木在香積井中六丈夫勾之而出監寺欲酬之錢辭曰我六甲神豈受汝酬乎遂御風去瀕湖居民食螺已斷尾矣濟乞放水中活而無尾嘉靖二年逝葬虎跑塔中慧開西天目志與石霜同參作補衲看經二偈自黃龍山挾龍來無門洞龍每蜿蜒松上禱雨輒應孟洪吳潛聞於朝召對所致雨者曰寂然不動感而遂通賜金紋伽黎後身為明本明贍杭州府志於潛徐氏子幼定慧喜趺坐出家西菩提寺後入龍唐憩小石龕內度宗后患乳癰詔師治之以玉盂盛水楊枝灑之立瘥封七祖大師帝問師何所願曰但乞得龍唐一袈裟地以安禪師詔訐之於山前解袈裟向空搖擲覆蓋四十五里隨豎旙焉咸淳八年錢塘江婆龍為祟度宗仰天祈禱忽見師從空而下舉鉢盛龍而去元敬莫子文西湖髙僧事略序瑪瑙講師元敬字節庵會萃名宿嘗駐錫錢塘者得二十有四人撫其事實而繫之贊續又得六人述而贊之圖其形置之閣合而成書名西湖髙僧事略燈燈相傳續佛慧命將使後人而復髙後人也元周允和錢塘志補字謙甫號清溪仁和人初生有雷殷殷發地下十八歲入大滌學道師沖妙先生宋咸淳初宣醮內庭賜號妙有大師七年開山沖天觀與禇雪巘郭似山為方外友元至元戊寅受崇道清真大師洞霄主席壬午三月兼領太乙宫乙酉七日夢遊大滌洞天見數仙人吟咏二十五日召衆云昨暮見星大如月西墜今往矣端坐而化神色不變金正韶成化杭州府志字九成號約山餘杭人早歲師桂林舒公於石室洞讀書十餘年度宗召為龍朔宫書記至元間詔入杭主洞晨觀講究性理之學將解化留書别同袍而去阮日益洞霄宮志號鶴巖於潛人受度於天目元霤山真慶觀鶴形古貌苦志食淡遍遊湖海通性命之學展卷超悟兀坐於天目石巖中寒暑不動星渚趙侍郎尤所敬愛為築庵靜坐四十年復還故山不出至元間尸解去壽八十餘葉林鄧牧研北雜志林字去文錢塘人牧字牧心俱隱大滌山或數日不食或一食兼人清夜放遊則不避豺虎白晝危坐則客至不起所為文章多世外語鄧則全效柳子厚大德某年冬葉忽馳書别親友云將他往且詣鄧言别至明年正月八日端坐而逝後十餘日鄧知葉已仙去歎曰葉君出處與我同奈何紿我言别吾亦當長往耳乃述葉墓志又於燈下取其文集讀畢而終續文獻通考牧錢塘人居餘杭洞霄宫之超然館所著洞霄志行世王壽衍輟耕録字眉叟杭州人出家為道士受知晉邸後以𢎞文輔導粹德真人管領開元宫張天雨堯山堂外紀字伯雨錢塘黃冠號真居九成之裔初見虞伯生伯生問能作幾家符篆曰不能伯生曰某試書之以質是否連書七十二家伯雨輒下拜曰真吾師也自是托交甚契與伯生書必稱弟子成化杭州府志伯雨蚤棄妻子從開元宫真人王壽衍為道士風裁凝峻工書善詩歌文益奇古與吳興趙孟俯浦城楊載蜀郡虞集豫章褐傒斯清江范椁金華黃溍交甚善嘗修茅山志因號句曲外史徐𢎞道紫陽道院志號洞陽修真瑞石山年八十三沐浴更衣書頌而蛻有不離本性即神仙之句得法弟子丁野鶴也𢎞道常感張平叔住山傳訣故庵名紫陽云丁野鶴武林紀事錢塘人棄家為全真於吳山之紫陽庵一日召其妻王守素入山付書四句云懶散六十三妙用無人識順逆兩相忘虛空鎮常寂坐抱一膝而逝方外謂之騎鶴化守素束髮簪冠著道士服奉夫遺骸二十年迹不下山薩天錫有詩曰不見遼東丁令威舊遊城郭昔人非鏡中人去青鸞老華表山空白鶴歸石竹淚乾斑點在玉簫聲斷彩雲飛洞門花落無行迹獨坐蒼苔補道衣劉大彬兩浙名賢外録錢塘人隱居茅山延祐間得九老仙都玉印仁宗即以賜之加號洞觀微妙元虛真人作茅山志三卷張伯雨為之書尋蛻骨於華陽洞中原妙淨慈寺志號髙峯吳江人出家淨慈參斷橋倫倫授以生從何來死從何去話窮究未契立死限三年脅不至席口體俱忘時雪巖欽寓南屏北澗塔所懷香往叩之方問訊即打出如是者三一日忽覩五祖演像讚云百年三萬六千朝返覆元來是這漢驀然破疑遂辭入天目立死關於師子巖三十餘載影不出山所著有高峯語録明本稽古續集號中峯錢塘孫族童時嬉獻必為佛事稍長聞經教燃指臂求佛甚切晝夜彌勵困則以首觸柱期必得乃已誦金剛經至荷擔如來處恍然開悟後觀流水乃大發明自是説法無礙續文獻通考仁宗賜號廣慧禪師及殁賜諡智覺元統中詔以其廣録刻梓命揭徯斯為序希陵徑山志字西白依東叟潁於淨慈掌內記後至徑山分座説法元世祖召見賜號佛鑒成宗加號大圜仁宗又加號慧照至正壬戌四月手書付囑説偈而逝諡大辨塔曰寶華有瀑巖集及語録行世溫日觀輟耕録瑪瑙寺僧能書所畫葡萄鬚梗枝葉皆草書法也性嗜酒然楊總統飲以酒則不一沾唇見輒罵曰掘墳賊水盛稽古續集字竺源自號無住翁樂平人姓范依羅山常公受度謁月庭忠公見孤舟濟師自信法夬可證因發誓云吾此身不能作佛當入無間獄也由是力參發悟濟公記之天歷間聘主西湖妙果寺一時公卿與為方外交年七十三書偈而逝大欣堯山堂外紀住杭州中天竺有學行研窮教典旁貫百家文宗召赴闕特賜三品文階舊著黑衣文宗賜以黃衣其徒後皆衣黃明貝國器名山藏海寧人有異術弟子欲學之不傳也俟其逺出開笥竊其書見國器在笥中吳元年與鐵冠道人遊白下同宿值髙皇帝微行假榻焉無枕枕斗國器夜起視天曰帝星臨斗帝昂首聽之鐵冠曰尚離尺餘帝大驚明日召二人至問以國號年號所對皆帝心默定者益異之後忽不見周思得列朝詩集傳字養真錢塘人行靈官法先知禍福文皇帝北征召扈從數試之不爽招弭祓除祈雨禬兵咸如影響乃命祀靈官神於宫城西靈官藤像獲之於東海朝夕崇禮所征必載及金河川舁不可動就思得問之曰上帝有界止此也已而果有榆川之役思得歷事五朝年踰九十賜諡𢎞道真人徐道彰通元觀志法名道明錢塘人禮徐玉巖於寧壽觀後住持通元觀號凝虛養素通元沖妙𢎞道法師壽七十四臨終有羣鶴翔空之異唐秩萬厯錢塘縣志得大梵斗姥五雷法禱雨祐聖觀運旗摩空雲轉如輪雨隨如注偶被疾見幢蓋往來遂化去已歸其蛻三年矣忽市囂中從禇幼文索所借書幼文語其弟子李一正大駭異懷渭獻徴録字清逺晚號竹庵南昌魏氏子生而英發誦書攻文不待師授而知解日聖時全悟以大中大夫住持集慶大龍翔寺聞之喜曰此吾宗千里駒也亟挽致座下一日全悟警厲諸徒衆未有對清逺直前肆言全悟叱之氣不少沮如是詰難至於再三全悟笑曰汝可入吾室矣浙江行省康里公延主會稽之寶相未幾遷杭之報國轉湖之道場洪武初奉詔設無遮大會於鍾山退居錢塘之梁渚愚海杭州府志名普智姓葉氏海寧人崇先講師辟為侍者令讀華嚴頓明教觀住持崇惠有修蛇現於庭師囑曰果是天龍呈象宜現大身須臾果現大身騰空而去洪武中詔入京師講華嚴敕住安國寺入寂茶毗齒舌不瓌守仁靈隱寺志號一初富春人靈隱僧從楊亷夫張伯雨遊能詩善書法洪武中徴授僧録司右善世一初有志事業不偶為僧嘗言我輩從事文墨非以廢道蓋有不得已也所著有夢觀集立中武林梵志錢塘孫氏子年十三出家慈光寺謁淨慈祖芳聫公師深器之造北郭普明禪寺退席重整本山正統辛酉六月上堂説偈曰今年八十一老病隨緣且遣日今年記著後年事後年記著今朝日至癸亥焚沐坐化月日無爽祩宏列朝詩集傳字佛慧號蓮池仁和沈氏年十七為諸生三十二歲辭家祝髮遍參諸方見雲棲山水幽寂遂有終焉之志結茅三楹絶糧七日倚壁危坐而已環山多虎患師發悲懇諷經施食虎遂逺徙歲大旱擊木魚循田念佛雨隨足迹而注居民德之遂成蘭若首倡毗尼以立基本單提念佛以攝禪淨住山三十餘年乙卯七月别衆示寂臨行張目云老實念佛勿揑怪勿壞我規矩向西念佛而逝塔於五雲山麓舊浙江通志師初出家語繼室湯曰生死事大汝其勉之時湯年十九灑然省悟亦出家孝義庵法名祩錦國朝雍正十二年師敕封淨妙真修禪真可列朝詩集傳字逹觀吳江沈氏五歲不語有異僧過其門摩頂謂曰此兒出家當為人天師言訖不見遂能言年十七宿虎邱僧舍聞僧夜誦八十八佛名心大悅侵晨即剃髮遊五臺至京師參遍融笑巖諸老發明大事歸吳復楞嚴廢寺於嘉禾創刻藏緣於徑山精嚴戒律化後十二年葬於徑山茶毗之日肉身儼然舍利無算真中杭州府志海寧孫氏子年十七投安國寺受具自以根鈍不能憶持伽陀六時虔禮大士以祈淨慧一夕仆地若人以涼水灑面遂有省與藏主涵春翻閲經律往復圓辨參東禪深研止觀後歸安國禁足立死限既老遴法器得受汰曰吾受涵師囑纍今付得人吾願已畢抵雲岫數日端坐唱佛而化道盛虎跑寺志字覺浪别號杖人浦城張氏子東苑鏡禪師法嗣坐道場五十三處杭州府志道盛禪律精嚴儒釋淹貫嘗示衆云有血性漢被世界磨滅示寂後塔於棲霞山有學庸宗旨莊子提正儒宗三寶及語録百餘卷今釋仁和縣志金堡字道隱仁和人崇禎庚辰進士授臨清知州因催科不及額坐解職後剃髮為僧名曰今釋號淡歸國朝赤腳仙舊浙江通志不知何許人常默不食一食則兼十人猶未饜冬大雪呼居停主掃雪聚成小廬居其中須臾氣拂拂騰上聚雪皆化與之言多中人隱孫道元杭州府志字善長别號復陽子桐川人父嘗遇羽客修髯長身謁曰君當舉子是垣中一星言已即去初生時不啼不乳者纍月嗣若聞空中有語者遂受乳甫七齡求出家父母知其有夙根送吳山火德廟度為道士二十四訪遊五嶽盡得要妙過信州張真人授以正一清微五雷大法示曰大道必積功行藉以福國利民若獨善其身德不被物雖得長生猶殤子也由是以救濟纍功以參錬彌性習靜大滌山年七十有四尅期示化初滌山有隙壤虎踞其上人莫能穴至是為師營厝虎長嘯躍去後不復見和有鴻錢塘縣志字公鑑少學法華陽衍教天壇後為宗陽宫都紀禱雨祈晴有求輒應尤能驅邪辟疫年七十三無疾逝圓融杭州府志西蜀人年十六出家得戒天童密和尚隨侍天台參報恩遊大雄次至金剛菴壬寅七月忽語衆曰吾初六歸去至日從容禮佛辭衆入龕舁至塘南村院融坐龕中自開兩門取香三枝説偈仍自掩龕倐時祥煙西揚凝然而化𢎞禮杭州府志號具德會稽張氏子歷住廣孝佛日天寧靈隱徑山國朝順治初靈隱寺燬於火𢎞禮卓錫二十年鼎新重建方宜舊浙江通志字夢曙苕人出家法相寺左筆善書有詩名年十九有悟盡棄章句續雲棲放生之會不替者三十年闢叢席於上鄉之淳橋康熙元年仲冬二十五日遍禮佛像集徒講演金剛經一卷次日至大江之濱卓杖大聲曰好江水遂卓立而化德修杭州府志錢塘人剃髮後習靜北山窮谷中與猛獸雜處面壁二十年不知其參尋何自後住茶亭康熙七年元宵日忽出衣單分給人云當别云及早自炊水沐浴召鄰人為封龕説偈曰無拘無束不與形役逍遙自在正月十六衆竊笑之見其擕火入龕趺坐龕才合火自內出風熾熖疾頃刻而化成法徐自洙伯亭大師塔銘初名續法伯亭其字仁和沈氏子早失怙恃九歲禮慈雲祖源為師十六剃染十七圓戒二十參乳源德水法師聽講楞嚴宿慧駿發洞徹微旨嘗論天台賢首之異同乳峯曉以雲棲之説言下大悟遂受囑精研四分律開講於慈雲兩修大殿重建聖果仁壽諸梵宇康聖祖仁熙二十八年主上天竺四十六年皇帝南巡幸寺賜賚優渥重修毗盧殿閲十載還歸仁壽雍正六年四月朔説偈辭衆而逝世壽八十八大涵陳元龍堆公塔志吳江人俗姓潘九歲出家既長入靈巖從師繼起遊南嶽有名楚僧忌之謀折其足乃夜遁走大雪中飢則摶雪食之自號喫雪子後住雁宕山又入黃山遂字堆黃在黃山聞樵伐木聲有悟盜擊之不死後居海寧安國寺元龍撫粵西招之遊羅浮歸至肇慶鼎湖山示微疾説偈而逝塔在桂林棲霞寺傍著有黃山草西湖草補陀南參集彈指集桂羅壯遊集鹽官剩草皆已刻詩多警句浙江通志卷一百九十八
