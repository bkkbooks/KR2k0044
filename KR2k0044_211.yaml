body:
  text: 浙江通志卷二百十二列女金華府金華縣宋葉紹彭妻王氏嘉靖金華府志王師愈之女嘗從父宦遊南北人謂必小其夫家至則敬事其姑時出簪珥以經紀其調度而逸其夫以學夫死治䘮葬終制輿疾歸母家親故聞其賢行有願以繼室請者皆謝絶之一女生於夫死之六月至是復不育哭之過哀疾寖以革屏醫却藥曰吾生固無累未若死之無累也區處後事沐浴更衣而逝陳氏三節嘉靖浙江通志唐氏金華人適進士陳昌朝生子沂而昌朝卒寡居三十餘年沂娶汪氏生子韓而沂卒寡居四十餘年韓娶倪氏生子元紹而韓亦早卒寡居五十六年金華貞節首稱北園陳氏詳見金履祥文集胡氏女嘉靖金華縣志既嫁而夫不良父母欲更其偶不許白於令令進而問之女曰理無二夫令義而歸之父母怒從夫三日赴蓮花井而死王魯齋為賦冽井詩四章元吳塤妻宋氏嘉靖金華縣志名嗣徽年二十八夫亡二子皆幼舅姑繼歿罄奩資治殮未葬鄰火將延及氏倉卒不能舉乃攜諸孤拊柩哀泣誓與俱化火遂滅年八十餘至順中旌表吳履妻謝氏王褘謝節婦墓表名黻金華人歸同邑吳履歲己亥明兵下建德勢且東氏語履曰亂將及矣盍為走避計先事弗圖後悔何及履猶豫不決未幾蘭谿破亂兵四出剽掠而履適他徃氏攜男女走入金華山中途失其幼男兵且至自度不得免行至向塢巖險處以幼女投巖下身繼之而死死十餘日履物色求之得其尸叢棘中面猶如生遂葬向嶺賈明善妻宋氏宋濂宋烈婦傳名㜪字新金華潛溪人歸烏傷賈明善越一年與夫來居潛溪歲戊戌十月西兵擣蘭谿逺近大震婦同夫避入浦陽城竇山中未幾鄉民嘯聚倡亂殺人如刈草菅婦亡匿灌莽中為游卒所執乃抽銀條脫求解不聽將亂之婦以計紿曰吾有珠貝昨夕瘞山前坎中爾無急我急我我將死於爾何利不若導爾發之卒悅其言從之行至深淵側竟躍入死明章時盛妻吳氏萬厯金華府志歸章甫八月而夫亡撫遺腹子亦亡父母憐之令再嫁氏毁容以死自誓養其親姪繼夫後獨居紡績竭力事姑家貧甚始終一心孀居五十餘年宋氏金華府志夫為閬州守被誣死獄中氏與其姑及子皆編戍金齒子死途中氏奉姑以行其題郵亭壁歌楊慎刻於詩抄中惜其夫姓名不傳詩中有云今朝玊堂宋學士亦與妾家同一譜又云妾心汪汪淡如水寜受飢寒不受恥幾回欲葬江魚腹姑存未敢先求死前途姑身少康健辛苦奉姑終不怨姑亡妾亦隨姑亡地下何慙見夫面名山藏使者以詩聞太祖釋之以閬守之禄養其姑錢沚妻孔氏嘉靖金華縣志年二十八守節保孤志行貞潔天順四年旌樓琦妻江氏嘉靖金華縣志年二十五夫亡守節奉舅姑不懈成化二年旌袁堅妻方氏兩浙名賢録堅卒殯於城北濠上氏貧無依乃即殯所開棺寢處其中乆之不出死郡守劉􅉅封土為墓而禮祭之馮珏妻王氏萬厯金華縣志生子永甫十月而夫卒父母憐其少令更嫁氏剪髮毁容誓死不從寡居四十六年詔旌其門謹按萬厯府志亦作珏而舊浙江通志作馮班今改正胡士言妻尹氏金華縣志孝姑相夫家譽夙著夫死理喪完制一日忽自縊死戴貞妹舊浙江通志戴嘉茂女幼許王畿華未歸畿華患痘卒貞妹自備麻服跪告父母徃弔奠立誓終身不醮翁姑屢勸改配次子貞妹悲泣不從及選吉將成婚自刎死知縣龍遇竒到門祭奠申院題請建坊謹按近刻王魯齋集附載戴貞妹前後二傳其前傳胡頌所撰序貞妹聞訃引刃絶脰創寸許幸咽未絶以生雞皮冐之而愈王氏姑遂迎之歸其後傳胡麒生撰言貞妹守志五年亦以痘死與舊通志所載絶不相符但厯考府縣志所載俱同通志應是實録或王氏後裔欲隱其事故托二傳以自諱歟陳所思妻戴氏舊浙江通志戴貞妹之女弟避兵售溪山兵馬抵郡全家被執戴於袖中出利剪刺喉而死其將義之遂釋其夫與子王忭妻陳氏舊浙江通志從夫避兵南山遇兵大小奔散止攜七歲孤姪兵欲加汚辱氏紿之曰王門宗祀全賴孤姪乞放之還家以存祖祀吾當侍巾櫛耳兵信其言放孤姪氏即赴水死後夫尋屍衣𢃄重結腰繫其夫平日所用詩箑為記顔色如生時年甫二十嚴寅華妻黄氏金華縣志避難西溪兵至被執顧謂其夫曰善撫幼子以存嚴氏吾從此訣矣即赴深潭而死及買棺歸葬已越半月顔色如生鄭德紹妻俞氏金華縣志明季兵變拒卒全身觸崖而死李氏三節舊浙江通志李汜水妻黄氏城破被執與媳潘氏齊觸堦死次媳陳氏亦自縊馮仲妻貝氏莊道中妻邵氏姜良䇿妻陳氏曹一賞妻祝氏章俊民妾周氏何烶妻滕氏曹茂柱妻張氏黄明時母姜氏戚之騏妻陳氏余大榮妻俞氏陳九華妻許氏尹憲吉妻鄭氏張士宏妻裴氏國朝葉氏爾烈題旌冊義烏葉尚坦女許字金華張士紘子孫瑤未婚孫瑤卒氏聞訃號哭欲親徃拜奠不能止父與俱徃盛飾乗輿入門拜翁姑堂下即詣夫靈泣奠畢求空房少憩入則閉門移時令小鬟捧出一盒傳語送還父母啟之則珠瓔翠羽采衣繡襦弓鞋趾帶幷髻髮也尚坦驚愕入視則髠頭跣足披麻束草矣尚坦相持慟哭慮有他變遣輿迎其母守之夜半母就寢解帶自經母覺救解越日欲親至夫墓阻之不得父母舅姑偕徃氏奠畢即觸墓石暈絶救之蘇抱歸自是家人環守不得間時值中秋乃佯為怡色備杯勺慰母母喜防少懈至夜分氏破磁鋒剚頸未殊血流床褥間眾驚起敷以藥從此滴水不進臨歿呼母曰兒去矣含笑而逝時康熙二十四年月日也明年具題奉㫖建坊旌表葉純妻姜氏題旌冊年十八歸純生三子二十五而寡先是舅姑早逝柩殯於室至是夫亡氏泣血三載不離棺側勤苦節儉始得舉三喪葬之子長俱為之娶婦生孫矣而長次二子又相繼亡二媳亦誓無他志同姑晝夜績紡不出戸姜守節三十六年雍正五年具題奉㫖建坊旌表席上珍妻徐氏題旌冊年十六而嫁閲歲而寡子甫生三月家貧人難其守氏誓死無二卒能撫孤成立苦節三十九年劉子均妻吳氏題旌冊年二十一而寡子甫襁褓舅姑老氏矢節無玷孝事堂上得其懽心子亦成立守節三十八年金德信妻吳氏題旌冊二十九而寡遺子五齡刻苦訓以讀父書守節四十三年以上㫖建三氏俱雍正六年具題奉坊旌表曹元宇妻黄氏題旌冊年二十八夫亡二子俱幼家貧甚往依母家撫孤孤長始挈歸而㫖建婚配焉守節二十五年雍正七年具題奉坊旌表曹應麟妻黄氏題旌冊年十八歸應麟閲三載應麟卒遺娠五月生一男孝事舅姑生養死葬俱中禮子長娶媳生孫而子與媳又夭氏復撫孫成立守節四十四年蔣世祥妻曹氏題旌冊年十七適世祥二十而寡遺娠八月生男姑在堂氏事之甚孝孤長有足疾不良於行氏健持門户守節三十九年姚𢎞佐妻王氏題旌冊年十八而嫁嫁十年而寡遺孤二鞠之長俱為娶婦長子又夭氏撫媳守志一切家事隻身經營百苦備嘗守節三十年年五十八卒以上三氏俱雍正九年具題㫖建奉旌表坊嚴祖旻妻俞氏題旌冊年二十八而寡二子皆夭事舅姑盡孝守節二十九年雍正十一㫖建年具題奉坊旌表嚴仲春妻王氏金華縣志年未二十方國安敗兵挾之上馬氏躍馬投塘而死倪星焜妻朱氏金華縣志遇兵夫妻離散懼不能自全乃縊而死又徐氏倪明廷妻觸巖死方氏朱廷翼妻奪刀自殺章氏索大機妻投塘死邵氏黄啟賢妻亦不辱死朱應時妻賈氏舊浙江通志二十二歲夫亡遺孤良啟家貧苦守舅以哭子喪明氏割股療之目漸愈洎歿竭力治殮適鄰大將延氏撫柩號泣火隨滅張廷梧妻盛氏金華府志適張一載夫亡懐孕三月産一男矢志貞守事公姑克盡孝敬撫孤子訓以詩書媳亡又撫其遺孫院使給奬賜粟帛又盛氏金應聘妻年未二十而寡守節終身夀至百歲李氏二節金華府志王氏李時瑞妻瑞卒氏年二十之死靡他瑞弟時珍繼卒其妻陳氏年十八偕其姒並勵冰霜奉姑以孝知府表其門曰雙節黄氏二節金華府志錢氏黄良棟妻夫病卒氏年未二十立誓守節子茂榮又早喪媳朱氏年甫及笄姑媳相依不憚貧苦共相矢志申可賢妻沈氏金華縣志可賢早歿氏家貧苦守康熙十五年山賊至鄉焚掠執氏歸巢氏勵聲大罵賊斫為三段而死傅福妻周氏金華府志福死氏年二十五二子襁褓一子在娠父母勸其更適號泣拒之逼之至再遂自縊姑救得蘇織絍奉舅姑家法肅然守節七十餘卒李景啟妻余氏金華縣志年未二十景啟殀僅遺一子鼎寅氏撫長娶媳吳氏而鼎寅又亡姑媳㷀㷀一門雙節陳所忭妻鄭氏金華縣志年二十生一子夫歿矢志撫孤守節五十餘年陳之煒妻俞氏即氏之姪媳也甫生一子之煒卒俞事姑訓子苦節五十餘年與鄭共居一門先後同揆曹三槐妻朱氏金華縣志年二十一夫亡善事舅姑苦節六十五年撫育四世又金汝元妻王氏年二十一夫亡家貧無以餬口有勸之更適者曰我守節耳餓死何害竟以節終徐氏二節金華縣志徐有環妻邵氏孀節清嚴生子應和娶媳王氏應和卒王氏守貞不渝事姑訓子節孝兩全克稱繼美黄家瑤妻仇氏金華縣志夫亡服闋撞死墓側余大榮妻俞氏葉禮妻俞氏馮光煒妻王氏馮夢寳妻吳氏葉應時妻李氏尹培妻于氏倪超妻陳氏吳應韜妻姜氏尹任聘母張氏李維奇妻梁氏朱三儀妻曹氏王希文妻馮氏胡宗訓妻龔氏陳啟元妻王氏吳效曽妻金氏胡惟明妻葉氏葉士讓妻黄氏翁應獵妻徐氏何應朱妻申氏倪世揚妻樓氏倪夢麟妻潘氏俞廷詠妻葉氏葉士睿妻黄氏倪師輅妻章氏吳應廷妻李氏陳世安妻倪氏黄道英妻朱氏嚴文富妻葛氏嚴文秋妻張氏曹之焜妻黄氏倪師萬妻裴氏方城妻陳氏王承鼎妻江氏倪光第妻徐氏方元屏妻范氏邵一澄妻邢氏何如岳妻陳氏章起榮妻施氏葉璋妻王氏蘭谿縣宋金天錫妻唐氏金履祥家狀金氏始出三衢徙蘭谿天錫早殀唐氏少寡喜讀書清苦守家課子孫尤嚴切詩書之緒遂以振劉似之妻徐氏栁貫劉節婦傳字柔嘉蘭谿人生一十七年歸金華劉似之閲再期孕而未育似之遘疾死及産男婦惡笄疏服常如初喪字其子潛自始學至成人為之聘舅女生二子一女而潛年二十六亦卒姑婦死守一燈夜績臥起相依攻苦彌厲徐叔貞妻唐氏正德蘭谿縣志名淑芳年二十而寡貌妍無子父母欲奪其志以刀斷髮破面為信秉節終身有司以聞旌其門曰純節趙時堯妻徐氏宋濂趙節婦傳畧名定瑞蘭溪人年及笄歸金華趙時堯時堯父亦娶於徐即婦姑也無子生二女時堯以再從子為其後二女以非己同出不相寜婦相夫順受之母子以和時堯卒節婦年甫三十誓不再適養其姑終身撫弱子至於成人復三十年乃卒元陳媁正德蘭谿縣志宋行軍司馬自中女元司徒萍姊也宋亡媁及兄弟與母楊夫人相失後萍貴尋訪其母不獲媁在家孝思尤切斷髮誓不嫁燃指為香以禱十指僅存其四既而傳聞母在順州某家萍以金幣名馬請勿得乃聞於朝為降㫖迎母以歸媁與兄芹適自南來遂奉還蘭谿服勤奉養終身為比邱尼歐陽元云陳氏女灼頂累百燃指凡六龥於神明卒遂其願方仲剛妻吳氏兩浙名賢録名埠元季兵亂與其夫避亂離家西行一里許聞鼓譟聲足弱弗能步度不可免乃謂夫曰君宜自脫勿以妾為累夫曰子將若何曰妾義不受辱唯有死耳夫號泣捨去既而遊兵四集將追及適道旁有梅塘水潔且深遂投以死越數日兵去夫踪跡其處見屍横池面遂舉葬焉章楓山懋有烈婦序祝漢卿妻金氏萬厯蘭谿縣志至正間冦起氏隨夫攜子避之灘依女弟何止善家盜經其地氏被刼去自度不能脫因紿盜作願行狀不數步候盜防少懈即投入湖羣盜忿而刺之身被數十槍而死郭浩卿妻王氏萬厯蘭谿縣志遭兵亂被掠將廹以徃氏誑之曰吾且飯飯畢從爾去兵信之提甕出若將㸑然遂投沼死見吳沈郭處士志明王祥妻鄭氏萬厯金華府志蘭谿鄭升女年十七歸祥祥病革語之曰吾家貧若將何恃以存宜及時自擇對曰與君為夫婦一紀猶不知我心君如不諱茍有他志犬豕不食其餘時子瑤甫十一歲紡績自給而瑤優於學卒以成立明取金華之明年旌表其門而復其家潘佛正妻范氏萬厯金華府志歸七年而夫卒姑及其母哀氏少而無子欲改嫁之氏曰烈女不更二夫撫其姪喜為嗣守節以終洪武年旌徐永溍妻趙氏正德蘭谿縣志名妙貞六安州人永溍卒於官時年二十有四其父來視見其姑老子幼且年少家貧恐難自立欲令就彼葬夫同歸父家趙泣不從扶老攜幼以歸畢夫喪葬紡績養姑姑有疾達旦不寐姑死喪葬如禮子必傑克自樹立成化年旌其孝節祝善禎妻馮氏正德蘭谿縣志生子彌月善禎客死兄善初利其遺産百計逼馮易志甚至欲殺其孤而馮志益堅卒䕶其子成立章綂妻王氏正德蘭谿縣志生男恕數歲而夫卒時年二十五勵志守節事姑劉氏曲盡孝養時有利其遺産而欲殺其孤者氏中夜戒婢持杖遶舍而行寄之外家得免及長誨育成立孀居四十餘年謹按舊浙江通志作章純妻胡旵妻汪氏正德蘭谿縣志嫁未幾而旵亡家甚貧誓不更嫁旵弟昉貪鄙時加逼挾不聽乃私受人財物而許嫁之及輿夫舁轎至氏心覺更飾易服若願嫁狀眾方喜飲不顧因從便門趨出溺萬安橋下家人索之不得踪跡至橋畔沙磧中見雙履在入水求之而尸已僵矣章孝女明列女傳名銀兒幼喪父獨與母居邑多火災室盡燬結茅以棲母方疾鄰居又火銀兒出視眾呼令疾避銀兒曰母病不能動何可獨避亟返入廬欲扶母出烈焰忽覆其廬衆莫能救火光中遙見銀兒抱其母宛轉同焚死時𢎞治元年三月也方良規妻章氏唐龍方節母述年二十適良規二十六良規亡遺子鉅方六歲族之長强令改適氏曰夫予之天也乃欲予背乎孤鉅予之嗣也乃欲予棄乎肯夫滅義棄嗣安忍乃毁容髽髮終其身年八十有司聞於朝表厥宅里以嘉其節王瓘妻栁氏兩浙名賢録年十七歸瓘瓘已病亟與栁訣曰汝年少我死當别嫁栁泣以死殉對瓘死殮畢欲投於棺及撤靈又投於火姑與妯娌力救之遣女孫伴睡桞謂女曰明早翁姑問汝但云夜半子時女幼莫知所云俟女睡沐浴更衣就縊女驚覺亟呼翁姑救之已死矣蓋子時也趙貺妻徐氏萬厯蘭谿縣志年二十二夫亡二子皆襁褓叔欲奪其志氏曰寧受飢餓勿受毁辱吾志不可奪母姑為設飯請他再醮婦麗服華飾以歆動之且誘以言氏不食而起後二子繼亡三遭火患孑然無依自若也年八十及見其孫時齊登第而卒包姜姑萬厯金華府志包湘女家甚貧而性孝少以禮自閑族叔欽武斷一鄉鄉人婚娶必欽主之而姑許聘朱楫欽弗與聞深以為憾適富賈范天生有瞷女意欽遂為之媒揚言湘先受天生聘而楫奪之訟於官范富欽險而湘與楫俱怯訥不能自明女聞而號曰已許朱即其家鬼矣官能拆我之親其能拆我之心乎竟自縊而死事聞扁其門曰貞烈徐氏二節萬厯蘭谿縣志吳氏徐克和妻無子妾生子鍧方數月而克和死吳年二十一矢志撫孤鍧長娶婦曹氏生女週歲而鍧亦亡曹年十九姑婦同心守節嘉靖年旌何棨妻陳氏萬厯蘭谿縣志名庭年十五歸棨至二十四棨卒殯前山氏常謂幼輩曰吾死當置其旁每潛備殯殮等物服闋次日乘翁父忌日索湯閉門謂婢曰吾浴畢當梳飾拜祖也久不出啟門則自縊死矣謹按金華府志亦作何棨舊浙江通志作何榮今改正方滿妻徐氏舊浙江通志年十八歸滿數年而滿患瘋倩媒欲令再嫁氏覺而詰之曰欲賣我盍留我紡績以相給必我棄有死而已夫見其志堅而止日夜勞瘁供藥食五載夫亡翁姑又欲嫁之氏見父母泣曰我將去可收拾房中物人謂安心願嫁矣一夕自縊諸葛希源妻李氏蘭谿縣志希源卒李年二十母勸之再適堅拒不從乃私為約配强之必就姒亦迫之氏思難脫乃剪髮嚙指以母與姒猶未釋也縊幾死年過四十卒郭時行妻王氏金華府志年十八適時行為繼室前室遺媵有娠以時行病革欲投藥墮胎氏寢食不離以守之逾數月時行卒媵得男王氏喜曰是可以死矣竟絶食而死許伸妻葉氏明列女傳伸家素饒於財以不檢蕩且盡擕女投所親卒於通州氏守屍晝夜哭或遺之食或餽以金或勸改嫁俱却不應水漿不入口者十四日竟死尸傍年二十餘州人為買棺合葬陳嘉賓妻祝氏蘭谿縣志年二十三嘉賓早世遺孤又亡家徒四壁嘉賓親叔二人素貪戾日夕勸其他適甚見凌虐氏莫可誰何投閣折臂以示廢棄而茹荼齧蘗以終其身劉志浩妻華氏舊浙江通志年十七歸志浩二十志浩卒遺孤週歲氏甘貧勵節鄰家利富室之賄者為媒娶氏先謀諸翁姑不可繼使伯妾金姐甘言勸之氏痛叱詈遂出惡言汚之氏不勝忿嚼舌以死章宜賓妻范氏金華府志宜賓聘之未幾得痿症父母欲圖别嫁氏知之紿曰乞與姑嫜一面再議未晚遂至章家不返十年而宜賓逝撫姪繼嗣艱苦萬狀年八十五事聞被旌童懋禮妻范氏蘭谿縣志年十九歸懋禮三年而懋禮得狂疾氏遭撻辱事之無倦容五年懋禮死或勸之曰狂暴之人有何恩愛兼無子家貧胡不他適氏大慟嚙指血淋漓以矢志年七十六卒張王仁妻畢氏蘭谿縣志年二十四而寡子幼父勸更適不從則私為約配强之必就氏乃毁容斷指事後姑撫遺子二十餘年内外無間言張希周妻徐氏舊浙江通志許字後張得瘋疾兩姓各願罷婚氏剪髮不從竟歸張夫疾轉篤扶持調藥餌不倦夫性暴每加詈辱亦怡然受之及夫卒閉門獨守三十餘年五十一而卒唐貞女萬厯蘭谿縣志名順許聘鄭時敞未婚而時敞歿會有議姻者憤鬱䝉被不食而卒臨卒時先起易鞋蓋聞敞歿而即掣者其立意久也舅姑傷其志因合葬焉鄭氏二節蘭谿縣志鄭元復妻楊氏子趙雲妻舒氏姑年四十婦年十六姑婦雙寡紉衣並經而逝方登辰有傳胡夢熊妻方氏蘭谿縣志年二十歸熊甫三載夫死子殤密縫其衣抱石沉塘而沒童雲完妻龔氏蘭谿縣志姑喪哀毁急遽間悞以夫兄為夫牽其衣而與之語覺而悔曰我女子也牽夫兄衣身辱矣遂自經徐充妻黄氏蘭谿縣志家貧夫卒方二十餘歲矢志靡他抱子依弟度日子稍長即投繯以殉縣詳請旌龔氏二節蘭谿縣志鄭氏龔蓋妻年十六歸蓋越五年而蓋卒力養孀姑抱從子泰為後長娶鄭氏僅七月而泰卒遺腹生子姑婦守貞如一鄭瓘有傳童顯芳妻施氏蘭谿縣志顯芳死氏年二十一不義者以厚幣㗖翁翁惑之綵轎至氏閉門剪髮破面流血乃止歸依其母撫孤年七十卒汪九思妻諸葛氏蘭谿縣志適湯溪汪九思汪死無子伯謀其産逼氏再醮氏度不能免遂密縫内外衣夜分赴屋後魚池死趙有念妻柯氏金華府志杭州人歸蘭谿趙氏明季兵起有念入山避難為兵所殺氏聞易衣自縊死年二十餘值炎暑深山無棺可殮權藁葬至十二月有念入土遷氏同穴面如生四肢不腐趙氏三節金華府志余氏趙世對妻明季兵潰肆掠氏攜女螽及媳諸葛氏奔蹶折右肱媳灑血别夫螽年未笄誓與同死且相謂曰事急矣稍緩即欲求死不可得各密縫其衣閉户自縊潘士柱妻童氏金華府志年二十四亂兵經其地氏扶姑逃至白蓮塘為兵所獲以馬脅之使乘氏詈不絶口兵仍挾之行至一塘投水水涸不能沒兵拽之出加鞭笞氏益肆詈兵乃手刃而去其姑尾得之抱屍泣時盛暑色不少變謹按縣志亦作潘士柱舊浙江通志作士桂今改正趙氏二節蘭谿縣志章氏王氏趙以岳妻妾也明季兵潰搶掠四出二氏見勢危迫勸其夫遁去止一子甫六齡脫簪珥囑蒼頭擕付舊識老嫗撫之乃更衣密縫同時自縊妻懸左妾懸右時當酷暑死六日而兩屍不腐面如生又郭希章妻潘氏亦自縊死章聰妻董氏吳深妻徐氏盛震翁妻郭氏徐傑妻董氏張浪妻王氏趙薤妻吳氏范淮妻唐氏徐禘妻章氏余禮妻凌氏祝獬妻李氏徐礽妻祝氏郭鼎妻柴氏葉壽甫妻徐氏李瀹妻董氏葉日新妻諸葛氏陸乂家妻余氏朱明臣妻唐氏徐玭妻趙氏唐廷倬妻祝氏鄭大紹妻何氏鄭文禮妻徐氏郭根妻陳氏鄭梯妻趙氏朱朝瑞妻唐氏趙志淑妻朱氏趙公潤妻唐氏江元俊妻朱氏栁希忠妻姚氏郭希郊妻俞氏包廷鏊妻方氏徐學貫妾萬氏邵時叙妻唐氏朱汝文妻張氏邵元芳妻童氏邵元楫妻舒氏栁光大妻鮑氏栁升大妻陸氏李之鯤妻章氏范世光妻胡氏徐邦元妻葉氏徐德魁妻龔氏童鳳鳴妻邵氏葉鍾河妻章氏姚文勲妻趙氏章坤亨妻袁氏葉宗填妻吳氏栁希孟妻陳氏栁希忠妻姚氏鄭登科妻方氏戴尚賢妻張氏應尚祖妻戴氏諸葛思經妻趙氏國朝葉氏二節蘭谿縣志趙氏葉鍾芝妻徐氏芝弟鍾藻妻順治三年馬士英潰兵剽刦二氏並為所獲奮呼曰殺我我不去即共跳溺荷花塘中兵怒以槍亂刺之死按臣具題奉㫖建坊旌表戴于度妻孫氏題旌冊夫病割股救之及夫卒即絶粒而死事聞建坊旌表趙台孫妻唐氏題旌冊年三十而寡遺孤甫遇家貧晝夜勤紡績以自給足不踰閾撫孤㫖建成立守節至六十五歲有司詳請具題奉坊旌表唐學煥妻葉氏題旌冊夫亡二子幼氏事舅姑孝訓子皆能成立守節四十餘年雖至戚㫖建罕見其面雍正三年具題奉坊旌表郭永芳妻沈氏題旌冊夫亡無子事姑孝謹姑病割股療之繼姪為嗣長為娶龔氏子又早殁媳亦感姑之貞矢志不二㷀㷀姑媳紡績哺孫守節三十餘年鄭守陞妻徐氏題旌冊夫亡舅姑老遺孤孱弱氏勤女紅以供日用姑目喪明氏扶持不離左右且朝夕以舌䑛之數年目復明守節三十五年程引彪妻翁氏題旌冊夫亡姑殁事衰翁二十餘年以居孀故終身不復歸寧課子以義方蔣德崇妻鄭氏題旌冊夫亡撫孤成立事舅姑孝謹以上四氏俱雍正四年具題奉㫖建坊旌表方耀臣妻姚氏題旌冊年十六夫亡遺腹生一男誓無二志事舅姑克盡孝養撫孤成立荼苦三十六年郭崇㑹妻孔氏題旌冊年二十六夫亡事姑孝姑病侍湯藥衣不解帶者數月姑卒氏以勞勩成疾猶强起襄事擗踊哭泣鄉黨稱孝無間言栁嵩齡妻李氏題旌冊年二十五夫亡事舅姑撫孤備極艱苦以上三氏俱雍正五年㫖建具題奉坊旌表趙體嘉妻栁氏題旌冊夫亡遺孤二撫育辛勤不三年而俱殤氏欲求死家人以似續為大勸勉之乃立猶子為嗣撫如已出事舅姑生養死葬以一身拮据任之金世恱妻張氏題旌冊夫亡誓不欲生舅姑曰爾有遺腹倘得男爾夫為不死矣既而果生一男氏辛勤撫育至於成立守節四十二年范文聲妻章氏題旌冊夫亡撫遺腹子成立吳肇鵬妻范氏題旌冊夫亡遺孤幼守節四十年事上撫下孝慈並著鄭瑗妻吳氏題旌冊幼讀書夫亡家貧甚撫子稍長即口授句讀親為講解子長為諸生守節三十餘年呉上依妻方氏題旌冊夫亡能孝舅姑訓子六氏俱雍正六年具題奉以上㫖建坊旌表章貞女題旌冊受范文穎聘未婚文穎病篤氏請於父母往侍湯藥未幾夫卒居喪不返孝事舅㫖建姑立嗣為夫後守節數十年雍正七年具題奉坊旌表董長姝妻吳氏題旌冊氏以禮持身為强暴者所逼力拒死之時雍正八年二月也獄成㫖建具題奉坊旌表趙養生妻楊氏金華府志年十八歸趙期年夫亡氏送殯遂躍入池中以救免自縊亦救免姑與母環守之進湯飲氏裂其碗割喉以死徐燮妻章氏蘭谿縣志年二十而寡明末潰兵肆掠同鄰婦避兵碧霞宫被搜出氏奮身就死兵拔刃恐之引頸就刃臂為斷兵去刀創不藥自合後無疾而終俞貞女舊浙江通志許字鄭大全年十五以夫病劇迎歸未諧伉儷大全卒抗志守貞久之或勸改適則歛容曰女受聘即為人婦犬豕之言何以入吾耳家貧紡績以供朝夕年六十七而卒朱貞女金華府志許字童左生未嫁左生死女聞慟哭易服奔喪父母止之不得居期年父母憐其幼欲奪其志女泣曰人之所以異於禽獸者以有義也如無義禽獸不如矣矢死不從踰年卒趙應祖妻黄氏蘭谿縣志年十六嫁應祖未四年而夫卒氏痛哭絶食而殞鄭邦輔妻童氏蘭谿縣志年十六歸鄭生一子二十二而夫亡族長欲奪其志以刀斷髮破面為信家貧紡績度日其後子卒與媳陳氏臥起相依撫孫成立年七十八而終唐貞女金華府志許字趙世庠年十四適翁卒迎歸依姑未覩夫面卜三年後成禮未及期世庠病卒始面庠永訣女絶而復甦拔簪折為三誓曰倘不堅守有如此簪足不出户數十年如一日郭貞女舊浙江通志郭驥圖女許字趙贊化年十七巳卜期先二月贊化痘亡女聞訃即變食易衣自誓守志屆原卜之期哭請於父母歸趙父母曰果如此亦吾族光但為節婦難為貞女尤難耳女即欲自刃以殉乃歸夫家竭力奉事孀姑以完其節鄭景中妻張氏蘭谿縣志景中幼嬰羸疾冠猶童身願退婚而氏堅志歸景中貧無立錐毫無怨色景中亡紡績苦守鄭族重其節歲給祠穀養之卒年七十雖節婦實貞女也唐起大妻翁氏徐上翰妻余氏鄭如萼妻吳氏畢邦述妻鄭氏趙世寧妻徐氏徐汝瑚妻朱氏洪應霖妻童氏余憲妻周氏董星偉妻鄭氏趙世福妻郭氏姚缺名妻朱氏徐缺名妻胡氏葉缺名妻嚴氏徐缺名妻范氏陳缺名妻劉氏方缺名妻李氏胡琦妻張氏諸葛邦立妻汪氏鄭時學妻朱氏邵俸妻章氏諸葛大義妻張氏徐缺辰妻黄氏余德基妻胡氏范樽妻方氏諸葛凝妻陳氏童文玉妻何氏吳應綬妻童氏趙希典妻童氏趙啟元妻童氏滕缺名妻葉氏劉缺名妻缺姓氏章泰亨妻何氏朱良臣妻金氏趙鳳輦妻胡氏章友直妻鮑氏趙初妻童氏張明良妻胡氏董召高妻朱氏方譁妻朱氏徐見綂妻姜氏徐文魁妻王氏童曰英妻鮑氏章尚忠妻趙氏何思忠妻羅氏邵廷珍妻金氏盛學忠妻滕氏方綽妻諸葛氏嚴光裕妻張氏徐如峸妻章氏勝臨妻鄭氏童體元妻吳氏童志尹妻水氏徐大畏妻范氏徐貞吾妻王氏張廷立妻舒氏姚嘉懋妻江氏葉有參妻章氏東陽縣宋李誠之妻許氏東陽縣志誠之為蘄州守城䧟將巷戰歸語其妻其妻率闔門婦女同時赴水死事聞贈令人子婦孫女皆贈安人胡德廣妻朱氏東陽縣志元兵入東陽德廣見殺朱義不就俘死之元傅賀妻陳氏栁貫傅節婦傳陳師道女適賀生一女而賀亡婦時年二十四養姑甚謹又三年姑亡内外婣憐其無子而貧咸勸之改適婦曰吾寧餓死豈肯幸生乃益劬躬殫志五年始克舉其舅姑與賀之喪域而窆之以從子似嗣教之學而尤不廢耕㑹高陽許先生棲隱八華山中遣似從學似聞其講說知義理之緒遂能承節婦之志終植其家馬氏女嘉靖浙江通志名淑年十九將嫁而夫死淑乃望夫家拜哭因製衰服終喪未幾姑死亦如之父母欲更嫁之淑曰既許為人婦安可再乎以死自誓竟全女節以夀終金與賢妻馮氏台州府志與賢為黄巖務大使遘疾貧甚馮解衣市藥割股肉以進疾少間復作而死馮盡瘁營殮葬畢沐浴更衣遂自刎死鄉人沈希中捐錢以殮焉劉義妻程氏萬厯金華府志名清張士誠寇掠東陽清攜子奔竄山谷寇逼之不從殺其子清罵愈烈寇遂殺之有祠在獨山明徐元良妻周氏萬厯金華府志名惠奴年二十八夫亡無子育猶子景清繼嗣姑篤疾竭力奉事無怠年九十卒洪武癸亥旌其門李道琰妻馬氏萬厯金華府志名佛奴嫁一年而夫亡時年十九無子育其姪徽繼嗣誓不易節嫠居三十五年洪武年旌表盧堯明妻蔣氏萬厯金華府志名金孃年十七適堯明時堯明已病躬親湯藥弗怠居三年堯明卒終身郤膏沐守素幃人無覩其面者撫孤成立人皆稱之謹按舊浙江通志作盧克明趙傑妻徐氏萬厯金華府志嫁五年而傑卒二孤子方孱弱而同室者狂悖多方詬侮欲亂其志而嫁之氏恬不為動紡績是務卒敎二孤成立人稱貞婦賢母云李宗悌妻杜氏萬厯金華府志名貞年二十四宗悌從父戍遼陽瀕行囑曰吾逺涉萬里回否未可知老母弱女兩須愛養奈何貞以死守諾之後果卒戍所父母憐其早寡微言諷之貞遂引刀斷指誓無他志卒年六十八郭貞女東陽縣志許字陳應兆未醮而應兆卒氏欲奔喪父母不從更囑其親擇壻女乃悉焚其所蓄珠翠錦綺絶鉛粉椎髻終夫喪坐一樓以死自誓父母知其志堅從之李貞女東陽縣志許字張希麐希麐病請於父往視父使婢偕行令一至即返至則晝侍湯藥夜與姑同寢使婢侍疾麐卒婢有孕舉一子遂撫育之以紹麐後又李方産妻趙氏將嫁産遘疾不起趙氏往視為調湯藥進飲食十日而方産卒守之十年亦卒趙為潛妻徐氏續文獻通考名瑩年二十七為潛没撫遺孤晝夜哭者累年有為言禮婦人不夜哭自是夜惟飲泣間誦孝經論語小學以節哀痛氣且絶猶誦目不視邪色耳不聽淫聲諸語唧唧不絶口婦郭氏亦以孝聞有司兩上其事詔皆旌之張泋妻麻氏東陽縣志天台人年十九歸泋於東陽越二年泋輸糧金陵以疾卒氏聞訃慟哭三日不食姑慰勉之翼日忽沐浴整粧至夜自經於寢時正德己巳三月也謹按金華府志亦作張泋舊浙江通志作張沂妻今改正張大䝉妻厲氏萬厯金華府志名珍夫病斷指作羮以進竟不起時年二十八父母欲奪其志乃潛縊於夫柩傍母覺救免嫠居四十年嘉靖戊戌旌其門張墩妻馬氏萬厯金華府志名湛年十八歸墩四載墩亡遺腹生一子夫兄强之再適湛斷髮不從避歸母家紡績自給撫孤成立卒年八十八吳鉞妻陳氏萬厯金華府志名潤瑛鉞遘奇疾藥不治氏割股救之不愈竟卒時氏年二十七父母欲再嫁之氏抱神主號泣自誓嫠居四十餘年養姑撫子事聞旌其門許陽妻陳氏東陽縣志生二子二十八而孀伯叔欲奪其志紿以歸寧舁之再適中道覺自輿投地幾死乃止依孀婦王氏家紡績自給以養二孤成長而歸年八十餘卒陳時思妻趙氏東陽縣志二十四而孀時思係繼子母性悍二孤幼旁有力者又睥睨其間氏當之四十年艱難荼苦卒成其志方雲鳳妻韋氏東陽縣志名聰年十九適雲鳳雲鳳殁每自求死時懐孕將産妯娌勸其節哀以續夫後及彌月而産女也乃不食三日卒盧鍧妻胡氏東陽縣志年二十一鍧遘疾家貧以紡績供醫數年不怠及卒悲號欲自經妯娌勸止父母憐其少令更適遂絶粒而死嘉靖年旌其門趙綽妻孫氏舊浙江通志嫠居久一日鄰家失火將延及衆悉趨避氏獨據室不動且曰死得其所矣瞬息反風火滅人咸異之撫男成立氏遘疾其子欲延醫拒之不食藥而卒趙氏六節金華府志陳氏趙賢誠妻年十九誠亡撫子明峻長娶郭氏峻又早卒郭年二十八撫孤忠遂亦娶郭氏忠遂又早卒氏年二十三三代守節始終不渝東陽縣志賢誠族弟賢行妻郭氏媳郭氏孫媳亦郭氏亦三代守節盧懋琦妻王氏金華府志年二十九懋琦為王某所殺兄弟皆幼不能理氏親詣官訟其事獄成而潛以賄脫氏嘆曰夫讎不報何以生為遂裹夫骨走㑹城控法憲厯六七年卒置仇於法張思選妻徐氏金華府志年二十舉子方一月夫亡姑向患足痛氏晝勤紡績夜抱姑足於懐以止其痛如是者十餘年撫孤全孝以壽終趙滌妻張氏東陽縣志年二十一夫亡家貧其弟受陳姓重賄計使歸寧奪之氏聞即剪髮自誓紡績養姑終身無二王黓妻許氏東陽縣志年十六歸王二載夫往廣東别娶數載客死家貧無子翁憐之欲令再適紿之歸寧氏知之剪髪自誓後兄弟與翁復逼之即自縊鄰母救甦竟以壽終盧伯義妻趙氏舊浙江通志未歸而伯義病欲辭婚父母亦不欲嫁盧氏請行甚堅嫁之日未能成禮自後藥餌飲食悉出於氏未及期伯義卒哀毁骨立伯姒以其次男懋悌繼之悌入太學氏偕行就養病作媳蔣氏刲股和藥以進事聞大司成集六館諸生旌異焉李學顔妻蔡氏東陽縣志十五歸李其姑生四子而獨憎學顔一日母笞之學顔走適氏織遂笞氏曰爾為夫受杖氏無所忤亡何夫病療死子秀方在抱姑欲嫁氏計將强納他聘縶氏於輿而去氏思曰姑意吾多藏耳遂納所有而孝敬不衰姑為之感動卒撫秀成立以壽終張汝崑妻陸氏東陽縣志年二十四夫亡家貧姑老氏力勤自守既習紡織復事耕耘有以再醮勸者峻却之一子稍長即命力田子耘田中氏耘田畔見者憫其志有以米粟餽者謝之不受張正卿妻樓氏盧道濟妻何氏蔡永壽妻許氏杜童妻石氏葛道佑妻杜氏吳滄母陳氏盧文翁妻胡氏徐珙妻成氏陳時慥妻趙氏郭伯達妻應氏陳懐誠妻羊氏馬伯定妻陳氏沈叔讓妻王氏徐忱妻金氏許本妻賈氏盧鯨妻吳氏張紳妻厲氏張昌妻何氏郭陛妻馬氏李教妻陳氏杜孟殊母陸氏李栒妻胡氏盧堯器妻俞氏缺姓廷望妻許氏許儲妻鄭氏郭光亨妻趙氏張國縉妻許氏郭銓妻金氏郭袖妻金氏盧仲轍妻虞氏盧懋禎妻虞氏趙璟妻金氏陳時夏妻李氏陳所道妻李氏陸應運妻郭氏郭秉敬妻應氏盧洪弼妻趙氏盧懋橋妻趙氏趙賢庠妻應氏王錢妻李氏陳彦深妻盧氏屠天文妻郭氏屠明露妻黄氏屠明恩妻吕氏樓繼祥妻葉氏胡繼芳妻包氏陳化民妻王氏包滂妻吕氏趙賢邵妻徐氏趙明玠妻徐氏李為國妻趙氏李方端妻盧氏郭士産妻包氏陳栻妻馬氏郭景翰妻王氏陳時憲妻金氏陳所鏡妻郭氏國朝任貞女題旌冊任君實女年十八登樓織絍有僕朱蘭艷其色潛入擁抱求合女厲聲叱之即下樓哭訴於母母出尋父而女已自剄死康熙五十九年奉㫖建坊旌表吳國元妻杜氏題旌册年十八夫亡撫孤守志及子長又卒有逼之嫁者氏度不免遂飲㫖建藥而卒有司詳請具題奉坊旌表杜思進妻詹氏題旌册早寡事姑孝姑患疽藥餌罔效氏朝夕吮之無難色撫二子長令㫖建從師授學有成守節四十年雍正三年具題奉坊旌表金懋昌妻吕氏題旌册年二十八夫亡子幼家貧甚親黨强其再醮不從紡績易粟養孤未幾子又殤於是奪志之謀復起氏誓死不移撫姪光祥為嗣長娶媳王氏甫育一孫子復夭媳亦㫖建守志不嫁氏荼苦五十五載雍正七年具題奉坊旌表張武慇妻蔣氏東陽縣志順治三年亂兵入其家欲汚之躍入門前川塘死又徐氏周汝桂妻馬氏張文泰妻為兵所掠俱躍入水中死樓氏六節金華府志順治四年土寇掠三都和堂樓姓婦全節者六人王氏樓廷䇿妻陳氏樓賢材妻蔣氏樓用意妻李氏樓用京妻吳氏樓用孝妻王氏樓用聲妻抱幼兒各赴水死樓廷挺妻黄氏舊浙江通志有殊色寇入其都氏與廷挺父子皆被執强之不從乃磔其夫以脅之氏罵不絶口復殺其子罵益甚遂并殺之許欽京妻金氏東陽縣志義烏金德義女順治初羣盜肆掠氏奉姑偕女媳鄰婦百餘輩避難泊塘山莊猝遇寇以刀脅諸婦姑當其前氏懼姑見害急叱曰寧殺我因躍起奪其刀自剄十指斷裂血濺數尺餘寇駭走姑與被難婦俱得全已少甦猶糢糊問姑所在久之卒以創死趙忠興妻虞氏金華府志順治五年寇亂以家貧不能逺避而寇兵猝至氏攜三歲兒急走不能脫被執拉諸馬上氏投馬而下者三寇知不可辱横刺其脅以斃陳廷雪妻張氏金華府志歸六年生二子順治五年寇亂奉姑避他處姑先歸氏語其夫曰姑老矣焉有為人子為人婦而避地違親者乎因與夫歸侍寇適至被執氏罵曰頭可斷身不可辱遂仰天而慟曰吾不能再侍髙堂矣寇以刀礪其頸氏厲聲曰殺即殺唬我何為遂殺之倪良淘妻陳氏舊浙江通志寇亂見執知不能免乃投於西湖潭中賊怒以鐵鈎鈎出裂其體為四樓文貴妻盧氏東陽縣志年十五適文貴文貴治農業居一年有鵞啄其田麥文貴擊之傷鄰兒言不遜文貴毆之鄰兒投塘死於是諸豪右及保歇叢至視其室無有乃語文貴曰人命至重家千金亦必盡吾為汝計獨有此婦可解耳文貴許之媒者至氏曰是生離也吾何忍媒者曰汝家貧吾為汝易一富者氏曰吾寧甘貧不慕富也文貴無以謝罪則自求死氏曰若死吾與汝同死遂啟室逃之空林夫婦同縊死官乃窮治諸人之罪而旌其門此順治十年事也虞貞女舊浙江通志盧濬聘室也濬以疾殤女聞訃慟絶請奔喪父母難之遂求死既而亦如夫疾疾中喃喃若與盧誓同穴者不踰時卒夫家迎其柩合葬焉王貞女舊浙江通志陳應彦聘室也未歸而彦夭女聞欲奔喪父不許女即絶食服滷嫂救之又捉刀自剄父兄急持之免乃歸陳門稟於舅撫一姪為後值土寇掠境重其節不入其門郭必光妻潘氏東陽縣志順治十七年光疾死其姑勒令他適氏即投繯自盡詹允迪妻吳氏東陽縣志氏迪與族人某有隙以事䧟之繫獄知不免與夫約同日死至期盡散其金珠以與諸窮困遣其奴婢使去至獄視其夫以目相喻對而憤嘻者久之至家取佩刀自刎死於是允迪死未幾其仇亦死陳所達妻羊氏東陽縣志所逹亡氏年少矢志茹苦立繼子為夫後遺二女訓以内則長女嗣嬋適夫未一年夫死有詩寄母為訣悲傷絶食而卒樓廷陛妻盧氏東陽縣志名松歸廷陛六載而夫卒遺一女堅守不二歲丁亥寇掠和堂氏懼辱赴水救甦甲辰年壽終謂甥曰為我合葬事在汝遂卒吳成雷妻應氏東陽縣志年十六適成雷二載而夫没父母欲奪其志不從姑病割股以進姑為之起暮年以産附祖祠存夫祀又吳成龍妻金氏二十三而寡守志訓子年八十以壽終趙正璉妻樓氏東陽縣志正璉貌陋無能以補傘營生饔飱不給既没樓年二十六無子或意其必嫁囑其兄弟為之媒氏怒謝絶之不與通曰某雖貧家婦不能為無恥事遂聽之獨居一室凡慶弔事雖至親不與閉門織絍其所居當孔道往來之人莫有覩其面者許欽普妻宗氏鄭國光妻劉氏華國運妻李氏許淳錡妻俞氏陳復教妻胡氏趙忠義妻郭氏吳堡妻金氏吳立墀妻蔡氏胡文期妻王氏李坡妻杜氏李髮妻陳氏方鉄妻金氏吳蓮妻虞氏黄叔厚妻金氏張大猷妻李氏陳世明妻許氏許世修妻陳氏郭伯豐妻李氏陳所缺妻趙氏王池妻陸氏陸衡妻陳氏陳良仕妻趙氏王元學妻趙氏郭希敬妻吳氏李方萃妻蔡氏郭世宏妻吳氏郭景性妻蔣氏孫可大妻蔡氏趙正室妻郭氏蔣康祖妻王氏許如珙妻吳氏陸應式妻蔣氏趙明熺妻胡氏馬繼儒妻蔡氏徐茂貴妻王氏義烏縣元朱氏壽宋濂朱環女壽傳義烏人生有淑姿歸金華戚象祖台寇楊鎮龍反攻婺州浙東宣慰司史弼捕獲之鞫其反狀壽父環有亡奴在械中怨環欲誣環出貲助鎮龍時史怒寇甚凡獄辭所引必盡殺乃止環子元疾病不能起視壽泣壽曰昔緹縈能救父命我獨非人耶乃走告法曹掾馮耿賢曰妾父無罪亡奴欲誣以不道倘事不得直一家枉作泉下鬼聞君素長者獨不能相活乎言訖淚如雨馮怒曰此事豈汝女子所知壽哀祈益切馮為惻然良乆曰爾但歸吾知所處矣明日使吏椎碎奴口不果誑明龔印可妻傅氏萬厯金華府志名善貞年未三十夫卒訓育二子長寧次泰泰户科給事中死靖難時泰妻亦傳氏孀居撫四歲孤永吉長厯考功主事禮部侍郎鄭經妻舒氏義烏縣志年十六歸鄭景泰中處州賊葉宗留刼掠郡邑氏為所擄夜乘賊寢潛出寨門以羅巾自經家人為收其尸瘞之顔色如生何仁二妻金氏萬厯義烏縣志年十九夫死每泣繼之以血敝廬僅三間族有欲其再適而私其産者忽拆毁其半使無以居金志益堅繼姪為嗣詔旌之復其家王貞女義烏縣志許某為室未行某死請於父往弔父與俱至則服衰守喪帷父命之歸女取銀珥投於水曰此珥若浮當從父命依姑處樓上終其身黄極妻虞氏萬厯義烏縣志極卒遺孤宗鎬方三週殯葬後與姑紡績存活有東陽豪貴張姓者厚賄其父欲令變志卒不能奪孀居六十餘年卒年八十五嘉靖年旌趙術妻龔氏萬厯金華府志嫁未三載而夫殁年甫二十三無子人難其守剪髮自盟垂三十年王堯卿妻駱氏萬厯金華府志年二十而寡恐父母移其志終不歸寧其姒得子育之以為嗣虞鳳孃兩浙名賢録虞守中女其姊嫁徐明輝而卒明輝聞鳳孃賢欲聘為繼室女謂父母曰兄弟無同妻之理則姊妹可知父不聽女遂絶口不言自經死李誠妻洪氏萬厯金華府志誠卒時年十九姑令再適斷髪自誓冰操六十餘年吳百忠妻傅氏萬厯金華府志百忠死他鄉傅年十九家人欲奪其志不可得時衣食不給又無嗣志節益堅垂四十年以姪大繼為嗣楊金孃萬厯義烏縣志楊明八之女幼許胡恩未婚恩以貧故應募過辭明八立語門首石畔女偶窺見之逾年訃聞號慟嗚咽誓不再適閭里聞其賢媒妁踵至其父私受里人葉守和聘將改醮焉女知不可移潛往故夫所立石處自縊而死時年十七事在萬厯五年女家素零落幾於湮沒縣采公評為立石表其墓王瓘孃萬厯義烏縣志王宗武女受馮希範聘未歸夫痘殤訃聞女誓與夫同穴邑士夫有欲聘者女割髮以明不二父母知不可奪另建一室以居之足不踰閾目不窺户紡績自給四十年如一日劉氏二節萬厯義烏縣志葉氏劉潤妻年二十四寡居勵堅操遺腹一子名耒娶媳朱氏未幾耒卒朱年十九無子父母令改適誓無二志事姑惟謹辟纑以資膳養殁與姑同葬有異花出塜上狀如白菊金貢妻李氏萬厯義烏縣志年二十六貢亡勺水不入口者七日孀居四十八載時山寇至輙相戒毋驚金寡婦萬厯己未曾孫德義舉進士疏聞建坊旌其閭黄承洙妻李氏舊浙江通志夫亡氏年十九觸棺殞地姑曰身有遺姙宗祀係焉徒死何補氏泣從命後生子嗣華成立已又亡遺媳俞氏姑媳相依孀守朱霈妻陳氏崇禎義烏縣志年二十二霈亡遺腹一子矢志堅守孤長家貧流落普濟寺强氏徙居不從孤尋殁復與婦撫孫孫又夭婦去氏朝不謀夕志節愈勵年八十五而終宗族共殮之虞良相妻王氏金華府志年二十良相亡遺子閲歲又亡父母憐其少勸他適氏斷髮悲號不能奪繼姪德炤為嗣炤死又立姪德耀耀娶室生子父子偕亡復立姪孫應奎承耀祀四遭顛沛零丁孤苦年七十卒丁文彩妻王氏金華府志年二十八舅與夫相繼亡斷髮自刃幾斃賴姑救甦力貧撫孤事聞旌表金京孃崇禎義烏縣志行太僕寺主簿世儀女年十五從世儀之任陜西歸舟泊宜城盜夜刧之世儀墮水京孃呼號力救賊逼之京孃赴水死時泰昌元年冬也駱行演妻樓氏義烏縣志居樝林明末潰兵大掠氏出避山谷中至前塘知不可免立塘畔不行須臾卒至躍入水水淺更躍入潭死後得屍潭中端坐如生又駱彪妻樓氏駱邦仕妻金氏逢潰卒俱躍入塘死駱舍妻何氏被殺沈於塘駱明剛女義烏縣志年十五明剛與女避兵犂壁山下為所得欲汚之先殺其父女以口齩卒臂卒斫其頸半截口不釋卒怒寸斬而去何映賢妻黄氏義烏縣志時已嫠與何瑞上妻駱氏避兵兒家塢卒至搜得黄拔刀脅之不從時駱氏已老厲聲曰彼二十八歲守貞可無禮耶卒怒殺之一老婢以主母被殺痛詈卒并殺之黄氏乘間以斷竹自刺死樓士恭妻厲氏丁復興妻方氏駱柱妻虞氏黄宗武妻趙氏徐越妻陳氏吳嘉謀妻黄氏龔福興妻馮氏吳湘妻樓氏龔滔妻方氏龔廷亨妻王氏王兆慶妻陶氏陳暎妻謝氏毛一松妻王氏毛一蘭妻沈氏沈時學妻戴氏劉守廉妻王氏沈賓國妻張氏龔一清妻謝氏駱元達妻樓氏胡德盛妻陳氏國朝陳之鏞妻駱氏舊浙江通志義烏人年十九夫亡遺孤子璽甫數月氏念衰老在堂孤子㫖建在抱忍死含痛一志守貞康熙十二年具題奉坊旌表吳之藝妻倪氏義烏縣志名仁吉浦江人歸義烏呉之藝能詩善書畫夫病革矢以身殉夫力阻之且屬以立嗣奉姑仁吉含泣順承時年二十慟絶復蘇事姑猶母撫教為後三子行不窺堂衣不易素姑亡刻像奉之間以吟咏自適有凝香閣稿康熙十二年具題奉㫖建坊旌表丁貞女題旌冊名曇孃許字同邑沈敦年十二敦隨父任雲南之曲靖衛越四載病故訃聞女立志守節家故貧以紡績自給歲時祭奠其夫必極哀事寡母孝養備至及母殁遇閩寇之變女隨嬸母避地東陽寇過不忍犯其廬里舍賴以保全先是其叔與兄欲嫁之女截髮自誓人咸笑其愚及遇亂能擇地自全人莫不稱其智焉有婢名冬菊感其苦節相依不忍去女年六十三冬菊亦五十㫖建餘矣康熙二十七年具題奉坊旌表謹按舊浙江通志及金華府志皆作丁團孃許字沈名登學道張衡丁貞女傳亦同惟義烏縣志作曇孃沈名登作沈敦係十七都人今查題旌冊與縣志同蓋縣志作於題旌之後自當以題旌冊為據商德茂妻賈氏題旌冊夫染瘋疾欲遣婦改適氏聞斷指自誓及夫亡有逼其再嫁者遂㫖建赴塘水而死康熙五十八年具題奉坊旌表駱喜孃題旌冊寡婦駱張氏之女許字龔姓年十八未歸持身謹慎從不妄出戸外一日奉母命尋雞至舍側園磡有惡少年直前抱持求合喜孃堅拒大呼弟妹聞聲至惡少逸去時喜孃即欲自盡而弟妹强扶歸家哭訴於母誓不欲生鄰里勸阻者絡繹不絶皆不應勺水不入口越日登樓縊㫖建死雍正六年具題奉坊旌表童應憲妻王氏題旌冊年二十而寡遺孤一訓撫至長娶婦王氏生孫世選世逵一訓卒王年二十八氏偕媳苦守撫孫成立既而孫世選卒婦季年二十四世逵卒婦龔年十七皆能矢志撫孤童氏四世皆王氏一身所繋苦節六十三年吳洪溥妻黄氏題旌冊年二十三而寡家貧無子姑年邁里有富人欲娶之氏曰吾所以不死者有姑在也撓之百端不為動勤女紅易粟以奉姑而自甘忍餓一日為姑買絮衣縫補内得藏珠一串氏欲留還售衣者後竟不至遂為姑置棺衾人以為孝感所致苦節四十九年虞枝連妻童氏題旌冊年二十七而寡一子尚幼虞氏兩世單傳舅姑早没氏辛勤撫育教訓成立苦節四十四年年具題奉以上三氏俱雍正六㫖建坊旌表馮士身妻劉氏義烏縣志順治二年方國安潰兵肆掠氏被執挾之登騎氏以頭觸石兵抱之口斷兵指兵怒奮刀亂斫剖其尸時年三十一蔣達妻王氏義烏縣志年十七歸達康熙甲寅鄰寇起氏家臨江一騎卒逼之躍入江潭死陳升紹妻樓氏義烏縣志夫病臨終遺言數代單傳今無子當廣延繼嗣氏頷之夫卒氏幾絶者數四後月餘集夫黨述夫遺言就親房中各繼一子又捐田於學修祖墓既又分還各僮僕身契侍女皆擇配嫁焉一日忽曰吾事畢矣偃牀瞑目而逝家人逆計其絶粒者已八日云陳某妻傅氏義烏縣志年十七歸陳夫貧外傭不數年翁姑與夫相繼亡一子甫週既無立錐又無周親資紡績以自活子年十二復以拾薪遭虎噬氏入山尋血跡覔其子剰骨歸哀慘之狀觀者無不悲痛或諷其改志誓死不從卒年四十七許細孃義烏縣志幼字金永顓未過門永顓亡氏立志不他適年十九歸至夫家繼族姪為子勤治女紅堅貞自守足跡未嘗至户外年三十六而卒王貞女義烏縣志許蔣舜咨子巨川聘而未娶巨川死女忼慷引決舜咨迎而合葬焉樓慶達妻何氏義烏縣志慶達遊學江右客死氏痛哭欲自盡妯娌勸止欲親往扶柩歸葬又為家人勸阻日夜悲泣乗夜自投門前塘内死時年三十三又方以昌妻王氏家貧夫往都貿易得疾歸氏焚香告天願以身代未幾夫殁遂勺水不入口七日而卒劉之龍妻朱氏賈之儀妻童氏樓國遴妻朱氏季啟元妻王氏朱蜚英妻樓氏曹鯤妻葉氏吳茂妻陳氏駱文燮妻邊氏金之善妻吳氏蔣廷峙妻金氏陳作霖妻吳氏王應松妻徐氏黄世封妻樓氏王士厚妻吳氏丁有澄妻王氏陳昇妻何氏傅無詡妻虞氏陳忠敏妻吳氏王應旂妻丁氏童世選妻李氏王明霞妻成氏龔藴美妻楊氏王明長妻陳氏丁𢎞溍妻馮氏胡叶仕妻蔣氏龔起環妻王氏陳我旗妻樓氏金來儀妻陶氏馮煥宷妻戴氏葉邦傅妻馮氏金輅妻盧氏朱鴻飛妻孫氏朱起能妻陳氏王國璉妻鮑氏樓祖䕃妻駱氏陳逢彰妻金氏朱時瑛妻丁氏虞思漢妻吕氏虞思沂妻宗氏虞思洸妻何氏永康縣宋杜陳二女陳亮二烈女傳杜氏永康大姓女也生而端莊且麗宣和庚子冬妖臘起所在嘯聚相剽殺里有悍賊輩謁杜氏門大言曰以女遺我即已不即族汝矣其家驚泣欲與不忍不與禍且及言於女女曰無恐以一女易一家曷為不可待我浴而出趣具湯其家以告賊相與歡笑以俟既浴取鏡施朱粉具衫衣盡飾俄登几而立縻帛於梁而圏其下度不容冠抽之籠其首整髮復冠迺死其家遑遽號哭賊聞驚捨去宣和辛丑官軍分捕賊所遇乗勢抄掠道永康將之縉雲及境富民陳氏女為所執植其刃於旁曰從我我婦之不則死女掠髮伸頸請受刃官軍斫之謹按陳氏女嘉靖浙江通志及栝蒼彚紀俱作縉雲人舊通志遂兩載之今從陳龍川集載入金華而去處州之重見者章氏二節兩浙名賢録應氏章俁妻及其姒周氏相懽如同産宣和間方臘作亂所過殺掠咸望風走避應病足與十歲兒居周欷歔不忍舍去應曰妾以足致死命耳姒何不亟避周曰生死共之何避焉未幾賊至肆威迫怵周扶應氏相與罵賊而死方殺應時兒泣謂賊曰寧殺我勿殺二母賊怒幷殺之周氏女萬厯金華府志許嫁鮑勤鮑家日替父欲改嫁不從有陳姓者恃勢將脇娶之女投水救得不死脅者愈急乃縊而死元何頎妻吕氏萬厯金華府志頎早卒遺腹生子甫二月值至元丙子兵刼嚢篋如洗人勸其更適吕曰一馬不被二鞍況人乎鞠育孤子至於成立年踰九十而卒至治二年旌表吕元明妻朱氏兩浙名賢録元末盜起元明與東陽陳顯道各舉義兵撃賊有功遂欲乗勝討方國珍時臺官多受賊賂為之内主遣宣差偽召元明殺之并害其子堪朱聞報即徒跣號泣走訴於陳顯道㑹里中義勇者數十人從朱氏疾追之及宣差於中道遂擒以還朱設夫靈焚香㸐燭生取其心以祭義烈之聲震天下云明葛吉甫妻徐氏貝瓊貞素堂記永康徐氏女歸於葛事繼姑尤謹吉甫卒時年二十有七誓養舅姑弗再適經營其家事俾二子從名師讀書乃築室大塘之文山顔之曰貞素厯四十餘年吕堪妻何氏萬厯金華府志永康人歸太平吕堪堪父元明聚義討賊為臺官所殺堪亦遇害時和年十九無所出以姪三錫為嗣守節至六十八而終洪武辛巳年旌王和欽妻陳氏嘉靖浙江通志年二十九夫亡遺孤僅歲餘苦志守節孤名德中性亦至孝嘗因母病籲天求代果獲痊一日東鄰失火將延及德中向火稽首大遂西轉洪武年旌徐與道妻葉氏萬厯金華府志年二十六夫亡一子三歳姑憐其少且貧間語之曰與其相守而苦莫若各處而安葉曰飢苦事小失節事大誓死守志洪武中旌表王士濂妻曹氏嘉靖浙江通志夫亡截髮置棺中曰妾不即死以從君地下者以有遺孤在也三年衰絰不去體力勤絍織資家以訓子年㡬七十鄉老議上其事曹氏聞之曰此婦職常事毋庸此也李氏三節續文獻通考李軻妻俞氏年二十五居孀守節子祿婦吳氏年二十九夫亡無子誓繼姑志孫齊娶陳氏年十九亦寡因自誓曰守節婦女常事況李氏世徳有自乎台州王一寧題其堂曰一門三節婦四世九賢孫胡蓋妻陳氏萬厯金華府志正綂乙巳處寇掠境攜子走避遇寇棄子於岸投水而死徐仕妻李氏萬厯金華府志年二十仕亡家貧無子有富室求之叔伯受賂延媒氏欲自殺以絶之年踰八十而終李淳妻盧氏兩浙名賢錄嫁三載而寡家貧績絍自給有勸嫁者輙以死誓歸依母氏兄弟得賂脅之再適氏自知不免紿之曰吾所以不從者夫亡未薦服飾未備耳衆以為然乃潛治衣衾喪具及期置夫神主哭祭之夜自縊而死金氏二節萬厯金華府志陳氏金亹妻與亹弟和妻周氏俱年二十而寡嘉靖年旌表程濟妻吕氏萬厯金華府志年二十五夫亡遺孤在褓冰蘗自甘子孫相繼而殁三世一身年及百歲樓偉妻朱氏萬厯金華府志年十九夫亡或擁兵欲奪之自投於水以救得免撫姪文昇為嗣終不易志程浪妻朱氏永康縣志年十八歸浪未一月浪遊學南都遘疾亡朱誓不再適有黄某者欲求之朱泣告舅姑曰烈女不更二夫願終吾志必欲嫁我惟有一死舅姑潛許黄某朱聞沐浴更衣自縊死事聞旌表李汀妻吕氏兩浙名賢錄名主奴汀赴姚泉汲水失足溺死吕痛哭仆地水漿不入口者數日舅姑憐其少寡强更適之吕聞乃縫衣秉燭赴汀溺所死胡鈇妻徐氏兩浙名賢録歸二年而鈇死無子矢志苦操坐卧夫柩傍足跡不越戸閾鄰大延及寢室衆勸其出氏堅抱柩呼曰得同燼幸矣須臾反風火滅年八十二無疾卒章韞奴陳調元貞烈傳年十二許字馬氏越七載馬氏子害疹不救韞聞欲往省父母恐不測乃聽往至則馬氏子已不省韞擗頓啼呼馬氏子覺張目言負汝負汝而絶韞哀痛髽麻親爪櫛飯含視襲殮憑棺約爾前遅我我為爾圖後事踰年抱叔氏子從海嗣孝敬雍睦性不耐逸歲週甲子臺憲上其事旌曰貞烈之門王師憲妻周氏金華府志年二十四夫亡目不窺牖舅疾割股療之王世德為傳陳章甫妻黄氏舊浙江通志年二十夫亡剪髮繫夫手誓同死遂絶飲食依夫像號泣淚盡繼之以血旬日死王世慶妻應氏永康縣志年二十寡居避寇青山口聞警赴水殁覔其屍衣袴皆連結不可開應氏三節金華府志周氏應子聖妻年二十三夫亡撫子惟介娶朱氏年十九介又亡遺腹子君發娶朱氏年二十一發又亡姑媳三代孀節凜然壽俱九十餘周鳳岐有三節婦傳李䟑妻陳氏永康縣志年十七夫亡有潘姓者欲娶之氏乃大㑹族人自矢不二引刀斷髮守節終身程懋修妻盧氏金華府志年二十六夫亡苦節撫孤子又亡赤貧堅守志節凜然程氏二節永康縣志程國瓚妻應氏年二十四夫亡艱苦撫孤年六十病篤子旭燦割股救療乃差瓚兄國化妻李氏年十九夫亡無子剪髮自誓立應氏子旭煐爲嗣妯娌孀節兄弟篤孝楊汶妻謝氏應永和妻胡氏盧𢎞三妻曹氏盧任三妻章氏應敬妻周氏吳寧妻葉氏徐叔髙妻李氏徐季順妻陳氏俞淮妻陳氏董璁妻陳氏徐澄妻應氏黄二一妻徐氏趙鎬六妻吕氏王謙二妻樓氏王珏妻童氏吕實妻胡氏葉行十妻吕氏何三九妻徐氏呉珪妻徐氏李實妻陳氏周傑妻陳氏吕培妻王氏朱桓妻林氏胡璽妻丁氏王廷璉妻應氏施昻妻胡氏趙勝妻李氏陳秀妻李氏朱良存妻陳氏姚世玉妻方氏李璁妻王氏應鎮妻馬氏朱曅妻童氏李泰妻應氏應實妻胡氏吕克堅妻丁氏應大恩妻李氏徐鳳富妻趙氏王洪範妻潘氏樓思妻金氏徐秩妻程氏倪瑄妻陳氏徐啟陽妻斯氏童芝妻盛氏胡塞妻李氏吕文鼇妻周氏俞培妻池氏應八十五妻徐氏徐懋學妻李氏王宗琰妻胡氏徐朂妻陳氏徐宗畫妻應氏葉大秦妻黄氏吕應相妻孫氏徐守良妻陳氏馬崇儀妻施氏朱以武妻程氏吕國正妻朱氏朱以卓妻徐氏應一進妻陳氏應明理妻李氏徐起相妻王氏國朝陳嘉謨妻朱氏舊浙江通志年二十四夫没事姑甚孝撫孤成立年七十卒康熙十二年㫖建奉旌表坊徐氏二節金華府志徐士霽妻虞氏名登二十二歲夫亡矢志貞守繼叔子璜為嗣聘女姪枝淑為媳育一女淑年十九璜又亡號痛絶食誓以身殉姑以婦有遺腹力勸止之踰月生男兩孀零丁孤苦厯十有二年男女又相繼亡淑遂自縊年三十姑亦卒年六十三康熙十七年奉㫖建雙節坊旌表盧國釗妻周氏題旌册年二十五夫亡事姑孝撫孤成立守節至七十歲而終康熙五十㫖建一年奉坊旌表程德福妻陳氏題旌册年十六適程甫一載而夫亡時舅姑已没遺腹生子矢志撫守厯七載夫之祖程逺度以身老孫幼且家貧慮氏不克終也許聘吕氏子婚有日矣氏知難挽遂祭奠其夫入室扃戸沐浴更衣密縫下袵從容自經死康熙五十五年具題奉㫖建坊旌表徐聖鳳妻童氏題旌册性貞潔以禮自持族姪徐麟仲者狂且也瞷氏夫他出入室欲犯之氏堅拒不從猶强之不巳氏大呼望救遂遇害康熙五十六年獄成具題奉㫖建坊旌表李茂峯妻胡氏題旌册年十六適李未閲歲夫亡遺腹生子誓不再嫁家貧勤十指以養㫖建舅姑育幼子守節四十餘年雍正四年具題奉坊旌表應有美妻包氏題旌册年二十四夫亡二子在襁褓截髮矢志孝翁姑撫二子守節二十八年吕可昌妻方氏題旌册年十九而寡守節三十二年以上二氏俱雍正十年具題奉㫖建坊旌表應氏三節題旌册應鼎鼇妻周氏及子洪瑄妻徐氏洪珘妻徐氏也鼎鼇卒周年二十洪瑄未離襁褓次子洪珘側室出周撫訓無異及長各為娶婦不數載二子相繼卒洪瑄妻年二十五一子在抱一子在腹洪珘妻年二十四一子甫四齡一門三孀周視兩媳如女兩媳事姑如母妯娌相依如姊妹同居一室共撫三孤周守節四十六年洪瑄妻守節二十五年洪珘妻守節二十七年雍正十三年具題候旌程懋銓妻徐氏永康縣志年二十順治乙酉寇至聞有被汚者遂閉户自經死胡氏二節表康縣志胡良盛妻盧氏年二十一夫亡撫孤貞守遇宼至以投水獲免五十餘年完節其孫胡明睢妻黃氏配二載夫亡遺孕得子又亡或勸令改適黄遂密縫徧體衣夜自經死方福娃永康縣志方豫卿女康熙三十三年甫十歲嫡母馮氏病服藥不痊福娃日夜涕泣登樓割左臂肉煎糜以進母病立甦廵撫頒發紬布銀兩匾額優奬陳日升妻王氏永康縣志年二十八夫亡孝事寡姑撫孤娶媳未幾子復亡時媳章氏方娠遺腹生嗣三載媳又亡兩世一孫教育成立年七十終栁于位妻陳氏讞牘于位貰陳老璣肉脂一觔次日老璣來索適于位他出見氏獨處遂出語調之氏憤懣叫呼老璣逸去于位歸氏泣告受侮狀至夜分潛赴水死時年二十二歴審得實請旌應彦宫妻李氏盧一鵬妻沈氏方震暘妻楊氏徐彦泓妻陳氏樓惟駟妻陳氏徐國時妻吳氏周俊初妻應氏吕一森妻周氏應可綸妻朱氏姚國仁妻俞氏姚君恩妻傅氏胡兆通妻應氏朱振生妻吕氏周鴻謨妻徐氏李瓊達妻金氏應堯卿妻葉氏胡之龍妻應氏應鳳虞妻包氏盧子謙妻俞氏盧榮秋妻胡氏金邦泰妻張氏應時起妻朱氏李為棟妻林氏傅泰禎妻翁氏李正珙妻徐氏浙江通志巷二百十二
