body:
  text: 浙江通志卷二百二十祠祀四湖州府烏程縣附郭歸安縣附郭先農壇在東郊國朝雍正五年烏程縣知縣王懋訥歸安縣知縣王錫年奉文建立壇宇并合置耤田九畆八分社稷壇萬厯湖州府志在迎禧門外風雲雷雨山川壇𢎞治湖州府志在定安門外一里許洪武二年置郡厲壇歸安縣志在臨湖門外烏程歸安同祀城隍廟𢎞治湖州府志在阜安坊東宋紹興間在阜安坊西知州事趙叔涔建洪武二年徙今處正統二年通判楊和重建成化五年知府勞鉞鼎建一新湖州府志萬厯七年知府栗祁重修烏程縣城隍廟崇禎烏程縣志烏程城隍之神忠靖王相𫝊為唐張廵廟在縣治東數武而近洪武七年知縣孫成建嘉靖三十三年知縣張冕始正廟制三十六年知縣蔣宏徳重修隆慶元年知縣趙煥復建後寢萬厯間知縣楊應聘徐應鶴陳經正屢修天啟五年知縣馬思理重修歸安縣城隍廟歸安縣志廟在㤗定倉後宋嘉定四十年知縣葉恩始正廟制黄龍洞神祠萬厯湖州府志在郡城北十八里弁山之隂舊名金井梁貞明初有黄龍見易今名歲以五月二十日致祭吳季子祠歸安縣志季子墓在江隂縣暨陽鄉孔子所書十字碑在焉今歸安之射村亦有季子祠西楚霸王廟烏程縣志初在子城内梁天監末太守蕭琛始遷於秦勝門歸安志云陳髙祖永定二年遷縣北二里祠曰霸王廟按唐垂拱四年安撫使狄仁傑檄告楚王遣使焚祠父老以存廟請仁傑齋宿廟中夜夢神言自國家起義兵以及征討吾嘗以隂兵佐今以功獲焚奈何仁傑許其完葺以禮祀奠如故顔真卿項王碑隂述西楚霸王當秦之末與叔梁避仇於呉中盖今之湖州也雖滅秦而宰制天下其魂魄猶樂兹邦至今廟食不絶其神靈事迹具竟陵子陸羽所載圖經大厯七年真卿䝉刺是州十二載奸臣伏法恩命追真卿上都剋期首路竟陵是諗予以故碑顛趾嘗因仍草莽已而復之真卿廼命再加崇樹以紀之時則仲夏方生明之日江總卞山楚王廟詩蘋藻祈明徳倚棹息巖阿忽聽鳥鳴曙非復楚宫歌聞堦薙宿莽古木斷懸蘿帷堂寂易晩桴鼓自相和廟祀流百世英威言幾何通靈王廟名勝志在治南長橋下祀漢銅官山趙監漢吳王濞時令監督胥靡鑿山採銅不忍虐民之力石壓而死故祀之同光中封通靈王徐孺子廟湖州府志在孺山祀漢南州髙士徐穉穉嘗哭友人冀州刺史姚元起於此故祀之張羽髙士廟詩晴明出遊覽南山一登厯上有髙士廟凄凉倚空碧殘僧散已久客至空歎息憶昔漢祚衰朝野方奔廹遂辭東湖墅艤棹此山側髙明懸日月千古留遺跡洪州有髙亭呉楚千里隔側身西南望悲風起悽惻靈濟廟烏程縣志在縣北報恩觀右祀廣徳祠山之神神姓張名渤後漢人初居邑之白鶴山有治水功於廣德顔真卿碑載其事唐乾寧中邑人立草堂祀之宋知州徐鐸始遷今所明正統間通判楊和重建關帝廟烏程縣志在毘山明尚書潘季馴建董份闗帝廟碑始少保公以大中丞治河既築堰又築旁堤二千餘丈堤既就矣而中有龍門末合神顯靈示之夢既寤則堤上人譁傳有神像漂至亟輿而致之宛然夢中所見也少保志本堅㑹有神符其銳益甚期以五日報成夫一淮揚也始則河決百里固天下非常之大變繼則堤成五日尤天下非常之竒功少保所以感神貺而不已也盖少保業已奏請立廟淮上又捐貲而剏廟毘山焉毘山在湖郡東北湖受天目萬山之水而此山鎮之今復鎮以神廟而湖世䝉其庥可知也因并著之郭尚書祠萬厯湖州府志在歸安縣治東文昌宫巷祀晉尚書郎郭璞太康間璞有遷城之功故祀之歲以春秋二仲月致祭四賢堂湖州府志在子城東鎮霅樓之下宋淳祐間知州事髙衡孫建祀晉内史王羲之太傅謝安唐刺史顔真卿宋知州事蘇軾以四公嘗為郡守故祀之徳貺廟名勝志在府治西南祀梁尚書沈約俗呼地主廟三賢祠萬厯湖州府志在峴山正徳十二年建祀唐顔真卿宋蘇軾王十朋歲以春秋二仲月致祭顔魯公祠萬厯湖州府志舊在駱駝橋東後徙於府治西北嘉靖八年知府萬雲鵬復遷於府學尊經閣之左歲以春秋二仲月致祭王十朋顔魯公祠詩卞山苕溪髙且清魯公祠堂貌如生言言千古英雄在吉吉一㸃仙丹成奸臣必欲置之死天下不敢呼其名當時節義誰可並常山太守公難見沈將軍廟名勝志在昇山祀唐婺州刺史沈清大厯中李希烈陷汴州清發兵昇山至汴力戰而死故祀之烏將軍廟名勝志在烏鎮宋紹興間累著靈異勅立祠萬厯湖州府志將軍烏氏重允之族子史失其名李琦反力戰而死故祀之莫淵烏將軍廟碑記茗溪東九十里有鎮曰烏鎮而鎮有祠曰烏將軍廟按五季鄭蟠呉興鏡見録載呉越錢鏐遣兵戍烏程之東九十里以立一障謂之烏戌神炳靈彰異於捍患除災屬鎮之人獲賴其庇祠前有池名上智潭劇旱不枯淫潦不溢若夫神之世系史佚其傳里居亦不可攷故老傳聞謂烏侯闕總戎南討至車溪而沒禆將呉起就墓於池之西北偏創祠於池右儀象備焉胡安定先生祠湖州府志在府治西北觀徳坊歸安縣志宋胡瑗教授湖州熙寧五年郡守孫覺請建安定書院元至正間郡守許師可復新而大之明宣徳初都御史熊槩重建二十世孫守恒忠孝樓在焉春秋致祭國朝雍正九年總督臣李衛重修東坡蘇公祠萬厯湖州府志在駱駝橋東顔魯公祠中宋淳熙八年蕭徳藻撰祠堂記今廢崇禎烏程縣志在弁山黄龍洞公嘗禱雨於洞去後就山建祠張睿卿復東坡先生祠堂記東坡先生元豐二年四月二十九日移至湖州至八月徴赴御史臺在郡僅九十日耳嘗禱雨黄龍洞賦詩刻石先生所至有専祠在江南則秀之三過堂常之似蜀堂杭之孤山堂繪像爼豆宛然如生我湖峴山與顔清臣王梅溪兩公叅祀專祠則缺甚疑之萬厯二十年余遊黄龍洞於灌莽中得礎石模糊剥落似有欵識令童洗剔額有東坡蘇公祠堂碑記八字豈淳熙八年蕭徳藻所撰耶文漫漶不可讀移置觀後余始知湖之専祀先生在弁山因為繪像位之左堂置山下田三畝畀道士歲薦菊泉續昔人就山専祀之意協順廟歸安縣志在縣東南石塚村祀宋陸圭淳祐中封廣陵侯賜廟額詳見杭州府祠祀曺孝子廟萬厯湖州府志舊在府治西北嘉靖八年知府萬雲鵬復遷於府學尊經閣之右西吳里語名曺清烏程人父嘗殺人繫獄清自誣手刃代刑其尸溯流至家中西陽村邑人廟祀有祈輒應宣和初清溪闕昭應侯保障之功因以上聞錫封賜額今徳清有廟郡守又祀於府學尊經閣之右以配顔魯公祠忠孝並列云安吉太守祠萬厯湖州府志舊在府堂左嘉靖十二年知府陳讃遷於愛山臺之上祀宋安吉州知州趙良淳張文昱趙侯祠記趙侯當宋末來守是邦元兵渡江知勢不可為即與家人訣書几上有夫婦俱死節義成雙之句於是佩印綬焚香南向再拜夫婦同縊於郡後之集芳軒邦人義之為立祠兹踰百禩祠宇傾圯洪武二年春太守襄陽楚公易腐塗剥輪奐一新謹按宋末殉節者安吉太守趙良淳自縊死浙西提刑徐道隆與子載孫赴水死池州通判趙卯發與妻雍氏同縊死史傳較然乃舊志牽合云良淳與夫人雍氏同縊死長子載孫亦赴水死而張文昱及牟應龍碑記俱云夫婦同死節義成雙傳訛踵謬是不可以無辯或夫婦同死而非雍氏闕疑可也吳總管祠歸安縣志在雙林太平橋祀呉憲卿行千一元元貞二年以贛州戰功授朝奉大夫歿後贛蔡五九作亂浙江平章張驢討之忽空中旌旗蔽日有吳師千一字兵聲大振贛遂平上其事於朝仁宗封憲卿為總管至正三年於本里立廟肖像祀之袁侯祠崇禎烏程縣志在峴山為知縣袁光宇建傳詳名宦清逺遺愛祠崇禎烏程縣志在南塘對峴山祀知縣馬思理傳詳名宦忠義節孝祠烏程縣忠義祠在尊經閣之左節孝祠在布政分司舊址歸安縣忠義祠在明倫堂東節孝祠在月河舖國朝雍正四年知縣王懋訥王錫年奏文建長興縣先農壇在縣治東白烏區十四庄國朝雍正五年知縣白環奉文建立壇宇并置耤田四畝九分社稷壇嘉靖長興縣志在長安門外西北風雲雷雨山川壇湖州府志在嘉會門外邑厲壇長興縣志在吉祥門外熊明遇長興縣厲壇記天下邑治必祭鬼於北門長官一歲三就壝而䖍禮焉熊子令邑之二年遷之於廣福寺西偏取隂道徑窅而僻庶幾三代擇木之修茂立為菆位遺意也子産曰鬼有所歸廼不為厲吾為之歸也無厲矣城隍廟長興縣志舊在縣治東南二百歩洪武三年創建於縣治東南靈佑坊每歲春秋二仲月致祭𢎞治四年知縣楊埕一修嘉靖末知縣歸有光重修國朝康熙十一年里人捐貲重修增建樓房吳夫槩王廟𢎞治湖州府志在縣東二里夫槩嘗於此築城後人因以立廟錢卿廟西吳里語在縣治西北四里彭祖四十六代孫朔字幼子漢建武中為黄門侍郎代郡太守卒有靈永平七年立廟柯里村置吏十人供其灑掃謝太傅廟萬厯湖州府志在縣西南三鴉岡祀晉太傅謝安嘉靖十二年知縣黄光昇修顯應廟𢎞治湖州府志在城西一里五峯山神姓李名禄字福公世居童庄宋大觀二年正月十八日生赤光照室里人驚異宣和七年沒於海陵之赤岸其靈始顯於兩淮播及江浙縣令趙子卓上其事於朝勅封太尉寶慶二年封威濟侯累加靈惠廣佑福濟忠正王元至順間加英烈二字吳興掌故史彌逺廢濟王潘丙潘壬被誅因欲屠湖州夢中見李太尉求免遂追回大統制一城生靈俱拜更生之徳長興至今敬事之忠武祠嘉靖長興縣志在演武場北知縣石有恒建以閱武因祀大元帥長興侯耿炳文以副元帥劉成廣威將軍周淵並祀石有恒忠武祠碑記長興侯耿公百戰存城功而無祀斯豈非典之缺哉予建亭講武嘗置忠武堂於後以祀公一時與公戮力兹土者有劉將軍之死事周將軍之宣勞歲時祀公以劉周為配貞烈祠長興縣志在子山下知縣熊明遇建祀姚光裕未婚妻周氏傳詳列女忠義節孝祠忠義祠在學宫側節孝祠在縣治西南一里國朝雍正五年知縣白環奉文建德清縣先農壇在東郊三里塘國朝雍正六年知縣崔宣奉文建立壇宇并置耤田四畆九分社稷壇𢎞治湖州府志在縣治西北一里風雲雷雨山川壇湖州府志在廣儲門外邑厲壇徳清縣志在禮辰門之北城隍廟徳清縣志在儒學之左宋紹興中重建明正徳末知縣陳愷改修前殿名勝志廟有古井相傳乃蜃出沒之穴父老載土塞穴以神像鎮其上舊記謂其首枕祠壇尾抵虹橋宋景定間監税吳澄坐務中忽見蜃浮於溪上黄目巨鱗牛首無角須臾乃沒惠應廟萬厯湖州府志在縣東北梅林村祀漢鉅鹿太守魏霸水旱疫厲有禱輒應宋建炎中金人犯境大著靈異嘉泰三年賜今廟額永靈廟萬厯湖州府志廟二俱在新市鎮祀晉里人朱泗陳籛永靈神號加封記縣有鎮名新市其土神朱泗郡人也墓去鎮東北三里耆舊相𫝊侯當晉懐帝朝為將有功殉忠死敵廟食此土周廣順中始封保寧將軍紹興五年賜永靈廟號九年改封顯佑侯至慶元二年又因縉紳士庶言侯自方臘金人之亂屢顯威靈耀兵却敵使寇不入境且數十年水旱疾厲之祈應如響荅即其功惠法當贈封於是賜為顯佑通應侯元配邱氏封協惠夫人其年八月綸誥初下鎮人驩迎大合樂具酌獻誦祝冊以告神已而礲石於廟門屬寓客陳籛為文以記其事沈戩穀重建永靈西廟碑記咸寧五年故呉大司馬右軍帥朱然弟煦從軍司馬氏伐吳轉戰至市誕神於市之施家巷命名曰泗志本泗人也復從軍敗石勒於葛陂永昌元年冒陣死王敦之難泰寧二年封鎮國大將軍降夢立祠於所誕之地即今廟也宋元祐間鎮東人以走祀不