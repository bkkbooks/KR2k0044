孝子純徳徴君即故宅立廟以祀唐大厯二年刺史崔殷嘗葺明洪武四年封為董孝子之神每歲六月六日有司致祭闗帝廟成化四明郡志在縣東南五里靈橋門外教塲北靈應廟成化四明郡志在縣南晝錦橋北舊名永泰王廟宋以來累封為忠嘉神聖惠濟廣靈英烈王胡濙重建廟碑鄞故有廟以祠忠嘉神聖惠濟廣靈英烈王歲久傾圯寧波太守三山鄭公珞貳守宜陽彭公鏞尚寶少卿致仕袁公忠徹合部民之議復撤新之未幾鄭公以秩滿去今太守浮光陸公竒來守是邦充終厥事告成來徴文王鮑氏叔牙之後世居會稽之鮑郎山至王父去隐鄮之青山晉太始三年九月十五日王乃生有神光照室之異遂名曰圖照後更名蓋建興四年七月十五日終於家葬鹿山之原永和中邦人立廟鹿山塑王像歲奉祀之梁大通間封永泰侯唐聖厯中始立今廟宋崇寧中改廟額曰靈應政和八年詔封惠濟宣和三年加封威烈六年加封忠嘉建炎四年加封廣靈紹定間丞相史彌逺作新其廟端平三年改威烈為神聖嘉熙元年加封忠嘉神聖威烈惠濟廣靈王元至大三年六月詔重建祠宇至正二十年改封忠嘉神聖惠齊廣靈英烈王嗟夫王之生也能弭魚龍之患以甦舟人其殁也復能用其威靈擒奴沙之黨禦睦州之盗擁䕶髙宗之播遷至於招通艦旱暵雨澇禱之輒應自晉迄今千數百年而王之封號愈隆無替廟之重建始於正統癸亥五月初六日訖工於乙丑歲季秋望日靈波廟成化四明郡志在縣西二十五里望春山齊梁朝有神姓白名玉常乘玉龍往來顯跡累著唐賜額靈龍宋熙寧七年改今額嘉澤廟嘉靖浙江通志在縣東錢湖北祀唐令陸南金宋守李夷庚又名李陸二公祠闗杞李陸二公祠堂記東平吕君獻之為鄞主簿之二年新錢湖之六隄又考迹其初不忘前人之功俾揭示來者立李陸祠於其隄之旁始唐天寳問縣令陸公南金闢湖之廣為渟滀灌㓎之饒厯宋天禧中太守李公夷庚補其舊之廢址増築全固經畫以制使數鄉之民雖大暑甚旱而卒不知有凶年之憂二公之功及乎民可謂深且厚矣以功則安而久以徳則服而化雖相去數百年猶仰其風采豈不盛哉賀公祠嘉靖浙江通志在縣治西南月湖中唐秘書監賀知章讀書故地宋紹興間郡守莫將嘗建逸老堂祀知章元初堂廢以其地置驛至正十九年郡得知章石像因祠於驛東明洪武初徙今所陸瑜謁賀秘監祠詩春水微茫春草新廟庭花𤼵鳥聲頻黄冠一曲瞻遺像明月三洲仰昔人故宅已憐為傳舍敝廬應喜托芳隣他年幸遂歸湖願為向先生一薦蘋澤民廟成化四明郡志在縣西九里堰旁唐大厯間刺史吳謙字徳裕有善政郡民祠之遺徳廟嘉靖寧波府志在縣西南五十里俗稱它山廟唐鄮令王元暐築堰捍江引它山水入小江湖灌溉甚溥民徳而祠之奏封善政侯宋咸平四年重修乾道四年賜今額蘇為重修善政侯祠堂記琅琊王公元暐唐太和中出佩銅章字人海徼時屬承寛之後躬行阜俗之化以勤儉誡游惰以誠慤崇孝慈貪夫斂手於袖間暴客屏跡於境外能使婚嫁有序惸獨有依他民愁嘆我則民懐乎燕樂他民凋瘵我則民豐乎衣食詩所謂豈弟君子民之父母者歟先是厥土連江厥田宜稻每風濤作冷或水旱成災採石於山為隄為防廻流於川以灌以溉通乎潤下之凙建乎不拔之基能於歲時大獲民利非所謂法施於人者乎能禦大災者乎太博王君嚮侯之徳聲謁其祠庭門榛砌蕪暴露尤甚乃嘆曰將何勸乎吾將新之吏忻民懽風動草偃擇木揆日經之營之於是遷祠之基於堰之上使泛舟者頼其徳力農者懷其恩遺愛之道載彰嚴祭之禮斯備在江之滸佑我蒸民庶使享斯廟者知仁政之可尚也俾旌如在無愧直書茅山靈應廟成化四明郡志在縣西南三十五里唐張仁皓之祠也周汝弼茅山靈應廟記神初度靈光燭城暨長神武慈裕有經濟才仕歴兵馬鈐轄使黄巢亂草竊乘而起渚鴻離散公振威徳撫之沒於茅山之陽屢著顯跡所司聞於朝得謚武遂立廟以祀焉時宋紹興某年也開慶初神兵效順咸淳中加謚靈應石將軍廟舊浙江通志在府西九里望春橋祀宋武威郡王石守信陸瑜重建石將軍廟碑王開封人始與宋祖同為周臣宋代周以佐命元勲封衞國公追封武威郡王謚武烈於戲宋室名將若王之威勇智信者誠不多見宜其生為英傑歿為神明世逺而若存也當高宗幸浙金人南侵見神兵被野有大旗前導號曰石將軍俄為楊沂中所敗宋祚中興亦王之靈有以隂翊之也故鄉民思其功而祀之靈顯廟延祐四明志在縣南四里相傳祀宋鄭世忠建炎間隨駕至鄞死於王事邑人義而葬於金谷里陳嶴後隆之原屢顯靈異有功於民開慶元年賜今額岳公行祠嘉靖寧波府志舊名下塔山廟在縣東南三十五里宋端平間以岳武穆王飛嘗顯靈於此故里人祠之茶場廟延祐四明志在東北隅拱星坊北舊浙江通志神姓徐名硯宋咸淳間以副提舉領茶𣙜使時積苦兵革𣙜及茶税民間有茶一株立削猶編茶户硯請於朝得報罷因即其場而祀之正學祠嘉靖浙江通志在府治南鎮明山祀宋儒楊簡袁燮沈煥舒璘嘉靖三十一年建薛應旂正學祠記宋興百有餘年諸儒繼出立言著論固皆足以為聖賢之羽翼至於直窺堂奥上遡本真而獨得夫傳心之學者象山陸氏蓋不可及也當時逰其門者若慈溪楊敬仲及袁叔和定海沈叔晦奉化舒元質皆高第弟子以道義相切磨而深有契夫陸氏之學特以其師之學與晦菴朱氏入門路徑微有不同所以是朱非陸之説蔓延於天下今以一明州之地萃兹四賢而久無専祀不得與婺之何王企許並列者無亦朱陸之故也乎嘉靖辛亥余視學兩浙遂與寧波守成都孫君宏軾議合四公而祠祀焉因即郡城鎮明菴廢址建堂立主題四公之謚妥安如禮徳惠祠嘉靖寧波府志在縣西十六里祀知府林富及邑儒士楊欽正徳八年建陳槐徳惠祠記寧波府治西僅舍許有湖一區名曰廣徳會鳯嶴桃源諸水瀦而為湖西鄉稻稌穄秫之田攸賴宋政和間樓異典鄉郡決隄去壩墾而成田凡八百餘頃課租四萬石以資國用民之藝湖田者惟納租而差𤼵不與宣徳正統間法改常度租調興焉民始告病以後差𤼵日急湖之民病科征而逃亡者日衆浸淫至正徳初益甚欽憫鄉人之困鬻資為費走京師具陳湖民重困逃亡之由援慈溪花嶼湖田全折之例以上天子允其奏户部移案於浙之藩臬有司内懐疑懼莫敢先𤼵郡守莆陽林公獨斷於已敷言於衆曰上不失朝廷惟正之供下可以舒湖民偏重之困上下帖然無或異議竟得全折如花嶼湖例湖之民感林公之徳食楊欽之惠請之於官立祠𣗳碑以表里居仰徳祠仰徳祠碑記祠建於行用庫西南隅祀郡守射洪楊公最嘉靖七年九月建趙宣楊公事實字殿之由工部郎知寧波府公恕宅心勤廉律已臨民大仁愛之施决獄去寃滯之弊隨任惟一童自奉無兼味俸餘出資公用引鈔復歸商賈朝夕靡寧始終一節以直招尤不偶當道解組行郡人號泣如失怙恃戴白垂髫攀轅不忍捨者動以萬計至終不可留繪像刻木共欲建祠崇祀連遭歲歉功緒未就初邑大夫劉公欲舉此適秩滿不果今耆民邵澄翁鍾等白其事於繼任高公信而許之捐俸資躬經度而督治屬民李澄錢鈺輩各出木石工匠之費樂從者争先恐後卜登瀛橋之門可百歩廢址隙地建正㕔四楹翼以廂廡門臬而髙大之傍置舍為賈㕓取税以修春秋祀事興工於丁亥十月落成於是歲冬底公於既去之後感人如此雖龔黄卓魯未之或過也崇徳祠嘉靖寧波府志在縣西南十五里十字港祀副使陳槐槐嘗力主湖民奏減租議有徳於鄉卒鄉人思之請於郡太守魏良貴立祠祀焉旌忠祠舊浙江通志在鑒橋北祀明御史陳良謨良謨殉甲申之難國朝順治間奉勅立祠賜額旌忠忠義節孝祠二祠俱在西南八圖鄞縣學儀門外國朝雍正五年知縣吳槃奉文建慈谿縣先農壇在東郊外坊一啚國朝雍正六年知縣劉國傑奉文建立壇宇并置耤田四畆九分社稷壇嘉靖寧波府志在縣北門外風雲雷雨山川壇慈谿縣志在南門外半里許邑厲壇慈谿縣志在縣北門外半里公館側城隍廟天啟慈谿縣志在縣西自初建後廢置不常宋咸淳二年重建元至元五年義士童金重修明洪武四年拓其故址增建廊廡左右門歲久而圯萬暦辛亥令陳其柱重建歲以春秋仲月上已日祭劉伯淵新建城隍廟碑記慈邑城隍廟在縣西歲久柱棟欹撓赤白漫漶不稱所以瞻仰之意當事者方以歲之不易業有待也邑人邵相慨然首捐已田為倡邑有願入貲者咸籍之勿為限又以舊址偏左稍隘請於官拓地若干丈前堂神所憑依左祀文昌右祀趙尚書傍兩廊各六間凡塈茨丹雘為神而設者戒誓齋宿為官而設者莫不犁然以次修舉費鏹千五百兩有竒經始萬厯辛亥春落成己未冬國朝康熙三十四年知縣方允猷暨邑人重建三十六年知縣羅萬象重修順濟廟成化四明郡志在縣東南七里地有白龍潭禱之輒應宋淳熙八年建廟寶祐六年賜今額闞公廟明一統志在慈谿縣治東北祀吳闞澤青木山廟嘉靖寧波府志在縣西南二十五里青山峭壁之下晉劉牢之禦孫恩盧循嘗駐兵於此一戰而捷民賴以安時山木茂挺成圍立廟以祀因以名焉張孝子廟嘉靖浙江通志在縣西慈孝坊祀唐孝子張無擇初無擇附於董孝子廟洪武四年以董孝子既廟於府城因専祀無擇於此歲九月九日祭傳詳孝友成化四明郡志宋嘉定十四年邑人李夢林請於縣立祠張琦謁孝子張公祠詩聞説吾宗多孝友先公大行重當時千秋廟貌尊遺典一邑居民仰令儀自昔庭烏能反哺到今溪水尚稱慈百年我亦為人子感慨徒興屺岵思孔君廟嘉靖寧波府志在縣西南六十里安國之十四世孫名殷字徳盛仕唐至大理丞避黄巢之亂至此嘗有徳於民既殁民立祠奉之嘉徳廟慈谿縣志在縣西南二十五里祀梁羅甫王演嘉徳廟記按慈谿邑治西南里名孝順有羅府君廟葢朱梁貞明間羅氏始遷之祖諱甫自桐廬挈家避亂至此因居焉初斯地蕪棄久聞無居人君至耕稼乃作地日益墾資日益裕從而居者益衆君歲時躬率其父兄子弟祀田神而教以禮敬講學務農蔚成善俗其地枕江有浦與渡居人遂號其江曰羅江浦曰東羅浦西羅浦渡曰羅家渡其為人向慕若此君沒葬黄耆衕里人懐念不能忘作祠西羅浦之西君舊祀田神所也歲時饗祀以其子配食宋建炎間縣令林叔豹聞諸朝賜廟額嘉徳凡遇旱澇癘疫禱於神必應楊文元公祠嘉靖寧波府志在縣北慈湖之上祀宋學士楊簡陳文定公祠嘉靖寧波府志在縣西南一里祀祭酒陳敬宗嘉靖初建杜光祿畢主簿祠慈谿縣志在鳴鶴場白湖之濵明嘉靖三十六年建祀贈署丞杜槐縣主簿畢清於其死事所祀以歲十一月二十日彭侍郎祠嘉靖寧波府志在縣杜湖之西北隅祀侍郎彭韶𢎞治己酉韶奉命整理鹽政臨鳴鶴場寛恤民竈邑人思之飲食必祝都轉運林堂為立祠袁文榮公祠慈谿縣志又名元峰書院在北門外祀大學士袁煒王穉登謁袁文榮公祠詩雲中烟火映荒祠遺像蕭條入拜疑馬䇿叩門惟有淚雀羅張户不勝悲山光夜暗圍棋墅海色寒埋掛劍枝千載何人能下士斷腸空憶鄭當時陸詹事祠舊浙江通志在縣北門外祀詹事陸中善春秋二祭汪文毅公祠舊浙江通志在清道觀東祀明邑令汪偉忠義節孝祠二祠俱在學宫西偏國朝雍正五年知縣劉國傑奉文建奉化縣先農壇在東郊三都一啚距城五里國朝雍正五年知縣黄霦奉文建立壇宇并置耤田四畝九分社稷壇成化四明郡志在縣北一里風雲雷雨山川壇嘉靖寧波府志在縣南一百二十歩邑厲壇奉化縣志在縣東北五里城隍廟嘉靖寧波府志在縣西一百歩唐咸通六年令李宗申創後燬元至元二十六年縣尹李天益建明宣徳間知縣周銓正徳間知縣朱豹嘉靖十二年知縣錢璠皆加修葺國朝康熙二十一年邑紳俞廷瑞重修靈濟泉龍祠成化四明郡志在縣南一里宋宣和中令周因植亭祀之南山廟奉化縣志在縣西六里相傳夏黄公之廟資福廟嘉靖浙江通志在縣東一里祀劉宋令謝鳳元至正十九年賜額奉化縣志廟舊在方勝碶旁宋令周因徙今址元封孚祐侯明封宋縣令謝公之神嘉靖末燬隆慶間重建歲九月十六日致祭陳觀資福廟記按古鄞志公名鳯即晉康樂侯謝靈運子也嘗宰鄞有功徳於民至今祠之鄞即今之奉化公為令時嘗作方勝碶溉民田五千餘畝又於碶北作橋以濟不通舊名謝鳳橋紹興間以慶登易之古有生祠在碶南政和八年令周因徙今所公為政寛平務施仁惠為神正直屢彰靈異凡水旱癘疫必禱焉嘉定八年有飛蝗蔽空而來民禱於神忽暴風疾雨驅之出境乃不害稼紹定元年大水漂廬舍齧惠政橋陷龍津館民籲神求援水不為害嘉熙三年夏旱首種不入民禱輒雨咸淳二年夏作淫兩六七月之間旱禾盡槁民就祠禱之雨暘時若元大徳丁未天災流行時境内無虞至大戊申歲大饑劍南有米舟至埼亭云有人招之問之則謝其姓而鳳其名民不為溝中瘠者神之賜也若此者衆不能盡述昔周因能徙其廟而不能請其封號後之人倘能數其事之本末而請於朝則神必能禦災捍患而報其上矣故書其事於石延祐改元九月五日記貝瓊資福廟記初鄞人於公之存徳之如父母建祠碶南像而事之及殁而其神益靈前進士陳觀為之記至正十九年寧海賊馮輔卿帥衆寇境官軍逆戰於􅔐墟嶺仰見大旗飛揚髣髴萬騎雲合而旗有謝字賊駭大奔斬獲無數二十七年正月己夘火民廬燬者若干且及夫子廟學正程式復禱於神尋反風滅火嗚呼古者忠義英靈顯一方者或出於偶然非皆神之所為也惟公庇民於㝠㝠所禱輒應而拯饑平寇彰彰於見聞而不可掩其功為何如哉故書其實以登諸石靈祐廟至正四明續志在治東北五里唐元和中令陸明允有治行民徳之祠焉宋淳祐中賜額封永康侯土埭堰祠成化四明郡志在縣東八里神姓鄭名準唐天祐中為鎮東節度使兼殿中丞侍御史奉化縣開國子築土埭堰灌田五千餘畝明封唐開國子鄭公之神靈昌廟嘉靖寧波府志在縣南五十里祀唐功臣胡進思宋咸淳五年賜額龔茂良靈昌廟記公字克開唐末事錢武肅王天祐元年王建功臣堂記將佐功臣五十餘人名於碑公居二焉忠獻王弟倧襲位暴戾荒淫公數以直諫見疎倧廢弟忠懿王立公謝病不出年九十八疽發而殞鄉父老立祠祀之宣和間睦寇方臘起見甲兵擁白馬為前導者大敗賊兵因奏績於朝敕廟額曰靈昌公以武功著輔翼錢氏四世五王吳越安堵公之徳其在是乎䝉正吕公扁祠曰觀徳北山廟嘉靖寧波府志在縣北一里祀宋奉國軍節度使錢億億惠愛及民卒葬於此邑人廟祀之景祐廟嘉靖浙江通志在縣東百里祀宋義士祖域宋濂景祐廟碑景祐廟者宋殿前司統制祖公廟也公諱域字真夫其先閩人後徙奉化之松溪有文武才建隆中以剛毅稱居郷黨遇歲饑𤼵私廪以賑餒夫所活以千計里有昏䘮貧不能成禮出財帛周助之子弟不能學者為招師儒使就學邑人徳之既沒皇祐二年遂作廟於忠義鄉之福慶里有故必相率趨禱滅火愈疾屢著竒徴元祐中漁者鄧祺徐寳泛海值風舟起立者數四呼神求救公忽見於空中應之俄而火光如斗墜檣下風頓息起視所在舟已至廟下矣建災四年髙宗南奔御舟次崎頭金人追將及見赤旗數萬蔽海上沮懼而退是夕提領海舟張公裕夢神人虎䩨魚服奏對上前自稱官位姓名公裕以聞高宗多公之績封文惠侯賜廟額為景祐元至正二十六年加以昭烈之號崔斯立重修景祐廟記洪武四年二月詔封奉化縣景祐廟故文惠昭烈侯為義士祖公之神歲以三月十九日有司致祭用牲於廟豕一禮也里士卓道長等以神之光被嘉寵若是而庭宇橈敝弗稱遂裒資命工以作新之經始於洪武五年十月竣事於六年五月靈應蕭王廟成化四明郡志在縣北二十里孫勝重建靈應蕭王廟記直縣北二十里有嶺臨於溪上嶺曰界嶺溪曰泉溪而蕭王廟實在焉按舊碑神姓蕭諱世顯字道夫漢蕭相國之後裔也宋天禧二年來令於奉撫字心勞廉公節儉民甚徳之慶厯二年民追誦其徳始祠以祀神大著顯應恩普徳洋淳祐十二年賜廟額靈應元進封綏寧王嗣後屋漸隳永樂間復其故名曰靈應蕭王廟正徳辛未正殿災壬申秋相與鳩堅蒐良四方之人歡來趨事新廟落成視昔有加周南廟嘉靖浙江通志在縣南一里祀宋縣令周因戴杰周南廟記侯號南靈政和七年來宰是邑興利除害宣和間邑之君子耆老咸思之曺公粹中作謡立祠於邑之南驛道左歴年寖久曹公所記之文剝落難考所幸存者惟是謡焉以載於石謡曰侯育我兮民淳民感侯兮慈仁築河碶兮水粼𥻘開池井兮水沄沄我農耕兮河之漘我農耘兮泉之濆土田沃兮稻如雲歲功成兮徳澤均以食以餐兮子孫詵詵歌侯之勲兮頌侯之勤頌侯之勤兮歌侯之勲善塘廟嘉靖寧波府志在縣東北五里祀宋左朝議大夫仇悆陳居仁待制仇公善塘記公字泰然青州益都人紹興初知明州雅愛奉化山水之秀因㝢居長汀之曲長汀東堤數里之間流多曲折霪雨潦漲故堤不足以捍横流公修築堤塘約七百餘丈又於堤塘北伐石為一碶名曰沙堰碶以通田澗故溝澇則殺其水勢之奔突旱則資其清流之灌注於是宅土者得其安耕田者得其利紹興十六年公沒越明年父老士民於塘之曲立祠繪像以奉名曰善塘祠以其能禦捍横流為善流又嘉其善作而善成也顯忠祠舊浙江通志在縣東告成寺塔下祀明靖難死事拾遺戴徳彛姚淶顯忠祠記戴公徳彜之死難幾百四十年人諱而不稱淶自入史館知公大節北兵南下長江不守公以身殉主禍延宗黨此公死事之迹也嘉靖戊子邑侯陳君縞至淶為言之陳君請於觀風者而祠之學宫猶未有専祀也越五載海虞錢君璠繼宰是邑淶復告之乃闢地社學之左為宇三楹顔曰顯忠祠屠隆謁顯忠祠詩乾坤蒼莽暗風塵不道時危好致身萬里山河歸朽骨九天日月照孤臣樽前空灑蘋花淚死後誰回白草春霜落高城遺廟肅墓田蕭索過行人趙公祠在縣南六十里祀國朝總督趙廷臣康熙八年命使廵海公與之借由台至寜卒於馬家嶴士民立廟於驛南忠義節孝祠二祠俱在縣學東偏雙司基國朝雍正五年知縣黄霦奉文建鎮海縣先農壇在縣城西門外距城五十步國朝雍正五年知縣田長文奉文建立壇宇並置耤田四畝九分社稷壇鎮海縣志在縣城西北一里風雲雷雨山川壇成化四明郡志在縣西一里邑厲壇鎮海縣志在縣城外西北一里城隍廟嘉靖定海縣志在縣東南城邊梁貞明三年建元至正二年重建明洪武四年知縣杜彬廣其址重修永樂十三年圯正統間知縣戴鍾重建天順六年知縣賀懋加修國朝康熙元年知縣王元士重建龍神廟在縣東鎮逺門外十里海山洞口國朝雍正五年奉勅封涵元昭泰鎮海龍神發帑銀二千五百兩創建祠宇八年知縣張珽奉文建靜波廟成化四明郡志一名薛將軍廟在縣西世傳薛仁貴征遼道經於此撫安人民鄉人立行祠焉顯靈侯廟延祐四明志在縣西五里侯姓孔象山童翁浦人行第七性剛烈死於海有劉贊者夢侯曰上帝録我善命為境神已籍水府吾屍泛於沙浦君能収𦵏創數楹俾有棲托必為民利贊訪問果如夢即所居奠而祠之錢氏有吳越乃立廟宋髙宗幸海道賜額顯靈治水判官黄公祠嘉靖定海縣志在縣西北靈緒鄉武功村祀宋浙東轉運司判官黄恕鄭清之黄公祠記慶元之属縣曰定海者東濵滄溟世苦潮患治北走二舍則莊闕村之新土塘也稍北則武功村之和尚塘也界袤數流淖淤蕩㴱莫測其底南北相距百餘丈横亘阡陌之間嘗聚土列石甃之比將成水從下湧汎溢無際時或静夜有聲如鼓翌日必大决海潮闕應揚濤洶入桑田殫為斥鹵歲或十餘決邇年尤數衆共神之望洋蹙額束手浩歎而已值太府卿知府事兼沿海制置使章君大淳蒞職大濬湖渠百廢具舉乃共以狀控之時公領轉運判官素以廉幹聞章君遂屬以厥事公慨然任之露處野宿躬荷鍤督役運土石垂成而復決者屢焉乃廣募良策有術士排衆直前曰是地也無物而聲無風而濤龍罔象所蟄也投以生人彼畏陽而縮功可立奏公色忿然瞋目視曰修此以為民也殺人以求成功何心哉必爾捐吾身耳厥明􅷜沐具少牢以奠再拜為民請命少頃其下復有聲衆駭懼擾亂旁有峻崖公䇿馬臨之諗於衆曰吾死於此若輩奮力語未究崖崩如雷公併馬溺焉衆號擗聲震原野已而波濤恬然乃如公命投土不復淖決三日封土與兩塘連接忽塘右數十步外水起如注衆方懼復決俄湧公屍出㨿鞍攬轡顔色如生民争出資具衣冠殮焉時淳祐戊申夏四月八日也公舍人欲歸其柩民攀輿泣曰我公袪百世之害當享百世之報願乞衣冠葬而祠之章君以聞於朝勅進秩宣撫判官聽民立廟三旬廟成公諱恕字文揆别號東浦張越國公祠鎮海縣志在縣東北二里巾子山上祀宋忠臣張世傑卞公祠成化四明郡志在縣東北五里元至正二十八年朝列大夫卞燾痛父樞宻承㫖卞良輔死於王事因於山下立祠表功廟嘉靖浙江通志在縣東南隅祀信國公湯和賜廟額歲春秋祭海道譚公祠鎮海縣志在縣東二里威逺城内明嘉靖四十一年知縣何愈建祀廵視海道副使譚綸張時徹譚盧二公祠記東南夷寇之患起於積弛天子博咨才碩以任驅除梅林胡公實專節鉞時則有若廵海副使譚公綸文武兼資有若都督同知盧公鏜宿嫺韜畧胡公試於有衆倚為腹心二公相與議曰定海海壖奥區而招寳則郡治之門户也此其山去縣城百武而近賊如登而據之飛砲其上則縣城瓴甓碎耳即夷船尾啣而入亦何以制之為戰守計者宜莫如城招寶便乃以其意裁於胡公公輒報諾卜日鳩工於時文武吏士懽欣鼓舞以為更生之賜乃為祠以祀胡公已復為祠祀譚盧二公兵志曰上兵伐謀又曰善師者不戰其三君子之謂乎祠而祀之夫誰曰不可都督盧公祠鎮海縣志在縣東北二里明嘉靖四十一年為都督盧鏜建翁大立都督盧公生祠記公樹勛海上五十餘年矣以年踰七十請老於朝上未允所請而濵海士民恐公一旦懸車亟謀肖公像為祠尸祝嗟乎公身經數百戰前後俘斬萬餘海上之勛無踰公者昔信國封公廣寧封伯朝廷今以兩者待公公胡遽言去也公名鏜别號北山以處州衛指揮起家其子相有父風臨陣身先士卒父子一時崇功偉業照耀海内亦古今之所難者歟都督俞公祠鎮海縣志在縣東半里鎮逺門内明嘉靖三十五年為都督俞大猷建豐道生俞公生祠記舟山者定海之塞也賊據山閲歲公圖於副使方湖王公授畧於指揮張四維縱兵擊且焚殆盡擒百四十獻於胡公其民歸於田屋舍妻孥晏然復矣於是詔進公都督同知總兵開府定海定海之士民相與薙壤構祠而尸祝之忠義節孝祠二祠俱在學宫東偏國朝雍正五年知縣田長文奉文建象山縣先農壇在城東三百歩國朝雍正四年知縣馬受曾奉文建立壇宇并置耤田四畝九分社稷壇象山縣志在縣西彭姥嶺下風雲雷雨山川壇象山縣志在縣西南半里邑厲壇成化四明郡志在縣北八十歩城隍廟象山縣志舊在治西南四百歩東嶽廟之前唐神龍二年建明洪武三年遷於縣之東北一里東塘山下嘉靖二十年令毛徳京築城工畢徙縣東南文峰塔之右普濟廟嘉靖浙江通志祀龍神宋南渡初賜額曰靈濟明改賜今額蔣景高普濟廟記象山踞海而邑大縣東南三十五里山勢垂盡入大海中抑而復昂島嶼角立山之下巖竇空洞中垂石柱如踞龍湫宅其内潮汐衝撞旦夜不息惟暮春之三日水退人可逰焉石乳巖花繽紛欲墜盖龍之所居云歲早禱祈即應故立廟以祀之廟在東山之隈赤巖之陽宋熙寜間縣令黄顔為記及高宗南渡舟幸海道風濤震驚神之功曹柳氏昆弟三人顯忠效靈以濟艱危由是賜靈濟廟額元之季年屋久而圯𢎞治癸丑冬主簿孫徳仁乃經始而謀度之縣丞賈行簡典史張克已又從而贊襄之爰出稍廩以先士民甲寅孟夏新廟告成顧長官祠延祐四明志在縣城内長官名方字正夫丹陽人宋皇祐末登進士調象山令勸善懲惡建學舍教子弟逾年民大化後卒邑人思慕相與立祠陳元帥廟象山縣志在縣西南二十里又名靈濟廟周希程陳元帥廟記元帥宋丞相宜中從子名失𫝊行十五少負勇畧拜議郎理宗時屢立戰功擢大元帥徳祐中扈從舟次象境金井灣得暴疾知不可起遥向帝舟叩頭長慟而逝遂葬於姥嶺之麓麾下死義者四人殉葬墓側一夕鄉民夢神語曰元兵至矣我將拒之數日果見元舟蔽海而下乗風徑入一鄉辟易元帥率隂兵列海岸元兵望兩岸皆軍遂退去明日復來又如之民得保障因立廟塜上祀焉明嘉靖三十八年倭寇百餘屯四都海道譚綸部兵來勦神効靈助順遂捐資修廟更建石坊匾曰神武錢尚書祠寧波府志在治西尚書諱唐明萬厯三十六年立祠春秋有祭忠烈廟嘉靖寧波府志在縣東北四十里祀明死事千户易紹宗毛公祠象山縣志在治東南城隍廟右明嘉靖十九年令毛徳京建象城功在不朽民祀之忠義節孝祠忠義祠在縣學左側節孝祠在縣治東隅國朝雍正四年知縣馬受曾奉文建定海縣先農壇在東門外一莊國朝雍正五年知縣李灼奉文建立壇宇并置耤田四畝九分社稷壇定海縣志在西城外半里祈雨山下風雲雷雨山川壇定海縣志在南城外半里觀山之麓邑厲壇定海縣志在北城外北山之麓半里許城隍廟祭附山川壇國朝康熙中始建繆燧新建城隍廟記邑之祀城隍所以崇保障祝安釐也定邑洊經廢徙廟亦因革無定展復以來剏置簡畧僅蔽風雨而已余抵任即與鎮府藍公斥俸鳩工己夘復偕闔邑衿庶捐資重建規模粗就儀衛改觀蔚然與壇壝學校並峙於城郭數里之内岱山廟延祐四明志在北海中世傳隋末陳稷沒後顯靈於此天妃聖母祠定海縣志在治南岑港嶴明萬厯間建屠隆天妃聖母祠記州治南去里許阻山下即南闗津渡處山之陽天妃聖母宅焉頽垣敗宇焚修久廢登覽者悽然夫東南恃舟師以寜舟師恃神庥以濟厥靈弗妥當事者之過已萬厯辛巳參戎表侯來守是邦登山謁聖母祠顧而嘆曰澤國洪濟實式憑之我軍民所共乞靈者其屑越之也輒捐俸如干聚材鳩工塗堊完整洪流滙前蓉峰環錯朝暾夕暉頓成勝覽於是人具瞻而神庥普矣甲辰春仲告成成仁祠定海縣志在北門外國朝康熙四十二年知縣繆燧建祀呉鍾巒張肯堂等數十人忠義節孝祠二祠在明倫堂左偏國朝雍正六年知縣李灼奉文建浙江通志卷二百二十
