body:
  text: 浙江通志卷二百六十三藝文五序越州秋日宴山亭序唐王勃王子敬琅琊名士常懷習氏之園阮嗣宗陳留俊人直至山陽之坐豈非琴樽逺契必兆朕於佳辰風月高情每留連於勝地是以東山可望林泉生謝客之文南國多才江山助屈平之氣况乎揚子雲之故地巖壑依然宓子賤之芳猷弦歌在屬紅蘭翠菊俯映砂亭黛柏蒼松深環玉砌參差夕樹煙侵橘柚之園的厯秋荷月照芙蓉之水既而星回漢轉露下風高銀燭掩花瑤觴抒興一時仙馭方深擯俗之懷五際飛文更動緣情之作人分一字四韻成篇在會稽與京邑遊好詩序唐顧雲造化之功東南之勝獨會稽知名前代詞人才子謝公之倫多所吟賞湖山清秀超絶上國羣峰接連萬水都會升高而望盡目所窮蒼然黯然兀然淡然先春煦然似畫似翠似水似氷似霜似鏡削玉似劒者露布似窈窕者霜清似英絶者如是者千狀萬態綿亘數百里間則夫盤龍於泉巢鳳於山蘊玉於石藏珠於澗固必有矣真駭目爽精之所也其土沃其人文雖逼閩蠻而亦知禮節雖枕江海而不甚瘴疲斯焉郡邑一何勝哉將天地之樂萃於此耶至於物土所産風氣所被鳥獸草木之奇妖冶嬋娟之出前聖靈蹤往哲盛事此傳記所詳不假重言也斯但粗述其勝耳僕雖乏才自侍從至此晨夕習業之外遊覽所得吟咏煙月攄散情志自足一時之興也亦足快哉然時或倚檻南臨回首西望相交朋逺誰與同之每思往年於京洛間見時俗之士浮淺之流多誇邑外人家有水木田園莊舍甚為奇勝可比江山常與俱往往謂信然今在此乃知前者之悠悠妄誇耳不足聽且夫方壺員嶠桃源洞天自標真聖之居不與囂塵相接非但計幽隱已也至於人寰所有遊觀必常顯敞知名若會稽山水深不可測高不可及如是乃能孕靈怪藏珍寶生雲霞而盡勝概耳豈於十畝之地朝夕之間鑿為汙池植為幽藪源流既邇根柢可知深不過藏青蛙密不過棲烏鵲而能出奇為勝哉今之君子多尚奇好事貴達顯揚幽僻仄陋則言之而實不足徴也不然則是人能與造物爭功矣今序其事貽諸朋好知之者幸棄彼冗瑣而同此遊也為通理矣輒以數篇鄙拙寄贈誠玷視聽貴盡其樂以資笑言送台州崔録事二十一丈赴官序唐權德輿夏四月臨海紀綱掾崔雅璋受命選部出東門是嵗重表甥權德輿始至京師寓居同里顧其室空無以自貺逺輒竊仁者之義申之以言云古之君子修誠以慎獨居易以養正實中茂而纓縠外華其或不至則安之若命蓋直已而不必用蹈道而不必行居今行古者實鮮而雅璋是已言必踐學必思四命官率由會府進不茍而交不黷簡廉肅給推心為理滿嵗罷去則與令弟躬耕於茅山之下睦姻食力修家法考農政嘻嘻申申有義有仁起於棖閭被於鄉黨之動也之靜也得古之遺風暗然而未彰不易其方寧蹇連以終否無奇邪以害正華髮承辨知者嘆之且夫列郡之督郵視天臺之司轄地征之衆寡賦政之細大為樞為柅何莫由斯豫獨知臨海之人受賜不暇矣又况琪樹風清石橋月明羽人仙子髣佛如親遺有涉無與境而勝象外之歡可勝既乎今大君子主浙河東諸侯府多雋賢且有雅璋者庸詎知今日適越不為異時之大來耶二三君子送逺加等釃酒以祖道歌詩以發志賢雅璋而思仙山故也各見於辭奉國軍衙司都目序宋錢彥逺詩曰王之爪牙言吏士鋒鋭能搏噬奇邪也故軍將皆建旗於前曰大牙凡部曲受約束稟進即悉趨其下近世重武通謂刺史治所曰牙緣是從卒為牙中兵武吏為牙前將俚語缺誤轉稱為衙唐自開元至五代間衙將最重皆督千人兼檢校臺省官猶春秋陪臣非才幹勇略不授國初芟誅姦雄斂威銷萌出儒臣守郡始募城郭子弟或里胥雜補惟得管倉庫部飛挽趨擯呼指爾乃立條教以均勞逸視比例以參輕重考嵗月以敘等級愛民甚矣天下一也就有風俗便宜亦從而小殊明州漢之鄮縣本朝賜節度額其地東濱海洋羣山聯屬田塉且隘鮮蠯錯出居人啙窳偷生喜輕衣甘食無蓄積之實衙將員雖百有二十資産視他郡為瘁典吏乘隙骫枉重四握粟出卜訟訴繁興昭文學士陸君下車明年彥逺得為通判官會按察使符俾釐正簿領復命鄞主簿何世昌侑焉頗蠲除舊弊數端悉條列便合法令而附近人情衆以為便乃獻狀按察二使既成題曰衙司都目因書本末篇首序越州鑑湖圖宋曾鞏鑑湖一曰南湖南並山北屬州城漕渠東西距江漢順帝永明五年會稽太守馬臻之所為也至今九百七十有五年矣其周二百五十有八里凡水之出於東南者皆委之州之東自城至於東江其北隄石撻二陰溝十有九通民田田之南屬漕渠北東西入江者皆溉之州東六十里自東城至於東江其南隄陰溝十有四通民田田之北抵漕渠南並山西並隄東屬江者皆溉之州之西三十里曰柯山斗門通民田田之東並城南並隄北濱漕渠西屬江者皆溉之總之溉山陰會稽兩縣十四鄉之田九千頃非湖能溉田九千頃而已蓋田之至江者盡於九千頃也其東曰曹娥斗門曰藁口斗門水之循南隄而東者由之以入於東江其西曰廣陵斗門曰新徑斗門水之循北隄而西者由之以入於西江其北曰朱儲斗門去湖甚逺蓋因三江之上兩山之間疏為二門而以時視田中之水小溢則縱其一大溢則盡縱之使入於三江之口所謂湖高於田丈餘田又高海丈餘水少則泄湖溉田水多則泄田中水入海故無荒廢之田水旱之嵗者也由漢以來幾千載其利未嘗廢也宋興民始有盜湖為田者祥符之間二十七戶慶厯之間二戶為田四頃當是時三司轉運司猶下書切責州縣使復田為湖然自此吏益慢法而姦民浸起至於治平之間盜湖為田者凡八十餘戶為田七百餘頃而湖廢幾盡矣其僅存者東為漕渠自州至於城東六十里南通若耶溪自樵風涇至於桐塢十里皆水廣不能十餘丈每嵗少雨田未病而湖蓋已盡涸矣自此以來人爭為計説蔣堂則謂宜有罰以禁侵耕有賞以開告者杜杞則謂盜湖為田者利在縱湖水一雨則放聲以動州縣而斗門輒發故為之立石測水一在五雲橋水深入八尺有五寸會稽主之一在跨湖橋水深四尺有五寸山陰主之而斗門之鑰使皆納於州水溢則遣官視測而謹其閉縱又以謂宜急理隄防斗門其敢田者拔其苗責其力以復湖而重其罰猶以為未也又以謂宜加兩縣之長以提舉之名課其督察而為之殿賞吳奎則謂每嵗農隙當僦人濬湖積其泥塗以為丘阜使縣主役而州與轉運使提點刑獄督攝賞罰之張次山則謂湖廢僅有存者難卒復宜益廣漕路及他便利處使可漕及注民田里置石柱以識之柱之內禁敢田者刁約則謂宜斥湖三之一與民為田而益隄使高一丈則湖可不開而其利自復范師道施元長則謂重侵耕之禁猶不能使民無犯而斥湖與民則侵者孰禦又以湖水較之高於城中之水或三尺有六寸或二尺有六寸而益隄壅水使高則水之敗城郭廬舍可必也張伯玉則謂日役五千人濬河使至五尺當十五嵗畢至三尺當九嵗畢然恐工起之日浮議外搖役夫內潰則雖有智者猶不能必其成若日役五千人益隄使高八尺當一嵗畢其竹木費凡九十二萬有三千計越之戶二十萬有六千賦之而復其租其勢易足如此則利可坐收而人不煩弊陳宗言趙誠復以水勢髙下難之又以為宜從吳奎之議以嵗月復湖當是時都水善其言又以為宜增賞罰之令其為説如此可謂博矣朝廷未嘗不聽用著刑之法故罰有自錢三百至十千又至於五萬刑有杖百至於徒三年其文可謂密矣然而田者不止而日愈多湖不加濬而日愈廢其故何哉法令不行而茍且之俗勝也昔謝靈運從宋文帝求會稽回踵湖為田太守孟顗不聽又求休崲湖為田顗又不聽靈運至以語詆之則利於請湖為田越之風俗舊矣然南湖由漢厯吳晉以來接於唐又接於錢鏐父子之有此邦其利未嘗廢者故或以區區之地當天下或以數州為鎮或以一國自王內有供養祿廩之頒外有貢輸問饋之奉非得晏然而已也故強水土之政以力本利農亦皆有數而錢鏐之法最強至今尚多傳於人者則其利之不廢有以也近世則不然天下為一而安於承平之故在位者重舉事而樂因循而請湖為田者其言語氣力往往足以動人至於修水土之利則又費財動衆從古所難故鄭國之役以謂足以疲秦而西門豹之治鄴渠人亦以為煩苦其故如此則吾宋之吏孰肯任難當之怨來易至之責以待未然之功乎故説雖博而未嘗行法雖密而未嘗舉田者之所以日多湖之所以日廢由是而已故以為法令不行而茍且之俗勝者豈非然哉夫千嵗之湖廢興利害較然易見然自慶厯以來三十餘年遭吏治之因循至於既廢而世猶莫悟其所以然况於事之隱微難得而考者由茍簡之故而弛壞於冥冥之中又何知其所以然乎今謂湖不必復者曰湖田之入既饒矣此遊談之士為利於侵耕者言之也夫湖水盡廢則湖上之田旱此方今之害而衆人之所睹也使湖盡廢則湖下之為田亦旱矣此將來之害而衆人所未睹者故曰此遊談之士為利於侵耕者言之而非實知利害者也謂湖不必濬者曰益隄壅水而已此好辨之士為樂聞茍簡者言之也夫以地勢較之壅水使高必敗城郭此議者之所已言也以地勢較之濬湖使下然後不失其舊不失其舊然後不失其宜此議者之所未言也又山陰之石則為四尺有五寸會稽之石則幾倍之壅水使高則會稽得尺山陰得半地之窪隆不並則益隄未為有補也此好辨之士為樂聞茍簡者言之而又非實知利害者也二者既不可用而欲禁侵耕開告者則有賞罰之法矣欲謹水之蓄泄則有閉縱之法矣欲痛絶敢田者則拔其苗責其力以復湖而重其罰又有法矣或欲任其責於州縣與運使提點刑獄或欲以每嵗農隙濬湖或欲禁田石柱之內者又皆有法矣欲知濬湖之淺深用工若干為日幾何欲知增隄竹木之費幾何使之安出欲知濬湖之泥塗積之何所又已計之矣欲知工起之日或浮議外搖役夫內潰則不可以必其成又已論之矣誠能收衆説而考其可否用其可者而以在我者潤澤之令言必行法必舉則何功之不可成何利之不可復哉鞏初蒙恩通判此州問湖之廢興於人求有能言利害之實者及到官然後問圖於兩縣問書於州與河渠司至於參核之而圖成熟究之而書具然後利害之實明故為論次庶夫計議者有考焉重修睦州圖經序宋董弅周官職方氏掌天下之圗周知其數西漢得秦圖書具知天下厄塞戶口多少強弱處光武中興按司空輿地圖以封諸子厯代倣周遂以職方名唐天寶設制凡地圖命郡府三年一造與版籍偕上省國朝詔令閏年諸州上地圖大中祥符四年詔儒臣纂修圖經頒下州縣俾遵承之距今百二十有八年矣其間州名有更易軍制有升降戶口有登耗稅賦有增損既皆不同而又艱難以來州縣惟科斂是急趣具目前閏年之制寖以不舉蓋職方之職廢也紹興七年弅來承乏嘗訪求厯代沿革國朝典章前賢遺範率汗漫莫可取正詢之故老則曰是邦當宣和庚子盜據之後圖籍散亡視他州尤難稽考乃喟然曰惟睦為州山水清絶有高賢之遐躅久以輯睦得名今因嚴陵紀號自唐為軍事州藝祖開基首命太宗為睦州防禦使先帝政和中悉褒録祖宗潛藩之地詔升其軍為節度既而出節少府以授今上嘗以親王遙臨鎮焉其後繼世以有天下實似太宗蓋是邦兩為真主興王之地其視少康之綸漢文之代有不足道者其望顧不重哉而况厯代以來文人才士間出於其地偉賢巨公來為牧守者相望也庸可以勿紀乎於是因通判軍州事有請乃屬僚屬知建德縣事熊遹州教授朱良弼主建德縣簿汪勃主桐廬縣簿賈廷佐及郡人前漢陽軍教授喻彥先相與檢籌事實各以類從因舊經而補輯廣新聞而附見凡是邦之遺事略具矣豈特備異日職方舉閏年之制抑知為政者究知風俗利病師範先賢懿績而承學晚生覽之可以輯睦而還舊俗宦達名流可以企高風而勵名節詎小補也哉至於紀録尚或未盡則以俟後之君子紹興己未春正月壬午知軍州事董弅序遊天衣詩序宋王十朋紹興戊寅冬十有一月己卯日南至後二日遊天衣者八人皆前進士宦遊於越者黎明戒裝集賀監之故居天氣既佳愛日初長籃輿出蠡城之南道乎稽山之陰徜徉乎秦望鑑湖巖壑之間有松十里林麓靜深山轉徑迂煙靄出沒初行若迷俄有鐘磬出乎翠微之端蓋天衣寺也千峯堆秀雙澗涵碧朝陽法華二峯尤蒼然嶄絶乎其中寺有唐人李泰和徐季海元微之白樂天李公垂諸作者詩文碑刻尚無恙有化身普賢飛來銅像蕭梁衣鉢雙烏故事緇徒頗能道之方杖履尋幽有府吏將使君之命餉以百榼拜賜舉杯而言曰今日之集蓋不偶然也昔王謝蘭亭羣賢畢至可謂雅會矣然詩賦不就者十有六人豈若吾儕臭味同而遊從勝乎白衣之來非王𢎞之酒乃楚元之醴也不可以不盡其歡於是浮白飛觴唱酬交作雜以諧笑僧勸遊雲門夕陽薄山遂不果舍車聯騎探梅而還晚集於泮宫初登山某首賦一章同行即席而和既而吟詠者多不記篇目列書於招提諸公命某序之重修嚴州圖經序宋劉文富先王盛時封建未壞井地既正疆理修明千八百國之廣各有土地之圖以周知其地域大司徒所掌是已且司徒掌邦教之任而乃下兼職方之事其亦有説歟蓋民之情性有剛柔輕重遲速不同不辨其宜而施教焉則有捍格而不相入者是以修其教不易其俗齊其政不易其宜逮秦人罷侯置守亦各有圖漢人入關所收財知厄塞而已司徒辨五地十二壤而施十有二教之制無有也漢氏去古未逺不能復先王之制而郡國難治况後世去先王益逺而曰復古不其疏乎國朝沿唐郡縣之舊而其經理視唐尤為盡善大中祥符三年十二月丁巳詔奬翰林學士李宗諤等上新修諸道圖經由是圖籍大備而嚴之為州自東漢建安中至是適八百年矣其遷徙廢置詳載於經郡有板本中更遺漏不存淳熙甲辰太守陳公公亮下車之初憫其廢墜而未暇也逾年時和年豐訟簡刑清百廢具舉課最之餘因取舊經命文富訂正之將再鋟諸木竊惟此邦之俗舊號輯睦因以名州可以無事治不可以多事理所謂安於簡易之政擾之則生事是以自公之開府將再期矣一以寬政理惟頑民黠吏始繩之以法故邦人甚安之因其俗而施其教公已得之此其大可書者若夫民數之登降財賦之盈縮事籍之去留公館之興廢是則因之否則革之特其粗耳故書其大者以告後之為政云嵗丙午正月丁未迪功郎州學教授劉文富序會稽志序宋陸遊昔在夏禹會諸侯於會稽厯三千嵗而我高宗皇帝御龍舟橫江應天順動復禹之迹駐蹕彌年定中興之業羣盜削平北朝和好於是用唐幸梁州故事升州為府冠以紀元大駕既西幸而府遂為股肱近藩稱東諸侯之首地望蓋視長安之陜洛汴都之陳許所命牧守皆領浙東安撫使其自丞相執政來與去而拜丞相執政者不可遽數而又昭慈聖烈皇后及永祐以來四陵攢殿相望於鬱蔥佳氣中朝謁之使艫銜轂擊中原未靖今天下巨鎮惟金陵與會稽耳荆揚梁益潭廣皆莫敢望也則山川圖牒宜其廣載備書顧未暇及者綿數十年大卿沈公作賓待制趙公不迹繼為守皆慨然以為己任乃與通判軍事施君宿安撫司幹辦公事李君兼韓君茂卿及郡士馮景中邵持正陸子虡王度朱鼐等上參禹貢下考太史公及厯代史金匱石室之藏旁及爾雅本草道釋之書稗官野史所傳神林鬼匠幽怪恍惚之説秦漢晉唐以降金石刻歌詩賦咏殘章斷簡靡有遺者若父老以口相傳不見於文字者亦間見層出積勞纍月乃成是雖本之圖經圖經出於先朝非藩郡所可附益乃用長安河南成都相臺之比名會稽志會稽為郡雖遷徙靡常而郡本以山得名又禹所巡也故卒以名之而屬某為之序嘉泰元年二月庚子中大夫直華文閣致仕陸某謹序赤城志序宋陳耆卿圖牒之傳尚矣今地踰萬里縣不登萬戶亦必有成書焉矧以台為名邦且稱輔郡綿涉千載迭更數百守而闕亡以詔難之歟抑因陋襲簡不暇問歟蓋昔有守四人嘗厪其力於斯矣如尤公袤唐公仲友李公兼類鞅掌不克就最後黃公畇辱以命豫偕陳維等纂輯焉會黃去匆匆僅就未備也束其稿十年矣更久則非惟不備而併與僅就者失之今青社齊公碩始至欲迄就未暇踰年報政遂復以命豫於是郡博士薑君容總𣙜之邑大夫蔡君範以下分訂之又再屬陳維及林表民等採益之既具豫為諗沿革詰異同劑巨纖權雅俗凡意所未解者恃故老故老所不能言者恃碑刻碑刻所不能判者恃載籍載籍之內有漫漶不白者則斷之以理而折之於人情事立之凡卷授之引微以存教化典章非直為紀事設也如是者半載而書成嗟夫同是州也非可成於今不可成於昔也或曰有時爾昔歐陽公論學慨述吏道以為有司簿書之所不責者謂之不急夫豈惟學哉語以圖牒非不急之尤者耶然而莫奧於圖牒莫泄於簿書有司之所不急固君子之所急也今公之為政也剖叢滌煩燭幽洞隱於有司所急者誠井井矣而於君子所急者尤惓惓焉用能以半載之間紉千嵗之闕增十年之未備洗數百守之因襲成四人之厪嗟此豈以其時哉書成者時也所以成者公之志也其志立則時赴之矣無其志而曰需其時者吾未之聞也豈惟一圖牒為然天下事皆然永寧編序永寧即永嘉宋留元剛是編非取夫搜托新故誇詡形勝而已事變之會風俗之趨蓋將有考焉觀敘州自晉以來守凡幾人孰賢孰否觀敘人自國初以來作者幾人孰先孰後熙寧而後所易兵制善於古否建炎而後所增稅賦安於民否水利何為而便役法何為而病是非得失之迹廢興沿革之由安危理亂於是乎在一言去取萬世取信寶慶四明郡志序宋羅濬四明舊有圖經成於乾道五年蓋直祕閣張公津守郡之三祀也先是大觀初朝廷置九域圖志局令州縣編纂以進明已成書而厄於兵火遂逸其傳三山黃君鼎得所藏以獻張公乃俾僚屬參稽釐為七卷而鋟諸梓然自明置州至是四百三十三年而城池之遷徙縣邑之沿革人未有知其的者唐刺史韓察實移州城石刻尚存於時且未之見他豈暇詳甚哉作者之難固有俟於述於後者也尚書廬陵胡公以寶慶二年被命作牧上距鋟梓之嵗甲子欲周而竟未有述之者越明年政修人和百廢具興爰命校官方君萬里取舊圖經與在泮之士重訂之未幾方君造朝事遂輟又明年余調官遲次來謁鈴齋尚書俾專任斯責因得與士友胥講論胥校讎且朝夕質諸尚書迄仲秋成二十一卷圖少而志繁故獨揭志名而以圖冠其首考據之未精搜訪之未博淺學其敢辭誚而百五十日之間用力亦勞矣竊嘗謂道地圖以詔地事道方志以詔觀事古人所甚重也圖志之不詳在郡國且無以自觀而何有於詔王哉欲知政化之先後必觀學校之廢興欲知用度之贏縮必觀財貨之源流觀風俗之盛衰則思謹身率先觀山川之流峙則思為民興利事事觀之事事有益所謂不出戶而知天下者也今有司類窘簿書期會問以圖志之事率曰是非所急尚得謂之知務乎尚書召還孔邇執六典八則之要按九賦九式之目以佐聖天子經綸四海則收圖書固相業之一天下之大一邦之推爾注意拳拳有以也夫重編吳興志序宋傅兆唐人權載之序貞元十道録謂言地理者獨魏公且因許其經濟逺大之業及觀魏公所論六典地域之差次四方貢賦之名物與夫州郡廢置山川險阻無一不備然後知載之不妄許可今州縣之編雖與並載寰宇者不類條目纖悉亦豈易為茍非其人則詳略勿當是非雜糅何以信後吳興東南最盛處於今為股肱郡山水清逺人物賢貴宜有大手筆以志其實左文質統記或謂失之猥并李宗諤所上圖經又未免簡脫之病顧方欲請於郡一日太守李公郎中偶言及是且謂郡有博物君子談君監簿慨然以此自任今書成以鋟木之資屬歸安周令未幾李公詔還富公寺正來繼又捐金以竟之兆於談君乃同年進士喜是編出其手因從周令假觀始知郎中除日已屬意乎此大概本舊志參正史補遺訂誤無一不滿人意列二十卷卷各有目數千百年間事了然不疑三輔黃圖殆不是過蓋嘗謂人之筆力根於天性充於學問猶運舟挽鈞力有限量弗可強勉紹興以來亦有好事者續圖經續編志非不盡力如震州荻塘之辨率亦聽訛而止吁談君誠良史才奚可多得會將推乎素學經理中原如指諸掌淺學寡聞非敢自齒於權載之之列談君事業當超出乎唐魏公之上於以見是編更數君子而後定厯二賢守而後傳是豈無待而然哉豐清敏遺事序宋朱熹仲尼亟稱於水曰水哉水哉其詞約而其旨微矣而孟子論其所取之意乃直以原泉混混不舍晝夜盈科而後進放乎四海者言之非其深造默識有以得乎聖人之心孰能知其所以説之如此而有志之士欲有為於此世者又豈可以不察乎此而先立其本哉然自聖賢既逺學道不明士大夫不知用心於內以立其本而徒恃其意氣才力之盛以能有為於世者蓋亦寡矣彼其見聞之博詞令之美論議之韙節概之高一時之間從其外而觀之豈不誠有以過乎人者然探其中而責其實要其久而待其歸求其充然有以慰滿乎人心而無一瑕之可指者則什伯其中未見其可以一二數也嗚呼若禮部尚書縉雲清敏公者其真所謂有本者歟觀其平居暇日所以治心養氣而修諸身者蓋天下之物無足以纍其志是以為子則孝為吏則廉進而立乎本朝則上自宗廟以及人主之身內自禁掖近幸之私而外及乎朝廷卿相之重知無不言言無不盡蓋有當時法家拂士所為低回遷就而詭詞以幸濟者公獨正色誦言無少顧避退未嘗以語乎家而其計慮之明諫説之切所以不諧於時而卒驗於後者乃反因深文巧詆之筆而後顯及其出而敷政於其外退處於鄉以至流放轉徙於荒寒寂寞之濱而遂奄然以沒於世則其所以處乎巨細顯微之間者又皆清明純潔而無一毫之歉是非所謂原泉混混而放乎四海者耶孔子之歎孟氏之言於是而益見其不我欺矣熹愚不肖生長窮鄉聞公之名而向往之久矣獨恨未能盡得其行事之本末前年公之曽孫中散大夫公持節南來亟往請焉大夫公出是書而遂以其序見屬熹不得辭也因次是説以附於章貢李公跋語之後雖於公之懿德純行剛毅大節無能有所發明然使讀公之書而仰高山行景行者知循其本而用力焉則亦世道人心之助而非獨一人之私言也大夫公清苦廉直勤事愛民屢為刺史二千石入居郎省皆有顯聞然多不得久於其官蓋有公之風烈云紹熙二年夏四月序開慶四明續志序宋梅應發四明志作於乾道述於寶慶詳矣然則何續乎所以志大使丞相履齋先生吳公三年治鄞民政兵防士習軍實興革補廢大綱小紀也其已作而述者不復志昔人謂舊相出鎮者多不以民事為意惟向文簡大耐官職勤於政事所至著稱公不均其逸而先其難過於文簡數等矣又謂寇萊公所至多遊宴張文定徜蕩任情獲盜縱遣公慨然念海道東達青齊禦侮弭盜之方周防曲至世人未必盡知也若夫切切畎畝盼盼雨晴一遊一詠可以觀焉故併載之於後以詔來者蓋公之學達於體用自身而家家而國國而天下有本者固如是也豈規規焉求度越於寇張二公哉雖然鄞猶故鄞也昔何為而匱今何為而豐昔何為而蕩無紀綱今何為而粗知理法覽者必有得於是編之外矣新定續志序宋方逢辰郡之有志所以紀山川人物戶口田賦凡土地之所宜也嚴於浙右為望郡而介於萬山之窟厥土堅而瘠上不受潤下不升鹵雨則潦霽則稿厥田則土淺而源枯介乎兩山節節級級如橫梯狀其民苦而耐其俗嗇而野其戶富畝不滿百其賦則土不産米僅以山蠶而入帛官兵月廩率取米於鄰郡以給而百姓日糴則取給於衢婺蘇秀之客舟較之浙右諸郡其等為最下下而嚴之所以為望郡而得名者不以田不以賦不以戶口而獨以雲山蒼蒼江水泱泱有子陵之風在也郡志自淳熙後缺而不備今七十餘年吳越錢君可則以太府丞來守嚴政事之暇為之訪搜以補其缺編訖事走書乞豫序豫謂嚴為我太宗皇帝高宗皇帝建旄之地今皇儲賜履之封則一郡之山川人物戶口田賦職方氏皆欲究知之矧惟天子聖明勤恤民隱凡州牧之出辭入覲必詳訪焉是編之作非惟可以備顧問亦可以助宵旰民瘼之萬一也建德縣經界圖籍序宋潛説友建德經界距淳熙未久圖籍已多散失且嘗詔漕臣監守等補葺之則自淳熙至今日其弊又可知已豪右詭名規避姦胥舞文變易賦額銷蝕豈惟嚴陵哉寶祐戊午版曹始用舊額徵諸郡太守告院謝公諗於衆曰有土此有財固也泛以舊額責之縣則産去稅存者其奚堪無已則按經界之舊而修明之乎亟聞於上玉音俞之説友學製附庸奉行惟謹遂詢僉謀賓鄉望選任曽不期月而九鄉二十一都各以其籍來上乃視鄉分廣狹計物力多寡裁其溢而核其虧因其輕而革其重不底於均不止於是舊額無損新征頓輕義役成規藉以息民詞科買均配藉以應上命宿姦老蠧既為之風灑雪滌而數十年之苦於白輸者脫然如沉疴去體聖君賢太守之賜不其大哉既成父老請以等則鋟諸梓俾勿壞用略敘其梗概朱文公曰三十年一畨經界方好至哉言乎潤澤而推廣之尚有望於來者開慶己未良月既望宣教郎特差知嚴州建德縣主管勸農事兼軍政潛説友序咸淳臨安志序宋潛説友恭惟聖宋受命奄甸萬方大明中天爝磷自息乃太平興國三年吳越以其地歸我職方氏是嵗杭始置守丞建炎升府遂為行在所按古志杭舊屬會稽禹於此舍航而陸故名恭聞光堯大駕初臨登郡治中和嘗作為歌詩慨懷夏后氏之烈聖心曠數千百載而神交固有幾於禹迹之外其亦見夫流風通俗得過化之所存而有感焉耳嘗試觀之有車船橇􅞬之迹故其人至於今忠以勤有苗山封爵功德之會故其人至於今勸於為善有織貝橘柚之貢故其人至於今知尊君而愛親錢氏生長其間性習自然國三世四王而終不失其臣節逮宋之興也深察夫人心歸德之天如川斯赴莫之能止則一旦決然舍去其固有之業以委命於朝忠懿誠忠矣抑杭之人何莫非忠懿闕天地之間燥濕風雲萬物一氣杭獨為天下先者以先王聲教之所漸者逺知帝王正統所在焉故也自時厥後我國家視之如在甸服率選公卿大臣寵綏之豈徒以地大故要必有所甚重者湛恩醲化涵浸滋久益固結而不可解南渡艱難之際旄倪提攜左簞右壺牛酒相屬於道頓首六虯之下如見父母誓有殞無二雖屢更大震撼而莫之變迄用永我命於兹新邑迹是三百年間杭之有功於國家也甚大而祖宗之有德於杭亦深矣開慶羣小誤國召戎一時謀臣或倡異議幾搖根本賴先皇帝蔽自上志獨倚今太傅平章國公外頓八紘內維九鼎宗廟社稷之靈恃以妥寧卒之披攘蒙霧再奠宇宙至今八街九陌歌鼓四時往往相與咨欷不圖復見今日烏乎我理宗有德於杭也不又大歟杭之福諸夏之福也肆皇上克篤前烈宅中圖大不以愚臣為不肖命殿是邦幸遇朝廷治平年穀屢登浩穰之府化為簡靜因得以蓋其疵粃暇日視故府閲郡乘或病其漏且舛乃葺而正之增而益之凡為圖為表為志總百卷而冠以行在所録尊王室也既成上之天府以備考數之萬一焉禹貢稱冀州既載釋者謂以貢賦役事載之書其於天子所自治之國謹重固如此九州攸同言歸舊京聖子神孫尚克念我光堯懷禹之志云中奉大夫權戶部尚書兼詳定敕令官兼知臨安軍府事兼管內勸農使兩浙西路安撫使馬步軍都總管兼點檢行在贍軍激賞酒庫所縉雲縣開國男食邑三百戶潛説友謹序建德府節要圖經序元方回建德府新定郡遂安軍節度今統縣六建德淳安桐廬遂安壽昌分水郡治建德縣當浙江之上遊新安江東陽江之會天文南斗須女之分禹貢揚州之南境春秋時屬吳後屬越屬楚至秦介鄣會稽兩郡間漢隸吳郡之富春縣丹陽郡之歙縣建安十三年孫權分丹陽郡之歙縣置新郡治今淳安晉平吳改為新安郡至東晉皆隸揚州宋梁改隸東揚州尋復舊隋平陳廢新安郡為縣入婺州而置歙州仁壽三年即新安故城置睦州大業初改睦州為遂安郡歙州為新安郡唐武德四年復為睦州而析桐廬縣為嚴州七年廢嚴州復以桐廬屬睦州貞觀元年分天下為十道睦州隸江南道神功元年徙州治建德天寶元年改為新定郡乾元元年復為睦州五代屬錢氏太平興國三年錢氏納土隸兩浙西路先是太宗嘗以親王領睦州防禦使政和八年升為建德軍節度宣和三年平方臘改為嚴州遂安軍節度高宗度宗皆嘗以皇子領遂安軍節度使咸淳十年升為建德府其戶口之數紹興己未戶七萬二千二百五十六丁一十一萬一千三百九十四淳熙丙午戶八萬八千八百六十七丁一十七萬五千九百有三景定壬戌戶一十一萬九千二百六十七口三十二萬九千二百有六權姦賈似道當國中外茍且玩愒版籍漫不經意今兵火後未知登耗其物産之宜萬山叢蔽山居八田居二往往樵薪為生仰米旁郡地狹人稠土瘠民窶浙西諸郡皆腴而此獨窮陋加以南渡都杭是為西南數百郡之孔道舟車必由迎餞疲瘁而郡益乏皇祐指揮嵗為婺州輸絹三萬六千匹婺嵗歸本郡米一萬五千石戶部督絹本郡以上征下嵗無虧本郡督婺州米列郡勢相侔負固不償而郡愈不可為郡所以名於東南而望於時者以嚴子陵之釣臺在焉而三朝之潛藩也真人有作六合混一乃至元十三年嵗在丙子二月有六日闔郡官吏軍民奉前朝詔以郡歸附於大元聖朝武略將軍兵部郎中王世英武略將軍刑部郎中蕭郁偕來秋毫無犯市不易肆寬書屢下弛征蠲賦民樂有生行中書省一政一令無非所以布宣今上好生之仁繼自今凋敝郡其有瘳乎延祐四明志序元袁桷成周疆理之制審於王畿首合同姓以夾輔至於四履則必假異姓焉以控扼之先後疏附曲盡其制何周且詳也四方之志猶懼其不能以悉知也則必以外史掌之社亡入秦而書具在區區刀筆吏獨能收其書據要漢中夫豈偶然也哉我朝聖德神武混平寰宇首命祕書監儒臣輯大一統志沉機逺略與昔聖人意旨吻合然而郡志缺落其遺佚而未備焉者不復以徹於上馬侯潤甫固嘗為中祕官知之矣暨守四明乃曰明舊有志今為帥大府浙東七州推明為首厄塞戶版物産地利是宜究察以待問清風舊德與昔之高閎巨閥屬於宅里猶可考也謂桷久為史官宜有述桷抑嘗聞之洙泗遺俗稽之以久逺者道德之澤也詫錙銖之利以害於吾民者昔人之所不道空虛説增農日益困甚者紀其山林屋室之盛奉書詣庭若執符契爭莫能已是殆昔之無知者根其禍也管夷吾作書訓子弟良厚而內政以魚鹽為急儒者詬之維明負山橫江嵗厄於水旱河渠是先牧民之本推其沿革覽其山川知昔時得人之盛宫室戶口之無恆釋道遺文之盛衰是皆足以增其永歎者矣乃為十二考以志其事遂不敢以荒落而有辭也馬侯為政愷悌惻隱以宜於民民以不病郡博士吳君廷獻勤恪承令詢索州縣之所宜聞者良備因是得以成書焉赤城元統志序元楊敬德赤城元統志者何作於有元元統之二年上以昭前修之筆削下以迪後人紹述於將來也維赤城由漢置南部都尉更為鎮為縣為州郡踰千年守此者自屈侯始無慮數十百人尤侯袤唐侯仲友李侯兼黃侯畇皆有志於郡乘矣積十年未就暨青社齊侯碩屬筆於太史陳公耆卿始成之又四年運使吳公子良偕林君表民續之再三年表民再續之為成書矣趙侯鳳儀之來復聘永嘉章君嚞取所成書而改作焉盡去其舊而命曰天台郡志夫千年之事數賢侯之力陳吳諸君子搜抉討論之精一朝而泯焉此邦人所以不寧而今總管諄諄以屬於敬德也敬德以固陋辭公復曰子居禁林十年咸職太史氏今郡乘蕪穢而不治非缺歟於是辭不獲作而曰郡乘古侯國之史也其著星土辨躔次而休咎可徵矣奠山川察形勢而扼塞可知矣明版籍任土貢而取民有制矣詮人物崇節義以彰勸懲而教化可明矣此其大凡也城池司府之沿革廢置典祀異端之祠宇土田與津梁畎澮無不備紛爭辨訟者有恃而可稽矣舉其大撮其要合天下郡國而上之則丞相府之圖書也是必傳信而後可據若掩前人之直筆而妄以已意損益其間將何以傳信也於是與郡博士貢君師中吳越世家錢君世圭會萃而參訂之學正陳君大有教導孟君夢恂校讐之自三志之後始於亡宋之紹定辛卯以迄於兹凡百有四年之事備而録之名曰赤城元統志以續焉噫宇宙之事無窮後之執筆者尚鑒兹哉天台要覽序元范理世固有同稱而異歸者天台之名著自古昔若劉阮之云孫公之賦隋唐以降神仙佛老之説前後迭出蓋方其時長才秀民之生其間不欲與世相聞往往托而逃焉謂為神仙窟宅者此也其稱於後者率皆發為道學之懿用世文章事業之顯如潘時舉之有得於程氏之傳徐大受之與聞乎朱氏之旨他如曹樵公賀參政黃祕監賈節度之流各以所長自見者後先相望蓋至趙宋以來文教誕敷渡江之後京邑密邇中原避地之俊則又參互錯處其鴻生碩儒之興一變而轉為佐時之具固其宜矣我朝聖賢相承涵濡既久其用於世如徐文肅公以下諸賢又皆卓卓流聲著實嗣是而起褎然蔚然足膺當寧之付任以發聞光昭於時者比比有之於是又有文儒藪澤之稱向之所謂仙風異流皆泯泯也是其出處隱顯之迹不能無間要之神秀孕靈今昔同一軌矣舊志頗泛無統比因來宦逺方眷然故邑命兒曹録其詩賦得古今所作若干首併手疏遊覽郡邑名勝大略分為山水人物詞翰三志名之曰天台要覽藏之篋笥用備政餘檢閲以慰他鄉之思因述梗概篇端俾覽者知天台之著稱雖同而所以取稱則異如此其他公署額設版圖財賦故實與夫邑長名賢出處古迹碑刻雄文大章之亹亹者則固有不能盡録者焉桑海遺録序元吳萊頃余常從鄉先生學見福唐劉汝鈞貽書括蒼吳思齊子善論文丞相宋瑞事云自江西初起時﨑嶇山谷購募義徒耕氓洞丁造轅門請甲仗不啻數萬而尹玉實為驍將夫衣冠指揮衆皆詣闕感泣求效死已而當國二揆交沮用兵師無宣諭卒無犒賞盤桓月餘僅令守姑蘇一路張彥提重兵居毗陵且有叛志尹玉竟以絶太湖弔橋首尾不救而溺死未幾獨松告急朝廷四詔政府六書趨棄聊攝援根本一日一夜倉皇就道及至行都而獨松隨以破陷復令駐兵餘杭守獨松朝議不一衆心離散會有尹京之命餘慶遽奪其印不豫漢惝隨德剛遁北軍入城與權又絶江遁乃即日拜樞使又拜左揆補與權處且令往軍前講解毅然請行及從行以北中道奔迸收集亡散無兵無糧天下大勢去矣帝霸交馳正偽更作是不一姓當世之為大臣元老者視易姓如閲傳郵况當滄海橫流之際而彼乃以異姓未深得朝廷事權欲隻手障之至死不屈微箕二子且有愧色於宗國矣其書大略如此豫後又獲見淮陰龔開所作文宋瑞陸秀夫二傳蓋益詳焉方唐末五代之季藩鎮跋扈武臣憍矜君臣父子之義不明而土地甲兵之強類無不欲黃屋左纛自為者先宋知其然一旦踐大位即罷諸節度兵符遽用儒臣以為治終不足以盡復乎石晉所割之境土逮乎宣和衰亂北兵南下急若建瓴曽不得乘一障設一堠而遂至奔亡不守後宋再造東南區區山海之間內政不修外猶恃夫江淮以為固久之南北夾攻而下蔡之藩籬自撤其蔽荆襄受圍鄂渚有警巴蜀侵陷廣西之烽燧亦不絶此其國勢埀盡受兵處多殆如囊中探丸圍中逐鹿無復有潛藏隱伏地矣所可幸者天下學士大夫二三百年祖宗培養作成之澤薰蒸者久忠臣義士或死節或死事蓋無愧焉卒之宋瑞秀夫前後死國精忠激烈誠有在於天地而不在於古今者嗚呼吳晉陳隋之變豈復有一人若是哉龔開者字聖宇少常與秀夫同居廣陵幕府及世已改多往來故京家益貧故人賓客候問日至立則沮洳坐無几席常作唐馬圖風騣霧鬛豪骭蘭筋備盡諸態一持出人輒以數十金易得之藉是故不飢然竟無所求於人而死志節既峻儀觀甚偉文章議論愈高至為此二傳大率類司馬遷班固所為陳夀以下不及也此其人殆亦無負於秀夫者哉余故私列二傳以發其端詢之故老徵之雜記題曰桑海遺録且以待太史氏之採擇焉義門詩卷序元黃溍浦陽鄭氏聚族而居者九世有司請於中書而旌表之號曰義門且復其家力役之征俾無有所與今集賢直學士揭公實為之記一時聞人往往賦詩以美之謂豫與鄭氏居同郡知鄭氏者宜莫豫若因屬豫以序豫家距鄭氏不兩舍而近納交鄭氏父兄子弟間嵗行已再周其知之固深矣集賢公之所稱述豈有愧辭乎抑豫聞之古有合族之道非士庶人所得行而親親之仁無貴賤一也合族莫重於立宗之法或五世而遷或百世而不遷五世而遷聖人不以為失於薄百世而不遷聖人不以為過於厚遷以辨其異不遷以統其同二者蓋並行而不相悖者也若夫數百千指聚居而食雖古公侯之家皆無所有而後世士庶人之家乃或有之可不謂難矣哉是宜史不絶書而上之人所以褒嘉之者遂著於令逮至本朝史臣序禮典三十有二而旌表居其一然則其可以勸親親者又聖人之所不廢也兹非所謂禮以義起者耶鄭氏於古人合族之道夫亦有取其義云爾褒嘉所及有司既奏著令從事而未克上其狀於太史氏豫輒弗辭而次第其詩本諸作者之意系於末簡庸俟夫陳詩以觀民風者焉石臺紀遊詩序元黃溍寧海多大山其髙或俯視雲雨名於仙經地志者天門閬風丹丘桐柏而南田則為福地好事者病其幽逺險絶莫能適至獨喜遊石臺石臺距縣治僅五里山皆土阜非有竒巖峭峰水泉花藥竹箭之美由山足緣坡陀蛇行穿灌莽而上其脊得巨石五六相積壓如纍器物頂上隆然正方而平可坐十人旁視四山屏嶂羅列東北山缺處海霞島霧縹眇可指也豫佐縣之又明年始合耆俊之士登斯臺抉剔蔽翳求昔人之遺刻既漫滅不可識唯慶元諸老題咏故在徘徊久之望東麓杉松蒼翠甍桷隱隱或曰是謂南園道院乃欵而休焉因相與飲酒賦詩抵暮而去忘其山之卑地之近也孰使豫樂焉而無志乎高且逺者非兹臺也耶古之君子雖甚陋必有遊息之物以養其觀聽而發其意慮卑高近逺物之不齊者夫茍無纍乎物斯異方而可以同得也詩所以志兹遊之得序而歸之南園以為石臺故事送溫州學正曹順甫序元黃溍曹君順甫與豫居同郡且同舉教官豫不調而順甫用纍考序遷為溫學正其行也豫以督運吏書滿歸自海壖順甫謂豫幸以一言識其别豫距與順甫同舉時二十三年矣劣弱無似不能使學與日俱進詎有以增益順甫之所未至哉然嘗從鄉先生聞乾淳師友之盛未始不歎夫人物之聚學術之散也蓋婺之學陳氏先事功唐氏尚經制吕氏善性理三家惟吕氏為得其宗至於人自為書角立競起吕氏終莫能挈而合之也其在溫則王道甫之慷慨名義嘗合於陳氏矣而其言無傳焉陳君舉本薛士隆上下古今而和齊斟酌之以綜世變為説不皆與唐氏合其厪存者亦莫之傳也葉正則推鄭景望周恭叔以達於程氏若與吕氏同所自出至其根柢六經折衷諸子剖析秦漢迄於五季凡所論述無一合於吕氏其傳者直文而已學固無與焉三代聖人逺矣於大道隳裂之餘而能必尊其所聞必行其所知豈非卓然特立而不懼者乎是未可以專私蔽錮為其詬病也冢巨淪沒晚後無所依風承響接苐以世之所共傳為信遂使散者不可復合不傳者日就泯墜安知紛然不同之中有混然大同者在耶夫考師友淵源之自務合乎聖人之本統以一諸生之道德學校所首重也故豫敢為順甫告是雖非有以增益順甫之所未至其望於順甫也厚矣他日順甫歸休與豫遊於鄉校尚挹其緒論以袪所惑焉金華李節婦詩序元黃溍節婦馮氏名易安湖州録事汝弼之子武寧縣尹李如忠之繼室也李氏為金之宦家今占籍東平汶上高祖仲略山東路按察使曽祖景雲御史中丞國朝至元間從下江南因寄家於越李君初娶特默齊氏有子某十年而特默齊氏卒録事君時任越之管庫以節婦歸焉再期李君疾卒垂殁時語節婦曰爾其若何節婦引刃斷髮誓靡它時節婦年二十七有子二人任甫一嵗伏方娠後兩月始生汶上之族及特默齊氏之家聞君死合內外屬南來悉取其蓄聚攜其子以去節婦一聽其所為弗與較四壁蕭然惟兩柩而已閭巷莫不哀之節婦有姨母事山隂李君良佐賴其力奉柩葬城東蕺山下録事君念無以資衣食將嫁之節婦爪其面流血欲死録事君知不可奪為養女求贅壻以給之嫠居十有九年二子成立乃遷李君特默齊氏之柩葬汶上先塋之次中書平章政事王公為之銘是時南北聲聞阻絶已久宗姻里黨意其必更適人聞其來皆大驚太息至泣下節婦俾任留奉丘隴而與伏來越上以存江南之祀一時名人多為賦詩屬豫以序豫惟方今德教流洽婦女以義自守而見褒表者無地無之其始能居人之所不堪終能送死無憾如馮氏者有幾人哉直書其事於卷首俾覽者知其賢與它褒表者尤為難也送周明府序元黃古之作史必為循吏立傳漢西京二百年間所書僅六人蓋人才自古為難而尤難得者循吏也皇元統一函夏吾烏傷領於職方逾七十年求其可擬於古循吏者清江周侯庶幾乎先是為政者務近民或奉贄納幣以自通皆弗之拒侯一切峻却之可謂廉矣而世未嘗乏廉吏也異時屢建局以核田糧而隱匿飛并之弊未革侯令民得自實且躬任鉤考之勞一無所憚期月而簿書井井有條愚民喜爭豪猾之徒誘使相告訐而陰持其柄以為利事未竟家已破侯遇有所赴訴委曲曉譬調護而遣之負其不直者悉慚伏悔罪詘者以伸部使者郡長吏數委以鄰境疑獄及纍嵗不決之訟侯折以片言人莫不服其明允官府既以無事用其餘力大治土木營尉廨葺儒黌創常平義倉而分貯公私之穀以實其中完舊益新百廢具舉是可謂能矣而世未嘗乏能吏也惟夫所居民富所去民思至深入其肺腑庶幾循吏之風乃絶無而僅有者也況漢之循吏皆郡國二千石今也以百里之邑而得循吏不愈難哉侯書滿解印綬行有日吾黨之士各賦詩以道其戀慕之私俾某序於篇首侯初由湖北海南憲掾入湖南廣西帥幕以招兩江叛蠻有功超擢宣閫都司厯江東劇郡元僚功績甚著其來烏傷治行為諸邑最憲府方交章列薦於中朝行嚮用矣因序詩而附見侯行事之大略俟他日傳循吏者採擇焉送高節書院劉山長序元黃溍尚論兩漢之士必曰經術名節自公孫𢎞至張禹孔光之流皆以經術致位宰相而持祿保位未免阿諛之譏不有名節孰矯其失名節則嚴子陵實倡之也迄今千三百年其故居及所釣遊處猶為之立祠即其旁置書院而奉之以釋奠先師之禮其有功於名教大矣古之先師詩有毛公書有伏生禮有高堂生樂有制氏初不以其賢奉其傳則祭其人示有所本云爾唐制孔子廟由顔子而下為先師者二十二人有毛公伏生高堂生而無制氏詩書禮存而樂亡也孔門高弟惟顔子子夏為先師子夏詩有序易有傳顔子非有遺書可傳而以配於先聖其後復列子夏於十哲而獨推顔子詎不曰講習其言未若儀型其德乎今之道學一出於濂洛乾淳三數大儒此學者之先師也既立其書於學宫而躋之從祀矣其為書院又取前史所載高人逸士若子陵者以為先師子陵止答侯霸兩語它議論則寂無聞世特以其賢而尊之夫道一而已發於文則為經術修於行則為名節豈若百家人自為學莫適相通乎建陽劉生仲寶以選署餘姚之高節書院山長餘姚子陵所居也豫聞仲寶之先少師文簡公受業考亭讀論語至豫欲無言喟然而歎謂言語非所以學由是一意務為躬行實踐其出處雖與子陵殊而修名姱節視子陵可無愧仲寶家庭之傳必有異乎以呻吟占畢為事者諸生在列仲寶進則風勵之儀型前哲退則以家學使羣居而講習焉不亦善乎仲寶之行也同志之士臨别贈言凡若干篇京兆杜君伯原甫實序之及來錢唐復求豫為後序杜君隱居武夷山中聘使在門而不為起誠善學子陵者試以豫言質之何如送楊仲禮浙西提舉序元王士熙杭為郡甲於江左宋之南為行都地多山谷淵藪峙而為巨鎮滙而為廣涉瑰竒勝絶之觀博大𢎞豫之俗在方輿盛且劇我元底奠行省蒞之以事之殷地之重於今視他行省獨丞相置丞相之屬非清強膺時望者不得預其司文教者曰儒學提舉泰定三年夏應奉翰林文字天台楊仲禮以選被命往夫杭之土風重文士子兟兟佩服整潔出辭粲然落筆縝然處其土者必鑑别衡析陶良汰浮燭其衷斯有以服之也行省之屬事上皆有等威雖大府連率俯首趨對惟謹提舉官五品登階而揖省僚必改容禮焉夫禮之嚴必有以尊其學衆之服必有以重其德不尊不嚴不重不服若曩之為是官者吳興趙先生巴西鄧先生皆由侍從出美望孚於人人楊君居史館久文精思縟言議濟濟志於事功卓然勇往之資也士熙嘗與同僚私灼其詳於其行也不以易為喻而進其難不以近為勸而圖其逺者焉交友之誼也景定諫疏序明宋濂吾婺舊稱禮義之郡士生其間皆存氣節仗忠義而東陽為尤盛自宋中世以來以直道著稱列於國史者甚衆雖布衣下位不居諫諍之職而上封事者往往有之豈其人皆善言論哉德澤所漸濡師友所講説風俗成而至斯盛也余少時好讀宋史凡吾郡人事有可稱輒識之既而歎士之幸獲見於史者如此不幸而遺軼不傳多有矣往年在翰林始得見東陽賈廷佐上高宗疏廷佐為桐廬主簿憤秦檜和議紹興戊午上疏論之辭甚切直而史不載至七世孫權始出以示人士大夫為文稱其忠廷佐之名始顯於天下其鄉人杜士賢在理宗時為武學生景定甲子秋因星變求言上疏力攻賈似道誤國其曽孫實今年秋以疏示豫事與廷佐相類然士賢無一命之爵請黜似道厯數其罪切直同於廷佐而實能趨京師遍求賢縉紳文以白之將梓以傳非廷佐後人所能及余於是又歎忠義之士天雖抑之於前每扶植其子孫使昭其聲光於不朽當似道擅權威焰足以生死人士賢不至於殺身者毫髮間耳今似道之後不聞有為士者士賢之子孫守其遺業不墜聞其風者雖野人稚子皆為之慨慕善惡之公昭明如此則夫有志於忠義者尚何憚而不為哉是疏之傳非特可補史氏之闕為人臣者可以鑒矣士賢字希聖後中武科授武岡軍新寧縣簿尉遂攝其令轉綏寧盱眙兩縣令以終華川文派録序明宋濂義烏婺之上縣隋唐間名士輩出若婁幼瑜駱賓王其尤者也幼瑜之文以卷計者六十有六賓王之文其數亦盈十然皆散逸無存其僅見於世者往往出於編類家之所采宋南渡後宗忠簡公澤其文至五十卷紉高居士黃公中輔亦十卷香山喻公良能則三十四卷香山之弟杉堂良弼如居士之數南湖何公恪巖堂陳公炳各二十卷三四君子事業雖不同其以文辭有助於名教則一計其時鸞蹌鳳翥於士林雍雍和鳴而龜麟為之後先學者歆艷之未必不家傳而戶誦乃逺者二百年近者百餘年求某集子孫或不能有況其他乎一邑且若此況四方乎嗚呼立言之心勤其慮逺惡知一旦變滅若雲煙然則編類之功何可少也居士族孫鐵巖公自忠簡至於巖堂各編其精鋭者十餘篇聚於一書名曰華川文派録華川縣繡湖之别名唐因之置縣故取以號其録後五十年豫章張侯來為縣讀而善之謂羣公之文幸見於斯然未謄其副茍或亡之非惟重識者惜將何以風厲吾民乎亟請邑士傅君藻精加校讐捐俸而刻置諸縣庠來徵濂序昔者鄉先達吳公師道憫前修之日逺而遺文就泯乃集婺七邑名人所著為敬鄉録二十三卷其視鐵巖廣矣惜乎官其邦者不使永其傳兵燹之後手藁不復存今侯惓惓是書以此較彼賢不肖之相去何逺哉然侯之風厲人士者不止文辭而已當如巖堂之介南湖之孝香山之質實無偽杉堂之寬厚有容居士之氣節不羣忠簡之竭誠報國至死而不變庶無負於侯不然操觚濡墨而號於人曰我能文豈不見笑於大方之家哉侯名允誠以儒術緣飾吏事忠信廉明如古循吏縣務雖至劇雍容處之輕重不失其度吏胥受約束拱手案側不敢出一語相可否諸弊頓革故治效彰著為一邑之最是為序送樂仲本歸定海序明王褘至正戊子豫與樂君仲本會京師仲本齒長七年不以豫為後生辱與定交久之為豫言曰四明之定海其西二水曰大浹小浹並東流入海小浹之上吾所居也山水之樂足以佚吾私吾將歸而益讀書以修吾業暇則泳遊於小浹之間達則期有以見於世否則樂天安命終焉而已吾之歸也子寧無所言耶豫聞昔日新安朱氏象山陸氏一時並興皆以聖人之道為己任而其所學不能無異雖鵝湖有會終不能挈其異以歸於同陸氏之傳為慈湖楊簡氏潔齋袁燮氏皆四明人故四明學者祖陸氏而宗楊袁朱氏之學弗道也東發黃震氏果齋史蒙卿氏者出而後朱氏之學始行於四明黃氏得於朱氏遺書而史氏傳自湖南大陽先生岊小陽先生枋二陽氏傳自蜀人㬊淵氏而㬊氏實朱氏之高弟子也今國家建學立師設科取士一用朱氏説天下學者推朱氏為大宗而四明陸氏之學莫或講矣仲本受業於敬叔程先生而先生學於史氏者也師承所傳蓋已致力矣陸氏之學向所承傳故未泯也仲本可不兼致其力耶先儒謂陸氏主於尊德性朱氏主於道問學尊德性道問學未始可以偏廢此臨川吳氏學基學統之篇所由作也會而同之顧真知允蹈何如耳於仲本寧無望乎仲本識明而行果有志於聖賢而不以得失纍其心觀其出處之際可知矣故其歸也豫竊致其愛助之私欲己於言不能也抑圖以自淑其身之不暇而顧為仲本言之者知之深故望之厚而言之至爾仲本其亦以余言為弗畔矣夫玉泉隱居圖序明貝瓊玉泉山距蘭溪三十里當五峰之北嶄然青芙蕖危插天半與金華東西相望半山石皆雪色類瑤琨如束帶然故一名玉帶其巔有峰特起曰露峰峰之下有泉正出曰鏡潭潭通浙江澄徹可鑒或疑神龍居之故又名玉泉山山多合抱之木空青丹砂千年琥珀往往得之昔舒元輿金仁山嘗隱其中非獨神仙釋子之所托也元時有王氏者為蘭溪之巨族從竇文貞公學九針補瀉法客京師二十餘年不樂仕而南歸營於鏡潭之上自號鏡潭先生樹杏千株花開時逺近爛然與日光霞氣相射望之不啻董林族人子弟徙而從之者錯居其旁至數十家煙火相連雞犬往來熙熙皥皥有太古之風世莫得而知也余不及識鏡潭先生獲與其子瑞菴交瑞菴屢遊三吳一日持隱居圖示余將老於是求文以志之余觀之言曰天下之名山非一而玉泉其東南之雄秀者乎若鏡潭林壑之美殆與終南少室並宜遊者長往而不來也然盧鴻李渤皆以隱為仕之媒非若鏡潭之因不仕而隱也嗚呼高位厚祿人之所榮而懷才不售絶物獨處效龍蛇之屈蟠無稱於時豈情也哉特以勢崇則危利廣必憂不若去祿位而求其安此考槃碩人之永矢弗過也余恨未能超然引去相與入山讀書決泉洗藥日汨汨風埃中未知所屆回望丹崖翠壁邈在弱水三萬里外而不得一至豈不貽愧於驚猿怨鶴耶姑書其説以識余心他日或能裹糧往候瑞菴庶不為玉泉之生客致山靈之拒也夫赤城詩集序明李東陽詩之為物也大則關氣運小則因土俗而實本乎人之心也古者道同化洽天下之為詩者皆無所以議既其變也世殊地異而人不同故豳鄭衛各自為風漢唐宋之作代不相若而亦自為盛衰逮至於元其變愈極而其間賢人義士或奮發迅厲為感物言志之音者蓋隨其所得而成焉然亦鮮矣夫自樂官不以詩為教使者不以採詩為職是物也若未始為天下之重輕而所關者固在也然則不得與於天下者因其所得而求之亦何莫非君子之心哉浙之東有州曰台古赤城郡地也其人固多能詩吏部郎中黃君世顯翰林侍講謝君鳴治誦其遺篇胥嘆曰此吾鄉文獻之懿其不可以廢乃輯宋宣和間至我朝洪武永樂得數十人人得若干篇為六卷名之曰赤城詩集初宋理宗時有林詠道者嘗輯為天台集今刻本不傳天順初國子學録張存粹輯黃巖英氣集而不及旁縣至是始粹然成編豫得而觀之其音多感慨激烈而不失乎正蓋宋元季世甲兵飢饉迄無寧居國初一統甫定而其君子猶有感時悼昔之意風世礪鈍或出於憂患疢疾之餘者皆可得而見也若唐項斯宋楊蟠之徒皆以詩名而世逺不可究故存者左經臣而下不過數十人使數百載之間有如二君者時輯而録焉當不止是以其止於數十人也則及是而為之其容以或後乎哉二君將以是詩屬其友按察副使林君一中鋟梓福建復懼其未備將益搜輯以為續集今文教日隆作者彚出方大鳴太平之盛其或有繼二君之志者雖百世可也赤城新志序明謝鐸郡邑之有志猶家之有譜國之有史不可一日缺焉者也史缺則無以昭憲章垂鑒戒譜缺則無以敘彞倫敦族屬志缺則一郡一邑之典型無以考而文獻不足徵矣有志世道者而不此之務奚可哉雖然昔人謂述作之難莫先於志是志固不可不作而尤不可以妄作不作則缺而已缺猶將有起而繼之者妄作則誣誣則是非混淆真偽錯雜雖有繼者亦無以善其後矣故與其妄也寧缺而作者慎焉後世雖良史若司馬遷君子猶謂其紀帝王世緒以堯而下傳四世之孫舜以舜而上傳四世之祖禹雖善譜若歐陽子君子猶謂其圖廬陵世譜自恂至琮餘二百年而為四世自琮至觀僅百年而為十六世噫賢如二公區區世次代緒之間猶不能以無憾則所謂述作之難者亦烏得不慎而茍焉以妄也哉吾郡赤城志創自宋國子司業篔窗陳公未幾吳公子良輩繼之至元乃有章嚞者悉更其舊而名之曰天台郡志當其時已有覺其妄者尋改而為元統志矣然其書今皆不傳所傳者獨篔窗志耳自是以來不惟代鮮作者而并其舊所傳者亦鮮或克見成化庚子郡守劉公忠始屬教諭盧公守仁踵為之未就而劉以代去越十年馬公岱至更舉以屬於豫豫屬稿未半而馬復以免去束其稿又五六年矣今郡守海陵陳公相至以為更數百年之缺典莫有繼者雖繼莫有厪其力以底於成者乃於政治之暇率其僚同知陸君琪介監丞陳先生旅不鄙而復以屬於豫是固有志世道而不汲汲於簿書條格之間者矣况豫生長是邦又安敢以不能之故而故違郡侯之命也哉因顧謂公曰篔窗之所創而傳者今固不可尚矣是用存之以為舊志若乃其不傳者蓋亦有所不必傳姑復别為新志以附篔窗之後何如公與陳先生皆不以為不可乃取舊稿刪定之為二十三卷又凡幾閲月而告成焉噫後之視今猶今之視昔又寧知無如司馬歐陽之竊議其後者乎議不議不敢知然一郡之文獻不可自我無所徵而太守公之意不可以虛辱遂卒勉而為之以俟諸他日鹿城書院集序明鄧淮國家尊崇正學以隆世教凡儒先與聞斯道者類為建祠則夫程朱張子之高弟常致力於性命道德之懿而又同出於一郡者不特舉而專祠之其何以風勵後哲也哉夫溫之號小鄒魯也久矣鄒魯之後千有餘載而後程朱張子者出倡明道學以傳諸其徒然旁觀列郡少或二三人多止五六人蓋未有如溫之衆者今考之在程門者十有一人朱門亦十一人南軒之門一人焉其更相授受往復之書具在而其遺言緒論猶有存者况我朝編緝五經四書性理諸書其語録文集內有發明經注者悉見采録則其有功於道學亦大矣故豫假守此邦寤寐諸儒而推本其所師即欲為創書院採摘其行事問答彚為一帙而同寅李君增劉君塘何君鼎皆韙其事於是白於侍御陳公秉衡憲副林公舜舉趙公栗夫悉蒙許諾而藩臬諸公無間言焉永嘉令汪君循乃相厥費度材擇良於鹿城卜吉孟春不五越月而書院成尊程朱張子四先生南鄉其高弟門人東西鄉以侑焉師友一堂宛然當時氣象非徒以觀美也於以闡其淵源之所自表正學也於是父老攜杖往觀者皆嘖嘖歎曰自宋以至於今幾三百年而始一見後學之入其門升其堂者徘徊顧瞻如諸儒之在前而其景仰自不能已矣夫以聖朝學校遍天下若無俟於書院者然前賢往迹風教所關况程朱張子及門之士又非餘子可例論者乎故書院落成即採溫之有志於學者討論其中使密邇諸儒興起其善則此邦正學之傳不待外求而自有餘師矣此書院之所以創也嗚呼書院創矣而諸儒之事行問答未之統一學者難於遍覽爰命郡邑諸博士采輯數月始克成編復謬加改正梓示同志名曰鹿城書院集使皆得以讀其書思其人而尚論其世焉然則書院之集又可已也哉淮狂僭之罪誠無所逃然表正學以正人心則愚於此實拳拳云鄉賢祠志後序明章懋古人祭有道有德者於瞽宗又謂鄉先生沒而祭於社則鄉賢之有祠尚矣金華在故宋時嘗祀梅節愍宗忠簡潘默成三賢於學宫祀東萊吕成公於麗澤書院至元則又有四賢書院以祠何王金許四先生後遭兵燹羣祠皆廢我朝成化初浙東僉憲辛公訪謂東萊既從祀孔庭而四賢講明道學以續考亭之緒其功尤大乃奏立正學之祠然宗潘諸公猶未及焉𢎞治丙辰浙藩參議湖南吳公旬宣所至庶政時序乃考方志修古典謂兹文獻大邦名公巨儒彬彬輩出立德立功立言者後先相望殆不可僂指而有道有德鄉先生之祀僅若是焉非缺典乎宜有以舉其廢者於是巡按侍御廣東吳公觀風察政洗寃澤物適臨兹郡聞公之議亦謂其有補世教弗可緩也爰命有司綜理其事而同守薛侯敬之剛敏有為志崇先哲承命唯謹以學宫地隘弗稱妥靈而卜地於郡城南隅經斯營斯不日就緒公又以為郡故多賢弗可限之以三而著録於志傳者纍數百人亦弗能通祀也乃推擇其名德最盛者數十人而尸祝焉其已祀者則仍其舊間又雜取東萊四賢及祠中諸公之遺事遺文類而集之以為祠志欲人之誦其詩讀其書而論其世也既乃命某識其末簡嗚呼疇昔吾婺稱小鄒魯他郡莫敢望而擬焉夫何前修既殁徽音莫嗣衰微不振者於兹百年山川如故風氣不殊何古今人不相及耶亦其世降俗流未有以感發興起之耳古之化俗導民者非必其條教之詳法令之嚴也蓋有陰感默誘神而化之使自趨之之道焉昔廬陵有四節一忠之祠文丞相履善少嘗遊之而欣慕曰死不俎豆其間非夫也厥後文公果以精忠大節著於天下視前人益有光焉非祠之所感而然乎此侍御與公所以汲汲於是也後之人進而瞻於祠像退而考諸祠志遐想其人於數百載之上必將有奮然於中不能自已而思所以俎豆其間若文公之為者矣孰謂諸公是舉無關於風化也哉雖然祥有開而必先運無往而不復造化人事盛衰之理往往相仍而行百年曠典一朝而舉殆不偶然得非吾婺將復宋時之盛而天啓之乎邦人君子尚知勉哉尚其無負於天無負諸公之望哉𢎞治衢州府志序明吳寬衢州府舊有志自元以來屢修之矣今太守姑蘇沈侯復修之者何蓋厯嵗既久雖山川如故而疆域或分况田疇益闢而戶口或衍與夫人物之盛衰公署之興廢賦稅之厚薄物産之多寡古今有不同者其能已於復修乎且舊志府與縣分載其事若無統屬侯復以為不可於是致仕教諭開化吾君冔始承侯之意檢閲故籍搜訪近事以修之而教諭西安吳君夔復助之而成此編得若干卷侯以考績至京來告之故凡衢之人之遊於斯者數輩皆以序文請夫衢入國朝隸浙江為南境土沃民勤號稱善地若名臣賢士之出尤盛固不暇論惟宣聖正宗越自魯地從宋南遷賜居郡城巍然廟祀故衢雖列為一郡實與闕里南北相望天下言故家舊族者莫能先之其地增重非特所謂善而已侯少與其仲連登甲科並通朝籍及出守於兹嚴於持身而勤事愛民治行甚著顧郡事繁冗而路衝要獄訟驛使紛然盈前鞅掌之餘方為此志其高於俗吏數等矣而彼之為俗吏者自以簿書為能必訾以為不急之務抑孰知其所以為急哉孔子以夏殷之禮能言之而歎杞宋之不足徴者以文獻之不足蓋文獻之所繫如此然則今日衢之文獻足矣後世其亦有所徴哉浙江通志卷二百六十三
