body:
  text: 浙江通志卷一百九十三人物十隠逸下台州府漢髙察天台縣志隠居佛隴之北白沙之西有陂陀小嶺至今呼為察嶺晉任旭晉書本傳字次龍臨海章安人幼孤弱勤於學及長立操清修不染流俗郡將蔣秀嘉其名請為功曹秀居官貪穢旭正色苦諌秀不納旭謝去乆之秀坐事被收旭狼狽營送秀慨然歎曰任功曹真人也吾違其讜言以至於此尋察孝亷除郎中州郡仍舉為郡中正固辭歸家永康初太守讐馥薦旭清貞潔素學識通博詔下州郡以禮發遣旭辭疾不行元帝鎮江東聞其名召為㕘軍手書與旭欲使必到旭固辭以疾後帝即位復召之及為左丞相辟為祭酒並不就明帝即位又徵拜給事中旭稱疾篤經年不到褚世標臨海縣志義熙中隠士入山不出屢辟皆辭唐張濆嘉靖浙江通志天台隠士也喻鳬贈以詩有道髙天子問名重四方招之句王貞白集亦有憶台州張處士詩張令聞全唐詩傳唐興人隠居不仕號天國山人有詩與杜光庭云試問朝中為宰相何如林下作神仙一壺美酒一爐藥飽聽松風白晝眠五代于履台州府志黄巖人與寧海鄭睿俱以文名睿仕呉越為都官員外郎履不仕隠居葉茶寮山自號藥林嘗開山得楛矢云宋吕逢時仙居縣志字原道幼警悟博覽羣書嘗受知於陳邑令襄入太學名噪日甚鄭獬友之駙馬都尉錢景臻師之欲奏以官固辭隠於白巖山羅提刑適以孝亷舉之亦不就林訪仙居縣志字達本元祐中將上禮部以親喪廬墓不果遂築草堂於東山隱焉大觀中詔求行郡縣以訪應不懌復去之趙占龜兩浙名賢録字十朋黄巖人志尚超卓與石尚書公弼李㕘政光為内外兄弟二公貴無一字相通家有軒面植雙桂人稱為桂隱士宣和寇亂動以火攻獨於是軒相戒無犯杜文甫赤城新志臨海人咸淳進士厯瑞安軍節推徳祐初除國子博士入元翰林學士趙與􅝾薦於朝侍御史程文海奉㫖宣召皆以疾辭終不起自號南峰山民友鹿翁天啓寧海縣志不知姓名或以為先祖父仕宋為侍從顯官宋末隠姓名屏居東北耆山下不妄交游日與麋鹿相狎故自號友鹿人亦稱之為友鹿翁方遜志為立傳元吕徽之輟耕録家仙居萬山中耕漁自給一日擕楮幣詣富家易穀種值大雪聞閣中分韻作雪詩一人得滕字苦吟弗就徽之不覺失笑詢之乃曰我意舉滕王蛺蝶事耳衆邀之入座以藤滕二字請足之復拈曇字韻隨筆即書書訖徑出問其姓氏不畣遣人尾其後識其所居雪晴往訪之惟草屋一間忽米桶中有人乃其妻也問徽之何在曰方捕魚溪上至彼果見之隔溪謂曰諸公先生舍我得魚當換酒飲諸公也少頃擕魚與酒至盡歡而散歸宿逆旅主人語以故主人喜曰是固某平日所願見者巽旦躡其蹤則已遷居矣呉孝光寧海縣志字𢎞濟操履端介鄉舉兩試第一時方國珍僭據遂隠居教授國珍欲羅致幕下逃不赴戴道顯仙居縣志字均用深沉有卓識方國珍欲聘為謀主不就將劫之遂亡匿山中蔣大徳臨海縣志名不傳大徳其字也方氏據有浙東三郡起大徳於其廬大徳厚遇使者令善為已辭且曰否者吾惟有死而已既而私謂其友曰此輩欲汙我我平時尚不欲仕况仕於此輩乎鄉嘗旱民欲流散四方大徳止之曰吾尚有粟可以相周粟盡而去未晚也民賴以全明年又旱復發所餘弟子告已用將不給大徳曰衆皆死而己獨生尚何心哉明葉兊天啓寧海縣志字良仲方國珍據浙東兊深自晦匿間行金陵謁太祖於戎馬間獻武事一綱三目䇿上竒其言屏人命坐賜飲食欲留用之兊力辭賜金帛遣還其後徵辟嵗至皆不就嘗植梅四種於軒前自號四梅先生張提仙居縣志字廷器七歲讀書五行俱下長遂以文雄應省試經七里灘登子陵釣臺慨然有髙尚之志輙返棹益肆意於詩與顧黄門伊京兆唱和稱安州十騷而提執牛耳金華府南北朝樓慧明南史闗康之傳東陽樓慧明字智逺立性貞固有道術居金華山舊多毒害自恵明居之無復辛螫之苦蔵名匿迹人莫之知宋明帝召不至齊髙帝徵又不至文恵太子在東宫苦延方至仍又辭歸俄自金華輕棹西下及就路回之豐安旬日之間唐㝢之入城塗地唯豐安獨全時人以為有先覺齊武帝敕為立館唐張志和唐書本傳字子同婺州金華人始名龜齡母夢楓生腹上而産志和十六擢明經以䇿干肅宗特見賞重命待詔翰林授左金吾衛録事㕘軍因賜名後坐事貶南浦尉會赦還以親喪不復仕居江湖自稱烟波釣徒兄鶴齡恐其遁世不還為築室越州東郭茨以生草椽棟不施斤斧豹席㯶屩每垂釣不設餌志不在魚也縣令使浚渠執畚無忤色常欲以大布製裘嫂為躬績織成衣之雖暑不解觀察使陳少游往見為終日留表其居曰𤣥真坊以門隘為買地大其閎號回軒巷先是門阻流水無梁少游為稱之人號大夫橋帝賜奴婢各一志和配為夫婦號漁童樵青陸羽嘗問孰為往來者對曰太虛為室明月為燭與四海諸公共處未嘗少别也何有往來顔真卿為湖州刺史志和來謁真卿以舟敝漏請更之志和曰願為浮家泛宅往來苕霅間辨㨗𩔖如此善圖山水酒酣或擊鼓吹笛舐筆輙成嘗撰漁歌憲宗圖真求其歌不能致李徳裕稱志和隱而有名顯而無事不窮不達嚴光之比云五代宋榮十國春秋婺州義烏人隠居本州覆釡山下通尚書春秋廣順中忠懿王累徴不就學者私諡曰文通先生騎牛者逸民傳在婺州山中古貌巾褐手執鞭光爍日色扣角而歌曰静居青嶂裏髙嘯紫烟中塵世連仙界瓊田前路通時有僧入山見之揖之不應馳步趨之不及望赤松而去宋俞澹貧士傳字清老金華人貧而無室栖山以居人呼之曰半山道人王介甫嘉其潔尚乃强為釋牛山澹曰無錢得祠部王為買之牒名紫琳已戒期祝髪愆而不至王訝詰之澹曰吾思僧不易為生龜脱筒亦難堪忍祠部已付酒家償負耳陳鼐兩浙名賢録字孟容義烏人志趨髙邁不喜自衒靖康初結茒於雞鳴山之陽采薪拾蔬以供母母亦歡然忘其憂自號静翁有詩稿五卷黄璣金華先民傳字敦政義烏人負髙世之志絶意仕禄建炎初從其舅宗澤至汴將授以官即辭歸贈以白金計所用而反其餘澤復奏補迪功郎卒不受終老於家自號葆真子張志行金華先民傳字公澤東陽人力學砥行鄉閭推仰以禄不逮親遂不事科舉州郡屢辟不應紹興三年浙東宣諭使朱异表聞賜號沖素處士卒吕祖謙銘其墓朱元翰萬厯義烏縣志卓犖不羈博通經史紹興中嘗獻賦行在言切時政後隠遁終身號四明居士孫惟信兩浙名賢録婺人工詩喜談謔嘉定初嘗於大雪中登廬阜絶頂盡得其景物之詳作記游卷棄官不仕隠居武林湖山間自號花翁病沒安撫使趙與􅊸葬之湖上姚獻可萬厯金華府志字君俞義烏人隠居郭西門風度孤鶱不同於物至飢不粒食蒸松菜茄子琰之無醯鹽其貧不堪迄無妄求葉尚書適布衣時嘗訪之獻可曳破鞋出迎歡如舊識既疾革度不可起以書造適曰我能守義不辱子宜為我銘臨終戒其弟曰棺前止須布幃一幅置瓦爐於案知我者當自來哭其不知者雖哭吾不對也王象之東陽縣志志行髙潔隱居不仕嘗著輿地紀勝今之輿地諸書皆本之杜濬之金華先民傳字若川蘭溪人伯髙孫去偽子明春秋領鄉貢宋易世後感激自悼矯行晦迹寄食西峰僧寺以終李直方金華先民傳字徳方東陽人少以世業治尚書舉進士不第退治河洛之學徳祐初㑹求直言抗疏闕下不報歸益潛心六籍旁搜百氏聲實兼著宋末隠居教授其受業弟子陳樵胡滅陳士允皆以文學知名晩歲家益貧與其弟子耦耕南山之麓人皆以龎徳公擬之趙若恢東陽縣志字文叔生而秀異甫成童能黙誦五經為文數千言立就嘗應詔言事悉時政所急弱冠登咸淳乙丑進士宋亡避地新昌山遇族子孟頫與居相得甚時元主方求索趙氏之賢者子昻轉入天台依楊氏為元所獲若恢以間得脱程鉅夫之使江南也有司强起之稱疾且曰堯舜在上下有巢由今孟頫孟貫已為微箕願容某為巢由也鉅夫感其義釋之於是僻處城東北隅杜門不出深衣大帶摩娑古柏間年八十餘龎眉皓首四方徵文獻者詣之多謝却焉徐鈞正徳蘭谿縣志字秉國别號見心宋汀州使君時升之子以父任為濠州定逺尉宋亡不仕家故多書日以史籍文章自娯與仁山先生有雅因欵致之以教其子且朝夕惕厲明修己治人之道陳取青東陽縣志樵之父少從石一鰲受朱氏之學寶祐間抗章詆賈似道誤國之罪不報歸隱於家自號閒艤翁宋既亡元伯顔見其章為之嘆息欲官之力辭不就于石萬厯金華府志字介翁蘭溪人因所居鄉自號紫巖晩徙城中更號兩溪貌古氣剛喜詼諧早慕杜氏五髙之為人後從王定菴業詞賦接聞諸老緒論其學多所通解自負甚髙宋改物後隱居不出一意於詩出入諸家豪宕激發氣骨蒼勁望而知為山林曠士一時言詩者皆莫能及仁山金先生嘗序其集呉思齊萬厯金華府志字子善永康人其先居處州之麗水祖深有竒才陳亮以子妻之遂家永康父邃官至朝散郎思齊少穎悟以文章家知名用父廕補官攝嘉興丞數以書干宋臣用事者言賈似道母喪不宜用鹵簿又言御史俞浙以論謝堂去職宰相附貴戚塞言路如朝廷何凡所要言以直遂其志苐知有是非不知有毀譽禍福也宋末隠浦陽家無儋石之儲有勸之仕者輙謝曰譬猶處子業已嫁矣雖凍餓不能更二夫也所善惟方鳯謝翺相與放逰山水間晩自號全歸子方鳳評思齊為人如徐積陳師道君子不以為過大徳辛丑年六十四手編聖賢順正考終之事曰俟命録録成賦詩别諸友遂卒神明湛然無怛化意元金涓金華先民傳字徳源義烏人從許謙講道於八華山稱為髙第既又從黄溍學古文詞與宋濓王褘朱亷為友其文雅健有奇氣乗興援筆頃刻千百言不自休性樂恬淡絶意仕進虞集栁貫交章薦之皆不起入明州縣屢辟輙辭曰犧尊青黄豈木所願孤豚之好游戲汙瀆且吾髪已種種焉能騁馳簮組間哉於是厭所居迫市徙去縣南蜀山之下青村以居朋舊扣門輙焚香瀹茗促席對榻抵掌劇談客去復閉門不妄出學者稱青村先生陳樵宋濓鹿皮子墓誌東陽人字君采人因其衣鹿皮故又號為鹿皮子其先居睦之富春宋之中葉徙東陽幼學於家庭繼受易書詩春秋大義於李直方文辭於狀物寫情尤精自出機軸不蹈襲古今遺轍性至孝父患風嵐之疾扶之以行後為風痰所侵氣弱不能吐截竹為莆時吸而出之母郭夫人沒見其遺衣輙奉之嗚嗚而泣生平未嘗言利家素饒遇歲儉輙竭粟賑里閭嘗發所蔵錫為器工人持歸乃白金也悉易之或以告一笑而已李序元詩選傳字仲倫東陽人年十七追和李賀樂府嘗遊京師宋褧危素見其所著四書新説引為莫逆交許有壬言於中書牒江浙行省俾為學校官未用而牒燬嘆曰命也夫遂歸隠東白山中與友人陳樵日相吟咏以自樂著有絪緼集鄭謐兩浙名賢録字彦淵金華人晦迹衡門不求聲譽攻隂陽厯數之書嘗注郭璞葬書以為獨詣後聞其友葉儀范祖幹之論方知正學刻苦研窮晝夜不輟有心學圖説蘇伯衡胡平仲為之序明滕浩金華縣志字至剛家赤松之梁山洪武中為府學訓導未幾退隠玉壺山永樂中詩傳西蜀或達於王所王重之屬聘為校文官辭歸金信分省人物考字中孚蘭谿人穎悟工詩從楊維楨遊往來呉越間部使者以茂才舉不應歸隱金華之優游洞學者稱漫吟先生有春草軒集傳於世子聲字伯鏞與袁仲仁陳大有輩皆以能詩聞於時號十才子鄭柏分省人物考字叔瑞浦江人隱居著書或以其名達之蜀王王顧其兄楷曰叔瑞可謂清逸之士人以清逸處士稱之方太古舊浙江通志字元素金華人少警敏好吟咏其父遣從章懋受經不屑治章句遂棄去專力為詩古文居女埠溪上自號寒溪壯嵗出游三呉與姑蘇楊循吉都穆文徴明相倡和而詩益進既游八閩林埜一見莫逆為作錦囊十咏以贈之一時名輩如林泉山林見素皆爭相引重出閩厯探匡廬九華秣陵之勝僑居呉中久之從者雲集晩歸隱金華解石山中鄉大夫士莫不造廬禮訪焉王如心義烏縣志字元近號稱平幼穎異年十六七即棄舉子業讀書小樓硏究經史及象緯厯律方輿器數之學孝於親友於兄弟喪偶不娶與人交一言之諾終身不移著起從集若干卷萬厯乙未巡按御史李楠疏其學行於朝曰鋭志清修不干利禄龍徳而隱者也縣令張維樞申請建坊於觀音橋側題曰清修髙隱呉孺子續髙士傳字少君蘭谿人兒時父不課經史獨授杜詩一編長好離騷老莊爾雅遇俗夫則云吾不識字口誦詩使人代書之家居蘭谿東郭負郭有田一頃盡磽瘠鑿溝引山泉入厨日閉門藉虎皮危坐或問之曰吾尋味好客話言耳性愛潔不畏寒遇泉水清泠雖秋冬輙解衣以浴嘗遊雁蕩天台石梁絶糧啖蘆菔根四十餘日後居僧寺自炊一銅竈飯不足則餔糜日買兩錢菜分榦葉為虀羮語人曰免吾低眉向人勝飽於粱肉耳有一大瓢摩挱如玉所至持擕他日過荆溪遇盜破之抱瓢泣數日夜乃去晩自稱破瓢道人隆慶末卒於梁溪胡榮萬厯湯溪縣志一名道榮字希華宋經略使頴之後早嗜學蒐獵百家旁通九藝與江善之游繼從金華江公若得其根原居家孝友名動鄉閭都憲邵玘亞卿呉紳交薦不起年七十卒門人私諡為文莊先生衢州府漢龍邱萇後漢書任延傳延為㑹稽都尉呉有龍邱萇者隠居太末新莽時四輔三公連辟不到掾吏白請召之延曰龍邱先生躬徳履義有原憲伯夷之節都尉灑掃其門猶懼辱焉召之不可遣功曹奉謁修書記致醫藥吏使相望於道積歲萇乃乗輦詣延府門願得備録延遂署議曹祭酒尋病卒南北朝徐伯珍南齊書本傳字文楚東陽太末人少孤貧叔父璠之還袪䝉山立精舍講授伯珍往從學積十年究尋經史遊學者多依之太守琅琊王曇生呉郡張淹並加禮辟伯珍應召便退宅南九里有髙山班固謂之九巖山伯珍移居之門前生梓樹一年便合抱館東石壁夜忽有赤光洞照俄爾而滅白雀一雙栖其戸牖論者以為隱徳之感永明二年刺史豫章王辟議曹㕘軍不就家甚貧窶兄弟四人皆白首相對時人呼為四皓宋程汝士萬厯龍游縣志字虞卿親歿廬墓終喪嘗入太學棄歸不復仕進鋭意經史學者景從仁宗朝士大夫薦為郡教授講論不倦樞密陳旭賢良王介與臺府交章薦其孝亷特賜粟帛英宗搜訪遺賢長史强起卒於山陽還家易柩如生學者稱廣平先生周順之𢎞治衢州府志江山人明易學有節行與趙抃善抃遣子候起居食以蔬食同行畦町林麓間進趨極艱苦既歸抃問曰先生何以教汝且怒且答抃曰汝處安佚寧知稼穡汝享膏粱寧知藜藿教汝多矣宜深識之慎伯筠𢎞治衢州府志字東美西安人豪於詩應貢京師見棘闈嚴甚曰此非所以待天下士也拂衣歸嘉祐間韓琦薦之與林和靖俱至伯筠留京師一日遇髽紒道人傾蓋如舊談論累日人莫能觧自是不飲亦不作詩毛赫天啓江山縣志博學多聞不營利禄宋仁宗嘉其恬退卒贈承奉郎成黙衢州府志字利賓西安人隠居業漁建炎初以漁舟濟髙宗於金山髙宗欲官之辭不就乃賜宅一區田五十頃於禮賢門外楊復義衢州府志字子宜號西清西安人宋末與父偕隠師事金仁山歸於西清授徒講學當事屢徵辟不就常衣葛行吟草澤間家素饒裕立義學義廩義塚復立義田以飯僧時號為西清隠士張裕開化縣志字好問性孤介樂道忘貧貢於鄉徐霖師事之尤為趙庸齋汝騰所重達人顯官以幣餽者悉不受有司强其出對曰得優游昇平之世寄傲山水之間足矣烏用仕為乃即横溪先隴側構室鑿池日徜徉其中澹然自得鄉里有婚姻喪葬者必從問禮有紛爭者必就辨曲直家雖不裕而每賙人急弗靳也永嘉黄淮銘其墓蔣芸兩浙名賢録開化人咸淳鄉舉上疏論賈似道奸不報遂不就南宫試而歸元累徴不起人稱芹澗先生元徐庭琇衢州府志字宇清常山人大興𤣥孫性穎敏八歲能文從伯父夢麟學博綜羣書至元間領鄉薦後舉博學宏詞除國子學正不受辭歸自號金川隱者設義田義倉賑恤鄉里郡守王俊劉克昌髙其學行延為明正書院山長大闡經㫖從游者皆成名儒至元末亷使復辟堅不起潛匿石崆山谷卒明趙檜兩浙名賢録字廷堅江山人負氣節博學能文母周嘗鬻釵遣就學於數百里之外既歸母流涕語檜曰吾始可見若父於地下矣隠居養母終身不仕童珮萬厯龍游縣志字子鳴家貧從其父載書鬻呉越間挾筴問字輙通曉意義後買一舫逰四方帆檣下皆貯書讀之窮日夜不休又善考證書畫金石彞鼎之屬嘗逰崐山執經於歸有光有光為贈序道其依依問學之意久之學益富詩歌日益有名與王世貞王穉登逰太保朱忠禧與其兄恭靖王遣人邀至京師愛而欲留之一夕遯去嘗與韓邦憲定交逆旅邦憲守衢親過其家山塢中序布衣昆弟之好珮請為祠祀龍邱先生邑有龍邱祠自此始邦憲卒於官徒步送其喪卒年五十四子鳴蔵書萬卷手皆自勘讐篤於交誼有所期雖千里不爽薄田數十畝割田以創村塾龍有溺女之俗捐羨粟以給舉女者有文集行世嚴州府唐許法稜嚴陵志字道沖建徳人唐永泰中束帛聘不就羅萬象嚴陵志分水人隱於紫邏山浙西觀察使李徳裕使人召之萬象更逃入深山築白雲亭居之終身不出翁洮嘉靖浙江通志字子平夀昌人舉進士授主客員外郎退居不仕僖宗以建州刺史李頻薦遣使徴之令睦州守臣催促上道不起作枯木詩以荅詔僖宗復遣使以曲江魚賜之宋理宗朝追諡為善慶公五代方昊嘉靖浙江通志字太初淳安人生於唐末唐亡遯隠巖谷中呉越錢氏招之不往聚徒講學於上貴精舍以終其身鄉人稱為静樂先生宋咸淳八年就上貴寺建祠祀之宋邵炳淳安縣志晃之子登天聖五年進士第為富陽簿秩滿歸築樓名白雲而隠焉范文正公守睦招之不就内相葉道卿郡倅張文定屈炳主錢塘學亦辭後張在諫垣薦之召赴闕因上時政機要䇿三篇除祕書省校書郎知義烏縣不赴復還舊隠時稱白雲先生方逢嘉淳安縣志字君㑹領漕薦任無錫尉調轉船兩倉司門事凡知者累以文學政事薦之辭不就歸隠於所居馬巖山下號巖隠先生齊龍髙嚴陵志字彦登淳安人為上舍生咸淳七年釋褐第一授迪功郎婺州教授尋隠居不仕創讀書之室名曰相莊聚徒授學以終老焉章元禮余乾亨元真山人傳端平咸淳間三薦監闈一舉進士宋亡乃匿迹韜光肥遁林壑自書其門曰舊時科目中儒戸今日山林下逸民居家謹養生送死之禮既老自誌其墓諱其名曰元真山人余夢魁遂安縣志字梧叔世居松林舉鄉薦宋運革築室璉塢山中大書松林二字刻於石元初有司累薦不起年七十餘臨訣屬子姪曰吾宋人墓碑書宋林處士足矣余徳明遂安縣志字克新弱冠登文天祥榜進士官翰林編修校理預修國史宋末里居不仕賦歸隠詩以見志焉元嚴侣桐廬縣志字君友子陵三十五世孫從學賈漢英賈之學實源於朱子貴官至釣臺必訪侣勸之仕則曰吾鼻祖髙風逺韻與富山桐水為流峙某不敏願為賢子孫足矣嘗逰錢塘有動於中亟歸遽遭喪擗踊氣絶者數四治喪一用朱子禮廬墓三年不脱衰絰有白燕巢於墓木至順辛未卒門人私諡曰髙節先生何景福淳安縣志字介夫號鐵牛子學博行修累辟不赴優游泉石所著有鐵牛翁詩集李康桐廬縣志字寧之年十三母病弗瘥割股和饘以進病隨愈里稱孝子從永康胡長孺逰以古學自鳴至正三年郡守馬九臯遣使幣迎力辭之九年張奉使素聞其賢又起之復辭十六年宰臣達實勒至邑即致幣遣令詣請議事康不得已而往欲官之以母老懇辭歸及卒髙陽許瓊青田劉基臨其喪作詩以誄之徐舫續髙士傳字方舟桐廬人約躬有道喜怒不形幼尚俠好馳馬試劍已而幡然悔去為進士業已而又悔曰人生貴適意奈何跼蹐章句中於是游江漢淮浙間以詩歌自娯江浙㕘政蘇天爵表薦之舫笑曰吾詩人耳其可以章紱乎竟逃去築室江臯每天雪放舟釣江中終日不返自號滄江散人髙帝初劉基應聘舟泝桐江而西舫冠黄冠衣白鹿皮裘立江濱目送之曰卿寜不愧桐江水耶基與同聘者皆與舫善舫以隠自髙數欲屈致之舫愈自匿人莫知其跡而終宋適徐舫墓誌宛陵罪氏率五百指來避兵衣且食之病者予藥死無所歸則擇地蔵之事平具巨舟載之還家温州府晉張廌永嘉郡記隠居頤志家有苦竹數十頃於竹中為屋常居其中王右軍聞而造之廌逃避竹中不與相見唐劉沖萬厯温州府志永嘉人隠居大羅山人稱其所居曰亷讓里秀才洋君子山五代蔣湛永嘉縣志有髙操刺史季廣琛建牙持牒詣其家徴之不就至今名其鄉曰建牙嚴永十國春秋温州永嘉人初仕南唐厯顯官一旦避地歸蔵衣冠於平陽青華山穴中為人傭作以自給呉越王物色得之永不得已於穴間取衣冠以行已復遯去不知所之土人名其處曰嚴公巖宋周侃萬厯温州府志永嘉人行誼表著真宗召之不起郡人名其巷曰招賢坊終䕶國山中朱聳萬厯温州府志字合甫永嘉人隱於江北合山穴巖以居作合山游數千言號歔歈子有隠清堂集郡守周延雋數問餽不受方曄舊浙江通志字聖時永嘉人父端以文行為歐陽公器重曄生未期而孤力學篤行敝衣糲食處之裕如自號迂愚翁大觀初詔舉行誼郡以曄應選固辭不就林幹樂清縣志字國材崇寧初士皆以舍法論秀登名幹獨不事舉業閉門著書居木榴山因號木榴子著淵通四十八篇覃思十三篇邑令鮑輝遺幹書謂讀覃思知古大聖人治心養性盡於此矣淵通一書理義精微非晚學能窺涯涘一日見幹草衣木質進退踈野始知為遁世士益尊事之徐必友隆慶平陽縣志字仁卿鐸孫儒雅博洽政和間屢薦不起隱柏洋山下作善養亭嘯咏終身自號逸叟周彦通萬厯温州府志永嘉人豫子當恩補避匿弗出父歿後家徒四壁怡然自得居常䟽食一介無所茍取結廬謝池不與俗接林崧孫瑞安縣志字喬年介夫孫幼孤力學通詩易尚書為文清潔而善通實事與永嘉陳鵬飛友善及鵬飛謫死遂絶意仕進自號兌光居士日與沈東美韓汝翼修其祖故事保墳墓厚風俗紹興之季後進多尚宦達至髙尚有舊典型惟推喬年薛髙萬厯温州府志字寧仲永嘉人任連城簿棄官而隠讀書作文至老不休家有讀書樓郡守樓鑰為之記陳謙贈詩有萬卷編抄髙似屋一門師友重如山之句從孫嵎登寳祐第調長沙簿一旦掛冠去以詩酒自娯終其身朱黼平陽縣志字文昭學於陳止齋不事舉業嘗著紀年備遺始堯舜迄五代若吕武王莽朱温皆削其紀年以從正統葉水心序之且云此書一出義理所會寳蔵充斥人始知其能傳陳氏學也躬耕於南蕩山抱其學以終朱元昇平陽縣志字日華黼從子嘉定武進士棄官不仕入南蕩山嘗曰貫三才之道者莫大於易精研三十年沛然有得乃著三易備遺十卷行於世嘗於其鄉築堰備水鄉人徳之名朱公堰何傅貧士傳字商霖永嘉人屬詩知名釡爨常空而意趣悠然漠不為累葉適常稱其凍餓自守之樂死之日殯具無貲其友翁忱率素往來者葬之元薛魁祥萬厯温州府志字壯行平陽人有文行登咸淳進士授淳安尉宋革命遂棄官杜門著書辟連江宰不就同時有顧近仁字力行才器儁邁亦不仕學者宗之曰江南先生有詩萬餘首名小慚集鄭昻平陽縣志字處抑不諧於俗隠居讀書至正癸巳冬叛卒陳安國據城以禮訪之昻婉拒挈妻子避西華山中事寢始歸僉憲巴延布哈行部義其事屢薦不就孔晥平陽縣志字子充至正壬午鄉貢授宗文書院山長秩滿歸隱居養親有經略使至延見上政略五篇言天下利害使嘉納之授浙閫照磨使輔周嗣徳守禦元亡不復仕有詩云故居燒後拾殘編留得陶詩一兩篇彭澤豈堪猶作令義熙何忍再書年金建瑞安縣志字長民隱居不仕以春秋教授鄉里至正間方國珍海艘犯境獻䇿築城備禦達納實哩從其言郡賴以安省府交辟徴為秘書管勾不赴優游田里自號林居子國珍據郡以禮延致終不屈明朱希晦樂清縣志襟度夷曠博通羣籍元末民間所在爭相雄長希晦兩弟與劉公寛日搆兵乃往見公寛諭以理解去洪武初以賢才召至京師授朝列大夫不拜歸與趙新鮑原宏相倡和稱雁山三老别號雲松何白列朝詩集傳字無咎永嘉人幼時為郡小史龍君御為郡司理異其才為加冠集諸名士賦詩以醮之為延譽於海内遂有盛名西游酒泉南窮湘沅歸隱於梅嶼山中有汲古閣集行世處州府宋呉戭嘉靖浙江通志字叔才處州人鄉里遵其行恬於隠遁無仕進意宋康定中孫沔為郡奏以教授州學部使者亦薦於朝詔賜帛嘉祐中朝廷訪遺逸沔自政府出帥餘杭復奏薦之詔不起上嘉其節授將作監主簿亦不就卒門人諡曰沖和先生繪像於郡學春秋祭祀焉管師復嘉靖浙江通志龍泉人與弟師常從安定胡瑗學俱有盛名時號二管師復長於詩隠居不仕仁宗聞其名召至問曰卿詩所得如何師復曰滿塢白雲耕不盡一潭明月釣無痕賜爵不受放歸故里人稱之曰卧雲子著有白雲集行於世王昌言縉雲縣志字君用官至左武大夫知武州紹興十四年蜀亂棄官歸隠號滄州醉叟周頊遂昌縣志字成珍性恬淡不樂仕進侍讀楊萬里疏其名薦於朝詔徴不起與鄉人進士華延年周若思講明經義隠居西郭蔣時憲縉雲縣志舉賢良方正上治平十䇿時韓侂胄用事議多不合擢左司諌不拜固辭還山寧宗嘉其節特賜奉議郎王舜縉雲縣志字良佐以太學生試魁上書言事忤時相遂隠居大洋山朱上交栝蒼彚紀麗水人安貧樂道隱居鄉里詔徵不起賜號養素先生林偉栝蒼彚紀青田人仕宋著崇儒録後避亂隠居不仕程塏兩浙名賢録字元爽栝蒼人樟四世孫調海門簿宋末棄官歸為道士建太極陽明書院居之自稱神陽先生元蔣琰青田縣志字叔圭屏居南田宋中丞繼周之孫家貧授徒自給足跡未嘗至邑郭詩文師韓杜孝友溢於家庭梅隠舊浙江通志字聘君縉雲人徜徉山水好植梅後人改名其山曰梅山趙雷縉雲縣志字省之嘗從滕璘學授考亭心法著遵所聞集名冠一時後隠不出周權括蒼彚紀字衡之松陽人通經史工詩至京師歐陽𤣥薦於館職以母老辭不受有此山集子仲瑜承家學以辟授稼軒書院山長改紫陽書院姚棨龍泉縣志字君衛號雲樵陳塏器重之妻以女恩授永嘉簿不就賓興㑹賈似道専擅率太學諸生伏闕極論之不報遂退伏鄉里元使宣慰來栝請見棨説以仁則得衆勿放火縱兵人心自安使從之奏授慶元簿慨然曰本為桑梓出顧博官乎辭不受歸訂諸子作論孟直筆續有薦者俱不起王鑑翁遂昌縣志字子明賢良濬之父有勸之仕者曰吾身度之審矣岩容澗姿豈堪飾之章服或以聞於集賢曰是能樂天者也遂號之樂天處士趙待制雍名其園曰田園任趣及卒太史宋濓撰銘誠意伯劉基篆額學士陶安弔以詩王禕以孟之善士易之幽人稱之趙徳光括蒼彚紀字子明扁所居曰樂善聚書耽誦至忘寢食於世紛華澹如也或勸之仕不就一日道拾白金其遺金老嫗哭於途徳光歸其金舒穆嚕冝孫器之明留睿舊浙江通志字若愚一字養愚栝蒼人治經術攻詩文居青田山中二十年出游呉楚齊晉人二十年歸隠於好溪有紫芝𤣥鶴之瑞著書九篇名曰留子毛輝縉雲縣志博學雄文詞總制孫炎薦署學事屢辟不起樹卉種菊䇿杖獨步入紫青山卜地為竁穴曰全歸窩士友以愛菊𩔖陶稱為潛齋先生今白龍山齋書院其遺址也呉叔圭括蒼彚紀宣平人博學善屬文洪武中舉賢良方正不就隠居以終其身晉王縉雲縣志字國潤明初貢仕太寕簿靖難時棄官變姓名隠於杭之西湖陳谷括蒼彚紀字賓暘青田人隠居好古不榮利詩文有奇氣著有存存生集浙江通志卷一百九十三
