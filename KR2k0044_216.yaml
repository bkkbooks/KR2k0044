body:
  text: 浙江通志卷二百十七祠祀一山川百神凡有功徳於民者咸列秩祀所以合幽明逹誠敬也盛朝五禮修明而於崇徳報功之典為尤重焉維浙東西嶽瀆之祀典禮有加徧於羣神有舉莫廢凡以為斯民求福免災而飭紀之道亦於是乎在志祠祀杭州府錢塘縣附郭仁和縣附郭先農壇在慶春門外東郊仁和縣臨江十一啚國朝雍正四年八月欽奉上諭國家以民為本民以食為天朕即位以來念切民依舉行耕耤之禮殫竭精誠為民祈榖於上帝乃雍正二年三年耤田叠産嘉禾有至一莖九穗者朕心亦以為偶然之事今據府尹劉於義進呈今嵗耤田所産有一莖雙穗三穗以至八穗九穗皆碩大堅好異於常榖朕見之心甚慰悅特令宣示廷臣朕並非以此為祥瑞誇耀於衆也葢實有見於天人感召之理㨗於影響無纎毫之或爽朕以至誠肫懇之心每嵗躬耕耤田以重農事即䝉上帝降鑒叠産嘉禾以昭休應似此八穗九穗之榖豈人力之所能强為亦豈人君所能强之使有乎天人感應之理朕見之最真最切但恐此心不誠耳誠則未有不動者即如從前青海蠢動朕為邊陲憂慮䖍禱於宫中不數旬而㨗音即至疆宇寧謐又聞前嵗夏間近畿雨澤稍愆朕在宫中黙禱减膳修省䖍誠叩懇不數日而甘霖大沛禾稼有秋此皆近年以來朕親行親騐之事至於去年夏秋之間時常陰雨而朕在宫中但覺雨水稍多不知其大為民患而李維鈞並不將畿輔被潦實情具奏是以朕竟不聞知未嘗早為䖍禱殫竭誠心以挽天意而舒民困及蔡珽署直𨽻總督事務詳細奏聞朕宵旰憂勤幾廢寢食於是截漕發倉多方賑濟京城設厰各邑興工俾窮民皆得餬口是以地方雖被水灾而小民不致流離失所朕撫綏憫惜之念實為迫切今嵗二麥豐收禾黍暢茂此皆上天俯鑒朕衷故加惠黎元而錫以盈寧之慶也葢天生民而立之君鑒觀在上人君一念敬謹政事無闕天必嘉之佑之一念放逸政事有乖天必儆之戒之此一定之理也况人君撫馭臣庶位處極尊所以賞罰之者獨有上天耳是以朕每於水旱等事皆實心内省必係朕有過失上天儆戒示譴也至於各省旱澇之事朕皆視同一體原無彼此之别惟是地方相隔路遠彼地偶有水旱有司未必即行具報及至奏逹朕前而𦂳急之時已過是以朕無從盡其誠心為之祈禱此其責全在本省督撫矣督撫受朕委任之重為朕養育萬民必視百姓之疾苦如痛癢之在己身一遇水旱饑饉必思所以致此之由或因本省之政事吏治有闕即思速為改易之或因本地之人心風俗不端即思速為化導之兢兢業業修省祈禱竭盡誠心一如朕之朝乾夕惕斷無不可以挽回天意者假若聞朕之政事稍有闕失亦即直言陳奏不必隱諱如此則官與民聫為一體臣與君又聫為一體太和翔洽實意交孚天聽雖高誠呼吸可通矣朕每嵗躬耕耤田並非崇尚虗文以為觀美實是敬天勤民之至意禮曰天子為耤千畆諸侯百畆據此則耕耤之禮亦可通於臣下矣朕意欲令地方守土之官俱行耕耤之禮使之知稼穡之艱難悉農民之作苦量天時之晴雨察地利之肥磽如此則凡為官者皆時存重農課稼之心則凡為農者亦斷無茍安怠惰之習似與養民務本之道大有禆益着九卿詳議具奏特諭欽此隨經九卿等議覆欽遵各省一體舉行創建錢塘縣知縣秦炌仁和縣知縣劉漢儒奉文共置耤田九畆八分又壇基地五畆九分零灌溉蕩一畆八分零壇制於東郊潔淨之地田在壇前壇中正祠五間左右翼七間後立寢室内供先農炎帝神農氏之神先農厲山氏之神先農后稷氏之神祭品祭器祭儀照先師之禮每嵗二月亥日督撫主耕從耕者二員一員進鞭一員進耒外置田畯四人以兩人扶犂兩人牽牛主耕者左手秉耒右手執鞭九推歩行盡壠而止耕畢司道及府㕔州縣次第如式耕推亦俱盡壠而止耤田之左右四旁則令耆老農夫終其畆焉反於寢室送神灌鬯徹祭飲福其各府州縣俱以掌印官主祭主耕統如前式謹按通志各門每縣分載先叙城内次及城外如山川古蹟闗梁寺觀之屬皆凖此例惟祠祀一門因先農壇俱在城外最為鉅典應列諸祠之前而社稷山川諸壇凡附郭之縣皆不分設例難畫一故錢塘仁和兩縣壇廟統附於府而外屬各縣仍行分列但不分城内城外悉依時代為先後與諸門體例稍有不同以下各府倣此社稷壇成化杭州府志在錢塘門外西北祭以春秋二仲上戊杭州府志明洪武三年杭州知府五興福建於城北舊浙江通志附郭二縣不别置餘郡縣如制風雲雷雨山川壇成化杭州府志在城西南包家山春秋二仲祭奉遷城隍神主共壇合祭舊浙江通志附郭二縣不别置郡厲壇成化杭州府志在城北霍山坊内每嵗春清明日秋七月十五日冬十月一日奉城隍神以主厲祭設無祀鬼神之位於壇下錢塘仁和以附府不置縣厲仁和縣志其坊隅鄉都一體置立鄉厲先師廟詳見學校各府州縣同崇聖祠詳見學校各府州縣同名宦祠詳見學校各府州縣同鄉賢祠詳見學校各府州縣同城隍廟咸淳臨安志舊在鳯凰山據會要為永固廟宋紹興九年移寶月山三十年勅封保順通惠侯紹興三十年勅錢塘為郡尚矣維城與隍必有神主之况嵗之豐凶時之水旱民之疾疫求焉而必應者哉朕今駐蹕於此視之不異畿甸重侯美號用疏不次之封其歆其承永妥爾祀可特封保順通惠侯成化杭州府志咸淳間加號曰輔正康濟明徳廣勝王明洪武三年正祀典詔各處府州縣城隍止稱某府州縣城隍之神錢塘縣志永樂中始勅封浙江故按察使周新為城隍之神成化十年後寢火布政使寗良重建𢎞治十六年御史夏景和拓新重建楊孟瑛杭州府城隍廟記杭州為浙之名郡帶江襟海控呉扼楚方嶽所臨為東南大都會重熙累洽安阜富蕃生聚百萬早作夜息關柝不驚奚所庇憑惟城惟隍𢎞治癸亥春雨暘不時菑及田榖巡按御史夏公率屬吏持瓣香謁城隍告焉仰見棟危門圯謂兹民主怠惰勿恭何以邀福明神乃出贖金命孟瑛經度其事閲月功告成竊惟積土為城壁立而垣繚居者屏倚積水為隍波回而川滙居者塹依㝠漠之中誰其尸之𬗟想其神受命上帝専職保民此固百姓所宗有國者所祑祀也矧天目鳯舞吳山馬立萬松諸峯如虎羣踞海潮西湧長江東下西湖千頃天涵日沃杭之城杭之隍視方城漢水形勝過之其神之威宜何如也神之威則廟之崇非侈也宜也萬厯三十五年廟燬邑人金學曾請於制府劉一焜倡捐重建杭州府知府姚之蘭實董其成張大猷為記國朝康熙六年水師副將王虎重修易殿柱為石二十一年按察使孟卜重建牌坊并新右司齋㕔三十六年翰林學士揆叙重新廟制又山麓别有府城隍廟未詳創始旗纛廟萬厯杭州府志在太平里普濟橋東廟制中為神宇前為櫺星門外為大門去宇東數十歩為牲房庖湢又東南為箭亭宇西為火藥庫櫺星門之外東西皆齋宿所錢塘縣志明洪武三年建於都司廨後八年徙建今處嵗以霜降日祀軍牙六纛之神東嶽廟錢塘縣志一在吳山馨如坊宋大觀中建興忠觀淳祐間重建有理宗御書東嶽之殿四字元季燬明嘉靖十一年重建一在中台八蟠嶺宋咸淳中建明萬厯間尋圯國朝康熙中重葺一在西溪法華山塢口宋南渡初建嘉定十七年樞使史彌遠請於朝重拓寶慶三年落成至今為杭郡嶽廟之冠郎瑛重修法華山東嶽廟碑記泰山五嶽之長也王者受命必告岱以祈永厯代封禪必登記以報功是以天下皆奉而吾杭錢塘廟居三焉一在邑中吳山一在城外八蟠嶺一在法革山法華去城三十里人心趨向於此為最暮春三月傳為誕辰民俗因以賽㑹絡繹道路者昏夜無休焉或曰三廟獨盛於法華何也余曰昭靈貺也觀其湧泉假夢載諸碑者詳矣自宋至今五百餘年而廟貌益隆豈人力之所能哉今年三月余往謁廟見一碑露日下召廟祝語之曰石乆困風雨壊無日矣曷蔽䕶之明日碑忽自碎衆兵驚駭或曰是神意欲更新之也明日祝來告乞文彰之予憮然於是述其顛末買石鐫之為亭以䕶時嘉靖乙丑冬至日也廣靈廟成化杭州府志在石塘壩宋景定四年九月潮壊錢塘里人耆老因立東嶽温太尉廟請於朝賜廣靈為額咸淳五年封正佑侯餘自李將軍以下九神皆錫侯爵李孚佑錢靈佑劉顯佑楊順佑康安佑張廣佑岳協佑孟昭佑韋威佑承天靈應廟舊浙江通志在吳山城隍廟東西湖游覽志舊為天地水府三官故俗稱三官廟宋乾徳三年建名玉虗觀端平三年重建賜今額有天開圖畫閣清暉亭元末燬明洪武二十三年重建梓潼帝君廟一在吳山城隍廟之左嘉熙間蜀人牟子才等請立廟元末燬明初重建國朝康熙二十五年燬巡撫都御史金鋐復建一在孤山四賢祠萬厯間南贛巡撫邑人洪瞻祖修後燬國朝康熙間兩江總督范承勲浙江布政郎廷極重建又貢院東有佑文祠俗稱文昌閣康熙庚午年巡撫張鵬翮建觀橋西亦有文昌閣又雍正八年總督臣李衞於紫陽書院山頂建文昌祠奉孤山舊祠之像於此太歲廟舊浙江通志在吳山海㑹寺西錢塘縣志宋紹興初建理宗書額曰至徳之觀元至正間燬行省丞相逹實特穆爾重建元末又燬明天順六年重建每歲迎春奉句芒神於此火徳廟西湖游覧志宋南渡後建於吳山以奉熒惑之神錢塘縣志明洪武中布政使王鈍永樂中叅政易㫤相繼重建國朝康熙二十五年燬巡撫金鋐重建雍正六年總督臣李衞重建舊浙江通志又教塲内有火神廟最為顯赫仁和縣志明嘉靖丙午建水神廟杭州府志在寳月山明萬厯間建廟中有金龍泉陳學易呉山水徳廟記杭㑹城吳山巋然南嚮相𫝊火形故數有欎攸之灾堪輿家謂宜建水神廟於癸方居天吳以制之耆民姚世明輩遂白於左方伯河東趙公叅政呉郡劉公購地寳月山之北為畆者四甫築基忽地湧出泉極清澈葢在高山之椒人已異之而復一鯉躍出人更異焉遂名泉曰金龍廟靣北構高樓樓神靣西建宇祀龍君後數歩而上即湧泉在焉翼亭以覆之靣南為門周圍繚以垣始作於萬厯戊戍四月落成於今年九月龍神廟在吳山大觀臺下國朝雍正五年上遣官賫送龍神像於浙勅封福越滋農龍神巡撫臣李衞擇地創建并於廟後建雨師風伯亭嵗時祈禱必應有司崇祀惟謹嘉澤廟咸淳臨安志舊在錢塘門外二里號錢塘湖龍君錢氏表請封廣潤龍王宋累封為淵靈溥澤侯廟始梁太同中乾道五年周安撫淙以禱雨應重建淳祐八年趙安撫與􅊸又建且亭其前之井扁曰寒泉武林舊事即水仙祠有薦菊泉及亭錢鏐廣潤龍王廟碑錢塘湖者西臨靈隐東枕府城澄千里之波瀾承諸山之源𣲖固有神龍居止水府司存降景祐於生靈興旱涸之風雨原其自編祀典積有嵗年雖承奠酹之規未施展敬之所予遂建立殿堂表奏乞加懿號果䝉天澤並降徽章其所奉勅㫖具録於後勅錢塘重地會稽名邦垂古今不朽之基繫生聚無疆之福有兹舊蹟特剏新規豈曰神謀實因心匠錢鏐普扇仁風乆施異政至誠所切遂致感通其錢塘湖龍王廟宜賜號廣潤龍王牒至准勅㫖蘇軾謝吳山水仙五龍王廟記西湖湮塞積嵗之患坐閲百史熟視而嘆惟愚無知妄謂非難禱於有神陰假其便不愆於儀咸出幽贊大堤雲横老葑席卷厯時未幾功已過半嗣事告終來哲所繕神卒贊之罔咈民願肴酒之報我媿不腆玉泉龍王廟咸淳臨安志在浄空院嘉泰初賜廟額曰靈泉嘉定初改仁惠嘉熙四年又改神運淳祐八年重建廟封嘉應公後加曰溥澤詳見山川黃龍祠萬厯杭州府志在錢塘門外掃帚塢宋淳祐間建以禱雨有應封靈濟侯賜祠額曰䕶國龍祠明洪武七年即舊址建祠題今額徐一夔黄龍祠記黄龍祠在西湖北山之陰自其址斗折而上水泉紺寒深不可測旱不縮而潦不盈有龍居焉故老相傳夏雨初霽時嘗有神物蜿蜒卧於松上其氣茀茀然而黃葢黃龍也故世號黄龍洞祠在洞側以棲龍神宋淳祐間無門洞禪師有道行嘗説法龍興之黃龍山而歸卓錫兹山之麓見洞中嘗現光怪禱雨輒應或謂龍隨師至云時孟少保珙捐財建祠理宗封龍為靈濟侯賜額䕶國龍祠至正末兵燹大作龍蟄不見祠毁嵗亦多歉寺僧祖吉屏居南山石屋慨然欲振無門之風詣洞祝曰祖道弗墜龍其來歸乎遂募縁興造洪武七年六月天乆不雨民皆憂惶郡守相率致禱三日得大雨遂具木石屬通判王佐董其事即其故處作祠棟宇翬飛林壑改色題曰黄龍祠者從世所稱也龍井龍王祠咸淳臨安志在風篁嶺上旁有徳威亭宋寜宗加封誥文昔我高宗千乗萬騎嘗登南山之風篁嶺駐蹕龍湫酌泉於上一草一木咸被昭回之光時維明神實見敬禮涓滴分𣲖通海浹湖寸雲出岑潤吳澤越揆以祭式宜有寵褒而封爵未加是為闕典朕今以徹侯美稱加寵於爾神珠宫貝闕莫窮其源華衮輪臺其永有耀奠我都邑振爾光靈可特封嘉應靈潤普廣澤王南高峯龍王祠咸淳臨安志在榮國寺後鉢盂潭累封為孚應昭順侯咸淳五年七月安撫潛説友以乆晴禱潭上覺㣲雨沾衣頃之甘㴻如傾乃即故址為創廟以荅靈貺白龍王廟咸淳臨安志在臨平東山黒龍王廟咸淳臨安志在超山仁和縣東北六十里宋嘉定間趙忠獻公宰邑禱雨屢騐請於朝賜通靈為額累封通靈惠應宣濟昭惠侯白澤大王廟杭州府志在純禮坊宋景徳年間遣中尉梁元帥専督漕運行至海中有猛獸號白澤者出没海中洪濤陡作運船幾覆忽見空中一人乗龍馬揮鞭驅逐白澤趨服洪濤頓息糧運以全因建祠祀之後奏請勅封土神順濟聖妃廟成化杭州府志在艮山門外艮山有祠自商份感夢始開禧寳慶一再創建又有别祠在候潮門外蕭公橋丁伯桂艮山順濟聖妃廟記神莆陽湄州林氏少女能言人禍福殁廟祀之號通賢神女或曰龍女也莆臨海有堆元祐丙寅夜現光氣環堆之人一夕同夢曰我湄州神女也宜館我於是有祠曰聖堆宣和壬寅給事路公允迪載書使高麗中流震風八舟沉溺獨公所乗神降於檣遂獲安濟明年奏於朝賜廟額曰順濟紹興丙子以郊典封靈惠夫人逾年江口又有祠祠立二年海寇憑陵效靈空中風揜而去州上其事加封昭應其年白湖章邵一夕夢神指為祠處丞相陳公俊卿乃以地劵奉神立祠於是白湖又有祠時疫神降曰去湖丈許脉有甘泉我為郡民續命於天飲斯泉者立痊掘泥坎甘泉湧出請者絡繹朝飲夕愈甃為井號聖泉郡以聞加封崇福越十有九載福興都巡檢使姜特立捕宼遥禱響應上其事加封善利淳熙甲辰民菑葛侯郛禱之丁未旱朱侯端學禱之庚戌夏旱趙侯彦勵禱之隨禱隨荅累具狀聞於兩烈易爵以妃號惠靈慶元四年加助順之號嘉定元年加顯衞十年加英烈神之祠不獨盛於莆閩廣江浙淮甸皆祠也艮山之祠舊𫝊監丞商公份尉崇徳日感夢而建國朝康熙十九年封天妃為䕶國庇民妙靈昭應𢎞仁普濟天妃遣禮部司官致祭天后宫在武林門内城東北隅國朝雍正九年總督臣李衞毁西洋天主堂改建李衛改天主堂為天后宫碑記自明季萬厯間大西洋利瑪竇入中國造為天主之名而其教遂蔓延於愚夫愚婦之口其徒之入中國者遂大興土木營建居室於通都大邑之中我聖朝定鼎以來其人生長海外逺來就化雖為説不經然祖仁皇帝念聖朝皆具心思知識未必不可教導居之京師使沐浴徳化之盛乆而幡然改悔歸以教其國中之人咸知天經地義之正此乾坤覆載之深恩不遺一物之義也豈知荒誕狂悖之見固結而不可解我皇上御極之初洞燭其奸黜其人皆歸南㠗不得盤踞内地而直省之所為天主堂者以次而改顧其制皆崇隆巍焕非編户之所可居空之又日就傾圯去荒誕狂悖之教而移以奉有功徳於蒼生之明神不勞力而功成不煩費而事集此余今日改武林天主堂為天后宫之舉也雖然自利瑪竇之入中國迄今幾二百年浸滛沉溺惑其教者未必一旦豁然有悟即悟矣或以為不妨存而不論以見天地之大無所不有是其得罪於天而為害於人心風俗者卒未大白於天下也余既深知而不申其罪無以服附和之心不誅其心無以破奸詭之膽夫教稱天主是風雲雷雨陰陽寒暑彼皆得而主持之也不知未有天主之前将竟無有陰陽寒暑風雲雷雨乎抑別有主持之者俟天主出而授之柄乎此其謬一也入其教者必先将本人祖宗父母神牌送與燬棄以示歸教之誠不知天主生於空桑乎抑亦由祖宗父母而生也彼縱生於空桑亦不得率天下之人而盡棄其水源木本之誼况人之所以敬天奉天者以天實能生人生物耳今以生我之父母祖宗而棄絶之不知尚何取於生人生物之天而敬之奉之此其謬二也棄絶父母祖宗者欲專其敬於天主也然聞西洋之俗亦有君臣有兄弟朋友且生生而不絶則何不盡舉而廢之而所以事天主者尤專且篤而獨父母祖宗棄若敝屣此其謬三也西洋之教一技一能務窮思力索精其藝而後止設所得止及於半而死則舉而授之其子脱其子猶有未就則復舉而授之其孫或一傳或三四傳其藝始精則羣然推而奉之以為此可以行教之人矣今之入中國者悉此𩔖也夫一技一能原無當於生人日用之重至於竒技滛巧尤為王法所不容今既不知有祖宗父母則為其祖宗父母者當亦不復以子孫視之獨至竒技滛巧之事父忽念其為子而不啻箕裘之授子忽念其為父而不啻堂構之承此其謬四也藝既精矣遂可出而設教行道矣夫既祖宗父母之盡棄其他漠不相識之人復何闗欣戚而必窮數世之精力以利他人之用此其謬五也然此雖足為人心風俗之害而弊止及於惑其教之人其罪猶小若其居心之險則尤有大不可問者西洋去中國數千萬里而遥非經嵗不得逹又有大海風濤之險去故鄉離妻子䟦渉而來以人情論必有所利而為之故擕帶土物造作器用其誑中國之金錢誠不可數計乃聞入其教者必有所資給人有定數嵗有定額勞心焦思取中國之財而仍給之中國之人圖利者恐不若是之拙也或云毎年紅毛船到必廣載其國中之金錢以濟其在中國行教之人或又云彼來中國者皆善黃白之術以彼國之金錢而用之中國夫以此數人之行教而國中居守之人肯傾資以佐其用則其所圖者非利也彼既以天主之教惑人而復借黄白之術以要結人心是其設心殆有在矣或又為之説曰彼其志欲行教耳好名之人能譲千乘之國何難去故鄉離妻子蹈不測之大海以博後世之名夫好名之人或有捨其身以狥人者然一人好名何為盡一國之人亦皆好名而傾貲以佐之也且絡繹而來其居天主堂者所在而有抑何好名者之多也此葢非無所為而為之者一見其技於噶爾巴矣再見其技於呂宋矣又幾肆其技於日本矣為行教計耶抑不為行教計耶且愚夫愚婦未有不以禍福動其心者今日本於海口收港登陸之處鑄銅為天主跪像抵其國者不蹈天主像則罪至不赦夫既為天之主而受海外一國如此蹂踐毁蔑卒亦無如之何其不能禍福人明矣所精者儀器而璿璣玊衡見之唐虞矣所重者日表而指南車周公曾為之矣所竒者自鳴鐘銅壺滴漏而漢時蚤有之矣所駭人者機巧而木牛流馬諸葛武侯已行之鬼工之竒五代時亦有之至今尚有流傳之者是其説不經其所製作亦中國之所素有其為術又不能禍福人吾不知何為而人之惑之也西洋人之居武林者聖祖仁皇帝曾有白金二百兩之賜此不過念其遠來而撫恤之彼遂建堂於此而顔其額曰勅建夫曰勅特㫖建必奉以曾受賜金遂冐竊勅建之名内外臣工建造今受白金之賜者多矣以之築室遂可稱賜第乎干國憲而冐王章莫此為甚他復何可勝道耶荒誕狂悖者宜去則有功徳於人者宜祠也冐竊勅建之名者宜毁則列在祀典者宜増也天后之神姓聖聖相氏顛末見於記載者雖亦未可盡信然我朝賈出傳海外諸國獻琛受朔者重譯而至魚鹽商入於驚濤駭浪之中計日而出尅期而還如行江河港汊之間而天后之神實司其職神之靈應呼吸可通功德之及民何其盛哉誕罔不經者去而崇徳報功之典興毁其居室之違制者改為祠宇撤其像塑之詭秘者設以莊嚴夫而後武林之人目不見天主之居耳不聞天主之名異端邪説乆且漸熄其有闗於風化豈淺鮮哉雍正十一年八月禮部議覆福建總督郝玉麟條奏各省城建天妃祠宇一例春秋致祭奉㫖依議五顯靈官廟舊浙江通志在五雲山之巔山最高神靈顯異相𫝊九月二十八日為神誕辰爇香者滿山谷北高峯亦有五顯廟神亦最靈東嘉忠靖王廟旌徳觀志王姓温氏諱瓊字永清號子玊温之平陽人初封地祇主令翊靈昭武將軍正佑侯嗣封正福顯應威烈忠靖王則宋季之累加也舊廟祀浙之温郡其祀於錢塘則自宋寳慶二年始時灾厲盛行有司迎王禜除患立已杭人徳王將導迎還郡舁夫百像弗為動遷人謂王顧歆斯土府尹袁韶奏請於朝初立觀於杭之蘇堤後徙建於城之東保安坊南良里額曰旌徳昭王仁也國朝雍正八年重修總督臣李衞題梁旌徳先賢祠舊浙江通志在錢塘保安坊祀唐許由以下百九十九人每歲額支仁和縣學租銀五兩致祭表貞祠在先賢祠右祀漢曹娥以下列女九十七人每嵗額支錢塘縣學租銀四兩致祭謹按宋袁韶初祀三十四人明夏時正去其不當祀者五人共二十九人唐許由漢嚴光吳凌統晉范平褚陶孫晷宋卜天與范叔孫褚伯玉顧歡杜京産梁范元琰褚修唐褚無量許遠章成𬗟宋錢俶郎簡林逋謝絳錢彦遠錢藻沈遘陸詵錢勰虞奕吳思禮崔貢張九成又増祀一十九人宋吳師仁滕茂實施徳操楊由義李鞉楊璿余古李宗勉俞烈趙汝談葉時洪咨夔朱清謝翺元吾衍楊載陳斗龍鄒世聞明王𤦺以上四十八人見萬厯志萬厯三年又増祀唐褚遂良後梁錢鏐明于謙項麒陳鏞夏時正孟春施魯褚鋭李璣衡等十人萬厯二十九年又増祀吳伍員唐顔真卿宋唐介李綱岳飛明張翺鄒虞胡世寧陳荆獻江曜許應元許貫之童漢臣張瀚翁相張椿陳善高儀江沂朱璣錢立鍾化民等二十二人俱見馬三才宋應昌碑記天啟四年李唐又請增祀宋徐應鑣明夏誠高暐鄒幹江玭朱鏞吳誠洪鍾金洪江瀾丁養浩李旻陳珂江曉許相卿陳克昌方九叙張淶姚良弼吳源沈詔茅瓚陳洪濛楊周邵大章顧言孫本凌立郭孝孫枝郭維垣朱印李逄春許三省嚴大紀黄裳顧鈐宋應昌楊兆坊沈文許子良沈楠江鐸陳禹謨馮夢禎凌登名陳洽沈瑞臨方可立顧汝學凌登瀛陳植槐張鳴鶚許仲譽錢養廉陳植樟姚文蔚黃克謙翁汝遇林遇春汪有功朱履嚴子茂沈守正胡引嘉郭金科六十六人又徐子方何琮陳學易張濂馬三才孔承祀柴祥林梓潘頤龍黄應奎徐桐王化黃思道高從禮毛偉沈光祚翁常豫十七人國朝康熙十二年錢塘令梁允植詳請増祀名宦唐李泌白居易駱賔王羅隱宋蘇軾朱弁王庶朱蹕明國朝王良聶心湯顧咸建宋趙抃宗澤王十朋陳禾呂范承謨鄉賢唐陸贄祖謙趙希琯徐復元金履祥許謙明方孝孺鄭濂鄭湜柴車魏驥夏時倪岳商輅王守仁孫燧王世名陶大臨李唐黄汝亨李中華李中楫倪元璐施邦曜凌義渠周鳯翔吳麟徵陳良謨吳甘來王道國朝焜陸培陳潛夫劉宗周祁彪佳壬寅增祀姓名有王佑賢五十二人俱見杭州府志又國朝府志未載者宋袁韶明潘翊許應亨諸允修諸燮張存仁王一麟周瞻屺呂蘭顧懋樊顧景祚許昭遠王法平王修玊謝重輪金世臣等十六人俱見旌徳觀志宗聖曾子祠錢塘縣志在通江橋河下其後裔曾開因宋南遷扈蹕至杭遂立祠奉祀栁洲二賢祠錢塘縣志在柳洲亭左舊名子貢使越祠祀先賢端木子國朝康熙二十六年巡撫金鋐督學周清原從先賢仲子後裔之請以舊先賢仲子祠在弼教坊者廢合祀於此遂改今名雍正九年杭州府知府秦炌重修英衞公廟咸淳臨安志忠清廟在吳山神伍氏名員字子胥吳王夫差入越句踐使大夫種行成於吳王許之子胥諫不聽賜之屬鏤以死吳人憐之為立祠江上名曰胥山唐元和十年刺史盧元輔修盧元輔胥山祠銘元和十年冬十月朝散大夫使持節杭州諸軍事杭州刺史上柱國盧元輔視事三嵗塵天子書上畏羣靈下慙烝人乃啟宗祠銘而序曰維唐敷祀典於天下廢滛置明資父事君罔有不舉寝廟既設我命厥新有周行人伍公字子胥陪吳之職得死直言國人求忠者之屍禱水星之舍将瞰鴟革遂臨浙江千五百年廟貌不改漢史遷曰胥山今云青山者謬也吁善父為孝記曰父讐不與共戴天諌君為忠經曰諸侯有諍臣不失國當阨於宋鄭絶楚出疆在平為未宦臣在奢為既壯子坎壈仗節乞師於吳軍鼓丁寧五戰至郢鞭墓走昭非逆施也夫差既王宰嚭受賂二十年内越祀又顛泰伯廟血将乾闔閭劍光先失公入則諫焉雖言屢出口而車甲巳困於齊矣蟹稻已奪於嵗矣屬鏤之賜竟及其身鴟夷盛屍投於水濵憤悱鼓怒配濤作神迄今一日再至來也海鴟羣飛陽侯夾從聲遠而近聲近而遠奮於吳怫於越汐於楚乃退於是仲秋闕望杭人以旗鼓迓之笳簫和之百城聚觀大耀威靈捲沙墨裂地灰截若岸坼城坑迎潮氏格之如吕梁丈人為靈戈威矛㶑浪百里渚塞不先跳穡掲舷再飯之間絶其音聲蕩漭千里洪波底平有滑有腯有鹹有腥遥實乎下庭山海梯航雞林扶桑交臂於茆階金狄在户雷鼓在堂魏罇漢豆六代笙簧可謂奉天爵之馨香獲神人之盛禮佐皇震怒驅叱大邪萬里永清人觀斗氣銘曰武王鉞紂子胥鞭平為人為父十死一生矯矯伍員執弓挾矢仗其寳劍以謁吳子稽首楚罪皆中紂理蒸報子妻殱鉏直士赫赫王閭實聴竒謀錫之金鼓以號以誅黄旗大舉右廣皆誅戮墓非赭瞻昭乃烏後王嗣立執書不泣顛越言潤宰嚭纔輯歩光欲飛姑蘇待執吾則切諌抉眼不入投於河上自統波濤晝夜兩至懐沙𩔖騷洗滌南北簸蕩東西夷蠻卉服罔敢不來雖非命祀不譲凟濟帝帝王王代代明明表我忠哉景福二年封廣惠侯宋大中祥符五年海潮大溢衝激州城詔本州每嵗春秋醮祭賜忠清廟額封英烈王九年馬亮知杭州禱祠下明日潮殺又出横沙數里隄岸乃成政和六年加封威顯廟燬於建炎兵火興於紹興二十二年至三十年加封忠壯乾道五年周安撫淙重修嘉定十七年累封為忠武英烈威徳顯聖王紹定四年再燬賜緡錢重建嘉熙三年趙安撫與懽又易而新之杭州府志俗名伍公廟元改封順祐忠孝威徳顯聖王明正統十四年重修萬厯八年重建羅隐胥山廟詩市簫聲咽跡﨑嶇雪恥酬恩此丈夫霸主兩亡時亦異不知魂魄更歸無玉禹偁忠清廟詩朝驅下越坂夕照當吳門停車訪古蹟靄靄林烟昏青山海上來勢若遊龍奔星臨斗牛域氣與東南吞九折排怒濤吐吸天地根落日見海色長風捲浮雲山椒戴遺祠興廢今猶存殘香弔木客倒樹哀清猿我來乆沉抱重此英烈魂吁嗟屬鏤鋒㝠爾國士寃峨峨姑蘇臺棘榛曉露繁深居麋鹿遊此事誰能論因之毛髪𥪡葉落秋紛紛國朝雍正三年勅封英衞公其廟宇動正項錢糧修理每嵗春秋二祭忠節祠嘉靖浙江通志在寳月山下祀吳行人伍員唐僕射褚遂良宋少保岳飛明太傅于謙嵗以八月十五日致祭申將軍廟成化杭州府志在臨平斗門橋北三十歩今廟有殘碑宋季人撰謂為申包胥鄉人於此祈禱多應謹按咸淳志云父老相𫝊將軍謂楚申明父白公亂楚王命明伐之白公殺其父後人為立祠二説未知孰是嘉濟廟錢塘縣志一名江東廟在吳山祀秦贛人石固宋累封王爵賜今廟額初在崇福里繼徙貢水之東雷崗故又名江東明隆慶三年建蕭酇侯祠西湖游覽志在弼教坊奉漢蕭何宋時廟在汴京南渡後建廟於此周絳侯廟咸淳臨安志在臨平鎭晉建武元年侯裔孫卓卜居臨平即其地祠侯宋建炎中金人犯杭居人為柵環廟以守仰視旌旗蔽空書曰漢絳侯周勃皆羅拜而去自是靈異著聞有禱必應顯忠廟西湖游覽志在長生老人橋西奉漢大將軍霍光俗稱霍使君廟葉森顯忠廟記杭之清湖開元宫西有廟曰顯忠土人稱霍使君祠漢大将軍博陸侯也按舊志云吳孫皓時神降于庭自言漢霍光求立祠於金山之鹹場以捍水患宋紹興初建行廟於錢塘之長生橋嘉泰紹定間兩有反風滅火之應紀事傳信廟碑具存元統初夏六月火焦土者萬有餘區民窘急望廟以呼飈風遽轉於是杭之士民聚金葺廟以荅明貺蕭王廟在斯如坊三啚候潮門内祀漢太傅蕭望之國朝雍正七年總督臣李衞捐修題曰萬姓瞻仰蒋祝闗内侯蕭太傅贊乾坤正氣萃於蘭陵沉浸經義禮服一燈霍氏專政不阿守正遇主累遷極諫靡隐出為守相化洽平原功高馮翊子恵元元輸粟贖辜瓌法不小大言炎炎氣京兆和親非計懾服烏孫北藩客禮柔遠彌殷顧命欽承忠貞千古扶進羣英以遏奄豎賢傅孤立衆口鑠金𢎞恭石顯虺蜴為心貝錦中傷金吾迫促和藥自裁義不受辱鞠躬盡瘁殁為明神禦灾捍患廟貌維新遺像式瞻景行仰止敢申贊辭神其鑒此兩浙名賢祠萬厯杭州府志在西湖孤山之陽祀漢嚴光唐陸䞇宋林逋趙抃王十朋呂祖謙張九成楊簡明宋濂王琦章懋陳選皆浙産也隆慶六年巡按御史謝廷傑即陸宣公舊祠改祀而徙宣公像於祠前之恩綸閣陳洪濛兩浙名賢祠記自昔兩浙名賢以徳以功與春秋祀載在常典者亦畧備矣然皆各崇於鄉未有包抉衆美撮其英標羣然爼豆於一堂者也隆慶壬申侍御豫章虬峯謝公來按兹壌乃詳覈省志尚論先哲於漢得一人焉曰嚴子陵於唐得一人焉曰陸敬輿於宋得六人焉曰林君復曰趙閲道曰王龜齡曰呂伯恭曰張子韶曰楊敬仲於我明得四人焉曰宋景濂曰王文璡曰章徳懋曰陳仕賢即西湖之陽宣公舊祠增立几筵等其世次位之不以爵舉者示崇徳也標其姓氏仍曰先生者示後學知所宗也祠有山田蕩若干有司領之嵗時供祀不以煩民者欲其乆也諸葛明王廟舊浙江通志在官園路神為武侯關帝廟錢塘縣志祀漢關壯繆侯宋崇寧元年進封忠惠公大觀二年加封武安王南渡建炎淳熙間復累加王號明萬厯十八年封三界伏魔大帝杭城廟祀極盛一在孤山名照膽臺向貯玉一文曰漢夀亭侯印一在跨虹橋北岳王墳左萬厯十五年建一對錢塘門月城内萬厯二十六年建清波候潮兩門月城内亦皆有廟一在吳山通元觀一在布政司前一在城北隅一在佑聖觀内一在靈應觀側一在羲和坊相傳為神祖廟宋嘉定間建一在千歩廊一在萬安橋有東西二廟國朝雍正三年四月勅封關帝三代公爵曾祖光昭公祖裕昌公父成忠公其禮儀俱照先師廟每嵗春秋并五月十三日致祭祠以太牢各府州縣俱如制糜相公廟杭州府志在艮山門南神姓糜諱竺事昭烈為安漢将軍崇善廟杭州府志在城北皋亭山鮑黌崇善廟記神姓陳氏諱頊字行嵩㑹稽人也事東晉厯青揚荆廣四州刺史以武功食錢唐海鹽鹽官三邑見於李宗諤之圖經者如此梁大同二年勅封興善王後改封崇善王而失其時代嵗月其見於桑衍之圖經者如此隋僧真觀講於衆安寺夜夢神求受淨戒仍捨廟屋五間為佛殿見於髙僧傳者又如此爾後遂寝血食專供伊蒲塞饌見於白居易之祝詞者又如此碑版載神之事為多而怪誕不經適足以誣神今特摭其可書者以傳信於天下後世云葛仙翁祠舊浙江通志在葛嶺相傳晉葛洪煉丹之處顯祐廟萬厯杭州府志在舊百萬倉西祀隋司徒陳果仁果仁晉陵人沈法興忌其威名召食毒死之忠憤赫奕竟以神矢斃法興唐武徳初嘉其功封忠烈公後梁封福順武徳王後周加帝號咸淳臨安志嘉泰六年臨安以禱雨應乞加封賜行廟額曰顯祐潛説友顯祐行廟祝文惟王𤼵迹於陽羡而聲靈被於隣封立廟於隋唐而祀典迨於我宋説友比以初交奉朝㫖謁行祠申䖍禱籖繇響荅預告太平無言不酧厥靈益顯説友亦既刋石以昭不朽近常之士民介郡守言王功適印於心乃述顛末亟聞於上於是易帝號以正李代之謬仍王爵以表火神之忠誥綸來下恩光炳如謹已遣吏緘詞馳送廟下惟行祠在邇一併薦聞王其益庇郡民祇荅上賜則民事王亦永永無斁汪王廟杭州府志在吳山大觀臺之麓王諱華唐髙祖時以保障有功封越國稱王使持節歙宣杭睦婺饒六州諸軍事明洪武間封廣濟惠王白馬廟成化杭州府志在鳯山門裹州橋之北宋建炎間建祀磁州都土地崔府君世傳渡康王者即此謹按神姓崔名珏字子玉唐貞觀間徴為滏陽令昭忠祠萬厯杭州府志在仁和縣忠清里祀唐右僕射褚遂良里為遂良故居舊有祠鄉人嵗祀之成化十三年郡人周璟請於朝詔有司新其廟宇入祀典朱鏞為記又遂良九世孫名載者行學表於鄉殁後屢著顯靈立廟曰通聖國朝雍正八年總督臣李衞重修昭忠祠東平忠靖王廟嘉靖浙江通志在南壁秀羲坊祀唐揚州大都督張巡巡故有廟在汴宋南渡初凡汴之有廟者皆得徙祀於杭因祀巡於此王鈍忠靖王廟記明洪武三十年里人吳興捐資重新千勝將軍廟仁和縣志在新橋神為張亞夫何敬千勝廟記新橋樓千勝将軍唐御史中丞張巡子亞夫也神父守睢陽力屈而死詔贈揚州大都督妻贈申國夫人是時神尚幼拜金吾大将軍神将家子故人以千勝稱云宋都汴有廟祀巡神實附之南渡後将遷神為別祀以新安橋當闤闠之衝據高爽之地專祀以安神像咸淳十年褒封神亭侯加福徳二字昭靈貺也陸宣公祠杭州府志在孤山之陽祀唐忠宣公陸䞇西湖游覽志祠乃中書舍人洪澄別墅後屬陸炳炳自謂系出宣公創祠祀之規制宏敞吞吐湖山臺榭之盛為一時冠國朝雍正九年裔孫陸琨等重修總督臣李衞建坊題曰湖山增勝又書額於祠曰以道事君復為撰記嘉澤廟成化杭州府志俗呼西井寺在湧金門北城下祀唐鄴侯李泌宋嘉定中賜廟額嘉澤萬厯杭州府志又祠在西壁坊名李鄴侯祠四賢祠萬厯杭州府志在孤山之陽祀唐李泌白居易宋林逋蘇軾萬厯杭州府志初杭人祀白公於竹閣後增林蘇二公因名三賢堂紹興後廢府尹周淙徙寄水仙王廟廡後尹袁韶徙建廢花塢元廉訪使徐琰祀於西湖書院明天順間知府胡濬復建今處正徳元年知府楊孟瑛増祀李鄴侯再易今祠祀以春秋楊孟瑛四賢祠記孟瑛守杭郡三年於今還往孤山見三賢祠棟撓梁壊懼神之不棲而羞吏之不恭也東竊惟逋仙風節山崇湖深名教攸繫白文公蘇坡皆杭賢守石函一封時泄時鍾葑洲既闢千頃一碧兩邑之田殘溝㫁洫莫非遺澤民到於今頼之又唐鄴侯李公泌亦嘗刺是州穿六井引湖波民始不食鹽苦雖功不在湖而以湖為功與白公蘇公埓曷作新廟而合祀之更稱四賢祠仰惟三公治杭事有美蹟人有遺愛率應祭法六井一湖才一事耳然杭人祀文公必於孤山祀鄴侯必於湧金北城祀東坡必於湖堤鎖瀾之橋豈政以時易易則不傳愛與澤流流故終不可諼也今孤山之祀與北城湖橋既廢故因文公之舊而合祀於是至於推祀逋仙則宋泰定間即有之葢義起也潮王廟仁和縣志在芳林鄉神為唐石瑰僧本誠潮王廟記按晏殊輿地志古有石姥祠舊碣載石姓瑰名生於唐長慶三年錢塘古稱濤江民苦潮害王奮力築堤以捍水勢祁寒劇暑不輟功未就竟死於潮後為神咸通中官為立廟封潮王宋宣和間睦宼犯順時朝廷以韓世忠禦敵陰雲四合聞空中叱咤聲仰見旗幟書石姥潮王之號軍士奮勇大破㓂兵嘉熙間潮水復作潰堤衝岸漂蕩民居人力不能禦京尹趙公與􅊸躬禱祠下潮復故道有司上其事加封忠惠顯徳王皇慶二年主僧宗禮率其徒即寺剏毘盧閣廟之廣惠廟萬厯杭州府志在錢塘門外霍山宋乾道中建祀唐僕射張渤趙師白廣恵廟記霍山廟者廣徳張王之别祠也王以休功顯徳敷祐生民厯代㒺不優禮褒崇暨我朝慶厯追錫之命増加王號極其榮美粤自開迹祠山肇興廟食有禱於王㨗於響荅光靈之迹旁加横被於是離宫行廟金碧丹雘連城跨郡岧嶤相望焉仰惟帝城四方之極百神受職是翼是衞矧王之神游所止密拱京甸衆大之區并䝉祉福顧獨未有掲䖍妥靈之地不其闕歟乾道庚寅始卜地於霍山裒金鳩工營建棟宇規模位置焕然鼎新廟成於紹興甲寅正月二日為費錢十萬而判院張宗况施助獨多焉錢王祠嘉靖浙江通志在湧金門外祀吳越錢武肅王鏐宋時名表忠觀在妙因山嵗乆湮廢咸淳臨安志表忠觀在錢湖門外方家峪寶蔵寺左錢氏五王皆祠焉蘇軾表忠觀碑熙寧十年十月戊子資政殿大學士右諫議大夫知杭州軍州事臣抃言故吳越國王錢氏墳廟及其祖父妃夫人子孫之墳在錢塘者二十有六在臨安者十有一皆蕪廢不治父老過之有流涕者謹按故武肅王鏐始以鄉兵破走黃巢名聞江淮復以八都兵討劉漢宏并越州以奉董昌而自居於杭及昌以越叛則誅昌而并越盡有浙東西之地𫝊其子文穆王元瓘至其孫忠獻王仁佐遂破李景兵取福州而仁佐之弟忠懿王俶又大出兵攻景以迎周世宗之師其後卒以其國入覲三世四王與五代相終始天下大亂豪傑蜂起方是時以數州之地盗名字者不可勝數既覆其族延及於無辜之民罔有孑遺而吳越地方千里帶甲十萬鑄山煮海象犀珠玊之富甲於天下然終不失臣節貢獻相望於道是以其民至於老死不識兵革四時嬉遊歌舞之聲相聞至於今不廢其有徳於斯民甚厚皇宋受命四方僭亂以次削平西蜀江南負其險逺兵至城下力屈勢窮然後束手而河東劉氏百戰守死以抗王師積骸為城灑血為池竭天下之力僅乃克之獨吳越不待告命封府庫籍郡縣請吏於朝視去其國如去傳舍其有功於朝廷甚大昔竇融以河西歸漢光武詔右扶風修理其父祖墳塋祠以太牢今錢氏功徳殆過於融而未及百年墳廟不治行道傷嗟甚非所以勸奨忠臣慰荅民心之義也臣願以龍山廢佛祠曰妙因院者為觀使錢氏之孫為道士曰自然者居之凡墳廟之在錢塘者以付自然其在臨安者以付其縣之浄土寺僧道㣲各度其徒一人使世掌之籍其地之所入以時修其祠宇封植其草木有不治者縣令丞察之甚者易其人庶幾永終不墜以稱朝廷優恤錢氏之意臣抃昧死以聞制曰可其妙因院改賜名曰表忠觀銘曰天目之山苕水出焉龍飛鳯舞萃於臨安篤生異人絕𩔖離羣奮梃大呼從者如雲仰天視江月星晦曚强弩射潮江海為東殺宏誅昌奄有吳越金劵玉冊虎符龍節大城其居包絡山川左江右湖控引島蠻嵗時歸休以燕父老曅如神人玊帶裘馬四十一年寅畏小心厥篚相望大貝南金五朝昏亂罔堪托國三王相承以待有徳既獲所歸弗謀弗咨先王之志我維行之天祚忠孝世有爵邑允文允武子孫千億帝謂守臣治其祠墳毋俾樵牧愧其後昆龍山之陽巋焉新宫匪私於錢維以勸忠非忠無君非孝無親凡百有位視此刻文萬厯杭州府志嘉靖三十九年以靈芝寺改建陳柯改建錢王祠碑記予少讀蘇子瞻表忠碑記慨然念錢王於吳越之民其徳厚矣予繆守兹土督撫梅林胡公等改祠於靈芝寺寺葢王故苑也幸襄厥成予又病東坡手碑殘剝也為易石摹刻之以置諸新祠使謁王祠者讀兹文以思王徳庶幾斯祠斯文相與傳千百世於無窮也國朝康熙四十四年聖祖仁皇帝南巡御書保障江山四字額敬摹勒石祠内雍正三年勅封誠應武肅王五年總督臣李衞重建委經厯張彦珩監修李衛重修錢王祠碑記士君子茍有介節孤芳振㧞流俗即可以叨祠祀况生平功業實能仰荅一人俯䕶萬姓則春秋殷薦雖千百載猶當世享之浙有武肅王封自梁唐相沿奕葉其功與徳在史冊乗志既詳哉言之矣厥後褒嘉忠悃爰建祠於東陽又建表忠觀於西湖之濵凡武林士民且祈且報累累勿絶亦足以見惠澤所被果深且遠也雍正丁未嵗我皇上嘉其靈爽觀傾圮殊不足以肅瞻仰因令剋期修勅封誠應而舊建以底厥成夫事之廢興成毁相尋無窮宋以妙因院佛寺改奉為觀而興在熙寧者旋又廢諸明代嘉靖中再卜地於錢王故苑而是觀復立遂塑王像并子文穆孫忠獻忠遜忠懿諸王俱祔之迨嘉靖迄今又數百年而故址頽垣幾於再廢矣自有此建庶幾望其門其靈斯在謁其像其神乃依是又足以廓宋元明之宇而舊典聿新也是役也始於丁未十一月迄戊申八月竣事觀傍西湖由御碑湖而上則有階厯階而進則有坊有亭以奉像樓有橋以駕碧沼有門二重有殿有樓殿供王供王得姓之祖商賢大夫循舊制也前後有墻東西有廊其間魚鱗鳯集藻井綺疏無不照灼而選材堅固則又足以為乆遠之計從此宰兹土者加意保䕶俾爾軍民勿輕褻越則是祠廟貌其與錢王之徳而俱永歟錢文穆王祠呉越備史天福七年十二月以龍山武功堂為文穆王廟履泰將軍廟杭州府志在西湖金沙港祀吳越時孫顯忠武林舊事將軍錢塘人仕吳越嘉熙中趙與懽尹京禱雨有驗奏聞封天澤侯額曰勅賜孚應之廟喻均重建天澤廟記履泰将軍廟𨽻錢塘之金沙港去郭十五里許地故僻不屬通衢而廟隘僅數椽頽垣敗瓦隐約桑柘間罔有過而禮者萬厯癸未夏太守張公振之始撤而新之前為廟門中為殿後為寝殿之左為井井之前為臺寝之後為池窅然幽以深将軍故以天澤侯封池所以象澤從陰氣也金華將軍廟萬厯杭州府志在湧金門内十國春秋曹杲真定人文穆王時官婺州刺史忠懿王朝宋杲鎭撫國中即城隅浚三池引湖水入城以通舟楫王歸嘉其功賜池名曰湧金立石池上卒後見神於豐豫門有反風㓕火之異土人立祠肖像迄今嵗祀不絶昭節廟萬厯杭州府志在保安坊後周時有喬亢陸軌者仕為殿侍東第三班宋太祖受禪二人守宣祐門拒弗納既乃自他門入二人死之太祖以為忠聽本班廟祀南渡後立廟吳山寳祐三年賜額景定中凡三封侯爵靈惠廟成化杭州府志在孝女北管下墟神姓謝諱逹字明遠殁而顯靈宋建炎初金人犯境忽聞空中金鼓聲旌旗振耀顯露謝公神號金人遂遁鄉民賴焉隣境屢有虎豹不入其境咸淳庚子元夕鄉人夢神云今嵗當大旱宜先開井濬源夏秋果旱賴井灌田成熟自後旱潦祈禱輒應事聞賜額昭貺廟咸淳臨安志在候潮門内渾水閘東故司封郎官張夏祠四朝聞見録杭州江岸率多薪土潮水衝擊不過三嵗輒壊夏令作石堤一十二里以防江潮既成杭人徳之慶厯中立廟於堤上嘉祐十年又因功贈太常少卿政和二年八月封寧江侯改封安濟公併賜額曰昭貺七修𩔖藁張司封宋太宗朝進士仁宗景祐中出為兩浙運司名夏字伯起正史作兵部郎由前為兵部郎也舊碑作張太常由後嘉祐又有功而贈為太常少卿也宋祀典作工部夏員外訛也俗呼司封以其有功授司封郎中也其稱謂不同如此國朝雍正三年勅封静安公春秋致祭安濟廟錢塘縣志在馬坡街俗名祖廟祀宋安濟公張夏初夏治潮患築石塘自六和墖至東青門人徳之立祠堤上今廟址正宋東青門外元始拓入城内按宋東青門俗呼菜市門今名太平門與清泰門相距里許今馬坡街在清泰門傍則是廟或即舊時堤上所立後入城奉為土榖者也范府君廟仁和縣志在梅東高橋東相沿祀文正公范仲淹顯慶廟錢塘縣志在風篁嶺祀宋郡守胡則當宋仁宗朝再牧杭州有惠政退老西湖卒𦵏於此數見靈異遂立廟祀國朝雍正九年總督臣李衞重修三忠廟成化杭州府志在豐樂橋俗名三聖廟始廟食於鳯翔府和尚原宣和間方臘宼睦討捕者禱於神凱還奏聞始封為侯中興初屢以陰功助順因建廟賜額曰旌忠黄由旌忠觀記旌忠觀者為宋元豐三忠臣作也三神世系以國史詳之高諱永能綏州人景諱思誼晉州人程諱博古河南人元豐五年有事於銀州三君同出戰死事聞朝韙其節賚䘏休洽尋廟祀之初觀之立也實在清泠橋北隆興受禪上欲斥廟垣之地廣養親之宫乃撤浮圖覺苑寺易之嘉泰辛酉春省城不戒於火一夕宫館蕩為浮埃主觀陳元直慨悼成績先斥厥儲初得太師韓王請於朝賜内帑錢五百萬已而循和二王復與巨室之所向慕者益以金帑佐其役始事於是年之夏厯三嵗而克成規模視前益侈周元公祠錢塘縣志在清波門外錢家灣祀宋濓溪先生周惇頤王光藴謁濓溪先生祠詩先哲遺芳躅斯文得嗣音池蓮還在目庭草亦知心四壁流文藻千峯結翠陰渚蘋秋可擷仰止意何深國朝雍正九年總督臣李衞重建二程夫子祠杭州府志在呉山之麓祀先儒二程子協順廟西湖游覽志在石塜其神陸圭昭慶軍人宋宣和中引兵攻方臘敗之殁而為神紹興間海濤衝激江岸神檄陰兵却潮潮勢遂平淳祐間江潮衝激尤甚隨築隨圯神與三女揚旗空中浮石江靣以顯其靈岸賴以成浙西帥臣徐㮚以聞於朝賜廟額曰協順封神為廣陵侯三女為顯濟通濟永濟夫人傍有小廟祀十二潮神各主一時朱彞尊謁廣陵侯廟詩并序錢塘江干有廣陵侯廟乙未三月展謁祠下按枚乗七𤼵觀濤於廣陵之曲江世疑廣陵國為今揚州府治然元季錢思復試羅刹江賦證曲江即浙江楊廉夫韙之時號曲江處士而曽子固撰越郡趙公救災記中有廣陵斗門合之伍子之山胥母之場疑義可析因賦絶句紀之昔聞江月松風客賦證錢塘是曲江不見郊關廣陵廟靈風長拂舊旛幢惠應廟錢塘縣志在吳山至徳觀右祀宋東京皮場鎭土神張森神素事神農凡疹疾瘡痬有禱輒應宋政和間賜廟額封王爵南渡初移像至杭立廟咸淳間加號明靈昭惠慈祐王撒沙䕶國夫人廟仁和縣志在臯亭山胡世寧䕶國夫人廟記神世居仁和裔出倪氏時值金兵充斥神尚屬閨女避亂郊野飢寒迫切狼狽而殞里人憐其捐軀守志瘞於臯亭之半山金人長驅南逐顯靈助陣狂風大作向北揚沙金人目盡瞀宋兵鼓勇前擊俘斬無算高宗即位首崇祀典勅封撤沙䕶國顯應半山娘娘立廟塑像忠烈廟成化杭州府志在西湖北山棲霞嶺王姓岳名飛初諡武穆寳慶二年改諡忠武元至正中加諡保義明洪武四年稱宋少保鄂國武穆王萬厯杭州府志景泰間請於朝賜春秋祀及忠烈額宋史岳飛傳紹興七年秦檜主和飛言金人不可信和好不可恃相臣謀國不臧檜銜之十年金人攻鞏亳命飛馳援飛輕騎駐郾城烏珠兵逼飛奮擊大破之進軍朱仙鎮自燕以南金號令不行飛喜謂其部下曰直抵黃龍府與諸君痛飲耳方指日渡河而檜欲割淮以北棄之乃先召張俊楊沂中歸而後言飛孤軍不可乆留乞令班師一日奉十二金字牌飛憤惋泣下東向再拜曰十年之力廢於一旦既歸十一年和議既决授樞密副使詔同張俊措置韓世忠軍俊欲與飛分其背嵬軍飛義不肯會檜捕世忠軍吏景著以誣世忠飛馳書告以檜意俊密以告檜檜大怒風万俟卨劾飛罷樞柄又諭張俊刼王貴誘王俊誣告張憲謀還飛兵柄捕飛父子飛笑曰皇天后土可表此心令何鑄鞠之閲實無左驗改命万俟卨卨誣飛與憲書令虗聲探報以動朝廷雲與憲書令措置使還飛軍言其書已焚飛坐繫兩月嵗暮獄不成檜手書小紙付獄即報飛死雲棄市籍家資徙家嶺南孝宗復飛官以禮改𦵏求其後悉官之建廟於鄂號忠烈名勝志廟貌恢特葢斥智果院為之兩廡刻其所製滿江紅詞併送張紫巖北伐詩西偏有流芳亭石刻王像存焉鄭元祐重建精忠廟記故宋贈太師忠武岳鄂王起卒伍至将相其謀審戰勝規模施設雖古名将不過是而竟斃於權奸之手孝宗嗣位禮葬王父子於西湖之北山舊廢智果觀音院賜額曰褒忠衍福寺錫之田土命僧甲乙流𫝊主之宋亡寺廢不惟王墳墓灑埽廢缺至於廟貌一切委地會隴西李君全初以承事郎來為杭州路總管府經厯過王墓道每贍望徘徊時褒忠寺住持僧可觀等亦合辭累請於君君遂以興復為己任市材鳩工前為廟門翼以兩廡正寝中像王右像王之子左武大夫忠州防禦使左像王之将龍神衞四廂都指揮使閬州觀察使燕寝中像王父母衆王夫人咸在焉王故五子忠州君既以侑食於正寝次任忠訓郎閤門祇候贈武畧郎次任朝請大夫敷文閣待制贈中奉大夫次任朝奉大夫提舉江南東路常平事又其次任修武郎閤門祇候以及王之女號銀瓶娘子并閬州君之夫人與夫王諸孫名位通顯者皆肖像以祀焉王部曲諸将張憲烈文侯徐慶昌文侯董先焕文侯牛臯輔文侯李寳崇文侯王貴尚文侯李君懼廟祀之或缺有田一百餘畆歸之廟為祊田廟既落成杭守土官一再致祭乃為叙述其事胡銓弔岳太尉詩疋馬吳江誰著鞭惟公攘臂獨争先張皇貔虎三千士搘柱乾坤十六年堪恨臨淄功未就不知鐘室事何縁石頭城下聴輿議萬姓顰眉亦可憐林景熙弔岳忠武詩寥落一抔在英雄萬古寃孤忠懸白日遺恨寄中原樹老殘霞淡塵深㫁碣皆東南天半壁往事泣寒猿于謙忠烈廟詩疋馬南來渡浙河汴城宫闕遠差峩中興諸将誰降敵負國奸臣主議和黄葉古祠寒雨積青山荒塜白雲多如何一别朱仙鎮不見将軍奏凱歌國朝順治八年巡撫范承謨重修康熙二十一年兩淮運使羅文瑜重建三十四年杭州知府李鐸重修雍正九年鹽驛副使道江承炌重葺忠烈二侯祠萬厯杭州府志在衆安橋南棗木巷祀宋封繼忠侯岳雲烈文侯張憲雲武穆之子憲武穆部将武穆死於獄二侯就戮此地里人憐其寃立祠祀之忠祐廟嘉靖浙江通志在岳武穆王故宅今按察司治之左宋紹興三十年建王卒時有女尚幼抱銀瓶赴井死附祭於此俗稱銀瓶娘子廟井在廟東北明正徳間按察使梁材築亭覆之榜曰孝娥井楊維楨銀瓶怨樂府岳家父國之楨秦家賊城之傾皇天弗靈嗟我父與兄生不贖父死不如無生千尺井一尺瓶瓶中之水精衞鳴王逄銀瓶娘子祠詩碧梧月落烏號霜寒泉幽凝金井牀綺疏光流大星墜夢驚萬里長城亡女郎報父収囹圄匍匐将身贖無所官家聖明如漢主妾心愧死緹縈女井臨交衢下通海海枮衢遷井不改銀瓶同沉意有在萬嵗千秋露伸彩魂今歸來風颯然思陵無樹容啼鵑阿爺墓木西湖邊張烈文侯廟嘉靖浙江通志在東山衖口墓所祀宋張憲景定二年追封烈文侯唐皋張烈文侯祠記侯蜀之閬州人武穆愛将或曰其壻也以功授閬州觀察使御前軍統制宣撫司副都統賊檜與張俊謀䧟武穆執憲於鎮江榜掠無完膚卒無可証者遂遇害墓與祠俱在棲霞嶺西去武穆不逺百歩許地曰東山衖口正徳丁丑創廟宇樹石坊於通衢榜曰宋張烈文侯祠國朝康熙十年巡撫范承謨重建資福廟錢塘縣志在江干祀宋烈文侯張憲景定二年建於忠壯鄉地方以侯得名翊忠祠杭州府志在忠烈祠神宇之西名勝志以祀劉允升施全者允升建州布衣聞岳飛被建上疏訟其寃秦檜大怒下棘寺論死全殿前司小校也憤檜㓕忠誤國懐刃刺之不中磔於市云靈衞廟嘉靖浙江通志在錢塘門外祀宋錢塘令朱蹕及尉曹将金勝祝威錢塘縣志皆建炎時死完顔宗弼難者鄉人立祠署曰金祝二太尉廟鄭子文金祝二太尉廟記神姓金諱勝祝諱威同為錢塘尉曹總目建炎己酉烏珠闖兵於杭民避宼赭山城無禦備錢塘宰朱蹕鳩鄉丁僅二千赴餘杭邀擊䧟陣而没兩太尉集凋兵還據葛嶺編竹覆泥為塗以禦翼日㪚騎飈至蹄踺而踣仆者鱗叠軍聲大振烏珠辟易數舍退赤山執居民為郷導得由南壁而入兩太尉猶力䕶西隅以寡制衆竟殁王事郷民其馬革駢𦵏陽雲洞之右因立祠於死節之所今錢塘門側是也血食一境已踰百禩四時賽祭居者䝉其祐病者禱而痊無疫癘無嵗災無横虣神所賜也十年賜廟額曰靈衞景定二年安撫洪燾以神號請封金曰忠佐侯祝曰忠佑侯咸淳四年士民請增蹕附廟封顯忠侯元末燬明洪武七年重建宣徳成化再經修葺𢎞治十二年鎮守太監麥秀巡按御史鄧璋錢塘令吳道等重建萬厯初縣令姜召增建後殿顯功廟咸淳臨安志在錢塘門外保叔塔下神姓岳名琚家於霍山為臨安府吏建炎初金人犯境神輸家資募勇士三百人推錢唐尉曹将金祝二人為首領迎敵死戰里人懐其功即四聖延祥觀祠事之號保稷山王嘉定初建廟今處咸淳四年制詞朕惟六飛南渡舉百二山河無一人敵王所愾每念為之憮然爾神克奮孤忠輸財募死士得二将率衆三百卒奪金人南下之盛氣一境賴以安存今經百有餘年二将已都顯號而神獨無以旌其靈可乎哉進賜通侯宜在以勞定國之典廣福廟萬厯杭州府志在鹽橋上祀宋蔣崇仁西湖游覽志崇仁仗義樂施倣常平法以家資糴榖賤糶以救貧者其弟崇義崇信亦承兄志行之六七十年里人立祠祀之咸淳初京尹潛説友請於朝賜廟額曰廣福封崇仁孚順侯崇義孚恵侯崇信孚佑侯靈應廟成化杭州府志在小麥嶺下飲馬橋邊西湖游覽志其神蒋通質直孝親宋紹興十一年七月坐化桐木下時騰曦熾烈七日如生累見靈異境内賴之事聞詔為立廟崇祀忠勇廟咸淳臨安志在九里松神係統制張玘紹興三十二年解海州圍用命戰殁贈容州觀察使建廟海州其後又詔别建廟於臨安府行春橋之側洪忠宣公祠錢塘縣志在葛嶺祀宋太師洪皓建炎初使金不屈覊冷山十五年放歸賜第西湖葛嶺遂建祠焉乆圯國朝雍正九年總督臣李衞重建朱行人祠錢塘縣志在九里松祀宋行人朱弁孫榖通問副使朱公祠記宋祕閣朱公諱弁字子章婺源人副王倫使金留十七年頻死者屢矣送徽廟大行哀辭有曰嘆馬角之未生魂消雪窖攀龍髯而莫逮淚灑冰天高宗讀之感泣時以和議成與洪皓張邵俱歸卒𦵏錢塘九里松仙芝嶺下浮梁陳公大授來督兩浙學表彰忠義卜地普福寺北天醫院左構祠楊和大王廟舊浙江通志在方興神為楊沂中紹興間賜名存中大小二百餘戰屢立竒功有墳在焉杭州府志存中祖宗閔父震皆死難存中既顯請於朝宗閔諡忠介震諡忠毅賜廟曰顯宗曰報忠朱文公祠杭州府志在孤山之陽明嘉靖四十四年建祠錦塢山題額紫陽書院張安茂為記并頌國朝順治丁酉公裔孫以錦塢山峻嵗乆傾圯白於督撫陳應泰巡按王元曦督學谷應泰移建今處張宣公祠杭州府志在清波門外方家峪祀宋張宣公南軒先生栻吳太沖張宣公祠後記先生祠向在尉司下扇里其移方家峪則萬厯甲辰始也太沖婦翁天與先生實先生二十世孫其猶子恐齋沆惕庵淳又重新之聶心湯張宣公祠記南軒先生入侍經幃出臨藩臬忠誠格心巍然公輔之望蜀之緜竹厥有專祠從忠獻公家武林而錢塘之祠則英廟初年禮垣具疏得㫖建祠世廟時昌江曺學憲為之竪碑撰文十九世裔孫應選具牒郡邑移祠清波門外忠節祠嘉靖浙江通志在筆架山方家峪祀宋太學生徐應鑣吕本忠節祠記錢塘忠節祠祀宋太學生贈祕閣修撰諡忠節江山徐公應鑣及其子𤦺崧女元娘者也公墓在方家峪向未有祠之者建祠賜額有司春秋致祭則自明𢎞治乙丑始正徳丙子梁公材聿建祠宇迨今萬厯丙子又六十年錢唐令姜君召亟圖葺治中為堂三間祀忠節兩廡各三間子若女祔追惟元兵壓境三宫北轅公太學生耳無一命之榮無專城之寄乃毅然不辱率其子女俱死井中是誠得死所矣周宣靈王廟仁和縣志在禇家堂廣豐倉側神姓周名雄字仲偉杭之新城淥渚人以屢顯靈進封王爵錢養廉周宣靈王像贊并序王生於宋季鋭志恢復抑鬱以殁其忠誠激烈固宜與日月争光矣碑載幻蛙事尤竒每嵗三月四日𫝊王降生之辰蛙於時倐來倐去光彩特異予所親睹豈望帝之魂千載未冺耶至捍災禦患數著靈應里人香火甚䖍與褚僕射岳武穆相鼎峙余感其事并系以贊髯如㦸兮目如炬矯矯如龍兮桓桓如虎大業未酬兮壯心獨苦寧死為厲兮毋生而為鼠英風漠漠兮香雲楚楚享爼豆於千秋兮永為我生靈恤災而禦侮謹按周宣靈王周姓諱雄字仲偉杭之新城縣大平鄉淥渚人浙省是處立廟其在杭城者錢養廉序稱生於宋季銳志恢復抑欎以殁其在新城者方回廟記止載殁後靈爽不言神生前事徐士晉碑記稱神賈於衢聞母病破浪而行為水所没顯神於衢勅為江神其在衢州者志載肉身歛布加漆現今植立廟中餘與徐記同至錢廣居建徳縣神廟記則云初名雄後改名繆宣少授仙指失足墮水溯波而上香聞數十里因而建廟塑像於衢城之西詳觀諸記或稱孝或稱忠或稱仙顯不相侔又方回記錢廣居記封爵年代亦各不符然現祀為江神其肉身又現在衢府廟中則為孝子無疑自應以徐記及衢志為正至稱忠稱仙或另一神諱雄諱繆宣或傅㑹牽令俱無確據今仍舊志備載各記於各府縣神廟之下以俟博考馬塍廟錢塘縣志在溜水橋祀宋馬雄馬武世𫝊二人東西居共為田園之塍故名屠隆馬塍廟記城北隅有曰馬塍句曲外史稱為㪚花灘處後為刦灰僅存雄武二王祠概而名之曰馬塍廟以䖍土榖香火考二王為馬公雄馬公武有忠謀於宋而七尺同沉里氓婦豎無不稱説二王云金龍四大王廟杭州府志在孝女北管下墟祀宋謝緒陳繼儒金龍四大王𫝊神姓謝諱緒以謝太后戚畹絶意仕進建望雲亭於祖塋金龍山之巔而隐焉甲戌八月大霖雨天目山崩緒泣曰天目主山也而灾若此宋其亡矣徳祐二年正月帝遣楊應奎上傳國璽降表削去位號三月巴延趣帝及太后入覲獨太皇太后謝氏以病留臨安忽元人從宫中舁其牀以岀侍衛七十餘人同赴燕緒大慟題詩二律書畢赴水死時苕水洶湧高丈許狀若龍鬭緒尸逆流而上經旬不仆靣目如生遠近駭以為神祔𦵏於祖塋金龍山之麓元末鄉落皆夢緒為神曰黃河北流明年當有呂梁之戰吾且提甲騎助之丙午春黃河果徙而北二月元庫庫特穆爾遣騎將左丞相李二來寇時傅有徳守徐州将歩騎二千餘泝舟吕梁含舟陸戰戰陳中見金甲神行空橫槊刺副将韓一於馬下此神預夢助戰之驗也其俊往來擁䕶漕河猝呼猝應或舟膠抜之淤泥壅塞之下或舟覆脱之風濤巇險之中輓卒販商南北往來於祠門者惟神是恃合手稱金龍四大王焉國朝順治二年勅封顯佑通濟金龍四大王之神淮安忠武王祠成化杭州府志在前洋街祀元丞相巴延元貞元年建劉敏中淮安忠武王廟碑世祖恢崇丕緒一時心腹爪牙之寄宣勞戮力皆極其選至於出入将帥動協廟謨趠長江掇全宋致有元之盛而成不世之功者曰惟忠武王爾上之居儲闈也韙王功烈俾廟於杭始嗣位勅以公帑十萬緍成之且勒碑焉而以其辭命臣敏中撰述謹按王諱巴延朔方人至元初以宗王命入奏世祖一與語異之輒留置左右弗遣未幾拜光禄大夫中書左丞相七年同知樞密院事十一年再為左丞相建議以宋恃險拘我信使資我叛臣詔王昔曺彬以不殺平江南今以大師畀汝汝為曹彬可也王拜命啟行不至其家是年十二月渡江明年五月被召入見具陳始終規畫七月拜中書右丞相八月還南明年正月宋降拜金紫光禄大夫知樞密院事進開府儀同三司太傅錄軍國重事春秋五十有九以疾薨於京師進封淮安王諡曰忠武晏公廟萬厯杭州府志在武林門北夾城巷内祀元晏戌仔戌仔江西清江鎮人元初輸文錦於上都因而尸解人以為神立祠祀之後顯靈江湖間洪武初封平浪侯二十三年浙江都指揮儲傑以督漕獲庇捐建今祠總管廟在清波門流福溝祀金元七總管之神神為水神廟始建不可考國朝雍正七年里人王森等感其靈異改向重建嚴指揮祠成化杭州府志在最樂坊神姓嚴名徳字君輔當塗采石人洪武元年統軍取台州力戰死追贈驃騎上将軍副大都督府事上䕶軍天水郡公勅有司建祠俾其子孫崇祀焉褒忠祠萬厯杭州府志在錢塘學宫之東改清軍公館為之祀明建文間死事諸臣吕本褒忠祠記侍御蕭君廩按浙檄所司覈實祠祀在寧海則有文學博士方孝孺太常少卿盧原質在瑞安則有戶部侍郎卓敬在奉化則有左拾遺戴徳彞在仙居則有户部侍郎盧逈蕭縣知縣鄭恕在山陰則有都御史陳性善在黃巖則有翰林修撰王叔英在青田則有谷府長史劉璟在桐鄉則有江西副使程本立在義烏則有都給事中龔泰在臨海則有東平州吏目鄭華此十二人者俱所謂忠於所事有死無二者至如翊忠翊義則寧海御史鄭公智僉事林嘉猷斯皆兩浙之産正氣攸鍾侍御疏請建祠㑹城春秋秩祀額曰褒忠若夫王叔英鄭恕之妻死其夫子死其父一門全節世所尤難附祀祠中亦足以樹閫内之風聲矣國朝康熙五十八年舉人潘兆新廩生范玉鉁等因鹺使差滿常假館其中木主㪚失籲請整飭舊祠爼豆勿替忠節祠萬厯杭州府志在按察司署内左偏祀浙江按察使王良𫝊詳名宦劉瑞忠節祠記嵗壬午浙江按察使王公良闔室自焚實太宗纉緒之年葢百二十載矣西蜀劉瑞董學於浙知公死事梗概白於今按察使梁材設主祠公榜曰忠節正徳戊寅秋九月十一日也茶槽廟仁和縣志在㑹城東當錢塘盡界沿江七十里北至臯亭山屢受潮患明永樂間茶商陳旭出槖金築塘不成遂躍身入潮沙隨屍而漲塘乃成勅封茶槽土地興福明王迄今乆無潮患士民戴徳争奉其神有上新中新下新等祠褒忠祠錢塘縣志在瑪瑙寺左祀明監察御史夏誠誠殉土木之難舊有像附揚清祠有司以揚清非公妥神之所裔孫夏時登移像專祠旌功祠萬厯杭州府志在三台山祀明少保兵部尚書贈太傅諡肅愍于謙西湖游覽志𢎞治中賜諡肅愍表祠曰旌功有司春秋致祭萬厯十八年改諡忠肅張鑿旌功祠記正統間國家有土木之變而旋克底定少保兵部尚書于公之功也無何以䜛死天下哀之杭人即公南新街故宅為位奠哭而歲時拜謁焉既而詔復公官遣祀而誄以文曰謙之忠予憐之於是杭人呼南新故宅曰憐忠祠敬帝嗣位贈官賜諡詔曰予旌乃功秩厥祀於是有司始即三台山墓下建旌功祠嵗春秋祀公與武穆皆墓於杭又皆祠焉三台去棲霞南北對峙穹祠顯號煇赫湖山之上皆亦天定云邵實于少保祠詩祠前春霧隐緋袍隔岸松聲應海濤伯紀空勤恢復計子儀還重廓清勞我陳薄奠聊三獻誰作長歌當一號西望岳墳纔數里白雲湖上兩峯高朱彝尊于忠肅祠詩昔在狼山下軍書犯近坰六師輕朔漠萬騎失雷霆土木塵長滿龍蛇嵗不寧豆田沙浩浩黍谷路冥冥濟世須元老長材總四溟從容持國計指顧悉兵形瑕吕安羣議劉琨表外廷嗣王仍厯數高廟有神靈既罷金繪欵無煩白馬刑北轅旋翠輦南内啟朱扄命已甘刀鑊功真溢鼎銘春秋隆代祀爼豆肅維馨一自軺車至難期堠火停遺墟愁戰伐大樹日飄零碧草空祠長黃鸝過客聽霜鐘沉曉月風牖繞明星卞壼誰修墓巫陽數降庭䜟還思雨帝碑欲墮江亭遠水澄湖碧流雲暗壑青千年華表鶴哀怨此重經同仁祠萬厯杭州府志在武林坊祀巡撫江西都御史諡忠烈餘姚孫燧兵部尚書諡端敏前江西按察副使仁和胡世寧新建伯巡撫江西都御史諡文成餘姚王守仁唐龍同仁祠記同仁祠御史周汝員所建也三公皆我浙産後先奮忠協平宸濠之亂以死勤事捍大患法皆得祀功在江西而浙輔車之地竊被其休故祀之况鄉先生没而祭於社抑亦禮乎經始於嘉靖丁酉十一月戊戌三月乃考成焉位以齒叙從鄉也食以功合以義起也嵗一祭祭每以六月十四日濠以是日舉兵孫公死之故以是日也合食一堂連輝千祀瞻仰爼豆能不肅肅於𠂻乎勲賢祠杭州府志舊名天真精舍在天龍寺之左祀明王守仁以徐愛冀元亨薛侃鄒守益歐陽徳王艮王臣劉魁錢徳洪王畿蕭廩陳善配享蕭廩勲賢祠記萬厯七年天真精舍燬陽明先生祠産没入官後五年䝉恩復祠産先是撫臣廪按臣鳴謙上言浙省故臣若基若謙若懋或以功祠或以徳祠亦或有以賜額祠者守仁之功視基視謙無愧其學視懋且有光宜有特祠以垂永乆於是賜額勲賢湛若水天真精舍詩迢迢訪天真厯厯登斯堂灑落南高峯睥睨臨錢塘地位高且深如道不可量哲人乆已逝山水空遺光龜疇列方位顯設大文章平生未一試千載悵相望我來生感慨乆要不可忘陳詞之不足繼以奠心香發祥祠萬厯杭州府志在南屏山西麓祀昌化伯邵林以誕生孝惠太皇太后也嘉靖十八年建祠墓下賜今額褒忠祠萬厯杭州府志一在棲霞嶺西祀明杭州前衞指揮陳善道吳懋宣冠帶總旗張儒海寧衞指揮滿朝采煉馬呈圖千户王繼隆百户康綬楊臣王相姚岑吕鳯姜楫海門衞立功指揮俞亨昌國衞百户陳爵陳表三江巡檢張杲鐵場巡檢喬仲厚平湖縣典史􅔬登皆以倭變陣亡海寧衞赭山長沙灣等處嘉靖三十二年巡按御史趙炳然請於朝祠祀一在棲霞嶺東改鳯林寺為之祀明遊擊将軍宗禮都指揮邵昇指揮僉事姚泓贈指揮僉事干岳皆以倭變陣亡柘林三里橋等處嘉靖三十七年總督都御史胡宗憲請於朝建祠春秋致祭揚清祠萬厯杭州府志在忠清里祀四川按察僉事王琦刑部郎中項麒陳一貫揚清祠記王諱𤦺由鄉進士為按察僉事致仕貧甚寒餓卒項諱麒亦鄉進士改南京刑部郎中乞歸饘糜僅餬口闔户歌吟充然有得初唐忠臣禇太傅遂良杭人也二公實繼産太傅里因表其里曰忠清并祀二公於太傅之旁嘉靖二十年予從弟仕賢為杭守别建一祠然制頗隘陋不稱予適繼守府得近坊凝真庵迎神祀於中改題曰揚清用别褚太傅也報功祠萬厯杭州府志在忠慶巷内祀巡撫浙直江福少保兵部尚書胡宗憲阮公祠杭州府志在武林門外祀明都御史阮鶚扁額忠定隆慶六年建國朝雍正八年總督臣李衞重葺李衞重修阮公忠定祠記余自丙午奉命撫浙於地方利弊既已次第興剔因取境内志乗所載列於祀典諸祠宇按籍而稽檄行所司春秋時饗各增其額而忠定阮公之裔首以修復先祠為請按公當前明嘉靖間以名進士視學浙江所㧞多寒畯時倭宼肆燄大掠嘉禾屬邑之民率其孥以趨杭而賊方窺城城門晝閉環㻡而號者以數萬計公提勁旅禦之於北墅啟外闉以入民賊憚公威聲尋亦逡巡避去是公之大有造於杭也逾時賊復至勢張甚瀕海諸邑咸被蹂躪而總制某欲得賊魁使賊并力敵公困於桐鄉者匝月當是時公幾不免然某以賊勢既分從容設方畧以誘賊戮其魁桐鄉之圍亦解是殱賊者某之功而使賊之得以就殱者公之力也海氛既靖塗巷室廬依然無恙杭人徳公不忘於武林門外築室祀公興化李文定公既為之記迄今百數十年風雨漂摇堂寝頺廢行道之人幾弗知有公也者夫以公之功徳如此修舉廢墜固有司事也表彰前􅍇風勵名節亦封疆之責也爰飭錢塘令鳩工庀材凡棟之撓者瓦之解者垣級之傾圮者以及丹雘采堊之漫漶不新者咸為治之經始於己酉之季春落成於是年九月之杪其裔復請余文以記之余惟公生平文章經濟徳業事功昭昭史册有厯百世而逾新者固不係乎祠之有無也然聞之傳曰有舉莫廢今公之子孫式㣲無能光啟遺蹟使遂聴其湮没将不數年而一椽尺土鮮有存者前哲靈爽式憑之區一旦委諸荒烟蔓草間揆之昔人聖天輟徳酬庸之心毋乃或戾乎方今哲未入廟食與子褒忠録節闡幽表微凡殊世賢旌揚近代孝子順孫義夫節婦皆得與於肸蠁無所又之盛典如公大節昭著而爼豆不修大化何以仰副風勵之㫖耶後之有事兹土者尚其嗣而無愧於而葺之龎公祠萬厯錢塘縣志在鳯林寺右祀明御史龎尚鵬張瀚龎公祠記南海龎公才具英逹按部時進三老具言困苦公檄所屬均歛於民豪家無得脱免而民不重困號曰均平册仍疏於朝請著為令葢公所建即宋人僱役遺意而抑橫徵寛民力其徳於浙人甚鉅今去浙三十餘年歌思彌切專祠於西湖之陽誰曰不宜甘公祠杭州府志在芝松里虎林書院之陽祀明浙江巡撫甘仕炌以陳善配萬厯三十七年建姚公祠舊浙江通志在城隍廟儀門東祀明郡守姚之蘭舊名徳馨祠城隍廟志其西為金公祠祀明郡人福建巡撫金學曾邵𢎞毅祠錢塘縣志初在玉泉山後徙靈鷲山祀明員外郎邵經邦萬厯初建經邦仁和縣人以言事廷杖謫戍著有宏道宏簡闕事白里人公請從祀鄉賢立坊於城内曰麟翔鳯彩其後人皆能世其家業有聞於時公仲子穆生復以靈鷲山别業改建專祠奉木主於内春秋祭焉李文襄公祠在西湖葛嶺之陂祀國朝文華殿大學士吏部尚書前浙江總督李之芳雍正八年總督臣李衞以廢祠改建范公祠杭州府志在孤山之麓即四賢堂舊址祀國朝浙江巡撫都御史范承謨𫝊詳名宦以其友嵇永仁王龍光沈上章林能任四人從祀皆從死耿逆之難者嵗給錢塘學租銀八兩以備祭祀李之粹范公祠記孤山之麓自林處士妻梅子鶴後至今數百餘載月冷梅荒憑弔遺踪者每有撫今追昔之感忠貞范公以中丞撫浙時即其故址構亭補梅聿復舊觀慕先賢之芳躅續乆廢之勝遊繼奉簡命總督七閩乃値逆藩猖亂肆虐忠貞全家殉難浙人慕徳興悲乃立祠於放鶴亭側葢亦羊公之墮淚碑矣王公祠錢塘縣志在藕花居即湖山書院祀國朝巡撫都御史王國安敬一祠錢塘縣志在孤山四賢祠側祀國朝巡撫都御史趙士麟吞金祠錢塘縣志在葛嶺即吳錫妻戴烈婦墓所建諾公祠錢塘縣志在鳯林寺左祀國朝鎭浙将軍諾羅布内有君子泉敦詩説禮堂忠義節孝祠國朝雍正元年九月初五日欽奉恩詔内開一旌表節義給銀建坊民間往往視為具文未曾建立恐日乆仍至湮没不能使民間有所觀感着於地方公所設立祠宇将前後忠孝節義之人俱標姓氏於其中已故者則設牌靣於祠中祭祀用以闡幽光而垂永乆着該部議奏欽此隨經部議欽遵各府州縣俱建立忠孝節義祠男祠設石碑一座女祠設石牌坊一座鐫列姓名用垂永乆錢塘仁和二縣忠義祠在本縣學宫内節孝祠俱在吳山下知縣楊夢琰胡作柄奉文建賢良祠在杭州府學内仁和學西首國朝雍正十年二月初五日奉上諭我朝從前文武大臣持躬正直奉職公忠樹績建勲全名全節者朕已降㫖於京師建立賢良祠永遠展祀以彰令善因思外任大臣鎮撫封疆宣猷布化忠勇効命威愛宜民其政績卓然可紀者身故之後若於本地建立賢良祠俾得永膺祀典既足慰兵民懿好之公亦足為後來居官者之勸如近日之将軍蔡良提督張起雲總兵蘇大有魏翥國皆素有賢聲勤勞王事而殁於官者允宜在賢良祠之列着直省各於省會之地建立祠宇其與祀之人若追溯從前恐稽查未確致滋濫膺亦未可定不若即從近年為始向後若有應請入祠者該地方官督撫於一人各具一本請㫖不必彚奏其一切事宜着九卿妥議具奏特諭欽此九卿議覆應令該督撫於各省城建立祠宇将蔡良張起雲蘇大有魏翥國四員先行製牌入祠永膺祀典以作楷模其近年各省督撫将軍提鎭等大臣有政績卓然可紀及此後外任文武諸大臣著有賢名於身後應請入祠者詳查事實博採公評一人各具一本據實繕奏恭請欽定一體入祠致祭其祠宇正㕔三間廳内正中製造神龕一座遇有應行入祠之大臣製造牌位安設㕔前東立石碑一座西設燎爐一座二門樓一間大門三間大門内東西値房各一間大門外柵欄一道照牆一座工料等費俱於公項内動支工完造冊報部查核每年春秋二祭照各省名宦祠之例令該地方官備辦入於祭祀銀兩内開銷所建祠宇應請欽題賢良祠扁額恭摹刋刻懸掛以光大典以垂萬年奉㫖依議欽此欽遵檄行仁和錢塘二縣擇地建興動支工料銀五百九十九兩於仁和縣學之西如式建造雍正十三年總督銜管浙江巡撫事臣程元章以前任浙江總督陞文華殿大學士兵部尚書諡文襄李之芳又前任浙江巡撫陞户部尚書謚恭毅趙申喬各具一疏題請入祠致祭經部議以應如所題覆奏奉㫖依議浙江通志卷二百十七
