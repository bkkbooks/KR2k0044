body:
  text: 浙江通志卷八十二漕運下行糧月糧浙江本色行糧米貳萬陸千壹拾石捌斗捌升叄勺貳抄捌撮柒圭陸粟叄粒壹黍陸粞貳糠叄粃本色月糧米貳萬叄千陸百貳拾壹石壹升貳抄肆撮壹圭柒粒四黍九粞壹糠肆粃遇閏加徴米貳千叄拾叄石壹斗叄升陸合柒勺柒抄玖撮捌圭九粟貳粒伍黍捌糠陸粃經費食米柒千玖百叄拾捌石以上共徴本色行月糧米肆萬玖千陸百叄拾壹石捌斗玖升叄勺伍抄貳撮捌圭柒粟陸黍伍粞叄糠柒粃遇閏加徴米貳千叄拾叄石壹斗叄升陸合柒勺柒抄玖撮捌圭玖粟貳粒伍黍捌糠陸粃經費食米柒千玖百叄拾捌石杭州府錢塘縣本色行糧米陸百壹拾壹石陸斗陸合本色月糧米貳千貳百貳拾伍石壹斗捌升貳合肆勺伍抄玖撮肆圭柒粟陸粒玖黍遇閏加徴米貳百玖拾叄石陸斗肆升玖合伍勺捌抄肆撮叄粟捌粒壹黍仁和縣本色行糧米壹千肆百肆石玖升叄合本色月糧米伍千叄百貳拾叄石叄斗捌升柒合玖勺壹抄貳撮貳圭捌粟玖粒柒黍遇閏加徴米肆百壹石壹斗貳升陸合肆勺玖抄柒撮肆圭陸粟叄粒叄黍海寕縣本色行糧米壹千肆百捌拾肆石柒斗柒升貳合本色月糧米叄千捌拾伍石捌斗叄升伍合叄抄玖撮柒圭叄粟壹粒叄黍遇閏加徴米壹百捌拾玖石叄斗陸升陸撮貳圭壹粟捌粒柒黍富陽縣本色行糧米壹百肆拾玖石陸斗肆升捌合貳勺貳抄肆撮肆圭肆粒遇閏加徴米貳百叄拾肆石玖斗貳升叄合壹勺陸抄陸撮捌粟肆粒叄黍餘杭縣本色行糧米叄百肆拾柒石壹升壹合本色月糧米肆百玖拾陸石捌斗叄升叄合壹勺捌抄玖撮陸圭叄粟柒粒壹黍肆粞陸糠柒粃遇閏加徴米柒拾伍石叄斗捌升叄勺壹抄肆撮柒圭肆粟陸粒壹黍臨安縣本色行糧米壹百叄拾捌石捌斗肆合本色月糧米貳千叄百伍拾玖石肆斗捌升捌合壹勺玖抄柒撮陸圭伍粟貳粒伍黍貳粞遇閏加徴米壹百柒拾柒石玖升捌合柒勺貳抄貳撮玖圭玖粒貳黍捌糠陸粃於潛縣本色行糧米陸拾玖石肆斗貳合本色月糧米玖百陸拾玖石叄斗叄升壹合肆勺貳抄捌撮伍圭貳粟肆粒捌黍遇閏加徴米柒拾壹石肆斗壹升捌合叄勺捌撮肆圭柒粟伍粒貳黍新城縣本色行糧米陸拾玖石陸斗伍升柒合叄勺貳抄捌撮柒圭陸粟叄粒壹黍陸粞貳糠叄粃本色月糧米壹千肆百肆拾玖石陸斗柒升叄合玖勺陸抄肆撮叄圭壹粒陸黍遇閏加徴米壹百伍石陸斗伍升柒合捌勺叄抄肆撮叄圭肆黍昌化縣本色行糧米肆拾柒石柒斗壹升肆合本色月糧米陸百肆拾伍石陸合陸抄壹粟玖粒貳黍貳粞肆糠柒粃遇閏加徴米肆拾壹石捌升貳合伍勺玖撮貳圭貳粟柒粒伍黍通計杭州府屬本色行糧米肆千叄百貳拾貳石柒斗柒合叄勺貳抄捌撮柒圭陸粟叄粒壹黍陸粞貳糠叄粃本色月糧米壹萬捌千貳百玖拾叄石捌斗叄升陸合柒勺柒抄陸撮叄粟柒粒壹黍玖粞壹糠肆粃遇閏加徴米壹千伍百捌拾玖石陸斗玖升陸合捌勺肆抄叄撮肆圭陸粟貳粒捌黍捌糠陸粃嘉興府嘉興縣本色行糧米貳千伍百肆拾石壹斗陸升伍合本色月糧米貳千壹百貳拾石伍斗貳升伍合貳勺貳抄伍撮遇閏加徴米壹百柒拾陸石伍斗壹升肆合伍勺陸抄捌撮捌圭經費食米壹千捌石秀水縣本色行糧米貳千贰百壹拾陸石肆斗經費食米捌百捌拾貳石嘉善縣本色行糧米貳千肆百柒拾貳石柒斗壹升貳合本色月糧米捌百柒拾玖石貳斗肆升貳合壹勺陸抄陸撮貳圭貳粟柒粒壹黍遇閏加徴米柒拾叄石壹斗捌升捌合玖勺陸抄柒撮伍圭柒粟貳粒玖黍經費食米捌百捌拾貳石海鹽縣本色行糧米壹千肆百伍石叄斗玖升叄合經費食米陸百叄拾石石門縣本色行糧米壹千叄百肆拾肆石陸斗陸升柒合經費食米伍百肆石平湖縣本色行糧米壹千肆百陸拾叄石叄斗肆升肆合經費食米伍百肆石桐鄉縣本色行糧米壹千壹百叄拾陸石肆斗陸升經費食米叄百柒拾捌石通計嘉興府屬本色行糧米壹萬貳千伍百柒拾玖石壹斗肆升壹合本色月糧米貳千玖百玖拾玖石柒斗陸升柒合叄勺玖抄壹撮貳圭貳粟柒粒壹黍遇閏加徴米貳百肆拾玖石柒斗叄合伍勺叄抄陸撮叄圭柒粟貳粒玖黍經費食米肆千柒百捌拾捌石湖州府烏程縣本色行糧米貳千捌百貳拾肆石捌斗捌升肆合本色月糧米壹拾柒石捌斗陸升壹合肆勺肆抄叄撮壹圭伍粟叄粒柒黍遇閏加徴米壹石肆斗捌升陸合捌勺壹撮捌圭玖粟陸粒叄黍經費食米壹千壹百叄拾肆石歸安縣本色行糧米貳千陸百叄拾叄石陸斗贰升壹合本色月糧米叄拾貳石捌斗陸升柒合陸勺貳抄陸撮柒圭壹粟陸粒壹黍遇閏加徴米貳石柒斗叄升伍合玖勺叄抄叄撮陸圭叄粟叄粒玖黍經費食米玖百肆拾伍石長興縣本色行糧米壹千陸百壹拾石貳斗叄升肆合本色月糧米壹百玖拾壹石柒斗叄升壹合陸抄柒撮貳圭陸粟貳粒伍黍遇閏加徴米壹拾伍石玖斗伍升玖合捌勺捌抄捌撮貳圭叄粟柒粒伍黍經費食米肆百肆拾壹石德清縣本色行糧米壹千肆百柒拾叄石玖斗貳升捌合本色月糧米壹拾貳石陸斗柒升陸合伍勺柒抄叄撮捌圭肆粟伍粒伍黍遇閏加徴米壹石伍升伍合貳勺壹抄壹撮伍粟肆粒伍黍經費食米伍百肆石武康縣本色行糧米叄百貳拾肆石柒斗伍升玖合本色月糧米玖石玖斗柒升肆合肆勺玖抄壹撮伍粟壹粒玖黍遇閏加徴米捌斗叄升貳勺玖抄貳撮柒圭肆粟捌粒壹黍經費食米壹百貳拾陸石安吉州本色行糧米貳百肆拾壹石陸斗陸合本色月糧米叄百叄拾玖石叄斗柒升壹合肆勺陸抄伍圭伍粟陸粒肆黍遇閏加徴米貳拾捌石貳斗伍升陸勺貳抄捌撮壹圭肆粟叄粒陸黍孝豐縣本色月糧米壹千柒百貳拾貳石玖斗貳升叄合壹勺玖抄肆撮貳圭伍粟柒粒壹黍遇閏加徴米壹百肆拾叄石肆斗壹升柒合陸勺肆抄肆撮叁圭肆粟貳粒玖黍通計湖州府屬本色行糧米玖千壹百玖石叄升貳合本色月糧米貳千叄百貳拾柒石肆斗伍合捌勺伍抄陸撮捌圭肆粟叄粒貳黍遇閏加徴米壹百玖拾叄石柒斗叄升陸合肆勺伍粟陸粒捌黍經費食米叄千壹百伍拾石漕運官制總理漕運總督浙江巡撫兼理漕務浙江督糧道專轄糧運監兌杭嘉湖府㕔官各一員押運同知通判一員大清㑹典順治初年設漕運總督一員駐劄淮安又設漕儲道一員專轄糧運十年裁漕儲道添設浙江糧道一員輪徴輪解凡督徴漕糧修造船艌僉運交兌督押鈐束領運官丁俱係糧道職掌别衙門不得干預有勢要把持及不服鈐束者聼其指實奏聞撰給勅諭十二年户部覆准漕運錢糧盡歸糧道專管十五年裁浙江糧道一員復設漕儲道一員十六年覆准漕儲道催重儹空糧道專司僉選追比督運諸務十七年覆准糧道不得别委使專司漕務毋誤職掌康熙四年裁漕儲道六年覆准推官既裁監兌漕糧於各府同知通判内選委雍正六年十月户部為敬陳管見等事議覆浙江糧道蔡仕􅘎條奏浙省漕白二十一幫例就通省同知通判輪流遴委三員分幫管押俱於糧船開行方到幫次米色非其經手得與監兌官互相推諉責任不耑弊端難絶臣愚以為監兌押運宜令一員兼司每遇十月開徴新漕以前兩月就通省丞倅中遴選三員詳本省督臣批委着令自帶衙役數名分赴三府監兌兌畢即令管押赴北庻米色俱經手選無所推諉沿途亦必嚴加管束不虞攙和等語查抵通交卸米石或米色不純押運官每推諉於監兌而監兌之員又以途中攙和為詞今若一員總領監兌押運之事更無可推諉卸責之處則兌運之時必精選好米運糧之時亦必嚴謹管束無攙和偷換之弊應如所奏行文總漕令有漕各省一體遵行可也奉㫖依議雍正九年十二月户部為請㫖事臣等查得倉塲侍即岳爾岱等疏稱押運官弁養亷移咨有漕各督撫逐一確查去後今准浙江總督李衛覆稱押運通判每員給養亷銀四百兩查押運官員給銀之處皆仰體皇上慎重漕務矜惜官丁之至意嗣後押運官員如有額外扣尅等弊指名題叅嚴加議處具題前來應如倉塲侍郎岳爾岱所請令各省有漕督撫照所議之數給發可也奉㫖依議運糧官丁浙江督糧道屬杭州前衛杭州右衛紹興衛寜波衛台州衛温州衛處州衛海寜所湖州所嘉興所嚴州所衢州所金華所凡漕糧共一十九幫每幫二員循環輪流領運共三十八員内守偹三員千總三十五員押空隨幫官每幫一員共一十九員又嘉湖二府白糧幫每幫領運千總二員循環領運押空隨幫官二員守備每員給俸工銀一百五十兩七錢六釐閒運俸工在藩庫支給本色行糧米一石五斗折色行糧銀一兩八錢千總每員給俸工銀九十兩閒運俸工在藩庫支給本色行糧米一石五斗折色行糧銀一兩八錢押空隨幫每員支給廩工銀五十四兩本色行糧米一石五斗折色行糧銀一兩八錢白糧千總每員給俸工銀七十九兩二錢白糧押空隨幫官每員給支廩工銀五十四兩給本折行糧銀三兩六錢順治三年定每衛設掌印守備一員千總一員俱係部推百總一員係外委衛軍改為屯丁其漕運造船事務令都司分轄四年覆准領運千百總如有不足聼總漕巡撫照幫酌選委用八年覆准漕糧侵欠皆因僉選官軍不得其人宜慎選運官清查舎餘班軍營軍屯丁黄快船丁及充各衙門書吏承差俱令僉選毋得規避十二年覆准各省殷實屯丁或竄入民籍希圖免運或運弁賣富差貧或小民鄰近運衛勾攝擾害令督撫責成道員分别軍民開除補足五年一次編審造册又覆准運糧每丁管船一隻不得詭名僉報缺丁誤漕康熙五年户部題准各省經制百總出運給俸停運住支九年覆准凡運糧先就本衛官輪派不足方及他衛隨幫各弁亦應均輸如有任意顛倒索詐鑽營情弊總漕該督撫題叅二十五年覆准各省運丁每船多寡不一江寜等衛每船十二名蘇太鎮金松五衛所每船十一名惟江西湖廣山東每船十名令畫一裁減江南浙江運丁俱照江西湖廣山東例每船額設十名雍正元年十二月初九日欽奉上諭恭紀首卷漕船除本船正副旗丁外其頭舵水手務於衛所本軍内擇其能撐駕者充當雍正二年十一月署浙江巡撫事河南巡撫石文焯㑹同福浙總督滿保題為遵㫖議覆事臣准部咨欽奉上諭内地衛所歸併州縣飭令分别詳悉區畫具奏欽此查浙省漕白二十一幫需用守千四十二員内有寧紹處三衛守備三員海寧所千總一員亦在遞年輪流領運每遇陞遷事故僉運不敷即於屯員内選委代運是領運弁員勢不可缺無庸置議至杭州前右海寧台温等衛掌印守備五員嘉湖衢嚴掌印守禦所千總四員均有統轄屯漕編丁僉運清理漕欠之責其所轄人丁户口錢糧難以偏廢且浙省屯田派給各幫旗丁贍運實屬運田有一縣之田派於數衛所者有一丁之單撥於數州縣者田地幫次遠近不同是以各丁應完錢糧向在該衛所就近投納若将屯糧併入州縣則一幫一丁應納錢糧勢必零星割裂分縣投納徃返奔馳在各丁以船為家春去冬回趲運不遑焉能兩顧而縣令又不能出境遠離逐幫按丁追催况一丁之田坐分數邑若責各縣各催萃於一幫一丁更難免拘擾滋弊且恐奸丁規避竄入民户難以稽查漕白僉丁輓運莫及必致有悞是浙省衛千所轄人丁户口錢糧均關漕運應照舊分隸無庸議裁併入州縣者也所有杭州前衛前右二所杭州右衛中右二所海寧衛左所台州衛右後二所温州衛左右二所分徴千總共九員查無漕運之責且錢糧無多旣有衛備可理相應裁去其員下事務原係該衛分出應仍歸衛備經理可也奉㫖該部議奏隨經户部以應如所奏議覆奉㫖依議雍正八年正月浙江總督管巡撫事臣李衛為聖恩溥被請㫖欽遵事竊查領運漕糧之衛所弁員向例分别輪運停運給與廩工俸薪其中原有等差固已均沾禄養但各員領運之年旣有長途盤費卽逄停運亦有家中養贍從前因所入不敷多與兌糧州縣需索陋規有司之不肖者即轉派於民加收苛索彼此分潤否則憎嫌米色講䆒幫貼常至縣衛互爭稽遲兌限臣抵浙以來力禁州縣之漕規以制衛弁之啟釁又慮南北輸輓弁丁亦有艱難将各衙門相沿運幫陋例嚴行裁革從前借欠銀兩屢籲聖恩分年帶運俾之稍得紓徐數年之中縣衛相安扣項漸清重運無悞今歲漕船比徃年早開一月之期現在頭幫已将過淮惟各幫運丁每船尚有出銀數兩餽送押船之員名為幫規以為運弁盤費使用各弁因舎此别無可取厯年相沿授受而運丁因得籍以挾制沿途私装盗賣竟無顧忌實於漕政有碍臣愚昧之見必湏徹底革除幫規但不酌經久養亷則窮弁難以支應必致名去實存現今江西各運弁已䝉聖恩賞給養亷倘蒙循照江西之例則浙江衛所除徴屯之員尚有些須耗羡外其二十一幫按年領運之弁每年給銀二百四十兩應銀五千四十兩不輪運之官每員給銀一百兩應銀二千一百兩又隨幫各弁更為微員押坐回空是其耑責每官議給銀四十兩共該銀八百四十兩在江西於藩庫備公銀兩取給而浙省則從前蔡仕􅘎因道庫收存銀兩未留交下起解運費曾於漕截銀内按兩提耗二分每年共銀五千三百四十七兩抵作解費原在十四萬兩耗羡之外者議於辛亥年冬月補足之後将此銀統歸藩庫備充公用今若以漕耗抵給運弁養亷亦屬於本欵中以公濟公除外每年不敷之二千六百餘兩并規運及庚戌辛亥兩年各全缺銀七千九百八十兩查前經奏明通省十四萬兩耗羡之外或本年完納數多或徴收厯年舊欠所有餘耗盡收撥補将一切運丁幫規徹底釐革再有陽奉隂違嚴叅加倍治罪則運弁有養亷之資幫丁無挾制之弊於漕務似有裨益是以循例奏明請㫖奉㫖好支給可也咨部存案漕船浙江漕船一千八十二隻白糧船一百二十六隻浙省原額漕船係一千四百四十一隻因節省减存厯年久遠船身朽爛無存於雍正四年總漕張大有題定一千二百一十五隻作為定額但厯年仍有増减不一現在雍正九年浙省起運八年分漕白二十一幫實在出運漕白船共一千二百八隻漕船每隻支本色行糧米一十五石折色行糧銀一十八兩本色月糧米四十八石遇閏加徴米四石折色月糧銀三十三兩六錢遇閏加給銀二兩八錢三修銀七兩五錢為修艌船隻之用每漕截装正米并交倉二五耗米一石給漕截銀三錢四分七釐其沿途一五耗米不行支給白糧船每船照漕例支給外又支給食米三十一石三斗該折給銀四十一兩一錢六分歲運漕船每隻給銀二百八兩七錢七分三釐十年滿號詳請再造每船原装正米四百石外多載一石給銀五分名曰負重耗米例不支給每船許帶土宜一百二十六石每船回空漕河各督撫嚴檄鎮道等官無分晝夜催回以副冬兌冬開之限康熙四十九年户部為窮丁困苦等事議覆浙江巡撫黄秉中疏稱浙省運白旗丁俞恒等懇将四十三年江南旗丁包謝國叩閽裁减經費錢糧並給丁米九十七石二斗照舊給發一案臣即行糧道㨿程鑾詳稱浙省白糧原係民間解運費用甚多除額編銀兩外民間仍津貼銀四萬四千九百餘兩後改為官運照常津貼自康熙三年停止官運永選漕船交與旗丁運送每船給運軍經費等銀五百一十三兩零又給旗丁每船飯米九十七石三斗前項銀米並非額編之項俱係民間津貼懇祈勅部議覆施行等因查前項給丁白糧經費銀五百一十三兩内於四十三年旗丁包謝國等情願捐造船隻等因叩閽臣部議将經費銀五百一十三兩内裁减銀一百八十餘兩至運白旗丁徃來所用食米九十七石三斗亦併裁革照漕例支給米六十三石在案但前項裁銀一百八十餘兩俱係從前旗丁包謝國等情愿捐造船隻臣部具題裁减之項並非應給旗丁之正項相應将前項銀兩仍照原題裁存解部至裁革旗丁徃來所用食米今該撫旣稱前項米石並非額編正項俱係民間津貼應照該撫所題支給可也奉㫖依議雍正二年五月户部奉上諭朕惟漕運關係甚大經費本無不敷運丁恣行不法皆由官弁剥削所致如開兌之時糧道給發錢糧任意扣尅運丁所得十止八九而僉丁之都司監兌之通判又多誅求及至開行沿途武弁借催儹為名百計需索又過淮盤查私貨徒滋擾累究為無益運丁浮費旣多力不能支因而盗賣漕糧偷竊為非無所不至矣嗣後各省糧道給發錢糧不許扣尅分釐沿途武弁不許借端需索運丁除包攬抗違外所帶些須貨物亦無容苛刻盤查至江浙船政同知經管修造糧船侵漁尤甚此官於漕政毫無禆益著即裁去爾部行文各督撫不時查察如有仍前需索等弊立即指叅從重治罪庻運丁漸有起色自必保守身家凛遵約束禁官弁之侵削即所以戢旗丁之刁悍也特諭雍正二年五月户部為請定歲造等事先經總漕張大有疏稱各省現存漕船數目准部文行令徹底清查造册題明分送部科查核今據江安糧道馬世珩等各造清册詳送前來相應具題臣部以該督疏内原額漕糧與漕運議單開載船數不符移咨該督逐一查明分晣減存積缺并洒帶漂豁船數另行造册送部去後今送到册内浙江糧道蔡仕􅘎詳開浙省額設漕船以來厯經久逺案卷霉爛無從稽考今照上年所送册開原奉單派船一千五百五十八隻内灰石減存洒帶零船三百四十三隻現運船一千二百一十五隻造送查核前來查糧道造送船隻與近年出運船數查對相符應令該督嗣後将此題定實在現運船數作為定額内除旗丁自備船隻例不給料價外其餘現運漕船每年将滿號之船俱照十分之一咨部請造如有可以加修出運者仍令加修出運不得将堪以加修之艘混請成造致滋浮冐可也奉㫖依議雍正七年五月奉上諭朕聞各省糧船過淮抵通之時該管衙門官吏胥役人等額外需索陋規以致繁費甚多運丁重受其累特命御史前徃稽查禁革苛索等弊又查向來之例每船北上許帶土宜六十石朕思旗丁運駕辛苦若就糧艘之便順帶貨物至京貿易以獲利益亦情理可行之事着於舊例六十石之外加増四十石准每船擕帶土宜一百石永著為例惟是運丁等繁多素有惡習如偷盗米石掛欠官糧夾帶私貨藐視法紀向來之通弊也又如昔年浙江湖廣二省糧船因私忿小怨遂致操刄持戈殺傷多命又從前偶值回空守凍遂至縱容水手公然搶奪擾害居民此皆衆所共知者是以數年以來内外臣工條奏旗丁不法者不下數百紙前又有人奏稱販賣私鹽之弊在糧船為尤甚有一種積梟巨棍名為風客慣與糧船串通搭有貸物運至淮揚托與本地奸徒令其賣貨買鹽預囤水次待至回空之時一路装載其所售之價則風客與丁舵水手三七朋分糧船貪風客之餘利風客恃糧船為䕶符於是累萬盈千直達江廣私販日多官引日滯等語觀此則旗丁之作奸犯科誠難以悉數也朕年來屢飭該管官嚴行禁約又復念其勞苦疊沛恩膏近見伊等之惡習刁風亦漸悛改是以特頒諭㫖嚴禁過淮抵通之陋規復令増添擕帶土宜俾得多沾餘潤以贍家口伊等益當感戴朕恩遵守法度共為良善以免罪愆着總督倉塲侍郎漕運總督将朕此㫖通行刋布每船各給一張使運丁人等觸目警心以副朕體恤訓誨之至意特諭雍正八年六月户部議准每船頭舵二人每人准帶土宜三石水手無論人數准共帶土宜二十石如二十六石之外再有多帶者嚴加議處雍正十一年九月户部為請嚴查騐糧船等事查漕船定例十年輪造除将舊船底料配用外運丁仍赴道庫領銀二百八兩以為料價之用總漕委官監造工完将委官匠作姓名并成造年月刻鑿船尾總漕騐烙如有板薄釘稀或将滿號舊船粘補掩飾者監造官嚴加處分法至備也今河臣朱藻疏稱各衛守備徃徃串通旗丁将造船料價領回分肥並不拆造只用油灰麻觔畧加粘補故意遲延到次駁換不及只得聼其兌開易至沉溺請勒限以十月十五日以前将完造新船到次候兌以凴查騐如仍係舊船庻便責換過期不到即行題叅議處等語查各省漕船河道遠近不同若湖廣江西浙江三省漕船約於八月内始能全數回空沿河官弁縱極力催儹亦須十月内方得到次再加拆造亦需時日若限十月十五以前到次勢必不能况勒限完工不免草率不能堅固與舊船無異况冬兌冬開為期無幾即令十月十五以前果能到次於此時駁換拆造勢必悞運應将該督所請毋庸議嗣後令總漕巡撫恪遵成例申飭各糧道将十年滿號之船先期請造預備物料原船到次卽刻委官興工監造毋悞冬兌冬開倘有将滿號船隻匿不請造遲延者将衛備叅革造完之後糧道務将新船查騐於船尾大書深鑿成造年月與委官匠作姓名如有将舊船粘補掩飾及造不如式者監造之官及衛備旗丁一併嚴審究擬照例賠造倘糧道不親查騐及狥隱不行揭報該總漕巡撫題叅議處再疏稱沉溺失風米石着落不行查出之大小各員分賠等語漕船偶有失風沉溺虧折米石定例責令旗丁賠補原欲使之凛畏法紀盡力撐駕小心防䕶若令經管各官分賠恐旗丁恃有新定之例不特疎於防䕶且啟偷蝕米石假揑失風以少報多諸弊應将所請亦毋庸議可也奉㫖依議則例凡給單總漕置造全單每年派某衛所幫官丁船隻應運糧數赴某府州縣領兌以糧艘到日為始限日支領月糧空船赴次開兌重船過閘過壩到淮計程酌扣守風阻淺參謁較斛等期逐一定限填單每幫分給一紙運官及監兌官查欵照月各於前件項下開註有無違限并官吏姓名用監兌印鈴記到淮日查算如違程限或罪在有司或罪在領運官丁照數叅究責懲仍編幫改限嚴責如期入閘抵灣起糧完日全單繳送照例查比奨薦叅罰如不依式填註及填註不實者南聼總漕北聼倉塲核叅總漕發單後糧道刋發號單每單兌米一百石併贈耗數目分頒各州縣每交完一單令運官填註收數一船兌足卽出給水程勒令開幫又頒發各屬每倉號簿開列丁船兌足註明如逾期不完監兌官㨿簿責比凡樣米應運漕米州縣各将倉貯乾圓潔淨樣米四升装成二袋用印鈐封同兌米交付運官解送倉督查核轉發坐糧㕔及各倉比對米色騐收凡水次交兌每年漕糧經徴州縣限十月開倉十二月完兌官收官兌軍民兩不相見止令監兌官與運官公平交兌兌完一船立即開行截厫配船儘一厫米派兌一丁如有畸零米石方准凑兌别船凡運糧程限浙江限二月内過淮六月初一日到通凡運丁屯田混入民田及運丁轉售者盡令清出分上中下三等造册奏報按田派運浙江運丁按屯田畝數配給領運船隻至無運衛所及無屯田不願領運者不得妄行僉派應給運丁䉡羡等銀務查本丁上年全完無欠方准給發别幫别丁不得混冐扣留䉡羡等銀照餘米例查抵舊欠以三年為止仍有餘銀盡數給還以示鼔勵凡漂流定例江洋黄河漂流為大患勘實具題准與豁免如未經題報即於本丁名下追賠不足将本幫餘米䉡羡等銀扣抵足數裏河漂流為小患不准豁免若二百石以上總漕巡撫查明具題准免曬颺仍令處補應納京倉糧米如漂流十石减除一百石改納通倉每石省脚米一斗以補缺額如漂流一百二十石免曬一千石每石省曬折米五升并耗米七升以補缺額如數多抵補不敷扣除該幫羡餘銀兩該幫不足将該衛該總扣除務足原數凡催徴漕糧完欠順治十三年户部題准州縣衛所官未完不及一分者免議一分以上罰俸六個月二分以上者住俸三分以上者降二級四分以上者降三級五分以上者革職俱戴罪督催完日開復叅後違限不完者加倍議處又題准白糧經徴州縣官完欠分數及叅後違限俱照漕糧例處分十八年覆准行月經費雜項錢糧照正項錢糧原定例處分康熙十四年覆准漕糧改折銀兩與隨漕項下錢糧各作分數題叅凡運納漕糧完欠順治六年户部題准運官擇殷實才幹者加千總銜押運漕糧一年無欠實授千總二年無欠加署守備三年無欠實授守備五年無欠加都司僉書如有掛欠加等治罪追賠七年題准官丁掛欠漕糧即遇赦不准豁免仍行究追八年題准運官一運全完委用守備千百總俱准實授二運全完各加銜一級三運全完各實陞授一級十七年題准浙江糧道糧多全完者加陞一級又覆准領運官除消算買補及隨幫帶運全完者不叙外浙江糧多路遠部推守千百總全完者每運加銜一級外委運官一運全完者紀録一次二運全完者准實授三運全完者加銜一級康熙十一年題准浙江糧多路遠部推守千領運全完者每運加銜一級至衛所裁外委百總名色改為隨幫官浙江隨幫官隨運三次給千總劄再隨運二次以衛千總推用凡監兌漕糧未完揑報兌完漕船未開揑報開行者各降二級調用凡收兌漕糧攙和糠粞砂土及私自改折漕糧者該管官俱革職監兌官降一級調用其抵通交兌漕糧有糠粞砂土者押運官革職糧道降一級調用凡監兌官任蠧惡包攬横行水次侵蝕漕糧者降二級調用或旗丁生事不能禁止者該管官降一級調用凡押運官不候交完漕米未經掣批私自回任者罰俸一年禁約順治三年户部覆准漕糧無論官儒民户一體督催及時入厫候兌不得堆貯私家逼令官丁赴兌違者治罪七年覆准漕兌積弊四欵一科派常例一濫差滋擾一苛勒贈耗一交兌留難通行勒石禁革十年覆准漕米依限收完即給票歸農官兌軍收不許㸃充倉頭私派耗贈勒碑永禁仍取具州縣遵依十五年覆准官收官兌軍民不許相見有陽奉隂違查叅重處運丁擅自鼓噪有司能捍禦者上司㨿實題叙宻訪各屬倉歇巨蠧及各衙門常例弁丁淋尖踢斛割單等弊題叅重處又覆准運官領運漕船全單開載定數中途洒帶歸併到通船少冐支行月水脚銀米嚴追完日仍從重處分康熙元年奉上諭領運官丁多有不守成法夾帶私販貨物隱藏犯法人口倚恃勢力行兇害人借名阻礙河道敺責平人托言搜尋失物搶刼民船且有盗賣漕糧故致船壞貽累地方嗣後仍有違禁肆行者督漕各官並該地方官即行叅奏嚴提官丁治以重罪若狥情不奏各官亦從重處治特諭康熙十七年覆准禁革小民納糧時修倉鋪墊及屯丁領運行月扣除陋規違者叅究二十年覆准浙江運丁私勒民兌另立私截名色嚴行禁止雍正二年閏四月十八日欽奉上諭各省旗丁運糧進京沿途行走理應奉公守法乃數年前浙江湖廣糧船因懷挾私忿彼此爭鬭持戈放箭殺傷者多逞其兇頑肆行無忌又聞前歲冬間糧船守凍在山東地方竟行搶奪擾害居民去歲回空又聞强取百姓衣服此等皆大干法紀嗣後總漕若不嚴加約束禁止妄行仍然寛縱直𨽻山東河南巡撫即着轉飭沿河官弁不時稽察倘玩法為非即分别輕重按律治罪不得稍有狥縱推諉以長刁風若有如從前爭鬭傷人及搶奪擾民之事該督撫即行奏聞請㫖於彼處立刻正法决不寛貸可預先曉諭各省運丁知之特諭倉厫浙江糧道杭嘉湖三府屬錢塘縣便民倉在調露郷北新橋南河西水次仁和縣便民倉在墅河舊馬頭海寧縣便民倉初建於長安運河之東關後徙於運河之西岸富陽縣便民倉在北關蘇櫓橋餘杭縣便民倉在餘杭縣東門臨安縣便民倉初在㑹城湖墅金魚池頭後徙建於餘杭水次於潛縣便民倉在墅河新馬頭新城縣便民倉在墅河新馬頭昌化縣便民倉在墅河新馬頭嘉興縣便民倉舊在澄海門外鴛鴦湖傍後遷入城内鳯池坊秀水縣便民倉在縣東北望吳門内嘉善縣便民倉在縣西南一里許海鹽縣便民倉初設縣郊外後移於西門内石門縣便民倉初建南門外後遷於城内學河之南平湖縣便民倉舊在縣西一里臨水次後改建於北城之内桐鄉縣便民倉初在皂林鎮運河之南後移建於古接待院之址烏程縣便民倉在定安門内西岸歸安縣便民倉在定安門内東岸長興縣便民倉在縣城外東南水次舊教塲基德清縣便民倉在峻明門二里外武康縣便民倉初在縣東北一十五里後移置縣東北一里臨後溪安吉州便民倉在梅溪凟口謹按官兌興而悉索除長運行而踐更息其收貯民粟以出兌於軍者惟倉厫為重故便民有倉誠輸輓之所係也今考杭嘉湖三府便民倉歴年建革不一據各縣志所載備列於左其預備常平社義等倉乃儲粟以贍軍賑民者已見積貯門兹不復録運河浙江運道由杭州府之武林驛北厯湖州府德清縣東三十里凡百二十里而達嘉興府石門縣又東北歴桐鄉縣北八里凡八十里而經府城西繞城而北又六十里而接江南蘇州府吳江縣之運河陸葇漕河志浙漕者浙西諸水發源於天目山而宣歙以東富陽以北支分幹流衆川為緯運河為經此浙江與江南下江之漕所由即宋時綱運之故道也自杭州北郭務至謝村北為十二里洋為塘棲河水深濶德清之水入之過北陸橋入石門縣界過松老抵髙新橋海寜支河通之繞石門城南轉東北至小髙陽橋河淺資開濬東過石門塘折而東為王灣至皂林水深者及丈過永新入秀州界自趙墻舖至陡門鎮河俱濶深北為分鄉舖稍東為學繡塔又北由嘉興府城西轉而北出杉青閘