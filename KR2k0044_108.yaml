body:
  text: 浙江通志卷一百九祥異下明杭州府志吴元年杭州自四月不雨至六月知府王興福竭誠致禱雨澤霑足嵗獲有秋眀實録洪武二年四月癸巳台州獻瑞麥九月戊戌夜太陰犯南斗嘉興府志洪武四年嘉興崇道院産靈芝明實録洪武四年七月辛酉太陰入南斗甲子龍游縣大雨水溢漂民廬杭州府志洪武五年七月餘杭縣山水暴湧漂流廬舍及人畜明實録洪武五年八月乙酉餘杭嵊縣義烏三縣大風山谷水湧漂沒廬舍及人畜甚衆嘉興府志洪武七年五月十九日嘉興縣民李甲妻一産三子萬厯温州府志洪武八年七月温州大水平陽永嘉樂清瑞安沿江居民多淹沒明實録洪武九年六月壬辰錢塘仁和餘杭三縣水下田被浸者九十五頃續文獻通考洪武十年正月丁酉金華處州雨黒水如墨汁池水皆黒續文獻通考洪武十一年處州遂昌縣有大聲如鐘自天而下明實録洪武十一年十二月庚戌辰星犯南斗明實録洪武十二年五月戊子青田縣淫雨山水大發沒縣治壊民居壬辰嚴州府大雨三日溪水漲壊官廨民舍明實録洪武十五年九月乙丑熒惑犯南斗明實録洪武十九年正月庚午太白犯牛宿四月乙亥熒惑留斗宿五月戊午七月辛巳八月丙戌熒惑皆犯斗宿嘉興府志洪武二十二年六月辛巳彗星見紫㣲側在牛度九十分有白光丈餘指西北行明實録洪武二十四年十一月乙未辰星嵗星同度在南斗明實録洪武二十六年九月癸夘太陰入南斗萬厯紹興府志洪武二十八年山陰縣天樂瀛湖塘掘得一物𩔖小兒臂紅潤如生人云此肉芝也食之延年明實録洪武三十年癸巳熒惑犯南斗杓第二星萬厯金華府志建文四年蘭谿縣飛蝗食禾穂竹木葉皆盡明實録永樂元年夏四月乙夘曉刻有星大如雞子出斗宿東南行至㳺氣八月癸亥浙江風潮決江塘萬四百餘步壊田四十餘頃湯鎮方家塘江隄為風浪衝激淪於江者四百餘步溺民居及田四千頃明實録永樂三年八月甲子朔杭州等府水淹民田七十四頃漂廬舍千二百八十間明實録永樂四年七月海鹽縣霖雨風潮決隄九月壬戌夜月掩南斗杓第二星成化杭州府志永樂五年六月庚戌杭州沿江江隄淪於江十月癸未金星犯南斗魁第三星明實録永樂七年七月庚辰月犯南斗魁第二星甲申麗水縣霖雨山水驟湧壊田廬漂人畜台州府志永樂七年台州颶風抜木明實録永樂九年七月庚午湖州屬縣淫雨沒田萬三千三百八十頃辛未浙江潮溢衝決仁和縣黄濠塘岸三百餘丈孫家園塘岸二十餘里海寧縣風潮溺民塌城垣明實録永樂十年七月己酉平陽縣獻嘉禾百六十四本四穂者一本三穂者數本萬厯紹興府志永樂十年諸曁縣學後小陶朱山産芝一本七莖明實録永樂十一年四月嚴衢西安夀昌等縣饑杭州府志永樂十一年五月杭州大風潮仁和十九二十兩都沒於海平地水髙數丈田廬殆盡溺者無算嘉靖寧波府志永樂十一年七月戊子寧波府五縣大疫明實録永樂十三年六月己夘烏程等四縣水傷田九千四百四十三頃十月乙丑朔太白犯南斗魁第三星萬厯金華府志永樂十四年五月金華大水漂屋疫癘大作六月大旱七月又大水明實録永樂十六年七月庚申月犯牛宿大星萬厯温州府志永樂二十一年温州旱大饑明實録洪熈元年六月十五日黄巖縣大雨水髙平地五六尺傷禾稼六百二十頃湖州天雨連月烏程歸安長興三縣低田共沒六百三十四頃明實録宣徳元年二月己丑有流星大如雞卯色赤有光起自南斗東南行至近濁五月甲寅浙江磐石衛颶風暴雨壊公𪠘倉厫人多溺者永嘉樂清二縣颶風急雨自旦至暮壊公私𪠘宇及壇廟明實録宣徳三年浙江自四月不雨至六月及雨大水淹沒禾稼續文獻通考宣徳六年九月熒惑犯南斗明實録宣徳七年正月乙巳夜火星犯南斗杓甲寅昏刻有流星大如杯色赤有光出河鼓西南行至斗宿五小星隨之辛酉夜月犯南斗魁第二星丁丑夜金星犯南斗魁第三星浙江大水運司下砂等塲淹沒鹽課六萬二百四十餘兩木火二星合於女宿嘉靖寧波府志宣徳十年寜波合郡大有年明實録正統元年十一月癸巳夜月犯牛宿中宿杭州府志正統二年冬錢塘縣民家婦一産三男明實録正統三年正月辛亥月犯牛宿六月戊辰月犯牛宿錢塘等縣自五月以後彌旬不雨田禾槁死浙東俱亢旱無收明實録正綂五年金華衢州自六月至七月淫雨連綿江河泛溢㑹稽臨海天台等縣五六月間大旱傷稼台州府志正綂八年三月台州大霜殺草四月至八月連雨麥腐又大風六種無收明實録正統八年十月鄞縣余士昌妻鮑氏一産三男明實録正統九年嘉興湖州江河泛溢隄防衝決淹沒禾稼明從信録正統十年三月寜波台州久旱民遭疾疫遣禮部王英祀南鎮至日即雨灌獻之夕雨止明日又雨田野霑足明實録正統十一年正月戊午夜月犯南斗明實録正統十二年夏秋間紹興各縣亢旱無收明法傳録正統十四年六月紹興山忽移於平地又地震白毛遍生七月熒惑入南斗嘉興府志景泰元年正月嘉興大雪二旬鳥雀幾盡民饑夏淫雨傷稼大饑台州府志景泰二年四月仙居縣梅花盡開明實録景泰二年八月辛未夜有流星大如杯色青白出天津北行至織女九月甲辰木星晝見於己位夜月犯木星於斗宿十一月己亥月犯牛宿下四星杭州府志景泰五年正月杭州大雪十餘日鳥雀盡嘉興府志景泰五年二月嘉興大雪四十餘日明實録景泰六年海寧衛嘉興諸府自三月不雨至於六月九月甲午金星犯南斗魁第三星萬厯紹興府志景泰七年春諸曁縣長山産芝明實録景泰七年四月己丑夜有流星大如杯光燭地出天市垣南行至牛宿二小星隨之五月湖州紹興久雨沒田禾十月壬寅月犯斗宿火星嘉靖寧波府志景泰七年奉化縣大饑杭州府志景泰七年冬西湖水竭明實録天順元年湖州四五月連雨苗爛杭州寧波金華嚴州六七月亢旱苗枯明實録天順二年九月甲寅金土二星合於斗宿金星犯南斗杓第二星明實録天順三年正月壬子五鼓東方有星如盞色青白有光起自牛宿東行至近濁嘉興府志天順三年嘉興海溢明實録天順四年杭州嘉興湖州寧波紹興金華處州四五月陰雨連綿江河泛溢麥禾俱傷秀水嘉善二縣籽粒無收七月丁亥夜月犯牛宿明實録天順五年十一月己亥夜月犯金星在斗宿光芒相接土星火星聚於牛宿明實録天順七年八月癸丑有流星大如杯色赤有光出河鼓西南至斗宿五小星隨之九月丙子夜金星犯南斗魁第三星十月庚寅木火二星合於女宿萬厯湖州府志天順八年湖州大水民饑明實録成化元年五月戊午火星留守斗宿六月壬申火星犯斗宿魁第四星七月浙江各府州縣久雨稻苗腐爛嵗饑萬厯温州府志成化二年正月平陽縣颶風暴雨山摧平地水髙八尺續文獻通考成化二年正月丙戌太白曳入南斗嘉靖寧波府志成化四年慈谿縣東北山鳴隠隠若雷乍大乍細迤邐至南而止是年賢科東北一區雋十餘人傳云賢人出里社鳴續文獻通考成化五年二月癸巳金星犯牛宿嘉靖寧波府志成化六年象山縣雨白霧行人鬚眉皆白數日而止明實録成化九年四月嘉興湖州水災嚴州青蟲遍地嘉興府志成化九年八月嘉興府嘉禾生明實録成化十年春嚴州六縣多雨蠶麥無收杭州府志成化十年杭州火延六七里明實録成化十一年十月辛巳月犯牛宿大星嘉興府志成化十三年正月嘉興府震雷大雪又海溢溺民居萬厯紹興府志成化十三年春紹興府𤓰山裂續文獻通考成化十三年十一月辛未冬至杭州大雷雨虹見明實録成化十三年寜波紹興台州水旱相繼嘉興府志成化十四年八月二十日夜嘉興南方有聲如運磨達旦十二月龍見於南方以十數續文獻通考成化十四年八月吴越間淫雨不止各處出蛟將出時山中先有火燒地草木披靡分兩邊中成一徑以出至入水如驢形不見足浮游江中而去嘉興府志成化十五年九月二十日申時嘉興地震至酉始定杭州府志成化十六年有五色烏翔錢塘學宫是年李旻舉觧首越三年大魁天下杭州府志成化十七年昌化縣竹生花踰年結實如麥萬厯金華府志成化二十一年武義縣旱竹生實如麥民採食之可療饑括蒼彚紀宣平山中尤多竹米至千餘石明實録成化二十二年台温二府自春徂夏不雨民饑臨海縣火燬軍民房舍一千七百餘區續文獻通考成化間嘉善縣鄒亮妻初乳生三子再乳生四子三乳生六子續文獻通考𢎞治元年二月十六日處州景寧縣北屏風山有白馬成羣從牛首山迤邐騰空而去萬厯金華府志𢎞治元年金華府大旱至三載嘉興府志𢎞治元年十二月嘉興府虹見雷電雨冰凡四日嘉興府志𢎞治二年夏秀州儒學後圃産芝連莖竝蒂紫色有光如玉杭州府志𢎞治三年五月仁和縣槎渡村有瑞麥六月杭州大雨龍井鳯凰兩山水暴漲淹田禾萬厯温州府志𢎞治三年温州五縣皆饑七月平陽縣南鄉生嘉禾一本四穂嘉興府志𢎞治五年嘉興大水民流移又大疫萬厯金華府志𢎞治六年正月五日蘭谿縣大雷雨黒水五月至八月旱無麥禾杭州府志𢎞治六年四月昌化縣大風拔木火光燒山少頃驟雨如注温州府志𢎞治六年泰順縣鶴巢山産靈芝萬厯温州府志𢎞治八年二月永嘉縣暴風雹大者如拳小者如雞子傷屋瓦凡禽獸果實苖麥俱無嘉興府志𢎞治十一年嘉興郡境河港池井水皆沸騰髙二三尺甚有至丈許者竟日始平萬厯温州府志𢎞治十一年八月初九日巳刻温州有大星自南移東後有光一帶長百丈餘將入海光分為五聲若轟雷温州府志𢎞治十二年四月樂清縣地震生白毛台州府志𢎞治十三年台州大饑民食草木嘉靖寧波府志𢎞治十四年象山縣大寒草木皆死民饑萬厯金華府志𢎞治十六年三月十八日武義縣大風雨雹抜木傾屋壓死二十餘人杭州府志𢎞治十八年七月杭州驟雨山水大湧漂屋人多死者嘉興府志𢎞治十八年九月十一日嘉興地震屋瓦皆鳴次日地生白毛金華府志十三日子時金華各縣地震台州府志台州地震有聲湖州府志湖州地震生白毛寧波府志鄞縣奉化同日地震温州府志正徳元年温州地震有聲如雷遍生白毛長者三四寸嘉興府志正徳二年十一月十一日小雪節嘉興府疾雷震天電火迅發二十八日虹見雷大發聲是冬桃李花蜂蠅集萬厯湖州府志正徳三年湖州大旱河水竭萬厯湖州府志正徳四年湖州大水民苦疾疫嘉興府志正徳四年七月嘉興驟雨如注至十月不霽禾盡爛大饑萬厯金華府志正徳四年十一月金華各縣大霜竹木皆死經春不生民饉萬厯湖州府志正徳五年湖州復大水疫甚地震生白毛嘉興府志正徳五年五月嘉興大水害稼民流移者半温州府志正徳五年永嘉縣大饑杭州府志正徳六年正月杭州大雨電地震自後頻震嘉興府志正徳七年嘉興西山鄉麥秀兩岐温州府志正徳七年樂清縣瑞應鄉麥一本五穂六穂餘多三穂四穂萬厯金華府志正徳八年金華縣池水結氷成花草枝葉之形如畫嘉興府志正徳八年十二月石門縣樹枝凝霜狀如垂露吸之味甘如飴嘉興府志正徳九年石門縣蝗不害稼已而嘉禾生有一本數穂者萬厯金華府志正徳十年金華雨雹永康義烏縣尤大鳥雀雞鶩傷者甚衆萬厯紹興府志正徳十一年新昌俞應肅家蠶鳴嘉興府志正徳十二年二月二十三日嘉興雷電雨雹大者如馬首十一月雷電大雪十二月乃止萬厯温州府志正徳十二年四月永嘉樂清二縣地大震生白毛萬厯温州府志正徳