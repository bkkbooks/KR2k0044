body:
  text: 浙江通志卷二百二十三祠祀金華府金華縣附郭先農壇在東關外距城三里國朝雍正五年知縣趙元祚奉文建立壇宇并置耤田四畝九分社稷壇萬厯金華府志在府治西北三里許舊浙江通志金華縣附郭不别置風雲雷雨山川壇萬厯金華府志在府治南六里雙溪之南郡厲壇金華府志在府治北關北三里許城隍廟金華府志在府治北四隅二里明洪武三年建𢎞治間知府郝隆重建嘉靖間知府陳京修國朝順治戊戌知府孫丕承知縣王世功重建金華縣城隍廟金華府志在通逺門内距縣南三百步夏禹王廟萬厯金華府志在通逺門外雙溪驛後關帝廟金華縣志一在東一隅一在文昌閣赤松祠明一統志在金華縣東二十里晉黄初平初起登仙於此後人為之立祠號赤松宫舒道紀二仙祠詩松老赤松原松間廟宛然人皆有兄弟誰共得神仙雙鶴冲天去羣羊化石眠至今丹井水香滿北山田徐將軍廟名勝志在子城西一里晉人名佚督兵來婺平賊有功後葬於此昔年於廟左浚渠有古冡無碑碣惟存一鏡甚損上刻永和年號康濟廟萬厯金華府志在府城北十五里即今東紫巖廟神姓邢名植凡有祈禱累著靈驗宋嘉定中封剛應廣利忠祐侯三蘇祠金華府志在縣東景蘇坊内宋建炎二年潁濵長子遲以右朝議大夫來知婺州為民奏減羅額父老徳之為立生祠并祀老泉東坡潁濵三先生明正徳間重建増入待制遲學士簡神位三忠祠萬厯金華府志舊名二忠祠祀宋宗忠簡澤明王忠文褘在八詠門外正徳十二年建隆慶壬申知府鄭一信改建清波門内萬厯二年巡按御史蕭廪以贈太常少卿陸震合祀更名三忠鄭忠愍公祠嘉靖浙江通志在縣東北三十里祀宋資政殿學士鄭剛中金華縣志在坦溪上公裔孫奐建又赤松鄉寳積觀亦有公祠吕成公祠金華府志在府治西光孝觀内宋端平間立祠元大徳燬明嘉靖間重建後遷於分守道署右國朝順治年間守道周漢傑畢振姬重葺康熙十六年知府張藎重建越國胡公祠金華府志明洪武初祀忠臣胡大海宋濂胡越公新廟碑記辛卯兵興上手秉黄鉞屯兵滁陽公仗䇿謁轅門一見語合遂居前鋒以佐揚天威辛丑夏五月上憫公之勞且以婺為海右大藩連甌引越非有宿將重臣控制之不可乃授公江南等處行中書省叅知政事屯戍於婺壬寅春溪洞兵叛而西歸公遂遇害上聞之震悼勿置親御翰墨作文以祭且命有司塑公像配享卞忠貞公廟庭甲辰冬復降旨贈光禄大夫浙東等處行中書省平章政事柱國追封越國公先是公殁之明年公之部曲與境内之民悵然遐思乃相率即城中作新廟一區及是寵頒之命下復羣謁於金華宋濂請記濂竊觀古之名將出戍邊域者矣苟得甲士之驩心則耕田鑿井之氓必至於弗寧使斯民稍得以遂其生則持㦸荷戈者必不免於愁怨孰有能兩全者哉若公者可謂賢已公嘗自謂曰我不知書然吾行軍惟有三事不殺人不掠人婦女不焚人廬舎故其軍一出逺近之人皆爭趨附葢公處心以仁蒞事以威惟其仁也故不言而民化惟其威也故不待戒而兵自不敢犯廟而祀之其誰曰不宜初公之未薨嘗夜出人見其兩目煜煜有光若燈及既薨敵人數入我邉陲公降異或見夢於人或覩靈火滿野􅍅􅍅聞人馬聲洎出師輒大捷似實有陰助者是則公之英魂烈爽下上於天地之間固未嘗亡也景泰間以贈浙江布政司叅政陶成配享嘉靖間同知李重重建於八詠門外隆慶壬申知府鄭一信改建於清波門内國朝順治年間祠圯止設像於八詠門樓宋公祠萬厯金華府志舊祀學士宋文憲濂祠在八詠門外東城下嘉靖十三年巡按御史張子立建隆慶壬申知府鄭一信改建於清波門内萬厯二年巡按御史蕭廪以唐文襄公龍合祀唐文襄公祠金華府志在府治西明嘉靖三十九年建忠義節孝祠忠義祠在城西五隅學宫西首節孝祠在城北三隅國朝雍正四年知縣趙元祚奉文建蘭谿縣先農壇在縣治東門外距城半里許國朝雍正五年知縣胡啓敏奉文建立壇宇并置耤田四畝九分社稷壇蘭谿縣志在城北石壇山風雲雷雨山川壇萬厯金華府志在縣南一里倉嶺之後山邑厲壇萬厯金華府志在北門外五里城隍廟金華府志在縣西北宋崇寧四年縣尉陸和中建元至元中知州梁棟重修明洪武三年於鎮守千戶所故地作新廟成化十六年知縣唐韶又新之横山龍王廟蘭谿縣志在縣西南宋紹興九年因禱雨建元至元二年州判王鈺又禱重建柳貫横山龍王廟記婺衢二水合流而下為蘭谿治城占水之東而直其西南有山横障衢水之衝者横山也水方湍悍而巖涯扼之泓渟灣洄滙為深淵有神龍潛於其中出光景騰雲氣蓄洩雷雨而潤澤羣物其為造化之府章章異哉故有龍神祠比嵗因廢不舉重紀至元二年夏秋不雨籲於明神甘澍滂流四境既足廟而祠之迺記而著之石福祐廟蘭谿縣志在柱竿山宋童剛記云楚范増廟晉天福間有石像呈異故廟於此水旱灾疫有禱必應忠祐廟萬厯金華府志舊在縣南五里祀隋大司徒陳果仁後遷聖夀寺旁柳貫忠祐廟記造化之迹百物之精神之著也然而禦災勤事亡有不仁稽之功籍質之祀典百世雖逺明靈赫然尚皆天隲民衷之不能自已焉忠烈廟神生身季子之墟顯仕隋唐之際志將靖國蹈難死忠即鄉建祠累有封號而蘭谿别廟民尤謹於報事則以義寧之初常奉詔南平婁世幹之亂戈矛所次氛祲肅清保境綏民功在人心尸而祝之與社稷等合於祭法以死勤事而能禦灾捍患者矣延祐五年天子重俞廷臣之請肇加爵號之榮命始下耆稚歡呼潔牲薦告神既顧欣人用闓懌里民趙璇嚴繼輝將摹雲漢之章刻石貽永迺來請誌輒書梗槩係次下方靈源廟金華府志在縣西五里宋太始初建州刺史徐燦與夫人密氏舟至蘭陰山下覆溺後著靈應故祠於此宋宣和中陰有捍寇功封積慶侯趙清獻公祠萬厯金華府志隆慶初建在平康橋北祀宋趙抃范香溪祠嘉靖浙江通志嘉靖二十二年建祀宋儒范浚嵗春秋祭金華府志在倉嶺側陸鶴山先生祠嘉靖浙江通志在瀫水驛西嘉靖元年建祀贈太常少卿陸震姚文炤鶴山先生祠記武宗事遊巡伏闕者至二百人惟公為倡杖至死者十一人惟公為烈公不列諫垣而以一身定國上逆天威可不謂難乎先是公出宰泰和泰和之民懐之為樹生祠以祀今大司馬漁石唐公以柱史巡江右移檄蘭谿俾倣泰和之制於瀫水之陽創祠春秋為奠而公之精爽有適矣甫及十年已就支倚文炤來守是邦大以為缺於是拓址使袤撤材使新寢以妥靈堂以秩禮庭除既闢垣宇益崇章文懿公祠嘉靖浙江通志祀禮部尚書章文懿懋嘉靖元年建金華府志在天福山南文懿公宅傍邵寳章文懿公祠記先生夀終於蘭谿里第遺言勿干身後㤙澤明年嘉靖紀元春三月將葬見素林公以應召過蘭谿弔且哭焉曰古者鄉先生殁祭於社禮也先生天下士以義而專祠之不亦可乎於是金華郡守王侯九峯語其貳張侯齊侯鳩工聚材即其第之西南營焉中為堂四楹前為門如堂之數兩序傍翼繚以周垣中立神主而顔其門曰楓山先生祠堂忠義節孝祠忠義祠在學宫頭門内節孝祠在城六坊朱家鎮頭國朝雍正四年知縣胡啓敏奉文建東陽縣先農壇在東郊一都一啚國朝雍正五年知縣龎璽奉文建立壇宇并置耤田四畝九分社稷壇東陽縣志在西關外二里六十四都名社山頭風雲雷雨山川壇萬厯金華府志在縣西南三里邑厲壇金華府志在縣西北二里城隍廟東陽縣志在縣治東五十九步宋紹定三年勅賜廟額端平三年勅封顯應侯俗以五月十五為城隍誕辰曹冠東陽縣城隍廟記郡邑之祀城隍其來尚矣元豐辛酉知縣施構因衆重修宣和壬寅邑長裘移忠度材再建多厯年所官於兹者欲撤而新之未遑也淳熙十六年縣丞三山黄起宗令尹濮邸趙善讚協誠勸助經始於夏告成於冬命之以祝史贊之以牲牷至誠感通洋洋如在爰紀嵗月以誌於後興孝祠萬厯金華府志在縣西祀孝子斯敦許孜許生馮子華應先唐君祐東陽縣志宋端平二年知縣林嘉會建二孝子祠金華府志在縣西南三十步祀斯敦許孜宋政和二年知縣張述建申屠將軍廟金華府志在懐思鄉祀宋邑人申屠大防許府君廟萬厯金華府志在縣南四十里祀宋邑人許瓊柳貫許府君廟記府君晉許孝子孜之裔孫諱瓊字世英宋宣和間盜兵偪城府君以戰殁屍僵立如生猶能載所乗馬馳歸家明年降於鄉曰為廟祀我巖關之陽自巖關有廟二百餘年於兹府君之有徳於民與民之有報於府君誠之至而禮之盡也舊廟位置湫隘八世孫熹常議改作未及為而卒於是其弟熊取為己任而熹子怡尤能承志以相其成焉冲素處士祠萬厯金華府志在縣西二里許祀邑人張志行許應隆冲素處士祠記勅號冲素處士張志行窮理樂道三聘咸辭具輔世之材藴光養浩王侯不事髙宗以莘野南陽待之其人其行非他可及者也淳熙中邑令曾賁合祀於學今奉特祀卜地鳩工伐木於山取材於原不閲月而廟成吕祖謙冲素處士銘處士諱志行字公擇八行先生州里之所通稱冲素處士朝宁之所旌號也為之銘曰粹然之行奕然之文三辭徴辟天子不臣嘉遯林泉富貴浮雲窮理樂道絶𩔖離羣操堅冰石徳達穹窿先正典型昭代儒宗遺祠翼翼流水淙淙範模百世髙節清風李正節侯祠金華府志在縣西祀宋蘄州刺史李誠之宋贈正節侯廟勅蘄春介在疆塲所恃以為險者六關也朕命藎臣往專備禦之責而措置踈畧負我使命爾誠之儒生之望分符守蘄以孤城而攖敵鋒蓋亦難矣慷慨激烈盡其命義闔門死難朕甚痛之乃加論譔仍躐崇階爵之通侯謚曰正節廟食兹土方豪李正節侯祠記李公誠之盡節於嘉定十四年三月十七日事聞朝廷詔立廟額曰褒忠明年東陽令陳仲侅建廟於邑之西橋頭淳祐問縣令趙崇堅又以没官田二十畝充祭品明正統間廟燬於寇正徳甲戌按察使李承勛及叅政顧璘郡守劉􅉅屬前令胡効才重葺之適内召功未畢而李公邦直以嘉靖五年至捐俸興復李春榮褒忠廟詩半壁烟塵蹙孤忠日月明當時輕一死百世凛如生廟貎青山古源流碧澗清平生亦許國不敢墜家聲忠勲祠東陽縣志在縣西明萬厯六年兵備道徐栻建祀常熟縣死事太僕卿王公鈇二十年郡守陸淳申請祭典嵗以二月戊日致祭二十四年縣令郭一鶚修復為之記忠義節孝祠忠義祠在縣東學宫西隅節孝祠在城隍廟西國朝雍正三年知縣龎璽奉文建義烏縣先農壇在東郊三都一啚井頭趙地方國朝雍正五年知縣韓慧基奉文建立壇宇并置耤田四畝九分社稷壇義烏縣志在縣西迎恩門外一百步風雲雷雨山川壇義烏縣志在縣南四里邑厲壇金華府志在縣西北半里城隍廟義烏縣志在縣西北儒學右明洪武三年知縣張永誠建萬厯二十四年知縣周士英重修國朝康熙二十二年知縣辛國隆重修建鐘鼓樓永慕廟萬厯義烏縣志祀秦孝子顔烏在縣東四里孝子墓左宋端平二年右丞相喬行簡奏賜今額景定三年縣令李補始作廟義烏縣志明洪武後屢修屢廢萬厯元年知縣梅淳即故址重建以宋孝子樓藴明孝子龔曇配享春秋二祭又設顔公父神位於寢室祭之日并奠孝馮祠萬厯金華府志在縣南四十里唐馮子華孝親廬墓有靈芝白鹿之祥朝廷表其門號孝馮立祠祀之順應廟崇禎義烏縣志在縣東北四十里清潭山下神姓樓兄弟三人有智勇為鄉里雄唐末黄巢賊衆經其地率弟及鄉人禦之戰不勝恥為賊得遂自刃二弟相繼戰没衆徳之各於没之地廟祀銅坑與普濟院前乃二弟廟也宋熙寧間賜額忠賢祠金華府志在縣治後舊名四賢祠明嘉靖二十二年建祀宗忠簡澤徐文清僑黄文獻溍王忠文褘萬厯二年巡按御史蕭廪増入龔忠愍泰改名忠賢梅淳忠賢祠記予忝令義烏於忠愍公宜建專祠以祀而必合祀於四賢者何遡邑之先若宗忠簡之憂憤徐文清之剛毅黄文獻之學術王忠文之貞烈彰彰較著人皆仰之今考忠愍自少苦志力學從宋潛溪先生門人宗思睿遊源流正矣仕洪武間㢘慎勤敏人用畏服功業偉矣事建文為都給事中敷陳治道議論剴切靖難師渡江知國事不可為遂與其妻訣自投城下以死節義著矣嗚呼四賢往矣微龔公孰與繼美哉五公雖生有先後事有常變身有死生然賢者必忠忠者必賢同歸於道而已以之合祀誰曰不可宗忠簡公祠義烏縣志祀宋宗澤初在滿心寺内元時建明正徳十三年徙寺為學宫祠廢隆慶五年知縣歐陽柏即二都舊祠增葺以祀黄溍宗忠簡公祠記義烏滿心寺鐘記宋名臣忠簡宗公之文也石毁弗存已久寺僧曰直曰謐實公七世諸孫直先示寂謐今以甲乙之傳嗣為住持爰撤其衣盂之資購田若干畝祠公於西廡探家集得舊記重刻諸石而俾某志於下方公墓在鎮江之京峴山而立廟於鄉郡從祀於邑庠並著於有司之彛典謐之生上距公殁二百餘嵗且去家為浮屠而不忘乎賢其賢親其親祠事之興又禮之以義起者也某是用序次其作始之自焉徐文清公祠嘉靖浙江通志在縣南四十里清徳鄉祀宋寳謨閣待制徐僑萬厯義烏縣志宣徳初嗣孫徐季徳率族人又創祠靜安里橋西黄文獻公祠明一統志在義烏縣治西祀元黄溍王褘黄文獻公祠記公以精純之學羽翼聖學以典雅之文黼黻人文誠一代之儒宗百代之師表義烏乃其鄉邑建祠致祭於禮為宜縣令胡侯既裒公文集鋟梓以傳復因門人里生之請掄材度址圖作祠事擇吉壤繡湖之東為祠宇三楹而肖像其内癸卯正月甲辰落成之年月日也宋濂黄文獻公祠記烏傷黄文獻公方妊母夫人夢大星煜煜然墜於懐及其生也繡川之水為之一清是蓋星靈川祥所融凝而成者故公遂以文章鳴一時侍講經筵闡明聖學掌宣皇制黼黻太平人文化成之效於斯為盛是則公雖薨而其耿耿不没者固已遊神太清在帝左右而祠之不設非闕典歟濠梁胡侯來為縣築祠於繡川之濵堂庭穆如門廡清謐像設有嚴丹雘焜燿而公之靈爽永有攸棲矣初祠之成同門友王君褘既為紀其嵗月公之子弟又請濂詳其事於石以昭侯之善與此祠相為終始按春秋書事之法辭有重複而不殺者因竊取義而為之記王忠文公祠金華府志在縣南青巖山祀明王褘吳寛王忠文公祠記明興以文章用於時者多婺産若學士宋公景濓待制王公子充尤稱傑然者二公之在館閣惟以文章為事人以文士目之久矣一旦王公奉使西南裔而仗節以死然後知公之學有用也正統六年贈公學士謚忠文曽孫進士曰汶者作家廟奉公為百世不遷之祖龔忠愍公祠義烏縣志祀明都給事中龔泰在城南河濵商輅龔忠愍公祠記忠臣龔君浙之義烏人投水死節其子永吉厯官禮兵二部侍郎尋轉南京大理寺卿追惟厥考與孝孺方公同節悵然遐思成化丙辰春爰命冡子潼掄材度址建祠於南濠之濵構寢六楹夾以兩廡樹以中門割田四十畝以供祀事落成之日永吉屬予勒辭廟石君字叔安厯任戶科都給事中壬午六月靖難師渡江令公巡城公與其配傅訣曰國事至此不可為矣吾分必死爾第賫勅攜幼以歸急則俱溺於井毋自辱也須臾火起内庭公馳赴之道遇兵校執送金川門驗非奸籍中人釋之公遂自投城下而死是月十三日也厥後賜謚忠愍因扁其祠曰忠愍公祠崇徳褒功祠萬厯金華府志在縣南馬塘山之原成化八年建祀侍郎龔永吉忠義節孝祠忠義祠在縣北儒學之左節孝祠在忠義祠左國朝雍正四年知縣韓慧基奉文建永康縣先農壇在東門外東郊國朝雍正六年知縣鄔銓奉文建立壇宇并置耤田四畝九分社稷壇永康縣志在縣西二里西石山風雲雷雨山川壇永康縣志在縣東三百步邑厲壇萬厯金華府志在縣北一里城隍廟永康縣志在縣西百步宋建元因之明洪武二年知縣何𢎞道重建正統十四年燬於寇景泰三年知縣何宗海重建故鄉廟萬厯金華府志在縣西二里鄉民為梁縣令何炯唐知縣周某王某建周王名逸俗呼三長官祠蓋久任而遺愛者赫靈廟嘉靖浙江通志在縣東方巖山祀宋兵部侍郎胡則胡廷直赫靈廟記廷直四世從祖尚書兵部侍郎保定公於婺州為鄉里婺之人廟公於方巖嵗時奉祭甚謹紹興三十一年廷直為建安縣丞請於上賜廟額曰赫靈明年二月命下廷直跪拜伏讀至於感泣謹齋祓稽首而記之先保定公由儒業登顯仕八典藩郡為良二千石七按錢穀為能刺史出入禁闥為名從臣開國建功生有榮焉始公被天子知遇申命進秩乃奏免衢婺民身丁錢到於今受其賜自公之薨謀報無從即絃誦之所廟而食之歿有靈焉公於平生之志可謂盡矣宣和中盜起清溪保險方巖弄兵踰月王師不能下首惡夜夢神人飲馬於巖之池是池盜實怙之以濟朝夕平明往視已涸矣其徒駭亂大兵一臨即日平蕩由是邦人事公有加於他日若水若旱若疫若癘有求無不應有禱無不答赫靈之賜於義為大公䝉報祀之典可謂至矣先是賊平廉訪使王導以聞封佑順侯倉卒不審止用方巖神奏而逸其名氏衢婺之人凡厥祀事版祝旗幟皆實公為佑順侯從舊也繼而闔邑之士狀於有司廷直於公為孫也詎宜緘黙於是詳述始末力請正名自天發號繄公之神載忻載享顧廷直才不劭不敢自任論譔亦庶幾由此以明其善之萬一也麗澤祠萬厯金華府志在縣東北四十里夀山祀宋朱熹吕祖謙陳亮明王守仁姚文炤忠義節孝祠忠義祠在學東射圃故址節孝祠在縣治西義學故址國朝雍正五年知縣張啓禹奉文建武義縣先農壇在東鄉童爐地方國朝雍正六年知縣楊維清奉文建立壇宇并置耤田四畝九分社稷壇正徳武義縣志在縣西書臺門外風雲雷雨山川壇武義縣志在縣南二里一都雙路亭之下邑厲壇萬厯金華府志在縣北二里城隍廟正徳武義縣志在縣西一里許宋建炎三年建明洪武五年知縣徐嵒重建𢎞治元年修國朝康熙二十七年燬縣人募建正殿知縣江畱篇重建後殿任公廟正徳武義縣志在縣西一里長安堰上唐光化元年邑人任畱築堰引水溉田萬餘畝嵗久堰廢宋慶元四年邑人髙世修葉之茂修復仍立任公祠於上配以五代周鮑二使君蓋亦有功於堰者呂成公祠金華府志元在儒學明倫堂西明正徳十一年縣丞潘棠撤東岳神像以祀公武義縣志廟廢移主道院萬厯十九年知縣陳大烈復建於嶽廟之西都司廟武義縣志在縣西二十里祀明都指揮使脱綱守禦千戶周義與陶忠烈同禦栝寇鏖戰殉難土人立廟祀焉王孝子祠武義縣志在東嶽宫左祀明孝子王世名後圯移建五聖堂春秋二祭傳詳孝友忠義節孝祠忠義祠在儒學右節孝祠在北門大倉左國朝雍正四年知縣楊維清奉文建浦江縣先農壇在東門外一都二保地方國朝雍正六年知縣袁皥奉文建立壇宇并置耤田四畝九分社稷壇萬厯金華府志在縣西北三里趙汝騰重修社稷壇記宋紹定初令李知退昉舊址壇土為壇後圮端平三年令鄭思聰易墠而甎之壇壝一新浦江縣志明萬厯四十三年知縣黎𢎞道重建風雲雷雨山川壇金華府志在縣西南二里明知縣黎𢎞道重建邑厲壇浦江縣志在社稷壇之東北城隍廟浦江縣志在縣南隅儒學舊址宋元符二年知縣周彦明建新廟在縣南百步明正徳七年知縣鄒輗遷今所國朝順治五年知縣韓文明重建正殿并兩廊靈濟廟金華府志在縣南十里祀白石潭龍王五賢祠嘉靖浙江通志在縣學文廟西南元至正十年建祀陳孝子太竭梅助教溶梅尚書執禮王少卿萬柳待制貫鄭濤書五賢贊後初縣學有祠祀節愍梅公忠惠王公及凡宣勞於學者皆設立其中達闕教諭祝君應昇圖所尹蕭侯文質以其混淆也屬以易之應昇乃於廟西南偏别闢一祠以奉公而益以孝友陳公文學梅公待制柳公通號曰五賢祠且懼後生小子不知五賢之詳復請戴君良為之贊刻石祠中黄大夫廟萬厯金華府志在縣西二十里祀黄仁環浦陽人物記宋建炎元年山賊何三五作亂仁環以計擒賊官至訓武郎縣人感徳立祠祀之二賢祠萬厯浦江縣志宋紹定知縣李知退建祀梅節愍吕成公李石二侯祠嘉靖浙江通志在縣西宋會稽李知退新昌石孝陔相繼為縣令士民懐而祠之元至正十二年重建宋學士祠金華府志舊在青蘿山後遷儒學南薛應旂宋學士祠記潛溪宋先生生於浙之浦江卒葬於蜀之成都成都則既有祠祀矣浦江顧獨缺焉百八十餘年莫有為之舉者迺髙淳韓叔陽氏出知是邑之二年為嘉靖庚戌建祠祀之仍樹碑以紀成事王琥過青蘿山宋文憲公祠詩乞恩纔許致鑾坡魚水雲龍竟若何一代衣冠周禮樂百年盟誓漢山河秋風歸雁衡陽少夜月啼鵑劍水多回首故鄉何處是蕭蕭遺像守青蘿忠義節孝祠忠義祠在學宫名宦祠側節孝祠在東門外元武殿側國朝雍正四年知縣袁皥奉文建湯溪縣先農壇在東門外國朝雍正六年知縣任之俊奉文建立壇宇并置耤田四畝九分社稷壇萬厯金華府志在縣西北二里風雲雷雨山川壇萬厯金華府志在縣南一里邑厲壇金華府志在縣北半里城隍廟湯溪縣志在縣西儒學右經始修葺莫詳國朝康熙間知縣柯弼鼎新之近年寢殿傾圯邑紳張可元重修子祖年又捐田收息為久逺繕修之費毎嵗四月望後一日相傳為神誕辰白砂昭利廟金華府志在縣東三十里吳黄武六年建以祀漢盧文臺杜旟白砂昭利廟記白砂之堰三十有六首銜輔倉尾跨古城蔓衍磅礴其為田不知幾千萬畝民受其利無有終極而白砂之靈貺侯實主之侯姓盧氏漢末討赤眉有功功嘗顯矣而其詳不可得聞也婺之南有山名輔倉者林麓蔥蒨水石潔清侯墾田以居號盧坂既殁葬焉因遂廟食其地吳黄武六年三月大水廟之香火漂至白砂居民范氏請諸官官請諸朝吳王命諸葛恪覈其故不誣乃許建廟赤烏元年旱鄉民謀開堰引水以灌稻田鉏畚所及纔三十步巨石贔然隱地役夫斂手乃禱於侯一夕大雷震以雨空中洶洶若喊聲迨明石已開三十六堰實基於此唐僖宗封武威侯錢氏有土封保寧侯政和二年守袁灼有請封靈貺侯于石白砂廟詩百戰功收老故山寒溪怒湧白沙泉雲臺不與四七將廟食可傳千萬年香冷誰能然漢大水流空自灌吳田愚民不識前朝事浪説神能駕鐵船侍郎廟萬厯金華府志在縣北六里祀唐侍郎徐安貞靈應廟舊浙江通志在縣南十里地名山口祀陳府君宋慶元間封威惠侯二賢祠湯溪縣志在大安殿側祀宋楊船山王魯齋陶忠烈公祠湯溪縣志祠有二其在縣治者已廢此為公死難之所地名山口王直陶忠烈公祠記忠烈祠者故浙江按察副使陶公成之祠也正統戊辰冬處州麗水諸縣盜起巨猾陳諫胡等為之倡金華屬邑多邇賊巢數被害而蘭谿又為金衢嚴杭要地蘭溪有警則諸郡皆震公時為僉事當禦寇之任用計畧擒殺賊黨數百人計日平定時有媢嫉之者恐其成功多阻之而賊勢復盛乗間來攻柵公驅兵出與戰賊因風縱火衆大潰而公遂遇害時景泰元年五月十七日予聞之危身奉上曰忠功之光且盛者曰烈公所自立如此非誠所謂忠烈者歟蘭谿諸縣吏民相與頌公之徳不置咸請立祠以奉公謹按陶公遇難時未設湯溪縣尚屬蘭地故祠記稱蘭谿恩徳祠金華府志在儒學之右隆慶元年建祀明知縣劉桐傳詳名宦忠義節孝祠忠義祠在縣城南門節孝祠在縣城西門國朝雍正五年知縣任之俊奉文建浙江通志卷二百二十三
