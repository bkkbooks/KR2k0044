body:
  text: 浙江通志卷二百三十七陵墓三湖州府烏程縣吳文帝明陵崇禎烏程縣志在西陵山吳志孫和𫝊皓追諡父和曰文皇帝改葬明陵置園邑二百家令丞奉守吳興掌故烏程之西陵乃吳太子葬處郡城在其南故徃徃以陵陽名之許渾詩雲樹滿陵陽李涉詩陵陽夜晏使君筵皆指此宋牟巘寓居城南因名其詩曰陵陽集今人遂不知有陵陽之名何也吳景帝鈕皇后陵崇禎烏程縣志在弁山北見顔魯公石柱記朱彞尊石柱記說考吳志孫休止有朱夫人並無鈕后唯陳武帝后章要兒本姓鈕永定元年正位中宫後諡宣太后祔葬側萬安陵建康實録云萬安陵在縣東南古彭城驛然則鈕后之葬亦在金陵矣陳書章皇后父景明追封廣徳縣侯母蘇拜安吉縣君合葬吳興竊疑魯公所紀鈕皇后陵殆其父母墓爾漢大司馬丘騰墓萬厯湖州府志在縣西十八里趙宋華表尚在西吳里語漢光武初起義南陽歴公卿二千石累遷大司馬卒葬烏程縣西崇禎烏程縣志騰父俊平帝時持節安撫江淮王莽亂遂留居烏程漢有兩邱騰其一順帝時官九江太守漢太尉施延墓崇禎烏程縣志魏黄初中詔曰故漢太尉施延等並立忠貞之節咸修清白之行邪佞所讒禍及其身若有遺嗣宜顯舉之又令有司繪像以祀縣西二十四里有延墓𫝊詳寓賢吳蕪湖侯太史慈墓崇禎烏程縣志在法華寺東之石塢一名石斗山吳志本𫝊慈字子義東菜黄人孫䇿時拜折衝中郎将還為建昌都尉治海昬卒謹按顔真卿石柱記載有吳丹陽太守蕪湖侯太史慈墓然考洪容齋二筆云太史慈葬於新吳今洪都奉新縣也邑人立廟敬祀乾道中封靈恵侯則墓不在烏程明矣但真卿唐人所記不應無據依縣志存之以俟考晉侍中羅含墓崇禎烏程縣志見石柱記晉書本𫝊含字君章耒陽人初為郡功曹轉州主簿屢遷廷尉長沙相致仕還家階庭忽蘭菊叢生人以為徳行之感年七十七卒晉黄門侍郎潘尼墓太平寰宇記在縣東十里晉書本𫝊尼字正叔中牟人歴黄門侍郎散騎常侍侍中秘書監永嘉中遷太常卿欲還鄉里卒於塢壁謹按羅含潘尼本𫝊及他書並無卜葬湖州之說然顔真卿樂史所書似非無據存以俟考晉中大夫劉造墓崇禎烏程縣志在西余山西吳里語僧道孜作夀藏乃得古冢冢刻字云晉咸康間中大夫劉造并妻管氏同葬於此宋晉陵太守丘傑墓輿地碑目吳興丘氏墓碑在烏程縣霅水鄉淋谷考傑劉宋時為晉陵太守烏程人未成童時鄰人胡氏築牆侵其界傑夜移籬退三尺胡氏慙亦退三尺遂成大路至今稱為丘路卒葬於此宋尚書右丞丘淵之墓萬厯湖州府志在縣西北十四里𫝊詳文苑齊車騎長史丘靈鞠墓𢎞治湖州府志見顔真卿石柱記今不詳所在𫝊詳文苑梁中書侍郎丘遲墓輿地紀勝在霅水鄉淋谷元和四年立墓碑𫝊詳文苑能改齋漫録沈太虛侍郎言昔湖州有人𤼵古冢得碑乃南朝邱遲其言遲乃左史邱明之後然則邱明竟不姓左耶韻會邱姓出吳興河南二望風俗通曰魯左邱明之後稿簡贅筆亦云吳興邱墓一村之人皆姓邱有大碑刻其墓上稱左史邱明之後梁司空康絢墓崇禎烏程縣志在縣西北十三里陳五兵尚書庾宗墓烏程縣志在縣西北十四里唐丞相李紳墓輿地紀勝在裏山𢎞治湖州府志在縣南三十里乾寧三年立墓碑𫝊詳寓賢唐南康尉沈亞之墓崇禎烏程縣志在福山𫝊詳文苑杜牧弔沈下賢詩斯人清唱何人和草徑荒苔不可尋一夕小敷山下夢水如環珮月如襟唐進士龔軺墓吳興掌故在卞山南杜牧龔進士墓誌㑹昌五年十二月某自秋浦移守桐廬路由錢塘龔軺袖詩以進士名来謁舟中閱其詩有山水閒淡之思後四年守吳興因與進士嚴惲言及鬼神事嚴生曰有進士龔軺去嵗来此坐客館中若有二人召軺者軺命馬甚速如跨鞍馬驚墮地折左脛旬日卒予始了然憶錢塘見軺時徐徐如昨日因知尚殯於野乃命軍吏徐良改葬於卞山南去州城西北一十五里嚴生與軺善亦不知其鄉里源流故不得記大中五年辛未五月二日宋天章閣待制胡瑗墓明一統志在何山萬厯湖州府志元至元中墓為廣化寺所侵踣其碑總管郝鑑掘得所踣碑復其墓洪武中知縣孫成復加封樹成化中知府岳璿勞鉞累加修建嘉靖四年知府馮曽増置墓田西吳里語其子杭州察推志康亦葬於旁𫝊詳名宦牟應龍湖州路總管郝侯祠記安定先生葬於湖州何山至元間墓地忽為鄰僧所奪毁其瓦伐其樹碎其碑以絶省掃之路郝侯始至慨然曰守土之職風化是先先賢之墓未復事有大於此乎會經界法行有土者皆得自實侯躬率屬官徃諭以理僧知墓非寺地始歸之遂命甃其塋域繚以垣墉揆日之吉書偕同僚暨諸生行釋菜禮亷訪僉事薩勒迪黙色安定文昭公之墓八字刻石置之塜上侯名鑒字子明盧龍人張羽復墓序洪武間遣吏度民田僧乗計帳未定復詭墓為寺地四明孫侯成知縣事始𤼵其隠復加封樹前建亭堂三間以祀神旁為屋三間以棲守者上其事於朝詔下復宋元故事秩祀著為令湛若水胡安定先生墓田記嘉靖四年太守馮君曽始涖湖郡乃考圖志誓於里正曰其墓在何山麓者其守墓之田若干畆在某里某里者其悉以白余爾所不白則有恒罰於是胡氏之裔孫聨芳者以墓田見侵之狀白於府府盡得其狀田盡復而墓可守中丞陳公鳯梧至郡躬謁其墓視亭堂之圮壊命新之乃并重封其墓而增祀焉宋都官郎中張先墓𢎞治湖州府志在卞山多寳寺西𫝊詳文苑湖録陸振孫曰本朝有兩張先皆字子野其一博州人天聖三年進士歐陽公為作墓誌其一天聖八年進士則湖州人也志俱作康定初進士宋葉清臣母永安太君墓吳興掌故清臣欲葬其母夢有秀才来謁云松蒲落處即是穴翌日至弁山倪塢適有松蒲墮其前遂卜地於此宋進士知山隂縣陳舜俞墓𢎞治湖州府志在蘇灣𫝊詳循吏黄魯徳陳賢良墓詩何水東流繞九墩至今不解識真墳白牛曽踏風流路故老時時說隠君陸道乾過陳舜俞墓詩涇上何人跨白牛鷺飛鷗逐共優㳺春風短調梅花笛夜月髙酣瓠子甌一疏青苗天下計千年白簡史臣留篁墪舊跡存遺祀碧草黄雲古墓秋宋宗正少卿姚舜仁墓崇禎烏程縣志在趙村𫝊詳儒林宋崇信軍節度使葉夢得墓吳興掌故在卞山圓證寺左𫝊詳寓賢宋直學士諡文端費若墓嘉興歸安縣志在射村鹿苑寺後烏程縣志若字如川元符進士官直院學士充崇政殿說書紹興間賜葬宋清河郡王張俊墓烏程縣志在菁山石臺尚存𫝊詳名宦宋尚書左僕射沈該墓𢎞治湖州府志在縣西三十五里宋尚書右僕射朱勝非母墓崇禎烏程縣志在縣西三十五里西吳里語紹興三年四月二日朱勝非卜地於吳興華嚴山嘉㑹寺前葬其母夜夢十騎入山衣服錦繡鞍馬鮮華回旋寺前以一馬繫於林中餘復馳去次夕又夢有衣冠之士容狀甚偉跣其二足入寺厲聲言我定地寺有寄居石大順秀才亦夢之因請於朝以嘉㑹為墳寺改崇因薦福塜前起敞堂以夢馬扁云宋大學士陳與義墓𢎞治湖州府志在廣徳鄉上强里禮部侍郎張嵲撰墓銘𫝊詳寓賢宋少保諡文定葛邲墓崇禎烏程縣志在縣西南五十里𫝊詳名臣西吳里語烏程柵嶺有邲墓宋寳文閣學士諡文節倪思墓崇禎烏程縣志在縣西北一十五里𫝊詳名臣謹按紹興志云思晚愛浙東山水徙家㑹稽墓在餘姚賀溪附録俟考宋司封員外郎張祹墓吳興掌故在下山祹字聖休宋刑部尚書程公許墓萬厯湖州府志在縣南三十六里𫝊詳寓賢宋端明殿學士髙斯得墓烏程縣志在西崦𫝊詳名宦宋孝子曹清墓崇禎烏程縣志在西陽村𫝊詳孝友宋資政殿學士牟子才墓烏程縣志在菁山𫝊詳寓賢宋大理少卿牟巘墓𢎞治湖州府志在三碑鄉九里山趙子昻撰墓誌銘宋直學士劉一止墓萬厯湖州府志在澄静鄉上基山石柱猶存𫝊詳名臣元上元主簿牟應龍墓崇禎烏程縣志在三碑鄉𫝊詳儒林虞集隆山先生墓誌銘先生娶楊氏知邵武軍恪之女先十二年卒再娶程氏将作監繩翁之女男五人必逺必大必達必勝必昌女四人年七十有八泰定甲子五月乙酉葬於湖州烏程縣三碑鄉兊山之原銘曰學孰為博寳藏有作運化參錯掇拾偏駁欺世之怍文孰為雄江漢之東浩浩不窮補葺彌縫嘻嘻麤工有餘而藏不足而張我懐先生豈私其鄉斯文有𫝊五世不誣銘以信之不其逺乎明太常寺丞張羽墓吳興掌故羽潯陽人居于戴山東卒葬九里岡𫝊詳寓賢明工部尚書嚴震直墓崇禎烏程縣志在西塞山𫝊詳名臣嚴氏家乗先司空於壬午七月廿三日出都至九月十二日沒於山西澤州之館明年癸未正月十九日歸葬襄事忠誠伯茹瑺撰神道碑可據並無在雲南遇建文君吞金而死之說他如吾學編續藏書等所云槩不敢載九世孫祗辨明都御史陸矩墓烏程縣志在下菰城𫝊詳武功明刑部尚書諡莊懿閔珪墓吳興掌故在金蓋山𫝊詳名臣明處士孫一元墓吳興掌故在道塲山歸雲菴之東𫝊詳寓賢謝肇淛弔孫太初墓詩路入歸雲一徑幽青山落日滿松楸老僧廢寺瓢猶挂詞客荒墳草自秋九月空林聞蟋蟀百年殘碣上蝸牛共将盃酒澆千古腸斷滄江天際流明工部尚書諡恭靖蒋瑤墓崇禎烏程縣志在金蓋山𫝊詳名臣明兵部侍郎陸穏墓烏程縣志在汪家山𫝊詳武功明刑部主事唐樞墓烏程縣志在妙喜寺陳村𫝊詳儒林明工部尚書潘季馴墓烏程縣志在三墩𫝊詳名臣明修撰韓敬墓烏程縣志在仁王山𫝊詳文苑明徽州府推官温璜墓烏程縣志在道塲山𫝊詳忠臣明大理寺卿謚忠介凌義渠墓烏程縣志在驥村北湖州知府吳綺捐俸買地𫝊詳忠臣明御史吳振纓墓吳氏家譜在棲賢山楓樹嶺後明知廣昌縣姚舜牧墓烏程縣志在潘店之金斗山𫝊詳儒林歸安縣吳大將軍朱治墓𢎞治湖州府志在縣南二十里傳詳武功吳當陽侯施績墓萬厯湖州府志在縣南十六里𫝊詳武功吳九江太守姚渠墓萬厯歸安縣志在縣南六十里吳蕩寇將軍程普墓𢎞治湖州府志在縣東南十九里吳志本𫝊普字徳謀右北平土垠人從孫堅征伐堅卒復隨孫䇿以功拜蕩寇中郎将領零陵太守䇿卒與張昭等共輔孫權領江夏太守遷蕩寇将軍謹按江西通志程普墓在瑞昌縣安泰鄉桂林橋西南舊志所載未知何據宋南郡太守丘道䕶墓名勝志在縣東南一十九里宋松陽令鈕滔墓成化湖州府志在縣東十里西吳里語滔吳興人舉孝亷為松陽令蓋晉人而仕於宋者青州刺史董知達墓未詳時代𢎞治湖州府志在縣南六十里宋秀安僖王子偁墓𢎞治湖州府志在菁山宋史新編子偁居秀州髙宗選子伯琮育宫中子偁累官左朝奉大夫致仕卒時伯琮為普安郡王解官持服既為太子加贈太師中書令封秀王諡安僖配張氏封王夫人光宗立始即湖州秀園立廟奉神主如濮王故事宋嗣秀王諡憲靖伯圭墓萬厯湖州府志在菁山宋史新編孝宗兄伯圭字禹錫厯知台州明州有政績淳熙中自安徳軍節度使充萬夀觀使又封滎陽郡王至少傅光宗遷至太保封嗣秀王後判大宗正事超拜太師寧宗詔贊拜不名卒追封崇王諡憲靖宋張文剛墓吳興掌故在鳯凰山王安石張常勝墓誌常勝烏程縣人名文剛好學能文孝友順祥再舉進士不第年二十七卒熙寧六年二月五日葬於鳯凰山曽祖任祖維贈刑部侍郎父先尚書都官郎中致仕君妻予從父妹也故君從予學宋户部侍郎趙與訔墓𢎞治湖州府志在車蓋山子昻父也子昻撰阡表今石柱猶存西吳里語郡城南石柱頭是也宋資政殿學士牟子才墓𢎞治湖州府志在菁山端明殿學士髙斯得撰墓銘𫝊詳寓賢元亷訪