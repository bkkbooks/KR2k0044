body:
  text: 浙江通志卷一百二十職官十國朝官制文職上總督部院巡撫都察院大清會典都察院右都御史右副都御史右僉都御史俱不専設但為直省總督巡撫兼銜遇補授應兼職銜吏部議擬具題請旨要皆因事設裁隨地分并厯年員額不一總督浙江等處地方軍務兼理糧餉一員康熙八年裁九年復設二十三年改併福浙總督雍正五年以浙江巡撫臣李衛升授浙江總督兼兵部右侍郎六年加兵部尚書晉太子少保十年以安徽巡撫臣程元章升授浙江總督仍兼兵部右侍郎其福浙總督專轄福建一省十二年冬仍設福浙總督巡撫浙江等處地方提督軍務兼理糧餉一員雍正五年以浙江巡撫授為浙江總督兼兵部右侍郎管理巡撫兼右副都御史事十二年冬浙江總督臣程元章以總督銜專管巡撫事觀風整俗使浙江等處觀風整俗使右僉都御史一員雍正四年內閣九卿奉上諭専遣一官前往浙江省問風俗稽察姦偽勸導懲治務使士庶歸於謹厚以彰一道同風之治其應給何等之銜著九卿詳議具奏欽此欽遵會議得唐貞觀八年置觀風整俗使分遣李靖等巡省天下觀風俗之得失今奉命前往浙江省問風俗稽察姦偽應授為浙江等處觀風整俗使以原銜兼都察院右僉都御史奉旨依議嗣於雍正八年奉旨浙江風俗已漸改移又有總督李衛善於訓導不必再遣觀風整俗使欽此停差提督學政提督兩浙等處學政一員大清會典順治九年題準提學官須正已潔操矢公矢愼務得真才不許曲徇情面考試生員必嚴加校閲童生入學遵定名數考取或遇人才偶乏寧缺額毋濫收又題準提學奉敕專督學政各撫司官不許侵伊職掌行事提學巡厯所屬不許泛受民詞嵗科兩考定以三年內報完十八年議準提學有積習十弊嗣後考核時俱注剔除十弊字樣方許回院大清會典康熙二十三年議準提督浙江學政改用翰林官於侍讀侍講諭德洗馬中允贊善內開列職名送吏部具題巡按御史巡按浙江監察御史一員大清會典順治元年直省各差巡按御史一員一年一次更替七年題準巡按暫行停止八年題準復差巡按御史一年六個月差滿更替十年議準巡按概行停止十二年題準復差巡按於各部院衙門內不分新舊理事官郎中以下吏部都察院會同考選才能清廉品望素優者授為御史差遣十五年議準巡按所屬地方應巡厯周遍以訪民生利害有司賢否十八年議準停差巡鹽御史巡視兩浙鹽漕御史一員大清會典順治元年定兩浙差御史一員巡視鹽課八年題準巡鹽御史一年一次更差十年停差責成各運司督理鹽務十二年議準仍差御史巡視康熙六年議準巡視鹽課於六部郎中員外郎及監察御史內選擇賢能官各一員差遣八年議準停六部官員差遣仍差御史十年議準巡鹽御史不拘滿漢每處止差一員十一年議準停差御史稽察題報事宜歸併巡撫十二年議準巡撫事務殷繁鹽差勢難兼理仍差御史巡視雍正二年以副都御史謝賜履管理兩浙鹽務四年吏部以兩浙鹽務員缺開列具題六月初九日奉旨兩浙鹽課事務著巡撫李衛兼理九年交署總督李燦署理十年著總督程元章管理十三年七月奉旨兩浙鹽務交浙江布政使張若震管理織造府督理杭州織造一員大清會典杭州有織造局嵗織內用縀匹並制帛誥敕等件各有定式順治三年差官督理織造事務年終將用過工料錢糧造册報部奏銷十一年令制帛誥敕駕衣著各該布政司織解其餘暫停二年各差撤回十三年復差官督理織造順治初織造事務并錢糧俱屬户部管理八年題準織造事務歸工部管理康熙三年織造錢糧俱歸户部督關督理杭州北關一員大清會典本朝設關𣙜稅歷年建革不一有徴商稅者有徴船料者有兼徴船料商稅者所收課稅解歸户部凡差官監督順治元年題準各關專差户部漢司官一員照例撰給敕書精微批文四年題準杭州關差兼差滿洲漢軍漢官八年定各關專差漢官一員康熙四年題準各關稅俱交地方官管理北新關歸浙江布政使徴收稅課七年題準北新關改𨽻兩浙運使八年覆準各關仍令六部滿漢官員論俸掣差十四年議準選差賢能官員十八年覆準仍論俸差遣凡關差一年為滿到任回部俱量地逺近限定日期康熙五十五年奉旨杭關錢糧著交與該撫監收雍正七年總督臣李衛題準北關稅務交與杭州織造兼管督理杭州南關一員大清會典國家𣙜稅屬工部者一曰杭關遞年差官督理順治初差工部漢司官一員四年歸併户部八年仍歸工部十二年添差滿司官一員康熙四年歸併地方官管理八年復差滿漢司官六部兼差十一年題準杭關不拘滿漢止差司官一員康熙五十五年奉旨杭關錢糧著交與巡撫監收雍正七年總督臣李衛題準將南關稅務交與杭州織造兼管督理兩浙海關一員大清會典康熙二十四年覆準浙江省設滿漢海稅監督一員筆帖式一員康熙六十一年奉旨以巡撫兼理今俱由巡撫題委監收承宣布政使司大清會典布政司正官布政司參政參議布政使一員大清會典舊設左右布政使各一員康熙六年裁一員改稱為布政使經厯一員照磨一員理問一員廣濟庫大使一員廣濟庫副使一員舊有都事一員檢校一員副理問一員司獄一員寶源局大使副使各一員後裁大清會典參政參議舊設左右康熙六年止稱參政參議各省員數因事添革不一凡參政參議名曰守道督理全浙糧儲道一員大清會典順治初年設漕儲道一員專轄糧運十年裁漕儲道添設浙江糧道一員輪徴輪解凡督徴漕糧修造船艌僉運交兑督押鈐束領運官丁俱係糧道職掌别衙門不得干預十二年覆準漕運錢糧盡歸糧道專管十五年裁浙江糧道一員復設漕儲道一員十六年覆準漕儲道催重儹空糧