body:
  text: 浙江通志卷二百四十一經籍文章者道德之輪轅政治之黼黻也故載籍極博學者資以考信焉浙自越絶振竒述作之彥後先接迹謹依隋書經籍之例各分部録探微證墜文獻足徴匪特焜耀是邦亦以備史氏之採録云爾志經籍經部上易周易注九卷隋書經籍志吳侍御史虞翻注周易注十卷隋書經籍志吳太常卿姚信注周易注十卷周易爻義一卷隋書經籍志干寶撰梁有周易宗塗四卷册府元龜干寶為散騎常侍領著作撰周易問難二卷周易元品二卷注王弼易南齊書顧歡傳注王弼易二繫學者傳之易經要略沈麟士著見南齊書本傳周易問答一卷隋書經籍志揚州從事徐伯珍撰周易講疏賀瑒著見梁書本傳周易講疏十六卷隋書經籍志梁五經博士褚仲都撰集注周易一百卷七録侍中朱異撰續朱異集注周易一百卷孔子袪著見梁書本傳易總十五卷龍城録上元中台州道士王逺知作新注周易十一卷卦德通論一卷易數鈎隱圖一卷宋史藝文志劉牧撰紹興書目先儒遺論九事附續鈎隱圖一卷略例義一卷紹興書目黃黎獻撰室按宋史藝文志又有中記師隱訣一卷易傳浦陽人物記于世封著周易意蘊凡例總論一卷卦變解二卷宋史藝文志徐庸撰周易圖義二卷中興書目治平中葉昌齡撰胡一桂周易纂疏昌齡錢塘人周易講義長興縣志袁應中著字志行周易解括蒼彚紀何執中著易論成化新昌縣志石牧之撰易説赤城志羅適著周易新義二卷通志藝文略沈季長撰通鑑長編紀事季長錢塘人續解易義十七卷易傳十卷宋史藝文志龔原撰郡齋讀書志易續解義二十卷周易纂疏十五卷書録解題易講義十卷易解二卷書録解題沈存中撰易解延祐四明志曹粹中撰朱氏易赤城志米玠字寶臣臨海人有朱氏易行於世易傳十二卷中興書目陳禾撰卷按宋史陳禾傳作九易説經義考王升撰泊宅編升字君儀居嚴州烏龍山讀易老人解説十卷書録解題李光泰發撰易小傳六卷宋史藝文志沈該撰易説汪應辰王莊敏墓志金華王師心與道著周易玩辭十六卷宋史藝文志項安世撰易説十二卷變卦天道大備書八卷又五卷變卦纂集一卷宋史藝文志林倏撰易解二卷金華章服著見陳亮章公德文行狀易論十二卷易説十卷紹興府志王義朝著字國賓麗水人家上虞易傳一卷萬厯杭州府志紹興中錢塘關注子東著易義續文獻通考喻樗著周易講義九卷宋史藝文志夏休撰周易窺餘十五卷書録解題金華鄭剛中亨仲撰易説萬厯金華府志徐艮能彥才著周易圖説萬厯紹興府志黃開必先著艮園易説永嘉諸葛説夢叟著見陳傅良諸葛説行狀易説二十卷魯訔著見周必大魯季欽墓志易傳一卷崇禎烏程縣志芮曄著易索隱經義考三衢柴翼鴻舉著二五君臣論一卷讀書附志胡寅明仲閭邱昕逢辰二侍郎之論也姓譜昕麗水人周易解微三卷宋史藝文志徐畸撰易通旨嚴陵志何逢原著字文瀾分水人周易解説續文獻通考何逢原撰王十朋何公墓志字希深溫州人古文周易十二卷薛季宣著見陳傳良薛公行狀周易啓蒙𢎞治衢州府志余嶸著復齋易説六卷內閣書目趙彥肅著慈湖易解十卷易學啓蔽經義考楊簡撰沙隨易章句十卷外編一卷占法一卷古易考一卷書録解題程迥可久撰周易解石墩著見朱子石子重墓志讀易管見正德蘭溪縣志邵囦著讀易記三卷萬歷義烏縣志徐僑撰古易一卷書録解題著作郎吕祖謙伯恭所定館閣書目以為託伯恭之名朱子古周易跋古文周易經傳十二篇東萊吕祖謙所定而音訓一篇則其門人金華王莘叟所筆受文獻通考古易音訓共十四卷經義考東萊易説一卷讀易紀聞一卷周易會通經義考葉味道撰易説五卷義烏人物志陳昭著字襲明易學指要成化四明郡志史彌大著易訓三十卷宋史藝文志倪思撰卷按經義考又有易説二易講義五卷金華賢達傳陳炳著字德先義烏人易訓傳奉化王時會季嘉著見陸遊王公墓志易説正德武義縣志楊大法著字元範周易述釋一卷宋史藝文志葉適撰周易講義一卷宋史藝文志商飛卿撰館閣續録飛卿字翬仲台州臨海人易説三卷宋史藝文志趙汝談撰易説南雁蕩志林應辰著周易總説二卷書録解題戴溪撰易説浦陽人物記王萬著字處一易説舉要續文獻通考朱質撰萬歷義烏縣志質字仲文易説宋濓葉秀發傳字茂叔金華人所著有易説易解赤城志葉皆著字孟我臨海人易解一卷成化四明郡志髙元之集易解續文獻通考徐雄著萬歷金華府志雄字子厚東陽人易説指圖十卷續文獻通考王宗道撰嘉靖寧波府志宗道字與文奉化人易原三卷聚樂堂藝文志楊忱中撰萬歷金華府志忱中字德夫義烏人易説易林成化四明郡志胡謙著字牧之奉化人周易説五卷會稽續志黃度著字文叔易翼傳二卷宋史藝文志鄭汝諧撰周易直説正德蘭溪縣志徐相子才著趙與訔序周易筮傳周易纂疏湯建著字達可號藝堂先生溫州樂清人淳熙四年刋於郡齋周易説約八卷周易或問四卷周易續八卷周易指要四卷宋史藝文志趙善湘著警心易歸安縣志孟珙著六十四卦各繫以辭象爻説二卷讀書附志武林吳準齎如愚著館閣續録如愚字子發臨安府人三易備遺十卷南雁蕩志朱元升著易傳經義考戴仔撰姓譜仔字守鏞永嘉人融堂周易釋傳二十卷續文獻通考錢時撰古易考又輯周易鄭注一卷經義考王應麟撰周易家説萬歷溫州府志戴侗撰東嘉姓譜侗字仲達仔弟易外傳圖説五卷方逢辰著見黃溍蛟峯先生阡表周易大義又周易卦贊續文獻通考時少章撰大易體卦五十卷括蒼彚紀季可著字處仁龍泉人易釋二十卷成化四明郡志舒滸著字平叟周易輯聞六卷易雅一卷筮宗三卷焦氏經籍志趙汝梅撰周易傳義附録十四卷經義考董楷撰字正叔台州臨海人周易會粹赤城新志臨海楊明復著易義指歸四卷寧海縣志陳廷言著易心三卷萬歷寧海縣志王愷著易統括蒼彚紀劉贊著遂昌人易解樓鑰江公墓志泳字元適世居衢之開化易中庸皆有解周易管見括蒼彚紀宋田君右著縉雲人易説經義考東越馮大受撰古易集傳十二卷餘姚縣志楊子祥著字吉甫讀易管見五卷周易纂疏孫嶸叟著會稽人咸淳丙寅倅新安刋於郡齋易注萬歷溫州府志戴懿撰易衍二卷續文獻通考何夢桂撰易究十卷經義考史蒙卿撰字景正鄞人易學蠡測經義考慶元府學教授魏新之著門人王德先演而傳之嚴陵志新之字德夫桐廬人周易互言總論十卷金華先民傳石一鼇撰黃溍石公墓表字晉卿義烏人周易重注九卷廣贊八卷萬歷溫州府志鮑極撰易經集説萬歷崇德縣志衛富益撰易審門八卷成化新昌縣志俞浙著字季淵易學啓蒙發揮二卷萬歷金華府志何基撰讀易記十卷涵古易説一卷大象衍義一卷宋史藝文志王柏撰易象占赤城縣志臨海周敬孫著易象占二卷台州府志李祕書桂老著周易通義二十卷或問五卷發例三卷釋蒙五卷赤城會通紀黃超然著樵翁玩易十卷黃巖縣志方儀著河圖易象本義浦陽人物記陳訥升之著經進易解金華赤松山志朱知常字久道號此山本郡人以見聞集為一編進之於上讀易管見二十卷萬歷嘉善縣志衛謙撰大易法象通贊七卷又周易記玩又中天述考一卷續文獻通考鄭滁孫撰易經精蘊續文獻通考繆主一撰周易集説二十卷圖説一卷序例一卷烏程倪淵著見黃溍倪公墓志周易管窺金華縣志倪公晦撰字孟暘讀易類編經義考鄧文原撰易説袁桷曹侍郎墓志曹説侍講粹中曾孫撰易説為里人所竊今不存易志十卷天台劉莊孫正中撰見袁桷劉隱士墓志周易集注東陽縣新志陳士允著易學直指本原太平縣志盛象翁著易説續文獻通考袁桷撰成化四明郡志未脫稿中易成化四明郡志任士林撰讀易雜説二卷金華先民傳吳師道著讀易管見四卷經義考元龍興路司獄麗水潘弼良輔撰蓬廬學易衍義又象數發揮續文獻通考史公珽撰象數新説金華先民傳陳樵撰重正卦氣宋濓吾衍傳吾衍著易注𢎞治衢州府志魯貞著開化人字起元易集義蔣宗簡著見黃溍蔣君墓碣易經旁注經義考韓信同撰閩大紀信同字伯循會稽人居寧德周易圖説一卷授經圖錢義方撰經義考字子宜吳興進士易圖説一卷萬歷金華府志呂沫著字宗魯永康人周易記括蒼彚紀葉登龍著字梅林麗水人讀易十字樞十則經義考淳安夏氏撰古易略記嘉靖寧波府志豐寅初著古易筮法嘉靖寧波府志豐慶著大易舉隅三卷經義考鮑恂撰明寧王權更其名曰大易鈎元爻按嘉禾徴獻録恂又有易大傳義卦要義周易集解嘉靖金華縣志葉儀著易説尊鄉録詳節郭樌著易説台州府志徐森著周易參疑續文獻通考王亷撰周易圖解括蒼彚紀青田王潤孫著易學提綱四卷周易圖釋十二卷餘姚縣志趙謙著易學啓蒙述解二卷萬歷溫州府志朱謐撰字思寧永嘉人易説緒餘𢎞治紹興府志陳洙撰周易説四卷餘姚縣志王傑著大易枝辭又周易考次續文獻通考方孝孺撰大易明道圖又洛書弔白地理圖又文王八卦入用圖成化四明郡志黃潤玉著讀易日録嘉靖臨安縣志髙暐撰易經講義續文獻通考張文選撰萬歷溫州府志字士銓永嘉人觀易闕疑十二卷餘姚縣志毛吉著周易衍義括蒼彚紀包瑜著易説萬歷紹興府志胡鐸著字時振餘姚人讀易私抄尤氏藝文志楊守陳著易説兩浙名賢録吾􅒐撰易意括蒼彚紀金旅著六易天人合旨十卷嘉興府志補姚綬著易注又孤舟夜讀一卷甬上耆舊詩章珍著周易解疑嘉靖寧波府志洪貫著周易傳疏兩浙名賢録王啓著讀易私記四卷續文獻通考胡世寧撰周易羽義分省人物考章品著傳按金華先民傳又有周易集存疑周易本義音釋括蒼彚紀縉雲鄭禧著易經講意萬歷溫州府志童器撰讀易愚得一卷尤氏藝文志顧應祥撰易説一卷經義考張邦竒撰周易膚説括蒼彚紀縉雲陶標著讀易雜抄嘉靖太平縣志林天爵著易傳溫州府志陳至撰易經粹説溫州府志唐璧撰易經大旨四卷吕柟序蘭溪唐漁石先生提學閣中著讀易索隱萬歷壽昌縣志洪鼐著字廷器易原二卷經義考戚雄撰字世英金華人易經集解十二卷尤氏藝文志余本撰備按鄞縣志本又有讀易忘易經象訣萬歷金華府志胡東著字時震湯溪人易學四同八卷圖文餘辨一卷蓍法别傳一卷古易辨一卷尤氏藝文志季本撰學易記五卷焦氏經籍志金賁亨撰讀易管見又易義發明又卦贊常山縣志鄭伉著字孔明易圖説一卷經義考余誠撰字中之餘姚人周易注解萬歷紹興府志丁徴著字允中新昌人易經發明萬歷金華府志方太古著字元素金華人易經大旨兩浙名賢録戴圭著字秉誠鄞人讀易管見崇禎衢州府志周積著江山人周易筆意十五卷焦氏經籍志陶廷奎撰經義考會稽人周易義叢十六卷台州府志葉良佩著易經申義台州府志林貴兆著古易世學十五卷易辨一卷尤氏藝文志豐坊撰古易傳義兩浙名賢録豐熙著周易然疑長興縣志陳深撰字子淵易經講義兩浙名賢録蔣經撰字引之開化人大象義述一卷尢氏藝文志王畿撰易修墨守一卷尤氏藝文志唐樞撰易經記蒙經義考黃中撰括蒼彚紀字文卿遂昌人明易六十八篇東陽縣新志趙祖鵬著易箋萬歷紹興府志呂光洵著周易大義萬歷嘉善縣志袁仁著易疑四卷經義考陳言撰易原一卷台州府志陳錫著字元之臨海人周易通解又易圖萬歷紹興府志沈束著字宗約會稽人易學義林十卷焦氏經籍志顔鯨撰經義考鯨字應雷