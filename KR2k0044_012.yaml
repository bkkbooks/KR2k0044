body:
  text: 浙江通志卷十三山川五寧波府鄞縣附郭府山成化四明郡志在府堂後假鄮山為名父老相傳宋郡守胡矩取五方土積成此山以鎮郡城鎮明嶺成化四明郡志在郡治南一里三十步髙五丈乃郡之案山也宋天禧中李夷庚為守精地理之學以土增髙數丈後稍平焉袁士元鎮明嶺詩一嶺陂陀鎮四明無風無水自天成間看來往登瀛客仿佛金鰲背上行黌河舊浙江通志在府治西北百步四周學宫黌池舊浙江通志在學宫西昌黎泉鄞縣志在縣治南二里南倉基內紹興間郡守韓仲通建亭其上故名鄞縣城外山川四明山丹山洞天圖咏集在東海上山有四穴通光晷天宇澄霽望之一如户牖土人名之曰石窗故山以名木玄虛云天下洞天三十有六四明第九其號曰丹山赤水是也按山周三百八十里常有雲氣覆冒於中凡二十里不絶名曰過雲南曰雲南北曰雲北山隴行三十里有峰曰雲根石屋有瀑布如懸河旁曰潺湲洞後漢劉綱為上虞令棄官同妻樊雲翹居洞側得仙術上升後人立祠奉祀有榭曰樊榭梁隱者孔祐仍居之有鹿中箭來投祐祐為牧豢愈而去故祠側建鹿亭山之木曰青櫺其實味甘而不可猝破山之獸曰鞠侯唐咸通中謝遺塵隱此陸龜蒙皮日休往還各賦詩九首舊浙江通志縣西南百五十里由天台山發脈向東北一百三十里湧為二百八十峰中有三十六峰周回八百餘里綿亘鄞奉化慈溪及紹興之餘姚上虞嵊台之寧海諸境上有方石四面如窗中通日月星宿之光故曰四明山山為餘姚所轄東七十峰狀如驚浪郭璞言後五百年當立州治至開元置明州適符其言山西連脊起峰狀如奔牛曰奔牛山中有三朵峰鼎足以立漢張平子居焉其支山為杖錫為石樓為松巖為雷峰為大雷為雞籠為烽火樓為洞山為鱉山為西山孟郊送蕭鍊師歸四明山詩間於獨鶴心大於髙松年逈出萬物表髙棲四明巔千尋直裂峰百尺倒瀉泉絳雪為我飯白雲為我田靜言不語俗靈蹤時步天劉長卿遊四窗詩四明山絶竒自古説登陸蒼崖倚天立覆石如覆屋玲瓏開户牖落落明四目箕星分南野有斗挂􅉉北日月居東西朝昏互出沒我來遊其間寄傲巾半幅白雲本無心悠然伴幽獨對此脫塵鞅頓忘榮與辱長嘯天地寬仙風吹佩玉陸龜蒙四明山九題詩石窗石窗何處見萬仞倚晴虛積靄迷青瑣殘霞動綺疏山應列圓嶠宫便接方諸只有三峰客時來校隱書過雲相訪一程雲雲深路僅分嘯臺隨日辨樵斧帶風聞曉看衣全濕寒衝酒不醺幾回歸思靜倣佛見蘇君雲南雲南更有溪丹礫盡無泥藥有巴賨賣枝多越鳥啼夜清先月午秋近少嵐迷若得山頭住芝菌手自擕雲北雲北近陽川人家洞壑連壇當星斗下樓接翠微邊一半遙峰雨三條古井煙金庭如有路應到左神天鹿亭鹿亭巖下置時引白麑過草細眠應久泉香飲自多認聲來月塢尋路到煙蘿早晚吞金液騎將上絳河樊古榭何時築人應白日飛至今山客説時駕玉麟歸乳蒂懸松嫩芝臺出石微慿闌虛目斷不見羽華衣潺湲洞飛瀑瀉雲根潺潺萬古音似吹雙羽管如奏落霞琴倒穴漂龍沫穿松濺鶴襟何人乘月弄應作上清吟青櫺子山實號青櫺環岡次第生外形堅緑殼中味敵瓊英墮石樵兒拾敲林宿鳥驚亦應仙吏守時取薦層城鞠侯何事鞠侯名先封在四明但為連臂飲不作斷腸聲野蔓垂纓細寒泉碾玉清滿林遊宦子誰與作公卿孫元實遊丹山詩四明洞天居第九巨靈劈石開窗牖捫蘿陟巘不憚勞同行况遇忘年友老苔護石蒼虎間飛瀑懸巖玉龍吼豁然人與境俱勝醉歌拍缶忘升斗固知壺中别冇天未必醉翁真在酒徘徊步月憺忘歸世事浮雲竟何有馬乃賢遊丹山詩城居久憶洞天名春日登臨杖履輕山雨晴時崖瀑冷巖花落盡石窗明黃冠白髮情偏古野水間雲意自清便欲去尋劉縣令願擕妻子學長生戴表元四明山中喜晴詩一岡一澗一瀠洄新歲新晴始此回莎坂南風寅蛤出茅簷西日乙禽來人迷白石羊羣路水卷青天雪裏雷猶是深山有寒食梨花無數繞巖開龍山嘉靖寧波府志在縣東三十里與定海陳山界狀如遊龍故名四明山發脈迤邐自南而東北至此鹿山鄞縣志距城三十里名勝志相傳昔有鮑郎射鹿於此及視之乃石也因名陽堂山延祐四明志俗曰青山縣東四十九里四面懸絶下有鮑郎廟鄮山延祐四明志在縣東三十里按十道四蕃志云海人持貨貿易於此故名鄮縣在鄮山之隂乃加邑為鄮同谷山成化四明郡志在縣東四十五里嶄崿崔嵬融結靈秀玉几左肱太白右股大涵靈峰居其前後阿育王山阿育王山志山去府治四十里其源始於天台以太白山為近祖有涌現巖乃塔涌之所西晉太康間有劉薩訶者神人指示云會稽有阿育王寶塔汝往頂禮於是薩訶精誠敬禮至於鄮山忽一夜寶塔從地涌出舍利騰輝阿育王造八萬四千塔此其一也劉仁本遊育王山詩古鄮名山控海涯諸天深護梵王家一峰橫玉前陳几七井沉金下涌沙鐘磬隔林回鸛鶴松杉夾道走龍蛇明朝更上磐陀石遙睇祥光燭海霞裕嚕布哈遊育王山詩育王名剎古流傳燈火於今幾百年舍利有光垂半榻雨花無數散諸天鐵輪髙揭晴軒外玉几端臨寶閣前最憶能吟淡遊叟東湖先渡月波船大涵山成化四明郡志在縣東三十五里瀕水而秀天霽風晴則水光山色上下相映西亭山嘉靖寧波府志在縣東三十里層巒聳秀下瞰深淵人擬赤壁之勝並山而居者多髙錢二姓又名髙錢山青山嘉靖寧波府志在西亭山南三里許峰巒疊翠春時胭紅粉白如圖畫白石山鄞縣志距城四十里名勝志玲瓏峭拔上有神仙石棋枰一名火石海舶見者以為光怪筲箕山鄞縣志距城五十里名勝志山即小白嶺元朝請大夫盧元因耽太白之勝結廬居焉跘跨山成化四明郡志在縣東五十五里瀑布懸崖山有鬼谷先生祠太白山延祐四明志在縣東六十里視諸山為最髙巔有龍池旱暵必禱焉或曰山以太白星得名又曰近有小白嶺故此為大白非太白也舒亶太白山詩千峰下視盡兒孫仙事寥寥不可聞長作人間三月雨請看膚寸嶺頭雲玉几山延祐四明志在阿育王山前自寺視之橫陳如几袁桷望玉几山詩玉几峰橫寶塔前彌天消息是真傳蒲團禆板都忘却似笑當年手指天天童山天童寺志在縣東六十五里晉永康中僧義興結廬感太白星為童子給侍故名有佛迹石玲瓏巖龍隱潭諸勝王安石遊天童山溪丄詩溪水清漣老樹蒼行穿溪樹踏春陽溪深樹密無尋處唯有幽花度水香范成大自育王過天童松林三十里詩竹輿窈窕入蕭森逗雨梳風冷客襟翠錦屠蘇三十里不知腳底白雲深葉茵天童山詩著足萬松關東州第一山聽泉窮地脈歷棧近天顔奎畫疏煙外鐘聲逺樹間衲翁曾冇約分我片時間屠隆玲瓏巖詩巖前老樹挂枯藤辟榖仙人苦行僧四壁秋蛩霜外杵一床黃葉雨中燈杖錫山成化四明郡志在縣西南一百二十里前有七峰上有四明山心四漢𨽻字唐僧紀飛錫至此故名陳萻同黃東發提舉遊杖錫山詩十八盤頭翠碧函參差簷棟倚巖嶄桑根已換如來座峰頂猶存太白巖地有栗泥堪當飯山無松木獨宜杉半天圖畫風塵外我有新題居士銜梨花山月波山百步尖山延祐四明志皆在東錢湖亶洲山太平寰宇記在縣東北近海岸動石山太平寰宇記山有堅石髙五六丈下有小石支之暴風雨則其石自動行於山者聞隆隆作聲靈山太平寰宇記郡國志云山有石鼓臨澗若鳴則野雉翔鳴故曰靈山五臺山輿地紀勝在鄞縣上有開元寺內有六子院佛隴山嘉靖寧波府志在天童山西南二里隱學山延祐四明志在東錢湖其下有栖真寺放生池徐偃王隱學於此陶公山名勝志在縣東南四十五里東錢湖中世傳陶朱公常隱於此有釣魚磯在焉洪性登陶公山詩霸越平吳此息機蓑衣終日坐魚磯一竿風月髙名在千古江山舊事非春雨荒臺蒼蘚合夕陽古渡釣船歸探奇欲試登臨興流水無情白鷺飛它山舊浙江通志在縣南五十里四明它山水利備覽大溪之南流皆下其北則皆平地至是始有小山虎踞岸旁以其無山相接故謂它山大梅山霏雪録在縣東南七十里梅子真隱處石洞仙井丹竈藥爐猶存鄞縣志山有獨秀峰其支隴延結為象峰下有保慶寺朱祐秋日遊大梅山詩秋日籃輿度翠微大梅山色碧成圍仙人汲井留丹汞禪老紉荷製衲衣龍護法幢天女現經歸寶藏雨花飛此行直欲探幽迹更入前峰叩石扉劉鼎大梅山詩大梅山下神仙窟與客來遊得遍觀尚有松花留宿供已無藥竈覔靈丹峰巒環繞三摩地澗水盤廽百折湍竹杖芒鞋應不倦題詩日日記清歡五峰山嘉靖寧波府志在縣東南四十五里金峨山輿地紀勝在縣南八十里州之控山也鄞縣志其山自道陳嶺分界東屬於鄞西屬奉化朱祐金峨山詩金峨山勢自天來雨後岡巒緑似苔隱隱鼓鐘空谷裏重重臺殿白雲隈青鞋布襪真吾志野草靈苗盡藥材聞説溪山更深處老僧竹屋傍巖開厲山延祐四明志在縣南三十五里薑山延祐四明志在縣南八十里平原崛起有石洞三其一最大曰後巖中可坐數十人洞後又有一小洞上有小穴形圓如月可仰窺天里人祠神像於巖中茆山延祐四明志在縣南五十里與薑山對峙名勝志上有一井以竿測之其深無底張樞茅山詩今古茅山是勝遊秀峰突兀繞滄洲雲含老樹迷還散石擁甘泉咽復流未見巖風晨下鶴祇聞澗月夜鳴蜩道人不是悲秋客黃菊丹楓相對愁塔嶺山嘉靖寧波府志在縣南四十里蒼翠峭立四面環列二十三峰錫山延祐四明志在縣西南五十里常産錫故名建嶴山鄞縣志距城五十里名勝志峰巒十五矗立於前狀如列戟鬱然深秀下有寶嚴寺清秀山鄞縣志距城六十五里上有三十六峰清奇秀麗故名銀山延祐四明志在縣西南五十里常産銀故名天井山四明龍薈在縣西南七十里有五井一巖突然而出者下嵌百仞之淵地僅容側足緣蘿可行至下井之旁石皆光潔又行三里為中井又三里則上井愈入愈險餘二井益險絶人迹罕到旱暵祈禱得金線蜥蜴或蛇蟹之類自下山望之奕奕有光雨輒應張瓚天井山詩緣蘿躡磴共躋攀水色山光逺近間五井龍蟠通海窟半空猿嘯隔塵寰石壇雲冷人稀到溪路苔深馬倦還駐節相看秋社散夕陽簫鼓度前山灌頂山延祐四明志在縣西南七十里其山直上二十里方至頂有普淨禪院歲納學租宋有採鐵於此者朝旨禁之唐嶴山寧波府志在縣西南五十里雪頭山嘉靖寧波府志在縣西南八十里上有龍湫名胡家聖井蜜巖山鄞縣志距城六十里巖上常産仙密下承深淵人不得取陸嶴山寧波府志在縣西五十里翠巖山嘉靖寧波府志在縣西五十里有秦王石版弓箭洞葛仙翁以泥封之遺迹猶存武陵山鄞縣志距城四十里嘉靖寧波府志舊傳劉阮采藥於此至今桃花萬樹春月盛開如錦綺聖公山鄞縣志距城四十里壁立千仞石室虛明相傳朱彥誠常遇仙於此白鶴山嘉靖寧波府志在縣西四十里前嶴山嘉靖寧波府志在縣西四十六里羣峰起伏靈秀盤結楊嶴山成化四明郡志在縣西三十五里峰巒環拱竹木森然蔡家山嘉靖寧波府志在縣西三十五里望春山嘉靖寧波府志在縣西三十里與白鶴山對峙為邑西小朵魯嶴山成化四明郡志在縣西三十里岐山嘉靖寧波府志在縣西三十里相傳常有異鳥集此又名旗山以張循王陳兵於此大慈山延祐四明志在東錢湖下水嶴宋丞相史魯公葬母於此戴良遊大慈山詩水行境謂盡陸出路旋通乃即蒼松徑步入青連宫連嶂既崷崒密林亦蔥巃地涉清淨界身遊紫翠重臨流玩廣沼企石眺奇峯