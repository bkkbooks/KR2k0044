body:
  text: 浙江通志卷五十四水利三嘉興府嘉興秀水二縣附郭城內河自西門入者由大悲橋至韭溪橋自南門入者至市心二水交會而分流出東北兩門嘉興府圖記明永樂乙酉左通政趙居仁奉詔治水嘗疏之成化初故道塞而屋廬其上嘉靖二十六年秋知府趙瀛悉加浚復嘉興縣志崇禎間知府鄭瑄復加疏浚流通民間利賴國朝康熙二十四年知府劉瑆知縣何鋕任之鼎捐俸首倡紳士協力城內河道填塞數十年者盡行浚復三十九年知府佟賦偉又復開濬六十年夏知府吳永芳以城內正河淤淺鳩工大濬并支流小港以次疏通時居民跨河造房悉令除去郡城四門外各有備警河日漸湮塞循故道疏濬悉皆復舊嘉興縣城外河道海鹽塘河在縣南五里自滮湖南通海鹽縣嘉善塘河在縣東由白蓮寺而東三十五里至嘉善平湖塘河在縣東南直達平湖謹按嘉禾一郡地勢平衍故鮮堰壩惟海鹽地形稍髙水之所注西北流百餘里而至嘉興合秀水西境運河之水滙於鴛鴦湖分為二流一由南堰橋厯鰻鯉堰橋至甪里街一由放生橋迤東厯牙前橋至甪里街東流十餘里會於白蓮寺前又分二派一派東北流三十餘里至嘉善注於松江一派東流五十餘里至平湖而入於泖其間支分派别參錯鄉間為港為濱不可勝計農民車戽灌田雖至大旱濱港皆竭而三河之水未嘗乾涸是萬頃膏腴無不賴三河以為命也然嘉邑較秀水又覺稍髙故旱多潦少宜疏濬支河濱港時築墟岸則旱潦有備而嵗常豐稔矣橫塘一名海鹽塘在縣南五里自嘉興南堰橋起東南直扺海鹽縣西門外天寧寺前綿亘百里漢塘在縣東十里又名新豐塘即平湖塘也魏塘在縣東十里達嘉善即嘉善塘也華亭塘在縣東一十五里通松江華亭縣伍子塘在縣東二十五里接胥山長水塘在縣南六里通硤石市練浦塘在縣南二十五里東西通橫塘長水塘又名練塘麒麟塘在縣東南十九里通漢塘鄭公隄在會龍寺兩腋明崇禎間知府鄭瑄築嵗久漸圯國朝康熙六十年邑紳髙孝本白於郡守率衆重築兩腋長隄以遏嘉善平湖之去水白苧堰在縣東南三里盛家堰在新行鎮北馬塘堰在縣南七里謹按馬塘堰久廢近人惟呼海鹽塘上馬塘廟前為馬塘涇云秀水縣城外河道運河在縣西南通石門縣北接吳江界運河自杭州北新關而來會上塘長安壩之水從石門縣西北流二百餘里至西門外三塔灣折而北厯王江涇至平望六十里許入吳江界其間支河無算難以枚舉要皆縱橫阡陌之間以為灌溉之利至元嘉禾志隋大業六年敕開江南河自京口至餘杭八百里面濶一十餘丈嘉興府圖記唐廣德中屯田使朱自勉濬畎距溝濬溝距川後刺史于頔繕隄防疏鑿畎澮列樹表道宋史河渠志元符三年二月詔蘇湖秀州凡開治運河港浦溝瀆修疊隄岸開置斗門水堰等許役開江兵卒嘉興府圖記明永樂間通政趙居仁濬河秀水縣志明萬厯二十年水利薛夢雷檄縣令李培起斗門至王江涇界集附近居民疏濬國朝康熙四十六年奉旨發帑疏濬支河港蕩巡撫王然題明動帑委嘉興府知府臧憲祖開濬淤淺處西麗橋八十五丈北麗橋九十五丈端平橋八十五丈濬深俱五尺廣皆五丈有竒又濬各鄉諸港於是蓄水溉田舟楫往來農商皆慶鴛鴦湖在縣南三里計百有二十頃其利實瀦水以資灌溉東西連湖故謂之鴛鴦又名南湖運河塘石塘起杉青閘北迄聞川袤二十七里土塘起西水驛西迄語兒袤九十里唐元和五年王仲舒治蘇隄松江為路即今石塘明永樂初命户部尚書夏原吉往浙江諸郡治水九年修蘇州至嘉興土石塘橋路七十餘里泄水口一百三十一處其後通政趙居仁自崇德北抵吳江植榆固隄巡撫周忱築運隄創橋通道𢎞治八年左參政周季麟修嘉興舊隄易之以石三十餘里嘉靖二十六年知府趙灜修運河土石塘萬厯十五年霪雨岸圯窪田盡淹二十一年知縣李培議富民出資貧民出力履畝起夫堵築四十年知府吳國仕勘議郡城自杉青閘直抵王江涇一帶官塘舊係土石各半嵗久傾圯具文申請盡從石甃陳懿典重築運河石塘記我郡地界吳越浙潘之門户也北接蘇之吳江西接杭驛路幾二百里而遙號稱孔道蓋自國家建都北平水程由通潞而達潞河者自江漢外惟是武林溯江淮涉黃河之一脈而我郡實為發端江浙閩粵楚蜀滇黔縴挽無不由茲而漕艘尤為緊要則運河之重可知矣重運道不得不重運塘舊土石塘嵗久漸圮加以淫潦時作往往崩壞郡守吳公來涖我郡慨然以築塘為己任請於中丞水大夫聚財鳩工始於壬子七月迄於十月告竣如砥如帶見者以為百年之功成於閲月相與歌咏之運塘跨省直厯三邑秀水北塘一千四百八十八丈五尺西塘九百五十一丈六尺桐鄉塘二百一十五丈四尺泄水洞五座崇德塘三百六十一丈二尺三縣共計修築三千二百七丈七尺公名國仕休寧人嗣後嵗修不常國朝康熙十二年水溢塘圯知縣李見龍躬督修築幫闊隄岸康熙六十年知府吳永芳捐資興工復募諸有力者南塘加石培土令益髙厚北塘自城至王江涇三十里於舊塘外增築石岸雍正五年奉旨發帑開濬河道修理城垣隄岸巡撫臣李衛委員動帑二千一百有竒修築西北二路隄岸窪者崇之缺者補之行旅往來稱便新城塘在縣西北七里通新城鎮蘆􅅹塘在縣西北六里杉青堰一名杉青閘在縣北四里宋熙寧元年十月詔秀之杉青堰監護使臣以管幹河塘繫銜常同所屬令佐巡視修固以時啓閉東瓜湖堰在縣北三里六里堰在縣東五里學秀堰在縣西南九里謹按秀水水利大略輿嘉興相似故境內亦少堰壩以上諸堰俱至元志所載今皆不存而土人猶以堰名其地云嘉善縣嘉善塘河自郡城東三十餘里抵於縣治又東入於泖便民河明𢎞治間濬築嘉興府圖記知嘉善縣劉克及郎中傅潮修圍岸創果字等墟鑿便民河二萬七千尺溉田萬餘畝錢福開便民河記嘉興浙西大府其屬縣嘉善最為膏腴平壤𢎞治十二年新喻傅公曰會以正郎膺特簡來守視地圖所廢興而乘之者勿力公竊慨焉又一年安福劉君安溫以進士來令公遂謀之劉君及丞朱君暕乃厯遍原隰相視便宜於是因舊而修為圍岸以丈計者三十六萬二千有竒為驛路官塘以丈計者六千五百有竒創始而築作者果字墟岸塍以丈計者三千六百有竒凡護田若干畝此其為防之功也開創便民河者十以丈計者凡二千三百有竒淺濟艱阻疏而通之為市河者三以丈計者一千四百有竒掘淤鑿塞為支涇曲港者八以丈計者八百九十有竒瀦泄灌溉以利田者若干畝其便往來者不可勝計此其為浚之功也或修或創為橋梁者十經始於𢎞治庚申訖工於辛酉十月朔嘉善丞倪璣築思賢奉賢下保諸墟瀦陂湖開溝洫邵鋭濬河築墟記浙以西稱健吏曰倪嘉善始至問百姓疾苦首曰水利乃躬出按視縣治以南地勢髙亢不有所蓄吾民其病旱乎迄北水所輸委不有所泄吾民其病潦乎於是計地程工計工程力計力程費召厥父老指授方略大都以潦為尤急也首濬淤河及所支曲俾罔壅滯自思賢鄉至奉賢鄉二十八所以丈計者三千八百六十有竒又築墟岸益卑削為髙堅自三十三都至四十都三百八十二所以丈計者一萬五千二百若墟之尤下者仍築墟岸其中俾有分守自下保東區至奉九北區亦一十五所以丈計者六千四百九十髙亢之地並加疏闢又瀦為陂塘散為溝洫具有脈絡自永七都至胥五都總二十九所又總計為三百五十丈肇自正德十年十一月至十一年十二月厥工告成使瘠鹵化為膏腴居者載寧逋者胥復而歌頌於是乎作矣侯名璣陜西咸寧人倪璣水利議略按水利之説周鼎論之頗詳髙鄉溝洫為急而墟岸次之低鄉墟岸為急而溝洫次之斯則審密之論嘉善自縣治以南皆髙亢乏水連月不雨則苖向稿雖遇有年其收亦薄非地力有異田素渴水而瘠民積貧無以糞其田故也必令土人多濬溝洫蓄水待灌溝中之土令下鄉人遇墟岸坍損時往載增築則土有所歸而髙下漸趨於平旱潦皆利矣否則胥山等區不久當鞠為茂草豈獨洪波巨浸能使民墊溺哉國朝康熙四十六年知縣李夢昺奉旨動帑開濬渡船頭淤淺處一百八十丈并濬支河諸港許巷蕩嘉靖浙江通志在縣西北三十六里波流澄徹旁多良田資其灌溉伍子塘在縣西半里南接胥山大雲塘在縣南二十里南通大雲寺白水塘在縣南一十二里甓竈塘在縣西北二十六里章練塘在縣北二十六里蘆墟塘在縣西三十六里華亭塘今稱上官塘見嘉興冬瓜湖塘今稱下塘江涇塘在縣西北十餘里馬塔塘在縣西北十五里烏涇塘在縣北十里千步塘在縣西二十里長春塘在縣西三里石井塘俗呼三店塘在縣西九里陸斜塘在縣西北五里雙葑塘永八中區湖塍塘永八中連永八北奉九北區松陽塘在縣東北入平湖華亭界風涇塘以上皆奉四南區白牛塘在縣東二十里張涇塘定光塘馬滙塘以上皆奉四中區舊廟塘胥五區海鹽縣海鹽塘河在縣西南自天寧寺達嘉興府城𢎞治嘉興府志宋淳熙九年守臣趙善悉重濬招寶塘河在縣西南三十五里至元嘉禾志宋淳化三年開淳熙九年守臣趙善悉重濬烏丘塘河在縣西三里至元嘉禾志宋淳熙九年守臣趙善悉重濬陶涇塘河在縣北一里至平湖一十二里至元嘉禾志宋淳熙九年守臣趙善悉重濬𢎞治嘉興府志明成化六年參政何宜𢎞治元年僉事伍性知縣談秀先後重濬白洋河在縣東沿海塘下南自澉浦北抵乍浦長七十里海鹽縣圖經明萬厯五年巡撫徐栻築塘海上因有白洋河及澉浦上河之役白洋河北至閲武場而南屬之常川鋪長三十里初鑿時以運塘石而海上荒土得灌為良田者萬餘畝上河起自常川鋪西南屬之澉浦城下二十里地形稍髙於白洋河築為土壩以捺之所灌田視白洋河加倍徐栻請開白洋河疏海鹽縣秦駐山南至澉浦所原有河一帶在土塘之內舊連縣治商旅輻輳田畝嵗收稱為沃土近皆淤塞坍塌舟楫不通赤地遍野原設澉浦稅課局因而裁廢旱乾無備糧運艱苦乙亥海溢之變澉浦軍民被災尤甚以石塘一帶外無擁護內無分泄故也臣時營度海塘親履其地見田廬荒廢目擊流離邇塘工告竣若將此河因其舊迹再為開通即以濬河之土築塘則所至該縣內河上塘一體髙厚深廣聮結鞏固縱有異潮之來不能衝突而田疇得灌溉之資一水相通糧運直逹貽惠軍民實為無窮矣吳徐開濬白洋北河議本縣與海寧衛同一城池南四十里有澉浦所設立鮑郎鹽場北四十里有乍浦所設立海砂鹽場衙門俱在海濵脈絡共相聨貫所恃通行其間使防汛無虞鹽貨不阻者専藉沿海舊有白洋河一帶為之來往也祇因陵谷屢更以致渭流盡斷地方受病非止一端幸於萬厯初撫院徐修築海塘奏準水利道駐劄海鹽深燭利病將南路至澉浦鹽司四十里地開濬白洋上下河一帶南行水路盡得流通其北路白洋河正擬興工值水利道升任而止愚謂前開南路河道種種利便備載海塘録中若今北路之河為便亦可枚舉土塘捍海在北最低每當潮溢之時鹽場竈蕩民田盡被其衝所損不少若開河取土築塘令之髙厚內河可以分泄其流外塘可以捍禦其患縱有非常民不受害此為一便乍浦所至海寧衛城俱是陸路不但彼此糧餉器械搬運為難抑且官兵分番調守往來不便今開此河則船隻通行聲息易達以之守望防汛更為得䇿此為二便海砂場司正處河之中途兩頭鹽運頗費搬移河開則舟載不難涇河遞相灌注腳價既省商賈因而樂趨不藉招徠鹽課自益此為三便土塘外為鹽場內即蕩竈今開河築塘攔阻潮頭則塘外零星灰埂盡可曲引鹹流開塍漉鹵塘內荒蕪草蕩亦得蓄積淡水墾作田疇四十里之內所增鹽課又不知幾何此為四便先此澉浦河道未通之時民病尫腫士鮮文學自開河後不但民無疾病亦且科第聮綿今乍浦一城何止萬家若得開濬河道將見人文日盛此為五便邑之商竈軍民望此舉已久在大有為者立斷而行之耳國朝雍正五年巡撫臣李衛動帑一千兩有竒委員重濬永安湖在縣南四十五里澉浦鎮西六里周圍一十二里深一丈五尺中有長隄分為二湖灌田甚美租亦倍入至元嘉禾志此本是田後濬為湖瀦水以資灌溉置閘蓄泄雨久瀰漫則東入於海海鹽縣圖經莫詳陂築所自元時為豪有力者決壞民以失業寓公安撫使王濟始奏復之張千五結勘永安湖狀德政鄉十三都澉墅石帆村社長張千五等照勘得本里古有永安湖三千七百畝積諸山之水灌溉澉浦澉墅石帆三村官民田八千三百餘畝此湖原係民田為湖其稅均於湖側田上輸納就湖東際石砌斗門木板為閘以時啓閉每遇天旱開閘放水下流灌救田苖或天雨連綿湖水漲溢却有東南葛母山下古置渾水閘放泄入海是以三村農田嵗無水旱之憂至元十三年歸附初鎮守管軍官王招討將永安河西南際湖面築捺圍裏成田三百八十畝納官糧三十八石於後至元二十六年招討男王四萬户將上項湖田過佃召業却於湖田南際掘開海塘創造石閘連年每遇春水汛漲之時將湖水夤夜放泄入海及至夏旱又被管佃户壩塞致有三年兩旱田禾不收若蒙官司將上項湖田仍舊開掘為湖積水灌田實為民便元大德十六年六月初一日結趙若源重開永安湖碑記海鹽州南四十五里有湖曰永安周園十二里瀦水灌溉澉墅澉浦石帆三村農田潦則東南注入於海旱則水澤仰給於湖遂變斥鹵為膏腴至元丁丑王招討圍湖成田是以三村屢經旱患安撫王君濟勇於為義聞之朝廷由是省臺委官公同涖政目擊斯害大德乙巳秋七月浙江行省平章政事徹爾榮祿廉明公正遽令疏濬為湖開除元立佃米一改而正之於是斯湖得以復舊茲刻於石庶來者知斯湖源流有自云爾𢎞治嘉興府志明正統十年縣丞龔潮請旨重濬謹按圖經云永安湖有閘四座南湖閘一北湖閘一轉水閘二明成化間通判張岫建民受其利古涇三百一所在縣西境唐書地理志長慶中令李諤開以禦水旱海鹽縣圖經廣可通舟即今麻涇簡涇之屬諸涇之水並入官塘周墩堰孟家堰張泥堰新朱堰錢涇堰周大堰計家堰徐涇堰落滙堰朱莊堰以上俱在開濟鄉白塔堰宋涇堰陳浦堰丁浦堰于涇堰錢家堰陶涇堰孔家堰以上俱在永寧鄉大王堰板層堰黃泥堰小華家堰西吳市堰東吳市堰鐵城堰徐涇堰董涇堰嵩峰堰談家堰棠成堰以上俱在長水鄉孫家堰沈家堰六里堰北橫涇堰彭村湖堰八㮙港堰馬家堰勝家廟堰倪家堰龎家堰楊家堰衛家堰三里堰湯馮堰以上俱在德政鄉宋嘉祐元年縣令李維幾置鄉底堰三十餘所後亦漸廢淳熙九年守臣趙善悉興修水利增築鄉底堰八十一所謹按海鹽古堰圖經所載有一百四所云自析平湖後本縣所存止四十有二後亦漸廢𢎞治海鹽縣志不載長水鄉談家棠成二堰其武原諸鄉之堰六十所𨽻平湖者詳見平湖茲不具載常豐閘在縣北四十里宋嘉祐元年縣令李維幾植木為閘元祐四年何執中為令易以石淳熙十五年縣令李直養蓋閘屋易閘板自是農被閘堰之利頻嵗得稔後以舟楫通行不便閘竟廢今俗呼其地為橫塘閘是也謹按海鹽據禾城之上遊環山濵海水無渟滀惟藉官塘一帶以灌十鄉之田每十日不雨車戽一動則其水立涸農田龜坼是以堰閘之設較他邑尤為急務古人多置堰閘以阻遏水勢每嵗二月築塞九月始開誠善政也後人以舟楫阻滯毁諸堰閘以快目前之便不知水無所瀦一遇亢旱動輒告災此由堰閘之廢弛故耳茲詳考圖經備列於右以禆後之考證云石門縣運河自縣西南二十里入界北流二十里至石門鎮又東過桐鄉運河達秀水縣正德崇德志隋大業六年詔開至吳越錢氏募卒通河撩淺宋紹定間縣令樓演濬縣前河東達運河西至陸家灣明景泰八年縣令郁綸濬運河自石門至大漠率衆民繩其直度其闊濬深四十里許以為民利明成化二年分守參政何宜委官疏濬河涇修築墟岸石門縣志嘉靖中築城亘運河東於城外别開一河以通漕運三十九年縣令劉宗武大濬城河萬厯元年縣令蔡貴易濬運河自彭河橋至羔羊凡二十里孫植濬運河記崇德邑治嘉郡之西為吳越閩廣孔道貢賦漕挽輶使四出邑之漕渠嵗久不治自松老橋至六里橋水道淤涸漕舟告阻於是督鹺馬公下之泉僉郡守檄水利郡判陸君會邑令蔡君躬厯周視計地程工為丈者二千六百三十計工程力計力程費擇委邑主簿髙橋典史雷楫桐鄉主簿黃觀民典史馬驥畫地分工經始於癸酉八月至十月凡六逾旬而畢向有包角堰故址茲量為節宣勒石樹之以固風氣其於人文亦有禆云十七年郡判方玘董治運河三十八年縣令靳一派以城河湮淺稍旱輒涸大加濬治石門灣縈回如帶日久漸壅豪右踞之申詳濬闢仍築羅星臺以固風氣眀年又開各區濱河國朝康熙六年知縣劉引楷偕縣丞季芷大濬運河自松老橋至玉溪鎮約三十六里計六千一百七十丈田畝賴以沃灌四十六年奉旨發帑開濬支河港蕩時嘉興府知府臧憲祖重濬自金堂廟至玊溪鎮六千四百八十丈并濬西塘諸涇各區濱河天長河在縣東二十五里千乘鄉正德崇德志千乘鄉向因旱潦無所蓄泄名為積荒田稅纍一縣賠納正德十一年縣令洪異躬督萬夫財力兼濟開為十字河三日而就通沙木等涇東西七八里南北五六里廣五丈餘總若干圍計田可灌溉者四千餘畝民感其惠又稱洪河運河塘在縣東宋熙豐間崇德長官主管運河隄岸眀永樂三年左通政趙居仁督民修築塘岸上種榆栁固之宣德五年巡撫周忱命築塘岸通漕運嘉靖二十六年知府趙瀛築語兒鄉土塘國朝順治十三年巡按王元曦委推官尹從王重修雍正六年總督臣李衛委員動帑修築玉溪鎮至大麻一帶塘岸包角堰在縣南一里明萬厯間縣令蔡貴易復建石門堰在縣北十八里羔羊堰在縣北九里平湖縣平湖塘河西受鴛滮諸湖南受陶涇塘水東經縣治又東三百步入當湖鹽運河在海塘內長十二里天啓平湖縣志嘉靖己酉巡鹽御史董威修復陸杰開鹽運河記平湖東去海塘僅五十里塘以外斥鹵內則為蕩荒茅無際業惟煮海在漢已然宋置𣙜場於廣陳及本朝移置於蘆􅅹故有鹽運河十二里瀕河之蕩漸治為田河日以淤商農屢乞疏導卒莫肯任者郡守趙公瀛議舉而未就嘉靖戊申冬巡鹺監察御史近淮董公行部嘉禾會有商言河淤狀公亟命郡倅陳君守義縣令李君僑相度修復期以責成於是程工計費秉心仰贊集丁夫一千三百五十人官為給餉郭丞亨出舍其間而日省之東自蘆􅅹西屆廣陳計里分工以次興舉廣三丈有竒深六尺有竒東西所訖加闢為灣周可五十丈便旋舟也河壖積土亦盡逺徙防傾圯也肇仲春畢孟夏夫以工計者三萬九千三百五十費出監察公贖金守倅令咸以粟繼秋毫不擾於民厥惟善矣趙守立石俞塘橋左屬余紀其略國朝康熙六十一年知縣林緒光捐俸重濬新開河在運鹽河東自新倉閘橋起至舊衙計十二里天啓平湖縣志嘉靖中知縣顧廷對濬河以便灌溉又名顧公河國朝康熙六十一年知縣林緒光重濬秦河在縣東三十里新耕之蕩藉以灌溉國朝康熙十七年里民秦九一倡議開鑿請於縣府委蘆􅅹場鹽大使周成勳董其役開河十里自新倉鎮以北至新廟橋荒蕩皆得栽禾後復稍淤二十二年春分守道王永祚檄行各屬疏通河道九一復呈縣委白沙巡檢薑一科及乍浦巡檢黃督同開濬闊五尺深數尺里人名曰秦河當湖在縣東三百步舊志云周四十餘里今不及二十里矣謹按當湖水自郡城海鹽而來至此為一渟蓄東南通故邑西南近海鹽東連廣陳南接乍浦抵於獨山歸於華亭舟楫便利灌田實多故嘉郡七邑平湖為沃壤之最也漢塘在縣西二里詳見嘉興明嘉靖四十年馮汝弼修築五十餘里馮汝弼漢塘紀事余行自漢塘至郡城忽風雨大作兩涯斷岸泥濘僕夫牽挽及行道徒涉顛頓入水前後相繼飄泊有至不起者豫不忍見也歸辦竹木磚石沿隄修築五十餘里不終嵗而竊取圯壞者居多自是十餘年來時圯時葺即今萬厯初元豫年七十六矣自念去日苦多恐不能為久長計於是蓄料鳩工修建石梁木梁三十二座修築石堰土堰一十五處豫自歸田以來上愧國恩下慚民隱見聞所及不容自己為吾子若孫者稍有餘力當世世葺之若其未備則不能無望於吾邑同志君子云獨山塘在縣東一十五里乍浦塘在縣東南二十五里直接當湖之水以上二塘皆國朝康熙六十一年知縣林緒光重修官莊塘在縣北一十五里方塘在縣北二十四里橫浦塘在縣東二十里栁莊塘在縣東南一十二里沈塘在縣東一十里余塘在縣東二十七里廣陳鎮吳祺塘在縣北至錢家帶七里南涇塘在縣南至轉塘十里師姑橋十八里海鹽縣五十四里馬廄堰十八里堰白馬堰李家堰孫堰馬駝堰孫三堰以上俱在武原鄉曹婆堰王道堰紀家堰清水墓堰方家堰鹺堰陳家堰瓦石堰金賣線堰周家堰俞家潭堰黃泥堰楊李堰土山堰小山涇堰鍾􅈨堰湖口堰代峰堰李塔堰沈墓堰東裴塔堰西裴塔堰邱沈堰馬垜堰東閘堰墓蜂堰以上俱在齊景鄉顧施東柵堰顧施北柵堰桃星堰沈福莊堰新帶堰方塘堰朱洞堰羅漢堰西閘堰祗園堰俞家堰大芒塘堰余家堰夏角堰麥塔堰西黃泥堰楊蕩堰翁莊堰志公堰大孫堰以上俱在華亭鄉沈馳堰許洞堰馮奧堰錢家堰月河堰戴堰馮河堰以上俱在大易鄉桐鄉縣運河在縣治北九里詳見秀水石門國朝康熙六十一年知縣陳大慶捐俸士民樂輸開濬諸涇及各區濱河車溪在縣治北十里自皂林堰抵青鎮南北二十里兩岸腴田車戽不絶運河塘一作皂林塘元卜濮二姓富饒官令甃砌明時責於塘長國朝雍正五年巡撫臣李衛動帑五百兩有竒修築正家橋起至玊溪鎮一帶塘岸西官塘自縣西北距皂林鎮九里明成化十六年分守參議梁鏞令有司甃以磚石正德間復加修理東塘在康涇東滙之上自縣治抵皂林南北九里明天順間涇口多架木以通往來萬厯時改為石梁車溪塘長一十八里車口堰永新堰俱在運河塘右謹按桐鄉之水利與秀水石門相等惟賴運河之水流入以引灌田畝清風永新保寧等鄉其患在潦宜髙築墟岸以防浸溢梧桐募化千金等鄉其患在暵宜時疏濱涇以資車戽四境之內水皆平衍故無賴於堰壩所當急者惟濬河築塘而已浙江通志卷五十四
