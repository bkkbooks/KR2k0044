body:
  text: 浙江通志卷一百七十二人物四武功二湖州府三國吳朱治三國吳志本傳字君理故鄣人隨孫堅征伐中平五年討長沙零桂等三郡賊有功堅表治行都尉從破董卓於陽人表治行督軍校尉堅薨治扶翼策依就袁術後勸策還平江東太傅馬日磾在夀春辟治為掾遷吳郡都尉治從錢唐欲進到吳吳郡太守許貢拒之於由拳治與戰大破之遂入郡領太守事建安七年權表治為九真太守行扶義將軍征討夷越佐定東南禽截黃巾餘類陳敗萬秉等黃武元年封毗陵侯領郡如故二年徙封故鄣權為吳王治每進見權常親迎執版交拜饗宴贈賜恩敬特隆時丹陽深地頗有姦叛亦以年向老思戀土風自表屯故鄣鎮撫山越嵗餘還吳黃武三年卒子才嗣朱才三國志注字君業善騎射權愛異之以父任為武衛校尉領兵隨征伐屢有攻捷更折節為恭留意賓客輕財尚義施不望報又學兵法名聲聞於遠近朱然三國吳志本傳字義刲治姊子也本姓施初治未有子啓策乞以為嗣權以然為餘姚長遷山陰令分丹陽為臨川郡然為太守會山賊起然平討旬月而定曹操出濡須然備大塢及三關屯拜偏將軍吕蒙病篤權問代者對曰朱然膽守有餘可任蒙卒權假然節鎮江陵黃武元年封永安侯魏遣曹真夏侯尚張郃等攻江陵文帝自住宛為其勢援連屯圍城然中外斷絶城中兵多腫病堪戰者裁五千人真等起土山鑿地道立樓櫓臨城弓矢雨注將士皆失色然宴如無恐意厲吏士伺間隙攻破兩屯魏攻圍然凡六月未退不能克乃徹攻退還然名震敵國改封當陽侯六年權自率衆攻石陽旋師潘璋斷後夜出錯亂敵追擊璋然即還住拒敵使前船得引極遠徐乃後發黃龍元年拜車騎將軍右護軍赤烏九年征柤中魏將李興等聞然深入率步騎六千斷然後道然夜出逆之軍以勝拜為左大司馬右軍師然長不盈七尺內行修潔終日欽欽常在戰場臨急膽定尤過絶人雖世無事每朝夕嚴鼓兵在營者咸行裝就隊以此玩敵使不知所備故出輒有功赤烏十二年卒子績嗣朱績三國吳志本傳字公緒以父任為郎後拜建忠都尉叔父才卒績領其兵隨太常潘濬討五溪以膽力稱遷偏將軍營下督領盜賊事然卒績襲業拜平魏將軍樂鄉督魏征南將軍王昶率衆攻江陵城不克而退績與奮威將軍諸葛融書曰昶遠來疲困力屈而退此天助也今追之力少可引兵相繼吾破之於前足下乘之於後豈一人之功哉宜同斷金之義融答許績便引兵及昶於紀南紀南去城三十里績先戰勝而融不進失利建興元年遷鎮東將軍元興二年拜左大司馬以五鳯中表還為施氏晉沈田子宋書自序字敬光吳興武康人從髙祖克京城進平京邑參鎮軍軍事封營道縣五等侯義熙五年髙祖北伐鮮卑田子領偏師與龍驤將軍孟龍符為前鋒慕容超屯臨朐以拒大軍龍符戰沒田子力戰破之及盧循逼京邑髙祖遣田子與建威將軍孫季髙海道襲廣州加振武將軍循黨徐道覆還保始興田子復與右將軍劉蕃同攻討循還廣州圍季髙田子慮季髙孤危率軍南還比至賊已收其散卒還圍廣州季髙聞田子至大喜田子背水結陳身先士卒一戰破之又破循於蒼梧鬱林寧浦還至廣州而季髙病死兵後山賊競出田子隨宜討伐旬日平殄還京除太尉參軍振武將軍賜爵都鄉侯八年從討劉毅十一年復從討司馬休之十二年髙祖北伐田子與傅𢎞之領别軍從武關入屯據青泥姚泓軍數萬奄至田子兵裁數百欲擊之𢎞之曰彼衆我寡難可與敵田子曰師貴用奇不必在衆𢎞之猶固執田子曰衆寡相傾勢不兩立及其未整薄之必克所謂先人有奪人之志也獨率所領鼓而進合圍數重撫慰士卒曰諸君捐親戚棄墳墓出矢石之間正希今日耳封侯之業其在北乎乃棄糧毁舍躬勤士卒前後奮擊所向摧陷所領江東勇士便習短兵鼓譟奔之賊衆潰散所殺萬餘人長安平髙祖燕於文昌殿舉酒賜田子曰咸陽之平卿之功也即授咸陽始平二郡太守大軍既還桂陽公義真留鎮長安以田子為安西中兵參軍龍驤將軍始平太守時佛佛來寇田子與安西司馬王鎮惡俱出北地禦之諭者謂鎮惡欲盡殺諸南人以數千人送義真南還因據關中叛田子與𢎞之謀請鎮惡計事使宗人敬仁於坐殺之率左右數十人自歸義真長史王修收殺田子於長安藁倉門外沈叔任宋書沈演之傳演之武康人父叔任少有幹質初為揚州主簿山陰令皆有聲朱齡石伐蜀為齡石建威府司馬平蜀之功亞於元帥為巴西梓橦郡太守戌涪城東軍既反二郡強宗侯勱羅奧聚衆作亂四面雲合遂至萬餘人攻城急叔任東兵不滿五百推布腹心衆莫不為用出擊大破之逆黨皆平髙祖討司馬休之齡石遣叔任率軍來會時髙祖領鎮西將軍命為司馬及軍還以為揚州别駕從事史以平蜀全涪之功封寧新縣男出為益州刺史以疾還都義熙十四年卒子演之南北朝沈林子南史沈約傳林子字敬士田子弟少有大度孫恩屢出會稽武帝致討林子乃自歸盡室移京口從尅京城進平都邑及帝為揚州辟為從事領建熙令封資中縣五等侯從伐慕容超平盧循並著軍功復從征劉毅討司馬休之輒摧鋒居前賊黨郭亮之屯據武陵林子率軍討之斬亮之於七里澗復討魯軏於石城軏棄衆走武帝伐姚泓參征西軍事加建武將軍統軍為前鋒從汴入河偽河東太守尹昭據蒲坂林子與冠軍檀道濟同攻蒲坂王鎮惡攻潼關泓遣姚紹據潼關林子謂道濟曰潼關天岨形勝之地鎮惡孤軍勢危力屈若使姚紹據之則難圖也及其未至當并力爭之若潼關事捷尹昭可不戰而服道濟從之及至紹舉關右之衆設重圍圍林子及道濟鎮惡等道濟議欲渡河避其鋒或欲棄捐輜重還赴武帝林子按劍曰下官今日之事自為將軍辦之然二三君子同歷艱難荷恩罔極以此退撓亦何以見相公旗鼓邪塞井焚舍示無全志率麾下數百人犯其西北紹衆小靡乘其亂而薄之紹大潰俘虜以千數悉獲紹器械資實紹走還保定城留姚鸞精兵守嶮林子銜枚夜襲即屠其城劓鸞而坑其衆紹復遣姚讚將兵屯河上林子連破之紹又遣姚伯子等屯據九泉憑河固險以絶糧援武帝復遣林子纍戰大破之斬伯子所俘獲悉以還紹使知王師之𢎞紹疽發背死讚統後軍復襲林子林子禦之連戰皆捷帝至閿鄉姚泓掃境內兵屯嶢栁沈田子自武關北入屯軍藍田泓自率大軍攻之帝遣林子步自秦嶺以相接援比至泓破走林子威震關中豪右望風請附長安平大軍東歸還至彭城帝令林子差次勳勤隨才授用文帝出鎮荆州以林子為西中郎中兵參軍領新興太守以佐命功封漢夀縣伯永初三年卒諡曰懷沈慶之南史本傳字𢎞先武康人少有志力孫恩寇武康慶之未冠隨鄉族擊之屢捷以勇聞趙倫之見而賞之命子伯符板為寧逺中兵參軍竟陵蠻為寇慶之設規略擊破之永初二年除殿中員外將軍北侵隸檀道濟道濟白文帝稱慶之忠謹曉兵上使領隊防東掖門元嘉十九年雍州羣蠻大動以慶之為建威將軍率衆進討大破緣沔諸蠻後為孝武撫軍中兵參軍孝武以本號為雍州隨府西上征蠻寇屢有功還都復為廣陵王誕參軍雍州蠻又為寇慶之復隨誕入沔伐沔北諸山蠻大破之羣蠻皆稽顙慶之患頭風好著孤皮帽羣蠻號曰蒼頭公每見慶之軍輒畏懼曰蒼頭公已復來矣慶之引軍出前後破降甚衆所獲蠻並移都下以為營戶二十七年遷太子步兵校尉至三十年孝武出次五洲總統羣帥慶之至咨受軍略會元凶弒逆遣慶之引諸軍慶之處分旬日內外整辦時皆謂神兵孝武踐阼以為領軍將軍封南昌縣公孝建元年魯􅐩反遣慶之與薛安都往討之安都斬􅐩進征北大將軍改封始興郡公大明三年竟陵王誕據廣陵反慶之帥衆討之至城下誕登樓謂曰沈君白首之年何為來此慶之曰朝廷以君狂愚不足勞少壯故使僕來耳塞塹造攻道立行樓土山并諸攻具每攻城身先士卒七月斬誕進司空四年西陽五水蠻復為寇慶之統諸軍討平之前廢帝即位以為侍中太尉盡言諫爭帝遣其從子攸之齎藥賜死時年八十明帝即位追贈侍中司空諡曰襄公沈法系宋書沈慶之傳慶之從弟法系字體先初為趙伯符將佐後隨慶之征五水蠻世祖伐劭以為南中郎參軍領三千人前發與栁元景旦至新亭元景居中營宗慤居西營法系居東營東營據岡賊攻元景法系臨射之所殺甚衆塹外樹悉伐之令倒賊來攻緣樹以進彭棑多開隙選善射手的發無不中死者交橫事平以為寧朔將軍始興太守討蕭簡於廣州臺軍將至簡誑其衆曰臺軍是劭所遣並信之城內固守初世祖先遣鄧琬圍簡唯治一攻道法系至曰宜四面並攻若守一道何時可拔琬慮功不在已不從法系曰更相申五十日日盡又不克乃從之八道俱攻一日即拔斬簡廣州平封庫藏付琬而還官至驍騎將軍尋陽太守沈璞宋書自序字道真林子少子元嘉十七年始興王濬為揚州刺史以為主簿遷宣威將軍盱眙太守時王師北伐彭汴無虞璞以強寇對陳事未可測郡首淮隅道當衝要乃修城壘浚重隍聚財石積鹽米為不可勝之算俄而拓跋燾自領步騎數十萬陵踐六州腹心勸璞還京師璞曰若彼大衆不盼小城故無所懼若肉薄來攻則成擒也諸君何嘗見數十萬人聚在一處而不敗者昆陽合肥前事之明驗此吾報國之秋諸君封侯之日人情乃定收集得二千精手曰足矣賊至四面蟻集攻城璞隨宜應拒攻守二旬殄其大半燾乃遁走太祖嘉璞功效遣中使褒美徵還淮南太守賞賜豐厚沈文秀宋書本傳字仲達武康人慶之弟子也景和元年遷青州刺史太宗定亂晉安王子勛據尋陽時徐州刺史薛安都已同子勛文秀應安都泰始三年歸命請罪即安本任先是冀州刺史崔道固亦據歷城為土人起義所攻與文秀俱遣信引魏魏遣將慕容白曜率大衆援之文秀已受朝命乃乘魏無備縱兵掩擊殺傷甚多魏進軍圍城文秀善於撫御將士咸為盡力每與魏戰輒摧破之掩擊營寨往無不捷太宗進文秀號輔國將軍八月魏蜀郡公拔式等馬步數萬人入西郭直至城下文秀使輔國將軍桓諶擊破之九月又逼城東十月進攻南郭文秀使員外散騎侍郎黃彌之等邀擊斬獲數千四年又進文秀號右將軍封新城縣侯魏圍青州積久太宗所遣救兵並不敢進文秀被圍三載外無援軍士卒為之用命無離叛者日夜戰鬭甲胃生蟣虱五年為魏所陷城敗之日解釋戎衣緩服靜坐命左右取所持節魏既入兵刃交至問曰青州刺史沈文秀何在文秀厲聲曰身是囚執之白曜在城西南角樓文秀至白曜前執之者令拜文秀曰各二國大臣無相拜之禮曜命鎖送桑乾文秀在桑乾凡十九年齊之永明四年病卒沈攸之南史本傳攸之字仲達慶之從父兄子也元嘉二十七年魏軍南攻攸之隨慶之征討二十九年征西陽蠻始補隊主巴口建義授南中郎府板長兼行參軍新亭之戰身被重創事寧為太尉行參軍封平洛縣五等侯又隨慶之征廣陵屢有功孝武以其善戰配以仇池步矟明帝即位四方反叛以攸之為寧朔將軍尋陽太守率軍據虎檻時王元謨為大統未發前鋒有五軍在虎檻五軍後又絡繹繼至每夜各立姓號不相稟受攸之謂軍吏曰今衆軍同舉姓號不同若有耕夫漁父夜相呵叱便致駭亂此敗道也請就一軍取號衆從之大破賊於赭圻尋進號輔國將軍督前鋒諸軍事薛常保等在赭圻食盡賊帥劉胡屯濃湖以囊盛米繫流查及船腹陽覆船順風流下以餉赭圻攸之疑其有異遣人取船及流查大得囊米尋尅赭圻遷寧蠻校尉雍州刺史加都督袁顗率衆來入鵲尾相持久軍主張興世越鵲尾上據錢溪攸之率諸將攻濃湖錢溪信至大破賊攸之悉以錢溪所送胡軍耳鼻示之顗駭懼急追胡還諸軍悉力進攻胡棄衆而奔顗亦奔走赭圻濃湖之平也賊委棄資財珍貨山積諸軍各競收斂攸之約所部不犯亳芥進平尋陽遷中領軍封貞陽縣公纍遷郢州刺史泰豫元年以攸之為鎮西將軍荆州刺史順帝即位攸之得大后手令遂舉兵齊髙帝遣衆軍西討攸之盡鋭攻郢州栁世隆屢破之升明二年還江陵自經死陳伯紹册府元龜為龍驤將軍交州人李長化據州叛妖賊攻廉州殺刺史羊南伯伯紹討平之廣東通志伯紹吳興人少英發以知勇聞事明帝泰始四年討平劉師道遷西江都護時合浦北界夷獠叢居寇盜不賓略無編户伯紹帥兵二千人獵於郡北境見二青牛驚走入草使人逐之不得乃志其地曰此地當有竒祥啓立為越州明帝命為交州刺史使經營焉元徽二年以伯紹為越州刺史督交越二州軍事始立州鎮穿山為城門以保邊境俗呼為青牛城先時刺史常事戎馬以𠞰伐為務伯紹恩惠及民威信洽夷獠及卒為之立祠沈文季南齊書本傳字伯達父慶之為景和所殺收捕諸子文季揮刀馳馬去收者不敢追宋明帝立起文季為寧朔將軍出為臨海太守升明元年沈攸之起兵太祖加文季為冠軍將軍督吳興錢唐軍事攸之先為景和殺慶之至是文季收殺攸之弟登之封略陽縣侯明年遷丹陽尹建元元年改封西豐縣侯世祖即位出為吳郡太守四年持節督郢州司州之義陽諸軍事郢州刺史遷尚書左僕射明帝建武二年魏寇夀春豫州刺史豐城公遙昌嬰城固守數遣輕兵相抄擊詔文季領兵鎮夀春文季入城止遊兵一聽出洞開城門嚴加備守尋退百姓無所傷損加護軍將軍王敬則兵起文季領兵屯湖頭備京路永元元年始安王遙光夜遣三百人於宅掩取文季欲以為都督而文季已還臺明日與徐孝嗣守衛宫城戎服共坐南掖門事寧加鎮軍將軍未幾被害章昭達南史本傳字伯通武康人性倜儻輕財尚氣少時遇相者謂曰卿容貌甚善須小虧則富貴昭達因醉墮馬鬢角小傷昭達喜相者曰未也侯景之亂昭達率鄉人援臺城為流矢所中眇其一目相者曰卿相善矣不久當富貴臺城陷昭達還鄉里與陳文帝遊侯景平文帝為吳興太守委以將帥陳武帝謀討王僧辨令文帝還長城招聚兵衆以備杜龕頻使昭達往京口稟承計畫僧辨誅龕遣其將杜泰來攻昭達從文帝進軍吳興以討龕龕平乂從討張彪於會稽尅之時留異擁據東陽武帝使昭達為長山令居其心腹天嘉元年封欣樂縣侯尋隨侯安都拒王琳昭達乘大艦中流而進先鋒發拍中賊艦琳平策勳第一除郢州刺史周迪據臨川反詔昭達便道征之迪敗走徵為護軍將軍改封邵武縣侯四年陳寶應納周迪共寇臨川又以昭達為都督討迪迪走昭達乃踰嶺討寶應與戰據上流為筏施拍其上壞其水柵又出兵攻其步軍方大合戰會文帝遣余孝頃出海道適至因并力乘之定閩中擒留異寶應以功授開府儀同三司尋授江州刺史光大時改封邵陵郡公宣帝即位歐陽紇據嶺南反詔昭達都督衆軍討之紇出頓洭口多聚沙石盛以竹籠置於水柵之外用遏舟艦昭達居其上流裝艦造拍以臨賊柵又令人銜刀潛行水中以斫竹籠籠筏解因縱大艦突之大敗紇禽送都廣州平進位司空太建二年率師征梁明帝於江陵明帝與周軍大蓄舟艦於青泥中昭達分遣偏將錢道戢程文季乘輕舟焚之周又於峽口南岸築壘名安蜀城於江上橫引大索編葦為橋以度軍糧昭達命軍士為長戟施樓船上仰割其索索斷糧絶因縱兵攻其城降之昭達奉命出征必晝夜倍道其尅捷必推功將帥厨膳飲食並同羣下將士以此附之沈恪陳書本傳字子恭武康人梁新喻侯蕭映為廣州以恪兼府中兵參軍常領兵討伐俚洞盧子略反恪拒戰有功除員外散騎侍郎侯景圍臺城起東西二土山以逼城城內亦作土山應之恪為東土山主晝夜拒戰以功封東興縣侯城陷恪間行歸鄉里髙祖討侯景恪於東起兵相應賊平授都軍副髙祖討王僧辨時僧辨女壻杜龕鎮吳興髙祖使世祖還長城立柵備龕又使恪還武康招集兵衆龕遣副將杜泰率衆襲世祖於長城恪時已率兵士誅龕黨與髙祖遣周文肓來援泰遁走世祖與文育進軍出郡恪軍亦至屯於郡南龕平世祖以恪監吳興郡永定二年徙監會稽郡會余孝頃謀應王琳出兵臨川攻周迪以恪為壯武將軍率兵踰嶺以救迪孝頃聞恪至退走三年除會稽太守天嘉元年為郢州刺史髙宗即位加平越輯中郎將廣州刺史州罹兵荒所在殘毁恪綏懷安被以恩惠嶺表賴之太建四年徵為領軍將軍十二年監南徐州緣江防戍後主即位授金紫光祿大夫卒年七十四諡曰元胡穎陳書本傳字方秀吳興人偉姿容性寬厚陳髙祖在廣州穎深自結從克元景仲平蔡路養李遷仕皆有功髙祖進軍頓西昌以穎為巴邱令鎮大臯督糧運下至豫章以穎監豫章郡髙祖討侯景以穎知留府事梁承聖初元帝授穎羅州刺史封漢陽縣侯尋除豫章內史隨髙祖鎮京口齊遣郭元建出東關髙祖令㯋率府內驍勇隨侯瑱於東關大破之後從髙祖襲王僧辨又隨周文育討杜龕髙祖受禪兼左衛將軍天嘉元年除散騎常侍吳興太守卒官諡曰壯胡鑠陳書胡穎傳穎弟隨穎將軍穎卒鑠統其衆歷東海豫章二郡守隨章昭達南平歐陽紇為廣州東江督護還預北伐除歷陽太守太建六年卒贈桂州刺史錢道戢南史本傳字子韜長城人少以孝行著聞及長頗有才幹陳武帝微時以從妹妻焉武帝輔政道戢隨文帝平張彪於會稽以功拜東徐州刺史封永安縣侯天嘉元年為臨海太守侯安都之討留異道戢帥軍出東陽以斷其後異平以功拜都督衡州刺史領始興內史後與章昭達討歐陽紇紇平除左衛將軍太建二年又隨昭達征江陵以功加散騎常侍後為都督郢州刺史與儀同黃法氍攻下歷陽因以道戢鎮之卒官諡曰肅陳慧紀陳書本傳字元方髙祖從孫髙祖平侯景慧紀從焉髙祖踐阼封宜黃縣侯世祖即位為安吉縣令遷明威將軍軍副章昭達征安蜀城慧紀為水軍都督於荆州燒青泥船艫光大元年以功除豐州刺史太建十年吳明徹北討敗績以慧紀為緣江都督兖州刺史周軍據有淮南江外騷擾慧紀收拾士卒自海道運都除都督郢巴二州諸軍事郢州刺史至德二年遷都督荆信二州諸軍事荆州刺史貞明元年梁安平王蕭巖晉熙王蕭巘等率其部衆男女二萬餘口詣慧紀請降慧紀以兵迎之以應接功加開府儀同三司征西將軍及隋師濟江元帥楊素下自巴峽慧紀遣將吕忠肅陸倫等拒之時隋將韓擒虎及賀若弼等已據蔣山慧紀聞之身率將士三萬人樓船千餘沿江而下欲趣臺城至漢口為秦王軍所拒不得進因降入隋依例授儀同三司卒唐錢九隴唐書本傳字永業長城人父文疆為吳明徹裨將與明徹俱敗彭城入隋以罪沒為奴故九隴事唐公善騎射常備左右兵起以功授金紫光祿大夫從戰薛仁杲劉武周纍擢為右武衛將軍從平洛陽佐太子建成討劉黑闥於魏州力戰破賊以功最封郇國公為苑遊將軍貞觀初為眉州刺史改巢國卒諡曰勇陪葬獻陵施世英兩浙名賢録字玉華安吉人家世業農多積粟好施豫每衣食一鄉生而勇斷有才氣不衣襏襫而喜騎射鄉里年少多嚴事之隋大業中率宗族子弟并鄉里年少以軍法部伍之聚糧自守盜賊不敢犯里閈獨全聞唐髙祖起義率衆歸附每戰伐先鋒陷陳功多拜洮州刺史卒髙祖厚賻其喪宋沈承禮宋史吳越世家承禮烏程人錢鏐辟置慕府署處州刺史鏐子元瓘以女妻之署為府中右職出為台州刺史佐以承禮掌親兵俶命知威武軍節度事充兩浙都鈐轄使王師征江南俶遣承禮率水陸數萬人助平毗陵因攻潤州城中兵夜出焚外柵諸將皆欲馳救承禮曰古人有言擊東南而備西北此之謂也命士皆擐甲蓐食堅壁不動他壘不設備者悉驚擾獨承禮所部敵不敢窺丹陽平遂率兵抵建業李煜歸朝録其功授福州節制太平興國初俶盡獻浙右地徙承禮鎮密州八年卒贈太子太師盧秉宋史本傳字仲甫革子中進士甲科浮沈州縣二十年後提點兩浙淮東鹽事進制置發運副使上計神宗問曰聞滁和民捕蝗充食有諸對曰有之民飢甚殍死相枕藉帝惻然曰前此獨趙抃言之耳先是發運使多獻餘羡以希恩寵秉言職在董督六路財賦以時上之安得羡今稱羡者率正數也請自是罷獻知渭州五路大出西討惟涇原有功進寶文閣待制夏境胡盧川距寨二百里恃險遠不設備秉遣將姚麟彭孫襲擊之俘斬萬計遷龍圖閣直學士夏酋星多威丹舉國入寇犯熙河定西城秉治兵吳瓦亭分兩將駐靜邊寨指夏人來路曰吾遲明坐待捷報矣及明果至見宋師驚曰天降也縱擊之皆奔潰或言威丹已死諸將請以聞秉曰幕府上功患不實吾敢以疑似成欺乎他日物色之威丹果死詔使上所獲器甲秉守邊久表父革年老乞歸移知湖州元祐中降待制提舉洞霄宫卒盧知原盧法原宋史本傳知原字行之德清人以父任知歙縣纍遣梓州路轉運副使時承平既久武備皆弛知原招補兵籍築城亘二十餘里提點京東刑獄改江西轉運副使髙宗即位知溫州時葉濃陷建州楊徑陷處州知原繕甲兵增城浚隍聲勢隱然帝東幸知原由海道轉粟及金繒十餘萬至台州召見擢右文殿修撰管內安撫使王師討范汝為召為添差兩浙轉運使都督孟庾辟為參謀改知臨安府復為都督參謀官紹興十一年卒弟法原字立之自知雍邱縣積官太府少卿使遼遷司農卿為吏部尚書紹興元年知夔州尋為川陜等路處置宣撫副使金人攻關輔叛將史斌陷興州諸郡多應者法原命諸將堅壁言戰者斬未幾河東經制使王燮以乏食班師法原開關納之與燮同破斌復興州方巨盜充斥秦隴叛兵欲窺蜀法原極意拊循嚴為備禦傳檄諸路人心稍安視山川險阻分地置將自洮岷至階成關師古主之屯通川文龍至威茂劉琦主之屯巴西前後屢捷上所倚重會烏珠攻關為吳玠所敗法原與玠不睦玠因訟法原帝手詔詰問法原自辨甚力憂恚卒於軍成無玷西吳里語字士慤武康人第進士李綱薦其有文武材略擢守鄂州兼安撫使修築城壘教間士伍皆祖諸葛亮遺法髙宗兩賜御札褒美未幾韎􅞘貝勒圍甚急無玷堅守敵竟去畢再遇宋史新編字德卿父進從嶽飛轉戰江淮間積階至武義大夫再遇以恩補官開禧北伐以殿帥郭倪招撫山東京東遣再遇與統制陳孝慶取泗州再遇選新刺敢死軍為前鋒倪以八十七人付之出其不意進薄泗州泗有東西兩城再遇令陳戈旗舟楫於石囤下如欲攻西城者乃自以麾下兵從陡山徑趨東城南角先登殺敵數百守城者開北門遁西城猶堅守再遇立大將旗呼曰大宋畢將軍在此爾等可速降於是遂降尋除環衛官倪調李汝翼郭倬取宿州遣孝慶等繼之命再遇為先鋒取徐州至虹遇郭李兵裹創旋問則曰宿州大水我師不利統制田俊邁已為敵擒矣再遇督兵疾趨次靈壁遇孝慶駐兵鳯凰山倪以書抵孝慶令班師再遇曰郭李軍潰金必追躡吾當自禦之金果分兩道來再遇令敢死二千人守靈壁北門自領兵衝敵陳金人見其騎呼曰畢將軍來也遂遁再遇手揮雙刀絶水追擊殺敵甚衆甲裳盡赤逐北三十里刺殺其驍將以功第一擢左驍衛將軍和好成纍疏乞歸不允除保康軍承宣使尋以武信軍節度使致仕卒贈太師諡忠毅癸辛雜識再遇兖州將家也居於霅孟宗政宋史本傳字德夫絳州人父林從嶽飛至隨州因家焉自幼豪偉有膽略開禧二年金將完顔董犯襄郢宗政率義士據險遊擊奪其輜重補承節郎棗陽令轉秉義郎京西兵馬鈐轄駐襄陽嘉定十年金犯襄陽宋政與統制扈再興陳祥分為三軍設伏三所蹀血以戰金兵敗走尋報棗陽圍急宗政午發峴首遲明抵棗陽馳突如神金人宵遁權棗陽軍十一年金帥完顔薩布圍城宗政與再興合兵角敵歷三月大小七十餘戰身先士卒金人輒敗忿甚周城開濠四面控兵列濠外飛鋒鏑以綯鈴自警鈴響則犬吠宗政厚募壯士乘間突擊金人不能支盛兵傅城宗政隨方力拒援師至率諸將出戰金人奔潰轉武德郎十二年道金帥完顔額爾克擁步騎傅城宗政掘深坑防地敵穿穽才透施毒煙烈火鼓鞲以熏之金人窒以濕氊析路以刳土城頽樓陷宗政撒樓益薪架火山以絶其路以長槍徑弩備其衝距樓陷所數丈築偃月城翼傅正城深坑倍仞五日成金人摘強兵披厚鎧鐵面濕氊濡革蒙火山擁雲梯徑抵西北園樓登城城中軍以長戈舂其喉殺之敢勇軍自下􅎣擊金兵墜死燎焰金將於後截其軍拒馬揮刀迫前金人乘順風渡濠飛脂革燒戰棚宗政激將士血戰射其都統殪之會天反風士氣大振棄賈勇入金營自晡至夜半金人橫尸遍地額爾克帳走獲輜重牛馬萬計升武功大夫金人自是不敢窺襄漢代許國為荆鄂都統制仍知棗陽中原遺民來歸者以萬數籍其勇壯號忠順軍俾出沒唐鄧間威振境外金人呼為孟爺爺俄病卒謹按西吳里語及舊浙江通志皆以宗政為歸安人與宋史不合今存以俟考孟珙宋史本傳字懷玉嘉定十年金人犯襄陽駐團山父宗政被檄援棗陽臨陳父子相失珙望敵騎中有素袍白馬者曰吾父也急麾騎軍突陳遂棗脫宗政以功補進勇副尉十二年完顔額爾克攻陽珙取地道劫金人破寨十有八紹定四年為京西兵馬鈐轄棗陽軍駐劄六年元將諾延布展追金主守緒逼蔡檄珙戍鄂討金唐鄧行省武仙仙與武天錫及鄧守伊喇瑗相犄角欲迎守緒入蜀犯光化鋒鋭甚天錫鄧人乘亂聚衆為邊患珙逼其壘一鼓拔之金人犯吕堰珙命諸軍追擊金人棄輜重走瑗降珙入鄧仙將劉儀來降珙問仙虛實遣兵向離金盧秀執黑旗帥衆入寨金人不疑為宋軍乃分據巷道大呼縱火掩殺殆盡遣樊文彬攻其前門成明等邀截西路殺戮山積師還至沙窩與金人遇大捷珙料仙必上岵山頂窺伺令文彬前設伏後遮歸路仙衆果登山及半文彬麾旗伏兵四起仙衆失措枕藉崖谷薄暮珙進軍小水河夜漏十刻召文彬等受方略攻石穴九寨蓐食啓行晨至石穴時積雨未霽文彬患之珙曰此雪夜擒吳元濟時也策馬直至石穴分兵進攻九寨俱破仙易服而遁還軍襄陽轉江陵副都統制攻蔡州金兵萬人自東門出戰珙遮其歸路掩入汝河擒其偏將八十有七人進逼柴潭奪樓而上遂拔柴潭樓蔡人恃潭為固外即汝河潭髙於河五六丈城上金字號樓伏巨弩相傳下有龍人不敢近將士疑畏珙曰柴潭非天造地設樓伏弩能及遠而不可射近彼所恃此水耳決而注之涸可立待皆曰堤堅未易鑿珙曰所謂堅者止築兩堤首耳鑿其兩翼可也潭果決實以薪葦遂濟師攻城進逼土門端平元年正月珙下令諸軍銜枚分運雲梯布城下珙帥師向南門至金字樓列雲梯令諸將聞鼓則進萬衆競登大戰城上殺其元帥烏林達執其參將張天綱與布展還軍襄陽二年詔黃州駐劄元兵攻襄陽隨荆門郢守皆委郡去江陵危急詔遣援珙先遣張順渡江以全師繼之元兵一攻復州一在枝江監利縣編筏窺江珙變易旌旗服色循環往來夜則列炬照江數十里相接破寨二十有四嘉熙元年封隋縣男授鄂州諸軍都統制元將特默岱入漢陽境圖卜布哈又入淮甸蘄舒光守臣以州降合三郡攻黃珙指畫戰守卒全其城升制置使兼知嶽州乃搗襄郢復郢州荆門軍三年正月復信陽軍遂復襄陽珙奏曰取襄不難而守為難襄樊為朝廷根本百戰得之當加經理如護元氣非甲兵十萬不足分守乃置先鋒軍以襄郢歸順人隸焉元將塔海入蜀珙增置營寨分布戰艦遣兵間道抵均州防遏四年進封子拜四川宣撫使進封漢東郡侯兼京湖安撫制置使淳祐二年拜檢校太保進封漢東郡公兼知江陵府五年病革乞休授檢校少師致仕終於江陵贈太師吉國公諡忠襄元費㮤牟巘費㮤墓志字子夀長興人元初授金牌千户措置上海市舶升副使遷管軍總營鎮守上海沿海民船漫無所統屬或流為盜賊􅻖請録見戶蠲雜役而官領之得海船數千稍水手數萬乃界虎符授明威將軍管領海船萬户㮤器局寬整倜儻而篤厚他縣牒惡民朋曹相仇殺或將獮剃之㮤建白招收從征日本使自贖數千人得不死稱為費佛子丐間遷懷遠大將軍遙授浙東道宣慰使往來蘇杭山水佳處自號耐軒老人明陳翼獻徵録字良輔長興人父興驍騎前衛百户洪武辛酉征雲南蠻洞力戰死翼襲職授濟陽衛世襲千户纍功升燕山護衛世襲指揮僉事戊寅太宗舉靖難之師翼率甲四千大小二十四戰略定二十餘州己卯以白溝河濟南功升指揮同知壬午以東平汶上功升都指揮僉事是年六月平定京師升陜西都指揮同知尋命掌金吾右衛事永樂己丑扈駕還北京進中軍都督府同知後二年數將神機營軍馬扈巡迤北至和林後七年詔往南京督府視事仁宗召還北京宣德二年卒陸矩獻徴録字仲輿歸安人阜城籍宣德進士授刑部主事正統中升郎中適尚書金濂總理軍政征閩寇奏矩自副凡號令敷奏之文一出矩手至則賊渠已死餘黨據山寨自固官軍分道並進矩與副將保定伯梁瑤獨當一面併力以攻尅日破之擒其偽將而盡釋其脅從者閩境以平以功拜都察院右僉都御史尋鎮守保定諸郡復參贊延綏軍務至軍號令一新廢墜修舉邊人相誡不敢犯陳汝玉吕柟陳思古集序字思古安吉人有將略襲父爵懷遠將軍統衛事𢎞治十八年升署都指揮總揚州漕運搜剔冗濫嵗省米五千餘石正德間追捕劉寇斬首數千級又攻破孝豐湯賊俱有功實授參將嘉靖五年拜南京坐營至則人不知持兵汝玉曰坐食國家而緩急無用與豢豕何異乃比什伍簡卒不能者去之六年改坐團營旋復拜參將理會通閘河成嵗運米百九十餘萬石省車腳費三十餘萬金十年拜南京後府署都督僉事兼理操江節制安慶九江下至鎮江諸軍事汝玉拜命滋懼曰吾無功而屢受上賞惟當鞠躬盡瘁報國家爾其羞稱功伐若此施儒分省人物考字䀻之歸安人正德進士授監察御史巡山海關西自密雲傅馬蘭營至關千里而遙地為要害儒振紀綱料兵食去墨吏部內肅然請添設兵備副使一員與參將共事軍民皆得統攝嘉靖初以廣東僉事備兵惠潮惠潮故盜藪沿山洞結巢穴互為聲勢劇賊龔梁鳯鍾大總等復相哨聚儒部勒狼目漢達官軍分道直抵賊所旬日間勦平之又平新田寇桃子園寇請設惠來大埔二縣賊無所逃遁潮惠間始不從事於兵革遷按察副使告歸沈應龍獻徴録字翔卿烏程人嘉靖進士由刑部主事歷四川副使當白草番之亂撫勦未定應龍言撫之無益不若専意征勦期一大創可保數十年無事卒成擒馘斬級之功升廣東布政司參政時有事安南應龍留心邊圉參謀指畫遂誅范子儀等安插莫正中定莫浤瀷之位崖萬黎叛應龍言崖萬與瓊相去數百里止一兵備不足以辦合設參將於崖州參議於萬州專任責成協力共濟地方賴以寧靜升右副都御史巡撫山東講荒政濬運道河南師尚詔攻陷州縣應龍嚴兵於黃河一帶而運謀設計以撓之寇即退避邳泰單縣流賊嘯聚為害應龍命將出師一鼓成擒倭寇告急登州故有備倭兵船後皆逃亡船亦遞減應龍言防海必資於船禦寇必資於兵請復舊制又沙門黑山諸島遼軍逃其間不惟失伍有罪且有意外之慮議行而傍海州郡得以休息轉南刑部右侍郎卒所著有平番議安南議撫黎議山東奏議陸穩兩浙名賢録字汝成吳興人嘉靖進士授刑部主事歷四川副使備兵建昌獲流賊魁白玉升江西參政左右布政使而流賊盧梅林起閩楚之交張璉起廣之饒浦大浦蕭晚羅袍楊舜推璉為長劫興寧長樂圍平和其黨林贊據南靖為聲援王伯宣入海導倭寇犯潮州拜穩右副都御史提督軍務開府虔州合南贛汀漳雄韶惠潮郴州皆受節制穩行至吉安梗於梅林不得前乃以便宜徵兵討敗之獲梅林進至虔檄黃鄉兵屬以先驅擒上杭賊李占春討田坑賊梁寧走之襲程鄉賊徐東州執以歸分兵討連城汰內二洞賊斬酋謝文贊等明年麻陽賊袁三犯玉山永豐崇仁三縣討誅之討黃積山於大田洞積山中流矢死遂會閩廣兵討璉穩曰羣賊惟林贊為弱破贊則破竹之勢成矣乃首擊贊贊果降繼擊袍舜皆就縛穩令軍士捲甲疾趨夜擊晚誘斬之而潮守何鏜亦誘斬伯宣璉據險以拒穩重購卒獲璉斬之盡毁其巢穴捷聞遷兵部右侍郎仍撫其地賊黨以次悉平又會閩兵逐故陷興化之倭寇復其城改南兵部右侍郎吳維嶽獻徵録字峻伯孝豐人嘉靖進士除江陰令會沙賊反崇明與縣夾江相距縣故無城郭維嶽躬率甲士謹備之賊無敢犯歷右僉都御史巡撫貴州貴州半雜夷道多剽掠乃馳羽檄分道遣材官護遊校偵察之嚴踐更懸賞格夷寨各立籍記寨中諸夷若干人保界分區界內有犯坐夷長於是諸夷無敢竊發道乃通夷酋楊珂仇其叔進雄據六洞進雄故立珂為後後有子欲殺珂珂拒進雄歷十有七年當事者議未決維嶽責珂降珂乃面縛伏辜待以不死時王世麒叛清浪宋廷武宋鵬宋鷟叛草唐王阿利等叛平伐維嶽策曰世麒濟惡不悛亟誅以正國法諸宋由爭襲起黔蜀觀望出其不意急縛之一旅足矣平伐負固為虐可襲而擒於是斬世麒捕廷武鵬鷟俘阿利境內悉平罷歸卒於家胡心得德清縣志字襟寰嘉靖進士歷任司牧有賢聲奉敕整飭金騰兵備雲南值流商嶽鳯與子曩烏謀不逞勾引莽酋等內侵而土司刀落參刀落奏等陰助賊勢時心得已改命東粵慨然曰吾欲以東粵璽書不負金騰父老復過滇南移鎮金騰之衝會議進攻勦撫之策未幾破酋穴悉殲滅之誅嶽鳯父子而滇南平徵拜都御史神宗時荆襄商漢汝南間飢民流入為盜亡命者咸集時宰舉心得遂出撫鄖陽適強宗崇仁等萌異志山賊蟻附近百萬竊據漢陽時撫按正會議間崇仁擁衆直入省會肆掠遂剽劫商船欲泝流南下心得夜移師漢陽覆其巢别遣偏師躡其後討崇仁誅之寧波府五代黃晟吳越備史鄞縣人應募於望海鎮鎮中立表選魁梧者晟以矬陋不中選乃隸鎮都虞侯林膺還本鄉募衆據平嘉埭權知州事楊僎召署為平嘉浦將有衆千餘人初劉漢宏以台州賊婁文知明州事文為僎所敗其黨杜宗自寧海鎮率鄉民據奉化晟自平嘉埭以所部兵擊之執宗不殺使還台州獲其粟悉屬於本道遂為奉化鎮將餘姚相嘉侵越州董昌禦之不利刺史鍾季文遣晟領兵政嘉擒殺之昌授晟充浙東道東西副指揮使本州刺史及錢鏐舉師晟率衆應之在任十八年卒遺疏不請其子為嗣凡府庫所蓄必題曰送使其忠順如此宋沈起宋史本傳字興宗鄞人進士髙第調滁州判官遷知海門縣縣負海地卑嵗海潮至冒民田舍起為築堤百里引江水灌溉其中田益闢御史中丞包拯舉為監察御史乞復府兵汰冗卒通判越州改知蘄楚二州京東嵗飢盜起除提點刑獄至則開首贖法擕其伍盜內自暌疑轉相束縛惟恐後改開封府判官為湖南轉運使召為三司鹽鐵殿副使直舍人院熙寧三年韓絳使陜西加起集賢修撰陜西都轉運使慶州軍變將寇長安起率兵討平之會絳城綏州不利起亦罷入知吏部流內銓奉使契丹至王庭其位著乃與夏使等起曰彼陪臣爾不當與王人齒辭不就列遂升東朝使者自是為定制六年拜天章閣待制知桂州起生平喜談兵嘗以兵法謁范仲淹仲淹器其材注孫武書以自見俞充宋史本傳字公達鄞人登進士第熙寧中為都水丞加集賢校理淮南轉運副使遷成都路轉運使茂州羌寇邊充上十策禦戎神宗遣內侍王中正司經制建三堡復永康為軍因殺羌衆中正還國舉充可任召判都水監河決曹村充往救護還陳河防十餘事加集賢殿修撰擢天章閣待制知慶州慶陽兵驕充嚴約束斬妄言者五人於軍門聞有病苦則巡撫勞餉死不能舉者出私財以周其喪以故莫不畏威而懷惠環州田與夏境犬牙交錯每穫必遭掠多棄弗理充檄所部復以時耕植山夷叛舉户亡入西者且三百充遣將張守約耀兵塞上夏人亟反之充帥邊知帝有用兵意屢倡請西征言願得乘傳入覲面陳攻討之略詔令掾屬入議未及行卒樓異四明郡志字試可鄞人郁之孫政和七年守鄉郡廢廣德湖為田造大舟以供髙麗使者甚稱上意守睦州方臘反異備禦六邑土著不敢附臘以孫鑰貴贈太師楚國公李佾延祐四明志字子列奉化人慷慨好義父珂知其才壯嵗以家事屬之建炎三年金人至縣有義社號趫勇佾裹餱糧引趫勇逆擊於泉口金人不敢進時北士多南渡見義勇所聚咸依之三槐王從奉其親依義社聆其語北音也將殲之佾審其士族復館禮焉孫元白曾孫以稱同登進士以制亦進士第董之邵𢎞治奉化縣志宣和間睦寇起浙東震動之邵承命防捍補承信郎建炎三年同李佾任戩禦金人於泉口紹興間使三韓充中節使轉修武郎任戩兩浙名賢録字彥遠奉化人少英敏多勇略每慕張子房諸葛孔明之為人嘗嘆曰二賢若在吾願為之執鞭與同邑李佾董之邵以慷慨好義稱建炎三年金人入明州大掠諸縣戩與佾之邵奮義鼓勇共率家丁數百人禦於泉口每乘間出竒以搗金金不敢犯奉化得全官修武郎劉相如輿地紀勝鄞人建炎三年髙宗幸海張俊自越至明無舟可載上賜俊書許以捍賊成功封以王爵金人將犯明州相如助俊逆戰遂留以抗金因與金戰破之明張楷湯斌張楷傳字式之慈溪人永樂進士宣德初奉命督關中車騎從北征先期而集正統中擢左僉都御史福建鄧茂七反詔御史丁瑄乘傳往撫而以楷監左都督劉聚及都督僉事陳榮陳詔劉德新等兵往討之至南畿分遣德新由江西建昌會邵武而自以三千人由浙入閩時處州賊葉宗留掠鉛山道梗楷軍至廣信不得前浙東諸司請楷便宜擊宗留楷乃使指揮戴禮往戰黃柏鋪宗留中流矢死賊退保陰漿源山復擁葉希八為帥而茂七悉衆趨延平麗水盜陳鑑湖亦與茂七等聲援希八等見官軍趨閩復出掠欲引衆走浦城楷復命戴禮及陳榮會擊希入等而鑑湖從旁設伏夾攻榮禮死焉朝廷命寧陽侯陳懋尚書金濂往討楷謂劉聚曰賊聞大軍至必有懼心可因以擕之即其榜遣人馳諭威信時賊圍將樂劉德新乘夜襲破之而寧陽侯大軍亦至楷方駐兵建寧乃隂致賊黨為間諜誘茂七復攻延平於是設伏後洋沙溪而以輕兵挑之佯敗賊追入浮橋丁瑄督軍出城突擊賊遂大潰茂七中流矢死鑑湖未克楷旋師協擒之景泰元年回朝天順初為南京右僉都御史入賀卒於京王來傳詳名臣陳濂萬厯寧波府志字德清鄞人正統進士授主事纍升廣東按察副使巡視海道圍山瀕海盜勢猖獗濂親冒矢石誓不與賊俱生忽雷電交作風雨晦冥盜迷瞶擊殺俘馘無算海南肅然歷升巡撫廣東都御史時洊嵗兵興供億師旅勞止日甚濂懇懇矜惻如或傷之又奉命總督漕運後巡撫直隸兼巡紫荆關諸要害疾作卒項愫萬厯寧波府志字思誠奉化人景泰辛未進士授御史奉敕征討四川筠連等縣蠻夷銜命以往親冒矢石率先戎行險阻瘴癘一無所避得以成功因積勞致病回朝復命卒於邸舍金澤獻徵録字德潤江寧籍鄞人成化進士授刑部主事歷升四川參政播州宣慰厚饋金幣却之革三長官司撫安七十二寨夷民駢首歸命流賊李廣蝟聚五千餘人殘通江東鄉王伯榮焚蕩縣治澤前後設畫偵其渠魁而殲之銅梁新設民多負固撫巡帖服夔賊野王剛鼓衆猖獗三省督兵會勦澤下重賞之令竟平之𢎞治五年升廣東布政使時汀漳盜起嶺南湖湘不逞者和之朝議設巡撫憲臣置司要地而割附近郡縣以隸之使盜易平乃升澤為副都御史巡撫江西南贛便宜行事澤先榜令自首嚴督緝捕斬賊首滿天明等八百人諭功罪明賞罰人多感奮思效猺獠洞蠻聞風向化升南京刑部右侍郎改兵部升右都御史正德元年致仕姚鏌獻徵録字英之慈溪人𢎞治進士除禮部主事纍擢僉事副使正德九年擢貴州按察使十五年拜右副都御史巡撫延綏嘉靖五年遷右都御史提督兩廣軍務兼巡撫四川土官岑猛謀不軌鏌令都指揮沈希儀結猛婦翁岑璋共圖猛調永順保靖兵分道進討而鏌與總兵官朱麒等攻破定羅丹梁猛子邦彥以徑兵守工堯隘璋佯以兵干助邦彥比官軍來攻千人呼曰兵敗矣遂潰官軍大破之斬邦彥猛奔歸永順璋誘而鴆殺之斬首以獻詔進鏌左都御史加太子太保鏌請改設流官陳善後七事制可乃命參將張經等以兵萬人鎮其地猛黨盧蘇王受等詐言猛不死借交址兵二十萬且至夷民信之蘇等薄城經突圍走城遂陷受亦攻入思恩府巡按御史石金劾鏌失策帝以鏌有功許便宜撫勦會起王守仁督兩廣軍帝入張璁等言落鏌職間住十三年三邊闕總制大學士費宏薦鏌帝遂命以兵部尚書總制三邊軍務鏌辭帝不悅仍落􅕄間住家居數年卒陳槐甬上耆舊傳字公輔鄞人𢎞治進士歷知撫州宸濠反郡盜王浩八約為內應是日即嘯聚槐己在告家人趣槐曰可以行矣槐奮然曰國家有急以解官為辭罪當死即發兵襲殺浩八會都御史王守仁檄會諸道兵討賊槐遂更募義勇四百人率所部馳赴軍門守仁即用槐為領哨官使潛分所部之半設伏黃家渡八字腦諸處及前鋒既交伏兵呼譟並起賊遂大潰擒賊首王拱枅覲鋌等七人又提兵轉戰沿湖諸處遮截宸濠俘斬千餘復九江郡守仁獻俘至浙槐已遷江西按察副使尚留在軍守仁更奉命還撫江西謂惟槐可任事使押發宸濠詣行在槐至留都獻俘太監張永語槐曰上欲得內外官交通宸濠姓名槐力陳不可謂光武燒吏人交關王郎書使反側子自安近日李文達公奏請內外官與曹欽通者不問此俱聖主賢相事上宜遠法光武公宜近法文達永乃盡取篋中交通書籍對槐焚之值辰州苖叛改槐湖廣兵備疾革引歸陸稱閩書字君美鄞人𢎞治進士授御史巡按福建山東鋭於經略升福建按察副使巡視海道時海寇充斥稱演水戰火攻法拒擊之設畫樹防什伍海艘程出入時往來立賞格嚴哨探定保甲邊徼肅然汀漳民嘯聚為盜當路者屬以兵事稱增築三堡據險守要諜賊半至麾伏兵突之張竒夾搗俘馘無算後被論免歸汪玉分省人物考字汝成鄞人𢎞治進士授刑部主事歷升湖廣按察司僉事攝辰沅兵備永順宣慰司恃富強稱兵侵保靖地會敕大臣按治受指有所左右玉持益堅卒正其罪香爐山土夷叛合湖貴兩省兵討平之玉贊畫居多更巡武昌黃州會宸濠陷九江九江與黃蘄接壤玉入蘄戒諭修城增陴募民集兵越宿而辦巡按毛伯溫疏玉才擢郴桂兵備副使賊首王廷鑑為患玉率民兵搗其巢悉殲之歷擢右僉都御史巡撫順天畿內賊楊恭作亂玉調參將郝通授之方略不數日擒之魏英天啓慈溪縣志字士華舉進士授博士進御史按四川土官安鼇暴亂三十餘年設法擒之奉命閲京營以卒伍耗損坐為勳戚權閹所隱占一糾以法升湖廣副使永順保靖二宣慰分占洞寨讐殺纍年英下車為理曲直示憲典刻竹符多寡定罪遂皆懾伏歷進都御史巡撫貴州會貴西苗阿雜為亂英按形勢覘虛實授方任能環師急攻破寨六百俘斬數千招降以萬計蜀寇方肆流劫諸郡兵連湖湘英選兵搗其腹中連戰破之斬獲甚衆因積勞致仕劉鼎萬厯定海縣志字伯銘定海衛指揮僉事狀貌雄偉擢把總備倭正德初江西姚源寇起督𠞰大臣檄鼎為偏裨鼎奉檄呼家人語曰謹守室廬今日受命即捐身報國時也出門簡徒而行竟奏克捷升授浙江都指揮僉事時劉瑾用事繼以宸濠陰謀內使充斥道上頤使武辨而姦徒復為宸濠遙應鼎密與臺司協謀設備擒之嘉靖初總督備倭年且七十躬行邊徼簡閲徒旅謂其屬曰祖宗為慮深遠立法周至吾輩恪守之而已尋致仕家居任邊訃者多所咨訪年近八十而終屠大山甬上耆舊傳字國望中進士知合州歷擢按察副使備兵徐州值流賊大發掠州縣大山身督兵與戰賊敗走歷遷副都御史巡撫廣東酉陽蠻界思州自王守仁蕩平後稍竄伏不出至是苗民吳黑輩更擁衆破城郭遠近戒嚴大山出竒兵設伏左右翼盡殲之楚中平人謂功不在新建下遷工部右侍郎再撫湖廣討斬妖賊馬三兒晉兵部右侍郎總督湖廣川貴軍苗龍氏覃氏嘯結共擾楚大山以計間之使相攻因以大兵攻之苗悉平朝議方召大山為兵部侍郎而嚴世蕃數有覬於大山人或諷大山少賂入即得內召大山曰吾老矣顧鉛粉為容無乃違三十年素志耶卒不為通世蕃大銜之會倭入犯所遇侵掠乃降大山巡撫應天甫至官而參將許國戰敗世蕃嗾言官劾大山遂罷歸馮嶽獻徵録字望之慈溪人嘉靖進士除工部主事歷升濟南知府郡多巨盜黨與竄名府胥中蹤迹詭祕人莫之覺廉得其實一日盡縛之盜遂屏迹改延平計擒巨盜竅睂缺嘴闔郡底寧纍升右副都御史巡撫湖廣晉總督湖廣川貴軍務嶽以鄖陽居三省之中城垣未建無以捍禦城之蠟爾山諸苗三苗遺種也屢討屢叛嶽撫𠞰並行獻俘於朝奏建容美等十四司統轄之三省敉寧又𠞰卭水酉陽小平茶等苗俱捷嶽以沅州為總督聞府之處土城易壞易以石而增廓之巍然稱巨鎮焉播州苗酋阿項驍勇善戰煽誘湄潭三牌諸苗為亂侵掠旁郡三省震動授總兵官石邦憲等以方略斬首數千級阿項奔突馬蹶擒斬之諸苗悉平親詣賊巢視諸要害建築屯堡列戍分哨為久安計捷聞進右都御史兼兵部右侍郎升南刑部尚書乞休歸里萬厯辛巳卒賜祭葬如例顧翀獻徴録字曰翔慈溪人嘉靖進士授工部主事調兵部升員外郎於九邊智勇之士廉訪登記佐尚書以易置無不當擢河南按察司僉事攝徐州兵備道徐州地跨江淮多巨猾劇盜翀從容料理而地方寧謐遷福建布政司參議時倭賊猖獗而福寧尤急巡撫王詢檄往𠞰之翀馳至其地一捷於嶼再捷於大金閭峽三捷於州城之外賊大挫逃遁擢四川按察副使松潘軍夷雜處叛服不常翀動中機宜形格勢禁發即就戮因條畫五事嚴責成以馭兵威遠權事宜以防姦制變復舊額以賞夷安邊完逋餉以足食養兵設官攢以典司出納巡撫羅崇奎謂疆圉大計無過於此乃疏請行之而翀堅請致仕歸陸銓傳詳循吏陳茂義兩浙名賢録字喻之慈溪人嘉靖進士授南工部主事改北員外武定侯郭勛以手札取馬價銀二萬兩茂義曰馬價祖宗儲以備邊營札何為者寢之升廣西布政司右參議土酋盧回縱所部劫掠督臣檄茂義撫𠞰茂義親履其地視諸酋皆巖巢犂洞上記曰譬之鼹鼠山潛可不煩兵而定乃單騎往諭以禍福回率隊長五十餘人歸命而副將張經危言以激督臣竟梟回首回黨盧同盧派間回死復聚衆為亂聲擊武緣諸城總臣復命茂義招諭之同派知茂義來相謂曰是活我生命陳爺乎投戈羅拜思恩一帶悉被安堵升廣東按察副使兵備瓊崖黎寇羅常那剛倡亂茂義航海勒兵擊破郎溫椰根諸洞俘馘招降又慮夷獠雜居易生他變更條上八議為善後計遷廣西左布政參議以母老乞歸卒張淵鄞縣志字惟本嘉靖進士授興化府推官攝仙遊篆值瀕海塘圮侵及廬舍淵發粟廩飢民計日授役塘成而民得濟升南京工部主事遷知武昌府升山西副使備兵紫荆有妖賊與劇盜相倚乘機倡亂淵素善風角得勝占密授方略卒以破賊生擒渠魁升江西參政歷任廣東貴州左布政使投劾歸葉應乾兩浙名賢録字際清慈溪人嘉靖進士授髙安縣纍遷四川按察副使備兵建昌建昌居卭𤏡間地險惡六衛衛長戎政久不修應乾登壇下令比什伍而訓練之懸賞格以勵勇者於是人人超距就節制會土酋安忠死忠妻鳯氏自請襲官而從弟信謀攘之遂橫決自恣月朔以戎服見擁甲士自隨應乾使人陰布部兵於外而令材官有力者尾之入應乾臨陛立呼信跪堂下數以諸不法事叱令縳之信懾不敢出氣遂就縛而甲士在外者見所布部兵按劒立如堵墻皆奉首竄即檄鳯氏兵擊其餘黨殲巨酋三百人境內始定而滇南鳯繼祖亂應乾計繼祖聚於會川會川者建昌所屬衛也先遣兵守金沙江以扼繼祖之至己躬而繼祖果以萬衆渡金沙遂合滇師夾擊之應乾擐甲胄冒矢石為將士先遂破其軍繼祖以隻身逃匿山中不敢出向鳯氏故德應乾而其母為繼祖所害每欲復仇應乾知之密召鳯氏至授以方略使圖之鳯氏使間其所親者為內應而自以兵蹙之遂斬繼祖事平當論功而被劾落職歸陳茂禮兩浙名賢録字履卿慈溪人博綜墳典至太乙奇門無不通曉嘉靖進士授工部主事倭蹂江南改兵部郎參謀軍務時倭困江陰久茂禮往援選鋭卒三十人駕小舟直進倭舞刀跳躍兩岸兵欲射之茂禮曰此誘兵也即微服入城倭駕三十六舟沿城重載出江口挂篷三柁工以火箭射其風帆諸倭還舟救火茂禮急檄水兵總張成張祚等邀截江口諸兵躡而圍之茂禮屈指曰尅在明日午時翼午果斬首數百級而兵無一傷者倭據沈莊為巢分兵大掠茂禮督宣慰彭翼都司李經等由乍浦入為右哨劄營未久茂禮忽見異氣起營上急令移營數十步倭發炮震故營將吏歡聲動地茂禮乘而鼓之躬率精鋭突其中堅諸哨從之無不以一當百遂大克斬首千餘級賊酋徐海殲焉以功擢江西兵備副使姚源故巢賊盤踞支蔓巡撫何頤聞茂禮至即以兵屬之茂禮分左右哨三面進兵約日同發而獨空其要路一面潛令指揮率精兵三百伏道側戒之曰某日某時有衣色衣而奔者皆賊也悉擒之賊聞三道進兵而一路獨無果易服而遁伏兵起掩之悉平改備兵瓊州卒史元中甬上耆舊傳號鹿泉鄞人少任俠善射鄉舉謁選靖江學教諭遷知魚臺縣盜有簡端者善運矟馳劣馬出沒莫可蹤迹元中廉得其親信授以討縛簡卧庭下張目曰吾左手持矟右短兵橫行千里間今乃為書生掩取耶元中笑曰汝輕書生耶即起著短衣持其所用矟運之左右回旋如舞匹練忽􅒂然矟斷為三擲示簡曰汝矟豈足用耶簡叩頭稱死離魚臺三十里有獨山大盜劉儀久嘯聚其中開府曾銑議進𠞰以元中為前鋒元中知有諜者在軍乃命植一竿百步外手挾矢誓曰若一舉滅賊當三矢中此竿三發三中即察得諜者三人釋其縛賜以酒食笑謂曰汝來觀吾射耶諜者股栗盡吐賊虛實及所入徑道元中立提兵襲其寨擒儀還銑手書平寇第一功相贈銑總制三邊奏復河套檄元中同事不果行後入覲值銑為相嵩所害喟然曰事尚可為耶即日挂冠歸里時年四十二家居四十年卒馮成能天啓慈溪縣志字子經嘉靖進士授福州推官適叛兵五千行劫成能扁舟抵寨諭以禍福即解散徵授刑科給事中歷兵工二科擢湖廣參政時金洞土官覃璧縱寇掠成能集兵夜搗黑洞火其營遂擒之升貴州按察使水西安酋相攻至噪入貴陽成能召而諭之即去以二酋故從征金洞素威服之也遷四川布政使督府曾省吾𠞰九絲賊與總兵劉顯相左顯按兵不動成能請急賞其用事者人人感奮協謀襲破九絲俘斬以萬計拓地千里建武寧城凱旋以勞瘁卒於官楊尚英弇州史料字時俊其先九江之德化人以功得千戶調鎮海衛生有膂力猿臂善射及長長七尺餘虬髯燕頷顧盼若神踰冠嗣父職屬倭亂海上尚英起行間水陸大小數十戰多有功績其官自署指揮僉事指揮使都指揮同知以至都督其職自把總瀏河以至總兵於浙其階自昭勇明威以至驃騎將軍其罷也擬以雲中副將召不果感疾卒尚英有膽決饒權略撫部曲以恩信故去而多思之萬表寧波府志字民望指揮僉事椿子父早世事母孝年十七襲職好學尚氣節中正德十五年武會試纍擢廣西副總兵充漕運總兵官僉事南京中府萬氏三世從征死王事表身際承平以才望為朝臣所推督漕久國計贏詘河渠通塞靡不曉暢二洪水涸漕舟並阻議者謂黃河改流表著論折之又具疏極陳本折通融為國長利而又欲開河北山東圻內一帶荒田重農薄賦為漸減嵗漕之地議者韙之海上倭起表散家財募死士欲往奮擊會以都督僉書南京中府道經蘇州遇倭婁門率所募士及少林僧挫賊鋒中流矢遺書於子曰我家世以力戰報國我獨持文墨不任兵晚年增一箭瘢不亦美乎時賊據七團八團為巢官軍數不利表言於巡撫周珫曰賊據內地又民不得田逋日積而徵調不已相率為盜是驅之助賊也宜蠲逋弛役懸賞格以招之且下募兵令土著之餉與客兵等則人人樂歸得士千即捐賊千也議行歸者寖衆而賊方蜂屯諸島歙汪直者以驍雄魁其曹表策其可誘而縛也薦同邑人蔣洲張惟遠使為間未及行而表卒後總督胡宗憲卒遣洲以致直實表之謀也表將家子通經術熟先朝典故所著書甚夥武臣中有儒學者表為著胡守仁閩書字子安觀海衛人起家世胄領軍有功歷官福建副總兵海寇林鳯糾黨剽掠巢澎湖島守仁率把總王漢等剪除之隸戚繼光麾下從繼光談兵嘗記繼光所授為紀效新書練兵實録李環定海縣志字宗復世襲指揮嘉隆間試浙江武闈三中式繼中萬厯武進士服官海上多戰功隆慶二年海潮之薄北闉也環隨鎮帥劉顯步禱後增築內城董工與有勞焉子一鳴字有聲襲父職任臨觀備倭升貴州清浪參府以征苗之績升狼山副將改海門參將李橒續獻徵録字長孺鄞人萬厯進士授行人擢御史歷遷右僉都御史巡撫貴州水西宣諭同知安邦彥者宣慰使堯臣族子堯臣死子位幼邦彥遂擅兵柄會朝議徵西南兵入援邦彥請行橒止之邦彥歸為反謀橒纍疏請增兵益餉朝置不問遂乞休以王三善代而永寧奢崇明反重慶陷遵義貴陽大震橒留視事治戰守具遣兵援四川屢捷復遵義綏陽等或傳崇明陷成都邦彥遂挾安位反四十八支及他頭目安邦俊等蜂起相應烏撒土目安效良亦與通邦彥首襲畢節陷其城分兵陷安順平灞效良亦西陷霑益邦彥自統水西軍及羅鬼苗仲數萬東渡陸廣河直趨貴陽橒聞變急議城守分兵為五令僉事劉錫元及參議邵應禎都司劉嘉言故副總兵劉嶽分禦四門橒自當北門之衝巡按史永安居譙樓團街市兵防內變學官及諸生督民兵分堞守賊至盡鋭攻北城橒迎戰敗之轉攻東門為錫元所却賊乃為三丈樓臨城橒夜縋死士燒其樓賊又作竹籠萬餘土壘之髙踰睥睨橒急撤大寺鐘樓建城上賊棄籠官軍出燒之數出城邀賊糧賊怒遍燒村寨初總兵張彥方來救賊縱之入城曰使耗汝糧城中果大困川貴總督張我續巡撫王三善擁兵不進會彥方出戰得利賊退保宅溪橒遣裨將商士傑等乞援兵賊謂城必拔沿山為營柵隔內外間旬日始一攻輒引去副總兵徐時逢參將萬仲仁來援遇賊甕城河食盡仲仁兵先逃賊乘虛擊之軍盡潰援遂絶賊聞三善將進兵益日夜攻架木髙坡以瞰南城橒募死士燔之火五日夜三善被詔旨大舉破重圍而進十二月七日師抵城下圍始解幾一年矣橒辭兵事解官去熹宗進橒兵部右侍郎崇禎九年敘守城功進一秩賚銀幣久之卒於家謝渭定海縣志字道遊萬厯進士授評事天啓中歷官安綿道兵巡副使時蜀有安奢之亂距綿千二百里為永寧故蘭穴也宿土客兵及土蠻降蠻兵不下十萬怙亂不可約束總督朱燮元遣渭往彈壓之蠻伍以監軍新至未習兵輒大譁索餉副將秦翼明者最雄黠實陰鼓衆渭召而數之曰汝石柱土司朝廷以汝為才署為將今軍心不戢汝之罪也汝負國恩宜死翼明懾服願捕譁者自贖已而奢寅合水西兵三萬猝寇永寧渭破之斬首二千餘級寅圍海子洞渭遣裨將於龍場壩截其歸路而身率兵擊之追至寥官寨寅僅以身免初藺驍將余四等五人以衆降至是水西結為內應渭晰其反狀斬之懸首於城安奢愈恐又偵寅乏食訃紿其黨阿引使擒寅自效而蜀民初為寅所掠者亦乘其飢招之使歸乙丑正月率兵援黔中道經馬蟥壁獐諸洞皆寅黨也便宜先剪之先是渭已推山東糧儲參政兵科上疏留之遂改守川東道尋升按察使而阿引竟斬寅以報又渭嘗屢挫松潘外番猓四十八寨之兵蜀人思其恩績萬邦孚甬上耆舊傳字汝永表之孫也襲爵指揮三領漕運遷山東都司僉書入衛值三殿災邦孚率三千人夜從大司馬救火上命毁五鳯樓以保承運庫邦孚曰樓為國家象魏不可撤臣請併力衛庫乃令軍士各持濕絮被覆屋運水灌之樓得並存會援朝鮮邦孚出督龍江水師守鴨緑江通饋運晉參將守溫處閩盜詐稱商人入浙地殺掠揚帆而去莫可詰邦孚命分閩浙海界商舶不得越境閩商入浙則乘浙舟浙商入閩亦如之遂著為令再遷以都督僉事總福建兵修戚繼光遺法壁壘一新有外島舟失風被獲當事欲駢誅報首功邦孚持不可曰借風濤之力以膏吾刃吾不忍為也所獲三十五人盡釋之未幾引疾歸里髙斗樞鄞縣志字象先鄞人崇禎進士授刑部主事歷遷長沙兵備副使湖南民不知兵長沙止老弱衛卒五百又遣二百戍攸縣城庫雉堞盡圮斗樞建飛樓四十大修守具臨藍賊艘二百餘由衡湘抵城下相拒十餘日乃引去轉攻袁州遣都司陳上才躡其後賊亦解去尋擊殺亂賊劉髙峯等撫定餘衆詔録其功巡撫陳睿謨大征臨藍寇斗樞當南面大小十餘戰賊盡平纍進按察使移守鄖陽鄖被寇十載斗樞至甫六日張獻忠自陜引而東斗樞令遊擊王光恩及弟光興分扼之戰屢捷賊不敢犯十五年冬李自成陷襄陽均州攻鄖陽四日而去明年春復來攻十餘日不克乃退屯楊溪斗樞召遊擊劉調元入城旬日間殺賊三千餘自成將來攻卒不克而去乃令光恩復均州調元下光化躬率將士復穀城將襲襄陽聞孫傅庭敗旋師均州復為賊有十七年正月自成遣將路應標等以三萬人攻鄖斗樞遣人入均州燒其蓄積賊乏食而退是時湖南北十四郡皆陷獨鄖在撫治王永祚被逮衆議即任斗樞而執政擢知府徐啓元為右僉都御史代之加斗樞太僕少卿還家卒裘兆錦定海縣志字紹東慈溪人崇禎間由山東兖州府通判以登州功撫按會題邊才轉寧紹參將駐舟山時海疆備弛將士離伍兆錦一以法約之日習止齊擊刺民賴以寧後升鎮守廣東總兵官浙江通志卷一百七十二
