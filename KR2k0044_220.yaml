境有見來旗書松山神號者因遁去宋朝宣和甲辰妖人方臘嘯聚欲入境神見一嫗織巨屨賊怪問之嫗曰將以供官軍賊遽退慶元戊午延宼跳梁尉楊思中禱之得吉卜整衆擒賊賊望見神旗如曩時驚駭乃潰凡邑之旱蝗水災及癘疫無禱不應於文學科舉之士占得失尤驗今禮官以文應定廟額蓋取史臣語内外以文相應之義廟成爰作迎享送神之歌淳祐甲辰二月初吉記史大夫祠諸暨縣志在縣西北三十里靈泉鄉按大夫家世其先杜陵人諱昭徳輝其字唐咸通中充諸曁鎮遏使平喬中甫之亂黄巢犯境又却之卒葬靈泉鄉之溫泉村邦人懷之立祠祀焉梁公祠於越新編在紫山明隆慶間建祀知縣梁子琦傳詳名臣忠義節孝祠忠義祠在學宮内泮池西節孝祠在江東下坊門地方國朝雍正四年知縣佟逢年奉文建餘姚縣先農壇在東郊國朝雍正六年知縣葉瑄文奉文建立壇宇并置耤田四畝九分社稷壇萬厯紹興府志在西門外一百五十歩風雲雷雨山川壇𢎞治紹興府志在縣南門外邑厲壇餘姚縣志在治北武勝門外燭溪鄉城隍廟餘姚縣志在治東二十歩元至正二十五年重建汪文璟重修城隍廟記城隍廟在州東北二十歩故老相傳宋淳熈間封崇徳王我朝至正二十二年加封崇徳昭應王越三年九月命下而知州王侯瑢來蒞是州者二年矣政簡而役均民安而吏肅水旱疾疫有祈於神無不輙應侯於是樂民之和感神之徳而侈上之賜也乃捐俸以率其僚屬父老大修厥廟易其朽蠧破壞而増其未備者於是門廡殿寢内外一新廟修於至正二十五年四月十有五日成於十二月一日明正徳七年令張瓚新之嚴時泰城隍廟贍田記正徳間城隍故祠以歲乆就頽邑宰張侯瓚謀新之衆舉呉山寺僧文顯至則首出衣盂長物以倡施者響應不踰年落成復置常稔田三十餘畝請給符牒以禁將來之鬻并邑令顧侯存仁給之復稽舊籍而免其丁役焉嘉靖十九年通判葉金於縣之東南隅建齋房五楹萬歴十五年知縣周子文改建廟後設東西廡其後知縣黄琰重修國朝順治三年同知王應升復新之東嶽廟萬厯紹興府志在大黄山宋政和四年通直郎顧復幾捨址知縣廖天覺建建炎間燬市舶使史應炎捨今址復建嶽廟在郡中各邑往往有之而餘姚獨盛緒山廟餘姚縣志舊在龍泉山後廢遂移建於西門月城内李泳緒山廟記餘姚縣緒山祠祀典始於東晉咸康曁本朝崇寜間徽廟一夕夢禁中火有神人撲滅已而致恭曰臣越之餘姚緒山神也黎明有司不謹焮及内庭得暴雨乃已上驚異有㫖下本道搜求靈跡宛然邑上其事勅加咸康應夢之號宣和方臘之叛二浙摇動綠林數千起剡中將及境人情恟恟有異雲截道若不可進衆睨雲中鬼神兵幟可駭皆禠魄遁去乾道三年玉牒趙彥仁緯與邑耆艾有事祠下視棟宇歲乆而像設湮闇風雨鳥鼠之所穿漏相顧太息裒貲為倡俾和者成之凡錢貨工財之委應期皆至裒於春成於夏功不勞而廟貌一新國朝康熈九年復徙龍泉山舊址南雷瑞應王廟嘉泰會稽志在縣南雙鴈鄉舊廟大小雷山因溪水泛溢流木至此遷於今所元修南雷瑞應王廟記至正六年夏五月不雨土田暵乾農夫告病餘姚守汪侯辰良與官屬議於庭曰吾守兹土時值歲旱民用愁苦其咎在吏我不可不為民請按州志四民之山有北麓於州為南山其山曰大雷小雷其神曰南雷之神起晉咸康間得祠祀南有大樹幾百圍空中可容數十人下窪為泉泠然居人或見異蛇緣上天必雨謂為龍云凡民有灾沴妖孽旱蝗水澇之菑禱之無不應宋宣和間羣盜方臘宼縣縣民號於神賊且至毒蜂被野賊懼而遁神數為民禦災捍患連著顯賁宋嘉定初勅賜廟額曰孚應實為人闕遂於丁亥率官屬畢出請禱還及州而雨終日民猶以為未足丙申守又往禱屏車却蓋自稱無狀是日天無雲赤日赫然頃之雷而作雨三日而後止甌寠汚邪皆生美禾是歲為有年民乃曰祠撓弗葺何以報神我將修樹祠廟刻石於門以昭神功且以彰守之仁衆皆曰然訖成屬余記之漢髙帝廟萬厯紹興府志在白山山形𩔖蛇又産白蛇故祀以厭之嚴子陵祠𢎞治紹興府志在縣東北十里之陳山光之宅墓皆在焉其廟乃宋乾道中郡守史浩所建於越新編嘉靖間知縣丘養浩徙千佛閣左春秋祭孫應時嚴先生廟記先生吾餘姚人也晩耕於富春山富春析而為桐廬釣臺屬焉自文正范公建祠而記之釣臺之名大顯而吾邑之地靈人傑世反不傳非闕歟土俗所記吾邑稍東江瀬粼粼上下常有聲是為子陵灘盖其初之釣游處也旁又有山曰嚴公山山有古祠曰先生廟謝太傅廟紹興府志在東山祀晉謝安永澤廟餘姚縣志在儒學旁元州判官葉恒築海堤民思其功請於朝廟祀之後祀於開元鄉龍王堂石孝子廟餘姚縣志在四明鄉祀石明三元重紀至元中建傳詳孝友趙考古祠於越新編在新城内明嘉靖中知府湯紹恩建祀敎諭趙謙傳詳儒林毛忠襄祠萬厯紹興府志在汪姥橋東五十歩祀忠襄公毛吉有司春秋祭倪宗正毛忠襄祠堂碑記公字宗吉自幼負氣節陞廣東按察司僉事廣西蠻賊滋蔓揮刀斫賊力屈被害七日得屍貌如生官吏士民弔哭相屬時從車餘犒軍銀或密付公家僮為歸資是日公降於僮妻悉索以歸夏憲長曰吾平生玉潔肯含垢入地哉闔署駭觀事聞贈嘉議大夫本司按察使廣東人被公之徳者祠之水旱疾疫禱之輙應咸神之况兹鄉公之所生其山川公英靈所由萃也人之神之也宜哉謝文正祠紹興府志在龍泉山忠烈祠東明大學士謝遷祠也有司春秋祭之𫝊詳名臣海日祠萬厯紹興府志在新建祠東祀文成公父尚書王華傳詳名臣忠烈祠嘉靖浙江通志在龍泉山南麓祀贈禮部尚書孫燧嘉靖二年知縣邱養浩建黄芳忠烈孫公祠堂碑正徳己卯六月宸濠反都御史孫公死之卽死所建祠曰旌忠知縣邱養浩請於當道曰夫名徳祀於其鄉自古為訓餘姚公生其地而祠闕焉甚無以妥幽靈答明貺乃即龍泉山巔祠之額曰忠烈公諱燧字徳成别號一川居士祠地縱横若干門室各三楹東西廡各五楹皆養浩請公帑鳩工市材成之陽明先生祠嘉靖浙江通志在龍泉山舊為上方僧舍先生嘗講學於此嘉靖十四年提學徐階因為建祠先生手書學規今猶在壁間祠左有海日樓黄忠端祠餘姚縣志在新城保慶王廟左祀黄忠端公尊素有司春秋祭張鵬翮黄忠端祠堂碑銘滉漭姚江理學是衍徳業文章聿推新建繼此者誰黄公莫先公生不辰貂璫逞亂棄鼎寶槬一日百戰巖巖黄公犯顔直諫并戒同列旁燭隠患哀哉貞士或殛或竄鷤鴂爭鳴卒及於難廟祀歴年爼豆於粲滛潦稽天助虐閹宦遷而新之桷㮌輪奐傳之永乆精神靡㪚國朝雍正九年總督臣李衛檄縣重修施恭愍祠餘姚縣志在驛東祀明末殉節左副都御史施邦曜有司春秋祭國朝順治十年賜官地七十畝以為祭田貞烈祠於越新編在新城内石嵬橋西祀姜通判妾竇氏傳詳烈女忠義節孝祠忠義祠在儒學左側節孝祠在奉裁姚江驛基國朝雍正五年知縣葉瑄文奉文建上虞縣先農壇在縣東郊外國朝雍正五年知縣許藎臣奉文建立壇宇并置耤田四畝九分社稷壇萬厯紹興府志在縣西一里風雲雷雨山川壇𢎞治紹興府志在縣西南二里邑厲壇萬厯上虞縣志在北門外一里城隍廟紹興府志在縣東一百歩萬厯上虞縣志剏自後漢其址係史壽總所捨宋寶祐中莊演等再剏東有㕔事元陳椿應順等改為觀音堂後鍾愷王福相繼修治而夀總後裔得仁又益地重建陳文鼎應筠葉文珪以次興舉萬厯十二年令朱維藩重修二十五年令胡思伸改修胡思伸城隍廟記虞有城隍廟剏於漢廢於唐復於宋遞廢遞興未詳所自今廟在邑之東與治署隣若曰邑主者既以嚮明而治神則司其柄於𡨕漠中儼然而通肹蠁焉凡祐善罰淫報不爽銖寸先是嘉靖甲寅間島倭為釁三犯我郛而無能加一矢保障之功偉哉歲乆患圮又湫隘不稱瞻仰余萬歴丙申蒞治拓地聚材葺而新之石窟廟萬厯上虞縣志在羅巖山麓奉桑神神嘗助宋兵有功封郡王明張秋河決嘗顯隂靈助築至今客江湖者遇險難呼號求救輙獲䕶持有祈禱其應若響握登聖母廟嘉泰會稽志在縣西南四十里握登山之巔舊傳舜母名握登生舜於姚墟因姓姚氏蕭將軍廟嘉泰會稽志在縣東南十四里將軍秦人諱闓與弟閎領兵東之上虞植金鞭於地而自誓曰化為黄竹吾當血食於此已而黄竹生焉黄竹嶺由此得名嶺去廟甚近廟有斷碑云吳太元二年縣令濮陽興立遺徳廟萬厯紹興府志一在五夫鎮一在法界神周氏諱鵬舉東晉時宰上虞後守雁門曾游漁浦湖全家没於水自是數示靈響民立祠奉之號仙官廟唐天寶間鄉人孔澤趙瑗請禱願遷忽大風四起朱紱及香爐皆隨風而去二人視其爐紱所止處聞之於官為建祠堂賜額利濟祠中藏錢王所賜紫𫀆犀帶及鐵鞭之屬宋宣和七年敕浙部使者奏上虞遺徳廟當睦宼猖狂引兵壓境忽素旗出於廟中賊衆駭愕謂官軍已至遂退走赫然明靈實相天討保完一方命賜爵為威惠侯以顯神之威徳俾民報祀世其無怠嵩城大王廟萬厯紹興府志在縣西北六十里晉隆安中海宼亂袁山松築城禦宼而死鄉人祀之崔長官廟萬厯紹興府志在縣西七里祀唐縣令崔協林仰成崔公祠記公為邑令適歲旱征輸莫辦乃捐俸代輸至罄其家積邑人深徳之置祠於莫氏地號莫家祠祠前有樟九株名九株樟後宇廢木茂里人擬古甘棠舁香火於樹下奉如祠後嘉靖己亥復營構迄今又越二十餘禩矣樟盡萎而廟貌僅存擇日量工門庭楹廡悉更經營祠宇既備復買置祭田以供祀事朱娥廟紹興府志在縣南八里娥既配曹娥廟其後上虞邑人復為立祠傳詳烈女葛焜朱娥詩孝女祠堂溪水邊蕭蕭古樹近籠烟遺碑剔蘚臨風讀不待中郎事亦傳鄭公祠於越新編在等慈寺東祀明知縣鄭芸傳詳名宦忠義節孝祠忠義祠在縣學内東首節孝祠在縣學外金罍坊八字橋側國朝雍正五年知縣許藎臣奉文建嵊縣先農壇在東效朱公河岸側國朝雍正五年知縣張泌奉文建立壇宇并置耤田四畝九分社稷壇萬厯紹興府志在繼錦門外西嶺之上風雲雷雨山川壇𢎞治紹興府志在縣方山鄉邑厲壇嵊縣志在縣北二里仁徳鄉二都城隍廟嘉泰會稽志在縣西五十歩嵊縣志創不知何始元至正六年尹冷瓚修二十四年燬守帥周紹祖同攝尹事邢雄建明洪武三十年知縣江瀾新之成化中知縣劉清重建𢎞治十一年知縣徐恂增葺萬厯四年知縣譚禮建儀門及東西廂宇十五年知縣萬民紀撤故址鼎建國朝康熈八年知縣張逢歡重建始寧城隍廟嵊縣志在三界即古始寧治廢廟存居民即以祀社吳鉉始寧城隍廟記廟去縣北六十里三界里人之鎮神也創於東漢永建元年為始寧縣治東晉咸和間中原人物遷隐於始寧者甚多隋之開皇併於會稽唐貞元二十一年洪水衝決大壞民居今之大江即古之官巷也由是縣治廢而神祀尚存自漢晉唐宋元明歴千餘年如一日至於今不城郭而山溪自勝也不壇壝而蜡臘相承也不辟雍而多士之禮樂彬彬也不木鐸而比屋之相親相遜猶然太古遺風也徳政名鄉太欽名里民安物阜居然巨鎮一十三社春祈秋報靡敢不恭水旱疾疫禱無不應其卵翼吾人如慈母居舊壤而食舊徳歌思弗諼永為始寧遺跡云白雲祠於越新編在縣東六十里祀昇仙太子晉阮肇廟𢎞治紹興府志在嵊縣南十里肇之故居張胄阮廟詩春溪溶溶春水滿兩岸桃花連不㫁遥看彷彿武陵源曉色晴曛洞霞煖花深樹密别有村青山夐絶無塵氛參差樵舍依林住窈窕漁家傍水濆當年劉阮曾居此採藥天台遇仙子靈境那知難再逢塵緣未㫁思鄉里歸來但見七世孫舊遊零落知誰存人間嵗月等飛鳥浮生頃刻何須論我來弔古尋遺跡祠廟荒涼翳荆棘逝水東流去不囘桃樹年年自春色囘向廟嵊縣志在會稽界為徳政鄉祀社之所鄭自强囘向廟記神姓陳諱徳道生於東漢孝和之元年至四十時忽語人曰今日予生辰即死辰也當為汝鄉之主是夕果無疾而逝隣居聞鼓吹聲不絶羣駭之因憶其言構椽於蔣岸橋之岡南向以祀水旱祈禱輙應後赤烏二年一夕風雨驟作如萬騎雜遝曉視之廟東向矣遂題其額曰囘向廟顯應廟嘉泰會稽志在縣西四十里祠初建於赤烏二年神嘗為令此邑有惠政廟食於此嵗乆失其姓宋宣和辛丑睦宼起蔓延旁境剡縣屠戮尤酷一夕四山旗幟車蓋隱隱出入雲間賊徒忽驚呼曰天兵至矣遂自相攻殺鄉人復築廟宇紹興十一年賜額顯應封靈祐侯葛仙翁祠萬厯紹興府志在太白山有丹井藥竈許岳英葛仙翁祠詩㫁崖崔巍天驥騰虚明倒影勢欲崩太隂生寒激山籟微茫烟水涵青㝠逺峯堆瓊搏霄漢芙蓉城髙錦雲亂殘紅稚綠春尚濃綺户闕林半當年仙子逰無方鈞車足跡名殊鄉世𫝊得魚化龍去千年遺事歸𣺌茫雲烟蔽虧漲穹灝斷碑龍文近丹竈偶來扉履歩山椒兩䄂風生漫吟嘯嶀浦廟寳慶會稽續志在縣北四十五里神姓陳名廓睦州青溪縣人嘗為台州永安縣令始過此見山水勝絶隂有卜居之意秩滿再經忽舟覆溺死自爾靈顯民遂祠之稱為陳長官廟晉天福初有神兵之助封為上善濟物侯樓鑰嶀浦廟記剡溪兩山相向西曰嶀山巨石突踞水上其下曰嶀浦巖壑奇聳尤為勝絶淵渟澂澈不知為幾尋文相傳中有神物無敢觸犯上善濟物侯廟夙著威靈據山瞰溪稱其為神明之居舟楫所經無不致敬廟有呉越時公牒稱陳長官祠嘉祐七年何淹作記云侯為台之仙居令過此溺死自爾靈騐民遂祠之天福初受封然酈道元之注水經出於後魏已言嶀山北有嶀浦浦口有廟甚靈驗則廟已古矣況台州樂安縣五代時改為永安景徳四年始改為仙居不應石晉之前已有此名豈侯實為永安縣令後人誤承仙居之名耶傳記亦有謂靈祠間有以剛方之士代之者惟其血食有素授職於朝故封爵之報與臣子不殊也建炎元年金兵入越欲犯邑境以神之威不戰而退乾道嘗賜香茗之奠今丞相謝公布衣時由丹邱赴南宮神已告之富貴之期既登科作尉此邑事之尤謹公既登樞筦修職魏君必大率邑人以加封為請慶元改元賜廟額曰顯應公之力也魏君年及八十新其祠而鑰之子潚為丞介以請記乃為記之靈濟侯祠嵊縣志在縣東門外百數十歩故有祠在浦橋明洪武十七年增建於邑之南門成化二年知縣李春重葺十三年縣丞齊倫拓大之嘉靖二十三年詔春秋崇祀三十四年知縣呉三畏徙今所萬厯十五年知縣萬民紀更拓之宋寳祐元年敕兩浙洪水為患尤深幸錢塘潮神靈濟侯大顯神通逆風退浪不壞民居不傷民命祠宇臨江水波不入嚴衢近郡亦賴保全是用重褒封號旌異靈聰宜改靈濟侯為善應侯載諸祀典俞浙靈濟侯祠記剡之浦橋有神曰陳侯諱賢者生於乾道戊子殁於紹定庚寅既殁禦災捍患所在響答侯生能為神不問晝夜遇假寢輙神遊江海間拯䕶舟楫嘉定庚辰潮怒齧堤手一竹植沙塗上誓之曰神有靈無使潮越吾竹以為神羞潮至望竹伊邇即勢伏迄邐折而東行未幾西岸擁沙成阜畚鍤就緒而長提屹若山繞矣一日郯之鄉丈人趙公炎來道侯之孫某將築亭墓上奉祀事求文為記吾少時舟行浙江中流浪湧篙公仰天呼侯數四浪輙平舟獲善濟吾時常有祈禱之語乆未克償遂為記之王烈婦祠紹興府志在清風嶺烈婦臨海人宋末為元帥所劫乃囓指血寫詩山石上投崖下死血漬入石至今天隂雨則僨起如新有司春秋祭楊維楨王烈婦詩天荒地老妾隨兵天地無情妾有情痛血囓開霞嶠赤啼痕化作雪江清能從湘瑟聲中死全勝胡笳拍裏生三月子規啼盡血春風無淚寫哀銘張翥王貞婦詩清風嶺頭石色赤嶺下嶀江千丈黒數行血字尚斕斑雨蕩霜摩消不得當時一死真勇烈身入波濤魂入石至今苔蘚不敢生上與日月爭光晶千秋古石化為碧海風吹斷山雲崩可憐薄命良家子千金之軀棄如土古來䘮亂何處無誰肯將身事他主兵塵澒洞迷天台骨肉㪚盡隨飛埃楓林影黒寒燐墮精靈日暮空歸來堂堂大節有如此正當廟食標崔巍君看嶀江之畔石上血真與湘江竹上淚痕俱不滅國朝康熈五十七年巡撫朱軾檄紹興知府俞卿重修忠義節孝祠忠義祠在學宮東側節孝祠在縣治百歩街之東國朝雍正五年知縣張秘奉文建新昌縣先農壇在東郊外國朝雍正六年知縣李之果奉文建立壇宇并置耤田四畝九分社稷壇萬厯紹興府志在縣西北一里風雲雷雨山川壇𢎞治紹興府志在縣南百歩邑厲壇紹興府志在縣東北一里城隍廟嘉泰會稽志在縣西一百五歩成化新昌縣志宋封崇福侯元至大元年縣尹李承事重建元末燬於方氏明洪武二年知縣周文祥因舊址併舊尉司址重建成化十一年知縣李楫重修劉阮廟萬厯紹興府志在十一都採藥徑祀劉晨阮肇保應廟成化新昌縣志在十四都宋寶慶二年鄉民楊大春等狀稱有隋諸生避難没葬其地水旱疾疫禱輙應民請祠之遂賜今額董泰初保應廟詩廟食空山八百年衣冠猶是李唐前汴河十里垂楊栁何似松隂數畝田陳東之保應廟詩投迹空山計已非江都消息亂來稀廟前幾種青青草錯怨王孫去不歸呉府君廟成化新昌縣志在二十一都神姓呉名元之仕唐守越後居剡西今為永福鄉既没葬於上黄院止水廟紹興府志一名捍患祠舊在東堤上宋紹興中知縣林安宅寶祐中知縣趙時佺俱築東堤有功民為立祠明成化間侍郎俞欽征川貴山賊夢二人語曰明午當助風次日交戰果反風克勝歸即崇飾廟貎以報其功嘉靖二十三年知縣萬鵬築城改遷城内易其額曰東鎮黄璧止水廟詩歩入東溪路翹瞻令尹祠築堤前日事止水後人思晝永官無事秋成民不飢喬松看合抱應是手親移石子重先生祠嘉靖浙江通志在鼓山書院中歲以丁祭後祭新昌縣志祀宋儒石墪傳詳儒林陳宣慰祠萬厯紹興府志在城隍廟西元至元中建祀浙東宣慰陳恬俞浙陳宣慰祠記公字慶甫河南府人至元十四年以浙東宣慰從百餘卒來自福建抵新昌隣境婺之玉山多悍夫先是有欲逞悍於一使者呼儔五百軰約便道為邀害計風傳來期適與公値邑人白公宼鋒必鋭少避之公曰吾宣皇靈慰民望以為職不幸遇宼弭宼可也避宼可乎縱吾可避百姓魚肉不上負朝廷羞使節乎况宼亦吾民也吾將導揚天子徳意昭示禍福使知向背以盡吾職無愧吾心而已即留止縣治翼日宼至公肩輿招諭罄囊勞之寇認為前使者喧呶洶湧不復聽命擁衆直前公遂死焉宼覺其誤驚駭鳥㪚嗟乎公以赤子視寇寇不以父母視公公為寇開生路宼乃納公於死事之倒施有如此者非命也耶公既死邑人壯而祠之閱二十有八載邑大夫王光祖求文為記因𤼵明其事以表見於當世云何鄉徳祠於越新編在東城外祀明尚書何鑑石性何鄉德祠記大司馬新昌何公有大惠於鄉今即其所可見者言之新昌之東有古防焉湍水嵗齧決而厲民公謀之藩郡増築髙廣邑之田賦汨於豪姦小民貿貿焉不知所如則鬻家以償公議度而籍之諸弊頓息縣治居萬山中留都之稅疲於飛輓公議擬溫台改輸近郡邑有社倉去城阻逺民弛於防則蠧日滋令質之公移置近邑所徭役省而防閑便舊制邑三十有二里公以民貧議歸併十之一邑東南接溫台道路時壞於洪水往來病渉公始議結石為周行餘二千歩又建傑閣以壯八鄉之觀𢎞治癸亥大祲民有菜色公議上請得蠲租賬恤賴以活者甚衆他如議免軍需而遞送省裁革冗簿而費用節請除府庫之役而窮困始蘓凡所以益於國而利於民之政不可悉舉宜鄉之人廟貌而頌祝之役世而不能忘也忠義節孝祠忠義祠在學宮内西隅節孝祠在學宮外興賢坊右國朝雍正六年知縣葛大梁奉文建浙江通志卷二百二十一
