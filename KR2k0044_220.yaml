月會稽雙義祠成祀宋義士唐公珏林公德賜也宋社既屋宋諸陵之在會稽者悉發而平之姦僧楊璉真伽實倡率焉珠玉悉攫取而投骨榛莽極其憯戚二公先後以他骨竄易而瘞之植冬青以志顧正史不傳雜出於紀事之書其言不皆同而皆有所徴要為不誣也縣故有祠在名宦祠之左嵗久且敝南充張君鑑以甲辰進士來知縣事謂二公所為得名直以陵寢之故陵旁故多隙地依陵植祠於事為宜嵗時有事六陵以次及公祠與陵相為終始亦庶幾二公之志也顯應廟萬厯紹興府志在攢宮季本顯應廟記郭公諱紹以行稱紹一生於元至元六年性質直有義氣鄉閭有急每以身先之不求其報家貧以樵為生毫髮不茍取每至深山窮谷穿虎豹之羣而無恐怖及卒常依人言禍福歷歷皆有明徴鄉人異之故水旱疾疫必致禱焉劉太守祠萬厯紹興府志在府城隍廟西正德三年郡人王野輩建祀知府劉麟王文成公祠紹興府志在府北二里許明嘉靖十六年御史周汝員建以祀王陽明守仁薛應旗告陽明祠文嘉靖壬子春二月後學武進薛應旗視學紹興謁陽明王先生祠見祠以新建伯題額因思先生之所以振起乎俗學著存乎人心者恐不專在是也屬紹興府知府梅守德易以今額具香帛果醴為文以告之曰於乎先生豪傑之才聖賢之學闢世路之榛蕪闡吾道之精一真有繼往開來之德不止勤事捍患之功旗等雖未及門竊幸私淑頃登先生之祠會先生及門之士議易今額直書曰陽明先生祠謹告國朝康熙二十九年知府李鐸重修易今額忠節祠萬厯紹興府志在府城西南五里正德時裕州同知郁采死流賊之難嘉靖中僉事蔣舜民知縣劉昺即其墓立祠祀之忠烈祠紹興府志在徴愛祠之左明嘉靖二十一年知府沈啓口山創祀餘姚孫忠烈燧兼祀其子都督堪尚寶卿墀南京禮部尚書升褒忠祠山陰縣志在光相坊新建伯祠之右明嘉靖三十四年紹興府知事何常明山隂庠生金應㿩餘姚監生謝志望庠生胡夢雷禦倭死於難事間於朝常明贈太僕寺丞應㿩志望夢雷俱贈州同知立祠以祀之沈公祠萬厯紹興府志在嵇山里隆慶六年巡按御史謝廷傑建祀贈光祿寺少卿沈鍊有司春秋祭徐渭有記傳詳忠臣龎公祠紹興府志在府學西明萬厯間郡人建祀巡按御史龎尚鵬景賢祠萬厯紹興府志在禹迹寺西萬歷二年建祀長沙知府季本張元忭有記傳詳儒林湯太守祠紹興府志在開元寺內祀知府湯紹恩傳詳名宦明萬厯初建其生祠在三江閘口明嘉靖中建國朝雍正三年六月浙江巡撫法海以紹恩創築三江閘有功紹郡題請封號敕封寧江伯春秋致祭六賢祠在郡城南府學之東羅門側國朝康熙二十四年知府胡以渙建祀明季節義諸臣監察御史黃尊素户部尚書倪元璐左都御史劉宗周左副都御史施邦曜右庶子周鳯翔蘇松巡撫祁彪佳陸孝子祠在丈五村國朝康熙五十五年知府俞卿建祀孝子陸尚質傳詳孝友張文恭祠舊浙江通志在山隂縣右明萬厯間建祀諭德張元忭傳詳儒林陶文簡祠紹興府志在江橋右明天啓間建祀祭酒陶望齡傳詳儒林雙節祠萬厯會稽縣志在賀家湖口江家園止水墩明𢎞治中里人建以祀范氏二女嘉靖間知縣牛斗重新之傳詳列女湯紹恩雙節祠詩老夫和淚寫新詩止水亭中雙節奇萬古綱常同一死寸心鐡石兩無移鸞分鏡影秋風冷鳯咽簫聲夜月遲天地不窮情不盡迄今草木有餘悲忠義節孝祠山隂縣二祠俱在上植坊會稽縣二祠俱在朝東坊國朝雍正四年知縣周崇髙張我觀奉文建蕭山縣先農壇在縣治東門外國朝雍正五年知縣門鈺奉文建立壇宇并置藉田四畝九分社稷壇萬厯紹興府志在縣西二里風雲雷雨山川壇紹興府志在縣東三里邑厲壇萬厯紹興府志在縣北一里城隍廟𢎞治紹興府志在縣治南一百五十步其神舊志稱崇福侯蓋誤以府城隍舊額冠之也寧濟廟紹興府志在西興鎮浙江潮神也宋政和三年賜今額六年髙麗入貢而潮不應有司請禱潮即大至詔封順應侯淳熙末髙宗靈駕來太守張杓躬視漲沙沿御舟入浦處盡護以紅竹詰朝方集萬夫逮潮落沙已蕩盡水去所插之竹才尺許及虞祭畢沙復漲塞先是已加武濟公於是又加忠應翊順靈祐公慶元四年賜爵孚祐王有司以八月十五日祭白龍王廟紹興府志在航塢山宋紹興中建武佑廟嘉泰會稽志在縣北二里舊號北嶺將軍廟蕭山縣志又名厲將軍廟輟耕録至正丙申歲大旱方士陳希微禱雨於武佑廟纍日俄降筆云吾秦人厲狄也與項羽起山隂雖功不竟而死然有德於民其父老不忘我者俾血食於此世代雲變湮我姓名故以相告至今人呼為厲將軍廟劉基北嶺將軍廟碑餘暨東北百里為蕭山縣其山曰北幹之山其神甚靈能祛疫癘作雲雨人有所祈必應尊其神曰北嶺將軍歲時祠焉宋徽宗時方臘反睦州自睦入杭具舟將渡江吏民大恐怖相率禱於神比寇至即有風逆其舟且見甲士列岸上甚衆乃止不敢渡寇平知越州劉韐上其事於朝賜額曰武佑廟後封顯應侯有元至正十二年主簿趙君誠至縣元統甲戍春以俸錢作新廟豫為之歌俾祀神焉劉太守祠蕭山縣志在錢清鎮北祀漢會稽太守劉寵傳詳名宦唐封靈應侯宋改靈助侯元至正間帥周紹祖重建明嘉靖三十六年令魏堂葺王叔能劉太守祠詩劉寵清名舉世傳至今遺廟在江邉近來仕路多能者也學先生揀大錢沈環劉太守祠詩古廟小江邊穹碑記一錢清名垂竹帛遺愛豈蒲鞭犬臥花村月人耕緑野煙千秋承血食誰復繼前賢國朝康熙二十八年知府李鐸屬會稽縣知縣王風采修之五十五年知府俞卿重修張靜安公廟紹興府志在縣東北十里之長山神諱夏宋景祐中浙江塘壞神時為工部郎中受命護堤置捍江五指揮各率兵士四百人採