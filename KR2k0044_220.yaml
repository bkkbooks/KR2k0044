body:
  text: 浙江通志卷二百二十一祠祀五紹興府山隂縣附郭會稽縣附郭先農壇在五雲門外一都一啚國朝雍正五年山隂縣知縣石祕會稽縣知縣張我觀奉文建立壇宇并合置藉田九畝八分社稷壇紹興府志在迎恩門外數百步運河之南山隂會稽之祭附焉地𨽻山隂陸遊社壇記縣社在禮禋坊曰社曰稷曰風師曰雨師曰雷神凡五壇皆廢不治四明王君時會之來為令乃即其地為垣八十丈築室四楹有門以時其啓閉有庫以儲其器物用宋之櫟豐之枌榆故事藝松五十凡稽合制度藁秸管席幣篚樽爼豆籩簠簋勺羃莫不如式粢盛酒醴牲牢莫不共給獻有次祝有位齋有禁省饌食爵奠幣飲福望燎望瘞有儀祝事各以其日禮成而退無違者國朝康熙二十九年知府李鐸重建於社旁隙地種松竹植桑柘嵗取其租以共修葺五十四年知府俞卿重修風雲雷雨山川壇於越新編在會稽山之隂紹興府志山隂會稽附焉久圯國朝康熙二十九年知府李鐸會稽知縣王風采重建郡厲壇紹興府志山隂會稽共祀在昌安門外久圯其地為民居侵占國朝康熙五十六年知府俞卿復之修其祭壇城隍廟山隂縣志在臥龍山麓山之上下各有殿上殿西偏有星宿閣前列梅嶺諸峯最為勝絶再西有湖山一覽堂下瞰王公池前𢃄鑑湖下殿之東有思敬堂前有池曰凝碧紹興府志神姓龎諱玉為越州總管惠澤在民既卒郡人追懷之祠以為城隍神梁開平二年吳越王錢鏐奏為崇福侯錢鏐城隍廟記浙東地號奧區古之越國當舟車輻湊之會是江湖衝要之津自隋末移築子墻因遷公署據臥龍之髙阜雉堞穹崇對鏡水之清波風煙爽朗𬗟惟深固宜叶𡨕扶故唐右衛將軍總管龎君玉頃握圭符首臨戎政披榛建府吐哺綏民仁施則冬日均和威肅則秋霜布冷堵墻愛戴黔庶歌謡尋而罷軍興嗟餘芳不泯衆情追仰共立嚴祠鎮都雉之岡巒宰軍民之禍福殿堂隆邃儀衛精嚴式修如在之儀仰托儲靈之應往載釁生劉氏妖起羅平豫躬稟睿謀恭行天討數年擐甲兩復越檣皆資肹賚之功以就戡平之業特為重增儀像嚴潔牲牢邇來四野無塵重門罷柝丁卯嵗揚旌東渡巡撫軍民躬奠椒漿目瞻靈像每暢吳風越俗共欲道泰人安昔為兩鎮之疆今作一家之慶遂馳箋表請降封崇所冀朝恩與漢牧齊標美稱共秦巒對聳尋蒙天澤果賜允俞頒崇福立嘉名升五等之尊爵其所奉敕命員列如左梁開平敕鎮東軍城隍神龎玉前朝名將劇郡良材頃因剖竹之辰實有披榛之績創修府署綏輯吏民豈獨遺愛在人抑亦垂名終古況錢鏐位隆三鎮功顯十臣能求福而不回致效靈而必應願加懿號以表冥符宜旌岌嶪之功用顯優隆之澤宜賜號崇福侯宋紹興元年賜額顯寧封昭佑公三十年加號忠順乾道五年加號孚應八年加號顯惠淳熙三年封忠應王後又加號昭順靈濟孚佑萬歷紹興府志明洪武三年去前代封號稱紹興府城隍之神萬厯十二年下廟殿災知府蕭良幹重新之謝遷謁廟詩迤邐岡巒隔市塵嵯峨臺殿集髙真天低象緯先分曙地接蓬壺獨貯春大府建牙森棨戟仙壇煮石足荆榛滿前多景真奇絶老眼于今又一新國朝康熙五十四年知府俞卿重修上下二廟其上廟星宿閣久燬惟池基略存山隂縣城隍廟山陰縣志明嘉靖二十一年知府張明道知縣許東望新建於太清宮側後知縣耿庭柏移建於演武場東紫金坊國朝康熙四十年知縣顧容修會稽縣城隍廟會稽縣志在縣東二十餘步正德十五年知縣徐岱修嘉靖十九年知縣吳希孟重修國朝雍正五年知縣張我觀修旗纛廟舊浙江通志明洪武𥘉征南副將軍廖永忠建在紹興衛西南陬嵗霜降鎮將衛所守禦官祭之紹興府志後移於會稽縣東南法濟里南鎮廟萬厯會稽縣志在會稽山之隂周禮職方氏揚州之鎮山曰會稽秦併天下以會稽為名山祭用牲犢圭璧晉咸和八年從祀北郊隋開皇十四年就山立祀唐天寶十年封永興公以南郊迎氣之日祭宋淳化二年從祕書少監李至言以立夏日祀永興公於越州後加封永濟王元改封昭德順應王鄧文原南鎮廟碑東南控帶江海層岡峭嶺圭立屏峙莫可殫狀而會稽之山秀崒無儔明靈所司由隋唐暨宋祝號祭式公王次升大德己亥詔尊南鎮會稽山為昭德順應王與嶽瀆同祀至大己酉嘉議大夫多爾濟來守兹土進謁祠下顧視興慨曰守臣職在藩宣事神訓民曷敢不欽厥事乃集羣議將大撤而新之請於帥府給緡錢二萬五千四百有奇經度故址為畝二十五有半因發地得石具識深廣北東西臨溪南直玉笥峯紀以宋大中祥符之二年視舊加斥克𢎞厥規豈神之宿留告曉於人固如此哉明洪武三年詔去前代封爵止稱會稽山之神每嵗以春秋二仲月祭後禹陵一日唐之淳南鎮廟詩維昔作巨鎮此地壓荆揚計功自神禹望祀及秦皇馮陵任厚坤歘吸半炎方昔聞周祀典近者自隋唐器物及儀文制侔侯與王層宮列象設錯落丹青光煙鬟夾霧縠出入人鬼傍嶂聚金碧氣樹多靈鳥翔𡨕𡨕象羣怪藹藹圖百祥飄飄紫蓋矗懆懆朱絲張不知誰為助意乃惑愚龎山川固明靈在德非馨香褻祠既靡用古典或可詳騁詞代巫祝自天祈降康國朝順治八年遣孫廷銓致祭御祭文惟神秀競千巖靈鍾萬壑帶江襟海育物福民朕統御寰中敬修祀典昭兹殷薦衛我南藩尚饗順治十八年遣李敬致祭康熙六年遣王清致祭二十一年遣李仙根致祭二十四年遣鄭重致祭二十七年遣阿山致祭三十五年遣裘充佩致祭三十六年遣溫逹致祭四十二年遣王紳致祭聖祖仁皇帝御書秀帶巖壑四字奉懸廟中復勒石焉御祭文惟神德配祝融望隆於越靈威丕赫作鎮南方朕祗承休命統馭寰區夙夜勤勞殫思上理歷兹四十餘載今者適屆五旬海宇升平民生樂業見輿情之愛戴沛下土之恩膏特遣專官虔申秩祀尚憑靈貺益錫蕃禧佑我國家共登仁壽神其鑒焉康熙四十八年遣覺羅滿保致祭五十二年遣拉都渾致祭五十八年遣薄有德致祭六十一年十一月世宗憲皇帝即位遣吳廷揆於雍正元年二月告祭御祭文惟神秀挺越山功施浙水威靈有赫作鎮南方朕纘受丕基新承景命竊念皇考膺圖以來百靈效順四海從風坐享升平六十餘載兹當嗣位之始宜隆祀享之儀特遣專官虔申昭告惟冀時和嵗稔物阜民安淳風遍洽乎寰區厚德長孚於率土尚其歆格鑒此精誠雍正十三年九月今上皇帝即位遣趙之垣於是年十二月告祭御祭文惟神秀挺千巖名標百越帶江襟海炳曜炎邦朕纘承大統仰紹前徽伏念皇考臨御以來敬禮明神肅將禋祀靈祗孚應昭受鴻庥清晏奠安茂登上理茲當嗣位之始宜隆望秩之儀特遣專官虔申告祭惟冀雨暘時若年榖順成萬方蒙樂利之庥兆姓荷帡幪之德尚其歆格鑒此精誠虞舜廟述異記會稽山有虞舜巡狩臺下有望陵祠𢎞治紹興府志在郡境者四所一在會稽縣東南百里一在餘姚縣歷山一在上虞縣西北四十里一在上虞縣梁湖北大禹廟嘉泰會稽志在縣東南少康立祠於陵所梁時修廟唯欠一梁俄風雨大至湖中得一木取為梁即梅梁也宋政和四年敕廟額曰告成東廡祭嗣王啓而越王句踐亦祭别室廟下為放生池臨池有咸若亭明逺閣懷勤亭𢎞治紹興府志郡境尚有四所一在山隂縣西余山一在山隂縣蒙捶山一在嵊縣了溪上一在新昌縣南名公塘廟紹興府志山隂廟在塗山南麓宋元以來咸祀於此明時始即會稽山陵廟致祭兹廟遂廢大禹陵廟每嵗有司以春秋二仲月祭謝惠連祭禹廟文謹遣左曹掾奉水土之羞前薦夏帝之靈咨聖繼天載誕英徽克明克哲知章知微運此宏謨恤彼民憂身勞五嶽形瘦九州呱呱弗顧虔虔是欽物貴尺璧我重寸隂乃錫元圭以告成功虞數既改夏德乃隆臨朝總政巡國觀風淹留稽嶺乃徂行宮恭司皇役敬屬暉融神惠略薦乃昭其忠宋之問謁禹廟詩夏王乘四載兹地發金符峻命終不易報功疇敢踰先驅總昌會後至伏靈誅玉帛空天下衣冠照海隅旋聞厭黃屋便道出蒼梧林表祠轉茂山阿井詎枯舟遷龍負壑田變鳥耘蕪舊物森如在天威肅未殊元夷屆瑶席玉女侍清都奕奕閨闥邃斬斬仗衛趨氣清連曙海雲白洗春湖猿嘯有時答禽言常自呼靈歆異蒸糈至樂匪笙竽茅殿今不襲梅梁古製無運逢日崇麗業盛答昭蘇伊昔力云盡而今功尚敷揆才非箭美精享愧生芻郡職昧為理拜空寧自誣下車霰已積攝事露行濡人隱冀多祜曷難霑薄軀李紳禹廟詩削平水土窮滄海畚鍤東南盡會稽山擁翠屏朝玉帛穴通金闕架雲霓祕文鏤石藏青璧寶檢封雲化紫泥清廟萬年長血食始知明德與天齊林景熙謁禹廟詩萬國曾朝會羣山尚鬱盤嚴祠鎮元璧故代守黃冠窆入雲根濕梁歸雨氣寒年年送春事來拂蘚碑看國朝康熙二十八年聖祖仁皇帝南巡閲視黃河念大禹神功特幸會稽二月十四日昧爽詣廟致祭賜帑金二百兩給其後裔增守祠二人御書地平天成四字扁額御製江淮河漢思明德精一危微見道心對聨一副恭懸正殿紹興府知府李鐸增葺祠宇五十二年知府俞卿重修而舊祠規模狹隘嵗久漸圮雍正七年欽奉上諭著加謹修葺總督臣李衛欽定察勘動帑興修伯益廟於越新編在山隂縣承務鄉一名稽山廟傅揆重稽山廟柱聨稽唐虞二典烈山澤驅蛇龍佐禹以平水土三江是底故帶礪特存乎兩浙讀山海一經刊草木爚魚蟲配稷而粒蒸民九土攸同寧爼豆僅盛於八鄉越王祠嘉靖山陰縣志嘉靖十一年知府洪珠即光相寺基改建以祀越王句踐在府西北二里𢎞治紹興府志郡有二所一在府西北一在會稽縣東南十二里王十朋越王祠詩寂寂霸圖歜堂堂祠廟留餘休障一國往事憶千秋苦蕺山中採香醪湖上投平吳端在此可與後人謀江東廟名勝志在城東北二里神石姓諱固秦時贛人廟食於贛江之東漢陳嬰討南越神以捷聞此廟越之始項羽廟於越新編在項里溪上𢎞治紹興府志一在山隂縣西南二十里一在上虞縣西南五十里朱太守廟名勝志在文應橋西即朱買臣有破甌越功人民德之張世昌朱太守廟詩會稽太守吳門客昔年負薪人不識衮龍天近日易明金馬門深露猶滴漢家天子登夔龍百年禮樂唐虞風金印歸來大於斗錦衣直照天南東丈夫英雄誓許同生當封侯死廟食烏啼老屋起秋風淚痕濕透羊公石梅福廟名勝志在梅里尖之麓今即梅山寺立像祀之紹興府志明知府張明道立張喬梅福廟詩梅真從羽化萬古是須臾此地名空在西山雲亦孤井痕平野水壇級上春蕪縱有雙飛鶴多年松已枯鄭太尉廟𢎞治紹興府志在會稽縣東南十五里之樵風涇祀漢鄭𢎞華鎮鄭太尉廟詩並序鄭相起樵風用郡守第五倫之薦致位三公與倫並列可謂盛矣祠宇之下至今猶有風朝南暮北鳴玊鏘金漢上公當年榮與舊君同故山廟食千秋後來往猶乘旦暮風馬太守廟紹興府志一在鑑湖東跨湖橋南祀東漢郡守馬臻以臻開鏡湖築塘蓄水遺利甚溥民立祠以祀山陰縣志一在縣西六十里廣陵陡門上王十朋馬太守廟詩會稽疏鑿自東都太守功從禹後無能使越人懷舊德至今廟食賀家湖徐天祐馬太守廟詩澄湖昔在鏡中行總是當年畚鍤成莫訝靈祠荒蘚合煙波萬頃已春耕國朝康熙五十八年知府俞卿重修徴愛祠紹興府志在臥龍山東麓明嘉靖三十一年知府梅守德即大節祠改創祀漢太守劉寵宋太守范仲淹久之祠圮乃移二像入明知府王升期祠內國朝康熙十一年知府張三異撤而新之易額曰義愛後又增入明知府許如蘭并國朝知府張三異合宋義士唐珏並祀於右楹康熙五十四