body:
  text: 浙江通志卷八十八驛傳上環人以路節達四方舍則授館而傳遽之事行夫主之此驛遞所由昉也浙江舊置三十六驛設道臣專理厥後量地裁併而以鹽法道兼領其職特嚴騷擾之禁立法盡善皇仁所屆逺至邇安德之流行速於置郵而傳命益可見矣志驛傳大清會典直省設有驛傳專供往來公差員役持奉兵部勘合火牌驗明照數應付在京者曰會同館在外者曰水馬驛其需用馬驢車船人夫什物等項因地衝僻酌量設置各有額定錢糧或設驛丞專管或屬州縣官兼管或令武職官帶管俱責成各該督撫驛道稽察整治至舊設驛站如有相隔窵遠往復不便者許該督撫勘明酌量里數遠近題請添設驛遞事例凡驛遞各站設有夫役以供舁輿擡扛遞送文書喂養馬匹等事若係經由大路或設一二百名七八十名偏僻小路亦設二三十名各按衝僻多寡不一其夫役工食每名日給銀二三分以至七八分不等俱於驛站錢糧內開銷凡雇用夫價順治初各站雇覔夫價酌量開銷十七年覆準過往官兵需用夫役雇夫一千名以內者除驛夫外每名給銀一錢五分一千名以外者每名給銀三錢康熙七年議準雇用夫役以一百里為一站用夫千名以內者每名每站給銀一錢五分用夫千名以外者每多用夫一百名每名每站增銀一分至三錢止多十里者按分數加增少十里者按分數遞減其雇價俱於驛站錢糧內開銷雍正六年五月初六日欽奉上諭各省所設驛站夫役原以預備公事之用國家歲費多金本欲使州縣無賠纍之苦民間無差派之擾官民並受其福也但聞各省往來人員有不應用夫而擅自動用者該管之人或畏其威勢而不敢不應或迫於情面而不得不應積習相沿驟難禁止地方夫役並受擾纍重負朕加惠官民之至意嗣後惟兵部勘合欽差大臣及督撫入境學差試差或知府下縣盤查及他員奉督撫差委盤查者準其動用夫役其餘概不準動用倘有違例妄索者著該管官即行揭報督撫題參若該管官違例濫應發覺之日照例治罪著各省管理驛站事務之道員不時查察倘有徇隱一併處分特諭驛馬凡驛馬順治初各按驛路衝僻額設馬匹或一二百匹七八十匹以至一二十匹或驢二三十頭不等其馬匹草料每匹日支銀一錢或八九分俱於驛站錢糧內開銷凡馬價順治初定各直省驛馬倒斃即動支本驛錢糧通融買補其厯年開銷價值浙江每匹十四五兩雍正元年十月初五日欽奉上諭查驛站關係重大經朕屢加嚴諭然其間積弊難以盡詰有在官之纍有在民之纍如直隸山西差徭更為浩繁雖驛馬足數亦供應不敷乃內而兵部外而驛道於給發馬匹時官吏通情受賄往往所給浮於勘合之數且行李輜重皆令驛卒乘馬背負多至八九人不等所到州縣以見馬換馬向有舊例不敢詰問至督撫提鎮經過之處更惟命是從嗣後照勘合之外有敢多給一夫一馬者許前途州縣即據實揭報都察院以聽糾參如該縣容情不揭而被一縣揭報者并該縣一併治罪其督撫提鎮騷擾驛遞者皆照此例庶少蘇在官之纍至若河南山東諸省離京稍遠謂耳目易欺每驛額設馬匹不過十存三四其草料工食仍照舊開銷且逐年詳報倒斃侵蝕買補之價差使一至則照里科派將民間耕種牲口硬遣當差令其自備草料跟隨守候種種纍民尤屬不法著該地方督撫將所有驛站逐一徹底清查缺額者勒令買補至派借民間牲口尤當勒石永禁違者即從重治罪特諭馬快船各省水驛各按衝僻設船五隻至二十隻不等每船量設水夫其船隻有因毁廢修補者有因間冗裁汰者厯年增減不一附載於後浙江原設袍差紅站等船四百一十一隻康煕十五年裁船一百七十九隻十七年裁船三十七隻二十四年裁船十隻驛站錢糧直隸各省驛站俱有額設錢糧康煕十五年議裁十分之四二十年恩詔於裁四之中仍復二分二十四年後裁減不一今載額數於後浙江原額銀一拾一萬玖百玖拾柒兩二錢伍分零存銀陸萬陸千伍百玖拾捌兩叄錢伍分鹽驛道册開康熙二十五年裁袍船十隻船料銀叄百捌拾二兩二釐歸入驛站裁四銀內册報兵部充餉是年又裁袍船水手銀一千一百叄拾陸兩加閏銀叄拾陸兩原編布政司項下歸入藩庫充餉又奉兵部行令加徵各驛夫馬閏月銀叄千叄百陸拾叄兩肆錢捌分肆釐肆毫伍絲捌忽叄微叄塵叄渺叄漠叄埃二纎一沙內除扣出裁四各款應充餉銀一千陸百陸兩陸錢一分捌釐陸毫肆絲陸忽玖微伍塵一渺二漠一埃八纎玖沙外存留閏銀一千柒百伍拾陸兩捌錢陸分伍釐捌毫一絲一忽叄微捌塵二渺一漠一埃叄纎二沙康熙二十七年裁連山窰嶴嶺店三驛驛皂銀一拾伍兩捌錢玖分柒釐二毫叄絲伍忽捌微二塵玖渺叄漠陸埃玖纎玖沙併入裁四銀內充餉加閏銀叄兩俱歸布政司起運項下康煕三十二年奉部於藩庫每年撥補浙省座仙船隻不敷修造船料銀肆百柒拾兩玖錢玖釐陸毫玖絲柒忽康煕三十九年裁車廄赤城象浦三驛驛皂銀二拾玖兩二錢陸分陸釐伍毫陸絲伍忽叄微叄渺柒漠一埃玖纎捌沙加閏銀叄兩徑解布政司充餉康熙四十九年裁站河船一十四隻船料銀二拾二兩伍錢徑解布政司充餉雍正三年裁病故河船水手二名工食銀一拾肆兩肆錢加閏銀一兩二錢徑解布政司充餉雍正四年裁各縣驛馬匹工料銀二百叄拾兩玖錢捌分捌釐玖絲伍忽陸微捌塵柒渺陸漠叄纎捌沙徑解布政司充餉雍正五年裁雙溪驛驛皂工食銀一拾二兩徑解布政司充餉雍正六年裁各驛館夫二十一名工食銀一百伍拾兩捌錢叄釐加閏銀一拾二兩陸錢徑解布政司充餉是年又裁座仙站船三十九隻工食銀一千一百肆拾二兩柒錢肆分玖釐叄毫加閏銀玖拾陸兩解貯道庫候撥充餉又雍正八