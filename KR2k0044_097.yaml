body:
  text: 浙江通志卷九十八海防四紹興府紹興北乃海之支港北流薄於海鹽東極鎮海之蛟門西厯龕赭入鱉子門抵錢塘所屬山會等五縣並皆邊海蕭山去海二十里山陰去海四十里會稽去海二十里上虞去海六十里餘姚去海四十里自三江至龍山延袤三百餘里中有宋家漊蟶浦臨山泗門勝山古窰松浦均為要衝之地曹娥錢清浙江三水所會謂之三江海口在府東北港口深濶直通大洋稍東有宋家漊若從此趨陡門一帶海塘則竟抵郡城若越港而北趨浙西則赭山其關鍵也蟶浦在府東北四十里北對浙西石墩南至府城通連大海由沿江塘路至百官梁湖直抵上虞東自稱山西至宋家漊接山陰界凡二十六里西泗門港為餘姚縣東北之喉襟越港而北為浙澉浦勝山即懸泥山在餘姚縣東北七十里北浸於大海俗呼為勝山港深而廣倭舶可乘潮以入明洪武初置紹興衛防守郡城其沿海特設三江所隸紹興衛臨山衛領三山􅅹海二所觀海衛領龍山所並隸臨觀備倭把總統轄三江所洪武二十年建在府東北三十七里浮山之陽去海一里去省城八十里海上有警烽火於此通焉東南即宋家漊防維最切北冇三江鎮為東海之門舊冇小城嘉靖二年增築置兵以備倭千户等官二十一員旗軍一千三百五十二名轄臺一曰蒙池山在府東北四十里與浮山並峙烽堠六曰航塢山在蕭山縣東四十里曰馬鞍山在山陰縣西北四十里曰烏峯山一名龜山又名白洋山曰宋家漊曰周家墩曰桑盆巡檢司二曰三江巡司弓兵一百名在府北四十里浮山北麓小江經其前大海浸其東與三江所南北並峙曰白洋巡司弓兵三十二名在府西北五十里白洋山上濱海緣山築城臨山衛洪武二十年建在餘姚縣西北五十里初置廟山上後徙上虞縣故嵩城戍守去海三里並海築城東接三山西抵􅅹海北有臨山港直衝大海海口曰烏盆隘化龍隘為汛守要地衛東又有泗門港最為險要指揮以下等官九十一員旗軍五千六百名轄臺一曰羅家山烽堠九曰趙港曰烏盆曰廟山曰荷花池曰方家路曰道塘在山陰縣西北一十里本運道塘曰周家路曰泗門曰夏蓋山在上虞縣西北六十里南臨夏蓋湖北枕大海西近三江口巡檢司一曰廟山巡司弓兵一百名初在廟山後改置衛城因徙於上虞之中堰在餘姚西北八十里仍曰廟山巡司築城戍守三山所洪武二十年建住餘姚縣東北三十五里滸山下一名滸山所去海十五里界於臨觀之間西以聲援臨山東以策應觀海以蔡山金山破山並峙而名其東為勝山港千户等官十五員旗軍一千一百二十名轄烽堠七曰厯山在餘姚縣北三十五里曰眉山在餘姚縣西北三十五里海中望之如修眉然宋置寨兵一百人曰徐家路曰撮嶼曰蔡山北有望海巖曰吳家山在餘姚縣東北六十里北面大海曰滸山巡檢司二曰三山巡司弓兵三十四名初在金山後移於破山有小城戍守仍曰三山巡司曰眉山巡司弓兵三十四名在餘姚縣西北四十里闕山闕地名湖海頭􅅹海所洪武二十年建在府東北七十里纂風鎮去海里許東衛臨山西捍黃家堰近海岸有施湖隘四滙隘為戍守要地千户等官十一員旗軍一千一百二十名轄臺一曰西海塘烽堠三曰槎浦在上虞縣西六十里曰胡家池曰槤樹巡檢司一曰黃家堰巡司弓兵一百名在府東北八十里會稽上虞之界曰纂風鎮有西會渚為防禦要地觀海衛在慈溪縣西北七十里西南去餘姚縣八十里去海五里三山為右翼龍山為左翼居中節制應援地屬慈溪而轄於紹興犬牙勢也指揮以下等官九十五員旗軍五千七百四名烽堠六曰向頭在慈溪縣西北八十里向頭山山亦名西龍尾東望伏龍山與龍頭相向龍頭以東屬定海龍尾以西屬餘姚二山捍潮其中漲塗漸與山接曰爪誓在慈溪縣西北七十里大海中曰西隴山曰新浦曰古窰曰西龍尾巡檢司一曰向頭巡司弓兵一百名在慈溪縣西北向頭山宋置向頭寨元改為鎮明初改巡司洪武二十年遷於司東之洋浦三十三年革正統十四年復置於舊所龍山所在寧波府北七十里西南至餘姚縣一百二十里去海二里有伏龍山控臨海際相去僅十里許為臨觀二衛之門戶也千户等官一十六員旗軍一千二百六十三名轄臺一曰龍山烽堠五曰龍頭曰龍尾曰石塘在慈溪縣西北四十五里曰青溪曰施公山巡檢司一曰松浦巡司弓兵一百名明初置於浦東洪武二十六年移於浦西為戍守要地臨觀把總舊為定臨觀總於嘉靖二十八年分為二總定海一臨觀一其臨觀總駐劄臨山統陸兵三總前營左營中營水兵三枝遊哨左哨後哨與定海昌國二總並隸分守寧紹參將前營總哨官一員部領哨官五員兵五百四十一名平時屯劄臨山汛期分二哨防守觀海衛巡哨古窰東山平石吳家山諸處與總鎮防守龍山所官兵會哨又分二哨防守三山所巡哨勝山蔡山徐家路諸處與防守臨山衛官兵會哨又分一哨協守臨山衛巡哨周家路泗門烏盆趙港夏蓋山荷花池諸處與防守􅅹海所官兵會哨左營官兵同前營平時屯劄紹興府城汛期分發防守三江所東哨宋家漊蟶浦諸處西哨龕山諸處中營官兵同前營平時屯劄臨山衛汛期分發一哨協守觀海衛一哨協守三山所二哨防守臨山衛又分一哨防守􅅹海所巡哨槎浦西海塘蟶浦西滙嘴諸處與防守三江所官兵會哨西滙嘴邊海緊要遊哨總哨官一員部領大小戰船十四隻兵三百名汛期駐泊烈表港烈港為臨觀之門户初議設三江蟶浦臨山勝山古窰五港以衛臨觀後因各港沙硬水淺難泊改調烈港出哨遊哨漁山兩頭洞臨觀一帶海洋東哨至馬墓與定海總馬左哨官兵會哨南顧七里嶼由山定海大小港口沿海一帶西哨至蟹渤山海洋北哨漁山羊山大小七山海洋與浙西海