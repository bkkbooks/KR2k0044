body:
  text: 浙江通志卷九十一兵制二國朝八旗駐防官員大清㑹典杭州設滿洲将軍一員副都統二員八旗每旗協領一員佐領四員防禦一員驍騎校四員左翼漢軍副都綂二員四旗每旗協領一員㕘領一員防禦五員驍騎校五員順治五年遣固山額真金礪來杭駐防掌平南将軍印有梅勒夾喇牛彔等官康熙初年改固山額真為将軍都統梅勒為副都統夾喇為㕘領牛彔為佐領康熙十三年原設将軍一員副都統四員将軍筆帖式四員滿洲八旗每旗協領一員佐領二員驍騎校二員䝉古八旗每旗佐領一員驍騎校一員漢軍四旗每旗協領一員㕘領一員防禦三員驍騎校二員本年八月二十一日奉㫖滿洲八旗每旗添放防禦一員十七年十二月二十二日奉㫖滿洲八旗毎旗添放佐領一員驍騎校一員漢軍四旗每旗添放防禦二員驍騎校三員三十年五月㫖滿二十一日奉添放防禦一員三十七年五月二十洲八旗每旗㫖滿四日奉凡有佐領陞協領者其佐領歸與協領兼洲八旗㫖蒙管雍正元年九月初二日奉管本旗佐領六年九古八旗添放協領一員仍兼㫖副月十九日奉兵駐劄乍浦都統傅森領杭州現在将軍一員滿洲副都統一員漢軍副都統二員滿洲八旗協領八員佐領一十六員防禦一十四員驍騎校二十四員筆帖式四員䝉古八旗協領一員佐領七員防禦二員驍騎校八員漢軍四旗協領四員㕘領四員防禦二十員驍騎校二十員駐防甲兵馬匹大清會興杭州駐防滿洲馬兵一千五百六十四名漢軍馬兵一千四百三十六名步兵七百名官員馬九百四十二匹兵丁馬九千二百七十五匹康熙十三年額設滿洲蒙古八旗馬兵九百六十六名鐵匠四十八名弓匠二十四名步兵七百名漢軍四旗馬兵一千零三十一名鐵匠三十七名步兵三百四十七名滿漢共倭爾布七百六十名㫖革十七年四月奉六十四名添馬兵一千名内滿洲退倭爾布七百八旗添五百六十七名漢軍四旗添四百三十三名十八年正月滿洲八旗每旗添弓匠二名鐵匠㫖漢二名十九年閏八月奉六十名步兵三百四十七軍四旗共撥馬兵六百名著副都綂胡起元帶往福州駐劄自閩撥馬兵六百六十名步兵三百名著副都綂吕雲相帶往杭州駐劄内撥步兵五十名給滿洲八旗二十二年十月奉㫖滿洲八旗額兵内放暫委前鋒二百名二十三年八月奉㫖革退滿洲八旗步兵三百名三十年五月奉漢軍四㫖添馬兵二百名内滿洲八旗添兵六十四名旗添兵一百三十六名滿洲共馬兵一千六百名漢軍共馬兵一千六百名滿洲額兵内撥出二百名漢軍額兵内挑出八百名教習鳥鎗三十一年十一月奉㫖漢軍四旗添砲手十六名五十八年奉添補兵一千㫖滿洲八旗派兵一千名往雲南出兵隨㫖滿名六十年六月奉千如遇事故缺出即行汰除至洲八旗所添兵一雍正七年八月共汰除兵六百二十六名其餘未汰兵三百七十四名撥往乍浦水師數内杭州現在滿洲兵一千二百名弓匠二十四名鐵匠四十八名步兵三百六十五名䝉古兵四百名弓匠八名鐵匠十六名步兵八十五名漢軍兵一千六百名鐵匠三十七名步兵二百五十名砲手十六名駐防城在浙江省城内西俗呼滿洲城繚以磚垣四圍設大小營門順治五年及七年建内圏仁和縣東西南北啚及右衛中所屯地共計徴地一百四十畆零基地五百二十畆四分零蕩七畆零屯地一百一十七畆零又圈錢塘縣南北啚西壁坊及前衛屯地共計徴地二畆四分零基地二百二十畆六分零屯地二十七畆二分零又於順治十六年續園界墻外錢塘縣南壁啚西壁坊徴地七十五畆七分零基地三百二十五畆七分零駐防營砲位向存三號紅衣砲八位雍正四年奉文鑄造子母砲四十八位演武塲在錢塘門内西倚城東南三面繚以垣地廣三百一十六丈東南為門二中為演武堂堂左右為㕔各二堂後為火神廟南北盡處為營房駐劄乍浦水師營滿洲右翼副都綂一員協領四員䝉古協領一員佐領一十一員防禦八員驍騎校一十六員筆帖式二員左右兩營滿洲蒙古撥什庫等共兵一千六百名内左營八百名自杭州移駐右營八百名自江寜移駐綠旗水手兵共四百名内定海鎮抽兵一百五十四名黄巖鎮抽兵六十六名温州鎮抽兵五十名瑞安營抽兵二十八名鎮海營抽兵四十二名乍浦營抽兵六十名撥歸滿營教習滿營戰船共二十二隻營房共三千二百間又緑旗水兵營房四百閒演武塲在乍浦城東門内計六十二畆建演武㕔三間耳房二間鼔亭二座旗桿一根照墻一座雍正六年四月鎮守杭州等處将軍鄂彌達等題為欽奉上諭事准兵部咨開雍正五年十月議政王大臣内閣九卿奉上諭滿洲兵丁弓馬技勇均屬優長人莫能及惟於水師向來未曾練習是以朕令天津地方設立水師營以教習之今思杭州駐防兵丁既在濱江沿海之地亦當令其學習水師之事著鄂彌達李衛悉心商酌應於何處設立營房如何布置期於妥協若照潼關之例於杭州駐防之壮丁中挑選充補令其練習似於兵丁有益而國家亦得水師之用不知杭州壮丁中足敷挑選否亦令鄂彌達李衛酌量欽此欽遵移咨到臣隨咨㑹督臣李衛細加酌議查浙省沿海之地寜波府屬之鎮海縣洋面雖廣而城垣窄小居民稠穰城外亦無閒隙之地可以建造營房且距定海鎮僅二百餘里寜波府僅隔六十餘里提臣鎮臣俱有重兵駐劄又黄巖之海門與台屬前所相對中隔椒江雖為南北要衝從前設有總兵後經改駐黄巖海門僅隔黄巖鎮三十餘里又寜海之健跳所東臨大洋山㠗層疊港路寛深但與杭省窵遠陸路則山徑﨑嶇行走甚難兼有兩江之隔呼應不靈健跳形勢太孤亦無可設營房之地惟嘉興府屬平湖縣之乍浦地方係江浙接壤東與江南松江之提臣海道遥逺南隔寜波提臣海道四百餘里此地間於二處之中與省城海口之鱉子門甚近臣等相度地勢情形雖内港不甚寛廣然此地實為江浙兩省海道咽喉通達外洋諸國最關𦂳要且離杭州止二百八十餘里水陸俱通往來甚便與省城駐防滿兵聲勢聨絡首尾照應該處駐劄滿洲水師官兵實有禆益至乍浦城週圍九里三分距平湖縣僅三十里城垣新經修理堅固城内有民間菜園稻地可買甚是寛濶且尚有零碎官基堪以凑建衙署營房民情無不樂從本年二月二十七日副都統臣偏圖陛辭囘浙宣奉皇上詢及浙省添設水師兵數臣偏圖奏對浙省添設水師兵須得一千名隨奉聖諭一千似乎兵單須得二千纔好欽此臣等查得康熙五十八年駐杭滿洲䝉古兵内奉調往雲南進藏時杭州添補滿洲䝉古兵一千名曾准部咨遇有事故缺出汰除不補等因在案今尚存未汰兵四百八十名将滿洲蒙古八旗另户通數兵丁内挑選少年精壮者四百八十名再将滿洲䝉古八旗另户壮丁内少年精壮者挑選三百二十名合為八百名之數俟乍浦地方營房建造完竣之日先令帶領前往學習水師之事水師營額兵内事故缺出若無隨帶子弟頂補将杭州閒散壮丁挑選少年精壮者頂補杭州額兵内事故缺出即将杭州壮丁選補如杭州乍浦兩處兵内或有老病退甲伊等父子願就養膳俱聴從就養其新設立水師營應添設官員兵丁或於京城或於江南調撥來浙之處恭候皇上欽定候㫖遵行臣等管見杭州已派兵八百名作為一營抑或京城江南調撥八百名來浙共一千六百名分為兩營演習時一營存城看守一營帶領操演輪流習學始能熟練至奉諭㫖設立二千名其所少四百名之數臣等查得乍浦綠旗水師兵五百名係雍正二年於請更閩浙等事案内部議特行添設自乍浦海口以及大小羊山一帶令其永逺巡防奉㫖依議欽遵該營海汛與提標右營分界直至江南洋面在營兵丁各有哨巡海洋把守汛地墩臺城寨之責難以移動其浙省沿海水師各營兵丁每年配船出洋者水性船務自必諳練若全於一處抽調恐悞彼處洋汛巡防請於各營内按兵數多寡均匀派定挑選四百名改為新設滿洲水師營之捕盜頭舵繚手阿板舢板椗手水手等項之用共合二千名之數其各營兵額仍令募充補足於沿海巡防仍可無悞此外如有尚不敷用者暫著地方官另行僱募照例給與工食俟滿洲水師熟練之後将僱募之捕盜等仍行發回以節錢糧其乍浦水師營弁遇非哨巡在洋之時即可令其帮同旗員教習滿兵水務庻省隔汛另調之煩其杭州選撥水師共八百名共議編為八個佐領内滿洲每旗七十五名共六百名編為六個佐領設協領二員即著仍兼管佐領只須添設佐領四員防禦三員驍騎校六員每佐領下小撥什庫六名蒙古每旗二十五名共二百名編為兩個佐領添設䝉古佐領二員防禦一員驍騎校二員每佐領下小撥什庫六名或京城或江南挑撥官員兵丁亦照依杭州先行派定之數駐杭原有滿洲䝉古漢軍兵三千二百名将軍一員滿洲副都統二員漢軍副都統二員伏祈皇上或就於本省四員副都統内欽㸃一員前往綂轄或於京城另選賢能大臣綂轄應給關防及隨印筆帖式二員設理事同知一員管理旗民事務其官員俸餉米石并撥什庫錢糧俱照天津水師營之例支給每兵每月給錢糧一兩五錢米三倉斗官兵俸餉米石即於嘉興府屬之解司錢糧米石内就近撥解乍浦城按月支給至於官兵房屋應照天津水師官兵之例給副都統房二十間協領房十五間佐領房十二間防禦房八間驍騎校房六間筆帖式房三間兵丁房二間恭候命下之日臣李衛選擇能幹文職官員支領錢糧於乍浦地方将勘定處所官基民地分别丈撥購買造設營房工完核實報銷所有水師營船隻照天津水師兵配駕之例大號趕􅙔船每船應用捕盜一名舵工二名繚手一名椗手二名阿板二名舢板二名水手二十名小號趕􅙔船每船應用捕盜一名舵工二名繚手一名椗手二名阿板一名舢板二名水手十二名查天津水師營大號趕􅙔船每隻堪容八十餘人小號趕􅙔船堪容五十餘人每船需大砲五位小砲酌量配用海内水勢深淺風勢大小不一若兼造大小二號趕􅙔船隻不拘風勢大小水之深淺俱可撐駕共需用大號趕􅙔船十隻小號趕􅙔船十隻每船應隨帶小舢板一隻以足二千名兵丁之用再查乍浦洋面附近江南之處多係沙塗更與别處洋面不同若盡用趕􅙔則駕駛不甚便利應於大小趕􅙔船數内各減去一隻改造南􅙔船四隻則洋面可以適用俟命下之日即行動項辦料興工其船隻及船上所需棪木舵枷櫓木棕椗繩繚索等項係屬𦂳要應行地方官務須悉心料理堅固其官兵應用器械仿照天津設立俱為鳥鎗水師巡防出哨火箭籐牌挑刀等項船上所用旗纛及演習所用藥彈俱照海洋趕􅙔船内配用數目照例交地方官製造給發應用杭州官兵俟俞允起行之日交鹽驛道備辦船隻送往乍浦水師營兵操演之時該臣等每年春秋二次分班前往查看操演俟演習精熟之日停其往查臣等識見淺陋伏乞皇上勅部議覆施行經議政王大臣等會議應如鄂彌達等所請覆奏奉㫖依議雍正七年三月十四日奉上諭恭紀首卷加恩各省駐防兵丁杭州賞銀二萬兩乍浦賞銀一萬兩交與該将軍都統等營運生息如兵丁家有古㓙之費将息銀量給以濟其用總督標兵大清會典舊設總督浙江福建軍務一員標下設中左右三營官順治十五年裁康熙八年復設九年裁總督浙江軍務一員標下設中左右三營官康熙八年裁九年復設二十三年裁水利道一員標下守備一員順治七年裁督糧道一員標下守備一員順治十年裁分巡道五員杭嚴嘉湖金衢温處紹台標下