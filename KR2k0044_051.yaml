body:
  text: 浙江通志卷五十二水利河渠有書溝洫有志悉心水利者往往多詳言之兩浙固稱澤國而山縣亦多髙仰之鄉聖天子軫念民生時飭有司講求利弊捍江濬湖築隄建閘蓋惟蓄泄有備而後旱潦均可無虞實萬世之利也志水利通省水道謹按兩浙之水漸江界於中大海環於東南諸水或徑入海或由江以達於海其發源有數派江以西為武林派漢地理志云武林山武林水所出南為九溪西為十八澗瀦為西湖周三十里亦稱錢塘湖唐刺史白居易宋守蘇軾侣議開濬至今民食其利湖水北流合外沙河東過永昌壩合菜市門河西至會安壩合艮山門河轉德勝橋武林門內大河自吳山水驛過清湖上中下三閘與之會分為二一為上塘河東北徑舊東倉過臨平山為臨平湖西為石鼓湖北至長安壩一為下塘河過北新橋分為二西北流者入德清界北流者為運河厯謝村塘棲穿石門城左受語兒楓樹十八涇右受柿林羔羊十三涇之水徑石門塘東折彎環如帶曰玉灣也入桐鄉界南受車口陸墅北受車溪爛溪龍翔灣諸水東流徑皂林入秀水境逾白龍潭東流瀦為鴛鴦湖一名南湖其東南為滮湖一名馬腸湖長水海鹽二塘水之所滙也長水塘自長安壩東流為二十五里塘河過海寧縣又東流入袁花塘妙果山之尾合姚塘茶湖麻涇彭墩㳯江塘諸水入洛塘河北經紫微山贊山間為峽石河東經練浦海鹽塘亦合海寧諸水北經橫塘俱滙於滮湖東流經雙溪橋又東出會龍橋分二支一由漢塘至平湖一由魏塘至嘉善其由滮湖入澄海門由漕河入通越門者出望吳春波二門俱柬趨會龍橋又一支繞城北流過西麗北麗為相家湖又東北為麟溪亦入嘉善境其由漢塘東流者合胥江陶涇諸水滙為當湖海鹽鸕鷀上谷黃道諸湖之水合流而北過柳莊獨山乍浦諸塘之水入之東北流由三泖入黃浦自魏塘東流者一為華亭塘東為張涇滙為風涇之白牛塘合祥符蕩葉蕩之水會章練塘東入泖一為東爪湖塘北流入夏墓蕩又北入汾湖又北入澱山湖東至黃浦入海有天目派天目山上二池若左右目左屬臨安為東溪右屬於潛為西溪西溪水出尖頂徑細荆口有箕潭形如仰箕瀑布下注為蛟龍池池分上中下下流與東溪合南徑白鶴溪合雙清溪滙為三潭與虞溪合經於潛城西岝崿山臨其側名為錦江南流為浮溪經竂車橋藻溪合百丈嶺水橫塘水竹林水入之經地風山浪溪與柳源水合而為交溪經昔口昔溪出黃嶺入之東南過煙口苦竹水入之又東南與昌化紫溪合水中磐石長百餘丈望之如朝霞倒影在水名曰赤瀨東南流有二溜昌化者小溜於潛者大溜也經武勇山桑乾水入之至分水境西南流合印渚溪繞天祿山下厯二十四灘西南流徑桐廬為桐溪自天目而下一支出廣苕山為苕溪由臨安東流經餘杭合仇溪溪二源一出髙陵山一出獨松嶺亦名雙溪合徑山港經錢塘東北流過安溪奉口又經德清齊眉山下為洋溪東流為餘不溪其上流為龜溪水清徹亦名清溪東北過敢山漾又北過菱湖又北過楊灣大溪過阜安橋與武康前溪合源出銅峴山上流為阮公溪東北為後溪又東為新溪宋令蔡霖疏去砂磧因名蔡公溪合北流水即餘不之支分也會於沙溪北過峴山漾一名碧浪湖北入湖州安定門其出自獨松嶺者一支過邵渡為龍溪經荻浦與仙溪合又合孝豐浮玉山水吳興志在峴山漾為小浮玉此為大浮玉也董嶺水東流者入寧國境西流者與南嶼水會於梅溪繞安吉城東南邸閣池北來之水合梅溪西來之水經長興為荆溪其西白峴蒼雲諸水流為楊店梓方二澗滙為合溪東流為罨畫溪折而南經吕山塘四安溪合石澗廣德諸水東流入之其南餘罌溪北流入之會於霅溪又名江子滙北流至含山塘入太湖罨畫之下流為箬溪南曰上箬北曰下箬北連顧渚溪經明月峽北流為紫花澗出水口鎮注包洋湖過夾浦入太湖虞翻川瀆記云太湖東通淞江南通霅溪西通荆溪北通鬲湖東通韭溪以其通五水故亦名五湖也江子滙之水分一支出迎春門為運河又東流為官塘河經升山塘合烏鎮水由潯溪通吳江入新城塘過石臼漾合穆溪水入嘉興之漕河此浙西水道之源委也江以東有金川派金溪二源在開化一出馬金嶺一出百濟嶺經嵩陽源合而西流繞城經鐘山下東南流聲口溪入之龍山溪二源十二曲流至華埠入之始容小舟經常山北與私溪石硿溪合謂之三合水可勝三百斛舟下流與文溪合文溪四源流經江山禮賢鎮滙為一合鹿頭染口二溪經西安溪為西溪折而北經雞鳴山下定陽溪出遂昌周公源東北流與之合亦名東溪東流為盈川經龍遊為瀫溪溪南岸姑蔑故墟也靈山港出遂昌合赤真水東流入之金村源水出夀昌南流入之築溪出松陽大方山合馬報水北流入之過翠花巖下為團石潭此衢港也抵金華有雙溪派一為東港一為南港東港出東陽大盆山東北流東白山水入之安定溪西流入之迤西橫溪水入之折而南荆浦溪入之合為東陽江西流抵義烏鮎魚水出南山西流入之龍門山澗水西流入之華溪出雲橫山吳溪出杏溪合丹溪峴溪流至黃蒲潭入之五雲溪合梅溪至成家渡入之滙於畫塢山下為畫溪東陽江之别名也經金華城南石崎巖下潛溪出南山三斷水合梅花溪入之赤松澗水出金華山合徐公湖南流入之與南港合南港出縉雲黃碧山流經永康花溪出密浦山東南流入之仙溪出馬嶺北谷南流合義烏蘇溪水入之北溪出石佛山南流入之合南溪為永康溪湯溪之秀芝小龍白砂諸溪水北流入之合大小銅川南流經武義八素溪出八素山南流入之妃水溪北流入之姬水溪西流入之遂昌之熟溪合大妃嶺苦竹溪三斷山白姥溪東南流入之經金華城下與東港合故曰雙溪西流出五百灘言水迅駛挽舟須五百人此婺港也婺港西流衢港東北流滙於蘭溪蘭隂山下水紋如縠亦曰縠水三源水上曰鮑源中曰盛源下曰繆源南流入之驥溪出玉壺山八石溪出雞窠巖龍門水出烏蜀山俱南流入之社溪芝溪二水合為甘溪至湖步入之洞溪出洞巖山西流入之下流為香溪東北流與浦陽江合江水出深裊山合巖坑山水貝山步橋水由莧浦入之私水出天目伏流一百六十里乃見如沇水然東流入之經觀山下龜川水入之蛇浦水曲流入之稿溪出自石山東流入之白麟溪出金芙蓉山西流入之義烏酥溪出清潭山深溪出龍祈山合於丫口而北流入之與富陽江合有新安派新安江源出歙縣一名青溪經淳安南雲溪合梓桐水東流入之清平水合軒駐溪南流入之遂安武強溪合靈巖溪東北流入之夀昌過浴山出三泉一為周溪入艾溪一為協儒溪入淤堨溪一為五里溪入湖神溪合流至翠口又合竹溪交溪諸水入大同溪東北流入之經建德東聖水出烏龍山巔流為三灣九曲水秀泉出秀山流為西溪過杜橋入之馬目溪合大小洋溪又合桐溪北流入之杜息溪出雲岫山東流入之為胥口江一名建德江此歙港也三港之水合流而下為富春江經嚴陵山七里瀨新城水由青山潭南流會葛溪三源合流至南新鎮受分水之禾溪水東南流達派溪口受湘溪水經縣南為鼉江繞百丈山東流至深浦入於江下流經蕭山西為浙江一名錢塘江江中有羅剎石又名羅剎江江岸有定山海潮至山下即回亦名定山江有東白派山跨三邑在嵊曰北白在東陽曰西白在浦陽曰東白其水出山之隂流入諸暨界分為二一為上東江合孝義開化二溪西北流會下瀨溪為洪浦江一為上西江亦名豐江東北流合黃沙溪至丫港口合東江流為浣江經諸暨南分為下東下西二江東江受烏石溪髙公湖泌湖諸水西江受五泄溪青山溪紫草溪諸水合於三港口經山隂之西江柯水出柯山北流入之餘支溪二源一溫一涼為鏡湖别派鏡湖古南湖也周三百五十八里受山會三十六源之水流為運河與西江合東北流出斗門達三江閘入海西北流經蕭山西潘水入之西流至臨浦出西興渡入錢塘江由龕赭兩山出鱉子門入於海此浙西浙東之水合流於江以入海者也其水出東白山之陽者流入嵊縣南為剡溪其滙流有三一自東陽封山合太白山青陽岡五龍山諸派北流入之一自天台石橋出為東溪經新昌東南合石笥溪柘溪下長潭過彩煙山上碧溪東流入之一自奉化四明山有梨洲泉其流九曲為剡源溪至新昌為黃澤溪繞三十六渡北流滙於杜潭出浦口入之所謂萬壑爭流也溪紆回五十餘里越嶀嵊二山峽間東折而北入曹娥江亦名浦陽江又名上虞江有姚江派江源出太平山一稱蕙江亦名舜江西流與上虞江合菁江合長冷河東北流入之五夫河受夏蓋上妃白馬諸湖之水東流入之夏蓋湖在夏蓋山下周一百里北枕大海南為白馬湖周四十五里西為上妃湖周三十五里納三十六澗之水為上虞巨浸江水又經會稽東南為小舜江一名東小江若邪溪經鑄浦山下北流入之東為沈釀川北為簞醪河又北為了溪越絶書云禹鑿了溪人方宅土也北流過瀝海所至三江口入海有甬江派即鄞江也南接奉化江一名北渡江台州寧海之白渚溪出白嶠山東北流入之柏溪出鎮亭山南溪出鯉湖山北溪出日嶺西錦溪出華頂山雙溪出杉木鮚崎二嶺金溪出金峩山棠溪出白杜黃柑二嶺俱分流由縣溪入之西接慈溪江江源出太平山至丈亭渡分為二小支貫邑中大支由車廄浦抵城北合於鄞江它山大雷山諸水東流入之又東為管山江過桃花渡經鎮海南為大浹江支流為小浹江受西北諸湖之水東流為黃﨑江巾子候濤二山對峙為屏障北流出虎蹲蛟門入大海此浙東水道之源委也至溫州一府之水不與浙江通而自入於海其大者有三曰永寧江曰安陽江曰橫陽江永寧江在府城北門外水源有二派一出瑞安芳山鄉為瞿溪東北流經岷岡山與雄溪合經暘嶴與郭溪合滙為會昌湖唐會昌中郡守韋庸所浚分為南湖西湖中有韋公隄西過慈湖竹嶴一出仙居山中為柟溪南流合城北六鄉之水流為檔樟羅藤蓬珍小李八溪至潮漈合為永寧江一名蜃江亦名甌江城西蜃川七曲合新河百里坊河東北流入之沿江有三洲十二浦樂清之象浦其一也東接館頭江合東溪西溪同入於海安陽江有二派一自福建政和縣溫洋南流至百丈口泰順之仙居溪東流出焦灣至洪溪口合葛溪水入之又會羅陽大洪莒江水為大溪一自處州青田水凳嶺至陀溪合三坑水轉至陶山南口為小溪二溪合流至瑞安縣南為安陽江舊名安固江吳時名羅陽江唐後名飛雲渡永豐湖水出安仁鄉東北流入之東湖北湖及城內水與城北帆遊諸鄉之水入之北湖一名錦湖又東仙巖河水入之東流入海橫陽江在平陽縣西二十五里舊名始陽江南則親仁招順金舟西鄉諸水入焉北則歸仁崇政宰清鳳林東鄉諸水入焉梅溪出蓋竹山東流入之蓀湖納烏石諸山鄉之水入之燥溪自宋蘭洋分流入之東入於海處州十縣如遂昌松陽縉雲之水間有流入浙江者前文已晰言之餘水俱從溫州入甌海其大川南自龍泉之查田東北過縣南留槎閣又東下二百里會雲和之浮雲溪水又五十里至堰頭會松遂二縣水又五十里過麗水之鏡潭至三港口會宣平之黃村水又三里至蘇埠會西溪水為大溪又名洄溪南過郡城三里與東溪合東溪即今好溪其東北自縉雲大盤山西南九十里過縣東會蒼嶺水下略九盤山至東渡又西五十里經府東突星瀨過靈山為好溪又十里西南流與洞溪合東出佛頭嶺過石帆山會大羣水又南八十里會景寧之小溪水過青田經髙江至溫州永嘉縣入海若溫之泰順雖屬山縣而自溪之水繞城南流經鎮南橋過文筆峰下抵福建夀寧界入海又一支為泗溪南流至東溪渡合焦溪水入石龍潭南下龍漩溪抵福建福安界入海而處之慶元地入閩界槎溪藝洲溪棘蘭溪新窰溪諸水俱出縣北流入於閩與他縣之水歸宿差别此溫處二府水道之源委也夫水性潤下資灌溉長禾稼通舟楫固萬世之利也時或霪霖暴漲決田疇漂廬舍亦未免為民害故善治水者不惟享其利兼宜防其害貴順其性而使之流亦貴遏其勢而使之止要而論之瀕江海者利在隄塘陡門瀕湖者利在疏濬規瀦山澗溪壑之水利在堰埭陂閘前代所已舉者修復之昔賢所未創者增益之先時而謀臨事而慎俾蓄泄有方旱潦無恐皆為民牧所當悉心殫力者也至各府屬縣雖形勢不同而舊迹具在詳載於後以備參考杭州府錢塘仁和二縣附郭城內河大河舊為鹽橋運河小河舊為市河西河舊為清湖河東運河舊為菜市河東運河舊在城外元至正十六年築城圈入城內通鑑長編宋元豐三年杭州奉詔賜米開運河淺澱宋史河渠志運河在城中者日受潮水沙泥渾濁一汛一淤比屋之民委棄草壤因循填塞元祐四年知杭州蘇軾濬茆山鹽橋二河分受江潮及西湖水造堰閘以時啓閉民甚便之蘇軾請開河狀軾熙寧中通判杭州詢問民間疾苦父老皆云苦運河淤塞逺則五年近則三年率常一開濬不獨勞役兵民而運河自州前至北郭穿闤闠中蓋十四五里每將興工市肆洶動公私騷然自胥吏壕寨兵級等皆能恐喝人戶或云當於某處置土某處過泥水則居者皆有失業之憂既得重賂又轉而之他及工役既畢則房廊邸舍作踐狼籍園圃隙地例成丘阜積雨蕩濯復入河中居民患厭未易悉數若三五年失開則公私壅滯以尺寸水行數百斛舟人牛力盡跬步千里雖監司使命有數日不能出郭者其餘艱阻固不待言問其所以頻開屢塞之由皆曰龍山浙江兩閘日納潮水沙泥渾濁一汛一淤積日稍久便及四五尺其勢當然不足怪也父老又言錢氏有國時郡城之東有小堰門既云小堰則容有大者昔人以大小二堰隔截江水不放入城則城中諸河專用西湖水水既清徹無憂淤塞而餘杭門外地名半道紅昔亦有堰名為清湖意亦愛惜湖水不令走下自天禧中故相王欽若知杭州始壞此堰以快目下舟楫往來今七十餘年矣以意度之必自此後湖水不足於用而取足於江潮又況今者西湖日就堙塞昔之水面半為葑田霖潦之際無所瀦蓄流溢害田而旱乾之月湖自減涸不能復及運河謹按唐長慶中刺史白居易濬治西湖作石函記其略曰自錢塘至鹽官界應溉夾湖田者皆放湖水入河自河入田若隄防如法蓄泄及時則可溉瀕河田千頃由此觀之西湖之水尚能自運河入田以溉千頃則運河足用可知也軾於是時雖知此利害而講求其方未得要便今者蒙恩出典此州自去年七月到任首見運河乾淺賈客出入艱苦萬狀穀米薪芻亦緣此暴貴尋剗刷捍江兵士及諸色廂軍得一千人自十月興工至今年四月終開濬茆山鹽橋二河各十餘里皆有水八尺已上現今公私舟船通利父老皆言自三十年以來開河未有若此深快者也然潮水日至淤填如舊則三五年間前功復棄軾方講問其䇿而臨濮縣主簿監在城商稅蘇堅建議曰江潮灌注城中諸河嵗月已久若遽用錢氏故事以堰閘却之令自城外轉過不惟事體稍大而西湖葑合積水不多雖引入城未可全恃宜參酌古今且用中䇿今城中運河有二其一曰茆山河南抵龍山浙江閘口而北出天宗門其一曰鹽橋河南至州前碧波亭下東合茆山河而北出餘杭門餘杭天宗二門東西相望不及三百步二河合於門外以北抵長河􅳂下今宜於鈐轄司前創置一閘每遇潮上則暫閉此閘令龍山浙江潮水經從茆山河出天宗門候一兩時辰潮平水清然後開閘則鹽橋一河過闤闠中者永無潮水淤塞開淘騷擾之患而茆山河縱復淤填乃在人戶稀少村落相半之中雖不免開淘而泥土有可堆積不為人患潮水自茆山河行十餘里至梅家橋下始與鹽橋河相通潮已行逺泥沙澄墜雖入鹽橋河亦不淤填茆山河既日受潮水無緣涸竭而鹽橋河底低茆山河底四尺則鹽橋河亦無涸竭之理然猶當過慮以備乏水今西湖水貫城以入於清湖河者大小凡五道一暗門外斗門一所一湧金門外水閘一所一集賢亭前水筧一所一集賢亭後閘一所一菩提寺前斗門一所皆自清湖河而下以北出餘杭門不復與城中運河相灌輸此最可惜宜於湧金門內小河中置一小堰使暗門湧金門二道所引湖水皆入法慧寺東溝中南行九十一丈則鑿為新溝二十六丈以東達於承天寺東之溝又南行九十丈復鑿為新溝一百有七丈以東入於貓兒橋河口自貓兒橋河口入新水門以入於鹽橋河則咫尺之近矣此河下流則江潮清水之所入上流則西湖活水之所注永無乏絶之憂矣而湖水所過皆闤闠曲折之間宜作石匱貯水使民得汲用浣濯且以備火災其利甚博此所謂參酌古今而用中䇿也軾尋以堅之言使通直郎知仁和縣事黃可僎相度可否及率僚吏躬親驗視一一皆如堅言成無疑也謹以四月二十日興工開導及作堰閘不過數月可以成就今有合行起請事件謹具畫一如左得一今來所創置鈐轄司前一閘雖每遇潮上閉一兩時辰而公私舟船欲出入閘者自須先期出入必不肯端坐以待閉閘兼更有茆山一河自可通行以此實無阻滯之患而能隔截江潮徑自茆山河出天宗門至鹽橋一河永無堙塞開淘騷擾之患為利不小恐來者不知本末以阻滯為言輕有變改積以嵗月舊患復作今來起請新置鈐轄司前一閘遇潮上閉訖方得開龍山浙江閘候潮平水清方得開鈐轄司前閘立一鹽橋運河岸上有治平四年提刑元積中所石刻為人戶屋舍侵占牽路已行除拆外具載濶狹丈尺今方二十餘年而兩岸人戶復侵占牽路蓋屋數千間却於屋外别作牽路以致河道日就淺窄準法據理並合拆除本州方行相度而人戶相率經州乞據逐人家後丈尺各作木岸以護河隄仍據所侵占地量出賃錢官為樁管準備修補木岸乞免拆除屋舍本州已依狀施行去訖今來起請應占牽路人戶所出賃錢並送通判廳收管準備修補河岸不得别將支用如違並科違制咸淳臨安志紹興三年十一月宰臣奏開修運河淺澀帝曰可發旁郡廂軍壯城捍江之兵至廩給之費則不吝宰臣朱勝非等曰開河餽餉艱難時方盛寒役者良苦恐議者以為言帝曰禹盡力溝洫浮言何恤焉八年又命守臣張澄發廂軍壯城兵千人開濬運河堙塞張澄請開河奏臨安古都會引江為河支流於城之內外交錯而相通舟楫往來為利甚博嵗久堙塞民頗病之頃由陛對嘗冒天聽乞因農隙略加濬治議者恐其勞民也至於今未克行之今駐蹕之地公私所載資於舟船者百倍前日所計特最關利害者兩河爾非盡開城內之河也臣再行講究更不調夫興工乞簡兩浙諸州壯卒及廂兵共千人赴本府量緊慢開濬以工程計之半年之外河流無壅滯矣宋史髙宗本紀紹興十六年濬運河宋史河渠志隆興二年守臣吳芾言城裏運河已先措置北梅家橋仁和倉斜橋三所作壩取西湖六處水口通流灌入府河積水至望仙橋以南至都亭驛一帶河道地勢自昔髙峻今欲先於望仙橋城外保安閘兩頭作壩却於竹車門河南開掘水道車戽運水引入保安門通流入城遂自望仙橋以南開至都亭驛橋通徹積水以備緩急計用工四萬從之乾道三年六月知荆南王炎言臨安居民繁夥河港堙塞雖屬開導緣裁減工費不能訖工臣嘗措置開河錢十萬緡乞候農暇特詔有司用此專充開河支費庶幾河道復通公私為利上俞其請四年守臣周淙出公帑錢招集遊民開濬城內外河疏通淤塞咸淳臨安志乾道中大浚治城內外河凡六千二百五十丈又置巡河鋪屋三十所撩河船三十隻宋史河渠志淳熙二年兩浙漕臣趙磻老言欲於通江橋置板閘遇城中河水淺涸啓板納潮繼即下板固護水勢不得通舟若河水不乏即收閘板聽舟楫往還為便七年守臣吳淵言萬松嶺兩旁古渠多被權勢及公吏之家侵占又內寨前石橋都亭驛橋南北河道居民多拋糞土瓦礫以致填塞流水不通今欲分委兩通判監督逐時點檢勿令侵占并拋揚糞土從之咸淳臨安志清湖河疏引西湖水隄圯水涸咸淳六年朝命安撫潛説友開修一自斷河至清湖橋凡四千二百一十尺一自觀橋西至楊四姑橋凡二千三百三十五尺浚拓築補楗木甃石斷河地連吳山每大雨流潦挾草壤雜至乃即其處穿海子口深三丈餘置鐵窗櫺以釃之使浮穢不入於海置澄水閘以限之使惡流不入於河續有旨宗陽宫前沿河修築凡二百七十七丈復命和寧門外河之上流開淘為積水計自登平橋至六部橋凡四十丈置水閘闢水門清湖橋而下安撫趙與植接續浚築至衆安橋元史喀喇托克托本傳至大四年二月拜浙江行省左丞相下車進父老問民利病咸謂杭州故有便河通於江滸堙廢已久若疏鑿以通舟楫物價必平托克托曰民以為便行之可也不一月而成蘇天爵浚治杭州河渠記至正六年十月江浙行中書省始命浚治杭州郡城河渠明年二月卒事於是河流環合舟航經行商旅由逺而至食貨之價不翔湧稚髦莫不皆喜公私咸以為利矣又明年冬天爵承命參預省政幕府奧林請紀其事杭州為東南一大都會山川之盛跨吳越閩浙之逺土貢之富兼荆廣川蜀之饒郡西為湖昔人釃渠引水入城聨絡巷陌凡民之居前通闤闠後達河渠舟帆之往來有無之貿易皆以河為利或時填淤居者行者胥以為病嵗在乙酉天子念東南貢賦之煩勞閔民生之雕弊詔命國王丞相江浙省事又命翰林學士承旨達實特穆爾為平章政事曾未數月百度修舉乃詢民之利病衆以河渠不治為言丞相咨於官僚而允合謀於憲府而僉同平章公總其事於上檢校官李益杭州路總管趙璉董其役於下又以掾曹十餘人分治其工南起龍山北至豬圈壩延袤三十餘里郡中郭外支流二十餘里共深三尺廣仍其舊悉導湖水注之為役四萬二千五百工用鈔八萬五千貫復慮上出塗泥值雨入河命諸寺載而積之江滸又新木閘者四石梁者一其經營謀畫皆出平章公心計指授鈔則鹽漕備風濤所儲工則僦諸傭保公治事少暇親行河上以撫慰之以故人忘其勞事克以集嘗聞治水者當行其所無事則績用有成而鹵莽滅裂之徒或者力欲僥幸覬一時之功未有不為民患者也况夫杭州浚治河渠之事宰輔謀猷之賢任人嚴謹作事周密誠足以為後世法故備述之俾來者尚勿廢前人之功永為一方之利也歟明實録成化十一年浙江布政使寧良按察司副使楊瑄僉議錢塘門左湧金門右其間有九渠之一宜因其舊迹疏浚為河構石為橋以通湖水外置一閘以時啓閉以禦橫流庶水利可復鎮守浙江太監李義上其議其事得行民頗利焉杭州府志成化十二年湧金門北創開水門導西湖水自柳洲寺後入城由曲阜橋達城河門深四丈五尺髙九尺置鐵窗櫺障隔內外門內外各為橋上並濶一丈下濶視水門而髙則減二尺外橋下又為板閘以防暴溢萬厯杭州府志嘉靖元年久晴無雨河渠枯涸有司行勘郡城內外開通河道國朝康熙二十三年錢塘裘炳泓具呈請開城河裘炳泓請開城河略杭城全藉西湖之水達城內之河上通江干下通湖市昔唐宋諸賢濬西湖開六井築江塘作閘壩通接一城水脈百世而下尚嘉賴之今者城內河道日就淤塞殆三百餘年矣其弊在去湧金門外之閘而增新河閘閘板蓋諸商因水淺運艱是以受水處反去其閘泄水處反加其板以致省城之中遇旱魃則汙穢不堪逢雨雪則街道成河使窮民感蒸溼成疫痢若河道開通萬民樂業利賴無窮矣二十四年巡撫趙士麟力行開濬委嘉興府同知孫明忠開濬正陽門外河道杭州府通判宋德深自清湖閘開至鹽橋河自武林閘破倉橋開至大河口自梅家橋開至過東橋紹興府通判王自回龍橋開至中宫橋嚴州府通判王嘉相自候潮水門開至過軍橋自武林水門開至破倉橋湖州府通判祝鍾澤自教場橋開至杜子橋寧紹分司范景賢自正陽門外開至鐵佛寺橋溫台分司張令甲自湧金門外開至清波門外安吉州州同王世勳自梅東髙橋開至鹽橋自破倉橋開至貢院東橋河道濶狹并各橋堍悉照舊址開濬深濶兩岸河墈甃築堅完每橋建立石碑一座嚴禁居民淘夫傾潑汙泥自起工至迄工僅六月合省紳襟商民為建留清亭於孤山敬一書院之旁立碑紀事邵逺平濬河記越為東南巨省而會城當水陸衝是惟百貨之所麕集號稱繁盛乃者物力凋耗民俗啙窳融風數起説者謂城河閼塞實使之然蓋城枕吳山之麓舊引西湖水注為清渠瀠洄縱橫經絡闤闠舟楫灌溉之利於是焉在唐李泌白居易宋蘇軾守兹土皆加意疏導功德於民民迄今肖像孤山祀之沿元逮明寖廢不治成化後屢議開濬輒格不果行久之故道盡失塞為街衢占為廬舍斷溝腐水曽不容刀濁垢煩蒸無所宣泄譬之人身血脈膠戾心腹瘢結國朝而欲求不病無是理也心水利者往往而有而役以來名公卿良有司究命來大費繁相顧澀縮嵗甲子都御史河陽趙公奉河撫浙既下車數延見吏民詢疾苦杭之人以濬告博謀竂屬及薦紳耆老衆志僉同顧規畫方略言人人殊公內斷於心獨秉成算謂費雖巨勿遽勸輸捐槖金二千檄紹府别駕王俶工於回龍橋因民之便乘時之隙厚其傭給貧民趨役者如騖甫旬日著有成效自是公私樂輸資用大集公乃畫界程工簡屬之廉能者分董之復時時巾車小艇往來河干或竟日周行泥淖中勞不坐乘暑不張蓋如是者凡六閲月其已塞而全疏者起清波門三橋址厯回龍衆安橋以南循中宫橋又西北循梅家橋凡十二里以丈計者一千四百四十有竒其流淺而加濬者起湧金水門厯洗馬橋烈帝廟北循武林門南抵正陽門又南抵南新關凡二十五里以丈計者三千一百有竒費白金以兩計者凡二萬有餘役以工計者凡二十餘萬始於康熙甲子十一月二十三日訖工乙丑六月十五日於是梗塞既去清流徐來而又引繩以正其址甃石以固其岸設官艇受糞除以棄其惡立碑石禁填淤以著其罰頓使三百年久堙之美利一旦盡復而吾杭人如鯁得吐如痺得仁欣然有樂生之漸相與忭舞言不可以無紀爰相與勒石於孤山之陽垂公澤於久逺且欲後有所考俾蒞兹土者相繼勿壞以為吾杭民永利其辭曰杭為奧區襟江帶湖生齒百萬填城以居如何交渠勿鑿勿疏血液勿滲榮衛乃枯豈無仁人興言工作經費帝命不資中議而却粥斯纊斯澤以膏雨乃協僉謀美趙公撫綏南土利斯舉畚鍤如雲子來恐後人無飢勞役不淹久黎庶謳吟蒸徒忭舞昔也􅑥瓶十里待水今也洋洋溉汲楹底昔也負擔重繭不休今也方舟徜徉中流濁滓弗泄疾病侵尋今潔而甘土髙水深勺水不儲祝融屢煽今貫清泉有備無患公之經綸來者是視唐宋三賢得公而四河水淪漣吐濁留清有穹者碑有嶻者亭公名並峙永千億齡四十四年織造孫文成議闢湧金水門引水入城自溜水橋開河廣五尺深八尺至三橋折而南又轉東至府前以備聖駕南巡御舟出入焉四十六年十一月二十九日上諭工部朕宵旰勤民視如赤子無一時一事不思為閭閻圖經久之計江南浙江生齒殷繁地不加增而仰食者日衆其風土隂晴燥溼及種植所宜逈與西北有異朕屢經巡省察之甚悉大抵民恃田畝為生田資灌溉為急雖東南名稱水鄉而水溢易泄旱暵難支夏秋之間經旬不雨則土坼而苖傷矣濵河低田猶可戽水濟用髙仰之地力無所施往往三農坐困朕兹為民生再三圖畫非修治水利建立閘座使蓄水以灌輸田疇無以為農事緩急之備江南省蘇州松江常州鎮江浙江省杭州嘉興湖州各府州縣或近太湖或通潮汐宜於所有河渠水口度田建閘隨時啓閉水有餘則宣泄之水不足則瀦蓄以備用其有支河港蕩淤淺者宜並加疏濬使引水四達仍行建閘多蓄一二尺之水即田髙一二尺者資以灌溉矣多蓄四五尺之水即田髙四五尺者資以灌溉矣行之永久可俾髙下田畝無憂旱潦此於運道無涉而於民生實大有禆益今漕運總督與浙江督撫方料理截漕散賑爾部速移文該督撫等令將各州縣河渠應建閘蓄水之處並應建若干座通行確察明晰具奏爾部即遵諭行特諭欽此福建總督梁鼐浙江巡撫王然會同察勘杭嘉湖三府河渠水口應疏濬建閘之處繪圖具題工部以應如所題覆奏奉旨依議隨委溫處道髙其佩開濬杭嘉湖三府河道並建小閘六十四座用帑銀三萬三百三十八兩又分委杭州府知府張恕可開濬城內豐樂橋起至下扇五啚永興墟止一百丈五十七年巡撫朱軾委錢塘縣知縣魏㟶領工部銀二百五十七兩零開濬斷河頭至淳祐橋教化弄口一帶河道四百七十七丈雍正二年詔興水利以杭之西湖為民生利賴宜加疏濬敕督撫查勘會議總督覺羅滿保巡撫黃叔琳確勘會題為請開水利以贍民生等事該臣等會看得杭城地當省會負郭之縣仁和在東北錢塘在西南自仁和而迤東則為海寧三縣田畝數萬頃賴城外上下兩塘河水灌溉而兩河水源皆自西湖流注者也水由湧金門入城紆回環曲而出於錢塘武林艮山諸門其水出艮山門者入上塘河由臨平而達於海寧出錢塘門者由三閘而至松木場桃花港與武林之水共注響水閘凡湖墅支河與古蕩西溪沿山十八里之田皆資其利有餘之水歸入下塘河而仁和北鄉以及錢塘之下八鄉實沾蔭焉此西湖水源出入之大槩也明季以來沙土多淤聽佃於民西湖之源不能充裕三縣之田旱不兼旬即憂枯稿由來舊矣我皇上宵旰憂勤凡利益生民之事無一不厪聖懷况開濬水利所關甚大臣等奉命查勘謹按西湖舊志三十餘里內有民人占為田蕩妨害水道阻遏水源納於官者每年僅銀三十餘兩米二十餘石即田埂種植桑桕蕩內栽荷蓄魚利於民者每年亦止花息銀四百九十三兩零其為官民利益甚微而所損於民田者實不止於巨萬仰請皇上豁除糧額照舊志清出歸湖去其梗塞開通水源以貽萬世無窮之利其現存湖址二十二里有竒通計裏外湖面一萬一千三百一十五畝零淤淺硬沙葑灘共三千一百二十二畝應將淺涸者挑深淤塞者開濬芟除葑草以復故址而暢湖流則西湖之水無憂涸竭而三縣民田乾潦有備矣至於城內之河共有數道一為中河一為東河一為小河而小河又有中西北之分前人設筧鑿溝引西湖之水自湧金水門及流福溝入城北出武林水門南出正陽水門東南出候潮水門復由正陽候潮門外合流而趨永昌壩以供南𣙜之抽分通北𣙜之商貨再進而入清泰水門以通東路之糧食場竈之鹽船其曲折出入凡三十里然後由桃花港響水閘會流於上下兩塘河以灌溉田畝是城河正所以通西湖之血脈利益商民者無限倘城河淤塞則湖水無由出入今當相其淺處酌量開濬庶水利漸可興復以祈仰副皇上勤恤民隱之至意謹合辭具題工部以應如所題覆奏奉旨依議隨委府縣公估開濬工費西湖及支湖汊港計銀三萬三千六百餘兩城河計銀四千三百三十餘兩營河計銀三千四百六十餘兩桃花港烏麻陡門等處計銀一千三百一十餘兩共計銀四萬二千七百四十餘兩部議動支藩庫鹽驛道王鈞以世受君恩願捐資助濬撫臣代為題請既奉俞旨擇日開濬東河自斷河頭起至艮山門外止計長八里中斷河頭至淳祐橋計三里河身極狹共開四百六十六丈一尺中河自鳳山水門起至武林水門計長一十里內有淤淺沙灘共開一千六百二十八丈二尺中小河自新宫橋起至回龍橋計六里清波門弔橋起至府學前運司河止通江橋起至保安橋止淤淺處共開一千九百一十六丈九尺湧金水門內起至營河內水洞門至井亭橋北轉至八字橋小西河一帶共開二千六百餘丈同時兼濬西湖越兩載而工竣四年巡撫臣李衛具題浙省地屬水鄉通省河道俱資灌溉民田一應蓄泄疏濬必需專員統轄董理庶收實效查鹽驛道於通省水路驛站船隻皆其經理請將浙屬水利責成該道統轄凡有應疏應濬之處俱令確勘及時修濬實於民生有益并請於換頒傳敕內加入兼理水利字樣以專責成奉旨依議五年二月巡撫臣李衛欽奉上諭恭紀首卷開濬河道隨於五月內檄委寧紹分司徐有緯疏濬城河自織造府西轅門起至三橋關帝廟止一百二十丈并濬城外河道九年總督臣李衛委同知鄂善等動給鹽務節省銀二千兩開濬城內營河以便各縣南糧達於滿城倉厫謹按杭城四河之水皆仰賴於西湖宋人言西湖地勢髙於城二尺許元祐間蘇軾導湖水入城大小凡五道今惟湧金水門與湧金陸門暗溝兩處猶存餘皆不可考矣錢塘志云湖水入城有湧金水門湧金陸門及清波門流福溝三處而湧金水門為大今流福溝亦塞明成化間闢湧金水門即蘇軾所開之故道也考之奏云湧金門外水閘一所即今湧金門外之溜水閘也一城之水全藉此閘而舊志俱失載湖水入城俱會於大河輾轉遞注出武林水門由清湖閘而注之上下河一受一泄晝夜不息百萬生齒俱賴以生城河與西湖實脣齒之相依也湖水一日不至則城內諸河立涸矣然杭城之河與他郡異他郡之水皆平流水力所至泥亦隨刷而杭城之河自南流者有龍山諸閘阻之自東流者有永昌會安諸壩阻之自北流者有清湖閘阻之凡居民瓦礫所棄糞壤所積河道易淤故杭城之開濬較他郡為尤亟云城內井相國井在甘泉坊側西井在安國羅漢寺前按杭城六井及沈公井俱通西湖為利甚溥今相國井及西井尚存餘皆湮廢宋史河渠志杭近海患水泉鹹苦唐刺史李泌始導西湖作六井民以足用唐書白居易傳居易遷為杭州刺史復浚李泌六井民賴以汲咸淳臨安志宋嘉祐中沈遘為守日金牛井廢乃作南井熙寧中陳襄重泄治且遷方井蘇軾錢塘六井記潮水避錢塘而東擊西陵所從來逺矣沮洳斥鹵化為桑麻之區而久乃為城邑聚落凡今州之平陸皆江之故地其水苦惡惟負山鑿井乃得甘泉而所及不廣唐宰相李公長源始作六井引西湖水以足民用其後刺史白公樂天治湖浚井刻石湖上至於今賴之始長源六井其最大者在古清湖為相國井其西為西井少西而北南金牛池又北而西附城為方井為白龜池又北而東至錢塘縣治之南為小方井而金牛之廢久矣嘉祐中太守沈公文通又於六井之南絶河而東至美俗坊為南井出湧金門並湖而北有水閘三注以石溝貫城而東者南井與相國方井之所從出也若西井則相國之派别者也而白龜池小方井皆為匿溝湖底無所用閘此六井之大略也熙寧五年秋太守陳公述古始至問民之所病皆曰六井不治民不給於水南井溝庫而井髙水行地中率常不應公曰嘻甚矣吾在此可使民求水而不得乎乃命僧仲文子圭辦其事仲文子圭又引其徒如正思坦以自助凡出力以佐官者二十餘人於是發溝易甃補緝罅漏而相國之水大至坎滿溢流南注於河千艘更載瞬息百斛以方井為近於濁惡而遷之少西不能五步而得其故基父老驚曰此古方井也民李甲遷之於此六十年矣疏湧金池為上中下使浣衣洗馬不及於上池而列二閘於門外其一赴三池而決之河其一納之石檻比竹為五管以出之並河而東絶三橋以入於石溝注於南井水之所從來髙則南井常厭水矣凡為子閘四皆垣牆扄鐍以護之明年春六井畢修而嵗適大旱自江淮至浙右井皆竭民至以罌缶貯水相餉如酒醴而錢塘之肩足所任舟楫所及南出龍山北至長河鹽官海上皆以飲牛馬給沐浴方是時汲者皆誦佛以祝公余以為水者人之所甚亟而旱至於井竭非嵗之所常有也以其不常有而忽其所甚亟此天下之通患也豈獨水哉故詳其語以告後之人使雖至於久逺廢壞而猶有考也宋史河渠志元祐四年知杭州蘇軾既濬茆山鹽橋二河復以餘力全六井民獲其利咸淳臨安志乾道四年安撫周淙重修諸井淳祐七年安撫趙與􅊸奏請自湧金門至錢塘門一帶正係六井水口舊為府第占據填塞今已支錢買回先就此處用工更於荷蕩界至之外用石砌結疏石作窗立為界限澄濾湖水舟船不得入滓穢不得侵使井口常潔咸享甘泉之利從之夢粱録西湖水涸城內諸井亦竭趙與􅊸給官錢米命工自錢塘尉廨北望湖亭下鑿渠引天日山水自餘杭河經張家渡河口達於溜水橋陡門作數壩用車運水經西湖庶得流通城中諸市咸淳六年安撫潛説友乃更作石筒袤二千七百尺深廣倍舊外捍內錮益堅縝然後水大至每五十尺穴而封之以備淘浣且於水所從分之處浚海子口以澄其源井之上覆以巨石為四穴以便民汲南為溝以達於金文橋之河俾船水以售者取焉撤亭而新之旁為神祠置守者使無敢汙慢又别為溝疏惡水行於路之北所以為井慮者備矣謹按唐宋間盛稱六井之利由江與城近民患斥鹵故也後江勢漸逺城中新開甘井日多不專藉六井故自元迄明言水利者特重開湖濬河而不及治井事錢塘縣城外河道西湖在府城西舊名錢唐湖唐書白居易傳居易為杭州刺史始築隄捍錢唐湖鍾泄其水溉田千頃白居易錢唐湖石記錢唐湖一名上湖周回三十里北有石函南有筧凡放水溉田每減一寸可溉十五餘頃每一復時可溉五十餘頃大抵此州春多雨夏秋多旱若隄防如法蓄泄及時即瀕湖千餘頃田無凶年矣自錢塘至鹽官界應溉夾官河田須放湖水入河從河入田準鹽鐵使舊法又須先量河水淺深待溉田畢却還原水尺寸往往旱甚則湖水不充今年修築湖隄髙加數尺水亦隨加即不啻足矣脫或不足則更決臨平湖添注官河又有餘矣俗云決放湖水不利錢塘縣官多假他詞以惑刺史或云魚龍無所託或云茭菱失其利且魚龍與生民之命孰急茭菱與稻粱之利孰多斷可知矣又云放湖水則郭內六井無水亦妄也且湖底髙井管低湖中又有泉數十眼湖耗則泉湧雖竭湖水而泉用有餘况前後放湖終不至竭而云六井無水謬矣其郭中六井李泌相公典郡日所作甚利於人與湖相通中有隂竇往往堙塞亦宜數察而通理之則雖大旱而井水常足湖中有無稅田約數十頃湖淺則田出湖深則田沒田戶多與所由計會盜泄湖水以利私田其石函南筧并諸小筧閘非灌田時並須封閉築塞數令巡檢小有漏泄罪責所由即無盜泄之弊矣又若霖雨三日以上往往隄決須所由巡守預為之防其筧之南舊有闕岸若水暴漲即於闕岸泄之又不減兼於石函南筧泄之防隄潰也豫在郡三年仍嵗逢旱湖之利害盡見其由恐來者莫知故書於石欲讀者易曉故不文其言宋史河渠志錢氏有國始置撩湖兵千人專一開濬咸淳臨安志宋大中祥符初郡守王濟增置斗門天禧四年郡守王欽若奏為放生池慶厯初守臣鄭戩發屬縣丁數萬闢規占之地仁宗降詔奬諭宋史鄭戩本傳戩以資政學士知杭州錢塘湖溉民田數千頃錢氏置撩清軍以疏淤填水患既納國後不復治葑土堙塞為豪族僧坊所占冒湖水益狹戬發屬縣丁夫數萬闢之民賴其利事聞詔本郡嵗治如戩法宋史河渠志元祐中知杭州蘇軾奏開湖因積葑草為隄相去數里橫跨南北兩山夾道植栁林希榜曰蘇公隄蘇軾乞開杭州西湖狀杭州之冇西湖如人之有眉目蓋不可廢也唐長慶中白居易為刺史方是時湖溉田千餘頃及錢氏有國置撩湖兵士千人日夜開濬自國初以來稍廢不治水涸草生漸成葑田熙寧中臣通判本州湖之葑合者蓋十二三耳而今者十六七年之間遂塞其半父老皆言十年以來水淺葑橫如雲翳空倐忽便滿更二十年無西湖矣使杭州無西湖如人去其眉目豈復為人乎臣愚竊謂西湖有不可廢者五天禧中故相王欽若始奏西湖為放生池禁捕魚鳥為人主祈福自是以來每嵗四月八日郡人數萬會於湖上所活羽毛鱗介以百萬數皆西北嚮稽首仰祝千萬嵗夀若一旦堙塞使蛟龍魚鱉同為涸轍之鮒臣子坐觀亦何心哉此西湖之不可廢者一也杭之為州本江海故地水泉鹹苦居民零落自唐李泌始引湖水作六井然後民足於水井邑日富百萬生聚待此而後食今湖狹水淺六井漸壞若二十年之後盡為葑田則舉城之人復飲鹹苦勢必耗散此西湖之不可廢者二也白居易作西湖石函記云放水溉田瀕河千頃可無凶嵗今雖不及千頃而下河數十里間茭菱穀米所獲不資此西湖之不可廢者三也西湖深闊則運河可以取足於湖水若湖水不足則必取足於江潮潮之所過泥沙渾濁一石五斗不出三嵗輒調兵夫十餘萬工開濬此西湖之不可廢者四也天下官酒之盛未有如杭州者也嵗課二十餘萬緡水泉之用仰給於湖若湖漸淺狹水不應溝則當勞人逺取山泉嵗不下二十萬工此西湖之不可廢者五也臣以侍從出膺寵寄目覩西湖有必廢之漸五不可之憂豈得茍安嵗月不任其責輒已差官打量湖上葑田計二十五萬餘丈度用夫二十餘萬工近者伏蒙陛下以本路飢饉特寬轉運司上供額斛五十餘萬石出糶常平米亦數十萬石又特賜本路度牒三百而杭當得百道臣謹以聖意增價召人中未減價出賣以濟飢民而增減耗折之餘尚得錢米約共一萬餘貫石臣輒以此錢米募民開湖度可得十萬工自今四月二十八日興工農民父老縱觀太息以為陛下既捐利與民活此一方而又以其餘興久廢無窮之利使數千人得食其力以度此凶嵗蓋有泣下者臣伏見民情如此而錢米有限所募未廣葑合之地尚存大半若來者不嗣則前功復棄深可痛惜若更得度牒百道則一舉募民除去淨盡不復遺患矣伏望陛下少賜詳覽察臣所論西湖五不可廢之狀利害較然特出聖斷别賜臣度牒五十道仍敕轉運提刑司於前來所賜諸州度牒二百道內契勘賑濟支用不盡者更撥五十道價錢與臣通成一百道使臣得盡力畢工半年之間目見西湖復唐之舊環三十里際山為岸則農民父老與羽毛鱗介同泳聖澤無有窮已臣不勝大願謹録奏聞伏候敕旨西湖遊覽志紹興九年以張澄奏請命臨安府招置廂軍兵士二百人委錢塘縣尉兼領其事專一濬湖若包占種田沃以糞土重置於法十九年守臣湯鵬舉奏請重開咸淳臨安志紹興中招置開撩及修砌六井隂竇水口增置斗門閘板量度水務通放入井宋史河渠志乾道五年守臣周淙言西湖水面惟務深闊不容填隘并引入城內諸井一城汲用尤宜涓潔舊招軍士止有三十餘人今宜增置撩湖軍兵以百人為額專一開撩或有種植茭菱因而包占增疊隄岸坐以違制從之夢粱録淳祐丁未大旱水盡涸詔郡守趙與􅊸開濬仍奉朝命自六井至錢塘門上船亭西林橋北山第一橋蘇隄三塔南新路長橋柳洲寺前凡菱荷茭蕩一切剃去之湖水如舊成化杭州府志元時不事濬湖沿邊泥淤之處沒為茭田荷蕩屬於豪民湖西一帶葑草蔓合侵塞湖面如野陂然萬厯杭州府志明景泰七年六月鎮守浙江兵部尚書孫原貞築修西湖二閘孫原貞請修西湖二閘奏杭州西湖舊有二閘蓄泄水利近者閘圮湖淤積有葑灘往往勢豪之人占據水塞不通居民不便而一應魚課纍年漁戶賠納臣近閲志內載蘇軾周淙趙與􅊸開濬凡菱河茭蕩悉剃去之杭民獲利邇嵗豪勢之徒日逐堆疊塍圍包占種植菱藕蓄養鮮魚時遇旱乾湖已先涸旁田既無灌溉之利而運河亦遂淤淺公私舟船往來不通近與鎮守太監阮隨詢之父老合詞陳情仍舊置閘蓄泄水利革民圈占使湖得深廣周通六井支流運河旁溉田畝且無漁戶賠課之擾已令有司勘復所占池蕩並令償官而築修二閘勢不可緩嘗與隨勷賑濟之餘尚存米穀可備木石之費及時僦工俾令修築乞敕有司於農隙之時量工開濬禁止豪右不許侵占湖利則一郡軍民永逺便利矣西湖遊覽志成化十年郡守胡濬稍闢外湖明實録成化十一年秋七月工部覆奏浚杭州西湖許之李旻濬西湖説成化間巡視都御史劉敷按察使楊瑄用杭人通政胡瑄之言會同都布二司臨湖查勘凡宣德正統等年圈築報稅者一切鋤而去之稅糧百三十餘石派隄西有産之家代納萬厯杭州府志𢎞治十二年御史吳一貫修築石堰李旻西湖復石堰記武林諸山之水滙為西湖西北際山東至錢塘湧金兩門之城下瀕湖數千百家為稼為圃為池以蓄魚皆湖是資窮民用釣弋網罟之類衣食於湖者不可勝計餘波所及為六井為清湖河達於運河城外並湖之田千頃賴以灌溉湖所利濟如此白樂天通石函蘇子瞻築石堰所以鍾其源而節其流用意深矣石函之流細故曰減水一寸可溉田十五頃每一復時可及五十頃此蓄泄之節度而溉田之方矣若石堰則所堰有一定之則日夜常流其餘入於運河雖有霖雨暴漲不使驟溢以為瀕湖之害無餘則蓄而流之且以待石函之泄函與堰不可偏廢也後之人不深維其意壞堰而易之以板由是守者得以為姦漲溢乃靳而不啓旱則啓而竭之或因而取貨焉為湖之病數十年於兹矣𢎞治丁巳監察御史吳君一貫巡按浙江以興利除害為己任欲復其舊適安福胡君道以進士來知錢塘縣事遂以委之胡君詢之鄉老相與求之故迹地勢測水平定其髙卑之準鳩工琢石不日告成瀕河上下之人一旦獲享舊日之利而除其害莫不歡欣鼓舞嘆頌功德堰成請書其事於石以示久逺豫郡人也樂為斯民道之是為記嘉靖浙江通志正德三年郡守楊孟瑛力排羣議言於御史車梁僉事髙江部議報可乃於是年六月興工為銀二萬三千六百七兩斥毁田蕩三千四百八十一畝除豁額糧九百三十餘石以廢寺及新墾田糧補之自是西湖始復唐宋之舊楊孟瑛開湖議杭州地脈發自天目羣山飛翥駐於錢塘江湖夾抱之間山停水聚元氣融結故堪輿之書有云勢來形止是為全氣形止氣蓄化生萬物又云外氣橫形內氣止生故杭州為人物之都會財賦之奧區而前賢建立城郭南跨吳山北兜武林左帶長江右臨湖曲所以全形勢而周脈絡鍾靈育秀於其中若西湖占塞則形勝破損生殖不繁杭城東北二隅皆鑿壕塹南倚山嶺獨城西一隅瀕湖為勢殆天塹也是以湧金門不設月城實係外險若西湖占塞則塍術綿連容姦資寇折衝禦侮之便何藉焉唐宋以來城中之水皆藉湖水充之今甘井甚多固不全仰六井南井也然實湖水為之本源隂相輸灌若西湖占塞水脈不通則一城將復鹵飲矣況前賢興利以便民而臣等不能纂已成之業非為政之體也五代以前江潮直入運河無復遮捍錢氏有國乃置龍山浙江二閘啓閉以時故泥水不入宋初傾廢遂淤塞頻年挑濬蘇軾重修堰閘阻截江潮不放入城而城中諸河專用湖水為一郡官民之利若西湖占塞則運河枯澀所謂南柴北米官商往來上下阻滯而闤闠貿易苦於擔負之勞生計亦窘矣杭州西南山多田少榖米蔬粟之需全賴東北其上塘瀕河田地自仁和至海寧何止千頃皆藉湖水以救亢旱若西湖占塞則上塘之民緩急無所仰賴矣此五者西湖有無利害明甚但壞舊有之業以傷民心怨讟將起而臣等不敢顧忌者以所利於民者甚大也明實録嘉靖十八年七月浙江巡按御史傅鳳翔請禁包占西湖遏絶水利萬厯杭州府志嘉靖四十五年九月巡按浙江御史龎尚鵬禁占塞西湖錢塘縣志天啓時縣令沈匡濟創為清理之議沈匡濟清湖八議西湖為一郡靈氣攸鍾人文之秀發土田之沃肥靡不隂賴於斯取潤金水剋制火龍尤非謬説邇者祝融肆虐所在為墟將來沾溉無資千頃失望實為杭民剝膚之患寧止蘇公之五不可廢哉故湖之宜清不宜占宜濬不宜塞與清濬之宜速不宜遲不待智者而後知也惟是斷在必清而要非可易言清斷在必濬而要非可易言濬何也與其易言清而俄清俄止何如遡其源而窮其流酌量其因革而使影射盤踞者必難遂其吞噬之謀與其易言濬而俄濬俄寢何如儲其資而計其工裁定其方略而使積汙築塞者立可收夫廓清之績此屬卑縣管轄以內必不敢避勞怨坐視其化為桑田也而議論欲一規畫欲定時日欲寬錢鏹欲裕弗勤始怠終弗此傅彼咻弗朝令夕改竊以為兼兹數者始克有濟謹將一得之愚列欵上請仰候採擇參輿論之同定畫一之䇿庶不致築舍無成一請親勘一收佃帖一核實數一酌祠墓一審桃運一陳膚議一運積土一考工程國朝順治九年左布政使張儒秀立為禁約姦民占為私産者勒令還官朱之錫張公碑記西湖裏湖豪右各插水面水簾以漁利甚者巧為官佃之帖以相搪塞湖面漸小則湖身日髙公請於上憲飭令盡去其水簾塍岸其以官帖相抵搪者痛懲之於是始相戒不可犯雍正二年奉旨疏濬西湖鹽驛道王鈞捐資助濬照舊址清出開通水源凡湖中沙草淤淺之處悉疏濬深通其舊隄坍塌者即將所挑沙草幫築堅固其上流沙土填塞於赤山埠毛家埠丁家山金沙灘四處建築石閘以時啓閉至四年冬告成先是公估開湖銀四萬二千七百四十兩核實節省實用銀三萬七千六百餘兩存五千一百一十餘兩總督臣李衛慮嵗修難繼繕疏具題置買海寧縣田一千一百畝內撥入聖因寺一百畝外餘令海寧縣徵收解貯鹽驛道庫以供嵗修勒石湖上垂諸永久李衛重濬西湖天子碑記雍正二年甲辰輔察水利之當興治者於時詔親藩重臣循行畿天子奏事者及浙之西湖修理率事於官役力於民頒曰俞咨爾封疆勤乃給廩錢無滋耰於百姓議成動需帑金四萬二千有竒會澤州王副使任兩浙轉運鹽驛使因舉濬君之湖事屬之副使曰民之事事也豫受君恩深每願有所報效請如所直獨成其事事聞如雲制曰可於是命有司集民夫聚舴艋齊畚鍤募者貧民因力資生動以萬計凡沙之灘者汰去之泉之壅者疏決之葑之固結而蔓延者芟刈而剔除之日勤旬勞越嵗乃成於斯時也湖天一碧廓如鏡如憩於中亭御風泠然鳥鳴於山魚倏於淵老宸遊稚來觀相與嬉遊於皥蕩之天其間之宫天章之亭闕者補圯者修巍然煥然水光雲影髙下掩映五年冬奉聖命改為佛寺供凡昔日遊豫之地俾臣民咸得瞻仰焉祖仁皇帝神御又城中坊衢鱗接聚千族通百貨實慿於河湖水既濬河可次及於是迹其源流通其經厯涇者澮者沚者使之轉注以循脈絡非特利舟楫亦可以消煬災其所利者漙哉是舉也合前所直費尚餘五千兩乃置田畝俾官計其嵗入揭為嵗修長利副使可謂詳於治事矣余出撫浙親承聖訓率事惟勤納人於忠如副使之殫心竭力忠以奉公勤以利民是謂稱職其人可書厚積蓄以為灌溉長使水旱有備其事可書蘇白以降作者幾人猶多廢格今則發自宸衷由京畿及海甸百廢具舉時又宜書以是三者因副使之請乃特書天子命且志其嵗月使史家有如遷固之書河渠志溝洫者或有取於是文雍正七年總督臣李衛開濬金沙港動支嵗修銀三百三十六兩并添築滾壩一座設立壩夫二名嵗給工食使不時挑濬毋使沙礫瀉入湖內九年建漢壯繆侯祠於金沙港築隄六十三丈建玉帶橋一座接於蘇隄以通車馬往來之便謹按諸山之泉滙流於西湖惟金沙澗為大他若赤山埠毛家埠丁家山則次之餘皆細流也泉水入湖沙礫隨至故四處供設以閘金沙澗之水發自靈隱天竺邐迤數里諸山之泉皆會焉每春夏間水勢洶湧閘不能限故又設以滚壩於是泉水入湖清徹澄潔然西湖之水難涸而易盈故於溜水閘湧金門暗溝泄入城內石函三閘瀉流下河使湖不致泛溢而一郡之田畝百萬之生聚均沾其利矣成化府志云石函橋閘惟橋存而閘廢今閘見存前志未足為據錢塘江在府治東南通大海日受兩潮元和郡縣志郡議曹華信立塘防水募有能致土石者即與錢及塘成縣境蒙利謹按浙江水自衢歙而來一瀉千里直至錢塘而入於海所厯浙東諸郡俱引以灌溉乃水利之大者但江潮奔激囓岸衝隄厯代不免不得不屢事修築因江與海接凡興建江塘事宜俱詳志海塘門內兹不復載龍山河自龍山渾水閘由朱家橋至南水門元史河渠志龍山河在杭州城外嵗久淤塞至大元年浙江省令史裴堅言杭州錢塘江近年以來為沙塗壅漲潮水逺去離北岸十五里舟楫不能到岸商旅往來募夫搬運十七八里使諸物翔湧生民失所遞運官物甚為煩擾訪問宋時並江岸有南北古河一道名龍山河今浙江亭南至龍山閘約一十五里糞壤填塞兩岸居民侵占迹其形勢宜改修運河開掘沙土對閘搬載直抵浙江轉入兩處市河免擔負之勞生民獲惠省下杭州路相視錢塘縣城南上隅龍山河至橫河橋委係舊河居民侵占起建房屋若疏通以接運河公私大便計工十五萬七千五百六十六日役夫五千二百五十二度可三十日畢所役夫於本路録事司仁和錢塘縣富實之家差倩支官糧米三千一百五十石零河長九里三百六十二步造石橋八立上下二閘計用鈔一百六十三錠二十三兩零省準咨請丞相托克托總治其事於延祐三年三月七日興工至四月十八日工畢成化杭州府志至正六年達實特穆爾為行省平章復疏之舟楫雖通而未達於江明洪武七年參政徐本都指揮使徐司馬以河道窄隘軍艦髙大難於出江拓廣一十丈浚深二尺仍置閘限潮舟楫出江始為利便國朝康熙二十四年巡撫趙士麟重濬雍正五年奉旨發帑修濬城垣河道總督臣李衛委寧紹分司徐有緯開濬慶豐關對岸小閘橋一帶淤淺處一十三丈舊運河一名貼沙河一名裏沙河成化杭州府志元延祐三年丞相托克托嘗浚治明洪武五年行省參政徐本李質同都指揮使徐司馬議開河增閘河橫闊一丈餘閘亦髙廣於舊顧璘修河記略嘉靖庚寅工部汪大受來涖𣙜事疏堙淤歸侵軼悉復舊迹汪大受重開貼沙河記惟杭之關南有河焉為城諸河咽喉延十餘里而隘甚舟筏鱗集惟筏行最遲為舟礙民苦之商亦病焉嵗庚寅四月既望余銜命涖杭𣙜事悉其弊思以疏之弗得計一日間道江濵之地見有黯黯汙渠若可遡而尋者問之故老曰兹故貼沙河也孰闢而湮世逺弗聞豫集商於庭告之以財力無從出惟爾商鳩金豫擇人以司之共成此功僉應曰諾遂與水利憲伯蔡公時議之既克協復謀諸總鎮憲巡暨藩臬諸公皆樂贊成乃復令商曰濬河之役興不踰時而商所出金數其各視木數多寡傭值是資宜備於預越旬日二百餘金以具就命商程本祥王恭曹文修胡文祐籍掌之又募徒告之曰若受值以上丈尺計勤怠吾弗稽也其各度為力分土以授皆如約乃􅓪吉舉工命錢塘縣丞嶽溥仁和縣簿曹官董之豫則間日以視相度其宜闢土為渠疏淺為深引曲為直削廉角壯隄岸自九月八日始事十二月望日訖工始江陽寺終絡家跳計七百八十有四丈而遙兩岸相去計三丈至五丈有竒而廣為人工以日計者凡一萬五千有竒為費金以兩計者凡四百有竒為橋四以利涉規制以備筏可大行視前河益利商盡悅舟人亦樂其無壅豫乃卜日報成事焉餘杭塘河在北關門外江漲橋西四十五里至餘杭縣北通新開運河國朝康熙四十七年杭州府知府張恕可奉旨動帑開濬自賣魚橋起至觀音橋一百四十丈新河在錢塘門外舊名下湖咸淳臨安志淳祐七年安撫趙與􅊸命工自錢塘尉廨北望湖亭下鑿渠引天目山水自餘杭河經蔡家渡河口達於溜水橋陡門下湖河在溜水橋柴場北河分四派總名下湖河國朝康熙四十七年杭州知府張恕可重濬桃花港四百丈開廣二丈四尺濬深五尺雍正五年總督臣李衛動給帑銀委浙江驛丞陳上義開濬沿山馬家塢包家墳三元橋御臨橋一帶河道并建三元橋滾壩一座白沙隄一名孤山路北有斷橋南有西泠橋其西為裏湖蘇公隄小新隄一名趙公隄楊公隄金沙隄雍正九年新築以上俱詳見西湖捍江塘在城南沿江西起浙江驛東與柵外相接詳見海塘餘杭塘在城北二啚東起賣魚橋西與餘杭相接西塘在崇化二都黃濮塘在靈芝五啚崇化八啚地方下新塘亦在靈芝崇化地方南與黃濮塘相接上墟塘在女南二啚西與下新塘相接陵林塘在女南三啚西與上墟塘相接楊山塘在女南四啚西與陵林塘相接龍岡塘在孝女鄉女南五啚洪水衝決數十丈國朝康熙五十五年知縣魏㟶捐俸修築浹月告成壓沙溪塘在五都五啚瓶窰地方國朝雍正五年總督臣李衛委員動帑修築五十八丈石函三閘在錢塘門外昭慶寺西一名聖塘閘一名澗水閘一名石函處溜水閘國朝在湧金水門外臣李衛重修雍正六年總督金沙港閘毛家埠閘丁家山閘赤山埠閘舊有西閘廢雍正五年復建今閘以上俱詳見西湖南閘在城西一啚方家峪廢澄川閘在城西一啚長橋南廢保安閘在候潮門內朱家橋西保安三啚外接清水閘廢清水閘在候潮門外城南下隅一啚南接渾水閘渾水閘在城南下隅二啚蕭公橋南南接跨浦閘跨浦閘在城南下隅跨浦橋下接龍山閘龍山上下二閘在柵外二啚浙江驛前龍山口清湖上閘在武林門外二里清湖中閘在武林門外三里清湖下閘在武林門外五里陡門閘在定北鄉久廢明時居民葛廷祿重建灌田數十頃又有韓家閘廢烏麻陡門閘舊名國朝安溪陡門閘在女南一啚北對安溪鎮建雍正五康熙五十五年大水衝圯知縣魏㟶修年總督臣李衛委員動帑重修化灣陡門閘在崇化七都一啚北接上墟塘為苕溪下流宋淳熙六年建明萬厯戊申嵗兩塘決邑令聶心湯先築備瑭旋築隄修閘己酉八月大水國朝衝壞仍修之黃汝亨為記檄縣重修雍正三年陡康熙九年布政使袁一相門土陷一丈五尺崇化七里居民出資修築優免雜使差徭十年總督臣程元章檄錢塘縣知縣李惺查議李惺化灣陡門閘議看得天目東西兩山西屬於潛水流四十里即入大江東屬臨安山水直瀉而下時虞泛濫流害於杭嘉湖三郡田禾故設險塘置六閘以蓄泄之而化灣陡門閘尤為險要創始於宋明嘉靖間兩遣卿部大臣夏原吉等來浙修築萬厯間邑令聶心湯重修揆其所以數致傾圯之由皆緣山水驟發勢甚洶湧閘夫報縣申府轉詳勘估需時每致小隙未補即成大潰是以責成崇化鄉七里附近居民以承嵗修之役遇少有坍陷即行堵塞設水大莫禦仍議動帑興修故自康熙九年間前藩憲袁一相募修之後數十年來俱藉民力堵築不煩公帑而閘得無恙惟是七里居民身肩巨役宜加恩恤除完條漕正供外免其雜使差徭循例已久於雍正四年里民呈請勒石以垂永久擬合詳請俾令永逺遵循保固可也浙江通志卷五十二
