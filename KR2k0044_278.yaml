body:
  text: 浙江通志卷二百七十九雜記上史採稗官書徴謡俗網羅放失自昔為然浙中掌故具載遺文其軼乃時時見於他説上下千百年間璅事竒聞芳程懿誡有足以宣理道而示來兹者何可任其沒沒乎詮次叢言附之末簡亦拾遺補闕之一藉云志雜記吳越春秋禹即天子之位五年周行天下歸還大越登茅山以朝四方羣臣示天下悉屬禹也乃大會計治國之道內美釡山州鎮之功外演聖德以應天心述異記昔禹會塗山執玉帛者萬國防風氏後至禹誅之今南中有姓防風氏即其後也越俗祭防風神奏防風古樂截竹長三尺吹之如嘷三人披髮而舞刀劍録夏禹以庚戌八年鑄一劍長三尺九寸後藏之會稽秦望山腹上刻二十八宿文有背面面記星辰背記山水日月左傳定公十四年吳伐越越子句踐禦之陳於檇李靈姑浮以戈擊闔閭闔閭傷將指取其一屨還卒於陘去檇李七里䖷籛􅤕筆檇李漢書注又作醉李越絶作就李史記作雋李蘆浦筆記春秋定公五年書於越入吳注云於發聲也史記又書為于越注云與於同然則于於皆越語之發聲猶吳人之言句吳耳吕氏春秋越王之栖於會稽也有酒投江民飲其流而戰氣自倍吳越春秋越王句踐五年五月與大夫種范蠡入臣於吳羣臣皆送至浙江之上臨水祖道軍陳固陵遂登船徑去終不返顧越語句踐之地南至於句無北至於禦兒東至於鄞西至於姑蔑廣運百里吳越春秋吳封地百里於越東至炭瀆西止宗周南造於山北薄於海越語越王句踐滅吳返至五湖范蠡辭於王曰臣不復入於越國矣遂乘輕舟以入於五湖莫知其所終極王命工以良金寫蠡之狀而朝禮之浹日而令大夫朝之環會稽三百里者以為范蠡地曰後世子孫有敢侵蠡之地者使無終沒於越國皇天后土四鄉地主正之水經注句踐霸世徙都琅琊後為楚伐始還浙東吳郡圖經續記禦兒者地名也國語曰句踐曰吾用禦兒臨之而俚俗之言以禦為語曰范蠡獻西子於吳道中生子至此而能語又從而為之説曰吳既亡西子從范蠡以行杜牧亦云西子下吳邦一舸逐鴟夷夫蠡之智足以顯君而保躬必不蹈於汚也焦氏筆乘越絶書鄭夾漈以為子貢所作殊無據此書終篇業具姓名讀者未審耳云以去為姓得衣乃成厥名有米覆之以庚禹來東征死葬其疆又云文屬辭定自于邦賢以口為姓承之以天楚相屈原與之同名去得衣乃袁字米覆庚乃康字禹葬會稽是會稽袁康著耳文屬辭定自于邦賢此書非康自作口承天是吳字與原同名是平字是邑人吳平所共定耆舊續聞史記秦始皇至錢唐臨浙江水波惡乃西從狹中渡所謂狹中者即今富陽縣絶江而東取紫霄宫路是也江流至此極狹去岸才一二百步水波委蛇始皇正從此渡取暨陽界至會稽山今暨陽縣外有始皇祠宇乃經從之處徐廣注史記直以為在餘杭非江流之所經也越絶書秦始皇帝以三十七年東遊之會稽以正月甲戍到大越留舍都亭取錢唐浙江岑石石長丈四尺南北面廣六尺東西面廣尺六寸刻文於越東山上是時徙大越民置餘杭乃更名大越曰山隂西溪叢語秦始皇會稽石刻越絶書取浙江岑石刻於大越東山其道九曲去越二十里水經云尚在山側孫暢之述征記云丞相李斯所篆也梁書始皇刻石字皆大篆張守節云會稽山刻是小篆字余常上會稽東山自秦望山之巔並黃茅無樹木其山側有三石笋中有水一泓别無他石石笋並無字復自小徑别至一山俗名鵝鼻山又云娥避山山頂有石如屋大中開插一碑於其中文皆為風雨所剝隱約就碑可見闕畫如禹廟沒字碑之類不知此石果岑石與非始皇之力不能插於石中此山險絶罕有至者得一採藥者則至之耳非偽碑也或云大篆或云小篆皆不可考史記正義會稽石刻李斯書其字四寸畫如小指圓鐫今文字整頓是小篆也東齋記事秦始皇下泰山風雨暴至休於樹下因封其樹為五大夫初不言其為何樹也後漢應劭作漢官儀始言為松五大夫蓋秦爵之第九級如曹參賜爵七大夫遷為五大夫是也後人不解遂謂松之封大夫者五故唐人松詩有不羡五株封之句蓋循襲不考之故紹興上虞縣有村市曰五夫故老云有焦氏墓於此後五子皆位至大夫因名近世好事者或異其説曰此秦封松為五大夫之地紹興間王十朋為幕官採訪所聞作會稽風俗賦有楓挺千丈松封五夫之句疏於下云上虞有地名五夫始皇封松為五大夫之處蓋越人但知始皇上會稽刻石頌德不知封松乃在泰山非在會稽也而十朋復失於致審余嘗過其處見道旁古石塔有刻字可讀乃會昌三年余珠所記云草市曰五夫因焦氏立塋於此孝感上聖而為名乃知五夫之名實由焦氏惜乎十朋之不見也西溪叢語昔秦王捨舟於餘杭因曰杭州不從舟而從木以詩一葦杭之之義七修類稿錢唐之名按史記始皇浮江下丹陽至錢唐歷代地志亦有錢唐縣至唐避國號始加土焉輟耕録謂唐字從土誤以為以錢易土築塘考之釋文唐途也杭地五代以前路止西北一帶逼近於錢湖即西湖也故謂錢唐耳吳郡圖經續記西漢之會稽郡舉今二浙之地皆在焉東漢之吳郡舉今浙西之地皆在焉晉之吳郡舉今杭秀睦三州之境皆在焉唐之蘇州舉今秀州之地皆在焉自錢武肅分蘇以為秀州用自屏蔽其隸蘇者合五邑而已懶真子録漢時郡極大即以會稽郡考之吳即蘇州也烏傷即婺州也毗陵即常州也山隂即越州也由拳古之檇李即秀州也太末衢州也烏程湖州也餘杭杭州也鄞明州也以此考之即今浙東西之地乃漢一郡耳西京雜記朱買臣為會稽太守懷章綬還至舍亭而國人未知也所知錢勃見其暴露乃勞之曰得無罷乎遺與紈扇買臣至郡引為上客尋遷為掾史嘉興縣志相貝經是朱仲上之嚴助者仲曽受經於琴高助為會稽守仲遺以徑寸之貝并致貝經其文甚奇載緯略水經注太尉鄭𢎞山隂人少以苦節自居恆躬採伐用貿糧膳每出入溪津嘗感神風送之惟憑舟自運無杖楫之勞村人貪藉風勢常依隨往還有淹留者徒輩相謂汝不欲及鄭公風耶泊宅編越州上虞縣曹孝女墓在江岸上有大木二株一榮一枯榮者枝幹宛轉枯木外若抱父尸之狀嘉泰會稽志漢元嘉元年上虞長度尚為石碑屬魏朗作碑文久之未就時尚弟子邯鄲淳年二十聰明才贍而未知名乃令作之揮筆輒就朗至尚以示之朗大歎服蔡雍聞之來觀值夜以手摸其文而讀之題曰黃絹幼婦外孫虀臼後魏武帝見之謂楊修曰解否曰已解曰卿未可言試我思之行三十里而喻乃令修解之修曰黃絹色絲也幼婦少女也外孫女之子也虀臼受辛也蓋曰絶妙好辭曰吾亦意此但有智無智較三十里晉中興書陸納為吳興太守時衛將軍謝安常欲詣納納兄子俶怪納無所備不敢問之乃私蓄十數人饌安既至所設惟茶果而已俶遂陳盛饌珍羞畢具及安去納杖俶四十云汝既不能光益叔父奈何穢吾素業南史羊欣傳欣父不疑為烏程令欣年十二時王獻之為吳興太守甚知愛之欣嘗夏月著新絹裙晝寢獻之入縣見之書裙數幅而去能改齋漫録會稽剡縣沃洲天姥號稱山水奇絶處自異僧帛道猷來自西天竺賦詩云連峯數十里修竹帶平津茅茨隱不見雞鳴知有人其後支道林之徒相繼而居凡十八僧而名流如戴逵王羲之者又十八人蓋道經云兩火一刀可以逃以其名山之多可以避世故晉宋之世隱逸之士居多䂬溪詩話修禊之會人各賦詩成兩篇者十一人成一篇者十五人詩不成罰觥者凡十六人蘭亭考侍郎謝瑰鎮國大將軍掾卞迪行參軍事印邱髦王獻之行將軍羊模參軍孔熾劉密山隂令虞谷府功曹勞彝府主簿后綿前長岑令華耆前餘姚令謝滕府主簿任擬任城吕系吕本彭城曹禮一十六人詩不成罰觥德清縣志晉車騎將軍沈充居縣南之前溪村樂府有前溪曲充所製也宋主續為七曲樂府解題曰前溪舞曲是也按縣南有前溪坊後溪坊為南朝集樂之處江南聲妓多自此出唐時尚有數百家習音樂焉德清縣志陸市在縣之東南晉永嘉中為洪水所沒至今其處為溪漾下有階基屋礎甚多每天晴水縮厯厯可見舟行篙著其底磗石相擊鏗然有聲夏月川浴者或得銅鐵陶瓦之器册府元龜陳文帝梁末避地臨安縣駱牙母觀帝儀表知非常人待之甚厚及即位牙為越州刺史詔贈牙母長安國太夫人陳書后妃列傳髙祖宣皇后章氏諱要兒吳興烏程人本姓鈕父景明為章氏所養因改焉母蘇常遇道士以小龜遺已光采五色曰三年有徴及期后生紫光照室因失龜所在少美容儀手爪長五寸色並紅白每有期功之服則一爪先折高祖先娶同郡錢仲方女早卒後乃聘后后善書計能誦詩及楚辭髙祖踐阼立為后后親屬無在朝者唯族兄鈕洽官至中散大夫全唐詩話賀知章年八十六臥病上表乞為道士還鄉明皇許之捨宅為觀賜名千秋命其男曽子會稽郡司馬賜鑑湖剡川一曲詔令供帳東門百僚祖餞御製送詩并序云天寶三年太子賔客賀知章鑒止足之分抗歸老之疏解組辭榮志期入道朕以其年在遲暮用循挂冠之事俾遂赤松之遊正月五日將歸會稽遂餞東路乃命六卿庶尹大夫供帳青門寵行邁也豈惟崇德尚齒抑亦勵俗勸人無令二疏獨光漢册乃賦詩贈行詩云遺榮期入道辭老竟抽簪豈不惜賢達其如高尚心環中得祕要方外散幽襟獨有青門餞羣英悵别深又云筵開百壺餞詔許二疏歸仙記題金籙朝章換羽衣悄然承睿藻行路滿光輝水一方人劄記大歷間顔魯公真卿刺湖公務之隙日與羣士討論所編韻海鏡源於州學及放生池有長興丞潘述縣尉裴循與焉見魯公杼山妙喜寺碑此一丞一尉既解字學又得與名流唱酬定非俗吏顧事迹不槩見矣泊宅編烏程縣之東數十里有泊宅村昔顔魯公守湖州張志和浮家泛宅往來苕霅間此乃志和泊舟之所也續仙傳云志和越人而唐史以為婺人榕隂新檢黃子野字仲唐侯官人也父周行賈於杭州子野年十三從之其父就他郡以子野守舍適王伾微時覆舟於羅剎江子野行見之奮臂呼曰能生得人者與百金於是漁者得伾子野即豫以舍中裝直百金其後王伾為散騎常侍使人召之則亡托言白樂天居易守杭江東進士多奔杭取解時張祜徐凝俱至祜曰僕為解元宜矣凝曰君有何佳句祜曰甘露寺詩有日月光先到山河勢盡來金山寺詩有樹影中流見鐘聲兩岸聞凝曰善則善矣奈無野人句云千古長如白練飛一條界破青山色祜愕然凝果獲選西河詩話錢塘湖中有一隄穿於湖心作志者初稱白隄後稱白公隄謂白樂天為刺史時所築及讀樂天杭州春望詩云誰開湖寺西南路草緑裙腰一道斜則未有已所開而反云誰開者且詩下自注云孤山寺路在湖洲中草緑時望如裙腰是必前有此隄而故注以證己詩其非初開可知也是以張祜詩云樓臺映碧岑一徑入湖心其詩不知何時作但樂天出刺杭州在長慶末而陸魯望每推祜為元和詩人則此隄非長慶後始築可知嘗考此隄名白沙隄樂天錢塘湖春行有云最愛湖東行不足緑楊隂裏白沙隄則意此隄本名白沙或有時去沙字單稱白隄有時去白字單稱沙隄如樂天有詩云十里沙隄明月中是一沙一白遂多誤稱也宣室志東陽郡濱於浙江有山周回數百里江水曲而環焉迂滯舟楫人頗病之常侍敬昕太和中出守其山一夕雲物曛晦暴風雷電動蕩室廬江水騰溢莫不惶惑逮曉方霽人往視之已劈而中分相逺數百步引江流直而貫焉其環曲處悉填以石遂無縈繞之患桐廬縣志章八元子孝標孫碣三代皆擅詩名其鄉稱之曰章邑里因其姓也林間録唐宣宗微時武宗數欲殺之宦者仇公武保護之為剃髮作比邱使佚遊至杭鹽官安禪師江西馬祖之高弟一見異之故宣宗留鹽官最久秀水縣志唐遺事載宣宗為光王時以避害從香嚴間禪師更名瓊俊祝髮為沙門復從間入吳謁鹽官安國師掌書記既而遁迹嘉興水西未幾武宗登遐乃為詩曰殿閣連雲接爽溪鐘聲還與鼓聲齊長安若問江南事報道風光在水西書路岐人背使往長安示朝臣由是迎歸即位尋敕水西為資聖禪寺寺至今有宣宗遺像暨親書寺額存焉豫來領事訪得其詩而江浙左丞周公伯溫琦為書諸石以垂不朽或以為宣宗之隱乃宣州水西非此也然遺事云宣宗即位首建興唐資聖二剎於今寺名為合鹽官今為海寧州海寧與嘉興為近由是觀之則此為宣宗之隱與建無疑矣宣宗與間在廬山吟瀑布詩間得前二句云穿雲透石不辭勞地逺方知出處高宣宗應聲續云溪澗豈能留得住終歸大海作波濤先後事也故并書之使後之覽者得詳焉東觀奏記大中十二年宣州叛將康全泰逐觀察使鄭薰時蕭置為浙西觀察使地與宣州接遂擢用武臣李瑑代置特建鎮海軍節鎮撫之因話録李約雅度沖逺有山林之致在湖州嘗得古鐵一片擊之清越又養一猿名山公嘗以自隨聞奇録傅𢎞業宰天台縣有人獵得一獸形如豕仰鼻長尾有岐傅識之曰蜼也雨則懸於樹以尾塞其鼻後果驗之西湖遊覽志餘歐陽公五代史敘列國云聞諸故老謂吳越嘗稱帝改元而求其事迹不可得頗疑吳越後自諱之宋時王順伯收臨安府故碑有石屋崇化寺幢題天寶四年明慶寺幢題天寶五年九里松觀音尊勝幢題寶大二年水月寺幢題寶正元年招賢寺幢題寶正二年小明慶金牛瑪瑙等九幢皆題寶正貢院橋柱題寶正六年至今寺中石塔有吳越王并年號處皆鐫剷糢糊蓋歸宋納土時所改爾兩湖塵談錢氏建國有州十三軍一杭蘇湖秀衢睦婺越明台溫處福州也衣錦則軍也鏐在位凡三改元曰天寶曰寶正曰寶大具見封落星石刻書與其地金石刻中考其時則朱梁以丁卯篡唐武肅是年猶用唐天祐年號次年乃改元至壬申以後用梁年號逮後唐革命復改元至壬辰又用後唐年號是嵗武肅薨其子孫迄漢周不復改元矣吳越備史武肅王以梁開平四年八月築捍海塘怒潮急湍晝夜衝激版築不就表告於天云願退一兩月之怒濤以建數百年之厚業禱胥山祠云願息忠憤之氣暫收洶湧之潮函詩一章置海門云傳語龍王并水府錢塘借與築錢城因採山陽之竹令矢人造為箭三千隻羽以鴻鷺之羽飾以丹硃鍊剛火之鐵為簇既成用葦敷地分箭六處幣用東方青九十丈南方赤三十丈西方白七十丈北方黑五十丈中央黃二十丈鹿脯煎餅時果清酒棗脯茅香淨水各六分香爐布置以丙夜三更子時屬丁日上酒三行禱云六丁神君玉女隂神從官兵六千萬人鏐以此丹羽之矢射蛟滅怪渴海枯淵千精百鬼勿使妄干唯願神君佐我助我令我功行早就禱訖明日募強弩五百人以射濤頭人用六矢每潮一至射以一矢射止五矢潮乃退五代史吳越世家開平四年王遊衣錦軍作還鄉歌曰三節還鄉兮挂錦衣父老逺來相追隨牛斗無孛月無欺吳越一王駟馬歸嘉靖臨安縣志錢武肅王衣錦還鄉盛燕父老山林皆覆以錦故名臨安為十錦衣錦營衣錦山衣錦南鄉衣錦北鄉錦溪錦橋晝錦堂晝錦坊保錦坊衣錦將軍樹吹景集吳越備史載錢鏐題湖州嬰蘭堂詩初疑郡故有碧瀾堂似傳寫之誤及讀古樂府作蠶絲云柔桑感陽風阿那嬰蘭婦蓋江南蠶務獨盛吳興唐人或採此名堂耳葆光録寶正中當秋成一旦蝗翳日而飛武肅王虔祝畢投於浙江不可勝紀臨安圖經功臣寺有溝曰千人相傳錢氏役千人一日而成菽園雜記兩浙田稅畝三斗錢氏國除朝廷遣方贄均兩浙雜稅贄悉令畝出一斗使還責擅減稅額贄曰以為畝稅一斗者天下之通法兩浙既為王民豈宜循偽國之法上從其説故稅畝一斗者自方贄始錢氏家乘錢沛字子􅗈父碩亶於朱梁時贈尚書檢校司空娶陳氏子三曰湛曰滉曰沛沛以武肅功贈尚書左僕射娶童氏贈趙國夫人建廟武林子二曰宇曰宙宙字遵古喜讀揚子太元卜築於鏡山終於錦軍城唐贈太尉子寬開平四年贈太師十國春秋莊穆夫人吳氏安國縣人父仲欣浙西觀察判官夫人歸室閨門整肅孝敬盡禮武肅性嚴急常怡顔以諫之常遊奉國寺王命載帛百縑以備散施夫人曰妾備嘗機杼之勞遽以遊賞靡費非恤民之道遂不受而罷夫人每嵗春必歸衣錦軍以為恆武肅王語之曰陌上花開可緩緩歸時人用其語以為歌曲至今傳之十國春秋恭穆夫人馬氏父綽雄武軍節度使綽初以舊恩娶武肅王女弟未幾武肅王復為文穆王元瓘娶綽女性聰慧勤於職武肅王常禁中外畜聲伎而文穆王年踰三十無子夫人為之請武肅王乃聽文穆納諸姬生子夫人皆均養之吳越備史順德夫人吳氏錢塘人諱漢月中直指揮使珂女也幼婉淑奉文穆王性慈惠節儉居常被布練每聞王決斷政事有及重刑者夫人常顰蹙以仁恕為言諸吳將有遷授皆峻拒之及其入對多加訓勵有過必面責故諸吳終夫人之世不甚驕恣揮塵録吳越忠獻王錢佐薨其弟倧襲位未幾為其大將胡進思所廢時忠懿王俶為台州刺史進思迎立之元豐中王之孫暄知台州其子景臻自郡入都選尚仁宗女靖康末南來遂卜居後數年詔即州賜第享之二十年壽八十六薨於天台其子恬居之又二十年官至少師年亦八十餘少師子即處和處和之女又自台被選為王妃處和既為執政營甲第南北相望甚夥一家盛事常占此境玉壺清話錢昱忠獻王長子也讀書強記在故國與贊寧僧録舉竹事昱得百餘條著竹譜三卷尤善書牘太宗取閲深愛之謂左右曰諸錢筆札多學浙僧亞栖書體格浮軟其失仍俗獨此兒不然以御書金花扇及行草急就章賜之西河詩話寶叔塔一謂僧寶所建塔所叔形悮一謂錢王俶入覲民建塔保之呼保俶俶叔聲悮然皆無據之言考是塔甚古郡國志云寶石山有七層寶塔王僧孺稱其巧絶人工則其來舊矣且是塔以山得名寶叔者寶石之誤蓋山本多石有巾石甑石落星石纜船石舊名山足曰石塔頭是也南屏山回峰以山勢回抱得名吳越王妃建塔其上本名回峰俗作雷峯聲近致誤而淳祐咸淳舊志造一雷姓者當之可笑甚矣宋有道士徐立之築室塔傍世稱回峯先生此可驗也文公談苑錢鏐日釋迦真身舍利塔見於明州鄞縣即阿育王所造八萬四千而此震旦得十九之一也鏐造南塔以奉安俶在國天火屢作延燒此塔一人奮身穿烈焰登第二級持之而下太平興國初太宗命取塔禁中度開寶寺北地造浮圖十一級以葬舍利初造塔得浙東匠人喻浩浩不食葷先作塔式以獻凡一月而一級成其有梁柱齟齬未安者浩周旋視之持挺撞擊數十即皆牢整自云此可七百年無傾動人或問其北面稍高曰此數十步乃大河潤氣津浹經一百年則北隅微墊而塔正矣浩既而求度為僧數月死世頗疑其異六研齋二筆上虞有舜井相傳舜子生時井為湧泉秦始皇封塞起兩墩各高一丈晉宋為佛廬野人耕鋤多得古磗甃石吳越寶正三年閏八月十四日錢王差人賫火糧畚鍤開掘得讖記寶物一百二十餘件都抽領西都上直廂虞候盛瑗東都上直廂虞候孫𢎞西都隨身虞候閭邱稔勾當拜祭內直殿十將於軒十六日鑿西井十九日得銀環六赤珠一金盒一古文錢二千三百四十琥珀珠一當十大錢三當五十大錢二十四太平錢百直百三銖二十四大錢二百五十四五銖錢九百六十貨錢二百八十半兩錢三十石獅一鐫其背曰重華井天明可開腹內有水精珠一東井得銀塔一高一尺高層內有金瓶舍利二顆散金瓶二金鈴六銅鈴一銀環六銀鈴一水精珠十四琥珀珠九雜珠大小三十五小琥珀獅子三十瑪瑙珠七玉人一玉環一銅鏡三銅罏一小瑪瑙珠六玉瓶一以上共三十四件並有石匣盛之題云唐元徽四年於此造塔鎮井有重華石一片濶三尺厚九寸左右有索痕深二寸官中令造深沙神一軀足履四石寶正四年六月草九日差錢文殷祭神鐫石宋史后妃列傳李宸妃杭州人祖延嗣仕錢氏為金華縣主簿父仁德終左班殿直妃初入宫莊重寡言真宗以為司寢既有娠從帝幸砌臺玉叉墜妃惡之帝心卜叉完當為男子左右取以進叉果不毁已而生仁宗封崇陽縣君進才人後為婉容仁宗即位册為順容章獻太后為訪其親屬得其弟用和補三班奉職妃默處先朝嬪御中未嘗自異終太后世仁宗不自知為妃所出也後燕王為仁宗言乃追尊為皇太后山棲志楊億至道中知處州與李起居書郡齋迥在霄漢石磴盤曲䇿馬征登嵐靄滴衣煙霞滿目東軒録鞠詠為進士以文受知於王公化基及王公知杭州詠擢第釋褐為大理評事知杭州仁和縣將之官先以書及所作詩寄王公以謝平昔奬進今復為吏得以文字相樂之意王公不答及至任略不加禮課其職事甚急鞠大失望於是不復冀其相知而専修吏幹後王公入為參知政事首以詠薦人或問其故答曰鞠詠之才不患不達所憂者氣峻而驕我故抑之以成其德耳鞠聞之始以王公為真相知也默記張君房著雲笈七籖乘異記麗情集科名定分録潮説脞説知杭州錢塘刋作大字板行世青箱雜記天聖中丞相王公隨以給事中知杭州日與林逋唱和親訪其廬見其頽陋即出俸錢新之逋以啓謝其略曰伏蒙府主給事差人送到留題唱和石一片拜賜軒榮以庇風日衡茅改色猿鳥交驚夫何至陋之窮居獲此不朽之盛事竊念頃者清賢巨公出鎮藩服亦常顧邱樊之側微念土木之衰病不過一枉駕一式廬而已未有迂回玉趾歷覽環堵當纓緌之盛集攄風雅之祕思率以賡載始成編軸且復構他山之堅潤刋羣言之鴻麗珠聫綺錯雕縟相照輦植置立賁於空林信可以奪山水之清暉發斗牛之寶氣者矣清夜録范文正公仲淹鎮錢塘兵官皆被薦獨巡檢蘇麟不見録乃獻詩云近水樓臺先得月向陽花木易為春公即薦之嚴陵志范文正公既為嚴先生祠堂記以示旴江李泰伯李讀之歎咏不已起而言曰公文一出必將名世妄意輒易一字以成盛美公瞿然握手叩之答曰雲山江水之語於義甚大而德字承之乃似趢趚擬換作風字如何公時凝坐額首殆欲下拜按孟子論伯夷柳下惠皆以風言風字不可易也庚溪詩話蔡天啓肇嘗守睦州到任謝表有曰城譙閴寂一葉落而知秋島嶼縈回二水合而成字復有詩曰疊嶂巧分丁字水臘梅遲見二年花人謂能狀桐廬郡景物也能改齋漫録滕宗諒知湖州興學費民錢數千萬役未畢而去或言錢出入不明者通判以下不肯簽簿胡武平宿來繼守言曰滕侯所為非是君奚不早言俟其去乃非之豈分謗之意乎於是衆慚而簽簿卒成其業豹隱紀談吳興之名水晶宫不見圖經刺史楊次公九月十五日夜絶句云江南地暖少嚴風九月炎涼正得中溪上玉樓樓上月清光合作水晶宫後林子中聞滕元發得湖州以詩賀曰清風樓下兩溪春三十餘年一夢新欲識玉皇香案吏水晶宫主謫仙人因為故事耆舊續聞陸太傅軫會稽人神采秀異好為方外遊七嵗猶不能語一日乳媪擕往後園俄而吟詩曰昔時家住海三山日月宫中屢往還無事引他天女笑謫來為吏在人間後仕至兵部郎官力請老歸稽山宋元憲公敏求杜祁公衍一時名流皆有送行詩篇中多及神仙之事蓋公之雅志也嘗視諸孫中指農師佃之弟倚曰此兒有仙風道骨蒙齋筆談郎簡侍郎與杜祁公極相厚善簡長祁公十餘年祁公以兄事之既老謝事居里中築别館徑山下善服食得養生之術即徑山澗旁種菖蒲數畝嵗採以自餌山中人目為菖蒲田癸辛雜識吳興六老之會慶厯六年集郎簡工部侍郎七十九范説司封員外八十六張維衛尉寺丞九十一劉餘慶殿中丞九十二周守中大理丞七十二時太守馬尋主之胡安定教授湖學為之序焉夢溪筆談錢塘江錢氏時為石隄隄外又植大木十餘行謂之滉柱寶元康定間人有獻議取滉柱可得良材數十萬杭帥以為然既而舊木出水皆朽敗不可用而滉柱一空石隄為洪濤所激嵗嵗摧決杜偉長為轉運使人有獻説自浙江稅場以東移退數里為月隄以避怒水衆水工皆以為便獨一老水工以為不然密諭其黨曰移隄則嵗無水患若曹何所衣食衆人樂其利從而和之偉長不悟其計費以巨萬而江隄之害仍嵗有之近嵗乃講月隄之利濤害稍稀然猶不若滉柱之利但所費至多不復可為墨客揮犀孫元規沔知杭州摘姧發伏號為神明有僧元夕市中然頂求化以新寺宇左右施利山積公出見立馬不行瞰其情久之入呼僧前詰其姧狀僧惶恐頓伏又一僧醉臥道上為邏者所擒公問其故僧答曰野性所嗜不能自禁又問復能飲酒否曰公家賜酒安敢不飲遂與酒一壺一引而盡公戒邏者曰速扶師歸院勿使為羣小侵侮僧明日聲鼓登坐謂衆曰吾西竺人也溷迹於此不幸為此子聽識不可復留矣於是結跏趺坐而逝其分别淑慝皆此類也咸淳臨安志沈括云治平中杭州南新縣民家析柿木中有上天大國四字書法類顔魯公有筆力國字中間仍排起作大口全似顔筆其橫畫即是橫理斜畫即是斜理其木直剖偶當天字中分而天字不破上下兩畫并一腳皆橫挺出半指許如木中之節以兩木合之如合契焉豫親見之湘山野録餘杭熊萬卷者浮屠之真儒有奧學著典類一百二十卷居延慶寺在慈塢時儒皆抱經受業師居常喜閲唐韻諸生竊笑一日出題於法堂楓為琥珀賦諸生不諭請之不説凡月餘檢經史百家無見者師曰兹字在東字第三板請詳諸生檢之果載楓字注中云黃帝殺蚩尤棄桎梏變為楓木脂入池中千年化為琥珀後諸生始敬此書避暑録話沈文通遘喜吏事每覺有疾藥餌未驗亟取難決詞狀連判數百紙落筆如風雨意便欣然聞見前録王荆公安石知明州鄞縣讀書為文章二日一治事起隄堰決陂塘為水陸之利貸榖於民立息以償俾新陳相易立學校嚴保伍邑人便之清波别志蘇文忠公軾知杭州以私帑金五十兩助官緡於城置病坊一所名安樂以僧主之三年醫愈千人與紫衣後兩浙漕臣申請自今管幹病坊僧三年滿所醫之數賜紫衣及祠部牒一道從之仍改為安濟坊坊原在衆安橋遷於湖上春渚紀聞東坡先生臨錢塘日有訴負綾絹錢二萬不償者公呼至詢之云某家以製扇為業適今春已來所製不售非固負之也公曰姑取汝所製扇來吾當為汝市也扇至公取白圑夾絹二十就判筆作行草及枯木竹石頃刻而盡即以付之其人抱扇謝出始踰府門而好事者爭以千錢取所持立盡遂盡償所逋泊宅編楊孝本字行先居處州城西一圃甚幽邃學博行高東坡謫惠州過而愛之為留月餘號曰玉巖居士生平不娶坡每來謁直造其室嘗戲以元德秀呼之居士曰某乃陽城之裔故坡詩曰衆謂元德秀自稱陽道州皆謂無妻也居士後以經明行修得官太學年七十致仕以奉議郎直祕閣領宫祠以歸梁溪漫志東坡鎮餘杭遇遊西湖多令旌旗導從出錢塘門坡則自湧金門從一二老兵泛舟絶湖而來飯於普安院徜徉靈隱天竺間以吏牘自隨至冷泉亭據案剖決落筆如風雨分爭辨訟談笑而辦已乃與僚吏劇飲薄晚則乘馬以歸夾道燈火縱觀太守有老僧紹興末年九十餘幼在院為蒼頭能言之默記朱先生者失其名杭州人舉進士赴禮部遇異僧慈上座傳以易數且言子當傳吾術足以資身不必仕宦蓋子命薄也遂授其術盡驗遂不復省試上座别去曰他時見胡釘鉸者知吾所在也後章丞相當國必欲致之且入朝薦其學詔特赴殿試不得已赴試而犯廟諱特置五甲一日置冠帶作帶者有士人風範問之則胡釘鉸也驚問慈上座所在曰君既仕宦矣上座不可得而見也先生固請往見曰上座於人才舉意即知之何可知其處也先生不樂失志得疾還鄉而卒其書人猶得之號三宫易六遇易遁齋間覽趙閲道抃寬厚長者與物無忤家於三衢所居甚隘弟姪有欲恱公意者厚以值易鄰翁居以廣公第公聞不樂曰吾與此翁三世為鄰矣忍棄之乎命亟還翁居而不追其值筆談熙寧七年嘉興僧道親號通照大師遊雁蕩山至瑞鹿院見一人衣布襦行澗邉身輕若飛履木葉而過葉皆不動心疑其異人下澗中揖之相與坐石上問其氏族閭里年齒皆不答鬚髮皓白而色如少謂道親曰今宋朝第六帝也更後九年當有疾汝可持吾藥獻天子此藥人臣不可服服之有大責宜善保守乃探囊出一丸指端大紫色重如金錫以授道親又曰嵗當大疫吳越尤甚汝名已在死籍今食吾藥勉修善業當免此患探囊取一柏葉與之老人曰慎守藥至癸亥嵗自詣闕獻之言訖遂去南方大疫兩浙病死者十五六道親殊無恙至元豐六年夏夢老人促之曰時已至何不獻藥夢中為雷霆驅逐惶懼而起徑詣秀州具述本末謁假入京詣尚書省獻之執政親問以為妄不受其獻明日奏知上急使人追付內侍省問狀以所遇對未數日帝果不豫乃使幹當御藥院梁從政持御香賜裝錢百千同道親乘驛詣雁蕩山求訪老人不見於所遇處焚香而還帝尋康復墨莊漫録衢州廳事下舊有土勢隆起篠本叢生相傳云古塜也舊有碑其文云五百年刺史為吾守墓以此前後相承皆畏而不敢慢紹聖元年齊安孫蕡公素為守問之左右以是對公命毁之官吏大恐闔府叩頭以諫公曰藉令土中有賢者骨當以禮法遷之乃為文自祭而除之劚深丈餘了無他異但有二石峰長五六尺堅瘦泔潤又有大木之根蟠踞其下羣疑遂定石上刻云乾符五年五月三日安於此押衙徐諷龍山起此石處得二石刺史季某題又刻云開寶七年重疊峨嵋山於廳事前於郡齋文會閣移季公之石安置於此刺史慎知禮題時公素方修州治南韶光園重建清泠臺堂成乃移二石於堂下名曰雙石公素可謂剛毅正直自信之君子也入蜀記臨平山太師蔡京葬其父凖於此以錢塘江為水會稽山為案山形如駱駝葬於駱之耳而築塔於駝之峰蓋葬師云駝負重則行逺也然東坡樂府固已云誰似臨平山上塔亭亭迎客西來送客行則臨平有塔久矣當是蔡氏葬後增築或遷之耳京太子少保制云託祝聖而飾臨平之山是也春渚紀聞余拂君厚霅川人其居在漢銅官廟後溪山環合有相宅者言此地當出大魁君厚之父朝奉君云與其善之於一家不若推之於一郡即遷其居於後以其地為烏程縣學不二三年君厚為南宫魁而莫儔賈安宅繼魁天下寶慶四明志政和七年郡人樓異除知隨州陛辭建議於明置髙麗司曰來逺局創二巨航百斛舫以應辦三韓嵗使且請墾州之廣德湖為田收嵗租以足用既對改知明州復請移溫之船場於明以便工役創髙麗使行館清波雜志政和末有知婺州黃搏獻言六經之治貴未亂兵家之勝貴未戰國家城壁軍旅器械守禦獨注意於西北而略於東南臣以謂東南有備則西北乃可全勝大觀初嘗詔東南久安兵寡勢弱人輕易搖申誡守禦有司奉行失序旋即廢罷且東南民物繁富城壁可守十無二三不務增築而急於漕粟軍額不足不急於招補而急於更戍臣謂宜乘時舒裕講求利害先後之序其切中時病如此朝廷但令監司守臣講究而已間不二嵗遂有方臘之變州縣不能制乃命童貫談稹盡將陜西部落徑兵進討閲嵗方克鐵圍山叢談錢塘龍華寺有傅大士真身仍藏所謂敲門椎誦金剛經相板與藕絲燈三為吳越錢王從婺女雙林取來藕絲者梁武帝時物也謬言藕絲織成實不然所織紋實華嚴會釋氏設法相狀凡七即所謂七處七會者是也有天人鬼神龍象宫殿之屬窮極幻妙不可名狀政和後索入禁中宣和初既大黜釋氏教因復以藕絲燈賜宦者梁師成師成籍沒而藕絲燈莫知所在韻語陽秋宋大觀中吳興人卲宗益剖蚌中有珠現羅漢相偏袒右肩矯首左顧衣紋畢具遂奉歸慈感寺臨溪流建炎中憲使楊應誠與客傳玩忽越檻躍入水中禱佛求之一索而獲雞肋編婺州義烏縣有葉鍊師者本蓓蕾村田家女隨嫂浣紗於溪中見一巨桃流水上取以遺嫂時方仲冬嫂以其非時又若食餘因棄不取女乃啖之歸遂絶粒踰年之後性通慧初不識字乃能操筆書有楷法徽宗聞之召至都下入禁中賜號鍊師崇禎義烏縣志宗忠簡公澤與同舍生林迪友善林先公登第音問不相及者纍年官於萊之别邑挈家來謁公經旬而去繼以病告公往視之疾已革尚能語曰迪死如何曰某任後事曰子女如何公曰嫂當養子當教之女當選佳士歸之後悉如言以林女妻修職郎康森又以親女妻森弟劦申愛好焉林子懋後從公討賊得官為文登令卒於官家貧不能歸公親弔之厚以俸資其行公之行義如此者甚衆談藪曹泳侍郎妻碩人厲氏餘姚大族女方泳盛時鄉里奔走恐後獨碩人之兄厲德斯不然泳怒帥越時德斯為里正泳風邑官脅治百端竟不屈海寧縣志劉一止校浙試欲得通時務者同列患無人一止出卷示曰是宜為首啓號乃張九成衆皆恱服耆舊續聞陸辰州子逸左丞農師佃之孫太傅公之元孫也晚以疾廢卜築於秀野越之佳山水也放傲其間不復有榮念對客則終日清談不倦尤好語前輩事灑灑傾人聽錢塘遺事宋太祖次陳橋從仁和門入高宗由海道過杭聞縣名仁和甚喜曰此京師門名也駐蹕之意始此雞肋編臨安府城中有七寶山車駕駐蹕時御史中丞辛丙殿中侍御史常同監察御史魏矼明震周綱皆居其上人遂呼為五臺山紹興四年大享明堂更修射殿以為享基時殿柱大者每條二百四十千總木價六萬五千餘貫則壯麗可見雲麓漫抄鳯凰山分左右翼大內在山之左腋後有山包之第二包即相府第三包即太廟第四包即執政府包盡處為朝天門端誠殿在山之右腋有山包之第二包即郊壇第三包即易安齋第四包即馬院北窗炙輠鄧光祖知嚴州某縣時當紹興中國家方創都錢塘所需材木甚大期且急所在鼎沸而光祖殊不經意乃徐集諸里正各置之即以朝廷所降木色丈尺人一紙令各具其界中凡寺凡廟凡驛凡官道有木與所降色樣合者供不得脫一根既供乃令匠往視之皆合遂令里正伐之官特與糧不須臾木乃大集所得倍其數他郡縣皆望青斬伐所殘人塜墓及民家要害處衆而吏復有夤緣求乞於其間所在騷然惟光祖絲毫無侵於民且不出一吏所得乃過諸縣愧郯録中興以後浙右大剎如徑山淨慈靈隱天竺宫觀如太一開元佑聖皆降敕劄差主首禪席七修類稿餘杭徑山錢塘靈隱淨慈寧波天童育王等寺為禪院五山錢塘中竺湖州道場溫州江心金華雙林寧波雪竇台州國清與福州雪峯建康靈谷蘇州萬壽虎邱為禪院十剎錢塘上竺下竺溫州能仁寧波白蓮等寺為教院五山錢塘集慶演福普福湖州慈感寧波寶陀紹興湖心與蘇州大善北寺松江延慶建康瓦棺為教院十剎蘆浦筆記四明僧廬在六邑總大小二百七十六所只鄞一縣城內二十六城外八十天童日飯千僧育王亦不下七八百人行僕稱是天童嵗收榖三萬五千斛育王三萬斛咸淳臨安志臨安西湖舊傳南北兩山僧寺大小合三百六十後為軍營禁苑勢人園圃之所包占今存者不滿百杭州圖經附郭二邑所營寺院內錢塘二百七十仁和六十五合三百三十五所外七邑不與焉楓窗小牘紹興二年五月臨安大火被燬者一萬三千餘家六年十二月復火更一萬餘家人皆以為中興之始改元建炎致此然周顯德五年夏四月辛酉城南火作延於內城忠懿王避居都城驛詰旦且焚鎮國倉王泣禱而滅計一萬九千餘家但臨安撲救視汴都為疏東京每坊三百步有軍巡鋪又於髙處有望火樓上有人探望下屯軍百人及水桶灑帚鈎鋸斧杈梯索之類每發撲救須臾便滅葦航紀談紹興庚寅天台水災主簿廳基衝出一朱棺正當廳治主簿朱公俾令移往山東掩瘞役夫開掘忽見一碣上有字云乾卦吉坤卦凶五百年逢朱主簿移我葬山東不知為誰氏遂移葬之陶朱新録紹興乙酉永嘉火災前數日有熊自楠溪之江滸躍入小舟渡至城下初不懼人命獵士殺之時髙開府世則寓城中謂其倅趙允蹈曰熊字為能火郡中宜慎火已而延燒官民舍什七八獨州治存桐廬縣志桐廬縣三大字宋徐鉉篆始秣陵刁衎與鉉共事江南衎為桐廬宰往京師求於鉉得之揭為縣額以其墨迹藏敕書庫皇祐中縣令劉斁恐其壞乃摹其字刻石吳郡張伯玉為記其事於石南渡後二刻俱在縣衙而墨迹不存矣青箱雜記近世有好事者以潘閬遨遊浙江詠潮著名以輕綃寫其形容謂之潘閬詠潮圖西湖遊覽志餘乾道淳熙間壽皇以天下養每奉德壽三殿遊幸湖山御大龍舟宰執從官以至大璫應奉諸司及京府彈壓等各乘大舫無慮數百時承平日久樂與民同凡遊觀買賣皆無所禁畫楫輕舫旁午如織至於果蔬羮酒關撲宜男戲具閙竿花籃畫扇綵旗糖魚粉餌時花泥嬰等謂之湖中土宜又有珠翠冠梳銷金綵段犀鈿髹漆織藤窰器玩具等物無不羅列如先賢堂三賢堂四聖觀等處最盛或有以輕橈趂逐求售者歌妓舞鬟嚴粧自衒以待招呼者謂之水仙子至於吹彈歌拍雜劇紛紜撮弄勝花泥丸鼓板投壺花彈蹴踘分茶弄水踏滚木撥盆雜藝散耍嘔唱息器教水族飛禽水傀儡鬻道術煙火起輪走線流星火爆風箏不可指數總謂之趕趂人蓋耳目不暇給焉南宋相眼洪皓買一妾東平人其母曽在明節皇后閣中言顯仁皇后生太上時夢金甲神人自稱錢武肅王寤而生太上武肅年八十一太上亦八十一卜都於此亦非偶然邁又言顯仁會稽人紹聖間蘇丞相頌致仕居丹陽有老婢韋出家為尼嘗給事蘇相其妹即顯仁也頌攜以入京會哲宗擇室女二十人分賜諸王顯仁在選入端王宫暨即位一御而生太上雪履齋記張俊有愛妾乃錢塘妓張穠也頗涉詩書俊文字穠皆與之柘臯之役俊發書囑穠照管家事穠報俊以霍去病趙雲事以堅其心且言今日之事惟在宣撫不當以家為念勉報國恩俊以其書繳奏上大喜親書奬諭以賜穠仍加封雍國夫人南宋相眼紹興壬午七月臨安訪求嶽飛墳在錢塘門外當時私號賈宜人墳養疴漫筆孝宗幸天竺及靈隱有輝僧相隨見飛來峰問輝曰既來如何不飛去對曰一動不如一靜又看觀音像手持數珠問曰何用曰念觀音經問自念則甚曰求人不如求已孝宗大喜桃源手聽史越王浩罷相歸里經從慈溪邑宰蔣鶚逺迎既見邑吏而下皆羅拜庭下越王答拜蔣鶚局蹐請免王曰閣下與之有名分某與之為鄉曲入蜀記秀州崇德縣有市人吳隱忽棄家寓旅邸終日默坐一室之中惟一臥榻客至共坐榻上或載酒過之亦不拒清談竟日隱不學問至是間與人言易數皆造精微亦能先知人吉凶壽夭見者莫能測也農田餘話李息齋善畫竹嘗為嘉興守故其竹吳下多有之子遵道任台州黃巖州知州尤善畫竹木優於乃父陸象山集楊慈湖簡任富陽主簿乾道八年象山過富陽留半月將别去念平時有疑願一見不可得復留之夜集雙明閣數提本心二字因問如何是本心陸曰惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也此即是本心簡曰兒時已曉此語畢竟如何象山終不易其説次日有一鬻扇者訟至庭簡斷其曲直訖又問象山曰適來斷扇訟是者知其為是非者知其為非此即君之本心簡忽大省揖而歸拱坐達旦質明北面執弟子禮終身師事焉入蜀記毛德昭名文江山人極苦學中年病盲盲後猶終日危坐默誦六經至數千言不已秀水縣志薛元鼎字升雲莆田人淳熙中除户部左曹郎有長户部者獻貢籍之説元鼎被旨往秀州欲以一州嵗計綜核其盈縮以為天下準平議者以為此法果行民受其病元鼎至秀州還以其所詳究本末源流敷奏曰但見郡縣窘束不見有餘上可其奏曰卿真實才而物議亦愈歸重四朝聞見録慶元元年韓托胄欲逐趙忠定汝愚因以盡去天下之不附已者名以偽學朱文公去國寓西湖靈芝寺送者漸少惟平江水川李君杞獨從容叩請得窮理之學金華雜識朱晦翁過婺州嘗遊武義王臣家書其壁云脫凡近以遊高明勿為嬰兒之態而有大人之志勿為終身之謀而有天下之慮不求人知而求天知不求同俗而求同理又扁三槐堂贈之至今墨迹宛然壁間天啓慈溪縣志自慈溪縣夾田橋至西渡頭驛路跨十五里計二千三百一十有六丈吳潛創用石板砌路濶七尺東西置石牌張寺丞即之題曰相公衢新定續志鄉會所以篤枌榆之誼唯唱第畢鄉之位於朝與仕於京者張宴湖山為新貴者慶最為盛集嚴為恭聖皇后育慶之鄉后兄楊惠節王次山字仲甫后姪敏肅王谷字聲之忠憲王石字介之每集必為統盟其後節鉞蟬聫纓紱輝映率繼先志今節使蕃孫之子鎮以尚帝姬益貴斯集益有光焉宋史后妃列傳理宗謝皇后諱道清天台人祖深甫為相有援立楊太后功太后德之理宗即位太后命選謝氏諸女后獨在室兄弟欲納入宫諸父攑伯不可會元夕縣有鵲來巢燈山衆以為后妃之祥乃供送后時賈涉女同在選中理宗意欲立賈太后曰謝女端重宜正中宫遂定立后后既立賈貴妃専寵貴妃薨閻貴妃又以色進后處之裕如略不介懷太后深賢之開慶初元兵渡江理宗議遷都平江慶元后諫不可恐搖動民心乃止度宗立尊為皇太后宋史后妃列傳度宗全皇后會稽人理宗母慈憲夫人姪孫女也幼從父昭孫知嶽州開慶初秩滿歸道潭州時元兵圍潭州人有見神人衛城者已而潭獨不下逾年事平至臨安會忠王議納妃臣僚言全氏侍其父往返江湖備嘗艱險其處貴富必能盡警戒相成之道理宗乃詔后入宫問曰爾父昔在寶祐間沒於王事每念之令人可哀后對曰妾父可念淮湖之民更可念也帝深異之語大臣曰全氏女言詞甚令宜配冡嫡承祭祀景定二年册為皇太子妃度宗立册為皇后萬柳溪邉舊話尤莊定公焴嘗築圃臨安之西湖花木不繁而瀟灑度宗遊湖上幸其堂御筆題楹間曰五世三登宰輔奕朝纍掌絲綸蓋實録也朝紳榮之癸辛雜識外集昌化章氏昆弟二人皆未有子其兄抱育族人子未幾其妻得子弟言兄既有子盍以所抱子與我兄告其妻妻曰不然未有子而抱之甫得子而棄之人其謂我何不得已寧以吾生者與之已而二子皆成立長曰翃次曰栩翃之子樵槱栩之孫鑄鑑皆相繼登第遂為名族萬歷義烏縣志朱良祐字元德積善好修孫杞生九子長大任漕貢進士次夢魁咸淳戊辰進士次應魁太學內舍正奏名次榮翁浙漕進士次淳咸淳庚午進士次叔麒亦戊辰進士次天與廣德判官因有九子七登科之頌杞贈婺州路判官崇禎義烏縣志龔氏出自晉大夫堅至陳太建中諱孟舒者拜河南觀察使二十一世孫實始遷義烏生六子世宏世隆世廣世恩世昌世英伯仲友善俱從吕東萊學為世名儒鄉先達喻工部良能目為六瑞楊忱中作六瑞堂記孫明之應之愷皆仕顯自明之至永吉凡七世衣冠不絶嘉靖金華縣志金華在宋時王李潘唐號四大族今考太原王氏自登始至七世孫蘭登進士者十有四人鄉舉十人由諸科襲廕者五十九人晉昌唐氏自堯封始至七世孫圭登進士者五人鄉貢十二人由諸科者二十五人坦溪鄭氏自卞始至六世孫鳯進士一人出仕者四十二人眉山蘇氏自遲始至八世孫伯衡仕者一十七人龍門倪氏自允才始至六世孫材進士六人出仕者共四十人其餘若清岡時氏括蒼潘氏琅琊王氏未暇盡述衣冠門第之盛雖漢楊袁晉王謝唐崔柳不是過癸辛雜識倫魁省元同郡自昔以為盛事紹熙癸丑省元徐邦憲狀元陳亮皆婺人寶慶丙戍省元趙時觀狀元王會龍皆天台人淳祐甲辰省元徐霖狀元留夢炎皆三衢人金華府志宋光宗紹熙癸丑狀元永康陳亮寧宗嘉定庚辰狀元金華劉渭度宗咸淳甲戍狀元義烏王龍澤世稱三魁孝宗淳熙元年右丞相金華葉衡淳熙九年左丞相金華王淮理宗嘉熙三年平章軍國重事東陽喬行簡淳祐四年左丞相蘭溪范鍾世稱四相湛淵靜語陳同甫紹熙癸丑大魁滕強恕第二朱質第三喬行簡第五其時三魁與第五名皆婺人金華府志東陽南宋五魁厲仲祥紹熙元年進士第一周師鏡嘉定元年進士第一杜幼節嘉定十六年進士第一俞葵景定三年進士第一俞仲鰲咸淳四年進士第一山房日記方蛟峯逢辰之得元恩命也方一夔時佐賀之以詩云飛鳯翩翩下九閽先生出處重斯文不將鐘鼎易朱紱要臥桐江看白雲處士一生渾是晉逸民千載尚為殷皇家恩義如天大定把三峯乞與君後蛟峯堅臥不出雖所守素定而前輩責善之風亦可想見矣朱彝尊洞霄宫提舉題名記杭州洞霄宫自熙寧初設有提舉高宗南渡特改內祠崇其體貌以提舉受祠祿嵗有其人稽之國史合之野紀其先後倫序爵里姓名可得而考也鄧牧心所撰大滌洞天志建炎以後主是祠者均未之載為補録書之自建炎訖咸淳凡一百一十五人龍圖閣直學士將樂楊時中立觀文殿學士開封耿南仲晞道述古殿直學士上蔡謝克家任伯資政殿學士開封吕好問舜徒觀文殿大學士邵武李綱伯紀資政殿學士襄邑許翰嵩老資政殿學士宋城路允迪公弼延康殿學士董耘資政殿學士瑞安許景衡少伊徽猷閣學士縉雲詹乂持國資政殿學士任城李邴漢老資政殿學士曲阜顔岐夷仲資政殿學士真州吳敏元中觀文殿大學士鄧城范宗尹覺民資政殿學士滁州張守子固觀文殿學士祁門汪伯彥廷俊端明殿學士河南富直柔季申資政殿學士吳興葉夢得少藴顯謨閣學士丹陽翟汝文公巽端明殿大學士齊州吕頤浩元直端明殿學士安陽韓肖胄似夫資政殿大學士綿竹張浚德逺資政殿學士分寧徐俯師川觀文殿大學士姑蘇朱勝非藏一端明殿學士解梁趙鼎元鎮端明殿學士海州胡松年茂老資政殿學士德清沈與求必先端明殿學士雲州折彥質仲古資政殿學士儀真劉大中立道資政殿學士上虞李光泰發資政殿學士毗陵孫近叔詣端明殿學士餘杭何鑄伯壽資政殿學士濟南王次翁慶曽端明殿學士浮梁程克俊元籲資政殿學士上饒余堯弼致勛端明殿學士寧國章復季常端明殿學士宋朴端明殿學士鄞史才德夫資政殿學士金壇湯鵬舉致逺觀文殿大學士吳興沈該守約資政殿大學士建康王綸德言資政殿大學士浮梁汪徹明逺資政殿學士萊州辛次膺起季資政殿學士壽昌葉義問審言資政殿學士宜興周葵立義觀文殿學士宜興蔣芾子禮資政殿學士仙遊葉顒子昂觀文殿學士興化陳俊卿應求觀文殿學士壽春魏杞南夫觀文殿學士婺源王炎晦叔資政殿學士鄱陽洪遵景巖觀文殿大學士四明史浩直翁資政殿學士鄱陽洪適景伯端明殿學士金華葉衡夢錫觀文殿大學士溫陵曽懷欽道資政殿大學士溫陵梁克家叔子資政殿學士德清李彥穎秀叔資政殿學士吳郡范成大致能觀文殿大學士金華王淮季海資政殿大學士華亭錢良臣師魏資政殿學士