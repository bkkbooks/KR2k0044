body:
  text: 浙江通志卷二百七十七藝文十九詩五言排律遊雲門寺唐宋之問維舟探靜域作禮事尊經投跡一蕭散為心自杳㝠龕依大禹穴樓倚少微星沓嶂圍蘭若回溪抱竹庭覺花塗砌白甘露洗山青雁塔鶱金地虹橋轉翠屏人天宵現景神鬼晝潛形理勝常虛寂縁空自感靈人禪從鴿繞説法有龍聽刼累終期滅塵躬且未寜摇搖不安寐待月詠巖扃早發諸暨唐張子容征夫懐遠路夙駕上危巒薄烟横絶巘輕凍澀回湍野霧連空暗山風入曙寒帝城臨灞涘禹穴枕江干橘性行應化蓬心去不安獨掩窮途淚長歌行路難自樂成赴永嘉枉路泛白湖寄松陽李少府唐張子容西行礙淺石北轉入谿橋樹色烟輕重湖光風動摇百花亂飛雪萬嶺疊青霄猿挂臨潭篠鷗迎出浦橈惟應賞心客兹路不言遥登越州城唐孫逖越嶂繞層城登臨萬象清封圻滄海合鄽市碧湖眀曉日漁歌滿芳春櫂唱行山風吹美箭田雨潤香秔代閲英靈盡人間吏隠并贈言王逸少已見曲池平樟亭觀濤唐宋昱濤來勢轉雄獵獵駕長風雷震雲霓裏山飛霜雪中激流起平地吹澇上侵空翕闢乾坤異盈虛日月同艅艎從陸起洲浦隔阡通跳沫噴巖翠翻波帶景紅怒湍初抵北却浪復歸東寂聽堪增勇晴看自發䝉伍生傳或謬枚叟説難窮來信應無己申威亦匪躬衝騰如决勝廻合似相攻委質任平視誰能測始終送閻校書之越唐邱為南入剡中路草雲應轉微湖邊好花照山口細泉飛此地饒古跡世人多忘歸經年松雪在永日俗情稀芸閣應相望芳時不可違舟行入剡唐崔顥鳴棹下東陽回舟入剡鄉青山行不盡緑水去何長地氣秋仍濕江風晩漸凉山梅猶作兩谿橘未知霜謝客文逾盛林公未可忘多慚越中好流恨閲時芳送荀八過山隂舊縣兼寄剡中諸官唐劉長卿訪舊山隂縣扁舟到海涯故林嗟滿歳春草憶佳期晩景千峰亂晴江一鳥遲桂香留客處楓暗泊舟時舊石曹娥篆空山夏禹祠剡溪多隠吏君去道相思奉寄婺州李使君舍人唐劉長卿建隼罷鳴珂初傳來暮歌漁樵識太古草樹得陽和東道諸生從南依逺客過天清婺女出土厚絳人多永日空相望流年復幾何崖開當夕照葉去逐寒波眼暗經難受身閒劍懶磨似鴞占賈誼上馬試廉頗窮分安藜藿衰容勝薜蘿只應隨越鳥南翥託髙柯留題李明府霅溪草堂唐劉長卿寥寥此堂上幽意復誰論落日無王事青山在縣門雲峰向髙枕漁釣入前軒晚竹疎簾影春苔雙屐㾗荷香隨坐臥湖色映晨昏虛牖閒生白鳴琴靜對言暮禽飛上下春水對清渾遠岸誰家柳孤烟何處村謫居投瘴癘離思過湘沅從此扁舟去誰堪江浦猿越江秋曙唐蕭頴士扁舟東路遠曉月下江濆瀲灩信潮上蒼茫孤嶼分林聲寒動葉水氣曙連雲暾日浪中出榜歌天際聞伯鸞常去國安道惜離羣延首剡溪近詠言懐數君與崔二十一遊鏡湖寄包賀二公唐孟浩然試覽鏡湖物中流到底清不知鱸魚味但識鷗鳥情帆得樵風便春逄榖雨晴將探夏禹穴稍背越王城府掾有包子文章推賀生滄浪醉後唱因此寄同聲臘月八日於剡縣石城寺禮拜唐孟浩然石壁開金像香山倚鐵圍下生彌勒見回向一心歸竹柏禪庭古樓臺世界稀夕嵐增氣色餘照發光輝講席邀談柄泉堂施浴衣願承功徳水從此濯塵機送友人尋越中山水唐李白聞道稽山去偏宜謝客才千巖泉灑落萬壑樹縈廻東海横秦望西陵繞越臺湖清霜鏡曉濤白雪山來八月枚乗筆三吴張翰杯此中多逸興早晚向天台送紀秀才遊越唐李白海水不歸眼觀濤難稱心即知蓬萊石却是巨鼇簪送爾遊華頂令余發舄吟仙人居射的道士住山隂禹穴尋溪入雲門隔嶺深緑蘿秋月夜相憶在鳴琴送盧郎中除杭州府任唐岑參罷起郎官草初分刺史符海雲迎過楚江月引歸吴城底濤聲震樓端蜃氣孤千家窺驛舫五馬飲春湖柳色供詩用鶯聲送酒須知君望鄉處枉道上姑蘓入睦州分水路憶劉長卿唐李嘉祐北闕辭明主南方隨白雲沼洄灘草色應接海鷗羣建徳潮已盡新安江又分回㸔嚴子瀬浪詠謝安文雨過暮山碧猿吟秋日曛吴洲不可到刷鬢為思君秦中送李九赴越唐髙適攜手望千里於今將十年如何每離别心事復迍邅適越雖有以出闗終耿然愁霖不可向長路或難前吴㑹獨行客山隂秋夜船謝家徴故事禹穴訪遺編鏡水君所憶蓴羮予舊便歸來莫忘此兼示濟江篇奉和獨孤中丞遊雲門寺唐嚴維絶壑開花界耶溪極上源光輝三獨坐登陟五雲門深木鳴騶馭晴山耀武賁亂泉觀坐臥疎磬發朝昏蒼翠新秋色莓苔積雨痕上方看度鳥後夜聼吟猿異跡焚香對新詩酌茗論歸來還撫俗諸老莫攀轅中秋夜臨鏡湖望月唐陳羽鏡裏秋宵望湖平月彩深圓光珠入浦浮照鵲驚林澹動光還碎嬋娟影不沈逺時生岸曲空處落波心迥徹輪初滿孤明魄未侵桂枝如可折何惜夜登臨早春西湖閒遊悵然興懐憶與微之同賞因思在越官重事殷鏡湖之遊或恐未暇偶成十八韻寄微之唐白居易上馬復呼賔湖邊景氣新管絃三數事騎從十餘人立換登山屐行攜漉酒巾逄花看當妓遇草坐為茵西日籠黄柳東風蕩白蘋小橋裝鴈齒輕浪甃魚鱗畵舫牽徐轉銀船酌慢廵野情遺世累醉態任天真彼此年將老平生分最親髙天從所願逺地得為隣雲樹分三驛烟波限一津翻嗟寸歩隔却厭尺書頻浙右稱雄鎮山隂委重臣貴垂長紫綬榮駕大朱輪出動刀鎗隊歸生道路塵雁驚弓易散鷗怕鼓難馴百吏曕相面千夫捧擁身自然閒興少應負鏡湖春留題天竺靈隠兩寺唐白居易在郡六百日入山十二回宿因月桂落醉為海榴開黄紙除書到青宫詔命催僧徒多悵望賔從亦徘徊寺闇烟埋竹林香雨落梅别橋憐白石辭洞戀青苔漸出松間路猶飛馬上桮誰敎冷泉水送我下山來和微之春投簡陽明洞天五十韻唐白居易青陽行已半白日坐將徂越國强仍大稽城髙且孤利饒鹽煮海名勝水澄湖牛斗天垂象台明地展圖瓌竒填市井佳麗溢闉闍句踐遺風霸西施舊俗姝船頭龍夭矯橋脚獸睢盱鄉味珍蟛蚏時鮮貴鷓鴣語言諸夏異衣服一方殊𢷬練蛾眉婢鳴榔蝸角奴江清敵伊洛山翠勝荆巫華表雙棲鶴聯檣幾㸃烏烟波分渡口雲樹接城隅澗逺松如畵洲平水似鋪緑科秧早稻紫笋拆新蘆暖蹋泥中藕香尋石上蒲雨來萌盡達雷後蟄全蘓柳眼黄絲纇花房絳䗶珠林風新竹折野燒老桑枯帶嚲長枝蕙錢穿短貫榆暄和生野菜卑濕長街蕪女浣紗相伴兒烹鯉一呼山魈啼稚子林狖挂山都産業論蠶蛹孶生計鴨雛泉巖雪飄灑苔壁錦糢糊堰限舟航路隄通車馬途耶溪岸回合禹廟徑盤紆洞穴何因鑿星槎誰與刳石凹仙藥臼峰峭佛香爐去為投金簡來因挈玉壺貴仍招客宿健未要人扶聞望賢丞相儀形美丈夫前車駐旌斾偏坐列笙竽刺史旟翻隼尚書履曵鳬學禪超後有觀妙造虛無髻裏傳僧寳環中得道樞登樓詩八詠置硯賦三都捧擁羅將綺趨蹌紫與朱廟謨藏稷卨兵略貯孫吴令下三軍整風髙四海趨千家得慈母六郡事嚴姑重士過三哺輕財扺一銖道觥歌宛轉嘲妓笑盧胡佐飲時炮鼈蠲酲數鱠鱸醉鄉雖咫尺樂事亦須臾若不中賢聖何由分智愚伊予一生志俄爾百年軀江上三千里城中十二衢出多無伴侶歸只對妻孥白首青山約抽身去得無東樓南望八韻唐白居易不厭東南望江樓對海門風濤生有信天水合無痕鷁帶雲帆動鷗和雪浪翻魚鹽聚為市烟火起成村日脚金波碎峰頭鈿㸃繁送秋千里雁報暝一聲猿已豁煩襟悶仍開病眼昏郡中登眺處無勝此東軒寄題餘杭郡樓兼呈裴使君唐白居易官厯二十政宦游三十秋江山與風月最憶是杭州北郭沙隄尾西湖石岸頭緑觴春送客紅燭夜廻舟不敢言遺愛空知念舊游憑君吟此句題向望濤樓送王協律游杭越十韻唐元稹去去莫悽悽餘杭接㑹稽松門天竺寺花洞若耶溪浣渚逄新豔蘭亭識舊題山經秦帝望壘辨越王棲江樹春常早城樓月易低鏡呈湖面出雲疉海潮齊章甫官人戴蓴絲姹女提長干迎客閙小市隔烟迷紙亂紅藍壓甌凝碧玉泥荆南無底物來日為儂攜酬樂天早春閒游西湖頗多野趣恨不能與㣲之同賞因思在越官重事殷鏡湖之游或恐未暇因成十八韻見寄樂天前篇到時適㑹予亦宴鏡湖南亭因述目前所睹以成酬荅末章少示暇誠則勢使之然亦欲粗為恬養之贈耳唐元稹雁使欲回賔風聲乍變新各攜紅粉妓俱伴紫垣人水面波疑縠山腰虹似巾柳條黄大帶茭葑緑文茵雪盡纔通屐汀寒未有蘋向陽多曬羽依岸小游鱗浦嶼﨑嶇到林園次第廵墨池憐嗜學舟井羡登真雅欲游方盛聊非意所親白頭辭北闕滄海是東鄰問俗煩江界蒐畋想渭津故交音訊少歸夢往來頻獨喜同門舊皆為列郡臣三刀連地軸一葦礙車輪尚阻青天霧空曕白玉塵龍因雕字識犬為遞書馴勝事無窮境流年有限身嬾將閒氣力爭鬬野塘春渡西陵十六韻并序唐李紳七年冬十有三日早渡浙江寒雨方霖軍吏悉在江次越人年榖未成霪雨不止田畝浸溢水不及穗者數寸余至驛命押衙裴行宗先齎祝辭東望拜大禹廟且以百姓請命雨收雲息日朗者三旬有五日刈穫皆畢有以見神之不欺也雨送奔濤逺風收駭浪平截流張斾影分岸走鼙聲獸軸衝波湧龜艨噴櫂輕海門凝霧暗江渚濕雲横雁翼看舟子魚鱗辨水營騎交遮戍合戈簇擁沙明謬履千夫長將詢百吏情下車占黍稷冬雨害粢盛望禱依前聖垂休冀厚生半江猶慘澹全野已澄清愛景三辰朗祥農萬庾盈浦程通曲嶼海邑媚重城弓日鞬櫜動旗風虎豹爭及郊揮白羽入里卷紅旌愷悌思陳力端莊冀表誠臨人與安俗非止奉師貞杭州觀潮唐姚合樓有樟亭號濤來自古今勢連滄海濶色比白雲深怒雪驅寒氣狂雷散大音浪髙風更起波急石難沈鳥懼多遥過龍驚不敢吟坳如開玉穴危似走瓊岑但禠千人魄那知伍相心岸催連古道洲漲踣叢林跳沫山皆濕當江日半隂天然與禹鑿此理向誰尋題杭州天竺寺唐張祜西南山最勝一界是諸天上路穿巖竹分流入寺泉躡雲丹井畔望月石橋邊洞壑江聲逺樓臺海氣連塔明春嶺雪鐘散暮松烟何處去猶恨更看峰頂蓮題杭州靈隠寺唐張祜峰巒開一掌朱檻幾環延佛地花分界僧房竹引泉五更樓下月十里郭中烟後塔聳亭後前山横閣前溪沙涵水靜澗石㸃苔鮮好是呼猿久西巖深響連杭州盧録事山亭唐朱慶餘山色滿公署到來詩景饒解衣臨曲榭隔竹見紅蕉清漏焚香夕輕嵐視事朝靜中看鎖印髙處見迎潮曵履庭蕪近當身樹葉飄傍城餘菊在歩入一仙瓢和處州韋使君新開南溪唐朱慶餘地理光圖䜟樵人共説深悠然想髙躅坐使變荒岑疎鑿因殊舊亭臺亦自今靜容猿暫下閒與鶴同尋轉斾馴禽起搴帷瀑溜侵石稀潭見底嵐暗樹無隂躋險難通屐攀栖稱抱琴雲風開物意潭水識人心攜榼廵花徧移舟惜景沈世嫌山水僻誰伴謝公吟嘉興縣内池閣唐方干指畫應心成周廻氣象清牀前沙鳥語案下錦鱗驚細柳風吹旋新荷露壓傾㣲芳緑岸落迸筍入波生舴艋舟中醉莓苔徑上行髙人莫歸去此處勝蓬瀛寄獻湖州從叔員外唐鄭谷顧渚山邊郡溪將罨畫通逺看城郭裏全在水雲中西閣歸何晩東吴興未窮茶香紫筍露洲迥白蘋風歌緩眉低翠杯明蠟翦紅政成尋徃事輟棹問漁翁和睦州盧中丞題茅堂十韻唐吴融有士當今重忘情自古稀獨開青嶂路閒掩白雲扉石累千層險泉分一帶㣲棟危猿競下簷迥鳥爭歸烟冷茶鐺靜波香蘭舸飛好移鍾阜蓼莫種首陽薇樹密含輕霧川空漾薄暉芝泥看只障蕙帶且休圍東郭鄰穿履西林近衲衣瓊瑶一百字千古見清機上已飲