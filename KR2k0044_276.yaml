樓明月鏡湖邊别離吟斷西陵渡楊桞秋風兩岸蟬出東陽道中作唐方干馬首寒山黛色濃一重重盡一重重醉醒已在他人界猶憶東陽昨夜鐘題寶林寺禪者壁唐方干邃巖喬木夏藏寒牀下雲溪枕上看臺殿漸多山更重却令飛去即應難鏡湖雪霽貽方干唐崔道融天外曉嵐和雪望月中歸棹帶冰行相逢半醉吟詩苦應抵寒猿褭樹聲宿天竺寺唐陳陶一宵何期此靈境五粒松香金地冷西僧示我髙隠心月在中峰葛洪井越溪怨唐冷朝光越王宮裏如花人越水溪頭采白蘋白蘋未盡人先盡誰見江南春復春秀州通越門外八九里臨水多佳木茂樹以便風不得停舟一賞愴然為詩宋蘓舜欽密樹重蘿覆水光珍禽無數語琅琅驚帆瞥過如飛鳥回首風烟空斷腸對雪憶往歲錢塘西湖訪林逋三首宋趙抃昔乗野艇向湖上泊岸去尋髙士初折竹壓籬曽礙過却穿松下到茅廬旋燒枯栗衣猶濕去愛峰前有徑開日暮更寒歸欲嬾無端撩亂入船來樵童野犬迎人後山葛棠梨案酒時不畏尖風吹入牖更教牀畔覔䲭夷孤山隱居書壁宋林逋山水未深猿鳥少此生猶擬别移居直過天竺溪流上獨樹為橋小結廬葑田宋林逋淤泥肥黑稻秧青濶蓋深流旋旋生擬倩湖君書版籍水仙今佃老農耕題翠峰院范蠡舊宅宋范仲淹翠峰高與白雲閒吾祖曽居水石間千載家風應未墜子孫還解愛青山釣臺宋范仲淹漢包六合網英豪一箇𡨕鴻惜羽毛世祖功臣三十六雲臺爭似釣臺高過方處士舊隠留題宋范仲淹仲淹景祐初典桐廬郡有七里灘子陵之釣臺在以從事章岷往構堂而祠之召會稽僧悦躬圖其像於堂洎守姑蘓道出其下登臨徘徊見東嶽絶壁白雲徐生云方干處士之廬遂訪焉其家子孫尚多儒服有楷者新䇿名而歸因留二十八言又圖處士像於嚴堂之東壁楷請刊詩於其左風雅先生舊隠存子陵臺下白雲村唐朝三百年冠蓋誰聚詩書到子孫寄林處士宋范仲淹片心髙與月徘徊豈為千鍾下釣臺猶笑白雲多事在等閒為雨出山來六月二十七日望湖樓醉書五首宋蘓軾黑雲翻墨未遮山白雨跳珠亂入船卷地風來忽吹散望湖樓外水如天放生魚鼈逐人來無主荷花到處開水枕能令山俯仰風船解與月徘徊烏菱白芡不論錢亂繋青菰裹緑盤忽憶嘗新㑹靈觀滯留江海得加餐獻花游女木蘭橈細雨斜風濕翠翹無限芳洲生杜若吴兒不識楚辭招未成小隠聊中隠可得長閒勝暫閒我本無家更安往故鄉無此好湖山夜泛西湖二絶宋蘓軾蒼龍已没牛斗橫東方芒角升長庚漁人收筒及未曉船過惟有菰蒲聲湖光非鬼亦非仙風恬浪靜光滿川須臾兩兩入寺去就視不見空茫然望海樓晩景二絶宋蘓軾海上濤頭一綫來樓前相顧雪成堆從今潮上君須上更看銀山十二回青山斷處塔層層隔岸人家喚欲譍江上秋風晩來急為傳鐘鼓到西興與莫同年雨中飲湖上宋蘓軾到處相逢是偶然夢中相對各華顛還來一醉西湖雨不見跳珠十五年予去杭十六年而復來留二年而去平生自覺出處老少粗似樂天雖才名相逺而安分寡求亦庶幾焉三月六日來别南北山諸道人與下天竺惠淨師話舊宋蘓軾當年衫鬢兩青青强説重臨慰别情衰髮秖今無可白故應相對話來生七年九月自廣陵召還復館於浴室東堂八年六月乞會稽將去汶公乞詩乃復用前韻宋蘓軾乞郡三年字半斜廟堂傳笑眼昏花上人問我遲留意待賜頭綱八餅茶尚書學士得賜頭綱龍茶一觔八餅今年綱到最遲夢遶吴山却月廊白梅盧橘覺猶香杭州梵天寺有月廊數百間寺中多白梅盧橘會稽且作須臾意從此歸田䇿最良東南此去幾時歸倦鳥孤雲豈有期斷送一生消底物三年光景六篇詩十八日觀潮宋陳師道一年壯觀盡今朝水伯何知故晩潮海浪肯隨山俯仰風帆長共客飄摇霅溪道至四安鎮宋張耒苕霅清秋水底天夜帆燈火客髙眠江東可但鱸魚美一看溪山直萬錢湖上雜詠宋鄒浩何處清風作晩凉解衣相與面滄浪青萍紫荇令人恨遮却琉璃萬頃光定海甲寅口號七首宋陳造長官清苦舊傳聞檢放禾苗近四分畢竟不縁胥吏手旱頭科斂枉紛紜田租有約不相違比着豐年勝已虧一飽分明郎首賜幾曽刺口問抽卑已鈔口數報隅官歲後朝餔定不難且願眼前强健在趂坊討海過冬寒水泛溝塍意欲饜凌晨還復雨廉纖早秧未頷猶須揷晩穀無多不更㘱父子分頭上海船今年海熟勝常年官中可但追呼少不質田輸折米錢人家兩兩捉春歸笑語相過復歎咨共説颶頭前後作幾人莆網罣流尸連宵飛雨喜滂流已入梅天過麥秋二十年前如此晩金城地抱却全收暮春泛西湖宋陳造矲矮欄干錦繡筵欄邊仍泊女郎船憑欄笑指元真子不是詩仙是酒仙四月望再游西湖宋陳造春光陸續委東流看到湖邊安石榴更與蘓隄鷗鷺約辦舟來賞牡丹秋憶錢塘江宋李覯昔年乗醉舉高隠隠隠前山日半銜好是滿江涵返照水仙齊着淡紅衫過嘉禾野塘宋沈與求木末孤烟起夕炊茅簷直下釣魚磯蒼茫逺水連天碧一葉短篷何處歸望道場山塔宋孫覿碧玉旋螺插暮烟遥看桂子蕩僧前試尋白水田頭路一葦橫江浪接天過七里灘宋楊時拂雲髙鴈倚風摶下視平湖萬里寛搔首扁舟又東去錢塘江上看波瀾石門寺四首宋朱松橘刺藤梢罥客衣直縁㣲禄得奔馳懸知投老歸田味只似登山困睡時行穿蒼麓瞰平岡踏破青鞋到上方城市紛紛足機穽却從山路得康莊林棲相喚出幽谷我亦欲起天未明枕中決決響出溜一似江城長短更真功那復歎蒸沙靜笑飢腸日夜譁老衲不須供茗粥朝餐吾已辦丹霞武林宋朱熹春風不放桃花笑隂雨能生客子愁只我無心可愁得西湖風月弄扁舟吳山髙宋朱熹行盡吳山見越山白雲猶是幾重關若尋汗漫相期處更在孤鴻滅没間甲午出知漳州晩發船龍山暮宿桐廬宋楊萬里一席清風萬壑雲送將華髪得歸身海潮也怯桐江淨不遣濤頭過富春舟過德清宋楊萬里人家兩岸桞隂邊出得門來便入船不是全無最佳處何牕何户不清妍明發三衢二首宋楊萬里㧞盡新秧插盡田出城一眼翠無邊不關雨水愁行客政是年年雨水天雲欲開時又不開問天覔陣好風催雨無多落泥偏滑溪不勝深岸故頽江山道中蠶麥大熟二首宋楊萬里黃雲割路幾肩歸紫玉炊香一飯肥却破麥田秧晩稻未敎水牯臥斜暉新晴戸戸有歡顔曬繭攤絲立地乾却遣繅車聲獨急今年不及去年閒上已同沈虞卿尤延之王順伯林景思游春湖上隨和韻得絶句呈同社宋楊萬里搃宜亭子小如拳着得西湖不見痕湖上軒牕無不好何須抵死揀名園天色䰒鬆未肯收吾儕自樂不曽愁隨宜旋旋商量着晴即行行雨即休籃輿休上馬休騎濕却青鞋也不辭揀取雨絲疎處去攜笻且謁水仙祠雨催杖履却須回捲上疎簾眼頓開十里湖光平似鏡桞梢梢上一船來岸上湖中各自竒山觴水酌兩相宜只言游舫渾如畫身在畫中元不知蘭溪解舟宋楊萬里只愁灘淺閣行舟到得江深又不流水鳥避人飛不徹看他没去看他浮過臨平蓮蕩四首宋楊萬里蓮蕩層層鏡様方春來嫩玉斬新黄角頭一一張蘆箔不遣魚蝦過别塘蓮蕩中央劣露沙上頭更着野人家籬邊隨處插楊桞簷下小船縈釣車朝來採藕夕來漁水種菱荷岸種蘆寒浪落時分作蕩新流漲後合成湖人家星散水中央十里芹羮菰飯香想得薰風端午後荷花世界桞絲鄉嚴州宋范成大城府黄塵撲馬鞍一篙重探水雲寒耳邊眼底無公事睡過嚴州二百灘餘杭宋范成大春晩山花各靜芳從敎紅紫送韶光忍冬清馥薔薇醱醺滿千村萬落香鄉人或病余詩多道蜀中遨樂之盛適春日游鏡湖共請賦山隂風物遂即杯酒間作絶句當持以誇西州故人也宋陸游嬾日輕雲淡沲天撲燈過後賣花前便從水閣杭湖去捲起朱簾上畫船舫子牕扉面面開金壺桃杏間尊罍東風空送笙歌近一片樓臺泛水來青田同七五兄作宋薛季宣為聞雙鶴訪青田便有孤雲竟目前灘水自鳴山自緑短篷斜挂得酣眠烏雲送雨過前山白鳥將雛向逺灣獨立溪亭無箇事湍流瀧石鎮潺潺橘枝詞記永嘉土風宋葉適蜜滿房中金作皮人家短日挂疎籬判霜剪霧裝船去不唱楊枝唱橘枝鑑湖宋王炎𥻘𥻘萬頃碧玻璃今日耕鋤半稻畦菡蓞開時還自好買舟一醉玉東西馮公嶺宋翁卷亂峰千疉拂雲霓輻合坑崖立似梯曽向括州州裏望衆山却是此山低東陽路傍蠶婦宋翁卷兩鬢樵風一面塵採桑桑上露沾身相逢却道空辛苦抽得絲來還别人壽昌宋劉克莊山路泥深雪未乾病身初怕浙西寒新年臺厯無人寄且就村翁壁上看桐廬舟中即事宋劉克莊車前彎㡌同聲散關外華簪一揖休惟有浙江潮好事肯隨逐客到嚴州過剡溪宋劉宰青山疉疉水潺潺路轉峰回又一灣想見雪天無限好不妨獨櫂酒船還西湖春雪宋高翥小艇沿湖看雪飛正當騎馬踏春時是誰乞與楊花舞先占東風一月期夜過鑑湖宋戴昺推篷四望水連空一片蒲帆正飽風山際白雲雲際月子規聲在白雲中泛剡宋許棐水濶無風似有風蘆花摇落櫓聲中鷗無一㸃驚猜意認作當時載雪翁正元二日與菊莊湯伯起歸隠陳鴻甫泛舟湖上二首宋武衍春雲漠漠雨疎疎小艇衝烟入畫圖除却淡粧濃抹句更將何語説西湖櫂轉逋山艤落暉春風深鎖恨依依松間一鶴俄飛起疑是先生出未歸過桐廬宋姜夔横看山色仰看雲十幅風帆不藉人記取合江江畔樹他年此處好垂綸越中士女春游二首宋姜夔秦山越樹兩依依閒倚欄干看落暉楊桞梢頭春又暗玉簫聲裏夜游歸箯輿軋軋過清溪溪上梅花壓水低月影漸收天半曉兩山相對竹雞啼湖上三首宋方岳今歲春風特地寒百花無賴已摧殘馬塍曉雨如塵細處處筠籃賣牡丹連天芳草晩凄凄蹀躞花邊馬不嘶蜂蝶已歸絃管靜猶聞人語畵樓西游人抵死惜春韶風煖花香酒未消須向先賢堂上去畵船無數泊長橋過杭州故宫二首宋謝翺禾黍何人為守閽落花臺殿暗消魂朝元閣下歸來燕不見前頭鸚鵡言紫雲樓閣讌流霞今日凄凉佛子家殘照下山花霧散萬年枝上挂袈裟重過宋謝翺複道垂楊草欲交武林無樹着凌霄野猿引子移來往覆盡花枝翡翠巢餘杭樵歌宋謝翺樵斧丁丁響翠㣲頳肩半脱汗身衣因來避雨巖前洞裹得山蜂和蜜歸艤舟江心寺宋謝翺數聲清磬出晴暮落木人家散烟霧風送年年江上潮白雲生根吹不去錢塘晩望宋謝翺錢塘江上夜潮過秋靜寒烟白露多吴越青山明月裏舟人齊唱異鄉歌過崇德縣宋方回枯桞無風影不摇敗牆頽屋意蕭蕭忽然喚醒承平夢猶有紅闌夾畵橋曉發富陽縣宋方回長山礲石片帆斜小雨初晴日眩沙回首遥看富陽縣青烟低罩一叢花三天竺道中宋方回三天竺路漸平登髙似雷峰墖幾層山到無人行處好松隂萬樹立孤僧浙江通志卷二百七十七
