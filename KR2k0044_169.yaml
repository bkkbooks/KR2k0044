body:
  text: 浙江通志卷一百七十人物三循吏四金華府漢楊扶金華先民傳字聖儀義烏人為武源令遷交趾刺史所至皆有恩惠州人為之謡曰楊聖儀政多竒張敦浦陽人物記字伯仁浦江人為諸暨令海寇二百餘人剽掠為患悉平之轉重泉令民悅其化纍官至車騎大將軍駱俊三國志駱統傳注統父俊字孝逺烏傷人有文武才幹少為郡吏察孝亷補尚書郎擢拜陳相值袁術僭號羣賊並起陳與比界姧慝四布俊厲威武保疆境賊不敢犯養濟百姓災害不生歲獲豐稔陳修傳詳介節韓晏金華先民傳字德茂東陽人舉孝亷起家為永寧令遷張掖太守後為河南尹所至以仁惠稱南北朝朱幼金華賢達傳字長明義烏人歷遷揚州刺史兼度支使治揚有功人歌曰朱幼渡江東民安盜賊空唐厲文才金華先民傳東陽人貞觀初為道州刺史是時南土未靖荔浦之寇猖獗掠境文才臨郡期月羣盜悉平威愛甚著改容州刺史未幾辭歸宋王師愈萬厯金華府志字與正金華人紹興戊辰進士乾道中除金部郎官召見言事御札俾條奏嘗稱其有諫官才尚書楊倓隂附執政欲督諸郡積逋以償內府貸銀師愈以為罔上擾民持不可罷知饒州後除浙江提點刑獄丐祠卒其為政仁恕而綱目整齊所至賑荒裕民懾驕兵擒妖賊皆卓卓可傳朱子為作墓志稱其有本有文德望隱然為東州之重范溶金華先民傳字茂實蘭溪人以祖任為太廟齋郎歷權通判饒州練熟吏事決讞詳明三為刑官再治邑皆以平恕稱徐良能傳詳介節潘燾金華先民傳字無愧蘭溪人以祖任補官仕至廣南東路經略安撫使其權知邵州日朱子安撫湖南與周必大聯章薦之稱其以問學持身以文雅飭吏政先教化囹圄屢空雖湖北猺寇犯邊而處置得宜民用安堵其為大賢所稱如此喬夢符金華先民傳字世用東陽人淳熙二年進士知歙縣有大逵當水衝居民嵗苦霖潦夢符為築堤鑿渠人免水患號喬公街後除大理正奉旨鞫郭倬獄於宿州不畏權勢進監察御史孫礿金華賢達傳字居敬東陽人淳熙十四年進士纍遷太學正奏對慷慨亟蒙褒獎進監丞會京尹辱武學生不以其道礿抗疏力爭不報遂請外知漢陽軍尋知黃州憲湖南所至皆有善政仕終兵部郎官石範浦陽人物記字宗卿浦江人紹熙元年進士調奉化尉歲飢貧民將為變範賑之不誅一夫而定遷知婺源縣縣有月樁錢二萬皆取之民範請蠲其十之二俄權通判袁州洞獠弄兵袁當其衝範攝州事練軍旅廣儲蓄博訪守禦之䇿洞獠不敢近轉通判泉州卒潘畤萬厯金華府志字德鄜金華人以仲父良貴任為登仕郎歷知廣州潭州再遷尚書左司郎中其治郡先教化務施舍至典方面養威持重務存大體有所張弛必先究其利害本末然後出令嘗自謂吾之為治主於寬而不使有寬之名輔以嚴而不使有嚴之迹惟其綱維總攝而脈絡流通是以坐走羣吏而我常無為也當時號精吏道者無能出其右及卒朱子為志其墓李大有金華先民傳字謙仲東陽人慶元二年進士纍官通州通判民田歲苦旱大有相地勢鑿五狼山石麓引江水入河以溉之自是歲大稔而商船亦竟達城下為通州無窮之利攝郡事吏持案白事例錢合自支送大有判曰有例可送無法可支悉却之改太常寺博士卒於官劉邦光吕祖謙劉邦光墓志字國華武義人知湖州長興縣歲惡發圭田之粟為民先夫人亦脫簪珥為粥以食餓者終知沅州安靜不擾殁而人有餘思康植王褘康植傳字子厚義烏人嘉定七年進士授奉化縣主簿歷遷國子正改通直郎輪對言事抗直忤喬丞相行簡意差通判廣德軍救荒有法升知本軍以治最聞除浙西提點刑獄劾奏平江守臣史宅之治郡無狀宅之兄嵩之時為丞相并連及之疏入理宗怒欲重罪之知樞密院杜範為之極諌乃徙宅之隆興而植提刑福建改知寧國府兼權江南東路提舉茶鹽義倉奏免和糴行經界法除都官郎中出知吉州改福建路轉運判官兼攝建寧府賑水災拯鹽弊政惠大孚赴闕奏事卒於建溪驛潘友文豫章書字文叔婺州人開禧間令永豐政尚寬惠推誠撫民時役法弊所在破家友文曲為均調使不困去官民為立祠胡巖起金華先民傳字伯巖永康人嘉定甲辰進士知閩縣廣帥真德秀雅敬重之為江西提刑司幹辦公事值贑卒朱先嘯亂殺提刑使者巖起相度事宜佐新提刑陳愷密授方略遂平其亂贑人作平贑録紀焉樓大年宋濂樓大年傳字元齡義烏人從鄉先生徐僑遊僑朱熹弟子故大年長於性命之學登嘉定癸未進士知隆興府南昌縣為治先教化建利去病若嗜欲然遷奉議郎通判吉州提點刑獄李迪以大年亷慎命録一道滯囚大年隨重輕而疏裁之抱成案就迪言咸聽未幾攝郡事江東大姓查氏以父遺書據幼弟資産幾六十萬弟長訴之州縣歷二十年不解迪曰非清白吏如大年不足以究此以事下大年舉張詠決子壻爭財故事為例人以為允歲終吏以公帑錢粟羡餘來白曰此公券內物前官具有例大年斥之以充軍餉尋升朝奉郎初理宗降訓廉恤刑二詔大年因托古之可法戒者二百事疏之闕心偶録藏於家許子良宋濂許子良傳字肖説東陽人嘉熙戊戌進士用宰相喬行簡薦監鎮江西酒庫前此贏羡率自入子良不納以歸公家遷知晉陵縣版籍紛亂官賦多放失子良為稽逃亡考隱漏催科定繇條序粲然改宣教郎知都昌縣庫藏赤立子良節縮浮冗兩年之間供輸有餘轉承議郎差幹辦行在諸司糧料院有旨俾閲滯獄八十餘子良為翻案一一讞之雖纍歲不引決者一旦曲直皆白進太學博士請外出知台州節縮如都昌凡典例所宜得者亦謝去居半載郡計裕如敘朝散郎卒范士表金華先民傳字叔端蘭溪人丞相鍾從子也嘉熙戊戌以别頭試登第歷官為衢倅適郡民有嘯衆為亂者守懼委印去人情大震老幼星散士表攝郡事協僚佐集籌畫為守禦計益兵誅討旬日元惡就戮郡賴以全黃夢炎金華賢達傳字子陽義烏人淳祐末登進士第入淮東制幕主管機宜文字建議蠲放屯租邉民以安業判平江府撙節浮蠧白免淮西總領纍歲所索無名錢咸淳初除司農寺丞輪對力陳時弊請減浮費戒宴私度宗嘉納纍遷户部左曹郎以朝請大夫致仕元蘇友龍宋濓蘇友龍墓志字伯夔其先居眉州文定公轍之子遲知婺州因家金華遂為金華人以才推擇充府史趙郡蘇天爵來參江浙省政挽之入省蘄州紅巾搆亂陷於潛昌化犯杭州省臣皆遁參政樊執敬以死自誓友龍説樊曰明公以身死國義則得矣如一城生聚何今城中兵不下數十萬公庫金帛以萬計與其委諸盜賊曷若募民使戰戰而不勝死未晚也樊不能從迎戰而死友龍與掾李樞謀以蘇李署號召民殺賊殺一首受錢二百五十緡民持刀爭奮獻馘充庭未幾辨章復杭州友龍絶口不言功考滿擢紹興路蕭山縣尹蕭山民詭名匿其田賦科徭不能均一友龍令其自實田輯為册書凡有徵發皆視書重輕之兵興以來縣糧輸衢處二州民憚逺征往往皆屬吏吏並緣為姧糧不時集主運者妻孥恆坐繫友龍釋之而罪吏期月咸足且為立法每鄉置督運一人促民各以糧赴江濵仍驗糧多寡賦錢僦舟以行民大便之會歲儉弛湘湖之禁以利民不足啓常平倉以活餓者僚屬沮之友龍曰發天子粟活天子民有何不可儻有譴責吾自任之民賴以生改本路總管府經歷行樞密院照磨張士誠據姑蘇請為幕官恥之不就升行省左司都事舒穆嚕宜孫分省于處以討賊自任請友龍與劉基同事勸其禮賢下士撫流亡招羣盜從之衆心翕然明兵下浙束李善長欲奏官之以年耄力辭歸金華山中卒子伯衡金德潤宋濂金德潤墓碣字君澤浦江人年二十餘遊湖南入憲府補書吏久之擢常州路宜興州判官州多盜德潤閲盜册察其尤嚚狡者鈇左右趾役於官三年之間外户不閉改嘉興路總管府推官屬歲大水禾不登其壯者羣詣富人貸粟弗從竟囊之而奔諸聚落皆然縣州生以強奪案且具德潤原其情悉傅以輕典脫死者六百人民感泣拜而去以紹興路總管府治中致仕胡長孺傳詳儒林王肖翁王褘王肖翁墓志字傅朋金華人起家衢婺二郡儒學録泰定四年除海道都漕運萬戶府知事海道歲漕東南百萬之粟供億京師以軍興法從事其任至重自漕帥至僚吏率以選居肖翁居幕中三年上下克協漕事訖辦重紀至元二年轉嘉興録事適歲侵部使者檄行視田肖翁為具實以聞得免荒租數萬石他州郡有姧利事部使者悉以委決無不當者以松江府判官致仕申佑王褘申佑墓志字君佐金華人天歷初用御史舉署餘干州儒學教授修學宫養士類翕有聲譽調平江路録事判官適歲大侵白大府願以勸分為己任諭巨室移粟他郡食餓人全活者衆姧人羅甲收良家女百十人抑使為娼因交結權貴邀納貨賂佑亷得姧狀即白發之坐甲重罪還娼女良家遷德興縣主簿縣西五里有溪控驛道其流湍悍涉者病之佑相其宜為浮橋以鐵縆繞舟上用濟不通買田豫守橋者俾以為繕修之資民便之名橋曰棲鸞渡曰申公刻石頌之以遺永康縣尹致仕明吳履宋濂吳履傳字德基蘭溪人元季教授鄉里名重一時國朝取婺舉為南康丞南康俗悍德基以寬化之視民如子民有訴召使前與語弗加咄叱民或援丞裾相爾汝弗責也有徴調召其大姓坐廡下善言誘之聽人人自説便否由是民愛丞如父而吏自不能為姧去知長沙之安化其土豪多糾民為兵後盡降萬夫長易俊原獨恃驍勇與麾下數十人遁入山谷保險自固郡邑患苦之江隂侯吳良承詔求餘寇兵且集召履計事履曰易氏未有反狀奈何激之使生變乎不若先以計致之果反用兵未晚也侯曰令之言然兵止不發既而盡致其麾下惟俊原一人度兵勢孤詣軍門請見遂縳送京師民安堵無擾擢知萊之濰州山東民願以羊牛代秋稅官從其言履與民計羊牛有死瘠患不如納粟便獨收民粟他縣牛羊送陜西民驅走二千里皆破家郡以濰獨完令役千人部送鄰縣牛履曰有牛家送牛雖勞不怨使人代之脫道中牛死誰當代償耶力爭不奉命履為吏以愛民為先當有追需于民不務速辦稍緩期約故物價不湧民視他所費恆減十二三所至民樂其簡易居二年會改濰為縣召還至京師遂謝事歸鄭湜方孝孺鄭湜墓表字仲持金華人洪武十四年姧人誣告其家以交通賊臣事甚危而湜兄濓先以事在京師吏逮捕急湜自詣吏請行至京濓曰吾家長當任其罪湜曰兄年耄弟當任其責二人相爭入獄太祖聞而赦之拜湜為福建布政司參議吏民熟其家聲相戒弗犯南靖縣民為亂詿誤者數千百人部曲多掠其婦女為奴湜言于諸將縱遣去兵不敢譁劇盜殺人在獄驗尸無有不肯承湜夜取盜鞫訊因縳置于庭匿吏案下俾聽其語夜半盜顧庭空無人果私語始知其沉尸井中明日詰盜以沉尸處盜驚伏閩人神其政後以疾卒謹按明泳化類編云湜先世有純德六世同居至湜已傳十一世矣詳見義行傳中而其政績表著如此考名山藏所載似略故特從墓表採入李希明金華先民傳字濬文東陽人艾唐從許謙遊潛心經史希明夙承庭訓于問學多所究通洪武中舉孝亷入太學舍選第一授伴讀侍太宗於潛邸從容輔導甚被禮遇進江西左參政時陳友諒餘黨依險縱掠朝廷將出師勦之希明奏乞先招撫不服興師未晚從之流民爭先來歸卒以安業擢刑部侍郎卒朱文萬厯金華府志字恱道義烏人洪武六年舉明經知星子縣奏其縣山髙風冷春意來遲艱於采茶上可其奏遂罷茶貢後升贑州府同知盡心撫綏贑民祠祀之何士英金華先民傳字子文東陽人永樂初知平涼府編氓相慶以為得慈父母會主者較郡庾虧數千石士英方自劾民爭輸之如數考滿升兩淮鹽運使先是民苦部差督鹽課者所至苛擾及歲課孳生馬駒賠納不及士英一切奏罷之後致仕歸諸葛伯衡萬厯金華府志蘭溪人洪武初授趙州吏目州建峰廟有青蛇惑人凡入人家必有禍伯衡殺青蛇罪巫者民以不惑以薦召問治道對以聖明之世紀綱正而法度修民皆安業但亷恥之道輕耳上大悅擢陜西參議以道途逺近定轉輸之法民甚便之董仁仲分省人物考蘭溪人洪武中知莆田縣蒞政精勤而持之以公民大恱後卒於官貧不能歸葬民相與營葬於邑之西劉山傅揚善萬厯浦江縣志字大有洪武丁丑詔天下郡邑選用明經練達治體者有司以揚善應廷試稱旨授漢陽知府至任逐師巫毀淫祠鞭撲不施而事治靖難時謀倡義事泄謫雷州漢陽士庶詣闕上疏借留遂命復守漢陽歲祲漢邑俱患蝗揚善作文移城社蝗皆飛入漢江化為魚蝦人稱異云邢旭萬厯金華府志字景陽金華人永樂進士纍官河南參議適歲旱潦修舉荒政民賴以安正統初升四川布政撫養軍民恩威並著土司王永壽董敏失和治兵交攻朝廷遣帥討之旭即身詣其寨諭以禍福皆釋甲待罪請遣子入質進馬謝恩尋致仕卒蜀人立碑成都三公廟祀之章聰萬厯金華府志字俊民金華人永樂甲辰進士宣德二年拜監察御史彈劾不避權貴升廣西按察使奏徙南丹衛治於賓州奉議衛治於貴縣士卒免煙瘴之患議置巡司於潯梧桞慶要害之地民免團軍之擾升右布政使卒潘璋金華先民傳字栗夫金華人由進士任工部主事監稅荆南有氷蘗聲升四川提學僉事作興士類尚書周洪謨謂全蜀之士仰之若山斗愛之若父母馮傑萬厯金華府志字孟英金華人永樂中貢入太學授瀘州判官佐政亷平民蠻從化正統中薦升監察御史巡福建奏減銀課巡兩淮奏寬鹽禁景泰初廣東盜起州縣騷動朝論以傑歷練老成升授按察使隨方撫捕未幾盜平致仕歸謝忱金華先民傳字惟壽永康人永樂壬辰進士授監察御史遇事敢言出為巡按詰姧禁暴無所假借人稱謝閣王升四川按察司僉事歲歉民多抵法忱憫之為求可生之途適地方多虎患示以得虎皮三者免一命人爭捕之於是虎患息而民命以全卒於官歸葬之日行李蕭然杜瑄萬厯金華府志字李璋東陽人永樂初由鄉薦入太學授兵科給事中升廣東按察司僉事治獄平允嘗巡海道邏卒獲賊船內四十餘人俱飢困濱死議者欲棄於海瑄曰不可恐誤無辜也令飲食之明日俱蘇詢之乃寧波追賊軍艘遭風飄溺南海耳遂移文遣之升陜西副使以疾乞歸朱勝金華先民傳字仲髙湯溪人由舉人授刑部主事纍升知武昌府調蘇州府所至多善政蘇人歌頌德政十善流傳中外奉敕褒嘉超授江西左布政使卒於官趙年萬厯金華府志字有年蘭溪人成化乙未進士授行人屢奉命行祀事於諸王府凡餽遺一無所受在陜西值歲大歉減廩餼為藩臬諸臣倡以賑民飢升工部營繕司員外監本部厰宿弊除革殆盡中貴憚之差監蕪湖木稅歲積羡餘且萬金悉歸之公帑代還管理五城九門事執法嚴正不可犯人目之為趙鐵面轉都水司郎中適中貴有希旨於衢州府織造金龍絹者業已成年聞之即抗疏極言不可上允其奏自是中貴伺其闕失弗可得誣以鬻所乘馬多索價值竟坐除名陸璥萬厯金華府志字溫夫蘭溪人由舉人授萬載知縣後調大庾遇事堅執不為詭隨處劇繁以簡靜愛民禮士敦雅有古風升福建漳州府通判去後民恆思之謝愷萬厯金華府志字舜鄉義烏人由歲貢任敘州府推官操履清介訊鞫明允𢎞治戊申蜀大歉奉敕賑恤多所全活時盜賊縱橫愷招徠安集之民大感恱撫按交薦於朝命方下以勞瘁卒於官章僑萬厯金華府志字處仁蘭溪人正德丁丑進士授行人擢禮科給事中劾幸蕭敬芮景賢等宜疏斥為弭災首務尋遷衡州知府歷廣西河南按察副使未幾督學山西纍官山西右布政使以禦敵有功晉福建左布政使夙夜勤政不避災瘴以疾卒於官祝珝金華府志字珍卿蘭溪人嘉靖壬午舉人授羅田令縣界萬山中民習獷悍有大猾根株盤固珝廉知具獄磔于市屬羣盜起白畫剽掠珝密緝為內應者十餘輩移檄徵諸路兵選精鋭直搗其巢百餘年盤踞之寇一旦盡殱郡賴以寧他郡滯獄皆願就羅田請平擢刑部員外郎尋乞歸唐汝承金華府志字伯寵蘭溪人嘉靖壬午舉人授應天府通判郡多豪貴隱漏侵匿汝承發摘如神署篆溧陽有兄弟爭産互訐導以義感而相讓調順天通判霸州盜發奉旨署兵道事勦撫有功擢常州同知視府篆值旱虔禱嘉山雨隨注又先期賑濟多所全活馮亮獻徵録字執夫金華人嘉靖壬辰進士令潤之丹徒吳中諸郡邑素苦白糧解役會歲大侵而役不蠲亮力請於部使者以贖鍰代輸故鄰郡流徙載道而潤安堵如故擢兵科給事中尋升河南參政歲侵極意賑恤捐俸為郡邑倡全活無算尋擢四川按察使按貪墨吏無所假貸尤加意獄事日夕手爰書至達曙忘寢遂以此得疾再請始得歸行至夔州而殁夔守為檢其橐中裝僅餘羡俸數金而己盧仲佃金華府志字汝田東陽人嘉靖丙辰進士任晉江令時苦倭患仲佃議城安海居民拒守得無恙改調福安時邑新破仲佃請兵五千倍道而進繕治城塹招撫流亡倭至逼城城中人爭走逃避仲佃示曰吾與若同死守闌出者鈇左右趾民乃止相持三日夜倭引去升比部歷兵部郎出守成都值白蓮盜起愚民罹重辟者百數仲佃曲為寬宥轉惠潮副使升廣東布政使復左遷備兵惠潮潮故瘴鄉流民據山寨為訌兵燹相尋災癘大作仲佃諭降諸賊積勞冒瘴卒於官陸鳯儀金華府志字舜卿蘭溪人嘉靖丙辰進士任餘干縣請謁不行除火耗絶饋遺歲侵賑飢全活甚衆遇湖盜嘯聚布誠曉諭盜各解散擢南垣抗疏不避以忤當道罷歸蔣瑜金華府志字純卿東陽人嘉靖丙戍進士授鄱陽令值巨浸衝決田禾瑜為築堤延袤數百餘丈人稱蔣公堤後以御史巡按楚中有叛獄數百人斬關而出瑜授計一夕悉就擒又以嵗歉奏免田租之半民祝頌焉胡僖舊浙江通志字伯安蘭溪人嘉靖己未進士授刑部主事進儀制司郎中會諸王襲封次子欲得郡王封僖以制不合持不可王子以數萬金賄大璫互相煽誘僖不為動璫乃授指吏部出僖為湖廣參議楚比嵗大水僖廉得虛稅蠲額十之四民感悅升雲南副使涖滇四載桁楊不設囹圄若洗深山窮谷聞胡使君名輒呼佛子後以忤權要拂衣歸里王乾章金華府志字順卿東陽人嘉靖壬戌進士授中書舍人轉山西道御史歷官江西布政參議分部九江盜何鳯等恣剽掠以計擒獲江右悉平坐失印去官尋起福建按察僉事時江陵柄政汰藩臬諸司十之三乾章兼視七道事凡所屬獄囚多為開釋福安治環大海颶發溺者數千出金掩骼又發帑粟賑流殍擢雲南布政參議以告歸徐用檢舊浙江通志號魯源蘭溪人嘉靖壬戌進士授刑部主事調禮部儀制司疏請上親行郊祀又請太子及期出閣讀書出補山東臬副轉蘇松參政吳江災民喧擁軍門中丞欲繩以法用檢進曰人有急則呼天呼父母此嗷嗷者是也竟從寬釋丁內艱服闋補福建兵備升廣東按察使暹羅占城等國航海商粵衆且近萬用檢設法防之患遂弭遷河南布政嚴蠧耗以給宗室買學田以贍貧士升太常寺卿明儒學案用檢師事錢緒山然其為學不以良知而以志學謂君子以復性為學而性囿於質故無事不學又恐就其性之所近故無學不證諸孔氏蓋其時學者執心之精神謂之聖一語縱橫於氣質以為學故用檢云然王嘉忠金華府志號全吾東陽人萬厯丙子舉人署吳興教諭改澄海知縣浚山川築石梁民利賴焉俗例上元中元日男婦跨彩橋禮佛諸惡少艷歌謔浪嘉忠毁橋懲其首事者著為令以薦授評事出知興化取軍民利病榜陳之巨豪彭某以資橫鄉邑嘉忠廉得其實立斃於市尋備兵蒼梧凡有不便於民者悉為除去文網疏略而貪墨吏不少縱以忤上官歸張應槐舊浙江通志字汝植浦江人萬厯丙戌進士授饒州司李遷兵部主事歷官湖廣參政築堤防濬水道水故從楚宫出宫竇湮城中遂苦潦應槐首請之始諸薦紳繼及王宫王怒應槐趨見開諭再三王始悟得竣其功晉粵憲長正已率屬墨吏望風解綬後攝海道條防倭十策上之朝議重用竟以疾卒趙賢意金華府志字伯順東陽人萬厯乙未進士理刑邵武邵故稱劇郡宿案山積剖決如流平反不可勝計妖黨朝天王等勾結海寇為患賢意選壯士間行入賊中以計擒渠魁脅從者皆散益嚴保甲凡不事生業者懲之不少縱四境肅然升南車駕司轉工部營繕郎特論礦稅之害不報會諸興作一時並舉因上言積例宜破浮費宜節亦不報尋奉命典粵東試事竣時安綿利保等備兵缺土兵數亂或憚行朝議以屬賢意既至誅勾連為難者餘悉定以勞疾卒倪尚忠舊浙江通志字世卿浦江人萬厯戊戌進士授廣東順德令順稱下邑科第寂寥尚忠日進士子課藝文取資敏者拔之嗣即春秋二榜不絶人比之文翁云萬厯中設採珠厰閹使橫甚尚忠下令邑中見有珠厰勾役杖而禁之閹怒欲以疏劾衆懼禍不測尚忠歎曰吾令一邑不能為一邑驅豺虎吾罪較豎更甚力言制按得奏罷採遷吉安府同知以母老致仕歸樓一堂金華府志字叔字浦江人萬厯癸丑進士除工部主事出守瑞州上書御史臺議汰浮賦十之二民少安遷本省驛傳歷升廣東右布政攝海道篆盜李之奇數寇海為亂一堂招其黨鄭芝龍令殺之以自贖芝龍果縛之奇在廷僉多其功以積勞卒金肇元金華府志字司杓東陽人天啓壬戌進士授徽州司理多所平反歷升江右參議分守湖東置信建兩郡學田以贍士升副使分守嶺北倡築南安水城數里為居民障升福建布政司參政以父艱歸章自炳金華府志字美舍蘭溪人天啓乙丑進士授行人改兵部主事擢福建屯田參議請復鹽屯及清理鹽弊疏通積引晉按察副使時當劉香老殘破後四民廢業自炳與民休息廖監激變人情洶洶炳為曉諭立解散之旋分首從定罪境賴以安尋晉左參政禁貪墨嚴請謁飭保甲興士類除羡稅杜姦商尤以修練儲備遍戒屬邑未幾粵猺發難監軍兩廣運策制勝寇遂平以久滯瘴鄉成疾又值龍南妖人煽衆自炳深入搗其巢卒擒妖叛病增劇嘔血數升而卒國朝金漢鼎鄉賢留祀册字紫汾義烏人順治己丑進士任涇陽令時嵳峩山多嘯聚漢鼎勦撫並施不旬日而定鎮兵草米舊派里甲漢鼎詳請改折民便之峪口三白渠分注三原髙陵涇陽三邑斗門嵗久湮塞漢鼎設渠長按分注時刻立禁約勒碑垂遠歷兵科掌印給事中終養歸衢州府三國吳徐陵三國志注字元大太末人歷三縣長所在著稱遷零陵太守卒宋毛漸宋史本傳字正仲江山人第進士歷江東兩浙轉運副使浙部水溢詔睗緡錢二百萬以賑之漸言數州被害即捐二百萬倘仍歲如之將何以繼乃按錢氏有國時故事起長安堰至鹽官徹清水浦入於海開無錫蓮蓉河武進廟堂港常熟疏涇梅里入大江又開崑山七耳茜涇下張諸浦東北道吳江開大盈顧會柘河下金山小官浦以入海自是水不為患進直龍圖閣知渭州卒贈龍圖閣待制周彥質兩浙名賢録字文之江山人以進士歷官循州守治民以教化為本民以訟至庭者先諭以禮義然後折其是非無不涕泣悔罪而去蘇軾以默化名其堂官終發運使徐敷言兩浙名賢録字明可西安人元符二年進士為九域志編修官召對稱旨擢御史覆李孝夀所勘衛卒獄在廷稱其平除江東運判番陽民吳氏館客誘其子書不順字持以告并誣其藏甲朝命置獄敷言辨其妄吳賴以全召為吏部員外郎擢中書舍人在掖垣七年以龍圖閣待制出守越奏罷貢奉物移守婺有惠政召至國門卒毛友𢎞治衢州府志字達可西安人少遊太學與郡人馮熙載盧襄號三俊擢進士第崇寧間守鎮江方臘已殘睦歙監司猶不以實聞友奏言之朱勔怒其張皇友遂監觀其謝表曰兩郡生靈已罹非命一道使者猶謂無他陳瓘聞之以書譽於親舊曰蔽遮江淮阻遏賊勢斯人有助也汪隨𢎞治衢州府志字仲方西安人舉進士守黎州方宴有以夷獠將襲城告者一刻二至隨色不動曰吾恩彼必不有犯安知非獵乎尋果潰去曾孫待舉中上舍第歷守建昌興化栝蒼惟一篋藏衾服及代去無增益秦檜當軸凡赴闕奏事先納副封待舉已見始録上封公府即黜知復州卒江少虞𢎞治衢州府志字虞仲常山人政和八年進士調天台學官寇至守倅皆遁去少虞獨率弱卒堅守兩旬慷慨感激人有死志首射殺渠魁賊遂潰歷建饒吉三州守治狀皆第一柴瑾正德江山縣志字懷叔紹興八年進士倅番陽嵗飢羣不逞發民粟瑾請賑以常平米郡守難之瑾曰勢且急當從便宜願執其咎後攝州奏免買芻炭與丁礬錢纍官殿中侍御史舒清國兩浙名賢録字伯原西安人以上舍第甲科為秀州司士曹建炎初自館職轉對為上所知歷遷太常少卿時議鬻命婦封號清國謂若爾倡優妾媵皆得為命婦矣事遂寢權中書舍人以議論不合奉祠者六年起知道州政務寬大民徭便之秩滿請祠卒元孔濤黃溍孔濤墓志字世平先聖之裔南渡初徙衢州濤舉泰定元年進士授吳江判官嵗飢民多事剽掠濤設計捕致數十人謂此皆迫於凍餒而然不可以盜論杖而遣之州瀕太湖故築埭以禦水繕修無時病民特甚濤為改作使可支久鄰州飢憲府俾往賑之全活甚衆舉治績為諸州最調桂陽州判官天大旱濤探獄有寃出其無罪者三人乃兩廣寇竊發濤獨任軍旅供億民不擾而軍食無乏絶遷潮州路總管府知事歸卒明徐圭兩浙名賢録字良璧開化人以會試乙榜授唐縣教諭擢令羅源治為諸邑最升欽州守欽民以魚為業前此賦繁而魚徙圭反其政魚復還民建還魚亭以志之江玉龍遊縣志洪武初以儒士除鄢陵知縣時天下始定民多流亡玉招撫勸諭不逾年復業者五百餘户雙泊河溢造橋利涉盡心學校農桑士民德之楊添河南通志西安人永樂中知祥符縣政務繁劇添處置適宜上下稱便民有被劫殺傷一盜者羣盜移尸置他處去明日被劫者白於縣添蹤迹得尸置仁和門外誘人認瘞時一人識為王氏子遂拘王妻訊之果得羣盜姓名捕獲殆盡嚴祿獻徵録字伯宜開化人永樂初用薦授閩縣知縣閩賦舊倍他邑民不堪祿力言於府平其賦民賴之改知黟縣愛民如閩尤篤意興學卒於官徐夀西安縣志字彥清永樂丁酉舉人令吳江有政聲寬嚴並濟捐俸造橋民名徐公橋何永芳兩浙名賢録字廷蘭常山人永樂辛丑進士授邵陽縣知縣持身廉謹勤於撫字期年大治召拜監察御史出按山東暨直隸蘇松常鎮所至明憲紀以糾姦慝貪墨望風解綬時倭寇東南邊海諸邑日受焚掠永芳嚴為之備倭不敢犯朝廷降璽書褒諭復按江西風裁益厲豪右為之斂迹少保于謙察其才薦升河南按察使施設適宜民懷其惠尋致仕宋玘衢州府志字玉成開化人永樂中以貢為刑部主事治獄詳明出為雲南澄江府通判有土官爭襲賂以白金三百玘却之民有訟水利者久不直玘為釐正秩滿告歸與侍郎吾紳建通濟橋於縣東楊儀西安縣志字彥禮添之子登正統舉人知鄧州民有爭訟者必諄諄勸諭使相感悔不得己然後用刑在任未久卒鄭佑常山縣志字孔佐景泰辛未進士擢廣東道御史臨川郡王父子搆怨命佑察之為調處其事曲盡情法歷升福建按察副使汀州民聚為盜佑單騎直入其巢諭以禍福賊即解散頃之復叛佑設計擒滅威惠大行以考績過家得疾卒虞鐘𢎞治開化縣志天順丁丑進士授刑部主事歷升吉安知府處己儉約居官勤慎本府舊徵引錢無藝鐘下車初即革去三分之二著為定例許坦衢州府志號恆齊開化人成化丁未進士知甌寧縣有惠政升工部主事管理山東河道疏導有方改刑部員外升廣東兵備劉瑾用事求賂不聽移疾歸謹按舊浙江通志坦作旺未詳孰是周洪衢州府志字大猷西安人𢎞治庚戌進士知易州易俗剽悍洪以文學化之招撫逋亡存恤鄰附增户口三千有餘升南工部主事轉刑部郎讞獄明慎有州官為怨家所誣者寃滯積年洪訊出之出知安慶府平反枉抑掩捕寇盜以廉能著尋卒於官陸郁傳詳介節方豪衢州府志字思道開化人正德戊辰進士知崑山縣有異政民有積逋特疏奏免升刑部主事諫武宗南巡廷杖幾死世宗即位命審録山東咸稱平恕升湖廣僉事進副使以終養歸祝品萬厯龍遊縣志字公叔以進士授刑部主事是時武宗久不視朝日逰幸西范信任權貴朝士箝口品與同官應大猷上疏直諫上怒逮獄尋貸之直聲大振升廣東提學副使復調巡視海道茂名古兜兩山賊嘯聚官兵莫能誰何品為宣諭德威咸相率效順晉左參政乞歸陸佐萬厯龍遊縣志字子翼嘉靖丁未進士選桐城知縣縣當兩都衝途供億甚苦佐求民利弊力為興除籍豪強侵蝕之湖課得千餘緡以蘇郵困而餘以給窶士嵗為額歷官潮州知府念郡城久圮浚濠修堞已而流兵突劫藉以安堵民甚德之毛汝麒衢州府志字伯祥龍遊人嘉靖庚戌進士知番禺縣遷廣平通判署五邑篆全活飢民萬計升贑州府同知賊酋章璉作亂汝麒練兵討平以功加四品俸升西江兵備道尋告歸謹按舊浙江通志汝麒作洪麟嘉靖丁未進士未詳孰是龔世仰龍遊縣志字惟仁嘉靖戊午舉人任望江令地饒魚鹽蓄植嵗有稅額前令多取贏以十之五奉當道世仰以為剝民亟裁罷之再徙輝令輝有五閘灌溉田畝中貴人欲擅以為利世仰力持不可事遂寢尋左遷歸余邦輔龍遊縣志號松野嘉靖辛酉舉人授膠州知州改鄭州州臨大道使車輻輳邦輔加意撙節以蘇民困又城東賈魯河嵗潰決為民害邦輔築堤捍禦以忤權要去官徐一檟獻徴録字汝材西安人隆慶戊辰進士知寧國縣初至却供帳罷里甲斥骫法胥吏數十人縣以大治調劇丹徒築長堤以捍江縣有官民田二則官田糧重差輕民田糧輕差重一檟減官糧於民推民力於官又山鄉瘠壤沙鄉沃壤請以山鄉二畝抵沙鄉一畝民甚便之擢吏部稽勳司主事歷文選司郎中守法不阿有援親故求善地者一切無所假升右通政告歸卒徐日久衢州府志字子卿西安人萬歷庚戌進士知江夏縣舊時漕軍兑糧百姓病之日久令民輸糧於倉而軍從縣官兑又築三堤於江口擢工部屯田主事改兵部職方奉命行邉邉將馬世龍喪師失律而行金錢於魏忠賢為之地日久曰世龍不去則法令不行上疏論世龍忤璫削籍歸里崇禎初起為福建巡海道撫鄭芝龍斬李之奇沈鍾斌於海福建遂安升山東按察使便道歸卒於家許堪萬厯龍遊縣志字文可以貢入國學拜監察御史彈劾無所憚有指揮以外戚怗勢堪按其罪出知開封府治行卓然時人以包孝肅比之鄭學陸西安縣志字景宣萬厯壬子舉人授大冶令大冶多盜俗獷悍難治學陸以清白自矢不吐不茹羣情讋服政聲大著無何武昌巨寇揭竿起勢張甚撫軍稔知其有方略以兵事付之學陸率官兵練鄉勇出奇撲剿前後擒斬無算積勞成病卒余國賓衢州府志字叔賢西安人萬厯甲戌進士為刑部主事再升郎中有緹騎攜妾别居夜遭盜殺者妻誣妾為刃主國賓寃之尚書不聽令他主事成獄妾遂死盜尋自首衆稱國賓仁明出知濟南府簿案填委剖決如流升易州兵備道嵗侵築室以居流移衆名之為余村轉江西按察使升右布政使告歸郁有年衢州府志字國瑞西安人萬厯丁丑進士為工部營繕司郎中疏請緩夀宫興作併請停功德寺行宫先是嘉靖中修慈寧宫度支四十八萬及有年營費才十有五萬建潞府計資六十萬有年條上事宜減省大半為上所知轉太僕寺少卿歸余懋中衢州府志字德懋西安人萬厯庚辰進士為淮安府推官開永濟河擒巨盜有功拜御史巡視海道朱均旺報倭入犯巡撫以為妄將戮之懋中請釋其罪嚴加防禦倭後北犯朝鮮而福建晏然以懋中為之備也尋轉福建參議平海浯遊兵再定民變政績為一時稱首王家業西安縣志字子立萬厯舉人治均州大著異聲嘗詣武當道遇逰僧數十人中有稚僧顰蹙隨命拘留衆僧而鞫之乃女隨父宦被僧劫殺而留之為僧者也審實盡戮羣盜人稱神明詹思虞衢州府志字如甫常山人萬厯庚辰進士為刑部主事歷升松江知府嵗荒民糴米以輸倉每石價值三兩思虞請改半折色省民間銀數十萬又以糧長解户為收户縣不并封府不覆兑民咸便之有金璉者將嘯聚為盜思虞以計散之又擒劇盜三人升山東按察副使再升山西參政分衛軍為五班五年輪代霍絳二州有大姓橫恣府縣莫能制思虞治之仕至山東按察使徐任道龍遊縣志字仁卿萬厯丙戌進士為河南固始令罷民間稅七百餘緡濬均濟河延袤百里民稱永賴召為御史卒徐日曦衢州府志字瞻明西安人天啓壬戌進士授廬州府推官嵗比不登妖賊煽亂舒巢間日曦單車往諭賊皆解散以不附魏忠賢削籍歸崇禎間起松江府推官治獄多平反視餉海上咄嗟辦漕粟五萬三吳翕然稱異績後卒於官國朝方元啓衢州府志開化人順治辛丑進士任直隸南樂令治尚清簡先是民多賠纍荒賦逃亡者衆元啓至會編審因豁免逃亡丁銀六百九十餘兩多方招徠給以牛種農具蒿萊盡闢增户口萬六千有奇嵗荒設厰施粥復建義倉捐穀千石推陳易新以經久遠尋擢户部主事康熙戊午典試河南卒於鎖院徐開錫鄉賢留祀册常山人由貢生知直隸深澤縣補任河南杞縣俱有政聲遷彰德府同知濬治水利蓄泄得宜築髙平渠引洹水灌田七十餘里家居助修學宫於橋梁道路不時傾資修造楊廷琚開化縣志字帶璜康熙丙戌進士授蘆山令以一子一僕自隨至則興學校課農桑邑遭明季兵燹册籍無存豪強飛灑藉以為姦廷琚悉心清釐賦役由是得平時大兵由安雅進平西藏羽檄交馳夫馬芻糧無不應時立辦上官廉其才凡安營設站往來巡警一以委之雖勞瘁致疾未嘗少懈乞休歸士民勒碑曰真去思嚴州府唐李頻唐書本傳字德新夀昌人大中八年擢進士第再遷武功令時畿民多籍神策軍吏以其橫不敢繩以法頻至有神策士尚君慶逋賦六年不送悍然出入閭里頻密擲比伍與競君慶叩縣庭質頻即械送獄盡條宿惡請於尹殺之督所負不少貸豪猾大驚屏息奉法縣大治有六門堰者廞廢百五十年方嵗飢頻發官庸民浚渠按故道厮水灌田榖以大稔懿宗嘉之賜緋衣金魚遷建州刺史既至以禮法治下更布條教時盜興相椎敓而建賴頻以安卒官喪歸父老相與扶柩葬永樂州為立廟黎山嵗祀之宋鄭榮嚴陵志字光逺夀昌人天禧三年進士天聖初奉使契丹嚴毅威重契丹深敬重之使回真宗曰使於四方不辱君命今見其人矣授崇寧令父憂服闋起知衢之西安廉能才幹深得民心既而卒於任民護送其喪立去思亭於境上鄭彥嚴陵志字季英夀昌人元祐中進士擢崇陽尉再任青田丞秩滿除真州司户居官以誠愛為本所至勸農勉學因民之所利以豫之力不煩而功倍民樂其化召授國子監丞卒洪彥華嚴陵志字叔炳淳安人淳熙十一年進士涖官治民專務德化其宰茶陵值歉嵗悉心撫字民無流亡及宰上饒亦如茶陵時真德秀嘗薦之纍官至朝請大夫洪琰嚴陵志字叔毅淳安人與弟璞同登紹熙元年進士琰主南陵簿攝縣事嵗旱官履畝不以實飢民嘯聚琰從容麾散尋遷盱眙司法青平山盜起琰致渠魁斬之盜即潰散改清江決獄如神人咸服之胡朝穎兩浙名賢録字達卿淳安人乾道八年進士厯武昌令通判嘉興時宰相鄭清之家奴暴橫朝穎執置諸法移書謝云以天子之命官撻宰相之奴僕罪當避位清之得書以聞帝喜曰得一佳士矣除守嶽州兼湖北提刑嚴陵志朝穎嘗以道學不明詞章隘陋慨然自信其獨見而躬行之諸生及門者皆超然拔於流俗之表著有靜軒集鄭穎新定續志字茂叔郡人嘉定十五年進士宦轍所至輒以最聞守嘉禾以理卿召為言者所沮且逮吏稽在任出納擲其疵無所得嘆服之後其子璹為大理評事會時相以意嫉邉守下之獄必欲死之穎謂璹曰殺人以茍容如天理何璹奉法如穎教竟以忤歸穎笑曰是足為吾子矣自嘉禾歸竟不復仕鄭琚嚴陵志字伯潤夀昌人淳祐間進士授登仕郎景定中為金華尉涖事詳審以能稱咸淳十年遷安吉州司理參軍推情治獄人無寃濫以疾辭歸創義倉建永平橋鄉人德之徐瑑建德縣志字文之紹定三年通判袁州嵗當大歉瑑發廩賑恤貧者給鏹病者給藥殁者給槥收養嬰孩至踰百民深德之時版曹以宜春産絹委市絹萬匹瑑力控免尋擢守建昌邦人咸惜其去孫潼發黃溍孫潼發墓表字帝錫桐廬人咸淳四年進士調衢州軍事判官有廉能聲家鉉翁詳刑江左雅知潼發所至輒挽以自隨獄事悉委焉屬部民有縱火殺人者株連坐繫甚衆嵗久不決潼發探得其情多所平反衢俗好鬭少不相能則弄兵以相讎殺潼發被郡檄遍行村落戒諭之皆委刀劒為良民秩滿除御前軍器所幹辦公事宋亡避地久之乃歸程巨夫求遺逸得潼發以應詔固舉不起元王文彪王褘王文彪行略字君采建德人泰定丁卯授溫州路瑞安州判官役法久弊文彪為第其貧富均賦之民大稱便大府因諉之賦平陽役不閲月而畢杭之鹽官海岸崩行省檄諸州遣官修治文彪被檄董其役不踰期而事集宰臣察其廉能辟行省掾史厯除天臨路湘鄉州知州湘鄉界在大湖之表而鄰於溪洞其民獷悍素號難治文彪至一以禮義化之作為條教約民共守三年信義既明威惠並著凶頑之徒更相教戒習為善良治行於湖南諸郡最以年七十致事歸民庶攀留填塞道路號泣而别汪汝懋戴良汪汝懋墓志字以敬淳安人以薦授青陽縣教諭會壬辰兵起僉憲哈喇呼舉充浙東帥府令史未幾授定海縣尹居官一以樂易為務於刑寧失有罪不肯法外傷人於賦斂度民所當輸乃與為期會未嘗取疾爭先其在浙東釋溫慶之民被誣為盜者數千百人在定海益以禮讓化其民有古君子之遺風明洪子祥畿輔通志嚴州人洪武初任真定縣時條教方新子祥調緩急布恩威撫良鋤橫務招輯安養起凋殘而還之康阜民愛戴之王文孜遂安縣志字叔勤洪武三十二年任會昌知縣廉惠愛民其父愚叟嘗遺書戒之云若濫贓私生不令人顧患難沒不容入家廟文孜益自勵門無私謁公無滯事勸課農桑民致殷富徐誼獻徵録字宜叔夀昌人明初授黃岡知縣敦教化厚風俗鞭撲不施而租賦時入尋遇譴歸洪武甲子郡邑以明經交薦授鎮江知府胥吏畏服帝每宣諭天下有司云爾等只效鎮江徐知府清廉幹辦豈不美哉考滿改授吉安府時屬邑龍泉凋敝秋糧數年不足民有貧者賣妻鬻子而不能輸誼出俸五百貫代償之後疾卒吉安人皆路祭巷哭送其歸柩者萬餘人孫瓊嚴陵志字萬芳建德人建文時由太學生授景陵知縣持身廉介綽有能聲永樂三年蘇松洪水壞民田廬命吏部選天下賢能令督理凡十有八人瓊與焉修築墟岸疏決壅滯咸底成績事竣以老疾乞致仕何昭善豫章書字憲章淳安人洪武間舉孝廉丞豐城縣營公廨興學舍治橋梁築堤塘經畫最多余思寬萬厯嚴州府志字仲容遂安人永樂乙未進士授監察御史出按江西除姦剔蠧克振風紀時永藩暴虐初肆思寬預燭其微疏其跋扈之漸事下法司得實朝論壯之仕至廣東按察副使章增嚴陵志遂安人宣德間由太學生授永清知縣值纍嵗歉設法賑濟民感其惠邑有鐵河久塞水利不通增為浚之自是田闢而嵗登民歌之曰鐵河穿田有年未幾改知華亭永民數千人狀其政績乞留弗獲宰華亭六年以疾卒洪景德夀昌縣志號艾溪正統甲子舉人授南昌府通判改松江惠政甚多常濬吳淞江新涇二萬二千丈鑿曹家河三萬餘丈華涇塘六磊塘等素湮塞者悉浚復之天順中擢荆州府同知致仕余復獻徵録字存美遂安人正統戊辰進士拜南監察御史景泰中升江西按察司僉事分巡嶺北時巡撫韓雍患江西賦役厲民創法欲均之顧憲臣中獨復能辦此乃專委焉復盡心所事徭役遂平民大霑惠分巡湖西所部吉安等三郡勢家豪族健訟成風復威以戢之誠以導之請謁不行剖決如流於是翕然稱頌升副使長河洞賊朱紹綱叛郡縣繹騷復躬往贑督兵討之生擒七十餘人賊平薦升福建參政母喪服闋復江西按察使操履潔白始終一致陳醇福建通志桐廬人景泰中知夀寧縣時邑新設庶務草創醇條理井井山谷椎魯之民始就教化栁勝華建德縣志字景芳景泰中授澧州知州時藩邸初封軍校橫甚勝華一繩以法州在荆嶽常武之間軍民土田疆界錯雜勝華皆履畝清核尤加意教化作興士類在任九年治行為諸郡最洪弼湖廣通志字士直嚴州人景泰進士授監察御史擢湖廣按察僉事適常德辰沅飢都御史白圭檄弼賑濟募民分粟仍給牛種多所全活靖州猺叛弼設畫經略擒其首惡餘黨悉平賜白金文綺萬厯嚴州府志成化六年升福建按察使尋升貴州左布政使弼以陳蕃宣撫司與長官司行事齟齬不便奏請添設府治於是土官始有所鉗束致仕卒於家方中萬厯嚴州府志字大本淳安人天順丁丑進士授玉山知縣政修務舉改南宫縣徴拜監察御史巡視淮揚河道奏請浚治江浦一帶淤河築雷公諸塘又命有司修築河岸二十三萬三千五百餘丈成化十二年巡按湖廣時苖民犯順中與總兵官督軍平之歷升貴州按察副使致仕子天雨字濟甫𢎞治壬戌進士授工部主事升郎中時額外工作大興天雨屢奏止之擢貴州左參議徐鑑萬厯嚴州府志字克明淳安人天順庚辰進士授南户科給事中多所建白擢江西左參譏發姧擲伏豪右斂手規畫條約民甚便之改廣東時潮州海寇為患鑑以計擒其首惡餘黨悉平尋以疾致仕林鴻兩浙名賢録字時敘建德人成化間由太學生授甌寧知縣補連江邑民邊海不知藝麥鴻教以播種之法始獲其利方謙兩浙名賢録字克和建德人成化中由太學生授霑化知縣先是連年水旱逃亡者衆謙在任六年撫字有方民多復業時有一粟雙穗一蒂雙瓜之祥何紹正淳安縣志字繼宗𢎞治壬戌進士授行人升吏科給事中以事忤逆瑾謫判海州歷升池州知府郡城久廢紹正預申當道興築甫成而寧邸之變作兵抵安慶紹正合僚佐誓以死守列幟燃炬鳴金鼓日夜不絶者五旬賊終不敢犯事聞加俸一級尋擢江西參政致仕余鋟遂安縣志字文甫正德辛巳進士授浦城知縣調繁閩縣兩邑立祠祀焉升南刑部主事歷武選司郎中以錦衣員冗疏軍政八事請裁不當襲者遂為千户陳紀所誣下刑部獄久之上知其忠罪諸誣者由是為時貴所忘出為廣東參議升山東副使董築南旺湖有功運道進階一級歷山西左布政使卒徐楚徐應簧淳安縣志楚字世望嘉靖戊戌進士授工部主事轉郎中湖貴苗民逆命上命重臣征討開府辰沅而除楚辰守諸鎮兵合十餘萬調集辰州時尅期進兵而餉未集楚議將南糧嵗十餘萬留之以金錢代輸督府用其計師遂濟歷升雲南屯田副使興水利闢荒蕪正經界追奪沐氏侵地還之民間遷四川參政入境即擒巨盜范元兒等十餘人盜皆屏迹會攝藩篆例進扇諸要路皆有餽儀楚削其儀以扇往諸要人銜之因免歸年九十一卒子應簧字軒卿萬厯己丑進士授大理評事歷虞衡司郎中督理三殿大工裁減內官濫耗八萬餘兩升武昌守時稅璫暴虐商民致激變璫欲羅織無辜誣指劫稅應簧執法不阿遂與中官意左資滿勿遷七載始升本省副使轉布政司參政謝政歸徐廷綬淳安縣志字受之為諸生時海瑞令淳安深器重之登嘉靖壬戌進士授刑部主事歷升郎中時瑞以直諫下獄病劇廷綬親調湯藥瑞得不死每斷獄必輾轉求其可生者釋之會馮璫主東厰勢熾甚以盜誣抵十餘人置之獄下部核審廷綬為開釋無辜者八人同事者咸以為不可廷綬曰某所執者祖宗之法且殺人以媚人如天理何遂詳定律注擢守辰州廣學址捍水患賑飢民訊鞫明決吏不敢欺升陜西按察司副使致仕李臺夀昌縣志字國佐嘉靖壬戌進士授漢陽司李斷獄詳晰攝府篆郡藩橫征稅額民甚苦之臺力為申請遂減額過半召拜工科給事中遷陜西副使至則首詢民隱以汝堰廢壞關繫全省即親詣堰所相度地形親督畚鍤不期年而功成余炶遂安縣志號羲河萬厯丙戌進士任潮州府推官南澳帥以獲倭請功炶鞫三十人皆海濱漁者悉遣之調延平府除坊役擒劇盜賴萬貫等入為大理評事多所平反出守南康歷升江西參政募兵給屯革饒南諸郡糧弊築九江壩葺都昌城復安義堰所至皆以實政名童時明廣西通志字醒余淳安人萬厯四十年知永淳縣興學校巡阡陌勸民耕種諸凡不便於民者一一籌度而詳革之方學龍淳安縣志字叔允萬厯己丑進士為廣東順德令興學校平賦役簡辭訟嚴防禦時海寇猖甚學龍出奇計殲厥渠魁海氛克靖擢南刑部郎中有獄囚萌不軌潛結姧徒以包子十五為約適獄卒竊其二誤於十三夕先發囚皆利斧斬門大譟時漏下二鼓學龍立召巡兵持挺格之悉伏辜升福州知府移守漳郡多惠政去後民立祠祀之方尚恂吳農祥方尚恂傳字威侯淳安人萬厯癸丑進士授刑部主事歷員外郎中出知建寧府郡當潘樞吳建之亂餘黨未靖撫按司所下駁招滯案幾山積尚恂抵境嚴鎖鑰戢胥役均戍守減徭賦因取駁招滯案一日決之老吏吐舌駔黠之徒聞風逃去升湖廣副使備兵辰陽辰與永順保順二宣慰司鄰二司兵強又生熟苗出沒鎮筸箐洞剽掠無虛日而辰城頽圮尚恂計丈尺增雄之衛以鐵菱石弩嚴督營哨不踰月擒斬苗魁數人遂懾伏不敢動天啓四年黔撫王三善為降賊陳其愚紿入伏中自刺死黔事急司餉無專官黔督會餉院題尚恂分守兼督餉遂移鎮沅州沅州運道斗入萬山中欹仄如削率三十鍾而致一石尚恂檄使人負四斗行十五里更番往來米相屬如綆縻而人不頓又躬護帑金二十萬至師諸營以次頒給歡聲雷動崇禎十年水西平題敘黔功詔特賜銀幣國朝方象璜鄉賢留祀册遂安人舉進士初為湖南理刑宜都公安有盜案縣捕向懷林等十八人置之獄象璜疑其枉駁勘再四後果獲真盜乃皆得釋改令合肥下車宿包孝肅祠矢以詩云誓將黽勉清節是砥倘不恤民有如此水隨除火耗革積弊代民償漕米七百餘石民德之遂安縣志象璜宦歸家徒四壁以撰述自娛薦博學宏辭以後期未及與試吳宏公舉事實字芬月淳安人康熙癸卯舉人授四川鹽亭知縣邑自明季兵燹之後地多汚萊宏力為招墾地利漸復學宫久圮捐俸倡修振興文教山西民王懷秀之父買牛入川為盜所殺三年不決逮繫多人宏默禱於神神告以尸所立白之牽連者得釋升河南汝州知州清操益勵會嵗飢力請於上官發倉賑給復捐俸設粥以濟之民賴以蘇以病歸卒年六十九蔣鳴龍山西名宦册建德人康熙八年由拔貢知汾西縣汾西土壤髙燥田每苦旱鳴龍相度汾濱濬棗平舊渠又築一堤於加樓村濬三渠於福珠衛家灘後團柏村由是田不苦旱驛舍毁於闖寇芻牧皆出里甲鳴龍謂驛傳自有正額革民間養馬費重建馬厰民德之徐士訥鄉賢留祀册字恂若淳安人康熙丙辰進士授河南嵩縣令縣輸守例有季規士訥謁守首陳此不宜派除正供外凡沿為規例牢不可破者一切革之時單騎課農墾闢者勞之巵酒茀草不治者罰跪其側耕者競勸興伊川書院修邵康節祠更設義館時時與生徒講學興起者甚衆三年化行訟息嵩民戴之如父母湯斌嘗稱之曰冰清玉潔實心愛民第一廉吏也旋以治行最擢山東濟寧守值嵗飢捐俸賑恤所活十萬餘人他如定市價嚴朝飲懲梟博逐流娼善政畢舉濟之南有牛頭河上泄南旺諸水下經魚臺注下八閘自黃河決諸閘淤濟南南鄉窪地時被水患士訥具詳總河鳩工趨事所開已十之七瘁甚卒吳貫嚴州府志淳安人康熙壬戌進士授武昌府通城縣令廉潔愛民以卓異擢陜西乾州知州時歲大旱民逃土荒貫至任即減騶從親詣諸村落招徠勸墾數年之間流民復業荒地盡闢民安其政訟簡刑清案無留牘歷官户部郎中溫州府宋蕭振宋史本傳字德起平陽人政和八年進士調信州儀曹時州郡奉神霄宫務侈靡振不欲費財勞民與守議不合會方臘寇東南距信尤近守欲危振檄振攝貴溪弋陽二邑既而王師至衢又檄督軍餉振治辦無闕諸邑盜未息守復檄振如初振悉意區處賊多降者調婺州兵曹後知成都府一以寬為治或問其故曰承縱弛革之當嚴今繼苛刻非寬則民力瘁矣帝嘉振治行謂宰臣曰四川善政前有胡世將今有蕭振加秩四等林叔豹兩浙名賢録字懿文永嘉人建炎初為慈溪令廉明徑直髙宗南巡敕戒衛士母肆苛擾以撓賢令時聞金人將至境有武悍之徒百十為羣乘勢抄劫叔豹廉其狀捕而斬之於是逺近知畏絶剽掠之患金師破明州立蔣安義為守金師退叔豹率鄉兵入城杖死安義一郡獲安髙宗駐蹕臨安知其才召拜監察御史以風力稱蔣行簡萬厯溫州府志字仲可永嘉人登紹興第通判興國軍值大旱疫作從一馬二卒齎藥療民全活甚衆歷沅辰澧靖四州安撫諸司舉異績召對清暉殿不果用而卒劉銓兩浙名賢録字全之樂清人舉進士知海鹽縣時大水害稼銓被檄檢傷放秋苗數萬斛勸富人發廩賑濟民無耕資者貸於郡給之政務慈和飭以儒術稱循吏云劉鎮萬厯溫州府志字可叔樂清人與兄銓相繼登紹興第任隆興府司法有重囚九人獄已具鎮察其寃再行訊鞫果得其情告於郡悉免之移武義丞築溪塘數百文改知長溪縣政績尤著民立祠祀之陳謙傳詳武功王柟兩浙名賢録字木叔永嘉人登乾道進士第調婺州推官漕司增本州上供米三萬斛守以下不敢爭柟獨移書新守言其不可守以聞遂免知績溪縣邑斂重民貧鑿山壘畝乾瘠大半柟積錢買田為塘六十八堨六浚舊陂百頃而嵗以稔知江陰軍開蔡涇渠港五百里漕挽流通知贑州先禮教而後刑罰犯法日稀尋奉祠歸里張秀樗葉適張秀樗行略字延卿永嘉人忠簡公闡之子幼入太學用父恩試吏部第一監臨安府糧料院遷司農寺丞選知潮州潮俗矜厲自喜秀樗倣古以便今崇雅黜陋士民愛服歷知濠州諜報金主祈太清宫且窺邉州人大恐秀樗不為動但遣承局趣取子舍遠近安之改知和州首開三河復胡昉故迹剗車蒺藜火藥傅鏃廢關遺隘之要無不預講尋致仕彭仲剛兩浙名賢録字子復平陽人登乾道進士第主金華簿衢州大水監司命仲剛覆視而後賑仲剛曰覆而後賑防吏之欺將使民實得食也恐待覆而民不食死矣監司感悟即出米恣所為賑之民賴以生移臨海令遷知全州減浮費寬商稅擇學師教其子弟而親執經講説官至浙東提舉常平林頤叔葉適林頤叔墓志字正仲瑞安人登進士為羅源主簿民俗親死焚尸糜其骨凌風飄揚命曰升天頤叔刻文禁止治冢甓藏之始變其俗有以刃挺誣人至大辟頤叔視之溺死也移玉山丞玉虹橋在市心壞久計費數百萬徒輿束手頤叔自與錢勸成之辟監建康戶部贍軍庫陳求魯萬厯溫州府志字質甫樂清人登嘉定第倅臨安府監左藏庫出知南劍州時劍民遭亂殘破求魯為奏蠲租稅仍出私帑以賑召為司封郎真德秀薦之升左正言積階朝散大夫吳舜龍兩浙名賢録字君友永嘉人登紹定第知於潛縣以清約裕凋瘵邑人德之擢監察御史出為浙西提刑奉命慮囚按歷所至舉無寃枉以大理卿召尋奉祠歸項公悅兩浙名賢録字無欲永嘉人調閩縣簿改無為軍司理讞閲忘寢食圜土為空改秩知侯官庭無撲聲會嵗旱禱雨瑞澤潭潭在萬山頂公悅披棘徒行烈日中數十里下山驟雨隨注而公悅病暍卒薛直夫廣東通志字遇叟永嘉人嘉熙元年知雷州修渠建橋振舉廢墜始雷俗不知醫藥病則專事巫禱直夫創立惠民藥局教以醫療去之日民立生祠祀之陳淳祖兩浙名賢録字道初瑞安人登嘉熙第知錢塘以治最聞除提轄𣙜貨務上萬言書論時事忤宰相出判徽州以選知南康軍撫治有功除祕書郎遷著作郎浙西水以倉節兼知安吉州賑恤有方列城按堵召為吏部郎遷司農少卿時相賈似道每自擬周公淳祖譏之似道怒免其官木天駿兩浙名賢録字德逺瑞安人登嘉熙第知閩縣有政聲後守建昌郡人包恢居政府族子倚勢漁獵小民天駿入境即逮至黥竄之許鑒福建通志溫州人淳祐間知古田有風力抑強扶弱人畏憚之陳均萬厯溫州府志字子公平陽人舉進士歷知東陽麗水西安縣所至有聲除大理丞出為廣東提刑猺寇犯邉漕帥邀功縱殺囚數十平民於獄均審竅盡釋之帥不悅媒孽於臺罷去久之起知贛州咸淳初除檢正賈似道以平章奉母居西湖欲以堂印自隨均爭曰堂印無出城理坐是免官後以祕閣修撰致仕趙與霆趙與琇舊浙江通志與霆字震道永嘉人與弟與琇同登淳祐第知鄞縣究心撫恤數以公事與制閫爭無所降屈與琇字器道為建寧府司理推鞫多所平反時馬光祖以閫兼守號一代吏師獨以與琇為能元陳麟戴良陳麟傳字文昭其先自福清徙溫遂占籍焉至正甲午以易經貢春官廷試置乙科授慈溪縣尹吏每竊弄威柄弊難遽革麟至求士大夫之賢者即其家問事父老來見亦時時語次尋繹鈎其隱伏以相參考倣古為銗筒虛中而穴其上置諸鄉校令民有所言投書其中而削其主名由是縣大小事無不周知吏以麟盡得其受取請賕狀噤不敢出一語惟抱文書呈署而已縣嵗貢春茶有司並緣為姧利麟計其常額以平價市之比舊十減九後遂以為法縣之鳴鶴鄉有界塘在餘姚界霖雨至鄞江之水輒衝潰塘塘潰而鳴鶴沼矣麟乃去塘五尺許揵木籠竹加土築之甃以石使民嵗無水患淮寇陷湖州所在驛騷有旨令郡縣團結義兵麟親閲丁壯教之擊刺坐作日夜部勒無不精練瀕江南岸曰網灘惡少年嘯聚為盜則督士卒奮擊磔尸江上鄞縣之夾塘有劇賊時出為害潛引壯士盡縛之斬以徇自是遠近無犯法者尋改溫州路瑞安知州以疾辭歸明周丹憲章類編永嘉人洪武初進士授新化縣丞在官以廉勤稱驗民貧富及丁稅多寡第為上中下籍記之遇有賦役隨輕重使之民不擾而事集獄訟文牘皆躬自督理吏胥不得為姧罷諸役作民晏然安業流民歸者益衆滿考課最升考功主事既而縣民蕭俊等詣闕言自本官去􅕄縣政復擾乞令再任帝命復為縣丞仍令禮部宴賞而遣之楊景衡萬厯溫州府志瑞安人永樂舉人任兵部主事遷吏部郎中出為福建左參政亷介自持政平不擾帝將北征用輔臣薦命總督糧餉既班師令復任臨軒慰諭之曰聞閩人之望若如渴也宜急往後以老乞致仕韓偉萬厯溫州府志字英仲瑞安人永樂中由太學生擢監察御史巡按河南鎮靜有體遷河東運使清操甚著創立學宫擢其屬户之秀者教之遂相率登第以母老乞休不允卒於任蔡光親福建通志樂清人洪熙初知福清以廉能稱時內臣奉命採辦率凌逼屬邑供億無算獨福清民無所擾云葉錫萬厯溫州府志字元圭永嘉人宣德庚戌進士選入翰林正統初出知吳江縣再任吳縣専尚德化入朝以治行卓越賜宴內庭加命服擢寧國知府葉衡平陽縣志字延衡景泰間授濬縣知縣持操潔白人呼葉青天濬鄰彰德其守將不戢士恣為暴衡奏譴其指揮三人百户十人自是民得安息後以老歸吳祚萬厯溫州府志字士德瑞安人景泰舉人授常州府判嵗大侵為民請命得蠲稅糧之半仍發粟萬石賑之兼理刑多所平反民有以謀害坐大辟者訊其誣即為昭雪尋乞歸蔣愷萬厯溫州府志字舜相樂清人由選貢入太學授霸州知州霸內畿外邊俗獰而民貧愷以廉平治之崇學校理寃獄通水利均賦役政聲大著秩滿霸民乞留歷三考俱最以憂去侯爵萬厯溫州府志字欽爵樂清人自諸生升國學成化中除惠州興寧知縣甫下車即為條教務農勸學讞囚出數百人訟至立決民大畏服以疾乞休百姓泣留都御史咸加慰諭復強起視事卒於官陳宣傳詳介節朱諫萬厯溫州府志字君佐樂清人𢎞治丙辰進士歷歙豐城二縣令升吉安郡守吉有豪民附宸濠橫境中諫逮繫之論如法又預策宸濠有變日儲餉募兵浚湟增陴人莫測其意去郡後二載而濠果叛王守仁由吉安起兵竟得其力童器萬厯溫州府志字大用平陽人𢎞治己未進士授工部主事分理臨清厰移督漕河時劉瑾用事中貴藉勢橫行見器特斂戢知鎮遠府民獠雜處恩威並行有星子者煽亂計擒之郡賴以安後與監司有隙罷歸朱文簡萬厯溫州府志字元可樂清人徙永嘉𢎞治舉人教諭晉江遷增城令革常例金千餘兩讞獄多所平反時有洞寇侵暴文簡屢戰勝之殲其巨魁餘黨悉平曾顯泰順縣志字文煥由嵗貢生歷知永定縣居官廉謹專務牧養時永定賊首朱四偏據一方久征不服顯單騎入巢穴諭以大義遂降改令陽山政善民懷九載考最以母老終養侯廷訓舊浙江通志字孟學樂清人正德辛巳進士除南禮部主事著大禮辨數千言逮繫下獄謫泗州判官遷漳南兵備僉事建社倉平劇盜蠲虛糧革羡餘尋以疑獄與御史爭被劾罷歸趙廷松溫州府志字子後樂清人嘉靖癸未進士為刑曹郎時大禮議起廷松偕同列伏闕力爭被杖謫福寧州同知己又補靳州所在有惠政不以謫吏弛職業積遷至山西布政使王叔杲永嘉縣志字陽德嘉靖壬戌進士令靖江調常熟入為兵部員外出守大名諸屬邑文風不振為建書院延師儒課之才賢奮起擢松江兵備諸所經畫水利海防足垂永賴尋晉參政歸葉世德永嘉縣志字有懷樂清人徙永嘉嘉靖舉人授廣昌令益藩新置王莊民稱不便徑申文止之新學校創義倉與民興利擢漳州同知職海防兼番舶稅力革夙弊一切餽遺謝却之遷楚藩長史致仕孫昭溫州府志字明德永嘉人嘉靖甲辰進士令永豐補魏縣削弊懲姧政稱異等擢雲南道御史巡茶陜西更定茶馬法至今便之王良心永嘉縣志字性德隆慶辛未進士授增城令邑地僻民貧多剽掠良心至賑民養士修學築城邑以大治尋擢兵科給事中葉承遇福建通志字思章溫州人萬厯五年知莆田先是田分官民賦有輕重承遇欲均田為一而念浮糧難攤會有履畝之命即以丈出餘田折補其額閭里便之又編派里甲悉為更定即豪貴無所避至今談均田均役者必首稱承遇云王繼明永嘉縣志字用晦萬厯甲戌進士授當塗令興利除害姦黨斂迹邑當孔道時張居正母喪馳驛還楚所過皆結綵相候繼明無所加禮居正銜之坐降級赴贛幕連署瑞金寧都安遠三邑皆以循卓稱久之補樂安令奏最擢南曹厯守鎮江襄陽太平三郡升四川按察使卒夔人以宋王十朋曾宦於此合祠祀之名二王祠張德明分省人物考號毅宇樂清人萬厯丙戌進士授刑部主事厯郎中出守寧國礦使至郡人情洶洶德明陽為款語陰實剷其距角部勒黨從得不橫噬一郡帖然擢湖廣副使以參政致仕吳寶秀舊浙江通志字汝珍平陽人萬厯己丑進士厯遷南康知府甫六十日決滯獄殛姦民一郡肅然巨璫李道𣙜稅湖口窮捕商艘波及郡民寶秀持不可遂誣奏逮詔獄妻陳氏請同行不得雉經以殉合郡哭送境上郡民陳英熊烺輩叩閽願以身代臺省交章論救會星變乃得宥歸上亦悟撤李道回詔以有司代其任熹宗立贈太僕寺少卿處州府宋何琬兩浙名賢録字子溫龍泉人皇祐進士七歷監司神宗嘗疏其名於屏曰政事何琬文章葉濤後官至龍圖閣學士祝粹括蒼彚紀字子元麗水人元祐進士為分水令有政聲百姓生子皆以其姓為字葛源西江志字宗聖麗水人以泰和簿攝吉水令吏舞弊者悉置以法有毛氏寡婦訴子不孝源以恩義説之不從密使人覘有與間語者捕得之乃謀誣其子也窮治具服縣距州遠民輸租苦於挽運源始議置縣倉民便之張著兩浙名賢録字少微龍泉人崇寧進士知永康縣有惠政紹興中歷守臨江平易近民户口增七萬餘部使者以治最聞時兵荒民鮮習儒著建學以造士上將用著而以鯁直忤時相竟出知筠州卒於官張端禮李綱張端禮墓志字南仲龍泉人崇寧五年進士授陳留縣主簿歷知常州武進縣調無為軍司録事乞祠卒端禮平居循謹及涖官從事剸繁治劇應刃輒解武進劇邑號稱難治端禮下車未幾吏畏民愛有所號召榜之邑間趨應如響未嘗遣吏持符至村疃間官無為地僻政窳端禮隨事糾正多所裨益朝廷降錢和糴部送吏悉以鬻鹽鈔會鈔法改諸郡恐失期則令民户均賠端禮持不可曰規利失錢吏也奈何以諉民且朝廷以百姓困乏故降糴本今反取之殆非布宣德澤之意乃具奏而以吏繫獄會赦吏得釋而民不擾者端禮之力也沈造兩浙名賢録字次仲縉雲人政和中進士知漳浦縣海寇作亂將及境聞造有政聲即引去曰母驚沈公及判潮時有韓山神歲須男女以祭造至即焚其廟毁像得巨蛇殺之凶祀遂絶議者以方韓昌黎之驅鱷云張溥括蒼彚紀字德施龍泉人紹興中進士知莆田縣淳熙九年差知嶽州陛對論常平虧欠之弊欲令州縣申具實數寬其已往之罪講明方來之法復論欲令忠順官任滿迭相注授稍令待缺以寬廩給上首肯之除福建參議未赴卒陳汝錫揮塵三録字師禹處州人以才猷宣力於中興之初髙宗自四明還會稽汝錫領帥浙東當搶攘之後安輯經理美效甚著適秦檜素懷睚眥以他罪坐貶單州團練副使漳州安置兩浙名賢録汝錫紹聖五年進士邑之登苐自汝錫始著有鶴溪集十二卷季南夀括蒼彚紀字元衡龍泉人登紹興進士知簡州發姦摘伏如神徙守睂陽民夜苦暴水南夀出令救一人者與已俸五緡活人甚衆後上疏乞休進直顯謨閣致仕張商卿括蒼彚紀字宗尹龍泉人紹興進士知滁州極論屯田之害謂開耕之初率民田充數名曰借獻其實攘取募民代錢名曰和雇其實差科後官至淮南轉運判官何佾兩浙名賢録字德獻龍泉人以蔭調福州古田簿時方弱冠遇事通解攝縣事取滯獄決遣之輕重得情改於潛縣治以最聞遷通判廬州就差知黃州黃多盜桴鼓夜鳴佾乃連鄉舍保伍盡破其根株窟穴盜無所容奔走北境除荆湖南路提舉茶鹽事會盜發廣西陷藤潯髙化四郡都督張浚奏佾有戡亂才遂除經略安撫廣南西路盜聞風解散佾撫摩瘡痍之民奉宣寬大之詔剔蠧除罅繕甲厲兵一路賴以保障者二十餘年盧彥德括蒼彚紀字國華麗水人紹興中進士知廣德軍建平縣舊版籍有絶户物力錢抑民代輸縑匹民苦之多逃亡彥德至大搜隱漏以實升降削虛産二千餘户於是逃者復歸兩守蜀郡再歷憲曹並著聲績後官至朝請大夫田渭括蒼彚紀字伯清縉雲人紹興中進士為辰州教授五溪俗與中州殊絶渭創學宫刻典籍立程度推誠訓育俗為一變遷司封郎除浙東提舉常平嵗歉究心荒政除台婺處三州户科茶稅又奏罷五等差夫送迎之擾民賴以安朱藻括蒼彚紀縉雲人紹興中進士知浦城縣邑有劇寇前令莫敢誰何藻至悉置於法程樟兩浙名賢録字喬仲松陽人官連州司理妖民龔陸以左道具獄樟為推究其詿誤者數百人改知侯官聿新學宫日與博士弟子講學習射彬彬向風晉守廉州政尚簡靜置平糴倉以濟民飢官至廣東西路憲使季籲括蒼彚紀字和叟龍泉人隆興中進士歷開州知州節浮靡蠲宿逋奏除省額四千餘緡減州額六百餘緡尋擢東普知府普連年大飢籲講求荒政至廢寢食民甚賴之詹宗契括蒼彚紀字彥敷縉雲人以世賞入仕終知南康建昌二州撫湖外之民講救荒之術丞相葉淮嘗舉其廉能孝宗詔褒奬之黃邦彥括蒼彚紀字退翁縉雲人嘉定中進士知雩都縣吏以治盜請邦彥曰以民視民何忍為盜作廉寬公勤四銘刻於邑治以勸後人盜風遂息歷官至朝散大夫朱定福建通志縉雲人嘉定間知連江疏水利決淹獄正役版威惠並行吏民樂之季鏞兩浙名賢録字伯韶栝蒼人淳祐十二年知睦州時大水壞公私廬舍無數民苦溺且飢鏞至虛己問俗首蠲私苗十六力請於朝寬京府𣙜糴之令發廩分賑捐抽解場木豫被水之家未幾頓復舊觀民忘昏墊後官至兩浙轉運使潘自中括蒼彚紀字時乂松陽人為江州司理有吳門鹽商牽連就繫吏承上意欲加之罪沒入其資自中曰入人之罪以媚人吾不忍為也力雪免之州部將二人以軍賦抵牾繫獄統戎者以夙憾欲死之自中走白於府深明其誣二人賴以免元趙鞏福建通志縉雲人至元間為劍州路總管時兵戈甫息鞏至一以廉靜為先尤加意學校諸生立碑頌焉王鉉翁王褘王鉉翁墓志字中實遂昌人為平江路吳縣主簿郡守杜某素知其材大小政務悉以委之豪民顧鍾朱郭四大姓怙勢為不法則發其罪惡咸置於理除台州路黃巖判官亭户洪甲恃不統於有司恣為暴橫殺平民吏白不宜問鉉翁曰殺人之人乃可置不問耶逮捕繫獄坐罪不少貸姦民有挾偽鈔板詣官自首者覬事發因得誣連富人鉉翁察其情詰之果自服立命焚其板居三年庶績具舉以中山府判官致仕明應塤括蒼彚紀字伯和縉雲人洪武初由儒士知太康縣以廉謹稱升知荆門州治尚寬厚民多德之永樂中致仕張彥方崇禎處州府志字文巨龍泉人洪武中舉孝廉歷官樂平知縣剖斷如神寃抑得理王均兩浙名賢録字惟準青田人正統丙子舉人選濱州知州屬嵗大旱民無穀種流離滿道均躬履村落貸種給耕又力請於朝得銀萬兩民賴以濟周雷兩浙名賢録字時敬松陽人由嵗貢判延安出鎮神水督倉廩謹度支崇學典教恩威並行又以地髙乏水人多病渴乃令各鑿井利濟無窮及歸民皆遮道泣餞不忍别金文獻徴録字尚德麗水人景泰辛未進士拜行人升刑部員外郎真定頑民上封事官民被誣者纍百餘文奉命鞫之三日而情具奏徙其人於邊在刑部十三年無私請託出為開封知府時屢嵗淫雨害稼黃河岸決百姓薦飢文親履災所驗實奏免其賦又奏便民七事詔皆可之尋致仕崇禎處州府志文辭藻翰墨雅重文苑有好生録履素間吟讞獄餘典東遊等稿鄭宣括蒼彚紀字士達麗水人𢎞治癸丑進士選御史綽有風裁以抗禮逆瑾謫興化推官多善政尋升江西僉事禦寇有功進階參議乞歸崇禎處州府志著有宋元綱目愚管郡志補遺古栝遺芳等書沈􅌔括蒼彚紀字景明雲和人𢎞治乙丑進士纍官山東副使適王鏜寇發勢甚猖獗􅌔設法勦絶境賴以寧未幾致仕汪瑛括蒼彚紀字子修麗水人正德戊辰進士任兵部主事歷升福建副使勦泉州賊一方以定會入覲卒於途家無嬴積葉禎括蒼彚紀字瑞卿麗水人嘉靖戊子舉人授宜黃知縣剛介不阿改巴東節用愛民上下信服尋遷梧州府通判致仕李璽括蒼彚紀縉雲人任重慶府推官公廉仁明考最擢知趙州苦節惠民甫五月卒民建仰德祠以祀李珉兩浙名賢録縉雲人任延平司李鞫獄明允人稱不寃有父訟其子者其孫曲護其父珉曰爾知為父之子不知父即祖之子也三人叩頭悔罪聞風者亦無不感化尋遷撫州别駕時洞寇出沒珉布德惠嚴規畫境土肅清尋致仕戴濂崇禎處州府志字希茂麗水人嘉靖壬戌進士授行人量移比部慮囚陜西多所平反擢知饒州府鎮以清靜豪猾扞網一無所貸調潯州府罷牛稅減鹽錢嚴發冢挾贖之禁潯俗為之一變尋移病歸鄭文茂崇禎處州府志字實夫縉雲人嘉靖癸丑進士授刑部主事歷本部郎出守承天多善政遷四川兵備副使勦巨寇何勉篤斥貪墨革支應民歌頌之黃一陽處州府志字旋化遂昌人萬歷癸巳選貢授滄州判官升藤縣令地産異草人食之立死惡少每恃以誣人一陽下車首著為禁在任二年鮮有以人命訟者尋卒於官李逢雷處州府志字子敬縉雲人以例貢授光祿寺署丞升遼州同知州治在萬山中多曠土因勸民植茶果墾土田應罰鍰者視墾畝多寡為差民爭畢力得田數千畝擢福建鹽運副使國朝吳從謙湖南名宦册景寧人由拔貢知臨武縣撫輯流移均平徭役多善政尋升武岡知州張翀福建名宦册字南溟麗水人康熙七年令羅源耿逆播虐縱黨四出剝民翀笞而逐之境外嬰逆怒脅知府王之儀揭罷之儀持不可逆乃檄召翀翀單騎之省百姓從行甚衆逆黨謀於中途窘辱望見之不敢動卒於官邑人構祠祀焉浙江通志卷一百七十
