body:
  text: 浙江通志卷三十六關梁四紹興府山隂會稽二縣附郭府橋寶慶會稽續志在鎮東軍門外蓬萊館前舊以磚甃不能堅久守汪綱盡易以石闌干華表加飾艧焉橋既寬廣翕然成市遂為雄觀拜王橋嘉靖浙江通志在府西獅子街唐末錢鏐平董昌郡人拜謁於此至朱梁時封吳越王故橋以拜王名萬厯紹興府志又名登瀛橋國朝康熙二十八年知府李鐸重修更名豐樂橋王儀橋山隂縣志在縣南一里大夫橋玉壺氷張志和築室越州東郭陳少遊表其居曰元真坊先是門阻流水無梁少遊為構之號大夫橋清道橋於越新編在府東二里軒亭南山隂接界百貨會集鯉魚橋山隂縣志在縣北二里許宋時浙東貢院故址𢎞濟橋嘉靖山隂縣志在火珠山下本名火珠橋嘉靖間郡守南大吉名寶珠橋後守湯紹恩重修改今名光相橋山隂縣志在縣北三里許北海橋於越新編在府西北二里俗傳唐李雍寓居之地𢎞治紹興府志元至正間義士余清建謝公橋嘉泰會稽志在新河坊以太守謝公所置故名國朝康熙二十四年重修江橋明一統志在府城內西北太平寰宇記宋江彪所居之地因名斜橋𢎞治紹興府志在府治東北其下多客邸舟楫往來所集狀元橋萬厯紹興府志在府東南四里宋詹騤所居里也題扇橋紹興府志在蕺山之南紫桃軒又綴右軍為蕺山老姥書扇今紹興郡城有題扇橋晉書王羲之傳嘗在蕺山見一老嫗持六角竹扇賣之羲之書其扇各五字姥初有愠色因謂姥曰但言是王右軍書以求百錢姥如其言人競買之他日姥又持扇來羲之笑而不答草貌橋萬厯紹興府志在府東北嘉泰志云舊傳此地在州城外俗謂征稅之所為貌大雲橋山隂縣志在縣東南四里國朝康熙五十年重建都亭橋嘉泰會稽志在城東禮遜坊越絶云秦始皇東逰之會稽以甲戌舍都亭都亭之名始此鏡水橋於越新編在府東四里宋趙處士仲微所居探花橋山隂縣志在縣東北五里會稽縣志傍有小橋曰田家橋鍾離橋𢎞治紹興府志在城東漢鍾離意所居大善橋山隂縣志在縣東北二里有大善寺故名廣寧橋於越新編在都泗門內明隆慶中漸圯華嚴寺僧性賢重修嘉泰會稽志漕河至此頗廣民居鮮少獨士人數家在焉紹興中鄉先生韓有功復禹為士子領袖暑夜與諸生納涼橋上有功沒朱襲封亢宗追懷風度作詩云河梁風月故時秋不見先生曳杖遊萬疊逺青愁對起一川漲緑淚爭流蓋橋上正見城南諸山也鄉橋萬厯紹興府志在縣治東北俗謂朱買臣還鄉故名會稽縣志又名香橋陸放翁種梅於此故名其旁尚存梅園同至元時勞義士新之隆慶間錢守愚重修國朝康熙八年陳伯嘉重修望花橋紹興府志在府學前嘉泰志云其地多藝花為業蓋宋時然春波橋寶慶會稽續志在縣東南五里千秋鴻禧觀前賀知章詩云離别家鄉歲月多近來人事半消磨惟有門前鑑湖水春風不改舊時波故取此名橋會稽縣志羅漢橋本名春波橋栁橋紹興府志在府東南三里明王育蓍殉節處有碑山隂縣城外關梁杜浦橋於越新編在府城西北十五里嘉泰會稽志自此而南煙水無際鷗鷺翔集過三山遂自湖桑埭入鏡湖文應橋𢎞治紹興府志在縣北一十里昌安門外舊傳朱買臣讀書於此鄉人為之立祠於橋側買臣封文應侯故名虹橋嘉靖山隂縣志在縣北十里宋理宗少時浴於此故又名浴龍橋魯墟橋嘉泰會稽志在縣西北一十三里南為漕河北抵水鄉如三山吉澤南莊之屬又北復為漕河漕河之北復為水鄉渺然抵海謂之九水鄉宋曾文清詩淡跨水鄉勝謂不減吳松即此是也西跨湖橋山隂縣志去縣西南五里鏡湖上南通離渚路亭山橋於越新編在府城南十五里近鏡湖諸溪之水滙焉蘭亭橋輿地紀勝在山隂晉王右軍修禊處橋下水聲晝夜不絶有含暉亭吳奎題蘭亭橋詩秦望竒峯北天章古寺東石橋跨驚瀨雪屋麗層穹國朝康熙三十五年重建髙橋山隂縣志去縣西北二十五里運河塘上橋最髙故名柯橋嘉泰會稽志在縣西北三十里伏滔長笛賦序云蔡雍避難江南宿柯亭館取屋椽為笛注柯亭在會稽郡胡曽柯亭詩一宿柯亭月滿天笛亡人去事空傳中郎在世無甄别爭得名垂爾許年涵清橋𢎞治紹興府志在縣西小步里永樂中里人張季能建錢清浮橋紹興府志在府城西北六十三里舊以木柵為浮橋王禕錢清江浮橋記錢清江古名浦陽江其地控驛道舊有浮橋蓋比舟為梁以濟不通而近歲廢不治至正十七年秋寧夏吳君以憲臺行軍都鎮撫分鎮蕭山山隂兩縣覩橋之廢慨然嘆曰是不亦有司之缺失歟亟命裒民戶之義助并公帑之羡儲計其物力度程而新作之凡為舟十有二上架板庋相屬以為梁其長三百有六十尺廣十有七尺聫之以鐡絙絙如橋之長而維其兩端於南北隄使舟常比而梁常屬與波濤相上下雖水湍悍而往來者固無虞人莫不以為利也橋成書其事於石明𢎞治八年邑人周廷澤建夏履橋𢎞治紹興府志在縣西八十里世傳夏禹遺履於此吳越春秋遺履不顧即此金仙橋山隂縣志在縣西六十五里明因寺之旁宋祁國公杜衍所建髙公橋山隂縣志在天樂鄉國朝康熙十五年閩逆煽亂大兵進勦集天樂浮橋知縣髙登先供應軍需為水所溺衆救獲蘇居民建橋以登先誠於為民稱髙公橋三江渡山隂縣志去縣東北三十三里明知府湯紹恩改建新閘荷湖渡山隂縣志去縣北三十三里在璜山東大峯山南上通扁拖甲蓬二閘下接三江新閘俗訛濠湖前梅渡𢎞治紹興府志在縣西六十里錢清江上流南通諸暨北通蕭山濱江之民造舟以渡會稽縣城外關梁東關會稽縣志在縣東六十里靈汜橋水經注城東郭外有靈汜水甚深舊傳下有地道通於震澤嘉泰會稽志在縣東二里石橋二相去各十步吳越春秋勾踐領功於靈汜漢書山隂有靈文園此園之橋也汜一作圯俗呼為靈橋李紳靈汜橋詩靈汜橋邊多感傷水分湖𣲖逹回塘岸花前後聞幽鳥湖月髙低映緑楊能促歲華惟白髮巧乘風馬是春光何須化鶴歸華表却數凋零念越鄉三橋嘉泰會稽志在縣東南五里有橋三其中橋有亭扁通濟今鏡湖分東西以此橋為限渡東橋於越新編在東郭門外明會稽令羅相建陶望齡渡東橋記越郡隍水而城直東郭門者曰划船港厥浸尤廣南鎮平水上竈諸山之溪流皆委焉三道注射湍悍難渡重以霖潦風雨舟每覆溺其南岸故有英濟侯廟涉者必禱以其嶮阻厄危工巨費繁梁之為亟而力最艱故謀舉輒輟豫章羅公來令茲邑臨流惻嗟從者忭起以萬厯二十三年二月僝工再歲工畢跨水數百丈釃水十有八道樹石為兩棹楔表諸途凡市石傭力之資為白金八百五十一兩捐月俸三十兩餘出諸施者既成命曰渡東出其塗者謳誦歌舞相屬太史氏望齡聞而采之為銘銘曰越國於澤厥阻在山言言崇墉峙其兩間澤流浩瀰山流蕩撼傾髙助深是曰坎坎涉者維何車舟馬楫如提千金載一棗葉陽侯甘人灑血滲牙盲風怒波淚齎紛拏旋入深淵不可蹈些行惻道謀仁人是嗟仁人伊誰曰我羅父頭氷足春歷有年所靡枯不濡靡墜不舉如雨膏萌如颷揚羽乃飭泮宫乃營京坻秩祀是嚴茀塗是治匹夫煩寃曰已溺之圖厥萬安易此一危表正蚪移鞭驅石走雌霓半舒青龍欲吼扶楯天行盤根地厚席過輿徒宵趨稚耉在昔州使旌賢造廬梁水於門橋名與俱邦人稱焉東郭大夫厥壤維均惠濟則殊宜系公官若郎官湖宜姓於公如鄭白渠又如迷人善逝所吁誰為津源西來衲徒我公之功異理同符嘉名渡東亶其然乎洞亭橋嘉泰會稽志在縣東十五里陽明洞前架小亭其上橋東數十步又有鬭牛觀山二橋入龍瑞宫雲門橋嘉泰會稽志在縣東南三十五里若耶溪南旁有仙翁釣磯宋考功之問詩云鴈塔鶱金地虹橋轉翠屏謂此石橋雲門志略在雲門寺前舊有麗句亭架其上黃汝亨逰雲門記自秦望而下諸山泉並注於此流淙活活至冬不涸當水盛時飛瀉噴薄足與吾杭靈隱回龍橋相敵蘇舜欽送張行之詩五雲山下石橋邊六月溪風灑面寒今正炎天君獨往松間尋我舊題看五雲橋於越新編在府城東二十六里舊跨溪今在平陸陸遊五雲橋詩若耶此與鏡湖通縹眇飛橋跨半空陵谷變遷誰復識我來徙倚暮煙中告成橋萬厯會稽縣志在禹祠西以禹治水告成故名萬安橋會稽縣志在六都樊江廣渡菴之南橋長二十四洞浪暖橋會稽縣志在雙溪港張神廟之左平水上竈二溪之水合流於此向有木橋水稍漲即衝壞明張賢臣捐資糾衆易以石名曰浪暖崇禎末山隂謝籲重修毛洋橋於越新編在府城東四十里又東為陶堰曹娥渡紹興府志在府城東九十里絶江而過隔岸為上虞吳礦曹娥渡詩渡頭帆落與雲平江上花開相映明兩岸人家通海嶼一川風色送潮聲斷碑已沒中郎篆古廟終存孝女名自恨經過皤客鬢愧將書劍負平生稱山渡會稽縣志在縣東北五十里小江渡會稽縣志在縣東南一百里渡口有茶亭守渡船蕭山縣漁臨關於越新編在縣東南十五里凡竹木自徽處衢嚴往諸暨者泊臨浦抽分發寧紹者過義橋等壩白鷺塘抽分紹興府志漁臨關有橋互見𣙜稅田惟祐漁臨關橋記蕭山密邇省治西通衢婺徽嚴諸郡凡商販竹木簰筏自上江順流東下悉集蕭山漁臨二浦故工部分司雖總設於杭而於蕭山漁臨則亦各置𣙜場焉縣之來蘇鄉地濱東小江名單家堰而抽分厰在小江之西永樂間有木橋跨江以渡尋廢嘉靖壬辰工部主政薛公移水關於此商民往來者尤衆公議建石橋未果而去民架木梁以渡而江濶水漫危險可畏今歲六月值工部主政林公臨縣詢知民病遂決前議疊石為梁列五洞跨江東西以丈計者十餘肇工於七月十九日迄工於十一月二十日謹按紹興自漁臨關外山隂有錢清關漓渚關清潭關花街關三江關會稽有蒿陡關平水關餘姚有陸浦關石堰關上虞有梁湖關今俱廢夢筆橋輿地紀勝在縣東北一里即江公所居處也蕭山縣志齊建安中建葉清臣修夢筆橋記浙江之東偏會稽為古郡地方百里者八而蕭山居其一焉縣目伽藍者五而昭慶寺為甲焉夢筆橋者乃直寺門絶河流而建之也初齊建安中左衛江公皈依法乘脫略塵境捨所居宅為大福田則斯橋之興與寺偕始其賦名索義亦由此也自會昌流禍池臺起傾平之愴大中再造土木極文秀之華惟造舟之制曠日不復物豈終否有時而興天聖紀號之二年冬十有二月隴西李君以廷尉評實宰是邑周爰井疆鋪觀圖籍感釋子之能志惜江氏之寖微且懼褰裳厲深為斯民病漸帷涉難貽來者羞乃諭居僧俾募信施三四佛之攸種咸植善根百千金之所宜悉歸寶塔府帑不費里旅不煩山林致木而叢倚郢人運斤而風集經始不日而功用有成晴虹倚空而半環浮鼉跨波而欲渡雕楹矗而端聳鈎楯繚而橫絶肩摩轂擊控曵路而下馳飛艎鳴舸貫清流而直逝以材之豐美稽工之間隙又作駐節亭於橋之北涘艇子兩槳足以憩行者之勤虹霓一朵誠可免涉者之病是知創橋以表寺先賢之遺懿益光由亭而視橋上人之用心兼至建一物而二美具故君子謂李君為能云華鎮夢筆橋詩緑波照日情無奈碧草連天恨未消欲向夢中傳彩筆栁絲低拂曲欄橋謹按夢筆橋以江寺而名文通捨宅為寺故橋謂之夢筆耳蕭山志刋誤云文通未嘗至越捨宅為寺乃總持非文通也觀此則所稱夢筆者正屬附會且縣志於建橋歲曰建安中按建安為漢獻帝紀元南齊無建安年號此誤之又誤者陳公橋於越新編在縣城東一里蕭山縣志明萬厯四十四年邑令陳如松掘通雙河塍折運河水使南注因建橋焉惠濟橋𢎞治紹興府志在縣東北惠濟寺前一名鳳堰橋漲潘橋蕭山縣志刋誤在縣南十五里以潘水所經得名石橋蕭山縣志舊名浮橋明𢎞治七年山隂周廷澤易之以石比海塘傾橋亦就隳守道楊一葵於萬厯四十二年修塘而橋復建陸遊渡浮橋詩潮生抹沙岸雲薄漏月明江頭曉色動鴉起人未行扶擕渡長橋仰視天宇清遙憐繫舟人聼我髙屐聲氷鑑得少憩一笑拄杖橫澄漪㺯清影微風吹宿酲湛然方寸間不受塵事攖寄語市朝人此樂未易名白鶴橋萬厯紹興府志在白鶴鋪前東與山隂界萬厯間施良貴修惠政橋蕭山縣志元簿趙誠建楊維楨魚浦新橋記至正十三年秋八月蕭山縣魚浦新橋成浦之西北距浙江東南商旅提携樵蘇負荷者胥此乎道焉晨出暮返奔渡拏舟不無蹴踏覆溺之患縣主簿趙君來鎮於茲易舟而梁不三月而底於成長凡五百尺洞十有五楹十有六隄其兩旁棧板欄翼亘其長吁昔無而今有創實功之難也橋出沒於潮汐之險又難也事出於昔人之所難而得於今日之所易謂惠而知為政者非歟於是顔其橋為惠政銘曰江水湯湯界浦之疆涉浦作渡民病於航趙君為政惠而有方誰為浦廣不可以梁維彼梁也四方之光也德之長也民之不能忘也髙遷橋蕭山縣志刋誤吳志曰孫策入都都人迎於髙遷十道志曰董襲見孫權於髙遷今縣東北有髙遷橋錢清方家橋寶慶會稽續志距縣西四十五里在小江之西歲久斷圮守汪綱重修寧宗御舟經從撤而復葺西興渡方輿勝覽在縣西十二里本名西陵水經注昔范蠡築城於浙江之濱言可以固守謂之固陵今之西陵也吳越王以非吉語改西興紹興府志為吳越通津有官舟水工二十四人其私舟姓名亦各𨽻於官有罹傾覆之患者官以法治之謝惠連西陵遇風詩行行道轉逺去去情彌遲昨發浦陽汭今宿浙江湄臨津不得濟停楫阻風波積憤成疢痗無萱將如何周匡物西陵待渡詩萬里茫茫天塹遙秦皇底事不安橋錢塘江上無船渡又阻西陵兩信潮諸暨縣陽塘關諸暨縣志去縣五十里浦江縣界嶺下兩山相逼唐宋置關於此元廢明崇禎癸未婺賊蔓延復疊石置關今迹尚存義津橋嘉泰會稽志在縣南二百步唐天寶中令郭密之建桂花橋𢎞治紹興府志在縣西二里即上湖橋太平橋於越新編在縣東門外舊為浮梁諸暨縣志唐大厯中建尋廢宋淳熙間修武郎壽康孫建石橋日久圮元時即舊址建浮梁鐡纜維之明景泰間邑令張鉞耆民駱季清等復建石橋又圮國朝順治乙酉知縣劉士瑄重建會義橋諸暨縣志縣南一十五里舊名黃白山橋明隆慶中邑令梁子琦重建又名梁公橋當甌婺萬山之衝橋遂傾圮萬厯庚子劉光復修建又圮國朝康熙庚戌知縣蔡杓重建千同橋𢎞治紹興府志在縣北三十里居民于子深造楓橋𢎞治紹興府志在縣東北五十里唐時建宋淳祐間重建石橋作亭其上武衍楓橋道中詩路接官河栁腳斜蹇驢衝暑憩田家雨餘天逈雲生葉日午風輕稻放花襏襫已懸黃犢睡桔橰不動緑楊遮老翁相見如相識命坐繩床自析瓜李龏楓橋夜泊集古詩水濶風髙日復斜鷺鷥繚繞入人家船頭繫箇松根上霜葉紅於二月花干溪橋於越新編在縣東北六十二里相傳為干吉所居魏驥干溪橋記干溪橋去縣治六十里春夏之交淫潦泛溢萬山之水皆滙於溪故橋常為所壞郡之二守黃侯道經其地曰是橋要道也壞至此乎乃召其邑之義民駱某等告以其由將興役適郡守洪侯來蒞郡事曰此吾之事也遂首出已俸為倡駱某等亦皆以資力為助召匠需材肇工於成化五年之月日畢工於成化七年之月日洪侯名楷閩之莆田人黃侯名璧江右浮梁人陸遊過千溪橋詩南劍歸來席未溫南行浩蕩信乾坤峯回內史曽遊地竹暗仙人舊隱村白髮孤翁鋤麥隴茜裙小婦闖籬門行行莫動鄉關念身似浮萍豈有根善感橋諸暨縣志在雙溪係浙東諸郡往來之衝明萬厯三十二年王友艱於嗣故建隨得數子因名善感義士橋𢎞治紹興府志在縣西八十里里人陳志寧創義於此故名晚浦渡諸暨縣志晚浦東聯越郡西接蘇杭商賈往來之所向有義渡久廢國朝順治間有傅應麟者置船恐久復廢捐田五畝作船夫工食又捐屋三間收稅作修船之費義渡自此永存矣餘姚縣澄清橋𢎞治紹興府志在縣東二百五十步近按察司故名黃橋嘉泰會稽志在縣西二百步紹興府志水經注江水東徑黃橋下蓋黃昌宅橋也明星橋𢎞治紹興府志在縣東南一里江橋明一統志跨餘姚江上嘉靖餘姚縣志宋慶厯間令謝景初用木跨江橋之尋壞崇寧五年邑人莫若鼎復建建炎三年金兵焚之紹興初復建淳熙五年壞七年復建咸淳三年壞其年復建德祐二年張世傑焚之入元再建再壞其再建也蓋浮橋云至順三年乃成石橋名曰通濟韓性通濟橋記至順三年餘姚通濟橋成按宋圖經姚江在餘姚縣南十步橋曰德惠建炎中廢縣令蘇忠規重建至淳熙戊戌而壞司業王逨方里居捐資以創歷歲百餘至咸淳而壞司業之孫王籍曽孫應龍復創建焉易名虹橋建十年而燬縣令杜仲仁進王氏子孫而諭之曰此君先世義事也不可不勉於是應龍即舊址經營其族人濤湘等相繼盡力至元二十年九月橋成未備獨欄楯縣尹夏把使邑人趙孟嵩等助成之至延祐六年九月而壞有僧惠興言於官請作石橋為永久利州官許之經始有緒而僧亡州判官牛彬恐遂廢弛命道士李道寧繼其後且捐己俸為倡而力董之會奉議大夫監州拜珠奉議大夫李恭來知州事與同知州事特穆爾布哈賈策判官張志孝唐俊吏目陳天珏沈思齊咸勸成之至是而石橋成名之曰通濟風帆浪楫停潮依汐鱗居通闤東西相屬橋之名遂冠東浙非直一州偉觀而已州人疏其本末至山陰使性為之記餘姚縣志明萬厯九年南洞大圯邵陛修之國朝康熙間又圮雍正七年總督臣李衛重修戰場橋萬厯餘姚縣志在縣南四里宋宣和二年睦寇犯境縣遣顧秀才徴所部鄉夫鑿壕龍泉山後寇乃取道鳳亭欲自南門橋入越帥劉述古率官軍迎戰於此敗其衆今訛為轉糧橋客星橋寶慶會稽續志在縣東北一十五里陳山舊有橋屢成屢壞淳熙十年僧清式改作甃石翼以石欄極為堅壯里人以其在嚴子陵墓側因名孫應時客星橋記嚴先生吾餘姚人也邑東北十里有竒峯曰陳山是為先生墓乾道中故太師史公鎮越始告縣表墓起精舍曰客星堂而為之田長吏以時奉嘗陳山臨大浦民橋其上善壞淳熙十年僧清式大改作甃石如虹袤百有五十丈石欄翼之甚壯六年乃成里人相命亦曰客星橋將使四方之士舟車之過焉者喜其名而相告也應時敢記其事於石且歌之曰山川之靈人為重輕風土之佳人為晦明先生釣遊有榮一州先生故丘云胡勿求陳山雄雄石梁崇崇斯名斯歌以諗四方於越新編在客星山北與安山並今呼為安山橋萬厯餘姚縣志明嘉靖十六年壞十八年重建隱鶴橋於越新編在縣東十五里唐莫盛携鶴至此忽隱不見故名新橋紹興府志在縣西北二十里舊跨長泠港曰長泠橋亦名方橋明初置臨山衛斥官道遷長泠橋為新橋黃山橋嘉靖餘姚縣志莫詳其始建歲月其燬而再建者在宋紹熙間元至順間嘗修之韓性修黃山橋記餘姚州之東距理所二里有善政橋橋旁有大小黃山土人因謂為黃山橋嘗燬於火紹興間僧覺因合衆力重建三年而後成逮寶祐間橋之建六十年浸及於圯邑人樊暉率衆修葺而橋完又七十餘年當至順年晉寧李恭知州事來視橋梁欹石泐過者凛凛則與寮寀議曰橋百年不修則壞壞而更為不可以猝成吾捐俸以為之倡於是監州某同知州事賈策判官某是其議協力而成之州人踴躍謳謠西過山隂澤中俾性為之記至正間復壞十九年僧自悅重建潮汐奔潰不可置一石自悅祝天願少郤潮忽竟日不至乃併力基之橋始克成時方國珉鎮邑諛珉者更橋之名曰福星初為二洞髙危易敗明正統三年改為三洞萬厯紹興府志嘉靖三十四年倭寇猝自海上來居民計無所出遂毁明年城東士大夫各以義捐金復建橋石柱而木梁尋復屋其上橫河橋於越新編在孤山東北為閘蓄東北諸鄉之水上虞縣通濟橋於越新編在縣南一百步宋王吏部義昭重建名通利元至元中改今名萬厯上虞縣志明萬厯三十二年令徐待聘令居民壽來泰等重修豐惠橋𢎞治紹興府志在縣東一里舊名酒務橋萬厯上虞縣志宋令樓杓重建易今名袁燮豐惠橋記縣市有酒務橋周顯德中所建歲月滋久石或斷缺往來者凛乎有壓溺之憂邑侯乃以歲計之餘捐金募工伐石更造以舊名額不雅思易之邑人沐浴膏澤推原所自名曰德政侯不許曰天以豐歲加惠我民事幸而集豫何德焉以豐惠揭之其可爰請於起居舍人魏了翁書二大字以扁之初侯興是役也復輦舊石為橋於剪水閘之上侯秩滿去而是橋適成邑人相與言曰令尹雖不言功吾儕能自已乎歸功於天令尹之志也歸功於令尹邑人之志也乃以德政名閘上之橋而鑱諸石以致思云楊橋萬厯紹興府志在縣南一里宋嘉定中浚玉帶溪得石刻楊喬二字陳光祿綘云昔孟嘗為合浦太守以病自止隱處窮澤身自耕作鄰縣士民慕其德就居止者百餘家同郡尚書楊喬前後八上書表其賢今縣東一里有孟閘云是嘗故宅宅西有楊喬巷橋名或由此謹按𢎞治紹興府志謂楊橋曹操與楊修辨曹娥碑隂字在此故名劉孝標世説新語注云曹娥碑在會稽中而魏武楊修未嘗過江安得此事語林云操讀碑於汝南所摹者非在曹娥廟也今橋雖距廟三十里未必以是得名九獅橋於越新編在縣東等慈寺前上虞縣志至正中重建黃和中九獅橋詩幾年危磴倦扳躋疊石成功信可稽楹列九獅留舊事車乘駟馬待新題長河俯瞰多飛鷁髙岸橫陳有斷霓多謝老僧能起廢盡將勝槩付招提孟宅橋嘉靖浙江通志漢合浦太守所居萬厯上虞縣志又曰還珠橋華鎮孟宅橋詩溪上還珠太守家小橋斜跨碧流沙清風不共門墻改長與寒泉起浪花青雲橋萬厯上虞縣志在龍王堂側宋令樓杓建邑人名曰德政後尹王璘重建以木易曰思賢余應璜思賢橋記至元壬辰沂水王璘奉命尹虞甫及期而敝事悉舉獨德政橋僅一二廢柱屹乎中流橋在剪水閘西去才二里縣東舊無橋梁水口山低而逺隂陽家所忌宋嘉定四年宰樓杓始建此橋以關鎖之至元丙子遭兵燹而橋隳距今十八載矣公顧瞻故基徘徊慨息為興創計又念民素貧瘠歲且不登若仍架以石橋未必成而民且困因乘農隙而鳩木材取其力省而功速也公自視歉然不欲襲舊名而易曰思賢欲思前賢而行政也復圯元至正乙未邑人杜致甫架石梁尹林希元又名杜公橋明萬厯丙戌令朱維藩北構文昌南新奎文復創橋其間以青雲名焉今又名聯登橋百官橋太平御覽水經注曰上虞縣亦名虞賓舜避丹朱於此故以名縣百官從之故縣有百官橋謹按晉太康地記亦云舜避丹朱於此十道志上虞縣百官橋一名舜橋太平寰宇記越州餘姚舜橋避丹朱於此百官候之故名要之橋雖以舜名諸説皆未可信合清橋萬厯上虞縣志東西兩溪合流處橋屢壞里人周衮購石造橋分三洞以泄其流學堂橋嘉泰會稽志在縣西北四十里俗傳朱買臣讀書堂也傍有洗硯池朱侍中廟梁湖渡上虞縣志在曹娥廟前宋嶽梁湖渡詩渡口夕陽斜長逰始問槎天低雲接樹風急浪平沙倦鳥依帆下征人隔岸譁眼前風景别詩意屬誰家百官渡𢎞治紹興府志在縣西北四十里李光百官渡詩曉雨微茫水接天隔江茅店有炊煙杖藜獨步沙頭路猶記當時趁渡船嵊縣子猷橋於越新編在縣東五里晉王徽之返棹處世説新語王子猷居山隂夜大雪忽憶戴安道時戴在剡即便夜乘小船就之經宿方至造門不前而返人問其故王曰吾本乘興而行興盡而返何必見戴曽幾子猷橋詩小艇相從本不期剡中雪月並明時不因興盡回船去那得山陰一假奇張旌子猷橋詩千山雪霽玉嵳峩百里衝寒特地過縱使興闌回棹去絶勝俗客到門多南門橋嵊縣志在南門外南津渡當南北通津元末有浮橋廢明嘉靖二十六年知府沈檄縣造木橋名沈公橋王畿為記尋圯萬厯元年知縣朱一柏置渡船二隻渡夫二名每年修理三十六年邑進士周汝登請知縣施三捷建石橋長亘里許廣厚通輿焉嗣知縣王知逵縣丞王文運修之天啓間推官李應期崇禎間知縣方叔壯相繼增造復為怒濤衝圯國朝康熙間知縣張逢歡縣丞胡玒典史毛鼎鉉重修西門橋於越新編在縣西門外明邑民王漢二捐金甃石橋垂成洪水衝壞嘉靖間知縣談潛因舊迹益工以成嵊縣志萬厯二十九年知縣吳濟之縣丞邵斗重建國朝康熙七年知縣張逢歡縣丞胡玒典史毛鼎鉉邑進士尹巽延僧明道募助修葺謝公橋嘉靖浙江通志在縣西一里因康樂得名釋紹嵩題謝公橋詩白雲深處小橋橫流水涓涓古意生多少升沉都不見至今留得謝公名望仙橋𢎞治紹興府志在縣北四十里嵊縣志舊名嶀浦橋明萬厯元年主簿吳褀重建崇禎五年山陰胡氏徙建去舊址十步後為洪水衝斷布以竹木屢修屢壞國朝康熙六年知縣張逢歡等延僧自一募助重建尹巽為記沐恩橋嵊縣志在縣北六十三里舊為木橋明𢎞治間邑人鄭嶽易以石孟愛橋嵊縣志在縣西十五里明正統間知縣孟文嘗勸農於此故名橋新昌縣桂香橋成化新昌縣志在縣東一里仙桂鄉二十都三溪橋新昌縣志在縣西十五里邑人呂天章建石橋名勝志水經注云浦陽江東徑石橋下有石井口徑七尺溪之兩旁皆髙山山有石壁二十餘丈輿地志云剡東百里有石橋里人傳云舊路自石笥入天姥今石笥橋下一大井與水經合疑即此也頂斯寄石橋僧詩逢師入山日道在石橋邊别後何人見秋來幾處蟬溪中雲隔寺夜半雪添泉生有天台約知無却世緣古松橋紹興府志在縣東北二十里當台寧三水交衝之地邑人劉炳建司馬悔橋仙都山志在縣東南四十里舊傳司馬承禎隱天台山被召至此而悔因以為名土人重建此橋板書其上誤以悔為晦曰司馬晦橋其義與字傳之益舛按雲笈七籖載司馬晦山在台州天台山北係第十六福地李明仙人所治之處山在天台新昌二境間故橋以山得名周文璞送人之桐柏詩半里松黃蘸碧波狂夫於此欲如何洞天春曉歸不得司馬悔橋芳草多濟川橋新昌縣志在縣北溪邑人潘復寵等建有濟川庵置田贍僧守之三溪渡萬厯紹興府志在縣西二十里舊有石橋每春夏水暴漲即壞萬厯中知縣田琯置渡舟以濟之浙江通志卷三十六
