body:
  text: 浙江通志卷二百六十八藝文十銘塗山銘并序唐栁宗元維夏后氏建大功定大位立大政勤勞萬邦和寧四極威懷九有儀刑後王當乎洪流方割災被下土自壺口而導百川大功建焉虞帝耄期順承天歷自南河而受四海大位定焉萬國既同宣省風教自塗山而會諸侯大政立焉功莫崇乎禦大災乃錫元圭以承帝命位莫崇乎執大象乃輯五瑞以建皇極政莫先乎齊大紀乃朝玉帛以混經制是所以承唐虞之後垂子孫之丕業立商周之前樹帝王之洪範者也嗚呼天地之道尚德而右功帝王之政崇德而賞功故堯舜至德而位不及嗣湯武大功而延祚於世有夏德配於二聖而唐虞讓功焉功冠於三代而商周讓德焉宜乎立極垂統貽於後裔當位作聖著為世準則塗山者功之所由定德之所由濟政之所由立有天下者宜取於此追惟大號既發華蓋既狩方嶽列位奔走來同山川守臣莫敢遑寧羽旄四合衣裳咸會虔恭就列俯僂聽命然後示之以禮樂和氣周洽申之以德刑天威振耀制立謨訓宜在長久厥後啓征有扈而夏德始衰羿距太康而帝業不守皇祖之訓不由也人亡政墜卒就陵替向使繼代守文之君又能紹其功德修其政統卑宫室惡衣服拜昌言平均賦入制定朝會則諸侯常至而天命不去矣兹山之會安得獨光於後歟是以周穆遐追遺法復會於是山聲垂天下亦紹前軌用此道也故余為之銘庶後代朝諸侯制天下者仰則於此其辭曰惟禹體道功厚德茂會朝侯衛統一憲度省方宣教化制殊類咸會壇位承奉儀矩禮具樂備德容既孚乃舉明刑以弼聖謨刑戮防風遺骨專車克威克明疇敢以渝宣昭黎獻底定寰區傳祚後引丕承帝圖塗山巖巖界彼東國惟禹之德配天無極即山刋石貽後作則石傘峯銘唐顧況亭亭石傘有物有名如蓋若傾如芝一莖石傘山東山銜日宫石傘山西山銜月宫南巒北阜首出屹雄禹穴碑銘并序唐鄭魴惟帝聖世時必有符命在昔黃帝始受河圖王籙宓羲得神蓍而垂皇䇿配璇璣玉衡以齊七政舜繼成六德文王獲赤雀丹書而演道定謨豫亦以謂禹探其穴得開世之符而成乎水功夫神人合謀而行變化天地定位隂陽潛交五行迭王斗建司節嶽尊山而瀆長川乃至日星雷風禎祥祕奧三綱五紀萬樂百禮人人物物各由身生無非元功冥持至數吻合以及之者王者奉天而行故聖神焉帝皇焉彼聖如仲尼有德而無應故位止於旅人福弗及生靈乃歎曰鳯鳥不至河不出圖吾已矣夫然後知元命者軒後命者羲受命者唐與虞成命者禹備命者文仲尼不受命乃假人事而言故有宗豫之説後代無作焉立言者一仁義以束世教瞽瞶蚩蚩使絶其非望職業之外存而不論豫讀夏書無是説司馬子長自敘始云登會稽探禹穴不然萬祀何傳焉惑矣蒼山之瀦呀如淵如陵徙谷遷此中不騫雨洗煙空𣢺然莫窮噫實禹迹之所始終唐興二百八祀寶歷景午秋九月豫從事於是邦感上聖遺軌而學者無述作禹穴碑廉察使舊相河南公見而銘之曰禹穴宜載夏與秦胡為而不載禹貢無文秦始皇遊會稽李斯刻石亦不言古而不載遷與鄭胡為而載始司馬遷自敘探禹穴而后千百年無説至鄭乃製斯碑豫以謂天德統萬止言其蓋地德統萬止言其載堯德統萬止言其大千川萬山皆言其會一符一穴禹穴藏五符統而言之故曰一不足為最故夏與秦俱不之載而人以之昧雖山之堅雖洞之濊有時而堙有時而兑歲其萬千風雨淘汰亡其嵌呀叢是蘙薈惟鄭與遷斯碑斯載斯時之賴明州新刻漏銘宋王安石戊子王公始治於明丁亥孟冬刻漏具成追謂屬人嗟汝豫銘自古在昔挈壺有職匪器則弊人亡政息其政謂何弗棘弗遲君子小人興息維時東方未明自公召之彼寧不勤得罪於時厥荒懈廢乃政之疵嗚呼有州謹哉維兹維兹其中俾我後思梅子真泉銘宋陸遊距會稽城東北七里有山曰梅山山之麓有泉曰子真泉遊者或疑焉智者及道人求笠澤漁父為之銘銘曰梅公之去漢猶鴟夷子之去越也變姓名棄妻子舟車所通何所不閲彼吳市門人偶傳之而作史者因著其説倘信吳市而疑斯山不幾乎執一而廢百梅公之去如懷安於一方則是以頸血丹莽之斧鉞也山麓之泉甘寒澄徹珠琲玉雪與子徘徊酌泉飲之亦足以盡公之髙而歎其決也五畝塍銘宋成無玷湯湯苕水發於天目兩湖灌輸歲堙為陸漲流時至雲日蕩沃旁合百源滙於山足勢溢以傾怒濤奔蹙髙卑之際歲惟版築拓基五畝隨潤北屬水溢乃流如槩諸斛蓄泄得宜髙下成熟自塍之壞歲亡半菽茂宰因民無廢不復慮始云難勸趨判速既堅既厚旁郡蒙福咨爾後人嘉績斯續南湖之陽鳯凰之麓石林崢嶸驚湍回曲勒此銘詩尚識陵谷德泉銘并序元鮮于樞橫陽岸海為邑土層淺薄井泉不冽邑人病之前宋時邑人宋氏得清泉於昆山之陽引以巨竹承以石池邑人取足焉歲用竹百丈役二人皆出宋氏今有年矣大德元年九月本道廉訪僉事完顔貞按部見而嘉之時樞亦以公事至州公曰是不可不名亦不可不述名而述之非子其誰毋讓樞退考諸易得蒙之象遂名曰德泉且告之曰斯泉也當蒙而未達梯崖架壑期於必致非果行歟既達矣蓄以育物非育德歟育已之德而及於人若宋氏者非君子歟以德名之其誰不然公曰諾乃大書二字於石旌善勸功焉銘曰觱沸清泉發兹靈嶽柔滑甘寒可烹可瀹筧以致用厥施斯博流泉散雪四時不涸瞻彼巨海百川所歸出而不返作醎是宜如人之身漩汗涕泄泉出百原譬猶華池味甘色白灧灧生肥飲之夀考松喬可希坡仙之言信不我欺有美宋氏心瘁體勤果行於已育德於人功在邑人澤流子孫侃侃廉卓旌善勸功扛鼎之筆虎螭拿空勒銘山根與泉無窮大若巖靈真宮銘并序元虞集大若巖在溫州永嘉縣北八十里道書所謂赤水丹山福地者也其山周回五十里巖髙十七丈深百四十尺廣倍之石環中虛容光東啓居焉如在屋室大抵世言洞穴多在幽暗險絶必傍行仄入莫窮其所至篝火捫索乃頗有見以為竒未有若是之明爽者也有石髙數丈當其前若門屏然其北有東西兩溪合流導巖下滙為龍潭而南出其西溪相傳有赤水時出飲者養夀今山下多老人百十歲而赤水不常有也沿溪皆竒石可以物象名者若香爐石笋屏霞蓮花之屬凡數十處其不可名者至多也溪之源有兩瀑布皆垂數百尺一曰如漈一曰傅巖傅巖尤奔怒者也晉永嘉中道士傅隱遙居此後王貞白隱此洞其弟子朱孺子見白犬走枸杞叢下疑之掘得根若犬形者烹食之身輕登石臺仙去故名其臺曰飛升臺而枸杞豐茂異常産來遊者皆擷茹之後亡或云猶在曾有人見之其後陶隱居著真誥此巖又名真誥巖又嘗煉丹層巖中夜坐時或望見光煜煜然云是丹光也唐時人間以水旱疾癘禱巖下輒應咸通七年恩王府參軍知永嘉監崔元德始請於朝立祠度道士居之與田四百五十畝禁樵採一里宋宣和中建三清宫巖中賜名廣福靈真宮巖中風雨不及至今若新成者又有兩殿五祠一鐘樓皆在巖下道館庖庫在巖外慶元中道士婁懷玉王師皓知宫事皆修治之入國朝用溫州道録兼領故其徒散理别業宫廢不治大德四年道士曹淵龍始專居之出私錢募人墾其山隄其溪水導其堙蕪得田數十畝益以已産悉資宫中之用作齋堂治凡屋之當治者幾二十年而宫事備天子璽書護之俾以其徒世相傳勿敢有所易淵龍瑞安人其先纍世事故宋致位清顯故家凋喪方從黃冠遊至是兩被恩命提點宮事蓋吉士也宜其如此淵龍嘗曰上巖後山一里得最髙處遊者至此聞鐘磬聲相戒勿敢動而去淵龍數至其處無所聞然實竒勝地蜀郡虞集為著銘曰若中虛容作室門出震當離日承闕端鎮巨石陶朱君千百年赤水隱源木葛綿綿曹淵龍修其宫學仙翁萬靈受命斥物怪非有道者勿敢至矧敢壞勒以吾銘示千載連槐堂銘并序明宋濂人事無與於草木乎孝友之徴古多記之矣草木果符於人事乎大舜閔曾之行未聞形草木之祥也然則何所定歟人之於天體異而氣同養吾氣以感之寒暑自我而平日月自我而明山川自我而不震驚鳥獸可育四靈可至況草木乎然而有得有不得者變也物隨應者常也變者天之權常者天之經以聖賢之德盡為人之道固其職也雖弗報焉可也未至於聖賢而能不悖乎道烏可以弗旌乎是權也或因物以著戒或設象以假義又權之教人也茍逐逐焉而報之智者可以理推愚者可以幸得則不足以為天矣天道之權吾於會稽周氏徵之周氏兄弟曰彞兑皆賢而文居新昌彩煙山中事母甚孝入門少長秩秩有序其氣穆然若陽春鄉人稱為孝友舍傍樹槐一章髙尺餘岐為二幹及肩交合為一左右之枝各三挺然上數尺再合而再交焉觀者咸歎其異以為彞兑孝友之徵乃以連槐字其堂其友王宗成來京師為請銘槐之為音近於懷懷者思也所以表其孝友而教後人以思也後人覩斯槐寧不悠然以思乎其枝歲繁而時茂猶子孫之愈久而多也子孫雖多其於祖則一而已猶槐之衆枝本於幹也嗚呼周氏後人孝思其不忘乎此天之所以教也烏可以不銘銘曰周氏孝友德斯植天産厥槐世希覿巨本數圍去地尺岐為雙幹挺雄特及肩而交交復副既副羣枝合如織鄉民里耄嘆以嘖炯哉竒祥古未識吾知元化彰厥德俾爾後嗣思以則枝繁幹别勢莫抑同氣殊分麗千億槐枝可連人不可析浦江縣漏刻銘并序明陳公凱婺屬邑浦江舊有漏刻歲久器敝知縣事何宗姚續置且法最詳人皆準而信之後為當路者取去莫知所留矣至大己酉達嚕噶齊呼都克婁實克敦武慨思舊典遂依式重造且處其所以守之者非勤政而知所先務歟前婺州路月泉書院山長陳公凱為之銘曰撫字之官大要以剸繁治劇興滯補敝為最厥有懈廢匪政之成其政維何必也寬猛克濟弗棘弗遲然後愛民之仁推而為創物之智而咸服其精故三尺之箭五斗之瓶不贏不虧以正以平晝夜晷刻申縮合度可以測隂陽寒暑四時之運行凡任於兹者盍思古人挈壺氏之有職前賢蓮花漏之有銘後之視今今之視昔亦庶幾更點之分明矣尊經閣銘明章懋有閣峩峩屹立儒宮上摩奎宿下拱文峯閣中何有有圖有籍龍牒龜文蟲篆鳥迹外史所掌廣宇所司九流七略並蓄無遺翠藴丹函牙籖寶軸簡蠧香藝編殘汗竹惟閣有書莫尊於經聖筆刪定萬世典型易象春秋詩書禮樂法言大訓灝灝噩噩世遠人亡斯文在兹何以尊之古聖是師丹碧輝煌匪閣之美昭昭人文天經地緯梁棟崢嶸匪閣之崇洋洋聖道蟠極蒼穹閣以藏書象彼東壁於經斯尊視此銘刻贊三髙贊宋朱臨矯矯朱公當世英雄卓然先識力避成功種也不悟語已旋凶越壤千里齊祿萬鍾取如拾芥棄若飄蓬五湖長往千載清風范蠡翹翹季鷹江東步兵抗心世務俯首塵纓顧時多艱無日升平秋風動地鱸鱠馳情載惟羊酪不似蓴羮終焉故國江水長清張翰煢煢魯望志履疏曠時謂散人自比元亮清不恥耕貧不輟釀蓑笠扁舟煙雲白浪皓首叢書焦心絶唱遺編如新可見髙尚陸龜蒙十二先生贊宋史浩蓬萊黃先生商於六里肥遁四賢公居其間美行卓然時乎一出羽翼翩翩漢祚四百由兹卜年大梅梅先生堂堂偉人漢世之杰方時昏昏上書剴切退伏市門或來明越我遊大梅尚想忠烈石臺葛先生公遊宇內蹤迹殆遍一月千江無處不見大隱石臺波光如練出入丹林清可覿面石窗賀先生道既不逢去當勇決野服黃冠孰能羈紲鄞水煙波鏡湖風月髙標凛凛濯世執熱大隱楊先生道契皇王德參天地俯仰觀察出處一致三聘及時疾驅遠避齊魯大臣公其無二慈溪杜先生猗歟髙節抱道弗違下視流俗突梯脂韋荆國之清叩其元微九原可作非公誰歸甬水王先生生負大才棲於甬水雖有聲名且無生理陋巷簞瓢王公知己百世聞風莫不興起西湖樓先生翁臨西蜀一化南閩公以是教作成吾鄞逮今士子傳學彬彬收功貽厥世有顯人桃源王先生公修隱德約處桃源文肩李杜行踵淵騫教育千里執經滿門天之報施煌煌後昆望春王先生使者入境金橘是求公責以義彼實懷羞晚使作邑投劾歸休鄧城彭澤千載同流湖西周先生宦遊寡偶不如投間言之孔易行則惟艱公乎勇退雙鬢未斑蕖月蘋風誰復追攀奉化孫先生朱梁僭竊公懷憤恥仕還民服年著甲子寥寥唐末有兹義士遺編雖存惜無信史八賢贊宋王應麟童判子賢哉若人儒行塵迹悌友祥順展也實德我興視世口舜心跖居市不市前言匪激蔣璯學必以已義榮道腴博觀約守胸吞石渠良朋問疑詡徑未蕪誰其似之子雲林閭王茂剛夢吞三畫韞玉山棲象外繫表捐筌棄蹄心學自得羲文與稽緒言不傳林深草萋顧主簿言行慥慥白賁素履忠信篤敬行乎州里其德如蘭薰我晉鄙漢之長者周之吉士李宗質蒸蒸純孝其感以天昔朱今李盛事光前綵衣華髮介以耆年孰補南陔彰善旌賢李猷黃子遊信義之重死生如一求諸古人欒布脂習偉哉二士卓行特立砥訓薄俗百世矜式陳之翰貴義如璧賤金如土不億不信莫豫敢侮誠於為善君子所豫彼晝攫者羞愧汗雨東陽十孝子贊明宋濂十孝者皆東陽人其事載於郡乘為詳豫讀書之暇因探其昊天罔極之思而為之贊以風世之為人子者秦顔烏古有純孝厥姓惟顔父喪未葬行泣道間我畚我鍤是薶是瘞彼羣烏何知銜土豫助我冡既封烏吻血流感爾異類愧我同儔皇風日漓借耰鋤而德色誰意霗雲之四蒙忽當空見此皎日千載之下禮憲淪胥豈獨愧君烏亦不如有廟嚴嚴春秋是祀用興薄夫俱作孝子吳斯敦有孝者斯峴山之阿父罪當誅兒心奈何自非吾親曷從生我我寧隕身父死烏可九關峩峩虎豹斷斷泣血上書願易以身王用爾恤卒全父命更旌爾門風彼不令池波奫淪宰木扶疏清風肅然過者下車晉許孜嗟嗟許生實孝於親胡風水不停遘此難屯輤車既載負土築墳我親我塴敢曰勩彼鄉民手胼足胝我不為辛巾笥猶存几筵不改惕然念之吾親何在秋霜凝凝春雨湄湄父兮母兮得無苦寒與飢兒既不可見寧能不念兹天髙可極此情罔極獨鹿不憫我觸我松柏嗟嗟許生厲志不移終身之慕於子見之唐馮子華緬彼孝馮結廬墓傍思親不見欲與俱亡白日寥寥悲風四起蒲伏號呼哀徹心髓天錫嘉瑞慰我孝思有皎斯有燁斯芝孝馮曰噫吾焉用汝九京莫興百瑞奚補惟爾孝子樹我世防雖歷萬祀厥德彌章自公之亡肖公者幾茫茫堪輿孰非人子唐應先卓哉至行衆人所難眷我應君抆涕汍瀾親之云亡中心咽塞雖草生髮間何暇束櫛昔處膝下其樂泱泱今我來思但見白楊彼蒼者天曷不我惻茍可從之我生奚恤爾心之苦爾行之優雙闕峩峩卒承天休唐唐君佐唐氏之子以孝行聞生死一節弗岐弗分惟思親弗置鞠明究曛誰無父母以樂以愈今我何罪獨行次且我罪之深我宜隕墜胡獨使我親先彼朝露昊天不弔直至於斯渺渺音容如何弗思官用褒旌封章在舍匪私爾一人式勸來者唐陳太竭浦汭之內有氏曰陳親沒居廬衰麻終身心劬形瘵杖而後起一氣如絲去死無幾朝哭如吞暮哭尤不忍聞松風翛翛林鳥嘐嘐來助豫之悲號遐思弗寧起奠我爵果肴在前烏鳥為之不啄世渚失防頽波滉漾我思古人古人焉往宋董少舒有倬董君父以令終躬負厥土馬鬛其封四郊無人夜寒如水黑飈潛興其臨如鬼董君出廬擁墳撫膺念父寥寂長哀無聲日兮月兮能照下土寧不憫我拮據最苦願亟入九泉奉我父母靈芝煌煌駿發爾祥蓋紫幹黃於燁有光有倬董君德聲斯不忘宋金景文瀫水之州三山之坡下有孝子孝如之何父疢在首籲天請代願萃於身我親罔害母棺未窆執以前天光下爥五色燦然五色之燦未足為偉怪雹獰風勿犯其里茍匪中忱曷以臻此綿代是師於戲孝子宋賈南金孝道之𢎞百行所從誰與賈氏實敦古風生弗離親殁安可棄忍令親之玉體為泉所閟晝雖不之見接以夢寐夢中相見宛其未死覺後求之寒燈在几得不慨兹澘澘墮淚眷爾孝德閔我章逢梔蠟其貌黼黻其躬父子相軋或不相容我述贊辭用發民衷宋忠簡公畫像贊明蘇伯衡公之力足以旋乾而轉坤公之功足以攘夷而安夏始以一言能返北斾而南還後以二十四疏不能回南轅而北駕且留鑰之任方切而巧言遽入於帝聰度河之志未酬而大星已殞於中夜何人之於公則知媢嫉而天之於公則不知假借此有志之士百世之下所以想英風而激昻拜遺像而悲吒也先賢贊明黃潤玉大里黃先生公商山逸老秦坑遺儒權時一出卒定漢儲紫芝罷歌黃墓封土音容寥寥名髙千古中丞任先生奕堇子遺風人恬隱逸避秦逃漢終泯聲迹德輝日麗文藻春榮名髙位顯達哉中丞仲寧虞先生喜先君仕吳先生值晉三召不起孰知其藴氷操淵學海度風襟丹青莫尚煥乎志林侍中虞先生荔學明王道文冠士林臺城厄運莫遂初心一弟仕陳氷雪同操二子興唐奎璧聯耀文懿虞先生世南家傳懿學宦顯明廷褒嘉五絶獻納一誠公生也榮百年蓬瀛公殁也寧千載昭陵祕監賀先生知章夢遊紫府蟬蛻禁林風月觴咏雲水身心李仙夜郎杜老西蜀賢哉先生鑑湖一曲大隱楊先生適羽翼漢嗣賔客唐儲黃魁四皓賀踵二疏道在先生不疏不皓宋爵莫羈四明一老慈溪杜先生醇先生有道不求人知耕漁養親德行可師鄞慈建學荆公起之二邑文風大盛於斯鄞江王先生致天佑先生富道而貧妻收遺􅕗子拾墮薪遁世憂民介甫稱仁左楊右杜鼎峙吾鄞正議樓先生郁仁乎正議簞瓢屢空春風鄉校時雨名公晚遺祿養邈爾雲鴻本支百世子孫其逢桃源王先生説鄞江嫡傳尊稱桃源光啓書院宸翰昭宣嫓美四賢鄉祠赫赫流慶後昆君子之澤清敏豐先生稷水衡之歌始慰榖城章蔡之疏終忤祐陵正大之學貞徑之節元祐一網崇寧一轍殖德林先生暐事親而孝與人而忠明於知德終始了翁紹興黌宇首捐萬金祀公於學天理人心特進林先生保贊政帥幕活殍實多遠迹權門立朝幾何中興龜鑑帝心允惻鄉飲酒禮天下是式憲敏髙先生閌卓乎憲敏受學龜山召和之對君心之間忤時東歸推衍麟史文獻相承亦有孫子萬竹髙先生元之五舉不第授業門人九騷見志廬墓終身萬竹森嚴萬卷沉酣實多著述允矣荼甘忠定史丞相浩學明天人四十始仕善政嘉猷允光青史上而八行下而三相承緒惟公賢者氣象文節魏學士杞公在南宋名德煌煌使金似弼相國猶光陶徑未荒潘輿是悅觴政詩郵碧溪風月文靖舒先生璘先生之學自陸而朱融會貫通卒為大儒美境佳趣風雨敝牀師模後進煦然春陽端憲沈先生煥偉哉端憲本於躬行師道尊嚴郡國是倡曰道與職惟一無二任重道遠名昭百世慈湖楊先生簡慈湖啓教象山是宗一誠貫徹萬象昭融臨民若神處已即易巍然祠宫四方是式正獻袁先生燮有鄞儒族自髙而玄道隆正獻裕後光前笙鏞著述天地其心魯無君子後學奚欽敷文汪學士大猷孩提講經客訝秀穎耄耋休官賜諡莊靖惟時學士一舅二甥風節酷似有光四明文懿陳學士居仁公之事功先定大計公之文章首見兩制委蛇鳯池前父後子世綸名堂光賁來嗣宣獻樓學士鑰隆興擢第歷事三宗初陳黨禍卒忤姦雄飄然居間晚登台位行已大端淵乎攻愧迂齋樓先生昉先生之文汪洋淵永援據典確風止水靜泝其體裁源自東萊黼黻文治雲漢昭回正肅袁先生甫巍巍正肅作聖有功擢魁嘉定蹇蹇匪躬禽鳥春風子樂攸同髙山景行允矣儒宗深寧王先生應麟春秋絶筆瑞應在麟宋祚訖籙瑞應在人尼父泣麟先生自泣出匪其時吁嗟何及文潔黃先生震仰惟宗人生值宋季程朱是師今古畢記尊其所聞行其所知逢時孔艱厥德普施進士袁公鏞確乎其誠浩然其氣通貫神明充塞天地一身成仁闔門死義孤忠竒節光昭後世剡原戴先生表元有宋遺老避世投間先生頴出薰陶其間商鼎周彞古雅清竒規模後學望重當時松鄉任先生士元純乎先生炳乎文章講道吳越納交公卿鬱鬱松鄉飄飄松雪出處雖殊歲寒一節文清袁先生桷四明文獻宋斯唐虞在元宦逹惟公一夔祖孫勝賞有堂有像流水髙山吁嗟絶響畏齋程先生端禮考亭鳴道先生有傳塤倡箎和伯仲後先佐王之才希聖之學四方仰之二程出洛奉川陳先生桱煌煌列祖繩繩進士風節蟬聨卓冠宋史先生父子家學有傳千載直筆通鑑續編象山錢尚書唐飛龍在天見龍在田千載際遇四方晏安輔翼斯民間衛斯道生死以之國朝一老長史桂先生彥良沉霧晦冥元豹藏形太陽朝升丹鳯斯鳴窮隱書堂達登上相際遇有時大儒德行忠襄金尚書忠時窮則隱時通斯貴帷幄有功考終祿位居不甲第墓不穹碑生順死安前戒後規名宦贊明黃潤玉越大夫文公種飄飄鳬鷗五湖扁舟遲遲桑梓一劍屬鏤長頸烏喙隆準龍顔功名之際古今所難刺史黃公晟四海擾攘公奮於鄉姻錢斃董城保一方梁帝唐衰納土錢王一壞宿草百世流芳知郡李公夷庚郡有鄉校開元之詔公在天禧定學遷廟左壇右宫絃誦渢渢英才輩出翳公之功忠肅陳公瓘視日不瞬知其向君乘舟莫諭知其敗羣責沈有文愧不識程尊堯有集嚴乎闢荆制置仇公愈建炎兵燹城復於隍獨存禮殿巋然靈光捐俸給田漸還舊貫公之德星奎璧輝煥忠定鄭公清之天啓穆陵公與有功端平之政四方嚮風建節鄉邦增光學校書院祀師有裨名教郡守王公璡國之遺老時之清臣政教兩盡風俗一新富貴不淫患難奚恤神明其心始終厥德郡守鄭公珞仲弓之資仲由之學堯尊五美端屏四惡士安於業民樂其生頌聲洋溢沒世不忘辭懷忠堂辭并序宋王炎顔魯公知湖州作放生池刻碑池上其碑現存碑畔有魯公祠堂題曰懷忠北山程公作楚辭一章刻石廡下其辭甚古然未盡事實因以辭續之辭曰跂逸駕兮前修佩武符兮典州迹已陳兮德新可敬而可慕兮幾春秋意其存兮閟於萬年之原謂其逝兮乃在羅浮之巔奮忠貞兮取義貫羲娥兮爛然隘塵寰兮上征揮八極兮為仙黃鵠脫驂兮素蚪停駟幾弭節兮合遺命而來顧髙辨蒼蒼兮清苕濔濔公來遊兮湖山增美遊觀罷兮來歸有浦與河兮清泠之池魚鳥懷生兮欣欣焉其有依銀鈎蠆尾兮燦翠珉而陸離絃琴兮擊鼓羞羔豚兮酌醑跪起以薦兮願公燕喜公燕喜兮吾民樂康却災沴兮蠲除不祥雲來兮萬祀蒸嘗兮不忘思媺人辭并序明宋濂吾鄉吕成公實接中原文獻之傳所學弗畔於孔子之道欲學孔子者必自公始公骨雖朽著書猶存古有曠百世而相感者況與公相去如此之甚近乎聞而知之必有其人托物引類作媺人辭辭曰惟媺人之惜嫕兮賦姱質於自然修蛾規而凝黛兮曼目轉以成聨妥鬢髮而如雲兮黶輔巧以承顴纎腰秀頸若鮮卑兮容都曼而體便娟寶璐縈而右繞兮桂徽墮以半偏懸明月以綴佩兮錯水難而傅冠向瑤臺而微步兮意淡靜以貞間宓妃折芳馨以相遺兮復容與乎江干勢翩翩其褰舉兮若遊龍之在淵胡人間不可以久留兮遂凌穹乎髙寒馮道紀以為御兮鍊天和而為飱徑驅馭於陽隂兮時上下乎星辰歎豫生之何晚兮不一覩於芳儀念姱嫭之鮮雙兮遡回飈而曾思歘愁悴而委惰兮氣涫􅘺以如炊道茍可以之兮視萬里猶門墀登嶇􅋂而騁望兮正晨遡之蒼涼氣曀豁而誾誾兮莽山川之縱橫樹輪盤斜而偨虒兮薠草靃靡以相望豐狐思羣而永嘷兮文鷮慕類以徐翔企精爽之不徠兮空雲龍之將將蹇侘傺而望絶兮曜靈䀛其西藏降崇邱而臨曠野兮循故轍以東歸向闌楯而徙倚兮境外嬰而愁內滋新蟾皎以出天兮想纎美之曲眉繁星爛而成文兮懷繡帔之陸離蒼灝霩落而無滓兮思玉體之弗緇拂蘭袖而起步兮復經緯乎穴庭苦鴻雁之雍雍兮厭習蟲之薨薨撼户檈以悲惻兮惕黶容而弗自勝轉曲牖而入堂壇兮牉獨坐對乎華燈燈影搖曵而如鳥􅎶兮象中心之靡寧寒厖狺狺而競吠兮耳恍聞於跫音疾倒屣以啓關兮飈鬭葉於枯岑縹綿綿而莫抒兮托幽寄於瑤琴聲嗚咽而思深兮類孤鶴之鳴隂更寂寞以將闌兮斗杓旋而向東舒枕衾而就榻兮期夢寐以潛通精氣注以弗釋兮橋有物而衡中息纚纚以方微兮魂翕翕而上征造旬始而謁太儀兮羣靈繽其若叢氛旄溶以隨猋兮鳯旍沛而嬰空馭象車而乘虬節兮鞭列缺以斥豐隆豹纛熊幡聿皇以奮兮樛流紆譎鬱以相蒙左撝右衛動以弸彋兮倐胂倩浰雲滃而雷舂回穴幡纚汨以卉歙兮吸嚊潚率藹以蒙鴻穆眇眇以前邁兮翩衯衯而弗止莽冥冥以無垠兮勢皇皇而迆靡超氛埃而淑郵兮竟按轡乎朱陵長麗舉噣以向日兮有赫氏之華文揚芒以上猋兮粲重離之丹門炫赤玉之寶章兮列八龍之威神歘東趨於蒼極兮青雕紛其並迎羣仙衎衎以方饗兮奏靈和之鳯笙四酬芬而凍歆兮暈玉色而帶頳揖素威以升皓宮兮盼四極之浮浮蓐收顧余而破顔兮錫鏤瓊之華鈎謂貞白以自守兮合左契於伊周折寒門而燭元冥兮朔風颸颯以吹裘有夫元巾而擐甲兮握靈光以為驅重隂互而未啓兮肅元氣之幽幽四方非不可居兮悵所思之莫余都馳兩轂如飛丸兮又滔滔而遐逝靈氛告余以吉故兮子何為兮獨悲若彼中天之有居兮隔人世之風雨吾將導子之一至兮庶弗愆於恆素怊恍惚以從之兮駕剛飈以徑度䀛光炎之炘炘兮綝纚鬱決而不可正視雕甍彤楹屹以上起兮瀏濫𢎞惝雲譎而波詭連卷欐佹沓以軋芴兮崴魁幼眇矗以髙峙中洞房之沕穆兮乃媺人之幽居使曼姬為豫通訊兮儼再拜乎堂垂䀛朱扉之洞開兮移玉趾之委蛇珠明玉潔不足以為喻兮光照耀乎東西吐芳辭以若蘭兮意勤勤而告余曰皇降靈兮昭質弗沫毋染爾穢兮昧厥施紉藥襦兮曵􅉅斾結蕙纕兮張椒幃勺桂漿兮咽蓀麋索胡繩兮畦揭車集衆芳以遠蒸兮羌郁郁而斐斐余俯首而敬聽兮書鞶紳以自規海色動而報曙兮陶去幽而開寤雖嘉辭之盈耳兮邈若人其何處遂捫膺以沉思兮顝獨處而繚戾也誠因言以會心兮將神交於千載也亘天地而無初終兮惟我民之秉彞道𢎞敷於上下兮必有人而繫之往者固不可作兮幸方册之昭如日參驗於厥躬兮若面命而耳提跛鱉之媻姍兮固難齊於六驥能孳孳而弗怠兮亦千里之可至余雖質而力單兮敢不沾沾而奮厲帶鈎矩而佩衡兮撤蔀蒙而袪罻期有形以必踐兮始俯仰其無愧縱不得媺人以與之遊兮又何異同功而並世青山辭明宋濂青山崔崔白雲溶溶我疑其中仙人所宫風馬雲輿霓旌羽幢遊行太空翩然相從望而不見使我心沖我本金華牧羊之童口頌蘂笈有聲如鐘震撼巖壑無礙不通謫居下土黃塵濛濛五色之文布滿西東秋髙露清陟彼危峰呼吸元氣精神內融嘯傲萬物後天而終雜著五泄山水志明宋濂五泄山在婺杭越三州境上北距富春南據勾吳東接浦陽其山水最號竒峭齊謝元卿常以採藥深入其中而宋刁景純吳處厚亦頗遊焉自西坑嶺入過遇龍橋北行二十步始入西潭前橫一溪水甚寒履之如氷由溪而前徑小潭傍有嶕石突起類大甕斜覆乃捫石而登一失足輒墮又行二里所地稍夷曠怪石四瞰峰巒環列獻狀其紋縈縈然類神工鬼斧所雕刻者山多猴遊人或恐之撒石亂下如雨又前行半里所泉自石竇中出瀏瀏作聲若琴若笙竽泉西流滙為小窪瑩徹泓澄毫髮不隱鯈魚數尾洋洋往來如行琉璃瓶中見人至潛去窪左大樹離立極怪偉倒影入水中如畫又前行五十步大石閼道相傳有巖角肖鷹喙忽夜大雷雨喙崩下聲聞二十里又行三十步榛篠成林翠光浮映衣袂成碧色山蟲崖虺奔繞後先瞬目失所在至此則氣象隂幽絶不類人世如升蓬嶠坐水晶宮生平煙火氣消盡又自山腰緣葛而前竹籜覆地積厚動足輒仆又過十步許抵小潭小潭上曰西潭流水傾沫成白簾濶可七八尺冉冉下注滑而無聲兩旁石崖峭立苔蝕蘚暈時有水珠毿毿滴下歲旱鄉民禱龍於此遇禱時或湧取蜥蜴入瓶盂中持以歸多驗自遇龍橋至此約可五六里皆蛇盤磬折路行若窮又復軒豁其中勝致難得具述或言潭上有石河從石河至三臺塔人迹罕至莫詳也尋徑路而出斜迤而東過香爐峰峭拔上有石類香爐故名香爐北有峰圓而童名鉢盂峰或曰肖東甌雁蕩又名雁蕩峰遵雁蕩而南時有白雲覆於谷者曰雪峰屹如人立者名玉女峰嶄嶄勢欲柱天者名天柱峰其他諸峰星聨肺附登名圖籍者蓋七十有二焉復從崖東折度略彴趨三學士院院唐靈默禪師道場師常降龍於此遺迹尚存由院北深入又百餘步至東潭潭上飛瀑可二十丈怒暴倒擊崖竅中若運萬斛雪從天擲下白光閃閃奪人目睛至潭底輒復逆上有聲如輥雷人笑語咫尺不能辨猶聞甕中聲居人云每天風一號四山林木震撼欲折黑雲下罩杳不知昏曉歲多禱龍者其多驗如西潭復北折而西泝潭之源登響鐵嶺度紫閬山村人多舍篁葦間有平臯數百畝可耕溉傍沿石河又行一里所地名石鼓足頓之鼕鼕然越十步至第一潭潭如井睨之正黑投以小石鏘若佩環又越十餘步至第二潭圓如錡釜面廣而底敞大水驅亂石聚其內逮滿復泄去潭下石壁百餘尺險不可置足從其右懸藤墜下至第三潭潭甚深以線縋之下不見底其形方狹而長天向隂常有雲氣從中起疑有蛟龍潛其下人恆以幽悄為病第四潭咸不敢往或有以綯圍腰繫巨杙俯崖而瞰潭左右皆楓木其形大槩如第二潭而廣袤倍之側有晉劉龍子墓相傳龍子常釣於潭得驪珠吞之化龍飛去後人為壘石作塜或曰龍子之母葬焉世遠不可辨又其下至第五潭即東潭因其水五級故名之為五泄云噫造物之委形山水者其竒峭有是哉問士對三國吳朱育孫亮時有山隂朱育少好竒字凡所特達依體象類造作異字千名以上仕郡門下書佐太守濮陽興正旦宴見掾吏言次問太守昔聞朱潁川問士於鄭召公韓吳郡問士於劉聖博王景興問士於虞仲翔嘗見鄭劉二答而未覩仲翔對也欽聞國賢思睹盛美有日矣書佐寧識之乎育對曰往過習之昔初平末年王府君以淵妙之才超遷臨郡思賢嘉善樂采名俊問功曹虞翻曰聞玉出崑山珠生南海遠方異域各生珍寶且曾聞士人歎美貴邦舊多英俊徒以遠於京畿含香未越耳功曹雅好博古寧識其人耶翻對曰夫會稽上應牽牛之宿下當少陽之位東漸巨海西通五湖南暢無垠北渚浙江南山攸居實為州鎮昔禹會羣臣因以命之山有金木鳥獸之殷水有魚鹽珠蚌之饒海嶽精液善生俊異是以忠臣係踵孝子連閭下及賢女靡不育焉王府君笑曰地勢然矣士女之名可悉聞乎翻對曰不敢及遠略言其近者耳往者孝子句章董黯盡心色養喪致其哀單身林野鳥獸歸懷怨親之辱白日報讐海內聞名昭然光著太中大夫山隂陳囂漁則化盜居則讓鄰感侵退藩遂成義里攝養軍嫗行足厲俗自揚子雲等上書薦之粲然傳世太尉山隂鄭公清亮質直不畏強禦魯相山隂鍾離意稟殊特之姿孝家忠朝宰縣相國所在遺惠故取養有君子之謨魯國有丹書之信及陳宫費齊皆上契天心功德治狀記在漢籍有道山隂趙曅徴士上虞王充各洪才淵懿學究道源著書垂藻絡繹百篇釋經傳之宿疑解當世之槃結或上窮隂陽之奧祕下據人情之歸極交趾刺史上虞綦母俊拔濟一郡讓爵土之封決曹掾上虞孟英三世死義主簿句章梁宏功曹史餘姚駟勳主簿句章鄭雲皆敦終始之義引罪免居問卜督盜賊餘姚伍隆侯主簿任光章安小吏黃他身當白刃濟君於難揚州從事句章王修委身授命垂聲來世河內太守上虞魏少英遭世屯蹇忘家憂國列在八俊為世英彥尚書烏傷楊喬桓帝妻以公主辭疾不納近故太尉上虞朱公天姿聰亮欽明神武䇿無失謨征無遺慮是以天下義兵思以為首上虞女子曹娥父溺江流投水而死立石碑紀炳然著顯王府君曰是既然矣潁川有巢許之逸軌吳有太伯之三讓貴郡雖士人紛紜於此足矣翻對曰故先言其近者耳若乃引上世之事及抗節之士亦有其人昔越王翳讓位逃於巫山之穴越人薰而出之斯非太伯之儔耶且太伯外來之君非其地人也若以外來者言之則大禹亦巡於此而葬之矣鄞大里黃公潔已暴秦之世髙祖即阼不能一致惠帝恭讓出則濟難徴士餘姚嚴遵王莽數聘抗節不行光武中興然後俯就矯手不拜志陵雲日皆著於傳籍較然彰明豈如巢許流俗遺談不見經傳者哉王府君笑曰善哉話言也賢矣非君不著太守未之前聞也濮陽府君曰御史所云既聞其人亞斯已下書佐寧識之乎育曰瞻仰景行敢不識之近者太守上虞陳業潔身清行志懷霜雪貞亮之信同操栁下遭漢中微委官棄祿遁迹黟歙以求其志髙邈妙蹤天下所聞故桓文遺之尺牘之書比竟三髙其聰明大略忠直蹇諤則侍御史餘姚虞翻偏將軍烏傷駱統其淵懿純德則太子少傅山隂闞澤學通行茂作帝師儒其雄姿武毅立功當世則後將軍賀齊勳成績著其探極祕術言合神明則太史令上虞吳範其文章之事立言粲盛則御史中丞句章任爽鄱陽太守章安虞翔各馳文檄曅若春榮處士鄧盧敘弟犯公憲自殺乞代吳寧斯敦山隂祁庚上虞樊正咸代父死罪其女則松陽栁朱永寧瞿素或一醮守節喪身不顧或遭寇劫賊死不虧行皆近世之事尚在耳目府君曰皆海內之英也吾聞秦始皇二十五年以吳越地為會稽郡治吳漢封諸侯王以何年復為郡而分治於此育對曰劉賈為荆王賈為英布所殺又以劉濞為吳王景帝四年濞反誅乃復為郡治於吳元鼎五年除東越因以其地為冶并屬於此而立東部都尉後徙章安陽朔元年又徙治鄞或有冦害復徙句章到永建四年劉府君上書浙江之北以為吳郡會稽還治山隂自永建四年歲在己巳以至今年積百二十九歲府君稱善是歲吳之太平三年歲在丁丑越問有序宋孫因莊舄越人也仕楚而為越吟夏統越士也入洛而為越唱越俗之好吟咏其來尚矣亦聞有大述作者乎蘭亭有序修禊事也金庭刻銘愛輕舉也康樂山居之賦陶性情也微之妙宅之詩寫物景也若是者謂之大述作可乎曰未也若昔河東栁先生薈萃二河之遺事網羅千古之異聞作為晉問以昭來世斯文也可謂大述作矣先生晉人也居晉土習晉事為晉問職也晉有堯之遺風不可以有加矣居乎越者亦知越之事可與晉方駕乎晉堯都也越舜禹之邦也古有三聖人越兼其二焉加以種蠡之所經營王謝之所棲隱司馬遷李太白杜少陵之所遊覽以至國朝諸名賢之所流咏班班可考而大述作未聞也惟紹興間狀元王公以幕府元僚援筆作賦搜竒抉異雄麗卓偉雜用二京三都晉問體蓋自有會稽以來之大述作也然嘗熟復詳繹其間猶未能無遺恨焉何者越之四封最為廣袤南踰句無北畍禦兒東至於鄞西盡姑蔑至後漢時提封尚數千里今之越雖非昔之越然都督一道封疆猶不為狹而斯賦所録止及境內之山川此其遺恨一也會稽土地所宜以金錫竹箭為稱首職方氏九牧之貢莫先焉蓋金錫竹箭戎備所資非其他一草一木比正當表而出之而是賦所述乃雜舉夫粳秫桑蠶楓松桐梓雞頭鴨腳馬乳鳬茨木蘭㙁榴園蔬木菌之屬他郡獨無之乎此其遺恨二也並海魚鹽之饒東南大計仰焉栁河東晉問於魚鹽二物各為專條以侈其富饒鋪張揚厲無慮數百字彼三河所出尚未敵海藏之什一也兹賦才一語及之往往纖悉於赤鱔黃顙之族而闕略於縱壑之巨鱗搜羅乎餘糧石英之品而簡棄夫積雪之寶鹽此其遺恨三也紹興之初翠華巡幸駐鳴蹕者彌年實履舜禹之故迹升州為府冠以紀元且嘗就行殿舉大享禮中興之業於此乎濟可謂是邦曠絶之盛典而兹賦俱不之及此其遺恨四也然自有越以來所謂大述作者獨此一賦而已王公作賦後五十七年有書生孫因自句章徙餘姚逍遙鹿亭樊榭間處越土為越民飽越飯酌越水每欲補越絶之所未載廣越賦之所未備而未能也又九年帥憲新安汪公衣繡衣持玉節森畫戟載朱幡臨制七郡四十二縣臺府多暇百廢俱興輪奐恢閎山川改觀鯫生幸覿盛事竊謂越為大都會公有大規模以其大學問大力量寓於大建立大設施中興百年所未覩也獨無大述作可乎宗工巨儒之記述騷人過客之題咏金石震耀黼繡周張韶鳴濩應宫唱吕和所謂述作亦一時之盛矣使張平子左太沖栁河東諸人見之將曰此大規模也談何容易他郡小小創置裁革則伐石為一記濡墨為一詩足矣獨施之越則不可越舜禹之邦也牧是邦者舜禹之臣也而可易言之乎愚不敏成越問一篇釐為一十五章凡三千九百五十字借楚辭體而去其羌誶謇侘之聲倣晉問意而削其詰屈贅牙之製非足以發揚會稽之盛庶幾附郡志之末云典午氏之盛時兮余鼻祖曰子荆謀樂郊以隱居兮揚潄石之清名有聞孫曰承公兮嘗令鄞與餘姚愛會稽之山水兮爰徙家於兹城當永和之九年兮惠風暢夫春莫偕王謝之諸公兮會修禊於蘭亭賦臨流之五言兮寄幽尋之逸興泛回沼倚修竹兮松風落而泠泠維興公尤好事兮作流觴之後序助逸少之髙致兮齊芳譽於難兄既乃登陸而遊兮歷天台與四明潄飛瀑於筆端兮遺擲地之金聲余自句章而徙姚兮倐綿歷乎十稔慨風流之浸邈兮幸猶為夫越氓掬清泉之潺湲兮友過雲之溶泄訪樊榭之杳靄兮棲石窗之瓏玲客有過余兮謂余博覽而好古世為越人兮胡不志夫越之風土余謝不能兮傴余指而縷數前有靈符之記兮後有龜齡之賦嗟彼皆已為陳迹兮時亦隨夫所遇儻含毫而不斷兮將羞余之鼻祖右篇引九州皆有山鎮兮職方氏獨先會稽射祥光於斗分兮占星紀於天倪牽牛炳其初躔兮屆須女之七度少陽當其正位兮為萬物之潔齊南控引乎閩粵兮北連亘乎巨海日出扶桑之隅兮風行浙河之西八山蜿其中蟠兮羅千嵒以為障三江滙而旁注兮渺萬壑以為溪洞天㟏岈以連雲兮俯九垠其如芥洪濤沸渭以拍天兮轟三軍之鼓鼙宅卧龍之岧嶤兮蠡城屹其環繞帶平湖之浩㵿兮雲鏡鑄而天低闢陵門而四逹兮八風颯其遞至飛翼樓而舞空兮天門沈其可梯提封方數千里兮運甌吳於掌上七郡四十餘縣兮歸中權之總提兹古今之大都會兮為九牧之冠冕諒天地之設險兮他郡寧得而攀躋客曰偉哉山川之信美兮其無慊然吾聞固國兮不以山溪之險右封疆觀地之所宜兮惟金錫之最良貢品肇於有姒兮暨蒼姬而加詳雖歷代之所珍兮凛英氣其猶祕歐冶子之神竒兮爰採取而鍊淬剖赤堇而出錫兮山色變而無雲涸若耶之銅液兮俯不見夫潛鱗鑄嶺岌其插天兮冶井浸而寒冽前豐隆為擊橐兮後雨師為灑塵發銅牛之藏屑兮赭林麓以炊炭棄右冶之餘滓兮草木為之焦爛炎煙漲乎銅孤兮寒光浮乎鍊塘越砥妥其斂鍔兮鑄浦沸其若湯合衆靈而成器兮為寶劒凡有五曰湛盧與巨闕兮蓋珍名之最著既屬之善相之薛燭兮復謀之南林之處女水試則斷蛟螭兮陸用而剸犀虎掃攙槍使澌滅兮伏蚩尤使奔怖豈吳鈎之敢抗兮非燕函之能禦客曰偉哉利器兮誠為越國之珍斯劍客之喜談兮非文種之願聞右金錫維苗山之竹箭兮稟徑氣於乾坤實東南之美材兮聲價等乎瑤琨良工相夫隂陽兮加利鏃以為矢習國人於射瀆兮震電激而星奔挾之以六千之君子兮從之以八千之子弟可以償方張之闔閭兮走善射之樓煩彼羣仙之會聚兮亦以射而為樂登石室之射堂兮射東峯而的白丁令威為拾箭兮山上下以求索獲遺鏃於樵夫兮償以樵風之南北客曰異哉斯事兮誠振古之怪竒然越人之彎弓兮則談笑而道之右竹箭百川會同滄海兮浩不知夫津涯吐雲濤以瀾汗兮沃日御而渺瀰藏臣靈之贔屭兮見天吳之惚恍戴五山之嶪峩兮涵百怪之陸離巨魚出沒其中兮不知其幾千里鼓浪沫以成霧兮噓雲氣以成霓任公子之投竿而釣兮五十犗以為餌閲期年而得魚兮牽巨鈎而下之鬐鬛怒而刺天兮白波湧而山立膏流溢而為淵兮顱骨積而成坻自浙水以東兮無不饜若魚之肉彼赤鱔黃顙何足數兮又況梅魚與桃鯔維天地之寶藏兮有煮海之鹺鹽曝曜靈以摝沙兮浮蓮的以試滷編篔簹以為槃兮處烈熖而不灼霜鉛倐其凝沍兮雪花颯其的皪兹海若之不愛寶兮豐功被乎天下抑造化之自然兮詎人為之力假客曰富哉魚鹽兮此越國之寶也是特以利言兮吾願聞其上者右魚鹽越人生長澤國兮其操舟也若神有習流之二千兮以沼吳而䇿勳尋笠澤以潛涉兮北渡淮而盟會擅航烏之長技兮水犀為之逡巡浮海救東甌兮有握節之嚴助治船習水戰兮榮衣錦於買臣渡浙江而誓衆兮會稽之內史率水棹以拒戰兮凌江之將軍坐大船若山兮公苗山隂之傑泛波襲番禺兮季髙永興之人想萬艘之並進兮紛青龍與赤雀風帆倐忽千里兮駕巨浪如飛雲今競渡其遺俗兮習便駊以捷疾觀者動心駭目兮相雜襲如魚鱗客曰盛哉舟楫兮他郡孰加於越然同濟或不同心兮請置此而新其説右舟楫揚州之種宜稻兮越土最其所宜糯種居其十六兮又稻品之最竒自海上以漂來兮伊仙公之遺育别黃秈與金叉兮紫珠貫而纍纍酒人取以為釀兮辨五齊以致用湑鏡流之香潔兮貯祕色之新甕助知章之髙興兮眼花眠乎水底侑謝傅之雅遊兮陶丹俯而哦詩集羣賢以觴詠兮浮罰觥乎子敬指鳴蛙為鼓吹兮暢獨酌於稚圭斯越酒之醖藉兮非宜城中山之比矧投醪之醇德兮能使勇氣百倍於熊羆客曰旨哉越釀兮固越俗之所怡然自征𣙜之法行兮安得薛戎而蠲之右越釀日鑄山之英氣兮既發越於鏌耶地靈泄而不盡兮復薰蒸於草芽雖名出之最晚兮為江南之第一視紫筍若奴臺兮又何論乎石花維瑞龍之為品兮與此山以相亞意山脈之貫通兮仙種同乎一家汲西巖之清泉兮松風生乎石鼎滋芳液於靈襟兮沆瀣集乎齒牙歐公録之歸田兮蘇仙流諸佳咏伯玉注於詩版兮文正賞其甘華至雁塔與花塢兮固郡志之所載若餘姚之瀑布兮尤茶經之所誇嗟陸羽之不逢兮宜鑑味之絶少世方貴夫建茗兮孰有知夫越茶客曰世非不知兮顧茗禁之已苛亦幸其不盡知兮姑舍是而言他右越茶繄剡藤之為紙兮品居上者有三蓋篠簜之變化兮非藤楮之可參在晉而名側理兮儲郡庫以九萬曰姚黃今最顯兮蒙詩翁之賞談加越石以萬杵兮光色透於金版近不數夫杭由兮遠孰稱夫池繭半山愛其短樣兮東坡嗜夫竹展薛君封以千戶兮元章用司筆硯數其德有五兮以縝滑而為首發墨養筆鋒兮性不蠧而耐久惜昌黎之未見兮姓先生而為楮使元輿之及知兮又何悲剡藤之有客曰媺哉越紙兮有大造於斯文然世方好楮而玉兮又烏知乎此君右越紙陽明太元之天兮乃羣仙之所遊有金堂與玉室兮挹方丈與瀛洲伯經得道泉兮乘雲氣於木杪仙公韜光丹井兮發函書於船頭騎青騾以入市兮薊子訓之賣藥切鯔魚以作鱠兮介元則之垂鈎𢎞景寄迹釣槎兮隱吏棲於梅市廣信駕龍白日兮羽人萃於丹邱擷芝草以為侣兮左元放之金液餐桂屑而飲水兮范少伯之扁舟煉日精以回形兮虞翁色若嬰孺位上清而標籍兮思元迹混俗流嚴青能服石髓兮終斷榖而輕舉伯陽煉成神丹兮雖蛻形而不留御天風而上征兮與日月以齊夀皆地勝之所招兮舉塵寰而少仇客曰神仙信有兮特祕怪而難求吾聞越多隱君子兮試詳言而旁搜右神仙謝隱士當少微兮精神見乎天文嚴子陵應客星兮光芒動夫至尊居剡下以髙潔兮戴安道之父子遊嵩嶽以偕隱兮孔述睿之弟昆郤米餉而不受兮朱百年之夫婦愛肥遁以就間兮阮萬齡之祖孫閉蓬戶以觀書兮淳之棲於岫輕白璧而不盼兮景齊隱於日門扣藥船而引聲兮歌競傳於仲御漁鏡湖以賦詩兮島尚號於方干黃公列乎四皓兮成定儲之羽翼嵇康儕於七賢兮著養生之至言王子猷詠招隱兮愛山隂之竹種謝靈運賦山居兮采地黃與溪蓀著貂裘坐巖石兮𢎞之志不在釣袘豹席與棕屩兮志和豈羡夫回軒彼皆不事王侯以髙尚而辟世亦地氣之所鍾兮多秀水與名山客曰士各有志兮斯固古之逸民夫何欲潔其身兮弗念君臣之大倫右隱逸昔勾踐兮思報吳問國政兮五大夫辟田野兮實倉府訪疾苦兮字幼孤抱冰兮握火置膽兮坐卧采蕺兮與葛側席兮闔左觴酒豆肉兮必均其施樂不盡聲兮食不致味鷙鳥匿形兮踰二十祀吳無稻蟹兮越有地利一朝興師兮三戰得志姑蘇既墟兮橫行淮泗伯東諸侯兮賀貢畢致赫然雋功兮又何可議客曰異哉兮彼長頸而烏喙如其可與共樂兮何鴟夷之遠避右勾踐帝舜生於姚邱兮地近夷而居東母握登感天瑞兮漾祥光於大虹歷山其所耕稼兮陶漁皆有遺迹二女降於媯汭兮百官備而景從大禹巡於釜山兮會羣臣而計功執玉帛者萬國兮戮後至之防風託菲飲以名泉兮鑿了溪而宅工發金簡於不匱兮藏祕圖於山中望邑名夫虞姚兮山靈護夫禹穴儼廟貌於千古兮遺化被於無窮繄帝王之所在兮宜風俗之近古習孝悌與勤儉兮亦好遜而尚忠客曰於戲大哉兮又何可以比隆然有為者亦若是兮豈無與舜禹之事同右舜禹維六飛之南渡兮潢濤江以東歷後舜禹三千年兮履舜禹之遺迹駐翠蹕以彌年兮因改元而頒詔爰升州為府兮冠紹興之大號舉大享之上儀兮即行闕而蕆祀視總章與重屋兮亦庶幾其遺意登堂而望稽嶺兮懷克勤之令德留建炎之御製兮彰復古之素志采上虞之囊封兮終然法乎舜禪山鬱蔥以蜿蜒兮鍾禹陵之佳氣御香四時來下兮道冠蓋以相望拱觚稜於雲闕兮儼威顔而天咫繄百年之父老兮及親逢乎盛事想天民之視阜兮與虞夏而同治客曰幸遊舜禹之邦兮復逢舜禹之君然儻無舜禹之臣兮孰能牧舜禹之民右駐蹕自大駕之西幸兮府遂為於近藩賜行殿為府治兮暨擇牧之惟艱張毗陵首當是選兮實股肱之舊弼仍土階之素規兮因舊宇以為安朱忠靖繼剖符兮屹具瞻於巖石趙忠簡亦相望兮凛清風而獨寒忠定王之來鎮兮當乾道之四祀捐帑以置義租兮闢宫而祠先賢諒棠隂之蔽芾兮思召伯其如憩宜大封於是邦兮良天道之好還後五十餘年兮誰儼美以增飾維我新安公兮騖逸駕而獨攀剖滯訟如澌流兮召雨暘如應響使百城俱案堵兮令滄海無驚瀾立吏瞻於秋霜兮洽民氣於春澤出干將於寶匣兮照沆瀣於銅盤圜扉鞠為茂草兮麥岐藹其連秀令修戶庭之內兮民樂湖山之間既修政而人悅兮文書省於幕府新百廢以具興兮聳輪奐之偉觀八邑不知有役兮一道不知有費若天造而神設兮豈民力之或煩化榛莽為宏麗兮敞隘蔽為爽塏草蠧橈而雄疊兮易朽腐而堊丹兹棟隆之規模兮特於此乎小試非成毁之相仍兮數循環而無端鎮越巋乎中踞兮修廊翼其旁拱何獨斂夫散氣兮所以重夫中權巨扁揭乎雲霄兮鈎畫粲乎星斗山靈為之呵護兮珍光赫而屬天前方臺之月華兮後蓬萊之雲氣左燕春之凝香兮右清白之寒泉繞層城以拂雲兮開屏障於四面卧林影於雲壑兮棲山光乎二軒吸平湖於酒杯兮浮翠峰於茗碗送歸鴻於天外兮數飛鷗於海門動秋聲之摵摵兮泊晴嵐之藹藹餞崦嵫之夕照兮賔暘谷之朝暾上越王之危臺兮誦唐人之傑句鷓鴣飛而地迥兮晴煙渺而天寬飛蓋遊乎清夜兮羃輕煙之素練棹歌發乎中沚兮浴明月於金盆麗譙湧乎青冥兮角聲起而寥亮佳山蔚其照眼兮洗萬里之隂氛新隄平而擬掌兮沸行歌以載路漕渠濬而舉鍤兮鼓千艘而駢闐雄威扁營疊創兮雷歡聲於貔虎泮宫修貢闈闢兮遂飛躍於魚鳶臺府煥而一新兮巖壑為之改觀他人視之拱手兮公談笑而不難既遊刃之有餘兮復善刀而藏用寂然若無所營兮湛中襟而靖淵炷爐香而讀易兮悟至理於泰否託寄軒之柱刻兮等蘧廬於乾坤上方蕆事明庭兮將入扈於豹尾如旄倪之借留兮紛截鐙以攀轅繄郢曲之寡和兮信蕭規之難繼民願公無遽歸兮帝謂吾今召環雖卿月之暫駐兮幸臨照夫越土恐使星之遷次兮迫泰階之魁躔推治越之道治天下兮固我公之餘事然越人愛公如慈父母兮願託歌而永傳客乃斂袵肅容兮屏氣弗敢復言孫子於是濃墨大字兮終夫越問之篇右良牧讀單鍔水利書明徐獻忠獻忠讀此書知東南水利莫詳於此今昔雖有少殊而源委蓄泄之大勢固猶同也今世吳江隄岸日益堙塞視鍔建議之時又不知其幾何矣疏鑿之功既不能復舉則湖州泄水之利自有不容以不講者夫溧陽五堰西受髙淳宣城引入九陽江諸湖之水東注震澤此單鍔所謂上源之患也明初鑿諸溧水石河遞引而北注而於五堰築成堅壩似乎太湖之患可泄矣然太湖之源實出於天目及宜興以西諸山方春夏水發之時洪流奔放悉注太湖五堰之害雖息而湖州之害固不可免也今吳江隄岸既不可復鑿豈可不思其泄注之故哉湖州運河東抵平望幾一百二十里太湖之水半泄其間自運河以南諸溪港會同北流餘不諸溪及運河之水一派皆南出於石門一派出於皂林一派由巖墓東南出諸嘉興一派東出王江涇一派出平望其間港汊經泄之處為民間所占日漸狹小而上源諸漾積受洪流之處漸至填塞為蘆埂圍築為藕蕩者又不知其幾也是可不為厲禁以防閼閉之患哉大抵歲多南風則水患多在姑蘇歲多北風則水患多在吳興此又分别所加之患也防患之道自宜周詳故宋乾道二年詔漕臣王炎相視開掘浙西世家新圍草蕩菱藕諸陂及岸際圍築耕種者所至令守倅縣令同共措置淳熙三年御史傅淇言近臣奏諸圍田堙塞水道之害務在禁止此乃拔本塞源之要術然豪右之家未有無所憑依而肆意圍築者聞浙西諸縣江湖草蕩計畝納錢利其所入給據付之望條約諸縣毋得給據與官民戶兹皆前朝防患之道及今禁約猶可消滅未來之患若視為末務等於故常而不加之意則吳興他日之患更有不可勝言者矣夫吳興水利更與蘇松不同蘇松有海潮淤塞之患不盡出於人為吳興本無此患惟禁絶有力者圍築之患足矣有為民之仁念者幸加意於此評宋戶部尚書梅執禮明宋濂自宣和至靖康十年之間梅氏一門殺身徇義者二人彼豈甘以頸血濺地哉苐以君上決不可背名教決不可負綱常決不可虧忠義一激雖泰山之高不見其形雷霆之鳴不聞其聲刀鋸在前不覺其慘鼎鑊在後不知其酷必得死然後為安也今去數百載忠剛之氣塞乎天地之間凛然如生非烈丈夫能如是乎使當時屈膝受辱以保首領受賤惡雖生百年何益也賈誼有言守圉扞敵之臣誠死城郭封疆梅溶以之法度之臣誠死社稷執禮以之張玉田歸杭疏元袁桷采藥神山悟朱顔之今昨呼猿靈鷲勞清夢之去來要當青鞋布襪徒步徑歸誰信黃絹色絲空言何補㺯笛恨邊雲慘淡坐窗惜江月凄涼落葉孤尊無復金貂之慷慨古梅千檻空懷玉照之風流食肉之相已非解牛之技焉用焦桐未遇斷木自慙風月江湖肯後當時之置驛交遊全石定先桑子之裹糧鄙騎驢灞上之寒遂跨鶴揚州之願膝行而謝稇載以歸燈火話平生慰老弟兄之白髮詩書娛晚歲還名祖父之青氈恩極無言情陳有靦浙江通志卷二百六十八
