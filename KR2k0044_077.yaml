body:
  text: 浙江通志卷七十八積貯中雍正二年閏四月初二日欽奉上諭社倉之設原以備荒歉不時之需用意良厚然往往行之不善致滋煩擾官民俱受其纍朕意以為奉行之道宜緩不宜急宜勸諭百姓聽民便自為之而不當以官法繩之也近聞各省漸行社倉之法積蓄於豐年取資於儉歲俾民食有賴而荒歉無虞朕心深為嘉悅但因地制宜須從民便是在有司善為倡導於前留心照應於後使地方有社倉之益而無社倉之害此則爾督撫所當加意體察者也又聞民間輸納錢糧用自封投匱法亦屬便民之道但偶有短少之處令其添補每至多索數浮於所少之外理應將原銀發還仍於原封內照數補足交納庶可免多索之弊此雖細事督撫大吏亦不可不留心體察嚴飭有司以除民纍特諭雍正三年九月二十五日欽奉上諭恭紀首卷因浙江等省豐收宜及時儲蓄留為緩急之需倉貯虧缺者速行買補雍正三年十二月十七日戶部奉上諭恭紀首卷因江南浙江豐收著督撫動項就近採買穀石於省倉及府州縣應貯之處加謹收貯雍正三年十二月二十八日欽奉上諭積貯倉穀關係民生最為緊要朕屢降諭旨令該督撫等嚴飭州縣及時買補虧欠昔年之數無如茍且遲延奉行不力即如原任直隸總督李維鈞仍奏稱各屬倉穀已補足七八分及今冬發倉賑濟虧空甚多若非截留漕米發給通倉窮民幾至失所昨據月選官陳克復條奏虧空倉穀請支動正項買補一面嚴追本官還項朕已交與九卿議行今直省地方俱定限三年將一應倉穀務期買補完足不得顆粒虧欠三年之後朕必特差官員前往盤查如有虧空定行從重治罪倘有不能補足情由著該督撫題奏凡虧空錢糧猶可勒限追完無損國帑若虧空倉穀則一時旱潦無備事關民瘼非小是虧空倉穀之罪較虧空錢糧為甚自宜嚴加處分並著內閣九卿確議定例具奏欽此雍正四年五月戶部為欽奉上諭事議覆浙江巡撫李衛疏稱奉上諭湖廣今歲收成豐稔著動支庫銀採買穀石收貯此時只宜陸續採買若民間榖價稍昻即便停止俟明年再行採買江南浙江今歲俱獲豐收著落該撫就近商酌若亦可動項採買著即一面定數奏聞一面採買欽此經前署撫臣傅敏準咨行司欽遵去後兹據布政使佟吉圖詳稱杭嘉湖紹四府屬縣於秋成收穀之後盡行礲米貯穀者少應俟今歲秋成採買同存榖數多之象山定海黃巖太平永嘉樂清瑞安平陽泰順麗水青田遂昌雲和龍泉慶元景寧等縣毋庸購買其寧台金衢處等府係産穀之處但浙江潮濕難於多貯今應量為陸續採購雍正三年分耗羡解司積儲銀一萬七千五百六十兩六錢一分不敷備穀之需應再酌動庫銀一萬三十九兩三錢八分通共銀二萬七千六百兩先勻給鄞縣慈溪奉化鎮海臨海寧海金華蘭溪東陽義烏永康武義浦江西安龍遊江山常山建德淳安等十九大縣每縣各發銀一千兩又天台仙居湯溪開化遂安壽昌桐廬分水縉雲等九中縣每縣各發銀八百兩又松陽宣平二小縣每縣各發銀七百兩共符前數飭令各屬採買可得穀五萬五千餘石俟各縣送到實貯倉收之後核價驗明報部照例盤查以備不時賑糶之需等因請題前來理合奏聞其今秋買榖之處容臣細加酌量另行請旨等因應令該撫將分發鄞縣慈溪等縣買補穀銀二萬七千六百兩速令採買穀石貯倉仍委員不時盤查毋致浥爛虧空至杭嘉湖寧紹台金衢嚴處等府屬縣俟今歲秋收再行酌量分别多少買穀存貯之處應令該撫細加酌量另為題請可也奉旨依議雍正四年九月戶部為遵旨酌議預備等事議覆浙江巡撫李衛疏稱福建地方今年米價昻貴浙江所産米穀即豐年不足食用原無多餘可以協濟查四川米價較各處頗賤若就川省多行購買庶於閩浙兩省民食均有攸賴臣前具摺奏請奉硃批甚好速具題前來臣欽奉諭旨即於浙省存庫鹽院筆帖式等歸公項內借動銀十萬兩委員星赴四川地方分頭買米十月冬收之時即可買齊年內陸續運到再為酌定再各省米價貴賤難以預料倘遇川省米價亦昻將解去之銀暫存川省藩庫乘其賤時再行買運等因應令該撫俟川省買米運到之日酌量閩浙兩省緩急通融以濟民食至運到之米或係存貯或應作何動用之處逐一分晰報部查核可也奉旨依議雍正四年十月巡撫浙江都察院右副都御史臣李衛題為遵旨事準戶部咨開雍正四年八月內閣交出大學士等奏稱臣等遵旨議得據高其倬奏報目今福建已經得雨田禾茂盛米價大減小民不憂乏食但須商酌積貯備用之法前奉旨令江西運米十五萬石往閩濟用今改為三十萬石穀由海運閩是福建已得穀三十萬石矣伏思我皇上軫念閩省欲令多貯米穀以備用請將浙江漕糧截留十萬石易穀二十萬石就近運送最為妥便等因奉旨依議欽此行文到臣除行司遵照外查杭嘉湖三府民間收穫之後即礱米完租納銀不存稻穀向例已久若令以穀二石抵完漕米一石則事屬創始民情未諳且今年穀頗濕潤恐難久貯若俟收米易銀買穀必待來年秋成方能購齊運閩又致稽遲臣再四思維現於欽奉上諭事案內奉旨浙江今年採買穀石預備積貯臣已先後二次題明動銀十二萬七千餘兩分發各縣預為採買約可得穀二十餘萬石今現有臣題明赴川買運之米今冬來春運回可以接濟此項穀石原係積貯備用莫若於此穀內除不通海口之處仍行貯倉外其餘可通水路之縣將現買穀石運至海口知會閩省領運即將截留漕米十萬石抵補此數存貯浙省分積各屬俟來春青黃不接之時糶米易銀於秋成仍然買穀照數發給還倉一轉移間閩浙皆有積貯彼此兩無岐誤矣奉旨著照該撫所請行該部知道雍正四年十二月戶部為衆商感沐聖恩公輸積貯等事議覆浙江巡撫兼理兩浙鹽務李衛疏稱兩浙杭嘉紹松等所商人汪中立等呈稱商等生逢盛世共樂升平又荷皇仁軫恤蠲課加斤浮費盡除恩膏疊沛商等無不樂效挽輸爭先銷辦今年正引指日銷足羣商願竭頂踵之微以效涓埃之報伏念皇恩養育萬民加意積貯見奉動支公帑買穀備儲衆商願公輸銀十萬兩分作三年交納解歸藩庫分發買穀以備積貯等情臣不敢壅於上聞伏乞皇上睿鑒施行奉旨據李衛奏稱兩浙衆商公輸銀兩為地方預備積貯甚屬可嘉著議政大臣大學士九卿悉照兩淮鹽義倉之例定議具奏欽此欽遵該臣等會議得兩浙鹽商願輸銀十萬兩分作三年交納運歸藩庫用備積貯杭州府治為浙江省會之區即鄰省亦舟水相通於此建倉實為便利應令該撫李衛將衆商願輸銀十萬兩分作三年完納交與該鹽政照兩淮鹽義倉之例遴選老成殷實之商交其辦理一面建造倉厫建倉之地務擇高燥寬間之處或於城內或於城外分作幾處應建若干座約費銀若干兩著該撫李衛督率辦理之商酌量妥議先將衆商第一年所輸銀兩料理建倉若工用有餘留為買米之用如或不足於第二年商輸銀內支補其第二年第三年商輸銀兩分年就産米之處照時價分路採買或應貯米或應貯穀亦著該撫李衛與辦理之商斟酌定議所貯米穀交與選出之商管理該鹽政仍不時稽查每年於青黃不接之時照存七糶三之例出陳易新或於米貴之時開倉平糶總至秋成時糴補倘地方有賑濟之用該撫一面題請一面動支管理之商人每年將出易糶補動支之數呈報該撫核實奏報其出陳易新平糴平糶之內或有盈餘即以增買米穀如此則貯藏日富緩急足恃於商民均有裨益俟三年交完之日該鹽政將捐輸商人姓名分别造册具題到日交與該部照例議敘可也奉旨依議雍正五年四月戶部為仰體聖衷敬陳管見事議覆浙江巡撫李衛疏稱足民之道積貯為先查浙省儲備未豐臣於雍正四年八月間將從前已準開捐之仰體聖衷等事一案具題請仍照河工捐納貢監之例接捐買備常平部覆以照江南舊例數目收捐數月以來報捐不過三五人蓋緣米數既多價亦過昻且江南常平捐監之例又經議改準照河工事例數目將銀兩折收米穀如俊秀捐監比浙省少米七十餘石其他以此遞減人情莫不避重就輕豈肯趨多棄少臣查江浙兩省戶口之繁庶相等上年之被水皆同倉儲積貯均屬急務今各省事例數目皆少而浙江獨多勢必有開例之名無捐收之實仰懇皇上天恩準照江南現行河工事例米穀數目一視同仁使生俊踴躍急公於積貯庶有實濟等語查浙省捐補截漕先經原任浙江巡撫屠沂於康熙六十一年間題準照河工事例捐納貢監續於雍正四年八月內準浙江巡撫李衛題請仍照河工捐納貢監之例接捐常平臣部以漕米既經捐足所有各屬應捐常平米石應改照江南常平事例米數捐納等因議覆奉旨依議欽遵去後今該撫李衛以江南常平捐貢監例又經議改準照河工事例數目將銀兩折收米穀江浙兩省相同懇照江南現行河工事例使生俊踴躍急公應如所請將浙省常平倉準其循照江南常平比照河工事例捐收米穀不論紅白聽其兼納則生俊不致趨少避多而倉儲易於充裕矣又疏稱前撫臣黃秉中原題常平倉止議捐米七十萬石臣查浙省人民衆多各縣存穀無幾積貯本宜加充兼之浙閩接壤閩省或有需用米穀浙江海運接濟尚易請於前題捐數之外加增一倍共捐足米一百四十萬石照大中小縣分别積貯庶可緩急通融有備無患等語查閩浙兩省均屬海疆該撫李衛既以浙省各縣存穀無幾積貯本宜加充兼之閩浙接壤閩省或有需用接濟尚易應令該撫將浙省常平倉捐米一百四十萬石分别州縣之大中小酌定應貯米穀之多寡俟各該縣米穀捐足之日即行具題停止可也奉旨依議雍正五年八月巡撫浙江都察院右副都御史臣李衛為題明事該臣看得浙省居民稠密戶口繁多而杭嘉湖三府本地又多種桑麻是以産米不敷民食向藉湖廣江西等省外販之米接濟臣於上年題明動銀十萬兩赴川買米運浙以備平糶於本年閏三月陸續運到除沿途損折外實買回浙斛米十萬五千餘石緣浙省杭嘉湖三府屬去冬今春雨水過多米價較往年稍昻隨於川米運到時分發三府屬委員設法減價平糶城鄉市鎮以及偏僻地方無不周遍民間得食平價之米不致苦難又奉旨動銀修理城河塘隄令窮民傭工趂食一時士庶兵民莫不感頌聖恩歡呼載道是此番買回川米實於浙省大有裨益矣本年仰賴聖主洪福雨澤涵濡早禾俱已豐登晚禾雖未收穫然皆加倍茂發知為大有可以上慰聖懷雖目下有杭湖接壤之區臨安山內突爾起蛟山水驟發沖傷數處隄岸不無數邑低窪之處被泥水浸沒田禾現在確查加意撫恤另為具題然已約知大槩不過偏隅於全省大勢年成仍無甚減惟是浙省常年亦向食外省客販之米在商人賤買無論豐歉皆思貴鬻若官米充足則於民米價高時發出減糶如民米平賤時即行收貯以備不時糶賣自可永杜刁商乘機長價之弊其或閩省米價高昻亦可將浙米運往接濟平糶誠屬兩便可以踵行但浙省今歲豐稔似可不必如上年之數臣請今年再於糶米歸欵原銀內止借動銀五萬兩仍赴購米以為儲蓄之備此外又有兩浙各商捐銀十萬兩分作三年完交購備米穀積儲荷蒙俞允部行以首年所完之銀料理建倉今已完一年銀三萬三千三百三十兩零建倉工料約計費一二萬金實不用一年捐銀之數若將餘銀存留虛貯徒屬無益今各商具呈情願將本年所完銀內提出三萬兩付與往川購米之員順帶搭買運回儲備其建倉費用已有銀三千三百三十兩零連下二年零數合算共該銀一萬兩猶可通融應墊即有不敷伊等願為公捐補足已據各商踴躍同情臣思川米運浙有需時日若不於歲前購回恐來年長途春雨淋浸米色不能乾燥難以收貯查今次請買平糶之米止議動銀五萬兩仰承皇上加惠浙省地方無所不至是以不候部覆即已委員共領二項買米銀八萬兩於七月內起程採買再查湖廣原係産米地方而川米又多販至其地以待外省轉販隨諭領買官員前走楚省彛陵州川江總隘探有客販川米果然價平即於此處採買倘客販希少米價高昻仍赴四川重慶府購買再查上年赴川買米川民得浙省價銀完糧使用甚為利便而彼處米石亦不因浙省往購致昻但恐時價先後不同或今番重慶米價亦貴不但浙省重價買回無益并恐彼地米價因之加長隨又復飭買米官即將原銀寄放該府貯庫乘其賤時再行買運務期彼此均有裨益臣謹具題伏乞皇上睿鑒敕部查照施行奉旨該部議奏十月初五日戶部以應如所請議覆奉旨依議雍正六年二月十七日奉旨社倉捐穀聽民自便不可繩以官法朕頒發諭旨至再至三各省督撫辦理此事但當將已交在官而官吏侵蝕者查令追賠若民間一時虛報數目而力量實不能完者悉令催交小民必致擾纍此處朕亦屢行曉諭今據馬會伯奏稱天門縣勸輸穀石實欠在民應飭地方官於來年秋收時勸催里民交納等語所奏甚屬錯誤此項穀石不必催追聽從民便輸納吳文煊亦從寬免議併將此曉諭各省督撫知之該部知道欽此雍正六年四月初十日欽奉上諭積貯米穀原以備旱潦緩急之需民命攸關最為切要朕無時不加訓飭嚴其考成務期地方有司實力奉行庶可有備無患又念積貯穀石首重倉厫若厫座不堅必有黴爛虧折等弊是以雍正四年諭令各省地方加意修理務使堅固以為儲蓄之計但恐有司視為其文奉行不力且新舊官員未定倉厫交代之例或去任之員以損壞滲漏之厫座任意交代貽纍於後官或接任之員有黴爛虧空等情而藉口舊日倉厫之不修諉咎於前任似此種種弊端皆於積貯之政大有關係嗣後著將各府州縣倉厫入於交盤項內新舊交代若有木植毁爛傾圮滲漏之處著接任官即行揭報不準接受倘有徇情濫受者即係接任官之責除照例處分外仍令賠修如此則有司各顧其考成而於積穀養民之道實有裨益其如何定例之處著九卿會議具奏特諭雍正七年七月戶部為請酌定直省倉儲之法等事議覆浙江總督管巡撫事李衛疏稱看得足食所以養民有備始能無患近因部臣勵廷儀條奏行令以州縣之大小酌定積穀之多寡將米多倉少之處糶出餘銀批發倉多米少之州縣一例買穀存倉此亦酌盈濟虛之善䇿但或不細心體會部臣之議而止就倉厫之多少以為米穀之去留設遇人口繁多産米稀少又係水陸適中轉輸便易之縣而因其倉厫原少遂將現貯之外盡行發糶則有不足之虞若處偏僻需米無多是以倉有空間者必欲購買貯足亦恐徒滋紅朽臣愚以為部臣所議州縣之大小定積穀之多寡實為至當之論其倉多倉少之處止可計米以定厫未可就厫而定米也即如浙省溫處各屬舊存穀石有一二萬三四萬不等若嘉湖寧紹等處少者四五千多者亦不過七八千惟省城永濟倉捐納補漕案內原議應購補兵米共四十四萬餘石除分貯金衢嚴三府及備借米外其餘悉貯本倉臣再四籌畫省城旗營駐防較之外府州縣更為緊要永濟倉應酌貯穀四十萬石抵算米二十萬石以備儲用其餘米石儘可糶買將所糶及從前存司未買銀內於通省中按縣分大小水陸衝僻或僅為本地之儲積或可備鄰境之轉輸酌定數目除原存米穀外少者均為添撥發價買貯將原議買補之四十四萬餘石除貯省外其餘一米二榖計算共該買榖四十八萬餘石分之通省各縣每年存七糶三秋成補還則存倉之成色必高而積久之折耗可減其於儲備似為有益今臣現在將永濟倉米動撥先就省城并寧台一帶沿海需米之處運往平糶一面飭令布政司將捐納補漕一案已買未買米數并現在出糶及將來應行撥貯各數分晰造册另咨送部再永濟倉厫房原止一百二十間僅貯米十七萬餘石將來以米易穀需厫愈倍而省城居民櫛比難得有此寬廣之區惟查南糧倉向貯解省南糧厫座雖不多而基他儘可蓋造應增添厫房將永濟倉再買之穀移入南糧倉厫同舊倉一并收貯其南米原以備給省城滿漢旗營兵糈今副都統傅森現在移駐乍浦所有舊衙署已屬空間雖房屋無多而地基亦大臣與將軍鄂密達商妥可以改為南米倉厫此地既在旗營之內就近放給便於兵糧而臣與鄂密達各派官員看守則防範更為嚴密一轉移間甚屬兩便至分撥外府州縣之穀除原有空厫之處祇須酌量修葺粘補毋庸更議外若入官房屋一項非逐縣所有而住房之式亦與倉厫不同應俟查有可改之房即行改建若缺少者仍須酌量添造所有省縣各處蓋倉工費查原存捐納銀兩除照數買補米石外尚多餘剩即將此內動支再有多餘全數添買穀石收貯則工費出於捐項之中不必再動正項相應一併題請等因具題前來均應如該督所請行奉旨依議雍正七年閏七月二十六日欽奉上諭各州縣之設立常平倉積貯米穀原以備地方一時緩急之需所關甚重朕為此備極焦勞多方籌畫務期倉儲有賴旱潦無虞年來所頒諭旨亦深切著明矣夫收貯米穀必須倉厫堅固始可為經久之計是以從前降旨將倉厫之完整與否一并入於交盤之內以為州縣官之考成今聞各省之中偏僻之邑竟有向來無倉厫而有司茍且因循不行詳請督撫藩司等亦忽焉不察致將養民備荒之具或寄頓於寺廟或借放於紳士富戶之家而黴爛虧折生事滋擾之弊多由此起大非朕愼重民儲之意凡各省未有倉厫之州縣著該督撫詳悉查明商酌即行建造其造倉之費或動用正項錢糧或支給存公銀兩著該督撫酌量本地情形悉心定議具奏特諭雍正八年署浙江布政司糧道朱倫瀚為請酌定直省倉儲之法等事查得浙省開捐貢監案內收存司庫永濟倉補漕價銀內除雍正七年蒙院題明劃出米價一十五萬石分派各屬買穀儲備并添建倉厫工料外尚存銀三十三萬餘兩但上年分發各屬購貯榖石雖據報買而原發之價俱稱不敷其核實準銷已找給者無幾尚有應找各縣之價并移建南糧倉厫房工料銀兩外約餘銀三十萬餘兩應遵檄飭分發各屬購穀貯備今查永濟倉原存截留漕米四十萬石內除先撥五萬石分發金衢嚴三府存貯并上年劃出米價一十五萬石分發各屬購榖儲備外本倉已有米二十萬石易榖儲備但杭城為省會重地人居稠密生齒浩繁應於三十萬兩銀內動支銀一十萬兩買榖存貯永濟倉則積儲足備豐歉有資設需撥濟亦屬便易至通省州縣現在存倉穀石按大中小三等計算除大縣黃巖縣已貯穀二萬三千三百石永嘉縣已貯穀四萬七千六百石零中縣瑞安樂清平陽三縣已各貯榖三萬三四五千餘石龍泉太平二縣已各貯穀二萬一千至二萬七千餘石小縣慶元泰順雲和三縣已貯榖一萬五千至一萬八千餘石俱存貯已多并仁錢二大縣係附郭首邑同在省城設冇需用自有永濟倉米穀可恃均無庸再行分派買貯外其餘大縣計三十縣查現貯榖自一萬餘石至一萬四千餘石中縣係二十四縣現貯榖自一萬至一萬一二千餘石小縣計十一縣現貯穀自七八千至一萬餘石均計存倉多寡不甚相懸積貯亦未為足備應動支銀二十萬餘兩分别大中小三等均勻分派給領買貯除大縣仁和錢塘黃巖永嘉四縣不派外計共三十大縣每縣添派貯榖八十石中縣除樂清瑞安平陽太平龍泉五縣不派外計共二十四中州縣每縣添派貯榖五千三百石小縣除慶元泰順雲和三縣不派外共計十一小縣每縣添派貯穀二千六百五十石以上共添買穀三十九萬六千三百五十石飭令各赴司領銀買貯則承買既無偏多偏寡之弊而存貯亦皆有備無患矣再查浙省出産米穀無多而杭嘉等府向係前赴上下兩江鄰省採買運回儲備凡上遊山僻不通運道者即於本地買貯附近水口可通舟楫者於本境或鄰封别省各計收穫分數隨便採買運貯又永濟倉撥銀十萬兩亦須委員前往江省産穀地方及時採買但以數十萬之數一時購辦分頭四出恐價值高昻是各屬派買之榖倘今歲未能通買照從前之例次年購足其永濟倉聽買榖銀十萬兩亦應酌存銀二三萬兩留為下次再行採買抑或永濟倉積貯已多倉厫一時不及齊備此留買之十萬兩榖價統俟下年再為買貯至於各屬所買穀石均需建造倉厫應照上年之例每間準動銀二十兩如杭嘉湖紹四府不産木植者每間貯榖五百石金衢嚴寧台處六府係産木之區每間貯榖六百石至應需添建倉厫銀兩亦令於所存米價內動支飭領建造俟買足貯倉核實準銷之日如有多餘留存司庫待後再行陸續添買又永濟倉添買之榖亦應酌覔廣大地方周圍築牆建造堅固厫房採買存貯應需工料銀兩亦在榖價內酌量動用建造所有分派採買補漕穀石并各屬添建倉厫數目擬合造册詳請咨部等因隨奉院批倉榖關係儲備趂此收穫之後正宜及時買足不便遲緩仰速委員并飭各屬飛即領價上緊分頭採買一面趕造倉厫完固以備收貯毋任延誤仍候據詳咨明繳雍正九年三月戶部為遵旨題明等事咨覆浙江總督管巡撫事李衛題稱本年夏秋之交淮北山東接界州縣適有水警已蒙皇上大沛殊恩蠲免錢糧又復給發帑銀動支倉穀特命大臣分道賑恤數郡兆民咸安袵席昔年閩省偶爾歉收即撥江浙米石接濟緩急相通總使需米之處聚集既多價值自能平減誠為至計謹遵旨題明將浙省永濟鹽義二倉及附近水次各縣查明分别存貯撥運數目預備船隻酌動水腳銀兩派委誠謹官員於新春開凍時運至江北山東接界黃運二河兩岸可通舟楫者探明何處需用食米押往會同本地有司平糶收回價銀存俟秋成照數買補在各地既因米穀數多可以平價而浙省舊存倉穀又得出陳易新彼此均有裨益至於發運數目統於酌撥起運後再行報部等因雍正九年二月十四日奉旨凡為督撫者能經理所屬地方事務便稱盡職總督李衛公忠體國視鄰省如同本省將米穀籌畫運送以備平糶之用甚屬可嘉凡為督撫皆能視國政如家事不分彼此如此存心則裨益之處更廣矣李衛著交部議敘其運米穀前往淮北山東之處著照所奏速行該部知道欽此除移咨吏部外相應行文浙督將動撥各項存倉穀石速行運往江北山東平糶俟平糶完日將糶過價值及用去水腳銀兩分晰造册報部查核并知照江南山東督撫可也為此合咨前去查照奉旨內事理欽遵施行通計發運江省賑濟米一十八萬四千二十一石九斗一升五合內動永濟倉米一十三萬三千二百五十石鹽義倉米四萬三千石嘉秀等五縣米七千七百七十一石九斗一升五合雍正十一年五月初九日欽奉上諭各省州縣設立社倉原以便民濟用若遇應行借給之時該州縣官一面申詳上司一面即速舉行方可以濟閭閻之緩急倘其中有假揑虛冒等弊自難逃督撫等之耳目聞直隸百姓借領社穀必待督撫咨請部示而後準行往返動經數月小民懸待維艱仍不免重利告貸之苦著該督李衛酌量定例變通辦理咨部存案嗣後遵照施行特諭欽此雍正十一年七月戶部為預籌備糶米糧等事覆浙江道監察御史翁藻條奏該臣等查得浙省杭嘉湖等府屬自上年九月及本年三月間偶被偏災疊奉恩旨將乏食窮黎加意賑恤又經總督程元章題明動用鹽費銀兩遴員赴産米地方採買運回分貯平糶以濟民食在案今該御史奏稱杭嘉湖等府地狹人稠所産米榖不足供一歲之需藉商販接濟偶遇客米稀少價值頓昻若得多貯官米備糶庶可平市價而裕民食請每年於秋成前視年歲之豐歉酌定米數多寡預行題明借動庫項遴員於湖廣等省採買分貯一值時價昻長即減價平糶較之買價應有盈餘如遞年發糶積有盈餘銀兩遇歉歲減價糶賣即以盈餘銀兩抵補所減價值等語應如所奏除現今該督程元章已動鹽費銀兩採買米石俟運回分貯減價平糶外仍令嗣後每年酌定米數於秋收米賤之時題明借動庫銀赴湖廣等省採買分貯遇米價昻貴之時即減價平糶將糶過價銀歸還原動庫項如遇歉歲照買價減糶即以遞年所積盈餘抵補所減價值仍將採買米價及平糶價值於每年歲底逐一分晰造册報部查核可也奉旨依議雍正十一年十月十四日奉上諭恭紀首卷杭嘉二府屬本年額徵漕米各截留五萬石歸安烏程二縣應徵漕米一十八萬餘石並帶徵雍正十年分漕米七千六百餘石照雍正五年部定折價徵銀存米以備積貯互見漕運雍正十三年十一月戶部為請定常平倉穀糶糴之法以便官民事總理事務和碩莊親王等議覆內閣學士方苞條奏內稱天下常平倉穀使無虛冒定存七糶三之法而有司奉行失宜必待穀價既貴各州縣始得申詳府道藩臬督撫請定官價并示開糶之期若一處文未批發不敢開糶不知穀貴早晚無常若商販衆至則旬月之間價復大減是以胥吏得借此要索窮民不得邀平糶之恩而官定之價且不能充有司當此欲不糶則紅腐可虞欲賤糶則秋糴難補等語查各地方穀價之低昻原屬早晚無定如遇價值昻貴該州縣即宜將存倉穀石及時發糶以平市價若待榖價既貴始行詳請示期開糶其未奉批發之前小民以貴價糴食先已受纍又不獨奉文之後或致市價復平而官價不充為可慮也嗣後發糶常平倉穀應如所奏凡遇價值偶貴各該州縣酌定賣價一面開糶一面詳報俾令窮民咸沾實惠所糶價銀穀石該地方官按月造册申報督撫查核又奏稱河北五省風氣高燥倉穀數年不壞存七糶三之法尚可遵行若江淮以南地氣卑濕通行存七糶三則南方數省每至數年必有數百萬石黴爛發變之穀有司懼罪往往以既壞之穀抑派鄉戶強授富民伏乞皇上特頒諭旨嚴飭南方各省督撫驗察各縣存倉之榖三年不變歲存其半兩年不變則糶七存三但逾一年底面即有黴爛則春盡糶而秋糴之其或年歲大歉本州縣及鄰境穀皆騰貴春糶之價不足以糴充原數則詳明上司銀交郡庫俟次年有收如數補糴至河北五省倘遇歲歉聽各州縣詳明上司不拘糶三之例督撫司道知府止於歲終實核在倉之數一至開春照所定存糶分數隨時發糶等語查設立常平倉收貯穀石原不獨備平糶之用且以備賑濟之需苐恐積貯年久難免黴爛是以定存七糶三之法按年出陳易新三年有零即可通行易換既無虞於紅朽亦有備而無患今方苞奏稱南方諸省地氣卑濕存倉之穀三年不變歲存其半兩年不變糶七存三亦屬因地制宜之意但查南方各省各屬均有高下燥濕之不同其應行發糶之處難以懸定應令各該督撫按地方風土悉心詳議具題到日再議至所稱一年即有黴爛春盡糶而秋糴之處查地氣最濕之區積至一年容有氣頭厫底變色者但為數亦屬無幾若春間盡行出糶而秋成偶歉穀價騰貴買補不前一時需用無所取資殊失積貯備賑之本意應將風土最濕各地方作何存糶之法一併行令該督撫妥議具題至河北五省遇有歉收之年聽各州縣隨時發糶不拘糶三之處查存七糶三之例非因歉收之年而設若遇歉收價值昻貴各直省原可酌量多糶不必拘泥成例止糶三成至直省各州縣秋成買補之處應如所奏如遇穀價騰湧即將所糶價銀解交府庫俟次年有收價賤照數買補再本地買補恐有派買短價以及抑勒富戶里民等弊務令於鄰近州縣購買以杜弊端又奏稱穀之存倉則有鼠耗盤量則有折減移動則有腳價糶糴守局則有人工食用秋糴之價較春糶之價即稍有盈餘亦僅足以充諸費更祈敕諭督撫嚴飭監司郡守歲終稽查但穀數不虧不得借端要挾庶幾中材可守若有廉能之員適逢秋糴價賤盈餘較多詳明上司别貯一倉以備歉歲發賑督撫按所積數目彚題量加紀録加級等語查春糶秋還其折耗并腳價等費是所不免如遇秋糴價賤除諸費外果有盈餘應聽該州縣官自行據實詳明以備平糶賑濟之用該管上司不得借端要挾勒令多報若照盈餘榖數量加紀録加級其中或有不肖有司希圖議敘或於糶賣之時高擡價值扣剋升斗而於買補之時不遵鄰近州縣買補之例仍行私派里甲短發價銀浮收斛面因此轉滋弊竇苦纍鄉民亦未可定應將所奏議敘之處無庸議可也奉旨依議浙江通志卷七十八
