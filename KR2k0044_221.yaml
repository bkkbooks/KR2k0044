body:
  text: 浙江通志卷二百二十二祠祀六台州府臨海縣附郭先農壇在東郊崇福堂國朝雍正六年知縣陳皓鑑奉文建立壇宇置藉田四畝九分社稷壇赤城新志在郡城西一里舊浙江通志附郭不别置餘縣如制風雲雷雨山川壇赤城新志在郡城東二里郡厲壇臨海縣志在城東北城隍廟台州府志在大固山東北唐武德四年建祀吳尚書屈晃子惠坦吳越時封興聖永安王宋建炎三年封顯佑侯四年加通應慶元二年進靈濟公嘉定元年進順利王明洪武三年止稱城隍之神修建姓氏無考國朝順治間知府郭曰燧髙培前後增修康熙五十八年知府張聨元重修臨海縣城隍廟台州府志在縣治東北一百步德淵廟赤城志在縣東北五里法安院側祀白龍潭崇寧五年令樓君明改壇而建政和五年賜今額建炎四年封滋榮侯時禦海赤頰碧瀛湫水四潭同被侯封俗所謂五龍是也文昌祠舊浙江通志一在佑政廟右一在白雲山一在巾子山靈康廟赤城志在縣東南二十里白鶴山祀東漢趙炳唐仲友白鶴山靈康廟記白鶴山有廟曰靈康其神曰靈順顯祐廣惠王漢人姓趙諱炳宇公阿生於東陽行於烏傷死於章安人為立祠於山之趾未有知其所起者自太平興國暨慶厯間繼顯靈異元豐賜額崇寧始封侯大觀進爵政和錫王號宣和建炎增衍鴻名以迄於今仲友奉命來守以淳熙辛丑嵗正月丁巳謁於廟行視棟宇漏腐傾欹像設圖畫漶漫剝落念承歉嵗方急救飢幸得中熟當議補葺越六日癸亥乙夜城南火西風急將及城闉仲友率官兵撲滅遐禱於神須臾風轉西北城獲全六月不雨復以丁巳祈於廟畢事登舟有雲如練自前山覆廟上急雨俄頃止薄暮大雨旬日霑足既謝神休即計工費命臨海令陳處俊主簿向士斐董其事易敝而新堅壯工緻經始於八月乙巳落成於正月丙午距宣和復建六十年矣自兹以往民之事神不懈益虔章得象靈康廟詩白鶴何年入紫氛空遺靈迹廟猶存巖崖晴鎖雲根老堂殿陰連海氣昏潮上神烏鳴祭鼓夜深鬼火照祠門遼天歸歎桑田事應似麻姑仔細論關帝廟台州府志一在崇和門內一在崇和門外一在楊巷一在衛前一在西門外一在縣前一在宴海樓孔相公廟赤城志在縣東一十八里祀晉孔愈紹興二十八年重建臨海縣志愈避亂入臨海山中既沒人立祠祀之愈常為左僕射故稱相公蕭長史廟赤城志在縣西北一十里祀梁時守蕭洽台州府志唐貞觀二年立鄭廣文祠明一統志在府治東祀唐台州司戶鄭虔虔嘗為廣文館學士貶此明正統十二年重建台州府志虔以文章化俗沒後台人即所居祠焉錢越王祠台州府志在白雲山資善堂東祀武肅王錢鏐附祀宋守錢暄明嘉靖十七年建義靈廟方輿勝覽宣和中盜發仙居戶掾滕膺帥厲吏士濟以方略寇不為患父老立祠於郡側山上朱子義靈廟記慶元元年春正月敕以台州士民所請故直祕閣滕侯之祠為義靈廟台人老稚聞是命下驚喜歡呼奔走迎拜導至祠下酌奠以告大書扁榜金朱煒煌揭於門楣庸侈上賜而其耆父學士大夫葉君聖耦等四十餘人亦會祠庭相與言曰往嵗盜起幫源連陷六州戎毒所加民無噍類而吾台人獨得全其室家仰父俯子傳世不絶以至於今者滕侯力也沒而勿祀固無以慰吾民之心祀而勿命又無以彰吾侯之德今則廟事既修而亦幸蒙上恩列祀典矣顧無牲石以彰始末其何以昭報事於長久且當日棄城冒賞之人其子孫猶有存者蓋嘗肆其妄説強祔其祖以遂侵誣之計吾台之人亦斥其偽以控於朝而報絀之矣然久而不傳則未敢必其無後患也乃以書來請撰其事熹以衰朽欲謝不能而復自念往使浙東留台最久固已熟聞兹事而有感於中矣矧以諸君之請之力其何可辭按台人前進士陳君思恭所為日記及故禮部侍郎陳公公輔諸人之銘序贊頌皆言聞亂之初闔郡震恐太守趙資道郡丞李景淵咸愕眙不知所為謀欲遁去他吏相顧亦無敢出一語者侯方司戶曹事乃獨慨然請任其責有異議者輒面叱之即日移書訣其父母昆弟而閉其妻子於官舍悉召州人諭以利害人人感泣踴躍聽命乃急下令發夫守險增埤濬隍除器募兵積糧致用分屯列柵為死守計日夜循撫甘苦同之城中之人始有固志而守丞以下則皆已遁去久矣既而山民吕師囊兵起應賊號十餘萬導以攻城前後數四侯皆應機設械立摧破之手弓臨城殱厥渠帥賊遂退走卒全其郛凡所存活以十萬計參伍其説一無異辭是則侯之為烈彰彰明矣獨稽史籍則見當時實以守城破賊為丞之功進領郡符就加職秩乃與所聞不類而於妄説反有助焉於是更即諸書以求其故然後乃見當時守丞雖遁而侯獨於所下文書猶必存其位號寇退解圍迎丞以歸俾上功狀而已不預焉丞蓋熙豐故家諸子又皆貴仕故得獨冒顯賞塵䇿書而侯反下從捕盜七人之比僅改京秩初階移官旁郡以去是閹尹擅兵賊臣柄國之所為而後來侵誣妄論所由起也一時之謬流惑萬世向非台之文獻有足徴者民吏稱思久而不怠則亦何所質正而決其是非哉嗚呼是又可歎也已侯名膺字子勤後保南都守陳蔡以抗強敵乘勝焱鋭之鋒勳績尤盛勸進大元帥於濟州所陳又皆當時天下大計切中機會其於建炎紹興之史法當立傳而熹於是書蓋嘗受詔參筆削矣是以因書此碑而并核其真偽如此不惟少塞台人之意亦使後之執筆者有以考焉廟數遷徙今在西北隅永慶寺東實侯所再築而力戰破賊處台人迎侯繼室趙夫人及諸孫仲直等使居其旁通判州事吕君祖儉為買田以資奉守未就而去談者惜之然以台人之德侯如此吾知其繼而成之者無難也陳惠王祠台州府志即鎮寧廟在府治東祀宋名臣陳瓘臨海縣志瓘徽宗朝為權臣所忌徙台州既殁多顯應郡人祀之謝上蔡祠嘉靖浙江通志在上蔡書院中祀宋謝良佐嵗春秋祭葉適謝上蔡祠堂記謝顯道受業二程共遊酢定夫楊時中立皆為髙弟號上蔡先生學者宗其傳謂顔冉復見也不幸遭黨人禁錮未解而卒諸子避難迸逸一死楚一死閩獨克念者流落台州紹興六年給事中朱震子發奏官之尋亦死克念有子偕偕三子無衣食替人承符引養老母嘉定五年太守黃畇子耕修郡志訪求故家得之請見抗賔主禮給冠帶錢米買田宅祀顯道於學在二程後十賢祠臨海縣志在舊普賢寺基祀宋徐中行徐庭筠石墩潘時舉趙師淵杜良仲杜知仁杜範車若水黃超然等十先生明嘉靖十九年御史周汝員同知朱世忠建李忠襄祠臨海縣志舊在天竺院祀宋李顯忠紹興中忤秦檜謫台州今徙本縣城隍廟側朱文公祠台州府志在北固山上明𢎞治間郡守方良節改元妙觀為祠正德間郡守徐鵬舉奏請春秋祀之徐鵬舉建朱文公祠記台之晦菴文公朱先生燕居也先生嘗主管台州崇道觀按宋孝宗時浙東大飢先生受命提舉釐革不便修舉荒政於台奏蠲丁絹寬民逋負諭築陡門勸立社倉開濬河溝築閘十二又修築海濵隄塘利澤及民也溥台民至今德之兩主管台州崇道觀講明道學以淑台人號稱文獻台士又甚德之台人飲食必祭旱疫必禱病祠未建乃言於前守方君良節斥舊觀屋宇立於觀基下三級改作文公祠鵬舉來守台莊嚴藻飾扁以晦菴蓋先生自言在台甚久其眷戀於台必矣建菴於是庶神有所棲而台人不忘之心其亦有所慰矣國朝康熙十年同知劉源溥教授何且純徙今地文信國公祠台州府志在縣東北仙巖嶺上明嘉靖四十二年建祀宋丞相文天祥以黃巖杜滸臨海張和孫併泰和胡文可太平吕武配因德祐二年公自北亡入海泊舟山下之城門村宿和孫家而杜胡吕三人皆從行者故併祀之崇節廟赤城新志在臨海縣東南六十里元末總管達兼善與方國珍戰死於此順帝命立祠祀之賜今額八忠祠臨海縣志在龍顧山明嘉靖元年郡守羅僑建國朝康熙十六年知府髙培同知祖進朝通判王大倫重建洪若臯八忠祠記八忠祠者祀建文死難八人其一為寧海方正學次則葉惠仲臨海人王叔英太平人徐垕黃巖人鄭華臨海人盧原質寧海人鄭恕盧逈皆仙居人當日祠堂位次不以官不以地不以死事之先後或論齒云祠初名忠節又名九忠蓋附東湖樵夫也續祀樵夫於湖亭故名八忠祠謹按王恆叔廣志繹謂寧海林嘉猷鄭公智皆坐方黨死者應在祀典而不及是遜國忠臣台固不止八人也方正學祠臨海縣志在北山百花橋國朝順治十七年徙府學東康熙十一年郡守嶽貞教授何且純重修樵夫祠台州府志在東湖上祀建文時東湖樵夫傳詳忠臣侯瀠東湖謁樵夫祠詩采樵無復白雲邊便把綱常一擔肩楚澤已沉波寂寂殘碑半蝕草芊芊縱君甘作無名士自古誰為不死年此日新祠湖上路長堤黯黯緑楊煙陳恭愍祠臨海縣志在龍顧山祀明布政使陳選舊為丹崖書院正德十六年郡守羅僑奏改為祠金賁亨重修陳恭愍祠記丹崖書院陳恭愍先生昔所藏修以薰及其家若邦之子弟者也先生殁有司暨邦人隨即而俎豆焉既而毛給事憲請於朝錫諡建祠郡守羅侯僑爰拓故址崇構維新嘉靖丙申柱史張公按浙省屬今守許侯繼翻刻先生小學句讀以傳復命别駕林侯鏢相厥垣宇而重葺之名勳祠台州府志在三清察院司後祀明雲南布政戴德孺萬厯辛丑年建德孺協平宸濠之亂後補雲南右布政使行至彭城遭風卒以少卿黃綰言祀名勳祠愍忠祠台州府志俗稱六府祠在巾子山上祀明死難知事武暐嘉靖三十七年建彭應夀愍忠祠詩武侯昻昻七尺軀英風猛氣真丈夫為官台州祿五斗丹心凜凜白日俱憶昔東海翻長鯨海濵白骨啼空營登壇秉鉞何為爾閉城縮首無戰情武侯仗劍輕車逐手斬倭頭血濺腹伏兵俄起震陵谷瞋目大罵侯勢促武侯儒家子市兒烏合兵後救都不至倉皇捐此生滿城父老俱流涕插竹再見雷陽祭嗟侯今日死為誰侯死城完功不細九重遣奠些音傷賜額建祠大道旁香煙不斷松陰滿朱旗白馬時翺翔周公祠舊浙江通志在靖越門內祀明邑令周家棟蔣司理祠台州府志在府治北祀明司理蔣鳴玉王烈婦祠赤城新志在府東南三十步𢎞治三年馬守岱建又於死所薑巖側亦立祠焉傳詳列女雙節祠舊浙江通志在嘉爵橋祀范節婦張氏妾屠氏明萬厯中建傳詳列女臨海縣志祠前嘗生叢草無春冬皆榮葉烈婦祠臨海縣志在大井頭南祀烈婦張氏明萬厯十四年建傳詳列女忠義節孝祠忠義祠在縣學內節孝祠在白雲山下國朝雍正五年知縣陳皓鑑奉文建黃巖縣先農壇在小南門外印山前離城一里國朝雍正五年知縣李淑端奉文建立壇宇並置藉田四畝九分社稷壇赤城新志在縣西隅風雲雷雨山川壇赤城新志在縣南隅邑厲壇赤城新志在縣北隅城隍廟台州府志在縣治東三十步始建無考宋紹興三十年令龔滂重建元大德五年修林昉黃巖州城隍廟記黃巖故有城隍廟於縣治東吳越時封永寧侯入宋賜廟之額曰顯衛端平乙未宰辛安世斥新焉又十有一年當淳祐乙巳更封廣靈侯侯之陰功載在命誥又七年而封侯之父曰啓祐侯然皆不明言其姓某諱某皇元考地計籍壯黃巖之賦登建為州城隍有神亦宜承詔出百縣上而廟獨猥仍其故非所以嚴體貌聳觀瞻也况昔之隆者撓華者漫立者腐不支靈莫於妥尚望其涖此土庇此民乎於是州人鳩材僝工宏創寢廟次聖父殿次竂屬左右序次門樓中為永寧閣大小總一百五十有六楹營於大德辛丑之乙卯建於六月之己丑落成於十月丙寅朔明洪武九年李令震亨建成化丙午燬鄭令達復建萬厯乙亥署縣事李通判果重建袁令應祺成之國朝順治間重修三賢祠黃巖縣志在學宫宋寶定二年朱令日新建祀謝伋葉適徐中行朱文公祠黃巖縣志舊在縣西北明嘉靖丙辰汪令汝達毁縣南禦祟院改建以邑之及門髙弟趙師淵杜華杜知仁林鼐林鼒趙師夏趙師雍趙師蒧趙師端杜貫道池從周一十一人配春秋二丁後致祭國朝康熙丙子年劉令寬重修杜清獻公祠台州府志宋淳祐間建祀丞相杜範明𢎞治間黃公印重建於杜黃嶺墓側嘉靖庚子朱同知世忠毁山神祠改建黃中德杜清獻公祠堂記竊觀漢唐以來以勛業文章居相位者代則有之未聞以道學登台輔若宋丞相清獻杜公之為人者公以淳熙元年十月生於杜曲里淳祐五年四月薨於位還葬於本縣靖化鄉杜黃嶺之原豫惟公以道德名節冠前朝以勛業文章垂後代蓋自趙抃之後諡清獻者一人而已廟食百世誰曰不宜甘棠遺愛祠台州府志在縣治東祀明周守志偉黃綰甘棠遺愛祠記嘉靖二十年秋七月庚子台南海中羣龍交鬬風雨如傾洪潮驟溢瀕海諸邑惟黃巖為甚黃巖惟近海諸鄉為甚吾郡太守陽山周公聞而亟走黃巖躬視災所問其存亡掩其胔骼哺其飢餓遂疏於朝請賑乞減今年田租民咸德之乃立祠邑治東周公字士器南康人陽山其别號也百里瞻依祠台州府志在縣治東嘉靖甲寅邑民以髙令材有惠政建祠祀之忠義節孝祠忠義祠在學宫內鄉賢祠之傍節孝祠在城內尚書坊之側國朝雍正四年知縣李淑端奉文建天台縣先農壇在東郊界牌國朝雍正五年知縣張若震奉文建立壇宇并置藉田四畝九分社稷壇台州府志在縣治西南一百步風雲雷雨山川壇赤城新志在縣東南三百二十步邑厲壇天台縣志在縣北馬公廟後城隍廟赤城志在縣北二百一十步舊在縣東吳越時封始平侯宋宣和二年徙今地赤城新志明洪武二年縣令鄧林重建國朝康熙十一年知縣趙廷錫重修峇山廟赤城志在縣西五十里本龍王祠吳赤烏二年建清聖祠天台縣志在桐柏山祀伯夷叔齊二像明建蕭文清清風祠記余遊天台桐柏宫入法堂見夾室有二石像衣冠甚古叩其石甚堅緻背有古字拂塵視之一曰伯夷一曰叔齊豫問所從來道童曰相傳趙宋時宫有黃道士者知醫宣和天子召治母后疾疾愈官之辭賜之金帛辭獨乞此二像載以歸豫聞喟然乃求隙地得二丈餘髙明爽塏松筠交蔭可作室以庇像以語鍾令令欣然從事又白太守談公題其門曰清風國朝康熙五十六年知府張聨元奉檄重建更名清聖張聨元清聖祠記余尋桐柏觀舊址旁有茅舍一間供奉伯夷叔齊二大石像中空外潤背分明髙古端嚴凜凛有生氣道書載伯夷叔齊為九天僕射治桐柏山宋時建九天僕射祠至明改建清風祠今制府滿公以桐柏山係祀古賢名勝之區亟宜修建大中丞朱公改題清聖祠旁以司馬承禎配元應善利真人祠天台縣志在縣西天慶觀瓊臺之左赤城志祀仙人王喬淳熙九年唐守仲友建劉阮廟赤城志在縣西北三十里雙闕下元祐二年建世傳二仙所至即其處徐文肅祠台州府志明洪熙元年念左贊善徐善述輔導之勞敕建祠墓側春秋祀之方侯祠舊浙江通志在城隍廟西祀明邑令方印陶望齡方侯祠記公字與信𢎞治癸丑以鄉進士來知天台明年暴卒篋俸八百錢耳民爭致賻以斂斂畢謀繪像弗逮而鄉民故多生繪像奉於家以幀來擇尤肖者而歸之民為巷哭罷市踰年躋祀於名宦又共為歌詩以哀之既而謀作專祠未果公元孫今御史大鎮來按浙鹺與祠事會既愴且慕省厥工不煩重父老佐之以廩餼祠遂成忠義節孝祠忠義祠在縣學內節孝祠在縣東大街國朝雍正五年知縣張若震奉文建仙居縣先農壇在東關外國朝雍正五年知縣吕賔裔奉文建立壇宇并置藉田四畝九分社稷壇赤城新志在縣西二里風雲雷雨山川壇仙居縣志在東郊之南邑厲壇台州府志在縣北郊外城隍廟赤城新志在縣治東六十步明洪武三年縣令王從古建國朝康熙十九年重建佑聖真君廟赤城志在縣西二里淳熙十二年建蒼山廟赤城志在縣南四十里祀吳將軍朱剛赤烏元年建慈感廟仙居縣志在縣北六里祀杜氏二女嘉靖十六年以鄭氏二女配改曰四烈女祠張儉慈感廟記吾邑去西北三十里曰盂溪唐天寶中建貞女祠祀杜氏二女即其死所也每嵗旱禱雨輒應宋宣和中民避寇其間寇望山中草木皆為兵畏不敢犯民德之别建慈感廟於五里之內以便供祀至嘉靖丁酉郡二守朱公按邑建雙忠祠祀靖難忠臣盧鄭二公以鄭二女禮弗同享徙以配杜氏二女顔曰四烈女祠奬忠節也祠初隘陋公拓其周垣大其寢室又置前堂為士大夫瞻拜之所不勞力重費踰時一新而四女之烈家聞而戶曉矣公名世忠字良弼歷官咸著顯迹此其緒餘云六賢祠台州府志在文廟西廡祀通判蔣旦特進陳庸龍圖吳芾待制郭磊卿侍郎鄭雄飛縣尉吳諒古靈祠嘉靖浙江通志祀宋縣令陳襄舊在戟門西嘉靖初徙南峯山三處士祠仙居縣志在南峯上古靈祠左祀宋處士林訪吕徽之翁森趙長官祠台州府志在安洲驛右祀宋令趙善􅜜趙主簿廟仙居縣志祀里人趙時栗宦鹽官死元人之難立廟祀之忠烈廟赤城新志在縣南元吳仲修為黃巖州同知處盜來寇與戰不屈而死故祀之虞俊明忠烈廟記至正十三年台城兵變郡監聞公有氣節遣使禮聘公力辭弗就勉之再四乃起署事黃巖州判官分守台城至正十六年春處州睦寇起將犯仙境遂升公同知州事總制其鄉之義兵公慨然曰吾今為王臣矣當勤王事况仙吾父母邦也捕之其可後乎即合鄉兵數千人奮躍而往禦戰於羅漢潭賊危困不敢進鄉民吳奉一者陰為賊向導賊乃凌晨突圍襲其不備官軍倉卒多散去公獨披甲上馬與戰手刃數十人而賊衆潛掩其後遂遇害事聞立祠於邑南狀元坊擇地七百武度材鳩工祠成塑公像有司復上其事贈公台州路黃巖州知州表其廟曰忠烈雙忠祠台州府志在縣治西北隅明嘉靖間建祀忠臣盧迥鄭恕應良雙忠祠記仙有二忠臣焉曰戶部侍郎盧公迥蕭縣令鄭公恕嘉靖丁酉九月郡二守朱侯行縣至仙縣廨西有妖祠侯立命撤之即其地建新祠祀盧鄭二公復表諸通衢曰雙忠祠二公皆仙之二十六都人盧公於方正學之門從遊最密其死也在壬午夏六月亦與正學同時鄭公壬午夏靖難師至率鄉兵拒戰敗而南奔尋被獲以八月十七日誅二公之官守有大小世裔有興滅事迹有顯晦而要其精忠大節無異轍焉馬公祠仙居縣志在學宫西祀明令馬濓傳詳名宦烈女祠台州府志在縣治北明萬厯間建祀烈女顧惜寶及使女阿香傳詳列女忠義節孝祠忠義祠在明倫堂東側節孝祠在西門城內國朝雍正五年知縣王立常奉文建寧海縣先農壇左東郊外國朝雍正六年知縣黃光嶽奉文建立壇宇並置藉田四畝九分社稷壇台州府志在縣西二里風雲雷雨山川壇萬厯寧海縣志在縣南一里邑厲壇赤城新志在縣治北一里城隍廟台州府志在縣東南二百步唐武德中建宋紹興二年令薛抗修明成化間令郭紳拓而新之楊文卿寧海縣城隍廟記寧海縣治東百步城隍廟在焉廟之建昉於唐武德中吳越時封廟神為安仁侯宋隆興初令薛抗為之改創入元隳廢明正神號曰寧海城隍之神廟至今百年於兹矣廊廡圯壞地為居民所侵雖其廟獨存隘陋亦甚成化十二年宜陽郭君紳來知縣事顧瞻惕然相規度勢復其民所侵之地撤其舊所有之宇而新之訖工規模壯偉士庶具瞻梅長者祠台州府志在丹邱寺前宋淳祐中建祀流寓梅盛方孝孺梅長者祠堂碑記台之寧海有梅氏考之圖譜昔有諱盛字昌國者仕晉為章安令擢南昌别駕知晉將亡即是邑而隱焉常誦佛書而有靈鳥降其所居之側若諦聽者嵗餘始知郡縣以為鳳集上其事宋文帝聞而丁詔褒之上表稱謝曰此殆覽陛下之德輝耳臣何與焉帝咨嗟稱為長者仍命郡縣闢其所居舍為丹邱寺云今八百餘年矣其子孫衆多為邑巨家而寺亦不廢宋淳祐中諸孫之學佛者良阜建重閣像而事之歷年雖久而未有記其事者夫以劉宋立國未數十年而宗社為墟長者之傳今千載而猶未艾此其所為之可稱豈特一言之善哉祠而奉之使聞長者之風者去浮薄而趨忠厚豈不足為天下勸乎李太尉廟赤城志在縣西北五十里祀唐李光弼宋建炎中重建台州府志唐袁朝據浙東李光弼擊斬之朝弟瑛從五百騎遁入紫溪洞中光弼駐兵洞口絶其糧道其徒皆餓死居民感其德為立祠陳長官祠萬厯寧海縣志原在學宫西今改移縣治東妙相寺前祀五代賢令陳公毛馭續修陳長官祠記長官姓名無考寧人世以長官稱之當吳越王據東浙雄並天下謀益賦於民以是國餉十倍獨長官治寧弗受脅抗羊毛二使詞甚激意可使一身被殺僇毋令百姓苦萬世二使怒竟死諸獄中事上王感悟遂罷寧賦故寧賦無重徴者長官惠也僉謀以祀正德庚辰適余來寧士民以事狀白余而夀官黃鎮袁練直以身任董事之責余曰祀之立廟以存忠義表賢節而報功德者也况今之祀又出於人心之同然者乎遂卜宅略基於妙相寺之右量工命日不數月而考成焉赤城先生祠赤城新志在寧海吉祥寺東祀宋羅提刑適洪忠宣公祠台州府志在梁王寺前忠宣嘗為寧海主簿故祀之子適復為台州通判方氏祠堂萬厯寧海縣志在緱城里洪熙中建祀方正學父子尋為民人所侵成化中知縣郭紳反所侵地重建正學祠寧海縣志原建卧龍山明隆慶六年巡撫謝廷傑檄所屬修葺萬厯三年郡守李時漸移西門內知縣曹學程修崇禎壬申知縣宋奎光重修忠義節孝祠二祠俱在東郊外國朝雍正五年知縣黃光嶽奉文建太平縣先農壇在東門外國朝雍正四年知縣戴世祿奉文建立壇宇並置藉田四畝九分社稷壇太平縣志在觀海門外半里風雲雷雨山川壇台州府志在縣治東邑厲壇太平縣志在仰山門外鳳凰山下城隍廟赤城新志在縣東五百步明成化五年知縣常完建烈士祠台州府志在第一都谷嶴明知縣曽才漢為溧陽教授林夢正建傳詳忠臣忠節祠太平縣志在皇華亭北祀明翰林編修王叔英傳詳忠臣台州府志萬厯間同知朱世忠建題曰忠節又建貞烈祠於右以祀金夫人併二女焉袁公祠赤城新志在太平縣東南四十步𢎞治二年邑民陳儒敷等以前令袁道有善政立祠祀之傳詳名宦烈婦祠台州府志一在縣治東北二百步明郡守羅僑檄縣建以祀林烈婦薛氏一在縣治西三十五里知縣祝𢎞舒建以祀朱烈婦吳氏傳詳列女忠義節孝祠二祠俱在東門直街國朝雍正四年知縣戴世祿奉文建浙江通志卷二百二十二
