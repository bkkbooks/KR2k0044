body:
  text: 浙江通志卷一百四十五選舉二十三國朝武進士武舉人大清會典會試天下武舉定於辰戌丑未年舉行第一場試馬箭第二場試步箭第三場試策論順治二年題準會試中式二百名康熙十八年己未科以後中式一百名大清會典順治二年題準子午卯酉年舉行鄉試第一場試馬箭第二場試步箭再試開弓舞刀掇石以驗技勇第三場試策論凡解額厯年多寡不同康熙二十三年甲子科以後定額浙江中式五十名康熙四十八年十月初六日欽奉上諭武科取士國家大典數科以來所見人才技勇漸不如前此事關係甚重宜廣其途以備録用如在內部院司官筆帖式兼管武職厯升至堂官者不乏其人在外提督總兵官亦多起家行伍人才何定之有現在八旗監生充甲兵者俱有入文場應試之例今直省緑旗各營兵丁及拔補把總千總並年滿千總等久在行伍多有健勇及善射之人此等人員內有能讀書通曉文義願入武場應試者應分别令其應武鄉會試其應鄉試者即於所在充伍及出仕地方應試不必復回原籍至雲南貴州廣西等逺省來京應武會試者亦應酌定中額使不至脫科以示鼓勵如此則緑旗人員內有技勇者皆得入科目以自效而武榜人員內亦得實有技勇之人於武科甚為禆益其福建廣東二省武進士舉人生監或兵民人等有熟諳水性練習水師事宜願於出洋巡哨船隻隨官民效力者如果能擒殺賊衆立有功績著督撫察明保題具奏欽此武進士順治六年己丑科會試全録散佚今據舊志及册籍登載茹羆山隂人探花參將戴天模山隂人逰擊陳錫華山隂人盛其德山隂人參將陶子元會稽人都司陸元文會稽人參將順治九年壬辰科王玉仁和人三元福建都督謝志遷於潛人順治十二年乙未科呂之引錢塘人陳青仁和人陳正仁和人鍾其瑞仁和人周珍仁和人高允焯山隂人陳則都山隂人劉燧山隂人吳三才山隂人時晉賢會稽人黃閣浦江人順治十五年戊戍科胡壇錢塘人王祚昌仁和人宋榖慈溪人劉炎山隂人狀元總兵葉逢時山隂人李彬山隂人都司吳錫綬會稽人章靖蘭溪人柴定國建德人黃功成淳安人張受玘遂安人順治十八年辛丑科王之策仁和人裴希賢仁和人金日章仁和人陳新仁和人黃掄嘉興人陸燦平湖人守偹烏鎮慈溪人郎天祚山隂人狀元副將董德政山隂人張國勳山隂人張培山隂人吳良駿山隂人徐城會稽人王猷會稽人王言大金華人荆州守偹康熙三年甲辰科嚴槫錢塘人李標錢塘人周緒山隂人守偹王廷綵蕭山人康熙六年丁未科馬之駿杭州人龔堂湖州人鈕元會稽人張良佐衢州人楊光表麗水人康熙九年庚戍科張學純杭州人探花吳鴻業杭州人侍衛陳王路錢塘人貴州副將戴晉侯錢塘人王濤嘉興人福建遊擊高百揆嘉興人葉友篔慈溪人唐驤金華人周文英永嘉人康熙十二年癸丑科王廷瑚杭州人副將康熙十五年丙辰科段志臯杭州人俞兆翀慈溪人康熙十八年己未科儲塤錢塘人探花參將周維城海寧人會元唐汾湖州人俞章言山隂人都統羅淇會稽人狀元副將胡紹鼎西安人康熙二十一年壬戍科王夏錢塘人孫焕仁和人趙文璧仁和人探花總兵方輿衢州人康熙二十四年乙丑科蔡燾蕭山人徐之杰衢州人康熙二十七年戊辰科洪承祥杭州人寧夏守偹汪文浤新城人戴嘉模紹興人康熙三十年辛未科戴楠石門人康熙三十三年甲戍科尤毅秀水人蕭麒秀水人殷紹選海鹽人孫斌紹興人錢士榖山隂人沃親臣蕭山人王選蕭山人康熙三十六年丁丑科程鎮儀昌化人錢廷璋海鹽人康熙三十九年庚辰科張浦錢塘人楊慧文錢塘人何聖兆錢塘人徐芳仁和人孫王法仁和人章立幟臨安人章塤昌化人羅敬宗嘉興人蔣俊餘姚人康熙四十二年癸未科陳勇錢塘人葛寅錢塘人朱良祝仁和人章金銓仁和人黃尊周仁和人查洪海寧人孫江秀水人張集蕭山人王鵬金華人方熹金華人侍衛遊擊洪燦淳安人康熙四十五年丙戍科周鎔仁和人馮鳯秀水人陳元佐嘉善人徐願愚桐鄉人徐願拙桐鄉人顧雲龍歸安人邱士傑歸安人楊景勤烏程人宣朱衣鄞人湯傑鎮海人史節文定海人來之焜蕭山人俞有勳蕭山人康熙四十八年己丑科馮鸞秀水人石天錫秀水人費金歸安人周科貴鄞人胡天渭鄞人金介檜會稽人袁星諸暨人徐天麒黃巖人周廷欽蘭溪人康熙五十一年壬辰科嶽旻錢塘人袁𢎞譽錢塘人周普錢塘人魯宗稷錢塘人錢鎮錢塘人孫皋仁和人黃銓仁和人張天柱嘉興人施嘉楫山人隂趙輝祖山隂人侍衛吳洀會稽人王翼淳安人康熙五十二年癸巳科葉芬錢塘人沈銓錢塘人田瑛錢塘人金昆仁和人會元江煜仁和人張翃海寧人陳廷棟桐鄉人莊枚鄞人黃澍祚山隂人龔煒西安人金之掄江山人康熙五十四年乙未科王機錢塘人章金鑑仁和人董繩武仁和人侍衛徐綬嘉興人馮昺秀水人姚本道石門人李鑑烏程人康熙五十七年戊戍科王德純錢塘人姚澄歸安人朱英烏程人呂旦山隂人金以忠會稽人來之燦蕭山人龔必增西安人康熙六十年辛丑科徐有文昌化人王斌嘉善人李周郁烏程人徐光均會稽人雍正元年癸卯科龔用國烏程人許燮烏程人丁文揆蕭山人雍正二年甲辰科蔣元鍸嘉興人侍衛姚佐元歸安人馮乃斌山隂人雍正五年丁未科朱斌錢塘人葛元平湖人孫鼎元鎮海人金藩金華人何懋義烏人楊金建德人雍正七年庚戍科沈士瑚烏程人高士珩烏程人程德亮開化人臧正煒分水人雍正十一年癸丑科沈虬嘉興人許元平湖人沈槐音烏程人陳正儼蘭溪人武舉人順治四年丁亥科順治鄉榜題名全録散佚今仍依府志登載以下同馬龍文錢塘人吳昌錢塘人宣言錢塘人支鰲錢塘人李廷用錢塘人楊澄錢