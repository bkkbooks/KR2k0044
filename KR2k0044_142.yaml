body:
  text: 浙江通志卷一百四十三選舉二十一國朝舉人順治二年乙酉科是科由順天鄉試中式按榜名次施𢎞烈平湖人松江同知方于光德清人己丑進士章雲鷺山隂人丁亥進士徐化龍山隂人丙戍進士朱之錫義烏人丙戍進士胡兆龍山隂人丙戍進士方國棟德清人樓晟鄞人丙戍進士袁懋功餘姚人丙戍進士王士驥會稽人丙戍進士王之鼎山隂人丁亥進士金昌允會稽人陸華疆會稽人丙戍進士陸嵩會稽人丙戍進士葉獻章山隂人工部郎中順治三年丙戍科以後舉人俱按浙榜名次馮美玉烏程人丁亥進士錢茂秦慈溪人己丑進士翁祖望錢塘人己丑進士姚任賢秀水人松江教諭張貞侯桐鄉人戊戍進士陸費錫桐鄉人辛丑進士范光文寧波人主事戴京曾錢塘人己丑進士張煒餘姚人張期振山隂人孔自洙桐鄉人已丑進士沈元旭慈溪人皇甫應全桐廬人延津知縣趙陛會稽人方躍龍於潛人主事朱濟長興人知縣蔣爾琇諸暨人知縣范進會稽人知縣陳贄烏程人己丑進士張之楙餘姚人呂正笏新昌人葉鍾芝蘭溪人己丑進士費坡慈溪人王振孫餘姚人德清教諭查煊海寧人烏程教諭湯自梁平湖人劉兆元仁和人己丑進士葛果錢塘人知縣梁國成仁和人陳嗣華海鹽人童竒齡餘姚人教諭王雅慈溪人己亥進士柴望仁和人丁亥進士黃象雍寧波人己丑進士范楷石門人新城教諭陸濬睿平湖人推官孫籕嘉善人己丑進士周士雅常山人象山教諭王臣彥仁和人鄱陽知縣髙駿升秀水人石埭知縣閔圻申湖州人孫應龍餘杭人金漢鼎義烏人己丑進士范會稽人南康同知馬鑣台州人錢江嘉興人己丑進士邵嘉引富陽人乙未進士殷森平湖人長興教諭周文華海寧人丁亥進士任雲蛟蕭山人嘉善教諭鍾天錫歸安人教諭詹惟聖建德人壬辰進士徐騰桐鄉人壬辰進士曹爾堪嘉善人壬辰進士李頲長興人己丑進士吳天麒餘杭人商民宗淳安人壬辰進士胡之琳淳安人唐允思會稽人黃登洲義烏人曹日勉桐鄉人安州知州徐孚貞海鹽人鄭龍光平湖人己丑進士黃機錢塘人丁亥進士余有章會稽人禮部貟外許士璜海寧人己丑進士姚元煐錢塘人丁亥進士朱霞石門人乙未進士馬偀寧波人己丑進士龔勳山隂人乙未進士方明隆蕭山人冠縣知縣范廷元寧波人己丑進士陸元龍錢塘人丁亥進士錢肅凱鄞人戊戍進士尤師錫桐鄉人乙未進士閔辰生湖州人駱起明諸暨人知縣鍾元奎桐鄉人鳳翔推官裘秉懿富陽人張懋華桐鄉人餘姚教諭胡亶仁和人己丑進士祝紹烶會稽人黃光壽仁和人李方晉東陽人沈之璉嘉興人己丑進士孫學繼臨海人沈昶歸安人朱嶙鄞人沈閎劭嘉興人己丑進士黃泰徴寧波人壽以仁餘杭人己丑進士陳凝德清人己丑進士岑嵩餘姚人許元孝餘姚人知縣王教德清人己丑進士袁英新城人己丑進士倪籥元平湖人己丑進士張天植秀水人己丑探花魏開禧湖州人壬辰進士聞斯振武康人衛之瓊長興人己丑進士王起彪錢塘人丁亥進士王紹隆海寧人己丑進士楊鵬杭州人孫光旭錢塘人辛丑進士許其旋德清人夀昌教諭駱鍾麟臨安人常州知府茹鄂侯山隂人天以下十四人順中式方希賢山隂人壬辰進士王學橒山隂人謝泰會稽人己丑進士裘興祖富陽人張士甄鄞人己丑進士徐兆行山隂人周繩烈蕭山人丁亥進士丁同益會稽人丁亥進士徐兆舉山隂人丁亥進士胡升猷山隂人丁亥進士胡惟德餘姚人丁亥進士葉茂桂山隂人王之鼎山隂人順治五年戊子科王嗣臯慈溪人己丑進士錢君銓平湖人己丑進士汪繼昌嘉興人己丑進士王慶章山隂人己丑進士陸函仁和人周曾發慈溪人己丑進士壽肇基諸暨人知縣顧虞龍上虞人唐彥􅐆桐鄉人己丑進士謝重上虞人鄭光國餘姚人韓城知縣楊鼎仁和人癸丑進士王協秀水人壬辰進士孫嘉善人辛丑進士陸彪烏程人己丑進士王端宗烏程人姚泰塤上虞人塢景從餘姚人己丑進士沈元荃海寧人會寧知縣李熊嘉興人辛丑進士王廷開化人羅山知縣項臯餘姚人臨漳知縣徐上扶鄞人壬辰進士周沛生山隂人戊戍進士張以耀桐鄉人查蜚英海寧人醴泉知縣繆徴尹山隂人施煒歸安人王曜宫杭州人尹衡歸安人己丑進士章金范德清人陳增新嘉善人安仁知縣駱寧楨義烏人辛丑進士郭宗儀海寧人真定知縣王召湖州人俞思舜臨安人寧海教諭董允愷鄞人徐友貞海鹽人知縣陳鼓永海寧人乙未進士馮肇楠會稽人戊戊進士呂應鐘餘姚人壬辰進士李元烇歸安人壬辰進士朱旗嘉興人乙未進士虞士彥德清人富陽教諭李禧熊仁和人壬辰進士魏學渠嘉善人湖廣提學副使章天生金華人知州郭裒采石門人張嶷秀水人徐岱餘姚人知縣姚工亮嵊人內鄉知縣茹鉉山隂人甲辰進士戎上德鄞人壬辰進士鄒璜桐鄉人仁和教諭王雲鳳分水人趙忠春東陽人祝文震海鹽人壬辰進士舒暢武康人乙未進士夏復餘姚人魏允枚嘉善人西安教諭范光遇寧波人己丑進士徐𢎞彰嘉興人李元震蘭溪人知縣張我朴嘉善人壬辰進士孫承麟臨海人廬江知縣屠粹忠鄞人戊戌進士馮遵祖歸安人癸丑進士沈敘錢塘人户部主事馬紹曾平湖人己丑進士黃自起秀水人己丑進士屠肅嘉興人何紘度臨海人壬辰進士湯棻桐鄉人澄川知縣張翼寧波人壬辰進士季友臨海人富順知縣勞叔引石門人潁上知縣王褒會稽人知縣朱宗元鄞人沈大觀海寧人蕭縣知縣唐賡堯會稽人壬辰進士周曰庠歸安人楊汝珩桐廬人方學望新城人青陽知縣章平事諸暨人壬辰進士楊許玊德清人太原同知何元英秀水人乙未進士顧名俊石門人沈君燮烏程人姚深秀水人沈令式杭州人己丑進士丁景鴻杭州人吳涵錢塘人己亥進