北五十里宋嘉定間郡守趙彦琰築起自湯灣訖於黄家浦共六千一百六十丈砌以石者三之一以捍海潮之衝突自洪武以來累修累壊石皆無存成化八年風潮大作塘盡壊山會蕭三縣濵海之民皆被患有司議加修葺蕭山縣捍海塘在縣東二十里長五百餘丈濶九尺宋咸淳中為潮水衝壊越帥劉良貴所築洪武中復壊邑令王文器請於朝集夲府及衢嚴人夫具木石修築得不圮壊成化八年風潮大作塘存無幾旋加修築嘉靖餘姚縣志海在治北四十里東起上林西盡蘭風七鄉一十八都之地悉瀕於海海水北流薄於海鹽東通定海之蛟門西過纂風亭入鱉子門通錢江海水南有斥地縱十數里横亘八九十里海壖鹵脆易傷潮流溢決漸侵内地蕩民居害嘉穀前代作隄禦海所從來乆文字殘缺莫可考功之可見者宋慶厯七年縣令謝景初自雲柯達上林為堤二萬八千尺王安石海堤記自雲柯而西有堤二萬八千尺截然令海水之潮汐不得冒其旁田者知縣事謝君為之也始堤之成謝君以書屬余記其成之始曰使來者有考焉得卒任完之以不隳謝君者陽夏人字師厚景初其名以文學世其家其為縣不以材自負而急其民之急方作堤時歳丁亥十一月也能親以身當風霜氛霧之毒以勉民作而除其菑又能令其民翕然皆驩趨之而忘其役之勞遂不踰時以有成功其仁民之心效見於事如此而猶自以為未也又思有以告後之人令嗣續而完之以永其存善夫仁人長慮却顧圖民之菑如此其至其不可以無傳為書其堤事因并書其終始而存之以告後之人慶厯八年秋記其後有牛秘丞者又嘗為石堤已乃潰決於是歲起六千夫役二十日費緡錢萬有五千修之民疲而害日甚慶元二年縣令施宿乃自上林而蘭風又為堤四萬二千尺其中石堤五千七百尺歲令令丞簿尉分季臨視之廟山三山寨官月各遣十兵與鄉豪邏察有缺敗輙治仍請於朝建海堤倉歲刮上林沙田及汝仇桐木等湖廢地總二千畝課其入備修堤費樓鑰海堤記餘姚為紹興壯縣岸大海者八鄉分東西二部綿地一百四十餘里舊有長堤蔽遮民田孝義龍泉雲柯三鄉沙漲土髙無風潮衝決之患開原東山蘭風梅川上林五鄉間有缺壊實為民憂慶元二年縣令施君宿始至詢究利害得其要領選鄉豪公直強幹人所信附者十五人分地而共圗之尉曹趙君伯威復協佽助務為乆計以蘇民瘼葢在承平時提刑羅公適知縣秘書丞牛君嘗伐石為堤今既百年蕩在海塗乃按跡取之得其故石創業二千七百尺用工二十萬三百六十而東部之田始有蔽障其西部之謝家塘王家塘和尚塘悉為紹興五年秋濤所決於是復度為石堤三千尺鄉民趙明釋子行球董其役約費甚重縣不足供列於府監司提舉常平劉公誠之首助穀三百斛勉為之凡所陳請率應如響通守王公介幹辦公事王君柄左右尤力令得展布而堤用告成其髙一丈石厚一尺為一層用石三萬尺縣出緡錢四千三百有竒縣之士大夫與其鄉人助工三百萬費猶未足也然則兹役亦甚重且大矣思其重大而慎於守䕶縣之官分季臨眡廟山三山兩寨官月遣十兵巡之鄉豪仍伺察焉稍損缺即白邑補治之復議刮上林海沙田二百三十餘畝及汝仇湖外之地六百八十三畝桐木廢湖七百四十五畝凡為田一千六十八畝又將益求曠土以足二千畝之數築倉於縣酒務之西儲其歲入以備修堤之用歲省重費民遂息肩而劉公復請諸朝乞以其田準常平法一毋他用仍禁官民户之請天子輒報可吏民祇拜明命刻之堅珉竊惟令之宰劇縣者簿書期會日不暇給如水利之政趣了目前姑以辦聞其至誠愛民而才智足以行如施君者幾人哉君湖之長興人司諫之子司諌用不盡其才君能世其家其治縣百廢具興銖積寸累以成是役庸作為詩章使後人歌以守之俾勿壊其詩曰舜江之為邑兮處越之封八鄉瀕海兮水浴日而吞空古有長堤兮庸蔽遮乎一同人力有限兮海濤之來無窮濤來如山兮駕以颶風堤遂缺壊兮葦不可障而泥不可封民將為魚兮良田墊於馮夷之宫歲歲勞費兮民苦告以鞠凶萬五千之緡錢兮十二萬之民工惟令之賢而才兮有曹尉之和衷築土累石兮折彼巨浪之衝矗如長城兮繚海南之西東部使者主之於上兮飛章徹於九重仰明聖之恫矜兮朝奉而暮惟民欲之從墾田倍於千畝兮藏其收於廩中禁豪右之侵漁兮惟修堤之是供化斥鹵兮土膏隆隆變歉歲兮為年之豐良耜畟畟兮多稼芃芃穫之積之兮將櫛比而墉崇惟後人之勉勉兮用心以公視此堤之缺兮謹顓顓其彌縫念經始之艱難兮尚圖功於厥終至寳慶及元大徳以來復潰決海壖内移八鄉之地悉漸於海至正元年州判葉恒乃作石堤二萬一千二百十一尺下廣九十尺上半之高十有五尺故土隄及石堤缺敗者盡易以石葢沿海壖之南東抵慈谿西接上虞袤一百四十里初名蓮花塘俗呼為後海塘云陳旅海堤記餘姚北枕大海其地曰蘭風東山開原孝義雲柯梅川上林者皆潮汐之所争也元陞餘姚為州州視縣得展其所為然未有能除民所甚病者葢海壖自寳慶内移大德以來復益衝潰今壖去舊涯之墊海中者十有六里歲楗木籠竹納土石潮輒齧去之至元再元之四年四月方成堤六月復大壊紹興路總管府檄委州判葉君恒治之君視壊堤自開原至蘭風見凡土為者皆闕惡愀然曰是則為民病也有窮已乎遂與其鄉老人議為石堤宜則又曰攻石費鉅出錢大農當煩文書遲歲月比得請州其沼矣若等能與我共為之乎今費雖鉅常歲之費則省而若與子孫奠居無虞也聞者咸曰民志則然白於府府亦聽民所為於是有田者願計畝出粟或輸其直至者以力亦喜於服役君屬民髙年與正於里者掌出納以率作又請於府免民他科徭以悉力是役宣閫亦下書毋以他事使葉判官輒去州君先使人浚河渠後廢防畜湖水伐石於山以舟致之分衆作為十有五所所有程督君往來涖之其法布杙為址前後㕘錯杙長八尺盡入土中當其前行陷寢木以承側石石與杙平乃以大衡縱横積疊而厚宻其表堤上側置衡石若比櫛然又以碎石傅其裏而加土築之堤髙下視海地淺深深則髙丈餘淺則餘七尺長則為尺二萬一千二百十又一也其中舊石堤之危且闕者亦皆治完之至正元年三月成是役也用民之力而民不知勞賦民之粟而民不知費葉君鄞人字敬常宋時分東西部自雲柯以東者號東部塘始築於謝景初其雲柯以西者號西部塘西部之内曰謝家塘曰王家塘曰和尚塘皆前人觀水勢底止因便宜分部築之長短髙下異形至元葉恒所築則因舊為新包山限海綿亘為一無復部分入明百餘年來所以無大害者多恒之功徳然民皆習安利排海壖居之堤日削不完成化辛卯海溢民多溺死正徳壬申海又大溢溺死者無筭於是始興人徒築之堤僅完北鄉無海患今堤又多毁缺每三秋值大汛潮天嘗連雨東北風張甚海鷗咻咻夜鳴瀕海而居者多憂海溢有司者重民命歲治堤防備非常可以上前人之績下生生民矣萬厯上虞縣志海塘在縣西北寧逺新興二鄉東自餘姚蘭風鄉而抵會稽延德鄉元大德間風濤大作漂没寧逺鄉田廬縣役闔境之民植楗畚土以捍之費錢數千緡完而復圮後至元六年六月潮復大作遂成海口陷毁官民田三千餘畝餘姚州判葉恒相度言海高於田非石不能捍禦府委恒督治適滿代去縣尹于嗣宗募民出粟築之至正七年六月大潮復潰府檄吏王永議築永勸民田出粟一斗以相其役伐石於夏葢山其法塘一丈用松木徑尺長八尺者三十二列為四行參差排定深入土内然後以石長五尺濶半之者平置木上復以四石縱横錯置於平石者五重犬牙相銜使不摇動外沙窊窞者疊置八重其髙逾丈上復以側石鈐壓之内填以碎石厚過一尺壅土為塘附之趾廣二丈上殺四之一髙視石復加三尺令潮不得滲入塘成凡一千九百四十四丈夏泰亨海堤記上虞負海為邑其北為潮汐上下之地舊壘土為隄以障之興作修治歲乆沿革不能詳焉自大徳以來水暴溢則堤岸時有衝潰既治輒壊至元又元之六年六月風濤大作其地曰蓮花池等處齧入六里許横亘二千餘尺並堤之田莽為斥鹵歲加繕完民遂罷於築堤之役至正六年民招庠等羣訴於縣縣上其事於府時餘姚州濵海諸鄉同受其病州判官葉恒與民議以石易土俾凡有田者畝出斗粟或輸其粟之值鳩工伐石更為之而工適成府令上虞縣循其故實仍檄葉判官董治之會葉君以公故弗及而去明年秋民復訴於府郡守威喇實克與幕長吳君申議以府吏王仲逺為能即以委之仲逺承命既至即與監縣偰烈圗縣尹張叔温集民之醇謹更事者商究經營之凡出粟之家無敢有後計其直總為中統鈔三十二萬九千五百貫有竒掌以傅夀昌盧安翁而公其出納採石於夏葢山浚溝浮舟以進售材必良擇匠必精趨事者無惰受傭者無怨仲逺旦暮程督食寢起處與工作同事雖更歲時冒寒暑卒不得以勞勩為憚其為制則錯植堅木以為􅍻入土八尺臥䕶側石以為防髙與􅍻等然後疊巨石其上縱横密比穹厚堅固復實剛土雜石而築平之重覆以石堤之崇卑視海堧為髙下焉既成以度計之凡為一萬九千二百四十尺又即所浚溝上築土堤以為内備髙廣過之隠然若重城之捍蔽矣訖工於九月之冬而民力稍息豈非郡守幕長愛民之切知人之明而委任之力與二十二年秋颶風頓發土塘衝齧殆盡府檄斷事王芳督治兼縣尹總理之及度夏葢湖所灌之田畝出粟一升於西偏鵲子村作石塘二百三十二丈而海患以息劉仁本記其事明洪武四年秋土塘復潰郡守唐鐸與縣令趙允文䇿之易以石委其事於府史羅子真時趙以秩滿去而子真殫心力以經畫如元時王永所築謝肅有記三十三年其西又潰臨山把總聞於朝府檄主簿李彬視事未幾别調乃委典史陳仕畢工兩閱月而事竣萬厯四年丞濮陽傳清釐水利有海塘湖塘要害議其經畧纎悉靡不當者濮陽傅海塘湖塘要害議縣治西北三十里之外有曹娥江江東一帶南自十都起至九都八都七都六都五都北抵餘姚縣界約地一百餘里其沿泊江岸海潮泛漲則有漂没之患内有上妃白馬夏葢等湖堤防廢弛則有旱乾之憂故沿江之岸當築埂以防潮汐田上之湖當滀水以防乾旱但海塘湖塘年乆低塌及至修理圩長閘隣皆係無産棍徒嗜酒貪利不能號召服衆以至富豪有田者倚强髙臥貧困無田者枵腹虚應公差紛爾催勾完狀徒為虚紙或湖塘遭旱或海塘被衝不惟害稼且致溺民公私俱困今當勘得各該堰閘壩埂等處如西踏浦荷花池思湖前莊鵲子查浦番花廟董家灣張家埠大河口花宮王家潭潭村賀家埠趙村河口葉家埭備塘者隨即酌處照産田丁派工修築着令居民種揷細栁桑柘等樹毋得將灑水草絆剗削糞土抵浪蘆荻竊挑供㸑等因又勘得原有會稽縣三十三都犬牙相參本縣七都之間最為崩損低薄者自章家墓起至西滙嘴灣底瀝海所北門馬路頭纂風寺五里墩邊止約計一十餘里雖係會稽實與上虞同此一岸海塘相應協力修築此會稽三十三都有關於六都之𦂳要者合無申請著落會稽水利官知會照例修築并行瀝海所重禁剗蘆之條方可無碍今後照該田丁每田三十畝派夫一名無田寡丁十丁攢夫一名士宦不得優免其圩長閘堰等隣各要田産居上公道能幹者為之則庶乎役均而任當矣寧波府鄞慈谿鎮海象山嘉靖寧波府志定海縣海石塘在縣東北五里大浹江東出兩山對峙曰蛟門曰虎蹲出蛟門東北連海洋風潮衝激少失堤防則平田髙地皆為鹹潮所吞吐宋淳熙十年令唐叔翰與水軍統制王彦舉統領築之弗績十六年請於朝傚錢塘例疊石甃塘岸六百二丈五尺東南起招寳山西北抵東管二都沙磧嘉定十五年令施廷臣水軍統制陳文又接連增甃五百二十丈於石塘盡處再築土塘三百六十丈以續之建永賴海晏二亭於塘之左右元末二亭俱廢洪武五年邑丞許伯原即舊亭故址重建永賴亭十二年縁舊有破浪樁年逺朽腐風濤撼觸石柵罅裂父老范仲宏等言於府委令何公肅率鄞慈奉定四縣之民運石伐材修補復密用破浪樁以障於隄之外斯塘賴以不圯矣定海縣今改名鎮海慈谿縣志大海六十里東至鎮海縣西至餘姚縣北至海鹽縣黄牛桑嶼二山為界延袤一百餘里海塘一在西北六十里舊有塘約三十里一在東六十里貫鎮塘猶存嘉靖寧波府志慈谿縣海塘在縣西北六十里西自白洋浦經向頭山東接定海縣境凡四十里東海塘在縣東四十五里長一百二十丈濶三丈六尺南北皆接定海縣界嘉靖寧波府志大海環府境東際鄞嶦﨑湖頭蔡家墩東北際定海之招寳山後海塘西北際慈谿之觀海龍山東南際象山之爵溪東門奉化之鮚埼裏港海潮自定海入鄞江六十里至府城東北分為二江西北通慈谿東南通奉化潮汐往來各有候海之大洋中有烏石塘三一在馬秦㠗一在下塘頭千歩砂一在桃花㠗台州府臨海寜海黄巖太平台州府志臨海縣鹹塘在縣東北一百八十里寧海縣志健陽塘在健跳所城外唐僧懐玊築堤五百丈餘陡門柱刻云端平間重建明成化間决副使楊瑄重築嘉靖間總兵戚繼光重修萬厯壬辰秋決令曹學程修築謹按凡塘之備蓄洩資灌溉者俱歸水利門若防海潮者應載海塘門兹健陽塘成化萬厯兩次決而復修其為防海之塘明矣而中設陡門則未嘗不資蓄洩也故與水利門互見云萬厯黄巖縣志捍海塘在縣東北六十三四都嘉靖辛丑周守志偉築丁進塘在五十一都霓嶴先是民田苦海潮淹没𢎞治間為築此塘約計六十餘里以捍海潮至今賴之洪輔塘在六十一都南至新河北通海門正徳間修築以捍海潮四府塘在洪輔塘下正徳間李推官築赤城新志淨社塘在太平縣山門鄉知縣丁隆重築長沙塘在太平長沙太平二塘乃築堤以捍海者非如天台之塘所以蓄水而灌田也溫州府永嘉樂清平陽瑞安溫州府志平陽縣外塘自江口丘家埠南岸沿海而東至斜溪近海潮水泛漲屢築屢壊延祐五年知州張仁方修築間會守趙鳳儀經視其地申命増築扁曰䕶安堤大徳元年復壊九年修築未就至正末周嗣徳重築明實録永樂十年修浙江溫州府平陽縣堤岸永嘉縣志永嘉沙塲東墊於海土不能堤思易以石舊矣嘉靖甲午羅山張公入相疏於朝有司畏其難逾一十五年戊申諸生張岑與里人王九慶鄭守琳等復請於巡按御史乃檄瑞安丞曹龍與義士王崇教陳宗嶽王宗徳周公祐季承寵等議城南起一都長沙北至沙村寨以丈計之至二千六百一十九石之長丈方尺者十之以為髙五之以為厚其費至五千四百十兩有竒萬厯温州府志瑞安縣沿海圩塘自城東至十一都巡檢司止中有廢塘五百一十三丈萬厯己丑署印縣丞歸大顯修砌又自城東越飛雲渡之南十四都起至沙園所城外止計八百餘丈原係泥塘潮水衝壊萬厯己夘令齊柯督圩長修築未幾又壊令章有成用石砌築乙未令歐大成重修溫州府志樂清縣蒲岐海塘縣東三十五里起十四都下堡至十五都二里凡七百八十二丈朱諌有記海口塘縣東五十六里起十七都海口殿前至官路邊凡一百五丈平陽縣九都海塘去縣治二十里海潮淹没八九十二三等都歲苦無收令朱邦喜議將預備倉糓易銀召匠砌築時用灰殻苦無辦忽潮湧殻至塘所足供資用謹按歴代海塘六府皆有興築故仍分府登載但各門俱先寜後紹獨海塘因紹興海面直接杭嘉本朝不得不先紹後寧有修築他府皆慶安瀾並無興惟杭嘉紹三府屢建事冝故改用編年之例登載於後浙江通志卷六十三
