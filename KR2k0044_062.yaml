body:
  text: 浙江通志卷六十三海塘二嘉興府海鹽平湖閒窻括異志海鹽縣捍海塘凡十八條自縣去海九十五里有望海鎮嵗乆波濤衝齧盡為洋海紹興中知縣陳某嘗於海塘五里建望月亭迨今則亭基在水中不可復見十八條捍海崗岸無一存者縣治去海無三百步而獨山一帶歲嵗鹹潮透入可以曬鹵耕種者苦之前政史宰亞卿親督畚鍤移入數百步别築一塘宋史常楙傳海鹽歲為鹹潮害稼㮊請於朝捐金發粟復輟已帑築新塘是秋風濤大作塘不浸者尺許民得奠居歲復告稔邑人徳之至元嘉禾志太平塘舊名捍海塘在縣東二里西南至鹽官縣界東北接華亭縣界防海水漲溢故名捍海塘至正甲申縣尹顧泳重修改今名立扁於上𢎞治嘉興府志海鹽縣海在城東半里南抵澉浦北抵乍浦瀕海築捍海石塘以禦潮汐洪武三年潮水泛溢圮毁故岸民人潘允濟言於朝遣宋署令監築石塘二千三百七十丈史槩洪武十四年海鹽捍海塘成鹽邑志林海鹽一帶海塘外以捍海潮之入循塘拒守墩堠相望可以禦海宼之登犯塘以裏皆良田富室烟火相望所恃以為外䕶者一塘而已石塘縷砌者用石方尺餘長八尺或六尺縱而磊之取海潮衝撼不動内厚築黄土以襯之髙與之齊厚必五倍之若少工力石可衝撼潮必内侵石塘有罅土塘必壊土塘内潰石塘不能獨存𢎞治嘉興府志洪武二十年六月石塘復為潮水所圮浙江布政使司㕘議閻察監修永樂三年仍為風潮圮毁通政使司右通政趙居任等官按治起倩蘇州松江等九府夫增土修築雖云堅固歲乆復頽海鹽縣圗經宣徳中巡撫侍郎周忱募郡民七百人部分更築時以石堤内虚始築土五丈實其裡且著令非時巡䕶加葺無待大壊謀甚豫顧未十歲海溢塘復壊時知府黄懋議大採木石别築複塘度用銀二十六萬有竒正統元年奏聞報可會遷去僉事陳永與參政謝輔繼至改議因舊址役里甲雜用瓦礫填中包巨石為之省費十九塘亦成後成化八年大風駕潮至塘不足禦平地水丈餘民溺死無算廼思黄公議悔不用之後㕘政邢簡僉事趙銘以府同知楊冠補葺麄完海復連歲四溢塘又盡圮不存十三年副使楊公瑄來司水利講興作功甚銳遂以意改舊塘為坡陀形築成凡二千三百丈當是時日夕涖海上程督甚瘁民感之為立祠血食吾學編公任浙江按察副使定海城北捍海塘縣西走馬堤霩􅛾所裏外海塘健跳所及海鹽海塘皆公修築有功海甫鹽塘踰二千三百丈工尤巨禦患尤大陞按察使半載病亟寮采問候尚論築海塘法及濬西湖之利無片言及私塘云坡陀者竪石斜砌磊碎石於内支之先是塘石皆疊砌勢陡孑公以為潮激之生怒易潰也故稍斜之殺潮勢因石陂陀其法昉宋王安石之鄞縣塘築後十餘年亦竟就圮𢎞治初元知縣譚秀言楊公塘用石斜甃嵗乆仄壓内向勢也請改築便於是巡浙侍郎彭韶以知府徐霖通判蹇霆偕秀築仍疊石如舊法而畧仿陂陀意内横外縱以漸減縮令斜用殺潮勢十二年知縣王璽繼之備講縱横之法而塘制始善王公増築於故龍王廟前砥方石縱横交錯為之其法有一縱一横有二縱二横者下濶上縮内齊而外陂形勢隆固屼立潮衝不壊𢎞治嘉興府志捍海塘在平湖縣東南三十四里按地志獨山東至直隸金山衛華亭縣界周家涇西至海鹽縣界長二千二十丈宣徳五年始分平湖為縣地方各屬成化五年間縣尹李翥比例海鹽縣境石塘牢固奏聞命下三司督同府同知楊冠通判張永等相視經度計條石樁木等料價銀二萬五千九十三兩倩工甃砌七年七月初三日颶風大作海潮泛溢自雅山東至楊樹林俱為衝浸縣令郝文傑計量修築圮壊者五百一十丈九月初一日風濤復作内塘古岸修完者自周家涇東至獨山等塘皆為衝圮其害視前尤甚縣簿陳善奉府檄重修八百一十九丈其未完者𢎞治二年計費倩工買石甃砌海鹽縣圗經正徳中通判韓士賢水利郎中朱衮凡再修悉依王公法而嘉靖初海連溢郎中林文沛奉命修塘以王公塘獨無恙因呼為様塘益遵用之林文沛海塘記嘉靖壬午秋海潮大作癸未繼之塘圯視昔倍泛濫災及百里時文沛督工治之舊制石多縱少横今使縱横交錯連屬不可解又必擇其亷隅之石布置必穏樁計四千八百石計一萬六千或拾於海壖之遺或運於數程之外北自丫义南抵宋莊因其舊而増之計七百五十七丈通舊堤為一千三百七十丈是役也費銀葢五千五百兩有竒其後十年増築教塲塘一百七十丈為僉事蔡時十四年海溢築塘二百餘丈土塘二千七百丈為僉事焦煜分督者通判陳文昌知縣董珆及平湖知縣黎循典十七年海又溢築塘三百二十餘丈土塘二千四百三十四丈及四陡門為僉事張文藻二十一年築塘若干丈為僉事黄光昇三十年風潮復作塘壊築凡若干丈為僉事胡堯臣而黄光昇築法尤備黄光昇築塘說余築海塘悉塘利病也塘根浮淺最病矣夫累石髙之為塘恃下數樁撐承耳樁浮即宣露宣露則敗易次病外疎中空舊塘石大者郛不必其合也小者腹不必其實也海水射之聲汨汨四通浸所附之土潄以入滌以出石如齒之疎豁終拔爾余修必内與外無異石先去沙塗之浮者四尺許見實土乃入樁入之必與土平仍傍築焉令實乃置石為層者二是二層者必縱横各五令廣擁以土使沙塗出於上令深皆以奠塘址也層之三若四則縱五之横四之層之五若六縱四之横五之層之七若八縱横並四之層之九與十縱三之横五之層十一十二縱横又並三之層十三十四縱三之横二之層十五縱二横三層十六縱横並二層十七縱二横一層十八是為塘面以一縱二横終焉石之長以六尺廣厚以二尺琢之方砥之平俾𦂳貼也層表裏必互縱横作丁字形彌直罅之水也層中横必稍昂作幞頭形彌横罅之水也層相架必跨縫而置作品字形以自相制使無解散也層必漸縮而上作階級形使順潮勢無壁立之危也如是又堅築内土培之若肉之附骨然可免坍潰矣盖黄公築法因縣令王璽之法益詳究之故獨善然為費亦不貲率塘一丈用銀三百云黄公亦曰余築塘所不盡築尚八九則財詘故矣初海塘無字號今自天字起至木字二十里共一百四十號每號二十丈共二千八百丈皆公所編者也公督工有法所用者悉副任使嘗有言曰海塘如欲盡築非四五十萬金不可工役大興諸夫匠奸詭百出須得通判官五六員縣丞主簿等官二十餘員專駐於此朝夕臨之方可隄防即臨之仍須耳目瞬息不離荀頃刻恍惚即奸弊乗之葢巨石一疊内藏疎略更難移驗矣况事權不一此委彼奪既奉命以去另代者經手不一遂難稽考又況所委各官賢否不同上下扶同塗抺了事者常十而六七可輕議哉邑人錢琦有詩贈公所委别駕陳白石云五更鐘動戴星出裋褐肩輿一𨽻隨日給行廚二升米郡侯心事有誰知讀此即可知黄公矣時知縣魏廷璽亦有議魏廷璽築塘議海塘之役近年以來憲司提督於上府縣分理於下非不欲成此大工但患有可懼弊有未革耳支給工銀易生侵尅之謗患一講議修築之法各持己見紛紜争勝莫知適從患二拘於估計制於成命不得相機隨宜有所増損患三近海軍民多賴修塘以為活計一身做工影射數名通同管工人冒支工銀弊一又砌手志在常得修塘工食不肯砌築堅固弊二管工委官羈身海上颶風毒霧之中度日如年但欲速成了事孰肯盡心如幹家事弊三去此三患三弊塘不難成矣隆慶四年海溢水利僉事李文績督湖州府同知藍偉來築用黄公法縱横稍殺之費銀萬五千僅成塘九十餘丈李文績修築海塘事宜洪武以來初築頗簡有以石斜竪貼土者有横砌一縱者後來築法漸詳有二縱二横者三縱三横者亦有五縱五横者五縱五横者計築一丈用銀三百餘兩歴年風潮衝塌猶屹然如故今欲砌如五縱五横之式勢必不能酌量見在錢糧將龍王塘天闕要害去處定為三縱三横其餘往秋等字號潮勢稍緩定為二縱二横萬厯三年五月晦夜大風駕潮來水出地二丈餘溺死者二千餘人他内縣河皆成鹹流田不可灌塘則盡崩先是嘉靖中邑人布政吳昻嘗一再上疏請大發金錢築故塘預備海菑隆慶之役助教仇俊卿仿昻意亦以為言前後皆中格至是變果大作時撫臣謝鵬舉按臣吳從憲採知府李橡知縣饒廷錫言具奏大指謂鹽堤浙鉅役縣官宜無惜小費為東南計永奠意甚愷切既得報而徐公栻代撫集僉事陳詔張子仁同知黄清議之清考故時築法得黄光昇前牘上之遂仿其法改用大石以清督丞幕諸官三十餘人分築清勤於帥先且相度潮緩急衝稍増殺其縱横石凡用銀十二萬有竒成塘七百五十丈土塘三倍之又開白洋河三千丈而餘塘欹且裂未盡圮者姑理砌之理砌者砌層之上不及趾以節費役竣建海神祠及前憲使楊公瑄祠以昭祈報鑄鐡象牛厭勝又植木菑盪浪冀淤沙塗䕶塘意甚羙有詔嘉之賜栻等金帛陞秩俸有差清得超格擢同知鹽運司陸光祖修築海塘碑記萬厯三年五月縣海溢盡破捍海塘石十九淪海無迹漂没屋廬禾稼死者不可勝數前督撫中丞謝公鵬舉以狀聞于朝既下議修築謝公察郡同知黄君清才亷有心計肯任事命之董役會公遷去朝廷念海事至重特簡今兵部侍郎徐公兼御史中丞來撫治之公涖事之明日率其屬親行海上齋祓㓗牲䖍祭海神以告肇工擇遣丞簿尉譚繼先黄用中謝希周典史陳柯王金把總王三錫指揮馬繼武李嘉元等三十餘人畫地分工并力合作謂同知清汝總余塘工盡其能無避短長之言工大小咸責成於汝謂海鹽令饒廷錫此汝邑事汝其悉乃心廩餉諸吏士百工無或闕乏汝五日至塘省視謂按察水利陳君詔爾惟專職其出舍於塘晝夜巡董謂按察備兵張君子仁月一往察之稽其勤惰賞罰用命不用命已而太守黄君希憲至郡勉僚屬以同心一志調匠於浙東諸郡採石於武康梅溪缻窰而力皆募海上災饑之民使取僱直以贍孥寓救荒意凡􅚃木鐡炭麻竹灰應用之物悉平市之民間郡吏既受事俾作治如式用石長厚尺寸有度塘基下宻樁皆二丈之木深入平之然後石層砌其上縱横有數始運石募客舟舟不能過三巨石乃官造舟舟堅且安一舟所勝再倍石運易集大省輦舁之費清又言石塘之内宜更為土塘疏為内河備決潰湧溢之患按察張君力主其䇿公納之乃復行視自金家路至章堰得古白洋河舊跡皆已湮塞而内塘亦夷自章堰歴大小天闕至山澗寨舊無塘開新河即以其上築新塘河可行舟運石益便已復更濬深濶計長乆石塘既成得土塘表裏相輔愈益堅完即有巨潮越塘内河足以受之可分殺汜勢不致壅激為害河之上舊皆黄茅白壤名曰草塲今可引溉以為田工始於萬厯四年七月訖於五年九月是役也按察備兵張君在事最乆勣勩獨多水利陳君繼至劬勤率先人吏益奮太守黄君敦道範物克相厥成邑令饒君拊字供輸别駕張君繼芳胡君嗣敬造舟採石分守前㕘知朱君炳如舒君應龍先後協力司理陳君文炅和衷黙賛前守李君橡謀始度費皆有功塘事者也天啟平湖縣志大海在平湖縣東南三十里海潮東北自金山來西南至浙江為上潬自浙江回歴海寧黄灣至澉浦海鹽為下潬皆險要海岸東十里至梁莊寨又東四十里抵直𨽻金山衛華亭縣界西南三十六里至海鹽縣界萬厯乙亥海溢塘壊自海鹽教塲迤北至於乍浦一帶皆開河取土築塘以錢糧不給中止全修海塘録萬厯十五年嘉興知府龔勉申稱海鹽地勢逼臨大海兩山擁夾故潮汐獨異於他處全賴海塘為之捍禦頃者風潮異常將石塘衝坍大半土