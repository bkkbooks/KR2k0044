body:
  text: 浙江通志卷一百五十名宦十一嚴州府三國吳陳表吳志陳武傳武廬江人庶子表字文奧嘉禾三年諸葛恪領丹陽太守討平山越以表領新安都尉初表所受賜復人得二百家在會稽新安縣表簡視其人皆堪好兵乃上疏陳讓乞以還官充足精鋭權甚嘉之下郡縣料正户贏民以補其處表在官三年廣開降納得兵萬餘人事捷當出會鄱陽民吳遽等為亂表便越界赴討遽以破敗遂降陸遜拜表偏將軍進封都鄉侯南北朝羊欣南史本傳字敬元泰山南城人義熙中為新安太守在郡四年簡惠著稱除臨川王義慶輔國長史廬陵王義真車騎咨議參軍並不就文帝重以為新安太守在郡十三年樂其山水嘗謂子弟曰人生仕宦至二千石斯可矣及是便懷止足轉義興太守非其好也蕭幾南史本傳字德元齊宗室早孤有弟九人並幼幾恩愛篤睦聞於朝廷清貧自立位中書侍郎尚書左丞末為新安太守郡多山水特其所好適性遊履遂為之記子清亦有文才位永康令蕭穎胄嚴陵志字雲長自中書郎除左軍將軍知殿內文武事入便殿出為新安太守吏人懷之任昉南史本傳字彥升樂安博昌人武帝踐阼出為義興太守尋轉新安太守在郡不事邊幅率然曳杖徒行邑郭人通辭訟者就路決焉為政清省吏人便之卒於官唯有桃花米二十石無以為殮遺言不許以新安物還都雜木為棺浣衣為殮闔境痛惜百姓共立祠堂於城南歲時祀之追贈太常諡曰敬子昉好奬進士友在郡尤以清潔著名百姓年八十以上者遣户曹掾訪其寒溫郡有密嶺及楊梅舊為太守所采昉以冒險多物故即時停絶吏人咸以為百年來未之有也徐摛南史本傳字士秀東海郯人大通初兼寧蠻府長史參贊戎政教令軍書多自摛出帝甚加歎異寵遇日隆領軍朱異不悅乘間白帝曰摛年老又愛泉石意在一郡自養帝謂摛曰新安大好山水任昉等並經為之卿為我臨此郡中大通三年遂出為新安太守為政清靜教人禮義勸課農桑期月風俗便改秩滿為中庶子陸繕新定志永定中留異割據東陽新安人向文璧與異連結繕為新安太守討平之唐房琯唐書本傳字次律河南人少好學風度沈整以蔭補𢎞文生開元中為校書郎拜監察御史出為睦州司户參軍復為縣所至上德化興長利以治最顯張伯儀唐書本傳魏州人以戰功𨽻李光弼軍浙賊袁朝反使伯儀討平之功第一擢睦州刺史後為江陵節度使舊浙江通志伯儀朴厚不知書推誠遇人軍中畏肅民亦便之蕭定舊唐書本傳字梅臣南蘭陵人纍遷侍御史考功員外郎厯信湖宋睦潤五州刺史所涖有政聲大厯中有司條天下牧守課績唯定與常州刺史蕭復濠州刺史張鎰為理行第一其勸農桑均賦稅逋亡歸復戶口增加定又冠焉尋遷户部侍郎太常卿除太子少師韓洄明一統志乾元中江淮凶飢而新安特甚時推洄能名除睦州别駕知州事舊浙江通志洄長安人罷冗食胥吏遂至盈積而不艱食李幼清嘉靖浙江通志姑臧人元和初為睦州刺史時浙西觀察使李錡竊財聚黨憲宗即位大立制度於是錡恐視部中良守不為已用者誣陷去之幼清由是得罪使御史按問館於睦自門及堂皆錡私卒為衛廷臣猶用其文斥幼清南海幼清行錡聚盜百人遮於楚越之郊幼清戰且走乃得免既而錡伏誅諭者謂宜還幼清以明其誣後移永州李道古唐書本傳道古嗣曹成王臯子自司門員外郎刺利隨唐睦四州入為少宗正兼御史中丞其在睦州嘗作大廳記載永徽至元和刺史名姓除拜歲月甚備許渾嘉靖浙江通志字用晦丹陽人太和六年進士為太平縣令復辟監察御史厯睦州刺史所至有善政渾長於詩有丁卯集行於世呂述嚴陵志開成三年自祠部郎中拜睦州刺史謹按圖經紀事云嘗得述所作城隍廟碑具載遷建神宇以祈垂祐於民有云使封疆無水旱之虞牧守成富庶之績又得馬目山建新廟記有云開成己未嵗大旱致精意於神越三日而雨乃泝江四十里躬擇廟位依山勢以取高架為新廟明年廟成率將吏以釁之祝以永賚斯民觀此亦可見誠心於愛民矣牛叢嘉靖浙江通志字表齡僧孺之子進士任補闕數言事以司勳員外郎為睦州刺史帝勞曰卿得非怨宰相乎對曰陛下比詔不由刺史縣令不得任近臣宰相以是擢臣非嫌也至州盡心職事民獲所安戴筠萬厯嚴州府志景福二年為壽昌令開西湖蓄新塘坂之餘水東開暗溝五百餘丈引湖水從東門出溉東郭之田復作橋於湖上以便行者民賴之陳明府萬厯嚴州府志青州人失其名唐龍德中為青溪令黃巢之亂與二子率邑人避兵進賢鄉之屏風巖巢兵圍七日引弓發石擊之巢兵大潰殺傷不可勝計邑人德之為建陳府君祠於巖上宋田錫宋史本傳字表聖嘉州洪雅人太平興國三年進士高第釋褐將作監丞遷著作郎改左拾遺直史館知相州改右補闕明年移睦州州人舊阻禮教錫建孔子廟表請以經籍給諸生詔賜九經自是人知向學錫耿介寡合未嘗趨權貴之門居公庭危坐終日無懈容慕魏徴李絳之為人以盡規獻替為已任嘗曰吾立朝以來章疏五十有二皆諌臣任職之常言茍獲從幸也豈可藏副示後謗時賣直耶命焚之王臻宋史本傳字及之潁州汝隂人舉進士中第為大理評事以監察御史知睦州仁宗即位纍遷尚書工部郎中以右諌議大夫權御史中丞臻剛嚴善決事所至有風績江休復歐陽修江休復墓志字鄰幾進士及第慶厯時通判睦州纍遷刑部侍郎休復於治人則曰為政所以安民也無擾之而已故所至民樂其簡易至辨疑折獄則或權以術舉無不得而不常用亦不自以為能嘉祐五年終於京師陳澤民嘉靖浙江通志元祐中知壽昌有惠政於民後為户部郎邑人思之因其所鑿山泉以户部泉名之呂希純嘉靖浙江通志字子進公著子也紹聖元年自亳州移知睦州以歙婺二港嵗溢為患建廟為文以祭之自是無復水患在州多賦詠邦人至今傳誦張確東都事略字子固邠州宜祿人舉進士宣和中方臘起青溪勢張甚確上言此皆王民也但庸人擾之耳陛下下哀痛之詔省不急之務敢有以華石淫巧供上者死務在撫綏則浹旬之間必可殄滅矣宰相王黼怒出確通判杭州攝睦州確以方略授諸將賊由是遂敗厯知坊汾解三州徙隆德府金師入城陷死之贈述古殿直學士蔡肇嚴陵志字天啓丹陽人大觀中自吏部員外郎罷為宮祠起知睦州冇惠愛邦人懷之入為禮部郎中召試中書舍人黃璘萬厯嚴州府志字邦美建寧人政和八年登第除分水丞存心民隱善類以安改官襄邑金人南侵璘赴井死詔贈朝奉郎吳曾嘉靖浙江通志崇仁人高宗時獻所著書纍官吏部郎奉祠久之起知嚴州去貧吏恤良民善政著聞平生苦學為文竒偉所著有得間文集能改齋漫録臧梓嘉靖浙江通志紹興間為壽昌令循良清謹字民有道殿中侍御史張絢以聞既核實令再任以觀政績高宗曰若得賢令如此一方皆受其惠非細事也既而教化大行為三輔最胡寅新定續志字明仲建寧人紹興六年以徽猷閣待制知嚴州政教並行民用胥勸未幾移知永州今學宮寅所改作也周操萬厯嚴州府志紹興九年為淳安尉盜遁姦屏德洽惠敷葺一室於官廨西序為藏書校讐之所題曰拄笏軒官至吏部尚書蕭燧宋史本傳字照鄰臨江軍人紹興十八年擢進士高第纍遷刑部侍郎出知嚴州嚴地狹財匱始至官鏹不滿二千燧儉以足用二年之間積至十五萬以其羡補積逋諸邑皆寬先是宣和庚子方臘盜起甲子一周人人憂懼會遂安令朘土兵廩給羣言洶洶燧急易令且呼卒長告戒悉畏服城中惡少羣擾市燧密籍姓名涅補軍額人以安堵詔燧治郡有勞除敷文閣待制移知婺州父老遮道幾不得行送出境者以千數婺與嚴鄰人熟知條教不勞而治嵗旱浙西常平司請移粟於嚴燧謂東西異路不當與然安忍坐視為請諸朝發太倉米賑之十六年權知樞密院提舉臨安府洞霄宫劉清之宋史本傳字子澄臨江人紹興二十七年進士袁州宜春縣主簿改建德縣主簿請於州俾民自實其户由是賦役平爭訟息調知宜黃縣丞相周必大薦於孝宗召入對首論民困兵驕大臣退托小臣茍偷又言用人四事改太常寺主簿光宗即位知袁州張栻新定續志字敬夫廣漢人乾道五年以直祕閣知嚴州其治以教化為先務奏蠲丁鹽錢絹民以蕃庶旅名山斥淫祠今學門栻所創也景定辛酉封華陽伯張棲筠萬厯嚴州府志鄱陽人乾道六年知淳安以廉能稱邑人祠之陳曄萬厯嚴州府志字日華福唐人淳熙五年知淳安時詔州府舉行義役曄集大姓於庭多方喻之衆皆聽命有古渠淤塞不治曄浚治之又作惠人橋於合洋浦築錫溪館以延使客民便之塑像祠於學宫趙汝漟萬厯嚴州府志宗室子嘉熙元年以奉議郎知桐廬撥縣帑五千緡增置學田養士又創屋三楹於常平倉後捐已俸糴豐糶歉名惠民倉人便之趙崇嶓嘉靖浙江通志南豐人嘉定間為淳安縣上疏極論中人專橫官至朝散大夫楊恕嚴陵志京口人嘉定八年知淳安縣公勤廉慎吏畏而民懷之虞兟嚴陵志陵陽人淳祐五年知淳安縣在任有惠政民祠於學吳槃萬厯嚴州府志寶祐中以朝奉郎知嚴州多惠政時帝以御寶黃册催內藏坊場錢槃奏言龍章鳯篆施於帑藏之催科寶册泥封下同官吏之文檄事雖至微關係甚大董宋臣諷臺諫劾罷之黎舉德萬厯嚴州府志景定間知壽昌為政寬厚民安其化娛情山水之間作南昌勝景亭屏山第一峰涵碧亭又作龍骨亭於青龍山後人望其亭者以比甘棠又建朝京橋於白艾溪往來者便之張震明一統志知嚴州州舊有章惇祠震命毁去而以范仲淹易之趙與新安續志咸淳元年知建德縣三年差通判建德府宰邑之次年民以旱潦告遂請於朝得粟一萬斛以濟暨解任以積下俸錢并通判􅈦辦備堂從物錢預為本邑人户代輸咸淳四年茶租錢一年於府曾子良嚴陵志臨川人咸淳末知淳安縣清慎自守時邊事已急多方保障民賴以安元王子玉明一統志至元中為壽昌尹時江南新附徭役繁劇子玉每抱告身詣府泣訴卒減差科李思誠萬厯嚴州府志字宗德青齊人至元中為壽昌尉勸學興賢建齋室門廡繪先賢遺像又構翼講堂茶罏琴室煥然一新具歸省也作十八詠詩以遺學者由是士知嚮風馬世榮明一統志大德中為壽昌尹治多善政嘗率民於近縣築堤障水民賴之名曰馬公堤鄭千齡萬厯嚴州府志字耆卿新安人延祐六年為淳安縣尉百廢具興構晦菴之祠表融堂之墓闢梅隱之軒新南部之廟善政迭出劉耕孫元史本傳字存吾茶陵州人至順元年進士授承仕郎桂陽路臨武縣尹厯建德路推官所至詳讞疑獄其政績卓然者甚衆轉儒林郎寧力國路推官會長鎗軍瑣南斑程述謝璽等攻寧國戰遇害朱倬明一統志至正間為遂安尹以興學為先務鄰境盜竊發倬集鄉民禦之邑賴以安哈喇丹萬厯嚴州府志至正十七年任壽昌簿三年再升宣差制服豪強用法平恕士民安之其去也擁道遮留邑人為建去思亭明郭彥仁獻徴録無為州人歸附太祖以忠謹被知李文忠用兵浙西彥仁為參謀文忠守嚴州命彥仁充本司督事文忠待彥仁體甚隆几攻守機略悉預裁畫金華苗將蔣英等作亂殺守臣參政胡大海文忠即遣彥仁率兵討之彥仁兼程而進至蘭溪英等懼夜半遁去彥仁遂入金華撫其民時處州苗將李佑之等亦殺守將耿再成文忠復調彥仁領兵屯縉雲以遏其侵軼後援新城取杭州平浙西皆預有勞績授嚴州府知府彭子沖嚴陵志字允升安福人洪武五年知壽昌縣時承元末兵火之後市井殘破廨宇草創子沖至慨然以起廢為己任首創儒宫建會通橋修塘堰以興水利築壇場以嚴祀事發姦摘伏吏不敢欺在任四年政平訟息升池州府同知顧執中萬厯嚴州府志鎮江人洪武六年知建德縣創建祀典壇場施設有方民不知勞籍人户丁田之數分為數等有科差則親閲其籍量事之輕重難易務得其平十夫一小牌百夫一大牌以匱盛之遇有發遣則量數給牌役畢即收牌置之别匱以備稽考周而復始民無徭役不均之嘆牛敬禮萬厯嚴州府志浦城人洪武八年任壽昌令撫字有方催科得法遘疾伏枕吏有問疾饋食者敬禮曰豈可受人無故之物還之而逝季仲蘭嚴陵志浦城人洪武二十年知嚴州勤於政事有惠愛及民一郡翕然從化潘惟學嘉靖浙江通志寧國人洪武末為嚴州知府為政不苛推行有漸既去而民思之楊信嚴陵志邯鄲人永樂中由太學生知桐廬蒞政亷勤人不敢干以私拘人惟發信牌不遣吏卒民有訟庭決之不復下獄囹圄為空秩滿耆民張彥亨等三百餘人詣闕保留復任李興萬厯嚴州府志福建人永樂十年由户部郎知嚴州操履廉正束吏甚嚴而撫民則寬設量衡於市以平交易催科度緩急給牌為期而民不敢後鄉閭無吏卒之擾楊移壽昌縣志金溪人永樂十一年為壽昌縣丞處事有方委造海船於桐廬親訃其料之多寡而用無毫髮私先是縣造驛船多為稍水通同官吏高價包攬移回縣令船户自造送於驛所遂革其弊以憂去侯康逺建德縣志弋陽人宣德三年知建德縣新邑治興學校推誠撫字甚有惠政在官九年民生樂業一時稱賢令云萬觀嚴陵志字經訓南昌人宣德八年由監察御史知嚴州臨下莊肅處事詳審修舉廢墜重建嚴先生祠以表勵風俗留意學校作興人材范衷嚴陵志豐城人宣德七年以進士為壽昌令公正仁恕卓有能聲流民皆復舊業荒田之闢三十有六頃水利之興三百四十有六所飢者有所濟老疾者有所養九年任滿邑民千有餘人列狀借留復任張永萬厯嚴州府志字邵齡四川南充人天順三年由禮部主客司主事任嚴州知府悉心民隱興利除弊嘗督衆墾闢沙渚田二千八百餘畝升科授民均徭役定賦稅裁弓段之妄費減水夫之掊尅民貧不能葬者或諭令鄰保相助或量給公帑羡餘周之注意學校擇郡縣軍民之俊異者講學於􅈦事後之肅敬軒日程其業多所造就辛巳嵗郡被水災即以上聞減夏稅之半受民詞立為斷遣獄無囚繫治稱神明九載秩滿升江西左參政遷右布政使李堅桐廬縣志唐縣人天順間由監察御史謫典史升桐廬知縣仁以育民明以斷獄遇事敢為不避權勢捐俸積儲以濟民飢均徭省役以寬民力成禮遂安縣志阜城人景泰六年知遂安縣疏通明敏勤於幹濟捐俸建大成殿疏泮池圍以石欄樹櫺星門易以石柱補祭器葺廨宇宫牆一新張瓛嚴陵志泰州人成化六年由進士授遂安令以廉介律已以豈弟臨民均賦役興學校治水利流亡漸復舊業豪強亦皆奉法循理劉永寬萬厯嚴州府志江夏人初授松江通判成化七年改除嚴州剛介亷潔不避權要發姦摘伏人以為神秩滿升霸州知州盧勗桐廬縣志東莞人成化十六年知桐廬縣德器溫粹政尚寬平升工部主事鄧廷瓚徵獻録字宗器巴陵人景泰甲戌進士知淳安縣訪民疾苦專施惠政不求赫赫名兵部尚書張鵬薦知梧州成化中遷太僕寺丞擢山東布政司左參政貴州巡撫贈太子少保諡襄敏朱暟嚴陵志字景文高郵州人成化五年由監察御史任嚴州知府興廢舉墜內外公署煥然一新築城南隄以禦水患東門至富春驛舊路湫隘拓為坦途夾植以柳相望數里人號朱公柳作興學校待諸生餼廩尤厚又買地為義塜以葬無所殯者升福建右參政馬隆桐廬縣志鞏縣人成化八年任桐廬縣縣堂傾圮捐俸改建而民不病在任三年分毫不染自奉淡泊而愛民之心終始如一後擢監察御史王衡淳安縣志稷山人成化間由進士知淳安縣廉而有為百廢悉舉作興學校激厲士風重建尊經閣為諸生講習之所考滿升御史何珖桐廬縣志順德人成化十一年知桐廬縣立三限催科之期禁吏卒下鄉之擾剖決如流悉中理法吏不敢售其姦獄無寃囚百姓安堵閲四載以才行超卓擢監察御史鄒以倫舊浙江通志福建清流人成化中知分水縣事上不阿臨下不虐邑民賴之鄺才萬厯嚴州府志字時用南海人成化二十年任嚴州同知律已廉介分毫無取於民清軍伍定徭役公而且明嘗刻嚴子陵釣臺集行世李德恢萬厯嚴州府志東安人𢎞治二年任嚴州知府揭申教養榜一十八條自六禮八政以至耕種曲盡生民之要興廢去弊修理學校作興士類新子陵祠嘗慨圖經新定續志等書湮廢日久編輯郡志四十餘卷在任九年升參政去何粲萬厯嚴州府志廣東順德人𢎞治三年任分水知縣寬厚持已平易近民首重學校宫牆廡齋舍宇煥然聿新作興士類張學嚴州府志常熟人𢎞治三年由舉人知遂安縣政多惠愛民立祠祀之汪宗禮舊浙江通志繁昌人監察御史𢎞治中左遷壽昌令抑強扶弱起頽舉廢吏治一新林光萬厯嚴州府志字緝熙東莞人𢎞治間授嚴州教授與人接藹然溢於言貌士以是親炙日益衆造人不枉其材質有資穎異者與之講白沙自然之學率有成立胡韶萬厯嚴州府志鄱陽人𢎞治十二年任嚴州知府立心公正政在得民處僚友以義接士夫以禮課士興賢獄清訟簡有胡青天之號升湖廣參政官至刑部侍郎陳和桐廬縣志龍巖人𢎞治十四年任桐廬蒞政剛果鋤強植善值攢造黃册盡心清查加增户口一圖擢監察御史趙章舊浙江通志山東臨清州人正德中為刑部員外郎車駕南巡伏闕極諫廷杖謫嚴州同知愛民敬賢孜孜不倦尋升長史丁楷桐廬縣志懷寧人正德元年任桐廬縣興學校正風俗未期年而政成懇禱止雨辟火返風亦德政之一徴也以母喪去擢監察御史金選舊浙江通志湖廣荆門州人正德間知淳安節用愛民緩於催科田野樂業孫瓚舊浙江通志陽穀人正德中知桐廬耿介不阿廉平有守孟春萬厯嚴州府志字時元山西澤州人正德三年任嚴州知府政務寬平每與諸生論議經史終日不倦憫恤孤苦寬刑弛禁嘗謂人曰嚴為睦州民淳事簡何以重罰為牧民之道固當如此秩滿升太僕卿厯官吏部侍郎黃俊武進縣志武進人𢎞治己未進士由刑部郎中守嚴州首録嚴光之後捐俸立學置田以贍養之值嵗大飢貧民流攜載道俊曰吾有倉廩而坐視民飢以死是不仁也待請而後發民其就斃矣即日傾倉賑給設粥施藥活者以萬計調漢陽去嚴之日老稚悲泣遮留弗能得乃肖像以祠之容九霄遂安縣志字子升廣西陽朔人舉人正德七年知遂安持身廉介處事明敏嵗癸酉流賊侵開化官兵集遂境者數十萬守巡閫帥駐節者數十輩諜報旁午賊迫馬金衆望風奔潰九霄率民兵結寨於高喬山手弓矢殺數賊賊憚之遁去隨力請設險創為城郭民立碑紀績曹圭桐廬縣志黃岡人正德七年任桐廬縣時屢年旱暵乂江西盜起邊軍南下圭經畫周緻事濟而民不擾以賢能薦改海寧縣升御史陳渭舊浙江通志四川江津人𢎞治中知淳安縣公清仁恕吏畏民懷胡茂實萬厯嚴州府志眉州人正德七年任嚴州興史時劇賊王浩八嘯聚衢歙茂實承檄率兵守開化馬金等要處擊斬賊徒幕府論功賞向正嚴州府志湖廣人正德間任建德縣當王浩八之亂督府鎮守司道並集府城供億調度悉有條理民得以安胡仲謨遂安縣志字啓忠蘄水人嘉靖元年知遂安縣沈毅朴訥臨事不茍未嘗以詞色假人民之姦良立辨豪猾斂迹民皆樂業海瑞名山藏字汝賢瓊山人舉人授南平教諭遷淳安知縣革去常例之無名者俸薪外不取絲粟僮僕出縣舍刈楚中林吏胥公事畢各還家為農治生從其本業其治縣精詳凡叢雜煩屑無不明晰至於丈量之則兵陳之法濟飢之物草木之實悉出示民總督胡宗憲子還自父任索驛夫不給懸驛吏傳亭上瑞曰胡大人清亷潔已無二出教當其行縣時屬官不得侈帳具續食今其裝重甚盛必非胡大人子發其裝得金數千納之庫馳告宗憲宗憲無以罪也都御史鄢懋卿以總理鹽法行部攜妾裝五綵輿以十二女舁令長跪上食厠飾文錦溺器用白金至瑞縣供帳甚疏自言邑貧不能容軒蓋懋卿怒甚聞其發胡公子裝斂威去嘗曰加派增賦取民財以奉過客悅卿士大夫吾不為也夫絹出於桑糧出田畝朝廷取民不為厲也加派增賦動以朝廷為口實為欺與謗抑何甚焉居淳安三年遷嘉興通判同時為慈溪知縣者霍與瑕亦粵人其清鯁不屈類瑞懋卿嗾御史劾之瑞與瑕俱落職後瑞以故秩調興國擢户部主事厯南右都御史卒於官年七十四諡忠介朱木獻徴録字子喬常熟人領鄉薦除山東昌樂縣擢南臺御史執政逐不已附者逮治廷杖幾斃出判鄭州會浙中繕兵部使者因檄之行遷知遂安縣嵗祲民沮山發礦格殺官捕勢張甚將蔓部使者檄木𠞰平之木蹙然曰民不聊生計無所出直利此土中錙銖度晨夕耳何用煩兵且濫及無辜為乃引兵駐山遣人諭以禍福羣盜於嶺上望見木羅拜大呼曰仁侯有令吾屬敢不服從立解散去部使者奬之遷敘州府同知馳還稱病不出陳煥萬厯嚴州府志字德彰貴溪人嘉靖八年由刑部郎知嚴州廉靜有守政務寬平尤重學校選七學諸生集玄元觀聘學行之優者分教之俗重嫁女有不育者乃嚴淹沒之禁入覲行李蕭然後卒於官陳嘉猷建德縣志番禺人嘉靖九年知建德縣寬以愛民勤以聽政以民心為已心處官事如家事升嘉興通判韓叔陽舊浙江通志高淳人初令浦江有異政嘉靖中知嚴州賑飢恤患片言折獄築東興二湖為百世利修思范亭嚴陵祠以勵風教升湖廣按察副使潘絲獻徴録字朝言婺源人嘉靖乙丑浙東礦盜起抵婺縱兵四掠又明年入歙六邑洶洶部使者強起絲大破之御史超格薦之授嚴州府别駕權知分水縣縣喜訟大者斧致細者縷解吏從旁瞪視不敢吐聲息又丁户多浮額民苦之乃鈎稽故牘去虛丁以千數三月而邑大治移攝建德蠲嵗徴八百有竒刋為額有瞽貧令子售基地於姪子死訟奪之絲知其姦而念其瞽也好謂曰姪誠爾負劵業已成矣我以俸金為若直瞽輸情自服曰寧死忍欺明府耶其服人心如此楊守仁萬厯嚴州府志字嘉復漳浦人以刑部郎任嚴州府才情練達振刷一新始以公署偏處後堂之西日益傾圮即捐俸鳩工改於正堂之後出入正中規制宏敞乂修改府學移櫺星門於前鑿泮池起仰聖門於儀門之側立會以課七庠之士悉照棘圍三場親督之皆捐已俸且親為品隲焉孫曜萬厯嚴州府志丹陽人嘉靖六年任嚴州通判居官清慎事母至孝林嶨淳安縣志字茂貞閩人由進士令淳安明敏寬和修學宫葺書院置浮梁設社學廣義塜封壇儲倉升太倉州邑人樹碑建祠於南屏山郝光輔舊浙江通志廣西馬平人令建德禁差徭革火耗甄拔寒士解衣授餐殆無虛晷丈量躬親履畝建邑條鞭册籍皆其手定催科撫字人稱父母吳世澤萬厯嚴州府志字宗仁福建連江人嘉靖十四年任嚴州知府時遂安礦徒猖獗親搗其巢擒其首惡又衢大水汜濫入城豫為之備民心乃安升廣西按察司副使宿應麟舊浙江通志山東掖縣人嘉靖中知嚴州鯁介剛方愷悌接物在任三年豪右屏迹獄無寃民劉泉萬厯嚴州府志常熟人嘉靖三十年任嚴州府推官闔郡豪右無不斂迹署印淳安風清弊絶胥吏畏之凡以人命訐訟或服藥縊死圖詐者鞫治之刁風始息王礦萬厯嚴州府志閩縣人嘉靖二十三年任分水縣縣無城郭為築四門修武備造演武亭胡文彬嚴州府志績溪人嘉請三十年任嚴州通判清苦自勵事事縝密僚友重其為人時同鄉為督府者人皆趨之而文彬若不識也唐繼祿舊浙江通志上海人嘉靖中知遂安簡靜端恪政尚寬平吳紳萬厯嚴州府志字克復莆田人嘉靖三十三年任桐廬縣建安東書院以啓迪士類行鄉約社倉以惠養黎庶均徭役飭武備升常州府判周望萬厯嚴州府志字道見東莞人嘉靖四十三年由工部郎任嚴州知府建德縣學科第久乏周視建安山陽風氣攸鍾力為改建嘗修東西兩湖以備旱潦又裁驛遞之冗役省供應之虛費三年之間積金七千五百餘兩悉貯府庫欲代民稅後江山借以築城并城遂安焉顧學仁遂安縣志字元甫華亭人舉人嘉靖四十三年任遂安縣慈惠及民政多節省當流冦之亂干戈倥偬而靜鎮不擾去後民設像祀之宋璘萬厯嚴州府志字玉輝來安人嘉靖丙辰授嚴州節推鞫獄必三覆乃決諸當道不能決者畢歸之淳安人某以毆殺事連坐廉得狀立為平反視篆建德故賦絹例金入長官裁去毋敢饋者九廟巨工索材木璘監焉徽大賈胡某持金為獻峻拒之子陵祠圮市田三十畝俾嵗葺且供祭事其裔窶而鰥助之使婚白督學畀衣巾以世厥祠楊成分省人物考字全卿其先桃源人以靖難武功隸南京留守嘉靖壬辰登進士第守嚴州嚴多山寡田俗尚徑悍務嗇較利下車首罷牛憑之鬻民間孕而生女恆溺殺之以省粧費宣揭厲禁多所全活擢四川左參政陳元壽昌縣志峽江人由舉人任壽昌知縣持守甚嚴一無所取學校之政真實舉行捐俸建塔於青龍山邑之橋梁廢圮者助修凡四十餘所丁內艱去周恪遂安縣志字有之直𨽻太平人隆慶二年任遂安縣留心風化迪士臨民舉皆真切拓泮池新官署津梁道路咸改觀焉陳彝萬厯嚴州府志青州衛人隆慶四年任嚴州通判之官攜一子一僕布衣蔬食淡如也嵗以俸十二金奉母餘悉賑貧乏及罪贖之莫辨者署篆桐廬增修祭器俱出俸資桐民某罪坐侵欺編伍立為反正淳民有先冢為豪右所發往按之夢一偉丈夫以帕褁其頭顱如斗大來訴竊發者遂伏辜焉按撫委視松江嘉興運司事多建白寬竈丁災傷四千八百有竒代還送者如堵吳撝謙遂安縣志臨川人隆慶五年由進士知遂安縣英敏任事作士愛民築城創學葺書院纂邑乘飭宗法習賓射嚴條編查飛詭舉墜修廢百度維新厯升溫處兵備蔡茂春舊浙江通志湖廣麻城人隆慶間建德令興學育才勸農積穀徭役惟均捕盜恤孤設義冢立小學興利除害無不條舉徐鳴玉萬厯嚴州府志江隂人隆慶間任嚴府訓導每諭諸生涵養本體居敬敦倫間有超悟者亟進之所著有綜貫正紀儒學一覽文籍世編厯代人物氏名紀文籍源流等書黃功懋萬厯嚴州府志閩縣人以户部郎中任嚴州初至郡即語寮屬曰兹郡幸無髖髀焉用斤斧惟當大荒之後生理為艱盜賊竊發獨嚴比閭之法萑苻潛消四郊無警時遇洪水入城乃設糜分給及赤旱經旬百計虔禱甘澍立沛又發倉大賑飢建躍龍亭以回風氣民藉寧謐俞汝為建德縣志字毅夫華亭人由進士先令壽昌有異政當道以建德令坐屢代事多廢弛疏改建德在事三載百廢具興新黌序迪正學改造縣門創修縣橋大培風氣嗣後來者始獲久事蕭元岡萬厯嚴州府志字希高泰和人萬厯間令淳安修靈堤濬古渠築二湖陂塹立十牌坊廣櫺星門創賓興院闢縣治拓康衢資用悉捐已俸及鍰金佐之龔承先分水縣志合肥人萬厯間知分水蒞任六載愛民禮士敬老恤孤修學築堰百廢具興革禁一切陋規不徇情面鄭鋭舊浙江通志涇縣人知嚴州以府地傾於東南風氣不聚閭閻鮮有蓋藏創文昌閣培高壠直接山麓民間藉以殷阜陸經萬厯嚴州府志字載道長洲人由進士任嚴州推官時遇大荒疫病繼作流亡滿路經施糜施藥悉捐已資復令各門報死無歸者給櫬葬之至有一日報百餘人悉為酌處任滿被召仍捐已俸分散六邑積穀備賑造讀書樓五間於衙之東首貯書一百部於上詹爾達萬厯嚴州府志字思理為遂安知縣一切公費給於官不許里遞派纍細户吏有乾沒及舞文者立置之法嵗飢發義倉賑濟全活者無算遂鄰新安民多掠賣子女爾達沒其價而償其人此風坐寢葺邑校課士而甲乙之又捐俸置學田四十餘畝以供諸生月課而士之突無煙長無室者與喪不能殯者咸取給焉呂昌期舊浙江通志溧陽人萬厯中知嚴州明敏精勵修郡志以備文獻開濬來賢湖造建蒼山下橋尤喜接引士類蔡方平淳安縣志字君衡詔安人由選貢知淳安甫下車嵗大祲飢民嘯聚方平撫諭解散發粟賑給全活甚衆定差徭雪寃獄尤加意作人修學宫濬靈港課藝周貧文風聿盛戊子冬入覲幾不能治裝廉潔尤不可及帥衆舊浙江通志江西人知淳安却陋規更絹例革羡餘立社學建義倉善政不一馬呈鼎嚴州府志京山人萬厯二十九年由舉人知遂安縣禔躬以莊字民以惠均田賦修學宫增雉堞清積蠧善政備舉李紹賢舊浙江通志清江人萬厯中知桐廬蒞治五載舉善除姦政清訟簡蔡模淳安縣志武進人萬厯間知淳安縣凡例金餽遺一切謝絶公明亷威無敢干以私者往嵗當道議置條鞭無何稅課在官猶然供億在民模至悉倚辦公帑苦不給裒俸佐之不復為民纍海忠介祠圯建議特祀周幹壽昌縣志號敬源來安人萬厯間知壽昌釐姦剔弊時屆大造親臨畝澮丈積豁除荒蕪翦豪強禁溺女火耗常例概不之取升山東青州府判民有沐其德者追而餽之金辭曰何物足以汚我擲之崖側而去陳文煥萬厯嚴州府志字汝明臨川人任嚴州知府威惠並懋一時姦蠧屏迹而秉禮造士尤惓惓焉每遇大祭必齋宿其所一切儀品皆親檢理務為整潔遇旱則步禱甘澍立至暇則單車四出以勸耕者魏𢎞政建德縣志承天府人以孝廉任建德縣令清白自矢每至朔望與紳士講讀六諭申明鄉約積穀備荒緩征薄罰夏月煮粥以飼飢冬月市帛以衛寒施棺掩骼囹圄空虛經旬不聞敲撲聲邑人呼為魏老佛龔天申萬厯嚴州府志澧州人同知嚴州本府舊有排門夫役任意科派閭閻苦被煩擾天申乃條上其事遂勒為成規危以平舊浙江通志蒙化人兩署府事厯署六邑所至政平訟理且為前令補不足在官六載清勤如一日劉大倫萬厯嚴州府志太倉人為壽昌令治多實政凡所訊斷即有懲無不愧服而去遇諸士以禮每喜談藝悉遵程朱為指南壽邑豪頑憚大倫威明多易轍黃道年萬厯嚴州府志字延卿任遂安令舊條鞭外復有加徴如造船則照丁照畝加派為悉罷之其徴收必總一年之數戶若干為匱者一為限者四而每限復分為三俾緩辦而易完遇船差自為料理不費民一緡在任三年道不拾遺封錫類壽昌縣志雲南人天啓元年知壽昌縣詞訟催科不遣一差下鄉城隍廟災延至大街焚已袍火隨滅即捐俸重建殿宇阮振中壽昌縣志字紹一富順人崇禎七年蒞壽昌精明剛果遇事􅒂然時有假冒中書來縣作姦者辨之械送上司置武庫積糧餉壘石作城半月而就周環計六里建敵樓四門艮峰塔頂墜捐俸重整許國士舊浙江通志祁州人崇禎初知嚴州政尚簡靜郡無分擾時苦於解絹逃亡殆半國士竭力申請易為官織官解民困頓蘇曾守意桐廬縣志四川人由舉人崇禎十三年任桐廬英達廉勤縣宇回祿設處完構不費民力調繁蘭溪胡崇德舊浙江通志廣西全州人知嚴州時婺城土寇竊發特加城高五尺為繕守計擒賊黨王麒等十九人民賴以寧嵗大祲勸募賑濟多所全活吳洪昌建德縣志宜興人由進士為建德令建思補軒以培地脈築西湖堤以興水利舊浙江通志洪昌勸諭息訟公庭如水國朝高凌雲舊浙江通志江都人順治初授嚴州推官直季省會多所平反名宦留祀册在任嚴督屬縣力行保甲盜賊潛蹤捐修文廟煥然一新董珙壽昌縣志字含章嵩縣人順治七年知壽昌縣先是邑中差徭應值者無倫次珙非正役不僉兩道船役往往破家珙懇請折免值大造殫精釐剔吏胥不得上下其手壬辰夏旱步禱甘霖立沛嵗獲有秋是冬寇聚西界三衢震動珙嚴偵探出竒兵發縱堵剿浙右倚以安輯律已謹嚴教民愷切歷三年從未罰民一贖鍰以薦升湖廣德安府同知杜桂舊浙江通志河南盧氏人順治戊戌進士康熙二年知壽昌縣積年竒荒小民逋賦數千前令羈留在邑者三人桂代為補苴三令得以釋歸招集流亡許以寬恤緩徴民始來集獄無羈囚案無留牘重建明倫堂規制宏偉以異績奏最梁浩然舊浙江通志山車濱州人康熙七年知嚴州府以振興文教變化風俗為己任嘗單騎勸農作十六勸并大書忠忍二字以諭民名宦留祀册浩然重建社學延請優行生員教習孤寒子弟捐置義田以為館穀康熙十年蟲旱交侵詳請蠲免捐俸買米設厰施粥老幼不能就食者查照戶口給米窮民賴全活仍令屬邑奉行又清釐丈册民間田畝久未歸闕或坍荒暗賠悉令照號歸收疏濬兩湖培築下沙至今人文蔚起科第不絶十三年閩逆煽亂山寇竊發浩然練習王師鄉勇區畫捍防郡無擾害兵民安輯絡繹供應浩繁措置周詳項一經建德縣志字葦菴湖廣漢陽人進士初授金華府推官奉裁康熙八年改令建德自萬厯中定册後歷年既多版籍紛亂民户田畝數增額外賠纍者無從稽考黠胥得以恣行飛灑時值編審特行歸號法令民照號收田計畝加額有絲毫不符悉行改正由是民得以實田供稅從前溢數滌蕩靡遺創建龍山書院修葺學宫課士勸農殷殷不怠辛亥荒疫煮粥賑飢施藥療病存活甚衆繼有耿逆之亂大兵往來一切軍需悉力經營督撫交薦擢吏部考功司主事戊午典浙鄉試再至嚴陵士民擁觀稱慶焉陳于廷舊浙江通志遼東人康熙十三年知嚴州府廉介有守時閩亂未靖王師進𠞰絡繹如織于廷預為措辦而民間安堵絶科泒杜饋遺豪貴斂迹後以憂去周光啓遂安縣志字晦菴江南太平人康熙十九年由舉人知遂安縣治崇清淨正賦外不取羡餘杜苞苴抑刁訟流亡皆復生業服食菲薄勿纍行户期年卒官貧無以殮士民贈賻佐其歸王光鼎名宦留祀册鑲黃旗人康熙三十五年知嚴州府嵗丁丑二麥不登芒種之後連旬不雨米價騰貴光鼎捐俸倡糴減價平糶由是紳襟富室感發興起廣運接濟民賴以安妖狐作祟居民子女多受其害光鼎親製檄文詣城隍廟告神驅逐妖狐滅迹被祟有死而復生者臘月廣施絮襖於貧民嚴郡灘高水急津渡最險而建邑小里埠與桐邑南關外為尤甚光鼎捐資添設渡船因亢旱祈雨自暴烈日中冒盛暑病篤百姓願減壽祈保及卒老幼奔哭罷市輟耕溫州府晉劉懷之萬厯溫州府志永嘉郡守太元十五年永嘉人李耽舉兵反懷之討平之南北朝裴松之宋書本傳字世期河東聞喜人博覽墳籍立身簡素年二十拜殿中將軍義熙初為吳興故鄣令在縣有績入為尚書祠部郎元嘉三年轉中書侍郎使注陳壽三國志鳩集傳記增廣異聞既成奏上出為永嘉太守勤恤百姓吏民便之十四年致仕毛喜陳書本傳字伯武滎陽陽武人少好學善草隸至德元年授信威將軍永嘉內史至郡不受俸秩政𢎞清淨民吏便之遇豐州刺史章大寶舉兵反郡與豐州接而素無備禦喜乃修治城隍嚴飭器械又遣所部松陽令周磻領千兵援建安賊平授南安內史禎明元年徴為光祿大夫領左驍騎將軍喜在郡皆有惠政徴入朝道路追送者數百里唐李臯册府元龜肅宗時為溫州長史攝行州事時嵗儉臯擅發倉賑州人而上聞詔書嘉之州人李鈞及弟鍔棄其親不養凡十餘年時鈞為殿中侍御史鍔為京兆法曹臯奏鈞鍔不孝皆除名路應唐書本傳字從衆以蔭為著作郎貞元初出為虔州刺史加檢校屯田郎中纍遷宣歙池觀察使李錡反應發兵救湖常二州以故錡不能拔嘉靖浙江通志應自虔移溫州時樂成橫陽界中久廢湖防多水患應大為修築韋庸明一統志溫州刺史會昌中州西北水為害庸築堤堰鑿湖十里溉田郡人德之稱其湖曰會昌堤曰韋公吳曾萬厯溫州府志永嘉令勤於吏事政平訟理嘗慕謝康樂風致構亭曰懷謝朱誕明一統志溫州刺史其弟褒翺皆相繼為守杜荀鶴寄以詩云永嘉為郡昔推名連屬君家弟與兄教化盡歸龔渤海文章高出謝宣城其當時政績可想見矣宋趙尚寬宋史本傳字濟之河南人參知政事安仁子也知平陽縣鄰邑有大囚十數破械夜逸殺居民時犯境尚寬趣尉出捕曰盜謂我不能來方怠惰易取也宜亟往毋使得散漫為害尉既出又遣檄巡兵躡其後悉獲之嘉祐中考課第一積官至司農卿張昷之宋史本傳字景山進士及第補樂清尉潤州觀察推官遷集賢校理知溫州擢提點淮南路刑獄徙廣南東路轉運使擢天章閣待制江北都轉運按察使坐事奪職復待制知湖州以光祿卿致仕昷之善吏事所至有聲焦千之嘉靖浙江通志字伯強治平二年知樂清縣嚴毅方正涖事精明吏不敢犯修邑庠敦教化士民咸服之王公濟嘉靖浙江通志字經國溫陵人宣和間令瑞安方臘犯境鄰郡望風披靡公濟措置有方守要害選丁壯迎擊之賊避其鋒不能入邑賴以全既歿民立廟祀之霍蠡嘉靖浙江通志建炎三年知永嘉縣廉介有才幹事雖蝟紛處之泰然四年高宗車駕臨幸禁衛省部蠡供億曲盡其道有事即直奏中官咸畏憚之嘗面奏本州沒官田宅多皇族勳戚請佃不輸賦稅請賣以供億少蘇民力詔從之車駕所臨供應雖繁而民不困當時皆稱其能劉夙葉適二劉君墓志夙字賓之弟朔字復之福建莆田人夙釋褐調吉州司户臨安府教授易教授溫州召試館職除著作佐郎後知衢州在州期年政平訟簡郡人畫像祠之徙知溫州春夏不雨夙全家淡食請命八十餘日母遊飯以梅乾自乞主管崇道觀而去始朔調溫州户曹緣嵗大飢疫所活數萬人比滿秩災猶未已皆泣曰司户去吾何所得衣食既而夙來守民望之亦如朔及夙亦去又泣曰天以二劉賜我而不能終也奈何莆人往還必問安否其卒也哭之皆失聲洪擬宋史本傳字成季一字逸叟鎮江丹陽人登進士甲科宣和中為監察御史遷殿中侍御史時王黼蔡京更用事擬中立無所附會建炎間為起居郎中書舍人以龍圖閣待制知溫州宣撫使孟庾總師討閩冦過郡擬趣使赴援庾怒命擬犒師擬借封樁錢用之已乃自劾賊平加秩一等召為禮部尚書遷吏部紹興三年以言者罷為徽猷閣直學士提舉江州太平觀起知溫州提舉亳州明道宫卒諡文憲范寅孫嘉靖浙江通志姑蘇人文正之曾孫紹興十七年為平陽縣丞治政勤能急於民事興修水利人多賴之韓彥直延綏鎮志字子溫延安人紹興進士調太社令出為浙東安撫司主管機宜文字後知溫州海寇出沒大洋勢甚張彥直授將領方略不旬日生擒之奏功進敷文閣學士久之轉户部尚書進龍圖閣學士光祿大夫致仕唐文若嘉靖浙江通志字立夫眉州人登進士第高宗時出知溫州有政績纍遷敷文閣待制趙彥橚宋史本傳字文長悼王七世孫乾道二年進士尉樂清會大旱令循故事禱雨而責租益急彥橚曰捐斂已責所以招和氣何禱為已而果雨擢登聞檢院時韓托胄方柄用出知汀州托胄死詔户部侍郎兼樞密院檢詳轉寶謨閣待制薛極嘉靖浙江通志字會之武進人寧宗朝以父蔭補上元主簿中博學宏詞科為大理評事通判溫州以文學政事見推於時厯參知政事除樞密使封和國公汪季良嘉靖浙江通志江西廣信人開禧二年知平陽縣治政寬恕立十事諭民其目曰親父子和兄弟謹夫婦明君臣善朋友視疾病早安厝嚴繼絶保本業戒鬭訟凡數千言曲盡人情理法修塘埭斗門以興水利民甚便之吳泳宋史本傳字叔永潼川人嘉定二年進士厯官寶章閣學士差知溫州赴官道間聞溫州飢至處州乞蠲租科降救飢者四萬八千有竒放夏稅一十二萬有竒秋苗二萬八千有竒病者復與之藥事聞賜衣帶鞍馬改知泉州以言罷潘大臨嘉靖浙江通志字舜舉嘗以兩浙運司主管文字管攝溫州獲海冦五十閲其實釋無辜者半吳興祖嘉靖浙江通志紹定元年為平陽主簿留心政事一邑藉之修理學校延諸生講校經難文義彬彬人皆奮發陳容嘉靖浙江通志三山人寶祐元年由太學生知平陽縣簡易從容邑人化之時與士論文講藝敷繹大義士習以興至於崇社稷闢道路通溝洫議賑糴民事備舉印應雷明一統志知溫州初州卒作亂詔以處婺兵從應雷討之應雷辭去止攜一僕赴任用計設宴賊來覘者斬之餘黨悉散每出視事目光如炬左右不敢仰視退則溫然孩稚可親也元察罕元史哈巴爾圖傳哈巴爾圖額齊納氏子察罕領揚州等處遊擊軍與宋軍戰有功至元十二年分隸托克托總管出廣德遊擊軍與宋兵戰敗之從攻獨松千秋等關及諸山寨其降民悉綏撫之檄為瑞安縣達嚕噶齊始至招集逃移民十萬餘户二十七年升左翼屯田萬户府副萬户趙鳯儀明一統志厯台溫二路總管崇儒重道興創廟學延明師以淑後進一時文教翕然士民向化名其所寓曰親民坊石興祖元史石天祿傳興祖襲千户至元十二年升宣武將軍管軍總管戍溫州土賊林大年等搆亂出兵圍之斬首千餘級招輯南溪山寨歸農者三萬餘户十六年升顯武將軍佩金虎符崔履謙嘉靖浙江通志至元十四年同知溫州府事時劉萬努棄城遁嗾元帥海都屠城履謙與治中家之柄徐似孫力爭獲免遊軍掠民間子女履謙奮不顧身力脫之呂師召嘉靖浙江通志至元二十八年宣武將軍同知溫州府事時郡有樂清余氏一門妻子被僧祖傑以舟載沈於海總管任私庇覆師召特明其事置祖傑於法王安貞萬厯溫州府志大德七年為永嘉縣尹涖政明察善折獄吏卒不得擾民興學校建忠烈廟修陳孝子表仰孝廉墓其戒民十事尤為肫切拜特穆爾萬厯溫州府志蒙古人大德十一年以少中大夫監郡嵗旱禱雨隨應浙東飢流民四集捐資倡賑全活甚衆賈達嘉靖浙江通志字顯道保定人泰定二年知平陽州事廉幹勤敏擲姦除蠧民稱神明分憲嘉其才委讞疑獄悉得其情一日以公事赴浙省道經金華適沿海翼石抹萬户縱兵暴橫達偶坐驛內金華民曰公平陽賈知州耶郡有沿海軍橫公能治否達曰能即乘馬徑造石抹門曰萬户在否石抹出迎達曰常慕萬户先御史大夫從太祖起龍荒為開創元勳光照史册足下不思振先御史之烈而縱兵肆暴若是能長保富貴乎語未既石抹即下拜謝罪留飲盡歡而去軍自是肅然知懼民賴以安霍時雨嘉靖浙江通志字惟肅睢州人至正九年任溫州録事時的斤海牙為監郡屬吏皆有饋時雨獨弗與朝命郡造戰船時雨赴省告丞相嘉其言遂罷治政寬厚視民如子不施刑法而民自服有盜嘗以小舟竊人釡以鬻諸市失者偶至其家見之持釡以訴時雨追盜至盜曰某兩手皆無指豈能竊釡耶時雨佯是其言因撻失者妄訴以釡還盜盜驚喜即以首戴釡而去遂收之代去士庶涕泣握别留衣帽為識尊達納實哩萬厯溫州府志高昌人至正十年為溫州路總管方國珍冦城官民逃散獨與千户吳世顯哈迪爾等擊却之賊退急治城郭繕甲兵為守禦計比賊再至不敢近城升浙東閫使陳志學楊維楨陳志學墓碣字俊卿崑山人至正十五年授宣武將軍同知韶州路總管府事明年薦授朝請大夫溫州路總管郡方以民力捍城飢死者枕藉城下志學下令發廩及私帑計丁雇役民趨者如市城塹不日成舊督秋稅以家量收病民甚志學亟易之閲三月政平頌作杜和嘉靖浙江通志字彥謙厯山人至正庚寅知瑞安州事明敏介潔為政不尚虛名懲吏弊蘇民瘼均賦役崇學校井井有條方國珍入寇和躬率民格戰賊遂退及既代民有以海物饋者和閲其奩有楮幣存焉勃然怒曰汝何汚我耶以所曳杖擊之其人慙而去萬邦寧嘉靖浙江通志字細英寶坻人由蔭知樂清縣至正丙申赴任道經本郡入謁郡守適監邑雅克特穆爾討方氏不克舉邑騷動邦寧聞之疾馳赴邑或勸其且緩邦寧愀然曰吾奉朝命出宰百里為民故也敢緩使無辜之民肝膽塗地乎既至以理開諭渠魁懾伏特穆爾節義林續編特穆爾蒙古人溫州府達嚕噶齊閩寇至與縣尉王楚山禦之血戰而死繖寶珠萬厯溫州府志字廷圭輝和爾人知瑞安州鋤剔強梗撫安羸弱均賦平獄州無壅政遷兵部郎尋復為監郡兼分閫溫州勞來安輯備盡其道前御史喜山起兵約寶珠夾攻方國珍喜山敗寶珠憂憤嘔血國珍遣伊實喇實為帥奪其柄寶柱與民别出西門被執劫以兵不屈釋之後厯諸省憲使閫使所至有聲明袁英萬厯溫州府志湖廣潭州人洪武元年任樂清丞時始建縣治英受篆至縣悉革元弊政宣布威德政事一新山民馮名梗化嘯聚英捕斬之盡收其黨興學校課農桑百廢畢舉秩滿升浙江行省都事吳廣嘉靖浙江通志洪武初為溫州衛指揮僉事時南溪人嘯聚為寇廣討平之誅其首三人餘悉遣還鄉里廣嘗受學於余闕故其在衛尤尚儒術王泰萬厯溫州府志字逢吉萊州人洪武二年知瑞安有才幹除民夙蠧政刑明簡改文廟葺壇壝宣布德意撫輯遐邇闔邑安之魏本舊浙江通志慶陽人洪武四年知瑞安明敏決斷通曉吏事役均訟簡民咸孚信嘗白事至郡爨宿於舟以杜私謁誠意伯劉基深器重之白文秀樂清縣志太原人洪武四年為樂清縣丞勤政事杜私謁賦役維均案無留牘擢於潛令塢珏萬厯溫州府志江西臨川人洪武四年知樂清廉明有為修學校立題名以風士類善詩賦皆切物理以禮導民俗為丕變馬俊平陽縣志高郵人洪武甲寅以千户戍平陽辛酉處州盜葉丁香等殺巡檢掠居民俊率軍才三百餘人往格捕至徑口遇賊兵少戰不利乃單騎縱橫馳射賊見其勇決萬衆披靡遂生擒其渠魁數人會延安侯唐勝宗大軍繼至以俊為導搗賊巢悉擒戮之王全溫州府志山東人洪武九年由給事中任溫州府同知處州賊葉丁香擾瑞安境民多脅從朝命延安侯統兵勦捕抵溫問瑞安去此幾里或言二十里侯以賊邇將縱兵全告曰實四百里侯曰如此則渡飛雲可矣既渡全又曰此去賊尚三百里侯怒疑受囑欲斬全全曰二邑良民皆挈妻子來此肯從叛乎侯意頗解入賊境方縱殺民感其恩呼為再生父母梁瑀萬厯溫州府志字與玉鳯陽人洪武十一年知永嘉邑承元弊政民田多匿賦軍需且殷饋餉不給時自浙西海運以足之民不勝其病既而有令核民田瑀乃履畝占數編號畫圖以正經界由是嵗額有加軍供亦裕而海運乃罷袁滿仔萬厯溫州府志贛縣人洪武十七年知瑞安縣性亷介寡言笑勤於政事門無私謁士民戴之柴顧隆慶平陽縣志曲沃人洪武十一年知平陽縣亷明愷悌杜苞苴矢氷蘗嘗自題於壁云一貧未必飢寒死百病多從飽暖生其志操可見矣杜瑛溫州府志字漢傑山東人洪武十九年任府同知不施刑法吏民望而畏之按行屬邑設施布置民不勞而事集以績最擢廣西參政張礎平陽縣志山西襄陵人由監生洪武二十一年知平陽縣廉明有為時金鄉衛私造軍器擅行科擾礎執法具奏奉敕遣使勞以酒鈔秩滿擢刑部郎中李瑹萬厯溫州府志字廷圭廣東化州人洪武二十七年知永嘉洞燭吏民情偽訟清役均雖當繁劇一如御簡暇則琴書自適嵗歉富人閉糴下令勸贊有方民皆樂從郡守趙彥文善其法布之各縣闔境賴之後坐纍被收邑民赴闕直其寃復任秩滿遷去張志能溫州府志萊陽人洪武二十七年以人才薦除永嘉典史催科有法民無逋負過於嫉惡為兵徒所中逮繫老人羣赴闕訟寃告者抵罪得復任王希禮平陽縣志江西吉安人洪武二十八年知平陽縣公恕為治庶事紛雜處之裕如催科督責用軟皮馬鞭常曰刑者輔治之法不得已而為之民咸化服林英名山藏字章叔古田人洪武二十九年由貢生選監察御史劾奏李景隆誤國謫知瑞安縣時民多逋亡在邑者苦稅差英立法丈量所餘虛糧令墾荒補之立鄉約行文公家禮建立齋舍與諸生講學靖難師起還英舊職命與翰林修撰王叔英募兵廣德比至勢不可為歎曰臣生無補於時死有負於國再拜自經時年三十有四妻宋氏亦自經死沈忠溫州府志徐州人洪武二十九年襲父蔭授溫州衛左所副千户永樂十一年倭犯金鄉衛沙園眉石嶴忠奮勇與敵以兵少遇害朱約萬厯溫州府志邳州人洪武三十年由監生任樂清典史清案牘除弊政吏民悅服越五年遂升知本縣政治日新庶務畢舉以母憂去張具瞻萬厯溫州府志洪武間知樂清英毅冇為革元末諸弊政建明倫堂薦賢造士修廢舉墜孜孜如不及明初樂邑紀綱蓋自具瞻始也戴順平陽縣志金鄉衛指揮僉事洪武末倭寇登劫炎亭順聞曰事急矣害且及民吾當以身先之遂馳往時賊已殺備守官兵得其衣械即詐為我軍列海口順至不知其賊也操兩刀趨而前問賊何在賊不應乃覺即揮刀連斬數賊賊走顧無後兵共圍順竟遇害事聞命優給其家吕詵溫州府志北平人建文間瑞安主簿敝衣糲食米蘗自持嘗書廨壁曰持身以滅明為法則無茍賤之行取人以子遊為法則無邪媚之惑時論韙之黃信中王鴻緒黃信中傳餘干人知樂清縣姦人紿寡婦至京誣告鄉人謀叛而已逸去有司繫其婦以聞詔行所司會鞫信申廉得其情力詆為誣獲全甚衆盜殺一家三人獄久不決信中禱於神得真盜逺近稱之後知錢塘縣當遷去部民相率訴於上官乞再任上官以聞擢杭州知府林泰樂清縣志廣州人永樂二年由舉人知樂清縣以亷律已以寬恤民民德之尋董工京師卒翁煥文萬厯溫州府志華亭人永樂三年任平陽縣主簿公正而明敏吏不敢欺民安其治鄭信樂清縣志長山人永樂八年由人材為樂清縣丞明法果斷威愛兼行民信服焉楊文溫州府志蒲政所正千戶永樂八年十月倭攻城率兵力戰所乘馬中鎗死文遂步戰以力寡不支為賊所殺崔興溫州府志蒲岐所千户永樂八年與百戶馮春領戰艦防倭十月五日舟次下保海遇倭船大至興與春率兵鏖戰自寅至申矢炮俱盡遂遇害莫然萬厯溫州府志濮州人永樂十四年由監生知瑞安甫下車首察囹圄寃滯者悉出之役平訟簡民樂趨事庶務以次舉居八月卒邑人莫不流涕尹宏溫州府志字克寬山東厯城人宣德二年任溫州府同知先是軍衛縱橫民罹其虐宏一以禮法制之期月帖然亢旱竭誠致禱隨應嵗轉大熟以艱去何文淵湯斌何文淵傳字巨川廣昌人永樂進士授監察御史宣德五年出知溫州府三年政化大行一郡稱治七年冬入覲道括蒼嶺永嘉丞遣其子以金贐却之後人為立却金館既復任益盡心職業暇則與諸生周旋章綸輩講論經史後皆以文行名處州盜起官軍討之不克文淵詗知賊據烏風洞悉捕其渠魁時都指揮李貴等執平民使誣服文淵移牒言賊已獲所捕皆平民也於是二百餘人皆得釋民有兄弟爭財諭以天倫大義兄弟感悔如初超擢刑部右侍郎景泰元年進尚書加太子太保羅銘溫州府志磐石衛百户永樂九年防倭領青門水寨十一年正月巡哨至分水山海遇倭船二十七隻銘奮勇與戰以寡不敵遇害劉謙獻徴録字自牧其先由北平徙居祥符永樂辛丑進士宣德改元授醴泉知縣擢山西道御史時浙東平陽銀冶為人竊發互相讐殺謙被薦至則撫窮民禁姦宄患遂息其地與金鄉磐石等三衛鄰居民素被陵轢莫敢誰何謙以法繩之不少貸境內肅然又壤接閩括健訟成風謙聽斷明允風亦漸革乙卯冬溫州守何文淵入為少司寇特薦謙為溫州守代已謙抵溫州語人曰守與令雖官階小大不同皆職民牧赫赫為威民不近也察察為明民罔容也平易近民守令之道也人以為名言丁巳夏旱甚謙率僚屬齋沐禱於龍湫免冠跣行五步一拜俄大雨如注嵗大熟癸亥霪雨壞稼謙祈晴復應有鹽運使秩滿去舟過括灘夜被盜劫誣逮平民若干人謙禱於城隍神頃之罪人斯得章惠舊浙江通志全椒人宣德中知平陽案牘清簡囹圄幾空初工部坐追永樂間爛弓箭弦惠奏請寬恤得俞旨因推恩蠲及天下齊柯獻徴録字文則乙卯舉於鄉初授湖州學博升溫州瑞安令甫下車興利刷弊諸不便於民者一概裁以已意邑故無公費而有沙稅嵗入不下千金悉罷之邑中田賦輕重難平或田廣縮稅狹反溢稅者嵗屬丞尉徴收民益苦之柯建丈量之議請監司郡守親為履畝握算登籍以記無有漏而以田額之羡餘實田額之不足父老有持杯酒獻者笑而遣之自是創為畫一官無擾民民無逋賦又奉檄入平陽一如勘瑞安故事未幾新例下大丈天下名田二邑獨從容按故籍對居五年以卓異召入都擢大理評事出守臨安甄旺平陽縣志平陽所副千户正統己巳山寇發從總督李倚率軍三百往捕之遇賊於草菴橋旺奮擊賊披靡以兵少被圍身被十餘創而死事聞升其子瑛世襲溫州衛指揮僉事王宇溫州府志溫州衛指揮同知正統末閩賊鄧茂七起麗水賊陳諫等應之聚黨圍處州轉掠平陽官軍禦之輒敗宇馳援屯軍橋自跨白馬先進連發三矢斃賊首白鷂等三人賊驚遁縣獲全尋大破賊於處州升浙江都指揮劉永溫州府志平陽所百户景泰元年山寇亂永與子瑀奮力擊退追至前洋斬賊首梅仲悅等數千級深入賊巢撫歸難民事平升本所副千户世襲卓越永嘉縣志福寧人景泰間由進士知永嘉縣自奉菲薄事上官不阿裁里甲冗費提舉市舶中貴苛索越以義折之民賴以安王允溫州府志字執中山東厯城人景泰三年知溫州以恤艱弱去蠧弊為首務山賊出沒羅洋親入巢穴計擒之故宦裔高士遜孫女鬻為婢代贖之為擇配稅糧積欠纍萬根究弊由糧長不月餘數足俗好競渡每致溺嚴禁之歸其舟為官渡洪珍平陽縣志平陽所正千户有勇略善騎射景泰三年與賊戰孝洋而死無嗣詔以其弟瑛世襲溫州衛指揮同知周正萬厯溫州府志南昌人由進士天順間知樂清加意民隱修築青嶼江山蒲嶼永寧四塘邑人有去思碑周彥獻徴録莆田人初授戶部主事天順改元知溫州府正已率下申嚴禮制暇日課士而辟吏用所長訟獄小大刻期與決多不越三日五日郡地邊海坍江沙漲在處不清而稅不視業彥按量得實為更正之他如學址輿梁之類無不完繕郡以大治巡按御史上疏旌異政丁父憂服除改知饒州劉遜萬厯溫州府志字時讓江西安福人成化庚子由進士知永嘉逺鄉民稅逋負躬厯面諭之遂輸納恐後究剖積獄邑無寃民以白鹿洞規頒學訓士建置諸祠廟以彰前烈又鐫古今賢令名氏於縣治俾後人知勸擢監察御史去士民肖像立祠黎存信溫州府志永嘉丞甌俗競奉淫祠乃立條禁毁諸祠不應祀者俗為之戢陸潤萬厯溫州府志字昌澤常熟人成化丙戌進士𢎞治丙辰由太僕丞擢守溫州廣勵風教剔姦摘伏一境肅然館頭飛雲各置渡八所築蓮花埭人利賴焉捐俸濟飢施藥療疫所全活萬計滿九載致仕郡人為繪像立祠蕭鼎萬厯溫州府志海陽人成化間知溫州府一介不取凡便民事即舉行會嵗旱徒步以禱深自咎責遂大雨以疾去文林徴獻録字宗儒衡山人長洲籍成化壬辰進士授永嘉知縣擢太僕寺丞升溫州知府平市價程徭賦使貪漁斷割羣息咸植元旦有人被殺死者其家赴訴乃禱於神夢鷹三雛被風翻巢隕地心計郡有潘英者殺之執訊遂服衆稱神明未幾卒篋中無一溫物劉清萬厯溫州府志字本澄河南陳州人由舉人成化九年知平陽有治才簡詞訟均徭役邑介千户所軍校橫暴清痛抑之豪姦斂迹邱山瑞安縣志莆田人成化十三年知瑞安縣律身廉謹寬嚴相濟民愛而畏之擢御史王嶽萬厯溫州府志字希甫靈壁人由進士成化十九年知平陽以明人倫正風俗為首務建義倉廣儲蓄六年之間姦豪屏息以治行徴王約溫州府志字資博江西臨川人由進士𢎞治二年知平陽愛民禮士首拓學基葺治之建先哲史伯璿祠築塘橋徙壇壝百度修舉以俗多溺女火葬嚴為之禁有諭俗篇擢御史去士民祠於北津亭徐鉞溫州府志字用寧興國州人𢎞治三年由進士知瑞安縣抑強禦革姦弊改建明倫堂遷刑部主事林廷瓛溫州府志廣東吳川人𢎞治十年由進士知永嘉公亷有才幹展拓學宫擢蘇州府同知楊楷萬厯溫州府志字元範崑山人𢎞治十年知平陽縣嚴重亷介請託不行重建文廟兩廡及號舍凡有疑獄必反覆推詳務得其實矜釋甚多宋臣樂清縣志字以忠直隸人𢎞治十七年由進士知樂清縣折獄如流不畏強禦尤崇學校日與諸生講論道藝諄諄不倦母喪去行李蕭然士民攀望垂涕范勉萬厯溫州府志字彥勤東莞人𢎞治間由舉人知泰順志行亷謹教養士民人咸仰其德化設縣未久諸所修葺規制煥然一新管璋萬厯溫州府志江西吉安人𢎞治間由舉人知樂清布衣蔬食沖約如寒士廳事上榜公生明三字自省而力行之民號為管青天虞靖萬厯溫州府志金壇人𢎞治間平陽縣丞持身亷潔愛民如子既去耆老立碑於惠民藥局扁曰愛民父母葉旭溫州府志字文明上饒人𢎞治間知泰順縣亷慎仁慈政平訟理民咸頌其寬厚劉桐萬厯溫州府志字鳯儀江西永新人正德間由舉人知泰順持法嚴平聽斷明允悉民隱省繁費尤加意士類嚴斥羣小勾攝無一吏下鄉民賴以安郁山獻徴録字子靜華亭人正德辛巳進士宰龍泉泉故山縣習不嗜學山至首選教其子弟咸感奮斌斌嚮風民或匿負公稅纍糧甲賠貱山籍其名民懼爭納嘉靖十年知溫州府張少師孚敬於郡城建寶綸樓因大治第宅小民供役日以千數富者率編使督工勞苦倦極山委曲斟酌歸於節省民稍稍安張又求廣基地強市買不已山止之曰公今匝垣里餘而意猶未足殆非所以善後且公居朝嘗喜稱伊傅周召之為相獨奈何所以處家者顧出蕭何李沆下耶張怒作色山不顧而出地亦迄不再廣部使以才賢薦以疾卒五邑士民悲號比櫬發奔送者塞道秦鎰萬厯溫州府志字國重無錫人正德九年知瑞安首核吏胥姦欺及吏卒狡猾者悉屏之公庭一清編役詳審治獄緩求其情尤作興學校居八載官無長物惟積儲倉穀萬餘石後值嵗飢出賑民賴之遷撫州府通判葛覃萬厯溫州府志字延之磁州人正德乙亥以進士知樂清亷公有威明敏果斷省費輕徭案無滯牘政令所及雖深山窮谷罔不畏懷在官五載四境寧一以治行徴林有年舊浙江通志字永清莆田人正德間以御史謫知樂清毁淫祠以建社學創六門以禦寇盜禁作佛事以正民俗時稱得治體彭占祺萬厯溫州府志字朝吉山東費縣人正德十二年由進士知永嘉性亷潔事從省約自具饔飱如寒士時號彭青天馬性魯萬厯溫州府志溧陽人正德十二年以給事中謫平陽丞作人講學士風丕振轉長史去周敘溫州府志字子厚湖廣九溪衛人由進士初任大理評事諫武宗南巡廷杖謫永嘉丞為人亢直端厚署平陽多善政民有餘懷後官工部尚書潘潢萬厯溫州府志字薦叔婺源人嘉靖元年由進士知樂清動必以禮雖甚怒未嘗疾言厲色為治務漸民於考悌禮義著訓旌善亭抄揭以示衆日與諸生以經術相劘毁東嶽廟以祀王梅溪秩滿升主事官至户部尚書方升萬厯溫州府志字世猷婺源人嘉靖二年由進士知永嘉以禮整俗吏胥有犯不少貸治盜甚嚴民賴寧輯雅持清操以直道事上官亦皆亮焉終湖廣參議童久仁萬厯溫州府志涇縣人任樂清主簿以憂去囊空無資潘令潢一夕坐堂上語縣民曰童君廉吏也今若此奈何語未畢民輸鏹相屬劉録獻徴録字景賢更字世德番陽人嘉靖癸未進士出知贛榆以賢調浙之平陽時有礦賊殺吏僭號勢甚張詔捕之重兵駐溫師老財費録請釋兵獨任其事近賊土民有葉光者家蓄死士力能制賊録抵其家諭之光感泣用命乃導民兵擊賊城中有惡少數輩投賊録計敗其謀賊遂殱焉時上官有力者欲攘光功文致光罪死録曰事由録作請釋光願歸公功第一又海寇十七艘將登岸録親禦之挽弓命中殪一人又一矢貫篙工手賊駭愕揚帆去而録初未嘗習射也擢刑部主事魏一恭溫州府志字道莊莆田人嘉靖己丑進士為溫州府推官布袍菜羹於聲勢毫不介意論讞精敏吏民畏服以怍權貴遷郡丞去嘗鬻坊間一二小漆器以銀花二枝畀之亷介絶俗如此官至按察使曹誥萬厯溫州府志字廷寵湖廣黃岡人嘉靖六年知瑞安初至適山寇犯平陽境藩臬會師征𠞰皆駐瑞安誥調度有方事集而民不擾值嵗歉審貧困者刻期賑之惠及遐僻為邑六年革姦胥懾豪右疏通水利績成擢主事厯寧波守四川憲副馮彬平陽縣志海康人進士嘉靖八年知平陽亷能有斷獄無寃情禁民溺女火葬及作佛事民莫敢違者核欺隱之田鋤治豪猾砌宋步塘以興萬全水利未久以憂去民思之何洛溫州府志廣昌人前守文淵曾孫以祖喬新廕嘉靖八年判溫州亷潔勵節恂恂如儒生而執法凛然不阿人謂其克繩祖武修文淵祠去任郡人繪像祠側趙錦溫州府志字文卿直隸良鄉人嘉靖九年以武選郎中知溫州時前守政體棼亂羣小滋橫錦持以嚴豪猾骩法繩之無少貸性亷靜寡言笑自奉簡薄折節下士廣勵風教仕至兵部尚書區益獻徴録字叔謙高明人嘉靖庚子舉人授泰順知縣是時島夷躪閩浙甫下車而賊五千突至泰順在萬山中不虞無備人人惴恐益納城外居民而焚其蓋藏母令資寇率士卒乘城繕樓櫓雉堞布渠答藺石日夜擊刁斗自衛募壯士數百乘間襲擊賊乃遁上功遷慶逺府同知補溫州士民喜曰是向挫島夷泰順公也以忤當路歸益四任郡邑皆有惠政民輒祠之夏光舊浙江通志溫州衛指揮僉事驍勇善騎射為金盤備倭把總嘉靖中倭犯平陽掠婦女無數光追射殱渠魁十餘人返其婦女賊又逼瑞安城幾不守光馳至縋城而入以藥傳箭鏃射賊賊中箭者拔其鏃嗅曰此夏光箭也所至聞風而解賊大擾嘉興檄光合擊王江涇戰沒事聞詔建祠致祭先是世宗聞光英勇圖其像去人以為讖云朱祀萬厯溫州府志字克承江西安福人嘉靖十一年知瑞安自奉如儒素堅正不撓時有權勢干囑者毅然却之初至即慕邑人卓侍郎忠義首建祠於峴山上為文祭之以方直取忤改教去胡諧溫州府志安邑人嘉靖十五年同知溫州郡久缺守值張孚敬建相府聲勢方張諧署郡事措應自如常束行李一肩置座右曰可則留不可則去以私干者一無所徇自奉極嗇褐衣蔬食不啻寒素仕終陜西參議秦鰲萬厯溫州府志崑山人嘉靖間由給事中謫知樂清縣政尚和平崇學校重節義士民翕然稱之張恕萬厯溫州府志上元人嘉靖十七年由舉人知平陽縣平易近民修築塘埭稽核宿逋處置有方民爭輸納賈韶萬厯溫州府志字徴音直隸昌黎人嘉靖二十一年由選貢任瑞安主簿嚴於詰盜夜户不扃委署泰順篆恤下情省供應邑大飢即發廩賑之始上聞當道責之對曰民命懸於朝夕緩則何及泰民伐石紀其事後督輸王木卒於官王士翹萬厯溫州府志字民瞻江西安福人嘉靖戊戌進士知溧陽有惠政補令瑞安杜請託革蠧弊吏胥不得舞文嵗飢發粟賑貸興學褒節以振風教議改學宫以財詘止留俸錢贖鍰七百兩以備工料擢御史厯中丞每嗣令者出必懇懇以瑞民為囑黃釧獻徴録字珍夫長溪人由舉人同知溫州時倭難起溫最要害地釧日夜繕城郭清戎伍修戰艦倭大舉犯溫人或謂釧嬰城堅守母輕嘗大敵釧不可曰四郭外非吾民也耶速逆之時溫軍分而三釧所將獨中軍其二軍帥皆紈袴子一軍疉石一軍鐵場賊隂分其衆為二一從上流掩疉石一從下流掩鐵場帥皆棄軍走釧腹背受敵遂大潰力戰久之麾下有挽釧以逃者釧劍斷其指曰去之此吾殉節地也賊得釧脅之降釧罵不絶口賊怒裸而寸斬之事聞贈浙江布政司右參議劉茂朱廷鑰傅德胡珊崔海溫州府志茂磐石衛指揮鑰溫州衛指揮德後所百户珊溫州衛千户海千户嘉靖中皆禦倭陳亡時百户姚憲李爵千戶周賓鎮撫劉彧俱死倭難秦煌溫州府志蒲岐所千户嘉靖中禦倭於黃華海倭寇大至官軍望風引退煌與應襲千户魏履謙孤舟力戰連發弩射賊賊少却已而合數十艘圍煌煌等力竭矢盡被執俱罵賊而死楊鑰溫州府志字啓之劍川人嘉靖辛亥由進士知樂清縣剛介亷明持法不擾人服其公周珫萬厯溫州府志字潤夫湖廣麻城人嘉靖十二年由進士知永嘉有俊才繁劇立斷好賢禮士勤恤民隱天旱徒步露禱大雨隨注咸以為精誠所感擢給事中官至副都御史李丕顯溫州府志字憲文福建長樂人嘉靖十四年由進士知永嘉愛民養士理煩治劇政績有聲擢御史朱潤萬厯溫州府志字伯雨山東益都人以給事中謫丞樂清嘉靖二十年遷永嘉令材略宏敏政尚寬平未嘗以廉介示人而實一介不取去後人益信之遷寧波府同知賀賁樂清縣志字懋文靈寶人嘉靖間由進士知樂清縣寬厚有才識聽訟催科不煩而理盡剔吏胥積弊擢御史江九山溫州府志溫州衛指揮嘉靖二十三年倭犯樂清大芙蓉九山與磐石衛指揮戴祀往禦死之高鏞平陽縣志成都人嘉靖二十四年由進士知平陽縣治政有方吏胥斂手徴稅糧立三限法清軍免其僉解民便之擢御史周如山泰順縣志常寧人嘉靖間由舉人知泰順縣好賢禮士節里費周貧生勸民強為善齊譽萬厯溫州府志字文實江西南昌人嘉靖二十九年以兵科都給事中謫知永嘉究悉民瘼務省約以紓其用編派里遞班次刋立木牌民稱便律己亷正遇士有禮升按察副使鍾沔萬厯溫州府志字尚清江西泰和人由鄱陽教諭擢知瑞安持心亷平馭吏明肅専務以禮讓化俗踰期月民淳訟息庭清如水公暇輒至學宫與諸生講論經籍政教大行蔡蒙分省人物考字時中吳縣人由貢生授溫州府同知會泰順山中閩栝流寇聚劫邑里騷動朝命中使來督官兵𠞰禦之賊聞兵至焚野撒橋疉石塞要路候吏馳報蒙蒙夜帥壯健五百餘人往撤石通道伐木為輿梁官兵旦至乃渡會大雨雪不可進蒙請曰彼皆平民烏合覬僥幸之利非有固心無若遣一職諭以禍福中使難其人蒙毅然請行即深入賊窟反覆諭之賊感悟立解散復取民之強勇者立為銀賦長領坑夫採鑿取富殷者即坑側為廬居之俾禦寇各給糧餉事集而民寧樂清田數千頃為山潦衝齧壞為沮洳場而公稅如故破産者甚多蒙往相地命因其勢浚渠築塍時蓄泄慎防護田遂還為膏腴浙西飢命大臣往綏撫兼核屬吏臧否蒙預規畫積粟五萬餘石備賑貸及至果徴粟於有司舉而發之如探囊然因大奬異注蒙績為通省最李思杜舊浙江通志武邑人嘉靖中知永嘉治尚嚴峻狷介有聲改調去行李蕭然蔡芝萬厯溫州府志字卉伯廣西桂林人嘉靖二十八年由舉人知泰順政平訟簡民孚信之黌舍圮經度改遷不費官帑尋升湖州府判去張仲孝萬厯溫州府志東莞人由舉人嘉靖庚戌颶知平陽恤窮民鋤豪猾政惠而肅學宫為風所壞久不能葺力為改創規制煥然楊嶽溫州府志貴州籍江西清江人嘉靖三十六年判溫州倭猝犯內地薄郡城守以下各分地守嶽守東門忽覘倭趨南門即擐甲躬督戰時堅壁逺鄉民千百號城下嶽設法縋入給薪米相持七晝夜隨機應變倭始退郡以無虞王宗茂平陽縣志京山人進士任御史因劾嚴嵩謫平陽丞愛民禮士以驛傳害民申白當道又查出欺隱之田甚多方務釐正以憂去民思之劉畿舊浙江通志長洲人嘉靖中知瑞安內召補諌垣以倭寇屢至留防海餘銀資加城之費後巡甌撫浙凡已所修建者皆重新之李上平陽縣志金鄉衛指揮同知守蒲門時礦徒作亂賊數百自寧德出先以僧詐為募緣者入城為詗賊至上連射却之顧見僧在城上招賊即手斬僧擲示其首賊乃退後倭寇犯嘉興軍門檄取上以守七屯八屯之地所至重其亷勇久之以戰死祁嵩劉敏平陽縣志嵩溫州衛指揮敏平陽所百户嘉靖乙卯倭寇自大嶨登岸渡白沙浦突至北港嵩敏與戰兵敗俱死趙郡隆慶平陽縣志南豐人嘉靖四十四年知平陽縣賦役繁重治以寬平招撫流移安集復業改調去士民繪像立碑於北津亭吳敦本萬厯溫州府志江西浮梁人嘉靖四十五年由舉人知泰順拳拳撫字省費杜姦相築洪口城以厄要害每春單騎勸農其清丈田畝即任勞怨不避也升永寧州知州吳國器萬厯溫州府志字君重崇義人嘉靖間由舉人任泰順教諭嘗捐資佐遷學又賻同僚歸櫬士貧不自給者傾囊周之升修武令去黃國卿溫州府志字君任廣東揭陽人嘉靖間溫州推官廉直不阿論讞精核而用法仁恕全活者多鄧鏐萬厯溫州府志字時美常熟人嘉靖間任泰順典史時有賊首周六等聚衆行劫閩浙騷攘鏐督兵𠞰捕邑賴保全時議築城池力任其事不避謗怨督造黃册清查夙弊托拾新田以補缺額邑人立碑以紀其事張國謙萬厯溫州府志字爾光晉江人隆慶四年以進士知溫州府明達嚴敏加意民瘼杜請謁剔姦蠧盜竊屏息境內肅然卒於官程應元溫州府志婺源人隆慶五年由舉人任溫州推官簡靜有威不為皎皎之行民自懾服署永嘉亷潔自矢遷臨江府同知郭顯宗萬厯溫州府志四川彭水人由監生知泰順開闢縣治疏通衢市經始黌舍神祠定田賦立均徭勸課農桑督教生徒民心悅服周珉溫州府志崇仁人平陽訓雅志修謹篤信象山文山二先生講義鏤版以訓諸生貧者分俸濟之遭橫逆者力為申救禔躬操行初終一致遷漳平諭胡用賓萬厯溫州府志婺源人由進士知樂清縣至誠愛民為治務以德化五載不攜家屬敝衣蔬食廨舍蕭然內召行民遮道攀留不忍舍仕終太僕寺卿王之屏萬厯溫州府志字汝憲潁州人隆慶元年由進士知永嘉嚴明正大人不敢干以私吏胥有犯輒置之法愛民禮士以亷介自勵秩滿凡鍰金盡蠲之纍官福建布政使熊驛丞萬厯溫州府志逸其名嘗丈量樂清田土苦於沒匿丞作魚鱗册丘段瞭然銖兩之姦無所容楊邦憲溫州府志湖廣巴陵人萬厯二年以御史知溫州府丰儀偉整不怒而威御事持大體甲戌水溢築江埭以捍後患乙亥飢編飢民於籍發粟遍賑仍置義倉儲穀預備巽山故有塔後廢邦憲捐資創建核丁田給田帖夙弊悉剔入計疏乞終養士民赴銓部籲留得復任再期以憂去楊翬萬厯溫州府志江西清江人萬厯二年任永嘉教諭淡泊自持分俸以給貧生部院交奬學者稱為楊夫子尤邃名理之學所著有五經讀法詩律舉隅周禮訂注等集何鈁溫州府志字子宣常熟人由舉人萬厯二年知平陽縣重構明倫堂創二賢祠於堂左祀林景熙史伯璿官田輸米有重至五六斗者鈁均為四則增改折以補府庫民便之築鳯浦埭蓄三十六源之水灌田四十萬畝升錦衣衛經厯劉三宅溫州府志字可任山東壽光人萬厯三年由進士知永嘉俶儻有識幹遇事立斷邑多積逋督徴有方而賦以集擢給事中黃仁榮樂清縣志南昌人萬厯四年由舉人知樂清明敏剛正鋤豪植弱杜請謁剔姦蠧庶務畢集擢御史劉正亨溫州府志江西新淦人萬厯六年任溫州同知多才略事至猝辦尤善規畫署郡即修府庠建文丞相祠遷楚府長史衛承芳溫州府志字君大四川達州人萬厯十年知溫州遇事能斷丙戌全浙荒獨甌稍稔姦民運糴射利米價驟騰亟頒厲禁仍編集飢戶發粟賑之撫院發千金買穀有司擬奉行民鬨擁聚數萬幾變承芳亟加撫慰民始定旱潦每禱輒應人謂積誠所格公餘悉報絲粟不染或以遺僚屬之匱乏者留意學校多士嚮風報最老稚籲留久任六年致仕歸林繼衡溫州府志長樂人萬厯十七年由進士知溫州府設策平伏莽之姦措餉安脫巾之伍葺理學宫修築塘埭汰庫頭以便僉收調折色以絶侵漁惠政傳於一時田養盛舊浙江通志開封人舉人萬厯十九年知瑞安縣清亷嚴重不畏強禦時邑多桀黠亷訪得實悉拘治之以不能事上官拂衣去童叟勉留次日從迂道登舟行方澄徹溫州府志六合人萬厯二十一年判溫州常例餽遺悉峻却之糧役出納積弊搜剔殆盡聽訟必諭兩造輸服不輕加笞罰官舍止攜蒼頭二人庭清如水王祚昌溫州府志號十洲上饒人選貢萬厯四十年任瑞安殫心釐剔首以作興人文為己任疾卒囊無一錢諸父老為置方匱於通衢聽民樂助不浹日滿數百緡為之殯殮繆國維舊浙江通志吳江人進士萬厯丙辰知溫州府裁革常例峻却餽遺禁絶俳優褫衙役紈綺焚於庭力砥靡俗崇奬佳士表彰忠孝節烈政聲卓然沈立義溫州府志滁州人萬厯丁巳知樂清縣每值耕斂時輒弛征以紓農力代巡彭鯤化抵縣卧病凡三月闔省憲屬絡繹省視公私騷擾立義處之裕如民得不困以治行徴潘士藻溫州府志字去華婺源人萬厯間為溫州推官夙負士望潛心理學讞獄多矜釋株纍隱抑拘格文致者力為昭雪民以不寃政暇進諸士講道論藝擢御史以法裁內侍論謫尋晉尚寶少卿蔣光彥溫州府志福建晉江人進士萬厯間守溫州慈祥愷悌尤敦風教祠四賢以樹士林之規範舉鄉約以作黎庶之坊表善政不一胡賓平陽縣志號生洲湖廣人舉人萬厯間知浦江縣調繁平陽甫下車訪民間疾苦革衙門積蠧循分單之良法除火耗之陋規塞龍頸湖建飛龍橋培學宮案山濬城內水以防火患去浮梁復運糧河以便輸挽士民樂而胥吏憚之秩滿升寧波府同知闔邑思慕建祠北津汪獻忠溫州府志江都人知泰順愛養士民有煢民為豪強所陷白郡守雪其寃力復庠士優免於全書既刻之後人皆難之吳絅溫州府志字外暗南海人以知縣改樂清諭課諸士一遵先儒規則言坊行矩善屬文寒氊六載清操愈勵遷雲門知縣前此有山隂蔣汝礪臨海王立轂皆一時師表學中口碑云前有蔣王後有吳潘潘名明遴劉公允舊浙江通志湖廣人由鄉薦同知溫州剖決簿書人稱神明贖鍰不入私帑悉以賑貧士修學宫整飭海防民賴以安劉之藩溫州府志富順人以鄉薦同知溫州六載革諸辨陋規數十事治器械修壁壘禦災捍患敬士愛民能片言折獄畢成漮溫州府志休寧人舉人天啓二年任瑞安令下車即懸示於門曰有一日間且歸耕爾地無十分屈莫輕入此門由是農商安業豪猾屏息時兵餉促迫寓催科於撫字不敲撲而自足嵗旱禱雨隨應卒賴有年秩滿去劉德平陽縣志字咸服下邳人世襲平陽副千户萬厯間厯鎮下關珠炎營黃華關把總天啓二年招撫海民王鎮王錦等奉旨奬賞繼而掌平陽所事凡二十五年恩威並著殁後軍民思之沈龍躍溫州府志楚雄人天啓六年由舉人知瑞安縣練熟民情裁斷悉中窽要丁祭見俎豆不備捐金置器厯任五載民無冤抑遷貴州知州去之日行李蕭然潘仲蘭溫州府志鹽城人天啓間知泰順縣雅負才致作興文教新公館擴縣治政事稱理馬魯卿舊浙江通志內江人崇禎間判溫州釐弊去苛節財省訟厯仕僉憲贈尚書沈鍾宿溫州府志吳江人由舉人崇禎壬申守溫州時海寇薄城運籌調度城中安堵正已率屬下吏承望風采悉凖於法宋光黼溫州府志莆田人崇禎五年知樂清民居火延燒及學舍光黼拜祝取文廟扁額投火中火遂熄海寇劉香老抄掠沿江燬館頭曹田諸處漸逼城光黼率鄉兵登陴固守五閲月而援兵至賊始退邑人德之吳有涯平陽縣志號懋紳吳江人舉人崇禎間知平陽縣刁民每假人命詐人有涯必親行檢視誣即反坐西浦堂僧文臺不法立斃之遐邇咸服訟簡刑清間有上官差役奉檄到縣捐俸給以飯費隨即備文申覆不令久羈滋擾行取擢御史王介慶溫州府志江西奉新人崇禎間知泰順縣才幹明敏課士作人建講堂設射圃修文祥塔畫定丁口照人輸納以內召去國朝熊應鳯溫州府志字碧山四川酆都人任溫州守備順治三年平陽初入版圖山寇吳肇馨乘虛襲城據守應鳯率馬步兵自郡馳至一矢殱其渠魁餘衆潰遁明年西港桐山諸寇兩次攻城俱擊退之及郡兵與大兵先後至搜山勦捕悉資鳯力殱沈可耀陳倉尤四諸賊民德之己亥移汛磐石海逆犯郡圍磐石久不下以大炮裂城應鳯方在城樓急馳下巷戰不屈而死事聞贈副將賜祭廕子天琳溫州衛左所拖沙喇哈番公舉事實順治十五年海寇鄭成功圍城應鳯鼓勇率先百計守禦城陷身負重傷猶殺賊數人被執戮其幼子脅降應鳯詈聲愈厲闔門死者三十二人子天琳亦於康熙甲寅閩變在溫郡殉難贈遊擊王曉溫州府志字公旦河南太康人順治三年隨總兵范紹祖副將李必忠下溫州所向無前守泰順羣賊數萬攻圍曉嬰城奮擊後援閩江東橋陳亡劉矩宗溫州府志字仲旋陜西渭南人舉人順治十四年任溫州府推官摘伏如神律已亷介紀綱整肅民知法度不敢縱恣勘治海田豁無田之稅甃郡東長堤以時蓄泄倡資修城開通栝婺驛路前後投誠者以萬計卒於官劉偉舊浙江通志山東德州人順治十六年以通判署樂清縣時縣被寇燬城邑為墟徴餉甚急偉歎曰民顛連如此重以追求是驅之死也我官可罷餉決不可徴力為申請得免王世顯舊浙江通志漢陽人順治戊戌進士康熙三年知永嘉縣吏事精敏編審里甲均平無私遷棄後鹽場俱置界外民苦食淡世顯申請內地煎燒鹽商百計撓之卒不為動馬琾溫州府志陜西人副榜康熙十一年知永嘉縣明決有才值十三年閩變郡帥內叛脅之不從聞贈遂與副使陳丹赤同被害事祭崇祀名宦按察使司廕子入監給銀致魏萬侯舊浙江通志遼東人武進士任溫鎮左營遊擊康熙甲寅夏閩寇渡飛雲江圍瑞安縣萬侯率師援擊至北湖嶺斬馘甚衆以後軍不至退保慈湖既而羣寇蜂集勢不可禦奮勇力戰以死長子棟亦殁於軍萬侯贈副將棟贈國子監助教傅成名宦留祀册陜西人甲寅閩變以遊擊統率七軍恢復溫州撫輯四民潔清學校捐俸贖回散失子女遺骸悉施棺殮厝調泉州參將轉直隸山海關副總兵楊春芳舊浙江通志四川人康熙十二年任溫州城守副將閩逆犯甌陷賊中逆進犯台州大兵追躡春芳欲圖內應遣江心寺僧體印寄書為偽帥擒獲與僧同磔於市事聞祭葬加贈恤賜蘇木代舊浙江通志滿洲人任樂清城守副將溫郡既陷人無固志木代堅意拒守為其下所害崔堯龍表忠册北直人本名魏瑜任樂清營百總康熙十三年耿逆偽將曽養性率衆圍瑞安堯龍從溫協楊春芳往援五月十五日遇賊北湖嶺力戰死徐天平表忠册山東厯城人任溫州鎮標左營千總閩逆犯浙隨師進𠞰康熙十五年二月十七聞賜日與賊戰於溫州大西山被創死事祭一壇廕一子衛千總浙江通志卷一百五十六
