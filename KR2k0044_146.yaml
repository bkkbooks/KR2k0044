body:
  text: 浙江通志卷一百四十七名宦二總轄元巴延元史本傳蒙古巴林部人至元初事世祖十一年大舉伐宋以巴延領河南等路行中書省所屬並聽節制十二年十一月巴延分軍為二道期會於臨安諸軍水陸並進至臨安北十五里分遣董文炳吕文煥范文虎巡視城堡安諭軍民禁軍士毋入城遣文煥持黃榜諭臨安中外軍民俾安堵如故建大將旗鼓率左右翼萬户巡臨安城觀潮於浙江暮還湖州市命索多撫諭軍民部分諸將共守其城護其宫置三衙諸司兵於各翼以候調遣其生募等軍願歸者聽分遣蕭都王世英等招諭衢信諸州遣别將徇地浙東西承制以臨安為兩浙大都督府復命張惠阿嘍罕董文炳吕文煥等入城籍其軍民錢穀之數閲實倉庫收百官誥命符印圖籍悉罷宋官府仍禁人不得侵壞宋氏山陵巴延深略善斷將二十萬衆伐宋若將一人諸帥邤之若神明畢事還朝歸裝惟衣被而己未嘗言功追封淮安王諡忠武蒙固岱元史本傳蒙古達勒達氏至元十一年從巴延南征招降湖州守將二人行省第其功承制授行兩浙大都督府事二十一年拜江浙行省平章政事托果斯約蘇傳旨中書省令悉代江浙省臣中書復奏帝曰朕安得此言傳者妄也如蒙固岱之通曉政事亦可代耶俄以言者召赴闕封其家資遣使按驗無狀拜銀青榮祿大夫行省左丞相還鎮江浙時浙西大飢乃弛河泊禁發倉庫官貨抵其直貿粟以賑之浙東盜起蠲田租以紓民力奏以販鬻私鹽者皆海島民今征日本可募為水工從之役既罷請以戰艦付海漕又言省治在杭州其兩淮江東財賦軍實既南輸至杭復自杭北輸京城往返勞頓不便請移省治於揚州帝從其言命為江西丞相兼樞密院事董文炳元史本傳字彥明俊長子真定藁城人至元十年拜參知政事是嵗伐宋諸軍分三道而進文炳居左由江並海趨臨安次鹽官鹽官臨安劇縣俟救至招之再返不下將佐請屠之文炳曰縣去臨安不百里聲勢相及臨安約降已有成言吾輕殺一人則害大計况屠一縣耶遣人入城諭意縣降遂會巴延於臨安城北入城罷宋官府散其諸軍封庫藏收禮樂器及諸圖籍巴延入覲留事一委文炳禁戢豪猾撫慰士女拜中書左丞時吉王是據台州敕文炳進兵所過禁士馬無敢履踐田麥曰在倉者吾既食之在野者汝人踐之新邑之民何以續命是以南人感之不忍以兵相向次台州諸將先俘州民文炳下令敢有不縱所俘者以軍法論得免者數萬口至溫州令母取子女毋掠民有後贈平章政事諡忠獻薑衛元史本傳國王蘇肯徹爾子也至元十一年世祖命總兵從伐宋渡江東下會丞相巴延分三道並進相盛部署將校申明約束吏民安堵如故拜江南諸道行臺御史大夫陳便民一十五事其略曰併行省削冗官鈐鎮戍拘官船業流官録故官贓饋道淮浙鹽運司直𨽻行省行大司農營司併入宣慰司理訟勿分南北公田召佃仍減其租革宋公吏勿容作弊帝皆納焉浙東盜起浙西宣慰使錫里巴縱兵肆掠俘及平民乃遣御史商琥據錢塘津渡閲治之得釋者以數千計錫里巴遁還都奏執治其罪二十年拜江淮行省左丞相封馮翊郡公諡文穆輝圖元史本傳諤嚕訥台氏至元十二年權樞密院事徇秀州撫治臨安迤東新附軍民同元帥色埒默特穆爾張𢎞範徇溫州所至州郡迎降授鎮國上將軍浙東宣慰使討台慶叛者戰於黃奢嶺又戰於溫州白塔屯寨十六年授行省參知政事髙興元史本傳字功起蔡州人至元十二年巴延伐宋承制授興千户由間道奪獨松關進至武康巴延北還留興以兵取郡縣之未下者衢婺二州已降復叛興討之七戰至破溪進戰蘭溪復取婺州進戰衢城下連戰赤山陳家山圍江山縣獻魏福興等七人於行省遷鎮國上將軍管軍萬户鎮婺州充衢婺招討使東陽玊山羣盜張念九強和尚等殺宣慰使陳祐於新昌興捕斬之遷浙東道宣慰使奉省檄討處州及溫台海洋羣盜平之改浙西道宣慰使拜江淮行中書省參知政事平婺州盜施再十改浙東道宣慰使拜行尚書省參知政事捕斬栁分司於婺州討處州盜詹老鷂溫州盜林雄興潛由青田搗其巢穴戰葉山擒老鷂及林雄等二百餘人大德三年改江浙行省平章政事張𢎞範元名臣事略字仲疇中統三年授行軍總管至元十三年浙東叛𢎞範討之師次台州拔之衆請屠城𢎞範不許誅其首禍者而已台民至今感之後封淮陽王諡獻武張惠元史本傳字廷傑成都新繁人至元中巴延伐宋惠主饋餉宋降入城籍江南民為工匠凡三十萬户惠選有藝業者僅十餘萬户餘悉奏還為民二十八年以平章政事行省杭州孟祺元史本傳字德卿宿州符離人至元十二年巴延伐宋授祺行省咨議諸將利剽掠爭趨臨安巴延問計祺對曰宋人之計惟有竄閩爾若以兵迫之彼必速逃一旦盜起臨安三百年之積焚蕩無遺矣莫若以計安之令彼不懼正如取果稍待時日耳巴延乃遣人至臨安以安慰之宋乃不復議遷江南平升授嘉興路總管首以興學為務創立規制擢浙東海右道提刑按察使劉宣元史本傳字伯宣其先潞人後徙太原宣撫張德輝薦為中書省掾至元十六年從丞相巴延平江南贊畫居多同知浙西宣慰司事在官五年威惠並著由集賢學士除行臺御史中丞呼都克特穆爾元史本傳字漢卿至元十一年從丞相巴延渡江既取宋遣視宋故宫室護帑藏諭下明越等州延祐三年大臣以浙東倭奴商舶貿易致亂奏遣漢卿宣慰閩浙撫戢兵民海陸為之靜謐諤勒哲圖元史本傳欽察人至元十一年從丞相巴延南征江南平因賜名巴圖爾拜江浙行省左丞兼管軍萬戶初浙西私鹽吏莫能禁諤勒哲圖躬詣松江上海收鹽徒五千隸軍籍授中書左丞行浙西道宣慰使成宗即位授江浙行省平章政事追封林國公髙源元史本傳字仲淵晉州人僉江南浙西道提刑按察司事劾達嚕噶齊馬恕奪民田及他不法事恕懼走賂權臣阿哈瑪特以他事誣源既繫獄忽釋之先是源所居鄰里多阿哈瑪特姻戚素知源事母至孝至是聞源坐非辜悉詣阿哈瑪特曰源孝子也非但我知之天必知之況媒孽之罪非實若妄殺源悖天不祥阿哈瑪特感悟得不死尋除河間等路都轉運副使陸垕元史臧夢解傳垕字仁重江陰人至元間丞相巴延以師南下奏授為同知徽州路總管府事以廉能擢置憲臺纍遷浙西廉訪使所至以黜贓吏洗寃獄為己任嘗上章奏免儒役及舉行浙西助役法卒諡莊簡陳思濟元史本傳字濟民拓城人以才器見稱至元中同知紹興路總管府事承檄讞獄桐廬有囚羸瘠將死縱遣還家候期來決囚拜請曰聞公名久矣若不早決恐終不可保為閲其案而釋之轉同知兩浙都運司事胥吏侵漁民困於賦役悉蠲除之加少中大夫同知浙東道宣慰司事時浙西大水民飢浙東倉廩殷實即轉輸以賑之全活者衆檄上中書奏允之浙東復旱禱於名山雨大澍民賴以蘇纍遷中議大夫封穎川郡侯諡文肅張礎元史本傳字可用其先渤海人徙通州平章廉希憲薦於世祖潛邸從伐宋凡徴發軍旅文檄悉出其手為江南浙西道提刑按察副使佩金符宣慰使失里貪暴掠良民為奴礎劾黜之遂安縣民負險為亂命礎與同知浙西道宣慰使劉宣領兵捕之宣即欲進兵礎曰江南新附守吏或失撫字宜遣人招諭以全衆命遂遣人諭之逆黨果自縛請罪礎釋之遷嶺南廣西道提刑按察使封清河郡公諡文敏管如德元史本傳黃州黃陂縣人至元十二年遷浙西宣慰使上時政五條一曰立額簿征二曰息兵懷遠三曰立法用人四曰省役恤民五曰設官制祿丞相安塔哈命馳驛奏出征事世祖問曰江南之民得無有二心乎對曰往嵗早潦相仍今纍嵗豐稔民沐聖恩多矣敢有二志二十四年遷江西行省參知政事陳祐元史本傳一名天祐字慶甫寧晉人至元十四年浙東道宣慰使時江南初附軍士俘溫台民男女數千口祐悉奪還之未幾行省榷民商酒稅祐請曰兵火之餘傷殘之民宜從寬恤遣祐檢覆慶元台州民田及還至新昌值玉山鄉盜倉卒不及備遂遇害贈江浙等處行中書省左丞追封河南郡公諡忠定父老請留葬會稽不得乃立祠祀之子夔芍陂屯田萬戶初在揚州聞祐遇盜死泣請於行省願復父讐擒其賊魁戮於紹興市托卜嘉元史多托爾台傳多托爾台子至元十五年為浙西按察使性淳靖喜怒不形知民疾苦而能以善道之旱常致禱即雨嵗飢請於朝發廩以賑睦同僚興學校士民刻石紀其政績鄭溫元史本傳真定靈夀人至元十八年江淮行省參知政事杭民飢出米二十萬石糶之升江浙左丞史弼元史本傳字君佐一名塔爾琿蠡州博野人至元十年從巴延南征進定遠大將軍十九年任浙西宣慰使二十一年春霖雨米價湧貴弼即發米十萬石平價糶之而後聞於省省不能奪益出十萬石民得不飢改淮東宣慰使授尚書省左丞行浙東宣慰使平處州盜元貞元年同知樞密院事升平章政事封鄂國公雷膺元史本傳字彥正渾源人太宗時詔郡國設科選試膺與選世祖至元二十三年授江南浙西道提刑按察使時蘇湖多雨傷稼百姓艱食膺請於朝發廩米二十萬石賑之江淮行省以發米太多議存三之一膺曰布宣皇澤惠養困窮行省臣職耳豈可效有司出納之吝耶行省不能奪悉給之拜集賢殿學士贈江南江北等處行中書省參知政事魯嚕斯哈美元史實保傳實保輝和爾人子魯嚕斯哈美至元二十三年授浙東宣慰使浙東盜起討平之移鎮廣西伊蘇岱爾黃溍伊蘇岱爾神道碑烏蘭哈達族氏至元二十四年拜江浙等處行中書省平章政事江浙省治錢塘所統列郡民物殷盛最為巨鎮伊蘇岱爾威望素著蒞事伊始風采一新權貴無或敢撓其政豪強震懾田里晏然貝降元史本傳北庭人美髭髯儀表甚偉至元十一年從阿珠渡江先登陷陳勇冠一軍宋平以功授江浙省理問官遷慶元路治中嵗大飢狀纍上不報拜降曰民飢如是而不振之豈為民父母意耶即躬詣行省力請得發粟四萬石民賴全活元貞間兩浙鹽運使同知范某陰賊為姦數侵暴細民民有珍貨腴田奪為已有不與則羅織之蘭溪州民葉一王十四有美田宅范欲奪之不可因誣以事繫獄十年不決事聞於省省下理問所推鞫之適貝降至官寃遂得直置范於刑大德元年遷浙東廉訪副使令行禁止豪強懾伏同寅有貪穢者拜降抗章劾之於臺遂免其官後轉工部侍郎升尚書贈江浙左丞諡貞惠和尚元史本傳諤尼巴雅爾台族氏至元中江南務浙西道提刑按察使浙西民衆事繁在職唯鎮靜人服其知大體追封沇國公諡莊肅子遷努世祖念其功臣子即以父官授之時江浙行中書省行御史臺皆治杭遷努上言行省専控江浙在杭為宜行臺總鎮江南不宜偏在杭且兩大府並立勢逼則事窒情通則威褻盍移行臺於要便之所遂移行臺於江東大德二年授建康路總管徐琰萬厯杭州府志字子方東平人至元三十一年拜浙西肅政廉訪使嘗作戒石銘曰天有明鑑國有公法爾畏爾謹以中刑罰即宋太學舊址改建西湖書院琰有文學重望東南人士重之陳元凱趙孟俯陳元凱碑記字時舉臨晉人至元三年以才德薦元貞十一年授浙東海右道肅政廉訪使適兩浙大飢紹興尤甚死者相枕藉元凱賑之百方活十餘萬口積官嘉議大夫盧克治黃溍盧克治墓志字仲敬開州人至元十三年從軍取淮甸有勞授漢陽府判官遷浙江行中書省左右司都事尋遷兩浙都轉運鹽副使東南財計莫重於鹽策先是恆以嵗賦減耗為憂克治規措有法自常算外得羡鹽八萬九百引以最聞除漢陽府致仕纍階亞中大夫史奐卿栁貫史奐卿墓志奐卿世居真定以功授廣東宣慰副使改浙東在浙破山賊栁分司衆七千括蒼踣婁蒙才楊鎮龍衆五萬東陽摧俞髙等五千紹興殪詹老鷂林雄劉甲一衆數萬溫處間功最一時成宗即位拜江浙等處行中書右丞至則除火餘官屋之傭若干緡禁官市惡鹽鐫減江東戶課遷江西左丞召入拜大司農董士選元史董文炳傳士選字舜卿文炳次子為統軍總管從文炳入宋宫收其文書圖籍秋毫無所取以中書左丞與平章政事徹爾往鎮浙西聽辟舉僚屬至部察病民事悉以帝意除之民大悅浙多湖泊廣蓄泄以藝水旱率為豪民占以種藝水無所居積故數有水旱士選與徹爾力開復之成宗即位纍遷江浙行省右丞徹爾元史本傳揚珠濟達氏大德元年拜江浙行省平章政事江浙稅糧甲天下平江嘉興湖州三郡當江浙什六七而其地極下水鍾為震澤震澤之注由吳淞江入海嵗久江淤塞豪民利之封土為田由是浸淫泛溢敗諸郡禾稼朝廷命行省疏導之發卒數萬人徹爾董其役凡閲四月畢工召入為中書平章政事托克托元史穆呼哩傳托克托穆呼哩四世孫成宗即位拜上都留守三年拜江浙行中書省平章政事始至飭左右毋預公家事且戒其掾屬曰僕從有私囑者慎勿聽若軍民諸事有關於利害者則言之當言不言爾之責也言而不聽我之咎也聞者悚栗時朱清張瑄以海運致位參知政事多行不法以黃金五十兩珠三囊賂托克托求蔽其罪托克托繫之有司遣使者以聞帝曰托克托我家老臣之子孫其志固宜與衆人殊賜內府黃金五十兩寵賚豪之有豪民白晝殺人托克托立命有司據法誅之猾屏息民賴以安哈喇哈遜元名臣事略斡爾喀氏大德二年拜浙江行省左丞相凡七日綱舉七十餘事民風吏習翕然為變入為中書左丞相杭之耆庶伏地攀泣馬不得前武宗即位加太保録軍國重事田滋元史本傳字榮甫開封人大德二年遷浙西廉訪使有縣尹張彧者被誣以贓獄成滋審之但俯首泣而不語滋以為疑明日齋沐詣城隍司禱曰張彧坐事有寃狀願神相滋明其誣守廟道士進曰曩有王成等五人同持誓狀到祠焚禱火未盡而去燼中得其遺稿今藏於壁間豈其人耶視之果然明日詣憲司詰成等不服出所得火中誓狀示之皆驚愕伏辜彧得釋十年改濟南路總管張圭元史本傳字公端𢎞範子大德三年遷浙西肅政廉訪使劾罷郡長吏以下三十餘人府史胥徒數百徴贓巨萬計圭得監司姦利事將發之事干行省有內不自安者欲以危法中圭賂遺近臣妄言圭有厭勝事且沮鹽法帝遣官雜治之得行省大小吏及鹽官欺罔狀皆伏罪召拜樞密院事趙宏偉元史本傳字子英甘陵人後徙潁州大德五年僉浙西道肅政廉訪使事至大二年為浙東廉訪副使至浙東聞郡人許謙得朱熹道學之傳延致為師於是人知向慕未幾擢江南行臺治書侍御史封天水郡侯諡貞獻舊浙江通志浙西旱蠲民租九萬餘石吏復徴於民宏偉核實卒蠲之全活甚衆吳元圭元史本傳字君璋廣平人大德六年拜江浙行省參知政事初朱清張瑄以財雄江南遍以金幣連結當路而江浙省臣為尤甚唯元圭一無所汙皇慶元年拜江浙行省左丞江淮漕臣言江南殷富蓋由多匿腴田若再行檢覆之法當益田畝纍萬計元圭曰江南之平幾四十年戶有定籍田有定畝一有動搖其害不細執其論固爭月餘不能止移疾去延祐元年拜甘肅行省左丞追封趙國公諡忠簡張思明元史本傳字士瞻其先獲嘉人後徙居輝州大德十年除江浙行中書省左右司郎中浙大飢首贊發廩賑之遷兩浙鹽運使嵗課充贏僚屬請上增數思明曰贏縮不常萬一以增為額是我希一已之榮遺百世之害天厯元年為江浙行中書省左丞會陜西大飢中書撥江浙鹽運司嵗課十萬錠賑之吏白周嵗所入已輸京師當回咨中書思明曰陜西飢民猶鮒在涸轍往復踰月是索之枯魚之肆也其以下年未輸者如數與之有罪吾當坐朝廷韙之以中書左丞相召思明平生不治産不蓄財收書三萬七千餘卷尤明於律贈清河郡公諡貞敏髙昉蘇天爵髙昉神道碑字顯卿大名人至大二年為江浙行省參知政事有旨範京城新寺供佛銅器以行省督視之期迫銅不能具或欲銷省庫錢以充用昉曰厯代泉貨孰敢擅毁有頃詔發庫錢與楮幣兼行衆方服昉之識海舶嵗運米數百萬石以食京師官為給道里費朝廷命昉領之分毫悉給於民昉以海漕官吏出入風濤請優其序遷以勸來者著於令進拜江浙行省平章政事江左繁富中外徴求百至昉熟知利病務簡靜不擾以是民用寧一鄧文原元史本傳字善之一字匪石綿州人至元二十七年為杭州路儒學正至大三年授江浙儒學提舉召為國子司業科舉制行文原校文江浙慮士守舊習大書朱熹貢舉私議揭於門僉江南浙西道肅政廉訪司事吳興民夜歸巡邏者執之遁去有迫及之者刺其脅仆地明旦家人得之以歸比死其兄問殺汝者何如人曰白帽青衣長身者也其兄訴於官有司問直初更者曰張福兒執之械繫三年文原録之曰福兒身不滿六尺未見其長也刃傷右脅而福兒素用左手傷宜在左何右傷也鞫之果得真殺人者而釋福兒桐廬人戴汝惟家被盜有司得盜獄成送郡夜有焚戴氏廬者不知汝惟所之文原曰此必有故也乃得其妻葉氏與其弟謀殺汝惟狀而於水涯樹下得尸與漬血斧俱在焉人以為神移江東道贈江浙行省參知政事諡文肅髙睿元史髙智耀傳睿河西人除嘉興路總管境內有宿盜白晝掠民財捕者莫敢近睿下令不旬日生擒之一郡以寧擢江東道提刑按察使除同僉行樞密院事遷浙西道肅政廉訪使鹽官州民有連結黨與持郡邑短長目曰十七吏莫敢問睿悉按以法闔境快之拜南臺御史中丞封寧國公諡貞簡戴文璧萬厯杭州府志字君章沂州琅琊人少負經濟以廉隅自砥除為兩浙轉運判官嘗分職巡鹽官場法飭弊釐國課足而羣戶安堵曺伯啓元史本傳字士開濟寧碭山人至元中厯仕為蘭溪主簿尉獲盜三十械徇諸市伯啓以無左驗未之信俄得真盜尉以是黜纍遷台州路治中御史潘昻霄亷訪使王俁交薦擢西臺侍御史延祐五年遷司農丞奉旨至江浙議鹽法罷檢校官置六倉於浙東西設運鹽官輸運有期出納有次船戶倉吏盜賣漏失者有罰歸報著為令英宗立除浙西廉訪使泰定初引年歸敬儼元史本傳字威卿其先河東人後徙易水皇慶元年除浙東道廉詩使有錢塘退卒詐服僧衣稱太后旨建婺州雙溪石橋因大興工役以病民儼命有司發其姦贓杖遣之仍請奏罷其役郡大火儼令發廩以賑取憲司廢堂材木及諸路學廩之羡者建孔子廟拜江西等處行中書省參知政事喀喇托克托元史本傳仁宗即位拜江浙行省左丞相下車進父老問民利病咸謂杭城故有便河通於江滸堙廢已久若疏鑿以通舟楫物價必便平僚佐或難之托克托曰吾陛辭之日密旨許以宜行事民以為便行之可也俄有旨禁勿興土功土托克托曰敬天莫先勤民民蒙其利則災沴自弭功何尤不一月而成至正初追封和寧王諡忠獻王克敬元史本傳字叔能大寧人纍升江浙行省左右司都事延祐四年往四明監餧人互市先是往監者必悉兵自衛克敬悉去之撫以恩意有吳人從軍征日本陷於倭者至是從至中國訴於克敬願還鄉或恐為禍階克敬曰豈有軍士懷恩德來歸而不之納耶拜監察御史尋遷左司都事時英宗勵精圖治更前政不便者克敬言兩浙煎鹽户牢盆之役其重者尤害民當免其他役從之泰定初出為紹興路總管上言乞減鹽五千引運司弗從因歎曰使我為運使當令越民少蘇矣行省檄克敬抽分舶貨拗蕃者例籍其貨商人以風水為解有司不聽克敬曰某貨出某國地有遠近貨有輕重冒險出萬死舍近而趨遠棄重而取輕豈人情耶具以上聞商人德之轉兩浙鹽運司使首減紹興民食鹽五千引溫州逮犯私鹽者以一婦人至怒曰豈有逮婦人千百里外與吏卒雜處汙教甚矣自是毋得逮婦人著為令元統初為江浙行省參知政事大旱諸民田減租惟長寧寺田不減遂移牘中書以謂不可忽天變而毒疲民嶺海猺賊竊發朝廷調戍兵之在行省者往討之故事漢人不得與軍政克敬抗言行省任方面之寄豈可拘法坐視乃調兵往捕之視事五月請老李守中蘇天爵李守中墓志字正卿延祐六年除兩浙轉運鹽司副使守中言法久則弊理宜變通今兩浙竈民凋弊日甚當驗其恆産差為上下竈民既為國輸課不當復役里正代償民租在官五年熟知其弊工本親給與民官屬不敢稍有所掊克故事集而課亦溢比終更增鹽五萬餘引以嘉議大夫工部尚書歸趙知章萬厯杭州府志字伯常睢陽人兩浙轉運司同知以陸運困民請因嵗飢浚河民得錢以為食官得河以浮運稽姦貪兼戶之弊察私醝濫及之寃儒學提舉陳旅為撰德政碑瞿霆發萬厯杭州府志字聲父上海人以功授兩浙都轉運副使海潮壞鹽場死者萬計霆發傾力救之流亡復還鹽事以集仁宗時拜運使浙東飢亭民死徙霆發稽戶數第其物力而均之課更以最聞王都中元史本傳字元俞福寧州人世祖時除浙東道宣慰副使金華有毆殺人者吏受賕以為病死都中摘屬吏覆按得其情餘姚有豪民張甲居海濵為不法吏無敢涉其境都中捕繫之痛繩以法武宗除兩浙都轉運鹽使請於行省遍厯三十四場驗其物力髙下以損益之役既平而課亦足公私便之擢浙東道宣慰司都元帥天厯初被省檄整點七路軍馬境內晏然轉江浙行省參知政事諡清獻曺鑑元史本傳字克明宛平人至治二年授江浙行省左右司員外郎明年奉旨括釋氏白雲宗田稽檢有方不數月事集纎毫無擾天厯元年調江浙財賦府副總管屬淮浙大水民以災告鑑損其賦什六七勢家因而詭免者鑑核實諭令首輸升禮部尚書追封譙郡侯諡文穆髙納麟元史髙睿傳納麟智曜孫睿之子也天厯元年除杭州路總管鋤姦去蟊吏畏民悅為江浙行省右丞除浙西廉訪使行宣政院使上天竺耆舊僧彌戒徑山耆舊僧惠洲恣縱犯法納麟皆坐以重罪請行宣政院設崇教所擬行省理問官秩四品以治僧獄訟從之尋為江浙行省平章政事十二年江淮盜起帝命為南臺御史大夫兼太尉設僚屬總制江浙江西湖廣三省軍馬十六年詔以江南行臺移置紹興以納麟為御史大夫仍太尉韓鏞元史本傳字伯髙濟南人延祐進士天厯元年除僉浙西廉訪司事擊姦暴黜貪墨特舉烏程縣尹干文傳治行為諸縣最所至郡縣為之肅然轉江浙財賦副總管拜中書參知政事徹爾特穆爾元史本傳阿嚕威氏至順元年遷江浙行省平章政事以厚嚴為政部內肅然尋召拜御史中丞布延特穆爾元史本傳字珍卿唐古鄂摩克氏天厯間拜江浙行省平章政事持身廉介人不敢干以私性至孝嘗乘花馬時稱為花馬兒平章云王惟賢蘇天爵王惟賢神道碑字國寶中山人至順三年為兩浙鹽運使經畫有方課先諸漕以集仍補前政所負鹽十萬引時天子賜豫蕃渥白金不足分命鹽漕代償惟賢設法取之而商不擾元統初徴拜户部尚書䇿丹元史本傳蒙古人順帝初為浙西肅政廉訪使有以駙馬為江浙行省丞相者其宦豎恃公主勢坐杭州逹嚕噶齊位令有司強買民間物不從輒毆之有司來白策丹即逮之械以令衆自是丞相府無敢為民害者尋召為同僉樞密院事在位剛介終始一節有古遺直風王獻元嘉靖浙江通志元統元年為浙東道宣慰副使勤慎寬厚崇尚儒雅嘗被命審囚閲實讞詳平反全活者衆居官清白不求赫赫之名富珠哩翀蘇天爵富珠哩文靖神道碑字子翬元統二年拜江浙行省參知政事江浙地大事劇而省臣煩苛事多壅積民以為病翀曰職居大藩而欲吹毛求疵居下者無所措手足矣事至即決封南陽郡公諡文靖沙木斯元史本傳字得之其先大食國人至元三年除僉浙西肅政廉訪司事即按問都轉運鹽使海道都萬户行宣政院等官贓罪浙右郡縣無敢為貪墨者復以浙右諸僧寺私蔽猾民有所謂道人道民行童者類皆瀆常倫隱徭役使民力日耗第勘嘉興一路為數已二千七百乃建議請勒歸本族俾供王賦庶以少寬民力朝廷是之即著為令改僉浙東肅政廉訪司事以病免歸贍思厯官臺憲所至以理寃澤物為已任平反大辟之獄先後甚衆然未嘗故出人罪以市恩召為祕書少監不赴追封恆山郡侯諡文孝伊嚕布哈元史本傳字彥明蒙古痕都斯坦氏元統進士授台州路録事司達嚕噶齊縣未有學乃首建孔子廟既又延儒士為之師以教後進厯吏部員外郎奉命至江浙糴粟二十四萬石至則第戶産之髙下以為糴之多寡不擾而事集既而軍餉不給人奉命出糴於江浙召父老諭曰天子宵衣旰食惟恐民不得其所夫討賊必先糧餉以我不汝擾故命我復來蓋討賊即所以安民耳衆咸應曰公言是也不踰月糧事以畢升吏部侍郎銓選於江浙時稱其公允拜江南行御史臺中丞由海道趨紹興為政寬猛不頗除浙西肅政廉訪使會張士誠據浙西走至慶元俄改山南道廉訪使浮海北往遇倭賊船遂遇害贈遼陽等處行中書省平章政事諡忠肅庫庫元史本傳字子山喀喇氏幼隸國學其正心修身之要得諸許衡順帝至正時拜江浙行省平章政事雅愛儒士甚於飢渴士大夫翕然宗之以翰林學士承旨召還諡文忠余闕宋濂余左丞傳字廷心唐古氏父實喇藏布官合肥遂為合肥人元統進士僉浙東道亷訪司事發姦摘伏聰察若神州縣聞闕至貪墨吏多解印綬去婺定賦無藝役小大各違度闕遴官履畝實之徭賦平衢士無養以沒入田分隸學官郡長揚珠濟達肆毒殘衢民民重足立闕鞫治之獄上御史臺臺臣與之有連反以事劾闕闕歸至正壬辰鴻和爾布哈統戎淮南起闕權淮西宣慰副使分治安慶厯升淮南行省左丞城陷殉節贈江浙行省平章政事諡忠愍伯勒齊爾布哈元史本傳字大用揚珠濟達氏至順中為江浙行省參知政事江浙嵗漕米由海道達京師伯勒齊爾布哈董其事至正二年拜江浙行省左丞相行至淮東聞杭城大火疾馳赴鎮即下令録被災者二萬三千餘戶戶給鈔一錠人給月米二斗幼稚給其半又請日減酒課為錢千二百五十緡織坊減原額之半軍器漆器權停一年泛稅皆停事聞朝廷從之又大作省治民居附其旁者增直買其基募民就役則厚其傭直又請嵗減江浙福建鹽課十三萬引或遇淫雨亢旱出禱神祠無不應在鎮二年雖兒童女婦莫不感其恩拜中書右丞相追封冀王諡忠宣多爾濟元史本傳穆呼哩六世孫托克托子也至正四年遷江浙行省左丞相時杭城薦經災燬伯勒齊爾布哈先為相庶務寬抒多爾濟咸仍其舊汀州寇竊發調遣將士招捕之威信所及數月即平杭之耆老請建生祠如前丞相故事多爾濟辭曰昔者我父平章官浙省我實生於此宜爾父老有愛於我我於爾杭人得無情乎然今天下承平我叨居相位唯知謹守法度不辱先人足矣何用虛名為召拜御史大夫托歡徹爾成化杭州府志字彥明賽音迪延齊氏至正二年為兩浙鹽運同知嘗言鹽者於國為大利於民為大病急之則民怨緩之則政弛乃先具條教嚴立期約而加以寬恤民感奮盡力奉令無敢後每諭之曰吾𣙜鹽充數足矣若求羡餘以希秩賞吾弗忍也越半年不事鞭笞而鹽皆足持已廉潔但坐廳事退即闔門獨處不可干以私居鹽司之職而其設施若漢循吏焉蘇天爵元史本傳字伯修真定人至正七年拜江浙行省參知政事江浙財賦居天下十七事務最煩劇天爵條分目别細巨不遺復為兩浙都轉運使時鹽法弊甚天爵拯治有方所辦課為鈔八十萬錠及期而足十二年淮寇延及江東詔仍江浙行省參知政事總兵於饒信所克復者一路六縣其方略之密節制之嚴雖老帥宿將不能過之卒於軍吕思誠元史本傳字仲實平定州人泰定進士僉廣西廉訪使事移浙西達實特穆爾時為南臺御史大夫與江浙省臣有隙嗾思誠劾之思誠曰吾為天子耳目不為臺臣鷹犬也不聽已而聞行省平章左吉貪墨浙民多怨之思誠奏疏其罪流之海南官至中書左丞董摶霄元史本傳字孟起磁州人由國子監生厯浙東宣慰副使理寃獄革弊政至正十一年從江浙平章教化征安豐賊渡江至湖州德清縣而徽饒賊已陷杭州搏霄曰賊縱欲不備宜急攻之遂進兵杭城賊迎敵至鹽橋摶霄麾壯士突前斬級而諸軍夾擊之凡七戰追殺至清河坊賊奔接待寺塞其門而焚之賊皆死遂復杭州已而餘杭武康德清次第以平賊復自昱嶺關寇於潛行省假摶霄為參知政事提兵討之即進兵至呌口及虎檻遇賊大破之追殺至於潛復其縣又復昌化縣及昱嶺關賊又犯千秋關兵大至摶霄按軍不動遣人執白旗登山望賊約曰賊以我為怯必少懈伺其有間則麾所執旗又伏兵城外皆授以火炮復約曰見旗動炮即發已而旗動炮發兵乃盡出斬首數千級遂復千秋關賊復攻獨松百丈幽嶺三關摶霄又分為三軍一出獨松一出百丈一出幽嶺然後會兵搗賊巢遂乘勢復安吉十七年升淮南行樞密院副使後與毛貴戰死贈河南行省平章政事追封魏國公諡忠定樊執敬元史本傳字時中鄆城人至正十年授江浙行省參知政事賊犯餘杭執敬調兵出戰掾史蘇友龍言於執敬曰賊且至城內空虛無備奈何執敬曰吾淬礪戈矛當殱此以報國倘或不克有死而已何畏哉俄報賊已至執敬遽上馬帥衆而出中塗與賊遇乃射死賊四人賊又逐之射死三人已而賊來方盛填咽街巷且縱火衆皆潰去賊知其無援呼執敬降執敬怒叱之曰逆賊守關吏不謹汝得至此恨不碎汝萬段何降耶乃奮力斫賊因中槍而墮從僕田也先馳救之亦中槍死贈翰林學士承旨追封魯國公伊嚕特穆爾元史本傳巴琳沁圖魯卜台氏至正十二年江南諸郡盜賊充斥拜平章政事行省江浙至鎮引僚屬集父老詢守備之方招募民兵數千人號令明肅統師次建德獲首賊何福斬於市遂復淳安等縣俘獲萬餘人復業者三萬餘家是年七月次徽州以疾卒於軍中李廷佐成化杭州府志字唐卿陜西人至正七年為兩浙都轉運使嚴明有才幹悉心鹽策之事凡亭民所不便者罷之欲者行之吏胥黷貨有蠧鹽法者悉屏斥之性無嗜好暇則與幕下講誦經史以為樂聲譽赫然升戶部尚書桑節元史本傳字吉甫河西人至正八年為江南行臺御史大夫獨持風裁御史行部必敕厲而遣之湖東僉事三寶珠儒者也性廉介所至搏貪猾無所貸御史有以私請者拒不納則誣以事劾之章至星吉怒曰若人之廉孰不知之乃敢為是言耶即奏罪御史而白其誣執政者惡之移湖廣行省平章政事改江西行省平章政事討賊死之貢師泰元史本傳字泰甫宣城人泰定四年釋褐授從仕郎江浙行省辟為掾除紹興路總管府推官山陰白洋港有大船飄近岸史甲取鹵海濵見其無主取其篙櫓船中有二死人有徐乙者稱為史等所劫史傭作富民髙丙家史既誣服髙亦就逮師泰密詢之則里中沈丁載物抵抗而回漁者張網海中因盜網中魚為漁者所殺也寃遂白遊徼徐裕巡鹽遇諸暨商奪其錢撲殺之投尸於水告縣曰獲私鹽犯人畏罪赴水死驗視有傷師泰覆案得裕殺人狀餘姚孫國賔獲姚甲偽鈔受賕釋之執髙乙魯丙誣以同造髙嘗為姚行用魯與孫有隙師泰疑髙等覆造不合以孫詰之辭屈情見釋魯加髙本罪姚死孫就法其詳讞之明為諸郡第一至正十四年除吏部侍郎奉命和糴於浙右得糧百萬石以給京師為平江路總管明年授兩浙都轉運鹽使剔其積蠧通其利源大課以集國用資之復除江浙行省參知政事寶格成化杭州府志輝和爾人至正九年除杭州路總管有善政杭學卑陋大作禮殿講舍一新之十二年蘄黃寇逼境升江浙行省參政引兵禦寇弗勝投西湖死舒穆嚕宜孫元史本傳字申之其先遼之達魯特人性警敏於書務博覽而長於詩歌至正十一年方國珍起海上江浙行省檄宜孫守溫州閩寇犯處州宜孫以兵平之以功升浙東宣慰副使分府於台州頃之處之屬縣山寇並起宜孫復奉檄往討至則築處州城為禦敵計十七年升行樞密院判官總制處州處為郡山谷聨絡盜賊憑據險阻輒竊發不易平治宜孫或搗以兵或誘以計未幾皆殄殱無遺類拜江浙行省參知政事明年明兵入處州宜孫曰處州吾所守死為處州鬼耳還至慶元縣為亂兵所害事聞贈集賢大學士榮祿大夫上柱國追封越國公諡忠愍慶通元史本傳字明德喀喇氏至正十年遷平章行仗省江浙托克托統大兵南征一切軍資衣甲器穀粟薪藁之屬咸取具於江浙慶童規措有方陸運川輸者千里相屬出鎮海寧州州距杭百里地瀕海磽瘠民甚貧居二年盜息而民阜在江浙七年涉厯險艱勞績最著達魯特兼善𢎞治紹興府志奈曼人至正中為南臺御史大夫治紹興張士誠既稱吳王諷行臺請實授於朝兼善不從士誠怒使奪其印兼善封印置諸庫曰頭可斷印不可得又迫之登舟曰我可死不可辱也沐浴更衣賦詩三章與妻子訣乃仰藥而死周誠德節義林續編浙江樞密院判官守平陽被執送方明善不屈死之妻陳亦自縊於家李希靖嘉靖浙江通志字唐英其先益都人善用長槍人以李鐵槍呼之以世勳為千戶至正十一年授萬戶明年寇陷江浙希靖單騎直入與賊戰於菜市斬首無算餘黨奔至昱嶺希靖追及之適疽發於髀伏寇掩其後力疾決戰援兵不至遂死之贈明威將軍巴延布哈德濟元史本傳字蒼崖輝和爾氏倜儻好學曉音律初用父廕同知信州路事又移建德路會徽寇犯遂安將義兵平之又擒淳安賊方清之以功升本路總管至正十六年授衢州路達嚕噶齊明年行樞密院判官鄂爾和引兵經衢州軍無紀律所過輒大剽掠巴延布哈德濟曰阿魯灰以官軍而為民患此國賊也可縱之乎乃帥兵逐之出境郡賴以寧升浙東都元帥守禦衢州擢江東道廉訪副使十八年陳友諒冦信州自衢引兵援焉力守孤城而死賜諡曰桓敏謹按舊浙江通志元代名宦總部共七十九人重加考訂梁曾趙漣夏思忠鄒世聞當入杭州杜溥劉貞當入嘉興史樞髙謙當入湖州王元恭寧玉當入寧波宋文瓉穆爾古蘇當入紹興趙鳳儀王居敬白景亮趙琬當入台州朱霽當入衢州舒穆嚕繼祖當入處州至胡祗道智受益閻復周伯琦達實特穆爾俱無政績可考朱清已見漕運志而趙採孟俯為浙人台哈布哈亦係浙籍改入人物志别史乘文集合舊志所載共得八十有二人明李文忠獻徴録字思本旴𣅿人太祖之甥賜姓朱明師下浙以舍人領軍破苗軍於於潛昌化會大兵取嚴州因守之張士誠遣其徒率苗軍水陸奄至文忠與戰大敗其衆帥師攻諸暨克之擢浙江等處行中書省左丞謝再興據諸暨以叛誘士誠寇東陽文忠自嚴鋭師破之升右丞士誠將李伯升二十萬寇新城文忠即合將士未至新城十里許有地曰龍潭立營其上新城守將遣人由間道詣軍曰衆寡莫敵姑且避之文忠曰八千之謝元破八萬之苻堅庸非衆乎遂下令曰彼衆而驕我少而鋭以鋭當驕可一戰而擒橫槊據鞍引數十餘騎衝其中堅所向披靡敵遂大潰召還京師總水陸之師下江浙克桐廬富陽至餘杭謝再興子五人嬰城固守文忠合圍攻之一日而拔杭守將潘允明遣員外方彞詣軍前請降文忠入宿城上令曰敢有擅入民居者斬內外帖然加行省平章政事復姓為李論功封曺國公贈岐陽王諡武靖胡大海王鴻緒胡大海傳字通甫虹人太祖授右翼統軍元帥與鄧愈朱文忠自昱嶺關攻建德敗元援師於淳安克建德再敗楊完者降溪洞兵三萬人進樞密院判官引兵克蘭溪從取婺州遷僉樞密院事引兵下諸暨以為諸全州移兵攻紹興再破張士誠兵太祖以寧越重地召大海於紹興使守之士誠將吕珍圍諸全大海救之珍解兵去尋攻處州守將戰敗棄城走遂定處州七邑先是軍糧少初得郡縣將士皆徴糧於民名曰寨糧民甚病之大海以為言始命罷去以大海為江南行省參知政事鎮金華初嚴州既下苗將蔣英劉震李福皆自桐廬來歸大海留置麾下至是三人作亂晨入分省署英攜鐵槌袖中陽請大海觀弩於八詠樓下英出槌中大海腦仆地遂殺之其後李文忠攻杭州杭人執英以降太祖命誅英刺其血以祭大海大海善用兵每自誦曰吾武人不知書惟知三事而已不殺人不掠婦女不焚毁廬舍以是軍行遠近爭附之大海好士所至輒訪求豪雋劉基宋濂葉琛章溢之見聘也大海實薦之後皆為名臣追封越國公諡武壯耿再成吾學編五河人太祖取金華再成為前鋒屯縉雲取處州改守處州先是士卒無論大小徴私粟民間號寨糧再成白胡大海盡罷之苗帥李佑之叛再成方與客飲聞變上馬收戰卒不滿二十人迎賊罵曰國何負汝乃反揮劍連斷數槊兵不繼賊刺再成墮馬大罵不絶口死贈髙陽郡公加贈泗國公常遇春獻徵録字伯仁懷遠人明師下浙東以同僉行樞密院事守婺城攻衢州下之纍拜行中書省參知政事大兵攻浙西為副將軍師次太湖張士誠將尹義等逆戰遇春擒之直趨湖州之毗山與敵兵水陸鏖戰敵兵大潰遂抵城下士信悉發境中兵為援屯於舊館遇春統竒兵於大全港結營東遷士信出親兵拒鬭遇春一鼓勝之士信復遣其將徐義統赤龍船親軍來援遇春復擊敗於烏鎮舊館義降湖州亦下遂進圍平江克之封鄂國公拜平章軍國重事贈開平王諡忠武鄧愈獻徴録虹縣人太祖下浙西愈取嚴州攻淳安縣破金子珍降其頭目三千餘人進同僉行樞密院事領兵略浙江臨安大敗張士誠於間林寨破其元帥於烏龍嶺後封衛國公贈寧河王諡武順湯和名山藏字鼎臣濠人拜征南將軍招方國珍定浙東封中山侯進爵信國公髙帝中年倭寇浙東海上郡和年已六十上謂和卿尚強健為朕一行和至台用方鳴謙議設指揮衛千戶所於浙東諸郡揀丁壯三萬五千城之和自巡衛城功盡發散州縣錢及籍犯者家物工匠往往過所望不踰年衛城成稽軍次定考格立賞令四民一軍守之吳越海上父老指烽戍厯厯稱湯信國焉梅思祖史槩夏邑人太祖授大都督府副使從大軍伐張士誠克忭山水寨平湖州有功遷浙江行省右丞封汝南侯耿炳文史槩濠人從太祖領軍取廣德進攻長興克之長興據太湖口陸通廣德連環宣歙為江浙門戶太祖改為長安州立永興翼元帥府以炳文為總兵都元帥守之士誠將潘元明嚴再興帥師來爭炳文奮擊大敗去士誠復遣李伯升率衆十萬水陸進攻城中兵七千炳文嬰城固守隨方禦之晝夜不解甲者月餘太祖援兵集伯升遁太祖改永興翼元帥府為永興衛親軍指揮使司以炳文為指揮使已而士誠大發兵遣其弟士信復來爭炳文又大敗之守長興凡十年以寡禦衆大小數十戰戰無不勝士誠迄不得逞太祖伐士誠炳文率所部克湖州洪武三年封長興侯朱亮祖吾學編六合人以指揮使會胡深討陳友定攻桐廬餘杭至杭州降潘元明升浙江行省參知政事守杭帥馬步舟師討方國珍徇下仙居諸縣進兵溫州國珍子明善拒戰擊敗之方氏父子降送建康為征南副將軍洪武三年封永嘉侯吳幹臣獻徴録定遠人太祖伐張士誠以指揮使從大將軍徐達率馬步舟師由港口取湖州幹臣勒竒兵出舊館扼之戰大捷事平遂留戍焉時方國珍據明州未下以為征南副將軍從御史大夫湯和往平之洪武元年海寇葉陳二姓聚劫蘭秀山幹臣調兵立勦之三年封靖海侯費聚吾學編濠人太祖下長興為永興翼副元帥守長興平吳升永興衛指揮使討方國珍下溫台慶元由海道進取福州洪武三年封平涼侯胡德濟王鴻緒胡大海傳字世美不詳其何許人大海率以歸太祖從攻婺州為誘兵大破元師於梅花門外擒其將季彌章太祖以德濟為樞密院同僉守信州會大海為蔣英所害而處州降將李祐之亦殺耿再成以叛張士誠聞浙東亂遣其將吕珍寇諸全德濟自信州往救之乘懈得入城與知州欒鳳院判謝再興分門守夜過半出敵不意選甲士斫珍營珍士馬大驚擾相蹂躙死者無算珍遂遁去擢浙江行省參知政事移守新城士誠將李伯升率步騎大入寇德濟閉城門戒將士勿輕鬬乞師於李文忠文忠馳抵敵營敵皆披靡城中兵乘之斬甲首數萬燔燒營落數十伯升遁擢浙江行省右丞未幾改左丞移鎮杭州夏毅嘉靖浙江通志字仲毅從太祖伐婺州取之以毅為金華衛指揮領兵戍焉金華栝蒼苗兵反殺守將胡大海耿再成等衢州或謀應之毅設方略討賊遂定其亂毅靜中而寬外修武備慎賞罰興學勸士政令一新在鎮數十年訓練撫綏恩威兼濟兵民賴之劉成史槩靈壁人以統兵總管從耿炳文定長興為永興翼左副元帥數佐炳文敗士誠兵李伯升以十萬衆來攻城中兵僅七千冦結九寨為樓車下瞰城中運土石填濠成引數十騎出西門擊敗之擒其將宋元帥轉至東門敵悉兵圍之遂戰死贈懷遠將軍立廟長興費子賢嘉靖浙江通志不知何許人太祖命諸將規取湖州子賢率兵取武康克之尋破安吉命子賢築城守焉張士誠出兵來攻為子賢所敗士誠復遣兵八萬攻安吉子賢所部僅三千人竟潰其兵湖州遂平以功升指揮同知時有張德者與子賢同守安吉其功亦足尚云孫虎史槩夀州人太祖遣從諸軍下於潛昌化安輯嚴州諸暨以功授千戶克新城取桐廬皆與有勞升海寧衛指揮副使嘉興盜起虎領兵捕斬之從征沙漠戰死追封樂安郡伯徐司馬嘉靖浙江通志字從政揚州人太祖養子授金華衛指揮同知升杭州都指揮使為政以惠愛為先所至撫綏士卒拯恤貧困甚得人心尤敬士大夫公暇退居一室蕭然如韋布家無餘資人皆賢之王愷史槩字用和當塗人太祖召為掾胡大海戍蘭溪命與定議取婺克衢擢左司郎中總制衢州軍民事調度兵食有方常遇春屯兵金華郡將侵民愷械而撻諸市遇春來讓對曰民者國之本將軍天子股肱肯令傷其本乎撻一部將而民安計將軍所樂聞也境內飢疫出粟賑之全活無算勸興學校士皆悅服太祖分省於婺控浙東大海治軍旅民事悉以委愷時力役無藝令民自實田數糧多者為里正寡者為副通驗其糧均賦之有一斗者役一日賤與貴皆無茍免金華猾胥潘立道操一邑田賦之柄緣為姦利廉其罪狀置於法苗軍亂害大海擁愷出愷責以大義被殺追封當塗男李質嘉靖浙江通志字文彬德慶人太祖命為浙江行省參知政事質以承流宣化為己任振紀網正風俗勸農桑興學校舉遺賢恤民隱在任三年惠流兩浙耿忠嘉靖浙江通志鳳陽人洪武二年以羽林衛指揮使奉命往兩浙聽訟訪察官吏問民疾苦時紹興三衢金華秋旱農事不登有司阻民告災忠以疏聞民皆德之王銘史槩字子敬和州人以管軍百戶從常遇春與吳軍戰湖州之辨山再戰舊館已又戰烏鎮凡大小戰數十功多擢長淮衛指揮僉事移溫州銘上疏曰臣所領鎮岸大海而控島夷城池樓櫓仍陋襲簡非獨不足壯國威猝有風潮之變捍禦無所勢須改為於是繕城浚濠悉倍於舊又加築外垣起海神山屬郭公山首尾二千餘丈宏敞壯麗屹然東浙巨鎮厯右軍都督僉事劉丞直獻徴録字宗弼贛縣人洪武已酉召拜浙江按察司僉事時方國珍初降丞直按部懲其尤梗法者一道肅清按浙三年以疾歸王濂獻徴録字習古定遠人洪武初浙江提刑按察司僉事巡行郡縣見貪墨蠧民者必擊去之餘則務存大體觀風宣化而已帝下詔求直言濂厯述災傷病民竟為罷徵安然李因篤安然傳字資善祥符人洪武五年授浙江布政使崇禮教黜姦頑十一年海潮齧江岸為患然親率丁夫伐石砌築堤成民得安居升御史大夫單安仁獻徴録字德夫濠人太祖時為提刑按察司副使巡行浙東時悍帥橫斂民名曰寨糧安仁一置於法金華民有訟其邑丞受白金者安仁曰頗聞丞賢爾奈何誣之即圖白金短長圎方來上復命諸左證圖之人人殊安仁曰是非誣耶衆環目相顧無一語遂以其罪抵訟者告訐之風為衰升按察使仕至兵部尚書王鈍嘉靖浙江通志字士魯太康人元進士洪武中為浙江布政持身亷介蒞政勤敏吏胥懾服嘗伐石以捍江濤民免墊溺嵗旱禱雨即應憂民不遑寢食民咸德之熊鼎史槩字伯穎臨川人太祖初平浙西授德清縣丞除中書考功博士上詔浙西民輸糧京師鼎曰國家都金陵以浙西為根本而遽困之農作方興僕僕道路茍一年失耕害不淺矣上悅即罷之立浙江按察司以為僉事分部台溫二郡溫有邪師曰大明教造飾殿堂甚侈民之無業者咸歸焉奏毁之散其衆為農平陽州吏目杜乙贓罪事發下鞫同知以下皆服罪獨知州梅諡廷辨不已民數百遮門外爭知州無辜鼎進民詢之歎曰法以誅罪吾敢身畏譴而誅無罪人乎釋諡以情聞上可其奏寧海強民陳德仲以憾支解黎異異妻屢訴無為白之者一日覽其牒忽有青蛙立案上曰蛙非黎異乎果異則止勿動吾復爾寃蛙如言明日逮陳訊得實誅之凡事未便者皆為奏改兩郡民灑然如更生始兩郡旱既至輒雨民曰此熊使君雨也升山東按察副使甘霖江南通志字沛之髙淳人洪武中以薦召入問其名曰甘霖因曰浙江大旱汝往霖之授左參政既至夢神告曰某地有泉可濟民渴旦往儼若夢境掘之果得大泉同僚屬祈禱大雨隨至仕至江西布政龍鐔西江志字德剛萬載人選入南宫髙帝召對嘉其能特授浙江按察使嵗洊飢俸贖俱蠲濟各郡以不避權貴為忌者所中遷長州知縣後靖難師起不屈死趙羾泳化類編字雲翰祥符人洪武舉人浙江右參政剸繁治劇事無凝滯捕海寇有功地方賴之仕至刑部尚書唐勝宗史槩濠人從太祖積功進都督同知封延安侯洪武十四年浙東山寇葉丁香等作亂命總兵討之擒賊首并其黨三千餘人張文嘉靖浙江通志六安人從徐達征浙西克湖州舊館諸處厯升浙江都指揮僉事在任克修軍政一方賴以安堵武德王鴻緒武德傳安豐人授千戶隸李文忠麾下從文忠取於潛昌化克嚴州進萬戶苗軍元帥楊完者軍烏龍嶺德請曰此可襲而取也即襲完者覆其營從文忠取蘭溪克諸暨又攻紹興先登陷陳蔣英叛金華賀仁德叛處州從文忠定金華又從攻處州遇仁德於劉山戰敗之還師守嚴改管軍百戶擊破吳兵於諸暨文忠遣擊江山盜撫定之進管軍千戶移守衢豫世襲最後從靖海侯吳幹臣巡海上幹臣以德可任令守平陽在任八年致仕孫成成化杭州府志徐州人少驍勇以功纍官至浙江都指揮使浙江海濵每有島夷患成修器械嚴守備謹烽堠海波靖息而持守廉介莫敢干以私王玘嘉靖浙江通志字孟石安肅人洪武末為浙江案察司僉事振肅風紀務詢民瘼屬司畏憚民蒙其惠易英嘉靖浙江通志字以和灃州人洪武末為浙江布政司參議政尚寬平明大體奬勵儒生務期成效公務之暇手不釋卷樊鎮明一統志字君輔考城人洪武進士厯官浙江左參政賦性剛直廉幹勤敏大得時譽王良史槩字天性祥符人建文初為刑部左侍郎坐問燕軍較罪末減出為浙江按察使謁嶽鄂王墓誓曰茍愧步武非人也成祖即位以前事頗德之乃召良使者至良執下獄詰旦縳出期斬以徇衆劫之去良坐堂上集諸司印九悉縢置於篋攜歸入門謂妻曰我分應死顧思所以處汝未決爾妻曰君男子乃為婦人謀乎饋良食食已抱其子自投於池而死良殯殮畢積薪閉戶命妾抱幼子往某僉事家以宗祀為托遂舉火以印投之與家人同赴火死正德戊寅接察司梁材即司門內東南水鑑亭為祠祀之榜曰忠節夏原吉吾學編字維哲湘陰人鄉薦遊太學授户部主事建文即位升户部右侍郎進尚書永樂元年吳浙大水原吉行視言浙西諸郡蘇松最居下流常湖嘉三郡土田髙多下少環以太湖綿五百里納杭湖宣歙諸山水注澱山諸湖入三泖頃浦港湮塞滙流漲溢傷害苗稼拯治之法宜浚吳松諸浦港泄其壅淤以入於海并相度地勢各置石閘以時啓閉每嵗水涸時修墟岸以禦暴流上從之役夫凡十餘萬原吉布衣徒步日夜經畫盛暑揮蓋去曰衆赤體暴日中吾何忍嵗飢奏發粟三十萬石賑濟二年還朝復出治水水泄農田大利進少保諡忠靖虞謙分省人物考字伯益金壇人洪武中由國子生厯任杭州知府建文中請限僧道田人無過五畝餘以給貧民從之永樂初巡撫浙江察廉糾貪上言數十事多見施行仁宗即位擢大理卿劉子輔嘉靖浙江通志廬陵人自太學生擢監察御史永樂初巡按浙江三年不見聲色善者愛之橫者畏之時按察使周新獨持風裁不茍許與乃數數稱子輔為賢升廣東按察使辛彥博嘉靖浙江通志洪武末為浙江按察使永樂中遷布政使有善政不尚苛暴得吏民之心李素分省人物考平谷人永樂中任浙江按察司副使發姦摘伏下無遁情用刑平而恕於民不擾仁宗召為右副都御史周新名山藏字志新南海人永樂中任浙江按察使初至界見羣蚋飛馬首尾之榛中得一暴尸身餘一鑰一小錍識新曰布賈也收取之既至使人大市市中布一一驗其端與識同者皆留之鞫得盜召尸家人與布而置盜法新坐堂有旋風吹葉至異之左右言此木城中所無一寺去城差遠獨有之新曰其寺僧殺人乎往樹下發得一婦人尸有商人自逺夜歸將抵舍潛置金叢祠石罅中旦取無有也商白新新曰有同行者乎曰無有語人乎曰不僅語小人妻新立命械其妻考之得其盜則其私也新行部微服視屬縣觸縣官收繫獄遂盡知其縣中疾苦明日縣人聞按察使來共訝不得新出獄曰我是縣官大驚當是時周廉使名聞天下錦衣指揮紀綱使千戶緝訪浙中作威受賕會新入京遇諸涿即捕繫千戶涿獄千戶逸出訴綱綱即誣奏新上怒逮之至抗聲陛前曰按察使擒治姦惡陛下所命也臣奉詔書死死不憾矣上怒命戮之臨刑大呼曰生作直臣死作直鬼是夕太史奏文星墜上不悅問左右周新何許人對曰南海上曰嶺外乃有此人一日上見緋衣而立者問為誰對曰臣周新也上帝謂臣剛直使主浙江城隍為陛下治姦貪吏言已不見新姿幹髙偉好學能文所至貧民寃繫聞之皆喜姦徒猾吏則戰魄落膽稱生閻羅云趙本舊浙江通志字居仁溧水人永樂中海溢塘圮以右通政督浙西蘇松等九府水政躬行海上指授布置併工修築堅厚完固至今賴之羅亨信廣東通志字用賔東莞人永樂進士授工科給事中視浙水災奏蠲嘉興海鹽崇德稅糧五十餘萬石仕至左副都御史周敏成化杭州府志字好學沔陽人永樂中任浙江按察司副使性明敏遇事立斷鞫訊獄訟洞察情偽狴無滯獄葉恕江西通志字如心樂平人永樂進士拜御史適浙江溫州銀礦大發廷議須以法官臨之遴選恕往比至規畫有條尤冰檗著聲繼按浙江振吏治肅紀綱所至郡境晏然嚴烜閩書字熙叔懷安人永樂進士浙江按察司僉事處州徐子舉亂其黨連坐者五十餘人烜訊無辜悉散遣奉詔考察庶僚中有毁之者遂乞教職便養得金華府教授熊槩湯斌熊槩傳字元節豐城人永樂進士洪熙初以布政使巡視應天蘇松常鎮嘉湖杭八府宣德初擢大理寺卿巡視如故海鹽民史慶真以罪戍逃歸易名平康暴橫滋甚御史捕之遁去會赦還益聚黨八百餘人槩捕誅之已悉捕豪惡數十輩械至京論如法於是姦宄怙息諸衛所糧運不繼軍乏食槩以便宜發諸府贖罪米四萬二千餘石贍軍乃聞於朝帝允行之都御史劾槩作威福縱兵擾民帝使人廉之無所得益任槩槩亦自信諸當興革者皆列以聞時屢遣部官至江南造紙市銅鐵槩言水潦民飢乞罷之遷都察院右都御史吳訥泳化類編字敏德常熟人洪熙元年除監察御史巡按浙西表陸宣公里修嶽鄂王墓斷秦檜碑人仰其風林碩嘉靖浙江通志字懋𢎞閩縣人永樂進士以御史巡按浙江宣德初為浙江按察使有中官裴可力督事浙江湯千戶以賄結之因勢漁獵百姓驅迫郡縣碩至振舉憲法旌别善惡湯懼不容讒碩於裴裴亦懼遂誣奏碩誹謗及阻格詔旨上遣追碩至親問碩言臣往巡按浙江小人多不便臣今升按察使小人設謀造詐欲去臣以自便臣實無誹謗語即命馳驛復任胡軫成化杭州府志字敬同豐城人永樂進士任浙江都轉運鹽使司運同持身廉儉一毫不妄取於人常俸不給至鬻園蔬足之請托不行商旅被惠每出人爭趨言願為犬馬走因肩其轎行揮不去升浙江按察司副使提學士人宗之黃澤閩書字敷仲閩人永樂進士宣德初浙江左布政使奏罷無徴米六十萬石停止溫處二府平陽麗水等七縣銀冶嵗額銀九萬兩在任九年劾罷不職郡縣吏五十七人戴同吉嘉靖浙江通志長泰人永樂進士宣德初為浙江布政司右參議旬宣盡職上言五事一曰明學校之教二曰嚴邊境之備三曰慎守令之選四曰敦勸士之典五曰立勸懲之法言甚切至帝嘉納之孔文英嘉靖浙江通志字世傑安化人永樂進士宣德初擢浙江道御史黃巖縣有健訟者搆揑齊民三千人相聚譸張為非文英奉敕鞫問一訊即得其情立遣詿誤者獨械首訟一人治之中外服其明果許亨獻徴録字士通定遠人以父廕為指揮僉事纍進都指揮使鎮浙江海寇時或竊發亨擇人守屯堡時訓練寇遂屏迹嵗調兵士運漕給京師分番更代立為成規以是勞逸均而餽餉及期拜左軍都督僉事卒於官許銘嘉靖浙江通志南昌人永樂進士宣德初為浙江按察司副使持憲嚴明人不敢干以私興利除害民皆感服嚴孟衡西江志字衡中分宜人永樂進士浙江按察副使蒞任前一夕胥吏不戒於火案牘燬孟衡自引辜受罰運磚逾年有白其枉者赦復職時法網稍密孟衡悉心平反一牘中至理寃濫數十人遷四川右布政使陳鎰嘉靖浙江通志字有戒吳縣人永樂進士擢御史升浙江按察副使用法寬平臨事簡易民信愛之宣德間升都御史諡僖敏楊昺湖廣通志字文昭崇陽人永樂進士宣德四年為浙江按察司僉事分按浙西賊據百丈山蘆弄洞頻出金衢剽掠昺夜夢神人贈詩云影入菱花秋月裏人如枯草夕陽邊乃識於心曰賊在吾目中矣詰朝亟捕之圍山得賊首餘皆解散金衢以安擢廣東按察使馬謹獻徴録字慎言新樂人宣德進士以御史按浙所至克振風裁貪猾屏迹大學士楊士竒以冰霜鐵石比之時以為確論官至副都御史巡撫河南周忱世法録字恂如吉水人永樂進士宣德五年巡撫直𨽻江南正統六年兼巡撫嘉湖二府時海鹽築捍海塘一郡七縣合役萬夫費萬計皆出忱度支海不能為患浙江當造海船五十艘忱召問都匠言一艘須米千石忱以成大事不惜小費第減二十石奏於朝報可忱宇量寬𢎞才識通敏蒞事精勤臨民和易性尤機警籌畫諸郡錢榖巨萬一屈指無遺算每會計視地豐凶為緩急而張弛之調劑變通民無逋負官有餘積進工部尚書諡文襄王翺畿輔通志字九臯鹽山人永樂進士正統初擢都御史巡撫浙江拊善摧姦政聲大著後位至吏部尚書諡文肅焦宏湯斌焦宏傳字克明葉縣人永樂進士正統六年為戶部右侍郎時倭寇數犯內地命往浙閩蘇松飭兵備禦宏奏緣海衛所宜畫疆分守不得互諉增設城堡戍卒周嵗交代勿踰時日以均勞逸嘗親厯衛所廉察軍吏得其營私廢公狀請分敕御史巡視閩浙使懲戢姦頑益嚴武備皆見施行時有言開浙江銀場者命往勘之宏知其害民乃言礦脈消長無時開場之後恐滋姦偽卒年五十八張驥史槩字仲德安化人永樂舉人正統中巡撫浙江初慶元人葉宗留與麗水陳鑑胡以盜礦為業七年遂為亂散掠浙江江西福建境上而遂昌賊蘇牙俞伯通剽蘭溪與相應驥遣金華知府石瑁擊斬牙等撫定其餘黨而鑑胡已殺宗留驥命麗水丞丁寧率老人王世昌等齎榜入賊巢招之鑑胡遂偕其黨六十餘人出降驥在浙江甚有建樹民追慕之俞士悅湯斌俞士悅傳字仕朝長洲人永樂進士正統四年任浙江布政司參政初至佯若不解事者羣吏易之越數日盡得其姦猾狀發摘若神吏大驚倭寇犯境修乍澉二浦城以備之遷河南右布政使仕至右都御史楊瓉史槩蠡縣人永樂進士擢浙江右布政使平陶得二之亂景泰二年以湖州諸府官田賦重請均之民田賦輕者而嚴禁飛詭之弊詔與鎮守侍郎孫原貞督之田賦稱平軒輗湯斌軒輗傳字惟行鹿邑人永樂進士正統時以御史清理浙江軍政劾不職官四十餘人遷浙江按察使妻執井爨所著寒暑一布袍居常蔬食不過一豆問或具雞黍聞者驚異在任與周新齊名聞親喪隔宿即行同寮追送不及服除擢副都御史巡撫浙江時土寇吳金八等攻掠城邑輗親督將士與戰平之福建賊羅丕廖寧八攻劫尤溪漸抵浙境輗授方略捕其渠魁賊遂解散天順初為刑部尚書帝召見曰昔浙江廉使考滿家具僅一竹籠是汝耶輗頓首謝仕終左都御史李俊畿輔通志字文英定興人以明經薦擢御史正統十三年差董浙江銀冶會處州賊起敕俊勦捕俊敗之街亭橋越三日賊首來劫鎮守太監李德懼欲走俊叱止之明年賊圍處州俊募敢死士八百人為子臨城射殪衣紅者一人出城奮擊破之因請降都御史張楷不受賊復驚變俊灑泣誓衆衆感奮出死力大破之躬擐甲胄十有二日事解脫胄髮盡禿仕至山西按察使陶成名山藏字孔恩鬱林人由舉人纍官浙江按察司僉事九載考績民詣闕乞留升本司副使正統七年倭寇東海成預布丁令板海淖中賊艤舟躍岸盡被刺朴伏兵四合殱而焚之十三年處州賊葉宗留等為變將逼金華之蘭溪成執渠魁戮黨與數百人乃分遣招撫得降者二千餘人宗留等還遁入處及溫台山谷間成抵寨諭之留壘中七日皆感悔出降獨餘黨陶得二者不受撫遁入山谷久之復出攻武義武義故無城柵木而已得二以緼束薪使人先匿入柵中而自率衆外攻柵成與都指揮崔源驅兵出戰賊從中燒柵為內應力戰不支遂遇害贈浙江布政司參議吳升分省人物考字亨晦懷寧人宣德進士擢工科給事中正統癸亥閩浙礦徒為盜升浙江參議督兵往輯至則撲其黨廉其失機都指揮以下數人奏置之法衆乃股栗不二載賊屏息政績著聞黃裳湯斌黃裳傳字元吉曲江人正統進士授監察御史言浙江寧紹台疫宜蠲租賑恤從之巡按兩浙見民遭水患奏請賑恤後殁於土木朱英名山藏字時傑郴陽人正統進士授監察御史處州賊葉宗留反其黨周明松等四出摽掠遣英與中官守要地時勦冦大軍尚駐金華英至徑趨處州榜諭脅從降者甚衆以計生致明松等數人械至慶元誅於市賊平還京升右副都御史巡撫甘肅陳璇魏驥陳璇傳字在璣鳳陽人登進士第為浙江按察使寬不縱猛不殘浙人懷德或謂璇少擊摶風璇曰法貴禁人不犯不從禁而罹於法某亦何嘗少貸耶後赴闕軍民數千人填衢塞巷挽留之馬不能前璇駐於城之宗陽宫一宿黎明取間道而去汪琰西江志字廷用樂平人正統進士以御史按浙病潦輒發粟賑貸婺富民私鄰婦而殺其女獄無證有烏為怨聲琰廉之即烏所止處得其尸論如法擢山東副使耿定明一統志和州人浙江布政司參議正統未處州盜起定領兵勦捕率先督戰死於兵贈浙江按察司副使王晟明一統志字景昭鄆城人浙江按察司僉事正統時溫處盜起晟往討之戰死贈江西布政司參議李慶獻徴録字積善沔陽人國子監生正統時擢浙江都轉運鹽司運使兩浙鹽利為他運司甲巨商豪賈投劵者踵相屣於庭慶嚴簿書時出納絶請謁有持劵請鹽者按嵗月先後給之權貴請托謝絶不顧在官二年嵗課三倍浙江通志卷一百四十七
