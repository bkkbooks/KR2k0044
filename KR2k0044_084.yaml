body:
  text: 浙江通志卷八十五鹽法下浙鹽官制兩浙巡鹽御史一員詳見職官兩浙鹽驛水利副使道一員詳見職官寧紹溫台分司運副一員以下俱詳見職官嘉松分司運判一員經厯一員將盈庫大使一員批驗所大使四員鹽場大使二十五員行鹽地方國朝鹽策之行自兩淮外無廣於浙者東迤海北距揚子江西盡歙信之域南暨甌閩之交所食者皆浙鹽也其界三面鄰淮鹽而一面與閩之鹽接故以省計之曰浙江曰江南曰江西以郡計之十有七其隸浙江者十一曰杭州曰嘉興曰湖州曰寧波曰紹興曰台州曰金華曰衢州曰嚴州曰溫州曰處州隸江南者五曰蘇州曰松江曰常州曰鎮江曰徽州隸江西者一曰廣信以州計之曰太倉曰廣德並隸江南批驗所本朝置松江寧紹溫台嘉興四分司督鹽課今併歸二分司管轄杭寧紹溫台分司管杭紹二所嘉松分司管嘉松二所一杭州批驗所在郡城東北艮山門之內瀕東運河新橋南掣廳西向凡商鹽到所由艮山門入泊太平橋候巡鹽御史按掣掣畢放行泊德勝豬圈二壩候程開運運鹽河有二道浙東鹽過壩進武林門由中河出鳯山門過江壩經富陽關桐廬關嚴州關盤驗浙西鹽過壩由官河出北新關至蘇湖二府盤驗一嘉興批驗所在嘉興府春波門外五里掣廳北向前為運河三面有橋北為虹涇橋有柵巡鹽御史按掣時商鹽泊運河橋下封柵候掣畢船鹽俱出虹涇橋堆貯新創鹽倉內四縣票引分别另貯候商領程開運經蘇湖二府盤驗一紹興批驗所在府治西北六十里蕭山縣之東南隅北瀕運河各場配鹽俱從錢清江逹官河或經長山閘抵所候掣掣畢運至新壩義橋堆貯江岸俟領程開運又令於發運處所挨户編立保甲候商領程開運經富陽等三關盤驗一松江批驗所在府城西南二里南瀕運鹽河商鹽運掣自黃浦入東汊港至所下巡鹽御史臨掣時於小斜涇大張涇橋椊潼橋下俱釘木柵以絶飛渡俟掣畢開放掣過鹽船向皆停泊尤孰散漫難稽康熙六十年詳定於沈埭地方建柵嘉松分司差役巡守并令所官不時稽察候商領程開運場竈杭寧紹溫台分司所屬場分仁和場仁和錢塘二縣地方煎仁和茶槽倉錢塘倉共五團竈八十三座本場額設仁和錢塘二倉向係分縣徵輸分産承辦中有課蕩稅蕩之不同課蕩者煎鹽辦課之蕩徵丁而不徵稅稅蕩者其地潮水不上無由刮煎故祗種花豆徵稅而不徵丁仁和倉竈丁皆給課蕩樵煎雍正三年奉文丁歸地徵所有丁課攤歸課蕩按畝均輸其餘蕩地仍照則納稅不加丁課錢塘倉逼處江濱頻遭坍沒之患惟浮山一帶有地而非刮煎之土故竈丁不諳煎燒凡課蕩稅蕩皆種花豆今丁歸地徵故丁課亦同仁和均攤但課蕩已經坍沒四千四百餘畝因將丁課槩攤課稅兩蕩之上而各則稅蕩又復坍沒二千五百六十五畝零缺稅不便虛懸今併同丁課均攤各則現飭仁和場大使清丈升出抵除本場原額課蕩共七萬四千一百八十一畝九分八釐七毫一絲五忽本場上中下各則稅地沙蕩共五萬一千五百六十二畝一分九釐八毫六絲三忽七微七纎四沙五塵八渺三漠本場子沙八千四百七十九弓向給竈户樵煎例不起稅今撥駐防旗丁牧放馬匹與許村場分年輪值本場官塘牛路水浦九十八畝六分三釐二毫六絲四忽八微係給竈户車運柴滷亦不徵稅起科雍正六年仁和場地蕩被海潮衝塌缺課銀一千七兩六錢一釐一毫零題準自雍正七年起停其徵收又雍正九年仁和場竈地被潮衝坍一萬二千三百三十畝除將丈升加則等稅抵補外實坍缺課銀五百六兩五錢零題準自雍正十年為始停其徵收查有各場新漲之地丈升撥補許村場海寧縣地方竈東倉九西倉座共十六團煎一百十五本場原額東西橫濶課蕩共一萬三千八百八十九丈三尺六寸二分九釐三毫內分假丈實草蕩三萬三千四十二畝八釐八毫五絲又沙垜四千五百七十八丈三尺五寸九分五釐九毫坍後復漲故址已失丈見實地九萬三千七百二十畝七分一釐七毫三絲一忽本場各則稅蕩稅地共七千七百一畝七分七釐五毫九絲雍正十一年七月題準許村場蕩地前被潮坍九萬八千一百八十六畝三分七釐零共缺課稅銀一千六百八十六兩六錢九分六釐零於雍正七年題準自雍正六年為始停其追徵續經清查鮑郎西興錢清等場新升銀兩撥抵今該場西倉地蕩二千七百一十七畝一分二釐零上年四月間復遭潮患坍海無存額徵課銀一百二十八兩四錢七分二釐零自雍正十年為始停其催徵俟各場續報新升銀兩另行撥抵謹按以上仁和許村二場向因附近省城舊隸運司所屬不隸分司雍正七年題改俱歸寧紹分司管轄仍隸鹽道統屬西興場蕭山縣地方裁併錢清場不設煎竈本場課蕩七千六百六十九畝三分本場上中下各則稅蕩六萬七千三百一十二畝一分九釐九毫九絲四忽錢清場山隂蕭山二縣地方座共八團煎竈五十二本場辦課灘場七千五百三十二弓六寸本場上中下各則稅蕩二萬一千七百四十畝八釐六毫八絲六忽三江場山隂縣地方十共八團煎竈二百五一座本場辦課灘場一萬六千四百六十六弓又課蕩一萬七千一百六十七畝八分四釐本場上中下各則稅蕩一萬二千九百六畝七釐七毫四絲八忽一微曹娥場會稽上虞二縣地方座共七團煎竈六十五本場辦課灘蕩一萬八千九百七十八弓本場上中下各則稅蕩二萬八千五百五十二畝二分七釐七毫四絲六忽石堰場餘姚縣地方八共五團煎竈二十座本場上中下各則課蕩七萬七千九百三十七畝三分五釐二毫六絲七忽本場上中下各則稅蕩一十一萬七千六百七十八畝二分五釐二毫七絲三忽鳴鶴場慈溪餘姚二縣地方共六團煎竈四十座本場課蕩二萬六千一百二十三畝一分一釐六毫四絲本場稅蕩二萬五百二十九畝三分三釐五毫二絲八忽清泉場鎮海鄞縣二縣地方七共十五團煎竈二百五十座本場舊給灘場二萬二千二百四十六弓皆堅硬荒砂久為廢壤不行攤課其丁銀攤於刮土淋煎之海灘并竈田地蕩倉基及積年展復地畝之上按則均辦苐竈田等地畝向經按則完稅復加攤丁俟有新漲升課即與抵除本場辦課海灘三千四百八十七畝七分本場上中下各則辦稅竈田地蕩四萬一千九百八十畝五分六釐九毫九絲三忽六微六纎六沙六塵龍頭場鎮海縣地方裁並清泉場共十三團煎竈七十七座本場辦課灘蕩一萬二千九百五十六弓本場中下各則辦稅竈田地蕩四萬九百三畝六分七釐二毫二絲七忽四微九纎七沙四塵四埃八渺四漠穿山場鎮海縣地方三共四團煎竈三十座本場各則辦稅竈田地蕩一萬六千六百畝五分二釐七毫六絲四忽長山場鎮海縣地方裁併穿山場共七團煎竈六十七座本場辦課灘塗一千九百六弓九分本場辦稅竈田地蕩二萬五千一百八十畝一分四釐三絲五忽七微八纎四沙七塵七埃三渺大嵩場鄞縣地方十共四團煎竈二九座本場辦課灘塗草蕩六百五十二弓二分本場辦稅各則蕩地四萬一千五百七十畝五分六釐八毫四絲七忽九微二纎玊泉場象山縣地方裁併大嵩場共三團煎竈一十六座本場辦稅竈田地蕩一萬九千一百九十三畝四分二釐六毫七絲九忽九微五塵長亭場寧海縣地方六共四團煎竈一十座本場分山海二竈山竈人居山谷不諳煎燒徒手辦課海竈居近海濱刮煎是業雖有蕩地山沙俱係瘠土所有丁課難以均攤現在查升抵補本場展復辦稅倉基一所本場復辦稅山蕩田塔沙地二千一百八十七畝二分三釐八毫三絲黃巖場黃巖臨海太平三縣地方共十一團煎竈五十七座本場止有稅蕩並無額給樵煎之地且丁多蕩少難以攤派仍照舊徵輸惟是徒手光丁艱於辦課俟有新漲升課撥抵本場辦稅地蕩一萬二千一百一十二畝三分六釐八毫六絲五忽二微六纎杜瀆場臨海縣地方裁併黃巖場座共五團煎竈一百二十四雍正七年題準杜瀆場復設場官一員與黃巖分管本場辦稅地蕩一萬二千一百七十六畝三分三釐四毫雙穗場瑞安縣地方九共五團煎竈二十座本場辦課飛雲渡南北兩岸等內地九百八十畝本場辦稅蕩地一萬三千四百二十三畝七分四釐九毫八絲八忽七微四纎長林場樂清縣地方四共五團煎竈五十座本場辦稅坦地一千三百一十四畝三釐一毫九絲九忽永嘉場永嘉縣地方裁併雙穗場共四團煎竈六十九座雍正七年題準永嘉另立一場復設場官一員本場辦課地八百五十一畝五分本場辦稅地蕩八百九十三畝六分八釐四毫五忽二微南監場平陽縣地方裁併雙穗場不設煎竈北監場樂清太平二縣地方裁併長林場不設煎竈本場丁課於展復蕩地及新墾田畝之上均攤外其白沙嶽頭二倉實係無地丁課難以虛懸暫行照舊輸納俟有漲墾升課撥抵嘉松分司所屬場分西路場海寧縣地方竈舊倉三新倉座共三十九團煎三百十六本場竈地舊分東三圍西六圍康熙六十一年間西六圍被潮衝沒沙亭三千二百三十三丈九尺并升地二畝窮丁失業缺課銀五百五十一兩零巡鹽御史楊為梓題請攤於同所之海沙蘆瀝二場代納銀三百八十六兩零餘仍令本場勉力自完雍正三年奉文丁歸地徵又丈缺東三圍竈地八千六百七十五畝五分零缺課銀兩本場雖自行攤納實不得已遵照由單以漲補坍之例俟清查各場漲墾地畝不拘是何場分先儘劃抵本場現存東三圍課蕩一千三百四十八畝六釐五毫六絲一忽本場現存稅地二十二畝六分鮑郎場海鹽縣地方五共一十九團煎竈一百十九座本場課蕩一萬二百九十畝三分四釐七毫五絲二忽又海灘四千三百五十弓一尺二寸本場各則稅蕩稅地七千六百二十七畝八分三釐一毫八絲六忽四微海沙場海鹽縣地方九共二十一團煎竈一百十九座本場代納西路場坍課一百二十五兩零俟西路漲墾仍自歸辦本場課蕩二萬四千二百七十五畝六分八釐五毫七忽又海灘一萬三百九十四弓四寸本場上中下各則稅蕩三萬九千六百九十八畝八分八毫四絲七忽蘆瀝場平湖縣地方一共十三團煎竈一百十七座本場代納西路場銀二百六十一兩零俟西路復漲仍歸自辦本場上中下各則課蕩九萬四千三百六畝四分九釐四毫五絲三忽本場上中下各則稅蕩五千二百三十八畝五分一釐九絲三忽七微又各則海灘灰場四千八百七十八弓橫浦場平湖縣地方二共五團煎竈五十座雍正七年題準橫浦場仍歸江南金山縣完課本場上中下各則課蕩二萬八百七十六畝八分七釐六毫五微六纎七沙三塵七埃五渺九漠本場各則稅蕩一萬八千九百七十二畝一分二釐四毫八絲九忽四微三纎二沙六塵二埃四渺一漠又沙塗二千八百九十五弓浦東場金山縣地方七共三團煎竈二十座雍正七年題準浦東場裁併橫浦場本場上中下各則課蕩四萬三千二百二十二畝二分八釐本場各則稅蕩三萬三千五百一十三畝七分五釐六毫三絲四忽三微七纎五沙袁浦場華亭縣地方七共十團煎竈八十座本場蕩地除見存備荒蕩外其餘課稅兩蕩坍沒僅存一萬七千有竒今將丁課均攤各則地蕩之上所有缺額雍正三年鹽臣謝賜履題攤於同所之青村浦東下砂一二三場代納俟查各場新升即豫歸抵本場上中下各則課蕩六千九十八畝九分九釐四毫本場各則稅蕩一萬九百一十七畝六分二釐七毫二絲青村場奉賢縣地方百共二十九團煎竈三九座本場上中下各則課蕩三萬二千六百五十三畝六毫二絲五忽本場各則稅地四