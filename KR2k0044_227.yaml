body:
  text: 浙江通志卷二百二十八寺觀三嘉興府嘉興秀水二縣附郭勅賜覺海寺舊名報忠寺萬厯嘉興府志在府治西南一里宋淳祐九年朝散大夫趙汝俳捨宅為報忠觀元至正二十五年改觀為寺至正末兵燹不存明永樂十五年僧克雋重建國朝雍正十一年奉勅改名覺海寺發帑重建十二年十一月御書覺海寺扁額天寧禪寺名勝志在治北里許漢嚴助宅也嘉興府志舊為施水菴唐咸通中改為院𢎞治嘉興府志宋熙寧元年賜名壽聖院崇寧二年賜名天寧寺政和六年改名天寧萬壽院紹興七年改名廣孝院十三年改報恩光孝禪院嘉興縣志元為天寧萬壽禪寺明洪武間定為天寧禪寺寺有漢風閣毘盧閣寺後有嚴將軍墓嚴將軍井宋徽宗御書屏在僧舍李諤過施水菴詩勝地開蘭若幽㝷信短笻僧貧只施水客至但聞鐘講座天花滿香臺翠靄重何當謝塵􅌧白社此相從曾鞏壽聖院詩一峯瀟灑背城隂碧瓦新堂地布金花落禪衣松徑冷月臨經帙紙窗深幽棲鳥得林中樂燕坐人忘世外心應是白蓮香火社不妨籃轝客遊尋王世貞天寧寺詩東風依歩屧愛此禪房幽一雨忽秋色諸天來暝愁烏隨托鉢下僧逐鳴鐘求尚有三車喻能同信宿留朱彞尊鴛鴦湖櫂歌天寧佛閣早春開鳥語風鈴次第催怪道廻船濕羅襪嚴將軍墓踏青來精嚴講寺至元嘉禾志在郡西北一百八十歩晉成帝時徐尚書熙别業因井夜發光遂奏請捨宅為寺賜名靈光宋祥符中賜今額淳熙間重修王希吕精嚴寺記秀州精嚴寺即東晉選部尚書徐熙所捨之宅淳熙四年直寳文閣韓公彥質以黄岡政成聖恩優渥付以兹郡下車未㡬推其治理勤厥外䕶乃請於朝願以是寺改為十方有㫖從之於是籍寺所有得二萬餘緡并舉韓使君所施之財與大衆之所施者又數千緡鳩工雇直經始於五年春二月斷手於六年夏四月寺成具以本末來告爰為記之嘉興府志明洪武二十四年定為天台講寺今仍舊額寺門側二塔相傳呉越王得佛舍利納金鐸中藏此宋時石刻御贊尚存舊有五臺山唐寳安師築并建五臺院寺西南有木紋觀音殿俱廢寺前有百丈溝左有靈光井劉長卿秋夜雨中過靈光寺詩晤語青蓮舍重門閉夕隂向人寒燭静帶雨夜鐘深流水從他事孤雲任此心不能捐斗粟終日媿瑤琴祥符禪寺𢎞治嘉興府志在郡治西北二里東晉興寧間詔剡山法師竺潛講般若經於禁中還止檇李魏公家因捨宅為精舍梁普通中盛行水陸法事號水陸院唐㑹昌五年廢大中元年復立宋大中祥符元年賜名祥符院舊嘉興府志建炎間燬紹興五年重建舊為律寺守臣林衡奏請為禪院明洪武二十四年定今額水西禪寺明一統志在府治西北二里舊名資聖院嘉興府志唐㑹昌中黄檗師開山即廢大中元年復立宋建炎兵燹紹興中重建明洪武辛未定今額金明教寺萬厯嘉興府志在郡治西南二里宋開禧元年賜額時有異僧壽萬王者以醫名史彌逺有疾王為療之獲愈厚施不受以建梵宇為請史乃購地於此明洪武二十四年定為教寺有湖天海月閣閣下有范蠡湖萬歴十年郡守龔勉於閣前復剏一軒曰慿虗攬勝軒髙道素訪秋潭舷公金明寺詩春城細水流古寺到門幽卧栁沙邊渡夕陽江上樓翻經雙樹暝放鶴五湖秋黄葉新吟好清音擬惠休朱國祚金明寺訪秋潭上人詩不逺金明寺支公舊法堂鴟夷范蠡宅程史岳珂坊過雨花盈砌抽梢竹覆墻由來方外社主客意都忘楞嚴寺名勝志在治西北二里三十歩地勢爽塏林木蓊鬱石橋流水似不與人境接至元嘉禾志宋嘉祐八年百姓鈕咸有地在慈恩塔東因捨入本院後僧永和在院講楞嚴經蔡丞相書楞嚴牌揭之門遂以為名嘉興府志元末兵燬明洪武初重建嘉靖中廢萬歴中復建神宗母后勅建禪堂及天王殿遣内臣齎賜藏經五千卷及䕶藏紫衣觀音項忠楞嚴寺重建佛殿記宣德甲寅住持道建殿宇新佛像繼有淨蕙蕙所度弟子曰知覺補席以來慨然以興復為已任罄捐已槖兼裒衆施市材僦工權輿於成化辛丑閱二寒暑克底於成規制宏敞視舊有加髹雕藻繪燦霞煥日法相莊嚴金碧晃耀花香供具備完無缺覺求記於予以垂不朽予謂覺之功有足書者庸記之國朝康熙四十四年御賜藏海慈波額崇道宫嘉興府志郡治西南二里呉越武肅王建初在南城外後移入城古萬壽宫基舊名崇福宫宋治平中賜額俗呼為南宫萬厯嘉興府志宫内有一枝堂毎大比士人取一枝之䜟多㑹於此洞眞道院萬厯嘉興府志在郡治西南二里元至正癸夘道士趙樗軒剏嘉興府志明洪武庚戌禱雨有驗建聽雨軒永樂癸未重修隱眞道院𢎞治嘉興府志在府治東南六十歩宋崇寧間建或謂紹興初吕純陽劉髙尚二仙常至此故名隱眞劉髙尚夜宿院中晨起援筆題四十三字於柱間筆畫透柱如㸃漆郡人有疾者刮其字煎飲之即愈國朝雍正六年嘉興府知府閻堯熙於觀南倚城培址建閣三層中奉文昌神并祀魁星於其上嘉興縣城外寺觀東塔講寺名勝志在治東郭外漢朱買臣故宅梁天監中建寺嘉興府志隋仁壽年置塔塔前二池分青白色唐廣德中賜報國禪院額宋初為泗州大聖塔院至元嘉禾志政和六年因在城壽聖教院改為天寧萬壽寺郡聞於朝以壽聖教院名就塔院立之紹興三十二年改名東塔廣福教院嘉興縣志嵗久塔圯僅存二級淳熙中僧清雅重建寧宗召講華嚴經賜紫衣號寂照御書華嚴經閣雷音海印二堂名賜之元燬明洪武重建定為東塔講寺王英重修東塔寺記元中猷法師别號復闇永樂庚子主嘉禾東塔華嚴講寺寺因兵燹殿宇傾廢法師至憮然有感遂捐衣鉢之贏及募諸施者簡材鳩工薙榛汰礫棟接甍連深嚴𢎞邃髹彫黝堊金輝碧映儼若竺乾鷲嶺之勢工興於是年秋訖於宣德戊申冬王士祿晚過東塔寺詩蘭若蕭梁古風流想六朝化城圍綠水孤塔上青霄珠閣浮林影金園絶市囂依幡㸔刹近緣響趁鐘遙樹偃時遮磵途紆屢過橋到門苔滑滑入寺竹翛翛古碣何年失塵襟此際消皴㾗㢠廻側柏暮色隱甘蕉長史遺墳在諸天法界標跨虹通石徑對砌敞松竂居士才還辨頭陀偈定超禪燈龍象黯佛日鼔魚銷洗鉢誠微尚長齋况久要劫波巾擬解屈眴服思邀便好從初地相依結一瓢滄洲仍有役白社欲無聊怖鴿棲將穩檣烏待尚遙前期須嵗月客意嚮風颷支許應非忝宗雷倘見招徘回未能去仙梵晩蕭蕭漏澤教寺至元嘉禾志漏澤院在縣東二里三十歩宋崇寧三年陳舜俞孫捨宅為之嘉興府志明洪武辛未定為教寺嘉靖甲寅寺廢萬歴中僧道梅建金湯室天啓中僧大賢建彌陀殿國朝順治間重建天王殿大殿禪堂東西方丈白蓮講寺萬厯嘉興府志縣東八里舊名接待院後廢為趙倅雋之錦莊宋紹興二年重建明洪武初定為講寺嘉興府志永樂元年僧宗鏡修建天啓中邑令湯齊改名白蓮智覺教寺至元嘉禾志在縣南二十六里舊為營田都務宋開寳八年立為梵刹咸平六年賜太平天壽院治平元年改今名萬厯嘉興府志明洪武初為禪寺二十四年併歸資聖禪寺永樂元年里人張福信重建淨土教寺至元嘉禾志在縣東三十六里本邑人陸求宅清泰元年捨為安福寺宋祥符元年賜今名内有亭名碧鮮多竒竹嘉興縣志明𢎞治十年建觀音殿聞人安道碧鮮亭詩植竹敞虗亭清幽滌襟慮盛暑生凉隂窮冬見蒼翠我愛主人賢堅如筠箭美願師持此心與境常無媿陳賢良碧鮮亭詩瀟灑闌干碧玊叢昔來游賞是兒童縈廻修竹探繁影刻畫新詩遶翠筒十載雪霜林色改㡬畨風月酒尊空子猷老去心長在終擬為隣作醉翁石佛教寺嘉興府圖記在縣東南二十七里唐至德初除基獲四石佛因剏石佛院萬厯嘉興府志宋天聖元年賜名保聖院明洪武十五年定為教寺寺多奇石遊者甚衆靈源寺嘉興府志補在縣南二十六里元至正二年翰林學士王昌源捨宅建元末兵燬明洪武七年重建圓通教寺萬厯嘉興府志在治東三十六里舊有廢址周顯德五年居民茅承翰申漢南王乞於舊址立寧國寺宋治平元年改圓通寺明洪武二十四年定為教寺寺有銀杏二株歴唐宋至今先福寺至元嘉禾志在縣東一十八里唐乾元間剏㑹昌間廢咸通六年復立九年改為先福院萬厯嘉興府志元末兵燹明正統三年僧道澄重建興善教寺嘉興府志在縣東南三十里梁天監二年置周顯德五年改報恩院宋治平元年改興善院舊有舍利雙塔明洪武二十四年定為教寺景泰天順間増建殿閣萬歴間修鬱秀觀𢎞治嘉興府志在縣東二里宋咸淳三年道士劉一清建元至正二十七年燬明洪熙初道士沈野雲仍舊額徙建白紵里玊樞道院嘉興府志縣東北二里俗呼天尊閣元至正己酉里人楊道貞捨宅建明永樂元年重建嘉靖甲子殿燬萬歴丙子再修太古道院𢎞治嘉興府志在縣東北三里元至正間道士魯逺一剏建明洪武二十四年併歸元妙觀永樂元年重建秀水縣城外寺觀眞如教寺至元嘉禾志在縣南四里唐至德二年立大中十年裴相休捨宅為至德院宋大中祥符元年改今名慶元三年建寳塔於其北司馬光真如教院法堂記壬申嵗夏四月有僧清辨踵門來告曰清辨秀州真如草堂僧也真如故有講堂卑狹不足以休學者清辨與同術惠宗治而新之今髙顯矣願得子之文刻諸石以諗來者光辭不獲乃言曰師之為是堂也其志何如曰清辨之為是堂也屬堂中之人而告之曰二三子茍能䆒明吾佛之書為人講解者吾且南嚮坐而師之審或不能則將取於四方之能者皆伏謝不能然後相率抵精嚴寺迎沙門道歡而師之又屬其徒而告之曰凡我二三子肇自今以及於後相與協力同志堂圯則扶之師闕則補之以至於金石可弊山淵可平而講肄之聲不可絶也光曰師之志則美矣抑光雖不習佛書亦嘗剽聞佛之為人矣夫佛葢西域之聖者其為人也清儉而寡欲慈惠而愛物故服敝補之衣食蔬糲之食山居野處斥妻屏子所以自奉甚約不憚煩人也雖草木蟲魚不敢殺葢欲於物並生而不相害也凡此之道皆以涓潔其身不為物累後世之為佛書者日逺而日訛莫不侈大其師之言而附益之以淫怪誣妄之辭以駭俗人而取世資厚自封殖不知厭極故一衣之費或百金不若綺紈之為愈也一飯之直或萬錢不若膾炙之為省也髙堂巨室以自奉養佛之志豈如是哉師之為是堂將以明佛之道也是必深思於本原而勿放蕩於末流則治斯堂之為益也豈其細哉萬厯秀水縣志元末廢明洪武二十四年修復定為教寺寺内舊有雪峰井綵雲橋東坡煮雪亭裴丞相清暉堂長水塔柏屏龍槐纓絡松號八景秀水縣志萬厯丙戍僧真謐建長水法堂天啓乙丑僧道耕重建禪堂守詹應鵬扁曰水雲張堯同真如寺詩家玊輕脫屣聊結淨人緣影外香燈寂清風百世傳沈鉉真如寺雨霽詩祇園雨瑤花窣堵削寒玊崢嶸聳層霄皓彩炫晴旭幻境孰非真忻然寄遊矚國朝順治乙酉塔燬己亥僧明句重建景德禪寺名勝志在縣西南四里舊焚化院宋名景德寺寺下有白龍潭天日晴霽忽睹白光三道起自潭中僧行雲者積土填潭於光起處各造一塔因名三塔灣亦名三塔寺萬厯秀水縣志元至正間雲海寛公大構殿宇廊廡及諸佛像黄溍景德寺碑記嘉興郡治距西四里為景德寺按寺籍記載其初葢白龍潭深險莫測往往風雨壤帆檣晴則有白光三道起水上唐季異僧雲行者日運土石以實潭遂建三塔以鎮之水至是廻抱灣環為大道塲乃構棟宇祠佛菩薩而以龍䕶法焉當五季呉越錢氏有國時賜名保安禪院宋景德中勅天下郡縣為景德寺故易今額嘉定九年旱邑人禱於龍得雨爵龍