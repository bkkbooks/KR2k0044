body:
  text: 浙江通志卷一百十八職官八明二承宣布政司左布政使安然字資善柘城人趙觀吳炳文李擴曹岱龍徳王鈍字士魯太康人已上洪武間任鄧謙上嵩人辛彥博汾州人孫雋陕西人已上永樂間任黄澤字敷仲宣徳間任石執中藍田人孫原貞見前張紳字仲紳句容人已上正統間任李彞渾源人景㤗間任梁楘字叔車㤗和人秦敬涿州人沈義江都人李顒見前黄琛将樂人已上天順間任張清劉璋余子俊字士英青神人劉福建安人張瓚字宗器孝感人寗良端宏字仲仁當塗人徐珪安樂人林謙己上成化間任劉大夏字時雍華容人楊峻進賢人閻仲宇隴州人李鏡弋陽人孫需徳興人林符字朝信吳興人已上𢎞冶間任李贊字維城蕪湖人林廷選長樂人劉琬宜春人吳彥華字汝和南京衛人馬金王懋中字與時安福人方良永字夀卿莆田人王紹曺州人任鑑何天衢字道亨道州人張恩南城人已上正徳間任鄭毅許讚汪鋐潘塤山陽人潘旦字希周婺源人劉節字介夫大庾人毛思義胡璉見前顧璘字華玉上元人朱裳字公垂沙河人陳察崑山人黨以平任忠文明蔣淦全州人詹瀚玉山人歐陽必進字任先安福人梁廷振蕭一中華容人林雲同李黙字時言甌寜人張烜連鑛字伯金永年人姚文炤莆田人㳺居敬字行簡南平人潘恩上海人陳仕賢字䢴宸福清人陳珪化州人胡堯臣熊逵清江人劉望之内江人李磐見前蔡揚金已上嘉靖間任郭朝賓姚世熙郭斗已上隆慶間任謝鵬舉江一麟婺源人王應顯蒙詔勞堪徳化人朱卿長子人㳺季勲豊城人洪起睿吳用先王畿晉江人已上萬厯間任周延光馬從龍康新民合州人周維京晉江人吳光義涇縣人周鼎宜興人董承詔已上天啓間任莊祖誨曾道唯南海人楊𢎞備南昌人莫儼臯華亭人姚永濟上海人李佺臺南安人王庭誨華亭人洪思詔息縣人已上崇禎間任承宣布政司右布政使潘復周沈士溫臨淮人楊允陽信人王鐸傅復曹岱何真龍徳四川人李翀已上洪武間任張啓艾英隴川人周幹已上永樂間任方廷玉巴陵人楊瓚蠡縣人已上正統間任白圭南宫人景㤗間任謝輔撫州人柳春臨淮人已上天順間任張清巴縣人張瓚字宗器孝感人寗良祁陽人杜謙昌黎人劉鉞撫寜人李田閻鐸張敷華吳繹思莆田人已上成化間任雍㤗字世隆咸寜人王哲聞喜人張憲字廷式徳興人徐源周孟中字時可廬陵人韓鎬河南廬氏人林符畢亨山東新城人陶琰絳州人戈瑄字良玉景州人已上𢎞治間任李贊見前邵寳字國賢無錫人安惟學字行之臨汾人邊憲張勛完縣人夏景和長沙人吳彥華馬金蔣昇字誠之全州人胡經任鑑臨潁人湯沐字新之江隂人何天衢見前張天相太原衛人徐蕃㤗州人潘鐸已上正徳間任王藎孫祿棲霞人馬卿字敬臣南陵人許讚靈寳人汪鋐婺源人張芹字文林新淦人劉節見前毛思義陽信人王尚絅字錦夫郟縣人張原明儀封人任忠范輅桂陽人邵錫字天祐安州人劉儲秀咸寜人喻茂堅滎昌人歐陽必進字任夫廬陵人婁至徳字存仁項城人梁廷振南海人蕭一中謝蘭振武衛人林雲同李黙見前張烜興國人馬坤通州人汪大受字叔可婺源人李綸潁上人傅鎮固安人冦陽榆次人康朗惠安人吳桂芳字自湖新建人胡堯臣胡松字汝茂滁州人徐南金豊城人畢鏘石埭人蔡揚金新淦人孔天引字汝錫汾州人劉慤萬安人已上嘉靖間任凌雲翼太倉人郭朝賔莫如忠字子良華亭人朱綱曺縣人姚世熙舒城人郭斗封丘人謝鵬舉蒲圻人已上隆慶間任江一麟見前王應顯漳蒲人張任嘉定人蒙詔朱袗蘄水人滕伯輪甌寜人蔡汝賢華亭人洪啓睿南安人吳用先休寜人梁有年順徳人何如申婺源籍桐城人薛近兖武進人李思誠句容人已上萬歴間任周延光蘄水人談自省丹徒人馬從龍洛陽人康新民見前程寰歙縣人李守俊宜興人劉可法胡廷晏漳浦人董承詔武進人孫枝芳吳江人已上天啓間任張爾嘉青浦人胡維霖莊廷臣武進人顏欲章安福人莊祖誨成都人唐際盛莆田人王廷梅華亭人杜喬林華亭人姚永濟見前王象晉字子進山東新城人侯安國永城人林銘鼎莆田人顧燕詒太倉人已上崇禎間任承宣布政司左叅政王鐸山西人鞏貫道髙雋張伯崇陳信傅復辛彥博汾州人已上洪武間任張玘周琮張春黄勉浮梁人周鎬奉新人劉子春樊鎮戚遜江英已上永樂間任張珂建安人饒禮南城人李璽萊陽人熊本誠已上宣徳間任髙安永豊人正統間任葉宜南平人周琛崇陽人喻金閭已上景㤗間任謝黼陳述嘉定人黄譽莆田人羅鐘閬州人王敞霍邱人已上天順間任閻鐸興平人韓雍字永熙長洲人李田嘉魚人甘霖南豊人邢簡咸寜人王育㤗安州人已上成化間任王衡稷山人左贊南城人周季麟寜州人韓鎬吳文度歐信薊州人童瑞犍為人韓福伍符安福人已上𢎞治間任何顯闌縣人尚衡字一中同州人吳彥華句容人馬金西充人彭澤楊志學范鏞詹璽貴溪人周曽陽曲人鄭毅上饒人閔楷任丘人蔣曙顧璘見前已上正徳問任李珏開州人胡訓字誨之南昌人王汝梅華陽人洪珠字玊方莆田人王志善歷城人胡纘宗字世甫㤗安人萬潮進賢人王繼禮岐山人張岳惠安人盧蕙字子貞山陽人劉佐安福人孫應奎洛陽人胡仲謨蘄水人沈繼美保寜人王昺章丘人曺汴巴縣人潘恩上海人謝少南上元人汪柏浮梁人胡堯臣安居人谷中虚海豐人鄭茂莆田人秦梁薛天華晉江人張燈浮梁人已上嘉靖間任劉衍祚洛陽人李攀龍字于鱗歴城人王世貞字元美太倉人曽省吾彭澤人李淑象山人史朝宜晉江人宋炳如桂陽人舒應龍全州人張楚城江陵人已上隆慶間任吳用先李長庚麻城人陳邦瞻髙安人鄒希賢建安人朱應奎潼川州人叚猷顯商城人潘洙堵維垣