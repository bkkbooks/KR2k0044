body:
  text: 浙江通志卷二百二十五祠祀九溫州府永嘉縣附郭先農壇在永寧門外十都國朝雍正五年知縣羅秉禮奉文建立壇宇并置藉田四畝九分社稷壇萬厯溫州府志立於迎恩門外舊浙江通志永嘉縣附郭不别置葉適社稷壇記溫州之社稷昔者莫能詳矣嘉定四年守楊簡始加甓土上十年守鞏嶸伉其大門改造齋房築牆百五十堵二公知以義導其民矣古人必樹之木主各以其野之所宜木永嘉之木莫宜於豫章豫雷出地奮也章章之也皆甚美之名也數十百年其大百圍其崇干霄無敢不肅也然後知古之治其國者社稷之臣今之守其地者社稷之守風雲雷雨山川壇溫州府志立於永寧門外郡厲壇永嘉縣志在來福門外西山城隍廟溫州府志在府治西嵗以五月望日致祭永嘉縣城隍廟溫州府志在開元寺東舊在城南廂久圯附祀於府明萬厯甲戍邑令劉三宅改縣東倉故址為廟赤帝廟永嘉縣志在海壇山麓國朝康熙二十年知府王國泰建大禹王廟萬厯溫州府志在鎮海門外海壇山下永嘉縣志宋雍熙間建東甌王廟嘉靖浙江通志在華蓋山舊在海壇山成化間知縣文林徙今所王叔杲重修東甌王廟記按史王名搖姒姓騶氏越王句踐七世孫越滅於楚王自王東甌為秦所廢後從諸侯滅秦又從漢滅項籍至惠帝三年舉髙帝時粵功曰閩君搖功多其民便附乃立搖為東海王都東甌殁葬甌浦因立廟世稱永嘉地主昭烈廣澤王洪武初詔定為漢東甌王俾有司三月八日致祭廟新於萬厯八年庚辰余為之記梅調元謁東甌王廟詩大禹神明胄炎劉佐命功分封仍越土遺廟巋甌東寶扇開宮女雕梁拂彩虹千秋存帝制奏格儼然同朱彝尊東甌王廟詩九牧維揚外三江霸越餘入關從漢約遵海裂秦墟豪俊宜如此艱難氣不除策功夷項籍分壤接無諸迹異尊黃屋忠能奉簡書長沙堪伯仲百濮定何如萬古開王會孤城指帝車靈旗存髣佛過客盡欷歔殿瓦年頻坼霜林日漸疏躨跜山鬼立苔蘚石堂虛側想風雲會乘時草眛初逺塗今日暮下拜獨躊躇關帝廟舊浙江通志一在平定倉後一在迎恩門內一在譙樓東一在海壇山東橫山周公廟萬厯溫州府志在廣惠坊俗稱平水王廟嵗二月朔致祭宋濂橫山周公廟碑神諱凱字公武姓周氏世居臨海郡之橫陽臨海屬邑曰永寧曰安固曰橫陽地皆瀕海海水沸騰蛇龍雜居之民罹其毒神乃白於邑長隨其地形鑿壅塞而疏之遂使三江東注於海水性既順其土作又永康中三江逆流颶風挾怒潮為孽邑將陸沉民咸懼為魚神奮然曰吾將以身平之即援弓發矢大呼衝潮而入水忽裂開電光中見神乘白龍東去但聞海門有聲如雷而神莫知所在矣俄而水勢平江禍乃絶邑長思其功號其里曰平水且建祠尸祝之祠初在城之西郊及更永寧為永嘉郡郭璞相土遷之於西洋遐邇邀靈者無虛日神功益用赫著至於廟宇之建修皆郡守任其責可考見者自陳毛喜逮元尊達納實哩凡一十三人云郭記室祠萬厯溫州府志在郭公山下初晉郭璞卜城於溫立祠山下祀之塑白鹿銜花於側紀卜城時瑞也今移祀於鎮東塔王謝祠溫州府志在華蓋山下祀晉郡守王羲之南宋郡守謝靈運王叔杲王謝祠記吾甌山水郡右也古昔吏甌者多名賢晉為王軍南宋為謝康樂皆以治郡聞郡城之東里石墨池故有右軍祠建自前守文公林嘉靖甲午拔於颶風將新之衆以其址隘弗稱先參議相地於華蓋山之麓重構祠專祀右軍仍故也逮前守龔公秉德乃合祀康樂榜曰王謝祠兩賢治郡之績世逺雖莫詳而任敬序郡志嘗曰永嘉自東晉置郡以來為之守者若王羲之治尚慈惠謝靈運招士講書由是人知向學民風一變蓋並以循吏稱而聲迹流播泉曰墨池堂曰夢草坊曰康樂民至於今稱之合而祀之豈惟揚江左之英華於吾甌山水亦尚有耀哉梅調元王謝祠詩前守推王謝荒祠倚郡城千秋傳墨妙六代擅詩名沼古鵝還浴塘春草自生風流今古事俯仰一含情忠靖王廟永嘉縣志一在八仙樓巷元延祐間建一在華蓋山下明洪武初建宋濂溫忠靖王廟碑王姓溫氏名瓊字永清溫之平陽人父民望嘗中明經甲科年耄無嗣與妻張道輝晝夜籲於上帝一夕張夢巨神手擎火珠自天門飛下謂曰吾乃大火之精將降胎為人張覺赤光被體中猶熹熹然因有妊以唐長安二年五月五日午時生其左腋有震篆二十四右半之七嵗習禹步為罡十四通五經百氏及老釋家言二十六舉進士不第撫几歎曰吾生不能致君澤民死當為泰山神以除天下惡厲耳復制三十六神符授人曰持此能主地上鬼神言已忽幻藥又象屹立而亡蜀葉天師後用其符禜除沴氣之為人災者倣佛見王衣赭袍握寶劍乘追風駿下之劾召之家遂皆祠王以祈靈響焉王初封翊靈昭武將軍正祐侯其曰正福顯應威烈忠靖王則宋季之纍加也嘉靖三十四年燬三十七年重建嵗於五月五日致祭顔氏雙忠祠萬厯溫州府志在東北隅舊志慈湖瞿溪諸鄉皆有顔魯公祠嵗久圯明成化間邑令劉遜改東北隅永寧廟為公祠合恆山公祀焉裔孫顔涘復修蓋公後裔嘗居永嘉故祠於此龔將軍廟溫州府志在集雲廂唐刺史韋庸浚城南湖神時為部將督視遭仇甫之亂力戰溺死湖中郡人即其地立祠從祀翁蘇二將蓋同死事者馮魯公祠永嘉縣志在夾嶼公名守信滑州白馬縣人宋真宗時捍邉及治河有功纍進太師中書令追封魯國公其孫成為嶽飛裨將扈駕至溫遂居夾嶼因建祠焉四賢祠萬厯溫州府志在鹿城書院中祀程明道程伊川朱晦菴張南軒四先生旁列從祀諸賢徐寓劉安節陳埴劉安上葉賀孫鮑若雨周恭叔沈躬行許景衡陳經正陳經邦謝天申包定周端朝林武蔣叔蒙周僴黃顯子戴蒙曹叔逺錢木之沈僴蔡譽録林湜徐容潘旻戴述趙霄周去非葉味道張楊卿薛洪林補凡三十三人皆四先生髙弟也張忠惠侯廟明一統志在府城南嘉靖浙江通志侯名理宋宣和初睦寇至迎敵力戰橋陷與周承已婁淵潘守真丁仲修死之郡為立廟吳山以四人配明𢎞治間知縣汪循徙瑞安門內忠烈廟萬厯溫州府志在簡訟坊祀宋教授劉士英諸生石礪學掾盧璿初建於宋郡守王定重建於元邑令王安貞林景熙忠烈廟記宣和間睦寇猖獗蕩搖我境教授霅川劉公士英與館下生石礪慷慨守禦行保伍法出竒計數挫賊鋒全城以還天子上賞功劉通守太原會金人犯城死於力戰石辭祿不居以布衣終賜廟固宜嵗久榱桷毁圯奉神像遷於學大德丙午八月庚申廟成乃迎以歸豫因邦人之請為記以夀於石謹按盧璿係學掾亦同時禦敵者忠訓廟明一統志在府城西三十里宋宣和中郡人徐震率義兵禦寇死於難事聞贈忠訓郎郡人為之立廟葉文定祠永嘉縣志在金鑿石巷祀宋學士葉適久圯國朝康熙九年知縣陳聖俞重建陳潛室祠嘉靖浙江通志在城西門外宋陳埴與其兄增弟止先後舉進士郡舊立森桂祠成化十六年知縣劉遜以埴從學朱子所著述多道德之蘊而不以科第為榮改今額文丞相祠江心寺志在沙門左祀宋右丞相文天祥以台郡少卿杜滸永嘉正將徐臻配趙寬重修文丞相祠記公脫身京口至於永嘉宿江心寺有詩成化中縣令文林劉遜相繼訪公遺迹刻公詩於石立祠祀公𢎞治十三年庚申寬與同官林君偕來溫祗謁公顧視祠宇庳隘弗稱林君曰是余責也郡守鄧侯進曰淮嘗擇諸僧寮得其地矣往觀之在寺之北陲倚巖臨流崇深虛明衆皆喜材用既儲工役聿興林君為之區畫而郡守躬經營之祠遂以成因考諸從公之士宜祀者得二人焉曰司農卿杜滸公脫鎮江滸之力公至永嘉滸實從又嘗以佐府招集兵財來台溫焉曰正將徐臻溫人也以筆札典軍府機密小心精練從公北行備殫忠欵既又得公之孫一人焉曰富在前元時嘗守溫冇惠政遂以三賢配享於公黃文簡祠溫州府志在幞頭河祀明大學士黃淮祠為公故宅表忠祠萬厯溫州府志在迎恩門內祀郡二守贈參議黃釧嘉靖三十一年禦倭陳亡嵗春秋致祭萬厯己亥郡守林繼衡重修褒忠祠萬厯溫州府志一在瑞安門內祀都指揮夏光嘉靖三十一年禦倭於王江涇死之一在興文街祀贈太僕寺寺丞王沛嘉靖三十七年禦倭陳亡旌忠祠永嘉縣志在三港廟左祀明指揮祁嵩嘉靖三十七年禦倭陳亡愍忠祠永嘉縣志在康樂坊祀明僉事王德嘉靖三十七年禦倭陳亡龎公祠萬厯溫州府志在巽吉山下祀明巡按御史龎尚鵬王諍龎公祠記溫州城南三里許孤髙而特秀者巽山也山之西有祠翬然有像偉然而爼豆於其間者侍御龎公也祠之左右髙揭而大書者公之奏例也公名尚鵬字少南廣東南海人按兩浙在嘉靖四十四年初兩浙徴解起存錢糧業有成規惟所謂里長雜辦者端緒最多下莫周知吏胥乘以生姦小民困於供億公奉命按浙深燭夙弊亟思釐正之與諸司往復參酌必求其當畝有定賦徴有定期官無橫斂民無白著名曰均平他如革庫子之供役而令該吏輪掌免斗級之守支而令新役交代省館夫之支應而令驛夫領辦懲有司之科斂而貪墨不得加派禁鋪行之需索而公私不得抑買吾溫自昔至今百姓兆民莫不舉手加額頌公功德萬厯三年春永嘉耆民蔡箎等請建公祠有司以此為義舉也相與共成之雙忠祠在府城內大街國朝康熙十三年溫處道陳丹赤永嘉縣知縣馬琾殉閩逆之難三十五年浙江巡撫線一信題請建祠崇祀奉旨允行御書雙忠扁額傳詳名宦忠義節孝祠二祠俱在縣學東偏國朝雍正四年知縣羅秉禮奉文建樂清縣先農壇在新城東門外一都國朝雍正五年知縣唐傳鉎奉文建立壇宇并置藉田四畝九分社稷壇萬厯溫州府志在縣西北白鶴寺左風雲雷雨山川壇溫州府志在縣西隅簫臺山趾邑厲壇樂清縣志在東隅石塘嶴城隍廟樂清縣志舊在縣治東北明知縣張具瞻移建於西隅仙隱坊萬厯溫州府志萬厯乙未令張子埕撥義倉田十畝供祭事龍湫慈濟廟雁蕩志在雁蕩山西谷忠烈侯廟溫州府志在館頭神曰田居邰唐乾符間王郢之亂僖宗詔十道兵討之田奉命行至象浦猝遇寇力戰死邦人哀其義烈為祠祀之浙東觀察使劉漢宏表其事贈中丞大順二年贈右驍衛將軍宋皇祐四年新其廟建炎四年又新之明洪武初詔稱唐右驍衛將軍田公之神樂清縣志神兖州人與賊戰時以子規早啼兵誤遂敗自後近山無子規啼者鮑原𢎞謁廟詩橫春渡頭象浦西將軍戰死鼓聲低只今恨殺子規烏飛過空山不敢啼國朝康熙十年重建王忠文祠萬厯溫州府志在九牛山下嘉靖間改東嶽廟祀宋學士王十朋以朱文簡配享後圯萬厯間兵巡道吳自新檄令黃仁榮改建按察司廢址去舊址數十步何鏜王忠文祠記往余東遊鴈蕩山過長徼原望梅溪先生故里不一舍而近聞有祠在邑中冀一瞻拜乃至西臯尋問其祠業圮廢矣乃遡流西歸惆然者久之嵗戊寅兵巡道祁門吳公移鎮甌郡檄縣重建先生専祠以風後人明年夏祠成先生祠祀自宋乾道中奉敕建祠於郭路里地劉忠肅公請賜祭田後且湮廢者數百年至嘉靖初冢宰朴溪潘公令樂改建先生專祠給田編徭役稱備典矣踰三十年以築城閡格而毁隆慶間侍御湛臺胡公為令遷建三官廟址不數年又圮今改創城東為楹若云干儀品咸秩蓋三徙而康先生之靈為永永禋祀三賢祠嘉靖浙江通志在縣治南祀宋龍圖閣學士王十朋及錢堯卿賈如規慶元六年建葉適有記旌忠廟嘉靖浙江通志在瑞應鄉祀宋侯畐初畐以武舉纍官通判海州李松夀之亂闔門死之寶祐五年詔祀於其鄉賜廟額章恭毅祠溫州府志在東臯山下祀明尚書章