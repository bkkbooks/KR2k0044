正五年知縣楊國琦奉文建遂昌縣先農壇在東門外雙溪橋頭國朝雍正六年知縣許鼎奉文建立壇宇并置藉田四畝九分社稷壇遂昌縣志在朝天門外一里風雲雷雨山川壇括蒼彚紀在縣南一里邑厲壇崇禎處州府志在縣北一里城隍廟遂昌縣志在邑東迎恩門內明洪武間建嘉靖二十八年知縣洪先志重建兩廊隆慶元年知縣池浴德修萬厯十九年知縣萬邦獻重建國朝康熙四十二年知縣蘇嵏重建溥濟廟舊遂昌縣志在邑北二十里即三井龍湫祠自宋以來禱雨響應紹興己未賜額屢著靈異葉天師廟崇禎處州府志在縣東五十里牛頭山縣南及東泉三都鄭村俱有遂昌縣志祀葉法善真人鄉人稱為天師凡遇災旱祈禱輒應華使君廟遂昌縣志在邑東十餘里神名造唐景福間處州刺史死於賊鄉人立廟祀之吳僕射廟崇禎處州府志在大柘溪東神名珂唐末為保義鎮遏使黃巢犯京師四方雲擾羣盜蝟興盧約陷處州董昌攻越珂集義勇積糧糗守禦一方以功拜檢校工部尚書既沒為神祈禱即應張翼吳僕射廟詩沉沙鐵戟皆銷歇愚智猶瞻僕射祠欲識精英千載色石屏雲斷葉殘時尹堯庵先生祠崇禎處州府志在儒學東萬厯初提學道蘇濬建祠祀宋儒尹起莘湯段二公祠遂昌縣志在報願寺東國朝康熙五十一年建祀知縣湯顯祖段𢎞璧繆之弼重建顯祖湯公祠記臨川湯若士先生萬厯間成進士由博士轉祠部郎以言謫尉旋遷令故平昌得有先生之迹先生之文其精瑩足以華國先生之學其綜該足以經世而屈以百里之寄置於萬山之麓且使之鬱鬱久居兹土其所遇異乎不異乎乃先生獨不以此介懷治績日懋暇則與士君子課文較射優遊自適復何容心於當年之華膴與後世之思慕耶獨是余與先生生同鄉志同道官同方未獲親承下風然幸去先生之世僅百有餘嵗況遂人士在今日心焉繫之口能道之惜當日所構之射堂付之蔓草秖得瞻拜其肖像於義學中其祠也亦寄焉而已然則庀材鳩工用妥厥靈非余之責而誰責與金壇段公𢎞璧踵先生後而至者其治績政聲大都與先生相頡頏原有祠寖久而廢今合而祠之於是乎記忠義節孝祠忠義祠在學宮前節孝祠在縣城之西街國朝雍正五年知縣許鼎奉文建龍泉縣先農壇在東郊十九都九姑山下國朝雍正五年知縣孟耀奉文建立壇宇并置藉田四畝九分社稷壇括蒼彚紀在縣西四百步風雲雷雨山川壇龍泉縣志在縣南四百步邑厲壇崇禎處州府志去縣北一里許城隍廟括蒼彚紀在縣西五百步歐冶子廟明一統志在縣治南劍池湖前相傳歐冶子嘗鑄劍於此昭應廟崇禎處州府志在延慶鄉查田市神姓蔣名超兄弟三人宋宣和間方臘犯州境大顯靈異境賴以安王先生祠嘉靖浙江通志在縣西五十里扁曰旌賢王禕旌賢祠記先生諱毅字剛叔别以木訥自號夙負異秉篤志於學早從上饒鄭君原善遊而聞聖賢求仁之方及登金華文懿公之門得理一分殊之旨所學粹然一出於正教授里中户外之屨至無所容至正甲午盜起旁縣先生領鄉兵往禦之里井恃以為安夫何遺孽未殄者隂設狡謀而先生遇害先生殁門人胡君深既勒兵討賊申復讐之大義而章君溢等復即先生所居蓋竹里為祠以祀之則禮以義起者也祠之建在戊戌嵗居室規制完飭具美且合財置田用其入為嵗時享祭之需焉忠賢祠嘉靖浙江通志在縣南二里明宣德四年建祀行省參政胡深御史中丞章溢華公祠龍泉縣志在縣東崇因寺下祀明知縣華廷詔殁於任士民懷德立像春秋祀之傳詳名宦忠義節孝祠忠義祠在學宮內西偏節孝祠在鼓樓前國朝雍正五年知縣孟耀奉文建慶元縣先農壇在東門外國朝雍正五年知縣徐羲麟奉文建立壇宇并置藉田四畝九分社稷壇括蒼彚紀在縣雲龍門外半里風雲雷雨山川壇括蒼彚紀在縣濟川門外一里邑厲壇崇禎處州府志在仁豐門外城隍廟慶元縣志在豐山門外儒學右明洪武十四年知縣董大本建萬厯三年知縣沈維龍重修國朝康熙元年知縣髙嶙改建三官廟慶元縣志在石龍山明天啓間知縣樊鑑建順濟行祠崇禎處州府志在四都慶元縣志今在西門內祀順濟夫人國朝康熙四年邑人季烺周亶明季烘重修季烘順濟行祠記順濟夫人閩古田陳氏女也行十四生於李唐之大厯精巫咸術活人最多沒更靈異祀之臨水至宋封為順懿夫人不獨八閩之人祀之即吾浙之窮鄉僻塢莫不崇奉而余城西之行祠髙敞獨為羣廟冠自辟邑來凡疾疫或作雨㿩或愆無不於夫人是禱禱則未嘗不應祠創自何年不得而考詢之故老亦鮮有能言者僅傳以為重修於萬厯之二十七年則其祀之久可知己康熙乙巳秋鳩工庀材以始其事丙午七月告成白將軍廟慶元縣志在九都竹口神姓白為錢鏐將閩越王僣號白將兵討之開此地死後常有白氣出沒土人立廟祀之忠義節孝祠忠義祠在東關外明倫堂側節孝祠在東關外文昌祠側國朝雍正五年知縣徐羲麟奉文建雲和縣先農壇在坊都一啚國朝雍正六年知縣孫廷楷奉文建立壇宇并置藉田四畝九分社稷壇括蒼彚紀在縣西一里許風雲雷雨山川壇括蒼彚紀在縣南一里許邑厲壇雲和縣志在縣東一里城隍廟雲和縣志在縣西一里嵗久將頽國朝康熙二十八年知縣林汪逺重修福勝侯廟崇禎處州府志在黃溪坪禦災捍患屢有靈驗顧侯祠括蒼彚紀在縣東南祀明知縣顧立李東陽顧侯祠記𢎞治庚戌冬處州雲和民走告於府曰吾邑故侯顧姓者有功於民四十年矣吾父老屢欲建祠祀之而地小力綿又多歉嵗弗能集事今官府無事而嵗適告登思有以畢吾志時雲和丞王言方在謁知府傅公鼐諭之曰此義舉也汝其為民倡之丞歸以告知縣諶宜紳奉諾惟勤乃率僚屬捐資相地於縣治之東南為堂三間髙丈有八尺深略稱廣倍之題主其中繪事迹於左右壁令民以時祭祀侯諱立字成夫蘇州常熟人景泰庚午處州賊起都御史軒公輗置侯幕下既平時雲和新置乃以屬侯至則摧強扶弱構廨建學置驛傳立壇壝百務咸備東有雲壇山險阻民病樵採侯刋木剃草闢為夷途民甚利之都御史韓公雍巡撫江西以其可領府事與守臣交章薦上適侯入覲命下而卒嗟夫仕者之譽或可釣而得惟民不容偽縱或偶獲焉至去而思死而哀為之祠以衆著不忘則斷斷乎非可偽為也後之官兹土蒞斯民者稽事考迹惟力之弗繼是懼則侯之祠利於人大矣去思祠崇禎處州府志在縣東賓陽門內為知縣陳思順立傳詳名宦忠義節孝祠忠義祠在學宮內東偏節孝祠在學宮外縣治側國朝雍正正五年知縣孫廷楷奉文建宣平縣先農壇在學宮外東偏國朝雍正六年知縣孫烔奉文建立壇宇并置藉田四畝九分社稷壇括蒼彚紀在縣西二里許風雲雷雨山川壇括蒼彚紀在縣西二里許邑厲壇崇禎處州府志在縣北門外二里許城隍廟括蒼彚紀在迎恩門外三真君祠明一統志在宣平縣西一十五里名勝志宣平榲樣山之中峰有三真君祠相傳周厲王時諫臣唐宏葛雍周武也諫王不聽奔此後殁為神血食於此靈顯章侯廟崇禎處州府志在縣東南六十里侯諱承趨唐中和間黃巢亂鄉民推為部領捍禦有功沒而為神宋淳祐六年封仁烈侯妻呂氏封助順夫人四壻丁鄂王修蔡禋鮑麃配食報德祠舊浙江通志在縣總鋪東祀明縣丞徐黼黃中報德祠記贈少傅思復徐公以𢎞治辛酉自華亭來丞括之宣平滿九載又移丞江西之寧都迄今六十年矣宣之父老猶能道其德政如昨日事嘉靖丙辰電白任君良翰令兹邑三年政成諸父老以徐公祠白之遂相地得徐公舊宅之南鳩工運木以某月日經始焉諸父老樂報典之有緒而子來恐後不數月落成榜之曰報德考正德間葉宗留據險稱亂東南驛騷踰年礦賊復嘯聚莫敢誰何時公視邑篆單騎入賊壘曉諭禍福數千人咸感拜且曰敢不惟命四方遂以寧謐昔稱銷兵潢池賣劍買犢真不是過也忠義節孝祠忠義祠在學宮內東偏節孝祠在縣前坊國朝雍正五年知縣于樹範奉文建景寧縣先農壇在縣北八里油田地方國朝雍正四年知縣髙棠萼奉文建立壇宇并置藉田四畝九分社稷壇栝蒼彚紀在縣北八十步風雲雷雨山川壇崇禎處州府志在縣西南一里邑厲壇景寧縣志在縣北六十餘步城隍廟括蒼彚紀在縣北四十步明景泰三年立嘉靖八年知縣程達重建隆慶壬申知縣陳嚴之重修護國馬夫人廟崇禎處州府志在柔逺鄉鸕鷀村名勝志鸕鷀灘馬孝婦故居也家貧養姑甚孝既殁後人立廟於其鄉李陽冰護國馬夫人廟記護國夫人馬氏括蒼下邑鸕鷀灘人也灘出鶴溪源深水紆山髙路阻猿猱紛紛虎狼相尾自仙居之異獸屏蹤仙迹既往而井存焉肅宗上元間連嵗苦旱郡守太子率更令司馬公遣吏與二老抵祠所致享禮吏未旋踵合境告足公異之乃復命二老至黃堂問仙姑始終出處之迹二老曰某兒時聞諸故老云仙家貧事姑孝工䌟纑機杼事以致養其家距鶴溪百餘里晨往夕返以羮與姑如始出釜甑然水潦泛溢船斷槳摧輒倒持其傘以自載望之隱隱若雲霧間人莫有知者後莫識其所往忽里人見之井所自言名在仙籍鄰邦令為我祠我其福汝由是里人共立祠以祭之於時鄉人為戎卒者事仙益謹遂立邉功得美官以隂府助國疏神善告諸當路者聞於朝乃賜命護國夫人陽冰時為縉雲令并記之以示不朽因為之歌曰鸕山蒼蒼鸕水茫茫隂府助國兮於時彰彰福我鄰邦兮民斯永康仙兮仙兮與日月而齊光潘公祠景寧縣志在舊縣治西祀宋長興主簿潘應芾暨子總管潘仲龍千户潘季龍雲和元和兩鄉巡檢權知慶元縣事潘荀龍春秋仲戊日致祭忠義節孝祠忠義祠在學宮明倫堂右節孝祠在花田坪國朝雍正六年知縣陳誠奉文建浙江通志卷二百二十五
