body:
  text: 浙江通志卷六十二海塘一全浙列郡十有一惟杭嘉寧紹台溫瀕海有塘以禦潮汐然衝決不時自唐迄明歴事興築皇朝因時制宜歲修搶修經畫盡善兹復特命大臣察勘綜理發給重帑興建鉅工以爲萬世永賴東南兆庶咸熙熙慶登袵席矣志海塘海潮總論咸淳臨安志浙江之水每日晝夜潮再上常以月十日二十五日最小月三日十七日最大小則水漸漲不過數尺大則濤山浪屋雷擊霆砰有吞天沃日之勢吳越春秋夫差内傳載吳王賜伍子胥死乃取其屍盛以鴟夷之革浮之江中子胥因隨流揚波依潮來往蕩激隄岸又越王外傳越王賜大夫種死葬於西山之下一年伍子胥從海上穿山脅而持種去與之俱浮於海故前潮來審候者伍子胥也後重水者大夫種也其說荒誕無稽諸家所論惟姚寛西溪殘語及徐叔明傳髙麗録有可載者西溪云舊於會稽得一石碑論海潮依附隂陽時刻極有理疑是國初燕肅所爲云觀古今諸家海潮之說多矣或謂天河激湧葛洪亦云地機翕張洞真正一經盧肇以日激水而潮生封演云月周天而潮應挺空入漢山涌而濤隨施師謂僧隱之之言析木大梁月行而水大竇叔䝉濤志源殊派異無所適從索隱探微宜伸確論大率元氣嘘吸天隨氣而漲斂溟渤往來潮隨天而進退者也以日者重陽之母隂生於陽故潮附之於日也月者太隂之精水者隂屬故潮依之於月也是故隨日而應月依隂而附陽盈於朔望消於朏魄隨於上下弦息於脁朒故潮有大小焉今起月朔夜半子時潮平於地之子位四刻一十六分半月離於日在地之辰次日移三刻七十二分對月到之位以日臨之次潮必應之過月望復東行潮附日而又西應之至後朔子時四刻一十六分半日月潮水亦俱復會於子位於是知潮當附日而左旋以月臨子午潮必平矣月至卯酉汐必盡矣或遲速消息又小異而進退盈虛終不失於時期或問四海潮平來皆有漸唯浙江濤至則亘如山嶽奮如雷霆氷岸横飛雪崖傍射澎騰奮激其故何也或曰夾岸有山南曰龕北曰赭謂之海門岸狹勢逼涌而為濤盧肇潮論所謂夾羣山而逺入射一帶以中投者是也若言狹逼則東溟自定海吞餘姚奉化二江侔之浙江尤甚狹逼潮來不聞濤有聲也今觀浙江之口起自纂風亭屬會稽北望嘉興大山水濶二百餘里故海商舶船怖於上潬惟泛餘姚小江易舟而浮運河達於杭越葢以下有沙潬南北亘之隔礙洪波蹙遏潮勢夫月離震兑他潮已生惟浙江潮水未至洎月經乾巽潮來已半濁浪推滯後水益來於是溢於沙潬猛怒頓涌聲勢激射故起而爲濤耳非江山淺逼使之然也高麗録云潮汐往來應期不爽爲天地之至信古人嘗論之在山海經以爲海鰍出入之度浮屠書以爲神龍之變化竇叔䝉海嶠志以爲水隨月之盈虧盧肇海潮賦以爲日出於海衝擊而成王充論衡以爲水者地之血脉隨氣進退率未之盡大抵天包水水承天而一元之氣升降於太虚之中地乘水力以自持且與元氣升降互爲抑揚而人不覺亦猶坐於船中而不知船之自運也方其氣升而地沈則海水溢上而爲潮及其氣降而地浮則海水縮而爲汐計日十二辰由子至巳其氣爲陽而陽之氣又自有升降以運乎晝由午至亥其氣爲隂而隂之氣又自有升降以運乎夜一晝一夜合隂陽之氣凡再升再降故一日之間潮汐皆再焉然晝夜之晷繫乎日升降之數應乎月日臨於子則陽氣始升月臨於午則隂氣始升故夜潮之期日皆臨子晝潮之期月皆臨午焉又日行遲月行速以速應遲每至二十九度過半而月行及之日月之會謂之合朔故月朔之夜潮日亦臨子月朔之晝潮日亦臨午焉且以晝即天上而言之天體西轉日月東行自朔而往月速漸東至於漸遲而潮亦應之以遲於晝故晝潮自朔後迭差而入於夜此所以一日午時二日午末三日未時四日未末五日申時六日申末七日酉時八日酉末也至夜即海下而言之天體東轉日月西行自朔而往月速漸西至於漸遲而潮亦應之以遲於夜故夜潮自朔後迭復而入於晝此所以一日子時二日子末三日丑時四日丑末五日寅時六日寅末七日卯時八日卯末加以時有交變氣有盛衰而潮之所至亦因之爲大小當卯酉之月則隂陽之交也氣以交而盛故潮之大也獨異於餘月當朔望之後則天地之變也氣以變而盛故潮之大也獨異於餘日今海中有魚獸殺取皮而乾之至潮時則毛皆起豈非氣感而𩔖應之自然歟潮候春秋同初一十六午末大夜子正初二十七未初大夜子末初三十八未正大夜丑初初四十九未末大夜丑末初五二十申正下岸夜寅初初六二十一寅末漸大晚申末初七二十二卯初漸小晚酉初初八二十三卯末漸小晚酉正初九二十四辰初小晚酉末初十二十五辰末交澤晚戌正十一二十六巳初起水夜戌末十二二十七巳正漸大夜亥初十三二十八巳末漸大夜亥正十四二十九午初漸大夜亥末十五三十午正極大夜子初夏月初一十六午末大夜子正初二十七未初大夜子末初三十八未正大夜丑初初四十九未末大夜丑正初五二十申初下岸夜丑末初六二十一寅初小晚申正初七二十二寅末小晚申末初八二十三卯初小晚酉初初九二十四卯末小晚酉正初十二十五辰初交澤晚酉末十一二十六辰末起水夜戌初十二二十七巳初漸大夜戌末十三二十八巳末漸大夜亥初十四二十九午初漸大夜亥末十五三十午末大夜子初冬月初一十六午末大夜子初初二十七未正大夜子末初三十八未末大夜丑初初四十九申初大夜丑末初五二十申正下岸夜寅初初六二十一寅末漸小晚申末初七二十二卯初小晚酉初初八二十三卯末小晚酉正初九二十四辰初小晚酉末初十二十五辰末交澤夜戌初十一二十六巳初起水夜戌正十二二十七巳正漸大夜戌末十三二十八巳末漸大夜亥初十四二十九午初漸大夜亥正十五三十午正漸大夜亥末朱中有潮賾或問燕龍圖潮論是耶非乎答曰試與子於一溝之内觀之引水滿溝則其水必平進於溝之半累碎石而為齟齬從上流傾水勢必經齟齬而斗瀉於下水之激湧無怪也燕公所謂潬者水中沙也錢塘海門之潬亘二百里夫水盈科而後進潮水未及潬則錢塘之江尚空空也及既長而冒之自潬斗瀉入江又江沙之漲或東或西無常地潮為沙岸所排助其激湧震天動地峩峩而來水之理也曷足怪乎愚所謂齟齬者猶之潬耳故錢塘潮候率遲於定海者定海平進而錢塘必俟登潬而後至於江其初來也從浙江亭望之僅若一線非潮小也目力逺所見微耳漸近則漸大非潮大也所見漸近則漸大固宜及夫潮退則或由潬中低處或從潬兩尾滔滔以至於海葢潬中高而兩頭漸低高處適當錢塘之衝其東稍低處乃當錢清曹娥二江所入之口錢清江口潬最低潮頭甚小曹娥江口潬稍高於錢清故潮頭差大是說也習於海道者莫不知之或又問子之説何如答曰欲知潮之為物必先識天地之間有元氣有隂陽元氣猶太極也絪緼两間希微而不可見陰與陽則生乎元氣者也本之而生亦能為之病焉何者為病常𤾉常雨是也當陰陽二氣之極則元氣不能勝又問答曰夫水天地之血也元氣有升降氣之升降血亦隨之故一日之間潮汛再至一月之間為大汛者亦再一歲之間為大汛者二十四元氣一歲間升降為節氣者亦二十四潮二十四汛隨之此不易之理也又問答曰察於吾身而知之一身之中有元氣有陰陽元氣盖所受以生者既生矣則血為榮氣為衛血為陰氣為陽周一身而不可見者元氣之運周流乎脉絡而血乃隨之一日之潮凡再進退一身之血隨氣而進晝夜未嘗息也攷之素問難經脉候人一日一夜凡一萬三千五百息脉行五十度為一周漏水下百刻榮衛行陽二十五度行陰亦二十五度故五十度復會於太陰寸口人氣一晝夜之間行陰行陽各二十五度潮一晝夜隨元氣升降者審矣又問荅曰元氣一晝夜小升降故一日之間潮凡再至一月之間大升降故十五日而易一節以律管候氣驗之管之長短不同某氣至某管應元氣升降有大小審矣天地之數竒而不齊者也故月有小盡大盡歲有一閏再閏潮之為大汛也随大小盡與閏亦未嘗差焉騐潮之大小莫若錢塘與西興也雖以朔望為大汛之候然晦前二三日望前一二日潮盖有登閘者或朔日二日三日四日不登閘至五日始大或自十五至二十不登閘至二十一而始大西興之閘稍低於錢塘或至二十三日潮亦登此無他節氣參差不齊則潮亦為之進退如前所云或攙前或落後其大概固如是也又問曰或有非時而潮忽大當汛而潮忽小者何也荅曰愚測之審矣非朔望正汛而大或當汛而反小盖適遇巨風之順則推之而來後浪擁前故忽大而且乆不退風逆則抑之而退前浪遏後故驟小而且乆不進耳又問曰今夏之日晝潮小夜潮大冬之日晝潮大夜潮小俗所謂潮畏熱畏寒是耶非乎荅曰潮畏熱畏寒雖出俗説實確論也陰陽生乎元氣至其極也元氣有不勝焉夏為極陽日昱乎晝陽氣特甚元氣雖升而為至陽所迫氣不得伸故潮亦不得而遂格之於物以火㸑鼎水半於鼎火氣既升水從而湧此元氣升而潮進之象也於鼎之上置鐡炙床熾炭其上則湧水為火所㶸而復下此潮當進而元氣為至陽所迫而不遂也冬為極隂日既西沒隂氣特甚元氣為至陰所薄而潮不遂正與夏同亦猶鼎水方湧以疎箔覆鼎置巨冰其上冰氣嚴沍湧水復下均一理耳畏熱畏寒俗説是矣又曰敢問夏夜冬晝潮能大者何也答曰夏晝陽極元氣為陽所勝冬夜陰極元氣為陰所勝故潮小夏夜日既沒陽氣少衰冬晝日既出陰氣稍斂元氣得伸故潮得遂而稍大此甚易見騐之於身夏之日陽特盛榮血得行故面與身多紅而澤氣則喘促咽塞呵之而無所覩氣陽也為至陽所勝故不能自伸猶潮之畏熱而小也日既入陽漸殺人氣少舒猶潮至夏夜而能大也冬之夜陰特盛榮血消縮故指面皺而肌革燥人呵氣則油然而出皆可以見血隂也為至陰所勝其不能伸猶潮之畏寒而小也日既出人血少舒猶潮之至冬晝而能大者皆一理耳又問曰夏晝潮當小而能大夜當大而反小冬晝潮當大而反小夜當小而反大何也荅曰此乃陰陽之氣錯繆顛倒夏當南風以陽方助至陽故元氣為至陽所迫而潮小或者北風起以陰方氣從所勝而來陽為之辟易故潮遂能稍大夏夜潮宜大也乃與晝日同其㣲者三伏中或陽氣酷烈融而不收陰不足以禦之故潮亦從而小冬或冰雪不解固陰沍寒故晝日宜大而反小冬夜宜小而反大者冬當北風以陰方助至陰元氣為至陰所薄而潮小或者風從南至以陽方氣從所勝而來陰為之辟易故潮亦能稍大此乃陰陽之變元氣之病耳又問曰元氣升降四時則均八月潮特大何也荅曰何獨八月二月之潮亦甚大也何者極陰極陽故冬之潮有小有大二月八月朔望前後隂陽之氣適中元氣得伸潮得遂其大也固宜歴代興建杭州府錢塘仁和海寧唐書地理志鹽官有捍海塘隄長二百二十四里開元元年重築兩浙鹽法志重築云者知不始於開元間也然始築無考咸淳臨安志江挾海潮為杭人患其來已乆白樂天刺郡日嘗為文禱於江神然人力未及施也至梁開平四年八月錢武肅王始築捍江塘在候潮通江門之外潮水晝夜衝激版築不就因命强弩數百以射潮頭又致禱於胥山祠仍為詩一章函鑰置海門山既而潮水避錢塘東擊西陵遂造竹絡積巨石植以大木隄岸既成乆之乃為城邑聚落凡今之平陸皆昔時江也宋史河渠志淛江通大海日受兩潮梁開平中錢武肅王始築捍海塘在候潮門外堤㟁既固民居乃奠逮宋大中祥符五年杭州言浙江潮擊西北岸益壊稍逼州城居民危之即遣使者同知杭州戚綸轉運使陳堯佐畫防捍之䇿綸等因率兵力籍梢楗以䕶其衝七年綸等既罷去發運使李溥内供奉官盧守懃經度以為非便請復用錢氏舊法實石於竹籠倚疊為㟁固以樁木環亘可七里斬材役工凡數萬踰年乃成而鈎末壁立以捍潮勢雖湍湧數丈不能為害至景祐中以淛江石塘積乆不治人患墊溺工部郎中張夏出使因置捍江兵士五指揮專採石脩塘隨損隨治衆賴以安邦人為之立祠朝廷嘉功封寧江侯宋史俞獻卿傳獻卿以諫議大夫集賢殿學士知杭州暴風江潮溢决隄大發卒鑿西山作隄數十里民以為便萬厯杭州府志景祐三年築奉詔褒諭咸淳臨安志慶厯初夏六月大風驅潮隄再壊郡守楊偕轉運使田瑜協力築隄二千二百丈丁寳臣石堤記江介吴越間杭據其右而地勢下生聚數十萬廬舍隠粼號天下最盛而歲苦海潮為患於夏秋尤暴常與堤平城中望堤不百數步其勢反在髙仰處不幸潮壅而潰其猶决山而注於井沛然可禦哉故其病於民也數矣初景祐中轉運使張公伯起善為捍禦之䇿謂故隄率薪土雜治不一二嵗輒壊雖勤繕構卒不足恃而重勞吾民乃作石隄袤一十二里民賴以安後七年夏六月大風驅潮晝夜不落勢益湍怒隄之土石齧去殆半時知府翰林楊公偕轉運使田公瑜急議構築條上方畧約工四十萬計及籍吏之可使者以驛聞詔以隄事付兼命通判屯田錢君尚余君貫兵馬都監閤門祗候杜君正平分董其役發江淮南二浙福建之兵調十縣丁壯合五千人輦石於山畚土於丘持鍤節杵之役相屬於數十里之外方苦盛寒無一告勞者是嵗冬十二月新隄成用人之力三十萬減元調度一十萬費又乗其羡贏益蓄䕶治之備隄長二千二百丈崇五仞廣四丈自龍山距官浦二千丈修舊而成增石五版為三十級自御香亭下創為二百丈石堅土厚相為膠固閷上而方下外彊而内寳形勢遂安可恃而無恐矣最堅悍激處更為竹絡實以小石布其下及圎折其㟁勢務以分殺水怒大率究前之謀所未盡者益以新意而為之也是隄也由伯起開厥初二公克厥終合而成績以為萬世利後之為政者其念前人之勤俾勿壊則斯民無窮之賜也春秋之義有濟於民者志之某預見本末不敢無紀云宋史河渠志政和二年兵部尚書張閣言臣昨守杭州聞錢塘江自元豐六年泛溢之後潮汛往來率無寧歲而比年水勢稍改自海門過赭山即回薄巖門白石一帶北岸壊民田及鹽亭監地東西三十餘里南北二十餘里江東距仁和監止及三里北趨赤㟁􅝕口二十里運河正出臨平下塘西入蘇秀若失障禦恐他日數十里膏腴平陸皆潰於江下塘田廬莫能自保運河中絶有害漕運詔亟修築之六年知杭州李偃言湯村巖門白石等處並錢塘江通大海口受兩潮漸至侵齧乞依六和寺㟁用石砌疊乃命劉既濟修治泊宅編政和丙申歲杭州湯村海溢壊居民田廬凡數十里朝廷降鐡符十道以鎮之壬寅嵗鹽官縣亦溢縣南至海四十里而水之所齧去邑聚纔數里邑人甚恐十一月鐡符又至其數如湯村每一符重百觔正面鐡神符及御書咒貯以青木匣府遣曹官同都道正管押下縣縣建道塲設醮投之海中咸淳臨安志紹興十年以兩浙轉運副使張滙之請招填捍江軍額二十二年吏部尚書林大鼐建言乞選擇諳曉之士專置一司詢故老究利病脈絡而後興工且言羅刹江濱舊傳有三浮圖唐末神僧剏以鎮潮脉名六和塔積年不修又吳山英烈王廟燼於回禄乞靈無地乞付有司營葺從之自是百餘年間屢修屢壊宋史河渠志紹興末以錢塘石㟁毁裂潮水漂漲民不安居令轉運司同臨安府修築孝宗乾道九年錢塘廟子灣一帶石岸復毁於怒潮詔令臨安府築填江岸增砌石塘淳熈改元復令有司自今江㟁衝損以乾道修治為法嘉定十二年臣僚言鹽官去海三十餘里舊無海患縣以鹽竈頗盛課利易登去歲海水泛漲湍激横衝沙㟁每一潰裂常數十丈日復一日浸入鹵地蘆洲港瀆蕩為一壑今聞潮勢深入逼近居民萬一春水驟漲怒濤奔湧海風佐之則呼吸蕩出百里之民寧不俱葬魚腹况京畿赤縣宻邇都城内有二十五里塘直通長安牐上徹臨平下接崇徳漕運往來客船絡繹兩㟁田畝無非决壊若海水徑入於塘不惟民田有鹹水渰沒之患而裏河堤㟁亦將有潰裂之憂乞下淛西諸司條具築捺之策務使捍堤堅壯土脈充實不為怒潮所衝從之十五年都省言鹽官縣海塘衝决命浙西提舉劉垕專任其事既而垕言縣東接海鹽西距仁和北抵崇徳徳清境連平江嘉興湖州南瀕大海元與縣治相去四十餘里數年以來水失故道早晚兩潮奔衝向北遂致縣南四十餘里盡淪為海近縣之南元有捍海古塘亘二十里今東西兩段並已淪毁侵入縣之兩旁又各三四里止存中間古塘十餘里萬一水勢衝激不已不惟鹽官一縣不可復存而向北地勢卑下所慮鹹流入蘇秀湖三州等處則田畝不可種植大為利害詳今日之患大槩有二一曰陸地淪毁二曰鹹潮泛溢陸地淪毁者固無力可施鹹潮泛溢者廼因捍海古塘衝損遇大潮必盤越流注北向宜築土塘以捍鹹潮所築塘基址南北各有兩處在縣東近南則為六十里鹹塘近北則為袁花塘在縣西近南亦曰鹹塘近北則為淡塘亦嘗驗兩處土色虚實則袁花塘淡塘差勝鹹塘且各近裏未至與海潮為敵勢當東就袁花塘西就淡塘修築則可以禦縣東鹹潮盤溢之患其縣西一帶淡塘連縣治左右共五十餘里合先修築兼縣南去海一里餘幸而古塘尚存縣治民居盡在其中未可棄之度外今將見管樁石就古塘稍加工築疊一里許為防䕶縣治之計其縣東民户日築六十里鹹塘萬一又為海潮衝損當計用樁木修築袁花塘以捍之朝以為然咸淳臨安志理宗嘉熙戊戌秋潮由海門擣月塘頭日侵月削民廬僧舍坍四十里己亥六月詔趙與懽除端明殿學士知臨安府任責修築與懽奏先於傍近築土塘為救急之術然後於内作石塘又奏近觀潮勢忽睹異物非龍非魚什什伍伍鼓鬛揚鬐欲望奏告上帝或施強弩火砲以絶其妖又奏日役殿歩司官兵五千五百餘人并募夫工及修江司軍兵三千餘人已貼立石倉夾植樁笆版木晝夜運土填築自水陸寺之下江家橋之上近江港口築壩一南北長一百五十丈自團圍頭石塘近江築捺水塘一長六百丈自六和塔以東一帶石堤添新補廢四百餘丈越三月畢工水復其故宋史河渠志寳祐二年十二月監察御史兼崇政殿說書陳大方言江潮侵齧堤㟁乞戒飭殿歩兩司帥臣同夲府守臣措置修築留心任責或有潰決咎有攸歸三年十一月監察御史兼崇政殿説書李衢言國家駐蹕錢塘今踰十紀惟是淛江東接海門胥濤澎湃稍越故道則衝齧堤㟁蕩析民居前後不知其幾慶厯中置捍江五指揮兵士每指揮以四百人為額今所管纔三百人乞下臨安府拘收不許占破及從夲府收買樁石沿江置塲樁管不得移易他用仍選武臣一人習於修江者隨其資格或以副將或以路分鈐轄繫銜專一鈐束修江軍兵值有損損隨即脩補或不勝任以致江潮衝損堤㟁即與責罰元史河渠志鹽官州去海㟁三十里舊有捍海塘二後又添築鹹塘在宋時亦常崩陷成宗大徳三年塘㟁崩都省委禮部郎中游中順洎夲省官相視虛沙復漲難於施力至仁宗延祐己未庚申間海汛失度累壊民居陷地三十餘里時省憲官共議宜於州後北門添築土塘然後築石塘東西長四十三里後以潮汐沙漲而止至泰定四年二月間風潮大作衝捍海小塘壊州郭四里杭州路言與都水庸田司議欲於北地築塘四十餘里而工費浩大莫若先修鹹塘增其髙濶填塞溝港且濬深近北備塘濠塹用樁宻釘庶可䕶禦江淛省準下夲路脩治都水庸田司又言宜速差丁夫當水入衝堵閉其不敷工役於仁和錢塘及嘉興附近州縣諸色人户内斟酌差倩工部議海㟁崩摧宜發文江浙行省督催庸田使司鹽運司及有司發丁夫修治毋致侵犯城郭貽害居民五月五日平章圖們岱爾察納實㕘政等奏江浙省四月内潮水衝破鹽官州海㟁令庸田司官徴夫修堵又臣等集議世祖時海㟁嘗崩遣使命天師祈祀潮即退今可令直省舍人巴延奉御香令天師依前例祈祀制曰可既而杭州路又言八月以來秋潮洶湧水勢愈大見築沙地塘㟁東西八十餘步造木櫃石囤以塞其要處本省左丞相托歡等議安置石囤四千九百六十抵禦鎪齧以救其急擬比淛江立石塘可為乆逺計工物用鈔七十九萬四千餘錠糧四萬六千三百餘石接續興修致和元年三月省臣奏江浙省并庸田司官修築海塘作竹籧篨内實以石鱗次壘疊以禦潮勢今又淪陷入海見圖修治今差户部尚書李家努工部尚書李嘉賓樞密院屬衛指揮青山副使洪灝宣政僉院納木喀巴勒行省左丞相托歡及行臺行宣政院庸田使司諸臣會議修治之方合用軍夫除戍守州縣關津外酌量差撥從便添支口糧合役丁力附近有田之民及僧道伊嚕勒昆達實宻等户内點倩凡工役之時諸人毋或沮壊違者罪之合行事務提調官移文稟奏施行有㫖從之四月二十八日朝廷所委官洎行省臺院及庸田司等官議大徳延祐欲建石塘未就泰定四年春潮水異常増築土塘不能抵禦議置板塘以水湧難施工遂作籧篨木櫃間有漂沉欲踵前議疊石塘以圖乆逺為地脈虛浮比定海浙江海鹽地形水勢不同由是造石囤於其壊處疊之以救目前之急已置石囤二十九里餘不曾崩陷略見成效庸田司與各路官同議東西接疊石囤十里其六十里塘下舊河就取土築塘鑿東山之石以備崩損文宗天厯元年十一月都水庸田司言八月十日至十九日正當大汛潮勢不髙風平水穏十四日祈請天妃入廟自夲州嶽廟東海北䕶㟁鱗鱗相接十五日至十九日海㟁沙漲東西長七里餘南北廣或三十步或數十百步漸見南北相接西至石囤已及五都修築捍海塘與鹹塘相連直抵巖門障禦石囤東至十一都六十里塘東至東大尖山嘉興平湖三路所修處海口自八月一日至二日探海二丈五尺至十九日二十日探之先二丈者今一丈五尺先一丈五尺者今一丈西自六都仁和縣界赭山雷山為首添漲沙塗已過五都四都鹽官州廊東西二都沙土流行水勢俱淺二十日復巡視自東至西㟁脚漲沙比之八月十七日漸増髙濶二十七日至九月四日大汛本州嶽廟東西水勢俱淺漲沙東過錢家橋海岸元下石囤木櫃並無頽圮水息民安於是改鹽官州曰海寧州明實録洪武十年秋七月海潮齧江岸浙江布政使安然躬率民夫伐石砌築隄成民獲安業永樂元年冬十月修築江㟁先是浙江都司布政司言杭州府湯鎮方家塘邊江堤岸為風潮衝激淪於江者幾四百餘步延袤四千餘步沈溺民居及田地四十七頃宜改築以捍潮汐五年夏六月浙江布政司言杭州府沿江隄㟁復圮於江遣官督民修築九年工部言浙江潮水衝決仁和縣黄濠塘三百餘丈孫家圍塘㟁二十餘里海寜縣風潮溺死人民漂流廬舍坍塌城垣請發軍民修築從之冬十一月修浙江仁和海寧及海鹽縣土石塘㟁萬一千一百八十五丈萬厯杭州府志永樂十一年夏五月江潮平地水高尋丈仁和十九都二十都居民陷溺田廬漂沒殆盡守臣申奏朝命工部侍郎張某監築隄㟁役及杭嘉湖嚴衢諸府軍民十餘萬采竹木為籠櫃伐臯亭山塊石納其中疊砌隄㟁以禦江潮修築三年費財十萬明實録永樂十六年朝廷以浙江瀕海諸縣風潮衝激隄㟁墊溺居民連年修治迄無成功乃齋戒遣保定侯孟瑛等以太牢祭東海之神既祭水患頓弭十八年三月浙江海寧等縣言潮水淪沒邊海塘㟁二千六百六十餘丈延及吳家等壩命有司量起軍民修築十八年九月通政司左通政岳福言浙江仁和海寧二縣今年夏秋霖雨風潮壊長安等壩淪於海者千五百餘丈東㟁赭山巖門山蜀山故有海道近皆淤塞故西㟁潮勢愈猛為患滋大乞以軍民修築從之明從信録宣徳五年浙江巡撫侍郎成均築捍海隄明實録成化七年九月二日風潮決錢塘江㟁十餘丈近江居民房室田産皆為渰没守臣以聞工部尚書王復等奏乞如永樂事例遣大臣往祭海神修江㟁上命李顒時潮水衝塌江岸計四百九十餘丈顒議修築工料合用銀七萬三千二百餘兩今官庫收貯十不及五如俟續收贓罰解補恐潮復作前功盡棄欲取布政司存留糧銀支給充用量起杭州府衛人夫修築從之成化杭州府志成化十三年二月海寧海決堤偪盪城邑鎮巡因命採石臨平安吉諸山初用漢揵絙法不就乃斲木為大櫃編竹為長絡引石下之汎濫乃定仍作副隄十里以防泄鹵凡七越月而役竣張寧重築障海塘記海寧古鹽官瀕海南上可百里有山名赭赭南逺有山對峙如門是為浙江受潮之口歲乆泝洄渟滀赭涘出潬若堵則口隘潮束仄撃於鹽官隈㟁宋嘉定中潮汐衝鹽官平野二十餘里史謂海失故道有由也成化十三年二月海寧縣潮水横溢衝圮堤塘逼盪城邑轉盻曳趾頃一決數仞祠廟廬舍噐物淪陷略盡郛不及半里軍民翹惴奔散皆重足以待縣上其事於府府守陳讓上其事於欽差太監李義巡按監察御史侣鍾二公以所上事詢諸三司布政使杜謙按察使楊瑄又以二公命各詢其佐㕘政李嗣副使端宏參議盧雍僉事梁昉咸集厥地周視翕謀區畫會計相與祭於神具以成業託分巡僉事錢山曰君宜任重有所給乏從革惟君自處公乃躬履原隰量材度宜命杭湖嘉興官屬因地順民採石於臨平安吉諸山物用林積舟楫轉輓蔽河而至分命把總指揮李昭通判何某兼總工役初用漢楗絙不就乃斲木為大櫃編竹為長絡引而下之汎濫稍定人知有成勢皆奮力趨事又作副堤十里衛灌河以防泄鹵之害義聲倡道富人爭自賑施民至是始忘死徙之念歲八月塘成適沙塗壅障其外公因増髙培厚覆實𢷬虚使腹抗背負屹成巨防而海復故道矣邑父老徴余文刻石予惟風濤漲溢凡際海之區無不間遇至於衝決激射惟浙江地勢為常自延祐及今才百五十年海已三變雖曰氣數消長未嘗不以人力定勝但恐赭山之潬復出沙塗之壅再去後之繼任非人文獻無考則父老前日之憂將或在其子孫也文章非紀實不足以傳信請詳述本末凡有事者皆刻之碑陰嘉靖海寧縣志嘉靖九年海決逼城海寧縣志萬厯三年夏五月颶風大作海嘯民溺死百餘漂房屋二百餘間塘圮鹹水湧入内河壊田地八萬餘畝時縣官估計應修塘凡二千二百七十八丈計修築工料銀應五千二百二十八兩四年九月會知縣蘇湖蒞任巡撫徐栻察其才可任事遂以塘事付之五年二月十三日興工至四月役竣計費一千九百七十六兩陳善海塘議海寧縣治南瀕海海塘距城僅百武東抵海鹽西抵浙江延袤百里塘西有赭山南與龕山對峙夾為海門是為海潮入江之口潮至此束不得肆輒怒而東迴及其迴也又有石墩山以障之則益怒於是東西盪激害乃中於寜查舊志塘之外有沙塲二十餘里沙塲之内有陸地草塲桑柘棗園一百六十頃有竒夫塘有外䕶則海潮不致衝齧石隄内固可以經久今沙塲草塲悉盪入於海䕶沙盡没所恃以為命者僅此衣帶新造之塘宋元以來海塘興廢莫紀自洪武至萬厯海凡五變五修築矣永樂九年海大決保定侯孟瑛奉命徴九郡之物力厯十三年而始奏功嗣後成化甲午𢎞治壬子嘉靖戊子迄今萬厯乙亥海或溢或決塘隨築隨圮雖勞費不及永樂之甚公私亦既騷然夫海决寜邑而役及九郡者何也寜地於吳為陲於越為首地形最髙故諸水皆北流一從東北由淞泖趨扈瀆江入海一從正北過吳江趨白茅港入江俗因指吳江塔巔與長安壩址相並有如海寧一決注之列郡如建瓴然則所以障寧者即所以障列郡也萬厯五年春巡撫徐公栻按治海寧多潰闕為之駭詫因與水利陳公詔翕謀合慮察縣尹滇南蘇公湖可屬大事即以其役委之蘇亦毅然身任閱三月而役竣修坍塘一千六百六十三丈築新塘三百二十丈其費公帑止一千九百餘金亦可謂事半而功倍矣然更有說焉海寧之塘與海鹽異鹽塘有大患亦有大利寧塘似無顯患而實有隠憂盖鹽塘陂池相屬有内河可開故潮勢至此既為分殺而引其流更能使草塲悉為膏腴是大患弭而大利興也若寧塘逼近城郭無内河可開幸潮水緩於鹽耳設一旦海嘯直薄邑治其為隠憂可勝道哉聞寧邑額設捍海塘夫一百五十名每歲編派役銀三百兩為之令者誠加意海防每遇潮汛即遣官巡視稍有傾圯即委亷能吏領銀修築毋令涓涓不止此亦徹桑之計也萬一天祐寧民塘十年無恙則銀之積益富縱興大役亦不必派及平民矣至如築塘之法余竊有取於海鹽乙亥之決海鹽為甚其修築也造完坍石塘七百五十丈及原欠石塘八十三丈二尺修砌半坍石塘一千七百九十六丈築舊土塘二千二百一十六丈築新塘七百一十丈五尺新開内河白洋三千三百九十五丈而其為費也始計之謂非三十萬不可及徐公親行海上命有司詳估價值曰十六萬足矣衆乃譁然駭其太簡及工告成費止十萬餘金減原估五萬四千有竒是徐公之施徳於浙民大也至其慮湍激之為害也有盪浪木樁以砥之慮其直薄堤㟁也為斜堦以順之其累石也下則五縱五横上則一縱一横石齒鉤連若絙貫然即百計撼之其能摇乎修寧塘者誠一準海鹽新塘之式是則一勞永逸之計也崇禎元年七月二十三日海嘯溺者無算是日風日清朗過午狂颶猝發雷雨如注申酉間忽見潮頭直駕樹杪廬舍蕩析夜半風濤稍殺厥明縣官出勘城東西被災者凡四千餘户事聞於朝議修築海塘時縣令謝紹芳屬衙官張瑞傑董其役張第以修河塘法從事未幾潮齧之旋築旋圮於是撫按會題預徴糧銀每畝一分合計得九千餘金道府助各有差命郡丞劉元瀚董其役仍用石囤木樁之法工稍就緒會海沙復漲事已浙江通志卷六十二
