body:
  text: 浙江通志卷一百三物産三寧波府稻成化四明郡志粳稻有早雪産象山􅟙稻有朱口􅟙鐵􅟙虎皮􅟙産慈溪黃香􅟙産奉化烏􅟙産象山稷嘉靖寧波府志穄稷也或謂之粟非也吕氏春秋曰飯之美者有陽山之穄高誘曰關西謂之􅓱冀州謂之䵖字書云䵖􅓱穄也釋本草者云楚人謂之稷大抵穄稷􅓱䵖一物四名各因其俗耳鄞象産同麥成化四明郡志麥有三種大麥小麥蕎麥宋淳熙中象山縣西隴中有麥一莖兩岐有司圖上於朝豆定海縣志岱山蓬萊鄉周圍四百餘里土厚田瘠所産豆多穀少萞麻至正四明續志出明州夏生苗葉似葎草而厚大豆赤有節如甘蔗高丈許秋生細花隨便結實赤莧學齋占畢明州有赤莧山土傳赤莧乃仙人所種蔓青嘉靖寧波府志蔬之屬産鄞縣雪裏葓野菜箋四明有菜名雪裏菜甕頭旨蓄其珍莫比雪深諸菜皆凍此菜青青葓尤美香菜嘉靖寧波府志産慈溪芥辣嘉靖寧波府志産象山石花菜普陀山志生巖石間色近紫菜而葉碎小一名鳯尾與紫菜皆洛迦山之産紫菜至正四明續志生定海昌國海岸一云出伏龍山者著名乾則黑鹿角菜舟山志海苔之類生東海近水巖上苔菜吳都賦注生海水中正青狀如亂髮乾之赤鹽藏有汁名曰濡苔産象山至正四明續志採納之窖片片整之俗呼苔脯又一等緑苔乾而作小束謂之苔結山藥至正四明續志一名薯蕷出四明者佳春生苗蔓延籬間莖紫葉青有三尖角夏開細白花秋生實於葉間狀如鈴二月八月採根令人刮之白色為上青黑者不用曝乾入貢番薯普陀山志如山藥而紫味甘種來自日本韭薤名勝志昌國境有大韭大薤諸山俱在東南大海中大韭大薤皆其山中所産也石蒜普陀山志根似蒜一莖數葩狀如龍爪而小銀笋四明山記雪竇山北巖生石乳其峯非人可升有毛竹銀笋其毛竹自生毛笋若銀笋即銀礦如笋或云毛竹笋白如銀蓴舒亶四明雜詩聖米歉年蓴自注儉嵗明人呼蓴根為聖米菌避暑録話四明山谷多産菌種類不一食之間有中毒者蓋蛇虺毒氣所薰蒸也有僧教掘地以冷水攪之令少頃取飲皆得全活謂之地漿楓樹菌食之笑不止俗言笑菌居山不可不知此法芹至正四明續志奉化溪澗多生禹餘糧成化四明郡志生東海地澤及山島中狀如鵝鴨卵本草綱目海米亦蒒草之類也生海洲上一名自然穀即禹餘糧之類方孝孺海米行海邊有草名海米大非蓬蒿小非薺婦女攜籃畫作羣采摘仍於海中洗歸來滌釜燒松枝煮米為飯充朝飢莫辭苦澀咽不下性命可假待豐時松嘉靖寧波府志五縣皆産櫧嘉靖寧波府志鄞奉産櫧四色樹成化四明郡志四明山北一峯頂上有天井山四面各生一色樹東生梓西生松南生柏北生柳及黃楊海檜老學菴筆記有二種海檜夭矯堅瘦皆天成又有刻削蟠曲而成者名土檜海檜絶難致凡人家所有大抵土檜也至正四明續志海檜栝柏類也葉尖如杴其質體刻成龍鳯形懸根而植之盆可致逺棕成化四明郡志鄞縣産棕其毛用作棕帽棕鞋烏桕嘉靖奉化縣志縣有九峯山九峯突兀産多烏桕秋霜葉紅爛若春花觀音栁嘉靖寧波府志奉定間有之細栁一名觀音栁青翠如髮而垂春三月開紅花如蓼雞骨樹嘉靖寧波府志産定海李消夏録軍庭李産奉化成化四明郡志李子出鄞小溪仲夏有粉紅李蠟李豐山李楊梅成化四明郡志出奉化有邵家塢許家塢金家塢韓家晚大荔支小荔支鄞之小溪亦有之色紅不逮奉化之紫黑産東湖色白者名酪蜜腳枇杷至正四明續志一名盧橘出慈溪味甘核細如椒子林檎至正四明續志出慈溪一名花紅藤梨嘉靖寧波府志一名羊桃産象山芧栗至正四明續志極小而味甘出慈溪棐成化四明郡志翠山香山雪竇皆有惟雪竇尤著名金柑至正四明續志出慈溪飽霜者甘定海縣志出馬嶴沙峧者佳不能多得金橘嘉靖浙江通志寧波金豆橘形似豆味甘香勝於大橘香瓜至正四明續志金子瓜形如西瓜而小有紅黃黑三色出同嶴者佳此即香瓜青櫺子松陵集出四明山極甘紫桃軒雜綴四明山産青櫺子其樹不可見每於石上得之蓋洞天中物神仙所祕耳四明七觀珍木嘉草薆薱敷榮呫甘嚌芳有果青櫺李光四明山青櫺子詩羽幰新翻帝從回餘歡未盡玳筵開醉拋青子香泥上留與仙家取次栽蔗嘉靖鄞縣志産鄮山下稱為蔗田糖氷容齋隨筆甘蔗所在皆植獨福唐四明番禺廣漢遂寧有糖氷楊萬里氷糖詩亦非崖蜜亦非餳青女吹簫凍作氷透骨輕寒清著齒嚼成人迹板橋聲謹按糖霜有譜製法絶佳今閩人治此為利浙民多種蔗而不知造糖惟寧郡能作氷糖推其法亦可治霜也山茶普陀山志山中最多數千百本樹高數丈丹葩滿枝望之如珊瑚樹成化四明郡志海紅花産定海貼梗海棠嘉靖寧波府志産鄞慈土人稱闌路錦丹桂藏一話腴象山士子史本有木犀忽變紅色異香因接本獻闕下高宗雅愛之畫為扇面仍製詩以賜從臣自是四方爭傳其本嵗接數百史氏由此昌焉成化四明郡志今象山所産者色深而香烈他處初無號為丹桂移之四方則色香少損此地氣然也宋高宗有獻紅木犀花者愛之畫為扇面以賜從臣詩月宫移就日宫栽引得輕紅入面來好向煙霄承雨露丹心一點為君開秋入幽巖桂影團香生粟粟照林丹應隨王母瑤池宴染得朝霞下廣寒小白花普陀山志如瑞香而白葉亦微似春月花開香散巖谷雲麓漫抄山谷山礬花詩序云江南野中有一種小白花木高數尺春開極香野人號為鄭花王荆公嘗欲求此花栽作詩而陋其名豫請名曰山礬野人採鄭花葉以染黃不借礬而成色故名山礬海岸孤絶處補陀落迦山譯者以謂小白花豫疑此山礬花爾不然觀音老人何以端坐不去耶祝穆小白花詩玲瓏葉底雪花寒清晝香薰草木間移植小軒供宴坐恍疑身在普陀山杜鵑花明一統志四明山出嘉靖寧波府志土人號石巖花産奉化挂蘭嘉靖寧波府志一名見風蘭生鄞象間荻蘭至正四明續志一幹數花比蕙則瘦而香過之出昌國巖竇間瑞香花譜出明州又名睡香處處庭院植之王十朋瑞香花詩長向春前臘後開要將風味鬭梅魁客從廬阜夢中得根自鄮山佳處來風拆錦囊香不斷日烘寶蓋翠成堆定須移向梅溪去栽伴吾廬桂與槐紫茉莉普陀山志不種自生蔓延至里許菊至正四明續志種類頗多有紫莖而氣香葉厚至柔嫩可食者其花微小味甚甘木屑花嘉靖寧波府志産定海金雀兒花成化四明郡志産奉化雀李花成化四明郡志産奉化毛竹四明洞天記叢生澗邊白竹名勝志奉化自鮚崎而東為新嶺山其嶺生竹高僅四五寸葉皆色白紫竹暌車志紹興中四明有巨商泛海阻風抵一山下因登絶頂有梵宫焉窗外竹數箇枝葉如丹求得一二竿截之為杖每以刀鍥削隨刃有光至一國有老叟曰君親至補陀落迦山此觀音坐後旃檀林紫竹也方竹嘉靖定海縣志葛仙翁煉丹於靈峯植箸於地化為竹而方今巖谷間生方竹茶茶經出浙東以明州次鄮縣生榆美村朝以道詩官有白茶十二雷自注四明茶名至正四明續志茶出慈溪在資國寺山者為第一開壽寺側者次之每取化安寺水蒸造精妙如雀舌嘉靖寧波府志茗嶴山在慈溪縣西北其山多産茶萬厯象山縣志茶出朱溪者佳象山縣志鄭行山産佳茗珠山更多定海縣志定海之茶多山谷野産又不善製故香味不及園茶之美五月時重抽者曰二烏苦澀不堪産桃花山者佳普陀山者可愈肺癰血痢然亦不甚多得酒名酒記明州金波酒雙魚酒舒亶四明雜詩酒罌雙印貴注俗重雙魚酒鹽遊宦紀聞四明鹽白以􅤮盛貯邸翁曰塗中走滷將若之何可用煨皂莢一挺置其中即無慮矣甘草四明山記四明山心有五朵峯南一巖有石穴通泉流於梨洲穴生甘草附子明一統志各縣出附子楮實至正四明續志出明州有二種其實如彈丸青色七月漸紅九月採水浸去皮穰取子日乾海艾羣芳譜艾一名醫草一名氷臺一名艾蒿一名黃草處處有之産四明者謂之海艾本草綱目艾葉出明州至正四明續志苗莖類蒿而葉背白三月三日五月五日採舊志云出昌國岝峉山黃藥圖經本草出明州藤生高三四尺苗莖類蒿十月採根蜀漆至正四明續志本草云出明州葉似茗而狹長莖圓有節紅花青萼三子為房五月採葉八月採根治瘧要藥天明精至正四明續志出明州夏秋抽條如薄荷花紫白色葉如菘而小故南人謂之地菘骨碎補至正四明續志本名胡孫薑入貢其根生大木或石上多在背隂處引根成條上有黃毛及短葉附之無花實惟根入藥採無時削去毛用之筋子根本草拾遺生四明山苗高尺餘葉圓厚光潤冬不雕根大如指亦名根子味苦溫無毒主心腹痛不問冷熱逺近惡氣霍亂蠱毒暴下血承露仙本草拾遺伏雞子根生四明天台山一名承露仙其蔓延生葉圓薄似錢根似鳥形昆布本草綱目如繩索狀出浙東者大葉似菜蓋海中菜也香蓀成化四明郡志慈溪縣孫湖多産香蓀故名訛而為孫赤堇草成化四明郡志鄞縣東赤堇山産即烏喙絡石草至正四明續志出明州葉圓如細橘正青冬夏不雕著處即生根鬚包絡石上以得名花白子黑與薜荔相類香草香山記巖谷流香即大蓬山之支也上有佛迹巖多産香草長生草四明山記生山中取之懸崖壁間雖稿得水復鮮成化四明郡志卷柏俗呼為長生不死草生四明山謝靈運山居賦云卷柏萬代而不死鶴成化四明郡志紅鶴産明州海島萬厯象山縣志南田懸海周環一百餘里高出海中諸山山多鶴鹿水多海錯鶻至正四明續志出海島中然亦少得畫眉至正四明續志出慈溪山谷間江鶓舟山志短頸鳬也形小而多羣日處海濵或飛鳴於山次日必起大風青鸞客越志遊東錢湖青鸞大如鶴羣翔碧藻間烏鳳鵲客越志身黃咮黑光如漆皆吳中所無頻伽鳥至正四明續志昌國補陀山有之鄞縣句章北巖亦有野豬舟山志生定海山谷間出則田禾園蔬無遺九節狸至正四明續志狸有數種然貴在九節狸玉面狸極少海獺至正四明續志大如狗腳下有皮如人胼拇毛著水不濡生海壖貉至正四明續志貉踰汶則不生地氣使然也今二州四縣以皮賦杜部魚成化四明郡志出溪河長四五寸石首魚能改齋漫録兩浙有魚名石首云是明州來問人以石首之名皆不能言余讀張勃吳録載吳有石首魚至秋化為冠鳬頭中有石嶺表録異石首魚狀如魚隨其小大腦中有一石子如蕎麥瑩如白玉海族志腹中膘可作膠成化四明郡志石首魚首有魫細如牙堅如石故名石首臘月則韌皮為良三月八月味次之孟夏之交緣海之民以巨艘小舠競入洋山海中捕取潮汛往來有限謂之洋山魚春魚成化四明郡志形似石首而小每春三月業海漁人競以舟載竹莆出海捕之名曰捉春冬月莆中得者名曰莆春梅魚海味索隱鰉魚黃魚各有一種肉與味亦自不同即如吾郡梅魚比黃魚極小肉與味正相似閩中呼為小黃魚其鱗色燦爛金星如大黃魚也然又各自一種今合鰉魚為一種誤矣鰶魚天啓慈溪縣志鰶身多刺長不過五六寸肥腴可食晉虞肅父答晉帝云天時尚溫鰶未熟是也至正四明續志鮆魚又曰刀魚頭狹薄其腹皆如刀刃故名其長大者可尺餘子多而肥明州人夏初曝乾可以致逺又可為鮓其子乾名寸金鰿子又云糟之可作湯嘉靖寧波府志青鰶冬月尤美海錯之佳者産奉化箭魚成化四明郡志即江湖鰣魚海出者最大甘肥異常箬魚成化四明郡志其形似箬生海中極大名鰨鰻規魚補筆談􅥸魚吹肚魚非本草所載河肫規魚浙東人所呼其生海中者腹上有刺名海規吹肚南人通言之以其腹脹如吹也魟魚至正四明續志形圓似扇無鱗色紫黑口在腹下尾長於身如狐尾大者曰鮫魟與鮫魚可錯靶其次曰錦魟去沙煮爛與鱉裙同又次曰黃魟差小背黑腹黃其餘有斑魟牛魟虎魟魟字或作䱋馬鮫魚至正四明續志形似鱅其膚似鯧黑斑最腥鯊魚成化四明郡志鯊魚之名有白滿黃頭白眼白蕩青頓牛皮鹿文燕尾犁鑱尉斗丫髻劍刺及斑鯊狗鯊鮧鯊鯊虎鯊香鯊鋸鯊其類甚多吹沙魚埤雅鯊鮀常開口吹沙性善沈大如指狹圓而長有黑點俗呼為新婦臂味甘今奉化鮚﨑鎮有之名吹沙魚頗以為珍品琵琶魚成化四明郡志華臍一名老婆魚一名魚蓋其腹有帶如帔子生附其上故名其形如科斗而大者如盤吳都賦注曰此名琵琶魚無鱗而形似冬初始出者俗多重之至春則味減矣黃滑魚至正四明續志似春魚而肉細冬月得之為美又一種烏眼白眼皆相類鱟魚爾雅翼鱟形如惠文如便面惠文武冠名便面古扇名也至正四明續志鱟魚形如覆斗青褐色十二足長五六寸尾長一二尺其殼堅硬有橫紋一線軟可屈摺尾有刺口足皆在覆斗之下海中每雌貪雄漁者必雙得牝者有目牡者無目韓退之詩鱟實如惠文骨眼相附行四腮鱸成化四明郡志産海中四腮有江鱸差小而兩腮味淡有塘鱸形巨不脆肋魚至正四明續志似箭而小身薄細骨滿肋明州夏初多出鯔魚至正四明續志似鯉生淺海中專食泥身圓口小骨軟肉細烏鰂魚酉陽雜俎形如算袋口傍兩帶極長遇風則蚪前一鬚下矴其腹有墨遇大風輒放墨方數尺以混其身然羣行水中人見墨水至輒可笱羅而得之骨如通草可刻名海飄蛸入藥短魚海族志頭縮而短色紅為鯗極美銀魚至正四明續志口尖身鋭如銀條又一種極小名麵魚爾雅翼王餘即此類舊志載在比目項下非也火魚至正四明續志頭巨尾小身圓通赤故以火名之又有一種名竹麥魚頭身俱扁微紅其形頗相類虴魚圖經本草虴魚一名水母生東海形如覆笠腹下有赤血如芝謂之頭常泛海有蝦立其上其白肉縷切用礬浸謂之水母線可以致逺成化四明郡志虴魚本草作蝤一名水母生東海形如覆笠肉白海鰍舟山志大者長數十丈海中浮載如一二里山俗呼為浮礁舟行避之風鰻成化四明郡志生海中者可六七尺冬月鱐之名風鰻彈塗至正四明續志闌湖形如子鰍而短大者如人指潮退數千百跳躑塗泥中土人使小鉤取之一名彈塗椒醬臘之鯗至正四明續志形似魟以鹽浥之曝為鯗名曰鯗俗又呼曰老鴉鯗去皮生擘成絲充果飣魚鮓嘉靖奉化縣志袁村所産最美海鮮鶴林玉露有浙人侍壽皇宴因談肴核上問其鄉里所産對曰螺頭新婦臂龜腳老婆牙皆海鮮也吳萊初海食詩故人喜我來為我具杯盤盤中何所有海族紛攢攢盲風吹衣冷蛋雨灑席寒春魚白如刀小棹臨碧湍淡菜類山結巨钁就石剜水母或潮捲蝤蛑乃泥蟠蛟鼉惜不得況問龜與黿其餘亦瑣碎充此一日歡洗濯煙瘴氣磨礱沙淤瘢非歟嗜土炭否則殊醎酸珍須壓豚臠異且輕馬肝褻味分罩網腥涎雜瓢簞奈何齊魯邦徒設邾莒餐對之輒棄置誰謂吾腹寬川澤禮當爾勿云行路難謹按陸雲答車茂安書云斷遏回浦隔截曲隈隨潮進退採蚌捕魚其蚌蛤之屬目所未見耳所未聞品類數百難可盡言據此則寧郡鱗甲之屬舊志不傳者多矣山海之利天自産之名雖不傳而物未嘗缺也特博識者難爾江瑶柱老學菴筆記明州江瑶柱有二種大者江瑶小者沙瑶然沙瑶可種逾年則成江瑶矣宛委録奉化縣四月南風起江瑶一上可得數百如蚌稍大肉腥韌不堪惟四肉柱長寸許白如珂雪以雞汁瀹食肥美過火則味盡也侯鯖録玉珧柱厥甲美如珧玉肉柱膚寸曰江珧柱郭景純江賦云玉珧海月吐納石華退之謂馬柱甲是也世人不用此珧字是未知耳能改齋漫録紹聖三年詔明州嵗貢車螯肉柱五十斤俗謂之紅蜜丁東坡所傳江瑶柱是也李本江瑶柱詩異味分甘及老叨令人斷酒不能牢元胎剖出雲間月細殼熬翻海上濤春雨河豚忘下箸曉霜郭索罷持螯東坡向未知名字嫓美空將荔子褒蠣房嘉靖寧波府志形如駝蹄附巖石生相連如房左顧者牡右顧者牝房內有蠔肉亦有柱肉之大小隨房每潮來諸房皆開有小蟲入則含以充腹鮚﨑海巖生者僅如人指甲挑取肉謂之梅花蠣扈竹結成謂之竹蠣劉子翬食蠣房詩蠣房生海壖堅頑宛如石其中儲可欲雖固必生隙嵌嵒各包藏碨䃁相附積終逢霹靂手妙若啓扃鐍鑽灼諒難堪曷不吐餘􅅹南庖富腥盤豈惟此稱特吞航大絶倫梯臠萬夫食針麟九牛毛小嚼逾千百光螺暈紫斑膏湛金色水母脆鳴牙章舉懸疣密烏粘力排奡貼石不可索妾魚戲浮波媚鮜雌雄匹蟹躁輒橫鶩鱉縮常畏出車螯不服箱馬鮫非駿迹江瑶貴一柱嗟豈棟梁質骨柔競愛䱠多鯁鯯乃斥蚶魟鮭赤文肉黑魚之賊鰷鱨鰋鯉鰻鮎鮪鰍鮓鯽鱅庸而􅵐小瑣冗難盡述包涵知海量長養荷天德貪生族類繁失地波濤窄網罼人設險甘鮮已為厄紛然均適口流品當别白微物倘見知捐軀寧足惜海扇任士林海扇詩注海中有甲物如扇名曰海扇文如瓦屋三月三日潮盡乃出任士林海扇詩漢宫佳人班婕妤香雲一篋秋風初網蟲蒼蒼恩自淺猶抱明月馮夷居至今生怕秋風面三月三日才一見對天搖動不如烹肯向五雲清暑殿鮚元豐九域志鮚蚌也鮚崎亭其中多鮚故以名亭四明七觀寸鮚腹蟹亭以崎名注奉化鮚崎山産鮚顔師古曰鮚蚌也其長一寸廣二分有小蟹在腹中定海縣志璅蛣如螺半身飢則蟹出求食蟹入則飽淡菜海族志亦名殼菜形似珠母一頭尖中銜少毛多生南海本草釋名浙人呼淡菜曰東海夫人嫏嬛記又名文齧玉環志去其殼不著鹽而乾之故名淡菜四明七觀蚶菜疲民君嚴奏免注四明嵗貢淡菜蚶蛤之屬唐孔戣以為自海抵京道路役夫奏罷之蝤蛑成化四明郡志并螯十足生海邊泥穴中小而黃者謂之石蝤蛑最大者曰青蟳小者曰黃甲後足濶者曰撥棹子城東江濵有蝤蛑廟俗傳有漁人獲一巨蝤蛑為巨螯鉗而死今廟即其地前賢多呼四明為蝤蛑州舒懶堂述里諺云八月蝤蛑健如虎埤雅云蝤蛑兩螯至強能與虎鬭雨航雜録浙蟹有數種一曰蝤蛑南人謂之撥棹言力可撥棹也隨大潮退殼一退一長一曰蟳乃蝤蛑之大者兩螯無毛一曰擁劍一螯大一螯小常以大螯鬭小螯食又名桀步一曰虎蟳大者有虎斑文一曰招潮潮欲來出穴舉螯迎之一曰灘塗一曰蜂江一曰蟛蜞似蟹有毛而赤性極寒一曰彭越即彭螖也一曰竭朴大於蟛蜞黑斑有文以大螯障日用小螯以食一曰沙狗穴沙中見人則走或曰沙鉤從沙中鉤取之也味甚美一曰數丸競搏土作丸滿三百而潮至一曰籚虎兩螯正赤不可食一曰螠似彭越而小一曰䘋肉殼而多黃其螯最鋭斷物如芟刈焉食之行風氣螺定海縣志生深海中殼可為酒杯者曰鸚鵡螺靨白而香者曰香螺殼尖長者曰鑽螺味次之有刺者曰刺螺其味辛者曰辣螺又有拳螺劍螺斑螺丁螺圖經本草海螺即流螺厴曰甲香生南海今明州有之或以台州小者為佳諸螺之中此肉味最厚南人食之南州異物志云甲香大者如甌面其厴雜衆香燒之益芳獨燒則臭合香者用之又有小甲香狀若螺子取其蒂修合成也海中螺類絶有大者珠螺瑩潔如珠鸚鵡螺形如鸚鵡頭並可作杯梭尾螺形如梭今釋子所吹者皆不入藥蛤至正四明續志蛤蜊亦云圓蛤殼口有紫暈者肥美善醒酒黃山谷詩商略督郵風味惡不堪持到蛤蜊前鄞縣志黃蛤每一潮生一暈殼有紋海濵人以苗栽泥中候其長而取之本草會編蛤生海中浙人以其肉充海錯其殼煅作粉海蝦至正四明續志海中蝦有赤白青黃斑數色青者有大如兒臂長尺餘鬚長三尺土人珍之梅熟時曰梅蝦蠶熟時曰蠶蝦又有生於潮生於河皆青黑色生於江白色蝦鮓太平寰宇記明州舊貢紅蝦鮓蝦米太平寰宇記産明州蟶至正四明續志生海泥中長二三寸如大指肉甚肥含津口常開不合蚶郭璞江賦洪蚶專車至正四明續志有瓦壟蓋殼上有稜似之故名有芽蚶殼稜細而肉肥多出鮚崎亦採苗種之海塗謂之蚶田鄞縣志生於海巖或簄竹又一種曰老婆牙䗯至正四明續志俗呼生進似蛤而長殼有毛亦呼毛蛤一曰􅒕䗯章巨成化四明郡志大者名石拒居石穴人取之能以腳粘石拒人又别有一種生海塗中名望潮土人呼為塗蟢一種曰鎖管腳短無飣肘子成化四明郡志殼下尖而上濶中有肉惟取肉為饌土鐵海味索隱一名泥螺出南田者佳梅雨收製海鏡定海縣志瓦楞子本名鬼一名􅒕一作蚶殼圓厚而有紋儼如屋瓦楞海月形圓如月亦謂之海鏡土人鱗次之為天窗緑毛龜成化四明郡志宋祥符七年明州獻青毛龜今漢洞有小如錢者取育於池亦漸長大蜥蜴成化四明郡志形如蝘蜓四足皆有金絲生山石潭中禱雨即應凡禱出水面罩至城將雨則送故處綾四明七觀注明州土貢吳綾交梭綾畫絹嘉靖浙江通志寧波畫絹色白絲勻宜畫皮紙竹紙至正四明續志皮紙出鄞縣章溪竹紙出奉化棠溪亦有皮紙硯硯箋明州石硯石甚粗見米帖假倭扇七修類藳寧波人造泥金彩漆縹霞宣德間遣人至彼傳其法油成化四明郡志寧波油共五品麻菜豆桐桕魚膏太平寰宇記明州脂澤悉用魚膏席成化四明郡志甬東多種席草民以織席為業著四方曰明席佛祖統紀建炎三年十二月浙東制置使張俊與金人戰於明州西門俊見民間多織席遣兵斂取之以重席覆於路金騎踐席上皆足滑而仆因急擊之斬獲甚衆熏籠至正四明續志明州熏篝焙籠他郡鮮有漆器嘉靖浙江通志寧波出描金漆器謹接寧郡切近海洋自設立海關以來外洋諸貨畢集居民遂摹仿為之如漆器之類雖不及洋製而民間亦資之以為利他如紙扇銅硯小刀之屬亦多金錫山海經句餘之山多金錫銅明一統志奉化縣産銅生鐵至正四明續志廣船販至冶成器用釜差勝手磬百寶總珍集明州多販到無破損聲圓長者為妙五色石四明圖經奉化縣烏峯臨溪其石五色似花鈿普陀石池北偶談普陀巖石有大士像華鬘天然竹林鸚鵡善才龍女形悉具琴客程生曽見數枚琅玕石宣和石譜明州昌國縣沿海近淺岸水底生琅玕石狀似珊瑚或高二三尺漁獵者多得之初出水色甚白經久微紫黑紋理如織枝幹一律遍多圓圈迹扣之有聲稍燥土人不甚貴逺方多裝治假山奉化石雲林石譜明州奉化縣諸山大石中每擊取之即有平面石色微黃面稍潤扣之無聲其紋橫裂兩道如細墨描寫一帶夾徑寒林煙露濛朧之狀或濃墨點染成高林與無為軍所産石屏頗相類浙江通志卷一百三
