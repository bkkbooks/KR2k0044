博士弟子或役於有司名存實亡失其所業獨處州刺史鄴侯李繁至官能以為先既新作孔子廟又令工改為顔子至子夏十人像其餘六十子及後大儒公羊髙左丘明孟軻荀况伏生毛公韓生董生髙堂生揚雄鄭康成等數十人皆圖之壁選博士弟子必皆其人又為置講堂教之行禮肄業其中置本錢廪米令可繼處以守廟成躬率吏及博士弟子入學行釋菜禮耆老嘆嗟其子弟皆興於學鄴侯尚文其於古記無不貫達故其為政知所先後可歌也已乃作詩曰惟此廟學鄴侯所作厥初庳下神無以宇師生所處亦窘寒暑乃新斯宫神降其獻講讀有常不誡用勸藹藹元哲有師之尊羣聖嚴嚴大法以存像圖孔肖咸在斯堂以瞻以儀俾不或忘後之君子無廢成美琢詞碑石以贊攸始嘉靖浙江通志宋景祐間守孫沔徙今所按宋陳孔碩文廟記云威敏之來實景祐四年逮寶元二年席某已至栝蒼彚紀作康定初誤宣和三年兵燬五年守黃葆光重建紹興十三年守黃禔闢六齋郡人尚書梁汝嘉捐地相之二十五年守鄒翊作櫺星門咸淳七年守李雷奮重建講堂元至元三年總管盧景修廟學崇禎處州府志至元二十七年幹勤好古修明正統七年推官黎諒鼎新大成殿景泰四年知府張佑重建明倫堂天順五年知府馬偉重建大成殿成化元年知府周祺創退省堂增築號房十八年參議張敷華僉事江孟綸又大新之二十二年知府郭忠修建正德十三年知府林富購地增拓之萬歷二十年同知陳其志修吕鳴珂為記二十八年知府李淳重修李志為記四十二年知府鄧士昌重修明倫堂王一中為記四十七年知府陳見龍重修文廟王一中為記天啓五年同知廖鵬舉相繼重修崇禎八年大水牆垣衝塌巡道諸葛羲修葺國朝順治七年署府推官張元樞重修康熙十六年知府線一信十八年知府李率祖先後重建康熙四十九年壞於風雍正三年督學彭維新重建七年知府姚鈐建崇聖祠射圃在名宦鄉賢祠後名宦祠祀李雍以下三十九人鄉賢祠祀周明以下六十五人義孰在郡治南紫陽書院在府治南舊為城隍廟括蒼彚紀明嘉靖三十四年知府髙超改創南明書院麗水縣志康熙三十年知府劉廷璣建麗水縣儒學在縣治西南檡山之巔嘉靖浙江通志唐刺史李繁建以為州學宋守孫沔别建州學此為縣學宣和間燬紹興十三年令王筠重建蒼彚紀元至元二十九年尹韓國寶以檡陡絶而太學吳海捐地築平建明德堂林千之為記明成化間參議張敷華僉事江孟綸重修嘉靖間知縣吳梓闢學前民居鑿池崇禎處州府志萬歷二十年知府任可容修自為記二十八年知縣鍾武瑞建文昌閣鄭汝璧為記天啓三年巡鹽御史傅宗龍修王一中為記國朝康熙十八年知府李率祖知縣王秉義重建射圃名宦祠祀林棐以下九人鄉賢祠附府學社學七所一在望京門一在通惠門一在栝蒼門一在南明門一在行春門一在巖泉門一在譙樓傍義孰在圭山青田縣儒學在縣治東明一統志宋崇寧中建嘉靖浙江通志宣和兵燬紹興九年令艾若訥重建元末復燬明初知縣耿亮建宋濂重建青田縣廟學記青田處萬山間跨山為孔子廟初建於崇寧中迄元至正之末餘二百載而燬於寇金臺耿君亮來為縣展謁焉則斷礎荒榛交錯於頽牖之間於是捐俸為倡縣人士歡然和之輸粟薦貨各視其力為差耿君親自督勸至廢寢食厥材孔嘉厥石維堅廟殿崇雄講堂清邃戟門有嚴齋廡翼如􅍥書之樓貯粟之庾湢房㸑室以次而就繚以周垣甓以修塗始則舊居迫山斜迤而傾恆病狹隘今則鞏石為級拓而𢎞之環學之地編氓所業今則悉購入之西有方塘嵗久湮塞今則浚而沼之經始於庚子之嵗冬十一月乙亥訖工於辛丑嵗正月辛未復聘名師廣招弟子員日申五倫之教蔣子先聞而樂之相率割田為養士之助而學之制大備因紀事之成繫之詩曰維栝建州萬山鬱環賦家定縣割於青田峩峩學宫跨山為址伊誰搆孽一夕而燬絃歌之區鞠為草萊白煙涼颸凄其四徠耿君之臨惕焉是懼曰此教原可使淪墜乃剗其翳乃拓其基乃攻乃治樹功以時有殿有堂有齋有序有庖有庾其列楚楚士之來逰既嘆且言昔也荆榛今也豆籩發政之機實在興學譬云葭莩應乎葦籥風雨瀟瀟雞鳴膠膠不隨世遷唯道之操泮宫之修詩人頌魯爰勒貞珉以詔千古括蒼彚紀宣德間御史楊鐸重修潘畿為記正統間教諭張本捐俸建大成門築露臺徙學門闢學前路成化丙戌知縣盧傑重修嘉靖戊午燬於寇知縣李楷移福勝寺址并買民基足之癸亥知縣丁一中復建於縣東之舊基拓東城抱學於內何鏜為記崇禎處州府志萬歷二十四年知縣林翰英重修二十七年洪水衝壞學後城三十九年知縣方淡然修城改築於舊址青田縣志天啓元年教諭鄭奎光建文昌閣國朝順治六年燬康熙十一年邑紳士捐資於故址重建十九年火二十年知縣張皇輔復行創建鄭載揚記射圃在學西名宦祠祀劉芹以下一十一人鄉賢祠祀陳汝錫以下一十二人社學在泮池西圯石門書院在縣西七十里石門洞續文獻通考宋淳熙九年朱文公提舉常平至此欲居之元至正中廉訪副使王俁始即謝客堂故址建久圯湖山義孰在十二都青田縣志明季伯益立劉基湖山義孰記青田之山其上四十里有泉滙而為潭由潭入谷十有五里是為髙湖之源其上多竒峰絶巘大木之所盤欎獻竒納秀故士多俊彥室常殷阜季氏其一也有名謙字伯益者好學尚義其家日裕乃謂其人曰人孰不愛其子孫而不知所以愛之者今有良田美宅綿亘阡陌堆金聚帛充斥棟梁自以為用之不竭享之無窮也一旦光銷影鑠而無纎芥之留者何耶驕淫生於富溢而縱欲敗度之子常由不悟前人成敗之迹而自視侈然大也及其顛連困厄於垂老之際倣徨無所容其身雖欲效織蒲補履以食其餘年且不可得若是者雖其人之不肖抑亦其父兄處之不得其道也今豫幸藉先人餘業以自免於凍餒未嘗不惴惴於吾身况能保其子孫故願制産以肇建讀書之所延名儒為師以訓子弟以及姻族之人咸使知學大則修身齊家以用於時小亦不失為鄉里之善士不亦可乎乃築於其居之側以為堂設孔子像旁列齋舍翼以廊廡繚以周垣買田若干𤱔給師弟子之食萃其族之子弟悉入學焉於是襟佩衣裳肅肅有容弦誦之音藹藹旁達入其鄉者莫不感嘆而悅慕若季氏者真知愛其子孫哉由是達於一鄉一邑以播於天下使人人聞而效其所為將見比屋皆為賢士大夫而愚不肖者寡矣邑人洪應求道其事於豫且請為之記豫既樂鄉里之有善人而又嘉洪生之樂道人善也故喜而書之混元書院在混元峰之麓括蒼彚紀明嘉靖間因點易亭遺址建書院祀陽明先生心極書院在大鶴山括蒼彚紀明嘉靖癸丑提學阮鶚作心極圖繫以心問一篇頒示浙學知縣李楷即舊府館改建新建書院舊為府館括蒼彚紀明萬歷丁丑知縣梅時雨改建瑞龍書院在混元峰下舊浙江通志明嘉靖間知縣徐瑛建縉雲縣儒學在縣治東嘉靖浙江通志縣故有孔子廟唐上元元年令李陽冰修宋慶歷四年尉毛維瞻重修治平中令張簡翼建學宣和三年燬七年令吳延年重建元至元十四年復燬二十七年簿吳樟建元末又燬明初知縣劉澤民建括蒼彚紀宣德二年知縣陳京重修嘉靖二十六年知縣周世逺復開拓新之田汝成為記崇禎處州府志萬歷四十二年知縣曾孔遇署教諭繆伯升重修四十五年推官李天培重建李志為記崇禎間火知縣陳世忠重建國朝順治五年燬七年知縣項始震建先師廟十七年知縣汪宗魯建明倫堂康熙十三年寇燬二十年知縣霍維騰教諭張尚乘訓導陳獻御重修明倫堂二十二年霍維騰重修先師廟建兩廡啓聖名宦鄉賢土地祠及泮池櫺星門射圃在仙巖寺後名宦祠祀李陽冰以下三十一人鄉賢祠祀胡份以下三十七人社學在龍津橋南久圯獨峰書院在縣東三十里續文獻通考朱文公至此愛其山水似武夷嘉定中郡人葉嗣昌建美化書院在縣東六十里續文獻通考朱文公講道於此嘉熙中縣尉陳實建松陽縣儒學在縣治東南明一統志唐武德中建栝蒼彚紀宋宣和三年燬建炎時知縣徐彭年重建唐閲繼葺紹興間王淑毛崈增修吳祗若為記乾道紹定淳祐間知縣劉唐褒王圭髙彭更相修飾元元貞二年持嘉顯忠撤舊更新至大四年主簿王友從加修嘉靖浙江通志射圃侵於民洪武三年復蘇伯衡松陽縣學射圃記松陽之有學學之有射圃蓋自宋紹興始元時凡民不得持弓矢故射息而圃亦廢豪族因侵而有之踰八十年有司漫不加省皇帝即位之明年詔郡縣皆興學置師弟子員而講習乎六藝射圃之復維其時矣令王君會徵赴京師事格不行而提刑按察僉事張公行縣適至乃為按圖籍凡學地之占於民者悉復之正其疆界夷其畛域樹垣以繚之王君歸謂部使者秪承德意返故地於久攘之後幸惠斯文甚厚宜有以示後人夫侯以明之此舜之學政也其人之賢不肖觀其射之中不中見焉故以射致衆衆致而後論士是以三代率由之昔孔子射於矍相之圃觀者如堵使弟子揚觶而致黜者三則僅有存者夫學莫大於射也尚矣矧國家方修文教而稽古定制焉則射圃之復夫豈細故哉崇禎處州府志正統三年教諭錢謐建奎文閣張柷為記萬歷十年知縣張賽改建於郊外三十一年知縣劉幹正徙復舊址鄭懷魁為記崇禎二年署縣事通判許有寰重建知縣楊應華成之王一中為記松陽縣志崇禎五年知縣楊應華建啓聖祠十七年知縣張建髙建尊經閣國朝康熙十八年知縣張景留重建射圃在學東名宦祠祀陳俊卿以下一十六人鄉賢祠祀沈晦以下一十七人社學在縣西明善書院在縣西二十里松陽縣志宋淳熙九年朱文公為浙東常平使者至此講道咸淳間邑人葉再遇建以祀公久圯遂昌縣儒學在縣治東南嘉靖浙江通志縣故有孔子廟在郭西宋皇祐間令何辟非建學今所紹興二年令鄭必明修括蒼彚紀明成化七年燬通判郭鼎建明倫堂十年推官趙巡建大成殿二十年知縣余黼成之主簿文英建櫺星門𢎞治八年知縣黃芳重修吳志為記正德丁丑又燬教諭戴鑾請於知府林富重建嘉靖間知縣黃養蒙拓學前地鑿泮池知縣洪先志修萬歷六年知縣鍾宇淳一新之崇禎處州府志萬歷七年知縣鍾宇淳建土地祠聚奎亭十二年知縣王有功建文昌閣十六年燬十八年知縣萬邦獻重建二十二年知縣湯顯祖建尊經閣二十三年重建射圃國朝順治七年教諭鍾天錫修康熙五十年知縣繆之弼重修射圃在河東隅名宦祠祀江子一以下一十九人鄉賢祠祀龔原以下一十二人社學四所四隅各一所東隅社學遷貞烈坊鳳池書院在湖山括蒼彚紀明知縣池浴德建兌谷書院在北隅郊外崇禎處州府志邑人包萬有建盤溪義孰在獨山處州府志邑人朱子堯建項氏義孰在縣治北處州府志邑人項應祥建龍泉縣儒學在縣治束金鼇峰左嘉靖浙江通志宋天禧二年建紹興三年令汪汝則修季陵為記龍泉縣志淳熙丁酉知縣李嘉言改創夫子廟元至元戊寅燬丙戌知縣金之剛重建明洪武甲寅知縣屈伸建大成殿成化戊子提學副使劉嶼率府判尹儒述建明倫堂𢎞治七年知縣潘組紳售學南地改門創大成殿闢兩廡鑿泮池建櫺星門戟門新二齋正德八年知縣夏章易泮池於櫺星門外括蒼彚紀嘉靖己未知縣瞿繼志重建明倫堂隆慶二年知縣李柷重修何鏜為記崇禎處州府志萬歷十一年知縣陳應芳重修何鏜為記十三年知縣華詔二十八年知縣章文標重修王亮為記射圃圯名宦祠祀傅楫以下八人鄉賢祠祀吳戭以下十二人社學五所一在縣東隅登仕坊一在縣西隅顯德坊一在縣北隅燈山東一在縣南隅一在橋閣之下桂山書院在縣西五十里嚴垟龍泉縣志宋端平間里人張奉議建久圯笏洲書院在縣南三十里瀆田舊浙江通志宋端平三年建於縣郭溪南元至元後復徙瀆田久圮仙巖書院在縣西五十里漿安村龍泉縣志宋咸淳間邑人章公權建久圯仁山書院在縣東二十二都舊浙江通志明嘉靖三年知縣朱世忠建龍淵義孰在縣西漿安村龍泉縣志元季里人章溢建吳氏家孰在縣北龍泉縣志明正德三年邑人吳瑞禧建鄭氏義學在縣西龍泉縣志明隆慶元年義民鄭佳建置田以贍士翁氏義學在縣東龍泉縣志明萬歷元年邑人翁景瑗置慶元縣儒學在縣東豐山門外城隍廟左括蒼彚紀宋慶元三年令富嘉謨建學於瀆田上村元季燬明洪武間知縣董大本改建於就日門外天順二年知縣張宣復遷瀆田故址嘉靖中建城學在城外慶元縣志成化十年知縣余康建尊經閣隆慶二年知縣彭適教諭顧翼髙議改圖嗣任知縣朱芾乃遷縣治東萬歷二十一年知縣周道長重修四十二年知縣郭際美拓明倫堂豎二坊舊浙江通志崇禎三年知縣陳國璧教諭胡若宏訓導賈應忠改建今址國朝順治十二年教諭駱起明康熙二年知縣髙嶙四年知縣程維伊先後重修射圃在演武場東名宦祠祀富嘉謨以下九人鄉賢祠祀吳兢以下十二人社學四所一在縣東一在下管一在城東一在九都竹口松源書院在縣西隅興賢坊慶元縣志明知縣沈維龍命義民吳治建久圯雲和縣儒學在縣治西嘉靖浙江通志景泰七年僉事馮靖建括蒼彚紀𢎞治乙丑知縣劉燦重修廖軫為記雲和縣志嘉靖己丑知縣陳思順拓舊址而更新之崇禎處州府志嘉靖丁酉知縣鄒伯貞改徙萬壽宫萬歷二十三年教諭劉夢齡改復故址建躍龍橋項應祥為記天啓六年知縣葉逢焜重修王一中為記國朝康熙二十八年知縣林汪遠重建射圃在泮池西名宦祠祀顧立以下五人鄉賢祠祀王元以下五人社學四所俱在坊都宣平縣儒學在縣治東嘉靖浙江通志景泰三年知縣李葉建括蒼彚紀成化十八年知縣何昌重修馬愈為記隆慶三年知縣艾善更新之何鏜為記萬歷間知縣劉珍葉遺風相繼又新之俞介為記射圃在學內名宦祠祀孫原貞以下七人鄉賢祠祀吳仕偉一人社學在縣南隅景寧縣儒學在縣治北嘉靖浙江通志景泰三年縣令楊殖宗建潘琴為記括蒼彚紀成化庚寅知縣林堉建東齋及泮橋泮池甲辰知縣髙政增建西齋正德壬申知縣陳傑闢門路起東西廊號房己卯知縣單珏創鄉賢祠嘉靖庚寅知縣程達創名宦祠庚子知縣王三接重修廬勳為記丙午知縣趙子楫修易櫺星門柱以石隆慶壬申知縣陳嚴之重建兩廡戟門鑿泮池拓宫牆萬歷四年知縣林喬松易民地建門前拓大道何鏜為記萬歷景寧縣志萬歷己卯知縣蕭汝馨建尊經閣癸未知縣薑思閔修殿堂門廡處州府志萬歷二十三年知縣雷忭重建項應祥為記天啓元年知縣角韶重修李光縉為記景寧縣志崇禎十四年知縣徐日隆於縣北改置新學國朝順治間知縣林忠順教諭聞斯震康熙間知縣蓋士毅訓導方遊龍知縣劉宗沛教諭史鑑知縣張琢高棠萼學諭郁廣學訓方國光歷有創修射圃圯名宦祠祀楊殖宗以下五人鄉賢祠祀潘琴以下四人社學九所四在坊隅五在都崇正書院在縣東舊浙江通志明萬歷中建鶴溪書院在按察分司前久圯豸山書院在縣西里久圯鴉峰講舍在丈廟景寧縣志雍正七年署縣事汪士璜建浙江通志卷二十九
