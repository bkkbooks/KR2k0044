body:
  text: 浙江通志卷二十九學校五書院附嚴州府嚴州府儒學在府治西南嚴陵志蒨在府城東南宋雍熙二年知州田錫遷於西北景祐中知州范仲淹建堂宇齋廡嘉祐中知州趙抃置田養士大觀中知州李升重新廟學紹興七年知州胡寅盡撤而新之嘉靖浙江通志乾道五年張栻知州事改學門南向是時吕祖謙為校官士得出兩大儒之門用是多有聞者按萬歷府志云紹定淳祐中陸子遹王佖相繼修葺元至元末兵燬明洪武七年知府趙士敏徙今所永樂十四年大水廟圮知府李興重建萬歷嚴州府志宣德六年知府徐孔竒建賜書樓正統三年萬觀修殿廡堂齋闢射圃九年黃澍建觀德亭景泰四年劉綱重修成化七年知府朱暟加修二十一年同知鄺才建號舍二十三年知府江豫建會饌堂𢎞治六年李德恢建正殿吳伯通為記嘉靖三十七年韓叔陽修萬歷元年周鐸重修四年知府陳文煥同知林烋推官周憲增修七年知府楊守仁建聚奎樓仰聖門國朝康熙八年知府梁浩然重修二十一年洪水衝頽知府任風厚重修射圃在文廟西名宦祠祀宋璟以下十二人鄉賢祠祀嚴光以下一十二人釣臺書院在府城東五十里富春山下嚴陵志漢嚴子陵耕釣處宋景祐中知州范仲淹始創祠宇紹定戊子山隂陸子遹來知州事闢書院於臺下處僧廬於東偏復葺髙風閣置經史子集用訓迪嚴方二家子弟淳祐辛丑金華王佖守郡始闢齋舍延堂長春秋祭而講習焉辛亥知州隆興趙汝歷鑿石纍土以廣其地益以棟宇為門三間榜曰釣臺書院歷級而升為官廳左乃先生祠也羊裘軒客星閣悉仍其舊又以招隱堂廢址為燕居殿下為門廡曰燕居之門由官廳而右為講堂曰清風堂之北為復屋曰遂髙堂之南臨流為閣曰雲峰煙水為四齋曰明善希賢尚志修已為罏亭曰會友山長堂長有位祭器有庫儲蓄有倉庖湢有所於是延致襟佩教養其間改登臺路於書院之右山腰有亭以待憩息東臺舊有亭更為亭西臺對立相望郡捐帑五萬緡就城為抵質庫月收其息以助養士明年知州季鏞聞於朝以州學教授兼山長循故實以四仲月率職事致祭守亦時往景定辛酉知州錢可則修治之視舊益勝客星閣久淪於僧舍頽圯滋甚命僧撤其故為法堂更卜爽塏於佛廬之左建焉元至正元年總管羅廷玉山長沈元鼎協力興修屋以間計凡四十有九完舊者曰燕居殿曰祠堂曰清風堂曰招隱堂曰客星閣曰山髙水長閣曰遂髙樓曰羊裘軒新者曰三公不換亭曰天下十九泉亭曰錦峰繡嶺亭曰東臺西臺兩亭甃登臺之路而為門以識之又作門其外榜曰釣臺曰富春山未幾燬明正統元年知府萬觀始重建傍闢二軒東曰清風西曰髙節榜其外門曰釣臺山腰仍建錦峰繡嶺亭東西兩臺各構亭𢎞治四年知府李德恢撤其舊而易之樹坊表於祠堂之前視昔加偉建德縣儒學在縣治東新定續志縣有聖廟圯於水宋嘉定間邑宰陳德一即縣門內東建廟諸葛安節為記淳祐庚戌宰惠德夫建門廡堂序王野重建建德縣儒學記嚴陵負山帶江為東南佳郡在漢則嚴先生居之在本朝則范文正公張宣公守之吕成公教之聲氣薰陶士風日盛建德附於郡惟廟祀夫子中更水毁鞠為邱墟嘉定癸酉令陳君德一新廟於縣門之東偏然門廡齊宇未具久為聚訟者偶語地淳祐庚戌毗陵惠君德夫來宰是邑始作櫺星門以表之復白郡更卜地於縣治之南而新之郡侯趙公汝歷捐帑以相其經始京尹資政趙公與􅊸畿漕集撰余公天任皆輸財以助其成為齋四曰尊德曰明德在於左序曰進德曰逹德在於右序獨庖廪未裕蓋將有待也嚴陵志元大德十年尹張紀重修王若水為記明洪武六年知縣顧執中撤舊屋而新之鄭濤為記宣德三年知縣侯康逺修文廟改建明倫堂正統六年知縣張鐸創後堂甃二橋成化八年知府朱暟易櫺星門以石柱護以興賢橋以石欄十八年知縣鄒魯建矩矱堂號房𢎞治六年知縣農猷構梯雲樓建德縣志隆慶間知縣周望徙建於城東建安山麓周望新建建德縣儒學記建德縣學舊創於秀山之陽宫殿湫隘爼豆弗稱豫見而病之後往來於建安山下見其蜿蜒磅礴原隰平衍四顧回旋川湖襟帶得壯麗之觀焉豫曰此勝地也清淑之氣於是焉鍾二三子舍其舊而新是圖盍卜諸此諸士韙之逹於三院監司咸下其議尋割榛莾伐林木命工庀材筮日興作經始於丙寅之冬踰年季夏廟先告成其齋廡廊祠以次而舉萬歷七年知府楊守仁建聚奎樓四十年知縣郝光輔建文昌祠國朝順治間知縣鄭應臯張文韜修康熙十一年知縣項一經署教諭事嵇爾勛創造十九年泮水傾瀉知縣夏景松修砌二十一年洪水衝頽知縣戚延裔重修射圃同府學名宦祠祀沈瑀以下十人鄉賢祠祀嚴光以下三十八人社學三所一在府治西一在城富壽坊一在興仁門外東關惟富夀坊者存義學在民字坊建德縣志邑侯戚延裔建龍山書院在興仁門外建德縣志舊在拱辰門外燬國朝康熙十二年知縣項一經建於興仁門外淳安縣儒學在縣治東南嘉靖浙江通志宋至道三年知縣孫讜建紹興九年縣丞汪仔重建方聞為記嘉定九年令應與權拓地建櫺星門洪璞為記嚴陵志淳祐四年知縣趙崇嶓闢二齋五年邑士汪自明建魁星樓寶祐二年知縣石孝聞盡撤其舊新之置東西齋方逢辰為記元至元元年知縣杜明顯重建禮殿至正十一年逹嚕噶齊額伯爾金建明倫堂兩廡戟門櫺星門增學田明洪武十一年知縣韓鈍建堂廡徐尊生重修淳安縣儒學記洪武十年河南韓侯魯伯來宰淳安以廟學嵗久不治謀於丞劉君思學簿張君士廉首葺正殿而增飾之列楹外附於堂廡復簷仰繼於榱題敞受業之軒修祐文閣改櫺星門增創學舍十有四間啓側門以便出入置别屋以祀中霤復於縣治西闢射圃工既訖徵文以識其成夫學校王政之本也淳安自昔多産秀民易教易治以其淳而能安故昔人以之名縣邑宰民之父也學官民之師也誠得愷悌之父賢明之師子惠而誘掖之左右夾持交盡其道不特諸生業精行成皆可以任公卿庶民亦且務本力田尊君親上然後興崇養育之實得以下究而無窮益信其為淳而能安之俗不亦善夫宣德三年教諭王端重建魁星樓嘉靖淳安縣志正統六年縣丞王永為射圃知縣洪淵市地為尊經閣未就景泰四年知縣劉著踵成之成化元年知縣鄧廷瓉建觀德堂六年魁星樓燬知縣王衡重建商輅為記萬歷嚴州府志嘉靖三年姚鳴建名宦鄉賢祠三十八年海瑞建櫺星等門增號舍隆慶二年鄭應齡置學田淳安縣志崇禎戊寅令蕭鳴美重修大成殿茅坤為記甲申諭曹三仕訓杜朱佐湯有望鼎新堂構國朝順治間教諭馮紹元重建明倫堂康熙間知縣劉可仕易殿棟梁干棟如重建兩廡射圃在學東名宦祠祀賀齊以下一十六人鄉賢祠祀方操以下三十九人社學三所並在市坊石峽書院在縣東北五里續文獻通考宋方逢辰講道之所度宗手詔賜額名柘山書院在縣東龍山鄉嚴陵志宋淳祐間黃蛻即所居前山以為授徒講學之所五峰書院淳安縣志宋黃蛻徐夢髙徐唐佐吕人龍讀書於此敬夫張栻題額後燬明金廷綬重修蜀阜書院在縣西招賢里淳安縣志宋儒錢融堂講學之所雲峰書院在太平鄉淳安縣志宋進士吳攀龍建後人吳欽重建清溪書院在縣東嚴陵志明成化十一年通判劉永寬建𢎞治四年知縣劉箎重修舊浙江通志嘉靖間知縣海瑞改建城隍廟左圯仙居書院在縣遼源深洞嶺畔舊浙江通志明商輅建南山書院在縣南南山下嚴陵志明按察副使邑人應皓建賔興書院在縣西印月池北淳安縣志明知縣蕭元岡建舊名鹿鳴書院吾溪書院在縣西六十里淳安縣志明邑人徐楚致仕依錢融堂故址東為子姓肄業所舊浙江通志嘉靖間知縣海瑞改建城隍廟左圯蛟池書院在縣西七十里蛟池淳安縣志明邑人王之言建雉峰書院在縣西淳安縣志明邑人徐楚建後改為雉峰社學髙山書院在城隍廟左淳安縣志明知縣髙秉衡為邑人吳希哲建龍山書院在縣東二里淳安縣志明進士方學龍建瓊林書院在縣東玊帶山左淳安縣志明令李光德建國朝順治十五年知縣張一魁重修東山書院在茶坡淳安縣志方瑞合讀書講學處桐廬縣儒學在縣治東北嚴陵志舊在西塢宋至和中令侯叔巘徙戴家橋北嘉祐中知縣劉公臣徙於東北之小山即今學基也宣和間燬紹興二十四年知縣趙公侃鼎新寶慶元年知縣趙汝憚建櫺星門紹定六年知縣趙汝驤創御書閣景定三年知縣胡太古構會友樓嘉靖浙江通志元末兵燬明洪武七年知縣毛道重建桐廬縣志正統元年知縣汪榮教諭劉宇宏建成化五年知縣李琛建大成殿十八年知縣盧朂構號房𢎞治四年參政周季麟新大成殿戟門教諭林哲甫建明倫堂正德六年大成殿燬僉事楊惟康知縣曹圭重建十三年知縣楊漢建尊經閣嘉靖三十一年侍御汪九齡建戟門築泮池造學路牌坊萬歷十二年知縣楊束鼎新崇禎十五年教諭馮公翥重建尊經閣國朝順治十七年知縣張如璿康熙二年知縣楊可楫相繼重修十九年教諭汪曾垣修建詹惟聖為記射圃名宦祠祀刁衎以下一十二人鄉賢祠祀嚴光以下三十七人社學即舊稅課司址滄江書院在縣西北十五里嚴陵志唐比部方勛之别業宋名儒方慤之故居也明徐舫藏書千卷隱居其中自號滄江散人王褘滄江書舍記滄江書舍徐君方舟之所居以讀書者也桐廬濵江為縣君居在縣北距不百武而近蓋唐比部方公勛之别業而宋名臣方公慤之故居君間來屬余為文記其舍壁夫書之在天下博且廣矣聖人之經儒者之傳諸子百家之著述歷代太史之紀録以及天文地理隂陽歷律兵謀術數字學族譜之雜出敷落旁行虞初稗官燕談脞語之並興其為説不同為教亦異而其為書類皆學者所當讀而通之者也雖然學問無窮嵗月有限誠有不能遍觀而盡識者而惟聖人之經則弗可以莫之究也是故易以明隂陽之理書以紀帝王之政詩以道人之性情春秋以示世之賞罰禮以謹上下之節文樂以通天地之氣運凡先王之道所以立天下之大本先王之制所以成天下之大業者皆於是乎在然自厄於秦訓詁於漢聖逺言湮愈博而愈失時異事易愈變而愈非其流弊有不可勝言者矣千數百年宋河南程子關中張子者出始克實踐精討而聖賢明德之要帝王經世之規所以垂憲後世者乃大有所發明其後朱文公張宣公吕成公一時並興而當其時如永嘉薛氏鄭氏陳氏葉氏閩中林氏永康陳氏後先迭出各以所學自成其家大抵均以先王之道為己任以先王之制為必行而所以立天下之大本成天下之大業者咸粲然方册間矣及於今學者顧因儒先講習既明之餘因循茍簡承前襲舊習矣而不察行矣而不著甚者以先王之道為莫之可行以先王之制為無所於用夫然則書自為書人自為人而學為空言矣此其為弊不有甚乎是故學者之於經不可徒誦其文而已也必將求其道以淑諸身明其法以用於世蓋惟誠求而實見篤信而力行然後知人之貴果可以為聖賢果可以位天地育萬物而所學不徒為空言也豫夙有聞於此竊嘗有志而願學焉比與君定交錢塘辱遣其子膺從豫逰會亟東歸不得與之相講習故因道豫所聞者書以授膺以復於君并請揭諸舍壁以為記藍田精舍在縣西北四十里藍田山上嚴陵志宋時里人姚世傑讀書之所崇正書堂在縣治北城隍廟之西桐廬縣志舊名鏡塘書院明嘉靖三十五年知縣吳紳改建萬歷元年本府推官周憲重修鳳鳴髙閣在桐君山桐廬縣志明萬歷五年知縣李紹賢