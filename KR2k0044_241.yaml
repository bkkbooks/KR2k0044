body:
  text: 浙江通志卷二百四十二經籍二經部下禮周官駁難三卷七録孫𤦺問干寶駁虞喜撰周官禮十二卷隋書經籍志干寶注難按唐書藝文志又有答周官駁五卷注云孫略問周官禮義疏四十卷隋書經籍志沈重撰周禮音經義考戚袞撰周禮圖十卷宋史藝文志龔原撰周禮纂圖二十卷焦氏經籍志陳祥道撰周禮詳說經義考王十朋撰周官通解十卷正德嘉善縣志聞人宏著周禮辨疑王與之周禮訂義永嘉薛季宣著周禮說三卷讀書附志朝奉郎祕書少監陳傅良進周禮制度精華二十卷玉海陳傅良徐元德撰周禮解義延祐四明志鄭鍔剛中著周禮序官考周禮訂義金華薛衡平仲著周禮傳東嘉姓譜戴仔述周禮總說喬行簡著見宋史本傳周禮說金華先民傳葉秀發著周禮隨釋𩔖編東陽人物志馬之純著周禮講義經義考曹叔遠撰宋史曹叔遠傳字器逺溫州瑞安人周禮綱目八卷周禮摭說一卷書錄解題括蒼林椅奇卿撰周官小集邱葵周禮全書陳汪撰字蘊之永嘉人周禮說萬厯溫州府志陳謙撰周禮說周禮全書孫之宏撰字偉天山陰人周禮說三卷南雁蕩志陳堯英著周禮辨疑周禮全書楊恪撰字謹仲永嘉人周禮辨疑周禮全書陳汲撰字及之永嘉人周禮解六卷萬厯義烏縣志徐邦憲著周禮發微三卷金華先民傳徐畸著周禮訂義八十卷宋史藝文志王與之撰成德周禮訂義序字次㸃樂清人周禮注兩浙名賢錄趙汝談著禮經㑹元四卷續文獻通考葉時撰周禮答問萬厯温州府志王奕撰字子陵瑞安人古周禮補正一百卷兩浙名賢錄胡一桂補正一桂字德夫永嘉人林千之為之序周禮義一卷續文獻通考元東陽内舍生何夢中與弟叅知政事夢然所作周官考三卷續文獻通考臧夢解撰周禮集說十二卷元吳興陳友仁君復撰周禮集注宋濓著未完見鄭濤潛溪小傳按明文衡作集説周官官名急就章一篇經義考王褘撰周禮考次目錄一卷續文獻通考方孝孺撰論按經義考孝孺又有周官二篇周禮辨疑四篇周禮考誤鄞縣志余本著周禮疏義兩浙名賢錄王啓著讀禮疑圖六卷聚樂堂藝文志季本撰周禮音釋檇李徃哲列傳吳昂著字德翼海鹽人周禮訓雋十卷周禮訓注十八卷黄氏書目陳深著字子淵長興人周禮輯說金華府志應廷育著字仁卿永康人周禮解兩浙名賢錄沈束著周禮解七卷東陽縣新志趙祖鵬著周禮考正六卷餘姚縣志王傑著周禮易傳台州府志葉良佩著周禮因論一卷尤氏藝文志唐極撰周禮緯一卷烏程董說若雨著注釋古周禮六卷黄氏書目郎兆玉著字完白仁和人周禮說一卷周禮答疑三卷經義考錢􅠒撰周禮大義六卷經義考吳任臣撰周禮彚斷五卷經義考吳治撰字道輿嘉興縣學生周官辨非二卷經義考四明諸生萬斯大克宗著周禮問二卷西河合集毛竒齡著以上總解周禮五官說五卷内閣書目宋紹熈間新昌黄文叔度著周禮五官集傳五卷萬厯嘉善縣志曹津著字元㑹闕考工記不解周禮天地二官講義十四卷玉海史浩爲建王府直講時撰周禮地官講義周禮訂義永嘉曹叔逺有地官遂人至藁人講義考工解經義考陳祥道撰周禮訂義天台陳用之有考工解考工記辨疑赤城志臨海葉皆孟我著蘭江考工記解周禮訂義金華趙溥著考工記句詁一卷經義考陳深著考工記輯注二卷黄氏書目陳與郊著字寧宇海寧人考工記輯注一卷黄氏書目朱大啓著字君輿考工記集說一卷經義考吳治撰冬官補亡三卷經義考錢􅠒撰周禮井田譜二十卷書錄解題㑹稽夏休撰周禮丘乘圖說一卷宋史藝文志項安世撰以上分解右周禮儀禮注一卷唐書藝文志孔倫撰經典釋文字敬序㑹稽人儀禮義疏三十五卷沈重撰見北史本傳儀禮陳書沈文阿傳所撰儀禮八十餘卷行於世注解儀禮三十二卷宋史藝文志陳祥道撰儀禮義十七卷宋史藝文志陸佃撰儀禮解二卷續文獻通考葉味道撰校定古禮十七卷釋文一卷識誤三卷書錄解題永嘉張淳忠甫校古禮書叙畧一卷萬厯溫州府志蘇太古撰儀禮經傳考次㑹稽縣志劉宗周撰儀禮名物考八卷經義考譚貞良撰儀禮説一卷經義考錢􅠒撰儀禮商二卷經義考萬斯大撰儀禮疑義二卷西河合集毛竒齡著以上總解冠記昏記喪禮家記各一篇楊簡撰見宋史本傳冠昏禮續文獻通考錢時撰冠昏喪祭圖赤城㑹通紀楊明復著冠祭禮儀吾學編陳選著字士賢臨海人昏禮辨正一卷西河合集毛竒齡著鄉飲酒辨疑王時㑹著見陸游王公墓誌鄉飲酒儀朱子語𩔖紹興初行鄉飲酒禮其儀乃是高抑崇撰鄉飲㑹通黄氏書目許孚遠著飲射圖解一卷焦氏經籍志聞人銓撰燕射古禮一卷台州府志葉良佩撰喪服譜一卷喪服要記十卷隋書經籍志晉司空賀循撰集注喪服經傳一卷隋書經籍志晉廬陵太守孔倫撰喪服經傳義疏二卷七錄齊給事中婁㓜瑜撰喪服經傳義疏一卷七錄齊徵士沈麟士撰喪服義疏二卷隋書經籍志梁歩兵校尉五經博士賀瑒撰喪服義十卷隋書經籍志陳國子祭酒謝嶠撰喪服義疏南史顧越著喪服經傳義疏四卷喪服發題二卷舊唐書經籍志沈文阿撰喪服後傳經義考沈括撰高氏送終禮一卷書錄解題高閌崇撰喪禮經義考馮椅撰喪禮台州府志黄宜著喪禮㑹經經義考葉起撰字振卿永嘉人内外服制通釋九卷續文獻通考車垓撰喪禮書分省人物考姜璉著字廷器蘭谿人喪禮酌宜萬厯溫州府志蔡芳著字茂之平陽人喪祭禮儀注解嘉靖定海縣志陳端禮著字履中喪祭輯要黄巖縣志牟堯臣著號思怡喪禮疏解海寧縣志許奫著居喪撮要兩浙名賢錄陸賛著字順德海鹽人喪禮雜記一卷經義考毛先舒撰辨定祭禮通俗譜五卷喪禮吾說篇十卷西河合集毛竒齡撰士冠士昏饋食禮圖續文獻通考嚴陵