body:
  text: 浙江通志卷二百四十三經籍三史部上正史注史記一百三十卷唐書藝文志徐堅注注史記一百三十卷會稽續志姚寬注史記考十卷萬歷義烏縣志徐邦憲注漢書訓纂三十卷漢書集解一卷定漢書疑二卷隋書經籍志姚察撰漢書古今集義二十卷唐書藝文志顧頴撰新校前漢書一百卷宋史藝文志趙抃著注范曄後漢書九十卷吳均注見梁書本傳後漢書一百二卷漢書外傳十卷唐書藝文志謝沈撰後漢書補遺二十一卷錢塘姚之駰魯思輯刋定三國志六十五卷續後漢書七十三卷金華先民傳張樞著後漢書二十四卷錢塘王廷燦孝先著晉書晉書謝沈傳沈字行思會稽山隂人撰晉書三十餘卷晉書二十六卷隋書經籍志晉虞預撰卷按唐書藝文志作五十八晉書一百一十一卷七録沈約撰晉書一百一十一卷唐書藝文志徐堅撰晉書注一百三十卷嘉禾徴獻録蔣之翹注宋書一百卷隋書經籍志沈約撰梁書五十六卷唐書藝文志姚思亷魏徴等同撰陳書三十六卷唐書藝文志姚思亷魏徴等同撰徐氏唐書三百篇金華賢達傳徐次鐸撰五代史集解續文獻通考徐無黨撰元史二百十二卷內閣書目宋濓王禕撰元史補遺十二卷尤氏藝文志朱右撰元史續編十六卷尤氏藝文志胡粹中撰要按明一統志作元史舉元史本末吾學編謝鐸著元史類編二十四卷仁和邵逺平戒三著明史刑法志三卷列傳四卷土司傳二卷慈溪薑宸英西溟著通史三百卷唐會要大中五年姚思濓撰霸史越絶書十六卷唐書藝文志子貢撰讀書附志吳越賢者所作按崇文總目作十五卷吳越春秋十二卷隋書經籍志趙曄撰吳越春秋削繁五卷隋書經籍志楊方撰吳越春秋傳十卷唐書藝文志皇甫遵撰吳越記六卷按隋書經籍志唐書藝文志皆不著撰人校定戰國䇿十卷書録題解栝蒼鮑彪著補注戰國䇿三十一卷寶慶會稽續志姚寬著戰國䇿正誤十卷金華先民傳吳師道著國按焦氏經籍志作校注戰䇿戰國䇿膾遂昌縣志項應祥元芝著戰國䇿槩四卷烏程縣志凌濛初著廣戰國䇿十七卷山隂縣志孫如法著國䇿去毒五十篇平湖陸隴其著見張雲章陸先生行狀左史傳五十一卷萬歷紹興府志唐閲字進道山隂人嘗以左氏春秋倣遷固史例以周為紀列國為傳又為表志贊七國考四卷吳興董説若雨著晉文春秋一卷楚史檮杌一卷百川書志元人吾衍子行序新修南唐書十一卷書録解題山隂陸遊務觀撰吳越備史九卷書録解題吳越掌書記范坰巡官林禹撰按中興書目其初十二卷盡開寶三年後又增三卷至雍熙四年今書止石晉開運比初闕三卷本錢儼作托名吳越備史遺事五卷忠懿王勳業志三卷戊申英政録一卷宋史藝文志錢儼撰家王貢奉録二卷家王故事一卷書録解題吳越錢惟演希聖撰錢塘平越州録一卷宋史藝文志宋元宏撰吳越會粹一卷按宋史藝文志不著撰人吳越紀餘尤氏藝文志錢貴撰順存録四卷仁和錢受祺撰順存集一卷順存外集一卷錢塘吳允嘉志上輯唐餘紀傅二十一卷焦氏經籍志陳霆撰十國春秋一百四卷仁和吳任臣撰契丹國志二十七卷黃氏書目葉隆禮撰雜史漢武外傳續文獻通志謝沈撰晉咸和咸康故事四卷隋書經籍志孔愈撰廬陵王傳一卷書録解題唐會稽徐浩季海撰元宗編遺録二卷宋史藝文志陸贄撰奉天記一卷郡齋讀書志徐岱記德宗西狩事南部新書五卷郡齋讀書志錢希白撰按宋史藝文志作十卷平剡録一卷唐書藝文志鄭言撰裘甫事乾寧會稽録一卷唐書藝文志董昌事邠志三卷書録解題唐凌準宗一輯唐事類編二卷金華先民傳李大同著後梁春秋十卷尤氏藝文志姚士粦撰開基事要十卷讀書附志陳傅良進亦曰建隆編按書録解題作一卷藝祖憲監三卷仁皇從諫録三卷宋史藝文志黃度撰東都要略萬歷溫州府志戴栩著光聖録一卷通志藝文略錢儼撰宣靖備史黃氏書目陳霆著避兵夜話一卷靖康録一卷宋史藝文志石茂良撰文獻通考字太初吳興人靖康盜鑑録一卷尤氏藝文志胡震亨撰北狩聞見録一卷文獻通考曹勛功顯撰南歸録一卷北盟會編沈琯著萬厯湖州府志字次律德清人維揚過江録一卷文獻通考葉夢得少藴撰四朝聞見録五卷嘉靖浙江通志葉紹翁著淳熙雜志𢎞治紹興府志程迥撰淳熙糾繆陳樵著見宋濓鹿皮子墓志宋季逸事張樞著見黃溍張子長墓表南宋六陵遺事一卷鄞縣萬斯同著宋朝事實類苑二十六卷宋史藝文志江少虞撰保越録一卷居易録記元至正十八年浙江等處行樞密院副使吕珍守紹興本末不著作者姓氏黃氏書目張士誠幕客作守城録溫州府志王致逺記父允初守六州事庚申君遺事一卷鄞縣萬斯同著明書檇李詩繫沈起著字仲方嘉興人訖於成化徴吾録二卷今言二卷內閣書目鄭曉輯四朝聞見録海鹽縣圖經徐成著五朝聞見録東陽縣志陳時芳著國𣙜一百卷海寧縣志談遷著國初事迹一卷奉天靖難記四卷焦氏經籍志劉辰撰翊運録二卷續文獻通考劉基撰平漢録一卷紀録彚編宋濓撰造邦勳賢録一卷淡生堂書目王禕著驅除録一卷黃氏書目姚淶撰龍興慈記一卷尤氏藝文志王文祿撰開國事略天啓慈溪縣志向斆著字師説路記八卷萬歷秀水縣志項篤夀撰革朝志十卷焦氏經籍志許相卿撰建文私記四卷革除編年四卷萬厯嘉善縣志袁仁著建文朝野彚編二十卷平湖縣志屠叔方撰建文逸史黃氏書目陸時中著字幼真歸安人遜國逸書黃氏書目錢士升輯建文年表嘉禾徴録陳泰交著革除備遺三録兩浙名賢録馮汝弼著監國厯略一卷淡生堂書目張楷撰大慈見睍録又述滄洲退賊事略一卷桃源建昌征案東鄉撫案共十一卷嘉靖仁和縣志胡世寧著敕諭録三卷諭對録三十四卷欽明大獄録二卷靈雪編一卷尤氏藝文志張孚敬撰諭對録萬厯溫州府志張汝紀編平臺召見紀事一卷徴信叢録趙志臯著勘楚始末一卷荼史一卷黃氏書目朱賡著紀勦徐海本末一卷徴信叢録茅坤著敘嘉靖間倭入東南事一卷徴信叢録沈一貫著倭變事略二卷海鹽縣志經采九德字常吉著當嘉靖倭變時常取幕府日報為事略談俶擾時事及諸帥功罪頗晰足備海上一時故實倭變志一卷黃氏書目李日華撰撫滇翊華録分省人物考王啓著却西番記一卷太和堂書目屠隆著征南録萬歷崇德縣志郭鼎著字文新全黔紀略一卷黃氏書目李橒撰封貢紀略一卷黃氏書目王士竒撰闖宫始末一卷淡生堂書日嶽駿聲著流寇志十四卷嘉禾徴獻録彭孫貽著彤史拾遺記六卷後鑒録七卷西河合集毛竒齡著實録神宗實録朱墨史二百卷玉海鄧溫伯陸佃修神宗實録考異二百卷書録解題范沖任升克張九成撰徽廟實録二十卷讀書附志程俱撰髙宗實録五百卷孝宗實録五百卷光宗實録一百卷宋史藝文志並傅伯夀陸遊等修時政記帝王政統唐會要姚思亷撰真宗聖政記一百五十卷宋史藝文志錢惟演王曾編次咸平聖政録三卷宋史藝文志錢惟演撰神宗寶訓二百卷宋史藝文志沈該撰元豐聖訓三卷宋史藝文志舒亶撰髙宗聖政草一卷書録解題陸遊修仁宗訓典詳釋又髙宗寶訓要釋宋史趙與歡傳趙與歡著紹興聖政寶鑑十卷萬厯龍遊縣志徐巘著字仲山髙宗寶訓七十卷孝宗寶訓六十卷目録二卷玉海袁燮進孝宗寶訓六十卷宋史藝文志史彌逺撰明日厯一百卷寶訓五卷吾學編洪武五年命宋濓序祖訓纂大明日厯七年日厯成又擇言行之大者為寶訓為序上之洪武聖政記上下卷焦氏經籍志宋濓撰洪武聖政記一卷續文獻通考劉辰撰洪武聖政纂二卷淡生堂書目董穀著武宗外紀一卷西河合集毛竒齡著嘉靖大政紀二卷黃氏書目茅維撰聖學紀要二卷聖政紀要二卷尤氏藝文志陳懿典撰按嘉禾徴獻録又有左陛記略十卷明大政記兩浙名賢録張元忭著明大政纂要十八卷黃氏書目余懋學著大政廣考嘉禾徴獻録錢潤徴著編年晉紀二十三卷隋書經籍志干寶撰十按唐書藝文志作晉書二二卷齊春秋三十卷隋書經籍志吳均撰齊紀二十卷隋書經籍志沈約撰南史沈約傳天監中又撰梁武紀十四卷北魏春秋秀水縣志姚士粦撰梁後略十卷隋書經籍志姚最撰國史編年政要四十卷國朝實録列傳舉要十二卷文獻通考蔡幼學撰宋通鑑詳節五卷吕氏家孰通鑑節要二十四卷宋史藝文志吕祖謙撰國朝編年嚴陵志錢時著孝宗繫年録趙順孫著見黃潛格齊先生阡表洪武紀事本末嘉禾徴獻録陳許廷著孝宗大紀一卷尤氏藝文志宋國祚撰永陵編年史四卷昭陵編年史二卷萬厯嘉善縣志袁祥撰續通編六卷尤氏藝文卜大有撰明通紀述遺十二卷黃氏書目卜世昌著秀水人明紀事本末六十卷嘉興縣志徐世湜著編年通載十五卷讀書附志章衡撰卷按宋史藝文志作十王政紀原又厯代紀年萬厯溫州府志王自中撰紀年統論一卷紀年備遺一百卷書録解題永嘉朱黼文昭撰大事記十二卷解題十二卷通釋一卷書録解題東萊吕祖謙伯恭撰續東萊大事記金華先民傳東陽孫德之著續東萊大事記七十九卷兩浙名賢録王禕著陸狀元通鑑詳節一百卷諸暨陸唐老著通鑑紀事本末四十二卷宋史藝文志袁樞撰通鑑集義續文獻通考輔廣撰通鑑集義八十卷金華賢達傳王師古撰字唐卿金華人通鑑新義溫州府志永嘉梅時舉舜臣撰通鑑約説永嘉薛季宣著見陳傅良薛公行狀通鑑手抄萬厯金華府志何淡著通鑑注兩浙名賢録趙汝談著資治通鑑音注二百九十四卷通鑑釋文辨誤十二卷寧海縣志胡三省著通鑑撮要十卷餘姚縣志莫叔光仲謙著通鑑節要括蒼彚紀麗水陳康子景邵著通鑑集要三十八卷聚樂堂藝文志諸燮撰通鑑編年六十卷餘姚縣志余誠著通鑑考證嘉靖寧波府志李孝謙著通鑑進講五十卷兩浙名賢録余繼登著通鑑事類一百二十一卷括蒼彚紀包瑜著通鑑前紀赤城新志戴良齊撰通鑑便蒙天啓平湖縣志陸萬垓著通鑑前編十八卷舉要二卷內閣書目金履祥著續通鑑要略十卷焦氏經籍志章衡撰通鑑續編三十卷百川書志元四明陳桱子經撰宋元資治通鑑六十四卷尤氏藝文志王宗沐撰綱目發明五十九卷讀書附志尹起莘撰綱目考證五十九卷𢎞治紹興府志徐昭文著字季章上虞人綱目備忘鄞縣志余本著綱目撮要補遺兩浙名賢録鄭瓘著簡要録又綱目參同會稽縣志陸曽曄著續資治通鑑綱目二十七卷百川書志商輅修通鑑綱目書法五十九卷兩浙名賢録金江著宋元綱目續修黃氏書目王啓著宋元綱目斷括蒼彚紀青田葉表尚文著通鑑綱目二十三卷宋史藝文志陳亮撰通鑑綱目注成化杭州府志洪咨夔著漢唐通鑑品藻三十卷淡生堂書目戴璟著人代紀要三十卷人代紀略三卷聚樂堂藝文志顧應祥撰史綱要領三十六卷尤氏藝文志姚舜牧撰資治厯朝紀政綱目七十四卷秀水縣志黃洪憲著綱鑑補注嘉靖太平縣志林天爵著編年合録八十卷遂昌縣志包萬有似之著綱鑑正宗歸安縣志張睿卿著史略啓蒙萬厯嘉興府志徐咸著運厯帝王厯數金華正學編王柏著五帝皇極志萬厯杭州府志盧楨著帝王經世圖譜十卷書録解題金華唐仲友撰讀書譜一卷書録解題陳傅良撰會要厯十卷赤城通會紀黃超然著丙丁龜鑑十卷戒菴漫筆淳祐中中書省奏名柴望衢州人上丙丁龜鑑宇宙略紀又世運録赤城新志黃巖車玉峯若水撰厯代正閏圖説隆慶平陽縣志元陳剛述厯代編年圖括蒼彚紀元縉雲范霖君澤著厯代指掌圖二卷金華