body:
  text: 浙江通志卷一百八十八人物八義行中湖州府漢錢讓兩浙名賢録世居吳興時吳郡太守薛固為法吏所枉詔付廷尉讓攜同郡婁縣卞崇詣闕稱冤廷尉收讓拷竟楚毒備至而讓辭色不撓遂囚於圜土守之以兵讓恬然自若枉聲彌厲天子竒其節用之費鳯吳興掌故字伯簫烏程人初舉孝亷拜郎中除陳國新平長宰司舉其才賢乃讓其弟而退身還鄉其後故鄣不靖命鳯試守即討平之轉堂邑令其弟仕為九江太守早卒又以腴田讓與弟之子行義髙卓詳見卜引石勛誄辭之碑晉吳逵晉書本傳吳興人經荒飢疾病合門死者十有三人逵時亦病篤其喪皆鄰里以葦席裹而埋之逵夫妻既存家極貧窘各無衣被晝則傭賃夜燒磚甓晝夜在山未嘗休止遇毒蟲猛獸輒為之下道期年成七墓十三棺時有賻贈一無所受太守張崇義之以羔雁之禮禮焉南北朝褚慧開嘉靖烏程縣志字智逺以拯濟為務孝武七年出穀賑貧鄉邑賴之有三人積飢食飽至死其家訴縣誣慧開飼殺餓人邑令笑曰乞食飽死反怨主人法無此科遣而不問隋姚最兩浙名賢録字士會武康人僧坦之子察之弟年十九隨父入闕明帝盛聚學徒校書於麟德殿最預為學士隋文帝踐極除太子門大夫後襲爵北絳郡公及平陳察至即讓封於察轉蜀王秀府司馬秀隂有異謀最屢規切不聽及敗最任以為罪時論義之唐施廷皎嘉靖湖州府志故鄣人性友愛三從同居無問言代宗聞而義之大厯六年旌其門宋朱承逸西吳里語烏程人居城東門為本州孔目嘗五鼓趨郡過駱駝橋聞橋下哭聲甚哀乃有人為勢家逼債錢三百千攜妻子將溺於水朱憫代還之其人感泣願終身為奴不聽復以二十千給之而去慶歷庚寅嵗飢以米八百斛作粥散貧民是嵗其孫服生後登熙寧進士第二沈竭德清縣志字孝光七嵗喪母痛慕無已既長獨營祖塋不煩族氏嘗遇大盜劫掠殆盡後探笥中得剩金則友人鄒德深所寄也亟封還之元沈野先歸安縣志歸安人仕浙省都總管照磨捐田千畝創義孰以教子弟鄉人來學者隨材成就又置義莊贍宗族鄉黨貧不能婚喪者量厚薄而給焉蔣必勝長興縣志字質甫長興人以明經教授髙郵升慶元主簿至元丁亥建義學割田二頃餘山地十頃有竒收租粒備用弟必夀必昌及猶子克明字德芳者善承先業至治間聞於朝賜額東湖書院泰定間除山長一員主教事仍創大成殿明倫堂東西兩齋聖賢遺像每嵗州收及教官致祭後復益田二頃山地四頃有竒諸用贍足又立大宗法以合族屬斥浮屠教以樹喪紀設義倉以濟鄉人置義冢以澤枯骨凡四世同居朝廷旌其門曰義門楊維楨撰東湖書院碑記祁寧撰義門蔣氏流芳序劉基撰蔣克明行狀明費容烏程縣志字含之烏程人永樂中為萬石長遇嵗大歉代納一邑稅糧有司上其事詔豫七品散官施濟兩浙名賢録歸安人居家修雍睦之行設義孰以訓族屬子弟使就食焉嘗至墓所適有盜砍其冢樹者即蔽身林翳間候盜砍完下地乃使人從容召語之曰吾不汝追恐汝墜地此樹皆吾祖宗神靈所依慎勿再爾盜愧謝棄所砍去濟令家人舁而與之錢完烏程縣志錢村人正統六年出粟二千斛助賑敕賜褒諭仍旌奬其門吳宗孟吳宗義歸安縣志邑人正統庚申嵗飢兄弟遵父安遺命賑粟千石景泰甲戍又飢復捐千石例當冠𢃄乞移榮於父朝允其請敕旌義門𢎞治壬子又大飢宗孟子璋捐白鏹千兩糴穀四千石助賑事聞於朝建父子孝義坊張禮歸安縣志邑人初試萬石長賦於民甚平正統已已浙閩二寇交訌禮挾策餉軍佐平之敘義授七品散官慕公藝家風著家範二十則五世同居合爨者百二十餘年𢎞治初詔旌義門俞昶塢仲寧徐總沈安俞益烏程縣志並烏程人正統景泰間循例納粟助賑給冠𢃄仍表其門張翼歸安縣志歸安人讀書慕義正統已已輸餉六百佐平閩冦景泰天順兩朝復輸粟五百賑飢憲司上其事優詔褒敘以耄年賜冠帶舉大賔潘昱烏程縣志號清隱邑人景泰五年嵗大侵安吉州尤甚民以徵科激變郡守趙某延昱問計昱曰若輩苦徵輸耳帑有嵗積願代輸一州全賦於是牛車所至歡聲載道官民賴以安全至豐年官為徵償昱焚券而還撫按上其事賜七品職銜旌表其門王和烏程縣志烏程人景泰五年嵗大侵郡守募能賑者燕之公堂以多寡為位次和謂長子玭曰數千穀細事耳爾出不首坐歸無見我玭至郡俟富室書數畢更益其數而書之適吕山吳氏後至數復有加玭坐其次和為不怡者纍日玭以情白郡守願再輸千石郡守張席獨宴之玭歸父子歡然玭字朝用以賑授義官尹政烏程縣志烏程人景泰五年賑粟八百斛詔旌其閭費鑑烏程縣志字市隱烏程人景泰中傾家救荒特恩豫儒官旌其門曰孝義正德初郡遭洪水哭訴御史臺請疏改折鄉人德之許百髙孝豐縣志孝豐人成化間出穀二千石賑窮民賜敕褒之溫璋烏程縣志號桂軒邑人成化問解糧京師道由山東值嵗侵民競鬻妻女完賦璋即捐所運糧千二百石代輸抵京假貸自納事聞有旨褒異給章服茅遷獻徵録號南溪坤父也好施豫人有緩急不惜傾囷以濟割負郭田百畝以贍族之貧者丁讃長興縣志字世美長興人遇嵗歉發貯穀三千石給百里貧民狷金助修尊經閣葺橋梁傾圮者一十三處以免病涉章廷俊孝豐縣志孝豐人隆慶六年出穀五百石賑濟尚義有旌茅國縉獻徴録字薦卿坤子撫伯兄子如已子割腴田五頃差五服親疏而周其急名曰茅氏義田又為義倉積粟以濟凶荒族有售百金産者三售三返其田蔡司馬子客死其遺腹子幾沒於豪右之手收畜之妻以女而教之成所過見道殣必具槥埋之以舟載絮襖衣寒者嵗常數十百人有婦抱絲而鬻於市持金還夫視之贋也相持而泣力償之諸生逋稅當黜各豫數百縑客五十無子贈之婢舉子凡過時不婚者必資之婚每言此天地好生之義也他所賑恤若李司務張孰師輩吳興人厯厯能道之沈孰湖州府志字子居烏程人郡大侵當事議平米價孰以趙閲道富彥國爭民賴以蘇築室培地有藏金見役者告曰此公土也曰然此吾土也當其藏時非吾土也趨告縣不稍自私家法嚴肅進止以古禮自持周文政長興縣志字惟德長興人任俠好施里中視若怙恃建宗祠以合族人又置義田義冢義學後以太學生授參軍詔表其閭關大宗烏程縣志邑人萬厯戊申大水獨力赴京會同邑朱應選等在邸合詞詣闕奏準湖州七屬錢糧悉豫蠲免年九十餘精力猶強健每出任勸賑事必力為之巡按旌其門朱應選烏程縣志字少渠邑人慷慨好賙恤宗黨不責報萬厯戊申遊學京邸聞郡大水與同邑關大宗合疏奏闕蠲免七州邑錢糧又湖水衝陷額田四十七畝有竒里民嵗辦虛糧甚困應選白直指使題豁焉茅一臯歸安縣志字星海邑人萬厯戊子嵗侵傾廪倡義輸穀五千石賑飢得旨建敦義坊於花林里吳世裕歸安縣志字伯順歸安庠生性孝友宗黨有貧乏者多所周恤萬厯己酉嵗大飢郡守議開賑世裕先發巳廪為之倡至築城墉建水柵拓宗祠修譜系繕祖塋掩骼埋胔脫人於厄恆殫力圖之其敦本尚義為一鄉推重夀至百嵗沈警烇舊浙江通志字肇生歸安人授華亭學博捐俸葺學宫課士之餘遇郡邑大事輒有建白歸里杜門著述子埏崇祀鄉賢曽孫三曽愷曽涵皆貴顯錢承望舊浙江通志字駿聲長興人嵗飢縣令委往江右糴賑適米貴遂鬻田補價口不言功又捐金贖還掠賣之女不受其報吳煜歸安縣志字文度湖州府庠生積纍善行捐資置祭田偕族人共祀逺祖里黨不能婚葬者必拮據以助訓子孫惟以積善二字著有家訓及守待編嚴義舊浙江通志字素安歸安人路拾遺金守之信宿以還其主偷兒踰垣入識其為里中兒急持金贈之促之去恐家人取火見之則終身不得為人矣及殁其人臨喪痛哭曰非公孰能全我安忍沒公善姚世贇舊浙江通志字容齋武康人以數百金買地葬親術家言其穴當遷數丈但不利鄰冢贇曰豈可妨人以利已耶卒不遷其友以千金寄贇將死謂曰不必償後其子産業蕩盡贇重為之立業國朝丁瑨鄉賢留祀册長興人嵗貢生事母孝年七十庭桂生芝一本人稱孝感嵗洊飢倡率捐賑於路多設厰遍給饘粥民免流離康熙二十七年入祠朱耀鄉賢留祀册長興人居家孝友敦尚實行樂施濟困鄉黨稱之寧波府漢王修成化四明郡志句章人順帝時為揚州從事軍變殺厯陽太守伊曜修誓衆奔入賊營取曜尸葬之人服其義鄭雲兩浙名賢録字仲興鄮人與梁宏俱為吳郡太守尹興主簿興以楚王英事覺被收并雲下洛陽獄雲篤始終之義明興非辜不以拷掠誣服竟獄死後使者以陸續母具食事隂嘉之上書説行狀乃赦興等放還鄉里禁錮終身雲既死旌表門閭梁宏兩浙名賢録少隱海隅有盛名吳郡太守尹興辟為主簿楚王英謀逆隂疏天下善士及事覺顯宗得其録有尹興名乃徵詣廷尉獄宏與門下掾陸續功曹史駟勳及掾史五百餘人詣洛陽就考諸吏不堪痛楚死者大半惟宏與續勳拷掠肌肉消爛終無異辭後得釋放歸田里宋馮制成化四明郡志字公初慈溪人康定間大飢民至相啖食家有穀數千斛悉貸之賴以全者百餘家舍東有古陂縣長牟經俾鄉先生王致楊適耕之民數奪其瀦水制諭民穿古渠引潮以溉無復奪水之擾二先生割田為夀制曰吾哀先生窮耳豈望報耶踰錢塘會故知錢寺丞負客債數百緡索之急悉與償之居常聚族子弟誨之使學務中規矩未幾弟準子碩姪景相繼第進士躋顯官陳大雅象山縣志象山人性慷慨賙恤親族里黨空乏者無少靳嘗舍逆旅遇同邸客病將死衆散避大雅獨晨夕相守傾槖裝治湯藥俟病愈始去人服其義長於詩趙清獻抃深器重焉童判子嘉靖寧波府志鄞人逸其名嘗為典庫稱判子家養疏屬數口奉寡姊承順不違其甥不事産業屢負人債輒為償之不以告姊王安石以鄞令物色之遇以賔禮王文亮奉化縣志字昭逺嘗渡浙江有忘金百兩於舟者文亮最後獨見之留三日待其人至歸之而去不告以名見王安石所撰墓志沃元瑀舊定海縣志字君寶熙寧八年嵗穀不登疫癘大作元瑀躬行郊野掩覆胔骼日散庾積以應貸者及秋亦不責償悉焚其券翁升天啓慈溪縣志字南仲登元豐三年進士弟自奉簡簿而勇於急人睦親恤孤平糶賑乏鄉人敬之諱升斗之升而不呼别字之曰十合陳之翰嘉靖浙江通志字憲之鄞人初鄉人貸金若干其人紿曰金誤墜水之翰不疑也後數年其人內悔疾且死遣其子歸所償金之翰受而不拒徐以所償助其喪葬崇寧二年部使者薦於朝官之林暐成化四明郡志字公著鄞人大觀間陳忠肅瓘寓於鄞暐獨厚之後徙謫他所問遺不絶建炎四年明州燬於兵暐未暇葺舍宇首捐錢數十萬修理學宫且輟田五十畝為養士費太守舉以風郡人聞子德鄞縣志字克新與弟子聰創祠曰思逺構東西二堂曰積善積慶造橋利涉咸稱曰聞郎橋開彈烏堰以置碶通潮蓄水溉田鄉民沾利咸稱曰聞郎碶飢者資粥病者資藥死者資棺闔邑以善人稱李猷兩浙名賢録字嘉仲一字獻夫鄞人建炎初以婦翁沒王事自汴京詣南都行在所遇友人陳少陽東被召至舍館未定乃為假館於太僕寺丞陳正彚東再上書不報有榜通衢斥附會李綱者猷知為東將勸之歸而東已逮赴應天府隨戮於市猷哭且祈曰少陽以忠諫死徑節英氣當不與草木同腐吾欲收以歸葬莫能得少陽有靈其啓我心越一日得尸又一日得其元合而斂之方買舟東下會其鄉人胡中行從太學來欲親護喪猷服其義并以行李付之亦不暇詢婦翁事而還余晦定海縣志定海人天錫從子歷官尚書置義莊以贍宗族汪伋成化四明郡志奉化人與弟份並好義樂施嘗捐資建郡學及橋梁七十二處參政樓鑰記其事王漢英成化四明郡志字彥古奉化人登淳祐元年進士第少聘徐氏女因病鼻腐以貌醜自嫌誓不嫁父母辭曰君盛年髙科不患無良配不敢以辱君漢英曰汝女有疾非漢英誰適既婚相敬如賔妻沒終身不畜婢妾豐有俊行營雜録字宅之四明人過倡樓見一妓疑是故人女纍目之妓亦省酒罷留宿詰之果然豐曰某所以留者以坐間不敢問也且各就寢必有以處汝豐與京尹有契明日以白尹且云某僅有錢百千從公更貸二百千嫁之尹嘉其誼即取入府厚奩具擇良士嫁焉尹即王宣子佐也袁升宋史本傳慶元府人為郡吏給事通判廳勤謹無失嵗滿當代不聽去後通判至復留用之因至豐饒夫妻俱近五十無子其妻資遣之往臨安置妾既得妾察之有憂色且以麻束髮外以綵飾之問之泣曰妾故趙知府女家四川父殁家貧故鬻妾以為歸葬計耳升立送還之其母泣曰計女聘財猶未足以給歸費且用破矣將何以酬升曰賤吏不敢辱娘子聘財盡以相奉且聞其家尚不給盡以囊中資與之遂獨歸妻迎問曰妾安在告以其故妻亦喜曰君設心如此行當有子明年生韶官至參知政事元王昱舊浙江通志隱鄞之吳山元初徵辟不就南江為鄞奉孔道渡江者多溺昱獨力建橋二十四洞橫截急流至今賴之裔孫塪明𢎞治間為御史童金兩浙名賢録字子丹慈溪人至元間以才能薦授進義副尉嵗督海運秩滿扁所居曰一間築堤浚澤興水利於鄉即先廬側築室百餘楹為義孰割腴田四頃延名師以淑來學又别置田二頃代鄉鄰之輸及給貧不能養死不能斂者大德中嵗飢發積以貸全活數千人有司奏旌其門倪天淵嘉靖寧波府志字震亨鄞人樂施與窮乏者假貸無吝色有負逋者即焚券不責其償嵗大疫手製藥以施之時江南嵗漕白糧由海運達畿天淵籍占漕役躬自蹈海有舟十艘每運數萬石他舟或滲漏米腐不可餉即以餘資代補之至元戊寅漕舟多沒於風天淵舟漂髙灘上衆欲捨舟天淵且拜且禱俄而神炬見桅端光輝燭人風回獲濟中臺御史袁賽音布哈按行海道嘉其盡力王事狀聞於朝旌之曰髙年耆德之門葛魁天啓慈溪縣志邑人世居邑庠之南櫺星門當其所居之後元貞四年有術者相學基云必南嚮直達為甬道局壯氣通科第大振魁聞之毅然曰吾何惜此片地不以全一邑之美耶遂割其址之半廣五十尺袤三百五十尺屬之黌宫以廣其制樂大原嘉靖寧波府志字君道定海人大德丁未東浙大祲大原發巨艘販泉南廣東之米平價使人就糴逺近畢集活者甚衆父占籍清泉鹽場凶嵗官不降本亭户失業大原發資視官本增三之一以貸諸户隨其力之所及而收其入被惠者衆有持舊書易米濟飢者輒應之遂蓄至數千卷曰吾子孫必有能讀是者孫良果能讀書一時名卿若黃溍王褘咸器重之張文英鄞縣志字君秀居甬東隅修砌百丈街石以浮橋為通達之處延祐二年建亭橋側施茶水以濟渴避風雨夜則安宿守橋之夫及卒人皆德之即亭為祠嵗祀不廢薛觀嘉靖寧波府志字景茍一字處靜鄞人在宋時聚族千指同居合食者五世號義門薛氏觀於至治癸亥以書經登賢書分教平江之常熟後遷杭州教授攝沅江縣事既而引年致仕陸天祐鄞縣志邑人慕濓洛之學欲建義孰以教鄉之子弟未就而卒遺命其子居敬思誠俾成之泰定天歷間構孰一區於東湖近髙錢里中奉文公朱子兄弟共割田百六十畝為報祀廪餼之需浙東帥王木齋名之曰東湖書院堂曰育英延師講學以淑一鄉子弟程端學為之記陳紹兩浙名賢録字成甫慈溪人家饒於資而性尚淡泊粗衣糲食惟以行義為急遇鄰里喪不能舉者葬之死不能斂者資其衣棺貧不能自存者賑以粟里有金生者貧而能守紹敬而憐之密於暮夜持金錢投其家時邑令富德庸嘗主其家紹告以撫字當急瘠民肥已君子弗為令終任一介不取及代歸囊槖蕭然適長女死紹為之斂且出所積以助其裝應本仁鄞縣志字本立邑人嘗慕范文正公為人建義莊五百餘間割腴田五百餘畝收其嵗入以濟人困乏及婚嫁喪葬之不能舉者又即其中為義孰延名師以訓宗族鄉黨之子弟供膳服用悉有常制時其出納定為條約使後裔世守之翰林學士黃溍紀其事於石羅世華嘉靖寧波府志字明逺慈溪人與弟世英𢎞惠天錫世昌一氣偕老五世同居至正二十四年有司上其事於朝旌其門曰同居耆德羅氏之門明韓性貝瓊韓處士碣字可善世居定海後徙鄞天性重厚遇物以誠不事表暴所入雖薄而好周窮恤匱凡婚無以為資喪無以為禮必謁其門鄉人有公私逋不能償為代輸之不責其償嵗大疫比閭中戒相過性率醫往視或輿致於家既愈而遣之未嘗有矜色又規置田若干畝為義莊以收族人建義孰以教子弟其兄某初以途人遇之稍長即異居家素饒於資性十裁有其一二人病不均曰吾豈憂吾貧耶嘗於隱處獲遺珠升許悉歸其兄浙西亷訪司僉事浦江鄭浚嘗抵其家喜其為人因遺以麟溪集遂取為子孫法楊苪成化四明郡志字大章慈溪人衣食僅自給少有餘則分賑其貧者非義不茍取與途行偶見褚鏹若干錠有質券候立良久一人傍徨走前核其實歸之元學士危素御史余嘉賔交薦不起洪武四年有司特起之以疾不行子伯純授南康都昌縣丞孫圭知南陽郟縣世篤先訓不喪所守王國祚定海縣志邑之浦東人洪武二十年信國公湯和遣徙居民通邑病之國祚奮趾揚夾語同難者曰大夫弗效尺寸力為桑梓謀奚以為人遂兼程赴金陵面陳不當盡徙之狀髙帝允奏賞勞遣歸餘民得不就徙鄉人德之名所止處曰復翁以此地藉翁而復也方德初嘉靖寧波府志字夢仁奉化人四世同居百口共爨子一人從子十一人以資産均分之凶年為粥以食餓者鄰人鄭氏以貧鬻女為人婢妾德初贖還之自奉甚薄而性樂施與謝茂成化四明郡志字茂之鄞人洪武庚申鄉人鮑原祥以兄子忠任監察御史卒於官貧無葬地謀於茂茂曰我有地隂陽家以為得局雖千金不易也願與之又嘗割地葬千戶湯文之母後二家各出金以酬茂拒而不受楊自懲名山藏鄞人為縣吏縣宰撻一囚流血滿前怒猶未息自懲跪而寬解宰曰此人越法背理不由不怒自懲叩頭曰竊聞曽子云如得其情哀矜弗喜喜且不可而況怒乎宰為霽威家素貧縣吏有常例餽遺一無所取遇囚人乏食多方賑救一日有新囚數人待哺家亦缺米與其婦謀之婦曰囚何來曰自杭而來沿途忍飢五日不食矣因撤釡中米煮粥以食之何瞻兩浙名賢録鄞人正統間與同邑胡純同升國學純病疫鄉里姻舊皆避去瞻晝夜診視督其僕饘粥煮藥七日而候不應曕憂之解衣與並枕抱之卧遂得汗而瘳瞻亦無恙後與純俱登進士純每語人曰今日以往皆何兄所生之年也終身事曕如父俞民化舊定海縣志邑人倜儻好義鄰里有鬬爭出數語折其曲直且諭以禮人即引咎若不自容至相戒云無負俞君之戒正統間值嵗侵輸粟五百石於官助賑縣令勒石以旌其義陳處廷虞陸虞玖李浩丘本源沈志道周得延任福朱茂春潘本餘鄞縣志當英宗北狩時徴發驛騷又嵗祲艱食民不聊生處廷率先倡義輸粟二千石備賑陸與弟玖及浩聞風興起輸粟如處廷而本源以下諸人各出榖有差賴以全活者甚衆有司嘉其行誼聞於朝特賜璽書勞禮旌為義民其時又有王勤亦以輸粟給賜冠𢃄王汝林兩浙名賢録奉化連山鄉人性好施凡貧病過門者接之不厭逺近慕其名陸司寇瑜時為邑庠生貧不自存往詣之林時浴於溪陸以謁告遽起而入攝衣延之上座盛為之禮次日即遣人濟陸之家然不以告也比留連旬日陸乃自言其情曰竊慕公髙義幸而欵我其如家纍何汝林出謝啓示之陸起拜曰不虞君之惠我若此辭歸明日汝林盛張具觴而送之凡寒暑之衣畢備且贈之金錢璡鄞縣志字廷珍邑人景泰甲戌進士與兄圭倡築長隄計二百八十丈被其利者三邑七鄉共一百二十有六里民稱之曰錢公塘柴傑鄞縣志字延俊邑人天順乙卯舉於鄉計偕上京適舟人夜泣欲投水死傑問其故知為官租所迫即捐路資使償之明年下第歸復遇前舟人仍載其舟是夜舟人飾妻進謝傑正色叱之去繆亷嘉靖寧波府志定海人兄弟七人至老同居聚族近百口自祖保障父永宗至孫蘭計五代耕讀各職其業鄉人義之薛通舊定海縣志字德明自鄞徙定海嗜善樂施人告以不給輒捐所餘賑之不能償者焚其券其先世在宋時有朋龜者五代同居號為義門通守世德不改邑令陳軾扁其堂曰崇義楊苗嘉靖寧波府志字德成鄞人成化間詔民輸粟助邊一時未有應者苗獨出粟二千五百石躬輸之邊特賜璽書立義門旌之周相兩浙名賢録字良佐奉化人嘗遊學外藩夜有女奔之拒不納詰旦即辭去赴省試有友疫於舟同行皆棄去相獨留謹視之及不起出已資備棺衾親為之含斂焉後以貢司教茶陵諸生貧乏者輒以俸餘濟之束修之饋不問也敝居不蔽風雨薄田不贍餐粥而周死恤貧開義孰以教族子尤人所難云董鋭鄞縣志號裕菴邑人遇嵗飢出粟煮糜活人國賦不足郡守貸鋭二千金鋭即捐助代貧民之逋守上於朝賜七品散官一夕有衆叩門將行劫鋭飲以酒人贈五十金語之曰人生宜自愛吾獨不能致若等於法乎皆俯首謝去越五載諸人各攜金如前數踵鋭門曰日者賴君惠經營孳息皆成家計今以奉還所不至者數人耳一時傳為異事嵗暮至西陵得遺金於旅舍因留不歸至明年三月有號慟而來者曰吾父受主者命攜五百金餉某偶以夜渡遺忘今拷掠備至豫豈望金之存將碎首於此白吾父以不欺耳鋭曰吾為若留久矣速歸拯爾父舉以還之城西有河艱於涉捐資造橋以濟周宗達象山縣志象山人象未城時寇突至盡邑奔避時囹圄有若干人即其妻子不暇顧宗達曰囚亦人也可令稿腹死耶獨冒刃給囚饘粥邑令義而旌之鄞商某夜遇鄰家火失篋中金坐號及旦宗達曰吾從衆中攫得懼為他人攘去耳如數子之商謝而納不知其非所失之金也駱元象山縣志象山人嘉靖末年島外漁人約六十餘偶為疾風飄舟至金齒觸入內地守泛卒羣譁曰此可擒也遂縛之以獻主者時元為里老從旁力諍曰天道神明炯於白日奈何妄殺無辜詞色凛烈主者心動立釋之六十餘人搏顙而去戴䲀獻徵録字時化别字少山家鄞之桃源舉嘉靖乙未進士與人無親疏輒悃悃見情素而恤災救患尤所孜孜會試時一同舟者得痢疾友各棄去䲀獨周旋其間湯藥含斂靡不盡力南太僕陳公侃入覲與遊雲龍山暴殂出已資為之治斂賀琦舊定海縣志字廷玉為邑生時以靈巖石方碶頽圯既久民困日滋乃白縣令鄭餘慶首先倡義庀工伐石殫力修築蓄泄有時而靈巖一鄉斥鹵可田者計四百餘頃溉及鄰壤者無慮百餘頃冬月見海樵十餘輩溺水得出幾不能生琦即哺以糜粥衣以緼袍乃得俱醒鄰人有死不能棺棺不能葬則出資贍之楊允恭嘉靖寧波府志名欽以字行鄞人憫鄉人湖田重稅之苦鬻産走京師纍疏闕下濵死者數矣迄不止卒得請行省勘覆郡守林富力主其議得從慈溪花嶼湖全折之例民困用舒詳見祠祀陸大漳鄞縣志字德學邑人年少時館於烏鎮一夕忽聞叩門聲啓視則一姣好幼婦也大漳斥之閉門挑燈危坐達旦向主人言適得家信須急歸遂辭去有范奎者得館資十餘金嵗暮與大漳同舟返時共載人衆將分途范遺其金而去大漳於舟底拾得之亟趣僕追范果其所失金也范願分以相酬力辭不受袁文信袁文仁奉化縣志文信象山人萬歷十六年嵗大侵餓殍載道官募富户出粟賑之與弟文仁共輸粟一千石四十四年又飢逺近慕袁氏名皆枵腹到門量授米穀以濟全活甚衆王良璧象山縣志象山人好施子嘗有貸者力不副將鬻妻以償聞而亟止之焚其券夜獲偷兒乃故鄰也慰之曰爾以貧纍故濟之錢穀終身不暴其名里人某逋官租若干幾斃獄良璧捐槖代輸三百餘金有司亷其事以尚義旌焉髙􅙆舊浙江通志號玉陽鄞人嵗飢首倡捐賑之法隨地煮糜有盜鬻其産者願以女償折券叱之恐其他鬻呼其壻歸之以子斗樞貴纍封副都御史包元會鄉賢留祀册象山人邑庠生值嵗荒發米煮粥以食貧者全活甚衆明末海賊劉香老等國朝猖獗建議築燉臺以為瞭哨防禦之計海疆賴焉康熙三年祀鄉賢國朝范大捷舊浙江通志鄞人庠生世父無嗣以大捷為後事兩母俱得其歡心平生周急無吝色兼精岐黃遂以醫名其出療人疾常先往貧乏而後及舟車之迎者里中有貧婦將娩忽患疾甚危大捷攜藥日六七往曰此婦若危是損二命也後得俱生居常訓子弟以修德行善不可有所覬而為之人以為名言年八十六卒虞光祚寧波府志字爾錫鎮海人父世熙慷慨多義行光祚弱冠為諸生明末授通判未仕順治十六年夏海寇入內地掠童子去者無算後復棄於崇明漂泊太倉松江間光祚時客於吳解槖資之歸并請於太倉州守白登明申江南巡撫檄屬縣具舟給口食遞送歸里者數百人至松江亦如之踰年客秦巾遇同邑二童子亦己亥被掠者贖之還家謝泰履寧波府志字時素鎮海人孝友博聞慷慨持大節順治己亥海寇犯南鄉燬長山橋解槖中金創修之行者便焉孫簬舊浙江通志字鳯覽慈溪諸生雅志經濟謂可見諸施行嘗除夕甕儲米不及斗有故人扣門乞米分其半餉之陳元肇寧波府志字萬春鄞貢生敦行不怠嵗乙未邑巾飢倡義出榖二千石以周鄉閭之貧者其叔耆士陳嘉恩從弟國學生陳元英亦各出穀一千石相助賑濟藩司給扁旌其門紹興府漢陳囂於越新編山隂人與紀伯為鄰伯竊囂藩地囂不較益徒地與之伯慙歸侵地囂不受讓為大路鴻嘉中太守刻石旌之曰義里虞翻嘗稱其漁則化盜居則讓鄰感侵退藩遂成義里今俗稱讓簷街云戴就後漢書本傳字景成會稽上虞人仕郡倉曹掾揚州刺史歐陽參奏太守成公浮贓罪遣部從事薛安案倉庫簿領收就於錢塘縣獄幽囚考掠五毒慘至就慷慨直辭色不變容主者窮極酷慘無復餘方乃卧就覆船下以馬通薰之一夜二日皆謂已死發船視之就方張眼大罵曰何不益火而使滅絶又復燒地以大針刺指爪中使以杷土爪悉墮落主者以狀白安安呼見就謂曰太守罪穢狼藉受命考實君何故以骨肉拒扞耶就據地答言太守剖符大臣當以死報國卿雖銜命固宜申斷寃毒奈何誣枉忠良強相掠理令臣謗其君子證其父安深竒其壯節即解械更與美談表其言辭解釋郡事徴浮還京師免歸鄉里太守劉寵舉就孝亷光祿主事病卒三國吳吳範嘉靖浙江通志字文則上虞人與親故交有終始素與同邑魏滕相善滕嘗有罪孫權責怒甚嚴敢有諫者死範謂滕曰與汝偕死乃髠首自縛詣門下因突入叩頭流血權良久竟釋乃免滕滕謝曰大丈夫相知如汝足矣何用多為後封都亭侯卓恕兩浙名賢録字公行上虞人為人篤信義然諾不茍與人期約雖暴風疾雨無有不至嘗從建業還會稽太傅諸葛恪問何時當復來恕期以某日至期恪與主人停食以須時賔客會者皆以為會稽建業相去千里道阻江潮風波難必豈得如期須臾恕至一座皆驚邵疇嘉泰會稽志字溫伯山隂人為郡功曹孫皓時太守郭誕以不白妖言被收遑遽無以自明疇進曰疇今在明府何憂遂詣吏吏上疇辭皓怒尤甚疇恐誕卒不免遂自殺以證之誕遂獲免皓嘉疇節義詔郡縣圖形廟堂晉孔祗晉書本傳字承祖會稽山隂人太守周札命為功曹史札為沈充所害故人賔吏莫敢近者祗冒刃號哭親行殯禮送喪還義興時人義之裘尚過朂裘氏義門志父睿隨元帝渡江避地婺女尚於義熙中徙居會稽縣南三十里世勤耕桑家積仁義越五代當宋乾德年踰六百載人無别居內不異爨大中祥符間旌表門閭蠲復徭役南北朝嚴世期宋書本傳會稽山隂人好施慕善出自天然同里張邁三人妻各産子時嵗飢儉慮不相存欲棄而不舉世期聞之馳往拯救分食解衣以贍其乏三子並得成長同縣俞陽妻莊年九十莊女蘭七十並各老病單孤無所依世期衣食之二十餘年死並殯葬宗親嚴𢎞鄉人潘伯等十五人荒年並餓死露骸不收世期買棺器殯埋存育孩幼山隂令何曼之表言之元嘉四年有司奏榜門曰義行嚴氏之閭復其身徭役蠲租稅十年魏溫仁𢎞治紹興府志上虞人齊僕射徐孝嗣為東昏侯所殺故人莫敢收視獨溫仁奔赴以私財營其喪唐羅讓唐書本傳字景宣越州會稽人父喪幾毁滅服除布衣糲飯不應辟署或以婢遺讓者問所從答曰女兄九人皆為官所賣留者獨老母耳讓慘然為焚券召母歸之纍官福建觀察使兼御史中丞宋石賀𢎞治紹興府志新昌人太平興國中初立縣治建邑庠賀以家資代其費黃振於越新編諸暨人嘗建樓以望村墅未舉炊者往遺之米寒無告者遺之衣其妻劉亦斥奩槖置義莊以濟族黨鄉人德之名其樓曰望煙莊曰仁夀後振以子貴贈衛尉少卿妻封仁夀夫人子孫代顯裘承詢嘉靖浙江通志會稽人居雲門山前十九世無異爨子弟習弦誦鄉里稱其敬睦大中祥符間優賜粟帛燕翼貽謀録大中祥符四年十二月己未越州言會稽縣民裘承詢同居十九世家無異爨詔旌其門今二百三十六年矣余嘗至其村廳事猶在族人雖異居同在一村中世推一人為長有事取決則坐於廳事有竹箄亦世相授族長欲撻有罪者則用之嵗時會拜同飲咸在至今免役也劉承詔趙抃劉氏義門記上虞縣蛾眉鄉人家同居四百餘人同籍者十世上聞旌表門閭常賦之外悉免徭役孫椿年於越新編字永叔餘姚人置義莊食親族之貧者嵗飢輒出粟以賑又嘗助資築堤捍海及卒無親疏皆痛惜之黃汝楫寶慶會稽續志會稽人家頗富饒宣和中方臘犯境以素積金錢瘞於居室避地山間忽賊黨執白旗來揖且拜黃驚懼答拜認其人蓋舊僕也云主將拘掠士女閉之空室持金帛贖則釋之否則盡殺黃惻然問所囚幾何人曰無慮千數曰我藏物可直二萬緡欲舉以獻而贖其命可乎歸報如其請乃悉發所瘞輦輸其營千人皆得歸詣黃謝為之誦佛祈福歡聲如雷至紹興中黃為浦江令其子開閣閎同登乙科後二子聞誾繼之石公轍嘉泰會稽志字道叟會稽人鄉里名士有朱布言者殁於東都兄昌言聞赴告欲質産迎其喪而公轍已送柩在門矣方希言病疫無親黨在都獨公轍謁醫為治療既不起則空其囊為具棺斂買舟載之歸得眼疾幾喪明夜夢希言如平生曰有爾朱先生藥其效如神覺而異之明日至京口有賣爾朱先生眼藥者求之出百許貼皆細如芥子服未數日瞳人如著冰舟行至江東則已清明復初矣紹興初以特奏名第一人賜同進士出身仕至大宗正司主管宗室財用云徐端臣於越新編字正卿蕭山人嵗飢輒出粟平價以濟貧乏創社倉飾學祠療病以藥贈死以棺義聲宣於遐邇浙東提舉朱熹行部至縣特造其廬後以子爵恩補宣義郎卒年八十三沈堯孚紹興府志字子賢餘姚人同舍某被逮甚亟堯孚百計脫之某自分無可報而隂使其妻夕焉堯孚驚起趨户外叱曰吾以義脫汝而汝以不義汚我何也遽引避去終身未嘗泄其事昆季五人當析箸取其瘠者羣從子弟悉授室成立之里有緩急各厭其意而去後以孫應文貴纍贈大理卿顧彥成萬厯紹興府志蕭山人以蔭補官歷兩浙運使以書堂為學基田三十六頃為學田中書舍人薛昻志其墓姚景崇萬歷紹興府志字唐英嵊人開慶中建義孰延師設教英俊多遊其門吕次姚𢎞治紹興府志餘姚人嘗立義孰於邑治之東延致名儒湛若為之師若通六經逺近來遊者常數百人次姚日加供膳後多至顯官陳祖兩浙名賢録字惠卿新昌人郭睦宗黨嫁其孤女數人貰負平糴邑人德之創義孰延名師以淑鄉之俊秀凡饔膳薪水僮僕咸具嵗費錢萬緡士由以登庸者後先不絶祖沒從孫雷克繼其志創桂山東孰而以祖所建名西孰由是逺近來學者日衆門牆冠蓋相望兩孰之名聞於四方又置義田義役義倉義井義阡義局以賙恤鄉黨邑人至今談陳氏事有墮淚者吳自然𢎞治紹興府志字義甫餘姚人家富好施德祐元年嵗飢發廩賑鄉里部使者為立髙誼坊元至大初嵗大飢自然子埏復助有司賑給州上其事中書旌其居曰積世好義吳氏之門王英孫萬歷紹興府志字才翁會稽人歷官將作監簿辭歸值越中大飢發私廪以賑全活甚衆道上有棄孩輒收恤之又喜延致四方賢士日以賦詠為樂若謝翺鄭朴翁林景熙唐珏輩皆慕其義與之友唐珏西湖遊覽志字玉潛山隂人家貧聚徒授經營􅎵瀡以養母元至元十五年總江南浮屠嘉木揚喇勒智發宋陵寢斷殘肢體攫珠襦玉匣焚其胔棄骨草莽間珏時年三十二嵗聞之痛憤亟貨家具得白金百星許執券行貸得白金又百星許乃具酒醪市羊豕邀里中少年若干輩狎坐轟飲酒且酣少年起請曰君儒者若是將何為珏具以告衆謝曰諾中一少年曰事露奈何珏曰余固籌矣今四郊多暴骨取竄以易誰復知之乃斫文木為匱復以黃絹為囊各署其表曰某陵某陵分委而散遣之蕝地以藏為文而告詰旦事訖來集出白金酬之戒勿泄越七日瘞浮屠下令裒陵骨雜牛馬枯骼築一白塔壓之名曰鎮南總浮屠死山隂人始有藉藉傳珏事者未幾越有袁治中為子求師有以珏薦一見置賔館一日問曰吾渡江聞有唐氏瘞宋諸陵骨子豈其宗耶左右指曰此是已袁大駭曰君此舉豫讓不能抗也曳之坐北面而納拜焉禮敬特加情款益篤叩知家徒四壁惻然嗟矜語左右曰唐先生家甚寒吾當料理使有妻有田不數日二事俱愜人固竒珏之節而又竒珏之遇元胡忠萬厯紹興府志字景莊餘姚人元貞間飢疫忠貸錢榖以賑閭里而葬其死者明年大穰里人齎錢榖酬約忠嘆曰飢民近得一飽吾忍取其宿逋耶悉取券對衆焚之陳志寧兩浙名賢録諸暨人嘗割田一千畝山五千餘畝造屋三百餘楹為義莊義孰聚族黨之貧者養之未知學者教之人以為一鄉之父師事聞旌為義門趙孟冶於越新編山隂人家世業儒尚義皇慶中捐田三頃為學田又捐田三頃入義廪給鄉人無以婚葬者事聞有詔旌之子由鍾行義有父風丁未嵗大飢設粥於道所活餓莩甚衆方鎰於越新編諸暨人好修行誼嘗割田千畝山若地有差取嵗入贍其族之貧者建義孰禮聘名士黃叔英項炯吳萊輩主教事造就學者一時俊彥雲集宋濓鄭深嘗來訪之黃新兩浙名賢録諸暨人汝楫六世孫倜儻好義祖遺義莊閲久已廢新購復之以賙族人嵗侵鄉人持券物來質粟不較其值而與之所居當婺越之衝為飲食以待困乏者年七十餘盡出所質文券約三萬餘緡悉焚之曰吾非敢以此市義也吾生無德於鄉人無庸留此以益身後之過戴成之𢎞治紹興府志蕭山人好周恤貧匱其鄉常患水旱乃創閘小江以備旱潦工役之費弗及於人恆親操杵钁沙土水趵久之不成成之仰天呼號翌日忽成人以為至誠之感任子仁𢎞治紹興府志蕭山人治生勤儉遭時飢亂推食解衣濟人寒餒鄉人不能葬者葬之無可依者育之士大夫之賢者至則館穀之勇於行義人稱長者吳宗元兩浙名賢録字長卿諸暨人輕財重義元季兵興避地者多依之周給一無所吝教子孫無析居殁之日識不識皆嘆曰義士死矣奔哭墓下者數百人太史宋濓志其墓明秦初兩浙名賢録字性初山隂人卓有行誼居太學時同舍生以使命出妻死無主初為之經紀喪事甚周有金安者除後山衛經厯當之任貧無以治裝初解所乘驢資遣之徒步以歸永樂中舉進士官翰林檢討丁能於越新編山隂錢清舟人也嘗夜載衆賈至東關詰旦衆散去遺金一囊能艤舟候賈久不至攜歸明日將復往婦阻之能曰我豈不欲財耶物故有分彼辛苦營之而卒然失去悔且喪身吾何忍終往候得金主感謝欲酬堅拒不受髙宗浙吳淵兩浙名賢録字叔胥山隂人嘗捐山七十畝為義阡給槥以葬貧者里有簪纓之裔盜其牛或以其人告輒諱而隱之正統庚申嵗大飢糴傍郡米七百斛歸給鄉人全活甚衆明年飢又出私廪助公貸後二年又飢亦如之時同邑吳淵亦出粟千石助賑有司上其事詔遣行人廖恂賫敕旌之周端韓邦問周義民墓表字孟端號介菴山隂人父茂沒端年十六與兄孟璇協力葬父母繆氏盛年守志兄弟協力以事遂振其家正統五年出粟二千五百石助賑有司聞於朝遣行人廖莊賫敕勞之旌為義民晚尤加意族黨傾所有施匱者未嘗形德色魏資善薑伯延於越新編俱餘姚人正統間各出榖二千石賑飢旌為義門成器今言類編餘姚人正統末聞劉忠愍球死獄即邑中龍泉山頂為文祭之厯述古今權姦之禍凡三千餘言人謂之祭忠文今其地謂之祭忠壇趙誠𢎞治紹興府志字一誠上虞人娶同邑杜氏生子而杜卒誠年二十七族之長老勸誠娶誠謝曰不聞伯竒孝己事乎吾既有子可無娶矣聞者髙其義景泰中應貢授德安府學訓導時有同知劉英欲妻以女誠告以向意不從鰥居五十餘年無妾媵之侍八十卒周用彰萬厯紹興府志嵊人元提舉承祖之孫家業頗殷為人好善率長子澤榮輩施藥以濟貧病煮粥以食獄囚夏則施茶冬則建橋造船為萬石長無一毫茍取夏叔恢兩浙名賢録嵊人天順初客越城中飲於酒肆時傍坐客被酒忘其囊去叔恢獲囊視之約五十金疾追其人弗及明日仍俟其處失金者號泣而來遂挈以畀之張祓蕭山縣志號直叟早喪妻終身不娶成化壬辰嵗災出銀三百錠粟六百石癸巳又災復出粟一千石丁酉甚災盡出所積以賑之事聞敕授宣義郎表其閭曰義門子珏字良育佐父發粟賑飢捐銀三萬兩代輸本邑嵗課巡撫劉敷題旌亦授郎秩周廷澤萬厯紹興府志字舜龍山隂人富而好施每嵗飢輒捐粟作糜粥以賑或病死則為義棺義冢以瘞之鄉人有屢負其租者攜子鬻於市廷澤聞之遂蠲其租又嘗捐金為錢清石橋工費巨萬往來者賴之陶仕成萬厯紹興府志會稽人正統間以富民供大璫阮某其後阮倉卒被命入意不測密召仕成以私積六千金託之成持歸投井中居數年阮竟死仕成出井中金走白守吳某守曰金無知者爾物也盍取諸仕成固謝會飢悉以散賑鄉人以是稱陶長者後數十年卒陶氏簪纓相繼人以為皆仕成所種云徐文彪萬厯上虞縣志字望之上虞人正德間舉賢良以母老辭有司敦趣乃行是時逆瑾方専恣而謝文正遷以忤瑾謝事去文彪至京試吏部用蕭傅恭顯語瑾覽策以為文正鄉人怒甚下之獄榜掠幾死械戍鎮番鎮番接壤流沙在中國萬里外文彪處之怡然諸武辨子弟相率來學二子子奎子厚聞父難奮以死從會部檄提家屬赴京兄弟主僕械繫刑獄尋得釋阽危百端乃達戍所逾年瑾敗乃赦得歸結廬山下絶不談往昔事性復好施創義田開義學鄉人德之張賢臣紹興府志會稽余貴村人敦善行貧無炊寒無襦死無槥顛倒無告者力拯之三十年無倦態山隂縣西北有湖曰縱橫十里許風狂舟輒覆賢臣議以石築塘其間使舟行塘內則避風舟不復覆閲七嵗而塘成所費數千金皆捐資為之曹同德紹興府志字同野上虞人虞邑官塘圮數百丈積雨則淹連水際同德捐資甃以石悉成坦道行人頌義遇嵗歉作糜廣賑全活無算周夢秀萬厯紹興府志字繼實嵊庠生時有例廩生限年起貢當及夢秀一生年踰六十不得貢夢秀曰我猶可待若不貢無後期卒推以讓之其父别駕嘗佃實性寺為宅既數十年增飾堂搆且數百金夢秀以為非義請於父復捨為寺别僦數椽以居風雨不蔽無愠也既卒鄉人祀之學宫吳士驂紹興府志字少愚蕭山人萬厯庚子嵗大飢賑米三百石院府並奬之其後家益饒善益積有除夜入其室行竊士驂見之贈以金勸使改行而祕其姓名雖子孫無知之者王鑑之獻徵録字明仲號逺齋山隂人篤於倫敘雖失愛兄嫂事之益恭謹兄子淵業舉不就又習醫為之延引得為醫學官遂以有立李氏姊之子澤民周氏姊之子濟皆教養之及長皆為之婚娶女皆為治奩具擇良士歸之嘉靖山隂縣志鑑之以進士知元氏縣擢御史督南畿學政歷刑部尚書何汝敷蕭山縣志字奏言性節約遇任恤則傾囊無吝嵗蝗設捕格以米易蝗民競趨之不為災輸米賑飢全活甚衆北郭嵩里多暴骨以私財每嵗募掩之任振龍紹興府志字羽禎蕭山人一人有夙負欲鬻其妻振龍遽止之負者曰吾非獨為汝再贈之多金以全其室每嵗除夕設松盆取貧人券焚之曰勿留此恐他日縈吾方寸也俞繪王激俞繪傳字本素越人就歙訓導為舉子時赴禮部試過沛貸沛令馮十金令實同郡人官歙時馮下世矣遺金還其子玨珏以無券弗受繪曰貸金無券爾父信我也若遂弗償負爾父多矣使爾父復生其謂我何固與珏乃受任惠州過贛按察僉事陳壯以卒送之道經南康卒謂尹曰過賔乃陳姻家也尹信之厚致贐繪曰吾非陳姻卒紿君矣固弗受周方蘇紹興府志字君謨山隂人兄弟有所逋負纍數千金代償之族姪黃門洪謨以劾魏璫被譴攜眷數人貿貿無投止方蘇掃室留之嵗歉籍飢人口治粥食之或給以米死喪者出山地瘞之祖廷澤嘗捐造錢清石橋久而將圮居人患之方蘇曰此吾為子孫者事罄資新之徐廷玠舊浙江通志字元度上虞人從劉宗周講學於證人堂闡明性理崇禎辛巳嵗大飢鬻産賑濟全活甚衆嵊邑飢復同陳際春及嵊紳邢大忠設法拯救全邑得免流移沈懋庸紹興府志字季平山隂人六合令綰之子有聲士林親黨中有貧不克婚葬者有負逋將鬻妻者悉委曲以恤之崇禎辛巳郡大飢鬻産賑濟存活甚衆丁師孔蕭山縣志字乃願邑人父元慶好義樂施捐田助學殁後士大夫髙其義請於官入報功祠師孔能踵其行凡婚嫁喪葬無資者欣然相助值嵗飢逺則給米近則施粥所活萬計周紹元舊浙江通志字雲門蕭山人西江塘山會蕭三邑民命所係紹元嵗捐資修葺終身不言人過然匪僻者恆見而憚之恐為紹元所知人比之王彥方焉張陛舊浙江通志字登子山隂人元忭孫崇禎庚辰郡大飢陛賑米三千餘石當事建坊以旌倪元璐題一聯於棹楔云分人以財由已飢溺笑懷清女師千倉自衛從父之令與爾鄰里勝麥舟父子一士私沾國朝陳文煥廣西名宦册上虞人為廣西巡撫馬雄鎮幕客康熙十三年逆帥孫延齡叛雄鎮被幽文煥等義不忍去亦同械繫患難相依周旋四載後逆賊吳世琮趨桂林延齡執雄鎮詣賊營不屈遂王師遇害十七年脫奔白其事於軍前巡撫傅𢎞烈入下蒼梧文煥旨陳奏奉冒險來歸忠藎可嘉著從優議敘後授安邱文煥縣知縣卒祀鄉賢塢恩武舊浙江通志字望隆餘姚人寧海潮漲得遺囊於水際恩武待至日中兩人號呼而至舉囊還之不問姓名台州夜火朦朧中有以一篋授者恩武藏之邸舍平明一人哭於火所云一家生命繫此篋中倉卒不知授之何人恩武排衆而前曰吾昨受一篋豈君物耶同至邸舍發之人願分其半恩武不顧而去周維屏紹興府志字自求蕭山人事親以孝交友以誠鄰有患疫者輒親湯藥殯殮江塘衝決維屏曰此吾邑大利害也命長男之冕躬督修葺十餘年竟無水患以子之麟貴贈如其官祀鄉賢姚時可舊浙江通志字雨若會稽人性慷慨喜結納遇人患難窘厄揮千金無幾微難色人有負者不能償即取券焚之以例入北雍不遇歸益以濟人課子為事子啓聖少保尚書總督八閩毛秉鏡舊浙江通志蕭山人然諾不茍急難者俱歸心焉鄰某以負債纍訟不息秉鏡力為排解鬻産代償沈以庠鄉賢留祀册蕭山人道拾遺金俟其人還之有負租鬻妻者贖令完聚嵗飢出粟賑濟修橋梁以利涉子士本康熙乙丑進士任俠紹興府志宇五陵會稽人年二十即棄舉子業遍遊宇內名山大川凡所厯莫不記之於詩有宦粵西者俠從至粵遭逆藩之亂宦家七十餘口存者僅五人俠罄槖中金資之以還孑身歸里四壁蕭然宴如也俞木鄭僑俞木傳字嗣祺上虞人豆亭少子也順治庚子嵗飢出資賑濟全活甚衆康熙戊午海氛未靖木請於上憲同諸兄練鄉兵置守具一日賊犯境身率鄉勇持矛前擊一鼓摧其鋒嗣是不敢復犯虞邑疊有潮患築塘捍海遂罄其家夏蓋湖舊有十八溝閘蓄水蔭田嵗旱輒為鄉鄰毁壞特設法輪巡永資灌溉縣令髙之蕙旌其門陳新鄉賢留祀册蕭山人嘗聞育嬰堂以保赤子設賑粥厰以蘇飢民力行善事子至言成進士督學河南學政倪宗賢紹興府志字涵初山隂諸生以醫名性慈厚每治病先貧而後富嘗蓄貴藥於籠中遇病者雜和以進所得資皆散盡一日舟行暮歸有惡少盜其鄰田禾宗賢大呼曰此某寡婦田汝輩不可刈刈之寡婦絶命矣左右即倪涵初田涵初以醫得利雖稇載無傷也言畢鼓棹而去惡少不知宗賢之自呼也竟盡穫之朱洪謐紹興府志字雷珊山隂庠生少孤遭鼎革鄰里皆驚竄洪謐家停髙曽柩獨與祖母母氏閣門以守慟哭不離事平盡葬其先人每月一至墓省視無間寒暑生平樂施豫康熙乙丑嵗侵傾家資出粟以賑郡邑兩庠頽壞力捐葺之時年七十餘程工督役皆身執其勞每黎明至廟日沒而歸雖驟雨積雪必扶杖而往好善不倦卒祀鄉賢倪會鼎鄉賢留祀册字無功會稽人文正元璐子嘗議廣麻溪壩霪洞為旱潦蓄泄之計又董築西江塘極其堅固山會蕭三邑賴之家貧鍵户著書有山隂令持兼金百兩以資膏火三至三返之張朝琮鄉賢留祀册蕭山人為文安三河令擢薊州牧歷永平守有政績蕭邑逼近江塘風潮衝決淹及山會田禾朝琮議建西江備塘及修築潭頭壩聞家堰又嘗刻蕭山水利書以垂永久胡嶽鄉賢留祀册會稽縣庠生嘗著家規每朔望必集宗人講解勸勉存心濟物康熙二十年間有洞浦人劉見龍遭訟費無出欲賣其養媳二十三年有山隂孰師朱觀生因夙負將鬻妻以償嶽俱首倡捐資俾各完聚手製藥療人寒暑不輟全活甚衆王九思鄉賢留祀册蕭山人贈內閣中書性孝存心利濟每遇侵嵗捐資賑飢邑南沿山大路係郡省通衢特議修葺以身先之蔡一信鄉賢留祀册蕭山人副榜貢生父遺資産悉與兄弟四人至賑飢瘞骼助人婚喪每竭蹶為之蔡士駿鄉賢留祀册蕭山庠生親喪哀毁逾禮事兄如父羣從子姓數百指同居有浦江鄭氏風邑中堤堰津梁率先捐資修葺聞人炳鄉賢留祀册字蔚文餘姚人家貧業儒授徒糊口一日早起過邑中知會橋拾金約五十餘守候良久一人踉蹌至問之乃里長催糧代入官者所遺問何以驗曰內有小包一里嫗所納束以紅線出之果然即還之館於北鄉嵗暮歸家夜泊舟聞哭聲甚哀旦詰之曰貸豪家債索迫鬻妻以償故相訣耳炳出束脯金贈之得完聚後其子升官光祿丞迎養不可輒寄奉菽水資炳捐葺文廟復以其餘周濟貧乏年八十一舉鄉飲大賔升亦慷慨好施有父風楊煥斌鄉賢留祀册餘姚人武進士少時遊學省城歸途見八十老嫗為貿布者所紿持假銀泣於道煥斌即盡捐館榖與之罄槖而還官侍衛請假葬親道經嘉興適地方兵民告訐力為排解事遂以寧陶師孟鄉賢留祀册蕭山人贈奉政大夫孝友性成撫幼弟弱妹親愛倍至祖遺世産悉讓堂兄概不析取嘗居通城幕中會山賊聚衆肆劫營升請𠞰師孟謂令曰此飢民也激則負固撫則易散令從其議全活數百人深悉河工事宜著治河明鏡四卷陳根公舉事實字克生會稽人父若虛捐己田一百六十餘畝以備賑濟名曰義田事未竟而卒根仰承父志實力奉行籍田於官創立義户刋布條約於完課外悉以濟貧凡鰥寡孤獨窮而無告者隨時周給迄今六十餘年力行不怠年九十餘卒沈士俊公舉事實字誠菴蕭山人年十六父病晨夕稽顙默禱於天母卒哀毁骨立性好施豫三黨有急者傾槖無所吝凡育嬰施棺及置田贍祭發粟賑荒之事皆力任之嘗遊會城有寧國賈人汪思泉寄金三百四十鄰人不戒於火列屋盡毁賈亦自委於數士俊慨然曰無憂吾義必不相負竟鬻産以償溫州林可法之女被掠泣告於士俊捐八十餘金還贖之趙之鼎公舉事實蕭山人少孤奉母孝及長遊學京師舉順天鄉試第一不求仕進遄歸奉母康熙己酉湘湖隄決九鄉盡被淹沒官紳方集議之鼎奮然曰待議定而後救則無及矣即出已資鳩鄉人聚畚鍤星夜堵築一邑田廬均免漂溺又修西江塘躬親督率不辭勞瘁可垂永久遇嵗不登首捐粟賑濟遇親友匱乏必委曲周濟他如施藥捨棺雖傾囊倒篋無吝色至有稱貸以益之者子文璧官總戎纍贈榮祿大夫王璣公舉事實新昌人至性惇篤親柩在堂居民失火延燎璣扶柩號慟拜禱即反風滅火鄰屋皆燬惟璣屋無恙捐金創家祠道拾遺金追其人還之鄰人王某年老無子疾篤盡出篋中金囑以後事璣為經紀其喪而以餘銀置産為之立嗣助族人營葬其父有鄉鄰死貧不能殮畀以棺衾瘞道路遺骸有鬻妻者出粟周給俾得完聚遇嵗飢出粟助賑凡善事無不勉力為之趙光仁公舉事實諸暨人庠生樂善好施以所置田一百八十九畝推入儒學備三年文武各生科舉路費子月松等詳憲勒石并立規制十五條以垂永久胡士章紹興府志字符卿會稽諸生少貧資館穀以養親能得其歡心後稍裕獨力建宗祠以收族人年七十三卒台州府五代鄭睿台州府志寧海人為都官員外郎偕尚書葉預輩四人同請錢王俶納土於宋使浙東得免兵革睿有力焉宋吳福赤城志仙居人性質實栝有巨賈留千金其家久之不至福為貿遷得贏俟賈至悉以歸之賈曰向者吾留千金耳贏則君自致吾敢覬乎互相遜決之縣縣上之郡使中分其息福仍不受賈以其半捐之僧廬謂福曰君行誼如許不應久無子吾近得顔氏女願奉君為似續計其後生子奉積至芾兄弟皆登上第歷顯官云黃襲明赤城志臨海人字原善宣和寇亂郡城多圮其北倚山無闉堞襲明首白郡以私財為倡遂增築焉訖事寇驟至合圍數日不得入事聞詔免鄉舉陳緯黃巖縣志字經仲邑人少與謝丞相深甫同學為莫逆交已又為婚謝既柄國引嫌自逺未嘗一至其門嘗同蔡武博修永豐等九閘復捐廪以賑飢給藥以濟病人呼為陳義士吳渭生仙居縣志仙居人一嵗而孤母葉氏矢志守貞以勤儉致富然樂於賑貧乏渭生體母心建層樓可望十里許鄰里有不舉火者潛令人以粟遺之自栝蒼抵海涯悉造磗甃路行道便之嵗大侵出粟散飢施濟甚衆朱文公熹為常平使以事聞補其次子椿文學王榮台州府志臨海人為獄吏以活人為務太守性剛暴每杖人必見血往往致死榮為潛漬血杖中行杖即見不致重傷嘗置瑩於卧處每活一人投一錢滿則更置之苦無嗣一夕夢人遺雙玉已而生珏遂以為名後登咸淳戊辰進士丁世雄黃巖縣志字少雲黃巖人里中有官私急難嘗借助之稅役或代之輸疾病與醫藥死而無歸者與斂葬從弟希亮嘗訾世雄似杜季良輕薄世雄不為變及希亮病垂絶妻殁子幼請世雄屬以後事世雄為之經紀諸務皆過於希亮生之日也陳容台州府志黃巖人字益之嘗立本價莊嵗出緡錢數千收粟於秋而以本價糶於春其數所贏餘每遇凶嵗率減市值之半邑中恆仰給焉杜清獻衍為之記王公乂太平縣志字治老太平人性好施與會嵗歉大雪民飢閭里閉糴公又發粟賑貸之毛仁厚黃巖縣志字及之黃巖人開禧中與杜清獻公同發解於州其鄉舊有義役仁厚益緝而宏之編户有田二三頃者率不與遇緊急勇往當之不以纍役者嵗或不登發義廪貸之窶甚者不責其償又索同志訴於州縣請公廪賑之嘉定己亥嵗大侵時仁厚已感末疾夢數萬蟻阻水引以竹乃得渡覺而言曰其殆飢氓需我活耶力疾走州縣請粟即忤州將勿顧也黃原泰台州府志字可耀黃巖人性樂施豫嵗歉買粟於閩浙損半值以濟邑人其鄉義莊田少而役重獨力代役二十年郡守王公磨勘義莊及其鄉或告守曰彼以己田代一都全役尚咎之耶守驚委督義莊有兄弟訟財者原泰出已帑以釋其爭有鬻田於原泰者得千緡為僕竊而逃憐其人捐錢與之戴秉器太平縣志居邑之南塘纍世稱長者秉器尤為邑里所推族人新為宅者將立門以出秉器故有大囿正值其地族人不敢言秉器微知之中夜毁圊平其地其行事類如此林蕙仙居縣志字文叔性好施豫每遇嚴冬深雪時夙興四顧里有朝煙不作午户不啓者輒遺以米炭景定二年蝗食禾餓殍枕藉於道捐廪以賑不給復罄所有易粟繼之家由是落終不之悔也趙處溫台州府志字仲和太平人與其季滕州守亥出義莊田三百畝以供義役嵗儲粟千石以助鄉之貧而無斂及婚喪無力者范邦惠寧海縣志字若賔寧海人登咸淳進士隱居清泉之滸見曠土盈萊皆可耕植率里人墾闢而以身先之又慮平疇艱於浥灌循溪作壩曰大溪砩且分築小砩者六各從地勢以通逺近之流約田三千七百有竒皆恃此無旱暵之憂里人尸祝之元吳焱寧海縣志字用晦寧海人咸淳進士宋亡不仕至元間浙東造往日本舟材鐵百需賦重民急焱鬻田代輸家以破耗而意卒不移包希元赤城新志臨海人至元間嵗大祲民多飢死希元計饘粥之外以榖六百石給散遐邇賴以全活者甚衆柯立善臨海縣志字遂卿臨海人時海寇竊發有司令能捕獲者爵賞有差有鄉民三人同負米入城易錢若干緡出城一舍惡少年利其所有追及械繫之誣為盜一富豪復賂少年掩為已獲以邀賞立善識其中一人為張萬者毅然陳其狀於官訊得其情三人獲免於死吳淳仙居縣志字世洪仙居人嘗設義孰訓其鄉之子弟初里中惟種陸淳率衆開白馬堰引水灌田自是得種水稻民食其利林喬年黃巖縣志字松孫黃巖人一門緦服同居共爨無間言建沙埭二閘溉田萬餘頃鄉人利賴之阮𢎞道台州府志臨海人平生好義青嶺有渡往來者病涉𢎞道捐金造舟募舟師給以田築屋與居為久逺計行者甚便𢎞道殁其子宗韶孫榮之踵而修之名之曰利涉陳世榮臨海縣志字茂卿邑人嘗道拾遺鈔同行者欲分之世榮曰非義也訪其主乃委吏之婦易産以贖夫罪者婦得鈔泣謝曰妾自分必死今更生矣韓禮仲天台縣志天台人從學東陽許謙之門薦辟固辭不就元統間遇寇警率衆防禦後居民被水災禮仲竭資賑救立義冢以瘞枯骸人甚德之汪蹇生天台縣志字本真天台人性簡率能急於義其姑嫁周氏家大疫家人避逃蹇生獨往侍湯藥病愈乃去張常德寧海縣志字德盛寧海人家故饒裕父為里豪所併貧甚常德既長治産十餘年不減其初族人常為巨量受租常德走撞破之至正末浙東飢發廪濟其鄉人不足令昆弟繼之又不足則遍説富人繼之人多賴以全活已而盜起大掠其鄉常德度不能拒具牛酒迎之願無苦小民盜竟不犯其鄉丁夢松台州府志字仁仲天台人嘗葬族喪六嫁孤女二至正間嵗飢賴以活者數百家婁治安寧海縣志字原佐寧海人讀書篤義其家以糧役被罪議産多者逮捕羣從相顧莫肯赴治安産最下挺然獨當羣從願割産以酬治安曰吾赴急義耳何以利為一無所受遂就獄輸作乾州行冒雨雪卒咸陽道上吳文虎黃巖縣志字文翁黃巖人嵗飢貿粟千餘斛下其直以濟邑人貧無以糴者賑貸之購石甃城南路以便行者築館延師以訓邑子弟舉進士者數人有司以文學薦辭不受張真台州府志幼育於臨海陳氏元末丁未兵入郡城民居被燬老稚倉卒走匿真獨抱主人幼子祚出遇悍卒脅令棄祚以從真不可哀籲再四卒欲殺祚真以身翼庇被數刃不動卒乃舍之而去真抱祚還創甚或慰之真曰吾素受主恩止此一息何忍棄之吾今死無憾矣越三日而卒陳氏子孫懷其德嵗時享祀必及之明黃中德赤城新志字觀成黃巖人幼穎悟受學於鄉先生潘伯修之門及伯修為方氏所害乃嘆曰人生於三事之如一讐其可以不復耶聞明兵至婺即持書間道詣軍門請為師復讐會方氏歸附事乃寢鄭士利方孝孺鄭士利傳字好義家寧海少為縣諸生洪武九年天下考校錢榖策書空印事起凡主印吏及署字有名者皆逮繫御史獄凡數百人丞相大夫皆知空印者無他罪可恕莫敢諫適星變求言士利乃為書數千言言空印事最詳以為誠故深罪空印者恐姦吏得挾空印紙為文移以虐民耳臣以為文移必完印乃可今考校策書合兩縫印非一印一紙之比縱得之亦不足用況不可得乎且錢穀之數府必合於省省必合於戶部其數誠不可懸斷預決必至户部而後定省府逺者去户部六七千里近者三四千里待策書既成而後用印則往來之難非期年不可至故必先用印而後書此權宜之務所從來逺矣何足深罪書奏上大怒令丞相大夫雜問必有主謀者士利曰顧吾書可用與否耳且吾業為國家言事自分受禍人誰為我謀乎辭卒不屈遂輸作終身林德世台州府志字一元臨海人通經史大義明習世故寧海令李茂一見竒之辟以為佐德世為立法以度田著成册書每按之以定賦役無不均嵗餘令遷定海會嵗旱郡守禁民訴災德世贊令力為民請守怒請益力竟得免民有兄弟爭財致訟者德世諭以倫理訟竟息有以田詭寄他户避役者令欲徙之德世曰誠信未洽民之為詐非特民罪也乃得不徙其因事利民多類此馮詠臨海縣志字處夔臨海人永樂間嵗連飢里人王德章以重逋無償鬻妻子詠聞而貸之粟德章感激繪其像祀之江右鹽商有覆舟者窘迫求貸不留券與以金余學夔台州府志寧海諸生當逮捕方氏時金陵魏尚書澤謫官寧海典史得方先生遺孤才九嵗百計覆匿學夔知之毁形佯狂乞食於市迓魏公城隅作狂歌乞食魏公默會於意乃密致書劄將方文稿併稚子盡付之學夔逃赴海上匿島嶼間彌月沿及海邊各鎮抵松青村與其僮日治􅊻網易米以給華亭有俞允任勉皆正學畿府所造士學夔潛入城訪之三叩始得見出魏公手劄乃大驚遂得安置焉後十四年允以養女納方氏孤為館甥因冒俞姓是時黨禁嚴俞以為嫌復改姓余名德宗字必昌遷白沙里生三子長友直次友諒友竹五傳至采司訓南昌弟孰以太學除海寧丞萬歷時始歸宗盛希年黃巖縣志王叔英鄉人也為廣德州祠山道士革除間叔英募兵廣德知事不可為因目希年所藏棺謂之曰人生得此足矣且問所直希年莫測其意將死以白金及書遺之曰可葬我祠山之麓希年始悟比卒人莫敢視希年竟斂以其棺葬之如其所指王湑仙居縣志字懷玉仙居人正統間嵗飢輸粟二千石以賑鄉之老弱事聞詔旌其門柳耦台州府志字承嘉臨海人兄為委吏罷而貧割腴田歸之鄉人貸而不能耕者率置不問取山木為槥死不能斂者給之里有渡病涉則造舟以濟往來復置田立屋以居守者六旬初度諸子議開筵為樂弗許乃度其費以貸里之逋官輸者卒之嵗悉取其券焚之葉希聖黃巖縣志黃巖人清修為鄉里所重季父詠謫戍於淮託以孀婦童孫併其家財付之詠後歸見婦孫植立財帛如故嘆曰吾姪託孤之節當於古人中求之金孟㻑寧海縣志寧海人所為多師古挽俗之事創屏山書院以訓宗人喜積書每用重金購之嘗積粟四千斛以濟鄉人全活甚衆有司上其事賜爵承務郎陳彬陳揚台州府志太平人彬字儒珍號敬所弱冠為諸生與黃文毅孔昭以文行相激勵立義學以教宗族鄉黨士之從遊者嵗恆百數又率宗族立大宗祠堂行冠婚喪祭之禮斥去淫祠立里社每日早起參謁祠堂教戒弟姪然後與諸生講論經史如是者三十餘年弟揚字儒敷邑令袁某命監邑中倉有規利者啖以白金五十兩却不顧袁由是益知其可任時以訟獄之難決者豫之決揚即裹糧親詣其地集耆老剖判咸得其情於是人之有質者往往不之官而之揚家故貧恆躬耕質者至輟耕立斷郡邑大夫至恆與抗禮為主賔尤急於為義宗族之死而無歸者皆為掩埋有孤無依者率收養之逺近來遊學於敬所之門者薪水畢具然無代力恆親身為之趙巖太平縣志字維石太平人同弟維揚捐資築二石閘溉田凡數千畝鄉人德之湯針天台縣志字仕器天台人建橋濟衆賑飢周貧嘗代償官賦以蘇一邑之困卒年九十葉琰台州府志字文巖臨海人少慕方正學為人嘗輯其遺文托述家狀以傳世聞正學有遺裔在雲間訪求纍嵗嘉靖乙丑以貢入京過南都有聞乃為振發幽竒册又致書正學裔孫學博采海寧丞孰諭其復姓歸里守正學祠琰為諸生時嘗捐仙巖祖遺樓房以祠文文山及杜滸張和孫蔡智榥黃巖縣志字元升黃巖人其先五世合食既而中析智榥乃與弟智諍承其父志合族人數千指同居共爨輕財樂施姻戚貧者賑之死者葬之立孰延師以教里人子弟嵗出粟數百石代之輸課稅義聲翕然趙元銘兩浙名賢録字廷時天台人嘗寓武林館人女夜奔之元銘即拂衣起去家貧好賑乏節衣食以務施無倦色將嫁女買孥詢是良家子即擇配先以女奩嫁之人以元銘行不愧古人皆以趙古人稱之年九十餘無疾而逝潘泰舊浙江通志字永寬臨海人平生重信義黃巖孫靜之仙居彭南容各寄白金百兩於其家一夕鄰火延及泰不顧他資獨取所寄金以出已而各歸其主有司顔其門曰真義士童悅黃巖縣志字思道黃巖人嵗大疫貧民率委溝壑悅捐資施棺郡縣表其門曰一鄉善士陳子元天台縣志字時善天台人嘗買潘氏屋居間者攜其價數十金至中途遺之子元念其家窘竟不問佃人虧租欲鬻其子以償不許且捐榖全活之親族有老而無依者皆贍養之章士麟台州府志字祉盛寧海人慕陽明先生學凡言動取與無不準諸道義年未三句喪偶或勸之娶則曰有子繼嗣足矣不復娶後以義夫旌家惟四壁而性樂施與屢舉鄉賔人稱靈泉先生吳子龍仙居縣志字性之仙居人友人欲以子締婚於子龍未成言而友人死遂以女妻其子曰向己心諾之矣以序當貢其次老而貧固讓之後為滁州司訓將之任寄三百金於某家比返匿其金子龍笑而不問錢文洲范宗陳珊寧海縣志並寧海人萬厯間嵗飢各捐穀二百餘石備賑有司旌之應巨台州府志仙居人饒於資急然諾好施豫人有求無不應會里中大疫比户相染皆避去巨遍詣諸病所探之捐資為市藥求醫所活百餘人子匡字伯泉能承父志鄉先達王刺史存忠以女妻之存忠精堪輿術嘗與匡卜兆以厝父匡曰信佳當與從昆弟並受之遂蠲吉以祖暨諸伯父合葬焉存忠曰天地鬼神實臨汝心厥嗣其昌無煩地脈為也年二十餼於庠以所得廪祿分贍同庠之貧者洎貢又三讓其次或詰以故曰彼親老家貧而齒復加於我豈市恩哉子大猷大桂俱進士楊繼思舊浙江通志寧海人萬厯間見摘星嶺峻絶為行人所病捐金五百甃之不避寒暑者五年向為鳥道頓成坦途今之新嶺其創改始名也遂易名楊公嶺楊師儒寧海縣志寧海人萬厯間洪水衝壞溪橋徒步者苦之師儒捐資三百兩五載落成吳文虎舊浙江通志字文翁臨海人自奉甚薄而樂施豫嵗歉貿粟千餘斛下其直以濟邑人購石甃城南路築館延師以教鄉人子弟有司以文學薦辭不就王彥舊浙江通志字汝翼台州人孝友義讓著於鄉閭年八十卒妻羅以餘資賑鄰里胡梯台州府志字德升寧海人萬厯己丑嵗飢梯作糜賑之存活甚衆有潛鬻其牛者梯置不較稱貸者負之不問有貧不能婚葬者輒助之邑令髙其誼每單車造廬葛承傑台州府志字鼎生又字匡鼎黃巖人精經學喜談忠孝大節講學澄江環堵蕭然崇禎丙子冬有番賈數十人飄舟窘急排闥擲金數萬求援承傑委曲全活不受其報所著有周易要言禮記别解四書新義較正天文等集國朝陳球舊浙江通志字君命號一鳴恭愍六世孫幼失恃朝夕哀慕逢忌辰齋三日如初喪時立義田建義莊積穀以濟貧乏順治丙申嵗侵道殣相藉煮粥以賑全活甚衆鄉民未朝采以貧鬻妻券已就奪而焚之給以資全其夫婦毛應智年邁鬻子於他方為贖回然終身未嘗與人言而其人自言之張之藩台州府志字則價臨海人天資純厚喜隂行善事凡焚券已責助婚助葬皆樂為之嵗飢里人艱食發粟賑濟舉賔筵固辭不赴年八十有六飲食如少壯時一夕呼其子孫立堂下敕斷家事畢端坐而逝葉臣遇鄉賢留祀册臨海人正紅旗教習貢生歷任湖廣直𨽻郴州知州嘗立宗祠以合享祖先留薄産而以腴田讓弟族戚之冠婚喪祭靡勿竭力以濟康熙十三年閩寇水陸犯境時制府暨平南將軍駐二衢鞭長不及台郡兵單糧少甚危急臣遇盡散家財以濟軍需勵士庶為城守計郡賴以全又嘗捐資葺方正學祠且割産以供祭祀其他置棺槥施藥餌贖仳離之士女葺頽圯之津梁聲稱藉甚康熙二十八年入祠浙江通志卷一百八十八
