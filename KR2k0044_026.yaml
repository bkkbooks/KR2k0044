諸生選其尤者升於書院月給廪餼萬歷十年知府蕭良幹修之改名朱子祠又即瑞泉精舍址建一堂曰仕學所蘭亭書院在城南二十五里萬歷紹興府志本晉內史王羲之修禊所元時置書院久圯南明書院在文廟東於越新編郡人太守諸萬里建五雲書院在東雙橋東紹興府志明萬歷十二年知府蕭良幹重修改名五雲館國朝康熙三十年知府李鐸五十六年知府俞卿重修仍名五雲書院陸太傅書院在城西六十里於越新編明正德間郎中周礽重建陽和書院在卧龍山陽紹興府志明張宫諭元忭與朱賡羅萬化讀書其中蕺山書院在蕺山紹興府志明劉宗周講學於此後為老郎廟國朝康熙五十五年知府俞卿購復之重修書院山隂縣儒學在縣治南明一統志宋崇寧中建寶慶會稽續志嘉定十六年令趙汝駉修郡捐緡錢以助陳耆卿為記嘉靖浙江通志淳祐間令林順修按孔瀛記云元至元乙卯尹賈文秀重建講堂明洪武十三年知縣齊達勒丹重建𢎞治紹興府志明𢎞治丙辰知縣李良建明倫堂萬歷紹興府志𢎞治正德間知府戴琥知縣顧鐸相繼買民居拓之山隂縣志嘉靖初知縣吳瀛購民居以闢故址王守仁為記紹興府志隆慶萬歷天啓間知縣楊家相耿廷柏馬如蛟重修如蛟又建文昌閣國朝順治二年署縣陳本厚修啓聖宫康熙二年貢生劉匡之生員沈麟趾修明倫堂八年大成殿壞知縣高登先教諭高基重暨劉匡之沈麟趾監生虞卿葺之高登先自為記二十年知縣范其鑄重修四十六年生員朱洪謐修雍正八年知縣沙漢鰲重修射圃在縣東北社學舊址名宦祠祀金爵以下六人鄉賢祠祀陳囂以下三十人社學二所一在縣治北一在越王祠西湖門義孰在府城西北紹興府志元至正初邑人孫敏中建周氏義學在錢清鎮紹興府志邑人周廷澤建明嘉靖十四年其子給事中復購地廣之觀海書院在丈午村紹興府志康熙五十六年建先是知府俞卿督築海塘集里老子弟講孝弟力由諸務鄉民遂構書院為講所會稽縣儒學在縣治南嘉靖浙江通志宋崇寧二年建元至元間燬大德五年重建明一統志永樂六年重建於越新編天順年知府彭誼以隙地易舊址建萬歷會稽縣志成化二年知縣李載鑿泮池置橋於越新編𢎞治間知縣陳堯弼通廟道自櫺星門抵馬梧橋萬歷紹興府志嘉靖中知府洪珠知縣王教復拓之紹興府志嘉靖隆慶萬歷間知縣莊國禎傅良諌曹繼孝相繼葺之陶望齡會稽縣重修儒學記黃罔曹公來涖兹邑視政多暇則進其邑之弟子而程試之以嵗時謁奠文廟周覽堂序怦然眷懷慨廡宇之就圮隱文治之未朗議新之而難其費於是周計帑中得故儲之鏹若干緡鳩工庀材時不易節賦不益人民不加役而模增敞貌增煥博士屠君何君率其弟子請記余曰公豈以其宫室之敗壞是葺將亦今世士習之敗壞是興古之君子㨁行有壇宇潔志有堊滌至道有奧窔謹其藩蘺窒其隙穴所以救敗而自完也士節之不渝繄質行是賴自不佞之去為諸生而至於今且三十祀其間文明奕而日聚而淳朴則若澆而日散可謂嵗有不同矣士處於黌校猶女之處室然故心繫紘埏而口不問州郡志大宇宙而身在環堵今之士似不無小謬也其焉用文之作室者先揆日測圭奠基厚礎其材大者梁棟小者櫨枅最後乃刻鏤藻飾耳文之於士真刻鏤藻飾也非質幹烏施哉吾邑庠於天下稱能文其先多君子而兹又有賢令如曹公者砥整名節以為多士勸語不云乎己雕己琢復歸於朴此亦歸朴之一時詎令遽傾敗薈穢為也諸君其懋之吾庠之士風與其宫牆並新今日以無負公加惠至意會稽縣志萬歷年令羅相重修國朝康熙二十年里紳姚啓聖重修金炯為記康熙五十三年重修大成殿雍正九年知縣楊沛重修增建文昌閣於巽隅射圃在學內名宦祠祀李俊之以下五人鄉賢祠祀何子平以下二十一人社學二所一在縣南一在五雲門外和靖書院在玊笥山久圯麗正書院舊浙江通志唐開元十一年置久圯念齋書院在陶堰於越新編明郡人陶允宜建康洲書院在傖塘於越新編明郡人羅光鼎建會稽縣義學在南街紹興府志舊為善法寺明嘉靖間寺廢知府洪珠改建以祀宋尹和靖先生名古小學劉宗周重修之率弟子講學於此額曰證人書院劉宗周證人書院記越郡之有古小學也昉自前太守莆田洪西淙公珠以祀寓賢宋大儒尹和靖先生云先是嘉靖中有詔許天下各建社學公遂燬郡中淫祠即其址建大集士子絃誦其中而重師模於和靖先生享堂左一楹曰義路右一楹曰禮門分二門而入為養正堂為遊藝所左右各列號房繚以周垣仍餘隙地落成者嘉靖九年庚寅都御史姚公鏌為之記讀其辭想見一時風規之盛歷隆萬以來師徒罕聚學舍盡圮其隙地亦多分割之居民不可問矣天啓甲子宗周言之前督撫王公遂下檄山隂令馬公鼎新之無何逆璫魏忠賢亂政詔燬天下書院禁師徒之講學者工未半而告寢逮今上御極四年辛未郡諸生復具狀當事太守黃公欣然任之諸大夫後先任事咸有同心暨前學政劉公今令君汪公會稽周公次第建堂廡如舊制距今嵗庚辰通計前後十七載而告成事蓋戞戞乎其難哉國朝康熙五十九年知府俞卿與會稽知縣張我觀鼎新改額曰會稽縣義學蕭山縣儒學在南門外嘉泰會稽志舊在縣西𢎞治紹興府志宋紹興間令陳南移於令南門外宋敷繼成之莫濟重建蕭山縣學記浙河以東郡縣連城數十獨蕭山去都為近人徒之衆甍宇之壯舟車之雜集大哉縣也近而且大宜有卓異秀頴之民出乎其間而未之見紹興二十有六年夏四月丹陽陳南來宰是邑顧瞻黌宇陋其制之舁下與其地之囂塵也相度南門之外地廣以平環羣山而帶流水遂定遷焉冬十有一月役於邑中明年秋移病歸常山宋敷實嗣之請於郡守趙公出公帑錢八十萬以佐其役冬十有二月廟學於是始成前統重門中嚴廣殿有橫經之堂有肄業之齋既用幣於先聖先師以濟之分教是郡也使來請記濟謂俗無美惡而教有興廢今明天子在上教行自近始郡守縣宰相與奉承而宣布之編民爭遣子弟列諸生惟恐居後安知其不變而至道也且是縣江山之勝名天下吾意夫橘柚羅綺之美不能獨當也鍾而在人者特鬱而未發耳守宰三君子則既發之矣被其賜者宜若之何毋怠荒暴棄毋惑乎異端而蹈乎匪彞不惟以對三君子庶無負天子樂育之意云其後知府汪綱及元縣尉王振縣令崔嘉訥華凱邑人賈元善明知縣張崇吳汝芳相繼修之正統間知縣李珙重建大成殿成化間知縣陳瑤改造號房知縣吳淑闢明倫堂知縣朱栻置射圃蕭山縣志𢎞治十四年令楊鐸朱儼建明倫堂嘉靖浙江通志正德八年知縣吳瓚重建萬歷紹興府志嘉靖十八年御史張元德增拓之按蕭山縣志云嘉靖十七二十八等年西江水溢學宫令林䇿修之蔡宗兖為記三十六年提學副使畢鏘建尊經閣萬歷十三年知縣劉會建三元閣蕭山縣志萬歷三十一年令程再伊天啓二年令陳振豪四年太學生來宗道崇禎間教諭屠肇芳遞為修葺國朝順治四年令王吉人重修來集之為記十一年殿棟折令韓昌先易之十四年廟門摧邑紳朱懋文重建康熙八年聚奎堂圮教諭俞潁湄諸生王伯璠等修十一年教諭盛旦庠生周之冕重建明倫堂張文起建大門十六年監生丁士俊生員丁鳴俊重建泮橋康熙二十二年教諭張翀訓導姚德堅重葺射圃在學內名宦祠祀楊時以下一十五人鄉賢祠祀夏方以下三十人社學在鳯堰中道南書院在德惠祠右於越新編明成化年知縣竇昱建清惠書院在蕭然山麓蕭山縣志康熙三十二年建諸暨縣儒學在縣治西嘉泰會稽志唐天寶中令郭密之遷於長山下晉天福庚子令趙諟移縣東宋景祐四年尉劉述重建慶歷四年令冦仲溫增造諸暨縣志淳熙六年知縣李文鑄遷建今址提刑王厚之易民居廣之元元貞間升州學知州馮翼重修元末燬明洪武改元仍為縣學於越新編洪武初知縣田賦重建嘉靖浙江通志成化四年知縣曹銓修商輅重修諸暨廟學記諸暨縣學在縣治西國朝洪武間重建至是百年矣嵗久材老傾圯天順甲辰進士滿城曹銓秉衡來宰是邑屬意新之適學憲劉君釪修學檄至克符此心於是鳩工斂材卜日就事首大成殿次兩廡戟門次明倫堂左右二齋悉撤其舊而新之初生徒號舍迫兩廡後甚隘乃闢而廣之各構樓數十間藏修有所遊息有地以至庾庫庖湢靡不有次經始於成化丁亥五月迄明年九月畢工五年建尊經閣諸暨縣志𢎞治癸亥知縣潘珍重建嘉靖壬寅知縣徐履祥重修萬歷間廟堂廊廡祠舍盡圯甲午知縣尹從淑再建四十四年又圮太學生樓成檟重建射圃在尊經閣後名宦祠祀張敦以下三十人鄉賢祠祀范蠡以下二十九人社學在縣西南朱山之麓久圯白門義孰在白門紹興府志元方鎰立紫山書院在西門內萬歷紹興府志嘉靖十四年本府推官陳讓建餘姚縣儒學在縣治東南𢎞治紹興府志唐時在縣西宋元豐初縣人莫將士購地輸官縣令黃鑄創學舍紹興間縣尉史浩買地為射圃嘉泰會稽志慶元五年施宿創直舍為致齋考試之地樓鑰為記嘉靖餘姚縣志咸淳九年令趙崇簡大改作之黃震餘姚縣重修儒學記咸淳九年冬金華趙侯為餘姚宰修泮宫成明年春走書屬震曰教化治道之大原庠序教化之先務故董仲舒謂守令為民師帥我朝立法守令亦無不以學事繫銜世降以來為令者苦財賦學事往往不暇省如吾邑學廪嵗收五百石有竒公厨至不舉煙學官至老且厭吾為此懼身任其事乃新禮殿增欄楯改兩序以便出入若儀門若講堂若齋廡下至庖湢垣墉一是咸新先賢祠昔之散處者今亦創一堂於東序而合之匪惟修舊殆亦增飭今而後將與二三子日講習於斯願子有以發其意震惟邑之以餘姚名以其為帝舜舊地也設學校以教人自舜命契始舜之教人也不外君臣父子夫婦長幼朋友五者而今之不古若何也利祿誘之也然利祿何足以誘人哉人之窮達制於天而利祿之有無係於命不以求而得不以不求而喪吾惟即君臣父子夫婦長幼明友各盡其所當然者於以從容乎禮義之常安行吾生平之素而大者立矣則課試可也科舉可也亦帝舜敷納以言之遺意也否則謂利祿可以求而得謂讀書可為鈎致利祿之具疲其神於破碎之學窮其力於聲病之文五者大倫反不知實踐則雖遊於斯息於斯絃誦於斯口談義理皆非其實學校之教舜之所以始於虞庠者豈若是耶侯今興學於舜之鄉亦惟以舜之教人者教人人各以舜之所以教人者自勉則鸞旗戾止於魯僖有光矣因以為記嘉靖浙江通志元升州學至元火尹杜仲仁重建嘉靖餘姚縣志至元二十八年浙江亷訪使王俁令縣更大之重紀至元二年復災守汪惟正劉紹賢相繼新復至正八年守汪文璟增建自為記二十三年邑儒黃籲出資新學劉仁本為記紹興府志明復改縣學永樂七年教諭林觀上言詔有司修治嗣後知縣邱養浩黃維張瓚盧昶詹源澤劉規顧存仁鄧林喬丁懋遜推官陳讓通判葉金教諭王懋纍修之國朝順治九年知縣胥庭清重建自為記康熙六年知縣潘雲桂修二十九年知縣趙如璉教諭沈煜方運昌協新之射圃在學南名宦祠祀朱然以下二十三人鄉賢祠祀嚴光以下一百六人社學二所一在城一在西南隅吕氏義學在城內東北隅紹興府志宋吕次姚建紹興中其裔仲應重建高節書院在客星山南續文獻通考宋淳祐中劉黻建久圮怡思書院在四明鄉於越新編宋修職郎孫一元建古靈書院在縣北屯山之陽圮姚江書院在城南巽水門餘姚縣志在治南