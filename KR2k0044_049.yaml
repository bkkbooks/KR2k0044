body:
  text: 浙江通志卷五十古迹十二溫州府下舊子城萬厯溫州府志在今府城內梁開平初錢氏始築周三里十五步通四門內衛府治外環以水元至元十三年廢為民基止存譙樓門址舊城門萬厯溫州府志舊東門在舊州治東有樓名華蓋又名東樓亦名華蓋門南樓門在舊州治西南宋末為右相都監衙永豐門在舊州治西北奉恩門在城中北俗稱海壇江山門在拱辰門西名來化俗稱寶幢門明洪武十七年塞定安門俗稱上門與來化永清二門相聮在城西北宋髙宗回鑾由此三門其名以此洪武十七年塞張又新華蓋樓詩一岫陂陀凝緑草千重盧翠透紅霞愁來始上消歸思見盡江城數萬家李兩山華蓋樓詩三十六坊如掌平長橋短艇水縱橫銀河一道江連海盡幛四圍山繞城老樹煙雲春緑暗小橋簾幕曉紅明隂隂翠影誰家屋夢覺草池鶯一聲新城萬厯溫州府志新城去府城六里在江北賢宰鄉郭璞初議立城於此後遷過江今其地為田野猶稱新城云樂清縣故城隆慶樂清縣志唐天寶三年始築僅周一里元廢詳見城池萬厯溫州府志縣城故址唐築舊門東曰登瀛以宋王十朋魁天下故名南曰清遠西曰承流北曰祥雲舊州治名勝志在譙樓大街正北眀洪武元年以為衛治萬厯溫州府志舊治在城西南華蓋橋西宋高宗建炎四年正月丙午御舟次於章安鎮甲子泊溫州港丙寅次館頭戊辰幸福聖寺二月己卯次江心寺庚寅御駕自拱北門入民家皆結綵奉迎至永寧橋百官拜伏道傍山呼震地上停輿慰問至今巷名萬嵗埭儀衛由五馬新街至州治以州治為行宫譙樓為朝門州宅為宫禁扈從甚嚴以崇德寺為都堂儒志坊張氏宅為州治庚申回鑾駕至上門帝問橋名守臣盧知原對曰上安問門名對曰定安上大悅百官萬姓隨班至江次上慰諭久之始登舟去賜溫州仍舊充州衙宋推官廳萬厯溫州府志今溫州府治是也唐永嘉縣舊治元和郡縣志永嘉縣即漢回浦縣之東甌鄉唐上元二年於此置溫州縣移在州東百八十步詳見公署吳羅陽縣治名勝志在瑞安縣吳時縣治在北湖魯嶴晉太寧間遷於邵嶼遂墟其地晉橫陽縣治元和郡縣志晉太康元年分安固縣南橫嶼屯置橫陽縣溫州府志今平陽縣地衆樂園明一統志在郡城西舊郡治北縱橫一里中有大池塘亭榭碁布花木彚列宋時每嵗二月開園設酤盡春而罷永嘉縣志今府城隍廟皆其舊址五美園永嘉縣志郡東南大羅山傍有茶山上有龍潭其下有五美園黃淮遊五美園詩清曉肩輿入翠微溪流曲折護巖扉布金僦地徒成幻卓錫為菴信不非翠竹黃花俱淨供風聲鳥語總禪機碧潭龍女知人意收却隂雲送客歸柑園楊蟠永嘉百咏有柑園詩玉介園萬厯溫州府志郡城東偏華蓋山上有玉介園永嘉縣志王叔杲叔果築陽湖别墅嘯咏其中名其集曰王介園稿西園王十朋有昌齡弟新闢西園詩又西園十咏詩在樂清趙園溫州府志在瑞安縣金嶴陳傅良遊金嶴趙園詩脈脈循簷水林林夾岸山令兒從竹下領客入雲間稠木容人過懸崖著手攀從今名字出不到徑苔斑上浦館明一統志在府城東七十里樂成館溫州府志樂清縣舊有樂成館唐建孟浩然樂成館中懷歸詩異縣天隅僻孤帆海畔過往來鄉信斷留滯客情多臘月聞雷震東風感嵗和蟄蟲驚户穴巢鵲昐庭柯徒對芳樽酒其如伏枕何歸與理舟楫江海正無波招仙館東甌遺事樂清縣簫臺下有招仙館蓮花莊溫州府志在郡城會昌湖上宋鄭泰臣之故居湖莊趙師秀有和陳水雲湖莊詩見溫州府志宋莊王十朋宋莊詩注宋侍郎别業在思遠樓之南有軒名遙碧西堂方輿勝覽在州宅甌江逸志謝靈運西堂春草池在華蓋山下即夢惠連得句之所今遺迹尚存讀書堂明一統志在舊郡治謝靈運讀書於此謝靈運齋中讀書詩昔余遊京華未嘗廢丘壑矧乃歸山川心迹雙寂寞虛館絶諍訟空庭來鳥雀卧疾豐暇豫翰墨時間作懷抱觀古今寢食展戲謔既笑沮溺苦又哂子雲閣執戟亦以疲耕稼豈云樂萬事難並歡逹生幸可託清心堂明一統志在舊郡治吕由誠清心堂詩夜榻卧看池上月曉窗吟聽竹間風此心所得無多事要在靈源一點通秋香堂萬厯溫州府志在舊郡治後君子堂萬厯溫州府志在舊郡治舊名芙蓉亭在天池中三面皆荷花總政堂溫州府志在府治元建趙鳳儀溫州路總政堂記總政堂者府治視事所也夫治國如治絲然紛者整之散者一之總之義也溫為浙左上路領二州二縣坐總政者有監有長有二佐領挈而裘振也表正而影從也其總政之義與堂始於至元庚辰距今四十年而興創顛末無一語以示厥後豫以延祐丁巳冬來守詢吏民莫知所對作而言曰是豫責也已春秋一門一臺之微必書慎其事也況總庶政達萬民者乎是宜書夢草堂萬厯溫州府志在今衛治後即謝靈運西堂劉基夢草堂遣懷詩即事在自得強歌非正音所以春草句聲價重兼金若人千載下遺響邈難尋淒涼一池塘賴爾得至今我來當杪秋天淨潢潦沈枯荷有餘香衰栁無殘隂鼓鼙響未巳山水意徒深感時念兄弟惻愴傷我心戲綵堂方輿勝覽在倅廳通判趙㞦迎其父清獻公抃來遂名蘇轍戲綵堂詩春晚安輿遍浙東永嘉别業喜無窮槖裝已笑分諸子更道何妨向薛公百詠堂萬厯溫州府志在府治東西射堂晏公類要在州城西南十里謝靈運晚出西射堂詩步出城西門遙望城西岑連嶂疊巘崿青翠杳深沈曉霜楓葉丹夕矄嵐氣隂節往戚不淺感來念已深羈雌戀舊侣迷鳥懷故林含情尚勞愛如何離賞心撫鏡華緇鬢攬帶緩促襟安排徒空言幽獨賴鳴琴東山堂名勝志在永嘉縣積榖山下宋周行已建翁卷東山草堂詩城隅古謝村博士草堂存惟見煙霞起全無市井喧鶴來巢木杪黿出戲蒲根消得吟詩客慿闌看幾畨海月堂楊蟠永嘉百咏有海月堂詩適堂追遠堂萬厯溫州府志宋永嘉孝子仰欣宅內嘉忠堂永嘉縣志在馮成宅宋髙宗書嘉忠二字賜之遂以名堂遺愛堂王十朋題雙峯資深堂詩注周開祖昔令樂清有遺愛後人因以名堂資深堂雁山志在雙峯寺後同心堂萬厯溫州府志樂清朱古學登宋嘉定第四世同㸑因建同心堂明通公漙堂萬厯溫州府志在平陽縣元元貞元年重建名公溥堂林景熙公溥堂記平陽舊縣治闕如牧守居其堂曰橫陽道院令尹陳容更其名曰明通公溥之堂至元丁丑燬越四年辛巳重建廳事及儀門兩廡元貞元年縣升州改創譙樓前瞻偉美獨未構繡衣之使省風戾止據案決事退食西偏觀聽不肅大德辛丑秋太守孫筠謀於佐曰是不可無堂自經始至落成不浹月大備乃即舊名縮為公溥堂萱竹堂葉適沈氏萱竹堂記瑞安北湖山水間美沈君體仁始治園觀遲客有亭延月有臺室最大曰萱竹之堂沈君為詩十章聞者皆和北湖之勝遂誇一時讀書齋晏公類要城內西偏有謝康樂讀書齋幽慵齋東甌遺事永嘉髙則誠有幽慵齋髙明幽慵齋自咏詩閉門春草長荒庭積雨餘青苔無人掃永日謝軒車清風忽南來吹墮几上書夢覺聞啼鳥雲山滿吾廬安得嵇中散尊酒相嬉娛初心齋萬厯溫州府志平陽鄭朴翁所居止齋仙巖寺志陳傅良讀書處陳傅良止齋月夜書懷詩送客門初掩收書室更虛新篁髙過瓦涼月下臨除行處才扶杖餐時却饋魚今朝風日好莫問夜何如觀瀾軒溫州府志在郡城宋建翠幄軒溫州府志在郡城宋建前有榕樹甚巨楊蟠翠幄軒詩海榕根倒出皮幹亦輪囷或問夀幾許千年為一春不負軒隆慶樂清縣志縣治有不負軒王十朋題洪丞不負軒詩坐此軒無愧問君何以能所行皆是學不負豈惟丞鳬鶩文書靜槐松詩思凝博陵徒種績踐履亦何曾緑畫軒溫州府志去玉簫峯二十里樂清孫氏之别業王十刖緑畫軒記出簫峯西南二十里有山逺隱若虹霓之狀俗謂之霓山樂安孫君之居得霓山之勝峯巒竒偉林簏靜深有泉發於其下可飲可灌於是枕山而立棟宇因流而蓄池沼結軒向明收拾景象軒之外有嘉木數株修竹千挺蓊欎蒼翠嬋娟瀟灑播為疏枝舒為濃隂舞清風搖蒼煙影明月漏山光之窈窕蔭碧沼之漣漪禽鳥宅其幽龜魚息其隂左右青山環合映帶藍黛之色與天連碧四時不凋眼界常清望之宛然如在畫圖中蓋此軒之佳致也主人與客日飲於其間寒光入座秀色可椈明瑩杯盤冷襲襟宇魂清氣爽深杯不能發其醉情舒興逺髙歌不能寫其逸觀者在旁疑其壺觴几席皆圖畫中物賔主僕從皆圖畫中人也有客常遊兹軒陪主人之清尊覽景物之幽竒寓之於目得之於心有若不能忘者主人曰客為我名之客曰豫嘗讀韓退之南山詩有濃緑畫新就之句愛其清新峭拔恨斯景之莫見今此軒之秀庶幾其倣佛采其語而名之可乎主人曰可客為記之客曰軒宇景物之大槩四時朝暮之氣象生綃一幅可得而畫也濃緑之句可采而名也若夫清風一來披雲拂玉天籟之竒非絲非竹雖神工妙手有莫得而模寫博物辨口亦不能形容也豫將何言龍壑軒吳子孝有龍壑軒夜坐詩見雁山志流觴亭名勝志在舊郡齋東偏宋守樓鑰建甃池為山水繪蘭亭修禊圖於壁芙蓉亭明一統志在府治中山亭永嘉縣志郡城中山有亭在鹿城書院側雖小阜係郡之主山也醉筠亭萬厯溫州府志在華蓋山富覽亭眀一統志在永嘉縣郭公山萬厯溫州府志宋嘉祐三年知州楚建中建沈紳為記留雲亭萬厯溫州府志郡城東南積榖山城沿其上上有留雲亭永嘉縣志明萬厯中重修改為東柄亭絶境亭名勝志宋邑人周行已建於郡城積榖山上周行已絶境亭詩雲橫絶塵境峻堞若繩削羣山列培塿雲水分脈絡下瞰萬瓦居縹眇見樓閣松風發天籟泠然衆響作晶瑩天宇淨塵襟一澄廓積榖亭溫州府志在府治東南積榖山矻立危巖俯瞰大海為一方壯觀四時萬象亭明一統志在府城北門江濵元黃溍有記南亭晏公類要在州南一里太平寰宇記即謝公遊處謝靈運遊南亭詩時竟夕澄霽雲歸日西馳密林舍餘清逺峯隱半規久痗昏墊苦旅館眺郊岐澤蘭漸被徑芙蓉始發池未厭青春好已觀朱明移戚戚感物嘆星星白髮垂藥餌情所止衰疾忽在斯逝將候秋水息景偃舊涯我志誰與亮賞心惟良知北亭方輿勝覽在州東北五里謝靈運秩滿與民敘别於此謝公亭何文淵謝公亭記江心寺之西南陬舊有謝公亭相傳靈運守永嘉時來遊必憩於此林彥登謝公亭詩乘間逺過中川寺孤嶼亭前落照時漫策枯藤尋往事笑摩蒼蘚讀殘碑江涵北郭天初霽草緑西堂夢已離惟有風流消不盡海天空濶鳥飛遲懷謝亭永嘉縣志唐吳會為永寧令慕謝康樂之風構亭曰懷謝江山一覽亭萬厯溫州府志在郡城華蓋山巔永嘉縣志亭後圯明嘉靖中重建改為吸江亭萬厯中復建改名大觀亭侯一元大觀亭詩華蓋倚城巔登臨萬水煙亭孤當落日江逺欲浮天雙樹春雲裏孤舟野水前春心成浩蕩一倍惜離筵襟江亭萬厯溫州府志在郡城江北永寧山上永嘉縣志亭在章山萬厯中守衛承芳題其岩曰鏡臺白岸亭太平寰宇記在永嘉縣楠溪去州八十七里因岸沙白為名謝靈運白岸亭詩拂衣遵沙垣緩步入蓬屋近澗涓密石逺山映疏木空翠難強名漁釣易為曲援蘿聆青崖春心自相屬交交止栩黃呦呦食蘋鹿傷彼人百哀嘉爾承筐樂榮悴迭去來窮通成休戚未若長疏散萬事恆抱朴筆亭永嘉縣志縣治西北郭公山有晉郡守王羲之筆亭久圮今字迹猶存望海亭名勝志永嘉縣青嶴山兩山如門宋永明中郡守顔延之於此築亭以望海醉樂亭溫州府志在永嘉縣西五里西山宋郡守孫懋建葉適醉樂亭記永嘉多大山在州西者獨細而秀十數步內輒自為拱