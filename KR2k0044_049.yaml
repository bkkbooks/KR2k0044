閣浮沚之東新為小軒名曰萍軒其沚舊為門道所從出闢而為室名曰浮室室者窒也窒吾心之隂幽不善也其南假道於隣引舟而渡到彼岸焉名曰筏渡渡者度也度一切陽明之善也是吾居也因水而為洲因洲而為室因室而為名因名而為義義皆浮義也寄焉宜也聊爾而已耳故吾不獨浮其仕又且浮其居不獨浮其居又且浮其生然則有之而何得無之而何失吾聞古之有道也貧而樂窮而通豈謂是歟非曰能之願學焉記以自警蔡幼學宅萬厯温州府志永嘉縣慶善坊宋尚書蔡幼學居此周侃宅永嘉縣志招賢巷宋周侃居此伊導宅永嘉縣志縣西南孝義鄉宋伊孝子居此葉適宅名勝志永嘉縣有西湖南湖總謂之會昌湖宋葉適世居西湖之水心號水心先生萬厯温州府志適之先自處州之石林徙永嘉城南水心其所居有華堂戴溪宅名勝志永嘉縣岷岡山宋儒戴溪築室其上稱岷隠先生趙建大宅萬厯温州府志永嘉縣六都新建街宋狀元趙建大所居阮放宅隆慶樂清縣志湖潢山世傳晉阮放居此張廌宅方輿勝覽樂清縣白鶴山一名丹霞山晉張文君隠居於此郡守王羲之訪之文君遁入竹去後捨爲白鶴寺文君名廌焦千之文君宅詩曽是文君宅幽深鎮翠岑澗松迷白鶴溪石隠黄金丹竈今猶在簫臺尚可尋予來不能厭誰共聽泉音李建中張文君宅詩玉簫峰下仙君宅千樹巖花㡬百春當日會稽王内史如何不見竹間人張少府宅孟浩然有除夜會樂成張少府宅詩樂成今樂清縣沈著作宅萬厯温州府志在樂清縣澱村錢堯卿宅隆慶樂清縣志蒲圻龍穴山宋錢堯卿居此錢朝彥宅温州府志在樂清縣白石王十朋宅名勝志樂清縣東北三十里左原山羣峰環繞中有田二千餘畝民居悉藏谷中一峰如卓筆有梅溪蓴湖左嶺為小雁蕩王龜齡之居在焉王十朋左原詩并序樂清之東有山名左原以其居邑之左也中有左嶺左湖左口皆以左名之予七世祖自杭徙温家於是原地雖荒僻有山水足以自娛予丐祠得請日與兄弟隣里有杖屨登臨之適原中景物可資賦詠者各識以詩預作休休計先開小小園杖藜成日涉得趣與心論右小小園一閣僅容膝閉門塵慮捐讀書心已懶髙卧腹便便右便便閣小徑循園闢青青草色都主人猶未仕時得理荒蕪右青青徑繞舍種修竹清風長滿筵天姿本來浄不雨亦涓涓右涓涓林九畹何人種光風泛國香林間今㡬許鼻觀日揚揚右揚揚畹吾圃豈不富黄金無數錢誰云何用好霜裏白鮮鮮右鮮鮮砌謹按王十朋有至樂齋賦有四友堂覩先君子遺跡詩有書小成室詩有題東園詩有書率飲亭壁詩有自題陋齋詩有書不欺室詩並宅中名也林幹宅隆慶樂清縣志在木榴山黄友宅萬厯温州府志在平陽梅源御書忠節𫝊家旌其閭林逢龍宅平陽縣志在寳巖山下林景熙宅名勝志昆山之隂有白石巷乃宋林景熙所居陳傅良宅名勝志在瑞安縣仙巖山陳傅良授徒於此朱晦翁來訪之書溪山第一四字王奕宅温州府志在瑞安縣霞碧山宋霞碧山人王奕居此卓敬宅萬厯温州府志在瑞安縣卓嶴吳畦宅泰順縣志唐吳畦宅今屬縣之庫村墨池萬厯温州府志在城内墨池坊王右軍臨池作書於此米芾書墨池二大字葉式墨池記右軍刺温多恵政政暇輙復臨池以適其情後人因祠於郡城東南而尸祝之祠之東為墨池其制方其水冽或云即逸少滌硯所至今水面時見墨㸃如蝌蚪汲之無有凡鴻生碩儒游宦於茲者往往有所紀述使右軍無他善而區區臨池之工亦何足志顧其生平履厯有大焉者此温之人所以拳拳斯池更千百載庻㡬乎甘棠之風也陽湖别墅永嘉縣志郡城南暘嶴山有邑人王叔杲陽湖别墅𤓰廬温州府志薛師石築室會昌湖上名曰𤓰廬趙師秀薛氏𤓰廬詩不作封侯念悠然逺世紛惟應種𤓰事猶被讀書分野水多於地春山半是雲吾生嫌已老學圃未如君雲門福地萬厯温州府志在樂清縣治東澄清坊宋紹興中令王𫝊作亭劉黻雲門福地記雲門界闤闠區中東侵西軼茀而不治者㡬寒暑矣少府俞君道明攝縣事首訪民瘼且知茲土不克復其舊者勢家軋之也俞君曰夫既謂之福地則亦一邑之民望也長民者不以怵而阻則以懈而寘夫奚取遂按圖經發蕃啓塞而盡得之周以垣墉揭以門扁而求記於予夫道家者流所謂洞天福地特其寓耳賢令尹心乎子其民不畏强禦不憚勤勞苟有以福吾民是即福地也咸淳二年記盤谷精舍温州府志在樂清縣盤谷山宋王十朋之孫築精舍於此登瀛門明一統志在樂清縣東以宋王十朋魁天下故名路出黄巖縣界種玉畦萬厯温州府志在瑞安縣福全山陶𢎞景修煉之所陶𢎞景丹室元豐九域志在瑞安縣西四十里周行已陶隠居丹室記崇寧三年夏六月維揚吕君少逸來涖是邑以其餘暇厯覽山川得陶隠居先生丹室於陶山佛寺先生本史故不載嘗至此方賈嵩采登真訣作别傳云梁天監中自海道至永嘉得木榴嶼居之以作丹今永嘉境中無所謂木榴嶼者而室之下有仙壇丹井雖嵗乆相傳不可驗考然山之為陶山舊矣豈山以人著乎按諸家傳皆云先生長七尺二寸神儀明秀膚色晢澤今其像繪乃趙清獻公得閣下本傳置室中升仙壇瑞安縣志陶山前江後湖陶𢎞景隠此有升仙壇大荆驛古樟王思任雁蕩山記古樟抱十人浙江通志卷五十
