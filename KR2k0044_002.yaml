body:
  text: 浙江通志卷二星野天官有書天文有志史氏所占遞相傳述其説本於周禮昉於虞書吳越土屬星紀序十二次之首保章所辨與羲和所掌可考而知聖人敬授人時别宵旦之中星以定四仲是以政事修而泰階平景星見善言天者必有驗於人也志星野浙江省周禮春官保章氏以星土辨九州之地所封封域皆有分星以觀祅祥注星土星所主土地封猶界也大界則曰九州州中諸國中之封域於星亦有分焉其十二次之分星紀吳越也元枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也壽星鄭也大火宋也析木燕也疏吳越在南齊魯在東今歲星或北或西不依國地所在者此古之受封之日歲星所在之辰國屬焉故也吳越二國同次者亦謂同年受封故同次也左傳昭公三十二年夏吳伐越始用師於越也史墨曰不及四十年越其有吳乎越得歲而吳伐之注此年歲在星紀吳越之分也歲星所在其國有福疏天文分野斗主吳牽牛主越此年歲星在牽牛廣雅斗牽牛嬃女吳春秋元命苞牽牛流為揚州分為越國春秋文耀鉤布度定紀分州繫象蒙山以東至南江會稽震澤徐揚之州屬權星越絶書越故治今大越山陰南斗也吳故治西江都牛須女也吳越春秋吳與越同音共律上合星宿下共一理史記天官書南斗其北建星牽牛其北河鼓婺女其北織女注索隱曰須女謂之務女或作婺正義曰須女四星亦楘女南斗牽牛須女皆為星紀於辰在丑越之分野而斗牛為吳之分野漢書天文志斗江湖牽牛婺女揚州丙丁江淮海岱戌吳越吳楚之疆候熒惑占鳥衡漢書天文志孝景二年十二月水火合於斗斗吳也又為粵元鼎中熒惑守南斗南斗越分也漢書地理志吳地斗分野也今之會稽九江丹陽豫章廬江廣陵六安臨淮郡盡吳分也粵地牽牛婺女之分野也今之蒼梧鬱林合浦交址九真南海日南皆粵分也謹按浙江地西漢屬會稽郡者十之八屬丹陽郡者十之二未分置吳郡故班固云然其以兩郡屬斗分與今測合故節録之漢書律厯志斗綱之端連貫營室織女之紀指牽牛之初以紀日月故謂之星紀淮南子天文訓天有九野注斗吳之分野牽牛一名星紀越分野後漢書天文志注星經曰熒惑主揚州璇璣者謂北極星也玉衡者謂斗九星也玉衡第六星主揚州常以五巳日候之辛巳為丹陽丁巳為吳郡會稽謹按洪武蘇州府志謂此日占斗星之色後漢書郡國志注帝王世紀曰黃帝受命乃推分星次以定律度自斗十度至婺女七度一名須女曰星紀之次於辰在丑謂之赤奮若於律為黃鐘斗建在子今吳越分野後漢書律厯志注月令章句曰周天三百六十五度四分度之一分為十二次日月之所躔也地有十二分王侯之所國也自斗六度至須女二度謂之星紀之次越之分野三國吳志注會稽典録虞翻曰會稽上應牽牛之宿下當少陽之位左思吳都賦上當星紀拓土畫疆包括於越婺女寄其曜晉書天文志自南斗十二度至須女七度為星紀於辰在丑吳越分野屬揚州費直起斗十度蔡雍起斗六度晉書天文志斗牽牛須女吳越揚州丹陽入斗十六度會稽入牛一度晉書天文志歲星曰東方春木主齊吳熒惑曰南方夏火主楚吳越以南晉書苻堅載記堅引羣臣會議曰吾將薄伐南裔於諸卿意何如太子左衛率石越對曰今歲鎮星守斗牛福德在吳懸象無差不可犯也堅獨留苻融議融曰歲鎮在斗牛吳越之福不可以伐吳地記禹貢揚州之域當磨蝎斗牛之位列婺女星之分野唐書天文志貞觀中淳風撰法象志因漢書十二次度數始以唐之州縣配焉南斗在雲漢下流當淮海間為吳分牽牛去南河寖逺自豫章迄會稽南逾嶺徼為越分通占大象厯星經南斗六星主天子壽命亦云宰相爵祿之位盛明王道和平將相同心帝命壽天下安通占大象厯星經越一星在婺女之南乙巳占聖人觀象分配國野或取水土所生或視風氣所宜因係之以成形象之應故越人伺察以斗牛辨祥通典揚州在於天文斗則吳之分野漢之會稽九江丹陽鄣郡廬江廣陵六安臨淮皆其分也今丹陽吳郡吳興餘杭新定新安會稽餘姚臨海縉雲永嘉東陽等郡地也按吳國之分雖強盛之時殊不全得揚州之地今配星次且約漢書其厯代所屬則各具於諸郡天文精義賦斗牛星紀吳越隸揚宋史天文志三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也主開德宣符西近文昌二星曰上台為司命主壽上台上星主兖豫下星主荆揚宋史天文志極度極星之在紫垣為七曜三垣二十八宿衆星所拱是謂北極為天之正中而自唐以來厯家以儀象考測則中國南北極之正實去極星之北一度有半此蓋中原地勢之度數也中興更造渾儀而太史令丁師仁乃言臨安府地勢向南於北極髙下當量行移易局官吕璨言渾天無量行更易之制若用於臨安與天參合移之他往必有差忒遂罷議後十餘年邵鍔鑄儀則果用臨安北極髙下為之以清臺儀較之實去極星四度有竒也宋史天文志北方南斗六星天之賞祿府主天子夀算為宰相爵祿之位南二星魁天梁也中央二星天相也北二星天府廷也南星者魁星也北星杓也石申曰魁第一主吳二會稽文獻通考宋兩朝天文志天市垣二十二星東西列各十一星其東垣南第六星曰吳越乾道臨安志國史地理志兩浙路當天文南斗須女之分天文祕訣南斗牽牛星紀之次初斗十一度外末女七度內於分為吳越於辰在丑於野在揚兩浙之蘇秀湖杭常潤明越睦處溫台衢婺皆吳越之分也天市垣吳越去極七十八度入九度皆入牛宿十二諸國越距西星去極二十三度入斗四度王十朋會稽風俗賦越於九域分曰揚州仰瞻天文度當斗牛在辰為丑自夏而侯孫因越問射祥光於斗分兮占星紀於天倪牽牛炳其初躔兮屆須女之七度少陽當其正位兮為萬物之潔齊葛灃錢塘賦顧兹都督之大府上當星紀之躔次驗夏書之所别為揚州之內地羣書考索九州十二域或繫之北斗或繫之二十八宿或繫之五星揚徐主於權此繫之北斗者也星紀吳越也此國之繫於二十八宿也星紀之次其州曰揚此州之繫於二十八宿也歲星之主齊吳熒惑之主楚越此繫之五星者也然吳越南而星紀在丑南北相反而相屬何也先儒以為古者受封之日歲星所在之辰其國屬焉觀春秋傳凡言占相之術以歲之所在為福則古之言星紀者未嘗不視歲之所在也班固曰丙丁江淮海岱戍主吳越此以方位辨州土也蓋自甘德石申以十二次更配十二分野而分野之次已明自班固取三統厯十二次以配十二野而分野之次益明及費直之説周易蔡雍之月令章句所言頗有先後故陳卓更言郡國所入之宿度而分野之度數為尤明清類天文分野之書晉天文志十二次分野始角亢者以東方蒼龍為首也唐十二次始女虛危者以十二支子為首也其以斗牛為星分之首者日月五星起於斗宿古之言天者由斗牛以紀星則星紀為十二次之首而斗牛又二十八舍之首也清類天文分野之書浙江等處承宣布政使司府縣並屬斗牛分觀象玩占歲星經南斗吳越有福其歲大豐守之六十日臣有增爵祿者木星經南斗吳國大稔歲星守牛天下和平石氏曰守三十日九十日四夷來朝火星入牽牛而出其南守二十日有大赦黃白雲氣入牛牛蕃息木星經女石氏曰越人以金銀貢織女三星在天市垣東一曰東橋一曰天女天帝之女也主經緯布帛絲枲之事主收藏珍寶以制衣裳成文繡天之水府也星足常向扶筐牽牛亦常向織女之足三星俱明天下和平於越新編按吳越在東南而斗牛乃在揚州分次餘照所及星光燭天區區尺土誰為界限若以南北江源論則星之與野原不甚逺星圖發凡北極出地各處不同如順天出地四十度常見亦四十度浙省出地三十度常見亦三十度南極入地理同杭州府五代史吳越世家豫章人有善術者望斗牛間有王氣牛斗錢塘分也占之在臨安清類天文分野之書杭州府禹貢揚州之域牛女分野明一統志杭州斗分野萬厯杭州府志羣書所指吳越度數不無稍異蓋乾象推遷前後有差殊耳然大要則起於斗也故一統志斷從斗分野今從之內緯祕言斗十三度杭州府錢塘仁和二縣入八分之八海寧富陽餘杭臨安於潛新城昌化麗八分之九舊浙江通志古測杭州斗分野今測杭州斗一度杭州府志杭州斗十度值漸臺下或曰斗一度顧豹文曰星野之説或有獻疑者曰吳越地近江海在南分野星紀在北是驅南轅於北荒也答曰測地者午南子北測日晷者午北子南今吳越在南而測之者在丑之辰是與測日晷者同一法也何疑焉一行曰精氣所屬或以封國或以歲祀世多採用其言其實非也或又曰厯代以丑為星紀斗牽牛女度數多不同且星與世推移此又可疑者也答曰自春秋時論吳斗分也越牽牛分也厯二千餘年天漸差而西星辰漸差而東明初杭郡當斗十度值漸臺蘇州當箕四度值扶筐若守春秋之法則與天違矣及後一統志改三度迄今又百餘年移入斗一度夫度一與度三雖有異而所去不遠同在斗度則一是可深信者也藏書集要武林杭州府斗八度丑宫錢塘縣志杭為斗一度前志俱然惟劉基謂為牛分唐順之謂是牛一度蓋在斗牛之間女稍逺矣謹按星紀分野吳越同占其各郡所入度數則皆言人人殊况屬邑乎故於總部外第就十一郡分列諸家之説而不及各縣但縣志內或有與諸家之説相發明者間附一二以備參考嘉興府至元嘉禾志嘉興乃斗之分野而崇德處吳越之間則獨在斗牛躔度之交宋建炎初秋占者望斗牛間有紫氣既而移蹕維揚謂其已驗暨冬十月戊寅孝宗虹渚之祥實在嘉興非其明驗歟清類天文分野之書嘉興府禹貢揚州之域斗分吳地明一統志嘉興斗分野內緯祕言斗十五度嘉興府嘉興秀水嘉善三縣入七分之六海鹽平湖石門桐鄉四縣入八分之四舊浙江通志嘉興劉基分為斗十一度古測嘉興斗分野今測嘉興斗二度舊嘉興府志羣書及舊志所載皆謂嘉興屬揚州以斗牛女三舍為其分而明一統志謂嘉興府天文斗分又清類分野謂斗二度入吳嘉興府分屬斗十一度即今康熙十九年十一月彗星見斗欽天監奏屬吳越則郡分可專言斗不必及牛女也嘉興府志嘉興府揚州之域於經星為斗牛於緯星為女火為天辨於次為星紀於度為斗六至須女三於十二辰為丑於五星為熒惑於占為朱鳥藏書集要檇李嘉興府斗九度丑宫湖州府清類天文分野之書湖州府禹貢揚州之域斗牛之分古防風氏之國也明一統志湖州斗牛分野內緯祕言斗二十一度湖州府烏程歸安二縣入六分之三牛四度湖州府德清長興武康入四分之三安吉州孝豐入四分之五舊浙江通志湖州亦斗分古測湖州斗牛分野今測湖州斗二度藏書集要吳興湖州府斗十度丑宫烏程縣志烏程南屬會稽北屬丹陽會稽屬越丹陽屬吳介在吳越會稽入牛一度丹陽屬斗十六度是烏程分野在牛斗之間德清縣志吳越之國其地相近其星野亦不相逺今廣輿記載杭州嘉興為斗分野紹興為牛女分野湖州為斗牛分野可見德清在牛分者什之三在斗女者什之一寧波府清類天文分野之書寧波府禹貢揚州之域牛女之分越地明一統志寧波牛女分野成化四明郡志前後論吳越星次度數互有不同惟吳虞翻有言會稽上應牽牛之宿下當少陽之位為得之今本府實會稽之東部其牽牛之宿歟嘉靖寧波府志春秋州鳩禆竈之徒所論諸國分星詳矣然不及吳越寧波故禹貢揚州之域於春秋為吳越地於分野則始見於周禮鄭康成注曰星紀吳越也范史志星紀起斗十一度至婺女七度於辰為丑於分野為吳越然則郡之所占蓋斗牛女之次矣晉書星紀起斗十二度比范志減一度費直星紀起斗十度比范志多一度終婺女五度比范志減二度蔡雍星紀起斗六度比范志多五度終婺女二度比范志減五度一行星紀起斗九度比范志多二度終婺女四度比范志減三度諸説星紀丑分皆不同蓋當時布算之術各有所據故其説各因之然語斗牛女為吳越之分一也班志吳斗分野越牽牛婺女分野此又分星紀為二而吳與越又自有分矣有辨星紀之非吳越者曰吳越南星紀北然以厯家仰儀之理推之仰儀反以觀天取光之所燭為驗則星紀在北而光燭於南其以吳越當之者從星紀之所燭也春秋元命苞牛流為揚州分為越國虞翻曰會稽上應牽牛之宿下當少陽之位此又不及斗婺女蓋舉其中牽牛則前後二星皆舉之矣故言吾郡之分星其為星紀也信矣鄞縣志分野之説昉於周禮邦次之繫注於鄭司農歲星之屬取於賈氏京房以卦位積算費直以周易起度蔡雍月令陳卓分躔皆各為分野之疏以合占驗之旨諸論紛紜張時徹嘉靖郡志亦敘之博矣但浩而無涯弛而寡鍵今舉其未詳明者列之吳越域本揚州分宿為牽牛婺女次於星紀爾雅曰星紀斗牽牛也郭璞云斗牽牛者日月五星之所終始故謂之星紀魏史以南斗牛女丑屬之而分會稽入牛一度之內蓋太乙三宫起斗八宫起女屬北方之第七舍斗辰六星二十四度牛丑六星七度女子四星十度在天共四十一度在地五十三度總屬揚州之分而入會稽則牛一度元史云斗四度三十六分六十六杪外入吳越此斗牛女星紀為總屬之説也天文志南斗牽牛星紀之次初斗十一度外末女七度內於分為吳越於辰在丑於野在揚州自廬江九江負淮水之南盡臨淮廣陵至東海又逾南河西濵彭蠡南至越州南斗在雲漢之下流當淮海之間為吳分牽牛去南河寖逺故其分野自古豫章東達會稽南逾嶺徼為越分列星度數云斗第二星至會稽又女七度主越春秋元命苞牽牛分為越國淮南子支干分野以丙子屬越張氏河圖分野其第九宫亦以丙屬明越二州此吳越分野之别也班志地理斗分吳牽牛婺女分越而志天文又以斗屬江湖牽牛婺女屬揚州亦自異矣太微指掌天市垣有列國星二十二起宋厯吳越止於河中而吳越國星正對牛女之次又女宿宫內有十二國星東起於越是知星本有土天自成分野非即保章氏所謂辨星土者歟元命苞謂牽牛流為揚州分為越國流者自彼及此之謂分者由本及支之謂星本北而地在南精氣流映揚為本而越為支光芒旁燭唐一行曰懸象在天其本在地星之與地以精光相屬而不繫乎方隅其占測以山河為限而不主於州國是精氣流分之義晰山河分界之限明而星北地南相岐之説與郡縣杳渺難辨之疑可推矣李淳風州域分野祕術揚州域曰癸丑支之所屬吳越得丑八數劫煞在寅災煞在卯天煞在辰地煞在已刑在酉丑刑戍又金鏡祕訣揚州丙戍宫以癸酉總一宫之分野內吳越屬丙辰謂太乙厯州遊郡以二十八宿躔度所臨苦與四神劫煞刑併者其域必凶此太乙占吳越分野之法也天之所覆甚廣地之所應無窮而災祥之見纖微具别者大約以分宿為主屬辰參之而再稽於本國之星之度其入度不同則占應自異晉史墨曰越得歲而吳伐之必受其凶釋者曰分歲在星紀夫星紀吳越一也何以有得不得之考吳之始伐越乃在辛卯夏五月史墨曰不及四十年越其有吳乎按太歲在卯曰單閼名降入在婺女虛危故曰得歲然何以獨言越得也蓋越之野屬丙丙則與辛合吳越之野屬丑災煞在卯天文志云歲星所在國不可伐可以伐人吳所伐者乃同得歲星之國故凶杜氏曰歲星所在其國有福吳先用兵故受其殃此越得之之説也乙巳夏五月吳伐越越敗吳於檇李按丑野局地煞在巳檇李為吳之丑地煞巳落吳天盤祕指是年仲夏女十度斗十六度漸次十度與太乙遊宿之度贏二度以其贏者入於天漢是時天市之吳越星界於天漢北河分流之岐吳在越前為稍北越居吳後為稍南正在河漈則越已贏二度丑女七度原主越今行十度合太乙遊行之數此又越之所以獨得於月而勝者也丁未春二月夫差伐越敗越於夫椒按金鏡紫徼丁未越野分宫入庚子元四十四局太乙在八宫陽德為天目外迫主算三十三主大將三宫外宫迫主參將九宫蓋其推法在太乙前一辰為外迫在後一辰為內迫在前敗宫為外宫迫在後一宫為內宫迫也是年越果戊辰冬十一月丁卯越滅吳是歲天煞在辰災煞在卯且歲星十二歲而周天至此已越三周而復以卯日克之史墨所謂不及四十年越其有吳之説驗矣然歲星在寅曰攝提格名監德在斗牽牛歲星在子曰困敦名天宗亦在牽牛史墨不取而獨取單閼之在婺女則知女度之為越分也益確認山河脈絡於兩戒識雲漢星沈於四維參以古郡國此一行之善法上慎禔而下恪承安在天高辰逺之不可縷分纖析耶內緯祕言牛三度寧波府鄞縣慈溪入七分之六女初初度寧波府奉化定海象山三縣入七分之三舊浙江通志古測寧波牛女分野今測寧波斗四度藏書集要四明寧波府斗十度丑宫紹興府清類天文分野之書紹興府禹貢揚州之域其山鎮曰會稽牛女之分萬厯紹興府志星野諸説大率紹興主牽牛為多舊志云春秋傳吳越同壤漢永嘉中木火金聚牛女孫氏實有江左陳亡星孛於牽牛班氏别之恐未然按西漢會稽兼吳越地故孟堅於兩分皆稱會稽斗牛女連度吳山陰閩嶺南蒼梧亦接壤或分或合總之浙東皆在牽牛度固不抵牾二孫俱領會稽太守陳奄有江南山隂無偏王奚必應在吳分哉史墨曰越得歲吳伐之必受其凶吳越歲各有主班氏論未必非也周述學曰紹興府領八縣隸浙江布政司疆域不及古會稽十之一所分天度無幾所干災祥甚微當以吳越通占况斗牛二宿同在星紀一次閫奧之中亦不宜分論惟風雲物氣乃一郡之所發庶可以專視也今清類以辰次配野丑為吳越分屬揚州一行以為在地江河之精氣在天為雲漢地有南北河雲漢亦分兩派南戒自嶺徼達於甌閩為南紀江源自南紀之首循梁州南徼達華陽與地絡相會並行而東流謂之南河揚州吳越當南河之末流斗牛當雲漢之南派故星紀應揚州吳越之分南斗當淮海間牽牛去南河寖逺自豫章抵會稽南逾嶺徼訖蒼梧南海為越分清類辰次躔度赤道起虛六度外為的黃道自斗三度至女一度為星紀之次仍元守敬以弧矢定也考班固自斗十一度至婺女七度費直分斗十度至女六度蔡雍分斗六度至女二度晉天文志自南斗十二度至須女七度一行初南斗九度中南斗二十四度終女四度其分躔次之殊者以古辰次與節氣相係各據當時厯數與歲差之變也據以南斗為吳分則廣陵當屬斗而晉志以屬牛八牽牛為越分則豫章當屬牛而晉志以屬斗十據清類斗三度入丑則斗一度在燕不得屬九江女二度入子則女六度在齊不得以屬六安非惟躔度分次之失而宿度配郡亦訛故惟據一行之配野守敬之分次則分野之論定其經星分野紫微垣外北斗七星據石氏第四星主吳春秋文耀鉤以會稽與北斗七星屬權星據東漢天文志第六星主揚州常以五巳日候之丁巳日為吳郡會稽太微垣外三台六星春秋元命苞以上台下星主荆揚天市垣二十二星宋兩朝天文志東南第六星為吳越南斗六星第二星主會稽建星在吳越分所主經始之謀女宿南十二諸國十六星周天全度入牛宿七度去北極一百二十三度為越星畢宿北五車五星列星度數以東南一星為司空主楚越其緯星分野木星據精義以東方歲星主齊魯東吳之國火星據精義史記天官書吳分於五行屬火亦相同也其十干分野淮南子甲齊乙東夷若以甲乙俱屬華則甲為齊魯乙為吳越天官書以吳越分其日屬丁其十二支分野據精義寅卯屬東方木卯為吳越淮南子以戌為吳分其九宫八卦分野按河圖四宫巽屬東南屬吳越經星惟主斗牛其餘各星僅備參驗而已緯星以木為主以火為輔天干以嶺徼之內屬乙而外為屬丁支辰以屬卯為得正又為屬戌者取其合也其宫卦則重於加照又曰星野之分雖有定屬世厯千古不能無變有因天運而變者有因地勢而變者有因人事而變者以天運論之宿度分於黃道黃道遷於歲差如宿屬斗末者或變而為牛初則野之𨽻於斗末者亦當更而為牛初矣此因天運之變而分野當改也以地勢論之吳越相隔一浙風俗音容相尚頓殊是人物限於山川而山川限為分野惟山亘古今而不變然川亦有壅塞或有開導河或有遷徙如汴城或徙於河之北復更於河之南則亦當隨其遷徙壅導而判其分野矣此因地勢之變而分野當改也以人事論之據魏徙大梁則西河合於東井秦拔宜陽則上黨入於輿鬼或昨屬荆豫今𨽻司兖朝為零桂之士夕為廬九之民此因人事之變而分野當改也若在分野之占亦有異同以人在地上占星有南北之分星在天上現占有隱顯之殊其應災福亦隨以異即南北兩朝之占北國先見變而災重南國遲見變而災輕微矣三才交變如此分野之説豈可泥於一定而無變通之術耶紹興府志王嗣臯曰按舊志載周述學之言篇幅頗長計二千二百餘言其雜引諸書往往多謬由訛以傳訛也如丑為星紀之次其度數始末古人所論不同班固始斗十一度終女七度費直始斗十度終女六度蔡雍始斗六度終女二度迄乎晉志唐書亦復互異豈古人抵牾其説哉特因二十八宿必於每宿內論一距星而諸家所論之星先後不同則宫次之得度亦異周君遂疑為歲差之故則謬矣夫厯法以冬至太陽所躔之度為厯元而歲歲移動故曰歲差即每月昏中旦中之星亦以歲差而移動昭眧也若夫分野原以列宿配之此天地自然之理如尾箕為燕斗牛女為吳越此説與歲差無涉而儒家不曉乃分為瞀亂牽合可乎余怪文獻通考載洪氏隨筆篇為野因歲差而當變因地勢而當變因遷民而當變杜撰之言太史家嗤之余謂天變人變之説固不可以論分野若夫川有通塞河有遷徙分野以地勢變此實偶合於天地之理其餘皆妄論也舊志載述學之言多從洪氏來而又加臆説以人命吉凶附會分野謹刪而辨之又曰古今為分野之説者言其槩則分以十二辰言其詳則分以二十八宿按吳越繫揚州晉書天文志陳卓所定自南斗十一度至須女七度為星紀於辰在丑吳越之分唐宋皆因之元書郭守敬所定自南斗四度九分至須女二度一十二分為星紀於辰在丑吳越之分先後差六度有奇然非互異也凡太陽黃道二十八宿直之每宿有一距星距者以此宿與彼宿相距之界也自漢迄宋皆以斗柄為距星故吳越分野始於南斗十一度至須女七度其自斗十一度以前每占無分多不驗郭守敬精算特絶不以斗柄為距星而以斗魁為距星實從唐僧一行之言悟入唐書載一行分野篇凡分野以雲漢貫注列宿相符為驗乃曰南斗在雲漢下流故當淮海間為吳分而牽牛去南河寖逺故自豫章至會稽郡又南逾嶺徼皆為越分一行闡其理郭守敬精其算明誠意伯劉基有清類分野志繫以唐書一行之論而劉誠意所指紹興府則曰牛女分野夫既言牛矣又何以言女凡占驗越郡之地與海稍逺者以牽牛驗其沿海一帶皆驗於須女然牛女二宿仍以南斗為領故吳越分野占天官家知之難與儒家言也內緯祕言牛五度紹興府山隂會稽入八分之五蕭山諸暨餘姚入八分之七女三度紹興府上虞嵊縣新昌入四分之六舊浙江通志古測紹興牛女分野今測紹興斗五度藏書集要於越紹興府斗十一度丑宫會稽縣志或問紹興府既占牛又何以占女曰郡境之南陽宜占牛其隂負海宜占女凡分野有大綱以十二辰分之元授時厯郭守敬所定自南斗四度起厯牽牛之度至婺女二度止為揚州配吳越劉基稱其最精又分野有節目以二十八宿分之今紹興即古越地自唐宋元明以來俱占牛女其應如響蕭山縣志清類分野編次紹興府曰牛女分野則占牽牛亦占婺女乃兼二宿此確論也儒者不解以鄭夾漈釋一行雲漢圖誤指南北河為在地之江河夫天有北河三星名北戒南河三星名南戒所謂兩戒也此兩戒為天下大勢所關故漢志有曰北河為邉門南河為越門漢武帝時有星孛於南北河而擊拔朝鮮置二郡太史所載班班可考也台州府孫綽遊天台山賦台嶽之所奇挺實神明之所扶持蔭牛宿以曜峯託靈越以正基名勝志陶隱居云山有八重四面如一當斗牛之分上應台星故曰天台清類天文分野之書台州府禹貢揚州之域南斗須女之分明一統志台州牛女分野內緯祕言牛五度台州府臨海太平入五分之三女五度台州府黃巖天台仙居入三分之九舊浙江通志台州臨海屬牽牛四度古測台州牛女分野今測台州斗六度藏書集要天台台州府斗十一度丑宫寧海縣志甘卓范蠡諸人分星次丹陽入斗十六度會稽入牛一度寧海接壤會稽郡其入牽牛當與鄞越同太平縣志厯代星書皆以斗牛女為吳越之分野郡志亦云台與兩浙皆為南斗須女之分特晉志州郡躔次以會稽入牛一度陶𢎞景亦謂天台山當牛女之分上應台宿故以名山分野當在牛女之間於次為星紀於南斗為天梁星於北斗為權星於三台為司命下星於天市垣為吳越星於五星為熒惑於辰為丑金華府元和郡縣志開皇九年隋平陳置婺州蓋取其地於天文為婺女之分野清類天文分野之書金華府禹貢揚州之域牛女之分越地明一統志金華府牛女分野萬厯金華府志金華自昔以婺女名州宋濓寶婺觀記説者謂自南斗十二度至婺女七度為星紀吳越之分皆屬焉何獨婺之人得以專祠婺女乎是不然吳越之分固廣而斗牛女之所該亦廣茍以躔度細推之郡之墟正上直於婺女耳星之降祥焉可誣也鄭宗疆婺星所舍辨封域分星災祥之説見於保章氏久矣然而謂婺郡為婺星所舍者其説甚長不可以不辨竊考星經周天五十一萬三千六百八十七里六十八步一尺八寸二分此天之圍數也夫圍數三則徑一實得十六萬二千七百八十八里六十一步四尺七寸二分此天之徑數也至於二十八宿度數每一度計一千四百六里二十四步六寸四分有奇則凡三百六十五度四分度之一正合周天之數明矣若以周天之數限於十六餘萬里之內自昔帝王而下闢地之最廣者無如秦始皇漢武帝唐太宗計其四封之境亦不過二萬餘里此外為里者猶十四有餘萬里今星家論著星宿所入度數止以角亢氐為鄭分一曰韓房心為宋分尾箕為燕分斗為吳分牛女為越分虛危為齊分室壁為衛分奎婁為魯分胃昴為趙分觜參為魏分井鬼為秦分栁星為周分翼軫為楚分若以地域二萬里計之不過得星之一十五度耳而乃以三百六十五度盡入於二萬里之內其理果何謂乎此外十四餘萬里或大海或廣漠四夷及百蠻在其間者星宿或無所隸屬焉此其可疑者一也又况尾箕為東方之宿而乃主北方之燕危虛為北方之宿而乃主東方之齊奎婁在西而東主魯井鬼在南而西主秦畢昴正西而北主乎趙角亢正東而中主乎鄭以至吳越居東南乃屬北方斗牛女之分宋與衛鄰乃屬東方房心之分周在河陽既以為南方栁星張之次而班固復以子為周趙在河北既以為西方昴畢之次而班固復以寅為趙則東西南北互易其位靡有定據是星之與土各自異方矣此其可疑者二也又如北斗之度周乎天中猶可謂主乎九州若天五車九坎皆在牽牛之南偏居一方而亦分主列國何耶此其可疑者三也至論其躔次之疏密地壤之廣狹則又有疑焉宋衛之於燕踰越甚逺而房心尾箕實連而為次魯衛與趙疆理不入而奎婁昴畢實貫而為列自斗牛以至室壁皆北方之宿也而南起二廣東亘江浙過宋魯而北終於齊衛則自吳越而至齊至衛皆連乎是七宿者也夫尾箕乃幽燕之分而斗牛二宿承之閩廣幽燕吳越相望判乎其不相入矣自井鬼以迄翼軫皆南方之宿也而西起秦雍南帶四川又北折入於三河成周而南始入於楚帶乎衡湘則自秦雍而至楚至衡湘皆連乎是七宿者也角亢乃鄭之分與楚為鄰翼軫而下角亢聨之秦雍荆衡里道絶逺杳乎其不相比矣星甚相邇其地絶相逺其故何耶此其可疑者四也而又於南則分野太疏於北則分野太密宋鄭二國同在豫州之東為里幾何而乃當夫角亢氐房心之五星魯衛二國密比乎兖徐之間所封尚狹而乃當夫室壁奎婁之四次周遷洛陽其地尤褊而分秦與楚之外亦獨占夫栁星張之三次北之分野可謂太密矣斗牛女止三宿耳而南起二廣東抵福建二浙北至江南兩淮逺據江南之九路井鬼二宿耳而北起於秦南及四川以至於河南溪洞雲南大理諸國奄及西南之二方南之分野可謂太疏矣或疏或密所隸不等其又何耶此其可疑者五也或者求其説而不得則曰其國始封之日推歲星所在而言謂如歲星在斗牛而吳越始封而斗牛屬吳越自以為得其説矣而不知太史公天官書謂木火金水土各以其舍命國則不但指嵗星而已也雖然二者之義蒙則於斯皆謂未然何者姑以婺女一星考之星經云兹星明則天下豐女功儲大國充富夫二十八宿隨天運轉靡一息之或停輝光所燭下及萬方何有乎分野之局婺星凡十一度計一萬五千四百七十里豈但臨乎婺郡而已此星一明豐及天下其照臨之逺且大槩可想矣竊謂天道流行其大無外其小無內初何嘗有限界星天星也亦何限哉大抵宇宙間萬象異形而同體三才異位而同神蓋自有交相感應之理此其機括之所係淵乎至哉嘗考左氏所載高辛遷閼伯於商邱主辰故辰為商星遷實沈於大夏主參故參為晉星夫商邱豈必上當辰大夏豈必上當參惟人職主是星而為之祀則是星之休咎亦隨其地而應焉杜預注謂主辰主參為主祀是也能知乎此則蒙所謂前之五疑者又不待辨而自明矣是以朔方共主於昴宿則昴亦應之其餘蠻夷諸國亦必於星宿各有所主特中國不得而盡聞耳然後知分野之説即星之所應言之則可以地驗之則不可此杜元凱主祀之言實為古今確論也蒙近為寶婺觀作重建記謂郡因所主宇而祀之非有局於分野既不誤於歲星所封亦不拘泥於五星所舍命國之論實有合於元凱主祀所注足以釋千古之疑焉明道先生謂天地間只有一箇感與應而已更有甚事伊川先生謂感應之理知道者默而觀之是雖概為事物而言然主祀之義亦可驗於此矣蒙庸取是而為之辨內緯祕言牛三度金華府金華蘭溪東陽入六分之四女四度金華府義烏永康武義浦江湯溪入七分之二舊浙江通志古測金華牛女分野今測金華斗四度藏書集要寶婺金華府斗十二度丑宫蘭溪縣志蘭古於越國揚州之地分野為斗牛婺女之間至隋唐以婺名州則婺星專屬吾郡之分星矣浦江縣志婺星一十一度一萬五千四百七十里浦江去金華百里同婺女之次明矣衢州府清類天文分野之書衢州府禹貢揚州之域牛女之分明一統志衢州牛女分野𢎞治衢州府志魏陳卓分星度最精乃以會稽入牛一度若然則衢之分星當在牛而國史志地星又謂兩浙當南斗須女之分故並載以俟知者內緯祕言牛二度衢州府西安江山二縣入二分之六女二度衢州府龍遊常山開化入七分之八舊浙江通志古測衢州牛女分野今測衢州斗四度藏書集要太末衢州府斗十二度丑宫西安縣志蔡汝楠天文略曰十二次揚州丑分星紀之次衢州自牛五度至女一度明清類分野書曰衢自牛五度至女三度按天文諸家言或以會稽為吳或以牛女兼主越或言牛不及女或言斗不及牛或言星不言度獨天文略分野書二説為正蓋斗牛承箕尾末度自淮而江東漸三吳南盡宣歙而斗乃分入饒信洪吉諸州之界牛則自睦以東合婺之須女故為牛女而衢地適當其處故二書得以鑿鑿言之總之會稽越也本不兼吳斗吳星也本不入越女越星也本不入吳此其劃然可辨者惟唐一行以衢屬會稽入牛一度至五度是已而又不及女且度數又與二説不同常以度數與道里較之女固婺星也牛女之界被於閩粵逺而衢與婺相距僅二百里則不應入三度而宜為一度可無疑矣開化縣志金華舊為婺州而衢在唐亦常以女名樓江山舊亦稱須江嚴州府清類天文分野之書嚴州府禹貢揚州之南境牛女分野明一統志嚴州牛女分野萬厯嚴州府志嚴州清類分野書自斗三度至女一度屬吳越分揚州而一統志亦謂天文牛女分野戴槐志淳安謂去會稽六百餘里范蠡鬼谷諸人以會稽入牛一度則淳安尚未入牛當如宋史所云南斗須女之分似為有據建德縣志舊郡治在淳安之雉山故云內緯祕言牛三度嚴州府建德淳安桐廬三縣入三分之四女初度嚴州府遂安夀昌分水入八分之四舊浙江通志古測嚴州牛女分野今測嚴州斗三度藏書集要嚴陵嚴州府斗十三度丑宫夀昌縣志夀昌本會稽富陽地當在牛一度天文志以會稽入牛一度故云分水縣志按揚州分野舊史謂總屬斗牛女此就揚州統言之也若以一邑分言之不惟專屬一星而且專屬星之一度其間分寸未可混也蓋在天一度在地計二千九百三十二里七十一步二尺九寸四分斗有二十五度牛有七度女有十一度概以三星隸之豈有一邑而統十二萬里者乎今考天盤合地盤之法以星宿配山川而不及郡邑蓋郡邑時有改移山川永無變易而杭之崤山當斗宿在新城分水之界相去僅四十里則當從斗為是溫州府宋史天文志東甌五星在翼南天文録曰東甌東越也今永嘉郡永寧縣是也按東甌五星晉志在二十八宿之外乾象新書屬張宿武密書屬翼宿與步天歌合清類天文分野之書溫州府禹貢揚州之域斗牛須女之分越地明一統志溫州斗牛女分野萬厯溫州府志溫州故禹貢揚州之域春秋時為吳越地其分野所值當在斗牛之交於辰則丑於次則星紀於宿則斗牛女內緯祕言斗五度溫州府瑞安平陽泰順三縣入六分之八一本在牛五度斗二十一度溫州府永嘉瑞安二縣入五分之七樂清平陽泰順三縣入六分之八舊浙江通志古測溫州斗牛分野處州斗分野今測溫州斗六度處州斗四度藏書集要東甌溫州府斗十四度丑宫瑞安縣志按諸家志吳越揚州分野雖起度不同要不越於斗牛須女間此次舍之正星也至於翼南東甌五星是為一方專星惟東甌主之而他郡不與焉謹按舊浙江通志星野度數沿訛者多不能符合今測而嚴州但云淳安尚未入牛度溫處旁引東甌處士星又與分野圖説自相抵牾故並録以俟參考處州府名勝志隋開皇九年處士星見於分野因置處州宋史天文志少微四星在太微西士大夫之位也一名處士或曰博士宫南第一星處士第二星議士第三星博士第四星大夫明大而黃則賢士舉清類天文分野之書處州府禹貢揚州之域斗分吳地古縉雲之壇宋濓神仙宅碑栝之名山上直少微天文家所謂處士之星也靈輝下燭凝粹敷和崇禎處州府志處州古括蒼地於天文屬揚州斗分為牛女之次上直少微星應處士故以名郡內緯祕言斗十七度處州府麗水青田縉雲松陽遂昌入三分之七龍泉慶雲雲和宣