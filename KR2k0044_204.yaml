body:
  text: 浙江通志卷二百五列女四嘉興府秀水縣明常士昌妻隋氏嘉興府圖記文登人適秀水常士昌士昌守雷州卒於官隋年二十六間關扶櫬萬里歸葬教其子皆成立垂五十年如一日萬歷嘉興府志又裔孫常淇妾金氏常禾妻張氏常䇿妻髙氏皆少年守節人稱世節云蔡士能妻趙氏𢎞治嘉興府志名真年二十八喪夫誓死自守未嘗聞笑語聲後以次子濟任遼東苑馬寺主簿迎往就養卒於遼東夀八十五包愈妻陳氏嘉興府圖記年二十一歸愈期而寡遺腹生子方晬翁姑亦相繼殁陳畢力喪葬撫孤事死不違其則子長為娶婦患危疾復不起乃收從子為後苦志不渝有司奏旌之俞貞女嘉興府圖記同邑髙岑聘之未歸而岑亡父母别為擇壻貞女斷髮以死自誓父母憐其志不復強之施普妻陳氏萬歷秀水縣志年十九歸施甫三載施卒時年二十一斷髮自誓奉翁姑以孝聞陳貴妻李氏兩浙名賢録甲寅倭變李抱幼女走倭追及遂跳身入水倭急持其髻李􅎲倭手濡血倭怒以刃抉其首擠之水詰旦母女相持浮出水次陶氏二節萬歷秀水縣志陶託妻王氏年二十三嵗而寡其妾錢氏年二十八兩人厲志苦節屏居一室教二子有成張貞女明列女傳年十四受劉伯春聘伯春少負才名必欲舉於鄉而後娶未幾卒女號泣截髮自為詩祭之持服三年不踰閾不茹葷服闋即絶飲食旬日而卒甫年二十舅姑迎柩合葬焉項貞女萬歷嘉興府志項元沂女許聘同郡聞人濓未婚而濓故時年十六聞訃即晝夜悲痛請濓衣履供奉樓居四十六年足不履地終身不施笄總徐孝女萬歷嘉興府志徐全之女早失恃事父恭慎父疾醫藥罔效遂刲左股以療之父得愈女痛楚幾殞後亦愈項貞女明列女傳國子生道亨女許字吳江周應祁精女工解琴通列女傳事祖母及母孝年十九聞周病瘵謂乳媪曰未嫁而夫亡當奈何曰未成婦也改字無害女正容曰昔賢以一劍許人猶不忍背況身乎及訃聞父母祕其事然女聞吳江人來已喻祖母屬其母入視女色甚溫母釋然去夜俟諸婢熟睡獨起以素絲約髮衣內外悉易以縞而紉其下裳檢衣物當勞諸婢者標之名列諸床上大書於几曰上告父母兒不得奉一日歡今為周郎死矣遂自縊兩姓父母從其志遂合葬焉李傳妻崔氏萬歷嘉興府志年十七適李成婚七日夫遘厲疾而殁崔矢死苦守時有謀娶之者崔輒求自盡而止貞守五十四年金應元妻徐氏萬歷秀水縣志歸金二載夫亡每欲自縊柩側其姑防衛得免撫從子九成如已出晝夜紡績五十年如一日奉旌包氏季女萬歷嘉興府志李生委之禽母兄嫌李貧議他適女遂憤悶不食者七日長姊力持匕箸瀹季女口未及咽而卒徐貞女兩浙名賢録居王江涇許字鼎室子其父以醫致富父死而産落無立錐地父啖壻罷婚壻亦甘焉女潛知之問父計奩金幾何豫我當從命父授以百金輒呼鼎室子與之抵暮自經後父以其柩歸鼎室子沈貞女兩浙名賢録字淑貞沈澤之女姊妹二人其姊嫁盛實早世議聘淑貞以續舊姻淑貞辭曰姊之夫非妹之匹也遂誓終身不適人以處女終丁鳯鳴妻楊氏朱國祚丁烈婦傳歸丁年僅十五越二載夫卒舅姑火其尸當煙焰薰灼之時婦捐軀赴之賴救得免既而聞有欲奪其志者乃自刎刎而不死更加創焉傅之藥輒揮去竟以身殉聞者傷之顧四相妻陳氏萬歷嘉興府志陳金之女年十八歸顧甫二載夫病劇割股和藥以餌獲蘇又二載夫死於疫自經至再家人救免時年二十二翁姑欲奪其志乃剪髮矢志茹蔬終身年七十嵗楊氏二節萬歷嘉興府志賀氏楊和之繼室年二十四和卒子道升娶媳韓氏年二十道升亦亡姑媳共勵相與苦守程之逺妻周氏秀水縣志周履靖女將結䄜而程疾篤家人難之氏白父母請踐期父嘉其志為笄櫛而往獨行廟見之禮即躬侍湯藥越二十五日之逺卒氏以貞節自矢孝事翁姑撫姪燦為後卒年七十有二徐世淳妾趙氏倪氏徐肇梁妻張氏秀水縣志世淳守隋州闖賊陷城不屈死妾趙氏亦罵賊死妾倪氏匿叢篠中得免已而寇去氏出赴尸所慟哭棺殮扶櫬以歸年僅二十七苦節三十餘年世淳殉難血衣什襲如故每一展對輒嗚咽流涕年六十卒世淳子肇梁殉父難妻張氏寡居於家乙酉城破密縫衣襦閉户自經張某妻沈氏秀水縣志年二十一適張未半載遇亂避兵陶墩遭掠持刃自殺守者奪之乘間投河越數日雷雨尸浮至門顔色如生而上下衣縫紉牢密夫感其義遂為僧袁烺妻吕氏舊浙江通志明季兵亂竊烺七首佩之一日舟行遇兵遂赴水兵以鈎攬其髮吕出佩刀截髮乃沒更三日尸浮烺取葬焉錢淳妻曹氏舊浙江通志明季兵亂淳往鄉鄰婦拉氏以逃氏曰我寧死耳遂抱幼女赴水越五日淳歸得尸面如生抱女不釋淳感泣不復娶黃季瀚妻胡氏嘉興府志同夫避難氏被掠投河死又蕭某妻投井死錢世茂妻陳氏鄒之屏妻孫氏俱赴水死俞瑞宇妻張氏自殺徐先忠妻沈氏張桐妻諸氏顧闛妻任氏徐有孚妻戚氏夏周妻項氏施曰俞妻項氏夏璧妻張氏鍾一竒妻張氏吳中和妻徐氏濮相妻楊氏姚鈳妻項氏黃鶴年妻張氏馮坤妻夏氏馬秦川妻孫氏吳引泰妻沈氏周純初妻懷氏陳三洲妻吳氏錢竒英妻繆氏唐昊妻姚氏施泮妻俞氏沈鳯妻馮氏卜長生妾沈氏沈天慶妻陸氏吕竑妻施氏卜象先妻項氏吳楨妻王氏曹嵋妾侯氏周鏡妻沈氏金澄之妻卜氏國朝金光奎妻徐氏嘉興府志年十六歸金兩月而夫亡慟視含殮從容就縊俄而復蘇更六旨建閲月而死督撫具題奉坊旌表金善鎔妻鍾氏秀水縣志年十七夫亡屏居一小樓四塞窗牖足不履地值嵗飢散財以旨建活戚族之餓者冰操四十餘年康熙十年具題奉坊旌表卜兆龍妻伍氏舊浙江通志年二十適兆龍撫前子如己出明年舉一子兆龍殁氏哀毁旨建屏鉛華獨居康熙二十年具題奉坊旌表孫耒妻曽氏題旌册父元良無子贅壻於家早卒氏年二十九矢志撫孤食貧苦守歷四十旨建一年教子王孫成進士康熙二十三年具題奉坊旌表鍾貞女題旌册鍾楚竒女受金鼎聘未婚鼎遇兵被害女年十七即請於父母歸金守節夀七十旨建有七康熙四十三年具題奉坊旌表翟貞女嘉興府志許字楊煥未婚煥殁女年十九聞訃奔喪號慟欲絶遂留事舅姑曲盡婦道舅姑卒歸母家守志歷三十九年康熙五十三年具題奉旨建坊旌表屠秉坤妻沈氏題旌册年二十八而寡養姑撫子守節四十載夫弟秉貞夫婦相繼殁氏鬻産經紀其喪鄉黨稱之胡潢妻鄭氏題旌册年十八適胡姑患疽氏親為吮拭久而不倦夫殁時年二十八事舅甚孝守節二十五年具題奉以上二氏俱康熙五十九年旨建坊旌表郭大娜部咨案驗農人郭聖嘉女年十九未字康熙六十年八月十七夜大娜執爨厨下事畢出闔門户傭人仲二匿暗中欲犯之大娜堅拒大呼父母繼至哭訴憤恨父母鄰里咸勸慰之大娜隨旨建入房自經死仲二依律究擬大娜節烈捐軀奉坊旌表陳善妻徐氏題旌册年二十六而寡家貧勤十指以仰事俯育慘苦備嘗年六十六而殁勵旨建節四十一載雍正四年具題奉坊旌表許氏二節題旌册董氏陳氏許天行之妻妾也天行殁董年二十九止育一女陳年二十四遺腹生一子二氏交撫之情同姊妹董守節二十五年先卒陳守節四十八年汪曜臨妻姚氏題旌册年二十九夫亡勤織維以養舅姑撫遺孤至於成立姑病衣不解帶者纍月姑殁殮畢一慟而絶守節二十三年盛王譽妻倪氏題旌册年二十八夫亡遺孤紹植生甫九月翁年七十餘旁無伯叔氏事翁存殁盡禮教子有成守節三十四年張萬鍾妻衛氏題旌册年十八歸張二十八而寡孝事舅姑撫孤成立蓬首素服不出戶庭者五十八年而卒題奉以上五氏俱雍正六年具旨建坊旌表沈振宜妻吳氏題旌册年二十而寡事姑撫姪為嗣守節四十八年王逸古妻范氏題旌册年二十六而寡夫弟欲奪其志氏毁容力拒葬舅姑及夫棺食蔬衣縞無子依母以居守節三十四年魯斌妻楊氏題旌册年二十七而寡遺子女各一氏自甘荼苦足迹不出户庭撫教子女有成守節三十四年奉以上三氏俱雍正十年具題旨建坊旌表陶宗凱妻屠氏題旌册年二十三而寡事舅姑撫繼子守節三十八年雍正十一年具題旨建奉旌表坊顧允昭妻沈氏題旌册年二十七夫亡事姑孝姑病痢氏衣不解帶厠牏浣濯必身親之姑卒脫簪珥治含殮撫一子至長為娶婦早死遺兩孫氏偕媳矢志煢煢艱苦教育成立守節三十旨建五年雍正十二年具題奉坊旌表張棠妻金氏題旌册年二十九夫亡姑唐喪夫時年猶盛至是子又夭遺孤幼稚家日落痛不欲生氏多方勸慰以養姑撫子自任為人緣履每兩受值九文日可數兩隆冬丙夜手指皸瘃不能持針線以水溫之復作少頃手復僵以燈油和醬敷創處痛刺心痛已指稍伸又作不已親黨有死喪雖不能備𡨕鏹必遣子往拜曰禮缺貧耳拜不可廢也姑沒營喪葬率子親持畚鍤守節四十四年雍正十三年具題候旌姚貞女舊浙江通志姚遂昌女許字王景直年十三父遘危疾女禱三晝夜得藥丸於衣裾間父服之愈十七而景直殁女過門謁舅姑成服立嗣未幾翁亡子亦殤女截髮誓死督學谷應泰旌之丁元德妻周氏秀水縣志元德卒氏哀毁目盲終喪即絶粒死髙貞女秀水縣志母早亡事父鴻最孝許配王氏子未結褵而壻幾陷獄氏驟聞而投杼曰我少失恃今又失所天不若從母於地下矣遂閣户自經陳琦標妻沈氏秀水縣志年十八歸琦標甫六載夫死越七日遺孤復殤乃拜别翁姑囑伯叔以孝養姑驚而防護之翌辰姑少懈遂闔扉自經年二十有三袁福生妻李氏秀水縣志年十八適袁九月而福生卒氏痛哭投繯救蘇七終藏滷一罌急仰之灌救得不死未幾嘔血數升歸别父母父母強留療治疾篤曰兒欲歸死於表起而仆嘆曰不能歸矣奈何遂卒嚴氏三節嘉興府志嚴嘉訓繼妻仲氏年十六夫亡撫前妻子禧守節四十五年嘉訓弟嘉祚聘姚氏未婚而夭時姚年甫十三聞訃哀泣奔喪依姪禧以終後禧亦早卒妻潘氏年二十五子甫五齡撫而教之歷四十九年時稱一門三節仲晉妻金氏嘉興府志晉殁氏年二十九誓以身殉號慟不已絶粒七日而死丘永侯妻顧氏嘉興府志喪夫無子紡織養姑一十六年里豪張某糾黨謀娶氏佯允諾梳粧整衣閉户自經邑令任之鼎給扁曰節烈可風金惟恭妻毛氏秀水縣志惟恭卒氏年二十二撫子泳之年三十一又夭遺孫自南復撫育之自南又沒自夫至孫三世夭絶境愈苦而節彌堅年七十二而終髙隆翔妻金氏秀水縣志年二十四夫亡遺孤甫周嵗或勸之更適氏泣指庭前黃楊曰此我夫子手植也作黃楊操以矢志年六十八卒葬黃楊亭側里人稱為黃楊亭節婦云周英妻吳氏秀水縣志年十九夫亡無後事姑孝敬姑女暨姑女之女俱贅夫於家貧無以給氏奉姑遺命膳養二十餘年後四人相繼殁氏殯葬之以是家産悉廢處濠上河濵破屋中里人罕見其面鍾貞女嘉興府志未婚守節巡撫各司道旌奬蕭貞女嘉興府志許字朱鳴盛未婚而殁蕭聞訃易服登朱門衰絰劈踊姑憐其志以長子之子為之後事姑撫子茹荼二十載年四十卒沈貞女嘉興府志沈琛之女方二嵗許配姚正宗年十四而夭氏未婚守節至二十六嵗父欲更締姻氏憂忿而卒謝貞女嘉興府志錢塘人幼字秀水卜叔明貧不能娶旋夭氏聞訃即歸卜守志父怒遂絶往來艱苦一生以卒仲世隆妻吳氏嘉興府志年二十一而寡操家苦節耄不見齒遺腹女適徐王昱亦二十一而寡母女相依冰操益著沈光裕妻項氏嘉興府志歸沈四載夫病篤以死自誓夫亡哭臨畢扃戶服滷死范介如妻某氏嘉興府志夫病瘵劇氏泣告曰倘有不測願即相從地下夫旋殞號痛絶粒而亡時年二十四雙棺並舉逺近嗟異盛重妾張氏嘉興府志名繡年十五歸重未二十而重殁與嫡相依事姑撫繼子服闋姑令改適不從又數年其母欲其别嫁百方勸誘終不為動既而家益落繼子亦亡繡盡力紡績以佐晨昏煢煢嫡妾凄然相對者三十年有兄鄉居其嫂來探之極相得然終不一至其家周明雅妻謝氏嘉興府志年二十四夫亡無子族嫗動以微言輒涕泣詬詈後年五十九值嵗荒餓死陳向髙妻虞氏嘉興府志向髙卒虞年甫十八屢欲自經舅姑曲諭之乃佯應諾終日涕泣不離殯所未幾竟絶食死顧貞女嘉興縣志幼喪父隨母嫁於邱許字長興王某氏未婚而寡誓不再嫁既而母改許沈氏女整衣裳服滷死年二十四將死密戒鄰母曰我死無受沈姓片楮汚我及死沈果來唁鄰家羣起却之時康熙已亥正月十九日也吳熙妻虞氏公舉事實年二十六而寡無子撫三嵗姪攀麟為嗣家貧不舉火者嘗一二日氏晝夜紡績易粳麩作餅充飢教其子成立苦節三十三年馬鑰妻陸氏公舉事實年十九而寡無子閲三月姑生小叔姑即患病氏力撫幼叔侍湯藥五載無懈繼姪為後又夭哭泣喪明復繼姪孫為後守節六十四年王逸古妻范氏公舉事實年二十六而寡無子有叔不類逼之嫁氏毁容力拒未幾其叔暴卒姑亦隨亡氏歸依母家紡績度日守節三十四年葛君英妻范氏公舉事實年二十一而寡遺一子復殤有幼叔寄養他姓攜歸撫養為娶婦生子氏即育之為子葛氏之緒賴以不墜守節三十一年胡氏三節公舉事實關氏胡關得妻錢氏王氏其妾也關氏素瘵疾醴尩羸不能妊子請於舅為夫納二妾各舉一子夫殁舅繼卒三氏年俱二十七家日落錢善織關與王善紡日成二布以易米薪寒暑無間事舅姑暨本生庶姑孝撫二子長令就學有成立關與錢先卒王守節四十年徐開燾妻石氏卜祖學妻陸氏薑懋芳妻周氏吳永嘉妻袁氏楊秀峯妻潘氏朱文朝妻秦氏朱茂昞妻賀氏陸元燾妻徐氏戴長治妾李氏毛麟瑞妻浦氏邵宗彞妻薛氏鄭典妻宋氏韓肇禎妻唐氏卜淇妻屠氏錢升妻俞氏王希導妻陳氏項全斌妻王氏吕化龍妻黃氏項奕顯妻沈氏項克鞏妻顧氏范睦妻吳氏顧文進妻王氏錢必選妻李氏王期妻浦氏嶽繼忠妻范氏顧良升妻魏氏俞晉叔妻吳氏周恭先妻范氏金世瀜妻喬氏曹穎浩妻吳氏羅有極妾朱氏金黃妻施氏沈藝暉妻鄒氏方道仲妻李氏姚夢爵妻歸氏仲學海妻姚氏黃季翁妻朱氏陳德基妻蔣氏朱崖妻徐氏倪元璧妻胡氏曹曽錫妻王氏沈烽妻陸氏陸賔來妻湯氏張心琴妻胡氏朱顧逺妻張氏吳邦彥妻張氏仲大年妻邵氏屠子莊妻仲氏邵瑢妻徐氏章天錫妻王氏屠有禧妻董氏邱亷逺妻于氏吳大木妻龔氏沈衍曽妻吳氏鍾應枚妻沈氏顧天銘妻屠氏徐正域妻祝氏黃元璧妻吳氏沈永年妻周氏曹繼登妻沈氏仲學曽妻金氏曹大宗妻陸氏程子哲妻沈氏杜元鎮妻沈氏張康侯妻沈氏吳望妻張氏蔣鉞妻何氏邵嘉生妻程氏陸望之妻胡氏蔣鼎臣妻王氏王文殊妻黃氏汪子賢妾馮氏汪福生妻蔡氏沈世佳妻徐氏陳志發妻沈氏鍾贊夔妻陳氏金中和妻錢氏沈春妻吳氏錢燀妻沈氏傅大溶妻張氏陸交泰妻仲氏沈衡妻張氏周胥原妻張氏徐綱妻陳氏卜史妻屠氏卜定命妻張氏陳升之妻王氏陳紱麟妻陸氏曹公度妻吕氏張君揚妻許氏陶宗愷妻屠氏朱承溪妻陸氏周昶妻陸氏程學江妻鍾氏張鉞妻許氏袁守誠妻朱氏嚴重華妻孔氏江公潤妻沈氏朱某妻陳氏張羽修妻陳氏萬人偉妻胡氏周國榮妻吳氏吳洪芳妻戴氏萬兆卿妻吳氏髙鉉妻宋氏陳旬麟妻于氏潘懋妻沈氏鍾朱甲妻聞人氏鄭聖孚妻徐氏嘉善縣明薛宗永妻沈氏𢎞治嘉興府志適魏塘薛宗永洪武初舉孝亷拜監察御史以失朝被黜而卒沈年方二十孀居事姑甚謹以紡績為業終無二志姑卒盡賣其衣資以營葬鄉里稱之李文逺妻張氏𢎞治嘉興府志文逺卒張年二十八父母將改嫁之氏誓且泣曰吾聞婦人以貞為貴夫死而易其操禽獸不若也父母感其言乃止孀居二十八年詔表其門復其家徐孝女明列女傳徐逺女也年六嵗母患臁創甚女問母何以得愈母謾曰兒吮之乃愈女遂請吮母難之女悲啼不已母從之數日果愈俞傑妻周氏嘉興府圖記名桂蘭年二十七傑亡家貧子幼殊不可存父欲奪其志哀慟不從撫教其子澤舉進士陸衍妻糜氏正德嘉善縣志年二十衍卒初衍病革注目於氏者久之氏作色曰君疑我耶遂毁容變服誓無他志既而遺孤亦夭乃與婦周煢居無聊者二十餘年時人謂之雙節莫佐妻周氏嘉靖浙江通志名嘉平鼎之孫女年十六適佐甫七月遺妊而佐死妊生又女也姑重憐之諷使再適氏誓曰有不從姑終身者不出此户嫠居六十餘年而終陸孝女嘉興府圖記陸澄女名喜真澄疾喜真嘗刲股愈之澄疾又作喜真乃剖胸刳肝作羹以進澄覺之不食疾輒愈喜真亦無恙謹按正德嘉善縣志萬歷嘉興府志俱作陸喜真舊通志訛嘉真周阿香嘉興府圖記農家婦也正德庚午飢夫與姑欲賣以自活阿香誓不從數箠楚之遣有日矣前一夕赴水死鄉人具棺葬焉郁自魯妻馮氏萬歷嘉善縣志年二十六夫殁哀慟絶食願以身殉親戚強慰諭之泣曰夫亡無嗣求生何為死能完名無所恨舅姑謹防之居數月手書辭父兄乘夜沐浴更衣從容自縊及旦視之衣盡聨綴面如生葉烈女萬歷嘉善縣志葉雷之女許聘錢氏未婚嘉靖甲寅母子為倭所執欲辱其母女時年十七紿以身代求釋母賊捨母得脫遂罵賊投水死嘉善縣志更有曽巖妻張氏遇倭不辱亦投河死沈春雷妻張氏萬歷嘉善縣志少值倭亂舉家避難甫出門即遇寇執春雷之父將刃之春雷泣請代遂遇害時張在舟中手抱一孩倉皇泣曰吾死兒安歸然吾不能以此身為賊人汚也竟赴水死時遇難死節者有孫三妻郁氏亦不受辱投河許應鯉妻何氏嘉善縣志嘉靖甲寅倭亂夫婦與嬸母馮氏同出遇倭何年十九馮年三十俱赴水死應鯉得脫終身不娶萬厯中巡按御史旌其墓石卞理妻顧氏萬歷嘉興府志年二十二夫卒撫遺孤鑄娶媳徐氏鑄復死與媳並守稱雙節閔孰妻孫氏兩浙名賢録年十九孰死無子兄欲奪其志嘆曰兄所利者財也悉以奩田歸之矢心守節立族子為後年五十三值嵗飢而死知縣于業葬之孫言妻王氏萬歷嘉興府志年十九夫卒以死自誓繼姑病悲號纍日願以身代夜夢神女曰念汝孝錫汝姑百嵗以慰汝心姑果年九十五而終陳坤妾王氏褒祀編順天人年十六歸嘉善陳坤越六年生子諴甫周嵗坤臨卒囑嫡子遣嫁氏大慟剪髮矢死嫡子待不以禮氏甘下之撫諴成立沒之日族黨悉為流涕袁柏妻趙氏兩浙名賢録年二十八夫亡孤在襁褓家貧甚日紡績自給每引兒至夫座前課讀稍踰度輒跪責之夀五十九忽一日呼兒曰吾以半生事爾父半生守爾今日是爾父亡日我將往從地下矣無疾而逝季昕妻唐氏嘉興府志結褵九月而昕亡氏年二十一遺腹子練族人以貧故欲其再適氏斷髮誓志奉姑盡孝當盛暑猶夜處帳中勤女紅以給饔飱苦節六十餘年孫承祖妻嚴氏兩浙名賢録年二十二夫亡止一女欲以身殉念姑老乃孝奉天年及女嫁曰吾事畢矣遂不食死蔣元揚妻盛氏懿行編年二十七元揚殁繼子甫周嵗辛勤堅守同妾王氏朱氏共理家政內外肅然夀俱六十餘許貞女舊浙江通志父評許字陸允孝年十九允孝卒議改適女截髮毁容以死自誓依母紡績終身天啓間旌任貞女嘉興府志許配莊世植未娶世植疾亡女年十九依寡姨顧氏冰蘖自守邑令申請巡按旌之陸時顯妻陳氏嘉善縣志年十八而婚婚十八日時顯業漆匠經商曲周久而不還兄念弟往尋亦不返家貧無子姑與姆俱年老氏紡績膳養後姑與姆相繼沒氏拮據殯葬垂白無依年八十而逝里人捐資建碑邑令李陳玉表墓許可遂妻吳氏嘉興府志年二十二適可遂遂父娶繼室凌虐非常婦事益虔後可遂浴於河溺死無嗣氏絶食不死旋服滷而卒朱君達妻顧氏嘉善縣志縣役催科睭君達逺出突入竈下舉手加氏頸氏旋入內室泣曰此頸可汚乎遂縊死顧貞女嘉興府志受李碩果聘暴病夭女痛不欲生奔喪守義孝養翁姑二十七年陳時經妻吳氏嘉興府志歸時經生一子時經遊學在外聞母疾馳歸中道而殞柩歸而姑亦逝氏泣謂娌程氏曰方寸裂矣我子猶娌子幸善視之程泣慰之吳唯唯夜自經死年二十七孫鉞妻盛氏嘉善縣志鉞二十而夭氏絶粒九日而死徐爾穀妻孫氏檇李往哲續編爾穀為石麟恩撫子以湖寇波及死於江寧孫氏聞穀死一女在抱棄之赴水立而不仆死魏學洢妻嚴氏褒祀編學洢父大中忤璫死獄學洢以哭父死氏年二十七截髮毁顔終身蔬食事姑錢淑人孝先姑卒淑人曰夫為忠臣兒為孝子媳為節婦我何憾焉氏子允柟隱居博學鄉里推重之錢柄妻陳氏懿行編年二十七柄殉節震澤柩歸氏泣謂翁曰亂兵槍攘棺中真贋難明必求啓視及啓慟幾絶遺孤痘殤撫姪曅為嗣曅夭復以從孫維城嗣之兩世鞠孤艱辛備歷錢氏二節褒祀編鄒氏錢熙妻年二十四熙亡子未周熙弟默妻魏氏年二十六默逃方外無子與鄒氏共保一孤人稱雙節郁震妻顧氏陸禮妻張氏浦潤妻朱氏倪塤妻路氏吕孟端妻郁氏沈鎰妻彭氏沈嗣興妻朱氏姚彥曽妻李氏陳朴妻李氏于暄妻張氏夏光覲妻陸氏孫麒妻陳氏何寅妻朱氏魏珊妻沈氏沈勳妻毛氏陸墀妻李氏陸培妻萬氏陸繼淵妻沈氏沈于道妻顧氏錢簣妻沈氏沈杲妻尤氏孫妻黃氏郁守宗妻朱氏張雲鳯妻方氏張榜妻陸氏徐賞妻李氏卞璵妻唐氏支大綸妻張氏錢吾孝妻嶽氏沈心愚妻李氏程振宇妻張氏孫完朴妻鍾氏郁環妻宋氏郁纘妻沈氏程志道妻懷氏胡皆妻朱氏陳志道妻許氏錢繼仍妻朱氏董良史妻唐氏錢天與妻陳氏沈文沼妻宋氏郁調元妻韓氏吳志逵妻陸氏沈剛中妻張氏卞栻妻姚氏江寅妻顧氏陸律妻毛氏卞森妻支氏周宗侯妻顧氏沈萬春妻夏氏顧衷藹妻王氏蔣宰妻顧氏王祀妻魏氏莊有仁妻丁氏孫中珍妻鍾氏包亭山妻曹氏沈君嗣妻倪氏錢廣昌妻毛氏郎階妻馬氏沈憶淵妻蔣氏周士龍妻夏氏顧慕良妻趙氏徐大節妻石氏毛士鷺妻沈氏程武魁妻張氏郁復周妻李氏周宗榮妻錢氏曹其仁妻徐氏沈明道妻蔣氏張明威妻孫氏李聖龍妻金氏柏廷蘭妻莫氏崔造妻王氏袁萃祉妻沈氏盧茂春妻章氏顧文進妻王氏王嘉賔妻夏氏胡士毅妻張氏袁墨妻沈氏陸晉山妻丁氏王繼芳妻陸氏蔡萬春妻朱氏盛聰妻沈氏邱果妻李氏錢霽妻魯氏吳晟妻孫氏任揆妻浦氏柯蕃妻沈氏倪孟懷妻葉氏朱勤妻莫氏髙材妻蔣氏姚滔妻朱氏吳榆妻朱氏吳濓妻孫氏妾華氏張炳妻任氏夏宣傑妻項氏姚誾妻江氏卞錫妻吳氏國朝趙晉妻蔡氏嘉興府志年二十八晉卒於京邸氏欲自經者再翁姑諭止教子武鞏成立康旨建熙十二年具題奉坊旌表葉曰桂妻吕氏題旌册年二十七而寡事舅姑盡孝撫子如琛如圭俱能成立冰操凛守旨建家政肅然年七十三卒康熙四十九年具題奉坊旌表劉氏二節懿行編金氏劉士龍妻年三十而寡娣陸氏劉士麟妻年二十三而寡家極貧同撫三孤紡績自給順治初鄰人失火環舍皆燬二氏所居樓獨存衆驚異顔其樓曰顯節蕭敬明妾吳氏褒祀編年二十七敬明卒率婢阿秀辛勤力作有次女適錢仁之錢死於兵歸依吳氏鄉居遇劫掠氏偕次女及秀婢抱錢幼子俱投河死葉舒芑妻錢氏懿行編亂兵泊汾湖氏駕舟匿蘆葦度不免遂赴水死僕婦張亦從死王貞復妻戈氏懿行編年二十四而寡乏嗣或諷改適自經者再坐卧小樓矢節三十年撫二女出嫁預知逝期沐浴更衣而殁朱雲妻李氏懿行編年二十二雲卒遺孤四齡有脅之改適者氏引刀𠢐面家園蕭索紡績自甘教孫映璧膺鄉薦藏有授經圖倪貞女嘉興府志倪穎鋭女許字孫宸樞年十九未婚夫亡女矢死以殉父母勸阻乃至夫家苦守蓬首素服三十餘年如一日陳顧二貞女嘉興府志陳氏許配蔡純仁純仁殁女聞訃即欲奔喪父母勿許女投繯繩斷救蘇乃白其舅姑迎歸終喪竭盡孝道撫前妻子如己出貞操三十餘年顧氏許字郭宏宏早世訃聞女痛哭絶粒三日父母勸之則曰往郭視殮後方可食耳遂歸郭食貧苦守終身不改顧與陳為中表姊妹時稱蘆川雙節顔烈女嘉善縣志少失怙恃依兄嫂許配嘉興顧氏子顧貧康熙甲寅夏就婚於顔其兄索財禮不已留顧寢外室夜不施帷蚊蚋攢嘬甚楚女憐之伺顧他往解帷置其榻兄見之辱詈女自傷將不得為顧婦遂戴顧氏簮髻衣顧氏衫𥜗自經死陸烈女懿行編父宦僕資饒許字蘇州庠生張某後援良賤不婚例退聘改適納采日女密縫衣裾自縊張感其義終身不娶孫貞女嘉興府志孫衍女也許字錢廷銓年十六未婚夫夭女泣告父母往錢守節與嫠姑同起居侍奉深得歡心後營夫殯以疾卒張貞女嘉興府志張王典之女許配沈治豐王典逺任山西治豐往就姻卒於途女年十九誓不更字抑鬱踰年成疾臨危曰吾身許沈從一之義守死不渝願合葬沈氏之墓父母許之遂逝邑中士夫皆賦詩以誄巡撫朱軾給扁旌奬龔貞女嘉興府志受吳宗昌聘未娶宗昌夭父母議更字女毁容斷髮以死自誓茹齋縞素靜處一室年二十七病革請舅姑面訣且欲以骸骨歸吳許之乃瞑邑令莫大勳旌之褚貞女嘉興府志受錢鐄之聘未娶鐄亡女即衰絰奔喪守制立鐄姪源為後勤紡績力營夫葬苦節十七載而卒徐階荃妻金氏褒祀編年二十三適階荃年餘而階荃亡鞠遺孤於襁褓哭泣三年決志殉節夫服除次日自經死柯𢎞本妻朱氏嘉善縣志秀水人適𢎞本年二十五夫卒氏痛不欲生念上有舅姑下有幼子朝夕含淚曲盡孝慈時門第鼎盛氏治女紅不輟教二子煜炳成名煜舉雍正癸卯科進士顧氏二節懿行編朱氏顧衛伯妻年二十六夫亡貧無以殮賴賻布乃克成禮居恆鍵户織絍撫嗣子或餽升斗輒峻却之曰未亡人豈宜以殘喘纍姻婭耶矢節三十三年卒盛氏顧疇妻衛伯弟婦也年三十而寡撫孤成立娶媳不數年媳亡復撫稚孫荼苦五十年夀七十九丁陟臣妻王氏懿行編年二十七夫亡守節三十三年陟臣之亡也兄采臣嫂金氏弟宿垣弟婦龔氏相繼即世并其祖考妣三世十二棺俱未葬采臣陟臣並無子惟宿垣遺孤繼業才八嵗是時氏以荏弱嫠婦撫髫齡孤姪支持門戶殘燈敗帷瀕於死者屢矣後十餘年繼業少自立乃克葬其三世之未葬者人咸謂丁氏一線猶存遺骸得厝皆氏完節撫孤之力也沈濓妻卓氏公舉事實年二十歸濓為繼室撫前子女如已出二十三夫亡家貧紡織以養舅姑父母憐而迎之辭曰老邁翁姑舍我孰承菽水竟不肯歸子能讀書氏親課之守節至七十一而終孫曰楓妻曹氏公舉事實年二十九而寡事翁姑孝撫子嶸成立守節至六十一嵗而殁李翰妻卞氏公舉事實年十七歸翰二十六翰卒兩子皆髫齡氏教以識字習幼儀稍長赴孰從師夜則篝燈紡績令侍側讀書寒暑不輟年八十五卒子復夔康熙丁酉舉人程元祐妻吳氏公舉事實年二十七夫亡事翁姑孝撫二子成立守節二十六年紡績自給薛佑蕃妻姚氏公舉事實年二十三而寡遺孤念祖甫三嵗後翁姑繼殁庶姑在堂母家以貧而無倚招之使歸氏不從早夜操作以奉其庶姑教幼子守節至七十二嵗而卒王國珍妻張氏公舉事實年二十六而寡遺子女五人家徒壁立翁姑年垂暮氏勤十指事上撫下守節三十四年卒許澄原妻朱氏公舉事實年二十六而寡事祖姑翁姑至孝撫八月遺孤有成守節二十六年朱岸登妻錢氏公舉事實年三十而寡長子一蜚甫六齡次子紹周在襁褓一子在腹氏欲從死父諭以撫孤大義始感動嘆曰當再思之因名遺腹子曰再思遂晝夜操作以養以教守節二十年積勞成疾而卒孫氏二孝婦公舉事實孫衍妻李氏子慎機妻馮氏兩世俱能孝事舅姑人稱孫氏家法又夏慥妻陳氏與孫為姻婭亦以孝稱於時蓋感二氏之風而興起者魏學洙妻夏氏葉南柱妻王氏錢象儀妻徐氏錢燾妻葉氏莊允燦妻吳氏周丕承妻余氏龔君求妻柯氏孫允登妻郁氏楊隆妻潘氏孫澐妻李氏汪昌祖妻楊氏吳濤妻陸氏唐天錫妻沈氏葉鋐妻夏氏沈郊妻王氏沈伯亨妻茅氏吳自厚妻柯氏翁萃和妻浦氏錢繼葵妻徐氏王貞所妻馮氏楊景新妻朱氏王璈妻金氏施鑒藺妻毛氏蔣仲堪妻朱氏李承章妻朱氏沈天華妻姚氏孫瑤臺妻霍氏柏方來妻鄭氏錢體恆妻吳氏吳維翰妻周氏錢之芳妻郁氏吳安之妻陳氏夏權妻葉氏孫蕖妻龔氏張振逺妻陳氏李仙枝妾王氏張芝惠妻葉氏孫序皇妻蔣氏韓懋德妻張氏孫復輝妻陳氏朱盈泉妻郁氏張學詩妻陳氏唐晉妻袁氏陸韜妻沈氏倪子瞻妻袁氏薛仲璋妻沈氏孫廷鑾妻王氏蔣抒雯妻何氏髙衛繼妻盛氏吳濟宇妻王氏劉藻繼妻馮氏潘魯菴妻錢氏王觀化妻金氏蔣昌陲妻顧氏錢振元妻蔣氏俞某妻孟氏錢素綸妻金氏錢念永妻蔣氏夏君韜妻季氏吳敬亭妻許氏朱肇嘉妻丁氏汪楷妻迮氏王悅範妻朱氏蔣鼇妻陳氏海鹽縣元魯烈婦海鹽文獻志某氏適海鹽東城外魯某生子彌晬元至正間倭船泊海濵攻劫海鹽城外居人逃散烈婦獨存度不免置兒於路傍哭曰天乎不使魯氏無享或有收者是幸也遂投海死明陳思恭妻莊氏徐一夔陳節婦敘泉南人思恭以商于泉南遂贅焉踰年而得子思恭去海上三年不返人以為死諷之嫁莊峻斥之又二年而思恭果還未幾復去竟死於海前諷者復來曰今固可以嫁矣莊指其孤曰吾夫雖死所以遺我者固在此也時年二十五教育其孤至於成立子寶生構貞節堂宋濓為記沈裕妻王氏𢎞治嘉興府志名妙貞年二十嫁裕未有子夫卒時年二十一以禮葬夫奉舅姑克盡愛敬舅姑卒殯葬俱不違禮卒年六十有二楊彥璋妻魯氏嘉興府圖記名淑清永樂丙申夏倭犯海鹽抄掠男女淑清亦在虜中抱一子未晬泣而委之路旁曰幸天活我兒潮至遂躍入水死時年二十一同時有與淑清同溺而不詳其姓名者淑清所棄兒卒全無恙姚􅕈妻周氏張寧姚烈婦傳名福蓮周孟經女年二十一嫁澉浦姚􅕈甫四年􅕈死生女名孝家甚貧數值荒歉孟經因促歸與繼母諸嫂處氏念姑老行時檢篋中故衣服悉遺􅕈妹意甚依戀有富人求為婦者孟經許之難為言一日方聚食孝女適啼婦遽前撫之孟經愠曰勿啼不久當送還汝家婦凄然動色退謂嫂曰頃見父言事決矣我命如此此足肻再踏他人門限耶遂抱女不復置是夜與女同溺死翌日具棺殮方焚木既然有蝶從煙熖中出文采爛然向祖墓飛去見者驚異孟經拾氏遺骨與􅕈同葬姚氏先塋時年二十七𢎞治戊申二月九日也劉璽妻陸氏𢎞治海鹽縣志名妙端年十七適璽十年璽往河南客死時舅姑與伯母俱老二子俱幼嵗復洊飢無以為生陸紡績組繡以奉舅姑後舅姑與伯母繼殁氏竭力營喪葬二子俱克成立孀居四十餘年屢經多故終始一節胡繼海妻駱氏𢎞治海鹽縣志名玉潤繼海殁氏年二十七子女俱幼父欲奪其志誓死不從勤女工以教其子寬與宏皆能承父業年八十終李政妻某氏張寧李烈婦傳政為海寧衛戍卒妻名三女年十六適政舅早殁姑再嫁氏生一子名雲𢎞治乙卯四月政病疫自外歸卒婦已六日不寢食強起殮殯送至郭門外政妹適葉者欲寬其哀指其子謂曰嫂無憂我當今此甥侍嫂婦曰寡婦猶可倚甥為伴耶因籍箱篋遺物以雲托政妹曰我即死幸顧念此兒勝生受恩德因紿政妹曰我飢甚姑家有粥宜可急得妹往取粥返已閉門縊絶矣年三十六沈端妻陳氏𢎞治海鹽縣志生子珩而端殁時年二十四有以子幼年少風之者輒悲泣不自勝奉親教子孀居四十年沈珉妻陳氏海鹽文獻志名玉瓊年十七適珉二十四而珉卒遺孤基才二齡二女俱幼躬執麻枲勤撫育至長婚嫁以時自初喪至晚年志操如一日徐璧妻馮氏𢎞治海鹽縣志孝事舅姑姑嘗罹疾弗愈與璧同刲股煮粥以進即獲差後又患疽親為吮之璧早喪不事容飾躬織紡以教其子三十年足未嘗履户外張寧妾髙氏李氏嘉靖浙江通志髙氏名寒香李氏名晚翠年皆十四五相繼事寧者三年寧疾革囑嗣子必嫁之二妾聞而悲慟不自勝寧殁相與孀居既三年寧妻劉氏令二氏釋服二氏驚問故劉泣謂曰主公臨終之言不在耳乎二氏大慟曰妾荷主公恩恨不即死以從敢有他志遂皆剪髮誓死同居一樓者三十九年家人罕見其面後相繼殁有司以聞詔旌曰雙節嘉興府圖記寧女名恆清適海寧衛姚麟亦早寡守志無二陳氏二節嘉興府圖記陳立妻錢氏妾屠氏立死錢年二十五妾年十八同心守節王亷妻許氏嘉興府圖記歸亷未幾亷死後得遺腹兒衆謂許年少遺兒安保其成不如更嫁許不聽卒撫兒自完向升妻王氏鹽邑志林年十六歸升甫一年而升卒氏殞地幾死設一榻柩旁朝夕坐卧其上欲縊者屢為姑所止日以針黹自遣不復茹葷姑閔婦少欲奪其志氏號泣引斧斷足以誓居一年姑以從子某來為升後氏念以叔為子焉能混處遂決意求死至晚伺姑寢沐浴整衣縊於柩側時嘉靖戊戌冬十一月五日也年十八步橋妻朱氏海鹽縣圖經海寧朱天𢎞女嘉靖三十五年正月遇倭寇欲汚之不從抱幼子投虞溪橋下倭以槍引之起朱罵不絶口倭輪槍戳之貫其額顱母子同死錢萱妻孫氏嘉興府志萱為儀部郎謫粵東遘疾殁于官氏慟不欲生勉扶櫬歸葬與妾嚴氏共守三十餘年貞節並著錢烈女海鹽縣圖經半邏錢君儀之女許聘於陳陳初裕後貧其姑不自檢嘉靖庚寅冬將婚矣烈女嘆曰盟不可變義不可辱吾有以死謝耳先期三日自縊死沈烈女海鹽文獻志名雲年十七許字同邑張生未嫁張病瘵死邑中聞其工容且賢爭來求聘父母將許之雲覺投河死嘉靖丁酉二月也薑應熊妻徐氏萬歷嘉興府志夫患瘍疾兩家欲更議氏不肻歸四年應熊死氏即絶粒誓守夫塋仍自揭一聫於楣間云貞節存心擬與孤燈對明月義方教子願期玉樹長芳林吳御史旌其門沈國相妻王氏萬歷嘉興府志王銓之女嫁沈逾年國相死於倭氏年十七有欲更娶之者氏剪髮毁容矢天終守子女俱無苦節四十餘年巡按題準建坊鍾氏二節錢芹鍾節婦傳沈氏名妙智年十八嫁鍾升升卒時年二十九有娠方四月後六月子景辰生自是粗糲不充事育交迫或諷以改適執志不回年九十三終後四十年又有徐氏者名季貞年十八嫁鍾思孟景辰曽孫也勤學搆瘵病卒徐氏絶而復蘇嘔血數升即剪髮一握置夫手中一握囊盛之懸臂間卒合葬甘泉鄉張宏妻盧氏萬歷嘉興府志二十四嵗夫亡生子甫三月家極貧矢志撫孤繼姑欲奪其志盧斷髮不從躬織絍曲事之年八十三而卒陸孝女萬歷杭州府志海鹽捕卒應雲女也應雲謫戍嶺南留妻女於杭應雲道卒女時年十四聞父喪晝夜號泣不絶聲遂不食數日卒貧不能殮里人義之為捐資殮焉徐烈女海鹽縣圖經學掾鳳之女許字千戶胡獻竒獻竒領漕入都約明年竣役成婚客死訃至徐慟哭不食數日縊死時萬歷甲申冬十月也姚貞女海鹽縣圖經許字崇德潘氏子潘貧姚父欲絶婚氏時年十九聞父言即日扃一室中不復出守至五十五嵗死吳貞女海鹽縣圖經吳泮林女許字徐尚臣之子某年十五而某死女欲赴喪父不可女紿曰姑一視了我心至則誓必終守而尚臣子多不便同居父迎歸聽其守節焉同時平湖王昌祚女許字鹽人吳中宰未嫁中宰死亦過中宰家守制沈𢎞逵妾金氏嘉興府志年二十而夫死母欲奪其志堅執不從𢎞逵之女嫁朱萬言三年而寡即屏居一小樓絶不歸寧萬歷中並旌陸堯俊妻顧氏嘉禾徵獻録堯俊幼孤不自檢家遂破尋卒無子女氏苦守以堯俊弟子為子節孝無愧云沈九疇妾王氏海鹽縣圖經九疇艱於子娶氏生子夢融方四嵗九疇病革語其嫡曰王氏年少我死必嫁之氏曰我必不嫁九疇固以為言王取刀割其舌擲地示信九疇殁與其嫡相依艱苦操作撫夢融成立陸貞女舊浙江通志陸維寧之女許字朱祥符未婚而祥符死女年十四聞訃慟哭幾絶易服誓守久之以淚枯失明年二十二卒朱氏迎其柩合葬焉劉世埏妾沈氏舊浙江通志生子祖鍾未周而世埏殁時嫡徐氏操家柄氏內自持而外曲事之得保遺孤身衣補綴至老不去體年六十二有司奏旌張廷録妻莊氏舊浙江通志年二十二夫亡備歷凶荒教子源成源思讀書源思成進士崇禎間奉旌吳氏三節嘉興府志吳棟妻蔣氏年十九棟卒遺孤文煒僅七月辛勤撫育文煒娶戴氏年二十一文煒卒子麟振方二嵗戴氏與姑同心撫育子麟振娶沈氏麟振卒時子甫及方四嵗沈事太姑及姑俱盡孝嚴於訓子不為姑息子成進士人稱三世苦節舒葵妻吕氏嘉興府志年十七嫁葵踰年葵卒子笙甫三月其姑張氏招壻女共居傾橐授之復睥睨其産吕寄兒母家奉姑惟謹既而姑之女與壻俱死氏拮據養姑教子成立年八十九劉煤妻周氏舊浙江通志年二十煤卒子垔甫三嵗守志撫孤垂六十年垔繼室姚氏亦早寡教己子與前妻子俱有成苦節四十七年徐乾貞妻朱氏舊浙江通志明末避兵豐山乾貞他走朱病不能行婢商氏顧氏掖之伏林莽中兵見執之誓不辱露刃脅之罵愈厲遂見害二婢亦不屈死黃一卷妻崔氏嘉興府志明末避亂石馬山聞兵至先投幼女於池與長女躍入水死一卷受創危急忽見氏撲面迎刃得不死越七日尸浮於水面傷刀痕人咸嘆其靈異顔色如生郭乾妻何氏舊浙江通志年十九夫亡苦節二十年明末兵亂邑人盡室以行挈何俱去不可曰死則死耳去此將安之未幾兵至拒户自經死吳上舍妻童氏嘉興府志結褵一年上舍殁苦節三十餘年避亂聞兵至投河死又干氏女遇執不屈被害又小康橋節婦與姑俱被執婦不行抱橋柱大罵受箭沈水死又陳悃妻蔡氏被執投河死褚泰亨妻周氏萬衡妻沈氏費逵妻向氏劉世坊妻項氏丁麟妻蔣氏徐潮妻王氏張鎮妻王氏魏全妻林氏王軏妻陳氏王軒妻黎氏吳孟完妻胡氏吳允昻妻楊氏劉鎮妻邵氏胡偉妻陳氏趙子龍妻王氏周東妻吳氏陳用龍妻王氏蔣杰妻翁氏馬如雲妻王氏張桂妻任氏何文謂妻王氏姚𢎞妻吳氏朱學行妻錢氏顧槃妻祝氏劉浩妻董氏徐重臣妻曹氏馬孟俊妻李氏陳昌允妻董氏朱守謙妻楊氏王廷璧妻孫氏朱映璧妻葛氏錢與映妾康氏吳士妻周氏仇士魁妻吳氏王應麟妻鍾氏朱應箕妻屠氏李諶妻吳氏王復昌妻朱氏朱佐妾陳氏陸郡妻潘氏陸部妻周氏吳儒妻蕭氏吳桃妻儲氏朱玘妻吳氏胡憲仲妾仇氏胡彭述妻劉氏童尚斌妻周氏徐乾元妻仇氏賀玠妻徐氏思坡妻徐氏朱伯嚴妻王氏王聖龍妻祝氏國朝錢楨妻葉氏嘉興府志夫亡屢自經姑曲慰之曰吾兒一線之緒在汝遺腹奈何殉小節而斬宗祀耶葉飲泣勉從孝奉孀姑備極誠敬撫繼子燔與遺腹子焞慈愛無異康熙十五年具題奉旨建坊旌表俞貞女題旌册海寧俞宣琅女許字海鹽張芳濚合卺有期芳濚卒訃至氏慟哭欲奔喪或阻之遂絶粒母憐其志乃令至張守節所處樓中懸夫像朝夕上食身布衣蔬食後更茹淡其堅苦有人旨建所難堪者年二十九卒康熙三十五年具題奉坊旌表祝懋功妻許氏題旌册海寧人年十七歸懋功懋功卒氏年僅十八子甫數月舅姑已先殁祖姑在堂氏孝養二十年祖姑以夀終經營再世窀穸撫子成立守節五十八年卒葬時有白鶴旨建翔繞人因稱鶴來墓康熙五十二年具題奉坊旌表戴子亭妻朱氏題旌册年二十三美姿容持身甚謹康熙六十一年五月初十日夫入城市姑朱氏抱病卧床氏晨起執爨傭人王雲卿瞷室無人強欲汚之氏堅拒罵詈雲卿以刃斫之死子亭弟二寶尚幼聞聲出視亦被害俄而里鄰環集雲卿度不能脫遂自剄事聞奉坊旌表旨建張鴻妻朱氏題旌册年二十四夫亡氏絶粒求死翁姑勸止之遂屏腥羶却絲縷茹齋服布益勤紡織逮翁姑繼殁氏竭蹶營葬祔夫於墓側男女婚嫁備極辛勤守節五十七載雍正五年具旨建題奉表坊旌步驗霖妻謝氏題旌册年十六歸驗霖以紡績佐姑甘旨人稱其孝生子女各二姑殁未幾夫又卒氏年二十七所親微諷之以死自誓乃不敢言二子皆躬自訓讀及長俱為諸生雍正六旨建年具題奉坊旌表畢國璋妻錢氏題旌册年十九而寡無子繼姪為嗣撫長又夭姑媳煢煢撫孫成立守節旨建四十二年雍正八年具題奉坊旌表孫彭年妻陸氏題旌册年二十六嵗而寡家業蕭然舅姑在堂竭力以供菽水殁後經營喪葬盡哀盡禮延師課子俾得成立守節二十五年朱揚妻陸氏題旌册年二十夫亡投繯數次俱因救蘇翁姑未葬脫簮珥以襄窀穸以夫祔其側春秋饗祀事死如生祖墓祭産甚薄捐田二十畝以助撫姪為嗣守節二十七年劉貞女題旌册許字許漸嘉未婚漸嘉病殁女年十七聞訃即服滷以身殉母力救得免過門成服獨居一室縞衣茹蘖親戚罕覯其面撫夫之幼弟成立紡績營葬父母守貞四十九年朱貞女題旌册許字徐禹未婚而禹病亡女年十九聞訃悉將所製嫁衣首飾納還繼母足不下樓者五年翁以禮迎歸布衣蔬食事翁盡孝撫姪為子守貞三十二年巴維藩妻汪氏題旌册年二十而寡事姑撫姪為嗣守節三十六年以上五氏俱雍正旨建十一年具題奉坊旌表沈廷揚妻郁氏題旌册年二十七夫亡子在襁褓氏事舅姑三十年生養死葬咸盡禮子長教以讀書敦行氏律身嚴謹足不踰户親族黨罕見其面守節三十七年朱貞女題旌册朱倫之女許字吾定仁未婚定仁卒女年二十三聞訃易素服往夫家不返奉夫遺像相對一室中為夫營葬已亦穿礦於旁志同穴也舅姑知其意堅以兩幼孫為之後撫教成立守貞一十八年卒張貞女題旌册張容書女許字葉仙芝仙芝卒女年十九未婚也聞訃服滷父母救免始議奔喪舅姑以家貧氏幼恐矢志不終辭之女號泣剪髮詣夫家守繐幃舅姑乃為之立繼盡心撫教後舅姑兩喪相繼竭蹶經營遂致病曰吾事畢矣戒其子勿進醫藥卧床一月而卒守貞三十年以上旨建三氏俱雍正十二年具題奉坊旌表仇士毅妻朱氏題旌册年二十八夫亡勤儉持家至於子復生子已出就外傅氏猶不肻自逸鳴機課讀不輟守節三十二年雍正十三年具題候旌張國柱妻徐氏嘉興府志國柱卒氏屢欲身殉姑姒密防之後數月防者稍疏遂乘間投井死越五日蓋棺顔色不變後其孫時中舉康熙甲午解元人謂貞烈之報潘文升妻孫氏嘉興府志紫雲村農女也適潘力農自給生一子才二嵗文升死氏年二十二矢志撫孤夫有叔日升與氏比屋居貪而無賴潛許鍾氏子氏瞷知即績麻為繩匿之一日日升來曰吾憐汝少已善為汝地今夕當娶汝氏默不應設杯羹奠其夫自縊死有頃日升偕娶者至披其幃氏已氣絶矣去文升死才一月印鴻玉妻徐氏舊浙江通志甫及笄締姻鴻玉父為人所殺鴻玉驚痛成癎疾人事惘然來議罷婚氏堅守從一之義告父歸印調其飲食寒暖不愈事之彌篤生不同衾死期同穴執姑之喪三年營厝五棺郡縣督學皆有旌表宜興陳維嵩為作海鹽女歌朱仍坦妻韓氏舊浙江通志年二十八夫死子幼伯叔欲奪其志韓嚙臂自誓終無二志苦節五十年康熙五年學使旌之鄭琮妻朱氏嘉興府志年十七于歸數月琮卒無子氏以死自誓琮有三兄惟仲氏舉一子名旦復又客死氏至中年撫旦復次子藻又夭再撫藻姪士槤甫成立而氏卒苦節五十餘年錢光綬妻朱氏嘉興府志年二十一夫亡無出氏自縊者再獲救而蘇足不越閫勤女紅以佐薪水翁姑年老伯叔俱亡氏親操井臼孝養備至苦節三十餘年徐同貞妾趙氏嘉興府志同貞卒時氏年二十餘布衣蔬食守貞不嫁或勸以無子不妨再適氏嘆曰守志在我何論有子無子耶聞者莫不動容後年九十二卒朱氏二節嘉興府志朱泓妻項氏泓殁氏年二十六撫妾曹氏子之棨成立年七十而卒曹年亦二十六勤苦守志至六十八而終曹貞女嘉興府志幼許字朱乘未婚而乘殁女年二十三矢志貞守縞素終身立嗣以延夫祀卒年六十二歷奉旌奬洪琦妻徐氏公舉事實年二十五夫亡遺腹生子田鈞氏欲以死殉曰孤雖小洪氏族人猶能撫以成立第舅姑未葬子道有虧未亡人之責也於是葬舅姑既畢召族人托以家事及孤至夜自經死距夫殁時才八月倪天池妻許氏公舉事實年十嵗許字天池閲二年而父母亡天池染瘋疾翁辭婚族人將許之氏曰吾父母九原之下知有倪氏耳誓死不從十八歸倪侍夫湯藥衣不解帶甫五月天池卒越數年翁又逝夫兄魏恭迫氏嫁糾里豪張某率衆劫之氏呼天投水鄰里驚救得免後又率衆至門氏毁面據井以待曰有入吾門者吾死此矣衆畏而退時內外無倚饔飱不繼族衆月給薪水以膳之卒年八十二許雄妻孫氏公舉事實雄孝事父母氏佐夫奉甘旨舅姑殁積女紅所得佐夫營喪葬鄉黨咸稱之孫氏二節公舉事實朱氏孫宗堯妻張氏宗堯子成勳妻也朱年二十二宗堯亡撫孤有成年六十三卒張年二十七成勳亡張事孀姑撫二孤蟹筐蠶績不憚勤勞年七十一嵗猶躬親操作不自暇逸云蔡承宣妻何氏蔡之翰妻莊氏葉芳䔲妻馬氏戴思育妻徐氏盧思恩妻朱氏馮春暉妻沈氏陸文熙妻何氏鄭交孚妻王氏陸梁妻朱氏顧惟貞妻祝氏巴應奎妻汪氏劉諴伯妻周氏李維楨妻張氏朱從龍妻項氏祝宗籙妻曹氏張然明妻黃氏馮日宣妻陸氏徐玉林妻馬氏陳遇錫妻李氏鄭沆妻吳氏曹廷鑑妻徐氏石門縣元吳守正妻禹氏元史本傳名淑靖字素清紹興人至元十六年徙家崇德之石門嘗從容謂守正曰方今羣盜蜂起萬一不測妾惟有死而已不使人汚此身也是年夏盜陷崇德淑靖倉皇攜八嵗女登舟以避有盜數輩奔入其舟將犯淑靖乃抱幼女投河死謹按舊浙江通志吳守正妻重見寧紹二府今以死節處及墓地為斷載入嘉興餘並刪明錢升母嘉興府圖記崇德人佚其姓及夫名年二十而寡養姑教子詔旌之朱逢吉著節婦詞周璵妻朱氏兩浙名賢録名玉蓮妊七月璵亡時年二十明年生男舅姑又相繼死身舉三喪撫育遺孤煢煢寡居至親亦罕覩其面已而夫妹嫁為費遜妻歸一年遜死年十九喪葬畢歸與玉蓮同居自名曰繼貞誓死無他里豪葉友文慕繼貞賄其族周安謀娶之不可得友文乃與大黠朱勝謀勝為證訟於有司訊得其情坐友文而褒繼貞卒與玉蓮同完其節談𢎞妻沈氏嘉興府圖記年十七歸𢎞三載𢎞卒遺孤方晬姑陸氏在堂氏前子婦也素不蒙愛至是親子婦益間之氏有奴老而狡為陸謀去氏又謀其孤氏託父家鞠焉而身與羣婢力作父母憐而欲歸之氏不可久之陸悟棄奴收婦而還孤析産與親子婦等氏年八十餘而卒方瑄妻沈氏嘉靖浙江通志名淑寧海鹽人歸瑄十八日而瑄死淑寧屢絶而蘇極力營葬服訖舅姑貧乏令歸依其母母以其少無子勸之改適不從母乃潛以許人淑寧覺之紿其母往告外氏母行遂沐浴更衣自縊而死丐烈婦續文獻通考湖州人莫詳姓氏正德初湖飢婦與其夫及姑走崇德石門市乞食婦有殊色市人欲桃之與之食不顧與之財亦不顧寓東髙橋上伺夫與姑不至及三日聚觀者益衆乃從橋躍入水中死衛蘭妻趙氏嘉靖浙江通志名靜端年二十七而寡家貧遺孤在襁褓或勸之嫁氏指井誓曰此井可改妾心不可改勿妄作説躬勤蠶織孝養舅姑舅姑亡極力營葬苦節四十餘年周經妻范氏正德崇德縣志適經為繼室經亡時年二十五無所出未幾翁與前妻子若婦相繼殁氏殯四喪依姑朱氏育所遺襁褓孫貧不能存竊計自盡姑覺而止後姑殁亦具葬寡居六十年始終一節蔡烈婦嘉靖浙江通志蔡天錫之女許嫁何鶴齡鶴齡無行兩家父母已俱議改婚婦誓死不從遂歸鶴齡鶴齡日事賭博為偷兒婦輒泣諫不聽憤悶自經翁姑覺而解其繫翁死鶴齡不為理喪婦罄衣資治喪葬鶴齡反朝夕驅迫令婦從娼婦知不免乃沐浴更衣自經而死朱阿妹萬歷崇德縣志市民朱潮女被倭劫至城隍廟橋朱紿曰吾偕祖母來有金可取倭信之乘間投河頭觸石柱死祖母陸亦隨溺焉姚菊香萬歷崇德縣志市民姚縉義女聞倭至言笑自若衆嗤之菊香曰若輩第怕死耳死何怕之有及倭至抱其子自沈於河數日尸浮水面母子相抱如生陸道𢎞妻朱氏萬歷崇德縣志年二十七抱三嵗遺孤匿一樓為倭所獲劫之行氏紿倭令抱其孤下樓投井死謹按姚菊香嘉興府志作蘭香陸道𢎞舊浙江通志作陳道𢎞均未詳孰是今從萬歷志朱貴妻范氏兩浙名賢録倭犯境夫妻走避猝與倭遇倭揮刃殺貴氏厲聲奮臂爪倭面倭怒剖其腹罵不絶口而死吳鑾妻戴氏萬歷崇德縣志年二十五被倭執將汚之以死力拒身被數刃而死俞楫妻丁氏萬歷嘉興府志父無嗣贅楫楫死時年二十九父黨有利其産者構豪右脅之嫁氏斷髮毁容即返夫家市書課子以苦節終其身費貞女萬歷嘉興府志費霆女名金菊許字范氏未婚而夫卒女號慟欲往父母阻之隨有議婚者女泣曰吾心已死身豈再適其父潛許嚴姓者納聘之日自經死殮時面如生薑鍾妻屠氏萬歷嘉興府志鍾卒氏年二十家貧內外無倚遺孤幼荒嵗枵腹竟日晏如也沈懋學妻朱氏萬歷嘉興府志夫亡氏年二十九家貧如罄宗人欲奪其志氏觸柱自絶鄰母救免族姑周以升斗堅却不受自甘飢餓四十餘年金梁妻陸氏萬歷嘉興府志梁卒氏年二十生一女家貧翁勸之更適泣曰生存一日亦一日金門婦也何他之為翁亦感泣苦節終身朱氏二節萬歷嘉興府志吳氏朱琪繼室琪殁時年十八育前妻子禟長娶凌氏禟卒凌年二十八家日索紡績孝養吳年八十餘而終凌年七十一而終徐棟妻葉氏萬歷嘉興府志棟卒時年二十七堅貞自守撫孤女年十六贅壻黃鈺婚甫八月鈺卒女亦矢志守節女尋卒煢煢五十餘年終始如一吕燮妻張氏萬歷嘉興府志燮卒氏年二十五翁姑繼殁翁有遺孤二十日臨終時囑婦育之張撫如已出夫之所遺雖片紙隻字不敢廢棄一以畀孤張貞女石門縣志許字吳玠未歸而玠亡女乞視殮既至毁容斷髮死守吳門父母弗能強玠有妹與嫂相激勵亦沒齒不適人沈伯潛妻費氏嘉興府志歸四月而伯潛卒無子氏坐卧樓上與一老婢織絍自給後樓廢止豕圈旁婢行乞斃於道氏未幾卒陸蘭甫妻何氏嘉興府志年二十七而寡以鐵束左肱誓不變志嵗飢枵腹孝養舅姑卒年七十五陸嘉會妻朱氏嘉興府志名純貞結褵十八日而夫亡號痛赴水陸諸母救之謂曰舅老無他子若死誰養氏韙其言後舅舉子喟然曰我今可以死矣會有疾謝藥不服遺命以縞素殮與嘉會同穴時年甫三十郁佩妻陳氏石門縣志年十九夫亡遺子甫半嵗家貧無依氏忍死自誓姑老不能食嘗以已乳乳之備嘗艱苦卒年七十嵗茅煥妻錢氏嘉興府志年二十三煥殁遺孤方六月撚麻苧以食身衣蘆絮五十餘年卒徐玉峯妻蔡氏嘉興府志明末巨寇劫掠鎮中氏奔避不及寇驅之至祇樹菴大罵不屈寇以刃剜其胸舍之去未幾卒祝守道妻姚氏石門縣志事姑盡孝明末氏家臨運河亂兵猝至倉皇出門追逼者將及路旁有池遂奮身躍入死祝聖世妻王氏費敏妻勞氏沈恆德妻俞氏郭彥昭妻孫氏吕榶妾胡氏嚴璠妻姚氏錢琦妻沈氏李世妻杜氏周楠妻吕氏王良佐妻張氏周滂妻陸氏沈世英妻張氏胡嶤妻周氏鍾若初妻姚氏胡清妻徐氏祝允勳妻葉氏周鑾妻盧氏胡岱妻顧氏沈曰都妻鍾氏沈大化妻張氏王錫妻陸氏郁維周妻馬氏姚吉妻沈氏張國諭妻沈氏沈喬妻莊氏趙良周妻沈氏胡其久妾張氏徐大經妻朱氏胡獻忠妻吕氏談濟妻吳氏平祿妻陸氏范學詩妻周氏丘秩妻姚氏沈敬妻朱氏范尚見妻樂氏沈棟妻徐氏葉承光妻徐氏范光宸妻朱氏張國瑜妻周氏國朝范學醇妻陸氏嘉興府志年二十四夫亡毁容截髮誓無二志勤機杼以養舅姑舅姑殁喪葬盡禮教二子有成守節五十八年黃中色妻楊氏嘉興府志年十九而夫卒遺腹生子策有覬其家業欲謀害其孤者氏防護備至卒能撫孤成立橫逆亦皆愧服守節四十一年以上二氏俱康熙十一年具題奉旨建坊旌表朱元凱妻費氏嘉興府志年二十五而寡止一女矢志不二事舅姑以孝聞撫姪雯為嗣教之讀書舉進士守節四十二年姚寅麟妻梁氏嘉興府志年二十四而寡子斌甫六嵗撫訓成立又卒復撫孫琅長為安慶守矢節五十六年具題奉以上二氏俱康熙十七年旨建坊旌表史廷驌妻湯氏題旌册年二十七而夫亡氏堅貞矢志事舅姑生養死葬無失禮方廷驌卒時長子正甫四嵗次子標才四月氏殫心教育卒能成立康熙四十五年具題奉旨建坊旌表田方耒妻印氏題旌册年二十一而寡夫前妻遺二于俱幼氏撫育成立守節四十三年旨建雍正八年具題奉坊旌表鍾氏二節題旌册鍾信瑞妻馬氏信瑞亡氏年二十五無子繼姪虞傳為嗣撫長娶媳陳氏未半載虞傳亦亡陳年二十二孀姑寡媳一室煢煢相依至老馬氏守節三十五年卒陳氏守節二十八年沈驊妻王氏題旌册年二十七而寡遺孤二長僅四齡次甫三月中遭回祿室廬盡燬艱苦茹荼守節六十二年題奉以上三氏俱雍正九年具旨建坊旌表趙學恕妻王氏題旌册年二十五歸學恕甫二載而夫亡遺孤襁褓翁以家貧年幼諭令更適氏矢死不二事翁孝教子嚴翁亡親負土以葬苦節三十七年雍正十年具題奉旨建坊旌表胡尊經妻吳氏題旌册年二十八夫亡上有兩世尊嫜下有二孤儒門寒素氏力勤紡績佐薪水逮祖翁姑及姑殁喪葬之事無不盡心經理事舅益孝謹教子家瑞家修俱有聲黌序守節二十七年田澍妻王氏題旌册年十九適澍二十三而寡無子乃請於舅姑擇襁褓兒撫育承祧守節三十八年葉金枝妻鄭氏題旌册年二十八夫亡遺子二氏勤女紅養舅姑舅姑殁力營窀穸延師訓子俾克成立今子復生子家業稍裕守節二十五年以上三氏俱雍正十二年具題奉旨建坊旌表沈昻妻吳氏題旌册昻家貧授徒於外氏家居事舅姑姑殁鬻簪珥殯殮夫以哀毁卒舅悲傷致疾又卒氏年二十七疊遭三喪衣資罄盡服闋攜孤至母家紡織自給子長始歸守節五十三年雍正十三年具題候旌夏承啓妻周氏嘉興府志順治初氏被兵掠將逼汚之堅拒不從罵不絶口而死金貞女嘉興府志錢林里農家金明和女順治六年間里中盜猖獗父無力遷避是年十月盜沿村劫掠女被執欲汚之時年十五罵拒不屈投水死聞氏二節石門縣志聞昌言妻沈氏年二十四昌言卒弟昌允妻魏氏年二十二昌允卒妯娌和敬事舅姑俱孝教子咸有義方魏氏子僅百日而能令成立其荼苦更甚俞文表妻傅氏嘉興府志嫁俞七載夫亡誓以身殉親戚勸止之氏曰我若有子死則負夫今無子夫兄弟四人止一姪并無可繼不死何待殮之夕哭絶復蘇至曉自經死年二十五又吕懿緒妻徐氏夫亡服滷死吕懿業妻戴氏夫亡服闋吞耳環死沈貞女嘉興府志年十四許字姚濓濓貧不能娶以病卒父母匿不以告氏聞哀號不輟求往夫家父母力止不從絶粒吞錢求死乃許歸姚進以銷錢之藥得不死遂縞素而往乞青衣見舅姑畢即易衰絰請繼姪為嗣終喪三年閉戶服滷嘔出復以刀刲喉血流不死家人救蘇巳而絶粒至三十二日復吞錢十餘枚乃死年二十三顔雪姑嘉興府志顔志曜女許字同邑陸某陸未婚卒姑矢志守貞四十餘年同時陸自顯女許聘沈某亦未婚而夭陸往視殮即留其家閉門茹素終其身施貞女嘉興府志農人施裕泉女許聘魏君瑞未嫁而君瑞以逺商卒於道時施年二十一斷髮自誓勤紡織以奉母歷四十餘年馬育奎妻王氏公舉事實年二十五夫亡氏撫尸慟哭即於是夜扃户自經死沈思忠妻陳氏胡秉忠妻鍾氏姚榮祖妻王氏吳爾塤妻徐氏吳爾篪妻翁氏沈橘妻李氏陳文龍妻俞氏張世祿妻孫氏俞振麟妻談氏吳爾壯妻沈氏沈起龍妻衛氏范期隆妻許氏勞俶昭妻虞氏何繼源妻李氏沈神鑒妻遊氏沈師孝妻張氏胡爾明妻劉氏勞永嘉妾許氏平海妻蔡氏黃國俊妻張氏顧鏡妾楊氏魏國榮妻周氏吳妾徐氏李炳妻陳氏沈大源妻朱氏章城妻顧氏魏廷妻談氏徐允升妻沈氏姚鍔妻范氏沈培芳妻朱氏沈天錫妻范氏吳學洙妻邱氏姚之臣妻唐氏薑序妻宋氏沈調元妻陳氏吳湘妻俞氏衛武妻張氏宋灝妻茅氏沈昶妻薛氏胡煋妻沈氏孫登明妻葉氏沈全麟妻李氏吳尚思妻沈氏胡明逺妻沈氏徐鑣妻孫氏勞佑銘妻許氏勞于銓妻徐氏陸秀公妻孫氏胡燮妻蕭氏勞祖勳妻曹氏郭升采妻吳氏朱仙培妻吳氏沈國泓妻茅氏吳汸妻費氏吳漢妻沈氏吳濤妻王氏曹有基妻沈氏吕琦妻陸氏朱灝妻吳氏朱之升妻曹氏沈銓妻施氏謝永昌妻宋氏鍾起鵬妻朱氏勞佑錦妻徐氏顧函三妻黃氏沈廷桂妻楊氏邵啓棠妻徐氏胡鳴陽妻田氏吳雲龍妻金氏張霱妻楊氏浙江通志卷二百五
