body:
  text: 欽定四庫全書浙江通志卷十五山川紹興府興龍山舊名卧龍山嘉泰㑹稽志舊名種山越大夫種所𦵏處一名重山種訛成重也寳慶㑹稽續志按元微之州宅詩序州之子城因種山之勢盤繞廻抱若卧龍形故取以為名紹興府志今府署據其東麓山隂縣署在南麓姜䕫同朴翁登卧龍山詩龍尾回平野簷牙出翠㣲望山憐緑逺坐樹覺春歸草合平吳路鷗忘覇越機午凉松影亂白羽對禪衣國朝康熈二十七年聖祖仁皇帝南廵駐蹕兹山改名興龍山火珠山嘉泰㑹稽志在卧龍山東隅小而圜絶類龍頷之珠明一統志在府治東按察分司後蛾眉山名勝志在火珠山下百餘歩石隠起土中狀如蛾眉龜山嘉㤗㑹稽志在府東南二里一名飛來一名寳林一名怪山越絶書龜山句踐所起遊䑓也東南司馬門因以灼龜又仰望天氣覩天怪也水經注縣西門外有怪山本琅琊郡之東武縣山也飛來徙此吳越春秋稱怪山者東武海中山也一名自來山百姓怪之號曰怪山亦曰龜山越王無疆為楚所伐去琅琊山東武人随居山下逺望此山其形似龜故有龜山之稱紹興府志上有應天塔今呼為塔山方干龜山詩䆳巖喬木夏生寒牀上雲溪枕上看臺殿漸多山更重却令飛去即應難李孝光龜山詩山似瑯琊小地将秦望雄越王歌舞處今作梵王宫陽堂山名勝志在卧龍山南三里府城跨其脊其南麓出城外踆於河湟一名鮑郎山山北舊有鮑郎祠太平寰宇記郡國志云山有鮑郎祠本名蓋一名信後漢人生好獵死葬於此兒忽夢當更生開棺視尸􅌂然但無氣耳人事之頗有靈驗蕺山一名戒珠山名勝志在卧龍山東北三里許産蕺越王句踐常採食之晋王羲之宅在焉後捨宅為戒珠寺白馬山名勝志在蕺山東南一里許土漸削山石依然彭山名勝志在白馬山東舊經云彭祖隠居之地有助海侯廟翁洲嘉泰㑹稽志在府學之東㑹稽境郡國志云徐偃王居滃洲即此謹按㑹稽風俗賦注引十道志云翁洲在海中徐偃王所居嘉靖寧波志亦云翁洲昌國東三十里一名翁山徐偃王常居此唐置翁山縣以此命名二說良是㑹稽志所云未知何據存以俟考簞醪河山隂縣志在縣治東即府河嘉泰㑹稽志一名投醪河一名勞師澤運河嘉泰㑹稽志在府西一里屬山隂縣新河名勝志在府城西北二里唐元和中觀察使孟簡所開鵞池𢎞治紹興府志在蕺山戒珠寺前舊經云是王右軍養鵞之所洗硯池𢎞治紹興府志在白馬山下舊經云是王右軍洗硯處清白泉嘉泰㑹稽志在府治内清白堂側范文正公記西巖下獲廢井泉甘而色白淵然丈餘引不可竭魏驥清白泉記清白泉者在紹興卧龍山下郡治内之西隅景泰某年郡守白公得之於灌莽中究其自實宋寳元二年范文正公守郡以廢井而得旣浚滌之遂名曰清白泉兾汲斯泉者無媿斯名也後東嘉王十朋來簽郡幕作㑹稽賦有飲清白以自娱之句豈不因是泉而發與自文正之去泉之廢不知其幾百年今守白公乃得之於旣廢之後夫豈偶然者哉三汲泉輿地紀勝在卧龍山麓泉甚淺不過有水數斗然汲盡已滿未常竭也靈鰻井𢎞治紹興府志在寳林山井有靈鰻時出見林景熈寳林鰻井詩雲根藏海眼靈物此中蟠吐沫晴巖雨飛隂夏木寒何年化龍去半日待潮看消長從誰問微吟倚石欄山隂縣城外山川亭山嘉泰㑹稽志在縣西南一十二里太平御覧晋司空何無忌臨郡起亭山椒極望巖阜基址猶存因號亭山侯山嘉泰㑹稽志在縣西四里舊經云南湖侯山迥在湖中俗稱九里山昔時去縣之數也晉書孔愉傳愉為㑹稽内史在郡三年乃營山隂湖南侯山下數畆地為宅便棄官居之朱彜尊侯山讌集詩侯山山上放龜臺百尺紅亭鏡裏開試問花源齊列坐何如蘭渚逺浮杯廵檐浦樹迎人出卷幔沙禽拂席廻我欲臨風歌一曲起行松月重徘徊陳音山嘉泰㑹稽志在縣西南四里太平御覧昔有善射者陳音越王使簡士習射於郊外因死為冡今開塜壁悉畵作騎射之象因以名山麻林山越絶書一名多山句踐欲伐吳種麻以為弓弦使齊人守之越謂齊人多故曰麻林多以防吳去縣一十二里龍尾山紹興府志在府西南二十里與卧龍首尾相望容山山隂縣志去縣西南二十七里其上平曠可容故名六峰山紹興府志在府城西南三十里有溪出山麓峽山𢎞治紹興府志在縣西南二十里两山相峙故名項里山𢎞治紹興府志在縣西南二十里世傳項羽流寓於此嘉泰㑹稽志有溪清澈居民二百餘戸絹山嘉靖山隂縣志去縣西南六里石紋如叠絹土人呼曰絹山法華山嘉㤗㑹稽志在縣西南三十五里舊經云晋義熈中僧曇翼誦法華經感普賢應現因置寺花徑山山隂縣志去縣西南二十五里多桃李榆桞望若雲錦包絡山谷故名直歩山紹興府志與花徑山相近下有溪入鏡湖木客山山隂縣志去縣西南二十七里吳王好宫室越王使木工三千餘人入山伐木一年無所得木工思歸而歌木客之吟一夜天生神木其大二十圍其長五十尋陽為文梓隂為楩楠乃伐而獻之蘭渚山𢎞治紹興府志在縣南二十七里晋王右軍修禊序云此地有崇山峻嶺盖謂此山也玊架山俗呼筆架山嘉泰㑹稽志在縣西南三十里三峰如筆格秀麗可畵大巖山紹興府志在府城西南一百十五里山形若冕旒又名冕旒山宋時宫闕在錢塘者與山相對清化山𢎞治紹興府志在縣西南一百一十里趙王尖山舊浙江通志在府城西南一百二十里浮丘山𢎞治紹興府志在縣西南一百一十里世傳浮丘煉丹於此離渚山紹興府志在縣西南三十里内有謝尚書塢柯山山隂縣志在縣西南三十里山皆石其下有水曰柯水有石佛髙十餘丈朱彜尊柯山詩柯亭山下路修竹暮紛紛衆壑千尋暗雙崖一境分江光明草樹日氣冷江雲更憶中郎笛寥寥不可聞謹按後漢書蔡邕傳注張騭文士傳云邕告人曰昔經㑹稽高遷亭見屋椽竹東間第十六可以為笛取用果有異聲伏滔長笛賦序云柯亭之觀以竹為椽邕取為笛竒聲獨絶柯山得名以此戴冠府志遺之寓山舊浙江通志在府城西南二十五里環山皆水聖女山嘉泰㑹稽志在縣西二十九里三山嘉泰㑹稽志在縣西九里與卧龍岡勢相連嘉靖山隂縣志去縣西九里鑑湖中陸游遊息之所鳯凰山𢎞治紹興府志在縣西五十五里牛頭山山隂縣志去縣西六十五里唐天寳間改名臨江山羊石山舊浙江通志在府城西北三十六里有石如羊故名馬鞍山𢎞治紹興府志在縣西北四十里狀如馬鞍唐天寳間改名人安上方山舊浙江通志在府城西北四十里與下方山相連有下方寺塗山嘉泰㑹稽志在縣西北四十五里舊經云禹㑹萬國之所按史記國語禹㑹諸侯於㑹稽防風氏後至誅之書曰禹娶於塗山注塗山國名左傳禹㑹諸侯於塗山杜預注在壽春說者云今濠州也蘇鶚演義云塗山有四一㑹稽二渝州巴南舊江州三濠州四當塗縣自越絶等書皆云禹娶於㑹稽塗山其說不經葢禹㑹諸侯於㑹稽則信而有徴至娶婦處則好事者傅㑹於此非其實也㑹稽風俗賦注按左傳哀公七年諸大夫對孟孫曰禹合諸侯於塗山執玊帛者萬國杜預注云塗山在夀春東北孔頴逹云夀春縣也又淮南子原道訓禹㑹諸侯於塗山執玉帛者萬國許慎注云塗山在九江當塗縣愚按漢之當塗晋之壽春此相接之境也當塗後廢夀春今存其說與杜氏相符矣越之舊經與太平御覧並引郡國志云塗山禹㑹萬國之所以為在越中其說與杜氏許氏相戾唯曽子開等為九域志不膠承襲之非故越州古跡不書塗山可謂得其實矣謹按禹㑹諸侯於塗山施宿以為當在㑹稽史鑄以為當在夀春施宿之言為是而引據未詳考吳越春秋云苗山禹改為㑹稽苗即茅山又云塗山則塗山即㑹稽山為禹致羣神之所見史記孔子世家注云守山川之祀者為神謂諸侯也以吴越春秋史記証之塗山當在㑹稽但不應於山隂别出一塗山或後人傳訛耳若明戴冠府志以左傳南望三塗為塗山則杜注眀云太行轘轅淆澠謂之三塗未甞確指山名亦非實據也西余山於越新編在府城西北四十二里一名西扆謂禹負扆朝諸侯處碧山𢎞治紹興府志在縣西北五十里山有碧石故名烏風山紹興府志在縣西北五十里濵於海有洞出烏風一名龜山當潮生時逺望之宛然如龜出没水中今名白洋山蜀阜山嘉泰㑹稽志在縣北三十五里舊經云山自蜀飛來帶兒婦二十餘人善織美錦自言家在西蜀十道志云句踐以寡婦居此令軍人游焉一名獨婦山越絶書句踐將伐吳徙寡婦致山上以為死士示得専一也梅里尖山舊浙江通志在縣北二十里嘉泰㑹稽志其隂為梅仙塢以梅福里得名巫山嘉泰㑹稽志在縣北十八里越絶書云越􅸾神之官死𦵏其上嘉靖浙江通志一名梅山漢梅福居此戴表元梅山詩梅尉功成後安知不此來路逢耕者問山是化人開樵隴低通海茶村暖待雷𤣥談亦可隠不用墾蒿萊下馬山山隂縣志去縣北二十五里舊經云秦始皇東廵息駕於此有石如蟾亦名蟾山俗名蝦蟇山山多露石两崖夾水石骨横亘水底曰石檻璜山𢎞治紹興府志在縣北三十里滙小江勢小而環抱若璜故名大峰山紹興府志在府城北三十五里多梔白花黄柎黄實多硌石有洞焉石投之泠然有風曰風洞玉山嘉泰㑹稽志在縣北三十三里舊經云唐貞元元年浙東觀察使皇甫政鑿此山為斗門八閘洩水入江按唐書地理志山隂縣北三十里有越王山堰皇甫政鑿山以蓄泄水利與舊經相合即此石城山嘉泰㑹稽志在縣東北三十里吳越備史乾寧三年錢鏐討董昌攻石城去越三十里即此古博嶺舊浙江通志在府城西南四十五里羣峰交峙中有一徑南逹楓橋至諸曁界曠寂稀人烟徃徃虎豹栖止俗訛為虎博嶺姚寛古博嶺詩北風獵獵駕寒雲低壓平川路欲昏人馬忽驚俱辟易一聲乳虎下前村看怕嶺嘉靖山隂縣志在縣西南八十里其路峻險行者皆懼白峰嶺𢎞治紹興府志在縣西南一百十里刑塘嶺𢎞治紹興府志在縣西五十五里世傳禹築塘斬防風氏故名㑹稽風俗賦注賀循㑹稽記云防風氏其身三丈刑者不及乃築髙塘刑之故曰刑塘古城嶺萬厯紹興府志在府城西五十里越王允常築城處大嶺萬厯紹興府志在府城西六十五里一名梅山嶺越王崢萬厯紹興府志在府城西南九十里越王句踐於此棲兵又名棲山仙人洞霏雪録在山隂縣西北六十里越棲峰下乃宋九江葛秋巖慶龍游息之所王君理得函骨於石洞至今號葛仙洞磨鏡石𢎞治紹興府志在鏡湖邉任昉述異記世傳軒轅氏鑄鏡於此今石尚存西小江山隂縣志在縣西北四十五里其源在諸曁之浣江分為二𣲖初出天樂徑流蕭山轉東北逹於海天順元年太守彭誼建白馬山閘以通三江口之潮閘東盡漲為田於是江水不通於海矣互見水利錢清江萬厯紹興府志府城西五十里浦陽江下流漢劉寵投錢處今通為運河陳淵錢清江待潮詩江潮來去自有時扁舟閣淺心如飛岸容霜竹青照眼春信梅花香撲衣天寒鄞江道路阻嵗晏錢清風俗非故國囬首二千里落日看盡行雲歸栁貫過錢清江詩浦陽配三江猶以小絜大我家其始源涓流激湍瀬到兹直逹海混混百川㑹歸墟豈其豐出坎亦非殺贏縮總如一真源自霶沛浮舟絶江津浪觸銀花碎朝曦如青蓮升光破烟靄歸雲回望長鴻飛渺天外高啟夜發錢清詩錢清渡頭船夜開黄茅苦竹聞猿哀客官釃酒水神廟風雨滿江潮正來蒸飯炊魚坐篷底不覺舟行两山裏櫂歌早過越王城東方未白啼鴉起朱彜尊初秋泊錢清江詩錢清江口水平隄雲木参覃磴不齊川靜未聞鴻雁渡雨昏時有鷓鴣啼逃名梅尉來吳市避地梁生入㑹稽枉自含情臨北渚秋風嫋嫋草萋萋鏡湖名勝志在城南三里一名鑑湖任昉述異記軒轅氏鑄鏡湖邉或云黄帝獲寳鏡於此又云本王羲之語山隂路上行如在鏡中游又名長湖水經注云浙江又東北得長湖口湖廣東西百三十里北㵼長江又名太湖郡國志云石帆山北臨太湖水深不測傳與海通源出㑹稽之五雲鄉綿跨山㑹二縣周三百五十八里總納二縣三十六源之水東至曹娥西至西小江南至山北至郡城其初本通潮汐漢永和五年太守馬臻始築塘畜水界湖為二曰東湖曰南湖南湖屬山隂東湖屬㑹稽唐𤣥宗賜祕書監賀知章鑑湖一曲又名賀監湖自宋熈寧以後湖漸廢為田今俗呼白塔洋僅長十五里卽鏡湖處也互見水利寳慶㑹稽續志本名慶湖賀鑄慶湖遺老集序云賀本慶氏吳王僚遇公子光之禍王子慶忌奔衛妻子幷度浙水隠㑹稽上越人哀之表其族日慶氏名其田曰慶湖今為鏡湖傳訛也漢安帝時避帝本生諱改賀氏水亦號賀家湖家牒載謝承㑹稽先賢傳叙畧如此宋之問泛鏡湖南溪詩乗興入幽棲舟行日向低巖花候冬發谷鳥作春啼㳫嶂開天小業篁夾路迷猶聞可憐處更在若耶溪陸游鑑湖歌千金不湏買畵圖聼我長歌歌鑑湖湖山竒麗說不盡且復與子陳吾廬桞姑廟前魚作市道士莊畔菱為租一灣畵橋出林薄两岸紅蓼連菰蒲村南村北鴉陣黒舍東舍西楓葉赤每當九月十月時放翁艇子無時出船頭一束書船尾一壺酒新釣紫鱗魚旋煮白蓮藕從渠貴人食萬錢放翁艇子長便便暮歸稚子迎我笑遥指一抹西村烟菱塘湖嘉靖山隂縣志在縣西五十里湖多菱葑故名廣三千七百二十餘畝近被侵佔為田水不甚蓄互見水利黄􅶞湖舊浙江通志在府城北十五里餘支溪名勝志鏡湖之别𣲖也水經注云山隂縣西南四十里有二谿東谿廣丈九尺冬煖夏冷西谿廣三丈五尺冬冷夏煖二谿北行三里至徐村合成一谿廣五丈餘而温凉不雜蓋山海經所謂茗水也射浦越絶書句踐教習兵處也去縣五里查浦山隂縣志在縣西一百里句踐陳兵處紀家滙𢎞治紹興府志在縣西南一百里沉釀埭嘉泰㑹稽志在若耶溪東十道志鄭𢎞舉送赴洛親友餞於此以錢投水依價量水飲之各醉而去一名沈釀川蘭渚蘭亭考越州山隂有蘭渚在縣西南二十五里王右軍曲水賦詩作序於此離渚𢎞治紹興府志在府城西三十里發源自唐里六峰諸山縈廻合離渚溪懽潭山隂縣志去縣西南一百三十里水清味甘右軍墨池𢎞治紹興府志在縣西南二十五里按宋志云每朝廷恩命至池水必先黒玊帶泉舊浙江通志在琵琶山下泉味甘而冽色微白故謂之玉帶半月泉西溪叢語李紳天衣寺詩殿涌全身塔池開半月泉此泉隠巖下雖月圓只見其半最為佳處紹興初僧法聰鑿開巖上名曰滿月甚可惜也海明一統志在縣北三十里曹娥錢清浙江三水所㑹謂之三江海口㑹稽縣城外山川㑹稽山嘉泰㑹稽志在縣東南十三里周禮揚州之鎮山曰㑹稽山海經云㑹稽之山四方其上多金玊其下多砆石勺水出焉史記云禹㑹江南計功命曰㑹稽㑹稽者㑹計也吳越春秋云禹登茅山以朝羣臣乃大㑹計更名茅山曰㑹稽山輿地志云一名衡山其山有石狀如覆鬴亦謂之覆鬴山十道志云一名苖山一名塗山吳夫差入越越王以甲楯五千保㑹稽山水經注㑹稽之山古防山也亦名鎮山又曰棟山越絶云棟猶鎮也太平御覧隋開皇十四年詔㑹稽等山並就山立祠唐開元十四年封四鎮山為公㑹稽曰永興公有南鎮永興公祠栁貫望㑹稽山詩城東鑑湖道水光翻夕鷗雲破青靃靡稽峰芝掌浮悠然動予矚玉女開明眸固知穴可探却恐書難求蒲蓮浩如海微風挾輕舟前山與後嶺導從森幢旒誰將北斗旗漸進東瀛洲桂枝倘堪折衰白媿重游宛委山名勝志在縣東南十五里上有石簣壁立干雲升者累梯而上十道志石簣山一名宛委一名玊笥㑹稽風俗賦韞玊有笥有懸崖之險亦名天柱山昔禹治水歌功未成齋戒於此得金簡玉字因知山河體勢遁甲開山圖云禹治水至㑹稽宿衡嶺宛委之神奏玊匱書十二卷禹開之得赤珪如日碧珪如月是也吳越春秋宛委山中藏金簡書禹廵衡山見赤繡文衣男子自稱元夷蒼水使者云欲得簡書知導水之方請齊於黄帝之岳乃登山發石果得其文秦望山水經注在州城正南為衆峰之傑秦始皇登之以望南海自平地以取山頂七里縣隥孤危徑路險絶記云扳蘿捫葛然後能升山南有嶕峴峴裏有大城越王無餘之舊都也刻石山嘉泰㑹稽志在縣西南七十里一名鵞鼻山水經注秦始皇登稽山刻石記功尚存山側孫暢之𫐠征書云丞相李斯所篆也元豐九域志秦始皇刻石前有方石數丈云是始皇坐两廂分石八所云是丞相以下坐西溪叢語越王棲於㑹稽宫娥避於此又云娥避山望秦山嘉泰㑹稽志在縣東南三十二里始皇登此以望秦中一名天柱峰亦名卓筆峰雲門山雲門志畧在府城南三十里晉義熈二年中書令王獻之居此有五色雲見詔建雲門寺水經注玊笥竹林雲門天柱並疏山創基架林裁宇割澗延流盡泉石之好嚴維同韓員外宿雲門詩中令遺踪在仙郎此夕過潭空觀月定澗静見雲多竹翠烟深色松聲雨㸃和萬縁俱不有對境自垂蘿劉長卿上巳日與鮑侍御泛若耶游雲門詩蘭橈漫轉傍汀沙應接雲峰到若耶舊浦滿來移渡口垂楊深處有人家永和春色千年在曲水郷心萬里賒更見漁舟時借問桃源幾路入烟霞髙似孫别雲門詩回首雲邉更看松風流王謝舊行踪不知誰繼諸賢後半夜來聼六寺鐘何山雲門志畧在雲門西一里宋何子季所居王十朋謂秦刻石在其上若耶山雲門志畧在府城南四十四里下有采蓮田東又有若耶嶺舊經云葛𤣥學道於此太平寰宇記若耶山葛𤣥所隠桐几化成白麂三足共行二頭並食山下有壇壇旁有石謂之葛仙公石赤堇山名勝志在㑹稽山南舊經歐冶子為越王鑄劍之所一名鑄浦山越絶書赤堇之山破而出錫亦名錫浦國䇿破堇山而出錫薛燭曰赤堇之山已合無雲張景陽七命耶溪之鋌赤山之精山傍有井歐冶子取水淬劍曰歐冶井有洞曰玉洞榖米山明一統志在府城東南七十里十道志舜常耕此山天䧏嘉榖故名白鶴山陽明洞天圖經在縣東一十六里孔靈符㑹稽記云此山在射的山西南水中有白鶴為仙人取箭又名箭羽山射的山寳慶㑹稽縣志在縣南十五里與白鶴山相連水經注逺望山的狀若射侯故謂之射的射的之西有石室名為射堂年登否常占射的以為貴賤之準的明則米賤的昬則米貴葛山明一統志在府城東一十里句踐種葛於此剌涪山萬厯㑹稽縣志在雲門山南一名明覺山盖明覺寺基也頂有池大旱不涸石帆山𢎞治紹興府志在府城東十五里水經注山東北有孤石髙二十餘丈廣八尺望之如帆因以為名雲門志畧在射的山北石壁高數十丈中央少紆狀如張帆陸游宿石帆山下詩繫舟禹廟醉如泥投宿漁家月向低濕翠撲人濃可掬始知身在石帆西鹿池山名勝志在㑹稽山之東北甞有白鹿游此水經注云鏡湖水自東亦注江通海水側有白鹿山又曰湖北有三小山謂之鹿野山按吳越春秋乃越之麋苑也上有石室相傳為越王游息處洞浦山嘉㤗㑹稽志在縣東南二十四里舊經云卽湖南龍尾山西南之趾箬蕡山嘉㤗㑹稽志在縣東十二里舊經云秦始皇東游於此供芻草俗呼遶門山少微山名勝志距鹿池二里宋職方郎齊唐隠居之所土城山嘉泰㑹稽志在縣東六里吳越春秋王得西施鄭旦餙以羅縠教以行歩習於土城教於都巷三年學服而獻吳王寳山𢎞治紹興府志在縣東南二十五里一名上臯山山崦有趙家嶴即南宋攅宫錫山嘉泰㑹稽志在縣東五十里舊經云越王採錫於此横山嘉泰㑹稽志在縣東三十四里銀山萬厯㑹稽縣志在縣東五十里東化山㑹稽縣志一名將軍山西化山萬厯㑹稽縣志一名筆峰與東化山接在雲門山諸葛山萬厯㑹稽縣志在府城東南六十里葛洪常棲於此亦名葛巖銅牛山嘉泰㑹稽志在縣東南五十八里水經注山有銅穴三十許丈穴中有大樹神廟山上有冶官山北湖下有練塘里吳越春秋云句踐鍊冶銅錫之處輿地紀勝昔銅牛見於靈氾橋人逐之奔入此山掘地得銅屑云舜山雲門志略在府城東南四十里一名筆架山山髙可十里餘上有水田可稻緇黄之流徃徃茅茨其上壕山嘉泰㑹稽志在縣東七十里漢駱夫人學道於此昇仙有石室石井丹竈存焉稱山嘉泰㑹稽志在縣東北六十里舊經越王稱炭鑄劍於此俗呼稱心山方干稱心中島詩水木深不極似將星漢連中州惟此地上界别無天雪折停猿樹花藏浴鶴泉師為終老意日日復年年稷山寳慶㑹稽縣志在縣東五十三里稱山南舊經名穢山越王種菜於此後漢謝夷吾為穢鄉嗇夫卽此越絶云句踐齋戒壇也亦曰齋臺山十道志一名棕山白塔山萬厯㑹稽縣志在府城東五十里犬亭山嘉㤗㑹稽志在縣東南三十里舊經越絶並云句踐畜犬獵南山白鹿即此㑹稽縣志嵗久相延呼為狗山又曰吼山俗謂宋攅陵所在衆山皆拱此山獨否故名之曰吼取呼而相向義也萬厯㑹稽縣志山北岸有小山曰曹家山舊為工人伐石玲瓏若戶牖嵗久蘿木蔓之積水成潭移舟其中一洞天妙景也施閏章家長也太守招遊曹山及吼山詩石斷忽成溪懸厓隂復低登亭迷上下游艇失東西絶壁魚龍氣危藤鸛鶴棲使君幽興極扳盡白雲梯覆斗山吕祖謙入越記楓江南岸有覆斗山山形正方若斗覆太平山嘉泰㑹稽志在縣東南七十八里晉謝敷隱居山中十餘年以母老還若耶孫綽太平山銘嵬峩太平峻踰華霍秀嶺樊藴竒峯挺蕚上干翠霞下籠丹壑有士㝠游黙徃寄托肅形枯林映心幽漠亦旣覯止渙焉融滯懸棟翠微飛宇雲際重巒􅑬嵼迴溪縈帶被以籟松灑以素籟流風佇芳翔雲傍靄謹按太平山有三一在㑹稽一在餘姚一在上虞上虞之山一名傘山惟餘姚之山最著謝敷所隠屬㑹稽或上虞未詳今繫於此從舊志也陶宴嶺㑹稽縣志在縣東南四十里舊經云陶𢎞景隠於此山林景熈陶宴嶺詩笑拂青蘿問隠君千巖秋色此中分當時宴坐無人識唯有松風共白雲日鑄嶺嘉泰㑹稽志在縣東南五十五里昔歐冶子鑄五劍采金銅之精於山下歸田録草茶盛於两浙两浙之品日鑄苐一茅峴輿地紀勝在縣東一十八里茅君隠於此一名玉笥出羙玉山之陽曰香爐峰石傘峰明一統志卽㑹稽山之别峰下有范蠡飬魚池方干島於越新編在㑹稽山東北俗呼寒山唐方干别墅在鑑湖中故曰島葛仙巖陽明洞天圖經禹穴有石巖高丈餘南面側平如削真誥云此石於赤烏二年天䧏從安息國飛來上有索痕三條名為飛來石晉葛仙翁曽築壇煉丹後人名葛仙巖煉丹井陽明洞嘉㤗㑹稽志在宛委山龍瑞宫舊經三十六洞天之十一洞也一名極元太元之天洞外飛來石下為禹穴傳云禹藏書處史記太史公自叙上㑹稽探禹穴注云禹至㑹稽因𦵏焉上有孔穴水經云山東有硎深不見底東游者多探其穴今不可考吕祖謙入越記龍瑞宫傍即禹穴乃大石中斷成罅殊不古殆非司馬子長所探也輟耕録陽明洞天在秦望山後禹廟之西南諸峯環聳盤鬰空曲中有東嶽行祠及老子宫戴表元遊陽明洞天呈王理得諸君詩禹穴蒼茫不可探人傳靈笈鎖烟嵐初晴鶴㸃青邉嶂欲雨龍移黒處潭北斗齋壇天寂寂東風仙洞草毿毿堪憐尹叟非闗吏猶向江南逐老𥅆韓性陽明洞詩洞天深窅行客疑飈輪碧簡誰能稽倚松長嘯巖壑動放懐未必今人非石氣盤空散成霧檜子無風落青雨草間欲問苖龍壇薜荔鱗鱗絡銅虎東小江萬厯紹興府志在府城東南九十里亦名小舜江西為㑹稽東為上虞其源出浦陽江東北流入曹娥江皇甫冉東小江懐靈一上人詩江上年年春早津頭日日人行借問山隂逺近猶聞薄暮鐘聲陸羽㑹稽東小江詩月色寒潮入剡溪青猿呌斷緑林西昔人已逐東流去空見年年江草齊曹娥江嘉泰㑹稽志在縣東南七十里江因娥得名也名勝志源自剡溪來東折而北至曹娥廟前名曹娥江又北至龍山下名舜江又西北折入於海韓性曹娥江詩隔岸檣竿著暮鴉待舟人立渡頭沙數拳頑石生雲氣一片斜陽有浪花若耶溪明一統志在府城南二十里與鏡湖合西施採蓮歐冶鑄劍於此吳越春秋若耶之溪深而莫測後漢劉寵為㑹稽太守若耶父老人齎百錢相送因名劉寵溪㑹稽縣志唐徐季海常遊嘆曰曽子不居勝母之里吾豈遊若耶之溪遂改為五雲溪耆舊續聞去鏡湖二十餘里乃一小澗水溪旁人烟極蕭條但有雲門寺猶存宋之問游禹穴回出若耶溪詩禹穴今朝到耶溪此路通著書聞太史煉藥有仙翁鶴徃籠猶挂龍飛劍已空石帆摇海上天鏡落湖中水底寒雲白山邉墜葉紅歸舟何慮晚日暮使樵風孟浩然耶溪泛舟詩落影餘清輝輕橈弄烟渚澄眀愛水物臨汎何容與白首垂釣翁新粧浣紗女相看似相識脈脈不得語綦母潛春汎耶溪詩幽意無斷絶此去随所偶好風吹行舟花落入溪口際夜轉西壑隔山望南斗潭烟飛溶溶林月低向後生事且瀰漫願伴持竿叟崔浩汎若耶溪詩輕舟去何疾已到雲林境起坐雲鳥間動摇山水影巖中響自答溪裏言彌静事事令人幽停橈向餘景蟶浦萬厯紹興府志在府城東北四十里樵風涇萬厯㑹稽縣志在縣東南二十五里孔靈符㑹稽記云射的山白鶴常為仙人取箭漢鄭𢎞少時採薪得一遺箭頃之有人覔箭問𢎞何所欲𢎞識其神人也答曰常患若耶溪載薪為難願朝南風暮北風後果然世號樵風涇炭瀆水經注吳越春秋云練塘句踐錬冶銅錫之處采炭於南山故其間有炭瀆句踐臣吳王封句踐於越百里之地東至炭瀆是也平水嘉泰㑹稽志在縣東南三十五里鏡湖所受三十六源之水平水其一也劉基游平水記赤堇山南行六七里泊於雲峯之下曰平水市卽唐元微之所謂草市也其地居鏡湖上游羣小水至此入湖陸游平水小憇詩蓐食古菴中肩輿出市東霧收山淡碧雲漏日微紅酒斾村塲近罾船浦溆通平生喜行路小住莫匆匆御河於越新編在府城東南十五里自董家堰抵寳山宋攢宫河也麻潭水經注下注若耶溪水至清照衆山倒影窺之如畫日月池輿地紀勝在縣治東北一里池二所俗傳錢武肅王有目疾故浚此二池南池明一統志在縣南二十五里相傳范蠡飬魚處鄭公泉水經注寒溪之北有鄭公泉泉方數丈冬温夏凉漢太尉鄭𢎞宿居潭側因以名泉嘉泰㑹稽志輿地志云𢎞雖居台輔甞思故國曽病困思得此泉水家人馳取飲少許便差華鎮鄭公泉詩溪上清泉玊色寒臨泉踏盡石苔斑為憐北闕乗軒客白首高情在舊山菲飲泉明一統志在府東南十二里大禹寺西真珠泉萬厯紹興府志在少微山齊祖之家山十詠泉其一也苦竹泉明一統志在秦望山側林多苦竹泉出其下故名禹井明一統志在㑹稽山水經注云山南有硎去廟五里謂之禹井葛仙井明一統志在禹穴側葛洪煉丹於此海嘉泰㑹稽志在縣北二十里蕭山縣蕭山名勝志在縣西一里舊志晉許詢於此慿林築室有蕭然自適之趣考漢書地理志餘曁縣蕭山潘水所出東入海則名不始於詢劉滄蕭山詩一望江城思有餘遥分野徑入樵漁青山經雨菊花盡白鳥下灘蘆葉踈静聼潮聲寒木杪逺看風色暮帆舒秋期乂踐潼關路不及年年向此居菊山於越新編在縣西二里茗山嘉泰㑹稽志在縣西三里王十朋㑹稽風俗賦茗山鬭好北幹山嘉泰㑹稽志在縣北一里晉許詢家於此山之陽去虎山嘉㤗㑹稽志在縣北五里山有猛虎甞傷人一夕負子渡江西去縣令杜守一因名其山時景徳四年六月晦也城山名勝志在縣西九里其山中卑四高宛如城堞吳伐越次查浦越立城以守查此山即其地名越王城山半有池曰洗馬泉中産嘉魚越拒吳時吳意越必乏水以鹽魚為餽越取雙魚答之遂解圍定山萬厯紹興府志在縣西一十二里石巖山名勝志在縣西南十二里巉岏纍危狀如獅子巔有香泉方四尺深尺許荏山嘉泰㑹稽志在縣東北十里舊經云越王種荏於此塔山一名南山萬厯紹興府志在縣南二十五里縣學向之有文筆峰絶頂舊有塔其南坳如舟名石船塢三臺山嘉㤗㑹稽志在縣南五十里擪烏山紹興府志在縣西南十五里東方朔神異記亞父斷蕭山南嶺將擪於烏江盖江東以擲為擪云冠山名勝志縣西十七里山形如冠有泉甘冽連山名勝志在縣西二十里長岡九里舊經秦始皇欲置石橋渡浙江今石柱數十列於江際旁有小山號石井山其井上廣下曲相傳為妃子墓獅子山萬厯紹興府志在縣西二十三里浙江正當其面石牛山萬厯紹興府志在縣西南八十里其東之徑抵富陽縣界大山名勝志在縣西南九十里横亘三都一名長山其南之最高者曰鏡䑓山一名白石山許詢修煉之所巖曰元度巖洞曰仙人洞草木皆香可以療疾又曰百藥山龍門山紹興府志在州口山北十里两山對峙上有龍湫翠嶂山嘉泰㑹稽志在縣西二十五里一名夏駕山佳山萬厯紹興府志在縣南九十里尖山萬厯紹興府志在縣南五十里桃源鄉金雞影山一名峽山嘉泰㑹稽志在縣南六十里八面向江有雞籠石苧蘿山嘉泰㑹稽志在縣南三十里有西施廟一在諸曁輿地廣紀西子出蕭山縣毛竒齡蕭山縣志刋誤山有西施宅宅前有紅粉石西施屬諸曁本之十道圖經吾謂施斷屬蕭不屬諸者考