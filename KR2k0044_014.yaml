志在縣東七十里狀如錦屏有石井相傳以為龍窟有以物投井者後自海畔人家見之因謂與海通稱為海眼云龜山萬厯紹興府志在縣東七十里两山皆如龜狀如母子然界乎二水合流之間三峰山𢎞治紹興府志在縣東七十里金庭山名勝志在縣東七十里天台華頂之東門也夏侯曽先地志云有金庭桐柏與四明天台相連唐裴通記云剡中山水之竒麗金庭洞天為㝡其北門小香爐峰頂人莫能見之嘉㤗㑹稽志桐柏在天台金庭在剡舊又以金庭為桐柏葢其山隴聫屬故爾洞天福地記第二十七洞天金庭崇妙洞天三百里在越州剡縣禇伯玊沈休文居之花山名勝志在縣東北三十里怪石竒松宛然圖畵下臨碧溪行舟如織漁樵歌唱逺近相應嵊山嘉泰㑹稽志在縣東三十四里水經云山下有亭帶山臨江松嶺森鬰謹按宋書張稷為剡令至嵊亭生子名嵊字四山嵊之為字為取四山相合如乗馬乗雁之義車騎山嘉泰㑹稽志在縣東四十七里舊經云晉車騎將軍謝元為㑹稽内史常於此山立樓居止後人因以為名姥山萬厯紹興府志在縣南十五里林木蓊鬰蒼翠剡之南望也山外為新昌縣境刻石山名勝志一名獨秀山在縣南三十里十道志云一名穿山宋昇明末縣人倪襲祖行獵見山上有文凡三處苔生其上刮苔視之其大石文曰黄天皇蕭字道成得賢師天下太平小石文曰刻石者誰㑹稽南山李斯也唐寳元初元稹使人訪碑不獲王十朋㑹稽賦謂苔封石刻即此遁山名勝志在縣西南四十里下有白雲塢漢車騎將軍求恭隱處亞父山萬厯紹興府志在縣西南七十里相傳有採薪者遇一老人曰吾亞父也當宅此山明日見石間足迹甚大貴門山於越新編在縣西南七十里有三泉迸石穴曰三懸潭李易貴門卜築詩亂後亦擇居筮山山輙許居民百餘家喜甚手欲舞云久聞公名此幸殆天與感兹鄭重意時節共雞黍剡川非沃野地僻民更窶趂時務擷茗餘力工搗楮寡婦念遺秉汙池憐數罟我欲教耦耕盡力循南畆桃杏種連山深居可長處東鄰有節士酒酣乃發語公昔起布衣高誼掩前古親擢類平津决䇿逢真主两宫佇六飛萬乗思一舉交親正倔強蠭起益傍午浩然公獨歸偶出寧有補黙塞復何言長歎汗如雨鹿苑山萬厯紹興府志在縣西六十里太白山一作大白名勝志在縣西七十里絶高者為太白次為小白面東者為西白面西者為東白在東陽者為北白剡録云峻極崔巍吐雲納景趙廣信昇仙處也石筍對立如闕瀑泉飛下孔曅記云剡縣西七十里白石山有瀑布水巖際有蜜房採蜜者以葛藤連結然後能至南史禇伯玉居剡中齊高帝勅於剡西白山立太平館居之宋書禇伯玊隱身求志居剡縣瀑布上處一樓今西北山有瀑布泉是其處孔稚圭太白山詩石險天貎分林交日容缺隂洞發春芽寒巖留夏雪戎昱送清澈游太白山詩卷經歸太白躡蘚到蘿龕若履浮雲上須看積翠嵐倚身松入漢暝目月離潭此境堪長徃塵中事可諳葛現山嘉泰㑹稽志在縣西北二十里石門山名勝志在縣西北二十五里山有石洞旁有龍湫五龍山萬厯紹興府志在縣西北四十里水自真如山來滙為龍潭者五有晉高僧帛道猷道塲子周山嘉泰㑹稽志在縣西北七十里紫巖山𢎞治紹興府志在縣西北七十里榆樹山嘉泰㑹稽志在縣西北八十五里了山一名餘糧山𢎞治紹興府志在縣北一十二里謝巖山𢎞治紹興府志在縣北三十里謝康樂所遊嵊縣志剡録云山隩深峭被以榛莾有巨澗奔激清湍淜騰映帶左右入於溪下為三墜嶺其深淵迂裊紺碧一色小白山嘉泰㑹稽志在縣西六十里真誥云趙廣信陽城人魏末渡江來此山師李一成服氣又授師左君守中之道後白日升天有丹井今存黄山名勝志在縣南十里又名方山嶀山嘉㤗㑹稽志在縣北四十里輿地志云後溪口遡江上數十里两岸峭壁勢極險阻乗高瞰下有深林茂竹表裏輝映名為嶀嵊奔瀬迅湍以至海也水經注嶀山與嵊山接二山雖曰異縣而峰嶺相連其間傾澗懐烟泉溪引露吹畦風馨觸岫延賞東林嶺𢎞治紹興府志在縣東七十里白峰嶺𢎞治紹興府志在縣西八十里入東陽縣界清風嶺𢎞治紹興府志在縣北四十里舊名青楓宋王烈婦死節於此因易今名李孝光清風嶺詩山下江流本自清山頭明月已無情此心若媿王貞婦莫向清風嶺上行聖巖萬厯紹興府志在縣北七十里高百丈長一里上有行路下可避風雨馬蹄石輿地紀勝在縣東北相傳秦皇東遊經此馬蹄所踐也毛竹洞於越新編即金庭洞洞口有竹生毛白雲洞萬厯紹興府志在縣東七十里與金庭山相近風月之夕山中有聞吹笙者相傳王子晉仙去後主治天台華頂號白雲先生徃來金庭之間今山下有白雲祠石闌干名勝志在縣西南四十五里與嶀浦相連嶀浦嘉泰㑹稽志在縣西南四十五里水經云嶀山成工嶠以北有嶀浦了溪明一統志在餘糧山下越絶記禹鑿了溪人方宅土王十朋了溪詩禹蹟始壺口禹功終了溪餘糧散幽谷歸去錫𤣥圭剡溪嘉泰㑹稽志在縣南一百五十歩溪有二源一出天台一出婺之武義西南流至東陽入縣一百四十里東北流入上虞縣界太平寰宇記即王子猷雪夜訪戴逵之所亦名戴溪朱放剡溪行却寄新别者詩潺潺寒溪上自此成離别回首望歸人移舟逢暮雪頻行識草樹漸老傷年髪惟有白雲心常向東山月宰過剡溪詩青山疊疊水潺潺路轉峰廻又一灣想得雪天無限好不妨獨棹酒船還王銍剡溪久寓詩山水戴逵宅尚餘清興中千巖落花雨一逕卷松風酒茗延幽子圖書伴老翁長生吾不羡久悟去來同墨池鵝池𢎞治紹興府志在金庭山右軍舊居處也又獨秀山亦有墨池鹿苑潭輿地紀勝在縣西鹿苑寺源出山巔二小穴嵗旱投簡驟雨即至浙江通志卷十五
