body:
  text: 浙江通志卷一百六十六人物二忠臣四衢州府晉徐𢎞萬厯龍游縣志字聖通習韓詩春秋舉孝亷為汝陰令縣大姓多兼并𢎞至官誅鉏奸桀豪右斂手商旅露宿道不拾遺童歌曰徐聖通政明公平刑罰奸宄空遷扶風守與賊戰死唐祝奢正徳江山縣志字伯宗隋末喪亂率子弟以保鄉里唐武徳四年為賊李子通執於杭死之淛將李大亮疏其忠馳令舁歸九年詔封妻陳氏為懐徳縣君宋徐晉卿天啓衢州府志字國梁開化人仁宗朝召對為義井記嘉其才敕知洪州尤精於韜畧後戰亡於廣南金城驛子暿神宗朝給事中知延州元豐五年帥師伐寇戰亡於新城事聞帝臨朝慟哭贈柱國少保節度使毛㮚兩浙名賢録字叔縝江山人少有節操晚以特恩為歙七曹睦寇攻城官吏皆遁㮚曰吾職司寇獄有繫囚誼不可去乃攝州事時二子貢辟雍即遣人持印縋城以出令上之朝城陷㮚衣冠坐堂上賊脅使降不屈罵不絶口嬰刄而死妻錢氏弗忍去婦掖其姑又弗忍去俱遇害事聞贈朝請郎江汝度𢎞治衢州府志字致一開化人為桐廬尉會方臘􅌪發死事特贈通直郎官其子蹊蹕徐揆宋史本傳衢州人遊京師入太學靖康元年試開封府進士為舉首未及大比而遭國難欽宗詣金營不歸揆率諸生扣南薰門以書請車駕還闕金人見書使以馬載揆至軍詰難揆厲聲抗論為所殺建炎二年追録死節贈宣敎郎官其後毛奎天啓衢州府志舊名倜字世髙紹聖間進士為閩曹建卒張員作亂奎力疾諭之遂死於兵血流如白乳方允武宋史朱蹕傳允武衢州人武學上舍補官為常州宜興巡檢建炎三年金人入縣金泉鄉允武率土兵鄉夫迎戰殺獲數級奪弓箭與旗後遇金兵梅嶺村力戰而歿詔贈兩官官其子二人徐徽言宋史本傳字彥猷西安人大觀二年詔求材武士以徽言應詔賜武舉絶倫及第厯保徳軍監押以邊功累遷秉議郎靖康初遷武翼郎閤門宣贊舍人金人圍太原分兵絶饟道自隰石以北命令不通者累月徽言以三十人破之遷武經郎知晉寧軍兼嵐石路遷安撫使金人再犯京師陜西制置使范致虚檄徽言守河西欽宗割兩河以紓禍同知樞宻院事聶昌出河東為金人所刼以便宜割河西三州𨽻西夏晉寧軍民大恐徽言遂率兵復取三州時河東郡縣淪沒遺民日徯王師徽言陰結汾晉土豪十萬約復故地則奏官為守長聽世襲條其事以聞俟報可即身率精甲𢷬太原徑取雁門留兵戍守金人忌徽言欲速拔晉寧以除患建炎二年自蒲津涉河圍之先是徽言移府州約折可求夾攻金人可求降金將婁宿挾至城下以招徽言徽言故與可求為姻乃登陴以大義噍數之可求仰曰君於我何太無情徽言攝弓厲言曰爾於國家不有情我尚於爾何情寧惟我無情此矢尤無情一發中之是時河東皆已陷獨晉寧屹然孤墉横當强敵徽言與金人數十戰所俘殺過當金進攻數敗圍之益急晉寧俗不井飲寄汲於河金人載茭石湮塞支流城中水乏絶人人惴憂徽言能得衆心奮枵餓傷夷之餘裒折槊斷刄以死固守既自度不支置妻子室中積薪自焚仗劍坐堂上拔佩刀自擬左右號救持之急金兵狎至挾徽言以去婁宿得徽言所親説徽言徽言怒曰吾恨不屍汝輩歸見天子將以死報太祖太宗地下婁宿又出金制曰能小屈當使汝世帥延安舉陜地并有之徽言益怒罵曰吾荷國厚恩死正吾所膝詎為汝輩屈耶婁宿舉㦸向之覬其懼伏徽言披袵迎刄意氣自若飲以酒持杯擲婁宿罵不已金人知不可屈遂射殺之事聞賜晉州觀察使諡忠壯子岡同死事從孫適亦以守安豐死周隨亨正徳江山縣志崇寧二年進士紹興間以直龍圖閣傳宣陜蜀死於閬州亂軍贈忠國侯趙汝標𢎞治衢州府志字津叔開化人少倜儻嘉定壬午為蘄州僉判敵圍城三日救兵不至與守臣李誠之死之朝廷官其子二人祝夢熊正徳江山縣志嘉泰進士尉黄巖寇警犯境率義勇抗之被執不屈而死朱友恭宋史朱昭傳友恭西安人金人犯陜西渭帥以下皆叛死者涇原第一副將朱友恭贈敦武郎何新之嘉靖浙江通志西安人仕至樞宻院編修嘗採唐宋詩為詩林萬選後知終安軍死節徐應鑣宋史髙應松傳應鑣字巨翁江山人為太學生恭帝入燕三學生百餘人皆從應鑣與其子𤦺崧女元娘誓共焚子女皆唯命太學故岳飛第有飛祠應鑣祀飛曰天不祐宋社稷為墟應鑣死以報國𤦺亦賦詩自誓祭畢以酒肉餉諸僕諸僕醉卧應鑣率子女入梯雲樓縱火自焚一僕未寐聞火聲穴牖視之父子儼然坐立如廟塑像走報諸僕諸僕壊壁入撲滅火應鑣不能死與其子女怏怏出戸去莫知所之翌日得其屍祠前井中贈朝請郎秘閣修撰同舍生私諡曰正節先生毛附鳳正徳江山縣志宋室北遷益廣二王入閩取道江山元兵急追附鳳以義兵遏之二王得抵閩而附鳳身嬰其難魏亨中𢎞治衢州府志開化人徳祐丙子起義兵浮海以死元汪文燝𢎞治衢州府志字良辰常山人十八鄉舉第二泰定甲子成進士授餘姚判官遷翰林編修舊居里曰慶善郡守白亮更名尊賢里後仕至中議大夫嶺南廣西道肅政廉訪副使以國難憂憤不食卒有歸朝藁明農藁行世蘇幼安正徳江山縣志字心徳舉明經為衢州路教授歸老時鄉寇犯境欲執幼安去大罵不屈而死賊遂解去鄉人立祠祀焉明周廣中正徳江山縣志字子容官至河南僉事洪武庚申雷震謹身殿三上章不報遂致仕後以直道死於權奸聞者偉之周能正徳江山縣志字徳成其先江北人占籍江山幼驍勇習武藝明初從征番陽授百戸累立戰功陞福建行都指揮使後征雲南陣亡柴徳載正徳江山縣志為工部主事洪武初以剛直忤權相胡惟庸而死王均衢州府志字贄平開化人洪武間充錦衣衞校尉後轉寧府從征陣亡韓永名山藏西安人為兵科給事中論事慷慨靖難後杜門不出召之仕不應曰吾王蠋也遂坐死金玉鉉衢州府志名鼎以字行常山人洪武十五年鄉試中式授戸科給事中厯國子助教五經博士永樂四年以直諌賜死兄輝同年鄉舉厯任泗州學正成祖謁孝陵輝以燕王禮見極刑死余春夀衢州府志字永齡開化人以薦舉知諸城縣能擊貪暴抗權右永樂時以劾宦者罹重禍黄埒衢州府志江山人嘉靖四十二年處州賊作亂埒率丁壯數十人禦於破塘塢口自辰至午與黄鈺周梧俱死之鄉人為立祠徐可求舊浙江通志字世範西安人萬厯壬辰進士知上海民告人命多虚俟准詞後方於野外尋屍以誑可求命告者隨車相驗事誣坐之民乃服擢選部轉太常巡撫四川因臺省二使召土兵激變盡節軍中詔贈右都御史廕一子世襲指揮僉事柴薦禋河南通志江山人崇禎末以舉人知洧川縣流寇破城不屈大罵賊怒殺之葉應武衢州府志龍游人萬厯己未武進士授京營游擊厯官協守薊州副總兵崇禎二年以孤軍沒於陣贈都督同知徐應泰西安縣志西安人崇禎初東撫募士勤王應泰杖䇿往從署都司銜大加委任會萍島兵變據登萊郡命以偏師戍海口扼其歸路諸島師合兵攻之兵敗自鑿沈其舟死海中贈懐逺將軍廕一子祝錫範龍游縣志字克舉以明經授襄陽别駕時流賊蹂躪中原荆襄鄖陽尤甚鄖撫盧象昇晉督七省凡糗糧芻茭悉仰給焉會朝議遣使招撫象昇特舉錫範往賊初見時頗加禮後聞象昇改授宣大賊曰天下事可知矣我將入蜀君能從我富貴乎錫範遂自縊於錫莪山賊嘆息曰忠臣也懸標於屍上拔營去襄王送其柩歸葬焉李正光衢州府志字際熙龍游人崇禎時為北京虎賁左衞參軍甲申李自成入京師正光合門死節徐日舜衢州府志字五臣西安人由卒伍為雲南參將城破猶披甲乗馬登陴力戰被擒不屈矢貫舌端而死陳其禮衢州府志字以讓西安人崇禎已夘副榜授福建閩清縣有能聲城破為兵士所執不屈死子龍玉媳呉氏壻徐應宜皆被害男女死者十五人國朝徐光旭鄉賢留祀册常山人崇禎壬午舉人任昌化教諭再補黄巖甲寅閩變逼以偽職抗節不受逃匿永嘉山谷中不食而卒徐光皓鄉賢留祀册常山人任山東新城令減火耗清徭役解組歸值耿逆之變被擄逼受偽劄不屈罵賊而死江之崑衢州府志字玉鄰常山人康熙甲寅閩逆亂賊將呉安邦破常山欲降之之崑罵賊不屈與次子世晟俱被害妻張氏媳曹氏孫女如娟俱殉鄭大來衢州府志開化人府學生勇力絶倫習騎射喜擊劍康熙甲寅三月閩賊破開化知縣崔㠏起兵大來為之倡未幾賊引去六月賊復引萬餘人中夜襲城官軍遇於仙霞嶺是日黑霧四塞大來從官軍馳擊之連斃數十人賊少却大來亦戰死是役也戰歿者鄭卓麟鄭振祥鄭有忻鄭毛鄭大卿鄭童戴甲毛徐義禮徐白古徐六十徐旦等共十有七人嚴州府宋詹良臣宋史本傳字元公分水人以恩得官調縉雲縣尉方臘起其黨再犯處州守貳俱棄城遁又有他盜霍成富者用臘年號剽掠縉雲良臣曰捕盜尉職也縱不勝敢愛死乎率數十人出禦之為所執成富誘使降良臣曰汝輩不知求生顧欲降我耶昔年李順反於蜀王倫反於淮南王則反於貝州身首横分妻子皆誅旦暮官兵至汝肉飼狗鼠矣賊怒臠其肉使自啖之良臣吐且罵至死不絶聲贈通直郎録其子孫二人翁開兩浙名賢録夀昌人政和五年進士宣和二年攝青溪尉方臘寇起領所部與賊戰不勝被執罵賊而死葉鑛嚴陵志字勉明夀昌人宣和二年方臘竊發與龍溪洪基䕶鄉井有功授忠訓郎瑞州軍馬都監靖康二年金人犯闕與王時雍守東壁粘罕攻城急鑛守禦甚力沒於王事劉晏宋史本傳字平甫嚴州人宣和四年授通直郎金人犯京師以晏總遼東兵號赤心隊建炎初從劉正彦擊淮西賊丁進進黨頗衆晏提赤心騎才八百乃為五色旗使旗兵持之循山而出一色盡則以一色易之賊見官軍累日不絶顔色各異不戰而降遷朝散郎正彦反晏以衆歸韓世忠世忠追正彥及苗傅於浦城以晏騎六百為疑兵賊大駭正彥就擒金人犯建康杜充兵潰晏領赤心百五十騎屯青龍羣寇犯常州晏以精鋭七千人出竒破之進直龍圖閣保馬跡山以捍寇寇再至選舟師迎戰降其衆千五百人戚方圍宣城晏往援至城下未立營壘出不意直𢷬方帳下方卻走晏欲生擒方單騎追之方率其衆迎戰晏不能敵為賊所害贈龍圖閣待制官其子四人於死所立廟曰義烈徐梅龜舊浙江通志字臞叟夀昌人登進士第授霍邱縣尉端平三年元兵犯境梅龜率土人王鎔等劄寨安陽諸山保障生民鄰境亦賴以安嘉熙元年元兵又至梅龜身先士卒俘獲甚衆次年春元大舉入梅龜與戰不利顧謂其子尚古曰彼衆我寡我知之矣委質為臣有死無二汝其行乎尚古曰大人既能死忠尚古豈不能死孝乃轉戰益力皆遇害贈宣教郎官其子汲古進武校尉尚古贈承信郎官其子肅進義校尉梅龜嘗著春秋指掌圖行於世詹檉萬厯遂安縣志至弟也舉進士官迪功郎教授孟州死於靖康之難鄭采翁嚴陵志字季華夀昌人性剛果好讀書學兵法元人圍臨安遂倡義勤王收集鄉兵與宋潰卒設部伍習騎射義聲感激人皆效死俄而京師失守兩宫北遷元將唆都陷建徳府安撫方回降遂犯白沙渡采翁率所部拒之力戰數合兵敗被執仗義不屈死之呉洪徳呉雄飛嚴陵志字長翁淳安人淳祐九年進士累官至金部度支員外郎遇事激烈多與時忤宋亡死難弟雄飛字次翁景定三年進士累官至太常寺簿宋亡募兵赴難死元陳日卿分水縣志仕元為千夫長守禦本邑明驃騎鄧同王元取蘭谿婺源等路率兵至此日卿力抵死之房產俱燼魯淵嘉靖浙江通志字道源淳安人至正辛夘進士出丞華亭徽寇搆逆延及永平省檄淵與監郡脱脱引兵而西焚賊壘六十餘遂會大軍於新安江中與富山巡檢邵仲華共守豪嶺賊再犯衆驚懼有退志淵以忠義相激皆固守賊不敢犯已而為賊所執守節不屈必欲求死而拘監甚固明年寇平得脱起為浙江儒學提舉尋以疾告歸居岐山下洪武初屢徴弗就學者稱為岐山先生所著有春秋節傳策府樞要行於世列朝詩集小傳明初應召禮局辭還山王逢贈詩云相期文苑傳獨立義熙年明張瑛閩書字彥華建徳人以刑部郎為建寧知府署按察司事鄧茂七賊黨二千餘逼郡城結寨時出剽掠瑛及典史鄭烈帥民夫呉保等會都指揮徐信分三路暗襲之斬首五百餘拔其寨陞右參政仍攝府事復與其季父敬提兵與茂七黨林拾得陳保戰不利死之贈按察使録一子主簿𢎞治四年建守劉璵奏請立祠祀之張海海兩浙名賢録一名文淵建徳人洪武初編伍營州調開平永樂十七年從興安伯徐亨備邊俘於沙漠北主竒之欲妻以女懇辭與之官不受因入貢人至京附奏宻情十四事朝廷嘉之頒㫖開豁原籍仍免差徭次年得古璽欲南遁適追騎甚迫乃摹篆於裙幅間投璽於水至則真跡爛然馳獻召對便殿賜五品服錦衣衞千戸懇乞歸田海海在外十五年時比之蘇武俞鑑湯斌俞鑑傳字元器桐廬人正統壬戌進士授兵部職方主事車駕北征郎中胡寧當從行以病求代鑑慷慨許行或曰公家逺子幼奈何輕身耶鑑厲聲曰此豈臣子言身家時乎因撫二子摩其頂曰若等自成人我不能顧矣時尚書鄺埜知其賢軍事多與之謀鑑曰惟有力勸上班師耳至上木遇難而死徐資節舊浙江通志建徳人父戌貴州正統間邊事告急分閫者置資節幕下一日問軍行進退對曰是有伏不可遽犯督師忽其言弗用卒犯之不利而資節以死殉汪喬年余國禎汪喬年行畧字歳星遂安人天啓壬戌進士授主事厯陞河東兵備晉大參長臬臺值大祲積穀平糶全活以億訃特簡陜撫咨勅未至聞闖賊將窺關即日赴商雒與士卒露處設險堵擊寇知有備不進未旬日而獻賊又逼鄖西亟移駐山陽截遏之總督傅宗龍全軍覆沒廷推喬年代之檄調固原臨洮及團練總帥賀人龍三鎮兵圖進取令發逆闖祖塋得一蛇斬以殉壬午賊圍左師於郾老砦屯襄城喬年計搗其巢賊舍左師統數十萬衆逆戰賀師未陣先逸諸軍遂潰喬年曰此吾死所也帥標兵千餘保襄城城無守具賊砲矢如雨圍七晝夜城中火藥矢石皆盡援兵不至城陷喬年握佩刀巷戰被創自刎不死賊縛詣韓家莊大罵不屈割其耳目乃死民感其忠潛瘞莊後撫按具題遣官䕶櫬還里張連曜舊浙江通志字景明建徳人薦賢良方正授巴州同知崇禎十四年張獻忠圍巴城踰月連曜督兵民晝夜死守知城將陷自製一寢衣謂其下曰我死爾以此覔我屍耳城陷被執大罵不屈賊磔殺之賊退果以衣得屍事聞贈奉訓大夫邵子灼舊浙江通志字季可建徳人崇禎四年歳貢授永嘉訓導擢河南郟縣知縣張獻忠等環攻郟縣子灼督兵死守度勢不能支整衣冠懐印綬曰此人臣致命之日也賊至不屈蹈刄死士民立祠以祀張日新舊浙江通志字心白建徳人崇禎五年歳貢授宿松訓導陞齊東教諭日與諸生講藝習騎射時渠寇安守夏者倡亂日新招之降遂與同守東邑崇禎十三年齊東被圍日新守北門率其二子光尹光裔百計防禦城陷被執同子光裔死焉妻方氏聞訃奔死所有欲犯之者氏曰吾一門忠烈豈容鼠輩汚我耶持七首自刎時稱三烈濮有宏舊浙江通志分水人崇禎癸酉舉人授安陸知縣治為楚最流寇薄城竭力拒守闖獻二賊合兵圍城力屈而陷夫婦幼女舉家一十九人同時殉難王元封舊浙江通志建徳人崇禎甲戌武進士授湖廣大圍山守備流寇犯境元封單騎入賊寨擒殺數十人賊方造飯見元封後無援兵以湯糜潑之馬仆猶步殺數人而死國朝翁旦舊浙江通志字振周夀昌人通經史諳武畧順治乙未武進士累授廣西參將會猺獞蠢動旦挺身勦之慷慨先登深入重地被圍度不免引佩刀自剄温州府唐葉一源葉適忠烈武義侯祠記字九江其先栝之松陽人大父格心徙永嘉因家焉一源幼有志操能詩書習騎射時唐公李淵已克長安遂募兵千餘赴太原唐公悦之使與機宻事及即帝位授以福建道節度使貞觀二十二年太宗征髙麗檄令副總管薛萬徹同往所向先登單騎陷陣斬首二十餘級身巾流矢馳歸卒帝憫之為輟食詔所居之里建祠諡武義天后朝加封忠烈宋薛良顯宋史本傳字貴勤瑞安人崇寧二年進士累官為大宗正丞出為江東轉運使江寧軍校周徳作亂良顯聞變率衆與戰斬十餘級力不能勝死之丁仲修宋史鞠嗣復傳仲修字敏之溫州人方臘黨俞道安陷樂清將渡江仲修帥鄉兵禦諸樂灣鄉兵失據而散仲修以餘兵與戰力屈而死包汝諧周行已包汝諧傳溫州人業儒事親孝宣和庚子方臘起睦州連陷杭歙婺諸郡至遂昌郡守倅皆倉皇莫知計所出州學教授劉士英與館下生石礪謀禦賊糾集義士王三錫等二十八人汝諧與焉白諸父老曰某等雖無官守然所食皆君食也可值時變而甘不義乎乃身先士卒先後禦賊不下數十戰竟死於難事平立専祠賜忠孝扁張理萬厯温州府志瑞安人宣和間寇至郡縱火延壩接橋理統兵為先鋒出城迎敵賊衆披靡俄而橋陷溺死郡為立忠義廟祀之徳祐間封忠恵侯周承已婁淵潘守真温州府志承已字恭先行己弟淵字淵明守真字適道皆永嘉人清溪寇渡樂灣將攻城統制郭仲荀遣裨將張理帥師迎敵承已等慨然請於郡以行渡壩接橋賊鋒鋭甚麾兵據橋為陣橋斷皆溺死徳祐中理封節恵侯配享忠烈廟承已等三人皆從祀於旁徐震萬厯温州府志瑞安人宣和間睦寇至吹臺小嶺震率義兵捍衞賊衆勢盛力戰死之民為立祠祀焉洪武初詔加忠訓郎呉叔沅萬厯温州府志字雅宗瑞安人登嘉定第紹定三年知江山縣常山寇汪徐來二等犯邑叔沅部兵戰沒贈朝奉大夫官其二子立廟賜額忠義黄友宋史本傳字龍友平陽人登進士第調永嘉縣主簿攝華陰令方臘竊發友同諸將收復婺寇復作友往諭之次浦江賊望風解去復單騎次武義一境貼然婺人圖像祀之通判澶州會金人敗盟郭藥師以軍叛燕士響應友獨領數千人與戰躬冒矢石破裂脣齒欽宗即位召對問友脣齒狀為之稱嘆進直徽猷閣制置司參謀官同种師中解太原圍友遣兵三千奪榆次得糧萬餘斛明日大軍進榆次十里而止友急白師中地非利將三面受敵論不合友仰天嘆曰事去矣迨曉兵果四合矢石如雨敵益以鐵騎士卒奔潰敵執友勒降友厲聲曰男兒死耳遂遇害帝書忠節傳家四字旌其閭官其後八人陳夀孫閩書瑞安人登寶祐第授台州教授會新郡守初視篆守丞相丁大全黨也謁廟日夀孫揚言曰冉求聚斂孔聖鼓攻守黨丞相可升夫子之堂哉守聞解印去後直龍圖閣厯福建提刑入覲與賈似道爭鹽法被劾歸里元兵至率市人禦之被執不屈死侯畐宋史本傳樂清人以武舉授合浦尉寶祐五年通判海州兼河南府訃議官李崧夀據山東突出漣泗畐鏖戰城下死之闔室遇害太學生言於朝即海州賜廟旌忠諡節毅仍立廟其鄉所著有霜厓集潘方宋史鍾李玉傳方平陽人寶祐四年進士調監慶元府市舶慶元降附方不屈赴水死陳元帥萬厯温州府志逸其名宜中從子少負勇畧拜議郎理宗時屢立戰功擢大元帥徳祐中伯顔入臨安將士解體宜中張世傑奉端宗及廣王昺由越州航海而南元帥扈從舟次金井灣得暴疾謂左右曰吾世受宋恩生不能報死當為厲鬼殺賊遥向帝舟叩頭長慟而逝遂葬於姥嶺之麓後屢著靈異其地立廟祀焉陳虞之兩浙名賢録字雲翁永嘉人登咸淳己丑第授揚州教授厯官廣王府記室參軍積階承議郎元兵至溫虞之率子姪鄉人千餘登芙蓉巖誓以死守不降元兵攻巖累為所敗越二歳始下乃盡以家貲投巖隙中遂自刎死子姪妻孥及鄉人死者八百餘人林逢龍林廷龍宋史本傳逢龍字慶雲平陽人弟廷龍字雷發俱為太學生當理宗末元兵入侵逢龍上書陳戰守計不報咸淳中同廷龍叩闕言事忤賈似道歸鄉里後逢龍又上封事乞正似道誤國之罪宜急調兵解襄樊圍似道怒削其籍押還本貫乃屏跡居山徳祐丙子元兵至温州素聞逢龍名令軍校至山中索之遂被執驅迫登舟入城元兵欲用之逢龍攘臂怒罵曰我宋書生也豈為汝用哉以腹觸其刄而死廷龍亦被執不屈同日遇害鮑叔廉黄綰義烈記世家樂清宋末元兵下台州叔廉率宗族倡義兵結寨七十二據險揭旗溫台之界曰台州雖降温州不願為之氓元將怒用茅畬牟氏導殺叔廉死之族無噍𩔖遺子約已方五歳有家奴嚴敬翁李宗善抱匿陰溝至夜躋舍後山藏叢棘中拾山果食之兵去方下長有室生五子鮑氏遂蕃王小觀兩浙名賢録瑞安人善槊每以忠義自許元兵至溫竟抵瑞安陶山小觀乃悉傾家財召募勇敢者千餘人出陶山迎敵彼衆我寡退入小溪元兵追之力莫能當遂被執不降臨刑罵不絶口而死劉黻兩浙名賢録字聲伯樂清人試入太學時丁大全為臺厲劾奏丞相董槐迫逐去國將奪其位黻率同舍生伏闕上書言朝廷進退大臣須當以禮書上忤執政意送南安軍安置及大全貶黻還太學厯官吏部尚書兼中書舍人以憂去江上師潰起黻為端明殿學士不赴及賈似道死陳宜中謀擁二王由溫州入海以兵逆黻共政揮涕就道及羅浮憂憤卒其妻林氏舉家蹈海死葉儞祖兩浙名賢録字徳平樂清人尚氣節辟史館編校晚年退居教授聞元兵渡江謂子弟曰吾生為宋臣死為宋鬼即具衣冠望闕辭躍入所居楊樓水中元孔昞萬厯温州府志平陽人孔子五十六代孫至元三年任廣州增城縣烏石寨巡檢朱光卿反昞捕之被殺贈從仕郎兖州判官䘏其家桂完澤元史本傳永嘉人為平江路管軍鎮撫會賊攻昱嶺關行省令從征完澤勇於討賊凡再戰關下皆勝尋又與賊鬭為所執其妻弟金徳亦被擒皆反縛於樹臨以白刄脅之降完澤呼曰金舅男子可死不可從賊徳曰此言是因大罵賊怒剖二人之腹謹按元史及嘉靖通志俱以完澤作桂姓而萬厯府志及舊浙江通志作季姓恐非是彭庭堅元史本傳瑞安人至正四年進士授承事郎同知沂州以平反獄囚忤上官意遂棄去十年以建寧路崇安縣尹起陞同知建寧路總管府事江西寇熾庭堅率兵復建陽平浦城十二年攝僉都元帥府事攻邵武寇追斬渠兇邵武悉平陞同知福建道宣慰使司副都元帥鎮邵武寇陷建寧庭堅統兵復建寧縣浙江行省檄庭堅節制建寧邵武二郡諸軍十四年盜侵政和松溪江南行臺中丞呉鐸督軍建寧檄庭堅至時鎮撫萬戸岳煥𨽻麾下素悍縱卒為暴庭堅欲繩以法煥懼使部卒乗其不備詐為賊兵突入交鋒衆皆潰庭堅獨留不去遂遇害民哀泣如喪父母立祠像御史余觀上其事贈中奉大夫福建道宣慰使都元帥封忠愍侯張庸元史保賽音布哈傳庸字存中溫州人精太乙數會世亂以䇿干經畧使李國鳳承制授庸福建行省員外郎治兵杉關頃之計事赴京師因進太乙數圖順帝喜之擢秘書少監命庸團結房山除刑部尚書仍領團結會諸寨既降庸守駱駝谷遣從事段禎請援於擴廓帖木兒不報庸獨堅守拒戰衆將潰庸無去志已而寨民李世傑執庸出降以見主將庸不屈被殺周誠徳萬厯温州府志平陽人方明善據温州城屢侵平陽誠徳時為樞宻判官敗之香山又敗之徐洋累官浙東道副都元帥明善深畏之乃賂遺麾下使伺於内遂被執大罵不屈明善趣左右刳其皮誠徳曰雖虀粉我猶愈從爾茍活況刳皮乎尋遇害既死猶屹立兄嗣徳由浙東帥府同知屢以平寇功陞中奉大夫浙江行省參知政事亦為明善所執囚於鄞張文貞嘉靖浙江通志字元之瑞安人至正間禦方國珍獲功為三尖巡檢陞瑞安州判栝寇呉成士寇陶山文貞率鄉兵守天門關賊從間道至關陷文貞與弟徳及姪力戰皆死里人立祠祀之明卓敬劉球忠貞傳字惟恭瑞安人性至孝讀書寶香山時年十五晨昏之禮雖逺不廢會夜歸值大風雨昏㝠不知所之得一兕牛憑之而歸發門乃一黑虎也時以為孝感所致登洪武戊辰進士除給事中時國初制度初立典章未備諸王服飾僭踰敬乗間白上益見器重陞戸部侍郎建文登極時太宗已封燕敬宻奏乗其不意請徙封之疏入召見曰卿何得出此言燕王骨肉至親卿雖慮事深長其謀當不及此敬叩首曰陛下以燕王為至親楊廣之於隋文不尤親乎帝黙然事竟寢太宗南下敬被執首責以不迎乗輿之罪敬厲聲曰先帝若依敬言殿下豈得至此帝怒欲殺之而憐其才命中臣諷之降敬曰吾恨不得請上方斬馬劍死得見先帝於地下耳帝憐其誠猶欲生之姚廣孝不可帝意遂決命斬之夷三族臨刑從容嘆曰國家養兵三十年一旦變生畧無措置敬死有餘罪但恨不為兵官得少行其志耳神色凛然經日如生敬博學多能雖天文律厯地理兵刑靡不各造其奥尤邃性理有遺書十卷發明周子通書邵子經世之學詩文五十卷沒入之日惟書畫數軸爾鄭士達萬厯温州府志字達世瑞安人洪武二十六年以貢任肥鄉訓導靖難師南下徇廣平有議迎附者達毅然曰我儒官也若隨風效順謂綱常何激守臣相與堅壁以守不克棄官歸永樂三年詔逮諸逆命者達竟坐戍右屯衞聞命慷慨而行歿於戍所黄養正萬厯溫州府志名䝉以字行瑞安人國子學正潮光子永樂中授中書舍人累官太常少卿性端謹博學工詩文宣宗甚愛之南還時執手賦詩以别正統己巳之變先事陳言弗從及扈駕土木也先衝逼行營驚怖養正獨毅然衞䕶無所畏避至駕北狩死之天順初追贈太常卿録其子一人世襲錦衣百戸鮑輝湯斌鮑輝傳字淑大平陽人宣徳癸丑進士授工科給事中改刑科上言有司抑配鹽商斂怨於上州縣官考滿夤縁保留宜禁止之畿輔山陜飢請命大臣亟賑之寛其徭役正統間海内久安武事漸弛上言奸宄之伏恆於承平時天下都司衞所官溺於晏安器具不修軍士靡恤冒支糧餉規避徵發比者延平寇起朝命兩都司調軍征進遷延旬月及臨陣輒復畏縮乞敕兵部議下巡按及清軍御史會同都司官大加簡閲推擇公忠智勇者為之將領庶武備可飭朝廷是其言下所司行之車駕北征輝督右掖軍紀戰功師潰土木死焉江徳歸舊浙江通志字君夀泰順人正統時山寇剽掠首倡義兵率鄉民禦之遇害子佛保年十八矢志復讐尚書孫原貞領大軍至收置幕府命統所部殲之寇平授贊畫王沛温州府志字子大澈季弟少業儒棄去精醫術授益府良醫倜儻尚氣節嘉靖壬子倭亂沛謀諸鄉族集兵為守寇被創逸去戊午復至勢張甚沛率鄉兵禦之遇害贈太僕寺丞立祠祀之賜額愍忠録其子叔本國學生王徳兩浙名賢録字汝修永嘉人弱冠成進士授東昌府推官擢給事中即勸上簡内閣輔臣失執政意上方畧十餘事稱㫖出募兵山東為諸道最會新太宰上事徳投刺少殺其禮太宰以為强項而惡之遂承執政㫖出徳為廣東按察司僉事數選練驍鋭以軍法約束之身入諸徭寨所殺捕過當後歸適倭亂從其宗人豪散資財募兵為廬井捍嘗一再敗之最後失其豪奮厲益前而郡援不至遂敗猶手殺數人罵賊以死贈太僕少卿賜祠祭額曰愍忠官其子錦衣百戸趙連侯一元烈士傳樂清人嘉靖壬子倭寇海上連聞難持梃出擊連仆數賊遂突入其陣意氣彌厲一賊出於厠鏦連以矛傷腋悶絶輿歸猶呼其左右曰賊可擊也盍掖我以起行數百步距踴髙岸困頓乃還且死家人環而哭之連張目曰勿哭人百年會有一死吾有以死矣語畢乃絶林田温州府志字舜耕泰順庠生嘉靖己未倭入寇至雅洋將抵縣田率鄉兵禦於排嶺賊掩至整兵力戰而死贈州同知建祠立祀李大韶温州府志字舜廷樂清人設教平陽從學者衆因家焉天啓己丑歳貢考授通判憤魏璫之横與蔡廣叩閽上書璫怒逮蔡論斬大韶繋獄而卒子應寮奔訃扶櫬歸至濟河舟覆以索自縛與柩相聯飄流數十里得援若有掖之者既而大韶妻楊氏病應寮刲股以進弟應官爇臂籲天刺指血和藥尋愈應官妻呉氏死於節一門以忠孝節烈稱章一㷆温州府志字陟瞻樂清人天啓選貢授湖廣耒陽知縣性公直不容於時解綬歸居鄉恂謹稱長者會寇亂焚其廬且脅之去一㷆以死自誓奔赤城題詩太平門外沈河而死林宗椿舊浙江通志字君靈泰順庠生崇禎十二年山寇竊發刼縣之仙居屯三日不去宗椿率鄉兵直前連斬數級賊氣奪將遁宗椿欲盡殲之引賊至澗逼橋而陣橋壊失足橋下賊蜂刺之怒罵不絶口遂死賊亦引去邑人立祠致祭鄒欽堯温州府志字維則瑞安庠生徙居永康甲申闖變作書别其父自沈永寧江而死葉上髙温州府志字而栗永嘉人郡庠生負氣節聞闖賊陷京師失志佯狂以言語抵觸有司繫獄會端陽賦詩有未吞蒲酒心先醉弗浴蘭湯骨已香之句遂仰藥而卒王瑞栴舊浙江通志字廷馝永嘉人天啓進士兩任河間蘇州推官皆以剛直著聲晉樞曹郎以邊才簡授鄖襄兵備張獻忠受創於左良玉奔穀城乞撫當事皆為所愚瑞栴獨條賊宜勦與可勦狀及勢不可阻乃條解散歸農隨征三欵乗城治兵防禦益力賊畏忌不敢動會丁内艱歸悉如所料明末避亂山中已而沐浴辭廟賦絶命詞投繯而卒國朝曾三鳳温州府志泰順人順治丙戌山寇焚刼鄉都各村立甲會勦三鳳率鄉兵禦之賊勢張甚奮身殺敵死之弟三重繼死弟三益又繼之一門忠義鄉人立祠祀焉侯贈祖旌忠册樂清人康熙十五年閩亂偽帥某謀襲寧波贈祖偵知之以告知縣盛應宗令宻祥報郡為賊邏者所獲賊恚甚殺於市處州府宋祝汝秩括蒼彚紀字君禮麗水人宣和中方臘起睦州寇諸郡汝秩詣闕上書乞為討賊先鋒補承信郎即領兵解郭太尉圍破仇道人洞至台州復捕臘餘黨為賊所害趙育才括蒼彚紀遂昌人政和中為武學生膂力絶倫方臘叛育才與鄧熹父子集趫壯相犄角邑人恃以不亂時松陽羣盜侵掠及邑乃率所部格於孟山前賊勢張甚手射殺數輩死於礧下祝公明宋史王士言傳公明麗水人為太原府盂縣主簿靖康間金人犯河東令棄官去公明攝縣事率保甲入援圍守踰年城陷不屈死子唐為陶州司戸中原失守唐亦死官所建炎中贈公明承事郎姜綬宋史本傳麗水人金人再犯京師朝廷募勇士齎蠟書往南京總管司調兵赴援綬以忠翊郎應募乃刲股藏書縋下南壁為邏騎所獲厲聲叱罵遂被害建炎中官其子特立承信郎劉倚友兩浙名賢録字夢澤青田人政和進士宰開封有聲靖康初金人犯闕受檄為東壁彈劾官登城按視為金人所獲脅使降罵不絶口死之呉樞兩浙名賢録慶元人政和進士靖康初詔募人使金者樞毅然請行既至惟長揖不拜金人欲烹之鼎油方沸樞攝衣從之顔色無少變金主壯其節遣還何紱括蒼彚紀字叔章麗水人靖康初金人犯汴詔募義勇紱率土豪百人應募補進義副尉至潁上縣三合戰馬奔為柘木所支遂陷陣祝永之括蒼彚紀字樗年麗水人以世賞授和州尉靖康初金人入和州守令俱遁永之獨部鄉民城守盡室被害州人乃推永之為守後知滁州詹友括蒼彚紀縉雲人以父適廕知雍州靖康中金人犯汴友從北狩金授以官不就死之呉安國宋史崔縱傳安國字鎮卿處州人太學進士累遷考功郎官以太常少卿使金值金人渝盟拘留脅服之安國毅然正色曰我首可得我節不可奪惟知竭誠死王事王命焉敢辱金人不敢犯遣還後知袁州卒周格萬厯杭州府志處州人直秘閣浙西提刑建炎元年討叛卒陳通與子肇丕俱遇害髙宗嘉其節贈官敕葬龔楫宋史本傳字濟道遂昌人兵部侍郎原之孫建炎初聞金人陷郡縣輒憤恚不食兀术據和州以偏師萬人築堡新塘遏絶濡須之路楫率家僮襲之鄉里從者三千餘人獲千戸二繫累者數百人輜重稱是金兵大至乃取道圩上金騎兵據其衝不得前衆多赴水死楫麾其衆曰今日鬭死亦足稱義士自棄溝瀆無益也戰敗為金人所獲猶挺劒刺其一人罵不絶口金人臠割之章雲就嘉靖浙江通志麗水人建炎四年潰兵宫儀破婺州將逼郡境州將梁頤吉募能説賊者雲就應命往遇賊於荆坑喻以禍福賊許諾與俱至城下會官軍掩襲賊以為賣已殺之張漳括蒼彚紀龍泉人紹興初以秉義郎充金國通問副使金人脅以拜跪正使唯唯漳獨不屈遂遇害上嘉其忠節官其子越為保義郎朱光兩浙名賢録字不塵麗水人紹定三年進士尉襄陽攝均州録事端平丙申均倅王用吉以城叛光諭之不從責之又不從遂死於難贈通直郎官一子鮑廉括蒼彚紀侍郎鮑度兄知臨江軍守城而死梅寛夫括蒼彚紀字伯大縉雲人調慈谿尉徳祐初攝知縣事率義勇應文天祥至常州戰死嘗師滕璘得考亭之學所著裕堂講義刻於鄉校栁味道兩浙名賢録雲和人好讀書每以節義自持時有寇栁機察作逆逼味道為主堅誓不從寇怒縊於松以脅之味道從容口占一詩曰國破家亦破年窮命亦窮浮雲諸逆賊送我上青松竟縊死松下林融兩浙名賢録青田人仕宋為提刑痛宋社淪亡潛歸九都牙陽起兵興復兵敗被擒送燕世祖義而釋之融歸復起兵元遣參政髙興來禦力屈死之元徐伯龍崇禎處州府志青田人至正甲午賊起總管官王某將兵抵南田怯不敢進伯龍詣軍門請以身先官軍殺賊總管官授以松陽縣尉牒明日大戰自旦達暮數十合兵勢少却伯龍直前斬數十首為賊衆所殺其妻夏氏以貞節聞洪度崇禎處州府志字克明青田人至正間由儒士授温州竹木塲提舉時方國珍寇温州度欲往行省請計未行匿於蘿峯下國珍獲之罵不絶口引刀自刎張進九兩浙名賢録青田人世業農敦樸有至行至正乙未八都盜起進九被縛使前誘衆降進九怒呼曰諸人速來殺此八都賊賊加刄於頸令如已言卒不屈竟被殺王毅宋濂王毅傳字剛叔自號木訥其先自琅瑯徙居處之龍泉毅六歳知書以躬行實踐為教發明本心之學至正中荆襄兵起直犯縣南鄙毅畫八䇿贊將軍石抹宜孫破之未幾盜發青田揚言來攻縣長吏寶忽丁遁盜遂深入焚官舍剽掠至雞犬毅召門人章溢部勒鄉民為兵逐殺之俄部使者下令正丁罪丁恚集惡少據險阻以方命首害毅於家栝蒼彚紀毅讀朱子書慨然以師道自仕一時遊其門者章溢胡深徐操李汶等為國元勲有木訥集行世明葉琛嘉靖浙江通志字景淵麗水人博學多才與劉基章溢齊名明太祖遣使以幣聘之與基溢宋濓四人同至金陵上顧左司郎中陶安問曰四人何如安對曰臣謀畧不及劉基學問不及宋濓治民之才不及章溢葉琛擢琛為營田僉事壬寅正月上帥師至龍興守臣祝宗康泰以城降改龍興為洪都府以琛知府事既而宗泰據洪都叛琛迎戰死之追封南陽郡侯命有司立廟城中歳時祭之胡深王褘胡深行述字仲淵龍泉人少好學於書無所不讀上遣胡大海取處州軍入城深挺身見大海而四縣得不受兵上素聞其名召至南京擢中書省左司員外郎命總制處州已而浙西將李伯貞大舉入寇城堅不可攻乃引去温州方明善取平陽深出偏師勝之并復瑞安所侵地而親統大軍攻溫州明善勢蹙與其叔國珍議歳貢有㫖俾班師乃入覲除王府參軍仍總制處州乙巳福建陳友定寇邊深往征之破其二栅友定怒盡率精鋭來圍深突陣與戰馬蹶被執友定甚相禮待深因具道主上神聖援竇融故事以感動之會元使至督迫遂遇害上遣官即其家祭之追封縉雲郡伯子楨為宣武將軍僉處衞指揮司事厲子温兩浙名賢録責田人明初以明經擢監察御史糾劾不避權要洪武癸丑命踏湖州水荒以實復命上曰前使者曰無爾獨曰有何也對曰天知地知臣知君獨不知上忿其言不遜斬之後果如其言因罪前使者而御書於午門曰豪傑御史厲子温章存道名山藏龍泉人溢之子溢退處匡山屬存道保障州里胡大海克處州太祖久聞溢名與劉基宋濓並使聘之存道亦以數擊却陳友定有戰功授處州翼元帥副使以功授處州指揮副使從征秦隴取興元留守之擊敗蜀將呉友仁再守平陽轉左衞指揮同知從湯和北征哈噋不刺營戰失利死季珍括蒼彚紀青田人性驍勇元末寇掠郡邑珍率衆禦敵於邑西自旦至暮斬獲無算援兵不及遂遇害詔贈臘源寨巡檢劉璟吾學編字仲璟基子喜談兵究韜畧甌賊葉丁香叛延安侯唐勝宗討之決䇿於璟破賊還薦璟才畧上喜曰璟真伯温子矣金書除奸敵佞四字於鐵簡賜之命曰百官不法持此糾正會谷王封宣徳府授谷府長史并敕提調肅遼慶寧燕趙六王府事璟常至燕文皇與奕璟勝文皇曰卿獨不少讓我耶璟正色曰可讓處璟不敢不讓不可讓處璟不敢讓靖難兵起璟馳還京獻十六䇿不聽令參李景隆軍事景隆又不聽景隆戰敗璟夜半渡蘆溝河氷陷馬斃璟跳岸冒雪走良鄉裂趾跛行三十里璟子貊自大同赴難越良鄉至涿州遇璟翼璟上馬奔還家養疾建文二年璟輿疾赴闕進聞見録千萬言又不聽令璟還家待用明年六月建文遜位璟稱疾不起法官論璟逃叛逮至京見上猶稱殿下下詔獄自經死法官希㫖縁坐其家上不許得歸葬嘉靖乙酉提學副使萬潮肖像配享文成祠葉希賢嘉靖浙江通志一名雲松陽人洪武中舉賢良任御史壬午之變家人驚潰相失疑其已死乃發喪以衣冠歸葬希賢實從亡在外𨼆姓名削髪為僧好事者為建刹於蜀之重慶松栢灘以居之朝夕誦經呪其徒諦聽之則易之乾卦也或時放舟中流朗誦楚詞投之水而哭焉號雪庵和尚時有補鍋匠者不知何許人亦毁形韜迹往來隆安里間竟佯狂以死盖葉之僚友同出亡者劉原熊括蒼彚紀松陽人父維賢捐資倡築獨山百仞堰建永安橋置澄川渡立祭田正統間陶得義等倡亂男女多避難於横山寨寨近澄川守寨者素聞原熊剛毅各捐簪珥求為禦䕶原熊却之曰賊因財而致亂子復因亂而受財相去幾何即椎牛注酒搆集鄉人會盟於社原熊執殳前戰賊懼退居城北次日忽乗機刼寨原熊又力戰於野斬賊魁四級陣亡鄉人哀之祀於社項民彝括蒼彚紀字善恢松陽人狀貌修偉以明經授監察御史上以皇太孫英明欲特授厯服民彝抗疏諫上怒罷朝時天大雪民彝俯伏不敢起上入宫復取其疏讀之感悟命宦官搜於雪消陷處得之四肢已僵敕光禄寺調䕶尋以疾終上一日問侍臣曰何久不見長御史對曰已死矣嘆息久之時誌括蒼彚紀遂昌人正統間礦賊攻縣治誌兄哲散金募兵率誌邀擊於麻車嶺誌死之哲力戰却賊郡司上其功授馬步司巡檢葉徳良崇禎處州府志字克復遂昌人由吏員任莆田縣丞嘉靖中倭寇福建時知縣簿尉棄城走獨徳良堅守旬日力竭城陷死之贈太僕寺丞廕一子入監呉南明慶元縣志字君治崇禎間任湖廣黄岡丞時流賊數十萬所過郡縣盡破適縣缺令人勸之去南明曰吾職雖卑忠義則一遂率兵民固守月餘糧盡城陷被執不屈賊怒割其鼻并兩耳愈不屈截其左手血悶死賊退半日復甦歸家二年卒詹嘉言松陽縣志字心聲少以忠義自許訓導象山流寇洊警與令分陴共守屢出竒訃佐令平寇手著墨守書及海外篇轉蒼溪教諭流賊破隣封忽雨集城圮難守嘉言遣子瑗懐印出間道賊至誘逼之不為動正辭詈賊死贈國子助教建祠於學之舊基程必進松陽縣志號景雲以拔貢除贛州訓導城失守遂冠帶南向拜赴水死子矩泣曰父死忠子烏可不死孝次日亦死國朝呉詔功呉夀男舊浙江通志慶元入康熙十四年耿逆陷慶元從呉陳仁起義兵死㫖優難奉詔功子顯宗夀男子嬰捷俱千總䘏廕周茂覺山西名宦册浙江人順治初任垣曲縣典史姜逆之亂死於城守王之佐山西名宦册浙江人順治二年任臨縣典史城陷知縣張耀祖死之之佐領民兵急趨上趙寨誓擒渠魁以圖恢復力不支為賊所獲罵賊死徐士鶚山西名宦册浙江人順治六年任大寧縣典史姜逆之亂城破死之妻子亦偕死戴真學福建名宦册浙江人順治三年隨征入閩授漳平令邑在萬山中寇四起且撫且禦寇不能犯五年賊王鎬等擁衆萬餘逼城下六月城潰方夜半真學出巡見勢不支急歸手刄其妻出戰為賊所殺錢嘉倫福建名宦册浙江人舉人順治三年知順昌縣土寇蠭起悉力禦之城陷投繯死鮑之竒廣東名宦册浙江人順治七年以明經知恩平縣縣先為賊據遂即任於凹頭村之竒屢謀入城五團民遮道泣留不聽一日單騎詣之宣布恩徳賑恤窮黎民皆感悦賊憚其得民令黨何國佐殺之死之日血漂於地鼠食之皆自斃國佐忽發狂死謹按周茂覺以下六人皆各省移咨新志所載册内止開浙江人未詳何府縣屬而皆為國捐軀者自不容泯没故統載於十一屬之後浙江通志卷一百六十六
