body:
  text: 浙江通志卷二百六十五藝文七書答車茂安書晉陸雲縣去郡治不出三日直東而岀水陸並通西有大湖廣縱千頃北有名山南有林澤東臨巨海往往無涯汎船長驅一舉千里北接青徐東洞交廣海物惟錯不可稱名遏長川以為陂燔茂草以為田火耕水種不煩人力決泄任意髙下在心舉鍤成雲下種成雨既浸既潤隨時代序官無逋滯之征民無饑乏之慮衣食常充倉庫恒實榮辱既明禮節甚備為君甚簡為民亦易季冬之月農收既畢嚴霜隕而蒹葭委林鳥祭而蔚羅設因民所欲獵藪焚林結罝繞堽密網彌山放鷹走犬弓弩發張鳥不得飛獸不得逸真光赫之觀盤戲之至樂也若乃斷遏回浦隔截曲隈隨潮進退採蜯捕魚鱣鮪赤尾䱟齒比目不可紀名膾鯔鰒炙䱥鯸烹石首臛􅛈真東海之俊味肴膳之至妙也及其蜯蛤之屬目所希見耳所未聞品𩔖數百難可盡言也昔秦始皇四方竒麗無所不有猶以不如吳會之鄉東觀滄海遂御六軍南巡狩登稽嶽刻文石留鄮縣三十餘日且彼吏民恭謹篤慎敬愛官長鞭扑不施聲教風靡與支遁書晉謝安思君日積計辰傾遲知欲還剡自治甚以悵然人生如寄耳頃風流得意之事殆為都盡終日慼慼觸事惆悵惟遲君來以晤言消之一日當千載耳此多山縣閒静差可養疾事不異剡而醫藥不同必思此緣副其積想也上執政書宋蘇軾軾近上章論浙西淫雨飈風之災無策救禦蒙恩㫖使與監司諸人議所以為來嵗之備者謹已條上二事軾才術淺短禦災無策但知呌號朝廷乞寛減額米截賜上供言狂計拙死罪死罪然三吳風俗自古浮薄而錢塘為甚雖室宇華好被服粲然而家無宿舂之儲者蓋十室而九自經熙寧饑疫之災與新法聚斂之害平時富民殘破略盡家家有市井之欠人人有鹽酒之債田宅在官房廊傾倒商賈不行市井蕭然譬如衰羸久病之人平時僅自支持更遭風寒暑濕之變便自委頓仁人君子當意外持䕶未可以壯夫常理期也今年錢塘賣常平米十八萬石得米者皆叩頭誦佛云官家將十八萬石米於烏鳶狐狸口中奪出數十萬人此恩不可忘也夫以區區戰國公子尚能焚劵市義今以十八萬石米易錢九萬九千緡而能活數十萬人此豈下策也哉竊惟仁聖在上輔以賢哲一聞此言理無不可但恐世俗諂薄成風揣所樂聞與所忌諱不以仁人君子期左右爭言無災或言有災而不甚積衆口之驗以惑聰明此軾之所私憂過慮也八月之末秀州數千人訴風災吏以為法有訴水旱而無訴風災拒閉不納老幼相騰踐死者十一人方按其事由此言之吏不喜言災者蓋十人而九不可不察也軾既條上二事且以闗白漕憲兩司官吏皆來見軾曰此顧當今之至計也然恐朝廷疑公為漕司地奈何軾曰吾為數十萬人性命言也豈恤此小小悔吝哉去年秋冬諸郡閉糴商賈不行軾既劾奏通之又舉行災傷法約束本路不得收五穀力勝錢三郡米大至施及浙東而漕司官吏緣此慍怒幾不見容文符往來僚吏恐悚以軾之私意其不為漕司地也審矣力勝之免去年已有成法然今嵗未敢舉行者實恐再忤漕司恐咎愈深此則軾之疲懦畏人不免小有回屈之罪也伏望相公一言檢舉成法自朝廷行下使五穀通流公私皆濟上以明君相之恩下以安孤危之迹不勝幸甚去嵗朝㫖免力勝錢止於四月浙中無麥須七月初間見新穀故自五月以來米價復增軾亦曾奏乞展限至六月終不報今者若䝉施行則乞以六月為限去嵗恩㫖寛減上供額米三分之一而戸部必欲得見錢浙中遂有錢荒之憂軾奏乞以錢和買銀絹上供三請而後可今者若䝉施行即乞一時行下軾竊度事勢若不且用愚計來嵗恐有流殍盜賊之憂或以其狂淺過計事難施用即乞别除一小郡仍選才術有餘可以坐消災沴者使任一路之責幸甚幸甚干冐台重伏紙慄戰不宣上傳崧卿太守書宋陳槖古人設陂湖以備旱嵗王仲嶷建請以為田乃引鑑湖自然淤澱已成田陸為説又有不妨民間水利之語其欺罔甚矣但佃戸占請之初各有畝數不敢侵冐當時湖之為田者才十二三佃戸止於髙卬處作􅖀未敢涸湖以自優民田尚被其利但蓄水不如曩日之多故諸鄉之田嵗嵗有旱處比年以來冐占不已今則湖盡為田矣以夏蓋湖推之諸處可以𩔖見某所知者止上虞餘姚其他四邑皆不及知新昌嵊縣無上虞餘姚所管陂湖三十餘所而夏蓋湖最大週圍一百五里自來蔭注上虞縣新興等五鄉及餘姚縣蘭風鄉此六鄉皆瀕海土平而水易洩田以畝計無慮數十萬惟藉一湖灌溉之利今既涸之為田若雨不時降則拱手以視禾稼之焦枯耳其他諸湖所灌注皆不下數百頃在餘姚若汝仇牟山燭溪上林餘支千金漁浦黄山樂安等湖所溉田動以數百頃植利人戸倚以為命而乃盡奪之一遇旱暵非惟赤子饑饉僵踣道路而計司常賦虧失尤多雖盡得湖田租課十不補其三四又况毎遇旱嵗湖田亦隨例申訴官中檢放與民田等昨見上虞丞言曾䝉上司差委相度湖田利害因㸃對靖康元年建炎元年湖田租課除檢放外兩年共納五千四百餘石而民田緣失陂湖之利無處不旱兩年計檢放秋米二萬二千五百餘石只上虞一縣如此以此論之其得失豈不較然民間所損又可見矣但當時以湖田租課歸御前與省計自分兩家雖得湖田百斛而常賦虧萬斛嬖倖之臣猶將曰此百斛者御前所得也不創湖田何以有此省計虧羡我何知哉今湖田租課既充經費則漕臺郡守固當計其得失之多寡而辨其利害夫公上之與民一體也有損於公有益於民猶當為之况公私俱受其害可不思所以革之耶某得之父老云本州之湖其自然可以為田者惟有鑑湖髙卬去處葢不失水利兼與民田亦無相妨其他皆隨湖廣狹以定植利之頃畝尋常湖水平隄旱嵗常憂不足頃見李宣州言此利害甚詳而明必曾與執事熟論况執事越人也想前已洞達於胸中君子懷濟民利物之志毎恨不得行耳然則解斯人之倒懸顧不在今日乎某愚意欲望執事斷以不疑除鑑湖外諸縣湖田悉罷之以便民誠不貲之利也然儻俟奏報則湖田皆在四月上旬插種之後若行罷廢似非人情不廢則失今夏蓄水之利故某必冀左右以權宜即日施行一面具利害聞奏仍上章待罪如四聰嘉納則粒米狼戾之慶可坐而致或俞音尚秘則湖以蓄水今嵗不得為田足以寛嗷嗷之衆秋間果得一稔則疲民可蘇此事惟在斷而行之失此機會嵗事或虧湖田之租常賦之額兩無所得元元艱食流離道路强者為盜弱者為丐嘯聚弄兵豈不由此執事當自見之知某不為過論也建炎二年春邑民常訢湖田之害於撫諭使者使者下其狀於州縣上虞令陳休錫遂悉罷境内之湖田翟帥以未得朝廷指揮數窘之陳不為變是嵗越境大旱如諸暨新嵊赤地數百里農夫無事於銍乂獨上虞大熟餘姚次之其冬新嵊之民糴於上虞餘姚者屬路不絶向使陳令行之不果則邑民救死不暇况他境乎夫以一縣令尚能為之某之所望於左右宜何如又曰此事如䝉采擇須在三月盡文字到縣設或遲緩不可過四月初二三也蓋此時湖田插種者尚少兼植利人戸須於梅雨前修築隄塘雨作之後難以興工也某三月廿一日舟行湖中詢田父云已種二十之一至月末可種十之一若罷湖田所插之秧當為棄物興大利不可恤小害也左右果欲施行不可先使衆人知之恐刻木得以為市湖田有請數畝為名而侵占蔓延至百十畝此湖之所以盡為田也前此累有論訴官中差人打量只是刻木及牙人乞覔租課只仍原額未嘗增也擅湖利者皆鄉中豪强之人中間上司體量利害此輩行賄至千餘緡今嵗或罷田當有訴諜紛然並至必以已種為詞亦有乞俟收成罷廢者此乃緩官申行遣至期官吏移易又復請矣惟在台威少加懲戒毋為浮言所惑幸甚上虞陂湖之為田者共一十四所其西溪湖等十三所共納租米三千餘石而夏蓋湖獨管納二千餘石可以見此湖之廣濶係上虞餘姚兩縣六鄉二萬餘戸植利所係非輕蓋六鄉皆邊海彌望盡是平陸非如衢婺諸郡間有池塘可以蔭注自興湖田無嵗不旱大旱之嵗至檢放秋米一萬餘石建炎二年陳令罷湖田獨此一鄉無一戸訴旱其利害甚明恐台意以為方朝廷多故又總鄉邦帥權慮事涉太專未欲盡罷不識可先罷夏蓋湖田否蓋其他諸湖比之為狹雖州郡行遣不當分彼此然一時權宜救民之所甚急於理無碍此亦侯雍齒之意民間曉然知惠之將及我也此已涉第二義恐思其上者而不得故漫及之某所言儻不鄙斥更當密詢利害條陳以備回鑾時論列即恐事已迫期不暇草奏乞只以某今所言錄白繳進茍利於民某雖死不恨荅湖州守薛士龍寺正書二宋張栻論及學校之事此為政之所當先也湖學安定先生經始當時作成人才亦可謂盛矣聞欲招陳君舉來學中此固善但欲因程文而誘之讀書則義未正今日一種士子將先覺言語耳剽口誦用為進取之資轉趨於薄此極害事若日於程文之外明義理之分敎導涵養使漸知趨向則善也某前年過霅上時常往拜安定先生墓荆棘幾不通路又牆垣頽圯為人所侵勢有可慮某意謂宜專責教官掌管令一家守之正其封域勿使侵犯是時無可告語今想自賢使君下車之後已留意矣漫及之上趙丞相書宋王炎炎陸沉州縣逾二十年髪既種種不復萌進取之念考古驗今私計過慮常懷嫠不恤緯之憂然此身孤逺若不顧狂瞽輙議朝廷事則躐等踰分犯聖賢不韙之戒是以欲言而不敢近者伏惟朝㫖取撥江西常平一十萬石又下隆興府和糴米二十萬石此州縣利害細民休戚係焉炎州縣吏也不避誅責引喙一言可乎恭惟相公以明徳茂親專面正朝處伊尹周公之任必能虚己以受天下之言炎為是有激於中不能自黙側聞輦轂之下畿甸之内與兩淮間適嵗㐫粒米翔貴待哺者無所告糴若救之少緩則餓殍相視於溝壑所以上動廟堂之慮轉漕江東西湖湘之宿藏以振其垂絶之命也然他路與他郡炎不敢浮言止以臨安一郡計之倉司所撥米二萬斛用錢無慮二萬緡浮江入閘茍無風濤之阻亦必兩月而後至夫民之饑餓有朝夕之急而轉漕於他郡者積旬踰月恐非救急之策也如曰中都所藏輔郡所運可解目前之急而他路之所轉運去中都差逺者姑為嵗杪來春之用則又不若設策以求商賈之販出大家温戸之藏可免民饑不必為此擾擾也夫商賈所趨者利也大家溫戸藏粟必待凶歉而後糶者亦利也今不抑米價凡商人興販者沿江諸郡既不得邀阻因明出榜文諭之曰兩淮嵗歉米價既貴商賈有能轉販至兩淮者或鹽鈔或茶引或交子或度牒隨其所欲而收糴其轉販已至兩淮者亦然若夫兩浙之地蘇湖秀三州號為産米去處豐年大抵舟車四出其豪右之家田廣税多而倉庾富實者縣邑之吏鄰里之民固能指數也自臨安若蘇湖秀居人有蓄儲者朝廷既不抑其價直明以上意諭之曰凡蓄米百萬斛者以五十萬糶於官降而下十萬斛以五萬斛糶於官或鹽鈔茶引交子度牒或告身亦惟其所欲計直而售之則商賈必輻輳而豪右之家亦爭發其所藏矣官髙其價而糶之然後平其價以糶於平民米藏未出其價必髙米來不已其價必賤此公私兩利之策也若夫轉漕他路常平義倉之米以給中都則未能無害炎請詳之今州縣所通患者常平本錢之少也如臨江一軍去年水潦相仍官糴常平倉司定價每升七文今漕米萬石費錢亦近萬緡運二萬石之米有四萬石之費矣常平本錢之折閲可惜也且天災之流行不可料其無今日一路錢竭米耗無一嵗之備萬一來年二三千里為災細民狼狽郡縣將何以救之乎州縣之倉庾既空矣而一路和糴凡三十萬石米價既髙細民以貴糴為患來年春夏之交新陳未接艱食可知兼之支郡有土瘠民貧去處和糴之後所存無幾他日或有水旱欲勸富民賑糶彼亦何從得米乎當是之時吏無所振救其民强者攘奪弱者流亡緣此坐罪一官不足惜也受命於上職在撫字熟視其民之饑死於心安乎為今之計來他路之商賈諭畿内之豪右得粟米可賑饑民則他路和糴命漕帥二司斟酌可否勿拘定數即其所糴到因以散於諸州補其所發常平義倉之數元數之外猶有和糴之現存者儲以為他日之備是則兩得之矣伊尹匹夫匹婦不被堯舜之澤若已推而内之溝中相公以伊周之心居伊周之位是以冐犯威嚴而言之惟賜頃刻之暇省覽其説芻蕘雖賤或有一得如蒙鈞慈斟酌施行不勝幸甚干冐鈞嚴無任震越之至答起巖論潮書元吳亨夀至元十八年秋八月十有八日足下觀潮浙江亭明日書以遺予若致疑於逆流之水有可詰者朱子註騷謂潮以月加子午之時一日而再至則亦未嘗無説敢為足下誦所聞焉蓋坎本月之體月本水之精月與水一而已矣在天為月在地為水天有陰陽太少而月為太陰地有剛柔太少而水為太柔古人以方諸取水於月其氣𩔖固相感也而况乎子午之位乃陰陽之始於其所始而月加焉則陰與陽感而陰以升陰與陰遇而陰以盛水陰𩔖也當其所加之時湧而逆上從其𩔖也月一晝夜凡一加午故潮一日再生月一日退天十三度十九分度之七故潮日遲於一日所以初三之潮晝遲而入十八之夜十八之潮夜遲而入初三之晝也一月之間生明生魄潮亦再盛焉生明之潮則自前月二十六長水謂之起信歴晦朔至月初三謂之大信初四潮勢漸散謂之落信厯上弦至月十日謂之小信生魄之潮則自十一始長厯望至十八而盛自十九始殺厯下弦二十五而衰其起落大小之信亦如之天下之至信者莫如潮生落盛衰各有時刻故潮得以信言也月於一月之間漸遲而縮一日潮於兩信之内漸遲而縮兩潮秋月最明秋潮最盛亦其理然也又嘗考之坎為月魄離為月魂震生明也兌上弦也乾望卦也㢲生魄也艮下弦也坤晦卦也生明之盛非無故而盛也坤一索而得長男故盛過兌少而往則衰矣生魄之盛亦非無故而盛也乾一索而得長女故盛過艮少而往則衰矣驗之於月參之於卦潮之理其殆庶幾乎或曰誠如是則陽之盛莫如乾陰之盛莫如坤潮不於是焉大而顧大於震明㢲魄何耶曰兹又先天後天之説也不本諸先天無以見造化之全體不參諸後天無以見造化之妙用先天之卦體也乾坤離坎位於四正震㢲艮兌位於四維而月之周天實配之後天之卦用也退乾於西北退坤於西南父母老而不用而長男代父長女代母居東南生長之方天地間萬事萬物咸於此乎權輿故其為氣也莫盛焉而潮之大信實配之月配其體則陽為明陰為魄而乾坤當望晦之位乃陰陽之極也潮配其用則長為盛少為衰而震㢲當大信之後乃陰陽之長也夫如是則其不乾坤而震㢲也有由矣或又曰亦何以知其必取於卦耶曰以納甲家啓之納甲者如生明之月昏出於庚震則納庚生魄之月晨見於辛㢲則納辛之𩔖是也陰陽者流用之率驗則月與卦相為用也審矣潮而有取於月也不亦有取於卦乎哉或又曰月之説然耶則潮之為侯亦宜月半以前由微漸大月半以後由大漸微以象夫二五而盈三五而虧可也今乃於明魄之生兩盛焉何哉曰明魄之盛固己如前所云然月一月一週天而一日之内則一加子一加午者也潮於月加子午之時一日再至故亦於月生明生魄之日一月而再盛焉月之一潮之再若不相似而實相感召非深於理者未易以語此或又曰子所論浙江潮也他江亦有潮其遲速不同何與曰潮之生必生於月出之海浙江之去海為近故其至也如時他江所去有逺近故所至有遲速耳或又曰古今言潮者必推浙江亦謂銀山雪屋有𩔖數丈此為異耳他江之潮第如湧水復與此不同何與曰浙江去潮生處近掀天沃日之勢方盛而不可遏赭山龕山横於江口頓然斂寛就窄其勢必至於衝激奔射也他江去潮生處逺逺則必殺故但湧水而已又何疑焉上郡守洪覺山救荒書明侯一元夫救荒恒言其一曰平價平價者欲令凶嵗用樂嵗之價也糶者有餘糴者不足損有餘補不足故曰平此善政也愚竊以為欲平者仁君之心也而不平者物之情也書曰惟齊非齊故必以平寓之不平而後可幾也昔耿氏常平之法穀賤則增價以糴貴則減價以糶此在官者也若民則惟害之避惟利之就有父母所不能諭君長所不能制者乃天性也昔范文正知杭州嵗饑穀貴至斗百二十文范公更增其價至百八十文告諭逺近於是米商大集價亦隨減包孝肅知廬州亦不限米價米更以賤此固以誘致境外之米然可以推見人情誠價貴有利則境内之米亦必不煩告戒而自出矣常平所謂增價減價者蓋就時價而稍增減之故曰價平而止若豐凶獨守一價則何所用其增減而又何平之有哉夫以官府之粟無愛於民猶必隨時低昂其勢然也况在民者乎今境外之米或不可望境内之米亦宜用時價而少損之庶幾民之從之也輕其猶有不從者然後勸粟之令可時下也其二曰勸粟勸粟者亦平糴之意但其權稍出於上所以開民之固吝教之以相生相養之道亦善政也愚竊以為勸粟之意本欲以有餘補不足也然凶年非巨富之家鮮有餘粟中富以下則足以自給而已責中富以巨富之事是使舍其父母妻子之養以養人非補助之本指矣江浙之民其貧富以田為差故欲辨其産者惟按其田則可知也愚以為諸有田數十頃者為定其髙下之差使以差出粟官為主其價用時直而稍損之若令所謂勸借者則粟有定數猶愈於鄉民無已之求也輸之於上猶愈於人自為政之舛也如是民必樂之其五頃以下至一頃者勿賦以粟而亦不得受粟此其與責民自料其産自出其粟者相懸矣蓋使小民呈報則有倚富誣貧之奸使富人自糶則又有冐妄不實之奸而其甚可憂者小民羣輩自入富人之家爭以攘奪為事法不可勝則為亂之漸也此俗一成中人以上人人自危矣又所謂饑民者謂其無田可耕無家可倚而今皆椎牛釃酒攘袂奮臂相與約誓而為饑民而其無田無家者反不能自列於上則是善人長饑惡人長飽彼惡少年不喻上之徳意方且以為衣食之本惰其所有事而趨之傷化之大者也其三曰閉糴閉糴者非先王之法然今之郡國各有分地人惜其穀人愛其民百郡皆然而一郡獨否則病何者無入而有出也故閉糴亦為不得已之政愚竊以為天下一家均為生民以為郡之廣必有有餘不足之處因而通之則俱全之道是以先王禁遏糴也四海譬一郡一方譬一縣方今閉糴之政在列郡行之則不得已也何也以他郡之政他郡制之也在縣邑行之則仁政必有壅遏偏枯之患矣何也以一郡之政制於一人也就一郡而言之則諸縣豐歉不同矣就一縣而言之則諸鄊豐歉不同矣譬之決渠水以救涸澤渠雖稍減澤亦得滋水平自止渠澤兩利非必竭渠以附澤也凡人之情先自為後為人誠使五縣之間各得流通相為出入則其出者必有餘者也入者必不足者也不待為之却慮而民自得久之則五縣若一而仁無不貫矣愚小子竊謂涓塵以必赴為勤海嶽以并容為大伯宗多知而梁山之議乃効於將車之役夫威王明主而治齊之理乃發於自售之醜女古之賢若此者非一蓋以議有不可用而言無不可容則人自竭而理必具矣伏見明公哀矜之心浹於窮民明威之治訖於豪猾令無不行法有必用將以兼舉周官恤貧安富之政而并包五縣之民此千載一逢也故某自忘其將車求售之陋而欲有獻於深哲逺聴之前誠珍莪子而昧太牢矣伏惟明公矜而察之幸甚啓杭州謝執政啓宋蘇軾小器易盈宜處不爭之地大恩難報終為有愧之人到郡浹旬汗顔數四湖山如舊魚鳥亦怪其衰殘爭訟稍稀吏民習知其遲鈍雖尚膺於寵劇庶漸即於安間顧此惷愚亦䝉徼倖此蓋伏遇某官輔世以徳事君以仁嘉善而矜不能與人不求其備故令狂直得保始終指步武於夷途收桑榆之暮景軾敢不欽承令徳推本上心政拙催科自占陽城之考奸容獄市敢師齊相之言庶寡悔尤少償知遇答杭州交代啓宋蘇軾罷直禁中本緣衰病分符浙右更竊寵榮既尋少壯之舊游復繼老成之前躅養疴卧治之所䝉承坐嘯之餘顧此鈍頑實為忝昧伏惟宏才緯俗雅望鎮浮神馳方切於望塵心照己申於傾蓋借之餘潤成此虚名滕大夫之才豈堪治劇楚令尹之政或許告新望見有期瞻依愈切新易節旄光臨督府舊政已孚於千里先聲坐振於七州軾偶以庸虚適相前後愧無毫髪之善可紀斯民惟有凋瘵之餘以遺君子即諧瞻奉尤切詠思與温守袁孚正言啓宋王十朋襆被殿廬蓋適我願兮之始懷章里閈正事其賢者之時曾族賀之未遑遽朋椷之先辱俯懷愧懼仰佩謙沖某官蘭省魁儒芹宫哲匠卓矣聖賢之學粹然道徳之容議論衷乎古人文章蓋其餘事方權臣用事之日官冷廣文逮聖主當陽之初席前賈誼擢自臺察處於諫垣言人之所甚難行吾之所素議首破和議力摧奸謀有蓍龜先見之明凜松柏後彫之操君子稱為古遺直天下傳為真諫官十上固爭挺袁安忠正之莭一麾出守得謝公山水之州上方念之公其歸矣某蒙恩去國需次還鄉喜父母之邦得神明之政汲長孺雅嘗慕盎臭味本同王仲宣兹幸依劉帡幪可托知嚴州謝王丞相啓宋陸㳺故里浮沉竊玉局再期之祿公朝抆拭付桐江千里之民瓜戍非遥竹符甚寵感淪病骨愧溢衰顔伏念某元祐黨家紹興朝士池魚瀺灂本思自放於江湖社櫟支離久已難施於斤斧由治生之素拙因從宦以忘歸頃自吳中久留劍外顧彼衣冠之所萃頗以文字而相從方深去國之悲敢有擇交之意流偶殊於涇渭風自隔於馬牛睚眦見憎本出一朝之忿排擠盡力幾如九世之讐藐視羈孤孰為别白縱免投荒之大罰亦宜置散以終身且定逺未歸誰望玉闗之生入輕車已老猶䕶北平之盛秋豈有朝為閭閻廢斥之人暮竊畿輔承宣之寄兹蓋某官學窮窔奥勲塞堪輿南山巖巖冠公師之重任赤舄几几同宗社之閎休念人才之實難悼士氣之不振埏陶正廣收拾無遺方與物以皆春憫向隅之獨泣燮和輿論濶略彞章起安國於徒中較恩未大還管寧於海外為力尚輕而某少非列於通才晚徒專於朴學棄雞肋而猶惜惟仰戴於深仁續鳬脛則短才恐難容於薄命知嚴州荅交代陳院判啓宋陸游病求玉局但懷優游卒嵗之心恩畀桐廬獲繼超軼絶塵之跡方自嫌於通問乃劇辱於移書公真快哉我則陋矣伏念某少而落魄老益迂疎憔悴闗河萬里客岷嶓之境馳驅節傳三年使閩楚之郊迨此退歸頽然遲暮投組以安於蟹舍起家忽奉於魚符兹盖伏遇某官秉節以貫四時瑞世而翔千仞經行早推於庠序謀猷晚著於朝廷謡誦上聞豈獨最列城之課規模甚逺又足為來者之師某偶幸懷章遂將接武雖取棄竹馬望英躅以憎慙然獲奮青氊在衰門而甚寵發春伊始坐嘯多閒願遵輔養之宜即慶禁嚴之拜賀浙西漕除總領啓宋陳造十行芝檢來自層宵一道使權總之碩徳省蘭寓直營柳回春方逺邇之悚聞聚驩謡而載路乘軺問俗孰遵前日之教條足國裕民行繼昔賢之事業某官稟絶人之識為名世之儒挺薦紳表而雅推獨行之賢讀古賢書而不為無用之學棟梁杞梓允謂良材衮繡文章直其餘事自横蜚於仕路即妙簡於宸衷百吏革心咸仰范滂之攬轡列屯宿飽未多葛亮之雜耕况此常暘之餘良苦轉攘之梗河流如帶千艘銜尾以莫前粒食比珠萬旅張頤而仰待事有至難顧今乃爾賢必已試然後用之不有一代非常之才曷振此時兼乏之策輦駕以輸河内少留子翼以給軍根本之固闗中側佇酇侯之相國要令元勲之冠列辟豈止再見而位上卿某猥以郡符撫兹淮俗久依風於徳宇今賴寵於使臺聞嘉命之真傳撫微躬而知幸成於自同敗於自異需使指以趨承淆之不濁澄之不清尚仁人之覆䕶湖州謝孟漕啓宋王炎鳳闕非遥虎符有守便朝賜對詔㫖趨行主上之徳意寛仁臺治之教條簡易於斯撫字可謂便安載念此州殊非曩日三賢祠在誰希前哲之髙風六客堂空無復宦遊之樂事既紛紛於牒訴又汨汨於簿書征𣙜之利日取之若甚多金布之輸嵗計之常不足何以免催科之拙庶乎為保障之謀伏遇某官令聞冠於朝端名問甲於天下以能治劇兼兩道而裕財其實留中近九重而駐節炎幸緣一日之雅素可竊二天之庇庥雖無御黠馬之嚴稱為能吏願戒烹小鮮之擾加惠齊民荅長興安吉知縣啓宋王炎朱轓蒞事固無取夫煩苛墨綬近民尤貴察其肥瘠欲為循吏難矣願與執事圖之某官行已靖修執事敏決方縣官之意雖專期於保障而郡守之責顧在拙於催科要當處之以中相與去其太甚黄金不至摶手而無措赤子亦可息肩而少休但使田里無愁嘆之聲不負朝廷有寛大之意佇觀優課即上亨途聊抒鄙願用酬先施通溫州交代沈詹事啓宋樓鑰偃藩滄海真有古方伯之風易鎮溫陵庸示東諸侯之勸乃容賤子獲繼後塵敢言一月之間再辱五雲之貺撝謙甚矣揣分悚然恭惟某官學貫九流氣髙八表天分已超於凡品心傳自得於遺經嚅道脈詠聖涯信師友淵源之逺穿天心出月窟仰文章黼黻之工首振宏綱早膺睿奬游居宰掾遂陟禁途儲竂推商皓之賢朝望出漢庭之右粤從壯嵗已著外庸使節帥垣凜威名之猶在閩山江國懷惠愛以如斯獨瀛壖未識於旌旄故上意特分於符竹敎條所及掃狡穴以一空政務日新剔蠧原而欲盡期年而變百堵皆興精力如黄潁川而事不煩方略如薛馮翊而用自省撫摩多暇賦咏流傳繡口錦心在昔接王楊之舊風樓月觀從今齊沈謝之名忽傳舜詔之頒更與泉麾之重佇聞歸奏别拜褒遷刺史之為三公厥存故事人主之論一相用佐中興伏念晩生無堪㝠行當血氣盛强之際不能大所居之宫矧父兄憂患之餘豈復有敢為之志兹叨郡紀遽迫戍期雖惟為養之私未識牧民之道仰惟耆徳嘗拜下風庭内芝蘭已見朱轓之賢守門前桃李居多黄閣之名臣望重儒先年為父執退慚孤逺敢謂交承瞻之在前知堅髙之可慕瞠乎若後豈奔軼之能追尚須修敬之初躬請告新之益暑風清潤燕寢邃深願精茵鼎之調仰副冕旒之眷碑會稽山刻石泰李斯皇帝休烈平壹宇内徳惠攸長卅有七年親䡅天下周覽逺方遂登會稽宣省習俗黔首齊莊羣臣誦功本原事迹追道髙明秦聖臨國始定刑名顯平舊章初平法式審别職任以立恒常六王專倍貪戾慠猛率衆自强暴虐恣行負力而驕數動甲兵陰通間使以事合從行為辟方内飾詐謀外來侵邊遂起禍殃義威誅之殄熄暴悖亂賊滅亡聖徳廣密六合之中被澤無疆皇帝并宇兼聴萬事逺近畢清運理羣物考驗事實各載其名貴賤並通善否陳前靡有隠情飾省宣義有子而嫁倍死不貞防隔内外禁止淫佚男女絜誠夫為寄豭殺之無辜男秉義程妻為逃嫁子不得母咸化廉清大治濯俗天下承風䝉被休經皆遵軌度和安敦勉莫不順令黔首修絜人樂同作嘉保太平後敬奉法常治無極輿舟不傾從臣誦烈請刻此石光陲休銘謹按金薤琳瑯云至正元年辛巳夏五月望日紹興路總管府推官東平申屠駉以家藏舊本模勒置於㑹稽黌舍庶與嶧泰等文並貽於後但史記攸長作修長卅字作三十追道作追首又作追守軌度作度軌有子而嫁作不嫁無辜作無罪敦勉作敦誠今則俱依石刻以俟好古博雅者考鏡焉梁相費汎碑漢費梁相諱汎字仲慮此邦之人也其先季文為魯大夫有功封費因氏為姓秦項兵起避墜於此遂留家焉世業稼穡好學禮樂大漢之闕官司相繼絶而復續至梁府君以孝友至行聞於鄉邑仕更郡右蹇諤質直在公履法察孝廉除郎中屯騎司馬遷蕭令眡民如子先敎後罰黙之化奉以忠信守以敦篤在位九年百姓移風苛慝不作奸冦不發變爭路銷推讓道生三年不斷獄禎祥感應時沛有蝗獨不入界由此顯名國以狀聞朝廷嘉諸拜梁相宣闕惠闕不帥自正當登台階延究曷耉被病遜位春秋八十卒二子綦闕鳳由宰府至堂邑令政九江太守適孫均感奚斯之義刋銘石旌勒厥美俾闕覽焉其辭曰穆穆顯祖厥徳懿鑠播勛於前丕碩基業遺愛於民福流後祚庶闕昌闕在闕室功烈休矣末昆戮力謹按洪适隸釋云右漢故梁相費府君之碑篆額今在湖州費君名汎堂邑令鳳九江太守政之父也鳳以威宗熹平中卒碑載費君二子所終之官此蓋其孫所立故其銘有穆穆顯祖之句鳳碑云孝孫字元宰生不識考妣追惟厥祖恩蓬首斬衰杖則鳳之子已早卒此所謂乃九江太守之子得鳳畝一金之産者左傳魯僖公賜季友汶陽之田及費碑作季文誤也堂邑令費鳳碑卜引惟熹平六年嵗􅛕亏大㐬無射之月堂邑令費君寢疾卒嗚呼哀哉於是夫人元故闕三字守卜引追誄之辭曰君體履柔龢溫其如玉修孝友乎閨閾執忠謇於王室立迹州郡仕更右職舉直措枉强禦闕貸貢孝三署勛譽有則出宰近甸民懷厥徳色斯輕翔翻然髙絜王人述職分闕班爵台闕二字招鼎調物退已進弟不營榮禄栖遲厯稔項領滯畜鄣土不庭黔民作命君闕二字政化闕行逆善遷恩三期致道有恥且格文守旌功轉在堂邑垂拱不言而民帥伏三時之間卒以闕洽旻天不弔命也早殁春秋六十六黎儀瘁傷泣涕連漉豈愛我躬命不可續臨終迷闕三字内發祖業良田畝直一金推予弟息辭位讓財行義髙邵卓不可及名實相副有始有卒闕二字善人痛方切惻謹按洪适隸釋云右漢故堂邑令費君之碑篆額今在湖州費君名鳳自郎中嘗宰新平故鄣堂邑三縣以靈帝熹平六年卒其妻之弟卜君追誄之乃作此碑碑中無名字云之石君詩碑云祖業良田畝直一金推予弟息此固可嘉至於退已進弟不營榮禄則人人之所難其云行義髙邵卓不可及名實相副有始有卒信哉此云黎儀瘁傷孔寅碑亦云乃綏三縣黎儀以康黎則黎老之稱儀則讀如旄倪之倪也堂邑令費鳳别碑漢石君家仲孫甘陵石字子才載馳載驅來奔亏喪庭肝摧意悲感切傷心瞻彼碑誄懷之好音司馬慕藺相南容復白圭仰之以彌髙鑽之而彌堅不堪哀且思叙詩之一篇庶幾昔子夏起夫子之所言其辭曰君諱鳳字伯簫梁相之元子九江太守之長兄也世徳襲爵銀亞倐遐祖之鴻軌拓前代之休蹤邈逸越而難繼非羣愚之所頌仁義本於心慈孝著於性言不失典術行不越矩度清潔皦爾埿而不滓恤憂矜戹施而不記由近及逺靡不覆載故能闡令名而雲騰揚盛聲而風布踐郡右職三貢獻計辟州式部忠以衞上漢安二年吳郡太守東海郭君以君有逶迤之節自公之操年卅一舉孝廉拜郎中除陳國新平長神化風靡惠以流下靜而為治匪煩匪擾乾乾日昃矜此黔首功成事就色斯髙舉宰司委職位思賢以自輔元懿守謙虚白駒以陧丹陽有越㓂没闕四字命君討理之試守故鄣長蓋危亂有不讓又畏此之罪而闕牧爰止其師旅鴪若飛鷹鵕錿若夫虓虎彊者綏以徳弱者以仁撫簡在上帝心功訓而特紀轓輿宰堂邑期月而致道視闕四字遂據亏卿尹中表之恩情兄弟與甥舅蔦與女蘿性樂松之茂好聞君顯令名舉宗為歡喜不悟奄忽終藏形而匿景耕夫釋耒耜桑婦投鉤莒道阻而且長望逺淚如雨策馬循大路褰裳而涉洧悠悠歌黍離黄鳥集於楚惴惴之臨穴送君於厚土嗟嗟悲且傷每食闕不絶夫人篤舊好不以存亡改文平感渭陽悽愴益以甚諸姑咸辟踊爰及君伯姊孝孫字元宰生不識考妣追惟厥祖恩蓬首斬衰杖世所不能為流稱於鄉黨見吾若君存剥裂而不已壹别會無期相去三千里絶翰永忼慨泣下不可止謹按洪适隸釋云右費鳳别碑刻舅家中孫甘陵石詩一篇其辭云瞻彼碑誄懷之好音謂卜君所作也其詩先叙世系厯官繼以韻語六十句其三句六言餘皆五言石君蓋鳯之中表也所述兄弟甥舅諸姑伯姊夫人孝孫悲傷哀痛之意宛轉悽切費氏父子三碑今並列於吳興校宫之壁不知者指此為碑陰趙氏亦有斯誤其中埿而不滓蓋用涅而不緇鴪若飛鷹鵕錿若夫虓虎蓋用聿彼飛隼闞如虓虎其字有不同若非假借則是傳授異也天台智者大師碑幷序唐梁肅天台山西南隅一峯曰佛隴蓋智者大師得道之所前大佛敎重光之地陳朝崇之置寺曰修禪及隋創國清廢修禪號號為道塲自大師入滅一百八十餘載長老大比丘然公光昭大師之遺訓以啓後學門人安定梁肅聞上易名銘勒大師之遺烈以示後世云大師諱智顗字徳安時號智者感緣應迹載在别傳夫治世之經非仲尼則三王四代之制寖而不章出世之道非大師則三乗四教之㫖晦而不明昔如來乘一大事因緣菩薩以普門示現自華嚴肇開至雙林髙會無小無大同歸佛界及大雄示滅學路派别世既下衰敎亦陵遲故龍樹大士病之乃用權畧制諸外道乃詮智度發明宗極微言東流我惠文禪師得之由文字中入不二法門以授南嶽思大師當時教尚簡密不能廣被而空有諸宗扇惑方夏及大師受之於是開止觀法門其敎大畧即身心而指定慧即言説而詮解脱大中一實相之宗趣無證真得之妙自發心至於成道行位昭成無相奪倫然後誕敷契經而會同之煥然氷釋示佛知見窺其敎者修焉息焉蓋無入而不自得焉大師之設敎也如此若夫弛張用舍開闔黙語髙步海内為兩朝宗師大明在天光被四表大雲注雨旁施萬物由是言佛法者以天台為司南殊塗異論往往退息緣離化城示滅兹山是嵗隋開皇十七年也夫名者實之賓教者道之門大師溷其賓闢其門自言地位示有證入故感而應之之事可得而知也若安住法界現為比丘等覺與妙覺與不可得而知也當是時也得大師之門者千數得深心者三十有二人纂其言行於後世者曰章安禪師灌頂頂傳縉雲威禪師威傳東陽東陽縉雲同號時謂小威威傳左溪朗禪師自縉雲至左谿以元珠相付向晦宴息而已左谿門人之上首今湛然禪師行髙識逺超悟辨達凡祖師之教在章句者必引而伸之後來資之以崇徳辨惑不可悉數蓋常謂肅曰是山之佛隴亦鄒魯之洙泗妙法之耿光先師之遺塵爰集於兹自上元寶歴之世邦寇擾攘緇錫駭散可易名建寺修持塔廟莊嚴佛土迴向之徒有所依歸繄衆人是賴汝吾徒也盍紀諸文言刻於金石俾千載之下知吾道之所以然小子稽首受命故大師之本迹敎門之經明後裔之住持皆見乎辭其文曰諸佛出世惟一大事天台敎源與佛同致赫赫大師開示奥秘載𢎞道要安住圓位白日麗天天下文明大師出現國土化成無生而生生化兩明薪盡火滅山空道行五世之後間生上徳微言在兹徳音允塞明明我后易名淨域此山有壞此敎不極越州開元寺律和尚塔碑并序唐梁肅釋氏先律師諱曇一字曇引報年八十一僧夏六十一以大厯六年十二月七日滅度於越州開元寺遷座起塔於秦望山之陽制縗會葬者以千百數大師本南陽張氏曾祖隋太常恒始家於會稽之山陰大師誕鍾粹氣聰悟夙發幼學五經因探禹穴至雲門寺遂依沙門諒公出家景龍中剃度尋受具戒天縱辨慧益之以軌儀翕然已為人望矣開元初西逰長安觀音亮律師見而竒之受以毗尼之學又依崇聖寺檀子法師學俱舍唯識從即度沙門善無畏受菩薩戒探道覩奥出𩔖抜萃期月之間名動京師大師崖岸峻峙機神坦邁體識詳雅應用虚明得三藏之隠賾究諸宗之源底加以索解元儒旁總歴緯長老聞風而悦服公卿下榻以賓禮由是與少保兖國陸公象先賀賔客知章李北海邕徐中書安貞禇諫議庭誨及涇縣令萬齊融為儒釋之遊莫逆之友其導世皆先之以文行𢎞之以戒定入蘭室而馨香自發臨水鏡而毫髪必鑑不知其所由然矣開元二十六年復歸會稽謂人曰三世佛法戒為根本本之不修道逺乎哉故設敎以尸羅為主取鄴郡律疏合終南事鈔括其異同詳發正義學徒賴焉大凡北際河朔南越荆閩西方之宗自我而盛烈炬之破昏黑羣流之赴淵澤適來之時行化也如彼有為而生乘化而息草木潛潤慈雲無心適去之時處順也如此人世遷轉道存運在瞻望不見寂寥空山銘曰越木漫漫崇山迴合大師化滅式建靈塔緬慕上士誕修淨法有威有儀不穿不雜徳溥化洽雲從海納勒銘垂後千萬億刼杭州開元寺新塔碑唐李華漢永平中佛敎初至洛陽始置寺度騰蘭二徳古者官之庭府稱寺葢賓而尊之比於曹署此其源也杭州開元寺梁天監四年豫州刺史譙郡戴朔捨宅為寺寺號方興名僧惠圜營建之後處士戴元范賓恭増飾之至開元二十六年改為開元寺庭基坦方雙塔樹起日月逝矣材朽將傾廣徳三年三月西塔壞凶荒之後人願莫展太常卿兼杭州刺史張公伯儀忠簡帝心威靜吳越駐車跪禮徘徊感嘆乃捨清白之俸為君為親修而復之兵部員外郎兼侍御史范公倫人之珪璋國之俊彦法師什曇獻上座什雲卿寺主什崇逺都維那什惠達什法祥長樂寺什曇景等戒香扶其永誓道力䕶其成功於是劍南荆揚之巨材諸郡倕輸之懿匠竭耗神明三年畢事乙栗結仡穿貫顥氣晃爚景象烘若鎔金距卑躋髙凡為七級之有佛事環迴眴轉幢網通映如梵什宫踐乎上府俯視萬井有若棊布仰瞻天宇雲在身下傍眺江山列在掌端鏤以丹素飾以青紫掀腸閃目百變百移如有靈物𡻭跪稜層雷嵬攢欒摽江壓湖孤島突天不可名也霞照丹戸如開日宫風摇和鈴若下天樂聲徹有頂輪蔭空界影入清江形鎮大地所濟者廣巍巍度門先大徳什懷亮住持之固如山不動先法師什藏暉三藏扄鑰吾方啓之過去人緣在世慈願不有偈頌其如佛恩華嘗官是邦感深霜露忝太常一面與兵部為寮敬申其美以佐法門之宏觀其文曰亭亭揭堅逈出江甸秋天泬寥百里獨見如海浮來如地涌現以壯州邑以調羣心餌藥解病依舟濟深卿曹郎署共布黄金台州乾元國清寺碑唐李華天寶十五載逆將犯闕塵翳郊廟上皇哀蒼生避之幸蜀皇帝誓復君父之恥理兵於朔方避冦仁之盛也復恥孝之大也惟仁盛孝大故不逾年而收京師奉陵寢凶孽走而天降之戮化氣和而人至於道巍巍乎堯舜之烈不足比崇天子齊心元黙運行慈煦為元吉卿士妙講化之宗以為五帝三王之道皆如來六度之餘也厥初生人降及中古君臣父子日用而不知故元聖昇竺乾而師有古先生宣尼有言三皇五帝皆古聖者而西方有聖人其為大千之尊乳育羣聖明矣夫玉帛非為禮之本捨玉帛則無以為禮象飾豈施敎之源捨象飾則無以為教建塔廟為禮容履霜堅氷物有其漸於是卿士從兆人從九圍之中列刹相望矣盈川非古邑也襟東江西山因而城之寺在逺郊信者勞止自官吏耆耋至於商旅咸以津梁未建為媿為羞邑城之西有淨名廢寺背連山而面通川杉栝晝暝緇褐經行寒潭夕清車馬無聲境勝心閒十金果成耆夀徐君贊錄事徐知古等請於縣令隴西李公平平請於前刺史趙郡李公丹丹請於河南等五道度支使御史中丞京兆第五公琦琦聞於天子墨制曰可僧義璿等伏以乾元之初元惡掃除國步既清廟易名牓因改曰乾元國清寺昭睿功也自所志洎於州縣之長􅒼吏以降多捨清白之俸徵梓人求繪工為民儲福為佛成宫髙殿倚雲長廊生風蓮花出界開在空中自江南無有是刹上座某等至某都維那某奉前佛之心印得輪王之髻珠第五公以上智利國人登宰輔李使君以全徳公才持憲為郎今刺史陳郡殷公日用忠武傑出長城江海專知官司馬隴西李公乾嘉峻能操綱清可激俗縣令李令宗室大儒政之善者皆易簡詣於真境清淨符於度門醍醐勝味甘露妙源正性無説𢎞之在言其詞曰東裔名刹西方樂土吳山倚垣越水當戸檉松黝藹下有象潭龍在泉中水容耽耽景象光澈江湖氣含天清寶界地湧靈龕大聖蒸蒸動乎天地百神奔走戎服既備命將誓師殄殱逆𩔖奉迎太上開闢正位神人釋憤品物咸遂鼔舞賡歌上通元氣無思不泊雜沓禎瑞輪帝御㝢像法昭融須彌四洲建大蓮宫倬彼盈川秀冠越中縣有徳政州有名公奉宣睿謀爰度崇工梵侣開士慈雲惠風願言上報聖夀無窮建表勒名堂堂乎鐘衢州開元觀碑唐顧况王太上也謂之三清測神靈也謂之三洞洞之法金璫玉珮之書玉馬之劵迴車畢道天誥也負石填河師誓也得之者上騰九天失之者下釁十祖故曰萬刼秘而五千文行蕭武好佛法道士桃􅭒釋藏徒聊順帝㫖强説為大教佛經故論者短之多稱道家惟有老子兩卷井蛙不知尾閭也大哉玉皇上極金闕青童紫微扶桑之君仲侯左靈東華之君人雖位在上清而猶臣妾玉皇太上已下如陪臣焉凡三十六天三十六洞地道下通華陽林屋傍通龍丘九巖其土神秀厥生道奥徐先生名含真中書侍郎安貞之族子也傳八景之空文掘九光之靈符隸乎此觀初棟宇壇墠惟彼瓦礫鬱為草莽先生之功林堂象設始吐光彩蕭蓼同映養屯茹氣蹈火吞刀之士不可呼而來夫道可不遇文復何昌銘曰天地未生聖人未作陰陽坱圠日月磅礴道隠乎先氣流形博乃播羣法靈神沃若奔景無天迴元豁落帝作玉府以般靈居四輔之目三清之書不得其人曠刼秘諸臣拜稽顙以度寶魄之明浩輿吳越錢武肅王廟碑唐皮光業粤以唐長興三載壬辰春季蓂凋十三莢天下兵馬都元帥尚父守尚書令吳越國王棄捐宫館以是嵗明宗皇帝降太常博士段顒定諡議曰武肅詔尚書工部侍郎楊凝式撰神道碑又宣翰林待制張季恭至吳越書於刋石後二年嵗在敦牂天下兵馬都元帥嗣吳越王建廟貌於始封之越國禮與境内樂之罔極孝思也蓋聞神道設教莫大於郊社嚴禋明徳惟馨無逾於祖考孝饗是以百代相襲六籍盛稱報劬勞則天保是徵展欽若則王假是訓豈况建除難靖亂之業揚武烈之威名振剛徳義氣之風成肅恭之懿號陳力四紀光奉八朝生為有土之君薨立象朝之廟足可睢盱召畢齷齪桓丈聲華永而日月齊簡册編而古今在矧夫堂成王構家繼國祧壓璧寶以知來出玉林而嗣位髙陽號里無愧前賢夏屋登山常遵治命爰自鄭緇始襲晉墨未除不忍一日之離遂立千年之祀金鎔陽邁已成像於吳城香刻旃檀復祔神於越國恭惟先天下兵馬都元帥吳越國武肅王殷朝籛祖仙蕚分枝唐代巢公靈源真派簪裾軒冕禮樂詩書叠慶連華交光翊業應劭七世累爵重官羅企一門惟忠及孝其降神也虹飛蜀國如見殊祥魚躍河汾是生竒表赤光耀室黄氣浮雲石龜隕下於官山逺人附歸於寶器其英姿也鳳文龍藻夐出精神白璩蒼珪琢為標格加之薛璘整峻謝安風華俯仰可觀進退有度慕容徳偃日月角光彩爍人李子堅匿犀龜文聲威鎮俗其辭韻也音容灑落智辨鏗鏘元善抑揚張暢詳雅至若討論國計談畫兵籌接對使伻撫御將下所謂五河奔注百谷崩騰玉虹起而雲霧銷金虎嘯而風飈動揣摩勝負赫連勃口授懷慙捭闔興亡蘇季子舌端有愧其氣度也志尚健木量等大瀛含垢匿瑕罔知邊際求賢接士無怠寅昏重仁義若丘山視玉帛如咳唾翹翹車乘惟在得人憧憧往來皆鍾和氣所以羔皮豹舄鶴列犀渠咸願殺身用酬大志變家為國誠由萬化生身以徳聚民所謂八風從律其英雄也能知否泰應候雲雷動必有成舉無遺策蛟龍得雨莫測變通鵰鶚出林可知意度其間文武迭用仁義並施常平之列㦸持矛並能取舍元協之搦蛇騎虎不覺艱難奄有具區廓開霸業設使庾翼復出必不忘譽於桓溫阮籍今生安敢輕言於廣武其文學也家承儒範世尚素風傳綘紗帳於先生授白綸巾於神女才通夢寐鳳吐是來志在典經龍鬭不顧所以博覽七緯精究三元盡得津涯皆升堂奥其於編咏尤著工夫思風起而繡段飄言泉淘而金沙見其札翰也花隨腕下星逐毫飛迅若游雲細凝垂露鉤刀向背未饒索肉芝筋㸃畫方圓髙掩崔肥趙瘦就中濡染牌額益見呈露鋒鋩四方仰之神蹤一代稱之墨寶王逸少若見甘避雁行蕭子雲如逢大慚蟬翼其建大功也唐季乾符之末中和之初海鳬乍揚天龜初伏塵飛野馬四郊之壘漸多霧暗螣蛇五賊之機共搆其始者王仙芝結釁中土首搆禍階雖已誅夷猶殘支黨自此藂林烏食草澤蜂飛輕薄者固自披攘謹厚者亦為慓悍江南則朱直叛亂於唐山孫端寇孽於安吉西侵宛水東患苕溪郡縣則終日登陴生民則長時伏莽王時郊居葛圃家遁茅山方當枕石潄泉尚足褒衣博帶覩兹多事慨然究懷顧謂朋友曰丈夫當須撥亂平姦豈可懷安端坐是日乃奮戎服挂披儒冠大散家財廣招勇士申令纔舉行伍肅然手仗義旗身當勍敵一月之内二寇殄平靖千里之山川救兩郡之塗炭是王之初功也其次黄巢來從五嶺直下三衢展梟翅則雹布星羅張鯨牙則山連岳峙所遭蹂陟並作塵灰王乃獨領偏師横行險地既逢大憝遂設竒兵敵望草木叢林皆是戈矛旗幟我則左右冀陣黙化如神當下追奔尚賈餘勇長蛇封豕使出他疆新市下江保安數邑是王之次功也其次彭城漢宏據南鎮之望地守東越之名區黄巢既犯兩京僖王乃巡二蜀漢宏不思奔問便廢貢輸恃險阻於浙河欲覬覦於浙岸先於通浦黿石翼張下營蕭山西陵鱗次列砦烽燧交應鼙鼓相聞時我諸軍實有難色王乃潛趨間道夜濟長江仰告昊天乞昏朗月當下寒雲布野殺氣凝空楚廟陰兵旁隨霧合晉臣黑幔闇與山連我師忽震於雷霆彼砦俄摧於魂夢風號貔虎爭傳破竹之聲陣卷龍蛇競集建瓴之勢賊將没輪不暇漂杵有餘僅身免以奔歸乃塞門而自守爾後大小百戰首尾四年方清鏡水之波始有蘭亭之地弔其生聚大布仁慈誅彼渠魁不煩天討是王之功也次則有薛郎逐出周寶自據東方南襲毘陵西侵建鄴恣其剽掠務在殺傷將取中國之危擬扼長江之險王乃命二麾上將期一月報功指其山川授以韜略蹄轂並舉水陸兼行曾不旬時討平穴裏俘南宫萬於犀革視以囚人梟崔慧景於鰌藍張其叛否是王之功也次則有徐約比是六合鎮使遽忝三吳都符玉帛是求徵斂無度長時習戰齊民因彼雕黥比屋為軍魯儒亦遭剪刺惟王聞其暴虐奮激神威發上谷之精兵命下江之賢將授以九天九地之訣博以訓辭典謨之規扼斷咽喉清其郊野任約之龍果睡王彌之豹徒飛食窘朝饑無由撫土計窮宵遁遂至潰圍松陵之烟水重清香徑之黎元再活是王之功也次則有孫儒恃有數百萬兵甲不守淮南直欲便遷土疆遂奔江左封人民為糧食隳舍宇為薪蘇餓鶻饑鷹飛揚京口貪狼乳虎涉踏吳門漸逼由拳將窺霅水王乃張天網於險阻闢地穽於要衝發水犀之驍雄設燧象之奇計青鶴摩壘赤兔致師將持久以待之俟勢窮而必取守陴皆哭無食何為鳴鼓而攻脱身遂去向使不施神略不振王威則翼翼聚靈皆成膏血茫茫勝槩盡作爐煤所謂劬勞為時廣大及物是王之功也次則有董庶人始鎮石鏡便牧於杭因破漢宏遂居越土自形成象從纎至洪並是王之擐甲執兵左提右挈以至手持麾節身爵王侯既滅頂於彞倫乃垂涎於神器銅符金匱祥瑞亂興玉璽珠袍妖訛競起王以早同楚㰱夙共晉盟書尚緘縢血猶濡劒牋函旁午誘勸交馳諫既閑於屬垣禍遂成於覆族是時兩河崛强三輔紛紜萬象雖拱於北辰一人不遑於南顧王請奉行天討所統便是國兵不廢公供資財不役諸道將帥果見桓𤣥計窘抽王道以求生王莽勢窮轉神威而壓勝喉既扼於富水骨復棄於會稽瀦厥故宫焚其法物復我朔清俄寰瀛海五石補而天鏡明六合完而地維正是王之功也王以平妖立霸時之業戡難建蓋世之功律吕宫商鏘洋史籍丹青金玉煥爛國華所以僖宗天子仰我文昭睠我武烈龍光壓壘急使星馳綸綍便蕃大王風起尋以耿純試理盧植兼才披錦衣以耀家鄉握珪符而光松梓洎於昭皇飛升大寶禮遇元勲龍悦居雲鳬忻得藻嘉功賞徳金鳳之詔連飛表異旌優玉麟之符遂刻移南徐之藩翰就錢塘之江山節竦靈犀帳開神虎三千珠甲光爛星辰十二牙旗文生組繡碧幢纔建黄閣斯登乃兼鎮於越藩遂對封於漢節中天呈象雖分牛斗之疆夾岸烟嵐映出東西之宅四縣既食萬戸累加棨㦸立門赤油羅列山河誓劵丹宇瑩煌生祠之籩豆鏘鏘衣錦之城隍黯黯而又特逾漢制封我吳王茅分夏社之鄉桐剪周王之手昔也龍蛇起陸蹈湯火以戰爭此際山川出雲見君臣之際㑹迨夫濟陰王既傳天寶梁太祖遂應元苞於王不易范張之故情許結秦晉之嘉好恨無殊禮得展異恩於是追吕望之髙風擬山甫之美躅師尚父統攝三都作帝股肱尚書令總務萬機為天喉舌仍頒瑞節復踐髙壇建牙兼領於揚州分閫遥臨於楚甸尋命兵部姚尚書躬持鳳策逺泛鯨波備周官之典儀封越國之土宇八鸞四馬耀鏤錫以振鉤膺三節一王秉桓圭而垂元玉及龍徳嗣君即位禮稱伯舅尊曰父師寅兹烈光䖍奉顧命時遣吏部李尚書捧持綸誥諭曉湖浙受天下兵馬都元帥昔韓信對髙祖曰陛下能將將臣能將兵是知元帥非人臣之職曹蓋帝王之兵柄推於前代隋煬帝自晉王淮南行臺尚書令而行軍元帥無天下之號國朝肅宗皇帝駐蹕靈武因命代宗皇帝自廣平王而為之徳宗皇帝自晉王而為之梁太祖受九錫後而為之斯天下為元帥之故實其後龍徳帝復命兵部崔侍郎齎持簡册浮泛風帆揚往典於明庭促及時而建國奉召康公之命得以專征授康叔虎之封良由吉夢未久金行運息土徳中興莊宗皇帝鵬起并汾龍飛宋汴當宁不踰於旬朔臨軒寅謝於公卿曰吳越國王五十年來常作撐天之柱三千里外每為捧日之雲今兹將致小康實在敬尊元老於是鸞臺進擬麟趾摛詞典瑞獻功琢白珪而册文燦爛職金供命鎔紫磨而印篆盤珊重封吳越國王再授天下元帥馬遷十代史内固是絶倫柳𧦬萬卷書中必無往例其建國也大君有命明試以功自癸未而至壬辰備戰器而修王道先是中朝名邑在野遺人或負笈擔簦來投霸府或拆襦為袴而詣軍門奮揚於嘉物堂中曵履於靈鈞臺上至此水鏡裁鑒金册錫封並列庭臣皆居省署簪裾列傳文物髙光張伯儀陳宗廟之儀鄭子産獻公侯之禮豈謂難窮者大數莫究者彼蒼俄脱履於具區遽懸轍於正寢金山霧掩誰知帝召王喬玉海波空惜痛神辭李廣况十三州疆埸百萬姓黔黎咸長養於恩膏悉生成於化澤淚灑而晴光散雨愁凝而杲日沉雲鳥獸悲哀草木慘怛明宗皇帝宣太常而定諡法詔二卿而撰誄文鸞輅龍旂贈典優於鄧禹梓宫黄屋異數等於霍光得謂盡始盡終極榮極貴享九九之仙夀近帝位於一爻合萬萬之人心歆神道於千祀有後如此又何觖焉我天下兵馬元帥吳越國王當燕族之多竒承趙宗之後世嵩衡泰華秀氣俱騰海濟江河榮光共結是時嗣主誕我國祥紹經文緯略之基襲積徳累仁之業開襟奮臆仗雄傑於周瑜誓衆臨戎統豪人於張衮風儀則懸星溢目紫電揚矑霜雪凝肌魚龍入髪仙應有分貴不可知宋升聲姿尤開進對竇融詞氣惟是卑恭加以青雲常在於言談畏日不離於顧盼徐行緩步禇彦回却是趨蹌欹幘斜簪王文憲殊非蘊藉智畧則鮑叔錐矢應手而成徳業則顧和珪璋遇機方露逺者大者一剛一柔靜則心照鏡而貌懷氷含和六氣動則火炎山而湯湧海慴懼萬人機變則管荀才髙孫吳術妙身文虎豹變見不常義府戈矛短長迭用三雋才既為己任六竒策固無是遺郤縠詩書經綸國計項羽雷電振動兵籌徐睇而莫測金泉旁窺而罔知珠岸詞藻則清霜皓月絡繹綵箋芳草落花飄揚鏤管織成夢錦散出神霞英變屢竒張融之言信矣凌顔爍謝元葉之論宜然札翰則早受義方曾傳掣筆鸞回鵲返氣勢驚人金錯銀鈎縱横入木案牘無非筆陣宫寺爭耀寶牌崔宏之本草無光張育之柳蒲失色立功則我王初離太學始統親兵郭太子方欲平齊汝陰王乃思安漢屬鄰國侵軼命將曰李濤僅二萬兵下百里砦圍逼安國涎喙餘杭我王䖍誠訓辭遂升上將凌風授武黄石傳書親䝉韓奕之黄熊躬仗封文之白虎攻東南而畧西北事在機先掩五壘而出三門别馳神算於是斬摧大陣擒獲萬人道路隘於俘囚山川積於戈甲餘敵作氣既竭方遁於於潛我則乘勝追逐又奔於廣徳未出一百里之境復降五十乘之戎唱凱歌而喜氣連郊整班師而雄風掠地尋即大統龍艦逺征鼇溟巡江陰而収東州入海門而觀北固彼境遂陳舟楫逺出枝梧我則陳二廣於浪港沙前設三覆於石牌灣内零陵石灰風便爭投於蛟蜃窟中沁水火栰油燃盡葬於鯨鯢腹裏一戰定霸二紀無虞寰海具瞻將相迭耀聲光丕顯裴松為廟廊之人功業昇聞段襄居骨鯁之任爰自承嗣國構纘奉王基况當跪前之初又在寢苫之内芝蘭龍鳳三千餘口之家風鐵石虎貔二十萬人之軍府誠難撫御豈易輯綏我王以孝為模用仁作範無所不可唯言是從嘉惠寵靈供承花蕚油雲膏雨潤澤閨門此外習武益兵輕刑謹罰徳無脛而逺届名無翼而遐飛果動大朝繼鍾異寵三年之内兩策連封雙龍之金節齊行四馬之寶車並驟玉貝冠劍見王者之尊崇織文旂裳覩國家之貴盛我王因兹顯赫益動孝思無以荅先祖之恩無以報昊天之徳且曰武肅王有大功及天下大名振寰中庇生民則百萬有餘築城壘僅五十來處豈可不建廟貌不像真容為星紀之福宫作地戸之神主爰命興武中直都虞侯姚敬思於馬臻湖畔勾踐城中選闉闍形勢之中區得顯敞髙平之勝址於是楸杵俱下畚鋤齊興隠隠雷聲轟轟嶽震不十旬而展役匝千丈之隆基大梓文柟匪匠自泰山伐得宏梁巨棟匪神由漳水漂來雕鐫者王母天圖甃砌者赫連繡石斤揮斧運削出銀葩水鏨沙磨方成玉碣符元玉之嘉兆應神蓍之吉辰始乃架險梯虚雲構山屹陰虬回抱陽馬奔趨虎牙衡而枅栱連龍脊裒而欒櫨轉瓊瑶耀複道丹璧漆明簷鴛鴦之瓦縫界成芙蓉之磚文印出則以丙辰嵗秋八月十有七日我王具鹵簿鼓吹車輅旂裳北司侍臣南班舊列奉迎真像而入祠宫白檀雕出聖容黄金鏤成寶座儀刑酷𩔖神彩如生鳳目龍章顔猶不改垂斿被衮人見興悲禮器則爼豆犧樽軒懸則柷敔鐘磬後殿翟衣雉服父母賢妃露幔珠屏蝦簾象榻不異昔時秘寢皆同曩日深宫前則廣厦交陰芳亭對構紫石伏狻猊之影朱欄交菡蓞之光正啓重門並立神將侍衞兵仗矛㦸森然文武官班簪裾肅立直出甬道千步有餘河枕投醪波通射的蓮芰遶於水閣銅柱夾於星橋左則圍抱粉廊連延綺棟並圖曹署各列司存乃至早世勲官無祿公子皆塑儀像並配薦羞右則修廡飛甍綠牕丹牖神兵儀馬見雷電而沒風雲明竈淨厨備粢盛而享肥腯景物則髙彩矮繪粉竹金松夾砌名花連階瑞草烟嵐蓊蔚梗暹陰宫雲霧朦朧居然神府我王昔以致君之業累殄寇戎今立顯考之祠而修孝敬所以天朝繼封王爵以耀國章統帥天下侯伯卓絶殊勲洪業所謂炙地熏天書剡谿九萬之牋不能盡紀勒華山五千之仞亦恐難窮光業詞不夢於王椽才匪量於曹斗擬奚斯之頌或恐麤心對豫章之牖豈合措手但以二紀幕客千載庭臣不求孫綽擅名豈望楊修絶筆所希編述周答恩光爰感先王恭為銘曰崧髙嶙峋是生哲人天上獅子出澤麒麟籛樽殷爼剿引唐臣衣冠表裏文武經綸廣運將新大盜斯起雁象歘驚鳬毛亂委紫蓋蒙塵黄巾多壘既斁憲章又裂文軌武肅英王提劍東方龍行雲雨虎變文章孛氣沃酒妖雪歸湯洗滌星馳整頓天常計功彤庭圖形麟閣桐桂連編芳土續索三道犀幢八朝鳳幄丹劵家門錦衣城郭元帥天下國土具區六瑞琢册三品鑄符尚父四履尚書萬樞峻峩髙夀曦赫霸圖我王奉天為時而出傳寶應金繼明昭日國士無雙風華第一削樹平戎夢天受秩功既挺世徳義動天襲封二册嗣位三年金印國寶元帥兵權忠無瑕纇孝絶雕鐫未褫墨縗乃建清廟卧龍之東會稽之要嵐界迴廊粉明周繚廣殿露開重門岳峭瑞玉禮器香檀聖容民之祀主我之神宗秉翟執籥持鼓編鐘燃蕭燔膟㝠幣輸宗於穆祠宫煥為陰府五齊恒馨六佾常舞餚薦房蒸歌隨路鼔令子懿孫光今顯古浙江通志卷二百六十五
