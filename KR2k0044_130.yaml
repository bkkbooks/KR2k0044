body:
  text: 浙江通志卷一百三十一選舉九明進士宣德二年丁未科馬愈榜徐珙錢塘人知府徐璟錢塘人主事陳敏政長興人知府盧珫臨海人御史李匡黃巖人右都御史趙鼎黃巖人會元杜寧天台人榜眼侍郎吾肇開化人兗州知府徐朝宗分水人廉使任鳳永嘉人御史范霖樂清人御史宣德五年庚戌科林震榜楊寧錢塘人刑部尚書逯端仁和人刑部貟外宋璉秀水人南雄知府陳惠鄞人王復慈溪人主事陳璣諸暨人會魁許南傑餘姚人楊誠新昌人左僉都御史王偡臨海人刑科給事中范宗臨海人知府陳員韜臨海人布政使石孟康天台人范理天台人吏部左侍郎葉儒林寧海人御史毛羽江山人林補永嘉人編修朱良暹永嘉人僉事胡奧永嘉人刑部主事葉錫永嘉人寧國知府薛希璉麗水人刑部尚書陳詔青田人會元葉遄青田人僉事李棠縉雲人刑部右侍郎宣德八年癸丑科曹鼐榜趙智秀水人林茂秀水人知府陸矩歸安人僉都御史陸謙光鄞人主事陸瑜鄞人刑部尚書王用慈溪人郎中竺淵奉化人參議俞僴諸暨人知府何瑄餘姚人舒瞳餘姚人知府陳金上虞人侯潤臨海人給事中侯臣臨海人布政蔣針臨海人刑部郎中林灝黃巖人刑部郎中項文曜淳安人侍郎梁宏永嘉人鮑輝平陽人刑科給事中正統元年丙辰科周旋榜相佐錢塘人給事中蔣忠仁和人常州知府孫鏞昌化人給事中沈淳嘉興人吏部貟外戴瑺嘉興人錢奐鄞人參政劉垔慈溪人郎中余忭奉化人禮科給事中秦瑛山隂人章瑾會稽人侍郎趙象臨海人湖廣按察使楊玨臨海人按察使王忠臨海人知府陳瑊臨海人布政林璧黃巖人吏部郎中章陬黃巖人兵部主事王彥俊黃巖人兵部主事濟汪天台人郎中陳圭金華人江西右參議周瑄淳安人副使周旋永嘉人狀元左庶子陳鈍樂清人吏部郎中蔣希性縉雲人陜西參議正統四年己未科施槃榜倪謙錢塘人探花禮部尚書鄒幹餘杭人吏部尚書豐慶鄞人章繪鄞人布政使張塘慈溪人主事姚堂慈溪人參政劉煒慈溪人參政周濛奉化人僉事謝琛定海人同知俞鐸新昌人雲南布政使郭仲南蘭溪人貟外郎胡拱辰淳安人工部尚書章綸樂清人禮部侍郎正統七年壬戌科劉儼榜張瑛錢塘人章文臨安人山東參政吕原秀水人榜眼大學士項忠嘉善人兵部尚書太子太保于璠嘉善人給事中沈琮平湖人廣州知府沈彬武康人刑部郎中宋儒鄞人江西僉事錢森慈溪人參議劉懷慈溪人僉事田玹奉化人主事江淵奉化人主事吳節餘姚人郎中聞人韺餘姚人御史潘英餘姚人御史羅澄上虞人僉事吕昌新昌人按察使謝睿臨海人戶科給事中尹綋臨海人王欽黃巖人徐簡黃巖人張純黃巖人大理評事童守宏天台人行人包良佐蘭溪人葉春開化人郎勝建德人僉事姚夔桐廬人會元吏部尚書太子太保姚龍桐廬人布政俞鑒桐廬人南昱樂清人大理寺副陳璣平陽人江西參政洪繩青田人主事徐善縉雲人正統十年乙丑科商輅榜夏時正錢塘人南京大理卿沈和仁和人撫州知府姚哲海寧人副使陳濂鄞人都御史金亮鄞人郎中史敏鄞人參議盛琦鄞人知縣髙閠山隂人郎中季駿會稽人僉事曹得蕭山人僉事陳詠餘姚人陜西按察僉事陳雲鵬餘姚人廣西布政使朱縉餘姚人知府王鉉上虞人參議葉冕上虞人都御史姚恭臨海人御史徐彬黃巖人僉事童存德蘭溪人樓澤永康人葉武開化人刑部貟外葉文顯建德人應皓淳安人參政商輅淳安人三元少保吏部尚書謹身殿大學士正統十三年戊辰科彭時榜沈敬錢塘人廣西布政楊宜錢塘人廣東副使張寧德清人知府洪常鄞人郎中李尚慈溪人知府桂怡慈溪人副使周翔慈溪人知府陳璘奉化人御史舒廷謨奉化人評事王勤會稽人參政楊文琳餘姚人布政鄭顯臨海人刑部主事髙瑛黃巖人按察使徐琅開化人知府何升淳安人方輔淳安人參議余復遂安人江西左布政景泰二年辛未科柯潛榜童緣錢塘人編修吳誠錢塘人副都御史朱鏞仁和人參政唐泰仁和人鴻臚少卿王獻仁和人禮部左侍郎江玭仁和人山東參政章亮仁和人御史楊昶仁和人參政張瑄仁和人彭信仁和人應天府尹劉泰海鹽人庶吉士御史沈珒平湖人御史楊青桐鄉人僉事楊守成鄞人禮部尚書章規鄞人少卿項愫奉化人山西道御史沈性會稽人知府邵能會稽人郎中戚瀾餘姚人編修陳嘉猷餘姚人通政俞欽新昌人兵部左侍郎曹衡臨海人吏科給事中謝燫臨海人參政羅洪黃巖人林鶚黃巖人刑部右侍郎應欽黃巖人廣東副使夏塤天台人右副都御史鄭佑常山人福建副使鄭林常山人兵科給事中邵思祥常山人思南知府宋旻淳安人右都御史洪弼淳安人貴州左布政徐安行永嘉人刑科給事中婁濬永嘉人僉都御史鍾清瑞安人福建布政金文麗水人庶吉士開封知府景泰五年甲戌科孫賢榜沈富錢塘人廣南知府楊懋錢塘人何琮仁和人兵部右侍郎李昂仁和人副都御史王鉉臨安人禮科給事中王欽新城人伍方嘉興人武岡知州金禮秀水人雲南參議施竒嘉善人太平知府李景孟海鹽人莆田知縣張寧海鹽人禮科給事中沈聲崇德人太僕寺丞水桓鄞人知縣黃隆鄞人副使嚴端鄞人主事董琳鄞人御史錢璡鄞人布政孫忱慈溪人知縣鄭岑慈溪人參政桂琛慈溪人御史江勛奉化人按察使劉洪定海人參政吳顯山隂人郎中唐彬山隂人布政金澤山隂人御史章瑄會稽人太僕寺少卿孫輝餘姚人成都知府陳雲鶚餘姚人袁州知府陳雲餘姚人文選司郎中徐海餘姚人廣東按察副使胡寬餘姚人御史毛傑餘姚人魏瀚餘姚人江西右布政毛吉餘姚人廣東副使夏時餘姚人庶吉士僉事謝廉嵊人河南參議周一清臨海人知府范文臨海人廣西參議謝省黃巖人知府魯