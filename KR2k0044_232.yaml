body:
  text: 浙江通志卷二百三十三寺觀八衢州府西安縣附郭大中祥符禪寺嘉靖浙江通志在府治西北太平寰宇記吳將軍鄭平捨宅建𢎞治衢州府志梁天監三年額曰鄭覺唐神龍間改龍興宋大中祥符初改今名宣和間重建佛殿元至元十一年燬二十五年僧文衡建法堂大德六年嗣曇建大雄殿泰定二年杭淨慈寺僧義山主席完飾殿堂塑繪佛像黃溍修祥符寺記衢之祥符舊傳吳將軍鄭公平年九十有三捨所居為寺其逮元已不啻千載中間厯幾廢興皆無所於考由至元丙子兵燹之餘龍象散亡人天推慕者又五十年於此矣泰定乙丑義山來主兹寺慨焉以興復為已任因前人所作三門大殿加蓋瓦級甎而髹彤藻繢之造佛菩薩神像十有一軀創東西廡寶塔珍臺煥焉畢新室堂庖湢繕治以次以七載之勤成就如是而不敢遽以為足謀所以崇役之未已也其徒咸共慶幸伻來屬溍書其所欲道者如此西安縣志明洪武十三年僧淨乾葺鐘樓十五年設僧綱司嘉靖七年火止存荒址改為西安縣學其兩旁墻外隙地量與僧居改為祥符寺萬厯年間郡守易公倣之重修其後日久傾圯國朝康熙三十年僧本修募建正殿三十五年又建天王殿重修後殿靜室三十七年建山門巍煥如故天寧萬壽禪寺𢎞治衢州府志在府治西梁天監三年臥雲禪師創名吉祥唐玄宗朝改開元宋改報恩光孝寺復易崇寧未幾賜今額明洪武十六年建大雄殿永樂元年僧道永遷殿宇西南向崇禎衢州府志正德元年燬先有金華定光古佛坐化於此真身漆布祈禱有應及火厥體巍然獨存西安縣志天啓丙寅郡守舒崇功知縣賀康載邑紳方應祥等捐資建正殿崇禎己巳郡守蔡三復等重建天王殿有蜀僧大德來主寺建後殿佛閣國朝康熙四十年殿災住僧勤生募建西安縣城外寺觀南禪顯聖寺𢎞治衢州府志在城南三里梁天監年間嵩頭陀建舊名鎮境宋至道元年建水陸道場感夢熙陵御筆改今名趙抃在朝時有僧廣教來主其寺公送以詩云到日參徒耳目新桃花一笑已中春吾今告老還家近亦是柯峯自在人寺之圃西鄰大溪公作亭其上扁曰觀瀾其寺有瑞石將軍祠靈應特異國朝康熙四十八年衢州總兵官李乾龍捐資重建置田百畝藥師寺衢州府志在城西二十里梁天監三年建程秀民藥師寺記寺據郡上流為一方之鎮其廢興靡常元末燼明洪武間僧妙法創復再火於成化正德寺之殿宇旋修旋毁竟無完美嘉靖癸未會昌侯孫公果銜命過衢憩於寺慨然捨金丙午郡守楊公子仁捐俸命僧道嵩任其事告於四方有鄭君曰鍾曰鏓曰淓者傾資以主緣乃於東隅造樓三間髙三層約七十尺上懸巨鐘聲聞十里工始於嘉靖戊申十二月明年冬訖工豫因道嵩之請而記其嵗月湧泉寺西安縣志在城西北二十五里晉天福間建後燬明洪武初重建寺有泉於平地湧出如趵突虎跑狀冬夏不竭溉田十餘里花塢寺西安縣志在城西二十五里地多桃梨春明日為遊觀之所土人於塢中時聞鐘鼓聲因而建寺國朝順治間僧型山説法於此故城寺崇禎衢州府志在城南亨衢鄉乾德二年建相傳為殷浩故宅明教寺衢州府志在城北二十里宋太平興國元年谷口鄭永等建國朝康熙二十一年僧慧雲重建資忠顯親禪寺衢州府志在城西北三十五里勝堂源宋熙寧間樞密何公建功德院久廢國朝康熙三十一年天寧寺僧勤生重建乾明寺衢州府志在城南三十五里舊名開明禪院宋端拱元年改乾明寺程俱有記明果禪寺衢州府志唐建內有傳法堂白居易為記開元寺衢州府志在城東南十五里唐神龍元年建開元初改今名明季燬國朝順治間重建蓮花寺西安縣志在城北四十里蓮花池上𢎞治衢州府志宋建隆中建國朝康熙五年雲間僧乾敏來宿發願建石橋於此橋下為放生池寺後圃中有湧泉一泓即其迹也法光寺𢎞治衢州府志在城西南六十五里唐會昌元年建鄭吉士法光寺詩蕭寂松關路門前負手行亂峯含雨氣古洫走泉聲樵徑霜林暝僧房夜火明草牀聊寄宿簷溜滴殘更轉輪禪菴舊浙江通志在青洞峯金華聖者轉輪處也方應祥增築倚雲山房與徐日久讀書其中光嚴寺衢州府志城東四十里清平鄉周廣順間建三藏寺衢州府志城東四十里舊名淨剎梁僧崇禪師建能仁寺衢州府志城南德懋鄉唐政和間賜額地藏寺衢州府志上寺在城西三十五里石晉開運二年建下寺在城西五里漢乾祐年間建太平寺衢州府志城北三十五里後唐天成間建宋淳熙戊寅年楊適有記崇勝寺衢州府志城北四十里宣風鄉唐元和元年大徹禪師建玉泉菴衢州府志城北五十里宋景德年間古佛開山國朝康熙三十七年僧明夀重建靈鷲菴衢州府志城北四十里古梵竺菴國朝康熙十四年僧戒生重建今名小九華佑聖觀衢州府志在清平鄉宋道士陳大名建仙集觀嘉靖浙江通志在爛柯山下相傳宋真宗嘗賜玊斧劒西安縣志里民因雙白鶴集此而建中有對奕二仙及王質與質弟貴像龍遊縣靈耀寺衢州府志在縣治西百餘步為姑蔑子故宫址晉義熙年建縣令祝聖講約於此為龍邑首剎萬厯龍遊縣志寺後有諸天閣其伽藍神謂是姑蔑子其像猶作進賢冠龍遊縣志舊名靈光寺宋紹聖間易今名𢎞治衢州府志後燬元至元乙丑重建龍遊縣志嵗久圯明天順間知縣王瓚重修萬厯辛亥知縣萬廷謙重建廊宇東西各若干間大闢門闌臺墀萬延謙重修靈耀寺記由新以之圯因乎時援廢以為興存乎人夫今卑而有土與民之責地方之廢墜有不容不修舉者龍遊靈耀寺久矣庳陋不治豫謹念左右階序於此觀禮必厚棟大梁邃庭髙門然後可以上充揖讓下周步武由是殿宇聿新百室盈堵經始於萬厯三十八年十一月二十五日落成於四十年二月十二日麋費千緡有竒夫天下之事作者常欲其久存而繼者每至於圯廢使繼者皆如始作之心則可以亘遠而無敝此豫所為記之之意也國朝順治間寺僧募緣重建未竣康熙十九年復為狂風所毁知縣盧燦捐俸首倡勸募重修證果寺崇禎衢州府志在縣東四十里宋濓證果寺記證果道場始於唐貞觀初縣人虞道延捐宅為之悉入陂田其中已而祝髮受戒為開山第一祖稱曰虞延法師云唐季變為瓦礫之區宋初休堂慧公重興無幾又廢今住持靜山仁公捐私槖以為衆倡遂造釋迦寶殿演法堂藏經室鐘樓崇廣嚴麗視昔有加往來觀者咸謂象教衰落之時能化灌莽之境而為無上寶坊非賢而智者能如是乎舍利寺萬厯龍遊縣志在縣東三十二里𢎞治衢州府志宋明道二年建中有白塔趙抃記慎東美書趙抃舍利寺記古午未之地有舍利塔院年祀彌遠棟壞梁仆邑人江延厚遽新其廢建釋迦殿增葺法堂方丈門廊官院無慮用四萬錢起明道二年九月九日迄慶厯四年六月十九日成明年十月十二日始為記銘曰修身治心得佛之深清淨慈智乃佛之事相好顒顒金碧穹穹雖曰外飾俾人內恭斯廟有塔是瞻是崇完堅弗隳永焉無窮嘉祐二祀素秋之季建者江氏銘以為識王守仁舍利寺詩經行舍利寺登眺幾徘徊峽轉灘聲急雨晴江霧開顚危知往事飄泊長詩才一段滄洲興沙鷗莫浪猜國朝康熙十九年知縣盧燦令僧重修烏石寺嘉靖浙江通志在縣北四十五里𢎞治衢州府志舊名幽巖宋政和二年建紹興二年嶽鄂王張魏公俱有題識成志寺崇禎衢州府志在杜山唐杜如晦憩於此捨宅為寺回瀾寺龍遊縣志在縣東十里鳳翔洲上宋時永福寺舊址久廢明知縣萬廷謙重建於浮杯塔前明季傾圯國朝康熙四年知縣艾朝棟重建俗名銅佛殿聖壽寺萬厯龍遊縣志在縣南五十里髙僧懶牧坐化於此有塔崇禎衢州府志梁天監三年僧嵩建資福寺萬厯龍遊縣志在縣南三十里宋寶祐間建有田七十三畝為宋侍郎呂好問置以祀其曾祖防龍邱寺衢州府志在縣東四十里嵩頭陀創建江總有詩法安寺衢州府志在縣南十里唐天祐中建瀫水寺衢州府志在縣東北十五里晉天福中建龍洲菴衢州府志在泊鯉灘下亦名文峯菴石舟菴衢州府志在縣北四十五里有竒石如舟環以清泉其水可愈疾清梵菴龍遊縣志在縣治西二十五里俞恂清梵菴記菴舊為青瓶殿南有塘環數十畝許相傳姑蔑子埋青瓶於此其後漁者深夜取魚有光熊熊網而視之青瓶在焉其欵識蓋上古間物也殿以此名而或又曰先朝𣙜酒務也故至今發土往往得青瓶云環塘村落數百家以殿為里社嵗時􅓙禬祈報於此至萬厯間中廢里人方明敬更為營建以青瓶名近俚改顔清肥是時尚為道院蓋取道經玉池清水上生肥之語也崇禎末年寺僧靈源建大士閣左右翼以僧寮遂燦然為浮屠精舍而武林葛屺瞻侍郎來遊復顔以清梵之目向之所謂青瓶者蓋至是凡三變矣靈源營構既竣恐異日或有失墜因置寺田若干畝以永香火而請豫一言以勒於石崇仙宮明一統志在縣東梁大同中建即鄷去奢升仙處玄真宮龍遊縣志舊稱女宮在治西一里宋端平中馬侍郎天驥女施宅建李仔玄真宮記玄真宮者故宋樞密馬公驥之第也初公無子一女曰時閏為前浙東肅政廉訪使黃頭公夫人亦無子黃頭公卒夫人嘆曰我雖無子賴有他室子可以嗣其宗顧吾以一身承先人顯宦之餘而使他氏繼之勢或不能以永思所以永之者莫若身為老氏學於是因第之廳事為禮神之庭堂為集衆之地其餘庖湢廩田皆因馬氏之舊官其地者以事聞上嘉其義為降璽書曰有司徭役其無與凡若器賄土田強有力者不得奪特賜金額號時閏純靜守貞端靜法師提點宫事夀昌尉胡天祥為豫言且徴記焉集善宫𢎞治衢州府志在縣西東華山下梁大同四年建元至正間縣尹張塔喇蘇遷創於此常山縣圓通寺常山縣志在縣南百步外舊名觀音院唐貞觀元年建宋治平元年重修明萬厯十年正殿傾圯募緣重建昭慶寺衢州府志在縣西里許常山縣志即西髙峯下也唐垂拱二年建舊名惠安宋祥符元年改今名紹興甲子圯趙籛夫捐金募建佛殿後壞明洪武十五年又建正統六年玊山尹林岱等再修併建兩廊嘉靖十五年寺僧明升明順復整佛殿易其柱一乃桐木也邑人爭取為琴其音清越四十年屋圮署縣通判張澤召圓通寺僧法善住持募緣重整王玄昭慶寺詩遠公蘭若萬山中問度重來午後鐘窗外白雲飛不去只因長護鉢心龍華嚴寺在石崆山唐宋古剎國朝順治初住持立濤重修推官孫魯建潄石亭於山上厯久圮雍正十年錢塘許鉞客遊常山愛石崆之勝修寺重構潄石亭復於寺西建拱緑亭赤雨樓十二年鉞之子演又作問莊亭許鉞拱緑亭詩緑暗連天碧亭臨空翠間雲流千竹逸風靜萬松間春愛溪邊水秋憐寺外山清襟時對此忘却鬢毛斑又赤雨樓詩秋杪憑欄望霜林古寺間一行征雁急數點白鷗間偶讀登樓賦時看落帽山攴公共茶話香斫鷓鴣斑欽教寺𢎞治衢州府志在縣東二十里舊名欽教院唐貞觀三年建元至正壬辰燬明洪武十年建常山縣志萬厯十二年縣令傅良言修復之保安寺舊浙江通志在縣北二十五里吳越侍御史江景房建𢎞治衢州府志宋崇寧五年重建程俱保安寺記常山縣之謝源有保安院蓋江氏之祖侍御公之所建自侍御之世滋逺厦屋日圯開化報德院僧文雅以身律衆日劘月案凡六年而後成其基則因故地闢之稍前又益東築室靣勢以便川谷之宜於時距始建百五十九年矣侍御有髙行為鄉里敬信初里人有訟纍不得直公貽書執政道其寃事直里人進金十鎰以謝公笑斥之里人置金去終不得辭則以金買謝源地構保安寺云景房之孫丞相萬里繼增田土而寺