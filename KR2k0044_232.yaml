亭廢建德縣志明永樂二十年僧自忠重建萬厯二十年僧真宿重修馬仲珍遊圎通院詩山空不隱響一葉落還聞龍去遺荒井僧歸禮白雲蟲絲昏畫壁嵐氣濕爐熏睡思殊無奈茶甌易䇿勳趙抃書圓通院水閣詩風送荷花香滿闌上人宴坐水雲間時中靜極光通逹豈特浮生半日間尊宿菴建德縣志在小西門外一里唐時僧道明織蒲鞋養母處人以其有退黃巢之術稱為尊宿屢建屢圮國朝順治年間知府袁一魁捐俸修康熙十四年僧西臺復修粉泉菴嚴陵志在縣西北烏龍嶺菴下有泉從石竇中流出色白如粉因名淳安縣轉教寺嘉靖浙江通志在縣治西晉升平中建嚴陵志宋天聖中詔新之元至元六年重建俗名西寺僧會司在焉冬至等節習儀之所明𢎞治四年知縣劉箎重修貢師泰建德路西寺詩山門東轉步廊深長日禪房占緑隂松徑雨晴添虎迹竹軒風冷聽龍吟上林久説相如賦故里徒誇季子金獨坐匡床看明月不知涼月濕衣襟龍華寺嚴州府志在縣南和義鄉嚴陵志舊名永泰寺圖經云寺有寶大二年都嵒將方鄴等乞重修狀後判依執押字又有寶正三年睦州請僧住持帖後繫司空判軍州事郭押皆見存按寶大寶正皆錢氏年號則此寺建於五代以前也宋政和三年以犯哲宗陵名改今額龍泉寺淳安縣志在縣東五十五里舊名龍泉院唐咸通七年建有泉一泓能出雲雨以蘇旱乾疑有龍在焉因名宋政和六年縣人裒錢一新諫議大夫江公望為之記普安寺舊淳安縣志在縣南二十里宋建隆三年建明成化十八年邑人商輅新之中有文毅公祠長子侍講良臣次子少卿良翰配享焉隆慶四年知縣鄭應齡重修石佛寺舊淳安縣志在縣南三十里宋乾德元年建相傳富常潭有石佛見長六尺五寸迎置於院因名焉靈瑞院嚴陵志在縣東四里舊係靈嚴道宫漢乾祐二年改為僧院易今名元元統二年僧如琪重建明景泰五年僧普惠新之俗名東寺胡拱辰靈瑞院碑記靈瑞院前代建竪聖朝定制萬夀節與千秋正旦長至先三日在外文武羣臣預擇近地佛氏居習慶賀禮至期則行之公署淳安縣郭外東則是院在龍山之陽去縣四里西則轉教寺在雉山之隂去縣二里其地皆明敵靜幽可以嵗習是禮亡何而院之殿閣漸圯住僧普慧募衆緣修之山門內外位置竑深像設完美願力既竣樹碑於山門請豫記其始末凡百檀越悉列之碑隂舊淳安縣志明隆慶三年知縣鄭應齡又於寺後龍山巔建碧霞宫題曰龍山第一宫柵源院嚴陵志在縣東北昌期鄉圖經云院有至道三年知縣事孫讜撰重建殿宇記云越王勾踐襲吳兵行之際於此源口立寨柵寺因地而稱又曰寺有聖者像鄉民嵗時旱暵禱必獲應又曰院壁得咸通十三年沙門師魯書武宗詔毁天下佛寺聖者之像巋然曾不焦壞洎象教復興吳人王璿得之於山塢泥潦之中相好儼然益彰是教之不可泯如此龜石菴嚴州府志在縣西十里舊名溪心寺一名小金山寺左右石洞可以納涼前有山橫出半江上有水陸寺登臨者目為小金山下一石臥灘若龜曵尾名曰龜石灘程敏政龜石菴詩千尺波心得異觀水雲中鎖碧巑岏蛟龍近窟蟠根久鸛鶴危巢墮影寒白社可能專佛印紅塵曾不到漁竿他時浮玊論形勝擬酌山靈説二難尹山菴嚴州府志在縣西南七十里淳安縣志宋淳熙七年建其佛汪姓越國公華第八子也修真化此蓬山菴舊淳安縣志在縣西七十里萬花谷口對方壺嶺故名倚蓬山下瞰大江上有石洞蝙蝠集於其中見人則飛舞撲靣天樂觀嚴陵志在縣東北四十里五代漢乾祐元年建宋重和元年賜今名方聞天樂觀記淳安宫觀有四皆廢無有惟天樂觀獨存耆舊相傳觀本在常樂鄉文高里昔因洪水漂泛聖像至昌期鄉湖山下止焉從而建立於此村氓指舊鄉名之云常樂觀創始於五季乾祐增修於國朝乾興殿廡幽深不侈不陋溪湖回環嶺岫巍峩逈出塵境徽宗皇帝欽崇天道向意真風詔天下宫觀三十間以上者賜額郡守許堯夫以聞得旨以天樂觀為額實重和元年九月未幾燬道士胡知章募緣重建所賜敕額摹刻於石因敘始末於其下以彰不泯桐廬縣圓通寺嘉靖浙江通志在縣西唐會昌中建嚴陵志名聖德寺宋大中祥符七年賜今額寺有觀音像祈禱輒應有一泉名曰稱心味絶甘昔有老僧欲植萬松於路鄉人慮其蔽田訟於縣縣以符詰之僧答以詩曰本不栽松待茯苓只圖山色鎮長青老僧他日不將去留與嚴城作畫屏事遂已殿宇嵗久圯明洪武八年僧安隱重建金維林圓通寺詩遠公蓮社碧山隈愧我來遊未姓雷狂象到門依忍草飢烏隨磬下生臺虛堂影寂留枯木老衲心空悟劫灰聞説三車皆妙諦諸天終日散花來國朝順治年間僧海德募建巍煥倍昔新會寺新定續志新會院居萬山間地渴水宋紹興間有羣蜂屯佛殿側僧鑿之得甘泉桐廬縣志在縣東十里元末燬明洪武中僧妙雲重建鍾山寺嚴陵志在縣西三十五里舊名鍾山院唐大厯中建方慤留題云地因鍾氏建招提世傳鍾氏居此山百餘年忽一夕杳冥中聞鐘磬聲空中夜有光遂捨宅為蘭若舊有五色舍利及輪藏宋康定間僧思藴鼎新方鼎鍾山寺記桐廬山回水繞道迂徑曲陂陀蜿蜒行十餘里峯巒環合而鍾山秀峙於其間山之麓有故蘭若在焉榱棟傾頽蓋有年矣宋康定初主僧遇明完葺未就繼得思藴上人白業夙著清衆所歸勤勞晝夜彌三十年而結構一新經制有度丹楹刻桷之璀燦塗金甃玉之晶熒與夫茂林修竹長松古檜蔽虧而隂森此所以嚴妙相而崇法宇也窗牖之虛白泉石之潺湲煙引幽磬發晨講暮誦雲瓶虎錫嘯咏而翺翔此所以集淨衆而闡真乘也噫事之廢興常在乎人憂勤作其始而佚樂居其後古之道與思藴用心不懈能成其志如此故豫樂書其事以告其徒庶知經始之勤而異日無隳其成也厯元傾圮明洪武十六年僧德彰重葺桐廬縣志萬厯年火重建長樂寺新定續志唐乾符間吳琠捨水竹園為寺桐廬縣志在縣西南梧村明洪武二十二年僧時茂重建成化十二年僧懷端葺之寧因寺桐廬縣志在縣西北十五里梁天監二年中書舍人劉元珦捨基為之明洪武年重建淨土寺嚴陵志在縣西北三十五里舊名淨土院晉天福九年建相傳淮海王嘗賜鐡塔一座今無存宋大中祥符間賜今額元末燬明洪武四年僧法景重建嚴州府志正德中僧惠升復新之靜居院嚴陵志在縣西北法華山下新定續志晉髙僧曇翼誦經之所桐廬縣志明洪武四年僧似嶽重建大鐘院嚴州府志在縣西北三十里院有大鐘故名桐廬縣志在清涼山下周禪師道場也明洪武年建後圯崇禎年重建紫霄觀明一統志在縣東儒學右晉時郭文常往來於此既而白日上升邑人因塑像建紫霄宫以奉祀之嚴陵志舊有靈耀郭真君像即文也唐末鞠為荒榛邑人即其基建應祈普通院宋政和六年詔還為道院增葺宏麗經方臘亂悉燬後相繼興修元末兵燹止存石柱山門明洪武二十年道士皇甫志隆重建宣德中道會吳太素復新之洞明宮桐廬縣志在縣東四十五里新定續志宋嘉定間道士張守廉請遂安廢額建嚴陵志龍虎山道士張守廉來遊吳越道經富陽鄉民訴有妖魚為患守廉投以鐡符遂息鄉人感之相與結茅於碁盤山未幾徙居桐廬松山之陽四方羽客聞風輻輳乃益廣其居號為東陽洞嵗久傾圮明洪武二十九年道會張本立修葺宣德四年道會方可循等重建紫微樓靈應殿遂安縣無礙寺萬厯遂安縣志在西門內嘉靖浙江通志唐貞元中建嚴陵志舊名無礙院明天順間僧文升重修吳良無礙寺記遂自唐代肇剎賜額無礙至洪武中扁為第一山蓋前峙婺宿織嶺筆架諸峯後擁五獅襟帶仁義兩山龍宫紺宇樓閣參差笏檀香積厯千餘載信我遂第一山也後為祝釐之所國朝康熙五十二年知縣陳學孔重修惠安寺嚴陵志在縣東二十五里唐時建明天順間僧永祐重修寺前有羅漢松二株大數十圍相傳為開山僧所植自唐迄今殿宇屢毁而二松獨蓊然對峙於門之兩旁焉靈巖寺萬厯遂安縣志在十七都遂安縣志唐大厯中建宋天聖中賜額廣法禪院明成化間僧思繹增建廊廡易今名慈雲菴遂安縣志舊名柏山菴山水幽靜竹木森疏為一邑勝明萬厯間僧無量募建毛升芳遊慈雲菴記癸丑秋豫燕遊歸會諸子於慈雲禪院時霜威方作平疇秀衍疊嶂參差秋容衰颯紅林如繡相與拾級循途攀援登躋螺髻諸峯回視漸下矣巒回徑轉有亭翼然荒榛斷梗與敗址頽垣相次數折而上平岡松篁檜柏蔭日籠隂寒氣入人衣也折而東石室聳出山門之左有池一碧泓然循大雄殿而西斗室軒朗澄池淵寂前有修竹萬竿敲金碎玉令人魂夢清映也公山菴嚴州府志在縣北十七都方象璜公山菴詩磬定風不喧嵐收日正曉却疑人影來山犬吠飛鳥怪石堪娛客亭前自作供時時風雨動一片鐡芙蓉語石菴遂安縣志在縣西五里多竒石向沒榛莾中明天啓間邑人薑習孔建上有薑公祠乳洞菴嚴陵志在縣南八十里宋紹興間官兵擒繆羅於此其鄉人建屋居僧兼奉孔釋以化暴戾云明宣德間燬僧智安重建胡子澄遊乳洞菴詩結屋青山下幽深不記年泉聲秋霽雨鐘響暮晴天入洞尋僧伴穿雲見鹿眠徘徊不忍去夜宿佛堂前洞神宫明一統志在遂安縣西百餘步宋紹興間龍虎山道士倪太和遷於今處新定續志舊在縣西四十里額存宫廢縣嶽祠東偏舊有道院紹興間縣白郡以宫額𨽻焉因為祝釐之地吳貫之洞神宫醮堂記萬年鄉舊有洞神宫廢久矣紹興初載有道士倪太和自龍虎山來寓岱嶽行宫東偏草創數楹卑陋逼仄不足以奉髙真常請於郡復洞神之名欲增廣之郡許請於朝久未報紹興十有七年夏五月吳興錢公來宰是邑視事之初祗謁祠下立無廡升無階不足成禮公退而嘆曰星流華渚伸萬夀之祝雨暘不時致請禱之誠所不可忽也爰庀材僦工芟蕪棘闢庭廡堂宇一新貌象畢陳以十八年二月六日經始三月十二日休工蓋其經畫先定故見於事如是之敏也嚴陵志厯元嵗久傾圯明洪武元年道士胡至柔重修夀昌縣大廣安寺嘉靖浙江通志在縣治東南唐乾元中建嚴陵志名永寧寺宋改廣安宣和間燬縣人新之元皇慶間復燬僧克又新之詔賜今額方道睿大廣安寺記寺在夀昌縣萬松山沙門為國祝釐之都道場也開基於唐守一禪師寺名永寧我朝曰大廣安寺成宗皇帝特旨也大德初奉玉音賜黃金錠一西番布百匹武宗皇帝元年載奉特旨仁宗皇帝正位宸極又降特旨凡以護持寶地鞏固皇圖山門之盛可謂至矣延祐乙卯季秋九日寺燬僧克潛謀新捐資募建自延祐迄至正凡三十載增田肯構乃克完美夫梵教莊嚴周遍遐邇藐兹一山屢奉絲綸皇恩寵渥非大願力能致然耶嚴州府志明正德初改建儒學仍存其東隙地嘉靖間提學陳儒以其地入儒學建啓聖祠乃改建寺於南門外明一統志寺僧靜綱與民間易地建寺南門內聖迹寺嚴陵志在縣東二都舊名聖迹院晉天福元年建宋紹興二十八年里人重葺夀昌縣志明嘉靖間寺僧元亨重建前殿萬福寺嚴州府志在縣西七都唐大厯中建相傳時有石佛從地湧出今石佛猶存朱佛菴新定續志在縣西崇恩院側有塑於龕者曰朱佛嵗旱祈禱輒應相傳昔有農朱姓耕田誦佛於此遇亢暘常有雲覆之諾人以雨輒驗邑人指為活佛後趺坐示化人為立菴宋寶祐間知縣劉廉狀其靈異請賜號崇因寺嚴陵志在縣西八都舊崇恩院宋紹興間樞密葉義問建以奉朱佛香火請額於朝曰崇因報本禪寺咸淳壬申僧時芳重建今寺有樞密像存焉洞巖寺嚴州府志在縣西北十都宋明道二年建有靈棲洞嵗旱禱雨輒應嚴陵志元泰定元年僧如蘭重建真覺禪寺夀昌縣志原名宋公菴在縣西門外宋元祐間建國朝康熙十二年知縣羅在位捐俸寺僧寂斌募建後殿及觀音閣分水縣慶雲寺嚴陵志在縣南慶雲山下唐長慶中以雲見名山即山建寺亦以名焉元大德三年僧智明重建嚴州府志明正統間邑人王友諒修嘉靖甲子重新之安禪寺分水縣志在縣西三十里梁大同二年建嚴州府志明洪武五年僧懷仁即舊址重建玉瑞寺嚴州府志在縣北三十里寺有石佛新定續志石佛長不盈尺舊傳陳時所造嚴陵志舊名國榮禪院周顯德元年福巖將花應重建元末燬明洪武初僧慧俊正統間僧妙祥相繼新之月溪院分水縣志在縣西北四里宋乾道六年建嚴州府志明正統成化相繼新之萬厯四年僧會隱仙募緣重建陳良月溪寺詩磴道縈回幾曲登好山四面列雲屏半空青碧前朝寺雙澗流寒六月冰講座參禪能演梵法堂迎客且談經酒酣日暮尋歸路落葉秋蟬處處聽保寧塔院嚴陵志在縣南慶雲山北宋慶厯八年邑民范衍建浮圖五級嚴州府志元燬山嶺有石靈異巖下水泉不竭舊傳此水通潮有龍焉院崇禪教明𢎞治間僧道堅移建佛殿於正巖之上嘉靖十一年道人德興重建千佛菴嚴州府志在縣東南十里相傳昔邑人方子客以母病即山巖石鑿千佛以禱之因創菴浙江通志卷二百三十三
