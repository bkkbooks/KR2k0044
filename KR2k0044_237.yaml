body:
  text: 浙江通志卷二百三十八陵墓四紹興府山隂縣越陳音塜嘉泰㑹稽志在縣西南五里是為陳音山音善射者范曄記云其塜壁猶畫作騎射之像漢靈文園明一統志在山隂縣境漢文帝薄太后之父卒葬於此漢㑹稽太守馬臻墓紹興府志在鑑湖舗西𫝊詳名宦漢下邳令謝夷吾墓嘉泰㑹稽志在種山南華鎮覽古云今府宅儀門下夷吾將死敕其家曰漢末當亂必有𤼵掘露骸之禍宜懸棺下葬子孫遵之故得獨全𫝊詳方技晉尚書左僕射孔愉墓嘉泰㑹稽志在縣南二十九里𫝊詳名臣晉㑹稽内史郄愔墓名勝志在城西南二十五里𫝊詳名宦晉㑹稽内史謝輶墓於越新編在縣西三十里名勝志謝靈運之從祖也宋臨川内史謝靈運墓嘉泰㑹稽志在縣南三十三里靈運死廣州歸葬於此𫝊詳文苑唐吏部侍郎謚定徐浩墓嘉泰㑹稽志在縣南二十一里𫝊詳文苑唐祕書監賀知章墓於越新編在府城南九里因名九里墓在山巔鄉人呼為賀墓𫝊詳文苑唐刺史康希詵墓嘉泰㑹稽志在蘭亭希詵㑹稽人歴饒海台睦四州刺史其碑顔魯公撰并書郡守吳奎得之王荆公及弟平甫賦詩而墓始著唐康徳言墓名勝志在離渚屭石湖旁湖之得名以其墓碑石屭云宋魏恵憲王趙愷墓嘉泰㑹稽志在法華山王孝宗第二子初自魏邸出判寧國府又判明州兼領雍州牧薨有㫖宜於紹興善地權厝遂厝於天衣寺之法堂遣使軷祭且視窆焉宋太師賀王謚孝敏趙士夽墓嘉泰㑹稽志在天衣寺法華山宋節度使滕國公謚恭靖趙不微墓嘉泰㑹稽志在東黄直閣不羈祔宋知郡陸眷墓嘉泰㑹稽志在黄祊嶺宋尚書齊執象墓嘉泰㑹稽志在昌原宋銀青光禄大夫傅𫝊正墓嘉泰㑹稽志在承務鄉尚書墨卿祔宋修撰宋煇墓嘉泰㑹稽志在九里宋提學朱興宗墓嘉泰㑹稽志在苦竹村宋中書王孝迪墓嘉泰㑹稽志在九里宋贈開府儀同三司謚忠肅陳過庭墓嘉泰㑹稽志在黄祊嶺𫝊詳忠臣宋特進王俊乂墓嘉泰㑹稽志在西山尚書佐祔紹興府志西山村有王佐祠額曰忠孝乃同榜進士朱熹書後於墓傍掘得南宋全皇后妹合葬墓碑始知佐曽孫婦亦祔於此宋提舉司馬棿墓嘉泰㑹稽志在亭山侍郎伋監丞僖祔宋顯謨閣待制吕正已墓嘉泰㑹稽志在九里宋太子太師祁國公杜衍墓嘉泰㑹稽志在永昌鄉苦竹村𫝊詳名臣宋觀文殿學士謚威敏孫沔墓嘉泰㑹稽志在承務鄉𫝊詳武功宋太保陸昭墓嘉泰㑹稽志在承務鄉左丞之祖四世葬此有陸氏大墓碑宋右史唐閎墓嘉泰㑹稽志在蘭亭宋運使唐閱墓嘉泰㑹稽志在古城𫝊詳循吏宋銀青光禄大夫石元之墓嘉泰㑹稽志在盛塘孫朝議瑞中寺正邦哲祔宋提舉石繼曽墓嘉泰㑹稽志在謝墅宋少卿唐翊墓名勝志在蘭亭西𫝊詳循吏元僉江浙樞宻院事西夏侯謚忠勇穆爾古蘇墓山隂縣志以紹興録事司總督越兵為御史拜珠所殺今墓在蕺山𫝊詳名宦吳騵弔西夏侯墓詩鎮越城邊将星墮蘭臺忽起蕭牆禍殘軍不領戰衣歸屍首那将革囊裹旁無石獸表無文至今不識誰家墳棠梨花開曉無迹墳頭髙處羊成羣憶昔孤城臨大敵保全竟賴斯人力當時不見起祁連向後誰能錮隂宅百年陵谷儘如斯故老於今有口碑元堂隂深土花碧萇宏流血應淋漓明太守白玉墓紹興府志在卧龍山之隂玉漢中人明正統中卒因葬焉明新建伯謚文成王守仁墓紹興府志在花街洪溪𫝊詳名臣明巡撫徐如翰墓山隂縣志在古城山麓明徐渭墓山隂縣志在木柵山𫝊詳文苑明吏部尚書孫鑨墓山隂縣志在鑄浦山𫝊詳名臣明光禄卿孫如法墓餘姚縣志在山隂鳯凰山𫝊詳名臣明貴湖雲川廣五省總督朱燮元墓在九里山𫝊詳名臣明太倉州判傅元縉墓在花徑山明户部尚書謚文正倪元璐墓紹興府志在白蓮嶴山聖儀洞𫝊詳忠臣舊浙江通志康熙十年巡撫范承謨以其子孫貧不能葬捐俸四十金行府議知府張三異更為捐俸營葬先是里紳姜天樞知文正無葬地欲以白蓮嶴山贈之後竟踐其言明蘇松巡撫祁彪佳墓舊浙江通志在亭山𫝊詳忠臣㑹稽縣大禹陵嘉泰㑹稽志圖經云在㑹稽縣南一十三里禹巡狩江南上苗山㑹計諸侯死而葬焉劉向書云禹葬㑹稽不改其列謂不改林木百物之列也苗山自禹葬後更名會稽是山之東有隴隠若劍脊西嚮而下下有窆石或云此正葬處疑未敢信窆石之左是為禹廟背湖而南嚮按皇覽禹塜在㑹稽山自先秦古書帝王墓皆不稱陵陵之名實自漢始越絶書禹巡狩大越見耆老納詩書審銓衡平斗斛死葬㑹稽葦槨桐棺穿壙七尺上無漏洩下無即水壇髙三尺土階三等延袤一畆吳越春秋無佘始受封雖有鳥田之利租貢纔給宗廟祭祀之費乃復隨陵陸而耕種或逐禽鹿而給食不設宫室之飾從民所居春秋祠禹墓於㑹稽紹興府志宋乾徳四年詔吳越立禹廟於㑹稽置守陵五户長吏春秋奉祀紹熙三年十月修大禹陵廟釋贊寧𫝊載越中禹志者髙松數十株參天逺望無不見故郡人謂之禹志也實巡狩至㑹稽葬於此陵今與山為一體皆變為石矣若然者古之志即今之陵也方輿勝覽窆石在禹廟舊經云禹葬以此石為窆禹穴在龍瑞宫之側東莱云大石中斷成罅殊不古殆非司馬子長所探也明洪武三年浙江行省進大禹陵廟圖九年令百步之内禁人樵採設陵户二人有司督近陵人看守每三年遣道士齎香帛致祭登極遣官告祭每嵗有司以春秋二仲月祭諸葛興大禹陵頌瞻越山兮境東鬱喬木兮岑叢倚青霞兮窆石枕碧流兮寳宫端黻冕兮穆穆列爼豆兮雍雍梅為梁兮挟風雨倐而来兮忽而去芝産殿兮閒見橘垂庭兮猶古璧騰輝兮珪薦瑞書金簡兮緘石匱朝萬玉兮可想探靈文兮何祕嗟洚水兮横流民昏墊兮隠憂運大智兮無事錫洪範兮叙疇身勞兮五嶽迹書兮九州亶王心兮不矜迄四海兮歌謳猗聖宋兮中興駐翠蹕兮稽城獨懐勤兮曠代粲奎文兮日星揚舲兮拊鼓吳歈兮鄭舞奠桂酒兮蘭肴庶幾彷彿兮菲食卑宫之遺矩鄭善夫禹陵詩脫屣行探禹穴靈萬年鴻寳祕丹扄梅梁窆石空山裏想見虞廷舊典型陳子龍禹陵詩夏王南狩日㑹計此山陽玉帛朝羣后旌旗擁大荒防風膏斧鉞蒼水貢文章九鼎山河奠雙珪日月光橋陵遺劍碧梧野出雲黄廟貌垂千祀神功啟百王烟霞移石壁雷雨暗梅梁白鶴留隂羽丹楓落曉霜銀池噴不起金簡穴能藏湍道鉦音𤼵風簷鈴語揚冕旒瞻律度圭璧侍班行鳥鼠㳺神座龍蛇静帝鄉庚辰来上佐癸甲授元良元女精靈盡黄熊哀慕長夏書存渾渾越絶紀茫茫萬古終河洛其咨永不亡國朝康熙二十一年遣徐誥武致祭二十八年二月十四日聖祖仁皇帝南巡詣廟致祭十六日欽奉上諭修理恭紀首卷三十五年遣王材任致祭三十六年遣王焯致祭四十八年遣盧起龍致祭五十八年遣田文鏡致祭六十一年十一月世宗憲皇帝即位遣穆理渾於雍正元年二月致祭御祭文自古帝王繼天出治建極綏猷莫不澤被生民仁周海宇維我皇考峻徳鴻勲嫓美前古顯謨承烈垂裕後昆朕以眇躬纘膺大寳當兹嗣位之始宜修享祀之儀特遣専官䖍申昭告惟冀時和嵗稔物阜民安淳風徧洽乎寰區厚徳長孚於率土尚其歆格鑒此精誠雍正二年正月遣覺羅常泰致祭七年三月奉上諭自古帝王皆有功徳於民雖世代久逺而敬禮崇奉之心不當弛懈其陵寢所在乃神所憑依尤當加意防衛勿使䙝慢至於徃聖先賢名臣忠烈芳型永作楷模正氣常留天壤其祠宇塋墓亦當恭敬守䕶以申仰止之忱着各省督撫轉飭各屬將境内所有古昔陵寢祠墓勤加巡視防䕶稽查務令嚴肅潔浄以展誠恪若有應行修葺之處着動用本省存公銀兩委員料理朕見歴代帝王皆有保䕶古昔陵寢之飭諭而究無奉行之實朕雍正元年恩詔内即以修葺歴代帝王陵寢通行申飭亦恐有司相沿積習視為泛常嗣後着於每年年底令該地方官將防䕶無誤之處結報督撫該督撫造冊轉報工部彚齊奏聞倘所報不實一經發覺定將該督撫及地方官分别議處特諭欽此欽遵於禹陵應修處所勘估修葺敬謹防䕶十三年九月今上皇帝即位遣朱必堦於是年十二月告祭御祭文禮崇典祀光爼豆於前徽念切景行薦馨香於徃哲惟帝王繼天立極撫世諴民豐功焜耀於生前駿烈昭垂於宇宙溯典型於在昔凜法監之常存朕以藐功繼登大寳屬膺圖之伊始宜展祀以告䖍特遣専官祗遵彞典苾芬在列備三獻之隆儀靈爽式憑仰千秋之明徳尚其歆格永錫鴻禧謹告謹按禹穴者禹藏書之所唐鄭魴從事越州大書禹穴二字立石序之觀察使元稹為之銘其在㑹稽無疑明楊慎丹鉛録云蜀之石泉禹生之地謂之禹穴劉逺夫修蜀志得碑刻禹穴二字乃李白所書始知㑹稽禹穴之誤夫邱墳巖穴皆古昔藏書所名未聞生其地而稱為穴者李白蜀人無論其書不足信即有之必唐後已有記載豈有歴宋元迄明始得之者况司馬遷自序云予年二十而南游江淮上㑹稽探禹穴闚九疑浮於沅湘語次秩然而近作廣輿記者惑於慎之說遂解曰上㑹稽總吳地也探禹穴上巴蜀也謬矣邑令昝霨林重刻石於宛委山而辨之如此因録存其概云宋永祐攢宫萬厯㑹稽縣志紹興十二年金人以徽宗及皇后鄭氏梓宫来還十月攢昭慈太后攢宫西北改陵名永祐徽宗顯仁皇后韋氏從徽宗北遷紹興十二年還臨安二十九年攢於永祐陵西髙宗憲節皇后邢氏從三宫北遷紹興十二年梓宫至攢昭慈太后攢宫西宋史孟皇后𫝊后洛州人眉州防禦使馬軍都虞侯贈太尉元之孫女元祐七年冊為皇后康王即位稱隆祐太后紹興五年殯於㑹稽上皇村改謚昭慈聖獻后宋髙宗陵萬厯㑹稽縣志淳熙十四年攢於㑹稽之永思陵宋史髙宗紀帝諱構字徳基徽宗第九子母顯仁皇后韋氏在位三十二年宋史吳皇后𫝊后開封人父近累官武翼郎贈太師紹興十三年立為皇后孝宗即位尊曰壽聖太上皇后謚憲聖慈烈攢祔於永思陵宋孝宗陵萬厯㑹稽縣志紹熙五年攢永思陵西上陵名曰永阜宋史孝宗紀帝諱眘字元永太祖七世孫紹興二年賜名瑗三十年二月立為皇子更名瑋三十二年五月立為皇太子改今名在位二十七年宋史謝皇后𫝊后丹陽人淳熙三年立為皇后謚成肅攢祔於永阜陵宋光宗陵萬厯㑹稽縣志慶元六年攢㑹稽上陵名曰永崇宋史光宗紀帝諱惇孝宗第三子母成穆皇后郭氏在位六年宋寧宗陵萬厯㑹稽縣志嘉定十七年葬㑹稽上陵名曰永茂寧宗仁烈皇后楊氏紹定五年祔永茂陵方輿勝覽寧宗永茂陵其地乃泰寧寺之舊址嘉定十七年冬命楊曅為按行使歸奏云獨泰寧寺之山山崗偉特五峯在前直以上皇山之雄翼以紫金白鹿之秀宜為先帝弓劍之藏遂遷寺定卜焉宋史寧宗紀帝諱擴光宗第二子母慈懿皇后李氏在位三十一年宋史楊皇后𫝊后㑹稽人有楊次山者后自謂其兄遂姓楊氏進貴妃立為后謚曰恭聖仁烈宋理宗陵萬厯㑹稽縣志景定五年葬㑹稽上陵名曰永穆宋史理宗紀帝諱昀太祖十世孫父希壚追封榮王家於紹興山隂縣母慈顯夫人金氏在位四十一年宋度宗陵萬厯㑹稽縣志咸淳十年攢上陵名曰永紹宋史度宗紀帝諱禥太祖十一世孫父嗣榮王與芮理宗母弟也在位十一年明一統志以上諸陵皆在㑹稽縣東南寳山惟孝宗理宗二陵朝廷遣官致祭㑹稽縣志至元戊寅西僧楊璉真珈奏𤼵諸陵宋遺民山隂唐珏易以偽骨取真者葬之山隂天章寺前六陵各為一函每陵樹冬青一以識紹興府志明洪武三年浙江行省進宋諸陵圖惟孝理二陵獻殿三間繚以周垣餘僅存封樹九年令五百步之