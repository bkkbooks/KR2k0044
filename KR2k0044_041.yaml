堂詩序昔李公擇為此郡張子野劉孝叔在焉而楊元素蘇子瞻陳令舉過之會於碧瀾堂子野作六客詞今僕守是邦子瞻與曹子方劉景文蘇伯固張秉道來過與僕為六而向之六客獨子瞻在復繼前作子野為前六客詞子瞻為後六客詞西吳里語湖州郡囿有六客堂王十朋六客堂詩六客髙風久已無花間誰對謫仙壺星躔一夕光芒動知有孤槎入畫國謹按李公擇六客之會在碧瀾堂張詢序甚明今郡圃六客堂是後人因前後六客之詞而名之耳逍遙堂成化湖州府志在六客堂之右梅堯臣題逍遙堂詩江東有賢守好客似春申自構杏梁地不生珠履塵樂章思季子後俊得吳均寢卧在其下知君學至人熙堂成化湖州府志在逍遙堂北宋嘉定三年知州事魏大中修易名思政晝錦堂𢎞治湖州府志在郡宅東舊為燕堂吏隱堂𢎞治湖州府志在郡治廳西宋宣和中葛勝仲易為浙西道院集虛堂名勝志在書記廳陳師錫撰記東堂釋皎然有奉和顔使君真卿修韻海畢會諸文士東堂重校詩製錦堂崇禎烏程縣志宋大中祥符間知縣薛耀卿重修廳事有製錦堂君子堂萬厯湖州府志在烏程縣舊治虛心堂歸安縣志在廨內宋宣和四年縣令錢耕重建改曰敬臨歲寒堂歸安縣志錢耕重建改曰拙齋雙桂堂西吳里語在歸安縣治內王寧秋夜賞桂詩秋風吹天香先著桂花蘂更挹月露清芬馥喚睡起攬衣夜未央衆喧不入耳有來蘂珠仙黃袂翠蓋底豈無碧雲腴為君一啓齒醉卧金粟間絶勝佩蘭芷舞綃堂歸安縣志宋舊丞廳內在縣南采蘋橋東西吳里語歸安縣治內有舞綃堂不知何人作宋乾道中添倅齊慶胄作記凝碧堂歸安縣志宋尉廳在迎春門外運河南舊時凝碧堂址也梅堯臣凝碧堂詩始至芰荷生田田湖上密復當花競時艷色凌朝日今來蓮已枯碧水墮秋實更待雪中過羣峰應互出尊有緑蟻䤃俎有顛壺橘可以持蟹螯逍遙此居室謹按萬厯郡志稱簿廳在迎春門外係凝碧舊址而脫去尉廳字考歸安志簿廳宋初在子城東淳熙中主簿俞􅚇徙於丞廳西白蘋洲上並未嘗在迎春門外也苕溪草堂釋皎然詩序苕溪草堂自大厯三年夏新營洎秋及春彌覺勝境張雨苕溪草堂詩傳語幽人范叔豹霧隱何時窺一斑天下草堂多處所無此玉湖浮玉山楊維楨苕溪草堂詩聞説苕溪范草堂草堂大似浣花莊碧山學士銀魚葉錦里先生烏角裝清江鸂鶒雙雙下春水鱸魚尺尺長自笑揚雄迷出處一區終擬住林塘碧瀾堂晏公類要在子城東南臨溪唐刺史杜牧建崇禎烏程縣志宋嘉定三年知州魏大中重修後創水閣曰水精勝境陳時中碧瀾堂賦滴天目之華滋液蒼辨之雲英潄金井之春漦消浮玉之寒冰泛苕花而東走濫餘英以北征倒河道兮翠管淩苕城兮玉繩此玉湖之碧瀾所以映天地而澄清也若其玉宇無塵金飈不驚湛湛兮皺紋機之縠漪漪兮拖冰繭之繒躍錦鱗兮琉璃之影點雪鷺兮雲母之屏蕩流萍以分緑疏文藻而涵青挹荷香兮爽氣橫林靄以輕氛乍疑太液之雨霽又疑積翠之春生妙徐凝之筆不足以圖其倣佛琢謝公之句未足以壯其儀形乃有貴介公子縉紳處士削清風以為梁斫明月以為柱架白雲以為麗疏輕煙以為梠審碧瀾之西面滄浪之勢作堂洲渚之間兼美山川之會魚鱗搖碧瓦之參差鼇首戴蓬壺之贔屭佳氣晨夕乎軒墀波光左右於窗戶恍若身在水晶之宫又若神遊清都之府是乃心怡日暢神清氣舒胸吞雲夢量吸五湖躡崑探璧倒海搜珠談霏雨露筆吐虹霓蘸碧瀾而灑墨潄芳潤而研詞晨瀉珠璣之萬斛夕哦瓊瑰之八廚使清聲流碧澗而無盡直欲浸淫乎八區陳堯佐過碧瀾堂詩苕溪清淺霅溪斜碧玉寒光照萬家誰向月明終夜聽洞庭漁笛隔蘆花水堂𢎞治湖州府志在碧瀾堂北汀風閣後舊名南堂西吳里語水堂一郡之勝概士按顔魯公集有吳興水堂送諸文聨句寫真堂晏公類要顔真卿於杼山上起謝臨川寫真堂墨君堂西吳里語文同字與可知湖州善墨竹東坡命為墨君作墨君堂記蘇軾墨君堂記凡人相與號呼者貴之則曰公賢之則曰君自其下則爾汝之雖公卿之貴天下貌畏而心不服則進而君公退而爾汝者多矣獨王子猷謂竹君天下從而君之無異詞今與可又能以墨象君之形容作堂以居君而屬余為文以頌君德則興可之於君信厚矣與可之為人也端靜而文明哲而忠士之修潔博習朝夕磨治洗濯以求交於與可者非一人也而獨厚君如此君又疏簡抗徑無聲色臭味可以娛悅人之耳目鼻口則與可之厚君也其必有以賢君矣世之能寒燠人者其氣焰亦木至若雪霜風雨之切於肌膚也而士鮮不以為欣戚喪其所守白植物而言之四時之變亦大矣而君獨不顧雖微與可天下其孰不賢之然與可獨能得君之深而知君之所以賢雍容談笑揮灑奮迅而盡君之德稚壯枯老之容披折偃仰之勢風雪凌厲以觀其撡崖石犖確以致其節得志遂茂而不驕不得志瘁瘠而不辱羣居不倚獨立不懼與可之於君可謂得其情而盡其性矣余雖不足以知君願從與可求君之昆弟子孫族屬朋友之象而藏於吾室以為君之别館云超覽堂烏程縣志在慈感寺逸老堂萬厯湖州府志在峴山頂嘉靖中通判湯世賢建烏程縣志世賢為尚書蔣瑤劉麟顧應祥參政陳良謨主事唐樞諸老設社會於此後知縣李橡重建萬厯中茅國縉重修後許孚逺復舉社集知府陳幼學置田供會嬰蘭堂吳興藝文補錢鏐有題湖州嬰蘭堂詩四絶堂周必大沈傅師碑道林以四絶名堂沈碑居其一歲久葺而扁之仍得沈碑移置堂上林氏雪堂經鉏堂雜志霅川城內趙氏慶源堂經鉏堂雜志霅川城外夢馬堂成化湖州府志在華嚴山宋紹興三年朱勝非卜地於此山葬母夜夢十騎入山留一馬繫林中餘俱馳去次夕又夢衣冠一士厲聲言我來定穴因於冢前起獻堂以夢馬名之經鉏堂吳興掌故倪文節公思其居興秀邸為鄰著經鉏堂雜志清心堂平易堂宣化堂萬厯湖州府志俱在長興縣舊治宋紹定二年縣令史巖之建製錦堂嘉靖長興縣志宋紹定五年令趙汝譢置吏隱堂無訟堂嘉靖長興縣志並在廳西宋建安安堂嘉靖長興縣志在縣令宅堂後宋建夢鼎堂嘉靖長興縣志隆慶元年知縣歸有光改燕居之堂為夢鼎有記詳見公署松竹堂嘉靖長興縣志在丞廳宋嘉定癸未丞應孰建今基在縣廨三隱草堂嘉靖長興縣志玉竇泉在縣西南唐處士鄭遨與羅隱道士李道殷卜築泉口因號三隱木瓜堂西吳里語在長興顧渚山金沙泉上浮疏堂萬厯湖州府志德清縣舊治廳西宋宣和中建德清縣志知縣趙嵎建杭梅堂前山堂𢎞治湖州府志德清縣舊廨舊名秀逺梅花堂德清縣志縣廳後舊有梅花亭存其故也松竹堂𢎞治湖州府志在德清廨舊名宜堂孫靚德清縣舍松荺堂看菊詩籬腳金花玉露團抱叢寒蝶冷相看不隨桃李供春事且伴松筠到歲寒醉花堂𢎞治湖州府志德清縣舊廨芍藥甚盛東堂𢎞治湖州府志武康縣廳舊名盡心堂宋嘉祐中令王震建紹聖中令毛滂新之紹興初鍾燮重建毛滂驀山溪詞東堂先曉簾桂扶桑暖畫舫寄江湖倚小樓心隨望逺水邊竹畔石瘦蘚花寒秀隂遮潛玉夢鶴下魚磯晚藏花小塢蝶徑深深見彩筆賦陽春看藻思飄飄雲半煙拖山翠和月冷西聰玻璃盞葡萄酒旋落酴醿片先春堂萬厯湖州府志在武康縣舊治廳西宋建逍遙堂𢎞治湖州府志武康縣仙臺山黃初平煉丹之處臺北有逍遙堂舊址逺望湖杭俱在目睫燕笑堂嘉靖安吉州志在州治宋呂靖建梅溪書堂嘉靖安吉州志在梅溪鎮宋淳祐中天台郭居和建叢桂堂嘉靖安吉州志在州東百家園𢎞治湖州府志宋紹興中邑人朱三思三省兄弟叔姪一門赴南宫者二十七人集宴於此鄉人榮之因名訟希齋𢎞治湖州府志在郡治西廳之西廊舊名靜勝宋慶元中知州事李景和易今名三友齋劉一止三友齋賦序余不知取友即家君遊息之舍别為小齋有一麈尾命曰白友一拳石曰碧友一琴曰黑友因名其齋不自恕齋西吳里語周德方為杜處逸弟子以不自恕名其齋松雪齋明一統志在府城內甘棠橋西元趙孟俯之别第沈夢麟松雪齋池中太湖石詩魏公池上玉芙蓉元氣淋漓涇貝宫漢女梳頭雲冉冉天丁鑿翠雨瓏瓏品題甲乙平原逺變化風雷艮嶽通回首太湖三萬頃酒酣濯足洞庭空雪齋蘇軾答言上人書去嵗吳興為别至今耿耿雪齋清境發於夢想恕齋萬厯湖州府志在長興縣舊治宋紹定五年令趙汝譢增置畫舫齋西吳里語宋毛滂令武康縣建清心軒𢎞治湖州府志在通判廳宋治平三年張大寧建清容軒名勝志袁桷自號清容居士與子昻同讀書構清容軒今在慈感寺內王世貞復清容軒記吳興城西南隅為勝枕水而宫者至多慈感寺為勝慈感寺之景至多清容軒為最勝前枕通塘有蓮芡木芙蓉之屬船橈容與笭箵散布軒之中碧浪諸山凌睥睨而上其外碧浪諸水穿睥睨而下以故其景最勝故元學士袁先生桷號清容者微時客吳興讀書其中因取其號軒之趙文敏為題字而文敏亦時往來流憩以故其名稱益著軒業以屬寺然寺僧不得而有之而以供邦君薦紳之遊者二百餘年於今矣少時不戒於火子來吳興問軒於范太史意欲復之以屬守黃君丞藍君司理孫君有郡士嚴姓者慨然出而應募發其帑竹木墁瓦至不逾月而軒復雖宏壯侈麗不逮前而山水之觀有出於睥睨上下者如故也作復清容軒記水東軒烏程縣志在慈感寺之東倪思慈感東軒詩水花風葉暮蕭然靄靄雲山帶瞑煙佇立東軒未能去更看明月涌晴天滴翠軒鄭明選遊峴山記山之巔有滴翠軒萬竹干天緑陰如晦巖桂軒萬厯湖州府志在武康縣舊治東堂後宋紹興三年令鍾燮建白露亭西吳里語吳興郡志梁栁惲寄吳興吳均詩云相思白露亭永望秋風渚惲守吳興引均為主簿此别後寄聲耳墨妙亭西吳里語在郡圃孫莘老知湖州作蘇軾墨妙亭記熙寧四年髙郵孫莘老移守吳興其明年作墨妙亭於逍遙堂之東取凡境內自漢以來古文遺刻以實之吳興自東晉為善地號為山水清逺其民足於魚稻蒲蓮之利寡求不爭賔客非特有事於其地者不至焉故凡守郡者率以風流嘯詠投壺飲酒為事自莘老之至而歲適大水土田不登湖人皆大飢莘老大振廩勸分躬自撫巡所活至不可勝計當是時朝廷方更化立法使者旁午以為莘老當日夜治文書赴期會不能復雍容自得如故事而莘老益喜賔客賦詩飲酒為樂又以其餘暇網羅遺逸得前人賦詠數百篇為吳興新集其刻書尚存而僵仆斷缺於荒陂野草之間者又皆集於此亭余以事至湖周覽嘆息而莘老求文為記或以謂余凡有物必歸於盡而恃形以為固者尤不可長雖金石之堅俄而變壞至於功名文章其傳世垂後猶為差久今乃以此托於彼是久存者反求助於迷壞此則昔人之惑而莘老又將深簷大屋以銅留之推是意也其無乃幾於不知命也夫余以為知命者必盡人事然後理足而無憾君子之養身也凡可以衛生者無不用其治國也凡可以久存者無不為此之謂知命是亭之作殆無足爭者而其理則不可以不辨故具載其説而列其名物於左云清樾亭𢎞治湖州府志在墨妙亭南快哉亭𢎞治湖州府志在子城東北隅挽翠亭𢎞治湖州府志在子城東北宋慶元間李景和建於六客堂北麗澤亭愛山亭𢎞治湖州府志並在子城內通判廳宋治平三年張大寧建吳興雜録宋時丞廳內有愛山臺蓋吳興山水清逺怡人性情即命名不嫌其同耳桂香亭𢎞治湖州府志在僉判廳城上宋治平中狀元許將建徐仲謀名之東亭崇禎烏程縣志在縣內池上唐紀李紳墮水事立碑辨山