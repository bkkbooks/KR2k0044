餘福遊天目山記西上望江臺錢塘一帶隱隱如白練烏巾氏宅萬厯湖州府志在烏程縣升山伍子胥宅西吳里語烏程伍林村舊傳伍員嘗寓於此謝安宅萬厯湖州府志在烏程縣治南即霅溪館謝靈運宅吳興掌故在烏程東南即福田寺謝元宅西吳里語郡城內車騎坊在府前東北大街晉車騎將軍謝元嘗寓此戴逵宅西吳里語烏程戴山昔戴逵曾居此何楷宅太平寰宇記烏程縣何山晉何楷居此修儒業汪藻何山何氏書堂記吳興環城皆水獨西南岡嶺相屬而得浮屠氏之居二焉東曰道場西曰何山何山立於宋元嘉中其興先道場五百年而隘陋反出其下於是遊道場者如入王侯之家隆樓傑閣吞納江湖已而過何山則草樹蔥蘢軒窗窈窕經行之地皆雅潔幽深如造髙人隱士之廬至者忘歸不知雄盛移而為清勝也寺有何氏書堂岡記相承以何氏晉時嘗讀書此山後為吳興太守以其居為寺而名其山顔魯公亦曰寺西南有何楷釣臺則楷居此山無疑然楷姓名於晉史無所見惟沈約宋書敘何子平曾祖楷為晉侍中括地志謂楷為吳興太守皆不得而知也以余考之寺有宋禪幽寺碑云元嘉十四年創立精舍於金蓋山初不言楷時有寺且何山之名於梁吳均詩始見之疑楷嘗學此山其名迹在人後人慕之即其處為精舍耳謂楷以其居為寺者非也柳惲宅崇禎烏程縣志惲曾居毗山有讀書堂存焉一統志作唐柳渾誤章后宅吳興掌故在府治東北陳永定三年捨為龍興寺即今之天寧寺沈亞之宅吳興掌故在府治北唐中和二年捨為寺即天聖寺牟子才宅崇禎烏程縣志在定安門內今為倉蕭翼宅萬厯湖州府志即鴻禧寺朱處士别業劉長卿有過湖南朱處士别業詩見吳興藝文補陸羽别業釋皎然有喜集陸處士羽青塘别業詩施肩吾宅吳興掌故在歸安縣東施渚鎮王彥宅崇禎烏程縣志王安撫彥宋名將宅在烏鎮丁勝宅崇禎烏程縣志丁節度勝其宅在烏鎮平等橋東周密宅吳興掌故周密字公謹其祖少傅公僑居郡城天聖寺側公謹復置業辨山趙孟俯宅歸安縣志在甘棠橋南宅有大銀杏樹相傳為松雪手植沈夢麟趙仲穆席上作蓮花莊北長橋東客來卜居水晶宫參差樓閣煙塵外窈窕山川圖畫中細雨新帆來舞袖故家喬木鎮春風請看杜牧題詩處千古風流一笑同吳夫槩宅萬厯湖州府志在長興上槩村陳武帝宅吳興志廣惠寺在長興縣治東九里相傳為陳武帝故宅吳興掌故光大元年詔立為天居寺宋治平間改為廣惠寺明一統志宅內有井相傳武帝生時井水湧出浴帝因名聖井又曰浴兒井歸有光有記陳文帝宅吳興志長興縣西二里號長城宫天嘉二年置於大寧寺後長興縣志顔真卿碑及汪藻劉一止詩序皆言報德寺為陳文帝故宅李宗諤又云大雄寺即長城宫程林宅嘉靖長興縣志在縣南程林烏巾二家能釀酒程氏橋即林所居今為平政橋金曼倩宅太平寰宇記金潭在長興縣西四十里漢樓船將軍金曼倩居之錢林宅西吳里語漢錢林建平中為諫議大夫王莽專政遂隱於長興陂門里其故宅在子山園林幽趣花石佳致層閣皆山髙門臨水𢎞治湖州府志陂門里即上閣步莫賅宅名勝志晉建威將軍莫賅故宅在長興縣城山下盛聰宅𢎞治湖州府志晉南臺御史尚書令盛聰故宅在長興縣東箬溪盛灣吳僧永宅名勝志梁駙馬都尉吳僧永故宅在長興縣東呂山錢道宅名勝志梁江州刺史錢道故宅在長興縣西九里今為清果寺基駱祕道宅名勝志梁參軍駱祕道故宅今長興名駱灣者是吳均宅𢎞治湖州府志在長興縣西南六十里青山又縣南四十三里吳山有吳均宅石柱記箋釋安吉州東北三十五里曰青山一名均山以吳均名按長興安吉二縣接界均本傳故鄣人其宅當在安吉謹按𢎞治郡志載均宅在青山又載於吳山考均與施從事書云故鄣縣東三十五里有青山絶壁于天孤峯入漢又有詩云家住青山下時向青山上是均宅當在青山而郡志又稱在吳山或有二宅歟陸龜蒙别業𢎞治湖州府志在長興縣陸滙崔元亮宅西吳里語在長興縣崔灣𢎞治湖州府志元亮昭義人元和中為吳興刺史因家焉姚紾宅括地志仙人姚紾所居在長興縣五峯山沈貞宅嘉靖長興縣志元隱士沈貞宅在縣北三十里求詩巷范蠡宅𢎞治湖州府志德清縣蠡山舊傳范蠡故居在焉沈麟士宅西吳里語南齊沈麟士隱德清縣東南吳羌山講經授徒嘗數百人營止其側戴可先宅吳興掌故在德清吳羌山之陽德清縣志梁大同二年捨宅為寺即大中乾元寺沈道思宅德清縣志在縣西文墅山梁大同二年吳興太守沈道思請以故宅捨為觀即紫極觀沈慶之宅德清縣志在縣東北敢村梁天監中捨宅為寺即延壽寺沈著宅吳興掌故梁水部郎沈著宅在德清南二十七里塘棲市大同二年捨為永明寺沈子真宅德清縣志在縣東北韶村青州刺史沈子真舊宅一夕堂前井起光八道有龍騰空而去遂捨為寺即八勝寺韓元吉宅德清縣志縣北石壁山慈相寺西有修竹林宋韓元吉兄弟居焉前數十步有野橋古樹幽泉四望皆平岡邑中之勝地也𢎞治湖州府志宋呂祖謙嘗於此讀書呂蓋韓壻也嘉熙間縣令章鑑建東萊讀書堂遊似宅𢎞治湖州府志德清縣桃源洞宋丞相遊似所居壘石為山遺址尚存沈戎宅吳興掌故在武康東北鳯凰山捨為懷德寺路史沈戎居烏程餘不溪沈道虔宅名勝志在武康縣石城山東晉沈道虔性仁愛有竊其屋後笋者乃買大笋與之曰吾惜屋後笋欲其成林沈密宅吳興掌故南齊祕書郎沈密故宅在武康治西二百步建元元年捨為齊昌寺沈約宅餘英志餘英溪即前溪上流沈約宗族所居沈珩宅𢎞治湖州府志武康縣五官瀆吳五官郎中沈珩居之孟郊宅西吳里語武康縣西一里有孟郊古井吳興掌故地名孟宅保施彬宅嘉靖安吉州志晉中蠲明侯施彬故宅在州梅溪鄉即今樂平寺裴子野宅輿地紀勝裴子野寓居故鄣宅在縣西南三十六里永昌鄉𢎞治湖州府志子野河東人寓居故鄣著諸侯略王文殊宅嘉靖安吉州志在州西南晏子鄉孝行里周𢎞讓宅吳興志周𢎞讓兄𢎞正仕梁為安吉縣令𢎞讓結宇山中其故宅在州南三十六里吳頊宅吳興掌故吳越驃騎將軍吳頊故宅在安吉西半里捨為羅漢院𢎞治湖州府志即長樂寺沙墀吳興志沙墀在郡治廳事前庭中弘治湖州府志墀外皆甃砌獨此方鋪以沙久莫之改紹興中太守王會砌合之忽夜得夢翌早亟去至今如是上林崇禎烏程縣志相傳董氏梅林村髙祖渡江駐蹕宴梅下賦詩乃更為上林走馬埒石柱記卞山有項王走馬垺飲馬池桂棚顔真卿杼山妙喜寺碑三癸亭西北叢桂間創桂棚左右百步有芳林茂樹悉産丹青紫三桂丘路吳興志城南七里昔丘傑年十三鄰人築牆侵其界傑乃夜移籬退三尺鄰人慚亦退三尺遂成大路因名蘇灣萬厯湖州府志在峴山南蘇軾為郡守築湖隄立亭車蓋山後陳舜俞家焉隱安歸安縣志在菁山太守葛勝仲居此號隱安即今射村水竹塢西吳里語章農卿北山别業也水竹居虞堪有寄題湖州沈自誠水竹居詩千金墟名勝志歸安縣東南四十里漢吳王濞鑄錢銅峴置庫於此泊宅泊宅編烏程東有泊宅村昔張志和浮家泛宅往來苕霅即此金華文略方陶字仁夫與兄勺隱居烏程之泊宅村茶園笠澤叢書甫里先生嗜茶置園於顧渚山下士林沈貞士林山水記去長城北十里唐宋迄元居多文人淨香天嘉靖長興縣志縣北二十里方石山自城至此古梅巨竹數十萬吳鍾巒題曰淨香天蟠室陸遊有周元吉蟠室詩元吉名頡長興人花渚名勝志安吉州梅溪鎮吳越征西將軍吳瓌居此花石甚麗因名後吳可幾知幾兄弟讀書其中瓌之裔也號二吳讀書堂隱塢太平寰宇記安吉縣隱塢梁陶𢎞景嘗隱居於此嘉靖安吉州志在銅山鄉陸龜蒙嗜茶往來桃城得陶貞白隱塢而居焉莫有知者邸閣吳地志吳大帝遣從弟孫敻修故鄣邸閣蘭畹太平寰宇記長興縣南嶼鄉西施種香之所上有蘭􅉅畹嘉靖安吉州志蘭畹在今孝豐縣自水山潛玉菴毛滂驀山溪詞序武康縣令舍以潛玉名菴七賢石吳興掌故在何山寺中寺僧移湖石於此狀如石丈故名採菱渡石陳潤祖採菱渡石記監運沈君玉泉得異石於石林葉氏之廢圃刻曰採菱渡石其陽字二行王摩詰石虛用中書三品石歸安縣志在蓮花莊趙子昂别業見只編白蘋洲有學士石三為趙文敏家故物石鼓楊維楨夏駕石鼓辭注石鼓在夏駕山髙一丈徑三尺下有盤石為足天聖寺古檜鄭明選天聖寺古檜閣碑寺舊有古檜堂古檜髙大無枝葉蓋唐宋時物也其後堂廢寺僧易而為閣子昂嘗畫為圖朱勝非天聖寺古檜詩雷霆起蟄虬夭矯勢欲上忽然化此木尚作拏雲狀婆娑枝幹垂生澀紐結壯圖經不能紀父老那可訪晉杉定儕類蜀柏豈輩行櫟夢何足神槐語固已妄自無斤斧憂未始疑大匠古柏門歸安縣志在縣南袁家滙根下開廣七尺上復連理髙五六丈中若洞門可出入雌雄木歸安縣志在東林山沈東老菴左一開花不結子一結子不開花一木二幹髙十餘丈返鐘歸安縣志明正德中有司括寺鐘銷為兵器臨冶獨菱湖真武祠鐘用大火不能破竟返之尚書蔣瑤有記陳朝檜避暑録話長興大雄寺大檜相傳陳武帝手植汪藻陳朝檜詩曾經浩劫故依然老壽方知木有仙直幹凌空才百尺虛心閲世欲千年深蟠澤國興祥地獨傲天公造化權玉樹庭花非不好祇今誰憶舊山川榆木版西吳里語歲旱河竭東門外居人於河底得大榆木厚尺餘不可計數版鏤縱橫紋若窗櫺考周禮秋官壺涿氏欲治水神則以牡橭午貫象齒而沈之此版蓋周禮遺制湖多水患疑前以此厭之耳午即互字敢溪鐘德清縣志唐大厯中武康大慈寺僧鑄鐘成其聲宏越朝命取以貢郡以舟致之至縣之敢山溪舟欹鐘覆入水遣人沒求之不得後旱涸聞鍠然作聲則鐘露水次亟迹之復逝石磨𢎞治湖州府志在安吉梅溪每遇風雨則轉疾則年豐遲則年歉回溪碁盤孝豐縣志在浮玉鄉寨前山頂浙江通志卷四十二
