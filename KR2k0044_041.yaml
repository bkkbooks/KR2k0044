body:
  text: 浙江通志卷四十二古迹四湖州府下菰城太平寰宇記在州南二十五里吳興記云春申君黃歇於吳墟西南立菰城縣青樓連延十里吳興志今故址猶存吳興掌故郡志載春申君故宅在下菰城新志亦以為城邑皆非也史記楚封歇為春申君封於江東因城吳故墟以為都邑在今姑胥城內西北隅吳興非所封今所謂下菰城蓋春申伐吳時築營屯駐之處其四望門可證𢎞治湖州府志以澤多菰草因名黃溍登錢山望菰城詩吳興水為州諸山若浮萍況此一培塿瑣屑世未名所欣漁樵居乃與緇錫并種竹有萬竿結茒無十楹老僧解人意屣履能相迎芳草被行徑朱藤暗巖扄蕭條空階暮日照莓苔青猶嫌所厯卑未極遊眺情聳身白雲上始見春申城想當高會時樓觀飛青冥喝海薦罌勺窮山羞鼎鍘安知千歲後寂寥無人行煌煌冠蓋至躍躍狐驚歸來朱門客聽此松風鳴户城𢎞治湖州府志在烏程縣西十九里吳孫皓時置文皇帝陵户二百家城於此邱城西吳里語在烏程縣北十八里近太湖漢丘氏所居也吳越錢氏嘗築城屯戍以拒南唐宋紹興間嘗於此牧馬卜城𢎞治湖州府志在烏程縣西南六十里宋略云龍驤將軍益州刺史卜天與所築因名避它城太平寰宇記杼山在烏程縣西南今山上有古城曰避它顔真卿妙喜寺碑按説文云它蛇也上右患蛇築城以避它也南潯城崇禎烏程縣志在縣東七十二里城周三里至正十三年張士誠築洪武二年拆修蘇州城石城太平寰宇記在烏程縣西南三十里昔嚴白虎壘石為城與呂蒙戰今弩臺之迹猶存吳興志石城在卞山𢎞治湖州府志城山城在長興縣南五十一里西吳里語在長興縣石城山吳時烏程嚴白虎築按史白虎與孫策相距又豈嘗與吕蒙相拒耶吳城西吳里語在長興縣南吳王使夫槩於吳西鄙築城即此邵緝長興吳城詩髙臺無地曲池平溧泊句吳宿古城一岸溼雲沈夜色四山涼葉下秋聲彭城萬厯湖州府志在長興縣東北二十五里黃城𢎞治湖州府志在長興縣東北與郭轉堆皆句吳所築吳興掌故三城三圻在長興東臨太湖吳王屯戍之地步軍列三城水軍列三圻萬厯湖州府志城與圻接畛吳城聯斯圻彭城聯石圻丘城聯蘆圻石圻今沒入太湖斯圻蘆圻仍存謹按吳興掌故載三城三圻不書城名而别列吳城一條云是吳夫概築在長城東二里其里數與郡志所載吳城在縣北三十里者不合是别有一吳城不在三城內矣郡志載吳城彭城黃城云皆句吳所築當即是三城而又云吳城聨斯圻彭城聨石圻邱城聯蘆圻有邱城而無黃城其丘城又另列一條云在烏程縣北十八里雖同近太湖謂是吳越錢氏築又非句吳所築三城內之丘城也考吳越備史無城烏程之文迄難考證大扺上古屯兵之地皆築城壘非止一處古迹湮沒難以指其定處矣九里城𢎞治湖州府志在長興縣西南百九十里東林城𢎞治湖州府志在長興縣西南四十九里吳時所築西林城𢎞治湖州府志在長興縣西南四十八里吳時所築大騎城小騎城太平寰宇記並在長興縣西南一百十里吳地記云吳王濞築此二城為馬廄朱城輿地志在長興縣東南二十四里嚴白虎壻朱叔廉所築四安城𢎞治湖州府志在長興縣西南七十里隋大業九年築後至元季武總兵重築吳興掌故四安者吳興宜興故鄣廣德皆保障於是也將軍城萬厯湖州府志在德清縣吳憾山吳王夫差憾越築壘於此唐至德二年李光弼偏將軍辛孜又築城其上號將軍城吳越錢王亦嘗屯戍號奉國城以其在吳羌山又名吳羌城吳興掌故皎然詩有同李洗馬入餘不溪經辛將軍故城按辛敬順郡之將也刺史獨孤問俗於上元三年因寇亂遣辛築城金鵝山以防南寇西吳里語唐廣德初袁朝陷浙中湖州刺史獨孤問俗率將士築城拒之以近金鵝山又名金鵝山城德清縣志在縣治西數里枕溪謹按成化郡志將軍城吳羌城各列一條又云吳羌城即將軍城考山川志吳羌山在縣東南一里吳憾山在縣西南二百步明是二山亦明是二城矣至於至德上元皆唐肅宗年號上元無三年自至德二年至上元二年凡五年築城固屬同時是即二城之證也永安城𢎞治湖州府志在武康縣餘英溪北隋仁壽二年中使蘇倫徙於溪南有四門東撫耘南朝恩西懷安北平逺宋紹興間尚存牙門城餘英志在縣北五里鳯凰山北梁侯景之亂縣人司徒長史沈子春築城於此子春時為牙門將軍因名赤眉城太平寰宇記石城山在武康縣漢末赤眉之亂邑人於山上纍石為城西吳里語山巔有洗馬池晏子城吳興掌故在安吉西北二十里晏子鄉萬厯湖州府志舊屬長興西吳里語晏子娶吳王女築城於安吉後耕者每得黃金狀如四角菱中有齊字有人題詩云豚肩不掩豆狐裘三十年身後黃金出其然豈其然故鄣城𢎞治湖州府志在安吉西北十五里秦置唐併入長城今屬安吉太平寰宇記今俗號府頭是也後府城嘉靖安吉州志去州西北二十五里吳大帝所築穆王城嘉靖安吉州志在鳯亭鄉昔嶽飛於此壘土結營後諡武穆人遂以穆王城呼之漢司𨽻校尉治太平寰宇記春申君於吳墟西南立菰城縣後漢司𨽻校尉萬向於此築版溉田漢永縣治明一統志在府城西北漢興平初太守許貢奏分烏程置此縣晉東遷縣治𢎞治湖州府志東遷舊縣在烏程縣東晉太康元年分烏程東鄉置唐射堂𢎞治湖州府志在白蘋洲西唐貞元中刺史李詞建顔真卿為記集古目録射堂記顔魯公在湖州所書刻於石者宋諸廳𢎞治湖州府志通判廳在州治西偏治平三年張大寧建添差通判廳在譙門內西偏舊司法廳紹興七年建僉判廳在衙東門內添差僉判廳在子城外之西舊稅官廨趙師皋始居此趙善臨創廳事轉運提刑司廳在子城西南舊苕濵館節度掌書記廳在僉判廳西録事參軍廳舊在州門內西偏後在子城外之西面南州院在焉司理參軍廳在子城外之西面東司理院在焉司法參軍廳寶元初建於子城西偏後為添差通判廳徙於軍資庫北司户參軍廳在司理院南兵馬鈐轄廳寓鴻禧寺路分都監廳在添差僉判廳西舊兵馬司也兵馬司在路分廳南兵馬押監舍一在小景德寺一在南廟睦宗院在景德寺紹興中立宋倉庫坊局𢎞治湖州府志永寧倉在白蘋洲唐建名永盈後改永寧宋嘉祐中重修常平倉在永寧倉內西倉在清源門內軍資庫在譙門內唐建嘉祐中重修常平庫在軍資庫西甲仗庫在儀門內嘉祐中建公使庫在甲仗庫北都酒務在駱駝橋東北慶元中建贍軍酒庫在子城東南舊迎恩驛都稅務在霅溪南回易庫抽鮮庫俱附都稅務醋庫在子城西南茶場在清源門南岸船場嘉祐中創於白蘋洲東岸鐵作院附銅官廟安濟坊紹興中置於奉勝門內惠民藥局在稅務右宋兵屯萬厯湖州府志宋太平興國中湖州設禁軍營四威果在子城西南雄節在子城西北全捷在子城西北龍騎在子城北廂軍營四崇節在子城北壯城在子城西南水軍在子城北牢城在子城北皆屯兵以司防禦宋貢院西吳里語王十朋乾道三年知湖州郡有貢院廢弛已久乃出俸錢率州人共成之宋教場萬厯湖州府志在郡治西北內有正己亭宋社稷壇成化湖州府志舊壇在清源門內祥符寺東宋政和元年知州章援建𢎞治湖州府志又社稷壇二所一在烏程縣西一里一在太湖旁後廢括地志烏程縣東一里孫皓宅前有社廟巷元録事司治𢎞治湖州府志在城四廂不詳所在元稅課司𢎞治湖州府志在駱駝橋西晉長城縣治明一統志在長興縣東南十八里晉武帝分烏程西鄉立長城縣於富陂村即此梁城山戍西吳里語長興城山梁太守張􅌘與御史中丞沈浚築戍以捍侯景之亂隋長州治明一統志在長興縣隋大業末沈法興置此州後廢隋鷹揚府萬厯湖州府志長興縣四安城隋大業九年置鷹揚府於此唐綏州治明一統志在長興縣唐武德中置因古綏安縣為名又更名雉州後廢宋貢茶院𢎞治湖州府志在長興縣西北面官山貞元中以吉祥寺置修貢堂有貢茶刺史題名吳王屯戍德清縣志縣南乾元山吳王築城於此唐武源縣治太平寰宇記德清縣唐天授二年置武源縣成化湖州府志舊縣治在下蘭山面餘不溪以水勢衝激天寶中移𢎞治湖州府志舊志不載下蘭山未詳其所在宋牧馬寨德清縣志在縣西南宋殿前司馬軍每歲放馬數千牧於此洗馬灘尚存其名古防風國輿地廣記武康縣本防風氏之國太平寰宇記防風山先名封嵎山上有風公祠下有風渚水𢎞治湖州府志封禺二山禺山本禹十二代孫帝禺所居謹按風渚蓋因防風氏得名𢎞治郡志載風渚湖在武康縣東南十七里明屬湖郡自志杭地古迹者闌入風渚謂近金鵝山考郡志金鵝山在德清縣西南五里惟路史注云錢塘有金鵝山防風氏所封山下有風渚後人因此遂沿其誤矣唐安州治明一統志在武康縣唐志云李子通立安州又曰武州唐初因之尋廢漢原鄉縣治明一統志在長興縣漢中平初分故鄣縣置長興縣志原鄉者以縣在山中多髙原故也郡志以安吉舊治在天目鄉而不知其為原鄉今復建為孝豐芳菲園吳興志吳越錢氏時清源門內有芳菲園陳堯佐間步過芳菲園詩盡日芳菲園不見芳菲好茂草與斜陽脈脈情多少西園崇禎烏程縣志縣署舊有西園見梅堯臣詩趙氏三園癸辛雜識在南城下與其第相連局勢寬間氣象宏大後有射圃崇樓甚壯趙氏清華園癸辛雜識新安郡王之家後依北城前有大池葉氏石林園癸辛雜識左丞葉少蘊之故居在卞山之陽萬石環之正堂曰兼山有從好承詔求志等堂及淨樂菴愛日軒躋雲軒碧琳池又有巖居真意知止等亭總榜曰石林精舍吳興園林記其鄰有朱氏怡雲庵涵空橋橋下為玉澗故少藴以玉澗名其書劉一止訪石林精舍詩山行不用瘦藤扶度石穿雲意自徐夜過西巖投宿處滿身風露竹扶疏謹按石林辭有題意仕亭又西園右春亭新成其自撰石林山堂記云榜其廳之東西兩壽曰近仁近智而廳曰樂壽則石林中堂軒之名正多矣畢氏園癸辛雜識畢再遇承宣所葺正依迎禧門城三面皆溪其南丘山在焉亦歸趙忠惠趙氏繡谷園癸辛雜識舊為秀邸今屬趙忠惠家一堂據山椒曰霅川圖畫盡見一城之景李氏南園癸辛雜識李鳯山參政本蜀人居霅因創此為遊翔之地中有傑閣曰懷岷穆陵御書也趙氏園癸辛雜識端肅和王之家後臨顔魯公池依城曲折雜植拒霜號芙蓉城有善慶堂最勝丁氏園癸辛雜識丁總領園在奉勝門內後依城前臨溪蓋萬元亨之南園楊氏之水雲鄉合二園而為一後有假山及砌臺鄒氏園向氏園經鉏堂雜志並在霅川城內南沈尚書園癸辛雜識沈德和尚書園依南城近百餘畝果樹甚多林檎尤盛內有聚芝堂藏書室堂前鑿大池幾十畝中有小山謂之蓬萊池南樹太湖三大石各髙數丈秀潤奇峭有名於時兆沈尚書園癸辛雜識沈賔王尚書園正依城北奉勝門外號北村後又名曰自足有靈夀書院怡老堂溪山亭對湖臺盡見太湖諸山葉適北村記户郜尚書吳興沈公園於城北奉勝門外畝餘三十中涵五池大半皆水惟對湖臺髙不逾丈具區前臨湖心遠峰明晦滅沒迎而後溪鳯凰毗辨諸山往往湊泊於溪山亭臺之下殆或天與者故名其回曰自足余嘗評天下山水之美吳興特為第一其山脈地絡融液而津灌者莫非氣之至清渟止演漾澄瑩紺徹數百十里接以太湖蒲荷蘋蓼盛衰榮落無不有意而來鷗去鳥風帆浪楫恣肆渺莽不知其所蓋仙聖之宅非人世也余海濵之人常恨不得生長其地今公乃以築圃大指使余記之豈非所願欲也哉丁氏西園癸辛雜識丁葆光之故居在清源