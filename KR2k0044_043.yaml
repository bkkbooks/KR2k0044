body:
  text: 浙江通志卷四十四古迹六紹興府上越古城吳越春秋越王曰寡人欲築城立郭分設里閭欲委屬於相國於是范蠡乃觀天文擬法於紫宫築作小城周千一百二十一步一圓三方西北立龍飛翼之樓以象天門東南伏漏石竇以象地户陵門四達以象八風外郭築城而缺西北示服事吳也不敢壅塞內以取吳故缺西北而吳不知也城既成而怪山自來范蠡曰臣之築城也其應天矣崑崙之象存焉太平寰宇記廢郡城在山陰縣南三里萬厯紹興府志越時古城以今地考之在西南西北二隅之內越小城越絶書句踐小城山陰城也周二里二百二十三步陸門四水門一嘉泰會稽志今廢惟趣王臺遺址尚存越王城嘉泰會稽志山陰越王城在府西南四十七里舊經云越王墓在古城村今城雖不可考然地名猶曰古城也陽里城越絶書陽城里者范蠡城也西至水路水門一陸門二萬厯紹興府志山陰陽里城地名陽城里北陽里城越絶書北陽里城大夫種城也取土西山以濟之徑百九十四步或為南安苦竹城越絶書苦竹城者句踐伐吳還封范蠡子也其僻居徑六十步因為民治田塘長千五百三十三步范蠡苦勤功篤故封其子於是去縣十八里水經注山陰縣有苦竹里里有舊城句踐封范蠡子之邑嘉泰會稽志在山陰縣之西南二十九里萬厯紹興府志凡越絶所稱縣皆山陰縣也石城萬厯紹興府志山陰石城在府北三十里名石城里吳越備史乾寧三年武肅王討董昌自西陵趨石城古城𢎞治紹興府志周一里許吳時朱然為山陰令所築歲久湮廢不可考會稽山上城越絶書會稽山上城者句踐與吳戰大敗棲其中因以下為目魚池其利不租圖經在縣東南一十里句踐為夫差所敗以甲楯五千保於此城也會稽山北城越絶書會稽山北城者子胥浮兵以守城是也嘉泰會稽志吳王城在會稽縣東一十里夫差圍句踐於會稽山伍員築此城以屯兵華氏考古有大吳王村小吳王村並是闔閭夫差伐越所舍處也今吳王里尚沿其名南小城越絶書東郭外南小城者句踐氷室去縣三里曰氷室者所以備膳羞也侯城嘉泰會稽志侯城在會稽縣東五十八里史記云夏后氏少康封子無餘於越所都即此城也土城吳越春秋越王使相者國中得苧蘿山鬻薪之女曰西施鄭旦習於土城臨於都巷三年學服而獻於吳名勝志今五雲門外有土城村西施里是其遺迹西陵城越絶書浙江南路西城者范蠡敦兵城也其陵固可守故謂之固陵水經注范蠡築城於浙江之濱言可以固守謂之固陵今之西陵也寶慶會稽續志西城在蕭山縣西十二里吳越武肅王以陵非吉語遂改曰西興今按越絶書浙江南路西城者范蠡屯兵城其陵固可守故謂之固陵詳此即今之西陵也圖經前志俱未引及謹按會稽志既列西陵城在蕭山縣西十二里又列越王城在縣西九里據會稽續志之辨證之水經注之文是會稽志誤一城為二也又考會稽志引皮光業錢武肅廟碑有城西陵事云舊基在明化寺南當是錢王又增築城因有改陵為興之語遂指越王城為越王建西陵城為錢王建失越絶水經注之義矣錢清城𢎞治紹興府志錢清城在錢清鎮今廢嵩城嘉泰會稽志在上虞縣西北六十里其城斷絶橫亘數里乃古壘也晉史載安帝隆安間孫恩自海攻上虞朝廷遣劉牢之袁嵩築扈瀆壘沿海備恩嵩城之名當始於此太平寰宇記上虞縣故城今縣西廢城是也剡城元和郡縣志漢舊縣故城在今剡縣西南十二里剡録漢剡縣城在今縣東北嘉泰會稽志在嵊縣西十五里唐武德四年置嵊州及剡城縣八年廢𢎞治紹興府志剡城按舊志在縣西十五里舊經云在縣西四十五里與舊志不同址不可考新昌土城萬厯新昌縣志新昌土城久廢無考惟存迎恩鎮東候仙拱辰四門名而已竊疑東堤舊址首起龍山尾接北鎮其迹略如城制或即此耳越王無餘舊都水經注秦望山南有嶕峴峴裏有大城越王無餘之舊都也越王宫臺越絶書句踐小城今倉庫是其宫臺處也周六百二十步柱長三丈五尺三寸霤高丈六尺宫有百戶高丈二尺五寸稷山者句踐齋戒臺也龜山者句踐起怪遊臺也東南司馬門因以照龜高四十六丈五尺二寸周五百三十二步駕臺周六百步今安成里離臺周五百六十步今淮陽里丘美人宫周五百九十步陸門二水門一今北壇利里丘樂野者越之弋獵處大樂故謂樂野其山上石室句踐所休謀也去縣七里中指臺馬丘周六百步今高平里丘北郭外路南溪北城者句踐鼓鐘宫也去縣七里其邑為龔錢舟室者句踐船宫也去縣五十里吳越春秋東武起遊臺其上東南為司馬門立增樓冠其山巔以為靈臺水經注怪山者越起靈臺於山上又作三層樓以望雲物起離宫於淮陽越舊經淮陽宫在會稽縣東南二里宿臺在於高平越舊經中宿在會稽縣東十里駕臺在於成邱立苑於樂野十道志樂野句踐以此野為苑今有樂瀆村燕臺在於石室越舊經燕臺在州東南十里齋臺在於襟山越境無襟山當作稷稷山在會稽縣東五十三里句踐之出遊也休息食室於氷厨水經注鼓吹山之西嶺有賀臺越伐吳還而成之故曰賀臺句踐宗廟水經注句踐所立宗廟在城東明里中甘滂南靈文園元和郡縣志山陰故靈文園也明一統志漢文帝母薄太后之父會稽人卒葬於此追封靈文侯故置園漢都尉治越絶書漢文帝前九年會稽并故鄣郡太守治故鄣都尉治山陰太平寰宇記山陰縣本秦舊縣置在會稽山北龜山西漢以為郡都尉所居嘉泰會稽志文帝時會稽吳王濞封國漢不當置都尉考漢紀景帝中二年始更郡尉為都尉則文帝時其官稱亦未應有都尉之號也唐府僉廳名勝志蓬萊閣之東唐大厯中皇甫溫建御史大夫崔元翰為記後唐天復間改建安撫僉廳即鎮東軍監軍使院宅也唐浦陽府隆慶山陰縣志在縣西四十里唐書云會稽有府曰浦陽蓋唐之兵府也古教場𢎞治紹興府志自晉以來教場並在五雲門外唐遷城西迎恩門外今謂之古教場宋時有二一在稽山門內一在卧龍山上吳越王東府吳越備史唐乾寧三年武肅王平董昌改威勝軍為鎮東軍拜武肅鎮海鎮東軍節度遂有越州之地梁開平二年升為大都督府謂之東府周廣順元年大元帥吳越國王即越州東府築宫室治園圃花卉山石池塘亭苑嘉泰會稽志卧龍山之東麓是為鎮東軍節度即子城之東為軍門榜曰鎮東軍東向大河即舊經所謂簞醪河也是即府治吳蛻鎮東軍使院記元帥彭城王平難帝命兼而鎮之上將軍汝南周公監護之乃命軍吏揆日經始纍月工畢重門列楹顯敞豐博東廂西序窈窕深邃越城之中稱為一絶時天復元年也宋行宫中興小厯高宗以越州治為行宫嘉泰會稽志紹興元年九月高宗駐蹕會稽以州治為行宫會當郊祀乃行明堂大禮即以設廳為明堂宋福王府萬厯會稽縣志在府東坊宋嘉定十七年理宗即位以同母弟與芮奉祀父榮王開府山陰蕺山之南府東大池其臺沼也宋提刑司治輿地紀勝在府治之東前臨運河與蓬萊閣相望宋提舉司治輿地紀勝在府衙東一里紹興末以賜皇姪恩平郡王璩而遷倉司於鎮東門外尋以新衙改賜恩平而司復還其舊今治所是也宋通判廳嘉泰會稽志北廳在府東六十步南廳在府南六十四步東廳在府東南八十五步宋路鈐轄廨嘉泰會稽志在府東北一里二百五十五步宋曹官廨嘉泰會稽志簽書節度判官廨在府治西南二百七十步觀察判官廨在府治南二百六十步觀察推官廨在府治東北一里録事參軍廨在府治西南宣詔亭下司理參軍廨在府治南獄在焉司户參軍廨在府治東南一里司法參軍廨在府治東南二里宋軍營沈立越州圖序越為畿輔其軍營制度皆準禁衛廂兵之法嘉泰會稽志雄節係將第一指揮營在第五箱秦望門威捷係將第二指揮營在第一廂都亭橋威果係將第念二指揮營在第四廂鯉魚橋威果係將第念三指揮營在第三廂水溝坊全捷係將第四指揮營在第五廂秦望門全捷係將第五指揮營在第三廂水溝坊威果不係將第五十四指揮營在第五廂卧龍坊全捷不係將第十三指揮營在第五廂秦望門防守步軍司指揮營在攢宫禁圍外崇節第七指揮營在第五廂秦望門崇節第八指揮營在第一廂錢武肅廟壯城指揮營在第一廂北善法寺側牢城寧節第二指揮營在第一廂馬坊橋東屯駐營在第五廂附威果營都泗堰營曹娥堰營在會稽縣東南梁湖堰營在上虞縣西錢清南堰營在山陰縣西錢清北堰營在蕭山縣東打竹索營通明堰營在上虞縣東西興捍江營在蕭山縣西三江寨屬山陰縣曹娥寨屬會稽縣龕山寨西興寨西興都巡寨魚浦寨新林寨屬蕭山縣廟山寨三山寨眉山寨屬餘姚縣長樂寨屬嵊縣管界寨紫巖寨屬諸暨縣宋倉庫𢎞治紹興府志宋代倉庫之制立法最詳今時制度尚有仍其舊者嘉泰會稽志苖米倉在府衙東二百步如坁倉在府衙東北一里支鹽倉在府衙東二里常平倉在府衙東二百步夏麥倉在府衙南二百步受納糯米倉在西門外一里都稅務在府衙東一里九十步都酒務在府衙南一百二步比較務在府衙南一百步和旨庫在府衙東二百六十步激賞庫在府衙東二里十步公使庫軍資庫甲仗庫並在府衙架閣庫在府衙設廳北常平茶鹽庫在府衙西經總制庫移用庫五分錢庫並在通判北廳激賞錢庫在府衙西回易庫在府城東北醋庫在府城東造袋局在府東北提舉司惠民局在府東湯浦紙局新林紙局楓橋紙局三界紙局合同場都物料場在府衙南子城內受納稅場在府衙內抽解竹木場在府橋收糴糯米場在迎恩門外受給場在府城東二十五里排岸司在城南卧龍坊都作院在府衙南省馬上院省馬下院替火隊並在府衙西宋亭館嘉泰會稽志府城蓬萊館在卧龍山之左東問津亭北通川亭皆臨府東大河即古簞醪河水光映發望之如圖畫舟車既屆必有次舍實一州佳觀也子城東門有豐宜館今為觀察判官署城西迎恩門東五雲門有分香亭以送迎御香由陵寢是也按圖經唐觀察使李紳嘗於府東建候軒亭今廢府東北有安軺驛是為軺亭亦廢葆光録皮光業微時嘗夢至候軒亭亭中土偶皆列拜覺而自負後果知東府翟忠惠帥越時亭尚無恙公出其繖風置蘭上或謂亭神為祟公怒毁之今市人猶稱候軒亭陸遊寓蓬萊館詩朱門高柳畫橋南掠面風埃喜解驂霽日偶逢春盎盎野人不慣屋潭潭堂中剩喜簮裾集樓上時聞鼓角酣明發扁舟覔歸路趁時吾欲事農蠶宋貢院紹興府志在郡城西北隅今題曰古貢院山陰縣志縣北錦鱗橋宋時浙東貢院故址宋社稷壇嘉泰會稽志在府城南二百九十步初政和間頒大晟樂祭社稷宋山陰縣舊治山陰縣志在府治南寶林山麓其創建無可考於越新編即宋省馬院之故址元録事司治𢎞治紹興府志元時以府治為路廨别置録事司於府治東十五步唐永興縣治萬厯蕭山縣志天寶元年改永興為蕭山縣考永興舊治當在長興鄉蕭然北幹之間故開元時有韋知微之事是改縣名時即改治矣唐永興簿廨萬厯蕭山縣志唐天寶前縣治疑在長興鄉主簿廨內有靈泉駱賔王為頌越王允常故都元和郡縣志諸暨縣越王允常所居會稽三賦注少康庶子封於會稽後二十餘世至於允常吳越春秋云越之興霸自允常始漢漢寧縣治嘉泰會稽志興平二年分諸暨大門村為漢寧縣吳改吳寧縣今大門里或即其地宋義安縣治嘉泰會稽志乾道八年分諸暨之楓橋鎮為義安縣淳熙元年廢遺址尚存漢始寧縣治嘉泰會稽志順帝時分上虞南鄉為始寧縣隋廢萬厯紹興府志三界市即漢始寧