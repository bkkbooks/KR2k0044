縣宛委山下唐改為懷仙館名勝志宛委山陽明洞傍有黃帝候神館宋尚書孔靈産入道奏改為懷仙館西陵館輿地紀勝唐周匡物龍溪人家貧應賢能之書徒步西上道經錢塘江久不得濟乃於西陵館題詩云萬里茫茫天塹遙秦王底事不安橋錢塘江口無錢渡又阻西陵兩信潮至今官渡不受選人錢謹按全唐詩匡物此詩題云應舉題錢塘公館然自龍溪徒步西上則當自越之杭審其詩意亦當阻於西興輿地紀勝繫之蕭山是也此詩又作施肩吾略易數字日門館嘉泰會稽志南史杜京産於會稽日門山聚徒教授紹興府志在餘姚太平山吳郡杜徵君構宇太平之東結架菁山之北爰以幽竒别就基址棲集有道多歷歲年凝虛館萬厯上虞縣志在縣簿廳側石曼卿寄題蘇簿凝虛館詩越基擅巖壑虛館宅其尤丹甍熠孤飛靈景邈四周山高晴若陰洞寒夏如幽幄檻庭花發玉環渠水流間卧真吏隱乍登仍仙遊居之宜民思無為兹宇羞鵝山館萬厯上虞縣志在嵩壩南遺址尚在太平館名勝志在嵊縣太白山南史褚伯玉居剡齊高帝敕於剡西太白山立太平館居之吕氏莊嘉泰會稽志出迎恩門有吕氏莊因古城遺址巨竹森茂莊有亭榭花木可以置酒麓湖莊山陰縣志在常禧門外南莊陸遊有夏夜泛溪至南莊復回湖桑詩白雲莊名勝志新昌縣南明山有白雲莊清白堂寶慶會稽續志在府治蓬萊閣西康定中范仲淹作范仲淹清白堂記府治據卧龍山上有蓬萊閣閣西有涼堂堂之西有巖巖之下獲廢井泉清而色白淵然丈餘引不可竭因署其堂曰清白又建亭其側曰清白亭時康定元年也王十朋清白堂詩錢清地古思劉寵泉白堂虛憶范公印綬紛紛會稽守誰能無愧二賢風井儀堂名勝志蓬萊閣西錢公輔井儀堂記堂在蓬萊閣之上望海亭之下西樓其左西園其右成於嘉祐六年主人刁公約景純逍遙堂嘉泰會稽志在府治張伯玉寓興詩云旌麾千騎長風月一堂深即此清思堂輿地紀勝在使宅前嘉泰會稽志按張伯玉清思堂晝坐詩白雲無事不肯去幽鳥有時還自來今堂在重屋之後略無所見以前人題詠考之恐非今處棣蕚堂輿地紀勝在州宅洪內翰邁所名以兄文惠公嘗守越取綸告中語名之觀風堂方輿勝覽在使宅東紹興中曹泳建王十朋觀風堂詩薄俗澆風有萬端欲將眼力見應難但令心境無塵垢端坐斯堂便可觀鎮越堂寶慶會稽續志在府廨汪綱建汪綱鎮越堂柱記嘉定辛巳豫自憲移帥於此築一堂以鎮越名之地高而爽堂奧而明秦望諸山皆欣然領會有效竒獻秀之勢又創行廊四十間於兩翼聨屬蓬萊且并與閣一新之山川朝拱氣象環合而斯堂之勝獨擅於越中矣雲壑堂寶慶會稽續志在卧龍之東汪綱建𢎞治紹興府志堂前有喬松甚古賢牧堂嘉泰會稽志在府廨即清白堂故址越人建以祀范文正公後史文惠公增趙清獻後又增丞相朱忠靖公勝非趙忠簡公鼎及參政張公守內翰翟公汝文寶慶會稽續志嘉定中守吳格又增史忠定為七人志省堂沈起志省堂記嘉祐五年余自監察出通判會稽因郡所居之署有大亭錢氏建者余取廢材隙功治而新之不逾月而告成壽樂堂嘉泰會稽志在通判南廳熙寧中簽書判官太子中舍張次山建即簽判舊廳之南堂也蘇軾越州張中舍壽樂堂詩青山偃蹇如高人常時不肯入官府高人自與山有素不待招邀滿庭户卧龍蟠屈半東州萬室鱗鱗枕其股背之不見與無同狐裘反衣無乃魯張君眼力覷天奧能遣榛棘化堂宇持頤宴坐不出門收攬竒秀得十五才多事少厭間寂卧看雲煙變風雨笋如玉筯椹如簮強飲且為山作主不憂兒輩知此樂但恐造物怪多取春濃睡足午窗明想見新茶如潑乳民事堂嘉泰會稽志在通判東廳王十朋簽判日創世綵堂寶慶會稽續志在通判南廳倅史文卿創桂堂嘉泰會稽志在通判北廳便廳之南吳興施宿所建今袁尚書起巖書扁盡心堂和樂堂寶慶會稽續志在提刑司宣和元年並蔡佃建澄清堂寶慶會稽續志在提刑司淳熙中倪思作堂記棣華堂寶慶會稽續志在提刑司淳熙中芮輝建以其兄曄於乾道中嘗蒞是職大雅堂嘉泰會稽志在山陰尉廨紹興中尉沈山作記寬簡堂嘉泰會稽志在會稽縣廨知縣廬陵歐陽伋建王逸少書堂嘉泰會稽志在山陰蘭亭鵝池墨池在焉後人追懷風流葺為流觴曲水湖上草堂萬厯紹興府志在鏡湖上釋皎然題湖上草堂詩山居不買剡中山湖上千峯處處間芳草白雲留我住世人何事得相關蜀山草堂山陰縣志在蜀山元薩天錫有詩王處士草堂紹興府志在會稽唐劉長卿有王處士草堂畫衡霍諸山詩齊抗書堂嘉泰會稽志會稽山南别峯曰石傘峯之下有唐齊抗書堂流光堂萬厯蕭山縣志在江寺張即之題江聲草堂紹興府志在蕭山西興鎮薩天錫題江聲草堂詩卜居西陵下門臨大江臯江聲自朝夕豈獨喧波濤海潮作波浪山嶽俱動搖海潮有時息逝水去無極驚風吹浪花噴剪射崖壁萬籟俱澄心何必絲竹音月明歌水調驚起蛟龍吟怡怡山堂蕭山縣志在北山又名蕭然山堂任長者之别墅劉基王褘多寓此皆有記碧蓮堂書史楊次公飛白書在諸暨永慶院翰墨堂名勝志餘姚縣治北負祕圖山宋時刻蘇子瞻手翰嚴公堂嘉靖餘姚縣志縣署高風閣前令徐端禮建對嚴光客星山因名李光嚴公堂詩子陵古真隱逸氣橫九州平生江海志自比巢與由鴻飛本冥冥肯為稻粱謀虛屈萬乘顧枉煩物色求貽書誚君房預作腰領憂舜江子邑里子志踰千秋高山無古今大江日東流人物浪淘盡英名至今留當年漁釣地陳迹餘空丘瑞柏堂嘉靖餘姚縣志元州同知廨危素為記二槐堂嘉泰會稽志餘姚縣尉廨因史丞相浩魏丞相把相繼為尉後人遂以為名世友堂餘姚縣志在燭溪湖宋嘉定中孫祖佑建寶慶會稽續志餘姚孫應時號雪齋居餘姚燭湖上兄子祖佑崇緝先志為新堂曰世友葉適嘗賦詩信芳堂瑞豐堂萬厯上虞縣志在縣圃並宋令趙希惠建讀書堂萬厯上虞縣志東漢朱侍中俊讀書堂在縣西北側有洗硯池謹按𢎞治郡志載上虞有朱買臣讀書堂傍有洗硯池考朱俊傳俊乃上虞人以孝養重於鄉閭此堂當是俊也買臣實吳人郡志誤耳不礙雲山堂戴表元不礙雲山堂記上虞陳䇿孔晨所居在雪岑青山霞書堂南山堂𢎞治嵊縣志並在縣治宋令史安之建翔鳯堂𢎞治紹興府志在嵊縣簿廨宋建李紳書堂𢎞治紹興府志在嵊縣北龍藏寺側紳少年肄業於此李紳新昌宅書堂前有藥樹一株前長慶中於翰林院西軒移歸今則長成名之天上樹詩白榆星底開紅甲珠樹宫中長紫霄丹綵結心才辨質碧枝抽葉乍成條羽衣道士偷元圃金簡真人護玉苖長帶九天餘雨露近來蔥翠欲成喬玉峯堂於越新編在嵊縣明心寺東宋學士高文虎作內有秀堂藏書寮雪廬淵源堂𢎞治嵊縣志在東曦門內宋邑人周瑜建延王十朋居師席王十朋淵源堂十二詩序淵源堂細論堂宜桂軒藴秀軒同襟館富學齋輝聲齋集彥齋恢義齋蘭馨室足理居凡十二題光遠堂𢎞治紹興府志在新昌縣治元縣令完顔從忠建齊顗書堂寶慶會稽續志新昌南明山唐齊顗隱居之地萬卷堂嘉泰會稽志在新昌縣石溪鄉石待旦創以貯書又為義學三區號上中下書堂使學者迭升之人以此勉勵成名者甚衆舊有題名碑韓玉汝撰記自杜祁公而下七十二人皆由此登科云平波書堂成化新昌縣志在縣北一里宋黃庚所居中有秋芳亭石鼓書堂成化新昌縣志在縣西石鼓山之陽宋太常博士石亞之讀書之所樓攻愧有序平山書堂成化新昌縣志在縣西獨秀山之麓宋儒章一經讀書之所有屏山堂橘軒遁莊竹外溪山樓怡老堂貞愛堂棲碧樓拱北堂黃氏山堂名勝志新昌縣南百步許宋黃庭所居中有飽山閣得心亭老山樓陳傅良黃氏老山樓詩世路倦追攀抱書藏故山與山成二老相對兩蒼顔聫槐堂成化新昌縣志元儒周明德所居宋濂記資深堂萬厯新昌縣志在忠信坊元處士潘音建東齋沈立越州圖序刺史之居東齋西園皆燕遊之最圖經後漢王朗為會稽郡守子肅隨在郡於東齋注易中夜有女子從地中出自稱越王女與肅語盡夕辭别贈墨一丸旦用此墨便覺才思開敏卧龍齋嘉泰會稽志在通判北廳南豐曾鞏在越時有卧龍齋見元豐類稿澄齋寶慶會稽續志在提舉司蕺隱齋戴表元蕺隱記儒者王廷吉家於蕺山之陽而名讀書之齋曰蕺隱逍遙齋諸暨縣志宋主簿吳處厚建有記恕齋萬厯上虞縣志宋嘉定中令樓杓建克齋成化新昌縣志在石溪之上宋儒石子重所居朱文公記石氏山齋晏殊新昌石氏山齋詩書仙十閣壯儒宫靈越山川氣勢雄小小齋於越新編在新昌縣後宋孝子吕升所居有看秋樓宋柏尚存吕不用有記清隱軒寶慶會稽續志在府治東政和間王仲薿作清曠軒寶慶會稽續志在府廨嘉定十五年汪綱建蘸碧軒嘉泰會稽志在鏡湖上齊唐詩云飛棟新成蘸碧軒聽鶴軒徐一夔聽鶴軒記越城之陰有山曰小蓬萊道士多蓄鶴郡有老儒王好問居山之南恆夜坐鶴數羣飛鳴而過因自署其軒省軒戴表元省軒記王麟伯官蕭山所居棣蕚軒蕭山縣志在招賢坊包大同舊宅劉基有記其兄弟五人皆登仕籍故名懷古軒騰笑軒萬厯上虞縣志在縣廨並宋令陳炳建簡靜軒萬厯上虞縣志在丞廨宋丞范承家建疏山軒𢎞治嵊縣志在東白山南齊褚伯玉建待清軒萬厯新昌縣志南洲處士潘音隱居之所環松軒萬厯新昌縣志在桃源觀宋周益公有詩來月軒萬厯新昌縣志在桃源觀西清虛菴萬厯紹興府志宋乾道間朱晦菴先生遊水簾還訪梁平叔同宿於此爽心軒成化新昌縣志在縣東溪口舊傳有詩云隱居人未識一見爽塵心惟許魚鳬鳥忘機古到今後人因為築軒浙江通志卷四十四
