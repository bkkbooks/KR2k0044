熙間周廷尉為郡造飛梯以蠟模之莫識其義俗傳夏帝踐歴故刻此石陳襄題韋羗山詩去年曽覽韋羗圖云有仙人古篆書千尺石巖無路到不知科斗是何如峽山赤城志在縣東南一十五里衆峰拱揖列岫迂迴致侔川峽故名萬竹山赤城志在縣西南四十五里絶頂曰新羅九峰回環道極險隘嶺上叢薄敷秀平曠幽窈自成一村薛昂萬竹山詩萬竹山中數十家重重流水遶桑麻飽餐鼓腹成何事桃李春風任自花石龕山赤城志在縣東一十五里上有石室深三丈廣踰一丈俗傳神靈栖焉瓏崆山名勝志在縣西南十五里山多玲瓏巨石枕海山仙居縣志在縣西北五十五里俗傳其趾與海通潭水潮汐相應玉几山仙居縣志在縣西南五十里金山下俗呼為船巖山金山台州府志在縣西南五十里舊十三都境俗傳謂之鵝頸山靈山名勝志在縣西二十里禽鳥不敢棲白冠山台州府志在縣西六十里舊傳曽有仙人戴白冠往來其上又曰白鸛山以是山常産鸛也林谷深䆳背接東陽縉雲界凌雲山台州府志在縣西八十五里石屏山在其下旁有一巒形似將軍名隠將巖披雲山仙居縣志在縣西南五十五里遙望烟雲繚繞紛披如畵小桐山仙居縣志在縣東南三十里烈女湖在其麓王姥山名勝志在仙居縣界亦名天姥山相傳古仙人所居晒馬坪山台州府志在縣東北五十里其頂坦平廣可數頃中有古湫䕃溉甚逺三井山赤城志在縣北三十里以有三龍湫故名鑊底山台州府志在縣西南六十里與盛旄山連紫岷山仙居縣志在縣東北八十里由盧𡵻山進接天台界道赭山台州府志在縣西南一百里山南即永嘉界通張溪㠐山台州府志在縣西九十五里一名陽岸嶺孤峰髙聳壁立千仞與蒼嶺接白馬山仙居縣志在縣西南一百一十里西接縉雲相傳勾踐避兵過之失白馬於此浮石山嘉靖浙江通志在縣南三里下有巨石屹立溪中視之若浮楓田山台州府志在縣南八十里南峰赤城志在縣南三里其巔四面軒舒山水環擁為邑人遊覽之最白巖山仙居縣志在縣南十五里景星巖台州府志在縣西南五十五里幽䆳迂折繞二十四盤而上潘耒仙居諸山游記景星巖絶類巨艘山脚四飛為其橈棹有玊柱峯龍湫澗響巖摘星臺諸竒方巖台州府志在縣東南四十五里朱溪上西境潘耒仙居諸山游記方巖乃無數石笋攢列成城如排簫編笙駢拇枝指萬仞削立不可階梯張鍾斗方巖詩聞道方巖勝捫蘿絶頂尋閣空雲不散心寂鳥相親竹引千林籟松連十里隂問僧修㡬世掛衲此禪林麻姑巖赤城志在縣西南二十五里麻姑訪王方平於此故名巖上有洞兩石相峙有麻姑像存焉蒼嶺嘉靖浙江通志在縣西北九十里髙五千丈周回八十里界於縉雲重岡複徑随勢髙下險峭峻絶為東浙最仙居縣志與栝蒼山通故名一名風門劉昭禹蒼嶺詩盡日行方半諸山直下看白雲随歩起危徑極天盤瀑頂橋形小溪邊店影寒往來空太息𤣥髪改非難界嶺仙居縣志在縣東三十七里與臨海白水洋舖分界游鳩嶺台州府志在縣東南五十里蒼山之趾通臨海石塘界王嶺仙居縣志在縣西南一百六十里與金處二郡接壤之地桃花洞台州府志在縣南三里南峰山側大溪環其足每當二三月桃花盛開爛熳若錦盧明章秋日遊桃花洞詩憑髙試一望秋色滿平蕪山缺邀雲補崖傾倩石扶渇虹多飲澗怪鳥自呼雛坐覺斜陽盡崚嶒塔影孤栝蒼洞赤城志在縣東南三十里栝蒼山之間按塵外記栝蒼成徳隠元之天葢第十洞天列仙所居在台之樂安即仙居舊邑也又寳藏名山記云栝蒼洞周回三百里徐真人所治此洞與處之玉虚宫通自栝蒼嶺而言東則属台西則属處明一統志宋光宗在東宫時書瓊章寳藏四字鎮之劉光栝蒼洞詩古洞藏真不記年翠崖蒼壁故依然怪來一夜清無夢身在仙家第十天相湖台州府志在縣東二十里昔於湖中得石刻有相湖二字烈女湖仙居縣志在縣東南二十七里嘉靖間因顧烈女於此捐軀全節故名大溪仙居縣志在縣西南八十里源發永嘉界坑山北流百餘里至四都始開廣遶郡之三江互見水利永安溪赤城志在縣西二百一十里櫸溪赤城志在縣西二十里源出處婺温三州流同蓼溪入大溪孟大武詩云樵斧斫雲春谷暗漁榔敲月夜溪寒人甚稱之曹溪赤城志在縣西九十里源出栝蒼嶺南流四十里入大溪嶺上有潭曰曹潭淳熙十四年令蘇光庭禱雨忽有物蜿蜒而出一黒一黄以磬承之躍而入遂迎止於潭下翊日大雨遂築室以祠龍幻潭台州府志在縣東北四十里昔有兩龍幻為人詣僧曰我二人乃龍也僧求其現形云以翌午為期戒勿鳴鐘至次午果見兩龍盤旋廊柱頭角崢嶸僧懼撞鐘寺遂漂没水退見潭其深莫測瑤崱瀑赤城志在縣西五十里玊几山縁壁而下或雨初霽則飛流濺沫廣至十餘丈葢竒觀也月落池仙居縣志在縣南七里前山宋時郭氏夢月落於地而女生後為宋理宗后即謝深甫之孫女也九井明一統志在縣東南二十五里一名蔡經井每汲其一八皆波動今僅存其五七井仙居縣志宋朱文公所鑿一在鼓樓前一在學宫右一在縣東巷一在縣南前巷一在官倉巷一在市橋巷一在天井巷浙江通志卷十六
