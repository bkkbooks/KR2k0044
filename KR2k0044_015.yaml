body:
  text: 浙江通志卷十六山川八台州府臨海縣附郭大固山赤城志在府西北按舊經晉隆安末孫恩為寇刺史辛景休於此鑿塹守之恩不能犯遂以名山宋紹興間道士費徳泓斸地得晉㫁碑有龍顧山字故又名龍顧山小固山臨海縣志在城東南二里與大固山相望高七十丈周四里巾子山赤城志在州東南一里連小固山兩峯如帢幘頂有雙塔任翻㳺巾子山詩絶頂新秋生夜凉鶴翻松露滴衣裳前村月照半江水僧在翠微開竹房任翻再㳺巾子山寺詩靈江江上幘峯寺三十年來兩度登野鶴尚巢松樹頂竹房不見舊時僧任翻三游巾子山寺感述詩清秋絶頂竹房開松鶴何年去不回惟有前峯明月在夜深猶過半江來吳景奎登台州巾子山詩崒嵂雙峯著此身危巔夜半見朝暾天低古塔叅雲闕江近寒潮落海門帢幘風高仙已去翠微僧老鶴長存下觀城郭紅塵隘水色山光自吐吞龍井輿地紀勝在巾子山西麓舊傳龍伏於此常有雲氣騰空建浮圖鎮之臨海縣城外山川葢竹山赤城志在縣南三十里按輿圖志云一名竹葉山中有洞名長耀寳光之天周回八十里洞淵集所謂第十九洞天也雲笈七籖云仙人商邱子治之道藏洞天記及名山記皆云葢竹山福地觀壇各一所有竹如葢故以為名明一統志抱樸子言此山可合神丹漢末有陳仲林輩四人得道於此上有香爐天門二峯最為游覽之勝林一龍游葢竹洞記初從浣紗溪入登壠見大海海門諸山行十餘里乃至巖谷散峙或如列屋或如樹碑或如厦屋或如城壁最外一大石側下有穴斜入多蝙蝠湯君達作記號為寳光長耀洞天引司馬子微説為仙人商邱子所治其事甚異唐仲友游葢竹山詩籃輿東出雨初收衆山卷霧奔蒼虬麥田幪幪連千疇去年見種今有秋農家椀大即快活使君不去能無羞春光欲盡誰挽留千林薿薿新緑柔桐花逺近澹無思自開自落長悠悠洞天為我開霽色使君蠟屐窮㝠捜天門發秀萬馬下水口離立羣峯稠瀑泉對面瀉絶壁寳劒却倚丹鳯樓溪聲噴薄雷震動石色古怪神剜鎪洞天呀唅風颼颼香爐峯下蛟龍湫中岑特秀小為貴左右旌節森戈矛㡬年秘奥一日睹談笑指示君知不精廬但欲占勝處専事棟宇非良謀飛廊跨水納佳氣突兀堂殿居上頭軒窓髙下有竒致洗滌肺腑明雙眸我將於此栖羽流鳯笙鶴駕應來㳺丹成一舉凌九州下視濁世如浮漚靈祠欵謁路阻修層巖傾澗䆳且幽經營輪奐亦未就揮金爾助何須求晚雲漠漠鳴雨鳩僕痡泥滑我欲休虹橋列炬趣歸騎城鼔已報初更籌追扳别乗聊復爾乗興何如王子猷習池不為倒載去兒童不用拍手攔街謳牛極山臨海縣志在縣西北一十里上有平坡數十畝可逺眺靖江山明一統志在縣東七里上有塔俗名白塔山舊傳辛景休破孫恩於此少兩山台州府志在縣東九里舊傳築城時較其土稍輕故名東掖山赤城志在縣東北四十五里以其居天台左掖故名上舊有隔塵寺赤山輿地紀勝在縣東南一百三十里絶頂有古塔塔之下有石函盛小銅塔内有銀壺盛舍利舊傳梁王蕭詧所施白鶴山嘉靖浙江通志在縣東南二十里太平御覽昔有白鶴飛入㑹稽雷門鼓中擊之聲振洛陽故名太平寰宇記山上有深湖中有盤石山前有石鼓晏公類要臨海記云山中有隠泉懸溜逺望如倒挂白鶴名挂鶴泉白巖山台州府志在縣西十二里舊名白馬唐天寳六年改今名真隠山太平寰宇記在縣西南四十里高一萬六千丈周三百里與仙居韋羗山接本名栝蒼又名天鼻王方平居崑崙往來羅浮栝蒼山即此唐天寳中改今名神仙傳山上石壁有蝌蚪字高不可識宋元嘉中遣名盡圖於團扇焉許孝山臨海縣志在縣西北七十里名勝志舊傳有許姓者居喪至孝每慟則羣鳥悲鳴因以名山龍符山臨海縣志在縣東一百七十里赤城志輿地志云章安縣東五十里海際有覆釜山臨海記及寰宇記云東海有山形如覆釜吳越春秋云吾得覆釜書除天下之災而劉世軌記云夏帝登此山得龍符之瑞唐天寳六年改今名山有巨跡相傳夸父逐日所踐云臨海山赤城志在縣東北二百四十里接海本牛頭山以石似故名唐天寳六年改今名秀麗山赤城志在縣東二百里海中舊名芙容臨海記云州東北七十里海中有芙容山僧智顗傳云出海望芙容山竦若紅蓮之始開葢指此也唐天寳六年改今名石塘山明一統志在府城西三十里上有石峽飛瀑注塘中水底有石柱日朗即見俗呼龍盤石石新婦山赤城志在縣東北七十里東瀕海太平寰宇記山旁有竒石如婦人狀宋文帝常遣畫工摸寫山狀時人盛圖於白團扇宜山明一統志在府城西六十里其巔平衍良疇可十頃有潭瀑沾溉旱不能災岐山臨海縣志在縣東南六十里石鼓山赤城志在縣東一百五里臨海記黄石村山上有石似鼔兵興則鳴玉峴山太平寰宇記在縣東一百七里舊名黄石山一名黄石嶴相傳黄石公居此天寳六年更今名山洩水九層沿厓注落如白練上足山赤城志在縣西南一十一里一名戱龍西接真隠山南連永嘉西南連栝蒼有石井龍湫巖上有瀑布高十餘丈嵗旱必禱焉海門山明一統志在縣東南一百二十六里相對如闕在海北岸東枕海金鰲山明一統志在縣東南百里章安鎮東有小洞相傳昔人艤舟夜見一物起波間光采注射迫視乃一巨鰲金色故以為名輟耕録山枕海属臨海縣章安鎮宋高宗在潛邸日泰州徐神翁獻詩曰牡蠣灘頭一艇横夕陽西去待潮生與君不負登臨約同上金鰲背上行及南渡建炎庚戌正月三日帝航海次章安鎮落帆福濟寺前候潮見此詩在寺壁間題墨若新方信其為異人也白山輿地紀勝在縣東南二百五十里按臨海記云白山望之如雪其上有湖舊傳金鵝於此集焉合旗山輿地紀勝在縣東一百三十里舊傳僧灌頂居攝静寺㑹有海寇至頂講經自若冦見旌旗耀日有神皆丈餘懼而遁因以名山東刋山台州府志在縣東七十里東南接黄巖因禹随山刋木故名將軍山一名天柱山赤城志在東刋山南烈女馮光奴死節處旁有峯蜿蜒如蛇一名蛇山天門山赤城志在縣西六十里高數千仭望海尖山台州府志在縣東北四里後嶺上甚高聳宜逺眺土人多以為田麥時翠浪翻浮最為可愛青珠山輿地紀勝在臨海縣仙石山臨海縣志在縣東北二十里太平寰宇記山有石歩廊觸石雲起崇朝必雨即王方平所遊之地日山赤城志在縣西五里以其面東朝日視諸峰獨高故名常風山嘉靖浙江通志在縣西五十里有石穴風常自中出故名古塘門山臨海縣志在縣南二十里兩峰對峙中空十餘丈舊傳海門在焉新羅山赤城志在縣西三十里與八叠山相望燈壇山太平寰宇記在縣西六十里舊圖經云山有石壇每隂雨有火望之如燈故名鴻鶴山臨海縣志山有二一在縣西七十里一在縣西北六十五里九盤山赤城志在縣東南七十五里以其路縈迴九轉故名絶頂可眺大海亭山輿地紀勝在縣南一百里其地有寨由郡泛舟入黄巖者候潮於此翠環山台州府志在縣東南一百三十里峰巒冋合有若環翠故名高相山赤城志在縣東北一百三十五里一穴無際㑹稽圖經云與海通高麗頭山赤城志在縣東南二百八十里海中自此山下分路入髙麗國其峰突立宛如人首故名清潭山台州府志在縣西二十五里夷堅志舊有陂廣十餘里淳熙間大水推一山納陂中山之大小正與陂等林木宛然芳溪山臨海縣志在縣西三十五里深窅可百里通仙居黄巖有水源深逺溉田甚多葛溪山台州府志在縣西三十五里俗稱葛仙翁煉丹處有石如藥碾狀有禮斗壇壇上有湫頗深窅霧雨晝㝠有龍宅焉三山台川府志在縣東七十里有三巖聳異賀氏世居此唐賀瑄與二姊殉父赴水後顯靈建廟於此崛門山太平御覽在縣東一百五十里山腹有孔上達於頂其中有聲即大風水涌主兵吳將平孔内有聲逺達十里大雄山臨海縣志在縣東二百一十一里頭扣山台州府志在縣東北二百一十一里西有嶼鵞鼻山舊浙江通志在縣東一百五十里狀如鵞鼻吸水石佛山舊浙江通志在縣東南一百七十里以狀名峧巉山在縣東南一百八十里蒼郭山在縣東北二百一十一里其西有蒼郭村小門山大門山在縣東南一百里夀昌山在縣東一百五十里莆門山在縣東南一百五十七里東麂山在縣東一百五十七里西麂山在縣東一百六十里主山在縣東南一百七十里麂頭山在縣東南一百八十里虎頭山在縣東北二百六里澤青山在縣南二百二十里檉澳山在縣東北二百八十里伯達山在縣東北二百八十里嶼山在縣東北二百八十里澤山在縣東北二百八十里舊浙江通志以上俱海中山雲峰台州府志在縣西南十九里峰極髙聳外望諸山宛若聚米鄉邑江湖舉在目前玊峰臨海縣志在縣西北七十里俗名白石尖又名大石鄉勢凌霄漢聖巖台州府志在縣南二十里錢柱山號險絶舊傳有神躍馬於此故名至今有馬蹄痕又名馬蹄巖桐巖台州府志在縣東五十里接寜海縣界仙巖臨海縣志在縣東一百二十里高廣數百仞中有石竅廣四畝名百花洞黄礁巖台州府志在縣東一百七里南臨江東西北俱平川穴出一巖方圓四十餘丈高十丈餘無土樹歴年不凋新羅嶼臨海縣志在縣東南三十里昔有新羅賈人􅋈舟於此竹嶼台州府志在縣東一百四十六里海中馬嶼台州府志在縣東一百七十里新嶺臨海縣志在縣南三十五里自大左嶼至嶺脊分臨海黄巖界蔡嶺台州府志在縣東八里飛霞石輿地紀勝在葢竹山舊傳仙人上昇於此石累三層牧䜿戱其上以手轉之不墜常風洞赤城志在縣西四十里中極幽䆳舊有石䦨䕶之宣和中常駐兵於此招賢洞赤城志在縣西六十里以寺名宣和冦難以其地險遣將據守臨海江一名雙江元和郡縣志二水合成一是始豐溪一是樂安溪至州城西北十三里合台州府志縣東二十里受諸溪之水諸山抱之不能東與海接故西南流經梘橋開石新橋諸村過少兩山與靈江合實郡治東襟界水也靈江台州府志在府城外西北自三江滙流抱城而東舊志稱中有一泓名陳婆坳泓水極清巨潮澎湃不為動舊以此水釀酒宋嘉定中台州有靈江風月之名延慶院記曰濟靈江而西唐任翻詩曰靈江江上巾峰寺是江之得名久矣三江嘉靖浙江通志在縣西十里其源有二一自天台闗嶺一自仙居永安二溪至此合為靈江故曰三江潮汐至此而止故其流溪清而江濁椒江台州府志在縣東南一百二十里合靈江永寜江同流出海實受臨黄天仙四邑之水江面寛二十餘里南則海門衛北則前所兩城對峙為台區要隘皆明初湯和建築東湖赤城志在崇和門外三十歩初為船塲水軍營熙寜四年錢守暄始開為湖凡一萬六千歩曽宏父題東湖詩三年領客醉東湖欲去猶携竹裏㕑誰解挽留狂太守風湖十頃翠相扶虎溪臨海縣志在縣東六十五里源出東掖山南五里合流中沙溪舊傳宋獻穆公主有目眚僧法腴洗以咒水而愈奏置十八賢座倣廬山逺公故以為名其泉曰大悲泉芳溪台州府志在縣西三十里流出栝蒼山詳見水利百歩溪明一統志在縣西北六十里前後二灘石險湍激俗名大小惡溪唐孟浩然詩欲尋華頂去不憚惡溪名是也台州府志宋乾道中邑令陳居安修治水稍平明𢎞治二年郡守馬岱䟽鑿别道七百餘丈害未盡去後邑人蔡潮募工重修舟始無患因易其名為大善灘互見水利玉泉臨海縣志在縣東北白雲山下以水色而名黄樸玉泉詩水性能方圓泉色常珪璧雲山静有輝瓊液來無迹泉上修禪人曹溪分一滴鑑止更澄源紛紛萬縁息康濟泉嘉靖浙江通志在縣