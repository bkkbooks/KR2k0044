北入於海青湖台州府志去縣三十里俗傳晉時孫恩常解金甲於其中湖底有一竅深不可測土人謂與耀珠潭相通黄巖溪黄巖縣志在縣西一百里源出黄巖山𣲖為諸川凡五十餘孫應時黄巖溪詩得雨溪聲壯無風雲氣多山花依翠竹灘石亂寒莎樵父谷中出牧兒牛背歌逢人問塵世擾擾意如何九溪台州府志在縣西三十五里柏嘉山下諸溪凡九西角二大溪合流以達永寜江日溪嘉靖浙江通志在縣西六十里黄巖縣志西北有小谷曰金玉灣軍營溪台州府志在縣西三十里源出佛嶺宣和中官軍禦寇結營於此故名錦溪台州府志在縣西七十里兩岸多桃李花時望之如錦故名每大旱水忽自漲次日必雨白龍潭赤城志在縣東一十里方巖其穴有三大僅如甕常有雲氣罩之居人見龍出入色白故以名潭赤頰潭黄巖縣志在縣西五十里亂山中龍出入必大風雨故近山無居人旁有大木皆無膚葉父老言有龍黒身赤頰遂名潭柵眉潭赤城志在縣西九十里柏都洞南怪石壁立過者悚懼年豐則有雲氣覆其上雖炎日不散歉嵗則否藏雪潭赤城志在縣西北一十里即鳴山之鳴川潭舊傳五六月間積雪不消遂更今名天台縣天台山天台山志在縣北三里按舊圖經載陶隠居真誥云髙一萬八千丈周回八百里山有八重四面如一當斗牛之分上應台宿故曰天台又十道志謂之頂對三辰登真隠訣謂大小台處五縣中央五縣謂餘姚句章臨海天台剡縣孫賦中所謂五界也或號靈越孫興公賦所謂䕃牛宿以曜峰托靈越以正基是也或謂天台山據越地之靈以正基址爾非以靈越為天台也今言天台者葢山之都號如桐柏赤城瀑布佛壠香爐華頂東蒼皆山之别名大概以赤城為南門石城為西門㨿神邕所記如此而徐靈府小錄又以剡縣金庭觀為北門葢指山之所至言抱朴子内篇云諸山不可煉金丹以其皆有水石之精惟太華少室縉雲羅浮及大小台正神居之助人為福可以修煉又山䜟云曲豆女台可以避灾然則地為靈仙所宅尚矣明一統志山去天不遠路由福溪水險而清前有石橋廣不盈尺長數十丈下臨絶澗惟忘其身然後能濟濟者梯巖壁援藤葛始得平路見天台山蔚然竒秀雙列於青霄上有瓊樓玉闕天堂碧林醴泉仙物畢具也孫綽游天台山賦天台山者葢五嶽之神秀也渉海則有方丈蓬萊登陸則有四明天台皆元聖之所游化靈仙之所窟宅夫其峻極之狀嘉祥之美窮山海之瓌富盡神人之壯麗矣所以不列於五岳闕載於常典者豈不以所立㝠奥其路幽迥或倒景於重溟或匿峯於千嶺始經魑魅之途卒踐無人之境舉世罕能登陟王者莫由禋祀故事絶於常篇名標於竒紀然圖像之興豈虚也哉非夫遺世玩道絶粒茹芝者烏能輕舉而宅之非夫逺寄㝠捜篤信通神者何肯遙想而存之余所以馳神運思晝咏宵興俛仰之間若已再升者也方解纓絡永託兹嶺不任吟想之至聊奮藻以散懐太虚遼濶而無閡運自然之妙有融而為川瀆結而為山阜嗟台嶽之所竒挺實神明之所扶持䕃牛宿以曜峯託靈越以正基結根彌於華岱直指高於九疑應配天於唐典齊峻極於周詩邈彼絶域幽邃窈窕蟲近智者以守見而不之之者以路絶而莫曉哂夏之疑氷整輕翮而思矯理無隠而不彰啟二竒以示兆赤城霞起而建標瀑布飛流以界道睹靈驗而遂徂忽乎吾之將行仍羽人於丹丘尋不死之福庭茍台嶺之可攀亦何羡於層城釋域中之常戀暢超然之高情被毛褐之森森振金䇿之鈴鈴披荒榛之䝉蘢陟峭崿之崢嶸濟楢溪而直進落五界而迅征跨穹窿之懸磴臨萬丈之絶㝠踐莓苔之滑石摶壁立之翠屏攬樛木之長蘿援葛藟之飛莖雖一冐於垂堂乃永存乎長生必契誠於幽昧履重險而逾平既克隮於九折路威夷而修通恣心目之寥朗任緩歩之從容藉萋萋之纎草䕃落落之長松覿翔鸞之裔裔聽鳴鳯之嗈嗈過靈溪而一濯䟽煩想於心胸蕩遺塵於旋流發五葢之逰䝉追羲農之絶軌躡二老之𤣥踪陟降信宿迄於仙都雙闕雲竦以夾路瓊臺中天而懸居朱闕玲瓏於林間玉堂䕃映於髙隅彤雲斐亹以翼櫺皎日炯晃於綺䟽八桂森挺以凌霜五芝含秀而晨敷惠風佇芳於陽林醴泉涌溜於隂渠建木滅景於千尋琪樹璀璨而垂珠王喬控鶴以冲天應真飛錫以躡虚騁神變之揮霍忽出有而入無於是㳺覽既周體静心閒害馬已去世事都捐投刃皆虚目牛無全凝思幽巖朗咏長川爾乃羲和亭午游氣高褰法鼓琅以振響衆香馥以揚烟肆覲天宗爰集通仙挹以𤣥王之膏潄以華池之泉散以象外之説暢以無生之篇悟遣有之不盡覺涉無之有間泯色空以合跡忽即有而得𤣥釋二名之同出消一無於三幡恣語樂以終日等寂黙於不言渾萬象以㝠觀兀同體於自然李白送楊山人歸天台詩客有思天台東行路起忽濤落浙江秋沙明浦陽月今㳺方厭楚昨夢先歸越且盡秉燭懽無辭凌晨發我家小阮賢剖竹赤城邊詩人多見重官燭未曽然興引登山屐情催泛海船石橋如可渡擕手弄雲烟孟浩然尋天台山詩吾友太乙子餐霞卧赤城欲尋華頂去不憚惡溪名歇馬憑雲宿揚㠶截海行高高翠微裏遙見石梁横李郢重游天台詩南國天台山水竒石橋危險古來知龍潭直下一百丈誰見生公獨坐時賈島送僧歸天台詩辭秦經越國歸寺海西峯石澗雙流水山門九里松曽聞清禁漏却憶赤城鐘妙字研磨講應齊智者踪貫休春日行天台山詩重重太古色濛濛花雨時好峰行不盡流水語相随黒壤生紅术黄猿引白兒因思石橋路曽與道人期王十朋過天台山詩目送神仙路丹城未暇躋雪深封佛隴雲暗鎻桃溪流水無復有亂山髙且低欲尋劉阮洞歸路恐成迷鄭善夫天台雜詩一夜雨聲吹不㫁國清寺前溪水鳴欲過天台拾瑤草秋風無限石梁情韓昌望天台詩望裏天台近羣峯秀㡬重回看青嶂㫁忽有白雲封絶壁垂樵徑春泥䧟虎蹤石橋今夜月應為照長松赤城山赤城志在縣北六里一名燒山又名消山石皆霞色望之如雉堞因以為名孫綽賦所謂赤城霞起以建標是也絶頂有浮屠七級梁岳陽王妃所建支遁天台山銘序云往天台山當由赤城為道而神邕山圖亦以此為台山南門云天台縣志山之麓有巖極深廣晉義熙初僧曇猷造寺號中巖齊僧恵明復就塑一佛名卧佛又有巖二曰結習曰釋籖葢灌頂湛然遺跡也西有玉京洞北有金錢池上有仙人井飛流噴沫冬夏不竭神僧傳赤城山有孤巖獨立秀出干雲釋道猷摶石作梯升巖宴坐接竹傳水以供常用王羲之聞而輒往仰峰髙挹致敬而返桐栢山天台山方外志在縣西北二十里七十二福地之一唐司馬子微隠此舊圖經云周靈王太子主金庭治桐栢山即此也太平寰宇記登真隠訣云金庭不死之鄉方四十里瓊臺雙闕兩山天台山方外志自崇道觀西北行二里至元應真人祠由真人祠取道仙人跡經龍潭側凡五里至瓊臺轉南三里至雙闕皆翠壁萬仞森竦相向孫綽賦所謂雙闕雲竦以夾道瓊臺中天而懸居是也夏竦瓊臺雙闕銘瓊臺嶻嶪左右如闕直上相等蘿交蔓結啟閉雲氣出入日月千流萬綫羣峯如屑凌霄壓海吞吳跨越寒巖山方輿勝覽在縣西北七十里亦名寒石其山幽䆳當暑有雪天台縣志因寒山子得名前有磐石曰宴坐峰上有石室舊名拊石洞後米芾題曰潛真四山環峙如郛郭上矗雲漢其下嵌空置佛屋不用瓦覆由宴坐西有石梁可數尺架兩崖間險峻不可陟南有泉如屋霤寺僧縻竹綆引之前距山腹一里有道人洞轉西二里亂石灑流巖竇間散若虬髯因號龍鬚洞台山絶勝處也臨海記云石室前有立石參差五色逺望如綬帶舊傳為綬帶山寒山子山居詩登陟寒山道寒山路不窮溪長石磊磊澗澗草䝉䝉苔滑非闗雨松鳴不假風誰能超世累共坐白雲中郭三益寒巖山詩道人栖碧山雲居在空曲十年海潮音外物縁已熟時擕貝葉書歩入深林讀宵視䕶禪虎晝引穿花鹿庵中三昩語藥我貪嗔毒何當脱雙鳬藜杖追髙躅明巖山天台縣志在縣西七十里舊名暗巖巖之前峭壁屹立勢摩穹蒼亦號幽石其下竅穴逶䆳日光穿漏中有僧全宰棲真洞轉北數歩怪石森然上有兩峯倒側號合掌巖西有泉蔽巖而下渙若垂箔寺僧亦用竹綆引之從髙下墜號曰水索由寺北捫蘿而下至重巖磐石品列即三隠嘯咏之地常有光如月號石月寺東有響巖擊之聲鏗然寒山子詩所謂重巖我卜居鳥道絶人跡是也方瀛山赤城志在縣西北二十八里唐長慶中徐靈府居此寳歴元年賜今名東横山名勝志在縣東十里俗名覆船山本天台山足其山坦夷中有三溪冬温夏冽許渾宿東横山瀬詩孤舟路漸賒時見碧桃花溪雨灘聲急巖風樹勢斜獮猴垂弱蔓鸂鶒睡横槎漫向山林宿無人識阮家鳯皇山台州府志在縣東十一里折山天台縣志在縣西十六里神邕山圖云峭崿險折而中峯㧞立孤秀舊傳王喬控鶴於此又名鶴峯蒼山赤城志在縣東四十里按神邕山圖云其山凌映桐栢絶頂睇滄海司馬悔山雲笈七籖在天台山北係第十六福地李明仙人所治之處天台山方外志舊傳司馬承禎隠天台山被召至此而悔因以為名大盆山名勝志在縣西一百八十里西接東陽南界仙居遙望如覆盆即婺江之源也始豐山台州府志在縣西南十五里舊以狀類盤龍名龍山唐天寳中更今名靈墟山天台山方外志在縣北三十里白雲先生隠處圖經云七十二福地之一瀑布山天台山方外志在縣西四十里嘉靖浙江通志一名紫凝山有瀑布陸羽品為天下第十七水與福聖國清二瀑為三云名勝志神異記云餘姚人虞洪入山采茗遇一道士牽三青羊引至瀑布下曰吾丹丘子也聞子善具飲常思見惠山中有大茗可以相給寳華山天台山方外志在縣東三十里産花蕊石八峯山天台縣志在縣西北六十里中有萬年寺所謂八峯明月婆羅香爐大舍銅魚藏象烟霞應澤是也覆盆山天台山方外志在縣西四十里形家以為台郡臨海山川之美皆自此胚胎迤衍發秀千佛山始豐類稿在天台西五十里層巒疊嶂森鬰秀㧞與赤城玊霄華頂諸峯角勝鷓鴣山宋濂天台廣濟橋記天台縣西二十里有山曰鷓鴣二水發源其間合流至長洋復折而西與大溪滙龍湫志要常有鷓鴣鳴故名銀山天台山方外志在縣南十里宋元祐間因礦發故名天台縣志明萬厯間三次開採無銀遂廢方山天台山方外志在縣西六十里高峻千餘丈周十五里自足至頂皆方故名妙山台州府志在縣東二百歩延袤一里邑之鎮山也華頂峰赤城志在縣東北六十里葢天台第八重最髙處髙一萬丈少晴多晦夏有積雪絶頂有望海尖瀰漫無際下瞰衆山如龍虎蟠踞旗鼓布列之狀草木薰郁殆非人世僧智顗與司馬子微常晏坐修真焉李紳題華頂峯詩欲向仙峰煉九丹獨瞻華頂禮真壇石標琪木凌天碧水挂銀河映日寒天外鶴聲随絳節洞中雲氣隠琅玕浮生未有從師路空誦仙經想羽翰五峰赤城志在縣北一十里國清寺側其峰有五曰八桂曰靈禽曰祥雲曰靈芝曰映霞前有雙澗合流南注大溪九峰嘉靖浙江通志在縣西北三十里周圍九峰曰紫霄曰翠微曰玊泉曰卧龍曰蓮花曰華琳曰玉女曰玊霄曰華頂矗立霄漢逺近相向王羲之與支道林常往來此山赤城志舊名九壟唐天寳六年改今名皮日休寄題玉霄峯葉涵象尊師所居詩青㝠向上玉霄峯元始先生戴紫蓉曉案瓊文光洞壑夜壇香氣滿杉松閒迎仙客來為鶴静噀靈符去是龍仔細捫心無偃骨欲随師去肯相容陸龜䝉和詩天台一萬八千丈師在浮雲端掩扉永夜祇知星斗大深秋猶見海山微風前㡬露青旄節雪後應披白羽衣南望烟