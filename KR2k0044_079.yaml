各處兌運衙門解送様米浙江限七月以内到部明㑹典𢎞治十七年令浙江領運官行糧限十二月以内俱於本處照數放支如本處缺糧就於杭嘉湖三府該兌糧米闗支如亦缺布政司每石折銀四錢給散運軍名山藏漕撫李蕙請以齎餘貯庫聽來年缺者貸而償之著為令謹按𢎞治中議定折耗輕齎銀其法兼算耗銳稍贏縮而剖之大抵米以備逺涉及顯加之耗銀以備傭僦鋪墊之用要之正米無缺而止正外諸羨盡歸旗卒官無利焉自蕙之請而法漸變矣明實錄正徳二年疏通水次倉儲漕運考漕運官言往時民運至淮徐臨德四倉以待衛軍支運後改附近州縣水次交兌已并支運七十萬石亦令改兌但七十萬石之外猶有交兌不盡者民仍運赴四倉久無支銷以致陳腐請將浙江江西湖廣正兌糧三十五萬石折銀解京而令三省衛軍赴臨徳等倉支運如所折之數則諸倉米不腐三省漕士便於支運嵗漕額外又得三十五萬折銀一舉而數善具矣命部臣議如其所請謹按𢎞治十八年詔漕運米以十分為率内二分照例折銀以蘇民困至是則三省議折三十五萬石焉通漕𩔖編正徳五年令漕運衙門以漕運水程日數列為圖格給與各幫官收掌逐日將行止地方填註一格同原給幫票送部查考事完送總漕衙門查繳續文獻通考正徳十年令輕齎銀兩各司府州縣每年各隨正糧一併兊完方許出給通闗明㑹典嘉靖元年令民運白糧照兌運事例每十月終徵完委官十二月以裏運至瓜洲聽儹運郎中催儹明㑹典嘉靖三年令運軍行糧浙江總衛所每糧三十石七斗二合扣軍一名查各運正糧若干照數支與續文獻通考嘉靖八年令浙江坐派起運内府各監局及吏部等衙門細熟白糙粳糯米等每年十月終徵足差官十二月以内開船前來交納又令兌軍民糧交納蘆蓆以三分為率二分納本色一分折銀每領折銀一分又每米二千石納楞木一根松板九片亦以三分為率二分納本色一分納銀每板一片折銀二錢五分俱隨糧收受出給通闗其銀太倉銀庫另貯以備修倉等項支用明㑹典嘉靖八年令輕齎銀兩解赴漕司驗兌每幫先給十分之三備沿途起剝支費其七分鞘封到京候完扣算名山藏世宗初漕總兵楊宏奏輕齎隨軍軍人緩急有濟若貯於漕庫比至始給當其未給軍人所費已多而又羡之為扣夫輕齎亦耗米耳故為輕運舟便僦費乃取其羨米懸之籌非法也科道官交章駁之以為將開奸人冒破之端户部為兩可其說請銀至之日騐費給領如故第勿扣其羨以抵船料兼充諸什物之需大學士費宏言外衛軍士終嵗勒勞給京軍幸有羨宜與之詔皆給軍軍驩然久之倉入復以八升鋭為一時浥潤費貯倉嵗耗無出也户部尚書孫交酌請加三升為嵗耗一升盡三升而止未三嵗支者入實額待用命著為例明㑹典嘉靖八年令浙江官軍兌運者限三月以内過淮通漕𩔖編嘉靖十七年令運軍月糧各該撫按官先將應徵存留糧斛依期徵給如徵不及或災傷停免聽各倉庫别項錢糧通融處給其行糧例該本處闗支者雖派别省兌運仍舊本處支給若原議水次隨支者俱要預期徵完同正糧併兌不許先儘正糧將行糧落後明㑹典嘉靖二十四年以旱災詔浙江所屬州縣及諸衛所田糧改徵折色有差謹按漕運嵗額既定之後例無改折浙江改徵折色始於是年萬厯杭州府志嘉靖三十二年南闗抽分工部主事劉秉仁議漕艘規則南闗榷事書本厰兼督浙總漕艘成法具在但各船所用物料未有定數每年雖經布政司委府佐估計惟於船完之日將各項價值漫為増減且船式不一有礙責成議將船身長短廣狹板木厚薄分寸料價多寡數目酌為定則呈詳漕運衙門立石船厰永為定法仍利書名漕艘規則凡該管官旗商匠人給一帙使互相稽察上下有所持循於漕政甚有裨益謹按運船價料正徳十四年令軍辦三分民辦七分嘉靖二十四年將軍三民七船料令有司依期徵扣八月以内給發興工浙省遵行而船式不能畫一至是始有定則明㑹典嘉靖三十八年令浙江糧船於北新闗設厰工部抽分主事兼理打造明㑹典嘉靖四十四年令官軍行糧雖派别省兌運仍舊本處闗支如徵收不齊浙江每石折銀五錢許於庫貯别項銀兩借支補還明實錄隆慶元年於南直隸浙江杭嘉湖添差御史一員專管漕運續文獻通考隆慶元年令浙江都司僉書專任一員督理漕務漕運都御史張瀚奏西浙漕運近多失期乞將東西把總二員合而為一每嵗更番一員領運一員豫備次年運務户部覆浙江轉漕視别省倍加繁劇兩總分任似難變更惟浙江都司僉書職事頗閒且委任一員賜之專勅督理運務明實錄隆慶二年御史蒙詔條上漕運事宜允行一專責成謂西浙新増都司官與把總職守相闗臨事莫肯專任宜責都司以先期料理責把總以及時督率一議私兌謂浙直士夫近設自兌之法明犯禁令抑困漕軍宜令各仍舊官民公兌便一足船兌數謂漕制每船不過正耗米四百七十二石邇來船數滋多或一艘并受七八百石又益以私貨倍之致多敗溺宜盡數清補一重民運謂江南糧長之役有三害在家則苦催徵在途則苦逼勒抵京則苦完掣宜令京漕二解户通融抵數互相代運為便載米任僦輕舸不必拘以大號長船糧長各給小批俾得完報不得牽累續文獻通考隆慶三年令兩浙巡鹽御史兼督浙江杭嘉湖三府漕務明實錄隆慶三年以杭嘉湖三府水災改折湖州漕糧六分杭嘉三分明實錄隆慶四年户部覆漕運都御史陳炌等㑹議漕政事宜報可一疏濬浙江海寧崇徳等處河道一清補每船缺軍務足原額十名之數凡行月二糧及鈔賞等項俱使得䝉實惠以安其心一嚴督淺夫日伺河下助挽漕舟以免運軍僱募之苦一湖州府縣地僻山阻宜移置各倉於府城明實錄隆慶五年漕運都御史王宗沐奏優恤運軍從之宗沐奏漕糧漂欠雖因河決亦多有貧軍侵耗鑿舟自沈者宜先議優恤凡各運船輕齎銀兩在浙江原議三六者改為三三令有司各將扣下米數給軍其各軍兌完起運之後責令五船同坐庻人皆樂用而漂損可漸少也户部覆行明㑹典隆慶六年令民運白糧責令糧長設處船隻同運官幫次開程過淮洪入閘漕務叅政督催與軍船一體輓拽明漕運志禮科給事中陸樹徳言軍運以兌軍儲民運以充官祿人知軍運之苦不知民運尤苦也船户之求索運軍之欺凌洪閘之守候入京入倉厥弊百出以白糧令軍帶運甚便部議申禁令而已不能從也通漕𩔖編王宗沐議改折疏云國家財賦仰給東南然兌軍之糧六省同供而白糧之困則惟蘇松常嘉湖五府為重乞每年坐將十萬石分布五府照白糧之多寡分攤而改折之以稍休其重累著為定規如䝉勅下户部再加查議將此二十萬四千七百八十三石八斗定為改折以處此數郡在朝廷不過居四十分之二而在列郡則誠得一分之寛今新條派撥責在漕司容臣將此二十萬石零輪流歇運以恤無軍無船之衛所而休息之則不惟郡民之供運者獲省數萬之利而衛總之疲困者亦䝉休養之恩此所謂一舉兩得者也通漕𩔖編萬厯元年令官軍兌糧浙江限二月過淮謹按漕運開倉開幫過淮俱有定限隆慶四年開倉定限十月兌完開幫定限十二月終至過淮嘉靖八年浙江限三月以内是年復限以二月自後漕運有冬兌冬開之例而過淮日期不易也通漕𩔖編萬厯元年令民運白糧照軍運每船許量帶土宜四十石經過鈔闗免其納稅續文獻通考萬厯四年令浙江樣米限四月頭幫解送總督衙門收候運糧到日轉發各倉比對萬厯杭州府志萬厯五年督理浙江糧儲右叅政滕伯輪撰船糧規制書嘉靖四十四年改糧道督造淺船凡僉選旗甲支發糧科徵收兌運弊端蝟集伯輪悉心計畫著為此書續文獻通考萬厯七年令輕齎銀兩照議單分為三七以三分給本幫備船沿途穵貼等費其羨餘兌給回南旗軍一分餘候完掣通闕之日查無掛欠亦便與運官領回分給不必扣貯通漕𩔖編萬厯七年令每白糧一石裏河脚價銀一分五釐水脚價銀九釐經紀銀五釐扣省銀四釐五毫解銀庫明㑹典萬厯九年令每嵗解京白糧務㸃殷實糧户正身解納船隻許令糧長自僱五百料中船每百石定給銀三十三兩經過鈔闗土宜免其納稅糧至丁字沽以北河西務主事即照軍糧所定脚價撥船起剝經紀搬掆過壩不許仍前寄囤糧完之日解户批單發部運官領回𩔖繳續文獻通考萬厯九年令浙江漕船先因瓜洲車壩將雜木作底五年一更後因建閘得免車盤改限七年今改楠木計價一百二十七兩必駕運十年方許另造續文獻通考萬厯十二年令兩浙巡鹽御史仍帶管漕糧止行文督催免其押送鎮江明㑹典萬厯十三年令浙江二總輕齎餘銀原議每船三兩今増一兩共四兩其扣省銀兩照舊扣除通漕𩔖編萬厯十五年令將原派浙東浙西總下寧波處州衢州杭前杭右嚴州六衛所原運淮揚二府兌改正糧四萬九千四百七十四石三升軍船一百五十隻俱改回本省照數撥運其錦衣總下廣洋龍江右豹韜左三衛原兌浙糧軍船照數改運蘇州府吳江嘉定二縣漕糧續文獻通考萬厯二十八年巡漕佴祺陳漕政五事從之一議水次併幫以便責成原定運糧一州一縣止許於一衛交兌兌支不盡方許兌於别衛不許將一州一縣分作三四衛亦不許將一衛分作三四州縣及以逺派近以近派逺庶無顧此失彼之患一議處置漕船以便新運漕船係轉輸首務今軍衛有司等官或以料銀缺乏為辭或以底板不到為諉耽延誤運今宜嚴催料銀勒限補追每年運糧過淮之日各該把總通將見運及存衛船數呈送查核料理新運一申飭科斂常例漕運總兵官專一咨訪總運各官科斂旗軍情弊不許狥情容縱一申飭押空糧船漕儲道選完糧才力指揮一二員填寫長坐委令隨幫押回有間道潛歸及在途貿易為非者即以棄運私逃事例坐之一申飭行月二糧前項糧銀除扣留解幫人標外其餘并一應錢糧務候船到盡數給領倘一時正餉不全即於庫貯别項錢糧借給歸安縣志萬厯三十六年浙西水災湖州知府陳幼學具疏請䘏令改折漕糧歸安縣志崇禎十三年湖郡水災知府陸自巖奏請蠲折從之江南通志崇禎十六年應天巡撫黃希憲請改運白糧黄希憲請改運白糧疏白糧為上供急需遞年僉㸃糧解舂辦兌納相沿久矣邇因百弊叢生求為恤民裕國之長策莫善於均徵米而官運之官運則民無僱倩之費一便也官無僉役之難二便也錢糧既自官支吏胥無從抽扣三便也在船皆官役船户無敢凌虐四便也催儹皆官事沿途無敢抛撇五便也況米屬均徵則苦樂之形不立巧拙之情自化糧不必詭寄飛灑差不必就易避難六便也然其中有當議者五焉凡白糧正耗舂辦夫船等米一槩算入平米之内派之此派糧之公可行也原編耗米之外另編加二以補沿途之消損以平米一石訃之不過合勺而已此加耗之輕可行也民間辦糧盡數交倉無此漕彼白之分縣官就完米中擇其乾潔者交協部官動支舂辦交割總部完辦開船啓行先可免漕艘阻壓之患此徵辦之速可行也運船向係民僱官運則必用官船計每船管船頭柁水手各安家衣食等項以及買辦包索遇淺起剝遇溜添䉡等項計每船用米五十石用銀三百二十五兩以原編夫船貼役米計之除支外米尚有餘以原編夫船貼役銀計之除儘支外銀尚不足以有餘之米當不足之銀臨時調劑是經費不煩増設矣至於管押起交侵盜漂失每船各有責成遇有虧欠勒限賠補懸大法以繩其後蓋既不可以復問糧里則責成自有在矣浙江通志卷八十
