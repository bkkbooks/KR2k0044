body:
  text: 浙江通志卷八十漕運上揚州運道紀於禹貢轉漕之政厯代加詳至元明而其制益備顧弊或滋焉聖朝勤恤民隱白糧則併歸軍運嵗漕則以次恩蠲時而緩徵時而改折每於惟正之供屢沛非常之澤是以輸輓及期倉儲豐積為前古所未有葢所以裕本計者至深逺矣志漕運尚書禹貢揚州沿於江海達於淮泗玉海水轉運曰漕禹貢州末繫河先儒以為運道揚達泗至河此正裴耀卿節級轉般之法大學衍義補朱子曰冀州三面距河其建都實取轉漕之利故九州之終皆言達河以紀其入帝都之道按禹貢於各州之下列貢賦之後而叙其各州之水逹河之路逹於河即達帝都也當時貢賦皆駕舟筏浮水路以達於河葢亦後世漕運之法但未明言其為漕耳通鑑綱目大業元年開通濟渠引汴水開邗溝文獻通考發河南諸郡民開通濟渠自西苑引榖洛水達於河又引河通於淮海自是天下利於轉輸謹按禹貢揚州貢道夏時江淮未通故有㳂江海達淮泗之文吳於䢴江築城穿溝東北通射陽湖西北至宋口入淮而運道始通然漢時漕山東之粟特兖豫青徐四州江淮雖通未嘗以之為運道也自大業開通濟渠引汴水開䢴溝而河通於淮利於轉輸東南運道興焉故志浙江漕運斷自隋始唐書食貨志唐都長安轉漕江南之粟高祖太宗時用物有節而易贍水陸漕運嵗不過二十萬石故漕事簡髙宗後嵗益増多謹按浙省之漕前史無明文考唐地理志浙西隸江南東道則唐時所漕江南之粟固兼浙漕而言也資治通鑑開元二十二年以裴耀卿為江淮河南轉運使於河口置輸場唐書裴耀卿傳秋雨害稼帝問耀卿耀卿曰國家大本在京師徃貞觀永徽時祿廩者少嵗漕粟二十萬畧足今用度寖廣運數倍且不支為國大計臣願廣陜運道使京師常有三年食雖水旱不足憂且江南租船候水始進吳工不便河漕處處停留易生隱盜請置倉河口以納東租然後官自僱載分水河洛度三門東西各築敖倉自東至者東倉受之三門迫險則傍河鑿山以開車道運數十里減費鉅萬天子然其計於是置河隂集津三門倉引天下租繇盟津泝河而西三年積七百萬石省運費三十萬緡舊唐書韋堅傳天寳元年擢韋堅為陜郡太守水陸轉運使截灞滻水東注永豐倉合於長安城東望春樓下穿廣運潭以通舟楫取小斛底船三二百隻置於潭側其船皆署牌表之㑹稽郡船羅吳綾絳紗通鑑綱日堅督江淮租運嵗増巨萬唐書食貨志廣徳二年以劉晏顓領東都河南淮西江南東西轉運凡漕事皆決於晏晏分吏督之隨江汴河渭所宜故時轉運船繇潤州陸運至揚子斗米費錢十九晏命囊米而載以舟減錢十五繇揚州距河隂斗米費錢百二十晏為歇艎攴江船二千艘每船受千斛十船為綱每綱三百人篙工五十自揚州遣軍將部送至河隂上三門號上門填闕船斗米減錢九十調巴蜀襄漢麻枲竹篠為綯挽舟以朽索腐材代薪物無棄者未十年人人習河險江船不入汴汴船不入河河船不入渭江南之運積揚州汴河之運積河隂河船之運積渭口渭口之運入太倉嵗轉粟百一十萬石無升斗溺者唐書食貨志貞元中増江淮之運浙江東西嵗運米七十五萬石詔浙江東西節度使韓滉運至東西渭橋倉謹按漢唐皆都闗中俱引東南之粟以給京師漢元封間運漕六百萬石唐天寳稱為極盛而韋堅僅運至四百萬石至德以後不過百萬餘石而已而貞元中江淮之運浙江東西竟運至七十五萬石是兩浙之粟在唐時漕運已視諸道獨多矣然貞元時之浙西道固領潤江常蘇杭湖睦七州不止於今浙西之杭嘉湖三府也宋史食貨志太平興國初兩浙既獻地嵗運米四百萬石文獻通考宋定都於汴漕運之法分為四路江南淮南浙東西荆湖南北六路之粟自淮入汴至京師玉海至道元年楊允恭為江淮兩浙發運使籍三路舟江浙所運止於淮泗由淮泗輸京師行之一嵗上供者六百萬宋史食貨志大中祥符初至七百萬石江南淮南兩浙荆湖路租糴於真揚楚泗州置倉受納分調舟船泝流入汴以達京師置發運使領之玉海天聖四年臣僚吳耀卿言咸平景徳中嵗漕江淮米不過四百五十萬石近年増至六百五十萬請約舊數立為中制詔嵗課六百萬石注沈括曰發運使嵗六百萬石兩浙一百五十萬石玉海嘉祐三年詔曰國家建都河汴仰給江淮六路所供之租各輸於真楚度支所用之數悉集於京師以發運司總其綱條以轉運使幹其嵗入荆湖舟楫囬載海鹽淮汴舳艫不涉江路方冬閉塞役卒少休近嵗因循兹事遂廢令諸道據年額赴真楚泗州轉般倉復運鹽歸本路發運一司其制始於淳化而備於皇祐之後權六路豐凶而行平糶之法一員在真州督江淮等路糧運一員在泗州趣自真州至京糧運焉謹按轉般之法始於裴耀卿成於劉晏宋朝舊制江湖運舟至儀真入轉般倉復載鹽以歸又以運舟自儀真漕河由汴達於都邑六路八十四州漕京師凡六百萬石然則浙東西路之米固入轉般倉而復以運舟由漕河入汴者也宋史河渠志浙西運河自臨安府北郭務至鎮江江口牐六百四十一里淳熙十一年臣僚言運河之濬自北闗至秀州杉青各有牐堰自可瀦水惟沿河上塘有小堰數處積久低陷無以防遏水勢兼沿河下岸涇港極多其水入長水塘海鹽塘華亭塘由六里堰下私港散漫悉入江湖以私港深運河淺也若修固運河下岸一帶涇港自無走泄謹按運河即江南河也隋大業中將東巡㑹稽乃發民開江南河自京口至餘杭八百餘里後代因而修之以為轉輸之道宋孝宗淳熙八年浚行在至鎮江運河時定都臨安尤以漕渠為先務也續通鑑綱目元至元十九年始海運元史食貨志元都於燕去江南極逺百司庶府之繁衛士編民之衆無不仰給於江南初巴延平宋時嘗命朱清張瑄等以宋庫藏圗籍自崇明州從海道載入京師而運糧則自浙西涉入江淮由黄河逆流至中灤陸運至淇門入御河以達於京又開濟州泗河自淮至新開河由大清河至利津河或開膠萊河道通海勞費無成至元十九年巴延追憶海道載宋圖籍之事以為海運可行於是請於朝廷命上海總管羅璧朱清張瑄等造平底海船六十艘運糧四萬六千餘石從海道至京師謹按元初行海運時原合江南江東湖廣江西等處之糧共運後以江東寜國池饒建康運糧率令海船從揚子江逆流而上江水湍急又多石磯走沙漲淺糧船俱壊嵗嵗有之而湖廣江西之糧運至真州洎入海船船大底小亦非江中所宜於是以嘉興松江秋糧并江淮江浙財賦府嵗辦糧充運嘉興浙省大府而松江在元初為華亭府乃嘉興屬邑而升為府者是海漕之利惟浙中之粟獨多觀順帝至正時海漕不至徵粟於張士誠方國珍更可見矣則元時海運其為浙江之漕運無疑也續文獻通考至元二十年罷新河事海運立萬户府二以朱清為中萬户張瑄為千户蒙古岱為萬户府達嚕噶齊元史食貨志至元十九年立京畿江淮都漕運司司仍各置分司以督綱運二十年又用王積翁議令阿巴齊等廣開新河然新河候潮以入船多損壊而蒙古岱言海運之舟悉皆至焉於是罷新河事海運立萬户府元史世祖紀至元二十八年罷江淮漕運司併於海船萬戶府由海道漕運元史食貨志二十四年立行泉府司專掌海運増置萬戶府二總為四府二十八年用朱清張瑄之請併四府為都漕萬户府止令清瑄二人掌之其屬有千户等官分為各翼以督嵗運續資治通鑑大徳五年増明年海運糧百二十萬石續文獻通考大徳七年以江浙年穀不登減海運糧四十萬石元史武宗紀大徳十一年中書省奏常嵗海運糧百四十五萬石今江浙嵗儉不能如數請仍舊例湖廣江西各輸五十萬石並由海道達京師從之續文獻通考皇慶元年増江浙海漕二十萬石元史兵志延祐元年樞密院官奏中書省言江浙春運糧八十三萬六千二百六十石取日開洋前來直沽請預差軍人鎮遏詔依年依調軍一千名命右衛副都指揮使巴延往鎮遏之三年海運至直沽樞密院官奏調軍士五百名巡鎮從之續文獻通考延祐五年増海漕四十萬石元史英宗紀至治三年減海道嵗運二十萬石續資治通鑑拜珠以海運糧視世祖時頓増數倍今江南民力困極而京倉充滿奏乞減二十萬石從之續文獻通考泰定二年海運江南糧一百七十萬石直至於京師時廷議海漕事康里回以廩積方饒奏減糧數以紓東南民力可其奏元史文宗紀天厯二年命江浙行省明年漕運糧二百八十萬石赴京師續文獻通考至順元年江浙行省言今嵗夏秋霖雨大水没民田甚多稅糧不滿舊額明年海運本省止可二百餘萬元史文宗紀至順二年中書省臣言明年海運糧二百四十萬石已令江浙運二百二十萬河南二十萬今請令江浙復増二十萬從之續文獻通考凡運糧毎石有脚價鈔至元二十一年給中統鈔八兩五錢至大三年以浙東船户至平江載糧者道逺費廣増為至元鈔一兩六錢香糯一兩七錢四年又増為二兩香糯二兩八錢稻榖一兩四錢延祐年間斟酌逺近復増其價溫台慶元船運糙粳香糯每石十兩五錢紹興浙西船毎石一十一兩白粳價同稻穀每石八兩黒豆每石依糙白糧給焉元史食貨志海初海運之道自平江劉家港入海經揚州路通州門縣黄連沙頭萬里長灘開洋沿山㠗而行抵淮安路鹽城縣歴西海州海寜府東海縣密州膠州界放靈山洋投東北路多淺沙行月餘始抵成山計其水程自海上至楊村馬頭凡一萬三千三百五十里至元二十九年朱清等言其路險惡復聞生道自劉家港開洋至撐脚沙轉洋觜至三沙洋江過匾擔沙大洪又過萬里長灘放大洋至青水洋又經黒水洋至成山過劉家島至之罘沙門島放萊州大洋抵界河口其道差為徑直明年千户殷明畧又開新道從劉家港入海至崇明州三沙放洋向東行入黒水大洋取成山轉西至劉家島又至登州沙門島於萊州大洋入界河當舟行風信有時自浙西至京師不過旬日而已視前二道為最便云元史順帝紀至元四年江浙海運糧數不足撥江西河南五十萬石補之續通鑑綱目至正十九年江南海漕不通遣兵部尚書巴延特穆爾徵海運糧於張士誠巴延特穆爾至杭州命張士誠輸粟方國珍具舟丞相達實特穆爾總督之運粟十一萬至京師謹按元自世祖用巴延之言嵗漕東南粟由海道以給京師江浙之糧分為春夏二運始自至元十九年至於天厯至順由四萬石増而為三百萬以上民無輓輸之勞國有儲蓄之富論者稱為一代良法然風濤不測無嵗無之順帝至元以後嵗運之數漸不如舊至正元年江浙所運僅二百八十萬石三年又僅二百六十萬石且海運之舟不至大都者數年十九年巴延特穆爾徴海運於江浙張士誠輸粟一十一萬石二十年赴京是年復遣王宗禮至江浙二十一年運糧赴京如上年之數二十二年運糧赴京視上年僅加二萬二十三年仍運糧十有三萬石赴京是年再遣博囉特穆爾往徴而粟竟不復運由是江浙海漕遂止於是嵗焉又按元之海漕其船有仙鶴哨船每船三十隻為一綱大抵船九百餘隻漕米三百餘萬石船户八千餘人又分其綱為三十每綱設押綱官二人以常選正八品為之其行船者又僱募水手移置揚州光加教習領其事者則設專官秩三品而任之又專任之於朱清張瑄輩加秩而不易其人立法甚備續文獻通考明洪武十三年海運糧七十萬石於遼東二十二年令海運糧米六十萬石以給遼東三十年海運糧七十萬石於遼東名山藏洪武中海運給遼左七十五萬石凡役官軍八萬餘人運軍悉許附載已物資私用航海侯張赫舳艫侯米壽皆以海運功封謹按元時海運浙西秋糧之外或以江淮財賦府嵗糧充運洪武十三年海運惟直隸江南諸府秋糧時嘉湖二府尚屬直隸未屬浙江故知海運之粟兼嘉湖二府在内也自洪武十五年以後及永樂中海運赴北京之粟皆蘇松常嘉湖五府居多明從信錄洪武三十年停遼東海運明法傳錄永樂元年命平江伯陳瑄督海運糧赴北京憲章𩔖編成祖即位凡江南運舟派為二道一由江入海出直沽口白河運至通州為海運一由江入淮入黄河至陽武縣陸運至衛輝府運至薊州為陸運續文獻通考永樂六年海運糧六十五萬一千二百二十石於北京明史紀事本末永樂八年以舊額漕運二百五十萬石不足給國用特令江浙湖廣三省各布都官自行督運共三百萬石有竒名山藏永樂九年㑹通河成何喬逺宋禮傳㑹通河者元至元中以壽張尹韓仲暉言自東平安民山鑿河至臨清引汶絶濟屬之衛河為轉漕道然岸狹水淺不能重載故終元世海運為多成祖時濟寜州同知潘叔正上言舊㑹通河四百五十餘里淤者乃三之一濬之便命禮往治之禮以㑹通之源必資汶水乃用汶上老人白英策築堽城及載邨壩横亘五里遏汶流使無南入洸而北歸海滙諸泉之水盡出汶上至南旺分為二道南流接徐沛十之四北流達臨清十之六又相地置閘以時蓄洩自分水北至臨清地降九十尺置閘十有七而達於衛南至沽頭地降百十有六尺閘二十有一而達於淮通漕𩔖編永樂十二年令北京直隸等衛俱選官軍運糧謹按此為改官軍運漕之始自濬㑹通河後命都督賈義尚書宋禮以舟師運以海船大者千石工窳輙敗乃造淺船以千艘運糧百萬以當海運之數平江伯陳瑄繼之於湖廣江西造平底淺船三千艘分遣官軍就近輓運淮安等倉名曰支運嵗凡四次可三百餘萬而海陸二運皆罷又按洪武時海船有一千料有四百料名鑽風海船永樂中改海運遂改四百料為淺船淺船者因海船得名也通漕𩔖編永樂十三年令浙江杭嘉湖秋糧除存留并起運南京供内府等項外其餘原坐太倉海運之數盡改撥淮安倉交收仍令淺河船於㑹通河以三千隻支淮安糧運至濟寜倉以一千隻支濟寧糧運赴通州謹按一嵗之中通運四次所謂支運者是也自是以後海運不復行矣續文獻通考永樂十三年令浙江都司分官軍於淮安運糧至徐州置倉收囤明㑹典永樂十六年令浙江布政司税糧令糧里自備船隻運赴通州河西務等處上倉從信錄初令民運明㑹典宣徳四年令浙江民運糧貯淮安倉令官軍支運從信錄改轉運為支運明漕運志尚書黄福同陳瑄趣漕糧建議淮安倉厫具在宜復使官軍支運乃令浙江民運糧於淮安倉復令官軍支運民運既就近入倉力大減省乃量地近逺糧多寡抽民船十一以給官軍焉明泳化𩔖編宣徳六年令浙江僉撥民丁及軍多衛所添撥軍士與見運軍士分班更替儹運漕運考儹運之初皆攴運續文獻通考宣徳七年始立兑運法明漕運志陳瑄言江南民運糧詣倉往返㡬一年悞農業而浙江官軍毎嵗以船載至淮安載糧若令江南民對撥附近衛所官軍運至京給與路費耗米則軍民兩便帝遣侍郎王佐往淮安與瑄及黄福議皆以為可行復命羣臣㑹議吏部尚書蹇義等條上官軍兑運民糧加耗則例以地逺近為差毎石浙江七斗民有運至淮安兑與軍運者止加四斗如有兑運不盡仍令民自運赴倉不願兑者亦聽其自運兑軍既加耗又給輕齎銀為洪閘盤剝之費且得附載他物以資軍軍皆樂從事而民亦多以逺運為艱於是兑運者多而支運者少矣從信錄改民運為兌運續文獻通考正統元年令兑運糧加耗浙江民自運至𤓰州兑運者三斗七升淮安者三斗海鹽縣圖經正統六年命江南巡撫周忱兼撫嘉湖二府奏立民與軍兑運之法彭韶周文襄傳嘉湖二府往時裏河運糧軍民相半軍則官為打造淺船分長短中三運長運於淮安常盈倉中運於徐州廣運倉短運於臨清廣積倉支米一尖一平下船民則自行僱船裝運正糧一石該平米二石又船錢一石經年往返多失農業忱先創立耗米之法亦曰平米毎正糧一石收平米一石七斗候起運時酌量文撥至是奏立民與軍於淮安𤓰洲等處水次對船交兌衛所出給通闗付還銷繳在淮安正糧一石兌與平米一石五斗𤓰洲兌與平米一石五斗五升各處運船官軍未曽過江者抵倉交兌加與過江船錢米二斗豐年米賤兌與加七五升凶年米貴兌與加六五升襯墊蘆蓆折米五合支撥羡餘存積在倉號曰餘米次年餘多則令加六徴收又次年益多止令加五除依前撥運外有所餘乃令各縣造倉一所名曰濟農將遞年撥運剩米運入以備賑濟及農民缺食運夫遭風被盜者人皆稱便萬厯杭州府志正統七年巡撫侍郎周忱修築浙江下塘堤岸新運河在武林門外北新橋之北通蘇杭常鎮并浙之嘉湖等府宋淳祐七年大旱乾涸安撫趙與􅊸疏言下塘水道有二一自東遷至北新橋今已斷流一自徳清至苕溪入奉口至北新橋間有積水以致商旅不行米價騰貴乃僱募鄉之壯民開濬自北新橋至狗𦵏開濶三丈深四丈自狗𦵏至奉口開濶一丈民間稱便至是通判易輗條上利害忱便宜措備自北新橋迤北而東至崇徳縣界修築塘岸一萬三千二百七十二丈四尺以䕶風水又為橋七十有二水陸通行漕艘更便今名下塘焉續文獻通考正統十三年令浙江加耗毎石三斗六升明㑹典正統十三年令白糧船編置字號送沿河各官催督民運規則浙江供用庫白粳米三萬二千石本色酒醋麵局白糯米六千七百石本色光祿寺白粳米一萬九千石本色九分折色一分毎石折銀一兩白糯米八千五百石本色八分折色二分毎石折銀一兩一錢明漕運志浙江漕糧之外嘉湖二府輸運内府白熟粳糯米府寺糙粳米令民