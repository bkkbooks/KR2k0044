body:
  text: 浙江通志卷二百十六列女十五處州府麗水縣宋葉光妻梅氏栝蒼彚紀年少寡居元祐中郡守胡宗質増創州學梅助錢二千緡又賣珠冠得五百緡以益之建義學於鄉請名士葉端仁敎五經又置一師訓誨其鄉之子弟姜綬妻陳氏兩浙名賢録綬死靖康之難時年二十三家貧父母欲奪志陳引刀斷髪誓不再嫁人以為忠節萃於一門陳某妻姜氏栝蒼彚紀姜繹女夫亡貧不改嫁與二子相依事母至孝嘉泰中詔旌其門賜粟帛即所居為旌行坊薛震惠妻尹氏兩浙名賢録夫亡時年二十三有男女四人皆幼家貧賣簪珥治喪守服姑憐其志語曰吾家素單薄汝不幸早寡吾守爾孤爾可再適氏泣曰一身事二夫寜死不為也慟㡬絶自後姑不復言養姑愈謹姑終喪葬盡禮撫育子女成立録事葉現為之贊梁鍇妻葉氏栝蒼彚紀鍇既第未及禄而卒氏年二十七泣血負土營朋穴以自誓竭力敎子讀書推餘貲以周貧乏葉珂妻湯氏栝蒼彚紀年十八夫客死於燕子未晬氏誓不再適育子成立部使者以聞旌其門仍復其家張本妻季氏栝蒼彚紀自少寡居勤儉守節年七十餘有司申達旌其家王伯良妻陳氏栝蒼彚紀早喪夫煢居無玷年八十餘有司申明旌其門葉原英妻陶氏栝蒼彚紀年二十六夫亡守節孝養舅姑家貧敎子卓有成立林江妻徐氏栝蒼彚紀名淑元兵入栝生子定老甫六月避地山中江以兵死氏婦姑相依年三十誓不再嫁訓子登進士第追贈龍泉縣君元朱益妻鄭氏栝蒼彚紀二十六而寡姑老子幼曲盡孝慈姑卧疾六年粥藥必親嘗至元二年立節孝坊陳妙珍宋濓陳孝女傳父南溪蚤夭母更適他族妙珍依祖母林氏以生林嬰疾妙珍刲股進疾遂瘳或告之曰此若女孫股肉之功也林悲泣疾復如初氣益弱僅一絲相屬妙珍計無所出燃香臂上稽顙龥天乞以身代夜夢一丈夫告曰爾能剔肝食之則愈俾吞紅藥半丸吞已遂覺乃沐浴露禱持刀視脇下見紅痕如縷長可三寸許就痕上割取肝雜竹萌烹之祖母食纔下咽疾頓愈妙珍創鉅甚復夢神語錬紙作灰傅之果愈時年十四周善才嘉靖浙江通志年一十八歲已受洪氏聘元末兵起避兵甘泉寨寨破被掠欲汚之義不受辱賊殺之葉河妻湯氏續文獻通考名潤字妙光河早卒年始二十一守節三十一年至正時旌其閭且復其役葉氏二節王錡雙節傳葉氏名璦麗水人歸景寜潘雍二年歸寧郡罹兵從家人逃白巖軍士往来山谷間抄掠甚衆葉氏度不免與其弟伯現婦王氏訣曰吾與若俱生詩禮家不幸遭變若能從我死乎王曰我志也兵至巖下王取平日所服御者盡燬而棄之将自經葉曰何遽也山巖險阻完破未可知吾與若俱有父母舅姑萬一可保雖不死可也如真不守死奚晩言未既軍士突入王曰事急矣遂自經死葉倉卒不知所為視室中有甕巨甚因自溺甕中其父之妾破甕出之與其媵新葵擁出砦門葉堅不肯行即投崖下死新葵泣曰主母死矣吾獨何生亦墜崖下死陳程妻葉氏嘉靖浙江通志麗水人元末兵逼金華葉與夫奉舅姑擕子女避兵於風山未㡬城破兵畧所避地葉度不免乃遽更新衣其叔乳母虞氏見之曰當此倉皇之日更衣何為葉曰有死耳虞曰有舅姑與夫及子女在奚忍為之葉曰吾豈不欲同生以事以育盡婦之道但禍在目前祇取辱耳身辱何以為人嫗能為我扶老擕幼雖冥目無恨即觸崖下死明楊遂卿妻張氏栝蒼彚紀年二十四夫亡生一女時姑年八十餘憐其孤苦命再適氏誓不他適洪武年旌表谷得與妻陳氏嘉靖浙江通志年二十三美容色景泰元年春叛賊陶得二輩掠鄉村氏與隣婦同避巖穴為賊所執欲犯之隣婦不敢拒氏獨憤罵不從賊脇以白刃罵愈不絶賊怒而殺之賊去鄉人殮其骸葬於小嶺因名其嶺為烈婦嶺陳孟吉妻黃氏栝蒼彚紀年二十三夫亡氏娠已三月其夫之兄利其家産以弟無出欲嫁之氏誓死不他適及彌月生子名愷子能成立母以夀終劉永紳妻朱氏栝蒼彚紀既歸家日貧乏養舅姑鬻妝資畧無吝意越數載夫亡堅志守節至死不衰王漢永妻劉氏栝蒼彚紀年二十四夫病時思瓜不得而死劉誓守終身不忍食𤓰事聞旌表徐貞女萬歴處州府志年十八許配葉埜未嫁而埜亡號慟奔喪誓死不二事舅姑以孝聞嘉靖年旌表夀七十有六趙子忠妻葉氏萬歴處州府志趙卒氏年十九撫遺腹子亦亡持節益堅嘉靖年旌表齊貞女崇禎處州府志葉賜聘妻年十八未歸夫亡奔喪慟哭誓不他適父母迎回欲奪其志潛入房自縊㡬絶救甦以夀終孫良佐妻張氏崇禎處州府志年十七適夫未二載夫亡遺腹一子家貧辟纑度日事舅姑撫子艱苦備嘗夀八十而終胡鼎元妻楊氏崇禎處州府志夫係衛軍駕運艘在外崇禎癸酉七月人傳夫被盜殺氏聞慟絶於地隣嫗救甦即觸堦而死劉士驥妻王氏崇禎處州府志廣東陽江丞王三錫女年十七從夫之任至海被刦氏恐被汚投於水衣為柁所拌盜去救免十九適士驥甫五載夫亡家貧父母欲令改志氏矢死靡他撫孤長成商於外煢煢一室忽遭大水氏抱木而浮直至屋頂一晝夜不粒食不死人以為守節之報陳所學妻吳氏舊浙江通志所學早殞氏矢志守節崇禎未避亂風山寨為兵所負而趨氏嚙兵肩墮地即奪兵刄自刺死續孔敎妻陳氏處州府志姑病日久氏刲股龥天求代舅之嬖婢與氏隙以珠蘭根和藥脱姑髪詭言氏進姑怒亦命氏髠髪逐之另居後姑死舅知刲股事因得婢䧟害故欲置之死氏又為貸宥焉值夫死於難訃間不食而死葉叔寶妻毛氏朱彦祥妻何氏葉仲餘妻林氏徐心甫妻常氏梁彦廣妻章氏薛寵妻周氏余巖妻葉氏何彦綂妻陳氏葉鑑妻姚氏謝幼敎妻陳氏俞炅妻季氏鄭季濓妻戴氏奚世恩妻魏氏何仁妻陳氏郭仲恩妻戈氏吳大科妻詹氏何松妻王氏何棟妻謝氏錢中選妻楊氏吳鎻妻陳氏國朝謝俊陞妻趙氏處州府志年十八方國安殘兵至境氏避於獅子山夫語曰兵至奈何氏曰有死而已兵果至夫被刺仆地氏抱二歲子觸崖而墮子蹲母腹上得不死越日尋母屍獲子育焉又張科妻葉氏夫為潰兵所繫氏抱週歲女自溺於池陳昌䕃妻奚氏避兵風山寨寨破投坑而死王朝聖妻楊氏為兵趕掠投山下死寗世忠妻張氏舊浙江通志方兵掠城世忠及長子為兵所繫氏恐汚已遂以懐中週歲女先投於井遂自溺越兩月夫歸撈其屍顔色不變髙應魁妻梁氏處州府志年二十五夫亡氏上事下撫紡織自度有貴室耳其賢欲娶之氏曰夫死宜死所不即死者以子幼耳寧肯他適年七十一終劉湯臣妻耿氏處州府續志年十八適劉二月而夫卒貞節自持有富家艶其姿納幣求婚氏堅不從人莫能强年五十無嗣人甚傷之梁氏四節處州府續志葉氏梁應選妻夫亡守節五十一年夀七十六潘氏梁應缺妻年二十夫亡守節四十四年許氏梁應缺妻年二十二夫亡守節四十二年張氏梁應箕妻年二十七夫亡守節三十三年人稱一門四節謹按潘氏許氏夫名續志俱作應星無從考訂故闕之王振宗妻陳氏處州府續志振宗死氏年十九矢志不渝卒年四十一女適錢泓甫及笄而夫卒氷霜苦節有母氏風張國棟妻陳氏何如忠妻楊氏汪一䕫妻徐氏梁尹祥妻王氏祝忠仁妻葉氏吳志益妻陳氏陳學周妻盧氏聶維新妻劉氏許成仁妻陳氏辜存素妻黄氏劉禹臣妻余氏李希堯妻劉氏青田縣元徐伯龍妻夏氏嘉靖浙江通志名淑榮伯龍以義死於賊氏年方二十一事姑撫幼煢煢孑立賊黨有宋戊四者欲米逼之氏曰吾夫為彼所殺尚未能報今反欲脇我耶遂引髻擲地曰吾頭可斷身不可辱復来吾當以頭與之賊竟不敢犯自是絶葷毁容間闗亂世者三十餘年以夀卒明林庭光妻蔡氏嘉靖浙江通志年二十一庭光卒子始週歲婣戚勸其易志蔡斷髪自誓紡績事姑撫幼姑卒喪葬如禮孀居六十年卒林叔資妻葉氏嘉靖浙江通志年二十二而寡夫葬時泣拜墓前剔去一齒誓不再醮家貧事姑撫幼克盡其道年八十餘卒楊以嘉妻葉氏栝蒼彚紀年二十二夫亡子甫三歲事舅姑襄大事子長欲為母乞旌氏曰婦人守志分内事也何為干譽事遂寝葉氏二節續文獻通考葉孔賓妻鄭氏孔賓以父卒於官迎喪覆舟死鄭年二十三遺子十月矢志自守妾何氏年尤少鄭謂之曰我守夫家汝無子宜自擇也妾曰主母既以節守妾當奉承以全其節何以出為相與同處年各八十餘宋廣妻留氏栝蒼彚紀夫亡貧無以殮鬻奩具買棺葬之時年二十子週歲父母令改嫁堅執不移正綂間盜起氏避之他鄉間闗備歴不二其志時稱真節婦潘廷臻妻季氏栝蒼彚紀年二十六而寡親戚欲奪其志氏以死自誓乃止鄭好宻妻詹氏兩浙名賢録好宻常忤大姓劉某劉伺傾之適土冦聚採銀坑劉誣坐好宻好宻逃捕卒四人縲氏入官晡時行披渉漭瀁三十里無人烟氏自度不免内一卒髯而勇三卒惟命氏背三卒紿之曰暝涉深麓三管勾無禮願君為主勿縱其亂妾至君家惟所命髯勇卒意氏悦已掖氏出山三卒言稍涉戲輙詬之越二十里至黄壇遇歸樵氏顧髯勇卒曰妾屐折不利暝行假樵刀去之執屐呼四卒戲曰妾擲屐先得者夕當侍寝逺投屐於棘叢四卒喧笑望屐競趨氏引樵刀自刎死四卒驚走時盛夏暴屍於道經句蠅蚋不近靣目如生官葬之斃其四卒葉楚淋妻徐氏栝蒼彚紀年十九夫亡子生方五月有謀奪其志徐引刀自衛欲决一死乃止一日隣火及家氏撫棺哀號火尋熄夀八十八嘉靖間旌表周孝女兩浙名賢録父元綱晡時浴簷下為虎所咥女年十八呼號攘臂擊虎至門外力抱父足虎棄其父而啖之朱球妻夏氏栝蒼彚紀年二十二夫亡誓志撫孤再越歲兩子俱喪自是每欲自絶父强之歸寧勸改嫁氏曰我所以不死者以子在也今已矣豈能再醮乎值夫諱日潛入卧内引刀自刎朱氏迎柩與夫同寄於外次一日洪水暴漲柩漂去者無算惟氏與夫二柩會擱高墩人皆異之廵撫謝廷傑檄行禮葬立石表墓林尚翊妻葉氏崇禎處州府志年二十以死從夫救甦乃立嗣育之父欲奪其志托疾促歸自後不復歸寧堅守如初吳安定妻徐氏項彦成妻金氏項景中妻劉氏葉叔淵妻蔣氏朱崇讓妻林氏周澂妻董氏朱崇館妻厲氏陳杉妻劉氏葉孔賢妻朱氏周一紀妻陳氏劉洪妻李氏厲良敏妻趙氏陳圻妻夏氏季敏禮妻章氏陳一臣妻黄氏王名炫妻林氏留寔妻葉氏留三聘妻葉氏葉孔炤妻金氏留作醴妻朱氏蔣光璧妻葉氏國朝梅友松妻葉氏青田縣志順治初括州未平為亂兵所擄自計不能脱陽為好言紿兵行至天梯嶺下坑深百丈亂石巉立氏呼天投堕骨肉皆為虀粉葉氏二節處州府志陳氏青田葉有讓妻夫亡陳年二十八男永培娶夏氏培亦卒夏年二十六遺子光經艱苦殊甚姑婦抱持訓課陳守志六十五年夏守志四十七年終郭世琯妻程氏青田縣志年方艾康熙乙卯閩㓂䧟邑被掠賊出美衣好食誘之拒不受又連殺數婦人以恐脇氏即引頸求死賊强其上馬復自投地數次賊怒亂砍死胡忠盛妻王氏青田縣志年二十八而寡歴十五載值閩亂為賊所掠觸崖死楊元綱妻詹氏陳其學妻鄭氏葉鳳京妻蔣氏章煥然妻王氏蔣光國妻葉氏陳餘音妻葉氏朱正倫妻林氏林梓妻孫氏林鋋妻周氏林秀芝妻周氏楊吉妻陳氏留長奎妻葉氏葉日嘉妻林氏董萬英妻陳氏詹士修母周氏縉雲縣唐陶氏栝蒼彚紀建中間夫亡早寡事姑克孝姑病竭力醫禱及卒一號三絶負土成墳縣令李繇作文為碑表其墓至今呼為孝婦墳宋施源妻趙氏栝蒼彚紀孀居守志家極貧刻苦樹立人稱為女丈夫朱拱妻方氏栝蒼彚紀拱早世氏年二十寡居六十餘年朱象妻張氏栝蒼彚紀寡居五十二年邑人葉逢之表其墓田材妻陶氏栝蒼彚紀材卒陶尚少守節教子渭官至提舉明趙氏二節明實録洪武三年旌表縉雲縣民趙叔範妻陳氏與其子婦梅氏為雙節初陳氏夫亡守節六十九年夀九十七其子道生早亡婦梅氏亦守志五十一年夀八十事聞旌之張氏二節栝蒼彚紀章氏張如璋妻朱氏如璋男文髙妻父子俱早逝朱謂姑曰妾孕且數月天不斬張氏後當有子後果生子又殀章老雙目喪明飲食皆朱紡織以給婦姑相守若雙璧然宋氏二節栝蒼彚紀朱氏名珮宋俊傑妻早寡子鼎娶周氏生男賜寶未㡬鼎與周偕亡賜寶室項氏名松賜寶亦亡松時年二十珮曰吾年未三十而哭夫五十而哭子今七十三矣又哭其孫何以生為松曰兒有孕幸而生男宋氏之宗猶可延也後六月生男天祐長又死有利其貲者多方説之松以死誓乃止趙璉傳其事趙烈女兩浙名賢録諱璚笄年未嫁時流賊犯境居民奔避父卧疾不忍離被執璚紿賊曰少入安慰吾父即當從汝賊聽之即解裙帶自經死賊重其義遺白金為殮具咨嗟而去丁澤妻楊氏栝蒼彚紀年二十四而寡垢靣惡衣織紡敎子奎正綂間栝冦亂楊擕奎避山中遇虎不咥人謂守節之報施錫妻吳氏栝蒼彚紀年二十而寡父强其嫁氏矢志不二奉姑以孝事聞旌其門丁杲妻應氏兩浙名賢録年二十五而寡三孤俱幼鞠育成立比隣屢失火皆逼其廬而滅丁酉之火先夢神告之曰無恐與西風以寜爾已而東隣火居於西者皆惶惶無措應以所夢告果返風滅火徐朴妻樊氏栝蒼彚紀年二十三而寡家貧勵操長男器五歲次男年甫八月隣火逼氏抱朴柩哭殞地兄至擕出忽聞室内聲復往見一兒酣睡乃年也遂抱出人共異之鄭鋹妻朱氏兩浙名賢録年二十五無子為鋹娶妾生二子鋹得疾将屬纊以孤托之氏曰天乎妾為君謀至矣今何忍見其若此亟為夫治後事更衣自縊孫綽妻趙氏栝蒼彚紀年二十三綽見殺於族之横者横願以財償衆勸之趙曰何靣目見夫於地下寜我俱死不願財也逾七年横者死獄中乃止哭遺腹一女招壻侍養終身趙充妻沈氏栝蒼彚紀年二十二寡或勸再適沈曰一姑在堂一子在抱若離趙氏其如趙後何紡織撫孤竟以夀終李素妻鄭氏萬歴處州府志年十九適李未逾年夫亡舅繼殁鬻奩産殯葬從一之操貧而愈烈王應龍妻劉氏萬歴處州府志年二十八夫亡堅貞自矢後因族衆逼嫁自縊而死事聞旌表樊貞女崇禎處州府志鄭應聘妻未合巹夫亡守貞事姑三院題請建坊施萬瓊妻李氏崇禎處州府志年二十二夫亡無子且貧甚人多諷以他適氏以苦節自甘應鈇妻陳氏崇禎處州府志年十九夫亡遺腹舉子名琪甫朞痘殤抱越宿時呵以生氣忽復甦親族皆異焉年九十有八孫曽繞膝人謂貞節之報樊為正妻李氏崇禎處州府志年十七歸樊閲三歲夫亡事寡姑以孝聞孤六歲輙敎之句讀年十一遂為諸生朱允正妻鄭氏崇禎處州府志年十九而寡一意殉夫哀痛㡬絶及姑逝身為含殮擗踊嘔血遂不藥卒年二十八李斐然妻鄭氏處州府志斐然官襄陽流㓂逼城適斐然攝篆光化氏泣囑兩兒曰汝家世篤忠貞節烈之義夙聞之矣不願見賊入此城也惟有姑在堂弗能侍奉為恨遂扄户自縊死巡撫王揚基彚題旌表杜某妻李氏處州府志美姿容早年夫喪矢志守節有府差鄭立者倚勢逼娶之不從復强之月餘氏紿其媒曰伊擇吉吾當改粧及期遂閉户自經事聞鄭立論死旌表其閭張文佐妻陳氏何天澤妻李氏陳子名妻施氏施叔偉妻葉氏羊惠妻朱氏周伯𢎞妻田氏朱仕清妻陳氏朱堯妻樊氏陳綱妻虞氏鄭鉞妻李氏李舜臣妻丁氏鄭春元妻李氏朱愛妻應氏李繼承妻周氏盧俊夀妻施氏陳九貢妻麻氏朱秉思妻徐氏葉繼茂妻朱氏應文奎妻丁氏李希思妻丁氏樊同德妻胡氏李永隆妻施氏虞良璧妻麻氏國朝陳兆基妻丁氏題旌冊年二十九而寡家極貧有勸其改適者截髪割靣以死自誓上事耄姑甘㫖罔缺下育幼子課讀有方自守制後靣無笑容遇有喜慶事輙閉户不出守節二十七年㫖建雍正十一年具題奉坊旌表李含章妻楊氏處州府志順治戊子冦亂氏奉姑出避遇單騎追廹慮不得全遂溺水死朱泰來妻李氏縉雲縣志順治間山冦亂作氏為所執欲汚之氏大罵不屈行數百步遇塔潭深淵躍入水死又朱持獻妻沈氏為冦所執觸石而隕應九思妻徐氏縉雲縣志年十九而寡生男甫六月舅以家貧子幼聽其他適氏泣曰衰老舅姑誰與奉養數月孤兒誰與撫育矢志靡他紡績度日孀居四十載院道給米旌其門田氏二節縉雲縣志李氏田國泰妻年十九而寡養堂姪兆甲為繼甫弱冠娶鄭氏未三載而兆甲卒李以痛子成疾而亡又遭㓂亂家計蕩然鄭立從子於磻為繼盡毁衣餘葬舅姑及夫并夫之本生父母人稱女中丈夫陶國俊妻杜氏縉雲縣志康熙乙卯閩變氏避難深山為兵所執痛哭大罵卒怒殺之越五日國俊收其屍顔色不變其畜大守屍七日氏殯訖犬赴水死又朱以欽妻陳氏被掠即赴水死王正心妻章氏縉雲縣志艾齡孀守有豪富强委禽焉聲言搶奪氏度不可禦紿以次日成禮是夜更衣自縊從容完節朱之彦妻盧氏縉雲縣志年二十三夫亡子幼家貧親隣交勸改適盧矢志不移凍餓流離濱死者屢而貞􅋵益堅教子成立田時昌妻鄭氏田芳春妻李氏陳有時妻葉氏朱色錦妻田氏李繼承妻周氏朱芝蘭妻田氏李時彦妻應氏楊正仁妻施氏虞曰都妻馬氏李維錫妻丁氏趙溢妻李氏田同言妻鄭氏鄭孕蕙妻朱氏施繩元妻李氏盧應承妻吕氏李端飈妻鄭氏李受采妻潘氏沈得時妻李氏陳所學妻麻氏沈汝福妻朱氏鄭銘瑛妻虞氏松陽縣三國吳柳朱三國志虞翻傳注松楊柳朱一醮守節喪身不顧宋張玉娘松陽縣志字若瓊父授以孝經女訓遏目成誦能為詩文號貞一居士擇配沈生從父宦遊病羸不起時玉娘年二十四矢志守節恨不同死未逾月竟不食而殞父母痛之與生並葬於楓林玉娘舊畜能言鸚鵡及侍兒翠紅俱悲啼死并以殉塟名其塜曰鸚鵡玉娘遺稿曰蘭雪集學士虞伯生歐陽𤣥讀其詩至山之髙月出小月之小何皎皎我有所思在逺道一日不見兮憂心悄悄撫几嘆曰可與國風草蟲並稱元周婦毛氏元史本傳美姿色至正十五年隨其夫避亂麻鷖山中為賊所得脇之曰從我多與若金否則殺汝毛氏曰寧剖我心不願汝金賊以刀磨其身毛氏因大詈曰碎卨賊汝碎則臭我碎則香賊怒刳其膓而去年二十九周惠妻王氏栝蒼彚紀惠早亡王守節不二至正間聞於朝旌表之毛彦清妻葉氏栝蒼彚紀長子三歲次在孕姑老彦清出遊荆襄值元季兵亂莫知所之葉奉始撫子無不切至每以荆花榮茂事論二子曰兄弟和則家道昌二子遂順母克和厥家五世不分明楊進佳妻劉氏栝蒼彚紀年二十七夫亡無子母令再適引刀自刎家人救之得免以血寄母誓無他志夀八十四徐禄妻陳氏栝蒼彚紀年二十夫亡無子姑染痺疾不能行氏晨夕扶持誓志不改吳質妻潘氏嘉靖浙江通志正綂間宣平冦起避難横山賊攻寨兵潰賊至欲脇以行潘不從抱子投崖而死周廷輝女嘉靖浙江通志年十八有姿色正綂間避難横山冦至欲廹去不從即以刄按其頸脇之女曰欲殺即殺决不汝從遂被害鄉人塟之包𢎞仁女栝蒼彚紀年十九正綂間鄉人乗亂欲逼而娶之女不從自縊死吳榮妻項氏兩浙名賢録有姿色在樓績麻夫兄名鷗童者窺而戲之氏即叱怒墮樓死隣族聞於官刑其罪人禮塟之旌為烈婦吳四妻楊氏栝蒼彚紀生子五月而夫亡姑欲移其志氏不從姑乃陰納配里之巨族氏覺遂引刀斷喉死時年二十四徐銓妻鄭氏栝蒼彚紀銓卒父欲再醮氏矢志不易父以計强之氏度不免乃佯言沐浴更衣如内良久衆疑之啓户已縞衣自縊矣葉三妻蔡氏明列女傳三貧負薪為業氏小心敬事三久病織絍供藥餌病篤執婦手訣曰及我生而嫁無受三年苦婦梳洗更衣袖刀前曰我先嫁矣刎頸死三驚嘆亦死徐夢旐妻詹氏栝蒼彚紀性柔順孝謹夢旐病将危割左股療之病復作又割右臂及卒引刀自刎死包惟政女栝蒼彚紀幼孝母卒父欲以女許人女曰父鱞弟幼女嫁則親何依辟纑養親父病躬藥不離左右月餘不解衣帶父殁喪塟盡禮卒以夀終徐揚輝妻毛氏崇禎處州府志年十八夫亡子松幼有欲令其改嫁者痛哭㡬殞以栢舟自誓訓子有畫荻風潘氏二節崇禎處州府志毛氏潘元義妻夫卒矢志守節子國璽娶徐氏未期年夫亡朝夕慟哭遂自縊髙僅妻徐氏松陽縣志年二十生一子夫溺於水徐氏索屍不得欲投水屍忽浮出氏每欲以死報夫一日沐浴更衣絞襟結帶以自縊王家士妻葉氏崇禎處州府志家貧多逋負夫以骨哽斃氏即不欲生翁不揣其意曰若不患無夫也氏頷之處夫逋解分畢仰藥卒數日目光如烱潘經妻包氏包旦妻吳氏毛德妻葉氏周天民妻葉氏葉挺妻劉氏徐大載妻葉氏徐度貞妻葉氏潘伯正妻周氏毛鳳周妻周氏劉孔敎妻毛氏劉德性妻葉氏葉良俊妻楊氏周一蘭妻丁氏詹希元妻葉氏周複妻毛氏毛汝文妻劉氏潘國舉妻周氏何曽六妻周氏葉繼忠妻劉氏程大秀妻楊氏國朝髙攀桂妻徐氏處州府志早年喪夫矢志守節順治丙戌夏方兵入境刦掠强辱不從遂自縊而死徐日華妻葉氏舊浙江通志年十八避亂山谷賊强逼不從墜崖而死葉起鳳妻潘氏王夢日妻洪氏周繼康妻徐氏毛鳳華妻劉氏董伯思妻葉氏葉公榮妻徐氏遂昌縣元王延洪妻李氏楊維禎王佳母墓誌名淑貞處州敎授某之女適遂昌王延洪洪沒李年方艾鞠養三子長學次佳次梅擇傅就學自學回必親試其所誦書探其課對工拙為賞罰故三子克有成立至正戊戌鄉民乗亂為椎埋剽奪李挈孥屬避地松陽長子死於兵故廬燬於火李氏憂悸成疾卒葉杭妻王氏嘉靖浙江通志名妙泳元末山㓂作亂刦其夫刃之妙泳念夫死必將汚我急擕二子屬之姑先自刎死郡縣上其事旌之明周貞女嘉靖浙江通志周滿女永樂間許聘蘇仲善為繼室未行而仲善死滿曰幸未成婚無妨别嫁女曰命也遂號慟至夫家服衰麻撫前妻子事姑以孝後家事日廹益能固守親戚鄉里皆以童老安人稱之謂其至老尚室女也年七十餘卒王叔可妻朱氏栝蒼彚紀年十九夫亡舅姑欲奪其志誓死不從夀九十六卒周應熊妻王氏嘉靖浙江通志適周再歲生一子方八月應熊病革指王曰能不負吾善養吾母保吾孤氏囓指出血泣曰天鑒之必無負後一如夫言孀居六十餘年吳渭妻姜氏栝蒼彚紀夫死年二十四鞠庶生子若己子孀居四十餘年未嘗出門庶子破其産藜藿不繼氏處之無怨言葉婦應氏嘉靖浙江通志年十八夫從戍二十餘年信音不聞人傳其夫在戍所别娶生一子矣父母因逼其嫁氏堅執不從後夫竟不歸而氏志終不渝清白自持以死黄鋿妻柴氏栝蒼彚紀夫亡氏年二十八一孤方髫敎之如嚴師嘗坐吟曰日落西山留不住水流東海並無回言此志不渝也夀九十五卒徐廷㺬妻鄭氏栝蒼彚紀年二十六夫亡隣家火逼抱柩大慟須臾返風獲免母欲奪其志即咬指呼天自誓紡織撫孤成立葉讓妻俞氏栝蒼彚紀讓卒家貧無子氏斷髪垢靣誓不再適為人紡績度日塟夫柩有勸易志者輙自縊或授之食堅不受年七十餘竟餓死戴憲妻華氏栝蒼彚紀憲卒氏年二十五剪髪自誓撫遺孤雖三飱不給所守愈堅徐舜滄妻周氏栝蒼彚紀年十七夫亡傭紡自給姑屢逼他適誓志不從竟以完節終包譚妻鄭氏萬歴處州府志性至孝精女紅父母殁繡容以祀宛然逼真年二十六夫亡忍死紡績以膳姑育子孀居五十四年卒徐懋厚妻王氏崇禎處州府志歸徐五載夫病刲股燎治不起遂絶粒求死父引程嬰事為諭始誓志立孤孤沒復立冠婚畢率子婦告廟次日抱夫像自經御史張素養具題旌表謹按舊浙江通志作陳懋厚妻華志逺妻鄭氏崇禎處州府志年十五歸華夫病刲左右股以療夫殁妯娌知其欲以身殉更番守之值新歲遂乗間投繯而逝葉應善妻周氏崇禎處州府志夫亡哀痛誓死夫伯强其再醮竟引刀自裁覆卧衾手足整然不亂知縣胡順化立石題墓曰貞烈項宗孔妻華氏崇禎處州府志歸宗孔六年宗孔卒氏不勝悲憤竟投繯而死包宇彦妻徐氏崇禎處州府志宇彦飲博狂蕩歲杪為人索逋敦逼自縊氏曰夫既死婦當從投繯救甦姑慰以育遺腹留夫一綫所親諭之曰為蕩子婦未逾年情好既疎青年弱質何自苦不應一日胎墮以頭觸壁一慟而絶特年十七徐維讓妻楊氏朱子方妻葉氏蘇長益妻葉氏鄭廷器妻吳氏周黼妻項氏朱璘妻尹氏朱明訓妻黄氏鄭廷儀妻蘇氏包志伊妻鄭氏黄九宫妻李氏黄伯康妻吳氏時可訓妻周氏朱懋孝妻王氏國朝童㢲妻朱氏題旌冊年二十四夫亡矢志不二事翁姑以孝聞訓子極嚴守節三十七年雍㫖建正三年具題奉坊旌表潘時積妻王氏題旌冊年二十七夫亡子甫數月伯叔逼之嫁氏礪刃自剄救之甦頸血漬庭柱間久而彌新守節三十九載撫子成立包運亨妻王氏題旌冊年二十一夫亡子生兩月勤苦撫教成立守節三十二載以上㫖建二氏俱雍正四年具題奉坊旌表駱佛喜妻周氏舊浙江通志順治丁亥兵勦冦氏為所掠狹坐馬上行至五里三墩橋有崖塹下臨深澗筍石削立忽竦身投崖膚裂血濺崖石而殞徐元福妻周氏遂昌縣志福貧掲本為商氏甫産一男纔七日即出外一去不返氏奉孀祖姑孀姑兩髙年晝夜為人紡績甚至不能備燈火暗中辟纑指節腐去其半先是其祖姑守節撫孤孤又殀同其姑貞守撫其夫元福後元福離家不返一門三代孤嫠煢煢見者酸鼻鄭九鵬妻徐氏遂昌縣志年二十而寡遺腹舉子家徒四壁有强以他適者氏呼天籲地矢志靡他日持夫遺髪一束泣對紡績敎子入泮能守母訓翁烈婦處州府志華國治妻勤操井臼國治少遊蕩家殖盡落勒氏改醮氏遂操刀刲頸幸未洞喉衆知擁䕶得甦刀痕未愈復行强逼輙加刃而殞周一詔妻毛氏包萬禎妻葉氏王志昻妻周氏朱門振妻王氏王堯相妻周氏俞中倫妻王氏鄭一陞妻蘇氏葉文舉妻鄭氏駱日臯妻吳氏王詔之妻葉氏徐一旭妻周氏華作霖妻劉氏徐懋明妻包氏潘自伸妻徐氏龍泉縣元湯煇妻張氏元史本傳會兵亂其家財先已移入山砦夫與姑共守之舅以疾未行張歸任藥膳且以輿自隨既而賊至即命以輿載其舅而已遇賊賊以刃脇之曰從我則生否則死張掠髪整衣請受刃賊未忍殺張懼汚即奪其刃自剚死年二十七季鋭妻何氏元史本傳避兵於邑之繩門巖賊至氏被執欲汚之乃與子榮兒女回娘投崖而死湯婍元史本傳有姿容賊殺其父母以刃脇之婍乞早死因以頭觸刃賊怒斫殺之其妹亦不受辱而死項惠可妻唐氏續文獻通考至正壬辰紅巾㓂亂惠可具舟逺避甫及新林冦奄至氏見事急與其母俱赴水死明季君問妻萬氏草木子守節不再適詠枕上繡梅詩曰灑灑英標别一竒歲寒心事有誰知妾心正欲同貞白枕上慇勤繡一枝瞿端栝蒼彚紀瞿孔良女母卒父再娶生弟槳正綂十一年父卒十四年冦發母亦卒端以宗祀為重擕幼弟避深谷中獲免終身不嫁撫弟克承宗祀葉華妻季氏栝蒼彚紀嘉靖間流賊入冦氏避石馬山被執義不受汚遂投崖而死有司上其事建祠祀之瞿埈妻張氏吳克毅妻張氏葉濵妻徐氏李宗舜妻張氏季良俊妻潘氏國朝項國英妻陳氏龍泉縣志艾年有色順治初方田兵屯邑獲氏求為偶氏即自縊死三日顔色不變吳光國妻陳氏龍泉縣志避亂宜石村聞父母被害哭㡬死冦至懼辱遂自刎祝元孝妻李氏龍泉縣志年二十四避亂南鄉潰兵獲氏欲犯之氏觸墻死王廷奉妻李氏龍泉縣志順治四年夫遭賊所殺李氏枕尸而哭㡬死者再回至母家母令别嫁拔刀自刎而死吳成仁妻季氏葉思義妻瞿氏鄭思學妻陳氏王士駿妻張氏瞿一乾妻葉氏瞿一良妻吳氏姓闕禧妻王氏劉時選妻練氏慶元縣明葉德善妻鮑氏栝蒼彚紀夫殁氏年十九無子誓不再嫁勤織紡以事舅姑家雖替而志愈堅洪武年旌表吳慶妻邱氏栝蒼彚紀夫亡年十八有豪右欲計娶之邱斷髪自誓由是不履限外善事舅姑夀八十終嘉靖間旌吳化妻葉氏萬歴處州府志年十四適吳夫肄業南雍比歸得疾將革因囑曰吾死汝善擇適母徒自苦氏泣曰設不幸當以死殉夫亡哀慟擗踊絶而復甦自經求死家人嚴守之不可得遂絶食七日而殞氏年二十姚信妻吳氏葉𢎞妻余氏姚妻吳氏吳塤妻季氏國朝吳熀妻曽氏題旌冊慶元人年二十五夫亡不二志守節二十六年雍正四年具題奉㫖建坊旌表吳淑姬題旌冊許字葉良英未婚良英卒聞訃往弔誓不肯歸遂奉姑守貞歴三十六年雍正五㫖建年具題奉坊旌表吳公望妻周氏題旌冊名鸞姑年十七歸吳合卺之夕夫忽中惡而卒氏誓不再適姑知其意堅告之曰爾娣有娠倘得男即以嗣爾夫既而果産一男氏撫如己出長又殀僅遺幼孫氏復㫖建撫之守節六十二年雍正八年具題奉坊旌表葉養姑慶元縣志許配吳良彩未合卺良彩死時女年十六赴吳守節父欲奪其志女引刀自刺血濺悶地舅姑知其意堅乃立嗣子家貧饘粥不給日勤組織市梁肉以食舅姑年七十餘而逝吳廷馨妻葉氏慶元縣志年二十一夫亡守節孝事祖姑時山賊竊發祖姑令氏避氏泣曰八十祖姑病篤豈有孫媳逺去之理苐吳氏一塊肉不可蹈不測隨將幼兒寄外祖家賊至氏被執欲犯之氏嚼血噴賊賊怒劈其顱罵不絶口而死知縣鄭國位旌其門曰節烈周貞一妻吳氏處州府續志康熙十四年耿逆䧟城氏子三錫死之氏泣曰兒死於難吾不死必辱遂投繯死賊至氏二目怒張賊懼而退及賊殱闔邑呈詳學道給扁旌奬吳德芳妻楊氏葉廷章妻吳氏雲和縣明徐汪妻王氏栝蒼彚紀年十七夫卒有娠三月生子而家日貧撫之成立徐夀妻梅氏兩浙名賢録年二十二夫亡長子珉二歲次在娠家貧姑諭再適梅以死誓紡織易粟以養姑育子歲凶設三等食養姑以米哺子以麫已則取麩餅充飢二子成立縣表其門劉仁寛妻張氏栝蒼彚紀年二十四夫亡氏念嗣絶鬻奩貲為翁娶姑李氏生叔仁龍嗣賴不絶守節以至白首督學分巡二道表其門王漢妻陳氏栝蒼彚紀年二十五夫亡子在襁褓有豪右悦其姿欲謀為妻氏以死自誓孀居五十餘年葉貞女兩浙名賢録名潔葉鳯梧女許字吳伯鳯未嫁而伯鳯卒女誓無變節父母改聘何氏女日夜涕泣及期乃沐浴更衣自經死吳母先一夕夢婦歸及早訃聞即迎柩歸與伯鳯合塟王曰善妻潘氏崇禎處州府志年十八于歸方七日而夫亡姑老前婦遺子幼孝慈備至姑喪殯塟子亡偕媳梅氏撫幼孫以夀終謹按雲和縣志王曰善妻作梅氏與孀姑吳氏同守訓子萬乗教授三衢與此稍異故特拈出又潘氏失載其夫名但云年十八生子萬夀而夫死砥志撫孤媳梅氏亦年十八子死姑媳同撫幼孫閭族嘉其節與崇禎府志所載若符是否一人存以俟考王浥妻吳氏崇禎處州府志年十九夫亡育一子夙有羸疾卒同媳梅氏撫孤孫家貧茹苦氷操凜然湯之龍妻王氏崇禎處州府志年十六于歸甫期夫亡姑令再嫁誓死不二王肇寶妻吳氏崇禎處州府志年二十一夫亡子在襁褓舅命再嫁氏自縊㡬絶子亡偕媳湯氏撫孫卒年七十三陳其藴妻吳氏崇禎處州府志年二十夫亡無子叔伯强其再嫁氏誓無他志以夀終王授妻柳氏舊浙江通志年二十一夫死子在襁褓叔廹之改節氏堅志不渝敎子一綸官學訓夀九十四終吳秉達妻王氏雲和縣志年二十五夫死二子尚幼遺腹又生一子氷霜矢志勤紡績以撫二子守節五十年吳一蛟妻柳氏雲和縣志年二十二夫死孀居七十載不妄言笑不出户庭顧仕玘妻鄭氏吳閏照妻陳氏顧以清妻魏氏鄭湘妻林氏王存許妻梅氏李仕貴妻潘氏李仕賢妻王氏湯崇訓妻徐氏徐有遇妻王氏吳秉和妻徐氏國朝吳擇姑題旌冊受柳繼官聘未婚繼官客死於京擇姑聞訃哀慟決意守貞獨處小樓不下紡績㫖建自給雍正五年具題奉坊旌表劉長華妻朱氏題旌冊年二十四而寡姑老遺孤幼家無婢僕負薪汲水靡不躬親母兄憐其貧勸更適矢志不從養姑一十六載已啜薄糜而奉姑必以甘脆中帬厠牏身自浣滌殁則拮据喪塟教彦曦入泮選貢成均守節四十年雍正十年具題奉㫖建坊旌表徐繼爵妻梅氏處州府志年二十二夫亡長子在褓次子遺腹家貧事姑孝養年饑設三等食上以奉姑次以食子已則饜糟糠而已後二子成立年八十終王氏二節雲和縣志潘氏年十八育子王萬夀甫週夫死砥志撫孤備嘗艱苦子娶媳梅氏年十八子死姑媳同撫幼孫相倚為命王一選妻湯氏雲和縣志年二十五夫死長子曰琨五歲次子曰璇在襁褓氏隻身孀守叔伯㡬經强逼不能奪其志紡績敎子年九十終王曰明妻吳氏鄭秉晌妻王氏宣平縣明蔡儼妻包氏明實録天順八年旌表包氏蔡儼妻賊陶得二作亂鄉民悉移家赴東山巖避之多為所掠包亦被執自度不可脱乃紿曰金珠藏巖穴間可往同取賊信之與俱行至險所罵曰吾本良家女豈汝犬彘偶耶遂墜巖而死姑林氏亦投崖死特表其門曰貞烈陶龕妻鄭氏栝蒼彚紀冦亂夫被害時年二十三訓育遺孤鄉族稱之無間言鮑泰義妻曽氏栝蒼彚紀年十八夫亡家貧舅姑欲令再嫁氏曰甘餓死無靣目從人也遂斷髪撫孤幽居一室日夜紡績事舅姑人以節孝名其居鄭國賓妻戴氏崇禎處州府志年二十三子甫三歲夫亡翁惑於後姑屢逼之嫁不從後擇富室强其必允輿至氏痛哭求自盡遂不能强後翁犯罪禀於官賣婦完贖氏不從官亦不能奪雖困苦萬状而堅貞益勵章元韶妻王氏崇禎處州府志麗水人適元韶於宣平年二十一夫亡子在襁褓姑患癱瘓呻吟床蓐間氏旦夕熨摩供湯藥姑亡産益薄至無以餬口子復夭茹荼以撫孤孫祝士竒妻章氏宣平縣志翁姑早逝夫亦繼殁崇禎未年荒亂慮冦相犯遂沐浴更衣登樓自縊而死鄭季濓妻戴氏王如訓妻俞氏鄭汝登妻王氏景寧縣元潘華妻練氏嘉靖浙江通志歸華僅踰月而華卒遂勵志守節始終不違事聞旌其門潘莘妻陳氏萬歴景寧縣志歸逾月而寡全節不二詔旌之明湯懷恩妻潘氏景寧縣志名淳適湯三載而寡年二十有二遺腹生女撫之足不踰外女長適人盡以産歸其夫之兄弟而無所與正綂末隣境㓂起鄉族倉皇竄避或語之曰萬一有急將奈何淳曰我寡婦豈能隨衆竄匿以取羞耶袖中利刃急則自裁而已聞者韙其言年六十四卒陳驥妻王氏嘉靖浙江通志年二十一驥卒生遺腹子名逹家甚貧日勤紡績事姑撫幼營塟其夫孀居三十九年成化中旌表張處重妻周氏景寜縣志處重以父坐累被逮恐不免以身代徃臨行與氏訣惟以養親撫子為囑時氏年二十餘誓無他志洎聞夫卒於獄深自刻苦奉親敎子人謂其夫婦節孝兩全王麒妻周氏栝蒼彚紀夫客死京師氏年二十二止一子一女子復殀夫之兄弟欲强之再嫁氏欲自經乃止年七十四以夀終潘榆妻毛氏嘉靖浙江通志年二十二夫死無子有豪族聞其賢欲脇其父而娶之氏謂父曰今不從父不免受其毒但女子失身辱及宗黨尤甚有死而已父不敢復言年八十餘終潘氏二節萬歴景寜縣志潘權妻劉氏早寡守節無玷年九十七而終子琡亦早世妻沈氏年十九能繼姑志張維隆妻王氏崇禎處州府志年二十餘夫亡矢志不二撫孤成立卒年七十四陳女慶星景寧縣志許字潘敦佐將婚而卒慶星年十六衰絰執喪以死自誓越明年同日殁遺言願歸潘合塟後墓前草交生如連理毛某妻景寧縣志居毛洋有姿容族豪慕其美夜伺於屋巷侵之遂哭訴於夫自經死潘恩妻朱氏潘簡妻周氏潘敦灝妻毛氏國朝陳桂姑景寧縣志陳浩然女年甫及笄康熙十三年與姊同被冦擄至滴水巖河邊見巖崖峻險呼曰此吾與姊完節處也遂投崖入河而死姊欲從之已為㓂所持矣數日後尸浮水靣衣裳井然不露寸膚葉仁智妻吳氏景寧縣志年二十夫亡一子在襁褓矢志守節其父兄逼之嫁自經死潘學泮妻梅氏景寜縣志名端年二十九而寡撫子敎孫俱列黌序孀居五十餘載其孫媳梁氏亦盛年而寡家貧紡績敎兩子入泮人稱雙節馬雲驥妻劉氏潘學禎妻陳氏梁有鳳妻梅氏浙江通志卷二百十六
