body:
  text: 浙江通志卷二百三十二寺觀七台州府下天台縣國清寺赤城志在縣北一十里舊名天台隋開皇十八年為僧智顗建先是顗修禪於此夢定光告曰寺若成國即清大業中遂改名國清李雍記所謂應運建寺是也唐大中年重建額為柳公權書宋景德二年珍賜甚夥後燬於寇獨顗手題蓮經與西域貝多葉一卷及隋旃檀佛像佛牙僅存建炎二年重新之寺左右有五峯雙澗號四絶之一晏公類要齊州靈巖荆州玉泉潤州棲霞台州國清世稱四絶上有三賢堂錫杖泉香積厨有歌羅大神像寺前有新羅園唐新羅僧悟空所基東南有祥雲峯拾得巖東有清音亭其最髙處有更好堂寺後巖有瀑布循澗而上尤為竒勝天台山方外志元至正間建雨華亭築萬工池明洪武甲子大風雨殿宇摧毁隆慶庚午重建大雄殿嗣燬萬厯乙未重建壬寅賜御經一藏建藏經閣皮日休寄題天台國清寺詩十里松門國清路飯猿臺上菩提樹怪來煙雨落晴天原是海風吹瀑布陸龜蒙寄題天台國清寺詩峯帶樓臺天外立明河色近罘罳濕松間石上定僧寒半夜楢溪水聲急杜荀鶴國清寺詩一到天台寺髙低景旋生共僧巖上坐見客海邊行野色人耕破山根浪打鳴忙時向間處不覺有間情章得象國清寺詩松韻蕭騷十里清入門毛骨冷如氷題詩已有丹青筆悟法應多黑白僧風雨只疑雙澗瀑星辰長認上方燈來遊不是忘機客誰到雲峯第一層釋德榮題國清寺詩竹院深深近翠微短簾容易掩斜暉香殘瓦鼎僧初定月上松巢鶴未歸落澗只供煎茗水飛雲留伴坐禪衣客遊正值春將半風落桃花片片飛國朝康熙十八年修雍正十一年奉敕動帑鼎建十二年御書華嚴淨域四字扁額闡法寺天台山方外志在縣南五里普黎護將軍劉元捨宅建名建平舊傳元因遇雨感金錢之異建寺原在縣南一十步後有鴿子和尚徙今地號鴿子道場寺側有靈龜峯又有綴石坡陀迤邐草木蒙茂左右溪流縈帶民居皆樹桃花熙春彌望如綺錯焉宋祥符元年改今額紹定四年縣令潘普孫篆額明洪武初廢後許原平捐金助建善興寺台州府志在縣東北六十里舊名華頂圓覺道場普天福元年僧德韶建僧智顗嘗晏坐於此有降魔塔伏虎壇鬼疊石白雲先生室井泉先生居又傳有葛元茶圃王羲之墨池宋治平三年改今額明洪武四年燬僧宗濟重興隆慶中又燬復新之禪林寺台州府志在縣西南一十五里舊名龍山集雲院僧智顗建唐天寶六年改龍山為始豐宋乾德二年改龍山崇修大中祥符元年改今額石橋寺台州府志在縣北五十里相傳五百應真之境宋建中靖國元年建後燬紹興四年重建有觀音應真閣今有上下方廣寺國朝康熙十七年有范若鑄者祝髮名體𢎞傾資重修更建大悲閣大慈寺赤城志在縣北二十九里陳時為僧智顗建蓋顗思修初地及定光受記銀地之所直寺門巽隅號佛壠顗第二宴坐處隋創國清乃更寺為道場宋大中祥符元年改今額其法堂曰淨名以顗嘗講是經故也寺有顗所供普賢及手書陀羅尼經隋朝所賜寶冠尚存有潄玉亭又有虞世南所書華嚴經紹興中為秦檜取去鴻爪集唐梁肅撰碑尚在天台縣志明洪武十七年寺為風雨所壞僧德興重建葉清臣大慈寺詩佛壠光沉茂草平林間猶作誦經聲一心三觀休分别秋靜山髙海月明洪適遊大慈寺詩振䇿快秋晴伽藍倚翠屏看雲不留瞬對竹已忘形銀地傳千載虹橋拱百靈至今鐘磬響如講淨名經天封寺嘉靖浙江通志在縣北五十里天台山方外志陳大建七年僧智顗建初顗入山見一老父告云師卜菴遇盤石可止其後果如所告遂結廬焉因自號靈墟蓋第五思修地其注涅槃經處號智者嶺中有卓錫泉北望一峯摩雲即華頂也隋開皇五年賜號靈墟道場漢乾祐中改智者院宋治平三年改今額舊有瑞雲閣萬年報恩光孝寺天台縣志在縣西北六十里赤城志唐太和七年僧普岸建初普興寧中僧曇猷憩此四顧八峯回抱雙澗合流以為真福田也遂經始焉唐大中年號鎮國平田梁龍德中改福田宋雍熙二年改夀昌建中靖國初火崇寧三年重建號天寧萬夀紹興九年改報恩光孝先是太平天禧中纍賜袾衣寶蓋及御袍履諸珍玩甚衆有親到堂妙蓮閣覽衆亭淳熙十四年日本國僧榮西建三門西廡仍開大池香積有釜極深廣世傳暗提首那尊者所鑄東南十里有嶺曰羅漢巨杉偃蹇潔之大百圍凡供五百大士必於是邀請云天台縣志明萬厯十五年李太后賜藏經知縣毛鶴騰建藏經閣張舜民題萬年寺詩休論雪竇與雲峯且看天台劍戟叢萬水千山來閣上一花六葉見池中誰將色界填空界不離香風席祖風有底妙蓮談不盡却成賦筆與興公陳知柔萬年寺詩古寺來投宿雲巖第幾層有詩堪供佛無事且依僧小閣泉喧枕修廊雨暗燈好峯看未足幽夢幾回登洪適雨中宿萬年寺詩夢回深夜耿秋燈泉竇爭流一味清過雁不聞天外影寒松長送枕邊聲叨風可但久無賴急雨那能便寢行已問瓊臺雙闕路此心何必羡層城國朝順治初燬僧無礙重興翠屏寺台州府志在縣西南三十五里唐乾符二年建先是吳赤烏中有周禪師居此以山如屏峙名翠屏菴宋治平三年改淨安院今為翠屏寺趙師秀翠屏寺詩石巖看不見翠色自重重春雨生松葉山風響鐵鐘碑頑工廢墨草嫩緑添茸住院吳僧老相迎憶舊逢慈雲寺赤城志在縣西北三十五里舊名安國雲居院普天福五年建蓋僧德韶第二道場宋大中祥符元年改今額隆興初併入護國今復興有雙松亭天台山方外志寺廢明萬厯間僧真清與弟子如惺重新之朝公為遊慈雲寺詩雲間龍躩千尋幹地底雷奔萬仞泉寄與廬山舊遊客此中端不減棲賢白巖寺天台縣志在縣西北十四都宋末僧普耀初憩此地有神江白郎告曰此吾居也以師德業尊廣願推此室相奉遂呼白巖隋大業中僧純陀徙平地五十步唐貞觀十年賜號白巖寺會昌中廢咸通二年重建宋大中祥符六年改賜妙智寺今復為白巖舊有列秀亭王羲之墨池髙明寺台州府志在縣東北十一都按舊經本名髙明唐天祐七年建今考錢氏所藏遺墨乃清泰三年號智者幽溪道場今殿前有石經幢刻云天福二年捨入幽溪禪院可驗也宋大中祥符元年改淨名不知何時復今額故老相傳謂先此惟喬木參天薜蘿翳坎麚麏是居樵牧罕至智者大師時居佛隴講淨名經忽經為風飄翩翩不下乃杖錫披荆尋經所詣行五里許風息而經憩此大師乃即其地以營淨居智者十二剎此其一也明嘉靖間寺廢萬厯中僧傳燈重建內有元雲洞看雲石王範髙明寺詩偶來穿竹徑迤邐叩山名怪石堆成洞幽泉噴作聲看雲僧入定冒雨客偕行一夜曇花發靈根何處生無相寺赤城志在縣西南三十五里舊名瑞龍巖北號戲龍唐咸通二年建時有僧師簡以杖叩卧龍起雨故名逺近勝槩凡十宋大中祥符元年改今額治平中徙今處崇善寺天台山方外志在縣北赤城山下普太元二年建先是興寧中僧曇猷依巖造寺號中巖後多赤蟻徙平地宋大中祥符元年改今額放生池在焉許渾題中巖寺詩蒼蒼松檜陰曉月露西岑素壁秋燈暗紅爐夜火深厨開山鼠散鐘盡隴猿吟行役方如此逢師懶話心謹按舊經作太康初建寺考髙僧傳曇猷興寧中至台嶺若以為太康則至猷已有寺百餘年矣通圓定慧寺天台縣志在縣北十一都周顯德四年建德韶國師第一道場也宋大中祥符元年改淨名院明天啓壬戌僧圓悟重興仍舊額國朝康熙壬戌僧善酇復修寧國寺天台山方外志在縣西四十五里梁普通三年僧智達伐翳結廬每誦經則羣鶴翔空紫雲覆頂故山名紫凝後建寺名棲禪唐會昌中廢大中五年重建宋大中祥符元年改今額天聖四年僧居昱新之明初廢今重建寒巖寺天台山方外志在縣西北寒石山舊名崇福梁開平元年建蓋寒山子棲隱處周顯德中改聖夀昭儀孫氏重新之由明巖北五里而上四山聳秀水流亂山間鏘如環珮院宇周阿並置巖下窗扉軒戶開闔於煙雲紫翠中故南山之標勝者推寒明二巖宋大中祥符三年改福善院今稱寒巖寺洪適題寒巖寺詩峭壁插青𡨕層巖覆化城空中清磬發幽處慧燈明萬瓦是雲氣四簷無雨聲豐干不饒舌此地孰知名許廣大寒巖寺詩幽尋入藤蘿谷轉樵徑少夕陽度逺岑鐘聲出林杪陰風吹空壑招提極深窅中有茹芝人𡨕搜事幽討揮手謝時人髙蹈羣峯表石床思舊遊春林忽啼鳥夜來山雨多岧嶤落清曉明巖寺赤城志在縣西北明巖五代時僧全宰棲焉入門兩石夾峙號石門前對幽石橫敞飛閣巖竇嵌空堂宇半居其下大槩如寒石山台州府志宋大中祥符元年改為大梵今復為明巖慈聖寺天台縣志在縣西北十五都舊名迹聖宋治平三年改今額後圯國朝順治八年庠生陳必逢捐香燈田重建淨慧寺赤城志在縣西九十里舊名寶慈唐乾化元年僧景瑫建蓋天台十八剎之一也舊為隋髙僧飛錫處及是瑫卓菴已而造寺燃柏香密禱以煙至處為址焉宋大中祥符元年改今額台州府志舊傳葛元嘗植蘆數本故今寺前有蘆峯廣嚴寺台州府志在縣西五十里舊名長隴唐光啓三年建凡三徙至今地宋治平元年改今額舊傳寺鑄鐘久不就有老嫗投一錢於冶中鐘即成而錢宛然號貧婆鐘有懷容羅漢真身在焉真覺寺台州府志在縣北二十三里隋開皇十七年建僧智顗瘞焉龕前置雙石塔號定慧真身塔院宋大中祥符元年改今額九明寺台州府志在縣東北三十里漢乾祐二年建僧智顗宴坐九折道場普門寺台州府志在縣西南七十里漢乾祐三年建宋祥符元年改福應僧德韶第六道場今復為普門天宫寺台州府志在縣西三十里舊名旃檀瑞像院吳越時僧德韶建號第十一道場宋乾符元年改今額開巖寺台州府志在縣西南四十里梁普通三年建初有異僧璧開此巖六瑞繽紛如雪賜額曰天花尊者開巖院宋祥符元年改鎮國院明洪武中廢重建名開巖普光寺台州府志在縣西北三十里僧德韶第十三道場舊名大覺普光塔院宋祥符元年改慧覺後復為普光清心寺台州府志在縣東十里山名招隱下有石泓如釜昔智顗放螺溪中舊號螺溪院宋治平三年改今額金地菴台州府志縣西二十五里石晉開運三年建梁大同初僧定光卓菴居之巽峯有枯石數片屹然林莽間謂之招手石語云定光金地遙招手智者江陵暗點頭今廢宿佛寺台州府志在四顧坪明正德間佛樹禪師裝五百聖僧像萬厯間僧理殊新之司寇王宗沐題曰宿佛桐柏崇道觀天台山志在縣北二十五里赤城志舊名桐柏觀唐景雲二年為司馬承禎建台州府志曰環有九峯曰玉女卧龍紫霄翠微玉泉蓮花青琳香林玉霄自福聖觀北盤折而上及至洞門長松夾道吳赤烏二年葛元即此煉丹有朝斗壇洎承禎建堂有雲五色因禁封內四十里無得樵採又傳承禎所居黃雲常覆其上故有黃雲堂崔尚桐柏觀碑記桐柏山髙萬八千丈周回八百里中有洞天號曰金庭宫即右弼王子普之所處也古觀荒廢久矣故老相傳云昔葛仙翁始居此地而後有道之士往往因之壇址五六厥迹猶在洎乎我唐有司馬錬師居焉景雲中天子布命於下新作桐柏觀其髙居八重之一俯臨千仞之餘背隂向陽審曲面勢東西數百步南北亦如之連山皆碧茂樹常青大巖之前橫嶺之上雙峯如闕中天豁開長澗南瀉諸泉合潄一道瀑布百丈懸流仙花靈草春秋互發幽鳥青猿晨夜合響總括奧祕鬱為秀絶非天神與仙宅其孰能致斯哉然後為虛室以鑿戶起層臺而纍土經之殖殖成之翼翼花散金地香通元極真侣好道是遊斯息微我錬師孰能興之朝散大夫