擾常護左右居人瞻仰罔知名號檀越章鐸躬訪靈蹤深加諦信遂崇法宇以廣金田唐乾符三載丙寅締建既圓誠請於上以峯名為額星霜暗易緇流屢更神宗太平興國八年本縣傳法僧義修持邑宰之命恭召金華山智者寺重禮上人主領之上人餘杭人也潔白僧行檀信親附於是重建法堂次崇厨庫髙大其門嚴淨其室至道元年乙未始就復有邑信士胡細厲就同誓淨緣營立釋迦尊殿咸平五年壬寅告畢輪奐相宣金碧交映大中祥符元年詔改院為法輪院善矣哉郡邑改觀道俗增信植福之地垂於無窮者也靈嶽寺東陽縣志在縣南十八里梁大同二年建寺有尊勝寶塔一座內刻諸品經文國朝順治間僧仁陛請龍藏真經入寺康熙十七年重修禪林院東陽縣志在縣東東白山中唐太和六年建曰教院宋宣和中燬建炎二年稠公大師重建張志逺重建大殿記襟山帶水岧嶤衍迤修竹茂林折柏病檜髙森映蔽三伏之間不知有炎蒸氣殆非人世間所有也國朝順治間僧衆重建法堂元寶觀萬厯金華府志在縣南四十里齊中興二年邑人陳元寶捨宅建宋天禧間改今名東陽縣志紹興四年元寶之裔嚴重建徐端益元寶觀碑記宣和庚子冬賊發婺之清溪東陽之民部其民以自保者凡三四嚴之所保其一也嚴婦之父張煒避寇入山遇神人曰往語爾壻必欲破賊宜新所謂北極殿者嚴聞亟部所轄詣廢殿命黃冠誓師如神戒未幾大破賊賊平乃鳩工集材而成之肇作於紹興甲寅之冬而落成於乙卯之春棟楹隆壯甓瓦精密丹雘既新象塑咸設燦然一新良未易也乾元宫金華府志在縣西二里宋紹興二十五年建義烏縣寶林禪寺嘉靖浙江通志在雲黃山下古殿傑閣甲於東州名勝志蕭梁時邑有傅大士少以漁為業嵩頭陀語之曰爾彌勒化身也因令鑑於水乃悟前因問以修道地方頭陀指松山雙檮木曰此可矣遂於此行法忽有黃雲如蓋盤旋其上後人因名松山曰雲黃山事聞於朝大通三年敕建寺於雙檮間即今雙林寺也金華府志宋治平二年賜今額宣和三年燬紹興四年東陽賈廷佐首為鑄鐘建藏殿住僧行標以來六傳次第復完潘良貴重修寶林寺記有大比邱其名行標號曰慧炬拄錫雲黃山大開法席遍召檀那而告之曰永惟大士誕育此方為瑞為祥人天共仰雙檮建寺甲於叢林自梁迄今逾六百載流通祖道代不乏人宣和三年盜起新定不幸煨燼一椽不存今歷嵗時堂廡齋厨粗成行列獨兹殿址瓦礫弗治妙相慈容久無所宅爾等善士忍坐眠耶衆聞標語歡喜踴躍大出金錢合而計之餘五十萬以紹興二年春經始三年冬告成中妥像設莊嚴妙好外繚闌楯雄麗靚深山林增輝緇衲雲集變荆榛為金碧古未有成結大緣如是之速者也故記之以稔來者楊傑寶林寺詩山路﨑嶇山頂平兜羅雲向下方生了知大士夢中夢要去如來行處行明末燬國朝康熙七年重建智度教寺萬厯金華府志在縣西四十里唐智忍禪師修行之地大順二年僧彥休過此建院曰卧雲吳越錢元懿為婺州刺史建殿落成五色雲見因名五雲宋大中祥符間賜額智度院後改寺國朝雍正四年僧逺瞍重建大殿廊舍隆平教寺金華府志在縣東二十里後唐長興間建舊名保寧宋大中祥符間賜額喬行簡書敕賜隆平寺崇禎義烏縣志尋廢明永樂四年里人吳彥清重修今為教寺聖夀禪寺萬厯金華府志在縣西四十里舊名龍夀宋治平間賜額後廢元至正元年重建黃溍聖夀寺碑記聖夀禪寺宋大觀間更為十方禪寺嵗久弗葺敗屋數楹不蔽風雨泰定二年秋千巖禪師來自錢塘愛其岡巒秀潤泉清水深始度隙地結茅而駐錫焉緇素之侣嚮風坌集座下者恆數千百人至無以容其居給其食僧法聰德超慨然出山叩諸有力而好事者合衆緣以成之規制之廣視昔有加禪師為而不有擇禪林中德行完潔者俾之主持承其付託者亦能負荷而無所係吝不久輒謝事而退自懷空成公逮今繼公已七傳矣繼謂豫曰在吾教中聚沙積土無非佛事法施財施寧有差别請為我並志之因托其所述而悉著之使刻石焉洪武間重修來山寺義烏縣志在縣西南二十八都名勝志梁天監中西域嵩頭陀自香山南行至金山江水大溢舟師莫肯載師布繖水上持鐵魚磬截流而濟至來山立精舍曰來山寺華陽教寺崇禎義烏縣志在縣東華陽山唐法輪大師卓菴之地舊名永安洪武二十四年改今額元真道院義烏縣志縣南青巖山中元至正初里人俞士亨建永康縣上封寺萬厯金華府志在縣東北百步舊名光義晉天福間建元至元初燬僧景傳重建永康縣志萬厯十年廢徐宗祥輸價仍捨為寺大通寺永康縣志在縣東北六十里舊名翠峯梁大同四年建金華府志宋大中祥符元年改今額金仙寺永康縣志在縣東一百一十里舊名仙山唐咸通二年建地名鹿蔥金華府志宋治平二年改額後燬明洪武初重建澄心寺金華府志縣東北四十五里唐光啓間建名九泄宋大中祥符元年改額明洪武間重建延慶寺萬厯金華府志在縣西北四十里舊名金峯唐天祐間建宋大中祥符元年更名延慶普濟寺永康縣志在縣西北四十五里舊名清泉吳越寶大元年建地名柳村萬厯金華府志宋治平二年改今額咸淳間重建延真觀嘉靖浙江通志在縣東南舊名寶林金華府志梁大同元年建宋大中祥符間改今額續神仙傳道士馬自然至觀前指松樹曰此松已三千年矣當化為石至夕大風雨其松果化近觀松皆化為石嘉泰間立亭於旁名松石元至正間復建紫霄觀永康縣志在縣東三十里舊名招仙梁大同二年建宋大中祥符元年易今名地名芝英胡則紫霄觀詩綺霄重疊武陵溪鷲嶺相將路不迷白石洞中人乍到碧桃花下馬頻嘶深傾玉液琴聲細旋煮胡麻月色低猶恨此身間未得好同劉阮灌芝畦武義縣法雲教寺嘉靖武義縣在縣西一里宋大中祥符元年建惠安禪寺萬厯金華府志在縣東一十五里舊名明招其地乃晉阮孚故宅嘉靖武義縣志宋建炎南渡呂氏自太師而下皆葬明招山後請為功德院額曰元淨惠安慈尊禪寺嘉靖武義縣志在縣東北二十里舊名東臺宋開寶元年建大中祥符二年改今名金華府志寺有五景捫星閣凝氷池潄玉澗埋雲塢長青松今名山坑寺唐愈賢慈尊寺詩野寺山深五月秋杜鵑啼雨隔煙樓三年浪迹空衢路慚愧僧房半日留沈杰慈尊寺詩細雨霏霏點落花白雲勾引到僧家導師知我三衢主不問姓名先煮茶中峯教寺武義縣志在縣北二里宋宗丞趙汝吟建金華府志元至正六年改今名無礙寺武義縣志在縣西二十五里周顯德五年建元泰定二年修明隆慶元年重建乾光霽無礙寺詩雨霽苔痕濕未乾滿階春草翠雲團長吟自愛禪居靜梵殿月來松影寒南龍華寺金華府志在一都南山明成化十一年建萬厯二十年重修廣福觀嘉靖浙江通志在縣西三十里宋治平中賜名夀聖尋改今名浦江縣左溪講寺萬厯金華府志在縣東二十三里舊名普安院唐左溪大師法朗道場也宋開寶間更新請額曰雙溪浦江縣志明洪武二十四年改今額歸併各寺為叢林大智教寺崇禎浦江縣志在縣北二里舊名淨居尼寺宋崇寧四年更為僧寺治平二年改今名浦江縣志明萬厯三十一年移建小東門外國朝康熙六年重建大殿龍德教寺嘉靖浙江通志在龍峯山下宋寧宗御書額金華府志舊名乾元創始無考元大德間重建有塔在龍峯山上明洪武十三年修宋濓重建龍德大殿碑記龍德寺法瓌禪師道場初名乾元宋大中祥符元年更今名嘉定中寧宗親書寺額以賜之寺無碑碣可徴不知何時建立但乾元乃唐肅宗紀年以年名寺其殆或肇於唐歟寺廢將圯元大德九年住持僧善興悉撤其舊而新之元末燬寺之二比丘至德守約乃合謀曰前人之功不可不繼也而力未能遍及宜先其大者以為衆倡於是絀衣縮食重創大雄殿五楹經始於洪武九年之六月落成於十三年之三月後廢萬厯十七年重建明德教寺崇禎浦江縣志在縣西四十五里其緣起不可考宋治平二年改今額明洪武二十四年歸併各寺僧立成叢林白佛寺金華府志在縣南一里宋乾德元年建舊名慈相教院聖昌教寺浦江縣志在縣南四里舊名唐昌尼寺宋大觀二年更為僧寺治平二年改今額元至正四年僧紹隆重建保安教寺崇禎浦江縣志在縣南八里晉天福八年縣人倪盈捨地建號曰保安宋治平二年更名淨慧院延祐六年僧一雲重建明洪武二十四年更今名官巖教寺宋濓官巖院碑記在縣東南康侯山又曰官巖山梁大同間比邱尼元淨始建院唐會昌之季燬咸通初祖燈大師自越之上虞飛錫而來遂縛禪巖內會嵗旱獨上絶頂祈請捐身投巖下而卒俄頃大雨火化得五色舍利民感之就巖之西為建今院八年丁亥因山賜額為官巖云浦江縣志宋景定三年妙定大師智印重建太極宫萬厯金華府志在縣東南宋嘉定間建元至大間重修張孟兼太極宫記浦江縣治東南不百步有宫曰太極宋嘉定乙亥間知縣錫山尤君曅以邑祝釐請禱之事逺詣廣福觀觀在仙華山下去縣十餘里許非便謀創此宫前建三清殿後敞層閣以祀星君廊廡翼如重門外闢觀者欣豫莫不起敬遂聞於朝徙仙華舊額揭焉至正戊戌宫燬道士王無為乃銖纍寸積明年建三清殿又明年建門臺亡何仙去其徒王洞觀圖終先志復建東西廡既而庖庫諸室皆成凡其教之所宜有者嚴奉靡不如式飛甍偉棟金碧交輝視舊蓋有加矣金華府志明崇禎九年燬知縣吳應台建國朝康熙十年知縣毛文野重修湯溪縣九峯教寺金華府志在縣南九峯山下梁天監間嵩頭陀卓錫於此寺有三賢堂祀龍丘萇徐伯貞徐安珍無垢寺湯溪縣志在縣東南三十里有石巖因為佛殿唐乾符三年建延興教寺湯溪縣志在縣西二十里梁天監二年建證果禪寺萬厯金華府志在縣西北十五里梁天監間達摩禪師開基唐貞觀元年建元至正間寺僧處仁重建有僧鑿井於佛殿東角二十步深三十尺得古銅鉢盂上有覺地二字因以名其室寺有宋濓書額尚在胡宗證果寺詩永安山水古叢林破衲傳來幾代深滿地白雲離俗迹半庭黃葉伴僧吟簷頭鳥雀窺香飯潭下魚龍聽梵音莫道空門忘百慮九年面壁亦留心西竺教菴湯溪縣志在縣西十里元延祐二年建宋約西竺菴詩名傳西竺古招提幾度來遊駐馬蹄窗外清風千個竹門前流水一灣溪長廊晝靜無人到古塔年深有鶴棲入定老僧應已久袈裟恐涴燕巢泥寶興寺金華府志在縣北十三里元大德間僧仁夀重建吳師道有碑記治平寺金華府志在縣南八里前有一峯峻立名卓天峯明宣德間建崇仙宮萬厯金華府志在縣西十里梁大同二年蘇府君建招接十方仙道之所道士鄷去奢來居未幾去處於茅山得道上升宋約崇仙宫詩白雲滿地護蒼苔路杳玄關少客來仙去已無丹竈在壇空惟有碧桃開石間寶劍飛應久天上飈輪去不回安得借騎珠樹鶴相尋我亦到蓬萊浙江通志卷二百三十二
