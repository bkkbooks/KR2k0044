body:
  text: 浙江通志卷十二山川四湖州府烏程歸安二縣附郭苕溪太平寰宇記在烏程縣南五十歩大溪是也以其兩㟁多生蘆葦故曰苕溪𢎞治湖州府志在城西其源有二一發自天目山之隂金石鄉東至安吉縣治南之邵渡又北至邱渡一發自獨松嶺西聚衆山之水并浮玉山水折旋亦至邱渡二源合而至於郡城之西一流入清源門内至江子滙為霅水一流從清源門外徑趨釣魚灣沿濠至臨湖門外合霅水入於太湖戴表元苕溪詩六月苕溪路人看似若耶漁罾挂棕樹酒舫出荷花碧水千塍共青山一道斜人間無限事不厭是桑麻餘不溪𢎞治湖州府志出天目山之陽經臨安縣又經餘杭縣至安溪奉口經德清縣折而東北至敢山過菱湖及湖趺漾又西北㑹前溪水至峴山漾入定安門至江子滙為苕溪前溪𢎞治湖州府志在武康縣南出銅峴山東流四十九里至武康縣前千秋橋名前溪一名餘英溪按餘英志云春夏之交夾㟁花開落英滿溪故也其滙東至縣學前分為二派其一北流經黄隴山之東至沙村號沙溪與德清縣北流水合入郡之定安門經前溪滙為霅溪其一東流經下渚湖之南㑹於餘不溪武康縣後又有一溪亦出自銅峴山謂之後溪北流水𢎞治湖州府志在德清縣前其水從餘不溪至縣東分派折入清河橋下北流不沙村與武康前溪水合又北至峴山漾與餘不溪合入定安門至江子滙為霅溪霅溪太平寰宇記在烏程縣東南一里凡四水合為一溪自浮玉山曰苕溪自銅峴山曰前溪自天目山曰餘不溪自德清縣前北流至州南興國寺前曰霅溪東北流四十里合太湖顧長生三吳土地記云有霅溪水至深者徐陵孝義寺碑云清霅濔濔深窮地根按字書云霅者四水激射之聲也輿地紀勝自清源門入曰苕溪其流濁自定安門入曰霅溪其流清𢎞治湖州府志即定安門内江子滙是也其源從南来者曰餘不溪曰前溪曰北流水三水㑹於峴山漾而入定安門從西来者曰苕溪自清源門而入四水總聚於江子滙霅然有聲故謂之霅溪又謂之霅川梅堯臣㳺霅溪詩共愛霅溪風物美春来清可鑑鬚眉蘋生楚客將歸日花暖吳蠶始浴時臨水竹樓通市陌跨橋雲屋接川湄畵船載酒期君醉已是無謀任翦夷秦觀霅上感懷詩七年三過白蘋洲長與諸豪載酒遊舊事欲尋何處問雨荷風蓼不勝秋周紫芝苕霅舟中詩雲暗千家雨寒生兩㟁秋水翻波入戸人靚玉明樓山色遮愁眼荷香滿客舟水晶宮裏客還作此生逰白蘋洲太平寰宇記在霅溪之東南去州一里梁太守桞惲詩云汀洲採白蘋日暮江南春因以為名漕瀆萬歴湖州府志即儀鳯橋下水晉咸和中都督郗鑒開貴溪浦太平寰宇記在霅溪西南㟁梁時有蘇氏女於此遇一道士曰汝後大貴三年當有徴蘇氏後適章氏生陳髙祖宣后髙祖即位拜后母為安吉縣君因名蘇公潭太平寰宇記從貴溪東流三百五十步至駱駝橋下曰蘇公潭此水深不可測中有蛟螭代為人患唐開元初許國公蘇瓌子頲為烏程縣尉郡守命督縣事因誤墜此直至潭底聞水中有人語曰扶尚書出遂冉冉至水上畧無損溺有記見在芙蓉池𢎞治湖州府志在郡城白蘋洲楊漢公所開池中有千葉蓮烏程侯井萬歴湖州府志在府西吴孫皓為侯時所鑿烏程縣城外山川峴山𢎞治湖州府志在縣南五里舊志云夲名顯山唐以廟諱改焉上有李適之石樽山頂有塔今廢惟峴山寺僧宗義立菴居於其巓幽絶可愛萬歴湖州府志山之首見者曰峴兹山首見於郭南厥名允恊上有三賢祠祀顔眞卿蘇軾王十朋蘇軾遊峴山詩苕水如漢水鱗鱗鴨頭青吳興勝㐮陽萬瓦浮青冥我非羊叔子媿此峴山亭悲傷意所同歲月如流星湛軰何足道當以德自銘鄭明選峴山宴陳太常詩七月峴山天氣凉風髙乍雨湖茫茫輕舟出浪若飛馬巨石滿岡如聚羊斗酒未覺主人薄髙歌正宜秋日長窪樽遺跡至今在不見昔賢空斷腸道塲山𢎞治湖州府志在縣南十二里昔如訥和尚經此山遂畱建寺山頂有塔下有伏虎巖瑤席池其山峰巒秀鬱水石森爽殊為吳興佳絶古今遊覽者皆萃焉朱彧可談湖州道塲山有老僧言山在州南離方文筆山也低於他州故未有魁天下者乃丐縁即山背建浮屠望之如卓一筆既成語州人曰三十年出狀元後大觀賈安宅政和莫儔相繼為廷試魁蘇軾游道塲山何山詩道塲山頂何山麓上徹雲峰下幽谷我從山水窟中来尚愛此山看不足陂湖行盡白漫漫青山忽作龍蛇蟠山髙無風松自響誤認石齒號驚湍山僧不放山泉出屋底清池照瑤席堦前合抱香入雲月裏仙人親手植出山回望翠雲鬟碧瓦朱甍縹緲間白水田頭問行路小溪深處是何山髙人讀書夜逹旦至今山鶴鳴夜半我今廢學不歸山山中對酒空三嘆仇遠游道塲山詩山行龜背路羊腸伏虎禪師古道塲老木隂中安御座白雲堆裏撫僧床勺泉青徹涵秋味尖塔孤撑界夕陽笑月亭空人影散松風和雨動天簧錢山烏程縣志在縣南十四里從衡山北出爲錢山黄溍登錢山望菰城詩吳興水爲州諸山若浮萍況此一培塿𤨏屑世未名所欣漁樵居乃與緇鍚幷種竹有萬竿結茅無十楹老僧解人意縱履能相迎芳草被行徑朱藤按巖扄蕭條空堦暮日照莓苔青猶嫌所歴卑未極遊眺情聳身白雲上始見春申城想當高㑹時樓觀飛青㝠竭海薦罍勺窮山羞鼎鉶安知千載後寂寞無人行煌煌冠葢區攘攘狐兎塋歸来朱門客聽此松風聲車葢山吳興掌故在縣南七里形如車葢金葢山太平寰宇記在縣南十里晉何楷居此修儒業後爲吳興太守改山爲何山𢎞治湖州府志山與道塲相接最爲郡中諸山之勝遊者必以二山爲甲然道塲之勝在山巔何山之勝在山下故東坡詩有道塲山頂何山麓之句澄懷錄汪藻何氏書堂記云遊道塲山者如入王侯之家其隆樓傑閣足以吞光景而納江湖已而過何山則草樹葱蒨軒窗窈窕經行之地皆雅潔幽深如造髙人隠士之廬至者忘歸不知雄盛移而爲清勝也石柱記箋釋何山與道塲連接爲北一支金葢山是南一支汪藻記云東有道塲西有何山金葢固在道塲之東南自不容混宇文公諒何山賦環苕陽之諸山蔚金葢兮深秀緑靡靡兮旁圍青遙遙而横袤擅竒勝於覽觀紛應接於左右晉賢何楷於焉讀書爰守是邦以游以娛山因之以得姓人已徃而遺居是猶墩之有謝溪之有冉者乎觀其修林蔽日羣峭摩天表金峯以前拱擁青塢而旁連步錦障兮雲麓聆琴筑兮澗泉是雖地設實出天然靈祗獻瑞梵宇扄禪閣流丹兮鳯翥瓦浮碧兮鴛連華鯨鏗以響逸清磬發而聲圎挂元猿於蘿磴棲白鶴於松烟若乃峯廻路轉繡錯綺縮道塲之勝境實相屬仰徹兮雲峯俯窺兮幽谷羅幡幢兮杳靄韵檐鈴兮斷續巖花兮紛紅澗草兮駭緑信造化之鍾秀實吳興之所獨蘇舜欽游霅上何山詩今古何山是勝遊亂峯縈轉繞滄洲雲含老樹明還滅石礙飛泉咽復流徧嶺烟霞迷俗客一溪風雨送歸舟自嗟塵土先衰老底事孤僧亦白頭仇遠何山詩溪轉峯廻一徑平田頭白水照人清寺因何氏封山姓客把坡詩證地名蘿月長随行道影杉風猶帶讀書聲雲津橋下潺湲急僧濯袈裟客濯纓軻山吳興掌故在縣南十四里金葢北出小支金葢如車而軻附其旁也衡山左傳楚子重伐吳克鳩兹至於衡山杜預注曰在烏程南衡古横字通用吳越春秋壽夢十六年楚恭王怨吳爲巫臣伐之也乃舉兵伐吳至衡山而還石柱記箋釋吳興志一名横山在縣南一十八里兩山夾峙中流北駛爲郡南形勝之地鮑山萬歴湖州府志在縣南九里黄蘗山太平寰宇記在縣西南三十五里葛仙山萬歴湖州府志在縣南五十里職方圖志云葛洪煉丹處天下十有三烏程居其一菁山黄溍菁山普明寺記由湖郡城南渡溪舟行四十五里登陸又二里許是爲菁山泉清水深峰巒峭㧞巖壑鬱紆最爲勝處名勝志其上生黄菁故名張羽菁山石梯閣夜坐詩每逢晦日驚春盡爲俯高窗對夜分獨鶴夢酬西崦樹老僧定入上方雲泉聲落澗空中辨花氣穿林暗裏聞莫道暫時畱愛賞移家終擬避塵氛吳疁山晏公類要在縣西南六十六里吳興記曰疁燒山爲田故名太平山烏程縣志在縣西南五十一里馬鞍山萬厯湖州府志在縣西南七十里與武康接界銅山萬歴湖州府志在縣西南九十五里一名銅峴山吳採鄣山之銅於此西隸安吉南武康莫干山嘉靖浙江通志在縣西南一百五十里上有鑄劍池水常清澈旁有磨劍石世傳吳王鑄劍於此取莫邪干將之義以名棲賢山萬歴湖州府志在縣西二十二里舊傳有高士曾隱此西塞山經鋤堂雜志吳興南門二十餘里下菰菁山之間一帶遠山爲西塞山山明水秀眞是絶境皮日休西塞山詩白綸巾下髪如絲靜倚楓根坐釣磯中婦桑村挑葉去小兒沙市賣蓑歸雨来蓴莱流船滑春後鱸魚墜釣肥西塞山前終日客隔波相羨盡依依杼山名勝志杼山髙三百尺週一千二百步陸羽記云夏后杼廵狩之所亦名稽畱山僧皎然有杼山禪居寄吳處士筠詩九乳山晏公類要在縣西南三十里張元之山墟名云山有九峰狀如乳石城山太平寰宇記在縣西南三十里張元之吳興山墟名云昔烏程豪族嚴白虎於山下壘石爲城與呂䝉戰所今山上弩臺烽火樓之跡猶在夾山名勝志在縣城西南十里下有夾山漾小敷山吳興掌故在縣西南二十里談志名福山唐人沈下賢亞之居此戴表元小敷山記敷山匝於吳興十有餘里山中卷外截水罄折行平原茂樾間左右之徐山杼山挾敷山而蹲敷山之前蒼峭再連圭起簴伏望而知爲美壤也謹按唐杜牧弔沈亞之詩一夕小敷山下夢水如環珮月如襟即此法華山石柱記箋釋吳興志太平寰宇記謂之石斗山王羲之所游處梁尼道蹟號總持得法於達摩晝夜誦法華經後歸寂即葬其處蘇軾游法華山詩具區吞滅三州界浩浩湯湯納千派從來不着萬斛船一葦漁舟恣奔快仙壇古洞不可到空聼餘瀾鳴淜湃今朝偶上法華巔縱觀始覺人寰隘山頭卧碣弔古塚下有至人僵不壞空餘白棘網秋蟲無復青蓮出幽怪我来徙倚長松下欲掘茯苓親洗曬聞道山中富竒藥往往雲芝雜葵薤詩人空腹待黄精生事只有長柄械今年大熟期一飽食葉微蟲眞癬疥白花半落紫穟香攘臂欲助磨鎌鎩安得山泉變春酒與子一洗尋常債白鶴山太平寰宇記在縣西北二十六里山謙之吳興記云昔烏程人姚紾化爲白鶴游於此山因名𢎞治湖州府志吳興記云山石精好可爲碑版江東記云員邱山石精好不讓吳興即此也吳中白鶴山詩吳興多名山兹峯特竒秀不知自臺開闢隂陽幾昏晝云有赤髭僧窅棲刻蓮漏香儼有在禪室已新構松下伏神龜竹間走饑鼬白鶴不受招仙踪亮難究伊昔屢登臨空翠濕衣袖窮摉不知疲幽討寧嫌逗巖扉與澗戸一一爲重叩和詩寄山靈餘生敢多又西陵山吳興掌故在縣北二十一里吳太子和葬此子皓繼統追尊文皇帝陵曰明陵以其在西名西陵仁王山名勝志在縣西北九里一名鳯皇山其南一小山曰礪山溫山萬歴湖州府志在縣西北三十里山出御荈卞山𢎞治湖州府志在縣西北十八里髙六千尺周處風俗記曰卞山當作冠弁之弁以山形似弁也唐顔眞卿石柱記韋明歇登卞山詩皆作卞字其山西北屬長興縣山有黄龍洞石壁峭立巖竇隂沉莫窮其底旁有黄龍祠祥應宮郡有水旱禱焉蘇東坡有詩刻又有三賢祠其沈家洞避洞亦在焉互見長興太平寰宇記郡國志作卞和採玉處非也周處風俗記云當作冠弁之弁徐陵孝義寺碑云高弁蒼蒼遙聞天語雲林石譜弁山在郡最爲崷崒産石竒巧羅布山間葉少蘊葢堂以就其景故號石林范成大與吳興薛士隆使君游弁山石林先生故居詩白蘋有嘉招蒼弁得勝踐㑹心不憚逺乘興恐失便籃輿犯窮臘共作忍寒面溟濛雲釀雪浩蕩風落雁松篁漸清幽猿鶴或悲怨英英文章公作舍鎻葱蒨嶢峯俯前榮佳木秀諸院窮捜發山骨林立侍談讌西巖踞熊虎東巖峙屏案履綦故彷彿葢瓦已零亂經營三十年成毁一飛電摩挱土花碧小立爲三嘆趙孟頫游弁山詩我欲到斯境歲月良已深今晨爲兹游酬我夙昔心悠悠岡版長慘慘風雲陰微雨廹短日飄然灑衣襟屢欲還吾駕去意復難任消搖得所止林竹自蕭森素琴不須彈山水有清音邈在樊籠外塵想何由侵况懷㝠絶理出此將焉尋他山豈不好聊爾非所欽玲瓏山癸辛雜識在卞山之陰嵌空竒峻畧如錢塘之南屏及靈隱之薌林有洞曰歸雲張謙中有篆書於石梁濶三尺許横繞兩石間名定心石旁有杜牧之題云前湖州府刺史杜牧大中五年八月八日來又紹興癸卯葛曾卿林彦政劉無言莫彦平葉少蘊題名石柱記箋釋石林在卞山之陽宋葉少藴之所居即玲瓏山沈與求游玲瓏山因訪朱氏草堂詩平生丘壑心餘事不掛目藜杖南山來要使富幽矚異哉小玲瓏蟠峙蒼弁腹修藤結懸崖飛溜響空曲伏石卧虎狀騰拏雜奔鹿呀然牙吞吐側路劣容足拂拭古蘚紋字刻翳新綠標榜玲瓏名竒怪殆天屬捫蘿上絶頂坦坦若平陸俯首瞰來蹤穹然在幽谷傳聞昔逋客誅茅此營屋清魂不可招千載想遺躅我思造物巧妙供游人録揮斥役山祇斵此一拳玉雲窗與霧閣一一相亘屬豈無部曲衆猿鶴即更僕豈無節旄貴松檜自張纛此事乆棄置蛛絲網巖麓翩翩佳公子心古韵不俗駕言脫華簪兹焉卜幽築終日面㠝岏世故豈容觸指㸃空洞姿喜氣政堪掬挟杖校昔㳺健步念須續亦有招隱詩薄暮不可讀章良能游玲瓏山詩短鍤長鑱出萬峯鑿開混沌作玲瓏市朝可是無﨑嶮更向山林巧用工賽玲瓏山崇禎烏程縣志去玲瓏二里有三石竅可進入者以燈行一二里即返洞中有泉滴下懸崕繡壁亦竒觀也沈氏抉剔爲之因名沈家洞蜀山吳興掌故在縣東十里高啟送徐賁蜀山幽居詩我因解黻遠辭京君爲修琴暫入城偶爾相逢春酒熟飄然忽去暮烟生山頭學嘯猶聞響世上畱詩不冩名西磵煩詢張靜者年來著易幾爻成西余山太平寰宇記在縣東十八里路史輿地志漢文封東海王搖之子期視爲顧余侯今昇山東有西余山是也孺山太平御覽東遷縣有孺子山徐孺子入吳常登之因以爲名吳興掌故在縣東二十八里漢徐孺子哭友人姚元起於此山下有孺子祠謹按晉書地理志太康八年分烏程立東遷縣至隋開皇九年廢入烏程戴山吳興掌故在縣東北十八里譙郡戴顒遊此三吳太守張邵素與之善爲築室於此因名焉顔魯公癸亭詩旁瞻戴顒路葢指此山也張羽游戴山詩譙國有髙士寄志在絲琴一聞王門召破琴絶其音傳昔居斯山井竈邈難尋至今草木間清風肅虚襟予家依古跡結屋當東林擇里得所安懷賢思難任浮屠巧眩世廟廊冠其岑臺殿紛青紅僅足供登臨誰能構芳宇蘋藻薦所欽相望孺子廟千古同此心徐賁登戴山詩平田𣺌空曠孤岡忽髙峙新松蔭其巓白石繚其趾初登若嶄絶稍上乃如砥嚴風蕩高寒微月中宵起亭亭日晷側肅肅征鴻駛南搖天目雲北覽具區水比來局覊絆遊遨喜兹始同心良可重歡言得佳士非惟外累遺沉憂亦咸委薄暮聊旋歸餘興㑹畱此昇山一名歐餘山太平寰宇記在縣東二十里入東記云晉王羲之常昇此山顧謂賓客曰百年之後誰知王逸少與諸卿遊此乎因有昇山之號歐餘漫錄歐餘即今之昇山楚封越王句踐之後爲此亭侯子孫遂爲歐陽氏詳見文忠公行狀張羽遊昇山詩昇山横道旁秀色佳有餘雖微千仞岡層巒自縈紆右軍晉高士曽此眺郊墟苔徑存遺蹟千載没荒蕪想當登臨日俯仰夌八區放浪形骸外遊目多所娛惜無登高作儷彼蘭亭書我思見其人臨風一踟蹰别鮮山一名烏山𢎞治湖州府志在縣東十三里孤秀不相連屬因名焉爾雅曰小山别大山鮮郭璞注云不相連也唐高士沈聘沈徵居之石柱記箋釋談志昇山一名烏山古烏巾氏所居也今縣東八里有烏山一名别鮮山爾雅䟽云不相連屬者山上有烏亭舊址即今烏巾菴梁吳均同柳吳興烏亭集送柳舍人詩即此山非昇山也毗山吳興掌故在縣東北五里當城北水入太湖突然獨峙吳興之水口也西吳里語山海經云浮玉之山北望具區東望諸毗郭璞注云諸毗水名也續圖經云浮玉在西南毗山在東北與山海經協璞不知此山耳小雷山崇禎烏程縣志周處風土記云太湖中有大雷小雷二山相距六十里舊編云小雷洞庭之東屬烏程大雷洞庭之西屬長興黄龍洞輟耕錄在吳興郡北去城闉廿里枕太湖其山皆怪石林立洞旁壁立千仞頫瞰不能見底每歲旱郡民禱之黄山谷書黄龍洞三字刻猶存蘇軾黄龍洞祈晴詩吳興連月雨釜甑生魚蛙往問弁山龍曷不安厥家梯空上巉絶俯視驚一呀神井湧雲葢隂崖垂蘚花交流百道泉赴谷走羣蛇不知落何處隱隱如繰車我來扣石戸飛䑕翻白鴉寄語洞中龍睡味豈不佳雨師少弭節雷師亦停撾積水得返壑稻苖出泥沙農夫免菜色龍亦飽豚猳看君擁黄紬高卧放晚衙碧浪湖西吳里語一名峴山漾在郡城南羣山四匝諸水滙聚嵐光林影掩映上下徐賁泛碧浪湖詩邀客泛流槎開尊對渚沙苧袍沾杏雨蘭棹撥蘋花積水添湖滿遙山抱郭斜閒情遂幽賞聊用答年華太湖名勝志在府城外十八里界於烏程長興之間其大三萬六千頃東西二百餘里南北一百二十里周五百里西北極於宣常東北極於蘇湖大雷小雷二山皆浮於湖之東方屬當郡境葢浙西苕霅與臨安廣德諸水散出凡七十二溪奔海不及則停蓄於湖道三江以入海禹貢謂之震澤