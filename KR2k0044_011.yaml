巖巖前瀑泉聲激如雷谷口梅花綿亘數里有橋亭名曰掛雲風渚湖萬歴湖州府志在縣東南一十七里一名巽渚一名封渚一名九里湖一名下渚湖餘英志云防風氏在封禺兩山之間故名毛滂下渚湖詩春渚連天濶春風夾㟁香飛花渡水急垂桞向人長遠岫分蒼翠微波映渺茫此身萍梗爾泊處即爲鄉前溪晏公類要在縣南一百步晉車騎將軍沈充家於此樂府有前溪曲充之所製詳附郭山川餘英溪𢎞治湖州府志在縣西一十三里即前溪上流沈約宗族所居之旁也詳附郭山川封溪𢎞治湖州府志在縣東一百步源出於前溪瀦爲風渚湖古所謂風渚也阜溪嘉靖湖州府志在縣北七里自三橋埠東流二里㑹於沙溪雙溪武康縣志在縣西北四十五里發源銅峴山流入餘不溪阮公溪晏公類要在縣西一十七里梁陳故事云石英寳㑹稽人寓武康生女有殊色天監元年選爲采女生元帝爲修容賜姓阮氏拜其父爲奉朝請因以名溪新溪萬歴湖州府志在縣東三里宋淳熙三年縣令蔡霖自汊溪口徙水道東北注五里合長安溪以通舟楫民號蔡公溪詳見水利明月汀𢎞治湖州府志在縣庠門外大溪之南仙人渚太平寰宇記在縣西四十里昔沈羲得道之所有石梯見存碧玉潭萬歴湖州府志在縣西一十里響應山下舊名響潭毛滂碧玉潭詩水面平舖映碧空夜深明月照龍宮猿啼未響潭先響一樹花開兩樹紅石井𢎞治湖州府志在縣石脇山井在山巖中天欲雨時井出雲氣銅井𢎞治湖州府志在縣銅官山之麓昔人引藤蔓爲綆探之莫窮其底旁有石燕洞錢王飲馬井萬歴湖州府志在縣北一十五里相傳吳越王微時飲馬坎中水泉迸出故名安吉州天目山嘉靖安吉州志在州西南一百五里詳見臨安於潛霧山吳興掌故在州南十五里山多雲霧故名冦凖過霧山詩青燈樓殿枕寒溪門外天垂斗柄低啼烏不知春向背落花依舊水東西半橋霜月光相照一帶松烟色未齊誰料百年榛莽地香雲今日繞輪蹄石虎山嘉靖湖州府志在州南十五里其上有石狀如虎道孝豐者徑焉梅溪山續齊諧記吳興故鄣縣東三十里有梅溪山山根直竪一石高百餘丈青而圓如兩間屋大四面陡絶仰之千雲其上復有盤石圓如車葢恒轉如磨聲若風雨土人號爲石磨轉快則年豐轉遲則歲歉騐之無失石門山吳興掌故在州西四十里梅溪之西梁吳均居此吳均與顧章書梅溪之西有石門山森壁爭霞孤峰限日幽岫含雲深溪蓄翠蟬鳴鶴唳水響猿啼英英相雜綿綿成韻既素重幽居遂葺宇其上幸富菊花偏饒竹實山谷所資於斯已辦仁智所樂豈徒然哉嘉靖安吉州志石門山生石耳銅峴山嘉靖安吉州志去州東三十里漢書云吳王濞即豫章銅山招致亡命以鑄錢括地志云吳採鄣山之銅即此地也天井山萬歴湖州府志在州南五十里山半有潭深峻泉水傾瀉四時不竭鳯凰山名勝志在州東三十里中有隱塢云陶𢎞景居之仙人洞山萬歴湖州府志在州南四十里洞深三十二丈青山吳興掌故在州南三十五里吳均與施從事書故鄣縣東三十五里有青山絶壁干天孤峰入漢歸飛之鳥千翼競來企水之猿百臂相接秋露爲霜春蘿被徑信足蕩累頤物娛衷散賞吳均青山詩家住青山下時向青山上青山不可上一上一惆悵禀山嘉靖湖州府志在州西北二十五里一名邸閣山舊傳長沙桓王攻劉繇盡得邸閣糧榖即此落石山𢎞治湖州府志在州西三里唐李衛公廟中有隕石土人皆稱石大王故爲此名玉磬山吳興掌故在州東北十五里又名崑山吳興地記云安吉有崑山攷之梁僧曇諦卓鍚於安吉東北十五里得一璞扣之有磬聲因名玉磬山又以玉出崑名崑山東晉山萬歴湖州府志在州東北二里東晉欲立城郭於此因名即今青峴山郭公山吳興掌故在州西北一十里晉郭文居此山偶見一虎張口向文若求救者文視其喉中有横骨探去之後虎啣鹿以報云九龍山名勝志在州西北三十里山有九隴其狀如龍上有石城一名石槨山浮雲山安吉州志在州東北四十里嘉靖浙江通志上有七十二墪靉靆如雲乆旱出雲則雨純孝嶺吳興掌故在州東北三十里黄巢之亂民石昻負毋避此五湖𢎞治湖州府志在州東南七里曰五龍湖在西南三里曰姚湖在南九里曰獲湖在北二里曰西畝湖在東二里曰四龍湖四龍者吳越武肅王以望氣者言山有王氣使人鑿之忽有四鵲飛起烟雲滃然化爲四龍因名楊子湖萬歴湖州府志在州北二十里吳興記曰楊子湖出丹陽湖下㑹邸閣水分流合於苕溪玉帶橋西吳里語在安吉銅山鄕許夫人墓前早晚兩潮高尺許魏塘𢎞治湖州府志在州北五十里旁有浮玉山所謂黑石玲瓏清泉浸之者也五代時吳頊將軍隱於此梅溪嘉靖安吉州志在州北三十里溪上嘗有紫梅盛開故名一名紫梅溪凌孟傳所謂紫梅溪下水平橋即此蒙泉安吉州志在上方寺其味甘或垢之即竭必淘濯始復流孝豐縣天目山萬歴湖州府志在縣西南六十五里與杭府接界高三萬六千丈周回八百里詳見臨安於潛天目山志天目有三峰東峰從臨安入西峰從孝豐入有十二龍潭六屬孝豐六屬於潛吳興掌故天目東峰從臨安入疎豁可行西峰從孝豐入深僻不昜八貢山吳興掌故在縣南二十五里磅礴鎭靜爲四山具瞻山有尖峰縣治學宮皆面之虎山吳興掌故在縣北三十里安吉州境險峻不可越成化間縣丞許芳鑿山通道以便往来浮玉山名勝志在縣東南十五里山海經云勾餘山三百里曰浮玉苕水出於其陰注於具區都穆遊道塲山記吳興有兩浮玉其一在孝豐東南十五里名大浮玉郡城南碧浪湖者小浮玉也佛子山𢎞治湖州府志在縣西南七十五里太平鄕亦名佛嶺吳興記云山有石室中有小石莊嚴不倚儼然如佛故名古浮山𢎞治湖州府志在縣東南一十五里浮玊鄉與浮玉山相接山有古浮石洞普慈寺宋郡守葛勝仲詩略云路出古浮山木杪飛華屋即此處也師高山萬歴湖州府志在縣北五十里勢接天目山中積雪炎月不消金石山名勝志在縣西南三十里高一萬八千丈周三百里其石色黄土色赤又十里爲巖龍洞巖高百丈中有洞莫測其深上有飛瀑懸巖而下鳯凰山吳興掌故在縣東五里東山吳興掌故在鳯凰山之北峭㧞南來峙縣之左上有竹塢泉四時不竭廣苕山萬歴湖州府志在縣南三十里天目之陰苕水所發源大溪山吳興掌故在縣南三十五里高八百五十丈周四十五里南嶼山嘉靖浙江通志一名泉石山又名白水山高三百六十丈上有湖有蘭畹五山嘉靖湖州府志在縣東北五里一名奕山舊傳姚紾於此樵採見二人對奕因以名山董嶺水嘉靖安吉州志在太平鄉去縣西七十里嶺上有源分東西東流者入寧國西流者由松坑西嶼入下洛溪周朴董嶺水詩湖州安吉縣門與白雲齊禹力不到處河聲流向西去衙山色遠近水月光低中有高人在沙中曵杖藜横溪石柱記箋釋在縣東北當即苕水太平寰宇記所謂苕水在安吉縣治西南七十五里者此也謹按孝豐設於明成化二十三年割安吉縣之九鄉長興縣之三鄉𨽻之故寰宇記繫之安吉縣景溪萬歴湖州府志在縣西南二十五里廣苕鄕上接深溪下洛溪陳安溪五山溪萬歴湖州府志俱縣東北仙溪𢎞治湖州府志在縣西南七十里太平鄕銅坑其源發自佛子山水甚清淺不生魚蝦因以仙名至西嶼溪始通舟筏直抵下洛溪合於苕溪荻浦孝豐縣志在縣西南三十里其源出自天目蛟龍池𢎞治湖州府志在孝豐縣天目山東南有瀑布下注數里浙江通志卷十二
