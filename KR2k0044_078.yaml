body:
  text: 欽定四庫全書浙江通志卷七十九積貯下倉厫杭州府永濟倉舊名廣豐倉在仁和縣新橋之西北首即明預備倉康熙五十四年具題添建倉厫二百四十間改名永濟倉廣濟倉原名廣積倉存貯南米故乂稱南糧倉在仁和縣之新橋東雍正七年添建厫座九十間亦改名永濟貯穀儲備其南米移貯南糧省倉南糧省倉在駐防營井字樓雍正六年駐防副都統移駐乍浦題請將衙署改建鹽義倉在艮山門内雍正六年奉㫖建李衞鹽義倉碑記從來鹽筴之制裕國便民而厯代以來百弊叢生遂有上虧國課下瘁民生至商聖祖仁亦兼受其困則體恤之心未至也伏惟皇帝軫念浙鹺恩膏疊沛我皇上承乾御極益以加斤減費蠲課賑災商力既舒故民價不増而課額易辦於是衆商感悅因見我皇上勤求民瘼歲支正項儲榖備荒乃願共捐銀十萬兩用襄積貯亦足以見聖德入人之深而感人之速矣衞職兼鹺務不敢壅於上聞既奉令别建義倉遴選誠實之商輪加經理或當出俞㫖遂陳以易新或當糶三而存七隨年豐嗇與時變通庶幾榖日益多濟日益普雖有水旱可以不爲民害焉夫天下熙熙攘攘大抵皆爲利往來耳以諸商各出貲費奔走海濱驅馳團舍誰不欲利盈什伯爲肥身家貽子孫之計乃昔之恐失錙銖者今捐數萬金不惜則豈非厚生正徳之化風動於不自知哉是倉也卜築於艮山門内錢氏園基其地約四十畝其厫計百四十間其貯可八萬五千石其於水近可便搬運其爲地燥可免濕蒸其屬禁城可以數稽查其逺民房可以避烟火周圍有牆牆高而厚布厫有板板濶而堅厫外有場場寛而平場前有㕔㕔高而敞有門可以杜閒雜有廟可皇仁以依倉神後有同志更擴充而推暨之其愈廣於無際也夫錢塘縣常平倉有東西南北四倉明萬厯間知縣湯沐建俱圯今在總織局後預備倉在城北二啚觀音橋南舊名老人倉今稱錢塘倉雍正五年建倉八間每間貯穀五百石仁和縣廣豐倉在平安四啚廣積倉在新橋北預備倉舊名老人倉在艮山門橋大有倉在武林門月城内明萬厯間巡按御史李邦華建康熙年間改貯南米雍正五年修葺舊倉六間每間貯穀八百石海寧縣存畱盈濟倉在縣前永平倉在西南隅社倉康熙十三年知縣許三禮建常平倉在縣西七十三步明正德間知縣曹珪移建拱辰門外名預備倉立門樓官㕔各三楹厫四楹繚以土垣雍正五年添建倉厫九間每間貯穀五百石七年添建一十七間八年添建一十六間富陽縣存畱倉在縣治西南預備倉在後河頭自新衖雍正五年添建倉厫八間每間貯穀五百石七年添建一十四間八年添建一十一間餘杭縣存畱倉在儀門内常平倉在縣治東南三里預備倉一在縣治東南二里一在縣治東南一里法喜寺巷康熙二十二年修雍正五年添建倉厫六間每間貯穀五百石七年添建一十九間八年添建一十六間臨安縣預備倉在縣南大巷存留倉内康熙九年知縣陳提知建存畱倉在縣治南雍正五年添建倉厫一十間毎間貯穀三百石七年改建小倉二十四間八年添建一十一間於潛縣預備倉四所一在縣西一在趙村一在太陽村一在法道村雍正五年添建倉厫一十間每間貯榖三百石七年添建一十間八年添建五間新城縣義倉在縣左存畱倉在縣西預備倉與義倉並雍正五年添建倉厫一十五間每間貯穀三百石七年添建一十三間八年添建一十一間昌化縣存畱倉在縣東常平倉一在河橋一在百丈明景泰中建社倉明萬厯間知縣洛都建預備倉在縣西半里許雍正七年添建倉厫九間每間貯穀三百石八年添建五間嘉興府嘉興倉在實花寺軍倉舊名外三倉洪武初名大有倉三十年倂入嘉興倉子粒倉在軍倉西嘉興縣預備倉舊名濟衆倉在鍾秀坊天寜寺東常平倉五所一在接官亭一在王店一在新豐一在鍾帶一在新行皆前明建張朝瑞常平倉議洪武初令州縣各立預備四倉官爲糴穀收貯以備賑濟就責本地篤實人民管理次災則賑糶其費小極災則賑濟其費大賑糶則常平法也歲久法湮各州縣僅存城内預備一倉其鄉社倉盡廢夫天災流行國家代有常平倉斷乎當復者議令各屬縣於四鄉水陸通達人烟輳集高阜去處官爲各立倉一所每歲將贖鍰之半糴穀入倉或查無礙官銀隨宜糴買大約毎鄉一倉上縣糴五千石中縣四千石小縣三千石但不許逼抑科擾平民各擇近倉殷實居民二名掌管免其雜差准其開耗凡收糶俱該縣掌印官監督或遇歲饑管倉人役稟官監糶中饑半糶大饑全糶俱照原糴價銀出糶或寧減之大約減荒年市價三分之一庶不至騰踴或倉穀糶盡而民饑未已令持所糶榖本赴有收地方循環糴糶四鄉糶完即將榖價送官秋成委糴仍總計糴穀牙耗等費每石銀若干報官註册以爲日後出糶張本蓋社倉之法立則以時斂散富者不得取重息而貧民霑惠於一歲之中常平之法行則減價糶賣富者不得騰高價而貧民受賜於數十年後大饑之日昔蘇文忠公在浙行荒政只用出糶常平米一事更無餘策夫城内之預備倉以待賑濟然有出無收其費甚鉅四鄉之社倉以待斂散然易散難斂其弊頗多惟常平倉者其法專主糶糴而糴本常存蓋不費之惠誠救荒良䇿也預備倉在通越門内雍正五年添造倉厫二間毎間貯穀五百石七年添造一十四間八年添造一十六間秀水縣崇眞倉在縣西北二十七里今廢花園倉在報忠坊義倉在復禮鄉明陸光祖建馮夢禎復禮鄉義倉記秀水舊無義倉至隆慶年始有他都亦無義倉惟復禮鄉三十都獨有蓋始五臺陸公少時甥館於斯睹其地瀕湖蕩水比爲災民多貧徙賦復繁重慨然思所以恤之而仕版蚤登敡厯靡暇後以太常卿謝歸復游其地則民之困窮且增劇矣心益加惻焉輙命捐田三百餘畝并米數百餘石貯之東禪寺建爲義倉春放冬收以給民耕種歲侵量蠲之餘而贍里役表賢逸蜡祭賽神餘而治徒杠葺祠宇以教民孝敬禮讓能自給者不得與科條纎悉定爲式以垂諸永久嗣君比都員外郎基忠前府參軍基恕同心繼述續增田至五百餘畝米八百餘斛所貸始於都之内漸及於都之外鄉之民遂安居樂業孝弟力田曩時流離轉徙之苦如距斯脱而禮讓漸興盜稀訟息此所謂阜民善俗之明效大驗至章著矣竊惟天下事不難創始而難主守主計一不當彼且爲窟穴爲徑竇不者爲具文爲故事而茍簡應之法即良且日皆窳民竟安所賴哉五臺始事時疇咨其鄉之父老髦俊得張君守約而掌之張君兢兢愼飭主之二十年法無害兩目忽眚告於五臺而謝其事衆乃推太學陶君九文陶君重方命迺受訖君固以精勤起家而治倉事尤謹秉公持正以計出納而程贏縮諸所支留取予悉按故所條定行之又念惠生而遺於惠死乃復捐田出助爲亡者之需蓋澤及泉壤矣夫一鄉者四方之標也標建則人競趨斯是倉法豈僅僅行於復禮一鄉已哉將天下以爲標也余敢爲復禮鄉之民慶又庶幾行之於四方以爲四方之民慶是爲記常平倉四所一在陡門一在濮院一在新城一在王江涇預備倉在縣東北三百步天寧寺東偏雍正七年添建倉厫一十八間八年添建一十六間嘉善縣廣濟倉在縣治西北今廢常平倉四所知縣章士雅創太平倉在縣治西一里預備倉在太平倉右雍正五年添建倉厫八間毎間貯穀五百石七年添建一十八間八年添建一十六間海鹽縣廣儲倉在縣西南開濟倉在縣西北常平倉四所預備倉在縣治西雍正五年添建倉厫九間每間貯穀五百石七年添建一十六間八年添建一十六間石門縣廣盈倉即常平倉康熙十一年建預備倉在永豐倉側康熙十一年建雍正五年添建倉厫一十一間每間貯穀三百五十石七年添建一十八間八年添建一十六間平湖縣俸給倉在學宫義米倉在學宫常平倉四所萬厯中建預備倉在縣東半里雍正五年添建倉厫九間每間貯穀五百石七年添建一十五間八年添建一十六間桐鄉縣常平倉四所預備倉在煥文街雍正五年添建倉厫一十五間每間貯穀三百二十石七年改建小倉二十二間八年添建一十六間湖州府永寧倉在府治東唐宋時舊址明宣德間併西倉入東倉俗名東倉又名泰定倉烏程縣預備倉一名義倉在縣儀門東雍正七年行文修葺舊倉厫一十八間八年添建一十六間歸安縣義役倉在兩平橋預備倉在縣南對河知縣戚賢修建雍正五年添建倉厫六間毎間貯穀五百石七年添建一十八間八年添建一十六間長興縣義役倉在縣治東南預備倉四所今並廢畱餘倉在縣西知縣向鼎建雍正五年添建倉厫八間每間貯穀五百石七年添建一十八間八年添建一十六間德清縣義役倉在縣治内儀門西預備倉在清河坊餘不廟之南臨溪東向雍正七年添建倉厫一十八間每間貯穀五百石八年添建一十六間武康縣義役倉在縣西預備倉在縣西俸給倉在縣西雍正五年修建倉厫六間毎間貯穀五百石七年添建一十二間八年添建一十一間安吉州義役倉今名督儒館在州治東百二十步雍正五年添建倉厫六間毎間貯穀五百石七年改建倉厫十三間八年添建一十一間孝豐縣預備倉二所一在松坑一在天目山雍正五年添建倉厫七間每間貯穀五百石七年添建一十五間八年添建一十一間寧波府永寧西倉在月湖西廣盈西倉在月湖西永寧南倉在月湖前廣盈南倉在採蓮橋西鄞縣預備倉四所明正統間知縣楊夀建雍正五年添建倉厫四間七年添建六間八年添建一十三間慈谿縣濟畱倉縣東廡元延祐中建義倉二所預備倉凡四所雍正五年添建倉厫六間每間貯穀六百石七年添建一十三間八年添建一十三間奉化縣預備倉四所明洪武二十九年燬存畱倉在縣治西廊後雍正五年添建倉厫二間毎間貯穀六百石七年添建五間八年添建九間鎭海縣惠民倉在縣治西後廢廣安倉在縣北一里常盈一二三四五倉正統間建預備倉二所一在縣南一里一在縣北一里明嘉靖元年徙縣治儀門内左右雍正五年添建倉厫五間七年添建八間八年添建九間象山縣廣積一二三四倉明正統八年知縣孫樞建預備倉二所東倉在十八都西倉在十七都雍正七年添建倉厫一間八年添建四間定海縣廣安倉在縣北二里常盈一二三四五倉雍正八年添建倉厫八間紹興府如坻倉在府治東北一里大有倉在謝公橋北預備倉在大禪寺山隂縣三江倉在三江所城中社倉六所義倉四所廢預備倉在縣頭門内土榖祠後雍正五年添建倉厫六間每間貯穀五百石七年添建一十八間八年添建一十六間㑹稽縣預備倉在縣堂側雍正五年添建倉厫一十八間每間貯穀五百石七年添建一十間八年添建一十六間蕭山縣預備倉在便民倉右明隆慶間知縣陸承憲改造雍正五年添建倉厫一十八間每間貯穀五百石七年添建一十間八年添建一十六間諸暨縣預備倉在城隍廟側雍正七年添建倉厫一十五間八年添建一十一間餘姚縣常豐倉凡五所預備倉在幕次㕔東雍正五年添建倉厫九間每間貯穀五百石七年添建一十六間八年添建一十六間上虞縣常平倉在縣儀門東南預備倉附便民倉雍正五年添建倉厫九間每間貯穀五百石七年添建九間八年添建一十一間嵊縣預備倉在城隍廟側義倉東西南北四所常平倉在丞廨前雍正五年添建倉厫五間毎間貯穀五百石七年添建一十三間八年添建一十一間新昌縣義倉附預備倉預備倉在縣西雍正五年添建倉厫七間每間貯穀五百石七年添建一十五間八年添建一十一間台州府永盈倉在府治東北一里康熙元年裁臨海