body:
  text: 浙江通志卷二百三十寺觀五寧波府鄞縣附郭天寧禪寺嘉靖浙江通志在府治西南惠政橋北延祐四明志唐為國寧寺大中五年置宋崇寧二年改崇寧萬壽政和元年改天寧萬壽紹興七年改報恩廣孝是年又改報恩光孝成化四明郡志後又名天寧報恩建炎間寺燬先建隆間節度使錢億建鐵塔徙奉化岳林寺深沙神於西廊乃工人王百藝為之極雕刻之巧嘗現光明鼠雀不敢近及寺燬而神之室巍然獨存元至元十九年復燬僧可舉重建至大二年燬於倭至治元年僧善德重建明洪武二十年佛殿圯住持嗣曇重建永樂五年建山門宣德十年郡守鄭璐建鐘樓正統六年建藏殿十年建千佛閣景泰二年建方丈成化元年建羅漢堂國朝順治間重修佛殿康熙六年建山門二十三年三月燬五十八年僧明文重建萬壽禪寺嘉靖寧波府志在縣治南大梁街延祐四明志唐咸通十三年使臣周景遇捨廨宇以建賜額慧燈宋開寳間重建太平興國七年改崇壽政和八年改廣慧建炎四年燬重建嘉定十三年燬即復成化四明郡志或云慧字從心從彗皆火䜟為額不利郡聞於朝紹定元年改今額元至元十九年燬至大二年又燬住持子文復建明洪武三十年殿圯永樂三年重建方丈二十年建大雄殿山門廊廡視昔有加遂成叢林國朝康熙十年僧永慈重修延慶講寺寧波府志在縣治東南日湖中周廣順三年建名報恩院延祐四明志宋至道中僧知禮講天台教行學聞於朝真宗累遣使加禮之是為法智大師延慶紀畧大中祥符三年改為延慶院石待問改延慶寺記明州保恩院者沙門知禮座主捨舊謀新之所作也座主俗姓金氏世居鄞江七嵗出家於州之興國寺洎從寳雲通法師受天台智者教二紀之餘一志於此用能博極三乘周知四諦六塵不染五蘊皆空故得緇流蟻慕信士駿奔若鱗宗龍而羽宗鳯也先是此院締構年深頽毁日甚思得能者從而興之衆議所歸得請為幸粤以至道三祀乘召而至肇興法㑹要結檀那親製疏文訓釋精義卒使一方響應千里悦隨運斤三載工乃訖役觀其基宇宏邈土木瑰麗金碧交映玊毫増輝輪奐之盛異乎他郡待問通守竹符函親松柄㑹兹勝槩告厥成功承列疏以見貽遂抽毫而為識時大中祥符二年嵗在己酉四月六日紹興十四年改賜寺額延祐四明志嘉定十三年燬丞相史魯公重建扁曰南湖福地元至元二十六年火僧善良重建至正四明續志泰定元年火元統元年僧本無重建成化四明郡志明永樂六年重修寺為天下講宗五山之第二山洪常延慶寺詩何處堪尋物外交羅雲丈室絶紛囂老僧掃榻應相候童子開門不待敲花外雨腥龍出缽松間雲暖鶴歸巢滿懐清思渾無寐卧㸔流螢度竹梢國朝順治間建大悲殿康熙十一年重建鐘樓崇教教寺寧波府志在縣治西南舊名甲乙院唐乾符元年建宋大中祥符元年賜今額建炎間燬紹興二年重建元至元二十五年至大二年連燬延祐元年重建明永樂二年殿圯十三年重建天封講寺鄞縣志在縣治東南延祐四明志唐通天登封年間建僧伽塔髙十有八丈以鎮郡城閒中今古錄舊傳造於唐髙宗乾封年間落成於武后通天間因取天封二字名之漢乾祐二年建天封塔院宋大中祥符三年改今額建炎間燬紹興十四年郡守莫將重建嘉定十一年火廢為民居成化四明郡志元至元二十三年復建泰定三年塔圯至順元年僧妙壽重建至正二十一年修明永樂八年重修十年雷火燬塔三層復修嘉靖寧波府志嘉靖三十六年七月颶風作塔頂墜郡守周希哲修鄞縣志天啓崇禎間屢葺國朝順治十六年重修雍正九年分廵道孫詔知府曹秉仁勸募鼎新之廣福禪寺嘉靖寧波府志在縣西南木欄橋漢乾祐二年建號羅漢院宋太平興國八年賜今額鄞縣志嘉定十三年燬重建元至大二年又燬其址没於軍營明成化二十一年重建嘉靖間燬四十三年重建崇禎四年建後殿國朝康熙間修葺重建山門寳雲講寺延祐四明志在行春坊東宋開寳元年僧義通髙麗人自三韓來譽振中國漕使顧承徽捨宅為義通傳道處名傳教太平興國七年賜額寳雲嘉靖寧波府志元至元二十六年至大二年屢燬後至元間重建明永樂十四年重建山門寺與鄞學相鄰𢎞治十三年有司徙寺於竹湖坊僧如璋建殿宇方丈山門為天下講宗十刹之一白衣講寺成化四明郡志在縣治西北舊在府治内唐長興元年建號淨居報仁院俗呼白衣觀音院宋治平元年賜白衣廣仁額延祐四明志初節度使錢億廨宇梁見白光綬紋有觀音相乃易其木刻像置於寺建炎四年燬重建元至元十九年又燬復建明洪武三年圯其址改創本府廨宇撥府治之廢寺以建永樂五年殿圯重建天順五年重建山門方丈嘉靖寧波府志嘉靖十九年圮二十一年重修國朝順治間復修壽昌教寺成化四明郡志在縣治東南舊名西壽甲乙住持院宋乾道間建嘉定十三年燬元至元二十五年重建明洪武二十九年重修後圯宣德四年重建陳敬宗壽昌寺記寧波郡治南有寺曰夀昌者創始於宋燬於嘉定間重建於元至元己丑凡八年而始成成之者寺僧志堅志西也迄今又百餘年矣棟楹梁桷蠧朽撓折沙門恢公復宗慨神棲之弗寧念先業之當繼乃鳩工度材悉易而新之輪奐雄麗像設尊嚴闡事於宣德己酉凡七載而訖工巍然為諸刹之冠也國朝康熙十七年重修佑聖觀寧波府志府治西北二里舊名佑聖道院元至治間建後廢明正統間差内官歐成重建國朝康熙三十三年提督馬三奇重修玊皇閣四十三年海關監督寳善重建真武殿四十八年海關監督穆爾薩重建靈官殿雍正四年郡人章炳等重修寧紹台道孫詔捐建山門長春道院寧波府志府西北一里許宋淳祐元年建沖虛真觀寧波府志在府治東南太和坊唐天寳二年命天下皆置紫極宫祀老子梁貞明元年改為真聖觀宋祥符間改名天寳紹定間燬重建元至元間改名𤣥妙明永樂間圯天順間重建真君殿三清殿鐘鼓樓方丈山門七年奏賜今額鄞縣城外寺觀勅賜𢎞法禪寺寧波府志在郡治東六十里太白山延祐四明志晉永康中僧義興結屋山間有一童子日給薪水後辭去曰吾太白星也上帝以師篤道行遣侍左右語既不見天童寺集由是山名太白寺名天童延祐四明志寺後經兵火唐開元二十年僧法璿復故迹建精舍於山麓之東正字萬齊融造多寳塔於西南隅天童寺志至德中宗弼之徒徙寺於太白峯下距義興開山處一里而遙天童寺賦注乾元初相國第五琦請賜名天童玲瓏寺咸通間賜名天壽成化四明郡志宋景德四年改賜景德額紹興初宏智禪師撤而新之建千佛閣宏麗甲東南鄞縣志寳祐四年寺燬六年住持祖智重建景定四年僧居敬建千佛閣元大德五年僧日新増新賜朝元寳閣額天厯二年閣燬至元十九年僧元良復建危素朝元閣記景德寺朝元閣天厯間燬至正十八年台之瑞嵓僧元良主寺事日以興建為事明年秋左丞方國珍捐已資助未踰年落成中為七間兩偏四間左鴻鐘右輪藏下為三門以通出入梁棟雲飛榱題修敞崇十又三丈邃十丈廣二十又五丈用楮幣百五萬鑄萬銅佛置閣中復重構旃檀林庖湢衆屋不可殫紀今司徒平章國珍上其事於朝遂有賜碑之命論者謂僧元良審以發謀斷以行志惠以使下勤以率衆此其所以成功速而樹業隆也明洪武十五年定為天童禪寺稱天下禪宗五山之第二宣德三年佛殿燬七年住持圓愷重建萬厯十五年七月二十一日龍作殿圯於水崇禎四年延密雲悟禪師住持十載内鼎建重新王安石春日過天章寺詩村村桑柘錄浮空春日鶯啼谷口風二十里松行欲盡青山捧出梵王宮沈明臣宿天童寺詩曉汲寒泉潄齒香病維摩欲卧津梁石壇老柏驚龍蜕白日清池拭鏡光山勢南連滄海大水聲西遶寺門長杖藜吟過秋山下槲葉初黄作雨凉國朝順治十六年住持道忞應召因賜𢎞法禪寺額重修大殿康熙七年住持本㒥建奎煥閣恭藏宸翰暨奉賜佛神諸像十七年住持本晢復古山門二十二年修葺佛殿諸寮室濬萬工池寺有幻智伏翠堆雲西歸大雲桂花方嶺諸菴嶺外則小白下院李仙根天童寺記天童自義興以來歴唐宋及元明屢有隆替皆圖維締構不久即復萬歴丁亥秋風雨驟作傾蕩就盡四十餘年莫克維新崇禎戊辰迎密雲禪師於金粟越三年至師乃運正法味應衆饑渴頓令緇素雲集財力輻合隨意擘畫天然圓滿師以壬午秋示寂所付嗣十二人各隨緣主席順治丙辰欽召木陳忞公重應住持己亥即蒙錫號𢎞覺而悟公語錄始得奉旨入藏復以寳裝關帝并二將像送䕶山寺葢希世之遇也寺重興五十年未有碑記因屬之根根以興造名藍不朽勝事遂書以俟後之作者雍正十一年御賜慈雲密布四字額阿育王禪寺明一統志在阿育王山中成化四明郡志縣東五十里名勝志昔阿育王現靈建寺其下有舍利塔阿育王山志晉義熙元年敕造塔亭禪室宋元嘉中廣興創建梁普通三年勅建堂殿房廊賜額阿育王寺鄞縣志周顯德五年寺災宋初重建延祐四明志大中祥符元年賜名廣利大覺禪師璉公居之名振天下仁宗召對御製釋典頌授之熙寧三年建宸奎閣寺東北山上有東塔即劉薩訶所禮舍利塔湧出之處西塔院去寺五十歩乃唐明皇時建鄞縣志明洪武十五年定為育王禪寺稱天下禪宗五山之第五住持崇裕修復塔寺莊田宋濂育王寺碑記東天竺國阿育王造寳塔八萬四千貯釋伽文佛真身舍利分布於四天下而鄮山當其一晉太康三年并州獵師劉薩訶受梵僧指改行為僧徧求舍利至㑹稽之鄮山忽聞地下鐘聲越三日舍利塔從地湧出其相青色似石非石髙尺四寸廣七寸五層四角光明殊勝義熙元年安帝始構亭覆䕶度二七僧守焉宋文帝増創寺宇為浮屠三層函之梁武帝賜額為阿育王寺大同五年令岳陽王詧改浮屠為五層繪帝暨昭明太子二像藏焉仍賜黄金五百兩造銅佛四百軀寫經論五百卷鑄四鐵鼎以鎮四角㝷蠲其賦給兵三千設營防衛陳宣帝度僧守塔如義熙數唐中宗遣使賜金下詔加䕶之武宗并省海内佛寺塔歸越州官庫宣宗立像教重興又入於開元寺鄮山僧愬於觀察判官蒯希逸而還之懿宗咸通中又度僧三七人守焉梁貞明二年錢武肅王迎塔作禮改浮屠為七層第三層置七寳龕以貯塔周顯德五年寺災文穆王又請致武林龍華寺新其藻飾中龕雜用百寳範黄金為座懸珠纓以莊嚴之宋大中祥符元年賜廣利額拓為十方禪刹髙宗即位親灑宸翰曰佛頂光明之塔淳熙元年魏王愷出鎮兹土二年四月瞻舍利光現更用黄金為塔而置寳塔於中冬十一月孝宗取塔入内舍利見於塔頂書妙勝之殿四字俾揭於塔所宋季寺又災塔附安於别院元至元十三年春世祖命使者奉塔至燕都聖壽萬安寺命僧尼十萬建十六道塲備極尊崇世祖親臨夜有瑞光發見東射禁中世祖大悦命送塔南還詔浙江省臣建治舍利殿宇曽未幾何甍棟雄麗上薄雲漢至宏辯禪師裕公入我國朝戒律精嚴言行一致凡寺制宜有而摧敗不支者悉舉而更之念締造之難不可無以示來者俾其徒徴文為記予惟阿育王山顯著特異自晉建今歴一千九十七年國王大臣以及氓𨽻靡不皈依瞻仰浙東西未有如斯之盛者是宜詳記使後人扶植於悠久也永樂十四年殿圯僧宗正重建嘉靖四年山門燬重建萬歴間僧傳瓶重建佛殿崇禎間僧正理重修薛嵎育王寺詩寺在衆山裏白雲深更深不知行樂意何似望禪心䕶塔龍常在倚松僧獨吟渡江前賜字珍重到於今劉仁本育王寺詩古鄮名山控