初改今名明永樂四年重建蓬萊禪寺象山縣志在縣西三十里舊名蓬萊院漢乾祐元年建宋熙寧間改名壽聖紹興三十二年改今額劉渭蓬萊寺記象山境之西南有佛刹焉佳巘蒼岫周遭映帶朝陽暮藹露花霜竹出没於空曠有無之間恍然若圖畵中太僕卿林公旦甞宰是邑嘆基址頽圮􅋻堂隘宇上破旁穿因命釋永淨主院事乃始即其舊而新之三門列峙兩廡翼張輪焉奐焉一切鼎新既又闢田三百畝以贍供羞植松十萬本以表衆山之森列皆永淨與其徒恊心聯力而又卒之以不私如是宜其有成也崇寧元年三月一日記棲霞觀延祐四明志在縣西南二百五十歩蓬萊山下舊名蓬萊觀秦徐福梁陶𢎞景皆隱迹於此隋大業元年廢唐天寳十三年台州刺史袁仲宣復置大中元年令楊𢎞正重修宋治平二年改今額淳熙末遷於山之西嘉定十三年道士張太原於舊址重建象山縣志後圯明洪武元年重建嘉靖三十二年築城知縣毛德京徙城内下舊址二十歩大瀛海道院至正四明續志在縣東二十里爵溪元至元二十七年里人王一真建呉澄大瀛海道院記象山縣之東二十里曰爵溪潮汐齧衝賈舶絡繹世傳神仙安期生之屬所往來也故其民好道而其鄉曰遊仙至元癸未鄉人王翁棄妻子改名一真結屋其隈前代善書者有大瀛海三字購而得之因以為扁大德丁未天台崇道觀道士呂虚夷為縣令禱雨有應王翁一見莫逆遂與共處王逝而吕嗣主教者命之世守方將大其居又欲資一言久其名也於是乎書以遺之時延祐第六春也定海縣勅建普濟禪寺普陀山志在補陀山南梁貞明二年日本僧慧諤得觀音相於五臺山將迎歸本國舟觸新螺礁諤禱曰使我國衆生無緣見佛當從何所立精藍有頃舟向潮音洞泊焉居民張氏目覩斯異遂捨所居築室奉之號為不肯去觀音院宋元豐三年改建賜額寳陀觀音寺置田度僧紹興三年殿摧賜錢萬緡修飾七年殿成御書圓通寳殿以賜僧德韶創龍章閣藏之元大德四年命治演法堂劉賡寳陀寺記慶元之補陀洛迦者奇巒複嶂幽洞靈巖錯立層出華嚴經所謂善財二十八叅觀音與諸大菩薩圍繞説法即其地也寺曰寳陀創始於宋元豐間其在東南無論遐邇卑尊靡不皈依瞻仰皇后福德日盛乃大德二年春特命中御府臣李英驛降祝香使還復命修繕像設明年春宿衛臣博囉等再馳祝香内出中金百兩飭江浙行省遣吏同涖其役又明年春宿衛臣魏額森塔爾楚三馳祝香御命飯僧周閲貝典今年春仍命塔爾楚偕李特穆爾布哈持五綵旛旌祐祝香以往又出内寳幣二千緡治演法堂暨廬舍之圯腐者又飭行省捐土田之在官者二十頃畀之俾毎嵗以寅午戌月諷誦祈禱至是命中正院傳命翰林臣俾用文字刻貞石以垂永久謹詮次如右元統元年宣讓王施鈔千錠建太子塔於寺南明洪武二十年信國公湯和徙居民入内地焚其殿宇供瑞相於郡棲心寺僅留鐵瓦殿一所正德十年僧淡齋於潮音洞南建正殿五間方丈二十間嘉靖二十年總督胡宗憲遷殿宇於定海之招寳山迎大士像供焉餘舍盡焚隆慶元年五臺僧真松來山稍為修復萬厯六年僧真表創天王殿雲㑹堂十四年建藏經殿頒賜藏經立靜室五十三處二十六年火金石盡爍惟大士寳軀獨存三十年發帑遣太監張隨更建藏殿三十三年正月復發帑金遣張隨重建圓通等殿賜額䕶國永壽普陀禪寺定海縣志後嫌舊基淺隘遷靈鷲麓今其址也王安石遊洛伽山詩山勢欲壓海禪宫向此開魚龍腥不到日月影先來樹色秋擎出鐘聲浪荅回何期乘吏役暫此拂塵埃髙翥昌國縣普濟寺小亭詩鯨海中流地龍峯小洞天亭髙先得月樹老久忘年大士居鄰境閒僧指便船若為風浪息更結普陀緣丁鶴年題昌國普陀寺詩神鼇屹立戴崔嵬俛瞰滄溟水一杯積翠自天開罨畵布金隨地起樓臺祈靈漢使乘槎到傳法梁僧折葦來若使祖龍知勝槩豈應驅石訪蓬萊沈一貫禮洛伽山詩近有三生紫竹緣何須十地與諸天獨騎香象開龍國故擊靈鼉撼蜃川銀浪秋掀天影澹金輪朝發海光圓但將一勺澄心地舉目千花盡是蓮國朝順治八年夏燬大殿獨存康熙十年徙僧内地二十八年定海總兵官黄大來奏請重修欽差侍衛萬爾逹等齎帑金一千兩分賜普陀法雨兩寺重建佛殿三十八年聖祖仁皇帝南廵復賜帑金五百兩重修勅改今名御賜自在觀世音一尊銀製吉慶阿哥一尊寳印一顆滲金佛三尊金剛經一部佛塔心經金字心經各一部臨米芾書單條一幅御書普濟羣靈潮音洞皓月禪心扁額四十二年又御書大圓通殿獅子窟二額四十三年御製南海普陀山重建普濟禪寺碑文勒石寺中恭紀首卷又御書宣布聲聞四字四十六年又賜旃檀林五十九年又御書海月常輝諸扁額雍正九年奉㫖賜帑金遣官修建御製普陀山普濟寺碑文勒石寺中恭紀首卷勅建法雨禪寺寧波府志在白華頂左光熙峯下普陀山志有麻城僧真融明萬厯八年來普陀結茅數楹於峯下漸建圓通等殿以海潮名菴二十二年郡守呉安國改額曰海潮寺真融徒如壽等又為増建殿宇規制宏麗二十四年太監黨禮請於朝賜額䕶國鎮海禪寺國朝康熙二十八年聖祖仁皇帝賜帑金同普濟寺重建三十八年復賜帑金重修勅改今名御賜救度佛母一尊赤金大士一尊御書天花法雨梵音洞并修持淨業諸扁額又御賜金剛經一部臨米芾書一幅四十三年御製南海普陀山重建法雨禪寺碑文勒石寺中恭紀首卷雍正九年奉㫖賜帑金重修御製普陀山法雨寺碑文恭紀首卷勒石寺中祖印寺至正四明續志在城東南元在朐山舊名蓬萊山晉天福五年建宋治平二年賜今額嘉熙二年邑令余桂遷於此以接待寺併為一定海縣志明廢縣遷入城中宣德間都指揮張翥重建正統七年災成化五年總督張勇復新之後燬獨大殿巋然獨存國朝康熙三十一年總兵藍理增建普慈寺定海縣志在城北二里至正四明續志唐大中十四年名觀音院宋治平元年賜今額慶元間重建淳祐五年火復建成化四明郡志明洪武二十年殿圯永樂二年僧志辨於舊址重建龍德孚遊普慈寺詩山廻碧海外寺在翠㣲中落木晴鳴雨疎鐘晚度風最憐塵世隔況與故人同禮佛談遺像方知色相空萬壽寺成化四明郡志在城東北三十里舊名永福宋建隆元年建治平元年賜今額定海縣志後燬今復建舊傳有秋蓀綠葉紫莖生於山名萬壽香蓋在寺旁云石佛菴定海縣志在大周嶺西溪山曲折蓬海之别洞天也明洪武間僧法通從慈谿回見石佛浮來創此菴天啓初僧如登重建柏子菴普陀山志僧心一建浙江通志卷二百三十
