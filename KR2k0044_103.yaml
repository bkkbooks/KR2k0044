body:
  text: 浙江通志卷一百四物産四紹興府八貨越絶書甲貨之戶曰粢為上物賈七十乙貨之戶曰黍為中物石六十丙貨之戶曰赤豆為下物石五十丁貨之戶曰稻粟令為上種石四十戊貨之戶曰麥為中物石三十已貨之戶曰大豆為下物石二十庚貨之戶曰穬比蔬食故無賈辛貨之戶曰果比蔬食無賈壬癸無貨粳稻糯稻𢎞治紹興府志稻有粳糯凡十九種今略書其常植而易識者駝犁望三種有六十日七十日八十日占城二種有早占城寒占城秥四種有早白晚白早黃晚黃塗蒙三種有早晚北白色者種有早白晚白秥白光頭白撩水白霜下白銀條白辦白矮白羅村白烏色者四種雁來烏老了烏早烏粳晚烏粳紅色者二種有大紅小紅紹興府志稻種甚多嘉泰志列五十六種詢之農家多不能識今據山會新志採録八邑大約相同早稻曰紫口甲朝穧粗稈細稈早白黏晚稻曰晚白黏料水白餘杭白稚蒙鳥銜來鵝腳黃健腳青宜興白以上俱粳類宜炊棐糯青稈水鮮羊鬚胭脂早黃黃殼紅黏以上俱秫類宜釀黃秈嘉泰會稽志會稽獨有黃秈之名秈音仙字書云粳稻也他無以秈名者徽饒之間謂小米為秈與此不同麥紹興府志大麥秋種立夏前熟有晚大麥穗長子多與小麥同熟六稜麥中早麥紅黏糯麥堪作酒小麥十月種小滿前熟有早白麥松蒲麥芒秃如松房娜麥穗如大麥蘆穄夢溪筆談稷乃今之穄也紹興府志今呼為蘆穄以其形似蘆也然不常植山中或有之白豆榖譜浙東一種白豆味更勝乳粟萬厯山隂縣志粒大如雞豆色白味甘俗名遇粟稗𢎞治紹興府志一名烏禾越民種之其性堪水旱嵗飢充食不減粱米釀酒踰黍稷乾菜蕭山縣志白菜醃之曬乾貯甕內曰陳乾菜久愈美荇菜蕭山縣志其所結子爛煮之味甘如蜜薹菜𢎞治紹興府志菘耐霜菜也越人呼為薹菜有矮黃麻葉二種其羊角薹越土種之則變仙人菜餘姚縣志春夏雷雨驟作俄産白水山崖石上立採可得移時無種南瓜述異記會稽嘗有五色瓜山隂縣志五色瓜即南瓜種自吳中來一名飯瓜食易飽西瓜寶慶會稽續志越瓜大者色正白越人當果食之去煩熱解酒毒𢎞治紹興府志西瓜産蕭山者最佳餘姚縣志西瓜産眉山者佳今剡嶴如枕者更勝菌吕氏春秋菜之美者越路之菌是也會稽録菌今謂之茭首茭心生臺至秋如小兒臂其白如藕軟美異常茄嘉泰會稽志會稽有水茄亦名銀茄云是新羅種形如雞子蔥嘉泰會稽志會稽園夫藝蔥有兩等其小而美者曰大官蔥燕竹筍寶慶會稽續志越人以燕來時作筍取其早也因以為名王十朋在剡題燕竹詩問訊東牆竹佳名始得知龍孫初迸處燕子正來時箭里筍會稽風俗賦箭里之筍注會稽有美箭里筍譜箭筍十二月生會稽諸山絶多或叢生或蔓延可如筯大長三四寸菌筍萬厯山隂縣志貓筍花筍箭筍三品絶佳冬月取貓筍萌土中者曰菌筍尤為土産之最黃鶯筍寶慶會稽續志苦筍以黃苞推第一謂之黃鶯筍筍乾筍譜會稽煎筍乾法將小筍蒸後以鹽酢焙乾凡筍宜蒸則味全蓴萬厯蕭山縣志蓴出湘湖味至美較勝他産袁宏道越中雜記蕭山櫻桃鳥蓴菜皆知名而蓴尤美採自西湖浸湘湖一宿然後佳若浸他湖便無味浸處亦無多地方圓僅得數十丈許其根如荇其葉微類初出小荷錢其枝如珊瑚而細又如鹿角菜其凍如氷如白膠輔枝葉間清液泠泠欲滴其味香粹柔滑略如魚髓蟹脂而清輕逺勝半日而味變一日而味盡比之荔支尤覺嬌脆矣惜乎此物東不踰紹西不過錢塘以故世無知者蕨嘉泰會稽志東坡詩慚愧春山筍蕨甜今會稽以蕨配筍為茹尤珍美蔬譜會稽山間有一種似蕨而毛紫色土人謂之蕨藄亦謂之毛蕨不可食鄉人但以藏繭及藉楊梅取其性疏而不浥鬱也蕨青而藄紫故曰紫藄芹四明圖經産越中白馬山者最香美土人雜芥為葅沃以醯醬味絶妙蕺會稽風俗賦採蕺于山注岑草也越王種之名勝志蕺山少木多産蕺𢎞治紹興府志蕺葅菜越人呼臭膽草生擷有臭氣嵗歉民斸其根食之諺曰豐年惡爾臭凶年賴爾救稗史彚編越蕺葉似蕎麥地肥亦能蔓生莖葉紫赤色多生山谷隂處吳越春秋云越王嗜蕺嘗採於此山故名葛粉爾雅翼越葛花藤皆可醒酒明一統志各縣出葛粉山蔓菁列仙傳劉綱夫婦隱居四明龍泉山植山蔓菁為食婦先綱仙去謂綱曰菜熟亦仙海藻埤雅浙右山嶺重阻人鮮病癭者按本草海藻昆布青苔紫菜皆療瘤癭結氣被海之邦食此故能療之也禹餘糧𢎞治紹興府志嵊縣丫山産芝麻𢎞治紹興府志越人不多植山中有之可為油乳餅嘉泰會稽志中州􅨗潼取酪酥以雍酥為冠而越中尤佳凝厚者曰乳餅桑四明圖經有如錦之桑會稽三賦注諸暨出第一檿桑文采如博綦方正駢次有如畫作可為履𢎞治紹興府志舊志云會稽産如錦之桑然今越産多野生謂之鳥桑植者反不及之松名勝志蕭山縣北幹山多植松故有北幹松風之稱柞風土記始寧剡界山多柞木越人謂之櫪木櫟水經注若邪溪上有一櫟樹謝靈運與惠連嘗遊之作聨句題刻樹側檀淳熙雜志郊祀五輅車材以剡中檀木為之楮𢎞治紹興府志楮榖也出剡中皮斑有瓣者為楮皮白者為榖無瓣者為構柳𢎞治紹興府志出餘姚四明山俗呼西河栁其葉甚細似柏而香天將雨水則生花試之多驗櫧𢎞治紹興府志蕭山縣櫧木堰以其地舊産櫧皂莢列仙傳劉綱隱四明山觀前皂莢樹一株相傳為綱登仙之木寶慶會稽續志劉綱仙樹在餘姚祠宇觀棕櫚山隂縣志棕山産沈香樹袁宏道遊五泄記青口有古木一株土人云是沈香樹一年一花松陽木𢎞治紹興府志木甚大或云即豫章也舊志云唐時越城多生豫章樹每風雨聞鐘鼓聲宋時無復存矣貝多木𢎞治紹興府志唐貞觀間寶掌禪師所植在諸暨寶掌巖上梅餘姚縣志餘姚有古梅苔絲四垂疏花點綴他處所無梅譜項里有古梅苔蘚封枝夭矯如畫令人愛玩吳綺詩注越産雖佳移植即變不如吳興消梅嵊縣志梅有金剛拳大如桃名消梅堅脆經秋不落雪桃嵊縣志桃有冬熟者名雪桃李嘉泰會稽志李惟剡溪者見稱櫻桃嘉靖浙江通志蕭山櫻桃名櫻珠寶慶會稽續志出蕭山縣夏孝鄉宋宦者董清臣為供奉官每櫻桃宴即於未出時遣人往越貿得百顆奏曰清賞櫻桃可知越州櫻桃美矣然蕭山更勝他邑顆圓小色朱紅一二日即敗楊梅嘉泰會稽志今出項里何塔六峯塘裏其品之最佳者曰官長梅色深紫香味俱絶曰線梅有紋隆隆如線色尤紫實大核小可亞官長梅也方盛出時好事者往遊因置酒舟中高飣楊梅與樽罍相間婦女簪於髻上又以雀眼竹筥盛貯為遺唐人所稱荔枝筐不過如此萬厯蕭山縣志有接種大而味佳有草種細而味酸色深紫出湘湖諸塢者為勝方其未甚熟時以火薰之名楊梅乾極佳劒南集詩注項里鄉俗謂楊梅止曰梅謂選擇楊梅曰作梅𢎞治紹興府志上虞楊梅峯在小江上林壑茂密上多楊梅能改齋漫録越州楊梅最佳土人謂之楞梅舊浙江通志今餘姚之燭湖最佳次則蕭山陸遊六峯項里看採楊梅詩緑隂翳翳連山市丹實纍纍照路隅未愛滿盤堆火齊先驚探頷得驪珠斜簪寶髻看遊舫細織筠籠入上都醉裏自矜豪氣在欲乘風露摘千株石榴剡録越人避錢鏐諱呼石榴為金厖青棗嵊縣志嶀山棗灣有一種青者今無木瓜爾雅翼楙瓜實如小瓜而酢陶隱居云山隂人以為良果蘭亭尤多棐平泉草木記木之奇者稽山之棐會稽風俗賦火棐殼玉梨萬厯山隂縣志越人呼為梨頭如木柵之馮家梨映日紅破塘之清消梨俱最佳林檎會稽三賦注高公山出千貫文林檎蒲萄嘉泰會稽志會稽有漿水馬腦二種味亦佳栗廣志越中栗大如拳全芳備祖諸暨産如拳之栗能改齋漫録政和中詔本州貢焉栗固大於他州然如拳者終不可得橙全唐詩話張籍詩山路黃橙熟此剡中風味也橙惟剡尤多橘述異記越多橘柚園越人嵗出橘稅謂之橙橘戶亦曰橘籍吳闞澤表曰請除臣之橘籍蜜橘明一統志紹興出小橘餘姚縣志産東山謝氏園者曰謝橘小而甘金橘嵊縣志橘種有小如彈丸者名金橘如棗者名金棗如豆者名金豆山查嵊縣志生大白五龍四明諸山者樹高盈丈實如大腹子味極甜脆蔗會稽三賦注赤者名崑崙蔗白者名荻蔗赤者出會稽作乳糖𢎞治紹興府志山隂靈芝鄉出蔗羣芳譜蔗糖以蜀及嶺南者為勝會稽所作乳糖視蜀更勝蓮嘉泰會稽志山會諸水往往芙蓉環繞夏秋之間川澤如錦土人取蓮子藕根為利會稽三賦注山隂荷最盛出偏門至三山多白蓮出三江門至梅山多紅蓮夏夜香風一二十里不絶藕剡録越藕最佳謂之花下藕又特出羅文藕在禹廟前他皆不逮本草白花藕最佳為粉益人菱會稽三賦注越中所産惟羅紋菱最大嘉泰會稽志即所謂腰菱也芡嘉泰會稽志雞頭又謂之雁頭今山隂梅市之雞頭最盛有一戶種及十八里者然亦有數等小白皮最佳大白皮中白皮其皮頗堅難齧黃嫩又太軟皆不逮也其柄又可為葅甚美越人謂之藕梗其實芡柄耳牡丹花木譜越中牡丹開時賞者不問親疏謂之看花局澤國此月多有輕雲微雨謂之養花天僧仲殊越中牡丹花品序越之好尚惟牡丹其絶麗者三十二種始乎郡齋豪家名族梵宇道宫池臺水榭植之無間歐陽修洛陽牡丹花品序牡丹出丹州延州山東青州南亦出越州陸遊賞花至湖上詩吾國名花天下稀園林盡日敞朱扉蝶穿密葉常相失蜂戀繁香不記歸欲過用愁風蕩漾半開却要雨霏微良辰樂事真當勉莫遣匆匆一片飛海棠平泉草木記木之奇者稽山之海棠黃梅嘉泰會稽志剡中獨多千瓣黃梅今無又有蠟梅二種磬口者佳木蘭鎮東軍使院記大厦之前木蘭特異越城之中稱為一絶山茶學圃餘疏潯陽陶狄祠山茶一株幹大盈抱枝蔭滿庭二月三日祭時花特盛好事者分種之竟無一活紹興曹娥廟亦有之止如拱把之半土人云千年外物也杜鵑平泉草木記稽山之四時杜鵑嘉泰會稽志越人種之庭檻結為盤盂翔鳯之狀而法華山奉聖佛殿前一本高與簷等花色殷紅開時照耀牆壁皆赤映山紅袁宏道遊五泄記山中映山紅有高七八尺者與他山絶異紅桂平泉草木記木之奇者剡中之真紅桂程皓剡桂詩序李德裕嘗言洛龍門敬善寺有紅桂樹獨秀伊川嘗於江南諸山訪之莫致陳侍御知余所好因訪剡溪樵客偶得數株移植郊園衆芳色阻乃知敬善所有是蜀道苪草徒得其名桂漿沈遼桂漿詩越人逺寄桂花漿敝屋欣聞破鼻香木芙蓉平泉草木記會稽之百葉木芙蓉注即拒霜也貞桐平泉草木記稽山之貞桐注其花鮮紅可愛且耐久忍冬嘉泰會稽志一名鴛鴦藤出鏡湖水涯香如荼蘼末利可植園圃為架承之雙頭蓮會稽三賦注越多雙頭蓮白鶴花劉詵白鶴花詩注玉笥山中有白鶴花頂翅宛然薔薇平泉草木記會稽之百葉薔薇蘭羣芳譜句踐種蘭蘭渚山即王右軍蘭亭是也今會稽山甚盛餘姚縣西南並江有浦亦産蘭其地曰蘭墅洲自建蘭盛行不復齒及移入吳越輒凋有善藏者售之輒得高價而香終少減𢎞治紹興府志會稽有山蘭而無澤蘭今山蘭人家罕種謹按越絶無句踐種蘭之文因越有蘭渚其命名必有所自姑存之銀蘭嵊志百丈巖有飛瀑巖壁間嘗産銀蘭蕙餘姚縣志生深谷中惟治南大江獨産蕙因名蕙江水仙嘉泰會稽志山隂此花有兩種一曰水仙一曰金盞銀臺徐師川詩金盞銀臺何足比其香既減格韻亦下菊嵊縣志知縣施三捷署圃植菊甚盛人擬之為河陽花因有菊譜其詠詩有金絲栁玉梅白睡香毬青心玉牡丹陳獻章看菊詩扁舟何處剡溪濵夜半歸來雪滿巾爭似一瓢秋菊伴漆園風暖蝶迷人竹箭爾雅東南之美有會稽之竹箭紹興府志越産竹箭擅名今有二種大葉者名箬箭細葉者名笄箭墨客揮犀竹為竹箭為箭蓋二物也黃竹名勝志蕭山縣黃竹山竹色微黃狀如刀削相傳范蠡遺鞭所生晉竹吳越春秋越王使大夫種索晉竹十庾以復封禮筋竹𢎞治紹興府志剡中甚多其筍未成時堪為弩弦笙竹嘉泰會稽志今樂部笙率以會稽臥龍山竹為貴蔡中郎得柯亭椽竹為笛亦會稽也毛竹剡録剡之金庭有毛竹洞餘姚之四明山家亦有之嵊縣志金庭山有竹生毛節覆一節慈竹𢎞治紹興府志即桃枝竹又名四季竹作篾柔韌堪為簟越人多植之為籬其竹夏月經雨滴汁下地生蓐似鹿角色白食之止痢紫竹𢎞治紹興府志越多細竹紫竹生剡方竹生玉岑山蘆棲竹生嵊縣苦竹羅頎札記山隂有苦竹城越以封范蠡之子則越自昔産此竹矣𢎞治紹興府志苦竹與劫竹皆可作寓錢紙苦竹種有黃青白紫頓地即散劫竹有二種一種狗劫可作紙德政坊與山隂小赭等處居民作箕篩以此為業籃箊竹吳越春秋袁公即杖籃箊竹對青竹養疴漫筆竹黃而溝青每節間出惟會稽頗多彼人呼為黃金間碧玉紹興府志一名金竹一名閃竹其膚膩可作盒器篆刀竹萬厯山隂縣志出越王崢上節橫錯相間歐兜祖師遺迹也人面竹竹譜出剡山竹徑幾寸近本逮二尺節極促四面參差竹皮如魚鱗面凸頗類人面公孫竹𢎞治紹興府志高不盈尺越人以為几案之玩沙筯竹談薈越州産沙筯竹採笋者輕步從之聞聲則縮入沙中日鑄茶方輿勝覽會稽日鑄嶺其地産茶歐陽修云兩浙産茶日鑄第一嘉泰會稽志日鑄嶺産茶奇絶然有名頗晚吳越貢奉中朝土毛畢入不聞有日鑄殆出在吳越國除之後歸田録云草茶盛於兩浙浙之品日注第一青箱記亦云越州日鑄茶為江南第一范文正汲清白泉以建溪日鑄臥龍雲門之品試之云甘液華滋悅人靈襟按今會稽所産茶極多佳品惟臥龍一種得名幾與日鑄相亞臥龍者出臥龍山知茶者謂二山土脈相類信亦佳品然日鑄芽纎白而長其絶品長至三二寸不過十數株餘雖不逮亦非他産可望味甘軟而永多啜宜人無停滯酸噎之患臥龍則芽差短色微紫黑類蒙頂紫筍味頗森嚴其滌煩破睡之功日鑄有不能及顧其品終在日鑄下自頃二者或充包貢臥龍則易其名曰瑞龍日鑄他書及土人皆用此鑄字惟歐陽公歸田録則書為日注疑公自有所據其後亦有書作注者蓋自歐公始也剡録越産之擅名者有會稽之日鑄嶺茶秦望山之小朵茶陶晏嶺之高塢茶會稽山之茶山茶雲門山之丁坑茶東土鄉之雁路茶山隂之臥龍山茶蘭亭之花塢茶諸暨之石筧嶺茶餘姚之化安瀑布茶嵊縣之西白山瀑布嶺茶五龍真如茶紫巖茶鹿苑茶大崑茶小崑茶焙坑茶細坑茶而日鑄茶名最著舊志謂臥龍山茶過於日鑄若化安瀑布茶陸羽品其殊異同時號為仙茗朝沖之陸元鈞宰寄日注茶詩我昔不知風雅頌草木獨遺茶比諷陋哉徐鉉説茶苦欲與淇園竹同種又疑禹漏稅九州橘柚當年錯包貢腐儒妄測聖人意逺物勞民亦安用含桃熟荐當在盤荔子生來枉飛鞚羊葅異好亦何有蚶菜殊珍要非奉君家季疵真無情毁論徒勞世仍重爭新鬭試誇擊拂風俗移人可深痛老夫病渴手自煎嗜好悠悠亦從衆更煩小陸分日注密封細字蠻奴送槍旗却憶采擷初雪花似是雲溪動更期遺我但敲門玉川無復周公夢謹按志茶者多尚名貴茶經而後著録者夥矣今諸暨各地所産茗葉質厚味重用對乳茶最良每京年採辦入而昔人未有志及者故特拈出嵗銷最盛茗山茶名勝志蕭山縣茗山産佳茗后山茶嘉靖浙江通志茶之類有上虞后山茶酒名酒記越州蓬萊酒越酒會稽縣志越酒行天下其品頗多而名老酒者特行名豆酒者佳其法以緑豆為麯邑壤多秫少粳以此蕭釀𢎞治紹興府志蕭山縣金井為徐氏園邑人釀酒多汲取此水是以蕭釀與越酒並重麯藥𢎞治紹興府志蓼生水澤曰虞蓼今人用為麯藥鹽𢎞治紹興府志郡之所産常以竹盤燒之故味美而色白為他郡最嘉泰會稽志會稽亭戶煎鹽法以海潮沃沙暴日中將夕刮鹻聚而苫之如是五六日乃淋鹻取滷灌以竹筒取石蓮五枚納滷筒中若三蓮浮則滷將成四五蓮浮則滷成可用謂之頭滷編竹為槃槃中為百耳以篾懸之塗以石灰才足受滷燃烈焰中滷不漏而槃不焦灼玉芝嘉靖浙江通志會稽玉芝出陶宴嶺一名九臼花色正紅生葉下其根一嵗生一臼或云取其臼以麵裹炊熟吞之日三枚可以辟穀舊浙江通志一名山荷葉一名唐婆鏡其花生葉下色正紅故又名羞天花甘菊羣芳譜菊山在蕭山縣西三里山多甘菊海根本草拾遺生會稽海畔山谷莖赤色葉似菝葜而小蒸而用之味苦薄荷本草綱目吳越人多以代茶其性涼産剡山中者味厚細辛𢎞治紹興府志諸暨縣隴山産細辛蛇黃圖經本草越州有之大如丸堅如石外黃內黑蛇冬蟄時所含土到春吐之越人常以二月採虎杖圖經本草越州處處有之如竹筍狀上有赤斑點爾雅云蒤虎杖郭璞注云似葒草可以染赤羊蓍爾雅翼麥門冬越名羊蓍木蟹本草釋名即木鱉子今杭越皆有之藤生葉有五丫狀如山藥烏藤菜蜀本草今出越州蒿之類也即劉寄奴馬兜零本草注産越州七八月採紫石英元和郡縣志諸暨縣烏帶山出諸暨縣志又水石英在水中一頭微著石采取必於露未乾時禹餘糧新昌縣志水簾洞左右有圓石如拳碎之內有屑如餡或類麻豆隨人所欲而應俗傳禹餘糧今化為石可作藥蓼草吳越春秋越念復吳怨臥則切之以蓼薇草剡録五龍山重岡復嶺山坡産薇為異草蒲草嘉泰會稽志宋縣尉楊襲璋留家於汝湖之東植蒲數里遂名其地曰東蒲莎草𢎞治紹興府志薹也可織蓑諸暨泌湖多有之藍草𢎞治紹興府志可染青山隂人種之為業莞草𢎞治紹興府志有二種一為席草一為燈心草山隂威鳯鄉及戴旗山種之故有莞田赤莖草太平寰宇記越州古稱出鮮麗之物橫山産草莖赤葉青死者覆之活會稽風俗賦活人之草長生草草木疏餘姚縣上林湖盤羅石上産長生草三葉白草嘉泰會稽志出鏡湖澤畔葉漸白農人候之以蒔田葉白苗畢秀矣餘姚縣志生於水濵春夏水足三葉盡白否則止白一葉或二葉占之絶驗鹿胎草天中記嵊縣剡山一名鹿胎山昔有獵士射鹿此山鹿孕而傷既産以舌舐子乾而母死後鹿死處生草名曰鹿胎草虎茨草蕭山縣志細白花紅子而子性甚堅嚴冬雪不能敗至百年止高二三尺昌蒲嘉泰會稽志今會稽有一種葉有脊如劍謂之雁蕩昌蒲生石上節殊密當不止一寸九節今人多以拳石或沙中種之為几案之玩鵝會稽三賦注王義之愛善鳴之鵝越産之多者畫眉蟲天志過日鑄嶺稀見餘鳥惟聞畫眉而已此鳥各占一山其侣過之必苦鬭無共棲者竹雞劉基活水源記靈峯之山其上曰金雞之峯鳥多竹雞其狀如雞而小有文采善鳴杉雞臨海異物志越有杉雞常居杉樹下頭上有長黃毛冠頰正青色如垂縷可食如竹雞野鴨嘉泰會稽志野鴨頭中有石云是石首魚所化鷺嘉泰會稽志山隂瀕水人家多畜鷺皆馴不去惟白露一日必籠之不然飛去雪姑嘉泰會稽志會稽人呼燕為雪姑其色蒼白似雪鳴則天當大雪極驗寒鴉嘉泰會稽志有一種名寒鴉比常鴉頗小十月自西北來其陳蔽天及春中乃去秦太虛樂府云寒鴉萬點流水繞孤村不至越者殆不知也靈鳥會稽三賦注法華山有雙鳥雛長則送出之唯此鳥在焉故稱靈鳥吐綬鳥嵊志太白山有鳥如雞文采五色能吐綬長尺野豬𢎞治紹興府志越山中有野豬豬獾狗獾豪豬四種狸𢎞治紹興府志越山中有玉面狸文狸柿狸鰍獚狸四種猿會稽風俗賦猴玃猿狖注玃母猴狖黑猿山中多有之會稽縣志猿好踐稼會稽山間陸種如豆麥之類多為踐毁天衣寺僧法聰令捕一老猿被裘巾細縫使之不可脫縱之去老猿跳趨其群逺望而畏之皆捨去老猿趨愈急相逐日行數十百里其害稍息石首魚𢎞治紹興府志生東海中春水既至則羣至海濵淺處散子求魚者聞水底鳴如鴨乃下網其魚夜視有光鮮食甚佳暴乾成鯗蓋海味之珍嘉魚方輿勝覽蕭山縣城山上有泉多嘉魚追紅魚𢎞治紹興府志白魚生嵊縣嶀浦祠下大者二三尺頭昂者上品尾赬者名追紅春魚大業拾遺記似石首而小嵗以仲春至鹽浥而乾之名曰含肚鯽魚嘉泰會稽志蕭山湘湖之鯽珍美為越中之冠小鰿魚劉基活水源記中有小鰿魚色黑居石穴中水鼠常來食之鱖魚𢎞治紹興府志越中間有惟浦陽江為多銀魚張先入越詩春後銀魚霜下鱸逺人曽到合思吳半面魚嘉泰會稽志越王食魚未盡以半棄之水中化為魚遂無一面名半面魚能改齋漫録越王句踐之保會稽方斫魚為鱠聞吳兵至棄其魚於江中化而為魚猶作鱠形也故名鱠殘魚亦曰王餘魚吳都賦曰半則王餘王逸注曰王餘魚其身半也魚𢎞治紹興府志湖去山隂縣西北越人呼黃色無鱗有刺之魚曰此湖至今多出此魚故名非獸也三色鯉餘姚縣志自黃山港至汪姥橋曰姚江其鯉口尾青自橋而西至西石廟曰舜江其鯉口尾赤自廟而西曰蕙江其鯉口尾白而微黃共在一水分界不亂皇甫汸遊越溪詩三江橫貫兩城中同是潛鱗色不同更道芳洲多蕙草幾叢花發倚春風鯉花嘉泰會稽志越人謂鯉之小者為鯉花鱸之小者為鱸靸鯽之小者為鯽核鱧之小者為鱧鮎之小者為鮎篦皆莫詳其義小麥魚餘姚縣志其大如筯小麥熟時生産積慶寺前溪舊志作鰣魚者非烘魚餘姚縣志橫扁無鱗黃色濵海人烘乾食之風鰻𢎞治紹興府志越人每於秋中風潮起時取之謂之風鰻靈鰻墨客揮犀越州應天寺鰻井世傳靈鰻時出遊人取之置懷袖間了無驚猜有鱗兩耳尾有刃迹寓簡沈存中嘗遊會稽登天寧寺觀鰻井水之盈虧與潮相應中有靈鰻狀若殿柱人罕得見鰻線萬厯山隂縣志鰻之初生者數寸瑩白如線産三江惟清明後十日有之味鮮美雞冠蛇談薈會稽山有雞冠蛇頭如雄雞冠長尺餘圍可數寸黿嵊縣志嶀浦潭有大黿方丈許者時出曝沙間蟹萬厯山隂縣志紫蟹産上河其味尤冠絶蟹録螃本蟹周禮疏作旁取其橫行今字益蟲乃是俗加旁蟹之呼名古矣越人云和鹽泥養之可踰月石蟹劉基活水源記活水源東注若耶之溪其中有石蟹大如錢蛤會稽三賦注蛤有文故謂之文蛤元微之詩鄉味尤稱蛤蟶𢎞治紹興府志會稽蟶浦産者佳甲蟲之珍味蝦剡録越人謂杜鵑曰謝豹謝豹啼時漁人獲小蝦名謝豹蝦吐鐵餘姚縣志狀類蝸而殼薄吐舌銜沙沙黑如鐵至桃花時鐵始盡吐乃佳綾會稽三賦注越貢白編綾交梭綾十樣綾大花綾姬侍類偶煬帝以越州所進花綾獨賜司花女袁寶兒及絳仙他妃莫得羅𢎞治紹興府志越之舊産故稱越羅唐時擅名天下今織染局雖造白生羅而民間所織絶無佳者老學庵筆記遂寧出羅謂越羅似會稽尼羅花羅會稽三賦注越貢花羅紗太平寰宇記越州産緋紗交梭白紗輕容紗𢎞治紹興府志舊産蕭山夏織為上秋織次之冬織最下蓋絲遇寒即脆而帛地不堅故也皺紗剡録剡中産皺紗極精好服之如挂氷雪今不復造絹紬𢎞治紹興府志諸暨所産絹有花山桐山板橋之名紬有絲紬綿紬二種蕭絹嘉靖浙江通志紹興蕭絹初郡人蕭姓者製因名葛布越絶書葛山者句踐罷吳種葛使越女織治葛布獻於吳王采葛歌葛不連蔓台台我君心苦命更之嘗膽不苦甘如飴令我採葛以作絲女工織兮不敢遲弱於羅兮輕霏霏號絺素兮將獻之越王悅兮忘罪除吳王歡兮飛尺書增封益地賜羽奇几杖茵褥諸侯儀羣臣拜舞天顔舒我王何憂能不移苧布𢎞治紹興府志唯諸暨最精相傳以為西子遺習其種有腰機兼絲西洋生苧熟苧之别皺布𢎞治紹興府志以麻為之諸暨靈泉鄉産者精好纎密如羅潄之以水輒成縠紋名山後布嵊縣産者粗名強布剡箋嵊志剡藤紙名擅天下式凡五藤用木椎椎治堅滑光白者曰硾箋瑩潤如玉者曰玉版箋用南唐澄心紙樣者曰澄心堂箋用蜀人魚子箋法者曰粉雲羅箋造用冬水佳敲氷為之曰敲氷紙今莫有傳其術者陳端剡箋詩雲母光籠玉楮溫得來元是剡溪濆清涵天姥峯頭雪潤帶金庭谷口雲九萬未充王內史百畨聊贈杜參軍從知醉裏縱橫墨不到羊欣白練裙竹紙紙箋譜越中竹紙嘉泰會稽志剡之藤紙得名最舊其次苔箋今獨竹紙名天下遂掩藤紙竹紙上品有三曰姚黃曰學士曰邵公工書者喜之滑一也發墨色二也宜筆鋒三也卷舒雖久墨終不渝四也性不蠧五也米元章書史云豫嘗硾越州竹光透如金版在油拳上前輩貴會稽竹紙於此可見米芾硾越竹學書詩越筠萬杵如金版安用杭油與池繭高壓巴郡烏絲闌平欺澤國清華練老無長物適心目天使殘年司筆研圖書滿室翰墨香劉薛何時眼中見薛道祖和米芾越州竹紙詩書便瑩滑如碑版古來精紙難鬭繭楮成剡竹光零亂何用區區書永練細分濃淡可評墨副以溪巖難乏硯世間此理誰復知千里同風未相見雁頭箋談薈羅隱以越中雁頭箋贈萇鳯鳴氷紙草木疏江南以楮搗紙剡溪作氷紙亦取此蠶繭紙書史會要王逸少以蠶繭紙書蘭亭序寓錢紙𢎞治紹興府志山隂夏履埠出麥紙談薈浙東有麥稻桿紙大箋紙格古要論上虞縣有大箋紙一種至厚一種稍薄月面松紋紙談薈白樂天墨迹有印文曰剡溪月面松紋紙草紙山隂縣志出南池以草為之狸毛筆正統上虞縣志香狸之毛可為筆鼠鬚筆書史會要右軍書蘭亭序時用鼠鬚筆筆管四明圖經越出筆管六角扇埤雅王羲之在蕺山有老嫗持六角竹扇賣因書扇各五字蒲扇𢎞治紹興府志蒲水草可作扇蕭山鳯儀鄉民以之為業謹按會稽陶堰出紙扇甚潔緻以密節細竹為柄糊以白紙堪作書畫陸遊詩云團扇家家畫放翁謂此苮席輿地志苮草出上虞夏蓋山地人織以為席名勝志苮草席蕭山縣出竹簟西京雜記會稽貢竹簟號流黃簟麻弦越絶書麻林山句踐欲伐吳種麻以為弓弦桕油𢎞治紹興府志烏桕之實可作油今嵊縣新昌山中人家植之為業水銀𢎞治紹興府志餘姚縣龍泉山産銀沙會稽縣志銀山無草木産銀沙舊有禁恐礦氣攻田禾也銅錫越絶書赤堇之山破而出錫若耶之溪涸而出銅劉基出越城至平水記赤堇之山其東山曰日鑄有鉛錫鐃鈸百寶總珍集僧家市語呼滑仗越州多有鑄者越窑負暄雜録祕色窑器世言錢氏有國日越州燒進民間不得用故云祕陸龜蒙詩九秋風露越窑開奪得千峯翠色來好向中宵盛沆瀣共稽中散鬭遺杯乃知唐世已有非始於錢氏老學庵筆記耀州出青瓷謂之越器似以其類餘姚祕色也然粗朴不佳六研齋筆記南宋時餘姚有祕色磁粗朴而耐久今人率以官窑目之談薈吳越時越窑愈精謂之祕色即所謂柴窑也或云製器者姓或云柴世宗時始進御云謹按越紙越窑自古著名今不聞有産者然非樹萟資生之物雖缺亦不為害也浮石諸暨縣續志城東聖姑殿前流泉清溜能結浮石碧石𢎞治紹興府志山隂縣碧山産碧石寶珠石正德諸暨縣志寶珠山有細石其圓如珠故名彈丸石剡録謝巖山晉謝靈運遊此四顧放彈今有彈丸石茶上石諸暨縣續志雞冠山産奇石名茶上文石碑石𢎞治紹興府志諸暨出文石有花紋與鬱林同出碑石甚細可作碑不下湖州柘器寶慶會稽續志柘越中多有之非但葉可供蠶事其木文理縝密而黃色可愛堪為器具斑竹器述異記越中有顧家斑竹用以作牀椅及他器具甚清雅竹火籠萬厯會稽縣志竹火籠陶堰製者甚佳炭越絶書練塘者句踐時采錫山為炭稱炭聚載從炭瀆至練塘各因事名之紹興府志會稽山出浙江通志卷一百四
