body:
  text: 浙江通志卷六十九田賦三台州府臨海縣實在田伍千叄百玖拾頃柒拾捌畝陸分捌絲柒忽徵銀二萬玖千肆百叄拾陸兩叄錢二分玖毫一絲伍忽捌微玖塵一渺一漠陸埃徵米玖千叄百二拾玖石陸升玖合一勺柒抄一撮玖圭玖粟柒粒陸黍肆粞實在地一千叄百肆拾頃捌畝二分伍釐陸毫玖忽徵銀叄千叄百二拾叄兩玖錢陸釐捌毫捌絲二忽二微肆塵伍渺叄漠徵米捌百陸石伍斗柒升叄合捌抄捌撮二圭一粟伍粒肆黍實在山一千陸百伍拾陸頃叄拾肆畝叄分肆釐一毫捌絲徵銀叄百叄拾一兩二錢陸分捌釐陸毫捌絲叄忽陸微實在塘叄拾二頃叄拾捌畝二分玖釐柒絲徵銀柒拾二兩柒錢玖分柒釐一絲肆忽陸微捌塵叄渺捌漠二埃叄纎伍沙徵米肆拾肆石柒斗伍升二合玖勺叄抄柒撮柒圭二粟陸粒一黍一粞肆粳陸粃官湖一頃捌畝捌分徵銀伍錢肆分肆釐實在屯田柒拾陸畝伍分伍釐陸毫徵銀二拾叄兩二錢捌分叄釐玖絲以上共額徵銀叄萬叄千一百捌拾捌兩一錢一分陸釐玖毫捌絲陸忽肆微二塵二漠捌埃叄纎伍沙遇閏加銀柒百玖拾兩柒錢捌釐玖毫伍絲捌忽陸微二塵共額徵米一萬一百捌拾石叄斗玖升伍合一勺玖抄柒撮玖圭叄粟玖粒一黍伍粞肆粳陸粃遇閏加米一百柒拾一石二斗伍升伍合玖勺二撮肆圭黃巖縣實在田伍千肆百叄頃玖拾柒畝一釐二毫捌絲伍忽徵銀二萬捌千一百陸拾捌兩玖錢一分叄釐柒毫一絲玖忽柒微一塵一渺肆漠一埃柒纎叄沙徵米一萬柒百陸拾二石柒斗肆升陸合一抄二撮伍粟叄粒捌黍實在地陸百柒頃叄拾捌畝肆釐肆毫徵銀一千伍百伍拾肆兩捌錢肆分二釐一毫柒絲伍忽肆微玖塵徵米肆百一拾叄石一升捌合捌勺玖抄捌撮肆圭一粟實在山肆百陸拾二頃二拾畝捌分一釐二毫徵銀一百叄拾叄兩玖錢捌分肆釐叄毫伍絲肆忽捌微實在塘陸拾玖頃二拾柒畝柒分叄釐玖毫伍絲肆忽徵銀一百一拾柒兩肆錢玖分一毫陸絲伍忽捌微柒塵一渺叄漠伍埃陸纎徵米陸拾陸石一斗一升二合叄勺一撮柒圭叄粟捌粒陸黍肆粞肆粳以上共額徵銀二萬玖千玖百柒拾伍兩二錢叄分肆毫一絲伍忽捌微柒塵二渺柒漠柒埃叄纎叄沙遇閏加銀柒百柒拾一兩陸錢一分一釐伍毫一絲陸忽柒微二塵共額徵米一萬一千二百肆拾一石捌斗柒升柒合二勺一抄二撮二圭二粒肆黍肆粞肆粳遇閏加米一百玖拾石玖斗伍升肆合捌勺肆抄叄撮二圭天台縣實在田二千伍百肆拾肆頃二拾捌畝陸分一絲徵銀一萬陸千叄百伍拾肆兩柒錢柒分柒釐伍毫伍絲肆忽柒微柒塵捌渺徵米叄千伍百陸拾石二斗肆升陸合陸勺二抄二撮叄粟玖粒實在地捌百伍拾叄頃叄拾一畝捌分捌毫一絲徵銀二千二百玖拾叄兩柒錢柒分二毫捌微一塵二渺捌漠陸埃徵米肆百玖石叄斗二合伍勺伍抄柒圭叄粟二粒肆黍陸粞實在山陸百叄拾二頃玖拾肆畝伍分陸釐徵銀伍百伍拾一兩玖錢二分捌釐伍毫陸絲叄忽二微實在塘柒拾二頃二拾畝陸分捌釐徵銀柒拾陸兩陸錢捌分肆釐叄毫玖絲一忽叄微叄塵伍渺二漠徵米二拾陸石柒斗一升伍合柒勺肆抄陸撮二圭陸粟肆粒捌黍湖二拾玖畝伍分伍釐徵銀一分肆釐柒毫柒絲伍忽潭伍畝徵銀二釐伍毫魚匱磯一處徵銀叄毫以上共額徵銀一萬玖千二百柒拾柒兩一錢柒分捌釐二毫捌絲伍忽一微二塵陸渺陸埃遇閏加銀肆百柒拾叄兩一錢肆分捌釐肆毫柒絲二忽一微捌塵捌渺陸漠伍埃伍纎陸沙共額徴米叄千玖百玖拾陸石二斗陸升肆合玖勺一抄玖撮叄粟陸粒二黍陸粞遇閏加米捌拾伍石玖斗陸合陸勺伍抄陸撮仙居縣實在田二千一百玖頃二畝陸分伍釐伍毫叄絲肆忽徵銀一萬陸百柒拾一兩叄錢伍分柒釐捌毫伍絲一忽二微玖塵捌渺二漠二埃徵米二千二百肆拾二石二升叄合肆勺陸抄二撮伍粟叄粒柒黍捌粞實在地柒百叄拾肆頃陸拾一畝二分捌釐玖毫徵銀一千玖百陸拾叄兩陸錢二分二毫伍絲肆忽玖微柒塵徵米叄百柒拾玖石㭍斗玖升肆合捌勺陸抄肆撮一圭叄粟實在山陸百二頃捌拾伍畝叄分叄釐徵銀叄百叄拾柒兩㭍錢伍分一釐一毫二絲捌忽實在塘肆拾頃一拾捌畝伍分肆毫徵銀一拾兩柒錢二分玖釐伍釐陸絲柒忽玖微叄渺柒漠玖埃一纎柒沙徵米二石一斗二升玖合陸勺肆抄肆撮捌圭玖粟陸粒二黍捌粳叄粃河玖畝陸分捌釐徵銀一分肆釐伍毫二絲以上共額徵銀一萬二千玖百捌拾叄兩肆錢柒分叄釐叄毫二絲二忽一微柒塵二渺一埃一纎柒沙遇閏加銀伍百叄拾肆兩一錢叄分柒釐肆毫二絲捌忽叄微柒塵玖渺伍漠捌埃叄纎二沙共額徵米二千陸百二拾叄石玖斗肆升柒合玖勺柒抄一撮柒粟玖粒玖黍捌粞捌粳叄粃遇閏加米陸拾一石陸斗二升捌合陸勺捌抄捌撮寧海縣實在田叄千二百伍拾陸頃叄拾陸畝一分二釐陸毫伍絲徵銀一萬柒千陸百陸拾柒兩柒錢陸分陸毫叄絲捌忽陸微玖塵伍渺伍漠玖埃伍纎玖沙徵米肆千一百二拾一石伍斗玖升陸合陸勺伍抄伍撮二圭一粟陸粒肆黍肆粳一粃實在地一千伍百一拾柒頃叄拾二畝柒分陸釐陸毫肆絲徵銀叄千二百捌拾二兩肆錢叄分肆釐玖毫叄絲伍忽伍微叄塵一渺二漠徵米伍百陸拾柒石二升伍合叄勺肆抄捌撮叄粟陸粒捌黍實在山叄千一百一拾頃二拾一畝肆分二釐二毫徵銀捌百柒拾叄兩玖錢柒分一毫玖絲伍忽捌微二塵實在塘伍拾柒畝玖分叄釐二毫徵銀一錢伍分陸毫二絲叄忽二微漲墾山塘叄頃二拾柒畝陸分二釐玖毫徵銀一兩捌分一釐一毫柒絲伍忽柒微以上共額徵銀二萬一千捌百二拾伍兩叄錢玖分柒釐伍毫陸絲捌忽玖微肆塵陸渺柒漠玖埃伍纎玖沙遇閏