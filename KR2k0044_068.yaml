body:
  text: 浙江通志卷六十九田賦三台州府臨海縣實在田伍千叄百玖拾頃柒拾捌畝陸分捌絲柒忽徵銀貳萬玖千肆百叄拾陸兩叄錢貳分玖毫壹絲伍忽捌微玖塵壹渺壹漠陸埃徵米玖千叄百貳拾玖石陸升玖合壹勺柒抄壹撮玖圭玖粟柒粒陸黍肆粞實在地壹千叄百肆拾頃捌畝貳分伍釐陸毫玖忽徵銀叄千叄百貳拾叄兩玖錢陸釐捌毫捌絲貳忽貳微肆塵伍渺叄漠徵米捌百陸石伍斗柒升叄合捌抄捌撮貳圭壹粟伍粒肆黍實在山壹千陸百伍拾陸頃叄拾肆畝叄分肆釐壹毫捌絲徵銀叄百叄拾壹兩貳錢陸分捌釐陸毫捌絲叄忽陸微實在塘叄拾貳頃叄拾捌畝貳分玖釐柒絲徵銀柒拾貳兩柒錢玖分柒釐壹絲肆忽陸微捌塵叄渺捌漠貳埃叄纎伍沙徵米肆拾肆石柒斗伍升貳合玖勺叄抄柒撮柒圭貳粟陸粒壹黍壹粞肆糠陸粃官湖壹頃捌畝捌分徵銀伍錢肆分肆釐實在屯田柒拾陸畝伍分伍釐陸毫徵銀貳拾叄兩貳錢捌分叄釐玖絲以上共額徵銀叄萬叄千壹百捌拾捌兩壹錢壹分陸釐玖毫捌絲陸忽肆微貳塵貳漠捌埃叄纎伍沙遇閏加銀柒百玖拾兩柒錢捌釐玖毫伍絲捌忽陸微貳塵共額徵米壹萬壹百捌拾石叄斗玖升伍合壹勺玖抄柒撮玖圭叄粟玖粒壹黍伍粞肆糠陸粃遇閏加米壹百柒拾壹石貳斗伍升伍合玖勺貳撮肆圭黄巖縣實在田伍千肆百叄頃玖拾柒畝壹釐貳毫捌絲伍忽徵銀貳萬捌千壹百陸拾捌兩玖錢壹分叄釐柒毫壹絲玖忽柒微壹塵壹渺肆漠壹埃柒纎叄沙徵米壹萬柒百陸拾貳石柒斗肆升陸合壹抄貳撮伍粟叄粒捌黍實在地陸百柒頃叄拾捌畝肆釐肆毫徵銀壹千伍百伍拾肆兩捌錢肆分貳釐壹毫柒絲伍忽肆微玖塵徵米肆百壹拾叄石壹升捌合捌勺玖抄捌撮肆圭壹粟實在山肆百陸拾貳頃貳拾畝捌分壹釐貳毫徵銀壹百叄拾叄兩玖錢捌分肆釐叄毫伍絲肆忽捌微實在塘陸拾玖頃貳拾柒畝柒分叄釐玖毫伍絲肆忽徵銀壹百壹拾柒兩肆錢玖分壹毫陸絲伍忽捌微柒塵壹渺叄漠伍埃陸纎徵米陸拾陸石壹斗壹升貳合叄勺壹撮柒圭叄粟捌粒陸黍肆粞肆糠以上共額徵銀貳萬玖千玖百柒拾伍兩貳錢叄分肆毫壹絲伍忽捌微柒塵貳渺柒漠柒埃叄纎叄沙遇閏加銀柒百柒拾壹兩陸錢壹分壹釐伍毫壹絲陸忽柒微貳塵共額徵米壹萬壹千貳百肆拾壹石捌斗柒升柒合貳勺壹抄貳撮貳圭貳粒肆黍肆粞肆糠遇閏加米壹百玖拾石玖斗伍升肆合捌勺肆抄叄撮貳圭天台縣實在田貳千伍百肆拾肆頃貳拾捌畝陸分壹絲徵銀壹萬陸千叄百伍拾肆兩柒錢柒分柒釐伍毫伍絲肆忽柒微柒塵捌渺徵米叄千伍百陸拾石貳斗肆升陸合陸勺貳抄貳撮叄粟玖粒實在地捌百伍拾叄頃叄拾壹畝捌分捌毫壹絲徵銀貳千貳百玖拾叄兩柒錢柒分貳毫捌微壹塵貳渺捌漠陸埃徵米肆百玖石叄斗貳合伍勺伍抄柒圭叄粟貳粒肆黍陸粞實在山陸百叄拾貳頃玖拾肆畝伍分陸釐徵銀伍百伍拾壹兩玖錢貳分捌釐伍毫陸絲叄忽貳微實在塘柒拾貳頃貳拾畝陸分捌釐徵銀柒拾陸兩陸錢捌分肆釐叄毫玖絲壹忽叄微叄塵伍渺貳漠徵米貳拾陸石柒斗壹升伍合柒勺肆抄陸撮貳圭陸粟肆粒捌黍湖貳拾玖畝伍分伍釐徵銀壹分肆釐柒毫柒絲伍忽潭伍畝徵銀貳釐伍毫魚櫃磯一處徵銀叄毫以上共額徵銀壹萬玖千貳百柒拾柒兩壹錢柒分捌釐貳毫捌絲伍忽壹微貳塵陸渺陸埃遇閏加銀肆百柒拾叄兩壹錢肆分捌釐肆毫柒絲貳忽壹微捌塵捌渺陸漠伍埃伍纎陸沙共額徴米叄千玖百玖拾陸石貳斗陸升肆合玖勺壹抄玖撮叄粟陸粒貳黍陸粞遇閏加米捌拾伍石玖斗陸合陸勺伍抄陸撮仙居縣實在田貳千壹百玖頃貳畝陸分伍釐伍毫叄絲肆忽徵銀壹萬陸百柒拾壹兩叄錢伍分柒釐捌毫伍絲壹忽貳微玖塵捌渺貳漠貳埃徵米貳千貳百肆拾貳石貳升叄合肆勺陸抄貳撮伍粟叄粒柒黍捌粞實在地柒百叄拾肆頃陸拾壹畝貳分捌釐玖毫徵銀壹千玖百陸拾叄兩陸錢貳分貳毫伍絲肆忽玖微柒塵徵米叄百柒拾玖石㭍斗玖升肆合捌勺陸抄肆撮壹圭叄粟實在山陸百貳頃捌拾伍畝叄分叄釐徵銀叄百叄拾柒兩㭍錢伍分壹釐壹毫貳絲捌忽實在塘肆拾頃壹拾捌畝伍分肆毫徵銀壹拾兩柒錢貳分玖釐伍釐陸絲柒忽玖微叄渺柒漠玖埃壹纎柒沙徵米貳石壹斗貳升玖合陸勺肆抄肆撮捌圭玖粟陸粒貳黍捌糠叄粃河玖畝陸分捌釐徵銀壹分肆釐伍毫貳絲以上共額徵銀壹萬貳千玖百捌拾叄兩肆錢柒分叄釐叄毫貳絲貳忽壹微柒塵貳渺壹埃壹纎柒沙遇閏加銀伍百叄拾肆兩壹錢叄分柒釐肆毫貳絲捌忽叄微柒塵玖渺伍漠捌埃叄纎貳沙共額徵米貳千陸百貳拾叄石玖斗肆升柒合玖勺柒抄壹撮柒粟玖粒玖黍捌粞捌糠叄粃遇閏加米陸拾壹石陸斗貳升捌合陸勺捌抄捌撮寧海縣實在田叄千貳百伍拾陸頃叄拾陸畝壹分貳釐陸毫伍絲徵銀壹萬柒千陸百陸拾柒兩柒錢陸分陸毫叄絲捌忽陸微玖塵伍渺伍漠玖埃伍纎玖沙徵米肆千壹百貳拾壹石伍斗玖升陸合陸勺伍抄伍撮貳圭壹粟陸粒肆黍肆糠壹粃實在地壹千伍百壹拾柒頃叄拾貳畝柒分陸釐陸毫肆絲徵銀叄千貳百捌拾貳兩肆錢叄分肆釐玖毫叄絲伍忽伍微叄塵壹渺貳漠徵米伍百陸拾柒石貳升伍合叄勺肆抄捌撮叄粟陸粒捌黍實在山叄千壹百壹拾頃貳拾壹畝肆分貳釐貳毫徵銀捌百柒拾叄兩玖錢柒分壹毫玖絲伍忽捌微貳塵實在塘伍拾柒畝玖分叄釐貳毫徵銀壹錢伍分陸毫貳絲叄忽貳微漲墾山塘叄頃貳拾柒畝陸分貳釐玖毫徵銀壹兩捌分壹釐壹毫柒絲伍忽柒微以上共額徵銀貳萬壹千捌百貳拾伍兩叄錢玖分柒釐伍毫陸絲捌忽玖微肆塵陸渺柒漠玖埃伍纎玖沙遇閏