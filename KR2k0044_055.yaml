body:
  text: 浙江通志卷五十六水利五寧波府鄞縣附郭日湖在城中東南又名細湖縱一百二十丈横二十丈周回二百五十丈月湖在城中西南又名西湖縱三百五十丈横四十丈周回七百二十丈有竒至正四明續志日月兩湖源於四明山旁通市湖滛潦泛溢則有水喉食喉氣喉三碶以洩於江盖四眀漫流無瀦其涸可立而待江河通潮以之灌溉田皆斥鹵三碶者一邦之大利也嘉靖寧波府志三碶乆而湮塞今南北分洩行春保豐二碶平水則在城西南隅月湖之尾去郡治數十步水自它山來者由長春門而入自林村石塘來者由望京門而入皆會茲湖旁有石橋名曰平橋至正四眀續志宋寳祐間丞相吳潛於郡城平橋南立水則書平字於石視字之出沒爲啓閉注洩之準吳潜建平水則記四明郡阻山控海海派於江其勢卑達於湖其勢髙水自髙而卑復納於海則田無所灌注於是限以碶閘水溢則啟涸則閉是故碶閘四明水利之命脈而時其啟閉者四明碶閘之精神攷其為啟閉之則曰平水尺往往以入水三尺為平夫地形在水之下者不能皆平水面在地之上者未嘗不平余三年積勞於諸碶至洪水灣一役大畧盡矣己未勸農翠山自林村山西門泛舟以歸暇日又自月湖沿竹洲艤城南徧度水勢而大書平字於上方暴雨急漲水沒平字戒吏卒請於郡亟啟鑰若四澤適均水霑平字鑰如故都鄙旱澇之宜求其平於此而已故置水則於平橋下而以平字為準後之來者勿替茲哉成化四明郡志元大徳間都水營田司到路疏鑿鄞縣城外河道東錢湖在縣東二十五里唐書地理志鄮縣有西湖溉田五百頃唐天寳二載令陸南金開廣之至正四明續志一名萬金湖以其為利重也周回八十里受七十二溪之流四岸堰凡七曰錢堰大堰莫支堰髙湫堰栗木堰平水堰梅湖堰水利圖説堰之有碶閘者四曰錢曰平水曰髙湫曰梅湖大都湖髙於河開碶下注可滿三河半鄞東七鄉之田盡資灌溉奉定亦沾其利宋史河渠志乾道五年守臣張津言東錢湖方圓廣濶八百頃傍山爲固疊石為塘八十里自唐縣令陸南金開廣之國朝天禧元年郡守李夷庚重修之中有四牐七堰凡遇旱涸開牐放水溉田五十萬畝比因豪民於湖塘淺岸漸次包占種植菱荷障塞湖水紹興十八年雖曾檢舉約束盡罷請佃嵗乆菱根蔓延滲塞水脈致妨蓄水兼塘岸間有低塌處若不淘浚修築不惟寖失水利兼恐塘埂相繼摧毁乞候農隙趁時開鑿因得土修治埂岸實為兩便從之至正四明續志淳熙間請於朝大浚之魏王鎮州請於朝嘉定間提刑程覃攝守捐緡錢置田收租嵗給濬治之費寳慶間尚書胡榘守郡請於朝得度牒百道米一萬五千石又濬之懼無以繼奏以贏錢增置田畝令翔鳳鄉長主之分魚户五百人爲四隅人嵗給榖六石隨茭葑之生則絶其種淳祐壬寅郡守陳塏嵗稔農隙行賣葑之䇿隨舟大小葑之多寡聽其求售交葑給錢入元大徳間有以湖爲淺淀請以捺田若干畝入官租者都水營田分司追斷復爲湖後有司舉行淘湖拘七鄉有田食利之家分畝步髙下標撥湖葑隨田多寡濶狹俾浚之成化四明郡志明洪武二十四年本縣耆民陳進建言水利差官來董其事令七鄉食利之家出力淘浚嘉靖寧波府志宣徳間王士華以㕘政家居因田其中七鄉之民陳之監司遂得中止嘉靖九年寧波衞屯軍又請爲屯田鄞縣知縣黄仁山用父老嚴訑言勘覆不行國朝順治中以諸生陸宇􅕩條陳禁止侵湖為田廣徳湖在縣西十二里舊名鶯脰湖溉田四百頃成化四明郡志唐大厯八年縣令儲仙舟修治之唐書地理志貞元九年刺史任侗因故迹增修成化四明郡志宋熙寧三年知縣張峋令民浚湖築隄工役甚備曾鞏作記鄞縣志宋政和間邑人樓异奏眀州廣徳湖可為田八百頃募民佃租嵗入米二萬石於是西七鄉之田無嵗不旱異時膏腴今為下地廢湖之害也小江湖在縣西南三十五里唐書地理志鄮縣南二里有小江湖溉田八百頃開元中令王元偉置民立祠祀之謹按王應麟小江湖辨云唐書載鄮縣東有西湖即今之東錢湖也曾南豐記云鄞東鄉之田錢湖溉之西鄉之田廣徳湖注之可見西湖之為錢湖明矣舊志以西湖為今城中之西湖誤又唐書云鄮縣南二里有小江湖今府縣志俱云在縣西南三十五里盖唐書所云乃在鄮縣未遷之前也舒亶引水記云縣南二里小湖俗所謂細湖頭者乃其故處湖廢乆矣亦誤江塘一在老界鄉甬東隅名梅墟塘一在鄞塘鄉二十八都宋郡守吳潜增築髙厚明隆慶間縣令督同水利官築塘三千七百餘丈沿接一都圩岸為堰有三曰楊木曰下堰曰徐堰又設碶閘以時啟開梅湖塘在陽堂鄉十都四啚髙湫塘在翔鳳鄉十五都三啚十六都六啚相界平水堰塘在翔鳳鄉十六都六啚方家湖塘在翔鳳鄉十四五啚界已上四塘俱在東錢湖大嵩塘在縣東南八十里大嵩所舊未有塘國朝雍正九年建李衞大嵩塘工碑記寧郡為浙東藩籬其地濵海彌望斥鹵而鄞屬大嵩距郡八十餘里向嘗設所屯守承平既乆田野日益墾闢顧水利未修偶遇旱澇輒嗟艱食農氓病之是非疏濬河渠修建碶閘為禦鹹蓄淡之計何以轉瘠土為膏腴乎但工鉅費繁興舉匪易余仰體聖天子愛養元元之意陳請度地勢之髙下計定丈尺勅發帑金疏入報可於是相之淺深鳩集物料人夫為一勞永逸之計按大嵩形勢東南際海三面環山中有熟田暨塗田若干頃初議於大嵩港下建築巨壩使滷水不入然後疏諸山之水以資灌溉而建舵艟球琳南北大小礁横山六閘以蓄洩之迨六閘已漸告竣而港口濶深潮湧沙浮工費既浩大不貲且慮難於持乆因復酌量形勢改議於大嵩内港接連横隄之處夾河築隄退西四十餘里擇其湖水稍緩山根堅固之金溪橋内設立滚水壩一座以禦鹹潮以洩山漲而又於橋之西岸鑿山通渠建設閘口導泉水東流以溉田而分注於横山等閘以洩之當雨水和調之日滷水無憂侵浸遇溪流一綫之時亦易瀦蓄而足車戽綢繆未雨莫善於此委員分理而畚鍤隨之經始己酉之四月訖工辛亥之十月凡閲三載而大工始成余更念大嵩僻在東鄙為海口要區今茲水利既修田疇日廣户口日殷凡熬波魚販之徒出沒海嶼中譏察綦繁必得親民文吏始克勝彈壓之任疏請移郡同知一員駐劄其地俾之戢奸宄督勸課且河渠隄閘之浚築亦得以時相視葺治無俾廢墜以綿諸乆逺復蒙俞允自是而嵩之斥鹵盡為沃壤嵩之士女嵗歌大有户䝉樂利之庥世享昇平之福莫不感戴皇仁而祝萬斯年也已因紀諸石以昭永永時董理其聖夀於億事者太常寺卿署浙江承宣布政使司布政使孫國璽分巡寜紹台副使孫詔寜波府知府曹秉仁提督前營遊擊袁有明鄞縣知縣鄭大徳例得并書它山堰在縣西南五十里先是四眀山水注於江與海潮接鹹不可溉田唐太和七年令王元偉疊石為堰於兩山間闊四十二丈級三十有六冶鐵灌之渠與江截為二渠流入城市繚鄉村以灌七鄉田數千頃宋建隆間堰損水不入渠節度使錢億增築全固建中靖國改元監船塲唐意見水灑泄乃盡塞支流稍浚上源因以其土室補堰隙越一嵗復涸簽幕張必强鄞令龔行修修之嘉定七年提刑程覃攝守買田收租嵗給役夫之費督以邑丞十四年泉使魏峴委里人按渠堰碶閘之堙廢者重加修築潦則七分歸江三分入溪旱則七分入溪三分歸江明嘉靖十四年知縣沈繼美用石版監亘堰口者半髙於舊堰一尺許以故水之入溪者如故民更稱便唐家堰黄家堰俱在縣西南四十里長堰石堰范家塘堰一名檑木堰俱在縣西南三十五里朱家堰在縣西南三十五里北渡堰在縣西南三十五里宋守吳潛所創明嘉靖間復加修葺何家小堰在縣西南三十里沈家堰在縣西南二十五里徐家堰翁家堰俱在縣西南二十三里范家堰屠家堰俱在縣西南二十一里邢家堰桑塘堰陳五耆堰俱在縣西南二十里季家畣堰王師堰俱在縣西南十七里爐頭堰小沔堰蔣家堰大蘇堰俱在縣西南十五里以上諸堰俱在光同鄉王家堰在縣西南十五里段塘堰在縣西南十里張家堰朱瀨堰鄭郎堰今名鄭郎壩俱在縣西南五里瓦窰堰崔家堰俱在縣西二里和尚堰在縣西五里邵家堰在縣西十五里金家堰西渡堰朱將軍堰俱在縣西二十五里以上諸堰俱在清道鄉自它山堰至此並傍鄞江之西倪家堰在縣東五里道士堰舊名林家堰今名林郎壩在縣東南五里徐師堰在縣東三十里梅墟堰在縣東北三十里石家車堰又名舊軍堰在縣東五里王駐洋堰在縣東五里楊樹堰在縣東二十里張家堰又名楮浦堰在縣東三十里以上諸堰俱在老界鄉阮家堰又名余師堰在縣東三十里陽堂鄉渡頭堰在縣東南三十里桃枝堰在縣東南二十里陸家堰大花山堰小花山堰臨江堰俱在縣東南三十里鍾家堰施婆堰俱在縣東南三十一里以上諸堰俱在手界鄉戴將堰古塘堰俱在縣東南四十里豐樂鄉長塘堰在縣南二十五里江河夾岸為塘百丈俗呼百丈堰銅盆浦堰在縣東南十五里花堰又名蝦堰在縣西四十里蔦蓲堰在縣西南四十里以上諸堰俱在鄞塘鄉自倪家堰至此並傍鄞江之東大皎堰在縣西南七十里禪巖堰在縣西南六十里酈童堰在縣西南二十里西髙堰在縣西南六十一里杉木堰在縣西南五十六里蘭浦堰在縣西南四十五里以上諸堰俱在句章鄉泥峙堰一作泥湫堰在縣西三十五里四十七都二啚資福寺東黄梅堰在縣西三十六里以上俱在桃源鄉錢堰在縣東南三十五里老界鄉梅湖堰栗木堰俱在縣東南三十五里陽堂郷平水堰莫枝堰俱在縣東南三十六里大堰在縣東南三十七里髙湫堰在縣東南三十八里以上諸堰俱在翔鳳鄉自錢堰至此並傍東錢湖大石橋碶在縣東一里童育二山之水自此入江嵗乆湮塞宋淳祐間郡守陳塏遂於橋下作平水石堰而於浦口置閘立橋内可泄水外可捍潮元末浦漲堰閘皆廢明嘉靖三十九年尚書張時徹力言於府縣尋故道而復之永絶水患五鄉東西碶在縣東三十五里陽堂鄉即回江東西碶因定海知縣宋繼祖别碶定海之東岡而廢回江二碶霪連日霪雨東七鄉之田皆成巨浸復大石橋碶又於王駐洋之周家堰四都之楊木堰各設碶以補回江之廢則七鄉之水不為灾矣開慶碶在縣東十里手界鄉舊名雀巢碶廢宋開慶元年判府吳潛重建更名蕭臯碶在縣東南十五里明天順五年郡守陸阜重修貝則碶在縣東南三十里手界鄉宋淳祐間建明天順六年郡守陸阜重修隆慶間修理完固雲龍碶在縣東南三十里手界鄉又名荻埭碶宋熙寧間邑簿黄宁創築令曹隲成之元大徳丁未縣丞盧廷信重修明天順五年郡守陸阜修治八年郡守張瓉畢工歟碶在縣東南四十里東周碶在縣東南四十二里古塘碶在縣東南四十二里俱在豐樂鄉樟木碶在縣南三十五里鄞塘鄉明天順五年郡守陸阜修理嘉靖間派沾利鄉民一都起至三十二都協出工費修築練木碶在縣南三十五里宋寳祐間郡守吳潛建明正徳間縣令丁洪復修嘉靖間壊重葺茅針碶在縣南四十里俱在鄞塘鄉史家碶在縣南四十五里烏金碶在縣西南三十八里俱在句章鄉又名上水碶宋嘉定間重建魏峴重建烏金碶記出城南五十五里有堰曰它山唐鄮令王侯元偉所建水自越之上虞厯四明山萬壑争流演迤砰湃南注於江自堰之立約水入河乘除有數鄞西七郷為田數千頃藉以灌溉其流貫於城之日月湖闔郡之人飲焉食焉堰之利溥矣然視水之大小而提閼碶之助為多野老謂侯由堰口浮三瓢聽所止而止殆神其事今自堰出東十有