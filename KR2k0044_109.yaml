body:
  text: 浙江通志卷一百一十封爵五服之章天所以命有德也禮曰以德詔爵以功詔禄蓋時庸展親必有德者稱焉浙自於越啓疆以來凡食采於兹土者多矣惟文武忠孝能世其家者足光簡策今裁以正史間採舊志不僭不濫著於篇志封爵夏史記越世家夏后帝少康之庶子封於會稽以奉守禹之祀文身斷髮披草萊而邑焉吳越春秋少康封庶子於越號曰無余無余傳世十餘禹祀絶有人生而言語指天向禹墓曰我無余君之苗末方修前君祭祀復我禹墓之祀為民請福於天以通鬼神之道衆悦因共封立以承越君之後號曰無士周史記越世家越王句踐其先禹之苗裔二十餘世至於允常允常卒子句踐立是為越王文獻通考宋大觀四年九月十二日詔封顔祖富陽侯成化杭州府志顔祖字子襄孔子弟子唐書宰相世系表越王無疆為楚所滅子蹄更封於烏程山之陽為歐陽亭侯遂以為氏漢史記東越列傳東海王摇越王句踐之後姓騶氏漢孝惠三年舉髙帝時越功曰閩君摇功多其民便附乃立摇為東海王都東甌世俗號為東甌王按漢東甌今温州府太平寰宇記輿地志云漢文帝封東海王摇之子期視為顧佘侯至縣坐酎金失國嘉興府圖記文士傳句踐支庶封於顧邑漢書王子侯表富春侯元河間孝王子元狩二年四月封按漢富春今富陽縣謹按封爵自漢以後俱依厯代史例先叙王子宗室於前而後復以異姓功臣編年詮次漢書閩粤王傳上遣樓船將軍出武林元封元年冬入東粤東粤素發兵距嶮使狥北將軍敗樓船軍數校尉殺長史樓船軍卒錢唐榬終古斬狥北將軍為語兒侯按漢語兒今石門縣地後漢書度尚傳抗徐字伯徐丹陽人為中郎將宗資别部司馬擊大山賊公孫舉等破平之封烏程東鄉侯後漢書朱雋傳黄巾趙𢎞據宛城雋擊斬之餘帥韓忠復據宛拒雋雋大破之忠餘衆孫夏還屯宛中雋急攻之賊遂解散增邑五千更封錢唐侯詳見武功三國吳志孫堅傳堅富春人區星攻圍城邑以堅為長沙太守克破星等周朝郭石亦帥徒衆起於零桂與星相應遂越境尋討三郡肅然封烏程侯詳見武功吳志孫策傳袁術僭號䇿以書責而絶之曹公表策為討逆將軍封吳侯詳見武功嘉泰㑹稽志三國時孫䇿孫權皆嘗封會稽王孫氏之有江左實本於此吳志孫策傳權追謚策桓王封子紹為吳侯後改封上虞侯紹卒子奉嗣吳志孫韶傳韶字公禮本姓俞氏吳人孫策賜姓為孫列之屬籍權為吳王遷揚威將軍封建德侯吳志張昭傳昭字子布彭城人黄初二年權為吳王拜昭為綏逺將軍封由拳侯按吳由拳今嘉興縣地成化杭州府志郭成富春人吳拜武義校尉遷黄門侍郎封永興富春二縣侯按吳永興今蕭山縣吳志朱桓傳桓字休穆吳郡吳人孫權為將軍桓除餘姚長遷盪冦校尉丹陽鄱陽賊起桓督領諸將應皆平定封新城亭侯黄武元年曹仁遣子泰攻濡須桓身自拒泰權嘉桓功封嘉興侯吳志朱治傳治故鄣人黄武元年封毗陵侯二年拜安國將軍徙封故鄣詳見武功吉按吳故鄣今安州吳志朱然傳黄武元年拜征北將軍封永安侯詳見武功今按吳永安武康縣吳志全琮傳琮錢唐人黄武元年遷綏南將軍封錢唐侯詳見武功吳志陸凱傳凱字敬風吳郡吳人五鳳二年封都鄉侯孫皓立進封嘉興侯至元嘉禾志陸褘字元容凱子遷黄門侍郎封海鹽侯謹按海鹽縣圖經云仇志載漢封功臣衛胠為武原侯代共王子藺侯更封武原侯唐封右武衛將軍長孫裕為平原公宋封李正民平原縣伯今考海鹽之為平原雖見吳越春秋然非郡縣鄉亭之名可為封土稱者唐宋兩封當是今山東之平原况宋代五等爵尤屬虚銜乎至武原兩封亦不應混收漢縣自有武原在彭城郡若藺侯之武原漢書名標其地屬河西郡入之尤誤今並刪去吳志虞翻傳翻十一子第四子氾最知名注㑹稽典録汜以討扶嚴功拜交州刺史冠軍將軍餘姚侯詳見名臣吳志賀齊傳齊㑹稽山陰人建安二十一年鄱陽民尤突受曹公印綬化民為賊陵陽始安涇縣皆與突相應齊討破突餘黨震服三縣皆降拜安東將軍封山陰侯詳見武功三國志注孫皓即位詔曰故僕射屈晃志匡社稷忠諫忘身封晃子緒為東陽亭侯吳志孫休傳永安元年冬十月壬午長水校尉張布輔導勤勞以布為輔義將軍封永康侯嚴陵志陳惲字子厚桐廬人富陽侯碩之子仕至黄門侍郎封餘杭侯晉晉書濟南王遂傳遂字子伯宣帝弟仕魏封平昌亭侯按晉平昌今遂昌縣晉書平原王幹傳幹字子良少以公子魏時封安陽亭侯按晉安陽今瑞安縣晉書樂安王鑒傳鑒字大明初封臨泗亭侯武帝踐阼封樂安王薨子殤王籍立無嗣齊王冏以子冰紹鑒後按晉樂安今仙居縣晉書楚王瑋傳瑋字彦度武帝第五子初封始平王按晉始平今天台縣晉書會稽王傳簡文帝子㑹稽文孝王道子出後琅邪孝王年十歳封琅邪王攝會稽國五萬九千一百四十户謹按元帝中興初以皇子昱為琅邪王即簡文帝也咸和初徙封㑹稽廢帝即位以㑹稽王攝行琅邪國祀簡文帝登阼琅邪王無嗣封少子道子為琅邪王道子後為會稽王晉書河間王顒傳永嘉初詔以彭城元王植子融為顒嗣改封樂成縣王按晉樂成今樂清縣晉書裴楷傳楷字叔則楊駿誅以姻親坐去官衛瓘稱楷真正不阿附宜䝉爵土乃封臨海侯食邑二千户晉書荀朂傳朂字公曾潁川人為安陽令有遺愛文帝即位以朂為侍中封安陽子邑千户按晉安陽今瑞安縣晉書侯史光傳史光字孝明東萊掖人封關中侯泰始初持節循省風俗還奏事稱㫖進爵臨海侯子元嗣晉書周玘傳玘字宣佩義興陽羡人處之子元帝初鎮江左吳興人錢璯來冦玘討之定江南帝嘉其勲封烏程縣侯進爵為公禄秩僚屬一同開國之例子勰嗣晉書周札傳札字宣季玘之弟以討錢璯功賜爵漳浦亭侯徐馥平錄前後功改封東遷縣侯兄子贊武康縣侯次兄子勰烏程公晉書周馥傳馥字祖宣汝南安成人浚從父弟代劉凖為鎮東將軍討陳敏滅之以功封永寧伯按晉永寧今永嘉縣晉書顧榮傳榮字彦先吳國吳人以討葛旟功封嘉興伯及帝為晉王追封為公開國食邑晉書薛兼傳兼字令長丹陽人東海王越引為參軍轉祭酒賜爵安陽亭侯元帝為安東將軍以為軍諮祭酒稍遷丞相長史甚勤王事進爵安陽鄉侯晉書孔愉傳愉㑹稽山陰人建興初以討華軼功封餘不亭侯子誾嗣詳見名臣清按晉餘不今德縣地晉書徐廣傳廣字野民東莞姑幕人義熙初封樂成侯水經注謝朂吳郡太守封蘭亭侯按晉蘭亭今山陰縣地嚴陵志方操字持志淳安人孔羣嘗奏操執心正直積德慈仁累官諫議大夫尚書僕射封上虞縣公長興縣志錢寵字士驚東遷縣開國侯按晉東遷今烏程縣南北朝宋書臨海王子頊傳頊字孝烈孝武第七子大明四年封厯陽王食邑二千户五年改封臨海王户邑如故南史宋始平孝敬王子鸞傳子鸞字孝羽孝武第八子大明四年封襄陽王尋改封新安明帝即位改封始平按宋始平今天台縣南史宋永嘉王子仁傳子仁字孝龢孝武第九子大明五年封南史宋劉粹傳粹字道冲沛郡蕭人從宋武帝平建鄴征廣固以功封西安縣五等侯南史宋蔡興宗傳興宗字興宗濟陽考城人明帝定大事赭圻平封始昌縣伯固辭許之封樂安縣伯國秩吏力終以不受按宋樂安今仙居縣南齊書巴陵王昭秀傳昭秀字懐尚太子第三子鬱林即位封臨海郡王二千户南齊書桂陽王昭粲傳昭粲太子第四子鬱林立以皇弟封永嘉郡王謹按臨海永嘉二王封以鬱林即位之十一月辛亥其明年建元隆昌南齊書崔慧景傳慧景字君山清河東武城人太祖受禪封樂安縣子三百户按齊樂安今仙居縣梁書陳慶之傳慶之字子雲義興國山人以功除右衛將軍封永興縣侯邑一千五百户按梁永興今蕭山縣梁書王僧辯傳僧辯字君才太原祁人侯景遁旋軍夏首世祖策勲行賞以僧辯為征東將軍開府儀同三司江州刺史封長寧縣公逆平世祖即位以功進授鎮衛將軍司徒改封永寧縣公食邑五千户按梁永寧今永嘉縣南史梁王琳傳琳山陰人齊孝昭令鎮夀陽除驃騎大將軍開府儀同三司揚州刺史封㑹稽郡公詳見忠臣南史梁庾肩吾傳肩吾字慎之新野人厯江州刺史領義陽太守封武康縣侯至元嘉禾志蘇舉字子羽封烏程侯南史陳南康王曇朗傳曇朗武帝母弟忠壯王休光之子休光少倜儻有大志梁簡文在東宫深被知遇敬帝即位追贈南徐州刺史封武康縣公邑一千户陳書臨海王叔顯傳叔顯字子明高宗第三十子至德四年立為臨海王陳書新昌王叔榮傳叔榮字子徹髙宗第三十三子禎明二年立為新昌王南史陳吳興王承業傳承業後主長子宣帝十年封永康公後主即位為皇太子禎明二年廢為吳興王按陳吳興今湖州府南史陳永嘉王彦傳彦字承懿後主第三子至德元年立南史陳㑹稽王莊傳莊字承肅後主第八子至德元年立謹按會稽王陳書後主本紀以至德四年夏五月丁巳立南史陳東陽王恮傳恮字承厚後主第九子禎明二年立南史陳錢唐王恬傳恬字承惔後主第十一子禎明二年封陳書周文育傳文育字景德陽羡人累前後功封東遷縣侯進爵夀昌縣公子寶安嗣晉書程靈洗傳靈洗字元滌新安人紹泰元年平徐嗣徽有功封遂安縣侯南史陳錢道戢傳道戢吳興長城人隨文帝平張彪於㑹稽以功封永嘉縣侯詳見武功謹按永嘉陳書作永安南史陳駱文牙傳文牙吳興臨安人陳文帝為吳興太守引為將帥從平杜龕張彪勇冠衆軍文帝即位封臨安縣侯詳見武功謹按駱文牙陳書作駱牙文獻通考作駱文臨安陳書作常安今並依南史陳書裴忌傳忌字無畏河東聞喜人天嘉五年封東興縣侯太建元年授東陽太守封樂安縣侯邑一千户按陳樂安今仙居縣陳書張種傳種字士苗吳郡人仁恕寡欲雖厯居顯位而家産屢空太建初累賜無錫嘉興侯秩陳書孫瑒傳㻛字德璉吳郡吳人王僧辯討侯景㻛為戎昭將軍力戰有功封富陽縣侯邑一千户陳書蕭濟傳濟字孝康東海蘭陵人預平侯景功封松陽縣侯邑五百户隋隋書河間王𢎞傳𢎞字辟惡髙祖從祖弟有文武幹畧數從征伐累遷開府儀同三司賜爵永康縣公及上受禪進爵郡公隋書衛昭王爽傳爽子集字文會初封遂安王隋書蕭該傳該鄱陽王恢之孫開皇初賜爵山陰縣公隋書越王侗傳侗字仁謹美姿儀性寛厚大業二年立為越王隋書韋冲傳冲字世冲京兆杜陵人高祖踐阼徴為散騎常侍進位開府賜爵安固縣侯按隋安固今瑞安縣隋書楊文思傳文思字温才𢎞農華陰人周拜車騎大將軍從武帝攻㧞晉州以勲進授儀同三司封永寧縣公按隋永寧今永嘉縣隋書令狐熙傳熙字長熙燉煌人開皇八年為河北道行臺及行臺廢以熙為汴州刺史考績為天下最徴拜桂州總管十七州諸軍事累封武康郡公隋書樊子蓋傳子蓋字華宗廬江人解褐武興王行參軍出為東汝北陳二郡太守封富陽縣侯邑五百户隋書陳稜傳稜字長威廬江襄安人楊元感之亂稜率衆萬餘人擊平黎陽斬元感以功進位光禄大夫賜爵信安侯按隋信安今衢州府隋書周法尚傳法尚字德邁汝南安成人少果勁有風槩為陳始興王中兵參軍尋加伏波將軍數有戰功封山陰縣侯邑五千户唐書宰相世系表髙勱字敬德隋洮州刺史樂安侯按隋樂安今仙居縣唐舊唐書淮安王神通傳武德元年拜右翊衛大將軍封永康王唐書髙祖本紀武德四年夏四月甲寅封子元茂越王舊唐書吳王恪傳恪太宗第三子武德十年封吳王恪子琨琨子禕景雲十二年封信安郡王按唐信安今衢州府舊唐書濮王泰