賜鐵劵明開國功臣録朱亮祖廬之六安人洪武三年授開國輔運推誠宣力武臣榮禄大夫柱國永嘉侯食禄一千五百石賜鐵劵弇州史料劉基青田人洪武三年大封功臣手詔叙基勲伐召赴京師命兼𢎞文館學士巳封其祖父皆永嘉郡公謹按栝蒼彚紀基祖名庭槐父名爚明開國功臣録胡大海字通甫泗之虹縣人以江南等處行中書省參知政事守金華苖軍叛被害贈光禄大夫浙東等處行中書省平章政事追封越國公詳見名宦獻徴録胡深龍泉人陳友定擾邊突陣與决戰馬蹶被執遇害追封縉雲伯詳見忠臣明開國功臣録孫世廬州巢縣人積功累陞中軍都督府僉事洪武十四年贈開國輔運推誠宣力武臣光禄大夫柱國同知中軍都督府事追封富春侯宋濓林府君墓誌邦福字彦大姓林氏子溫累陞員外郎加贈奉訓大夫溫州路瑞安州知州飛騎尉追封樂清縣男吾學編徐忠字仲達合淝人建文四年封永康侯食禄千一百石與世劵永樂十四年子安嗣成化十八年孫錡嗣正德八年源嗣嘉靖三十四年喬松嗣吾學編徐理西平人從靖難有功建文四年封武康伯食禄千石與世劵永樂六年子禎嗣正統九年子勇嗣明泳化類編唐雲未詳何里人封奉天翊衛宣力武臣特進榮禄大夫柱國新昌流伯食禄一千石世襲指揮使吾學編雲事成祖藩邸最久每出師必命雲輔世子累陞都指揮使獻徴録李讓舒城人燕邸儀賓靖難兵起力戰破平安兵永樂元年進駙馬都尉封富陽侯食禄千石名山藏武義伯王通咸寧人論靖難功封特進榮禄大夫柱國伯禄千二百石賜世劵吾學編陳志巴人永樂元年封遂安伯食禄千石與世劵名山藏奉化伯滕定以出征累功宣德四年封伯禄八百石名山藏海寧伯董興有除内難功天順元年封伯禄千一百石名山藏瑞安伯王源以憲宗純皇后弟進封𢎞治五年進侯獻徴録邵林字懋清贈奉天翊運推誠宣力武臣特進榮禄大夫柱國昌化伯邵喜嘉靖初封昌化伯食禄千石與世劵子蕙嗣謹按厯代世胄勲戚凡受封浙地者無論實封虛封遥領追贈例得並載其受封始末畧舉其大要書之至功業顯著者史冊具在無庸詳述或事跡無考者則闕之若夫奸慝佞倖在王章所必斥者謹削而不書其浙人而封非浙土者俱詳人物傳中兹不具載浙江通志卷一百十
