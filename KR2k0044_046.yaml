body:
  text: 浙江通志卷四十七古蹟九金華府州舊子城萬厯金華府志在大司前譙樓至星君樓一帶及大司後披仙臺一帶是也舊經云周四里洪志云徑一里二百九十歩五尺舊有四門南保寧軍門西桐樹門北金華門東熙春門城今廢惟遺保寧桐樹二門保寧即今大司前譙樓桐樹今建星君樓於其上金華雜識婺州子城桐樹門舊有桐十餘髙與城樓齊則出狀元陳亮劉渭皆應其䜟呉寧縣城萬厯金華府志在東陽縣東二十七里地名城裏周一里遺址今存東陽縣志水門村去舊城遺址二百歩臨溪有石岸是其遺跡東陽縣舊子城東陽縣志在縣城中唐令沈彞憲築按舊圖南至碁盤頭葛宅園對巷北至龍泉坊即今前徐巷一帶東至十字街西為曹宅菴即所傳八都廢城遺址綢州城萬厯金華府志在義烏縣北百八十歩今為滿心寺萬厯義烏縣志綢州城址漫不可考相傳土中得斷砧有綢州字而不知城之盤亘止於何所今縣治正在舊綢州南一百八十歩城郭未必非其故也華川縣城方輿紀要義烏縣西南有繡川城即華川也萬厯義烏縣志華川舊縣城在今縣西南三十里周三百歩遺址莫詳義烏縣舊城萬厯義烏縣志舊志稱舊城北依山麓西帶繡湖然不紀興築為何代謹按義烏志有西帶繡湖之文疑即繡川城然里數歩數不同因並存之縉雲縣舊城萬厯義烏縣志在永康縣北古婺州城方輿紀要在今城東四十里一云去府西南四十里在今湯溪縣境内唐開元中始徙今治考湯溪縣西三里有古城山萬厯金華府志古城在府城西南四十里廣袤五六里相傳古州城遺址今屬湯溪縣界而湯溪縣新志又云古城脚在縣西五里湯塘山上闊二丈髙五尺意古之治所也漢西部都尉治元和郡縣志婺州本㑹稽西部嘗置都尉晏公𩔖要郡在金華山之陽即㑹稽西部嘗置都尉理於此呉東陽郡治水經注瀫水東逕長山縣南與永康水合縣西東陽郡治也晏公𩔖要呉寳鼎元年置東陽郡在金華山之陽瀔水之東因名東陽晉武陽軍節度治元豐九域志婺州五代晉武陽軍節度宋淳化元年改為保寧軍治金華縣方輿勝覧石晉時為武勝軍宋轉運司治萬厯金華縣志在縣治東三里瑞安坊宋轉運官行部公寓宋婺州治名勝志在子城正北署曰浙東第一臺宋通判㕔名勝志在州衙西宋紹興十三年知州周綱建今為守禦千戸所宋添差通判㕔萬厯金華府志即今府治宋紹興十三年知州周綱建宋司理院萬厯金華府志在州西今司獄司是也宋貢院東陽續志在府治西今為永濟倉元浙東宣尉司治萬厯金華府志在子城内即宋州治在府治東北今為察院行臺元録事司萬厯金華縣志在縣東二里譙樓北元至元十四年建割大雲鄉𨽻之隋長山縣治方輿紀要長山廢縣在府東唐武徳八年省入金華唐金華縣舊治名勝志在婺州東四十里宋金華縣尉司萬厯金華縣志在縣東北四里二百歩旌孝門外原與麗澤書院山長廨舍對後徙東闗馬舖嶺去縣五里呉西部三河戍名勝志孫呉置三河戍於金華之西部唐咸亨五年即其地置蘭谿縣蘭谿縣志新唐書云睦州有三河戍今蘭谿西北四十里建徳界有地名三河而不聞其嘗有戍兵東陽志但云建徳蘭谿皆舊戍之地姑存之以俟考元䝉古學正徳蘭谿縣志在譙樓南縣丞宅唐烏舞巖寨東陽志東陽縣南七里唐馬将軍陳都使置寨於此唐綢州治方輿紀要在義烏縣北以綢巖名今縣北黄蘖山下有綢巖或云州葢置於巖下唐華川縣治王褘義烏縣治記唐武徳四年置華川縣其故址在縣南三十里唐麗州治萬厯永康縣志唐武徳四年即縣地置麗州而徙縣治於城之北隋婺州戍萬厯金華府志浦江縣為烏傷之北鄙隋開皇九年為婺州戍呉豐安縣治方輿紀要在浦江縣西南孫氏分諸暨立豐安縣宋浦江縣尉司萬厯金華府志在縣東百歩按察分司即其故址呉太末縣治成化湯溪縣志在九峰山下其城闉街址厯厯尚可識焉藏春園正徳蘭谿縣志在香溪市南宋通判范滸所治中有樓外有池今已廢范浚過藏春園詩春入名園何處尋東風引歩上嶇嶔平疑四面雲嵐合曲轉一丘花木深碧草華滋迷絶徑緑蘿隂影䕶茆林韶光向此知歸處長與先生供醉吟靈洞園萬厯蘭谿縣志在棲真寺前趙志臯讀書園有自記喬氏園東陽續志在東陽縣孔山之上宋喬行簡别業左有孔山堂右有雙峴樓臨溪有水館釣臺皆理宗御書今沿河水磡尚存盧士儁喬宅園遺磡詩魯國新封甲第開園林髙下列池臺幾灣凍老氷花岸曽説當年上已杯南湖園石洞遺芳集東陽郭欽止創石洞書院其居在南湖之北由西園至南園有塘有池百畝號曰南湖有依緑堂明善堂三友堂怡偲堂東澗吟所王棶有南湖記依緑堂見記中湯致有西園明善堂記戴岷隱有三友堂記孫徳之有怡偲堂記又為東澗吟所記並見石洞遺芳陸游郭氏山林十六咏清曠亭勝遊謝車馬從此始青鞵俗士洗褊心達人増曠懐桂壑小山有桂枝名自騷人傳我欲辯其族衰病空慨然月峽我昔泝三峽仰天如疋練安得中天月正用此時見小爛柯山中一枰棊塵世底事無若復計勝負與彼亦何殊傾月種梧待鳳雛此計乃可笑不如看月墮與子舒清嘯髙碧巖我誦明逸詩豹林不可到斯山幸不逺何日欹紗帽閟雲闗白雲如髙人擇友當傲世朱門客三千一㸃不可致壺天閣吾廬在目中日可理輕䇿乃知壺中天端勝縮地脈石井酌泉嚥氷玉肝腑生慘凜老夫桑苧家頗欲續水品玉泉擿玉毁珠璣䝉荘有深㫖向郭不能傳千載付吾子飛雪我昔遊青城六月對雪山呉蜀渺萬里安得在此間玉佩羣仙停鶴馭玉佩搖空山金丹定分子往綴通明班韞玊巖蒼巖韞白璧欲上渺無路但傳太史占虹氣貫寳婺笙鶴亭兹山多異境飛仙亦税駕勿遣俗客來恐妨笙鶴下倚劍懸瀑若劍立空潭如鏡平未能照魑魅且用斬長鯨藥圃采芝夏黄公賣藥韓伯休吾友子郭子髙趣可與謀劉考陳傅良有石洞十咏過有石洞二十咏謹按石洞遺芳集石洞乃郭氏自命其園之名非山洞也雖名書院内有園亭諸名故録諸園之列隱趣園陳樵有題胡伯玉隱趣園詩見東陽縣志經鉏園倪尚忠浦江西湖塘記余於湖之西偏規為園曰經鉏門曰湖西小隱邵氏園成化湯溪縣志邵囦故園在縣北十五里地名邵園牆址屋基宛然敗甓有今是堂字跡水館韋荘有婺州水館重陽日詩雙溪館萬厯金華府志在府治東宋紹興間闢為三館雙溪居中東曰赤松西曰清和竹馬館明一統志在金華蘭谿兩界之間青霞館正徳蘭谿縣志縣北解石山一名小桃源有青霞館丹井丹竈之勝披雲館萬厯金華府志在蘭谿縣西宋紹興中建陳氏義荘東陽續志在東陽縣南宋開禧間陳徳髙建陸游為記衆樂堂萬厯金華府志在州衙後宋政和間知州吕淙建移忠堂萬厯金華府志在府治宋紹興間知州錢端禮建明一統志舊名耐寒軒魚水堂名勝志在郡圃堂下有池池中有臺跨梁其上小艇容與其間宋紹興間知州周綱重建更名與春堂澄清堂一公堂章懋重建澄清堂記元大徳中嘗即故郡治建肅政廉訪司今為廵按分廵出政之所其聽政之堂曰澄清作於至治癸亥燕處之堂曰一公作於元統乙亥外門扁曰浙東第一臺仍宋府治名也愛人堂萬厯金華縣志在縣治後圃宋紹興十二年令余翔建熙熙堂萬厯金華縣志在治後圃宋紹興中令朱冠卿改名四知堂十八年令鄭鋭夫改名清燕堂五柳堂王十朋有婺女廣文官舍五柳堂詩山橋書堂東陽山水記金華山芙蓉峰宋王埜歸隱其地理宗賜扁曰山橋書堂王埜始得山橋隱居記金華山峙州城之北屹若屏障所謂長山者是也山之可游者左赤松右智者三洞居其西北洞之勝聞於天下山之水縁澗而出者赤松智者二源然皆無懸絶竒偉之觀惟徐公湖居北山之峰絶頂水分兩派而下其瀉乎山之陽者由山橋而達於溪其注乎山之隂者由鹿田而入氷壺洞杳黙險怪水懸穴中穿雙龍洞而出臨者股立山橋一澗奔崖轉壑如紳如練乍分乍合者凡數處蓋其地之勝不特水也自潛岳寺縁澗登山可十里兩巖對峙於千仭之表皴巖怪石層見突出如鬭如揖如劃如闢而懸瀑當其中横槎渡澗疊石梯山回首南望則山川城郭極目千里為吾鄉登覽之冠嘉泰間郡守曹公㮚嘗亭其上嵗久而圯予自建安歸過而樂之欲謀隟地為書室因尋二仙遺跡將遊鹿田過山橋望兩巖間有竹一坡竹外有石一拳意其中必有佳處渉澗而觀之澗多亂石水虵行斗折或泓或激夾岸林樾幽䕃森爽其東即竹坡也竹中巨石林立錯若置棋其極大者有二一卧坡上如垂鵬翼一跨竹外如負鰲背二石夾乎兩崖之間仰視巖巔崖壁蒼峭草木薈蔚誇竒競秀殆不可狀竹外則瀑泉瀉其右支流㑹其左崢嶸噴薄細若操琴壮若奔雷水激風生凜乎不可久立坡上者俯瞰羣山之頂下視飛鳥之背天日清明直南數百里之山若開畫圖雙溪蜿蜒城郭環繞樓觀隱見於杳靄之中塔寺參差於蒼茫之外縈青繚白上與天際如凌倒景俯塵寰也此二石之勝雖三洞不能兼其美赤松智者風斯下矣山舊為胡氏業以予愛之遂舉以貿明年春始往度其地將結廬築亭為遊息之所大抵遊之曠而敞者無窈窕之趣奥而邃者乏軒豁之觀兼而有之惟兹山為然顧不為吾州之甲歟夢仙堂在金華見王栢長嘯山遊記季原書堂萬厯金華縣志在縣南罣罳山王魯齋栢與倪公度兄弟講學於此今洗研池萬卷閣遺跡猶存見山堂萬厯金華府志在蘭谿縣治東今際留倉春華堂蘭谿縣志在桃花塢潘慈明之居綵衣堂金華先民傳在蘭谿苧竿山之陽鄉人范宏作堂以悦其親仁山先生為書扁自牧堂金華府志在蘭谿縣紫巖鄉呉履讀書處春暉堂蘭谿縣志在城中唐龍建董玘為記世賔堂蘭谿縣志在天福山徐宗衡宅慈教堂蘭谿縣志在十字街趙珙兄弟事母孝因名老老堂許謙有老老堂頌見東陽縣志三槐堂金華府志在義烏縣治内元建信美堂萬厯義烏縣志在舊簿㕔宋宣和六年簿徐璪建憇堂萬厯永康縣志在縣西大觀初令徐嘉言建道愛堂萬厯永康縣志在縣治宋紹興十九年令宋授建尹穡為記退思堂萬厯金華府志在武義縣治後圃宋紹興中令衛秬建公恵堂萬厯金華府志在浦江縣治宋咸淳六年知縣王安中建清心堂清華堂萬厯金華府志在浦江縣治内宋建治内又有清華堂月泉書堂嘉靖浦江縣志在浦江縣西北宋咸淳間知縣王霖龍建金華雜識元浦江呉渭字清翁創月泉吟社延謝翺方鳳呉思齊評其髙下共收二千七百三十五卷選二百八十卷刻詩六十名以羅公福為第一其所命題則春日田園雜興也月泉吟社集吴渭誓詩壇文曰鄉邦之勝友雲從湖海之英游雷動古囊交集鉅作横陳能雄萬夫定羞與絳灌為伍如降一等乃待以季孟之間欲辛甘燥濕之俱齊固甚難以曲直輕重而見欺亦不可念偉事或偶成於戲劇彼讒言特借譽而揄揚我詩如鄫曹何幸縱觀於諸老此聲漫梁楚誓将不負於齊盟一㸃無他三辰在上裕齋東陽志在太師里理宗賜馬光祖御書魯齋何基魯齋箴序金華王子㑹之居名其齋曰魯既為記以自警復俾作箴掲之訥齋正徳蘭谿縣志香溪范伯通之居范浚記樂顔齋萬厯蘭谿縣志張景留龍舒人僑居蘭谿築樂顔齋黄溍為記愚齋蘭谿縣志范茂清築其兄浚為銘緑竹軒金華府志在府署内今名澹寧堂月鏡軒金華府志在府署内澹寧堂側氷壺軒蘇伯衡氷壺軒記魏郡鍾侯守金華創清風軒蘇伯衡清風軒記府經厯㕔事之後第一軒王栢長嘯山游記金華鹿田寺後有斷崖大石離立於竹樹間故相葉養空榜曰第一軒浸碧軒王栢長嘯山游記法清寺精廬倚翠曲池涵泚有養空所書浸碧軒髙明軒萬厯蘭谿縣志香溪范栗之居呉禮部師道名之呉學士沉為銘臨池軒萬厯金華府志在蘭谿縣學士陳達之居吴沉臨池軒詩集賢學士相門孫八法通神似右軍奉詔曽題金殿榜承恩更號玉如君山中鐵限穿成穴池上墨花凝作雲一代幾人稱絶品家鷄野鶩浪紛紛蝸殻軒蘭谿縣志趙良恭所居呉沉有記如意軒喬行簡如意軒詩注在東陽法興寺絶唱軒東陽續志在東陽縣陳樵投筆之所雙柏軒釣軒義烏縣志並在繡湖旁菊軒萬厯永康縣志在岡谷韓循仁築宋濂銘芙蓉亭萬厯金華府志在州衙後宋元豐二年春甘露降於亭知州鍾離景伯易名甘露亭野聲亭萬厯金華府志在州衙後宋大觀四年知州詹適重建改名自公堂雙溪亭趙抃有題婺州郡圃雙溪亭詩極目亭名勝志在子城上舊雙溪閣址萬厯金華府志宋紹興間知州曹璉建韓元吉極目亭記婺之牙城東西隅有亭纔數椽守周彦廣嘗取未元章所書極目亭三大字榜其上然棟宇狹甚予再為婺之明年乃闢而新焉婺城臨觀之勝有三中為雙溪樓西為八咏樓東則此亭二樓不可頻至惟極目亭在後圃之隙不必命駕得與賔客共之溪光山色竒花美卉無日而非我有也陸游極目亭詩尚書曳履上星辰少為東陽作主人朱閣凌空雲縹緲青山繞郭玉嶙峋采謡亭萬厯金華縣志在子城前宋知州吕淙建廓然亭涵碧亭萬厯金華縣志並在極目亭北宋知州周綱建一覽亭萬厯金華府志在金華縣學後宣徳三年郡守錢潤建杜桓一覧亭記郡城西南隅有老氏之官曰光孝觀觀之後有小坡隆然而起北山玉壺金盆芙蓉諸峰望之蔚然深秀東南之層巒叠嶂如萬馬奔馳或駐或躍獻秀爭竒人莫能窮其状西見蘭江諸山逺在天際雙溪二水蜿蜒如白龍西飛至城下合流而去至於原野岡陸星羅碁布於烟雲杳靄之間與夫山城雉堞之睥睨寺觀樓閣之參差一舉目而盡得之誠竒觀之地也觀今改為金華縣學嘉靖間守朱麟以太祖嘗登覽於此重建名聖覽亭通波亭金華縣志在通濟橋紹興中令朱冠卿建最髙亭名勝志在府治北宋葉蘅園内陸游最髙亭詩髙亭新築冠鰲峯眼力超然信不窮膚寸油雲澤天下大千沙界納胷中春游到處羣花擁夜飲歡然百榼空劉白老來忘世味只将詩酒伴裴公可友亭東陽志鄭剛中居坦溪上未仕時建可友亭自為記後貴復加増葺又自為記潘義榮可友亭詩君不見子猷嗜酒與俗殊愛竹不可一日無又不見太白清狂世絶倫舉杯邀月獨相親風流二子去已逺塵埃那復聞髙人鄭侯未遇身更閒躬耕自得園圃間開軒容膝日寄傲坐對嶣嶤崒嵂之西山西山蒼翠如堆玉松奏竽簧雲作屋澄鮮爽氣日月佳不學世情易翻覆田文唾面真小兒翟公署門良可悲悠悠權利亦何極樂哉此友誰能知鄭侯與我論心久年少相從今白首對山勿著絶交書要須著我成三友望西亭東陽山水記金華縣北鹿田寺後最髙處翫雲亭東陽山水記在州北密印院後山巔池亭金華雜識在金華山智者寺有碑刻陸放翁所撰池亭記御風亭泠然亭並見吕祖謙遊金華赤松記玉乳亭枕流亭雷音亭在赤松山並見王柏長嘯山游記椒亭名勝志金華縣三洞下洞之右有椒亭亭上望洞古若鐵甕極髙明亭萬厯金華縣志在麗澤書院後元建清隱亭悦心亭陳樵有金華清隱亭悦心亭詩蘭臯亭正徳蘭谿縣志在縣治即宋之蘭隂閣東峯亭名勝志蘭谿城東有亭跨東山之勝曰東峯亭萬厯金華府志舊名新亭唐洪令所建洪令失名字少卿貞元十七年為令後更名東峯今其地為景賢祠馮宿東峯亭記東陽實會稽西部之郡蘭谿實東陽西鄙之邑嵗在戊寅天官署洪君少卿為宰未期月而政成後三年夏六月余過其邑洪君導余以邑之勝賞於是有東峯亭之遊背城之闉半里而近初屆佛刹刹之上方而亭在焉松門葢空石道如帶足倦累息然後造夫極焉向之池隍館宇之多旗亭闤闠之喧途道往來之衆簿書鞅掌之繁顧歩之際忽焉如失但山風颲颲嶺雲峩峩飛軒憑空澗壑在下向背殊状昏明易色指遥青而抹黛者問之則曰某山某巖某林壑指逺白而曵練者問之則曰某洲某渚某湫某塘髙深互陳心目相競飄若象外意共幻成先是邑微登攀遊觀之所洪君挈俸錢二萬經斯營斯因地於山因材於林因工於子來因時於農隙一何易也崇山峻谷佳境勝槩綿亘伏匿一朝發明又何能也君在建中興元之間為江南西道節度曹王所知時方軍興供億倉卒賦平人和王實賴之故御史大夫鄭滑節度盧公羣與君嘗同僚每號之曰精金百錬良驥千里誠然矣然則是邑之理兹亭之勝於君之分不為難能夫播芳塵而鼔餘波者非文莫可遂攬筆為記刋於石而附諸地志焉貞元十七年記秀野亭萬厯金華府志在蘭谿縣香溪東山之側宋通判范滸建范浚秀野亭詩山作屏風雲作籬岧嶤亭子俯漣漪絶知此地風光好直謂主人心跡竒側塞亂花紅被徑檀欒髙竹翠縁陂恵連自喜陪幽賞判却歸時倒接䍦激湍亭呉師道遊小三洞記下洞為廣福院有飛亭跨水上扁曰激湍淳熙中南城曾槃立半山亭正徳蘭谿縣志縣東洞巖山之腰舊有半山亭今石磴具存范端臣丰山亭詩窈窕轉巖腹劃然見孤亭横分樹矗矗下枕溪泠泠日暮人跡絶猶聞樵斧聲山意亭東陽山水記在蘭谿縣南桃花塢東髙峰上俗呼千人樓元知州辛忍仁建呉師道有記溪山一覽亭正徳蘭谿縣志在縣北勝山坦溪山人鄭誠夫作遺址尚存池亭萬厯金華府志在蘭谿縣瑞山鄉徐秉國建以延金仁山先生今池尚存于石書池亭詩曲曲闌干面面櫺紅塵飛不到斯亭避人幽鳥入深竹戀釣遊魚弄翠萍天闊倒涵秋水碧牆低不礙逺山青翛然獨占閒中趣一枕荷風午睡醒佳山水亭東陽山水記在蘭谿城南塔下呉師道題城塔小亭詩百年老屋半蒼苔一日佳竒舊觀回浮世何曾改川岳髙懐聊復寄亭臺夜深漁艇簷間宿日落山窗竹裏開此去京華踏塵土時時應有夢飛來寒碧亭晏公𩔖要在東陽縣南五里峴山下唐寳厯二年縣令于興宗建有唐劉禹錫詩并序東陽志于興宗於亭下穿方池刻石作雙魚引水貫其中以為流觴之勝方輿勝覽寒碧亭上有鮑令巖宋元豐五年令鮑拯修禊於此石上有鮑令巖三字元祐中重建改名清虚堂方干寒碧亭詩髙低竹雜松積翠復留風路極隂溪裏寒生暑氣中閒雲低覆草片水靜涵空方見洋源牧心侔造化功水樂亭名勝志東陽縣峴山二峯對峙西峴飛瀑數丈下注於澗淙淙如漱玉宋熙寧中王槩作亭澗上名水樂亭蘇軾寄題東陽水樂亭詩君不學白公引涇東注渭五斗黄泥一鍾水又不學哥舒横行西海頭歸來羯鼓打梁州但向空山石壁下愛此有聲無調之清流流泉無絃石無竅强名水樂人人笑慣見山僧已厭聽多情海月空留照洞庭不復來軒轅至今魚龍舞鈞天聞道磬襄東入海遺聲散在海山間鏘然澗谷含宫徵節奏未成動君喜不須寫入薰風絃縱有此聲無此耳蘇轍和水樂亭詩君不見武安堂上立曲旃官髙利厚多憂患又不見夏侯好妓貧無力簾箔為衣人莫識兩人操行雖不同辛苦經營實如一不如君家激水石中流聽之有聲百無憂笙竽窈渺度溪谷琴筑悽咽穿林丘髙人處世多澹泊泉聲過耳皆為樂退食委蛇石上眠幽音斷續牀前作正如古人樂易多歡娛積土為鼔蕢為桴但能復作太古意君今水樂真有餘謹按蘇軾詩本寄題東陽水樂亭而咸淳臨安志力辨其當屬錢塘之水樂洞且云賈似道嘗得此詩真蹟題云右賦東陽水樂洞葢此地𨽻東陽村云今考錢塘縣無東陽村名且王十朋輯注蘇詩題下載蘇自注云為東陽令都官王槩作觀起句君不學云云明指王都官其屬東陽無疑白雲亭萬厯金華府志在東陽縣八華山許白雲講學之所胡翰白雲亭記距婺之東百有五十里其邑為東陽未至邑四十里其鄉為懐徳其山有曰八華山故文㦤許先生講學之所也山之麓許氏居之其兄弟曰和伯曰晉仲伯温伯恭自以其生也晚不及登先生之門幸嘗私淑諸人與有聞焉顧曕遺躅日接吾前又幸而未冺也則先生之流風餘韻被及乎山川草木者豈直吾鄉之榮哉誠有槩於心矣乃度地於山之冡構亭曰白雲而屬余以記其成白雲者先生故所自號也因其故號而扁之尚徳也乃為之記許元八華山白雲亭詩千尺嶙峋舊有亭白雲收盡八峯青我來重上松風閣急雨秋濤白日聽峯回亭東陽續志在東陽縣南桃巖之後俗稱山背亭東陽縣志元時永嘉髙則誠從烏傷黄文獻游不聞其讀書既辭歸黄偶登其所居樓見壁間書乃琵琶記草文詞淹博意義精工讀而竒之追餞此亭三杯而别因傳為三杯亭白鷺亭馬之純有白鷺亭詩見東陽縣志臨清亭通幽亭可欵亭萬厯義烏縣志並在縣治㕔事後元皇慶中建晚照亭萬厯義烏縣志在丞㕔宋紹興中沈直方建清曠亭萬厯義烏縣志在舊繡川驛宋紹興十五年令董爟建乾道四年改名徳星堂挹繡亭義烏縣志在舊繡川驛宋乾道中令張谹建溪上亭東陽山水記酥溪唐戴叔倫留詩處後人構溪上亭崇禎義烏縣志唐貞元中戴叔倫令呉寧過酥溪有詩云酥溪亭上草漫漫誰倚東風十二䦨燕子不歸春事晚一汀風雨杏花寒元至正十七年胡璉築亭溪濵以存勝蹟㑹景亭清曠亭擷芳亭緑雲亭叢玉亭素香亭繡光亭清勝亭萬厯義烏縣志並在繡湖傍鳳林亭王禕鳳林亭記鳳林亭吾王氏之所作也鳳林鄉名在義烏之南鄙飛虹亭萬厯永康縣志方巖頂兩石對豎俗呼峯門下有飛虹亭松石亭金華府志在永康縣延真觀宋嘉泰中立翫珠亭萬厯金華府志在武義縣明招寺前阮孚游處鞏豐咏翫珠亭詩明招林麓邃按古有遺蹟風流阮将軍誠不負此屐邂逅失元珠驪頷求不得何年走其中千載未有獲禪家獨眼龍來此駐缾錫羣龍竟趨之獨眼如未識任其自紛拏笑伊虚用力南渡東萊翁實在肇幽宅褒武錫元勲自天開兆域嵗時來上塜車馬隘阡陌念昔事先生同門至千百旦旦對此山相視真莫逆自閲大火災屐徑愈寥寂斯亭築山巔如人岸巾幘自徑以登亭俄然判儒釋挾朋吟松風横琴坐苔石亭居衆木間占地僅二席玲壠八窗通未覺棟宇窄被褐士所懐嗟自比秦璧照乗與藏淵其勿昧所適庶幾慰九泉夜光生麗澤若支亭子壊則付斧斤克客去我無言未開四山碧蠟屐亭武義縣志在明招山前晉阮孚好屐後人以其遊處因以名亭金貂亭吕喬年金貂亭記晉鎮南将軍阮孚之墓亭也嘗以金貂換酒後歸明招山下終焉山有蠟屐亭右名金貂識公故事也換酒亭葉適有寄吕巽伯換酒亭詩見武義縣志壺山亭萬厯武義縣志縣西壺山上有亭令張國裳為柱聯曰錦繡萬花谷乾坤一草亭水簾亭萬厯武義縣志縣南金柱山上有懸瀑鞏栗齋築亭與朱晦菴吕東萊講學於此緑映亭萬厯武義縣志在縣東宋尚書劉滂建吕祖謙題劉氏緑映亭二首凉葉飜飜不受塵芒鞵藤杖及清晨開窗水放前溪入澄緑光中獨岸巾鷺浴魚跳在鏡屏搖青浮碧太鮮明牆東種得隂成幄隔葉看來却有情月泉亭嘉靖浦江縣志在縣西月泉上其泉與月為盈虚宋政和三年令孫潮訪舊址疏為曲池築亭以備遊觀後為月泉書堂元暢樓太平寰宇記金華縣城南臨溪髙阜上有樓曰元暢宋沈約吟咏於此八詠詩注南齊隆昌元年太守沈約作八詠詩留題於元暢樓壁間萬厯金華府志八詠樓在府學西舊名元暢太守沈約建有八詠詩宋至道間知州馮伉易名八詠景祐三年知州林洙重建後改為星君樓之玉皇閣移其扁於八詠門城樓上崔顥登八詠樓詩梁日東陽守為樓望越中緑窗明月在青史古人空江靜聞山狖川長數塞鴻登臨白雲晩流恨此遺風嚴維送客之東陽詩明月雙溪水清風八詠樓少年為客處今日送君遊謝翺八詠樓詩江山此清絶寒角夢中吹飛鳥過㠶影遊塵空㦸枝水交明月動槎洑故洲移已薄齊梁士猶吟沈約詩趙孟頫八詠樓詩山城秋色靜朝暉極目登臨未擬歸羽士曽聞遼鶴語征人又見塞鴻飛西流二水玻璃合南去千峯紫翠圍如此溪山良不惡休文何事不勝衣清風樓萬厯金華府志在州城旌孝門東城上元馮伉建萬厯金華縣志縣東三里石碕巖下瞰大溪巖下有洞嘗見梅花泛出因名梅花洞樓在其上金華雜識郡城南有八詠棲其東有明月樓又東有清風樓爭雄競勝而溪山之㮣攬挹無遺矣謹按金華府志稱元指揮馮伉建考伉以宋淳化五年守金華此樓當與八詠並建蓋郡志之誤也明月樓金華游録在州城赤松門石碕巖城上宋宣和中建黄溍明月樓詩遺堞何年有飛甍壓上頭鼓鼙分大幙香火望靈湫曲岸舟如失遥沙樹欲浮登臨且吾土未敢恨淹留翠微樓輿地紀勝在州衙之北子城上宋元豐中知州范子明建萬厯金華縣志元符中知州孫載改為迎華樓雙溪樓方輿勝覽在郡城上米元章書金華府志樓俯瞰雙溪宋熙寧中建政和初知州吕淙改名疊嶂萬厯金華縣志在通逺門外雙溪合流之陽即宋麗澤書院故址舊在譙樓前外城上宋郡守黄特建米芾題金華樓金華府志在府子城上對金華山明逺樓萬厯金華府志在州西南七十三歩萬厯金華縣志樓在縣東南三里宋録事參軍廨舍跨門建樓盡見一縣山水華豐樓萬厯金華府志在金華縣南今恵民藥局宋酒務故址赤松樓萬厯金華府志在州城赤松門吕成公記平逺樓金華府志在州東清河館後盡見溪山邀月樓在赤松山見王柏長嘯山游記聚星樓萬厯金華府志宋宗室子趙良恭建在蘭谿縣隆禮坊杜清碧書扁黄文獻公記蘭谿縣志至順庚辰仲冬大雪趙敬徳置酒聚星樓上張景留錢彦明董心傳傅徳元呉敏徳源伯濬仲徐均善逢吉主賔凡十人賦詩引歐蘇二公賞雪故事亦一時之佳㑹也輝映樓陳樵輝映樓賦序東陽縣學之傍有輝映樓宋紹興二十六年令劉偉建文星樓成化東陽縣志在縣東子城之上宋寳祐元年令何宗社建白雲樓劉基有永康胡元鼎白雲樓詩聽泉樓萬厯永康縣志方巖東石谷舊有樓曰聽泉胡濟源作蘇伯衡記天階景璧樓萬厯武義縣志在白嶺張國裳重建天階景璧樓疏舊為婺星樓玻璃閣金華雜識在金華山智者寺後蘭隂閣萬厯金華府志在蘭谿縣治清心堂後宋建明洪武末即其地作望雲棲今為蘭臯亭逸老閣萬厯蘭谿縣志宋唐堯卿建今址存蒼漪閣蘭谿縣志在天福山告天臺側環翠閣東陽縣志在縣南五里中興寺後宋治平間建紹興初令王榕榜今名面香閣東陽縣志宋紹興中令留觀徳建於西北隅前植叢桂故名即縣署舊址淨照閣萬厯義烏縣志在舊丞㕔宋紹興十二年沈直方建屏風閣萬厯永康縣志方巖之頂有洞深二丈即洞為閣在佑順祠後披仙臺萬厯金華縣志又名望仙在千戸所後子城上相傳即觀星臺金華府志在子城上金華樓西前對金華山蓬瀛臺金華雜識金華山二仙祠有碑刻蓬瀛臺三字釣魚臺明一統志在府城下湖水四時清澈告天臺李得陽告天臺記蘭谿趙氏自清獻六傳而生禕禕生景文登宋進士任蘭谿簿因家焉今蘭谿稱巨族者趙氏為最立臺於縣南福山之巔以祀清獻而配以禕是臺也裔孫郡丞佑卿主之呉寧臺東陽縣志在縣圃後宋紹興十三年令呉坰建葢以呉寧舊縣之名名之也上有樓名應宿樓俞允撰呉寧臺詩琴堂晝靜鎻蒼苔髙阜峩峩繞碧隈西越山川多異産東呉花縣起靈臺霜寒歸雁梅将放日暖舒桃燕又來虚閣凌波魚涌躍誰堪作賦有鴻才天香臺東陽縣志有亭塘八景一曰天香臺湖山第一臺萬厯義烏縣志在舊丞㕔宋紹興中建登高臺金華府志在義烏縣雞鳴山上九日登髙於此觀音臺義烏縣志在派溪為十景之一兠率臺鄭東白遊永康夀山記方巖之巔有石洞洞前有臺石上書兠率臺三字相傳為考亭書按志考亭嘗與東萊龍川三先生講學於此風月臺潘珏有題府館風月臺詩見永康縣志鳳簫臺宋濂桃花澗修禊詩序浦江縣元麓山桃花澗水出焉石人立者髙可十餘尺曰鳳簫臺迴車宅萬厯金華府志在州西南二百六十歩州牧秩滿僑寓於此劉峻宅太平寰宇記金華縣徐公湖梁劉峻居此湖東山之上撰𩔖苑一百二十卷萬厯金華府志金華縣紫薇巖有講堂洞即梁劉孝標隱居講學之地著山棲志金華府志武義縣講堂山劉峻亦嘗築室講書於此何基山棲志跋靈巖古刹聞昔乃孝標之故宅此地上接紫薇巖雙龍洞天想其一時飛履上下千峯紫翠之間風致猶目前也雖遺跡不可追企而泉石影響尚存寺之法堂重葺謹以山棲志舊文鐫之此文雖齊梁間餘體而古雅特可喜所謂流洑者蓋洞天之水也劉峻始營山居詩自昔厭喧囂執志好棲息嘯歌棄塵市歸來事耕織鑿石闚嶣嶤開軒望嶄崱激水闌前流修竹堂隂植香風鳴紫鶯髙梧巢緑翼泉脈洞杳杳流洑下不極髣髴玉山隈想像瑶池側夜誦神仙記旦吸雲霞色将馭六龍輿行從山鳥食誰與金門士撫心論胸臆滕浩宅東陽人物志浩字至剛家赤松之梁山後隱於玉壺山金華府志梁山北近盤泉中有土田居民多滕姓者昔膝至剛寓此王埜宅金華府志在城山王埜四山敘詠山橋余所隱也城山余所居也吕祖謙宅萬厯金華縣志縣北四二坊儒宗嶺吕祖謙之故居唐仲友宅亦在焉東萊吕公祠堂記公晩年置屋於城之北隅以舊居歸之官後門人請於郡以舊居之半為祠堂扁以麗澤書院内為遺書閣倪普宅萬厯金華縣志在縣西南望山宋樞密倪普退隱於此每登之以望臨安許謙宅萬厯金華府志金華縣觀山謙六世祖由平江徙居於此因名許村婺書謙别字白雲山人宋亡家毁僑居城闉舒元輿宅東陽志蘭谿縣花園塢相傳為唐相舒元輿之故居蘭谿縣志純孝鄉白露山下有源曰垷坦源右有山曰舒婆塢相傳為唐相元輿故居其下有田十餘畝名曰花園塢臺榭遺址尚存有墓冇廟皆以元輿為本邑人然考之唐書以為東陽人豈其祖居東陽而遷於是耶抑唐以前郡名東陽而以屬邑槩稱未可知也名勝志武義縣書臺山亦稱元輿讀書處范浚宅名勝志蘭谿縣香山下有香溪宋范浚居其上蘭谿縣志范浚所居有慎獨齋自為記又有顔樂齋范鍾宅正徳蘭谿縣志宋丞相范公故府在純孝鄉清口公以淳祐六年乞歸里八年薨於金華驛蓋其家築室猶未就也張潤之宅萬厯金華府志蘭谿縣石阜嶺宋張潤之讀書於此築湓東書院陳萍宅蘭谿縣志元大司徒陳公故府初居桃塢後徙赤溪方太古宅婺書太古居蘭谿溪上因號寒溪子其所居有皎皎灘章懋宅蘭谿縣志其先居浦城後徙至蘭谿純孝鄉金華雜識章楓山居在白露山下斯敦宅東陽人物志呉斯孝子其宅在東陽縣東四十里斯山頭陳安居宅東陽山水記東陽有甑山上有石壇下有白雲洞東晉陳安居學道之所許孜宅成化東陽縣志晉孝子許孜宅在十六都虎峰下藍硎村婺書孜執親喪鎮宿墓所積十餘年後乃娶妻立宅墓次羅隱宅名勝志東陽縣鮑令巖右有唐詩人羅隱宅東陽縣志宅在縣南五里勒馬峯之麓墨池存焉宋元祐中建棲賢菴曹冠羅隱故宅詩翠微深處有山居騷客當年此結廬散䇿喜看遺址在便吟招隱意何如謹按羅隱新登人其宅在新城縣東五里今金華郡縣志亦載且引宋人曹冠詩為證姑録之喬行簡宅名勝志東陽縣孔山宋丞相喬行簡第在其下舊有孔山堂雙峴樓釣游亭皆理宗御書朱汛宅萬厯金華府志晉朱汛永興中任臨海太守秩滿居蒲墟村遂為義烏人宗澤宅婺書宗忠簡公有一子五孫子頴至京口止家焉遂葬公江上諸孫還烏傷者苗裔至今存呉之器有詠懐吾邑古蹟宗忠簡公故里詩見義烏縣志王褘宅金華雜識在義烏縣繡湖傍宋濂華川書舍記華川書舍者烏傷王君子充學文之所烏傷有大澤為華川今繡湖即其地子充之居直湖之隂繋以舊名志乎古也蘇伯衝夢芝軒贊序華川先生王褘生於至治壬戌生之前夕大父南稜公夢芝産於所居之軒楣有異兆也崇禎義烏縣志青巖山居王禕讀書其中自撰青巖山房記吕皓宅萬厯永康縣志縣東北桃巖有洞可容數百人宋時吕雲溪皓隱居於此胡則宅金華先民傳則永康人家於方巖後立為祠張彦卿宅東陽山水記武義縣東白陽山晉阮遥集之弟妻劉氏劉伶之女因好山水渡江來隱張彦卿為永康令亦居於此二姓子孫因家焉金談宅萬厯金華府志武義縣東小姬山晉金談為呉興太守後辭歸隱居於此李恵宅金華府志武義縣李公山宋隠士李恵居此呉萊宅嘉靖浦江縣志呉溪去縣西十里呉萊之居在焉方鳳宅謝翺遊仙華巖麓記由月泉至仙華巖麓十五里巖之麓曰鄭村友人方君韶卿廬焉金華文畧浦江仙華山殊為秀絶方鳳詩仙華矗萬仞我乃廬其東戴良宅金華府志浦江縣北九靈山戴良居此故號九靈山人龍邱萇宅金華先民傳漢新莽時隱居九峰巖今地屬湯溪縣徐安貞宅太平寰宇記九峯山有唐中書侍郎徐安貞讀書巖成化湯溪縣志在縣北十里地名洪塘後裔猶有存者蘭谿縣志東陽志載安貞為本縣人而信安志又以為龍斿人然安貞嘗讀書九峯山雖兩縣界而舊實屬蘭谿當以東陽志為是今九峯已分屬湯溪矣徐伯珍宅金華先民傳伯珍金華人其地今隸湯溪宅南去九峯山數里伯珍移居之庭除木生連理雙白鶴巢於戸牖成化湯溪縣志在縣西五里地名界牌楊與立宅萬厯湯溪縣志在縣北十里地名白馬潭金華雜識楊船山與立家蘭谿其幽居詩云柴門閴寂少人過盡日觀書口自哦餘地不妨栽竹本放聲啼鳥往來多謝后宅金華府志湯溪縣西南苦竹源宋理宗后謝氏所居之地今其宅匯為深淵月榭萬厯金華府志在府城上宋元祐間建八位門萬厯金華縣志在坦溪以宋鄭剛中有八曾孫伯衒伯謙伯源伯衎伯光伯永伯承伯慧皆登顯仕而名靈洞山房蘭谿縣志在栖真寺前趙志臯讀書處二酉山房蘭谿縣志北城思親橋畔胡元瑞藏書於此王世貞記胡應麟二酉山房記書以經𩔖者三千七百餘卷以史𩔖者再倍之子三倍集四倍凡三萬六千巻有竒友人黎維敬題曰二酉山房月區金華雜識蘭谿北胡玹伯玉之居有明逺樓左有一區穹窿其巔周密四旁堊以白竅其前如月形障以紙天光照映虚明常若月在其所扁為月區茶院東陽山水記去東陽縣治東五十里曰獨山望如城郭中為深塢唐宋時百司常治茶於此設茶院東巖書舍崇禎義烏縣志在縣東二十五都清徳里滴水巖宋虞復建遺址尚存水竹洞天宋濂水竹洞天記同郡胡君伯器世居烏傷酥溪之上其地山環水縈伯器擇其勝者作亭其間扁曰水竹洞天而請國子助教鄭濤篆之鶴鳴畈金華雜識在永康縣東北三十里俗傳梁時石翁山鑿石有雙白鶴飛出佚老菴吕祖謙佚老菴記横山呉君泯治别室之西偏榜以佚老菴在永康縣三陽小隱嘉靖浦江縣志在仙華之麓宋趙崇袍於此植梅數里名曰梅塢明張應槐仍舊址結廬曰三陽小隱鄭氏義門柳貫鄭氏義門記吾里鄭氏以義門被旌表自其逺祖淮與二兄居於承恩里其後浸盛名其地曰三鄭及八世不裂籍以為異用故事賜旌表大書其門曰孝義鄭氏之門鄒奕白麟溪鄭氏義門詩麟溪流水漾清輝華揳文光動紫微九世同居端有義一門純孝在無違桂林秋露侵黄巻棣萼春風照綵衣昔日千齡同不朽五雲製錦出綸闈靈淵精舍嘉靖浦江縣志縣東東明山元青田尉鄭徳璋創精舍於此以教其族人内有成性四勿繼善九思四齋傍有水一泓曰靈淵淵東百歩有梅花泉石室嘉靖浦江縣志在烏蜀山柳貫讀書之處髙敞可容百餘人青蘿山房婺書宋濂授經浦江鄭氏樂其門風因築室於浦江之青蘿山作山房志浦江縣志山房前舊有石一片刻曰宋公園王汶遊青蘿山記宋公園宋太史來遷於此偶閲宋嘉定末官給地劵而此園已先有宋公之名太史嘗嘆其數已前定盧畈成化湯溪縣志縣東南有輔倉源昔昭利侯盧文臺嘗耕於此故名百花㕔萬厯湯溪縣志在縣南三里地名上境宋理宗為駙馬劉文彦建花錦地金華府志在金華縣西五里有石如錦因名又永康縣西三十里有石廣數丈文采如錦古柏垣蘭谿縣志古柏垣在徐用檢瞻菴内楊溪橋之東相傳柏植於宋元間明太祖取婺時曽駐師其下浙江通志巻四十七
