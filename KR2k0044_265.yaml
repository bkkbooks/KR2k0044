body:
  text: 浙江通志卷二百六十六藝文八碑龍井題名宋秦觀元豐二年中秋後一日余自吳興道中東還會稽龍井有辨才大師以書邀余入山比出郭日已夕航湖至普寧遇道人参寥問龍井所遣籃輿則曰以不時至去矣是夕天宇開霽林間月明可數毫髪遂棄舟從参寥策杖竝湖而行出雷峰度南屛濯足於惠因澗入靈石塢得支徑上風篁嶺憩於龍井亭酌泉據石而飲之自普寧經佛寺十五皆寂不聞人聲道傍廬舍或燈火隠顯草木深鬱流水上激悲鳴殆非人間境行二鼓矣始至壽聖院謁辨才於潮音堂明日乃還嚴州烏龍廣濟廟碑宋陸游山川之祀自虞書以來見於載籍與天地宗廟竝或謂山川興雲雨澤枯槁宜在秩祀非必有神主之以予考之殆不然維嶽降神生甫及申山川之神降而為人與人死而為山川之神一也豈幸而見於經則可信後世則舉不可信耶栁宗元死為羅池之神其傳甚怪而韓文公實之張路斯自人為龍廟於潁上其傳尤怪而蘇文忠公實之盖二神者所傳雖不可知而水旱之禱卓乎偉哉不可冺沒則二公亦不得而揜也予適蜀見李冰張惡子廟於離堆梓潼之山皆血食千載非獨世未有疑者葢其靈響暴著亦有不容置疑者矣嚴州烏龍山廣濟廟之神曰五顯仁安靈應昭惠王舊碑以為唐貞觀中人姓邵氏所記甚詳雖幽顯殊隔不可盡質然神靈動人如羅池變化不測如潁上歴數百年未常少替而朝廷之所褒顯吏民之所奉事亦猶一日此烏可以幸得哉至於紹興辛未東海之師羣見巨人皆長丈餘戈㦸麾旄出沒烟雲間則相告曰烏龍神兵至矣或降而遁去無敢枝梧者是又與東晉八公山及慶厯嘉嶺神之事相埒然彼皆在近境而此獨見於山海阻絶數千里之外豈不尤異也哉不得韓蘇之文以侈大其傳而邦人進士沈奐顧以屬筆於某辭卑事偉有足恨者乃作迎送神詩一章使幷刻之寶慶元年十月甲子也其辭曰王之生兮值唐初基龍翔於天兮英雄是資獨沉草萊兮黙不見施巉然萬仞兮胸中之竒使得小試兮冒白刃而搴朱旗丈夫戰死兮固亦其宜死於不遭兮精神曷歸王亦何懟兮人則為悲烏龍之山兮跨空巍巍築傑屋兮奉祠釀桂兮羞芝彈箜篌兮吹參差王捨斯民兮逝何之錫以澤兮燕及惸嫠歳屢豐兮長無凶饑擁羽葢兮駕玉螭時節來享兮民之依國有征誅兮克相王師長戈大纛兮肅肅隂威平河雒兮前功弗隳隆名顯爵兮永世有辭洞霄宫碑宋陸游造化之初昆侖旁薄一氣既分天積氣於上地積塊於下明為日月幽為鬼神聚為山嶽海瀆散為萬物萬物之最靈為人人之最靈為聖哲為仙真而道為天地萬物之宗幽明鉅細之綂此伏羲黄帝老子所以握乾坤司變化也其書為易六十四卦道德五千言陰符西昇度人生神之經列禦寇莊周關喜之書其學者必謝去世俗練精積神棲於名山喬岳略與浮屠氏同而篤於父子之親君臣之義與堯舜周公孔子遺書無異也臨安府洞霄宫舊名天柱觀在大滌洞天之下葢學黃老者之所廬其來久矣至我宋遂與嵩山崇福宫獨為天下宫觀之首以寵輔相大臣之去位者亦有以提舉洞霄召拜左相者則其地望之重殆與昭應景靈醴泉萬壽太乙神霄寶籙為比它莫敢望在真宗皇帝時始制詔改宫名賜金寶牌又賜仁和縣田十有五頃奉齋醮悉除其租賦至政和間宫以厯歳久穿壞漫漶徽宗皇帝降度牒三百命兩浙轉運司復興葺之歳度童子一人為道士建炎中又廢於兵火髙宗皇帝中興大業聞之當宁太息乃紹興二十五年以皇太后之命建昊天殿鐘樓經閣表以崇閎繚以修廡費出慈寧梓匠工役具於修内歩軍司中使臨䕶犒賜踵至既不以命有司而山麓之民亦晏然不知有役一旦告成金碧之麗光照林谷鐘磬之作聲摩雲霄見者疑其天降地涌而神運鬼輸也可謂盛矣及上脱屣萬機順神物表遂以乾道二年自德壽宫行幸山中駐蹕累日勅大官進蔬膳御翰墨書度人經以賜自有天地卽有此山殊尤之迹未有若此者慶元六年九月葆光大師宫都監潘三華與知宫事高守中同知宫事丘居仁以告山隂陸某曰願有紀以為無窮之傳某以疾末能屬稿後三年同知宫事王思明與其徒李知柔杭濤江入東繼以請乃叙載其本末如此且為之銘曰在宋祥符帝錫之書乃作昭應比隆羲圖元豐景靈列聖攸居元祐上清以祝帝儲棟宇煌煌煥於天衢徽祖神霄誕彌九區迨我高皇東巡於呉睠言天柱鎮兹行都警蹕來臨神明翊扶乃御幄殿穆清齋居天日下照雨露普濡迨今遺民注望屬車三聖嗣興光紹聖謨千礎之宫鶱騰太虛寶磬鴻鐘震於江湖肆作頌詩用紀絶殊施氏節行碑宋汪藻孺人施氏四明人故府君周公諱良史之妻故宣德郎贈少師諱弁之母今台之寧海縣東四十里有嶴介於數山之間清溪周其前大海環其外水石參錯桑麻雜植其中多周氏居葢其故第也施氏於四明為望族孺人有容色性行其家慎擇所配時府君雖不事官學而以能文稱居鄉慷慨有器度喜周給人頗推長老故施氏以歸之周之先嘗縱大舶出海上府君至府不肯離其家納孺人之明年侍其父適日本國去二月而生少師後七年而府君哀訃至少師生府君旣不及見而孺人年二十二孀居家貧其父母欲奪而嫁之毅然守志不可回先此閭里未知讀書而孺人始敎其子有憐之者則曰莫若使田富貴焉可必有誚之者則曰是見錢遲其窮可立待也孺人則自信不疑而敎之愈篤乃遣就舅家求良師友以訓誨之少師少苦瘡痬累年不能療孺人親自撫視至達旦不寐方是時家惟四壁而孺人一寡女子倚少師為命而少師又多病人莫不為孺人危之少師每學於他郡或馳赴京師行之日飯素禱於家俟其還無恙乃為肉食自學以至仕裝橐悉自辦不取諸隣里至鬻衣奩以資之有賔客至必親為之執㸑具食無少倦故少師益得以結賢士大夫就成其業年十八薦於鄉三薦登進士第先是台州舉進士者曠嵗不得一人至少師而以文章取高第於是乃知孺人為善敎子也嘉祐六年少師釋褐主越州會稽簿遷建之松溪婺之武義黃之黃陂三縣令得以祿及其親者十有九年孺人以元豐三年七月初五日卒於黃陂之官舍享年七十有四後十三年宣德郎卒於官諸孫始遷孺人之柩與少師葬於江寧府上元縣金陵鄉紫金嶺政和三年冬孫炳煒援元圭霈恩叙孺人起家本末乞封於朝廷朝廷審其不誣加以今號迺降訓詞曰朕荷天景貺嘉與宇内共承兹休汝胚胎吉祥慶鍾來裔二孫瀝懇祈渙異恩朕方篤孝治以一天下錫此命書其克歆享嗚呼孺人夙有淑德中外所知鬱而不彰存殁為恨一旦朝廷恩逮九泉發徽音於數十載之後命下之日聞者榮之孺人性剛動有法度接宗族鄉里以和孝聞飭身儉約不妄孀居五十餘年未嘗出閨閣而家悉自主之不以累其子使得悉志於學洎少師登第孺人年五十六矣猶敎諸孫亹亹不已而炳煒最早被誨育以故同年登第炳任左中大夫知瓊州軍州事煒任右中大夫知汾州軍州事炤瓊燦爟皆舉進士炬右迪功郎池州青陽縣主簿曾孫道右承議郎知化州軍州事造右朝請大夫知泉州軍州事苯文林郎撫州司士曹事芊右從事郎真州六合主簿萃右承直郎監杭州軍資庫兩浙東路安撫准備差使庠右迪功郎建州松溪縣尉蓁右從事郎監潭州南岳廟元孫彭右從事郎黃州軍事判官彤彰之美竝右迪功郎其餘舉進士者又二十餘人源深流逺子孫詵詵久而益盛實由孺人起艱難守節義慨然保育其孤以致今日异哉孺人生有偉節沒有榮聞刋之琬琰垂之簡冊可以勸慈母而勵節婦矣然不得鴻儒大筆表千載殊特之遇則埋光泉壤何以詔天下後世是用備述孺人顯著之迹與夫宗族之景仰稱道者以俟異時史氏之所採擇慶元二年春三月帝禹廟碑元鄧文原至大辛亥紹興路重修帝禹廟成江浙行中書省平章政事臣某等遣使驛聞請紀其事鑱諸樂石而以命臣文原制曰可顧臣愚陋嘗待罪詞林今又職司儒校敢不對揚丕顯式昭毖祀垂憲來今謹按史載帝卽位會諸侯江南計功而崩因葬焉其事與禮記言虞帝南巡葬蒼梧者皆謂相傳已久至於封泰山禪會稽則尤為後世侈功好大者之論而非聖人崇德務本意也嘗以五服計其道里遐邇則會稽實在要荒之外先王省方肆覲政敎是敷非若馭八駿樂觀游除道周衛而勤民於逺然帝自肇功疏鑿告成錫圭躬膺厯數年逾百嵗矣猶不肯一日自暇逸以居於萬民之上則夫子所謂有天下而不與者豈非萬世之大訓哉厥初巨浸稽天民用昏墊就任已溺懋於奮庸天啟聖仁聲律身度勩躬胝胈以宣地利以奠民極功施無窮考禮報本匪越人所私爰自少康之庶子無餘始封而命祀葢少康距帝僅五世嬰時投艱復修墜緒一成一旅祀夏配天不失舊物繄帝之德足以繫屬天下而庶子無餘亦克胙於東土世席休光以及周之末季凡越之人羣居耕鑿服習聲敎遡原而上曷可食息忘也矧覩其因山之制而遺衣服藏焉厯世推崇或著禎祥神兹顧享皇元受命義周仁洽綏定幅員稽古版圖貢輸則在昔九州區域止及海内職方之大軼古無倫追惟有夏治格幽明山川鬼神壹是寧謐列聖繼承用𢎞兹道誕降璽書凡在祀典者命有司肅修時祭棟宇傾圯官為繕完若江浙所理聖王之祀宜莫先會稽焉戊申嵗越土荐饑疾癘仍臻民多流殍臣某以季冬來領郡事慨然曰古者二千石期以共理當為民省憂吾其敢怠忽明年春白於宰臣凡荒政若干事既得請還謁祠下周視梁橑風雨欹壓黻冕弗治丹雘漫漶先是宋政和間卽廟為觀邇年更為寺嵗侵視䕃百廢莫興乃首議復廟田之私質於民者以贍衆鳩工充具傭役惟時鉏荒斧堅民士競勸礱石以楹陶甓以甃庭觀嚴敞殿廡翼衛若帝臨止川谷賁輝以帥府命給中綂楮幣二百七十一定有竒是役之興庶幾乎知成民而後致力於神者矣竊惟帝之平水土也九賦旣均又曰六府三事以示天下萬世治道之本獨洪範九疇未嘗為虞帝敷陳其説後千有餘年箕子始以為武王告使箕子䝉難而不獲信其志又無武王者興則九疇將遂堙而無傳乎自夏歴商孰傳之而至箕子其事逺莫可考世知帝功與天地竝而洪範九疇鮮有能研精理奥究諸力行者使其書徒以言語傳漢儒旁摭庶徴推致五行其言非不較著明甚而先王綜理天人之奥亦已㣲矣八卦九疇道相經緯天所以畀聖王夫豈偶然哉聖上纘承大寶丕建皇極中外大臣務肩忠藎謨協贊襄葢將挈斯世而躋之三王之盛神人具孚嵗則順成慶浹華裔惟帝降靈兹土嘉飫德馨亦永永億萬年無斁臣謹稽首再拜而為之詩詩曰淛河之東有山鬱蒼鎮於南土夷視崇岡昔帝會同圭璧斯皇翩其颷馭若帝陟方若彼橋山弓劒是藏維是横流潰潰懷襄燥川靜谷成賦定疆帝躬菲惡俾民樂康鑄鼎象列謹訓範防功加九有道尊百王世嚴秩祀登薦肅將牧臣有惕顧視榛荒乃堂乃構邃宇周牆吉蠲來享雲斾龍章繄帝贊育時厥雨暘物消疵癘嵗詠茨粱永祐皇圖儲慶發祥卽山勒銘德逺彌光北嶺將軍廟碑明劉基諸曁東北百里為蕭山其山曰北幹浙水帶其隂湘湖滙其陽東望會稽至於大海日之所出其上為星紀婺女之辰故神甚靈能祛疫癘作雲雨人有祈必應為立廟於山尊其神曰北嶺將軍嵗祠焉宋徽宗時方臘反睦州入杭具舟將渡江吏民大懼相率禱於神比寇至有風逆其舟且見甲士列岸上乃不敢渡宼平知越州劉韐上其事於朝賜額曰武佑廟後封顯應侯再封靈順顯應侯至正十二年妖賊入江浙𤇺火通於蕭山百姓驚竄市井皆空主簿趙君某至縣甫八日即自徃西興募民備禦而江上守兵甚寡弱無頼子競起為刼應賊衆洶懼君卜於神神許吉衆心稍安君乃遣人捕為刼者悉誅之有自賊中來言賊欲攻浙東見江岸列甲卒旗幟以故畏憚無東心賊退邑人皆德趙君趙君曰吁兹惟神之功予何庸焉明年大旱君徃禱輙得雨衆益信神之靈而大敬趙君之能以誠感神也廟在山之岡嵗久朽壞惟神所居室獨存君念無以報神貺乃以其俸錢新廟邑人大喜爭助十有五年春廟成為堂三間三門兩廊像設器用無不備惟所存堂仍其舊繚以垣墉甃以瓦石植以嘉木丹堊輝映吏民承祀益䖍三月壬寅予自杭還越過蕭山趙君請記按祭法能禦災捍患則祀之今神能降雨澤蘇枯槁又隂力却賊以保全民物所謂禦災捍患孰有大於此哉趙君愛其民能敬事神而獲祐可嘉也予喜而序其事復為之歌俾祀神焉其詞曰青山兮幽幽綠蘿含烟兮樹木稠望夫君兮悵悠悠巖阿寂寥兮使我心愁雷為車兮雲為馬輕霞動兮江色赭神之來兮風振野吹竹兮彈絲女巫舞兮紛陸離奠芳醴兮薦潔粢留靈修兮牢純禧驅魃􅈮兮逐狼虎弭毒沴兮時暘雨禾麻成兮息桴鼓物既偹兮禮無愆和熙洽兮洞淵元為城為堡兮式恒且堅保佑我民兮樂以永年處州分元帥府同知副都元帥舒穆嚕公徳政碑明劉基至正十六年季春予自杭歸處父老率子弟遮道言分元帥府同知副都元帥舒穆嚕公政曰徃㣲公吾聚為墟今㣲公吾屬為菹生我者天而活我者公君其知乎曰然夏五月豪酋納款父老又率子弟造於庭曰舒穆嚕公邦家之干城民之父母也父母鞠子罔不殫厥誠厥子雖冥鮮不念覆育恩惟公有大造於我州曷以報公願繪像於祠且勒石紀功用示於州子孫弗忘請為之文予謝弗能父老復進曰君以丞相命布宣天子威德既恊於逺人旌庸錄勲達丞相心以勸後人時惟至公予弗敢辭按公姓舒穆嚕氏名宜孫舊為契丹人其先御史大夫以黑軍助世祖皇帝滅金四世祖昭毅大將軍受命南伐克襄樊定爵三品為沿海萬户佩虎符鎮處婺由是居江南好讀書工文章元綂中襲爵鎮守處州大得軍民心數嵗以爵讓於弟而退處天台山中十一年福建妖賊入龍泉處婺大震憲司趣起公征討公至龍泉募鄉兵撃賊走之未幾賊復入慶元公進屯查田使人購其徒為應賊遂敗公乗勝掩撃俘斬千計遂復慶元進攻建寧之松溪政和皆克之處州平公還歸天台十四年海賊復叛行省憲司以副元帥起公分府台州公辭不得乃命鄉民作保伍團結扼要害賊不敢登岸聚糧訓兵以圖進討夏六月朝廷用舊議立廵海道官防賊賊請降率其屬徃衛漕運妖人黃草堂扇動黃巖民以報讐為名聚衆搆亂公收其渠酋六人斬之餘黨皆㪚台州行省又檄公分府處州時處屬縣皆有賊松陽遂昌在上㳺去郡最近冬十月公率師進討至寶定而黃壇大出焚民居火照山谷公分兵守寶定自將麾下還城賊已薄河津欲渡先是沿海軍悉發徃江東城中留者不滿數百又大半老弱公夜部分居民丁壯出拒戰斬不用命者三人衆乃齊奮賊不敢渡時沿海軍有自江東逃歸者六十餘人公召謂曰汝輩能破賊吾當原汝罪皆拜曰諾即渡水撃賊賊敗走明日退去處舊有城壞不修遺址蕪没會縉雲叛從賊焚婺之永康及台之仙居於是處州四面戒嚴議浚隍渠築城而倉庫盡空晝夜經畫勸勉商賈大家和集其民俾效力輸貲咸無違審勢相方商工度材公悉親之官吏左右無容私由是雖勞無怨者義兵部長呉成帥衆討縉雲賊中途不進大掠民財以歸謀亂城中公測其意即召與計事縛斬之捕其黨則皆授兵給號矣民大驚以為神十有二月公所募義士合撃松陽賊大破之殺其酋餘衆乞降松陽遂昌悉平予以行省檄與公同議招緝事比至而公處置已各得其當悉遵公行於是七縣豪酋相繼納款人謂公生太平時與縉紳為文墨交彬彬儒者也及其臨事遇變則智勇奮發運不失機撫循士民則仁慈豈弟惠無不及可謂有用之竒才矣觀其鎮一州未及期月而功效若是使得制方面專且久盜賊何足平哉予既敬公德又重父老請於是述輿情而頌之頌曰維水在山愈久彌長維德在人愈逺彌光公載世勲來鎮一方佩符桓桓出師洸洸謀先鬼神雷行電翔鋒旗所指百怪走藏既剪我棘爰固我疆風雨我廬公樹之牆雪霜我膚公披之裳晨昏起居婦拜兒鏘有聚弗暌公賜溥將民愚而靈羣祝孔祥祝公於天錫公壽昌如川源源如岳嶈嶈於千億年悠哉勿忘浦陽深溪王氏義門碑銘明宋濓浦陽於婺為山邑唐天寶末始割義烏蘭谿富陽三縣地置邑人生其中樸茂淳質力農務本恥華言偽行陳文毅公盛稱書傳所載禮義之俗殆不是過其言信矣梁貞明初縣人何千齡四代同居宋淳熙中鍾宅亦至三世二氏之間沖素處士鄭綺奮然興之敎子孫無别火而食志確見凝尤非二氏所及六傳至文嗣而家益昌元至大間旌其門閭力役之征無有所與宋元二朝國史皆立傳殆今歴十世踰二百五十春秋矣深溪王氏出烏傷鳳林有諱萬者字處一擢宋嘉定癸未進士第立朝謇諤凛然不可犯僉壬為之斂跡終官太常少卿謚忠惠少卿之弟茇三傳至某生二子澄汶澄以忠厚為家州里之無告者給之人戴之不啻父兄瀕終集衆言曰汝曹能合族如鄭氏吾無憾矣言訖而逝澄三子子覺子麟子偉子麟為汶後子覺五子應念慶聰子麟一子憲子偉二子懃恩而應之伯仲又各生子踰二十人子覺與子麟合謀召子姓謂曰一體之分㪚為九族痒疴疾痛舉切於吾身收族聚居謂之惇本離宗是為乖義今吾家相傳四葉矣和孺之樂雖殷管攝之計未建父有遺言欲法鄭氏鄭氏與吾有連其成規具在吾將損益而行之何如於是應念帥諸弟踊躍承命請參定家則一卷遵之馭家之禮質文兼至應物之務内外齊飾薰蒸太和之中壹囿範圍之内鄉人士莫不感勵而歆艶之子覺謂不可無以示來者既勒家則於碑復徵濓文以紀昔成周之世一夫受田百畝其家衆為餘夫亦二十五畝賦由斯而出夫由斯而定其勢不得不分當是時未聞有同居累世者其相親相恤之政則有大小宗法存焉大宗榦也小宗枝也枝有千萬之不齊榦終一而已此前王持世之㣲權也自封建宗法之制壞九族之親漫不相綂屬若秦肥視越瘠仁人義士乃於服盡情遷之時綴之以食而弗殊事雖異於古不猶行古之道哉浦江蕞爾之邑以義門聞者三而子覺又不悖其先而繼焉古禮義之俗豈有越於此哉文毅公之言益可徵矣子覺名閱之後金華諸族亦同出於鳳林顯者項背相望而淳熙宰相尤著勢隆望重尚不能合族以居而子覺一韋布之士斷然行之可謂賢矣雖然靡不有初鮮克有終子覺之嗣人世守不墜他時將與鄭氏儷美龍光下燭行當煥映於山川之間濓因不辭而記之又繋之以銘銘曰易著同人合乾與離上㕘於天火之赫熹𩔖俗辨物君子以之況我宗屬一氣之為譬猶單榦漸敷羣枝服雖少殺情或甚非物我相形矛盾迭馳借耰取箕誶語紛披所幸天衷亘古無虧不有人豪務克巳私何能大公㧞其籓籬浦陽之江其流瀰瀰太樸末散民淳俗熙以義聞者接軫聯帷有美王氏裔出紳緌佩厥先訓如銘鼎彞大合其族嗜德若飴夙夜無諐竭其心思度物引𩔖取式樹規鉅探浩渺細入密㣲日約月會有文可稽耄倪同心一唱百隨孰為範防徵禮與詩以匡念慮以肅威儀如水斯瀦畚築以時涓滴不戒不啻漏巵古云孝弟致家之肥何間古今驗若龜蓍維彼崇構肇自築基既堅既飭棟宇翬飛維彼跬步千里在兹行行不息至也何疑尚慎旃哉勇毅自持誰謂華高企其咫而太史造銘勒之豐碑王府㕘軍追封縉雲郡伯胡公神道碑明宋濓皇帝定鼎金陵思得智勇之才用之於是處之胡公仲淵躍然而起以赴功名之會入陪廟算出鎮鄉邦言聽計從寵遇無比浙東之俊彦攀龍附鳳者皆自公始公諱深仲淵其字也系出漢安定宋初諱棟者自慎之丹陽遷龍泉棟生璠璠生文虎文虎生竦竦生晟晟生滂滂生衢州錄事㕘軍松年松年生鄉貢進士應辰應辰生樂清令㻑㻑生江南路兵馬都監見大則公曾大父也大父鏜父鈺仕元為征東行中書省左右司員外郎母趙氏生三子公其長也繼母季氏生一子員外郎早嵗宦遊京師公始十齡而大母季夫人與母夫人相繼亡公侍大父與繼母撫幼弟艱難刻厲以自植立未弱冠走京師侍府君適府君使高麗復徃候焉府君捐舘舍﨑嶇萬里奉柩南還舟行泊大崖下夢人語之曰此崖且崩宜急避驚覺趣移舟俄頃大風雨崖崩聲如雷歸葬於縣北之圍源廬於墓取諸子百氏天官地志兵謀術數醫學卜筮老釋之書研究之發為文辭操筆立就元季江淮俶擾蔓延浙閩盜由建之浦城松溪入龍泉公嘆曰浙東地盡白禍將及矣乃集鄉兵結寨於胡山已而處民相聚為盜江浙行中書省調萬户舒穆嚕宜孫戍處州辟公參謀軍事檄所隸諸縣募壯士為軍浹日得數千公引之屯竹口下令賊中曰爾皆良民也因驅迫故為亂棄仗即仍良民矣賊以公長者言不敢盡毁旗械肉袒請降温州戍卒韓虎陳安國殺主帥據城叛行省命宣慰使温寧布公討之道由處州與公語意合帥府復辟公㕘謀之公曰溫城叛者惟一二人耳若破城玉石俱焚如平民何遣辨士入城説其黨曰韓虎悖逆亂常今王師四集雖金湯無不破者若輩胡為作虀粉耶將軍未忍加兵茍能去逆效順悉原宥若稔惡不悛城破悔無及矣其黨相向泣曰吾屬自度旦暮鬼耳倘獲復生敢不惟命乃殺韓虎等以城降溫城瀕海民以漁為業時城閉三月民病甚公請發粟賑之驩呼之聲載於道路宣慰欲列功聞於朝公辭既而宣慰以行省㕘政總兵征鄱陽復邀公行戎務無巨細悉屬之青田潘惟賢聚衆為亂龍泉長吏聞風遁去賊焚縣治公之師王先生毅與門弟集義兵搗退之里中惡少年疾其功害先生公在鄱陽馳歸執害先生者盡殱之縉雲之黃村松陽之白巖遂昌之大社麗水之浮雲泉溪無頼者咸為盜根勢蟠結不可禦行省丞相喀喇公承制以舒穆嚕公為行樞密院判官分院鎮處州至則假公分院行軍都事綂兵討麗水泉溪賊㧞之未幾又平浮雲白嚴賊懼來降縉雲盜亦就平乃移師攻遂昌賊酋周天覺方友元傾其精鋭出迎公笑曰賊若堅守未易即殄滅今來豈非天授我乎部分諸校以正陣接戰以竒兵夾撃别遣遊軍入山搜其伏匿賊三面受敵大敗斬首數千級生擒八百人獲方友元梟之乗勝攻大社周天覺降移兵討青田賊賊黨金德安殺潘賢兄弟以降時國兵取浙東婺衢既下獨處州為舒穆嚕公所守不降皇帝遣僉樞密院事胡公大海由間道取處州公遂出戰敗北大軍入城分兵取屬邑公以假元帥綂龍泉慶元松陽遂昌四縣兵閉關為拒守計四縣士民請公内附以全民命且曰公治兵十年勤勞至矣而朝廷無一命之錫君何負於國哉公知時事已去乃出見胡公上素聞公名召至南京待以殊禮居亡何擢中書左司員外郎上日與公論天下事公有言未嘗不稱善也詔公還處州招集舊所部將校以從西征上既平江西命公以親軍指揮守吉安會浙東苗軍為變婺守將被害而處城亦為所據上遣公復處州比至城復除公浙東行省左右司郎中總制處州軍民事郡甫被兵民物凋瘵而山㓂乗間竊發人情未固隨方招捕凡首惡即誅之猶慮戍兵之寡募之獲勝卒萬餘人諗於衆曰兵少不足禦敵師衆乂無以食之奈何衆皆曰養兵以衛民茍不為禦備計子女玉帛且不保況於食乎公乃因民之産權宜增賦之沿海軍素驕橫以復城功橫益甚公擇其尤無良者斬之衆乃讋服江西食浙東鹽有司十分稅一販者鮮至公請以二十收一商賈遂通城南枕大溪浮橋廢久隄當水衝為所齧蝕幾盡公即上流比舟為梁以濟行者州學敝壊講舍僅存用以貯官粟公撤而新之薦進士呉世昌為郡文學以司敎事城中民廬多為戎士所據公度閒曠之地建營屋數十區使居之縉雲官田其稅額甚重執里役者恒以私粟代償公以沒入之田實其數其害乃除諸暨守將謝再興叛兵犯東陽平章李公文忠撃走之公引兵為援建議以諸暨為浙東藩障若諸暨不守則衢處不支乃度地去諸暨六十里竝五指巖築一新城不旬日而成樓櫓濠柵畢備上聞諸暨叛遣使來議别為城守計至則城已完上嘆賞不已後浙西將李伯貞大舉入宼兵二十萬頓城下堅不可攻敗績而去上念立城功以名馬賜之青田之蘆茨地接閩徼人素獷猂葉仲賢恃其險屢叛乗我師在外來㓂公還軍深入禽其渠魁少壯皆籍為兵二十年逋誅之盜一旦就平溫州方明善攻平陽公出偏師破之幷復瑞安所侵地而親綂軍攻溫州明善勢蹙與其仲父國珍議納嵗幣上詔公還師明善以鹽若干進貢上命處州易銀以入内藏上怒銀色惡責守令使償公曰此吾過也守令禄薄何能償乃售龍泉田以銀九百兩代輸公入覲上欲留公柄用之以邊事未輯願守外時上即王位乃擢王府㕘軍仍總制處州陛辭上諭曰俟閩浙盡平當進卿中書矣福建陳友定擾邊公奉命征之取建之浦城而崇安建陽二縣亦下上賜以所乗駿馬建守將阮德柔兵四萬屯錦江出我師後公還兵撃之破其寨柵友定大懼帥鋭卒亟圍我營公突陣與決戰馬蹶被執友定得公頗禮遇之公具道天子神聖四海歸心羣雄樂為之用且引竇融歸漢故事感之會元使者至遂遇害嵗乙巳春也年五十二上痛悼不已命使者即其家祭之詔中書議加恤典追封縉雲郡伯有爵而無官階職勲者有司之制未備也公天資穎㧞智識絶倫藝術學之無不精性倜儻好施賢士貧乏傾橐以周之守鄉郡五載馭衆一以寛厚用兵十餘年未嘗妄戮一人其殁也聞者莫不流涕鄉人立祠祀之配項氏生二子長楨宣武將軍處州衛指揮使司次樞女一適章存厚公殁二年楨等刻木為像具衣冠葬於圍源之左來徵濓文昔濓侍上於白虎殿忽顧問曰胡深何如人濓對曰文武才也上曰誠如卿言浙東一障朕方頼之濓辱公交五六春秋見公酒酣耳熱指揮三軍雄姿不可遏及與縉紳之流論文評詩則欿然書生也未嘗不服其勇而愛其謙今公不可作矣用備著公之事揭諸墓門以告後世銘曰洸洸胡公萬人之英一劍橫空莫之敢攖浙河之東地氣盡白此為兵徵見於龜筴爾衆荷戈來入我堡寘爾枕席㧞爾水火公師如風㓂㪚如雲一鼓之餘盡為埃塵節鉞出鎮涉厯五年桴鼓不驚雞犬晏然誰登叛人䧟我諸暨公建新城㓂至輙敗皇用嘉錫使車繹絡天閑龍馬於公弗惜公感主恩酣歌慨慷誓提八閩以歸職方旄旗所屇勢如破竹天末厭亂三軍夜哭公才孔多公志弗阿月出如楮公命奈何丈夫之澤流於異方孰能行之父母之邦匪公之德十里枯骴公雖止斯庶亦無愧廟堂有嚴肖像其中精靈翕然上與天通括蒼之山其翠欲滴公名配之有永無斁風門洞碑明宋濓金華縣東南五十里有山曰風門山下石洞洞之户可入二人其内晦人不敢徃以石投之有聲礲礲然莫測其底止風從中出襲人毛髪皆竪鄉民意其必有神嵗時禱祠之多應因號曰風門洞神久而神與人習降於巫言生四子皆為神民即洞西一里所西溪之原為祠以像神幷四子其來已久至正丙午夏旱民走祠下爭舁其像以歸像至之鄉雨隨至否則咫尺不及民益驚不敢慢琴山里浦二處事神尤謹初里浦嘗有神次子像靈甚是嵗琴山迎禱之得雨里浦不雨人曰我神也奈何澤琴山而遺我乎遂欲舁去琴山民曰神澤我我未有以報請緩之相待久與之盟曰天雨則以神歸我已而里浦果雨嵗以大穰於是琴山之民思報神惠復刻木為次子别像請邑士王閑碑神之休烈植祠下明年琴山有秋而西溪螟為災西溪民疑新像不利沉像於水而碎其碑是嵗西溪大疫死者十七八神降言將盡殛西溪民民惶懼殺牲叩首請為像以贖罪像具碑文已毁琴山士俞慶來言其故請文噫斯事亦異矣然非異也木石之怪久而不㪚能為災讋人況大山穹谷之靈乎其能出雲雨為休民祇奉之亦事之必致耳豈不可哉或與之抗則過矣禮山川能澤物者所在祭之如兹神者澤民而享其奉非濫也宜也民烏得而不敬乎系之以詩曰風門之山蔚穹窿羣峰左右翼其宗勢若萬驥環一龍帝恐地軸膠不通為鑿巨竅貫其胸復驅后祗叱豐隆手鼓大塊嘘雄風至今山竅如截筒有風蓬然出其中下深不測上無窮幽怪宜為神所宫惟神受命於祝融身騎赤虬摇綠總四子夾馳乗四熊川君水伯扈以從或珥青蛇持雨鏦或撼鼉鼓或震鏞歘隂倐陽互溟濛喜則吐雲怒流虹山民駭瞻增敬崇殺牲奠酒陳㣲衷願施霈澤回秋豐伐山築祠溪水東彩楹畫棟扉則彤縣民嵗時來會同攜孩扶耋如聚蠭蒲伏祼獻罔不恭有不恭者殃厥躬神為帝臣秉大公願恢至仁綏九農聖經國典祠有功功高博施名必鴻鐫辭廟門元碑穹著祥昭異警羣聾千秋萬祀為神雄卓忠貞公廟碑明王鏊夫振刷茅靡汛掃風塵杖黃鉞以康帝圖執朱旗而清人瘼者聖人之略也氣有前徃義無反顧五鼎赴而如歸七族沉而不悔者烈士之勇也故夫王綱解則開八紘以乂之臣節弛則張四維以維之斯所謂言有正而若反道有悖而相濟者乎卓忠貞公名敬字維恭温之瑞安人也負公卿之骨髪則相表其竒異蹈風雨之迷途則虎為之嚮道學府多聞披玉軸之文史兵符黙契窮金壇之祕訣陳仲弓閨門之德蔣公琰社稷之器公實兼之洪武末國制草創儀章未立呉王太子或爭局於禁中梁國旌旗乃上擬於天子公以夕郎首建朝議固已晰釁萌通國體矣高皇帝因大器公晉宗人府經厯再晉户部侍郎建文初載燕國始建公暏其幾㣲密為計畫語具劉忠愍所為傳中即賈生策諸王之勢晁錯謀劉氏之安何能逺過而壯士難期老謀莫試尋至中州圯拆上國奔離士女同嘆於隂墟鬼神共謀於曹社葢天步初夷屬搶攘而未定故人懐靡常舍神聖其奚屬斯時也以高帝之子纘承高帝之緒以高帝之略龕夷高帝之人新命舊邦非逐鹿之可擬子燕孫謀豈瞻烏之靡定公即準管魏之擇主撫鐘簴而自怡其與更二姓事百君者當異日談也顧刀環築口吠堯之語不輟㦸枝入頸送徃之情彌厲臧洪同日誓不孤生卞壼一門幾無噍𩔖豈不痛哉昔伯夷之諫也太公扶而去之公之死也少師與有力焉非古今之道殊忠佞之情異也以公材智邁於等夷生死能為有無故也公沒文皇帝追惜之曰國家養士三十年不負其君惟卓敬耳湯不以伐夏而欲强沉淵之務光武不以翦商而遂絀采薇之墨允非天下之至公其疇能與於此嗣後二百餘禩京兆用今皇帝癸酉詔書建祠冶成山側祀公等若干人名之曰表忠所為明主恩厲臣節之意甚厚公生東甌而郡之專祀其魂未妥鄉人興嘆蜀衛侯承芳來守是邦始即中川文山祠右為祠以祀公於乎方黃之死事非不烈也而碩畫無聞胡解之委身非不智也而顯名佹失前有曲突之謀後無銜璧之辱奮一時而起千祀者其惟公乎予也訪侯郡廡劇談芝桂覩公廟貌與薦蘋藻靈爽如存嗟人骨之皆朽忠孝勞生悟光明其何慕潔牲爰告即石為銘祠曰粤古貞臣動必以正圖國忘死見危授命砥柱中流疾風斯勁峩峩卓公忠出其性有明開闢地正天刋龍戰甫戢𤣥黃未乾九海波沸十嶽峰剜勇智不作華裔疇安真人踵興大命有托帝緒中賡壇社如昨簞食壺漿稽首崩角命有興廢人無適莫公也矯矯力抗其衝賈策定制晁疏徙封委心王室削欵侯宗水投石拒心苦力窮無波不隨有作莫遂大厦顛隮一木焉制勇嬰鱗逆心安骨碎鼎鑊胡甘社稷是衛疇不自委曰國懿親公志邁世矢死靡分心堅百鍊義不二君陵厲白日晻藹高雲周民則頑殷彞已厚養士州平庶幾無負厥有褒詞皇皇天口君義臣忠異塗同紐我皇御宇丹書白麻閔彼忠魂一洒垢瑕旌祠冶城錫引厥家仁風扇動義日光華海嶠甌鄉公之桑梓祠宇弗䖍仰瞻奚以有美衛侯鳩傭相址高甍雲構層廬電起長江孤嶼楚楚新宫摹文像貌以翼聖功城鶚頭碑明侯一元國家威徳逺暨四裔為守山海之邑或不備城郭吾樂之先嘗城矣以兩溪之水不時決齧至於槍纍儲胥闕如也中世有警始城後所置兵焉掎角既形内地斯固其外海壖要害之處徃往列障戌兵矣顧獨遺鶚頭鶚頭者其山下漸於海深流峭岸無沮洳以難之海有不靖即鶚頭常先受兵嘉靖乙巳秋賊一夕登岸邑侯歐陽公先事調度伏兵戰大㨗事具先君子記中其後賊來他處輙膠沮洳斬馘破舟者數矣而終不敢睨鶚頭第逡廵海中則以侯前一戰奪其要路也侯深惟賊尚逋誅遊魂息而民尚無藩籬之限戰勝餘威不足恃也迺復即鶚頭城焉嵗丁未某月城成邑人侯一元曰休哉我侯為樂樹百年之固徃者賊紛紜時議者多言海防其大者不出三事一曰斂民入保毋令樵漁者為賊餌禽者為賊間焉二曰召募得賊者與贖錙金鹵獲以畀之則人自奮而戰其所乃予推侯之功莫尚於為民請賑其次自將拒險又其次乃今為城當乙巳之嵗大江以南連省大祲吾樂窶人之家羣行搏食法寢不行而有司請賑不得鄰境之糴交閉民安逃死乎由是閭閻日蹙賊衆日滋邑里之情必為賊得何獨樵漁者之咎乎侯時下車未久洞悉斯害若沃焦釡迺挺身獨爭監司得粟數千石各以區區賦民民始全活來糴勸分小大悉定士之病者稍任負戈乃始料揀習之於戎故曰用兵之道要在附民假令侯奉職自全畏於失上則必不能得粟百里之内人人自搖誰與制敵矣故吾以為侯之上功兵久不用紈袴日媮乎時旋抽之節亶為容觀急則固其城如壘石焉􅍀然無為民援之心侯援所鼓桴乃市子弟耳無不手㦸而戰者若何嘗敵侯乃躬率之海上止於兵衝戰艦咫尺軍聲相聞侯堅卧有條侯之膽身犯矢石有安平攻敵之志用是人人氣決不戰自倍然後香餌重賞可得而用矣故侯自將之以奮士㨗矣侯又不恃戰而城是營是乃古昔修攘所貴王道所以全也且守之道百於攻以全力守四裔寇盜坐而斃耳南仲朔方小范大順是其效也世之仕者當身為務去不復顧以故一切為媮以侯累勝之威可數嵗無事來年且報政行矣迺方厲士乗城為百千世計嗟乎仁人之心豈不逺哉葢善理人者如理身輕徭省賦不賜而民給中户自裕貧下不迫振其兇災為民葢藏元氣厚矣懸賞厲法三軍為一用財則若流刈姦則若草譬藥瞑眩厥疾瘳矣疾病已除元氣已復補苴罅漏謹邪所自毋令復來六氣之沴遠矣故數勝而亡者元氣薄也仁義而弱者藥不審也先笑而後號咷者少愈累之嗟乎夫治豈不艱哉侯謂予曰盍碑諸以諗來者毋俾城壊予惟漢營平有云兵事當為後法乃不嫌自伐其功予所以道侯終始縷縷者亦欲後之君子鏡於先難增修其故非以為侯夸無庸匿諱爾侯名震字某西蜀人會稽典史呉侯生祠碑明徐渭會稽典史吳侯成器徽之休寧人其始仕會稽當海上宼初入内地侯以能將兵知名於是承大吏命提兵守水陸阨塞厯浙東西南直隸與賊大小數十戰斬賊首數百級生獲數十人奪還被虜者以百計凡戰之處休止督發設守出鬭有方法禁士卒無毫毛擾居人又能舍死先士卒民多其功徃徃就所戰處建祠刻石今曹娥江其一也父老某等來告厥成請予序事予感而嘆曰曹娥一弱女子耳常其吚嚶婉孌乃不知有門外事至其赴父之難𦕈大江蹈洪濤慷慨激烈有猛丈夫之所不敢為者夫典史下僚也動為人所箝傫然何異一女子至其當國艱難乃惟知曰吾臣而已仗劍舍身以當事乃不復知有他計此其人皆以忠孝植性歴千萬古而同一道今其祠若廟岐然兩相望豈偶然哉詩曰伊昔孝娥垂璣紞珥當斯之時一女子耳憤江痛父不得屍所披髪亂流娥猛逾虎今之仕者沈伏下僚傫然長嘆則怨其遭有㓂在庭孰敢攘臂咸將棄戈何況邑尉桓桓吳公天植忠孝先國後身與娥一道啟宇崇功娥江之沚祠木相望照映江水季先生祠堂碑明徐渭先生蚤聞新建致良知之㫖既懼後之學者日流而入於虛也乃著書數百萬言大都精考索務實踐以究新建未發之緒四方之士從遊者數百自筮仕至老且革無日不孶孶學問其卓然以繼絶學覺來者為己任而處心制行光明夷坦葢卜諸鬼神鬼神信之質諸兒童兒童信之者矣間有疑者謂先生當長沙時以嚴以湼為人所彈詆罷而獨居禪林著禮書將有所迎而希也嗟乎先生先人秉憲為大夫家世禄先生知長沙為太府罷歸不兩紀身死幾不能殮骨未寒而三子已寄舍於他人矣湼者固如是乎火烈民畏故鮮死􅍉苻盡殺子太叔之不猛也芟稂莠植嘉禾何病於嚴哉當長沙之覲善當軸者以書畀先生先生疑其薦已也懐之不達及罷啟書果然始推官建寧會寧藩變先生提兵壁分水關院史以鄉試役檄府長及先生先生移書幷綰長令城再三拒院檄勿徃即得罪勿顧為御史得謫則以慈壽太后及肅皇帝兩宫故批逆鱗即此三事其志不在榮進也審矣拂之於顯然之章奏而顧迎且希於不可必達之故紙迎且希者固如是乎先生之學與行仕與處其美不可殫述大約為人所疑與信則如此噫一疑之一信之彼從其疑我從其信亦足稱賢矣乃不得與概無可信者一食於鄉之賢殆十有二年先生存時徃徃語其徒曰吾子孫無顯者而顯者之先吾所知也吾死慎勿隨世俗為鄉賢舉聞者志之常怏怏一日越中薦紳暨家大人以先生即不樂於校未必不樂於社祀於社吾輩力所易為也議始倡和者響應都穎上言遂撤已所居旁舍四楹徙置禹跡寺西林實先生舊著書所以祠先生陳按察鵠胡通參朝臣奔走督率助貲者衆祠旬日告成門以二重垣徑畧備潔牲卜吉治主以升鼓吹道周國人喜躍以某職史也宜書某始見先生時未知學也既稍從事於學而先生已殁歿而嘗追師之竊比於聶兵部事新建之義於是舉也誠快之書其敢辭考之古功德與言立有一焉則祀於國而今先生居其二昌黎曰鄉先生釣於某水游於某樹某丘其可指而樂者有三則宜祭於社而今先生獨苦於學其三可指而樂者未嘗居一顧不即祀於國而亟祀於社也於法雖有遺亦從我之信以俟夫疑者之久而自信云爾於是謹書其舉事始終之嵗月與鳩工之人祠始於萬厯二年二月之朔越十五日而成又五日而主以入鳩工者為里人王煉先生名本字明德别號彭山以進士仕推官召拜御史謫歴縣佐長起為禮部郎中再謫歴府佐止長沙知府助貲者例得書於碑之隂為作歌曰修篁兮叢枝黃熊子兮招提湘潭兮牧長解佩組兮言歸依短寮兮長席載六籍兮以卑栖髠管毫兮杵杵惟以遺兮將來淹日月之逾幾靈冉冉其何之祠靈兮享靈非他人兮吾儕靈之來兮總總挽北斗兮乗箕中參差兮延佇勞騁望兮何如國朝東甌王廟碑朱彞尊豪傑之士徃徃起破家亡國之餘流離瑣尾極人情所不堪卒自奮於當世論者徒矜其勲伐之隆至心跡之㣲隠而不彰者多矣張良之於韓田橫之於齊卒從諸侯滅秦要其志期於報讐雪恥而已若夫封留王齊豈以是為榮哉予讀史至秦楚之際有感東海王之事其報讐雪恥無異良橫之所為而終王其故土守越之宗祀以不廢則又良與横銜悲飲恨而不能致者王克致之可不謂難焉惜未有推明其心者而僅以趙佗梅鋗之屬視之也嵗在癸卯予游永嘉乃得謁王之廟於縣治之東華葢山之下廟久不治言之知縣事漢陽王君世顯修葺之王君許諾以予之將歸也先事請予文紀之石按史王勾踐之後國覆於楚至秦郡縣天下廢為君長及諸侯畔秦王率越從鄱君入闗滅秦漢撃楚王率越佐漢滅楚高帝封王於越以奉越後惠帝二年舉高帝時越功曰閩君搖功多其民便附乃立為東海王都東甌世俗號東甌王廟之所由名也漢制非劉氏不王其初異姓王者八國卒就誅滅王與長沙王苪閩越王無諸獨終始得全非以忠謹然與司馬遷謂王入闗時項籍主命弗王故王不附楚是亦未推王之心者葢王之國楚實覆之項氏雖非楚後而世為楚將安知覆越王之非項氏也然則王之不附楚而佐漢也明矣方其喪國於楚廢於秦版圖入丞相府越人終保而不㪚以瘡痍未起之衆馳數千里犯强虎狼秦及漢軍垓下黥布信越期會不進而王之用命若蹈湯火葢國恥未雪王之心有不忍一日懐安者是可謂豪傑之士矣夫其流離瑣尾英毅果鋭之氣百折而不回殁為明神廟食於千載宜也爰從王君之請綴以詩俾迎神送神者得以歌焉辭曰芒芒禹迹無逺弗届兮維此東甌九牧外兮夫餘封越少康之支兮至於勾踐遂霸江淮兮鼫與不壽世載更兮翁翳之侯及無疆兮師覆於今其亡忽兮或君或長海濵是窟兮七世維王既詘乃伸兮地雖秦郡人越人兮函闗既入拯嬴酷兮復會於垓殱楚族兮國恥既雪白馬刑兮敬鬼而壽百六十齡兮維甌之鄉王所涖兮秩祀孔䖍民有事兮何以迎之尊有罍兮枇杷橘栗桃李梅兮維王之來樹兩旗兮何以送之工用謳兮琴瑟笙竽筑坎侯兮維王之去亦莫我尤兮我歌倡兮我舞洋洋兮黍稷維馨邊豆大房兮千秋萬嵗俾樂康兮寧海將軍固山貝子王保台遺愛碑葉臣遇皇帝御宇之十二年奄有中外悉主悉臣幅􅊷普徧章亥所弗能步乃偃武修文諸藩鎮例解兵柄而三孽于以方苞明年甲寅耿精忠叛于閩六月賊帥曾養性攻温州八月率賊將朱飛熊水陸十餘萬䧟黃巖進薄台郡是時變起倉卒逆熖方張外邑山僻土賊又乗機蜂起四出剽掠孤城危岌勢且不支十有一月寧海將軍固山貝子自錢塘飛渡來援經年底定再造台疆億萬生民之命實始之終之備極撫綏全活之恩所謂起一州死人而骨月之也方賊兵雲集居民紛紛驚竄守者閉門禁阻而逃者日益衆民出遇賊皆脅令割辮貰死及遇官軍又以其黨賊悉擒戮民進退皆無生理益鳥獸㪚城旦夕且下遂有議棄台退保寧紹者貝子至即力排衆議决計堅守且謂糧餉匱乏人無固志皆撫御經理之不善耳乃下令弛門禁聽民得出入樵蘇其被賊脅從割辮者許自投歸槩置不問又令軍中毋取民寸草寸木犯必律以軍法於是大兵數十萬衆肅然奉令民慶更生商販蝟集軍食無乏士氣倍增而賊薄城下隔江干為陣築長圍以困我晝夜矢石不絶貝子親督將士悉力拒守凡濬濠築囤樹柵設伏一切機宜皆先事豫籌賊計無所出攻稍懈乃突出精鋭擊之賊屢敗去賊間諜楊御雲邱文挺楊士麟輩厮軍中窺我虛實貝子察其有異令巡道楊公偵得之盡獲其與賊徃還私書偽札立磔于市賊氣益沮仙居在郡西北為右臂接壤天台先為賊據時侵天邑斷我師寧紹餉道貝子謂恢復之計當自仙邑始乃陽治浮橋與賊會戰隂遣勁兵攻茅坪遂復仙居取梁蓬出賊後賊腹背受攻遂大潰貝子親率大衆轉戰而前所向披靡旋復黃巖太平方克仙居時諸將以城不蚤降例以子女充給有功貝子惻然憫之苐恐不賞則無以示勸乃下令聽民取贖各歸其家民大感悦歡聲雷動歌之曰王之仁仁莫加昔無室今有家軍行輜車糧糗需役甚繁有請拘執行旅充役者貝子曰商賈甫通若復擾之是沮其來意吾寧稍緩輸運決不重困吾氓也行旅聞之莫不感泣先是溪口大芬各鄉居民為賊所迫多以芻糧助之諸將執法請勦貝子曰此民也而忍戕之乎地近賊巢不得已為自全計耳豈誠背叛者耶且吾奉命討賊惟仰體朝廷好生之德以不殺𢎞濟鉅業耳其悉宥之全活者不啻數萬人台民䝉貝子不殺之恩𩔖如此貝子豁達好謀知人善任駐台一年紀律嚴明恩威並著與士卒同甘苦偶糧不繼口啖粗糲一餐終日不飽禆將某為流矢中目鏃不能出乃親至榻前慰問再三繼之流涕以故士皆感激樂為効死此所以我台以皮骨僅存之殘黎竟獲保全安如磐石也貝子之恩之德為覆載於我台也無窮今之畊于野安於室居於肆販於塗絃歌於塾熙熙皥皡何一非貝子㧞之水火而登之衽席者台人感貝子王之賜即感貝子王所以廣朝廷好生之賜迴憶爾時烽烟四警孤城阽危寄㣲生於鋒鏑乞身命於須臾耄耋髫齔無不惴惴欲絶則今日之市井依然骨月無恙誠非台民夢寐所及又豈台民意念所及哉王之恩澤瀝心莫報累􅑤難酬僉議建祠報恩而爼豆之又恐事逺年湮王之豐功盛德後世或不及知於是節其大要以壽諸麗牲之石俾與大固靈江共傳不朽云寧海將軍固山貝子王撫嵊功績碑闔邑士民自來聖世揆文奮武莫不有勲戚重臣共相夾輔以成久安長治之休而其恩澤之垂奕世謳思而不能冺要皆出於民心之誠然非强而致也粤稽康熙甲寅閩逆倡亂草竊乘機風鶴之驚徧金衢溫台諸郡嵊邑一彈丸地重山複嶂尤易藏奸賊首金國蘭胡雙竒等紏黨數千人剽掠殆無寧日守兵單弱不能制邑之危如纍卵矣惟時我貝子王寕海將軍仗鉞徂征道經剡水謂叅將滿公進貴知府許公𢎞勲曰小醜不除將為肘腋患乃留勁卒一千授方畧令協力攻勦不數月而兇逆蕩平烽烟頓熄非將軍決勝算於帷幄之中曷克俾吾儕食舊德服先疇得以敦詩書而安隴畆乎夫甘棠僅召伯之所憩猶繋念於南邦矧其去水火而衽席起死亡而肉白骨者而忍忘之哉謹拜手為之頌曰將軍篤生呈瑞應期派衍宗潢盟在帶礪在昔甲寅藩逆窺伺一時羣醜乗機肆恣而我嵊邑蒙難怠遽鋒火宵驚望切雲雨幸命靖海涖台經此日擊猖獗赫焉怒起謂不蚤除後將難制用探虛實幷度形勢分寄虎旅密授竒計鷹武奮揚撻彼螳臂立奏膚功克俾安乂厚澤深恩久而弗替風和鹿嶠波澄剡溪爰勒貞珉永垂奕􅑤墓誌銘沖素處士張公墓誌銘宋吕祖謙勅號沖素處士張公澤予先人同筆硯友也既沒之明年其子廷玉乃以宣慰司王世文所記之狀踵予乞銘余閲狀為之嘆曰今之文章德行有如處士者乎處士之生既有徽號以表於前又有著述以貽於後行將百世而師之矣奚俟余之詡詡為雖然高山仰止非伊朝夕謹叙次而銘之處士諱志行字公澤八行先生州里之所通稱沖素處士朝宁之所旌號也祖逋翁諱德馨助國賑民褒賜冠帶旌奉議郎廣惠先生父退翁諱撫歴資政學士處士幼入右庠言動不茍禮度不愆見者莫不敬而慕之居常閉户讀書黙誦六經融洽書史期得聖賢意㫖之所在為文揮毫立就追配古人慨然以天下為己任就殿試纚纚數萬言直陳時政得失當時執政者深疾之遂自遵晦力學砥行務為大儒歸隠東陽士子多從學焉日惟以文賦自娯彞倫為樂優㳺乎禮義之塲涵咏乎詩書之圃師徒問答若將終身本分之外不加豪末嗣乃建祠堂於托塘崇根本也闢終慕堂於公山敦孝思也立書院以延末學置義田以惠宗婣設勸節田以勵風俗見饑疫死者即市棺而葬之遇病不能興者悉皆資而助之殆數十百人懿德美行不能悉載一日遊富春山抗志長吟流連竟日若與嚴子陵有黙契焉遂拂袖歸謝絶世事木石與居涵碧山白雲塢天宫寺其别墅也時浙東宣慰使朱異薦於朝與崇安劉勉之同時被召徴書前後凡三至不就賜號沖素處士所著有易傳撮要四卷涉史略二卷覆瓿集饒紙翁傳謝賜號表辭舉八行詩東陽十勸等歌皆有裨於名教者處士生於元符己卯八月初九日卒於淳熙乙未十一月十九日厯年七十有七卜葬於本里張公山去宅西北一里兩峴拱於左右一水繞於東西土厚林深葢佳地也嗟乎先王之行髙矣而其人已徃予先人亦徃悲哉其人其事不可無述予親見而表傳之以俟後之聞而知之者故為之銘銘曰粹然之行奕然之文三辭徵辟天子不臣嘉遇林泉富貴浮雲窮理樂道絶𩔖離羣操堅氷石德達穹窿先正典型昭代儒宗遺祠翼翼流水淙淙範模百世高節清風許白雲先生墓誌銘元黃溍先生諱謙字益之姓許氏其先占籍京兆之興平後有官於吳者因家焉九世祖延壽宋刑部尚書六世祖實元豐間居笠澤又徙婺金華縣曾祖諱經國祖諱應龍考諱觥淳祐丁未進士官宣敎郎主管三省樞密院架閣文字無子以從父兄貢士日宣次子嗣即先生也先生天姿高嶷甫能言貢士夫人陶氏授以孝經論語入耳即不忘五嵗就學莊重如成人宋亡家毁貢士君相繼淪沒僑居城闉借書讀之雖疾恙不廢開門授徒有所疑無從質聞仁山金先生講道蘭江委已而學焉金先生曰士為學如五味之和醯鹽既加則酸醎頓異子來見我已三月而猶夫人也豈吾之學無以感發於子耶先生聞之惕然而所居相距逺會金先生設教於吕成公祠下乃便於㕘叩金先生告之曰吾孺之學理一而分殊理不患於不一所難者分殊耳先生由是致其辨於分之殊而要其歸於理之一又曰聖人之道中而已由是事事求夫中而用之金先生歿先生益肆充闡多所自得謂吾非有過人惟為學之功無間㫁耳制行甚嚴而應世不膠於古不流於俗介而不驕通而不隨身在草萊而心存當世大德十一年嵗在丁未熒惑入南斗先生以為災在呉越深憂之是嵗大䘲貌加瘠或問曰先生豈食不足耶曰今道殣相望吾能獨飽耶東憲府聞先生名辟以為掾避弗就肅政亷訪使劉公庭直舉茂材異等副使趙公宏偉舉遺逸亦皆固辭趙公在南臺命除舍館迎致先生使衆僚多士有所矜式欣然為之起而不久留也東還倦於應接入華山中學者翕然籯糧笥書而從再嵗以兄子喪而歸户屨尤多逺而齊魯幽冀近而荆揚呉越皆百舍重趼而至先生之教以五性人倫為本以開明心術變化氣質為先以為已為立心之要以分辨義利為處事之制至誠諄悉内外殫盡常曰已或有知使人亦知之豈不快哉或有所問難而辭不能自達則為之體其所欲言而解其惑討論講貫終日無倦攝其麄疎入於密㣲聞者方傾耳聽受而其出愈真切惰者作之鋭者抑之拘者開之放者約之為學者師垂四十年著錄千餘卷人隨其材分咸有所得達官富人之子望閭而驕氣自消踐庭而禮容必飭四方之士以不及門為恥縉紳先生至於是邦必即其家而存問焉或訪以典禮政事先生觀其會通而為之折衷聞者無不厭服臺省諸公若王公士熙耿公煥王公克敬鄭公允中李公端呉公燾趙公天綱陳公思謙趙公仲仁前後列其行義於中朝鄉闈主司曹集賢鑑楊翰林剛中亦率同院剡上其召於省闥郡復以遺逸應詔先生終不為動重紀至元之元年屬當大比諉先生以衡文亦莫之能致也嘗謂吾非必於隠惟其時耳講授之餘齋居凝然一日瞑目坐堂上門人弗知也徑入閴其無人乎先生之側拱立久之先生顧而曰爾在斯耶習於靜定久而安焉可知也先生以羇孤不逮事架閣公及夫人而事陶夫人盡子職兄璟性剛委曲承順怡怡如也時氏姊有子而貧無以為養迎歸奉之終身鍾愛二子而教飭有方冠婚喪祭賔客之禮必盡其情文既老而益艱瘁僦屋以居田不足具饘粥處之裕如門人吕權蔣元金涓方為先生買田築室而先生逝矣先生素多疾金先生疾革徒步徃省會大雪中寒濕及奔兄璟喪於廣信疾增劇不良於行疾少間而神更清茂三年冬十月疾復作謂其子元曰伯兄以是月二十三日卒我殆與之同乎及是日正衣冠而坐戒元以孝母友弟元復請所欲言曰吾平日訓爾多矣至此復何言門人朱震亨進曰先生視稍偏矣先生更肅容端視頃之㣲暝遂卒年六十八妻朱氏承直郎廣德路總管府推官天與之女子男二人長元次亨以為兄憬後葬縣西北婺女鄉安期里交友赴者若干人門人以義制服合泉布營葬事因所自號而表曰白雲先生許公之墓明年學者相率上狀郡府祠先生於學宫僉肅政亷訪司事杜公秉彞建議請贈官賜謚未報先生於書無不觀窮探聖㣲期於必得雖殘文羨語皆不敢忽有不可通不敢强於先儒之説有所未安亦不敢茍同四書章句集註有叢説二十巻敷繹義理惟務平實每戒學者曰士之為學當以聖賢為準的至於進脩利鈍則視己之力量何如然必得聖人之心而後可學聖人之事舍書何以得其心乎聖賢之心盡在四書四書之義備於朱子顧其言辭約意廣讀者或得其粗而不能悉其義或以一偏之致自異而初不知未離其範圍彼世之詆訾貿亂務為新竒者其弊正坐此耳始焉三四讀自以為瞭然已而不能無惑久若有得覺所言初不與已異愈久而所得愈深與已意合者亦大異於初矣童而習之白首而不知其要領者何限其可以易心求之哉讀詩集傳有名物鈔八卷正其音釋考其名物度數以補先儒之所未備仍存其逸義旁採逺搜而以己意終之讀書集傳有叢説六卷時有與蔡氏不合者春秋三傳有溫故管窺若干卷以春秋大義數十百條與友人張君樞極論之皆傳註所未發於三禮則㕘伍考訂求聖人制作之意以翼成朱子之説語學者必順天地之理酌古今之宜使通於上下皆可遵用又嘗句讀九經儀禮三傳而於宏綱要㫖錯簡衍文悉别以鉛黃朱墨意有所明則表見之其後友人呉君師道得吕成公檢儀禮視先生所定不同者十有三條而已有老儒自以為善言易力詆程子先生與之反覆辨論辭詳義正老儒語塞乃謝曰不意子之於易若是其精也中年以還仰觀俯察益有見於隂陽往來升降消長闔闢之故謂伏羲之經廣大悉備文王周公孔子之辭乃其傳註六爻之義特發凡舉例耳諸儒於象辭變占各有攸尚要不可舉此而廢彼也然先生獨未有所論述豈以孔子晩始言易孟子深於易而不言易乎觀史有治忽幾㣲若干卷倣史家年經國緯之法起大皥氏訖宋元祐元年秋九月尚書左僕射司馬光卒以為光卒則宋不可復興誠一代理亂之幾故附於續經而書孔子卒之義以致其意也書成以示張君樞言運祚之延促豈必推天命有人事焉漢儒言災異皆欲近脩人事上答天譴況聖賢之培植基本祈天永命者哉先生於天文地理典章制度食貨刑法字學音韻醫經數術靡不該貫一事一物茍可為博學多識之助者必謹志之至於釋老之言亦皆洞究其蘊為學者孰不曰闢異端茍不深探其本而識其所以然能辨其同異别其是非也幾希有三傳義例皆藁立而未完諸生有日聞雜記未及詮次藏於家有詩文若干卷有自省編晝之所為夜必書之金先生所著論語孟子考證資治通鑑前編皆未遑刋定垂歿以屬之先生今二書得大備而行世先生力也昔何文定公得朱子之傳於其高弟文肅黃公而文憲王公於文定則師友之金先生學於文憲三先生皆婺人先生出於三先生之鄉而克任其承傳之重程子之道得朱子而復明朱子之道至先生而益尊先生之功大矣先生葬已十年元以張君樞之狀俾溍為之銘溍無所知識何能形容有道氣象重惟先生交游凋謝而溍獨後死不得辭敢取狀所述而為之銘銘曰道學之傳天下為公婺之先儒獨得其宗鉅人迭興踵武相接逮於先生綿綿四葉先生之學能自得師實踐之功出乎真知萬殊之間無㣲不析一本之同會歸有極酬酢萬變必用其中涵養本原以敬始終兹際休明力扶正學聞風而來罔間南朔春陽時雨隨地發生洪纎高下咸仰曲成迪惟前人學有師法克生後賢規重矩疊先生有作彌大而昌師嚴道尊於昔有光先生之身斯道所寄視其安否以為隆替天胡不憗不訖耋期山頽木壊人將疇依不亡者存遺書孔有文不在兹尚啟爾後傳鄭氏義門事蹟傳元陳繹曾鄭文嗣字紹卿婺州浦江人也五世祖綺有學行宋建炎初合族以居綺生聞聞生運運生政政生德珪德珪生文嗣歴二百年咸如初至大二年秋九月鄉老黃汝霖等言文嗣六從同居縣長呼都克婁實克上其事部使者加審察焉文達中書吏部四年春二月准式旌表門閭文嗣生鑑鑑生渭渭生梴皆善守合二百餘口無異心者後至元元年冬十有二月太常博士柳貫與鄉校羣士又上狀請如故事復其家從之初文嗣既沒從弟太和司家事嚴而有恩雖家庭中凛如公府子弟小有過頒白者猶鞭之每遇嵗時大和坐堂上羣從子皆盛衣冠雁行立左序下以次進拜跪奉觴上壽畢皆肅容拱手自右趨出足武相銜無敢㕘差者見者唶唶嗟嘆謂有三代遺風雖石奮家亦有所不及名聞天下自大丞相至臺院諸顯公賦詩多之大和喜學禮不奉浮屠神經像冠婚喪祭必稽古乃行子孫從化馴行孝謹不識廛市戲嬉事執親喪哀戚甚至三年不御酒内食貨田賦之屬各有所司無敢私凡出納雖絲毫事咸有文可覆挾日則會不公則監視發之諸子晝趨功入夜輙聚坐一堂溫溫笑語至更餘始休諸婦但事女紅不豫家政宗族里閭以恩懐之各有差内外極嚴輿臺通傳不敢越堂限有家規行於世論曰智勇功名有志者或能就之至於會衆族而共財則非世有其人不能以久考之厯代史自漢及今僅數十人焉可謂難也已外藩列其行朝廷旌表其門夫豈獨愛一人哉將仕左郎翰林國史院編修官呉興陳繹曾撰抱甕子傳明宋濓予嘗游括之少㣲山俯瞰四周如列屏障山之趾有隨地形高下為蔬圃約二十畝傍列桃杏梨李時春氣方殷蔬苗怒長滿望皆翡翠色樹亦作紅白花繽紛間錯如張錦繡叚心訝之以為是必有異曳杖冉冉至其處氣象幽夐絶不聞雞犬聲遥望草廬一區隠約出竹林間疑中有隠者亟前候之良久見一士戴椶葉冠被紫褐裘抱甕出汲水灌畦進問曰夫子何名曰山澤之民無名也强之曰人以吾抱甕遂呼為抱甕子耳曰丈夫處世亦多術出則華軒結駟入則鐘鳴鼎食夫子營營逐逐於一甕間無乃自苦乎抱甕子辴然一笑指苔磴揖予坐寘甕於地答曰吾軀與人同豈不樂榮貴與顧念之頗熟矣百嵗之間寧復有幾與其强情而狥世不若任真以自放吾圃之西則九盤山巔宋州廨建焉側有烟雨樓當山雲初興景象萬態極可玩李鄴侯馬莊敏公嘗登之而感慨矣其東清溪秦觀賢良謫官而來游憩其上時坐鸎花亭賦詩而今安在哉非惟人隨流水異日凌霄崇構皆蕩為氛埃一凝竚間野草荒烟若愁思之不可禁世事往往𩔖此何足深道吾所以抱甕而弗辭也且常抱甕時嗒然忘形志慮外絶精神内營目不見色耳不聞聲招之弗前麾之不驚委蛇容裔而萬物莫吾敢攖自以為無愧於赫胥尊盧之民子以吾為逐逐營營不亦過與曰然則灌畦亦有道與曰有蔬性不欲燥燥則生意厄而不伸蔬性宜濕濕或過焉則氣傷而寖屈吾日夜調之燮之俾適夫厥中則芃然而秀嫣然而榮言訖抱甕而去予味其言蓋有道而隠者也任真自放不幾於樂其天歟人物代謝一俯仰間不幾於達人大觀與心與耳日之官内而弗外不幾於守一不二與藝蔬得中不倚於一偏不幾於治民有政歟疾起而追之抱甕子入竹隂間閉户高臥扣之不應若無聞者予憮然而退西郭生傳明貝瓊西郭生姓陳氏其先括蒼人五世祖宋少師退菴主秀之崇德簿崇德地四平無山俗質而尚文退菴樂之遂卜縣西之南津居焉至子清毅公開府益大其門清毅公性剛介累官至尚書通歴六部既老穆陵為書清節高風四字褒之表其閭曰清節里元季清節里第毁於兵後築月城其上生奉父螺室先生辟地於外者十年既而歸結廬月城西謝客讀書受業者恒數十人螺室已歿生無仕意或曰以爾之才盍乗風雲翔天衢與時相頡頏顧摧氣局志枯槁田畝中無乃左乎應之曰猩斃於醪蠅溺於汁昧於所戒也吾可據非所據禍其身以及宗如猩蠅為小夫孺子所笑耶曰營􅎵瀡上給八十之母取遺書以敎子使不辱吾先志願足矣聞者高之萬氏一義後傳明周起莘女子萬義顓字祖心浙江鄞人聰慧能書常書孝經列女傳而有烈丈夫行以心乎祖而尚義故曰義顓曰祖心義顓祖明威將軍以忠死父鍾襲寧波衛指揮母曹太孺人兄曰武嫂張孺人弟曰文婦呉孺人相繼嗣父文即鄞人所祠為射龍將軍者也將軍常哨桂門禦倭乗夜坐樓船遙望見兩炬如鐵鐔光射海水漸近將軍意為倭艦引大黃射之應弦落其一炬忽龍躍翻海水數千里將軍即與龍鬬力不敵樓船盡覆死之葢炬則龍晴也後為神乗潮上下精響常見土人因祠之自明威將軍至射龍將軍三世四忠三節義顓時盛年嘗通媒氏慎擇耦未嫁弟射龍死吳孺人有遺腹痛祖父兄弟為國事俱死遂私禱曰願得男然猶未與媒氏絶母曹太孺人在堂泣謂曰汝祖從高皇帝起兵後北征力戰歿於陣汝父死遜國之難汝兄從征交趾死弟又射龍死爾萬氏將無後矣嫂張孺人婦吳孺人泣謂曰姑年老闕甘㫖汝兄弟又俱死即得男艱育奈何義顓笑謂曰無憂吳孺人免身果得男名曰全迺喟然起曰吾家三世死國事者四人俱不得以馬革裹寸骨還今吾母老而二嫠婦主家俱年少所遺孤在乳下微宗血脉之係在此一兒吾若行則復失一臂矣且吾以一女子畢身不字事幾何古人曰立孤難吾强為其難者於是遂與媒氏絶不通而家人亦思藉其力亦不勸日夜同撫全兼治家親機絞營立門户全未十嵗遂嗣父官自明威將軍至射龍將軍祖孫父子兄弟三世俱未及三十嵗死曹太孺人張孺人呉孺人俱年高卒義顓逾七十嵗乃卒義顓㓜能書手書先世諸戰功及死事示全使勉力忠孝更使習古兵法輒詢得當喜稍不合怒為之不食全長跪謝過乃已由是全感激更為名將自明威將軍至射龍將軍三世墓俱葬冠劍曰冠劍墓子孫對冠劍祀之獨祀義顓與射龍將軍列坐祀亦不絶浙江通志卷二百六十六
