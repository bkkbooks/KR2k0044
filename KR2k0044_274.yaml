涼喜見新橙透甲香遲暮賞心驚節物登臨病眼怯秋光慣眠處士雲菴裏倦醉佳人錦瑟傍猶有夢回清興在卧聞歸路樂聲長九日尋臻闍黎泛舟至勤師院宋蘇軾湖上青山翠作堆蔥蔥鬱鬱氣佳哉笙歌叢裏抽身出雲水光中洗眼來白足赤髭迎我笑拒霜黃菊為誰開明年桑苧煎茶處憶著衰翁首重回皎然有九日與陸羽煎茶詩余來年九日去此久矣去杭十五年復遊西湖用歐陽察判韻宋蘇軾我識南屏金鯽魚重來拊檻散齋餘還從舊社得心印似省前生覔手書葑合平湖久蕪漫人經豐嵗尚凋踈誰憐寂寞髙常侍老去狂歌憶孟諸常潤道中有懷錢唐寄述古宋蘇軾草長江南鶯亂飛年來事事與心違花開後院還空落燕入華堂怪未歸世上功名何日是尊前點檢幾人非去年柳絮飛時節記得金籠放雪衣杭人以放鴿為太守夀浮玉山頭日日風湧金門外已春融二年魚鳥渾相識三月鶯花付與公剩看新翻眉倒暈未應泣别臉消紅何人織得相思字寄與江邉北向鴻煙雨樓處州宋鄭俠仙人居處即鼇宫更作層樓峭倚空羣岫西來煙漠漠大江南去雨濛濛花鑣栁䇿熙怡裏耘笠漁簑笑語中别有夜楹千里月憑欄清興與誰同鑑湖道中宋陳造風煙住處放歸橈吟坐篷窗首屢搔萬壑千巖爭獻狀三江九堰自忘勞尚多菡萏張秋錦少待蟾蜍印夜濤繚碧深青誰子宅未容載酒訪清高智勇師歸永嘉自言所居在萬竹間乞詩送行宋韓駒上人歸去家何許萬竹深圍一把茅踏盡叢林參白足却來江檻俯青郊夜階􅉡􅉡風翻籜春路冥冥雨放梢肯拚清隂分百十暮年思與子論交遊龍瑞宫次程公韻宋秦觀靈祠真館閟山隈形勢相髙對月臺莓徑翠依屏上轉藕花紅繞檻中開鶴銜寶箭排煙去龍護金書帶雨來夾道萬星攢騎火滿城爭看使君回和孫莘老遊龍洞宋秦觀葦蕭傳火度冥冥乍入清都醉魄醒草隱月崕垂鳳尾風生隂穴帶龍腥壁間泉貯千鍾碧門外天橫數尺青更欲扶笻留頃刻却疑朝市已千齡南漪堂宋沈遘山繞湖堂寺繞山平生願向此中間青雲白水相浮蕩野客髙僧獨往還少壯無嫌軒冕纍因循將恐鬢鬚斑南漪最是逍遙地且挹清波濯愧顔舟過荻塘宋沈與求野航春入荻芽塘逺意相傳接渺茫落日一篙桃葉浪薰風十里藕花香河回遽失青山曲菱老難容碧草芳村北村南歌自答懸知嵗事到金穰登桐君祠堂宋楊時霜染溪楓葉葉丹翠鱗浮動夕波間盤盤路轉千峰表冉冉雲扶兩腋間掠水輕鷗晴自戲凌雲飛雁暮爭還結廬姓字無人會靜對庭隂一解顔臘月望日出郊探春遊告成觀謁大禹祠酌菲飲泉遂至龍瑞宫觀禹穴薄暮而還宋王十朋禹葬稽山不記年丹青落盡廟依然神文祕在藏書穴儉德流為菲飲泉龍瑞峰巒髙近日鑑湖煙水濶浮天東州仕處略經眼自笑探竒效馬遷林黃中少卿出守吳興芮國器司業以詩送之有今日桐城王刺史昔時遺愛在吾州之句用韻寄二公二首宋王十朋出處平時正且嚴猶於瓜李謹疑嫌兩溪水照新明月湖州有明月樓六客堂逢舊紫髯孫莘老美鬚髯嘗守吳興安定化應孚學校謝公恩已結閭閻湖山清逺使君好想見邦人慰所瞻賢關今日陽司業家在白蘋溪上州筆下波瀾含震澤胸中意氣屬清流辨山疊拜南金贈泉嶺遙蒙明月投老去惟公獨青眼一言褒借勝封侯宿妙庭觀董雙成故宅宋王十朋小小琳宫氣象清雲軿遐想董雙成靈丹煉就覆金鼎仙鶴歸來聞玉笙兩絶老坡吟句境千秋太白曲中名塵埃奔走東歸客寄卧一菴聽雨聲西湖泛舟宋朱松望湖樓下照衰顔羞見塵埃兩鬢斑風艇縱看山轉側煙隄儘逐水回還喚人歸去城鐘急觸處相親嶺月彎不用新詩摹絶境定知長到夢魂間伏承侍郎使君垂示所與少傅國公唱酬西湖佳句謹次高韻聊發一笑宋朱熹越王城下水融融此樂從今與衆同滿眼芰荷方永日轉頭禾黍便西風湖光盡處天容濶潮信來時海氣通酬唱不誇風物好一心憂國願年豐桐廬舟中見山寺宋朱熹一山雲水擁禪居萬里江樓繞屋除行色匆匆吾正爾春風處處子何如江湖此去隨鷗鳥粥飯何時共木魚孤塔向人如有意他年來借一籧篨七字謝紹興帥邱宗卿惠楊梅宋楊萬里越絶諸楊勝一時與儂瓜葛不曽知老夫自笑吾衰矣此客何從夢見之也解過江尋德祖政緣作尹是邱遲渠伊不是南村派未分先驅事荔枝沈虞卿祕監招遊西湖宋楊萬里蘇公堤逺栁生煙和靖園深竹映關船入芰荷香處去人從雲水國中還似寒如暖清和在欲雨翻晴項刻間能為蓬萊老仙伯一杯痛快吸湖山餘杭道中宋范成大落花流水淺深紅盡日帆飛繡浪中桑眼迷離應欠雨麥鬚騷颯已禁風牛羊路杳千山合雞犬村深一徑通五栁能消多許地客程何苦鎮匆匆次韻韓無咎右司上已汛湖宋范成大休沐良辰不待晴徑稱間客此間行春衫欺雨應教冷病眼得山元自明抹黛濃嵐圍坐晚揉藍新淥沒篙清棲鴉未到催歸去想被東風笑薄情與長文正夫遊北山宋范成大柳岸松門勝處通馬蹄踏霧入空濛春光有力欺遊子天色無情沒斷鴻雨腳逺連山腳暗杏梢斜倚竹梢紅紽裘擁鼻吾衰矣年少猶嫌料峭風李翬知縣作亭西湖上余用東坡語名之曰飲緑遂為勝槩宋范成大芷葺蓮巢喚客遊蘆鞭席帽為君留未論吹水堪添酒且要移床學枕流乍霽却隂梅釀雨暫暄還冷麥吹秋石湖也似西湖好煩向蒼煙問白鷗上虞逆旅見舊題嵗月感懷宋陸遊舴艋為家東復西今朝破曉下前溪青山缺處日初上孤店開時鶯亂啼倦枕不成千里夢壞墻間覔十年題漆園傲吏猶非達物我區區豈足齊雨後集湖上宋陸遊野水交流自滿畦芳池新漲恰平堤花藏密葉多時在鶯占髙枝盡日啼繡袂寶裙催結束金樽翠杓共提攜白頭自喜能狂在笑擘蠻箋落醉題歸雲門宋陸遊萬里歸來值嵗豐解裝鄉墅樂無窮甑炊飽雨湖菱紫篾絡迎霜野柿紅壞壁塵埃尋醉墨孤燈餅餌對鄰翁微官行矣閩山去又寄千巖夢想中自雲門之陶山肩輿者失道行亂山中有茅舍小塘極幽邃求見主人不可意其隱者也宋陸遊陂池幽處有茅堂井臼蕭條草樹荒小鴨怯波時聚散病蔬傷凍半青黃兒童衝雨收漁網婢子聞鐘上佛香我亦暮年思屏迹數椽何計得連牆臨安春雨初霽宋陸遊世味年來薄似紗誰令騎馬客京華小樓一夜聽春雨深巷明朝賣杏花矮紙斜行間作草晴窗細乳戲分茶素衣莫起風塵歎猶及清明可到家自上竈過陶山宋陸遊宿雨初收見夕陽縱橫流水入陂塘蠶家忌客門門閉茶户供官處處忙緑樹村邉停醉帽紫藤架底倚胡床不因蕭散遺塵事那覺人間白日長雲門感舊宋陸遊總角來遊老未忘背人嵗月去堂堂稚松看到偃霜蓋廢寺憶曽開寶坊佛几古燈寒焰短齋厨新粟午炊香興闌未忍登車去更倚溪橋立夕陽東關二首宋陸遊路入東關物象奇角巾老子曳笻枝蠶如黑蟻桑生後秧似青針水滿時穿市不嫌微雨濕過溪翻喜壞橋危當年野店題詩處又典春衣具午炊雲蹙魚鱗襯夕陽放翁繫纜水雲鄉一笻疾步人驚健斗酒髙歌自笑狂風暖市樓吹絮雪蠶生村舍采桑黃東阡西陌無窮樂底事隨人作許忙戲咏山隂風物宋陸遊萬里秦吳稅駕遲還鄉已歎鬢成絲城邉緑樹山隂道水際朱扉夏禹祠項里楊梅鹽可徹太白梁園吟云玉盤楊梅為君設吳鹽如花皎白雪不知楊梅酸者乃薦以鹽佳品未嘗用也湘湖蓴菜豉偏宜蓴菜最宜鹽豉所謂未下鹽䜴者言下鹽豉則非羊酪可敵蓋盛言蓴羹之美耳圖經草草尚堪恨好事他年采此詩與兒輩泛舟西湖一日間晴隂屢易宋陸遊逢著園林即欵扉酌泉鬻筍欲忘歸楊花正與人爭路鳩語還催雨點衣古寺題名那復在後生識面自應稀傷心六十餘年事雙塔依然在翠微梅市暮歸三山宋陸遊白日蠻童佩一壺壺乾時亦復村酤橫林露塔逺猶見暮靄籠山淡欲無緑浦例憑菰作界畫橈常遣鷺前驅此身元是滄浪客敢學髙人乞鏡湖梅市宋陸遊沙際人家半掩扉借炊小住不相違水生溪面大魚躍風定草頭雙蝶飛竹院遊僧聞鼓集煙畦老圃荷鉏歸浩然物外真堪樂回首浮生萬事非自九里平水至雲門陶山歷龍瑞禹祠而歸凡四日宋陸遊細雨如絲映晚暉店家小憩換征衣春農耕罷負犂去村社祭餘懷肉歸黃犢自依殘照卧白鷗爭傍小灘飛道邉舊識凋零盡誰記遼天老令威老子山行肯遽回直穿犖確上崔嵬未誇腳力如平昔且喜眉頭得暫開廟後故梁龍化去山前遺箭鶴銜來囊錢已盡君無笑草草猶能把一杯輿似雞栖寄兩竿山程三月尚春寒麥苗吐穗初成實梅子生仁已帶酸買飯猶勝乞墦客看耕借學勸農官還家莫道虛懷袖笋蕨隨宜亦滿盤點點桃花糝緑苔入門倚杖意悠哉數聲茶板齋初散一片溪雲雨欲來老宿龍鍾嗟獨在髙松磊砢憶新栽世間萬事俱難料他日重遊更幾回項遊龍井得一聨王伯齊同兒輩遊因足成之宋樓鑰路入風篁上翠微老龍蟠井四山圍水真緑淨不可唾魚若空行無所依勝處雖多終莫及舊遊誰在事皆非祇今匏繫何由到徒羡聮鑣帶月歸海潮圖宋樓鑰錢塘佳月照青霄壯觀仍看半夜潮每恨形容無健筆誰知收拾在生綃蕩搖直恐三山沒咫尺真成萬里遙金闕岧嶤天尺五海王自合日來朝借居湖上宋趙師秀出仕歸來貧似舊借園偶近畫橋居縱觀不用春攜酒清興何妨夜讀書港小只通間客棹樹低多礙故人車向時城裏緣塵土久欲湖邉住嵗餘孤山寒食宋趙師秀二月芳菲在水邉旅人消困亦隨緣晴舒蝶翅初勻粉雨壓楊花未放綿有句自題間處壁無錢難買貴時船最憐隱者髙眠地日日春風是管絃郡中遊觀之地清風樓為第一前此諸公有詩似覺摹寫未盡輒成唐律一篇約魏倅同賦宋王炎山屏四面碧相重苕霅無聲㵼玉虹萬户連甍皆在下一樓飛棟獨當中不容半點浮塵到但覺無邉爽氣通安得翛然辭物役披襟終日挹清風墨妙亭宋王炎晉唐書草可同科藥石雕鐫更不磨幾載雨淋兼日炙一朝雲集又星羅要知訪古搜求盡應為凝香暇逸多瀟灑髙懷堪健羡簿書堆案意如何括蒼石門瀑布宋戴復古小泊石門觀瀑布明知是水却疑非亂拋雪玉從天下散出雲煙到地飛夜聽蕭蕭洗塵夢風吹細細濕人衣謝公蠟屐經行處聞有留題在翠微簡李桐廬宋方嶽愧面何堪見客星移舟且莫近前汀鷗沙草長連江暗蟹舍潮回帶雨腥歸去尚餘初繭栗生來能費幾笭箵詩腸一夜生芒角試問故人雙玉瓶孤山宋鄭震又冒晴絲向水涯寒雲冉冉護巾紗能知緑鬢幾回至欲作黃冠此處家已把掖垣等茅舍不愁封禪對梅花晚風吹袂過船去看鶴上天衝碧霞蕺山戒珠寺寺王右軍故居也宋髙翥葉葉東風吹客衣昌安寺裏晚遊時欹斜竹屋羲之宅磨滅經幢率府碑佛化是誰留實相鵝亡猶自見方池逢僧小作煎茶供略問源流笑不知蘭亭宋髙翥老來渾不愛春遊來對蘭亭爛漫秋亭下水飛當日曲山前竹似舊時修二三客子因懷古八百餘年續勝流試與山靈論往事不知還肯點頭不同陳明叔遊湖作宋朱南杰四月湖邉冷若秋先賢堂下繫扁舟山頭積翠來新意波面飄紅憶舊遊無奈楊花欺倦客已多荷葉護輕鷗堤邉誰道春歸了猶有一聲黃栗留東天目二首并序宋施樞三潭之下有九溪之隔三潭之上有百丈瀑泉之勝飛橋之險探涉攀緣止到第三池工兩池及飛橋則無計可觀所以限仙凡也又有東西二井石室朝陽三洞黃冠厭人遊覽不肯引指僅披荆莽題名朝陽洞中不辭巘險訪龍潭潭底無窮碧似藍亂石鳴灘溪過九飛泉㵼瀑塹分三雖然道士能相引不比樵人得盡諳惆悵飛橋無路到乘風應許御雲驂不謂山行得此晴有名勝處必須經玉田草滿春無極石竇人稀夜不扄自料俗情應厭倦誰知幽意在空冥碧桃却似傳消息一曲瓊歌月滿庭西天目宋施樞苕水之源出此山地如邾魯始躋攀三池浚澤髙岡上一勺為霖反掌間著腳不知蒼漢近無心直共白雲間何時結屋枕泉玉滌盡塵根學大還重遊大滌洞天宋張藴澗水泠泠石髮新松花香靚翠崕深雲生不沒仙人迹丹化猶啼搗藥禽洗眼人多求聖水醒心吾獨愛清音杖藜更欲過新洞無奈春風又作霖贈天目吳君實宋林景熙詩興翩翩度雪溪巖雲猶護舊留題夢回殘月蒼梧曉家在春風秀麥西萱草堂深衣屢寄桃花觀冷酒重攜故山石鏡無人問空與寒猿照影啼括城宋林景熙寒芒曽動少微星一水溶溶疊嶂橫落日漁舟吹逺笛斷煙戍屋帶荒城沙鷗欲近如招隱關樹無多亦厭兵却憶鶯花亭下路太平簫鼓沸春聲重遊鏡曲次韻宋林景熙青眼重逢白髮新舊遊却恐是前身野鳩妬客招呼雨江燕隨人管領春曽附仙舟追李郭獨提詩律繼黃陳鏡中恨不移家住山水蒼蒼老釣綸西湖圗宋真山民兩袖春風一丈池等間踏破栁橋西雲開逺嶂碧千疊雨過桃花紅半溪青斾有情邀我醉黃鶯無恨為誰啼東風正在桃林外多少遊人逐馬蹄泊舟嚴灘宋真山民天色微茫入暝鐘嚴陵灘上繫孤篷水禽與我共明月蘆葉同誰吟晚風隔浦人家漁火外滿江愁思笛聲中雲開休望飛鴻影身即天涯一斷鴻永嘉秋夕宋真山民風戰枯桐敲紙窗擁衾無寐夜偏長譙樓三鼓夜將午雲雁數聲天正霜寓世此身驚逆旅寬懷何處不吾鄉江頭風景日堪醉酒美蟹肥橙橘香浙江通志卷二百七十五
