body:
  text: 浙江通志卷二百七十五藝文十七詩七言律西塞山下回舟作唐陶峴匡廬舊業是誰主吳越新居安此身白髮數莖歸未得青山一望計還成鴉翻楓葉夕陽動鷺立蘆花秋水明從此舍舟何所詣酒旗歌扇正相迎送靈徹上人還越州唐劉長卿禪客無心杖錫還沃洲深處草堂間身隨敝屨經殘雪手綻寒衣入舊山獨向青溪依樹下空留白日在人間那堪别後長相憶雲木蒼蒼但閉關餞王相公出牧括州唐劉長卿縉雲詎比長沙逺出牧猶承明主恩城對寒山開畫戟路飛秋葉轉朱轓江潮渺渺連天望旌斾悠悠上嶺翻蕭索庭槐空閉閣舊人誰到翟公門送惠法師遊天台山因懷智大師故居唐劉長卿翠屏瀑水知何在鳥道猿啼過幾重落日獨搖金䇿去深山誰向石橋逢定攀巖下叢生桂欲買雲中若箇峰憶想東林禪誦處寂寥惟聽舊時鐘送台州李使君兼寄題國清寺唐劉長卿露冕新承明主恩山城别是武陵源花間五馬時行縣山外千峰常在門晴江洲渚帶春草古寺杉松深暮猿知到應真飛錫處因君一想已忘言奉和劉採芳縉雲南嶺作唐庾光先百越城池枕海圻永嘉山水復相依懸蘿弱篠垂清淺宿雨朝暾和翠微鳥訝山經傳不盡花隨月令數仍稀幸陪謝客題詩句誰與王孫此地歸送賀監歸四明應制唐李白久辭榮祿遂初衣曽向長生説息機真訣自從茅氏得恩波寧阻洞庭歸瑶臺含霧星辰滿仙嶠浮空島嶼微借問欲棲珠樹鶴何年却向帝城飛九日宴浙江西亭唐錢起詩人九日憐芳菊延客髙齋宴浙江漁浦浪花搖素壁西陵樹色入秋窗禾奴向熟懸金實桑落新開㵼玉缸四子醉時爭􅊰習笑論黃霸舊為邦送王少府歸杭州唐韓翃歸舟一路轉青蘋更欲隨潮向富春吳郡陸機稱地主錢塘蘇小是鄉親葛花滿把能消酒梔子同心好贈人早晚重過漁浦宿遙憐佳句篋中新酬諸公宿鏡水宅唐嚴維幸免低頭向府中貴將藜藿與君同陽雁呌霜來枕上寒山映月在湖中詩書何德名夫子草木推年長數公問道漢家偏尚少此身那比訪芝翁送崔洞使往睦州兼寄薛司戶唐嚴維如今相府用英髦獨往南州肯告勞冰水近開漁浦出雪雲初卷定山髙木奴花映桐廬縣青雀舟隨白露濤使者應須訪廉吏府中惟有范功曹越溪村居唐戴叔倫年來作客寄禪扉多話貧居在翠微黃雀數聲催柳變清溪一路踏花歸空林野寺經過少落日深山伴侣稀負米到家春未盡風蘿間掃釣魚磯歸桐廬舊居寄嚴長史唐章八元昨辭夫子棹歸舟家在桐廬憶舊邱三月暖時花競發兩溪分處水爭流近聞江老傳鄉語遙見家山減旅愁或在醉中逢夜雪懷賢應向剡川遊憶遊天台寄道流唐張佐憶昨天台到赤城幾朝仙籟耳中生雲龍出水風聲急海鶴鳴臯日色清石筍半山移步險桂花當澗拂衣輕今來盡是人間夢劉阮茫茫何處行送王尊師歸湖州唐司空曙煙蕪滿洞青山繞幢節飄空紫鳳飛金闕乍看迎日麗玉簫遙聽隔花微多開石髓供調膳時御霓裳奉易衣莫學遼東華表鶴千年始欲一回歸題桐廬李明府官舍唐崔洞松堂寂寂對煙霞五栁門前聚曉鴉流水聲中視公事寒山影裏見人家觀風競美新為政計日還知舊觸邪可惜陶潛無限酒不逢籬菊正開花送王侍御佐婺州唐崔洞聞君作尉向江潭吳越風煙到自諳客路尋常經竹徑人家大抵傍山嵐緣溪花木偏宜逺避地衣冠盡向南惟有夜猿啼海樹思鄉望此意難堪自桐廬如蘭溪有寄唐權德輿東南江路舊知名惆悵春深又獨行新婦山頭雲半斂女兒灘上月初明風前蕩揚雙飛蝶花裏間關百囀鶯滿目歸心何處説欹眠搔首不勝情送章孝標校書歸杭州因寄白舍人唐楊巨源曽過靈隱江邉寺獨宿東樓看海門潮色銀河鋪碧落日光金柱出紅盆不妨公事資高卧無限詩情要細論若訪郡人徐孺子應須騎馬到沙村錢塘湖春行唐白居易孤山寺北賈亭西水面初平雲腳低幾處早鶯爭暖樹誰家新燕啄春泥亂花漸欲迷人眼淺草才能沒馬蹄最愛湖東行不足緑楊隂裏白沙堤西湖晚歸回望孤山寺贈諸客唐白居易柳湖松島蓮花寺晚動歸橈出道場盧橘子低山雨重棕櫚葉戰水風涼煙波淡蕩搖空碧樓殿參差倚夕陽到岸請君回首望蓬萊宫在海中央杭州春望唐白居易望海樓明照曙霞護江堤白踏晴沙濤聲夜入伍員廟栁色春藏蘇小家紅袖織綾誇柿蒂青旗沽酒趂梨花誰開湖寺西南路草緑裙腰一道斜餘杭形勝唐白居易餘杭形勝四方無州傍青山縣枕湖繞郭荷花三十里拂城松樹一千株夢兒亭古傳名謝教妓樓新道姓蘇獨有使君年太老風光不稱白髭鬚江樓夕望招客唐白居易海天東望夕茫茫山勢川形濶復長燈火萬家城四畔星河一道水中央風吹古木晴天雨月照平沙夏夜霜能就江樓銷暑否比君茅舍較清涼江樓晚眺景物鮮奇吟玩成篇寄水部張員外唐白居易淡煙疏雨間斜陽江色鮮明海氣涼蜃散雲收破樓閣虹殘水照斷橋梁風翻白浪花千片雁點青天字一行好著丹青圖畫取題詩寄與水曹郎湖上招客送春泛舟唐白居易欲送殘春招客伴客中誰最有風情兩瓶箬下新開得一曲霓裳初教成排比管絃行翠袖指麾船舫點紅旌慢牽好向湖心去恰似菱花鏡上行元微之除浙東觀察使喜得杭越鄰州先贈長句唐白居易稽山鏡水歡遊地犀帶金章榮貴身官職比君雖校小封疆與我且為鄰郡樓對玩千峰月江界平分兩岸春杭越風光詩酒主相看更合與何人答微之誇越州州宅唐白居易賀上人回得報書大誇州宅是仙居厭看馮翊風沙久喜見蘭亭煙景初日出旌旗生氣色月明樓閣在空虛知君暗數江南郡除却餘杭盡不如微之重誇州居其落句有西州羅剎之謔因嘲兹石聊以寄懷唐白居易君問西州城下事醉中疊紙為君書嵌空石面標羅剎壓捺潮頭敵子胥神鬼曽鞭猶不動波濤雖打欲何如誰知太守心相似抵滯堅頑兩有餘謝微之誇鏡湖唐白居易我嗟身老嵗方徂君更官髙興轉孤軍門郡閣曽間否禹穴耶溪得到無酒盞省陪波卷白骰盤思共彩呼盧一泓鏡水誰能羡自有胸中萬頃湖春題湖上唐白居易湖上春來似書圗亂峰圍繞水平鋪松排山面千重翠月點波心一顆珠碧毯線頭抽早稻青羅裙帶展新蒲未能拋得杭州去一半勾留是此湖得湖州崔十八使君書喜與杭越鄰郡因成長句代賀兼寄微之唐白居易三郡何因此結緣貞元科第忝同年故情歡喜開書後舊事思量在眼前越國封疆吞碧海杭城樓閣入青煙吳興卑小君應屈為是蓬萊最後仙西湖留别唐白居易征途行色慘風煙祖帳離聲咽管絃翠黛不須留五馬皇恩只許住三年緑藤隂下鋪歌席紅藕花中泊妓船處處回頭盡堪戀就中難别是湖邉答客問杭州唐白居易為我踟蹰停酒盞與君約略説杭州山名天竺堆青黛湖號錢塘㵼緑油大屋簷多裝雁齒小航船亦畫龍頭所嗟水路無三百官繫何因得再遊送姚杭州越任因思舊遊二首唐白居易與君細話杭州事為我留心莫等間閭里固宜勤撫恤樓臺亦要數躋攀笙歌縹眇虛空裏風月依稀夢想間且喜詩人重管領遙飛一盞賀江山渺渺錢塘路幾干想君到後事依然靜逢竺寺猿偷橘間看蘇家女採蓮故妓數人憑問訊新詩兩首倩流傳舍人雖健無多興老校當時八九年衢州徐員外使君遺以縞紵兼竹書箱因成一篇用答佳貺唐劉禹錫爛柯山下舊仙郎列宿來添婺女光逺放歌聲分白紵知傳家學與青箱水朝滄海何時去蘭在幽林亦自芳聞説天台有遺愛人將琪樹比甘棠白舍人自杭州寄新詩有栁色春藏蘇小家之句因而戲酬兼寄浙東元相公唐劉禹錫錢塘山水有奇聲暫謫仙官領百城女妓還聞名小小使君誰許喚卿卿鼇驚震海風雷起蜃鬭噓天樓閣成莫道騷人在三楚文星今向斗牛明謝浙東李侍郎越州春晚即事長句唐劉禹錫越中藹藹繁華地秦望峰前禹穴西湖草初生邉雁去山花半謝杜鵑啼青油晝卷臨高閣紅斾晴翻繞古堤明日漢庭徴舊德老人爭出若耶溪答東陽于令寒碧圖詩唐劉禹錫東陽令于興宗丞相燕國公之猶子生綺襦紈袴間所見皆貴盛而挈然有心如山東書生前年白有司願為親民官以自效遂補東陽及涖官以簡易為治故多暇日一旦於縣五里偶得奇境埋沒於翳薈中于生自以有特操而生於公侯家由覆蔭入仕常忽忽欲息因移是心開抉泉石芟去蘿蔦斧凡材畚息壤而清溪翠巖森立坌來因構亭其端題曰寒碧碧流貫於庭中如青龍蜿蜒冰徹射人樹石雲霞列於前昏旦萬狀惜其居地不得有聞於時故圖之來乞辭既無負尤物豫亦久翳蘿蔦者睹之慨然遂賦七言以貽後之文士東山本是佳山水何况曽經沈隱侯化得邦人解吟詠如今縣令亦風流新開潭洞疑仙境逺寫丹青到雍州落在尋常畫師手猶能三伏凛生秋贈李杭州唐張籍仙郎白首未歸朝應為蒼生領六條惠化州人盡清淨髙情野鶴與逍遙竹間虛館無朝訟山畔青田長夏苗終日政間時獨坐開門長望浙江潮送王十一郎遊剡中唐張籍越州都在浙河灣塵土消沉景象間百里油盆鏡湖水千峰鈿朵會稽山軍城樓閣隨髙下禹廟煙霞自往還想得王郎乘畫舸幾回明月墜雲間餘杭周從事以十章見寄詞調清婉難於遍酬聊和詩首篇以答來貺唐元稹擾擾紛紛旦暮間經營間事不曽間多緣老病推辭酒少有工夫久羡山清夜笙歌喧四郭黃昏鐘漏下重關何由得似周從事醉入人家醒始還重誇州宅旦暮景色兼酬前篇末句唐元稹仙都難畫亦難書暫合登臨不合居繞郭煙嵐新雨後滿山樓閣上燈初人聲曉動千門闢湖色宵涵萬象虛為問西州羅剎岸濤頭衝突近何如和樂天早春見寄唐元稹雨香雲淡覺微和誰送春聲入棹歌萱近北堂穿土早柳偏東面受風多湖添水色消殘雪江送潮頭湧漫波同受新年不同賞無由縮地欲如何天台唐牟融碧溪流水泛桃花樹繞天台迥不賖洞裏無塵通客境人間有路入仙家雞鳴犬吠三山近草靜雲和一徑斜此地不知何處去暫留瓊珮卧煙霞杭州天竺靈隱二寺頃嵗一布衣一遊及赴鎮會稽不敢以登臨自適竟不復到寺寺多猿猱謂之孫團彌長其類因追思為詩二首唐李紳翠巖幽谷髙低寺十里松風碧嶂連開盡春花芳草澗遍通秋水月明泉石文照日分霞壁竹影侵雲拂暮煙時有猿猱擾鐘磬老僧無復得安禪人煙不隔江城近水石雖清海氣深波動只觀羅剎相靜居難識梵王心魚扃晝鎖龍宫寶雁塔髙摩欲界金近日尤聞重雕飾世人遙禮二檀林若耶溪西施採蓮歐冶鑄劍所唐李紳嵐光花影繞山隂山轉花稀到碧潯傾國美人妖艷逺鑿山良冶鑄罏深凌波莫惜臨妝面瑩鍔當期出匣心應是蛟龍長不去若耶秋水尚沉沉宿越州天王寺唐李紳太和八年自浙東觀察使又除太子賔客分司東都始發州郭越人父老男女數萬攜壺觴至江津相送海隅布政暫期月江上霑巾愧萬人休按簿書懲黠吏未齊風俗昧良臣壺冰自潔中無玷鏡水非求下見鱗清夜佛宫觀色相却歸前老更前身却渡西陵别越中父老唐李紳海潮晚上江風急津吏篙師語默齊傾手奉觴看故老擁流爭拜見孩提慙非杜母臨襄峴自比朱翁别會稽漸舉雲帆煙水闊杳然鳬雁各東西却到西浙唐李紳出杭州界入蘇州八年浙西六郡災旱百姓飢殍道路相望米價翔貴是嵗浙東大稔因請出米五萬斛賤估以救浙西居人詔下蒙允是嵗王璠不奏飢旱反怒鄰境所救以為賣已遂與王涯合計誣搆罔上奏陳米非官米足私求利及璠伏誅蒙聖恩加察姦邪所罔初入浙西蘇州界吳人以恤災之惠猶懼旌幡留戒於回野之處不及城郭之所則相率拜泣於舟楫前是嵗盧周仁為蘇州刺史臨平水竭蕪葭死里社蕭條旅館秋嘗歎晉郊無乞糴豈忘吳俗共分憂野悲揚目稱嗟食林極翳桑顧所求苛政尚存猶惕息老人偷拜擁前舟欲到西陵寄王行周唐李紳西陵沙岸回流急船底黏沙去岸遙驛吏遞呼催下纜棹郎間立道齊橈猶瞻伍相青山廟未見雙童白鶴橋欲責舟人無次第自知貪酒過春潮送端上人遊天台唐施肩吾師今欲向天台去來説天台意最真溪過石橋為險處路逢毛褐是真人雲邉望寺鐘聲逺雪裏尋僧腳迹新只可且論經夏别莫教琪樹兩回春送僧貞實歸杭州天竺唐姚合石橋寺裏最清涼聞説茅菴寄上方林外猿聲連院磬月中湖色到禪牀他生念我身何在此世唯師性亦忘九陌相逢千里别青山重疊樹蒼蒼天竺寺殿前立石唐姚合補天殘片女媧拋撲落禪門壓地坳霹靂劃深龍舊攫屈槃痕淺虎新㧓苔粘月眼風挑剔塵結雲頭雨磕敲秋至莫言長屹立春來自有薜蘿交杭州官舍偶書唐姚合錢塘刺史謾題詩貧褊無恩懦少威春盡酒杯花影在潮回畫檻水聲微間吟山際邀僧上暮入林中看鶴歸無術理人人自理朝朝漸覺簿書稀題於越亭唐張祐扁舟亭下駐煙波十五年遊重此過洲觜露沙人渡淺樹梢藏竹鳥啼多山銜落照欹紅蓋水蹙斜文捲緑羅腸斷中秋正圓月夜來誰唱異鄉歌送元處士遊天台唐朱慶餘青冥路口絶人行獨與僧期上赤城樹列煙嵐春更好溪藏冰雪夜偏明空山雉雊禾苗短野館風來竹氣清若過石橋看瀑布不妨高處便題名吳興新隄唐朱慶餘春隄一望思無涯樹勢還同水勢斜深映菰蒲三十里晴分功利幾千家謀成既不勞人力境逺微偏隔浪花若與青山長作固汀洲肯恨柳絲遮早發天台中巖寺度關嶺次天姥岑唐許渾來往天台天姥間欲求真訣駐衰顔星河半落巖前寺雲霧初開嶺上關丹壑樹多風浩浩碧溪苔淺水潺潺可知劉阮逢人處行盡深山又是山遊錢塘青山李隱居西齋唐許渾小隱西齋為客開翠蘿深處遍蒼苔林間掃石安棋局巖下分泉遞酒杯蘭葉露光秋月上蘆花風起夜潮來雲山繞屋猶嫌淺欲棹漁舟近釣臺送劉郎中牧杭州唐薛逢一州橫制浙江灣臺榭參差積翠間樓下潮回滄海浪枕邊雲起剡溪山吳江水色連隄闊越俗舂聲隔岸還聖代牧人無逺近好將能事濟清間送慶上人歸湖州因寄道儒座主唐薛逢上人今去白蘋洲霅水苕溪我舊遊夜雨暗江漁火出夕陽沉浦雁花收間聽别鳥啼紅樹醉看歸僧棹碧流若見儒公憑寄語數莖霜鬢已驚秋九日陪越州元相燕龜山寺唐趙嘏佳晨何處泛花遊丞相筵開水上頭雙影斾搖山雨霽一聲歌動寺雲秋林光靜帶髙城晚湖色寒分半檻流共賀萬家逢此節可憐風物似荆州浙東陪元相公遊雲門寺唐趙嘏松下山前一徑通燭迎千騎滿山紅溪雲乍斂幽巖雨曉氣初髙大斾風小檻宴花容客醉上方看竹與僧同歸來吹盡嚴城角路轉橫塘亂水東送張又新除溫州唐趙嘏東晉江山稱永嘉莫辭紅斾向天涯凝絃夜醉松亭月歇馬曉尋溪寺花地與剡川分水石境將蓬島共煙霞却愁明詔徴非晚不得秋來見海槎劉阮再到天台不見仙子唐曹唐再到天台訪玉真青苔白石已成塵笙歌冥寞間深洞雲鶴蕭條絶舊鄰草樹總非前度色煙霞不似昔年春桃花流水依然在不見當時勸酒人自縉雲赴郡溪流百里輕棹一發曽不崇朝敘事四韻獻段郎中唐方干激箭溪湍勢莫憑飄然一葉若無乘仰瞻青壁開天罅斗轉寒灣避石稜巢鳥夜驚離島樹啼猿晝怯下巖藤此中明日尋知己恐似龍門不易登題桐廬謝逸人江居唐方干少小髙眠無一事五侯勳盛欲如何湖邉倚杖寒吟苦石上橫琴夜醉多鳥自樹梢隨果落人從窗外缷帆過由來朝市為真隱可要棲身向薜蘿因話天台勝景奇異仍送羅道士唐方干積翠千層一徑開遙盤山腹到瓊臺藕花飄落前巖去桂子流從别洞來石上叢林礙星斗窗邊瀑布走雲雷縱雲孤鶴無留滯定恐煙蘿不放回和剡縣陳明府登縣樓唐方干郭裏人家如掌上簷前樹木映窗櫺煙霞若接天台地分野應侵婺女星驛路古今通北闕仙溪日夜入東溟綵衣才子多吟嘯公退時時見畫屏送孫百篇遊天台唐方干東南雲路落斜行入樹穿村見赤城逺近常時皆藥氣髙低無處不泉聲映巖日向牀頭沒濕燭雲從柱底生更有仙花與靈烏恐君多半未知名石門瀑布唐方干奔傾潄石亦噴苔此是便隨元化來長片挂巖輕似練逺聲離洞咽於雷氣含松桂千枝潤勢畫雲霞一道開直是銀河分派落兼聞碎滴濺天台思桐廬舊居便送鑒上人唐方干莫道東南路不賖思歸一步是天涯林中夜半雙臺月洲上春深九里花緑樹繞村含細雨寒潮背郭卷平沙聞師却到鄉中去為我殷勤謝酒家錢塘江潮唐羅隱怒聲洶洶勢悠悠羅剎江邉地欲浮漫道往來存大信也知反覆向平流狂拋巨浸疑無底猛過西陵只有頭至竟朝昏誰主掌好騎赬鯉問陽侯霅溪晚泊寄裴庶子唐羅隱溪風如扇雨如絲間步間吟栁惲詩杯酒清狂非曩日野花狼籍似當時道窮謾有依劉感才急應無借冦期滿眼雲山莫相笑與君俱是受深知春日行次錢塘却寄台州姚中丞唐杜荀鶴豈為無心求上第難安帝里為家貧江南江北間為客潮去潮來老却人兩岸雨收鶯語栁一樓風滿角吹春花前不獨垂鄉淚曾是朱門寄食身桐廬縣作唐韋莊錢塘江盡桐廬縣水碧山青畫不如白羽鳥飛嚴子瀨緑蓑人釣季鷹魚潭心倒影時開合谷口間雲自卷舒此境只應詞客愛投文空弔木玄虛遊靈隱天竺二寺唐徐夤丹井冷泉虛易到兩山真界實難名石和雲霧蓮花氣月過樓臺桂子清騰踏回橋巡像設羅穿曲洞出龍城更憐童子呼猿去颯颯蕭蕭下樹行天台瀑布唐曹松萬仞得名云瀑布逺看如織挂天台休疑寶尺難量度直恐金