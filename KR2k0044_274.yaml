body:
  text: 浙江通志卷二百七十五藝文十七詩七言律西塞山下迴舟作唐陶峴匡廬舊業是誰主吴越新居安此身白髮數莖歸未得青山一望計還成鴉翻楓葉夕陽動鷺立蘆花秋水明從此舍舟何所詣酒旗歌扇正相迎送靈澈上人還越州唐劉長卿禪客無心杖錫還沃洲深處草堂閒身随敝屨經殘雪手綻寒衣入舊山獨向青溪依樹下空留白日在人間那堪别後長相憶雲木蒼蒼但閉闗餞王相公出牧括州唐劉長卿縉雲詎比長沙逺出牧猶承明主恩城對寒山開畫㦸路飛秋葉轉朱轓江潮淼淼連天望旌斾悠悠上嶺翻蕭索庭槐空閉閤舊人誰到翟公門送惠法師遊天台山因懷智大師故居唐劉長卿翠屏瀑水知何在鳥道猿啼過幾重落日獨摇金䇿去深山誰向石橋逢定攀巖下叢生桂欲買雲中若箇峰憶想東林禪誦處寂寥惟聴舊時鐘送台州李使君兼寄題國清寺唐劉長卿露冕新承明主恩山城别是武陵源花間五馬時行縣山外千峰常在門晴江洲渚帶春草古寺杉松深暮猿知到應真飛錫處因君一想已忘言奉和劉採芳縉雲南嶺作唐庾光先百越城池枕海圻永嘉山水復相依懸蘿弱篠垂清淺宿雨朝暾和翠㣲鳥訝山經傳不盡花随月令數仍稀幸陪謝客題詩句誰與王孫此地歸送賀監歸四明應制唐李白久辭榮祿遂初衣曽向長生説息機真訣自從茅氏得恩波寧阻洞庭歸瑶臺含霧星辰滿仙嶠浮空島嶼㣲借問欲棲珠樹鶴何年却向帝城飛九日宴浙江西亭唐錢起詩人九日憐芳菊延客髙齋宴浙江漁浦浪花摇素壁西陵樹色入秋窗禾奴向熟懸金實桑落新開㵼玉缸四子醉時争􅊰習笑論黄霸舊為邦送王少府歸杭州唐韓翃歸舟一路轉青蘋更欲随潮向富春吴郡陸機稱地主錢塘蘇小是鄉親葛花滿把能消酒梔子同心好贈人早晩重過漁浦宿遥憐佳句篋中新酬諸公宿鏡水宅唐嚴維幸免低頭向府中貴將藜藿與君同陽雁呌霜來枕上寒山映月在湖中詩書何徳名夫子草木推年長數公問道漢家偏尚少此身那比訪芝翁送崔峒使往睦州兼寄薛司戶唐嚴維如今相府用英髦獨往南州肯告勞冰水近開漁浦出雪雲初卷定山髙木奴花映桐廬縣青雀舟随白露濤使者應須訪㢘吏府中惟有范功曹越溪村居唐戴叔倫年來作客寄禪扉多話貧居在翠㣲黄雀數聲催柳變清溪一路踏花歸空林野寺經過少落日深山伴侣稀負米到家春未盡風蘿閒掃釣魚磯歸桐廬舊居寄嚴長史唐章八元昨辭夫子櫂歸舟家在桐廬憶舊邱三月暖時花競發兩溪分處水争流近聞江老傳鄉語遥見家山減旅愁或在醉中逢夜雪懐賢應向剡川遊憶游天台寄道流唐張佐憶昨天台到赤城幾朝仙籟耳中生雲龍出水風聲急海鶴鳴臯日色清石筍半山移歩險桂花當澗拂衣輕今來盡是人間夢劉阮茫茫何處行送王尊師歸湖州唐司空曙煙蕪滿洞青山遶幢節飄空紫鳳飛金闕乍看迎日麗玉簫遙聴隔花㣲多開石髄供調膳時御霓裳奉易衣莫學遼東華表鶴千年始欲一回歸題桐廬李明府官舍唐崔峒松堂寂寂對烟霞五栁門前聚曉鵶流水聲中視公事寒山影裏見人家觀風競美新為政計日還知舊觸邪可惜陶潜無限酒不逢籬菊正開花送王侍御佐婺州唐崔峒聞君作尉向江潭吴越風煙到自諳客路尋常經竹徑人家大抵傍山嵐緣溪花木偏宜逺避地衣冠盡向南惟有夜猿啼海樹思郷望此意難堪自桐廬如蘭溪有寄唐權徳輿東南江路舊知名惆悵春深又獨行新婦山頭雲半斂女兒灘上月初明風前蕩颺雙飛蝶花裏間闗百囀鶯滿目歸心何處説欹眠搔首不勝情送章孝標校書歸杭州因寄白舍人唐楊巨源曽過靈隠江邉寺獨宿東樓看海門潮色銀河鋪碧落日光金柱出紅盆不妨公事資高卧無限詩情要細論若訪郡人徐孺子應須騎馬到沙村錢塘湖春行唐白居易孤山寺北賈亭西水面初平雲脚低幾處早鶯争暖樹誰家新燕啄春泥亂花漸欲迷人眼淺草纔能沒馬蹄最愛湖東行不足綠楊隂裏白沙堤西湖晚歸回望孤山寺贈諸客唐白居易柳湖松島蓮花寺晚動歸橈出道場盧橘子低山雨重棕櫚葉戰水風凉煙波澹蕩摇空碧樓殿參差倚夕陽到㟁請君回首望蓬萊宫在海中央杭州春望唐白居易望海樓明照曙霞䕶江堤白蹋晴沙濤聲夜入伍員廟栁色春藏蘇小家紅袖織綾誇柿蔕青旗沽酒趂梨花誰開湖寺西南路草綠裙腰一道斜餘杭形勝唐白居易餘杭形勝四方無州傍青山縣枕湖遶郭荷花三十里拂城松樹一千株夢兒亭古傳名謝教妓樓新道姓蘇獨有使君年太老風光不稱白髭鬚江樓夕望招客唐白居易海天東望夕茫茫山勢川形濶復長燈火萬家城四畔星河一道水中央風吹古木晴天雨月照平沙夏夜霜能就江樓銷暑否比君茅舍較清凉江樓晚眺景物鮮奇吟翫成篇寄水部張員外唐白居易澹烟疎雨間斜陽江色鮮明海氣凉蜃散雲收破樓閣虹殘水照斷橋梁風翻白浪花千片雁㸃青天字一行好著丹青圖畫取題詩寄與水曹郎湖上招客送春汎舟唐白居易欲送殘春招客伴客中誰最有風情兩瓶箬下新開得一曲霓裳初敎成排比管絃行翠袖指麾船舫㸃紅旌慢牽好向湖心去恰似菱花鏡上行元㣲之除浙東觀察使喜得杭越鄰州先贈長句唐白居易稽山鏡水歡遊地犀帶金章榮貴身官職比君雖校小封疆與我且為隣郡樓對翫千峰月江界平分兩㟁春杭越風光詩酒主相看更合與何人答㣲之誇越州州宅唐白居易賀上人回得報書大誇州宅是仙居厭看馮翊風沙久喜見蘭亭烟景初日出旌旗生氣色月明樓閣在空虛知君暗數江南郡除却餘杭盡不如㣲之重誇州居其落句有西州羅刹之謔因嘲兹石聊以寄懷唐白居易君問西州城下事醉中疊紙為君書嵌空石面標羅刹壓捺潮頭敵子胥神鬼曽鞭猶不動波濤雖打欲何如誰知太守心相似抵滯堅頑兩有餘謝㣲之誇鏡湖唐白居易我嗟身老嵗方徂君更官髙興轉孤軍門郡閤曽閒否禹穴耶溪得到無酒盞省陪波卷白骰盤思共彩呼盧一泓鏡水誰能羡自有胸中萬頃湖春題湖上唐白居易湖上春來似書圗亂峰圍繞水平鋪松排山面千重翠月㸃波心一顆珠碧毯線頭抽早稻青羅帬帶展新蒲未能抛得杭州去一半勾留是此湖得湖州崔十八使君書喜與杭越鄰郡因成長句代賀兼寄㣲之唐白居易三郡何因此結緣貞元科第忝同年故情歡喜開書後舊事思量在眼前越國封疆吞碧海杭城樓閣入青煙吴興卑小君應屈為是蓬萊最後仙西湖留别唐白居易征途行色慘風烟祖帳離聲咽管絃翠黛不須留五馬皇恩只許住三年綠藤隂下鋪歌席紅藕花中泊妓船處處回頭盡堪戀就中難别是湖邉答客問杭州唐白居易為我踟蹰停酒盞與君約略説杭州山名天竺堆青黛湖號錢塘㵼綠油大屋簷多装雁齒小航船亦畫龍頭所嗟水路無三百官繫何因得再游送姚杭州越任因思舊游二首唐白居易與君細話杭州事為我留心莫等閒閭里固宜勤撫恤樓臺亦要數躋攀笙歌縹緲虚空裏風月依稀夢想間且喜詩人重管領遥飛一醆賀江山渺渺錢塘路幾干想君到後事依然静逢竺寺猿偷橘閒看蘇家女採蓮故妓數人憑問訊新詩兩首倩流傳舍人雖健無多興老校當時八九年衢州徐員外使君遺以縞紵兼竹書箱因成一篇用答佳貺唐劉禹錫爛柯山下舊仙郎列宿來添婺女光逺放歌聲分白紵知傳家學與青箱水朝滄海何時去蘭在幽林亦自芳聞說天台有遺愛人將琪樹比甘棠白舍人自杭州寄新詩有栁色春藏蘇小家之句因而戲酬兼寄浙東元相公唐劉禹錫錢塘山水有奇聲暫謫仙官領百城女妓還聞名小小使君誰許喚卿卿鼇驚震海風雷起蜃鬭嘘天樓閣成莫道騷人在三楚文星今向斗牛明謝浙東李侍郎越州春晚即事長句唐劉禹錫越中藹藹繁華地秦望峰前禹穴西湖草初生邉雁去山花半謝杜鵑啼青油晝卷臨高閣紅斾晴翻繞古堤明日漢庭徴舊徳老人争出若耶溪答東陽于令寒碧圖詩唐劉禹錫東陽令于興宗丞相燕國公之猶子生綺襦紈袴間所見皆貴盛而挈然有心如山東書生前年白有司願為親民官以自効遂補東陽及涖官以簡易為治故多暇日一旦於縣五里偶得奇境埋沒於翳薈中于生自以有特操而生於公侯家由覆䕃入仕常忽忽欲息因移是心開抉泉石芟去蘿蔦斧凡材畚息壤而清谿翠巖森立坌來因構亭其端題曰寒碧碧流貫於庭中如青龍蜿蜒冰徹射人樹石雲霞列於前昏旦萬狀惜其居地不得有聞於時故圖之來乞辭既無負尤物予亦久翳蘿蔦者睹之慨然遂賦七言以貽後之文士東山本是佳山水何况曽經沈隠侯化得邦人解吟詠如今縣令亦風流新開潭洞疑仙境逺冩丹青到雍州落在尋常畫師手猶能三伏凛生秋贈李杭州唐張籍仙郎白首未歸朝應為蒼生領六條恵化州人盡清浄髙情野鶴與逍遥竹間虛館無朝訟山畔青田長夏苗終日政閒時獨坐開門長望浙江潮送王十一郎游剡中唐張籍越州都在浙河灣塵土消沉景象閒百里油盆鏡湖水千峰鈿朶㑹稽山軍城樓閣随髙下禹廟烟霞自往還想得王郎乗畫舸幾回明月墜雲間餘杭周從事以十章見寄詞調清婉難於遍酬聊和詩首篇以答來貺唐元稹擾擾紛紛旦暮間經營閒事不曽閒多緣老病推辭酒少有工夫久羡山清夜笙歌喧四郭黄昏鐘漏下重闗何由得似周從事醉入人家醒始還重誇州宅旦暮景色兼酬前篇末句唐元稹仙都難畫亦難書暫合登臨不合居繞郭烟嵐新雨後滿山樓閣上燈初人聲曉動千門闢湖色宵涵萬象虚為問西州羅刹㟁濤頭衝突近何如和樂天早春見寄唐元稹雨香雲淡覺㣲和誰送春聲入棹歌萱近北堂穿土早柳偏東面受風多湖添水色消殘雪江送潮頭湧漫波同受新年不同賞無由縮地欲如何天台唐牟融碧溪流水泛桃花樹繞天台迥不賖洞裏無塵通客境人間有路入仙家雞鳴犬吠三山近草静雲和一徑斜此地不知何處去暫留瓊珮卧烟霞杭州天竺靈隠二寺頃嵗一布衣一游及赴鎮㑹稽不敢以登臨自適竟不復到寺寺多猿猱謂之孫團彌長其𩔖因追思為詩二首唐李紳翠巖幽谷髙低寺十里松風碧嶂連開盡春花芳草澗徧通秋水月明泉石文照日分霞壁竹影侵雲拂暮烟時有猿猱擾鐘磬老僧無復得安禪人烟不隔江城近水石雖清海氣深波動只觀羅刹相静居難識梵王心魚扃晝鏁龍宫寳雁塔髙摩欲界金近日尤聞重雕飾世人遥禮二檀林若耶溪西施採蓮歐冶鑄劍所唐李紳嵐光花影繞山隂山轉花稀到碧潯傾國美人妖艷逺鑿山良冶鑄罏深凌波莫惜臨妝面瑩鍔當期出匣心應是蛟龍長不去若耶秋水尚沉沉宿越州天王寺唐李紳太和八年自浙東觀察使又除太子賔客分司東都始發州郭越人父老男女數萬攜壺觴至江津相送海隅布政暫期月江上霑巾媿萬人休按簿書懲黠吏未齊風俗昧良臣壺冰自潔中無玷鏡水非求下見鱗清夜佛宫觀色相却歸前老更前身却渡西陵别越中父老唐李紳海潮晚上江風急津吏篙師語黙齊傾手奉觴看故老擁流争拜見孩提慙非杜母臨襄峴自比朱翁别㑹稽漸舉雲㠶烟水闊杳然鳬雁各東西却到西浙唐李紳出杭州界入蘇州八年浙西六郡災旱百姓飢殍道路相望米價翔貴是嵗浙東大稔因請出米五萬斛賤估以救浙西居人詔下䝉允是嵗王璠不奏飢旱反怒鄰境所救以為賣已遂與王涯合計誣搆罔上奏陳米非官米足私求利及璠伏誅䝉聖恩加察姦邪所罔初入浙西蘇州界吴人以䘏災之惠猶懼旌幡留戒於迴野之處不及城郭之所則相率拜泣於舟楫前是嵗盧周仁為蘇州刺史臨平水竭蕪葭死里社蕭條旅館秋嘗歎晉郊無乞糴豈忘吴俗共分憂野悲揚目稱嗟食林極翳桑顧所求苛政尚存猶惕息老人偷拜擁前舟欲到西陵寄王行周唐李紳西陵沙㟁回流急船底黏沙去㟁遥驛吏遞呼催下纜櫂郎閒立道齊橈猶瞻伍相青山廟未見雙童白鶴橋欲責舟人無次第自知貪酒過春潮送端上人游天台唐施肩吾師今欲向天台去來説天台意最真溪過石橋為險處路逢毛褐是真人雲邉望寺鐘聲逺雪裏尋僧脚跡新只可且論經夏别莫敎琪樹兩回春送僧貞實歸杭州天竺唐姚合石橋寺裏最清凉聞説茅菴寄上方林外猿聲連院磬月中湖色到禪牀他生念我身何在此世唯師性亦忘九陌相逢千里别青山重疊樹蒼蒼天竺寺殿前立石唐姚合補天殘片女媧抛撲落禪門壓地坳霹靂劃深龍舊攫屈槃痕淺虎新㧓苔粘月眼風挑剔塵結雲頭雨磕敲秋至莫言長屹立春來自有薜蘿交杭州官舍偶書唐姚合錢塘刺史謾題詩貧褊無恩懦少威春盡酒杯花影在潮迴畫檻水聲㣲閒吟山際邀僧上暮入林中看鶴歸無術理人人自理朝朝漸覺簿書稀題於越亭唐張祐扁舟亭下駐烟波十五年游重此過洲觜露沙人渡淺樹梢藏竹鳥啼多山銜落照欹紅盖水蹙斜文捲綠羅腸斷中秋正圓月夜來誰唱異郷歌送元處士游天台唐朱慶餘青冥路口絶人行獨與僧期上赤城樹列烟嵐春更好溪藏冰雪夜偏明空山雉雊禾苗短野館風來竹氣清若過石橋看瀑布不妨高處便題名吴興新隄唐朱慶餘春隄一望思無涯樹勢還同水勢斜深映菰蒲三十里晴分功利幾千家謀成既不勞人力境逺㣲偏隔浪花若與青山長作固汀洲肯恨柳絲遮早發天台中巖寺度闗嶺次天姥岑唐許渾來往天台天姥間欲求真訣駐衰顔星河半落巖前寺雲霧初開嶺上闗丹壑樹多風浩浩碧溪苔淺水潺潺可知劉阮逢人處行盡深山又是山游錢塘青山李隠居西齋唐許渾小隠西齋為客開翠蘿深處遍蒼苔林間掃石安棋局巖下分泉遞酒盃蘭葉露光秋月上蘆花風起夜潮來雲山遶屋猶嫌淺欲棹漁舟近釣臺送劉郎中牧杭州唐薛逢一州横制浙江灣臺榭參差積翠間樓下潮回滄海浪枕邊雲起剡溪山吴江水色連隄闊越俗舂聲隔㟁還聖代牧人無逺近好將能事濟清閒送慶上人歸湖州因寄道儒座主唐薛逢上人今去白蘋洲霅水苕溪我舊游夜雨暗江漁火出夕陽沉浦雁花收閒聴别鳥啼紅樹醉看歸僧棹碧流若見儒公憑寄語數莖霜鬢已驚秋九日陪越州元相燕龜山寺唐趙嘏佳晨何處泛花游丞相筵開水上頭雙影斾摇山雨霽一聲歌動寺雲秋林光静帶髙城晚湖色寒分半檻流共賀萬家逢此節可憐風物似荆州浙東陪元相公游雲門寺唐趙嘏松下山前一徑通燭迎千騎滿山紅溪雲乍斂幽巖雨曉氣初髙大斾風小檻宴花容客醉上方看竹與僧同歸來吹盡嚴城角路轉横塘亂水東送張又新除温州唐趙嘏東晉江山稱永嘉莫辭紅斾向天涯凝絃夜醉松亭月歇馬曉尋溪寺花地與剡川分水石境將蓬島共烟霞却愁明詔徴非晚不得秋來見海槎劉阮再到天台不見仙子唐曹唐再到天台訪玉真青苔白石已成塵笙歌冥寞閒深洞雲鶴蕭條絶舊隣草樹總非前度色烟霞不似昔年春桃花流水依然在不見當時勸酒人自縉雲赴郡溪流百里輕櫂一發曽不崇朝叙事四韻獻段郎中唐方干激箭溪湍勢莫憑飄然一葉若無乗仰瞻青壁開天罅斗轉寒灣避石稜巢鳥夜驚離島樹啼猿晝怯下巖藤此中明日尋知己恐似龍門不易登題桐廬謝逸人江居唐方干少小髙眠無一事五侯勲盛欲如何湖邉倚杖寒吟苦石上横琴夜醉多鳥自樹梢随果落人從窗外缷帆過由來朝市為真隠可要棲身向薜蘿因話天台勝景奇異仍送羅道士唐方干積翠千層一徑開遥盤山腹到瓊臺藕花飄落前巖去桂子流從别洞來石上叢林礙星斗窗邊瀑布走雲雷縱雲孤鶴無留滯定恐烟蘿不放回和剡縣陳明府登縣樓唐方干郭裏人家如掌上簷前樹木映窗櫺烟霞若接天台地分野應侵婺女星驛路古今通北闕仙溪日夜入東溟綵衣才子多吟嘯公退時時見畫屏送孫百篇游天台唐方干東南雲路落斜行入樹穿村見赤城逺近常時皆藥氣髙低無處不泉聲映巖日向牀頭沒濕燭雲從柱底生更有仙花與靈烏恐君多半未知名石門瀑布唐方干奔傾潄石亦噴苔此是便随元化來長片掛巖輕似練逺聲離洞咽於雷氣含松桂千枝潤勢畫雲霞一道開直是銀河分派落兼聞碎滴濺天台思桐廬舊居便送鑒上人唐方干莫道東南路不賖思歸一歩是天涯林中夜半雙臺月洲上春深九里花綠樹遶村含細雨寒潮背郭卷平沙聞師却到鄉中去為我殷勤謝酒家錢塘江潮唐羅隠怒聲洶洶勢悠悠羅刹江邉地欲浮漫道往來存大信也知反覆向平流狂抛巨浸疑無底猛過西陵只有頭至竟朝昏誰主掌好騎赬鯉問陽侯霅溪晚泊寄裴庶子唐羅隐溪風如扇雨如絲閒歩閒吟栁惲詩杯酒清狂非曩日野花狼籍似當時道窮謾有依劉感才急應無借冦期滿眼雲山莫相笑與君俱是受深知春日行次錢塘却寄台州姚中丞唐杜荀鶴豈為無心求上第難安帝里為家貧江南江北閒為客潮去潮來老却人兩㟁雨收鶯語栁一樓風滿角吹春花前不獨垂鄉淚曾是朱門寄食身桐廬縣作唐韋莊錢塘江盡桐廬縣水碧山青畫不如白羽鳥飛嚴子瀨綠蓑人釣季鷹魚潭心倒影時開合谷口閒雲自卷舒此境只應詞客愛投文空弔木𤣥虛游靈隠天竺二寺唐徐夤丹井冷泉虛易到兩山真界實難名石和雲霧蓮花氣月過樓臺桂子清騰踏回橋廵像設羅穿曲洞出龍城更憐童子呼猿去颯颯蕭蕭下樹行天台瀑布唐曹松萬仞得名云瀑布逺看如織掛天台休疑寳尺難量度直恐金刀易剪裁噴向林梢成夏雪傾來石上作春雷欲知便是銀河水堕落人間合却廻贈温州韓使君唐陳陶康樂風流五百年永嘉鈴閣又登賢嚴城鼓動魚驚海華屋尊開月下天内史筆鋒光案牘鄢陵詩句滿山川今年誰似名家貴越絶麾幢雁影連送張監察通判餘杭宋王禹偁郡城瀟灑浙江濱暫輟乗驄慰逺民莫放霜威誇御史且收風景属詩人雪侵樓上迎潮眼花擁湖中泛月身盡是公餘吟詠處好飛佳句寄詞臣寄杭州昭慶寺華嚴社主省常上人宋王禹偁夢幻吾身是偶然勞生四十又三年任誇西掖吟紅藥何似東林種白蓮入定雪龕燈焰直講經霜殿磬聲圎謫官不得餘杭郡空寄髙僧結社篇天章道中宋蘇舜欽畫鷁低飛湖水平髙低樓閣滿稽城人游鑑裏山相照魚戲空中日共明盡是荷風香不斷忽逢溪雨氣猶清籃輿却上蘭亭歩猿鳥雲蘿伴此行大禹寺宋蘇舜欽鑑湖盡處衆峰前寺古蕭疎水石間殿角北垂連禹廟松篁東去入稽山望中巖鳥自上下吟乆溪雲對往還我厭區區走名宦未能來此一生閒武林即事寄程給事宋趙抃七十随緣豈自由樂天曽不厭杭州青山未隠如千里白首重來又九秋月窟仙人遺桂子海門神物助潮頭自慚老守無心力坐鎮吾民静即休寄酬前人上已日鑑湖即事二首宋趙抃湖上初經上已春水邉遥見碧蕪新輕舟競泛無涯樂夾㟁希逢不醉人厨醖旋篘浮蟻釅府茶深㸃卧龍珍詩筒往復余知幸垂老親仁得善鄰蓬萊髙與卧龍俱位望兼崇似合符絃管夜深傳井邑樓臺春影蘸江湖休功即報期年政直節曽行萬里途真是玉皇香案吏坐看歸去賛蘿圗次韻前人蓬萊閣即事宋趙抃蓬萊窗外曉光分夢覺初驚杜宇魂但有吏供衙府喏斷無人到訟庭喧濛濛宿霧開湖面隠隠更潮過海門一水兩州皆重鎮越清杭劇不同論陪趙少師遊西湖兼簡坐客宋趙抃絲管喧喧擁畫船澄瀾上下照紅蓮一樽各盡十分酒四老共成三百年北闕音書休憶念西湖風物且留連杭民夾道焚香看白髮朱顔長夀仙送余少卿知睦州宋梅堯臣青山峽裏桐廬郡七里灘頭太守船雲霧未開藏宿鳥坡原將近見燒田養茶摘蕊新春後種橘收包小雪前民事蕭條官政簡家書時問霅溪邉湖山小隠二首宋林逋道着權名便絶交一峰青翠濕衡茅莊生已憤䲭鳶嚇揚子休譏蝘蜓嘲潏潏藥泉來石竇霏霏茶靄出松梢琴僧近借南薰譜且併閒工仔細抄閒搭綸巾擁縹囊此心随分識興亡黒頭為相雖無詔白眼看人亦未妨雲噴石花生劒壁雨敲松子落琴牀青猿幽鳥遥相呌數筆湖山又夕陽湖上晚歸宋林逋卧枕船舷歸思清望中渾恐是蓬瀛橋横水木已秋色寺倚雲峰正晚晴翠雨濕飛如見避紅蕖香嫋似相迎依稀漸近誅茅地雞犬林蘿隠隠聲湖上初春偶作宋林逋梅花開盡臘亦盡晴暖便如寒食天春色半歸湖㟁栁人家多上郭門船文禽相並映短草翠瀲欲生浮嫩烟幾處酒旗山影下細風時已弄繁絃西湖春日宋林逋争得才如杜牧之試來湖上輒題詩春烟寺院敲茶鼔夕照樓臺卓酒旗濃吐雜芳重巘㠋濕飛雙翠破漣漪人間幸有蓑兼笠且上漁舟作釣師秋日湖西晚歸舟中書事宋林逋水痕秋落蟹螯肥閒過黄公酒舍歸魚覺船行沈草岸犬聞人語出柴扉蒼山半帶寒雲重丹葉踈分夕照㣲却憶青溪謝太傅當時未解惜蓑衣孤山寺端工人房寄望宋林逋底處憑欄思渺然孤山塔後閣西偏隂沈畫軸林間寺零落棋枰葑上田秋景有時飛獨鳥夕陽無事起寒烟遲留更愛吾廬近秖待重來看雪天孤山寺宋林逋雲峰水樹南朝寺秖隔叢篁作並鄰破殿静披虀臼古齋房閒試酪奴春白公睡閣幽如晝張祐詩碑妙入神乗興醉來拖木突翠苔蒼蘚石磷磷桐廬郡齋書事宋范仲淹千峰秀處白雲驕吏隠雲邉豈待招數仞堂髙誰富貴一枝巢隠自逍遥杯中好物閒宜進林下幽人静可邀莫道官清無嵗計滿山芝术長靈苗與人約訪林處士阻雨宋范仲淹閒約諸公扣隠扃江天風雨忽飄零方憐春滿王孫草可恨雲遮處士星蕙帳未容登末席蘭舟無賴寄前汀湖山早晚逢晴霽重待尋仙入翠屏寄㑹稽丞趙振道宋孔文仲龜峰蜿蜒翠成堆軒檻前當秀色開此地登臨比圗畫與君談笑繼樽罍傳聞佳景無時之依舊清江不斷來今曰闗河隔千里相逢何處少徘徊和謝主簿游西湖宋韓維雲隂開剝日光穿和氣随風近酒船湖面波清渾見底樓頭山碧自生烟興長不忍回孤櫂歌懶才能逐緩絃因子尊前話歸計醉魂先到峴山邉送張仲容赴杭州孫公辟宋王安石萬屋相誇漆與丹笑歌常在綺紈間綵船春戲城邉水畫燭秋尋寺外山憶我屢随游客入喜君今赴辟書還遥知曼倩威行久赤筆應從到日閒宿水陸寺寄北山清順僧二首宋蘇軾草沒河隄雨暗村寺藏脩竹不知門拾薪煮藥憐僧病掃地焚香浄客魂農事未休侵小雪佛燈初上報黄昏年來漸識幽居味思與高人對榻論長嫌鐘鼓聒湖山此境蕭條却自然乞食遶村真為飽無言對客本非禪披榛覔路衝泥入洗足闗門聴雨眠遥想後身窮賈島夜寒應聳作詩肩有以官法酒見餉者因用前韻求述古為移厨飲湖上宋蘇軾喜逢門外白衣人欲膾湖中赤玉鱗游舫已装吴榜穏舞衫初試越羅新欲將魚釣追黄帽未要靴刀抹絳巾芳意十分强半在為君先踏水邉春新城道中宋蘇軾東風知我欲山行吹斷簷問積雨聲嶺上晴雲披絮帽樹頭初日挂銅鉦野桃含笑竹籬短溪栁自摇沙水清西崦人家應最樂煮芹燒笋餉春耕㑹客有美堂周邠長官與數僧同泛湖往北山湖中聞堂上歌笑聲以詩見寄因和宋蘇軾載酒無人過子雲掩闗晝卧客書裙歌喉不共聴珠貫醉面何因作纈紋僧侣且陪香火社詩壇欲斂鸛鵝軍凴君徧遶湖邉寺漲淥晴來已十分初自逕山歸述古召飲介亭以病先起宋蘇軾西風初作十分涼喜見新橙透甲香遲暮賞心驚節物登臨病眼怯秋光慣眠處士雲菴裏倦醉佳人錦瑟傍猶有夢回清興在卧聞歸路樂聲長九日尋臻闍黎泛舟至懃師院宋蘇軾湖上青山翠作堆葱葱鬱鬱氣佳哉笙歌叢裏抽身出雲水光中洗眼來白足赤髭迎我笑拒霜黄菊為誰開明年桑苧煎茶處憶著衰翁首重廻皎然有九日與陸羽煎茶詩余來年九日去此久矣去杭十五年復遊西湖用歐陽察判韻宋蘇軾我識南屏金鯽魚重來拊檻散齋餘還從舊社得心印似省前生覔手書葑合平湖久蕪漫人經豐嵗尚凋踈誰憐寂寞髙常侍老去狂歌憶孟諸常潤道中有懷錢唐寄述古宋蘇軾草長江南鶯亂飛年來事事與心違花開後院還空落燕入華堂怪未歸世上功名何日是尊前㸃檢幾人非去年柳絮飛時節記得金籠放雪衣杭人以放鴿為太守夀浮玉山頭日日風湧金門外已春融二年魚鳥渾相識三月鶯花付與公剩看新翻眉倒暈未應泣别臉消紅何人織得相思字寄與江邉北向鴻烟雨樓處州宋鄭俠仙人居處即鼇宫更作層樓峭倚空羣岫西來烟漠漠大江南去雨濛濛花鑣栁䇿熙怡裏耘笠漁簑笑語中别有夜楹千里月凭欄清興與誰同鑑湖道中宋陳造風烟住處放歸橈吟坐篷窗首屢搔萬壑千巖爭獻狀三江九堰自忘勞尚多菡萏張秋錦少待蟾蜍印夜濤繚碧深青誰子宅未容載酒訪清高智勇師歸永嘉自言所居在萬竹間乞詩送行宋韓駒上人歸去家何許萬竹深圍一把茅踏盡叢林參白足却來江檻俯青郊夜階􅉡􅉡風翻籜春路冥冥雨放梢肯拚清隂分百十暮年思與子論交游龍瑞宫次程公韻宋秦觀靈祠真館閟山隈形勢相髙對月臺莓徑翠依屏上轉藕花紅遶檻中開鶴啣寶箭排烟去龍䕶金書帶雨來夾道萬星攅騎火滿城争看使君回和孫莘老游龍洞宋秦觀葦蕭傳火度冥冥乍入清都醉魄醒草隠月崕垂鳳尾風生隂穴帶龍腥壁間泉貯千鍾碧門外天横數尺青更欲扶笻留頃刻却疑朝市已千齡南漪堂宋沈遘山遶湖堂寺遶山平生願向此中閒青雲白水相浮蕩野客髙僧獨往還少壯無嫌軒冕累因循將恐鬢鬚斑南漪最是逍遥地且挹清波濯媿顔舟過荻塘宋沈與求野航春入荻芽塘逺意相傳接渺茫落日一篙桃葉浪薰風十里藕花香河回遽失青山曲菱老難容碧草芳村北村南歌自答懸知嵗事到金穰登桐君祠堂宋楊時霜染溪楓葉葉丹翠鱗浮動夕波閒盤盤路轉千峰表冉冉雲扶兩腋間掠水輕鷗晴自戲凌雲飛雁暮争還結廬姓字無人㑹静對庭隂一解顔臘月望日出郊探春遊告成觀謁大禹祠酌菲飲泉遂至龍瑞宫觀禹穴薄暮而還宋王十朋禹𦵏稽山不記年丹青落盡廟依然神文秘在藏書穴儉徳流為菲飲泉龍瑞峰巒髙近日鑑湖烟水濶浮天東州仕處略經眼自笑探竒效馬遷林黄中少卿出守吴興芮國器司業以詩送之有今日桐城王刺史昔時遺愛在吾州之句用韻寄二公二首宋王十朋出處平時正且嚴猶於𤓰李謹疑嫌兩溪水照新明月湖州有明月樓六客堂逢舊紫髯孫莘老美鬚髯嘗守吴興安定化應孚學校謝公恩已結閭閻湖山清逺使君好想見邦人慰所瞻賢闗今日陽司業家在白蘋溪上州筆下波瀾含震澤胸中意氣属清流弁山疊拜南金贈泉嶺遥䝉明月投老去惟公獨青眼一言褒借勝封侯宿妙庭觀董雙成故宅宋王十朋小小琳宫氣象清雲軿遐想董雙成靈丹煉就覆金鼎仙鶴歸來聞玉笙兩絶老坡吟句境千秋太白曲中名塵埃奔走東歸客寄卧一菴聴雨聲西湖泛舟宋朱松望湖樓下照衰顔羞見塵埃兩鬢斑風艇縱看山轉側烟隄儘逐水回還喚人歸去城鐘急觸處相親嶺月彎不用新詩摹絶境定知長到夢魂間伏承侍郎使君垂示所與少傅國公唱酬西湖佳句謹次高韻聊發一笑宋朱熹越王城下水融融此樂從今與衆同滿眼芰荷方永日轉頭禾黍便西風湖光盡處天容濶潮信來時海氣通酬唱不誇風物好一心憂國願年豐桐廬舟中見山寺宋朱熹一山雲水擁禪居萬里江樓遶屋除行色匆匆吾正爾春風處處子何如江湖此去随鷗鳥粥飯何時共木魚孤塔向人如有意他年來借一籧篨七字謝紹興帥邱宗卿惠楊梅宋楊萬里越絶諸楊勝一時與儂瓜葛不曽知老夫自笑吾衰矣此客何從夢見之也解過江尋徳祖政緣作尹是邱遲渠伊不是南村派未分先驅事茘枝沈虞卿秘監招游西湖宋楊萬里蘇公堤逺栁生烟和靖園深竹映闗船入芰荷香處去人從雲水國中還似寒如暖清和在欲雨翻晴項刻間能為蓬萊老仙伯一杯痛快吸湖山餘杭道中宋范成大落花流水淺深紅盡日帆飛繡浪中桑眼迷離應欠雨麥鬚騷颯已禁風牛羊路杳千山合雞犬村深一徑通五栁能消多許地客程何苦鎮匆匆次韻韓無咎右司上已汛湖宋范成大休沐良辰不待晴徑稱閒客此閒行春衫欺雨應敎冷病眼得山元自明抹黛濃嵐圍坐晚揉藍新淥沒篙清棲鴉未到催歸去想被東風笑薄情與長文正夫遊北山宋范成大柳㟁松門勝處通馬蹄踏霧入空濛春光有力欺遊子天色無情沒斷鴻雨脚逺連山脚暗杏梢斜倚竹梢紅紽裘擁鼻吾衰矣年少猶嫌料峭風李翬知縣作亭西湖上余用東坡語名之曰飲綠遂為勝槩宋范成大芷葺蓮巢喚客遊蘆鞭席帽為君留未論吹水堪添酒且要移床學枕流乍霽却隂梅釀雨暫暄還冷麥吹秋石湖也似西湖好煩向蒼烟問白鷗上虞逆旅見舊題嵗月感懷宋陸游舴艋為家東復西今朝破曉下前溪青山缺處日初上孤店開時鶯亂啼倦枕不成千里夢壞墻閒覔十年題漆園傲吏猶非達物我區區豈足齊雨後集湖上宋陸游野水交流自滿畦芳池新漲恰平堤花藏宻葉多時在鶯占髙枝盡日啼繡袂寶裙催結束金樽翠杓共提攜白頭自喜能狂在笑擘蠻牋落醉題歸雲門宋陸游萬里歸來值嵗豐解装鄉墅樂無窮甑炊飽雨湖菱紫篾絡迎霜野柿紅壞壁塵埃尋醉墨孤燈餅餌對鄰翁㣲官行矣閩山去又寄千巖夢想中自雲門之陶山肩輿者失道行亂山中有茅舍小塘極幽邃求見主人不可意其隐者也宋陸游陂池幽處有茅堂井臼蕭條草樹荒小鴨怯波時聚散病蔬傷凍半青黄兒童衝雨收漁網婢子聞鐘上佛香我亦暮年思屏跡數椽何計得連牆臨安春雨初霽宋陸游世味年來薄似紗誰令騎馬客京華小樓一夜聴春雨深巷明朝賣杏花矮紙斜行間作草晴窗細乳戲分茶素衣莫起風塵歎猶及清明可到家自上竈過陶山宋陸游宿雨初收見夕陽縱横流水入陂塘蠶家忌客門門閉茶户供官處處忙綠樹村邉停醉帽紫藤架底倚胡床不因蕭散遺塵事那覺人間白日長雲門感舊宋陸游總角來游老未忘背人嵗月去堂堂穉松看到偃霜盖廢寺憶曽開寳坊佛几古燈寒焰短齋㕑新粟午炊香興䦨未忍登車去更倚溪橋立夕陽東闗二首宋陸游路入東闗物象奇角巾老子曳笻枝蠶如黑蟻桑生後秧似青針水滿時穿市不嫌㣲雨濕過溪翻喜壞橋危當年野店題詩處又典春衣具午炊雲蹙魚鱗襯夕陽放翁繫纜水雲鄉一笻疾歩人驚健斗酒髙歌自笑狂風暖市樓吹絮雪蠶生村舍采桑黄東阡西陌無窮樂底事随人作許忙戲咏山隂風物宋陸游萬里秦吴税駕遲還鄉已歎鬢成絲城邉綠樹山隂道水際朱扉夏禹祠項里楊梅鹽可徹太白梁園吟云玉盤楊梅為君設吴鹽如花皎白雪不知楊梅酸者乃薦以鹽佳品未嘗用也湘湖蓴菜豉偏宜蓴菜最宜鹽豉所謂未下鹽䜴者言下鹽豉則非羊酪可敵盖盛言蓴羹之美耳圖經草草尚堪恨好事他年采此詩與兒輩泛舟西湖一日間晴隂屢易宋陸游逢著園林即欵扉酌泉鬻筍欲忘歸楊花正與人争路鳩語還催雨㸃衣古寺題名那復在後生識面自應稀傷心六十餘年事雙塔依然在翠㣲梅市暮歸三山宋陸游白日蠻童佩一壺壺乾時亦復村酤横林露塔逺猶見暮靄籠山淡欲無綠浦例憑菰作界畫橈常遣鷺前驅此身元是滄浪客敢學髙人乞鏡湖梅市宋陸游沙際人家半掩扉借炊小住不相違水生溪面大魚躍風定草頭雙蝶飛竹院游僧聞鼔集烟畦老圃荷鉏歸浩然物外真堪樂回首浮生萬事非自九里平水至雲門陶山歴龍瑞禹祠而歸凡四日宋陸游細雨如絲映晚暉店家小憇換征衣春農耕罷負犂去村社祭餘懐肉歸黄犢自依殘照卧白鷗争傍小灘飛道邉舊識凋零盡誰記遼天老令威老子山行肯遽回直穿犖确上崔嵬未誇脚力如平昔且喜眉頭得暫開廟後故梁龍化去山前遺箭鶴銜來囊錢已盡君無笑草草猶能把一杯輿似雞栖寄兩竿山程三月尚春寒麥苗吐穗初成實梅子生仁已帶酸買飯猶勝乞墦客看耕借學勸農官還家莫道虛懐袖笋蕨随宜亦滿盤㸃㸃桃花糝綠苔入門倚杖意悠哉數聲茶板齋初散一片溪雲雨欲來老宿龍鍾嗟獨在髙松磊砢憶新栽世間萬事俱難料他日重遊更幾回項游龍井得一聨王伯齊同兒輩游因足成之宋樓鑰路入風篁上翠㣲老龍蟠井四山圍水真綠净不可唾魚若空行無所依勝處雖多終莫及舊游誰在事皆非祇今匏繫何由到徒羨聮鑣帶月歸海潮圖宋樓鑰錢塘佳月照青霄壮觀仍看半夜潮毎恨形容無健筆誰知收拾在生綃蕩摇直恐三山沒咫尺真成萬里遥金闕岧嶤天尺五海王自合日來朝借居湖上宋趙師秀出仕歸來貧似舊借園偶近畫橋居縱觀不用春攜酒清興何妨夜讀書港小只通閒客櫂樹低多礙故人車向時城裏緣塵土久欲湖邉住嵗餘孤山寒食宋趙師秀二月芳菲在水邉旅人消困亦随縁晴舒蝶翅初匀粉雨壓楊花未放綿有句自題閒處壁無錢難買貴時船最憐隠者髙眠地日日春風是管絃郡中游觀之地清風樓為第一前此諸公有詩似覺摹寫未盡輒成唐律一篇約魏倅同賦宋王炎山屏四面碧相重苕霅無聲㵼玉虹萬户連甍皆在下一樓飛棟獨當中不容半㸃浮塵到但覺無邉爽氣通安得翛然辭物役披襟終日挹清風墨妙亭宋王炎晉唐書草可同科藥石雕鐫更不磨幾載雨淋兼日炙一朝雲集又星羅要知訪古搜求盡應為凝香暇逸多瀟洒髙懐堪健羡簿書堆案意如何括蒼石門瀑布宋戴復古小泊石門觀瀑布明知是水却疑非亂抛雪玉從天下散出雲烟到地飛夜聴蕭蕭洗塵夢風吹細細濕人衣謝公蠟屐經行處聞有留題在翠㣲簡李桐廬宋方岳媿面何堪見客星移舟且莫近前汀鷗沙草長連江暗蟹舍潮回帶雨腥歸去尚餘初繭栗生來能費幾笭箵詩腸一夜生芒角試問故人雙玉缾孤山宋鄭震又冒晴絲向水涯寒雲冉冉䕶巾紗能知綠鬢幾回至欲作黄冠此處家已把掖垣等茅舍不愁封禪對梅花晚風吹袂過船去看鶴上天衝碧霞蕺山戒珠寺寺王右軍故居也宋髙翥葉葉東風吹客衣昌安寺裏晚游時欹斜竹屋羲之宅磨滅經幢率府碑佛化是誰留實相鵝亡猶自見方池逢僧小作煎茶供略問源流笑不知蘭亭宋髙翥老來渾不愛春游來對蘭亭爛漫秋亭下水飛當日曲山前竹似舊時脩二三客子因懐古八百餘年續勝流試與山靈論徃事不知還肯㸃頭不同陳明叔游湖作宋朱南杰四月湖邉冷若秋先賢堂下繫扁舟山頭積翠來新意波面飄紅憶舊遊無奈楊花欺倦客已多荷葉䕶輕鷗堤邉誰道春歸了猶有一聲黄栗留東天目二首并序宋施樞三潭之下有九溪之隔三潭之上有百丈瀑泉之勝飛橋之險探渉攀緣止到第三池工兩池及飛橋則無計可觀所以限仙凡也又有東西二井石室朝陽三洞黄冠厭人游覽不肯引指僅披荆莽題名朝陽洞中不辭巘險訪龍潭潭底無窮碧似藍亂石鳴灘溪過九飛泉㵼瀑塹分三雖然道士能相引不比樵人得盡諳惆悵飛橋無路到乗風應許御雲驂不謂山行得此晴有名勝處必須經玉田草滿春無極石竇人稀夜不扄自料俗情應厭倦誰知幽意在空冥碧桃却似傳消息一曲瓊歌月滿庭西天目宋施樞苕水之源出此山地如邾魯始躋攀三池浚澤髙岡上一勺為霖反掌間着脚不知蒼漢近無心直共白雲閒何時結屋枕泉玉滌盡塵根學大還重游大滌洞天宋張藴澗水泠泠石髮新松花香靚翠崕深雲生不沒仙人跡丹化猶啼搗藥禽洗眼人多求聖水醒心吾獨愛清音杖藜更欲過新洞無奈春風又作霖贈天目吴君實宋林景熙詩興翩翩度雪溪巖雲猶䕶舊留題夢回殘月蒼梧曉家在春風秀麥西萱草堂深衣屢寄桃花觀冷酒重攜故山石鏡無人問空與寒猿照影啼括城宋林景熙寒芒曽動少㣲星一水溶溶疊嶂横落日漁舟吹逺笛斷烟戍屋帶荒城沙鷗欲近如招隠闗樹無多亦厭兵却憶鶯花亭下路太平簫鼓沸春聲重遊鏡曲次韻宋林景熙青眼重逢白髮新舊游却恐是前身野鳩妬客招呼雨江燕随人管領春曽附仙舟追李郭獨提詩律繼黄陳鏡中恨不移家住山水蒼蒼老釣綸西湖圗宋真山民兩袖春風一丈池等閒踏破栁橋西雲開逺嶂碧千疊雨過桃花紅半溪青斾有情邀我醉黄鶯無恨為誰啼東風正在桃林外多少遊人逐馬蹄泊舟嚴灘宋真山民天色㣲茫入暝鐘嚴陵灘上繫孤篷水禽與我共明月蘆葉同誰吟晚風隔浦人家漁火外滿江愁思笛聲中雲開休望飛鴻影身即天涯一斷鴻永嘉秋夕宋真山民風戰枯桐敲紙窗擁衾無寐夜偏長譙樓三鼓夜將午雲雁數聲天正霜寓世此身驚逆旅寛懷何處不吾鄉江頭風景日堪醉酒美蟹肥橙橘香浙江通志卷二百七十五
