body:
  text: 浙江通志卷二百六十藝文二狀奏浙西災傷狀宋蘇軾臣聞事豫則立不豫則廢此古今不刋之語也至於救災恤患尤當在早若災傷之民救之於未饑則用物約而所及廣不過寛減上供糶賣常平官無大失而人人受賜今歳之事是也若救之於已饑則用物博而所及微至於耗散省倉虧損課利官為一困而已饑之民終於死亡熙寧之事是也熙寧之災傷本緣天旱米貴而沈起張靚之流不先事奏聞但務立賞閉糶富民皆爭藏榖小民無所得食流殍既作然後朝廷知之始勅運江西及截本路上供米一百二十三萬石濟之巡門俵米攔街散粥終不能救饑饉既成繼之以疾疫本路死者五十餘萬人城郭蕭條田野丘墟兩稅課利皆失其舊勘㑹熙寧八年本路放稅米一百三十萬石酒課虧減六十七萬餘貫畧計所失共計三百二十餘萬貫石其餘耗散不可悉數至今轉運司貧乏不能舉手此無他不先事處置之過也去年浙西數郡先水後旱災傷不減熙寧然二聖仁智聰明於去年十一月中首發徳音截撥本路上供斛㪷二十萬石賑濟又於十二月中寛減轉運司元祐四年上供額斛三分之一為米五十餘萬斛盡用其錢買銀絹上供了無一毫虧損縣官而命下之日所在歡呼官既住糶米價自落又自正月開倉糶常平米仍免數路稅務所收五穀力勝錢且賜度牒三百道以助賑濟本路帖然遂無一人餓殍者此無他先事處置之力也由此觀之事豫則立不豫則廢其禍福相絶如此恭惟二聖天地父母之心見民疾苦匍匐救之本不計較費用多少而臣愚魯無識但知權利害之輕重計得喪之大小以謂譬如庶民之家置莊田招佃客本望租課非行仁義然猶至水旱之歳必須放免欠負借貸種糧者其心誠恐客散而田荒後日之失必倍於今故也而況有天下子萬姓而不計其後乎臣自去歳已來區區獻言屢凟天聽者實恐陛下客散而土田荒也去歳杭州米價每㪷至八九十自今歳正月以來日漸減落至五六月間浙西數郡大雨不止太湖泛溢所在害稼六月初間米價復長至七月初㪷及百錢足陌見今新米已出而常平官米不敢住糶災傷之勢恐甚於去年何者去年之災如人初病今歳之災如病再發病狀雖同氣力衰耗恐難支持又縁春夏之交雨水調匀浙人喜於豐歳家家典賣舉債出息以事田作車水築圩髙下殆遍計本已重指日待熟而淫雨風濤一舉害之民之窮苦實倍去歳近者將官劉季孫往蘓州按教臣宻令季孫沿路體訪季孫還為臣言此數州不獨淫雨為害又多大風駕起潮浪隄堰率皆破損湖州水入城中民家皆尺餘此去歳所無有也而轉運判官張璹自常潤還所言畧同云親見呉江平望八尺間有舉家田苗没在深水底父子聚哭以船栰撈摝云半米猶堪炒喫青穟且以喂牛正恐自今雨止已非豐歳而況止不止又未可知則來歳之憂非復今年之比矣何以言之去年杭州管常平米二十三萬石今年已糶米十五萬石雖餘八萬石而糶米未已又縁去年災傷放稅及和糶不行省倉闕數所有上件常平米八萬石只可兌撥充軍糧更無見在惟有糶常平米錢近八萬貫而錢非救饑之物若來年米益貴錢益輕雖積錢如山終無所用熙寧中兩浙市易出錢百萬緡民無貧富皆得取用而米不可得故曳羅紈帶金玉横尸道上者不可勝計今來浙東西大抵皆糶過常平米見在絶數少熙寧之憂凜凜在人眼中矣臣材力短淺加之衰病而一路生齒憂責在臣受恩既深不敢别乞閒郡日夜思慮求來年救饑之術别無長䇿惟有秋冬之間不惜髙價多糴常平倉米以備來年出糶今來浙西數州米既不熟而轉運司又管上供年額斛斗一百五十餘萬石若兩司争糴米又大貴饑饉愈速和糴不行來年青黄不交之際常平有錢無米官吏拱手坐視人死而山海之間接連甌閩盜賊結集或生意外之事則雖誅殛臣等何補於敗以此須至具實聞奏伏望聖慈備録臣奏行下户部及本路轉運提刑兩路鈐轄司疾早相度來年合與不合准備常平斛㪷出糶救饑如合准備即具逐州合用數目臣已約度杭州合用二十萬石仍委逐司擘畫合如何措置令米價不至大段翔湧收糴得足如逐司以謂不須准備出糶救濟即令各具保明來年委得不至饑殍流亡結罪聞奏縁今來已是入秋去和糴月日無幾比及相度往復取旨深慮不及於事伏乞詳察速賜指揮臣屢犯天威無任戰慄待罪之至謹録奏聞伏候勅旨論浙西閉糴狀宋蘇軾本路今歳不熟初水後旱早晚俱傷髙下並損已具事由聞奏去訖勘㑹本路惟蘓湖常秀等州出米浩瀚常飽數路漕輸京師自杭睦以東衢婺等州謂之上鄉所産微薄不了本在所食諺云上鄉熟不抵下鄉一鍋粥蓋全仰蘇秀等州商旅販運以足官司之用今來雖一例災傷而蘇秀等州所産終是滂沛訪聞逐州例皆閉糴嚴立賞罰不許米斛出境是致杭州常平省倉糴買不行民亦闕食現今粳米已至八九十足錢㝷具牒蘇秀等州不得閉糴訪問逐州雖闕本司指揮依舊閉糴尋差識字公人陳宥往秀州抄録到所出榜示二本其大畧云如有諸色人擡價買米販往别州許人告捉立定賞多者至五十貫兼取問得杭州米行人狀稱因逐州現今立賞告捉私販全無米船到州認是逐州官吏堅意閉糴本司無縁止絶若商旅不行米貴不已公私窘乏盜賊之𩔖何所不有以此合係本司知管除已牒轉運提刑司外須至聞奏者再論閉糴狀宋蘇軾本路災傷本司已兩次奏聞竊見比年以來京東河北淮南等處災傷並蒙朝廷支賜錢米或於他路截撥斛斗賑救數目至廣今本路災荒不敢便望支賜截撥只乞稍寛轉運使年額上供使得轉換擘畫多方救恤已於十一月十日奏訖至今未奉指揮數内一事蘇湖常秀等州現今米商全不通行不惟逐州立賞閉糴亦為脚錢本重無由興販檢㑹元祐編勅諸興販斛斗及以柴炭草木博糧食者並免納力勝稅錢注云舊收稅處依舊例即災傷地分雖有舊例亦免本司看詳本路現今災傷正合施行上條已牒諸州施行仍散榜轄下城村鄉村外深慮逐處稅務自來收米斛力勝處指為課額今來雖係災傷合依上條放免至年終比較轉運司不容如此分說有虧欠折遭責罰須至奏請者為張嚴州乞免丁錢奏狀宋吕祖謙右臣昨者恭奉聖㫖差權發遣嚴州軍州事内竊悚循以未信之學遽當民社深懼識眊力淺疎濶舛謬仰負皇帝陛下責成共理之意敬陳悃愊懇辤弗俞黽勉遵承惶悚無地爰自就道徧訪本州利病往來者皆言嚴之為郡地瘠民貧丁鹽錢絹額數繁衆民不聊生此賦不除永無息肩之日臣瞻望威顔之始冒昧控訴天慈憫惻許令到任條具以聞仰見陛下至仁博臨勤恤民隠雖古先聖王之用心不是過也臣自到任延問耆老諮諏僚吏叅稽案籍始知本州丁鹽錢絹為民大害向來所聞百不一二謹條具本末上干天聽臣照對本州丁鹽錢絹之數據文開載自承平時每一丁官支給鹽一㪷計五觔每一觔計錢三十一文二分省共計錢一百五十六文省却納絹一丈二尺八寸數内一半係本色絹一半係折納見錢是時絹每一疋直錢一貫文省每丁計納絹六尺四寸計價錢一百六十文省又折帛見錢一百六十文省二項通計三百二十文省將官中所給鹽觔價錢百五十六文省此折外每丁實陪貼納錢百六十四文省所納不多公私兩便未見其害後來蔡京改變鹽法令大商入納買鈔支給袋鹽貨賣從此官私更不支給丁鹽徒令納絹鹽既停支絹價復長浸久浸増目今絹一疋估計折納七貫文省民力殫竭職此之由臣請為陛下詳言之兩浙東西路共管十五州軍户口物力無若本州之貧丁鹽錢稅亦無若本州之重本州地形阻隘絶少曠土山居其八田居其二澗曲嶺隈淺畦狹隴苗稼疏薄殆如牛毛細民崎嶇力耕勞瘁雖遇豐稔猶不足食惟恃商旅般販斗斛為命旬日不雨溪流已涸客船斷絶米價騰湧大小嗷嗷便同凶年每歳合六縣所納苗米除折納糯米外粳米正管八千七百五十一石猶不及湖秀富民一户所收之數所有官兵米糧逐年婺州應副一萬五千碩補助支遣尚闕一萬三千一十碩其力困乏不言可見重以坊郭鄉村邊溪去處每經巨浸垣牆頽仆盧舍傾摧資用散失生計蕭然若遇盜冦整葺未全復遭漂蕩民素窮乏又加此厄雖使止存兩稅猶懼輸納不前今乃經賦之外每丁使之重納丁錢鹽絹一丈二尺八寸其雙丁以上折科每疋計錢七貫文省凋瘵之民其何以堪且以兩浙諸郡論之平江府秀婺衢等四州自蠲免丁錢明州每丁止納錢六十文足惟湖州丁鹽錢絹在兩浙最號為重其烏程歸安長興安吉徳清五縣二丁共納絹一疋本州三丁共納絹三丈八尺四寸比烏程等五縣每三丁共少一尺六寸一丁止少五寸三分三釐相去不逺又武康一縣每四丁共納絹一疋則反輕於本州截長補短本州丁鹽錢絹較之湖州猶自頗重至於他郡重輕相絶可以𩔖推本州民力在兩浙十五軍州之下而賦歛反在十五軍州之上以至貧之民納至重之賦人情物理恐不應爾臣謹按本州丁籍建徳縣第一等至第四等户計一千八百四十九丁第五等有産稅户計一萬七千八百九十八丁無産稅户計三千八百二十二丁遂安縣第一等至第四等户計二千三百三十七丁第五等有産稅户計八千九百六十四丁無産稅户計一萬八百八十六丁夀昌縣第一等至四等户計九百七十七丁第五等有産稅户計七千六百三十九丁無産稅户計四千二百一十八丁分水縣第一等至四等户計五百六丁第五等有産稅户計一萬三千七百五丁無産税户計九百七十八丁淳安縣第一等至四等户計三千六百五十丁第五等有産稅户計八千三百三丁無産稅户計一萬八千二百七十四丁桐廬縣第一等至四等户計一千三百九十九丁第五等有産稅户計一萬五千四百八十丁無産稅户計二千一十八丁通計六縣第一等至四等户止有一萬七百一十八丁其第五等有産稅户共管七萬一千四百七十九丁雖名為有産大率所約不過尺寸分釐升合抄勺雖有若無不能自給其無産稅户共管四萬一百九十丁並無寸土尺椽飢寒轉徙朝不謀夕本州統管一十二萬二千三百九十三丁而第五等有産稅户共管一十一萬一千六百七十五丁是十分之中九分以上尫瘠困廹無所從出從前官吏明知其苦廹於上司督責之嚴汗顔落筆蹙額用刑笞箠縲繫殆無虚日愁嘆之聲閭里相接强悍者窮塞無聊散為攘竊四方遂指嚴州為多盜之區非獷俗獨鍾於此土蓋丁錢偏重於家邦原其情狀實可憐憫臣體訪得深山窮谷至有年三十餘顏狀老蒼不敢裹頭縣吏恐丁數虧折時復搜括相驗糾令輸納謂之貌丁民間既無避免之路生子往往不舉規脫丁口一歳之間嬰孺夭閼不知其幾小民雖愚豈無父子之愛徒以阨於重賦忍滅天性親相賊殺傷動和氣悖逆人理莫斯為甚臣聞之不覺涕下竊自惟念本州實光堯壽聖太上皇帝基命之地陪輔行都最為宻邇皇帝陛下方以不忍人之心行不忍人之政是容輦轂百里之間斯民顛頓愁悴父子不能相保意者未有以實上聞者臣職在拊摩尚復便文自營不言死有餘罪用敢竭誠悉意上徹旒扆臣恭覩紹興十四年十月二十二日勅三省同奉聖㫖永道郴州桂陽監及衡州茶陵縣民户於二稅之外尚循馬氏舊法添納丁身錢絹米麥流弊未除朕甚憫之可將逐州縣丁身錢絹米麥並與除放臣竊惟永道郴桂陽監茶陵四郡一縣邈在湖廣太上皇帝明見萬里之外不異逺方捐賦予民本州幸在闕門之側反不得如遐方荒翳沾濡徳澤臣竊痛之欲望聖慈特降明㫖將嚴州丁鹽錢絹依永道郴州桂陽監衡州茶陵縣及衢婺秀州平江府例盡行蠲除使一方仰父畜子吏不至門復有生民之樂不然乞如明州例每丁納錢六十文足又若以國用未裕則乞蠲免一半以寛民力亦為厚幸然終不若沛然盡蠲為滲漉無窮之澤也臣誠過慮恐議者或謂蠲免嚴州恐諸郡援例申請必致有虧經費臣竊謂聖人之治俾萬邦惟正之供丁鹽錢絹出於一切本非常賦陛下約已節用凡以為民異時帑藏充溢蠲免之令固將次第而舉今雖調度尚虚猶當先其尤急者用示省賦之漸以地則莫如本州之瘠以民則莫如本州之困以害則莫如本州之重先後之序宜自本州始況太上皇帝潛龍舊鎮亦非諸州遽敢援例惟願睿斷不疑俯賜開允俾一邦亟解倒懸之急臣言語短拙不能盡寫困廹之狀惟與合郡吏民澡心滌慮延頸跂足以俟鴻龎之施冒犯天威臣無任戰慄悚懼謹録奏聞伏候勅㫖申宰執狀宋王炎炎縁本州旱蝗之後百姓絶糧烏程歸安徳清三縣人乞賑濟狀已二千九百四十六紙安吉知縣何儒林申居民多掘野葛長興知縣趙通直申居民多買糟粕炎遣人出烏程歸安鄉村詢訪近碓坊居民多糴糟粕在法減放不及五分雖未當賑濟即與賑濟此如一杯水救車薪之火向望麥熟今又望禾熟日月尚長若更無米接濟弱者必死强者恐為盜炎三次申尚書省乞撥和糴米賑糶至今未䝉行下且救荒於百姓已死已為盜之後不若行於未死未為盜之先炎所以前後懇切哀告廟堂非是沽名非是市恩非是避罪實以百姓係國家根本不可坐視窮餓緣此上凟鈞聽今來事勢已急本州旋那融官錢糴米分去歸安之郎邪鄉烏程移風崇孝兩鄉及徳清武康安吉長興畧減價出糶然每處不過二三百石若不䝉朝廷行下將和糴米賑濟委是無米接濟此痛切利害又況出米賑糶收囘價錢貯管在庫秋熟糴還於朝廷無分文之損於窮民有莫大之惠建隆三年户部郎中沈義倫嘗言揚泗饑民多死郡中軍儲尚有百萬可貸至秋乃收粟有司沮之曰來歳洊饑將無所取價義倫曰國家方行仁政自宜感召和氣寧復憂水旱耶太祖悅命淮南發倉廩以賑饑民自祖宗以來勤恤民隠涵養生靈感召和氣累致豐年實由於此如義倫所請春貸秋償太祖尚不以為難今粟米收錢民有利官無所損何憚而不為江淮之民民也嘉興之民民也江淮請錢糴米而得錢不厭其多嘉興請米得米而不拒其求湖州之民亦民也獨屢請而不從炎不知其故豈謂災傷減放之少而不與之歟湖州雖號出米之地苗米僅有百萬不及姑蘇二十分之一於嘉興不及十分之一而户口繁滋過於他郡所以纔凶歉即便闕失若不賑濟豈特窮困餓死强壯為盜大非祖宗召和氣致豐年之道也不控告於廟堂將安所赴愬州治去行都一宿可至而守臣為民有請如訴於天此炎所以終夜徬徨不知措手足之地也不免再具狀申尚書省望鈞慈察炎懇切念民之無食狼狽之極乞賜施行以救一郡之命不勝大幸奏鹽課狀宋朱熹浙東所管七州而四州瀕海既是産鹽地分而民間食鹽必資客鈔州縣又有空額比較増虧此不便之大者夫産鹽地方距亭場去處近或跬歩之間逺亦不踰百里故其私鹽常賤而官鹽常貴利之所在雖有重法不能禁止故販私鹽者百十成羣或用大船裝載巡尉既不能訶州郡亦不能詰反與通同資以自利或乞覔財物或私收稅錢如前日所奏台州一歳所收二萬餘貫是也以此之故除明越兩州稍通客販粗有課利外台温兩州全然不成次第民間公食私鹽客人不復請鈔至有一場一團累月之間不收一帒不支一帒而官吏縻費吏卒騷擾有不可勝言者然以有比較之法州縣恐有殿罰則不免創立鹽舖抑勒民户妄作名色抑令就買出入暗昧不可稽考大畧瘠民以肥吏困農民以資游手為州縣為提舉主管者非不之知然皆以國計所資不敢輙有陳說日深月久民愈無聊若不變通恐成大患臣生長福建竊見本路下四州軍舊行産鹽之法令民隨二稅納産鹽錢而請鹽於官近歳官鹽雖不支給而民間日食私鹽官司既得産鹽稅錢亦不復問其私販雖非正法然實兩便欲乞聖慈特詔本司取㑹福建路轉運司下四州軍見行産鹽法將本路地里逺近鹽價髙低比附參考立為沿海四州鹽法其餘州軍自依舊法施行則亦革弊救民之一事也伏乞聖慈詳酌施行劄子與都提舉論災傷賑濟劄子宋王十朋某伏覩今歲風水災傷浙江之東越為最甚上貽宸念特加賑䘏某今有所見條具如後乞賜詳酌施行一本府有紹興二十七年以前積欠稅租數目非一今歳不登一年常賦猶無以輸積歳逋負何從而出欲乞敷奏朝廷將積欠稅租權行停閣俟來歳有秋仍舊輸納庶一郡生靈均被大惠一切見本府訟牒私債居多其間不實者半蓋受理之門既啟虚妄之訴遂興所負無幾為費不貲至有賂胥吏以買直者今凶荒救死不贍若加以私債民之流亡餓踣者必多欲乞敷奏朝廷一應新舊私債不問多寡並放一年官司不得受理俟豐稔盡償庶貧民不致重困一災傷去處䝉聖恩將義倉賑濟某慮諸邑人户有逃移於未獲㫖之前不知有賑䘏之恩者或為奴婢或為乞丐或為䑕竊殊可矜憫欲乞台慈委諸令佐廣行告諭招其復業如家計已破仍重加拯救無致失所以體聖主勤䘏之意一風潮所壞海塘如前日上虞縣陳請之𩔖依法合以食利人户修築今濱海之民既被災傷富者困貧者饑況工役廣大必難取辦若役他鄉又不能無怨欲乞台慈委自令佐或以官米或勸富民隨多寡出穀或米日給升斗以雇之方艱食之秋民幸於得食不憚出力就役如是則修築之功不日可就定奪餘姚縣和買劄子宋王十朋轉運司判下餘姚縣百姓魏臯等狀理本縣和買不均之弊某等索到所具和買一一詳看其餘姚所有不均緣本縣以第一等至第四等和買而第五等不科物力及三十八貫五百文者為第四等三十八貫四百九十九文者為第五等由是狡猾人户與鄉胥相比詭名隠寄下等自經界至今方及十年物力走弄已及一半自今所管物力比經界後其上四等户減退八萬餘貫流入第五等户其上户所科和買比舊每匹増八尺以上上户加少而和買日増下户加多而和買不及非昔日人户多富今日人户頓貧其弊實起於規免敷科多端隠稅法令雖嚴不能禁遏詞訴之興蓋由於此切覩紹興十三年指揮比年上户規逃物力往往折為下户髙者既降下者遂升今後自一等至五等均敷以絶増減之弊又覩十五年户部劄子欲從第一等至第四等科敷以優恤下户又云州縣逐處事體不同有以物力及百貫以上為等五等者有以十貫以下為第五等如止令第四等以上科敷物力少處實受其利物力多處併在四等却成偏重欲下轉運司令州縣相度隨宜措置科折某等切見會稽山隂諸暨餘姚四縣和買遵十五年指揮止科四等下户不科嵊縣新昌蕭山上虞和買遵十三年指揮並科下户内新昌嵊縣以物力十五貫以下上虞以二十貫以上蕭山以三十貫以上今餘姚所理和買不均及詭名減户之弊除欲以田畝科不可施行外欲乞准十五年指揮隨宜措置於新昌上虞四縣中斟酌髙下用二十貫以上和買庶得其中既有外縣已行之例又合相度隨宜之法物力三十八貫五百以下實多詭户其弊可革二十貫以下者實係貧民不害優䘏更合取自指揮施行頌於越九頌并序宋諸葛興興世家會稽俯仰巖壑惟禹陵所在自少康建祠今數千載比年時和歳豐邦人奉祀弗懈益䖍因感昔人九歌之作自禹暨嗣君二相與夫英霸賢牧髙人孝女顯有祠宇者輙為九頌效顰前作念昔楚騷之興蓋出於感憤而繼以規諷後之模仿者如九詠九愁之𩔖往往皆然興方蹈詠明時又其意主乎景仰先哲固無所謂感諷也直曰頌云爾獨妄論古人不能不發為一二而其歌吟嗟歎因寓之以擬騷之聲云瞻越山兮鏡之中鬱喬木兮岑叢倚青霞兮窆石枕碧流兮寳宫端黻冕兮穆穆列俎豆兮雍雍梅為梁兮挾風雨倐而來兮倐而去芝産殿兮間見橘垂庭兮猶古璧騰輝兮珪薦瑞書金簡兮緘石匱朝萬玉兮可想探靈文兮何為嗟洚水兮横流民昏墊兮隠憂運大智兮無事錫洪範兮敘疇身勞兮五嶽迹書兮九州亶王心兮不矜迄大海兮歌謳猗聖宋兮中興駐翠蹕兮稽城獨懷勤兮曠代燦奎文兮日星揚舲兮拊鼓呉歈兮鄭舞奠桂酒兮蘭肴庶幾髣髴兮菲食卑宫之遺矩右大禹陵肇三聖兮傳一中建太極兮參洪濛元圭錫兮汝績昭華歸兮汝躬大道公兮均禪繼家天下兮繇姒氏嵩石兮發祥謳歌兮與子誓甘野兮服叛養國老兮貴齒席不重兮味不貳琴瑟屏兮鐘鼓置思皇訓兮克儉必敬承兮敢墜祀四百兮綿景祚兆大横兮垂異世越山兮蜿蜒鏡水兮漪漣煥祠宫兮屹峙肅廡祀兮愉然端冕兮龍章執圭兮琳琅想規重兮矩疊恍韶奏兮鏗鏘右嗣王祠披竹簡兮典謨聖手斷兮唐虞登羣龍兮輔翼萃一堂兮都俞知人兮帝之哲動天兮帝之徳畫像兮民不犯舞干兮苗已格迨一旅兮中興嚴廟貌兮稽陵感會遇兮風雲崇像飾兮股肱憤夷楚兮陵上國忽庭堅兮祀俄息泚麟筆兮特書喟夷吾兮有力何汲汲兮詭誕謂明良兮相賊姦雄託兮自焚慨齊東兮母惑仰而觀焉興禮秩俯而察焉草木植功之逺兮難名民之思兮無斁右二相祠睇禹陵兮巋然邃珍館兮蟺蜎敞别室兮遺像崇英霸兮千年諗越民兮非黷祀推世家兮自遷史肇無餘兮開國傳後裔兮奮起痛夫椒兮深衂同國人兮勞欲采蕺兮食何味嘗腅兮志彌篤封以内兮種所司閫以外兮蠡所知羌厲志兮澡恥迄乘時兮決機盟上國兮王致胙按山南兮恢土宇陟鑑臺兮睨東海矩天門兮模地户惜規圖兮不𢎞幾弓藏兮夫烹蹇七術兮遺恨悵五湖兮遐征尚蟬嫣兮以復續終與享於鼻祖之庭右越王廟書畀姒兮力溝洫民奠居兮勤稼穡降嬴劉兮言水利嘉鄴渠兮夸鄭國慨元光兮瓠子決彼㓱封兮河之北悼一言兮貽時害諉天事兮非人力昔越守兮得賢侯慮逺久兮為民謀鏡一湖兮陂萬頃備瀦泄兮歳有秋寧殺身兮利人抑洙泗兮稱仁嗟後來兮私己田吾湖兮寖堙湖之復兮疇繼侯之心兮萬世酌清流兮擷蘭芷奉明薦兮非昵祀右馬太守廟典午西兮金谷輩渡而東兮藹多士嘉内史兮屏浮華淡物累兮頤天粹升冶城兮遐想友東山兮雅志修禊事兮蘭亭觴曲水兮羣英追雩風兮涵泳渺萬化兮均平紀清遊兮感慨剡形忘兮神詣蔚翔鳯兮一札寳連城兮千祀太傅起兮為蒼生扶晉鼎兮䠞苻秦内史歸兮樂山水師萬石兮飭孫子出與處兮兩賢意易地兮皆然右王右軍祠山簇簇兮環湖水淼淼兮縈紆人何遊兮明鏡鳥何飛兮畫圖懷賀老兮今昔想逸致兮林廬老之襟兮天濶老之神兮秋月飛翰兮龍鸞吐詞兮氷雪際熙運兮開元司縟典兮春官凌玉霄兮倚華葢驂鸞馭兮升西崑俄清夢兮綿綿恍乘雲兮登仙覲玉皇兮紫宸聆九奏兮鈞天牋天公兮遂志鼓干枻兮錦里吾朋兮鷗鷺吾賓兮煙水野服兮翩躚仙衣兮娱戲𬗟髙賢兮非茍於去就庶幾兮東門之𫝊鴟夷之子右賀監祠虬髯起兮龍翔耀兵威兮八方法羽林兮嚴禁衛握鉤陳兮掃欃槍視諸將兮噲等伍咨舊臣兮忠且武聳萬目兮矩薙衛九重兮心膂維東南兮都㑹辱吾王兮鎮撫暢威惠兮千載隤福祥兮兹土瞻袞服兮煌煌薦蕙肴兮葵觴匪震懾兮羅池亶愛思兮桐鄉王之澤兮流後裔更累葉兮奮忠義孰旌表兮陪廟祀顯一門兮厲斯世右城隍龎王廟悄叢祠兮江之湄懷予心兮肅祇表孝行兮尚之祀垂妙辭兮淳之碑嗟窈窕兮踐天性一念烈兮萬古鏡山眉兮蒼蒼江練兮茫茫江之水兮可竭娥之靈兮不可歇右曹娥廟蘇州嘉興屯田紀績頌并序唐李翰禹平九土溝洫之功大棄粒蒸人稼穡之務重自古有國家未嘗不率由斯道底慎其業故登平足以厚生殖禍難足以定凶災未有易此而能理者自羯羌亂常天步多艱兵連不解十有四年因之以饑饉重之以夭札死者暴露亡者惰遊編版之户三耗其二歸耕之人百無其一將多於官吏卒衆於農人古者八家為鄰一家從軍七家從之猶曰興師十萬内外騷動不得操農桑者七十萬家今乃以一夫家食一伍一餘子衣一卒師將不立人將不堪此聖上所以旰食宵興求古今令典可以濟斯難者莫出乎屯田廣徳初乃命相國元公倡其謨分命諸道節度觀察都團練使統其事擇封内閒田荒壤人所不耕者為其屯求天下良材善政以食為首者掌其務屯有都知羣士為之都知有治即邑為之官府官府既建吏胥備設田有官官有徒野有夫夫有任上下相維如郡縣吉凶相䘏如鄉黨有誅賞之政馭其衆有教令之法頒於時此其所以為屯也雖天子命之股肱贊之至於宣上命齊下力經地域制地事辨土宜均土法簡穡器修稼政陳三壤之種而敬其始考九農之要而成其終則都知之職專達其事焉詎可以非其人哉浙西觀察都團練使御史中丞兼呉郡守王公經國大賢憂公如家慎擇厥官以對明命浙西有三屯嘉禾為之大乃以大理評事朱自勉主之且揚州在九州之地最廣全呉在揚州之域最大嘉禾在全呉之壤最腴故嘉禾一穰江淮為之康嘉禾一歉江淮為之儉公首選於衆獨當其任有寛簡惠和之德知艱難勤儉之事政達乎本智通乎時仁愛足以結下機權足以成務嘉禾大田二十七屯廣輸曲折千有餘里公畫為封疆屬於海濬其畎澮達於川求遂氏治野之法修稻人稼澤之政芟以殄草剔以除木風以布種土以附根頒其法也冬耕春種夏耘秋穫朝廷夕課日考旬㑹趨其時也勤者勞之惰者朂之合耦助之移田救之宣其力也下稽功事達之於上上制禄食復之於下敘其勞也至若義感於内誠動於中徇國忘家恤人猶己野次露宿簞食瓢漿盡四體之勤趨一時之役大寒栗烈而猶執鼖鼔盛暑赫曦而不傳車蓋如登髙去梯與之死生投醪均味忘其飢渴然後知仁義之政必見於耕穫井田之法可施於甲兵夫如是人將竭其力地將盡其利天將與其時自贊皇為郡無凶年自朱公為屯無下歳元年冬收入若干斛數與浙西六州租稅埒朝嘉厥庸授廷尉評公又稽氣授時如前代法有白雀集於髙豐屯廪蓋大穰之徴也屯官某乙等聚而稱曰初公為屯人有二懼焉邑人懼其暴屯人懼其擾今溝封大牙而不相侵疆場日履而人不知方舟而上以饋師旅此功及於國也登量而入以寛征稅此徳加於人也古者智效一官政修一鄉猶歌之詠之手之足之況朱公之績如此其大者乎遂相與斵琬琰表阡陌南陽太守豈專刻石之功桐鄉嗇夫終踐大農之位其辭曰茫茫九區陽九躔災邱荒札瘥田卒汚萊天步未移連師滿野不耕不穫仰食於下嗷嗷遺人餬口饋軍帝曰予憂爰立其屯且戰且耕古之善經辟師肅祇王命是聽嘉禾之田際海茫茫取彼榛荒畫為封疆朱公涖之展器授方田事既飭黎人則康我屯之稼如雲漠漠夫位棊布溝封綺錯朱公履之勸耨趨穫稂莠不生螟蝥不作歳登億計征寛稅薄息我蒸人遂其耕鑿我屯之庾如京如坻嘉量是登方舟是維贊皇獻之逹於京師飽我六軍肅將天威畎距於溝溝達於川故道既堙變將為田朱公濬之執用以先浩浩其流乃與湖連上則有塗中亦有船旱則溉之水則泄焉曰雨曰霽以溝為天俾我公私永無饑年公田翼翼私田薿薿不侵其畔不犯其穡我倉既盈爾廩維億屯人熙熙邑人怡怡不擾其務不干其時我無爾暴爾無我欺我有官屬朱公訓之我有徒侶朱公恤之我有衆役朱公率之我有徴功朱公序之起於田中印綬纍纍何以況之福禄如茨何以久之刻篆於碑國朝御書大字蘭亭頌并序朱彞尊臣聞邃古之初首傳羲畫結繩而後丕煥堯文河則龍筴告期山則螺書徧刻禹功甫奏爰題岣嶁之碑周道方興厥有岐陽之鼓寫晉祠之記樹碣修廊磨岱宗之崖琢銘絶壁頒鏤文之紅管賜飛白於玉堂間有工書莫由造極我皇上日新盛徳天縱多能四海同文治軼唐虞之上萬幾餘暇心游翰墨之中睿藻光華曜六文而首出奎章景鑠包八體以髙鶱翠珉表闕里之庭銀牓徧名山之字允矣帝王第一卓哉今古無雙蓋自蒼頡沮誦以來洎乎鍾繇張芝而外六郗三謝非無典午名流一字萬殊秖有㑹稽内史冠書家而獨立集字學之大成永和九年暮春三月循洛師之舊典㑹江左之羣賢列坐流觴暢幽情於禊事興酣落筆傳醉本之蘭亭逮至再書終焉莫及賺來御史宜酬金縷之缾擕自率更足比支機之石馮湯趙葛各有臨摹褚薛顏楊終難髣髴且偏旁之互異或肥瘦之失中要皆徑寸之書罕覩非常之蹟皇上御帝鴻之墨海掞漢殿之璇跗用襞宮箋特書禊序作擘窠之字悉中準繩揮垂露之毫不踰規矩得心應手入化窮神雖曰臨書實超真蹟昔桑世昌著録四十五家考陶宗儀所陳百七十本自瞻御墨盡在下風使右軍更生亦當閣筆假常侍而在難免登牀爰遴畫省之員俾刻崇山之麓光同五緯麗並三辰於是相彼名區斲林屋青瓊之版載來巨浸駕呉江赤馬之船神魚吹浪以通波健犦服襄而轉轂遂歴樵風之境誕經曇􅙓之村鈎摹不爽夫纎微鐫勒無差乎苗髪䕃之華棟承以豐趺庇厥良材用新古蹟文石之牆百堵融邱之土再成看修竹之池臺矞雲長䕶勝鴻都之車馬遐壤來觀臣近矚榮光欣逢盛際對昭囘之雲漢儼咫尺之天顏敬綴蕪辭用揚懿美頌曰聖矣我后萬幾惟勤一有餘暇翰墨必親廼握乾符廼闡坤珍倬彼雲漢麗矣星辰金壺墨藪靡書不甄謂晉禊序遺法可循手追心慕入妙通神拓為大字天矩一新螭盤虎踞鳯翥龍伸爰即勝地勒以豐珉鵞墨之沼浮沫成淪有丹有雘有猗有陳有荃有蕙有松有筠有蘋有藻有羽有鱗有赫宸書鎮兹海垠三光轇轕七采璘彬吉雲環衛元氣彌綸如稽山夀於千萬春記桐柏山金庭觀記梁沈約若夫上元奥逺言象斯絶金簡玉字之書元霜絳雪之寳俗士不能仰窺學徒不敢輕眇非天稟上材未易可擬自惟凡劣識覽鮮窮早向幽遐蠲棄情累留愛林壑託分鳥魚既逺出天台定居兹嶺所居之山實惟桐柏仰出星河上參倒景髙崖萬仞邃澗千迴翹心屬念晩臥晨起採三芝而延佇飛九丹而宴息乘鳬輕舉留舄忘歸銘曰日為車馬芝成宮觀虹旌拂月龍輈漸漢萬春方華千齡始旦妙喜寺碑記畧唐顏真卿州西南杼山之陽有妙喜寺梁武帝之所置也大同七年夏五月帝御夀光閣㑹所司奏請置額帝以東方有妙喜佛國因以名之舊置在今州西金力山有唐太宗文皇帝升極之六年春二月移於此山山髙三百尺周回一千四百步蓋昔夏杼南迹之所今山有夏王村西北有夏駕山皆后杼所幸之地也晉呉興太守張元之呉興疏云烏程有墟名東張地形髙爽山阜四周即此山也亭前二十步跨澗有黄浦橋橋南五十步又有黃浦亭並宋鮑昭送盛侍郎及庾中郎賦詩之所其水自杼山西南五里黄蘗山出故號黄浦俗亦名黃蘗澗梁光禄卿江淹賦詩之所亭東偏有招隠院其前堂西厦謂之溫閣從草堂東南屈曲有懸巖徑行百步至呉興太守何楷釣臺西北五十步至避它城大厯七年真卿蒙刺是邦時浙西觀察判官殿中侍御史袁君髙巡部至州㑹於此山遂立亭於東南陸處士羽以癸丑冬十月癸卯朔二十一日癸丑建因名之曰三癸亭西北於叢桂之間創桂棚左右數百步有芳林茂樹悉產丹青紫三桂而華葉異各樹桂之下有支徑以袁君步焉因呼為御史徑白蘋亭記唐李直方新作白蘋亭書時且志政也梁太守栁惲賦詩於始因以名洲今邦伯李公成室於終兹用目亭度乎事則位均考乎地則境同合美配徳古今相望亭之時義至矣呉江之南震澤之隂曰湖州幅員千里棊布九邑卞山屈盤而為之鎮五谿叢流以道其氣其土沃其候清其人夀其風信實公之始至也用公寛明恕以懷之敬事賞罰以勸之賦令之先必度其物宜而咨於前訓故居者逸亡者旋或蹈境而留或聆聲而遷提封之内無榛灌繩墨之下無姦傲既而外邑多材郡不能渫公命懸諸善價俾代常徭於是乎幽巖之巨木斯出積歳之逋租必入公家受其利山氓䝉其惠繇是白蘋之制經矣洲在郡城南東亂霅溪而即焉白沙如浮流波環之前有大野綿雲繚以萬峯後有名都壓水駢以千室邑居可望而喧埃不及空水交映而雲天在下造物之工若有私於是焉茭菰叢生鳬鶴朋游嘉名雖曜清境或棄公於是相顯爽之宜立卑髙之程據洲之陽揆日之正掲大亭一焉修廕雙注北距於霅浮軒中流峩小亭二焉大可以施筵席小可以容宴豆凡棟宇之法輪奐之美銛刮宻石用成翬飛施宏壯而有度備彤紫而不蹹内則庭除朗潔彌望鋪雪曲沼逶迤以中貫飛梁夭矯而對起紫桂翠篁辛夷木蘭碧枚丹實蛇走珠綴鮮飈暗起縈葉振蘂落英飄颻灑空浮水天目神池之上多不名之卉洞庭水府之下産怪狀之石嶙峋乎玉容葳㽔乎瑤芳衆榮偶植羅列布濩外則差砌宜以白蘋間之紅蓼川與天逺百里如組邦君之來肅肅斾旌綵舟徐移魚躍鳥鳴亭成之日三呉之賢大夫集焉公用鼓鐘羽籥以落之然後使臣之臨重客之來獲游是者怳乎有遺區之歎則為邦之成績作亭之良規參合二美游揚四海坐馳而逝與廏置偕矧蘋之為用風有季女之奠騷有放臣之望夫以澗谿之賤微而可充王公之殷薦是故君子重之今扶贊勝賞也如彼哲賢咏歌也如此則是亭憑眺之外又有傳經之道焉若乃乘農隙之暇時購武夫之羡功廛閭不煩財用不屈揚昔人之休烈垂不朽之遐觀咨其創物之智有以加人不如是烏能及此己卯歳冬十月予將浮浙河上㑹稽凌縉雲觀赤城道出公之仁宇目覽亭之崇備舉書其實合春秋傳信之經後之人無視十洲孟浪之說而没其誼云杭州刺史㕔壁記唐李華唐虞之代四岳十二牧分掌諸侯宗周有方伯連帥之職秦有監郡漢魏以還初曰部刺史後曰州牧近代罷州牧復為郡太守太守刺史無恒其稱職同九卿假以符節雖親如魯衞貴若周召任切安人往往除拜天寳中朝廷以尚書郎人物之髙選二千石治元元之性命始以省郎臨大部若密邇京師或控壓衝㑹萬商所聚百貨所殖將擇良吏重難之杭州東南名郡後漢分㑹稽為呉郡錢唐屬隋平陳置此州咽喉呉越勢雄江海國家阜成兆人户口日益増領九縣所臨蒞者多當時名公宋丞相劉僕射崔尚書訏謨大政其間劉尚書裴給事之盛徳逺業魏左丞蘇吏部之公望遺愛在人韋太原崔河南劉右丞侯中丞節制方隅有事已來承制權假以相國元公旬朔之間生人受賜由是望甲餘州名士良將逓臨此部況郊海門池浙江三山動摇於掌端靈濤歕激於城下水牽卉服陸控山夷駢檣二十里開肆三萬室近歳災沴繁興寇盜連起百戰之後城池獨存王師雷動元惡授首乳哺疲人分命賢哲詔以兵部郎中范陽盧公幼平為之公體仁而清直方簡亮文以輔德武以靜人澄況有清江之姿巍峩有秋山之狀麾幢戾止未逾三月降者遷忠義歸者喜生育旌次讓利轅門無聲人咸曰休哉以卿佐之才遵王澤敷德政吾見其為公為侯福履宜之未見其極也刺史冠服印綬甲令載之故不書詞尚體要古史之遺也永泰元年七月二十五日記衢州刺史㕔壁記唐李華有漢已還州統郡郡或連十城州或部十郡江南多大郡如㑹稽丹陽鎮領遐濶分置部都尉自富春而南太末一縣抵於建安今此州即古會稽西部之地也雖官明吏修如曠阻何厥後相因損益無恒時更亂離罷置紛糅聖朝字育元元納於大中自衛公纍單于英公滅句麗天下和平户口繁衍元聖溥行葦蓼蕭之澤於下廷延公卿議割州邑謂疆與府近則易為理人與吏親則易為安以婺州封畛為廣分置衢州領六縣猶為大郡近歳析玉山全邑洎須江南鄉益信州而不為寡去年江湖不登兹境稍穰故浙右流離多就遺秉凡増萬餘室而不為衆呉越地卑而此方髙厚居者無疾人斯永年名山大川既麗且清俗尚文學有古遺風國朝不以州領郡郡與州更相爲號遷復從宜事之當也置觀察之司而董臨之此州長吏之選甲於他部忠貞之老則武威公李僕射傑親賢之望則信安郡王禕遺政行為故事名位光於屋壁開元天寳中始以尚書郎超拜名郡賀蘭大夫為之李郎中為之自逆酋悖天地之慈犯雷霆之誅賀蘭起北海之師郎中佐浙東之幕有文有武家頌户歌元惡天討餘凶稔罪聖恩示以鈇鉞之威未即大刑以為不教人戰是謂棄之乃分諸州置節度以鎮之州有防禦軍刺史為之使俾與夫持節某州諸軍事名實副焉以此州密邇山隂爰隸浙東㕔事憑髙㦸户臨江文武左右麾幢成列千夫長百夫長上寮郡掾屬邑官吏進退無聲趨拜風生仕不登州談不為榮凡為州者儒不毅勇則頓威攻守所由敗也勇不儒和則失人邦國所由困也故二千石之任方今為難至尊垂憂勤於兆人延俊乂於髙位以蘇州刺史陳郡殷公文可以成政武可以安人明斷良謀忠在王室其理也寛不容怠嚴不拒情清白貫於神明簡易契於黄老德必有隣歌聲宜繼由是命公典此邦也至若建置城府之年月升降品第之等差風俗貢賦之宜男女提封之數圖牒備矣老幼傳之今之所書畧舉勲德也元年建寅月二十一日左補闕趙郡李華於江州附述許氏呉興溪亭記唐權德輿溪亭者何在呉興東部主人許氏所由作也亭制約而雅溪流安以清是二者相為用而主人盡有之其智可知也夸目奓心者或大其閈閱文其節梲儉士恥之絶世離俗者或梯構巖巘紉結蘿薜世教鄙之曷若此亭與人寰不相逺而勝境自至青蒼在目潺湲激砌晴烟映嵐明晦萬狀鷗飛魚游不驚不喁時時歸雲來冒茆洞許氏方岸鶡冠支笻竹目送溪鳥口吟招隠則神機自生利欲自薄百骸六藏之内累無自而入焉有田二頃傅於亭下鎡基之功出於僮指每露蟬一聲秋稼成實倚杖眺逺不覺日暮歳食之羡則以給尊中方其引滿陶然心與境冥則是非得喪相與奔北之不暇又何可汨於胸中嚱夫舉世狥物以失性而不能自適且繆戾於動静之理君之動也代耕筮仕必於山水之鄉故尉義興贊武康皆有嘉聞而無秕政其静也則偃曝於斯亭循分食力不矯不躁庸詎知今日善閉不為異時之大來耶予知之深故因斯亭以廣其詞云湖州刺史㕔壁記唐顧況江表大郡呉興為一夏屬揚州秦屬㑹稽漢屬呉郡呉為呉興郡其野星紀其藪具區其貢橘柚纎縞茶紵其英靈所誕山澤所通舟車所㑹物土所產雄於楚越雖臨淄之富不若也其冠簪之盛漢晉以來敵天下三分之一其刺史沿革不同或稱太守或稱内史或稱都督他州或否如魯史晉乘侯牧一也其鴻名大徳在晉則顧府君秘秘子衆陸玩陸納謝安謝萬王羲之坦之獻之在宋則謝莊張永禇彥囘在齊則王僧䖍在梁則栁惲張謖在陳則呉明徹在隋則李徳林國朝則周擇從令聞也顏魯公忠烈也袁給事髙讜正也劉員外全白文翰也洎于頔大夫作塘貯水溉田三千頃今使君辭也唐景皇帝七代之孫先公尚書先公大夫奕葉之勲有功於民公實嗣之孔悝銘鼎天下重器天王褒拔于公襄陽節度李公陟當道觀察統諸道鹽鐵轉運二牧既陟惟公盤桓鴻鵠不飛飛即摩漢其逋者復其危者安其憂者泰所謂善輯於是拓郛耰萊就便除害政之餘力作消暑樓於南端復亭署於白蘋洲聿興廢土光明敞豁湧出谿谷其舊記吏部李侍郎紓撰其圖經竟陵陸鴻漸撰使君命況總兩家之說俶落晉宋訖於我唐凡一百九十七人及歴代良二千石儀形畧也鋪張屋壁設作存勸竦神告民春秋不朽之義也貞元十有五年十二月哉生魄華陽山人顧况述嘉興監記唐顧況正德利用阜財足食國之本也天寳末天下兵起乾元初上司奏議宜以鹽鐵之職總以社稷之臣幹乎山海之利以富人也淮海閩洛其監十焉嘉興為首朝廷以是蠲貸恒賦實乎大内大臣奉法為事選人㧞其賢幹昇於憲署以宣原隰光華之寵趨其署者如好鳥之棲茂林相國劉公嘗以大監小州不相若也故其職員不忝乎爵秩其刀布必倍於租入渤海髙君日倫世以勲烈緩歩濶視胷襟洞開中有方畧不循進級故一廷評於兹二紀傾酒定交擲金市義不餌不仁之粟前使張侍郎滂王尚書緯總其卜式𢎞羊之計遂有採山煮海之役十年六監興課特優至是未期從百萬至三百萬鹽人賈人各得其所故端介之節風采自髙繼夫漕運波委陸溢此天下之利器也可示人乎夫以步光莫邪切玉如泥刜鐘無聲不以一割均其銛鈍君子以知人則哲無徳不酬鴻飛九霄驥騁千里前秘書省著作佐郎顧況美使臣之得人貞元十七年歳在辛巳正月朔記括郡㕔壁記唐韋紓處州泝浙江東南七百里連山洞溪負海踰嶠綿歴更置至隋始為處州後復號括國朝置十道處州列在江南第居於上天寳初為縉雲郡大厯末復之刺史更置迭廢州郡沿革官則隨之大凡親人輔化任莫重焉太和五年紓以司駕員外郎奉符典州大懼不稱其職且以地險而瘠人貧而勞繭絲之稅重倍他郡故逢穰歳亦未若他郡之平年也為是邦者得不謹節而乃自封乎夫惟惻隠可以安疲羸忠信可以美風俗待物以誠飲人以和可以去刑法矣是三者紓未之逮而有志焉因書之壁以自儆烏程縣修建廨宇記唐楊夔叔孫昭子聘於晉晉受邾人之愬執昭子寘於箕使吏籓之昭子不以拘為意止之舍有壞必葺去之如始至故春秋賢之今有受九重之命牧其民公館摧圮視而不治者無乃取議於君子乎丹陽余公蟾再尹於烏程降車之春察訟決獄之暇周視縣署其門傾其㕔欹其墻圮其廡偃頽簷側楹倒移相倚風雨罔庇公歎曰建之者何人壞之者何心既叨守邑其敢不力自懋以圖嗣修乎然屬天未悔亂兵火猶熾専城而居者其可無備乎故儲軍數萬以戒不虞而軍須軍餼僉賦於縣務繁力匱久莫克舉公乃宵分而寢五鼔而興行忖坐維不遑所安近越於時方克僝功於是節冗費之用資贖辟之金僦力於農休徴工以厚償聽斷之餘䇿杖以巡慰其勞者朂其惰者設茗及餐日有省視於是工操斧斤如蟻集膻傭運其材如水赴泜財以儉而藴故其用給人以悅而使故其功倍不期年而衆宇鼎新若換大門中門修大㕔小㕔東閤西閤新押司錄事院建人吏祇候房砌縣之外城凡百餘雉創宅之周垣近一百堵修衆僚之宅五造㕔庫之橋六疏西亭之汙池製公㕔之什器其尤赫赫者如每歳徴賦主胥𩔖於㕔之西廡以其輸賦駢凑滿逸是虞乃増廡之一楹構欄以限其内外俾永絶罔耗此以見公謀之經久也縣之西北隅舊有帳院蓋鄉史團集里書之所歳月綿逺損壞無幾每遇霖潦則束席就燥以避其沾濕亦有時矣加以往來奔走泥濘之患舉邑是病無從可革公於是歴揆其損以籌完葺正傾支摧増新易壞復建修廊以抵於都門雨有依暑有䕃從役者不知其勞矣此以見公情之恤下也公帑摧敗上漏下濕周垣雖設扃不為固易所謂慢藏而誨盜也公乃擇堅以革枯選宏而化陋厚厥垣嚴厥關此以見公志之防閑也縣之圜扉頽危莫甚彼犯大辟得繫者豺狼野心脫走是務閉闔不謹垣牆不慎是遺肉於虎吻也且糞壤狼穢戾其矜恤之意公乃剗積弊滌宿汙席以潔其榻食以茹其餒此公之處心慮物也先是縣之秋曹掾蘇頲釋褐之官也始至兼戎曹遇上已節郡有角檝之戲郡守出觀則司戎者職其事因乘小艇往來檢馭郡治之南溪波浩洋而舟覆焉衆駭愕謂不可援俄聞空中有言曰無損蘇公忽有翰流以出其舟蘇公存焉俗稱其地為蘇公潭大厯中縣令李晤故相李紳之父也相國誕於縣署幼弄之歳墜於縣之東池逾數刻忽若有物翼者出於池而相國畧不為苦二者皆縣之故事而圖經不載公乃檄請邑人太學博士丘光庭輯遺事始著於籍於是盡列其狀請言於𢎞農楊夔夔學春秋固當以紀功書績為事公前任日崇修先聖之祠為文讚功刻石於縣今復紀此𢎞烈蓋以慰縣人之思也況公以民吏之勤請不可拒絶由是採石勒之乾寧丙辰七月記修東亭記唐楊夔故相國趙郡李公紳寳厯中亷問㑹稽日以呉興僧大光有神異之迹為碑文托郡守敬公建立於弁山法華寺㑹昌中詔毁佛寺此寺隨廢時縣令李式見碑述相國先人曾宰烏程遂移立於縣之東亭迄今五十載其碑毁折汝南周生以明經四命重宰烏程覩其廢逸遂求於故老獲舊文比𩔖於折碑所失者數字因重刻於石所缺文字不敢臆續蓋所以避不敏遵宣聖不知而作之戒也兼其舊傳云東亭之池始相國誕於縣署學弄之歳乳母惰於保持俾相國墜於池人莫之覺食頃如有物翼出於池面家人方得拯焉衆方懾駭而相國笑語無替於平日人咸異焉初有石數尺勒其事歳月綿逺石失其處故汝南生廣其亭濬其池再刻其碑重序厥繇蓋欲存縣之故事也生中和初宰此邑及期而代居閒閉關澹薄自得郡帥隴西公潛使人伺其所為知其安於貧樂於道閲百代以自娯未嘗以缺乏為撓由是官有乏必俾承之而生所至以静理聞癸丑夏復詔生宰烏程民吏忻忻再偶寛政閣鞭聽訟事簡庭閒君子哉汝南學古入仕有其經矣生家於陽羡數世以明經獲禄羣從昆弟並一舉而捷凡浙右之士因以嚮風國庠聞其名咸推先焉夫善為政者雖於人安而俗阜必當於事有立於意不忘以羽翼厥道也今徭賦既調風俗既安逋逸有歸􅑏孑有依然後搜遺文刋墜碑此以見興廢之心也建新亭疏汙池此以見繼絶之志也於乎當大兵之後民厭於煩役克俾其民康其務無媿於令長矣生既立大光上人之碑遂命夔記其年月别立於石且以旌斯亭之興有自也清白堂記宋范仲淹㑹稽府署據卧龍山之南足北上有蓬萊閣閣之西有凉堂堂之西有巖焉巖之下有地方數丈宻蔓深叢莽然就荒一日命役徒闢之中獲廢井即呼工出其泥滓觀其好惡曰嘉泉擇髙年吏問廢之由不知也乃扃而澄之三日而後汲視其泉清而白色味之甚甘淵然丈餘綆不可竭當大暑時飲之若餌白雪咀輕冰凛如也當嚴冬時若遇愛日得陽春温如也其或雨作雲蒸醇醇而渾蓋山澤通氣應於名源矣又引嘉賓以建溪日鑄卧龍雲門之茗試之則甘液華滋悅人襟靈觀夫大易之象初則井道未通泥而不食弗治也終則井道大成收而弗幕有功也其斯之謂乎又曰井徳之地蓋言所守不遷矣井以辨義蓋言所施不私矣聖人畫井之象以明君子之道焉予愛其清白而有徳義為官師之規因署其堂曰清白堂又構亭於其側曰清白亭庶幾居斯堂登斯亭而無忝其名哉寳元二年月日記湖學田記畧宋顧臨呉興學著於天下當其盛時學者不可勝録然常患惠而養之者不至也初得賜田五頃而瀕湖多潦歲入無幾嘉祐中臨嘗承乏教授計其資十常不能及二三既數年廼㑹太守鮑侯軻恤其不給慨然思有以廣其資方謀諸士僚適聞秀州杉楊涇有民訟田頻年不決官將兩奪之鮑侯廼用書請轉運使願得貸錢購所爭田以贍學者㑹轉運使賢樂聞其請遂用貸錢六十萬得田七頃其田當沃壤舊無暵潦之患以二年之入償貸錢然後率為學糧歳可以食百員夫棟宇之固易隳也泉布之富易耗也惟田之息可以霑及無涯語其始可謂惠而不費者也要其終可謂養而不窮者也湖鎮舍利寺塔記宋趙抃夫源已深日加浚根已固日加培彼培浚千萬人一二人焉將堙築㧞絶俾派涸枝槁閉窒顛踣吾不識其為可也浮屠寺法始漢明帝時入中國熒熒乎魏晉煌煌乎宋齊烜赫熾炎乎梁陳周隋之間王公卿士上焉倡導豪賈大姓下焉服從父提子手不釋不歸兄詔弟耳不佛不師貨貝玉帛懌樂棄施膚髪肢體無所愛恡州供里養家擎户跽祈利益怖罪苦心誠力勤一以宗乎其教如趨市然故金碧丹刻制擬王者不謂之僭炎而凉寒而燠鐘鼓而食不謂之泰唐髙祖念其如是也用傅奕益兵蕃生術武徳中將持斷力行以㑹建成之變禪代已畫於中道明皇開元初宰相姚崇籍其徒無壯者髪男女二萬人武宗聽羅浮道士議㑹昌五年詔壞寺招提蘭若合四萬四千還其人二十六萬宣宗即位憤道士議者戮於市遂復成樹逮黃巢兵火五代亂離既涸而浮既窒而流既槁而榮既踣而興其故何哉源素深根素固也國朝四聖垂八十年而又日浚而月培之今四海九州其居其人之數復不減㑹昌前嗚呼其盛矣乎雖所謂一二人焉其亦如之何哉古太末之地有舍利塔院年祀彌逺棟敗梁仆邑人江延厚遽興其廢建釋迦殿與其像崇崇眈眈輪奐華麗因而増葺之曰法堂曰方丈曰門曰官院無慮月四百萬錢起明道二年九月九日訖慶厯四年六月十九日院成明年十月十二日始為記銘曰修身治心得佛之深清淨慈智乃佛之事相好顒顒金碧穹穹雖曰外飾俾人内恭斯廟有塔是瞻是崇完堅弗隳永焉無窮嘉祐三禩素秋之季建者江氏永以為識有美堂記宋歐陽修嘉祐二年龍圖閣直學士尚書吏部郎中梅公出守於杭於其行也天子寵之以詩於是始作有美之堂蓋取賜詩之首章而名之以為杭人之榮然公之甚愛斯堂也雖去而不忘今年自金陵遣人走京師命予誌之其請至六七而不倦予乃為之言曰夫舉天下之至美與其樂有不得而兼焉者多矣故窮山水登臨之美者必之乎寛閒之地寂寞之鄉而後得焉覽人物之盛麗夸都邑之雄富者必據乎四達之衝舟車之㑹而後足焉蓋彼放心於物外而此娯意於繁華二者各有適焉然其爲樂不得而兼也今夫所謂羅浮天台衡嶽廬阜洞庭之廣三峽之險號為東南奇偉秀絶者乃皆在乎下州小邑僻陋之邦此幽潛之士窮愁放逐之臣之所樂也若乃四方之所聚百貨之所交物盛人衆為一都㑹而又能兼有山水之美以資富貴之娯者惟金陵錢塘然二邦皆僭竊於亂世及聖宋受命海内為一金陵以後服見誅今其江山雖在而頽垣廢址荒烟野草過而覽者莫不為之躊躇而悽愴獨錢塘自五代時知尊中國效臣順及其亡也頓首請命不煩干戈今其民幸富完安樂又其俗習工巧邑屋華麗蓋十餘萬家環以湖山左右映帶而閩商海賈風帆浪舶出入於江濤浩渺烟雲杳靄之間可謂盛矣而臨是邦者必皆朝廷公卿大臣若天子之侍從又有四方遊士為之賓客故喜占形勝治亭榭相與極遊覽之娯然其於所取有得於此者必有遺於彼獨所謂有美堂者山水登臨之美人物邑居之繁一寓目而盡得之蓋錢塘兼有天下之美而斯堂者又盡得錢塘之美焉宜乎公之甚愛而難忘也梅公清慎好學君子也視其所好可以知其人焉廣徳湖記宋曽鞏鄞縣張侯圖其縣之廣徳湖而以書并古刻石之文遺余曰願有記蓋湖之大五十里而在鄞之西十二里其源出於四明山而引其北為漕渠泄其東北入江凡鄞之鄉十有四其東七鄉之田錢湖溉之其西七鄉之田水注之者則此湖也舟之通越者皆由此湖而湖之產有鳬雁魚鼈茭蒲葭菼葵蓴蓮芡之饒其舊名曰鸎脰湖而今名大厯八年令儲仙舟之所更也貞元元年刺史任侗又治而大之大中元年民或上書請廢湖為田任事者左右之為出御史李後素驗視後素不為撓民以得罪而湖卒不廢刺史李敬方與後素皆賦詩刻石以見其事其說以為當時湖成三百年矣則湖之興其在梁齊之際與宋興淳化二年民始與州縣强吏盜湖為田久不能正至道二年知州事丘崇元躬按治之而湖始復轉運使言其事詔禁民敢田者至其後遂著之於一州勅咸平中賜官吏職田取湖之西山足之地百頃為之既而務益取湖以自廣天禧二年知州事李夷庚始正湖界起隄十有八里以限之湖之濱有地曰林村沙沫曰髙橋臘臺而其中有山曰白鶴曰望春自太平興國以來民冒取之夷庚又命禁絶而湖始復天聖景祐之間民復相率請湖為田州從事張大有按行止之而知州事李照又言其事報如至道詔書照以刻之石自此言請湖為田者始息而康定元年縣主簿曽公望又益治湖至張侯之為鄞則湖久不治西七鄉之農以旱告張侯為出營度民田湖旁者皆喜願致其力張侯計工度財擇民之為人信服有智計者使督役而日主之一不以屬吏人以不擾而咸勸趨於是築環湖之隄凡九千一百三十四丈其廣一丈八尺而其髙八尺廣倍於舊而髙倍於舊三之二鄞人累石陻水闕其間而扃以木視水之小大而閉縱之謂之碶於是又為之益舊總為碶九為埭二十隄上植榆栁益舊總為三萬一百丈又因其餘材為二亭於隄上以休而與望秦白鶴之山相值因以其山名山上有廟一以祠神之主此湖者一以祠吏之有功於湖者以熙寧元年十一月始役而以明年二月卒事其用民之力八萬二千七百九十有二而其材出於工之餘既成而田不病旱舟不病涸魚雁茭葦果蔬水産之良皆復其舊而其餘及於比縣旁州張侯於是可謂有勞矣是年予通判越州事越之南湖久廢不治蓋出於吏之因循而至於不知所以為力予方患之觀廣徳湖之興以數百年危於廢者數矣由屢有人故屢以治蓋大厯之間溉田四百頃大中八百頃而今二千頃矣則人之存亡政之廢舉為民之幸不幸其豈細也與故為之書尚俾來者知毋廢前人之功以永為此邦之利而又將與越之人圖其廢也張侯名峋字子堅以材聞去而為提舉兩浙路常平廣惠倉兼管勾農田差役水利事方且用於時云鄞縣經游記宋王安石慶厯七年十一月丁丑余自縣出屬民使浚渠川至萬靈鄉之左界宿慈福院戊寅升雞山觀碶工鑿石遂入育王山宿廣利寺雨不克東辛巳下靈巖浮石湫之壑以望海而謀作斗門於海濱宿靈巖之旌教院癸未至蘆江臨決渠之口轉以入於瑞巖之開善院遂宿甲申游天童山宿景德寺質明與其長老瑞新上石望玲瓏巖須猿吟者久之而還食寺之西堂遂行至東呉具舟以西質明泊舟堰下食大梅山之保福寺畢過五峯行十里許復具舟以西至小溪以夜中質明觀新渠及洪灣還食普寧院日下如呉林村夜未中至資壽院質明戒桃源清道二鄉之民以其事凡東西十有四鄉鄉之民畢已受事而余遂歸云宸奎閣記宋蘇軾皇祐中有詔廬山僧懷璉住京師十方淨因禪院召對化成殿問佛法大意奏對稱㫖賜號大覺禪師是時北方之為佛者皆留於名相囿於因果以故士之聰明超逸者皆鄙其言詆為下俚之詞璉獨指其妙與孔老合者其言文而真其行峻而通故一時士大夫喜從之遊遇休沐日璉未盥潄而户外之屨滿矣仁宗皇帝以天縱之能不由師傅自然得道與璉荅問親書頌詩以賜之凡十有七篇至和中上書乞歸老山中上曰山即如如體將安歸乎不許治平中再乞堅甚英宗皇帝留之不可賜詔許自便璉涉江少留於金山西湖遂歸老於四明之阿育王山廣利寺四明之人相與出力建大閣藏所賜頌詩榜之曰宸奎時京師始建寳文閣詔取其副本藏焉且命歳度一人璉歸山三十有三年年八十三軾出守杭州其徒使來告曰宸奎閣未有記君逮事昭陵而與吾師遊最舊其何以辭謹按古之人君號知佛者必曰漢明梁武其徒蓋嘗藉口而繪其像於壁者漢明以察為明梁武以弱為仁皆緣名失實去佛甚逺惟仁宗皇帝在位四十二年未嘗廣度僧尼崇侈寺廟干戈斧鑕未嘗有所私貸而天下卒以歸仁此所謂得佛心法者古今一人而已璉雖以出世法度人而持律嚴甚上嘗賜以龍腦鉢盂璉對使者焚之曰吾法以壞色衣以瓦鐵食此鉢非法使者歸奏上嘉歎久之銘曰巍巍仁皇體合自然神曜得道非有師傳維道人璉逍遙自在禪律並行不相留礙於穆頌詩我既其文惟佛與佛廼識其眞咨爾東南山君海王時節來朝以謹其藏月湖記宋舒亶湖在州城之西南隅南隅廢久矣獨西隅存今西湖是也其縱南北三百五十丈其衡東西四十丈其周回縱七百三十丈有奇其中有橋二絶湖而過日憧憧然天禧間直館李侯夷庚之所建也然僻在一隅初無游觀人跡往往不至嘉祐中錢侯君倚名公輔始作而新之總橋三十丈橋之東西有廊總二十丈廊之中有亭曰衆樂其深廣幾十丈其前後有廡其左右有室而又環亭以為島嶼植花木於是遂為州人勝賞之地方春夏時士女相屬鼓歌無虚日亭之南小洲前此有屋纔數椽乃僧定安守橋之所後浸廣今遂以為僧院夀聖是也其西又有佛祠四并其東皆鄉士大夫之所居其北有紅蓮閣大中祥符中章郇公名得象常倅是實創之有記在焉閣之北即郡酒務故時使人即湖以汲水勞費甚乃隄湖之中畜清流作樓於其上以轆轤引而注之至今以為便然是湖本末圖志所不載其經始之人與其歳月皆莫得而考蓋嘗聞之父老明為州瀕江而帶海其水蓄淺而易旱稍不雨居民至飲江水是湖之作所以南引它山之水畜以備旱歳始未之信也熙寧中歳大旱闔境取汲於其中湖為之竭既又穴為井置廬以守之鄞令虞君大寧常記其事刻石於夀聖院乃知父老之傳不誣也錢侯去距今幾三紀矣而湖輙浸廢不治其亭南既隄以為放生池瀕湖之民人縁隄以植菱芡之𩔖至占以為田淀淤蕪没幾不可容舟元祐癸酉劉侯純父名淑來守是邦連歲小旱乃一切禁止而疏浚之増卑培深環擁松栁復因其積土廣為十洲而敞壽聖之閣以其名名之蓋四明之景物具焉湖遂大治然其意初不在遊觀也古人於事蓋不茍作惟其利害伏於久逺難知之中所以後世貴因循者或莫之省而好功之士至樂為之紛紛也明有數湖危於廢者不特是湖也若劉侯可謂有志於民矣故具論之以冠諸國庶來者有考焉元祐甲戌三月記披雲亭記宋沈與求宣和四年春秘閣曾侯自山陽移守嘉禾在三呉為支郡封域儉狹而物產饒衍居民敦本好約稱易治侯至因其俗施教條數十民畏慕之相戒毋犯侯令越數月政成從容與僚吏曰郡雖小然介江湖之間水陸舟車孔道四出賓客之至無虚日顧地洿下無髙明之居以稱游晏何以壯千里觀望盍圖之先是内相葉公道卿於子城西北築亭榜曰披雲後人更名樓庳屋三楹歳久且圮又西北其户通闤煙塵宛轉於几席間非登臨之美侯乃以完堞餘工悉撤去故屋基増髙培薄取名材更南向為亭外施重簷而中敞之深明洞達丹碧燦然亭西挾以水閣曲欄横檻映帶左右它日與客登焉送天末之孤帆迎海上之遥岑目力所窮與空為際更唱遞嘯觴酌流行神意徜徉如在塵垢外侯舉觴屬某曰兹遊樂乎為我記之某謂成壞哀樂奄忽之變在物也物不可以為常顧吾所建立有不可磨滅者物則託焉以垂不朽登斯亭也徘徊四顧蓋呉越交兵之場而句踐夫差之爭雄也深溝髙城忽變而為荒田野草穴狐狸而伏鰌鱓事可哀已前年盜弄潢池兵傅吾城連三日夜民大震擾天子至出禁旅討平之盗去而城完因得創亭其上使吾輩一觴相屬是可樂也於是乎書婺州新城記宋楊時宣和二年盜發幫原蹂數州之地皆狼狽失守而婺女罹害尤甚天子惻然遴選儒臣鎮撫兹土河南范公實被其選公至之日殘孽未殄四境之内鉦鼓相聞環寇師且數萬而轉輸餽餉取具焉夷傷之餘竄伏山谷還定安集無一不得其所越歳杪寇平百廢具舉頑兇革心屏息聽命無敢復出為惡者政成治定乃顧謂僚屬曰國家承五季之亂海内分裂擅强兵負固而不服者相屬獨錢氏據有全呉首效臣順為屏翰垂二百年無東顧之憂故城郭不修士卒不練一夫跳梁而六州暴骨蓋承平之久吏惰而不知戒故也則城郭之不完其可忽諸於是因其舊而新之周十里基三丈面廣三之二而髙倍之濬隍為池陶甓為堞募七邑之夫倍其庸食因以濟其艱食費無慮數百萬而一毫不取於民又載食與醪時往勞之故人樂於趨事而忘其勤以工計之六萬一千七百有奇經始於九月甲戌告成於十有二月丁酉望之屹然山立不可凌犯民吏歡欣鼓舞相與詣余而告曰昔之垝垣廢址踐為通衢故闗無譏宵行者無禁草竊姦宄得以自肆今吾民奠枕而居無異時之患寧可不知其所自耶願紀成績以昭示於後余嘗讀易至坎之彖曰王公設險以守其國而後知先王為城郭溝池之固蓋本諸義理之不可無者故文武以天保以上治内采薇以下治外命南仲往城朔方以六月之詩考之文武所以治内外者本末先後廢一不可也今婺女之政綱條紀律纎悉備具而又完其郭郛為邦人無窮之賴芳猷偉績追配南仲是宜有紀也使後之人知本末先後之序無廢前修豈小補之哉浙江通志卷二百六十
