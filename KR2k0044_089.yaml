改設駐海鹽所屬海寧把總寧紹參將嘉靖三十九年改設駐舟山所屬定海臨觀昌國三把總溫處參將嘉靖三十五年添設駐溫州所屬金盤把總台金嚴參將嘉靖三十九年添設駐松海所屬松海把總遊擊將軍二員軍門標下左營萬厯二年改設軍門標下右營嘉靖三十九年設坐營中軍都司萬厯二年改設總捕都司一員嘉靖四十五年添設駐衢州把總七員定海總兵下管遊哨兵船昌國松海定海金盤海寧臨觀紹興萬歷八年革紹興一員明實録嘉靖三十二年六月南京御史趙震上禦倭方略言一宜行各府州縣隨宜招募使人自為戰家自為守一各該管官軍嚴加選汰一錢塘江口宜增置守備一捍海塘宜雜植荆棘敕兵防守一募土人習水者為篙師有力者為徑卒仍調溫處兵或山東長鎗手有警則隨機策應無事則分頭教習兵部議覆多採行之三十三年十二月兵部覆上提督張經條陳一編立本地主兵言諸路調兵勞費不資而吳浙間耆民沙民鹽徒礦徒類皆可用請於各府所屬州縣二百里以上者編兵三百名二百里以下二百名詔允行之三十五年三月兵部議覆九卿科道條陳禦倭事宜一明職掌浙江參將俱隨時搶設職守未明請以杭嘉湖為一道溫處為一道寧紹為一道各給敕符旗牌其臨觀昌國金盤等處把總一如直隸事例聽撫按會舉溫處守備及舊設浙江總督備倭都司係冗員宜裁革疏入如議行杭州府志嘉靖四十三年二月提督軍門趙炳然設東西二大營七月建欏木營明會典隆慶二年正月兵部覆浙江撫按官趙孔昭等奏寧波既設海道副使兵備事可以兼攝其紹興兵備可省令寧紹台分守參議移駐紹興台州兵備僉事兼分巡三府至寧台紹參將各防禦信地仍聽總兵官居中調度從之五月兵部上談綸議請遣錦衣衛二人往浙江募寧紹溫台金衢等處鳥銃手三千人人給善器恤其家屬優其資用付杭嘉湖參將胡守仁原任參將李超將之而北無誤秋防至鎮之日人給衣鞋銀一兩日給五分悉如部議三年題定浙江總兵駐定海參將改駐舟山遇汛則寧紹參將坐駕兵船直出沈家門外海洋嘉台溫各參將俱出本區海面外洋據險結營彼此會哨總兵居中調度左顧杭嘉右顧台溫改寧波陸兵為總兵標兵各區參將把總俱聽節制水陸軍兵都聽調度每遇汛期巡海兵備官親詣邊海巡視四年題定浙江通省額設民壯一萬六千三百九十名除留四千二百二十一名看守各府州縣城池庫獄外其一萬二千六十九名自隆慶四年為始徴收工食挑選精壯之人每名日給銀三分設立隊伍整搠器械在杭湖嚴紹寧台溫七府每府分𣲖一總在嘉金衢處四府每府分𣲖二總聽該總參都司把總官與軍兵合營操練六年詔軍户有丁倒户絶并同名同姓被人妄報連年勾擾者有司從公體勘得實即轉達該府兵部開豁海寧縣志萬厯二十六年復設海寧所中右營額計驍兵四百三員名全浙兵制考一全浙陸兵四十四總水兵共六十哨水陸民兵雜流員役共三萬八千七百六十六名水陸軍兵共一萬四千三百二十名一全浙福蒼沙唬等船共一千八隻一軍門標下遊擊二員陸兵名色把總九員哨官四十五員民兵七總官兵雜役共三千八百員名軍兵二總官兵雜役共一千八十六員名水兵名色把總二員南關水兵一枝哨船二十四隻官兵三百二十員名北關水兵一枝哨船二十五隻官兵三百二員名一總鎮標下坐營把總一員陸兵名色把總一員哨官二十員民兵五總官兵雜役共二千六十四員名中軍水哨名色把總一員中遊左右水哨名色把總二員哨官四員水兵三枝大小戰船共一百二十九隻民兵共二千五百七十七名軍兵共五百九十六名一杭嘉湖區兵巡道下中軍名色把總一員哨官四員民兵一總官兵雜役四百三十七員名巡哨名色把總一員巡哨領哨官二員水兵二枝唬船共三十四隻民兵四百六十八名軍兵七十六名參將下中軍名色把總一員兼領參遊哨陸兵名色把總四員哨官一十六員民兵二總官兵雜役共八百七十四員名軍兵二總官兵雜役共八百七十四員名水兵一枝大小戰船二十隻民兵二百四十二名軍兵一十七名海寧總備倭把總一員遊哨總哨官二員乍浦關總哨官一員水兵三枝大小戰船共七十六隻民兵共一千六百七十名軍兵共二百五十二名一寧紹區巡視海道下中軍名色把總一員哨官五員民兵一總官兵雜役共五百四十二員名水兵一枝唬船一十隻民兵一百名軍兵六十名參將下中軍名色把總一員兼領正兵哨領哨旗牌官一員陸兵名色把總一員哨官五員軍民一總官兵雜役共五百三十九員名附操弓兵四十八名正遊左右水哨名色把總二員哨官二員水兵三枝大小戰船共九十隻民兵共一千六百零三名軍兵共三百六十三名定海總備倭把總一員總哨官二員哨官九員水兵三枝大小戰船共一百四十一隻民兵共二千九百六十八名軍兵共七百四十名臨觀總內新添軍兵一總萬厯二十年裁備倭把總一員陸兵總哨官四員哨官二十員民兵二總官兵雜役共一千八十二員名軍兵二總官兵雜役共一千八十二員名水哨總哨官一員哨官二員水兵一枝大小戰船共四十七隻民兵共一千二百八十二名軍兵共一百五十七名昌國總內新添軍兵一總萬厯二十年裁備倭把總一員陸兵總哨官一員哨官五員軍兵一總官兵雜役共五百四十二員名水哨總哨官二員哨官八員水兵三枝大小戰船共一百五十二隻民兵共二千七百四十四名軍兵共一千一百三十五名一台金嚴區兵巡道下中軍名色把總一員哨官五員軍兵一總官兵雜役共五百八十九員名參將下中軍名色把總一員兼領參遊哨陸兵名色把總四員哨官二十員民兵三總官兵雜役共一千六百二十三