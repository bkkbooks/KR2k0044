body:
  text: 浙江通志卷九十兵制一古者寓兵於農自管子作內政而兵與民分要所以衛民則一也逮漢之屯田唐之府兵明之設衛制皆近古而法久備弛我朝禁旅雲屯戍卒碁布兩浙扼山海之要制置尤詳蓋未嘗一日無備斯可百年不用矣志兵制周禮夏官凡制軍萬有二千五百人為軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長周禮夏官中春教振旅中夏教茇舍中秋教治兵中冬教大閲左傳申公巫臣請使於吳吳子夀夢説之乃通吳於晉以兩之一卒適吳舍偏兩之一焉與其射御教吳乘車教之戰陳謹按兩浙兼吳越故地吳兵乘車戰陳之制自巫臣始史記越世家吳王北會諸侯於黃池索隱在哀公十三年吳國精兵從王惟獨老弱與太子留守句踐乃發習流二千教士四萬人君子六千人諸御千人伐吳漢書刑法志高祖踵秦置材官於郡國至武帝平百粵內增七校外有樓船皆嵗時講肄修武備云文獻通考易氏曰以漢史考之大抵巴蜀三河潁川諸處止有材官上郡北地隴西諸處止有車騎廬江潯陽會稽諸處止有樓船三者之兵雖各隨其地之所宜而郡國之兵其制則一玊海漢髙祖用閩越兵孝景用東甌兵武帝用會稽兵皆水軍步騎未嘗募之西北也後漢書世祖紀建武七年三月詔曰今國有衆軍並多精勇宜且罷輕車騎士材官樓船士及軍假吏令復還民伍漢官儀平地用車騎山阻用材官水泉用樓船軍假吏謂軍中權置吏也今悉罷之三國吳志朱桓傳遷蕩寇校尉授兵三千使部伍吳會二郡鳩合遺散期年之間得萬餘人三國吳志陸遜傳時會稽丹陽多有伏匿會稽大帥潘臨所在毒害厯年不禽遜以手下召兵討治深險所向皆服部曲已有二千餘人遜建議曰山寇舊惡依憑深地腹心未平難以圖逺可大部伍取其精鋭權納其策以為帳下右都督遂部伍東三郡強者為兵羸者補户得精卒數萬人三國吳志全琮傳權以為奮威校尉授兵數千人使討三越因開募召得精兵萬餘人三國吳志太平二年科兵子弟年十八以上十五以下得三千餘人選大官子弟年少有勇力者為之將帥文獻通考晉元帝南渡有大將軍都督四鎮四征四平之號然調兵不出三吳大發無過三萬隋書文帝紀開皇九年陳國平詔曰往以吳越之野干戈方用積習未寧今率土大同含生遂性太平之法方可流行戎旅軍器皆宜停罷武力之子俱可學文唐書兵志府兵之制起自西魏後周而備於隋府有郎將副郎將坊主團主以相統治又有驃騎車騎二府皆有將軍後更驃騎曰鷹揚郎將車騎曰副郎將别置折衝果毅資治通鑑貞觀十年更命統軍為折衝都尉别將為果毅都尉凡十道置府六百三十四凡上府兵千二百人中府千人下府八百人三百人為團團有校尉五十人為隊隊有正十人為火火有長每人兵甲糧裝各有數皆自備輸之庫有征行則給之年二十為兵六十而免其能騎射者為越騎其餘為步兵玉海淮南道揚州有府四江南道越州有府一大學衍義補府兵之法人具弓一矢三十刀一其介胄戎具皆藏於庫有所征行則給之畨上宿衛者給弓矢橫刀而已舊唐書職官志諸府折衝都尉一人左右果毅都尉各一人别將一人長史一人兵曹參軍一人録事一人校尉五人每校尉旅帥二人每旅帥隊正副隊正各二人凡兵馬在府每嵗季冬折衝都尉率五校之屬以教其軍陳戰鬬之法唐書方鎮表建中二年合浙江東西置節度使尋賜號鎮海軍文德元年置忠國軍治湖州景福元年賜杭州防禦使號武勝軍中和三年升浙江東道觀察使為義勝軍節度使光啓三年改為威勝軍乾寧元年改為鎮東軍舊唐書韓滉傳大厯十二年拜蘇州刺史浙江東西都團練觀察使尋加鎮海軍節度使訓練士卒煆礪戈甲稱為精徑栁氏家學録滉之於兩浙置子弟軍大州一千小州八百強者習弓弩弱者習排槍緩則修農急則為兵吳越備史廣明元年冬十一月杭州始建八都杭州建八都餘杭陳晟於潛吳文舉鹽官徐及新城杜稜唐山饒景富陽文禹龍泉凌文舉各聚四千人以衛鄉里臨安則為董昌錢鏐副焉景福元年七月鏐率十三都兵八都外有紫溪保城龍通三泉三鎮是為十三都洎役徒二十餘萬衆新築羅城舊唐書昭宗紀龍紀元年七月詔杭州置武威軍景福二年九月以武威軍防禦使錢鏐為鎮海軍節度使五代史吳越世家光化元年移鎮海軍於杭州改鏐素所居營曰衣錦營天祐四年升衣錦城為安國衣錦軍十國春秋梁乾化元年吳越築城屯戍於德清之憾山號曰奉國城又遣兵戍烏程之東九十里曰烏戍八年置都水營使以主水募卒為都號曰撩淺軍亦謂之撩清命於太湖旁置撩淺卒四部凡七八千人十國春秋文穆王晉天福三年十二月大閲馬步軍泊艛櫓於碧波亭十國春秋忠懿王周顯德三年命從兄知中吳軍節度事文奉為水陸應援諸軍都統使屯於本州備徴發十國春秋建隆元年宋授王天下兵馬大元帥乾德元年大閲戰艦於西湖大平興國二年五月王下令文軌大同封疆無患凡禦敵之制悉除之境內諸城有白露屋及防城物亦令撤去三年朝見帝於崇德殿遂上表願以所部十三州一軍八十六縣户五十五萬六百八十兵一十一萬五千二十六獻宋史兵志宋之兵制大槩有三天子之衛兵以守京師備征戍曰禁軍諸州之鎮兵以分給役使曰廂軍選於户籍或應募使之團結訓練以為在所防守則曰鄉兵宋史兵志禁軍建隆以來之制神射兩浙州兵舊號腰弩雍熙四年改今名淳化元年部送闕下選其強者為廣武次等復為本軍鞭箭雍熙三年選兩浙兵為鞭箭次等者為忠節鞭箭端拱二年并為一後廢清塞宋初選本軍子弟補其缺太平興國三年又得泉州兩浙兵以益之虎翼大中祥符六年選江淮習水卒於金明池按試戰棹立為虎翼軍江浙淮南諸州亦淮此選置七年改為虎翼水軍順聖太平興國中部送兩浙兵歸京師立威武太平興國四年征太原立分左右廂以江南歸化兵補左廂兩浙順化兵補右廂平寨弩手本兩浙順化軍揀其強壯立為弩手又以江浙逋負官物隸黨務徒役者為揀中平寨順化太平興國三年以兩浙兵之次等者立宣毅慶歷中京東京西河北河東淮南江南兩浙荆湖福建九路募健勇或選廂軍為之指揮二百八十八兩浙路杭二越蘇明湖婺潤溫衢常秀處各一熙寧以後之制宣毅一百七十四隸京東京西河北河東淮南江南兩浙荆湖福建九路兩浙路杭二越蘇潤各一皆改威果湖婺溫衢常處秀各一不充額威果二十五荆南江寧杭揚廬潭各三洪越福各二虔一宣和三年嚴州增置一敢勇宣和四年詔越州招敢勇三百人撥充兩浙提刑司捉殺差使宋史兵志廂兵建隆以來之制崇節兩浙路杭越蘇湖溫台衢婺處睦秀採斫處衢溫捍江都杭船務杭婺本城秀江橋院明碇手明山場斫軍溫婺睦本城剩員諸州並有舊水軍兩浙樓店務杭清務杭婺溫熙寧以後之制兩浙路步軍之額自捍江而下三並改號曰崇節凡五十一指揮一萬九千人水軍諸州軍船坊明船務杭婺採造明樓店務杭江橋院明堰軍張安杉青清務杭婺溫捍江杭三本城秀玊海開寶七年十一月泰寧軍節度使李從善部浙中及江南水軍凡千三十九人並籍為王師以歸聖歸化為軍額宋史兵志元符元年詔江湖淮浙六路合造神臂弓三千箭三十萬淳熙九年衢州守臣製到水鶴嘴弩二千箭十萬宋史兵志凡戍更有程兩浙路三年治平九年以三千人散戍東南杭揚江寧諸州以備盜賊文獻通考元豐二年詔處州槍仗手五百三十六人為定額每嵗農隙按閲武藝以備姦盜宋史神宗紀元豐四年二月分東南團結諸軍為十三將玉海淮東一淮西二浙西三浙東四江東五江西湖北湖南全邵福建廣東廣西雍州自六至十三東南兵三千以下惟置單將宋史兵志大觀元年十一月兩浙東西路各增置禁軍宣和三年五月江浙淮南等路宣撫使童貫奏勘會江南東路兩浙東西路各有東南一將平日未嘗訓練武藝昨睦寇初發遣令上項將兵捕賊遂致敗衄今睦賊討平之後非增戍兵鎮遏無以潛消凶暴臣今擬留戍兵二萬五千七十八人分置江南東路兩浙東西路州軍防把一年滿替出軍一次依平蠻故事每月别給錢三百嵗給鞋錢一千其兵並隸本路安撫司統轄訓練詔從之是年權知婺州楊應誠奏凡屯戍將兵須隸守臣使兵民之任歸一則號令不二然後可以立事詔從之五年制置所奏江浙增屯戍兵相度節鎮增添兩指揮處餘州各一指揮各不隸將內兩指揮處將一指揮以威果為名一指揮以全捷為名餘州並以威果為名從之詔兩浙盜賊寧息其越州置捕盜指揮可均填江東淮東三路州軍缺額七年詔京東西淮南兩浙帥司精選諸軍驍鋭發赴京畿輔郡兵馬制置司宋史高宗紀建炎元年九月命淮浙沿海諸軍增修城壁招訓民兵以備海盜二年七月選江浙州軍正兵土兵六之一赴行在四年七月詔江浙州縣諭豪右募民兵據險立柵防遏外寇紹興四年十二月詔江浙荆湖十四郡各募水軍五百人名橫江軍兩浙十郡沿江海州縣招捕巡檢土軍五年十二月汰橫江水軍三之一三十一年五月選兩浙諸州禁軍弓弩手之半部送樞密院按試文獻通考建炎元年右僕射李綱言當於沿河沿海沿江帥府置水兵二軍要郡别置水兵一軍次要郡别置中軍招集善波操舟便利之人擬立軍號曰凌波樓船軍從之宋史兵志建炎後禁廂兵威果安吉嘉興杭嚴紹興慶元溫台婺處衢全捷中興立杭婺安吉紹興慶元雄節杭安吉嘉興嚴溫紹興慶元台婺處武衛紹興溫婺威捷杭溫紹興婺雄捷中興立紹興威勝中興立慶元雄略中興立衢建炎後廂兵捍江杭崇節中興立杭安吉嚴溫慶元台婺江東西修江中興立杭橫江巾興立杭寧節中興立台清務中興立婺山場中興立婺都作院中興立杭小作中興立杭清湖閘中興立杭開河司中興立杭北城堰中興立杭西湖廣濟中興立杭樓店務中興立杭長安堰閘中興立杭壯城帥府望郡立之鼓角匠船務中興立杭建炎後鄉兵巡社建炎元年詔諸路州軍巡社並以忠義巡社為名隸宣撫司後募鄉民為之每十人為一甲有甲長有隊長四隊為一部有部長五部為一社有社長五社為一都有都正於鄉井便處駐劄紹興初罷之建炎寨兵兩浙西路臨安府十三寨外沙海內管界茶槽南蕩東梓上管赭山黃灣砍石奉口許村下塘安吉州七寨管界安吉秀塞吕小幽嶺下塘北豪臯塘常山五寨管界小河馬迹香蘭分界嚴州五寨威平港口鳳林茶山管界兩浙東路慶元府十寨浙東鮚崎三姑管界大嵩海內白峰岱山鳴寉公塘溫州十三寨城下管界館頭青奧梅奧鹿西浦門南監東北三尖北監小鹿大荆台州六寨管界亭場吳都白塔松門臨門處州二寨管界梓亭建炎以來朝野雜記平江許浦水軍本明州定海水軍也舊隸沿海制置司乾道中改隸殿前司以三千人為額五年冬又改為御前水軍八年春併歸許浦鎮其後殿司又有澉浦水軍玉海紹興三年正月詔御前忠鋭第七將徐文以所部屯定海縣聽沿海制置司節制宋史兵志馬政紹興四年置監臨安之餘杭及南蕩玊海乾道五年正月詔浙東弓弩手名御前忠鋭軍置正副準備將八年二月置忠武軍選二浙土兵弓手為之八月詔二浙揀中廂軍名曰御前忠勇軍九年四月密院言忠武軍藝已精歸之州縣元史世祖紀至元十三年二月行中書省承制以臨安為兩浙大都督府都督蒙古岱范文虎入城視事巴延悉罷宋官府散免侍衛禁軍