body:
  text: 浙江通志卷一百七物産七温州府穀瑞安縣志福全山頂陶隐居嘗種白穀於此色如玉因名其地為種玉畦榖譜瑞安有磊晩無芒與他榖異稻温州府志温州多美稻其稻𩔖有白散地暴水稜占城軟孕稻百箭白西龍兴磊晩早糯紅羅障金裹銀金水糯青糯穀譜浙江温州稻嵗兩熟麥温州府志有大麥小麥蕎麥米麥光頭麥豆温州府志有黑豆白豆六月烏綠豆白扁豆赤豆蠶豆豌豆八月白雲豆寒豆紫豆刀豆三收豆珍珠豆芝蔴温州府志亦名脂麻温産最佳莙薘菜隆慶樂清縣志一名甜菜食甚甘其莖和灰汁可澣衣𤓰瑞安縣志有數種有從小甜有摇棚落惟𤓰籃味尤美芋温州府志有兒芋山芋麫芋紫芋又有水旱二種蹲鴟李孝光雁山記鴈山土膏肥種蹲鴟大如斗芋屬薯蕷雁山志有紅白二色産於巖石竹樹間者味清而甘堪入藥圃種者味佳不堪入藥温州府志圃種極大者重可四五斤出巖石者名山薯蕷䈄􅢭筍筍譜自甌越以南七月生至八月盡龍芽筍筍譜出永嘉大羅山長四五尺稀節人取必有大風雨雷電人下山則止其筍春二月生蓴萬厯温州府志樂清蓴湖産蓴王十朋蓴湖詩水晶綠線滿湖中遥與呉江氣味同我輩他年罷游宦思歸應不待秋風蕈山蔬譜永嘉人以霉月斷樹置深林中密斫之蒸成菌俗名香菇有冬春二種冬菇尤佳山粉萬厯温州府志春蕨根舂為粉俗名山粉出泰順百合雁山志根可食一名鬼蒜荒年山中人取以療饑石髮菜嘉靖浙江通志温州産石髮菜亦名海藻苔菜萬厯温州府志鹿角苔菜生海巖松王十朋巖松記有以巖松至梅溪異質叢根柏葉檜身而得松氣象焉亦草木之英竒者五粒松萬厯温州府志永嘉華盖山麓有松五粒倒生松温州府志巽山丹崖有倒生松王應辰詠倒生松詩世間有松皆直榦夭矯修條拂層漢此種何年分偓佺游龍倒挂丹崖前垂陰落落華盖偃翠黛離離塵尾駢風㣲亦解奏絲竹雨過渾如澤膏沐初疑滅跡同隐仙乍見翻身似鸞鵠五株不用比㤗封一粒真堪生大谷須信棲根良得宜嵗寒千載常瓌竒即教盤錯有如此本性凌霜何必知榕瑞安縣志邵公嶼有榕樹盤鬱其上清蔭數畝樟萬厯温州府志樹大堪為船檜萬厯温州府志有香檜垂檜杉萬厯温州府志有刺杉細杉瑞杉萬厯温州府志實可食其木可為宫室欏嘉靖浙江通志温州欏木置箱櫃器物輕而利用温州府志其木堅而香椅桐永嘉縣志吹臺山産椅桐梁太守丘遲嘗採以製琴丁冬萬厯温州府志即頳桐俗名丁冬樺桃萬厯温州府志其皮土人用以為燭烏桕萬厯温州府志實如雞豆液可為燭松蘿木王十朋松蘿巖詩注樂清松蘿巖上産萬年春永嘉縣志木有萬年春藤平陽縣志平陽白雲山有深澗道絶不通有巨藤盤繞其上行人援之以進是曰藤道梅温州府志平陽梅溪古稱梅源鴛鴦梅嘉靖浙江通志温州有鴛鴦梅杏萬厯温州府志圓曰金杏扁而青者曰木杏梨永嘉郡記青田村人家多種梨名曰官梨子大一圍五寸恒以供獻名為御梨吏司守視土人有未知味者其實落地即融汁温柑橘録真柑在品𩔖中最貴可珍其柯木與花實皆異始霜之旦園丁採以獻風味照座北人有未之識者一見而知其為真柑矣一名乳柑謂其味之似乳酪温四邑之柑推泥山為最南塘之柑比年尤盛全芳備祖柑者橘之屬橘出温郡然多種柑韓彦直著録其别種有八曰真曰生枝曰海紅曰洞庭曰朱曰金曰木曰甜而乳柑推第一故温人謂乳柑為真柑橘亦出蘇州台州閩廣皆木橘耳不敢與温州齒敢與真柑争髙下耶且温四邑俱種柑而出泥山者又傑泥山盡平陽一孤嶼延袤只三二里許無連岡陰壑非有風氣之浸滛出三二里外香味益逺不逮或曰温並海地斥鹵宜橘與柑而泥山特斥鹵佳處故獨與他異予謂不然夫姑蘇丹丘七閩兩廣往往多並海何獨温而又豈無二三里得斥鹵佳處如泥山者自屈原司馬遷張衡潘岳王羲之謝惠連韋應物輩皆言呉楚間出者而未嘗及温温最晩出而羣橘盡廢物之變化出没其浩不可考如此羣芳譜柑出泥山為最其味似乳酥故名其木婆娑其葉纎長其花香韻其實圓正其膚理如澤蠟其大六七寸其皮薄而味珍胍不黏瓣食不留滓一顆僅二三核亦有全無者擘之香霧噀人為柑中絶品雲麓漫抄永嘉人呼柑之大而可留過嵗者曰海紅按古今注柑實形如石榴者謂之壺柑蘇轍毛君恵温柑詩楚山黄橘弹丸小未識洞庭三寸柑不有風流呉越客誰令千里送江南獅子柑瑞安縣志俗名皺柑與乳柑不同佛手柑永嘉縣志柑𩔖不一有佛手柑陳邦屏詠佛手柑詩玉液分仙品金衣借佛尊掌擎承露瓣爪破落霜痕色未空諸相香猶滯六根洞庭曾作醸獨種給孤園朱欒游宦紀聞永嘉之柑有一種名朱欒花似橘其香絶勝乃好柑之祖栽接之法取朱欒核洗浄下肥土中一年而長名曰柑澹其根蔟蔟然明年移而踈之又一年木始大盈握遇春則取柑之佳品或橘之美者接於木身則盡為佳者矣朱欒乃枳也萬厯温州府志朱欒多刺花如蓮子掇其英以蒸沉速二香芬馥清洌全芳備祖橙𩔖别種有五曰橙曰朱欒曰香欒曰香櫞曰枸橘蜜橝萬厯温州府志永嘉有蜜橝橘橘録産於温者其種十四曰黃橘塌橘包橘綿橘沙橘荔枝橘軟條穿橘油橘綠橘乳橘金橘自然橘早黃橘凍橘甌江逸志永嘉之土宜樹橘韓守彦直之譜足徴宋世産於西山葉正則詩云有林皆橘樹無水不荷花是也厥後盛於隔江之河田而上岡而南仙洋漸至於呉田地氣之遷徙昔西北而今東南矣按東嘉之橘與浙西之蜜橘相似其味甘美以無核者為上廣輿記所云乳橘即此也羣芳譜橘出蘇州台州西出荆州南出閩廣撫州皆不如温州為上葉適橘枝詞蜜滿房中金作皮人家短日挂疎籬判霜剪露裝船去不唱楊枝唱橘枝金豆甌江逸志柑之小者曰金豆獨名羅浮者或産於江北之羅浮其品最佳故以地名之温人去核浸以白糖入口香美㸃茶絶勝葡萄隆慶樂清縣志味最甘𤓰本草綱目永嘉有寒𤓰甚大可蔵至春即西𤓰也則五代之前𤓰種已入浙東但無西𤓰名耳蓮温州府志永寧門外雙蓮橋産蓮花並蒂午時蓮萬厯温州府志花白而小非午則合菱隆慶樂清縣志菱三角其色有紅有綠海棠萬厯温州府志紅色以木𤓰頭接之則白有黃海棠又垂絲海棠花淡紅以櫻桃接丁香隆慶樂清縣志花色有紫白有金絲葉杜鵑雁山志有四種緋紅粉紅藍色碧色隨處有之惟雁山書院左右最盛碧者亦難多見萬厯温州府志有川鵑自川來者王十朋杜鵑巖詩注樂清杜鵑巖在戲綵巖之東頂平上多杜鵑花故以花名巖一名巖笑花四季杜鵑稗史彚編王順伯為平陽尉嘗以九月詣村墅道間見杜鵑花一本甚髙花正開幾數千朶色如渥丹照映人面皆頳訝其非時詢之土氓皆云此種只出此山谷中一嵗四番開春秋為盛順伯欲訪求小者竟不可得云木芙蓉花史温州江心寺文丞相祠中有木芙蓉盛開其本髙二丈榦圍四尺花幾萬餘暢茂散漫有紅白變色者名醉芙蓉甌江逸志温州芙蓉髙與梧桐等八月杪即放花九月特盛遍地有之登樓一望但見紅霞燦爛亦竒觀也最妙者名醉芙蓉晨起白色午後淡紅晩則變為深紅其樹宛若梧桐殊堪玩賞甌江又名芙蓉江者盖謂此也蘭隆慶樂清縣志一莖一花濃者為甌蘭甌江逸志温州蘭有四季又有秋蘭皆不可多得惟夏蘭家家有之不以為珍挂蘭草花譜産温台山中巖壑深處懸根而生人取之以竹為絡挂之樹底不土而生花㣲黃肖蘭而細不可缺水時當取下浸濕又挂亦竒種也羣芳諧風蘭榦短勁花黃白取大窠者盛以竹籃或束以婦人頭髻銅鐵絲頭髮襯之縣於不見日處朝夕噀以冷茶清水或時取下水中浸濕又挂至春底自花即不開花而隨風飄揚冬夏長青可稱仙草最怕烟燼一云此蘭能催生將産挂房中最妙茉莉甌江逸志温州地氣和暖故茉莉最盛冬間置簷下不畏風不須遮䕶逢春發葉甚茂有髙一二丈者開花無算其小者亦丈許花亦不可勝計簇蝶酉陽雜俎簇蝶花花為朶共簇一蘂蘂如蓮房色如退紅出温州雲麓漫抄衛公草木記云有永嘉之簇蝶今此花來於浙東四布如蝶中有攅蘂晏元獻云疑是簇蝶也公有玉蝴蝶詩注此於下蘇子由有萬蝴蝶詩云誰唱殘春蝶戀花一團粉翅壓枝斜美人懶向釵頭插猶恐驚飛避髩鵶則知簇蝶萬蝴蝶即今之玉蝴蝶也山礬萬厯温州府志極香木髙數尺土人以其葉醃鮓洛陽萬厯温州府志一花五色俱備纎膩可愛金沙温州府志郡圃中有金沙花王十朋種金沙花戲呈景盧詩春光駘蕩楚天涯李白桃紅次第花未向名園看鐵樹聊於郡圃種金沙扶桑諸花永嘉縣志温地暖多竒花有扶桑玉甌美人蕉占紅蘿佛𤓰紫燕五叚錦鶯花水枝花温州府志有紫梅花䈽竹隆慶樂清縣志促節肉厚可為弩天中記竹之良者惟有䈽竹謝靈運所游之澗今在雁蕩其自乾筍謂之仙人杖靈運游名山志云神子溪南山與七里山分流去斤竹澗數里有從斤竹澗越嶺溪行詩此云䈽竹似誤蒯竹輿地志平陽仙壇有蒯竹風來成韻自成宫徴石上常浄了無塵籜􅲴竹筍譜出温處如苦竹長節而薄可作屋椽蘆竹竹譜有竹象蘆因以為名東甌諸郡縁海所生肌理匀浄筠色潤貞凡今之篪匪兹不鳴淡竹隆慶樂清縣志可造紙及取瀝方竹雁山志體小而方可作杖用山中人每取其枯瘦有稜節者刻其根為人物以贈人石竹萬厯温州府志夏生筍味甘可為紙桂竹隆慶樂清縣志火燒其汁可以散痰苦竹隆慶樂清縣志可為槍用以殺虎觀音竹雁山志莖小葉細長不滿三四尺人家多植園圃中石上蒼翠經冬不凋江南竹瑞安縣志春筍節長茶萬厯温州府志五縣俱有樂清雁山龍湫背者為上瑞安胡嶺平陽蔡家山産者亦佳雨航雜録雁山五珍謂雁山茶與觀音竹金星草山藥官香魚也雁山志浙東多茶品而雁山者稱最每春清明日採摘茶芽進貢一槍一旗而白色者名曰明茶榖雨日採者名曰雨茶此上品也又一種紫茶香味尤佳難種薄收土人厭人求索園圃中少植間有之亦必為識者取去甌江逸志按茶經云温州無好茶惟雁山水為佳此山茶亦為第一曰去腥膩除煩惱却昏散消積食但以錫瓶貯者得清香味同陽羡山岕茶無二採摘宜近夏不宜早炒做宜熟不宜生如法可貯二三年愈佳何白龍湫頂新茶歌雁頂東南天一柱上有天池宿雷雨夜半光飛一線霞海色金銀日初吐仙茶盤植於其巔雪齧霜饕枝幹古石根濈濈養靈芬雲表瀼瀼滋玉醹閟將融液鎖萬峯禀性髙寒味清苦山僧軍持汲白泉活火新烹香撥乳玉華甫插香氣通一洗人間幾塵土粉槍朱旗殊失真鳯餅龍團何足數白茅珍品説洪州紫筍佳名傳顧渚寕知此地種更竒僻逺未登鴻漸譜啜罷臨風憶舊游天末相思獨延佇呼龍欲載小茅君共向白雲雲裏煮酒談薈温州酒有䝉泉豐和春甌江逸志唐人酒多以春得名如抛青春松醪春之𩔖永嘉豐和春亦著名酒史盖倣於唐也又有名碧露者徐昌穀贈王敬止令永嘉詩有金盤湛碧露之句近今佳醸號為金酒者或謂色黃如金或謂醸法創於金氏未知孰是昔人有云永嘉及紹興酒絶佳勝於蘇州又不知其何如也琥珀紅葉適記永嘉風土詩琥珀銀紅未是醇私沽官賣各生春黃精雁山志山多黃精土人鬻以代糧但不能知九蒸九曝之法耳此物雖處處有之惟以雁蕩者為佳又以雁蕩絶頂不聞雞犬聲者為上品本草綱目鈎㖴狀似黄精葉與莖却不同一則養人一則殺人其性毒烈與黃精逺甚服黃精者不可不察蓼蠃本草拾遺生永嘉海中辛辣如蓼本草綱目紫色有斑文枸杞温州府志王元貞居大若山修煉其徒朱孺子掘枸杞根煮之飲其汁輕舉紅花萬厯温州府志染絳亦入藥頗行逺綠草雁山志根有子如麥大名綠草米即麥門冬也能治熱渴香薷雁山志性温能治暑消煩止渴煖胃靈巖寺馬鞍嶺下石坦中産者佳金銀花雁山志性涼解熱毒土人用以作湯治諸瘡花初開時黃色後轉白色故名金銀藤有汁而甘謂之啜蜜山蘿菔雁山志性寒狀如圃種者土人用治癰疽搗汁服之查塗亦可何首烏雁山志巖下石畔皆有之惟靈巖寺佛殿下一本甚大蔓延於外絶與他蔓不𩔖其根之大可如栲栳但為殿楹所壓無從取之耳益妳草本草拾遺生永嘉山谷葉如澤蘭莖赤髙二三尺味苦無毒治五痔止血炙令香浸酒服石决明草木子海中大螺也生於南海崖石之上海人泅水取之乗其不知用手一撈則得使其覺知雖用斧鑿亦不脱矣雪裏開雁山志性大寒深谷中有之能解砒毒冬時開花故名金線重樓雁山志性寒能治諸熱毒金釵石斛雁山志性寒生麥地中嵗取入貢苔草隆慶樂清縣志出山門鄉海中有數種蓀草温州府志平陽蓀湖蓀芷叢生茜草萬厯温州府志土人取以染絳蕢草隆慶樂清縣志多芒可為纜為席為履菅草隆慶樂清縣志土人取其榦以織壁鳯尾草雁山志生巖石間葉如鳯尾性寒入痢藥金線草雁山志名蠏殻草葉圓如蠏殻蔓生節間有紅線長尺許生巖石上性亦寒涼治湯火瘡金星草雁山志葉上有金星㸃根中有黑筋如髮俗傳用以浸油塗頭上禿處則髮生風癡草萬厯温州府志俗傳其葉一折風癡一次二三如之土人恒占焉瑞安縣志自生山間其葉如篛人每年視葉之截知風之次數及先後絡帚草萬厯温州府志土人取以為帚菖蒲雁山志深谷中有之亦有一寸而九節者但無服食之方耳鶴温州府志平陽鶴巢山古松老榦鶴時巢其上錦雞雁山志形似雞毛五色紋每日至午間胷前雜毛斑斕叢起宛如錦綬土人謂其吐錦過午則斂自矜其容每臨水自照或溺而死山雞萬厯温州府志出山中嘴足皆紅子規禽經注甌越間曰怨鳥夜啼達旦血漬草木翠碧隆慶樂清縣志其毛可以為飾白鷴雁山志形似雞而大白色毛有黑花細紋長尾生深谷溪澗中淘鵝萬厯温州府志出雁蕩練鵲雁山志形似鵲而小尾長而色白繡眼萬厯温州府志出雁蕩金雀雁山志似雀而色黃與黃雀相𩔖搗崖雁山志似鷹而稍大生海崖中每秋末渡海海邉人謂之曰崖其色蒼白亦謂之白崖又曰搗崖以其勢自上而下有如搗也鸂鶒隆慶樂清縣志其羽五色善勅水取魚山樂官雁山志形似金雀羣鳴而聲相抑揚如作樂音土人謂之山樂官畫眉萬厯温州府志善鳴而好闘山中多有之山羊雁山志其狀如鹿而能厯險白者如雪猿有毛如狨謂之金線田狗雁山志形似狗而小毛深温厚可作煖耳用山犬隆慶樂清縣志出深山食果實香狸雁山志形似豬肉香美玉面狸雁山志形似猫而有白毛霜後肉美諺云霜天玉面狸五叚狸雁山志尾有黑白紋相間各五叚肉肥美竹豚雁山志狀似小豬兒竹林中有之食筍根味清美獚薛季宣思石門游詩注出石門山中𩔖猿而綠獚𩔖狗而黃盖猴屬之大者石門山在樂清縣野人續南雁蕩志被毛赤髮狀如人立行獾猪雁山志似猪而小肉肥美野豬雁山志似豬而大大者重二三百觔健嘴長牙能與虎闘黃魚萬厯温州府志沿海居民以漁為生立䑸長管束量船大小納收税銀給與由帖方許下海採捕每年三月黃魚生發之時許其結䑸出洋捕魚五月回港謹按温郡沿海海族之産大率同於寧台苐郡邑志中不盡述耳觀寧台所志亦可𩔖推以概其餘斑魚李孝光大龍湫記潭中有斑魚聞轉石聲洋洋逺去香魚萬厯温州府志長三四寸味佳而無腥生清流惟十月有之樂清縣志以火焙之如黃金色鮸魚雨航雜録狀如鱸而肉粗三腮曰鮸四腮曰茅鮸所謂鰵魚是也一曰茅狂玉魚萬厯温州府志或紅白相錯又一種純白為玉魚鬭魚游宦紀聞二山溪中産小魚斑文赤黑相間里中兒豢之角勝負昔有鬭禽未見有鬭魚亦可觀也聞永嘉亦有之白袋魚隆慶樂清縣志似牛而白自海入江則兆水潦龍頭魚萬厯温州府志温州嵗進龍頭魚張孚敬奏罷之香魚雨航雜録雁山五珍香魚一也雁山志無腥鱗極細肉甚美生雁山溪澗中與潮水相通處春初時生月長一寸九月以後可盈一尺則赴潮際生子生已則黑瘠而死於鹹水中次年春初子復化為魚苗仍入淡水中隨月而長五月以後可長五寸味極清美作乾魚尤佳凡山水入江處皆有之在樂清則石門潭為盛筋竹溪芙蓉溪次之蕩水西流於永嘉南溪則自楓林當溪下渡潭石廟潭諸處亦有之均産於蕩水之一源也鯉魚雁山志石門潭多鯉魚味甘而清美異於他産每出時羣浮水上可一二畝許有一巨鯉其長如人衆魚環遶漁者百計終不能得或以為神魚云黃駒萬厯温州府志有河豚烏郎鴟夷􅥸魚鮀魚鯢魚之名其肝與子有毒惟橄欖蘆根烏蓲草根甘蔗可解土人以甘蔗同煮有毒則黑永嘉縣志西施乳即烏郎膏味美染塵不可食沙蒜海族志出沿海又名塗筍石䖶雁山志産雁蕩山壑中塗蟢鎖管雨航雜録塗蟢生海塗中名望潮身一二寸足倍之又脚短而無釘者名鎖管温州有之水母線萬厯温州府志嵗進水母線今罷鱟醬爾雅翼今閩浙重鱟子醬其珠如粟南人或帶或磨飲之云利市殻亦屈以為杓又取其尾為小如意蠣天中記樂城縣新溪口有蠣嶼方圓數十畝四面皆蠣其味偏好謝靈運答弟書前月十二日至永嘉郡蠣不如鄞縣螯亦不如北海永嘉縣志甌江蜊黄最佳琴蝦隆慶樂清縣志多刺有味西施舌嘉靖浙江通志似車螯而扁生海泥中常吐肉寸餘𩔖舌俗甘其味因名温州府志一名沙蛤長可二寸如舌最美産江溪間又有香螺亦佳海月雨航雜録大如鏡白色正圓其柱如搔頭沈一中嘗稱其鄉海錯之美如海月江瑶柱可敵三呉百味樂清甚盛蠶瑯琊代醉編永嘉有八輩蠶一曰蚖珍蠶二月績二曰柘蠶四月初績三曰蚖蠶四月績四曰愛珍五月績五曰愛蠶六月末績六曰寒珍七月績七曰四出蠶九月初績八曰寒蠶十月績凡蠶再養者皆謂之珍然一嵗八績亦恐誇者之過克絲温州府志温克絲每尺價一百五十或二百精巧奪綺縠近樂價賤費輕機户皆巧偽日就濫惡甌紬永嘉縣志帛之屬有甌紬溪絹永嘉縣志絹有溪絹蕉布永嘉縣志土人工織蕉布吉布温州府志夏布曰腰機冬布曰雙梭最細又有吉布或稱吉貝失其製雞鳴布甌江逸志隋志云永嘉之俗婦人勤於紡織有夜浣紗而旦成布者俗呼為雞鳴布桑絲隆慶樂清縣志用為紬絹柘絲隆慶樂清縣志宜絃琴瑟紙太平寰宇記温州産蠲紙清波别志唐有蠲府紙凡造紙户免本身力役故以蠲名今出於永嘉士大夫喜其發越翰墨争捐善價取之殆與江南澄心堂等甌江逸志蠲紙廣輿記所云蠲糨紙也潔白𦂳滑過於髙麗賔退録温州貢紙五百張其來久矣明開局於瞿溪差官監造後因水濁製紙轉黑乃以地氣改遷奏罷少此佳紙殊為可惜温州府志造紙以糨粉和飛麫入朴硝沸湯煎之候冷藥釅用之先以紙過膠礬乾以大筆刷藥上紙兩面再候乾用蠟打如打碑以粗布縳成塊揩磨之舊州郡尺牘皆用之今已罷製姑存其法硯宣和石譜温州華巖川石出水中一種色黃而斑黑一種色紫石理有橫紋㣲粗扣之無聲稍潤土人鐫治為方圓器紫者亦堪為硯頗剉墨硯史温州華巖尼寺巖石石理向日視之如方城石磨墨不熱無泡發墨生光如漆如油有艶不滲色赤而多有白沙㸃為硯則避磨墨處比方城差慢難斵而易磨亦有白㸃㸃處有玉性扣之聲平無韻竹絲燈嘉靖浙江通志温州出蚌珠草木子南海中秋有月蚌胎生珠無月則否龍鬚席温州府志草細而涼暑月寢之可當蘄簟近時方盛雁山志龍鬚草産雁山者莖細而秀種者如藝稻織席通四方漆器温州府志鷂色綠色牙色錦犀純朱刻花退光磨光捲素剔金灑金泥金嵌螺漂霞今漸失其製礬温州府志平陽宋洋山有之取石細𢷬淘湅清者為明礬濁者為白礬銀隆慶平陽縣志邑有銀鑛三一焦溪山一天井洋一赤巖山永樂中採今皆封禁泰順縣志焦溪銀坑在七都髙陽明水尾鐵温州府志瑞安平陽泰順三縣皆有之取砂磧淘煉成鐵辦嵗課力艱工苦明時減罷何光逺泰順縣減鐵課序泰順邑萬山中里少地濶銀場鐵冶他邑莫與並逾年既逺所有者不可得如前所賦者不能減於後以聖人利民之具而民反受其累𢎞治中邑令范勉上其事於朝下屬郡勘白之減其課三之一易曰損上益下其益無疆此所損者小所益者大矣因序其事并繫以詩羣物出土惟鐵乃艱淘沙於水伐木於山轗是登欹傾是處痀僂􅐁攘身垢若脯赭熾其火晝夜不眠産鐵一拳能值幾錢肩不停擔足不停步十態萬狀有如荼苦矧兹賦課累嵗如之豈謂年逺炭盡砂稀天子命官理絲解緵暗甔生輝以輕易重兆民食徳推侯獨賢我作是詩垂千萬年金星石萬厯温州府志樂清金星溪世傳張文君煉丹以餘藥擲溪中並作金星今水中石名金星石又金溪水石皆有金星松化石瑯琊代醉編建中間道士馬自然指永康縣延真觀前庭松曰此松已千年矣當化為石至夕大風雨其松果化近觀山中松皆化為石蜃灰温州府志以牡蠣殻或蛤殻成堆潑以水即烟熾漸成灰用以甃砌最堅製船𢷬以桐油泯其罅漬水不漏功用甚博甆器舊者以蜃灰白之謹按温郡紅花靛青二種為産最多處郡亦然頗利民用實其地之専産故為拈出處州府稻龍泉縣志稻有占城赤早旱湖金華地暴鷓鴣斑海棠碧嚴龍鳯竹香等名南田稻名勝志青田縣南田山上有沃土宜稻括蒼彚紀青田縣南為南田其地土沃嵗旱豐稔如常青田縣志其地止宜稻而麻麥諸蔬少生焉旱湖稻龍泉縣志稻有旱湖種於無水之處鷓鴣斑龍泉縣志色𩔖鷓鴣因名之赤米龍泉縣志邑産早赤稻米色純赤又有赤谷赤芒凍米青田縣志食貨有凍米鯽魚豆松陽縣志菽之屬有鯽魚豆九心菜崇禎處州府志麗水縣産紫花芥隆慶宣平縣志即辣芥䇘筍筍譜七月生至十月間縉雲以南多出然味苦而節疎筍可大於箭筍少許山人採剝以灰汁熟煮之都為金色苦味減而甘食甚佳􅲴筍筍譜出處州竹可作椽筍則春生可食筆筍崇禎處州府志縉雲縣葛竹山世傳葛洪煉丹於此遺筆化筍成竹人取其筍可書數十字盧棲筍名勝志盧棲洞傍生竹筍味甚佳天中記處州宣平響巖之東有靈棲溪溪上巖洞甚竒唐道士盧敖棲其中有竹每無風自動拂除巖石人以為竒其筍味佳人號曰盧棲筍朱蕈崇禎處州府志慶元縣有朱蕈香蕈亦佳不亞於温觀音粉崇禎處州府志雲和山中有白㵛泥以水攪矴而取之和糯米粉一半蒸食之可以療饑名曰觀音粉松崇禎處州府志縉雲縣松洲上有松千章鬱蒼之色映於清流髯松名勝志龍泉縣匡山多髯松彌望入青雲雨松縉雲縣志步虚山斗巖上有二松大數十圍每晴日則雨㸃滴瀝濕人衣裾遇晦則無三鬚松癸辛雜識凡松葉皆雙股故世以為松釵獨栝松每穗三鬚同根松隆慶遂昌縣志馬鞍山有五株松同根生栝名勝志處州稱栝栝字從木宋熙寧間得古碣云栝松身柏葉即欏木也以山多此木故名杉崇禎處州府志大杉源山跨麗水雲和之間山上多出巨杉樟龍泉縣志飛鳯山有大樟林輪囷百圍披蟠數十畝檡括蒼彚紀檡山上生栲木嘉靖浙江通志處州出栲木赤水木青田縣志縣有赤水木相思木崇禎處州府志慶元縣有相思木松陽木名勝志松陽立縣取松陽木為名在縣東南大溪有松陽樹大八十圍其腹中可坐二十人鐵蕉青田縣志葉如鳯尾幹如龍鱗根能食鐵燃鐵鍤入之愈茂鐵樹青田縣志鐵樹色古葉如積雪李龍泉縣志縣産李頗多有胭脂李最佳又有雞心李黃甜李麥熟李真珠李琥珀李崇禎處州府志龍泉縣有千瓣李花楊梅龍泉縣志楊梅嶺下有泉一窪可沃楊梅旬日不壊石榴龍泉縣志榴之𩔖亦有數種官榴金榴銀榴飯榴山石榴官榴最大山林檎龍泉縣志林檎别一種名山林檎柿羣芳譜大而稍扁處州松陽柿尤為竒品棗崇禎處州府志栝郡治在棗山南麓山有古棗一株老榦輪囷右枝甚茂銀杏龍泉縣志有二種一種細小稍圓名香杏又一種稍長大名鴨嘴杏榛括蒼彚紀松陽之果有榛子梨隆慶宣平縣志舊産鵞梨本佳品今漸稀少青果青田縣志有青果橙橘録木有刺似朱欒而小永嘉植之不若古栝之盛香氣馥馥可以薰袖可以漬蜜真嘉實也嘉靖浙江通志處州橙糕搗橙以蜜和而為之枝粉青田縣志枝樹之實可作粉蔗龍泉縣志有糖蔗竹蔗荷崇禎處州府志黃巖下有芳前十里池宋南渡選妃洪氏有寵賜第於此有十里磚街十里池池多栽荷又名芳墅菱龍泉縣志菱有數種紫菱青菱狗頭菱鬼面菱四角菱碧桃松陽縣志白雲山有雙石髙二百丈頂有石橋橫渡傍有碧桃二株三年一花紫牡丹名勝志麗水縣禅智寺有紫牡丹一本髙丈餘每開五百餘花花各十二瓣值閏年各開十三瓣宋政和間宣入御苑栽之花即不開詔遣還山復開如故蘭青田縣志石門洞出神蘭龍泉縣志石川巖壑秀麗上有樟樹濶數圍樹之上有香蘭花其香聞數里土人目為神蘭不敢摘冬蘭隆慶宣平縣志雙巖産香遍幽谷翠柏括蒼彚紀松陽之花有翠柏桂崇禎處州府志宋孫夙初母夀於中秋夜對月飲酒忽聞盃中有聲視之三桂子也種之俱茂金蓮方輿勝覽仙都山頂有湖生蓮花崇禎處州府志縉雲仙都山傍孤石屹然干雲名鼎湖石頂有湖生蓮花世傳金蓮花瓣落於潭因名金花潭佛桑崇禎處州府志龍泉縣花有佛桑珍珠花崇禎處州府志雲和縣花有珍珠子午花崇禎處州府志麗水縣有子午花鶴頂紅括蒼彚紀松陽之花有鶴頂紅木芙蓉青田縣志小石門山木芙蓉一本髙二丈生石巖上金絲蝴蝶括蒼彚紀花有金絲蝴蝶藤花青田縣志小石門山後壁削成髙數百丈古藤花垂滿其中小竹名勝志青田縣占陽山叢生小竹巨葉其實可為粉處州府志宋慶元間嵗饑郷民於此採竹實為食青田縣志或取以醸酒味佳舞竹隆慶遂昌縣志石門洞前有竹冬夏一色風起則枝梢自舞拂地棕竹崇禎處州府志麗水縣産棕竹製為器最良鳯尾竹崇禎處州府志麗水縣産酒名酒記處州谷簾酒金盤露名酒記處州金盤露麴本草處州金盤露清水入少薑汁造麴以浮飲法造酒醇美可尚香色味俱劣於東陽以其水不及也宣平縣志酒名金盤露者其色清故得名初醸於曳嶺大家今其地竟無作者何首烏圖經本草出處州有苗如藁本葉有光澤夜則苗蔓相交或隐化不見其根形大如拳連珠亦有形如鳥獸山岳之狀者珍也掘得生喫味甘甜可休糧蘇頌何首烏讃神効助道著在仙書雌雄相交夜合晝疏服之辟穀日居月諸使人難老童顔華腴惟有縁者遇爾自如乾菊括蒼彚紀宣平出牡鞠苗名勝志龍泉縣匡山松根茯苓大如斗雜以黃精及牡鞠之苗接骨草隆慶宣平縣志酒浸服之以其草傅骨折處可愈磁石本草綱目括之藥屬於金石者磁石雲母石石燕龍泉縣志黃麻央山石燕洞中産即今藥中之所用者雷雨之日則出洞羣飛好事者網得之一鋸為二置醋盂中能行動者良豔草龍泉縣志插於髻間可驅汙氣墨草龍泉縣志煉之可染鬚髮紫草龍泉縣志大馬鞍山出青芝名勝志青田縣大鶴山下其田嘗産青芝竹青青田縣志其葉似竹可染碧此地所豐之草故名青田薜蘿名勝志龍泉匡山有薜蘿數十尋嫩緑可茹雞草龍泉縣志有雞草觀音草龍泉縣志有觀音草龍鬚草仙都志産於獨峯崖上鶴太平寰宇記青田産相鶴經云青田之鶴即此永嘉郡記有沐溪野去青田九里中有雙白鶴年年生子長大便去只恒餘父母一雙耳精白可愛多云神仙所養青田縣志青田號鶴城鶴出必得科名么鳯青田縣志禽之𩔖有么鳯烏鷴崇禎處州府志慶元縣有烏鷴山牛崇禎處州府志慶元縣有山牛竹豬隆慶宣平縣志一名竹豚狀如鼠惟食竹根其味甚美野豬崇禎處州府志慶元縣有野豬又有鎗豬漢豬金鯽包萬有唐山記遂昌縣唐山翠峰菴有沼常畜金鯽百數聞木魚聲聚而就食翼魚姜師閔翼魚説景寧山溪間有翼魚四足飛立樹梢張口注水鳥見水就飲魚漸閉口飲水之鳥伺其腐而吞之苦魚劉基苦齋記章溢先生隐居之室在匡山之巔匡山在處之龍泉縣劍溪之水出焉注入大谷其中多斑文小魚狀如吹沙味苦而㣲辛食之可以消酒墨魚名勝志松陽縣卯山泉有二墨魚浮水人不能取圓眼魚崇禎處州府志麗水縣産蓮心魚崇禎處州府志青田縣産桃花魚龍泉縣志春時溪中出海鯊草木子鱗蟲皆卵生也獨海鯊胎生産栝者最巨跳魚姜師閔跳魚説即大蛤景寧溪中當夏月蛤引𩔖飲澗水每遇蛇則為所噬或蛤多則先以一巨蛤啣蛇頭蛇則以尾纒之漸移入水蛇尋自壊巨蛤與羣蛤聚而食之青螺龍泉縣志青翠可食野蜂劉基苦齋記匡山之巔四面峭壁風從北來大率不能甘而善苦故植物中性之苦者莫不布族而羅生焉野蜂巢其間采花髓作蜜味亦苦山中方言謂之黃杜初食頗難久則彌覺其甘能已積熱除煩渴之疾葛紗崇禎處州府志青田縣出花布龍泉縣志邑産花布機布樹皮布元和郡縣志處州元和貢有樹皮布棉苧縉雲縣志本邑農畝之外少蠶桑多種棉苧女紅之利居田租之九竹紙括蒼彚紀松陽宣平出紙青田縣志出竹紙山墨隆慶宣平縣志墨山出山墨窰人取為㸃兹石之用漆括蒼彚紀松陽産漆頗行逺白蠟崇禎處州府志松陽縣出甆器龍泉縣志章生二不知何時人嘗主琉窰凡甆器之出於生二窰者極其青瑩純粹無瑕如美玉然一瓶一缽動博十數金其兄名章生一所主之窰其器皆淺白斷文號百圾碎亦冠絶當世今人家蔵者尤為難得七修𩔖稿哥窰與龍泉窰皆出處州龍泉縣南宋時有章生一生二弟兄各主一窰生一所陶者為哥窰以兄故也生二所陶為龍泉以地名也其色皆青濃淡不一其足皆鐵色亦濃淡不一惟土脉細薄油水純粹者最貴至今處人稱為章窰菽園雜記青甆出於劉田去龍泉縣六十里次有金村等窰泥油精細模範端巧不及劉田龍泉縣志龍泉昔産窰器青甆窰在琉田道泰大其垟安福蛤湖因溪垟官田俞溪大浪坑烏甆窰在宏山陳灣磚窰在大沙塘田里山南坑直衕大口蘆陂沛田缸窰在劍池湖惟甆窰昔屬劍川自析鄉立慶元縣窰地遂屬焉近亦窰户稀絶矣礦處州府志龍泉縣銅山唐書地理志云山出銅松陽縣産銀鉛錫宣平縣産鐵龍泉縣志黃銀即淡金其採煉之法與白銀略不同此礦脈淺無穿巖破洞之險每得礦不限多少俱舂碓成粗粉然後以水浸入磨成細粉仍貯以木桶浸之用楊梅樹皮漬攪數次石粉浮而金粉沉乃用金盆如洗銀法洗之即加鉛烹和再過灰鍋煎乾成銀矣每黃銀一錢直白銀四錢近得一法將黃銀或淡金用土釜銷化入石硫黃些小三四次出火鎚去青黑鬆皮中心遂成赤色黃金若色猶未赤再銷如前其青黑鬆皮加鉛鎔化入灰鍋煎乾乃汞銀也原淡金一兩得黃金七錢必得白銀三錢煎法以淡金打成薄片用黃泥包文武火燒一晝夜遂成金其白銀滲入泥中無復出脱期矣然近時匠人甚巧每於人家出色金首飾其洗落藥水紙貯鎔鉛過灰窠成金首飾一兩折一錢又白銀烹煉法按五金之礦生於山川重峰峻嶺之間其發之初惟於頑石中隐見礦脈㣲如毫髮有識礦者得之鑿取烹試礦色不同精粗亦異礦籮重三十斤呼一篰得銀多至二十兩少或三四錢礦脈深淺不可測有地面方發而遽絶者有深入數丈而絶者有甚㣲久而方濶者有礦脈中絶而鑿取不已復見興盛者此名為過壁有方採於此忽然不見而復發於尋文之間者謂之蝦蟇跳大率坑匠採礦如蟲蠧木或深數丈或數十丈或數百丈隨其淺深㫁絶方止取礦則携尖鐵及鐵鎚竭力擊之凡數十下僅得一片又有不用鎚尖唯燒爆而得礦石既採則入碓房舂碓極細是謂礦末次以大桶盛水投礦末於中攪數百次謂之攪拈凡桶中之拈有等浮於面者謂之細拈桶中者謂之梅砂沉於底者謂之粗礦内若細拈與梅沙用尖底淘盆浮於淘池中且淘且汰泛颺去粗留取其精英者其粗礦内則用一木盆如小舟然淘汰亦如前法大率欲淘去石末存其真礦以桶盛貯璀璨星星可觀是謂礦肉次用米糊搜拌團如拳大排於炭上更以炭尺許覆之自旦發火至申時住火候冷名曰窖團次用􅨗銀爐熾炭投鉛於爐中候化即投窖團入爐用鞴鼓扇不停手盖鉛性能收銀盡歸爐底獨有滓垢浮於面凡數破爐爮出熾火掠去爐面滓垢烹煉既熟良久以水滅火則銀鉛為一是為鉛駝就地用上等爐灰視鉛駝大小作一淺灰鍋置鉛駝於灰窠内用炭圍叠側扇火不住手初鉛銀混鎔泓然於灰窠之内望泓面有煙雲之氣飛走不定久之稍散則雪花騰湧雪花既盡湛然澄徹又少頃其色自一邉先變渾色是謂窠翻窠翻乃銀鉛之名烟雲雪花乃鉛氣未盡之狀鉛性畏灰故用灰以銿鉛鉛既入灰惟銀獨存自辰至午方見浄銀鉛入於灰名為灰坯乃生藥中蜜陀僧也續處州府志萬厯中開採黃巖坑先用輦水役徒數百人増車至一百三十五輛動糜帑千餘迨涸烹砂不足以償工食熾炭之費又慶元坑場舊有十處或巖閉洞塞或水積淵深俱經往時採壊即有一二處出鑛所得不足以償所費且地界閩浙鑛徒嘯聚輙為地方害又雲和縣原有陰巖鳯尾二坑鑛脉盡絶見今封閉僅有三都土名大礱金塢鐵冶二處可得㣲利萬厯中知縣陳文照建議於春夏秋三季播種之時濁水有害禾苗嚴禁不許淘洗惟冬季始許洗烹鐵砂栝蒼彚紀青田縣閣公方山出鐵砂可爐鑄凍石崇禎處州府志青田縣閣公方山出圖書石如玉青田縣志縣南有圖書洞洞穴深邃入其中冬温夏涼出石如玉柔而栗宜刻印章亦可琢玩器俗名青田凍七修𩔖稿圖書古人皆以銅鑄至元末會稽王冕以花乳石刻之今天下盡崇處州燈明石果温潤可愛也花石龍泉縣志槎洲之東有花石灘灘中石子有黑白黃紫青赤等色松石名勝志松陽縣卯山時有怪石如松有枝葉上猶石宣和石譜處州上猶縣山土中出石㣲紫質稍麄多淺黑斑㸃兩暈外暈緑色堪作水斛或闌檻好事者往往鑴礲甃地上全若玳瑁石棋子名勝志遂昌縣牛頭山唐葉法善嘗與道侣對奕於此局終擲棋子於地化為石後人於其地每得一卷石中有小石棋子圓滑紺白初出土尚温軟可擘取薪栝蒼彚紀縉雲管溪官山薪竹之饒民利賴之自然碓縉雲縣志東蒙巖一石拳根矗立澗水走其下相傳為仙人藥碓浙江通志卷一百七
