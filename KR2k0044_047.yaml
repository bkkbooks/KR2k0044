body:
  text: 浙江通志巻四十八古蹟十衢州府州舊子城𢎞治衢州府志子城在城之東東西為兩夾門皆有樓南設門與麗譙相直環城内有馬路居民築為園圃僉憲曹英開辟横濶一丈二尺監郡巴延呼都克築為新城今存荒址舊三城輿地紀勝衢故城有三一在驛馬橋之南唐末黄巢之亂設寨於此一在開化寺北疑是定陽故城一在章戴之白石疑是縠州故城也𢎞治衢州府志三城廢置莫考方輿紀要定陽城在常山縣東南三十里地名三岡遺址猶存天啟衢州府志縠州古城去州城二十五里城址猶存今為古城院疑即榖州故城信安城方輿紀要相傳在今城西宋宣和三年方臘作亂始築天啟衢州府志信安故城在西安縣南六里姑蔑城元豐九域志在縠水南三里東門臨薄里溪是也今東陽大末縣名勝志龍游縣北五里縠溪上有姑蔑城萬厯龍游縣志姑蔑故城舊經云城東西二百一十二步南北一百六十八步髙一丈七尺厚四尺周四百七十步至今人猶呼寺城麓大末城輿地紀勝在龍游縣治西輿地紀要龍丘故大末也武安城太平寰宇記龍游縣武安故城唐證聖二年置武安縣以地有武安山今邑已廢故城尚存江山土城天啟衢州府志在江山縣髙尋二尺今不存惟濠水自景星門入環縣治如帶宋西安縣舊治西安縣志按舊志縣治在先義坊距府治五十步又謂在子城西北三里居仁坊元初燬至元二十八年尹王茂徙於禮賢門外嘉慶坊大徳八年徙府治西至大三年始徙今仁夀坊宋貢院明一統志織染局在府治西北宋為貢院元至正間改為局元録事司治天啟衢州府志在府治西仁夀坊即今西安縣治元萬户府信安志在録事西居仁坊元䝉古學𢎞治衢州府志在府西北四百步金紫坊至元十八年始設教授古姑蔑國路史國名紀姑蔑一曰姑妹大末也萬厯龍游縣志縣西北百餘步靈耀寺晉義煕中即姑蔑故宮址建其伽藍神謂是姑蔑子吳豐安縣治嘉靖浙江通志在龍游縣境西孫吳置唐縠州治方輿紀要龍游縣北五里縠坡亭在縠水旁唐武德四年縠州置於此唐盈川縣治太平寰宇記在州南九十里唐如意元年分龍丘縣西梧山玊泉等鄉置盈川縣元和七年併入信安龍丘二縣西安縣志廢盈川縣去縣四十里城址尚存其下潭水至深丹崖翠壁亦稱勝地龍游縣志盈川渾唐初建治於此楊炯為令至今猶祀之唐白石縣治萬厯龍游縣志舊址在縣南三十五里白石山麓龍游縣志靈山與白石山相距里許為邑南巨鎮或云即白石縣故址元陳村營龍游縣志在治西南六十里元至元中立唐常山縣舊治元和郡縣志在今縣東四十里嘉靖浙江通志在常山縣常山鄉今尚有街路吳定陽縣治𢎞治衢州府志在常山縣定陽鄉孫氏置縣於此晉信安縣治方輿勝覽在常山縣招賢街下太康時建元草萍營𢎞治衢州府志在常山縣二十五里至元二十一年立唐須江縣治名勝志在江山縣唐武徳四年分信安之南川置須江縣以南有須江故名唐武安縣治嘉靖浙江通志故武安縣在江山證聖三年割常山須江弋陽置武安縣以其地有武安山故名今廢址尚存宋禮賢縣治天啟江山縣志宋咸淳間改江山為禮賢縣縣治在太平寺今禮賢鎮也城隍廟猶存元江山軍營𢎞治衢州府志在江山縣仙霞闗菱塘諸園天啟衢州府志郡城東隅今即楊公河舊志塘濶近百畝中有長隄亘數十步環池島嶼縈紆竹樹茂密東有邵祭酒之野航趙别駕之雪齋劉二卿之壺中天宇余甸公之東湖道院趙安慶之更碧樓劉南安之退菴西有劉江隂之别墅毛紫薇之水國秋陸衡陽之環勝南園𢎞治衢州府志在郡城有春風樓登春園韶光園𢎞治衢州府志並在郡城西湖園萬厯龍游縣志在縣治南宋馬天驥以樞密奉祠歸濬湖起花木亭榭擬杭西湖故名留春園嘉靖浙江通志常山縣留春園亭榭舊有一十餘所在縣治後日渉園天啟衢州府志在江山縣東白巖有飛瀑宋靖康末邯鄲李𫝊正愛其秀拔因治圃於此趙氏園𢎞治衢州府志江山縣西山景盤趙氏園内有梅泉介園開化縣志縣北石壁峭立有石梯橋勢若飛虹山石之竒不減西湖飛來峯今為蔣氏介園河陽圃崇禎開化縣志縣治内有河陽圃有友山堂熙春亭翼然亭放生池池心又有載月亭無塵亭觀民亭雁序館名勝志在郡城西唐咸通中刺史趙磷與其弟處州刺史瓚會别之處景星館明一統志在江山縣南五十步宋汪大猷辛棄疾皆留題白雲莊輿地紀勝在江山縣南三十五里石門有軒堂臺榭之勝邑人毛維瞻建趙抃題四詠趙抃次韻毛維瞻白雲莊詩四首好山深處静開軒目送孤雲手弄泉枕石堂無金玉富濯纓家有子孫賢初尋舊𨼆逄三伏已發新吟僅百篇聞説夜分煩暑散涼飈渾似素秋天右掬泉軒亭號休休古退藏豈如溪上構虚堂坐邀城市真潇灑却謂江湖太渺茫下筆新題無俗事搘笻野服是家常臨流最有清風快未見古人心已涼右平溪堂治圃我依浮石灘築臺君占白雲山三秋一日登臨外千里同風咫尺間峯黛隂晴常黯黯溜琴朝夕自潺潺休官誰道何曾見林下如今兩處閒右晩望臺溪流回合逗方池軒檻時臨面翠微紫陌紅塵行不顧白雲青嶂坐忘歸方榮即𨼆誰能繼未老先休世所稀我昔凌雲登閣會主翁留散見蟾暉右懶歸閣龜峯堂輿地紀勝在府治内雙檜堂晏公𩔖要在州衙宋開寳七年建刺史慎知禮記雙石堂輿地紀勝在州治㕔左宋紹聖中守孫賁建思政堂天啟衢州府志在郡治宋守張嵲作超覽堂𢎞治衢州府志郡守吳興施公作毛幵超覧堂記郡跨龜峯之上南山為最近反蔽於譙門之樓屋昧然不快於心太守吳興施公步過東山堂前嚮若堆阜崛起數仭上可容百人仰而望之則萬峯闖然出於林木之杪高者下者向者背者前者却者説者平者如遊龍者如色雲者繚者如屏峙者如壁角秀争雄表裏呈露頫仰萬殊盖古今之勝槩盡於此矣其下曠野平川一俯千里近則連抱之木疎幹垂隂庇暎左右乃作新之以為觀遊而其南為延宇植檻憑虚層軒遡風亢爽宏寛四逹既成遂以超覽名之又為亭曰月坡不逮户牖之間几席之上飄然若決浮雲而遊乎埃壒之外也遂書以記之景髙堂𢎞治衢州府志宋蕭忱作於郡治之後圃聞人阜民景髙堂記大理丞永嘉萧君忱以面對論當世務切於民者上嘉納之於是剖分左符至衢訪民疾苦抑損先己期年民益安之郡之後圃初有庫屋五楹荒圮特甚乃仍其舊敞以軒楹環以流泉爰即中楹列三賢繪像清獻公里居孝弟所應繪事而范太史之系實寓居超化寺代有令聞視衢為歸紹興制㫖且命范氏經理司馬文正之緒范所寓則文正公之所寓也乃以文正太史三像參繪清獻名其堂曰景髙使元祐風烈奮厲乎百世之下豈特為登覽烟雲嘯詠風月已哉塵外堂天啟衢州府志在郡治毛幵塵外堂詩地勝無邇逺眇然契髙躅山色潤窗扉爐烟浄花竹玩世乆忘名采真固疑獨門外三尺塵先生睡初足中和堂徐夢龍復建郡治記郡治舊有堂曰中和承澤堂天啟衢州府志在西安縣孔聖家廟西雙桂堂𢎞治衢州府志在府治西韓徽猷宅獨清堂名勝志在殷浩廟側趙清獻舊遊之地清隂堂名勝志在南禪寺趙清獻舊蹟昭慶堂𢎞治衢州府志在郡城和豐門内宋吳煥建崇恩堂天啟衢州府志在西安縣狀元坊内宋留怙登進士仕至開府建以寓報本之意谷口堂程俱有山居谷口堂詩見𢎞治衢州府志臨清堂萬厯常山縣志在縣東南宋趙希錧建雙溪堂輿地紀勝江山縣雙溪泉在縣市中有雙溪堂為負邑佳處祈年堂天啟衢州府志江山縣登真巖有潭唐刺史投龍祈雨名為天泉宋守范祖徳作堂其址世學堂𢎞治衢州府志江山縣柴禹功受業楊時之門時扁其堂曰世學七賢堂名勝志在開化縣華川黄泥嶺下宋少卿江緯築公姪少虞齊漢與汪藻程俱李處權趙子晝七人從游時人指為文中七虎云江緯七賢堂拜星月詞退處鄉闗幽棲林藪舍宇苐須茒盖翠囐清泉啟軒窗遙對遇等閒鄰里過從親朋臨顧草草便成幽會䇿杖攜壺向湖邉栁外旋買溪魚便斫銀絲膾誰復欲痛飲如長鯨吞海共惜曛酣恐歡娛難再矧清風明月非錢買休追念金馬王堂心膽碎且鬬尊前有阿誰身在張栻和拜星月詞十里烟堤百花風榭游女翩翩羽盖綵柱秋千蹙花梢嬌對矧門外森立喬松日花争麗猶若當年文會廊廟夔龍暫卜隣郊外真率盤餐玉糝金虀鱠同蕭散寄傲尊罍傾北海佳處難忘約追歡須再況風月不用一錢買便回首七虎堂中心欲碎千里相思幸前賢猶在逍遙堂𢎞治衢州府志在開化縣北地名馬金宋淳熙中汪觀國仕歸築堂後為包山書院自娛堂萬厯開化縣志在龍山鄉宋程如所居楊廷秀題程如自娛堂詩萬夫掉臂煩心熱一室潜身古道寒棐几春風牙軸亂短檠夜雨玉蟲殘忽於妙處有所得自謂平生無此歡雁鶩争前問錢穀了然涇渭不相干晩香堂天啟衢州府志在開化縣南邑人元徐伯昌所居伯昌詳究易理性嗜菊以晩香名其堂髙齋方輿勝覽在西安縣治北宋趙抃歸老作此齋西安縣志内有濯纓亭逸老亭水月亭皆朱文公書扁趙抃退居十詠軒外長溪溪外山捲簾空曠水雲間髙齋有間如何樂清夜安眠白晝閒右髙齋池閣孤清瞰碧流太空壊抱物華秋圓蟾黙有中宵約㡬㸃閑雲為我收右池亭魚不能言似可哀竭池千數競徘徊縠江深處呼童放羡爾優游得所哉右放魚少時親手植雙松畫愛層隂夜聽風今日嵗寒踰五紀也應心似主人翁右雙松暑威何處稱疎慵百本修篁小檻東時有清風送消息此君多在不言中右竹軒動入和風静惹烟翠條疎處露池蓮林中盡是能吟物春有黄鸚夏有蟬右栁軒疎徑修筠郊外居小亭隨意傍歸歟等閑早暮攜笻到池沼東頭是舊廬右歸真亭亭上秋登逺目明濯纓誠不是虚名晴波一片如鋪練浮石江心徹底清右濯纓亭累嵗辭榮得帝俞老來天幸有誰如腰間已解黄金印歸有田耕二頃餘右附郭田烏巨東西氣候秋于湖岡隴暮雲浮欲觀古佛叢林地只用憑欄一舉頭右巨山蘇軾寄題趙閱道髙齋詩見公奔走謂公勞聞公退引云公髙公心底處有高下夢幻去來惟所遭不知髙齋竟何義此名之設原吾曹公年四十已得道俗緣未盡餘伊臯功名富貴俱逆旅黄金知繋何人袍超然已了一大事掛冠而去真秋毫坐看猿猱落置網兩手未肯置所操乃知賢逹與愚陋豈直相去九牛毛長松百尺不自覺企而羨者蓬與蒿我欲嬴糧往問道未應舉臂辭盧敖怡顔齋胡翰怡顔齋銘序衢之超化寺昔朱子吕子嘗寓焉寺故有雲山閣怡顔亭悉廢矣惟朱子所書亭扁石刻余於祝仲文家見之仲文有吏能退居委巷遂名其齋曰怡顏乃為之銘克齋名勝志江山縣西山徐復殷家於此宋理宗賜克齋二字雪竹軒名勝志在郡齋有屋二楹中檻植竹敲風擊雪音韻鑑然覺軒天啟衢州府志宋元豐狀元黄裳來遊開化愛招福院山水而寓焉寺僧構軒裳為題扁聽雨軒𢎞治衢州府志在開化縣北汪觀國字廷元於所居作逍遙堂翼之以軒扁曰聽雨與其弟端齋燕息以終老復遣其子浤從遊東萊之門時晦菴自建安來過張南軒陸象山吕祖儉各賦聽雨軒詩以美之朱熹汪端齋聽雨軒詩試問池塘春草夢何如風雨對牀詩三熏三沐事斯語難弟難兄此一時為母静彈琴㡬曲遣懐同舉酒千巵蘇公感寓多遊宦豈不臨風尚爾思吕祖謙次韻聽雨軒詩弟兄真樂有誰知頗憶蘇公聽雨詩小院深沉人静後虛簷蕭瑟夜分時對牀魂夢歸燈火浮世身名付酒巵書册一忩生計足怡然戲綵慰親思龜峯亭輿地紀勝在舊郡治内月坡亭天啟衢州府志郡守吳興施公作毛幵記來月亭名勝志在郡圃蓮池上蒙泉亭天啟衢州府志在府治平山堂後泉上平山亭天啟衢州府志在郡治元大德癸夘治中陳孚作自為銘今扁曰大觀亭西安縣志即今遊矚亭羣峯亭趙抃有登郡城龜峯羣峯亭詩徵夢亭晏公𩔖要在州衙之東唐豆盧署建天啟衢州府志豆盧署初名輔真少旅於衢刺史鄭式瞻謂曰子複姓不宜二名乃書署字授之夕夢老父云聞使君與君易名當四舉成名後二十年牧茲郡指一地方曰北處可建亭臺後悉符所夢果刺衢於所指地立㣲夢亭風亭𢎞治衢州府志在郡城吳興施徳初建西安縣志疑即今雩觀亭在埭堰西南挺出一道如臺界於濠間今為雩祀之所謹按郡志職官宋刺史有施元之徳初或其字也雨亭𢎞治衢州府志在郡城闖山亭天啟衢州府志在郡城毛幵闖山亭詩逺峯顒然來近峯矗然出作亭以延之入眼青突兀何人切雲冠凜凜相映發有如衆君子可望不可屈平生謝宣城愛山甚饑渇笑談了官事獨往寄超逸捲簾新雨霽伏檻孤雲没遙知尊俎外秀動龍蛇筆朝來有爽氣不待羣木脱心賞信無同佳人𣺌天末風月亭天啟衢州府志在郡城觀稼亭天啟衢州府志在城隍廟南下視平遠青山入雲為城中偉觀捲雪亭輿地紀勝在郡城航遠門外俗稱水亭門竚舟亭毛幵竚舟亭記太守吳興施公元之治衢明年作亭西溪之上既成請以竚舟為名而記之日遲亭瞿溥日遲亭記三衢多靈山惟石室以爛柯著去郡治稍近因建亭於山上取昔人春遠日遲之詠顏其亭西安縣志亭在爛柯山青霞洞側令陳鵬年重葺名曰柯山亭繡谷亭程俱有繡谷亭詩見𢎞治衢州府志縠坡亭萬厯龍游縣志在縣北五里縠坡巖上宋吕防建天啟衢州府志縠水亭在縠溪山下汪泌縠坡亭詩波紋端與縠紋同正倚欄干想像中更被輕舠横截去斜陽染得半江紅插花亭龍游縣志縣南天堂山其山半為插花亭冷公亭萬厯龍游縣志在冷水華嚴菴相傳元末冷謙曾寓於此獨往亭名勝志在常山縣容車山宋趙鼎建沈與求獨往亭詩林下何人伴嵗寒亭前相對小檀欒年來聞道烟梢長乞與衰翁把釣竿趙鼎自題獨往亭詩亭前舊種碧琅玕别後何人著眼看上下溪流接潮水時憑雙鯉報平安靈淵亭𢎞治衢州府志在常山縣西白龍洞山萃賢亭名勝志在江山縣禮賢鎮邑人周頴建王安石蔡襄歐陽修王安國范鎮梅堯臣吳光韓維韓絳王祺石揚休蘇舜欽劉湜蕭公才李大臨吳宗復邵必李際曾鞏皇甫澄余藻張大有皆有詩歐陽修萃賢亭詩君家富山水占勝作髙亭坐聽溪流響能令醉客醒陽生羣木秀寒入亂峯青吾子東南美人賢益地靈始喜亭天啟江山縣志在江山縣南面烟蘿洞宋嘉泰三年令黄汝嘉名之江山竒觀亭明一統志在江山縣治西西山邑人擇勝為亭宋令黄汝嘉題扁竹亭徐公遴開化雲隠洞記西山之北有雲隠洞洞之勝在靈山之竹亭天啟衢州府志在靈山寺側後移於西山之麓無盡藏亭萬厯開化縣志在和平通濟橋溪之西宋曾鞏題扁毛幵有記女樓𢎞治衢州府志在龜峯峥嶸間唐會昌中崔耿為郡重作之名曰東武以識世封崔耿東武樓記衢之城成於龜山峥嶸嶺上其守之居西北角有樓以女名之耿按信安分於東陽昔姑蔑國也其地上當婺女之舍次意其號樓亦或在此圖經無記宿老莫傳故莫知其所以女名其樓之義者結構年深參差傾脱會昌辛酉嵗余祗命作守至此踰月條悉郡理之餘視其將毁壊命工度其形勢難加補葺乃重作之上樓下室左右昇降洞然無衝礙焉南附小樓舒二翼而抱之室立壁垣樓徹户牖有山在前有水在下浩然羣籟挐挐哦哦隂魄懸光陽輝陞照一邑風景萬井人烟飄飄然出乎虚無之際厯四候之變態覩萬物之動息安其所安聊樂以處耿也本清河束武城人六代祖岐叔諱鑣仕隋為散騎侍郎内史舍人文林館學士應詔入都遂留於都曽祖考太保忠公以道事君任冠中外自并入覲報政册勲復開國於東武城於戲大凡為人後者動一意舉一足不敢忘其本因舊址作新樓北向臨風萬感俱集强名東武以成愚志遂磨貞石日而月之書其所以然也謹按崔耿以會昌二年為刺史撰東武樓碑記天啟郡志藝文内訛為耿自古女樓記竟以耿為姓自古為名而西安縣志亦承其誤華豐樓天啟衢州府志在西安縣西地名橋下西安縣志元王都中建王逢衢州華豐樓望柯山江郎石詩華豐樓信美登望乆踟蹰木落偃王廟天寒姑蔑墟屏開山石遠青鎖洞霞虚不有從親役乗風振珮琚永清樓熙春樓𢎞治衢州府志並在郡城明遠樓天啟衢州府志在江山縣治内宋知縣程凖建程凖明逺樓詩㠶帶暮雲歸别浦厓拖秋色落澄波天連尺五銀河挽月倍尋常玉鏡磨竒氣樓天啟江山縣志在長臺國史柴望建文會閣𢎞治衢州府志在郡齋即唐刺史季彀置二石處從山閣夕佳閣環映閣景髙閣𢎞治衢州府志並在郡治雲山閣名勝志在郡城超化寺後城上明一統志宋守張嵲建横山閣薩天錫有題烏石山仁王寺横山閣詩懐舒閣𢎞治衢州府志在江山縣仙居院前有水簾宋毛諫議注即其前為閣髙山閣天啟衢州府志在開化縣西卧佛山麓唐末長史胡公億所建髙據四山為一邑冠桂巖閣名勝志開化縣東南馬尫溪之上五代時侍御史江景房卜築於此前有山壁立百仞中有秋香一本自石竅出與巖對峙宋隆興間七世孫侍御溥構閣萃清閣嘉靖浙江通志開化縣金馬嶺金溪之水合於此宋時建閣於上芙蓉臺𢎞治衢州府志郡城峥嶸山舊芙蓉臺在其處采月臺明一統志在府城中宋時築景髙臺明一統志在府城中超霞臺常山縣志在金川門山巔月波臺天啟衢州府志在開化縣金錢山北宋山長江天然建天然二子俱中神童科朱子過訪為書月波臺朱熹月波臺詩孱潺流水注回塘中作平臺受晩涼四面不通車馬跡一尊聊飲芰荷香韓公無復吟花島楚客何妨賦葯房少待須臾更清徹月華零露洗厓牀殷浩宅元豐九域志在西安縣基地猶存土人號曰殷牆天啟衢州府志在西安縣南六里信安故城中浩在晉為中將軍建元間北代為姚襄所敗廢為庶人貶居於此其址猶存道傍有小石室其神為介冑之像鄭革宅𢎞治衢州府志西安縣矻石山五峯拔起隠者鄭革居其下夜見光怪訪其處得古劍㦸二趙抃宅𢎞治衢州府志在西安縣北五里孝悌里初抃喪繼母與弟拊廬墓縣令過朂榜其里曰孝悌築闕立表樓鑰為書忠孝之家明一統志趙抃故居宋咸淳中郡守立為清獻書院王安宅名勝志西安翠微山宋招討使王安所居陳師錫宅𢎞治衢州府志在府治西南隅宋崇寧間陳師錫謫居於此民愛其賢故稱陳殿院宅毛自知宅西安縣志卧龍山在縣東其下為宋狀元毛自知所居亦名狀元峯馬天驥宅萬厯龍游縣志資福山左為馬府即宋樞密馬天驥宅陸秀夫宅龍游縣志縣南有桃源宋陸秀夫以忤賈似道嘗棲於此今呼尚書塢王介宅嘉靖浙江通志常山縣賢良峯宋王介讀書其下後舉賢良第一故以名峯江躋宅明一統志常山縣北廌峯宋侍御史江躋故宅在焉樊曾宅天啟衢州府志常山縣北有疊石崖上有窩宋學士樊曾居焉徐國鎮宅天啟衢州府志常山縣西彤弓山宋咸淳間徐國鎮讀書其中愛之遂徙居焉祝臣宅天啟衢州府志在江山縣郎峰下毛漸宅天啟衢州府志在江山縣禮賢溪西毛注宅毛㮚宅天啟江山縣志並在鎮安清漾柴弓宅衢州府志八行柴弓宅在江山縣長臺徐揆宅衢州府志宋徐宅卿宅在江山縣仕陽毛晃宅嘉靖衢州府志在江山縣沙堤宋鐵硯先生毛晃父子閉門著書處今為髙齋書院姜夔宅天啟衢州府志在江山縣石城吾衍宅天啟衢州府志吾衍元初居開化縣石井後寓杭之生花坊洞菴𢎞治衢州府志在郡治塵外堂傍仙巖洞天明一統志西安縣仙巖太祖兵下江西過此鄉書仙巖洞天刻於石溪菴趙抃有題毛維瞻溪菴詩見衢州府志幽巖精舍周必大烏石山題名烏石山龍游境也其上幽巖精舍今為宗室儀泰孝王功德寺潛心室嘉靖浙江通志在江山縣長臺宋柴禹聲建青霞洞天方輿勝覽在開化縣崇禎開化縣志内有妙髙臺韜雲磴寂光菴谷口堂雲巢繡谷堂梅谷普潤池妙湛池崇蘭塢漆林竹嶺聽雲菴羃翠軒菊泉見程俱詩題雙石西安縣志郡治前有小蛾眉峯唐乾符間刺史季彀置砦龍山得二石長六尺取置文會閣宋淳化間郡守慎知禮移於治前積土為峯後訛為郭璞墓宋紹聖中郡守孫賁發之宣和中郡守髙至臨復歸故處明郡守李遂又復去雙石植於游矚亭之側其發雙石處即今戒石亭也石鼔天啟衢州府志在龍游縣九里橋葉公宅外余端禮幼時從學一日赴學早門未啟端禮假寢鼔上葉公夢黑龍蟠鼔起視見端禮焉烏石山古松龍游縣志山口古松一株㡬厯千禩婆娑特甚浙江通志卷四十八
