body:
  text: 浙江通志卷二百六十一藝文三記遊赤松記宋吕祖謙淳熙十五年十一月二十五日南至後一日與二三友訪吕仲平之廬登高四望縹眇赤松之居如在屋後後二日呼兒覔藜杖命友戒行囊將出門仰視天際雲物飄浮雨意墜地興盡欲止既而曰會有能為我開之者緩步出北郭五里許市廛煙火始絶山光野色漸與人相應接而晴光亦時著人又二里許至季氏之廬所居依山茂林清池相映帶季氏兄弟與其知友陳巖夫亦亟襆被欲共宿山中道間有可寓目處則止一以休足力一以適吾意又行十里至小石橋望赤松山積靄橫翠蔚然深明而水聲琤琮如環珮之相擊相應復行三里許入山門長松偃蹇道旁若不肯與世士為伍至橋亭坐於老木之上古澗橫石激為清湍澎湃洶湧人籟俱息心目為之醒然止於潄玉飲於濯纓曩歲雷雨泉石之聲恍然猶在耳邊復曳杖入小桃源暝色已滿巖谷矣徙倚枕流四際溟蒙天水一色泉聲松韻始若暴風急雨之驟至徐而察之又若車馳卒奔而未有所止也雲間時有踈星點綴林杪與水影相照清徹無底坐而假寐神清如遊乎鈞天而不自知夜將半始就寢夢魂所厯蓋亦非人間世也晨興復至其處灝氣遊衍天宇無滓心曠神怡注目久之道士設豆粥即尋支徑謁二仙祠世相傳以為黃初平兄弟覔亡羊之地或曰此留侯所謂願棄人間事欲從赤松子遊者其信然耶雨微作欲還觀中已而復霽偕行者俱欲登山酌丹井飲造之自崖而返景移目改亦忘乎足之前蒼然列屏流水在下望桃源之亭榭亦隱約可見中道或有依澗而上觀瀑泉履白石欲窮其源而不可得復相與會於丹井之上山高而深下視羣谷莫不獻狀道家者説葛真人煉丹處其語雖若誕謾不經然廣谷大川之間亦安知無葛天氏之民遺世忘言者歟歸途高者平險者順山回路轉烏紗欹斜隨意先後非徒望之者忘其為誰氏之子也雨復作小憩於村舍至山下雨亦止日猶未中少休即飯飯竟信其所之道士多扄户時聞棊聲再尋桃源之遊登御風亭林木交翳今皆廓然復循山磴遊於物外喬木倚天澗流清壯此間桃源之津所從始也過小橋緣山而行泉石相搏無風而濤行且百步幽意益邃橫澗為橋榜曰三峽驚濤怒流與巨石相吞齧前莫知其所窮後莫知其所止清深幽勝殆與塵世相隔使人凡情俗慮不掃而自去復行數十步過盤石臨浚流景象天逸不特與所謂物外者異亦與所謂三峽者異橫絶一小橋又數步臨澗而高大石側立於小亭之後其名曰泠然平流滿盈以止衆止上下水石滚滚不少休望澗之北山容如畫下泠然又數十步復有傑石橫峙不倚物而立由傑石而前登棲碧位置清穩水聲潺湲心迹可以俱清傑石之後地平如掌可據高梧而坐丹井路亦可由此而上誦招隱遊仙之篇徘徊登眺不知日之入須臾暮煙四合不可以久留復尋舊遊而歸仲平賦詩和之者亦有自得意抵夜復坐於枕流林外燈火久益微茫泉流靜深猶與夜氣相宜是行也初為一日之留而山靈不我厭也晦而雨雨而晴極目於丹井稱心於桃源而於枕流過清之間朝暮幾與神交自己未至辛酉凡三日而後返因識所遊之大概及同遊者之姓名於幅紙以為他日之思仲平亦姓吕氏河南人樂於山水而不厭者季氏兄弟長曰元發次曰淳父幼者未字陳巖夫居古括亦相與再宿而歸縉雲曰沈伯明子溫叔昭子成東陽李從仲喬子疆郭元簡陳仲益許叔儀徐正之徐用之浦江鄭厚之石介卿永康章仲溫武義阮夢得王性之皆欲從豫山行者祖烈喬年亦令隨賓友之後庶幾其長而亦漸知此意焉紹興府修學記宋陸遊八卦有畫三墳有書經之原也典教有官養老有庠學之始也厯世雖逺未之或異自周季以來世衰道微俗流而不返士散而無統而學校弗治自周襄王之五代幾二千歲而後我宋誕受天命崇經立學以為治本十二聖一心罔或怠忽然竊嘗考之方周盛時天子所都既並建四代之學而又黨有庠遂有序畿內六鄉鄉有黨百五十六遂遂有鄙如黨之數遂序黨庠蓋互見之則是千里之內為序十有二為庠三百何其盛也今畿內之郡皆僅有一學較於周不及百之二而又不治則為之牧守者得無任是責耶會稽拱行在所為東諸侯之冠宜有以宣聖化倡郡國而學未稱給事中括蒼王公信來為是邦政成令行民物和樂臺榭弗崇陂池弗廣而惟學校是先燕遊弗親厨傳弗飾而惟養士是急下車未久奧殿崇閣邃宇修廊講説之堂弦誦之舍以葺以增不日訖事以其饔飱未足也則為之售常平之田以其見聞未廣也則為之求四方之書食有餘積書罕未見然公猶以為歉曰上丁之禮服器未復古也又為之新冕辨衣裳帶紳佩舄之屬自邦侯至諸生各以其所宜服鼎爼尊彛豆籩簠簋之屬自始奠至受胙各以其所宜用無一不如禮式公乃齋心修容來宿於此質明陟降揖遜進退跪起俯首屏氣如懼弗克禮成士僉曰公以躬行先我我處於鄉弗篤於孝悌忠信出而仕弗勉於亷清正直不獨不可見公仰天俯地其何心見父兄長老其何辭教授陳君自強與諸生以其言來告曰願有記某老病不獲奉爼豆以從公後喜士之能承公也於是乎書紹熙二年九月癸酉記書巢記宋陸遊陸子既老且病猶不置讀書名其室曰書巢客有問曰鵲巢於木巢之逺人者燕巢於梁巢之襲人者鳳之巢人瑞之梟之巢人覆之雀不能巢或奪燕巢巢之暴者也鳩不能巢伺鵲育雛而去則居其巢巢之拙者也上古有有巢氏是為未有宫室之巢堯民之病水者而為巢是為避患之巢前世大山窮谷中有學道之士棲木若巢是為隱居之巢近時飲家者流或登木杪酣醉呌呼則又為狂士之巢今子幸有屋以居牖戶牆垣猶之比屋也而謂之巢何耶陸子曰子之辭辨矣顧未入吾室吾室之內或棲於櫝或陳於前或枕藉於牀俯仰四顧無非書者吾飲食起居疾痛呻吟悲憂憤歎未嘗不與書俱賓客不至妻子不覿而風雨雷雹之變有不知也間有意欲起而亂書為之如積稿枝或至不得行則輒自笑曰此非吾所謂巢者耶乃引客就觀之客始不能入既入又不能出乃亦大笑曰信乎其似巢也客去陸子嘆曰天下之事聞者不如見者知之為詳見者不如居者知之為盡吾儕未造大道之堂奧自籓籬之外而妄議之可乎因書以自警淳熙九年九月三日甫里陸某務觀記東陽陳君義莊記宋陸遊東陽進士陳君德高因吾友人吕君友德來告曰德高不幸早失先人舉進士又輒斥念昔先人進德高輩於學蓋將使之事君使之字民以廣我先人之志今雖自力而不合於有司之繩尺如其遂負所期望付託生何面以奉祭享死何辭以見吾親於地下不獲施於仕進為時雨為豐年矣獨不可退而施於宗族乎於是欲為義莊略用范文正公之矩度而稍增損之以適時變敢求於執事者且載其凡於碑隂豫復之曰美哉吾子之志也人之情於其宗族逺則疏之彌逺則益疏而至於忘之蓋以身為親踈而不以先人為親踈也視兄之子或不若己之子己之子與兄之子自吾父視之有異乎能以父之心為心則己之子與兄之子且不知其同異矣推而上之大父之孫為從父兄弟曾大父之曾孫為從祖兄弟又推而上之至於無服雖天下長者不能無親疏之殺矣於乎制服不得不若是也若推上世之心愛其子孫欲使之衣食給足婚嫁以時欲使之為士而不欲使之流為工商降為皂隸則一也死而有知豈以逺而忘之哉義莊之設蓋基於是然舉天下言之能為是者有幾非以為不美而不為也力不足也若陳君者自其先人勤勞節約以致饒餘而陳君不敢私有之其地在塍頭昭福寺之旁初期以千畝今及十之七而吾地在塍頭者止此比鄰感其義皆欲期年間貿易以成之又值桑畜牛築陂以豐衣食之源其詳見碑隂又有最當慮者吾子之心則盡矣後人或貪其專利或嗇而吝出或夸而廣費或挾長挾仕挾有力之助而敗約非有司者别白之則莊且壞不支府牧邑長丞掾曹吏及鄉人鄉大夫先生處士其必綱維主張之使久而如一日陳氏布衣也其資産非能絶出一鄉之上而義倡於鄉如此吾徒仕於朝於四方雖未必皆厚祿然聞陳氏之風而不知愧且慕者豈人情也哉於是併書以遺焉君之先君子蓋諱士澄字彥清云開禧三年七月辛丑記嚴州釣臺買田記宋陸遊嘉泰四年詔以嚴州久不治命朝散郎直祕閣浙西路安撫司參議孫公叔豹為知州事公至數月州以大治公天資近道不樂燕遊歌舞之奉又不喜以土木無益之事勞其民治事少休則宴坐别室自夜至旦盥靧而出終歲如一日獨念初赴郡過七里瀨漢嚴先生釣臺下讀唐興元中崔儒釣臺記以為上有平田百畝足以力耕下臨清流足以垂釣今投釣之地具在而田則無有乃以屬縣令訪之則田亦具在旁有流泉雖大旱不竭可給灌溉而或者輒有之公乃遺語以當歸田直而取田以為先生歲時祭享之奉其人難之公歎曰光武欲與先生共天下而先生不屑也千有餘歲後吾乃欲必取百畝之田以奉祀事乎且吾教化未孚而遽望人以輟耕遜畔難矣因置不問會有沒官田又從旁買民田足百畝除其雜泛科斂以畀浮屠之奉祠者又即祠之右創為佛院栖鐘於樓篋經於室僧廬客館略皆有所度歲入可以食其徒七人而樵汲之役又在其外則先生之祠可以永世不廢乃礱美石請記於豫豫曰嚴名城也自大駕巡幸臨安以朝士出守者與夫人對行殿被臨遣而來者大抵多取道於富春入謁祠下有高山仰止之嘆而恨祠屋弊壞椒桂不以時薦往往咨嗟躊躇久而後去及其下車則日困於簿書米鹽將迎燕勞之事忽焉忘前日之言寒暑再更復上車去則又過祠下負初心戴愧面者袂相屬也聞孫公之舉得無少自咎哉豫二十年前蓋嘗來為此邦亦自咎者之一也故喜道孫公之舉且以勵來者云開禧元年十二月辛未記上天竺復庵記宋陸遊嘉泰二年上天竺廣慧法師築退居於寺門橋南名之曰復庵後負白雲峰前直獅子乳竇二峯帶以清溪環以美箭嘉木凡屋七十餘間寢有室講有堂中則為殿以奉西方像設殿前闢大池兩序列館以處四方學者炊㸑湢浴皆有其所牀敷巾鉢雲布鱗次又以為傳授講習梵唄之勤宜有遊息之地以休其暇日則又作園亭流泉以與學者共之既成命其弟子了懷走山隂鏡湖上從豫求文以記歲月豫告之曰進而忘退行而忘居知趨前而昧於顧後者士大夫之通患也故朝廷於士之告歸每優禮之而又命有司察其尤不知止者以勵名節而厚風俗士猶有不能決然退者又况物外道人初不踐是非毁譽之途名山大衆以説法為職業愈老而愈尊愈久而人愈歸之雖一坐數十夏何不可者如法師道遇三朝名蓋萬衲自紹熙至嘉泰十餘年間詔書褒録如日麗天學者歸仰如泉赴壑非有議其後者而法師慨然為退居之舉傾竭槖裝無所顧惜雖然以豫觀之師非獨視天竺之衆不啻敝屣加以歲年功成行著遂為西方之歸則復庵又一敝屣也死生去來無常豫老甚矣安知不先在寶池中俟師之歸語今日作記事相與一笑乎開禧元年三月三日記智者寺興造記宋陸遊婺州金華山智者廣福禪寺浮屠氏所謂梁樓約法師道場國朝開寶九年始為禪寺自淨悟禪師全肯傳三十七代二百餘年至慶元之五年而仲玘實來方是時事廢不舉地茀不糞棟撓柱腐垣斷甃缺若不可復為者玘植杖而四顧曰智者之為寺天造地設者至矣而人事不能充焉故寖壞至於此天其使我興此地與乃諏諸為地理學者則其言與玘略合蓋寺在金華山之麓峰嶂屹立林岫間出日月映蔽風雲吞吐而前之形勢無以留之如王公大人南嚮坐帷幄中宜其前有列鼎大牲之養盛禮備樂之奉賓客進趨擯相襜翼將吏武士執撾執殳然後為稱今乃巍然獨坐而侍衛者皆奔趨而去則其威重無乃少損乎於是始議鑿大池瀦水於門梁其上通大路而增門之趾高於故三之二異時所謂奔趨而去者皆肅然就列恪然執事則王公大人之尊於是始全則其施置建立號令賞罰亦何可少訾耶方議之初或謂門有大木數十必盡去乃可興池役而木所從來久以是未決忽一夕大風木盡拔若有鬼神相其役者其亦異矣玘之來百役皆作修廊傑閣虛堂廣殿至於栖衆養老之室庖湢帑庾之所繚為垣牆引為道路莫不美於觀而便於事後雖有能者無以加焉玘有道行為其徒所宗而才智器局又卓然不凡如此故薦紳多喜道之余又與有夙昔且嘗記其嚴州南山興造之盛故玘今又從豫求作智者興造記而豫友人寧逺軍節度使提舉佑神觀薑公邦傑復以手書助之請未及屬稿而邦傑沒豫尤感焉雖耄不敢辭也今兹之役池為大故書之特詳嘉泰三年十月二十九日記婺州稽古閣記宋陸遊大觀二年九月乙丑天子既大興學校舉經行之士於是詔天下州學經史閣皆賜名稽古婺州稽古閣者本以閣之下為講堂而閣用大觀詔書易名紹興中學廢於火及再建講堂雖復其故不暇為閣至嘉泰元年太守丁公逢乃即講堂後得舊直舍地以為閣而請於今參知政事許公大書其額公書宏偉有漢法於是閣一日而傳天下丁公既代去曾公栗來為郡閣之役尚未既也於是忩戶闌楯瓦甓髹丹粲然皆備又為兩廡達於講堂高廣壯麗無遺力南山在其上雙溪繚其下煙雲百變朝暮獻狀閣之後有仰高堂舊祀資政宗公澤尚書梅公執禮中書舍人潘公良貴三公皆郡人有忠義大節而祠庳陋勿葺曾公撤而大之始奕奕與閣稱曾公以邦人之請及州學教授潘君夢得所敘移書史官山隂陸某願記其始末時方修孝宗光宗兩朝實録業大事叢而奏篇有程久乃能如曾公之請夫堯舜禹臯陶書紀其事雖不同然未嘗不同者稽古也稽古必以書前乎堯舜之書其易之始畫與典墳乎易之畫幸在至今而三墳五典自楚倚相以後不聞有能盡讀者世所共嘆也雖然今讀易不能知伏羲之心讀典不能知堯舜禹臯陶之心雖典謨盡在亦何益於稽古故余以為士能玩易之畫與身親見伏羲等反覆盡心於典謨與身親見堯舜禹臯陶等能親見聖人而不能佐其君興聖人之治理豈有是哉士之放逸惰倫不力於學者固所不論學而不親聖人猶未學也親見不疑而不用於天下則有命焉進則不負所學退則安吾命而不愠斯可仰稱大觀詔書與賢守復閣之意矣士尚勉之嘉泰二年閏月二十五日陸某謹記分繡閣記宋洪適浙江以東層岡峭岑盤深復阻出會稽道天姥百有餘里才得夷曠之地十有五頃以為天台郡郡踐山作郛而餘麓及屹立之峯廢不可廬者亦十一二故官寺民區鮮巨麗之所十數年中監州始有以員外置者僑宇城之巽隅距黃堂七百步而贏其職業之商讞僚類之謁請吏抱文書袂屬囂闤隘溪間舉不以為便乃徙幕曹之舍為今所居與正員相東西焉然規恢下窄榮奧埃墨無復高明爽塏之觀獨東偏有地斗大叢榛委甓蚓虺所潛前沿後仍指為棄壤則薅刜輦治培基建閣以夏四月課材閲月而斤斧論阞其高四尋衡袤草有七尺南北不及者九之一羣山縈環垂光獻狀可以分繡名推去冗牘登臨領略則巖姿之四時煙霏雲采之隱見咸與意會舉杯屬客則琴瑟奕思恢乎其有樂地閣之下對植美竹以清閟目其堂後穿小池可容萍藻則又為舞猗之亭或曰人生天地間以百年為須臾况宦遊弗常席甫暖而趣代今子來旬歲矣又如是而去何以兹閣為語之曰人能無以一生為客則澡濯自強期與前英聯橫能無以一官為不久則黽勉盡瘁必有以美其政豫年少質下若乘鴈雙鳬雖去來無係於邦人然吾身朝夕於斯抑欲自適耳紹興十六年五月七日記後草四年壻永嘉薛紹以左從事郎為郡推官得是閣而新之請易舊扁故重刻此碑昌化縣儒學記宋陳居仁杭為古都會自六蜚時巡曰行在肇清府名其地望為尤重昌化其支邑也施德自近始宜其教明俗化俊秀輩出衣冠相望然僻在巖谷間其俗第知服勤穡事盡力於桑麻自唐武德逮於我朝曾未有躡巍科登顯仕者豈天之降才爾殊哉係我長民者之責也淳熙四年錢君宰斯邑始至詣學謁先聖敗屋數楹莫蔽風雨像設寖以頽剝其心惕焉期年政成乃鳩材僝工經始於己亥仲夏落成於仲冬民不憚役役不滯時畏敬有殿駕設有堂肄業有齋藏書有庫司膳有庖百里稚耋爭快先覩更相與言曰令君所以惠顧我者厚矣既足我以衣食又教我以孝弟其可不圖維所報者哉由是口誦心傳耳濡目染先聖之教長長幼幼趨善如不及而訟庭為空教化之移人如是哉文翁之於蜀常衮之於閩韋景俊之於肥鄉流芳垂聲久且見思臨人之君子盍亦視所適從噫十步有茂草孰謂近在畿甸而儒服者無幾焉異時髦俊蝟興超取顯美有聞天朝而文物彬彬然如鄒魯未占有孚矣余嘉其為政知所本不邀譽於一時殆非俗吏之所能為者乃特書以語後人君名孜嘉禾人寶婺觀記宋葉適觀即八詠樓道士陳守正職補治厯十年乃具夫山峙以近則迫而易窮川浩以逺則蕩而難限皆遊觀之病也金華高千仞旁走三縣逶迤回環其餘漫隴伏岡林茂野蕃若輊若軒若萬馬縱牧於平原錦出繡沒不可控摶兩溪廣長會清合涼匪厲伊方徐納於江南山綿綿果蔬之區柘桑之園日月風雨借其恣態霧煙氛靄相為吞吐而光氣靈響之答於耳目異矣四顧百里不蕩不迫有臨望之美無遊觀之病浙以東兹樓稱最焉昔沈約始建而地以文顯意士之遊者必有得於斯而余不能知也近世大儒吕公出人以理著四方英俊歲常數百千人無不登兹樓其得之孰淺深高下則余雖或知而亦不能盡也山水至善之所存遊於是者密悟為善之機反沖藏約而內守通變逹化而外應寬施忘其偏吝朗豁消其暗鄙德成性安而動樂靜夀之功驗矣其或不然豪怒使酒激而為狂感物悲憤鬱而離憂巧諷詠益其輕肆謬題品示其誕拙是遊觀不以病夫人而人反以病夫遊觀也可無畏哉嗟夫吕公歿久同時並遊俱逝余亦老不復至矣故因守正繫其語使後之學者有考觀初立於唐史曰須女之舍也遂以名州太守洪邁請錫嘉字故曰寶婺天象邈矣星辰之躔次難言哉然而禬禳每效福嘏頻集邦人奉承無敢不肅豈非地勝故耶守正與其徙尤不當以人而病夫遊觀也紹興府新置二莊記宋葉適嘉定七年越州初建二莊於諸暨縣古博嶺越之西皆海也水怒防失冒寶盆隳白楊市兩縣間蕩為滄溟事聞上遽頒經常命太守趙公彥倓築堤捍之起湯灣迄王家浦公又益以留州錢千餘萬役自秋及夏乃畢越人謝曰昔土塘而今石宜可久無患公愀然曰未也堤之始穴尺寸爾慢不省積歲月大潰矣今雖壯好後將復然石何能為初民杜思齊獲罪家沒入公請買於安邊所别藏其租以備補完一也越為郊畿而民不勝困卿相迭守而治反踈鹵城堞營署無不敝缺聘問燕饗無不削損若夫命鄉論秀合樂以侑之古今常禮也然且寂而無聲數十年矣公又嘆曰越為東諸侯率而簡陋至此况以貴傲世哉幸吾在皆略具而鹿鳴歌矣若異日何因思齊之餘又買諸傅氏以待三歲之用二也余知公者以記來請嗟夫政未有不得其本而後成其末也捍海之功巨而害原於小舉士之費小而所關者大二莊之作趙公知之矣非特此也劵易米而致鏹三物相流通不貴糴矣持劵索錢昏暮無不與天下坐會子犯法相望不濫罰矣勤收而儉藏以貫萬數者四十乙亥大旱舉以救民不病歲矣有本也抑又有末焉夫名峰異嶺在揚州蓋百千所獨會稽為鎮山越之竒勝峻特擅於東南者以山也其深泉高瀑百道爭流昔人浚而為湖山之窈窕縈紆媚於越中者以湖也湖今廢矣公能疏鑿以復漢晉之舊存王謝遺迹則治越之美可垂無窮二莊又豈足為公道哉然天子召公歸矣嘉定八年記溫州學田記宋陳傅良郡校官有賜田自慶厯四年始於是宋興且百年上所以嘉惠學校之道備矣崇寧學制行郡各置博士弟子員廢廣不繼用事者文飾過當至苛斂以贍之中間多故輒一切弛去往往所在凡校官所入不足以待學士之版直煥章閣司諫謝侯來守永嘉下車才數月修墜緒平滯訟人用又和乃以其暇訪求里中士賓致之學又得公田民私以為利而不應令者歸於學有司闔郡驚歎方為吏者急他務不暇有學政侯顧獨加之意即相與請於博士李君求豫文記之豫固樂道乎此者也蓋宋士大夫之學亡慮三變起建隆至天聖明道間一洗五季之陋知鄉方矣而守故蹈常之習未化范子始與其徒抗之以名節天下靡然從之人人恥無以自見也歐陽子出而議論文章粹然爾雅軼乎魏晉之上久而周子出又落其華一本於六藝學者經術遂庶幾乎三代何其盛哉則本朝人物之所由衆多也豫嘗求其故三君子者皆萃於東南若相次第然殆有天意而浸灌培植斯亦勤矣至後生晚進失其師傅自為異同不務相扶持然要其消長皆關乎興衰之數非細故也而議者但患官冗而舉子多厭薄而銷沮之之説滋甚吾州生長旁郡最有聞則亦每在數中侯於今加意焉政何足以言之是尤豫所樂道者也而况李君之請乎侯名某邵武人李君名某廬陵人田若干畝著之碑隂北山普濟院記宋陳亮金華多佳山水而遊者往往依浮屠老子之宫以窮其足力之所至其所不能至者遂為樵夫牧子所私高人逸士因以自混於其間而天巧有非人之所能盡發者梁劉孝標以不合當世棄官居金華北山今其故居是為清修院蓋嘗溯流緣磴欲以盡發山水之竒結廬紫薇巖吳會士人多從之學巖有石室因以為講書之堂所謂劉先生講堂是也至今其山號講堂原而陳隋及唐泯然置之不問周顯德二年吳越王始建寺於巖麓曰九龍本朝慶厯六年郡守關公嘗命河南許歸以氊筆書紫薇巖三巨字鑱之石治平二年又改賜普濟院額山之僧因陋就簡日底於廢參知政事蕭公燧繇從槖來為此邦以僧奉欽為才命往主之奉欽銖積寸纍服勤不暇佛殿法堂建如程式敞三門於前而翼以兩廡庫堂藏室罔不略備翰林學士洪公邁還其甲乙住持之舊免其諸般科買之擾以勵其成今太守祕閣殿撰趙公師葵染寺額以張大之然後此山之勝不復為樵夫牧子所私而劉氏講堂亦因是以復著愛金華山水者於是可無恨矣以奉欽一力而能有功於幽勝如此使天下而各用其力則事功寧有既耶奉欽以寺記為請聳然為書以授之鹿田聽雨記宋謝翺鄉余見南嶽僧言嶽頂望日出海看雲生樹石與巖屋聽風雨敻異人世嘗疑其言之過比遊金華之北山宿東西鹿田夜聞風雨聲滃鬱浥隘琤琮澎湃浙淅浮浮泠泠翏翏或散或裒或赴或休或激或射或凌或􅅹或沉或淫或益而溢其過虛若乘其擊實若盈其舉朽若勝而振於葉也若憑其赴於壑也若崩其回旋於空而薄乎軒忩也若濤風擊舟而擁於敗罾是不可行而詰其名也蓋其地近洞天山川鬼神虎豹蛟龍蟲蛇罔象煙雲水石之所聚故聲鬱而不散其石虛窾竅垤坳析圈窪臼㟏峥口鼻之所出故其聲汨以深其林木靃靡枯新堅脆榮實癭液之所生故其聲泛以嗇其勢之來也殊方其席而怒也殊力其散而遊於物也殊值故能若無若有萬變而不窮而畸人孤子抱膝擁衾感極生悲而繼之以泣故其聽也獨真於是信鄉之所聞於僧者不謬然僧之聽乎此與人世異而吾之聽此復與僧異知吾與人世與僧之所以為異則斯遊將必有與吾不異而深知此聲者乎是為記赤城書堂記宋王應麟台之寧海其先賢曰赤城先生羅公德業為元祐名臣道義為一鄉師表教思無窮踰二百年清風肅然聞者興起舊祠於學猶未特祀邑之宿儒前進士胡君元叔倡率鄉人倣古閭孰之制即公遊息之地創為書堂令鄉之俊秀子弟而淑艾之諏諸鄉評延篤學多聞之彥前進士舒君嶽詳為之長前進士孫君鈞趙君孟禮胡君三省前太學陳君應嵩劉君莊生為之録訓之以孝弟敬遜其規約如藍田麗澤而稽經訂史種學積文以為有用之實襟佩濟濟弦誦洋洋鄒魯之風藹如也某聞而歎曰美哉教學之意乎古者立教始於鄉仕焉而已者歸教閭里謂之鄉先生上老庶幾朝夕坐於孰是為左右師入而事親從兄出而誦詩讀書小而灑掃應對大而明德新民上帝之𠂻蒸民之彝師徒所教之倫冡宰所降之德少而習焉不見異物而遷焉是以禮義興風淳俗成人小子皆士君子之行也昔有正素戚先生講道睢陽始建學舍文忠富公文正范公皆遊習於斯為一世偉人家法之粹延及後昆正素子孫若維綸若舜賓舜臣世學相承睢陽遂為四書院之冠簡策有光焉今寧海耆德鴻生咸克憲慕前哲啓迪後進俾之尊德性求放心以進於誠明養其原而即理以應事孝弟忠信培其根而餘力以學師道立善人多庶幾見睢陽之盛詩云有斐君子終不可諼兮羅公有焉高山仰止景行行止學子其𢡟哉某病耄不能文然居相邇他日海瀕為沂泗門人若安定孝友睦姻任恤如成周之時家稷契而戶曾閔也行其野則冀缺之耨茅容之耕攸介攸止日多髦士推家之教為天下法將自兹始故樂為之書吳興山水圖記元趙孟俯昔人有言吳興山水清逺非悠然獨往有會於心者不以為知言南來之水出天目至城南三里而近滙為玉湖汪汪百頃玉湖之上有山幢幢狀若車蓋曰車蓋山由車蓋而西山益高曰道場自此以往奔騰相屬弗可勝圖矣其北小山坦迤曰峴山山多石草木踈瘦如牛毛諸山皆與水際路繞其麓逺望惟見草樹緣之中湖巨石如積坡陀磊磈葭葦叢焉不以水盈縮為高卑故曰浮玉浮玉之南兩小峯參差曰上下釣魚山又南長山曰長超越湖而東與車蓋對峙者曰上下河口山又東西小山衡視則散布不屬從視則聯若比鄰曰沈長曰西余曰蜀山曰鳥山東北曰毗山逺樹微茫中突若覆釡玉湖之水北流入於城中合苕水於城東北又北東入於震澤春秋佳日小舟泝流城南衆山環周如翠玉琢削空浮水上與船低昻洞庭諸山蒼然可見是所謂清逺非耶甬東山水古迹記元吳萊昌國古會稽海東洲也東控三韓日本北抵登萊海泗南到今慶元城三五百里泰定元年夏六月自慶元桃花渡覔舟而東海際山童無草木或小僅如筯輒刈以鬻鹽東逼海有招寶山或云他處見山有異氣疑下有寶或云東夷以海貨來互市必經此山山故有炮臺曾就臺跖弩射夷人矢洞船猶入地尺又别作大筒曳鐡鎖江水夷舟猝不得入前至峽口怪石嵌險離立南曰金雞北曰虎蹲又前則為蛟門峽束浪激或大如五石斗甕躍入空中却墮下碎為氛雨或逺如雪山水岸挾風力作聲勢崩擁舟蕩蕩與上下一僧云此特其小小者耳秋風一作海水又壯排空觸岸杳不辨舟楫所在獨帆檣上指潮東上風西來水相鬭舟不能咫尺一撞嶕石且靡解不可支持又前則為三山大洋山多磁石舟板釘鐡或近山則膠制不動昌國境也昌國中多大山四面皆海人家頗居篁竹蘆葦間或散在沙墺非舟不相往來田種少類入海中捕魚蝤蛑蛇母禪塗傑步腥涎褻味逆人鼻口歲或仰榖他郡東從舟山過赤峙轉入外洋望岸客山山出白艾地多蛇東到梅岑山梅子真煉藥處梵書所謂補怛落迦山也唐言小白花山自山東行西折為觀音洞洞瞰海外巉中裂大石壁紫黑旁罅而兩岐亂石如斷圭積伏蟠結怒潮摐擊晝夜作魚龍嘯吼聲又西則為善財洞峭石齧足泉流滲滴懸纓不斷前入海數百步有嶕土人云曾有老僧秉燭行洞穴且半里石舍一竅有光大如盤盂側首睨之寬𢎞潔白非水非土遂不辨崖際又自山北轉得盤陀石山粗怪益高壘如垤東望窅窅想望高麗日本界如在雲霧蒼莽中日初出大如米篩海盡赤跳踴出天末六合奣然鮮明及日光照海薄雲掩蔽空水弄影恍類鋪僧伽黎衣或現或滅南望桃花望秦諸山嵌空刻露屹立巨浸如世疊太湖靈壁不著寸土尺樹天然可愛東南望東霍山山多大樹徐市蓋嘗駐舟於此土人云自東霍轉而北行盡昌國北界有蓬萊山衆山四圍峙立旋繞小嶼屹如千尺樓臺而中島又有紫霞洞與山為鄰中畔明通方如大車之輿潮水一退人或可入或云人不可到隱隱有神仙題墨漫不能辨又有沙山細沙所積海日照之有芒手攫則霏屑下漸成窪穴潮過又補終不少損旁有石龍蒼白角爪鱗鬛具蜿蜒跨空亘三十里舟徑其下西轉别為洋山中多大魚又北則為朐山岱山石蘭山魚鹽者所聚又自北而南則為徐偃王戰洋世傳偃王既敗不之彭城而之越棄玉几硯會稽之水又南則為黃公墓黃公赤刀厭虎厭不行為虎所食者也夫昌國本禹貢島夷後乃屬越曰甬句東越王句踐欲使故吳王夫差居之然不至也海中三山安期羡門之屬或避秦亂至此方士特未始深入或云三山在水底或云山近則風引舟去蓋妄説也東土人士每愛會稽山水故稱入會稽者為入東甌抱朴子亦云古仙者之樂登名山為上海中大島嶼如會稽之東翁洲者次之今昌國也是年秋八月自昌國回姑蘇山海竒絶處明昔人之不妄時一展玩宗少文遊卧不是過矣鄞縣義役記元黃溍浙水東州縣隸慶元大府者六所入田租鄞以一縣當其什五諸名額及非時之需稱是取民為最夥縣在巨海上為浙東一都會牧伯守將若他司以轉漕市易鹽策之利有事於海者悉涖治其處一切趨辦用民極繁富者巧自避匿貧者日削而弗繼吏鰓鰓焉惟期會之或後為懼而公私交病矣天台周君之為丞也會國家申嚴役法其豪右以他名數自占者毋敢弗與周侯進父老教之為義役於是縣西五十里林村之民次當受役者三十有五家相與謀眂物力之厚薄各捐已槖得錢七千五百緍為子本推執事者五人日詣有司以聽徴令歲終則更休焉既條上於縣周君合長佐白狀大府而定其要因庭酌父老以為衆勸旁鄉比井爭慕為之其致力也均其待時也易姦胥悍卒不得舞手其間而民忘為役之勤後周君以秩滿去父老過豫請曰願有繼庶嗣為政者知相之俾後人毋棄其成也昔孔子稱子産使民義夫義也者固古之所以使民也今田里之人不愛其力相率以聽於有司而為義役非上之人以義使之而能然乎是蓋子産所以為鄭而孔子之所與也其孰得而廢之可托以永久者有不在豫文矣周君名仔肩延祐五年進士來以七年二月而義役行於至治元年正月其去以三年三月云傅氏義田記元黃溍烏傷北鄙有義門傅氏長曰某過豫言曰家合族而食五世矣故有田四百畝以羣從子姪之蕃衍也歲率用八畝之入食一人而籍其餘以給賓祭百須之費吾懼夫久且弗繼也吾竭吾私焉得田若干别儲其入為子本而權其竒贏俟他日更購田以附益焉是不可無告來裔以成吾志惟子也請嗟乎義之名孰從生乎親親仁也因時制宜義也禮之所由起也蓋豫聞之古之制禮者為之井田以同其利為之比閭族黨以均其安夫然後教以急相賙喜相慶死喪相恤疾病相養猶患其未足以勸親親也於是有宗法焉服窮於緦而同姓殺於袒免是以祖遷於上宗易於下戚也而日以疏勢也繫之以姓而弗别綴之以食而弗殊則是踈可使戚其所因者本也循其勢故教易行逹其本故道可久聖人惡有術以強之哉大雅曰飲之食之君之宗之王者之大政也田制壞宗道廢仁人孝子不得由乎先王之禮之大而各以意行之假區區生養之具以收聖人之所不能合夫亦有取其義云爾充其義而仁不可勝用也記曰一家仁一國興仁一家讓一國興讓在乎勿替引之書之俾刻諸石豈非望以扶吾義於百世而弗墜者耶旌異之實存乎舊記條約之凡具於碑隂兹不書永嘉縣重修海隄記元黃溍溫為郡俯瞰大海江出郡城後東與海合直拱北門枕江為亭榜其顔曰四時萬象有候館在焉使指所臨長吏迎勞無虛日亭之西為市區百貨所萃江滸故有大石堤延袤數千尺舍舟登陸者阻泥淖不得前俗於隄之旁為石路外出以屬於舟次為馬頭二一以俟官舸一以逹商舶先是江水遏於沙洲由江心寺之西逆流而上勢奔突莫支隄數毁繕治之費公私交病至順二年秋水暴溢括蒼山中被郡境颶風激海水相輔為害隄傾路夷亭隨仆永和鹽食倉亦圯水怒未巳且將破廬舍敗城郭縣尹趙君大訥謂是不可緩議興作俾大家之役於官者分任其事或輸以財或薦以力經畫勸相則身親之以潮汐之盈縮有時投其隙而賦功列巨木為柱而設栿柂其上內攢衆木圍之三周外施其芒以潑浪次填以石次積以瓦礫而實土其中加橫木焉備其欹仄帖石其背以便行者隄若路暨亭之址悉如之而亭亦復其故始事於三年之春二月訖役於冬十一月費不益於舊而功倍焉伻來乞記其歲月溍惟春秋之法有直書其事具文見意者敢竊取斯義敘次梗槩不敢襲近人之記事謬為謏言以亂其實續郡乘者尚有考於斯西湖書院義田記元黃溍昔天下未有學惟四書院在梁楚間今江浙行中書省所統吳越偏州下邑無不立學其為書院者至八十有五大抵皆因先賢鄉邑及仕國遺迹所存而表顯之不然則好義之家創之以私淑其人者也獨杭之西湖書院實宋之太學規制尤盛舊所刻經史羣書有專官以掌之號書庫官宋亡學廢而板庫具在至元二十八年故翰林學士承旨徐文貞公持部使者節治於杭始崇飾其禮殿奉西湖向所祀三賢於殿之西偏以其建置沿革之詳逹於中書畀書院額立山長書庫官之所掌悉隸焉顧所贍之田皆薄瘠且逺在他州縣富歲所輸猶多不登營繕廩給之須或匱乏弗繼安有餘力及其書也郡人朱慶宗以二子嘗肄業其中乃捐宜興州泊陽村墟田二百七十五畝歸於書院遵著令減其租十二為米一百三十二石别儲以待書庫之用凡書板之刓缺者補治之舛誤者刋正之所未備者增益之主教既白於儒臺而轉聞於憲府俾有司蠲其田之徭役慮後人昧於所自而墮其成規徴豫文為記昔蘇文忠公記李氏山房藏書以為物之悅於耳目適用而不敝不竭隨人才分求無不獲者書耳李氏於書既取而用之書固未嘗少損也夫可悅適用使傳刻者歲久而嘗無弊則摹造者日益廣而豈有竭哉向之書院若白鹿洞嶽麓非朝廷所賜無以得書今以布衣而垂意學校不患居不崇食不廣而患書之不完此仁者之惠也學者宜無求不獲玩味其英華而究極其根柢蘇公歎古人得書之難而其學非後世所及後世書易著而學者益以茍簡蘇公書院之先賢顯誦其説而推明之以為記以勸夫束書不觀而遊談無根者湯氏義田記元黃溍湯氏為龍泉巨族宋岐國公思退以文章致位宰相族益著岐公伯祖大中大夫稻後九世為武翼大夫節武翼生望以父蔭讓其弟有子曰鏞字伯韶年十三德祐失國遂隱不仕人稱之曰石屋處士處士混迹民間為生産業家茍完自奉甚薄樂振人之窮急謂仁民始於親親乃置義田以瞻族為田二百畝歲可得榖四百石擇族人亷謹而有幹局者任其出納月給人五斗有喪者二石葬半之産子者一石再有子倍之始入學與錢三十緡嫁女如入學之數娶婦減三之一七十者歲帛一匹能自業者弗預不知檢飭而有過者罷之大約倣范文正公成規而微有損益范公有此志三十年暨臨方面踐政迹位充祿厚始克終其志岐公方貴顯未及為而處士以布衣為之難矣嘗觀三王之民皆有常業飲食服用之需不必仰於人公卿大夫所受田祿有差等不得過其制安所取羡田以為賙恤之資若夫合族之道又非衣食之謂也今田制宗道廢已久矣有能以義起而崇其恩愛於服窮親盡之餘不愈難哉處士君三子長濱次溱次京溱先卒濱與京是繼是逑弗懈益虔京不逺數百里走錢塘求豫書其事於石此固豫之所喜聞而樂書者處士君之言行前進士葉峴已銘其墓兹不復云均役記元余闕古者井天下之田以授民民百畝一易者倍之再易者再倍之其養均也則九壤成九賦園廛二十而一近郊十一逺郊二十而三甸稍縣都皆十二其取之又均也小任以力則上地家五人中地家三人下地家二人大任以兵則比為伍閭為兩族為卒黨為旅州為師鄉為軍其役之又均也兹三者王政之大端也大端具而又為之刑政以防民情為之學校以道民性為之公卿大夫士以登民材其制詳故不亂其本深故不拔是以商周之世皆七八百年而後衰也自經界廢於是田不在公而養不均矣養不均則土會民數皆不可知而賦與役不均矣養與賦與役之不均雖周公為政不可以言治也浙東古於越之地也其地之媺無甚貧甚富之家山谷之間有一畝之居十畝之田者祖孫相保至纍世不失又其土瘠故其小人勤身而飭力其君子尚朴儉而敦詩書非若吳人之兼并武斷大家收榖歲至數百萬斛而小民皆無蓋藏此固易治之地有賢師帥為之制而導利之其可以庶幾矣乎然余嘗行郡以觀民風其庶人之役於官者往往閭左之民也而富人則有田而不役甚者或不以征歲終保正稱貸而輸之至破産者無算此其田雖近於均而役則不均也至正十年秋藁城董公來長越憲省民所疾苦乃曰井田者吾雖不得而行而役不可不均也於是擇其部吏之清強者委之以事以衢州路經厯王仲謙西安縣主薄張拜珠治金華青田縣尹葉巴延治武義永嘉縣丞林彬祖治永康而蘭溪逹嚕噶齊克哷蘇義鳥縣逹嚕噶齊額琳沁浦江縣逹嚕噶齊廉額哷布哈東陽縣丞蔣受益自治其邑義烏縣則復以衢州路録事范公琇為之輔而總管陳巴延布哈總領之先期一月令民及浮屠道士各以田自占其或蔽匿及占不以實者沒其田令既浹乃保以一正屬民履畝而書之具其田形疆畝主名甲乙比次以上官官按故牘而加詳核之曰魚鱗册以會田别為右契豫民使藏之曰烏册以主業其征之所會曰鼠尾册以詔役凡役弓兵隸卒鋪兵為至勞坊里正主首次之館夫步夫又次之凡民田多者役其勞少者役其逸又其少而不足役者則出錢以助竒田不助者則以待夫不虞之役其一人而有數保之田者各役之即賣其田則買者承其役凡一州六縣之田二萬六千四百二十四頃四十九畝役者一萬二千六百六十八名故役而今復者四千三百名所未役而今役者三千四百六十名役而不復者周而始役之册成一留縣一藏府一上憲司於是野無幸民公無逸征強弱有倫賦役有經上下和洽歲以有年蓋公之遇人有禮故吏盡其力其使民有義故貧者戴其德而樂其役富者服其公而忘其勞以故為是大制政不肅而成民不擾而治也傳曰天地養萬物聖人養賢以及萬民公之是舉兼禮與義則誠賢者矣繼今之人毋替公政或推其所未及則越之民樂樂利利其福豈可既哉故於終事也其下咸願刻石以示不朽以闕嘗陪其末議而知其梗概遂來屬筆焉至正十一年歲次辛卯十二月記活水源記明劉基靈峰之山其上曰金雞峰多竹木其鳥多竹雞如雞而小有文采善鳴寺居山中四面環之前曰陶山華陽外史𢎞景之所隱居其東南曰日鑄峰歐冶子之所鑄劍也寺之後薄崖石有閣曰松風閣奎上人居之有泉焉其始出石鏬涓涓然冬溫而夏寒浸為小渠冬夏不枯溢而西南流伏行沙土中旁出為四小池東至山麓瀦為大池又東注於若耶之溪又東北入於湖其初為渠時深不踰尺而澄徹可鑒俯視則崖上松菊花木皆在水底故祕書卿白野公恆來終日坐水旁名之曰活水源其中有石蟹大如錢有小鯖魚色正黑居石穴中水鼠常來食之草多水松菖蒲有鳥大如鸜鵒黑色而赤觜恆鳴其上音如竹雞而滑二鶺鴒恆從竹中立石上浴飲畢則鳴而去豫早春來甚寒諸水族皆隱不出至是悉出又有蟲四五枚大如小指狀如半蓮子終日旋行水面日照其背色若紫水晶不知其何蟲也豫既愛兹水之清又愛其出之不窮而能使羣動咸依宜乎白野公之深愛之也魚樂軒記明劉基至正癸巳鄱陽程邦民以進士授官判紹興之餘姚州明年春奉府檄至郡理鈔法及賑濟事寓永福寺之東軒東軒者上人善啓之居也其廣不盈丈而有花木竹石可玩軒之前甃石為小池有魚六七十頭皆長五六寸赤鱗錦章出入蕰藻中悠悠焉或沫或翔或吹或漚或施而漣與與焉不啻如處江湖而乘秋濤也程君觀而悅之命其軒曰魚樂之軒或難之曰詩不云乎魚在於沼亦非克樂今此無乃迫於沼而非魚之所樂乎程君曰吁果然哉子見其一而未見其二也夫惡憂患而樂無害物之同也性遷於習習慣而樂生焉豈惟魚哉野鳥之處籠中其始至也憧憧焉聞聲而躍見動而惕不能須臾生也及其久而馴也則雖舉而之野縱之而不逸驅之而不去徘徊盤旋恐違其所離之則悲以鳴狂顧疾赴焉於是籠為其家而樂在是矣夫山野之優遊豈不勝樊籠之局促哉彼既習而耽之矣我局促而彼優遊又烏得不樂哉今夫汙澤之間數罟不禁繒網如雲鮫人蛋夫鼓楫生風猿獺鶖鶬鶩鷺成羣利觜長骹沒淵泉撇波濤無隱弗留鯤鮞登於庖厨鯫鮮殈於胎卵患害日至而無所避優遊云乎哉則又曷若處此之為樂也難者無以應遂書其言以為記吾思程君言魚之樂皆指民之樂以為言也不見孟子之言淵魚叢雀乎程君知治道矣凡為民社者當思程君之言深居精舍記明劉基深居精舍者雲門廣孝寺上人浮林公退居室也上人名允若字季蘅以文行聞於時賢士大夫無不與交深居去雲門十里初入溪口有竒石拔起沙水中狀如折柱下如伏獸名曰釣臺其石鏬皆有樹自釣臺泝溪色湛碧兩岸皆粳稻風過之其香菲菲然有三山鼎足立如三獅子九墩錯其間為九毬深居在三獅子中其背曰柯公山山上有潭潭中有白龜有龍作雲雨歲旱禱輒應其右曰化塵山相傳葛稚川既化為仙有木几亦化為鹿其外山曰秦望其左山曰木禾木禾視羣山為最高其前山曰鵝鼻峰高與木禾等峰頂大石突起望之如鵝鼻大海在鵝鼻東北其上有秦碑今亡之矣鵝鼻北下小山曰望秦秦望在望秦北又北曰天柱曰玉笥又東北為陽明山是為禹穴其下惟湖豫既至深居與浮休公語極相得又愛其有美木水石花竹且靜僻無妄人迹雖隆暑不汗因留八日既出而心恆思之松風閣記明劉基風雨露雷皆出於天雨露有形風霜無形而有聲然風不能自為聲附於物而有聲非若雷之怒號訇磕於虛無之中也惟其附於物而為聲故大小清濁可喜可愕悉隨其物之形而生土石贔屭雖附之不能為聲谷虛而大其聲雄以厲水蕩而柔其聲􅍅以豗皆不得其中和使人膽駭而心驚獨於草木為宜而草木中葉之大者其聲窒葉之稿者其聲悲葉之柔者其聲懦是故宜於風者莫如松松之為物幹挺而枝樛葉細而條長離竒而巃嵸瀟灑而扶蘇鬖髿而􅌑瓏風過之不壅不激疏通暢達有自然之音聽之可以解煩黷滌昏穢曠神怡情恬淡寂漻逍遙太空與造化遊宜乎山林之士樂之而不違也金雞之峰有三松焉不知其幾百年矣微風拂之聲如暗泉颯颯走石瀨稍大則如奏雅樂大風至則如揚波濤又如振鼓隱有節奏方舟上人為閣其下名之曰松風之閣豫嘗過而止之洋洋乎若將留而忘歸雖在山林而去人不逺夏不苦暑冬不酷寒觀於松可以適吾目聽於松可以適吾耳偃蹇而優遊逍遙而相羊無外物汨其心可以永日又何必濯潁水以為清登首陽以為高也哉豫四方之寓人也行止無定所而於是閣不能忘情故將與上人别而書此以為記至正十五年七月九日也孝友堂記明劉基堂曰孝友敦人倫也陶君忱仲及其子凱俱有孝友之行於是臨川葛元哲請以孝友名其堂按書言君陳惟孝友於兄弟詩言張仲孝友是皆天子大臣不舉其事業而以孝友稱之蓋以修身齊家為治國平天下之本也故曰其為父子兄弟足法而後民法之孝友者所謂懿德之首與陶君台之臨海人舊為巨室生八年而母卒繼母弗能愛長娶吳氏相與謹事母母終不容乃與妻出居於外力勤苦織績以為食朝夕入定省弗曠父與繼母自治産食不使君與聞久之家日匱父且老繼母所生弟妹無以具婚嫁君乃迎父及繼母於己養以其資為弟娶婦嫁其妹咸得所由是繼母大感悔門庭之內穆穆如也吳氏早喪父其母沈無以養君亦迎養以夀終凱讀書有文行為貧以經學教授子弟四方來從者甚衆故得以其束修之入佐父治喪葬供祭祀悉如禮上世墓域有奪於世家者咸贖而表之凱一妹適顧氏早卒凱為育其子及女以成人鄉黨之稱孝友莫不曰陶氏父子士大夫又皆為歌詩以詠之於是栝蒼劉基既敘其事復為之言曰詩不云乎民之秉彝好是懿德孝友在人心而民鮮能者欲昏之也世教既衰彝倫攸斁於是有借耰鋤而德色取箕帚而詬誶者况敢望其奉不愛己之父母於艱苦之餘哉又敢望其施及異産之弟妹哉若陶君者可謂能盡孝友之道矣君陳張仲以孝友施於政陶君無位不得流澤於民獨行於家其子又克類天將昌陶氏乎子類父孫必類子繩繩不絶能無昌乎善之有後天之道也凱字中立今之鄉貢乙科為豐縣教諭與豫善敦睦堂記明宋濓黃巖之西三十里有灃水灃水之上大姓張氏有堂曰樂善諱遂者屬其子光祖與璣為歲時合族之所諸孫奎等五人謹守之不敢廢元至正壬辰堂燬於盜越二十六年為國朝洪武丁巳奎之子昭與羣從兄弟謀以為自斯堂之廢親義踈而友悌乖將始諸此可不亟圖乃各出錢粟合作同謀弗怠弗息越明年堂成既行會族之禮更名其堂曰敦睦大學生升遂來徴豫記昔者先王盛時制民之具至備為井田以聯其心為鄉黨州閭以同其俗為學校以化其暴戾而興起善良又有月書歲考之法以糾其不率教者而取人之際又必察其孝弟姻睦之行以為儀表故當時比屋鄰井之人喜相慶戚相弔疾病患難相賙恤如至親然脫有災禍非常之事狠虐不軌之人親戚鄰保隨而撲滅之故其時天下無亂民以百姓皆相親睦故也世逺法隳人自為家鄉自為俗甚者兄弟父子不通假貸憂喜不相慶逸樂不同情事觸於中則勃然操戈而相逐父不能禁其子兄不能戒其弟末世之亂多起於此非民性頓異於古也制民之具蕩然耳制民非無位者所得為有志之士能化其族睦其鄉豈非善學古人者乎若張氏近之矣賢人君子豈必假位以行道居乎家而使同姓之親知禮讓而不爭勉於學篤於行頑嚚化為純慤愚昧不失天性是即道之推也豈細故哉張氏子孫多賢能其鄉咸稱之他日東海之邑聞有民俗淳厚如鄒魯者必張氏之所化也姑記其堂以俟焉金華張氏祠記明宋濓金華縣東三十五里曰苓塘山川相繆而風氣鬱盤著姓張氏世居其中有諱隆者字亨仲宋建炎初自睦來力本為務家浸穰生三子子政子中子成皆能紹前業子中之子文華倜儻尚竒行鄉端明學士王公野器重之淳祐末公遷沿江制置使僻為屬辭弗赴後三子遺引日滋遂成三大族出仕者以文墨議論著於時退修於家者循循雅飭無愧士君子之行六世孫榮為一家之長慨然嘆曰吾儕永藉先祉以至於今有闔廬以禦風雨有絲枲膏梁以為差服而先祖妥靈無其所不亦背乎與族弟力謀之子姪中留鎮琮侣四人即捐所居之廳事三楹以為之倡榮遂加以塈茨繚以垣墉列以龕櫝祭享百須之器莫不精良中奉府君旁以三子侑食世逺屬疏不敢用四仲祭惟據朱徽公所定祀先祖之儀以立春物之始生陳器具饌而行三獻禮月旦望序三族之散處乎東西不能以皆至惟正月朔旦無小大咸拜於祠下復會拜别室以敘長幼祭田若干畝俾三族輪掌其租入以供祀燕始事於至正乙巳之冬迄功於丙午之春榮率宗人數千指皆沐浴盛衣冠入奉明薦牲酒潔清執事嚴恪進退周旋蹌蹌濟濟觀者咸悅以為一邑之所未覩竣事遣其孫愈來徴文濓聞先王制為祭祀之禮上下隆殺有常典非可罔行然其親親之仁出於物則民彝不以貴賤而有異也榮能以義起禮使子孫不忘所自出管攝人心聚合宗族實於是乎在非仁人孝子之用心哉嗚呼人孰不本於祖方其封殖自厚溯所從來則曰吾不知也問其薦奠之禮則曰我未之能行也其於報本反始之禮安在視榮之所為應愧赧無地矣三族之人尊榮法其懋敬之哉經畬堂記明宋濓聖人之言曰經雖不皆出於聖人而聖人所取者亦曰經經者天下之常道大之天地之理性命之原君臣內外之等微之鬼神之情狀氣運之始終顯之政教之後先飲食衣服器用之節冠昏朝享喪祭之儀無不畢載而其指歸皆不違乎道而可行於後世是以謂之經易書春秋用其全詩與禮擇其純而别其偽故皆曰經論語固聖人之言孟子以大賢明聖人之道亦謂之經其他諸子正不勝譎醇不逮疵烏足以為經哉自漢以降聖賢不作異説滋橫小道詭異藝術之言皆以經名千餘年間時益歲加書之以經名者布乎四海之內學者眩乎其名趨而陷溺焉者甚衆而五經孔孟之道晦矣然非彼之過學五經孔孟者不能明其道以見諸事功之過也夫五經孔孟之言唐虞三代治天下之成效在焉小用之則小效大用之則大效豈止空言而已乎世儒不之察顧切切然剽攘摹擬其辭為文章以取名譽雖以韓退之之賢誨勉其子亦有經訓災畬之説其意以為經訓足以為文章之本而已不亦陋於學經矣乎學經而止為文章之本亦何用於經乎以文章視諸經宜乎陷溺於彼者之衆也吾所謂學經者上之可以為聖次亦不失為賢以臨大政則斷以處富貴則固以行貧賤則樂以居患難則安逹以為生民窮則法後世豈特學其文章而已乎錢唐錢君質敏好學取退之經畬之言名其齋會余過郡造旅邸徴文甚力余美其志恐泥退之之言也推其道以告之使求夫大者焉見山樓記明宋濓見山樓者上虞魏君仲逺所建也仲逺居縣西四十里其南如龍委蛇走將升而復翔旁支斜徑而西則為福祈諸峯若車若旌若奔馬若渴鹿飲泉不一而足勢之下降為隂阜為連坡為平林一奮一止復襟帶乎後先東則遙岑隂見青雲之端宛然娥眉向羣山嫵媚為妍其下有巨湖廣袤百里汪洋浩渺浸乎三方晦明吞吐朝夕萬變方屏插起湖濵曰夏蓋山去天若咫尺巖峙谷張尤可愛玩誠越中絶勝之境也仲逺心樂之以為非高明之居不足以攬精華而納爽氣於是構斯樓日與賢士大夫同登壺觴更酬吟篇疊咏神酣意適搴簾而望逺近之山爭竒獻秀晴色含青雨容擁翠遙指邀呼儼若次第排闥而入使人涵茹太清空澄碧素直飲驂鸞翳鳳招偓佺韓終翩然被髮而下大荒也伻來俾濓記之夫自辛卯兵興所在為灰燼狐狸晝舞鬼磷宵發悲風翛然襲人為之咏慨自非真人龍興撥世亂而反之正含齒戴髮之氓孰不在枯魚之肆哉縱有佳山不暇見之今仲逺得雍容於觀眺之際亦曰帝力難名爾昔太常博士施侯作見山閣荆國王文公為記其事謂吾人脫於兵火洗沐仁聖之膏澤百餘年而施侯始得以樓觀自娛仲逺之去亂離僅三四載乃能抗志物表修故事如承平時無他皇化神速非前代所及雍熙將覃及於海內是樓之作其兆之先見者歟欲不為之記不可得也第濓之學識繆悠言無精魄不足以傳逺尚求荆國其人而為之庶樓之勝槩與雄文雅制同為不朽耳仲逺名夀延鄭國文貞公二十四世孫羣從子姓皆彬彬嗜學文章巨公多集其門仲逺尤號翹楚且工於詩蓋聞之丹涯先生云龍泉義孰記明宋濓至正十三年九月括蒼章君溢建龍淵義孰成龍淵即龍泉避唐諱更今名相傳其地即歐冶子鑄劍處至今有水號劍溪山深而川阻與通都大邑相去二三百里近亦半之鄉閭子弟無所於學章君之先世謀創桂山仙巖兩書院以無恆産而廢章君深憂之與諸子計曰無田是無孰也奚可哉遂撙節凡費而用其餘斥田至一百五十畝其妻黨陳京兄弟聞之以曾大父適齋先生所遺二百三十畝來助章君曰吾事濟矣乃於官山之隂創燕居以奉先聖而先師為配春秋行釋菜之禮旁列四齋曰遜敏曰知通曰敬樂曰博約以居弟子員後敞敬義堂月旦望鳴鼓集士以申五倫之教建大門榜曰龍淵義孰甓其修塗以逹於東西灌木嘉篁前後鬱然聘經明行修之士以為師諸生業進者月有賞才潁家單不能裹糧者資之不率教者罰之田賦出入主孰事者司焉日用有籍月考朒贏歲二會其數有餘則他貯益斥田以廣其業石華象漢二所復設别孰以教幼者俟其長乃赴龍淵浙江行省參知政事舒穆嚕公聞而嘉之檄本郡免其科繇俾無有所與章君既列條教刻諸石懼來者不能保也伻來俾濓記之惟古之建學也雖為制有大小之殊而所以導民扶世者則一龍泉舊為浙東文獻之邦水心葉氏正則西山真氏希元後先以學鳴聲感氣求籟鳴機動掇巍科而典雄藩者聲華相望一時文物固盛矣未及百年而繼者鮮豈俗尚有古今之異哉亦係乎學之盛衰耳章君有見於斯不效時俗封殖吝固以為肥家計其立志甚𢎞而為功甚溥陳京兄弟樂善好義以助其成非適齋涵濡之澤亦豈能至於是哉章君子若孫不負章君之義孰可相傳於無窮已蜀墅塘記明宋濓義烏縣南四十里有塘曰蜀墅周圍三千六百步東西北皆岸山山水合七十二派入於塘而南出南有蜀山突然中起因據山作隄障水以溉田山之東隄修七百尺有竒廣殺修五之四深殺廣三之二西隄修如廣之數而稍加強焉隄之中刳木為三竇以泄水溉田至六千畝而贏至四年夏暴水壞隄田遂不稔丹溪朱君震亨憫農之告病也白於縣縣尹周侯自強命雙林巡檢張某來視役震享盡召有田之民履畝而輸其力薦貨有差復出役夫之工一千以為衆倡衆悅一聽震亨經畫補其缺遺增以崇高築址加濶而漸殺其上隄之西陲鑿石為斗門視水溢乾而時蓄泄之門之上架徒杠以便行者易木竇以堅石且定為高下之穴使欲水者先後有程而不紊恐歲久而弗固也請於掌堂事者中折鬻魚之利而嗣葺之用錢四千緍夫一萬工經始於五年八月庚申踰三月而告成里耆朱仁傑等來謂濓曰震亨之興是役也初無一弓之田以徼利其夙夜盡瘁而不舍者欲利吾農也我不敢忘願吾子記之濓聞海陵胡公瑗之在湖學也置經義治事之齋教授諸生至水利之屬無不習而通之故其門人皆適於大用今震亨之學出於金華許先生謙先生六世祖實從海陵遊其家學相傳至先生為尤盛宜吾震亨見諸行事有可觀哉世之人方高談性命以聾瞽俗聽之若有為一遇小利害輒顛倒不知所措視震亨無所為而利民何如也震亨字彥修有長才縣嘗下括田之令惟震亨行之無擾云清風樓記明王褘金華枕山帶溪以為城按郡志金華山一名長山其高幾千百丈綿亘數十百里當其陽有峰拔起卓特而圓粹曰潛嶽亦曰芙蓉峰由峰之址支為羣岡蜿蜒散出南走二十里屬於溪郡城在焉溪從烏傷武義兩縣來止城下合而西流世謂雙溪城東南隅岡之旁出者其石角立勢若與溪鬭城據其上撱以旁出直城之陬上構重屋所謂清風樓也指揮使徐侯居鎮之三年威行令孚軍政寧輯於是覽視城壁占形度勢而樓作焉其崇五十尺為楹間者五取工於卒之在更者取材於木之在官者不閲月而告訖邦人士女第見修甍穹棟傑立翬飛上出雲霄莫知經費所從出也既成侯與賓客登而樂之前山如屏障擁青排紫拱列几席溪流若碧練迤邐環繞於履舄之下百里內聚落煙火草原林木田疇桑麻禾稼之屬舉目可盡清風徐來襟度曠爽令人有超世之思故取唐嚴維詩語名之曰清風郡城之南有樓曰八詠其東故有明月樓又東而為清風爭雄競勝而溪山之概攬挹無遺矣侯年方壯而好學有功不伐樂從賢士大夫遊俾余為文以記之余聞君子之為樓觀之美也豈徒取夫遊覽之適以為樂哉登斯樓也念王事之重覩民生多艱有不勝慨然者昔范文正公記嶽陽樓以為先天下之憂而憂後天下之樂而樂此固侯之志也遂書以為記擁翠樓記明貝瓊四明之奉化依山為縣而處士汪公幼海由城西徙家縣治東三十武與山相接也猶病其蔽於崇墉不能周逺近之勢復即後圃建小樓為登眺之所大山橫亘於南者玉几第一寶麓次之其西則為石棋盤而鯉湖在石棋盤西五里絶嶺有神龍居焉諸山皆環拱於几席之間矣東有長汀七十二曲如巴蛇赴壑束鱗蹙節宛轉而不得肆世傳唐葉命龍所開以泄水於海也益東三十里有山曰金鵝衆水滙於東南為龍潭潭之上峭壁千尋類屏風者曰南山轉而北望則青錦嶄然與玉几對峙一名蓮花巖諸山又錯出於忩戶之外矣觀其或起或伏或前或却爭竒獻秀不啻海濤湧而石筍列終日玩之不厭廣平舒汝臨為題曰擁翠而曹南吳主一書之馳書京師求豫為記余唯晉謝靈運好山日事遊放至伐木開徑窮竒觀是有山之癖而未得其趣也今幼海但據其要領而闔境之勝畢效於一樓秋高木脫霜霽天空延朝景之飛雲送夕陽之歸鳥山之翠於甌越者無盡而吾之趣亦無盡遺於昔而見於今固有待於其人乎不可以不志追逺堂記明貝瓊追逺堂者天台林氏奉先之所也按林氏始祖十一府君諱勳者五代時以鹽鐡使轉督台州諸軍事遂由閩之長溪徙家於黃巖半嶺其後枝葉益繁散處梅溪團浦宋設科目一歲聯中有司者八人曰雪村曰勿齋曰曉庵皆以能文稱故江以南衣冠大姓必推天台林氏焉至六一學正言吾宗族之大非一人一世之積於是乎築堂梅溪置主其中歲祀之會族人子弟講尊卑長幼之序割田若干畝給其費有女以疾不嫁者益以田四百畝其孫國子生伯雲懼泯其實也求豫為之記余唯祭者所以追逺繼孝也自祖禰推而上之有曾祖又推而上之有高祖然非止於是而已譬之水千盤百折以逹於海然窮其源河不始於龍門積石而出於崑崙江不始於漢而導之岷山水未有無源而出者人未有無祖而生者惟屬之近而有服者其恩隆屬之逺而無服者其禮殺有能追而祭之不以逺近為隆殺豈非厚之至乎特古者限於先王之制大夫有廟無主士則祖禰一廟庶士庶人無廟而鬼上下之分截然而不得踰者故孔子曰祭之以禮曾子追逺之言蓋為有國者而發使施之所祭必盡吾誠非謂庶士庶人得祭祖禰以上而及於無窮也君子於此制雖不得為而心實不能已於是伊川先生以義起三祭之名而初祖先祖與禰各有其類得受祭焉林氏相傳四百餘年源深流長如此而子孫能合雪村勿齋曉庵以及十一府君而伸其敬可謂知本矣是皆率性之道篤於所尊所親豈強之而然哉故重其請而記之觀者亦有所警於中尚革薄而之厚也夫溪雲草堂記明貝瓊溪雲草堂者海昌郭子方之新居也海昌在崇德南崇德之水禦溪介乎二境之間旁流又折而南行六七里上有桑稻之村居人星布雞犬相聞倣佛在物外子方擇其勝處構堂若干楹左為讀書之室右為煉藥之居遂題之以溪雲余嘗放舟過之道狹而迂僅一帶耳魚鱉之所居科斗之所儲疑其不能為雲類山川之有神靈者方時將雨渤渤然上蒸如煙如霧如海濤披覆兩崖不見林木而漁篷野艇或隱或見在空濛中此其第一曲也及沿流以窮其所至則雲之見於朝夕者尤蓊鬱非一狀執之而無從玩之而不得排於前而復合於後斷於上而復續於下凡廬之籓籬皆雲也忩户皆雲也雖騰於山川者殆無以過休坐之頃塵埃野馬弗至吾前並溪之人未有知者子方專而有之喜余之至因觴於堂上求文為記遂書所見如此復思天下之物本於無而形於有有者卒歸於無矧雲之忽起忽滅往來無定哉彼既強名之余強言以實之非通於理矣惟其隨時而莫知其神澤物而莫知其德君子宜取之以得卷舒之道焉則與雲為一矣子方尚勉之浙江通志卷二百六十一
