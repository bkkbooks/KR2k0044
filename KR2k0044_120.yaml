body:
  text: 浙江通志卷一百二十一職官十一國朝職官姓氏文職總督部院張存仁遼東人順治二年以總督職銜撫浙劉清泰遼東人順治五年任陳錦遼東人順治五年任佟代滿洲人順治十二年任李率泰滿洲人順治十三年任趙國祚遼東人順治十五年任趙廷臣遼東人康熙元年任劉兆麒直𨽻清苑人康熙八年任李之芳字鄴園山東武定州人順治丁亥進士康熙十三年任施維翰字及甫江南上海人進士康熙二十二年任二十三年改為福浙總督自後皆福浙總督王國安奉天蓋州人康熙二十三年由浙江巡撫陞任王隲山東人順治乙未進士康熙二十七年任王新命康熙二十八年任興永朝康熙二十九年任朱𢎞祚山東髙唐人康熙三十三年任郭世隆康熙三十五年以直𨽻巡撫陞任金世榮康熙四十四年以福建將軍調任梁鼐陜西人康熙四十六年以福建提督調任范時崇奉天瀋陽人康熙四十九年任覺羅滿保滿洲正黃旗人康熙甲戌進士康熙五十四年以福建巡撫陞任髙其倬字章之漢軍鑲黃旗人康熙甲戌進士雍正四年以雲貴總督調任李衛字又玠江南徐州人雍正五年以浙江巡撫加兵部右侍郎特授浙江總督管巡撫事六年加節制江南七府五州七年加陞兵部尚書晉太子少保仍管巡撫事務李燦字馥郁山東濟寧人康熙癸未武進士雍正九年以江南崇明鎮總兵官署理程元章字冠文河南上蔡人康熙辛丑進士雍正十年以江南安徽巡撫陞授浙江總督兼兵部右侍郎管巡撫事郝玉麟字敬亭漢軍鑲黃旗人雍正十二年以福建總督仍改為福浙總督加陞兵部尚書兼都察院右副都御史巡撫都察院張存仁順治二年以總督撫浙蕭起元遼東人順治三年以右僉都御史任秦世禎遼東人順治十一年以右僉都御史任陳應泰奉天蓋州人順治十三年以右副都御史任佟國器遼東人由拔貢順治十六年以右副都御史任史記功遼東人監生順治十七年以右副都御史任朱昌祚滿洲籍山東髙唐人順治十八年以僉都御史任蔣國柱奉天人由唘心郎康熙三年以工部尚書兼右副都御史任范承謨奉天瀋陽人順治壬辰進士康熙八年以右副都御史任田逢吉山西髙平人順治乙未進士康熙十二年以兵部左侍郎兼右副都御史任陳秉直奉天襄平人貢士康熙十四年以浙江布政使陞任李本晟湖廣蘄州人進士康熙十八年以右副都御史任王國安奉天蓋州人康熙二十二年以右副都御史任趙士麟字玉峯雲南河陽人康熙甲辰進士二十三年任金鋐字冶公順天宛平人順治壬辰進士康熙二十五年任張鵬翮字運青四川遂寧人康熙庚戍進士二十八年任王維珍奉天錦州人康熙庚戌進士二十三年任線一信奉天寧逺人正白旗廕生康熙三十五年任張勄字敬止奉天遼陽人正黃旗廕生康熙三十七年任張志棟山東昌邑人康熙癸丑進士三十九年任趙申喬字松五江南武進人康熙庚戌進士四十一年以浙江布政使陞任張泰交山西陽城人康熙壬戌進士四十二年以江南學院陞任王然字子可順天宛平人官生教習康熙四十五年任黄秉中奉天人康熙四十八年任王度昭山東諸城人康熙乙丑進士四十九年任徐元夢字善長滿洲正白旗人康熙癸丑進士五十四年任朱軾字可亭江西髙安人康熙甲戌進士五十六年任屠沂字艾山湖廣孝感人康熙甲戌進士五十九年任吕猶龍字爾霖奉天正紅旗人康熙六十一年以福建巡撫調任李馥字鹿山福建閩清人康熙甲子舉人六十一年以安徽布政使陞任黃叔琳字崑圃順天大興人康熙辛未進士雍正二年任法海字淵若滿洲鑲黃旗人康熙甲戌進士雍正二年以江南學院調任福敏字龍翰滿洲鑲白旗人康熙丁丑進士雍正三年署任李衛見前雍正四年以雲南布政使授右副都御史任王國棟字左吾奉天鑲紅旗人康熙癸巳進士雍正九年以刑部右侍郎署理程元章見前雍正十年以安徽巡撫陞浙江總督管巡撫事十二年以總督銜專管巡撫事嵇曾筠字松友無錫人康熙丙戌進士雍正十三年以太子太保大學士兼吏部尚書管巡撫事觀風整俗使雍正八年停差王國棟見前雍正四年以光祿寺卿任許容字季偉河南虞城人康熙辛卯舉人雍正五年以浙江布政使陞任蔡任􅘎福建南安人康熙癸酉舉人雍正六年以浙江糧儲道陞任提督學政王掞字藻儒號顓菴江南太倉人康熙庚戌進士二十四年以右春坊右贊善任周清源字蓉湖江南武進人康熙己未博學鴻詞二十七年以左春坊左贊善任鄭開極字㡬庭福建侯官人順治辛丑進士康熙三十年以右春坊右諭德兼修撰任顔光斆字學山山東曲阜人康熙戊辰進士三十三年以日講官起居注兼翰林院檢討任張希良字石虹湖廣黄岡人康熙乙丑進士三十六年以翰林院侍講任姜橚字崑麓山西保德州人康熙乙丑進士三十九年以鴻臚寺少卿兼刑科給事中任文志鯨字石濤湖廣崇陽人康熙辛未進士四十二年以翰林院編修任靳讓河南人康熙丙辰進士四十三年以廣西學道調任彭始摶字方洲河南鄧州人康熙戊辰進士四十五年以右春坊右諭德兼修撰任吳垣字雲巖河南人康熙乙丑進士四十八年任宋至字山言河南商邱人康熙癸未進士五十一年以翰林院編修任汪漋字荇洲湖廣籍江南休寧人康熙甲戌進士五十二年以侍講學士任馬豫陜西綏德人康熙庚辰丙戌進士五十九年以翰林院侍講任何世璂字坦園山東新城人康熙己丑進士雍正元年以監察御史任彭維新字肇周湖廣茶陵州人康熙丙戌進士雍正二年以右春坊右諭德兼修撰任李鳳翥字紫庭江西人康熙丁丑進士雍正四年以内閣學士任王蘭生字振聲直𨽻交河人康熙辛丑進士雍正五年以國子監司業任顧仔