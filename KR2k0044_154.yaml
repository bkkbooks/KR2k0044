body:
  text: 浙江通志卷一百五十五名宦十金華府晉顔含晉書本傳字宏都琅琊莘人少有操行以孝聞元帝過江以含為上虞令轉主國郎中丞相東閣祭酒出為東陽太守豫討蘇峻功封西平縣侯所厯簡而有恩明而能斷遷光祿勳以年老遜位成帝美其素行就加右光祿大夫范汪晉書本傳字元平雍州刺史晷之孫也桓溫征蜀委以留府蜀平進爵武興縣侯自請還京求為東陽太守在郡大興學校甚有惠政頃之召入頻遷中領軍本州大中正贈散騎常侍諡曰穆子寧最知名羊鑒嘉靖浙江通志字景期濟南人為東陽太守討蘇峻有功徙光祿勳袁宏晉書本傳字彥伯陽夏人為東陽郡守太傅謝安祖之於冶亭臨别執其手顧左右取一扇授宏曰聊以贈行宏答曰輒當奉揚仁風慰彼黎庶太元初卒於東陽王嶠萬厯金革府志字開山晉陽人元帝時任長山令有操行纍官廬陵太守諡曰穆南北朝江斆婺書字叔文濟陽考城人湛之子少有美譽袁粲見之歎曰風流不墮政在江郎永明中以侍中五兵尚書出為東陽太守為人有風格不為權幸降意厯官至太常卿諡曰敬蕭崇之南史蕭景傳景父崇之仕齊官至東陽太守以幹能顯政尚嚴厲永明中錢塘唐瑀之反别衆破東陽崇之遇害天監初追諡忠簡侯王瑩南史本傳字奉光厯侍中東陽太守以居郡有惠政遷吳興太守齊明帝憂勤庶政瑩頻處二郡皆有能名梁武踐阼封建城縣公纍遷尚書令席闡文南史本傳安定臨涇人梁武帝受禪除都官尚書封山陽伯出為東陽太守在郡有能名冬至悉放獄中囚依期而至改封湘西侯諡曰成謝諼萬厯金華府志梁東陽太守秩滿去官送錢一萬止留一百答曰數多劉寵更以為愧伏暅梁書本傳字元曜平昌安邱人高祖踐阼徴為東陽太守在郡清恪民賦稅不登者輒以太守田米助之郡多麻苧家人乃至無以為繩其勵志如此屬縣同時生為立祠王志南史本傳字次道僧虔子為東陽太守郡獄有重囚十餘冬至日悉遣還家過節皆反惟一人失期志曰此自太守事主者勿憂明旦果至辭以婦孕吏人益歎服之天監九年為散騎常侍金紫光祿大夫諡曰安庾於陵南史本傳新野人字子介七歲能言元理及長清警博學有才思永元末除東陽遂安令為人吏所稱梁天監初遷尚書郎待詔文德殿纍遷中書黃門侍郎何逺梁書本傳字義方東海郯人高祖踐阼以武昌太守除名起為鎮南將軍武康令勵亷節除淫祀正身率職民甚稱之太守王彬巡屬縣諸縣盛供帳以待至武康逺獨設糗水而已彬去逺送至境進斗酒隻鵝為别彬戲曰卿禮有過陸納將不為古人所笑乎武帝聞其能擢為宣城太守遷樹功將軍始興內史天監十六年詔曰何逺前在武康已著廉平復蒞二邦彌盡清白政先治道惠留民愛雖古之良二千石無以過也宜升內榮以顯外績可給事黃門侍郎逺即還仍為仁威長史遷東陽太守逺處職疾強富如仇讐視貧細如子弟特為豪右所畏憚在東陽歲餘復為受罰者所謗坐免歸耿介無私曲居民間絶請謁不造詣其清公實為天下第一居數郡見可欲終不變其心妻子飢寒如下貧者及去東陽歸家經年歲口不言榮辱士類益以此多之何炯梁書本傳字士光廬江灊人為永康令以和理稱萬厯金華府志炯臨民寬厚處事有條當時以和理稱民不能忘立祠於霞裏山祀之曰故鄉祠王承南史本傳字安期為東陽太守政存寬惠郡人悅之卒郡諡曰章承性簡貴有風格朱異用事每休下車馬填門有魏郡申英者門寒才俊好言言高論嘗指異門曰此中輻湊皆為利往能不至者惟大小王東陽耳小東陽即承弟幼也唐崔義元舊唐書本傳貝州武城人永徽初纍遷婺州刺史睦州女子陳碩真反遣其黨童文寶領徒四千人掩襲婺州義元將督軍拒戰時百姓訛言碩真嘗升天犯其兵馬者無不滅門衆皆洶懼司功參軍崔元籍言於義元曰起兵仗順猶且不成此乃妖誑豈能得久義元以為然因命元籍為先鋒義元率兵繼進至下淮戍擒其間諜二十餘人詰朝進擊身先士卒左右以楯蔽箭義元曰刺史尚欲避箭誰肯致死由是士卒戮力斬首數百級餘悉許其歸首進兵至睦州界歸降萬計及碩真平以功拜御史大夫顯慶元年出為蒲州刺史贈幽州都督諡曰貞杜暹唐書本傳濮州濮陽人父承志武后時為監察御史懷州刺史暹事繼母孝擢明經第補婺州參軍事秩滿歸吏以紙萬番贐之暹為受百番衆歎曰昔清吏受一大錢何異哉後以功加光祿大夫召同中書門下平章事封魏縣侯諡曰貞孝戴叔倫婺書字幼公潤州人建中間及第以監察御史裏行出令東陽貞元元年奏課為浙東最拜殿中侍御史叔倫去思之碣宋淳熙中移於郡齋于興宗萬厯金華府志丞相于志寧猶子白有司願為親民官以自效補東陽令及蒞官以簡易為治洪少卿萬厯金華府志失名字少卿貞元十七年為蘭溪令以信待物以勤集事賦平人和節度使盧羣嘗稱其如精金百錬良驥千里王仲舒唐書本傳字宏中并州祁人貞元中賢良方正高第元和初召為吏部員外郎出為婺州刺史州疫旱人徙死幾空居五年里閭增完就加金紫服穆宗立召為中書舍人除江西觀察使贈左散騎常侍諡曰成南承嗣萬厯金華府志范陽人霽雲子七歲蔭為婺州别駕賜緋魚袋後厯刺施涪二州服忠思孝無替負荷顧德藩萬厯金華府志大中間為永康令雅志愛民嘗作三堰以防旱潦高堰其一也吳湊册府元龜為婺州都團練觀察使為政勤儉清正美聲聞於朝廷唐書本傳為福建觀察使政勤清美譽四騰黃碣唐書本傳閩人也初為閩小將喜學問軒然有志向後戰安南冇功為漳州刺史徙婺州治有績董昌為威勝軍節度使表碣自副及昌反碣諫曰今不能盡忠王朝乃自尊大一日誅滅無種矣昌怒令斬之及昌敗詔贈司徒五代曹杲十國春秋真定人文穆王時官金華令會婺州兵叛杲以計平之就擢本州刺史忠懿王朝宋杲鎮撫國中即城隅浚三池引湖水入城以通舟楫王歸嘉其功賜池曰湧金立石池上納土後宋授杲威逺軍節度使宋陳靖東都事略字道卿興化軍莆田人太宗以為京西勸農使出知婺州真宗即位列所論勸農事上之復請刺史行春縣令勸耕孝悌力田賜爵立伍保以檢察姦盜籍遊逸之民而役作之議下三司不果行厯知蘇越建泉等州官至左諫議大夫以祕書監致仕馬絳張安道馬絳傳大名人景德元年登甲科釋褐試祕書省校書郎知婺州義烏縣至則闢縣扉凡辨訟者徑造於庭為之别白是非因勉以考義民輒聽命罷去無復詞牒案牘大治後數十年父老猶有稱道絳名者授知越州改太常少卿李南公宋史本傳字楚老鄭州人進士及第調浦江令郡猾吏恃守以凌縣不輸負租南公捕繫之守怒通判為謝曰能按郡吏健令也卒置之法熙寧中拜戶部尚書擢龍圖閣直學士致仕范之才萬厯金華府志宣和三年以朝散郎知婺州重築郡城周十里為民保障舒邦弼萬厯金華府志宣和三年知蘭溪縣當睦冦兵火殘燬之後能還定安集撫綏其民又以暇日修建縣治百廢具舉士民歌頌焉王居正宋史本傳字剛中揚州人入太學除太常博士遷起居郎秦檜既相居正疾其詭檜銜之出知婺州州貢羅舊制歲萬匹崇寧後增五倍炎炎中減為二萬至是主計者請復崇寧之數居正力言於朝戶部督趣愈峻居正置檄不行語其屬曰吾願身坐不以纍諸君呼吏為文書付之曰即有譴以此自解復手疏五不可以聞詔如建炎中數漕司市御炭須胡桃文鵓鴿色居正曰民以炭自業者率居山谷安知所謂胡桃文鵓鴿色耶詔止之侍御史蕭振論守令賢否帝舉居正守婺免貢羅御炭事曰守臣愛百姓皆如此朕復何憂起知溫州居正俸祿班兄弟宗族無留者辛次膺宋史本傳字起季萊州人登政和二年進士第厯官右正言除直祕閣湖南提刑罷奉祠起知婺州隆興改元拜參知政事次膺仕宦五十年無絲毫挂吏議為政貴清靜先德化所至人稱其不煩周執羔宋史本傳字表卿信州弋陽人宣和六年舉進士廷試擢第二乾道初守婺州召還上嘗問豐財之術執羔以為蠧民之本莫甚於兵古者興師十萬日費千金今尺籍之數十倍於此罷癃老弱者幾半不汰之其弊益深論和糴本以給軍興豫凶災蓋不得已而為之若邊境無事妨於民食而務為聚斂可乎舊糴有常數比年每郡增至一二十萬石今諸路枯旱之餘蟲螟大起無以供常稅況數外取之乎宜視一路一郡縣豐凶之數輕重行之災甚者蠲之可也詔從之除寶文閣學士明年告老執羔有雅度立朝無朋比治郡廉恕有循吏風洪遵金華府志皓仲子詞科中選即入館以不附秦檜子熺乞外通判婺州有惠政嘗修東陽志十卷汪應辰宋史本傳字聖錫信州玉山人紹興五年進士第一人年甫十八授鎮東軍簽判初任趙鼎為帥幕府事悉咨焉嵗旱命應辰禱雨名山即應越人語之曰此相公雨鼎曰不然乃狀元雨也召為祕書省正字秦檜力主和議應辰上疏檜大不悅遂請祠以歸檜死召為吏部郎官遷右司母老乞外出知婺州郡積欠上供十三萬緡朝廷命憲漕究治應辰謂急則擾民乃與諸邑蠲宿逋去苛斂定期會窒滲漏悉為補發除祕書少監遷權吏部尚書洪邁宋史本傳字景盧皓季子也紹興十五年中第纍遷吏部郎兼禮部知婺州奏金華田多沙不受水五日不雨則旱故境內陂湖最當繕治命耕者出力田主出穀凡為公私塘堰及湖總之為八百三十七所婺軍素無律春給衣欲以緡易帛吏不可則羣呼嘯聚於郡將之治郡將惴恐姑息如其欲邁至衆狃前事至以飛語榜譙門邁以計逮捕四十有八人置之理黨衆相嗾閧擁邁轎邁曰彼罪人也汝等何預衆逡巡散去邁戮首惡二人餘黥撻有差莫敢譁者事聞特遷敷文閣待制淳熙改元進煥章閣學士知紹興府過闕奏事上曰浙東民困於和市卿往為朕正之邁再拜曰誓盡力至郡核實詭戶四萬八千三百有竒所減絹以匹計者略如其數進龍圖閣學士尋以端明殿學士致仕諡文敏趙不􅖊宋史宗室傳字仁仲嗣濮王宗暉曾孫紹興登第調金華丞治縣豪何汝翼械請諸郡編隸他州邑人懾服纍進明州觀察使淳熙十四年封崇國公敬朱熹張栻栻卒為請諡又請用熹其好尚如此孫伯虎永康縣志乾道間為永康縣尉臨機明敏蒞訟政公方化頑猾而有條處煩劇而不亂民訟者皆請於州願決諸尉及攝邑篆民相戒母以曲事至庭陳亮嘗薦之於參知政事周葵焉趙善堅嘉靖浙江通志宋宗室家於袁州乾道間舉進士通判婺州朱熹為常平使者深器重之時大旱善堅奉行荒政全活甚衆後五典名藩所至以廉能稱李椿宋史本傳字壽翁洛州永平人父升進士起家靖康之難升翼其父以背受刃與長子俱卒椿以父澤補迪功郎厯官至司農卿擇臨安守椿在議中執政或謂其於人無委曲上曰正欲得如此人遂兼臨安府視事三日解去椿在朝遇事輒言執政滋不悅出知婺州會詔市牛筋凡五千斤椿奏一牛之筋才四兩是欲屠二萬牛也上悟為收前詔除吏部侍郎以敷文閣直學士致仕徐榮叟嘉靖浙江通志字茂翁嘉定七年進士通判臨安府遷知婺州深悉民隱善政著聞入為諌議大夫以資政殿大學士致仕吳昌裔宋史本傳字季永中江人早孤痛自植立得程頤張載朱熹諸書輒研繹不倦嘉定七年舉進士調閩中尉端平中遷浙東提刑辭改知婺州婺告旱減騶從供帳遣僚佐召邑令周行阡陌蠲粟八萬一千石錢二十五萬緡有竒加集英殿修撰以寶章閣待制致仕諡忠肅趙必願宋史本傳字立夫廣西經略安撫崇憲之子嘉定七年進士知常州改知處州陳折帛納銀之害皆得請移泉州兼知台州察民疾苦撫摩凋瘵修養濟院建陳瓘祠政教兼舉端平元年以直祕閣知婺州至郡免催紹定六年分小户綾羅錢三萬緡有竒立淳良頑慢二籍勸懲人户措置廣惠倉及諸倉積榖奏乞寬減內帑綾羅申省免用舊例預解諸色窠名錢罷開化稅場遷大府寺丞尋遷度支郎中黃師雍宋史本傳字子敬福州人寶慶二年進士調婺州教授學政一以呂祖謙為法慕徐僑有清望欲謁之會其有召命師雍曰今不可往也僑聞而賢之至闕以其學最聞師雍簡淡寡欲靖厚有守言若不出口而於邪正之辨甚明視外物輕甚故博采公論當官而行愛護名節無愧師友蔡抗萬厯金華府志字仲節元定之孫博通經史邃於理學淳祐十一年知金華郡亟踵魯齋北山二先生之門請為主教麗澤魯齋一出而婺之禮俗興王霖龍東陽續志三山人景定五年任浦江知縣奉公勤政修壞起廢有兄弟訟者霖龍愀然曰是明倫之化未孚也令與有責乃授以孝經朝夕誦習由是感悟和好如初逺嶠村氓久不輸賦霖龍移文呼之氓欣然相率拜庭下曰吾侯清聲稔矣何幸得親見耶悉完積負後轉奉議郎趙孟壘宋史劉士昭傳孟壘合州人登開慶元年第為金華尉臨安降與從子由鑑懷太皇太后帛書詣益王擢宗正寺簿監軍復明州戰敗見獲不屈死元特濟格元史本傳高昌人世居五城後徙京師伊哷珠長子也沈鷙有才至元中纍官嘉議大夫婺州路達嚕噶齊所在咸著政績大德己亥卒贈浙江行省平章政事柱國封榮國公諡簡肅徐德廉俞希魯徐德廉墓志字清夫安善縣人謀略過人同巴延渡江至元十二年賊殺永康達嚕噶齊歐興百户邵興軍士敗北德廉收兵從唆都宣撫討之以興等兵先設犄角繼以已所起義兵直攻之賊無遺類聞於朝賜報國忠心四字授永康縣尹未幾總管高孟德征武義冦葉萬户等德廉率兵數千與高兵夾攻寇聞風降附德廉悉宥之縉雲賊章炎洪平一等搆本邑黃隆一等賊據靈山之八盤嶺聲勢相連德廉募壯士會招討李從善率兵東西夾攻擒平一等於龜溪尋會攻方巖乘勝進兵青山夜破靈山營寨獲渠魁陳巽四等本邑肅清時縣治新創黎民無幾乃招撫千百餘户處以室廬且興學校以養賢才教樹畜以裕民生建橋梁以通往來修驛遞以舍賓旅凡有關治理者井然畢舉又章育遺黨與處寇結寨李溪山德廉起兵至牛筋嶺奮力擊破之敕知婺州路事未之任賊合餘燼侵伐縣治德廉以兵躡之追至李溪寨下被執死之浹旬面如生朝命招討李從善等親往祭奠即葬於永康大庵山立祠上封寺王仲筠嘉靖浙江通志冀人至元二十九年為蘭溪令除姦弊振偷惰以政績聞楊景安柳貫楊丞檢田頌序景安為東陽丞將去而民飢景安曰吾其可以官滿自諉躬訴大府以次聞於部使者請如故事檢覆其災既報可景安受牒當分詣諸鄉一童一馬襆被竟往次舍必於庵廬食飲取諸裝槖視田勞農已事即行退然若無德於民者劉濟黃溍劉濟墓志字仲源河間肅寧人始以東江場同管勾遷昌國正監管勾調婺州路司獄有余甲者以貧自鬻為人奴勢家子慕甲妻美弗能得會其主病死金華道上因誣甲殺主而奪其妻吏既傅致成獄濟直其寃破械出之蘭溪民王乙為怨家所殺乙親戚兩人將訴其事怨家懼更屬吏捕治兩人謂乙私其妻實共殺乙賴濟言徙其獄旁郡兩人得不死他以事株連若鍛錬無得而久繫者濟悉為剖析所活十有四人所縱遣八十餘人永康大姓以睚眥之怨毆人至死有司弗敢詰反抵告者罪濟求得其情乃收案殺人者宣慰使而下以受賄曲法敗者五十餘人選擢左右司都事超升承德郎周自強元史本傳字剛善臨江路新喻人好學能文練於吏事超授婺州路義烏縣尹周知民情而性度寬厚不為刻深民有以爭訟訴於庭者一見即知其曲直若能悔悟首實則原其罪怙惡不悛然後繩之以法民畏且愛獄訟頓息民間田稅之籍多失實以故差徭不平自強出令履𤱔核之民不能欺文簿井井可考於是賦役均平貧富樂業部使者數以廉能譽於朝階奉議大夫以江州路總管致仕李衎蘇天爵李衎神道碑字仲賓世為燕人起家將仕佐郎至元十九年轉江浙行省左右司員外郎朝廷遣官稽核郡縣錢糧衎分江浙省人不以為苛元貞改元除同知嘉興路總管府事再遷婺州佐兩郡凡十年時天下無事年穀豐穰法制寬簡衎操韻高潔又喜吳越風土所在興學訓士民悅其安靜之化烏庫哩艮楨元史本傳字幹卿資器絶人好讀書至治二年蔭補江隂州判官尋調婺州武義縣尹有惠政至正十七年除大司農明年升右丞良楨自左曹登政府多所建白罷浙東西長生牛租瀕海被災圍田稅民德之劉元萬厯金華府志大都人元統初為武義尹惟攜一子一僕剛毅廉介一錢不取時浙東憲司構一公堂俾元斂材運甓元不從出揚言曰一公何在竟拂衣歸張孝安萬厯金華府志東平人至元間蘭溪縣尹為人慈和言語願欵至遇事激烈利害不顧有古強吏風圖們達柳貫圖們長官去思碑字曼卿本托音台部人以族望才諝從事閩閫復由昌國州佐辟浙省譯曹掾出長睦之分水再轉而宰東陽知俚俗拘於隂陽謬論親喪或數十年未舉於是申明禮制勸示葬期蓋隨其豐嗇以就葬埋者千有餘喪患糧籍壞於吏曹之乾沒而官田民賦或失其貧富之等於是下令制期自陳過刻躬操朱墨鈎校出入曾未數月而户版以明民稅以定廉問彰聞委符迭至賈其餘勇又足以平旁境難平之訟政暇敷揚經義以申庠序之教歲或洊侵則推誠勸分以蘇捐瘠額琳沁萬厯義烏縣志字毅齋輝和爾人至正三年任義烏縣達嚕噶齊明敏不察仁恕有容務以恩信及民田政久廢徭役不均乃核其田以定賦役值歲不登田使者將徴租力言之得免十之八九又崇禮教抑豪強修學校勸農桑修橋梁以濟不通濬繡湖以興水利任滿民為立去思碑廉阿尼格巴哈嘉靖浦江縣志一名溥字景淵北庭人希憲孫至正九年任浦江縣達魯噶齊才優識明力於興革賦稅舊輸本府後輸睦倉踰山歷險為訴廉訪復舊均役法行鉤校覆核履畝定稅高下各隨其宜公餘延儒碩講明理學復刻栁貫文集置之學宫以存文獻廉靜剛介私交不行吏無舞文民安其政黃溍作碑記徐永益嘉靖金華縣志字友直平陽人至正間金華縣尹王禕嘗曰婺之屬縣六十年來為令而有循良之名者吾得三人焉義烏周自強武義許廣大金華徐永益是也克哷蘇萬厯金華府志字吉甫至正中知蘭溪縣以清靜為治惠愛為心門無私謁庭無健訟吏不敢縱民不敢欺時冇詔賜天下高年九十者帛二匹八十者帛一匹吉甫周厯境內雖窮山絶壑悉臨其家手授之帛且召其子孫而勗以孝焉俞希魯史槩字用中先平陽人後徙鎮江以茂才除慶元路教授善於啓迪衆曰俞公如洪鐘叩無不響任滿擢歸安縣丞築海鹽塘費省而民不勞升江山令改永康所至葺廟學聘名儒講説平民徭賦民有私人妻而殺其夫者一訊立決以無援久不遷卒年九十明王宗顯史槩和州烏江人少業儒博涉經史元季避亂僑居嚴州歲戊戌胡大海克嚴州得宗顯禮遇之是年冬太祖親征婺召見上曰爾與我同鄉正濟所用命潛至婺城察聽事體至婺近城五里舊識吳世傑家察得城中守將各自為心回以告上甚喜曰我得婺州令汝作知府進攻城克之改婺州為寧越府以宗顯知寧越府事開郡學延儒士葉儀宋濂為五經師戴良為學正吳沈徐原等為訓導學校久廢至是始聞絃歌之聲王允誠成化金華府志以親軍總管任義烏知縣時承兵燹之後修舉拊循不期月而民安堵縣控孔道民苦軍士侵擾允誠以法懲之頓息凡營造及軍需供億事事規措有方尤崇重學校善決斷民苦不雨禱諸神雨輒降歲有秋甫期擢南安守去民涕泣擁留至馬不得行張永誠成化金華府志南昌人洪武初以都督府斷事司知事任義烏為政簡易吏民悅服創公宇爭相趨赴治行為諸縣最王瑛嘉靖浙江通志字君實廬州人太祖命從李指文忠取桐廬富陽餘杭遂入錢塘録前後功揮副使鎮金華勞績懋著張熙舊浙江通志洪武初為金華縣主簿及去任朝遣使者行浙東郡縣問民疾苦父老言數年前有張主簿愛民甚民思之不忘願得張君復來使者以聞上嘉歎即命為金華郡守以慰民望賈存義萬厯蘭溪縣志趙城人洪武五年知蘭溪縣廉以律已惠以撫民修學校建津梁未期而政成趙煥章浦江縣志真定人洪武五年知浦江縣清廉有守寬猛得宜獄訟得情民畏懷之魏處直萬厯金華府志益都人洪武十年任永康知縣亷以處已勤以蒞事緩征科葺學宫不煩民力且善剖決姦欺莫能蔽民歌之曰父母何在在我庭華溪之水如公清下民不敢匿隱情我公摘伏如神明又歌曰我邑大夫賢且仁惠義生息熙如春宋玒萬厯金華府志唐縣人洪武間知金華府為政公嚴清簡嘗云官省一分事則民寬一分力人以為名言黃紹欽萬厯金華府志髙州吳川人洪武十六年舉明經授永康縣丞愷悌寬厚愛民如子不為權勢所動民有賦役於官而所輸不足輒代以俸俸不責其償事苟利民必委曲善處之至法令之輕重銖兩不少假借宋濓曰若紹欽者真廉且惠其古循吏之徒歟段嗣輝明一統志洪武中知金華府性廉介多惠政卒之日民甚悼之朱璞明一統志洪武中知蘭溪縣蒞事嚴而能恕寬而有制人皆悅服方素易嘉靖浙江通志江西樂平人洪武中由盱眙縣令有政績升金華同知蒞政勤敏發姦剔蠧吏民畏而愛之吳祐萬厯義烏縣志字吉之滕縣人洪武間由監生知義烏縣公恕廉潔時有仇均善謀一家三命尸以乾垈間薪燬之無驗祐微行細訪得實冇神明之號在任田野闢逃亡歸利興弊革以疾卒官劉彥飛嘉靖浙江通志洪武末任浦江縣丞性耿介以冰蘖自持孜孜為治有古良吏風吳理明一統志洪武末知金華縣操履公正催科不擾秩滿民涕泣不忍舍其去吳熙成化金華府志邵武人初任金華府照磨賑濟飢民因事制宜軍民沾惠以勤敏著聲擢本府推官宋哲嘉靖浙江通志恩縣人永樂初知蘭溪縣洞察民隱豪猾屏迹升户部郎中父老詣闕乞留詔從之郭瑛成化金華府志字廷瓚畨禺人永樂中由進士知金華縣廉明剛斷重建儒學文廟士類興起嘗編長山詩集石彥誠成化金華府志南昌人由進士永樂三年武武義縣丞篤學守道廉正愛民明年徴翰林院修書父老贈詩曰身持雅操同冰蘖人播清名滿道途書成升徐聞縣知縣王鐸舊浙江通志修武人永樂四年自教官升任知府嚴厲明斷吏畏其威民懷其惠李玉金華府志字汝成吳縣人以進士授大理評事永樂間改知義烏縣廉介有守時朝廷營造部使者絡繹來縣催督夫匠一或不集則索要賄賂玉歎曰豈可剝民以媚人乎惟夙夜勉完厥事賴以無擾未幾以舊官代解任回京民遮留勿忍舍後升監察御史黃仲芳成化金華府志名蘭以字行建安人永樂間由進士出宰東陽剛明練逹吏民不敢欺時民苦牛租房賃稅糧折絲等賦皆為奏蠲之又有虎傷人仲芳為文禱神越三日二虎來伏南門城外仲芳往訊之曰若噬人者當伏罪否則馳去虎伏不動殺之其誠格如此秩滿升湖廣參政劉實明泳化類編字嘉秀安福人宣德庚戌進士選庶吉士改金華府通判適歲大旱民多逋賦鬻子女上供實為奏貸還之督賦至浦江驛丞王韶恃同鄉以飲食饗拒勿受公餘即閲經史有郡僚竊笑之不為意修顔孝子宗澤吕東萊祠墓先是義門鄭氏蕃庶不自給實奏免其歲供遷順天府治中尋擢南雄太守石瑁湯斌石瑁傳字信之應州人宣德八年進士正統初授禮科給事中出知金華府處州賊楊煕流劫郡縣瑁修城積粟以備之已而軍興日費不資百姓被寇者皆乏食瑁將發倉以濟大吏或難之瑁曰彼迫於餓則亦為盜耳夫迫民為盜與擅發官粟罪孰重我寧就其輕者卒發粟濟之朝廷聞之以為能遷福建右布政使以王翺薦為禮部尚書致仕劉傑萬厯義烏縣志字仁傑江西樂平人舉宣德乙卯文學力行正統戊午授義烏縣丞蒞任初方伯黃津按部催督軍需邑舊丞業被罪斥傑奉檄以積逋巨萬民難猝辦乃畫限分貧富定遲速不兩月而完集歲大旱盜賊嘯聚剽掠傑散遣兵夫手書招諭脅從已猝入賊境獲其渠魁民賴安堵時五虎為害即移牒城隍遣捕户入白巖山洞五虎俱獲庚申夏不雨傑齋沐禱清潭忽見青虬蜿蜒黑雲四起大雨如注嘗編併圖甲以便徴輸疏請蠲租以活飢饉又上封事十條大者論待制王公禕死節滇南得諡忠文及天下有司官為公錯干纍審其治行廉能當免提對追罰諸若除姦革弊利國便民各條悉見採用辛酉邑缺令民以丞能字已疏請令之時新令已至見丞政優得民亦奏以丞自代部寢其奏而傑名自此益彰邑有一所容二豪猾伺傑考績還欲投媚漁利傑峻拒豪猾無遂搆飛語入內臺得雪還民無老幼遮道欣躍諸若修儒學忠孝祠尊賢堂及各公宇橋梁之類無不備舉所輯有黃文獻王文忠文集所著有利便奏稿繡川集義烏志余寬金華縣志贛州人正統元年由舉人知金華縣按籍定差以均役勸民出粟以備荒事無煩擾姦頑遁迹調長洲縣去劉同婺書字伯詢江西廬陵人正統中進士令義烏有幹才數雪疑獄金華郡丞某者偶行縣索餉同即奏其狀於朝丞竟得罪去薛理常成化金華府志無錫人正統五年授蘭溪知縣公而能斷政平訟理買地於儒學泮池南建祠以祀范香溪金仁山吳禮部周宗智舊浙江通志湖廣大冶人知金華府修建營繕綽著才能鞫獄理寃更稱練達撰金華府志二十卷田達成化金華府志河南人由監生正統間為東陽丞己巳歲栝冦陶得二流劫郡城奄突東陽茶園坑達率五子集民兵迎戰父子俱死援兵至賊戰亦疲退去縣得以安周義萬厯金華府志德州人金華守禦所千戶與陶成同禦栝冦馬陷遇難臨死猶手刃數人李琦舊浙江通志霸州人景泰初知金華縣事廉介自守政治有方首舉孝行貞節激厲風教以憂去李珍成化金華府志洛陽人以鄉貢進士任金華府同知勤慎慈惠激懦廉頑民情允愜劉珂成化金華府志安福人景泰間由進士知永康縣勤恤民隱加意學校理煩治劇綽有餘裕嘗建仁政橋工巨費煩而民不知勞有妻妾殺其夫者事祕得其情又有豪右誣平民為盜者輒廉其枉釋焉後以風憲徴潘珏分省人物考字玉汝婺源人成化進士授湖廣蘄水令遷金華同知職專清戎尤慎勾稽未嘗徇權勢為取舍蘭溪民誣姪夜毆叔殺其妾具官治姪死罪纍年莫辨珏閲成案見其初驗時不云何衣悟曰此必就寢所計殺之也豈有婦人祼而救鬭者耶詰之果服坐叔故殺罪而出其姪巡按陳某不悅曰獄屢經臺讞矣何若是矛盾耶珏力爭之陳不能奪尋致仕繆樗成化金華府志字全之溧陽人進士成化戊戌為東陽令先是邑中田糧多虛貧民告病樗沿區履畝編號繪圖飛詭之弊為之一清厯任五載政平訟理學校倉場祠字無不修舉迄今民猶賴其流水册籍以正疆界王倬分省人物考字用檢太倉人成化戊戌進士知山隂以憂去改蘭溪在山隂多興滯補弊革額外科取之陋政聲赫然至蘭溪以積逋糧里繫監一訊釋之在赦前者蠲除餘為立限以次輸足旬日獲盜十餘輩夜户無警素舞文者皆斂迹李璡萬厯金華府志字純夫懷寧人成化七年由進士授蘭溪縣剛介有為治行著聞始建祠於聖壽寺東峯亭之故址以祀邑鄉老生暨名宦曰景賢祠又重建悅濟浮橋民賴之升太僕寺丞宋約萬厯金華府志河南胙城人成化八年知湯溪縣時縣治新設百度方興煩劇悉經綜理勞績茂著葉巒金華縣志字鍾秀成化十八年由進士知金華縣廉介明敏興學校行保甲凡稱收無加耗催徴有定式民甚便焉鄺璠分省人物考字廷瑞其先廣東高安人後徙任邱宏治進士知吳縣轉徽州府同知改金華俗嚚訟煩常署郡篆訟庭閴然人以厚嫁破産女多乃不育璠嚴諭之屬縣蘭溪民居櫛比素弗戒於火拓其衢率五門瀦水一甕自是不復延燒邑人因命曰鄺公街以母憂歸王秩永康縣志字循伯崑山人𢎞治初以進士知永康縣抑強扶弱作興學校清賦稅歲侵多方賑濟士民懷之韓燾萬厯金華府志字宗仁平鄉人𢎞治初知金華府遇事明敏庭無留訟尤鋭意作興文教士多成就鄭錫文萬厯義烏縣志長樂人進士𢎞治八年任義烏縣丈量田土清理糧稅禁緝盜賊甚得治體查復繡湖舊迹濬之仍建閘以時啓閉民賴灌溉焉於湖上建亭立石以敘其績號鄭公墩升監察御史葉相萬厯金華府志字良臣𢎞治十六年由進士任金華府推官明敏有才署府印丈量田土清理稅法姦弊悉釐劉􅉅萬厯金華府志字惟馨涪州人正德初以給事中論劉瑾去官起知金華府政尚大體重風教嘗追復先儒何文定公邱墓又疏乞何王金許四先生從祀文廟不果行時鄰郡告警􅉅率屬戒嚴民賴以安楊文嘉靖浙江通志字宗周無錫人𢎞治三年進士授金華府學教授正軌範嚴條約以身率教雖隆冬盛暑不廢講授常以胡安定之教蘇湖者自勵抗顔正色於人之愛憎勿恤也升南京國子監丞趙鶴嘉靖浙江通志字叔鳴江都人𢎞治九年進士自户部郎中任金華知府養士治民政教兼舉升山東提學副使鶴長於吏事雅好文學作為歌詩成一家言謝琛弋陽縣志字德溫𢎞治己未進士授東陽知縣東陽為浙巖邑最難治琛摘姦發伏如神欽取為御史升太倉兵備副使致仕黃春弋陽縣志字伯元弋陽人𢎞治甲子舉人授武義令以能聞御史歐竦薦其才堪繁劇改調永康武義民闔境赴當道保留之考最升刑部主事陳交獻徵録字汝同舉人選永康縣令永康舞智難治交一以誠待之不事鉤距士民相孚不忍欺道通五省冠蓋相屬驛傳供億往往告匱交一切裁抑縮費十四五有以毁言告交不為動曰吾寧解吾職耳何忍趨合以悅人俗産女多溺不舉嚴為之禁湯民範烏合為亂挺身往諭立散其黨疑獄淹久悉為剖決多所平反有干請者一不阿徇調知湖廣之興寧去官日行李蕭然惟圖書數卷而已湯沐嘉靖武義縣志江隂人正德三年進士忤劉瑾由湖廣僉事左遷武義知縣端謹廉介鋤強扶弱吏民服其嚴明厯升布政使劉桐湯溪縣志字良材吳縣人正德三年以舉人知湯溪縣為政有法賑飢民戢礦寇辨寃獄去後人多思之李屺萬厯金華府志字孟玉玉山人正德四年由進士知金華縣謹飭明恕翦豪猾興學校政績著於時鄒輗萬厯金華府志武進人正德七年由進士知浦江縣剛果有為清理田糧革省冗費興建學校士民懷之賀寬舊浙江通志江西永新人為東陽令廉明慈愛教養兼舉歲旱減膳徒跣以禱又借運司鹽利及郡倉粟以賑全活甚衆及報政囊槖蕭然士民交相餽贐寬惟取一菜時人謂曰昔聞劉寵一錢今見賀寬一菜歐陽誥萬厯金華府志字賜之泰和人正德時守金華適宸濠亂列郡徴斂甚急金郡賴誥得以無擾每暑縱囚出浴雙溪囚感悅雖重辟無逸者調漢陽府民立去思碑毛鳯韶浦江縣志麻城人正德辛巳進士嘉靖二年除浦江知縣為政以恤民厚風俗興人才為務一時因革損益曲盡規模邑有貧苦出頭活豪強削腳忙主文無利趁里長省錢當之謠纂修浦江志略文獻足徴李一元成化金華府志字調卿建德人知金華府明察耿介周知吏胥姦偽所施為出人意表吏抱案牘股栗不敢出半語訟者情得自達曲直立辨兩造不費一錢賦則酌輕重為先後令縣官與民約期不家呼而户促縱征檄旁午未嘗遣督郵下縣海寇費多督府重斂甚急一元不忍乃以誤餉被劾恬不介意後賴公論得白躬尚儉約丞判化之厯五年不調或謂其無書投政府一元歎曰吾豈以一官易所守哉以憂去八邑士民為立生祠於郡城姚文照萬厯金華府志字在明莆田人嘉靖九年知金華新黌宇治橋梁均徭賦通鹽鹺復豪右久沒之産決津要殺人之獄賑武義等邑飢殍全活以數萬計湖州借折糧百餘年躬請巡臺力為辨復至面折湖守不少屈又葺麗澤四賢書院建章文懿陸鶴山諸祠尋以奏最行老稚填道泣下刻石紀恩朱方萬厯金華府志字子大泗州人嘉靖七年由進士任金華府推官誠篤清慎淡素如儒生諳練若老吏捧檄署縣事爭復折糧陳京萬厯金華府志字世周懷安人嘉靖十四年知金華府政持大體不事煩苛有鄉宦乞城中隙地京拒之曰是安可以私與人也當道檄與之竟不聽有舊坊久毁復建或告宜鐫巨室姓名京曰吾守郡惟經野建學通商惠工吾事也他何問乎於勢要一無所阿嚴禁溺女所活以千百計以病乞歸劉璧萬厯金華府志長洲人由進士嘉靖甲辰知東陽在縣僅一載凡東陽數十年不可芟除之弊與根據不可動之人一旦刷洗殆盡勤恤民隱事無大小務親裁決或至日昃不食性甘清苦日食菜茹竟以此成疾還家數日卒囊中不及二十金周後叔獻徵録字引昌進士為金華府同知郡有劇盜以其黨負嵎吏莫敢誰何後叔使市魁徉為闌入盜者盡得其虛實以告後叔以徑卒習射趨而覆其穴悉平之歲少祲臺議發儲粟為賑後叔持不可曰民尚幸半菽即庚空而歲復大祲疇繼者乃召巨室假貸貧民官為裁其子息民兩便之是時御史銜上命訪求異人所至苛擾後叔迎諸境曰郡僻小孝弟力田間有之異人無以塞明詔御史愧去滿三歲進知府龍復理浦江縣志宜春人由舉人知桃源令嘉靖十八年調繁浦江初至值旱暴露徒跣不憚險逺致禱竟以澍應部使遣佐職踏勘旱災復理頓首求申旱狀是歲糧稅賴以全免科目久曠以學宫東南散漫乃捐俸買田十六畝浚方湖於學南名曰起龍建奎映閣於龍首構聲逺樓於湖東文運遂振忤舊守為中傷從計典去李庶萬厯金華府志字季卿福清人進士嘉靖二十一年知蘭溪縣抑強扶弱時有柄臣北上道出蘭溪郡邑皆往候庶曰勞民傷財以庇吾官心竊恥之卒不迎送每上官過輒私相戒曰無令李知縣知甲辰乙巳大旱竭誠禱雨衣粗布衣却輿蓋步行烈日中又平糴發廪以哺飢民全活甚衆徐紳萬厯金華府志字思行直隸建德人嘉靖二十三年由進士知蘭溪縣洞悉民情能持大體僚吏畏謹老胥讋服去官蘭民祠焉李昭祥蘭溪縣志字元韜上海人嘉靖二十六年以進士知蘭溪縣優於吏才舉廢墜剔冗蠧平賦均役息訟戢盜力行鄉約具有規條升南工部主事汪道昆萬厯義烏縣志字伯玉歙縣人進士嘉靖二十七年任義烏縣警敏過人梳櫛宿弊杜絶侵漁徴賦立辦辨枉破猾以息訟源信令必罰盜賊屏息事無巨細刻期決之羣情胥服性好學博覽多識不以案牘輟尤重學校造就青襟所奬拔俊異為時名流行取入為工部主事顧曾唯金華府志字一貫吳江人進士嘉靖三十二年任金華知縣資性明敏庭無滯訟有豪民殺人私其婦廉得之置諸法縣屬郡里甲支應獨繁節冗費寬之時倭寇發溫台有自馬騣凶鬯匕嶺入永康武義境者曾唯督民兵守要害寇不敢犯縣學舊隘甚且雜民居曾唯捐俸市地拓其門廡更新之又置祭器書籍加祭品暇日課諸生業諄誨之凡所設施皆務實惠召為監察御史洪垣金華府志字覺山婺源人嘉靖時由進士知永康縣廉慎有才清稅糧興水利嚴溺女及火葬之禁王輝萬厯義烏縣志玉山人監生嘉靖四十一年任義烏丞遇事隨決雖老書積保不能為姦署縣事追徴有體節省夫役得父老心黃卷浦江縣志荆門人舉人嘉靖四十五年知浦江縣始任布諭息訟期於休養民有所理責令自釋不解而後聽有事行邑餱糧自隨當春出郊見田治者勞之荒蕪者責之適有老羸困於犁鋤停軺命隸夫代之終畝民間子弟每月考校諄諄課教表揚節孝清理先賢丘墓當入覲聞父不豫即致政歸行李蕭然庫積羡餘分毫不取但加封識而已史􅢫獻徴録字允全長洲人為蘭溪縣丞令有移訊牒者質之必兩造俱服從容為輕獄以報贖鍰絲毫不入槖自嘉靖末郡邑爭為甲令自減削而􅢫所操益甚即一薪水必損月俸為直以償或謂君胡自苦􅢫謝曰小吏安敢取名固職如是爾以部浙運抵京中寒疾卒潘允哲萬厯義烏縣志字伯明上海人由進士知義烏所服惟故衣韋帶退食不肉未嘗有疾言遽色儀導不飭敲撲不施雖愷悌慈祥而法必行去姦宄洗寃抑民入公府如歸其家趨事奉公無敢後捐俸市寺塘田入學以充月考之費惠政甚多踰年以行取去周澍萬厯金華府志羅源人嘉靖間任金華府學訓導諸生餽贄一毫不受署東陽縣事即攜一僕往蔬糲自給遇事執法吏士畏之時因公獲罪遂鬻所乘馬輸官升山東棲霞教諭去之日敝衣一笥而已李瑞芳舊浙江通志豐城人嘉靖中武義令持身清慎御衆寬和而民不敢犯歐陽柏萬厯義烏縣志字惟承湖廣潛江人由進士隆慶三年任義烏甫下車省利病皂捕肆毒痛懲之緝盜鋤強不遺餘力姦猾戰栗庶務畢張尤垂意學校門堂廡垣時加修飾鄉賢名宦二祠廢弛已久柏歎曰諸君子生於斯仕於斯固法施於民者也人方仰高風懷遺澤而獻奠無所咎將安歸乃度地建祠稱知先務召拜給事中鄭凖東陽縣新志字正衡吳縣人隆慶三年由進士知東陽縣興文教輯黌序治城垣清獄囚節冗費攝捕役絶苞苴操縱出入皆自已出吏胥無所措手又公餘纂述佚事採銶碑記為金華文獻志文元發浦江縣志長洲人歲貢萬厯六年任浦江縣聽斷數語盡得其情凡上官疑難之牘必以委焉有所條議頒布各郡邑鄰民俱受其賜六房吏弊洗刷無遺時有丈量之役躬為履畝舞文者立置之法田賦為之一清畫魚鱗圖册民永賴之時通浙得羡田十頃法當稅元發請以兩浙羡米充羡田惟正之供議下行之諸郡悉得如例俞士章舊浙江通志宜興人令義烏時里中貼解糧米費溢額為申定解費五石以下者悉蠲之杜繡湖侵占沿湖甃石植栁人稱為俞公堤張應揚蘭溪縣志字仲言休寧人萬厯十一年以進士知蘭溪縣為民清田畝界限不致虛稅歲飢捐資倡賑因仿考亭遺法遍置社倉以備凶荒禮耆碩勤課士擢御史去熊鳴夏金華府志字心禹豐城人萬厯中以進士知金華縣讞獄明允催科有法時兵援朝鮮軍需孔亟鳴夏獨恤民財一以鎮靜處之民爭輸挽焉又造橋賑飢多有惠政張朝瑞舊浙江通志海州人萬厯中知金華以重道造士為先立何王金許四先生祠聚郡弟子員誦讀其中朔望講學人文蔚起周士英婺書字惺莪武進人萬厯進士令義烏清介有守以治行高第徴為吏部主事先是縣困於募兵士英入覲首奏言邑民實不堪受兵其隸行間者皆博徒無賴子不足用且不得志易生變今募檄歲至強使之即無人緣南畝或弱不任安能為國家出死力乎大司馬格其議不報已而東征之卒三千人徼賞而譟當事者移師誘而殺之無孑遺卒如士英言汪國楠金華府志字仲木婺源人萬厯二十三年由進士知蘭溪縣力行鄉學親臨率講歲旱步禱甘霖立應徴輸有法課士有方修義倉行保甲升南兵部主事曾應泰舊浙江通志汀州人萬厯中令永康勤於政治作興學校清田以溢補荒民賴之姚永濟東陽縣志號通所上海人萬厯二十六年以進士知東陽縣值連歲荒旱設法賑濟多所全活又礦使驕橫永濟請於上司奏罷之妖民嘯聚為亂設計擒之平其餘黨厯升本省布政使須之彥浦江縣志字君美嘉定人萬厯戊戌進士三十年任浦江令浦人隱田虧賦郡司理稽查論戍之彥至下令開罪準自首每啚選公正一人每户取親供一册核之民稠地闢反過舊額攤均蠲省田賦為之一輕徴糧分十限設長單里長自填免算胥之擾糧由三聯互照防影射之姦於是夙逋盡完沈困頓蘇值大造開稅局以其羡為民輸條銀十分之一推收官給二票杜生根棄米諸弊閭閈之豪探丸舞文者訪的立抵於法盜皆逺徙訟庭閴然有餘間則集生儒課校之丁內艱去士民建祠祀之龍遇竒金華府志字紫海永寧人萬厯三十二年以進士知金華縣和易近民有訟者以理諭之輒輸服去又善催科蠲羡耗設常平以救飢荒禁淹沒以育子女修學課士擢御史莊起元浦江縣志字中孺武進人萬厯庚戌進士知浦江甫視事察知左右叢姦置之法中外肅然對百姓則怡怡愈愈顔其堂曰平易三年間未入一死刑圄中幾空尤以興學育才為首務稍暇則進諸生談經講藝開文會設學田建書院捐贖鍰百金為之勸調繁蘭溪蔡思充東陽縣新志號元岡漳浦人萬厯三十五年由進士知東陽縣治民甚寬而獨嚴於盜賊待士甚厚而更切於窮民凡水利常平保甲諸務無不具舉仕至工部尚書解學龍金華府志興化人萬厯四十一年由進士任金華府推官政持大體不為苛察然吏畏民懷姦宄懾服人不敢干以私行取擢給事中吳尚默金華府志字以時涇縣人萬厯四十四年由進士知義烏縣時徴兵檄下尚默簡括遊惰者隸籍伍緣南畝者勿為勾攝積欠逋負廉其有田無賦者徴之宿弊盡洗行取擢御史林贄舊浙江通志莆田人天啓初知金華府律已甚嚴自奉甚儉吏胥奉令惟謹郡中利弊興革殆盡陳其仁金華府志福建人天啓五年由進士知金華府歲值大歉賑飢餒周貧乏修橋梁勤考課其費皆捐薪俸為之毫無吝惜谷中秀舊浙江通志北平人天啓間知永康率一子一女一僕至清操如水政簡訟稀徴糧比八限便云足解餘竟不徴民卒全納陳調元金華府志常熟人崇禎初以舉人任永康教諭善作人升武義令攝篆永康以驛站多困請留貼解武林驛嵗額民德之許成楚義烏縣志號荆區惠安人崇禎二年由進士知義烏縣嵗旱步禱為民請命修整學宫清釐田賦嚴行保甲盜賊以弭倪祥善舊浙江通志桐城人崇禎中同知金華府許都叛祥善署府篆力為保障亂定但誅渠首寬嚴得宜王士鑅金華縣志金壇人任金華令每事至剖決如流無滯獄無寃民役無煩擾課無羡餘一日偕紳襟行鄉約講孝順父母泫然泣下觀聽之民莫不歎息而泣以行取去許直義烏縣志字若魯如臯人崇禎七年以進士知義烏縣才猷練達操守清嚴境多盜計擒剽劫而掃其巢穴嵗旱步禱雨隨時降稅賦力請緩徴民懷德樂輸亦不缺額立社課士建文昌橋濬繡湖水罷官去民送者萬餘人後遷吏部員外郎殉節吳應台金華府志字伯能湘隂人崇禎間以進士知浦江振興學校捐俸鍰以建書院課士開會請之上官改浦為中縣人士感之且葺城垣造軍器令人習射講武人稱為幾先之哲云路進舊浙江通志宜興人崇禎間知金華性明敏疾惡甚嚴凡鞫盜賊情狀顯著者立斃之羣姦斂息姚孫棐蘭溪縣志字戊生桐城人天啓進士崇禎十二年知蘭溪縣才猷煥發治繁理劇綽有餘裕東陽縣志崇禎十三年調繁東陽遇寇亂城陷率義士鄉勇數千人收復邑城餘黨復來手射却之盛王贊金華府志字子裁吳縣人崇禎十三年以進士知蘭溪縣歲荒設賑全活多人去官日行李蕭然士民叩闕請留復職補任東陽所行惠政一如在蘭時命案驗傷始準曰假命害人雖或審虛其家已破民甚戴之衛周尹舊浙江通志曲沃人崇禎間知金華品行清卓庭有懸魚之風積蠧巨憝芟鋤殆盡周廷侍舊浙江通志金壇人知義烏聽訟立斷邑人有周半升之號言持米半升入城可決訟也凡山澤之利豪右專壅者必清出於民胡守恆江南通志字見可舒城人崇禎戊辰進士授修金華司理斷獄明允召試平臺改翰林院編乞歸獻賊攻舒守恆率衆登陴固守城破死之賜諡文節王珍浦江縣志和州人進士崇禎間知浦江縣居官冰潔課士無倦徴輸有方撫字尤切國朝張安豫金華府志字森嶽江南華亭人順治三年由貢生任金華知府時婺城初下民多竄伏山谷安豫設法招徠并戢暴兵嚴告訐蠲免力役民乃少休越明年歲大侵多方賑濟全活無算郡庠燬於兵鳩工重建朔望課士不期年而郡多弦誦聲通濟橋為栝蒼大末孔道以兵燹廢修復之他如鼓樓星君樓皆所鼎新又造營房以安師旅築石壩以資水利嚴保甲以清姦宄調供億以濟征閩大兵治行推第一擢分守嘉湖道吳元襄永康縣志字永持江南休寧人順治十二年由貢生知永康縣時海氛未靖兵馬繹騷荒亂頻仍逋賦稠疊元襄征調有方民以不困東陽義烏山賊屢寇境內元襄殫力守禦事平之日區處脅從多所全活先是里總為姦包藏飛灑元襄悉為釐剔又盡革會計陋規至若修文廟賑飢民善政不一去之日士民童叟送者載道孫家棟名宦留祀册山東安邱人順治戊戌進士十七年知義烏縣讞牘滿案剖決如神姦吏豪民一時斂迹清積逋免浮糧修廟學嚴保甲在任十載善政多端督撫薦治行第一升邳州知州陳龍驤舊浙江通志字蟠海山東陽信人順治已亥進士康熙六年知東陽縣每閲訟詞先得其情庭折不踰片言鋤擊豪強吐茹有法盜賊無大小必窮治之乃已保歇溺女諸弊皆力除之在任七年無一幕客服食器用如貧士卒於官立祠城隍廟側吳翀金華府志字六翮陜西華隂人舉人康熙六年升金華知府性樂易貌沖和不事更張而處置諸務井井就緒在任六年黃童白叟無不知為寬仁長者至留心學校軫恤窮黎尤為篤摯以親老乞養歸徐哲舊浙江通志廣昌人康熙九年任蘭溪縣丞事母孝每晨必公服候母安始出視事有惠政十三年署篆武義月餘閩逆掠境城陷死之山西通志耿逆寇金衢守辨張竒章潛通賊哲方誓死登陴設守禦具遽為奇章所縛奪縣印誘使降哲責以大義竒章慙甚已而將械入賊巢乘間自經死聞贈事察使僉事豫祭葬廕一子入監讀書按張元會名宦留祀册江西武寧人康熙五年由舉人知湯溪縣甫蒞任值大旱民艱食元會捐資施粥勸殷實之家出資賑飢汛防官無衙舍兵無營房元會捐俸以造高築土牆三百丈兵民稱便後值閩亂悉心守禦計除叛逆保全一邑生靈以疾卒於官李忱金華府志字恂九山西安邑人拔貢生康熙十三年知金華府下車問民疾苦勸鄉約勸農桑禁火耗節宴飲省刑薄斂民用以寧適閩變甌栝望風響應賊兵數萬屯於積道山時營兵僅百餘王師忱孤城獨守百計招撫及擾保一城以為浙東屏雲集供應浩繁而民間不翰忱力居多以勞瘁卒官王興禹舊浙江通志遼東人貢生康熙十四年同知金華府總督李之芳遴其能特檄軍前效用時衢為閩浙要害寇壘當前軍務倥偬興禹應機調度遊刃有餘升大理知府擢浙江驛傳道趙泰甡名宦留祀册膠州人康熙三十一年由進士知金華縣天性慈良操行廉潔剔除里遞之陋規禁革採買之賠纍舉歲臘禮以尚齒德建育嬰堂以收棄兒重修學宫建滋蘭院給膏火聘名師課之且建浮橋以便行旅置義冢以澤枯骸卓異升湖州同知衢州府三國吳鄭平萬厯衢州府志嘉禾五年拜將軍以千人守崢嶸鎮咸熙元年以功遷左光祿大夫新昌郡公食邑信安晉江逌晉書本傳字道載陳留圉人為大末令縣界深山中有亡命數百家恃險為阻前後守宰莫能平逌到官召其魁帥厚加撫綏諭以禍福旬月之間襁負而至朝廷嘉之中軍將軍殷浩將謀北伐請為咨議參軍甚有匡弼之益升平中遷吏部郎長兼侍中子蔚吳興太守隋辛大德隋書虞綽傳大德天水人為信安令誅剪羣盜甚得民和煬帝徙虞綽於且末綽走大德所歲餘有識綽者與綽俱為使者所執會有詔死罪得以擊賊自效信安吏民詣使者叩頭曰辛君人命所懸辛君若去亦無信安矣使者留之以討賊大德獲全唐李褘唐書本傳太宗子吳王恪孫少有志尚封嗣江王徙信安郡王為衢州刺史治嚴辨遷朔方節度使復除衢州刺史天寶初致仕李傑唐書本傳本名務光滏陽人擢明經第纍遷天官員外郎為吏詳敏有治譽為河南尹入為御史大夫出為衢州刺史宋高賦東都事略字正臣中山人以父任為左班殿直復舉進士纍至太常少卿特拜祕書監進集賢院學士知衢州衢民好巫鬼民毛氏柴氏二十餘家世蓄蠱與人忿爭輒毒之賦命擒捕伏辜者數人蠱毒遂絶為人剛嚴內實平恕所居皆有善政吏民紀之郡民為立生祠楊偉嘉靖浙江通志字子竒億弟浦城人天禧進士及第知龍遊以清慎聞纍遷翰林學士進中書舍人趙師旦宋史本傳字潛叔用廕試將作監主簿纍遷寧海軍節度推官知江山縣斷治出已吏不能得民一錢棄物道上人無敢取以薦改大理寺丞知康州儂智高破雍州順流東下師旦與監押馬貴部士卒固守州城城破遇害柩過江山江山之人迎喪哭祭於路絡繹數百里不絶彭汝方宋史本傳字宜老以蔭為滎陽尉宣和初通判衢州使者疏其治狀擢知州事方臘起睦之青溪與衢接境寇至無兵可禦衆望風奔潰汝方獨與其僚段約介守孤城三日而陷罵賊以死徽宗褒歎之贈龍圖閣直學士通議大夫諡曰忠毅李大有嘉靖浙江通志新喻人紹聖進士纍官知虔州宣和末募兵勤王淮甸歌曰天下姦臣皆守室虔州太守獨勤王後知衢州州有宿寇猖獗大有下車寇即平徐大興衢州府志字幼立河南人建炎元年自轉運判官遷衢州守撫瘡痍修戰具却賂遺充積貯及苗劉作亂大興豫知有變與通判史願率衆遏賊賊趨甌閩郡賴以安子孫遂居衢焉翁蒙之宋史魏掞之傳趙鼎以謫死其子汾將喪過衢衢守章傑希秦檜意遣尉翁蒙之領卒掩取鼎平時與故舊來往簡牘蒙之先遣人告汾焚之逮至一無所得陳康伯宋史本傳字長卿信之弋陽人宣和三年中上舍丙科纍遷太學正建炎末為敕令刪定官尋通判衢州攝郡事盜發白馬原康伯督州兵濟王師進討克之改提舉江東常平茶鹽紹興八年纍遷吏部侍郎拜參知政事守尚書右僕射同中書門下平章事孝宗即位封信國公進封魯國公慶元初配享孝宗廟廷諡文正劉珙朱子劉珙傳字共父建人世居崇安縣五夫里少以恩補承務郎舉進士乙科調監紹興府都稅務後知衢州始至委事僚屬一無所問人或以珙未更治民意頗輕之既而欺者得枉者伸羣下斂手不能有所為始大畏服凡吏員外置者悉罷之受租米使民得自操槩其發鈔消籍皆有程式田里大安乾道元年以為敷文閣待制知潭州荆湖南路安撫使王悅衢州府志孝宗時知衢州乾道四年七月大水悅以盛暑祈禱蔬食減膳憂勤致疾而卒贈直祕閣張應麒西安縣志字瑞伯為西安丞治石室堰垂成山水暴漲急湍乘堰堰將壞應麒衣冠乘馬入水而死尸浮水上面如生淳熙二年贈少卿民建祠祀之冷世光三衢事略字賓王常熟人淳熙八年知龍遊縣朱文公提舉常平以世光賢委用之兩省交薦除監察御史鄭極江山縣志字惟恭慶元五年進士授江山丞蒞任踰月值栝寇之亂令長投印夜遁極集鄉兵迎戰敗績二子星月遇害極中流矢亦墜馬歸卒於廨妻周氏自溺而死合葬縣北青霄橋馮惟悅宋史徐鹿卿傳惟悅為衢州推官浙東提點刑獄檄惟悅決婺獄惟悅素廉平至則辨曲直決淹禁大家不快其為會鄉人居言路乃屬劾惟悅州索印紙惟悅曰是猶可以仕乎自題詩印紙而去元本布𢎞治衢州府志少中大夫衢州路達嚕噶齊至元二十三年任創建公廨撫字有聲白景亮元史本傳字明甫南陽人授衢州路總管先是為郡者於民間徭役不盡校田畝以為則吏得並緣高下其手富民或優有餘力而貧弱不能勝者多至破産失業景亮深知其弊乃始核驗田畝以均之役之輕重一視田之多寡由是民不勞而事易集他郡邑皆取以為法郡學之政久弛從祀諸賢無塑像諸生無廩膳祭服樂器有缺景亮皆為備之儒風大振縉紳稱頌焉景亮性廉介勤苦自奉甚薄妻尤儉約唯以脫粟對飯而已部使者嘗上其事特詔褒美賜以宫錦改授台州路總管瑪哈穆特萬厯衢州府志字均章回回人江山縣嚕嚕噶齊新學校修橋路廉介明察回出人民民為立碑頌之楊居仁明一統志為開化尹饒兵陷縣仗義不屈罵賊而死巴哩雅萬厯衢州府志饒兵始退巴哩雅監開化縣出戍箬坑境內賴之以安歲餘會省檄俾進攻遇伏兵而死徹爾克哷木𢎞治龍遊縣志至順初官龍遊達嚕噶齊召父老開闢田野示之以法均賦役許民自陳得實户九千有竒先是西安龍遊糧輸建德盈以羡餘輸本路徹爾克哷木言於司府西安存廣倉龍遊存和豐倉永為制修瀔江浮橋置田二百四十畝立倉充其費築席村雞鳴二堰內召時民不忍其去訥古伯萬厯衢州府志元統間任開化主簿有治才歲飢約民無以粟出境復勸富民移粟定其價民不為害抑嚚剔姦民懷善政明黃奭天啓衢州府志湖廣黃岡人洪武三年知衢州府芟草萊以營府治增城堡以撫流亡振文教興水利頑民嘯聚親入其壘擒縱得宜開衢之官有大功者也時郡丞余伯深常寧人同心佐政並祀清節祠步從信𢎞治開化縣志字仲實揚州人明初宰開化建縣治興學校招逃匿而撫綏之民咸復業政平弊革升肇慶知府夏毅衢州府志為衢州守將時金華苗軍作亂殺參政胡大海處州苗將亦亂殺總制孫炎等衢州或謀翻城應之毅決計固守會劉基丁母憂回即迎入城一夕定之畢貞明一統志洪武中知衢州府以禮法自持羣吏敬憚公庭肅然劉利用明一統志洪武初知常山縣有豪猾詐人財者即捕置之法邑內讋服造浮橋以濟病涉其政有足稱者薑仲能天啓衢州府志四川瀘州人洪武中知西安縣時城中有戍卒暴害良民官不能制仲能下車即擒送京師悉戮之境內肅然民賴以安興學校修壇壝庶務咸舉以事去官行李蕭然羅規𢎞治開化縣志字彥芳濟南人洪武十三年知開化縣居官清慎操履堅確貧如寒士唐茍兒天啓衢州府志為龍遊令宣布威德招撫復業編民定役休養疲敝卓然為一邑保障柴伯安𢎞治衢州府志河津人洪武二十三年任西安縣丞鄰冦竊發誘邑愚民剽掠伯安領衆入其地撫諭之皆泣拜順從僅誅從盜者十餘家一鄉安堵民圖像於土穀祠楊守恭西安縣志新淦人洪武二十三年知西安縣臨政嚴肅豪民巨室犯法貴要多為求免悉置之法升給事中郭敦王鴻緒郭敦傳字仲厚堂邑人洪武中衢州知府多惠政衢俗貧者輒焚尸敦為厲禁且立義阡俗遂革禁民聚淫祠敦疾民勸弛其禁勿聽疾亦瘳明一統志時郡中旱蝗敦齋戒率僚屬遍禱於神夜大雨蝗漂沒以死遂有秋其妻躬親蠶桑繭成多白獨於楣間結成金縷如帶未幾召為禮部侍郎夏升天啓衢州府志字景高鹽城人先任開化縣丞永樂中升知府廉而且能吏民畏服其後曾由政簡貞繼任民轉思升謠曰曾也曾不上簡也簡不下若要民情安除非是老夏吏部以實聞復任朱敬天啓衢州府志山陽人宣德間由戶部郎中升衢州知府蒞政勤能民懷吏服府治皆其建造黃勝天啓衢州府志建陽人宣德中知衢州府有守有為禁豪軍治強梗民心翕服去任多垂涕者白琮天啓衢州府志新野人正統十四年由工科給事中任衢州知府清勤剛介政績著聞大兵征閩栝寇猖獗供億調度防禦攻守厥功甚著王儼𢎞治開化縣志湖廣人正統間知開化縣慈祥得牧民體後遭誣民訴於上官得釋復任張惠萬厯龍遊縣志字克仁晉江人景泰元年知龍遊縣治行卓然適括寇逼境上官吏咸議棄縣去惠獨召衆誓曰賊至而走是棄民也何以官為惟與城俱亡耳民心始固唐瑜分省人物考字廷美其先晉陽人洪武初占籍上海景泰辛丑進士授南京禮科給事中出知衢州府至則詢民間利病以次行罷會歲久旱且疫瑜還自朝覲下車即宿城隍廟為文以禱三日雷雨大作後凡值旱禱輒應舊有孔子祭田奪於民瑜以俸贖還之俾世供祀事有假媒聘賺財既而懼瑜之威鬻二子及妻以償瑜曰民窮而犯法畏法而棄妻子守之過也贖其妻還之衢民健訟瑜決斷如流數辨疑獄民不敢欺及去民為立生祠李溥常山縣志字大濟長垣人景泰間由進士知常山縣介然有守除姦革弊不受賄囑建旌善申明亭修學校立進士等題名石碑以勵風俗凡優給賑恤奉行不怠刑清訟簡時猛虎為患似有物來驅之去人稱異政所感王瓚天啓衢州府志陜州人龍遊令興學校修橋梁百廢具舉嵗旱每禱輒厯邑民貌其像奉大慈閣閻鐸天啓衢州府志字文振興平人進士成化初知衢州政事嚴明姦宄屏息尤好飭勵生徒長於詞翰王弼𢎞治開化縣志華陽人成化間由進士知開化縣為人外柔內剛剪除凶暴民心悅服遷御史沈杰分省人物考長洲人成化甲辰進士知河南歸德州改衢州衢多水田雨則溢晴則暵乃大興水利濬陂池築堤堰修復魁星等閘民田得灌溉而城中無漂溢之患又倣常平倉例嵗飢減價以糶收成增價以糴豐凶有賴倉無紅腐奏起樊尚書塋崇飾先賢趙清獻祠擢山西左參政進河南右布政使李汝嘉𢎞治衢州府志晉江人成化時由進士知衢州府蒞政寬平修學宫均徭役建橋梁民咸頌之厯浙江參政林清𢎞治開化縣志福清人成化間由進士知開化縣慈祥愷悌深得民心有卓魯之風王進正德江山縣志上元人成化間由進士知江山縣剛介冇守執法不撓一物無所取營修學校及四門壇場皆不科於民以疾去官鄧璩𢎞治衢州府志廣西寧化人由舉人成化間任衢州同知廉明固執人稱鐵板上司訟牒多委任備禦江上銀礦寇盜大著聲績秩滿升知府吕貞舊浙江通志無錫人衢州推官讞獄必以神明監察四字置案前謹按天啓衢州府作吕卣未詳孰是賀泰天啓衢州府志吳縣人任推官處已儉約居官清謹決獄平反民甚稱焉張俊舊浙江通志博野人𢎞治初判衢州質直清約治事寬平妻沒無以為殮袁文紀萬厯龍遊縣志字邦振六合人𢎞治五年知龍遊縣蒞政嚴明剖事如流新公署創尊經閣建預備倉立小學修邑乘屢興大役民不為病饒泗衢州府志江西進賢人𢎞治六年任衢州府捐俸散粟以恤旱災給資勵課以興學校妻孥不入官舍布被脫粟冰厨屢空捐館僚友躬殮見其行笥蕭然士民白衣攀送直抵懷玉立饒公明德祠程倫𢎞治開化縣志太湖人𢎞治六年由舉人知開化縣存心正大門無私謁下車之初屏除姦弊修舉廢墜其於學校尤加意焉談讓獻徴録字汝卿𢎞治中通判衢州政尚嚴厲夜冇書廨壁者曰虎豹在山雷行於天人宜自度不可犯談讓顧而笑曰為政不能使民無犯乃使民不可犯耶更治簡緩民愈稱之頃之江山民與江西民相侵殺有司莫能決讓至未閲月立解攝府事禁嫁娶論財寬租稅減土木平徭振學咸有經紀開化江山令缺民請監察皆願得談署篆監察委讓開化而别遣署江山江山民遮道訴留車不得赴遂兼署兩縣是時姚源賊為陳圜出沒開化境讓嚴部曲謹烽燧招投距士置戲下為禦賊計賊語曰此故父母善吏何可忘也迃騎速過竟全其營初讓與賊遇以兵少間道馳深山中山中巨室方楠見讓而泣讓怪問故楠曰吾有五子賊起悉報為兵而公僅留其二令二子雖戰沒而吾尚有三子且山多獵家皆公故所免勿為軍者請為公招之乃持讓手筆遍示得七十餘人夜直入賊卧所擒殺其首賊驚以為大兵至悉奔散又嘗以檄往城常山議資百萬讓曰官不私財役不私力何百萬之為也城二月而就卒無橫費遷雲南昆陽州知州蕭顯分省人物考字文明山海衛人成化壬辰進士擢兵科給事中𢎞治戊申同知衢州府勾稽戎籍取非法刑具悉焚之得隱丁甚衆他如撫煢嫠修學舍士民賴之擢福建按察司僉事楊璨分省人物考字仲玉華亭人𢎞治辛未進士筮仕桐鄉調開化令去桐之日民輟耕罷市攀援載路開化人好訟重利輕生生女不舉皆痛與懲創收馬金鎮之豪沮饒信桃源之盜寬殘破之賦尤為人所懷後升刑部主事立祠祀之名鐵知縣祠謝珊萬厯龍遊縣志字伯聲松滋人正德八年由進士知龍遊縣治行練達不事鞭撲而民知畏法出見道路傾圮捐俸修治不以煩民召拜御史宋育衢州府志山東德州人由進士厯升郎中正德十年任衢州饒寇作亂常開二邑亦為殘耰官軍次衢育綜理周密上肅軍令下撫居民雖盛暑不憚勞瘁寇平竟以傷暑致疾卒劉穎天啓衢州府志字時秀臨川人正德十二年由進士知開化縣政務不擾時民多疾疫延醫遍為疹治及已子病勿為意民歌曰我公憂民如憂兒兒今病愈其何如其愛民如子可知劉佐衢州府志字時命江西安福人由進士任龍遊嚴毅有為廢墜畢舉訪民瘼勸本業禁豪猾綏善良時俗多溺女嚴為之禁通媒妁省婚聘民從其化生聚日繁林有年衢州府志字以永福建莆田人由舉人正德十五年擢守衢州毁淫祠改創社學選教讀訓民間子弟修築號舍諸生肄業於中士習丕振織染局段匹取於荒絲歲入酎金俱却之衢道要衝立節省之法夫役支應視昔減半歲丙戌不雨竭誠而雩雨降民獲有秋丁亥大飢捐俸設粥去之日行李蕭然陳釴天啓衢州府志常熟人正德中知龍遊縣守已廉平為政簡易用堪輿術於學左雞鳴巖築浮圖正當巽位自此科第相繼升刑部主事後祀於學張潤身衢州府志直隸成安人由進士為西安令咨訪民隱剔姦搜弊罔不盡心奉檄清理田糧根求弊端悉行釐革稅畝歸正得上古均田之意刻石縣門杜絶後姦黃仁山衢州府志字元靜江西新淦人由進士任刑科給事中忤時宰出守嚴州尋謫西安縣丞下車即署縣篆芟鋤強猾清釐積弊改邑庠號舍開泮池去之日士民為立碑於清獻祠北林鍾衢州府志字太和廣東高要人由進士任西安令作粥活飢停徴逋負苞苴請托不行他邑有疑獄積年不斷者當道下鍾勘悉得白其事簡閲天啓衢州府志高要人嘉靖二年由舉人任衢州府通判持身簡重行政不苛禮士愛民一時頌之陳文禹衢州府志字佩昌長樂人嘉靖六年為龍遊訓導性剛介雖暗室言笑不茍諸生贄儀悉不受貧無資者召至門下餼之嘗見監司以其不跪途呵之即日投劾去巡按及提學御史固留之托疾歸李遂名山藏字邦良豐城人嘉靖五年進士授祠祭郎中會同官王慎中外謫遂與諸僚餞之郊夏言劾遂無故不參公座謫湖州府同知尋升衢州知府治衢一以教化為先處州飢流民以採礦為名糾集入境大肆掠劫遂與推官李文進輕騎直逼礦山駐宿賊聞中夜焚寨去時隨從不滿百人火起皆促遂出遂堅卧曰賊不意吾來將謂大兵合矣此燒寨走也已而果然文進曰盍追之遂曰此皆飢民不為患苦足矣遣兵躡送出境閉礦而還郡廳有冢相傳為郭璞墓發之不利於守遂曰郡廳也而邱壠在其下耶且景純不歿於此發之得石笋二乃唐刺史李郈所樹者又周王廟多靈應郡民率走祈福遂訪之神為孝子易廟額曰周孝子祠表祀宋趙鼎范沖魏矼翁蒙為四賢祠以屬民望一日衢山谷民造庭者數輩遂問父老何訴皆曰自使君下車里閈無擾豪橫改行民輩已老見守衢未有如使君者民輩特來望顔色考治行第一升蘇松兵備副使以南京刑部尚書卒贈太子少保諡襄敏林浩衢州府志福建龍溪人嘉靖七年任衢州府教授性嚴毅方正勸學興禮復堂齋號舍之法黎明出公座分齋背誦然後升堂講説已乃退業於號舍每三日課試於堂校第文藝尤敦崇德行貧者節餽不受且周之於廟祀禮樂制度極為講明大冢宰霍韜聞其賢特疏薦之升國子監博士侯祖德江山縣志無錫人嘉靖七年知江山縣寬和簡易催科不迫詞訟平允不拘成案士民悅服升太僕寺丞張江天啓衢州府志字宗海廬陵人嘉靖八年由舉人知西安縣持守廉潔興學校正士習立小學復義倉設義冢均徭役子視其民民愛之如父母歌咏成帙名稽古化民録趙可與衢州府志字令中江西安福人由舉人厯兵部郎嘉靖七年知衢州府郡賦沿正德末年增折額以貸湖漕可與以狀聞當道為之改正興學校嚴課藝士貧者給油米助婚嫁一時人才多賴陶淑墾地賑荒撫善摘姦遇旱祈禱輒雨民為立仁雨亭楊梓天啓衢州府志江西安義人嘉靖十一年為衢州通判為政剛明人不敢欺尤加意士習王仲錦衢州府志字絅之吉水人進士由刑部郎知衢州首革積弊廉威並著性簡直寡言笑禁絶請托不畏權勢節減支應夫馬過賓多不悅改知廣東惠州府楊子臣衢州府志字惟敬四川南充人為衢州知府性寬厚輕刑薄罰愛士急農下車值歲歉請監司賑貸而益以俸資丙午歲大旱竭誠致禱甘雨如注程達衢州府志字時望婺源人同知衢州府恬靜寡欲禮士愛民視篆龍遊儲積獨廣拯開化之溺全活者衆劉起宗衢州府志字宗之巴縣人嘉靖十九年為衢州推官銅山民為盜起宗帥義勇攻之賊據險相拒起宗令卒潛斷澗邊小橋分兵兩翼以善射及能負重者居前執戈矛者次之賊一人右趨欲騷陳官兵一人左往向之遇而相搏遂斬首以示賊賊驚懼至澗不得渡官兵夾擊之俘獲甚衆自是礦徒屏迹張澤獻徴録字大被桐城人嘉靖戊戌選貢為衢州别駕逋賦者盈囹圄寬為期而出之感泣爭輸自奉甚約民稱張青天會龍遊常山皆乏令監司使攝龍遊而常山民要之曰張公奚而薄常山監司乃復從常山請時督府胡宗憲威傾兩浙其前驅求索無厭澤縛而杖之白其情欲解綬去宗憲更延以賓禮戒部下曰而不知此郡有廉吏乎供具減十之五督府新募之兵數百擁主糧者而譟澤馳至咸曰張公至矣遂凛然散有礦寇據處州傷官軍將及於衢衢守議避之澤曰不可單騎諭以威福給米數石曰為爾歸餉母擾一方民寇相戒不入衢升廣安知州僉憲雲南尋改巡武定錢仕龍遊縣志知江山有士人為讐陷殺人郡坐抵罪仕勘得其誣立宥之吏白此上官意叱曰殺人以媚人吾不為也民俗輕死動輒自經仕令反坐其家民始知畏縣署悉燬咸鼎新之民未嘗以為勞周臣天啓衢州府志字子忠霸州籍吳縣人嘉靖二十八年知衢州府蒞政嚴明姦吏無所措手士大夫無由請托去之日耆民扳轅於道孫繼祿天啓衢州府志上海人嘉靖二十二年以舉人知開化縣恭慎有守豪強知畏而恤民愛士咸得其心俞大有衢州府志莆田人嘉靖三十八年以舉人知西安縣礦盜攻剽鄉邑大有集民兵抵巢俘斬亂首餘黨解散楊凖衢州府志字汝宅宜興人進士嘉靖三十八年任衢州知府修文廟新賓館建上遊之防濬古河之流水繞龜峯火災頓熄至今稱楊公湖初授計别駕張澤驅勦礦徒次年調度縣令俞大有俘礦賊之首三年諭散再聚之礦寇四年逐散流賊既轉閩藩大參便道過衢復與後守議置學田捐資以助祝芹舊浙江通志山東武城人嘉靖間任衢州府知事礦山盜聚太守命督五邑民兵驅而赴敵兵以素不練習莫能前芹父子善騎射突騎而進射殺賊衆數十人賊為披靡卒死於賊别駕張澤憤怒進兵忽一羸卒賈勇奮殺乃芹父子隂助之附祀周宣靈王廟余一瓏衢州府志號見田婺源人進士任江山令邑舊無城且近山澤寇盜竊發防禦為艱一瓏創議不日城之俗負氣健鬬瓏訓迪以禮勸諭兩造和好更進諸生課以文藝朔望聚講示以敦倫睦族境內丕變陳彌正舊浙江通志江西南昌人判衢州守已清介歲却糧儲例銀千兩去之日行李蕭然冉崇禮衢州府志河南中年人由進士知西安縣厯仕四年冰蘖自守秋毫不以煩民待羣吏諄諄訓飭律令章程井井有條裁冗費節賦役勞心撫字以民食為急凡陂堰潰決必先時修築旱潦有備李翔衢州府志廣東揭陽人任衢州推官攜一老僕赴任清操自持朝夕止供一乾魚剛正不能媚上而厚於恤下作興學校諸生進見禮遇若家人父子讞獄案成雖上官少欲輕重不能一易也西安有強賊數輩翔至立杖殺之盜賊屏息後升主事張斯軾衢州府志惠州人嘉靖三十九年由舉人任常山令時廣西流賊袁鳯率徒黨三百人自閩而浙突入廣濟驛中將劫縣庫斯軾邀其酋上坐呼為鄉里饗以牛酒適開化民兵五百檄召至府道經城下賊虞有備遂不敢動居十日給與口糧使出境後趨王山令不為禮夜縱焚劫常人頌其功梁問孟衢州府志新卿人隆慶元年由進士知西安縣時稱其愛士如師傅之教生徒撫民如父兄之育子弟恤惸獨如慈母之乳嬰兒制吏胥如扁鵲之治臟腑袪豪橫如鷹鸇之逐鳥雀衆但見其怡然色笑適然晏坐而不知其事機猝辦咸以為神何東序舊浙江通志山西符氏人隆慶初知衢州綜核精嚴剖釐果斷案牘如山秋毫洞燭每鞫訟令吏役煮湯水聽兩造持糗餌飲潄而去毋覓居停湯仰衢州府志新都人嘉靖進士隆慶二年知衢州同時屬令梁問孟上下同心具以撫字為主前此何東序雷霆之中沛以雲兩仰繼之皎日之下噓以和風一時兩守百姓稱為二天張克文衢州府志字宗質新淦人進士隆慶二年知常山縣時初議條鞭克文核實舉行立收匱於堂前令收戶母得過針立一爐於堂右令解户併封傾錠清丈田土履畝躬算汰浮糧八百餘石催徴舊例費銀八十餘兩解絹舊例有印硃紙價一百餘兩鹽商開引有例銀五百兩悉行申革至今為法增常夫八十名杜枉捉鄉民之患造差船十二隻蘇橫差民船之苦接引士類校藝説書凡經奬拔多登科第李瀾衢州府志判衢州善行常平之法署四邑篆勞心興除在信安則調停船夫差役在龍邱則化嚚訟在常山則墾闢荒萊在開化則清理木客至除里甲幫索之例恤織造進輸之艱仁心惠政不一而足若其夙猾巨姦嚴治不少貸唐九德衢州府志字伯懋湖廣湘潭人丙辰進士隆慶四年知衢州府衢自遭礦寇之亂瘡痍未復九德一意拊循民始得寧宇尤振興文教士習丕變塗杰衢州府志字汝高南昌人嘉靖進士隆慶五年知龍遊縣搜剔吏弊以嚴為主撫恤民瘼以寬為主作興士類以教化為主官署學舍舉廢更新贖鍰有餘盡充公用歲旱步禱雨必應士民感悅薛夢雷衢州府志號鳴字侯官人隆慶辛未進士六年知江山縣才智過人熟諳吏治案牘皆其手裁胥役凛奉法紀後由侍御厯轉浙藩邵仲祿衢州府志夔州府夔塘衛人由進士為江山令清操絶俗作興學校鼓勵士風文運大振清丈田畝貧户虛稅盡除吏胥飛灑弊絶入計時惟圖書一篋襆被一囊轉銓曹韓邦憲獻徴録字子成高淳人已未進士知衢州府初至問民疾苦陳八事曰明大義專責守實節省復成法議賦役講實政廣儲蓄嚴武備皆本經術遵舊制而酌以民情土俗鑿鑿見諸施行為政務崇大體祀漢龍邱長宋趙清獻旌孝子節婦捐已俸以供生徒之誦習僉絹户以消機匠之姦貪覆運米以省軍士之賠纍清羡金以抵額外之徴需衢之輕折米為鄰府所借請還以備災賑無何以疾卒陳澗衢州府志字洪洲湖廣零陵人進士萬厯五年知衢州府執法公嚴有犯必懲屬吏有潛行苞苴者核實上之羣吏罔不震悚留心民瘼編查五邑塘堰令有司督民濬築李一陽衢州府志字復吾丹徒人丁未進士萬厯六年任西安令摘伏發姦課士取實誼黜浮華時當丈量躬自履畝於田稅每畝減九釐地稅每畝減三釐三毫水淤地三畝折一畝山荒地二畝折一畝歲省民間稅銀數千升南京浙江道御史傅良言天啓衢州府志臨川人萬厯九年知常山縣覆丈通縣田地各減虛耗三釐催徴糧稅不行鞭撲聽訟立為剖決人稱神明許國誠衢州府志字孟葵晉江人癸未進士萬厯十一年知西安縣政崇惇大字民以仁幾至刑措事上以正不屑逢迎雖催科甚緩而民無逋賦李道先天啓衢州府志安溪人萬厯十二年由舉人任衢州府同知性格沈毅操履峻潔攝符郡邑有聲總理戎捕有法王臨亨西安縣志號止庵崑山人萬厯十七年由進士知西安縣為人剛毅愛民肫切有窩盜者廉得立斃之四境股栗易倣之衢州府志號霍岡進士萬厯十七年知衢州府熟知五邑差解之苦將各糧米均為十段編簽差解酌道里之逺近以定盤費由盤費之多寡以定米糧米多者僉為正户管解錢糧米少者僉為貼户止幫路費正解執票自向貼户取討法立民免困纍陳端言天啓衢州府志海陽人舉人萬厯十九年同知衢州居官清介人稱其善行有四皆本於清云郁德據衢州府志號心我貴州普安人舉人萬厯十九年知龍遊縣收糧平兊平收解糧原封領解兩造盈庭片言剖決有不到者竟裂其牘每念切士風民俗嘗折節拜於貞女之堂五載考最轉判東昌府士民泣留遂以别駕仍攝縣事蔣光彥舊浙江通志晉江人進士萬厯二十四年任江山令江民朴直激之則悍光彥馴而拊之坦然歸心糧無逋訟無終一變其習林雲西安縣志字從龍福清人萬厯二十四年以進士知西安縣歲當大造除隱灑之弊大旱禱雨賑飢全活甚衆中璫將開礦悉心調停商民兩便捐俸建鐘樓置學田張堯文衢州府志字復吾新淦人癸未進士萬厯二十七年知衢州府擒戮盜窩搜剔豪猾無不當其罪賭博者毁其廬令行禁止歲旱祼膝拜禱數日雨如霔堵維垣江山縣志字師甫無錫人萬厯二十七年以進士知江山縣英敏精練判案如山吏胥守法有中貴宣言邑産土青旦暮移檄來取勢張甚維垣即對使者厲聲讓之中貴聞而心折楊世勳衢州府志字濟美江陵人辛丑進士萬厯三十年知西安縣勞心撫綏每訟詞入輒勸解投息公庭如水夏其光舊浙江通志新建人萬厯中授夀昌令調常山讞獄不加箠楚以仁義化民數載報最召入諫垣行李蕭然俞琬綸舊浙江通志長洲人萬厯中知西安在任五稔政清事簡人稱豈弟葉祿獻徴録字文科天啓初知開化縣門廡肅然餽謁無所容公退則荷畚蒔蔬編竹為器身親農圃之事每食惟園蔬而已學宫明倫堂災捐俸重建民有負山為險結族為強者祿廉其不法事痛繩之改任感恩常民思之林應祥衢州府志同安人天啓二年由進士知衢州府修府志建郡學葺橋梁士論方之覃懷韓公六姚孫矩舊浙江通志桐城人天啓間知龍遊縣悉心民瘼剔除姦弊甫及期以艱去後厯浙江水利僉事道但宗臯衢州府志號陶村星子人天啓五年知開化縣蒞政精敏勤於課士時議採雲霧山木宗臯具七不可以聞事遂止賀康載西安縣志號青園江西永新人舉人天啓間知西安縣洞悉民隱興革悉當復雇役之常夫船有編甲馬有更番民忘征徭之纍鼎建邑學割俸以倡張文達舊浙江通志雲南保山人崇禎間知衢州府建樂豐倉以儲賑濟之需創試士館以免調考之苦訟簡獄平幾至刑措花上苑西安縣志南兗人崇禎四年由進士知西安縣政尚和緩務以德化民凡民間搆訟必委曲訓導之令退思三日乃就訊多有愧悔和解去者國朝崔華名宦留祀册平山人進士康熙六年任開化知縣下車即捐建義學衡文校藝士風丕振開邑向有里總陋規橫派民不勝苦華至即革除之丙寅閩寇猖獗防辨通賊陷城露刃逼從華賫印間道出至開之十六都號召義勇鄭大來夏祚等泣血傳諭立聚萬餘人躬冒矢石五日而恢復其城平定後流民初集積逋難徴華繪圖請免總督李之芳代題得旨全蠲康熙十六年以前四年錢糧難民子女流離散失者通詳遍訪捐金贖回小民復得完聚疫氣盛行廣開藥局療治全活無算其有死於兵死於疫者悉買棺瘞埋野無暴骨升揚州知府轉陜西涼甘道布政司參政王𢎞仁舊浙江通志遼陽人恩貢生康熙十三年任湖州守調衢州時當閩叛禁旅雲集調劑滿漢官兵指陳方略動中機宜請蠲請賑民賴以蘇會內艱去晉大忠山西鄉賢册字心葵趙城人從軍浙江署沿海守備奪戰船生擒賊將史良謨耿逆之變轉戰龍遊金華功績甚著以守備管遊擊事調赴衢州至繆村與賊戰橫刀馬上斬馘數十人力竭聞而死事賜祭一壇厚恤其家閻有功表忠册遼東人任衢協右營把總康熙十四年三月禦耿逆殉難於西安縣之繆村督標聞豫營兵金玉從死事恤諭祭一次廕一子衛千總金玉並加恤賞盧燦名宦留祀册海州衛人監生康熙十三年任龍遊知縣時盜賊充斥燦勦撫並施恩威並著事平後教養交修士農胥勸在任八年卒於官陳鵬年公舉事實字滄洲湖廣湘潭人康熙辛未進士三十五年知西安縣民户多為虛糧賠纍鵬年申請丈量每都設公正二人每圖分十區設區長二人區長同花户自文自田每丘插立牌扞上書弓口若干積步若干現田若干業主某人區長彚其總數交與公正另造清册務使現田科糧豁除絶戶而以丈出餘糧補從前缺額又留心水利將承堰水田編為十甲遞年輪流擇甲內田多而齒壯者僉為堰長督率人夫築砌堰壩其堰夫工食及需用物料照田出費每畝三釐二毫衆皆樂從縣西北百里有銅山姦民聚衆開礦鵬年申請嚴檄驅除之有鄭榮祖妻徐氏者夫舅俱死於寃訴之前令以事在赦前不省氏憤觸石碑而死棺露置城西鐵塔下已七年矣鵬年廉得其狀為雪其寃造墓立祠題額曰孝烈他若建文昌閣廣漏澤園治橋建閘葺學修志平糶緩徴禁止停喪溺女善政不可勝舉升任江南厯官總督河道熊昭應名宦留祀册永定人康熙四十三年由舉人知常山縣性甘淡泊事持大體宣講聖諭修學宫課士勸農耕作錢糧自封投匱行戶現給價值斷獄哀矜勘荒請賑奬善良而鋤姦蠧民皆德之浙江通志卷一百五十五
