body:
  text: 浙江通志卷二百七十八藝文二十詩七言絶句湖上莫歸元趙孟俯春隂栁絮不能飛雨足蒲芽緑更肥政恐前呵驚白鷺獨騎欵段繞湖歸湖州元戴表元山從天目成羣出水傍太湖分港流行遍江南清麗地人生只合住湖州西興馬上元戴表元去時風雨客匆匆歸路霜晴水樹紅一抹淡山天上下馬蹄新出浪花中西湖行春元黃庚畫船無復沸笙歌湖水年年自碧波回首蘇公隄上桞緑隂不似舊時多臨平泊舟元黃庚客舟繫纜桞隂傍湖影侵篷夜氣涼萬頃波光搖月碎一天風露藕花香西湖絶句元薩都拉湧金門外上湖船狂客風流憶往年十八女兒搖艇子隔船笑擲買花錢惜春曽向吳船宿酒渴吳姬夜破橙驀聽郎君呼小字轉頭含笑背銀燈待得郎君半醉時笑將紈扇索題詩小紅簾捲春波緑渡水楊花落硯池簫臺八景元李孝光古帝南巡事已非土階茅屋尚依依夜深月底吹簫去度得雲門一曲歸雲門福地蝙蝠翻雲似白鴉石林玉氣亂晴霞山中雞犬應相笑溪上紅桃幾樹花蓋竹洞天雨洗天根雲洞幽黑蛟飛雹舞長湫只應壯士思酣戰組練相銜夜不收雙瀑飛泉山月峥嶸露映環石樓香冷白雲間玉簫吹裂階前竹騎鶴仙人去不還簫臺明月風約踈鐘下杳冥天南曙月颭飛星駝鳴閶闔囂聲起老鶴巢深夢未醒白鶴晨鐘蕭蕭清磬出雲遲月上空林日氣微重過紫芝山下路壞橋燈火照人衣紫芝晚磬海月四更移塔去天風萬里劈松開煙銷日出無人到獨自看雲山上來東塔雲煙山上行人如凍蠅西崖日出淡青熒太隂積雪草木縮留得孤松長茯苓西岑松雪錢塘懷友元黃清老舟泊楓林一鴈聲白蘋紅蓼共思君月明江水多於海雨後秋山碧似雲九日登玉霄峯四首元曹文晦九日登山正自佳松梯微露濕青鞋重巖細菊斑斑出一路題詩寄客懷嶺頭回首是官塘野樹青紅天雨霜清氣著人吟不盡玉霄峯頂過重陽白雲如屋深復深白雲之外松樹林别峯線路入雲去直恐西通天姥岑洞門雲氣合玄黃洞裏仙人白罽裳見説金鐘飛去逺不應雞犬不騰驤九曲樵歌十首并序録七元曹文晦昔考亭朱子作武夷九曲棹歌余少小愛之誦甚習近登桐柏嶺路盤回亦有九折因仿之賦桐柏九曲樵歌固不敢較先賢之萬一亦效顰而忘其醜也瓊闕峩峩接太清五雲洞口問長生欲知嶺上無窮景聽取樵歌四五聲一曲初過亂石硿兩山松柏翠重重下方樓閣天台觀坐聽殘陽數杵鐘三曲天開罨畫屏松風吹鬢不勝情山城石甃無蒼蘚絶愛鏗然放杖聲四曲崚嶒上石梯烏巖千仞與雲齊巖前風起藤花落一個畫眉松上啼五曲翻身看晚霞平川厯厯見人家桐溪水滙清溪曲山似遊龍水似蛇七曲彎彎翠櫟林風吹萬葉自清音行人已在長松杪回首原田似井深九曲巖腰坐碧苔吹簫人去有空臺雲深不見來儀鳯野鳥自啼花自開過鑑湖二首元貢性之歸思關心路轉遙打頭風急滯蘭橈夕陽江上秋無數血點蜻蜓立碧苕南風吹斷采蓮歌越渚船開小似梭却恐紅粧不成態背人偷照鑑湖波蘭亭元張天英酒醒風雨濕衣巾曲水荒涼幾莫春簷外蕭蕭修竹在相逢如見永和人釣臺并序元貢師泰嚴陵釣臺詩古今作者甚多或髙其隱或議其果二者皆不為無見故並存焉觀者應為一莞也百戰關河血未乾漢家宗社要重安當時盡著羊裘去誰向雲臺畫裏看桐江道中元吳師道東風緑水動微波晚泊灘頭理釣蓑喚起江湖昔年夢一帆寒雨聽漁歌西興元朱德潤八月海門天氣涼潮頭如雪上錢塘斜陽更比歸人急又引輕帆入富陽柯亭元黃鎮成金碧樓臺宅梵王柯亭無處問中郎何當截取如椽幹吹起崑丘紫鳯皇臨安訪古六首元張昱舊日婆留井未湮石闌苔蘚上龍鱗而今率土皆臣妾莫願皇天産異人婆留井峯頭石塔表功臣五百年前是佛身莫問蓬萊水清淺野藤猶蔓劫餘春功臣塔錢王功業與天齊百里旌旗照此溪從此波中鋪錦後至今光景淨無泥錦溪將軍官重執金吾不比秦朝列大夫王為錦衣歸故里遂令老樹有稱呼將軍樹東山尚存環翠閣謝傅來遊經幾年可是舊曽擕妓到粉香猶在畫欄邉環翠閣祥符額賜海會寺回首年來彈指過試問竹林橋下路往還曽見幾東坡淨土寺吳興道中二首元張雨眠溪大樹不見日牧鵝小兒兼釣魚南風相送玉河口舟子飯時吾讀書扁舟偶趁采樵風題扇書裙莫惱公何處人間無六月碧瀾堂上雨聲中三衢道中三首元張雨大溪中道放船流船壓山光㵼碧油三百里灘欹枕過買魚釃酒下嚴州東風惡劇雨飛花被底春寒水漲沙蘭茝溪香小回首一峯晴雪是金華界道飛流山翠重杜鵑無語杜鵑紅歸人一舸貪新水渾墮丹青便面中西湖竹枝詞明束宗癸初三月子似彎弓照見花開月月紅月裏蟾蜍花上蝶憐渠不到斷橋東曉發秀州明徐賁路出雙湖煙樹東舟行長是雨兼風夢回重有離家恨惆悵春寒此夜中送張景則歸天台明徐賁浙江東去有名山路逺天台鴈蕩間我未得遊空悵望是君鄉里喜君還淳安棹歌明汪廣洋淳安縣前江水平越女唱歌蘭葉青山禽只管喚春雨不道愁人不願聽蘭溪棹歌二首明汪廣洋涼月如眉挂栁灣越中山色鏡中看蘭溪三月桃花雨夜半鯉魚來上灘野鳬晴踏浪梯平越上人家住近城箬葉裹魚來換米松舟一個似梭輕題林處士觀梅圖明錢宰放鶴仙人不可招斷河殘月夜聞簫别來欲問真消息花落西泠第二橋西湖竹枝詞明丁麟湧金門外春水多賣魚船子小於梭三三兩兩唱歌去驚起鴛鴦飛奈何貞溪初夏四首明邵亨貞雨後深林竹筍肥渡頭風急栁花飛柴門不掩緑隂靜人在間窗試苧衣巡簷燕子掠晴絲隔塢茶煙出院遲草色入簾人不到午風吹暖夢回時楝花風起漾微波野渡舟橫客自過沙上兒童臨水立戲將蘋葉飼新鵝小巷繅車霜繭熟前村社鼓野人來鵓鳩聲在樹隂裏竹下柴扉晝不開盤山道中明林溫盤山嶺頭春雨多天台鴈蕩雲相摩鷓鴣啼入竹林去我行不得君奈何杭州歌明張以寧西陵渡口潮水平十十五五放舟行樓中燕子慣見客不怕渡頭津鼓聲過桐廬明張以寧江邊三月草淒淒緑樹蒼煙望欲迷細雨孤帆春睡起青山兩岸畫眉啼夏日憶西湖明于謙湧金門外桞如煙西子湖頭水拍天玉腕羅裙雙蕩槳鴛鴦飛近採蓮船西湖夜宿明李進蹇驢衝雪岸烏紗夜醉西湖賣酒家十六吳姬吹鳯管捲簾燒燭看梅花葛嶺懷古明陳雍山上樓臺湖上船平章醉後懶朝天羽書莫報樊城急新得蛾眉正少年載酒過湖明劉英寒食清明次第來紫苞紅夢裹池臺東風似與人商略最好花枝最後開題許上舍家梅花明聶大年西湖曽繫木蘭橈湖上殘雲雪未消報道南枝春信早移船更近段家橋桐溪明李蕃萬年禹鑿東連海百折清流曲抱村風浪不驚魚鳥盡桐花開到邑侯門南湖即事明周瑾湖水空明靜不波蕩舟人逺夕陽多秋來無限相思意欲採芙蓉奈晚何春日湖上四首明鎦泰浴鵠灣頭蕩槳過雨聲昨夜漲湖波落梅天氣寒偏峭未許春衣試薄羅步逐東風踏軟沙背人驚鷺去斜斜兩株紅杏踈籬外知是湖村賣酒家小鬟扶處醉瞢騰落日寒生半臂綾燕子不來春尚淺湖隂留得未消冰櫻桃花發向陽枝便覺韶光暗有期明日重來應爛漫雙柑斗酒聽黃鸝湖上暮歸明鎦泰小􅐒馱醉踏殘花柔緑隂中一徑斜日暮歸來問童子春衣當酒在誰家斷橋分手二首明史鑑日暮橋邊酒棹回更因殘唱送餘杯人生易老春光暮能為看山幾度來近水人家半掩扉兩山樓閣尚斜暉斷橋無數垂楊桞總被行人折漸稀寄杭州友人明史鑑西湖湖上水初生重疊春山接郡城記得扁舟載春酒滿身花影聽啼鶯西湖聞笛明范言月白霜寒客夢醒笛聲迥出栁洲亭莫教吹過孤山去風裏梅花不耐聽月夜下桐江聞孤雁明王叔承煙月滿江漁火寒一聲孤雁下蘆灘隔天總有家書到水碧山青不耐看鏡湖竹枝詞二首明徐渭越女紅裙嬌石榴雙雙蕩槳在中流憨粧又怕旁人笑一柄荷花遮滿頭杏子紅衫一女郎鬱金衣帶一葦杭堤長水濶家何在十里荷花分外香題趙文度畫西溪梅花明謝三秀欲雪不雪天淒淒南枝北枝開漸齊因訪梅花過橋去始知春在西溪西梅溪明董份雲似魚鱗壓市低竹簰載笋出梅溪逢人間問崑山路葛嶺西頭更向西葛塢作二首明董份笋鞭橫出欲穿籬松子才生鼠不知細雨一林山鬼語白鷗浴起葛公池鴉銜朱柿墜秋坡竹筧疏籬帶碧莎野菊滿頭山下女也能學唱采茶歌西湖有長年小許每以小舠載豫往來湖中臨行乞畫戲題明李流芳常在西湖煙水邊愛呼小艇破湖煙今朝畫出西泠路乞與長年作酒錢贈翁鄞縣明錢希言四明二百八峯盤霧閣雲窗緑玉寒不信謝郎為縣令三年騎馬未曽看會稽竹枝詞明王翃秋風秋雨正淒淒荷葉荷花香滿溪越女蕩舟愁日暮歌聲盡在若耶西鴛鴦湖明髙承埏兩湖秋水抱城斜縹眇樓臺帶落霞日暮鴛鴦看不見數聲風笛起蘆花南屏歸艇遇雨明談貞竑望裏南宫潑墨山小窗殘燭放舟還從容畢竟輸漁父藕葉菱花泊淺灣夜泊常山明胡甲桂淙淙灘響上舟遲到面山容未即移更喜月明迎短棹吳吟細聽隔船詞西湖月夜二首明祝淵落月鱗鱗水面浮露華濃滴桂叢秋不知何處鳴柔櫓驚起一雙雪色鷗佛火魚燈漸寂寥推篷起坐已中宵夜來極浦灘聲急知入西陵第幾橋西湖明徐穎水中樹影樹中山山自無心水自間明月兩堤人不見小舟獨向斷橋邊國朝西湖泛月范承謨團團十里盡青山遍插荷花繞水灣莫怪遊人清興逺扁舟更載月明還西溪探梅范承謨醉眼朦朧望夕暉素枝斜映玉煙飛髙歌一曲拈花帶載得春光午夜歸鄮東竹枝詞李鄴嗣太平海國久無塵雨瑞風祥四序均虎不嚙生龍不怒沙􅪔何物得浸人出郭先經東鄮橋緑楊樹下且逍遙村翁相約來乘興一字田頭看插苖東湖水滿便堪憑髙下田禾盡望登最喜太平好官長官糧不作十分徴小築曽居邱氏村蒼髯三樹看拏雲春風常約扶藜去掃石先披孝子墳山水東鄉足快遊石溪佳句一聨抽輕便度嶺雙肩轎小巧穿橋獨櫓舟往年香客遍東家萬里來瞻小白華七塔寺前先禮拜鳥音已得聽頻伽小甕黃虀送草南換來佳味看來饞一瓶蟹甲純黃醬千箸魚頭細海鹹掃葉新生行竈煙適逢客至素瓷傳只云水味它山好試品東鄉小白泉象坎人家接櫟斜春來白處盡梨花樹頭裹箬深冬摘一顆真消氷雪查渡口尋春路不迷管絃樓下緑楊絲尋常留客都教住唱得當年栁七詞鄮西竹枝詞萬斯同天井山髙不可攀龍藏五窟絶人寰鹿亭樊榭無多路獨有仙人此往還西村資福古招提碧岫為樓嶺作梯門外水波千澗落簷前山影萬峯齊望春橋上望春波草緑蘋香鳬鴨多最是城西好風景共霑帝力聽田歌鄞俗由來不尚華布衣粗飯足生涯田家有子皆知學文治東漸及逺遐獨喜林村蠶事稠一村婦女幾家休織成濶幅生絲絹杼軸咸思貢篚修戲詠醉李吳綺歌舞無端失舊恩蘇臺響屧總消魂多情只有王戎李猶帶東窗指甲痕聞張公綬談武康山水王士禎吳興清逺水晶宫轉入前溪路不窮最愛放船人日好野梅修竹古防風毛大可招飲湖舫同錢宫聲倪魯玉聶晉人尤侗十里荷花栁七詞至今猶放兩三枝此中消夏差堪可髙卧孤山月上時送季偉公歸錢塘尤侗楚尾吳頭路幾遙蟬鳴堤栁影蕭蕭君歸湖上西泠口已過錢塘八月潮歸去南屏自結廬不須長盻越江書青荷碧荇蓴絲菜紫蟹紅蝦篛葉魚鶯脰湖二絶句宋犖垂虹亭畔峭帆開鶯脰湖中激箭來我是滄浪濯纓客寄聲鷗鳥莫相猜孤舟落日漾波心湖樹湖煙四望深空際一聲聞欸乃釣徒