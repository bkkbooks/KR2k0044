西湖西畔正暮山好處空翠煙霏算詩人相得如我與君稀約他年東還海道願謝公雅志莫相違西州路不應囬首為我沾衣江城子錢塘江上宋蘇軾鳯凰山下雨初晴水風清晚霞明一朶芙蓉開遍尚盈盈何處飛來雙白鷺如有意慕娉婷忽聞江上㺯哀筝苦含情遣誰聽烟歛雲收依約是湘靈欲待曲終尋問取人不見數峯青臨江仙上已日游海昌王氏園宋葛勝仲倦客身同舟不繫輕㠶來訪儒仙春風元已艷陽天夭桃方散錦髙栁欲飛綿千古海昌佳絶地雙鳬暫此留連通宵娛客展芳筵蘭亭修褉事梓澤醉名園虞美人卜居青墩鎮宋陳與義扁舟三日秋塘路平度荷花去病夫因病得來遊更值滿川微雨洗新秋去年長恨拏舟晚空見殘荷滿今年何以報君恩一路繁華相送到青墩水龍吟趙祖文畫西湖圗名曰總相宜宋晁補之西湖天下應如是誰喚作真西子雲凝山秀日増波媚宜晴宜雨况值深秋更當遥夜月華如水記詞人解道丹青妙手應難冩真奇語往事輸他范蠡泛扁舟仍擕佳麗毫端幻出淡粧濃抹可人風味和靖幽居老坡遺跡也應堪記更憑君畫我追隨二老遊千家寺摸魚兒錢塘江觀㺯潮宋辛棄疾望飛來半空鷗鷺須㬰動地鼙鼓截江組練驅山去鏖戰貔虎朝又暮悄慣得吳兒不怕蛟龍怒風波平歩看紅斾驚飛跳魚直上蹙踏浪花舞憑誰問萬里長鯨吞吐人間兒戲千弩滔天力倦知何事白馬素車東去堪恨處人道是子胥寃憤終千古功名自誤謾教得陶朱五湖西子一舸㺯煙雨念奴嬌西湖和人韻宋辛棄疾晚風吹雨戰新荷聲亂明珠蒼璧誰把香奩收寳鏡雲錦周遭紅碧飛鳥翻空遊魚吹浪慣趂笙歌席坐中豪氣看公一飲千石遥想處士風流鶴隨人去已作飛仙客茅舎疎籬今在否松竹已非疇昔欲説當年望湖樓下水與雲寛窄醉中休問斷膓桃葉消息小重山與客游西湖宋辛棄疾緑漲連雲水拂空十分風月處著衰翁垂楊影斷岸西東君恩重教且種芙蓉十里水晶宫有時騎竹馬笑兒童殷勤却謝打頭風船兒住且醉浪花中漢宫春㑹稽秋風亭觀雨宋辛棄疾亭上秋風記去年嫋嫋曽到吾廬山河舉目雖異風景非殊功成者去覺團扇便與人疎吹不斷斜陽依舊茫茫禹跡都無千古茂林猶在甚風流章句解擬相如只今木落江冷𣺌𣺌愁余故人書報莫因循忘却蓴鱸誰念我新涼燈火一編太史公書浣溪沙泛舟還餘英館宋毛滂烟栁風蒲冉冉斜小窻不用著簾遮截將山影轉灣沙畧彴斷時分岸色蜻蜓立處過汀花此情此水共天涯又寒食東堂對酒宋毛滂小雨初收蜨做團和風輕拂燕泥乾秋千院落落花寒莫對清尊追往事更催新火續餘歡一春心緒倚欄杆夜行船餘英溪宋毛滂弄水餘英溪畔綺羅香日遲風慢桃花春浸一篙深畫橋東栁低烟逺漲緑流紅空滿眼倚蘭橈舊愁無限莫把鴛鴦驚去要歌時少低檀板風入松西湖宋俞國寳一春長費買花錢日日醉湖邊玉驄慣識湖邊路驕嘶過沽酒樓前紅杏香中歌舞緑楊影裏鞦韆暖風十里麗人天花壓鬢雲偏畫船載酒春歸去餘情付湖水湖煙明日重扶殘醉來尋陌上花鈿念奴嬌觀潮宋陸凝之逺山一帶遡晴空極目天涯浮白楓落鴉翻談笑處不覺雲濤横席酒病方蘇睡魔猶殢一掃無留迹吳㠶越櫂恍然飛上空碧長記草賦梁園凌雲筆勢倒三江秋色對此驚心空悵望老作紅塵閒客别浦烟平小樓人散囬首千波寂西風掃露為君重噴霜笛栁梢青題豐樂樓宋趙汝愚水月光中烟霞影裏湧出樓臺空外笙簫人間笑語身在蓬萊天香暗逐風囬正十里荷花盡開買箇輕舟山南遊遍山北歸來水調歌頭處州烟雨樓落成宋李處全樓觀數南國烟雨壓東州溪山雄勝天開圗畫肖瀛洲我破瀛洲客夢來部仙都符竹樂嵗又三秋聊作幻師戲肯遣後人愁趂佳時招我輩共凝眸君侯胸次一壑意匠付㝠搜刻日落成華棟對月難并清景千丈素光流老子興何極小飲趣觥籌念奴嬌吳興荷花宋姜䕫閙紅一舸記來時長與鴛鴦為侣三十六陂人未到水珮風裳無數翠葉吹涼玉容銷酒更洒菰蒲雨嫣然摇動冷香飛上詩句日暮青盖亭亭仙人不見争忍凌波去只恐舞衣寒易落愁入西風南浦髙栁垂隂老魚吹浪留我花間住田田多少幾囬沙際歸路惜紅衣吳興荷花宋姜夔簟枕邀涼琴書換日睡餘無力細洒冰泉并刀破甘碧牆頭換酒誰問訊城南詩客岑寂髙樹晚蟬説西風消息㶉鶒雙飛鴛鴦斂翼來戲水陌魚浪吹香紅衣半狼藉維舟試望故國渺天北可惜渚邊沙外不共美人遊厯問甚時同賦三十六陂秋色賀新郎游西湖宋劉過睡覺啼鶯曉醉西湖兩峯日日買花簪帽去盡酒徒無人問惟有玉山自倒任拍手兒童争笑一舸乘風翩然去避魚龍不見波聲悄歌韻逺唤蘇小神仙路近蓬萊島紫雲深參差禁樹有煙花遶人世紅塵西障日百計不如歸好付樂事與他年少費盡栁金梨雪句問沉香亭北何時召心未愜鬢先老酹江月題釣臺宋王自中扁舟夜泛向子陵臺下偃㠶收櫓水濶風摇舟不定依約月華新吐細酌清泉痛澆胸臆唤起先生語當年綸釣為誰髙臥烟渚還念古往今來功名可共能幾人光武一旦星文驚四海從此故人何許到底軒裳不如蓑笠久矣心相與天低雲淡浩然吾欲髙舉夜行船越中作宋丘崈水滿平湖香滿路繞重城藕花無數小艇紅粧踈簾青盖烟栁畫船斜渡恣樂追凉忘日暮簫鼓月明人去猶有清歌迢逓聲在芰荷深處曲游春清明湖上宋施岳畫舸西泠路占栁隂花影芳意如織小楫衝波度麯塵扇底粉香簾隙岸轉斜陽隔又過盡别船簫笛傍斷橋翠繞紅圍相對半篙暗色頃刻千山暮碧向沽酒樓前猶繫金勒乘月歸來正梨花夜縞海棠烟幕院宇明寒食醉乍醒一庭春寂任滿身露濕東風欲眠未得聲聲慢問梅孤山宋李演輕韉繡谷柔屐烟堤六年遺賞新續小舫重來惟有寒沙鷗熟徘徊舊情易冷但溶溶翠波如縠愁望逺甚雲消月老暮山自緑嚬笑人生悲樂且聽我樽前漁歌樵曲舊閣塵封長得樹隂如屋淒凉五橋歸路載寒秀一枝疎玉翠袖薄晚無言空倚修竹臨江仙西湖春泛宋趙溍堤曲朱牆近逺山明碧瓦髙低好風二十四花期驕驄穿栁去文鷁挾波飛簫鼔晴雷殷殷笑歌香霧霏霏閒情不受酒禁持斷橋無立處斜日欲歸時齊天樂登禹陵宋吳文英三千年事殘鴉外無言倦憑秋樹逝水移川髙陵變谷那識當時神禹幽雲怪雨恨萍濕空梁夜深飛去雁起青天數行書似舊蔵處寂寥西窻坐久故人慳㑹遇同剪燈語敗蘚殘碑零圭斷璧重拂人間塵土霜紅罷舞謾山色青青霧朝烟暮岸鎖春船畫橋翻賽鼓西子粧湖上清明薄遊宋吳文英流水麴塵艷陽酤酒畫舸遊情如霧笑拈芳草不知名乍凌波斷橋西堍垂楊謾舞總不解將春繫住燕歸來問綵繩纎手如今何許歡盟誤一箭流光又趂寒食去不堪衰鬢著飛花傍緑隂冷烟深樹𤣥都秀句記前度劉郎曽賦最傷心一片孤山細雨祝英臺近春日客龜溪宋吳文英采幽香廵古苑竹冷翠微路鬭草溪根沙印小蓮歩自憐兩鬢清霜一年寒食又身在雲山深處晝閒度因甚天也慳春輕隂便成雨緑暗長亭歸夢趂風絮有情花影欄杆鶯聲門徑解留我霎時凝竚髙陽臺豐樂樓宋吳文英修竹凝粧垂楊駐馬憑欄淺畫成圗山色誰題樓前有雁斜書東風𦂳送斜陽下弄舊寒晩酒醒餘自消凝能幾花前頓老相如傷春不在髙樓上在燈前欹枕雨外熏爐怕艤遊船臨流可奈清癯飛紅若到西湖底攪翠瀾總是愁予莫重來吹盡香綿淚滿平蕪水龍吟雪霽登吳山見滄閣宋翁元龍畫樓紅濕斜陽素粧褪出山眉翠街聲暮起塵侵鐙戶月來舞地官栁招鶯水葓飃雁隔年春意黯棃雲散作人間好夢瓊簫在錦屏底樂事輕隨流水暗蘭消作花心計情絲萬軸因春織就愁羅恨綺昵枕迷香占簾看夜舊游經醉任孤山剩雪殘梅漸嬾跨東風騎謁金門霅上秀邸溪亭宋吳潛溪邊屋不淺不深團簇野樹平蕪秋滿目有人閒意足旋唤一樽􅌬醁菱芡煑來新熟歸去來詞歌數曲醉時無檢束念奴嬌上已曲水園宋盧炳快風收雨正江城初霽物華如許麗日融和春思好是處鶯啼燕語嫩緑成隂落紅堆繡只恐春将暮園林清晝看看又見飛絮太守無限風流鈴齋多暇載酒郊原路隊隊旌旗明閃爍鼔吹更翻新譜曲水流觴蘭亭修禊俯仰成今古為君一醉歸時樓上三鼓酹江月觀潮應制宋吳琚玉虹遥挂望青山隠隠有如一抹忽覺天風吹海立好似春霆初發白馬凌空瓊鼇駕水日夜朝天闕飛龍舞鳯鬰葱環拱吳越此景天下應無東南形勝偉觀真奇絶好是吳兒飛彩幟蹴起一江秋雪黄屋天臨水犀雲擁看擊中流楫晚來波静海門飛上明月摸魚兒湖上宋杜旟放扁舟萬山環處平鋪碧浪千頃仙人憐我征塵久借與夢游清枕風乍静望兩岸羣峯倒浸玻瓈影樓臺相映更日薄烟輕荷花似醉飛鳥堕寒鏡中都内羅綺千街萬井天教此地幽勝仇池仙伯今何在隄栁幾眠還醒君試問問此意只今更有何人領功名未竟待學取䲭夷仍擕西子來動五湖興烏夜啼西湖宋盧祖臯漾煖紋波颭颭吹晴絲雨濛濛輕衫短帽西湖路花氣撲春驄鬭草褰衣濕翠秋千瞥眼飛紅日長不放春醪困立盡海棠風水龍吟錢塘作宋陳以莊晚來江濶潮平越船吳榜催人去稽山滴翠胥濤濺恨一襟離緒訪栁章臺問桃仙浦物華如故向秋娘渡口㤗娘橋畔依稀是相逢處窈窕青門紫陌蒨羅新衣翻金縷舊音恍記輕攏慢撚哀絃危柱金屋難成阿嬌已逺不堪春暮聽一聲杜宇紅殷緑老雨花風絮摸魚兒西湖送春宋陳允平倚東風畫欄十二芳隂簾幕低䕶玉屏翠冷棃花痩寂寞小樓烟雨腸斷處悵折栁柔情舊别長亭路年華似羽任錦瑟聲寒瓊簫夢逺羞對綵鸞舞文園賦重憶河橋眉嫵啼痕猶濺紈素丁香共結相思恨空託繡羅金縷春已暮縱燕約鶯盟無計留春住傷春倦旅趂暗緑稀紅扁舟短櫂載酒送春去曲游春游西湖宋周密禁苑東風外颺煖絲暗絮春思如織燕約鶯期惱芳情偏在翠深紅隙漠漠香塵隔沸十里亂絲叢笛看畫船盡入西村閒却半湖春色栁陌新烟凝碧映簾底宫眉堤上游勒輕暝籠烟怕梨雲夢冷杏香愁羃歌管酬寒食奈蜨怨良宵岑寂正恁醉月摇花怎生去得謁金門吳山觀濤宋周密天水碧染就一江秋色鰲戴雪山龍起蟄快風吹海立數㸃烟鬟青滴一杼霞綃紅濕白鳥明邊㠶影直隔江聞夜笛髙陽臺西湖春感宋張炎接葉巢鶯平波卷絮斷橋斜日歸船能幾番游看花又是明年東風且伴薔薇住到薔薇春已堪憐更悽然萬緑西泠一抹荒烟當年燕子知何處但苔深韋曲草暗斜川見説新愁如今也到鷗邊無心再續笙歌夢掩重門淺醉閒眠莫開簾怕見飛花怕聽啼鵑月下笛甬東積翠山舎宋張炎萬里孤雲清遊漸逺故人何處寒窻夢裏曾記經行舊時路連昌約畧無多栁第一是難聽夜雨謾驚囬悽悄相看燭影擁衾誰語張緒歸何暮伴冷落依依短橋鷗鷺天涯倦旅此時心事良苦只愁重洒西州淚問杜曲人家在否恐翠袖正天寒猶倚梅花那樹臺城路杭友抵越適鑑曲漁舎㑹飲宋張炎春隂不暖垂楊栁吹却絮雲多少燕子人家夕陽巷陌行入野畦深窈籌花鬭草記小艇尋芳斷橋初曉那日心情幾人同向近來老消憂何處最好夜遊頻秉燭猶是遲了南浦歌闌東林社冷嬴得如今懐抱吟悰暗惱待醉也慵聽勸歸啼鳥怕撹離愁亂紅休去掃多麗西湖泛舟元張翥晚山青一川雲樹冥冥正參差烟凝紫翠斜陽畫角出南屏館娃歸吳臺遊鹿銅仙去漢苑飛螢懐古情多凭髙望極且將尊酒慰飃零自湖上愛梅仙逺鶴夢幾時醒空留在六橋疎栁孤嶼危亭待蘇堤歌聲散盡更須擕客西泠藕花深雨涼翡翠菰蒲軟風弄蜻蜓澄碧生秋閙紅駐景採菱新唱最堪聽一片水天無際漁火兩三星多情月為人留照未過前汀八犯玉交枝招寳山觀月上元仇逺滄島雲連緑瀛秋入暮景却沉洲渚無浪無風天地白聽得潮生人語擎空孤柱翠倚髙閣凭虚中流蒼碧迷烟霧惟見廣寒門外青無重數不知是水是山不知是樹漫漫知是何處倩誰問凌波輕歩謾凝睇乘鸞秦女想庭曲霓裳正舞莫須長笛吹愁去怕唤起魚龍三更噴作前山雨虞美人浙江舟中作元趙孟頫潮生潮落何時了斷送行人老消沉萬古意無窮盡在長空澹澹鳥飛中海門幾㸃青山小望極烟波渺何當駕我以長風便欲乘槎浮到日華東木蘭花慢西湖送春元梁曽問花花不語為誰落為誰開算春色三分半隨流水半入塵埃人生能幾歡笑但相逢尊酒莫相推千古幕天席地一春翠繞珠圍彩雲囬首暗髙臺烟樹渺吟懐拚一醉留春留春不住醉裏春歸西樓半簾斜日怪銜春燕子却飛來一枕青樓好夢又教風雨驚囬霓裳中序第一四聖觀元羅志仁來鴻又去燕看罷江潮收畫扇謾湖曲雕欄倚倦正船過西陵快篙如箭凌波人不見但陌花遺曲淒怨孤山路晚蒲病栁淡緑鎖深院離恨五雲宫殿記舊日曽游翠輦青紅如寫便面悵下鵠池荒放鶴人逺粉牆隨岸轉漏壁瓦殘陽一線蓬萊夢人間那信坐看海濤淺風流子西湖元羅志仁歌咽翠眉低湖船客尊酒謾重擕正斷續齋鐘髙峯南北飃零野褐太乙東西淒涼處翠連松九里繡馬濺障泥葛嶺樓臺夢隨烟散吳山宫闕恨與雲齊靈峯飛來久飛不去有落日斷猿啼無限風荷廢港露栁荒畦歎岳公英骨麒麟舊塚坡仙吟魄鶯燕長堤欲弔梅花無句素壁慵題滿江紅題富春館元黄子行津鼓匆匆猶記得故人相送春江上鳥啼花影馬嘶香鞚情逐陽關金縷斷淚和楊栁春絲重算别來幾度月明時相思夢山萬疊秋眉聳春一㸃歸心動問風儔月侣有誰遊從百里家山明日到一尊芳酒今宵共任樓頭吹盡五更風梅花弄水龍吟西湖懐古元陳徳武東南第一名州西湖自古多佳麗臨堤臺榭畫船樓閣遊人歌吹十里荷花三秋桂子四山晴翠使百年南渡一時豪傑都忘却平生志可惜天旋時異藉何人雪當年恥登臨形勝感傷今古發揮英氣力士推山天吳移水作農桑地借錢塘潮少為君洗盡岳將軍淚念奴嬌八詠樓元鮮于樞長溪西注似延平雙劍千年初合溪上千峯明紫翠放出羣龍頭角瀟洒雲林微茫烟草極目春洲濶城髙樓迥恍然身在寥廓我來隂雨兼旬灘聲怒起日日東風惡須待青天明月夜一試嚴維佳作風景不殊溪山信美處處堪行樂休文何事年年多病如削多麗清明飲西湖夀樂園元張翥鳯凰簫新聲逺度蘭橈漾東風湖光十里參差緑港紅橋暖雲蘸鬰金衫色晴烟抹翡翠裙腰罨畫名園閙紅芳樹蒲葵亭畔綵繩摇鴛甃落英堪藉猶作殢人嬌漬羅袂莫愁痕褪生怕香銷憶當年尊前扇底多情冶葉倡條分蘭女隔花偷盻修禊客臨水相招舊約尋歡新聲換譜三生夢裏可憐宵縱留得楝花寒在啼鴂已無聊江南恨越王臺下幾度逥潮望海潮清明登定海招寳山望海元張翥扶桑何許蓬萊何處滄海一望漫漫精衛解填黿鼉可駕凌波直度三韓雲氣有無間只是天是水無地無山贔屭鼇掀颶風俄起晝生寒從今不數鯢桓羡秦人採藥龍伯垂竿槎信未來珠光暗徙羣仙約我驂鸞長嘯壯懐寛且振衣絶頂釃酒長瀾揮手相招片帆飛趂暮潮還木蘭花慢孤山問梅元張翥愛西湖千樹曽幾度為擕尊向栁外停橈苔邊待鶴酒熟香温瀛洲舊時月色悵蒼涼惟有數枝存天上梨花成夢江南桃葉移根如今寂寞對孤村難返暗香魂甚嵗晚春遲角寒笛曉雪暗雲昏登臨不堪寄目但青山影影月紛紛再約與君同醉從他啄木敲門水龍吟題湖山勝概寺元張埜翠微曽共登臨冷光瀲灔三千頃玉京佳處景雖天造也因人勝若把西施淡粧濃抹兩相比並道此間如對姮娥仙子慵梳掠臨鸞鏡滿意曲䦨芳徑早安排雨篷烟艇茶甌雪卷紋楸雹碎醉魂初醒湖海髙情林泉清意幾人能領算知音只有中宵涼月浸蓬萊影水龍吟游錢塘西山元張埜一鞭空翠烟霏笑談已到山深處丹厓翠壁野猿遊鳥冷泉髙樹兜率天中蓬壺境内偶成佳遇正捫參厯井窮探未了囬首早疎鐘暮畫舸亭亭横渡醉歸來被誰留住雲窻霧閣羣仙應笑塵縁相誤白雪歌殘青鸞夢覺滿身風露料明年却向古臺髙處憶桃源路菩薩蠻越城晚眺明劉基西風吹散雲頭雨斜陽却照天邊樹樹色蕩湖波波光艷綺羅征鴻何處起㸃㸃殘霞裏月上海門山山河莽蒼間浣溪沙處州葉叔安溪門草堂明劉基細草垂楊村巷幽白沙素石引溪流青苔磯上有扁舟門外好山開罨畫屋頭新月學簾鉤窗風一榻似清秋玲瓏四犯台州作明劉基白露㸃珠明河生浪秋光看一半翠衾知夜永夢冷孤館南樓數聲過雁西池桂花零亂嵗序如何江山若此贏得霜髩滿傷心漫囬愁眼見蛩吟蔓草螢度荒疃淚隨黄葉下事逐浮雲散滄波滚滚東流去問誰是登樓王粲菊綻籬邊賦歸來恐晚望江南西湖四首明瞿佑西湖景春日最宜晴花底管絃公子宴水邊羅綺麗人行十里按歌聲西湖景夏日正堪遊金勒馬嘶垂栁岸紅粧人泛採蓮舟驚起水中鷗西湖景秋日更宜看桂子岡巒金粟富芙蓉洲渚彩雲閒爽氣滿前山西湖景冬日轉清奇賞雪樓臺評酒價觀梅園圃定春期共醉太平時滿庭芳西湖秋泛明瞿佑露葦催黄烟蒲駐緑水光山色相連紅衣落盡辜負採蓮船㸃檢六橋楊栁但幾個抱葉殘蟬秋容晚雲寒雁背風冷鷺鷥肩華筵容易散愁添酒量病減詩顛况情懐冲淡漸入中年掃退舞裙歌扇盡付與一枕髙眠清閒好脱巾露髮仰面看青天滿庭芳登道塲山明王世貞一雨催凉千崖吐秀萬壑争效潺湲暫停籃筍擕杖翠微間㸃㸃龍麟玉甃堪憐處屐齒敲慳朱闌外粘天萬頃七十二峯間呼樽誇更有有松飈鳳吹雲岫鵶鬟又誰送黄鸝弄巧唱綿蠻漫問何山最好争應道還有何山能移興新晴月色飛歩上孱顔蝶戀花蘇堤春曉明莫璠十里樓臺花霧繞宜雨宜晴山色籠春曉楊栁枝頭殘月小海棠枝上猶眠鳥蘭帳玉人初睡覺試問樓前畫舫開多少報道尋芳人起早紫騮嘶過香塵道又平湖秋月明莫璠璧月沉輝湖渌靚一色琉璃倒浸山河影花外瓊宫明愈瑩人間無此清凉境笑擷芙蓉乘舴艋醉掬文漪摇動金千頃欲唤坡僊同賦咏桂花露濕衣襟冷又斷橋殘雪明莫璠快雪時晴寒尚沍玉屑銀沙紛滿湖南路一道垂虹如約素裙腰草色非前度斷玦遺環愁日暮想像凌波羅襪應難歩欲探梅花無處所山童指㸃逋仙墓又雷峯夕照明莫璠古塔斜陽紅欲暝西崦人家半在桑榆影水印殘霞如濯錦烟花佛國非凡境十里畫船歸欲盡漁唱菱歌别是湖中景待月有人樓上等珠簾半捲欄重凭又麯院風荷明莫璠五月涼風來麯院緑水芙蕖紅白都開遍風逓花香清不斷採蓮舟過歌聲緩醉折碧筒供笑翫翠盖紅銷髙下翻零亂向晚新涼生酒面六銖衣薄停紈扇又花港觀魚明莫璠杜若浮香春霽雨浪煖桃花錦漲鴛鴦渚碧藻叢深菱葉底纎鱗吹沫摇頳尾戲把金鈎垂緑水却憶雕闌翠袖人同倚腸斷蕭娘書一紙相思欲報憑雙鯉又南屏晚鐘明莫璠翠巘深深深幾許佛閣華鐘鯨吼西風裏囬首南莊行樂地暝烟隔斷青蓮宇宴飲芳園人散去金鑰嚴城次第催將閉一望長橋燈火起絳紗影裏聫歸騎又栁浪聞鶯明莫璠西子湖頭春過半萬縷垂楊洶似波紋亂黄褪緑匀誰暗換俊遊來繫花驄慣紅喙嬌鶯啼緩緩韻叶笙簧幾被風吹斷惱亂佳人停鳯管背花偷把春纎按又三潭印月明莫璠秋静寒潭澄見底玉色蟾蜍飛入清泠水睡熟驪龍呼不起頷珠光照冰壺裏讌賞此時能有幾遥憶同歡今夜人千里試問龍淵深幾許騎鯨欲共姮娥語又兩峯揷雲明莫璠南北雙峯雲氣繞玉削芙蓉迥出青天表金碧浮圗瞻縹緲朱甍繡檻臨黄道下界紅塵飛不到東望彤庭日出扶桑曉願借謫仙希有鳥瑤笙吹上蓬萊島國朝滿江紅錢塘觀潮曹溶浪湧蓬萊髙飛撼宋家宫闕誰盪激靈胥一怒惹衝冠髪㸃㸃征帆都卸了海門急鼓聲初發似萬羣風馬驟銀鞍争超越江妃笑堆成雪鮫人舞圎如月正危樓湍轉晚來愁絶城上吳山遮不盡亂濤穿到嚴灘歇是英雄未死報讐心秋時節醜奴兒令月夜泛舟西湖龔翔麟一湖風漾當樓月凉滿人間我與青山冷澹相看不等閒藕花社榜疎狂約緑酒朱顔放進嬋娟今夜紗窻可忍關木蘭掀蕩波光碎人似乘潮何處吹簫輕逐流螢度畫橋白鷗睡熟金鈴悄好是蕭條多謝雙髙折簡明朝不用招清輝依約雲鬟緑水作菱花蘇小夭斜不見留人駐晚車湖山符牒誰能管譲與天涯如此豪華除却芳樽一味賖菩薩蠻春日憶西湖次陸藎思徐竹逸倡和原韻陳維崧劃波曽向西泠去掠入緑痕難唾處疎簟雜眠鷗真成自在遊如今佳興歇悶過春三月剛見摘蘭芽山村又焙茶水調歌頭送憚南田之錢塘并柬毛稚黄陳維崧躡屩上靈隠吹笛下吳淞送君恰直新爽纎月印船篷猶憶冷泉亭上百道跳珠噴雪飛瀑挂杉松一别十八載吾老漸成翁故人去擕筆墨㵼空濛不知老已將至揮洒醉偏工為訊鹽橋毛子果否别來無恙底事斷詩筒人世作達耳長邑鬰焉窮賀新郎鴛湖烟雨樓感舊陳維崧水宿楓根罅儘沽來鵞黄老釀銀絲鮮鮓記得筝堂和伎館儘是儀同僕射園都在水邊林下不閉春城因夜醼望滿湖燈火金吾怕十萬盞紅毬挂重遊陂澤偏瀟灑剩空潭半樓烟雨玲瓏如畫人世繁華原易了快比風檣陣馬消幾度城頭鐘打惟有鴛鴦湖畔月是曽經照過傾城者波織簟船堪藉永遇樂送園次歸吳興陳維崧古渡西風亂山落照明日將雨手内金樽橋頭畫艇漸到銷魂處踏臂狂歌掉頭長嘯萬事總隨花絮歎英雄古今無主夜來酒邊曽訴路出横塘船經夾浦莫問師師舉舉且減柔情還憑老手只種金城樹學士亭邊醉翁亭在多少名賢來去喜到日一湖碧浪全家團聚南樓令泛月至湖心亭沈進落日四無塵天青雁幾羣倚輕橈客過前津未老芙蓉秋有恨對粧鏡翠蛾顰亭子隔湖心花深月轉深聽宵鐘空外遺音絲竹不分山水興約明日再登臨栁梢青西湖後遊沈進十二重樓是誰珠箔雙捲銀鈎桃葉春潮楊花暮雨一段閒愁飛來沙際輕鷗芳草外春風舊遊團扇歌殘羅衣試罷人在蘭舟齊天樂苕南道中李符野塘水漫菰城路曉來載酒移檻栁惲汀荒邱遲宅壞急雨鳴蓑千㸃緑蕪如染映翠藻參差鵜鶘能占沽酒何邨花明獨樹小橋店昔遊如昨日耳記深深院宇綺羅春豔粧閣懸蛛舞衫化蝶滿目繁華都減濕雲乍斂露浮玉遥峯相看無厭漁唱滄浪荻根燈又閃栁梢青和沈山子西湖後遊李符前度芳遊裙腰草外緑漾輕舟渡口飛花波心掠燕人倚紅樓重來緩控嘶騮悄不見疎簾上鈎一鏡空香雙螺斜照都是春愁八歸同周篔谷查聲山集龔蘅圃玉玲瓏閣李符門臨水市樓觀海日西風摇落江栁無端泛梗錢塘路不分仙郎宅裏乍逢良友除却書床拈賦筆有何事可消清晝只愁對剩水殘山厯厯在簷牖怪爾輕蓑短櫂行歌並發已過秋香時候髙峯南北横橋十二更問黄花開否把蕉筒檢㸃明日還期載尊酒譜新聲須尋綵妓付與檀槽聽伊調素手青玉案送施韓友歸南湖沈岸登仙舟幾日臨淮浦打兩槳平江路最憶南湖來往處渡頭楊栁門前烏桕總是青青樹藤隂儘好銷炎暑况有深杯斟緑醑何事留君君不住秋風準擬尊羮菰飯吾亦全家去山花子西泠遊女沈岸登繡領鴛鴦刺未工好春吹到栁絲風誰喚停鍼尋鬭草斷橋東裙摺映來新似月鞵幫試處小於弓最愛湖邊山一對兩髙峯憶王孫夜汎鑑湖朱彞尊天邊新月兩頭纎鏡裏晴山萬㸃尖小櫂烏篷不用簾夜厭厭漸覺微風衣上添梅花引蘇小小墓朱彞尊小溪澄小橋横小小墳前松栢聲彩雲停碧雲停凝想往時香車油壁輕溪流飛徧紅襟鳥橋頭生徧紅心草雪初晴雨初晴寒食落花青驄不忍行百字令富春道中朱彞尊柁樓侵曉望樟亭木末霧收川浄誰把錢塘犀弩射衝落驚濤千頃霸業孫郎髙風嚴子畢竟看誰勝西臺寂寞更何人掃巖磴最愛躑躅花繁畫眉啼處髙下穿紅影十載重來頭已白愁看清江如鏡沙際鸕鷀門前烏桕引我移家興罛師漁父結隣儘許相並滿江紅錢塘觀潮朱彞尊羅刹江空設險有海門雙闕日未午樟亭一望樹多於髮乍見雲濤銀屋湧俄驚地軸轟雷發算隂陽呼吸本天然分吳越遺廟古餘霜雪殘碑在無年月訝揚波重水後先奇絶齊向屬鏤鋒下死英魂毅魄難消歇趁髙秋白馬素車來同弭節秋霽泛舟西湖薄暮坐湖心亭待月龔翔麟買酒西泠正蕭蕭雨歇白羽風浄别浦喧禽長堤無栁六橋空帶煙暝采菱歌静劃波又見拏魚艇但目極南北兩峯斜照亂鴻影湖心亭子遊屐都歸留與吾曹夜涼飲謝多情纎阿放彩鴛鴦露宿不知冷半被朗吟驚乍醒夢粱堪憶紅蕖種滿芳塘月中香逺一奩秋錦臺城路送桃鄉農歸長水龔翔麟江城又是經年别山中疎栁多少院雨梧桐池香菡蓞嬴得淒凉懐抱鄉程更杳縱有夢難尋鴛鴦湖小水驛西風這番輸爾賦歸早一繩新雁横處霜林飛小騎鞭撲紅棗鴉嘴鋤兒鴨頭艇子屏當還家詩料柴門閉好怕楚尾勾留雪中纔到老屋溪南蠟梅應放了吳山青湖上遇雨龔翔麟南髙峯北髙峯好在空濛雨色中煙鬟霧鬢重藕花紅蓼花紅不比當年秋興濃采香何處逢栁梢青西湖後遊和沈山子龔翔麟十二橋邊紅消燕夜緑漲鶯天楊尾梳風櫻珠捎雨日上歌船依然鈿翠生煙認亭子湖心扣舷勸酒僧歸鑱詩壁壊夢憶嬋娟南鄉子烏石山房即目龔翔麟千縷裊茶煙消受松風一榻前小雨初收簾試卷山四面洗出佛頭青萬㸃憶秦娥西溪小築汪森城隅嫩栁浮煙色溪橋一帶花遮宅花遮宅峭寒風雨最難禁得半篙新漲沙痕碧籬根細糝蒼苔迹蒼苔迹春泥藜杖到來吳客鶯啼序西湖懐古黄媛貞閨秀蘇堤栁下維畫舸凭欄逺眺歎西陵買斷繁華兩峯螺黛如掃憶往日香車油壁六橋三竺青葱好更桂香荷艷玻瓈冷浸霜曉洪谷興酣北苑意得呌絶遊仙櫂但滿眼芻牧樵蘇極懸崖控絶島徧亭臯桃林歇馬採蓮歌換關山調撫流波荇藻漣漪瀫紋留照游魚吹浪飛燕翔空慣聽笙歌閙乘好景晴和淑媚吟賞湖光灝樓開粧鏡舟移芰浦南屏爽氣排林表羡逋仙笑指梅花老孤山鶴夢冰雪繞漸暖日嘶風驊騮齕盡芳草湘簾澄碧緑水揉藍載筆嗤墨妙約畧煙嵐疎樹瞻顧從容擬拾幽蘋白雲膠擾蟬鬢飃絲蟾輝映雪幸西家尚容衰耄趂稀齡少寄臨風傲斜陽一曲瑶琴放艇湖心水香月皎浙江通志卷二百七十八
