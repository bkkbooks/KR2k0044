body:
  text: 浙江通志卷一百三十九選舉十七明舉人隆慶元年丁夘科黄洪憲秀水人辛未會魁李陽春餘杭人戊辰進士張兆芳慈谿人楊文煥餘姚人癸未進士張子校衢州人馬汝賢平湖人管稷餘姚人辛未進士鄒學柱餘姚人戊辰進士馮學易台州人楊萬春錢塘人上杭知縣車應祥會稽人林國材黄巖人丁丑進士李雲瀧烏程人刑部司務孫朝宗嘉善人順昌知縣王繼明永嘉人甲戌進士楊徳政鄞人丁丑進士胡其久崇徳人龍南知縣陸南至仁和人周思宸餘姚人辛未進士趙邦佐杭州人孫崇祖慈谿人主事徐震上虞人陸鎮黙餘姚人癸未進士張試蕭山人戊辰進士余寅鄞人庚辰進士姚應龍慈谿人同知邵程餘姚人南京刑部郎中屠謙平湖人戊辰進士趙煒秀水人陳謙錢塘人知縣李應辰慈谿人辛未進士孫成泰平湖人丁丑進士房寰徳清人戊辰進士顧充上虞人郎中黄金色錢塘人戊辰進士王洽黄巖人丁應詔長興人辛未進士李大吉仁和人辛未進士吳國賓臨海人黄世雍蕭山人黄應奎錢塘人向桂慈谿人知縣徐桐餘杭人通判吳奠域安吉人許璞長興人楊夢元西安人知縣周子愚桐鄉人葉徳濩黄巖人周保鄞人辛未進士徐師陳永康人延平同知韓守庸長興人沈榜杭州人戴震亨建徳人知縣孫如滙餘姚人戊辰進士史紀言烏程人寜都知縣潘應化臨海人蘄州知州余乾貞遂安人戊辰進士馮盛宗慈谿人辛丑進士韓紹烏程人辛未進士沈思孝嘉興人戊辰進士陳與郊海寜人甲戌㑹魁曹一麟平湖人萬斯年杭州人嚴輊湖州人沈藻海鹽人戊辰進士鄭明選歸安人己丑㑹魁劉士彥上虞人髙文登平湖人詹思謙常山人甲戌進士鄭汝璧處州人戊辰進士孫良學山隂人知縣程正誼永康人辛未進士凌雲鵬杭州人葉世治慈谿人國子監學録林元瑀平陽人潘曰仁餘姚人通判周啟祥海寜人戊辰進士傅國才山隂人推官徐啟東上虞人主事汪朝仕開化人鞏應麒嘉興人楊洲杭州人推官張文羽嘉興人教諭邵陛餘姚人戊辰進士劉國彦山隂人王佩仁和人太倉學正邵一本餘姚人戊辰進士林萬晦瑞安人南陽通判唐邦佐蘭谿人戊辰進士徐一檟西安人辛未進士王照山隂人以下十一人順天中式王泮山隂人甲戌進士胡尚禮山隂人知州諸大本餘姚人知縣劉烶山隂人周繼夏諸暨人戊辰進士何守成分水人沈志文海寜人黄二琮遂昌人開建知縣曹煒平湖人丁丑進士茹霆山隂人姚文芳錢塘人以下六人應天中式臧繼華長興人祁汝東山隂人同知查志文海寜人同知柴賡元鄞人顧九徳仁和人黄猷吉山隂人戊辰進士以下二人俱山東中式鐵篆杭州衛人辛未進士温嘗眷烏程人狄道知縣河南中式隆慶四年庚午科凌登瀛錢塘人丁丑進士馬應圖平湖人丁丑進士李槃餘姚人庚辰進士錢維禮慈谿人陶允宜㑹稽人甲戌㑹魁陸懋龍鄞人庚辰進士常文烇秀水人知府錢若賡鄞人辛未進士江鐸仁和人甲戌進士沈一中鄞人庚辰進士丁瑞春定海人馬捷㑹稽人余大忠仁和人朱廷益嘉興人丁丑進士商為政㑹稽人辛未進士李誌縉雲人甲戌進士陳禹謨仁和人丁丑進士李乾養餘姚人推官黄卷永康人丁丑進士徐桂餘杭人丁丑進士沈棐烏程人徽州通判黄齊賢山隂人庚辰進士凌登名錢塘人倪壯猷平湖人雲南副使周昊蘭谿人癸未進士莊日強定海人陳希伊餘姚人王應龍嘉興人鎮江通判馮夢禎秀水人丁丑㑹元徐待鄞人陳大賢山隂人胡臯嘉興人包坡鄞人髙應烇嘉興人博士楊鳳鳴杭州人龔一清義烏人甲戌進士施仁錢塘人諸大倫餘姚人辛未進士應承賢永康人陳竒謀秀水人甲戌進士唐守禮烏程人望江知縣賈宗正金華人毛一瓚遂安人壬辰進士史元熙餘姚人甲戌進士許大受昌化人顧可耕海鹽人知縣方可久鄞人葉應山慈谿人王府長史丁懋建餘姚人甲戌進士夏建寅嘉興人知縣倪涷上虞人甲戌進士顧汝學仁和人癸未進士王尚亷嚴州人趙偁鄞人孫成名慈谿人辛未進士徐一杰西安人亳州知州尹志慈谿人知縣朱大經㑹稽人蔡宗明黄巖人己丑進士葉有聲浦江人蔡與芳海寜人向東慈谿人庚辰進士汪遜得鄞人諸葛一鳴山隂人顧所有海鹽人知縣何棠仁和人績溪知縣陳縉餘姚人知縣陳民性上虞人同知李宫永嘉人隨州知州朱大章湯溪人蔣時慶遂安人施俸餘姚人知縣蔣大用東陽人張把杭州人胡邦彥餘姚人知州方應時遂安人黄思道錢塘人夏久安秀水人通判李正䝉縉雲人庚辰進士錢吾徳嘉善人知縣謝柔鄞人俞嘉言餘姚人辛未進士嚴允立㑹稽人陸澩鄞人蔣京餘姚人通判夏一經永嘉人梅廷宰永嘉人石埭知縣陳大經錢塘人董子行嵊人汪彥沖仁和人經魁辛未進士以下二十二人順天中式朱一儒長興人經魁王應選慈谿人甲戌㑹魁探花祝致和龍㳺人庚辰進士陳行簡烏程人薊州知州周應中山隂人辛未進士趙堂山隂人司務姜宗望江山人王國珍歸安人季春景寜人偃師知縣孫鑛餘姚人甲戌㑹元郭子宜崇徳人辛未進士張天徳烏程人癸未進士宋可久餘姚人知州岑應春鄞人洪聲逺黄巖人辛未進士趙楫山隂人辛未進士張汝賢崇徳人甲戌進士沈𢎞宗㑹稽人知縣汪塤臨安人周國賢海寜人林守信太平人錢學𢎞嘉善人以下十五人應天中式袁黄嘉善人丙戌進士陳湝分水人虞堯詢東陽人陸橒鄞人吳一本蘭谿人瀘溪知縣舒九思奉化人陸以載烏程人敘州知州施廷相縉雲人浦城知縣來三聘蕭山人癸未進士朱文龍長興人陸光宅平湖人宋恵餘姚人知縣孫一俊長興人庚辰進士李陽吉縉雲人廬江知縣嚴思恭嘉興人雲南中式潘鳳梧桐鄉人貴州中式萬厯元年癸酉科莫睿錢塘人癸未進士張潘海寜人徐三