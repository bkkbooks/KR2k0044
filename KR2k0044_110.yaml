body:
  text: 浙江通志卷一百十一職官一設官分職以為民極無内外一也浙古會計諸侯之地百僚師濟代有攸司皇朝稽古建官大小相維文武並列制置周詳惟是厯代以來名位之倂析不一職守之襲易互殊欲事參稽須加薈萃而具官姓氏亦加詳焉志職官軒轅氏史記五帝本紀黄帝置左右大監監於萬國通典黄帝立四監以治萬國孔穎達禮記序論語撰考云軒知地利九牧倡教唐虞尚書周官唐虞稽古建官惟百外有州牧侯伯尚書益稷州十有二師外薄四海咸建五長漢書百官公卿表書載唐虞之際十有二牧柔逺能邇通典唐有九州舜置十二州有牧史記五帝本紀舜命十二牧十二牧行而九州莫敢辟違禮記王制疏虞稱牧亦稱伯書傳云四岳八伯夏通典夏為九州牧殷禮記王制千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯注屬連卒州猶聚也伯帥正亦長也凡長皆因賢侯為之殷之州長曰伯虞夏周皆曰牧尚書康誥疏離騷伯昌作牧殷亦有牧伯周禮記曲禮九州之長曰牧五官之長曰伯是職方周禮大宗伯八命作牧九命作伯玉海伯尊於牧牧主一州伯中分天下各主一方周禮太宰乃施典於邦國而建其牧立其監設其參傅其伍陳其殷置其輔注侯伯有功德者加命作州長謂之牧監謂公侯伯子男各監一國參謂卿三人伍謂大夫五人殷衆也謂衆士也輔府史庶人在官者周末職官姓氏越大夫石買文種范蠡吳人扶同史記作逢同苦成計􅒍越絶作計倪史記作計然臯如又作句如曳庸左傳作后庸國語作古庸大夫皓諸稽郢秦御史漢書百官表監御史秦官掌監郡郡守尉丞史記秦始皇本紀二十五年定江南地降越郡置會稽郡二十六年分天下以為三十六郡郡置守尉監漢書百官表郡守秦官掌治其郡秩二千石有丞秩六百石郡尉秦官掌佐守典武職甲卒秩比二千石有丞秩六百石縣令丞尉漢書百官表縣令長掌治其縣萬户以上為令秩千石至六百石減萬户為長秩五百石至三百石皆有丞尉秩四百石至二百石是為長吏百名以下有斗食佐史之秩皆秦官也後漢書百官志丞一人尉大縣二人小縣一人丞署文書典知倉獄尉主盜賊秦職官姓氏會稽太守殷通二世元年會稽守漢書作假守楚漢春秋曰姓殷項梁項籍斬守項梁佩其印綬為會稽守漢刺史牧通志職官畧秦置監察御史漢興省之至惠帝三年遣御史監三輔郡所察凡九條監者二歳更之其後諸州復置監察御史文帝十三年乃遣丞相史出刺並督監察御史漢書百官表武帝元封五年初置部刺史掌奉詔條察州秩六百石員十三人成帝綏和元年更名牧秩二千石哀帝建平元年復為刺史元夀二年復為牧後漢書光武帝本紀建武十八年罷州牧置刺史靈帝本紀中平五年改刺史新置牧後漢書百官志諸州常以八月廵行所部郡國録囚徒考殿最嵗盡詣京都奏事中興但因計吏皆有從事史假佐後漢書郡國志揚州刺史部郡六縣邑侯國九十二郡守丞後漢書百官志每郡置太守一人二千石丞一人國相亦如之漢書景帝紀中二年更郡守為太守通典王莽改太守曰大尹後漢重其任或以尚書令僕射出為郡或自郡守入為三公唐六典元帝時條州大小為設吏員别駕治中從事諸郡從事秩六百石後漢改曰别駕從事史後漢書百官志凡郡國皆掌治民進賢勸功決訟檢奸嘗以春行所主縣論課殿最歳盡遣吏上計并舉孝亷郡口二十萬舉一人郡尉漢書百官公卿表郡尉掌佐守典武職甲卒秩比二千石髙帝紀注孟康曰尉郡都尉也師古曰本謂之郡尉漢書景帝紀中二年更郡尉為都尉漢書地理志會稽郡錢唐西部都尉治回浦南部都尉治後漢書百官志中興建武六年省諸郡都尉幷職太守宋書百官志光武省都尉後又往往置東部西部都尉漢末及三國多以諸部都尉為郡縣令丞尉後漢書百官志縣大者置令一人千石其次置長四百石小者置長三百石侯國之相秩次亦如之皆掌治民顯善勸義禁奸罰惡理訟平賊䘏民時務秋冬集課上計於所屬郡國後漢書百官志注應劭漢官曰大縣丞左右尉所謂命卿三人小縣一尉一丞命卿二人後漢書百官志各署諸曹掾史畧如郡員學官漢書循吏傳武帝時天下郡國皆立學校官自文翁為之始漢書平帝紀元始三年立學官郡國曰學縣道侯邑國曰校校學置經師一人鄉曰庠聚曰序庠序置孝經師一人鹽官鐵官工官都水官後漢書百官志凡郡縣出鹽多者置鹽官主鹽税出鐵多者置鐵官主鼓鑄有工多者置工官主工稅物有水池及魚利多者置水官主平水收漁税所在諸縣均差吏更給之置吏隨事不具縣員漢書食貨志元封元年桑𢎞羊領大農幹天下鹽鐵請置大農部丞數十人分部主郡國各往往置均輸鹽鐵官後漢書百官志郡國鹽官鐵官本屬司農中興皆屬郡縣漢職官姓氏督州事張純字伯仁杜陵人建武五年安集荆徐揚部督委輸馮緄字鴻卿宕渠人建康元年督揚州諸軍事滕撫字叔輔劇縣人建康二年督揚徐二州事揚州刺史揚州牧魏相字弱翁定陶人黄霸字次公陽夏人已上宣帝時任士孫張平陵人元帝時牧何武字君公郫縣人成帝時任李聖本名棽王莽賜名聖馬余已上王莽時牧歐陽歙字正思千乗人樊曅字仲華新野人已上光武時任張禹字伯逹襄國人董勤已上章帝時任歐陽參尹燿劉祐字伯祖安國人陳翔字子麟邵陵人已上桓帝時任臧旻靈帝時任陳溫陳禕陳瑀淮浦人劉繇字正禮東萊人嚴象劉馥周乾袁遺已上獻帝時任王子威崔忠已上未審其次吳郡太守王衡順帝時任麋豹東海人東門奐李肅潁川人徐參良城人已上桓帝時任臧旻靈帝時任盛憲陳瑀下邳人許貢朱治僮和韓整蕭永已上獻帝時任會稽太守嚴助會稽吳人朱買臣字翁子吳人已上武帝時任魯伯琅琊人宣帝時任周君右扶風人或作均成帝時任沈戎秋君已上王莽時任大尹許時李均或作君已上更始時任大尹黄讜汝南人第五倫字伯魚長陵人已上光武時任尹興明帝時任左恢曲阿人黄兢已上章帝時任慶鴻洛陽人張霸字伯饒成都人馬稜扶風人已上和帝時任蔡君修武人趙叙長安人已上安帝時任苦灼劉府君成公浮陳重宜春人馬臻茂陵人梁旻冀之從弟李就已上順帝時任殷丹冲帝時任劉寵字祖榮牟平人韋毅沈勲陳萊上虞人已上桓帝時任尹端徐珪已上靈帝時任王朗字景興東海人唐瑁孫策字伯符富春人孫權字仲謀淳于式顧雍字元歎吳人行太守事許貢已上獻帝時任都尉任延字長孫宛人更始時會稽都尉宰鼂明帝時西部都尉劉洪字元卓泰山蒙陰人靈帝時東部都尉全柔錢唐人東部都尉張紘字子綱廣陵人東部都尉韓晏南部都尉賀齊字公苖會稽山陰人南部都尉蔣欽字公弈九江夀春人芮良東部都尉程普字德謀右北平人吳郡都尉三國吳吳職官姓氏吳郡太守太史享字元復慈之子謝朂山陰人承之弟賀劭字興伯山陰人滕引字承嗣北海劇人芮祉丹陽人吳展下邳人會稽太守吾粲字孔休烏程人岑軻吳郡人滕引見前已上大帝時任濮陽興字子元陳留人景帝時任樓元字承先蘄人郭誕車浚南平人戴昌廣陵人已上末帝時任東安太守全琮字子璜錢唐人臨海太守奚熙范平字子安錢唐人新安太守沈憲沈矯憲之子都尉顧承字子直嘉禾人朱治字君理故鄣人已上吳郡都尉陸遜字伯言吳人海昌屯田都尉陸宏會稽南部都尉陳表字文奥松滋人諸葛融字叔長琅琊陽都人已上新安都尉沈曼武康人新都都尉駱秀烏傷人海鹽司鹽校尉晉都督晉書職官志持節都督無定員都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之假節為下使持節得殺二千石以下持節殺無官位人若軍事得與使持節同假節惟軍事得殺犯軍令者江左以來都督中外尤重惟權重者乃居之刺史通志職官畧太康中都督知軍事刺史治民各用人也惠帝末乃并任非要州則單為刺史郡晉書職官志郡皆置太守諸王國以内史掌太守之任又置主簿主記室門下賊曹議生門下史記室史録事史書佐循行幹小吏五官掾功曹史功曹書佐循行小史五官掾等員皆置文學掾一人縣晉書職官志縣大者置令小者置長有主簿録事史主記室史門下書佐幹游徼生循行功曹史小史廷掾功曹史小史書佐幹户曹掾史幹法曹門幹金倉賊曹掾史兵曹史吏曹史獄小吏獄門亭長都亭長賊捕掾等員縣皆置方畧吏四人部尉大縣置二人次縣小縣各一人晉職官姓氏都督諸軍事王渾字元冲太原晉陽人淮南王允已上武帝時任顧祕元帝諱睿字景文周馥字祖宣汝南安成人茍晞字道將河内山陽人已上惠帝時任王郭字處仲琅琊臨沂人愍帝時任郗鑒字道徽髙平金鄉人王含明帝時任江霦穆帝時任郗愔字方回髙平金鄉人海西公時任王薈字敬文琅琊臨沂人王蘊字叔仁孔安國字安國會稽山陰人謝琰字瑗度會稽人謝輶會稽人謝元字幼度已上孝武帝時任王凝之羲之子劉牢之字道堅彭城人王愉字茂和何無忌東海郯人司馬休之字季預孔季恭名靖以字行已上安帝時任揚州刺史牧牽𢎞應綽周浚字開林汝南安成人已上武帝時任郗隆字𢎞始髙平金鄉人陳徽劉機已上惠帝時任王敦見前劉陶已上懷帝時任王導字茂𢎞琅琊臨沂人明帝時任王舒字處明琅琊臨沂人庾氷字季堅穎川鄢陵人已上成帝時任殷浩字深源陳郡長平人蔡謨字道明陳留考城人已上康帝時任王述字懷祖太原人穆帝時任桓溫字元子譙國龍亢人哀帝時牧袁瑾海西公時任謝安字安石陳國陽夏人王顯司馬道子已上孝武帝時任司馬元顯桓𤣥字敬道譙國龍亢人牧桓謙字敬祖譙國龍亢人王謐字稚逺琅琊臨沂人劉裕彭城人司馬國璠已上安帝時任劉義真恭帝時任㑹稽刺史丁乂武帝時任張景賀循字彦先山陰人戴昌太守已上惠帝時任許旼内史懷帝時任紀瞻字思逺秣陵人内史諸葛恢字道明琅琊陽都人内史愍帝時任庾氷見前内史庾琛字子美頁川鄢陵人内史庾羲亮之子潁川鄢陵人内史周札字宣季陽羡人内史已上元帝時任虞潭字思奥餘姚人再任内史鄧攸字伯道襄陵人内史熊逺字孝文南昌人内史已上明帝時任王舒見前内史何充字次道廬江人内史孔愉字敬康山陰人内史王恬字敬豫瑯琊臨沂人内史王允之字深猷内史已上成帝時任王述見前内史王羲之字逸少瑯琊臨沂人内史王彪之字叔武内史江霦字思元内史已上穆帝時任郗愔見前内史海西公時任王薈見前導之子内史王蘊見前内史孔安國愉之子再任内史謝琰見前安之子再任内史謝輶見前内史謝𤣥見前内史已上孝武帝時任王凝之見前王愉見前述之子范逵太守劉牢之見前内史虞嘯父㑹稽餘姚人内史司馬道子内史何無忌見前内史司馬休之見前内史孔季恭名靖以字行内史已上安帝時任夏靖内史熊黙已上未審其次吳郡太守吳國内史殷祐内史胡沖太守已上武帝時任賀循見前内史懷帝時任應詹字思逺南頓人内史鄧攸見前太守已上元帝時任趙穆太守明帝時任庾氷太守蔡謨見前内史孔坦字君平山陰人太守顔含太守王恬見前内史太守虞潭内史已上成帝時任荀羡字令則穎川臨穎人内史王洽字敬和琅琊臨沂人内史庾希字始彦内史已上穆帝時任刁彞字大倫渤海饒安人内史荀㽔字令逺潁川臨潁人内史王薈見前再任内史王劭字敬倫琅琊臨沂人内史司馬恬字元愉内史已上簡文帝時任江灌字道羣陳留圉人内史何澄