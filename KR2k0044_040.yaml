有二姬寒香晚翠截髮誓死坐卧樓中鄉閭異之遂以名樓太虛一碧樓嘉興府志在海鹽縣東湖元萬户賀傑建春風樓至元嘉禾志在崇德縣東南三十步宋知縣奚士達以觀風亭改建樓下瀕河有室以備士大夫艤舟之地陸埈和奚宰春風樓即事詩恍然楹桷架虛空意象經營九仭功三載笑談杯酒裏一時人物畫圖中金蘭結契從今始玉燭迎和與衆同却笑楚臺雕篆客強生分别托雄風弄珠樓天啓平湖縣志在當湖舊名戲珠亭令王羲民經始蕭鳴甲落成高其臺榭居然勝境葵嚮閣至元嘉禾志在郡治東舊東通判廳凌虛閣嘉興府志補舊在鴛湖屼然水中天籟閣嘉興府志項元汴號墨林有鐵琴因以名閣吟香閣嘉興府志補緑香井有吟香閣在錦帶河通山閣見宋劉昌詩蘆浦筆記序今蘆瀝鹽場雞鳴臺秀水縣志薦橋在春波門西北半里宋景定間旁有雞鳴臺熙熙臺至元嘉禾志在海鹽縣圃之東舊名月樓李直養易是名伯牙臺海鹽縣圖經在縣東門外二十步臺側有聞琴村聞琴橋萬松臺花史在平湖陳山後有萬松擁護松風臺天啓平湖縣志在德藏寺後朱買臣宅𢎞治嘉興府志東塔寺乃漢朱買臣宅顧野王宅𢎞治嘉興府志在府城東七里俗名顧節墩嘉禾百詠考嘉興縣東六里有顧節墩野王曾於此修輿地志又平湖縣東泖上有顧書堆亦野王讀書處陳舜俞宅嘉禾百詠考在嘉興縣東二里崇寧三年其孫捨基為漏澤寺嘉善縣志舜俞有别業在清風涇即宋史所載罷官後居白牛村是其别業陸裘公宅𢎞治嘉興府志淨土寺本邑人陸裘公宅在嘉興縣東三十餘里王希呂宅𢎞治嘉興府志在府治西南二里西河上希呂宋尚書范蠡宅秀水縣志縣治西南二里金明寺相傳范蠡故宅有碑刻陶朱公里謹按范蠡故居本不可考後人因范蠡湖之名遂榜為陶朱公里嚴助宅萬厯秀水縣志天寧寺去縣治東北一里本漢嚴助宅有嚴將軍井徐尚書宅𢎞治嘉興府志在郡治西北一百八十步晉成帝時因夜井發光遂奏請捨宅為寺今精嚴寺也按舊靈光寺實録尚書名恬今土地記名熙蕭王宅至元嘉禾志蕭王太祖廟在嘉興縣西北梁蕭氏興江左實有功在民故州縣多祠之惠安寺即蕭王故宅也陸贄祖宅𢎞治嘉興府志在府治西南贄祖齊望仕唐為祕書監大厯中因女誦法華經天墜花遂捨宅為寺今為寶華倉秀水縣志陸齊望宅在縣東南一里陸贄宅在城內甜瓜巷按陸遊入蜀記云抵秀州遊實花尼寺拜宣公祠祠有碑闕壞磨滅之餘時時可讀蘇州刺史于頔書大略言祕書監陸公齊望始作尼寺於此其後灞滻澧兄弟又新之後又有賢姝字意者陸氏嘗有女為尼云諱灞者宣公之父也又考舊志謂陸贄宅在縣東南大厯問女誦法華經又謂贄為吏部郎中灞之子此沿歐陽修唐書宰相世系表之誤耳不知劉㫬舊唐書贄傳父侃溧陽令以贄貴贈禮部尚書也不幾以祖父為父祖姑為女耶但務觀博識亦以贄為灞子他復奚怪也裴休宅𢎞治嘉興府志在秀水縣南四里真如寺唐大中十年裴相休捨宅為寺有裴丞相祠秀水縣志按休傳未嘗宦禾地亦不言流寓檇李或父任浙東曾僑居於此耳曹圭宅𢎞治嘉興府志在府治西北圭自吳越守嘉興後為蘇州刺史光啓中捨宅為羅漢院婁機宅𢎞治嘉興府志在府學前本參政婁機宅郡守鄭定表為鳯池朱敦儒宅秀水縣志敦儒字希真南渡寓郡城有讀書堂在天慶觀右嶽珂宅秀水縣志在阜城門內珂號倦翁宋嘉定中守嘉興後寓居郡城金陀坊著金陀粹編聞人安遠宅秀水縣志在天星湖北安遠鼎次子陳大光宅秀水縣志在城內大光字子克為縣丞瑩中諌議孫見宋陸遊入蜀記林衡宅秀水縣志在迎薰門外衡仕宋為秀州知州鮑恂宅秀水縣志鮑恂隱居在西溪徐一夔西溪鮑恂隱居記西溪在嘉禾郡城之西三里溪流回合匯而為涇貫而為港微波細綺皆潔妍可愛初郡之置以秀水名志稱秀水在北門外西溪其支流也緣溪上下長波平緑漫衍曲折若龍蛇馳騖樹木散出篁竹叢生隱如深林絶壑今鮑先生之居在焉先生之居逐溪而成屋數楹在竹樹中髙亢軒豁有蔬可茹有桑可蠶有牲魚酒醴可以供祭祀燕賔客旁無雜鄰農家漁舍參差相映白日悠永沙禽水鳥之泳翔村歌野唱之響應輕舟短楫之往來舉不出於顧昐之外郡人至比之武陵桃源先生安焉歎而言曰以天之福幸存此廬吾將老於此矣趙若誦宅萬厯嘉善縣志在熙寧橋西若誦宋宗室趙勤夫後至今後巷猶以天水名鮑節制宅正德嘉善縣志在陶莊市為宋鮑節制别業中有喬松怪石環翠池石屋洞楊任宅嘉興府志在魏塘鎮任死難時有妾方孕知縣徐本縱之後生子宏五世孫有幸存圖藏於家干寶宅碧里雜存寶海鹽人今靈泉鄉真如寺乃其宅基何后宅晏公類要在海鹽縣南三里晉何準寓居焉一夕羣烏啼噪乃生女他日復夜啼推之乃穆帝立準女為后之日也至元嘉禾志其地名烏夜村謹按范成大吳郡志謂何后宅在吳郡南及朱買臣妻死亭灣在閶門外七里因古時郡縣廣濶後來分析彼此互托以舊志所有故存之戴威宅武原志海鹽縣西資聖寺東晉右將軍戴威宅也宅中井一日發五色光遂捨為寺顧况宅至元嘉禾志海鹽縣西南五十七里橫山禪寂寺側况嘗有詩云家住雙峰蘭若邉數聲秋磬發松煙山連極浦鳥飛盡月上青林人未眠即此劉長卿過橫山顧山人詩秪見山相掩誰言路尚通人來千嶂外犬吠百花中細草香飄雨垂楊間弄風却尋樵徑去惆悵緑溪東楊宣慰宅澉水志澉浦城西門內大街南元宣慰司楊梓居之建樓十楹以貯姬侍謂之梳妝樓國初楊氏遠徙故居廢為延真觀樂郊私語州人多善歌樂府其傳皆出楊氏康惠公梓節俠風流善音律與武林阿爾哈雅之子雲石交善雲石樂府散套為當行之冠康惠獨得其傳其子國村少中復與鮮于去矜交好去矜亦樂府擅場以故楊氏家僮未有不善南北歌調者陳金過楊氏舊妝樓詩彩鸞飛去曲池荒朱箔依然繞緑楊春色不知歌舞盡野花猶學美人粧李益之宅正德崇德志在縣東十八里晉銀青光祿大夫尚書李益之宅天福八年置為保安院陳與義宅正德崇德志在青鎮廣福院後芙蓉浦上宋陳與義紹興乙卯自瑣闈請祠讀書僧閣自稱簡齋居士及秋召拜不一年免去復來居此元至元中趙子昂榜其室曰簡齋讀書處左𢎞道簡齋讀書記簡齋讀書處在青墩芙蓉浦上以宋參政陳公與義嘗居於此高僧大圓智洪邑儒葉大經懋實與方外交故簡齋集中多贈大經智老詩而所謂聖夀院者即今廣福也公於紹興乙卯歲由禮部侍郎給事中除顯謨閣直學士方丏間兹地扁所居曰南軒自稱簡齋居士次年即被召拜左中大夫參知政事不一年求免復來居南軒遂終焉昔人嘗作三友亭於芙蓉浦上後亭壤不復見而南軒亦泯焉無所聞矣豫受業密印乃梁昭明讀書園廣福輔車也每過其處弔簡齋遺躅未嘗不發歎而去天君法師來住是山豫輒以告法師乃欣然命闢而加治之吳興虛齋趙侯為作古篆榜其室之內曰簡齋讀書處室之外曰南軒本其舊也陸閎宅舊浙江通志在平湖縣東北二十七里漢陸閎隱處閎為潁川守致鳯凰之瑞因名鳯凰基張紘宅天啓平湖縣志去縣南百步元至正間里人張紘别號南村多書因聚土成丘以為誦讀之所號南村書堆徐綱宅桐鄉縣志宋淮東議幕徐綱宅在縣市後宗族蕃衍今儒學基其一也張伯淳宅桐鄉縣志宋侍講學士張伯淳宅在石門鎮玉溪橋西貝瓊宅桐鄉縣志史山即殳山東峰前有貝瓊宅貝瓊殳山隱居詩獨客從來懶出村兩山一月雨昏昏野花作雪都辭樹溪水如雲忽到門無復元戎喧鼓吹試從田女牧雞豚來青處士時相過猶是平原舊子孫自注余居在千金墟宋濓宅桐鄉縣志在濮院鎮梅花涇上有讀書臺濮鑑宅桐鄉縣志濮院鎮濮鑑為寧遠將軍有八宅又有雪筠齋濮敬之築辟塞越絶書辟塞者吳備候塞也秀水縣志在拱辰門外一里寥陽殿嘉興府志在郡治西北一里同元觀三字葛洪書內有七賢遺迹范蠡塢嘉興府志在顧村正德崇德志水陂也在千金鄉顧村中有小島世傳范蠡曽遊於此旁有洗足灘龍墳萬厯嘉興府志在復禮鄉小律原耕者時時得龍骨相傳大禹治水至震澤瘞龍骨於此梅里嘉興縣志王店鎮王逵之武肅王時為嘉興鎮遏使仕至尚書後居梅水百畝皆梅花至今稱梅里梓宇嘉興縣志在城中元舉人張翔南翼建堂前文梓高可十尋梁寅有記茶屋嘉興縣志元屠兼善嗜茶築茶屋貝瓊為記米莊嘉興縣志縣北百步橋側宋張循王俊子子顔以王師進討兵食浩大獻米十萬石在百步橋莊交割又有米棚亦宋人積米之所景范廬秀水縣志在金明寺後宋淳熙狀元姚穎築圃范蠡湖側顔曰景范廬義婦坂嘉興府志在秀水縣後漢書列女傳呂氏字榮吳許升妻也居於此橡林啜茶所正德嘉善縣志在梅花道人墓側橡猶存采芝室正德嘉善縣志在楓涇元王世昌所居楊維楨有記施延賃作處海鹽縣圖經半路亭者漢施延賃作處延後官至太尉亭始漢今在縣西北三十五里比肩里嘉興府志在海鹽縣吳黃龍中比肩人陸東美所封里也事見三吳記茶院海鹽縣圖經在縣西南二十七里吳越王錢鏐幸金粟寺令寺僧於此設茶古田䴚澉水志王家䴚在長牆山下石帆村即古田䴚也今尚存數家生聚於其間石門正德崇德志在縣北二十里吳越壘石為門以為限隔之所行幄殿正德崇德志在石門宋建炎時車駕往來就此置行幄殿萬厯嘉興府志其地為古驛基洲錢正德崇德志在縣西北二十七里四周皆水其中一地如錢故名石門縣志嘉定中斸地得古磚刻有云在吳郡嘉興縣洲錢之陽知洲錢之名甚古名勝志宋南渡時士大夫寓此者二十餘家趙申公不求子善應生忠定公汝愚為名相白社名勝志在千乘鄉宋末衛富益創舞蛟石嘉興縣志先在清宛堂後在徐隨州宅隨州徇難以宅為祠今在祠內嶽和聲舞蛟石歌序石在范長康清宛堂南高三十尺廣六尺側眂之若離而合者三怒目深爪若飢蛟壑舞相傳有牝牡二峰此故其牡蓋李唐間物籀而字之者趙松雪也圓通寺銀杏𢎞治嘉興府志二株歷唐宋至今屠氏圃雙桂秀水縣志在縣西屠氏圃垂蔭數畝數百年物也真如寺古松秀水縣志葉燮古松歌序真如寺有古松云是齊梁間物天慶觀檜至元嘉禾志枝柯偃蹇竒怪可觀有石刓梁朝檜三字在其下又崇德洲錢天監寺殿西南隅有梁朝檜憂歡石正德嘉善志永樂二年夏忠靖治水三吳立巨石於福源宫前河中測其消長名曰憂歡德藏寺鐘間窗括異志異銅所鑄音極洪響相傳初鑄時有匠者云俟吾至六十里乃擊之既去方至新坊寺僧遽扣之匠人嘆曰聲止於此矣石屋至元嘉禾志在海鹽縣南十八里豐山相傳為秦始皇屯兵之所九里松桐鄉縣志在甑山前一望喬林如同巨壑浙江通志卷四十一
