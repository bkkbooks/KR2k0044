body:
  text: 浙江通志卷四十一古蹟三嘉興府由拳古城太平寰宇記故由拳城在今嘉興縣南五里秦始皇見其山有王氣使諸囚來鑿此山囚倦並逃因號囚倦山置囚倦縣後訛由拳萬厯嘉興府志由拳山名在餘杭縣舊志作為囚倦非也嘉禾百咏考水經注呉記曰谷水出呉小湖經由拳故城下今春波門外合五水俗訛油潭謹按水經注無谷水經由拳故城之文考谷水即峽石山所出上谷湖水經縣出為澉浦圖經云澉湖諸水皆名谷水今指為出自水經注而呉記又不可得見後來作志者皆沿其誤矣射襄城嘉禾百詠考呉王禦越之所在郡城東北三十里萬厯嘉興府志今秀水縣東北麟瑞郷舊管里曰射城嘉興縣志今王江涇聞川主城萬厯嘉興府志呉王禦越之所在秀水縣治北嘉禾百咏考東顧城西新城南于城北主城四城皆在郡境呉築以禦越者新城萬厯嘉興府志呉王禦越之所在秀水縣治西北𢎞治嘉興府志在秀水縣西二十七里唐武宗㑹昌元年嘗築土城後罷㝷成市井古城至元嘉禾志在海鹽縣東南五十歩故邑城至元嘉禾志在海鹽縣東北三十六里周回半里天啓平湖縣志故邑城在乍浦故邑山下一作顧邑顧榮之先句踐支庶封於此子孫遂以為姓漢海鹽縣治也宋劉裕追孫恩復築城於此名勝志平湖縣七里為故邑山東漢時海鹽縣䧟為湖移置此山㝷馬嘷為秦舊邑因名故邑又作顧以為顧視此邑嘉興府志海鹽縣東南郭下里有東城又縣東南有古城古顧音相近此即東顧城也閒牕括異志今故邑山居民掘地多得古器物蓋縣治舊址耳于城萬厯嘉興府志在海鹽縣治西北十八里有于相國廟皆呉王禦越之所嘉興府志海鹽縣西開濟郷有璵城里今止有璵城橋于璵音近而訛歴志不詳所自惟仇志云袁崧所築以其地有教義里意為崧耳馬嘷城越絶書呉代越道逢大風車敗馬失匹馬啼嘷事見呉史名勝志在海鹽縣治東南三百歩海鹽縣圖經呉禦越城亦名馬嘷城九州志云谷水之右有馬睪城即此望海城海鹽縣志縣南三十五里唐開元五年置何城萬厯嘉興府志在崇德縣治西名勝志句踐拓地北至禦兒夫差築何晏管萱四城拒之何城有何津王廟相傳呉王遣以築城者萱城萬厯嘉興府志在崇德縣治東名勝志在崇德東津郷檇李城九域志史記呉伐越句踐迎擊之檇李賈逵曰越地杜預曰今呉郡嘉興縣南有檇李城即其地也𢎞治嘉興府志檇李城在桐郷縣濮院之西濮院即古檇李墟也其地有范蠡塢嘉禾百咏考去郡城西南四十五里因其地産佳李故名越絶作就李公羊傳作醉里相傳呉王醉西施於此謹按秀水縣志亦載檇李城因濮院在秀水西南壤相接也然據嘉禾百咏考云去郡城西南四十五里則其地析屬桐郷當從𢎞治郡志為確晉嘉興屯至元嘉禾志嘉興縣高王廟高使君晉建武中出為監屯校尉領兵三千屯結於此唐嘉興屯𢎞治嘉興府志高豐廟在嘉興縣東十八里唐屯田之所宋節推㕔𢎞治嘉興府志在郡治西南三十歩元為管軍鎭撫治王持垕為記宋州倅東㕔至元嘉禾志在郡治東二十歩宋張先為倅於此宋州倅西㕔至元嘉禾志在郡治西通判㕔嘉興府圖記俱入嘉興縣治内宋司理院至元嘉禾志司獄司在郡治南五十歩舊司理院也嘉興府圖記府獄洪武中即宋參軍舊廨為之宋嘉興縣丞㕔萬厯秀水縣志興聖寺去縣東南二百武舊為嘉興縣丞㕔揮塵錄孝宗誕育於此後為興聖寺理宗御書流虹聖地興聖之寺宋嘉興監太平寰宇記嘉興監本秀州嘉興縣煎鹽之所升為監宋監倉東㕔嘉興府圖記府治東北入靈光街為布政分司在宋時為監倉東㕔入元為亷訪分司宋漕運司治嘉興府圖記在府治東北一百歩當瓶山南守禦千户所本宋漕運司舊址元時嘗調邳州翼萬户鎮守宋廣惠院嘉興府圖記由府東出春波門一里天馬橋直北為養濟院在宋時為廣惠院呉潛為記元嘉興路總管府至元嘉禾志在子城内舊府治也譙樓外有舊宣詔頒春二亭金吾為記元錄事司至元嘉禾志在郡治西北二百歩舊監倉東㕔元漕運司𢎞治嘉興府志在府治北二百歩元浙江鹽提舉司至元嘉禾志在府治西南一里半舊買納鹽場也元鎭守萬户府至元嘉禾志舊府判東㕔元管軍鎭府至元嘉禾志舊節推㕔元營田都務至元嘉禾志在嘉興縣治南二十六里元嘉興縣衙至元嘉禾志在郡治東北二百歩元在城酒稅司嘉興府志熙春樓在郡治北五十歩元原屬酒庫故坊亦名燕春今為驛紫桃軒雜綴宋時立酒務於州治後罌罍之屬陶以給用所退破甓隱起成岡所謂瓶山也元新城務𢎞治嘉興府志在秀水縣西北二十七里柿林郷新城鎭洪武三年改為新城稅課局嘉興府志城本作塍即柿林即曾魯公丞相權新塍稅處元陶莊務𢎞治嘉興府志在秀水縣東北五十四里思賢郷陶莊市洪武三年改為陶莊稅課局元風涇白牛務嘉興府圖經在嘉善縣治東北二十四里風涇鎭洪武三年改為風涇稅課局元魏塘務萬厯嘉興府志在嘉善縣慶豐橋北宋亦有酒務漢海鹽縣舊治輿地廣記縣之故治順帝時陷而為湖今當湖是也大旱湖竭城郭猶可識元海鹽縣衙至元嘉禾志在縣城隍廟北三十歩有舊宣詔頒春二亭遺蹟唐寧海鎭至元嘉禾志在海鹽縣東天寳十載太守趙居貞置淳化二年移置近縣一里海鹽縣圖經元陷入海又東一里為横浦東南五十里為貯水陂以及望海鎭鎭海樓海月亭諸蹟俱淪於海漢司鹽校尉海鹽縣圖經呉王濞置司鹽校尉居馬嘷城煮海擅利其地即名海鹽鄉宋鹽場萬厯嘉興府志海鹽縣沙腰村為海沙場鹽課司即宋鹽場明道間罷景祐間復置宋嘉興貢院閒牕括異志本海鹽州學有采芹橋泮水之舊規在焉後遷學鳯池坊此地遂為貢院元海鹽在城務嘉興府圖經西關大柵橋南為海鹽稅課局即元稅課務元澉浦務嘉興府圖經海鹽縣西南三十六里為澉浦稅課局宋初領於鎭嘉定間别置元為澉浦務元崇德縣衙至元嘉禾志在天清宫東北五十歩舊縣治也有舊宣詔頒春二亭遺蹟元崇德在城務嘉興府圖記崇德縣東北為河泊所本宋酒稅務洪武初改稅課局正德中罷為河泊所元石門務嘉興府圖記桐鄉縣西南石門鎭東柵為宋石門稅課局呉元年崇德縣重建分隸桐鄉嘉興府志宋黄勉齋曾監石門酒庫其申提領劄云石門為酒庫之首元當湖務嘉興府圖記平湖縣治西二百五十歩為當湖稅課局元為當湖務元市舶司萬厯嘉興府志平湖縣治西南二十七里為乍浦巡檢司元為市舶司元乍浦務嘉興府圖記平湖縣治南元廣陳務嘉興府圖記平湖縣東二十七里元留濟倉嘉興府圖記平湖縣治西二十七里為廣陳預備倉元為留濟倉洪武中重建宋巡檢寨嘉興府圖記桐鄉縣皁林巡檢司宋初曰巡檢寨在縣市南右為皁林驛徐長者園嘉禾百詠考在嘉興長者宋人學道年八十治圃栽花於此柳氏園𢎞治嘉興府志滮湖在嘉興縣南二里有柳氏園柳氏宋世科也周伯琦桞氏園記鴛鴦湖舊有宣公書院後廢至紹定中軍倅陳塤重於園中設宣公像而祀之嘉興府志園後即會景亭㑹景園名勝志在滮湖濵宋潘思旦園又名㑹景亭嘉禾百詠考園中有南塢海棠亭白蓮沼桃花亭紅薇徑茶溪仙鶴亭芙蓉塘白苧橋漁溆十景趙孟時愛州滮湖㑹景亭記故宋尚書潘公知秀州水深土膏遂有卜居之志及仕至通顯即解印歸治室於郡城東春波門外償初志也由南塢暨漁溆可㳺者凡十一所皆利於舟楫而會於斯築土為室構木為亭列樹花果松栢榆柳於其前良辰美景載酒周游沿回放浪歸則憇於亭上因名會景亭陸蒙老會景亭詩清入闌干酒易醒春風楊柳㡬沙汀平波抵得瀟湘濶只欠峰螺數㸃青趙老園嘉禾百詠考在郡城西三里景德寺後析屬秀水宋殿丞趙袞字希甫歸隱藏書之處陳堯俞題曰趙老園名勝志即白龍潭三塔寺方丈後焦家園方輿勝覽宋殿帥焦虎臣園𢎞治嘉興府志在秀水通越門内東北二百歩舊有三峰石嘉興縣志石高二丈餘宣德初為内使舁去今為花園倉萬厯嘉興府志園置流觴曲水石尚存沈氏園嘉興府志宋建炎初張俊討秀卒徐明之亂至郡北沈氏園陳園正德嘉善縣志陳氏東西園在魏塘鎭元萬户陳景仁所闢内有雪月樓凡亭榭七十二元王園器為記其西園即今縣治也萬厯嘉善縣志至正時有星隕石於鎭陳取為山今縣理所即隕石處唐氏園正德嘉善縣志在西塘鎭東宋大姓唐介福兄弟别墅山池亭榭冠絶一時常氏園海鹽縣圖經宋常氏邑世家園距清灝門西南郊牧間有滇茶照五里外後為呂氏秀遠莊獨寤園百可園嘉興府志並在海鹽縣北城皆鄭端簡讀書處餘春園嘉興府志在海鹽一名小瀛洲嘉靖中徐咸築明詩綜子正守襄陽歸築園城闉自撰社會記後舎園基為倉東西張氏園名勝志崇德石門塘嘉興府志宋張子修嘗監石門酒稅因家焉與邑人張汝昌並有園林之勝内有流杯亭遂初亭乳鴨池戴敏張園詩乳鴨池塘水淺深熟梅天氣半晴隂東園載酒西園醉摘盡枇杷滿樹金東臯園嘉靖平湖縣志魯簡肅園自縣治迤東皆其遺址今游橋尚存一云東臯園在博陵祠後今為東林禪院西臯園在今楊梅園地今為西林禪院昭明讀書園嘉興府志一名昭明館昭明太子師事沈約就館於此後捨館為呉德寺今青墩之密印也東臯園至元嘉禾志在崇德青墩宋處士沈平所構嘉興府圖記有釣漁磯梅花關賽蓬萊堂迷仙境綠荷池宰執鄭太師呉履齋趙觀相皆嘗游歴每元宵節宴集於此端平末廢烏青志入明為李參知拳勺園内有餐英館木雞窩長嘯閒吟二亭眞隱樓香蓬居今屬桐鄉境彰慶館樂郊私語海鹽縣西安仁橋宋樞宻郭三益彰慶館基也𢎞治海鹽縣志紹聖四年令閻建為縣人郭瑑立以瑑居隘令對門蓋亭以為延賔之所亭名彰慶宣和中令徐盤立石綺川館海鹽縣圖經在縣東南尉㕔之南亭景德三年令翁煒建於夫子廟前池上𢎞治海鹽縣志綺川館宋淳熙八年尉趙善沛就移風亭舊址建錢王館萬厯嘉興府志崇德縣治北三十里錢林村呉越王微時曾館於此後貴改為祖祠語溪館至元嘉禾志崇德縣西南有語溪館錦莊至元嘉禾志嘉興縣東八里元有白蓮寺廢址後為趙州倅雋之錦莊布哈莊嘉興府志許恂如詩注秀水縣城北二十里元丞相布哈莊今訛百花蔣氏莊至元嘉禾志城南舊為游賞之所梅花莊嘉興府志洪武舉人王鏞與弟鈞居梅會里梁孟敬有題嘉興王氏梅花莊詩竹莊萬厯嘉善縣志在魏塘鎭後元呉瓘所闢也舊有池數十畆天然若湖構水心亭瀟灑卓絶沙棠莊正德嘉善縣志在西塘鎭東元馬氏居之有垂絲海棠一本圍可四尺旁有海棠亭釣魚臺杏花莊萬厯嘉善縣志在風涇西南半里元戴光遠别墅栽杏花甚多東作莊萬厯嘉善縣志在魏塘街孫詢别業李東陽春日東作莊詩知時好雨正當春黄犢籬邉綠水濵林外不須催布榖農家自少晏眠人雲濤莊澉水志在永安湖上九把翁許相卿建即為孫太白山人置鶴田之許台仲甫也歐餘漫錄鶴田在九把山書院之陽倚山面湖柳莊嘉興府志崇德州鳯鳴寺東南二里鮑恂記云程德剛所居石莊嘉靖平湖縣志在東泖宋江淮總管石都尉賜莊有石田飼鶴有石亭有總管廟天啓平湖縣志石莊記云三泖之上大海環其外仰而見天天若彌峻扶桑出日江東暮雲徃往可見之縹緲色象間亦風清而局遠矣嘯諾堂名勝志在州治之西宋郡守沈括建沈括秀州官舎詩草滿池塘霜送梅林疎野色逈樓臺天圍故越侵雲近潮上孤城帶月回客夢冷隨楓葉斷秋心低逐雁聲來流