body:
  text: 浙江通志卷二百六十二藝文四記武康縣義倉記明黄淮國家惠養斯民以固邦本恒恐閭閻阨於饑餒不得以遂其生上煩聖慮宵旰靡寕重念太祖開國時舊設預備倉廩歲乆馴致廢弛於是慎簡廷臣授以璽書條畫事宜分諸各道以經理之仍命藩憲重臣之亷敏者以為之佐刑部署郎中事員外郎劉廣衡承命徃浙江偕右布政使方廷玉按察使副使王豫協修預備之政按行至湖集郡守趙登暨僚屬同知劉禎知縣丁倬等宣揚德意仍召區里之長郷之耆民羣聚於庭諄切訓飭益詳焉邑中富羡之家仰聆玉音感激奮厲願出輪於官未浹旬得榖五千九百石勅使司同藩憲喜其民之效義也勞之以酒果榮之以繒綵即日具名以聞既而鳩工庀材構倉三十楹以備儲蓄欽遵勅㫖選忠厚公正耆民及殷富淳良之家嚴慎守兼出納之數府委通判賀泰縣委主簿夏安總其政申明戒約委曲詳備大要以絶私為本里社細民皆歡欣感悦仰戴聖恩生成之賜也郡縣樂其事之有成徴文為記勒石以垂示永乆粤惟成周縣都皆有委積以衞㐫荒自漢以来常平社倉義倉大率皆倣周制世殊事異更變不一皇上逺稽古典近追祖宗成法遣使巡厯修復舊政而光大之俾得便宜行事務期民受實惠綸綍渙頒而效義之民雲集響應倉廩充實賑貸於是而給焉傳曰未有上好仁而下不好義者此之謂也勅使同心恊義克稱任使皇華煌赫遐邇具瞻郡邑官僚祗承惟謹不煩而事集防閑有方侵漁之弊消於法皆當得書其義民姓字俱刋碑隂庶使觀者視效興起後克有繼也梅長者祠堂記明方孝孺天地至和之氣時得之而為春日得之而為煦風得之而為薰皆所以長養萬物其化至密其用至醇其在天德也則為仁為至善之德為惇厚之化為無言之教備其理者在唐虞為八元在周為仁人在漢始稱長者其取義以為能長育人才先躬行而尚本質有長盛昌大之道故善治天下者必貴之漢之大臣惟塞侯張歐皆以長者稱因其行而求之若曹懿侯之清浄寕謐萬石君之父子謙謹不譁丙丞相之居德不伐要皆長者之選長者之為用迂而不曲緩而不滯寛大忠厚得聖人之度人主能用之者其國必興後嗣必䝉其利非若才智之士淺而易窮也彼孑孑然以露其智術任之以事聲威錯出非不可喜然刻薄少恩行法無餘意而慮民無隱情喜之者未終而厭苦之者衆矣若商鞅之於秦王猛之於苻氏曾未旋踵而大亂作豈其才智之不足歟長厚之道微而人不懷其德也故天下可以無才能之人不可以無長者不幸而乏才能焉事不過於廢弛不幸而無忠厚之長者其誰恃而不亡乎長者之用梁肉也才智之效藥石也吾以所聞所見推之國有忠厚之治者後必不衰家之乆存而不墜者必長者之子孫台之寕海有梅氏考之圖譜昔有諱盛字昌圖者仕晉為章安令擢南昌别駕知晉將亡即是邑而隱焉常誦佛書而有靈鳥降其所居之側若諦聴者歲餘始知郡縣以為鳳集上其事宋文帝聞而下詔褒之上表稱謝曰此殆覽陛下之德耳臣何與焉帝咨嗟稱為長者仍命郡縣闢其所居舍為丹丘寺去今八百餘年矣其子孫衆多為邑巨家而寺亦不廢宋淳祐中諸孫之學佛者良阜建重閣像而事之厯年雖乆而未有記其事者夫以劉宋立國未數年而宋社為墟長者之傳今千載而猶未艾此其所為之可稱豈特一言之善哉宋文帝知其為長者而不知長者之為用國之不夀也固宜而長者之澤至於子孫而益著天之於善人其所施甚逺矣祠而奉之非特寓乎尊祖之思使聞長者之風者却去浮薄而趨忠厚豈不足為天下之勸乎然則長者雖不獲如塞侯等之有益當時而其遺澤之所及未始不同也乃為詩以系之巾山草堂記明方孝孺踰浙江以東多大山東南極海上尤絶秀其最著者天台四明雁蕩天姥皆穹窿嵁峻為天下竒觀跡擬乎蓬閬名播乎區極士之選幽探勝者宜其樂趨之然而居其旁者徃徃終身未嘗一至豈以其崇高不易援企而遺之歟台城有小山特立圓秀蒼潤逺望之如人之弁冠人因謂之曰巾山其上有樓閣室廬之美高人至郡者無不徃游凡宅於左右者必構危架迥以挹取朝嵐夕霏之異態葢其勢邇且卑其所藴易見至而窮之不難也是以衆樂觀焉盧處士定谷家正與山相面因名其堂曰巾山草堂定谷知讀書識義理其才智可用而恬静不競非安於卑近者豈其心有所得鉅小崇卑固不足較乎夫天下之至崇大者莫過於道而卑且近者道亦未嘗不在也憚其難而安於淺陋固不可忽細微而慕夫高且大者亦烏可哉巾山巖壑之盛視天台四明固有間焉其有㑹於人心而人樂之不厭者果有異乎否耶定谷必有以識此矣徃者壬戍七月之望予偕葉君彞仲張君廷璧林君公輔陳君元采夜登絶頂飲酒望月縱談千古竟夕不眠予謂葉君曰昔蘓子瞻夜登黄樓觀王定國諸公登桓山吹笛飲酒乗月而歸以為太白死三百年無此樂矣斯樂也又子瞻死三百年後所無也諸君皆大笑追計其時忽十五年今存者獨予與張陳耳二君亦將老矣予繋職數千里未得歸然則予記定谷之草堂能無慨然乎定谷有子曰信慎敏好文其尚語山靈待吾東歸當約同志重游厯覽海上諸山以盡宇宙之大觀其樂葢未艾也湖州布政分司池亭記明左贊吳興行省東畔有隙地不五畝先得好事者輦石為山構亭臨沼可羅坐觴咏沼旁可習射翠竹老檜參錯其間成化己亥秋予同左布政使杜君益之有事於此公餘少憇暢懷發粹曠如也距今五年豐草彌望亭廢怪問之左右曰按部者歲不一二至至則三五日而去窘於簿書遑及游息有司亦蔑視之日就荒蕪勢使然也予暫於亭之故基命在官服役者剷刈叢草畚除瓦礫已而竹石呈露不亭而麗風約池萍倒輞雲影魚鳥欣欣若有喜色如人之身自頂放踵爬梳澡雪垢膩浄盡而精神暢矣嗟夫世之勝區鞠為榛莽如此𩔖者何限必待人而理之庶可復舊若予斯舉不勞於民又不費財昔日光景依然不晦後之君子按部於斯者尚修治之哉勅建正學祠記明商輅正學祠在金華郡城東一里郡守李嗣章勅建以祀先儒何文定公王文憲公金文安公許文懿公四先生皆郡人宋元間此地有陶氏所構書院四先生皆講道於此後陶氏家益落書院尋廢其地已為有力者闢為蔬圃成化丙戍夏李以郎官出守下車首訪遺跡意圖規復適浙東道僉憲辛公訪按郡守遂以事白之辛欣然曰表章先賢風勵後學吾輩職也且四賢著述有功聖經固宜從祀孔子况書院乎即具實以聞詔許准龜山楊氏例立祀郷郡春秋致祭特賜祠額曰正學云守承命唯謹謀諸同知牛盛輩相與聚材鳩工闢書院舊址建立祠宇為屋正堂五間中門五間左右廂前門如數宰牲有厨齋宿有房飾以丹漆繚以垣墉傑閣峥嶸華扁曅然經始於成化戊子秋九月訖工於是歲冬十月守卜日落成於是郡邑僚屬庠序師生市郷耆老瞻拜之餘皆嘖嘖稱嘆百年文獻至此一新足以見聖天子崇儒重道之功賢有司興廢舉墜之力自是正學有傳斯文增光而邦人士亦永有所賴其為彞倫風化之助豈淺淺哉守以為盛事不可無述因走書求予記惟正學在天地間猶元氣也元氣運而後歲功成正學明而後治道著三代以上正學在聖賢治道在天下固無容言矣三代以下正學在六經治道在人心非有諸儒闡明之功則天下貿貿焉又惡知孔孟之書為正學之根抵治道之軌範歟四先生產東箂吕成公之郷出紫陽朱子之後觀感興起探討服行師友相成所得多矣考之郡志如文定力窮伊洛之源文憲身任天下之重文安踐履篤實文懿素性充澹其操存同也文定有諸書發揮文憲有讀易等記文安有論孟考證文懿有四書叢説其著述同也夫正學具於六經原於人心者體也見於治道者其用也六經既明則人心以正治道以順而正學之功於斯至矣然則四先生有功於六經即有功於正學有功於人心即有功於治道天下後世葢有隂被其澤者祠而祀之豈非有司之先務哉是舉也宣上意淑人心厚彞倫勵風俗其功不亦大乎僉憲河南人郡守廣東人皆名進士其相率為此誠知所重者後人繼是而葺治之則斯文之傳為弗朽矣予故為之記五湖記明王鏊呉郡之西南有巨浸焉廣三萬六千頃中有山七十二襟帶三州蘓湖常也東南諸水皆歸焉其最大者二一自寕國建康等處入溧陽迤邐至長塘湖并潤州金壇延陵丹陽諸水㑹於宜興以入今寕國建康之水不由此矣一自宣歙天目諸山下杭之臨安餘杭湖之安吉武康長興以入而皆由呉江分流以入海一名震澤書所謂震澤底定是也一名具區周禮職方揚州之藪曰具區山海經浮玊之山北堂具區是也一名笠澤左傳越伐呉呉子禦之笠澤是也一名五湖范蠡乗舟出五湖口太史公登姑蘓望五湖是也五湖者張勃呉録云周行五百里故名虞仲翔云太湖東通長洲松江南通烏程霅溪西通義興荆溪北通晉陵滆河東連嘉興韭溪水凡五道故謂之五湖陸魯望云太湖上稟咸池五車之氣故一水五名然今湖中亦自有五湖莫釐之東周三十餘里曰菱湖其西北周五十里曰莫湖長山之東周五十里曰游湖㳂無錫老岸周一百九十里曰貢湖胥山之西南周六十里曰胥湖五湖之外又有三小湖夫椒山東曰梅梁湖杜圻之西魚查之東曰金鼎湖林屋之東曰東臯里湖而吳人稱謂則惟曰太湖云游石佛記明黄綰石佛在雁蕩之隂路從南閣入行至溪口見大石纍纍高度百尺餘横亘溪上若無路以入天雨雪同行皆有倦色余獨興未已猶憇道邊石上遙望大石下洞中白水流出遂起揭跣沿流步入視洞中崆峒深寂斗折蛇行其中若楹若防若牐若堰若門若坻水分流其間開滙為潭泓然澄碧或溢而流或高而堕或曲而奔潨然悠然窈然不知其去行且半里復見天宇兩山夾澗水中流山上怪石聳出雲表不暇覽記又行四五里仰視巨石兩兩高數百丈上覆復合中空一線僅尺許可數百步如丹闕開闔於層霄縹緲間曰顯聖門瀑水自門内絶壁高澗瀉下散布門下流去門右西上有洞深濶數十丈捫崖而登石髓下滴凝為三像是石佛之所由名也由此左折上見石碣宋永嘉令葛逢與僧某同游所記於此縛松梯㯠挽可上北望石峽澗水所從出峽中稍進可至常雲俗呼為百尖有石浴桶天橋飛湫之竒出則有湖南版藏之勝皆數里之間不可殫也遊永康山水記明黄綰從剡入永康與石門子遊夀巖行見五峯相亞意即夀巖石門子曰此俗呼為翁㜑巖者請為易之其嶄然而出者曰天柱其覆而左者曰石鐘其踞而右者曰維摩臺又左曰石甑又右曰蟾蜍行度一舍沿溪折入見大石挿空㟴屼不可仰視羣木森茂雜然其間又行從木杪見樓閣在石壁中梯石而升弛擔而休倚檻見東南一峯突起曰鷄鳴少進一峯竦出而俯曰覆釡覆釡之西一峯尤傑曰桃花北一峯稍低水時時下滴曰瀑布瀑布左連大石壁下梯石望之高濶數百丈若晴霞爛然曰固厚壁下皆洞其一即所居樓閣謂之夀巖時日欲晡谷中有雲氣籠木蓊然蒼碧日穿木葉入照洞中光景甚佳西上塗堊僅存烟㾗荏苒皆宋元人書遊觀詩及歲月姓名陳龍川朱晦翁吕子約嘗同遊乃龍川親書其上又有兠率臺三字亦云晦翁親書石門子設酒茗閣上飯罷西行又一洞中置觀音像旁設大士像十八洞口有四楹楹間有粉壁屢經塗治新故數層見題詩畫竹皆剥落不全惟胡彦恭詩及特穆爾布哈會兵識字無恙洞廣而邃可居又西有石峽飛泉直下上有龍穴祈禱輒應同遊林典卿周鳳鳴應抑之周德純羅坐其中周晉明周仲噐後至石門子欲即此建麗澤祠日落歸僧廬宿焉明日去方巖出口見一峯昻首北立曰天馬下有村塢石穴中有居民垣竹茨牖儼若太古踰澗南行谿石窈窕上有一屏名青玊循青玊右行至一岡坐望方巖如方城向夕餘霞隱映路從削壁升石堦八九轉未至見崖端中開一門既登如行雉堞樓㯭間忽而青山蜿蜒中藏寺宇如平埜不知為方巖絶頂世傳有胡侍郎則嘗讀書其中殁遂為神宋徽宗時睦賊方臘宼永康郷民皆避於此賊顧絶澗縁大藤將至赤蛇齧藤中斷賊皆堕死澗中兩石並起百餘丈中僅一線名千人藤賊乃縁澗道登據夢神人騎白馬飲泉明日泉涸賊懼遂降皆謂胡公靈異其民至今崇信寺後有石洞可坐又隂森巔絶有小石洞為胡公讀書堂日已暮乃下復至後巖擁蒲燃燈又十餘宿霜風凄急木葉盡赤諸友漸去應天監趙孟立徐子實相繼復来論各有得山中小生程梓周玲孫桐皆奮然有志他日去石鼓寮城舜夫載酒於路邀坐其叔父池亭天欲暮促行四五里至山口風雨至崖松黝黑白烟横飛窅然不知所入遂過靈巖洞在山上南北通明可容千餘人由洞後石嶺登入黄葉蕭蕭客皆凄然倦即洞草鋪燒地爐環坐夜乆乃卧明日天晴出洞南仰視洞上蒼峯矗立崖端栢枯小樹綴石若藤蔓下垂掩映屋瓦丹碧可愛稍西一門下出崖半棧石為道曰飛橋下望坡田自成村落東行有井深可百丈僧云昔有龍飛去復由後嶺下沿溪望北山崖石數松林鬱鬱皆可游不暇顧再至石鼓寮翠壁參差入谷中小洞邃寂即晦翁欲屋吕東萊讀書處也西南見瀑布下注其下有潭泓深澄黛班魚數尾游揚自得聞人聲即逝石門舜夫鳳鳴列坐石上皆喜呼童攜酒共酌乆之不忍去又云東萊嘗買田四十畝今屬方巖寺故籍猶存可考既出僉謂當紀以俟來者濬河記明王守仁越人以舟楫為輿馬濵河而廛者皆巨室也日規月築水道淤溢畜洩既亡旱澇頻仍商旅日争於途至有鬭而死者矣南子乃決沮障復舊防去豪商之壅削勢家之侵失利之徒胥怨交謗從而謠之曰南子瞿瞿實破我廬瞿瞿南守使我奔走人曰吾守其厲民歟何其謗者之多也陽明子曰遲之吾未聞以佚道使民而或有怨之者也既而舟楫通利行旅歡呼絡繹是秋大旱江河龜坼越之人收獲輸載如常明年大水居民免於墊溺逺近稱忭又從而歌之曰相彼舟人矣昔掲以曳矣今歌以楫矣旱之歊也微南侯兮吾其燋矣霪其彌月矣微南侯兮吾其魚鼈矣我輸我獲矣我游我息矣長渠之活矣惟南侯之流澤矣人曰信哉陽明子之言未聞以佚道使民而或有怨之者也紀其事於石以詔来者禹穴記明鄭善夫禹穴在會稽山隂昔黄帝藏書處也禹治水至稽山得黄帝水經於穴中按而行之而後水土平故曰禹穴世莫詳其處或曰即今陽明洞是已又云禹既平水土會諸侯稽功於塗山尋崩遂葬於會稽之隂故山曰會稽穴曰禹穴至今窆石尚存或然也後二千餘年而司馬遷氏来探書禹穴歸而作史記文章煥然為百代冠説者謂是山川之助也又後千餘年而晉安鄭善夫氏及山隂朱君節王君琥氏来復探禹穴尋黄帝藏書處乃玩梅梁摩挲窆石覩先聖王遺像得禹穴於菲井之上徘徊瞻眺想其卑宫而菲食為之喟然興懐夫自禹跡以後三千年間游者不知其幾而惟司馬氏顯此山川之能發為文章亦惟司馬氏世有不為文章者於山川何取也自昔至人見轉蓬而造車觀游魚而造舟得河圖而成卦因洛書而作範咸取諸物也余乃今知所取於山川矣登秦望山記明董玘秦望山在越中最為傑特史記為始皇東巡至此故書予昔以省覲歸得縱游諸溪山獨歉未及秦望今年冬仲王邑侯道修除道以邀余游乃與司馬邦柱汪子宿會至雲門寺命輿而登循麓數百步石泉鏘然折而北至小阜疑在霄漢間問樵者曰此未及半里又數十步石益峻路益縈曲乃攝衣攀援以上至山之絶頂而止遙望東海渺瀰一白雲起天末隱若島嶼俯瞰郡城迤邐一帶入山纍纍僅如卷石南接宛委諸峯列若屏障左右拱峙勢如飛舞禹夔在焉西臨鑑湖烟水浮映帆影出没有無間葢一郡數百里之土壤與夫千巖萬壑之競争者皆在履舄下一覽而盡乆之落日漸低暝色四合林木震動乃尋舊路而下子宿與邦柱相顧歎曰吾越人生長於斯有終身弗獲一至焉者今日之游詎非幸歟予曰傳有之不登高山不知天之高也不臨深溪不知地之厚也秦望且爾况所謂泰岱恒華者哉若乃始皇之事固無足道者而兹山之勝亦非泰所能辱也重建忠節祠記明吳鼎初𢎞治十載巡鹺部使者舒城姚公建忠節坊於杭以表吳行人伍公唐僕射褚公宋岳武穆王我朝于肅愍公語具上蔡李相國記中坊左為記石亭亭外壖垣縣官地也比歲垣圮亭毁地没鞠為茂圃僅存記石漫漶而風聲微矣岳氏于氏及郡縣諸生以白按使吉水周公事下杜倅炳徴諸徃牒暨故老良然已反正其地周公曰國家以忠義勸士而士節不立其諸宣揚導化者之責乎余實忝竊其官滅賢大夫之烈不述堕先正所建余甚懼焉乃營作忠節祠於故侵地會令毁淫祠則撤其材為堂像設四公於中前重門東序西序後寢各四楹中門左右各為亭一以覆李公記石暨今記石他庖湢周垣率如儀經始嘉靖十有六年冬十月越明年夏且落成周公去又明年滇府髙公來按鹺政歎是義激揚甚大而未有紀述告郡太守陳侯曰侵地復歸頼前記足徴也今已祠而無記後將何考焉相與問於鼎或曰何祠乎忠節曰祠人臣以忠而反被禍者也伍公可謂竭忠所事矣褚公可謂正言不諱者矣岳公可謂主辱臣死者矣于公可謂安社稷為恱者矣舍四公無死忠者乎曰有有則何祠乎四公或生於斯或没於斯者也然四祠載在令甲復祠不近黷乎曰秩祀古今同德合義益廣風勸春秋與賢者不一而足意也惡乎黷矧曰有其舉之莫之敢廢者哉是所謂崇國典修舊章紹聞前人之懿也而或疑未經建白於朝亦過矣爰為辭四章俾歌以祀四公其辭曰騁余望兮海東靈何為兮水中靈之來兮潮生化鴟夷兮長虹駕素馬兮朱旟撫長劍兮􅍵􅍵臺有麋兮墓有檟嗟太息兮焉終伍行人展吳歌兮越歈魂不歸兮焉如狐死必首丘兮胡不反葬於故都靈修化兮媒勞綠衣粲兮愁余奠桂漿兮椒醑招魂歸來兮南方不可以居禇僕射鼓鼙兮鐃歌君不樂兮奈何有酒兮如澠君不飲兮獨醒鐵甲如雲兮蔽日而來下蚩尤為旗兮元豹為馬攝天矢兮執天槍落旄頭兮殪天狼嵗既宴兮壮士驚杳冥冥兮懐北征岳少保吉日兮出狩獻公兮椒酒陳鏤簋兮縆朱絃奏黄鐘兮破瓦缶死從彭咸之居兮生與仲父為友敵何為兮四裔吾何為兮中原思公功兮未敢言于太傳雁山圖記明陸深古稱山河兩戒南戒盡雁蕩山山髙四十里頂上有湖方可十里雁棲之故曰雁蕩袁采云雁蕩山溫州樂清縣東北山之通名也去縣九十里山純石沈存中云諸峯峭險峻怪不𩔖他山當是谷中為大水衝激土盡去而石獨立爾采為圖序總之云東西四谷西外谷有寺四曰古塔靈雲寶冠石門其流水自大芙蓉港出纜嶼其路平夷西谷有寺七曰能仁羅漢飛泉普明天柱華巖瑞鹿其水自峽流筋竹澗出清江皆峻嶺自石門來者曰東嶺自芙蓉來者曰丹芳嶺自筋竹來者曰飛泉嶺達於東谷曰馬鞍嶺東谷有寺四曰靈巖淨名靈峯真濟其水自峽流白溪溪上有路通白溪驛東北有嶺曰謝公嶺達東外谷谷有寺曰石梁東北至雙峯以達黄巖左有谷曰南北閤北有崇德寺水自蕩頂分流鄭向文云古樹老藤蔽虧天日林嶺葉隙時見異峯餘波洩注流為飛泉髙自雲霓懸㵼數道雁山之大畧如此其雜記一時之勝者石梁云夕月已没白雲西來如流水風吹橡栗墮瓦上轉射巖下小屋從瓴中擊地上積葉鏗鏜宛轉殆非世間金石音靈峯洞云兩大石相倚如合掌至掌中望見山嶨中青天如懸一片氷靈巖云巨石孤立如人俯月出正懸東南角星象纍纍下垂四旁如遊魚噞喁以身為浮游在灝氣上夜色如霜雪諸峯相向立儼然三四老翁衣冠而偶語能仁云雁山西南一峯絶髙下視衆山當是大父行舟行南海月餘常望見直西北有物如髙髻亂髪纔一握大以為指南西谷云出南戸望屋上山山圍屋如城府或纍纍如蜂腰綴下而刳其中淫淫然如燕巢斜罥而部其戸䫜者窊者仰者歕者羃者訛者傴者喙者掉者俛而窺者騰而上者如人各具耳目口鼻而無一相似又云從靈雲寺南入山時時過絶險挽牽懸藤偃木以過日正中僅到山巔望見永嘉大江如一線白李孝光云比從天台來入古東甌郡境上望見西南有山相向立如兩浮屠遊者咸曰此雁山門戸也深入視羅漢洞東西天柱大龍湫猶人有眉目十八寺皆肺腑也文人之所次第如此余聞之土人言秋遊雁蕩以南土溫溽春氣氤氳有毒螫至草木黄落方可入予將問途有告余者曰雁山循崖而南百里如畫自樂清道白河芳林逾窰嶴過長原經古塔本覺寶冠石門諸寺出白溪驛謂之右路自黄巖由白若嶺入石梁過靈巖逾馬鞍至能仁出長抵窑嶴謂之左路馬鞍嶺其分界云東谷之峯五十有三西谷之峯四十有八謂之百一峯有泉五有巖二十九有石三十三而石行廊為勝有潭七而沐浴為大有洞十二而道姑為古有溪四而四溪之水為會有嶺七而丹芳為峻凡四十九盤有障二而平霞最華有橋二有嶼二有閤二即南北也有菴三而八扇為雅有亭四而看不足為竒堂一曰資深遊人之所有事也余性喜登臨中嵗行萬里而勝處必徃嘗至天台獨於雁蕩有眷眷焉今老矣乃畫為圖聊以資臥遊之適因考論其概為記近時陸文量以藩叅出遊具列形勢謂西湖諸峯為劣至登平霞則獨立四顧疑非人間世也潘三峯御史加品隲焉謂有勵拔有空洞有雄渾淵澄勵拔如介空洞如通雄渾淵澄如旁行不流各舉其人𩔖之又出丹青談笑外矣皆有闗於兹山因并記之南泉記明陸深南泉古靈江也在今台州之臨海越西南諸山天台赤城之勝含靈蓄秀東盡於海故曰臨海城有二水其在城南流者曰靈江或曰澄江上接三江下引海門晚潮初上若拖白練於紫翠之間諸峯環列可數也王先生敬則家於其上自號曰南泉子少有大志不屑屑事家人生産又不喜為舉子業孤岸樸静淡如也年六十不識官府與人交不為欵曲籠罩之態遇有過必面折之獨不肯談人隂事有談者必趨而避之人以是稱長者胷次夷曠若澄淵涇渭甚辨惡穢濁之跡聞官府貪墨輒拍几大嘯隱隱不能休之泉上睨而嘆曰何以異於是清者水之本濁者水之蔽也乃掬而揚之既而仰天祝曰有不返於本而袪之蔽者非夫也暇日汎舟泉上倘徉容與出没於鷗波蜃樓間以滌塵坌而游髙明興酣耳熱從而歌之歌曰泉之清兮俟正命兮泉之濁兮德斯病兮聲出金石振盪於兩涯風波為湧人望之以為神仙嘉靖甲申嵗翁就養於子度字律生舉進士第二甲當官於京朝以獨子請便禄得教授於松郡敦本復古諸生化焉相率候翁起居於嵗時相謂曰先生之教我翁之遺也何可忘乃最其事以告深聞台據山海之瓌瑋志稱人神壮麗必有異人出於其間今世尤以氣節亷介聞天下有委身贊國忠烈貫世者其涵濡觀孚之久不有超出而獨詣者乎夫名山大川為國鎮藪非徒以峥嶸浩渺之觀也盖輔陽相隂産材育物其降為偉人鉅公經綸天地之宜修明禮樂之道與國咸休本朝若有人焉不在其身在其子孫其南泉翁之謂與諸生張其性輩數百人請書為南泉記因以為翁夀縉雲縣重建丹峯驛記明李建丹峯介栝婺崇山大陸中不通舟楫行者需於輿馬役者疲於奔命較壤邑諸驛稍稱難支嘉靖三紀之初海内涵濡聖化嵗無冦警民有穫資接濟甚敷供億不匱間值兜牟乾没之弊簿書勾核槩從濶畧時為之也繼遭倭變甌當其衝栝攖其害兵歉相仍室家告詘丹峯孔道日不暇應始操竒贏而切課之綜實嗇施徃來惟棘甚至驛廨頽漶僦民居以棲客使四牡皇華之意浸乎其微亦時為之也故一丹峯存廢而全栝昔今之所感與政體風俗之所宜可以占其機括矣守道徐公澄湖盖鋭志明作者也涖治逾期威行恵洽絶剽林嘯海之虞嵗復有秋民用寧宇其洞刷驛遞弊源經用裕而省約倍者皆公之規指也行部至縉諭令尹梅君淳曰考時會費驛可新也盍圖諸令尹祇承方畧調劑惟確鳩飭惟平凡作前廳三間左右厨庫書房七間川堂一間後堂三間儀門三間翼以右廂房六間大門三間庭除軒潔墻垣迥固袪揮霍藻繪之文而制貞於度時工材匠值之給而衆樂於趨出本道罪贖之需而民無所取經始於春三月不數時竣事適公入覲令尹告予曰丹峯終始經畫實公纖悉不遺之治也不可以無紀余考邑志元季總制孫公炎徙雲塘驛於縣溪南易名丹峯始建㕔堂洪武元年增馬庫房十年增臺門嗣後繕修不廢未有若邇嵗頽漶之甚者今規制視昔加隆費不煩而民不擾政體相維上行下效風俗轉移因之矣豈惟闗係一驛然哉軫公私之盈縮揆出入之權衡嚴兜牟乾没之防而不失四牡皇華之意永永可行則審時平政者責也慎無斁云登石門山記明方鵬青田石門之勝予嘗聞之然未有以見也嘉靖甲申二月既望以行縣至其地乃舍舟登陸循兩崖而行中有小溪廣可二丈愈西愈隘漸聞瀑泉淙淙有聲仰而望之如蒼龍白蛇下上飛舞於空濛縹緲之間其來若趨其去若追未嘗有一息之間使孔轍涖止則川上之歎當發於兹矣旁有石室幽敞可坐灑灑濺沫沾衣浥面覺有寒意焉遂起而北有亭翼然碑板四列亭之上有屋比然實道士故居困於田役逸而不返屋之左有閣傑然所謂石門洞者適當其下盖山之絶勝處也歸鳥四集山光向暝知不可留矣乃緩吟而還舟焉夫石門雜萬山之中人莫之竒也自謝康樂賞識之後唐宋諸賢相繼有作厥名遂著若康樂者雖謂之知己可也士不遇知己則泯没無聞曾兹山之不若予於是有感焉遂為之記仙巖記明王叔果永嘉之山惟大羅山最鉅磅礴數十里其西麓為仙巖乃天下二十六福地界永瑞二邑境其寺建自唐貞觀僧慧通者後廢至宋富民陳七宅兹村忽聞地下有鐘鼔聲遂捨為寺時有僧安楞嚴常騎虎出入號伏虎禪師大興法塲宋儒陳止齋先生讀書其中朱晦翁亦嘗來遊大書溪山第一四字兹山三面環抱惟西口空内有小溪環繞梅潭水由此出外通大河往年可入小舟今沙石淤溪矣寺前石坊舊額止鑑空伏虎二大字已失去今中書舍人趙性魯直扁書仙巖横扁書天下二十六福地由石坊轉入為虎溪橋覆以亭旁有繫虎石橋之南屹然而聳者為慧光塔昔傳有銀滿飛燈之異其東畔列石幢十餘座故有僧舍名外菴今廢度橋而北則止齋祠在焉乃瑞邑尹劉畿重建祠前有亭扁曰流芳則寺僧道憙為劉公作也祠後髙峯数十尋翳以蘿蔓望之鬱然為積翠峯由止齋祠東行有沙門有佛殿則國初鎮守内臣重建者甚宏偉嵗久敝壊今漸圖新焉而獅子峯臥象山則相為環抱者徃大殿東行數十歩憙上人新創一菴門扁叢林佳趣前為方丈後為清虚樓樓後駢植花卉亭面之曰挹芳瑞平朱文二令尹捐貲升構改曰超覽菴門外有亭相並坐其中則雲峯森列予題曰叅雲榭左方有舊菴今改為安禪之所由舊菴東轉折而北有門翼然懸晦翁所書溪山第一扁前行數十歩為嘉樹臺以古榕樹根盤崖上重䕃交翠其下甃石為臺臺之東為流觴亭亭八角水環繞流觴仍注於池池周圍數十尋多植白蓮名曰白蓮池泰順歐尹益資寺僧作亭池中而問名於予予命曰憇蓮出流觴亭循崖北行躡級而上為翠微嶺嶺側有石如屏刻唐吏部侍郎姚揆銘嶺下俯見澄潭志載有三仙姑謁安禪師一語而悟入潭化去因以名潭前為仰上臺以仰而望之則止齋讀書臺在焉臺表西崖髙處有石如砥方數十丈旁鑿小石盂注水盥手則止齋舊蹟也由仰止亭北行乃入梅潭正路又折而東崖谷甚異有洞如室盤旋而通梅潭名通元洞洞之背有亭少師張文忠公孚敬建名澤潤亭亭之前即梅雨潭潭之勝在此山為最四面巖壁削立瀑水飛灑潭中空濛若細雨然潭口兩巨巖相倚中開一空向背亂石堆塞今砌石為磯正面飛瀑名曰歕玉磯可列二卓坐數人在磯上對瀑如處竈門引首自内觀天也潭之四周崖壁竒絶昔傳有升仙其上者為昇仙巖又有振玉亭在潭上近西與飛瀑相對乃今瑞邑余尹世儒新建越潭之東崖稍循澗髙陟為三皇井煉丹井黄帝池其義未詳葢幻迹云再上為雷潭潭深䆳莫窺其底以巨石投之若雷鳴又有龍鬚潭在雷潭之上水循崖而下如懸布或以黄帝乗龍飛升時有鬚墮故名由潭西登則有白雲上方菴乃憙上人所構即伏虎禪師菴故址菴僅一楹望之如斗大而延賓禮佛入定各有其方至庖厠庫湢之屬亦罔不備憙上人之經制巧矣初上人於此入定三年不出戸予命其住持仙巖寺始下三菴之上為玉函潭去梅潭約二三里遊人率至此而返山漸髙峻已為仙巖絶境矣皆可園記明茅坤沃洲者界天姥石橋之間多長林美壑而古之隱君子之所托而逃焉者也中丞吕公間稱之以自名其廬予為公記之舊矣久之公又擇其林壑之最佳處而懸之以閣曰可仰閣之隂俯以圖史之室曰可玩左則賓客數過或嘯或歌投壺博奕飲酒無算懽然適也曰可遊右則客且忘歸或枕石而臥曰可休前覆之以蘭徑檻列之以名花而穿竹為亭以自媚焉曰可君閣之西則又縱之以千百若干尺横之以千百若干尺分畦而樹椒桂橘柚柰李櫨梨枇杷橪柿丹栗元棗緋桃絳梅石榴黄楊金櫻銀杏之屬一切竒卉異果若帶而綰也曰可圃圃之中矙以曲池引泉而魚因以亭於其上焉曰可泳亭之北又别為小亭客或選林麓分曹治射曰可觀其再北則又屏田而庾之以百穀之屬曰可稼當其四時之勝幽香繁隂刻露嚴霜而無所不可也於是合而名之曰皆可園大畧倣柳柳州以愚字其溪谷丘泉池島之勝而名之者也而貽書屬予記之予竊疑幽林䆳谷飛泉峭壁惟世之沉寂枯槁之士不得志當世者之所適也而公之位日髙其所席中外之望者日以重而公安得移栁柳州所自汙且困者以相附也乎故久不報公而客或過焉予謂之曰君獨不聞達人者之適其適而不適於其所適也乎古之豪傑嘗有躡足行伍而赤松子之隨悲時之陸沉而執㦸於金馬門譬之蟬方擁樹而吟而其中之蛻也舊矣今公之所席者於此而其所引而夢思者則於彼葢以所可因以游其所不可公之所存者逺矣客曰然因記之西施山書舍記明徐渭西施山去縣東可五里若越絶若吳越春秋並稱土城後人始易以今名然亦曰土城山葢句踐作宫其間以教西施鄭旦而用以獻吳又曰恐女樸鄙故令近大道則當其時此地固鉅麗要津耶更數千年主者不可問矣商伯子用值若干而有之山髙不過數仞而叢灌疎篁亦鮮澄可恱上有臺臺東有亭西有書舍數礎舍後有池以荷東外折斷水以菱而亭之前則仍其舊曰脂粉塘無所改出東西而山者聳翠不可悉悉名山也遶其舍而畝者水者不可以目盡以田以漁以桑者盡畝與水無不然余少時葢觴於此而樂之兹伯子使余記余雖以病阻其觴然尚能憶之也嗟夫土城一山耳始以粉黛歌舞之宫當鉅麗傾都之孔道而今變而且遷之一旦寥寥然為墟落田夫野老耕釣徘徊於其間或捨其墮釵於鋤掘迨於隂晦又徃徃詫野火轉燐於夜歸牧唱之兒童宜無不感而嘘資野人之聚而談者矣至其易冶以樸易優伎以農桑本業專而謠俗厚則有識者又未嘗不忘其悲而為之一笑也伯子聰敏擅文譽達事變試從讀書之暇一登兹山而望之或觸於景而有如吾前所言者姑取而咀之倘亦一解頤耶伯子名濬字景哲遊五泄記明徐渭萬厯二年十一月廿有二日偕王圖吳系馬策徃五泄初宿謝家橋明日雨山行驢不可負暮至楓橋駱君意舍止焉明日其兄懷逺公驗来又明日飲懐逺罷入化城寺又明日陳君心學來又明日飲於陳君止焉又明日午始霽遂行兩宿而至五泄寺是為至日遂登已而大霧窮宇内不見寸形渾若未闢忽復霽遂窮五泄下題鐫寺之石鼓是夕雪明日午復霽徃觀七十二峯攀捫裸厲陟自西潭以漲甚返又明日陟四泄之對岫觀四泄下飯於寺遂挈装以歸踰響鐵紫閬長青三嶺日昃至洞巖寺飯罷已燈僧祖福縛炬請觀洞巖入至第三洞之鱉口洞故有外屏近為占洞者所壊泥入壅鱉口返又明日黎飯復行入湖船一夕而至金家巉甫明踰兩小嶺午泛離渚日昃抵家是觀也洞巖竒於隂五泄竒於陽而七十二峯兩壁夾一壑時明時幽時曠時逼竒於隂陽之間以余評之殆莫勝於五泄借物形容之終不足蘇長公遊白水佛跡山云山上瀑布三十仞雷輥電散未易名狀大約似項羽破章邯時庶幾近之矣是行也去來凡十有三日陸行三百里水行百三十里宿於駱四夕於途如之於陳一夕於寺再倍於陳余墮驢者二越溪而溺者一濡者四五驢蹶於嶺者三諸子淖而跌者弗論也得詩二十首每作諸子必和之西溪湖記明徐渭虞之為縣壤髙河水東下舊有湖曰西溪者當縣西南主蓄水以備旱三鄉負郭之田咸頼焉宋末李顯忠既請其髙者以牧福邸因之遂盡田以莊湖始廢旱輒不登元尹林希元欲復之不果入明田既稅則湖益不可復矣萬厯癸未夏旱知是邑者為朱侯既合衆以禱乃更求長䇿得湖以請於府若省及分省並得可遂復湖湖東起湖山麓北邸鄭家堡迤北以西至龍舌嘴前村之髙阜南盡長港埭從而長得弓可九百二十七衡而廣損從者三之一周而度者為丈者千七百五十二當湖為田時計其畝可千六百二十六兹復田為湖宜仍抵湖以田也而夏葢白馬二湖適得新括浮畝可五百有竒第都之區曰十二者括地復得隱畝九百餘二百直買之以抵田而稅有隱羡於某所者若干括得之適相當復用以抵稅葢二抵具而湖告復始果他若水道宜塞者塞之凡七所宜引以佐湖者引之凡三十有六所閘之以瀦以泄坊一以表築室一以省責其成於里之正長畚鍤所及計髙廣近遠而課之並有差費取倉粟庸取募丁閱㡬月而迄事是役也不勞民不耗公取浮修墜下相地紀上佐天時而中免夏畦之桔橰使吾虞千萬年之久魃雖苛不能饑殍於吾民也是孰使之然哉衆謀記於予謹記曰侯名某字某某地人以某支干進士來知上虞治亷平而興學奬士尤諄諄云鎮海樓記代明徐渭鎮海樓相傳為吳越王錢氏所建用以朝望汴京表臣服之意其基址樓臺門戸欄楯極髙廣壯麗具載别志中樓在錢氏名朝天門元至正中更名拱北皇明洪武八年更名來逺時有術者病其名之書畫不祥後果驗乃更今名火於成化十年再建嘉靖三十五年又火予奉命總督直浙閩軍務開府於杭而方移師治冦駐嘉興比歸始與某官某等謀復之人有以不急病者予曰樓當府城之中跨通渠截吳山麓其四面有名山大海江湖潮汐之勝一望蒼茫可數百里民廬舍百萬戸其間村市官私之景不可億計而可以指顧得者惟此樓為傑特之觀至於島嶼浩渺亦宛在吾掌股間髙翥長鶱有俯壓百蠻氣而東夷之以貢獻過此者亦徃徃瞻拜低徊而始去故四方來者無不趨仰以為觀遊之的如此者累數百年而一旦廢之使民悵然若失所歸非所以昭太平恱逺邇非特如此已也其所貯鐘鼓刻漏之具四時氣候之榜令民知昏曉時作息寒暑啟閉桑麻種植漁佃諸如此𩔖是居者之指南也而一旦廢之使民懵然迷所徃非所以指節序全利用且人謂錢氏以臣服宋而建此事昭著已久至方國珍時求緩死於我髙皇猶知借鏐事以請誠使今海上羣醜而亦得如錢氏事其祈欵如珍之初詞則有補於臣道不細顧可使其跡湮没而不章耶予職清海徼視今日務莫有急於此者公等苐營之母朘徴於民而務先以己於是余與某官某某等捐於公者計銀凡若干募於民者若干遂集工材始事於某年月日計所構甃石為門上架樓樓基疊石髙若干丈尺東西若干歩南北半之左右級曲而達於樓樓之髙又若干丈凡七楹礎百巨鐘一鼓大小九時序榜各有差貯其中悉如成化時制劇冦滿海上予移師徃討日不暇至於今五年冦劇者禽來者遁居者懾海始宴然而樓適成故從其舊名曰鎮海重修東湖記畧明秦鳴雷台之東湖負郡郭為湖者也以其居於東偏也故名按志初為水軍營嘉祐中徐守億徙營於城拓而為湖則熈寧四年錢守暄也湖為閘三中建堂為共樂亭為流盃規制甚備為一郡之勝焉嗣後遞塞遞開入我國朝𢎞治丁巳陳守相復為修濬之以迄於今無有踵其美者湖遂積為習坎灌莽之區曩時之勝人徒想像於暮煙清波而不可得矣豪民因占墾為田志所載一萬六千歩者合二湖而僅存其三之二耳萬厯甲申侍御范公奉命按兩浙行部至台甫竣事即覽輿圖之勝弔樵夫之亭徘徊湖側乃喟然曰此湖也漫漶若此於是父老進曰台負山為郡而形勝獨詘於東偏脫有警則騎可徑薄城下昔人營水軍於此良有深意比去營而湖與南津相為環抱亦有限帶封域或龍見而雩順勢導流則貫畦浮塍為溉奚啻千頃又堪輿家言湖不瀦水則襟抱虧疏風氣宣洩居人靡寧由斯而言則湖之於郡所以固風氣扞冦盗而興民利也敢云無益哉公乃進郡守張君會宗俾總其成以長令周君孔教俾任其事且戒曰毋病民毋耗費毋狃目前仍貽其難於後之人二君奉命惟謹經畫盈縮悉中肯綮力取耕耘之暇食取公儲之粟而又度程分工均其勞逸民乃大恱不俟促而自課雲動雷行畚鍤齊舉周君坐署中治事如他日而以畢事告矣湖之深可通舟其漘則䕶以木柵以防崩齧其岸則築以髙岡以植桃栁置斗門於前以節旱潦徙樵夫祠於北以便妥靈籍占田之入於官以備修濬中若堂若亭若橋結構如舊制而稍增益之湖之規制遂大備用夫以工計者六萬九千五百三十有八用粟以石計者三千三百三十有七云平湖縣令題名記明沈思孝平湖令舊未有題名有之自今李侯始宣德四年建置邑治垂百三十餘年自王君簡以下後先合百三十六人記乗缺畧姓名爵里或磨滅弗傳况其遺規餘烈墜地無徴者乎若余所覩記則楊金鄉亷潔無私劉襄陽捍城倭患周東阿之執直郭福山之剛簡到今有遺思焉李侯在事四載考詢舊貫曰前事弗忘後事之師於於是邑令姓名稽其爵里嵗月之可次者樹石治堂之左屬某為之記余惟名以表實既著其名盍并所為貽後之君子乎一日從容問侯曰自余有識來吾邑置城守矣田賦徭役次第均矣蕪土漸闢人懐固志以公愷悌臨之於上吾民常若病者乍起尩然猶有瘵色者何也物力未完末俗彫敝其或繼公政將何由侯遜讓良久曰計今以徃額派日增稅將日重東南之患意在斯矣平湖故海垠鹵壤視諸邑褊小昔以倭副近乃潮淹欲息之者其無所乎盖余始至按舊籍而索其端委者累月始知田稅日重所由夫名有美而實不然不可不察東南郡邑之賦沿於宋末之官田增於偽吳之私籍一畝之田止獲粟一石耳嵗不必皆穰耕耨之費養老扶㓜一切在其中今均賦是加賦也均徭徭又加也均里甲里甲又加也均役役又加也凡均之皆以加之舉一畝之入畧去其七八矣未均以前分派各徴民受其擾此顯出而易見既均以後混入并派殫竭民脂其弊乃潛入而難究諸凡額外不時差派之數嵗嵗有加無減莫適為凖或力爭而後止或争之不得而姑徴焉或不可逭遂加焉自此遂為定例曾見嘉靖十年由帖嵗額銀止九分米止一㪷今額加日甚矣余既嵗刻漕折均平三冊與民信守自誓一切寛省庶㡬少補萬分而勢常抵捂不得展者十五有如異日者假手胥徒上通下掩百竇旁借為弊何可勝詰每誦民力竭之官惻惻有深恫焉余聞而善之因記其語題之石李侯名實蜀之瀘州人碑刻於萬厯四年丙子十二月朔日遊秦望山記明張元忭吾越巖壑之勝甲天下鼓櫂而出遊逺近數十里内其為竒峯䆳谷怪石好泉者皆是而羣山所宗惟秦望為最髙環秦望之麓浮屠之宫若明覺普濟廣福天依今皆湮於榛莽而自義熈迄今千餘載故址依然惟雲門為最盛萬厯甲戌予以省覲歸讀書雲門將遂登秦望而霖雨彌月稍遲勝遊春既暮始霽且和乃偕陳文學惠上人挈壺榼以徃由石橋折而北數百歩為白乳泉又三里許抵秦望之足有峯起如削當山之半從者指曰此錢刑部修真之所陳子與上人歩甚矯先予至予亦扶掖而行輿歩相半稍後至有石壁立當峯之前上為龕址鳴泉淙淙遶出其右松桂蓊鬱可恱余乃嘆曰昔者八仙子棄妻子焚衣冠巢棲於此者凡八年虎豹之與羣猿狖之與俱即所學或未合於聖乃其䖍志而苦行超然壒埃之表可不謂竒男子哉陳子曰然請鐫其石曰錢公巖自此磴益危徑益窄後先相尾攀蘿葛而上屢仆屢起屢酌屢憇乃陟其巔巔廣可數丈平衍無木相與藉茅趺坐俯而四矚萬山羅列其下東望則宛委香爐之間夏后氏之所藏也西望則鵝鼻茅峴逶迤相接志稱秦皇之刻石無餘之故都在焉北望則海濤如練郡城如帶萬井如鱗臥龍飛來諸山纍纍如塊慨焉想句踐之雄風慕鴟夷之遐舉南望則雲門諸峯起伏萬狀若耶一水瀠瀠如綫任公子之所垂釣王謝何陶諸賢所從處而遨也觀覽既周引觴浮白歌咏交作須臾有白雲從海上起漸升漸漫歘吸彌四野不辨上下疑神龍驟至蛟螭羣從俄而風起谷應猿虎競嘯從者皆怖頃之雲乍開已又合如是者數四忽復爽朗遂循舊徑而下日方午農者就饁矣是遊也覽山川之勝窮雲物之竒既夜而昩猶恍恍然如在層霄之上煙霧之中也詰旦為記勒之石留雲門方丈中天目山記明袁宏道天目幽邃竒古不可言凡山深僻者多荒凉峭削者鮮迂曲貎古則鮮妍不足骨大則玲瓏絶少以至山髙水乏石峻毛枯凡此皆山之病天目盈山皆壑飛流淙淙若萬疋縞一絶也石色蒼潤石骨奥巧石徑曲折石壁竦削二絶也雖幽谷縣巖菴宇皆精三絶也余耳不喜雷而天目雷聲甚小聼之若嬰兒聲四絶也曉起看雲在絶壑下白淨如綿奔騰如浪盡大地作琉璃海諸山尖出雲上若萍五絶也然雲變態最不常其觀竒甚非山居久者不能悉其形狀山樹大者幾四十圍松形如葢髙不踰數尺一株直萬餘錢六絶也頭茶之香者逺勝龍井笋味𩔖紹興破塘而清逺過之七絶也余謂大江之南修真棲隱之地無踰此者重修儀鳳青銅二橋記明韓敬乗衆之和者必用時之暇古循吏徃徃假此以興千萬年之利而食其賜者不知也今日州縣之力暇乎不暇乎自軍需繹騷括索肆出百僚不食禄者久矣加以凌雲未就柏梁未賡凡山澤之灌輸楩楠之程構窮崖絶谷咸出其材以應將作之求何况通都大邑垂魚結綬之倫有不願驅子來以趨大壯者乎烏程馬侯乗是時而有郭内外兩橋之繕客有疑其不暇者侯笑曰是誠不暇也弊之襲也有因不襲則不弊圯之飭也有候不飭則愈圮吾不忍於圮而獨忍於襲乎今日已不暇矣豈異日反更有暇乎公帑無可徴私鍰固可捐也閭左無可煩好義固可勸也下令凡匝月而羣情翕屬緡錢土石不脛而至黿梁鴈齒翼然俱還舊觀侯所為用衆以用暇者此其一班矣侯在事五年孱黎得以倚命水旱㓙穰先事有備四履之外幅􅊷晏如侯之未明而起當食而廢者如故也侯日不暇而民始得暇迨績奏矣俗阜矣引民之暇以為侯暇而侯之所以為暇者一津梁一繕置皆其睇睞所及心畫所周也吾邑朴儉橋道所直無歌亭舞館之繁無畫柱雕欄之飾要以行其上者貿絲出市不聞追呼之聲棹其下者載薪還家不見石壕之吏熈熈化日誰實貽之若夫儀鳯之鳴為髙岡青銅之鑄為水鏡兩橋之名先若為公而設哉侯名思理號還初閩之長樂人天啓壬戌進士董青銅橋之役者縣丞丁文炳號斗華貴州人恩貢士董儀鳯橋之役者主簿童大望號冠楚荆州衛人選貢士例得並書國朝湖州峴山九賢祠碑記吳偉業記曰凡釋奠必有合有國故則否國故者若唐虞之有伯夷后夔周之有周公有則自奠之無則合於隣國此郡國得祀其先賢所自始也月令以孟秋禱祀山川及古之卿士有益於人者漢元始四年舉此禮蜀郡以文翁九江以召父應詔書然則二千石之重凡有功德於民者可無祀哉湖州地稱西吳自周歴漢為侯國孫吳寶鼎中立為吳興郡郡置廢不一其改名湖州則隋仁夀二年始也當南渡六朝士大夫之過江者樂其山川吳興遂為大府王逸少羲之謝文靖安皆起家郡守栁文暢惲仕蕭梁再為吳興守唐大厯十一年詔以顔真卿為刺史杜樊川牧授湖州在會昌中宋孫莘老覺熈寧四年十一月改湖州蘇子瞻軾以元豐二年四月再移湖州王龜齡十朋乾道中任湖州明陳筠塘㓜學以萬厯三十二年守湖州已去復留居六載此九賢之載在典冊次第可考者也峴山之有祠始於三賢顔氏蘇氏王氏而他弗及峴山在襄陽羊叔子所遺愛今巋然於碧浪浮玉之間者此名顯山避唐廟諱而改湖人之思太守者不啻叔子乃即其地置祠樹之碑以彷彿襄人之意祠嵗久散撓居人支釜甑炊焉則以名賢之爼豆辱於屠沽庖湢者有之矣本朝康熈中廣陵吳公諱綺字園次由工部郎守此郡見而歎曰祀以揭䖍可若是其凟耶亟命屬徒鳩工重作其事攷湖守之多賢闕而未備乃下教詢咨得王逸少而下賢守有六合前匭之藏主定為九賢而書其官舍太守無位尊而有德斯土者乎曰此祠為賢者而作不得躋於其列禮也於是士庶歡忭戒期薦力築牆樹宇改檐易磩丹塗白畫有翼有嚴未浹旬而祠成妥神之房合食之几罔不蠲潔都人士秋月之望來遊來觀進而言曰我公剗暴去慝逺績前人而庇吾民今又搜揚廢墜克有此舉吾儕小人何可不昭所報相與謀作室而肖公像焉既兩祠儷美走望交集而峴山於是乎益勝越明年三月偉業於太守宗親為曀用兄弟來繼舊好宴於兹山為賦甘棠園次再拜辭曰某不堪也誠得畀之一言欲焜燿昔賢之令德以無忘景行某也實與有寵綏余不揣固陋泚筆作頌爰紀湖人千百年之命祀其辭曰右軍清鯁推遷仕進深源以伐憂時强諍東土賑荒為民請命省賦輕租名髙計聼龍矯鴻驚入法之聖垂之千年傾心萬乗進忤懐祖退諧支遁棲遲名山服食養性謝傅沉敏雅量髙風放情丘壑驟致三公顧命受遺輯穆元功宣武窺鼎苻秦連烽功濟蒼生鎮物雍容經逺無競善譲克終此邦去思西州是同播之絲竹東山故封柳氏將家妙解談義文暢好學多才多藝新詩斐然馬射無對尺牘素工圍棋尤最焦桐雅奏白蘋髙會感懐父曲清商别製苕水洋洋彈琴而治載其清静終古弗替魯公正直書法堅凝清溪劖石忠孝收京弟兄死國家廟丹青射堂有碣杼山有亭志和釣罷鴻漸詩成清風百世緬懐典型白首抗節握爪如生神仙髣髴重過山城牧之少年才大卓犖記室風流司勲落拓戰論罪言澤潞魏博措置失宜姑息勢弱茍用吾謀足掃河朔晩乞江湖登髙有作水嬉舊游政成民樂少陵稷契續彼家學莘老素執左官再簉廷諍故人守正不撓為郡作堤以扞水潦振廪勸分生民是造政劇才髙賔朋燕笑收拾殘碑築亭墨妙故相山中廻車慰勞向爭國事此全友道子瞻曠代致主時遭制䇿相才兄弟揮毫齟齬執政新法青苖河決禦災湖堤便漕草詔逐奸魑魅安逃簿書魚鳥謫仙逍遙道塲禪學碧浪詩豪嶺海﨑嶇衰白歸朝龜齡對䇿晁董天人廷擊殿帥面折宰衡奏起老成決䇿用兵符離師潰噂􅊱繁興正色抗言拂衣固爭移守三州禮士愛民溫詔下召老猶加恩給扶減拜舊學之臣緬我陳公在明中葉三板不没胥為魚鼈築防決渠駕以虹霓畝乃一鍾民不病渉豺虎是擒稂莠必㧞夜無吠厖枹鼓不設五紀於兹謳吟稚耋祀之太常配食徃哲我禾既耔我蠶既絲率彼父老獻韮薦粢濟濟先正顧饗在兹邦人君子是式是思石相為社季子置祠東吳舊史作為此詩擊鼓吹笙欲以奏之比德告䖍庶無愧辭子貢使越祠記章士斐子貢使越祠者介西湖之濱不知始何時頽廢久矣布政使新鄉張公更為之徴記於余余曰子貢未嘗使越也盖史記之言云爾雖越絶及吳越春秋亦云夫夫子之意審在存魯則子貢奉夫子之教以存魯亦魯存焉爾之吳之越之晉何為者耶故子貢無使越事也夫子曰夫其亂齊存魯吾之初願若彊晉以敝吳使吳亡而越覇賜之說也美言傷信慎言哉其言則是也然非夫子言也越之圍吳在哀公十三年其滅吳在哀公二十二年哀公十六年夏四月書孔子卒固不及見吳亡也攷左氏子貢之辭於吳者四見辭於越者一見鄫之會辭免康子之召會伐齊也辭州仇拜甲之賜會橐臯也辭免尋盟會於鄖又頼其辭以舍衛侯此子貢能言之效然皆公與大夫命之又顓事而已其一辭於越非辭於越也哀公二十七年越使后庸來聘盟於平陽康子病之言及子貢曰若在此吾不及此夫康子不得子貢從越而思子貢嘗時之能言必足以免已於盟此則子貢未嘗入越之明徴也吳越春秋又言句踐既誅文種求賢聖吾夫子奉先王雅琴禮樂徃奏句踐不得志而反越絶亦云不知句踐覇世誅文種距夫子卒又八年譌妄至此余又安知後人不託子貢以為能言之藉耶越絶一書世名為子貢作乃下及秦漢何也故知使越非實矣然會吳代齊實戰艾陵其於黄池之會差隔二年必史誤聨為一事而又取說辭之䝉子貢者卒信為實若越絶若吳越春秋家語又自相舛襲而為之耳雖然當康子越盟媿以不得子貢則如子貢誠使越越必藉手以覇無疑况聖賢之道如日星豐其屋蔀其家迺弗見之越人茍有如子貢之賢者儼恭祇肅以存於形容雖子貢嘗使越可矣祠之其又可也三衢文會記汪琬三衢文會盖元時江浙士子私課之文也其題為經疑二易書詩禮春秋本經義各一賦䇿又各一所得凡二百十二卷所取自德興余闕而下共六十六人司糾者程國表等十三人司盟者劉文瑞而主評者鄭縣丞元善是嵗則延祐六年八月也按元史仁宗本紀皇慶二年六月以宋諸儒及故中書左丞許衡從祀孔子廟廷十月詔天下以三年八月興其賢能充貢有司次年會試京師云云其後改三年為延祐元年又五年而斯編遂出是時方值尊崇儒術嚮用科目之際為有元極盛而江浙又文學淵藪也故科舉之詔既下而南方士子莫不聨袵交袂相與刮摩淬厲以俟有司之舉由斯編考之盖舉浙西建康浙東海右四道六路之人才皆彚焉抑何彬彬也鄭氏所評具在無讕詞無溢語采瑜擿瑕殆不失直諒之遺而諸䇿所答周正一說亦皆援据精核敷陳詳贍庶可以見其所存矣邇者吳會之間士子既耳剽目竊而凡江湖僑客借觚翰以求食者又徃徃撰為淺陋里俗骳不根之文盗取虚譽以相牢籠而後生不學者亦復靡然譟而從之此震川先生所謂妄庸人者也以視斯編作者之典贍如彼而評者之直諒如此能無赧顔泚顙也哉按輟耕録元反宋金餘習初試論賦其後一以經義為本云云及考選舉志春秋兩試皆未嘗用論終元之世亦未嘗廢賦不用也或有司校閲稍重經疑經義則有之耳先儒云經非文無以發明其㫖趣而文不本於六經又不足謂之文顧後世乃有畔經而以文自命者何也杭城濬河記代廵撫趙士麟潘耒杭之城左江而右湖江潮湍悍不可引引湖水注城入自清波湧金二門交絡城中由武林艮山以出用以疏煩蒸宣底滯猶人之有血脈喉胃也嵗久寖廢不治為土壤為室廬故道十失八九斷溝絶瀆隘不可舟淺不可汲火災猝起無勺水以救杭人病之嵗在甲子余奉命來撫浙首下教諮民疾苦令十一郡士民各得上書言便宜於是杭人言城河當治者甚衆詢諸鄊大夫鄊先生咸以為然顧役鉅費煩無所從出或議勸輸於巨室輸足而後戒工或議役瀕河之家楹一夫余皆以為不可夫事未有跡而勸輸則民疑徴役於閭左則民怨既疑且怨復有不便斯役者從而撓之浮言煩興乃敗吾事夫民可與樂成難與慮始莫若出私錢倡行之厚直雇民民必樂從工既有緒人將不待勸而輸事乃有濟計已定適紹興府判王以事至省余知其敏練習水利因留任以河事言方冬民暇可即興工迴龍橋在城中央淤最甚可先疏治以風示吏民遂出二千金付俾募役役直視常加倍民讙譟即工不旬日濬若干歩視向所經度者資加省焉人始知河易治於是藩臬以下守土之吏各助若干中朝官之有事斯土者各助若干鄉大夫以下若商若民各助若干未浹月而貲用大集然後分遣屬吏畫地工程畚鍤如雲鼛鼓四應余時乗肩輿徃來其間觴酒豆肉與役夫相勞苦自始事迄畢工役不疲勞人無怨讟所治河一以舊址為率廣深有常程舟載沙土出諸郭外河兩涯隄以木石必高必堅凡七閲月而工成於是城河始復舊蹟疏二門水竇納清流注之洋洋焉鱗鱗焉可溯可浮可溉可濯盖西湖之水至是而始為杭人用也天下事所以不理其初見謂不足為久之又苦其難為當河之始塞也朝一畚泥暮一抔土易禁戢也易疏治也惟有司者忽為不足為聽其日積日淤以至錮塞比其塞之久也通國之人皆知其當治而憚難茍安因循至今今以吾僚屬之勤與士民之助智者贊謀强者宣力幸而有成乃知天下事熟計而决行之斷無不可為者惟是成功甚難隳之甚易謹啓閉嚴隱占隨淤隨浚補救以時毋廢成規毋滋前弊則惟後之人是頼矣役始於康熈二十三年甲子仲冬成於次年乙丑季夏河以丈計者七千六百二十八以工計者一十三萬二千七百八十九費白金以兩計者一萬六千九十六余以其費之鉅而工之勤也故備誌之俾後之人有考焉嚴禁開燔郡南諸山碑記毛竒齡古建邦立社必審察地道以為經營卜食之本如宅洛者瞻伊闕都渭者料太乙况吾越為計倪范蠡所相度者其隂陽向背必重為可信明矣相傳郡治為句踐建國之所其地祖鵝鼻宋朱華乃由陳迦嶺穿茅陽殷假諸山而蜿蜒盤澓分條舒榦踵為斯治其間羽飛介伏迴翔偃䕶有似真龍故以臥龍名其山載之志書凡府廳縣署城隍祠廟以逮薦紳之第宅士民之居廬實憑且頼以故越中宦績邦賢較勝他郡非無故也明季崇禎間居民無厲者開鑿陳迦嶺山燔其石而燼收之以灰以堊民多災傷郡守王君與推官陳君立為禁絶復恐無藉姧民嗜利再鑿隨將籍之蘭字自十二號始至二十六號止凡若干號捐帑估贖由在官以杜姧慝其先事預防可謂密矣厥後舊禁稍弛徒以修葺禹廟之故偶假開燔而一時道府㕔縣相繼解綬土冦之延蔓而伏莽者頓起剽掠其徴咎之不爽如此乃姧民乗機發鑿於前而土豪之射利者遂大開於後燎原不揃幾至燬室按近時申禁一在順治十一年爾時盗偶開鑿而當時發覺遽行飭止一在康熈十年爾時以公作所需致薦紳士民同起請命不數月間旋已報罷今則盤踞焅烈不由公作夫竊據官山為己利盗也椎埋剽攻發盖藏毁道隧大盗也今以大盗為大憝而其所為民賊者又非止一家一室之禍乃猶相視施施不加嚴剔夫鈹木之榦而欲延其英刳人之項背而欲其負腑臟以生無是理也况盗官擅利比之鑄山其為官刑方大耶文學某等以其事白之是邑邑白之府府白之道使君道使君命勒石永禁垂久逺且以告後之守此土者石凡二一植府治一植盛塘之上埠邑令髙君郡守何君道使許君皆有名氏勒禁末湘湖水利永禁私築勒石記毛竒齡蕭山湘湖宋邑令楊公所開湖也公據熈寧大觀間縣民殷氏等有請築湘湖之奏而下議未决公决議成之遂開此湖用以灌九鄉田一十四萬六千八百餘畝歴南渡髙孝兩朝邑令顧公諱冲者以九鄉爭水度地勢髙下定諸鄉放水之則算毫釐酌多寡勒石縣門因有劃隄斷臂穴水釱趾之令而其後郭公淵明於嘉定之末來宰斯邑則益加疏濬凡湖傍山足尺寸皆湖所謂以金線為界者謂山足黄土外皆湖水也自明𢎞治間湖豪孫全等漸起侵佔鄉官致仕尚書文靖魏公力為恢復而御史何公舜賓繼之不幸御史被害孝子伏闕孝宗皇帝親遣給事李舉郎中李時大理寺曹亷同外鎮廵官反覆審理置孫全於辟敕邑令楊公鐸勒石湖口毋侵毋佃毋私築毋蝕水涘毋倚圩傍㟁以漁以草以栽以畜犯則重者辟輕者發遼東衛永遠充軍載在實録播諸誌傳彰彰也今距向勒石時幾一百八十餘載恪遵舊制無敢越者乃忽以秋暵湖涸湖豪孫凱臣等糾集畚鍤一麾而千人不鳴官不暴衆築隄數里自湖西至東南兩山之間横跨湖面而攔截之邑君劉君據水利衙報文申請而無如阻之者之衆也夫湖職蓄洩不職行走况兩山阸塞從非五達揣其用心不過為風水計耳夫兩山墳墓下有闗沙水可以動世家巨族相助之心而實則倚圩而栽滙巖而漁正曩時侵佔所由禁也夫湖分為三其於上湖下湖不無偏曲然且放水早晚限有時刻堤截水緩則於頃刻最少者每有水未出堤而即行閘止之患然而九鄉泄泄獨澇湖蔣棫等爭先控告會郡伯李君初下車惑於阻撓屢飭集議而卒之用予末議始飭令剗削榜杻示衆而豪黨多力抗拒官法府復據縣申之籓臬二憲司憲司仍下之府縣剗削按律且為之永禁以勒之石夫創始之難不如守成開之者一時而爭而守之者仍在萬世第宋代勅法皆當事主之故洪武祀功尚有楊趙顧郭之祠建於湖濱而入明以來則藉鄉官為力持故𢎞治賜祠特勅名德惠以祀楊魏而其後何氏父子得祔其傍今鄉人委蛇動多推諉築隄變制無一人為之爭執而一二州縣守令儻惑於豪强而動多變法此則生斯土者之一大患也夫以宋世侵牟雖郡王之尊招討之貴一丞尹持之而有餘而縣民一佔即極之尚書御史門生數世之恢復而猶不足今遺孽復興㡬壊大事及此不戒將何底止因為布諸石而禁之如右兩浙公建育嬰堂碑記毛竒齡王者有慈少之文而時時行恵則春育㓜穉與秋養衰老徃徃並布之明堂月令之間此後世漏澤之制所由養無告而先以孤也顧曩時有孤大抵在保抱以後如孟子所云㓜而無父者而至於胎娩之餘甫離毛裏則前此並未及焉國朝順治初益都馮相國奏開育嬰堂於崇文門外畿輔數百里車擕擔負口哺手綳者日接踵至及益都致政還里而宛平相國復繼之其式遂徧於天下吾浙育嬰堂舊在吳山之麓地偏而棟陿所輸貲糧嘗不足以給日用乳婦各散處無所稽攝廵撫張公顧而恤之於公家之暇徃徃咨及而布政使馬公遂任其事會方城五達有皇華舊驛本駐使節而鞠為茂草久矣乃址而堵之闢堂三楹而列甲乙舍於其傍分坏别牖設牀而鋪墼冬爐夏翣料居乳婦於舍間有夫者共棲之使之忘内顧之憂凡竹車絮藉所以供兒之坐臥者無勿周具且延醫師之良者以䕶其疾其於保字之用心可謂極矣然又恐遲久不繼買田數百畝為儲偫需而立首事鄊官月稽而日核之嘗讀周書康誥以武王之聖康叔之賢治沫邦之地之大而當時分封伊始所諄諄告誡者曰如保赤子夫民猶嬰也寒煖燥濕飢渴勞佚口所不能言心所不能達而為之上者以己意而宣之達之予所好而棄所惡有如嬰然則是合帝王之保大而後可以養一嬰極都伯重臣上下經營之全力而後可以保一赤推之萬姓亦何異矣康熈壬申三月甫載事而五月工竣當事者請為文以布之石使他日繼此者有所視因為之記重修招寶山寶陀寺記史大成康熈十六年夏四月都督牟公重修招寶山寶陀寺成以書來屬余為記余觀招寶山傑立於定海縣城之東與竹山對峙相去不一里為潮汐出入所經崩濤激湍雷轟電轉所謂大浹江是也東南瀕海之郡皆有水道以通舟楫於海然多浩渺遼濶莫可究詰惟大浹江兩山廹束舟行不得並㠶銜尾而過猶惴惴然洞心駴目蓋天造地設以為吾郡之門戸前明嘉靖時倭冦擾攘盧總戎鏜譚憲副綸始築城於山巔名之曰威遠而胡總制宗憲又徙梅岑寶陀寺於其中此寺之所縁始也崇堦䆳殿傑閣飛甍蔚為巨觀登而望之其南玉環烏沙普陀諸山如浴鳬浮鷗滅没於洪波駭浪中而台溫徃來之程指顧可得其北一望陳錢壁下為江浙分界蘇松沿海諸郡可以一㠶飛渡其東則岑江螺峯固昔時駐兵之所用以控扼海道其西循龍山澤山之麓迤邐而轉可達杭越聲息甚㨗蓋一寺之中四顧蒼茫而歴歴形勝已在指掌中他若旭日初升波濤盡赤饕風間作蛟龍晝鳴抒達士之壯懐供詞人之吟詠又不待言矣顧嵗久弗葺風雨侵蝕丹青漶滅公鎮定海之明年隣氛既靖海不揚波乃以其暇葺而新之不踰時而工就余思是舉也豈欲邀福於大雄氏哉以招寶為郡境之咽喉而寶陀又招寶之冠冕使不崇麗煒煌無以表兹土之勝令觀者有所竦息且時與將佐循闌凭眺則瞭望之逺近控制之疏密運籌決䇿一覽而得此安不忘危之意也昔東魏時滄州與遼接壤李允則徙浮圖北原上見三十里而敵人不知為望樓也公之意得無類是乎余因樂書之俾寺僧刻石以示將來公諱大寅字洪開施州衛人仙霞嶺天雨菴記林璐仙霞嶺浙閩之險隘也連峯疉嶂崇岡側阜瀰漫不可紀極宋史浩伐山通道甃石為路屈曲左右盤凡數百折始達於嶺嶺之巔為闗重崖峭壁依勢成墉為國家設險下則天雨菴在焉前此冦伏灌莽窟穴滋蔓潛窺隙伺實逼處此者凡數年乃出諸道兵一大創之殱厥渠魁嶺嶠肅清於是當闗戍守峙糗糧嚴斥堠旌旗壁壘荒天斷雁之中下瞰天雨菴表裏若唇齒迄於今門庭晏如四方捧檄銜綸仕宦商賈軍裝征戍以及梯航重譯朝貢而至者道出菴下停車息䕃或追嘆徃事低徊瞻拜而去蓋嶺之有是菴也猶嶺之有是闗也由來久矣嵗丁巳不戒於火守僧懼無以妥神靈息行旅亟以剏建為請越明年余捐貲首倡文武將吏士庶佽助恐後於是鳩工庀材外奉闗忠義侯像内建佛閣悉如舊制僧寮茶舍稱是落成請予為記余惟安不忘危古之道也記曰王公設險以守其國况神臯奥區形勝所結必有神靈作鎮宅巉巖而肅視聼故浮屠氏所至輙有開必先菴之肇造實惟宋始長翥孤鶱俯歴山川之氣者五百有餘歲而忍聽其燬諸已乎且吾聞君子之為政也茍可以從衆不必其異也茍可以利物不必其出於己也順輿情察事理則鼛鼓興焉國朝受天顯命丕冐九有武功文德逺至邇安由前視兹嶺為蠶叢鳥道者不踰時而坦坦周行鋒燧無警雖天子之威靈亦惟神相之故能奠安鎖鑰以綏疆宇今者榱題輪奐有嚴有翼顧瞻廟貎小大稽首即謂以是答神庥修享祀版築固其宜也又况徃来行旅其君子籃輿而至其小人擔簦以從望是菴焉如候人致館舍焉今而後過兹嶺者當知神意亦除舊布新與民更始赫赫忠義實式臨之守土者當思潔己愛民荷戈者當思同心敵愾擕孥而歸貿貸而來者當思徒御不驚室家保聚皆沐浴聖朝之教化從此為孝子為順孫為良民善士以歌咏太平而毋貽神羞其亦可矣浙江通志卷二百六十二
