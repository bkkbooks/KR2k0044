body:
  text: 浙江通志卷一百九十二人物十隱逸上堯舜在上下有巢許以故巖棲谷處之士含貞而葆素者史不絶書浙自嚴瀨龍邱久傳髙躅嗣爾風徽所播往往立懦亷頑足徵槃澗碩人重關風教其與放廢山林徜徉詩酒者固不可同日而語也志隱逸杭州府漢張儼咸淳臨安志後漢末餘杭人有賢德不樂榮利嘗開圃種瓠以所資錢造橋俗稱葫蘆橋陸瑋兩浙名賢録字文該錢塘人漢季納祿歸隱於靈鷲山蓮花峰下三國吳諸葛起舊餘杭縣志少篤學心著述仕吳為步兵校尉後隱居山房宗族蕃盛其山今號為本山南北朝褚伯玉南史本傳字元璩吳郡錢塘人少有隱操寡欲年十八父為之婚婦入前門伯玉從後門出遂住剡居瀑布山性耐寒暑時人比之王仲都在山三十餘年隔絶人物王僧達為吳郡禮致之伯玉不得已停郡信宿交數言而退寧朔將軍邱珍孫與僧達書曰聞褚先生出居貴館此子滅景雲棲不事王侯抗髙木食有年載矣自非折節好賢何以致之昔文舉棲冶城安道入昌門於茲而三焉却粒之士餐霞之人乃可暫致不宜久羇君當思遂其髙步成其羽化望其還䇿之日暫紆清塵亦願助為譬説僧達答曰褚先生從白雲逰舊矣古之逸人或留慮兒女或使華隂成市而此子索然惟朋松石介於孤峰絶嶺者積數十載近故要其來此冀慰日夜比談討芝桂借訪荔蘿若己窺煙液臨滄洲矣知君欲見之輒當申譬宋孝建二年散騎常侍樂詢行風俗表薦伯玉加徴聘本州議曹從事不就齊髙帝即位手詔吳會二郡以禮迎遣又辭疾上不欲違其志敕於剡白石山立太平館居之建元元年卒年八十六伯玉常居一樓上乃葬樓所孔圭從其受道法於館側立碑杜京産南齊書本傳字景齊吳郡錢塘人閉意榮宦頗涉文義專修黃老會稽孔顗清剛有峻節一見而為欵交郡召主簿州辟從事稱疾去除奉朝請不就建武初徴員外散騎侍郎京産曰莊生持釣豈為白璧所回辭疾不就會稽孔道徽守志業不仕京産與之友善顧黯南齊書顧歡傳歡同郡顧黯字長儒有隱操與歡俱不就徵吕道惠舊浙江通志餘杭人隱居講學生徒從者數百人范述曾從道惠授五經褚雅傳詳義仁盛紹逺兩浙名賢録餘杭人梁封關內侯天監二年辭榮嘉遁開門受徒執贄稱弟子者數百人既沒門人立碑以旌德業唐孫路舊浙江通志富陽人少有詩名後隱居不仕鄭谷以詩贈之曰平生詩譽更誰過歸老東吳命若何知己凋零垂白髮故園寥落近滄波酒醒蘚砌花隂轉病起漁舟鷺迹多深入富春人不見間門空掩半庭柯宋林逋宋史本傳字君復錢塘人少孤力學不為章句性恬淡好古弗趨榮利家貧衣食不足晏如也初放逰江淮間久之歸杭結廬西湖之孤山二十年足不及城市真宗賜粟帛詔長吏歲時勞問薛映李及在杭州每造其廬清談終日而去嘗自為墓於廬側臨終為詩有茂陵他日求遺稿猶喜曾無封禪書之句既卒仁宗賜諡和靖先生賻粟帛逋善行書喜為詩其詞澄浹峭特多奇句既就稿隨輒棄之曰吾方晦迹林壑且不欲以詩名一時况後世乎然好事者往往竊記之今所傳尚三百餘篇逋不娶無子教兄子宥登進士甲科李頎春渚記聞字粹老舉進士當得官棄去烏巾敝裘為道人遍厯湖湘間晚樂吳中山水之勝遂隱於臨安大滌洞天往來苕溪之上遇名人勝士必與周旋素善丹青間作小詩東坡倅錢塘日粹老以幅卷作春山橫軸且書一詩於後不通姓名付樵者令俟坡之出投之坡展視詩畫已奇之及問樵者曰我負薪出市有一道人與我百錢令我呈此實不知何人也坡益驚異之即散問西湖名僧輩知是粹老久之偶會於湖山僧居相得甚喜坡因和其詩云詩句對君難出手雲泉勸我早抽身其風致可見矣王衷萬厯杭州府志字天誘政和中郡守監司表薦賜號悟靜處士視朝請大夫俸給徐奭萬厯杭州府志徽宗朝賜號沖晦先生故廬在城中吳山又嘗居萬松嶺下陸維之咸淳臨安志字永仲一名凝之字子才餘杭人少以計偕入汴羣從邀與雜坐命相者某道人視之道人指維之曰秀才叩以科第則曰且歸山道士揖别贈以粒丹曰緩急用之陸下第南歸舟循汴風激浪怒舟不能勝以丹投之風浪始息汴上有呼其姓名者則道人也維之遂有超世之志隱於大滌洞天之石室人因以石室先生稱之逍遙林石以詩酒自樂光堯嘗召見稱疾不赴後光堯幸大滌孝宗亦侍進主觀者問山中詩人以維之對進其詩光堯讀數首太息曰布衣入翰林可也孝宗曰山林隱士必不要人知要他出去却是苦他遂止未幾卒有石室小隱集三十卷行於世徐立之萬厯杭州府志舊名炳學老子法隱於杭西湖之回峰人呼回峰先生通判都官員外郎蘇為嘗謂之曰何不仕乎曰若時與命會可以佐天子福元元不然悔吝生矣曷若追冥鴻霧豹與孤雲俱為敬其言為著傳元金應桂萬厯錢塘縣志字一之能詞章宋季為縣令入元隱居風篁嶺書學歐陽詢畫學李龍視築蓀壁山房左弦右壺中設圖史古器客至撫玩清談纚纚不休每肩輿入城幅巾氅衣望之若神仙云陳渭叟萬厯錢塘縣志讀書學道不混俗不忤物賦詩有天然趣隱居葛溪上嵗一歸名人勝士爭邀致之惟恐其去也所著有紫陽篇鮑完澤萬厯錢塘縣志字信卿資識粹敏慎重寡言涉獵經史過目輒不忘纍以學行薦於朝部使者爭辟用之以母老辭不就吾衍宋濓吾衍傳字子行杭人意氣簡傲不為公侯屈色常自比於郭忠恕居生花坊一小樓客至僮輒止之通姓名使登乃登亷訪使徐琰一日來見衍從樓上呼曰此樓何敢當貴人登耶願明日謁謝琰聞笑而去衍亦卒不往生徒從衍遊者常數十百人衍坐童子地上使冠者分番下授之或對賓談噱羣童皆肅容莫敢動衍左目眇又跛右足有晉宋間風致畜兩鐵如意日持弄之或倚樓吹洞簫數曲超然如忘世者褚師秀遂昌雜録號雪巘以清苦節行聞一日平章尤公單騎從一童至天慶方丈觀主王管轄者不知為平章尤乃自言觀主大驚尤曰我欲一見褚髙士耳觀主謂其人孤僻士宰相何取而欲見之尤意彌堅觀主乃扣門師秀方讀書問為誰觀主言平章請見師秀拒之曰某自來不識時貴人言訖欲入而尤顧已拜於地意欲髙士延坐其室師秀即鍵戶偕行廊廡間至雲堂前語尤曰三年前有閬州王髙士留此某則非其人也因長揖竟出尤瞻顧嗟咨曰是真一世之髙士崔彥輝成化杭州府志錢塘人號雲林生與王蒙皆吳興趙氏甥善篆𨽻詞賦畫亦超詣隱居賣藥鹽橋市俞和成化杭州府志字子平杭人晚年自稱紫芝老人隱居不仕能詩善書翰早年得見趙松雪運筆之法臨晉唐諸帖甚夥行草學松雪逼真好事者得其書每用松雪欵識倉卒莫能辨王逵貧士傳字志道錢塘人足一跛家極貧無以朝夕因賣藥不繼又市卜博究子史百家客至輒談今古不休人知其辨博每以疑難質之矢口輒應孫蔗田包太白成化杭州府志皆錢塘人隱於西溪不受徵聘以詩文相娛樂終其身人目之為西溪二隱劉英列朝詩集傳字邦彥錢塘人少從學夏大理季爵臨川聶大年教授於杭奇之與為忘年友景泰中郡邑交辟以母老固辭築室於甘泉榜其室曰竹東更號賓山年七十二卒程克勤志其墓以為孝友似黃山谷髙蹈似魏清逸曠達似楊鐵崖分省人物考英操行髙潔當天順成化間與劉泰輩結社賦詩名動一時有賓山集蕉葉藁竹東小藁湖山詠録陳雍成化杭州府志字孟熙仁和人與同邑鄭璧夏誠稱莫逆交俱不事榮利日為湖山遊咏父士寧與璧母皆年髙在堂每造必升堂謁拜父母沒互為服緦三人交義風動鄉人璧之子孫誠之子皆登進士惟雍樂志幽隱縣大夫兩以明經舉皆不就世居鹽橋七寶深巷中復厭囂塵徙城北獨山之陽年四十二卒無子洪鎡錢塘縣志補字器之號時軒錢塘人襄惠鍾之弟少孤貧攻苦力學不輟寒暑詩文楷法俱超絶大學士商文毅聞其名辟置幕下薦授中書舍人欲大用之而鎡性恬淡不樂仕進歸隱西溪以圖史消歲月襄惠揚厯中外屢遣人招鎡俱不赴及官尚書欲薦於朝又厯止之且貽書曰兄為良臣弟為隱士亦各行其志而已著有時軒自怡集二十卷王澍兩浙名賢録字時雨錢塘人性髙亢不諧於俗為詩多獨創語寄興山水自號山人貧鮮儋石儲一介不茍取與而口未嘗言貧終身無所干客遊京師與胡端敏同還至滄州遇賊劉六等數萬人圍其城數日不解山人為州將畫方略賊遁胡端敏大奇之欲薦之朝山人力辭卒以布褐終其身唐俞海寧縣志字聖言邑人博雅工詩翰多深湛之思阮中丞鶚督浙學時檄曰海寧唐俞不求聞達人也操履淡泊與明月清風髙山大川相遊衍因大書逸士表其閭所著有審山樵漫草邵穆生仁和縣志字汝宣工部員外郎經邦子為諸生年未三十遽棄舉子業隱靈鷲山中築閣祀許由及唐宋名賢為樓三楹中祀其父右自處藏書又三楹足不入城市遇文人墨客鮮不傾倒獨不喜與貴介遊布政使吳用先欲見之謀於其鄉達黃汝亨汝亨請屏騶從以儒生服往汝亨先行謂穆生曰有桐城學者欲見公讀所著書穆生許之吳繼入遂設飲極歡而罷明日汝亨札至曰昨來乃方伯吳公夙慕先生者吳公亦遣吏齎手書贄幣求所著書穆生亦不靳也又善畫有求畫者輒不與曰吾豈畫師耶李元昭兩浙名賢録字用晦杭州右衛世襲千戶少尚節俠年二十六始折節讀書避居靈隱寺之西澗築一室如斗引澗水環於席下蒼松翠竹周回籬壁間人迹既絶惟有泉鳴鳥啼與書聲相和答興至為韻語直闖漢魏之室自號岣嶁山人四方名流韻士過武林訪山人煮茗焚香終日清言不倦或一言及塵俗輒起擊石磬數聲以代洗耳當道聞其名或鳴騶相過即鍵戶不納晚結西湖詩社操觚之士以不與為恥山人年四十一而隱十年而雲逰逰八年而還故山復髙卧二十餘年而後殁人以為蟬蛻云汪渢魏禧汪渢傳錢塘人字魏美中崇禎己卯鄉試未聘里富人欲妻以女渢不許錢太守以女妻之既成禮渢從容謂錢曰吾寒儒得連姻貴室所望知禮義孝事姑嫜和妯娌足矣侈簮珥綺繡之飾毋庸也錢於是去服飾屏侍婢以疏布親操作內姻欲強渢試禮部出千金視渢妻曰能勸夫子駕則畀汝對曰吾夫子不可勸吾亦不受此金也當事或割俸金為夀不得却坎而瘞之里貴人請墓銘拒弗許嘗出遊天台居石梁左右反河渚徙孤山之匡廬黃山白嶽所至與異人髙士遊年四十八卒嘉興府晉韓績嘉興府圖記字興齊其先廣陵人避亂居嘉興仕吳為大鴻臚績少好文學以潛退為操布衣疏食不交當世東土並宗敬之司徒王導辟為掾不就會稽內史孔愈疏薦詔安車束帛徴之不起宋許棐海鹽縣圖經嘉熙間隱居秦溪於水南種梅數十樹構屋讀書因自號梅屋室中於三楹下分四槅中垂一簾對懸白香山蘇東坡二像事之所著有獻醜集樵談行世常詵孫海鹽文獻志字宜卿同之孫纍辟不就所著有天間雜著櫟齋筆記雪溪稿門人稱雪溪先生常棠海鹽文獻志字召仲曽祖同從宋南渡僑寓邑之天寧寺子孫遂家海鹽棠值宋季閉關不仕苦心篤學善屬文繞庭植竹數十竿以厲操自號曰竹窗元謝國光嘉興縣志字觀夫宋咸淳間對䇿言時事剴切主司畏賈似道不使登第補太學生入元不仕侍御史程巨夫奉詔搜賢或薦國光輒杜門稱疾及卒遺命題其墓曰安節謝國光之墓吳鎮兩浙名賢録字仲圭嘉興人性髙介隱居不仕工辭翰善畫山水竹石每題詩其上當時稱為三絶有勢力者求之多不得惟贈貧士使取直焉以愛梅自稱梅花道人程克柔𢎞治嘉興府志字德剛讀書涉大義傍通法曹既而歎曰晝夜行墨纍纍立人座側豈吾志哉遂劾去及元季朝廷遣將路成駐兵皂林兵肆民間克柔親詣軍門為成備陳利害成稱善引為上賓欲奏官之以老辭退居梧桐鄉宅有栁百餘株因號栁莊鄭忠舊浙江通志字原凱嘉興人閉門讀書無間寒暑從衛富益講易一夕夢吞北斗自是詩名大著志在恬淡雅好泉石終元世髙蹈不仕朱炎嘉興府圖記崇德人七嵗能作韻語十嵗能屬文及長博極羣書名重儒林隱居不仕陳堯道嘉興府圖記嘉興人通五經不仕與楊維楨輩倡和所著有竹林集明陳子才兩浙名賢録海鹽人五經六藝諸子百家無不通解尤善丹青點染自娛不輕為人下筆元末隱居不仕洪武初下詔以人才徵弗就有司為之勸駕卒不起年四十歲旦日忽命童子折梅花一枝侍於側自繪其像形神宛然閣筆端坐而逝徐晟海鹽文獻志字公允號篠庭天資穎敏經史子集內外典靡不周覽強記以博洽稱王大參衡按海上命取韻府考事得之楣間注云出漢雋詢知晟命延入禮敬之問漢書數事詳對無失稱曰徐漢書幼業舉子以貧故囊書澉上授徒有司嘗舉遊庠辭不就朱朴海鹽文獻志字元素淡嗜欲體臞而修音聲琅琅時一吟咏令鄙吝坐消力穡具餐郡大夫徐白泉懇致之以疾辭且曰吾氓也焉可與尊官抗禮吾無他能以益若治吾休矣有西村集許杞山序而刻之陳鑑海鹽文獻志字用明性髙抗鄙舉業弗習有古俠士風或諷曰出事公卿禮也勸為省臬掾父兄喜為入鏹鑑曰大丈夫不力學何甘伏人下棄弗就閉門讀書人罕見其面者數年學遂成至老口不輟吟篇章浩穰金鏗波激卓然名家袁仁兩浙名賢録字良貴嘉善人父祥祖顯皆有經濟學仁於天文地理厯律書數兵法水利之屬靡不諳習謂醫雖賤業可以藏身濟人遂寓意於醫昆山魏校疾召仁使者三至弗往謝曰君以心疾召當含咀仁義炮治禮樂以暢君之精神不然雖十至無益也校疾愈訪仁與語三日大驚遂定交焉顯嘗作春秋傳三十卷祥作春秋或問八卷以發其旨仁復作針胡編以闡之郁從周萬厯秀水縣志字泰初自幼神骨清爽嘗闔門靜坐時時吟咏亦善鼓琴登嘉靖己酉鄉薦再上春官不第即棄去瓢衲出逰或數年一歸省其母遂去莫知所之嘗至南嶽遇異人有所指授後遇張紫陽授大丹訣要乃還武林賣藥市中人無識者殷仲春嘉興縣志字東皋隱居城南茒屋短牆不蔽風雨弦歌賣藥喜購古帖殘書補葺考校生平落落寡合遇顯者輒引避子志伊字古耕胼胝力田好讀晉書戴晉續獻徵録字康侯居未中之牆頭村幼孤多疾從叔灝與同里項元海交好擕晉就醫因遍閲項氏家藏名迹自茲工畫後寓居精嚴寺僧房時與方外秋潭髙士殷方叔髙元雅輩交間遊名山住金焦北固之間者歲餘嘗圖其景以贈人喜鶴洲山水樹石時來依止遂於湖濱構小屋以居名蝶華居沒葬其側一生不娶不茹素亦不嗜葷不蓄一童飲食止一小鐺自炊不備火具其孤髙絶俗如此盛德潛紫桃軒又綴秀水人自號杞菊老人癖嗜古著存古録劄記彞鼎奇物書繪真迹如周公謹雲煙過眼録之例畫學倪雲林不肯為人作間點筆輒自碎之屠爌嘉興府志字暗伯善事母隱居講學脯修之入輒以周宗黨故常至空匱湖州府周披裘翁髙士傳不知何許人亦不詳其名寒暑所服惟一裘因呼披裘翁或嘗隱於天目嘗出採薪遇延陵季子見道傍遺金季子命翁取之翁投鐮於地瞋目拂手而言曰何子居之髙視之下儀貌之莊語言之野也吾五月披裘而負薪豈取金者哉季子謝之問其姓不對而去三國吳姚仲翁兩浙名賢録吳興人天性儉素種瓜灌園以供衣食鄉人稱為長者或有餽遺一無所受不得已而受即惠貧乏未嘗以一介自汙瓶粟屢空晏如也晉計昭𢎞治湖州府志字叔明武康人黃武中為車騎將軍後隱於禺山晉宣帝徵召不起沈警西吳里語字世明武康人專治左氏春秋謝安辟為參軍謝病歸安固留不可乃笑曰沈參軍有獨善之志不亦髙乎王恭鎮京口復引為參軍手書招致詞甚殷勤不得已而應之尋復謝去南北朝沈道虔南史本傳吳興武康人少仁愛好老易居縣北石山下孫恩亂後飢荒縣令庾肅之迎出縣南廢頭里為立宅臨溪有山水之玩時復還石山精廬與諸孤兄子共釡庾之資困不改節受琴於戴逵王敬𢎞深貴重之郡州府凡十二命皆不就有人竊其園菜者外還見之乃自逃隱待竊者取足去乃出人拔其屋後大荀令人止之曰惜此荀欲令成林更有佳者相與乃買大筍送與之盜者慙不取道虔使置其門內而還常以捃拾自資同捃者或爭檖道虔諫之不止悉以其所得與之爭者愧恧後每爭輒云勿令居士知冬月無復衣戴融聞而迎之為作衣服並與錢一萬既還分身上衣及錢悉供諸兄弟子無衣者鄉里年少相率受學道虔常無食以立學徒武康令孔欣之厚相資給受業者咸得有成宋文帝聞之遣使存問賜錢三萬米二百斛悉供孤兄子嫁娶徴員外散騎侍郎不就年老菜食恆無經日之資而琴書為樂孜孜不倦文帝敕郡縣使隨時資給子慧鋒修父業不就州辟沈麟士南齊書本傳字雲禎吳興武康人少好學家貧織簾誦書口手不息果元嘉末文帝令尚書僕射何尚之抄撰五經訪舉學士縣以麟士應選少時稱疾歸鄉更不與人物通養孤兄子義著鄉曲作元散賦以絶世太守孔山士辟不應隱居餘干吳羌山講經教授從學者數十百人征北張永為吳興請驎士入郡麟士聞郡後堂有好山水乃住停數月永欲請為功曹使人致意驎士曰明府德履沖素留心山谷民是以被褐負杖忘其疲病必欲飾渾沌以蛾眉冠越客於文冕走雖不敏請附髙節有蹈東海而死爾永乃止永明六年詔徵為太學博士建武三年徵著作郎永元二年徵太子舍人並不就負薪汲水并日而食守操終老篤學不倦遭火燒書數千卷年過八十耳目猶聰明以火故抄寫燈下細書復成二三千卷滿數十篋時人以為養身靜默之所致也同郡沈儼之字士恭徐州刺史曇慶子亦不仕南史本傳鄉里號織簾先生沈顗梁書本傳字處默吳興武康人幼清靜有至行慕黃叔度徐孺子之為人從叔勃貴顯齊世每還吳興賓客填咽顗不至其門勃就之顗送迎不越於閫勃歎息曰吾乃今知貴不如賤俄徵為南郡王左常侍不就永明三年徵著作郎建武三年徵太子舍人俱不赴永元二年又徴通直郎亦不赴顗素不治家産惟以樵採自資怡怡然恆不改其樂天監四年大舉北伐起民丁吳興太守栁惲以顗從役揚州别駕陸任以書責之惲大慙厚禮而遣之陸琳茅山志東遷人九徵不起諡髙蹈先生唐沈徵𢎞治湖州府志沈法興之孫太子文學承家之子博學知古隱江口山孝弟力田纍徴不起縣令韋承慶改其所居為茂德鄉吳馮吳興掌故字季德菱湖人僧皎然有杼山禪居寄東溪吳處士詩馮善詩故皎然所寄專以詩言宋賈收貧士傳字耘老烏程人以詩著名喜飲酒家素貧東坡每念之嘗作古木怪石書其後以贈云念賈處士貧甚無以慰其意為作古木怪石一紙每遇飢時輒一開看還飽人否若吳興有好事能為君月致米三石酒三斗終君之世者當便以贈之不爾可令侍姬掌貯須添丁長以付之也胡仔西吳里語字元任烏程人父舜陟官至法曹從叔舜申舜舉皆為郡守知名仔少無宦情自號苕溪漁隱留心吟咏取自古詩人所作考之傳記為叢話一百卷元史博雲汀筆談字約之烏程人博極羣書尤邃於易元世祖訪求南人逺近交辟不就黃玠𢎞治湖州府志字伯成其先慈溪人曽祖震宋文天祥榜進士玠生於嘉興之魏塘為人清苦力學無所不通嘗樂吳興山水因卜居辨山為吳興人號辨山小隱與趙文敏逰文敏極稱許之謂生平第四友也錢塘學者請為西湖書院長力辭不就請者益勤不得已居數日而罷沈貞𢎞治湖州府志字元吉長興人不樂仕雖在畎畝手不釋卷一日縣令欲辟之先使人覘其意貞知之避匿不出宅傍有井冬夏原泉涌流不止溉田數百畝貞往來吟咏其上自號茶山老人有茶山稿十二卷行於世邱輔仁𢎞治湖州府志字友文歸安人少有至行不樂華靡母以綵帛衣之輒羞赧不服惟事詩書不為章句五經百氏悉研究其旨至正末張氏偽平章潘元明聞其名使人召之輔仁移家逃匿至洪武初始還以農業終身章得一西吳里語字德茂歸安人十嵗能文比長不樂仕進元學士程雪樓薦之不起嘗積書萬卷從學者逺近畢至有悠然先生集子橫塘亦有稽古之學善畫萱家貧不茍取於人洪武初召拜知府對曰臣有布政才以下官不能也辭弗就宋濂以詩贈之壺韜崇禎烏程縣志字怡樂號萬菊居士隱居不出工詩詞有樵雲集集中自稱宋謙之或曰無名氏曰宋者不忘本也曰無名者恥成名也龍泉稱三益之師他門人顯者百計林靜𢎞治湖州府志字子山德清人曾祖辨祖友信父德驥世為管軍總管靜髫齔時即解綴篇什研窮經史百氏旁及元詮釋典郡縣纍辟不就著愚齋集金華宋濓為之序夏義甫嘉靖湖州府志鄣南人少以孝行稱博學好古築室天目杜門隱居者四十餘年與張羽劉佐周倬沈貫人相為師友又善繪事天目山房圖蓋其得意作也明髙彥常長興縣志失其名以字行洪武初以賢良方正舉仕湖湘未幾棄官歸獨擕洞庭橘種植故圍白鶴嶺下蓊鬱成林余詮安吉州志洪武十六年以耆儒徵同崇德鮑恂上海全思誠髙郵張長年入見四人年皆七十餘龎眉皓首上喜賜坐顧問者久之並命為文華殿大學士令侍東宫及太孫四人皆辭上曰卿等髙年今特免早朝其勉留為朕輔導太子即不欲留朕亦不終強也詮等復同辭翌日乃賜敕放還寧波府漢黃公三國志注會稽典録曰鄞大里黃公潔已暴秦之世漢髙帝即阼不能一致惠帝恭讓出則濟難廣謹按史記留侯世家注引陳留志云公姓崔名字少通齊人隱居夏里故號黃公四明文獻志云宋畢文簡公以綺里季夏如孟子讀樂正裘牧仲之誤宋溪非之著論以夏黃公為的明一統志據史贊又以為隱商山中晉書夏統傳云會稽土地風俗其人有黃公之髙節今大隱山有黃墓則為鄞人無疑張齊芳寶慶四明志驃騎將軍意之子隱於慈溪之驃騎山人皆賢之遂以其父之官名其山唐許寂册府元龜字間間祖祕名聞會稽寂少有山水之好泛覽經史尤明易象久棲四明山不干時務昭宗聞其名徴赴闕召對於內殿會昭宗方與伶人調品篳篥事訖方命坐賜湯果問易義既退謂人曰君在淫聲不在政矣尋請還山寓居江陵茹芝絶粒自適其世天祐未節度使趙凝昆季深禮遇之唐末除諌議不起漢南謂之徴君孫邰十國春秋明州奉化人幼負氣岸博學髙才唐末為左拾遺朱全忠篡唐邰著春秋無賢人論即脫冠裳服布衣歸隱於奉化山著書紀年悉用甲子以示不臣之義宋楊適寶慶四明志字韓道慈溪人明律厯曉兵法隱居大隱山以文學行義聞於鄉里人皆不敢道其姓名以先生目之仁宗訪天下遺逸知州事鮑軻以名聞賜粟帛嘉祐六年知州事錢公輔又表奏適髙節授將仕郎試太學助教州遣從事躬捧詔書具袍笏輿從以禮起之辭不受年七十餘沒葬大隱山縣令林叔豹為立碑祠於學王奕奉化縣志字謀道質敏學博詞章卓有西漢風隱居自娛講論經史以興起斯文為己任守令知其賢率鄉之子弟受學焉卒後祠於學參政樓鑰敘行狀中丞舒亶為墓志銘稱元祐鄉先生子建中字師正以八行純備舉於有司不就州縣造門強起之移疾辭劉準成化四明郡志先餘姚人家鄞宋末隱居教授絶仕進意以甬東負郭非隱者居卜築青山之原依先隴而居焉學者稱南忩先生子汝舟字端父確守父訓平居無戲言惰容郡之名士大夫相繼來居戶屨常滿汝舟用吕氏鄉約身率而推行之茍非其人輒謝絶之不附權勢不事請託不入城府不語及州縣得失務本節用有餘則以濟人劉應時嘉靖寧波府志字良佐慈溪人於書無所不讀遁居林下刻意於詩寄興瀟散范至能深賞之陳應麟成化四明郡志字天祺鄞人淹貫經史至於厯數之學無不究其指歸人稱通儒一日乘馬出有失馬者亟前認馬應麟問曰子亡馬幾何時對曰逾月矣應麟有馬數年遂與之挽轡而去明日馬從别得乃詣應麟叩頭謝庭下至元間朝廷以安車召賢良應麟固辭不起賜號純德先生趙文敏嘗為逸民詩以美焉元汪灝汪瀚嘉靖寧波府志灝字季夷瀚字幼海兄弟也奉化黃甘里人父懋卿與弟森卿同學同貢並因宋革不仕杜門著書灝瀚受家學治易春秋躬耕孝養灝從海隂陳皓伯講學著有詩文曰蠟臺藁先卒瀚為知州馬稱德所薦授衢州路學録辭不赴洪武初府文學單有成奉使采修實録書二貢士於宋書二處士於元真一門盛美也史公珽兩浙名賢録字搢叟鄞人學通諸經尤精易理作文典則名重一時隱居教授者數十年程端學薦主甬東書院棄去遊西州寄興吟咏以陶寫性情每對人論宋季臺閣故事亹亹不倦及忠臣義士死節者必慷慨流涕廣平李堯民七喪不舉公珽傾槖賙之自號蓬廬處士明方同翁舊浙江通志字希元鄞人軫之裔博學力行方國珍據有明州致書以宗人稱欲強起為輔同翁厯敘世次由莆來不敢附籍且勸之歸明國珍不從遂與之絶號遁菴以自明其志孫玉嘉靖寧波府志字彥暉慈溪人洪武中其父為人所誣棫發京師卒於道玉年十二即匍匐返櫬歸葬既長家日貧授徒養母不廢甘旨力學不懈工詩善草書知府李春嘗舉賢良方正又有以明經薦者皆不就黃思銘萬厯象山縣志號東谷子身不勝衣而志倜儻好讀書作詩清麗纎美無山林枯稿之態洪武初纍膺人材明經之聘不起所著有東谷集方正學深稱之金華嘉靖寧波府志字宗實鄞人洪武間從戎燕山術值靖難守通州有功召見時弟忠以近幸授兵部尚書上欲推恩與華辭不就賜歸徙東湖韓嶺居焉足不履城府日坐斗室寄情經史手點書萬餘卷後尚書迎養於金臺官舍未浹旬謂曰萬鍾之富其如我湖山樂何遂拂袖歸永樂乙未尚書卒復召見賜白金文綺華伏闕謝曰臣布衣野人不敢用此上稱為迂叟紀宗德鄞縣志鄞人博洽經史教授里閭尤習國家典故永樂中與修郡邑通志性不樂仕進嘗徵至京陛對稱旨欲授以職固辭不拜後屢辟不起向道淳嘉靖寧波府志字永修慈溪人幼傳家學得慈湖寶峰之宗架插遺文多宋僕射薌林舊籍精研博采反求於心及父朴死靖難裒衣冠葬陽嘉山手樹松楸灑泣輒瘁遂棄科舉杜門教授事母徐極孝與顧慤為忘年友慤被召顯榮欲與彚征道淳笑不應後督府斷事張深知淳強上其名稱痼疾不起紹興府漢嚴光後漢書本傳字子陵一名遵會稽餘姚人少有髙名與光武同遊學及光武即位光乃變名姓隱身不見帝思其賢乃令物色訪之後齊國上言有一男子披羊裘釣澤中帝疑其光乃備安車幣纁遣使聘之三反而後至舍於北軍給牀褥太官朝夕進膳司徒侯霸與光素舊遣使奉書使人因謂光曰公聞先生至區區欲即詣造迫於典司是以不獲願因日暮自屈語言光不答乃投札與之口授曰君房足下位至鼎足甚善懷仁輔義天下悅阿諛順旨要領絶霸得書封奏之帝笑曰狂奴故態也車駕即日幸其館光卧不起帝即其卧所撫光腹曰咄咄子陵不可相助為理耶光又眠不應良久乃張目熟視曰昔唐堯著德巢父洗耳士故有志何至相迫乎帝曰子陵我竟不能下汝耶於是升輿歎息而去復引光入論道舊故相對纍日因共偃卧光以足加帝腹上明日太史奏客星犯御座甚急帝笑曰朕故人嚴子陵共卧耳除為諫議大夫不屈乃耕於富春山後人名其釣處為嚴陵瀨建武十七年復特徵不至年八十終於家帝詔下郡縣賜錢百萬穀千斛晉夏統晉書本傳字仲御會稽永興人幼孤貧養親以孝聞睦於兄弟每採稆求食星行夜歸或至海邊拘螊􅒹以資養宗族勸之仕統勃然作色遂不與相見太尉賈充欲耀以文武卣簿覬其來觀因而謝之遂命建朱旗舉幡校分羽騎為隊軍伍肅然須臾鼓吹亂作胡葭長鳴車乘紛錯縱橫馳道又使妓女之徒服袿㯮炫金翠繞其船三匝統危坐如故若無所聞充等各散曰此吳兒是木人石心也統歸會稽竟不知所終謝敷晉書本傳字慶緒會稽人性澄靖寡欲入太平山十餘年鎮軍郤愔召為主簿臺徴博士皆不就初月犯少微一名處士星占者以隱士當之譙國戴逵有美才或憂之俄而敷死孔沉嘉泰會稽志字德度何充薦於王導辟司徒掾琅琊王文學並不就從兄坦以裘遺之辭坦曰晏平仲猶狐裘數十年卿復何辭於是受而服之是時沉與魏顗虞球虞存謝奉為四族雋沉子廞位至吳興廷尉廞子琳之以草書名又為吳興太守侍中南北朝戴顒宋書本傳字仲若譙郡銍人父逵兄勃並隱遁有髙名故世居剡下父善琴顒及兄並受琴於父父沒所傳之聲不忍復奏各造新弄中書令王綏嘗擕賓客造之勃等方進豆粥綏曰聞卿善琴試欲一聽不答綏恨而去桐廬縣多名山兄弟復共遊之因留居止勃疾患醫樂不給顒曰兄今疾篤無可營療顒當干祿以自濟乃告時求海虞令事垂行而勃卒乃止出居吳下吳人共為築室聚石引水植林開澗有若自然乃述莊周大旨著逍遙論注禮記中庸篇三吳將守及郡內衣冠要其同遊野澤堪行便往不為矯介衆論以此多之髙祖命為太尉行參軍琅邪王司馬屬不就宋國初建令曰顒秉性幽遁守志不渝宜加旌引以𢎞止退可散騎常侍在通直不起元嘉二年詔曰顒志託邱園自求衡蓽恬靜之操久而不渝可國子博士又徴太子中庶子十五年徵散騎常侍並不就衡陽王義季鎮京口長史張邵與顒姻通迎來止黃鵠山山北有竹林精舍林澗甚美顒憩於此義季亟從之遊顒服其野服不改常度太祖每欲見之嘗謂黃門侍郎張敷曰吾東巡之日當宴戴公山也朱百年宋書本傳會稽山隂人少有髙情親亡服闋犒妻孔氏入會稽南山伐樵採箬為業以樵箬置道頭輒為行人所取明旦亦復如此人稍怪之積久方知是朱隱士所賣須者隨其所堪多少留錢取樵箬而去或遇寒雪樵箬不售無以自資輒自榜船送妻還孔氏天晴復迎之郡命功曹州辟從事舉秀才並不就隱迹避人惟與同郡孔顗友善家素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就顗宿衣悉夾布飲酒醉眠顗以卧具覆之百年不覺也既覺引卧其去體謂顗曰綿定奇溫因流涕悲慟顗亦為之傷感除太子舍人不就顔峻為東揚州發教餉百年穀五百斛不受時山隂又有寒人姚吟亦有髙趣為衣冠所重辟文學從事不起峻餉米二百斛吟亦辭之百年卒蔡興宗為會稽守餉百年妻米百斛遣婢詣郡門奉辭固讓時人美之以比梁鴻妻孔祐續髙士傳山隂人隱於四明山嘗見山谷中有錢數百斛視如瓦石採樵者競取入手即成沙礫太守王僧虔與張緒書曰孔祐行動幽祇德操松桂引為主簿遂不可屈此古之遺德也子道徽少厲髙行能世其家風守志不仕隱居南山終身不窺都邑豫章王嶷為揚州辟西曹書佐不至道徽兄子總亦有操行遇飢寒不可得衣食縣令吳興邱仲孚薦之除竟陵王侍郎竟不就唐秦系唐書本傳字公緒越州會稽人天寶末避亂剡溪北都留守薛兼訓奏為右衛率府倉曹參軍不就客泉州南安有九日山大松百餘章俗傳東晉時所植系結廬其上穴石為研注老子彌年不出刺史薛播數往見之嵗時致羊酒而系未嘗至城門薑公輔之謫見系輒窮日不能去築室與相近忘流落之苦公輔卒妻子在逺系為葬山下張建封聞系不可致請就加校書郎與劉長卿善以詩相贈答權德輿曰長卿自以為五言長城系用偏師攻之雖老益壯其後東度秣陵年八十餘卒南安人思之號其山為髙士峰云五代石延翰成化新昌縣志父渝仕吳越錢氏為太子賓客吏部尚書兄延俸平江軍節度使封司空獨延翰不仕隱居沃洲結廬於白雲谷以書史為樂自號雲和子人稱羽林先生後贈白雲先生謝銓會稽縣志仕南唐官至銀青光祿大夫金吾大將軍李氏以國歸宋銓守義挈家遁居祁門宋趙宗萬寶慶會稽續志字仲囦山隂人少知名錢忠懿器之入朝欲與之俱以親老辭不行既長博極書傳負經濟之術用進士厯詔藉於春官宗萬天資蕭散於世故淡如也壯歲築室於郡之照水坊左瞰平湖前挹秦望畜一鶴號丹砂引以為侣足迹不及於髙門鼓琴讀書怡然自適者三十餘年祥符中詔舉遺逸郡守康戩以宗萬薦尋被召乃曰吾老矣不足以任事因獻跛鼇傳以自見且請自託於道家者流朝廷不奪其志即其家賜以羽服黃惠之成化新昌縣志字子思重厚尚氣節宣和辛丑方臘焚劫新嵊惠之與弟能以方略誘之潰敗其衆朝廷遣郭統制收復論功行賞惠之辭曰破賊藉國威非某之力也遂隱不出工部尚書度共長孫也尉瑞安時迎養月餘而歸年八十二以潔行終石公孺成化新昌縣志字長孺有經術髙隱不仕丞相謝克家禮為國士髙宗詔求遺逸使者朱異薦其長於三傳召對稱旨命之官固辭髙宗曰卿當為朕勉受一官乃授迪功郎進其所作春秋類例命藏館閣再授監南嶽廟不久還山王易簡山隂縣志字理德尚書佐之曾孫幼喪父哀毁如成人及冠登進士第除溫州瑞安主簿不赴隱居城南讀張子東銘作疏議數百言唐忠介震黃吏部虞見而器之折輩行與交易簡篤倫義事伯姊甚謹尤賙恤其族倪森萬厯上虞縣志字彥林當理宗朝挫亷逃名甘老泉石寬仁好施喜怒不形於色張即之四明名士以書法擅當代寶祐年間過訪為書大學經文於所居門廡迄今傳焉石余亨萬厯紹興府志字成已新昌人登咸淳進士仕於鄞於衢已而棄官歸沃洲自號休休翁丙子奔走萬山中更號遁翁平生喜為詩文孫璞欲梓遺稿弗許曰聊以適吾意爾未必名家黃竒孫成化新昌縣志字行素號雲谷宋季隱居沃洲從俞默翁石九成韓明善遊考訂經史傳注之異同品評古今人物之優劣俱有確論吳大有嵊縣志字有大寶祐間入太學升上舍以詞賦有聲率諸生上書言賈似道姦狀不報遂不復有仕進意退遊湖海與林昉仇逺白珽等六七人詩酒相娛時以比竹林七賢元初辟為國子檢閲不赴卒葬戴顒墓左先是大有之友費九成為信州司理秩滿赴京會大有上書亦與歸隱元楊子祥嘉靖餘姚縣志字吉甫父克和明春秋學子祥世其家卓犖有奇氣江萬里舉為縣監稅輒棄去教授海濱學徒甚盛兵興避地西浙主牟應龍家時留夢炎事世祖為吏部尚書聞子祥賢欲致之不顧東還遇鄧牧謝翺方九思於臨安九思亦姚人相與弔古尋幽酌酒賦詩徜徉湖山間復有薦此數人者乃皆去歸其鄉而子祥歸姚杜門著書垂二十年而卒陳開先嘉靖餘姚縣志字覺民號魯山翁力學該博舉進士氣髙不能修小禮曲貌遇公卿稍不如意輒謝去樞使李應山鎮兩淮辟為機宜文字甚任之沿邊將帥偵意致饋開先一無所受歸隱三十年安貧守志鄉黨尊異之厲元吉嘉靖餘姚縣志字無咎號半村宋末舉進士尉烏程歸隱從山元至元間訪求前宋故臣欲強以官遁迹湖海至白首始歸潘音於越新編新昌人甫十嵗而宋已見長老談崖山事即􅏰然涕下及長讀夷齊傳擊節憤歎日杜門讀書多所自得後訪弟元甫於義烏因往從草廬吳澄學泰定間澄以薦召欲行音止之不從遂築室南洲山中名其軒曰待清隱居元詩選傳字聲甫絶意進取掇野蔬自給躬耕十餘畝非其力不食或勸之著述曰六經語孟先儒所言備矣何以注腳為讀書有得往往筆之壁牖間至正三年詔徵天下遺逸亷訪使檄贊之行固辭卒年八十有六張爚於越新編嵊人孤立不凡自以家世宋臣絶意仕進作休休吟以見志自號萃疇居士葉仲凱萬厯紹興府志餘姚人博涉經史善屬文咸淳甲戌禮部正奏名為當國者所忌罷歸終身不仕或勸之曰君未食宋祿今仕元何不可而甘貧賤仲凱對曰吾聞周德雖興夷齊不厭薇蕨漢道方盛黃綺無間山林人各有志奈何違之勸者乃止楊恆續髙士傳字本初諸暨人性醇篤與人語如出肺肝恥為覆藏元末州郡辟不就婺越間請為州閭師亦不赴浦陽鄭義門延致之幡然行坐臯比以講道為己任己退居白鹿山躬耕暇則吟誦人莫能測也髙郵欒鳳來為州牧造門請辟不起遣閭右子弟即恆家問學州常有民坐法當大辟恆哀之倡白其誣民以烏犍謝頓顙流涕終不受王冕續髙士傳字元肅諸暨人少好學家貧依沙門居夜潛出坐佛膝上執䇿映火讀之琅琅達旦安陽韓性引為弟子性卒門人事冕如性冕父時已卒迎母入城就養他日母思還里冕買白牛駕母車被古冠服隨車後小兒遮道訕笑冕亦笑著布作郎李孝光薦之不就久之北逰燕祕書卿台哈哈薦以館職冕即日南還擕妻子隱九里山種豆三畝粟倍之薤韭各百本芋一區梅花千樹搆苑屋於中倣周禮著書一卷坐卧自隨不使人觀更深則撥火朗誦之明髙帝取婺州物色冕欲授以參軍一夕卒申屠澄諸暨縣志字仲敬元時人父性受業黃溍之門澄與兄溶得其淵源謹言端行俱為鄉里所敬憚而澄尤寡合工古文詞精篆籀小楷辟本路教授辭疾不行晚節益堅明許汝霖萬厯紹興府志字時用嵊人元至正丙寅進士纍官國史編修已而退居張士誠據淮浙羅致士大夫霖遁走求之弗得歸隱於嵊洪武初徵至京未幾乞歸宋景濂以文贈之董荆成化新昌縣志字宗楚旭之弟博學好古長於詩文尤善畫洪武十七年舉博學宏詞上親問治道稱旨授以縣丞辭不就吕九成新昌縣志字宗學與兄不用九思並稱三彥兩兄倜儻有才名而九成誦説溫公晦菴之書言動由禮不與時移易其後兩兄以徵辟仕九成獨甘隱約不就舉終身茹淡被疏弦歌自適同宗子弟數百十人咸敬事之稍未循節命至堂下戒責之皆悚仄奉教惟謹嘗道拾鈔數千貫立俟其人還之一少年被酒侵九成從者欲毆之九成止勿與校後浙江參政胡纘宗行部至新昌問邑之文獻乃為立逸氏碑推祀鄉賢王璛嵊縣志字公玉淹貫經史操行端慤善詩文工篆𨽻李公平薦之授慶元路儒學提舉不就明興以名聞召至金陵復授前職以母老辭是時應聘而起公玉與許時用單陽元三人皆居邑東陽元受令職而公玉時用堅志遺榮徜徉邱壑劉履萬厯上虞縣志字坦之忠公五世孫操履端重號草澤間民洪武十六年詔求天下博學之士浙江布政使強起之至京師見上於奉天殿賜宴親試將授以官以老辭給寶楮若干貫為東歸費未行而疾作卒於會同館歸葬象田山劉績列朝詩集傳字孟熙山隂人渙之子貢友初之甥也教授鄉里不干仕進家貧轉徙無常地所至署賣文榜於門有所得輒市酒樂賓客緣手而盡嘗有客至呼名久不出怪之其妻方拾破紙以代爇薪一笑而已家有西江草堂人稱為西江先生羅頎於越新編山隂人性淳朴力敦古道能讀祖父書著之篇章爛然成二家言太守戴琥崇禮隱逸於頎尤注意焉羅氏三世隱梅山祖綋著蘭坡集綋長子周著梅隱稿次子新著介軒集頎所著易裔札記詩畫二百餘卷稱梅山叢書浙江通志卷一百九十二
