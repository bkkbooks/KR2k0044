body:
  text: 浙江通志卷二十四城池下紹興府紹興府城池山陰會稽二縣附郭於越新編句踐都越命范蠡築城太平寰宇記隋開皇十一年越國公楊素築寶慶會稽續志唐乾寧中錢王鏐重修宋皇祐中太守王逵復修并濬池嘉定十六年守汪綱加築兼修諸門城之東曰五雲水門曰都泗東南曰稽山水門曰東郭西曰迎恩西南曰常喜南曰殖利水門曰偏門北曰三江舊浙江通志元至正十三年浙江亷訪僉事圖們特穆爾增築十八年樞密副使吕珍鎮越浚壕明嘉靖二年秋颶風大作樓堞半圮知府南大吉修復之三年冬修女牆并濬內外池國朝順治十五年奉檄增高併堵紹興府志康熙六十年知府俞卿修築七百四十九丈其門名皆仍舊惟迎恩易為西郭從俗所稱以配東郭云都泗即都賜水偏即偏門常禧即常喜昌安即三江殖利俗呼南堰門常禧俗呼岸偏門都泗五雲東郭稽山四門隸會稽殖利水偏常禧西郭昌安五門隸山陰俞卿重修府城記紹興古越州地宋高宗南渡駐驆於此因易今名郡城周環二十三里有竒陸五門曰五雲古雷門也曰稽山曰常禧曰西郭古臥薪處也曰昌安水六門曰都泗曰東郭曰殖利曰水偏曰西郭曰昌安門外月城月城外八卦城始於越范蠡而開拓於隋楊素嗣後廢興本朝不一以來海隅向化太平優遊民樂無事城牆傾定鼎圯大半譙樓略有存者門不堪啓閉守土者奚辭其責哉豫以康熙五十一年抵任緣山陰會稽上虞三邑海塘易石之役首尾七八年奔馳催督刻無寧晷六十年八月海塘成用集紳士耆民而告之曰城不固奈何衆言非太守修不可曰費無出又奈何衆鼓舞願助豫倡捐二百金山會二縣各捐一百兩衆曰工役浩繁非二萬金不可豫曰無庸也官不侵漁役不中飽匠不冒破爾等但量力樂輸其不足者太守自任之衆皆欣悅工興於六月不半載告成樓櫓雉堞耳城壕隄以及兵役防守之所纖悉具備盡改舊觀計修城七百四十九丈石料工價銀共七千九百兩零署山邑别駕李君天植山陰令丁君𢎞曽稽令張君我觀縣丞李憑吳學禮均執勞者宜附姓名雍正七年正月總督管巡撫事臣李衛欽奉上諭檄紹興府知府顧濟美確勘興修三江巡檢司城於越新編在府城北四十里浮山北麓與三江所城對峙一門西出嘉靖年有倭寇始增治之山陰縣志湯和所築方一里二十步高二丈厚一丈八尺城樓一窩鋪四女牆三百六十六白洋巡檢司城於越新編在府城西北五十里山陰境緣白洋山而城之舊浙江通志湯和所築方一百一十丈高一丈五尺厚一丈城門一譙樓一窩鋪四女牆一百七十六黃家堰巡檢司城紹興府志在府城東北八十里會稽上虞之界曰纂風鎮為方一百四十丈高一丈三尺厚二丈五尺南北環以月城城樓一窩鋪四女牆一百一十城下有池深一丈二尺廣四丈五尺舊在府城東北六十里黃家堰明洪武二十年徙瀝海所西為海潮所齧𢎞治間徙今所故址尚存三江所城於越新編在府城北三十里山陰浮山之陽踐山背海山陰縣志明洪武二十年信國公湯和築方三里二十步高一丈八尺厚如之水門冇四北門則堵焉城樓四敵樓三月城三引河為池可通舟楫兵馬司廳四窩鋪二十女墻六百五十八墩臺七瀝海所城於越新編在府城東北七十里會稽薛家瀝紹興府志為方三里三十步高二丈二尺厚一丈八尺城門城樓角樓敵樓月城各四池深一丈五尺廣五丈五尺兵馬司廳四窩鋪國朝十六女墻六百十一墩臺四楊沛重修雍正八年檄署會稽縣知縣蕭山縣城池紹興府志舊經云周一里二百步高一丈八尺厚一丈一尺久廢明嘉靖三十二年知縣施堯臣創建周五里高二丈五尺闊二丈二尺四門東曰達台南曰拱秀西曰連山北曰靜海各設月城門各有樓曰近日拙政聽潮修文雉堞二千五百八十有五鋪舍二十有三下設水門三外設弔橋四因取土築城遂以為壕各深一丈五尺廣三丈長計一千五百九十一丈五尺四望臺一在北幹山上築城周二十三丈三尺高一丈八尺闊一丈二尺雉堞六十有一西為門施堯臣修城記城基約地九里有餘中外俱用石板腹內則以亂石和土築之基下俱用松樁遇有河池仍以石板疊砌俟與地平然後築之工興於癸丑冬十一月完於甲寅春三月蕭民好義而善幹故其敏事如此國朝順治十年知縣韓昌先重建東西兩城樓及修葺城垣十三年總督李率泰檄各府州縣改築城上舊堞知縣黃應宫奉檄計里分工旬日築城計九百一十四垜康熙八年知縣鄒勷修築十年又修雍正五年欽奉上諭檄知縣門鈺重修諸暨縣城池諸暨縣志縣舊有城圍二里四十八步高一丈六尺唐開元中縣令羅元開建東北門天寶中郭密之建西南門吳越王錢鏐遣王永修築至明初改築圍九里三十步為門五東曰迎恩南曰迎薰北曰朝京西曰西施而水門不名後以承平日久民皆據其址為居室嘉靖中知縣林富春重築左臨浣水右倚長山圍四里高一丈有八尺陸門四東曰禹封玉帛南曰句乘雲物西曰蠡湖煙月北曰槩浦禾桑水門三國朝順治十五年增高併堵餘姚縣城池於越新編始築於吳將朱然圍一里二百五十步元至正年方國珍復城之陸門五東曰通德西曰龍泉南曰齊政北曰武勝後永清水門二高明修城記餘姚為鄞郡外屏至正十九年九月始築城十月畢功凡以里計者九以大計者一千四百六十為址二丈其上之廣殺其址二尺四面之門有五其南北又各立水門通舟楫明洪武年信國公湯和遣千戶孫仁增治嘉靖年復有倭患乃漸完葺改東門曰澄清舊浙江通志四面引江為池國朝順治十五年增高併堵江南城於越新編嘉靖年以倭患建周一千四百四十丈陸門四東泰西成南明北固小陸門二恩波流澤水門二左通右達四門皆有重樓而北固樓與舊城舜江樓相直通濟橋亘其中南北皆為月城通兩城為一徐階修城記餘姚去海百里夾江居民數萬家舊有城直江北以署所在也測其生齒江以南得三之二焉頃歲倭犯海上江南人走保城邑不能容則散入山谷間邑人少保李公聞之嘆曰今兵興尚未已江以南脫不保縣城能獨完乎餘姚不完而土崩之勢成矣若益城江南豈惟姚民將全浙實屏蔽之議既定有譁於里者里人邵君陳君等又為疏言天子可之於是總督胡公賢典領其事乃會御史王君本固羅君元真程土物度形勢而經費則督府制之不足始助以諸郡贖緡蓋總其費白金鍰計不滿萬者百有十石畚鍤無不給焉始於丁巳年九月以次年六月成江南北人見城成而不知材之所自出與役召之及巳也始之譁者乃曰城實生我而國朝顧謂其厲我以自衛乎用記之順治十五年增修三山所城紹興府志在餘姚縣東北四十里梅川一都之滸山方三里一百二十八步高一丈六尺明永樂十六年增六尺址厚四丈五尺面二丈二尺陸門四水門一城樓月樓敵樓各四月城四池深一丈三尺廣三丈八尺弔橋四兵馬司廳三更樓一窩鋪六女牆六百三十五墩臺七睂山巡檢司城紹興府志舊在餘姚之睂山明洪武二十年徙孝義二都之湖海頭東南去縣四十里方一百八十四丈高一丈八尺厚二丈城門城樓更樓望海樓各一窩鋪四女牆一百二十臨山衛城紹興府志明初洪武二十年信國公湯和徙上虞故嵩城於餘姚西北五十里廟山之上並海而城之是為臨山衛初用土石半其秋指揮同知武瑛督築乃盡用石為方五里三十步高一丈八尺永樂十六年增五尺址厚四丈五尺面半之陸門四水門一城樓大五小三敵樓十四月城三池深一丈五尺廣五丈五尺弔橋四窩鋪三十八女牆九百九十兵馬司廳七瞭望臺一墩臺九龍山所城於越新編在餘姚縣東北一百二十里方四里陸門三水門一舊浙江通志城樓角樓各四月樓三敵樓十七池深一丈二尺廣三丈五尺窩鋪九弔橋四女牆四百六十墩臺五三山巡檢司城紹興府志舊在餘姚之金家山明洪武二十年徙上林一都之破山西南去縣六十里為方三百五十丈冇竒高一丈五尺厚二丈城門一城樓一窩鋪四女牆一百二十五廟山巡檢司城紹興府志舊在餘姚廟山明洪武二十年徙上虞縣五都之中堰東南去餘姚縣六十里方一百四十丈高二丈五尺厚二丈二尺城門一城樓一月城二窩鋪四女牆一百一十上虞縣城池上虞縣志縣舊無城府舊志所稱縣城周一里九十步者蓋縣治之衙城也元至正二十四年方國珍據有浙東始建議築城東南平衍西北因山為隍西南則跨長者山周回十有三里高二丈有竒厚一丈五尺置樓堞通五門東通明南朝陽西晝錦北豐寧西南金罍水門在通明晝錦金罍三門之側明初信國公湯和徙上虞城石往築臨山衛城縣城惟存土基嘉靖十八年縣令鄭藝因故址興築高厚視舊稍增內外俱甃以石仍置樓堞通五門改東曰啓文西曰來慶南曰百雲北曰叢桂西南曰通澤三水門如舊南城增便水門二以通百雲東西溪之水入城城下留馬路六尺內亦如之朱復修上虞縣石城記嘉靖十有八年己亥春正月邑侯莆田鄭士馨藝下令復石城就其復於隍者起之侵者歸堙者崇再旬而土工訖至於秋孟乃外障以石堞其巔總高若干丈延袤十里許為城門五為水門三上咸覆以屋穴水洞二引離坤二溪之流而隍則外繞如故為馬道外內惟周越明年三月告績是役也費移之公而斂勿加勞公諸里而力勿困無昔者旁近之佐而計以裕慮不為浮議所奪而績以底險設勿失其故而勢以寧非虛衷定命致勤於民曷觀厥成嗣令君子尚其無隳前績無專外圉以丕昭先民本末之義庶我邑永永有藉哉國朝順治三年土寇竊發大兵進勦雉堞僅存康熙八年十一月知縣鄭僑重修嵊縣城池於越新編吳賀齊為剡令所築宋守帥劉述古命縣令張誠發修慶元初溪流湍暴知縣葉範纍石為隄城以全後水決東渡提舉李天性增築明秋大水又壞知縣周悅增築明初信國公湯和移磚石築臨山衛城由是僅存四門𢎞治中知縣臧鳯築隄捍水十一年知縣徐恂又築自是城賴以全嘉靖時倭患作知縣吳三畏力請築城周一千三百丈為門四東曰拱明南曰應台西曰來白北曰望越各有樓有月城東陡門扁曰溪山襟帶亭北有四山閣當學有起鳯亭東門有騰蛟亭王畿修城碑記世宗建極之二十九載海氛為孽浙東羽檄無已嵊知縣吳侯嘆曰是可坐受無城之困乎乃請於上官相基度費稽版籍凡五十餘丁築城一丈計為丈九百有竒因舊址繞山帶溪工始九月凡四閲月告竣東西南北四門次年請布政司五百金成之東陡門北四山閣則取諸罰鍰漸成之侯始鳩工钁故址得一磚識云漢乙卯歲剡長吳三畏記夫吳侯築城於千五百載後而與前令姓氏同築之歲又同嘻亦竒矣國朝順治十五年重修每堞增高五尺新昌縣城池新昌縣志會稽志新昌舊有土城周十里久廢無考明嘉靖三十一年知縣萬鵬議築城民多憚於力役時尚書吕光洵力排羣議匝月告成長一千三百七十四丈有竒高一丈七尺闊二丈四尺周六里門四東曰應台西曰通會南曰仰山北曰濟川萬厯庚戌縣令李應先於東北中界開正陽門自東抵西皆引溪為池而西南則面山焉吕光洵修城記新昌蓋剡之東境梁開平間析其十三鄉為縣以其創建也因名新云縣舊有城元末廢頃盜起海隅入剽台寧新昌民盡空其縣走山谷武進萬侯鵬銜命在道聞警亟抵縣乃大集士庶度地相基計工量費西跨澗北計周一千三百七十四丈表裏俱石而實以土礫蓋極堅緻云城東故有捍水石隄城附於堤堤愈堅城愈壯既銷外侮又禦橫流是千載不磨之績也國朝順治十五年增高併堵台州府台州府城池臨海縣附郭赤城志按舊經周回一十八里始築時不可考太平興國三年再築慶厯五年海溢復大壞太常博士彭思永攝州事命縣令范仲溫總其役明年元守絳至增甓之至和元年復大水城不沒者數尺孫守礪再加增築嘉祐六年大水復壞熙寧四年錢守暄又纍以密石乾道九年火及闉淳熙二年趙守汝愚又繕築焉三年秋大雨城幾圯尤守袤復修之按故基東自小鑑湖循清心嶺而南縈抱舊放生池直接城山嶺古通越門土地廟處蓋今湖昔地皆在闉闍中後乃徙而之西縮入里餘城今七門各冠以樓南曰鎮寧門樓名神秀曰興善門樓名超然東曰崇和門樓名惠風西曰栝蒼門樓名集仙東南曰靖越門樓名靖越西南曰豐泰門樓名霞標西北曰朝天門樓名興公吕祖謙修城記臨海郡南東西三方岸江湖秋水時至北限大山蹙不得騁怒齧隄足生聚凛凛恃城以為命距海餘百里逋亡剽俠之所曹惡歲輒睢盱洲漵睥睨郛郭徼警者不敢弛柝故閉修之政在是郡為首務蓋所以逺災害銷姦萌非徒區畫封表備侯邦之制也慶厯之水幾不為郡元章簡公絳來守城復立宣和中盜發仙居闖虛罙入突薄欲登時則有户掾滕君膺帥厲吏士禦以方略寇不為患父老紀焉乾道九年里旅不戒於火延及郡城堵隤甃弛徑踰無禁災氣未格民訛不寧間一歲太史趙侯汝愚自信徙鎮暇日循行牆落屬丞掾而告之曰置守所以衛民顧屏蔽廢徹若是其何以待不虞土功於古雖有常律傳春秋者復出啓塞從時之例豈非城闉之啓閉實有邦之大紀隨時築治有不得而已者耶況壯城之卒月粟歲帛凡以為此益其廪而寬其程宜無不可於是軍事判官蘇延壽受役要司輂輦金榖之稽兵馬都監胡勝督裁巡功察其勉與不勉者命羣有司各保其所奠地守傳衆力埤增卑薄塗塞空郤環城諸門作新者四曰鎮寧曰興善曰豐泰曰栝蒼修舊者五曰崇和曰靖越曰朝天曰順正曰延慶起淳熙二年六月癸酉訖閏九月戊辰纍日積功凡一萬五千三百七十有六大抵取具於北城之籍間民願即工者厚酬之不欲勿強會其數視役兵財十之二煆斫漫塈黝堊之工畀僦直如其素醪醴之饋勞來之問相及於道其材瓦石甓之用積二十一萬七千九百錢以貫計米以石計者合四千六百冇竒維侯憂民急病之意既達於下而精知周慮乂足以綜理之故公無羡費人無留力工無餘技役事首尾歷再時版臿並作觀堞崛興而近郊之氓初未常釋隴畝也始侯之至詔奉計最入朝十月報政之期甫半歲而贏或謂是邦特侯假道休沐之地繕營之巨者必姑存以須後乃獨於入國阡陌未習之時驟舉力政百年之迹還於指顧邦人德其賜而樂其成請書勞於石遂書以諗台之君子國朝順治十五年增修攝兵道胡文曄署府王升董其事視舊增高三尺垜口併三為一日久漸圮康熙五十一年郡守張聨元倡議修築舊制城有七門括蒼豐泰二門久塞崇和門初築時即有月城其門南向以受山水趨朝之勢至鎮寧興善靖越朝天諸門增築月城舊皆逆水不知何年順水而闢因相度形勢於康熙五十七年修復四門盡改向逆水復重闢豐泰門興西市仍如舊制雍正七年正月總督臣李衛欽奉上諭檄行台州府知府江承玠確勘興修黃巖縣城池赤城志按舊志云周邑九里三十步唐上元中築台州府志宋元無考明初永嘉侯朱亮祖重築洪武二十年信國公湯和城沿海衛所撤石料徙之海門嘉靖中知縣高材請城今處因委通判傅綰城之洎汪令汝達至始竣事黃巖縣志城周七里高二丈址厚三丈為級三為門五東曰鎮海南曰迎薰西曰液金北曰拱辰東南曰應秀初城北倚長江右瀕西港復於東南鑿河廣十丈北入江西達港以環其外國朝順治十五年署縣事王印昌增高四尺合兩雉為一併三級為二環城鑿壕壕內植木柵藩之雍正八年台州府知府江承玠詳勘委知縣韓慧基增修天台縣城池赤城志周回四百步吳永安中築按甎刻宣和三年重修有二門東曰應台西曰通越台州府志明嘉靖乙卯知縣馮蘭中請建城經始於丙辰至丁巳冬知縣鍾鈕訖工有四門東曰應台南曰玉笥西曰通越北曰金庭又開小城門四萬厯甲午司理劉啓元署縣事改築南門更名煥文國朝順治十五年增葺加高垜堞仙居縣城池台州府志周十里舊治西郊演武場晉令羊欣遷今地唐上元二年始築樂安城僅百餘步宋宣和二年吕師囊陷毁統制姚平仲張思正駐兵於此因纍土再築明嘉靖丙寅知縣姚本崇申請興築未成郡丞毛德京嗣經理之拓地於西啓五門東曰迎暉南曰來薰西曰慶豐北曰拱辰西南小門曰省耕既而霖雨傾圯司理蕭文清竣其工國朝順治七年增修寧海縣城池赤城志周回六百步舊在海遊唐永昌元年徙今地四隅各有門後廢令陳宗仁於西北驛道立其二曰望台曰朝京寧海縣志明嘉靖壬子知縣林大梁重築延袤一千五百四十一丈高二丈四尺廣一丈八尺城有四門東曰靖海南曰迎薰西曰登台北曰拱宸又西北設小北門萬歷辛卯秋霖城圯知縣曹學程重修舊浙江通志境內舊有健跳所城今改設臺寨太平縣城池台州府志周四百七十七步明成化五年割黃巖地置縣嘉靖三十一年築城城門六東曰迎輝南曰觀海西曰延照北曰仰山西南為小南門西北為小西門水門二西為上水洞東為下水洞國朝順治十五年知縣王道鵬重修康熙十二年知縣郭治增置窩鋪境內舊有松門衛等城今改設臺寨金華府金華府城池金華縣附郭萬厯金華府志舊周九里一百步高一丈五尺厚二丈八尺宋宣和四年知州范之才重築周十里基三丈面廣三之一高倍之元至正間詔天下隳城防於是羅城盡隳至正十二年亷訪副使拜扎納等仍其故址重築厚二尋有四尺高二尋有二尺周一萬七千七百九十尺城舊有門十一後窒其四今存門七東曰赤松舊名梅花西曰迎恩舊名蘭溪乂曰朝天南曰清波舊名柴埠長仙舊名水門通逺舊名望門八詠舊名元暢北曰旌孝舊名義烏作按舊浙江通志門八北又有天皇歲久圮萬厯三年知府黃公焯繕修完固而防守加密焉黃潛修金華府城記婺在吳為東陽郡在梁為金華郡隋肇置婺州國朝即州建路設總管府而郡城之創始靡得而詳圖志載宋宣和四年知州事范之才重築逮今二百有三十年圯壞勿葺非一日矣於是行中書省用江東浙西列郡之請俾治其故城而新之下其事於帥閫令郡府相其便宜而講行修築之政焉總管太中陳侯巴延布哈亟謀興作僉事特們德爾奉議公適至交贊其議爰頒其役於州縣州縣之長吏各率所部之民來聽要束資糧既具匠傭既集乃揆日以建事大家則量地而賦之中産則輸財而佐費牆落屛蔽次第就緒然外壕湮塞城已高而池未深也由是籍向之役所不及者使出錢為僦直募間民來即工而官給其食推求故道疏鑿而濬條之城之綿亘悉仍其故址以今昔之度凖之俱有加於舊縝壯雄峻則昔之所無也亡門並啓扄鍵如式而西北二門皆環以甕城甃石為路纍甓為堞屋於門觀之上者七以謹候望屋於雉堞之間者三十有六以嚴徼巡其南因大溪以為險北東西三面壕之跨以三弔橋遏以三石壩壤高水絶則列樹七星樁以防其空郗屋於壕塹之旁者三十有六而棲戌卒於其中凡城之役起至正十二年春閏三月己亥訖其年七月乙酉壕之役起是年冬十月丁卯迄明年夏五月甲申畢工舊浙江通志雉堞凡二千四百五十有四敵臺十五國朝順治十四年重修康熙年間大雨城壞郡守張藎復增繕之雍正七年正月總督臣李衛欽奉上諭檄縣重修蘭溪縣城池萬厯金華府志舊城周二里三百二十三步高一丈五尺其門有四東曰上門西曰溪門南曰迎麾北曰北門城修於洪武戊戍之歲而改其東門為安政南為明德西為清波北為拱辰周七百八十餘丈至乙巳夏城圮同知冀權總修繕之役又闢小西門以便出入厥後屢遭洪水城西南二隅與城外之市皆沒焉正統時按察使司僉事陶成欲議修築而無址可城乃伐木為柵以補西南二隅之缺東北二隅則因其舊舊浙江通志正德癸酉年守土者尋本城舊迹盡出民所侵砌石為陡岸上為女牆又改創南西北城樓東陽縣城池萬歷金華府志舊有土城周十里中為子城歲久而圯嘉靖戊午知縣戴廷忞始築石城厚二丈高二丈四尺周一千三百三十五丈建門四東曰迎陽南曰雙峴西曰瞻婺北曰通江隆慶元年知縣陳應春修之改東門為望峴西為朝京南為迎薰北為拱辰東陽縣志隆慶二年署事同知蔣夢龍修知縣鄭準繼之萬厯二十年暨二十四年再修二十八年署事推官劉文卿增修天啓二年知縣貢修齡修崇禎十六年知縣姚孫斐修國朝順治十四年知縣楊丕孟易舊堞式方之計共九百九十七垜長一丈二尺高六尺康熙十三年知縣胡啓甲增葺二十年知縣俞允撰重修義烏縣城池萬厯金華府志舊城周三里一十五步建門五東曰東陽西曰金華南曰繡川北曰會稽東北曰金麟歲久圮嘉靖三十四年知縣曹司賢築石門四東曰金鱗南曰南薰西曰迎恩北曰湖清又建槐花門於東北義烏縣志崇禎十一年知縣熊人霖廓建更築敵樓國朝康熙三年知縣孫家棟葺十四年知縣辛國隆修三十年知縣王廷曾增修永康縣城池萬厯金華府志舊城吳赤烏八年築周一里十九步高一丈八尺厚一丈五尺宋紹興間周三里三十步門七元初隳至正十三年環以牆後圮惟北倚山南阻水以為固焉永康縣志明崇禎十二年知縣朱露創建東西二門疊石為樓東曰在德西曰多助武義縣城池萬厯金華府志舊城周一里一百八十步宋紹興間廢門有七東曰八素曰東郭西曰書臺南曰仙巖北曰仰星東南曰緑野曰熟溪武義縣志崇禎十三年知縣馮玶重築周十里八步門九東曰鎮東南曰來逺又上南曰文興西曰接龍北曰迎恩又小門四浦江縣城池萬厯金華府志舊城已圯嘉靖三十六年知縣許河築周五里一百二十步建門四東曰迎春西曰文昌南曰文明北曰仙華舊浙江通志偏門五小東小西小南小北又水門瞿景淳浦江縣築城記巡撫都御史桐城阮公鶚移檄郡邑有城垣未備守禦以時興築金華府屬邑浦江令許河至集父老詢利病具由申達自總督撫按暨守巡罔不俞許子乃躬履山川審方面察形勢計厚薄仭高卑定議城制為若干丈有竒均派一邑每丈配丁糧若干官給文慿對户照支俾民共募工堅築仍為之期未及期而傾圯者罰更築令既出民咸趨工始於丙辰十月某日越戊午某月日告成城凡四門各冠以樓詰盜有廳巡軍有鋪條列馬路各從其方啓閉有時出入有節邑居既壯人情大安浦江縣志萬厯三十八年推官洪日觀申議恢拓北城明年知縣莊起元成之崇禎十一年知縣吳應台重建城垜門樓十二年攝縣事義烏令熊人霖繕修城堞湯溪縣城池萬厯金華府志成化十六年新築土城周八百五十五丈湯溪縣志城周三里許高二丈厚一丈築以土覆以瓦計八百五十五堵每圖額管十堵歲責修葺至嘉靖三十二年知縣劉以貞立石為定式焉城東門曰迎旭西門曰通衢南門曰履華北郭阻山不通衢路故不闢門尋圯崇禎十二年知縣羅洪基請造城樓并砌垜頭高四尺計八十六堵衢州府衢州府城池西安縣附郭嘉靖衢州府志宋宣和三年方臘陷衢州知州高至臨始城龜峰高一丈六尺五寸廣一丈一尺周回四千五十步為門六東曰迎和南曰禮賢西曰航遠北曰永清小南曰清輝小西曰和豐門之上各建樓城之外三面浚壕西阻溪紹興十四年大水城圯郡守林待聘修築嘉定三年又圯