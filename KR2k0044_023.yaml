劉琦重築萬厯十六年邑令章有成重修瑞安縣志周六百三十二丈高二丈五尺面闊一丈址闊一丈四尺廣一百三十八丈二尺袤一百三十七丈五尺城門四座水門一座敵門十二座窩鋪二十二座東壕長一百五十六丈闊三丈深七尺西壕同南壕長一百六十六丈闊深並國朝同東壕寨改沙園梅頭寨城溫州府志在瑞安縣五都後岡明嘉靖三十八年知縣余世儒築萬厯溫州府志萬厯間邑今章有成修瑞安縣志周四百丈高一丈五尺門樓五座水門樓二座窩鋪十二座巡檢司城瑞安縣志宋屬管界巡尉至元設巡檢司明洪武初建於崇泰鄉梅頭二十年遷築於清泉鄉東山江口周一百五十五丈高二丈城門一座嘉靖丙寅朱霑修築增高四尺國朝順治十八年遷棄界外城圯康熙九年展復拓土修築泰順縣城池萬厯溫州府志泰順舊無城嘉靖六年礦寇起九年知府丁瓚議發官銀五千餘兩委同知高美總其事典史鄧鏐董其役未幾知府趙錦以代至又給銀八百九十兩有竒竟成之北跨鳯凰山南跨霞陽山東北西南皆平地周三里計九百餘丈馬路基廣二丈二尺高二丈三十八年十月邑令區益增高七尺厚一丈八尺垜子八百仍放南城長九十丈城門四東曰宣陽舊名通瑞南曰迎薰舊名通福西曰受成舊名永安北曰拱辰舊名拱恩水門二城外池深三尺廣六尺內池深二尺廣三尺敵臺在霞陽山外萬厯二十年邑令林繼志築周二十餘丈高二丈八尺國朝順治六年閩寇圍城參將王曉力戰却之遂於四門外各築月城一區康熙十年知縣林天禎增置樓櫓水柵處州府處州府城池麗水縣附郭栝蒼彚紀城高三丈有五周七百九十二丈為門六北曰望京東曰巖泉東南曰行春南曰南明西南曰栝蒼西北曰通惠城樓六所每所三楹雉堞三千有六守舍六十有九官廳六處月城四區望樓二所敵樓四所初府城在今城東七里唐中和間盜盧約竊據是州徙今地舊浙江通志相傳約之將徙也訪之三平和尚云黃牛臥處好安州遣人視之適有黃牛寢乃遷之宋宣和間重修黃裳修城記栝蒼依山為城慿帶岡阜傍大溪險固而難攻惟東南一面形勢稍緩下接平陸有警得專力於一隅要而易守詢之故老或云僭偽時盧約所築皇宋受命吳越納土民間不見兵戈垂二百年東南城池因仍頽廢宣和庚子盜發青溪一時羣惡嘯聚遂至猖獗攻破杭嚴徽三郡明年遂陷衢婺惟處最後失守麗水松陽遂昌青田縉雲皆沒於賊而劍川獨完制詔守臣浦城黃公即劍川治事以須具平公間關赴難與通守會稽石公夙夜究心奉宣威令翦滅強梗招攜善良千里之間不戰而屈八月辛亥賊將洪載以城降又明年境上殘黨悉除乃察其流離者還定之自夏徂冬雨暘不愆歲復小稔官府日益無事先是有旨東南被賊州郡城壁不完其議修築以間公乃環城按視面勢高下以工築之繁簡地理之遠近嚴責屬官分而董之起仲秋己亥訖於季冬壬申用夫四萬四千用錢二百四十有五萬斂不及民役不淹時當干戈乍息而與後人長慮却顧之方兹其所以可書也至元二十七年處州路總管沃哷好古萬户舒穆嚕良輔創議修築因舊址之半委麗水縣尹韓國寶督役東北掘地為池因土為城南以溪為池壅隄為城西就山為城並溪為池嘉靖四十二年知府張大韶重修包以采石頗稱堅緻壕隍正北望京門外為郡來龍中隆起入城處一線不鑿立石知府宅內以志所重在此東偏直下繞巖泉門至行春門抵外教場築壩而止西偏直下繞通惠門至西山下而止西南阻高山南阻大溪各自為險故皆無壕焉舊浙江通志崇禎八年五月大水城垣衝塌守朱葵修國朝順治十五年增築青田縣城池栝蒼彚紀城高二丈八尺厚二丈表以四門東曰龍津西曰錦屏南曰行春北曰丹山嘉靖三十五年縣丞熊纓築三十八年知縣丁一中改築城門黃巾改城門記青田栝東咽喉地也舊無郭丙辰四月倭自永嘉突犯沙埠青以西數百里咸恐恐然懼邑少尹長汀熊君用諸生鄉老議以築城請之大巡邢臺趙公下其議於府既而大尹吉水李侯楷歸自覲鳩材庀役計里分築閲十月城成大都因山之形四履有門唯龍津丹山二門其地稍下門之外山高聳俯瞰城中矢石可及時欲改作未遑戊午夏倭復來果薄兩門陟山窺我動靜設雲樓長梯攻擊七晝夜乃解明年李侯調去丁侯一中來代甫下車周閲城垣議改二門乃出俸金若干為之倡而僚屬鄉大夫士及民商咸樂助之遂移築丹山門於龜山之麓而城因之約九十餘丈增築龍津門於學宫之北約六十餘丈五閲月而工告竣青田縣志萬厯三十七年八月大水城壞三十九年知縣方淡然改修天啓三年大水城壞崇禎五年知縣翟士傑縣丞胡中龍修國朝康熙二十年五月大水城壞門樓圮六月知縣張皇輔捐俸修葺如故前臨大溪為池後負丹山左以龍門橋水為池右以永濟橋水為池縉雲縣城栝蒼彚紀無城有關門三東曰東門南曰南門北曰北門處州府志明成化十五年縣令楊盛以北門一路多盜申文築城防守雲塘居民李資遠李中孚等願代輸工費築城長二十餘丈高三丈厚二丈五尺上建城樓九間以便防禦二十年縣令劉竑給帖與資遠等子孫免其雜役嘉靖十年中孚以子貴受封自此城屋皆雲塘修理松陽縣城栝蒼彚紀關門四東曰光華南曰濟川西曰治平兆曰朝天松陽縣志治平今曰金屏朝天今曰鳯臻遂安縣城栝蒼彚紀關門四東曰迎恩南曰南明西曰鎮西北曰朝天舊浙江通志萬厯丁未令辜志會重修龍泉縣城栝蒼彚紀關門四東曰觀光南曰通越西曰奉真北曰豐盈龍泉縣志觀光門一名朝京門正德間知縣曹倚相築知縣夏舜臣改為寅旭門奉真門在治西四里改為登成門通越門在治南三里改為廣惠門豐盈門在治北三里改為望宸門慶元縣城池栝蒼彚紀城高一丈三尺厚一丈四門東曰仁豐南曰濟川西曰薰阜北曰雲龍嘉靖二十五年知縣陳澤始築陳桓修城記慶元雖小邑地界閩浙之間其利害當東南之半平川陳先生甲辰涖於兹乙巳春首翦劇黨再滅餘燼一方為安先生曰賊平一時幸耳然匪城則衆罔與守非備則賊罔知懼盍城諸而以土兵備之乎乃聞諸當道以其事下諸郡先生乃以廢寺貿價售力為之不三月而成樓堞門鍵延袤相屬仍籍土兵犀鋭者更番守衛由是隱然壯一方之勢而閩浙釁孽之端從此迸息矣慶元縣志東北中建望京臺順治五年燬西北界知縣張應亮從民請增開小水門名曰太平西南倚山西北臨河東南鑿池廣二丈深一丈東流至北與大溪水合嘉靖四十一年署縣事通判周紳改築西城於西山之巔計六十餘丈高一丈八尺厚一丈五尺萬厯十六年四月蜃水夜發衝壞北城七十三丈知縣詹乘龍重築崇禎十五年知縣楊芝瑞重修環增磚垜三尺建城樓五順治五年燬其四窩鋪一十二東南敵樓各一國朝康熙七年知縣程維伊重建城樓四十一年再建望京臺雲和縣城栝蒼彚紀關門二東曰賔暘西曰阜民雲和縣志嘉靖壬午知縣胡希詮始設東關西關門樓各三間國朝康熙二十七年知縣林汪逺設東西二城門宣平縣城栝蒼彚紀關門四東曰麗春南曰迎恩西曰太平北曰拱北景寧縣城栝蒼彚紀關門四東曰行春南曰統政西曰育秀北曰拱辰玉環山屬溫台二府玉環城太平縣志玉環古城在玉環海島上與楚門隔港明一統志玉環山在樂清縣東南二百里海中山北有楚門峽海艘由此出入明洪武二十年徙緣海居民於腹裏遂墟國朝雍正五年浙江總督管巡撫事臣李衛題請展復戶部議覆奉旨依議遂檄司查議興建城垣動支玉環糧稅出息銀兩飭令溫台玉環清軍餉捕同知張坦熊辦料興工因玉環東則海塗淤陷西則峻嶺﨑嶇城工石料轉運為艱雍正八年七月雷雨滂沛於洋塘陡門之外衝開河道一條直通後浦口載石巨舟悉從是河徑達城下不數月而巨工畢竣浙江通志卷二十四
