body:
  text: 浙江通志卷六十八田賦二嘉興府嘉興縣實在田捌千肆拾㭍頃伍拾一畝叄分一釐陸毫徵銀㭍萬一千玖百㭍拾兩二分㭍毫肆絲陸忽陸微玖塵陸渺捌埃徵米一拾一萬叄千陸百一拾二石㭍斗陸合叄抄玖撮捌圭二粟陸粒捌黍四鎮倉基等田陸拾一畝肆分二釐玖毫例不起科實在地陸百陸拾捌頃玖拾畝㭍分一釐玖毫徵銀伍千㭍百玖拾叄兩二錢一分叄釐肆毫捌絲㭍微叄塵二漠徵米玖千叄百伍拾二石捌斗伍升陸合叄勺二抄一撮叄圭㭍粟伍粒伍黍玖粞玖粳叄粃實在山捌拾捌畝肆分叄毫徵銀一錢玖分陸釐肆毫肆絲叄微陸渺叄漠徴米肆石叄斗陸升玖合玖勺叄抄㭍撮玖粟陸粒實在蕩灘㭍拾頃伍拾捌畝伍分二釐伍毫徵銀㭍兩肆錢一分㭍釐肆毫二絲一忽㭍微叄渺肆漠陸埃伍纖叄沙徵米叄百肆拾捌石肆斗肆升一合玖勺一抄捌撮叄圭二粟二粒捌黍一粞叄粳伍粃以上共額徵銀㭍萬㭍千㭍百㭍拾兩捌錢肆分捌釐捌絲玖忽肆微叄塵陸渺肆埃伍纖叄沙遇閏加銀一千叄百捌拾㭍兩玖錢捌分玖釐二毫二絲伍忽㭍微二塵一渺㭍漠二埃玖纖陸沙共額徵米一拾二萬叄千叄百一拾捌石叄斗㭍升肆合二勺一抄陸撮陸圭二粟一粒二黍一粞二粳捌粃遇閏加米一百捌拾石肆斗秀水縣實在田伍千㭍百肆拾肆頃肆拾伍畝叄分肆釐捌毫伍絲徵銀陸萬一百伍拾一兩二錢一分二釐伍毫二微㭍塵陸渺二漠伍埃徵米玖萬伍千肆百肆拾石二斗陸升伍合㭍勺陸抄叄撮叄圭陸粟捌粒二黍叄粞四鎮常平社倉兵營書院漏澤園共田一頃玖拾叄畝㭍分陸釐例不起科實在地肆百伍拾頃玖拾二畝二分二釐玖毫徵銀肆千陸百二拾二兩一錢肆分玖釐二毫陸絲捌忽二微叄塵捌渺玖漠陸埃徵米㭍千陸拾㭍石叄斗肆合㭍勺陸抄肆撮一圭叄黍義塜地叄畝例不起科實在蕩灘二百伍拾一頃陸拾畝肆分叄釐一毫陸絲徵銀二拾玖兩陸釐伍毫陸絲㭍忽叄微伍渺伍漠二埃肆纖徵米一千二百玖石陸斗玖升玖合捌勺捌抄二撮陸粟叄粒一黍㭍粞告豁無徵虛蕩一頃陸拾㭍畝陸分㭍毫例不起科以上共額徵銀陸萬肆千捌百二兩叄錢陸分捌釐叄毫叄絲伍忽捌微二塵㭍漠叄埃肆纎遇閏加銀玖百陸兩二錢㭍分陸釐捌毫叄絲肆忽一微陸塵二渺一漠捌埃二沙共額徵米一拾萬叄千㭍百一拾㭍石二斗㭍升肆勺玖撮伍圭叄粟一粒㭍黍嘉善縣實在田伍千玖百肆頃㭍拾二畝伍分一釐㭍毫徵銀陸萬伍千二百陸拾叄兩陸錢玖分玖釐一毫二絲一忽一微㭍塵肆渺陸漠肆埃徵米一拾一萬肆千㭍百一石二斗一升捌合叄勺陸抄二撮一圭二粟陸粒一黍實在地一百捌頃捌拾肆畝捌分叄釐伍毫徵銀一千一百玖拾兩叄分一釐叄毫玖絲一忽一微陸塵伍渺伍漠徵米二千一百一拾叄石捌斗捌升二抄二圭一粟陸粒玖黍實在涇濱蕩二百伍拾陸頃伍拾陸畝㭍分二毫徵銀二拾兩陸錢肆分捌釐伍毫叄絲㭍忽二微伍塵肆渺陸漠陸埃伍纎徵米一千叄百一拾陸石玖斗玖升㭍合陸勺㭍抄捌撮㭍圭捌粟肆粒㭍黍伍粞以上共額徵銀陸萬陸千肆百㭍拾肆兩叄錢㭍分玖釐肆絲玖忽伍微玖塵肆渺捌漠伍纎遇閏加銀捌百捌拾㭍兩肆錢一分二釐㭍毫㭍絲㭍忽伍微伍塵陸渺肆漠一埃二沙共額徵米一拾一萬捌千一百叄拾二石玖升陸合陸抄一撮一圭二粟㭍粒㭍黍伍粞遇閏加米㭍拾肆石捌斗海鹽縣實在田伍千二百肆拾捌頃一拾陸畝捌分叄釐㭍毫伍絲徵銀肆萬二千陸百玖拾陸兩肆錢伍釐伍毫捌絲捌忽陸微二塵叄渺陸漠二埃伍纎徵米伍萬陸千陸百㭍拾一石伍斗玖升一合伍勺玖抄叄撮玖圭陸粟玖粒伍粞實在地㭍百伍拾玖頃肆拾肆畝叄分捌釐二毫伍絲肆忽徵銀伍千㭍百捌拾肆兩二錢玖釐㭍毫二絲伍忽一微二塵肆渺㭍漠伍埃肆沙徵米捌千伍拾石二升叄合陸勺陸抄㭍撮肆圭陸粟一粒肆黍二粞實在山一百㭍拾伍頃玖拾叄畝二釐玖毫玖絲叄忽徵銀肆拾㭍兩一錢一分玖釐伍毫捌絲㭍忽玖微玖塵一渺捌漠一埃捌纎叄沙徵米玖百一拾叄石二斗玖升一合一勺二抄玖撮二粟玖粒一黍伍粞叄粳實在蕩灘濱地漊水面一百陸拾二頃叄拾伍畝一分肆釐捌絲叄忽徵銀二拾伍兩玖錢肆分捌釐㭍毫捌絲㭍忽玖微叄塵玖渺玖漠玖埃㭍纎叄沙徵米捌百肆拾二石捌斗二升二合㭍勺玖抄㭍撮肆圭叄粟捌粒肆粞叄粳以上共額徵銀肆萬捌千伍百伍拾叄兩陸錢捌分叄釐陸毫捌絲玖忽陸微捌塵一漠玖埃一纎遇閏加銀伍百玖拾玖兩二錢二分㭍釐玖毫玖絲伍忽㭍微一渺叄漠伍埃捌纎共額徵米陸萬陸千肆百㭍拾㭍石㭍斗二升玖合一勺捌抄㭍撮捌圭玖粟㭍粒陸黍陸粞陸粳遇閏加米叄拾一石二斗石門縣實在田二千玖百二拾㭍頃捌畝伍分陸釐肆毫徵銀二萬陸千一百一拾肆兩玖錢捌分肆釐伍毫二絲一忽捌微一渺陸漠一埃伍纎叄沙徵米叄萬陸千二百㭍拾一石叄升伍合一勺闕抄二撮伍圭肆粟伍粒㭍黍一粞一枇實在地二千陸拾玖頃一拾捌畝玖分伍釐玖毫㭍絲徵銀一萬捌千二百叄拾捌兩玖錢玖分伍釐陸毫叄絲一忽陸微㭍塵捌渺玖漠叄埃肆纎肆沙徵米二萬伍千伍百捌拾伍石㭍斗捌升二合叄勺一抄肆撮玖粟捌粒一黍二粞玖粃實在蕩灘二拾伍頃玖畝捌分肆釐肆毫徵銀肆拾二兩二錢㭍分二釐玖毫玖絲伍忽一微伍塵玖渺二漠㭍埃叄纎㭍沙徵米一百叄拾伍石一斗肆升玖合二勺一撮玖圭玖粟二粒叄黍捌粞肆粳以上共額徵銀肆萬肆千叄百玖拾陸兩二錢伍分叄釐一毫肆絲捌忽陸微叄塵玖渺捌漠二埃叄纎肆沙遇閏加銀玖百一拾捌兩捌分陸釐伍毫叄絲二忽肆微二塵一渺伍漠叄埃捌纎二沙共額徵米陸萬一千玖百玖拾一石玖斗陸升陸合陸勺叄抄捌撮陸圭叄粟陸粒二黍一粞伍粳平湖縣實在田肆千肆百肆拾二頃㭍拾陸畝肆分叄釐㭍毫徵銀肆萬肆千伍百玖拾一兩㭍錢肆分一釐伍毫二絲陸忽伍微一塵玖渺捌漠一埃徵米陸萬二千伍百叄拾石㭍斗㭍合陸勺叄抄伍撮㭍圭玖粟叄粒肆黍實在地捌百二拾陸頃㭍拾陸畝肆分捌毫捌絲徵銀肆千二百玖拾捌兩叄錢捌分㭍釐捌毫㭍絲叄忽陸微玖塵捌漠肆埃肆纎徵米陸千叄百㭍拾捌石二斗陸升一合叄勺陸抄伍撮一圭㭍粟㭍粒捌黍實在山蕩玖拾陸頃叄拾捌畝捌分肆釐一毫徵銀一百玖拾㭍兩㭍錢二分伍釐伍毫肆絲叄忽捌塵叄渺肆漠伍埃徵米叄百肆拾一石捌斗陸升玖合一勺肆抄陸撮玖圭一粟捌粒㭍黍以上共額徵銀肆萬玖千捌拾㭍兩捌錢伍分肆釐玖毫肆絲叄忽二微玖塵肆渺一漠肆纎遇閏加銀陸百肆拾玖兩一錢一分㭍釐伍毫陸絲㭍忽伍微捌塵玖渺捌漠㭍埃一纖陸沙共額徵米陸萬玖千二百伍拾石捌斗叄升捌合一勺肆抄㭍撮捌圭捌粟玖粒玖黍桐鄉縣實在田肆千叄百玖頃㭍拾捌畝伍分二釐肆毫徵銀叄萬叄千陸拾㭍兩捌錢㭍分肆釐伍毫叄絲一忽㭍微一塵叄渺叄漠二埃徵米肆萬叄千玖百伍拾二石肆斗㭍升肆合一勺一抄伍撮伍圭玖粟二粒實在地捌百捌拾二頃㭍畝一分叄釐陸毫叄絲二忽徵銀陸千伍百二拾玖兩㭍錢肆分㭍釐陸毫玖忽肆微二塵玖渺二漠伍埃陸沙徵米捌千玖百玖拾伍石陸斗二升捌合叄勺捌抄叄撮叄圭二粟二粒伍黍陸粞義塜地伍拾玖畝捌分伍釐一毫例不起科實在山叄頃㭍拾玖畝㭍分叄釐徵銀㭍錢二分肆釐捌毫陸絲陸忽伍微玖塵㭍渺徵米二拾石肆斗陸升捌合玖勺陸抄伍撮玖圭二粟實在蕩一拾二頃一拾肆畝㭍分叄釐㭍絲徵銀玖錢㭍釐肆毫叄忽捌微叄塵二渺玖漠徵米陸拾伍石玖斗伍升捌合陸勺陸抄二撮二圭㭍粟玖粒叄黍蕩地一頃二拾㭍畝伍分玖釐陸毫徵銀玖分伍釐叄毫一絲肆忽二微一塵二渺徵米㭍石肆升捌合玖勺一抄叄撮肆圭二粟肆粒義塜草蕩肆畝例不起科以上共額徵銀叄萬玖千伍百玖拾玖兩叄錢肆分玖釐㭍毫二絲伍忽㭍微捌塵肆渺肆漠㭍埃㭍纎陸沙遇閏加銀陸百玖拾㭍兩㭍錢肆分㭍釐一毫叄絲一忽一微一塵叄渺肆漠捌埃陸纎肆沙共額徵米伍萬叄千肆拾一石伍斗㭍升玖合肆抄伍圭叄粟㭍粒捌黍陸粞嘉興所屯田一百一拾頃陸畝徵銀二千陸拾伍兩陸錢捌分肆釐二毫陸絲陸忽通計嘉興府屬七縣并嘉興所田地山蕩等項共肆萬叄千伍百陸拾二頃二拾二畝捌分叄釐伍毫肆絲二忽其原徵銀兩於雍正六年奉特恩減免肆萬叄千陸百一拾一兩肆錢叄分陸釐伍毫叄絲陸忽玖微㭍塵二渺㭍漠一埃伍沙今共應徵銀叄拾玖萬二千㭍百伍拾兩肆錢二分一釐二毫肆絲捌忽二微伍塵一漠捌埃叄沙外加收零積餘米改徵銀二百陸拾玖兩一錢捌分一毫二絲二忽玖塵陸渺陸漠二埃叄纎伍沙孤貧口糧米改徵銀叄千㭍百伍拾一兩玖錢二分蠟茶折色加價銀一百一拾伍兩二分伍釐玖毫伍忽叄微伍塵匠班銀一千肆百玖拾兩玖錢捌分叄釐叄毫肆絲肆忽外賦不入地丁科徵銀一千玖拾兩伍錢㭍分肆釐㭍毫二絲一微玖塵肆渺叄漠伍埃捌纎捌沙通共實徵銀叄拾玖萬玖千肆百陸拾捌兩一錢伍釐叄毫叄絲玖忽捌微玖塵一渺一漠陸埃二纎陸沙遇閏加銀陸千肆拾伍兩捌錢伍分捌釐陸絲肆忽二微陸塵陸渺伍漠㭍埃肆纎二沙又外賦加閏銀捌拾伍兩肆錢肆分叄毫肆忽一微陸塵一渺二埃㭍纎二沙共徵米伍拾玖萬伍千玖百二拾玖石捌斗伍升叄合㭍勺二撮二圭肆粟二粒叄黍叄粳捌粃內除收零積餘米二百玖拾玖石捌升玖合二抄肆撮伍圭伍粟一粒捌黍叄粳捌粃孤貧口糧米肆千一百陸拾捌石捌斗通共實徵米伍拾玖萬一千肆百陸拾一石玖斗陸升肆合陸勺㭍抄㭍撮陸圭玖粟伍黍遇閏加米二百捌拾陸石肆斗明舊額洪武永樂年間田地無考玖嘉靖三十二年田地山蕩河灘等共二萬千一百㭍頃二拾二畝叄分陸釐有竒夏稅麥二萬㭍千陸百叄拾肆石一斗捌升玖合伍勺起運一萬㭍千捌百捌拾玖石伍斗一升餘存留秋糧米陸拾一萬捌千陸百一拾一石一升陸合㭍勺起運伍拾捌萬捌千玖百捌拾㭍石二斗玖升叄合有竒餘存留絲綿伍萬肆千捌百伍拾叄兩㭍錢有竒鈔一千叄百捌拾二錠二貫玖百陸拾文農桑絹陸百叄拾叄匹肆尺㭍寸有竒馬草伍拾萬陸千伍百二拾㭍包有竒起運肆拾捌萬㭍千二百一拾伍包餘存留鹽糧二萬一千闕㭍拾捌石陸斗伍升叄合有竒有閏加一千㭍百玖拾捌石二斗二升叄合有竒鹽鈔起運存留夲色鈔各二萬捌千二百㭍拾伍貫有閏加二千㭍百伍拾肆貫叄百㭍拾伍文折色錢各伍萬陸千伍百伍拾文有閏加伍千伍百捌文有竒課鈔一拾一萬二千陸拾錠㭍百陸拾叄文有閏加一萬叄千捌拾錠叄貫肆百陸拾文二萬厯三十八年田地山蕩河灘等共肆萬叄千百叄拾二頃玖拾捌畝玖分玖釐一毫叄絲科銀叄拾陸萬一千玖百兩陸錢二分一釐捌毫二絲陸忽捌微一塵肆渺內除優免銀一千玖百伍拾㭍兩捌錢玖分一釐肆毫實徵銀叄拾伍萬玖千玖百肆拾二兩㭍錢叄分肆毫二絲陸忽捌微一塵肆渺科米陸拾一萬㭍千捌百伍拾二石二斗陸升捌合一勺伍抄玖撮一圭㭍粟陸粒夏稅麥二萬㭍千陸百叄拾肆石一斗捌升玖合伍勺絲綿㭍萬叄百叄拾二兩伍分㭍釐租鈔一千叄百捌拾肆錠捌百伍拾玖文秋糧米陸拾一萬捌千陸百一拾一石一升陸合㭍勺馬草伍拾萬陸千伍百二拾㭍包玖斤一兩叄錢鹽糧米二萬一千伍百㭍拾捌石陸斗伍升叄合捌