  text: 浙江通志卷二百五十三經籍十三兩浙志乘分吳會丹陽三郡記二卷按唐書藝文志不著作者吳會須知一卷通志藝文略魏羽撰會稽土地記一卷隋書經籍志朱育撰作按唐書藝文志四卷會稽郡記晉孔曅撰會稽記一卷隋書經籍志賀循撰會稽記南史虞願傳願撰浙江總圖按文淵閣書目不著名氏兩浙路圖經九十五卷按通志藝文略不著名氏浙江通志七十二卷內閣書目嘉靖辛酉學憲薛應旗修浙江通志五十卷錢塘縣志康熙癸亥督府彚纂舊本杭州圖經按遂初堂書目不著名氏臨安志十五卷書録解題府帥吳興周淙彥廣撰首卷為行在所於宮闕殿閣全不記載其他沿革亦多疏略臨安志萬厯杭州府志淳祐中施愕撰臨安志一百卷朱彞尊臨安志跋咸淳四年知臨安軍府事處州潛説友君高輯杭州府志西湖遊覽志洪武初徐一夔著頗稱簡明今不傳矣杭州府志仁和縣志永樂間撰亡名氏杭州府志仁和縣志景泰間撰亡名氏杭州府志六十三卷西湖遊覽志成化十年夏時正重修紀事多缺略杭州府志一百卷內閣書目萬厯己卯郡人布政陳善修杭州府志四十卷康熙丁卯知府馬如龍修吳郡錢唐記宋劉道真撰文選注初學記太平御覽諸書引之錢塘縣志十卷萬厯己酉邑令聶心湯修錢塘續志二十六卷錢塘縣志梁允植撰遲炘繼修未刋行錢塘縣志三十六卷康熙戊戌知縣魏㟶修錢塘志補十卷邑人吳允嘉志上撰仁和圖經宋人撰姚寬西溪叢語多引之仁和縣舊志按文淵閣書目有之當是永樂間人撰仁和縣志云亡名氏仁和縣志十四卷嘉靖己酉邑人沈朝宣三吾撰盛端明序仁和縣志二十八卷康熙丙寅知縣趙世安修海昌圖經十卷嘉定二年括蒼潘景夔撰重修海昌圖經海寧縣志吳由著海寧縣志六卷蔡完海寧縣志序永樂戊戌前訓導曽昶修海寧縣志九卷內閣書目嘉靖丁巳邑令蔡完修海寧縣志邑令秦嘉系著未成書海寧縣志九卷黃氏書目董穀著海寧志補四卷萬厯杭州府志朱迪撰寧邑備考十卷海寧縣志教諭趙惟寰著海昌外志八卷海寧縣志談遷著海寧縣志十三卷康熙乙卯知縣許三禮修海寧衛乘十卷海鹽縣圖經宋士英茂含撰海寧衛志海鹽縣圖經王文祿撰富春志六卷內閣書目正統五年邑令吳堂允升修聶大年序重修富春志十二卷富陽縣志王之獻著富陽縣志十二卷康熙癸丑知縣牛奐修富陽縣志十卷康熙癸亥知縣錢晉錫修餘杭縣志成化間撰散軼不全餘杭縣志十卷嘉靖間邑令王確修餘杭縣志萬厯間邑令戴日強修餘杭縣志康熙初年知縣宋士吉撰餘杭縣志八卷康熙癸丑知縣張思齊修餘杭縣新志八卷康熙癸亥知縣龔嶸修臨安縣志八卷內閣書目嘉靖丙戌邑令廖瑜修臨安縣志四卷萬厯辛亥邑令黃鼎象修臨安縣志十卷康熙乙卯知縣陸文煥修於潛縣志五卷嘉靖庚子邑令汪奕修於潛縣志八卷康熙癸丑知縣趙之珩聘邑人章國佐何爾彬修新城志乾道間邑令耿秉修新城縣志景泰間邑人凌志文琬修新城縣志嘉靖己丑邑令袁澤修新城縣志嘉靖壬辰邑令聶瑩重修新城縣志四卷萬厯乙亥邑令溫朝祚聘吳中周天球修方廉序新城縣志八卷康熙癸丑知縣張瓚聘錢塘張戩邑人袁浣修昌化縣志九卷嘉靖間邑令馬逢伯聘邑人汪子卿修昌化縣志嘉靖間邑令華文甫命庠生戴儀校馬志修昌化縣志十卷萬厯壬辰邑令周洛都修許三省序昌化縣志十卷康熙癸丑知縣周頌孫聘邑人陳秉謙修嘉興圖經撰人無考𢎞治嘉興府志引之嘉禾志五卷郭晦至元嘉禾志序淳熙甲午郡守張元成延聞人伯紀修嘉禾志唐天麟至元嘉禾志序嘉定甲戌郡守嶽珂命鄉先輩關表卿栻編嘉禾志三十二卷至元甲申郡幕單慶委郡博士徐碩重修嘉興府志三十二卷𢎞治壬子郡守栁琰主修平湖教諭林光校正嘉興府志補三卷正德壬申郡守于鳯喈修郡人鄒衡編集嘉興府圖記二十卷嘉靖丁未郡守趙瀛聘慈溪趙文華修嘉禾徴獻録文華在事時聘名士為嘉興府圖記載郡中事甚詳知府趙瀛梓之因以為志嘉興府志遺稿萬厯間郡守龔勉聘郡人嚴從簡修未脫稿後郡守曹代蕭聘郡人黃洪憲修嘉興府志三十二卷萬厯庚戌郡守劉應鈳主修郡人沈堯中編纂嘉興府志十八卷康熙辛酉知府袁國梓修嘉興府志十六卷康熙辛丑知府吳永芳修三縣經界錯壤圖説秀水縣志嶽元聲撰嘉興縣志天啓甲子邑令湯齊聘邑人李日華沈德符屠中孚等修未成崇禎丁丑邑令羅炌聘邑人黃承昊續修嘉興縣志九卷康熙甲子知縣何志聘邑人王庭錢江修秀水縣志戴經撰莫詳年代萬厯嘉興府志秀水前未有志志自經始秀水縣志莫詳年代萬厯嘉興府志周顯宗撰秀水縣志十卷萬厯丙申邑令李培聘邑人黃洪憲修秀水縣志十卷康熙甲子知縣任之鼎主修教諭范正輅編輯嘉善縣志六卷正德丁丑邑丞倪璣偕邑人沈概髙廪郁衮蔣嶽修王鏊都穆序嘉善縣志嘉靖庚戌邑令于業聘邑人郁天民修嘉善縣志十二卷萬厯丙申邑令章士雅聘邑人盛唐袁黃修嘉善縣志十二卷康熙丁巳知縣楊廉纂修海鹽縣志四卷𢎞治庚戌教諭莆田陳暹纂修邑令龍泉談秀校刋海鹽縣志海鹽縣圖經朱酢著海鹽縣五志六卷嘉靖庚寅邑令夏浚聘邑人徐泰修海鹽縣近志萬厯嘉興府志署縣事推官張瑀修仇俊卿纂海鹽縣圖經十六卷天啓壬戌邑令樊維城聘邑人胡震亨姚士粦等修語溪志十卷淳祐辛亥邑令黃元直延邑士錢逹善朱鵬飛修陳塏序崇德志五卷正德丁丑邑令洪異聘蘭溪董遵修崇德志隆慶間邑令朱潤修崇德志萬厯辛巳邑令陳履聘邑人胡其久修崇德志十二卷萬厯辛亥邑令靳一派修石門縣志十二卷康熙癸丑知縣杜森創稿丁巳知縣鄜世培