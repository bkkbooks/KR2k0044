body:
  text: 浙江通志卷八建置五嚴州府通典春秋時屬吳後屬越又屬楚青類天文分野之書秦屬會稽為鄣郡之地謹按通典云秦為鄣郡地蓋以新安新定等為鄣郡地耳考秦三十六郡鄣與會稽共治揚州之境是時新定未有所分逮孫稽置新都郡後隋唐漸以吳郡餘杭之屬縣來𨽻是新定實處鄣與會稽之間非獨為鄣郡之地也清類天文分野之書漢屬會稽及丹陽郡清類天文分野之書後漢屬吳郡及丹陽郡謹按通典云漢為丹陽郡地後漢以後並屬吳郡考漢書地理志富春屬會稽郡歙屬丹陽郡後漢書郡國志富春屬吳郡歙屬丹陽郡建德桐廬新昌于富春縣分置始新新定于歙縣分置分水又於桐廬分置是在前漢時屬會稽及丹陽二郡後漢屬吳郡及丹陽郡無疑矣三國吳志建安十三年權使賀齊討黟歙分歙為始新新定犁陽休陽縣以六縣為新都郡太平寰宇記新都郡理始新縣屬揚州清類天文分野之書三國吳立建德桐廬新昌三縣屬吳郡晉書地理志吳郡統縣富陽桐廬建德夀昌元和郡縣志吳新昌晉太康元年改夀昌嚴陵志晉太康元年改郡曰新安改新定縣曰遂安謹按晉新安郡統縣六而在今之嚴州府者惟始新遂安二縣宋南齊皆同清類天文分野之書梁普通二年改夀昌屬新安郡隋書地理志新安郡平陳廢為新安縣遂安桐廬廢又廢建德入吳寧縣仁夀三年置睦州遂安桐廬復嚴陵志併夀昌入新安謹按開皇中置歙州統休寧歙黟三縣仁夀中置睦州統新安遂安桐廬三縣于是二州之縣各有分屬不復混雜矣隋書地理志大業初改新安名雉山置遂安郡隋書地理志遂安郡統縣雉山桐廬遂安舊唐書地理志武德四年改為睦州領雉山遂安二縣太平寰宇記武德四年置分水縣復置建德縣舊唐書地理志桐廬武德四年于縣置嚴州領桐廬分水建德三縣七年廢州及分水建德二縣以桐廬屬睦州謹按武德七年又改為東睦州八年去東字文獻通考睦州唐屬江南道唐書地理志建德永淳二年復置雉山文眀元年曰新安夀昌永昌元年析雉山置載初元年省分水如意元年復置更名武盛神龍元年復故名夀昌復置太平寰宇記開元二十年改新安為還淳縣通志地理略開元十道圖睦州江南東道清類天文分野之書天寶元年改新安郡乾元元年復為睦州唐書地理志青溪永貞元年還淳更名唐書方鎮表𨽻浙江東道節度謹按開元二十一年睦州𨽻江南東道至是乃𨽻浙江東道節度又考唐書地理表貞元中浙江西道觀察亦領睦州唐書地理志睦州新定郡上縣六建德青溪夀昌桐廬分水遂安清類天文分野之書光化三年錢氏以桐廬屬杭州十國春秋吳越睦州領縣五建德夀昌遂安分水青溪宋史地理志太平興國二年桐廬來𨽻文獻通考睦州為遂安軍節度宋史地理志宣和元年升建德軍節度清類天文分野之書宣和三年改睦州曰嚴州青溪縣曰淳化宋史地理志兩浙路嚴州續文獻通考紹興中淳化縣始名淳安文獻通考嚴州屬浙西路宋史地理志建德軍咸淳元年升府縣六建德淳安桐廬分水遂安夀昌元史地理志至元十三年改建德府安撫司十四年改建德路元史地理志江浙等處行中書省為路建德元史地理志江南浙西道肅政亷訪司建德路元史地理志建德路上領縣六建德淳安遂安桐廬分水夀昌續文獻通考眀初改建安府尋改嚴州府眀實録移置浙江行省於嚴州萬厯嚴州府志洪武八年罷中書省眀一統志浙江等處承宣布政使司領嚴州府續文獻通考嚴州府領建德淳安桐廬遂安夀昌分水六縣國朝定為嚴州府屬浙江布政使司領縣六建德淳安桐廬遂安夀昌分水建德縣通典漢富春縣地太平寰宇記吳黃武四年分富春地置建德縣屬吳郡謹按晉宋齊並因之清類天文分野之書梁分屬東陽郡謹按通典梁陳置金華郡隋平陳置婺州大業初州省置東陽郡則建德在梁陳時當云屬金華郡隋書地理志長山廢建德入改為吳寧縣清類天文分野之書唐武德四年置建德屬嚴州唐書地理志武德七年省入桐廬雉山永淳二年復置唐書地理志睦州新定郡建德上十國春秋吳越睦州領縣建德宋史地理志建德府縣建德望元史地理志建德路領縣建德中倚郭舊浙江通志眀建德縣屬建安府尋屬嚴州府國朝建德縣屬嚴州府附郭編户八十六里淳安縣舊唐書地理志漢歙縣地屬丹陽郡謹按建安中孫氏以葉鄉為始新縣立新都郡于始新清類天文分野之書晉為新安郡謹按宋齊梁陳並因之嚴陵志隋開皇九年平陳廢郡為新安縣大業初改曰雉山隋書地理志遂安郡統縣雉山舊唐書地理志文眀元年復為新安開元二十年改還淳永貞元年避憲宗名改為青溪唐書地理志睦州新定郡青溪上十國春秋吳越睦州領縣青溪宋史地理志宣和初改淳化嚴陵志平方臘改曰淳化南渡後改今名宋史地理志建德府淳安望元史地理志建德路領縣淳安中舊浙江通志眀淳安縣屬建安府尋屬嚴州府國朝淳安縣屬嚴州府編户六十一里桐廬縣元和郡縣志本漢富春縣之桐溪鄉宋書州郡志吳分富春立桐廬元和郡縣志黃武四年分置桐廬縣以居桐溪地因名桐廬晉書地理志吳郡統縣桐廬宋書州郡志吳郡太守領桐廬謹按齊梁陳並仍舊名勝志隋開皇中併入錢唐隋書地理志桐廬仁夀中復謹按仁夀中桐廬屬睦州大業初屬遂安郡舊唐書地理志武德四年於縣置嚴州七年廢州以桐廬屬睦州唐書地理志睦州新定郡桐廬緊嚴陵志光化三年錢鏐割縣𨽻杭州十國春秋吳越西府杭州領縣桐廬清類天文分野之書宋太平興國中仍屬睦州宋史地理志建德府桐廬上元史地理志建德路領縣桐廬中舊浙江通志眀桐廬縣屬建安府尋屬嚴州府國朝桐廬縣屬嚴州府編户五十