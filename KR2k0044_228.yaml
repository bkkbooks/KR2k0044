隔人寰有路通樓閣暗藏山色裏鼓鐘遙落水聲中參天老柏摩雲翠繡地繁花映日紅顧我政餘來小憩不妨回首月明東敕建寶華禪寺武康縣志報恩禪寺在縣西南金車山麓相傳唐宋古剎宋大覺禪師入山放生有放生潭潭內産異螺元斷崖禪師養母於此有度親塢證果菴明崇禎甲戍臨濟正宗罄山天隱和尚開堂説法丙子玉琳禪師繼席焉國朝順治十五年師奉召入京後還居天目繼席者為棲雲美發二師道風逺播衲子雲臻為叢林最外有坊曰金輪第一山康熙四十四年聖祖仁皇帝賜名寶華寺雍正十一年奉敕重建十二年御書淨域常春扁額賜懸大殿靜林寺武康縣志在縣西三里孟宅保之西梁大同四年建唐咸通六年齊侃禪師因舊基更造寺瞰溪流特為勝絶釋靈一靜林寺詩靜林溪路逺蕭帝有遺蹤水擊羅浮磬山鳴于闐鐘燈傳三世火樹老五株松無數炳霞色空傳昔卧龍定空寺武康縣志在縣東煙霞塢梁普通六年僧廣譽建名永昌宋治平二年改今額元燬明洪武三年僧白玉妙義重建寶巗寺武康縣志在縣東秀峰山下宋參政陳義中建玊禪師開山元燬明洪武二十一年僧妙覺復立萬厯間廣權重修柏山寺武康縣志在縣南二十里宋紹興三年潤節趙衛王建元廢明洪武三年僧宗華重建大慈教寺萬厯湖州府志縣東一百五十步梁普通六年建名寶相湖州府志宋治平二年改今額武康縣志元燬明洪武十四年重建後併入證道寺永樂元年復立國朝康熙五年僧真至創建大悲閣五間皇覺教寺湖州府志在縣東北一十里吳興掌故漢沈戎故宅後捨為懷德寺宋治平間改為皇覺寺武康縣志元燬明洪武四年重修萬厯四十八年僧德顗重建修真觀萬厯湖州府志縣東唐泫村元泰定間建武康縣志元燬明洪武二十四年復建國朝康熙六年道士余體崖重建升元報德觀武康縣志在縣東南三十五里禺山之麓宋紹興二十六年建元燬明洪武二十四年道士袁居安重建安吉州霧山教寺名勝志在州南霧山吳越錢氏建號祗洹寺西吳里語又名大明心寺因在霧山故改今名寇凖過霧山寺詩青紅樓殿枕寒溪門外天垂斗柄低啼鳥不知春向背落花依舊水東西半橋霜月光相照一帶松煙色未齊誰謂百年榛莽地香雲今日繞輪蹄樂平教寺萬厯湖州府志在州東梅溪鎮嘉靖安吉州志宋元嘉元年信義太守施彬捨宅建劉公壽樂平寺詩名藍古幽絶花木深禪房門軒俯芳流竹風終日涼謂此已勝絶坐可雄諸方誰知槿籬外古木鬱蒼蒼下有湍激澗珠玉鳴琅璫何當開松門兩岸安石床盡發溪山奇枕流潔其芳他年我重來君子留徜徉常樂禪寺嘉靖浙江通志在州治西吳興掌故吳越驃騎將軍吳頊故宅捨為羅漢院宋治平間改為常樂寺萬厯湖州府志寺西廡有拂塵壁廡外有靜蛙池姚孝孫常樂寺詩煙岫晨寒重風簾暮爽輕短墻籠竹色虛户納松聲弄筆花箋滿煎茶石鼎盈誰知杉檜月獨卧夜禪清程聞寺湖州府志在州東北梅溪灘始名施水菴唐貞觀中建嚴真觀西吳里語在安福鄉宋崇寧中真武示見賜額真君觀政和八年改今名萬厯湖州府志西廡有枕流橫璧二軒盡見長興四安諸山郭綽枕流軒詩招提避雨寄孤眠夜靜溪聲到枕邊引得江湖清入夢拍天波浪一漁船玉樞道院嘉靖安吉州志州南百二十步宋治平中建孝豐縣廣福教寺萬厯湖州府志縣北靈奕鄉吳越錢氏建名修道寺宋紹興二十二年改今額百福寺孝豐縣志在靈峰山梁開平元年建明崇禎丁丑僧智旭因蜀僧心是請藏入山重建大殿太平教寺湖州府志在縣西北太平鄉國朝康熙八年僧惠燈重建淨竹院孝豐縣志在董嶺石晉開運元年錢氏建號寶德禪院宋治平中改今額王美中淨竹院石筍詩玊立憑虛檻摻摻瘦影奇何年分鷲嶺此地長孫枝落照留殘月分燈賦晚詩還將蕭瑟意相對磊砢姿普慈教院孝豐縣志在古浮山談志云石晉天福四年建名安樂院宋治平中改今額戒香院孝豐縣志在浮玊鄉談志云宋乾德二年號龍禪院治平中改今額俞汝尚遊戒香院詩崎嶇窮谷翠屏圍却訝遊人到此稀修竹拂雲當户聳暗泉鳴玉繞亭飛春風欲老茶含斾暑雨初收水帶磯擾擾紅塵何處好使人回首重忘歸紫陽觀萬厯湖州府志縣西南天目山梁大同五年建昭明太子勒碑記傍有石室浙江通志卷二百二十九
