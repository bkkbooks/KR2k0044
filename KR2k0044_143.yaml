body:
  text: 浙江通志卷一百四十四選舉二十二國朝舉人康熙二十三年甲子科陸士琰嘉興人俞長城桐鄉人乙丑進士平士楨山陰人汾陽知縣祝棻海寧人聞元炅錢塘人汶上知縣吳耀仁和人陸躍鱗烏程人胡允幹湖州人顧之瑀杭州人陳翷孝豐人張肇榮仁和人郎捷餘杭人戎澄寧波人乙丑進士丁䇿嘉善人乙丑進士沈之鉽平湖人羅次知縣葉鳯儲長興人楊中楠海寧人陸吉富陽人程鑣仁和人御史胡治石門人邵燦餘姚人李夢本寧波人錢塘教諭王士仁仁和人處州教授黃相如嘉興人馮同憲寧波人濮應𢎞分水人孫衍嘉善人長山知縣蔣鼎長興人許進仁和人陶覲上虞人蔡酬杭州人辛未進士邵焻餘姚人錢鑑龍遊人徐觀西安人朱彝政錢塘人薑宸萼慈溪人查嗣泰海寧人王廷鑾嘉善人曹彥栻秀水人甲戍進士盛棨桐鄉人洪世翰寧波人庚辰進士金作輅嘉善人平遙知縣陳宗洙建德人魯存憲會稽人秦易慈溪人丁淳湖州人左臣黃寧波人錢塘教諭林青雲瑞安人葉鳯苞長興人祝利潤龍遊人錢經錢塘人孫益鵬仁和人聞辰拱鄞人袁𢎞益鄞人嘉定知縣章應璧會稽人庚辰進士呂岱新昌人陸􅉈秀水人乙丑進士張寅石門人袁定國蕭山人户部郎中諸來晟山陰人乙丑進士金世顯嘉興人以下五人順天中式徐鳯池秀水人朱元佑嘉善人國子丞楊戒諸暨人朱廷迪桐鄉人康熙二十六年丁邜科伍涵芬於潛人湯敘海鹽人吉水知縣張程揚海鹽人朱良佐錢塘人丁丑進士顧秉堅嘉善人會稽教諭潘樹柟仁和人辛未進士陳哲德清人查升錢塘人戊辰進士施照武康人朱芾海鹽人馬楠上虞人庚辰進士談有年秀水人江寧知縣陳元餘姚人戊辰進士李度仁和人知縣錢渭恭鄞人沈曰掄餘杭人戴振河德清人戊辰進士毛超倫遂安人金銓石門人顧鴻雯石門人支瑤甸仁和人李瀛山陰人甲戌進士沈鴻勳平湖人辛未進士潘之昌平湖人宋儒任仁和人章錫範新昌人王廷獻海寧人辛未進士朱自恆海寧人陳學海桐鄉人遼陽知縣梅成樞嘉興人沈登嘉興人陳吳嶽海寧人庚辰進士項維貞嘉興人江浦知縣屠孝義定海人知縣李熹湖州人陳學聖定海人知縣王融祚會稽人傅允諧嘉興人高怡武康人甲戌進士邵昌齡平湖人陳然桐鄉人錢廷獻仁和人壬辰進士袁蘅嘉善人周天相錢塘人永興知縣胡開泰石門人錢為鼐會稽人陸費濓桐鄉人唐光文烏程人徐進平湖人錢兆沆長興人庚辰進士項維聰嘉興人主事茅伯良山陰人徐自珍新城人沈澄逺嘉善人吳廷銓桐廬人欽賜五經舉人查嗣韓錢塘人戊辰榜眼陸寅錢塘人戊辰進士以下七人俱順天中式湯右曾仁和人戊辰進士錢以塏嘉善人戊辰進士詹嗣緑建德人癸未進士張燧山陰人庚辰進士何其馨山陰人陳允恭山陰人甲戌進士廣西中式康熙二十九年庚午科吳筠仁和人巳丑進士毛逺宗仁和人丙戌進士沈雲鴻杭州人吳隆元仁和人甲戌進士金璠瑞安人諸葛琪蘭溪人丙戌進士黃龍眉海寧人甲戌進士顧悅履杭州人甲戌探花林礦慈溪人庚辰進士周蘇慈溪人庚辰進士范長發秀水人甲戌進士田間來山陰人龍遊教諭樓績諸暨人良鄉知縣錢以垍嘉善人馮宗京寧波人張王典嘉善人丁丑進士張斗星杭州人謝天植永嘉人庚辰進士酈祖仁諸暨人甲戌進士陳恂錢塘人甲戌進士朱秉吉嘉善人曹鼎錢塘人邯鄲知縣沈曾懋海鹽人庚辰進士費孔昭歸安人向懋賢慈溪人唐曾述會稽人甲戌進士楊王發桐廬人華容知縣商和山隂人顧鳴陽海鹽人辛未進士金廷石海鹽人朱標海寧人王昌言分水人庚辰進士沈平露烏程人田軒來山陰人辛未進士趙光緒平湖人辛未進士朱金魁秀水人王鶚永嘉人薑承宗慈溪人朱肇禎嘉興人甲戍進士沈從律德清人吳叔獻海鹽人陳祺昌仁和人辛未進士王遐祚山陰人癸未進士嵇承顯德清人張時雍嘉興人甲戍進士沈允聞湖州人祝翼模海寧人袁允嘉善人鮑介玉平湖人李思桐鄉人馬銓杭州人王家侁錢塘人閬中知縣屠程珠烏程人丁丑進士董元昌寧波人張鯉湖州人庚辰進士以下六人順天中式錢肇修杭州人辛未進士馮念祖仁和人泰州知州沈名蓀仁和人馬焻烏程人庚辰進士陸冠錢塘人康熙三十二年癸酉科壽致潤諸暨人丙戌進士鍾鳴盛桐鄉人張孝友山陰人石門教諭沈家鶚桐鄉人庚辰進士翁亢孫餘杭人嘉興教諭朱鴻曾瑞安人張鉞會稽人丙戌進士虞光鳯錢塘人上虞教諭馮景夏桐鄉人刑部侍郎鄭大奎歸安人庚辰進士費金吾烏程人湖北巡撫毛文輝仁和人沈李楷桐鄉人庚辰進士髙斗光長興人甲戌進士薑兆熊紹興人許觀光石門人周鳯翔杭州人馮千英海鹽人丁丑進士周超上虞人己丑進士徐殿揚海寧人錢湛麗水人陳廷煒秀水人丙戌進士李登平湖人潘師晉德清人賀方來秀水人癸未進士王文龍常山人徐士鷺海鹽人己丑進士潘成雲烏程人庚辰進士李成輅仁和人甲戌進士嚴德泳烏程人甲戌進士孔豸諸暨人丙戌進士王家驌錢塘人甲戌進士沈慶曾歸安人庚辰進士凌振世嘉興人李允符嘉善人御史陳至言蕭山人丁丑進士孫錫璨餘杭人徐俟召武義人查克建錢塘人丁丑進士徐𢎞祖錢塘人何垣蕭山人癸未進士章鶴鳴杭州人髙嵩臨安人主事吳師栻石門人朱肇濟永嘉人處州教授蔣鳯鳴秀水人江都知縣曹與枚平湖人馮應銓會稽人己丑進士葉閔昌慈溪人丙戌進士胡天錫仁和人錢攀元桐鄉人丙戌進士徐容海鹽人丁丑進士臧哲長興人王大成錢塘人盧生甫平湖人丙戌進士以下五人順天中式趙美玉山陰人查愼行海寧人癸未進士陳于扆海寧人薑宸英慈溪人丁丑探花康熙三十五年丙子科王德炘錢塘人教諭查嗣