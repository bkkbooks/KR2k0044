body:
  text: 浙江通志卷一百四十一選舉十九明舉人天啟七年丁夘科曹惟才㑹稽人辛未進士楊國肇餘姚人教諭祁豸佳山隂人許文岐仁和人項堯睿嘉興人鮑尚絅鄞人朱大典海寜人藁城知縣陸燦平湖人甲戌進士許元釗嘉興人陸大紳㑹稽人史惟傑常山人蕭山教諭錢士驌鄞人吳應芳嵊人胡獻来寜海人戊辰進士閔度烏程人丁丑進士王肇坤蘭谿人辛未進士徐明徵蕭山人慈谿教諭楊琪森餘姚人鄭元霖衢州人鄭孕唐縉雲人向北慈谿人甲戌進士駱𢎞珪武康人陳函輝臨海人甲戌進士袁大器慈谿人沈履祥慈谿人丁丑進士包元㑹象山人姚潛秀水人馬嘉植平湖人甲戌進士葛徵竒海寜人戊辰進士錢希中慈谿人于重華餘姚人辛未進士虞國階金華人詹見竒常山人葉煥上虞人趙林翹錢塘人戊辰進士陳百竒上虞人曹頴洙平湖人陳美𤼵上虞人戊辰進士俞増逺山隂人癸未進士沈金鑑徳清人寜國通判胡振芳秀水人蘄水知縣黎樹聲長興人丁丑進士鄭筦卿縉雲人周家俊泰順人袁州同知張明昌平湖人毛鳳彩壽昌人甲戌進士吳希哲淳安人辛未進士胡長庚處州人沈兆行武康人丙戌進士應對寜波人丁允和杭州人俞咨龍慈谿人張所見嘉善人謝嶽謨嘉興人虞國鎮義烏人戊辰進士陳立政永嘉人莊國英桐鄉人慈谿教諭金汝礪仁和人甲戌進士沈炳文錢塘人錢之璉湖州人田正春縉雲人甲戌進士姚允致㑹稽人應文煥慈谿人薛宏繹杭州人徐灝錢塘人甲戌進士嚴端嘉興人吳杉仁和人趙履祥上虞人鄭憲卿縉雲人曹成模永康人星子知縣張漢傑處州人章美瑾徳清人許全吉杭州人孟稱堯㑹稽人胡麒生徳清人戊辰進士吳恭章餘姚人禹城知縣施惟誠杭州人朱紱山隂人谷光熖温州人吳永澄烏程人英徳知縣沈述裘徳清人張拱樞建徳人沈一䕫台州人魏日瑜鄞人葛龍宫上虞人畢崇道杭州人屠肇芳秀水人知縣周鳴讜樂清人知縣王士元金華人胡餘慶仁和人葛百宜上虞人朱顔復嘉善人陳士瓚餘姚人丁丑進士王士瑞臨安人癸未進士趙景和杭州人徐允昇上虞人戊辰進士倪元佐徳清人黟縣知縣茹鰲山隂人天以下十六人順中式李嗣宗餘姚人戊辰進士徐潘嘉興人六安知州顔俊彦桐鄉人戊辰進士朱錫元山隂人戊辰進士湯裔昌海鹽人余正笏西安人張大烈山隂人推官唐起鳳烏程人鄭體元山隂人余懋儼海寜人應明經慈谿人方肇馨建徳人王谷山隂人滑彬餘姚人沈繼佑秀水人吳太沖錢塘人辛未進士以下五人應天中式毛寛餘姚人沈維顯歸安人方聞讚遂安人周光霽武康人陜州知州崇禎三年庚午科曹振龍蕭山人葉向曜金華人貴州道御史龔廣生義烏人劉士鏻仁和人辛未進士錢瀛選烏程人甲戌進士葉汝㑹稽人陳之杰杭州人錢格嘉善人鄭之僑平湖人查大韶海寜人劉振之慈谿人鄢陵知縣張源思海鹽人辛未進士馬上選海鹽人孟應春徳清人癸未進士吳志舜遂安人姚延著烏程人己丑進士應昌士仙居人安定知縣錢朝彦錢塘人丁丑進士繆伯曇山隂人邵光允富陽人壬辰進士王世鈁金華人徐國光壽昌人吳振鯤歸安人陳相才餘姚人庚辰進士邵之驊杭州人戴大禄嚴州人史爾鉉秀水人朱朝瑛海寜人庚辰進士唐鐘曉歸安人陸鳴煃杭州人章光嶽臨安人嚴建嘉興人沈文雄慈谿人岑君鉉餘姚人繆沅錢塘人丁丑進士沈延嘉鄞人辛未進士沈崇埨慈谿人癸未進士臧長裕定海人邵毓材餘姚人寜州知州趙履光上虞人翁鴻聲杭州人吳玉崇徳人計元功烏程人徐孟邃海寜人甲戌進士姚明時山隂人趙興敏樂清人朱鉉象山人方晉明烏程人樓得月鄞人葉樹聲長興人辛未進士周士顯臨海人南昌同知徐柏齡嘉興人永嘉教諭尚觀法錢塘人周文衡嘉興人徐殿臣鄞人甲戌進士王恒言慈谿人胡繼忠嘉興人姚竒允杭州人郭濬寜海人壬辰進士范廷甫仁和人汪挺嘉興人癸未進士劉勷慈谿人辛未進士費廉海鹽人沈選湖州人蔡一鵷蕭山人毛羽皇瑞安人張奚山隂人何士鈺仁和人周仲璉長興人甲戌進士朱鼎臣富陽人潘同春餘姚人丁丑進士費景烷烏程人癸未進士倪秉元嘉興人陳名卿永嘉人倪嘉賓上虞人王作賓義烏人何瑞圖餘杭人吳尚絅桐廬人安邱知縣錢琳秀水人倪先春嘉興人施㫤杭州人董徳襄寜波人沈怡卿烏程人吳汝寜嘉興人朱永祚仁和人姚應翀慈谿人甲戌進士祝匡基蘭谿人王台明慈谿人庚辰進士徐明琦海鹽人庚辰進士張晉徵秀水人甲戌進士楊道英歸安人辛未進士裘組嵊人壽州知州陳大雅寜波人金涞餘姚人王際圻烏程人潘之斆餘姚人陶良棟杭州人傅克相㑹稽人章正宸㑹稽人辛未㑹魁以下十八人順天中式劉在明徳清人辛未進士陳天工鄞人辛未進士應守性平陽人李建餘姚人李芳春餘姚人邵元凱餘姚人黄陂知縣張展成永嘉人䕫州推官李盛世山隂人清豐知縣李論問㑹稽人何𢎞仁山隂人丁丑進士項聲國秀水人甲戌進士朱光熙㑹稽人甲戌進士倪夢商㑹稽人余敦倫龍游人工部主事徐時鼎蘭谿人山西山隂縣知縣屠𢎞偁烏程人潘振歸安人吳昌時嘉興人以下四人應天中式髙宗舉歸安人錢徳昌仁和人汪士珍龍游人姜𢎞通蘭谿人山東中式王佐嘉善人河南中式梁州傑嘉善人山西中式崇禎六年癸酉科俞頴陽鄞人王紹美㑹稽人庚辰進士趙光宇樂清人陳素桐鄉人甲戌㑹魁張光球山隂人嚴允昌湖州人柯夏卿黄巖人丁丑進士何邦福衢州人查繼佐杭州人徐家麟鄞人癸未進士盧懋䕫東陽人陳守臣平陽人賀珍修海鹽人陸清源平湖人甲戌進士周宗璧永嘉人朱子覲山隂人髙文曅嘉興人鄔鑑明奉化人章一奎鄞人陸之樾杭州人陳舒嘉善人己丑進士吳主一義烏人㑹稽教諭慎思永歸安人丁丑進士李松嘉善人庚辰進士李天植嘉興人張寄瀛餘姚人朱廷譔海鹽人馬瑞麟平湖人余成家西安人莊元辰鄞人丁丑進士周躍雷慈谿人丁丑進士孫志儒歸安人癸未進士邵葉槐餘姚人教諭王雨謙山隂人王亹㑹稽人牟賢黄巖人甲戌進士金和平湖人庚辰進士韓昌祚天台人沈昭逺仁和人沈煃晃山隂人甲戌進士陳士槐平陽人姚允昌慈谿人丁元楧徳清人饒州同知趙嗣先樂清人鍾鼎崇徳人丁丑進士孫先梅餘姚人嘉興教諭張堯揚杭州人陸山輝鄞人張羽翀餘姚人胡文蔚仁和人髙州推官徐必選海鹽人岑鐈餘姚人俞可𢎞臨安人杜應用西安人俞亮湖州人教諭蔣方馥青田人朱兆宸山隂人嚴爾琮歸安人癸未進士閔肅烏程人邵之詹餘姚人包宸遴鄞人李士晉嘉興人陳明瑛象山人建寜叅政濮有宏分水人髙攀桂餘姚人王含鑑山隂人朱元允太平人武強知縣應純仁慈谿人錢汝邁桐鄉人戴日明烏程人龔光耀山隂人知縣邵泰清仁和人俞潁濱鄞人屠壽徵平湖人王國章寜海人包士瀛鄞人陸熙運歸安人知縣沈懋政徳清人周明新象山人壬辰進士陳瀛錢塘人施之圻烏程人施春錦開化人羅士尤慈谿人莊世榮秀水人邵經世嚴州人祝淵海寜人褚廷琯嘉興人嚴化民遂安人蘇獻明臨海人鎮逺推官胡象乾湖州人沈㷆烏程人己丑進士顧文輝海鹽人董期生會稽人知府蔡嘉復西安人湯天騮錢塘人史遇海鹽人陳之煌仁和人丁丑進士沈泓嘉善人癸未進士以下十三人順天中式洪吉臣仁和人馮欽明長興人丁丑進士錢楠嘉善人職方郎中張夜光諸暨人沈綵會稽人御史孫嘉績餘姚人丁丑進士魯應期餘姚人知縣劉學聖象山人沈棠仁和人吳本泰海寜人甲戌進士張文輝鄞人甲戍進士姜應龍餘姚人沈自成仁和人以下十一人應天中式余國禎遂安人庚辰進士裘秉誥富陽人汪有道仁和人羅覺来上虞人徐昌冶海寜人尹志烶嵊人知縣吳景亶歸安人庚辰進士姚軒之長興人朱建寅仁和人馬國化建徳人賈遂海寜人河南中式吳瑞徵嘉善人雲南中式崇禎九年丙子科倪長圩平湖人丁丑進士李長苞平湖人曹溶秀水人丁丑進士顧淶初歸安人黄澍錢塘人丁丑進士陳宗器錢塘人吳晉晝海鹽人邵秉節餘姚人庚辰進士盧鳴玉嵊人庚辰進士馬晉允餘姚人戊戌進士温以介烏程人俞邁生山隂人朱曽省秀水人王紹蘭會稽人郭振培鄞人金漸臯歸安人漢陽知縣蔣薰嘉興人伏羌知縣俞煜平湖人姚序之長興人庚辰進士吳允芳沈兆昌海寜人庚辰進士魯㮚山隂人癸未進士謝泰宗定海人丁丑進士沈介蔣汧嘉善人張起龍鄞人陸鳴時錢塘人王明組黄巖人朱明仁和人秦竑經陳濬仁和人丁丑進士潘文輔劉廷獻仁和人趙忠讜東陽人朱廷章海鹽人翁明英臨海人曹應登上虞人柴薦禋江山人洧川知縣馮蕚舒臨海人徐元吉童士欽方大猷烏程人丁丑進士傅天錫鄞人丁丑進士姚宇昌錢繼章嘉善人羅名選章國佐於潛人同知巢名盛嘉興人葉振藩錢塘人朱圖隆錢塘人孫鍾琦嘉興人周光世吳夢白仁和人癸未進士萬泰鄞人錢泮嘉興人俞都嘉興人陳素抱分水人宻雲知縣温璜烏程人癸未進士金維寧臨海人張中發錢塘人葉仕魁西安人庚辰進士孫在鎬嘉善人余縉諸暨人壬辰進士馮文偉慈谿人丁丑進士董徳偁鄞人方光祖淳安人方兆日壽昌人處州教諭樓鳯來東陽人董士昌嘉興人已丑進士項毓槐錢塘人謝于宣鄞人癸未進士王之垣會稽人朱茂暻秀水人王家望江山人楊廷芳黄巖人錢棅嘉善人丁丑進士徐景辰上虞人錢肅樂鄞人丁丑進士周洪任山隂人湯溪教諭呉之瑞錢塘人盧光晉東陽人沈楘沈堯章錢塘人徐應珏西安人周齊曽鄞人癸未進上於湯光陳有隆山隂人呉靖歸安人洪秉誥樂清人王庭嘉興人已丑進士朱國禎嘉善人徐郴臣嘉興人嚴之偉餘姚人癸未進士沈行逺錢塘人孫之龍餘姚人鍾鋐田嘉年山隂人丁丑進士章曠仁和人以下十二人順天中式李毓新嘉善人丁丑進士張堯政仁和人王三元山隂人廣西布政蔣文運上虞人丁丑進士祁熊佳山隂人庚辰進士舒于明夀昌人安福知縣沈懋學歸安人胡應瑞山隂人知縣嚴寅平湖人周英天台人東鄉知縣葉永華松陽人陸上瀾平湖人以下七人應天中式鄔銓明奉化人王潢龍游人宋爾郊仁和人陳之暹海寜人王熙章富陽人朱萬錡桐鄉人樂陵知縣張令聞蘭谿人珙縣知縣以下二人俱湖廣中式包爾庚秀水人丁丑進士張垣秀水人雲南中式崇禎十二年己夘科宋賔王餘姚人任邱知縣沈中柱平湖人庚辰進士沈捷仁和人庚辰進士陳聖圻義烏人慈谿教諭葛定辰錢塘人吳輅崇徳人戴長治海鹽人癸未進士吳志章桐鄉人通渭知縣錢開宗仁和人壬辰進士祝世盛龍游人髙陵知縣姜受餘姚人庚辰進士金漢蕙義烏人己丑進士劉鴻嘉歸安人庚辰進士卜年秀水人卓彞武康人丁亥進士楊兆梧平湖人葛定逺錢塘人駱維恭徳清人張應麟鄞人徐嗣英仁和人余綸諸暨人癸未進士馬嘉禎平湖人方茂棟永嘉人胡璉徳清人庚辰進士吳聞禮仁和人癸未進士潘𢎞仁歸安人周家偉泰順人職方司主事郁之華嘉善人陳巖城歸安人沈宗塙仁和人癸未進士沈日昆平湖人教諭曹廣崇徳人庚辰進士阮峻徳清人沈鼒嘉善人錢潤徵海鹽人李爾誾義烏人安吉教諭金廷韶山隂人癸未進士葛世振鄞人庚辰榜眼闗鍵錢塘人癸未進士徐孟祺海寜人葛三錫上虞人朱召淳餘姚人禹城知縣嚴雲方摶鄞人孫聖蘭嘉善人癸未進士髙承埏秀水人庚辰進士朱之佐嘉興人方振節寜海人吳之標汪渢錢塘人錢金生麗水人王允誥西安人邵琳餘姚