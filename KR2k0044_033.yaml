body:
  text: 浙江通志卷三十四關梁二杭州府下餘杭縣通濟橋明一統志在縣治東漢熹平中建餘杭縣志舊名隆興五代時錢武肅王重建改名安鎮宋紹興十二年復建改今名以木為梁元至正十八年山寇縱火焚之明洪武元年縣令魏本初重建通易以石袤二十五丈餘廣三丈五尺餘甲於境內俗呼大橋正統間縣丞邱熙嶽加石闌於兩旁國朝康熙五年十一月知縣宋士吉重修萬歲橋萬厯杭州府志縣東半里按察分司之側張公橋咸淳臨安志在南渠河上餘杭風土記云後漢末邑人張儼好學有賢德不樂榮利嘗種匏以自給大者可容粟數斗以所市錢為橋俗呼葫蘆橋杭州府志宋天聖初邑人支贊支佑重建又名支家橋明萬厯間知縣戴日強重建蓮花橋萬厯杭州府志縣北半里東漢熹平二年里人建跨濠池通鋪路每夏月池蓮盛開故名餘杭縣志宋淳祐間重建部伍橋成化杭州府志縣東三里橋北有部伍亭因名餘杭縣志跨餘杭塘分南渠河水入港通舟楫吳凌統募民兵立部伍於此以禦寇故名後圯宋咸淳五年重建明成化間知縣武英修正德四年水勢傾壞主簿陳祥復建文昌橋餘杭縣志在縣東四里跨南渠河明萬厯二十年令舒嘉兆水中築臺建文昌閣橋翼兩側通仙橋大滌洞天記在餘杭入洞霄宫大路去通真門四里宋建炎年間建舊號石門橋元大德己亥知宫事楊清一重建朝元橋洞霄宫志在宫外四里俗呼為湖塘橋舊低小每為山水所壞宋咸淳癸酉增構高廣凡二所最大者為朝元橋玉泉橋大滌洞天記在東天柱嶺下俗呼為麻車橋宋建炎間建飛玉泉由此出澗故名鳴鳳橋成化杭州府志去玉泉橋七十步洞霄宫志在雲根石左俗呼為袁家橋宋建炎間建與鳴鳳巖近故名丁公橋嘉靖浙江通志在縣西八里梁天監初令丁遵建萬厯杭州府志遵為臨安令性恬淡交代之後築室山間隱而學道為橋以濟不通雙仙橋洞霄宫志俗呼為雙橋頭昔郭真君與葛仙翁倚杖對談於此故名長橋萬厯杭州府志縣東二十八里跨餘杭塘河通舟楫餘杭錢塘二縣以長橋為東西兩界元同橋大滌洞天記在洞天福地門裏下通池水出翠蛟亭昔元同先生與錢武肅王相度地理鑿池駕橋故名臨安縣長橋嘉靖臨安縣志在縣東三里安義鄉成化間知縣方早經始陳猷重建駱鍾麟長橋夜月詩小舟清泛夜光凄滿載垂虹月一溪秋影搖天飛素練晚寒滴露濕銀堤橫塘水曲隨魚出隔岸山青聽狖啼解却鷫鸖沽酒後鐘聲隱隱度村西國朝康熙八年洪水衝壞知縣陳提知倡募重建四十七年復圮知縣徐永明重修戊戌乂圯知縣張淑郿重建平政橋咸淳臨安志在縣西北一里端平二年令王鍨建景定壬戌令家之巽修錦橋咸淳臨安志在縣南二里以錢鏐名杭州府志明崇禎間僧慧明募建石橋尋圮今土人架以木橋普安橋嘉靖浙江通志在縣東三里臨安縣志宋端平間令王鍨建竹林橋臨安縣志凡九水合流南北諸山夾峙而來宋蔡君謨題為山水佳處明宣德七年主簿張升建知縣方早完工崇禎元年洪水壞七年高金評修隨壞十六年鄭允珍重修馮夢楨遊天目山記竹林橋有九洞跨溪如虹苕水漲時如雷霆奔鬬錦山橋咸淳臨安志在縣南三里淨土院普明大師僧智間建蟠龍橋西天目志在雙清廟前橋跨龍節關秀水噴礴搖曵長虹恆如飲澗馬溪橋萬厯杭州府志縣北五里高陸鄉集賢橋嘉靖臨安縣志在縣東北七里谷昌鄉杭州府志一名華龍橋馬帶橋杭州府志縣西一十五里福興鄉臨安縣志武肅王妃戴氏家此歲時歸寧衛從軍馬駐焉故名杜塢橋成化杭州府志縣東一十八里餘杭臨安以此橋分東西兩界埀虹橋東天目志橋架兩峯白水自峰頂瀉下白虹倒飲亘天入澗匌砰湃聽之神爽在觀瀑亭數十步名曰西嶺埀虹安希范垂虹橋詩飛流萬丈界青茵疑決銀河瀉碧空迸散寒光珠映日飄颻素影練含風靈源已辨苕溪出逺勢應趨震澤中支策石梁看不厭呼童携酒入雲叢玉澗飛橋臨安縣志四面皆危壁懸橋往返似飛渡者下有玉澗泉流出瀑布黃鼎象飛橋詩名山勝迹赤城標度世還元意自饒月吐寶珠開佛偈龍舒金爪渡僧橋千間松厦圍壇靜百丈苔磯瀑布遙日暮徘徊難忍去忽聞玉女弄笙簫於潛縣千秋關於潛縣志在寧國界謹按千秋關即天目山西麓也朱梁乾化三年淮南將李濤出千秋嶺攻吳越衣錦軍嶺道險狹錢元瓘使人伐木斷淮南軍後擊之遂虜其軍宋南渡後亦置戍守於是有千秋關元至正十二年董搏霄敗徐壽輝將項普略之兵遂復於潛而守之賊犯千秋關引而南摶霄擊却之遂扼關以拒賊今亦為要隘又有白沙關桐嶺關接昌化縣界孔夫關唐舍關豪千關接孝豐縣界縣橋咸淳臨安志在縣西二十步咸淳四年建名長官橋飛來橋名勝志四面皆峭壁危崖懸橋架空似仙人飛駕瓊軿成化杭州府志宋時以木為之嵗久圮元皇慶間監邑巴圖爾克丹易之以石姚鏜飛來橋詩池上飛橋接太空白雲丹磴兩溟濛孤笻不怕蒼苔滑可道無山著此翁順濟橋成化杭州府志縣西一里舊名浮溪令邵文炳始創更名邵公橋令趙彥倓程燾相繼重建李延忠浮溪橋記潛之水蓋發源天日合石柱之派抱邑而流曰浮溪山高水悍凌岸觸石遇霖潦浸淫洪濤稽天砊磕輣軋觀者愕立初土人徇習茍簡幸其水之縮為略犳以渡稍漲溢心掉足駭溺者甚衆既而勢橫暴繼以舟或半濟摧篙折舵覆者又益衆往來者甚病前令邵君文炳始鳴材木跨溪而梁之作亭其中平夷顯敞甲寅秋洚水為災蕩無復存浚儀趙君承其後蒞官之明年政通民和按轡溪上履遺迹而太息顧父老曰夫物莫堅於石更以石為之可乎歡曰善乃出帑廪之羡募工採石無絲毫病民邑人相率輸金助作得浮屠二人屬以役事不逾年告成其袤四十尋橫二丈崇二十有七尺上為屋覆之神庭中峙步欄相屬總二十有三楹令有感於神祐名曰順濟之橋慶元元年秋八月也洪咨夔浮溪橋碑記浮溪乃吳越往來之津前令邵紫微梁而亭之趙師卿來纍以石且屋其上規制堅密前年秋洪水發諸山直北之橋盡決順濟亦壞涉者仍病焉池陽程君燾至之逾年問與客行溪上思策墜立壞如師卿而重於煩民遂一用紫微成謨釃水為走道巨植駢峙修闌旁翼袤三百二十丈廣二尋有二尺東西石梁各一星兩亭壓岸猶舊先是紫微中橋著亭亭麗於北坐挹兩天目以便遊息迎湍受激亭仆而橋隨之改著於南勢相屬而不相麗異日亭或不立橋或庶保無恙君廉平有精力得敬事愛人之意視可以興利除害者不慮費而橋役甚大橋成不務為已惠又以圖堅惠遠望之後人加於人一等矣紹定元年十月甲子淳祐十年令趙孟敏與侍郎趙景緯重建後渚橋咸淳臨安志縣北三里今名太平橋朱角橋成化杭州府志縣南六里咸淳臨安志舊名嘉泰橋九里橋咸淳臨安志在縣東九里後名惠政葉丞相建亭口橋咸淳臨安志在縣東二十五里一名廣利橋橫山橋成化杭州府志縣南五十五里洪武十七年居民顧天驥建玉澗橋萬厯杭州府志縣南六十五里洪武十七年居民顧天驎建於潛縣志後圯顧如臯等重建印渚渡神州古史考縣南六十里接嚴州府分水縣界新城縣南津橋咸淳臨安志縣南一里今謂之過岸橋杭州府志宋令楊思濟建後待問趙崇賅相繼重修舊名登平明萬厯三年邑人通判陳永餘同鄉民孫馳捐資募建邑令張鷗湖出贖金助成之新城縣志三年修改學宫知縣溫朝祚相視學南水口無關鎖侍郎方廉集鄉人好義者出資建石橋并築石壩方廉南津橋記南津渡去城百步編筏為渡覆溺之患無嵗無之一日友人陳别駕率鄉名孫馳者告豫曰南津上通衢嚴北抵省城檄使往來無間風雨馳幼失父業僅置産數畝願為橋工助豫以狀聞於邑侯鷗湖張君侯為相度規畫出贖金若干鼓衆由是諸好義者各分任其役選才幹羅繼泰袁世仰陳義董其事甫就緒而張君擢去益陽默菴溫君繼至毅然以民之利病自任而首於是橋加意焉更出贖金若干以成所未備而橋得畢工經始於隆慶壬申夏閲嵗甲戌冬橋成橋分九墩高一丈五尺上跨石梁其長以倍下甃椿石旁翼石岸用防衝決至是四境內外咸就坦途昔日涉溺之患蓋免焉橋成余為是記塔山橋萬厯杭州府志縣西一里𢎞治間耆民徐憲創建木橋厯年修整憲之子孫任之雙江橋杭州府志縣東二里雙江口明萬厯七年邑人侍郎方廉募建方廉重建雙江橋記縣治四靣負山溪之險而雙江橋乃松葛二水入江為一邑襟喉豫嘗有志焉而役繁力寡不能興舉今幸獲有秋會鄉之冇行誼者圖之計所助僅敷橋木之半乃以狀聞於邑侯張君侯首捐贖金率衆時普照僧文阡者與其徒數人以百金效義工作甫興侯以艱去武林陳君來署邑篆召集諸宿諾者使終其事日省工役之勤惰而勸懲之間有羡餘贖鍰即分給餼廪衆咸感德畏威趨事恐後不數月而橋成橋凡二洞高二十五丈濶十冇一尺長百尺有竒費約四百餘金雖一時好義者衆而後先勸導張陳二君之功居多焉諸治事者謂當有記不侫直敘顛末并附捐財姓名於石國朝康熙五年為水衝決橋半傾圯七年知縣張瓚捐俸重修流芳橋萬厯杭州府志一名市橋在縣西門壕上杭州府志今名通濟橋莊澤橋杭州府志縣東北三里明嘉靖間方廉募建自為記開元橋新城縣志在寧善鄉武源溪離縣五十里國朝康熙六年邑民王裕如募建上立茶亭以濟行人歲寒橋明一統志縣北五里宋紹聖初建徐評重建嵗寒橋記新城古邑也其地四顧皆山春夏之交山或決而為溪則洶湧散漫往往迷野而松溪為甚豫元祐壬申受代是邑始過松溪橋見其已敝逮兩載而敝益甚豫與閟君彥嗣邑尉王君純老狀其事於府適真州推官張君延之權邑尉樂所聞而指期以成於是鳩工聚材始於紹聖改元季秋丁巳終於孟冬癸巳延之屬豫以名因詢父老曰何謂松溪皆曰溪昔有一松故名溪本有二復合而為一天聖中載土以為橋慶厯間始易以木但曰松溪橋非名也今名之曰歲寒云杭州府志元至元間縣丞張世榮重修明邑人王濟纍石作三洞上平以木正德乙亥邑民徐旭孫璉更易以石萬厯壬子邑宦方亷捐資為倡縣令施宗賢發贖金及里夫助工辛未邑令張霆復捐俸終事下三月而橋成橋下深滙不測工築無所措手衆禱於溪旁廣利廟忽雨集沙漲履若平地工完滙浸如故趙安橋咸淳臨安志在縣西五十五里南新鄉淳祐三年瑞相院僧本源建石橋架屋十七間勢甚宏壯本源世傳醫瘍甚神所得酬謝輒施以造橋昌化縣昱嶺關昌化縣志縣西七十里高七十五丈為徽杭通衢有石刻江東路徽州界六字山勢險阻元董摶霄破紅巾寇於此上有碑亭王禕昱嶺閟銘并序昱嶺關在杭徽之交因山為險與千秋獨松稱三關而三關莫險於昱嶺至正十六年二月劇盜自徽來犯昱嶺帥臣望風退北盜遂入關侵掠內境於潛昌化皆杭屬縣師喪衆暴鞠為盜區今江南行臺監察御史檇李沈公時為行省左右司都事受丞相命總督戎事首布書檄開諭黎庶示之恩信使與賊携遂分諸軍四道而進約並會關下復遣一軍逾關而出設為疑伏截其奔衝號令堅明莫或逾越三月既望我軍抵昌化與賊屢戰乘勝追逐過車盤嶺二十八日諸軍如約會集關下即以其日收復關門盜雖有險不能以為固矣時驕將或傑驁不用命公單騎自臨安道新城度浮雲嶺趨於潛召父老慰撫之衆皆感泣請歸順自新因率民兵與大軍合據關為守聲威益揚遐邇震疊未幾徽境相繼率平矣公推忠立義以制師律昭信布德以牖民𠂻克綏叛徒式遏亂略