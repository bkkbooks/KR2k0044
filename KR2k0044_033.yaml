嘗聞蔡君謨洛陽橫海潮又聞鄉逸士絶流遠巨艘較翁此營作濟川俱足褒能聲與義聞今古相爭高繼筠橋嘉興府志補在筠翁橋東百步可筠仲子璲建普濟橋普通橋平湖縣志俱邑人姚松石建顧充題姚氏橋碣浙以西當湖為巖邑東受檇李武原諸水唯鵡湖最大鵡湖疏為支流唯北津最大非石梁梁之歲歲為褰裳濡軌之患松石姚公一力建普濟普安普通三橋創義舉也其一以版築故廢矣而其孫郡丞楫博士應焌置題名碣於祠之堂昭祖功也勒石記題俾永勿失永世守也濟衆之仁承先之孝祖孫有同美焉桐鄉縣惠民橋桐鄉縣志在縣署前明正德九年改建舊名望寧登雋橋𢎞治嘉興府志在儒學東南桐鄉縣志明成化二年移建舊在西名德輝橋便民橋桐鄉縣志在皂林鎮東明正統初建天順時鄧鏞創改石橋吳昂便民橋記宣德間廬陵周文襄忱撫浙西以興革利害為己任乃建為橋民甚便之名之曰便民歲久木壞危不可渡天順改元之冬通判事臨川鄧鏞孟宣督賦桐鄉次於皂林見而恤之乃易甃以石為久遠計知縣事張泰縣丞鄧玭董其事不逾時而橋成其長一百九十尺高加其濶之六尺下為環洞長比上殺四之三有奇於是有事往來者無阻溺之患而咸喜其便豫曰此惠政也不可以無記故書秀溪橋𢎞治嘉興府志在皂林鎮驛西桐鄉縣志明永樂十三年建國朝康熙九年冬重修汪文伯秀溪橋夜渡詩才過青暾日已曛蘆花刺艇亂鷗羣橋邊古戍聞人語蓬底篝燈照水紋寺角半分遮岸樹鐘聲欲渡隔溪雲霅川訪舊成來往獨坐空齋懼寡聞萬春橋明一統志在縣治西北宋淳祐初建語兒橋桐鄉縣志春秋時夫差督兵拒越此地有生子即能言者因名其溪為語溪覩谷橋𢎞治嘉興府志在七都桐鄉縣志即長水塘宋時有覩谷里故名嘉興府志一名都斧橋興德橋𢎞治嘉興府志在青鎮上有樓亭又名花橋宋文恪青鎮興德橋記許君廷用以將軍之符來守烏青鎮居間或徘徊里巷視民緩急之宜而以興德橋壞實艱於涉乃發私槖而重建焉時至正乙亥冬十一月也兹邑燬於兵厯五寒暑矣業薄民散問巷索然昔之所見一無復有矧興德橋居市之半分三洲一水之間行旅憧憧臨流而返幾何人哉然未有以濟川之功為已任者今將軍不謀於人鳩工僦傭購財輦石飛梁閣道舉復其舊其善政可記也許君名信廷用其字茅家渡桐鄉縣志在皂林塘東四里宋置官渡嵗課淨利錢元明以來革之聽民自便國朝因之浙江通志卷三十四
