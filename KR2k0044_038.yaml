在縣西門內花竹清幽東阿山館宣德富陽縣志在城東倚山環澗地頗幽勝超然館萬厯杭州府志在餘杭縣大滌山晉郭文隱居於此通明館大滌洞天記在洞霄宫宋高宗臨幸至此几榻咸在昌黎館咸淳臨安志在於潛縣岝崿山邑人以令韓灌為政明允以寓去思又名曠軒紫薇館成化杭州府志在於潛縣署紫溪館月堤館晏公類要並在昌化縣城內褚莊錢塘縣志在龍井金鍾峰下相傳漢末褚族舊居於此養魚莊武林舊事在柳洲楊郡王府天竺莊硤川志在海寧縣硤石山前唐許逺子玫葬於此錦南莊嘉靖臨安縣志錦南為錢武肅王生地有錦南八勝莊其一也虛白堂古迹考在郡圃唐時建後為錢氏都會堂乾道臨安志舊圖經云在舊治唐長慶中刺史白居易有詩刻石堂上堂前有紫薇兩本世傳居易所植蘇軾有虛白堂紫薇花詩白居易郡亭詩平旦起視事亭午卧掩關除親簿領外多在琴書前况有虛白堂坐對海門山潮來一慿隘賓至一開筵終朝對雲水冇時聽管絃持此聊過日非忙亦非間山林多寂寞朝闕空喧煩惟兹郡閣內囂靜得中間羅隱虛白堂牡丹詩欲詢往事奈無言六十年來此托根香暖幾飄袁虎扇格高長對孔融尊曾憂叢淺陰難合且喜春殘色尚存莫背欄干便相笑與君俱受主人恩因巖堂古迹考在郡圃唐建咸淳臨安志在鳯凰山舊治今存其名白居易因巖堂詩箕潁人窮獨蓬壺路阻艱何如兼吏隱復得事躋攀嵓樹羅階下江雲貯棟間似移天目石疑入武丘山清景徒堪賞皇恩肯放間懸知興未足旋被詔催還中和堂咸淳臨安志在鳯凰山舊治本錢王閲禮堂至和二年郡守孫沔建更名中和建炎三年高宗臨幸改為偉觀既移改府治仍以名堂嘉定六年安撫趙時侃再建李墮中和堂記杭瀕浙河雅為東南一都會民物殷富山水清美厯唐至五季錢氏所據傳三世閲七紀我宋受命守吏即王宫為居棟宇宏敞他郡莫及始錢氏作堂名閲禮至和中威敏孫公沔來守更飭治之易名中和守居負鳯凰山堂跨山慿高蘇文忠公嘗謂下瞰海門洞視萬里觀覽之傑可想建炎初高宗南巡登斯堂賦詩八十言奎章睿藻流於人間尋易名曰偉觀紹興停鑾浸久因其地創行宫而守廨遂徙於清波門之北今所治是也惠國趙侯被命尹政之明年綱舉目張民情浹和顧廨處闤闠失官守崇密之體侯曰此弗可已也乃撤廢屋疏朽壞築八十四堵為堂三十七楹獲采舊名榜曰中和人徒見其堂之成而不聞其費且勞嘆其室之美而不知其意有所寓余嘗造侯要余觀焉雖無異時凌虛騖遠壞異絶特之觀然華橺邃宇修欄曲檻崇廣靚深亦足以攄雅思而滌煩襟視故有殊而猶取昔名侯欲存前賢之義而施於政事者將有所推本侯名時侃字仲和今以司農卿兼知府事云趙非中和堂詩老來重守鳯凰城千里人心未易平樂職古賢形嘆頌中和終不為虛名有美堂名勝志在吳山頂宋嘉祐二年梅摯以龍圖閣出守仁宗賜以詩有地有湖山美之句因名其堂歐陽修為記蔡襄書今故址不存而府治後堂尚仍其名蘇軾與𫐠古自有美堂乘月夜歸詩娟娟明月照前軒瀲瀲星河半隱山魚鑰未收清夜永鳯簫猶在翠微間凄風瑟縮經絃柱香霧凄迷著髻鬟共喜使君能鼓樂萬人爭看火城還清暑堂乾道臨安志治平三年郡守蔡襄建在州治之左并撰記及書刻石堂上蔡襄清暑堂記杭於吳為一大都會其地傾而屬海又多陂池以故苦濕方春夏時梅雨蒸鬱礎甓皆汗披纎衣覆大厦猶鼻息奄奄不得曠快非有高明之居曷以禦之於是清暑之堂作焉清暑負州廨之左直海門之衝其風逺來灑然薄人日以決事佚而忘勞至者莫不悅之前有江海浩蕩無窮之勝潮濤早暮以時上下奔騰洶湧蔽映日月雷霆鼓駭方輿動搖浮商大舶往來聚散乎其中朝霞夕景不繢而彩翠旁走羣山濱山而湖崖隒瀰漫巖岫崒嵂岌乎河漢之上蒼煙白雲少頃萬變茂林香草冬榮不凋此所以娛君之視聽也及夫夏日比室煩煥方且披軒闥據高涼放浪於無何翺翔於至極簫然而自適或賓友環次鳴管揳瑟釃酒均餌歌呼暝醉此所以懌君之心意也於民乎何有豈不與昔人廬於逺野者異哉余謂之曰唯人之情不得其適則慌然余於是堂也愈吾疾亦於是休吾心焉體康志寧然後究民之不至而教之度民之所有而用之去其所不願就其所便安以得其平於為惠也亦大矣乘其間也燕賔朋接和好是亦為政也遂以其説為清暑堂記雙檜堂錢塘縣志在鳯凰山府舊治泊宅編東坡帥杭一日與徐璹坐雙檜堂上指檜吟曰二疏辭漢去以兄弟皆補外也璹對曰大老入周來講易堂咸淳臨安志在府治愛民堂東紹興十六年安撫張澄建名吏隱堂隆興元年郡守陳輝改名講易張孝祥書葛立方講易堂記事莫夥於官學莫邃於易遊刃叢劇之地嚌咀奧賾之境能於一時相兼而不相廢者戛戛乎其難哉福唐陳公逢掖時已覃思潔靜精微之教既筮仕靡勞弗宣聲大彰白天子知之特付衆大之區而牧焉公以一身任之無巨細畢濟其必有得其源者乃於府治之東為講易堂延龍舒易經師王虛中居之帥子弟從焉蓋欲窮其所未盡也虛中嘗著易論四十篇凖繫解易二十四卷大率顓以古易正文為主鈎深致逺自得於心又豈如前人屋上架屋之比哉陳公字晦叔名輝虛中名日休紹定壬辰安撫余天錫重建簡樂堂咸淳臨安志在府治設廳後光宗以青宫領尹奏疏有訟簡刑清百姓和樂之語後二年郡守胡與可托二字名堂且乞御書今府治後堂即其故址薛元鼎簡樂堂記輦轂之下雜八方人物缿筒訟牒抵讕糾紛最號為難理故於帥每難其人乾道辛卯東宫以民事到南衙如太虛一聲人自怙懼如半天一照毫髮無所逃既而為堂於設廳之背時出而從容其間若無事可理而畿甸熙熙盡在春風和氣中矣蓋嘗奏疏自期有訟簡刑清百姓和樂語不二年既效又二年胡與可承乏府事乃采其語以名堂仍請天書而榜之示將來法焉元鼎執經備數宫僚宜為紀其實且銘之曰浩穰繁劇情偽百出雖有智者莫窮目力惟是此心應以虛一鏡照媸妍繩分曲直物晦必明事虛必實姦伏自柅不在發擲事往心間庭空人寂故雖至勞而將至逸允矣前星行之昨日至今塗巷歡聲洋溢惟間則樂此理不易昭揭兹堂以垂千億承化堂咸淳臨安志在府治愛民堂後嘉定間安撫袁韶建三桂堂咸淳臨安志在府治承化堂側恕堂咸淳臨安志在府治清暑堂前紹定間安撫余天錫建松檜堂咸淳臨安志在府治中和堂西淳祐間安撫趙與􅊸建愛民堂咸淳臨安志在府治清暑堂東淳祐九年安撫趙與􅊸建明年理宗御書愛民篇因以名堂仍請御書為扁景蘇堂咸淳臨安志在府治簡樂堂西景定三年安撫魏克愚建萬厯杭州府志以蘇文忠嘗守郡故也見亷堂咸淳臨安志在府治中和堂前舊為七間堂咸淳五年安撫潛説友撤而新之樓其上最為高聳面南諸峰若拱若揖堂成適有足見亷能之褒因取為名馮夢得見亷堂記聖君以恭儉化天下歲下詔書廣宣厥道越郡國吏罔不用勸思所以風厲之動於耳目而周乎區蓋之間夫豈徒哉惟京尹卓犖諸夏知遠之近知風之自據會要以觀方來以為莫先於此而簡修之具行焉乃咸淳六年戶部侍郎潛君守京兆至是二年矣政修人和百為克開每歲終考其成無一人之獄計所裁縮代九縣輸四五等戶租一年樁釀庫本為緡凡五百萬此其大較也高第轉聞璽書數下嘉其亷平會斯堂落成白於朝因其亷能見名曰見亷將以習天下之為郡國者抑自今至於後日坐斯堂者亦將以存其見而使相為君子也夫灑掃庭內維民之章華衮一字其嚴矣哉烏乎得見有常者斯可矣嬰以亷恥故人矜節行聖賢揭厲人心之道槩如此夫亷非小善也漢時文翁黃霸朱邑尹翁歸之屬居官可紀一是為本史稱良吏凛凛甚盛故嘗論之平仲不受邑以足欲非惡富也是幅利也義也子文不勤民以自封非厭取也是庇民也仁也懷仁義以事君而亷在其中矣是皆無所為而為之也烏乎推是心也千載而下猶將見之潛君名説友字君高栝蒼人宣化堂劉基杭州路重修府治記杭為東南大郡寶珂公為總管理而新之其視事之堂即其舊名曰宣化秋香堂乾道臨安志在漕臺舊治轉運使劉既濟建節愛堂咸淳臨安志在兩浙轉運司寶祐初運使王克仁建周咨堂振襟堂寬民堂咸淳臨安志在兩浙轉運司並淳祐問運副魏峻建繡春堂公生明堂咸淳臨安志在兩浙轉運司並景定間運副魏克愚建仁惠堂咸淳臨安志在兩浙轉運司紹定初運副陳宗仁建浩春堂風月堂咸淳臨安志並在通判廳芙蓉堂咸淳臨安志在僉書判官廳咸淳四年安撫潛説友重建晝簾堂咸淳臨安志在錢塘縣舊治無倦堂倪思無倦堂記宋淳熙十一年陳鞏宰仁和葺縣舍北向數椽為齋名曰無倦安敬堂嘉靖仁和縣志在縣治宋嘉泰二年令胡巨卿建湖山堂咸淳臨安志在蘇公堤第二橋西咸淳三年安撫洪燾創棟宇雄傑面勢端閎岡巒層疊水光滉漾四浮圖列四隅前則雷峰保叔後則南北二高其後芙蕖菰蒲蔚然相扶後三年安撫潛説友增建水閣卓然為西湖最勝柏堂蘇軾孤山二詠引孤山有陳時柏二株其一為人所薪山下老人自兒時已見其枯矣然堅悍如金石愈於未枯者僧志詮作堂其側名曰柏堂與白公居易竹閣相連屬余作二詩記之錢塘縣志在西泠橋東坡所云九朝三見太平年是也隱居堂晏公類要後漢陸瑋隱居靈隱山學易圖淮南王及九師之像又名九師堂思真堂陸羽二寺記許邁字逺遊建在靈隱山錢塘縣志今靈隱山有許由舊迹是因逺遊而誤也其見於陸羽記者可證丹竈堂陸羽二寺記葛洪煉丹之所德生堂咸淳臨安志紹興間請以西湖為放生池慶元四年安撫趙師􅋷創德生堂於石函橋西內翰高文虎為記又作二亭於傍曰飛泳曰枕山董嗣杲德生堂詩引德生堂飛泳亭二扁皆御書涼堂四朝聞見録孤山涼堂西湖奇絶處也植梅數百株堂中素壁四堵蕭照畫鑑堂咸淳臨安志在孤山南漪堂董嗣杲西湖百詠引在錢塘門外菩提寺西東坡咏南漪堂杜鵑花詩即此後為玉壺園玉蓮堂咸淳臨安志在錢塘門外菩提寺南景定二年安撫馬光祖建三年安撫魏克愚奉玉蓮堂奎扁揭於此武林舊事原名一清堂萬厯杭州府志湖中競渡以此為奪標之所董嗣杲玉蓮堂詩引玉蓮舊在郡治教場之南景定三年移於錢塘門外扁曰一清後以堂外多種白蓮復揭玉蓮舊賜額閲古堂四朝聞見録在太廟側本韓魏公舊名托胄因名青衣泉曰閲古泉為流觴曲水有桃坡十二級雲巖之奇者曰雲岫湖堂乾道臨安志在豐豫門外堂前有集賢亭武林舊事舊在聳翠樓側薛昻題湖堂詩一段風煙不可關出門滿目是湖山昔人華厦今何在此日漁舟任自間鳯觀簇新霄漢上龍洲依舊水雲間歸來丘壑多幽趣願與諸賢約往還冰壑書堂武林舊事樞密金淵號冰壑嘗作書堂積慶永清二山在後平鼎山在左湖山在前乃南北二峰之中最高處也理宗御書積慶山怡顔藏書農圃以賜之翠樾堂見楊蟠西湖百詠西嶺草堂見楊蟠西湖百詠雪江書堂武林舊事在蘇公堤第四橋胡賢良侊所居曲江草堂錢塘縣志在五雲山下元錢惟善故居易恆題曲江草堂詩浣花去後鍾山遠今見風流在曲江八十儀型猶有幾三千詞賦總無雙屋頭秋老凌霜樹竹下春間聼雨窗好向西村尋舊隱月輪峰澗響飛瀧依光堂董嗣杲西湖百詠引本錢氏靈芝崇福寺紹興中阜陵臨幸因創堂扁曰依光萬厯杭州府志宋進士題名之地賀蘭堂袁桷賀蘭堂記靈武李公居錢塘三十年築其第之堂而名之曰賀蘭志不忘本也樂夀堂袁桷樂夀堂詩序葛嶺有堂顔曰樂夀容齋李公習靜之所山舟堂錢塘縣志在城南天龍寺內元貫酸齋雲石嘗讀書於此山舟二字雲石書愛蓮堂戴表元愛蓮堂記相臺唐伯榮居錢塘東圃有池植蓮其中生一莖雙花好事者繪為畫圖於是取周元公語名其並池之堂曰愛蓮快雪堂萬厯錢塘縣志在孤山四賢祠傍馮夢禎之别墅清愛堂嘉靖海寧縣志在舊縣治內郭知運清愛堂詩清愛堂前竹色佳留煙帶月翠橫斜日長吏散庭空後風景蕭蕭對瀹茶緑繞堂嘉靖海寧縣志在縣後圃陳申重修緑繞堂記豫至海昌之二年既葺故亭而新之榜曰仰高矣直亭而南有堂巋然上漏旁穿不知廢於何時詢之里人張似之云緑繞之名得於橫浦張先生蓋取王荆公一水護田之句風在職者使知農田為務特加修正以著遺範移植酴醿於後即支木為架敷條舒蔓其下可坐十人餘則盡循其故春夏之交雲隴收黃雪繅堆白稻田桑野蔥蒨彌望主人休其心於觀相彈琴不下堂見穎栗堅好之實邑民相與飽食而嬉里胥足不及門賦輸告辦吏塞責矣若乃素月流天蕙風飄香合杯促坐酣歌醉舞則非先生所以命亭之意豫恐有耽斯堂之勝而以民事為緩者故併書以記晞梅堂嘉靖海寧縣志在縣尉廨一經堂海寧縣志元朱圭建貢師泰一經堂記一經堂者海昌朱肅齋氏名之以訓其子參政周公伯溫所書也肅齋之子鐩從余遊請余為記余謂六經盡載聖人之道何獨取一經豈不以漢韋賢有一經教子之説耶不然將先明一經而他經從可明也夫經之目有六為説不同而道則未嘗不貫於一三五以降厯世益逺然其垂訓立教不過數十言而止至我夫子贊序刪正更加述作可謂極盛實亦不過數百卷而止耳以數百卷之書明數十言之旨簡易精潔如天地運行如日月照臨其道未嘗不廓然而公燦然而明也及秦漢諸儒各出己見務為專門議論詆訾於是簡册之多棟充牛汗既已湮塞聖道分裂經旨不可究極近世海內之士疲精竭力靡然向風恣為新奇之言巧節頗僻之見烏乎大道之晦一至於此向非周程張邵朱吕數君子者出孰能發微言於既昧之中尋墜緒於不傳之後乎今之學士大夫執其全書因以潛觀默識旁通四鬯則亦幸矣然有讀書萬卷而實無一言之得者有棎一言之要而終身守之不失者其故何也道之明與不明而已鐩也文公諸孫其庶幾有得於此歟不然雖日誦六經無益况一經哉合香堂富陽縣志在縣圃癸辛雜識先君宰富陽關縣圃鑿池建堂適有雙蓮之瑞因名合香堂取古詩風合兩花香之句瑞蓮堂萬厯杭州府志餘杭縣治內之東因白蓮花池故名元祐學堂咸淳臨安志在臨安縣治景定三年令家之巽建九龍堂萬厯杭州府志在臨安縣廳東北袞繡堂嘉靖於潛縣志宋隆興初令葉衡於廳之東偏築堂為退思之所慶元中衡入相令邵文炳名其堂曰袞繡嘉泰三年縣治火此堂獨存邵文炳袞繡堂記潛治山溪幽深其俗險而質其民徑而武故常難服而易化茍有以應所傒則相與愛敬而不忘金華葉公之來察里閭情偽鋭於植立廳事東偏有堂深靜而虛明為退思之所融融萬理出而施之所以洗濯而鼓舞其民者蒸蒸無復苟且之意邑人誇詡以為昔所未有後公來者欲踐武增光而未能也袞衣繡裳室邇人逺之歎及兹未泯不獨慰父老思戀而卉木映帶軒廡欣榮亦發越而形見焉登兹堂而遐觀心存古人夢接千載能使民安其生物得其所於以寫鳴絃之遺音歌袞繡之聲詩斯無愧矣景覽堂萬厯杭州府志在於潛縣治簿廳左梅隱堂高雅堂嘉靖於潛縣志並在縣治內深清堂萬厯杭州府志在新城縣治內取蘇文忠亂山深處長官清之句滴翠堂咸淳臨安志在昌化縣治面對羣山乾道八年令卞圜創朝陽堂萬厯杭州府志在昌化縣舊治宋縣令卞圜建三瑞堂萬厯杭州府志在昌化舊縣後宋景定中邑西鳯凰山産瑞麥及諸山産嘉禾嘉粟縣令劉宗憲表獻於朝理宗作詩紀之因作此堂而勒御書於上清白堂萬厯杭州府志在三瑞堂左宋咸淳中縣令李長孺建瑞應堂萬厯杭州府志在昌化舊縣簿廳後宋建又有應宿堂元建靜觀堂成化杭州府志在昌化縣南覽溪蕭源章氏山莊宋章詡建章詡首夏靜觀堂書懷詩杖䇿下層嶺來憩雲外莊簷低繞頽垣淡泊在一堂山高戶牖虛水清長夏涼翳翳動林影瀲瀲浮溪光心逺與世隔獨有文史香汲井資咽嗽蒔藥助體強園中橘為如沼內芰堪裳蒼官青不老籬下明秋芳陶情在庶物養性歸琴觴矯首起遐觀此中有濠梁晝錦堂昌化縣志在覽川宋處士章運之建損齋咸淳臨安志紹興二十八年十一月高宗出御札損齋記石本以賜羣臣諭之曰朕宫中嘗闢一室名為損齋置經史其中朝夕燕坐嘗作記以自警宋高宗損齋記嘗謂當天下之正位撫域中之萬微茍無以立其獨則多見弊精神疲意志而不知止廣宴遊事不急膠膠擾擾莫收其放心顧能回光抑損之道豈不較然有感於斯且漢唐之君樂道為切而未燭玄覽武帝以雄心非用損以持盈也明皇以侈心非知損以守位也推原本指俱失滿戒兹鑒往事夕惕以思凡追逐時好一切長物率屏去不復經意几案間但有書史商確古今盡撤無益示不貴之化其於蕩心侈目者罔不掃除清心寡欲省緣薄費者奉以周內焉不則染毫弄翰真草自如濃淡斜行茂密惟意第於筆硯間有未能忘情似賢乎已夫乾坤之道易簡也易簡則天地之理得矣傳曰器用不作車服從給信斯言哉宵旰餘暇乃闢殿廬之側明窗靜戶為遊息之所欣然托前説榜曰損齋朝夕清燕視以自警庶幾損德之修自奉養有節式稽於訓易安齋四朝聞見録光堯御書於郊壇易安齋曰謁款泰壇因過易安齋愛其去城不遠巖石幽邃得天成之趣為題梅巖詩高齋避暑録話在州宅內清暑堂之後舊踞城闉橫為屋五間下瞰虛白雖不甚高大而超出州宅之上故為州者多居之嚴維高齋詩詩家九日憐芳菊遲客高齋對浙江漁浦浪花搖素壁西陵樹色入秋窗木奴向熟懸金實桑落新篘瀉玉缸四子醉時多講德笑論黃霸屈為邦隱秀齋名勝志在通判北廳宋蘇軾書紹興四年始刻石趙令畤書其下莫能名齋咸淳臨安志在寶蓮山慈湖楊文元公創萬厯杭州府志在浙西安撫司幹辦公事廳內楊簡莫能名齋記四明楊簡為浙西撫屬淳熙十一年八月朔既領事而宅僦隘陋無晏息之所偶得在官僧屋於寶蓮山之顛帥君為更其居又使簡惟意規摹之乃創書室於高爽之地且曰是不可以不命名簡思所以名之東望大江巨濤際天越山對揖袞袞如畫風帆飛鳥夕陽煙蕪朝暮晦明變態百出於是間名之乎如此命名不惟遊逸沉溺要不可謂真識江山西望錢湖玉潔如鏡茂林奇峰樓觀輝目煙靄翠蒙模寫不可於是問名之乎如此命名不惟遊逸沉溺要不可謂直識湖山返而即諸本真斂其放情落其外慕窮理密之幽微探玄珠之杳冥不則事理兩融曲暢旁通百川會同歸宿乎中又不則悠然無事惟意所之無所造為樂亦熙熙於是問名之乎如此命名不惟遊逸沉溺俱不可為實識本真周思天下古今名言無一可以稱此又豈惟簡莫能名正恐盡明智絶識之士竭意悉慮終莫能名於是榜曰莫能名齋然則終不可得而名之乎曰有能名之者是齋之南高松扶疏微風過之蕭然有聲是能名吾齋矣是齋之東洪濤駕風怒號翻空是能名吾齋矣是齋之西湖光翠迷花飛鳥啼是能名吾齋矣是齋之北㕓紆其麓鱗比甍屋人物往復啾啾碌碌是能名吾齋矣有嘲曰既莫能名又曰是能名何其立説之無常簡曰常淳熙乙巳仲春月記西齋許渾有遊錢塘青山李隱居西齋詩又作李郢雪齋武林舊事在方家峪西林法慧寺武林雜記宋慶厯中僧法言作激水為池疊石為山灑粉樹杪狀若飛雪蘇軾題曰雪齋秦觀為記學古齋戴表元學古齋記州城之西西秦張仲實居之巴西鄧善之與仲實交分一室共居題曰學古齋浩然齋蓉塘詩話周密公謹晚年寓居錢塘癸辛街作癸辛雜識趙孟俯寄周公謹錢塘寓居詩三年漫仕尚書郎夢寐無時不故鄉輸與錢塘周老子浩然齋裏坐焚香困學齋戴表元困學齋記鮮于伯機為杭三司史掾方營一室名曰困學之齋選德齋萬厯杭州府志在海寧縣西廳之後思政齋嘉靖於潛縣志在縣治宋寶慶中令方熙重建依山占勝為他邑之冠石林軒乾道臨安志在舊府治後至和中郡守孫沔建初號燕思閣又取臨安淨土寺立石七株置之閣前蒼然奇怪號七賢石元祐中郡守蒲宗孟改名石林軒聽雨軒咸淳臨安志在府治中和堂後景定五年安撫劉良貴建取東坡詩中和堂後石楠樹與君對床聽夜雨之句為名清明平軒咸淳臨安志在府治簡樂堂後咸淳五年安撫潛説友揭諸便坐樂清軒徐一夔樂清軒記姑孰鄭君芳桂擢知錢塘治其公署之東偏為退食之所顔之曰樂清勤清軒萬厯杭州府志在舊錢塘縣治南屏軒四朝聞見録小南屏山面對南屏軒此君軒董嗣杲西湖百詠引在壽星寺西廊寺門坡下又有亭名一擊軒基不得而考一笑軒萬厯靈隱寺志在靈鷲借竹軒錢塘縣志在吳山舊瑞隆院傍宋秦觀曾宿軒中夢天女以維摩像求贊學士軒成化杭州府志在保叔塔右元集賢學士黃潛遊杭僧炬為築此軒舍之蘭芳軒貝瓊蘭芳軒記永嘉李至剛僑居錢塘城東闢室樹蘭其前顔曰蘭芳君子軒戴表元張園玩月詩序元大德戊戌八月合宴於君子軒之圃圃主清河張楧仲實其族子焴烈客剡源戴表元錢塘屠約龍泉陳康祖會稽王潤之戴錫嘉興顧文琛並集焉醉墨軒徐一夔醉墨軒碣錢塘俞和子中所居元至正時朝廷修宋遼金三史行文浙江行省繕寫鏤版屬子中校正萬玉軒西湖遊覽志在石人嶺後時思薦福寺側地近西溪最多古梅遊河渚者必至焉友梅軒劉基友梅軒記臯亭之山有隱者以友梅字其軒環其居皆梅也隱者王姓昶名挺立軒咸淳臨安志鹽官縣丞廳環緑軒嘉靖海寧縣志在長安鎮環水宋濓為鎮人遊氏賦云水竹佳致詩書雅懷樂只君子悠哉悠哉楝花軒舊浙江通志去海寧縣五十里環溪多棟因以名溪宋安化王之裔構數椽於上明青田劉基署曰楝花軒雙檜軒海寧縣志在悟空塔前蘇文忠公有雙檜詩又有問牛軒亦在塔前鹽官令張昱有詩掬月軒萬厯杭州府志在富陽縣後堂天趣軒萬厯杭州府志在餘杭縣南湖𢎞治間尚書鄒幹重建有秋軒嘉靖臨安縣志在縣廨西北宋景定三年令家之巽建深明軒咸淳臨安志在於潛縣治寶慶丁亥令方熙重建此君軒嘉靖於潛縣志舊名緑筠東坡行縣題詩後徙於縣治宋寶慶初易名此君在今儒學後軒洪咨夔此君軒記軒舊隸寂照精舍東坡倅杭行縣為賦不可居無竹之詩隆興初徙於縣治袞繡堂之東開禧間嘗重建寶慶初避上嫌名桐江方侯熙易名此君仍用坡詩取晉王微之語也蘇軾於潛僧緑筠軒詩可使食無肉不可居無竹無肉令人瘦無竹令人俗人瘦尚可肥士俗不可醫傍人笑此言似高還似癡若對此君仍大嚼世間那有揚州鶴日哦軒嘉靖於潛縣志在縣丞廳宋建婁機日哦軒詩高軒多暇日安寐獨怡神風俗無今古雲山自主賓灘平分燕尾松老半龍鱗徙倚清陰下吟成愧昔人緑筠軒輿地紀勝在昌化縣治掬雲軒銜翠軒夕霏軒昌化縣志並在縣治俱宋令卞圜建中和軒萬厯杭州府志在昌化縣後元建桃竹軒咸淳臨安志在昌化縣參寥子道潛有題王悅道桃竹軒詩鑑軒萬厯杭州府志在昌化縣浙江通志卷三十九
