body:
  text: 浙江通志卷三十九古迹一浙自吳越肇封以來上下幾千百年其間城郭宫室園林臺榭名賢之所興建達士之所登臨以及一名一物之奇雖世遠年湮不盡存於今日而流風餘韻可考而知搜羅舊聞以廣覩記載筆者之職也志古迹杭州府上古州城元豐九域志古州城隋楊素創太平寰宇記隋置杭州在餘杭縣十年移州理錢塘十一年復移州於柳浦西依山築城即今郡是也互見城池謹按隋書開皇九年平陳更置各州縣太平寰宇記所云十年乃文帝之開皇也吳越國城吳越備史唐大順元年王命築新夾城環包氏山暨秦望山而回凡五十里皆穿林架險而版築焉景福二年王率十三都兵洎役徒二十餘萬衆新築羅城自秦望山由夾城東亘江干洎錢塘湖霍山范浦凡七十里錢受徵吳越國治考舊城門凡十朝天門在吳山下今鎮海樓龍山門在六和塔西竹車門在望仙橋東南新門在炭橋東南土門在薦橋門外北上門在舊菜市門外鹽橋門在舊鹽橋西西關門在雷峰塔下北關門在夾城巷寶德門在艮山門外無星橋蓋當時城垣南北展而東西縮故曰腰鼓城也錢鏐杭州羅城記大凡藩籬之設者所以規其內溝洫之限者所以虞其外華夏之制其揆一焉故魯之祝丘齊之小穀猶以多事不時而城况在州郡之內乎自天下兵革而江左尤所繁併余始以郡之子城歲月滋久基址老爛狹而且卑每至點閲士馬不足回轉遂與諸郡聚議崇建雉堞夾以南北矗然而峙帑藏得以牢固軍士得以帳幕是所謂固吾圉以是年上奏天子嘉以拙政優詔奬飾以為牧人之道其盡此乎俄而孫儒叛蔡渡江侵我西鄙以剪以逐蹶於宛陵徑弩之次泛舟之助我有力焉後始念子城之謀未足以為百姓計東眄巨浸輳閩粵之舟櫓北倚郭邑通商旅之寶貨茍或侮劫之不意攘偷之無狀則向若吾皇優詔適足以自策由是復與十三都經緯羅郭上上下下如響而應爰自秋七月訖於冬十有一月由北郭以分其勢左右兩翌合於冷水源綿亘若干里其高若干丈民庶之負販童髦之緩急燕越之車蓋及吾境者俾無他慮千百年後知我者以此城罪我者亦以此城茍得之於人而捐之己者吾無愧與宋禁城宋史高宗本紀建炎三年升杭州為臨安府紹興八年定都三十一年五月增築禁城咸淳臨安志建炎三年二月詔以州治為行宫紹興元年十一月詔守臣徐康國措置草創二年九月南門成詔名曰行宫之門三年詔梁汝嘉創廊廡於南門之內十八年名南門曰麗正北門曰和寧東苑門曰東華二十八年增築皇城王同祖夜步內門詩靜夜高燈人未眠等間行過內門前一聲唱徹連珠喏碧月朱闌緑柳邊鹽官縣古城嘉靖海寧縣志在縣西北四十一里隋大業十三年築唐永徽六年又築周回四百六十步濠濶五丈深四尺今不存互見城池管城至元嘉禾志吳王築四城以禦越管城屬鹽官東安郡城名勝志東安郡城在富陽縣北十八里吳黃武中郡守全琮築富陽縣舊城名勝志富陽縣古城唐咸通十年縣令趙訥築去今城二百七十步富陽縣志元至正十六年楊完者重築後毁慶春河即古縣城濠永寧寺城宣德富陽縣志在榮國寺西北隅即今永寧寺咸淳臨安志城周十二里有屋七百十九間警樓十二座鋪舍一百十九所五代時城在縣東南錢氏以地逼江乃壘磚礫為之富陽縣志元至正十六年重築今不存餘杭縣舊城咸淳臨安志餘杭縣舊城在溪南後唐時號為清平軍城成化杭州府志莫詳所始營盤城萬厯杭州府志在餘杭縣南一里至正十六年楊完者即溪南舊城內築以守禦號為營盤城舊倉城咸淳臨安志在餘杭縣東南二里安樂山上唐永貞五年刺史張綱奏置倉宇四十二間天寶八載採訪使奏置常平倉同在城內錢氏廢倉建寺今名法善院倉址仍存東安鎮城吳越備史大順二年秋七月城東安鎮咸淳臨安志因山為城吳越錢王都將杜稜築羅隱東安鎮新築羅城記杭之别郡舊有八都之目而東安主領太師杜公尋以擒薛朗於京口破丅從實於毗陵天子寵之拜常州刺史遂屬其兵於子弟焉撫於內者曰建思禦於外者曰建徽經度於季孟之間者曰建威洎太師解印而歸淮叛淝偷連壓封部元帥大丞相彭城王始授君以板築之要濠塹之廣袤地里之橫亘皆取刖於大丞相鳩其民人相其險易惟師有令衆克從之起大順辛亥訖於明年蟠東矗西離連坎接隆者就之窪者盈之民不弛擔時不妨農夏五月甲辰太師犒羣帥於城下若杵若畚者皆與焉不三四年淮南節度楊氏行密擾我疆境而東安尤為其所忌行密減安仁義之精鋭分田頵陶雅金威之敢勇以攻東安城樓櫓翔空矢石交迸翊日我軍慿其城斃賊將於城下者其數盈千濠塞塹堙自是羣冦不復有圖南之意是知人非城則無以為捍城非人則無以自固不有城也人何以安不有將也城何以堅噫天下之無事也吾鄉則有河間凌凖宗一濮陽吳降下已汝南袁不約還朴以文學進天下之有事也吾鄉則有太師建徽伯仲及諸將佐以武藝稱豈文武之柄倚伏而然也抑江山稟受與時消息者乎太師以鎸金勒石見徵不敢堅遜乾寧五年記於潛縣舊城嘉靖於潛縣志在縣北二百四十步隋開皇十三年楊素築互見城池潛州城咸淳臨安志在於潛縣東七里置潛州時築今地名城嶺紫溪城咸淳臨安志在於潛縣南三十里潛川鄉城復村名勝志遺址在紫溪之上成化杭州府志唐置紫溪縣時築越王城咸淳臨安志在於潛縣東十五里阿頂山夏后少康之後封於越其支庶或居此今城址猶在又名平越城下有平越村其址與皇甫巖近新城縣古城萬厯新城縣志古城在縣東南唐時築四門城成化杭州府志新城縣又有富春桐江新鎮祠堂四門城今圯濠與遺址僅存吳越國治吳越備史梁龍德二年王建天下元帥府於興國門之右吳越國治考國治在鳯凰山下即鎮海軍使院唐以前州治也其子城南為通越門北為雙門錢氏納土後二門猶存咸淳臨安志州治只載錢氏造而不言在鳯凰山下政和二年孫沔守杭蔡襄為撰雙門記內云吳越王依山阜以為治是錢氏宫室在鳯凰山無疑南渡即其地為行都後人但知宋都而不知錢氏其立鐵幢識射潮處去鳯凰山僅二百步許此足為證也羅隱鎮海軍使院記鎮海軍舊治京口大丞相以錢塘之衆東揕漢宏西殱逆朗天子不易其土故自符竹四命然後移軍於錢塘生物以宜租賦以便斥去舊址廣以新規廓開閈關拔起階級俾幢節之氣色貔虎之出入得以周旋焉庚申年始闢大廳之西南隅以為賔從宴息之所左界飛樓右劘嚴城地聳勢峻面約背敞肥楹巨棟間架相稱雕煥之下朱紫苒苒非若越之今而潤之舊也其府屬以下或八都舊將或從公於征或稟之於朝廷或拔之於鄉里故天子用清宫傅道之選以佐之輟教民論道之任以副之其餘省秩卿曹職領枂次自我朝藩服官屬之盛無加也噫大丞相之勳德既藏之天府而攀鱗附翼者非鐫刻礫石其可久乎是年冬十月始命觀察判官羅隱為記吳越宫室五代史吳越世家梁龍德元年稱吳越國王更名所居曰宫府曰朝吳越備史天祐二年建功臣堂於府門西天成三年王親祀於都會堂初名八會亭六年麗春院火王遷居瑤臺院之綵雲堂文穆王治府於城北孝獻會王以采戲於青史樓六年九月王即位於仙居堂是月遷於思政堂七年以龍山武功堂為文穆王廟開運三年重建天寵堂四年二月有雉集於玉華樓七月有雉升於天册堂戟門十二月迎王於義和後院顯德二年七月有虹入天長樓在內城之東建隆元年大慶堂成咸淳臨安志中和堂錢王閲禮堂舊址吳越營屯吳越備史廣明元年杭州始建八都五代史吳越世家團諸縣兵為八都以鏐為都指揮使吳越國冶考營屯凡六白璧營在城南上隅寶劍營在鍾公橋北青字營在鹽橋東福州營在梅家橋東馬家營在修文坊大路營在褚家塘咸淳臨安志衣錦營在臨安縣石境山吳越郊臺武林舊事上石龍永壽院錢王郊臺近焉又名登雲臺宋宫室宋史高宗本紀建炎三年駐驆杭州即州治為行宫徐一夔南宋行宫考宋行宫在鳯凰山下即唐以來州治其宫殿之制文德殿謂之正衙垂拱殿謂之常朝紫宸殿上壽御焉大慶殿朝賀御焉明堂殿宗祀御焉集英殿䇿士御焉此四殿即文德殿隨事揭名非專建也後殿有四崇政殿一名祥曦福寧殿寢息之所復古殿燕間之所延和殿在垂拱之後遇齋戒御焉選德殿孝宗建以為射殿緝熙殿理宗闢以為講殿熙明殿度宗改東宫之益堂為之而講筵延閣並在禁中至於東宫初無定制如孝宗之資善堂度宗之益堂皆在禁中遂以為就學之地又有欽天孝思二殿以奉神御則仍東都之舊制武林舊事故都宫殿門曰麗正和寧東華西華苑東苑西北宫南宫南水東水會通上閣宣德隔門斜門關門王華閣門含和眙謨二門在天章閣其正殿曰垂拱文德大慶紫宸集英後殿曰延和崇政即祥曦福寧復古選德緝熙熙明明華清燕膺福慶瑞射殿需雲符寶嘉明明堂即文德坤寧穠華慈明慈元仁明進食即勤政欽先孝思清華堂曰翠寒澄碧觀堂芳春凌寒鍾美燦錦燕喜靜華清賞稽古清遠清徹澄碧蘂淵環秀文囿書林華館衍秀披香德勤雲錦清霽緑蕚華又名瓊姿碧琳凝光澄輝繡香呈芳會景正始怡然信美齋曰損齋彛齋謹習燕申樓曰博雅觀德萬景清暑清美明逺倚香閣曰雲章清華凌虛清漏倚桂來鳯觀音芙蓉萬春臺曰欽天宴春秋芳天開圖盡舒嘯蹌臺軒曰晚清閣曰清華睿思怡真容膝受釐緑綺觀曰雲濤亭曰清泳清趣清暉清皓清迥清隱清寒清激清玩清興靜香靜華春妍春華春陽春信融春尋春映春餘春留春皆春寒碧寒香香瓊香玉香界碧岺灧碧瓊英瓊秀明秀深秀衍秀濯秀錦煙錦浪繡錦萬錦麗錦叢錦照粧浣綺綴金綴瓊穠香暗香晚節香巖香雲岫映波含輝達觀秀野凌寒涵虛平津真賞芳遠垂綸魚樂噴雪流芳芳嶼玉質此君聚芳延芳蘭亭激湍崇峻惠和浮醴泛羽凌穹迎薰會英正已丹暉凝光雪徑參月共樂迎祥瑩粧植杖可樂文杏壺中天别是一家春園曰小桃源杏塢梅岡瑤圃村莊桐木菴曰寂照怡真坡曰瑪瑙洗馬橋曰萬歲清平春波玉虹教場曰南教場北教場宋德壽宫宋史高宗本紀紹興三十二年六月名新宫曰德壽夢粱録在望仙橋東高廟倦勤命建宫殿以德壽為名後生金芝改殿曰康壽高廟雅愛湖山於宫中鑿一池引水注入疊石為山象飛來峰有堂曰冷泉孝宗曽賦長篇玉堂雜記德壽宫中分四地隨時遊覽東地分香逺清深月臺梅坡松菊三徑清妍清新芙蓉岡南地分載欣射廳臨賦燦錦至樂半丈紅清曠瀉碧西則冷香文杏靜樂浣溪北則絳華俯翠春桃盤松嘗見御製盤松贊墨本又見御製祭土地文咸淳臨安志孝宗受禪移御德壽宫改曰重華後憲明皇太后御改曰慈福壽域皇太后御改曰慈壽宋諸閣玉堂雜記諸閣皆在禁中藏祖宗御書圖籍寶瑞建炎以來朝野雜記太宗龍圖閣真宗天章閣仁宗寶文閣神宗顯謨閣哲宗徽猷閣徽宗敷文閣高宗煥章閣孝宗華文閣光宗寶謨閣寧宗寶章閣理宗顯文閣太祖英宗無御集故不設閣宋郊廟宋史高宗本紀紹興四年詔祀明堂作行禮殿於教場五年建太廟於臨安十三年築園丘建景靈宫咸淳臨安志郊丘在嘉會門外龍華寺西壇四成分十二陛陛七十二級青城齋宫及望祭殿以幕屋為之大殿曰端誠便殿曰熙成外為泰禋門祭用元祐郊禮合祭天地設大神大示及太祖太宗配位并從祀諸神凡七百七十有一明堂即文德殿太廟在瑞石山左正殿七楹分十三室太祖太宗真宗仁宗英