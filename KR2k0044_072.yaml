  text: 浙江通志卷七十三户口三台州府晉晉書地理志臨海郡户一萬八千唐通典臨海郡户五萬五千六百五十八口三十二萬四千九百六十一元和郡縣志開元户五萬宋赤城志大觀三年以來主客户二十四萬三千五百六主客丁二十四萬三千二百四幼丁主客二十四萬六千六百四十嘉定十五年主客户二十六萬六千一十四主客丁三十一萬八千二百一十九幼丁主客户二十二萬九千九百九十元元史地理志户一十九萬六千四百一十五口一百萬三千八百三十三明嘉靖浙江通志台州府户七萬一百六十三口二十四萬六千一百三國朝舊浙江通志原額户口人丁二拾二萬伍千一百陸拾肆丁康熙二十年實在人丁一拾㭍萬一千一百玖丁伍分賦役全書康熙四十年實存人丁一拾陸萬肆千伍百捌拾陸丁伍分康熙六十年實在人丁拾㭍萬二千捌百二拾捌丁口雍正四年實在人丁拾㭍萬二千陸百陸拾肆丁口雍正九年實在人丁拾㭍萬陸千伍百一拾肆丁口臨海縣前係照人起丁今改照糧起丁原額户口人丁捌萬玖千捌百捌拾一丁口康熙二十年實在人丁陸萬捌千二百叄拾二丁口康熙六十年原報原額人丁㭍萬二千陸百玖丁口雍正四年實在人丁㭍萬二千捌百捌拾陸丁口賦役全書原額田地山塘等項除荒棄并籍田壇廟基地加升科共實徴銀叄萬二千陸百㭍兩玖分叄釐玖毫一絲一忽陸微㭍塵捌渺肆漠肆埃叄纎玖沙內除屯田徴銀二拾叄兩二錢捌分叄釐玖絲不派外實該銀叄萬二千伍百捌拾叄兩捌錢一分捌毫二絲一忽陸微㭍塵捌渺肆漠肆埃叄纎玖沙共實徴米一萬叄石二斗玖升叄合玖抄㭍撮捌圭玖粟陸粒玖黍玖粞肆粳二粃每銀一兩捌錢肆分二釐柒毫陸絲柒忽二微陸塵柒渺叄漠柒埃二纎叄沙又米伍斗陸升伍合柒勺叄抄叄撮一圭二粟叄粒玖黍陸粞二粳一粃派男子有妻一丁每銀一兩伍錢柒分叄釐二毫陸絲一忽一微捌渺陸漠柒埃柒沙又米肆斗捌升二合玖勺玖抄肆撮二圭一粟柒黍肆粳叄粃派男子無妻一丁每銀肆兩叄錢二分伍釐肆毫柒絲陸忽一塵伍渺玖埃柒沙又米一石叄斗二升柒合玖勺二抄玖撮伍圭二粟叄粒一黍伍粞一粳一粃派老幼疾丁一丁每銀一兩肆錢叄分玖釐陸毫伍絲玖忽叄微捌塵叄渺二漠柒埃伍纎陸沙又米肆斗肆升一合玖勺柒抄捌撮二圭二粟一粒玖黍柒粞二粳二粃派食鹽課口一口雍正九年編審舊管人丁柒萬二千捌百捌拾陸丁口新收人丁一千玖百陸拾陸丁口開除人丁一千叄百肆拾玖丁口實在人丁柒萬叄千伍百叄丁口內實在男子有妻一萬玖千陸丁內除原額完賦男子有妻一萬柒千陸百捌拾二丁每丁徴銀捌分陸釐共徴銀一千伍百二拾兩陸錢伍分二釐每丁徴米二合一勺共徴米叄拾柒石盛世一斗叄升二合二勺外實省寄居人丁一百伍拾滋生增益男子有妻內别肆丁浙省土著人丁一千肆百丁共增益人丁一千伍百伍拾肆丁永不加賦實在男子無妻二萬一千玖百叄拾叄丁內除原額完賦男子無妻二萬㭍百一拾一丁每丁徴銀伍分伍釐共徴銀一千一百叄拾玖兩一錢伍釐每丁徴米二合一勺共徴米肆拾叄石肆斗玖升叄合一勺外實盛世滋生增益男子無妻內别省寄居人丁一百捌拾捌丁浙省上著人丁一千二百一拾丁共增益人丁一千叄百玖拾捌丁永不加賦實在老幼疾丁柒千玖百一拾玖丁內除原額完賦老幼疾丁柒千伍百叄拾叄丁每丁徴銀肆分柒毫共徴銀叄百陸兩伍錢玖分叄釐一毫共丁徴米二合一勺盛世共徴米一拾伍石捌斗一升玖合叄勺外實不加滋生增益土著老幼疾丁叄百玖拾陸丁永賦實在食鹽課口二萬肆千二拾捌口內除原額完賦食鹽課口二萬二千陸百叄拾叄口每口徴銀玖釐叄毫共徴銀二百一拾兩肆錢捌分陸釐玖毫每口徴米二合一勺共徴米肆拾柒石伍斗盛世二升玖合叄勺外實內别省寄居課口二百一拾滋生增益食鹽課口二口浙省土著課口一千叄百捌拾肆口共增益課口一千伍百玖拾陸口永不加賦以上共徵銀叄千一百柒拾陸兩捌錢叄分柒釐共徵米一百肆拾叄石玖斗柒升叄合玖勺黃巖縣前係照人起丁今改照糧起丁原額人丁二萬一千一百陸拾玖丁口康熙二十年實在人丁二萬二千肆百柒拾肆丁口康熙六十年原報原額人丁二萬叄千肆百捌拾陸丁口雍正四年實在人丁二萬叄千伍百柒拾玖丁口賦役全書原額田地山塘等項除官學田地塘屯田銀米各欵例不派丁外實該銀二萬玖千陸百捌拾玖兩玖錢叄分二釐一毫玖絲柒忽捌微一塵玖漠肆埃一纎實該米一萬一千二百伍石捌升肆合肆勺玖抄玖圭一粟叄粒伍粞玖粳每銀二兩叄錢二分柒釐柒毫玖忽叄微伍渺玖漠捌埃二纎捌沙又米捌斗柒升捌合肆勺捌抄伍撮陸圭伍粟一粒玖黍柒粞二粳捌粃派男子成丁一丁每銀一兩二分陸釐捌毫伍忽一微玖塵玖渺捌埃叄纎伍沙又米一石一斗肆升二合叄勺二抄陸撮捌圭玖粟二粒柒黍肆粞二粳陸粃派食鹽課口一口雍正九年編審舊管人丁二萬叄千伍百柒拾玖丁口新收人丁柒千一百叄拾陸丁口開除人丁陸千叄百柒拾玖丁口又歸轄太平縣滋生丁口肆拾一口共開除丁口陸千肆百二拾丁口實在人丁二萬肆千二百玖拾伍丁口內實在男子成丁一萬叄千肆百㭍拾柒丁內除原額完賦男子成丁一萬二千㭍百伍拾伍丁每丁徴銀一錢捌分肆釐共徴銀二千叄百肆拾陸兩玖錢二分每丁徴米一升伍合捌勺共徴米二百一石伍斗二升玖合外實盛世滋生增益男子成丁內别省寄居成丁肆拾肆丁浙省土著成丁玖百陸拾玖丁共增益成丁一千一拾叄丁永不加賦實在食鹽課口一萬一百二口內除原額完賦