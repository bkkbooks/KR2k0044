body:
  text: 浙江通志卷一百七十七人物五儒林下衢州府南北朝鄭灼南史本傳字茂昭東陽信安人幼聰敏勵志儒學少受業於皇侃梁簡文在東宫雅愛經術引灼為西省義學士承聖中兼中書通事舍人仕陳武帝文帝時纍遷中散大夫後兼國子博士未拜卒灼性精勤尤明三禮少時嘗夢與皇侃遇於塗侃謂曰鄭郎開口侃因唾灼口中自後義理益進家貧抄義疏以日繼夜筆毫盡每削用之嘗蔬食講授多苦心熱若瓜時輒偃卧以瓜鎮心起便讀誦其篤志如此宋愼知禮傳詳孝友劉絢宋史本傳字質夫常山人以蔭為長子令歲大旱府遣吏視傷所蠲稅財二三絢力爭不得封還其揭請易之富弼歎曰真縣令也元祐初韓維薦其經明行修為京兆府教授王巖叟朱光庭又薦為太學博士卒於官絢力學不倦最明於春秋程皓每言他人之學敏則有矣未易保也若絢者吾無疑焉續文獻通考絢深於春秋作傳未就病劇尚以例類質其父垂絶猶道詩書語可謂篤於學者周穎𢎞治衢州府志字伯堅開化人受業安定胡公以行義稱與趙公抃遊抃為諫官穎嘗移書曰當公心以事君平心以待物無以難行事強人主無以私喜怒壞公朝賢士大夫抃以書進仁宗欲用之熙寧詔舉有學術者守以穎薦賜進士第授校書郎王安石問新法何如對曰歌謡甚盛因髙誦曰市易青苖一路蕭條安石不樂出宰樂清有文集行世朱子景行堂記正介先生周君穎之行信於鄉而聞於朝其立言垂訓褒善貶惡足以為後世法祝常兩浙名賢録字履中常山人從胡安定學操履端毅未嘗以辭色借人登進士第王安石深器之時有詔解三經義常出正義反覆辨難論者韙之遂忤安石意出令平陽終殿中丞有蓬山類苑元誥正謨諸論及清高集行於世劉牧𢎞治衢州府志西安人字牧之登進士終屯田員外郎授易數於穆修著易解與易象鈎隱圖王安石志其墓吕防明一統志龍遊人熙寧中進士有學行龍遊士子發舉自防始纍官至大中大夫舊浙江通志字大防嘉祐末於縣南雞鳴山設義學士之慕道從遊者衆一日登山見雞鳴棘叢中張羅飼之得白金十數鎰輸之官江緯兩浙名賢録字彥文常山人元符三年以太學生上封事哲宗召對稱旨賜進士及第緯精於經學口授諸生能發前儒未發之旨從子少齊少虞漢皆從受業若負笈而至者則汪藻程俱李處業趙子盡等七人擢科顯仕時人指為文中虎遂扁講學之所曰七賢堂紹興間任太常少卿以言事忤時乞身歸老卒江躋𢎞治衢州府志常山人字元壽登大觀二年進士第為殿中侍御史在朝論事以正心誠意為本紹興初率全臺攻丞相朱勝非更五六疏忤旨一時俱罷後髙宗思之賜手詔以司農卿召未及用卒贈銀青光祿大夫徐存𢎞治衢州府志字誠叟江山人從龜山楊時學朱熹來訪甚佩服有六經講義中庸論孟解門人如周賁周孚柴衛鄭雍陸律江泳後皆知名方輿勝覽逸平先生徐存受業於程氏之門人學與行高講道於家弟子自逺至者常以百數柴禹聲嘉靖浙江通志字元振衢州人受業於楊龜山屢魁鄉薦學者宗之紹興間髙閌擢國子司業以禹聲堪充史館特薦於朝兄禹功字懋績晚亦遊龜山之門夏僎兩浙名賢録字元肅龍遊人與周升繆景仁為友皆以明經教授時號三俊俱舉進士僎常語其徒曰文雖小技自有上達之理但為科舉所纍故判本末為兩途耳著有柯山書解劉愚宋史本傳字必明龍遊人幼警敏方學弱冠入太學有聲受業者甚衆上舍釋褐居第一調江陵府教授早晚為諸生講説同僚相率以聽移安鄉縣令民不見吏而賦自足邑有范仲淹讀書地為繪像立祠士競知勸雅不樂仕進遂致仕頽垣敗壁蓬蒿蕭然著書自適書禮語孟皆有解年八十三卒門人私諡曰謙靖先生鄒補之嘉靖浙江通志字公袞開化人受業朱吕之門淳熙初舉進士判江寧府著有春秋語孟注兵書解宋朝職略等書江介舊浙江通志字邦直開化人少穎悟一日讀程子書至水清性善之説大有感悟復與朱子相講明官數郡皆有惠政士民爭繪像立祠轉奉議郎卒鄭升之𢎞治衢州府志字公明師徐存擢進士第除學官嘗論學術之害莫甚老莊乞勿命題論甚切至召試館職後為吏部郎守賀州有文集元江孚𢎞治衢州府志常山人受業於金華許文懿公之門以書經中至順壬申科鄉第考官劉嶽申葉峴見孚龍虎臺賦驚異將上之尋以罷科而止時選賦者類聚五百餘篇僉以孚作為最刻為學者矜式弟起詞氣雄辨與伯兄叔戴齊名人號三江先生云魯貞明一統志開化人著有春秋案斷中庸解易注余闕薦之不起𢎞治衢州府志貞字起元元統二年舉人明何初明一統志常山人博通經史洪武中知仁化縣遷巴東教諭召修書傳書成調開化造就人才士風為之益振徐蘭𢎞治衢州府志字與善開化人洪武初入試京闈官至助教通五經尤精於書所著有書經體要門人歐陽齊進於朝有自鳴藁鳴陽藁五經格式藏於家有為學次第傳於世吾冔分省人物考字景瑞開化人通書易春秋以鄉舉入太學與蘭溪章懋安福劉戩四明楊守址友責善輔仁多所禆益既而諸子皆舉進士冔太息曰親老矣尚擇祿為耶就江浦教諭迎父就養教以敦本力踐為先務鑿池種蓮亭其中曰求樂與莊行人昶灑然於吟風弄月之趣久之乞終養歸朝夕養志不違執親喪一於禮老猶毁頓與弟􅌔友愛無間復遠祖祠田歲時祭掃胥宴集以合族焉冔學專為已不溺於記誦辭章之習四方來學者履常滿冔書太極西銘示為學本原又謂學者曰學須養氣氣充即天下事無不可辦者人士即其所居稱文山先生兩浙名賢録著有朱子讀書法還山稿五針解等書鄭伉獻徵録字孔明常山人十三讀易治舉子業二十為博士弟子及省試一再不合棄之曰顯親揚名恐不在是也乃走豐城拜於丁潛軒之門求踐履實學時年三十餘矣復見吳康齋於崇仁康齊曰此間工夫非朝夕可得恐誤子逺來對曰此心放逸已久求先生復之耳敢欲速乎因受小學日自驗於身心徐得聞四子六籍之要久之於道有見乃歸築室於龍池之上日取諸儒議論一切折衷於朱子一時名公若章楓山吾文山張東白皆與相可否著有易義發明卦贊讀史管見觀物餘論蛙鳴集王璣傳詳名臣徐璉舊浙江通志字良器開化人號南澗師表學宫務敦踐履宋鴻兩浙名賢録字用儀開化人學務深潛每事必求實踐受易於吾冔為所器重四方從遊者甚衆端本正業多所造就司訓宜興以道自尊士民愛慕人人以為父師手不釋卷對妻子如嚴賔至於聲利泊然若遺人不得窺其際也卒於官著有白石漁溪慈石缶音諸稿周積儒林録字以善號二峰江山人少遊章楓山門後復受易於蔡虛齋庚午舉於鄉聞玉陽明倡道東南往師事之初疑知行合一之説陽明反覆示以立誠之道遂超然有悟嘉靖丙戍謁選授南安推官有古循良風陽明將大軍征思南供給調度自廣班師度大庾得疾薨積躬親殯殮心喪三年如一日升知沅州政聲大起遷德王府長史踰年致仕歸年踰八十猶矻矻如壯夫性喜講學晚年矯其弊曰為學如治病學不身體力行是徒講藥方類也人以為至言卒年八十三徐霈衢州府志字孔霖江山人嘉靖辛丑進士師王守仁悟良知之旨為監察御史抗疏救夏言廷杖出為河南督學造士尤多轉廣東布政使以清介聞致仕歸築書舍於東溪著書談道老而不倦壽九十五王之稷舊浙江通志字惟烈西安人登嘉靖癸邜鄉薦從李襄敏講王陽明學初仕含山令加意惠民遷達州守政績益著鐫六經要旨及蒙訓女訓家禮小學諸書以勸後學生平純孝周恤宗族惠施戚里身心性命之學措諸躬行子任衡亦以學行稱葉秉敬西安縣志字敬君弱冠擢省魁萬厯辛丑成進士𣙜荆關有寬政守大梁督學中州士民稱之參江藩以憂歸起荆西尋移南瑞未行卒秉敬淹貫萬卷著述鴻富擁臯比講學四方請益盈户外撰書凡四十餘種海內稱為名儒方應祥衢州府志字孟旋西安人為文根極性命自闢阡陌非六經語不道萬厯丙辰進士授南兵部職方郎例多餽遺應祥悉却除之轉祠部郎厯升提督山東學政奔母喪歸尋卒應祥山居時講求性命之學從逰者踵相接遂擴廬舍以居之發明身心性命之旨循循善誘誨之不倦人比其功不下濓溪伊川云蔣泰賔開化縣志字嘉仲性孝友清介嚴正不妄友一人以貢入南雍選職未就遂杜門不出聚後輩講學年八旬手未嘗釋卷著有三經祕録易存詩可春秋取銑溪山堂詩文四卷一日無疾坐逝及門誄之曰在漢林宗在宋康節靜修魯齋先生弗屑時以為確論嚴州府宋喻樗宋史本傳字子才其先南昌人後徙嚴少慕伊洛之學中建炎三年進士第趙鼎去樞密居常山樗往謁因諷之曰公之事上當使啓沃多而施行少啓沃之際當使誠意多而語言少鼎竒之都督川陜荆襄辟為屬紹興初髙宗親征樗見鼎曰公度此舉果出萬全乎鼎曰義不可更屈故贊上行耳事之濟否非鼎所知也樗曰然則當思歸路鼎曰䇿安出樗曰張德逺有重望居閩莫若使其為江淮荆浙福建等路宣撫使俾以諸道兵赴闕下命下之日府庫軍旅錢榖皆得專之宣撫來路即朝廷歸路也鼎入奏起浚知樞密院事浚至執鼎手曰此行舉措皆合人心鼎笑曰子才之功也於是往來鼎浚間多所禆益授祕書省正字樗與張九成皆言和議非便秦檜既主和出知舒州懷寧縣通判衡州已而致仕起為大宗正丞轉工部員外郎出知蘄州孝宗即位用為提舉浙東常平以治績聞淳熙七年卒嚴陵志樗建德人號玉泉著有中庸大學論語解及玉泉語録行世方慤兩浙名賢録字性夫桐廬人性至孝父死廬墓三年領鄉薦表進禮記解於朝詔賜上含釋褐而頒其書於天下學者宗之居官以剛亷稱家置萬卷書堂雖老手不釋卷朱文公嘗曰方氏禮記解儘有説得好處不可以其新學而黜之錢時嚴陵志字子是淳安人弱冠淹通經史以易領漕舉絶意仕進究明理學遊慈湖之門為高弟袁甫持節江東創象山書院延主講席學者興起相臣喬行簡薦之朝授祕閣校勘下有司令取所著尚書演義學詩管見周易釋傳四書管見兩漢筆記繳進未幾出佐浙東倉幕召入史館除檢閲丐祠授江東帥屬歸淳祐五年卒慈湖嘗為書融堂二大字門人稱融堂先生有國朝編年春秋大旨百行冠冕冠婚記蜀阜前後稿嘉定講書稿英烈廟實録錦江雜著諸書行於世郡守季鏞縣令虞兟各肖其像祠於學詹儀之明一統志遂安人時張栻守郡吕祖謙分教儀之日以學問為事嚴陵志字體仁紹興二十一年進士淳熙二年知信州及帥廣東首以濓溪舊治立祠曲江上後論廣鹽官鬻之弊孝宗韙之除吏部侍郎知靜江府代者中以飛語遂有袁州之行既歸而殁公論惜之徐孝恭嚴陵志字季中淳安人與兄孝寧孝友自邑郭遷河溪杜門讀書五經皆精究而孝恭尤深於易人號五經徐氏隆興淳熙間兄弟聨登進士第孝恭主德化簿政教兼善士多從之趙彥肅兩浙名賢録字子欽建德人天資孝友務聖賢之學窮理盡性弗深造自得弗措也登乾道進士第宰臣周必大薦之甚力彥肅益以近名為嫌仕至寧海軍節度推官著有易説廣雜學辨士冠士昏饋食圖行於世朱文公觀其書嘆曰近世未有如此看文字者學者稱復齋先生胡子亷嚴陵志淳安人自幼愼重不茍言笑弱冠博極羣籍不肯作舉子文字聞東萊吕成公之學遂從之遊盡得其趣窮居樂道以終其身方鎔兩浙名賢録字伯冶淳安人兩魁郡試後棄去盡心聖賢知行之學每曰人與天地對立者文藝云乎哉日訓諸子所講明必以窮理盡性為先至應事接物則以持敬實踐為功二子逢辰逢振前後及第乃曰吾昔以為不足為者爾曹勿謂足也厯官奉直大夫兩淮制置司參謀官胡應璣嚴陵志字粹翁淳安人講明性理之學隱居教授不求仕進著理髓三卷學者宗之洪揚祖兩浙名賢録鎮東節度判官璞之子嘗從袁甫錢時講貫義理之學以切直忤時調寧浦教授辟廣西帥幕論嶺南買鹽及橫山以錢易馬事多所禆益遷京教除太博置登善録士多嚮風召試館職除正字輪對者三懇懇以正心誠意啓沃號溪有文集藏於家吕人龍萬厯嚴州府志字首之淳安人登景定三年進士第嘗受業錢融堂之門講明義理所造日高胸次灑然有浴沂詠歸氣象學者因其所居稱為鳯山先生有鳳山集行世陸震發萬厯嚴州府志字德甫淳安人少聰敏淹洽而尤明於春秋淳祐中知州王佖薦之朝以親老乞鄉校官就養乃授學諭嘗撰修學記云人心本自虛明廣大無賢不肖均具至理特患物於物而不能物物耳其修已教人一本諸此著有春秋講義藂志一卷方逢辰廣輿記淳安人鎔子舉進士第一官吏部尚書因賈似道秉政遂乞歸杜門講學稱蛟峯先生嘉靖浙江通志元世祖詔起之辭不赴卒於家逢辰無書不讀而會極於周程諸子之學所至以教化為先務以繼往開來為己任著有孝經解易外傳尚書釋傳大學中庸注釋格物入門諸書嚴陵志字君錫初名夢魁理宗改今名度宗賜手詔云近進士一科文章盛而古意衰卿以儒碩創家孰以程朱之學淑其徒朕甚嘉之其眷遇如此方逢振嚴陵志字君玉逢辰弟登景定三年進士第厯太府寺簿宋亡退隱聚徒講學於石峽書院以終焉學者稱山房先生傅嵩之嚴陵志字宗山壽昌人刻志好學通詩書戴禮弱冠以兩經領鄉薦鄉人尊之稱平齋先生咸淳四年與子明龍同登進士第而嵩之為榜眼授慶元觀察推官以內艱不赴服闋丞相馬廷鸞言於朝調平江觀察推官以勤政卒何逢原兩浙名賢録字文瀾分水人咸淳中纍官中書含人陳時政十事言甚剴切已而引疾去至元中薦授福建儒學提舉辭不赴卒於家逢原專究經史旁通隂陽星厯醫藥之書著有易詩書通旨四書解説玉華集若干卷藏於家何夢桂嘉靖浙江通志字巖叟淳安人咸淳進士為太常博士歷監察御史所著有易衍中庸致用等書嚴陵志元初御史程文海薦之朝授江西儒學提舉不赴築室小有源著書自娛學者稱為潛齋先生魏新之嚴陵志桐廬人受業於方蛟峯得程朱性理之學登咸淳七年進士第除鄞府教授歸隱鄉里學者稱石川先生方一夔萬厯嚴州府志字時佐淳安人幼承家訓壯與何潛齋諸老遊學問該博行誼醇篤應薦領教郡庠未幾退隱富山授徒講學門人稱富山先生有富山遺稿元夏希賢嚴陵志淳安人究明性理洞詣本原而會其極於象山慈湖之要杜門不出者三十餘年家貧泰然有古君子風學者稱之曰自然先生子清之大之潛之皆承家學方道睿嘉靖浙江通志字以愚淳安人至順二年進士授翰林編修所撰后妃功臣諸傳筆削大義獨斷於心無能議者調嘉興推官凡讞囚必脫其桎梏賜之飲食溫言和氣以探真情再調杭州判官引疾歸著有春秋集釋十卷愚泉集詩稿十卷詩説文説各一卷邵大椿嚴陵志字春叟壽昌人號顧齋年十二領鄉魁赴南省不利歸益勵志明於理學厯壽昌龍遊教諭主晦菴書院山長元初士子溺於辭章之習大椿倡明理學以淑人心學者始知所趨向著有四書講義若干卷魯淵傳詳忠臣明張復嚴陵志字明善淳安人德性宏毅博通五經而尤邃於春秋郡守親聘司訓郡庠學者翕然宗之稱為書隱先生著有春秋中的一卷至今論淳安春秋者必曰吳朝陽宋夢鼎魯道源張明善四先生云洪源萬厯嚴州府志字子泉享安人少知問學尤精於易洪武中以太學生授安仁學諭專以明道務實為先每謂諸生曰講學須明聞道須行母飾外以叨虛名厯教滁州邵武福州持心如一日既卒以子璵貴贈工部主事鄭棠夀昌縣志字景召少從鄉先生邵顧齋明性理之學且逺宗東萊之傳邑生儒皆師事之質以經史奧義口如涌泉浙江分巡魏觀延見甚加禮焉嘗歎曰道學淵源文章富贍近代莫及也劉候萬厯嚴州府志字原道一字伯元壽昌人年十九以詩經領正德庚午鄉薦受業陽明先生學有源委嘉靖十三年提學林雲同聘主天真書院一時學者皆趨焉洪鼐兩浙名賢録字廷器壽昌人數歲父口授尚書過耳不忘稍長博綜子史百家下筆千言立就父喪哀毁肖像於室旦夕饋食如事生領正德庚午鄉薦授福建邵武教諭廣置學舍館諸生之貧者而衣食之薦推國子助教出判鳳陽歸築室蓮谷精研理學貫通六經妙契一中之旨毅然以明道為任士類宗之著有讀易索隱大學參義中庸通旨八詠析言等書行於世陳瑭萬厯嚴州府志字良用建德人嘉靖壬午舉人與同邑俞淳從章懋遊後授長泰知縣有聲擢刑部主事淳授博羅訓擢鄱陽諭今祀博羅方應時萬厯嚴州府志字以中遂安人鋭志潛修一宗紫陽之學為諸生即請邑令復瀛山書院建格致堂以祀文公舉孝亷則延錢塘王先生汝止登格致堂講學不輟逮令長泰故朱子所治邑也舊有祠祀會時宰議廢宇內書院是祠亦在毁中應時力請當道特疏留祀升南繕部郎肅清𣙜政告歸創宗祠仍仿文公家禮刻復古維風録瀛山書院志讀書漫興稿溫州府宋王景山萬厯溫州府志初名開祖永嘉人登皇祐第不調而歸時伊洛諸儒未作景山獨能發明經藴著儒志編曰復者性之宅無妄者誠之源又曰學者離性而言情奚情之不惡為東嘉道學倡郡守楊蟠立儒志坊表之學者稱儒志先生儒志編序先哲王氏景山舉進士以所如不合退與其徒講學所著僅存此編其言曰孟子以來道學不明吾欲述堯舜之道論文武之治杜淫邪之路闢皇極之門非有所見而能為是言哉周行已萬厯溫州府志字恭叔永嘉人風儀秀整語音如鐘讀書十行俱下時尚新學行已獨往伊洛從二程子遊作顔子不二過論伊川可之登元祐第宣和初除祕書省正字卒於鄆有文集三十卷方輿勝覽行已為太學博士求便養親詔授本州教授發明中庸之旨此邦始知有伊洛之學舊浙江通志族孫去非為張南軒高弟許景衡傳詳忠臣劉安節劉安上萬厯溫州府志安節字元承永嘉人登元符第召對便殿言東宫宜擇宫屬及論奢儉與君子小人和同之異上稱善除監察御史後謫知饒州徙宣州饒民遮道泣留謂吾饒自范文正後惟安節一人宣州大水大疫賴安節全活以萬計猾胥相戒曰神可欺公不可欺卒於官部使者表其勤民致死詔官其子誠弟安上字元禮鄉里號二劉登紹聖第徽宗稱其藴藉有大臣體除監察御史歷官右諫議大夫中書舍人給事中終朝請大夫文安縣開國男方輿勝覽安節紹聖間與弟安上從程氏學俱以學行見推鄉里戴述明一統志字明仲永嘉人元符中進士嘗從程伊川求成己之學仕至臨江太守弟迅亦以文學稱趙霄萬厯溫州府志字彥昭瑞安人博學通今古十歲賦猛虎行鄉先生咸竒之少孤析産悉以屬兄入太學登崇寧第為濟州教授導學者以篤學力行不專事科舉東方土俗為之變名聞京師召處辟雍李彥立一見稱為趙顔子官承事郎張輝明一統志永嘉人喜問學雖老儒莫能逮政和初進士官至吏部尚書敷文閣待制萬厯溫州府志輝字子充自六經諸子歷代史記下至百家之説皆辨析精微議論亹亹居喪哀毁廬墓三年有甘露降庭日從事治氣養心之術學者從之益衆嘗托古人行事斷以已意曰草堂語録人稱草堂先生子孝愷字思豫力學尚節義登紹興庚辰第終兵部架閣林石明一統志瑞安人時王安石新經盛行石獨以春秋學教授鄉閭學者稱塘奧先生萬厯溫州府志石字介夫初習進士聲律既而曰古人之學不如是也遂刻意諸經後春秋為時所禁絶意仕進躬耕養母郡丞趙㞦邑令朱著同謁其母或偕石遊山林間所至唱和有三遊集沈躬行萬厯溫州府志字彬老永嘉人始從塘奧林氏後從伊川程氏藍田吕氏其學以中庸大學為本篤信而力行之故能卓然以聖賢為依歸平居色怡氣和似不能言及辨是非則毅然不可奪從弟琪字東美亦以行義稱蔣元中嘉靖浙江通志永嘉人力學多聞元豐中作新太學與郡人周行已等八人皆見道超卓為四方學者矜式溫州府志元中著經不可使易知一論太學刻於石紹興初郡守張九成下車詣學口誦此論後學益知向方自周恭叔至元中稱元豐太學九先生鮑若雨萬厯溫州府志字商霖嘗構亭於所居之雁池扁曰敬亭值宣和方寇之亂率鄉人捍禦有司奏功第一不受賞著有程門問答録敬亭文集張繹敬亭記商霖自永嘉來學於伊川先生勤苦自勵早夜孜孜不舍先生門人以為畏友謝佃萬厯溫州府志字用休瑞安人遊洛從伊川學永嘉洛學自許景衡始而用休與潘旻繼之今程氏全書與伊洛淵源所載問答皆根據至理其所得深矣後以賢良薦知閣門事卒潘旻字子文瑞安人與鮑若雨謝用休同入洛從伊川學性資敏悟博極羣書隱居不仕陳經正萬厯溫州府志字貴一平陽人慕伊洛之學與弟經邦經德經郛永嘉鮑若雨俱受業二程之門經邦字貴新大觀三年進士終迪功郎有問答見二程全書及伊洛淵源東嘉先哲江南文獻等録湯建嘉靖浙江通志字達可樂清人於天文地理古今制度考核精詳以其學授徒學者稱為藝堂先生每夙興必讀易一卦退與朋友商論欣欣自得年踰八十卒有詩衍義論語道德經解宋之才東甌詩集字廷佐瑞安人登宣和第嘉靖浙江通志之才學於楊時遂祖程氏學教授京兆府每言士負卓犖竒材皆可入聖賢之域患速售耳故深務韜養積十八年不易初官丁母憂服除入為校書郎遷司業權禮部侍郎乞去之才性恬靜寡欲操履潔白難進易退雖歷仕五十年而屏處之日居多丁昌期兩浙名賢録永嘉人以明經篤行師表後進嘗作醉經堂鄉人尊之曰經行先生三子寬夫三舉鄉貢亷夫舉八行志夫登紹興進士第俱好古力學日侍父側弟兄商論如師友不為茍且曰此理天下所共不可為家庭屈執親喪斥去浮屠歲時祭享一遵古禮陳鵬飛萬厯溫州府志字少南永嘉人其學不為章句新説必本人倫正論而趨於深厚兩舉於鄉俱第一登紹興第調鄞簿召為太學博士兼崇政殿説書遷禮部郎初秦檜子熺在永嘉從鵬飛學至是為侍郎所下文案多臆決鵬飛每批其後還之熺寖不平及侍經筵講天王來歸惠公仲子之賵髙宗忽問母以子貴何如鵬飛以正對謂公羊之説非是時檜欲尊崇太母以效容悅大怒諷言者劾鵬飛譏議崇寧典禮謫惠州卒有詩書解羅浮集十卷鄭伯熊萬厯溫州府志字景望永嘉人德行夙成尤邃經學登紹興第厯國子司業宗正少卿乞外以龍圖閣知寧國府卒諡文肅紹興末伊洛之學稍息復於伯熊得之弟伯英伯海皆知名由是永嘉之學宗鄭氏有鄭景望集伯英所著有歸愚翁集鄭汝諧兩浙名賢録字熙績平陽人操行純固言動必謹於禮博學強記老不釋卷經史百氏器數刑名之書無所不覽時號武庫紹興中入太學會本朝稱壽覃恩封其母乃曰吾母為命婦吾復何求於是歸隱蔡幼學傳詳名臣陳傅良宋史本傳字君舉瑞安人為文自成一家從者雲合永嘉鄭伯熊薛季宣皆以學行聞傅良師事之入太學與張栻吕祖謙友善登進士甲科教授泰州改太學録出判福州知桂陽軍除吏部員外郎輪對以周禮説十三篇上遷祕書少監兼權中書舍人帝疾稍平過重華宫明年重明節復以疾不往傅良上疏帝將從之百官班立以俟帝出至御屏后挽帝回傅良趨上引裾后叱之傅良哭於庭后益怒傅良下殿徑行寧宗即位召為中書舍人兼侍讀直學士會詔朱熹與在位宫觀傅良言熹難進易退內批之下舉朝驚愕臣不敢書行熹於是進寶文閣待制嘉泰二年授集英殿修撰進寶謨閣待制終於家諡文節著有詩解詀周禮説春秋後傳左氏章指行於世萬厯溫州府志學者稱止齋先生子求已登科終雷州倅戴溪宋史本傳字少望永嘉人有文名淳熙五年省試第一由禮部郎中凡六轉為太子詹事兼祕書監景獻太子命類易詩書春秋語孟資治通鑑各為説以進權工部尚書除華文閣學士嘉定八年致仕卒贈端明殿學士諡文端萬厯溫州府志太子親書明經字扁其堂學者稱岷隱先生有岷隱集孫栩字文子登嘉定第為祕書郎有五經説葉適傳詳名臣張淳兩浙名賢録字忠父永嘉人工古文尤習冠婚喪祭古禮其器制損益考訂無遺校讐儀禮為之句讀欲考禮者必請正焉朱子通解首引用其説試特奏得初品官不出仕朝廷知其賢屢命監南嶽廟凡五任竟不食其祿人問之曰國家養賢豈俟請耶卒隱約以終葉味道宋史本傳初名賀孫以字行更字知道溫州人刻志好古師事朱熹試禮部第一時偽學禁行味道對䇿率本程頤無所避既下第復從熹於武夷山中學禁開登嘉定十三年進士第遷宗學諭輪對言人主務學天下之福也必堅志氣以守所學謹幾微以驗所學正綱常以勵所學用忠言以充所學從臣薦味道可為講官乃授太學博士兼崇政殿説書帝疑伯有之事涉於誕味道對曰隂陽二氣之散聚雖天地不能易有死而散者其常也有不得其死而鬱結不散者其變也蓋諷皇子竤事三京用師廷臣邊閫交進機會之説味道進議狀以為開邊寖濶應援倍難洛師尋以敗聞人謂見微慮逺遷祕書著作佐郎卒所著四書説大學講義祭法宗廟郊社外傳經筵口奏故事議義萬厯溫州府志景定間諡文修周端朝傳詳名臣陳埴嘉靖浙江通志字器之永嘉人從朱子於武夷所見超卓紹定間趙善湘建明道書院辟主講席四方學者從遊數百人稱為潛室先生埴舉進士以通直郎致仕著有禹貢辨洪範解王制章句木鐘集林武萬厯溫州府志字景文永嘉人孝友沖約博通經史朱熹講道武夷武徒步從之受中庸衣錦之旨歸扁其室曰尚絅輯平日所聞為語録後以恩科授河池縣尉秩滿廣漕交辟不就歲歉賑及逺邇子㵑孫知桞州孫璹夢桂俱登科包定永嘉縣志字定之治春秋書禮三經聞晦菴自同安歸奉於家講學白鹿洞相從論道著有中庸解疑孟子答問池州語録戴栩兩浙名賢録字文子永嘉人登嘉定第遷祕書郎為湖南安撫參議官卒栩少師水心葉適得其旨要嘗曰詩壞於衛宏之序春秋誤於公羊之傳易繇於三聖繫爻彖象之互入書失於孔壁序傳簡編之相亂周禮特周公大約之書當時有未必盡行者識者是之所著有五經説諸子辨論東都要略翁巖壽萬厯溫州府志字如山初名夔永嘉人登淳祐第調永州教授以憂歸性行純固師陳埴盡得微言奧義從學日衆嘗令人讀近思録曰此讀書之梯級也又令觀言行録曰此為人之標凖也其學以修身勵行為務學者尊為庶善先生胡子實萬厯溫州府志初名希孟字醇子永嘉人力學不怠於四書所得尤深鄭滁孫尹樂清創宗晦書院請主教習多士歸之德祐末帶行國子監簿使明州卒著有講義習史管見元史伯璿萬厯溫州府志字文璣平陽人幼嗜學強記博通經史及諸子百家之説精究四書深得朱子之旨時説與朱子背馳者多乃著四書管窺以辨明之又著管窺外編論諸經史天文地理古今制度名物學者傳誦焉人勸之仕則曰讀書本以善身為仕而學豈吾志也遂隱居終身繆主一兩浙名賢録號天隱永嘉人從葉味道遊博學強記補國學生通易書禮三經賈似道蕪湖之敗主一與同舍生伏闕上書攻之德祐初以疾告歸隱居教授晚年雙目皆瞽大德間郡守亷希憲延為郡庠經師時初製大成樂禮器祭服制度儀式必咨詢之主一諳練典故記憶不衰與人言亹亹無倦年八十餘卒有易精藴論學軌範尚書説禮記通考天隱集章仕堯萬厯溫州府志字時雍平陽人通經史深究四書閫奧時方尊顯程朱之學仕堯研精覃思發明傳意嘗曰時之治亂由於人心之邪正心之邪正由於學術之醇疵識者以為名言蔣允文趙次誠等皆其弟子後進言義理之學必稱仕堯云陳剛兩浙名賢録字公潛平陽人受業胡石塘之門晝夜研索遂通易詩書三經旨要嘗著五經問難四書通辨渾天儀説厯代官制説禹貢洪範手鈔文章學西京詩賦效魏晉父母皆八十孝養至篤教授弟子堂上之席嘗滿鄉里皆稱曰潛齋先生明季應期東甌集傳字均饒號恥菴又號菌翁瑞安人萬厯溫州府志少穎悟受春秋於高則誠既而得關閩全書讀之於天道性命之微古今事物之理靡不究嘗曰窮經以致其用反躬以踐其實不如是讀書奚益洪武中以明經薦未幾告老歸年八十三卒王淵兩浙名賢録字如淵永嘉人景山九世孫通詩書二經洪武三年舉進士以疾告歸淵性急直毅然以作興後學為已任貧而來學者輒以衣糧資給之所著有詩書題斷蓮塘稿徐興祖萬厯溫州府志字宗起平陽人受學於史文璣明易詩書三經洪武壬子鄉舉授溫州府學教授以性理之學教導諸生咸尊之曰橫陽先生其門人張文選字士銓永嘉人永樂丙戍進士選庶吉士著有易經講義四書訓解葉挺萬厯溫州府志字允疇永嘉人穎悟絶人聞方祖安徐裕軒得理學於蒼巖師事之遂達性命之藴正統間郡以明經薦力辭隱居教授所著有理氣圖説學庸訓詩文遺稿鄉稱尚志先生王叔果分省人物考字育德永嘉人嘉靖庚戍進士授兵部職方主事纍遷湖廣右恭議擢廣東按察司副使歸里遂杜門不復出既感脾疾就枕若寐熟者撼之逝矣年七十三著有永嘉志半山藏稿萬厯溫州府志叔果潛修考古無一日去書所專精者六經性理之學嘗輯象山語略明其非禪取晦翁晚年之論不相二者合為一録又以陽明先生指心之良知是為聖欲學者惺惺不昧以明乎晝夜之道觀察胡直考功申旞中丞耿定向相與約會論學共推以為得實際云國朝史尊朱鄉賢留祀册樂清人七歲通孝經十二補弟子員食餼貢成均天性孝友操履端方步趨先民律度憫俗學不知修已之要立德之本乃作學則圖説并著有孝經刋誤注解讀書淺解及史論太極圖説解與夫發明大學中庸易象詩禮性理等書處州府宋龔原東都事略字深父遂昌人舉進士哲宗即位為國子監丞遷太常博士會議秦悼王之後應襲封者原曰秦王嫡絶立庶自合禮令議夏至親祀北郊原曰合祭非禮也加祕閣校理出為兩浙轉運判官紹聖初召為國子司業改起居舍人以集賢殿修撰知潤州徽宗即位入為祕書監遷給事中出知揚州召為工部侍郎移兵部除寶文閣待制陳瓘彈蔡京原坐與瓘友善落職和州居住起知亳州命下而卒原力學以經術有文集七十卷易傳春秋解論語孟子解各十卷栝蒼彚紀嘗謫和州金人竊據其子楫率家僮往襲遂死之周南括蒼彚紀字南仲遂昌人壯歲束書遊四方建炎初見李易作狀元遂無意仕進受潘子醇忘筌書以歸其講易由靜極生動乾生於坤因歸其説於坤之六二大抵皆祖忘筌而暗合於歸藏自號知常叟時人稱為知常先生潘景憲括蒼彚紀字叔度松陽人以童子中禮部選入太學同吕伯恭擢進士以已學不及遂師事之因與朱子友善申婚姻之好及卒朱子為撰祭文墓銘謂其躬行之效內則孝弟著於家外則仁義信於友而竟不能隨世俯仰一日致身於仕路云應恕台學源流字仁仲號艮齋括蒼人朱子嘗以老友呼之其所與論學一論大學中庸一論禮書一論易本義且云尚恨聞見淺薄望詳賜誨諭勿使有待於後世子雲也雖朱子之謙光咸受亦恕素學有足取重者如此杜清獻云吾鄉故多士而闡義理之淵源實自仁仲始陳葵括蒼彚紀字叔向青田人自少篤學至老不倦舉隆興進士知平陽縣居官亷介師事魏益之因教以盡棄所懷獨立於物之表未久忽大悟洪纎大小髙下曲直若有見焉又嘗自言用功益難進道愈逺古人今人皆未可輕議朱子每重其學術士有志者必使往從之曰可以寡過也又與其子在書曰過青田不可不見陳叔向王光祖括蒼彚紀字文季松陽人官大理評事精於理學朱文公提舉時邂逅邑之福安僧舍文季拱立規掌如太極狀公異之曰王子胸中自有太極間以傳注質之文季曰公注中庸不使滋長於隱微之中愚意當加潛暗二字公深然之後寄孫竹湖書曰吾到栝止得友王文季一人而已林椅兩浙名賢録字竒卿麗水人登紹熙進士淹貫經術而於周禮尤精以周禮為周公經世之書凡民極所由立日用之常誠偽之變莫不區别纎悉畢備乃隨類條列之名曰周禮綱目調紹興府教授時翰林學士樓鑰禮部尚書倪思表其所著進奏除刑工二部架閣劉炎括蒼彚紀字子宣松陽人少侍父遁齋先生習聞庭訓專事程朱之學因慶元黨籍隱而不仕從真文忠遊著劉子邇言十二卷梁椅兩浙名賢録字子竒麗水人登嘉熙進士第早之脫場屋遂得潛心講貫力於為文晚年慕程朱學編輯遺論名曰論語翼除太常寺丞權禮部郎官王道深崇禎處州府志松陽人隱居力學究極性命之理朱晦菴見之與語大悅又有葉符叔亦嗜理學嘗請晦菴書敬齋針以贈之尹起莘明一統志遂昌人隱居不仕學問該洽嘗著資治通鑑綱目發明五十九卷行世括蒼彚紀字耕道魏了翁稱其深得文公之意羊永德括蒼彚紀縉雲人師吕成公著春秋發微由進士終奉議郎徽州通判子哲師成公之子伯愚問學該博才思深逺著指南集葉季韶崇禎處州府志字承之縉雲人舉進士授臨安教授以疾辭歸執經吕東萊之門明性理之學吟嘯自適有蘭谷集詹介括蒼彚紀字敬父縉雲人朱文公高弟薦於朝官儒林郎總領所幹官學者稱玉澗先生陳邦衡括蒼彚紀字伯明縉雲人隱居教授作式鄉邦同弟邦鑰師朱子窮性理之學項復崇禎處州府志字吉甫松陽人嘗從慈湖楊先生學一日先生問曰學而時習作如何説復倉卒無以對但云三日不談口生荆棘先生撫几嘆曰正是此説復由是警悟學業益進晚年有薦之朝者以白衣授校書郎隱居不仕自號耕樂鄭克寬括蒼彚紀字伯厚遂安人遊松陽頖庠就項平甫得開朱子之學由進士授嚴陵郡博士積階至朝議大夫學士王夢松括蒼彚紀字曼卿青田人篤志好學隱居不仕著禮記解學者稱為愼齋先生舊浙江通志夢松嘗曰學以躬行為本徒知無益指孟子四端即舜禹道心之微每於此心萌動處下功夫主敬以存養之師事葉味道造就學者皆有成驗蔣世珍崇禎處州府志字君聘縉雲人嘗從陳潛室先生遊開慶元年進士官從仕郎歷鎮江建德溫州教授學者宗之吳梅括蒼彚紀字仁伯麗水人師事北山何基教以真實堅苦著四書發揮恭質於魯齋王柏任浦江縣尉後改錢塘季致平括蒼彚紀青田人治詩書易傳會其要領著精覽歸一圖解元鄭滁孫鄭陶孫元史本傳滁孫字景歐處州人至元三十年以薦召授集賢直學士升學士乞致仕歸田里所著有大易法象通贊周易記玩等書弟陶孫字景潛世祖徵至闕奏對稱旨授翰林國史院編修官升應奉翰林文字出為江西儒學提舉滁孫兄弟在當時最號博洽儒學之士翕然推之樊萬括蒼彚紀字萬里縉雲人嘗執經金華王柏之門元初為滁州教授入為應奉翰林文字終江浙儒學提舉王文煥括蒼彚紀松陽人一名子敬字叔恭夙承家學取孔孟諸儒緒言研極精微著道學發明大學發明中庸孟子解及心鏡圖治心銘諸作以心為明鏡毋自欺為藥物畏敬恐懼克復省察為工夫學者稱西山先生季仁壽括蒼彚紀字山甫龍泉人元末用薦教諭慈溪徵逋租新禮殿祠黃公震於學宫遷松陽教諭郡守請定鄉飲酒禮斟酌古今定為儀注升雙溪山長轉婺州教授不赴治易詩書春秋學者稱為四經先生著有春谷讀書記易詩書春秋四書衍義四書質義詩林鈎元弓冶録遭兵燹鮮存春谷集行於世明王毅傳詳忠臣王亷崇禎處州府志字希陽麗水人博通五經尤精於易洪武初薦入翰林修史書成授太子説書官至陜西左布政使所著有交山集迂論史纂南征録四書詳説又善琴製風木吟書宗韓擇木兼精篆𨽻朱維嘉括蒼彚紀縉雲人為盧龍丞有政績遷國子助教早從鄱陽朱公遷學有源委為時名儒著有素履集十卷葉子竒兩浙名賢録字世傑龍泉人至正庚寅以薦試方州中第四人退隱不仕明初浙江行中書省以學行薦廷試高等授嶽州巴陵簿尋致仕卒子竒少穎悟壯遊王剛叔門聞理一分殊之旨乃知聖賢之學不貴多聞以靜為主因自號曰靜齋所著有範通元理草木子等書包瑜兩浙名賢録字希賢青田人篤學力行言動皆以聖賢為法由舉人任教諭淮王聞其賢修書幣聘進講輒稱先生著通鑑事類一百二十卷左傳事類四十卷王命工肖瑜像贊曰見道之真履道之正咳唾古今寤寐賢聖傳獵經搜回瓢點咏衣冠肅如後學企敬居七年告歸撰述甚多何燾兩浙名賢録字思仁麗水人自志學即毅然以聖賢自期洞究性命大原以鄉薦授新喻教諭教人務底實用士多成材聘主湖廣鄉試稱得人令信豐以寬仁為理民常見思著有四書集義春秋至意舒嘯東臯篇倉螺録青桂軒集若干卷盧璣兩浙名賢録字舜用松陽人家貧力學天順甲申進士上疏請正宫闈名分及閹寺煽惑言甚剴切疏入不報未幾復詆權姦謫戍銅鼓益勵志理學辨論古今未定之説闢元劉謐三教平心論作貞字補遺十目其圖説深得聖賢之旨孝宗詔起之已卒黃灝栝蒼彚紀字季榮遂昌人博學自淑不樂仕進嘗語人曰為學大要在愼徽五典而已有愼徽遺稿言多簡要門人私諡為愼徽先生鄭還括蒼彚紀字復正遂昌人志卓行峻從松陽盧璣學粹然一出於正為文務期實用為曹州訓導教人忘倦移疾歸談道自樂足未嘗至公府所著有圖學蒙談理氣管見鄉黨須知諸書浙江通志卷一百七十七
