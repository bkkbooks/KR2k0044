前為平橋東寅賓館前土地祠西為獄平橋前為大門鎮守黃巖等處地方總兵官在大寺巷舊設水師右路總兵官駐劄臨海縣國朝順治十一年總兵官張杰移駐黃巖暫住民房康熙三年總兵官李榮始建署於大寺巷中為大堂曰靖海堂五十一年總兵官李近重修大堂後為勤政堂總兵官史成立額後林達更名一德堂雍正六年總兵官李燦復題曰無愧堂上懸御書福字扁額進後為𢎞毅堂堂之西有亭曰一草亭東偏假山一帶山下復為亭曰友蘭皆燦建燦復於𢎞毅堂後構廳事五間題曰正靜堂舊有箭廳在署東顔曰繹亭總兵官吳進義另於署西新闢箭道為較閲騎射之所題曰德立功成大堂之外為儀門為大門轅門西為大寺塔東有樓曰鎮東樓鎮標中軍中營遊擊駐劄黃巖縣城鎮標左營遊擊駐劄黃巖縣東鎮標右營遊擊駐劄海門衛城小北門黃巖縣治在城內嘉靖浙江通志宋宣和五年令王然建赤城新志宋末燬元至元中令孫諤重建元貞初升為州仍舊治至正末復燬明洪武初知州唐宏重建尋復為縣宣德中周令旭鑑乃更作焉台州府志嘉靖壬子燬令髙材重建署縣通判傅倌成之國朝順治十二年知縣李何煒重新正堂川堂康熙二十二年知縣甘國輔重新後堂正堂額曰忠愛後堂額曰慎獨舊曰再思東廡為仁政閣又東為無倦軒後為摘星樓東北為丞廨西為尉廨前為甬道為戒石亭為儀門為譙樓縣西有園宋有民和堂清心堂舫齋飛蓋亭容光臺今皆不存縣署內東有來紫堂後改曰介石後有嶧山書院皆甘國輔建後堂東偏有迎仙樓康熙三十四年令劉寬建天台縣治在赤城山南六里嘉靖浙江通志宋慶元初令常建重修赤城新志元至元丙子燬令張德進重建至正末再燬明洪武初令鄧林重建台州府志永樂八年令張坰重新之正統六年令吳昌建正堂𢎞治七年丞楊蘭建後堂國朝順治六年知縣蔡含靈建坦蕩亭正堂東為幕廳為庫房東南為尉廨後為後堂為內宅宅東為東樓西即坦蕩亭正堂前為甬道為戒石亭東西為吏廊為儀門東為土地祠為賓館西為獄大門上有鼓樓仙居縣治在北峯之下台州府志舊治在盂溪前金家店晉永和四年令羊欣徙今城內嘉靖浙江通志宋建炎二年令張亨重建赤城新志元至元丁丑燬縣尹王徴重建至正丙申復燬明洪武初令王從古重建台州府志嘉靖丙辰燬丁巳同知毛德京署縣事重新之國朝初年知縣蔣成棟新其堂順治十六年知縣劉之浩重建儀門康熙十一年知縣鄭録勳重建土地祠正堂後為後堂為東西二庫東北為內衙後堂東為尉廨正堂前為架閣庫為戒石亭左右為吏舍前為儀門東為土地祠前為大門為鼓樓寧海縣治在廣度里舊浙江通志晉初設白嶠唐徙海遊永昌元年徙今處宋皇祐二年令李純師重建隆興二年令薛抗重修元燬明洪武初知縣李茂復建台州府志明令余亢郭紳張𢎞宜江徴戴顯相繼修葺萬歷辛卯令曹學程更建國朝康熙六年知縣黃命賢復加修葺後圯十四年知縣崔秉鏡重建中為若保堂舊名忠愛堂後為川堂為芝臺臺左右連産二芝故名東為內衙舊有樓名補山康熙十六年衙圯樓存崔秉鏡重建正堂東為丞廨西為尉廨前為甬道為戒石亭東西為吏舍前為儀門門左為迎賓館為土地祠前為大門為譙樓太平縣治在百干山南嘉靖浙江通志明成化五年台州知府阮勤奏析黃巖置縣六年知縣常完建治國朝康熙八年知縣孫如蘭建省觀堂二十年知縣曹文珽重建左右耳房及東西兩廊儀門土地祠中為親民堂後為川堂為省觀堂為後樂堂堂之前有來蜂亭曹文珽來蜂亭記辛酉春豫視事三月公餘偶憩忽有蜂聚如斗顧而異之有老吏前謁曰明嘉隆間蜂穴於堂嵗數登民殷厚今復來集其休徴歟余乃伐竹緝茅作亭其上顔曰來蜂堂左為丞廨丞廨前為尉廨浙江通志卷三十一
