body:
  text: 浙江通志卷三十一公署中嘉興府分巡杭嘉湖道在府治西北靈光坊嘉興府志舊為按察使分司後改嘉湖分巡道國朝康熙九年復為杭嘉湖分守道舊浙江通志分守杭嘉湖道在鎮海樓南後改駐嘉湖二府二十五年改為浙江學院公署雍正四年杭嘉湖三府專設分巡道一員學院移駐省城嘉湖道衙門仍歸本道駐劄中為大堂前為儀門為大門東西為府縣候廳重加整葺一如舊制嘉興府治在城南隅太平寰宇記秀州理嘉興縣本蘇州嘉興縣地晉天福四年置𢎞治嘉興府志宋改為郡為府為軍府元改為安撫司為路皆仍其處至元嘉禾志嘉興路總管府衙在子城內舊府治也嘉興府圗記子城亦名子牆亦曰府牆圍二里十步髙與厚俱一丈二尺𢎞治嘉興府志吳元年改路為府正廳名端本堂後廳名清香堂洪武中知府劉觀葺而新之國朝康熙三十六年知府黃家遴重修以清香堂舊址為道珍堂朱彝尊道珍堂記太守廣寧黃公治其廨長水之南池中芙蕖一花並蒂緑房垂實公嘉績之所召也芙蕖雖小草而江淹之辭曰一為道珍二為世瑞致之非易也郡治有清香堂其來久矣廢且百年公考舊址復新之儒者為政之道存焉宜其始建而珍果適應其瑞也請以名堂遂為文以紀之雍正六年知府閻堯熙復修堂後為川堂為內宅堂東北隅為軍資庫西北隅為架閣庫左為吏廨東西為六房吏舍下為丹墀為甬路中立戒石亭儀門外東為土地祠祠南為延賓館折而西北為經歷司為照磨所儀門南百步為府門宋景定中知軍陳塤葺上有譙樓設鐘鼓左右有垜樓嘉靖戊申知府趙瀛修南為屏門舊為照牆明萬歷中知府龔勉改闢東西石坊二曰承宣曰撫字康熙元年知府劉漢傑修承宣坊東為總捕廳康熙五十七年移駐乍浦今改城守都司撫字坊西為總巡廳屏門上為坊題曰首藩名郡海防督捕同知在乍浦所南門內平湖縣志舊為把總司署國朝康熙五十七年改為駐防公署督糧水利通判在撫字坊西舊嘉興府志明𢎞治間知府栁琰建國朝康熙三年通判改作霖重建中為正堂前為東西吏廊為儀門門東為賓館前為大門廳後為內宅有重門廳軒寢室翼室校士館在府治西北靈光街嘉興府志𢎞文館即布政分司明崇禎中知府鄭瑄建為督學校士之所相傳為宋監倉東廳中為大堂後為川堂為寢室後有亭東為書房西為庖室堂東西為號厰前為儀門東為賓館西為土地祠大門外東西為府縣官候廳外有坊二曰文章司命曰風教提衡嘉協副將在府治西北嘉興營原設副將一員順治十一年改設遊擊駐劄海鹽康熙五十年福浙總督范時崇題改遊擊為副將駐劄府城彈壓七邑五十四年副將何肇彩增設衙署協標中軍都司在府治東嘉興府志即舊察院基初為推官署國朝康熙六年推官奉裁改為同知署五十七年同知移駐乍浦雍正六年添設都司改為中軍都司署七年都司吕上懋重修嘉興縣治在府治東北二百步𢎞治嘉興府志晉天福中升縣為州即縣治改州治而别建縣治於此宋元及明因之宣德八年縣丞傅霖重建公堂軒廳正統間知縣王錦重建譙樓舊嘉興府志𢎞治六年廳堂燬七年知縣黃澤再建國朝康熙六年知縣金墉闢照牆為坊表十四年知縣梁沖霄重建譙樓二十一年知縣何鋕重建延賓館修葺後堂中為治廳廳西為丞廨西北為簿廳東為尉廳右為軍器庫西北為架閣庫治廳之前為甬路為戒石亭左右為吏廊前為儀門左為延賓館為土地祠右為獄又南為譙樓治廳後為川堂為燕堂直北為縣宅有凝芬亭亭西為修廊為來鶴軒前有璧山稍折為靈官祠為琴書室秀水縣治在府子城西北一里𢎞治嘉興府志明宣德五年吏部員外郎李亨相地於此嘉興府圖記知縣趙忠始建舊嘉興府志萬歷間知縣李培修國朝康熙三年知縣王廷機葺堂署廊廡重門十二年知縣李見龍重修大門中為正堂曰節愛堂右為西耳庫南為甬路為戒石亭東西為吏廊又南為儀門左右各翼門又直南為大門縣堂後為川堂為後堂直北為公廉堂後堂之右為軍資庫架閣庫東此為縣衙儀門外左為土地祠延賓館右為獄南抵大門為東夾道夾道之北為丞署折而東為簿署東北為尉署治北為縣圃有池為亭曰嘉禾亭嘉善縣治在府城東三十六里魏塘鎮嘉興府圖記明大理卿胡槩度地定基𢎞治嘉興府志宣德五年知縣鄭時領印開設正統六年李遜繼知縣事凡未備者漸加增飾規制頗完嘉興府圖記成化中知縣汪貴𢎞治中吳傑嘉靖中縣丞倪璣皆增葺之嘉興府志崇禎間知縣馬成名以治基前昻後窊鳩工改建國朝順治十三年知縣方舟重建涖政堂康熙十一年知縣莫大勳十六年知縣楊廉相繼重修堂後為燕堂為內宅為對越堂正堂東為大庫西為架閣庫前為甬道為戒石亭兩翼為吏廊南為儀門門內右為軍器庫西南為土穀祠祠西為延賓館後為獄又直南為譙樓儀門外西為丞署東為簿署為尉署海鹽縣治在城東北隅嘉靖浙江通志唐以前徙置不常開元中建於今治之右陸居仁帥正堂記元泰定丙寅達嚕噶齊布哷齊改建廳治國朝康熙五年知縣湯其升重建縣門中為正堂堂北為清心堂明令李當泰改名雙瑞移清心名後堂正堂右為架閣庫為軍器房前為甬路為東西吏廊為戒石亭外為儀門西為土地祠南為鼓樓為親民坊西為鹽厫為賓館儀門內左為丞署儀門外左為簿署為尉署石門縣治在城內運河塘嘉靖浙江通志崇德縣治晉天福三年置宋建炎兵燬紹興二十四年令黃揚復建𢎞治嘉興府志元時升為州明洪武元年改州治為縣治嘉興府圖記明正統中知縣焦寬𢎞治中吳浚湯沐正德中洪異典史李滋皆建葺之石門縣志天啓間知縣陳宗湯重建正堂顔曰作新國朝康熙元年改崇德縣為石門縣作新堂之後為四知堂順治十年知縣陳邦寄修改曰敬事堂庫在後堂東北令宅在後堂後康熙十二年知縣杜森改建衙堂曰勿欺後又改曰思敬其西有園萬歷辛丑陳令允堅闢中結四桂為亭榜曰臥月丞宅在庫東簿宅在正堂西尉宅在西堂東前為甬道為儀門東為延賓館東南為土地祠更東為儀仗庫前為譙樓平湖縣治在當湖鎮嘉靖浙江通志明宣德五年知縣王簡建正統中知縣徐韶重建𢎞治四年知縣林奇拓而新之嘉興府志天啓中知縣顧國寶修平湖縣志大堂曰忠愛國朝順治十八年知縣金煆重建改忠愛曰潔愛堂東北曰永盈庫架閣庫前為戒石亭為儀門西為獄為土穀祠為儲鹽所右為寅賓館左為簿署外為譙樓堂北為川堂又北為燕堂東為軍器房東北為內宅中有廳事西有天香亭觀月臺堂東北為贊政廳龍亭庫又東北為丞署南為典史宅桐鄉縣治在梧桐鄉鳳鳴市𢎞治嘉興府志明宣德五年設知縣王用和草創廳事趙中建正廳嘉興府圖記天順初張泰成化中孟俊梁敬𢎞治中王昊正德中任洛皆葺治之堂後為燕喜堂舊名和衷堂和衷之後左愛棠軒右仕學齋國朝順治八年和衷堂燬康熙間知縣徐秉元重建又孫郁修建池亭正堂右為架閣庫燕喜堂左為儀仗庫前為甬道為戒石亭為東西吏廊廨東為丞廨縣治外東偏為簿廨丞廨前為尉廨湖州府湖州府治在子城內正北萬歷湖州府志吳寶鼎元年建即烏程縣故治也嘉靖浙江通志唐𢎞道中刺史武太沖增拓修繕後梁檢校少保錢傅璟重作廳事湖州府志宋元祐七年知州事張珣增建元改為湖州路總管府至大間總管馬煦建廳事廨宇至正五年達嚕噶齊沙木斯迪音重修宇文公諒重修府治廳記吳興為東南望府天目分秀雙溪合流金蓋諸峯峙其前蒼卞具區亘其隂民俗文雅清醇素稱易治王謝顔蘇之流風猶可尚也舊治重建於至大間垂四十年棟字欹橈牆壁頺圮至正五年冬今郡守沙木斯公念民久困不忍輕用其力於是計孳生積鏹斥去浮費取其贏餘擇吏之廉能者董其事未幾完舊益新門廡赫奕廳堂邃嚴讞府幕僚靡不周葺垣墉塈茨工告畢役而民殆未始知也於是頌公之德而樂其有成咸請紀之以示來者明洪武三年知府侯善新之天順四年知府嶽璿重修成化九年知府勞鉞復新之隆慶五年知府栗祁重修中為正堂左為豐德庫右為架閣庫堂後為軒為後堂顔曰魯公舊治正堂東為經歷司西為照磨所東西為吏廊前為戒石亭為儀門左右為榜廊東為迎賓館西為司獄司又前為譙樓知府廨在後堂後有晝錦堂在郡宅東訟希齋在廳事西郡圃內有逍遙堂思政堂清樾亭挽翠亭嵗寒亭督捕同知在烏程縣烏鎮舊在府治國朝康熙元年移駐烏鎮改烏鎮捕盜同知十八九年間因衙署坍圮仍回郡城雍正四年巡撫臣李衛復題請移駐烏鎮以資彈壓六年設立烏鎮駐劄衙門管糧通判在子城內萬歷湖州府志宋治平三年張大寧建明嘉靖五年通判胡瀹即養濟院舊基改建萬歷二年知府栗祁重修中為正堂堂後為川堂燕堂為內宅前為甬路為儀門為大門廨內舊有麗澤亭校士館在府治東南修建年月無考中為大堂東西為號厰前為儀門為賓館為大門門東西列府縣候廳堂北為燕堂為內宅湖協城守副將在府城縣橋鋪烏程縣志舊係民房改建協標中軍都司在叢桂鋪烏程縣治在府治西一里萬歷湖州府志舊治在子城內即今之府治晉義熙間遷唐時肇建廳事烏程縣志宋大中祥符間知縣薛耀卿重建湖州府志乾寧三年知縣余蟾重修楊夔重修縣治記余公再尹烏程節冗費之用資贖辟之金財以儉而藴人以悅而使不期年而衆宇鼎新若換大門中門修大廳小廳砌縣之外城創宅之周垣修衆僚之宅制公廳什器公帑摧敗乃擇堅選宏厚厥垣嚴厥關園扉頺危乃剗積弊滌宿汙席以潔其榻食以茹其餒公前任日崇修聖祠為文纘功今復樹此𢎞烈蓋以慰縣人之思也元至正十二年達嚕噶齊烏納格齊重建增譙樓戒石亭明洪武二年知縣危止重建正德十三年知縣陶益修嘉靖三十六年知縣蔣𢎞德重修國朝康熙十四年知縣髙必騰重建治廳曰懷保堂後為軒為後堂東西為耳房為庫廳東為鹽厫前為甬道為戒石亭東西為六房又前為儀門西為架閣庫儀門外東為賓館後為土地祠縣廨在後堂後明景泰間知縣宋彬建內有相國池有亭名東亭廨內舊有公生明軒製錦堂丞廨在縣堂東南簿尉廨俱在廳事西歸安縣治在子城東一里萬歷湖州府志宋太平興國間置宣和四年縣令錢耕重建廳事元縣令吕儀增建後堂達嚕噶齊克哷復撤舊新之明洪武二年重建十一年知縣陳良修嘉靖四年知縣劉逈重修三十年知縣張師價重建縣堂堂後為川堂為後堂廨內舊有敬臨堂絃歌軒拙齋雙桂堂今有尊美堂治廳前為甬路為戒石亭為東西吏廊為儀門為賓館為土地祠為大門儀門內東為丞廳極東為簿廳治廳西為尉廳治前有溪光亭瀕溪長興縣治在城內西北隅太平寰宇記本漢烏程縣地初置於富陂村晉咸康元年徙箬溪北隋大業十一年徙於夫槩王廢城唐武德七年始移於此嘉靖浙江通志宋開寶六年重建廳事萬歷湖州府志建炎三年燬紹興五年縣令張琮重建紹定二年縣令史巖之增建紹定五年縣令趙汝譢重建正廳元至元丁亥縣令梁琮重建貞元中改為州署明耿炳文守長興改為元帥府復以元時捕盜司為州署尋改元帥府為長興衛指揮使司又改為長興千户所百户所洪武十九年知縣鄭勝始復請為縣署𢎞治三年知縣楊珵重建嘉靖三十五年知縣黃扆重修國朝順治初譙樓為大風所折十八年知縣葉文鳳重建康熙四年知縣葉文鳳改留餘倉為西廳中為治廳後為軒為後堂左為架閣庫右為耳房庫東西為