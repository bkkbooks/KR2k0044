body:
  text: 浙江通志卷八十一漕運中國朝皇清定鼎燕京嵗輸浙江漕米以充軍國之需著為定額有正兊米有改兊米正兊入京倉改兌入通倉至白糧所以上供天廚而給百官俸祿也漕項用以徵銀解部而備轉輸諸費也設專員以重責成置辨丁以供輪派船有定數運有常期有行月以優恤旗丁有則例以考察官吏一應事宜分列於後嵗額浙江正兌米陸拾萬石改兌米叄萬石每石加耗肆斗又該米二拾伍萬二千石內改折灰石正米一萬叄千叄百二拾叄石柒斗耗米伍千叄百二拾玖石肆斗捌升每石折銀一兩二錢該銀二萬二千叄百捌拾叄兩捌錢一分陸釐解部充餉外實兌運正米伍拾捌萬柒千叄百一拾石捌斗耗米二拾叄萬肆千玖百二拾肆石叄斗二升改兊正米二萬玖千叄百陸拾伍石伍斗耗米一萬一千柒百肆拾陸石二斗遇閏減徵正耗米叄百陸拾叄石伍斗捌升折銀肆百叄拾陸兩二錢玖分陸釐增入灰石錢糧項下解部充餉以上共徵正兊改兌漕糧正耗米捌拾陸萬叄千叄百肆拾陸石捌斗二升內遇閏共減徵正耗米叄百陸拾叄石伍斗捌升杭州府錢塘縣漕糧正耗米二萬肆百伍拾伍石捌斗叄升肆合遇閏減徵米捌石陸斗一升仁和縣漕糧正耗米肆萬陸千玖百玖拾二石伍升遇閏減徵米一拾玖石柒斗叄升伍合捌勺海寧縣漕糧正耗米肆萬玖千伍百二石陸斗玖升捌合遇閏減徵米二拾石捌斗捌升伍合二勺富陽縣漕糧正耗米伍千二百一拾玖石捌斗叄升遇閏減徵米二石二斗伍合餘杭縣漕糧正耗米一萬玖百陸拾叄石一斗二升遇閏減徵米肆石陸斗叄合二勺臨安縣漕糧正耗米肆千叄百捌拾伍石二斗肆升捌合遇閏減徵米一石捌斗肆升一合於潛縣漕糧正耗米二千一百玖拾二石陸斗二升肆合遇閏減徵米玖斗一升玖合捌勺新城縣漕糧正耗米二千陸百柒拾二石二斗陸升肆合遇閏減徵米一石一斗二升肆合二勺昌化縣漕糧正耗米一千伍百柒石肆斗叄升陸合遇閏減徵米陸斗叄升玖合捌勺通計杭州府屬漕糧正耗米一拾肆萬叄千捌百玖拾一石一斗肆合遇閏減徵米陸拾石伍斗陸升肆合嘉興府嘉興縣漕糧正耗米捌萬肆千肆百叄石捌斗肆升肆合遇閏減徵米叄拾伍石伍斗玖升叄合陸勺秀水縣漕糧正耗米柒萬叄千陸百肆拾肆石柒斗陸升遇閏減徴米叄拾石玖斗二升叄合二勺嘉善縣漕糧正耗米捌萬二千肆百捌拾二石伍斗伍升肆合遇閏減徴米叄拾肆石柒斗柒升陸合海鹽縣漕糧正耗米肆萬陸千陸百二拾肆石捌斗叄升遇閏減徵米一拾玖石陸斗二升捌合石門縣漕糧正耗米肆萬肆千伍百伍拾玖石陸斗陸合遇閏減徵米一拾捌石柒斗一升叄合捌勺平湖縣漕糧正耗米肆萬捌千伍百伍拾一石陸斗叄升陸合遇閏減徵米二拾石肆斗柒升伍合桐鄉縣漕糧正耗米叄萬柒千柒百二石二斗一升遇閏減徵米一拾伍石捌斗柒升肆勺通計嘉興府屬漕糧正耗米肆拾一萬柒千玖百陸拾玖石肆斗肆升遇閏減徴米一百柒拾伍石玖斗捌升湖州府烏程縣漕糧正耗米一拾萬二百柒拾二石玖斗捌升肆合遇閏減徵米肆拾二石二斗柒升捌合陸勺歸安縣漕糧正耗米捌萬伍千二百二拾一石玖斗叄升肆合遇閏減徵米叄拾伍石捌斗柒升柒合捌勺長興縣漕糧正耗米肆萬捌千二百捌拾石二斗陸升遇閏減徵米二拾石叄斗二升二合肆勺德清縣漕糧正耗米肆萬捌千捌百一拾二石叄升陸合遇閏減徵米二拾石陸斗玖合肆勺武康縣漕糧正耗米一萬捌百陸拾一石柒斗一升捌合遇閏減徵米肆石伍斗陸升陸合捌勺安吉州漕糧正耗米捌千叄拾柒石叄斗肆升肆合遇閏減徵米叄石叄斗捌升一合通計湖州府屬漕糧正耗米叄拾萬一千四百捌拾陸石二斗柒升陸合遇閏減徵米一百二拾柒石叄升陸合凡隨時改折或因恤災或因撥餉俱照時價折徵多寡不一順治八年戶部覆準江浙水災除三分以下不議外四分至七分為輕災每石徵本色六斗折色四斗八分至十分為重災每石徵本色五斗折色五斗康熙九年九月户部為嘉湖水災漕糧仰懇改折等事議覆浙江巡撫范承謨疏稱浙省嘉湖二府今嵗自春徂夏霪雨連綿秋成絶望災民懇援淮揚被災之例蠲漕之外復求請賑臣以為民命宜恤國課當籌請照順治八年之例將嘉湖二府漕糧量加折價每石折銀一兩省民間買運之費免耗潤漕截之徵省造修漕船運軍行月等銀五萬六千餘兩米三萬一千餘石輕齎等銀仍行解部抑臣更有請者除白糧并改折之外尚該南糧漕糧數十餘萬本地之米恐難足額即以秈米抵代不必分别粳秈庶受溺餘黎不致重困等因具題前來應如該撫所請每石折銀一兩徵解其漕折輕齎銀兩并造修漕船行月等項銀米仍行解部再米既停運改折其耗潤米八萬九千六百餘石民間幫貼漕截銀十萬五千餘兩應行免徵使民沾實惠南米漕糧如本地之米不足即以秈米兌抵其改折各項數目造册報部查核可也奉旨依議康熙十一年十一月户部為浙省災傷等事議覆浙江巡撫范承謨疏稱浙西連年水旱今嵗異蟲遍野攢禾嚙稻無粒米可穫杭屬之仁錢二縣嘉屬嘉秀等七縣湖屬之安吉等六州縣自被災五分以至十分約計漕糧正米三十二萬四千餘石仰祈準援康熙九年之例改折徵銀其漕截耗潤亦循例除豁輕齎等銀照額解部又可省造船等項銀米再折漕之價自五分至十分不論正兌改兌每石一例折銀七錢徵解內歸烏德清地處最窪民尤至困三縣漕折若不可免請照江南近例寬以兩年帶徵至被災三四分者例不蠲折所收之稻不能盡照常年米色請以江楚秈米隨便交兌等因具題前來查漕糧關係重大連年江浙等省蠲折甚多京通倉存貯無幾不足國用不便盡折浙省仁和等十五州縣漕糧既稱已被異常災傷應將十一年分漕糧被災九分十分者每石折銀七錢其八分以下被災州縣漕糧仍徵本色起運至歸安烏程德清三縣既稱地處最窪民尤至困請照江南之例寬以兩年帶徵應將漕糧本年一半來年一半帶徵折漕輕齎并造漕船行月等項銀兩照數解部幫貼漕糧等項銀米漕糧既經改折俱準蠲免至被災各州縣應徵米石既稱不能盡照常年米色請以江楚秈米交兌亦應準其不分米色將秈米兌運可也奉旨依議康熙二十三年九月以從前兵興轉餉繁苦奉上諭免二十三年分浙江漕米三分之一互見蠲恤康熙三十年十二月奉上諭恭紀首卷湖廣江西浙江江蘇安徽山東應輸漕米著自康熙三十一年始以次各蠲免一年康熙三十一年二月户部為欽奉上諭事議覆浙江巡撫張鵬翮疏稱奉旨截留康熙三十一年起運三十年漕糧十萬石存置倉厫以備需用兵民莫不歡欣感頌惟是浙省年嵗豐稔起運漕糧自開徵之後百姓樂於輸將徵兌各官恪遵冬兌冬開之例俱於十一月二十等日未奉上諭之前盡數開行出境況浙省兵食無匱莫若將已運之漕糧仍運京倉而於三十一年徵運漕米之內截留十萬石貯倉備用等因具題前來應如所題於三十一年分徵運漕米內截留可也奉旨依議康熙四十七年十月户部為欽奉上諭事覆準杭州湖州兩府屬被災八州縣各戶漕糧今年徵收一半明年帶徵一半詳見蠲恤康熙四十七年十月戶部為欽奉恩詔事議準浙江所屬杭嘉湖三府額徵本年漕糧令該督撫酌量均勻截留八萬石預備平糶詳見蠲恤康熙四十九年三月戶部奉特旨免徵浙江杭湖二府緩徵帶徵漕米九萬二千餘石互見蠲恤康熙五十三年十一月欽奉上諭恭紀積貯截留浙江本年起兌漕米十萬石免其運通豫備積貯康熙六十年十二月浙江巡撫屠沂為籲懇皇恩等事題準將浙省本年應徵漕米內截留二十萬石以裕積貯詳見積貯雍正元年十一月户部奉上諭恭紀首卷杭嘉湖所屬十四州縣額徵漕米一半徵收一半改折其改折之價照康熙九年例每米一石折銀一兩其十六萬漕米紅白兼收互見蠲恤雍正四年十一月浙江巡撫臣李衛為據情奏明事題準杭嘉湖三府所屬仁錢等十州縣一所漕糧照雍正元年之例每石折徵銀一兩其餘被水州縣漕米令紅白兼收尖團並納詳見蠲恤雍正五年十一月戶部為彚報偏災等事議覆浙江總督管巡撫事李衛疏稱本年仁和錢塘餘杭臨安新城安吉長興武康德清鄞縣等十州縣勘實被災田畝漕糧無出照往年改折之數每石一兩徵收具題前來查漕米向無折徵雍正元年浙省被災我皇上軫念民瘼將漕米令其改折一半每米一石折銀一兩此出格外洪恩不便引為成例查浙省支給運丁行糧每米一石係折銀一兩二錢應令該督照依此例每石以一兩二錢折徵完報可也奉旨依議雍正六年十月欽奉上諭恭紀首卷浙江漕米準令紅白兼收籼粳並納永著為例雍正八年三月欽奉上諭據御史竇啓瑛條奏內稱徴收糧米用聨三版串之法甚為妥協惟是有漕地方未曽奉有部文未必通行畫一等語朕將竇啓瑛所奏發與倉場侍郎嶽爾岱凃天相查議據嶽爾岱等奏稱聨三版串之法應令有漕地方畫一通行嗣後州縣徵收糧米之時預將各里各甲花户額數的名填定聨三版串一給納户執照一發經承銷册一存州縣查對按户徵收對册完納即行截給歸農其未經截給者即係欠户該印官查摘追比若遇有糧無票有票無糧等情即係胥吏侵蝕立即監禁嚴追如此則胥役之伎倆莫施於吏治民生甚有裨益等語著照該御史所請及倉場侍郎所議行知各直省督撫轉飭所屬有漕州縣一體遵行特諭雍正九年十一月欽奉上諭恭紀首卷嘉興府屬之七縣並杭屬之海寧一縣漕米照雍正元年四年例每石改折銀一兩徵解雍正十一年十月十四日欽奉上諭恭紀首卷杭嘉二府各截留本年額徵漕米五萬石以備平糶湖州府之歸安烏程二縣應徵漕米並帶徵漕米照部定折價改徵雍正十三年十二月初八日欽奉上諭恭紀蠲恤將雍正十二年以前未完帶徵緩徵本色改折漕米銀兩查明豁免白糧浙江白粳正米伍萬一千石耗米二萬二千玖百伍拾石白糯正米一萬伍千一百玖拾玖石玖斗玖升捌合耗米陸千捌百叄拾玖石玖斗玖升玖合一勺以上共徵白糧粳糯正耗米玖萬伍千玖百捌拾玖石玖斗玖升柒合一勺嘉興府嘉興縣白糧粳糯正耗米一萬二千叄百二拾石捌斗玖升捌合柒勺陸圭柒粟捌黍內白糯正耗米二千陸百柒拾陸石陸斗玖升柒合捌勺伍撮柒圭二粟捌黍秀水縣白糧梗糯正耗米一萬二百玖拾柒石玖斗玖升伍合二勺二抄一撮肆圭一粟一黍內白糯正耗米二千叄百玖拾叄石一斗伍升肆合玖勺陸撮玖圭一粟一黍嘉善縣白糧粳糯正耗米一萬一千玖百肆拾柒石捌斗柒升肆合肆勺一抄玖撮二圭二粟柒黍伍粞內白糯正耗米二千二百伍拾柒石伍升捌合一勺玖抄二撮肆圭柒粟柒黍伍粞海鹽縣白糧粳糯正耗米陸千陸百叄拾肆石叄斗肆升玖合二勺捌抄伍撮叄圭肆粟伍粒一黍內白糯正耗米一千陸百陸拾叄石玖斗玖升柒合捌勺一抄玖圭玖粟伍粒一黍石門縣白糧粳糯正耗米陸千二拾一石玖斗一升一合叄勺玖抄玖撮二圭二粟陸粒叄黍內白糯正耗米一千肆百玖石肆斗叄升一合柒勺肆抄二撮叄圭柒粟陸粒叄黍平湖縣白糧粳糯正耗米柒千一拾一石玖斗一升伍合伍勺一抄肆撮柒圭陸粟叄粒二黍伍粞內白糯正耗米一千玖百叄石捌斗捌升捌勺叄抄一撮柒圭陸粟叄粒二黍伍粞桐鄉縣白糧粳糯正耗米伍千二百陸拾伍石叄斗伍升捌合陸勺肆抄柒撮伍圭陸粟叄粒柒黍內白糯正耗米