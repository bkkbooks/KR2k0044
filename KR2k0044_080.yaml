body:
  text: 浙江通志卷八十一漕運中國朝皇清定鼎燕京嵗輸浙江漕米以充軍國之需著為定額有正兊米有改兊米正兊入京倉改兌入通倉至白糧所以上供天廚而給百官俸祿也漕項用以徵銀解部而備轉輸諸費也設專員以重責成置弁丁以供輪派船有定數運有常期有行月以優恤旗丁有則例以考察官吏一應事宜分列於後嵗額浙江正兌米陸拾萬石改兌米叄萬石毎石加耗肆斗又該米貳拾伍萬貳千石内改折灰石正米壹萬叄千叄百貳拾叄石柒斗耗米伍千叄百貳拾玖石肆斗捌升每石折銀壹兩貳錢該銀貳萬貳千叄百捌拾叄兩捌錢壹分陸釐解部充餉外實兌運正米伍拾捌萬柒千叄百壹拾石捌斗耗米貳拾叄萬肆千玖百貳拾肆石叄斗貳升改兊正米貳萬玖千叄百陸拾伍石伍斗耗米壹萬壹千柒百肆拾陸石貳斗遇閏減徵正耗米叄百陸拾叄石伍斗捌升折銀肆百叄拾陸兩貳錢玖分陸釐増入灰石錢糧項下解部充餉以上共徵正兊改兌漕糧正耗米捌拾陸萬叄千叄百肆拾陸石捌斗貳升内遇閏共減徵正耗米叄百陸拾叄石伍斗捌升杭州府錢塘縣漕糧正耗米貳萬肆百伍拾伍石捌斗叄升肆合遇閏減徵米捌石陸斗壹升仁和縣漕糧正耗米肆萬陸千玖百玖拾貳石伍升遇閏減徵米壹拾玖石柒斗叄升伍合捌勺海寧縣漕糧正耗米肆萬玖千伍百貳石陸斗玖升捌合遇閏減徵米貳拾石捌斗捌升伍合貳勺富陽縣漕糧正耗米伍千貳百壹拾玖石捌斗叄升遇閏減徵米貳石貳斗伍合餘杭縣漕糧正耗米壹萬玖百陸拾叄石壹斗貳升遇閏減徵米肆石陸斗叄合貳勺臨安縣漕糧正耗米肆千叄百捌拾伍石貳斗肆升捌合遇閏減徵米壹石捌斗肆升壹合於潛縣漕糧正耗米貳千壹百玖拾貳石陸斗貳升肆合遇閏減徵米玖斗壹升玖合捌勺新城縣漕糧正耗米貳千陸百柒拾貳石貳斗陸升肆合遇閏減徵米壹石壹斗貳升肆合貳勺昌化縣漕糧正耗米壹千伍百柒石肆斗叄升陸合遇閏減徵米陸斗叄升玖合捌勺通計杭州府屬漕糧正耗米壹拾肆萬叄千捌百玖拾壹石壹斗肆合遇閏減徵米陸拾石伍斗陸升肆合嘉興府嘉興縣漕糧正耗米捌萬肆千肆百叄石捌斗肆升肆合遇閏減徵米叄拾伍石伍斗玖升叄合陸勺秀水縣漕糧正耗米柒萬叄千陸百肆拾肆石柒斗陸升遇閏減徴米叄拾石玖斗貳升叄合貳勺嘉善縣漕糧正耗米捌萬貳千肆百捌拾貳石伍斗伍升肆合遇閏減徴米叄拾肆石柒斗柒升陸合海鹽縣漕糧正耗米肆萬陸千陸百貳拾肆石捌斗叄升遇閏減徵米壹拾玖石陸斗貳升捌合石門縣漕糧正耗米肆萬肆千伍百伍拾玖石陸斗陸合遇閏減徵米壹拾捌石柒斗壹升叄合捌勺平湖縣漕糧正耗米肆萬捌千伍百伍拾壹石陸斗叄升陸合遇閏減徵米貳拾石肆斗柒升伍合桐鄉縣漕糧正耗米叄萬柒千柒百貳石貳斗壹升遇閏減徵米壹拾伍石捌斗柒升肆勺通計嘉興府屬漕糧正耗米肆拾壹萬柒千玖百陸拾玖石肆斗肆升遇閏減徴米壹百柒拾伍石玖斗捌升湖州府烏程縣漕糧正耗米壹拾萬貳百柒拾貳石玖斗捌升肆合遇閏減徵米肆拾貳石貳斗柒升捌合陸勺歸安縣漕糧正耗米捌萬伍千貳百貳拾壹石玖斗叄升肆合遇閏減徵米叄拾伍石捌斗柒升柒合捌勺長興縣漕糧正耗米肆萬捌千貳百捌拾石貳斗陸升遇閏減徵米貳拾石叄斗貳升貳合肆勺徳清縣漕糧正耗米肆萬捌千捌百壹拾貳石叄升陸合遇閏減徵米貳拾石陸斗玖合肆勺武康縣漕糧正耗米壹萬捌百陸拾壹石柒斗壹升捌合遇閏減徵米肆石伍斗陸升陸合捌勺安吉州漕糧正耗米捌千叄拾柒石叄斗肆升肆合遇閏減徵米叄石叄斗捌升壹合通計湖州府屬漕糧正耗米叄拾萬壹千四百捌拾陸石貳斗柒升陸合遇閏減徵米壹百貳拾柒石叄升陸合凡隨時改折或因恤災或因撥餉俱照時價折徵多寡不一順治八年戸部覆准江浙水災除三分以下不議外四分至七分為輕災毎石徵本色六斗折色四斗八分至十分為重災每石徵本色五斗折色五斗康熙九年九月户部為嘉湖水災漕糧仰懇改折等事議覆浙江巡撫范承謨疏稱浙省嘉湖二府今嵗自春徂夏霪雨連綿秋成絶望災民懇援淮揚被災之例蠲漕之外復求請賑臣以為民命宜恤國課當籌請照順治八年之例將嘉湖二府漕糧量加折價每石折銀一兩省民間買運之費免耗潤漕截之徵省造修漕船運軍行月等銀五萬六千餘兩米三萬一千餘石輕齎等銀仍行解部抑臣更有請者除白糧并改折之外尚該南糧漕糧數十餘萬本地之米恐難足額即以秈米抵代不必分别粳秈庶受溺餘黎不致重困等因具題前來應如該撫所請每石折銀一兩徵解其漕折輕齎銀兩并造修漕船行月等項銀米仍行解部再米既停運改折其耗潤米八萬九千六百餘石民間幫貼漕截銀十萬五千餘兩應行免徵使民沾實惠南米漕糧如本地之米不足即以秈米兌抵其改折各項數目造册報部查核可也奉㫖依議康熙十一年十一月户部為浙省災傷等事議覆浙江巡撫范承謨疏稱浙西連年水旱今嵗異蟲遍野攅禾嚙稻無粒米可穫杭屬之仁錢二縣嘉屬嘉秀等七縣湖屬之安吉等六州縣自被災五分以至十分約計漕糧正米三十二萬四千餘石仰祈准援康熙九年之例改折徵銀其漕截耗潤亦循例除豁輕齎等銀照額解部又可省造船等項銀米再折漕之價自五分至十分不論正兌改兌每石一例折銀七錢徵解内歸烏徳清地處最窪民尤至困三縣漕折若不可免請照江南近例寛以兩年帶徵至被災三四分者例不蠲折所收之稻不能盡照常年米色請以江楚秈米隨便交兌等因具題前來查漕糧闗係重大連年江浙等省蠲折甚多京通倉存貯無幾不足國用不便盡折浙省仁和等十五州縣漕糧既稱已被異常災傷應將十一年分漕糧被災九分十分者每石折銀七錢其八分以下被災州縣漕糧仍徵本色起運至歸安烏程徳清三縣既稱地處最窪民尤至困請照江南之例寛以兩年帶徵應將漕糧本年一半來年一半帶徵折漕輕齎并造漕船行月等項銀兩照數解部幫貼漕糧等項銀米漕糧既經改折俱准蠲免至被災各州縣應徵米石既稱不能盡照常年米色請以江楚秈米交兌亦應准其不分米色將秈米兌運可也奉㫖依議康熙二十三年九月以從前兵興轉餉繁苦奉上諭免二十三年分浙江漕米三分之一互見蠲恤康熙三十年十二月奉上諭恭紀首卷湖廣江西浙江江蘇安徽山東應輸漕米着自康熙三十一年始以次各蠲免一年康熙三十一年二月户部為欽奉上諭事議覆浙江巡撫張鵬翮疏稱奉㫖截留康熙三十一年起運三十年漕糧十萬石存置倉厫以備需用兵民莫不懽欣感頌惟是浙省年嵗豐稔起運漕糧自開徵之後百姓樂於輸將徵兌各官恪遵冬兌冬開之例俱於十一月二十等日未奉上諭之前盡數開行出境況浙省兵食無匱莫若將已運之漕糧仍運京倉而於三十一年徵運漕米之内截留十萬石貯倉備用等因具題前來應如所題於三十一年分徵運漕米内截留可也奉㫖依議康熙四十七年十月户部為欽奉上諭事覆准杭州湖州兩府屬被災八州縣各戸漕糧今年徵收一半明年帶徵一半詳見蠲恤康熙四十七年十月戸部為欽奉恩詔事議准浙江所屬杭嘉湖三府額徵本年漕糧令該督撫酌量均匀截留八萬石預備平糶詳見蠲恤康熙四十九年三月戸部奉特㫖免徵浙江杭湖二府緩徵帶徵漕米九萬二千餘石互見蠲恤康熙五十三年十一月欽奉上諭恭紀積貯截留浙江本年起兌漕米十萬石免其運通豫備積貯康熙六十年十二月浙江巡撫屠沂為籲懇皇恩等事題准將浙省本年應徵漕米内截留二十萬石以裕積貯詳見積貯雍正元年十一月户部奉上諭恭紀首卷杭嘉湖所屬十四州縣額徵漕米一半徵收一半改折其改折之價照康熙九年例每米一石折銀一兩其十六萬漕米紅白兼收互見蠲恤雍正四年十一月浙江巡撫臣李衛為據情奏明事題准杭嘉湖三府所屬仁錢等十州縣一所漕糧照雍正元年之例每石折徵銀一兩其餘被水州縣漕米令紅白兼收尖團並納詳見蠲恤雍正五年十一月戸部為彚報偏災等事議覆浙江總督管巡撫事李衞疏稱本年仁和錢塘餘杭臨安新城安吉長興武康徳清鄞縣等十州縣勘實被災田畝漕糧無出照往年改折之數毎石一兩徵收具題前來查漕米向無折徵雍正元年浙省被災我皇上軫念民瘼將漕米令其改折一半每米一石折銀一兩此出格外洪㤙不便引為成例查浙省支給運丁行糧每米一石係折銀一兩二錢應令該督照依此例毎石以一兩二錢折徵完報可也奉㫖依議雍正六年十月欽奉上諭恭紀首卷浙江漕米准令紅白兼收籼粳並納永著為例雍正八年三月欽奉上諭據御史竇啟瑛條奏内稱徴收糧米用聨三版串之法甚為妥協惟是有漕地方未曽奉有部文未必通行畫一等語朕將竇啟瑛所奏發與倉場侍郎岳爾岱凃天相查議據岳爾岱等奏稱聨三版串之法應令有漕地方畫一通行嗣後州縣徵收糧米之時預將各里各甲花户額數的名填定聨三版串一給納户執照一發經承銷冊一存州縣查對按户徵收對册完納即行截給歸農其未經截給者即係欠户該印官查摘追比若遇有糧無票有票無糧等情即係胥吏侵蝕立即監禁嚴追如此則胥役之伎倆莫施於吏治民生甚有裨益等語着照該御史所請及倉塲侍郎所議行知各直省督撫轉飭所屬有漕州縣一體遵行特諭雍正九年十一月欽奉上諭恭紀首卷嘉興府屬之七縣並杭屬之海寜一縣漕米照雍正元年四年例毎石改折銀一兩徵解雍正十一年十月十四日欽奉上諭恭紀首卷杭嘉二府各截留本年額徵漕米五萬石以備平糶湖州府之歸安烏程二縣應徵漕米並帶徵漕米照部定折價改徵雍正十三年十二月初八日欽奉上諭恭紀蠲恤將雍正十二年以前未完帶徵緩徵本色改折漕米銀兩查明豁免白糧浙江白粳正米伍萬壹千石耗米貳萬貳千玖百伍拾石白糯正米壹萬伍千壹百玖拾玖石玖斗玖升捌合耗米陸千捌百叄拾玖石玖斗玖升玖合壹勺以上共徵白糧粳糯正耗米玖萬伍千玖百捌拾玖石玖斗玖升柒合壹勺嘉興府嘉興縣白糧粳糯正耗米壹萬貳千叄百貳拾石捌斗玖升捌合柒勺陸圭柒粟捌黍内白糯正耗米貳千陸百柒拾陸石陸斗玖升柒合捌勺伍撮柒圭貳粟捌黍秀水縣白糧梗糯正耗米壹萬貳百玖拾柒石玖斗玖升伍合貳勺貳抄壹撮肆圭壹粟壹黍内白糯正耗米貳千叄百玖拾叄石壹斗伍升肆合玖勺陸撮玖圭壹粟壹黍嘉善縣白糧粳糯正耗米壹萬壹千玖百肆拾柒石捌斗柒升肆合肆勺壹抄玖撮貳圭貳粟柒黍伍粞内白糯正耗米貳千貳百伍拾柒石伍升捌合壹勺玖抄貳撮肆圭柒粟柒黍伍粞海鹽縣白糧粳糯正耗米陸千陸百叄拾肆石叄斗肆升玖合貳勺捌抄伍撮叄圭肆粟伍粒壹黍内白糯正耗米壹千陸百陸拾叄石玖斗玖升柒合捌勺壹抄玖圭玖粟伍粒壹黍石門縣白糧粳糯正耗米陸千貳拾壹石玖斗壹升壹合叄勺玖抄玖撮貳圭貳粟陸粒叄黍内白糯正耗米壹千肆百玖石肆斗叄升壹合柒勺肆抄貳撮叄圭柒粟陸粒叄黍平湖縣白糧粳糯正耗米柒千壹拾壹石玖斗壹升伍合伍勺壹抄肆撮柒圭陸粟叄粒貳黍伍粞内白糯正耗米壹千玖百叄石捌斗捌升捌勺叄抄壹撮柒圭陸粟叄粒貳黍伍粞桐鄉縣白糧粳糯正耗米伍千貳百陸拾伍石叄斗伍升捌合陸勺肆抄柒撮伍圭陸粟叄粒柒黍内白糯正耗米