body:
  text: 浙江通志卷二百十四列女十三嚴州府建德縣宋徐氏二女明一綂志建德人長清次淳年及笄元兵下嚴州父適出而兵奄至清謂淳曰吾家世清白寧死不受汚辱遂相牽投崖而死鄉人為之立祠徐五娘新定續志建德徐大發之姊也與其弟刲肉療母不約而同尤女子所難元王氏女元史本傳建德人至大間父出耘舍傍遇豹為所噬曵之升山父大呼女識父聲驚趨救以父所棄鋤擊豹腦殺之父乃得生俞士淵妻童氏元史本傳嚴州人姑性嚴待之寡恩童氏柔順以事之無少拂其意者至正十三年賊䧟威平官軍復之已乃縱兵剽掠至士淵家童氏以身蔽姑衆欲汚之童氏大罵不屈一卒以刀擊其左臂愈不屈又一卒斷其右臂罵猶不絶衆乃皮其靣而去明日乃死謹按舊浙江通志暨府縣志俱作俞溥妻事同或溥即士淵之名以字行耳存以俟考明方師夔妻孟氏嚴陵志建德人元末師夔任鄞縣小溪寨廵檢卒於官孟時年二十九子原德甫十歲氏攜孤扶柩而歸竭力營葬又舉夫家七䘮教子嫁女迄四十餘年始終一致洪武年旌表徐宗賢妻沈氏嚴陵志宗賢為商溺死錢塘沈氏方二十有二既而子亦死舅姑憫其無依勸令改適氏以死自誓守節三十餘年成化三年旌表柴文顯妻余氏建徳縣志年十七歸文顯顯為福建巡按被誣入獄氏擊登聞鼓以聞後文顯遭刑弟文義亦故氏時年二十三並舉二䘮孀居四十五載敎育文顯前妻子曦遺腹子晟俱𢎞治年旌表何盈女四姑舊浙江通志未醮夫亡誓不再適年七十餘終嗣子唐妻許氏年二十孝姑課子有司以聞表為貞烈之門徐氏三節萬歴嚴州府志徐鍾妻邢氏鍾卒邢年二十八堅志守節訓子行衢皆為諸生既而行衢相繼卒行妻王氏年二十四衢妻周氏年二十二咸無嗣又無遺産邢旦夕率二婦紡績共貧苦三婦誓志無二邢年八十三卒王周孀居四十餘年萬歴年旌表王文熺妻馬氏萬歴嚴州府志文熺髫年入泮父母鍾愛之無何疾作氏百計醫禱比卒哭絶欲死以殉舉家强救乃停棺内寢三年不離左右年方二十二貧甚紡績以膳二親皆年逾八十終氏苦節四十年而卒宋宰妻陳氏萬歴嚴州府志年二十五夫亡貧甚遺孤三歲舅姑以哭子俱亡氏於百日内連舉三䘮遭歲大荒兼被隣火延燬飢寒廹切茹苦守節三十餘年如一日唐良正妻張氏建徳縣志年二十六夫亡子幼姑病刲股以療及翁姑繼逝良正尚在淺土氏連舉三䘮教子成立直指方元彦疏其事旌曰節孝宋邦棧妻馬氏建徳縣志年十八夫亡無子矢節事姑以孝聞家無儋石紡績度日年七十五終天啓年旌表馬步雲妻程氏舊浙江通志年二十三夫卒遺腹生子永鎮家徒四壁矢志撫孤卒年八十俞熙志妻王氏舊浙江通志年二十五夫卒子在襁褓復死家貧守節有諷以再適者輙引刀自刎卒年七十五包應登妻湯氏舊浙江通志年二十夫病危篤刲股以救夫死矢志守節撫育孤女課姪猶子府縣歲給粟帛年七十四卒呉士昌妾髙氏建徳縣志明末鄭芝龍敗兵回閩所至滛掠氏為兵所獲厲罵不屈兵怒脅以刃氏曰吾寧死耳决不爾從遂投於塘而死數日家人撈其屍顔色如生或曰氏姓趙朱仍夀妻何氏方倫妻陳氏徐惟俊妻許氏王伯誠妻孫氏王廷璽妻仇氏仇紳妻呉氏王章妻丁氏王承恩妻徐氏馬應祖妻徐氏張德俊妻謝氏馬中馼妻陳氏馬從亨妻柴氏馬從豐妻何氏趙鳴鸞妻孫氏馬逢晉妻陳氏馬慶明妻錢氏何其龍妻張氏王兆昌妻宋氏唐伯宗妻徐氏唐伯安妻劉氏陳所濟妻馬氏王世秀妻陳氏施繼龍妻陳氏國朝戴茂葵妻陳氏建徳縣志崇禎間茂葵父東旻撫鄖被逮茂葵隨侍殞京邸氏年二十九上有祖姑年逾八旬雙眸失視氏左右扶持孝養無缺兼事繼姑庶姑皆以孝稱家漸落撫子玉綸㫖建紡績授經康熙二十一年具題奉坊旌表喻國勲妻何氏題旌册夫亡氏年二十二兩子俱幼矢志守節事舅姑至孝舅姑歿䘮葬盡禮夫有二弟俱殀遺二侄年俱六齡氏撫如已出及長為二子先後婚配不令分析馬銓邦妻施氏題旌册年二十九而寡躬紡績以養舅姑姑病衣不解帶者數月訓子嚴㫖建肅鄉黨稱之坊旌表以上二氏俱雍正四年具題奉陳光簡妻夏氏題旌表年二十七而寡教子成人夫弟夫婦早世遺姪幼氏撫長婚配無異己子歲歉煮粥以賑里中全活者甚衆守節五十二年馬自鈺妻程氏題旌册年二十二而寡一子又殤氏誓不更適姑雙目俱瞽凡飲食坐臥扶持不離左右後歿䘮葬盡禮夫遺田一十二畝氏以四畝歸宗祠為祭掃費留田八畝紡績自給守節三十六年楊殿庸妻劉氏題旌册年二十四而寡事姑撫繼子守節三十年以上三氏俱雍正十㫖建年具題奉坊旌表楊士魁妻何氏題旌册年二十六夫亡舅年逾七旬姑雙目俱瞽氏奉養一十餘載人稱孝無間言撫子成立守節三十四年雍正十二年具題奉㫖建坊旌表王遜妻孫氏題旌册年二十九夫亡孝事舅姑教二子早歲遊庠性仁慈鄉黨中貧不能自存者恒以衣食分給之守節三十年董九霞妻陳氏題旌册年二十二夫亡舅姑以家貧氏方少艾藐孤孱弱不可保命更適氏齧臂流血自誓孤知其意堅相抱而泣遂日夕勤女紅易米以供舅姑子稍長拾薪為㸑且教之識字習誠實家業日隆起守節四十五年以上二氏俱雍正十三年具題候旌戴東晃妻王氏張𢎞聖妻何氏王景運妻蔡氏淳安縣元方良妻黄氏嚴陵志二十而嫁七年而夫亡無子貞白自守以奉方氏之祀㤗定元年旌表明方稜妻王氏嚴陵志十七歸稜三歲而寡踰二旬生子輔誓不他適外氏欲奪其志對曰夫早世所以未即死者以姑老子在襁褓也外氏自慚後又有强之者曰繼自今有言者必唾其靣衆遂止已而輔任兵科給事中封太孺人邵衢妻盧氏嚴陵志名如瓊永樂初衢隨父同知志中謫戍邊卒於營氏年三十姑老子幼煢然獨處兄弟憐其孤苦欲迎歸同居氏力拒弗許守志益堅以奉姑教子為務卒年七十一徐福夀妻王氏兩浙名賢録年十九為福夀妻生子士華越七年姑與夫相繼死舅以年邁衣食莫給欲奪其志氏指天誓日無異志勤儉紡績養老撫幼子克成立年八十七終商文毅輅為作傅黄紳妻洪氏嘉靖浙江通志年十七歸紳甫一年紳死生一女一日歸寧父兄逼奪其志遂抱女觸寒冰濟河以歸終身不至母家年九十嬸胡氏姪婦呉氏皆幼年孀居亦守節不變人以三貞稱之解寓妻張氏嚴陵志母家上虞幼隨父戍大同年十八歸寓二十一而寓亡氏撫育遺孤誓不易志尋歸鄉里遺孤亦亡堅貞之操如一日孫廷茂妻邵氏嚴陵志廷茂亡邵年甫十八誓不他適宗人强其再醮度不能免遂投塘而死何廷傑妻戴氏嘉靖浙江通志年二十而寡人有欲奪其志者以刄裂其兩耳誓不改節孀居六十餘年事其姑始終一致夀八十三方原齡妻徐氏嚴陵志年十九歸原齡甫三日而原齡歿於外旁無伯叔可依自誓守志始終不渝夀八十四何瑗妻方氏嘉靖浙江通志年十九歸瑗時瑗疾已革一見遂亡氏貞節自持誓不再適孀居六十年而卒乃合葬焉方祖慶妻金氏嚴陵志年二十一而寡無子家甚貧人見其處境不堪勸其再適氏以死自誓孀居六十五年夀八十六何道妻鄭氏續文獻通考年十六歸道越二歲而寡家貧無子舅姑欲奪其志遂自縊死謹按嚴陵志淳安縣志俱作柯道妻惟嘉靖浙江通志作何與通考同今從之方貞女萬歴嚴州府志名吐玉許適鄭滋嘉靖十四年滋未娶而死方泣告父母臨夫䘮至鄭門扶棺哭擗誓不再適父母力止欲引刀自盡舅姑諷諌亦不聽遂止夫家立其姓一枝為嗣娶婦潘氏未幾一枝卒潘亦堅心守志一門兩節徐應裕妻葉氏萬歴嚴州府志適應裕二載夫亡踰月産子亦殤即引刀自盡姑奪刀泣曰若舅先背止存孤叔二歲倘天祚徐存舅嗣即存汝夫也徒死何為葉勉從之孝孤撫叔成立婚配守節至八十三歲萬厯間旌表汪侑傑妻李氏舊浙江通志夫亡撫孤成立二姑一病盲一病痿奉養惟謹年八十五而卒姪一㤗死遺妻王氏亦賴李以完節稱周愡妻方氏淳安縣志愡兄弟四人相繼疫死妯娌以夫亡改節方氏年十九獨守志不移家貧紡績以養舅姑及舅没舅弟之子惟敏失怙恃氏趣姑亟為婚之生二子遂立其次子俸為夫後以承宗祀姑嬰風疾氏扶持起居浣滌汚穢五年如一日張佑妻朱氏淳安縣志年十九歸佑二載佑卒誓無他志時有挟勢欲其更適者逼令登輿度力不能勝乃佯詐之入室從容沐浴更衣自縊參議方天雨為作烈婦傳鄭二枝妻方氏萬歴嚴州府志年二十餘夫没矢志守節時有陳某者欲娶之以死自誓事遂寢後又有以厚利㗖其舅强委禽焉方度不得免遂飲藥而死隆慶間建坊旌表何金鹿妻魯氏淳安縣志年十六成婚甫三載夫亡家貧舅姑憫其無子微諷之氏以死自誓逾年舅弟執柯强為童氏子委禽氏自舅弟來勺水不入口者七日而議者不已恐終奪其志遂自經死方淑瑩淳安縣志受徐應芳聘年十六未嫁而應芳歿瑩聞訃欲奔䘮父母不允乃毁容剪髪投繯舅姑聞之迎歸勤盡婦職九載勿渝舅姑殁代執子䘮立嗣承祧曰吾今而後可以遂初志矣不食數日卒月日輿芳同合葬於汪塘源縣令李光德題石曰烈女童氏二節淳安縣志重時成妻王氏年二十六未有子勸夫置副徐氏無何成死徐有遺腹生男王泣謂徐曰童氏一綫吾當善為撫汝艾各行其志可也徐痛哭剪髪自誓願終節保孤二孀貞守鄉里咸稱之何其良妻應氏淳安縣志年十九生一女而夫亡矢志守節叔逼其改醮乃毁容剪髪持刀自誓立嗣存祀歴盡艱苦年六十一卒方希文妻項氏明列女傳名淑羙適希文希文好蓄書值方國安潰兵掠江滸希文挈家避山間載書以往㑹幼子病疹希文出延醫氏與一嫗一婢處是夕亂兵突至縱火肆掠婢挽氏衣欲與俱出氏叱之曰出則死於兵不出死於火等死耳死火不辱時嫗已先去見火出復入呼曰火已至比落諸嫗皆匿某所奈何弗出氏不應急取書堆左右髙與身等坐其中須臾火廹書盡焚遂死賊退希文歸則餘燼旋而成堆若䕶其骨者一慟灰即散乃收骨瘞於先兆葉迎妻盧氏淳安縣志明末亂兵刼掠一卒獲氏欲汚之不從逼以利刃殺其懐兒氏抱樹大罵卒刎其首而殞時胡世宰妻繆氏亦不屈死項文舉妻徐氏王文蕙妻唐氏王堅妻錢氏何珧妻方氏任裕妻戴氏周忭妻商氏何廷智妻呉氏方暉妻周氏余璧妻解氏方淥妻邵氏應恪妻呉氏童景春妻洪氏童朋妻方氏方彦顯妻魯氏周爾行妻張氏王應元妻徐氏盧應箎妻徐氏汪良臣妻王氏童汝弼妻方氏方啓常妻任氏應德新妻呉氏鄭臺妻方氏徐九采妻童氏方夢齡妻呉氏方惟棨妻任氏徐寶妻方氏張繼志妻姚氏徐良弼妻李氏胡世相妻鄭氏方待徵妻盧氏國朝方貞女題旌冊方茂春女許配呉𢎞綱𢎞綱以痘殤女年十五聞訃奔䘮守志為夫營葬立孤養㫖建孀姑守節六十餘年康熙四十九年具題奉坊旌表余光斗妻王氏題旌册年二十四夫亡時舅姑早䘮祖翁姑在堂氏奉甘㫖十七年敬謹不怠子瓊玉生甫八月撫至成人葬夫三代之在淺土者守節五十載雍正三年具題奉㫖建坊旌表呉茂泰妻盧氏題旌冊年十九夫亡子琰在襁褓氏教育成立又夭遺孫景濓氏又撫之守節四十餘年吳詠妻方氏題旌冊年二十一夫亡守節四十一年撫姪承祧吳敬庭妻方氏題旌冊年二十三夫亡遺孤蕃昌親自督課有成邵士鴻妻李氏題旌冊年二十適士鴻未一載士鴻卒遺腹生女繼姪日煌為後守節四十年汪應潢妻嚴氏題旌冊年二十四夫亡生子甫六月上無翁姑旁無伯叔父母憐其無倚勸之改適氏誓死不移蓬首垢面三十餘年課子有成守節六十二載以上五氏俱雍正四年具㫖建題奉表坊旌吳繹熊妻邵氏題旌冊年二十一夫亡無子氏投繯觸石絶粒百方求死舅姑苦勸乃止舅姑殁遺叔止六齡氏恩勤育養叔又早逝乃育叔子毓芝為嗣訓誨成名守節五十三年吳敬傳妻徐氏題旌册二十五而嫁二十七而寡撫幼叔成立繼姪為後守節二十八年童近聖妻吳氏題旌册夫亡事翁姑孝勤女紅訓子讀書夜分機杼聲與書聲相間也㫖建以上三氏俱雍正五年具題奉坊旌表方乘如妻邵氏題旌冊年十七適乘如乘如患瘵疾有年矣結䄜後即日侍湯藥至廢寝食踰年而夫卒無子育姪渙然為嗣事孀姑如事父母姑卒出十指所積以營窀穸祔夫於旁而自穿生壙於夫之右守節三十八年魯楠妻吳氏題旌册年二十三適楠二十八而寡遺娠生一女又殤氏矢志靡他以奉養舅姑舅姑殁力營喪葬育姪為子守節二十五年胡光典妻姚氏題旌冊年十七歸光典二十七而寡誓死不二事孀姑撫幼嗣嚴以律身儉以持家鄉黨咸奉為矜式守節至五十三歲而卒以上三氏俱雍正九年具題奉㫖建坊旌表童宗琯妻方氏題旌冊年二十九而寡遺子騮督訓極嚴不為姑息家素封縮衣節食以周貧乏故家業不減而親隣咸被其德守節四十五年邵之純妻方氏題旌册年二十九而寡遺孤幼舅姑早逝三世棺在淺土氏晝夜紡織銖積始得購地卜葬訓子有方守節四十年二氏俱雍正十年具題奉以上㫖建坊旌表周仁元妻應氏題旌冊年二十九歲而寡擇師督課其子二子俱遊庠終身縞素閏門嚴肅戚屬罕覯其靣守節二十八年雍正十一年具題奉㫖建坊旌表應校妻徐氏題旌册年二十六夫亡事姑孝撫遺孤成立持身謹嚴頻笑不茍守節二十年卒徐尚元妻胡氏題旌冊年二十五夫亡舅姑垂白遺孤僅六月家故貧紡績以給饗飱舅姑没百計營𦵏敎子有方守節五十三年以上二氏俱雍正十三年具題候旌方翹妻吳氏方象瑛吳節婦傳適翹十九日而翹没氏奉姑惟謹姑病至以手承其穢不解帶者累月姑性素卞急至是嘆曰吾得婦是無子而有子也越二十九年姑卒氏痛之甚踰二年亦卒年五十一嫠居三十餘年周貞女淳安縣志遂安人許配邑人阮若咸年十四未嫁若咸感疾且劇氏往視隨婢侍湯藥及若咸卒誓不改嫁事祖姑及姑孝敬備至年十七祖姑殁扶柩號慟欲絶時有欲奪之者氏聞之不食而死康熙六年督撫給匾旌奨方棻如妻吳氏方象瑛方節婦傳年及笄歸棻如棻如病瘵氏刲股為羹剪髪燎藥祈以身代而葉如竟死氏年二十四防身如律言不踰閫鬻手以供舅姑之養而撫猶子為嗣教之成立砥節四十年而卒桐廬縣明吳徳逺妻徐氏嚴陵志名妙賢徳逺卒氏年二十四織絍以養舅姑舅姑殁哀毁幾死洪武年旌表夀百歲汪希聖妻戴氏閻皥汪節婦傳名巧字妙貞年十八歸希聖甫七載希聖病亟乃斷髪誓無嫁意及希聖卒事舅姑惟謹元末羣盜蜂起汪族擇板山之洞匿焉氏以男女當别嫌遂奉姑於洞旁之茒舍寇至舉火燔洞匿者皆死氏伏叢草中得免於難煢煢撫孤紡績度日雖豪貴百計强求輙厲聲嚴拒卒能完節保孤克昌厥緒王宗玊妻毛氏嚴陵志名妙秀生子甫三月而宗玉卒氏年二十有一姑憐其幼欲嫁之氏以死自誓孀居五十餘年教子成立成化年旌表王鏐妻盧氏嚴陵志名妙清生子一歲而鏐卒氏年二十一以死自誓姑屢欲奪其志氏堅拒不從成化年旌表鄧中華妻王氏李紹賢鄧列婦傳字淑媛年十四適中華中華遘危疾婦躬湯藥衣襦不解體者凡數月中華執婦手泣下語半不即吐婦喻所指也曰死生契濶夫婦同穴夫即不諱誓以身殉數日中華死越三日卜葬婦先一日櫛沐更衣登樓縊死時年十九柴梁妻戴氏桐廬縣志年二十而寡家貧子幼紡績自贍缺食則命子取山菜野果以充飢人皆憫其苦節未㡬子喪冰操益堅年至九十六卒陸氏二節桐廬縣志姚氏陸東山妻年十九東山卒有孕未育及産子氏泣曰陸氏宗弗墜矣孝姑撫子備盡勞瘁其子亦聘姚氏為婦年二十一亦卒姑媳死守而終吳克文妻王氏張敞妻徐氏王永孚妻袁氏姚克誠妻陳氏章葉妻駱氏吳貫妻汪氏趙繼臯妻姚氏俞鳳妻趙氏姚明之妻袁氏姚昌妻汪氏國朝宋紹昌妻李氏題旌冊年二十一夫亡有强暴者欲汚之氏堅拒不從而死時康熙五十㫖建四年五月事也五十七年具題奉坊旌表徐承禮妻李氏題旌冊年二十六夫亡守節四十六載雍正元年具題奉㫖建坊旌表屠氏二節題旌冊屠士裔妻鍾氏年二十三夫亡撫姪承祧守節四十二載屠士袞妻倪氏年二十八夫亡訓子有成守節三十三載二氏俱孝事舅姑雍正五年具題奉㫖建坊旌表戴廷予妻徐氏題旌冊年二十四夫亡家貧甚一子止二齡矢志不二守節五十一載雍㫖建正六年具題奉坊旌表吳永年妻張氏題旌冊年二十二夫亡事舅姑孝教子嚴而有法守節五十載雍正八年㫖建具題奉坊旌表王始成妻孫氏題旌冊年十七歸王二十四而寡遺二子俱幼家貧半菽不飽勤女紅餬口教育二子至於成立營葬舅姑及夫三喪守節五十二年雍正九年具題奉㫖建坊旌表章日炳妻戴氏題旌冊年二十八而寡事舅姑撫子守節四十八年趙尚瑗妻王氏題旌冊年二十四甫生子而夫亡上有孀姑氏仰事俯畜備極勞瘁守節㫖建三十四年坊旌表以上二氏俱雍正十年具題奉趙日暄妻王氏題旌冊年十七而寡家貧盡鬻嫁衣以奉翁姑無子立侄為嗣勤紡績操井臼翁姑先後病殁盡禮盡哀繼子殀復撫一孫以延夫後守節六十二年方大銜妻傅氏題旌冊年二十八而寡事姑葬舅撫子成立以上二氏俱雍正十一年㫖建具題奉坊旌表章日選妻姚氏題旌冊年二十四夫亡家故貧復遭隣火室廬蕩然氏隻身從烟㷔中抱幼子逸出流離困苦終無異志子長即營葬舅姑及夫守節四十一年雍正十二年具題奉㫖建坊旌表邵觀光妻吳氏題旌冊年二十六夫亡家赤貧晝夜勤女紅養姑撫子次子士傑遊庠有孫七人咸以耕讀為業守節四十二年吳士大妻邵氏題旌冊年二十五夫亡事姑孝無子以姪遂亨為後辛勤撫訓弱冠遊庠守節二十九年具以上二氏俱雍正十三年題侯旌張坤妻吳氏桐廬縣志年二十六坤卒生子有鎮甫三歲姑亦早寡家貧紡績易食養姑年七十餘尚與姑同寝處姑年九十二卒子及媳亦相繼死氏撫孤孫經營喪葬盡禮年七十四卒皇甫國球妻張氏公舉事實年二十一而寡遺子兆亨甫週歲家貧姑老氏晝夜勤紡績易粟養姑姑嬰風疾氏左右扶持歴久不衰教子以義方守節五十二年卒徐志達妻張氏公舉事實年二十四夫為山寇所殺家貧姑老遺三子俱幼氏以節自矢事姑生養死葬咸盡禮撫子成立守節五十二年吳焌妻邵氏趙懋鑑妻柯氏王孟輝妻吳氏王日昇妻俞氏王日啓妻戴氏袁九寵妻濮氏遂安縣明周宗明妻方氏嚴陵志年二十七宗明卒人或憐其少繼子順五尚幼諷其改醮方曰棄姑與子禽獸之行也吾忍為之乎寧死不易志邑人余複為立傳余欽妻方氏劉元余母貞節傳方璹女筓而歸欽越三年生子湧三月而欽卒時年十八矢志不二所親諷其他適泣曰從一而終婦道也敢以存亡易志恪供婦職撫育遺孤孀居嚴肅湧長為之授室姑殁喪葬盡禮嘉靖丁酉上其事表厥宅里詹氏二節萬歴嚴州府志詹瑞妻盧氏詹軒妻余氏盧以二十三歲而寡余以十九歲而寡舅姑强其嫁矢志益堅嘉靖辛亥盧年八十二余年七十八知縣羅袞以聞匾曰雙節之門余氏二女遂安縣志長妙姿次妙善余方女也姿許字洪氏洪後衰替不能聘方渝盟更以字富室汪姓妙姿不從洪訟諸臬司以有聘斷女歸汪妙姿截髪折齒誓不改移終身不嫁與妹妙善索友愛妙善亦誓與同志父母諷喻百端終莫能奪乃給産半諸子而以宻室處之二女性勤儉門整肅晚年贊財頗裕遂以益諸弟年至耄耋而殁余模妻王氏萬歴遂安縣志年二十四模亡明年子女亦相繼殁父母諷使他適矢志不易年七十三卒臨卒謝妯娌曰吾今方可言不失節前此未敢言也徐椅妻沈氏遂安縣志年二十二椅亡誓不改適有遺腹日夜叩天兾生子為徐後積憂致瞽生子應韶雙目復明割股療姑疾卒年九十二萬暦年旌表陸府妻蔣氏萬歴嚴州府志年十九府卒剪髪納府棺中自縊求死以姑救不得遂乃杜門毁容謹事舅姑一日隣火將近抱棺慟哭願與俱焚俄而反風滅火萬厯年旌表章貞女舊浙江通志受毛一逢聘未婚而一逢卒氏號泣欲奔喪剪髪貽姑誓必往父母聽之俗尚羽士焚籙氏投火中亟救得免不食姑强之勉進饘粥終身臥坐一小樓事聞旌表後其族曽孫女毛孟以夫病成婚三日夫卒自墜樓下求死毛姓向稱章為樓上小姑後以孟為樓下小姑云章希源妻黄氏萬歴嚴州府志嫁八月而希源卒遺腹生女氏泣曰夫緒絶矣遂投井姑急救之乃勵節事姑姑病龥天請以身代比姑亡哀毁卒毛曽二妻盧氏遂安縣志婚逾年而夫患顛癎氏年二十二夫亡安貧撫孤鄉隣稱其苦節同族毛國教繼室王氏毛枝煌妻蔣氏皆青年守志以苦節終詹佳妻余氏姚文節妻吳氏張廷輝妻洪氏余仕富妻方氏毛文璽妻章氏毛存本妻方氏童景夀妻洪氏周才義妻余氏姚僾妻詹氏毛存泰妻豐氏王鍉妻洪氏章惟洪妻余氏余正中妻趙氏余孝徳妻詹氏黄金綰妻毛氏詹可尚妻余氏姜習孔妾熊氏毛之望妻姜氏國朝毛廣宗妻汪氏遂安縣志廣宗卒氏年二十八矢死撫孤事姑詹氏盡孝子震芳早殀偕子婦王氏撫孤兆陽兆陽復殀偕孫婦方氏撫曽孫其望其旦康熙二十年奉㫖建坊旌表方象圩妻黄氏題旌冊年二十二夫亡苦志撫孤勤女紅自給守節六十三載康熙三十㫖建五年具題奉坊旌表章振藻妻姜氏題旌冊夫亡氏年二十七撫姪以延夫祀守節至七十八歲康熙三十九㫖建年具題奉坊旌表方象琨妻余氏題旌冊年二十一夫亡孝事嫠姑上有四世未葬氏竭蹶營窀穸撫二子及孫均有成立守節三十七載康熙四十二年具題奉㫖建坊旌表任邦題妻童氏題旌冊農家婦也夫亡氏年二十九遺孤在抱誓不再適家貧忍飢撫孤㫖建守節五十三載康熙四十八年具題奉坊旌表方成輅妻胡氏題旌冊年二十四夫亡苦節撫孤卜葬三世之未葬者守節三十八年毛周尹妻王氏題旌冊年二十六夫死於寇氏事舅盡孝教子登賢書守節四十一年㫖建以上二氏俱康熙五十一年具題奉坊旌表洪光斗妻姜氏題旌冊年二十三夫亡有諷其改適者氏即引刀斷指自誓乃撫姪以續㫖建夫後守節至六十九歲康熙五十七年具題奉坊旌表方引禩妻毛氏題旌冊嫁五日而夫亡氏墜樓濵死又吞金耳環指環各二枚而人不知及葬引禩氏毅然同穴絶粒十九日乃死未死前一夕腹内下肉塊者三滌器入厠中𨽻人滌厠曬道旁里農拾耳環指環各一又有拾指環一以質於肆一時喧傳競往溷藩覔其餘復得耳環一於是以精鐐十倍贖歸盖烈婦所吞不失一焉康熙五十九年具題奉㫖建坊旌表毛貞女題旌冊受農人洪祖選聘貧不能娶傭於常山希得值以為婚娶貲卒於旅邸女聞潛製衰絰貯笥中及祖選櫬歸路經毛村女服衰麻迎於道左擗踊哀號父善祐堅欲挽之歸女跪泣不從徒步扶櫬歸洪門矢志同穴貧不能葬績紡八年始得地葬有日矣氏絶粒二十一日而死時年㫖建二十六遂合葬雍正二年具題奉坊旌表黄俶禧妻毛氏題旌冊年二十六夫亡守節三十九年誓死撫孤教養兼至余鼎岑妻童氏題旌冊年二十八夫亡撫子子亡復撫姪為後守節三十五年余國傑妻王氏題旌冊年二十三夫亡撫孤成立守節二十六年以上三氏俱雍正三㫖建年具題奉坊旌表余貞女題旌冊許字汪其溥年二十一于歸未配而夫死舅姑欲嫁之貞女誓死守貞未幾舅殁姑年三十七叔其𢎞其濟俱幼貞女佐姑撫養二叔又早世與兩姒同心守節奉姑撫諸姪姑命兩姪為貞女後冰霜之操歴五十餘年如一日雍正三年具題奉㫖建坊旌表詹新元妻余氏題旌冊年二十六夫亡事耄姑極孝家值中落甘㫖無缺姑殁喪葬靡不㫖建中禮撫孤成立雍正四年具題奉坊旌表毛鳴讓妻余氏題旌冊結􅍣五載夫病劇氏預置兩棺凡衣食殮具俱兼男女所需夫殁即絶食十四日而死其葬地及磚壙工匠等類皆先為料理其從容就義又如此王立極妻姜氏題旌冊年二十夫亡事祖姑翁姑竭盡孝養守節三十三年王立賢妻余氏題旌冊年二十八夫亡家雖貧事衰翁甘㫖無缺訓子讀書脩脯無不出自十指間者守節五十六年吳可佐妻沈氏題旌冊年二十六夫亡遺子五齡撫訓有成守節三十年以上四氏俱㫖建雍正六年具題奉坊旌表余和讓妻蒋氏舊浙江通志順治乙未年賊掠銅山氏義不受辱賊斷其首身猶屹立擎子授姑乃仆方紹祖妻王氏遂安縣志結褵二載紹祖卒氏年二十二誓以身殉父母舅姑力阻不聽至夫小祥經營葬地私備衣衾含歛之具擬死同穴絶食十六日而死章彬妻王氏遂安縣志彬病三年氏勤侍湯藥龥天割股彬卒氏年二十六無子誓以死從飲鹵投繯墜樓不死旋絶粒十日而死王氏二節遂安縣志余氏王允譽妻年十九允譽殁撫姪道廣為子娶媳余氏舉一孫甫三月而道廣又亡余年十八貧不能自存或諷以他適輒毅然拒之偕孀姑紡績營生里稱雙節云方猶妻章氏遂安縣志猶死章絶粒七日以殉側室詹氏備嘗荼苦撫二子遊庠余肇修妻章氏公舉事實年二十四夫亡生子甫週歲姑諭以撫孤乃忍死守貞事舅姑甘㫖罔缺克勤克儉教子以義方守節二十七年卒姜鬯鼎妻方氏毛之萃妻胡氏毛之紆妻汪氏王應箕妻姜氏王懋凖妻邵氏余鳴廷妻王氏余國福妻章氏汪滋慕妻余氏胡其哲妻黄氏余時欽妻吳氏方顯功妻余氏陳大彞妻錢氏洪道陽妻章氏余髙徴妻洪氏余之語妻周氏周維楨妻吳氏余一舜妻汪氏王福得妻毛氏陸又紹妻王氏王立生妻洪氏王鼎妻江氏章煒妻姜氏余瑞麟妻鄭氏陳子正妻方氏陳明彰妻方氏方名標妻汪氏余扶運妻毛氏沈㴠妻余氏黄兆禧妻嚴氏方熙年妾毛氏洪日旋妻陳氏洪之金妻胡氏姜如芸妻王氏姚元善妻余氏姜士璠妻毛氏姜良傑妻方氏章一鵠妻洪氏王昌期妻毛氏章之浩妻余氏余志勤妻許氏姜應祉妻余氏姜之盛妻江氏駱鼎髙妻孫氏方可閔妻王氏姜應宿妻章氏余希萬妻程氏余日典妻洪氏周引隆妻方氏王立邦妻姜氏余中惺妻胡氏洪國泰妻張氏章之恒妻姜氏余信賢妻劉氏章潤燦妻方氏章潤湖妻黄氏周允鉉妻徐氏姜光儀妻孫氏黄洊禧妻汪氏黄紹禧妻章氏余中誾妻方氏余有養妻徐氏吳允武妻陳氏李泰初妻江氏姜大瑾妻余氏毛與裕妻李氏周士重妻章氏章如金妻胡氏余三近妻李氏詹宗岳妻方氏章之嘉妻姜氏章奏妻詹氏毛之荃妻徐氏毛之芳妻周氏毛登俊妻王氏方國偉妻毛氏毛如雯妻章氏章明揚妻毛氏夀昌縣明王紀妻徐氏嚴陵志名妙翊紀疾革語徐曰汝年少無子當改適時氏年二十四即引刀斷其髪誓不失節事舅姑益謹舅姑後俱八十餘洪武年旌表童敦妻李氏嘉靖浙江通志名榮年二十四而敦卒舅為敦營葬李即求結壙於敦旁喪終父彦真私許同里蒋姓者逼而嫁之李知勢不可逭乃告於舅姑曰素志欲奉舅姑以終身今不克自主安忍辱身以茍生然死於此父必搆訟是因妾而賈禍也歸死於家則無患矣屬舅姑以後事至夫塋慟哭而去母見其歸甚喜氏以失釵詭其母請出卜家有一妹令尾而從之遂入室自縊母歸則已死父怒欲焚其屍適舅姑送衣衾及棺至乃殮見其釵縛左股間遂葬敦墓旁鄉閭感其義送柩者數百人莫不流涕李志寧妻劉氏萬歴嚴州府志名添年二十四而志寧殁氏以死自誓其父欲奪而嫁之氏號哭求死又託父母之厚者沮之終莫能得遂為必死計製長旙繪夫及已象於上置諸篋中泣别舅姑而歸父母甚喜亟召媒妁議親舉家出迎而氏已投舍旁池水死舅姑迎其屍合葬夫塜宣徳間旌表方大任妻李氏萬歴嚴州府志大任選貢入京病卒氏年二十四無子悉焚夫遺書自投烈熖中以殉孀姑力救强起剪髪毁容奉姑病割肉和藥以進姑殁竭力殯葬人稱節孝徐祺妻吳氏夀昌縣志名班年二十九夫亡懐有遺孕堂無舅姑雖屢經伯叔之厄而氏志堅若鐡石孀居四十餘年婚男嫁女刻苦成家吳俸妻童氏夀昌縣志名閏年二十七俸亡氏拔髮為繩繋手以柩前燭燃一指誓不再適日攜二孤號泣淚枯𦕈一目勉子成立事舅姑孝嘉靖丙辰編徭特出氏免戸田五十畝以示旌李貞女明列女傳年十三受翁應兆聘應兆暴卒女盡取備嫁衣飾焚之以身赴火為父母救止及赴翁家哀告其舅姑乞為立嗣復乞一小樓設夫位坐卧於旁奠食相對非姑不接而舅亡家落忍飢紡績以養姑未㡬姑亦亡隣火大起夜半逹旦延百餘家隣婦趨上樓勸之避婦曰此正我授命之日也抱夫木主待焚須臾四靣皆燼而小樓獨存葉亨妻包氏童文幖妻胡氏項言志妻翁氏葉伯玉妻蔣氏項昌妻吳氏吳惟宗妻李氏李龍妻洪氏徐棣妻劉氏吳翰宗妻諸葛氏劉伯宣妻傅氏葉季修妻蔣氏蔣德瑞妻黄氏蔣孟餘妻施氏洪訪妻方氏葉秉政妻毛氏分水縣明陳叔先妻胡氏嚴陵志名瓊娘年二十六叔先卒遂屛膏沐守約素孝養舅姑始終弗渝洪武年旌表王禹立妻陳氏萬歴嚴州府志年十九而禹立卒即持刀自刎以從姑奪其刀勉之曰汝有遺腹倘生子汝夫猶生也後果生子撫之長成姑雙目失明日以舌䑛之復明萬歴年旌表徐珍妻何氏嚴良晨妻張氏王禹傳妻邵氏王挺成妻伍氏國朝顧明姑舊浙江通志於潛人分水何鼎新聘而未娶鼎新亡氏年甫十六奔喪哀慟翁姑勸之歸氏引刀矢死衆知其志不可奪任其苦守家貧孝養舅姑後殁又竭力營葬父病篤氏割股療之立㫖建愈順治間具題奉坊旌表張光炳妻陳氏題旌冊年及笄適光炳生一子彌月而舅姑與夫相繼亡家貧奉姑孝敬子十歲始就外傅夜則篝燈自課俾得成立王時俊妻髙氏題旌冊年二十九而寡勤紡織以奉翁姑敎幼子慈嚴並至守節二十三年卒陳玉璿妻汪氏題旌冊夫早喪舅姑年邁氏代供子職人稱其孝撫子孫及三世以上㫖建三氏俱雍正二年具題奉坊旌表王時溥妻陳氏題旌冊年二十夫亡繼姪為嗣事翁姑養生送死無不盡禮姜雲衢妻徐氏題旌冊年二十七夫亡翁姑病氏左右侍奉極勞苦無懈色撫遺孤敎訓成立臧嘉儀妻劉氏題旌冊年二十九而寡矢志不二朝夕勤女紅課幼子守節四十六年㫖建以上三氏俱雍正三年具題奉坊旌表張兆熊妻何氏題旌冊康熙甲寅年山寇竊發氏奉姑陳氏在室寇至欲刃其姑氏左右㫖建擁䕶死之姑得免時年二十五雍正四年具題奉坊旌表潘稷福妻劉氏題旌冊年十六于歸夫已抱病氏侍湯藥者一年夫卒臨終囑氏他適氏截髪自誓不下樓者十八載繼子承祧雍正五年具題奉㫖建坊旌表陳學南妻趙氏題旌冊年十九歸陳二十六而寡遺孤長始四歲次在娠氏勤女紅甘荼苦事衰翁孝鞠二子以長以敎不假姑息守節五十五年雍正九年具題奉㫖建坊旌表陳國光妻何氏題旌冊年二十六而寡無子立姪文嵩為嗣撫長娶媳劉氏子又殀劉氏于歸未㡬亦能同姑苦守何守節二十七年劉毓璲妻沈氏題旌冊年二十四而寡遺娠生子復殀氏羙姿容有豪家欲强娶之氏刺靣毁容以絶其念舅殁棺浮淺土遭洪水漂去氏晝夜號泣夜夢神告以柩在蕭山聞家堰遂匍匐往尋果得棺歸葬守節四十一年劉金綍妻髙氏題旌冊年二十八而寡遺孤二三世未葬積棺盈庭氏次第經營入土即族之無後與有後而無力安葬者俱為檡地畢葬焉歲饑煮粥以賑鄉里凡四閲月全活甚衆比鄰有築室而基隘與氏接壤欲得其隙地而難為言氏知之命其子以地讓之守節二十七年以上㫖建五氏俱雍正十年具題奉坊旌表鄭鎬妻陳氏公舉事實夫亡氏年二十六即自縊姑覺排闥解救得甦時甫生一子姑泣謂曰爾殉夫其如呱呱者何氏含哀受命曰兒與夫有約不忍背也請以三年為期及服關潛自飲藥抱兒還舅姑遂殞浙江通志卷二百十四
