body:
  text: 浙江通志卷一百八十九人物八義行下金華府宋吳圭金華先民傳字彥成義烏人倜儻好施與太學生程績從故人貸錢三千萬將葬其親同舍生漢臣給取之俾歸受償於其兄留滯弗與圭如數代償焉至京道遇鄉士葉祖信為太學陳生裒具棺斂圭遽曰溽暑如此須衆則事緩矣立如所費周之陳慎永康縣志永康人宣和中納粟賑飢授中州助教冦亂積骸平野躬率二子良臣良能收瘞之紹興中二子並登第授官乾道間嵗大歉為粥以食飢者鄰有逋稅代償之復建橋三處曰上降下降東濟甃道以便行役孫五人亦相繼貴顯人以為施德之報鄭淮揭傒斯鄭淮傳字巨源浦江人通春秋最憫人窮靖康年飢盡破其産活之傅光金華先民傳字子溫浦江人仕為諸王宫教授未幾退歸田里方臘反縣民多託之為亂任士安統兵至怒甚欲盡屠之光與任厚往諫之曰亂者惟通化一鄉餘皆良民將軍奉朝廷殺賊耳奈何延及無辜任悟遂如其言喻葆光萬厯金華府志義烏人娶黃氏睦盜起青溪婦翁以白金千五百兩屬葆光窖藏之盜平婦翁死三子俱幼莫之知也葆光舉而歸之三子請以二百金為謝葆光雖貧力辭不受王槐義烏縣志字植三義烏人紹興辛未進士里中山田苦旱捐資募民開濬為塘周三千六百步四山七十二澗水會焉以下流難捍倚飛來山築隄七十餘丈東西鑿石開斗門嵗時蓄泄以竇田賴以饒既卒里人祀之陳德髙兩浙名賢録東陽人慕范文正公之義割腴田千畝立義莊以贍宗族又設義學以教里中之子弟族人婚宦死葬皆有助遇遭困厄貧不能立者捐金豫之不令人知有貧而鬻産於德髙者如其請畀之積所入之數及原直則舉而還之山隂陸遊為撰義莊記喻南強金華先民傳字伯強義烏人少負竒氣從陳亮遊亮下大理罪且不測門人畏當路威熖噤不敢出聲南強義形於色貽書誚責言先生無辜受罪將賫恨入土吾曹為弟子當激昻慷慨以赴之乃匿影收聲以自完是得為士類耶走東甌見葉適備述亮寃狀適曰子真義士即秉燭作書數通付之南強遂持書走越見諸臺官誦言無忌卒直亮之寃禮部侍郎真德秀以言事去京兆尹迹其所至見與交遊者輒罪之德秀舟過富春南強亟往見且賦詩為餞人皆壯之宋濓喻南強傳慶元中貢於鄉上禮部不得第授富陽尉轉縉雲丞著有梅隱筆談十四卷郭欽止萬厯金華府志字德誼東陽人輕財好施嘗闢石洞書院以教宗族子弟鄉之秀民願請業者亦聽學焉撥田數百畝以𨽻之後進多所成就從兄良臣建西園書院姪伯廣建南湖書院皆慕欽止之風而興者其卒也朱文公為銘其墓汪大度汪大章金華先民傳大度字時法金華人受業吕祖謙慶元初祖謙觸權姦貶饒州大度往送之伴送者凌辱祖謙大度以義折之直欲與之坐獄從至貶所久之乃還經紀其家事甚至朱熹致書深加歎敬弟大章字得叟亦從祖謙遊祖儉之卒也大章距秋試才四日舍之就道護喪以歸故人路知監卒於蘄不能還葬大章走蘄載其柩歸割地葬之張垓金華先民傳字伯廣金華人以蔭入官葉正則未第時貧甚垓館於家資給之後正則帥建康辟垓為淮東轉運使幹辦公事吕祖儉得罪貶垓方在官所即解裝貿輕賫追至信安贈焉陳亮被誣繫大理獄垓不避禍奔走經營卒脫其難盧民兩浙名賢録東陽人嘗拾遺珠一裹價值不資持歸令人於獲處俟焉少頃失珠者號泣而來詢得其實舉還之其人泣且拜曰非公吾死矣今之生公之賜也後嬰疾幾殆忽神降於女奴言曰上帝以君還珠之德賜以夀考復示方藥疾遂愈卒年八十六葉大同金華先民傳字會之蘭溪人為人重氣義有友人死而無櫬者其家欲賣廬以為櫬大同曰吾未死已有木友已死乃無木吾縱死不致剝廬友雖死不可無廬遂輟已櫬櫬焉兄弟三人其兄紹彭早世無嗣大同以幼子後之或謂法應分其産大同曰嗣可分産不可分明義利也義利明則吾兄真有後矣王魯齋曰世有繼嗣之爭者觀此可以少愧范大録金華賢達傳蘭溪人為本縣吏行案公平不撓法以求賂中年無子因迓監司至白沙買一妾後生一男官至少卿生二孫一為郎官一為提舉曽孫相繼登第追贈正議大夫方永齡兩浙名賢録字無盡金華人敦禮尚義而好施宋末兵興嵗飢流亡載道永齡發粟作糜以食餓人復作棺衾以給殍尸之無告者薦授婺州録事入元棄官隱居孝川徵聘不起惟儲藥施方以濟患者終其身不怠元吳謙金華賢逹傳字仲恭浦江人世業儒父蜚聲宋祕書省較勘文字與謝翺友善翺寓謙家尋卒無嗣謙經營喪葬刻石志墓復輯士友哀誄為哭謝編季舍孫義烏縣志字國用義烏人嘗構書舍與弟姪講學詠詩以自適設義孰延師教鄉族子弟值嵗歉發粟賑飢者人有不善委曲開諭令其悔悟鄭文嗣鄭太和元史鄭文嗣傳文嗣婺州浦江人其家十世同居凡二百四十餘年一錢尺帛無敢私至大間表其門文嗣殁從弟太和維主家事益嚴而有恩家庭中凜如公府子弟稍有過頒白者猶鞭之每遇嵗時太和坐堂上羣從子皆盛衣冠鴈行立左序下以次進拜跪奉觴上夀畢皆肅容拱手自右趨出足武相銜無敢參差者部使者余闕為書東浙第一家以褒之太和方正不奉浮屠老子教冠婚喪祭必稽朱熹家禮而行執親喪哀甚三年不御酒肉子孫從化皆孝謹雖嘗仕宦不敢一毫違家法諸婦唯事女工不使預家政宗族里閭皆懷之以恩家畜兩馬一出則一為之不食人以為孝義所感有家範三卷傳於世揭傒斯鄭文融傳文融一名太和字順卿鄭文泰揭傒斯鄭文泰傳字達卿浦江人大德末年飢人相食與兄文嗣鑄大釡鬲日煮糜分啖全活者數百人性介特據直道行不肯持兩端保州里如家數十里間黥髠盜販無敢入其境撫家一以慈書忍字懸置各室使相雍睦其家自淮毁産拯荒甚貧至政漸裕德璋始大振逮文泰愈盡心不懈凡山林陂澤園田室廬得以斥拓資義聚者文泰功為多吕汲萬厯金華府志字仲修永康人族人貧者月有廪年當入學者家有孰鄰里有急必周之嵗歉為粥以食餓者所活千百計至自奉乃極儉薄甫踰冠大盜竊發官軍進討汲踐重山密林探其巢穴事平口不言功子機字審言樂賑鄉人之急人或懷嶮巇以相傾忍弗與較綽有父風蔣沐金華先民傳字澤甫東陽人居橫城倜儻尚義即所居之西建義孰一區割田租一萬𨽻焉迎致方蛟峯為之師擔簦負笈者不逺數百里而至其教法一遵白鹿洞遺規月書季考礱石題名二十名以前給贈幣帛書籍其餘分贈有差喬見山陳月齋吕存齋繼主師席前後題名者六百八十有五人至元中江右行省薦授建昌縣主簿以病免歸李叔安永康縣志大德中遭時大歉發粟萬斛賑飢鄰邑扶杖襁負就食者以數萬計置大釡煮粥食之多賴以全有司表其所居坊曰由義丁廷玉義烏縣志自幼倜儻有謀略嘗受業石一鼇之門至正間里中豪猾徐甲嘯聚為亂縱火焚縣治剽掠村落勢張甚廷玉乃散家資率民兵捕斬之鄉里賴以安事聞授武義縣教諭袁仲仁金華先民傳名大珍以字行金華人兄大通客死永嘉仲仁親往取遺骼歸葬先隴嫂張氏吳氏寡居無子張居海鹽吳居鄞俱迎致而終養焉二姊適寧氏皇甫氏早喪所天子女煢煢迎養於家且為之婚嫁置田廬以贍其生友人張彥希自雲南經厯致仕於家一日夫婦俱為仇家所殺盡劫掠其財一女銀奴甫生仲仁往哭之抱其女歸撫如己女日夜為蹤迹其賊竟得之伏法鄞人蘇甲趨公事來金華病莫能行同事者委之而歸仲仁攜還家迎醫治疾及愈其人德之不忍去憫郡民貧者無葬地每至焚尸沈骨負郭有沃地直可五千緡捐之為義冢蔣大同萬厯金華府志字伯康東陽人立義孰以教鄉里子弟凡幾百人供給衣糧者餘四十年賑恤顛連無告者不問親疏嵗飢有倉行旅經其門者有資給喪有賻婚嫁有助人干貸之者即如數無吝黃伯良正德蘭溪縣志蘭溪人至正壬辰以四方兵起令出民財募兵捍禦鄉邑拜官有差伯良應令出財募兵一百人皆勇壯可用憲司令扼要地江浙行省授伯良本州稅務大使田子貞永康縣志名貞以字行至正丁酉冦起縉雲民多奔竄巖穴且飢饉相仍道殣相望子貞出已粟賑之皆羅拜於庭曰我等已在鬼籙賴公生我倘有役使蹈水火無恨子貞因結為義旅使捍鄉井賊不敢犯兩浙名賢録亷訪使者檄授巡檢子貞辭明兵下浙東陳友定授武義尹知天命有歸縛使者戮之焚其書劉大音兩浙名賢録字韶父義烏人族人瀕死子方乳以業劵授大音曰非君仁恩不足以保此子大音藏劵笥中候其子長召兩觴之還其劵周急恤嫠不一而足嵗侵羣盜起至相戒不敢入其里宋太史濓稱為古之吉士云明鄭濓明泳化類編浦江人自其先世祖綺有純德傳至文嗣已六世同居二百年咸如綺在時元至大四年詔表其門入明曰濂曰湜皆以行誼聞時傳十一世矣族人蕃衍産益多郡人推為糧長屢以事入覲太祖識之後有人訐其家與胡惟庸行財户部陳員外指與郭恆糴倉糧有司逮濓及弟湜至京上曰鄭氏義家焉有與人行財糴官糧顯是誣害追到鈔貫命給還仍擢湜為福建布政司參議因詢所以治家長久之道濓具以對上深善之洪武癸酉尚書嚴震直述其家世孝友命簡其子弟年三十以上者二十四人並授之官有曰濟者最有文學除左春坊左庶子侍從東宫辛巳四月詔旌其門閭曰渶者以宗長詣闕謝恩陛辭日上御奉天門親書孝義家三大字題其傍曰賜浦江鄭渶而識以精一執中之璽一時聞者知勸謹按鄭湜著有政績見循吏門名山藏云濓家被誣通胡惟庸反湜與濓爭詣吏濓曰我長湜曰兄老相推者數四太祖聞之曰有人如此而從人反耶召賜飲食勞免之所載小有異同附録於此王澄浦陽續人物記字德輝縣人忠惠公萬之後勇於為義與其弟不分財異居瀕終戒諸子士覺等曰同里麟溪鄭氏合食同居久而彌篤若等似之吾瞑目無憾矣澄沒士覺召子姓等謂曰吾父有遺言欲法鄭氏今鄭氏成規具在吾將損益行之何如皆踴躍承命共參定家則一卷計一百八十四條凡敬先務本敦禮厚生睦族恤衆具有條貫而敬戒防範曲盡其義洪武初郡縣上其事旌為義門同鄭氏簡拔子弟可用者赴京擢王慶為右春坊右庶子金盛宗永康縣志縣人敦行好施捐建文廟櫺星門洪武間出粟一千四百餘石賑荒璽書褒美其餘造橋梁修道路種種可風戴幵分省人物考字善甫金華人種德尚義嘗捐己田五百畝置義莊以給養宗族親姻之貧乏者又設義孰以教訓其子弟殿講御史盧虔為撰記其後子孫食報不衰郭叔和揮塵新談蘭溪人永樂癸酉山崩溪漲叔和家當溪口其沿山居民盡為漂流積尸蔽溪而下叔和倩人撈之灘上族屬認而舁歸者以百數其他不能認者尚多叔和積薪置尸於上焚之復拾遺骨瘞之謂之叢冢山田多荒廢者叔和揚言於衆曰願布種吾助之嵗登吾不責償由是民咸就之後叔和之子若仲曦仲南仲初仲時輩為郎為執法為中舍者相繼顯於時錢澤魏驥義民錢澤墓表字世淵上世自臨安徙金華尚義出於天性家素饒嵗飢饉出榖一千二百石以助有司之賑民有逋負者出榖一千四百石召其民於前悉焚其劵有司以聞璽書旌為義民王徐吾學編字叔豐祖禕死國稌少有志從學方孝孺甚為所器欲妻以女未及也嘗周恤其族又嘗與孝孺表姪鄭珣至聚寶門外求其遺骸歸葬不可得卒逮繫文皇帝念祖褘死國之忠特宥免方嚮用而稌力以疾辭讀書青巖之下將終身焉後輯方氏遺文為緱城集以傳世名山藏稌卒門人私諡為孝莊先生汪灌兩浙名賢録字慶衍金華西山里人為人亷直能急人患難人有故叩之即風雨寒暑不避嵗惡飢民羣起為寇守召灌為畫欲調兵灌曰無以為也此直丐升斗救死耳下片符可致何俟兵乎脫兵出則挺而搏矣守悟然猶遣巡檢與俱灌止巡檢於家飲食之獨以數十輩持符往至則畢集吏覬功悉論以死灌詣府伏庭下不起曰是曹束手隨檄來未嘗扞法也今以逆論之後復無凶嵗乎且灌實召之灌不忍民從灌而就逮以死也守感悟亟解散其獄特黥者二人而已倪士華浦江縣志浦江人贅蔣洪家洪愛之遂無意育子士華曰異姓不可承祧買陳氏女進之踰年生二子士華挈千金之産盡還之歸理舊業日益饒裕宣德間嵗飢輸榖五百石正統間飢又輸穀八百石裔孫治亦好施與有負責者折其劵里戚不能婚葬者助之嘉靖間絶丁為纍為白於長令蠲焉吳畿義烏縣志字希采家世饒甲於一郡輕財重義正統戊午嵗飢輸粟二千石以賑旌義民復其役嵗己巳師平處寇畿同弟希俊希厚捐資犒師以省民力復助金修學協造通濟橋弟希仁希玉輸粟賑荒嵗掌區賦代民先完希仁子文勉屢出粟賑飢代族人輸賦又捐資建忠孝堂文星樓濬繡川湖成化問奉詔捐米三百石以蘇民困授九品散官徐蒙六金華先民傳永康人正統十四年括寇掠境居民多逃竄先是縣收折鹽糧銀數百兩付蒙六傾銷未交官而寇至蒙六以棺貯埋土中而逃人無知者後寇退官將重徵於民蒙六槖其銀以獻曰銀故在勿徵也官大異之顧而歎曰此善人其後必昌今其子孫多殷盛人以為積德之報葉思瑞東陽縣志字文貞事親恭順撫諸弟亦篤摯宗族有不自給至鬻其女者思瑞曰爾我雖有親疏自祖宗視之均一體也我不爾恤是忘祖宗亟贖而嫁之正統丁巳嵗飢罄所藏粟貸鄉民約秋成不取息至期貧不能償者不較戊午貸如初復具糜聽老弱就食所活甚衆又代民輸是年夏稅朱文完義烏縣志義烏人家饒於財赴義樂施惠及鄉閭雖商旅往來困乏者莫不賑之正統間處賊陶得二等率衆數千流擾郡邑所過抄掠無遺經其境賊語其黨曰此長者朱文完之閭相戒秋毫勿犯包懷德兩浙名賢録蘭溪人為諸生時與同邑胡文善同席研既而懷德為侍郎而文善亦以進士為主事居京邸文善病革懷德往訣文善泣語曰吾無子止一女見託能為終始乎懷德曰諾既而文善與妻相繼卒懷德抱其女歸囑妻育之如己女未幾致政歸其女齒長矣擇壻得祝生將字之懷德與文善居相去幾二十里文善雖死而故居尚存懷德先令人分其室為三夫婦引其女抵文善居己處左楹妻與女處右楹虛其中設文善夫妻神位至日備祭筵為文以聘嫁告命女拜己復拜其婦懷德長號痛哭然後行婚禮遣嫁之奩具皆備當時稱友誼之篤不以死生易心者無不稱包侍郎云黃裳分省人物考字元佐浦江人嘗讀范仲淹義田記感而捐常稔田二百畝儲租以濟疏族鄰里之急者名之曰希范晚第進士調三衢司户陳懷堂東陽縣志號侃齋東陽人初秉家政遇嵗飢輒發榖三百斛賑之全活甚衆斃於道者為之槥斂嵗視農民緩急量為給散有司聞其賢令總一鄉之賦貧不能輸者每為代償凡二十年不變又創買義租代鄉人輸鹽糧囑子孫世守父叔良以正統戊午發粟數百石餉貧者又為貧民代輸夏稅陳氏固世有令德哉盧楷兩浙名賢録字中夫東陽人天順壬午鄉試第一入太學時祭酒邢讓陳鑑司業張業以典簿侵饌錢抵罪楷方厯事中書奮欲救之或曰無益且得罪奈何楷曰師生猶父子也父既溺子可懼罪而不號呼以救之乎遂率同舍百餘人伏闕上書卒白三人之枉公卿間髙其義以方唐之何蕃云俞統金華先民傳永康人成化十九年大水家被衝沒妻女皆淹死先是有商人市苧者寓數十金其家而去至是商人泣而至統曰無庸吾家雖破銀幸收檢尚存挈而還之弗􅐩毫釐云趙孟實東陽縣志名光華以字行富而好禮喜賔客交納四方襟佩禮遇備至其於鄉鄰顛困時有周恤處宗族尤有恩義或公帑告乏及郡邑有興造輒捐金發廪助之成化間學宫齋廡壞孟實與其姪鎧及張啓陳懷堂張鵬等重建分毫無擾於公浙僉憲張悅欲建青蘿山書院祀潛溪宋先生以語孟實出力獨成之嵗大侵出粟六百石入官薦授承事郎張禮浦陽續人物記浦江人家衆千指食爨五世不析性好施創義倉以賑貧乏置養賢莊以禮士嘗出榖千石佐軍興𢎞治間旌其門曰敦義張萬山義烏縣志居縣之龍陂一日出見道傍橫尸令掩之因念曰是暴露者殆無主乎即有主而無地欲葬得乎似此者必多捐九里谷山聽鄉人之貧者葬焉事聞郡邑優奬陳寧實湯溪縣志湯溪人嘉靖間值嵗歉捐財代輸二都鹽糧又出穀以賑飢民學宫內造育英坊又捐資以助鄉里請給冠帶酬之辭不受張孟暄浦陽續人物記字克和縣人性孝友仗義嘗捐金為邑學濬湖為金衢嚴三府豁濫賦洪希文湯溪縣志縣人縣東有芝溪橋行者病涉希文捐造石橋往來便之萬厯戊子嵗飢出榖三百石以賑貧乏陳公昌義烏縣志居縣之西門一夕自外歸於城門左凳石拾囊金二百餘攜歸屬其妻曰此故人物謹藏之明日至石邊俟之有倉皇至者詢之曰吾糧長昨領夏稅往府偶醉卧此寤驚文書在家急走歸因遺金不收吾自量無活理公昌驗實還之封識如故其人願分金以謝不受國朝戴正傑鄉賢留祀册浦江人昆季四人分爨之日不較家財明崇禎丙子浦邑大荒買穀八百石散給飢民全活無算族中無力卜葬者為買地於金獅嶺下立為義冢復捨山木為棺槨之具創建本族祖廟祀産以備蒸嘗又於廟側構書院六間另設義田二十畝收租以給族之貧而不能力學者見黌宫傾圮捐金倡修康熙三十五年入祠胡之翰題旌册義烏人嵗貢生授嘉善縣訓導在任八年捐資修葺學宫周恤寒士居鄉置義冢設粥厰建義孰力行善事事聞奉旌應杰鄉賢留祀册永康人雅志好古著家範行古冠婚喪祭禮事父母盡孝析産取薄者修大成殿建明倫堂代完鄉民逋稅善事不可枚舉學使者萬潮扁其門曰世禮鄭應朝鄉賢留祀册世居浦江義門其先九世同居歷朝旌表時家道中裒慨然以紹祖為己任冠婚喪祭一遵舊規孝義家風賴以不替康熙三十六年入祠應修公舉事實字舒佐永康人九嵗失恃哀感鄰里為之罷社事繼母先意承志母失明不離側者三十年兄故貧無以輸賦嵗悉代上之明倫堂大成殿圮首出資以倡興作設義館以教人置義冢以掩暴露嵗歉出粟為糜以活飢者鄭璧公舉事實浦江人上世十一世同居旌為義門璧奉為家範親喪廬墓三載浦邑僻處山陬諸生艱於資斧不能應試遵父遺命捐田百畝為諸生科舉路費又置田若干畝給族人科舉路費文廟傾圮捐資修葺又捐田以供嵗修建宗祠設義孰築橋梁立義冢嵗旱散斛六千賑貸雍正元年見以舉孝亷方正奉文給六品冠帶送部引老不赴卒年七十有六鄭思俊公舉事實浦江人事親以孝聞與伯兄同爨事之如父有事必咨而後行撫諸姪同於己子邑有義孰延師教之厯三十年無倦色性好施豫捐文武應試路費田一百畝又捐田三十畝以為修葺學宫資他如置義冢施藥捨衣至今子孫猶繼其志祀鄉賢衢州府三國吳徐平三國志虞翻傳注字伯先太末人諸葛恪為丹陽太守請平為丞平為恪從事意甚薄及恪輔政待平益疏恪被害子建亡走為平部曲所得平使遣去五代慎溫其𢎞治衢州府志西安人事吳越都統軍錢仁俊會程昭悅譖闞璠杜昭達欲奉仁俊為亂收溫其使證之考掠備至堅守不屈吳越王𢎞佐嘉之擢為國官誅昭悅釋仁俊宋江景防兩浙名賢録字漢臣常山人初事吳越為侍御史唐末諸國私為重斂吳越尤甚民皆困苦及宋平諸國賦法皆仍其重景防歎曰民苦苛斂久矣使有司仍其籍民困無已時也吾寧以身任之遂沈圖籍於河詣銀臺自劾所以亡失狀太宗怒謫沁水尉遂屏居田里以卒其後子孫相繼擢正科者四十九人由他科顯者不在是數而五世孫侍御躋六世孫侍御溥尤顯至十世孫萬里遂登台輔人謂隂德之報祝文朴𢎞治衢州府志江山人嘉祐間五世同居聚族六百餘口以孝弟亷遜為里閈所推周自強正德江山縣志字勉仲由刑部侍郎帥廣先是仕官卒嶺南者妻女不能還多流落為婢自強奏請官為嫁之仍置接濟庫計口給錢米資之還且慮行之不久乃以己俸買田三十頃聞於朝刻石著其事毛文粹江山縣志性仁厚周窮恤匱輸財助公郡守以聞敕賜迪功郎范元之天啓衢州府志西安人素貧篤志讀書盛暑浴於水邊拾得白金一袋歸謂其子曰世人以財為命萬一失此者枉喪性命將如之何翌旦父子攜金於岸待之果有一婦悲號而至詰其故曰夫坐獄當死易田得金至此失之元之即以還之是年其室産靈芝數莖光彩奕奕明年父子登第厯十二世皆為郡守祝禹圭𢎞治衢州府志字汝玉西安人擢進士第嘉定初除尚書右郎未幾歸立義學訓族子弟置義莊以贍貧者婚喪仍有助焉鄭巖嵩𢎞治衢州府志字如山龍遊人德祐乙亥嵗飢發粟平糶活三千口邑令舒渚榜其門曰龍州義居元柴奎江山縣志江山人至大間與進士邁珠同知衢州路時湖襄兵起凶徒鼓衆為亂共議討賊奎毅然單馬入賊境喻以仁義賊衆感動遂解散郡賴以安劉文瑞天啓衢州府志字彥章開化人嘗賑飢復浮橋設孰延名儒鄭彥善輩為師以教子弟後原善張宗元登第程琚魯貞領鄉薦榜其孰曰聚奎祝君翼正德江山縣志江山人好施豫散籯金置義莊以賑鄉族之貧者縣尹孔淮疏其事旌之汪琳𢎞治衢州府志字清逺常山人家素饒嵗歉必以貸鄉人貧不及償者亦不責焉嘗擇山之幽曠者為義冢葬其親族之不能葬者進士程斗作記至正初浙東僉事余闕察其行義辟之不就以夀終於家明夏源清龍遊縣志龍遊人洪武庚申以孝弟力田舉奉使蜀府克慎厥職王有所餽力辭不受其家四世同居百口共食云葉天保天啓衢州府志字彥祥西安人洪武中有江山王姓虧糧纍千太守郭敦親判券契田一頃零二十四畝招富民出金以田償之莫有應者天保輸資一千兩有竒以應太守之命田在隔縣夷然不受居恆一方之民待以舉火麥舟之惠比於范公余敬𢎞治衢州府志字時和西安人拜監察御史剛毅端方彈劾不避嘗置義倉義學義冢以濟族里徐存禮天啓衢州府志開化人嘗於道傍得一青囊啓視之白金也攜歸隂置之密室復往候之有三人倣徨而來問之曰某皆徽人往遂安市杉木道此少憩遺囊於此內白金百兩皆稱貸於人者不獲有死而已存禮遂偕抵于家出以還之其人舉一錠以酬存禮曰吾茍欲之當盡匿顧乃取其少乎弗受金實分省人物考字用誠開化人仁宗時授衛府左長史周貧恤難不吝所有故人林文郎卒於京親為殯斂歸其遺骸太學生江表死無所托既為治喪閲其篋得白金數十兩封識以歸其家華慶開化縣志開化人正統三年邑大飢輸粟千餘石助賑有司以聞賜璽書奬諭後孫華檀亦以輸粟助邊授七品散官徐儉衢州府志號亷溪開化人隱居好施正統三年朝廷有賑邊旨儉慨捐粟千石疏聞欽賜冠帶子仕端克承父志成化五年亦輸粟千石賑濟災民事聞賜秩文林郎鄭黼明西安縣志西安人正統四年例勸民有出穀二千一百石者賜敕一道勞以羊酒立碑旌為義民時以黼明為首王士參徐庭立江山縣志並江山人正統間士參輸穀一千二百石助賑有司以聞賜敕一道免差役三年庭立亦江山人正統間輸穀千餘石助賑詔免差役余章萬厯龍遊縣志字達夫勵志篤學動循禮法宗黨有袒裼坐者聞其至輒反走以無子買妾杭州聞其女言父母為怨家所陷乃焚券遣歸得遺金道上訪其人還之金綋天啓衢州府志字士珫開化人同宗一門疫死二十餘人無敢視者綋獨周旋其間為之殯埋綋卒之日至無以為殮周延熙正德江山縣志江山人隱居讀書嘗建義倉闢義孰施藥與棺鄉人德之詹斯常山縣志字宗理喜急人之困館賔李仁病疫僕𨽻畏傳染弗敢近乃躬與寢處藥弭扶掖無闕卒愈歙商汪蘭來糴逸四十籌召還給之嘗收責至東門見王髙四憐其餒反給魚米慰遣之鄉民江伯明等以逋賦被繫箠撻幾死為代輸踰百金陳真有負而寠將鬻妻以償急焚券以止之方景溫天啓衢州府志西安人父童以人才舉任福建鹽運司運判景溫省父道拾遺金三百兩待失主不可得義不欲以自利為市槥與衣衾施不能葬者施日浸廣所獲遺金不足以父所與三百金繼之已又析産繼之至老不倦殁而身無以殮也鄭春熙衢州府志常山人成化間里民鄭廣為賊所誣幾死力辨其寃得釋嵗旱糴米賑飢雖傾篋弗惜經商遇道殣棺殮之有病暑仆地者亟救以藥得蘇亦不問其姓名尹蒙萬厯龍遊縣志龍遊人性好義急人之難嘗出棺瘞里中貧而死者嵗歉輒免鄉人租逋余宗洪天啓衢州府志字應大西安人善生息以供二親甘旨祖墓久荒為置祀田立宗祠里中殁而無主者設義冢以埋之設義田以祀之嵗飢捐穀二千石以賑之桃源冦起募義兵赴敵賊走獲其餘孽蔣宗明衢州府志江山人四世同居房無私蓄人稱其敦睦吾琰天啓衢州府志字廷瑞開化人饒冦之變琰以義民協謀調濟邑賴以安居鄉務成人美有急難即為排釋無不感服昆弟業已分資因兄老姪幼兼為總理置産俱為均分徐九同開化縣志開化人學宫之遷鐘麓也其地多九同業捐之無難色邑士咸誦其義鄭騮天啓衢州府志字德孚江山人正德辛未進士居鄉憫族黨之寠特創義倉遇荒施賑更設義孰人知向學敦行江鋌鄉賢留祀册常山人正德間嵗貢生任玉山教諭生平嗜禮好古對子孫臧獲無惰容冠婚喪國朝祭一遵家禮嵗飢設義倉以賑鄰族雍正元年祀鄉賢毛仲江山縣志江山人嘉靖丙戌大旱傾廩賑飢全活甚衆徐洙衢州府志字東魯常山人好施豫賙窮恤匱雖傾囊弗吝也輸粟義倉築造官壩葺關帝祠於迎恩門外以己地益之蔣永慶衢州府志字廷餘開化人睦族善鄰會里中疫人莫敢近永慶手劑湯藥以療之多所全活殁者為之措棺給事中鄭瑞銘其墓葉厚元西安縣志西安人任上林監署正嵗侵輸穀賑飢邊警捐資助餉倡義鼎建學宫修城修橋助嫁殯蠲逋券周親多賴以舉火歷被旌奬汪朝寅開化縣志開化人太學生萬歷己亥捐穀千石賑飢郡邑旌奬葉朝鱗衢州府志西安人年八十五足迹不履公府急公仗義賑恤不吝千金造管家塘下陀橋二處石梁里人稱之國朝徐開錫鄉賢録常山人由貢生歷升彰德府同知慷慨仗義凡有所求無不傾槖以給毫無德色助修學宫凡橋梁道路不時捐資修造人無病涉康熙四十一年祀鄉賢江上達衢州府志字仲顯開化人父殁遺券二篋悉焚之存心施濟寬厚溫和人以望見顔色為幸明季寇盜充斥過其門皆曰此長者居勿入也子南齡成進士封奉政大夫年八十六卒詹奎元鄉賢留祀册開化縣庠生孝友無間言族姪有不能婚者出資助之佃户貧不能納租者免之里黨死不能殮者施棺槥以瘞之遇嵗荒減價平糶煮粥賑飢全活甚衆同圖有逃亡絶戶欠納虛糧者為置田給里民收租補輸國課一方賴之族人詹西來常山庠生嘗捐資修大成殿建崇聖殿並祀鄉賢楊有材開化縣志字石卿每遇嵗飢出粟賑濟推解不倦嘗設策補墊圖賠里中賴之三舉賔筵張延曅公舉事實字蔚生開化縣庠生少孤事母以孝聞康熙甲寅寇變伯兄為賊辨所執挺身赴救艱苦備嘗季弟早殁弟婦徐矢志自誓撫恤於流離困苦中卒完其節甲申嵗飢米價騰貴慨然出資糴米首倡平糶邑東南鄉咸倚賴之嚴州府宋胡莊建德縣志字吉鄉建德人推江淮總幹補將仕郎乾道乙酉桃源寇作莊畫計擒之淳熙辛丑水旱相仍飢殍甚衆莊以己之山林縱人樵採民賴以生項訓萬厯嚴州府志淳安人父肆字處約登紹熙四年進士第為湖口縣令時詔給官價買義役田訓欣然割己田應詔不受官價縣令陳曅嘉歎因其所居清溪鄉曰和義千仞里曰歸善里鄭璹嚴陵志字伯夀穎之子倣范文正公義田置仁夀莊以周宗族方萬里建德縣志字子萬嘉定四年進士趙汝述守平江遇之甚至汝述卒賔客散去萬里獨護喪歸方元龜淳安縣志號友山家饒於資時縣裒民財治廳事元龜慨然曰小民疲弊吾請獨當之遂捐資僦工不匝月而就令旌其義元姚椿夀楊維楨姚椿夀墓志字大年唐宰相崇曽孫祕書監合嘗守睦因家焉椿夀丰姿偉特讀書輒了大義闢樂育館嵗聘海內名師教子弟及里中兒性端直平生無二言與人交始終見底裏於義利曲直必嚴其辨鄉鄰有爭者得一言即解去嵗飢周人之急惟恐勿及稱貸者久則焚其券創世濟橋於峨溪上橋置亭嵗五六月施茗飲饘粥於行者邦大夫薛超吾道經桐廬枉道過門以處士禮禮之明余郁兩浙名賢録字公文淳安人洪武初以薦辟入朝授陜西道御史尋坐事謫夔門時太史宋濓卒於蜀葬無定冢郁結廬其上守護唯謹後有鄭楷者濓弟子也為蜀藩長史過夔郁泣而囑之曰吾為若師守墓三十餘年今子來有託矣啓諸獻王改卜成都夔人髙其誼立祠祀之吳文憲淳安縣志淳安人嘗途中值暑浴於河有前浴者遺金四十兩而去文憲見之即托疾卧其處及晚見金主倉皇而返迎謂曰勿憂吾為汝守金主願以其半酬之固拒不取程懋正淳安縣志淳安人任醫學訓科正統間捐資賑濟詔旌義民子敏恭亦好善樂施嘗遇余姓者鬻妻以償官租敏恭惻然叩其所直遂出已資代完其租後應詔授承事郎馬景福建德縣志建德人獨力起家資産分推諸弟嵗飢周恤鄉鄰有稱貸者久則取券焚之以閭里艱於汲疏鑿甘泉井方廣丈餘覆以石欄井眼有六郡守萬觀旌曰德沛甘泉仇文政建德縣志建德人五世同居天順間郡旱文政輸粟八百斛奉敕旌其閭曰義門子綱成化間又輸粟五百斛藩司行府立石萬歷四年其族孫錬鉞二人復輸粟二百五十斛府給冠帶以榮其身阿寄田汝成阿寄傳淳安徐氏僕也徐氏昆弟别産而居伯得一馬仲得一牛季寡婦得阿寄阿寄年五十餘矣寡婦泣曰馬則乘牛則耕踉蹌老僕乃費我藜羹阿寄歎曰噫主謂我力不如牛馬耶乃畫䇿營生示可用狀寡婦悉簪珥之屬得銀一十二兩畀寄寄則入山販漆期年而三其息積二十年而致産數萬金為寡婦嫁三女婚兩郎齎聘皆千金又延師教兩郎既皆輸粟為太學生而寡婦則阜然財雄一邑矣頃之阿寄病且死謂寡婦曰老奴馬牛之報盡矣出枕中二楮則家計巨細悉均分之曰以此遺兩郎君可世守也言訖而終徐氏諸孫或疑寄私蓄者竊啓其篋無寸絲粒粟之儲一媪一兒僅敝緼掩體而已阿寄見徐氏之族雖幼必拜騎而遇諸途必控勒將數百武以為常見主母不睇視女使雖幼非傳言不離立也何永敬嚴陵志建德人昆季四人並敦義讓父道崇治家嚴肅嘗訓諸子曰吾逺祖起家以來皆以孝義著聞由髙祖希紹至吾相繼不墮又已四世若等其遵承之勿替永敬諾不忘至天順間蓋七世矣一門六百餘指皆同居共爨庭無間言成化元年知府張永以事聞於朝詔旌其門弟永慶姪碔成化中皆嘗輸粟賑飢永慶旌為義民碔授七品散官余仲濟余際陽俞則仍周宗澤洪增洪肅萬厯遂安縣志並遂安人成化十七年奉詔輸粟五百石賑濟飢民賜敕旌異吳定夀昌縣志字原正夀昌人纍舉孝亷緣親老力辭不就延師開義學期以造就一方闢地構公堂用以聨屬合族建橋梁修道路救災恤患憫匱周窮汲汲如不及王景貴建德縣志建德人性好施豫見義勇為縣北胥村路當孔道環以大溪往來病涉景貴捐數千金建石橋長十餘丈郡守李德恢為文紀其事題曰胥村義橋其他建安仁橋砌釣臺路鑿塘築堤人多利賴郡邑嘉之授以義官孫大年亦以賑粟旌奬毛彥恭萬厯遂安縣志遂安人自其祖希成行義樂施為鄉閭冠至彥恭子姓益繁乃建家廟以聨宗族延師儒以教子弟躬行率衆同居六世食指數百雍如也嘉靖十四年監司以聞於朝旌其門曰義門蔣時慶萬厯嚴州府志字元吉遂安人為諸生時以行優七庠督學旌異逮舉孝亷絶迹公庭里有以事相囑者義形於色叱之去曰毋汚我有稱貸者貧不能償即面焚其券市中偶見鬻妻者詰其故曰迫於責即捐資代償值嵗大飢傾囊賑濟其好學循禮至老不衰洪國史夀昌縣志字君鑑夀昌人萬歷壬子中北闈副車慕范文正公之風捐田二頃半輸縣半輸學以濟族衆邑人有義田録記其事商汝泰淳安縣志字景亨文毅公輅之孫嘗作勸世直説戒火葬論鄉人多化之自港口至文嶺山路險隘多坍塌汝泰開拓修砌行者便之凶嵗鄉民貸穀不取息有不能償者焚其券遇野有殍捐棺以掩埋之纍舉鄉飲賔不赴毛志宸遂安縣志號養初遂安人兄弟共釡而炊析箸日相向涕泣宗黨義之貧民貸粟不能償輒自引避志宸慰撫之更貸焉免其券蔣試鼇建德縣志字後峯建德人同里洪子恩逋糧鬻女試鼇代償遣嫁閩商林揚庭挾資千金過嚴病篤封識寄鼇鼇乃厚殮之遣示其家越三年若子來取前銀封識如故其他置渡砌橋不一人呼為蔣老佛詹應夔鄉賢留祀册建德人萬歷間有陳明者因逋糧甚急計賣其媳應夔慨然代納之崇禎間嵗飢疫癘流行貧無資者不能含斂暴露不下千百應夔買木置棺悉為埋葬又創捨棺義會悉力國朝施捨十三年祀鄉賢祠康熙吳叔文夀昌縣志夀昌人好施不望報邑令李睿新縣治首以巨材輸焉邑營學宫助資甚厚嘗奉救荒例輸粟三百斛義得立石力辭之程煒淳安縣志字克明淳安庠生以麟經名専門逺近負笈者雲集開義孰於西坡每嵗輸穀二百石以贍來學一時科貢咸出其門余材遂安縣志字大用遂安人父琛舉子五材最少父析産欲私以膏腴固辭曰諸兄溘先者三又一嬰疾諸孤待哺忍獨受私乎父曰若後昌矣生平恂謹無崖異臨取與則毅然不茍常捐資佐人急里中項某逋賦將鬻妻出錢代輸之余亦新夀昌縣志夀昌人嘗捐資助建青龍塔賑飢民六百口郡守旌為善人榮以冠帶國朝毛之履舊浙江通志字太素遂安縣庠生生平焚券嘗數十計佃戶以稗濕充租置不問曰吾姑譬之鼠雀耗耳子際可知固城縣誡之曰吾祖肖環為令不受一錢汝善繼先人之志每聞便民事則竟日喜時水決五門堰際可日夜堵築一邑得全比歸之履慰勞備至是夕平善如故夜五鼓乃端坐而逝章可聞舊浙江通志字去聞遂安縣增廣生醇厚謹篤待族黨姻睦無間尤喜施豫為人排難解紛閉户課子凡有善屬文者視若已有多方培植之子潤竒順治甲午舉人詹惟聖鄉賢留祀册字乃庸建德人順治壬辰進士歷江西學道家居凡有益地方之舉莫不慨然獨任濬築東西湖壩以及𣲖溪橋梁增設南關東館建昌小里等義渡行人不病涉凡貧民無力婚娶及喪葬者助給之康熙二十二年五月郡城水災特甚一時米價騰貴惟聖竭資往省貴糴賤糶全活甚衆蔣子貢建德縣志字少峯初居東關地遇溪水泛濫尸櫬隨流持錢立鄰冇鬻妻子及殮者咸罄囊助蔣鳴梧鄉賢留祀册建德人由進士擢監察御史康熙二十一年邑遭大水民不聊生捐資糴米賑濟請以倉穀減價平糶又捐資造陳村洪淇二橋以便行者又於東館義渡建造船隻買地四畝田三畝以為渡夫工食又捐助棺木以給貧民捐資募人收溺者尸瘞之力行五十餘年不怠詹開禧鄉賢留祀册字子英建德人贈給事中遇時疫流行不惜重費廣製藥餌延名醫診視全活甚衆每遇水旱於各處買米減價平糶隆冬預製棉衣施捨貧困逢債負逼迫者立為代償不足即將子女所佩叉環傾銷以濟之方成郯鄉賢留祀册遂安人府學廩生樂善好施每年葺橋梁施棺櫬助修官路辛卯壬辰間嵗大飢斗米五錢成郯煮粥賑荒全活甚衆張域鄉賢留祀册分水人天性好施每逢旱潦即捐資輸粟煮粥賑濟全活無算他如建南塔造橋梁施藥施棺贈金贈粟種種善事不可勝計兩中副車考授禮部司務溫州府晉俞僉南史張進之傳永嘉人孫恩之亂永嘉太守司馬逸之被害妻子並死兵冦之際莫敢收藏僉為郡吏以家財冒難棺斂逸之等六喪送至都葬畢乃歸鄉里南北朝張進之南史本傳永喜安固人少有志行歷五官主簿永寧安固二縣領校尉家世富足經荒年散其財救贍鄉里遂以貧罄全濟者甚多太守王味之有罪當見收逃避進之家供奉經時盡其誠力味之嘗避地墮水沈沒進之投水拯救相與沈淪危而得免時劫掠充斥每入村抄暴至進之門輒相約勒不得侵犯其信義所感如此元嘉初詔在所蠲其繇役宋陳侃明一統志永嘉人五世同居無間言至道二年郡守何蒙上其事太宗嘉之詔旌其門萬規萬歷溫州府志字仁甫樂清人所居海濵有赤水港舊以舟渡覆溺者多規乃竭資率邑里買石築堤傲泉之萬安橋人便之至今名萬橋會詔舉經明行修之士郡以規應詔不行優遊田里以夀終吳轉溫州府志永嘉人以農桑為業五世不分爨嵗推男女尊長各一人主內外事大小數十口均給焉潘安固萬厯溫州府志字仲碩平陽人大觀中舉八行郡以其名應詔不就紹興初王師討寇范汝為道經平陽官民駭避安固散財粟資戰士邑賴以安韓世忠上其勞以宣德郎召不赴陳瑾葉適陳瑾墓志字國器平陽人其行常損已益物而最著者在東塘初縣驛道東北皆行水中潄淖墊沒數十里晨暝風雨咫尺斷還往合一縣之力間乞丐大官厯年猶未備瑾獨用一家之力栽石取底東達之海閲閏而成人以為德號曰東塘陳氏賈如規兩浙名賢録字元範樂清人宣和中補太學生靖康之難諸生欲逃去如規曰吾輩久被教養國家阽危乃求茍免乎後以特奏名調廣昌尉再調興國軍司理不赴讀書鹿巖下重義好施族里賴之時稱尚義篤行者必曰賈司理吳康萬厯溫州府志字寧叟永嘉人登紹興第行誼卓異林季仲貽書有云引失囚之罪歸已推獲盜之功與人古人不難到矣負亡友遺骸趨數千里歸及汴河有同行死舟中登岸為之發喪仕至福州通判陳柔兩浙名賢録平陽人里人有侵其地者族黨謂當訟之柔曰諾一日具酒食會集議食畢衆請所議柔曰以酒食飽吏胥何如吾黨自樂之尋丈地不足較也衆愧服人或見陵閉門不競內外呼為陳關門吳藴古平陽縣志字醇之登紹興第任太常博士傾家資造沙塘陡門宋之才為記劉愈萬厯溫州府志字進之永嘉人周人之急如不及有利病以身為倡必興除之紹興庚午大飢以家産簿貸於州得米五百斛歸賑鄉里隆興甲申又飢郡闕守丞愈獨投匭丐發長平降度僧牒轉糴他郡與同里徐讜協力賑救全活甚衆郡守張九成下車聞其賢遺書致饋時諺云入柟溪不見劉進之適樂清不見賈如規是浮洞庭不嘗橘也錢堯卿溫州府志字熙載樂清人事母及寡嫂盡孝敬闔族同居三十載無間言嵗歉捐穀價以濟飢民不能償者焚其券紹興間詔訪孝亷郡以名上未幾卒紹熙中郡守孫懋表其閭章公逸萬厯溫州府志字茂先平陽人紹興間嵗大飢悉發其家之所有以貸貧者不責其償後登科曽孫芻有祖風值嵗疫捨櫬千具捐地為義冢瘞之胡時萬厯溫州府志字伯正樂清人登乾道第授袁州教初得第權貴欲妻以女且示以奩具之盛辭曰老姑家貧曽以女許嫁不敢背約遂歸娶之鄭伯英鄭伯海永嘉縣志伯英永嘉人隆興廷對第四性好義凡鄉里利病靡不竭力興除之弟伯海登紹興第家立義孰延師訓生徒五百餘人時稱為二鄭云徐鉞萬厯溫州府志字武叔永嘉人乾道辛卯郡大飢米斗至五六百錢守丞諱言鉞獨以書抵朝中舊知言之丞相以聞孝宗曰永嘉樂土何可使至此趣罷守丞即命出浙東常平倉米以濟之薛洽兩浙名賢録字子周永嘉人入太學會齋舍疫作鮑粹然疾尤篤同舍皆棄去洽獨移卧具與俱蚤夜治藥餌謹視之三月乃愈粹然每告人曰子周生我登淳熙第通判邵武軍林仲彛平陽縣志字清叟平陽人登淳熙第由吏部郎出知台州於本縣築陡門三所開河道五十五萬五千九百丈溉四鄉之田陳熊萬厯溫州府志永嘉人慶元六年秋垂穫雨潦田在水下郡守毛憲憂之熊與其子請速決埭願自備財力償築許之集丁夫一鼓而決稼無損復請傍茅竹山趾創建陡門分流泄江遂免決埭之患湯元善平陽縣志字明善平陽人業醫未嘗索直責報甸洋山舊有漏澤園久廢元善捨地數畝為義冢又在縣北三里蓋虛室以停棺槨名曰化亭林居雅萬厯溫州府志平陽人開禧間邑令創隂均陡門居雅傾家資與鄭萬全昆弟及陳子直等各捐資協贊一嵗而堰成再嵗而閘成乾溢不患其利甚溥朱古學樂清縣志字以明樂清人登嘉定第百口共爨四世不分析建同心堂優遊終老曹綘萬厯溫州府志字思厚瑞安人築鄉校於鳯岡嵗延名儒為師與人無競里稱長者遇歉率族衆減定里中穀價以便之嘗著家訓四戒以示子孫年九十終子沂字文起能繼父志嘉熙庚子嵗大侵傾廪三百石以賑貧民族兄弟有爭田訟久弗決沂割已産平之晚以特奏科入官終長興丞陳光庭兩浙名賢録樂清人嘉熙庚子大旱嵗飢死徙不可勝計光庭創東西二倉聚穀於中令里人以物質穀不取其息春耕則納質以取穀秋斂則納穀而取質民咸德之又捐田八十畝以其穀置藂冢收遺骸及資貧不能婚嫁病不能醫藥者又為歌詩十章以諷勸藏穀之家石室林一龍名其倉為集義莊為文記之金城溫州府志平陽人嘉熙庚子嵗飢日設糜粥以賑餓者全活甚衆子孫青紫相映王致逺永嘉縣志永嘉人嘉熙間浙東大飢致逺分僧寺置局為粥日食千人既而鄰民駢集日食至八千人已資不足復借助巨室以續之逮麥熟始罷尋創居養院給薪炭以處老弱之無歸者創慈幼院厚乳哺以活嬰孩之委棄者病為醫藥死為殯埋復建永嘉書院及義倉人繪像祀之陳大有萬厯溫州府志字鎮固平陽人年飢減價糶穀冬寒施楮衾糜粥給囚糧南市火民居流散大有户餽楮幣一貫米一斛凡濟人事靡不力行之何逵兩浙名賢録永嘉人好義輕財親族朋舊貧者賑之死而無師者葬之食客日嘗數十人嵗或艱厄貰貸不倦鄉民賴其惠有訟不之官得一言而兩憾俱釋鄭亷仲溫州府志平陽人坡內夾嶼橋外南北岐塘岸各二十五里以朽壤屢圮亷仲倡築甃以石民利賴之徐臻宋史鄒鳯傳溫州人父官河南德祐元年春臻往省以道阻會文天祥勤王臻往依之以筆札典樞密天祥被執臻脫難復來願從天祥北行扶持患難備殫忠欵至隆興病死林景熙東甌集傳字德陽號霽山平陽人咸淳間由太學釋褐授泉州教官遷禮部架閣轉從政郎元僧楊總統發宋諸陵棄其遺骨人莫敢收景熙在越佯為採藥以革囊拾之又聞理宗顱骨為北軍投潮中以錢購漁者舉網而得乃盛二函託佛經葬於越山植冬青樹識之鄭朴翁平陽縣志字宗仁平陽人弱冠入太學咸淳末賜上舍釋褐厯福州教授國子正與友人林景熙拾宋陵遺骸瘞越中歸隱薌山瀑下元葉貫道兩浙名賢録瑞安人居郭陽紫華山中早喪父事母至孝元初兵至鄉民橫罹鋒鏑暴骨野中如莽貫道哀之與子堡攜畚檢拾聚而埋之表曰同歸之墓湯中山平陽縣志平陽人大德辛卯嵗飢穀價騰貴中山減價出糶以濟貧者丙申飢亦如之甲辰又飢亦如之劉祖衍溫州府志平陽人至正間建交川義孰於縣治北之半塘捐己田三頃山二頃延師以訓鄉之子弟御史孔汭薦之朝授溫州路儒學教授葉益萬厯溫州府志字德謙平陽人好施與嘗葬鄉鄰之不能葬者十餘喪嵗飢出粟賑濟所居前有巨港二十餘丈舊為木橋屢構屢廢涉者病焉益捐資斫石改建人利其惠號新橋葉氏至正間以文學舉任處州録判夀終於家明王仁萬厯溫州府志字夀夫永嘉人好義樂施嘗踏雪登並梅樓四顧煙不起者輒遣人問饋不計償人因名其樓曰望煙樓嵗飢輸粟至五千石元時檄召為提舉不就後入明登賢良方正科王伯初溫州府志瑞安人剛介尚氣節方氏據溫其守將賈伯嵩戍瑞安參政朱總兵討之檄平陽總管為應及下溫城賈納欵總兵以安民榜畀之賈令麾下凃姓者持回至州而平陽應兵已薄城下凃恐其擾害急登城張榜厲聲麾退已而總兵遣陶指揮至州陶以他事怒凃將斬之衆莫敢救伯初奮身解衣請曰斯人曩者張榜活我一城願以身代陶兩釋之謝南萬厯溫州府志字天啓平陽人洪武辛酉栝寇大發脅從者衆主兵者募義士往招之南請行冒白刃諭以禍福衆欣然來歸已而延安候總軍來討南具以狀聞於是止戮渠魁釋者以萬計既而朝論難之南復伏軍門叩首請救延安侯為條奏始獲原釋時謂其有遏亂救民之功後以薦授山西參議鄭采分省人物考平陽人性介特仗義家雖貧客至輒欵洽士窮無歸者輒授館或終嵗衣食之嵗洊飢客持券求謁采僅餘粟五斗貸其五之三故人子遇盜裸跣走訴采盡舉衣衾巾履遺之嘗見敝衣躡履行雪中者呼之前豫以粟帛亦不問其姓名侯搢萬厯溫州府志字尚震樂清人與永嘉黃少保淮善少保得君人爭附之搢獨謝歸有郭千户者貧且死無後為窆之祖隴戒子孫上冢時必酹郭户侯無絶也李孟竒溫州府志瑞安人家殷實好施豫凡郡邑廨舍學宫多所營造邑民告飢出粟以賑計前後出粟萬餘金千餘設義孰義倉義冢義渡郡邑屢上其事朝遣行人黃恕齎璽書勞羊酒旌其門曰義門鄒有真瑞安縣志瑞安人正統間奉例輸粟賑飢立義倉義渡有司上其事敕旌表其門周普安周伯靜萬厯溫州府志普安字伯寧平陽人正統二年嵗飢輸穀千餘石賑濟事聞遣行人旌奬復其家弟伯靜出穀一千二百五十石賑濟旌為義民柳靖一平陽縣志字忠立正統二年飢出穀一千二百五十石助充賑濟事聞遣行人齎敕褒美勞以羊酒旌為義民復其家陶文隆泰順縣志字朝綱泰順人正統己巳寇發自備牛酒犒鄉民結義社保障已而巡撫孫原貞招致贊畫論功授巡檢以母老辭給冠帶後奉例輸粟三千石賑飢有司旌其門曰尚義張元泰順縣志字普生泰順人正統間散廪結義社以禦鄰寇又奉例捐粟千石賑飢王延甌江逸志永嘉人以利濟為念嘗曰散財濟民其利有限可以長久者惟古之義倉而已得人掌之其惠無窮也於是置倉貯粟凶散豐斂事聞旌為義民復其徭役王由溫州府志字秉璠永嘉人景泰間章綸疏諫易儲逮詔獄刑鞫由適就選京師力為周旋及歸復留金併其一僕以侍之仍畀僕田四畝恤其家吕斌萬厯溫州府志字是質永嘉人成化丙午嵗飢代輸通都户口鹽米嘗於海壇造舟濟渡仍創館舍以憩行者他若建石嶴東岸大塘大壩接等橋及治樂清館頭塘路凡費千餘金又出粟賑飢𢎞治辛酉詔旌其門陳仲泰溫州府志平陽人成化癸卯捐資建預備倉入粟千餘石事聞賜七品散官林天爵平陽縣志與弟信爵世居平陽之宋埠𢎞治庚戌嵗飢日設粥於門以飼餓者造橋梁濬塘河修堤岸立義孰暑月施茶濟渴凡冠婚喪祭悉遵古禮闔族化之何淮永嘉縣志永嘉人家饒樂施里有舉女者必遺以粟帛道拾遺金候還其人不得捨於寺入城市木聞婦哭甚哀促問乃負債莫償者盡以市木金代償焉𢎞治戊午飢出粟數百石貸鄉人已而悉焚其券及掌鄉賦復值嵗飢代輸通都鹽米時疫繼作則倩醫施藥死則具棺槥凡利人事無不為之葉溥平陽縣志字愛周平陽人父鉉以尚義補郎溥承先志父造舟象口渡以濟人溥更為葺治數十年不替𢎞治丁巳築萬全塘為橋以便行旅嵗飢施飯以飼餓者死則豫櫬會有詔勸民賑助又率其弟盛芳出粟如令皆受章服葉㮤萬厯溫州府志字彥棨永嘉人娶陳氏㮤年二十五而陳卒誓不再娶妻黨痛其子幼勸之娶泣辭邑令李丕顯旌之趙欽善溫州府志字良修樂清人邑大侵設糜粥以賑建宗祠置義冢施槥築橋正德間以輸粟賜建尚義坊夀一百二嵗宣鐸樂清縣志樂清人家蒲岐族里有餓者常食之有田三頃臨殁以三之一分賙所親楠溪有接莆嶺極險峻人往往墮死鐸嘗捐金百餘鑿為坦途趙文韶萬厯溫州府志字克虞樂清人居近沐簫泉捐金數百構道院書舍跨溪築橋樹來鳯八老亭嘉靖乙巳嵗飢出粟千石賑濟郡守洪垣優奬之又嘗築鄧公橋砌官路置渡船七舉鄉賔夀九十餘陶灌泰順縣志字君敬泰順人嘉靖庚申大侵灌諭家人曰但稱貸來者即豫毋吝人多賴全活遷學捐資創建學門又倡義協族建祠捐田二十畝為祭具三十畝贍子弟讀書友人貧不自給者必周助不能償者焚其券邑令扁其門曰羅陽髙士陳元汾溫州府志樂清人百口同爨財無私蓄事無専行即婦女亦歡然無間言徐友文萬厯溫州府志字彥章樂清人有張堂者苦貸鬻妻途遇友文即為贖之歸語其妻鄭更益之財為女買媵詢知良家子輒還之不索償後貧乏治圃以活處之泰然方輶樂清縣志樂清縣庠生友人屠希顔無子妾有孕妻悍不能容希顔以託輶即闢書舍居之候子稍長乃還屠氏人稱篤行孔聞昂平陽縣志平陽人萬厯乙丑年飢出粟一千石賑濟邑令萬民華詳請建坊旌表梅光宗溫州府志永嘉人萬厯戊午嵗飢出粟五百餘石賑濟崇禎庚午疫施棺二百置義冢修城垣葺文廟助建巽山塔築塘修橋費數百計纍舉鄉賔夀八十有九國朝謝包京鄉賢留祀册永嘉人順治乙未進士授河南陽武令事親孝待宗族甚厚效范文正公義田法設義租數百石俾族之公正殷實者主之凡讀書婚嫁無力者酌量周恤藉以成立者甚衆學宫傾圯捐塗田四百畝以助鼎新所積租穀永為修葺之費甌郡海氛犯順逺近戒嚴包京同守土官登城固守鄉民被難入城餓殍載道乃悉出庾粟煮粥賑贍為好義者倡全活無數陳遴公舉事實永嘉人天性孝友尤急人之難婚喪賑恤無倦色康熙甲寅耿逆難作偽帥曽養性盤踞永嘉逼受偽職備見拷掠不受逃入六科山中避之乃免嘗協修文廟得石刻朱子像於土中建祠祀之捐田八十畝以奉祀事司訓蔡啓份為文紀於石子王綬乙未進士任郟縣知縣贈遴如其官處州府宋潘惟德景寧縣志字天輔處州人嘗值嵗荒穀價湧貴家素豐獨捐其值如平時鄉人賴之皇祐中嵗大歉出穀貸鄉里約嵗稔共還後還者無幾亦不復問有邑民曽以事相訟至是亦求貸與之或曰此嘗構訟者也德曰彼忍恥見投其窮已甚慝怨不與是小人也鄉人稱為長者鄧熹嘉靖浙江通志其先三衢人客遂昌因家焉宣和間睦寇方臘倡亂其黨洪載侵犯松遂熹與父將仕郎昌特捐家資集鄉民繕甲兵入邑禦侮與賊百餘戰獲俘馘數千級載降郡守黃葆光上其功授昌承節郎熹遂昌尉毛允理崇禎處州府志青田人紹興間水溢民居蕩然死者無數允理覔巨舟救溺得活者多水落沙土壅積如凶因撥去沙土獨允理屋宇几席器皿如故有司以其事聞於朝封奉議大夫表其坊曰進德潘好古兩浙名賢録字敏修松陽人值嵗飢傾廩以賑窮餓一日山水驟發陸地皆成巨浸好古與同處者數十人方虞墊溺忽有操舟來援者好古諭舟人先濟餘人舟人曰吾德公故冒險來好古曰濟人猶濟我也卒先餘人而後濟王灌松陽縣志松陽人乾道中以賦役重繁首倡義役役之先後視籍田之多寡為次行之三十年而訟不抵於有司郭泰亨括蒼彚紀字亨甫麗水人淳熙進士會昌祖儉詆韓托胄貶韶州泰亨素交祖儉因贐其行坐黨禁禁解注清流縣令擢臨安府城南都廂時史彌逺當國有尚書忤其意者繫獄委官鞫問泰亨辨其無罪不肯枉置於法彌逺怒遂致仕歸毛當時崇禎處州府志字行道青田人由紹興進士倅韶州積俸餘白金八百兩散之親舊無留資暨守雷州歸復捐田以益義廩楊大同兩浙名賢録松陽人素業賈寓武林邸舍忽聞鄰哭甚哀詢之乃王尉失囚獲罪鬻女以贖故相泣别大同惻然遂傾囊以貸王尉慚謝叩其居里姓名而别他日大同壻鄭克寬登進士調鄂州監酒稅時鄂守即王尉也克寬以公事候門守覺其鄉語類大同乃進而問曰汝貫何處對曰括之松陽汝識楊大同否曰妻父也守驚曰汝外翁在否曰死矣惟妻母見留此守曰為我迎楊媪來至則坐媪於堂率子女羅拜於下以母事之置克寬於幕而薦之李端履括蒼彚紀縉雲人嘉熙庚子嵗飢告其父楚孫曰人飢且死能獨飽耶父曰兒勉之會郡募發粟賑飢七邑無應者端履首應命復移粟他邑事聞授樂清簿旌其里曰樂善坊項宜中松陽縣志字誼甫松陽人族有橫逆者奪其田曰在彼猶在此也嘉熙間嵗祲郡守馬光祖欲行富鄭公青州故事誼甫即先輸粟二千石以應之王允卿兩浙名賢録字成之松陽人嘗往括城索逋宿其家夜遣其妻叩門允卿閉門不納遲明即歸不復索每寒雪起視鄰爨不煙者密以米置其門嵗飢山民煽亂輒議曰我等至縣必驚西門王朝奉奈何終不入邑民賴以安程大雅松陽縣志字正之松陽人遇歉嘗捐廩以惠鄉鄰雪中視鄉鄰不火者以米贈之占籍二都助田三十畝以資都役人有鬻妻兒者以財帛周之其人以荒山一區為報大雅收以葬親即今五龍搶珠地也後子孫登顯要蕭必強括蒼彚紀字功甫松陽人舅氏劉無子歸田五十畝屬以後事及殁厚治喪葬立劉氏後還其田景定初舉孝亷不就王嚴崇禎處州府志字敬之麗水人咸淳末受知於李宣慰纍薦為官固辭不拜嘗捐己財砌浮雲二鄉石衢四百七十餘丈黃國華貝瓊黃國華傳字叔文麗水人性方嚴好禮終日衣冠危坐而施舍無倦嵗歉必賤直糶穀以活民或大雪有不舉火者輒遺之里中爭者多從直其辭德祐間惡少羣聚為盜包氏族最強號包家洞林某能搏虎號林大將劫掠旁郡吏莫敢制惟憚國華不犯境一日殺牲盟里橋圖為變國華適過之喻以禍福因出金帛曰汝等以貧故為不義以此助汝何如衆慚弗敢取而去乃追與之所居之地曰弱溪元兵下處州諸大家右族爭避患其中重貨山積及聞兵猝至委之而去居人欲乘時略所有國華命在右收貯一室事定召其主悉歸之元劉濠張時徹劉濠神道碑字浚登青田人宋翰林掌書慈惠好施每淫雨積雪登髙而望里中有不舉火者即分廩賑之會宋亡乃荒遁自適時有林融者徵聚義旅興復宋室元討平之逮融至京世祖義而弗殺融歸至甌越之間地名牙陽四溪者復嘯其徒元乃馳驛使簿録其脅從將盡殱之而鄉豪因以讐怨相傾引善良鮮有脫者使者返夜次武陽會天大雪與居民百錢市酒市者至濠家具語之故濠即間行謁使者得所簿録數心惻之乃盛供具以逆使者醉而寢之樓探篋啓牘録其渠魁二百人遂火其居焰灼於樓倉皇掖使者跣而走詰旦大恚曰將何藉以復闕下殆誅死不赦矣濠曰濠不幸災於居室震驚使者濠誠死罪意者簿録有寃天欲生之乎以前所録二百人授之餘所全活無算濠即文成公基之曽祖也陳錡括蒼彚紀字叔和麗水人元季寇發錡散財結士擊而平之報功授溫州録事判官明吳亨括蒼彚紀松陽人元季以浙東副元帥舒穆嚕宜孫命出資財築處州左渠城五十丈洪武十四年縣西橫源山民倡亂縣帖下亨率鄉人逐捕其黨閭里咸賴以安繼又出私帑造船於縣之金梁烏石二渡以濟行者梅熙兩浙名賢録字景和縉雲人通經有學行少受業於番陽朱公遷别餘二十年千里聞訃熙至番陽為服心喪三年洪武初舉博學明經撫安永軍民卒於官吳子聽崇禎處州府志麗水人居家篤行孝悌鄉人有不平者多往質之宣德間嵗歉捐租為鄉民代輸額賦葉子雲括蒼彚紀青田人為三鄉老人正統間閩寇竊發沐溪等處皆為巢穴朝命都御史陳詔提兵討之子雲詣軍門白曰能以寸舌退此賊不煩寸兵乃單步見賊諭以禍福賊夜出女子四人侍寢白金一盤為餉悉謝不受賊義之一夕遁散子雲籍所棄輜重并婦女四百口入官事聞議授以官固辭不就朱子堯舊浙江通志字仲穆遂昌人讀書好古以義槩自持鄉人有鬭者就質其是非一言而解正統間宣平寇入境慕其德義大書於門曰積善之家相戒勿犯一鄉獲全葉巨括蒼彚紀字伯廣麗水人正統間鄉民飢饉出粟四千斛賑之郡上其事有義民之敕又山寇猖獗畫策靖之以功授巡檢辭不受乃陳情乞移贈其故父孟昭詔允之鄭彥性縉雲縣志縉雲人正統戊午嵗飢彥性出粟二千石濟之有司以聞旌其義葉仲儀慶元縣志慶元人正統庚申大荒仲儀詣闕輸粟一千五百石賑飢詔旌義民賜宴成化丙辰又荒仍輸粟五百石詔授七品散官吳彥恭慶雲縣志慶元人正統庚申大飢輸粟一千五百石詔旌義民包秉鑑崇禎處州府志字孔明遂昌人喜拯人患難周人急乏正統壬戌連嵗大飢奉詔出粟賑濟賜敕旌之應懷真崇禎處州府志縉雲人正統癸亥嵗歉出粟一千五百石賑濟有司建坊旌義湯如迪景寧縣志景寧人正統七年嵗飢出穀二千二百石賑濟有司建義門旌之華存禮崇禎處州府志字仲察遂昌人正統七年嵗凶出粟賑濟旌為義民丁叔顯縉雲縣志縉雲人嘗遇橫尸於道輒買棺函之里人名金環者稱貸久負欲出妻以償叔顯焚其券仍給粟五石正統間嵗飢發粟二千五百石賑濟旌為尚義丁叔通縉雲縣志縉雲人見學宫舊路西出慷慨捐基二十丈餘令南向縣倍償其值辭曰念一邑文運所關吾子若孫亦欲由是路豈願直乎有司以事聞旌其義世免差役吳潭兩浙名賢録字源潔遂昌人少為諸生嘗出行道上見一人號泣赴水潭詰其故曰縣官徵租急無以償適鬻産得金將以輸官因醉道遺覺而覔之不得也不死何待潭立止之因紿曰拾金者我也而第隨我歸其人收涕謝遂隨潭歸潭止之堂上飲食之急令人鬻家具如其數以償未幾領北闈鄉薦司李常德終吉安通判何允恭括蒼彚紀字克讓麗水人事父母以孝厚恤甥孤尤喜施豫家世以醫名允恭益張其業好施豫每晨興袖藥餌視疾以次遍及不責其報獄中苦疫輒施藥療之周公泰慶元縣志慶元人成化戊戌公泰納粟一千石賑飢詔旌其門李珊崇禎處州府志字玉泉縉雲人負俠多義舉里中無力娶者出資為婚喜人乞假不厭𢎞治四年嵗大侵易産得八千金分道嘉湖告糴救賑逺近活者不可數計陶旦縉雲縣志字信民縉雲人少時以事纍繫都察院獄有永康池姓者亦被繫既遇宥池與妻俱亡止一女及笄旦攜抵家嫁彼縣金良及旦卒良夫婦來弔泣曰公之心事雖柳下惠不能過也何珙括蒼彚紀字良壁麗水人事親以孝聞撫諸弟姪友愛彌篤姻戚有不能為生計者轉貸以給而自償之郡守董公將拓學前池垣遂捐地為助後家人乞緑波亭址抵前地因架樓其上時珙就養京師及歸聞之瞿然曰此古迹也安得専為已有命毁之墟其地以還王敦儀青田縣志字應望青田人嘗讀書法海寺一日歸道遇一人攜金銀叉釧值數十金忽怔忡仆地敦儀懼為後至者所攫乃立待其㽔檢付之嘗展墓見有人盜砍樹木恐其驚墜戒從者勿呵從别道而回子一中成進士官古田令王三接崇禎處州府志字汝晉處州衛人重義好施姻族待以婚喪嘗自莊回渡石牛舟中拾遺金驗係縣胥催租輸官之物俟其人不至歸即潛令代納仍粘票匱側不使知其為已也屢薦賔筵夀八十餘而終吳文煥龍泉縣志字碧泉龍泉人嘉靖癸丑嵗飢賑米三百石活流亡千家建濟川橋起渤海祠皆出重資管潮青田縣志字時信青田人隆慶庚午年飢輸穀一百二十石以賑縣令表其閭黃五景寧縣志景寧縣民隆慶間掘地得金捐建沈莊橋以便往來蘇廷榮崇禎處州府志遂昌人家世業醫至廷榮益精其技嵗大疫遍行診治其貧不能具藥者施之道拾囊金坐候失主半日不至前行十里許有赴水幾危者飲以藥俟少蘇詰之云是徽州木商汪榮即失金之人也遂畀之龍泉令贈以詩有常施篋裏君臣藥笑擲人間子母錢之句夀八十終周李崇禎處州府志遂昌人族黨中婚葬有不舉者親為經紀嵗侵輸粟備賑有佃户逋租積百餘石納女充婢以償卻不受更豫衣米以遣嫁之或負錢者貧不能還即焚其券當道屢嘉奬與蘇廷榮俱書名於旌善亭謝福縉雲縣志縉雲人丁嵩義子嵩仕田州經厯死於兵幼子璫投入土官為奴時福與妻先歸中途聞變詢督運姚鏌知璫所在姚語以險阻福曰義父不可以無嗣遂鬻妻為費及田州求璫土官不與乃日夜環哭其門經半載土官父憐之力主還璫攜至途贖妻同歸後為擇配以全嵩祀趙文德崇禎處州府志字秉仁縉雲人邑東南馬鞍嶺衝險行者病之文德捐資平治遂成坦途復建半嶺亭以休風雨又漴嶺界仙居盜賊出沒文德相地利築寨門為防禦地方藉以安萬歷戊子嵗飢減直應糴有不能舉火者子粟有欲鬻妻子者豫鏹全活甚衆而無德色項森遂昌縣志字子秀嘗業儒弗售棄去精岐黃術每以醫藥濟人為事雖傾槖弗恤也萬厯初邑旱飢乃鬻田賑粥多所全活幼時祖所置四茶亭田若干嵗久為豪強侵沒及長悉贖之邑有相搆爭者得其言即立解人比之王彥方云髙岡崇禎處州府志字子升處州衛人篤友誼時弟逋官賦三百金就逮岡為代償親族有喪悉厚賻之凶年出粟以賑飢族姪貧為婚娶經紀其生萬歷乙酉洪水間出袖金以賑被患之甚者麗水令樊某以世德扁其廬享年九十有五朱昌崇禎處州府志字希盛縉雲人萬厯戊子嵗侵發穀數百石活數百家戊戌又侵復倍賑全活者亦倍有司給冠帶旌義俱堅辭不受長瀾楊澌二渡各郡通津病涉多淪溺捐數百金建立石埠往來者德之有待舉火者無不應夀八十一而終夏應純崇禎處州府志字心葵青田人萬厯己酉洪水衝塘堰殆盡應純獨捐資修築灌田四百畝鄉人德之葉以萃崇禎處州府志字仲秀遂昌人建育英樓以教族姓捐租七十畝為膳置渡船龍口獨山焦灘三處各捐租倩給舟人邑北東梅橋二十都獨口橋圮咸以石易之往來始免病涉讓吉穴以厝其兄為煢姪婚娶巡按金忠士給扁旌之丁天祐縉雲縣志縉雲人克篤孝友立家孰嚴訓子孫四世同居里被其化而息爭訟嵗飢嘗捐粟以賑縣屢旌奬舉鄉飲七夀九十而終鄭文誥崇禎處州府志字天章遂昌人嘗置定溪義渡以濟病涉建洞峯嶺茶亭以便往來李珝縉雲縣志字朝琮事親色養與兄析業遜腴取瘠伯兄玠進士無嗣以己子繼之復讓遺業以振仲兄之乏偶見遺金於路守其人至還之有窮民逋糧被繫捐金代輸嵗飢破困興工使食力者果腹以所值贍其家里中或質成片言剖分輒為意釋咸擬之陳太邱云張鶴翼崇禎處州府志字鳴臯麗水人家居河埠有徽商以幣物數笥見寄遂往甌逐販適家遭回祿鶴翼寧緩己物盡出所寄商聞變意不可復得比至一無所失喜出望外李繼澤縉雲縣志字濟宇縉雲人應秋試偶與潘商同舟潘主僕染疫僕死同舟友皆中道棄去繼澤獨為調湯餌及愈潘出金七百欲分半以謝堅辭不受繼澤無子潘又欲以女為之妾繼澤不可越兩月潘復攜女至拒之如初月餘妻陶氏自娠六嵗內舉七大夫子張學甲崇禎處州府志字思過麗水人邑廪生潰兵掠括鄉人男女避亂於鳯山後寨學甲出為兵所獲紿之曰引我至寨當免爾死學甲厲聲曰吾何惜一人之生以免衆鄉人之厄遂自竄深淵而死包萬有鄉賢留祀册字似之遂昌人行誼淳謹事繼母克孝嘗建立社倉崇禎初頒行義倉萬有獨捐穀一百石以助闢兌峯書院延師以教鄉人修括蒼郡志浙江通志卷一百八十九
