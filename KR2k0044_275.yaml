古大臣抗疏楓宸還折檻持綱柏府尚埋輪衣冠座凜威儀舊爼豆壇昭典制新一曲空潭寒貯月澄光永照骨嶙峋八詠樓舊址方士穎憑髙勝迹倚城開劫火昆明閲幾回嘯詠尚餘梁翰墨登臨無復宋樓臺華峰北峙青嵐疊瀔水西流緑漲洄欲和遺詩寄遙慨蒼茫不盡夕陽頽次蘭溪方士穎樓臺露郭影涵波一帶帆檣聚客艖塔卷林煙髙入岫橋吞澗水曲通河隨舟菜鬻蕪菁早滿市花陳茉莉多深夜不愁溪路暝傍崖燈火照人過過龍遊驛雨甚舟行日不能數里方士頴江城始報及龍遊欲挂輕帆阻石尤穀雨漲髙侵栁葉茶玗煙濶覆蘋洲支篷慘淡昏如暮擁夾凄清冷似秋挽入林崖紆可泊啼鵑故引客心愁萬松書院即事方士頴憑將宋址拓經營曲嶂周遭擁畫楹制擬膠庠崇至聖名方嶽麓萃諸生城邊雨散江湖濶嶺外煙浮野市平共仰普天敷教澤人文式化已觀成癸巳暮春重遊西湖喜晤武林諸同志王式丹日傍山椒溯水涯芒鞋幾兩踏煙霞大招嶽墓兼于墓小憩林家與葛家髙嶺雙尖蟠老木平湖四角長新葭蕩胸自要尋邱壑弔古懷人一倍加層巖岝崿俯清流騁目登臨占上頭近郭煙橫不斷樹隔江山入最髙樓窗搖竹色精廬迥門聽潮聲古剎幽坐對竒峰忽忘返欲移家具住杭州同淮江登東湖弄珠樓查慎行但令興到便行船我得同遊亦偶然疏磬晚潮孤影塔暖雲濃樹四垂天稱心圖畫憑欄外經眼亭臺落照前却笑詩成無傑句驪龍依舊抱珠眠雨中奉陪座主徐公韓丈子蘧放舟夾山漾欲遊栖賢不果歸登峴山作四首查慎行過盡回溪十里長孤城回首漸微茫風腥曉氣魚蝦籪水減秋痕雁鶩鄉菱蔓欲牽絲已脆荷花雖敗葉猶香船頭忽指前遊處白塔紅亭認道場野色天光入望竒融成一片緑琉璃展開手卷王蒙畫收拾才情杜牧詩畢竟清遊宜寂寞尤難好景是迷離桃花莫被漁翁誤秋在斜風細雨時選勝初期汗漫遊栖賢不到恨空留橋低忽礙尋山路興盡非關冒雨舟瓦竈分泉烹紫笋印泥開甕試清篘買田合向吳興住蟹舍漁莊一網收亂石多成劈斧皴窪樽亭外勢嶙峋一州文物傳孤碣前輩風流剩兩人屏擁卞山髙簇簇簟鋪霅水細鱗鱗名園長泊鷗波畔細數陪遊第幾巡登寶婺樓查慎行斗杓倒插勢凌虛髙出城端五丈餘一鳥自投天際沒羣山浮動雨來初别開户牖通呼吸旁引風雲入卷舒八詠門荒詩境改讓他仙子占樓居曉晴發清湖鎮舟中望江郎山查慎行碓床石瀨響泠泠愛入歸人舊耳聽岸草緑痕移蟋蟀水花紅影帶蜻蜓樵爭晚市秋初霽風轉荒灣棹一停雲霧不遮南望眼三峰回首逼天青山隂道中喜雨查慎行謝家雙屐舊曽擕轉覺清遊愛會稽白塔紅亭山向背赤欄烏榜岸東西波光拂鏡羣鵝浴竹氣通煙一鳥啼野老豈知身入畫滿田春雨自扶犁三月二日偶遊硤石精舍查慎行三月風光連上已人如蛺蝶鬭裙衫兩山鐘磬東西寺十里煙波逺近帆拄杖我來尋履迹題詩僧乞署頭銜篋中亦有新排集倘許經房貯一函從東山大悲閣步上南道院查慎行山北山南一徑通又從紺宇叩琳宫千年樹老根穿石百尺梯危勢轉空上界神仙風肅肅下方樓閣雨濛濛羽人何福能消受長在晨霏夕靄中湖州陸世楷輕煙細雨過苕溪浮玉諸峰望盡迷栁下間眠春後犢桑巔逺聽午時雞境通震澤帆檣聚山傍孤城雉堞齊此地風流懷杜牧緑隂幾樹接前堤山隂潘烈女詩潘公調之女年十四許同里袁氏子袁輕狂無行將别求婚欲渝盟而不得造作穢語以汚之烈女聞遂投井死炎天蒸鬱尸久停不腐逺近驚以為神醵金即其地祠焉周炳曽鴛譜中間錯幾行紅絲偏繫黑衣郎將珠投暗真如礫以鴆為媒豈必魴清白一肌不受汙毒炎五月忽飛霜道旁井泄心為惻碧血千年恨未忘貧家好女淨梳頭月扇難遮一面羞休比潘妃縋辱井爭如魯婦赴清流露筯未報蚊虻毒精衛寧忘渤海仇血散血凝大塊裏三生因果費追求夏日雨中遊雲林楊𢎞緒一雨連山暑氣微撥雲開處見禪扉泉聲清客知為冷山勢驚人認作飛踏屐欲尋三竺路打包又趂一僧歸探幽正起無窮思忽被村童笑繡衣金蓮池用韜光答樂天韻徐陶璋髙僧卓錫響林泉曽坐蒲團日晏眠乳穴常流新玉液窪池猶長舊金蓮禽心靜息花間夢魚影空搖水底天我亦暫離塵土思風吹清磬落巖前天台雜咏朱倫瀚巨靈開鑿是何年引出飛流百丈泉一片竒雲橫絶壁半空靈雨下晴天雷驚電掣看奔谷雪淨霜明訝飲川惆悵孤亭零落盡濺珠無復上階圓古有觀瀑亭今廢日午停驂佛隴西迢迢鐘磬度招提空山尚説金銀地二嶺名野水還分青赭溪二溪名一縷煙微僧飯後半竿幢露講筵低穿巖更入圓通洞洞在高明寺後萬壑松聲雜鳥啼浙江通志卷二百七十六
