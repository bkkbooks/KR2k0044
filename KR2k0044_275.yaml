body:
  text: 浙江通志巻二百七十六藝文十八詩七言律杭州拱北樓元趙孟頫城上髙樓接太霞令嚴鐘鼓靜無譁提封内向三千里比屋同封百萬家心在江湖存魏闕身隨牛斗泛仙槎舉頭便覺長安近時倚闌干望日華弁山佑聖宮次孟君復韵元趙孟頫意行騎馬到林間晴霧都沈逺近山瓊樹著花春自早翠禽雙語意相關一杯到手先成醉萬事無心觸處閒猶欠抱琴來托宿靜中規寫水潺潺德清閒居元趙孟頫已無新夢到清都空有髙情與隠居貧尚典衣貪購畵病思棄研厭求書圉人焚積夜防虎谿女叩扉朝賣魚困即枕書飢即飯謀生自笑一何疎同楊心卿過孤山訪靜傳不遇自遊和靖祠下明日奉寄二髙士元仇逺飛仙又向别峰遊竹下閒房且小留滿鬢朔風吹客㡌倚欄落日在漁舟梅花路冷難尋冡葑草田荒半作洲獨徃獨來沙鳥怪山空木落使人愁秋日西湖園亭元仇逺西湖一曲百泉通漠漠青山遶梵宮故國園林秋色淨明朝風雨桂花空銀笙玉笛清歌外畵舫珠簾落照中人物風光兩相稱兒童遮莫笑山翁越州道中元熊鉌野田秋溜正潺潺新翠喬林繞舎環淡日凝烟横别浦斜風吹雨過前山柴扉初放牛羊出漁艇方攜蟹蛤還自笑平生愛游覽天敎長在水雲間桐江舟中元尹廷髙又摇柔櫓下嚴灘一片離情强自寛鴉噪暮雲天寂寂鴈歸極浦水漫漫敲篷雪霰和愁碎拍枕江聲入夢寒今夜客帆何處宿亂山青外是長安送人赴浙東木綿提舉元程鉅夫曽厯金華三洞天風流厯厯記山川桕林白綻梅花小柿實紅垂橘彈圓訪古但聞羊化石因君又喜木生綿霜風渾似當時峭愁絶雙溪八韻篇送戴道士住天台元程鉅夫君承恩命住天台萬壑千峰繞絳臺門外霞川浮溟涬杯中雲海接蓬萊時同野鶴看桃去或領山猿採藥迴三十年前吾亦到舊題應入白雲堆蘓堤秋宴元元淮南北髙峰鎻翠雲山藏樓閣帶烟輕欲彫楊桞猶貪舞半破芙蓉未老成波底畵橋天上動湖邊珠翠鏡中行水晶萬頃浮波面照出孤山分外清和繼學郎中送友歸越中元馬祖常薊門東望海無波誰許山人問薜蘿雀舫春聲留水鷰鵠袍秋影動天鵝鑑湖草滿芙蓉少鄞縣潮來牡蠣多羞見京塵遮㡌頂羊裘亦欲換漁蓑游西湖元曹伯啓鬱鬱覊愁暑不堪畵船西出事竒探栁邊和氣蘇公路梅底清風處士菴已覺湖山入胷臆更容絲竹薦肥甘錦雲一叚三千頃記取平生作盛談遊靈隠元曹伯啓岧嶤鷲嶺梵王城秋氣平分寳界清火宅久居心獨苦雲林初識眼増明禪關已被猿叅透仙洞誰敎鬼鑿成漸負半生泉石約蹔來偷暇洗塵纓送韓伯高僉憲淛西元虞集正月樓船過大江海風吹雨灑船窗雲消虹蜺横山閣潮落黿鼉避石矼闕下諫書誰第一濟南名士舊無雙湖隂暑退多魚鳥應勝愁吟對怒瀧錢塘懷古二首元楊載斜界鈎陳通大道中分魏闕對層巒雲生殿上金鑪暗露下庭前玉井寒江漢飛龍俄窅窅滄溟泛鷁竟漫漫中天會合寜非數坐見蒼生奠枕安山回禁籞入雲長無復陳兵衞兩廂千古金鐘埋野草萬年珠樹落秋霜龍文不徙陽人聚鳥篆終降軹道旁九市緇塵來袞袞一江波浪去茫茫題拱北樓元楊載殷地鼓鼙迎日出倚天梁棟與雲浮北瞻帝闕三千里南控臣藩二百州江海無波沉罔象旌旗乘野駐貔貅鸞廻麗榜多深意繡袞於今有魏牟暮春遊西湖北山元楊載愁耳偏工著雨聲好懷長恐負山行未辭花事駸駸盛正喜湖光淡淡晴倦憇客猶勤訪寺幽棲吾欲厭歸城緑疇桑麥盤櫻筍因憶離家恰歲更游天竺寺元白珽山轉龍泓一徑深嵐煙吹潤撲衣巾松蘿掩映似無路猿鳥徃來如有人講石尚存天寳字御梅嘗識建炎春城中遮日空西望自與長安隔兩塵游智者寺元鮮于樞四圍松是祇園樹三面山開舍衛城游子心隨仙境化老禪詩似石泉清幾人邂逅有今日半載趦趄成此行安得盡抛身外事長年來此學無生送人游天台元鄧文原此去蘭亭修禊後平明驅馬試征衣海邊山盡天無盡花底春歸人未歸一雨潮生魚入市逺巖月上鶴投扉舊游二十年前路孤負東風賦采薇三月晦游道塲山宿清公房與成父同行二首元鄧文原絶頂軒窗納晩晡下方燈火聽鐘魚天連震澤涵元氣地涌浮圖切太虛凉立松風觀石澑晩尋樵徑扣僧廬孤亭山麓荒苔積猶想幽人夜讀書澗石縈紆紫竹叢晴雲吹落水晶宫夜寒身宿羣峰頂花盡春歸萬木中儻買山田營破屋時過僧寺駕孤篷只應𣺌𣺌軒前路杖履長陪鶴髪翁次陳輔賢游雁山韻元李孝光竹杖㯶鞵去去賒一春紅到杜鵑花山椒雨暗蛇如樹石屋春深燕作家老父行尋靈運屐道人喚喫趙州茶明朝塵土芙蓉路猶憶山僧飯一麻入雁蕩山元李孝光興國年間路始開前朝碑墨半蒼苔雁横宕月知秋到僧踏湫雲看瀑來一嶺未敎靈運識萬松誰道了翁栽此山曽共秋風約説與山猿不用猜賦得越山越水元李孝光賀家湖上又秋風放翁宅前東復東兩行雲樹忽逺近十里荷花能白紅游人濯足銀河上越女梳頭青鏡中我欲張帆上南斗扶桑碧海與天通題雪竇妙高臺元黄溍偶為清游宿梵宫凌晨試上最髙峰水翻雪色寒猶落雲掩丹光逺更重舊有一僧能跨虎近聞三洞盡藏龍下方車馬應難到煙際惟聞日暮鐘次韻方子踐浙江觀潮元黄溍潮生潮落幾時休朝暮吴兒幾白頭被髪秖誇迎駭浪側身寜解障奔流江吹碧瓦人聲曉雲閃朱旗海氣秋後夜月明天在水有誰能此賦登樓諸暨休日偶書元黄溍一室蕭然似冷官更無車馬駐江干天清不斷絲絲雨春淺猶生陣陣寒公事痴兒何日了雲山圖畵要人看輕風正滿新黄桞誰與相從試凭欄送王正臣經歴赴浙東元栁貫仙掌浮空紫翠重金華秀出浙河東繡衣幕府雲霄上丹筆刑書雨露中溪釀獨稱雙醖美津船纔許一帆通送君因寄思鄉夢為問青山舊桂叢送葉道士歸天台元桞貫北斗光中曵翠旂五城樓觀極巍巍采山不鑄黄金鼎佩印空垂白羽衣石井劍花飛夜氣玉田芝草豔春暉天台仙子應招隠萬壑梯颷看鶴歸浦陽十詠元桞貫冰柱浮空曉色䝉海波摇動玉􅌑瓏九清内景游紛外五嶽真形太素中㣲月升壇初映鶴長雲連野不驚鴻仙姬晏坐瑶池上催捧蟠桃獻木公仙華巖雪白石靈山望贊皇湫潭此復見蒼蒼飄揚直欲陵三際膚寸猶能雨八荒空外金精縣太白泉中虬彩化長黄傳芭奏罷神絃曲松蓋成隂澤氣凉白石湫雲兩環日月似飛梭鼇背稜稜窣堵坡朱鳥前頭森贔屭蒼龍左角見嵯峨玉函舍利朝光現珠斗闌干午影過浩蕩浮雲開萬象寶華離遝散芬陁龍峰孤墖一勺曹谿未是甘刺山容易出飛泉消融太古岷峨雪澄映中秋沆瀣天挂樹青猿窺洗缽眠沙白鹿伴安禪巖龕無縫身如石逆數髙僧入定年寳掌冷泉有盈有泚即寒泉猶隔蘆峰道里千嶽麓雲深藏䇿處匡山人老讀書年松楠疊影青浮几華樹生香晩入筵稽首堂中兩夫子六經言逺視如天月泉春誦溪水添流到石矼小家殘戸占漁商蛟龍未解乘雲氣魚鼈安能避澤梁兩㟁櫟林藏曲折一篝松火照㣲茫誰夸固有蠙珠顆徃徃鈎深得夜光潮溪夜漁千峰不盡夕陽孤歛翠浮舟入畫圖墖廟傍連山影直石梁中互水痕枯白魚在汕將踰尺紅稻登場稍似珠玉露金風秋最爽跳身何用市間壺南江夕照半里官橋出市闤一團秋色破孱顔雲開浩蕩初疑曙日出蒼凉不見山斷雁殘鴻飛杳杳緑蕪紅葉映斑斑去年菊蕊今年發拾得籬邊句子還東嶺秋隂濫觴初不滿瓶盆百谷渾渾一壑吞自此安流輸渤澥放渠髙浪蹴崑崙出山未適帆檣便竭澤毋庸罔罟繁謝客題詩曽宿處孤雲落日是何邨深褭江源芝掌中開顥氣青雲軿雙駕鳯凰翎因山不啓軒轅鼎化石猶聯婺女星磴道芳春琪樹長巖扉清晝碧華零真仙帝遣司風雨喚起淵龍聽指令昭靈仙迹游五洩山二首元栁貫神斧誰攜鑿澗磻拓開地險出天慳湫潭隠奥龍非畜太石隂森鬼所寰劫火塵空遺井臼枯禪骨冷墮榛菅如何大法臨標季不放摩尼照此山青天吹墮玉芙蓉日出烟開彩翠重婺女名山今入越泐潭弟子别為宗於何勝境偏多阻如此衰年始一逢照影龍泓余種種欲從老衲借枝笻三衢馬太守昻夫索題爛柯山石橋元薩天錫洞口龍眠紫氣多登臨聊和采芝歌爛柯仙子何年去鞭石神人此地過烏鵲横空秋有影銀河垂地水無波遥知題柱凌雲客天近應聞織女梭吴宗師赤城阻雨次甘泉韻元陳旅三十六盤嗁杜鵑杜鵑嗁盡到平川千山白雨作秋氣六月赤城堪晝眠銀渚星槎留使客竹宫風帳候神仙衰予病起橋門下目送晴雲度楚天題嘉興水西寺爽溪樓寄新仲銘長元成廷珪新公邀作爽溪游為説前朝有此樓雲氣逺開天北極風光仍在水西頭虛檐古瓦縁蒼鼠曲澗輕波漾白鷗宸翰僅留飛白在煙塵漠漠使人愁自山中歸鏡湖别業元呉景奎數椽茅舍清江曲六月炎天困鬱蒸頼有青山圍故宅歸來赤脚蹋層冰石泉松籟為琴筑野䔩山肴薦豆登明日迴頭望邱壑芙蓉半出白雲層新山别館十景并序元曹文晦余家東北麓作考妣祠堂題曰新山别館直赤城之陽烏岡之右隴勢北走而中斷屋臨山北繚以修垣牽連岡隴前挺髙竹後列羣松上下襍遝蒼翠如織東偏為門登石版涉隴上旁通支逕彎環花竹間入館中西翼小亭坐可五六人有員嶠却立其前樹氣清郁禽語瀏亮皆若效竒以出映帶後先余以耳目所接次其景物性情所得發為韻語雖不足以鼓吹風雅然必著之篇什者志吾樂也至正庚寅夏日數㸃殘星掛緑蘿看桃行入舊山阿洞門花霧紅成陣沙麓巖前翠作窩天外曙虹驚鶴夢水邊啼鳥和漁歌劉郎去後無人到吟倚東風草色多桃源春曉赤城霞起建髙標萬丈紅光映碧寥美人不卷錦繡叚仙翁瀉下丹砂瓢氣連海嶼貫旭日光入溪甕生春潮我欲結為五色佩碧桃花下呼周喬赤城棲霞拄峰堂下翠紛紛俯鑒澄源氣自芬兩澗合流元有緒八風吹水自成文沄沄尚想在川上混混終當放海濱欲舉源頭問寒拾幽亭盡日對松雲雙澗觀瀾四萬八千山上山山中夜夜白雲還底須出岫彌六合日復與僧分半間古殿結隂燈影澹長松留暝寺門關謫仙已覽廬山秀留得書堂相對閒華頂歸雲舊日溪源浸巨螺一竿來此老漁蓑逺尋短櫂輕舟興髙唱斜風細雨歌夜泊松潭明月近晝眠花港緑隂多朝朝老瓦盆邊醉冷看王孫細馬䭾螺溪釣艇清溪溪口荻花秋底事年年伴白鷗北去不辭書帛寄南來非為稻梁謀荒煙𣺌𣺌長橋外落葉蕭蕭古渡頭見説洞庭風月好碧波千頃少漁舟清溪落鴈觀彼南山小衆山霜明紅樹碧雲寒餘清入座挹不盡積翠浮空染未乾漠漠秖愁晴霧隔霏霏休待夕陽看何人會得悠然趣前有陶公後有韓南山秋色萬仞臺端接絳霄秋風吹夢度金橋素娥獨倚白銀闕羽客雙吹紫玉簫清氣逼人凡骨換孤光入酒醉魂消繡襦甲帳今何在誰為文生一見招瓊臺夜月山北山南盡白雲雲中有水接天津兩龍爭壑那知夜一石横空不度人潭底怒雷生雨雹松頭飛霧濕衣巾曇華亭上茶初試一滴曹溪恐未真石梁雪瀑巖戸隂森隔萬松暮雲卷盡寺林空天邊漸蝕千峰紫木杪猶餘一縷紅兩箇歸僧開竹院數聲殘磬度溪風憑誰喚起寒山子共看迴光入梵宫寒巖夕照越山清曉元貢性之曙光晴散越王臺萬壑千巖錦繡開欹枕僧鐘雲外落卷簾漁唱鏡中來樹藏茅屋雞聲斷露濕松巢鶴夢囘安得畫圖分隙地移家仍住小蓬萊富陽舟中元金涓終日推篷對酒杯漁郎隔浦櫂歌回路傍古屋無人住山下疎梅獨自開幾處汀洲分鴈下滿江風雨送潮來白頭篙叟休相促明日天晴上釣臺送友人游温台元釋宗衍天台鴈宕好林邱水竹