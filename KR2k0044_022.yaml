以迎薰其拱乾易為文昌城周七百七十三丈五尺高二丈三尺闊二丈垜一千五百四十有竒敵臺七十月城十丈月城敵臺三舖二十五國朝雍正五年欽奉上諭檄知縣崔宣重修武康縣城池湖州府志漢初平間置在今縣治西五里之銀山今徙烏回山累土為繚垣舊無城郭國朝雍正五年欽奉上諭檄行道府察勘興建安吉州城池安吉州志舊治在天目鄉今孝豐縣址是也唐開元二十六年縣令孔志道移治於玉磬山東南城久未立元至正十六年丙申明兵克安吉總管張俊徳始築土為城丁酉元帥費愚重甃以石延袤六里高二丈有竒廣半之門四東曰賓陽西曰寶成南曰麗正北曰拱辰城瀕大溪引水為壕鑿壕為池僅通舟筏歲久城圮壕亦湮嘉靖壬子知州林璧重修建城樓更舖陳良謨為記甲寅知州江一麟復加高二尺内土岸以石甃之國朝雍正五年欽奉上諭檄知州滕兆彬重修孝豐縣城池孝豐縣志明𢎞治設縣初知府王恂相有漢縣故城巋然存焉因築土垣周六百一十丈萬厯四年知縣王國賔請更為石城廣六百七十九丈高二丈厚半之城樓四門四窩舖八水洞三城門東曰威鳯西曰通徳南曰靈龍北曰迎安城壕自西跨北廣三丈至迎安門有迎安橋其南溪水環繞至東門為山公潭險塹可守寧波府寧波府城池鄞縣附郭寶慶四明志羅城周回二千五百二十七丈計一十八里奉化江自南來限其東慈谿江自西來限其北西與南皆它山之水環之唐末刺史黄晟所築成化四明郡志唐末規制未𢎞宋元豐元年曾鞏受詔完之寶慶二年守胡榘因其圯剝重修寶祐間制置使吳濳復拓舊城設雉堞立巡舖寘卒以邏越三載畢工又於開慶二年建望京鄭堰下卸三門其甬水靈橋東度則以次繕治元初隳天下城池民居侵蝕漸為坦途至正八年台州方國珍為寇二十年浙東都元帥納琳哈喇以台宻邇慶元復築城以􅍯劉基為之記後國珍受招安之命據城開江浙分省復加修治洪武六年指揮馮林更新之崇三之一浚東南及西三面之壕十四年指揮李芳更增葺之嘉靖寧波府志府據甬水為城南匯它泉北源姚江合流桃津峙為崇築高二丈五尺址廣二丈二尺面一丈五尺周回二千二百一十六丈延袤一十八里闢為六門東曰靈橋東渡南曰長春西曰望京北曰永豐東北曰和義其四門可通輿馬獨西南為漕運水路新設重門外設弔橋門各有樓羅以月城城之上有敵樓四十六雉堞三千五百六十四警舖六十五外為壕自北至西南環繞通二千一百四十四丈自和義抵北永豐門通三百四十三丈濱大江不設嘉靖三十五年守張正和重建甕門敵臺大加繕修間淵重修府城記寧波古於越東偏之地秦為鄞邑隸會稽郡嗣後廢置不一及唐開元中始定為明州城作於刺史黄晟即今郡城也更五代歴宋代為修葺及元隳城舊築斯廢方國珍倡亂民㒺奠居於是廢址復城邇來海上荷戈惟慿城固守郡守邱侯玳甫至上其事巡按侍御胡公宗憲暨諸藩臬司咸檄命出公帑以資其費遂擇日戒事而以調衢州去衢守張侯正和來代即身任其役因兼屬貳守候君國治董其事又分督以五邑之令夏君儒曹君本蕭君萬解宋君繼祖毛君徳京而張侯則總其成於上計城周凡二千七百八十七丈修者二千一百八十二丈造斥堠六十有六敵樓四十有六馬步階七巡海憲副孫公宏軾王公珣暨張侯復修築西南二水門羅以月城總費帑銀七千五百五十兩有竒役民戸之富者四百有竒經始於乙卯八月迄工於丙辰正月雉堞煥如萬年保障於是乎在國朝順治十五年增高併堵歲久漸圯雍正六年總督管巡撫事臣李衞因瀕海重地檄行司道會勘具摺奏請興修大嵩所城成化四明郡志郡治東九十里鄞縣十一都地名大嵩洪武二十年信國公湯和築城鑿池闢東南西北四門上各置樓羅以月城弔橋四穴水門於西門之側周城列窩舖二十國朝五永樂十五年都指揮谷祥加修増置敵樓二十順治十五年增修慈谿縣城池嘉靖寧波府志慈谿城後負石刺峰前面重江左山蜿蜒右山屼聳距郡西五十里高二丈冇竒址廣二丈四尺面朒其十之三延袤十里闢為四門門各有樓東曰鎮海南曰景明西曰望京北曰環山東西各為小門又穴水門於東西之左右以通潮汐門各有樓羅以月城雉堞二千六百十六敵樓二十八警舖二十七外為壕九里五分北半里際山無壕洪武初設戍海壖有觀海龍山二衞所故未有城嘉靖壬子倭掠内地丙辰夏焚掠殆盡始為城邑人葉照馮璋袁煒並為記國朝順治十五年增高倂堵奉化縣城池嘉靖寧波府志奉化城後據錦屏前依玉几左臨大澤右傍鳯山距郡南八十里高一丈四尺址廣一丈三尺面廣一丈周回一千一十八丈延袤七里闢四門東曰迎恩西曰順成南曰貞明北曰起鳯門各有樓穴水門於西為上水門於東為下水門城之上有雉堞一千六十五外自東南臨龍溪以西為文昌溪北底陵谷俱不設壕奉化故未有城嘉靖壬子知縣蕭萬解始城之奉化縣志萬厯間城多火菑知縣樊轂因民之請移築山下城南門縣治正南國朝順治初知縣蔡周輔塞舊南門移東四十餘丈又增築甕城戊戌知縣王奐增雉堞厚二尺高四尺名城之東門曰太乙西曰金嶂南曰薰時北曰拱極康熙十二年知縣曹鼎臣改今址仍舊制也二十三年夏南城門災各門樓俱圮二十五年知縣施􅋿曾重建四門修築雉堞鎮海縣城池嘉靖定海縣志薄海為城東連招寶山出浹口南環以江北負巨海西通於鄞距郡東六十二里高二丈四尺址廣一丈面八尺周圍一千二百八十八丈延袤九里闢五門東曰鎮遠南曰南薰又南曰清川西曰武寧又西曰向辰門各有樓新設望海樓於北俱有弔橋羅以月城城之上有敵樓十雉堞二千一百八十五警舖三十九外為壕自東抵西環九百六十六丈北際海不設初城築於錢鏐歴元而隳洪武元年千戸王及賢始立木柵七年守禦千戸端聚易以石二十年信國公湯和建衞拓而大之周九里有竒闢門為六各建以樓上加雉堞警舖外羅以月城惟小南門無月城二十九年指揮劉澄增置永樂十三年都指揮余成以北抵海塞北門舊穴水門於城西今改置小南門之右嘉靖十二年都指揮劉翺加增雉堞三尺三十三年知縣宋繼祖就城之北面增建望海樓舊浙江通志萬厯三十六年知縣黎民表修葺國朝順治十五年增高并堵重造敵樓警舖觀海衞城嘉靖寧波府志東北巨海西峙虎山背負浪港山南面五磊諸山距郡西北百十五里高二丈四尺址廣三丈延袤四里闢東南西北四門外設弔橋門各有樓羅以月城雉堞一千三百七十敵樓二十八警舖三十六外為壕九百十四丈城始於洪武二十年信國公湯和以慈國朝谿縣塗田建築永樂十六年都指揮谷祥增崇之康熈十年奉檄重修龍山所城成化四明郡志郡治北七十里明洪武二十年信國公湯和以定海縣龍頭場石塘團之址築城鑿池建門一永樂十六年都指揮谷祥増高八尺嘉靖寜波府志龍山背海面山左亘覆船山右為望野高二丈五尺址廣二丈延袤三里闢東南西北四門門各有樓設弔橋於東西南三門之外羅以月城雉堞八百五十六敵樓警舖各二十外四周為壕五百六十二丈威逺城嘉靖寧波府志招寶山雄據海口與竹山對峙為江海之咽喉郡治之門戸誠保障要害處也先是盧鏜以㕘將分守東浙又進鎮守都督屢平倭難備知阨塞與海道副使譚綸請於總督胡宗憲於招寳之巔建築城堡發漁稅千金十日鳩工三閱月而告竣城凡二百丈高二丈二尺厚一丈雉堞一百六十七東西為門二内建戍屋四十餘楹調兵以守扼截海口以壓敵衝與縣國朝城唇齒相應因名威遠城順治十五年增高併堵穿山所城成化四明郡志郡治東南一百五十里定海縣海晏一都地名穿山洪武二十七年安陸侯視其地濵海衝要立城於此二十八年千户邵通闢四門羅以月城穴水門於南門之側東北二門置樓周城列窩舖跨山為池永樂十二年都指揮余成開塹道二十六年都指揮谷祥國朝加修十八年以城址跨山空闊遂築而小之周三百順治九十五丈延袤二里冇竒高如舊霩􅛾所城成化四明郡志郡治東南一百八十里定海縣海晏三都地名霩􅛾洪武二十年信國公湯和築城鑿池闢南西北三門羅以月城其東為水門各冠以樓置弔橋復置瞭遠樓於山城列窩舗永樂十五年都指揮谷祥加修增築置敵樓塞水門嘉靖寧波府志霩􅛾南滙大江自南徂東為渤海西接育王山北負穿山城高一丈九尺址廣一丈周四百八十八丈延袤三里有竒外東至西北凡三百七十四丈為壕南至西山一百三十二丈為塹倍壕三百七十丈象山縣城池嘉靖寧波府志象城北依象麓南麗鯨波東逈文峰西迴丹嶠距郡東南二百七十一里高一丈六尺址廣二丈面廣一丈周一千八百九丈有竒延袤五里闢為四門東曰賓暘南曰來薰西曰迎恩北曰拱極門各有樓穴水門於北門之右南門之兩旁凡三門雉堞一千二百三十一敵臺二十四警舖如之外自西水門至東為壕自東門而北至西南門之東為塹象自建縣以來未有城嘉靖壬子夏縣令毛徳京力請成城邑人周希程為之記昌國衞城成化四明郡志郡治南三百五十里地名後門洪武十二年先於昌國縣開設昌國守禦千户所十七年改昌國衞二十年起遣海島居民革昌國縣以本衞移置象山縣三都海口東門二十七年因東門懸海水薪不便徙後門指揮武勝築城鑿池闢東西南北四門惟北無月城穴水門於西南二門之側永樂十五年都指揮谷祥重加修浚嘉靖寧波府志成化間指揮張勇又繕葺之嘉靖三十二年倭寇入據後綂兵梁鳯加崇焉舊浙江通志城高二丈三尺址廣一丈延袤七里城上有雉堞敵樓警舖外為壕二百一十六丈其西北九百一十丈依山不設石浦所城成化四明郡志郡治南三百七十一里地名石浦舊隸昌國衞洪武二十年因本衞移置東門將石浦原設巡檢司徙於象山縣遂調前後二千戸所於石浦築城鑿池闢南西北三門各冠以樓外羅月城穴二水門於西南二門之側永樂十五年都指揮谷祥重加修浚嘉靖寧波府志嘉靖三十四年綂兵梁鳯又加完葺錢倉所城成化四明郡志郡冶南二百六十一里地名錢倉洪武二十年千戸王普築城鑿池闢東南西北四門各冠以樓穴水門於西門之側外羅月城永樂十四年千戸徐昇增修嘉靖寧波府志嘉靖三十二年綂兵劉恩至加葺舊浙江通志高二丈六尺址廣一丈三尺延袤三里外設弔橋城上有雉堞敵臺警舖外為壕六百丈餘二十丈阻山不設今改為寨設營房三百六十間爵溪所城成化四明郡志郡治二百七十一里地名爵溪洪武三十一年千戸王恭築城鑿池闢東西南三門各冠以樓外羅月城於東西二門永樂十五年千戸翟通増砌城堞嘉靖寧波府志成化間指揮張勇更葺嘉靖三十三年綂兵劉恩至重修舊浙江通志高二丈八尺址廣三丈延袤三里設弔橋於南門外城上設雉堞敵樓警舖外為壕三百二十丈定海縣城池定海縣志在東海洲中唐開元置翁山縣無城宋熙寧六年改翁山曰昌國始築城鑿池建炎中城毁明洪武十二年增葺昌國城設立衞所指揮慕成立城五百丈未就明年指揮許友展成之十七年信國公湯和徙昌國三鄉止存在城四里立二所四巡檢守之而徙衞於象山縣之東二十七年改隸定海衞仍故城命總師居守永樂十五年都指揮谷祥加修正綂八年戸部侍郎焦宏以城大兵少裁東北隅二里存七里三十步壕隨城廣城門凡四成化間指揮張勇葺之嘉靖三十三年總兵梁鳯加崇焉萬厯十三年副總鎮張可大增修國朝康熈二十六年九月設立定海縣二十八年建造城池循舊址築之周一千二百十六丈城高二丈址廣一丈五尺羅月城四雉堞一千二百八十高四尺立東西南北四門門上飛樓四窩舖三十八其南設水門一外為壕浙江通志卷二十三
