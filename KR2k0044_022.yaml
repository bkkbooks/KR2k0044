body:
  text: 浙江通志卷二十三城池上雨浙為東南大藩名城數十因山塹谷屹然稱金湯焉聖朝徳化翔洽海宇乂安而掌固所守猶勤版幹其在記曰孟秋之月補城郭言役有時也左氏傳曰計丈數揣高卑度厚薄仞溝洫言工有度也其所以保障斯民之意至深切矣志城池杭州府杭州府城池錢塘仁和二縣附郭元豐九域志隋楊素創周回三十六里九十步資治通鑑唐昭宗景福二年錢鏐發民夫二十萬及十三都軍士築羅城周七十里詳見古蹟咸淳臨安志紹興二十八年增築城東南之外城謹按宋史紹興三十一年五月增築禁城城東便門候潮門保安門舊名小堰門新門崇新門俗呼薦橋門東青門俗呼菜市門艮山門城西錢湖門清波門俗呼暗門豐豫門舊名湧金門城南嘉會門城北餘杭門水門保安門南水門北水門天宗門餘杭門成化杭州府志元既取宋禁天下修城以示一綂而内外城日為居民所平至正十六年張氏陷姑蘇據浙西五郡十九年發松江嘉興湖州杭州民夫復築焉自艮山門至螺螄門以東視舊則拓開三里而絡市河於内自候潮門以西則縮入二里而截鳯山於外門仍一十有三東無便門保安二門北增天宗北新二門南嘉會門改曰和寧門貢師泰杭州新城碑至正十八年春平章謁太尉曰錢塘東南重鎮地當衝要城郭不完其何以守太尉曰然兹實大役汝其白之丞相丞相謂天方旱民將勿堪議久未决則又曰丞相無憂也當有以處之遂詣太尉請出粟二十萬石以始興築命郡守謝節考觀圖志以諮故實地植表以正方位視民力上下田賦多寡授之丈尺以均其徭發姑蘇吳興嘉興松江四郡及一州兩縣四隅之民更相作息以亟其成猶慮夫趨事之或怠也則督部將先築錢塘並湖者數百丈為之程勸且誓羣有司曰凡今之為非徒勞民且費也勞之將以休其力費之將以衛其財諸君其勉喻之吾且日視其勤惰矣其自候潮門步至東青門則平江守周仁治之自錢塘門步至豐豫門則吳興通守陸大本判官張士俊治之餘杭則嘉興通守繆思恭冶之艮山北新清波則松江通守謝禮推官馬玉麟治之和寧與錢湖則屬之海寧州仁和縣而總其役者實謝節也令下之日風馳電驅小大奔走莫敢不其伐石於山浮木於江舟輸輦載千里相屬荷鍤揮杵萬堵皆興不三月而功已告成凡用石之工一百六十二萬木之工一十五萬圬之工一百八萬金之工二萬徒一千三百五十萬土石磚甓灰鐵木植麻枲之數累鉅萬億而不可勝紀也城之周六萬四千二十尺高三十尺厚視高加十尺甃以貞甓錮以堅珉礦塈堊塗雪立虹貫舊城包山距河故南北長今則截鳯山於外絡市河於内故東西廣而廣輪適中焉為門一十有三東曰候潮曰新門曰崇新曰東青曰艮山西曰錢湖曰清波曰豐豫曰錢塘南曰和寧北曰餘杭曰天宗曰北新上各建飛樓四楹而外為甕城門皆左右闢其餘艮山清波各為月城環旋出入互屏蔽蔽鑿石為樞冶鐵為扇金鋪銅環啟閉有則縣以飛梁塹以重壕内凡二百步設磴道以上下人焉外凡百餘步岌方臺以便矢石其上則發號之亭邏卒之舍睥睨樓櫓連輥飛礟靡不畢具於是崇墉堅壁若天造地設而形勢為之一新矣經始於十九年七月十三日迄功於是年十月某日萬厯杭州府志至正二十六年十一月明太祖命曹國公朱文忠兵取杭州守將潘原明以全城内附遂因之為省城門省為十東城五門曰候潮曰永昌舊名新門俗呼草橋門曰清泰舊名崇新門俗呼蔫橋門今呼螺螄門曰慶春舊名東青門俗呼菜市門今又呼太平門曰艮山俗呼壩子門城西三門曰清波曰湧金舊名豐豫門曰錢塘舊又有錢湖門今塞冶按錢湖門舊址在鐵嶺下介清波鳯山之間今此地居民猶仍舊名南城一門曰鳯山俗呼正陽門北城一門曰武林舊名餘杭門俗呼北關門舊又有天宗門俗呼小北門今塞為水門四在鳯山候潮艮山武林各門之傍城門樓一十有九湧金門無月城樓止一水門樓二武林艮山雉堞九千八百三十三垜將臺五十座警舖一百七十一所制多仍舊成化十一年左布政使甯良議於錢塘門左湧金門右開九渠之一為河以導湖水鎮守太監李義上其事從之於是開為水門闊七尺高九尺入深四丈九尺嘉靖三十三年巡撫都御史李天寵清負城馬路之侵没者自鳯山門迤西北至清波門闊凡三丈餘長不可計三十四年二月倭將犯杭州提學副使阮鶚增築錢塘門月城雉堞高二尺湧金錢塘二門相去數里中舊有磴道以便守城者上下隆慶五年十月督撫都御史鄔璉令於城之西上築嚴警樓一座分營兵直宿萬厯二年二月督撫都御史謝鵬舉令所司毁磴道萬厯錢塘縣志慶春門有水門萬厯二十二年督撫常居敬郡丞凃文奎開三十一年督撫尹應元右布政范淶議大修城凡二年竣役城壕南邇浙江西即以湖水為險其東起永昌壩並清泰至慶春門止中廣二十餘丈長一千丈九尺自慶春歴艮山廣三十餘丈迤北至武林錢塘門止長二千六百二十三丈二尺嘉靖三十五年武林錢塘二門外各浚壕甃閘上構弔橋環城皆有深池是年霖雨湖水泛溢錢塘門北城衝圯三十餘丈乃塞壕倂毁橋閘杭州府志明季巡撫董象恒用形家言塞十城穴十分之二國朝順治十五年總督李率泰倂女牆二垜為一康熈初改永昌門曰望江門二十四年巡撫趙士麟委府倅靳襄宋徳深等修築雍正五年二月初九日欽奉上諭恭紀首巻修理城垣巡撫臣李衞會同將軍觀風整俗使將杭嘉湖等府城垣確勘興修杭州府仁和縣所轄湧金錢塘武林艮山慶春等五門并艮山門水柵錢塘門官㕔錢塘縣所轄清波鳯山候潮望江清泰等五門并十門營房俱修葺完竣海寧縣城池咸淳臨安志鹽官縣舊城在縣西北四十一里周六百步高八尺隋大業十三年築今城周四百六十步高二丈唐永徽六年築壕闊五丈深四尺萬厯杭州府志舊城入元圯至正十九年築高一丈五尺周回七里九十步貢師泰城海寧州詩序海寧故鹽官縣入國朝以戸衆陞為州其後又以潮決南崖州將盡入於海民吏驚懼捍以數郡之力而決猶不止朝廷遣使投璧沉馬而祝祭之幸得寧遂改今名大抵境内地下淖沮洳高者又皆沙土故城址漫無存者至正十九年江浙分省檄左右司都事陳君元龍相其地勢而興築焉君至則下令聽民自定其力之上下以均其徭有不實輒治之幷以坐吏於是奸豪懾服貧懦感徳小大相勸萬手並作不數月而堅壁高壘屹然為東南保障矣明洪武二十年信國公湯和增築高五尺永樂十五年十一月都指揮谷祥增築雉堞三尺計高二丈五尺下廣二丈五尺上廣一丈八尺造月城城門樓十警舖四十九所雉堞一千三百七十五垜為門五東曰春熈西曰安戌謹按成化志作安肅南曰鎮海北曰拱辰東北曰宣徳水門三一在拱辰門西一在宣徳門北一在安戍門南三門外各有弔橋壕闊五丈深一丈海寧縣志嘉靖三十四年邑令蔡完以倭警後加高城磚五尺增添女牆及巡警舖四十五所敵臺二十四座又浚城河加深五尺共深一丈五尺國朝順治十一年邑令秦嘉系繕城濬壕修拱辰門雍正五年欽奉上諭檄知縣胡杲修築完竣雉堞整固樓櫓一新富陽縣城池咸淳臨安志周回六百步高一丈壕闊一丈五尺舊傳咸通十年縣令趙訥修築成化杭州府志元至正十六年江浙行省㕘知政事楊旺扎勒重築周回三里元末毁萬厯杭州府志明嘉靖二十五年知縣桂軏築城於古城東南廣六里延袤一千丈有竒厚二尋内外俱甃以石城門樓四雉堞一千二百堵為門四東曰昇平南曰萃和西曰康阜北曰達順隆慶五年分守㕘政李淑於儒學前城闢門曰文明壕東南以長江為險富陽縣志縣城東跨觀山西臨莧浦南俯大江北帶後河國朝康熙十年知縣牛奐修二十年知縣錢晉錫重修雍正七年總督臣李衞委知縣朱永齡開濬城内并北門外一帶河道餘杭縣城池咸淳臨安志舊縣城在溪南周回六里二百步東漢熹平二年縣令陳渾徙於溪北後復治於溪西後唐時號為清平軍城錢武肅王又修廣之雍熙初再徙溪北周五百四十三丈高一丈三尺下廣一丈五尺壕闊二丈五尺舊城門四曰榮春湖光迎波永豐成化杭州府志舊城入元圮至正十六年江浙行省㕘知政事楊旺扎勒仍於溪南築周回三里内附後毁萬厯杭州府志嘉靖三十五年知縣吳應徵重築自西迤北至東五百丈高一丈八尺自東迤南至西二百三十丈高三丈二尺周廣一丈六尺城門樓四雉堞一千三百四十三堵為門四南曰對薰北曰拱極東曰賔陽西曰秩成壕無南臨苕溪餘杭縣志臨溪南城有水門二萬歴三十二年知縣程汝繼增築月城曰啟秀四十二年東南城圮知縣戴日强重築日久復圯國朝康熈十年知縣張思齊増築城垜二十二年知縣龔嶸增修雍正六年知縣何儻重修臨安縣城池咸淳臨安志周回五百二十步萬厯杭州府志舊有城依太廟山周五千五百六十步池在東北錢鏐時名衣錦城為門四東迎恩西惠政南望錦北拱辰後玘杭州府志洪武初遷縣治於今所嘉靖五年縣令廖瑜仍立四門東會錦西聚金南迎薰北拱極各樹木柵三十四年縣令魏希古設土垣以資防禦周五里高一丈土垣内外俱民産各隨業修葺歳以為常壕環如城於潛縣城池咸淳臨安志古城在縣北二百四十步耆老相傳隋開皇十三年越國公楊素築今城周四百五十二步高一丈五尺厚五尺基厚一丈八尺壕闊一丈八尺深四尺成化杭州府志元至正十七年江浙行省㕘知政事楊旺扎勒重築自金鵞峯而西由石龍口直抵縣後山周五里高一丈五尺厚一丈壕闊一丈為門三西曰錦江南曰迎恩北曰仰山其東則以山勢逼阻不置門新城縣城池咸淳臨安志縣因山為城周二千五百七十一步高二丈二尺唐大順二年杜稜築有門四東曰熈春南曰太平西曰順成北曰寧海成化杭州府志城今圮壕與遺址僅存萬厯杭州府志嘉靖三十四年知縣范永齡築城周三里計六百餘丈高一丈六尺厚倍之城門樓四雉堞五百七十堵為門四東曰元始南曰亨通西曰利遂北曰貞成方亷為記新城縣志吳越時杜稜築城鑿隍引堰水注之堰去城八里往往不得達明天順六年郡守鉛山胡濬至邑相度築墖山堰開溪導流以入壕凡壕内地鑿渠引水接通城河凡五里許國朝康熙十一年壕淤漸平知縣張瓉重濬雍正五年欽奉上諭檄知縣羅爌增修昌化縣城池咸淳臨安志周三百六十步壕闊一丈五尺久廢惟古木環城基成化杭州府志舊城周回三百六十步厚一丈五尺壕闊一丈五尺為門三東曰趨京西曰三瑞南曰登龍其北則以負山不設門元至正十七年江浙行省㕘知政事楊旺扎勒重築自登龍門而東轉唐山西南至溪滸凡七里餘高一丈五尺厚一丈八尺門三仍舊名萬厯杭州府志明隆慶三年七月知縣周易請於廵撫都御史谷中虚創東西二闗杭州府志萬厯二十年縣令周洛都於闗内充拓舊規各建城樓三加以睥睨女牆臨溪屹立嘉興府嘉興府城池嘉興秀水二縣附郭嘉興府志不知所自始嘉禾記謂唐乾寧中守臣曹信築吳越備史謂唐僖宗文徳元年吳越武肅王命制置阮結築五代晉天福四年吳越王元瓘拓為州城宋謂之軍城元謂之路城至元嘉禾志按圖經云羅城周一十二里高二丈二尺厚一丈五尺子城周二里十步高一丈二尺厚一丈二尺宋宣和間知州宋昭年更築徳祐元年守臣余安裕重修諮議劉漢傑董其役增築堡障元至元十三年羅城平子城見存羅城元有門東門舊曰青龍後改春波西門舊曰永安後改通越南門舊曰廣濟後改