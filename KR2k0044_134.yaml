body:
  text: 浙江通志卷一百三十五選舉十三明舉人永樂十八年庚子科陳聳永嘉人辛未會魁蘇起烏程人何永芳常山人辛丑進士方中杲慈溪人徐紳餘杭人于謙錢塘人辛丑進士陳詔青田人庚戌會元沙安蕭山人順天府治中劉燦慈溪人嚴敬歸安人辛丑進士王豫溫州人葉遄青田人庚戌進士達永定麗水人鎮江教授陳絅會稽人甲辰進士滕瑾臨安人潘禎湖州人林惟名麗水人教諭徐信餘杭人桃源主簿章聰金華人甲辰進士沈謙仁和人龔璉嵊人甲辰進士楊安歸安人教諭汪宗顯嵊人徐逵開化人辛丑進士留志得衢州人吾肇開化人丁未進士王皎青田人吳瑳平陽人霍禮歸安人知縣朱冕嘉興人教授虞鎬餘姚人定逺知縣高翥新城人長泰知縣邵宏譽餘姚人甲辰進士詹珫江山人胡居安天台人教諭俞叔度遂安人章惟澄永嘉人儀真知縣吳京寧海人包敦台州人同安教諭陳誼仁和人吳仕田黃巖人學正陳奎平陽人甲辰進士俞宗烏程人寧國知縣高文通餘姚人保定教諭王玘錢塘人韶州知府劉定永嘉人教諭周同倫松陽人儒士金恕武義人羅源訓導費敬崇德人甲辰進士丁讓仁和人甲辰進士楊迪歸安人知縣蔡侹平陽人王宗厚臨海人刑部員外郎朱良暹永嘉人庚戌進士沈貴崇德人知州童以思黃巖人教諭穆敬杭州人徐海蕭山人四川僉事林瑛仁和人甲辰進士唐崇青田人吉安府經歷王宗𢎞松陽人彰德教授葉恩臨海人甲辰會元劉世澄青田人四會訓導孫泓餘姚人甲辰進士張綱錢塘人李寬夫杭州軍吳仲賢慶元人零陵巡檢王宗惠永嘉人工部郎中沈廣分水人長沙通判胡歡諸暨人甲辰會魁吕琥縉雲人倪深青田人恩縣訓導潘燦慈溪人學録戚貴仁和人葉純生青田人聊城訓導成規諸暨人陳永平陽人江述奉化人刑部主事陳英仁和人尤源鄞人主事王憲鄞儒士同知薛永康人尤溪訓導何瑄餘姚人癸丑進士章杲青田人監察御史陳政山隂人留衢青田人全椒知縣徐熙春開化儒士蔡昌青田人包持青田人德州訓導趙樞慶元人金輝生黃巖人訓導沈章崇德人郎中孫雷慈溪人主事范霖樂清人丁未進士丁鄞人徐永溍蘭溪人吏科給事中葛敬同慈溪人教諭何廣建德人御史謝文誨奉化人廣宗訓導俞彬建德人訓導華孟孝餘姚人國子監學正徐忞常山人鄭禧仁和人葉郊慈溪人學録周旋青田人杞縣知縣曹南山隂人辛丑進士錢勝歸安人龔永吉義烏人大理寺卿陳愚縉雲人鄭良青田人濟南訓導張淵蘭溪人開封府通判毛誠遂安人清平知縣余文衢州人徐熊餘姚人葉怡衢州人陳孝軻新昌人江廉開化人王信湖州人主事戴文同衢州人童勉蘭溪人績溪知縣汪吉永康人和州學正張箕金華人湯隂知縣徐郁蘭溪人青州知府陳祖常山人卓逺嘉興人縣丞錢如塤慈溪人教諭鄭永義鄞人知府汪恕西安人徐善烏程人通判薑通歸安人縣丞竺晏奉化人黟縣教諭陳啓永嘉人學正趙詵永嘉人泗州訓導方端玉仙居人鄭道順永嘉人犍為知縣方矩仁和人徐朝宗分水人丁未進士厲師曾青田人魏晟慈溪人陸儔上虞人知府林文錢塘人戴浩鄞人知府趙普定寧海人教諭葉昌寧波人劉梁慈溪人陳廣蕭山人興化通判章廷嵩遂安人惠安教諭沈搢錢塘人李浩餘姚人館陶知縣沈鑑長興人邊寧青田人訓導盧廷俊淳安人張道興開化人倪政湖州人州判章贊遂安人鍾興上虞人訓導孫塤建德人教諭韓俊上虞人永平知縣葛名紹興人陳序烏程人章邱訓導詹思銘縉雲人經歷潘田永康儒士李永本溫州人縣令王仲賓嵊人經歷王永中遂昌人徐善同衢州人陳齊衢州人馬敬杭州人林約仲平陽人福寧教諭蔣珉杭州人顧綱杭州人陳炅處州人諸用中新城人楊頔鄞人趙宗榮縉雲人齊普天台人教諭甄完新昌人錢泂金華人刑部主事唐津嵊人袁州教授顧蒙慈溪人杜得臻青田人蔣廷瑞安人葉定金華人訓導毛寧山隂人何杰建德人皇甫琮杭州人沈英歸安人沈圭烏程人辛丑進士徐資龍遊人御史徐英嘉興人張得潛慈溪人訓導俞奎烏程人通判張默龍遊人徐邦貴天台人貝顯常定海人通判潘暄餘姚人延長知縣沈澄嘉興人知縣趙以端仙居人本縣教諭楊信民新昌人金福義烏人南陽教授吳圭嘉興人天長教諭史佐蕭山人漳州訓導朱希亮餘姚人國子監助教陳仍烏程人徐士東溫州人刑部主事沈源餘杭人以下十二人應天中式陳順祖慈溪人諸均輔餘姚人興化教諭魏佩上虞人童孟韜臨海人辛丑進士童巖黃巖人陳景華金華人李永永康人光祿署丞程達武義人程觀淳安人張訓平陽人興國教諭俞英麗水人黃玉鄞人以下三人北京行部中式劉辰餘姚人洪璵淳安人辛丑進士吕本嘉興人山西中式劉琛慈溪人以下五人外省中式李貰章餘姚人經魁甲辰進士張裳東陽人柴起敬西安人吳文慶遂昌人辛丑進士永樂二十一年癸卯科楊述嘉興人長史胡奧永嘉人庚戌進士陳員韜臨海人庚戌進士鄭厚仁和儒士甲辰進士潘洪金華人廣西僉事葉錫永嘉人庚戌進士陳信杭州人蘇州通判汪世英麗水人吳迪杭州人趙鼎黃巖人丁未會元袁亨新城人長樂主簿俞山嘉興人吏部侍郎太子少傅朱尹辰臨海人教授徐員金華人利津訓導宋騏餘姚人平陽教授王如曾樂清人潘靜松陽儒士蔣辰灝鄞人主事吳昌桐廬人儀真經歷尤偉瑞安人駱黼諸暨人許南傑餘姚人庚戌進士嚴恭仁和人甲辰進士侯潤臨海人癸丑進士董仕顯青田人學正陳從道樂清人知縣童祖建德人工部郎中俞春遂安人江浦訓導羅育桐廬人星子教諭胡忠遂安人南皮訓導梁輯鄞人御史沈和杭州人吳榮餘杭人南雄同知周彥宇麗水人黃州通判朱永興金華人翁佐諸暨人酆