body:
  text: 浙江通志卷二百十八祠祀二杭州府下海寧縣先農壇在春熙門外東郭十八都一啚國朝雍正五年知縣胡杲奉文建立壇宇并置藉田四畝九分社稷壇萬厯杭州府志在縣城北白馬廟後杭州府志宋政和間令歐陽珣即舊址新之歐陽珣社稷壇記古者建國設都先立社稷其意以謂民非榖不養榖非土不生立五土五稷之神而祀之示不忘本也鹽官雖窮隘僻左而舊壇具存即其舊而新之社壇居其左稷壇居其右就社稷之左右别為兩壇祀雷雨風師而又設燎壇於其東建齋廳於其北直北為一門自門之左右皆立垣墉以為衛率按圖而為之稽諸禮若合符契於戲韙哉元明屢更正德三年知縣丁儀改建今處增置宰牲齋宿等舍風雲雷雨山川壇萬厯杭州府志舊在縣南二百五十步成化年重建去城八十步邑厲壇成化杭州府志在縣治北二百六十步城隍廟杭州府志在縣北二百六十步宋圖經考異神邑人稱為永固王謹按咸淳臨安志本府城隍神舊號永固廟據此則通言一府矣蓋神聰明正直聖不可知非可求其人以實之也間有實其人者悉援據志乘不敢以臆為斷潮神廟在小尖山之麓國朝康熙六十一年敕封運德海潮之神遣官致祭敕建海神廟在海寧縣春熙門內國朝雍正七年九月欽奉上諭敕建恭紀首卷浙江總督臣李衛欽遵擇海寧縣治之春熙門內購買民地四十畝起建居中正殿五楹崇奉運德海潮之神左右配殿各三楹以厯代潮神水神從祀祀越上大夫文種漢忠烈公霍光晉橫山公周凱唐潮王石瑰升平將軍胡暹宋周宣靈王雄平浪侯捲簾使曹大將軍春護國𢎞佑公朱彝廣陵侯陸圭靜安公張夏轉運使判官黃恕元平浪侯晏戌存護國佑民永固土地彭文驥烏守忠明寧江伯湯紹恩茶槽土地陳旭周回夾以修廊中為甬道前為儀門三楹大門三楹左鐘樓右鼓樓門臨大河承以石梁曰慶成橋橋南歌舞樓三楹繚以粉垣闢左右為廣衢表以二石坊殿後為重門進內正中恭建御碑亭敬勒聖製海神廟碑文恭紀首卷後為寢殿上構岑樓東西配殿由正殿之東啓門而入為天后宫前為齋宿廳後為道院正殿之西為風神殿後有池有亭池上為平橋三折而度內為高軒為重門後為水仙閣規制崇閎氣象肅穆經始於雍正八年三月以明年十有一月訖工十一年正月欽頒御書福寧昭泰四字一幅製額奉懸廟中二月欽奉上諭遣官告祭御祭文維雍正十一年嵗次癸丑二月朔越日皇帝遣內大臣海望直𨽻總督李衛等致祭於寧民顯祐浙海之神曰明神受職於天恩覃澤國禦災捍患利賴𢎞深凡兹東南黎庶所得保室家而安耕鑿者神之賜也朕躬膺天命撫御寰區夙夜敬共以承上下神祗之祀所期海宇蒼生永蒙庇祐惟兹浙西郡邑實為瀕海要衝比年以來仰荷神靈嘉貺頻昭安瀾共慶乃者風潮鼓蕩衝潰隄防近逼民居吏人震恐朕痌瘝在念軫惻維殷專遣重臣周行相度涓日鳩工為海疆圖久遠奠安之計用是潔誠致禱虔命在工大臣敬展祀事昭告悃忱惟明神俯念海壖億萬生靈城郭田廬於兹托命隄工木石皆出脂膏力役所需民衆勞苦伏冀𢎞昭福佑默相大工綏靖百靈風恬波息俾工作得施長隄孔固克底厥績衛護蒸民保聚生全安享樂利則東南列郡溥被庥祥朕實拜明神之功德於無疆矣謹告三皇廟成化杭州府志舊在縣東南二里元至正十九年築城改建於縣治之西北黃潛三皇廟記延祐五年知鹽官州張侯克明以部使者北皋張公之命肇建三皇廟於州之東南泰定元年方侯存心繼知是州增創東西廡及儀門後改號州曰海寧而李侯擎以至元三年來知州事又為造禮器遷櫺星門前臨通衢右廟而左學齋廬庖舍次第畢完今知州張侯蒞事之明年至正二年也集僚佐輟俸資置田五十三畝有奇嵗入以紹祀事有餘以待營葺之須來徵文以記之按宋元嘉中醫始有學唐天寶間三皇始有廟言醫及陰陽者乃原其所自推三皇以為先聖天下都邑咸得通祀焉夫三聖人之道既非一藝可以名言而其功亦無一物可為報稱兹不敗復贊一辭姑敘其建置之顛末而著其成規以為之記張侯名光祖字載熙霍山人崇祐廟萬厯杭州府志在金牛山下宋紹興間禱雨有應賜額杭州府志俗云烏龍王廟在縣東八十二里白馬神廟海寧縣志在縣北二里宋髙宗祝文英烈不羣捍難庇民廟號白馬史册莫尋海昌良工塑像如神髣佛而馭先無若存有捕盜者得夢既禽人知畏饗血食幾春天子初郊典祀遍循樽酒爼豆以祈神歆陸司空廟萬厯杭州府志在縣東四十八里祀吳陸遜嘗以屯田都尉領邑事有惠於民故立祠祀焉許公廟海寧縣志在縣西一百三十步鍾必萬雄挺盡節廟記縣西舊有將軍許遠嗣後增祀張巡乃號雙廟宋紹興八年詔增祀南霽雲雷萬春姚誾蓋從邑人禮部侍郎張九成之請也中興初皆賜上公爵爼豆牲牢如上公禮勸民之意遠矣鹽官許公故里舊史圖志可據也獨新史略之或遂以公為敬宗曾孫乃誣公杭之新城人殊失建祠錫爵之本意敬宗善心之子而善心則亨之子懋之孫也按北史善心傳南史懋傳並著鄉里高陽新城以此知舊史載敬宗為杭之新城者誤矣後之人不考併與公誣之烏得無辨萬厯杭州府志洪武四年以海寧為公所産地宜專祀罷諸增祀者改舊封荆州大都督為睢陽太守從生爵也祭以歲十月十六日公死節之辰正德十六年易春秋致祭謹按貢師泰云鍾必萬所辨以善心為高陽北新城人當隋文帝平陳曰我平陳國惟獲善心一人則善心本南人也又謂睢陽非敬宗曾孫不知通鑑實言之嘗考許氏譜言許本高陽六朝時許皈避亂移家鹽官傳十世名善心為隋禮部侍郎因官北地復宗祖族歸髙陽其子則敬宗也俱為北髙陽新城人同葬易水至敬宗子名適者又歸隱鹽官東審山故其子彥伯其孫遠皆為鹽官人矣觀此則鍾所辦猶未析也後睢陽六世孫名慶避黃巢亂由昌化入新城以存宗祀宋乾道二年縣令耿秉建祠於塔山祀遠録慶之孫主祀他志載杭之新城者亦誤也今考隋書地理志高陽𨽻河間並無新城縣又舊唐書許敬宗傳云敬宗杭州新城人則非北新城明矣當是遹遷居鹽官至慶復還新城耳雙仁祠嘉靖浙江通志在城西北安化坊沈友儒雙仁祠記昔錢武肅王立廟祀唐平原太守顔真卿而以其從兄常山太守杲卿為之配扁曰雙仁蓋取殺身成仁之義正德九年建祠安化坊逮嘉靖己酉重修文天祥有感詩平原太守顔真卿長安天子不知名一朝漁陽動鼙鼓大河以北無堅城君家兄弟奮戈起一十七郡連城盟賊聞失色分軍還不敢長驅入咸京明皇父子得西狩由是靈武起義兵唐家再造李郭力逆賊牽制公威靈哀哉常山賊鈎舌公歸朝廷氣不折崎嶇坎坷不得去出入四朝老忠節當年幸脫安祿山白首竟陷李希烈希烈安能遽殺公宰相盧杞蔽日月亂臣賊子歸何所茫茫煙草中原土公祀於今六百年精忠赫赫雷行天胡令公廟杭州府志在長安鎮祀唐胡暹徐圓胡令公廟碑令公字進思婺州東陽義烏人唐憲宗朝佐中丞裴度平淮西以功升武任將軍宣宗時奉命至海昌召禪門齊安國師師演法謝恩就坐而化將軍回至長河過海神祠亦立化於庭有司申聞宣宗遣桑稱以御帶追封齊安為悟空禪師進思為升平將軍與海神共祀至宋康王南渡乘駿過長河無船可渡入廟叩之出門忽有大舟迎王王問其名居曰桑稱二姓木里胡進思家人也建炎元年王遣官召進思併桑稱二人里中並無因廟中有胡將軍碑載將軍往海昌召齊安國師事迹州官申復降詔敕封令公海神與桑稱皆進王號同祀土榖廟號威烈赫靈之殿泰定問復有方太守入廟禱祀蝗不入境之異其父方虗谷任婺州路侯備知令公事迹婺州見有永康縣胡公祖廟太守命里人重立碑石云福濟廟萬厯杭州府志在金牛山下祀唐蘇臯二將軍相傳二將逐黃巢至此不獲死之因立廟名勝志金牛山稍北為廟山深窅回曲其巔則蘇臯二將軍廟在焉宋髙宗祝文義氣同稟剛毅莫儔何焉來此緣逐金牛牛沒尾掉空回可羞拔劍自刎曾無怨尤人亡廟存英氣橫秋安化王祠海寧縣志在三管墩去邑治五十里祀宋王稟杭州府志天啓中知縣鮑觀光移建縣東偏隙地嵗時致祭許三禮安化王祠碑記邑中舊有安化王祠王於靖康元年以都統與子荀守太原兵單力竭太守張孝純議降王叱之列兵守死城陷王父子相隨入原廟負太宗御容同赴汾水以殉國難髙宗駐蹕臨安念王父子殉節追封為安化郡王諡忠壯子荀贈右武大夫思州刺史張文忠公祠萬厯杭州府志在城南書院中祀宋禮部侍郎贈太師諡文忠張九成于有成張文忠公祠記無垢先生張公九成以紹興二年廷魁天下官至禮部侍郎髙宗欲大用之適與時宰議論不合謫居南安十有四年放還守永嘉未幾奉祠歸里終於鹽官紹定二年縣宰趙汝艁來首率諸僚建祠於淨居寺之堂上朱將軍廟成化杭州府志在縣東三十六里黃岡杭州府志神為邑人朱彞能拔牛尾倒行宋治平初溺海為神著靈應寶祐三年敕封佑靈將軍元大德二年封贈文鹽官州海神闡靈浙右安宅海隅江漢朝宗無遠勿屆雨㿩時若有感必通比聞髙岸之傾摧能免下民之墊溺導水波而潛伏益固隄防足財計以阜通仍輸斥鹵嘗閲省臣之奏具知神力之雄肇錫嘉名丕昭令問聿嚴廟貌特俾恩封可賜號靈感𢎞祐公錢公廟海寧縣志在洛塘前步橋北祀里人錢通元泰定間通有德於鄉死而祀之水旱災疾禱之輒應邑人談遷撰記相傳廟南河洲即公葬處貢尚書祠海寧縣志在安國寺東祀元尚書貢師泰朱嘉徴貢尚書祠記元至正間先生以祕書召嗣擢大司農被命治粟閩粵時道梗留居余家小桃源內九世祖質夫公鐩執經焉明興先生恥事二姓有終焉之志宋文憲濂銜命往強起之先生無言一夕仰藥而卒萬厯七年公諸孫貢禮卜地安化坊於安國寺東建祠肖像題額貢尚書祠致忠祠萬厯杭州府志在城內祀副千户呂忠傳詳忠臣周將軍廟杭州府志在黃山祀明都指揮周應禎嘉靖三十三年倭寇掠袁花市應禎戰殁邑人建祠致祭忠義節孝祠忠義祠三間碑一座在學宫櫺星門內西甬道側節孝祠三間牌坊一座在學宫外泮池西國朝雍正三年知縣鍾維楷奉文建富陽縣先農壇在城外一里東郊地名花塢口國朝雍正六年知縣崔宣奉文建立壇宇并置藉田四畝九分社稷壇富陽縣志在縣西二百步風雲雷雨山川壇成化杭州府志在縣東一里觀山之上杭州府志明宣德十年知縣吳堂重葺後移小龜山上邑厲壇萬厯杭州府志在縣北二百步城隍廟富陽縣志在縣東二百步洪武丙午行省平章政事朱文忠重建正統四年知縣吳堂重修仁惠龍王廟富陽縣志在寶山院齊永明中有僧曇超居杭之靈苑山有龍化為老人詣超曰吾龍也昆弟五人吾居其長邇鄉民耕山逼吾居室羣龍並怒閉膏澤以害稼吾不忍民困苦聞師道行請至富春鹿山以化伏諸弟超允其請未即往龍乃感夢於官民迎超至觀山結壇戒衆浮舟誦經雨大霑足前龍復請超居湖南山巖山峻不能陟龍化為白馬載師以登至今石上馬迹猶存焉巖下有池名龍潭水中産一種四足五爪狀若蝘蜓土人號為龍子嵗旱禱之則雨嘉定三年賜額仁惠赤松子廟咸淳臨安志在縣東一十里輿地志赤松子神農時雨師也嚴先生祠咸淳臨安志在觀山淳祐乙巳令李迪建有堂曰耕春名勝志孫氏建道觀於石頭山頂故名觀山有嚴君祠及耕春逸雲虗全三亭聶大年嚴先生祠記先生辭諫廬議之職去耕釣富春山中富春今屬杭邑而桐舊