body:
  text: 浙江通志卷一百六十八人物三循吏二湖州府南北朝沈憲丘仲起南齊書沈憲傳憲字彥璋武康人應辟為主簿厯餘杭令除駕部郎補烏程令武陵王為會稽以憲為左軍司馬太祖以山隂户衆難治欲分為兩縣世祖啓曰縣豈不可治但用不得其人耳乃以憲帶山陰令政績大著遷冠軍長史廣陵太守以疾去官卒當世稱為良吏憲同郡邱仲起先是為晉平郡清廉自立褚淵嘆曰見可欲心能不亂此楊公所以遺子孫也仲起字子震宋元徽中為太子領軍長史官至廷尉丘仲孚梁書本傳字公信烏程人選國子生補主簿厯揚州從事太學博士于湖令有能名遷山隂令長於撥煩善適權變吏民敬服號稱神明治為天下第一徵為尚書右丞遷左丞仍擢為衛尉卿恩任甚厚俄遷豫章內史在郡更勵清節卒贈給事黃門侍郎沈瑀梁書本傳字伯瑜武康人起家州從事奉朝請竟陵王子良引為府參軍領揚州部轉從事甚相知賞子良薨復事刺史始安王遙光嘗被使上民丁速而無怨乃令專知州獄事湖熟縣方山埭髙峻冬月公私仁侶以為艱難瑀乃開四洪斷行客就作三日立辦明帝復使瑀築赤山塘費減材官所量數十萬永泰元年為建德令教民種桑柿梨栗頃之成林髙祖即位陳伯之表瑀催督運轉軍國獲濟遷駕部郎母憂去起為餘姚令縣大姓虞氏千餘家請謁如市前後令長莫能絶自瑀到有至者悉立之階下以法繩之自是權右屏迹徵為少府卿出為潯陽太守為盜所殺宋陳舜俞宋史本傳字令舉吳興烏程人舉進士又舉制科第一熙寧三年以屯田員外郎知山隂縣詔俟代還賜館職舜俞辭曰爵祿名器砥礪多士宜示以至神烏可要期如付劑契繳中書帖上之青苗法行舜俞不奉令上疏自劾曰官制放錢取息雖分為夏秋二科而秋放之月與夏斂之期等夏放之月與秋斂之期等不過展轉計息以給為納使民終身以及世世每嵗兩輸息錢無有窮已是别為一賦以敝海內非王道之舉也奏上謫監南康軍鹽酒稅五年而卒舜俞始嘗棄官歸居秀之白牛村自號白牛居士已而復出遂貶死蘇軾稱學術才能兼古人之器盧革宋史本傳字仲辛德清人慶厯中知龔州蠻入冦桂管騷動革經畫軍須先事而集移書安撫使杜杞請治諸郡城及易長吏之不才者又言嶺外小郡合四五不當中州一大縣無城池甲兵之備將為賊困宜度逺近併省之後儂智髙來九郡相繼不守皆如革慮知婺泉二州復為宣州以光祿卿致仕朱服宋史本傳字行中烏程人熙寧進士甲科元豐中擢監察御史裏行參知政事章惇遣袁默周之道見服道薦引意以市恩服舉劾之惇補郡免默之道官紹聖初拜禮部侍郎後知廬州廬人飢服便宜賑護全活十餘萬口明年大疫課醫持善藥分拯之坐與蘇軾遊貶海州團練副使蘄州安置改興國軍卒陶旐汪藻陶旐阡表字季成吳興人元符三年進士調陜州司理參軍童貫用兵請旐從固辭貫亦不能強也知鄭之管城婺之東陽杭之富陽低徊數邑幾二十年在東陽時俗喜鬭家藏鎧仗更數令不能禁旐痛懲之風俗為變朱南強嘉靖安吉州志字柔立主晉陵簿有倚當塗勢奪民田者南強按歸之移宰上虞地瀕海民業煮鹽多致訟乃為析利害上提舉請置場交易民甚便之沈琯嘉靖湖州府志字次律德清人宣和間任兩浙漕運王師收方臘琯規畫應辦民以不擾後奉使至燕雲金人入冦郭藥師敗降琯為藥師所執遣同李鄴赴闕議和琯首陳虛實乞召兵會河北邀擊不聽乃著南歸録以攄忠憤自號柯田山人終老焉莫漳𢎞治湖州府志歸安人登進士第淳熙初知仁和縣時有出入德壽宫者恃勢虐民漳於宫門外候其出擒而撻之髙后怒孝宗降漳一秩居數月平江缺守宰執進擬孝宗曰朕有其人遂除漳院轄以承議郎知平江沈介西江志湖州人乾道四年守信州與趙師嚴為代師嚴在任時州兵嘗欲援往例有所求不獲遂謀亂雖散府庫以撫之猶反側未安介至誅首領二人餘皆安堵嵗飢賑貸有方民得不死去官之日老稚扶擕隨行數十里涕泣不忍舍章謙亨西江志湖州人紹定間知鉛山為政寬平人號生佛家置像而祀其興學養士禦盜安民禮賢表俗蠲賦救荒事績邑人勒之章巖以志不忘施宿兩浙名賢録字武子長興人慶元初知餘姚縣為政務大體興廢舉墜不事細謹姚北瀕海嵗役民修堤民甚苦之宿更築石堤建莊田二千畝以備修堤之役功與前令謝景初同稱李元吉福建通志湖州人淳祐間知福清縣始視事訟日三百餘牒未期月幾無訟云元程郇黃溍程郇墓志字晉輔曾祖公許自蜀居湖州郇於書無不讀用薦署嘉興路儒學録厯江山縣尹再遷武岡路綏能縣尹縣鄰溪洞民夷雜處竊發不時郇拊循愷悌境內以安會廣冦猖獗長二而下以供億軍需出境郇獨任縣事師旅經從枝梧遣發戒令嚴明士卒帖帖不敢肆行縣有義倉糧二萬餘石積為豪強所侵悉徵理之嵗適大侵賴全活者甚衆轉慈溪縣令慈溪密邇帥閫事尤叢劇郇設施注措若不經意咸盡其宜縣東花嶼蓀湖受諸水溉田可六十頃豪民或請堙湖為田而輸糧於官吏以成案請署郇毅然不可事遂寢湖旁農家均獲其利年七十以奉訓大夫婺源州知州致仕倪淵黃溍倪淵墓志字仲深烏程人精敏絶人用薦署本郡儒學録授太平路當塗縣主簿時長官皆以故免去淵獨理縣事延祐初經理田土考核多失其實賦斂不均公私咸以為患淵分畫編次以為圖籍出其隱匿而去其增加二稅乃如期而集嵗適大侵民以狀言災傷郡戒縣勿受淵爭之不得即解印求去郡遣吏謝且以檢視之事悉諉之淵躬履阡陌不避其勤民賴以蘇以年老致仕唐棣兩浙名賢録字子華先世錢塘徙吳興以薦除休寧縣尹先是豪民好為兼並貧民至空産賦往往逋亡棣釐其弊具為科條擇任廉吏宿弊一清流逋歸復山民老人擁馬抃謝其為政惟用儒法剛柔適調歸於太和居五年政平化行獄訟止息課為江東最以老去官民涕泣塑像祀之明王瑄嘉靖湖州府志字廷璧長興人永樂甲申進士任兵部主事升刑部郎中會囚越獄有數十重囚不去訊之則曰王郎中必不枉我故諸司官咸坐罪而瑄獨免又理刑直隸值嵗侵賑恤流亡修復崑山常熟水利民甚德之纍官按察使乞歸方琛𢎞治湖州府志字廷獻歸安人永樂乙酉舉人知崇仁縣邑無恆産惟以折色貿易準辦稅賦率多逋負琛奏請從民便賦之邑民賴焉嵗旱禱於華山即得雨後升山東布政司經厯卒之日家無餘資陸嵩嘉靖湖州府志字如嵩歸安人𢎞治丙辰進士授羅源知縣以才賢改知南平政績大著嵗大旱與郡守孫衍詣龍潭齋宿祈雨未幾雨大澍冒行數里遂感寒疾卒民為立哀慕祠於城中王濟湖州府志字汝舟烏程人成化辛丑進士授南兵部主事所轄馬快船二千餘艘中官怙勢侵沒無算濟力為裁省大司馬王恕深器重之以忤銓司出知雲南臨安府地多奇貨又夷民雜居多盜濟遏其亂源盜用以息升貴州副使引疾致仕張罍江西通志字元器歸安人成化進士知上髙縣興學校均賦役節浮費弭盜賊時新昌降賊談尚武者假巡捕之名擾害鄉民罍密疏除之地方以寧纍升福建副使韋商臣獻徵録字希尹長興人嘉靖癸未進士授大理右評事會言事諸臣多繫詔獄下大理讞奏商臣上疏抗言忤旨謫靖江丞量移德安府推官應山有巨姓被誣大辟者憲使張鯤閔其枉而寬之巡撫與張有夙憾駁令覆訊商臣據法論報又有龔友昌者亦被誣久繫商臣一訊得其情竟從末減郡稱為神明升河南按察僉事永寧巨冦董氏嘯聚為亂率兵討平之其他搜剔吏弊搏擊豪強平反寃獄撫處流民諸政皆鑿鑿可紀撫按交章論薦而臨潁有杜黃門者仇殺三人杜之兄時為通政參議數致書弗聽立捕治之復有豪民播敖窟羣盜驗實論死詞連鄉宦黃彬以故諸權貴銜之騰蜚語於朝竟以考察論罷陸時雍西江志字幼淳歸安人嘉靖進士授上髙縣精勤吏事嘗建便民倉又纂水利志以便一方農事纍遷江西提學副使臧繼芳長興縣志號堯山嘉靖癸丑進士厯官水部郎中督理髙郵河道值景王之國欲毀濱河民居伐堤栁以便舟行繼芳曰政在利民病民以便上非義也國之大計在漕植栁以護漕堤伐之非策也乃屬徒役為木道挽舟而前擢守松江嵗大水奏蠲其賦煮粥給粟躬賑貸之厯晉河南按察副使胡友信獻徵録字成之德清人隆慶戊辰進士授順德知縣縣嵗賦率姦胥攬輸稍以所入啖長吏謂之月錢友信與民約嵗為三限多寡皆自輸不取贏於是閭里無妄費而公賦以充海冦竊發部內烏洲大洲賊所巢穴友信悉勾得之以徑卒搗其巢誅渠魁餘黨解散又鄉立四應社一鄉有警三鄉鼓而援之不援者罪同賊賊不敢發初友信慮民輕法涖以嚴既令行禁止更為寬大或旬日不笞一人其治縣如家弊修墜舉學校城池咸為更新督課邑子弟教化興起卒官士民立祠祀之德清縣志友信讀書天一山中搜覽古集研究理宗為文必嘔心洞膽成進士銜命封魯藩謝饋遺弗受除順德令自言曰誓不帶牙簪出梅嶺題其署曰順動而天地如斷行而鬼神避邑無城建議興築公私不擾濬隍得石碣有胡成城三字涖任三載有甘露岐麥之瑞卒於官含殮不具所著有天一山房稿世傳誦之韓紹湖州府志字光祖烏程人隆慶辛未進士令寧德豁百年陷海之虛糧令長樂縛十年不獲之大盜拜給事中以忤江陵外轉敡厯藩臬備兵府江地多箐棘猺獞竊伏煙瘴鬱蒸路絶行旅紹移檄募商伐山開徑五十餘里遂成孔道遷太僕寺卿致仕沈如霖廣東通志歸安人萬厯間為普寧令縣設幾四十年草萊猶未盡闢霖至清賦役保善良日進諸生而教之稅使擾民調劑得宜民受其惠沈子來歸安縣志字汝修萬厯庚辰進士令句容值丈量有司競以加額增賦為考最子來獨辨其髙下增減之調廣平捕土豪致之死合邑稱快升刑部主事厯員外郎中出知梧州府改寶慶時征播之軍所過剽掠子來預以糗糧陳境上牒總戎令約束將士民乃晏然升湖廣副使調貴州都勻苗帥展打倡亂諸郡驛騷子來廉知土同知蒙詔雄勇可用推誠待之授以方略三出破賊巢前後斬首四百級擒展打誅之積寇得平卒於官不能治喪吏民斂錢為行裝子文衡却之臧懋中長興縣志字用甫萬厯戊戌進士授鹽城令會有旨浚洳河鹽邑千里奔命懋中謂罷民非策簡閭右有幹力者十許人攜帑金詣徐募土著又先散金易糈輦而至工所役者得食麕至終役無逃者時兩淮夫役繁興鹽居其間不知有徵調之苦厯廣西按察副使署八桂兵事以屯堡代驛遞軍不濫役而民力以蘇比入覲卒於京二子炅如照如皆成進士王永寧江西通志烏程人萬厯進士授臨川令行履畝法墾田定賦吏不得夤緣為姦修城興學皆有實政賈宗悌河南通志武康人萬厯中知永寧縣明習吏事開興福渠以溉民田至今賴之唐世涵福建通志烏程人崇禎八年守汀州以城垣卑薄設法增築創寶珠門甕城移慈濟閣為戍樓又捐俸造萬安濟川二橋以利涉民立祠祀之沈戩穀德清縣志號器車崇禎丁丑進士知棗強縣時嵗祲斗穀溢千錢戩穀捐俸設糜所全活以萬計善察寃獄多所平反後升守廬州以病歸國朝談九乾德清縣志字震方康熙丙辰進士授沙河知縣縣居南北衝要且地為沙壓土甚瘠九乾洞悉民艱凡陋規加派詳革殆盡褫學霸殛淫僧安巨室植栁以憩人行浚井以便人汲升禮部主事改吏部升員外郎掌銓政隨征厄魯特議敘復監理河工著有勞績戴振河德清縣志字衣聞康熙戊辰進士授永寧知縣入署見里民供辦甚具驚問得實悉却之常平倉積穀二萬貴糶賤糴官餘民病振河春貸秋償不責其耗羡闢險嶺為蕩平路行者便之丁艱服闋補松滋邑有堤工嵗賦民折土銀五千餘兩嵗修嵗圯振河廉得其實直賦民土而督修之匝月工竣永無嵗修之擾民名其堤為戴公堤額徵正課外舊有雜派四千兩振河以無藝革之行取任部曹出守邵武府興利除弊三年不遣一役下鄉卒於官胡開京德清縣志字遵王會恩子授池州府通判攝宿松縣事革漕弊抑豪強有民被殺而不得主名往驗察其妻與旁觀一人狀異得姦殺情置之法攝蕪湖篆值大水報災請賑設厰拯救無算又攝建德除虎患緝盜安民及署府事代償前守兵餉却屬邑餽贐丁艱歸服闋補順德府判職司捕盜以盜源在窩線必嚴保甲而後根株可拔為畫八條上之通行畿輔著為令擢永平知府卒於官寧波府宋周師厚延祐四明志字敦夫鄞人皇祐五年進士仕至荆湖南路轉運判官時役法方行師厚言四方風俗不同役有勞逸輕重不宜以一槩論朝議是之章惇聞溪洞蠻擾辰沅二州議輸常平粟以備邊師厚持不可曰溪獠靜擾無常常平嵗入有程當使邊卒廣屯田為便帝從其議袁轂成化四明郡志字容直鄞人嘉祐六年進士尉建安厯青州録事參軍所治獄無不盡其情後以薦知邵武軍條鹽法利病奏減其課郡人祠之俞偉延祐四明志字仲寬鄞人熙寧六年進士宰南劍之順昌閩人生子多者皆不舉建劍尤甚偉作戒殺子文召父老列坐廡下以俸置醪醴親酌之使歸勸鄉人活者以千計生子多以俞為字部使者聞於朝降詔奬諭進秩再任姚孳寶慶四明志字舜徒慈溪人熙寧九年進士為桃源宰部使者舉其才能優異應元符之詔賜對稱旨除提舉成都府路常平等事謁丞相論蜀中利病乞以義倉之儲收養鰥寡老疾死給衣衾斂瘞貧不能舉子者官給乳媪丞相奏行後由江東轉運副使除直龍圖閣知夔州興學校勸農桑有古循吏風陳攄寶慶四明志字君益鄞人紹聖間宰南劍之將樂敦崇學校奬進士類先是邑民家舉一子富室不過二子餘悉棄之攄諭以天性申以令甲犯者究治自兹民無不舉子者後卒於官邑人祠之汪思溫延祐四明志字汝直鄞人政和二年進士授雄州教授調餘姚令築堤浚湖民信愛之後知臨安時相秦檜嘗以故人屬薦舉思溫曰使可薦誠不待相諭不才相言無益也有旨營政府檜欲以相府儀制稍異執政府思溫益持不可檜怒因罷去豫祠薛朋龜兩浙名賢録字彥益鄞人政和八年進士授仙居縣尉值嵗飢道殣相望剽掠四起朋龜請發粟賑之民多全活而弭盜有法境內悉平改楚州司録適靖康之變楚師勤王者歸道州境郡守薄其犒輒鼓譟為亂朋龜急走軍中諭以禮法隨發府金犒之軍帖服不敢譁任滿擢奉議郎去民遮道留之卧轍不得行監司上其狀擢監行在登聞鼓院兼擢工部郎中守正不阿彈劾權貴後知衡州致仕劉俁寶慶四明志字碩翁象山人紹興三十年進士知華亭縣平易近民而決事若神豪猾斂手並海有秦山鹽鐵蚌港三堰不治被旨督作早夜露處護田六萬畝孝宗深加褒賞倅紹興府帥王希吕使者朱熹雅敬之委理諸暨蕭山荒政知興國軍陛辭乞免蕭山廢田之稅以時省繕華亭海堰禁邏兵胥吏擾沿海民船事皆施行改知嶽州核四邑常賦外免其板帳鑿空如馬草錢之類其目凡八嵗減額一萬一千有竒奏定為令除監廣東倉時南海驛道至真陽達凌江多窮荒復嶺乃改闢大道八百里置六鋪建七菴募人居之遷福建憲副召除吏部郎中卒楊王休延祐四明志字子美象山人乾道二年進士為黃巖尉邑有豪民植姦黨號三神王休捕得之具罪狀黥徙他鄉郡縣稱為鐵面少府後除益利路轉運判官兼提點刑獄大修棧閣鑿鬼愁灘堰蟇頤山分西城漢隂平利三邑馬綱以便民築漢嘉西門石梁蜀民德之王時敘王時會嘉靖寧波府志時敘字伯倫奉化人乾道五年進士厯知遂安縣陸遊為郡日縣上所斷大族爭訟僚屬咸會陸以遂安狀銜袖曰得一好文字為諸公出之且讀且喜曰使諸邑皆如遂安吾輩可以卧治及卒陸誄之曰學道愛人正心誠意悃愊無華儒雅飾吏子之自著古人何愧弟時會字季嘉與兄同年第進士自迪功郎七遷至湖南運管所至有聲嘗知會稽值嵗霖潦郡方督已蠲之賦甚急時會持不可守不聽乃袖告身易服立庭中守為奪氣民賴以紓修社倉之政以備凶歉立保伍之法以察不孝不弟遊惰不逞者徐子寅成化四明郡志字協恭鄞人少以任補官中法科為福建路檢法審覆囚牘駁正死罪七十九人除大理正纍遷淮南運副厯揚州楚州修築髙郵興化寶應縣石闥斗門函管堤岸護民田三千七百餘頃後知台州革秋苗偽鈔去軍士虛籍寧海邑庠久廢買田五百畝繕之蠲民户積逋十餘萬升廣東提刑卒於官羅仲舒成化四明郡志字宗之慈溪人淳熙十四年進士授安慶教授纍遷提點江東刑獄點吏獻議於饒守更鬻鹽法而官專其利舟運不通民數月乏鹽仲舒責吏曰奪民而絶其利者汝罪也笞而流之饒人為之語曰前葛後羅一臺二妙葛謂參知政事邲也召為國子司業紹定初以直顯謨閣致仕史彌忠成化四明郡志字良叔鄞人舉進士為鄂州咸寧尉厯宰廬陵有能名守南安會盜甫平政尚安輯蠲白撰錢以便民守吉州治如南安蠲田租十有八萬尋致仕後以子嵩之為丞相積封至金紫光祿大夫卒贈少師諡文靖林祖洽成化四明郡志字元禮鄞人少以門功補官知鹽官縣滯訟經嵗者皆剖決之光宗以皇太子尹臨安委治疑獄有能名後守饒信吏治益著厯遷司農少卿桂萬榮成化四明郡志字夢協慈溪人慶元二年進士授餘干尉邑多豪右一裁以剛介而御小民以慈愛秩滿調建康司理尋通判平江時守朱在政尚嚴刻因鹽課拘繫甚衆萬榮具書告在不從乃挾行牀與所拘人同寢在愧即委縱遣焉升守南康檢吏姦省浮費征稅以法進直祕閣遷尚書右丞奉祠徐願成化四明郡志字恭先昌國人開禧元年進士除福建提舉適黃勇冦發衆皆退避願為婉言撫諭寇列拜請罪願嘗受業袁燮故其政事文學卓絶於時劉厚南成化四明郡志字子固慈溪人嘉定元年進士授迪功郎調瑞安尉瀕海多盜厚南涖政慈惠盜遂屏息民賴以安楊簡出守溫州舉其勤於奉職纍階進秩皆有能聲程士龍嘉靖寧波府志字應辰慈溪人嘉定四年進士主句容簿時嵗飢督濟有方老弱賴以全活真德秀重其才薦知仙居李宗勉復薦之遷知臨江軍後改知撫州城中有夜半殺人者逮繫至六七囚獄成士龍疑之俾臨川宰密察得其應辟者捕之一訊而服民作平寃歌頌其神明童居易天啓慈溪縣志字行簡嘉定己未進士補登仕郎時朝廷欲使諸路置買浮鹽司除擬已定居易詣執政厯陳利害命遂寢攝天長簿時諸路多屯兵每嵗棗熟制閫下令禁民採取民失其利居易上書乞弛其禁制閫從之旁九縣皆賴免尋調諸暨簿境有惡少攻剽為姦尉莫能致居易以計悉擒之民謡曰童主簿威如虎愛百姓擒跋扈轉宣義郎知邵武之泰寧厯遷太學博士率以身教以言會子事忤上意出倅吉州升知廣東德慶府夷獠雜居民悍難化居易撫以豈弟之政三載民樂耕桑門不夜闔尋上章乞歸王撝兩浙名賢録字謙父鄞人嘉定進士授安吉丞攝令長興捐俸賑水災民賴以不飢再攝新城斥餘財五萬緡代貧民賦遷將作監主簿時史嵩之專政乞補外通判婺州御史劉晉之誣衢州掾慮囚受賕撝審實卒白焉後守徽州始至郡廪無三月之儲及解去粟支一年帛萬匹遷吏部兼崇政殿説書嘗預修四朝史楊珏成化四明郡志字君寶鄞人紹定二年進士授通直郎知饒州德興縣邑居四山之僻民多艱食珏乃節用積錢一百萬置米千斛貯之顯惠倉歉時出之以平市價景定間轉朝奉大夫入對條陳三策一曰任正人而黜姦邪二曰興民利以培治本三曰講武事以圖恢復上悅及郡縣行方田珏曰政以利民不利而行如吾民何遂却不行御史朱貔孫劾之免官歸黃仁儉兩浙名賢録字約之奉化人主淳安簿俗獷悍嵗時競渡多殺傷尉懼而在告仁儉攝事處之帖然轉監台州支鹽倉攝郡幕給軍衣有紕薄者羣卒攘臂以噪座上皆失措仁儉徐呼其長諭以禍福羅拜曰黃佛子言敢不聽遷青田丞時永嘉遣海船籍篙師為兵乞取家屬小人乘勢指怨家妻女為家人仁儉帥司檄使核實得免人咸德之趙汝笈江西通志字景師四明人慶元進士嘉定間知上髙縣時士以謙斷獄以恕諸司疏其治狀為諸邑最先是上髙諸鄉額有坊場許人買換名曰教練每一名四季認白納錢少者不下百千民被其擾汝笈力請朝省罷之元臧夢解元史本傳慶元人宋末進士未官而國亡至元間授知海寧州時淮東按察副使王慶之按行至其州見夢解剛直廉慎官署肅然凡有差役皆當其貧富吏無所預民以戶計者新增七百六十有四田以頃計者新闢四百四十有三桑柘榆栁交蔭境內政平訟簡為諸州縣最乃舉夢解才德兼備宜擢清要而御史臺亦以其廉能薦屬江隂飢江浙行省委夢解賑之夢解不為文具皆躬至其地人給以米所活四萬五千餘人擢廣西肅政廉訪副使故事煙瘴之地行部者多不躬至夢解咸遍厯按問賔州藤州兩路達嚕噶齊與凡貪官姦吏置於法者八十餘人又平反雍州黃震被誣贓罪及藤州唐氏婦被誣殺夫罪大德元年遷江西肅政廉訪副使有臨江路總管李倜素附大臣勢以控持省憲夢解按其贓罪一道澄清後以亞中大夫湖南宣慰副使致仕卒葉恆成化四明郡志字敬常鄞人泰定初擢第授餘姚州判官鋤姦抑強百廢興舉州東北際海歲被風濤害稼嘗以竹石作土堤以捍率不能久恆乃設方略甃以石長亘二十里民不知勞隄南舊有二湖廢為廣斥者幾四十年因堤成而湖復瀦水時其啓閉田獲灌溉海潮之患遂絶後遷淮安路鹽城尹民多不律恆輒法其尤橫者臺察交薦將大用而卒民立祠祀之范文中成化四明郡志字煥章定海人大德十一年民飢盜起文中手縛巨魁十數人歸於有司餘黨竄伏中書奏授慈溪鳴鶴巡檢升歙縣主簿尋調廬陵習俗譁健素號難治民蕭甲與子殺人以誣怨家劉乙文中核實遂置甲於法而籍其家豪右讋服擢知沙縣造義倉以備凶荒崇儒學以興禮讓年七十投牒歸明汪繒世成化四明郡志字漢文鄞人宋尚書大猷五世孫洪武初授太平府同知推誠馭下吏民不忍欺事恆先期而集秩滿升湖廣按察副使振肅憲紀姦欺多所擲發然以寬濟明未嘗吹求人罪論者謂憲職在正已以率物繒世有焉陳奐成化四明郡志字聚奎慈溪人洪武中用薦召至闕廷試稱旨授扶溝令修舉廢墜除革姦蠧尋調山西之屯留土壤磽瘠民多流竄奐為出公帑錢輸其逋租流民相率來歸以憂去服闋改都督府都事成祖念京縣政煩特授上元令涖政期月縣以大治厯遷刑部主事仁宗監國時即知奐賢即位奐奏事仁宗曰此非上元陳知縣乎左右曰然即擢為滕府長史進階奉議大夫周𢎞兩浙名賢録字尚德慈溪人洪武中以薦授柘城令在縣九載寬厚廉謹愛民如子戢暴橫節用度一邑大治張海天啓慈溪縣志字子深洪武中以貢至京師召對稱旨擢戶部主事厯升山東右參政時太宗初御北京吕梁至臨清實朝貢要途水道厄塞舟行不利乃命平江伯陳懋與海並事穿渠甃閘事竣復慮暴水衝齧新岸善崩請給馬連草子五百斛種之沿涯以固土力堤岸遂固應履平嘉靖寧波府志字錫祥奉化人洪武庚辰進士授泉州德化令興廢舉墜平易宜民遷守常德吏治益著升貴州按察使奉敕同兵部尚書王驥平蠻將軍蔣福帥師征麓川有功升雲南左布政時有太監奉命監造剔漆器皿進用供費百出民不能堪履平諗其將訖工别造私物密疏欽造數完奉旨起送部檄至履平懷之中道馳入太監怒叱之對曰奉旨請回京出文以示太監去一方以寧吳福兩浙名賢録字好德鄞人洪武庚辰進士授禮科給事中厯升陜西參政先是寧夏鹽池禁嚴斗米易鹽三兩福奏許民納課官量給鹽民咸便漢中牛山逋民草竊出沒福遣吏作樵夫懷榜抵其巢穴諭以禍福其黨語曰吳公長者必不欺我相率復業者數千人秩滿升福建右布政治行益著以年老乞歸張得中兩浙名賢録字大本鄞人永樂甲申進士授刑部主事改江寧令機務繁劇前令率繩之以法得中更以公恕簿書期會米鹽細故必躬親之每丁夜而起丙夜而息未嘗樹赫赫之聲而民安其政以疾卒蔡胄兩浙名賢録字用嚴鄞人永樂乙酉舉人以薦授宜春令改餘干愛民如子有干憲度者必諭使自新未嘗輕有笞詈清修苦節薦餽雖蔬蔔不納室中琴一張書數帙而已不諧於郡守吏部尚書郭璡巡撫江西郡言胄徴科無法考下當去縣民相率走百里外聲胄寃言數十年未有公廉愛民如蔡者奈何斥之泣訴車下郭嘆曰吾行縣多矣未有一民頌其令者郡言詐也更考胄最而以貪黜其郡守王罃嘉靖寧波府志字宗器鄞人永樂戊子舉人授淮安府睢寧教諭擢禮科給事中改刑科宣德初敕守肇慶下車蠲宿弊務更新未幾化行境內帖然秩滿增秩正三品改知西安治如肇慶而稍濟以嚴越三年致仕陳本深嘉靖寧波府志字有源鄞人永樂戊子舉人擢刑部主事畿內有韓廣者為盜殺人逃匿有司捕之波及無辜十八人本深物色得之十八人者俱得免進員外郎宣德庚戌出知吉安府作興士類飭治學宫築堤成梁百廢具興而尤以除盜去姦為急樂安曾子良聚衆萬餘據險為寇本深以地逼永豐督千戶王業率兵往禦大破之擒其渠魁以獻安福有豪民彭摶肆暴於鄉有司莫能治乃密聞於朝而籍其家九載秩滿吏民相率奏留上允其請加正三品祿進階正議大夫正統戊辰以老乞歸初本深涖郡政舉大綱不屑纎小比巨豪既殱屬邑順理益闊疏法網與民相安每晨起鼓而出堂閽人報無事輒鼓而退寢間有訟訴呼至榻前折其曲直而遣之亦不受狀在任凡十八年廨前民有舉女者漸見其長已乃及笄笑而言曰襁褓兒已字尚能留此耶去志遂決方佐嘉靖寧波府志字用輔鄞人永樂戊子舉人授漳州府檢校升上海知縣政尚平易不事苛刻而搜剔姦蠧百廢具舉巨猾宿宄罔不屏迹日詣學宫課諸生殿最講解經史士民翕然向風正統改元用少傅楊溥薦升廣州知府振肅綱紀百度維新以例入覲卒於贑時奉敕守郡者九人鄞人得其三若陳本深為吉安王罃為肇慶及佐為廣州皆古龔黃之流也俞得儒兩浙名賢録字大雅鄞人永樂壬辰進士授監察御史出知賓州賔故多梗化者得儒至修其政教風俗丕變宣德丙午交趾不庭總戎檄之督餉民弗知勞而兵食足秩滿乞老歸子澤天順丁丑進士厯官四川僉事顧巽天啓慈溪縣志字與權永樂壬辰進士授江西按察司僉事公廉仁恕巡厯所至訪察幽隱人以青天目之遷山東參議恪守清白終始不渝管思易嘉靖寧波府志字原理鄞人永樂乙未進士授刑部主事持法平允奉命使湖廣辨疑獄釋繫囚全活甚衆歸州同知孟紹芳盜庫銀二千許棄官去司府以孟巨璫煙不敢問乃囚其吏郝洪等思易廉知之即上其事徑執孟論誅之而釋洪等已而居內艱起復仍前職時有獄囚王琦罪不應抵尚書吳中以私憾論死思易爭之不聽竟殺之乃憤惋而卒秦嶽兩浙名賢録字維翰慈溪人永樂丁酉舉人授兵部武選主事升郎中調刑部宅心平恕不事嚴刑而犯者輒得其情正統中升山西參議督理糧儲時水旱相仍有司催科逾迫而逋積逾多嶽曰暑雨艱食民方怨咨急之使倍價以償是轉之溝壑耳况嵗且有秋因屬其耆老而諭之民大悅越三月鞭撲不施而積逋咸償以憂去服闋調廣東以疾卒戴浩嘉靖寧波府志字彥廣鄞人永樂庚子舉人判東昌管河道九載遷守雷州州故並海滷病稼乃築堤以捍風潮民歌其功改永州又改鞏昌嵗飢矯發邊儲三萬七千餘石賑之監司語以法浩曰法固知之如民飢何以一人命活千萬人命固將甘之乃上疏自劾朝廷優詔原焉尋循例致仕居鄉躬行德誼表率宗族置義冢立義孰後其孫鰲鯨鱀䲀相繼舉進士余麟兩浙名賢録字天祥鄞人永樂癸卯舉人授主客司主事升郎中適河南河溢特授左參政往治之至則度水勢築堤防甫期奏功乃詢民間疾苦而恤之察吏治糾墨旌廉六年升本省左布政使乞歸王彞嘉靖寧波府志字友倫鄞人舉賢良任左軍都督府都事宣德中改令仙遊先是邑人苦征斂多逋播者彞至撫字有方科差不擾計都里以均坐派條征輸以完積逋民漸復業自廨宇壇壝以及倉庫門路悉葺治之民不知有役也三年卒於官邑人建祠祀焉錢奐嘉靖寧波府志字文煥鄞人正統丙辰進士授戶科給事升廣西參政潯州老藍冦起以單騎諭平之土官岑豹羅文愈以地訟奐為宣布威德皆帖服焉尋升左布政時都御史韓雍征大藤峽會嵗祲以軍餉為憂奐措置得宜上下充給凡所俘獲必加詳讞得活者甚衆力請致仕子瓚字廷祐𢎞治己未進士令潛山青陽皆有惠政官至廣西副使王士華湖廣通志字彥實鄞人舉進士正統間以工部都水司員外奉敕築華容諸防相度便宜勸富民出粟建預備倉擇廉慎吏掌管以待工役厯九載計所築墟四十有八堤百五十人呼為王公堤姚堂嘉靖寧波府志字彥容慈溪人正統己未進士授工部主事厯升廣信知府治行為江西第一以內艱去服闋起知蘇州府蘇故多羡餘嵗以萬計堂悉籍公帑以備賑恤又修孔子廟先賢祠會以事忤巡撫劉孜乃移守鎮江治鎮一如蘇政通惠洽流民復業者九千五百餘戶轉廣東參政卒堂三典名郡皆著名績而尤所注意者興學養士恤孤舉遺褒表名賢以禮化民故所在民懷其惠王鼎天啓慈溪縣志字器之正統中舉明經授本縣訓導升監察御史巡按山西有知縣郭某者貪而善賂鼎瀕行當道交口舉郭及按縣郭倍道逺迎承奉周至鼎即摘發其貪罷黜之民歡呼動地升江西按察僉事下車日贓吏聞風解綬以憂去服闋改廣東時流賊剽掠鼎一日出巡為賊所得舁至寨中時有二王僉事一為吳人頗多藏賄賊誤為是將以媒貨有識之者曰此浙江王僉事清官也不可犯遂輿送二十里外拜謝而去賊既平鼎以年老乞歸吳桓嘉靖寧波府志字廷用鄞人景泰舉人選汀州府通判嘗攝守事剖決若流庭無滯訟厯升常州府同知均徭役導水利平賦稅修橋梁招流亡給種佃田歸者相望宜興山崩暴水墊溺瀕死者衆桓發倉煮糜以食之又捐俸為倡勸富民出粟以賑靖江瀕海風潮蝕田額稅無辦桓躬為核實以新漲沙田米補焉撫按凡七上章特薦而桓以病乞歸遂進階中憲大夫致仕陳淳陳英嘉靖寧波府志淳字德溫鄞人景泰癸酉舉人知欽州時靈山民有死獄株連數百人會大暑狴戶皆滿淳止繫當罪者數人餘皆出之守大怒淳引法力爭竟不能屈舊有義倉儲穀二萬餘石積為豪強所侵悉徵理之嵗適大祲民賴以活撫按賢之以廉州知府會薦命未下而卒弟英字廷賢成化壬辰進士知廬陵縣疏困均賦戶口繁增會大旱齋沐禱雨輒應升監察御史以風節著江勛兩浙名賢録字元勛奉化人景泰甲戌進士擢監察御史巡按山東湖廣山東苦飢民多流亡乃設法賑濟田野安生湖湘旱潦相仍穀價騰湧民不堪命而內臣銜命將啓局造紙勛奏罷之擢廣西按察使蠻洞弗靖勛謀畫撫綏斥貪去暴綱紀肅然以內艱歸盧瑀嘉靖寧波府志字希玉鄞人成化己丑進士授刑科給事中疏罷淮揚貢賦十餘萬緡及西北勒市戰馬宿弊又劾巨璫田興梁訪等竊柄引用姦僧繼曉妖術罔上事直聲大振升工科都給事以上疏忤旨廷杖逮獄出為長沙府通判升真定府同知詰暴撫良能聲藉藉當道上其治狀升廣平府知府廣平故牧馬地豪貴家數侵匿而委其徴於貧戶瑀剗洗姦蠧盡反豪貴家侵地民困大起又興學勸士日進諸生於庭指授經義三輔之地蔚然比鄒魯焉王愷兩浙名賢録字宗元定海人成化舉人授平原令俗多盜有麥商夜經村寺被劫陳於縣愷故匿其事隂令販豈者和少熟豆其中夜過寺門復劫去乃令捕兵易服就寺僧貨豆中有熟者遂收捕不待訊而服自是盜賊屏迹後權要以非法相強愷曰令可去法不可撓遂致仕章鋭兩浙名賢録字元進鄞人成化壬辰進士官刑部主事晉郎中剖析滯獄精於老吏出守鳳陽應詔陳言上鳳陽軍民利病及時政十八事多議行會旱蝗雩禱輒雨復奏捐稅三之二升湖廣參政錦田苗獞反當事者憚不行鋭獨蒙犯瘴癘深入平之竟感疾卒孫紘嘉靖寧波府志字文冕鄞人成化戊戌進士授鎮江推官以廉明稱擢南監察御史南都冇國戚橫奪民田萬計紘悉稽版籍奪還民太監郭鏞犯後湖私渡禁紘抗章劾罷之已而守備蔣琮冒奪民蘆洲侵後湖壖地為田紘復率諸御史共劾之坐謫廣德州判升知州專務德教持大體不為煩苛威行豪強而良善者不知有官府尋卒於官楊文卿嘉靖寧波府志字質夫鄞人成化戊戌進士授刑部主事逋冦席英王勇白晝殺人邏者不能得躡賊所過逆旅主人逮繫之有夏廣才者坐窩主論死文卿爭之曰廣才迫於凶暴飲食之耳何窩之有竟出之升山西提學僉事遷山東提學副使所至頒條約以示勸懲士風振起以疾卒官李文昭嘉靖寧波府志字誠之鄞人成化庚子舉人授淮安通判東海有富民殺人屢年不決文昭一訊即得其情沐陽田數萬頃故有河澮墮髙堙庫旱潦俱病文昭為疏導陂障民甚賴之遷南寧同知厯升重慶知府況村土官黃文昌倡亂單車往諭降之以勞瘁卒楊守隅鄞縣志字維德成化甲辰進士為兵部車駕司主事出按陜西馬政剗剔宿蠧厯升江西左參政時逆瑾弄權有誣人不法事罪應籍沒守隅獨憐其誣瑾怒奪職歸瑾誅詔起原職旬宣四川適流賊藍老人麻六等剽掠蜀漢間勢甚猖獗守隅多方捍禦四川以寧尋升廣西布政使致仕王瑫嘉靖寧波府志字宗玉鄞人成化辛丑進士除臨邑令值嵗洊飢瑫白於監司不待報發粟以賑吏執不可瑫曰罪在令不在若也卒發之既而以艱去免喪升江南道御史尋升長沙知府府有吉藩羣小橫暴不法前守多被窘辱瑫至輒訊其渠魁白吉藩誅之羣小大戢儀賔史朝忠與藩閹積不相能而承奉朱泉頗有贏資一夕暴卒衆閹遂誣史利其資而毒殺之寃不能白瑫為白之周津天啓慈溪縣志字文濟成化甲辰進士擢監察御史巨璫蔣琮欲納交治具蕭寺託同僚致之及門而覺即策馬返閣老邱濬嗾人訐冢宰王恕津劾以妨賢病國舉朝韙之擢知九江以瑞州盜起宜選強明廉幹者治之因徙知瑞州津至啓都御史林俊宜用東漢聽盜相斬除罪法林從之盜果平後官至廣東左布政致仕沈元嘉靖寧波府志字德元慈溪人成化甲辰進士知南陵縣值嵗大祲元發帑藏勸富民出粟賑之民賴以安擢御史按治淮揚不瑣屑細務薦賢舉能去姦平獄人服其知大體出為湖廣僉事武昌故多大獄元按閲每至夜分假寐輒興務得其情人目之為一省臯陶周旋慈溪縣志字堯敬成化丁未進士除南戶科給事轉北兵科時疆圉多故旋條陳方略咸中時宜知州劉遜為宗藩搆陷一時言者皆繫獄旋上章申救得釋南旺湖久湮奏請復之出參廣藩平蘇孟凱之亂子士英正德甲辰進士官工部員外郎亦以政績著聞金洪嘉靖寧波府志字惟深鄞人成化丁未進士授靖江知縣以才堪治劇改令吳江吳江豪猾縱橫賦役繁劇小民疲於奔命洪乃裁抑勢家剗革狡吏嵗裁冗費銀米緡錢凡數十萬升御史出按山東時青州賊戴崇濟南賊楊敘嘯聚為患久而弗靖洪設法𠞰平之會逆瑾使人諷以進賂洪不為理瑾乃矯旨為民王術兩浙名賢録字用仁慈溪人成化丁未進士授嘉定知縣吏事精敏縣故有積荒田千頃賦每責辦於里胥術招撫流移計口授畝給牛種於是流民復業賦有所出治行考江南第一擢監察御史劾壽寧侯張鶴齡飲酒不敬權貴震懾奉命查盤兩廣以勞瘁卒於梧州楊子器獻徵録字名父慈溪人成化進士除知崑山縣召補吏部主事轉員外郎中陳邊務數十事尚書馬文升劉大夏皆重嘆許遷湖廣右參議分守辰常道會郴桂賊起請改道自效冒暑提兵討平之轉福建提學副使遷河南右參政時方以郴桂積勞成疾而東賊渡河天寒甚有勸緩行者子器乘輿而往即至嵩縣居守賊方走湖廣子器曰賊避土兵必復向汝州洛陽藩籬備不可缺乃自嵩馳赴之賊至子器輟食登城晝夜調度城守益堅賊遂引去尋進右布政使轉左卒寧波府志子器初令崑山盡毁淫祠撤其材以修學校及倉廩公館樓櫓又以餘材給太倉鎮海二衛修舉頽廢於馬鞍山麓創野鶴軒集諸生講學以憂去崑人即奉以祠之補常熟令直塘錢外郎以資豪里中悅鄰人趙重陽之妻令其夫商於外遂與私又遣人詐為盜以殺之而以盜聞子器察其詐逮治殺之時亢旱是夕大雨一邑歡呼升考功主事倡五經會或謂曹局清嚴不宜泛交遊謝曰吾不欲以仕廢學會營孝廟山陵聞中有水石抗疏言之為誣者所搆下獄臺省交章論救得免晉驗封員外郎以不附逆瑾出為湖廣參議呂和嘉靖寧波府志字克中鄞人𢎞治己未進士知臨淮縣百度惟新丁憂歸服闋改建平縣厯升山東按察僉事有王尚書弟殺人當道莫敢誰何和致之辟長清令劉儒內結權貴貪橫靡忌和痛繩之即誣和下詔獄久之始白臨清衛指揮柏紹縱暴不法巡按屬和治之紹逃至京師匿權璫家和卒捕得之竟治其罪遷陜西副使繕漢中寧羌諸城立南鄭金州諸學民立祠祀之向錦慈溪縣志字中美舉進士除東流令以循良薦擢鳳陽同知值嵗飢侍郎王瓊奉命賑荒惟土著者得食流民多飢死錦白瓊計口給食數萬人無一譁者瓊特疏薦之遷南禮曹出知廉州安南黎氏脅居民百餘越屯廉界中欽州以盜聞皆論死錦以土人越界罪止為首餘宜遣還御史疏錦失出罷職陳璧嘉靖寧波府志字天瑞鄞人正德丁丑進士知滁州升刑部員外郎時錢寧壻齊佐魏彬弟英俱坐死而巨璫奉命清審大獄力欲出之璧直前爭曰佐受廖堂萬金用鎮陜西陷人死無算英姦子婦因而殺死王長隨法不可縱二人竟論死轉江西僉事奬廉斥墨風紀肅然先是布政梁宸坐附逆濠論死巡按承當道意欲寬宸璧曰宸一省長吏乃署偽檄遍移各藩罪有浮此者乎宸不果釋而當道深銜之乃改調四川已又勒免官陸銓嘉靖寧波府志字選之鄞人嘉靖癸未進士除刑部主事厯遷福建按察添注副使嘗攝海道漳故盜藪而利窟也諸射利姦人多以厚貨餌監司闌出為患銓獨嚴立禁網剗剔姦蠧卒不為所餌升河南參政進廣西按察使時弩灘猺賊侯公丁雜處胡藍二姓之間相助為冦或議大舉兵誅之銓曰此堅賊黨而分我兵且逆順難明非訃之得也不若計殱渠魁而撫其餘監軍如其言弩灘果平升廣東右布政以內艱歸陳文譽嘉靖寧波府志字德卿慈溪人嘉靖癸未進士授刑部主事厯郎中審録江西多所平反大學士楊一清被誣下法司核治諸司難之文譽厲色曰顧事實不實耳何愛於楊公何畏於內府事竟得理出知鎮江府杜請託輕徭役五年之內百姓晏然以忤當道免歸周南慈溪縣志字啓東嘉靖乙酉舉人授常州通判署宜興篆桃花港淤塞南畫地開濬逾月完工又移魏村閘於桃花港口以時蓄泄奉委督運即條三議上實軍儲至計調漳州立保甲法賑龍溪荒擒海賊張國平等復改楚雄以親老致仕劉安寧波府志字汝勉慈溪人嘉靖丙戌進士授主事改御史疏陳補君德以圖治安上閲疏大怒逮赴錦衣衛拷訊兵科給事中胡堯時救之謫餘干典史纍遷長沙同知平寧鄉冦有功擢知鳳陽府治行稱卓旋丁內艱歸子志業嘉靖乙丑進士纍官江西副使袁載廣東通志字安道慈溪人舉進士厯知肇慶府節用愛民修廢舉墜諸不急之費一切蠲去惟恐為民病擢山東按察副使備兵臨清有中官入境暴橫不法載廷挫之入訴幾不免賴學士袁煒調護乃解調廣東海南副使引􅔂歸王梴寧波府志字子長象山人嘉靖壬辰進士授中書舍人擢兵科給事中改工部員外進郎中時大工繁興諸省運木先於張家灣出水以次拽入神木厰完者始取批回動經嵗月間有水漲漂木去坐纍死亡者梴奏即水次設厰竹木至即入給與批回公私兩便遂著為例升江西參議督糧儲行一條鞭法夙弊盡革轉山東副使備兵徐州決碭山水甃沛縣城賑蕭縣飢利澤尤著遷湖廣參政被劾免官劉廷誥天啓慈溪縣志字汝欽嘉靖戊戌進士授開封司理雪十年寃獄擢守袁州時分宜市權僕隸恣甚廷誥收其桀者笞之同年生居要津請官地拓私第廷誥持不可遂嗾言者論之調南康晉福建副使厯四川按察使巫山盜五十人故盜從也郡縣深文入之誥察其寃令縛盜自贖盡縱之往踰月果縛真盜至盡釋之人人羅拜曰劉公生我轉廣東布政使嵗例貢珠驗珠時先私取其美者廷誥一無所取姚梧慈溪縣志字文揚嘉靖辛丑進士授嘉魚令邑治濱江多冦警梧簡練士卒盜不敢入又捐俸築隄外捍江波內便行者民稱姚公隄擢工部郎監龍江𣙜務會川苗掠州縣勒備兵敘瀘多方輯禦拔劉顯行間絶諸苗要領捷聞升福建少參被劾去項守禮寧波府志字進伯奉化人嘉靖甲辰進士授主事轉員外郎中擢濟南知府案牘紛繁判無停滯新泰飢發帑賑濟升山西副使備兵井陘三關趙地固多剽騎憲府設牙兵名為邏卒而實潛自為盜守禮廉得其情引戮渠首邏者股栗邊地以寧以內艱去任張謙慈溪縣志字子受嘉靖壬戌進士授刑部主事會術士曹祖告建昌侯張延齡不法事下詔獄武定侯郭勛又誣延齡反曹郎應勘者以計免謙毅然任勘中貴鮑忠密諭謙善治此獄否則禍且不測謙謝曰刑官治獄有三尺法在利害非所計也乃拷掠延齡迄無反狀獄凡三上三得嚴譴竟不可奪僅坐延齡殺人罪謙杖三十謫揭陽典史厯升南刑部郎出守大名奏循良第一遷廣西參政討七山羅旁猺賊規畫進兵斬獲殆盡晉按察使致仕姚孟賢慈溪縣志字汝德隆慶戊辰進士授貴池令為政不事苛細惟以表揚節義奬厲學校為先務時海瑞為巡撫廉其治行亟稱之遷潮州郡丞海冦林良寶掠劫州縣為患孟賢設策搗巢擒獲無算當事抑其功尋乞終養歸朱瑩鄞縣志字仲明萬厯癸酉舉人授清河令補武陵時播冦作亂師多屯聚境內瑩善為措置民賴無擾又稅璫煽虐瑩設法駕馭帖然安堵而稅額亦視他邑為減厯升工部員外郎尋改河南僉事致仕髙萃鄞縣志字升伯萬厯甲戌進士官刑曹臨淮侯李宗城封倭事變獨身逃歸帝怒下詔獄大司馬石星本主封議欲嫁禍於遼之督撫言督撫倡訛言阻封事萃詰宗城曰汝罪當死若實言當坐汝宗城因具言倭實不受封狀次日廷鞫宗城以實供遂下星獄及定宗城罪萃以八議上從寬典出知肇慶府興利惠民置田瞻士多從惇厚肇人肖像祀之沈九疇鄞縣志字箕仲萬厯丁丑進士授刑部主事纍遷山東參政會平度飢姦民嘯聚幾變九疇單騎赴之械治渠魁境賴以安終江西布政使林可成寧波府志字𢎞志鄞人萬厯庚辰進士授太康令嵗祲賑老弱收少壯者繕城給錢民忘其飢召為御史值南北洊飢連疏請發臨德二倉及三關嵗課兩院贖銀以賑皆下司農如其請他疏皆侃侃著直聲岑應春慈溪縣志字繹仁萬厯丙戌進士授工部主事管山陵木與中貴共事一無假貸省緡錢無算差臨清磚厰故事陶戶輸運至京給直人苦賠纍應春令給直後始辦料復官給運送之費遷郎中出為東兖道參議升副使備兵岢嵐繕修新障百八十餘里人稱為岑公堡未幾罷歸葛文炳寧波府志字星垣鄞人萬厯戊子舉人授江西南城令宗藩攫民爭利文炳進謁益王徐陳其弊由是犯者得先啓其罪而面決之民賴以安縣南有煙火山二十七障供民樵牧姦民借王府建塋名踞之文炳清界斷歸民立石遵守又建水倉免輸兌之艱時乘小竹輿遍厯阡陌察水利勸農桑創立社學以興弦誦在邑六年升大理評事以疾歸錢仲選慈溪縣志字仁仲萬厯戊子舉人選東平州學正丁艱起補東平令進父老訪利弊正戶籍以均賦定官解以恤民捐俸建厫輸糧兌軍厫有羡米例歸諸官仲選正色曰此皆民膏血也忍吮之耶令常額外悉罷之後免歸貧甚不以介意徐時進鄞縣志字見可萬厯乙未進士授南京工部主事遷郎中出守嶽州府時採𣙜使絡繹四出楚璫尤橫郡縣皆畏不敢抗時進獨不為禮亢顔相對璫亦憚其嚴斂迹他往調荆州免沙市稅舟清宗祿詭簿罷單民門稅禁郵使折乾築長堤甓龍陂荆人德之丁艱起補惠州擢廣東副使監惠潮以方略擒盜海患悉平天啓改元加大理卿致仕王猷慈溪縣志字在吾萬厯戊戌進士知漳浦縣𣙜使擬設雲霄鎮為竭澤計猷條析利害以去就爭於上官議遂寢行取工部主事厯知惠袁二府皆著清白聲馮若愚慈溪縣志字明甫萬厯丁未進士授工部主事審決江南有黠囚關通權貴前後使者瞻顧莫敢決若愚至立論殺之直聲大震厯員外郎中出知襄陽府先是礦璫四出楚璫陳奉尤鷙橫自開府武昌而以原奏韋國賢充錦衣開府樊城黨與分布發人冢墓或夜入民舍搜括私藏遇斗米亦稅之襄民洶洶嘯聚成七寨若愚抵任歎曰變在頃刻不急為計安用太守為急召教諭徐中節以計紿國賢出盡縛稅署爪牙而自策單騎掩國賢縛置郡獄諸黨與在他邑者亦一時盡縛自襄至武昌皆譁傳太守神人七寨民亦散歸隴畝奉恚甚飛章上變楚人邀其疏漢濵兩月不得達時稅使月有進章至是兩月無疏神宗疑楚使皆被殺因撤奉回已復詔盡撤各道稅使奉既去銜若愚不置嗾諸璫以事齮齕之坐是久不遷乃投劾歸光宗登極起南光祿少卿遷太僕未幾以病歸塢鳴雷寧波府志字長豫奉化人萬厯甲辰進士授刑部主事後守建昌時益藩諸邸役橫甚鳴雷以法繩之不少貸郡故有太平橋稅向為狙獪豪右攬侵鳴雷廉得之悉置諸法時有溢額即遞減免商民稱便尤加意造士置田贍學轉湖廣副使有富人恃財殺人獄久不決至則立置諸法逺近稱快會母病乞養歸錢肅樂寧波府志字希聲鄞人崇禎丁丑進士授太倉知州飲冰茹蘗力崇教化州故多豪強肅樂痛懲之又以朱白榜列善惡姓名械白榜者階下豫重杖久之杖者日少升刑部員外郎丁憂歸後卒於閩國朝馮偀廣東名宦册慈溪人順治己丑進士粵東李成棟叛偀以副使巡視海道會同大帥統師抵粵平南韶等郡及抵廣州與大帥相度機宜先以一軍取三水從化等縣旋平廣州傳檄各鄉堡禁虜掠未幾偽青陽伯范承恩據城叛偀遣人恫喝之又使人運諸大炮至西關發炮震天地雜以鉦鼓聲承恩一時不知所為遂潰廣州復安胡文學舊浙江通志字卜言鄞人順治壬辰進士授真定府推官巨冦髙鼎踞恆之西山絶頂垂二十年并代絳晉俱騷動文學請益汛兵專意招撫鼎率衆出降舉卓異第一擢御史出按兩淮鹽漕報最內升候補歸里寧波府志文學涖真定日井陘賊聚衆事敗指稱偽牒株連數百人文學嚴治其黨舉偽牒盡焚之人情始安謝于道雲南名宦册字存莪鄞人康熙癸丑進士由部郎任雲南提學僉事既擅藻鑑尤以化導為先每試召諸生面教之繞座數百人請業請益于道手批口答頃刻第其髙下士習文體一時丕變胡亦堂江西名宦册慈溪人康熙十六年由舉人知臨川縣時兵燹之後民多流移田荒賦缺亦堂多方招徠給牛種躬勸相其逋賦請得展限帶徵民以蘇息新學宫修橋梁及社倉義學民多頌之徐勍廣東名宦册鄞人由進士初任陜之三原令政通人和尋以母老告歸丁艱服闋補順德令禁雜派免浮糧絶苞苴清保甲精讞獄涖任四年始終勿渝有新會少年詣堂下曰既聘矣婦翁嫌吾貧不吾室也勍以越境辭少年以頭觸柱血被面勍憐之縶少年若獲盜狀牒新令逮盜黨其翁至則曰吾壻也恨不與婦故誣我勍曰壻固無良若持五十金同若女來吾為若絶之至則笑曰五十金壻不貧矣僦舍西郊趣令完聚其他決獄多類此遷御史卒邑人祠祀之浙江通志卷一百六十八
