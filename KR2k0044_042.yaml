溪縣西南二十五里釣魚山上世傳謝靈運釣於此妙髙臺名勝志在奉化縣雪竇山鯉臺延祐四明志在奉化橫山上有石文如篆曉峯臺定海縣志在縣西南曉峰山可望日出徐偃王宅成化四明郡志隱學山在鄞縣東東錢湖畔舊名棲真徐偃王隱學於此一云在翁洲王十朋會稽賦翁洲訪偃王之盧董孝子宅嘉靖寧波府志在鄞縣西南百餘步孝子名黯其宅今為純德廟舊志謂即其故居立廟則黯本鄮人也鄮故鄞地虞翻謂為句章人據其徙居慈溪言之而唐崔殷廟碣乃仍其誤張平子宅四明山志四明山連脊起峰中有三峯鐺足以立漢張平子居焉梅福宅成化四明郡志鄞縣東南七十里大梅山蓋梅福隱宅也按福傳王莽専政福一朝棄妻子去後有見福於會稽漢時鄞屬會稽山中有石洞仙井藥爐丹竈遺迹猶存徐浩宅嘉靖寧波府志在鄞縣南四明山下浩先居越為唐中書舍人貶明州别駕遂居於此賀知章宅嘉靖寧波府志鄞縣西南句章鄉小溪之馬湖世傳賀監舊宅成化四明郡志鄞縣西南君奢橋西唐賀知章所居有衆樂亭相距三里名賀家灣其地賀姓甚多賀監後徙剡川有回鄉詩張時徹府志存疑賀知章按舊唐書與會稽志俱為越州永興人考永興乃今蕭山縣古今之志四明者並載之非以其自號四明狂客故耶四明山在會稽跨寧紹之境不専屬鄞今郡城中月湖上有賀監祠故傳為賀監讀書處鄞之句章鄉小溪有馬湖云賀氏洗馬池相距三里有賀家灣至今賀姓者尤多又掘土得斷碑有會稽郡賀府君六字耆老皆謂賀監故宅始實居此後徙剡川然剡乃嵊地實與奉化接壤奉亦有剡溪我明郡水源皆自剡也況馬湖又與奉連壤地而賀監子曾子故為會稽郡司馬六字碑豈其墓碣耶是皆不可考然賀監舍宅為觀名千秋考會稽志今天長觀是也云去府東南十二里又請周宫湖為放生池一曰永周湖今池去府東南十里史浩為安撫使又於其地為亭名懷賀種種古迹遺翰如知章三告龍瑞宫記等多在山會問其墓在山隂縣東南九里其地因名九里墓在山巔鄉人呼為賀墓其為越人明矣謹按知章宅故在越因舊志所有且有張時徹之辨故存之黃晟宅嘉靖寧波府志在鄞縣東二十五里鄞塘鄉任佽飛兵馬使後遷明州刺史遂家於此萬厯象山縣志象山縣東北四十里荷花橋冇黃晟宅今十七都二十四都黃姓皆其苖裔謝遺塵宅四明山志唐謝遺塵隱於四明南雷訪陸龜蒙語以山中之奇品為九題曰石室過雲雲南雲北鹿亭樊榭潺湲洞青櫺子鞠侯皮日休和之錢塤宅名勝志東錢湖在鄞縣東三十五里舊名西湖宋錢塤世居湖上好學有節槩與同里髙友文以談經史相資廓落世務趙善湘宅鄞縣志縣治南一里握蘭坊左宋宗室趙善湘所居稱趙王府樓異宅成化四明郡志在鄞縣西南晝錦坊郡縣志異以孫鑰貴贈太師稱樓太師府故里名晝錦豐稷宅嘉靖寧波府志在鄞縣西南五十里董母墓北稷仕至工部尚書致仕歸由小溪鎮之蕙江徙居於此曾鞏送豐稷歸故里詩桃花染破南山青漢江此時春水生客舟相語人夜起徑櫓亂江羣雁聲夫君飄泊動歸思告我舉裝千里行閎才壯思風雨發緑鬢少年冰雪清讀書一見若經誦下筆千言能立成精微自得有天質操行秀出存鄉評嗟從薄祿困流滯能誘鄙俗消紛爭絃歌躬勸士強學田里安堵人力耕嗟豫據案但畫諾遇事縮手方蒙成雖知璞玉難強獻欲挂塵􅦲空谷情嵗寒不變乃知確物理先否終當亨維舟且盡今夕語明日帆隨白烏輕魏杞宅嘉靖寧波府志在鄞縣南小溪鎮把官學士既罷歸卜居小溪之上手不停披著山房集陳瓘宅成化四明郡志在鄞縣治南之西湖瓘字了翁南劍人嘗攝明州倅寓居湖上著四明遵堯集陳之翰宅嘉靖寧波府志鄞縣治西南月湖之上處士陳之翰讀書之所汪大猷宅洪邁友恭堂記友恭堂者鄞江汪氏所立也其宅在鄞縣西三十里嘉靖寧波府志鄞縣西山之潘嶴宋敷文閣學士汪大猷所居趙汝愚送汪大猷歸鄞詩尚書天官貴持經侍幃幄青冥欲無際白首非故約連檣動南浦父老望巖壑下車入里門執手問歡樂十年幾風雨寒雞呌屋角勤勞畢吾分帝賚出寵渥我適奉香火禁直連六閣遂令宣室思從今問晦朔朱熹送汪大猷歸里詩濯濯才華耀禁林翩然忽起故園心九天得請恩方重一舸東歸春未深照眼湖山非昨夢及時詩酒合坰襟不應便作真狂客講殿行思聽履音陸置宅至正四明續志鄞縣南四十里梅溪灘上宋會稽陸判官置卜居於此奉祠垂三十年工詩及書法史浩宅鄞縣志在縣治西南一里月湖之東太師宅乃宋之賜第故稱史府王珩宅嘉靖寧波府志鄞縣西三十五里桃源鄉宋宗正少卿王珩所居父説建桃源書院王次翁宅嘉靖寧波府志鄞縣治西南二里西社壇橋宋參知政事王次翁所居次翁善太元數未老致仕治第西湖為退休之所趙竴宅成化四明郡志在鄞縣南五十里宋隱士趙竴待制粹中之子隱於茅山之陽屢薦不起趙彥逾宅成化四明郡志在鄞縣西南錦里橋北宋紹興間郡人學士趙彥逾仕資政殿大學士知慶元府兼沿海制置使所居故名錦里張即之宅書史鄞縣西南有林村市宋學士張即之之祖邵居此其家近資教寺故寺多其墨迹云袁甫宅鄞縣志在縣治西北一里鑑橋下之西宋尚書袁甫以狀元及第故傍有狀元坊陳塤宅鄞縣志在縣東四十里寶幢市塤以省元任吏部侍郎里有省元坊范楷宅嘉靖寧波府志在鄞縣東楷以權工部尚書言李全罷歸築室萬齡鄉至今稱尚書村傅行簡宅嘉靖寧波府志在鄞縣治西北五十餘步鑑橋頭行簡宋嘉泰二年狀元宅傍有狀元橋王應麟宅嘉靖寧波府志鄞縣治南一里宋尚書王應麟所居其父撝為崇政殿説書理宗御書飛白汲古傳忠四字扁其堂至今稱王家府闞澤宅成化四明郡志慈溪縣東北十里闞峯山吳太子太傅都鄉侯闞澤所居慈溪縣志唐大中二年令李楚臣立為德潤院虞喜宅嘉靖寧波府志慈溪縣北鳴鶴山四明山志大隱山北峯為四明東麓晉虞喜嘗隱此山三召不起虞九皋宅名勝志在鳴鶴山唐元和間虞九皋字鳴鶴居此天啓慈溪縣志九皋世南之孫世南宅即在此孫惟晸宅嘉靖寧波府志慈溪縣西南四十里孫家坪唐靜海軍節度使孫惟晸所居呂珂宅天啓慈溪縣志在縣西南二里唐儀鳯三年邑大夫呂珂以所居捨為寺今為永明寺張無擇宅嘉靖寧波府志在慈溪縣治西南孝子名無擇為唐刺史今即其宅為廟祠之黃震宅天啓慈溪縣志縣北五十里地名古窰有卧床橋為宋文潔先生黃震讀書處孫夢觀宅嘉靖寧波府志在慈溪縣治西街宋侍郎孫夢觀即節度惟晸之後今有孫家橋張虙宅嘉靖寧波府志慈溪縣東南二十里宋侍郎張虙所居俗稱小鄮州楊簡宅慈溪舊景董孝子廟之西為野航橋橋之西宋慈湖先生卜居於此後為慈湖書院嘉靖奉化縣志縣東一百里為瑞雲山楊文元公生於此始生時有五色雲起蓋山上鄉人異之因名瑞雲山方山京宅嘉靖寧波府志在慈溪縣東之大方橋宋景定三年進士及第方山京所居姚登孫宅名勝志慈溪縣雙峯山宋末姚登孫隱此孫郃宅嘉靖寧波府志在奉化縣東北唐右拾遺孫郃所居其裔名沔者為宋名臣宅今為淨惠寺杜勝先宅嘉靖奉化縣志在縣北杜勝先東陽人唐長慶間為御史中丞居縣之招賢墟即今杜坂樓郁宅嘉靖寧波府志在奉化縣東正議大夫樓郁所居今為吉成寺林逋宅嘉靖寧波府志奉化縣東黃賢村宋處士林逋所居後隱杭之西湖竺汝舟宅名勝志奉化縣桃花坑昔隱士竺汝舟與太白禪師往來至此居之留偈云昔是神仙宅今為長者居蔣浚明宅嘉靖寧波府志奉化縣北三嶺村宋金紫光祿大夫蔣浚明居此舒璘宅嘉靖奉化縣志在縣東五里廣平里璘諡文靖其子孫即所居之傍創廣平書院王宗道宅嘉靖奉化縣志縣東二里東市宋王宗道所居别號怡齋乃時敘之子今名雙桂坊仇悆宅嘉靖寧波府志奉化縣北五里沙堰宋開國伯仇悆之宅今子孫即所居之傍立廟祀之陳著宅嘉靖寧波府志奉化縣西六十里三石村宋祕書監陳著所居曹孝先宅嘉靖寧波府志奉化縣西六十里三石村宋承直郎曹孝先所居戴表元宅嘉靖寧波府志奉化縣西坑村元戴表元所居人稱江南夫子戴表元質野堂自記剡源先生幼而囂居長而浪遊老而羈棲以為異時倘得餘間營一區之宅則將名之質野大德丙午始議興築不三月而堂成以次充安閣岧嶤亭縮軒雪鏡諸役仍舊名而增新備凡一百三十六楹溪山面勢煙雲情親無不欣合幸得成之而得自名之而何不可樂乎按趙孟俯松雪齋集有縮軒記任士林宅嘉靖奉化縣志縣南五十里鮚崎村宋松鄉先生任士林所居樂仁規宅嘉靖寧波府志定海縣南四十五里靈巖鄉唐尚書樂仁規與弟尚書仁厚所居余天錫宅嘉靖定海縣志縣東二百里甬東村宋參知政事余天錫所居沈焕宅嘉靖定海縣志縣西南東山下宋沈端憲煥所居縣東有南山書院為煥講學之地倪九疇宅萬厯象山縣志九疇平陽人唐昭宗時官招討副使抵象之繪棚嶺遂卜居焉俞懋文宅萬厯象山縣志九都金字山下宋侍郎俞懋文及孫承簡世居於此楊王休宅嘉靖寧波府志象山縣治後宋尚書楊王休居此應㒡宅嘉靖寧波府志昌國城中宋參知政事應㒡所居後徙於鄞四明窗成化四明郡志在郡治吳潛既增浚舊池跨兩虹於上而闢虛堂於中公謂四明洞天為石窗此堂戶牖四達遂題曰四明窗桂林嘉靖寧波府志鄞縣西二十里地名桂林宋初忠宣公俞鼎由吳興來鎮浙東卜居於此義門嘉靖寧波府志鄞縣南一里元提舉蔣明道所居內有宋建義門祠堂一所菊村嘉靖寧波府志鄞縣西二里宋忠臣袁鏞之孫士元所居士元為翰林國史院檢閲晚隱城西别墅種菊數百本自號菊村老人瑞室鄞縣志薛維字持國敦尚古道結廬張村宋淳熙間遭回祿所居獨完樓鑰題曰瑞室冥菴鄞縣志在縣西六十里密巖山下宋尚書陳顯因沮用蔡京貶知越州歸作冥菴以自晦萬竹廬嘉靖奉化縣志縣西南六十里髙元之所居元之本鄞人以父世植葬奉化之察廉岡因是結廬萬竹之間故稱萬竹先生金鐘墩成化四明郡志在奉化縣北十里大溪間昔傳錢氏載大金鐘過此沉焉漲沙成墩萬松窩萬厯象山縣志在縣東宋卞大亨以丞相范宗尹薦避迹錢倉結窩山隈植萬松於徑思孝廬萬厯象山縣志在縣西金龜山孝子名缺父母沒哀毁骨立既葬築廬於墓前郡守胡矩為之立碑扁其廬曰思孝梅子真煉藥處吳萊甬東山水古迹記在昌國梅岑山安期生隱處延祐四明志安期生洞在昌國馬秦山吳萊望馬秦桃花諸山間安期生隱處詩此去何可極中心忽有思亂山插滄海千層壯且奇信哉神仙宅而養雲霞姿雕鎪鬼斧觖刮濯龍湫移坎窞森立劍槎牙割靈旗微涵赤岸水暗産瓊田芝老生今安在方士不我欺往過燕齊靡出沒楚漢危挾山作書鎮分海為硯池殘花錦石爛淡墨珠巖披東溟地涵畜北極天翰維玉舄投已逺桑田變難期誓追凌波步行折拂日枝羽丘杳如夢元國深更疑豈無抱朴子去我乃若遺空餘煉藥鼎尚有樵人知靈山石鼓太平寰宇記鄮縣靈山有石鼓臨澗若鳴則野雉翔鳴慶安古松天啓慈溪縣志縣西北慶安寺前古松夾道綿亘數里其一最巨而奇蜿蜒若龍飛偃如蓋臨池之上馮輗止伐慶安寺古松詩寒松一幹老蒼蒼古寺門前歲月長匠作偶圖舟楫利彈翁方患斧斤傷得全此日同齊木勿剪他年比召棠可但與君期久逺相將俱列大夫行古棠名勝志奉化縣髙公塘唐武德初設鎮於此本晉孫興公遊四明得棠一本植之後訛棠作塘藤龕名勝志奉化縣雪竇山上李濂藤龕詩雪山萬年藤蘝蔓樛為龕禪師與世絶巢卧參瞿曇夜雨澗邊磬秋風雲外菴余訪逺公社思投陶令簮古樟嘉靖奉化縣志青錦山下有古樟木甚巨藤繞其上狀如虬龍秀峯柏成化四明郡志定海縣東南六十里秀峯山下古柏甚巨唐朝舊物浙江通志卷四十三
