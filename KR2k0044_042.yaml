body:
  text: 浙江通志卷四十三古迹五寧波府句章城元和郡縣志明州句章故城在州西一里太平寰宇記按郡縣志云句章縣本是平山四明接其東嶺天台續其南峯是也古句章城輿地紀勝在鄞縣南六十里漢遣橫海將軍韓説出句章道征東粵王即此鄞縣志古句章城在慈溪城山渡之東越王句踐築其曰城山以城在此山也宋武帝討孫恩改築於小溪鎮故名其江曰鄞江名其鄉曰句章圖經所載古句章城在鄞南六十里是也故寧郡有兩句章遺址俱存羅城元豐九域志按夏侯曾先地志云晉劉牢之築城以遏王江口即此城也或云越無諸所築鄞城太平寰宇記漢縣廢城在今鄮縣南鄞縣志鄞本漢縣廢城因境有赤堇山加邑為鄞在今白社里産赤堇革薛燭曰歐冶子與越王鑄劒破赤堇之山即此地今白社有鄞城遺迹尚在鄮城名勝志鄞縣東三十餘里為貿山古鄮縣以此名先時山麓與海相際百貨來此貿易以故谷口舊名後塘街有鄮縣城遺址鄞縣志古鄮城相傳在貿山橋非也貿山在東錢湖之東其時名湖為西湖若在貿山橋即當云東湖矣何得謂之西耶及登貿山橋所稱故城者掘土驗之絶無瓦甓磚石則非城址可知後人因其土隆起若城址故云爾昌國舊城萬厯象山縣志在縣南一百二十里海中兩峯對峙名天門山接寧海東境海道一要衝也明初建衛於此翁山縣城元和郡縣志翁洲入海二百里即春秋所謂甬東其洲環五百里有良田湖水明一統志在寧海縣東北唐開元中置翁山縣宋改昌國明洪武間以其地瀕海分徙其民於內地僅存在城五百户鄞縣志今之舟山河古城定海縣志去縣八里舊傳唐世築城於此後以土輕移就鎮鼇山旁宋寶慶間城基猶存古牧奴縣治名勝志句章城一名官奴城舊圖經云漢光武至越嘗為賊所困因牧奴得免既定天下以奴為鄮令封鄮為牧奴縣城為官奴城又十道志云宋武帝微時避吏於鄮與人奴名桂者善因匿之為吏所窘奴乃耕於田以土覆帝得免後立官奴城以報之掘土築城處名官奴池即舊治鄮山之城也其謂光武者於史無所據而宋書孫恩寇上虞時劉裕戌句章疑故為宋武云古鄮縣治成化四明郡志鄮縣舊治在阿育王山西鄮山之東城郭遺址猶存古堇子國名勝志夏時有堇子國因其境有赤堇山在今奉化縣東五十里吳越望海縣治太平寰宇記梁開平三年吳越王以地濵海有魚鹽之利因置望海縣後改為定海縣輿地紀勝本鄮縣之靜海鎮吳越備史梁開平二年武肅徇明州因城望海鎮置望海縣宋酒稅廳天啓慈溪縣志酒稅務在縣東南二里淳化七年建監酒稅廳在縣東南一里慶歷八年建名勝志鄞縣西下莊乃宋之酒坊司也宋永平寨天啓慈溪縣志宋置永平寨於縣西夜飛山屯駐水軍咸淳十年寨燬宋社壇天啓慈溪縣志在縣西南祈報坊建炎二年令林叔豹建宋教場天啓慈溪縣志在縣東北靖康元年置宋船場至正四明續志吕祖儉詩序朝景迂大觀中為四明船場後七十餘年訪問舊迹尚有可考朝説之思四明所居詩軒窗直到桃花渡是也宋雞鳴寨天啓慈溪縣志在縣西北四十五里白馬嶴口政和七年建開慶初移屯向頭寨之傍宋鮚崎寨嘉靖奉化縣志即鮚崎鎮嘉泰中置宋沿海制置使司輿地紀勝紹興二年以吕頤浩言設沿海制置使置司定海縣宋市舶司中興小歷建炎二年復置市舶司於明州定海縣聽番客從便桃源洞園嘉靖寧波府志在帥府後園之北中有佳趣亭集春亭容與亭宋韓璡建今改為海道司帥府園嘉靖寧波府志在帥府元建右置花園古石嘉木髙臺曲池至今尚存改建市舶提舉司蔣家園名勝志在府東南宋蔣曉建王亘遊蔣圍詩採蓮橋下路皂蓋拂雲來塵壓隨軒雨風生避暑臺酒緣佳客盡花為使君開共話西溪舊相忘此日杯倪家園名勝志在府治北元倪萬尸建西湖十洲輿地紀勝在州西湖中有汀洲島嶼凡十曰柳汀雪汀芳草汀芙蓉洲菊花洲月島松島花嶼竹嶼煙嶼四時之景不同而士女遊賞特盛於春夏飛蓋成隂畫船漾影無虛日也嘉靖寧波府志宋元祐癸酉太守劉珵因月湖之舊而疏浚之復仍其積上廣為十洲隨景命名煙波館成化四明郡志在鄞縣東四十里東錢湖宋寶慶三年守胡矩建旁有天鏡亭丈亭館嘉靖寧波府志在慈溪縣西南四十五里宋嘉定間令邊列建館於丈亭北故名鳬磯館晏公類要慈溪縣東南二里唐開元二十六年縣令房琯建慈溪縣志地臨江渚鳬雁羣集名曰鳬磯後改為驛涵虛館名勝志在城西南月湖中登陸館嘉靖寧波府志在奉化縣東四里龍津館嘉靖奉化縣志宋朱文公提舉浙東常平泊舟於此率諸生講學焉金鐘館嘉靖奉化縣志在縣東北十里宋咸淳中參政葉夢鼎鎮明州建濟川館嘉靖寧波府志在定海縣南舊名利涉又名濟川亭澤山行館延祐四明志在定海縣西北九十里澤山宋吏部郎黃震以德祐初歸隱就山南築行館榜所居室為歸來之廬林泉瀟灑為一方勝覽張楷題澤山館詩山水真佳致乾坤獨樂鄉谷深如子午地僻似柴桑石鑿登山徑槎橫渡水梁黃公歸隱處松菊有餘香舟山館定海縣志在縣城內宋嘉定十五年令趙大忠建太白莊嘉靖寧波府志在府東五里元學士程端禮與弟端學改為讀書莊即宋守胡矩所建太白樓也梅莊延祐四明志在春風堂南淳祐中制帥顔頤仲建義田莊嘉靖寧波府志在府治西望京門內宋淳熙時汪莊靖大猷立樓鑰義田莊記四明鄉誼最重齊國公以列卿領晝蟰義襟素髙恤孤濟急厥後外祖少師汪公太帥史文惠王舅氏尚書暨鄉先達與我諸父相繼主盟此風不墜淳熙中沈晦叔煥請於文惠王用會稽近地為義田之舉王韙其言與吾舅謀倡率好事者於是或捐己産或輸財以買得撥助之田合五頃有奇嵗得榖六百斛米三之二買田作屋十五楹於郡城西望京門內扁曰義田莊推爵齒之髙而行幹力者提其綱仕而家食者一人司其出入凡有親喪不能舉孤女不能嫁參稽而次授之自今富者樂施貧者安分與者不以為恩受者不以為辛有餘則加益焉共守規約以無員先生之意而後可以久矣柳莊嘉靖鄞縣志袁士元子太常丞珙退休之里即菊村故址九經堂輿地紀勝在鄮山堂後淳化間詔頒九經郡守陳充作堂藏之李關重修九經堂記上即位之明年九月閌自虞部郎中乞守兹土乃得亳又明年十月自亳被命來領郡事一日會賔客於東園之嘉燕堂其北有遺址焉問諸老史云九經堂基也舊記在焉滌而觀之乃太宗殿中丞陳侯充之文也陳侯當淳化二年蒞茲方皇帝詔以九經賜荆楚湖襄江吳杭越閩中嶺外諸郡而明預馬陳侯戾止見所賜書戴仰天子之休飾廣厦以藏之名曰九經堂自淳化二年迄於今才百年而九經散失無存堂亦廢而草木蓁蓁矣乃率入官之棄材鳩無用之軍工鑿治畚土增髙舊址如臺而新之且購九經置其間使士民復見太宗之遺訓與陳侯經始之迹而時與士大夫遊焉鄮山堂延祐四明志在鎮海樓北宋政和丙申守周邦彥因舊基建嘉燕堂李閌重修九經堂記郡東園進思堂延祐四明志在府治紹興間守畢仲荀建真瑞堂延祐四明志在熙春亭東成化四明郡志宋守韓璡建清心堂延祐四明志在芙蓉堂西隆興癸未守趙子瀟建春風堂芙蓉堂延祐四明志在府治並宋守程覃建熙春堂百花堂輿地紀勝並在州宅後圃錦堂延祐四明志在治事廳後淳祐元年守余天錫新之御書錦堂二字以天錫典鄉郡也清暑堂延祐四明志在府堂西偏淳熙初魏王建老香堂嘉靖寧波府志在府治面北植桂百本宋大使丞相吳潛出守慶元時建蒼雲堂嘉靖寧波府志在郡圃之北有古檜數本太守章大醇建既圮大使丞相吳潛增復舊規仍以檜補之蒼雲舊扁猶在溧陽張即之書平易堂輿地紀勝在府治進思堂後琴堂延祐四明志在鄞縣寬賦堂之北宋建清心堂延祐四明志在鄞縣宅東北園中西南瞰蓮池宋紹興二十五年令王曄建寬賦堂延祐四明志在鄞縣宅左面東紹興二十六年令周申亨重建桐鄉朱翌記晝簾堂延祐四明志在鄞縣廳事東紹興三十一年建趙省為記衆樂堂延祐四明志在子城西南屹立湖中有橋以通來往一勝景也嘉祐間守錢公輔建守呂浮書額邵亢衆樂堂記明治故鄮瀕海之都厥初導江源於南山釃為漕河以入於城吳越肇國兹為輔州湖支於河蓋數百畝中為亭觀卉木洲嶼至於今圯廢鮮有存者維時錢君來此邦邦之人曰維政刑毋枉於直曰維教化日遷於良山樵水耘濟之阜安陶然太和歲以有年邦人怡怡並尋於娛君曰從事與是同好近而勝者莫湖先焉閼者闢之窪者隆之昔賦吏租削而捐之周為飛梁以通往來合為夏屋鱗舒翼開逺巖近峯煙矗兩青水流庭階激激有聲君曰從事盍往樂之荷房芰盤鳬飛鴇翻飄飄溝前凡州之人月維暮春聨航接艫肴酒管絃來遊其間環隄倣徉風於栁楊夕以忘還明人之憂惟使君是求明人之樂惟使君是度樂乎樂而不與人同樂安在其為樂哉他山之石以鑱以刻以告後人尚識其略時熙寧二年也廣生堂延祐四明志在湖心寺側乾道中守趙伯圭建錦照堂成化四明郡志在月湖南宋樓異建後更名竹洲真隱堂嘉靖寧波府志在月湖之中洲宋越王史浩建以讀書著真隱漫録滄洲堂袁桷詩注九月望日過東湖上山僧能道嘉定間事出示史忠宣公所製滄洲堂上梁文明恕堂天啓慈溪縣志宋雍熙初令李紹文建紹興中令林公定更名製錦元烏馬兒改曰勝覽清清堂袁桷慈溪縣興造記廳事有堂曰清清淳化間縣令張穎叔達璽書之所褒因其名而築者也慈溪縣志後令黃瓊重修後又名清清閣徐璋重修清清堂記余過是邑大夫黃公延余一室榜曰清清憑髙原面廣野基宇聳壯丹青煥飾周旋熟視見平蕪散緑修竹環翠孤雲落照飛煙有無逺水斷霞白鳥上下豫以堂名殆是之謂歟公曰非也將水禽啁唽松籟悠揚艇棹絶湖而漁唱問發牛羊下坡而牧笛孤響有適於耳歟曰非也抑訟息庭虛退而孤坐琴橫淨几香裊金爐一慮不生萬緣俱滌終日寓之而忘身之在仕歟曰非也蓋淳化中有賢令張叔達者綽著嚴明茂昭清德政施清百里而聲達九重璽書敦奬先詔尚存後人仰其名慮久而湮也乃建兹堂傍曰清清希仰前規即不能抗衡並馳抑終不失為自好者矣豫自領邑見其柱礎傾欹棟梁蠹腐因念召伯之棠尚戒剪伐況棟宇乎遂鳩工掄材為丕新之不惟不墜前人之志抑將永君子之傳公名瓊字巨濟戴溪人宣和二年記道愛堂天啓慈溪縣志在縣治廳東宋元祐初令崔熙建扁曰佐治至淳祐初令吳浦重建曹邰更葺之改曰道愛鄭清之記謹按寧郡縣兩志皆稱淳祐初吳浦重建至建炎之四年曹邰更葺考職官表浦邰相繼為令皆在於淳祐間淳祐為理宗之年號建炎乃髙宗之初元舊志誤也製錦堂成化四明郡志在慈溪縣尉廳側畢仲荀建勤畏堂嘉靖寧波府志在慈溪縣治王中行建植本堂嘉靖寧波府志在慈溪縣西南一里尚書姚鏌所居姚自宋神童姚正子世居於此遺愛堂成化四明郡志在奉化縣治內又名龍溪道院得初堂王應麟奉化縣治記堂曰得初以息以燕恕堂延祐四明志在奉化縣廳事之西榮彛建德星堂戴表元奉川驛記奉川驛成名堂曰德星宜晚堂貝瓊宜晚堂記奉化四山環拱南屏一峯特起蓋四明形勝之處筆華堂嘉靖奉化縣志在縣北二十五里江村口宋李元白宅內清華堂戴表元清華堂記奉化萬竹董氏為洲甲族有彥受者築讀書之堂於所居之東來請名余以文選語名之曰清華屏山堂成化四明郡志在定海縣東一里梓蔭山上宋軍官馮柄