body:
  text: 浙江通志卷二百三十五陵墓一禹志傳於㑹稽厯代皆崇禋祀其他王侯将相衣冠劍履之所藏雖厯年寖遠而遺蹟猶存聖朝澤被幽明於先代帝王陵寢暨名賢墟墓時飭有司修葺而且採樵有禁侵軼有防著為令甲懐古之士能不徘徊而生敬慕乎志陵墓杭州府錢塘縣晉抱朴子墓成化杭州府志在葛嶺寳雲寺𫝊詳仙釋吴萊登初陽臺謁抱朴子墓詩人生擾擾間頗覺天地窄我憶抱朴子髙堂睨空碧初陽出山上照破萬古石丹光動鼎鑪霧氣浮冠舄遺書上下卷道妙或黄白老衰及病瘦辛苦為形役豈伊鸞鳳姿終以狐兎宅尸解本無形空飛寧復蹟鄭君曽有傳勾漏恍所厯降子儻可問稚川特未隔幽林來魉魉缺井守蜥蜴神仙果何人海嶽長獻劇世傳老𣆀死吾謂方朔謫虚墳誰所為怪樹獨悲激滿前湖與山秋色落几席因兹些爾魂目送天邊翮謹按陵墓所載大概本省人物居多而名宦寓賢亦間有之其分見於各門者已録專傳或誌銘中辭意與本傳相仿者概不重載其有語渉葬地及葬後有興廢者存之至若封公贈公以及姓氏未列人物者則從墓碑行狀中間棌入爵里事蹟使後之人有考焉晉杜子恭墓萬厯杭州府志在縣北郭傳詳仙釋南齊書孔稚珪傳孔靈産東出過錢塘北郭輒於舟中遥拜子恭墓隋眞觀法師墓杭州府志在天竺東岡開皇十五年師居天竺手標葬處久廢不治宋天禧間王欽若判杭州時訪得之甓甃甚工唐馮孝女墓萬厯杭州府志在孝女北鄉報恩寺後山古城頭傳詳列女唐孝女醜娘墓咸淳臨安志在孝女南鄉傳詳列女吳越國文穆王墓吳越備史王諱元瓘諡文穆葬龍山之南原傳詳武功和凝文穆王神道碑雲起龍驤化為侯王鴻騫鳳翥鶚立鷹揚凜然勍氣綽爾䧺鋩大名之後五世其昌武肅開基奄有呉越恩洽百城名馳雙闕既委招懐復專征伐燾土苴茅秉麾仗鉞尚父棄代元帥承家傳榮襲慶奕葉重葩有典有則去甚去奢威名烜赫事望光華譚藪縱横詞泉浩渺曹植思遲崔瑗書少月夕花朝猿巖雁沼筆落綵牋風生緑篠神傳射訣天富兵鈐龜文月角燕頷虬髯威能伏獸名可愈痁撫衆以惠待士持謙事必有恒政皆求理扶弱遏强先人後已但見偃風莫聞狎水阜康蒸黎廓清邊鄙量陂素廣徳岳彌高禮延耆碩令肅權豪庭趨忠烈府集英髦講論韜畧奬勸勲勞自靖稱藩益勤述職䖍布詔命動遵楷式每陳貢輸常踰萬億表率方隅匡扶社稷功庸罕對渥澤無倫禮優伯舅位極人臣鎔金鏤玉龜紐龍綸永承當代莫繼芳塵禁暴戢兵取威定覇方賴控臨忽聞薨謝雲慘長空星沈永夜號動軍民涕泗華夏初聞訃奏尋輟視朝深嗟旦奭不及松喬倍加贈襚久罷簫韶君臣分至水陸程遥間傑淪亡英賢繼襲擗踊悲摧無所迨及益務撫循加之周給人情既安兵威自戢一方肅静三世輝榮朝宗事大誓志傾城欲光家世上奉聖明願書貞石用顯聲名金玉令人鼓旗良帥徳盛功崇文經武緯述之莫窮言之無愧庶幾乎百世千秋人見之而墮淚吳越國忠獻王墓十國春秋王名𢎞佐諡忠獻太常卿張昭撰神道碑文葬於龍山之西南原傳詳武功吳越孝獻世子墓咸淳臨安志在天竺前山吴越備史𢎞僔文穆王第五子母魯國夫人鄜氏時王年將四十冡嗣未建及生特加鍾愛累奏授兩浙副大使果州團練使國建立為世子年十六薨追諡孝獻吳越王妃仰氏墓咸淳臨安志在龍井山放馬場按表忠觀碑載錢氏墓在錢塘者二十有六在臨安十有一今不可悉考十國春秋元妃仰氏湖州人父仁詮以牙將事文穆王有功積官至寧國軍節度使天福八年冬忠獻王納為元妃吳越忠懿王妃孫氏墓十國春秋妃名太眞錢塘人泰寧節度使承祐之姊周勅封吳越國賢徳夫人宋開寳元年王與妃及世子惟濬入覲加封吳越國王妃是嵗歸國薨葬石人嶺下吳越太尉開府儀同三司諡貞顯薛居正墓咸淳臨安志在靈石山塜前生紫藤遍繞三峰之上其三世孫昂仕至尚書左丞葬天竺山妙法院吳越給事羅隠墓成化杭州府志在定山鄉居山里傳詳文苑謹按研北雜志云謝皇父常至新城故老言羅隠給事塜在縣界徐村之水塢冡碣猶存梁開平四年沈崧志又紹興府志云隠寓居蕭山卒墓在許賢鄉明一統志云隠墓在涇縣東七十里江西通志云羅隠墳在樂安縣羅家潭其說不同未知孰是今仍舊志存以俟考宋郭皇后夏皇后李皇后韓皇后攢宫成化杭州府志並在錢湖門外三里南山之修吉寺每嵗春秋太常卿朝獻官吏職掌兵士守衛皆如㑹稽攢陵之儀宋史新編郭皇后開封人奉直大夫直卿之女孝宗為普安郡王娶焉生莊文太子魏惠憲王諡恭懐後改安穆又改成穆夏皇后宜春人普安郡王夫人郭氏薨憲聖太后以夏氏賜王即位立為皇后諡安恭寧宗時改成恭李皇后安陽人節度使道之女髙宗聘為恭王妃生嘉王即位冊為皇后諡慈懿韓皇后相州人忠獻王𤦺六世孫寜宗立為皇后諡恭淑宋莊文太子攢園成化杭州府志在錢湖門外又莊文園右法因院為景獻太子攢園宋貴妃劉氏攢所武林舊事在鳳凰山奉華寺西湖游覽志貴妃臨安人父懋獻錢二萬緡助軍費髙宗嘉之令建寺以為功徳宋貴妃黄氏攢所成化杭州府志在西蓮瑞相院宋史新編光宗貴妃為李后所妬暴卒宋貴妃賈氏攢所武林舊事在崇恩演福教寺宋史新編賈渉之女紹定五年封貴妃宋知杭州府加兵部侍郎胡則墓咸淳臨安志在西湖龍井廣福院之麓傳詳名臣范仲淹胡侍郎墓誌銘皇考諱彭王考諱濲皆隠於唐季考諱承師以積善稱公少而倜儻負氣格累官工部侍郎集賢院學士進刑部并牧餘杭郡踐更中外凡四十七年加兵部侍郎致仕朝廷命長子通判錢塘以就養享齡七十有七夫人潁川郡君先以壽終子四楷湘桂淮銘曰進以功退以夀義可書石不朽百年之為兮千載後宋直秘閣錢龢墓杭州府志在靈隱天竺兩山之間宋和靖處士林逋墓萬厯杭州府志在孤山之隂元至元間儒學提舉余謙修葺植梅數百本構亭於下明成化十年郡守李端重修邑人于冕沈恒於墓上重種梅樹傳詳隠逸西湖遊覽志餘初逋客臨江李諮始舉進士逋謂人曰此公輔之器逋卒而諮適知杭州為製緦麻服與其門人哭而葬之刻其臨終詩納之壙中葉森修葺和靖先生墓堂記和靖先生墓在孤山宋紹興間建四聖延祥觀詔勿徙墓後賈似道葺祠宇命金華王庭書和靖先生墓五字表墓道林泳為記至元己卯江浙儒學提舉余謙徳撝命森修葺之始於是年四月廿三日成於五月十三日祀以少牢名其軒曰鶴軒植梅數百本於山之上徳撝命森書石焉林景熙過林墓詩回首咸平夢清風自滿湖乾坤一士隠身世此山孤鶴去空秋影梅開尚舊株耳孫今白髪持酒酹寒蕪髙翥拜林和靖墓詩玉涵香骨老雲根占斷孤山水月村薦菊泉清涵竹影種梅地冷帶苔痕生前已自全名節身後從誰問子孫惟是年年寒食日遊人來與酹清尊錢思復拜和靖墓詩梅花岡上酹先生詩句猶同水石清僧飯林鐘時復叩客來野鶴不能鳴百年榛莽餘瀛嶼九月芙蓉似錦城更約雪晴湖上宿笛聲留向夜深横國朝雍正九年糧儲道朱倫瀚重修宋浮梁尉吳天秩墓杭州府志在龍井傳詳文苑宋司徒章得象墓萬厯杭州府志在棲真院側傳詳名臣宋都尉周邠待制周邦墓杭州府志俱在南蕩山宋少師元絳墓成化杭州府志在南蕩山傳詳文苑宋徐申墓萬厯杭州府志在南山棲真院武林舊事申字幹臣號青山翁宋冲晦先生徐奭墓靈隠寺志在靈鷲山傳詳隠逸宋祠部員外郎强至墓武林舊事在小麥嶺今石羊虎猶存子文憲公淵明墓在西溪傳詳文苑宋樞密章楶墓夢梁録在寳石山萬厯杭州府志楶建州浦城人厯官同知樞宻院事授資政殿學士中太一宮使卒賜䘏甚厚命其壻劉何使兩浙共葬事贈太師諡莊敏宋儀王仲湜墓成化杭州府志在西湖顯明寺咸淳臨安志仲湜生有紫光照室靖康間六軍欲推王立之王仗劍以却曰自有真主其徒猶未退欲伏劍死六軍遂與王約以逾月而真主不出則王當即大位王陽許之未幾髙宗即位於應天王間闗而南上屢嘉嘆之主祭濮王子孫視諸邸為蕃衍盖為善之報云宋尉曹將金勝祝威墓杭州府志在雲陽洞右詳見祠祀宋贈直龍圖閣浙西提刑周格墓咸淳臨安志在獨角門歩司前軍寨萬厯杭州府志格子肇丕俱死節贈官勅葬其子祔焉格弟把墓在錢塘縣九里松木岡塢建炎二年把知常州值苗劉之變倡義勤王以功除右文殿修撰卒宋祕閣朱弁墓萬厯杭州府志在智果院後尤文簡公袤作銘宋史本傳字少章徽州婺源人建炎初議遣使問安兩宫詔補修武郎為通問副使至雲中見尼瑪哈尼瑪哈邀説甚切不聽使就館守之以兵紹興十三年和議成得歸入見便殿賜金帛甚厚秦檜惡其言敵情僅轉奉議郎十四年卒成化杭州府志弁卒於臨安府白龜池之寓舍遺命歸葬不果權厝西湖智果院後四十年其從孫熹官浙中卜葬錢塘縣積善峰下熹六世孫慶元路學録圭作永思堂於其側宋太府寺丞知安遠縣陳剛中墓夢梁録在龍井嶺上沙盆塢咸淳臨安志剛中福清人建炎二年登第任太府寺丞應詔上封事主議恢復忤秦檜意謫知安遠縣適有嶺㓂之擾究心招撫感瘴而殁其妻子扶柩抵臨安葬焉宋贈太師諡武僖封鄜王劉光世墓萬厯杭州府志在定山北鄉傳詳名宦謹按咸淳臨安志成化杭州府志皆作鄜王劉𤦺墓考宋史本傳劉𤦺之卒贈開府儀同三司並未封王爵也光世於孝宗朝追封安成郡王寧宗時追封鄜王故從萬厯府志作劉光世墓宋殿歩帥諡襄恪趙密墓咸淳臨安志在西溪欽賢鄉中興以戰功顯嘗為殿歩帥宋都運趙鞏墓杭州府志在徐范村之間宋忠武王岳飛墓輟耕録在棲霞嶺王子雲旁祔焉萬厯杭州府志初飛潜瘞九曲叢祠孝宗時改葬是處墓木皆南向明景泰間同知馬偉修葺取檜析幹為二植墓前名分屍檜正徳八年都指揮李隆範銅為檜檜妻王氏万俟卨三像反接跪墓前嘉靖十四年廵按御史張景刻盡忠報國四大字於石樹墓之南詳見祠祀徐階岳王墓記宋鄂國岳武穆王故有祠在墓所嘉靖乙未春廵按浙江侍御張公慕王之烈率諸吏士造而謁焉既乃觀王遺像讀所作滿江紅詞送張紫巖北伐詩慨然想見王之為人又退而論王之世至所謂以背示何鑄有盡忠報國四大字深入膚裏者於是礱石謂㕘政洪君珠曰為書之謂階曰為紀之階昔讀明道先生書有言曰天下之事須才與至誠合一方能有濟才而不誠雖有忠義功業亦出於事為浮氣幾何時而不盡竊嘗執是評古之人物至武穆王事未始不嘆王之才與誠非尋常號有忠義功業者所能擬也王始起徒歩在諸將中位最卑年最少然而百戰百勝為功最多郾城之捷廬州之援其才大𩔖𩔖漢淮隂侯髙宗之始用王有精忠之褒有中興之委其為知遇亦大率𩔖漢高之於信然信困楚之績拒徹之言雖有可稱而怏怏之私率不免萌於奪爵之非其罪惟王自破劉豫唐州之後銳意欲取中原於時髙宗方惑於奸檜以節制光州則不果以諫阻和議則不納以親灑掃諸陵則不從盖髙宗之用王者已大異於初而王援鞏亳畧汝鄭經營潁蔡為之益力比進軍朱仙恢復之功且垂成矣而班師之詔遽下未幾王亦身及於戮以忠受禍至今論者猶寃之而王怡然就死畧無憤懟不平之意其視信失王則不赴討狶之徴臨刑追咎拒徹之誤者固未可同年而語也然則王忠義功業非激於髙宗之知遇如信解衣推食之云非懾於天下之議已如信悖人不祥之說特其狥國之心真切懇至意以為幸不死於戰即歸