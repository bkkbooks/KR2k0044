body:
  text: 浙江通志卷五十五水利四湖州府烏程歸安二縣附郭霅溪在安定門内即江子滙是也餘不溪前溪北流水苕溪四水總會於江子滙謂之霅溪詳見山川苕溪在城西一流入清源門一流從清源門外沿壕至臨湖門外合霅溪入太湖互見山川横塘在府治南一里在城者謂之横塘城外謂之荻塘太平寰宇記晉太守殷康所開元和郡縣志一名吳興塘太守沈嘉之所建灌田二千餘頃吳興掌故唐開元中烏程令嚴謀達重開荻塘烏程縣城外河道太湖在府北一十八里廣二百八十三里周回三萬六千頃連接四郡界𢎞治湖州府志太湖舊有沿湖之隄多為漊漊有斗門制以巨木甚固門各有牐板遇旱則閉之以防溪水之走洩有東北風亦閉之以防湖水之暴漲舟行有所艤泊官主其事為利浩博沿湖諸漊三十八俱屬烏程舊志修湖漊記云湖漊三十六其九屬吳江其二十七屬烏程惟計家港近溪而闊獨不置牐紹興二年知州王回修之又改二十七漊名曰豐登稔熟康寜安樂瑞慶福禧和裕阜通恵澤吉利泰興富足固益濟皆冠以常字欲其常有是美也乆廢不牐明𢎞治七年布政司參政周季麟度地為隄通漊港備旱潦湖不為害錢福重築湖堤記天子御極之七年延訪能言水利者授工部侍郎徐公貫同巡撫都御史新昌何公鑑經理東南二公既審知東南巨浸在太湖廼巡湖之下流得浦瀆入海者躬督常蘇松三郡疏濬之而以湖之上流授浙江布政司左參政江西周公季麟治之周公乃按湖郡躬厯烏程長興之涯而歎曰是在禹貢所謂震澤者也澤以瀦水而震蕩不定故難為功跨湖蘇松常四郡所瀦既大下流難疏於是得周文襄公所築湖隄故迹而諏衆議興復湖守河南鄭君宏貳守廣東何君文英治農判山西楊君清咸曰此吾守土親民之責也遣長興丞江西胡君健量度地勢自烏程抵宜興界凡七十里咸隄焉其崇為一丈廣與崇仿而加尺者五復竇其隄以通漊港者二十九為石橋於竇二十六旱瀦澇泄不惟不能為害而且為利矣用人力者四千用糧者八百餘石功始於某月落成八年乙夘是嵗秋果大有崇禎烏程縣志萬厯四十二年知縣曾國禎勘得苕為澤國水多岐出其衝則漕艘之所經其僻而四散則田間之所以備旱潦也衆水所滙所稱喫𦂳者有三十六漊港除陳漊等十七港深闊如故無容議修其外應修楊漊等十九處令有田家照畝科派富者出銀貧者出力疏濬通流築圯補壊陸續完竣國朝康熙四十七年奉㫖發帑度地建閘開濬支河港蕩巡撫王然委湖州府知府章紹聖疏濬諸漊港皆使深通除大錢小梅二港因通舟楫不應建閘外餘各建小閘一所時其啓閉以備旱澇雍正八年總督臣李衞委湖協守備范宗堯湖州府知府唐紹祖動給帑銀一千四百六十五兩有竒修濬大錢小梅石塘并諸港之間運河即官河在郡城東大錢港在縣北十八里小梅港在縣北十八里以上二港最大總苕霅西南衆水以入湖西金港顧家港官瀆港張家港一名張婆港宣家港楊瀆港泥橋港寺橋港計家港陽漊沈漊羅漊大漊新涇漊潘漊諸漊謝漊和尚漊又名上水漊張港漊幻湖漊一名官湖西金漊東金漊趙漊許漊楊漊一名王漊義髙漊陳漊薄漊五浦漊蔣漊錢漊新浦漊石橋漊湯漊盛漊一名成漊宋漊喬漊湖漊以上諸港漊俱沿太湖峴山漾即碧浪湖在縣南五里掩浦一名項浦在縣東北一十六里官瀆在縣西二十七里黄浦一名黄蘖澗在縣西南二十八里後漢司𨽻校尉黄向於此築陂溉田梅涇一名東梅堰在縣西南六十里西風漾在縣西十四都吳山漾在縣西北二十一里大苞漾小苞漾俱在縣東北十五里娜兒漾西余漾並在縣東十八里諸墓漾在縣東二十八里西湖漾上湖漾俱在縣東塘之北衡山漾在縣南一十八里謝村漾在縣東南三十六里夾山漾在縣西南九里棲賢港在縣西十一里妙喜港在縣西南二十五里黄墅港在縣西南九里横涇港在縣北二十四里潘店港在縣西三十里謹按吳興地勢最卑水自天目來者俱會流於此而入太湖其間瀦而為浦瀆滙而為漊港疏壅節流皆所以資蓄洩備旱澇也其興利防害禆益於民者不小故𩔖序其名詳列其方備後之稽考焉蘇隄在縣南峴山寺前蘇軾為守時所築互見山川南塘在碧浪湖西所以障郭西灣之水萬厯三十六年知府陳幼學修築多用青石上植桃栁名曰陳公塘朱長春重修南塘改名通塘記吳興西南諸溪谷水并三道會於城南峴山南湖曰碧浪湖水壯決隄為害乆矣萬厯三十三年太守陳公來度塘自山川壇北盡民舍南至百明橋古橋二益設新平橋三凡五内疏支渠廣深之達夾山引漾水瀹分出於五橋外塘辟古之半累髙甃石為堤以捍湖溢又南接古峴山橋廢按志疏復之迤盤山又西至峴山寺門止塘凡修二百五十丈有竒廣二丈六尺隄髙七尺五寸役五閲月而工竣塘内凡鄉區四田畝四萬七千有竒圩圍四百五十有竒徴為記曰通塘志本利也自城達峴山其南連蘇灣文忠蘇公治故堤在焉兩堤於兩太守不朽矣新塘在縣西南自武康山壩達碧浪湖首尾三十里横渚塘在縣西境自西而南謝塘在縣西四里晉太守謝安開蒲帆塘在縣北二里唐刺史楊漢公開青塘在縣北三里迎禧門外吳景帝令發民丁三千人開梁太守栁惲重濬易名栁塘又名法華塘元後至元元年縣丞宋文懿修復程郇修復青塘記烏程包圍震澤苕水自天目來瀠紆曲折過青塘門東北與霅水合而入於太湖泛濫洋溢故為長隄數十里西抵長興以絶水勢之奔潰以衞沿隄之良田以通往來之行旅先是土築嵗必加葺數十年來失於修治隄外水決往來者病於徒涉而沿隄之田亦成沮洳莫有過而問之者至元再紀元之初真定宋君來丞烏程諏咨利病行視田里顧瞻太息曰此非長民者之責乎乃議易以石甃足支永乆首捐己資畚土輦石召匠庀工民歡趨之富者輸財貧者輸力爰築爰削如鑄如埏為橋梁以通水道夏秋漲潦屹有巨防奔轂走蹄旁午於道沿隄之田嵗喜有秋郡人伐石以紀成績是役也肇始於至元元年畢工於二年不費於官不奪於農不侵民力刻石紀功可以無愧丞名文懿字徳淵荻塘在城南一里南門外轉東環城接運河明萬厯戊子己丑間知縣楊應聘修築三十六年知府陳幼學甃以青石尤為堅固朱國楨修東塘記潯水之利害界以塘甃以石中門支派曲折至多最鉅者東塘自東門盡潯水凡七十里履畝而隄漕道出焉管一州六邑之口故潯雖鎮一都會也自潯而上雖名塘實馳道也内䕶田廬千萬戊申嵗大水風衝波激存者無㡬太守陳公於是修東塘凡費一千五百餘金塘成父老列三徳以頌曰傭工曰保障曰利渉我湖田疇旱乾水溢之無恙也七十里屹如亘如而不妄用湖之一錢一粒則公之功大矣國朝雍正六年總督臣李衛動帑委員重修石塘自東門外起至江南震澤縣七十里并集居民培築土塘謹按具區為水之所歸苕霅二水奔赴太湖所當急者開淤塞備隄防也水宜宣洩故有漊港以為之引導時防泛溢故設堤塘以為之障禦至淤諸鄉之田則各築圩岸以備旱澇然瀕湖田苦澇尤多自宋迄今言水利者惟在疏其下流而已此沿湖諸漊所當深濬而其要害則又在吳江長橋與寳帶橋二處疏通則程安長徳四邑均受其利矣康山壩新舊志俱失載見程郇復壩記云崇禎九年知縣劉沂春復康山壩故存其名附嚴有穀吳興水利源委記吳越之水以具區為歸西北受荆溪宣歙蕪湖溧陽之水西南受天目富陽杭湖諸山溪所奔注自禹分三江以引湖入海具區始有所洩東江婁江吳淞江是也後人為縱浦横塘以分釃之又置閘設堰以蓄洩之其源在溧陽五堰之築使西南諸水不入荆溪以注於江五堰廢則宣歙池陽九江之水不西入蕪湖而東注具區矣宋慶厯間欲便漕道築吳江挽岸八十里直截湖口今長橋在焉自是湖流中錮盖五堰開則來者愈迅湖隄錮則去者復緩三江之水上無湖流衝瀉下有海潮沙淤元時東婁二江遂沒吳淞亦哽噎矣明夏原吉開江自崑山開下界浦掣吳江達劉家河以代婁江自華亭開黄浦掣三泖達范家濱以代東江乃五堰不復挽岸時值水灾屢作大端在三江日壅加以湖盗出没居民隨地置壩沿湖漊瀆處處閉壅故諸江浦之水不能歸湖而浸滛於田畝湖之水不能歸海而泛濫於江浦為患可勝道哉今修水利在上流者長橋百瀆為最在下流者吳淞白茒婁江為最惟先治長橋茭蘆壅滯導太湖之水散入昆承陽城三泖諸湖又濬吳淞婁江及大石起屯諸大浦洩澱山之水以入海又開白茒許浦七鴉福山諸塘以洩陽城昆承之水注於江達海又令各縣分督鄉啚導田間之水悉入小浦小浦悉至大浦則瀦泄無阻官民兩利矣至設壩以限盗艘者易以斗閘以時啓閉既便蓄洩以限往來誠兩利也歸安縣城外河道菱湖在縣東南四十二里即陵波塘也唐書地理志寳厯中刺史崔元亮開詳見山川湖趺漾在縣東南二十五里洛舍漾在縣南八十里馬林漾在縣南四十五里錢山漾在縣東南十六里新興漾在縣東南三十里東泊漾在縣南二十四里後莊漾在縣東南三十三里重兆漾土山漾俱在縣東南三十六里青水漾在縣東南四十里龍開漾在縣南五十里和尚蕩在縣東南一十二里潘家漾在二都費家漾在六都破絮漾在十一都十字漾在十二都前漾在十六都慎家漾在十七都真需漾在廿一都三角漾鯉魚漾天荒漾俱在廿二都里墅漾在廿六都雙林漾在三十一都吳興塘在縣東二十三里洪城塘保稼塘連雲塘俱在縣東與吳興塘相接以上俱唐寳厯中刺史崔元亮開雙林塘與洪城塘相接在縣東南五十四里舍山塘在縣東南九十里九里石塘在十九都史涇塘在十八都和尚塘一名䕶浪塘在八里店東長興縣箬溪在縣南五十步長興縣志明初耿炳文築城開壕遂分流於城外繞過龍潭灣會南溪國朝康熙十年知縣韓應恒開濬城河併疏決各處溝瀆其兩傍侵佔之地委主簿鄭世寧責成坊保督近瀆田主各自挑濬四安溪在縣治西南三十里國朝康熙九年知縣韓應恒開濬運河自四安塘口至鈕店橋每年令維新嘉會二區居民以時疏通太湖在縣東北三十里詳見烏程長興縣志宋皇祐元年許遵為知縣會有水害民多流移遵於是興修水利明永樂二年張敏為縣丞修築隄防為民興利國朝康熙四十六年巡撫王然委湖州府知府章紹聖疏濬諸瀆港各建小閘一所雍正八年總督臣李衞委湖州恊守范宗堯知府唐紹祖修太湖諸港之閘西湖在縣西南十五里溉田三千頃塘髙一丈五尺周七十里唐書地理志湖湮廢貞元十三年刺史于頔復之人賴其利長興縣志舊有水門二十四引方山泉注之元和元年縣令權達以方山泉為豪家所堰斥去塘中田決其堰民賴之咸通元年潘䖍為令重修方山泉以興水利民懐其徳今皆成田西莊漾在縣東北十五里大蕩漾在縣東南四十里篠浦在合溪下五里餘魚浦在縣東北四十二里郜浦在縣東北五里通太湖蔡浦在縣東北四十五里下太湖斯圻港金村港蔣家港長大廟港上周港烏橋港謝莊港丁家港鷄籠港杭瀆港盧瀆港殷南瀆港金鷄港釡浦港福縁港石瀆港後村浦竹塘港徐家港百步港新開港花橋港􅔐潑港盧港白茅港竇瀆港逕山港俱在縣治東北通太湖舊傳有七十二港吳越錢氏時沿湖有隄港各有閘嵗乆湮廢所存止此楊瀆在縣東五里防瀆在縣東南四十里一名范瀆盛瀆在縣東五里喬瀆在縣東南四十里周瀆在縣西六十里荆瀆在縣西六十三里大陳瀆在縣北二十里紀費瀆在縣西三十五里黄墩港在縣東南三里