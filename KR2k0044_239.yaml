body:
  text: 浙江通志卷二百四十陵墓嚴州府建徳縣晉開國侯宋興墓舊浙江通志在縣東南十里苕溪之濵建徳縣志元推官宋夢鼎表誌之唐孝子何起門墓建徳縣志在馬目山麓傳詳孝友宋翊忠侯潘世䧺墓嚴陵志在縣西十五里黄巖之麓宋諫議大夫江公望墓建徳縣志在三都江村山麓傳詳名臣宋員外郎喻樗墓萬厯嚴州府志在龍泉庵後傳詳儒林宋户部侍郎馬大同墓建徳縣志在大塘塢傳詳名臣宋推官趙彦肅墓萬厯嚴州府志在拱辰門外傳詳儒林元總管魯顯墓萬厯嚴州府志在拱辰門外鳳凰山明侍郎唐宗魯墓建徳縣志在八都桐溪之涯嚴陵志宗魯於洪武四年由通經秀才授工部侍郎以疾乞歸明㕘議魯謙墓萬厯嚴州府志在武定門外社稷壇前嚴陵志謙字文讓洪武間由人才授刑部員外郎官至福建左㕘議明㕘議傅宗墓建徳縣志在拱辰門外排子山嚴陵志宗字本源宣徳中鄉舉天順元年陞雲南右㕘議明同知黄建墓建徳縣志在十二都江村建初授絳州知州為民除害民思之祔食富文忠公廟後遷松江府同知明副使郎勝墓建徳縣志在八都桐溪鄭家塢嚴陵志勝字汝彬正統七年進士授行人司天順間陞福建按察司副使𢎞治四年卒壽八十四明御史柴文顯墓萬厯嚴州府志在拱辰門外澄溪院前嚴陵志文顯建徳人正統十年進士授監察御史巡視福建明都御史宋旻墓建徳縣志在武定門外裴郭塢傳詳名臣明刑部侍郎徐懷墓萬厯嚴州府志在烏龍山之陽新廟塢傳詳名臣明孝子徐璠墓建徳縣志在大堂塢黄山之麓傳詳孝友明知府郎滋墓萬厯嚴州府志在鄭家塢建徳縣志滋字徳潤勝子明成化丁未進士授南京吏科給事中後出為惠州知府未老乞休明布政使俞夔墓萬厯嚴州府志在龍山鄉裴郭塢屏風山傳詳武功明知縣宋澄墓舊浙江通志在拱辰門外建徳縣志澄成化丁酉鄉科明僉都御史戴東旻墓建徳縣志在城東碧溪塢𫝊詳武功明兵部侍郎宋賢墓舊浙江通志在縣南鄉傳詳武功國朝僉事詹惟聖墓建徳縣志在裏塘坂惟聖字乃庸順治壬辰進士厯陞按察僉事視學江西遘疾終於家淳安縣周越王墓明一統志在縣東北六十五里舊志越王兵敗至此問地名或曰此名角頭因嘆曰吾無所之矣遂卒其衆負土成墳三隴相連各髙十餘丈淳安縣志按本縣惟此一鄉至今為越語婦人必環釵重裙與比隣言語不同然三墳不知是何年代亦莫知為何越王也漢尚書令黟侯方儲墓明一統志在縣治東南墓前有靈應廟唐左臺監察御史張文成有記詳見祠祀晉龍驤將軍汪文和墓萬厯嚴州府志在小金山左知縣嚴貞度重豎碑裔孫汪道昆紀事晉太宰司馬晞墓嚴陵志在縣西二里舊經據新安郡記云太宰墳即司馬晞徙於此而薨遂葬兹地所立三墳髙二丈喪後歸並餘空塜晉尚書洪紹墓嚴陵志在縣東北四十五里天樂觀後其子纂為始新令因葬焉晉兵部尚書上虞縣開國公方操墓淳安縣志在縣東三十里曹湖名杉樹墓詳見封爵陳吏部侍郎何文建墓萬厯嚴州府志在縣東六十里土名萬程詳見祠祀唐始新令邵坦墓嚴陵志在縣東南二十五里現鳳山邵仁詳之曾祖也俗名飛沙墓元和四年翰林學士白居易為記唐處士邵仁詳墓淳安縣志在縣東南五十里清平鄉詳見祠祀呉越處士方昊墓嚴陵志在縣東北五十五里上貴寺前傳詳隠逸呉越太子賔客童頵墓萬厯嚴州府志在縣東二十里仁壽鄉傳詳武功呉越尚書魯椿墓舊浙江通志在縣北一百二十里椿仕呉越為銀青光禄大夫今子孫所藏文穆王手帖及劍笏猶存宋義軍將軍王墓淳安縣志在永平鄉環水灣建炎間擊冦有功吕葵為銘宋楊宇墓萬厯嚴州府志在遼源巧坑宇本開封人宋寧宗楊后大父也徙家淳安因葬焉子永陽郡王楊紀墓祔宋郡馬余宗華墓淳安縣志在縣東十五里青蒿塢口宋承信郎錢嶨墓淳安縣志在縣西七十里嶴坑夫人墓在蛟池弟觷墓在縣西六十里香油塢傳詳武功宋金紫光禄大夫方誾墓萬厯嚴州府志在茶坡東北誾卒命殮以金章葬焉傳詳文苑宋祕閣校勘錢時墓明一統志在永平鄉淳安縣志門人吕人龍誌墓傳詳儒林呉暾融堂先生墓表記先生既没七十有八年而托體之藏蕪穢浸沒行道嗟傷至治元年少府鄭公來治兹邑屬沿府檄過墓下嘆息追慕亟命汛掃兆域祭以特牲伐石甃級樹以雙表然後里俗羣然知吾道之可尊斯文之不墜也暾雖末學嘗讀先生之書以自淑故不敢讓而為之記先生家邑之蜀阜墓在故居之側至治壬戌十月望日方一夔謁融堂墓詩安東束帛此招賢夢冷冬窩又一年已自無人守墳墓空令過客問山川時方大用文公學士亦深排陸子禪回首蜀天青不盡臨風三酹一悽然宋亷訪副使邵源墓淳安縣志在縣西憲司前宋祕閣校理方恪墓淳安縣志在縣東北二十五里進賢里鳳鸞墩傳詳介節宋吏部尚書方逢辰墓淳安縣志在縣西八里安溪資政殿學士文及翁為誌翰林侍講學士黄溍為表傳詳儒林宋大理卿黄蜕墓淳安縣志在縣東三十里合洋傳詳文苑宋御史何夢桂墓淳安縣志在縣東北安樂鄉傳詳儒林明布政使宋興墓嚴陵志在太平鄉桃源興字原仁永樂中厯江南布政使引年歸卒明吏部左侍郎項文曜墓萬厯嚴州府志在縣東五十里安福鄉傳詳名臣明太傅諡文毅商輅墓舊浙江通志在縣南十里仁壽鄉嚴陵志遣官致祭命有司如制營葬尹直為墓誌傳詳名臣明工部尚書諡莊懿胡拱辰墓萬厯嚴州府志在縣西普慈坊賜祭葬傳詳名臣明工部尚書諡康懿徐貫墓舊浙江通志在縣西永平鄉萬厯嚴州府志今改遷屏山傳詳名臣明兵部郎中呉福墓淳安縣志在縣東三十里雲坡小嵩山下福字天錫景泰二年進士明貴州按察司副使方中墓淳安縣志在縣東傳詳循吏明廣東㕘議徐鑒墓淳安縣志在縣西七十里赤石嶺南石塢傳詳循吏明福建左㕘政應顥墓淳安縣志在縣南二十里方村傳詳武功明福建副使周瑄墓淳安縣志在縣西武安橋裏改遷溪南金鈎形之右傳詳武功明江西右㕘議方輔墓淳安縣志在縣東茶園花墳輔字廷臣正統十三年進士明南京兵部郎中何禮墓淳安縣志在縣東北六十里文昌郎堨禮字文敬天順丁丑進士明太僕寺卿方漢墓萬厯嚴州府志在縣東二十五里進賢里鳳鸞墩諭祭葬傳詳武功明山東㕘議程愈墓萬厯嚴州府志在仁壽鄉南塘淳安縣志愈字節之成化辛丑進士明廣西按察使呉倬墓淳安縣志在縣東龍山鄉洽陽金釡山之麓傳詳武功明湖廣右㕘政王宥墓淳安縣志在縣西七十五里蛟池宥字敬之成化辛丑進士明貴州左㕘議方天雨墓淳安縣志在縣東天雨字濟甫𢎞治壬戌進士明廣東布政使王子言墓淳安縣志在縣西七十里溪口髙塘子言字如行𢎞治丙辰進士明湖廣按察司僉事呉欽墓淳安縣志在縣東雲坡四十里合洋金阜塘欽字敬夫正徳戊辰進士明四川㕘政徐楚墓淳安縣志在蜀阜傳詳循吏子應簧墓在縣西十里明陜西亷使徐廷綬墓淳安縣志在六都木𤓰塢傳詳循吏明福建副使方學龍墓淳安縣志在縣東三十里掌坪傳詳循吏明廣東副使呉一栻墓淳安縣志在縣東方塘栻字徳輿萬歴辛丑進士明湖廣副使方尚恂墓淳安縣志在縣東南四十里傳詳循吏明吏科給事呉希哲墓淳安縣志在縣東四十里洒川傳詳武功桐廬縣漢孫鍾祖墓廣輿記在烏石山上鍾呉大帝祖也相傳遇仙得葬地即此宋起居舍人范端臣墓萬厯嚴州府志在釣臺南岸宋衢州軍事判官孫潼𤼵墓萬厯嚴州府志在縣東横河大隠阡傳詳循吏宋處士謝翺墓嚴陵志在縣西三十五里釣臺南岸方鳳題曰宋處士謝臯羽之墓傳詳寓賢名勝志翺遊白雲源願即此為葬地及卒友人方鳳如其言葬之墓傍有許劍汐社二亭宋處士徐舫墓萬厯嚴州府志在霞川之原傳詳隠逸宋濓方舟先生墓誌銘至正丙午正月九日方舟以疾卒壽六十八其年二月某日葬於縣東霞川之原君子稽其自號題曰詩人滄江徐方舟墓表其志也余為之銘曰有才不施一𤼵乎詩日星月露草木走飛人事變遷可愕可悲舉無遁情入我範圍咳唾所及皆成珠璣一旦觀化魂無不之非湧醴泉定𤼵靈芝昭徳之符千載弗虧明廣東按察使羅觀墓萬厯嚴州府志在牛山之麓修撰曾彦為墓誌銘桐廬縣志觀字用賔洪武二十二年貢太學永樂初任廣東按察使明教授俞深墓桐廬縣志在水濵鄉漆樹嶺修撰楊壽夫為墓誌銘傳詳文苑明江西㕘政聞質墓萬厯嚴州府志在鄉關山桐廬縣志質字仲彬永樂元年鄉試入太學明贈少保諡文敏姚夔墓舊浙江通志在金牛山彭時撰神道碑傳詳名臣明布政使姚龍墓萬厯嚴州府志在舞象山嚴陵志龍字訥言夔從弟正統七年登進士歴官福建左布政使致仕終於家明知府俞藎墓萬厯嚴州府志在孝泉鄉嚴陵志藎字廷臣桐廬人天順七年進士授監察御史後為知府致仕歸卒於途明淮府長史濮瑀墓萬厯嚴州府志在質素鄉龍頭山之陽桐廬縣志字彦璧天順七年貢士明都御史諡莊襄俞諌墓桐廬縣志在孝泉鄉黄泥凸之原傳詳武功明濵州知州羅椿枝墓桐廬縣志在質素鄉西村東阜椿枝字日新嘉靖十四年進士國子監博士呉世良為墓誌銘遂安縣唐交州都督李壽墓新定續志或云李燾在鎮基山中壽封遂安縣公宋太平興國中郡守田錫以壽名聞真宗東封詔褒贈前代忠臣於是封壽為忠勇侯唐國子司業余詠墓遂安縣志在六都安福寺前唐遂安丞黄任墓遂安縣志在二都珠墅宋太尉呉承孫墓萬厯嚴州府志在縣西六十里龍津鄉宋吏部侍郎詹儀之墓舊浙江通志在十六都新橋明月菴後𫝊詳儒林宋直祕閣詹至墓嚴陵志在移風鄉新村傳詳武功張栻詹公墓銘猗若人之好修兮懷瑾而為美也不隨俗而風靡兮厲秋霜以為志也羌視仇而勿疾兮已獨斯之恥也紛懷生以自營兮子何艱之避也周旋於羽檄之間兮抑將伸其義也凜自信之不疑兮曾習俗之何睨也勒銘以昭之詔後人之興起也宋縉雲尉諡忠節詹良臣墓遂安縣志在靈巖遷十六都西山菴右傳詳忠臣元孝子余丙墓遂安縣志在六都古山坪傳詳孝友明孝子毛存元墓舊浙江通志在十一都葉嶺金釵形傳詳孝友張以誠毛孝子墓銘山折而髙水滙而長不有困抑胡以為昌少丁家難艱苦備嘗長負竒節志意激昂是啟厥後式穀用光孫枝林立豸繡斯皇以顯其世殆未可量嗟乎東岡使爾遭家庭之不造匪母氏之孤芳孰脱汝于厄迪汝于臧俾爾嗣乃服以啟毛氏之祥是母是子賢哉乎北堂明孝子方雲槐墓舊浙江通志在二都金家隴傳詳孝友明總制汪喬年墓遂安縣志在十四都茂灣林傳詳忠臣毛際可汪公事狀公殉難得㫖䕶喪歸葬道數遇寇剽掠諸從吏謂曰此死襄事亷吏汪公柩也若輩欲尸祝之則請留不然槖中無一物可掠也冦愕然羅拜去壽昌縣唐刺史李頻祖墓萬厯嚴州府志在縣南仁豐鄉石壁下宋少保諡忠簡劉珏墓壽昌縣志在縣治南門城内翁氏宅後珏龍游人宋皇祐間為縣尹大有善政後仕至少保卒諡忠簡壽民數千迎其柩葬於萬松山宋儀真判官胡楚材墓萬厯嚴州府志在縣東三都壽昌縣志楚材字公喬慶厯進士宋國子監丞鄭彦墓萬厯嚴州府志在縣東一都岑山傳詳循吏宋吏部侍郎胡嘉言墓萬厯嚴州府志在縣西九都嚴陵志嘉言一名彦嘉崇寧中進士宋信豐知縣方玠墓壽昌縣志在北門内縣署後玠字純仲隆興進士明吉安知府徐誼墓萬厯嚴州府志在縣西十一都大塘塢傳詳循吏洪伯章徐公墓銘公之生也世際