body:
  text: 浙江通志卷一百一物産一神禹敷土首述職貢凡鉛松怪石箘簵菁茅之屬罔弗具載是豈勤於小物哉葢欲周知品彚俾滋培而長養也浙為禹會之邦沃壤數千里瀕江距海水陸珍錯之物靡所不有識其名而并詳所自出辨厥土宜以前民用亦職貢之義云爾志物産浙江通省舊浙江通志穀之𩔖粳稻糯稻粱黍稷大麥小麥蕎麥􅢸麥芝麻青豆黑豆紫豆黄豆菉豆豌豆刀豆蠶豆羊眼豆虎斑豆龍爪豆蔬之𩔖芥薑芹薤波稜萵苣莙薘莧蔥蒜蒲菘蕨匏茄芊芫荽蘿蔔蔓菁茭白絲𤓰王𤓰香𤓰冬𤓰熟𤓰西𤓰木之𩔖柏松楊栁榆椿槐柘桑烏桕冬青桂棟樸杉桐楓樟櫟柞檫棐檿榕梍黄楊棕檀白杜楮梓果之𩔖梅桃杏榴棗柿榧橙柑梨榛香櫞葡萄林禽山查枇杷甘蔗荸薺茈菰木𤓰花紅梧桐子花之𩔖芍藥牡丹紫薇薔薇棠棣荷荼䕷鳳仙錦帶蜀葵海棠百合木香山茶玉簮芙蓉麗春瑞香鹿水仙山丹杜鵑石巖笑靨兒佛見笑木槿蓼蘋竹之𩔖水竹筀竹南天竹王莽竹蚤筍竹篌竹苦竹木竹猫竹龍鬚竹鳯尾竹箭竹石竹剛竹䕶雞竹篛竹藥之𩔖棘刺花紫葳前胡天明精山黄皮枳實劉寄奴骨碎補細辛黄蘖車前香附莃薟草烏茨菰燈心草桑白皮桑寄生槐花半夏橘紅大㦸百合五味子白芨白斂鳯眼草野菊花山茱萸雞冠子當陸馬鞭草鼠尾草狗舌草蘆根牽牛金線草躑躅花葛茒香決明葶藶薏苡菖蒲千金藤椶櫚子薄荷澤蘭牛藤蒼耳獨活藁本貝母鉤藤香薷兔絲子杜仲大黄蛇牀子地骨皮良薑瞿麥紫蘇山藥荆芥茴香𤓰蔞罌粟土木瓜金櫻子枸杞子金銀花續隨子石膏牛蒡子紫苑羽之𩔖雞鵞鴨白頭翁婆餅焦蠟嘴銅嘴鷀䳓告天偷蒼竹雞雉鵓鳩鵓鴿雪姑黄頭畫眉杜鵑布穀鵪鶉鵲鷹鷂鴝鵒戴勝拖白練拖赤練紺練雀鴉燕鸛鷺青鴛鴦鵁鶄㶉鶒鷗鳬及摸魚兒毛之𩔖牛羊馬驢騾豖犬猫狸貛鹿兔麂麞獺猿獼猴麖野猪松鼠栗鼠鼷鼠竹狗山羊刺蝟虎豹鱗之𩔖鯉鯽鱖鮎鱭鱤鮸䱥魟䲅􅬅楊魨鰍鰻鱣鯖魦鰳䱋䱝鰷章匡烏賊黄饋黄黄顙青魚甲之𩔖龜鼈蚌蛤蝦蟶鱟蜆田螺辣螺烏螄海螄蝤蛑黄甲穿山甲蟛蚏貨之𩔖紵絲綾羅綢絹綿緹繡金箔銀箔錫箔紙桕燭桐油棕漆蔴扇蓆箭弓木屐棕履燈籠油傘謹按物産必志所自出舊志僅列一目是志物而非志産矣浙中山林川澤之産為𩔖實繁然或不必盡見於載籍故先仍舊志總括其目列於篇首而凡分産各屬者咸按籍而備志之如左杭州府穀咸淳臨安志穀之品秔稬麥麻豆粟萬厯杭州府志穀屬凡六一曰稻為秔為稬二曰黍為黄為白為黒三曰稷惟一種四曰麥為麰為䅘為􅢸為蕎五曰菽為黄豆為白豆為赤豆為青豆為黑豆為斑豆為褐豆為豌豆為豇豆為菉豆為寒豆為刀豆為羊眼豆六曰麻為芝麻為胡麻秔稻稬稻成化杭州府志秔有黄稈交白黑鬚赤稻紅稑大黄小黄晚稻早遲芒晚遲芒金裹銀木犀黄初稈黄鵞爪黄泰州紅銀杏白雁來青紅蓮子花蓮子赤芒兒烏早遲芒稬有旱稬羊鬚烏鬚鐵梗馬鬃臙脂金釵光頭蘆花萬厯杭州府志稻之名色甚衆大都不出秔稬二種但早晚不同仁和錢塘海寧種多晚餘杭早晚半之餘縣多早占城稻爾雅翼今江浙間有稻粒稍細耐水旱而成實早作飯差硬土人謂之占城稻宋㑹要大中祥符五年遣使福建取占城禾分給江淮兩浙并出種法擇民田之髙者種之謹按古稱三農謂山農澤農平地農也杭郡自錢塘以西諸山縣皆山田自仁及海皆平地田大抵早種多而晚種少早種所收薄於晚種故㑹城之米大半取給四方是宜廣設倉儲以防踊價職兹土者所宜加之意焉黍萬厯杭州府志黍有黄白二種山縣多種之黑黍種之者少麥咸淳臨安志有大麥小麥西湖游覽志麥嶺宜麥蕎麥萬厯杭州府志蕎麥治為麵土人忌於桕樹板上切食蘆穄萬厯杭州府志或稱蘆粟山縣種之蠶豆萬厯杭州府志豌豆俗呼蠶豆田堘蔬圃皆種之百尺梧桐閣集昌化伯邵王墳側顆大味鮮杭人稱王墳豆赤豆四民月令臘月以赤小豆煮粥杭人風俗也緑豆萬厯杭州府志杭人製為粉最滑膩水浸出芽可為菜食夏月能解暑榖譜緑以色名鮮者為明緑暗者為油緑早種為摘緑遲種為㧞緑杭人喜食豆芽即此扁豆成化杭州府志有黑白二色白者名白扁豆青豆仁和縣志老則炒食嫩者為烘豆稱沙田豆黑豆杭州府志麤者用何首烏煮食能澤鬚髮細者穭豆生於野細而扁者零烏豆俗名馬料豆可肥馬菜武林紀事杭城東園人家四時種菜販賣逺至臨平長安俱船載而去黄芽菜咸淳臨安志冬間取巨菜覆以草積久而去其腐葉黄白纎瑩萬歴杭州府志矮黄菜味美冠諸菜杭人訛為黄雅戒菴漫筆杭州呼黄矮菜為花交菜油菜萬厯杭州府志子可作油故名將花時取其心食最美心去則其蘖叢生花更多子更繁為利倍之臺心菜咸淳臨安志此種春間最盛芥菜咸淳臨安志紫而辣者難得杭州府志芥菜有紫白青油數種紫之味最辛杭人搗其子以醋和之用拌粉食名曰芥辣生菜萬厯杭州府志以油醬和醋拌之可生食莧菜本草綱目有赤白紫三種又有野灰二種灰莧之有紅心者不可食韋驤紅心莧詩色若棲文雉圓如揷繡幢春葩應有並新卉合無雙白菜萬厯杭州府志杭人呼長梗白冬月之菜惟此宜久藏楊萬里食白菜詩新春雲子滑流匙更嚼冰蔬與雪虀靈隠山前水晶菜近來種子闕名西注初食白菜因以晶菜南𤓰農書浙中一種隂𤓰宜隂地種之秋熟色黄如金皮膚稍厚可藏至春食之如新即南𤓰也蘿蔔成化杭州府志大者出錢塘方家峪等山青頭蘿蔔俗名為蘇州兒紅蘿蔔出仁和郊外萬厯杭州府志黄者名湖蘿蔔出仁和山藥咸淳臨安志形如手掌者名佛手山藥茭白農桑譜茭白二種城東田多種之錢惟善食茭白詩西風吹雨飽秋菰卸却青衣見玊膚客裏嘗新成一笑不圖今日見西湖芋杭州府志岸芋也有白有紫葉似蹲鴟本草綱目錢塘最多味薟不可食種芋三年不采則成梠别有野芋名老芋形葉相似根不可食茄草木子一名落蘇土人於花時採葉布路間令踐之則子繁謂之嫁茄咸淳臨安志有一種圓白瑩嫩者名為水茄韮萬厯杭州府志郡城人最貴其初出時數十莖以十餘錢易之薑明一統志臨平出薑萬厯杭州府志仁和小林近蘇家圩多種之東坡雜記余昔監郡錢塘有僧號聰藥王年八十餘顔如渥丹自言服生薑四十年取薑乳蒸餅或作飯和丸食之蔥咸淳臨安志蔥出板橋萬厯杭州府志蔥有一種夏間莖端生數芽者名五爪蔥萵筍咸淳臨安志其菜名萵苣食取其根名萵筍甘露子咸淳臨安志三四節連生如貫珠筍舊浙江通志春筍一名圓筍錢塘古蕩法華山并餘杭出茅筍茅竹所生邊筍夏月從土中掘得之冬筍俗名潭筍杭四時不乏味特甲於諸蔬誠齋詩注臨安人食筍自十月至四月哺雞筍咸淳臨安志出稍早最肥和靖詩烟崖早筍肥是也苦筍咸淳臨安志端午前杭俗多以充饋遺以其性涼也周紫芝劉主簿許餉苦筍詩未肯煩君便指囷且看分筍不論觔此君自是盤中虎空想斑斑箸下人注杭人重苦筍呼為嚇飯虎紫桂筍筍譜錢塘多紫桂筍自餘斑狸緗縹不可勝言燕筍筍譜錢塘多生其色紫苞當燕至時生故俗稱燕筍黄鶯筍夢粱録臨安筍有數名有黄鶯筍白象牙夢粱録筍之品有曰白象牙筍脯餘杭縣新志筍四時不絶其煮曬為脯則曰玉版一曰鹹筍乾而青筍為最蓴杭州府志出西湖初生無葉名雉尾蓴又名馬蹄蓴葉舒長名絲蓴至秋則無人採矣西湖志餘近出西湖第三橋不減湘湖虞淳熈食蓴菜詩玳筵金饌綵舟停取醉明湖酒欲醒戲採緑蓴調碧椀一時輕薄五侯鯖香蕈咸淳臨安志多生山谷松竹間東坡與參寥智果寺得黄耳蕈詩云老楮忽生黄耳蕈是也其大者浄白名玉蕈最貴黒者名茅蕈赤者名竹蕈皆下品蔬譜土人號為香蕈蓬四民月令杭人於二月二日取以煎糕木耳石耳萬厯杭州府志木耳生桑樹者佳石耳生山縣絶壁間蕨粉於潜縣志土人搗蕨根漉粉可以療饑醯蔬元覽臨安有酸角之醯蔬把鮓袖中錦臨安東華門把鮓為天下第一他處效之終不及香豉名醫别録豉出錢塘者香美而濃取中心者佳香椒萬厯靈隠寺志靈山舊産香椒與川蜀無異今無桑杭州府志有女桑山桑出富陽者最佳餘縣接種者亦名富陽桑仁和縣寗公塘所産睦州青四鄉多種此萬年松新城縣志南安鄉仙人石上有萬年松其狀如柏天目松咸淳臨安志松有數種惟天目山者針短而犀健栝子松三針華山松四針袁宏道天目逰記天目山松形如葢髙不踰數尺一株值萬餘錢纓絡栢萬厯杭州府志本不甚大園亭間植之槐仁和縣志葉可薦茶花黄可染色根可作神燭用楮仁和縣志葉茁花㽔並堪作茹造紙練布撚氊烏桕宣德富陽縣志桐洲中沙之民多栽烏桕樹為業秋葉紺紅映江頗稱佳境萬厯杭州府志葉可染皁子可取蠟核可笮油㯶櫚武林舊事慈雲嶺滿山皆㯶櫚武林紀事其筍土人用蒸煨食之味㣲苦楊栁咸淳臨安志湖堤植栁最盛垂者長條可玩峽川志楊園在峽石西方四五里古以其地多生垂楊黄楊錢塘縣志杭人取其木堅膩作梳刻印最佳霜木水經注於潜縣北天目山極髙峻崖嶺竦疉山上有霜木皆是數百年樹謂之翔鳯林青神鳯集平泉草木記木之美者天目之青神鳯集咸淳臨安志此二木名梅名勝志西溪多古梅二月始華香雪霏霏四面襲人宣德富陽縣志包家墅種梅約一里許樹皆數百年物古幹可愛其實亦佳早梅梅譜早梅勝直脚梅吳中春晚二月始放獨此品於冬至前已開故得早名錢塘湖上有一種尤早余嘗重陽日親折之有横枝對菊開之句紅梅咸淳臨安志郡有紅梅閣東坡亦有紅梅詩今土人所種有福州紅潭州紅柔枝千葉邵武紅等種皆多結實綠萼梅咸淳臨安志孤山之梅唐時已著今此花有數品綠萼千葉尤清絶也錢塘縣志西溪錄萼結實尤佳他處莫及鴛鴦梅盤洲集偶得梅一枝色㣲紅而五出之上復有一重皆並蒂雙實杭人呼為鴛鴦梅桃方輿勝覽包家山多植桃春時都人㳺觀最為勝賞名勝志西湖棲霞嶺上桃花色絢如霞杭州府志仁和臯亭山特盛萬歴杭州府志早桃俗曰五月桃最大者曰白桃油桃毛桃扁桃又十月熟者名寒桃李萬厯杭州府志李莫盛於西山滿覺衖花時如雪其名𩔖有青消紫粉鵞黄數種石榴羣芳譜富陽榴實大者如碗咸淳臨安志唐時孤山有石榴花見白樂天詩又靈隠舊亦多海石榴白果舊浙江通志銀杏俗名佛指甲又名白果臨安産者特長大枇杷咸淳臨安志一名盧橘有一種無核者名椒子枇杷出嘉㑹門外於潜黄嶺前烏巾山小錫塘塢出者尤珍白色者上黄次之林檎洪武蘇州府志今呼花紅此種出宋紹興間接種禁中花開或貴戚大官折賜一枝後傳至中吳凡園圃皆植之楊梅天中記楊梅塢在南山烟霞嶺近瑞峰石塢内有金姆家甚盛俗稱楊梅塢咸淳臨安志十八澗亦盛皐亭山産者尤甜舊浙江通志有早色晚色熏色數種東坡詩注杭人呼白楊梅為聖僧棗咸淳臨安志棗出鹽官者最著名然不甚大萬歴杭州府志核小味甜他處不及故名鹽官棗今俗呼羊冠棗又一種山棗名楊桃出昌化縣榧杭州府志山縣多産富陽顔塢為佳以火熯食甚香木𤓰咸淳臨安志土産木𤓰色青而小土人切作片暴乾入藥都人以糖煎名熝木𤓰橘元和郡縣志富陽縣王洲出橘為江東之最仁和縣志橘之美者皆接生子種者不結實宻橘朱彛尊鴛鴦湖櫂歌注杭州塘棲市與石門接壤産蜜橘粗皮而小無核味最甘西𤓰咸淳臨安志西𤓰有青白黄等色其𩔖有金皮沙皮蜜甕算筒等名土人尤稱周家青𤓰皆不若出謝村櫟林者酥白而大西湖㳺覽志杭州月塘皆沙田土宜𤓰宋有周姓者善種之號周家𤓰荸薺嘉靖仁和縣志近産獨山者佳甘蔗咸淳臨安志舊貢今仁和臨平多種之以土窖藏至春夏可經年味不變小如蘆者曰荻蔗亦甘蓮萬厯杭州府志紅花為上白花次之以江干鴻雁池及西湖所産為最都城紀勝聚景園後湖中者名繡蓮極貴藕咸淳臨安志錢塘有西湖下湖者仁和有北新橋北䕶安村産扁眼者最著名萬歴錢塘縣志藕花白者香而結藕菱咸淳臨安志初生嫩者名沙角菱硬者名餛飩菱湖中生如栗様者極鮮秋末古蕩産大紅菱尤甘脆今北關外産者名窰頭菱最著名芡學圃雜疏芡實一名雞頭最補益獨杭州多而佳杭州府志今錢塘之良渚仁和之臨平湖所産特佳西湖者尤勝然不多也可篩為粉周紫芝芡實詩雞頭子熟客新嘗今日空懷各異鄉紅線綠荷香夢裏十年燈火記錢塘牡丹牡丹榮辱志牡丹有錢塘花咸淳臨安志昌化富陽者頗大杭城中吉祥寺東坡曾賞之又有一種冬月開者和述古有詩蘇軾吉祥寺賞牡丹詩人老簮花不自羞花應羞上老人頭醉歸扶路人應笑十里珠簾半上鈎又和述古冬日牡丹詩一朶妖紅翠欲流春光囘照雪霜羞花工只欲呈新巧不放閒花得少休花開時節雨連風却向霜餘染爛紅漏泄春光私一物此心未信出天工芍藥咸淳臨安志艮山門外范浦鎮多植此花冠於諸邑有早緋玉白綴露又有千葉白尤貴海棠咸淳臨安志羅隠為錢塘令手植海棠於縣署王元之有詩紀之王禹偁錢塘縣羅江東手植海棠詩江東遺蹟在錢塘手植庭花滿縣香若使當年居顯位海棠今日是甘棠紫陽花咸淳臨安志禪宗院有山花一本色紫而香無人知名白樂天名為紫陽花有詩辛夷萬歴靈隠寺志唐時靈隠寺有此花鮮紅可愛白居易題靈隠寺紅辛夷花戲光上人詩紫粉筆含尖火燄紅臙脂染小蓮花芳情香思知多少惱得山僧悔出家桂咸淳臨安志有紅黄白三色天竺多有之南部新書杭州靈隠山多桂寺僧曰月中桂也至今中秋夜往往子墜寺僧曾拾得羣芳譜即今山桂天竺最多生子如蓮實離離下垂天竺僧稱為月桂其花時常不絶枝頭葉底依稀數㸃亦異種也湧幢小品紹定間舒岳祥讀書館中中秋月色皎然聞瓦上聲如撒雹啟門視之乃曰此月中桂子也嘗得之天台山中呼童子拾得二升大如豫章子無皮色白如玉有紋如雀卵其中有仁嚼之作芝麻氣味囊之雜菊花作枕清芬襲人其収拾不盡散落甎隙者旬日輒出樹子葉柔長經冬猶秀僧遵式桂子詩序天聖辛夘八月十五夜月有濃華雲無纎翳天降靈實其繁如雨其大如豆其圓如珠其色有白者黄者黑者殻如芡實味辛識者曰此月中桂子播種林下一種即活夢粱録木犀有黄紅白色者甚香且韻頃天竺山甚多天長橋慶樂園有數十株士夫嘗往賞此竒香昔年高宗在徳夀宫時賞桂嘗命畫工畫為便面製詩分賜羣臣本草拾遺桂子大於貍豆破之辛香相傳月中下也靈隠寺種得一株北方無之山桂猶可入藥況月桂乎謹按桂有金色銀色之分有早花晚花之别惟天竺月桂諸説載在舊籍耆民亦往往見之他處則無豈山靈使之然耶别有一種花後結子纍纍又一種四季桂一年數花皆不常有山茶咸淳臨安志馬塍栽接有一本而十色者蠟梅咸淳臨安志萬松嶺上多有見東坡詩此花亦有數品以檀心磬口為佳木芙蓉咸淳臨安志蘇堤岸湖多種木芙蓉秋如霞錦今放生池尤盛娑羅花名勝志昌化千頃山生娑羅花初夏開時其香逺聞凌霄全芳備祖錢塘西湖有詩僧清順居其上自名藏春塢門前古松各有凌霄花絡其上子瞻過之為作木蘭花詞蘭蘭譜杭蘭其花如建蘭香甚一枝一花葉稍闊有紫花黄心色若臙脂有白花黄心白若羊脂甚可愛用横山黄土揀去石塊種之澆以羊鹿糞水雞鵞毛水若澆灌得宜來嵗花發其香勝新栽白者名蓀出法華山毛詩陸疏廣要江南人以蘭為香祖又云蘭無偶稱為第一香蘭之種甚多如竹蘭石蘭伊蘭崇蘭風蘭鳯尾蘭珍珠蘭玉柱蘭不可枚舉凡吳越皆有之水仙名勝志海寧縣錢山産水仙花薔薇咸淳臨安志園圃多用以編籬屏有寳象月季等名玫瑰杭州府志杭人採花及腦麝作香囊虎林雜記花販持盤唱賣以助閨襜晨粧酴醿咸淳臨安志有黄白二種白而心紫者尤香瑞香咸淳臨安志舊真覺院有此花今馬堘種最多大者名錦薫籠山礬遵生八牋生杭之西山三月着花細小而繁香馥甚逺俗名七里香鳯仙仁和縣志其色不一白者佳杭人浸酒飲之能好顔色真珠咸淳臨安志土人名蘸水青條白蕊粲然可愛茉莉消夏録臨安六月士女汎湖多挿茉莉徘徊咸淳臨安志此花極香苑中以雜腦麝為佩帶珠菊菊譜南宋臨安有長沙菊滿堂金夀安真珠孩兒白全芳備祖花色極多臨安花市菊花時製為花塔楊萬里經和寧門外賣花市見菊詩老眼讐觀一束書客舍莩葭菊一株看來看去兩相厭花意蕭條恰似無清曉肩輿過花市陶家全圃移在此千株萬株都不看一枝兩枝誰復遺平地拔起金浮屠瑞光千尺照碧虚乃是結成菊花塔蜜蜂作僧僧作蝶菊花障子更玲瓏翡翠六扇排屏風金錢裝面宻如積金鈿滿地無人識先生一見雙眼開故山三徑何獨懷君不見内前四時有花賣和寧門裏花如海觀音菊百菊集譜天竺花是也五月開花頭細小其色純紫枝葉如嫩栁幹之長與人等白蘋萬歴靈隠寺志生湖中色白香清紅蓼萬歴靈隠寺志生於湖濵俗呼水紅或作水葓指甲花草花譜生杭諸山中花小如蜜色而香甚用山土移歸盆中亦可供玩金鉢盂靈隠寺志生湖中單瓣金蓮徑山志出寺中放生池移植他處即槁靈隠寺志生湖中重臺堂花癸辛雜識馬塍藝花如藝粟非時之品真足以侔造化凡花之早放者名曰堂花其法以紙飾宻室鑿地作坎置花其上糞土以牛溲琉黄盡培溉之法然後筧沸湯於坎中俟湯氣薫蒸則扇以㣲風盎然盛春融淑之氣經宿則花放矣按堂一作唐木竹筍譜靈隠山其筍可食今人採作杖可愛或與􅦖同𩔖鶴膝竹咸淳臨安志出靈隠山節宻而内實略如天壇藤間有突起者故名鶴膝新婦竹談薈出武林山其竹圓直韌可以作篦筍譜可為篾笱天親竹談薈浙中有天親竹末皆兩岐斑竹萬厯靈隠寺志有斑文竹種自逺來峽川志硤石東山有斑竹園竹幹最鉅而紋最深朗不減湘妃禾人購以織簾作器具最工雅其在丹井下坡者幹細而少紋矣紫竹大滌洞天記青梓山多紫竹嘉靖浙江通志杭州紫竹宜為簫管雙竹筍譜今武林山西舊為雙竹院所産修篁皆對抽並節王子敬竹譜云錢塘扶竹葢此雙竹即扶竹也是竹為筍有合歡貌碧玉間黄金夢粱録竹品有碧玉間黄金文武竹餘杭縣前志心實性堅又名雪竹文山出者可作筆管武山出者可作箭桿曲竹紫桃軒雜綴洞霄宫生曲竹可為杖杭州府志仁和縣安隠寺有曲竹可為杖林次麟曲竹詩直節稜稜是此君耳孫却以曲為名首陽山下知難種只可斜封向管城石竹杭州府志勁利可削為刀紺箬大滌洞天記山周囘百里多生紺箬葉大無骨樵者往往臨㸑得之有好事者攀縁幽討終年不可得筍籜餘杭縣新志廣竹所脱者為花筍籜苦竹所脱者為苦筍籜箭竹所脱者為青籜皆有利於物用茶咸淳臨安志嵗貢見舊志錢塘寳雲菴産者名寳雲茶下天竺香林洞産者名香林茶上天竺白雲峰産者名白雲茶錢塘縣志翁家山亦産茶最下者法華山石人塢俱名本山茶蘇軾僧怡然以新茶見餉報以大龍團詩妙供來香積珍烹具大官揀芽分雀舌賜茗出龍團曉日雲菴暖春風玉殿寒聊將試道眼莫作兩般看龍井茶煮泉小品武林諸泉惟龍泓入品而茶亦惟龍泓山為最其上為老龍泓寒碧倍之其地産茶為南北山絶品謹按杭郡諸茶總不及龍井之産而雨前細芽取其一旗一槍尤為珍品苐所産不多宜其矜貴也天目茶茶經杭州茶生臨安於潜二縣天目山者與舒州同煮泉小品天目固次品葉清臣云茂錢塘者以徑山稀今天目逺勝徑山而泉亦天淵也洞霄次徑山徑山茶夢粱録徑山採穀雨前茗用小缶貯之以饋人昌化茶紫桃軒雜綴昌化所産大葉如桃枝栁梗其味乃極香酒鶴林玉露頃在臨安太學同舍以思堂春合潤州北府兵㕑以慶逺堂合嚴州瀟灑泉飲之甚佳余曰不剛不柔可以觀徳談薈宋南渡御庫有流香三省激賞庫有碧香思春堂殿司有鳯泉祠祭有玉練塠京醖有雪醅真珠泉皇都春有美堂中和堂皇華堂榮邸有萬象皆春秀邸有慶逺堂曲洧舊聞杭州酒名有竹葉清碧香白酒花醖晏公𩔖要仙姥墩東晉初有裴氏姥居此採衆花醖酒薔薇露老學菴筆記禁中供御酒名薔薇露賜大臣酒謂之流香酒梨花春酒譜杭人趁梨花時釀酒名梨花春白樂天詩青旗沽酒趁梨花鹽咸淳臨安志漢置鹽官吳王濞煮海為鹽之地也泊宅編元豐初盧秉提㸃刑獄㑹朝廷議鹽法秉謂自錢塘縣楊村上流接睦歙等州水勢稍澹以六分為額楊村下接仁和縣湯村為七分葢取海水煉鹽所謂熬波者也湯村則刮鹻以淋滷織竹為盤塗以石灰故色少黄竹勢不及鐵則黄色為嫩青白為上黑即多滷或有泥石不宜久停嘉祐雜志吳春卿遷臨安召舖戸詰驗鹽法云煮鹽用蓮子為候十蓮者官鹽也五蓮以下滷水漓私鹽也私鹽色紅自燒稻灰染其色以倣官鹽於是嗅以辨之茯苓武林舊事小麥嶺無垢寺偃松下有茯苓因名泉為茯苓泉杭州府志山縣俱産麥門冬舊浙江通志筧橋所産以肥大者為佳益母草咸淳臨安志生龍井山谷中最佳亦名草天麻於术萬歴杭州府志白术以産於潜者佳稱於术清異録潜山産善术以其盤結醜怪有獸之形因號為獅子术黄精於潜縣志黄精為潜藥上品出天目藁本圖經本草杭州有之葉似白芷香又似芎藭五月有白花七八月結子根紫色黄皮木名勝志雷峰塔産黄皮木咸淳臨安志生於潜菝葜本草綱目浙人謂菝葜又名王𤓰草根曰金剛根地龍藤本草綱目生天目山樹繞蟠屈如龍故名小天蓼本草綱目天蓼生天目山四明山樹如梔子冬月不凋能逐風而小者為勝千金草咸淳臨安志生仁和蠒橋羊躑躅夢粱錄根名天門冬生錢塘富陽甘菊萬厯杭州府志菊花有甘苦二種又野菊土人於立冬日多採以煎湯浴身又用之囊枕極清目今城牆産野菊香味清美及時採之勝於諸品山石膏嘉靖仁和縣志石膏山出石膏如雪鹽硝西溪叢語出縣東十里煉成樸硝又有冬月自地中湧起硝通透光瑩者名霜花亦名劍脊硝藥中用為元明粉紫雪之屬寒水石咸淳臨安志輕者寒水石硬者石膏生南髙峰塔下礪石嘉靖仁和縣志臨平山細礪洞出礪石本草一名越砥俗稱羊肝石石燕昌化縣志雲谷山石燕洞其深莫測時見石燕飛出夢梁録九邑山洞中皆有之竹瀝舊浙江通志竹品甚多惟淡竹苦竹三種煎瀝入藥良赤萍富陽縣志姥岑山上有沼赤萍生其中映水如濯錦荻西溪梵隠志渦水曰蒹葭深處秋深荻花如雪苕名勝志苕溪發源天目經餘杭達錢塘溪岸多苕花菖蒲蒙齋筆談錢塘郎簡築别館於徑山下即澗傍種菖蒲數畆嵗採取以自餌山中人目之為菖蒲田菰米爾雅翼苽蔣草也生下澤者根既相結嵗久則并土浮於水上土人謂之葑田刈去其葉便可耕植其苗有莖梗者謂之菰蔣至秋則為此米大抵葑是其根菰是其葉耳夾麥青四民月令清明時土人取以搗汁和粉為果餌食之金星草嘉靖仁和縣志金星洞在鳯凰山洞生金星草獨帚草萬厯杭州府志一本可為一帚出山縣虎鬚蒲萬厯杭州府志杭人多植於盆以充玩好苔大滌洞天記丹泉之傍苔蘚常作紫暈烟草杭州府志一名䕊菼本産於閩今土人多種此為業黄雀餘杭縣新志麥黄時有細雀漫天而集名曰黄雀土人以絲網罥之美逾常味鵓鴿四朝聞見録東南之俗以養鵓鴿為樂羣數十百望之如錦灰褐色為下純黑為貴以粟食之既則繫金鈴於腰飛而颺空風力振鈴鏗如雲間之珮山雞名勝志海寧縣茗山多山雞飛生續博物志浙中有鳥名飛生狐首肉翅四足如獸飛而生子即隨母後人有難産以其爪安胸腹間立驗𢷬藥禽大滌洞天記𢷬藥禽止有二伏藏深樹間晝夜間鳴宛然搗藥聲馬咸淳臨安志昔錢氏牧馬於錢塘門外東西馬塍其馬蕃息當時號馬海謹按馬非杭産今㑹城有滿漢八旗駐防以及鎮撫水陸各營皆牧馬水草得宜故馬亦蕃庶麂萬厯杭州府志似鹿而小皮甚細土人製以為鞾獺萬厯錢塘縣志土人取獺皮為女帽名一盞燈玉面貍咸淳臨安志於潜昌化山谷有之猫咸淳臨安志都人畜猫有長毛白色者名曰獅猫不捕鼠徒以飾觀鰣魚咸淳臨安志六和塔江邉生者極鮮腴舊浙江通志四五月間富陽江中有之石首魚萬厯杭州府志一名黄魚産於海四五月中杭人載冰出洋販至省城貿之王右軍帖魚首有石是野鳬所化篛魚成化杭州府志其形似篛葢比目之𩔖俗書作鰙非時出惟富陽五月有之鯽魚杭州府志烏背紫鱗産西湖者尤鮮美横魚餘杭縣前志四月從太湖逆水上大者百觔石斑魚嘉靖浙江通志生山澗中身有斑味鮮美土䱯魚成化杭州府志或作吐哺舊浙江通志土步魚清明前者為佳逆魚餘杭縣前志産苕溪中長寸許懷子滿腹過五月不復見五色魚名勝志吳山井有五色大魚數十時出㳺泳人不敢取又玉泉寺方池清澈可鑑蓄五色魚游泳如畵金鯽魚能改齋漫録杭之西湖有金鯽魚投餅餌則出然不妄食也蘇子美詩云松橋叩金鯽竟日獨遲留東坡遊西湖詩云我識南屏金鯽魚重來拊檻散齋餘皆紀其實金銀魚花史昌化縣千頃山上有龍潭産金銀魚禱雨多應金魚桯史今中都有豢魚者能變魚作金色以洿渠之小紅蟲飼之初白如銀次漸黄久則金矣又别有雪質而黒章的礫若漆曰玳瑁魚尤可觀惟杭人能餌畜之咸淳臨安志今錢塘門外多畜養入城貨賣名為魚兒活萬厯杭州府志其異品者若梅花㸃鶴頂紅二色分之𩔖名甚衆説者謂魚本傅沫而生即紅白二色因雌雄相感而生花斑之魚以溪花郎與白魚相感而生翠色之魚又取鰕與魚感則魚尾酷𩔖於鰕有二尾三尾者金色蛇萬厯昌化縣志千頃山盤蛇石中有金色小蛇人呼為聖蛇蛙四朝聞見録杭人嗜田雞如炙即蛙也舊以其能食害稼者故有禁久習此味人不能止售者刳冬𤓰以實之寘諸門謂之送冬𤓰侯鯖録水雞蛙也水族中厥味可薦若雞爾雅注云水雞本草名坐魚其性好坐也石蛤成化杭州府志似田雞而大俗呼為錦襖子生崖谷有水之處蝦咸淳臨安志湖生者殻青江産者色白海寜縣志海蝦白色邑人製之獨善名曰酒發蝦蝤蛑咸淳臨安志産鹽官即黄甲蟹咸淳臨安志西湖舊多葑田産蟹土人呼湖蟹絶難得蟹譜錢氏置魚戸蟹戸専掌捕魚蟹蟹畧潮蟹出江中蟛蜞輟耕録海寧皆喜食蟛蜞螯名曰鸚哥嘴以極紅者似之故也武林紀事錢塘江邉有小蟹潜於沙穴中謂之彭月寒食人家多醃食之又海邉出一種比彭月差大食之令人瀉痢又一種足生毛者名曰毛蜞尤不可食蟶咸淳臨安志産鹽官者絶大海螄杭州府志螺屬杭俗立夏以為應時之味以椒花灑之無尾螺永興寺志錢塘西溪永興寺前放生池産無尾螺徑山志徑山下澗沼中螺俱無尾蜂萬厯靈隠寺志黒而大者名九里蜂綾咸淳臨安志白文公詩紅袖織綾誇柿蒂注云杭州出柿蒂花者為佳内司有狗蹄綾尤光麗羅咸淳臨安志杭之羅有花素二種染絲織者名熟絲羅尤貴舊浙江通志杭州出水緯羅綢咸淳臨安志有績線為之者用絲則熟而輕纎謹按杭綢有一等最輕纎者用湖水漂浄宜於染色大紅尤佳以杭絲多錘錬故也如帽纓一種亦較勝於他處絨絲等線亦然是皆杭之專産志物亦宜備焉錦夢粱録内司街坊所織錦以絨背為貴剋絲咸淳臨安志有花素二種擇絲織者故名紵絲咸淳臨安志染絲所織有織金閃褐間道等𩔖綿綢紫桃軒雜綴硤石人積梅雨水以二蠶繭繅絲織綢有自然碧色名曰松隂色其法本宋寧宗宫禁製號為天水碧又紫薇山産綿綢極精號紫薇綢機紗咸淳臨安志機坊所織有素紗天浄三法新翻粟地紗畫絹咸淳臨安志機坊多織唐絹幅狹而機宻畫家多用之綿夢粱録以臨安於潜白而細宻者佳棉布仁和縣志精曰棉粗曰絮凡鄉間皆為之多出筧橋一帶萬厯杭州府志卉織為棉布出海寧硤石者視他縣為佳綦布成化杭州府志有麻苧二品青白間花藤紙元和郡縣志餘杭縣由拳村出好藤紙咸淳臨安志富陽有井紙赤亭山有赤亭紙蠲紙朝野𩔖要宋時臨安有鬻紙者澤以漿粉謂之蠲紙油紙錢塘縣志錢塘出油紙竹燒紙餘杭縣新志出南建上髙斜坑以竹浸之灰水中碓成紙祭祀焚以代帛鼠鬚筆萬歴杭州府志􅤜䑕俗名松鼠其鬚可為筆墨太平寰宇記昌化縣晚山山悉松木真墨所出龍涎香寶貨辨疑有伏古雲頭青燕三等其法傳自南宋能改齋漫録有士人嘗客錢塘江漲橋後至河南友人寄以龍涎香有江漲橋邉花發時之句答云記得吳家心字香土檀香上天竺山志乃樺樹根香極清逺燈舊浙江通志有紗絹紙及羊角等製挂絲雲麓漫鈔紹興中以小竹編聨籠以衣畫風雲鷺鷥作枕屏一時無名號曰畫絲好事者大其制施於酒席以障風野次便於圍坐人競為之今名挂絲盖以絲挂於竹骨之上也扇夢粱録大街關撲有異色影花扇小市周家有摺揲扇春風堂隨筆今世所用摺扇亦名聚頭扇南宋以來咏此者甚多竹簟仁和縣志桃枝竹皮滑而黄可為蓆蚌珠太平寰宇記錢塘縣明珠浦通浙江生蚌珠金箔萬厯錢塘縣志金箔銷金之尤者今民間首飾器用多用塗畫嵗縻不貲宋時曾禁轉鬻錫箔虎林雜記錫箔獨杭産城内造者不下萬家鉛粉嘉靖浙江通志出杭州銀硃嘉靖浙江通志出杭州槖籥沙西溪叢語仁和縣出在縣東四里海際之人採用鼓鑄銅錫之模諸州皆來採亦猶邢沙可以碾玉也漆明一統志昌化縣出柿漆仁和縣志柿有一種名油柿浸得油名曰柿漆用以油紙可隔水柿漆杭人用以製扇名蜀府扇質粗耐久近人又以柿漆漆紗頗宜暑服窰器輟耕録南渡後修内司造青器名内窰模範極精為世所珍浙甕太平寰宇記錢塘縣亭市山餘石鄉村人悉作大甕今謂之浙甕假山石宣和石譜杭州石出土中色多潔白扣之無聲其質無峰巒勢偏多磊塊若桃李大尖銑或硃砂牀有稜角望之光明精瑩頗宜裝綴假山臨安石宣和石譜臨安縣石出土中有兩種一深青一㣲青其質甚怪無尖峰髙十數尺小者數尺温潤而堅扣之有聲間有質樸從而斧鑿修治磨礲増巧頃嵗錢塘千頃院有石一塊髙數尺估值五百餘千置方斛中四面嵌空嶮怪洞穴委曲石罅間植一枇杷巖竇中嘗有露珠凝滴目為醜石政和間取歸内府此石之尤者丹砂石名勝志錢塘定山風水二洞中石子有紅㸃如丹砂持出即隠瑪瑙石西湖游覽志瑪瑙坡在孤山東碎石文瑩若瑪瑙謹按昌化縣産圖書石紅㸃若硃砂亦有青紫如玳瑁良可愛玩近則罕得矣揩光石輟耕録製髹器用揩光石磨拭即雞肝石也出杭州上柏三橋埠牛頭嶺青石萬厯杭州府志錢塘南髙峰産青石土人採為金銀錫箔墩極光膩又用為搗衣砧及誌石碑石之𩔖謹按省城離龍入首發脉九曜山實源於南髙峰上映火曜鑿石常致火灾是以官禁採鑿白泥餘杭縣前志出白泥山水澄過白如粉用以飾布舂米又繪畫者以為粉地石灰萬厯杭州府志凡近山産石處皆燒造其多莫如錢塘上四鄉及富陽之盛磚瓦萬厯杭州府志仁和餘杭皆造薪炭臨安縣志臨邑地出薪炭結筏轉輸蚊烟萬厯杭州府志蚊土人以艾烟褁紙熏之輒避發燭輟耕録杭人削松木為小片薄如紙鎔硫黄塗其頂名曰發燭又曰焠兒陶公呼為引光奴今又易名火寸以焠寸聲相近也湖上土宜萬厯杭州府志起於宋時嬉游湖上者競買泥孩鸚哥花湖舩等物囘家分送鄰里名之曰湖上土宜夢粱録每嵗七月七日貴宅及士夫皆出湖上買磨蝎藥又名磨㬋羅孩兒悉以土木雕塑更加綵裝闌座下以桌架之用青緑銷金桌衣圍䕶或以金玉珠翠裝飾尤佳浙江通志卷一百一
