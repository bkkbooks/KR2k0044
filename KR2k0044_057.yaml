body:
  text: 浙江通志卷五十八水利七台州府臨海縣杜瀆河在縣東一百五十里承恩鄉台州府志海水漲入溝澮成瀆廣袤二三里溉田百餘頃民甚利焉國朝雍正七年總督臣李衛檄台州府知府江承玠開濬并築堤以禦鹹潮修建七閘以為蓄洩曰輕盈曰三石曰塗下曰嵩浦曰西浦曰竹嶼曰推船溝由是數千頃砂磧斥鹵之地俱成沃壤百步溪在縣西北六十里赤城志前後二灘石險湍激俗號大小惡溪舟者病之宋淳熙中令陳居安命工淬鑿始無患台州府志明洪武二年郡守馬岱疏鑿别道七百餘丈後邑紳蔡潮募工重修之舟始無患易名為大善灘芳溪在縣西三十里台州府志流出栝蒼山土民於下流為十二圳溉田甚多江隄在府城外元至正九年重修周潤祖重修江隄記元盡隳天下城郭獨台城不隳備水患也城下為堤又捍城也按台襟江帶河南滙為龍湫盤石踞江面大水西南萬壑水至直𢷬盤石怒濤横嚙城下至與潮汐鬬勢益張宋慶厯中城決西南民半入魚腹城距今滋久隄且弗固至正九年達嚕噶齊僧珠總管達嚕噶齊特穆爾同牧是邦選善任事者六人授以方畫給以義助錢輦石髙山取灰於越外聨大木築之抵堅以壮其趾内積巨石累之極深以果其腹地之卑者封之而致髙壤之虚者除之以布實亢其背而不澱奠其壆而不潄不澱則外不淫不潄則内不訌延袤崇廣周孔堅縝視昔倍蓰焉鹽塘姥堀塘交塘俱在寧化鄉明洪武二十四年辦事官孔良弼監築嶺裏塘水塘上湖塘官市塘觀山塘象龕塘和尚塘仇家塘章家塘漩塘道士塘上猷塘俱在太平鄉明洪武二十八年人材鄧𢎞逺開築泉水塘興國塘俱在安樂郷鄧𢎞逺開築廣化塘在瑞仁鄉鄧𢎞逺開築清塘在延夀鄉鄧𢎞逺開築忻家塘在重暉郷明洪武三十年人材王整開築井頭塘在承思鄉浦北塘在保樂鄉枕坑塘長灣塘廬嶴塘金山塘施家塘林家塘化山塘董家塘山灣塘茭塘古灣塘俱在太平郷王整開築嶺下塘在太平鄉明永樂中通判陳巖修築白竹塘和尚塘俱在重暉鄉龍疉塘在保樂郷蔡嶴塘横山塘寳花塘俱在長樂鄉明陳巖修築髙湖堰洋嶴堰吳承有堰下堰吳超堰長潭堰黄肚堰中沙堰俱在大固鄉明洪武二十四年辦事官孔良弼監築芝溪堰清潭堰洛西堰下村堰俱在承恩鄉明洪武二十八年人材鄧𢎞逺開築盧家堰朱家堰俱在太平郷石倉堰注潭堰湧泉堰俱在保樂鄉湧泉堰在清化鄉龜溪堰在承恩鄉俱係鄧𢎞逺開築方溪堰左橋堰童坑堰伍溪堰俱在太平鄉明洪武三十年人材王整開築茅竹湖堰下嶼堰溪川堰俱在太平鄉方溪埭在太平鄉黄嶼埭陳官埭俱在明化鄉廣濟壩在保樂鄉清潭壩在承恩鄉赤繆壩潘嶴壩俱靖安鄉東湖閘在崇和門外閘下之水沿城濠南達於江嵗久淤漲自築壩通明橋東畔引溪水仍入東湖因并濬濠深廣倍之横溪閘鳯橋閘嶺下閘俱在長樂鄉明洪武二十四年辦事官孔艮弼監築古溪閘汪家潭閘能仁塘閘蓮橋閘賴嶼土橋閘俱在保樂郷總兵楊文築囘龍閘在保樂鄉茆湖砩竹家砩羅家砩黄湖砩江家砩葛家砩俱在太平鄉明永樂中通判陳巖修築吳家砩烏石潭砩路西砩道塲砩光明砩丁巖砩大川砩馬磡砩韓坑砩俱在安樂鄉定光砩在義城鄉黄家砩嚴店砩於家砩沙砩橋下砩十女籮砩俱在靖安鄉黎巖砩在清化鄉于山砩在延夀鄉通判陳巖修築廣福塘陡門在承㤙鄉永慶塘陡門鎻鋪莊陡門雙陡門俱在保樂鄉黄巖縣官河在縣東南一里赤城志自南浮橋南至温嶺一百三十里廣一百五十步又别為九河各二十里支為九百三十六涇以丈計者七十五萬分為二百餘埭其名不可殫紀綿亘靈山馴雉飛鳬繁昌太平仁風三童永寧八鄉溉田七十一萬有竒建閘十有一以時啟閉曰常豐清渾斗門蛟龍鮑步長浦俱屬黄巖周洋回浦永豐黄望金清今𨽻太平萬厯黄巖縣志宋紹興九年令楊煒賦功開深淳熙元年令孫叔豹復濬之越十年丞劉文直又濬之又十五年丞何坦濬之又二十六年令蔡範按視疏治常平使者齊碩為請於朝得㫖分命鄉官士民濬之王居安重濬官河記黄巖縣為田可百萬畝而水鄉之田實居大半言水利者惟濬河置閘二事而已而二事又復不審不宻昔之為河者慮未及閘也是之謂不審其為閘者慮未及河也是之謂不宻元祐以前初未有閘大率為埭以堰水頗為髙田之利而下田病之水潦大至下鄉之民十百為羣挾梃持刀以破埭遂有鬬爭格殺之事於是鄉先生羅公適提刑本路始議建閘酌髙下以謹啟閉解仇怨以全鄉井意則美矣然繼述匪人諸閘既立開時常少閉時常多潮水一石其泥數斗潮汐淤塞寖成平陸時當巨浸閘雖啟而流實壅於是下田被害反咎夫閘之閉水曾不若埭之可以破決其洩水易且速也柬嘉蔡君範來宰我邑深究水之利弊初年遂疏決閘内外諸港使水有所洩明年遂開濬田間諸河稍令廣大使水有所瀦又用葉森議建為爬梳之法設長鐵爬及輥江龍因潮之方退合人力以鼓蕩之泥淤乗流而下力少而功倍此不特於河有功而閘亦永利矣元大徳己亥知州韓國寳又復濬治明嘉靖己亥郡守周志偉濬之增置永通閘周志偉請開河疏臣竊見黄巖太平兩縣負山瀕海形如仰釡雨則衆流奔趨頓成湖蕩稍旱即諸原隔絶輒成斥鹵故水利之在兩縣尤為切要宋元祐間提刑羅適開河置閘地始可耕淳熙九年提舉朱熹奏請官錢增修諸閘繼之勾龍昌泰精思力行遂迄成効今仍在黄巖者五閘長浦鮑步蛟龍陡門委山是也分𨽻太平者六閘金清回步周洋黄望永豐細嶼是也潦則洩之旱則蓄之潮則捍之而乂立為爬梳之法以時洗蕩之經畫區處至為詳備其間田畝約計七十餘萬盡為膏腴景泰天順間兩次差官修築民獲其利𢎞治以來有司廢不之講啟閉不時旋復壅塞頻年旱澇束手無謀臣到任初訪之父老士人皆云此河不復民無生日臣於去年冬督同黄巖縣知縣方介太平縣知縣曾才漢往來相度故閘雖存諸河淤塞率與田等遂行兩縣起倩人夫協力開濬又見各閘去海頗逺潮淤日積未免有尾塞不通之患乃請巡按御史傳鳯翔動支無礙官銀於近海之地建閘一所竊惟諸閘之復不惟旱澇有備兩縣糧運皆由此逹較之往年海運陸運風波之險人力之繁利已數倍但數十年間旋修旋塞其最為患者海潮耳海水一石其泥淤數斗積之旬日即以丈計最要者啟閉耳兩縣去閘頗逺率難照應臣查得黄巖縣南監地方先年設有河泊大使一員専管沿海課米仍復此官使之兼理諸閘責之啟閉爬梳各以其時為此具本差吏奏聞新河在縣北五里萬厯黄巖縣志宋開禧二年里人杜思齊開鑿天賜河在縣東南五十里溉田千頃簇路塘在縣西五十七里大澤塘在縣西北四十五里僧慈保興築淨土埭在一都新塘埭在二都建山埭陳牛埭俱在三都陡門僊埭在十七都原名陶家埭趙家埭在茅畬鐵騎廟西南髙家埭西僊浦埭鄭戌埭孝順埭俱在二十四都楊公埭新涇埭石湫埭髙公埭邱家埭俱在二十八都周家埭在二十九都洋嶼埭在五十一都長浦埭在五十四都鄭公埭水墈埭俱在六十一都聞郎埭在六十二都章師埭蛟龍埭俱在六十三都僊浦埭在六十四都觀木埭鮑步埭在六十五都東濟砩在縣西六十里蜆溪頭砩在縣西三十里黄水埠砩在縣西三十五里陸家巖砩在縣西三十四里道院後砩將軍廟前砩張湖砩俱在縣西三十里下嶼砩在縣西三十二里楊溪砩在縣西四十五里北岸砩在楊溪砩下烏巖砩唐家砩錢嶴砩俱在縣西十五里上陳砩在縣西四十七里横涎砩在縣西四十八里白巖砩謝嶴砩俱在縣西五十五里大巖砩在縣西四十八里溪東砩吳佛洋砩俱在縣西五十五里板砩沈家砩壇頭砩俱在縣西六十里寧溪大砩在十都避水嶺砩在八都木杓砩在十七都巖潭砩在十九都于洋砩在七都大嶴砩在十二都箬笠潭砩嶼頭砩俱在九都青草砩在十一都常豐清渾二閘在縣東隅宋元祐中提刑羅適建淳熙十二年淛東提舉勾龍昌泰言黄巖縣舊有官河其支流九百三十六處皆以溉田原有五牐久廢不修今欲建一牐需費二萬餘緡明年六月昌泰復言黄巖縣東地名東浦紹興中開鑿置常豐牐名為決水入江其實欲令船過每船納錢以充官費一日兩潮一潮一淤纔遇旱乾更無灌溉之備乞戒自今永不得開鑿放入江湖絶後患繼而李謙李大性又重修焉彭椿年重修黄巖諸閘記黄巖為壯邑境之瀕於海者率三之二故其地勢斥鹵抱山接塗川無深源易潦易涸非資於畎澮之利不可也官河貫於八鄉為里九十支涇大小委蛇曲折者九百三十六其洩水至於海者古來為埭凡二百所足以䕃民田七十餘萬畝元祐間羅公適持節本路因其埭之大者建置諸閘今之黄望石湫永豐周洋皆其遺蹟也嵗月滋久前後興修者往往功力不至隨成隨壞遂謂諸閘終不可建惟漕運幹官謝敷經郷士文汝績陳謙徐弗如陳緯深知其利病淳熙間攷亭先生朱公及西蜀勾公昌泰相繼為常平使者按行田野憫閘事不修於是用其謀請太府錢及出度僧牒為直一萬四千緡勾公又自以本司錢六十緡成其役乃檄寜海丞永嘉林季友邑丞四明劉友直董其事又委士人分領之武學博士蔡鎬於規模條畫尤所究心自甲辰春首役至乙巳孟冬訖事所建者六回浦金清長浦鮑步蛟龍陡門是也增修者三黄望周洋永豐是也連嵗之間民享其利追念先賢始事之勤相與築堂肖像而祠之所以報也嵗在甲寅提舉李公謙以永豐之閘又復廢淤從而新之用是叙其始末以告來者元大徳中知州韓國寳重修舟楫往來隨潮大小以司啟閉明嘉靖壬子築城跨河而東設陡門於河國朝口僅容水之往來舟楫不通二閘雖存無所用矣康熙九年總兵阿爾泰濬河未久復淤西城閘在二十一都元大徳中知州韓國寳建石湫閘在二十五都俗呼委山閘宋羅適建洋嶼閘横塘閘俱在五十一都鮑步閘長浦閘俱在五十四都宋朱文公議建元大徳中修羅川閘在五十六都里人余端甫建正統中其孫廷美修之王欽修建羅川閘記邑治南行不一舍近曰羅川壤地夷曠居民以耕稼為業然而土性易涸無他陂池渠塘以聚水每當春夏之交陽色稍亢農輒以旱告雖極力於山壑間注汲之終莫能濟其地有隠君子余氏端甫深以為病遂不惜重費召匠氏治木石之材當水之通處築閘一所以蓄限之廣八尺二寸深一丈四尺舖砌兩岸各逺五十餘步物用俱堅緻由是一鄉之内不勞餘力而灌溉之功無不徧隠君之鄉號常稔焉厯久閘毁去嵗自春涉夏不雨秋卒無成鄉人思隠君不可復作嗷嗷然無可控告者而隠君之嗣孫廷美慨然曰此吾先世事也可不思所以繼之乎捐已貲數十金修復如故間有不沾其惠者又築埭以廣之用是逺近見開莫不交口稱頌詣余文以記之蛟龍閘在六十三都宋朱文公議建元大徳中重修明嘉靖庚子令方介濬之逾年復塞陡門閘在六十三都宋朱文公議建後徙於遷浦元大徳中重修永通閘在縣南五十里明嘉靖己亥郡守周志偉建東浦陡門在常豐二閘河口南陡門在應秀門車浦陡門在西城下以上三陡門明嘉靖壬子築城跨河建之以通水道謹按黄巖宋時所建諸閘今分𨽻太平者俱詳見太平縣天台縣玉湖在縣西十里廣百步長五里溉田百餘頃俗呼馬湖何嶴塘羅家塘林家塘俱在一都山頭塘上方塘古塘公塘俱在二都勝湖塘芽園塘黄公塘俱在三都巖頭塘董石塘大横塘肇慶塘俱在四都新宫塘在五都淨塘金家塘鮑磚塘永豐塘慶濟塘俱在六都大碟塘童公山塘俱在七都