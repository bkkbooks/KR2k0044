贈精勾股法於弓步中照畝通攤徵額無虧而官田官地偏枯之纍坍江空號虧田之患及姧胥那移飛灑之弊一時盡剔其法有原造丈量册有魚鱗册有原造業主册有歸戶實徵册其丈田有鈔弓有木弓有竹篾弓鈔弓以鄉尺六尺為準木弓以鈔弓二弓為準田之短者用之篾弓以鈔弓二十弓為準田之闊而長者用之以田準稅以稅乘田闔邑便之劉紹恤臨安縣志安樂人進士知臨安嚴明廉敏吏畏如神尤加意學校拓宫牆濬泮池力增科舉額破格禮士所著有臨安集林大輪舊浙江通志字西峰莆田人隆慶間知餘杭縣一意撫循適觀察使徐某巡縣取篆函意在得賄吏以此白大輪叱曰觀察之謂何乃以空函進凡數易函竟不納賄黃從律舊浙江通志為杭州通判浙西水災發賑銀三千餘又準各府錢糧蠲停改折留抵賑荒佐郡守分賑足遍村聚親自散給民賴以全其他發姧擲伏尤不勝計薑召舊浙江通志四川廣安州人萬厯初令錢塘剖決若神接縉紳以禮一千以私辭色俱厲均徭清賦立鄉約置義倉百廢具舉劉元瀚海寧縣志貴州新貴人由鄉薦為杭州府同知寧邑海塘隨築隨圯三臺咸臨相視屬元瀚董其役以庚午四月受事擇能吏五六人分督之時時躬巡海上課勤惰為殿最其法以木匱盛巨石鱗次櫛比復用木樁夾持內外工稍就緒七月初海水復溢不為民害蘇湖海寧縣志太和人萬厯四年任海寧令時海鹽海嘯寧塘盡圮漂廬舍溺人無算巡撫徐栻議修築而難其人湖適至即委之湖定議擇本縣官民之廉幹者令各認丈尺編字號酌難易為裒益尅期興作懸賞格以課督之三月而役竣事半工倍焉鄭日休舊浙江通志字舒軒閩縣人萬厯初任海寧教諭旬試月會尤重行實諄諄勸勉見士以非公溷有司者召而訶之或遭枉抑必力為白訓導沒於官貧不能喪日休為之殮他若賑貧士婚葬輒割俸豫之唐際盛舊浙江通志字士瑩福建莆田人萬厯中知杭州時治中别駕及令長多不自檢際盛以威稜接御之為政馭吏者什九馭民才一二誦聲遍野升杭嘉湖道錢塘令以妄取市物民不從拘於獄將夜斃之適際盛入省市民歡呼曰得重生矣令聞解印綬去陳堯典舊浙江通志蒼梧人萬厯間任於潛潔已愛民士貧不能試者輒資給之邑南浮溪宣歙孔道也每山水驟漲行旅艱阻堯典捐俸置渡田楊偉餘杭縣新志號鼇山福建晉江人由舉人萬厯十年任餘杭歲飢請以預備穀賑民不待報輒發倉守難之偉曰飢者待餔能須臾緩耶督學來試偉爭餘杭人材多而取數少請復未汰時額從之管九皋富陽縣志字鶴野廣德人萬厯十一年以舉人知富陽縣催科不擾民自樂輸斷獄片言豪強斂迹修學宮勸民樹植修築隄堰皆利及百年擢監察御史塢明昌舊浙江通志湖廣漢陽人令錢塘沉毅寡言笑與客就坐嘗三易茶賓主不交一言而退先是編役蠧胥為姧以貧下充見年一月三受笞而豪富者不納如故明昌每一戶給單一凡丁若干田地蕩若干銀若干分為四限納一限則截單一角謂之截角單不納者執單聽比掾胥豪猾之弊一清朱光祚仁和縣志湖廣江夏人萬厯乙未進士令錢塘攝仁和才氣睿敏遇事片言立斷又得以其餘接賢士大夫課諸生月有試試文夕入晨出殿最不爽催征示以限有先限及限輸者令無造比鄉民安堵薦擢吏部司封郎樊良樞仁和縣志字致虛江西進賢人萬厯甲辰進士令仁和與人推誠開肺腑無所隱徵比以大義勸之不事笞撲民亦感其悃愊爭先輸納厯遷浙江提學以不作魏璫祠碑解印綬歸聶心湯舊浙江通志新淦人萬厯中令錢塘事至即決庭無留牘與臺使者言利害可否必得請乃已適南湖水溢錢邑欽賢諸鄉被災最烈於是建化灣塘次築閘次議濬南湖次建捍江塘民思其德黃鼎象臨安縣志南安人以舉人任臨安令愛民重士纂修邑志時歲歉申請當道題準改折漕糧季概富陽縣志六合人萬厯二十二年由貢生知富陽縣長厚有幹才多行善政崇學校疏鹽引革稅弊民蒙其利林恭章福建通志字爾肅莆田人萬厯進士知海寧縣邑苦解糧大戶營脫輒令小戶當之恭章議津貼法令民計畝入錢役遂得均厯湖廣右布政使任才欽富陽縣志晉江人萬厯二十八年由鄉舉知富陽縣釐剔賦稅宿弊敦崇名教闢説約堂與諸生講道課業邑中節孝者旌禮之以勵風俗劉洪謨仁和縣志南昌人萬厯乙未進士選嚴州建德令調仁和士民奉法聽約束無敢怠故事撫軍牙旗及繩歲一易曹吏以告洪謨曰吾且視之曰旗與繩俱未敗浣而新之可也稅事起一日市民鼓噪欲犯中貴人幾釀大變洪謨輕車出諭以利害輒散去中貴人亦德之每事就折斷焉程汝繼餘杭縣志字敬承婺源人由進士萬厯三十年知餘杭吏懾其威民愛其慈儒學乃法喜寺故址外高內陷特為高其基重建之升南刑部主事嶽方昌化縣志南充人以大理評事出知昌化縣時礦事擾民方力請上司議將門市額稅永為規則作礦息事寢民賴以安王橋富陽縣志字榮豫夷陵州人萬厯三十二年知富陽縣明敏練達重士體抑豪強徵輸有方胥吏懾服重造學宫修城隍廟清理沙地號能吏厯貴州按察使姚之蘭舊浙江通志字汝芳桐城人萬厯中由進士知杭州丰裁卓然訟無留獄接士以禮煦然如坐春風中一時稱為氷鑑去之日郡人立德馨祠於吳山及西湖兩處戴日強餘杭縣新志號兆台蒙城人由舉人萬厯三十八年任餘杭邑南湖自嘉靖後塘堰漸圯為姧民盜決漲塞為平陸占佃者蟠結種植其中天目諸山水驟發湖不能受南鄉十八里之民漂溺幾半而錢塘延被其害日強至悉置豪猾以重法釐舊疆躬率民盡闢湖址縱橫十字培原隄各五里亘湖中既令土之出有所容而亦藉堤之力以暫緩洪波衝激之勢於是陡門函堰之制畢周各設壩夫守之而湖復故余猶龍昌化縣志字敏初廣東順德人由舉人萬厯四十四年任昌化專以惠恤民民有爭訟諭以忿恚可忍當思縣門不可入訟者感悟悉罷去每農月課勸農蠶俾婦女毋往廟寺遊觀邑野清靜周宗建仁和縣志字李侯吳江人萬厯癸丑進士選知德清縣調仁和十年一審役主者多不平譁然爭於廷宗建適涖事父老竊相語曰侯仁且廉讆言徒自譸張耳盍議定而後入衆皆曰諾及入宗建語曰役均乎皆應曰均第二里三里皆對如前宗建喜顧掾釃酒插父老花旌之其後此者役舛錯未善也顧間日而議定及期盡三百餘里役無不均者擢拜福建道御史忤魏璫詔獄瘐死崇禎初贈太僕寺少卿諡忠烈楊春枝富陽縣志雲南人萬厯四十六年以舉人知富陽縣持大體練達有斷吏不敢欺修城池治街道政聲大著龎承寵舊浙江通志字星易吳江人天啓間知杭州和易近人坐堂斷事或民懦氣懾口格格不能吐承寵令其盡言無畏或姧宄巧詆喋喋利言勝人則整威嚴以臨之嘗言周禮五聽氣聽為微正欲聽其氣耳有兄弟訟者髮垂白承寵詰曰異母弟昆耶對曰一父之子也承寵曰今訟當非汝兩人心必中婦言乃至此兩人驚悔皆叩頭謝罪而去仕至江西布政使顧謙服杭州府志字民服天啓三年為昌化令課農桑興學校值歲飢多方勸諭設糜粥飢民賴以存活里民解公帑抵府為庫吏所蝕藩司嚴檄督縣謙服抗辭陳守請逮吏嚴訊守恚曰知縣何不代訊耶謙服受命請刑具立鞫於府廳傍即從吏家追獲原帑解司咸服其神馬用錫餘杭縣志字晉和晉江人天啓三年由舉人知餘杭縣夏大旱步禱甚勤凡再旬不雨用錫以為吾方為民籲帝而尚督徵施笞朴豈克謹天戒意耶停徵三日而大雨歲遂以有年嶽虞巒舊浙江通志武進人崇禎間知杭州善聽訟不事鈎距而事必得情及去郡有坐獄於庭者稍不得理即曰使嶽侯在當不至此董葵陽舊浙江通志威海衛人任杭州通判崇禎中署富陽篆凡徵收條賦令民自函投匭吏胥不得上下其手知里催差催擾民盡革去其法檄本人自催間有三催後期者始發役追之更不得額外立加耗名林垐海寧縣志字子野侯官人崇禎進士授海寧令邑之袁化鎮有李刁三者故大家奴素以黠稱乘間煽諸毒怨於諸大家者揭竿起其勢洶洶垐降牒某日詣鄉約所講約密縳刁三至庭下立杖殺之曉諭通衢以元凶既除餘悉不問一邑安堵民來欣事或對簿必告勉以孝弟廉讓久之民以及垐訟庭為恥去之日陳其裝於庭藥裹書籖而外惟絹素四端而已繆九鳳舊浙江通志如皋人崇禎中任於潛下車即問民疾苦釐剔夙弊先是潛設里役凡官司徵發皆取給焉既久吏緣為姧民甚苦之九鳯作放里歸農録甚便操守嚴介門無私謁韓鼎新昌化縣志字又銘江都人崇禎間任昌化諭值徽郡寇亂躙入官舍苛索金帛欲強繫以去自刎死郭光詹舊浙江通志晉江人崇禎間知於潛廉威特著讞獄率多破械歲編丁田皆自衡定催科以漸生平一介不茍常鬻家田以自給其清介如此秩滿遷湖廣黃州府判楊梯舊浙江通志四川嘉定人崇禎中任於潛居官明斷時山邑盜賊竊發梯廉得首惡數人立斃諸市民賴以安顧咸建舊浙江通志崑山人崇禎中令錢塘先歲大祲司農以粟入為殿最催科如東濕薪值糧限者比戶懸罄往往雉經倉門外猶捕子弟抵償咸建下車分兩稅為十限貼於門令同甲提諭之終不以符屬胥吏民緩徵得生後以節著唐自彩臨安縣志四川人崇禎間以貢士知臨安嚴明廉介後殉節國朝嚴正矩湖廣通志字方公孝感人明崇禎癸未進士順治初授嘉興推官判決明允庭無滯牘捐俸糴粟以活飢民升杭州知府禁暴安良保全屬邑士民戴之厯戶部左侍郎致仕歸杭州府志正矩號潔菴知杭州慕蘇文忠為政名其齋曰雪堂郡有女尼出入豪貴為姧每出兩袖籠香時人稱曰香姑正矩廉其狀置諸法李人龍昌化縣志字光宸深澤人順治三年由舉人知昌化先是昌化陷於寇以徽人帥應璧行縣事人龍至寄署臨安西墅檄諭昌民曰爾等故稱向順為一時叛寇脅從第能協心遵化他無所恐由是士衆趨附餘賊猶依據山頂人龍親帥兵壯討捕諸受撫者令各歸農業邑境遂安嘗為民申免寇逋田賦什九行取禮科給事中辛卯典試浙江張文光錢塘縣志字譙明祥符人明崇禎戊辰進士順治三年令錢塘浙閩初平山藪未靖協勦之兵絡繹旁午少不合意則譁文光撤公座設酒饌首宣朝廷用兵之意徐及小民困苦之形詳為開諭多歡飲而去民賴以安奏最擢吏科給事中費國暄餘杭縣志字松崖無錫人進士順治八年知餘杭縣性溫雅慈愛然持法峻有犯者未嘗少貸閭里豪黠相戒逺避先是邑承明季之亂姧宄嘯聚山藪南北兩鄉有賊首盛貴章賢等聚黨數千白晝焚掠國暄部署丁壯八鄉勢相聯絡凡盜欲有所劫者輒預知之捍禦有備同防將王鼎新相機堵勦搜斬甚衆民始獲安秦嘉系海寧縣志字公緒湖廣京山人順治九年由貢生知海寧發姧摘伏綱紀肅然先是里中夙蠧巨憝抗賦窩訪通洋窩盜實繁有徒嘉系窮其根株翦其羽翼民害始息開浚市河修學校葺邑乘建義冢清豪占吏治稱首云嶽鍾淑江南通志字天濤武進人武穆後裔順治壬辰進士授仁和令省會衝疲鍾淑力栽供億積困以蘇擢吏部主事升比部郎假歸舊浙江通志鍾淑令仁和日召父老詢之曰長單法善乎曰甚便其稱不便者獨掾役耳往時每比責現年顧現年一身力不能代伏地受笞花戶逍遙罔聞是以長單為便鍾淑遂力行之官民皆利洪有度新城縣志字子汪山西人順治十年由吏員授新城尉勤於職事辛丑三月白頭賊自淥川抵縣劫掠富室有度聞警出追至母子嶺賊分竄潛匿山谷至夜復前後擁圍有度奮力禦敵被害其妻撫棺痛哭不食而死習全史舊浙江通志陜西同官人順治間任杭州府同知漁臨關姧宄與關蠧通籍交關噬民全史下車即為剖禁諸暨某持兩斷足訐告不休全史曰此必夜行私竊為失主所折奈何誣人某驚服投兩足於江訟遂息以解軍儲至衢勞瘁卒無以為殮總督李率泰分俸給之始克歸櫬虞育粹昌化縣志字含美東明人進士順治十三年知昌化率先課士簡刑勸農昌邑向取本山木造屋無稅各蠧勾連關差踵門科屋稅輿馬遍邑中造屋數十金稅費且倍蓰育粹力請兩院永革之民賴以寧令昌邑十載升工部虞衡司主事朱永盛富陽縣志號泰寰陜西城固人己邜舉人授富陽知縣攜二僕襆被至官以清釐宿弊為己任胥吏憚之堂事畢輒與士民咨訪利弊令至必行數年間修城隍署廨開北城河立永濟渡修恩波橋築三墩以捍之時山寇未靖以恩惠招徠之納降者無算審役之期均編有法貧民賴以息肩卒於官邑人為衰服三日柩歸白衣冠送者數千人戈珽舊浙江通志山西平陽人康熙四年知杭州府潔已愛民強毅精敏人服其明尤以崇儒重道為已任與士子講學不倦梁允植錢塘縣志字承篤真定人以恩貢生知錢塘有幹濟才時杭郡之患惟逃人營債為最急二者皆不逞之徒為之勾引允植廉得之於是嚴保甲以察窩家令自首貰其罪營債則專責之勾引之人民乃蘇甲辰閩變總督李之芳移鎮三衢巡按田逢吉督兵城守咸以允植為才命佐軍興調兵食支應滿漢大兵解餉及火炮鉛彈軍器前後運用船隻計萬有八千餘號夫役不計其數俱出召雇民無怨咨遷袁州府同知題留以同知攝縣事事平擢延平府知府許三禮海寧縣志字酉山河南安陽人順治辛丑進士任海寧令修濬城隍立社倉建義孰濬四境塘河通漕資溉公私賴之特闢莊婆堰一帶塘路至石門界以通挽運建正學書院朔望率紳士講學其中凡地方應行事宜無不實心舉行以循卓內擢官至禮部侍郎靳襄名宦留祀册遼東人康熙二十二年任杭糧通判舊有開倉樣米及杯盤諸陋費盡行革除恪遵官收官兌以蘇民困嚴押辨丁糧艘依限抵通升理事同知統馭有方尤重文學在任七年與諸生課試論文捐俸以資寒士登賢書者接踵他若禦火災贖難民掩遺骸施丹藥善政不一孫育珩名宦留祀册遼東人康熙二十二年令新城潔已奉公杜絶請托延接諸生必以禮首懲豪惡犯法者裁革里胥陋規却茶商餽送新文廟設義學每朔望率師生及里之老幼咸集公所宣聖諭講復傳聽講人等再四諄復一時士風丕振民俗畢敦龎又新邑山峻地狹水源易涸難以灌溉田禾乃於農隙之時親往督修舊堰以便蓄泄永昌一鄉向因少堰每苦旱育珩相度形勢開渠引水傾囊助工築砌堰壩民因號為孫公堰西關火育珩於街市叩天祈止火遂息遇亢旱屏輿從曝赤日中徒步行數十里雨立沛不及避衣盡溼因冒寒成疾卒於官民肖像祀之至今舁像禱雨無不應者浙江通志卷一百四十九
