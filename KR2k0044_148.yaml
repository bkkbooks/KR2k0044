body:
  text: 浙江通志卷一百四十九名宦四總轄國朝張存仁舊浙江通志號完真鑲藍旗人順治二年隨大軍定浙江授巡撫擢總督先是鎮江敗卒竄走浙濱南屏白塔居民多被劫掠城中率走避村落存仁至傳集薦紳士民撫諭安定之方國安據險立柵江中存仁與戰於五雲山白塔嶺纍勝之乘勢逐北國安東走明年三月存仁集艨艟於江中肄習水戰六月從七條沙渡江江東遂定後兼轄福建調直𨽻山東河南總督贈太子太保諡忠勤李際期舊浙江通志字庚生河南孟津人進士順治二年任浙江參議督理學政時值鼎新際期立意振興學校培養人材論文以理脈清真為主屏去一切靡縟故所貢拔皆一時名流士風丕振擢參政備兵寧台釐姧剔弊振紀肅綱勵精案牘訟無寃抑厯升兵部尚書諡僖平王顯兩浙鹽法志字純伯直𨽻曲周人前丁丑進士順治二年任兩浙巡鹽御史時國朝立法創始顯首請禁私販以通商定經制以起課特旨允行又疏陳鹽政要務在招商恤竈二事前朝已掣鹽斤分散各府州縣概以私鹽繩之則商本虧而不來槩以引鹽寬之則國課缺而非法惟見鹽計引按引徵稅既不虧商又不缺課而商可漸次招徠竈戶水鄉草蕩或被勢豪侵占或苦課稅重疊逐一清查蠲減而竈可次第復業申明掣驗之規分别銃毁之法規制井然具有條理皆見施行佟國器名宦留祀册奉天人順治二年任嘉湖兵備道禾郡西連太湖東亘三泖萑苻多匿姧國器悉心巡察勦禦擒偽長興伯吳日生偽都察院朱天定招撫白腰黨陸汧等合勦陳萬良等巨寇悉平再任浙江按察使時浙東初定叛獄繁多平情讞鞫釋枉矜疑全活無算後升江西巡撫復調任浙江熟悉瀕海情形抵任即招降偽都督廖明旗勦滅海逆阮六等海疆寧謐浙民賴之蕭起元杭州府志字復初遼東錦州人順治三年由常州知府升僉都御史巡撫浙江時江南初定起元一意撫綏與民休息而嘉湖薦紳家僕或借通海一事挾制其主控告逮繫者甚衆起元知其誣多置之重刑保全善類人心獲安八旗官兵鎮守省城軍民雜處詔禮工二部擇建駐防營起元定於城西一隅築城以居由是旗民判不相擾張杰舊浙江通志字前川遼東人順治三年浙東初定以總兵鎮守定海時海寇盤踞舟山與內地山賊相煽杰勦撫並行復會勦舟山克之移鎮黃巖率溫州水師出海從寧海大將軍恢復舟山有功調防京口康熙元年為浙江水師提督加太子少保朱思義舊浙江通志遼東義州人順治五年任巡海道僉事時浙東初定武辨縱恣思義嚴飭士卒痛懲告訐之風民得安堵思義形狀短小風裁卓立毅然以鋤強扶弱為已任後病卒人皆惜之杜果杭州府志字登聖江西新建人順治進士八年巡按兩浙時浙東雖平而吏胥貪黷之風未絶果入境先去其太甚者嘗謂人曰古者以法治吏教而後誅朝為豺狼夕遷改焉則為麟鷟可也其行事剛正而不暴如此熊維傑杭州府志號奇宇遼東鐵嶺人順治八年為浙江按察使為政簡而周剛方而不劌杭城兵民雜處常多訐訟望見旌節歡呼曰熊公來事當白矣維傑平情斷決俾兵民兩服而去省城近大江凡貨物乘潮而下艤舟即須腳力肩負遲則為洪濤所撼肩負者故遲應以索高值維傑繩以法出示嚴禁姧遂息張儒秀杭州府志號英寰遼東人順治九年任浙江左布政使公明威斷其尤著者則有開銷軍國朝儲移解馬價二事軍儲者明季徵以給軍者也力裁軍為民田皆𨽻於有司部咨按籍全督儒秀請具陳析官用民欠軍費名目而軍儲之賠纍一清馬價者舊例驛遞差使南馬協濟歲徵幾數十萬中飽難稽儒秀請於督撫曰馬價多寡莫定由各省支給遂那移影射耳莫若解部部定其值凡諸省馬價在本處地丁錢糧內開支由是積弊始豁時患私鑄盛行儒秀以為錢本輕則私鑄多官錢壅乃請重其制又西湖兩堤各插水簾以漁利或巧借官佃以為名儒秀盡去其水簾杖懲之始相戒不敢犯僅數月遷去杭民思之張元璘舊浙江通志遼東遼陽人進士順治十年任金衢道衢為八閩孔道海氛未靖檄在衢養馬前驅已至元璘單騎詣軍前備陳地方艱苦狀得移養省城衢民安堵李率泰杭州府志字夀疇遼東人順治十一年以兵部侍郎總督浙閩駐節衢州有方略善用兵士卒營壘未成不先就舍甘苦與同故偏裨已下多畏愛之時山陬海澨尚餘寇孽聞率泰智勇皆斂矛戟投冶鑄中或鑄為鎛耜父老咸慶太平矣後專督福建纍官少保兼兵部尚書諡忠襄杜漺王士禎杜漺傳字子濂山東濱州人順治進士十三年任分守溫處道參議處在萬山之中俗僻陋而溺女淹喪錮婢三事尤為民病漺朔望集士民反復開諭喪葬婚嫁之禮一從儉約女婢滿二十歲責其擇配俗為之變遷副使備兵通薊康熙四年復補巡視寧紹海道時初改文武相見禮往往相抗不下漺至即交歡大帥兵民帖帖亡詬誶者官至河南驛傳鹽法道李兆乾舊浙江通志陜西階州人順治十四年以參政分守杭嘉湖道太湖連接蘇常素稱盜藪官兵捕則遁去退則剽掠居民兆乾設立水柵簡練兵卒隄防要害躬率屬員設伏搜捕盜賊駭散三郡以安湖民健訟兆乾身行教化裁抑豪強摘伏姧偽諸不直者皆屏息斂迹焉趙國祚名宦留祀册遼東人順治初任浙江固山額鎮駐劄溫州時海氛未靖國祚預備戰艘乘風破浪搗其巢穴賊皆披靡驚遁民始得安十五年任浙江總督兼節制江西廣信一府凡鹽策兵政民隱賊情及地方厄塞無不悉心究畫值米價騰貴發帑平糶并移檄鄰省無得遏糴士民德之李嵩陽處州府志河南封邱人舉人順治十五年任分守溫處道嚴毅率下屬吏凜若神明民瘼尤加體恤甫下車會閩寇猖獗援兵蜂屯本郡嵩陽每日單騎詣營調劑有方民賴安輯已亥夏旱結壇內署籲天祈禱甘霖大沛歲藉有秋又嘗改增雉堞𥪡立炮臺綢繆防禦厥功多焉袁一相杭州府志字輔宸遼東人順治十七年任浙江左布政使州縣吏與司掾昵凡起運錢糧解多投少而印批不以時發逮發覺州縣並罹參罰一相倡為循環法每遇起解連前數彚書於批令一覽瞭然而侵蝕之弊遂絶南米歲入廣豐諸倉而厫少不足貯常露積以竹葦覆之多紅腐不可食一相捐俸創建六十餘所司掾請勒其事於石一相曰此藩臣職耳不足録也後卒於官張膽公舉事實徐州人順治二年以副將劄付隨征任浙江督標中軍副將討平朱橋范村地方寇逆會勦江東方馬叛兵而叛兵復渡江肆虐膽於五雲山奮勇克捷斬賊衆首級三千餘顆生擒偽副參遊守等官丁五百六十人殲厥渠魁安撫餘黨地方寧謐浙江總督張存仁敘功特薦七年調河南督標中軍致仕以長子道祥貴晉階光祿大夫趙廷臣杭州府志字君鄰遼東人康熙元年以兵部右侍郎總督浙江寬和端靜不為赫赫名而人自率服聞度支不足廷臣以二十四監久停疏請鼓鑄得報許諸監復鑄泉源貫輸不絶時海濱尚多餘孽聞廷臣寬大解甲來歸七年扺閩甫數月偕大臣巡海從福寧入寧波卒於途纍加太子少保兵部尚書諡清獻朱昌祚杭州府志字雲門滿洲籍山東高唐人順治十八年以工部侍郎巡撫浙江清廉沉毅為政務持大體時浙中寇盜未息設方略平之且導以歸順之利黨羽解散適裁撤巡方重案悉歸巡撫牽連逮繫者數干人昌祚數月間完結矜全省釋不可勝計溫台等郡無徵銀糧疏請蠲豁積困為之一蘇值閩海交訌沿海居民內徙昌祚發帑給田以瞻之大將軍督師征海昌祚捐資厚犒諸將大申軍令所至秋毫無犯并嚴飭有司不得因軍興之際苛征於民升直𨽻山東河南三省總督兵部尚書諡勤愍梁鳳鳴名宦留祀册遼東人康熙元年任浙江糧儲道漕頃本折錢糧積逋甚多力請具題蠲免以蘇民困僉點運辨不徇情面糧艘得依限扺通至徵收漕米禁苛取絶餽遺官民德之顧如華兩浙鹽法志字西巘湖廣漢川人順治進士康熙二年以御史巡鹽兩浙時商竈交困疲商貰債納課如華行已潔清一切舊例陋規皆釐革焉及代囊橐蕭然左右或憂之如華曰蘑菰線香古人所戒况朝多廉明君子豈以餽遺有無為厚薄哉入都果以稱職聞轉溫處副使范承謨杭州府志字覲公奉天遼陽州人順治士辰進士康熙八年由翰林厯遷都察院副都御史巡撫浙江清廉寡欲人不敢干以私衢台處三府多山田沙礫薄收積荒者十餘萬畝其初荒戶賠荒戶逃則派鄰族漸及同區田戶力不勝相率逸去州縣每受參罰承謨奏蠲之白糧最為嘉湖重役而銀米數皆參錯承謨悉心籌畫條議減免杭嘉諸郡三載洊飢民幾聚萑苻為盜承謨借庫銀遣官出糴平價散市最貧者得附老小例肩鹽給朝夕駐防逃人牽連誣害承謨疏請分别新舊另定處分民始安堵遷福建總督士民號泣擁車不得行乃乘深夜單騎啓關以去至閩會耿精忠謀逆未發承謨欲出海嶠簡鎮兵以遙制之未及行逆請議事至則露刃脅降承謨罵不屈拘之幽王師室械繫二年後欲殺之以滅口承謨從容就義一破仙霞逆計窮時同死者自幕友嵇永仁等下及隸卒凡五十三人事聞贈太子少保兵部尚書諡忠貞子時崇浙閩總督升都察院左都御史塞白理杭州府志奉天鐵嶺人康熙八年以都督同知提督浙江全省軍務駐札寧波紀律嚴明與士卒同甘苦文武協和愛養百姓寧郡邉海海賊朱飛熊等結連鄭錦盤踞為患塞白理勦撫兼施十三年吳逆反於滇耿逆反於閩浙中盜賊四起塞白理列三桂逆狀移檄各省鼓勵官兵以期滅此朝食身與總督李之芳密籌方略調兵四援之芳督軍衢州塞白理督軍台州勦除逆氛招撫流亡浙賴以安十四年以勤勞卒於任兵民立祠於寧波府城內胡尚衡舊浙江通志字階平江南涇縣人順治進士康熙十年視學浙江按臨諸郡輒進諸生詔之曰今之習舉業者剽耳傭目更不理會修身行已是何事徼幸弋獲即廢棄書卷一切理學淵源朝家典制漫不省究非國家之所望於通儒也其所取士務以通經學古為尚一時稱月旦評焉劉昌臣舊浙江通志字公弼湖廣武陵人順治進士康熙十一年任浙江糧儲道除革一切輸運旗丁姧弊耿逆叛閩大兵駐衢進勦昌臣署藩篆夙夜措畫轉餉不絶復署臬司不猛不寬讞獄務得其情以勞瘁卒官士民巷哭李之芳舊浙江通志字鄴園山東武定州人順治丁亥進士任金華推官浙省向苦解茶蠟之芳請兌折色又輯賦役全書縷晰條分瞭如指掌迄今奉為準則十五年以巡鹽御史蒞浙洞悉鹽政利弊凡不便於商竈者悉除之康熙十二年出督浙閩閩逆據險仙霞逆黨分踞衢溫台處等州縣之芳遣將分禦移鎮三衢親冒矢石出奇應變尋逆勢猖獗衆議棄衢退守獨之芳堅持不可日夜勵戰守之䇿不數年逆窮授首大兵長驅入閩東南半壁得安袵席張玉書李文襄墓志康熙十二年以兵部侍郎總督浙江十三年三月閩逆告變之芳檄諸路將士分守要害遣副將王廷梅等力堵仙霞關五月自杭趨衢州七月賊軍數萬攻衢之芳進擊於坑西炮聲震地流矢如雨左右請少避之芳曰今日以兵勝敗為吾死生可稍怯耶諸將鼓勇直入賊遂却顧賊黨猶熾溫處金嚴各屬煽亂之芳以計招降偽將韓斌王得功生擒賊首汪磐繆國英等十五年夏之芳建議直搗仙霞關言進取之路不在溫處而在三衢今賊徑卒屯衢此賊一破則諸賊駭亂迸散雖偽將馬九玉等抗拒河西大溪灘而江山常山間有間道可襲我軍進擊使賊首尾受敵河西安能獨完八月進軍克大溪灘復江山縣九玉冀繞道奪仙霞關而諸軍受之芳檄急據關口夾擊賊將金應虎等迎降大兵遂入閩踰年浙東底定捷聞進兵部尚書之芳念賊平之後當急行蠲恤疏請豁金衢嚴溫處五郡十六年以前額賦貧民陷賊來歸者悉罵區畫衣廩又設糜於通衢賑往來飢民一百二十二萬有奇流移者盡復故土論功授拖沙喇哈番二十一年秋還杭州入為兵部尚書三十三年進文華殿大學士兼吏部尚書卒諡文襄田逢吉名宦留祀册山西人順治乙未進士巡撫浙江當三藩變逆軍興旁午籌餉調兵動合機宜訓練將士嚴行保甲萑苻絶迹計典黜陟賢否悉愜輿情潔巳自矢凡耗羡餽獻盡皆屏絶暇則與諸生講學論文多所造就李月桂兩浙鹽法志字含馨遼東人康熙十二年任兩浙都轉運鹽使時鹽法阻滯正引不行衆皆咎肩引欲更之而不知釐正之法蓋浙鹽有二大弊一在山窩一在水口稱手紹興路通金華衢處而山窩多在諸暨若無窩則三府路絶而弊清嘉湖以東皆澤國凡水口有稱手預期以待姧販一至即為分市月桂盡知其弊嚴諭胥捕而隂察之二弊遂革陳丹赤福建通志字獻之侯官人順治舉人分巡溫處道攝臬司篆入覲歸適平陽叛辨司定猷勾耿精忠兵逼瑞安縣丹赤獨居城上泣諭父老誓共此城存亡時鎮辨祖𢎞勳擁兵郡城大觀亭志在叛降邀丹赤議事𢎞勳厲聲曰兵餉俱無何以出戰丹赤曰提兵前鋒已集計有半萬何謂無兵糧可給至六月何謂無餉封疆之臣守死封疆不知其他也𢎞勳知不可回目左右執斧者劈其聞贈臂丹赤罵聲不絶即挾出兵刃交下而死事道通政使諡忠毅子一夔廕生厯任浙江督糧郭之培杭州府志字生洲直隸任邱人丙戍進士康熙十二年任浙江按察使吏抱牘於前之培次第批答悉中人隱吏驚以為神事畢退署默然靜坐門下士餽書及詩箑者悉謝却之以病卒官楊應魁台州府志號斗垣四川人康熙十三年為台紹副使時賊帥曾養性等陷黃巖土寇蜂起寧紹路塞衆議欲棄台川適應魁兼程至倡言於衆曰台為寧紹門戶台失則浙東非我有矣悉力拒戰賊潰遁郡東沿海十數郡有私與賊往來者郡帥請悉置之法應魁曰大兵未到之先民為身家計無他心也悉原之以焦勞卒於任成其範名宦留祀册字愚崑山東樂安人順治進士康熙十九年以御史巡鹽兩浙斥姧蠧用老成禁加派疏壅引商竈兩利每於政事間暇集諸生考論文藝恆舉魏劉獻之之言曰四科以德行為首若能入孝出悌忠信仁讓不待出戶天下自知倘不能然雖下帷針股躡屩從師止可博聞多識於立身之道有何益乎內升京卿厯官兵部右侍郎門可貴殉難册遼東海州人任撫標右營遊擊康熙十五年閩逆煽亂隨師援勦嚴衢三月十七日與賊戰於開化縣華埠地方死之同日陳亡者本營兵李國林李龍沈定功白守忠陳士強趙德聞王秀事賜恤廕拜他喇布勒哈番高永殉難册河南歸德人任撫標左營干總耿逆寇嚴衢奉檄援勦康熙十五年題補瑞安營守備未抵任三月十七日戰於開化縣華埠死之本營兵蔣榮俞虎俱陳亡齊龍殉難册直隸真定人本姓李由行伍值閩變隨師進勦以功拔撫標左營千總康熙十六年三月三十日與賊戰於邵武光澤縣之打茶碑寨炮傷而殞時隨勦本標右營兵王得勝孫四何來並陳亡王國安名宦留祀册奉天蓋州人康熙二十一年授浙江巡撫整飭漕務清理𣙜稅革鹽政之陋規建河道之隄閘訓兵息民具有條制杭城兵民雜處營債素為重纍國安捐俸代償焚劵息爭民間焚香頂祝升浙閩總督晉兵部左侍郎石琳名宦留祀册字琅公滿洲人康熙六年任兩浙都轉運鹽使杜絶陋規恤商惠竈二十年遷浙江布政使時耿逆初平浙東衢屬被兵尤甚戶口逃亡者多里甲以賠纍丁糧為苦琳查實詳免之通省軍需浩繁積欠未楚琳才猷肆應凡軍供未給應補應銷者悉為一清藩司衙門陋例革除殆盡常云革民間一分火耗便可完一分正供以是嚴檄各屬力除耗贈凡州縣起解錢糧司庫隨到收兌從無守候之勞嚴禁南米重價折徵給放時以官斛為準兵民兩便厯任兩廣總督趙士麟杭州府志字玉峰雲南河陽人進士康熙二十三年以副都御史巡撫浙江蒞任初民為營債所苦釀成大案士麟移咨將軍掣繳票約捐資代償浙中豪右衙蠧驕悍不法廉得其狀悉置之法強暴斂迹省城內河淤塞幾百年士麟下令治河半載訖工水道疏通舟楫利便以次繕治城隍修葺學校凡講學興賢重農務本諸政無不具舉而陋例亦革除殆盡未幾移撫江蘇兵民於西湖敬一書院肖像祀之官至吏部左侍郎張鵬翮杭州府志字運青遂寧人順治庚戍進士康熙二十八年以僉都御史巡撫浙江屏絶各官餽遺革除一切陋例於吏治精密謹嚴事無巨細親為裁決用法公而不私寬厚有斷情理既得則始終持之確如也嘗曰理政之道以教化為先雖政事殷繁而宣講聖諭及課督士子必躬親訓迪嘗築書院於萬松嶺廩餼諸生極厚而自奉則蔬食菜羹而已四川鄉賢册鵬翮涖浙六載兵民相安地方寧謐升兵部右侍郎行李蕭然官至文華殿大學士諡文端蔣育英名宦留祀册奉天蓋州人官生初任溫州府同知值閩變郡接賊巢育英撫綏黎庶嚴行保甲大軍駐衢轉運糧餉一無違誤康熙三十一年升浙江布政使訪知台州衛屯糧荒歉無徵即為詳請蠲免明年浙省旱災買米平糶勸諭郡縣倡捐米穀散賑加給育嬰堂口糧民咸頌德查木楊名宦留祀册滿洲人康熙三十三年鎮守浙江將軍約束八旗兵丁不得生事擾民每月上諭朔望宣講知忠孝大義支放錢糧以官斛量收無俾兵民咸浮滿旗厮牧馬禁殘傷禾稼踐踏墳塋軍牌不時巡緝毋許放營債以剝民利毋許縱扒手以滋民害卒於官士民建祠西湖諡敏恪顔光斆公舉事實字學山山東曲阜人復聖裔康熙戊辰進士由庶常授翰林院檢討三十三年督學浙江杜交遊絶請托往例提調官薦儒童一二人自光斆涖任無敢以私干者丙夜衡文搜羅寒畯不遺餘力杭郡代倩特甚取歲進新生扄戶另題覆試得文理荒謬與原卷迥異者黜之并黜代倩保結之人所刻試牘風行海內垂三十餘年士林誦習不異於初試竣入都行李惟圖書敝簏而已既祀名宦浙江士復念之不巳專祀西湖春秋致祭趙申喬名宦留祀册字松伍江南武進人康熙庚戌進士以刑部員外郎里居辛巳春授浙江布政使受事三日首革南糧布袋之弊他若加平餽獻兵餉挂發一切禁止時屆編審下令均山陰坊鄉田畝以絶差徭偏枯寧波黠民倡照地派丁之説與巨室相持申喬草片檄諭之無敢譁者藩庫舊有貼解費在任積二千金有奇將受代封識以付新司武進距杭甚邇家人來輒載米數十斛以給饔飱未踰年升浙江巡撫自藩遷署器什惟襥被一肩書數簏而已錢塘江逼近杭城潮汐晝夜拍岸者再舊塘傾圯申喬躬親相度地當衝齧者易土以石鎔鐵貫其中築子塘護焉嘗諭吏役曰吾無幕客案牘皆手理汝曹若相欺能保一事不敗乎答言如公者尚相欺天良何在非惟不敢抑命往亦不忍是年大比請增額視江南旋奉戶部尚書湖南會審鎮筸紅苗改偏沅巡撫厯官旨建諡恭毅雍正元年加贈太子太保十年奉賢良祠入祠致祭郎廷極名宦留祀册字紫衡遼東人康熙三十一年任浙江都轉運鹽使恤竈惠商善政頻舉大計特薦四十一年任浙江布政使北關監督時議慮商民間道偷越疏請移務增稅廷極議曰北新杭關也豈可逺越湖紹稽徵茍能輕耗省費驗放以時商旅孰肯舍近逸就勞逺哉督撫允議疏入報可壬午提調鄉闈增設號舍士咸德之升江西巡撫厯漕運總督諡溫勤薑橚山西鄉賢册字仲端保德州人康熙乙丑進士以鴻臚寺少卿提督浙江學政文取清真一變膚膩浮詭之習間不足額則訪録前代忠孝理學之裔以補之有薦於朝者曰薑橚一錢不要一情聖祖仁不聽蓋公論也四十二年皇帝南巡御書廉靜二字以賜之厯升吏部右侍郎卒馳驛歸葬恩賜褒恤張泰交名宦留祀册字公孚山西陽城人康熙壬戍進士四十二年以兵部右侍郎巡撫浙江聖祖仁皇帝南巡額居官清正仁恕表率羣僚尤留意兵御賜推誠遇人扁民重務每逢大閲躬詣羅木營整飭隊伍訓練官兵繕甲胄修器械而尺籍隱冒之弊以除浙省濱海玉環東洛南麂諸山賊艘所出入也編保甲謹斥堠俾絶盜源修江塘易土以石立廟鎮之運使高熊徵開書院於紫陽别墅泰交親至督課與諸生講諭經史大義并倡行鄉約於朔日宣講上諭士民翕然向風乙酉以疾請告於孤山特遣中書存問卒於官浙人肖像祠高熊徵兩浙鹽法志字渭南岑溪人順治副榜康熙十三年吳逆搆亂蔓延粵西熊徵倡義率鄉兵拒之補桂林府教授調思明土府升井陘令四十年超擢浙江都轉運使官商陋例概行革除一切公費自為捐解於正課外不派分毫前官存引幾八萬熊徵設法疏銷一清逋欠通商恤竈轉輸自足更以造士為心捐建紫陽别墅督課諸生振興文教兩署臬篆惟允惟平卒於官蕭然旅櫬商民有嘆息泣下者彭始摶河南鄉賢册字直上南陽鄧州人康熙戊辰進士選庶吉士授檢討改御史旋復入翰林四十五年提督浙江學政衡文一本經史老成績學操劵而售丙夜一燈咿唔弗輟未嘗就枕惟隱几交睫而已逾年鬚髮盡白嘗曰庠序至肅名器至重墨者懦者癖者惰者衡文之賊也人以為名聖祖仁言帝南巡皇御書公明盡職四字以賜任滿還朝歸舟莫辦附糧艘至京擢內閣學士兼禮部侍郎假歸卒浙士思之建祠西湖曰南陽書院吳開圻公舉事實字果亭陜西寧夏人康熙戊辰一甲第三名武進士授喜峰口遊擊卓異賜蟒服升昌平州參將隨圍應制賦詩將捐製旗幟盔賜泥金御書四十五年擢杭協水師副甲并鳥鎗藤牌又捐造沿江巡船緝禦盜賊閭閻安枕搜勦大嵐山匿匪擒賊衆張念一等調台協副將署黃巖總兵官督提會題保舉調衢州副將署處州總兵官所至明飭紀律訓練士卒簡閲隊伍軍容整肅兵民帖然五十六年調雲南元江副將署鶴麗總兵官擒獲白龍厰談八等雍正元年聖特頒皇帝御用弓矢祖仁賜之以疾歸卒子進義亦官台協副將調杭協升黃巖總兵官楊宗仁名宦留祀册字天爵遼東人康熙五十三年任浙江按察使清節自持有冷面寒鐵之概遇命盜大案審察至再然後定讞獄無寃濫而豪強巨猾廉訪得實痛懲禁斃未嘗少縱於有司詞訟嚴禁濫差悉令自拘民無擾纍浙風俗浮靡力崇節儉婚喪務遵典禮五十四年丁艱歸厯廣東巡撫湖廣總督段志熙公舉事實字百惟河南濟源人康熙五十二年任浙江布政使以先任寧台道凡浙中山川風土民生利弊靡不洞悉藩庫相沿陋規盡行裁革收發賦餉躬親驗兑吏胥不得上下其手間遇水旱輒多方賑恤務獲安全杭城地居省會民廬稠密向多火災形家言北關拱宸橋圯水不制火志熙即捐俸倡修厯五載訖工城內大小諸河自前撫趙士麟疏濬後歲久復淤志熙力為開濬計工授食民不勞而事集海寧海塘數為風潮衝激汕刷大為民病志熙親詣海堧躬授指畫督修海晏河清民安物阜八字號塘三千七百餘丈尤加意學校時巡撫朱軾重建敷文書院集諸生肄業逺邇向風至者日衆歲費廩餼千金志熙力任其事捐俸資給士風振起何世璂公舉事實字坦園山東新城人康熙己丑進士庶吉士授檢討改御史雍正元年督學浙江夤緣請托一不得行弊竇剔除殆盡而不以苛刻為明整飭士習每與諸生講誠意無欺之學學租悉以散給貧生無毫髮染指試未竣轉兩淮鹽運使擢貴州巡撫以吏部右侍郎署直隸總督卒於官贈禮部尚書諡端簡方覲公舉事實字覲文江都籍歙縣人康熙己丑進士由庶吉士授編修纍遷戶科給事中雍正六年擢浙江按察使嘗謂盜之不弭吏為之市也嚴地方抑勒諱匿之禁絶捕役豢養尅贓之弊設窩藏科别懲創之條盜遂衰止辨色而起夜秉燭治官書每案牘紛拏符檄填委目覽手答咄嗟立辦老吏無所竄其手遷陜西西安布政使挾病就道至六合卒於途上聞其疾亟遣醫調治諭止弗行賜人參訃聞贈太常寺卿杭州府後漢陳渾咸淳臨安志熹平二年為餘杭令開上下湖溉公私田一千餘頃三國吳陸遜吳志本傳字伯言吳郡吳人本名議年二十一始仕幕府厯東西曹令史出為海昌屯田都尉並領縣事縣連年亢旱遜開倉穀以賑貧民勸督農桑百姓蒙賴時會稽山賊潘臨厯年不禽遜召兵討治所向皆服拜定威校尉權以兄䇿女配遜數訪世務會稽太守淳于式表遜枉取民人愁擾所在遜後詣都言次稱式佳吏權曰式白君而君薦之何也遜對曰式意欲養民是以白遜若遜復毁式以亂聖聽不可長也權曰此誠長者之事顧人不能為耳黃武元年拜輔國將軍領荆州牧封江陵侯赤烏七年代顧雍為丞相周魴吳志本傳字子魚吳郡陽羡人少好學舉孝廉為寧國長錢唐大帥彭式為寇以魴為錢唐侯相旬月之間斬式首及其支黨遷丹陽西部都尉晉范寧晉書本傳字武子少篤學多所通覽為餘杭令在縣興學校養生徒潔已修禮期年之後風化大行自中興以來崇學敦教未有如寧者也在職六年遷臨淮太守拜中書侍郎庾羲晉書庾亮傳亮次子為吳興內史時穆帝頗愛文義羲至郡獻詩頗存諷諫因上表曰事役殷曠百姓凋殘以數州之資贍四海之務其為勞疲豈可具言臣受恩奕世思盡絲髮受任到東親臨所見敢獻丹愚方見授用而卒王珣萬厯杭州府志字元琳導之孫繇侍中為吳國內史在郡為士庶所悅徵為尚書左僕射南北朝何叔度宋書何尚之傳叔度廬江潛關人為金紫光祿大夫吳郡太守加秩中二干石太保王𢎞每稱其清身潔已劉損南史劉粹傳字子騫元嘉中為吳郡太守成化杭州府志東土殘飢太祖遣揚州治中沈演之東入賑恤以損綏撫有方稱為良守按損沛郡蕭人劉真道册府元龜為錢唐令元嘉十三年東土飢上遣揚州治中沈演之巡行所在演之表薦真道政績為治民之良宰帝嘉之賜穀千斛以為步兵校尉劉道錫萬厯杭州府志元嘉間令餘杭與錢唐令劉真道咸用治最為使者沈演之所薦同賞穀千石而演之疏中尤稱道錫能率先吏民築塘捍水著異績云張祐宋書王歆之傳祐高平人厯臨安武康錢唐令並著能名宋世言長吏者以祐為首蕭赤斧南齊書本傳南蘭陵人宋大明初攻戰有勳封永安亭侯除晉熙王撫軍中兵參軍出為錢唐令治政為百姓所安吏民請留之時議見許後遷給事中太子詹事孫謙南史本傳字長遜東莞莒人齊初為錢唐令御煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送之謙辭不受每去官輒無私宅借空車廄居焉梁天監九年以老徵為光祿大夫謙自少及老厯二縣五郡所在廉潔居身儉素牀施籧篨屏風冬則布被莞席夏日無幬帳而夜卧未嘗有蚊蚋人多異之何洵富陽縣志永明三年任冨陽令定寇亂集散亡邑以治稱王籍南史本傳字文海臨沂人仕齊為餘杭令政化如神善於擲伏目下莫能欺又為錢唐縣下車布政咸謂數十年來未之有也梁天監中為輕車湘東王咨議參軍謹按王籍舊浙江通志作陶籍并云張景之子誤今據南史正之丁遵成化杭州府志天監初為臨安令性恬淡薄於名利嘗於餘杭建橋以濟不通邑人德之張充梁書本傳字延符吳郡人天監中除雲麾將軍吳郡太守下車恤貧老故舊莫不欣悅以疾自陳徵為散騎常侍金紫光祿大夫何敬容梁書本傳字國禮廬江人尚齊長城公主普通四年以吏部尚書出為招逺將軍吳郡太守為政勤恤民隱辨訟如神視事四年治為天下第一吏民詣闕請樹碑詔許之後為吏部尚書加侍中改太子中庶子謝舉梁書本傳字言揚覽之弟也大同三年為雲麾將軍吳郡太守先是何敬容居郡有美績及舉為政聲迹略相比六年入為侍中中書監蕭濟陳書本傳字孝康東海蘭陵人少好學博通經史解褐梁祕書郎世祖即位授侍中厯守臨安等郡所在皆著聲績太建初入為禮部尚書加給事中王沈南史傳琰傳沈字彥流東海人厯錢唐山隂秣陵令南平長沙太守清廉戒愼身恆居祿而居處日貧死之日無宅可憩故吏為營棺柩劉允恭咸淳臨安志陳時為餘杭令治事詳明臨下清簡囹圄屢空田野開闢百姓為立德政碑唐桞楚賢唐書桞沖傳沖蒲州虞鄉人父楚賢大業中為河北縣長高祖兵興楚賢自歸授侍御史貞觀中厯杭州刺史有名郝砆宣德富陽縣志貞觀初年任富陽令十二年開陽陂湖以蓄水兼造水閘溉田萬頃惠利在民唐書地理志令郝砆開南七十步有堤登封元年令李濬時築東自海西至於莧浦以捍水患貞元七年令鄭早又增修之丁表咸淳臨安志字元章麟德中為於潛令有政績邑人為立德政碑陳允升萬厯杭州府志上元二年為餘杭令有碑以頌德政裴惓萬厯杭州府志中宗時以清德為巡察使所薦遷杭州刺史為政有美譽宋璟舊唐書本傳字廣平邢州南和人少耿介有大節弱冠舉進士纍轉鳳閣舍人神龍中厯杭州刺史在官清嚴人吏莫有犯者遷吏部尚書尋出為睦州刺史開元初徵拜刑部尚書遷尚書右丞相贈太尉諡文貞張擇白居易張擇神道碑字無擇登明經第補𢎞文館校書郎調杭州録事參軍前後詰偽制補吏者三十八人駮假年侍老者二十人舉而正之人服其明遷曹州别駕袁仁敬明一統志開元中杭州刺史時元宗自擇諸司長官以仁敬刺杭詔宰相諸王御史以上祖道洛濱賜詩親書以寵其行仁敬治郡之暇嘗種九里松李泌舊唐書本傳字長源居京兆天寶末拜銀青光祿大夫掌樞務出為杭州刺史以理稱咸淳臨安志泌徙杭州刺史有風績引西湖水入城為六井民利之崔士元萬厯杭州府志士元為富陽令在職以文風善政有稱永泰元年重建學宫蓋為政知所重者李復成化杭州府志大厯四年復為餘杭令有善政民立碑載其事杜詠明一統志貞元中為於潛令嘗開紫溪河溉田又鑿渠以通舟楫民蒙其利崔涓唐書本傳涓性開敏為杭州刺史受署未盡識卒史乃以紙各署姓名傅襟上過前一閲後數百人呼指無誤終御史大夫白居易唐書本傳字樂天其先太原人徙下邽貞元中擢進士補校書郎元和元年召入翰林為學士遷左拾遺穆宗好畋遊獻續虞人針俄轉中書舍人丐外遷為杭州刺史始築堤捍錢塘湖鍾泄其水溉田千頃復浚李泌六井民賴其汲會昌初以刑部尚書致仕常師儒萬厯杭州府志長慶二年為餘杭令時縣有虎師儒為文告神以遣之歸珧咸淳臨安志寶厯中為餘杭令因陳渾故迹置上下湖又開北湖溉田千餘頃及築甬道通西北大路高廣徑直百餘里行旅無山水之患人稱賢令餘杭縣志珧作溪塘時洪水衝決功用勿成珧與神誓曰民遭水溺而不能救是珧之職也神矜民亦何忍視其災隄由是就趙訥成化杭州府志咸通十四年為富陽令嘗築城富陽縣志訥能文章知政體五代聞人凝十國春秋天寶十六年為富春令重建縣治有興廢功宋張去華宋史本傳字信臣開封襄邑人建隆初舉進士甲科真宗嗣位拜左諫議遷給事中知杭州兩浙自錢氏賦民丁錢有死而不免者去華建議除之景德元年改工部侍郎致仕鞠詠嘉靖仁和縣志字詠之開封人淳化間為仁和令有聲績郡守王化基入朝首以詠薦張詠宋史本傳字復之濮州鄄城人太平興國進士咸平二年以工部侍郎出知杭州屬歲歉民多私鬻鹽以自給捕獲犯者數百人詠悉寬其罰而遣之官屬請曰不痛繩之恐無以禁詠曰錢塘十萬家飢者八九茍不以鹽自活一旦蜂聚為盜則為患深俟秋成當仍舊法有民家子與姊壻訟家財壻言妻父臨終此子甫三歲故見命掌資財且有遺書令異日以十之三與子餘七與壻詠曰汝妻父智人也以子幼故托汝茍以七與子則子死汝手矣亟命以七給其子餘三給壻人皆服其明斷大中祥符初加左丞轉工部尚書贈僕射諡忠定薛映宋史本傳字景陽家於蜀進士及第景德初以右諌議大夫知杭州映臨決鋒鋭庭無留事轉運使姚鉉移屬州當直司母得輒斷徒以上罪映即奏徒流笞杖自有科條茍情狀明白何必繫獄以纍和氣請詔天下凡徒流罪於長吏前對辨無所異聽遣決之朝廷施用其言映為治嚴明吏不能欺每五鼓冠帶黎明據案決事雖寒署無異李陟王安石李陟神道碑字元升少以進士舉太學淳化中知秀州嘉興縣浙江堤壞不可治詔江淮荆浙發運使舉可用者以陟通判杭州堤成度用財力甚省而完且可久當時以為材召除御史未及而卒胥致堯歐陽修胥致堯墓志世為燕人徙家合肥端拱咸平間再舉進士監溫州天富鹽監曰吾親老敢擇祿耶凡治鹽三歲增其舊二百餘萬斛監杭州排岸司浚浙江龍山二閘廢河堰以通漕杭人便之遷左班殿直王濟宋史本傳字巨川饒陽人景德四年知杭州郡西有錢塘湖溉田千餘頃歲久淤塞濟命工濬治增治斗門以備潰溢之患仍以白居易舊記刻石湖側民利之大中祥符三年徙知洪州兼江南西路安撫使屬歲旱躬督官吏為糜粥全活甚衆章得成化杭州府志景德中為餘杭令建學崇儒教化大行張若谷宋史本傳字德繇沙縣人進士及第真宗擢知處州厯江淮制置發運使纍遷右諫議大夫知應天府改龍圖閣學士徙杭州會歲飢斥餘廩為糜粥賑救之纍官至尚書左丞所至有循良迹不激訐取名楊偕歐陽修楊偕墓志字次公大中祥符元年進士拜著作佐郎纍官至工部侍郎嘗知杭州有能績為人廉潔剛直少屈而難犯仁心愛物至其有所能容人多不及戚綸咸淳臨安志字仲言楚邱人大中祥符三年以樞密直學士戶部郎中知杭州綸與轉運使陳堯佐言浙江潮壞岸漸逼州城望遣使自京師部掃匠濠寨赴州工役詔從之令馳驛而往命轉運使更互檢校遂以掃岸易柱石之制馬亮宋史本傳字叔明廬州合肥人舉進士遷殿中侍御史真宗即位知杭州先是江濤大溢調兵築堤而工未就詔問所以捍江之䇿亮褎詔禱伍員祠下明日潮為之却出橫沙數里堤遂成入為御史中丞拜尚書以太子少保致仕俞獻卿咸淳臨安志字諫臣歙州人以集賢院學士知杭州一日暴風江潮溢決堤勢不可禦獻卿鑿西山石作堤數十里民用便之賜詔褒諭李紘宋史李昌齡傳紘字仲綱進士及第試祕書省校書郎知於潛剡縣有惠愛厯天章閣待制進龍圖閣直學士紘方介有吏材篤於交遊與劉顏為友顔死移任子恩官其子孫錫王安石孫錫墓志字昌齡真州人天聖進士知杭州仁和縣籍取凶惡戒以不改必窮極案治而治其餘一以仁恕縣人畏愛之官至尚書度支郎中李及東都事略字幼幾鄭州人舉進士以樞密直學士知杭州時內侍江德元居中用事其弟德明奉使過杭及待之薄僚佐曰江使者兄弟榮枯大臣如反掌耳今不加禮待雖不求福獨不畏其為禍乎及曰待之如是足矣既而德明謂僚佐曰李公春秋高何不求間郡以自處而居杭繁劇之地耶僚佐走語及笑曰及老矣誠得間郡以自逸庸何傷既而德明亦不能傷也時人重其操守及資性清介治尚簡嚴喜慰薦下吏而樂道人之善忌杭風俗輕靡未嘗事宴遊一日微雪遽出郊衆謂當命賓朋為高會及獨造林逋清談至暮而歸在杭未嘗市物惟置白樂天一集而已朱公綽萬厯杭州府志景祐四年為鹽官令有惠政蘇夢齡撰記略云公綽自校祕書陟涖兹土勤宣惠澤究察民瘼建鹽法損茭輸省茶稅清田畛兹更葺縣署因擇其尤善者紀之司馬池東都事略字和中山西夏縣人舉進士以天章閣待制知河中府徙杭州江鈞張從革為兩浙轉運使惡池捃托其事條奏之降知虢州池未謫聞吏有盜官銀稱為鈞償私費而從革之姻犯稅隂遣人私請或謂可以此報池獨不較人以為長者子光位宰相鄭戩宋史本傳字天休蘇州吳縣人舉進士通判越州以資政殿學士知杭州錢塘湖溉民田數十頃錢氏置撩清軍以疏淤填水患既納國後不復治葑土堙塞為豪族僧坊所占冒湖水益狹戩發屬縣丁夫數萬闢之民賴其利事聞詔本郡歲治如戩法進戶部侍郎資政殿大學士拜奉國軍節度使贈太尉諡文肅方偕咸淳臨安志字齊占莆田人慶厯五年自淮南江浙荆湖制置發運使徙知杭州偕本以吏事進而杭訟牒素煩決遣無留事周濤王安石周濤墓志字幾道海陵人慶厯六年進士厯知杭州錢塘縣為政一自急飭視民疾如在已不肯釋事實為名聲要利所在民愛譽甚於士大夫治平三年授簽書梓州判官范仲淹咸淳臨安志字希文蘇州人舉進士皇祐元年自鄧州移知杭州加尚書禮部侍郎二年吳中大飢仲淹發粟及募民存餉為術甚備吳人喜競渡日出宴湖上自春至夏居民空巷出遊又諭諸寺主首曰飢歲工價至賤可以大興土木之役於是諸寺工作鼎興又新厫倉吏舍日役千夫監司奏劾杭州不恤荒政嬉遊不節及公私興造傷耗民力仲淹乃自條敘所以宴遊興造皆欲發有餘之財以惠貧者貿易飲食工技服力之人仰食於公私者日無慮數萬人荒政之施莫此為大是歲兩浙惟杭州宴然民不流徙遷戶部侍郎張方平王鞏張方平行狀字安道世家睢陽明道二年舉茂材異等科以校書郎通判睦州後知杭州錢塘氣俗輕侈貨利湊聚號煩劇難治方平下車訟庭肅然修救荒之政人無失所杭州地當衝會賓客留泊百姓積苦厨傳之擾方平命典庖晨一㸑而已民以各安其業謂僚屬曰利害於人不繫細大歸於簡便此政術也大者畏之小者忽之何有於民也郡城溝瀆自吳越納土未嘗疏浚瀦渟穢濁人戶滌灌皆用之方平視江閘方潮退時高下甚逺因暑雨集舟百餘艘蕩諸穢水發閘瀉出之乘潮納新水溝瀆一清城中相慶凡諸施為舉從便利錢塘人著之風謡至今誦詠李兌宋史本傳字子西許州臨潁人登進士第為殿中侍御史仁宗擢天章閣待制知諫院出知杭州書安民二字以寵徙越州厯守名郡為政簡嚴老益精明積官尚書右丞轉工部尚書致仕孫洙咸淳臨安志字巨源廣陵人仁宗時為於潛令歐陽修包拯吳奎三人交舉洙應賢良方正科遷編校祕書閣載籍謹按萬厯杭州府志云洙在邑之政無考而三人俱一時名賢合辭交薦則洙之仕學並優可想見矣蘇頌宋史本傳字子容泉州南安人父紳葬潤州丹陽因徙居之第進士皇祐五年授祕書監知通進銀臺司吳越飢選知杭州一日出遇百餘人哀訴曰某以轉運司責逋市易緡錢夜囚晝繫雖死無以償頌曰吾釋汝使汝奉衣食之餘悉以償官期以歲月而足可乎皆謝不敢負果如期而足頌宴客有美堂或告將兵欲亂密使捕渠領十輩荷校付獄中逮夕曾散坐客不知也紹聖四年拜太子少師致仕梅摯宋史本傳字公儀成都新繁人進士通判蘇州二浙飢官貸種食已而督償頗急摯言借貸本以行惠乃重困民詔緩輸期慶厯中擢殿中侍御史進龍圖閣學士知杭州帝賜詩寵行纍遷右諫議大夫摯性淳靜不為矯厲之行政迹如其為人平居未嘗問生業有奏疏四十篇胡宿歐陽修胡宿墓志字武平其先豫章人後徙常州之晉陵舉進士中天聖二年乙科遷湖州為政有惠愛築石塘百里捍水患大興學校學者盛於東南自湖學始英宗即位拜尚書吏部侍郎觀文殿學士知杭州為政不略細故或謂大臣不宜自勞宿曰此民事也吾不敢忽以是民尤愛之除太子少師致仕余良肱宋史本傳字康臣洪州分寧人第進士通判杭州江潮善溢漂官民廬舍良肱壘石堤二十里障之潮不為害時王陶為屬官常以氣犯府帥吏或訴陶帥挾憾欲按之良肱不可曰使陶以罪去是以直不容也帥遂已後陶官於朝果以直聞蔡襄咸淳臨安志字君謨仙遊人治平二年以端明殿學士禮部侍郎知杭州為政精明吏不能欺祖無擇嘉靖浙江通志字擇之上蔡人進士高第纍官直集賢院出知袁州厯杭州所至治行著聞無擇為人好義以政事文章為時名卿與王安石不合放棄不振士論惜之朝端友成化杭州府志字君成巨野人熙寧中為新城令有善政蘇軾序其詩謂清厚靜深如其為人陳襄武林紀事字述古福州人熙寧中知杭州杭為都會賓旅之衝朝廷使客相繼襄外應賓客內撫循人民州不知擾杭雖水鄉然皆斥滷之地討其源流命工修復故井民遂獲濟刁璹成化杭州府志字景純熙寧中為於潛令蘇軾倅杭行縣為賦野翁亭詩有我來觀政問風謠皆云犬吠足生氂之句後與蘇軾毛國華並祠於浮江之上楊時宋史本傳字中立南劒將樂人熙寧進士河南程皓與弟頤講孔孟純學於熙豐之際時調官不赴以師禮見皓於潁昌又見程頤於洛聞理一分殊之説厯知餘杭蕭山皆有惠政民思之不忘時安於州縣未嘗求聞達而德望日重四方之士不逺千里從之號曰龜山先生除邇英殿侍書兼國子祭酒高宗即位除工部侍郎以龍圖閣直學士提舉杭州洞霄宮致仕卒諡文靖崔遹咸淳臨安志元豐間為於潛令有遺愛嘗興元豐塘為邑人利至今呼崔長官塘鄭獬宋史新編字毅夫安陸人進士第一厯官知制誥神宗時召拜翰林學士嘉靖浙江通志獬徙知杭州極言青苗之害引疾乞間提舉鴻慶宫卒毛國華嘉靖浙江通志為於潛令值歲早蝗國華勤於捕蝗梅聖俞至其邑作詩贈之曰宦遊逢此歲年惡飛蝗來時蔽天黑羡君禾稻熟如雲蝗自識人人不識蘇軾宋史本傳字子瞻睂山人嘉祐二年試禮部置第二復以春秋對義居第一殿試中乙科復對制䇿人三等熙寧二年通判杭州高麗入貢使者發幣於官吏書稱甲子軾却之曰高麗於本朝稱臣而不稟正朔吾安敢受使者易書稱熙寧然後受之時新政日下軾每因法以便民民賴以安元祐元年除翰林學士兼侍讀拜龍圖閣學士知杭州既至杭大旱飢疫並作軾請於朝免本路上供米三之一復得賜度僧䐑易米以救飢者又減價糶常平米多作饘粥藥劑遣使挾醫分坊治病活者甚衆杭本近海地泉鹹苦居民稀少唐刺史李泌始引西湖水作六井民足於水白居易又浚西湖水入漕河自河入田所溉至千頃民以殷富湖水多葑自唐及錢氏歲輒浚治宋興廢之葑積為田水無幾矣漕河失利取給江潮舟行市中潮又多淤三年一淘為民大患六井亦幾於廢軾見茅山一河專受江潮鹽橋一河專受湖水遂浚二河以通漕復造堰閘以為湖水蓄泄之限江潮不復入市以餘力復完六井又取葑田積湖中南北徑三十里為長堤以通行者且募人種菱湖中葑不復生收其利以備修湖取救荒餘錢萬緡糧萬石及請得百僧度牒以募役者堤成植芙蓉楊柳其上望之如畫圖杭人名為蘇公堤浙江潮自海門東來勢如雷霆而浮山峙於江中與漁浦諸山犬牙相錯洄洑激射歲敗公私船不可勝計軾議自浙江上流地名石門並山而東鑿為漕河引浙江及溪谷諸水二十餘里以達於江又並山為岸不能十里以達龍山大慈浦自浦北折折小嶺鑿嶺六十五丈以達嶺東古河浚古河數里達於龍山漕河以避浮山之險人以為便奏聞有惡軾者力沮之功以故不成軾二十年間再涖杭有德於民家有畫像飲食必祝又作生祠以報六年召為吏部尚書陳師錫萬厯杭州府志字伯修建陽人令臨安有善政蘇軾薦於朝改宣義郎許仲蔚成化杭州府志字子均為新城令以文學名新城縣志仲蔚少博學有志用世嘗條時務請建義倉置營田行鄉飲藉田復制科興學校仁宗嘉之擢令新城能以素所自許者推行之政平民乂有卓茂之名時蘇軾守杭知仲蔚尤禮重之孔文仲宋史本傳字經父臨江新喻人舉進士擢第一調餘杭尉恬介自守不事請謁轉運使在杭召與議事事已馳歸不詣府人問之曰吾於府無事也再轉台州推官元祐初召為祕書省校書郎遷中書文仲與弟武仲皆以文聲起江西時號三孔舍人陳軒萬厯杭州府志字元輿建陽人紹聖靖國中兩知杭州有善政禱雨獲應張閣宋史本傳字臺卿河陽人第進士崇寧初為翰林學士蔡京免相閣當制厯數其過京復相以龍圖學士知杭州浙部和買絹杭獨居十三戶有數百匹者閣請均之他郡杭久闕守閣經理有敘去惡少年之為人害者州以理聞召拜兵部尚書後為學士徐鑄嘉靖浙江通志字元君年少入官有能名政和初提舉兩浙常平越四年除轉運副使明年以徽猷閣待制知杭州及代以杭人安其教令特除延慶殿學士李偃萬厯杭州府志政和五年以徽猷閣待制知杭州嘗奏湯村巖門白石等處並邊錢塘江與大海通日受兩潮漸至侵齧乞依六和寺岸用石砌疊詔從之後徙河南尹黃圭海寧縣志字元功侯官人政和中辟鹽官縣丞時經方臘亂後給復三年并停鹽法後復舉行值歲飢帥府以之屬圭圭曰急疲民以悅上官我何能為於是盡呼邑之父老諭之曰有司持此以供公上吾將寬若程督免若追胥若曹亦樂輸耶咸感泣踰月而辦秩滿屢薦除大理寺卿紹興中擢監察御史遷吏部郎謹按舊志作王圭未詳孰是王昞萬厯杭州府志字子華華陽人政和七年令鹽官鹽官濱海號稱難治期年吏畏民安詞息鹽饒政有條理其除弊革故不勞而成蓋吏之以敏幹著者胡紡富陽縣志宣和元年知富陽縣政治有方四野樂業建秦望樓四年築縣城方懋德萬厯杭州府志字元相宣和三年起家胄監授鄂州刑曹改武康尉邑有丐者死於沈氏之門或以誣沈獄已具懋德辨而釋之後遷錢塘令府牒索磚五十萬懋德持不可立庭下屹不去卒罷之江帙咸淳臨安志宣和間為餘杭令有水利記其績父老相傳帙掘地決獄政稱神明蓋當時賈人瘞劵以誣寺僧得其情也又黃頡黃中亦賢令之尤者二黃相繼中面黑頡面白邑人以黑白别之錢冰成化杭州府志宣和中為昌化令有政績重建縣治置雙溪館李迎周必大李迎墓表字彥將河陽濟源人欽宗時以恩補將仕郎調婺州都稅院發運使後知臨安府錢塘縣歲旱留運河水溉民田會金國使至漕臣諭迎撤壩通舟迎固請留其曹怒捃托無所得至用前政陳炳事劾迎坐是罷起知婺州金華縣歐陽珣海寧縣志字令美吉之廬陵人舉進士為鹽官令有惠政以薦召入官京師靖康初議割三鎮以和金珣力爭不可忤時相命使於金爭益力遂見殺鄭瑴嘉靖浙江通志字致剛建州人知杭州高宗至杭瑴奏曰陛下南渡出於倉卒省臺寺監百司之臣獲濟者鮮當擢吳中之秀以為用况天下賢俊多避地吳越宜令守臣體訪境內寄居待闕及見任宫觀等京朝官以上各具姓名以聞拔簡任使庶幾速得賢才以濟艱危詔從之章誼宋史本傳字宜叟建州浦城人崇寧進士授杭州通判建炎初陳通寇錢塘城閉部使者檄誼聚杭州七縣弓兵以張聲勢會王淵討賊誼隨淵得入城賊平旋加撫定人皆德之遷二秩擢倉部員外郎劉誨咸淳臨安志建炎二年金人犯杭守臣康允之棄城保赭山寺誨自楚州赴召在城中衆因推之以守城陷死之贈直龍圖閣刁雍萬厯杭州府志丹陽人紹興五年為鹽官令學宫毁廢雍重建焉胡珵記曰雍治尚簡靖察姧不苛訟獄衰息皆實事也王綸宋史本傳字德言建康人紹興五年進士厯臨安府教授權國子正時初建太學亡舊規憑吏省記吏緣為姧綸釐正之弊稍革遷敕令所刪定官兼權兵部郎官言孔門弟子與後世諸儒有功斯文者皆得從祀先聖今闢庠序修禮樂宜以其式頒諸郡縣為監察御史與秦檜論事忤其意罷知興國軍檜死召為起居舍人兼崇政殿説書尋兼權禮部侍郎除資政殿大學士卒諡章敏邵文炳成化杭州府志紹興間為於潛令大興水利又減山鄉折米之直民懷其德政與葉丞相衡同祠縣南號二賢祠張澄萬厯杭州府志紹興八年知臨安府時任同京邑澄有治劇之才請浚治城中二河更不調夫興工惟兩浙諸州城北廂兵千人赴役尋除戶部侍郎復再知郡浚臨安運河徐端輔富陽縣志紹興十五年知富陽縣修學校置學田建稽古閣邑士為之振起趙公預萬厯杭州府志字仲謙常熟人進士為仁和令居官廉正常言吾求為循吏不求為健吏仕至寶謨閣待制周必大嘉靖浙江通志字子充廬陵人紹興進士又中博學宏詞科厯官觀文殿學士進少傅先是監臨安府和劑局失火延燒民居其發火之家皆繫獄必大曰豈惜一官而不救人乎乃自誣服衆遂得釋李祥宋史本傳字元德常州無錫人隆興進士為錢塘縣主簿時姚憲尹臨安俾攝録參邏者以巧發為能每事下有司必監視煆錬囚服乃巳嘗誣告一武臣子謗朝政鞫於獄祥不使邏者入門既而所告無實尹驚曰上命無實乎祥曰即坐譴自甘憲具論如祥意上曰朕幾誤矣卿吾爭臣也厯遷國子司業宗正少卿以直龍圖閣致仕諡肅簡薛良朋成化杭州府志隆興二年以兩浙轉運副使知臨安府警戢盜賊究心職事除直龍圖閣施師點厯代名臣奏議字聖與上饒人乾道元年為臨安府教授用陳康伯薦賜對言厯年屢下詔恤民而惠未加浹陛下軫念惟恐一夫失所郡邑搜求唯恐財賦不集母惑乎日降絲綸恩不霑被細民既困於倍輸又困於非法重以歲惡室且埀罄租不如期積多逋負今明堂肆赦戶自四等以下逋自四年以前願悉除免上曰非卿不聞此言詔從之耿秉萬厯杭州府志江陰人乾道中為新城令勵廉隅勤政事興學校和民人省繁役蠲重賦為一時循吏冠邑人為立生祠仕至侍郎趙希言宋史本傳字若訥惠王令懬元孫淳熙十四年登第調衢州司戶合郡民以計表其坊里標其戶數為圖獻於守守才之會嚴州請復烏龍嶺稅場檄希言往訪之希言力陳不當復漕怒曰衢已復孔步章戴二場何烏龍獨不可復希言謂二場當併罷去漕不能奪二場竟亦廢用薦授臨安府司法知臨安仁和縣闢學宫四百餘畝適大旱蝗集御前蘆場中亘數里希言欲去蘆以除害中使沮其䇿希言驅卒燔之臨平塘隄決希言督役親捧土投石兵民爭奮隄成又築重隄後不復決民病和買絹折錢重希言節公費代其輸纍遷祕書丞著作郎卒贈資政殿大學士封越國公蔡戡咸淳臨安志字定夫晉陵人紹熙四年以前朝大夫試司農卿兼知臨安錢塘縣志補歲潦糴艱戡急請發倉民賴以濟周章周堪成化杭州府志紹熙慶元間章為餘杭令有政績修築溪湖塘岸以防水患民得安居堪為昌化令鑿義井建慈濟院以便行者范之柔萬厯杭州府志蘇州人慶元中知富陽縣督勵諸生躬行課試三年不倦士擢第者皆出其講席下一時稱儒吏云胡衛王日益成化杭州府志衛嘉泰開禧間為於潛令興學勸農置郵立堠甚有政績日益開禧嘉定間為令有惠政嘗言能使民安其生物得其所斯無愧矣吕昭亮萬厯杭州府志嘉定初知富陽縣邑歲被行都掾買石板之役數以千計甚苦其擾前令樓潚欲為民蠲之而未暇昭亮先托所知參政路君備陳利病於宰執前已而率民投牒都堂即獲除免慮久或湮泯勒漕臺帥府所頒二帖於石曾治鳯萬厯杭州府志字君輝清源人嘉定間為富陽令修胡鼻山夾道石闌為義役法又請秋苖折價民皆德之嘗有瑞麥産於境趙師恕餘杭縣志嘉定八年為餘杭令因雨澤愆期地多荒白上書於朝請勸民雜種麻粟豆麥之屬以備歲儉謂專種稻一遇水旱則一年之望絶矣雜種先後參差此失則彼得多少亦足以救目前急朝命從之趙希暨成化杭州府志紹定中為昌化令仁厚愛民時有徵楮漆於民希暨為劄論之極言邑民生理之薄遂罷徵仕至端明殿學士陳旻萬厯杭州府志端平間令新城時民困於茶租錢旻為疏請特與蠲二千八百貫不強其所無以困民力吳革嘉靖浙江通志江州人淳祐中為錢塘令南渡以來錢塘地多為王宮公府而稅賦尚存民以為病革為奏免尋通判臨安府帥寶杭州府志字仲珍濠州人咸淳中授鹽官丞著聞清廉擢昌化令勸農課士聽訟咸得其情後卒於官留葬焉元申屠致逺元史本傳字大用東平壽張人宋平焦友直楊居寬宣慰兩浙舉為都事轉臨安府安撫司經厯為杭州路總管府推官宋駙馬楊鎮從子玠節富於資守藏吏姚溶竊其銀懼事覺誣玠節隂與宋廣益二王通獄具致逺讞之得其情杭人金淵者欲冒籍為儒儒學教授彭宏不從淵誣宏作詩有異志揭書於市邏者以上致逺察其情執淵窮詰罪之屬縣械反者十七人訊之蓋因寇作以兵自衛實非反者皆得釋西僧楊璉真伽作浮圖於宋故宫欲取高宗所書九經石刻以築基致逺力拒之乃止大德二年僉淮西江北道肅政廉訪司事卒致逺清修苦節恥事權貴聚書萬卷名曰墨莊家無餘産海壽元史特濟格傳壽伊實雅爾子也由宿衛世祖朝纍官至大中大夫杭州路達嚕噶齊招復流民有恩惠卒贈翰林直學士封范陽郡侯諡惠敏梁曾元史本傳字貢父燕人大德元年除杭州路總管戶口復者五萬二千四百戶請禁暮夜鞫囚遊街酷刑朝廷是之著為令十年召為中書參議皇慶元年仁宗以曾前朝舊臣持授昭文館大學士阿珠丹萬厯杭州府志大德初為昌化達嚕噶齊至民元間邑燬於紅巾寇阿珠丹力任舉廢公署廬多所興建災亂之餘百姓允賴善榮餘杭縣新志字子華大德間為餘杭縣尹時永安寺僧構結豪家倚勢壓鄉民榮在任每挫辱之一日江浙省平章伊蘇岱爾因獵至其寺僧譖之遂使辱榮榮抗辭以對左右皆懾由是名重一時常濟成化杭州府志大德十一年為餘杭縣尹時歲飢民多流亡濟請於江浙行省以本縣儲糧賑之活民萬數伊德寧古爾萬厯杭州府志延祐間為昌化達嚕噶齊作士勸農政教兼舉建義倉增學廩百廢以興稱為才令王昌成化杭州府志字子榮益都人延祐初為餘杭尹時臨安民許椿赴闕言各縣田稅不均命平章張閭經理昌力辨之事得白惠及旁邑政績著聞轉徽州路推官及卒還葬餘杭觀國山民立石頌功且塑像祠之趙璉元史本傳字伯器至治進士除杭州路總管強毅開敏精力絶人浙右病於徭役民充坊里正者皆破其家朝廷令行省召入郡守集議便民之法璉獻議以屬縣坊正為雇役里正用田賦以均之民咸以為便有盜誘其同惡持刃出市斫人以索金市民乃戶斂以豫之人無敢言者璉曰此不可長也遣卒掩捕之盡戮諸市踰年召拜吏部侍郎杭人思之刻其政績於碑李憼萬厯杭州府志至元四年知海寧州修瓦石堰重設車注之具民皆利之張傑楊維禎張令禦寇碑字漢臣世家濟南為於潛縣令至元乙未賊起安吉東抵縣境傑以義結民為伍乘法修門隍理器械立旗色號凡若干伍傑申令今日與民共死生若輩偷生令以伍乘法殺若輩吾偷生若輩亦以伍乘法殺令即夜統衆二千人迹賊所往殺其魁及從十人賊望風奔潰明年賊又自徽突抵昌化昌化去縣治僅三十里居民皆荷擔謀徙傑餔牛酒呼民復以伍乘法矢如初賊素聞傑名皆遁去縣訖安堵如故仍調鄉夫守禦四門畫理縣事夜巡縣境以為常夏四月淫雨三麥垂稔而腐傑疏諸嶽祠痛自責者三而天大霽齊光祖成化杭州府志字起宗大興人至正丙申以紹興路録事為昌化縣尹時四境有兵光祖乃糾民兵為團保計邑賴以安後苗軍至邑築城獷悍可畏每有需索於民光祖力拒之人稱其剛果王輔海寧縣志字正卿冀寧人至正丙申知海寧州塔心存嫗育有所徵輸於民恆涕泣命之時納哈取宜興楊諤勒哲克大麻強通討華亭後皆鎮禦州境民苦供億輔曲加綏戢俾無逋亡杭州路總管咬住為作王州守安民碑蔣文煥萬厯杭州府志字彥章蒙城人至正庚子為於潛尹時當兵凶疾疫之餘專以招徠撫字為務孫彥卿萬厯杭州府志句容人由人材纍官杭州路總管廉愼有為部中鎮靜以疾卒於官特穆爾魯斯嘉靖浙江通志字周賢喀喇人至正十三年守杭屬蘄黃寇犯郡廟學鞠為瓦礫特穆爾魯斯以學校教化所繫乃謀興造基址舊窄隘因購禮拜寺地以充廣之常額森成化杭州府志為餘杭縣尹增築南湖塘又增縣西官塘十八里迄今免水溢之患民懷其惠曹忠楊維禎曹尹惠政碑字惟良燕人為富陽尹下車首以敦本厚俗為先務屬孔子廟壞乃捐圭田之入率士籍之優饒者以建立為事廟既成聘名師招俊民而教養之不數月絃歌禮讓之風達於郊鄙繼新三皇之宫社稷之祀皆煥然可觀下至郵驛河梁百廢具興歲六月不雨禾將稿忠走祈山川甘雨隨注馬山有虎白晝傷人忠投檄山靈虎尋去張光祖海寧縣志知海寧州以旱禱妙智閣下甘雨隨澍明年復大旱光祖復禱一雨三日又嘗治長安三閘秩滿日劉基作序送之夏思忠嘉靖浙江通志字仲信高郵人授江浙行省郎中改杭州路總管思忠開敏無滯礙遇事勇於有為杭學兵燹之後前守特穆爾魯斯興造甫完守廟者不戒於火悉焚之思忠慨然以興復為已任基址廣袤廟宇嚴整為浙右之冠明朱夢炎萬厯杭州府志字仲雅進賢人故元進士吳元年任浙江按察司經厯明初萬事草創而夢炎守官不怠法紀自張王興福成化杭州府志隨州人知杭州時杭初附民心未安興福明於大體撫輯多方寬簡不苛大慰民望吳元年四月不雨至六月興福致禱立應歲獲有年建山川壇於鳳凰山下滿秩百姓遮留再三諭遣而後行民以彩旗送出境興福謝曰非我之政能惠爾民爾民能奉教條以體我之心尋升吏部尚書嚴德萬厯杭州府志字君輔當塗采石人從太祖以平江浙有功授海寧衛指揮同知守禦杭州統軍取台州力戰死追贈賜祭葬西湖之北山楊璟嘉靖浙江通志濠州定逺人歲乙未從太祖於和陽充先鋒扈蹕渡江克太平南臺鎮江常州諸處丙午隨大軍征浙西克湖州嘉興洪武元年從徐達常遇春北伐有功班師升杭州衛指揮僉事尋升本衛指揮同知孫虎嘉靖浙江通志壽州人剛勇善戰嘗為義兵長以功授千戶領兵守建德從大軍克新城攻桐廬略富陽遂克餘杭取杭州升海寧衛指揮副使嘉興盜起率兵捕斬之袁思謙杭州府志洪武元年知臨安時當兵燹之後闢草萊以開縣治建官署學校壇廟招撫流亡日以矻矻稱為幹吏秩滿升山西布政司理問楊敬杭州府志麻城人洪武初知富陽縣時初闢草萊開縣治建置殷繁敬行政寬猛得宜民感其惠徐弼萬厯杭州府志英德人洪武初為新城知縣縣治學宮皆其創建撫民有方王德宣成化杭州府志饒州德興人洪武五年知杭州約已以廉字民以義崇儒重道作興士類捐俸置書六百二十七册藏於府學崇文閣以畀士子習讀梁初萬厯杭州府志溧陽人洪武七年知餘杭縣時邑初附民尚逃匿邑里荒蕪初多方導民開墾曠土盡闢虎白晝傷人禱於城隍祠患遂息撫字有法民樂耕桑數年雞犬相聞井邑蕃殖且孜孜興飭學校人士稱之楊卓史槩字自立一字子淵南昌人洪武辛亥進士授吏部主事踰年改杭州府通判為政豈弟杭民兄弟爭田各有私親教唆主持纍歲不決卓至悉屏私親獨召兄弟兩人曉譬深切皆感悟相讓厯官皆繁劇躬涖勤敏未嘗有滯事李可立萬厯杭州府志洪武間為新城知縣建宣聖廟兩廡明倫堂齋舍請貸種食撫民愛士人稱為秀才李褟銘德嘉靖海寧縣志南雄保昌人由監生任海寧縣丞治民無擾為政有方繕葺學校升寧國知府邱子強成化杭州府志永豐人洪武十八年為餘杭丞簡重有威吏非押文書不得升廳公庭肅然示民以信賦稅科差與民期約曉以利害量力取辦未嘗給帖遣吏胥虐鄉里張浩成化杭州府志巴陵人任新城縣學教諭生員屢次詣闕保留凡在任二十九年募塑聖賢像砌泮池作櫺星門一以公平絶去已私李發成化杭州府志胙城人洪武二十八年為餘杭丞剛明廉直教民有方有父子異居分財者以五教五刑勸善懲惡之道諭之民感悅而化劉頤萬厯杭州府志洪武三十一年知臨安縣賦役均平民無橫擾升任去久衆猶懷之韶頀嘉靖仁和縣志陜西岐山人洪武三十一年任仁和居官能幹為政不苛獄無留滯吏民畏而愛之黃信中錢塘縣志洪武間知錢塘縣奉職循理勤公恤下為治以廉約著稱秩滿當去會知府員缺部民詣闕懇請即擢知杭州府保釐有方時稱循吏林源萬厯杭州府志福建長樂人永樂元年知餘杭縣首興學校修大成殿造明倫堂朔望勸課生徒咸知感勵賦役均平催科不擾凡部使者行縣詢吏賢否至林令皆以公勤廉敏對盧玉潤成化杭州府志江西新淦人由吏員厯杭州知府勤愼愛民刑不苛暴吏服其明升廣東參政葉宗行分省人物考華亭人永樂中知錢塘縣為定役法俾民自占甲乙書於册循次而呼之役遂以均詞訟亦簡不逾年翕然稱治一日廳事前有蛇蜿蜒若有所訴者宗行曰若豈有寃乎吾為汝驗之蛇返入餅肆中爐下發之得尸乃肆主人利其財殺而埋此遂伏誅又嘗江行忽舟重不能進視之一尸挂柁下有石乃里中人殺而沉之者亦伏誅縣多虎暴為文祭之虎遂斂迹按察使周新尤重之嘗候宗行出潛至其舍視之惟笠澤銀魚乾一封新攜少許去明日召以食曰此君家物也飲之至醉人呼為錢塘一葉清劉秉萬厯杭州府志獲鹿人永樂中由太學生知新城縣在任袪虎患一十有八邑之折桂鄉有魚池潭與祥禽鄉鄰界水雖歸聚於潭而順流東下勢不久蓄又南屏隔山田畝每畢不能灌溉秉躬度地形率民夫千名鑿山通道築堰二十餘丈又為閘以愼防蓄泄仍立堰長司之自堰下流至於龍山下注石頭及宦塘路口上下溉田二千餘畝化為膏腴後人立廟以祀易輗萬厯杭州府志高安人永樂九年為杭州府通判廉幹勤敏政理公平倅郡數年鋤強革弊民為謡曰易打鬼清如水擢高州知府胡勉萬厯杭州府志字志學鹽城人永樂十一年擢杭州知府精勤敏決抑豪右摧姧宄吏不得肆至窮閻細氓保愛矜恤惟恐傷之勸學興禮敦崇文儒士風丕振以憂去熊以淵成化杭州府志南昌靖安人初任蕭山縣丞以廉能薦升杭州府通判專治農務躬厯田野率民具畚鍤築堤瀹河濬導溝洫堤塍之傍樹以桑柳俾水旱有備民蒙其利秩滿升泰安州知州陳復名山藏懷安人永樂甲辰進士知杭州府治尚簡易獄訟減少日惟端坐堂上與羣吏講讀法令愼職守而已卒於官貧無以斂按察使軒輗倡為賻贈其子盡却之曰吾父清白敢沒而汚之假貸歸喪謹按舊志作陳福未詳孰是陳嘉成化杭州府志長樂人宣德七年為海寧主簿縣與海寧千戶所錯處軍縱官馬戕民稼及巡夜生事嘉乞巡夜自著有司官馬害稼戳傷勿論由是民庶獲安吳堂富陽縣志樂平人永樂辛丑進士宣德九年知富陽宿弊盡釐庭稀訟牒嘗繪楊震却金故事於退食所以自勵與部使者不合解秩去父老詣闕乞留復職一邑歡呼如再覩父母在任築春江隄復東觀山關奏減白綿貢修飭庠校建譙樓廣城隍廟新子陵祠修富春志此政績之最著者秩滿民立祠名曰報功聶大年堯山堂外紀號東軒臨川人景泰間為仁和訓導一時達官顯人皆禮重之厯官九年不以家眷自隨天順初被徵修史卒於京邸嘉靖仁和縣志大年以明經訓仁和士有貧不能自存者捐俸周之升教諭教思益𢎞大有成就侯昌成化杭州府志山東魚臺人由監生正統元年授杭州府同知貯米穀以備賑濟修陂塘以備旱潦民賴之升處州府知府許璞嘉靖仁和縣志字玉卿鳳翔人發解舉首正統六年薦升仁和縣公平廉愼輕徭薄斂卒官貧無以斂民爭賻之郭郊嘉靖海寧縣志直𨽻肥鄉人由進士正統十一年任海寧縣廉介過人明威得體升南京戶部主事段信萬厯杭州府志陜西三原人正統丙辰進士任杭州府推官明習憲章精聽斷持法不務深文而姧宄卒無縱舍召拜御史仕至僉都御史鄭循初萬厯杭州府志字子初莆田人正統十二年鄉薦授餘杭訓導嚴條約以身先之祁寒暑雨必衣冠端坐為諸生講解竟日無怠容仕終秦府右長史羅能海寧縣志吉水人正統甲子任海寧學教諭課士分三等雞鳴而起夜分不倦時師道嚴士皆絃誦於泮宫倡率不倦明代以儒官列爼豆者能為之首楊達成化杭州府志合肥人襲杭州右衛前所正千戶以廉能稱正統十三年隨軍征勦金華處州盜賊至武義縣首先禦賊殁於陳贈指揮僉事江永成化杭州府志望江人襲杭州前衛指揮僉事正統十三年隨軍征勦衢州府盜賊至江山縣奮勇陷陳亡贈指揮同知脫剛仁和縣志列伯之孫任杭州前衛指揮同知果鋭善戰每摧鋒陷陳為士衆先正統十四年征勦處州劇寇時賊兵圍城造火車攻城風急火熾城幾陷天忽反風火爇敵車賊衆敗走剛開門追之手揮二劍縱橫如飛追奔數百里斬首數百級益務深入賊合圍蹶其馬剛下馬步鬬猶手刃數十人衆爭刺之遂遇害景泰間贈官賜御祭張隆萬厯杭州府志雲南建水人正統中由監生任杭州府知事蔚有賢聲景泰元年以言者薦擢本府通判尋進知府患杭俗侈汰躬為節儉以矯正之身所服御僅同寒素靡俗為之少變厭俗吏苛急政尚寬簡有古循良風以母喪去行李蕭然人服其介張杲萬厯杭州府志長洲人正統間由舉人為新城知縣凡邑中所辦弓張厯日水夫驢站等料咸減價利民張禧分省人物考字公錫靈壁人景泰甲戍進士令餘姚邑有水怪虎患僖為文祭之遂息升杭州知府值歲飢設法賑濟全活六萬餘戶晉湖廣參政未行卒杭人祠之馬偉成化杭州府志直隸瀛海人景泰間以舉人為杭州府同知為政簡易尚文雅修嶽武穆墓廟奏與廟額曰忠烈加一祭以春秋仲月行事升處州府知府胡濬魏驥胡濬傳字源淵鉛山人登進士天順改元知杭州府躬行屬邑察民利病時值久旱行次新城見田疇乏水灌溉濬登山周視見五里之外有水可引為濟召其主諭以引水開渠田遂得水是歲大熟民感其惠名渠曰胡公渠次富陽田之水猶新城相其地上可引山泉下可引江水乃召民致閘一所而時其蓄泄民亦名其閘曰胡公閘新城有許遠廟錢塘有白居易蘇軾林逋三賢祠歲久傾圯倡率修建以聳士民之瞻仰張敏萬厯杭州府志直隸蠡縣人天順五年由舉人知餘杭縣事惠庇善弱威制豪強居二年事治民安治績稱最以母憂去士夫作青天歌以送之唐子昌萬厯杭州府志湖廣會同人由舉人厯桐廬教諭天順四年擢臨安知縣不事苛察民有爭訟者呼至案前曉以禮法戒以禍福皆感服曰真吾父母也鼎新學林橋修葺學宮官署城隍廟宇煥然聿新九載秩滿遂占籍臨安江湖萬厯杭州府志潼關衛官生成化元年由舉人任新城縣清廉勤政遇有旱災設法勸相賑濟飢困崇重學校士民頌之黃升昌化縣志號與竹番禺人舉鄉試由肥鄉學擢昌化令嘗六月祈雨芒履出禱入則焚香私第密禱如外三禱三雨邑中虎為民害以文禱於神虎去陳榮顧璘陳榮傳字仲仁上元人中成化舉人知仁和縣仁和財賦重困且附省城榮戴星出入案無停判篤意愛民不以毁譽禍福置慮歲旱請減民租什五監司曰二亦足矣榮曰災應如此奈何厲民卒守前議方冬發民築海堤民多凍死榮曰邀逺利以蹙近害民何以堪遂罷役踰年政成乃興庠序之教建社學十許所禮教日振御史歲巡罔不旌禮之陳讓獻徵録字德光大河衛人由進士知杭州府息嚚訟均賦役抑驕侈境內大治時海勢漸內徙逼海寧城羣䇿莫能治乃請去城一里支河築內堤延袤十里以寬制猛不與海爭利海果至堤而止省城姧人多托權勢家避匿糧差悉查核歸正無敢怙終者梁萬鍾仁和縣志字天錫四川溫江人成化戊戍進士知仁和興利舉廢斷獄明愼寃滯者多所平反擢知杭州浚西湖以瀦水使旱潦有儲新嶽武穆王祠政尚寬簡升兩浙鹽運使乞休逆瑾持托代民償逋負三千金盡鬻已産輸官恬不介慮鄭軾萬厯杭州府志字式之江西永豐人成化十五年由進士知餘杭清白自持下車即詢訪民情釐革夙弊夏秋二稅皆預與民為期鄉無吏迹而輸納者嘗先他邑母老隨任以疾卒棺斂不備有以賻奠饋者却之不攜一物以行民無老幼皆流涕後升監察御史方早萬厯杭州府志歙縣人成化問由舉人任臨安御吏方嚴聽訟明允尤重學校敬禮士夫創造竹林長橋一座以便往來鄧淮富陽縣志吉水人𢎞治二年知富陽縣有惠政留心學校移廟學於西以造士子崇重先賢敦尚風教訪俞膺遺文表章之復優恤其子孫余本釗萬厯杭州府志字應明江夏人𢎞治五年以舉人知錢塘縣有治績為時所稱歙人張良寓杭為人所誣當具獄為昭雪之良深感德繪像以示子孫李璧嘉靖仁和縣志字白夫武緣人𢎞治八年領鄉薦授蘭溪教諭改仁和居官不茍取豫士子有貧不能養生送死者出俸資之學宮文物有廢缺者奮然修舉仁和縣志部使者欲移石經抗顏執爭竟莫能奪士林為之語曰白夫先生今之胡瑗也仕終南京戶部員外郎嵇鋼萬厯杭州府志字汝堅安東人𢎞治壬戌由舉人知於潛縣愛民好士興學校鋤強梗案無留牘以才名調海鹽兩地之民思之李頎仁和縣志河南考城人𢎞治乙酉舉於鄉初任海鹽改知於潛厯署仁和餘杭縣事以廉愼著稱陳祥萬厯杭州府志福建永安人𢎞治十五年以監生授餘杭縣主簿涖官清愼境內橋道墟岸時加修理不斂民財而事自辦憫孤窮好賢士楊孟瑛萬厯杭州府志字溫甫四川酆都人成化丁未進士𢎞治十五年知杭州當事敢任如奏安溪竹木關却福建進貢之借艘於杭減免旱災糧七萬石定水馬驛夫之徵皆便民美政其浚復西湖俾水有蓄泄利益下塘諸田尤漙王翔鳯嘉靖臨安縣志遼東舉人𢎞治間任臨安廉而有為追積年侵欺之稅糧禁豪猾鼎建文廟厯官三載囊槖蕭然百姓戴之如父母朝覲赴京致仕承天秀常州府志字鍾之靖江人正德丁卯鄉舉授錢塘知縣厯任九載會織造內監畢真有逆謀約翌日黎明發兵時漏下二鼓天秀偵得其實乘夜集兵城上張燈發炮畢驚怒聚衆鼓譟見守禦已嚴即解散事聞置畢於法彭辨之分省人物考霍山人字問夫正德戊辰進士知餘杭縣時逆瑾舞權浙省苦於織造力裁之邑得不擾擢工部主事出補饒州府進山東參政喻江餘杭縣志字朝之藤縣人正德十二年知餘杭性廉介樂易愛人至有利害關一邑則果於有為毅然無所畏憚葺孔子廟庭舊名宦鄉賢無祠擇學舍東偏構祠以祀吕夔萬厯杭州府志字祖邦永豐人正德間知杭州府惠愛旁洽吏民安之逮歸攀輿泣而送者塞路王正宗嘉靖臨安縣志固安人正德十三年由進士任臨安縣俗尚邪術悉禁止之毀淫祠以正人心凡把持官府牙行私報竹木茶筍糧里多科違例取索之害禁革殆盡尤作興學校修理兩廡齋號及坊表政暇即詣學講書考文始終不倦去時行李蕭然升御史查仲道萬厯杭州府志字文夫寧州人正德甲戌進士除兵部主事嘗力諫武廟南巡被杖嘉靖初為杭州知府時織造中官肆暴於民仲道及右使馬卿每事抗之為所媒孽與卿同時械捕至京謫福建運司