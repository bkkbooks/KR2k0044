body:
  text: 浙江通志卷二百五十九藝文一文章經國之大業與政治通故曰文以載道非是則言之無徴焉會稽文士立言粲盛見於朱育之對曄若春榮上下千百年間述作已云大備顧名山石室之藏搜羅未盡第擇其有關吏治民生山川風土者存什一於千百云志藝文詔漢武帝賜嚴助詔詔會稽太守君厭承明之廬勞侍從之事懷故土出為郡吏會稽東接於海南近諸越北枕大江間者闊焉久不聞問具以春秋對毋以蘇秦縱橫晉元帝恤吳郡飢詔天下凋弊加以災荒百姓困窮國用並匱吳郡飢人死者百數天生蒸黎而樹之以君選建明哲以左右之當深思以救其弊昔吳起為楚悼王明法審令損不急之官除廢公族疏逺以附益將士而國富兵強况今日之弊百姓凋困邪且當去非急之務非軍事所須者皆省之晉孝武帝除三吳租布詔三吳奧壤股肱望郡而水旱併臻百姓失業夙夜惟憂不能忘懷宜時拯恤救其凋困三吳義興晉陵及會稽遭水之縣尤甚者全除一年租布其次聽除半年受賑貸者即以賜之宋太宗曲赦兩浙德音惟皇建極括宇縣以開階惟辟奉天法陽春而流惠我國家丕承大業光宅中區奄三代之提封盡歸王化撫萬邦之生聚皆樂皇風近又吳越國王錢俶逺效忠規嘉逢昌運走梯航而入覲叩宸扆以披誠願輸奕世之土疆盡入天朝之封域眷兹恭順特議允俞言念吳方久疏王澤當混同之資始均茂育以攸宜爰頒在宥之文俾預太平之化應兩浙管內云云於戲四海一家既大同於文軌三吳百越屬初被於照臨固於撫御之間良軫寐興之念彼中官吏差去使臣更施存恤之方廣示懷柔之道令其富庶慰朕焦勞告示遐方知豫厚意宋太宗均租詔詔兩浙諸州先是錢俶封國之日民多流亡棄其地為曠土宜令所在籍其壠畝之數均其租每嵗十分減其三以為定制仍給復五年召遊民勸其耕種厚慰撫之以稱吾務農厚夲之意宋真宗吳山廟春秋建道場詔詔曰杭州吳山廟神實主洪濤聿書往册頃者湍流暴作閭井為憂致禱之初厥應如響禦災捍患神實能之用竭精衷有加常祀庶慿諴感永庇吾民宜令本州每嵗春秋建道場三晝夜罷日設醮其青詞學士院前一月降付宋髙宗放免租稅詔朕遭時艱難遂為行國凡駐蹕去處理合優異寬恤民力始稱朕懷其臨安府諸縣人户拖欠稅租等物依去秋眀堂赦令合行倚閣者並特與放免如官吏日後復行催納者依沮格詔令科罪宋髙宗罷修造詔比移蹕臨安六宫尚留會稽者政緣不欲增廣行闕重困民力訪聞行在係官修造去處甚多可日下並罷自今後非得旨許令增修而輒敢擅役人夫者令御史臺糾彈以聞仍令尚書省出榜曉示頒行宋髙宗蠲免兩縣民户地基和買詔比聞臨安府錢塘仁和兩縣昨經兵火焚毁其民户居止惟存地基而又有為官府營寨拘占者尚依舊家業錢均敷和買絹數既無從出豈免逋負追呼催索在所愍恤可令本府契勘見為官占去處許計家業錢蠲免絹數仍具榜示宋髙宗親耕藉田詔朕惟兵興以來田畝多荒故不憚卑躬與民休息今疆場罷警流徙復業朕親耕藉田以先黎庶三推復進勞賜耆老嘉與世俗躋於富厚昔漢文帝頻年下詔首推農事之本至於上下給足減免田租光於史册朕心庶幾焉咨爾中外當體至懷誥宋孝宗賜臨安府尹周淙誥畿方千里俗具五民趨利者率多巧偽忘身者公肆奪攘非間之以義守之以信求囹圄之空未易得也卿以吾上嗣尹正自司事以來風流篤厚禁網疏闊刑罰用稀今也俾無一人之獄足以副吾欽恤之意矣賀章來上嘉歎不忘制盧元輔除杭州刺史制唐白居易河南縣令盧元輔早以學藝列在周行嘗守商都頗聞有政再領京縣益見其才江南列郡餘杭為大征賦猶重疲人未康藉爾登車往分憂矚勞徠安輯稱朕意焉賞賢旌能以佇報政可李訥除浙東觀察使兼御史大夫制唐杜牧仲尼以舉賢才則理大禹以能官人則安况西界浙河東淹左海機杼耕稼提封七州其間繭稅魚鹽衣食半天下不有可使豈宜委之正議大夫使持節華州諸軍事守華州刺史兼御史中丞充潼關防禦鎮國軍等使上柱國隴西縣開國男食邑三百户賜紫金魚袋李訥溫良恭儉齊莊中正實以君子之德華以才人之辭揚厯清顯昭彰令聞輟自掌言式是近輔子貢為清廟之器仲弓有南面之才智莫能欺剛亦不吐表率教化皆有法度今者兵為農器革作軒車言於共理在擇循吏是故用已效之績託分寄之任擁蒨斾而服玄玉化千里而有三軍儒者之榮莫過於此孔子曰仁者愛人智者知人愛人則疲羸可蘇知人則才幹不棄土宇既廣殺生在我考此二者可以報政榮加副相用壓大邦爾其勉之無忝所舉可使持節都督越州諸軍事守越州刺史兼御史大夫充浙江東道都團練觀察處置等使散官勳封賜如故許懋為兩浙轉運副使制宋曽鞏敕具官某朕擇遣使者分部而治雖以將漕為稱然實總民政之舉措察吏屬之能否蓋連數十城之地舉而屬之其選豈不重哉爾詳練敏明宜服豫采蓋爾之職非止於督賦斂斷獄訟而已惟除苛息擾可以使民遂其宜惟務實去華可以使吏馴其行宣恩德而美風俗待爾能善厥官可不勉與以祗朕命可兩浙轉運副使許懋可令再任制宋蘇軾敕具官許懋吳越之人凋敝久矣朕方蠲理繁碎以安養其衆非得循吏察視郡縣均通有無則民何賴焉以爾儒術精通吏事詳敏厯年於兹民便其政既信之俗必易為功庶無新故更代之勞而有上下相安之美勉修前業無怠日新可行知杭州葉夢得復舊職制宋汪藻股肱宣力四方實寄藩維之重精神折衝千里允資師帥之良矧吾左右之臣殿彼東南之服雋功來上褒渥可忘具官早以時才揚於禁路粹矣朝廷之表巋然人物之英治必有聲能使可居之官大動皆中節故每不勞而功成比緣蛇豕之妖未正鯨鯢之戮篁竹深阻溪山繹騷乃攄堂上之奇盡服潢中之衆惟三仕三已莫眀令尹之心故七縱七擒微見武侯之略宜還寵數用示眷懷尚加厲於壯猷庶永綏於遐俗可木待問知湖州制宋樓鑰敕具官某儒科首選宦達相望儲禁舊僚收用略盡慈皇初開南省爾則為多士之先沖人頃居東宫爾則任端尹之寄而十年以來欲仕輒已朕嘗念之惟近臣為眀當塗之誣浮議遂定吳興劇郡視古左馮衆所憚為舉以試女勿以多言為畏倚需最課之聞髙爵美官豈於汝吝可新知紹興府倪思改知婺州制宋樓鑰敕具官某視禁林之草原藉於通儒分輔郡之符俯從於忱請相才既審易地皆然爾學優而醇文麗以敏蚤登宏博之選徑上清華之途翰院詞垣擅兩制絲綸之美經帷史館極一時筆橐之榮擢二儀曹獨司秩祀拭圭出使握節言旋曽坐席之未溫遽抗章而自列豈久勞侍從之事遂厭直承明之廬懷會稽太守之章致勤再命繼東陽隱侯之詠去擁一麾勉為朕行毋輕民事詞人而任嶽牧初無內重之偏宣室之對鬼神當俟政成之後可教舉潘綜吳逵孝亷教晉王韶之前被符孝亷之選必審其人雖四科難該文質寡備必能孝義邁俗拔萃著聞者便足以顯應明敡允將符旨烏程潘綜守死孝道全親濟難烏程吳逵義行純至列墳成行咸精成內淳休聲外著可並察孝亷永嘉郡教梁丘遲貴郡控帶山海利兼水陸實東南之沃壤一郡之巨會而曝背拘牛屢空於畎畝績麻治縣無聞於窐巷其有耕灌不修桑榆靡樹遨遊鄽里酣酺卒歲越伍乖鄰流宕忘返才異相如而四壁獨立髙慚仲蔚而三徑沒人雖謝文翁之正俗庶幾龔遂之移風表薦賀循表晉陸機伏見吳興武康令賀循德量邃茂才鑒清逺服膺道素風標凝峻厯踐三城刑政肅穆守職下縣編名凡萃出自新邦朝無知己恪居遐外志不自營年時倐忽而邈無階緒實州黨愚智所為悵然臣等並以凡才纍授飾進被服恩澤忝豫朝末知良士後時而守局無言懼有蔽賢之咎是以不勝愚管冒死表聞為杭州刺史崔元將獻緑毛龜表唐李嶠臣聞五氣殊方元龜列於玄武四靈異稟神蔡遊於紫泉用能藏往知來發祥祚聖大禹之永終天祿文薦九疇隆姬之乃命帝庭兆言三吉永言祕寶録存縑簡伏惟皇帝陛下藴靈沙劫屈道璿樞推正覺而御彛倫𢎞大悲而撫羣俗雲行雨施之澤下漏三泉春生夏長之仁曲成萬物恩洎草木惠覃飛走天澤感氣而延和神靈應德而呈瑞伏見所部錢唐縣人聶幹於市內水中獲毛龜一枚修尾長頭玄甲緑毳名掩於楚宗狀奇於靈繹雖六眸在首未足尚其禎祥五色成文詎能齊其詭異伏從蓍而自久下蓮芳而暫出美兼曠代休踰羣祉謹按孫氏瑞應圖曰王者德澤湛漬漁獵從時則靈龜出禮含文嘉曰內外之制各得其宜則山澤出靈龜陛下解網收罟𢎞天地之大德創制改物窮帝王之能事宜其膺受冥貺克享珍符且益有十朋表賢才之入用夀踰千祀彰聖厯之無疆嘉祉不召而自臻乾象無祈而潛應臣謬當重寄親奉洪庥靈異受臻既駭於常觀忭舞胥屬實兼於恆品無任慶躍之至進瑞瓜頌表唐栁宗元臣某等今日內出浙東觀察使賈全所進越州山隂移風鄉産瑞瓜二實同蒂圖示百僚者寶祚維新嘉瑞來應式彰聖化克表天心臣等誠慶誠賀頓首頓首伏惟皇帝陛下保合太和緝熙黎庶馨香上達淳化旁行嘉瓜發瑞來自侯服質維同蒂見車書之永均地則移風知化育之方始雖七月而食豳土歌王業之難五色稱珍東陵詠嘉瓜之會未聞感通若斯昭著者也臣某等遭逢聖運親仰珍圖欣蹈之誠倍百恆品無任慶悅之至杭州刺史謝表唐白居易臣居易言去年七月十四日蒙恩除授杭州刺史屬汴路未通取襄漢路赴任水陸七千餘里晝夜奔馳今月一日到本州當日上任訖上分憂寄內省庸虛仰天戴恩局地失次臣居易謬因文學忝厠班行自先朝黜官已來六年放棄逢陛下嗣位之後數月徴還生歸帝京寵在郎署不踰年擢知制誥未周歲正授舍人出泥登霄從骨生肉唯有一死擬將報恩旋屬方隅不寧朝廷多事當陛下旰食宵衣之日是微臣輸肝寫膽之時雖進獻愚衷或期有補而退思事理多不合宜臣猶自知况在天鑒忝非土木如履氷泉合當鼎鑊之誅尚忝藩宣之寄才小官重恩深責輕欲答生成未知死所唯當夙興夕惕焦思苦心恭守詔條勤恤人庶下蘇凋瘵上副憂勤萬分之恩莫酬一二仰天舉首望闕馳心葵藿之志徒傾螻蟻之誠難達無任感恩激切之至為杭州李使君論李藏用杭州功表唐獨孤及臣及言臣聞當逆賊劉展擁兵過江之日變起倉卒鋒不可當人心動搖物情危殆五道節制望風潰散自淮而南至於海隅無敢保一城能守一節者唯少府少監李藏用以宗室近屬憂國如家臨危抗憤忠勇奮發收聚散卒糾合義士挺身履險出萬死一生之地與賊轉戰堅守蘇州相持經月殺獲過當使凶賊徒黨鋒鋭挫衄其後以外援不至衆寡懸絶遂移師就險退保杭州當此之時江淮諸軍已散平盧之師未至三分全吳賊有其二藏用且募戰士獨守孤城以忠義感激令驍勇樂用旬月之間致死士三千賊遣偽將張景超孫待封等盡鋭率衆分道來攻藏用與士卒等戮力一心義形於色殊死決戰奮不顧身遂能兵鋒所加無不摧陷皆一舉盡敵覆而屠之前後俘斬虜獲至數萬計向微斯人之功捍此州之境則江略土宇盡為敵疆海隅蒼生非復我有云云謝賜鐵劵表唐錢鏐恩旨賜臣金書鐵劵一道臣恕九死子孫三死者出於睿眷形此綸言録臣以絲髮之勞賜臣以山河之誓鐫金作誓指日成文震動神祗飛揚肝膽伏念臣爰從筮仕逮及秉旄每自揣量是何叨忝行如履薄動若持盈惟憂福過禍生敢冀愼初護末豈期此志上感宸聰憂臣以處極多虞慮臣以防間不至遂關聖慮永保私門朂臣以功名申諸帶礪雖君親囑念皆云必恕必容而臣子為心豈敢傷慈傷愛謹當日謹一日戒子戒孫不敢因此而纍恩不敢承此而賈禍聖主萬嵗愚臣一心臣誠惶誠恐頓首頓首杭州謝放罪表宋蘇軾臣近以法外刺配本州顏章顏益二人上章待罪奉聖旨特放罪者職在承宣當遵三尺之約束事關利害輒從一切之便宜曲荷天慈不從吏議伏念臣早緣剛拙屢致憂虞用之朝廷則入耳之疢形於言施之郡縣則疾惡之心見於政雖知難每以為戒而臨事不能自回茍非日月之明肝膽必照則臣豈惟獲罪於今日久已見傾於衆言恭惟皇帝陛下濬哲生知清明旁達委任羣下退托於不能愛養成材惟恐其有過知臣欲去一方之積弊須除二猾以示民特屈憲章以全器使臣敢不省循過咎祇服簡書眷此善良自不犯於漢法時有貸舍用益廣於堯仁杭州謝上表宋蘇軾入奉禁嚴出膺方面皆人臣之殊選在儒者以尤榮臣受寵逾涯積憂成疾既思退就於安養又欲少逃於滿盈仰荷至仁曲從微願江山故國所至如歸父老遺民與臣相問知朝廷輟近侍為太守蓋聖主視天下如一家鞭撲未施爭訟幾絶臣之厚幸豈易名言此蓋伏遇太皇太后陛下天地之仁賢愚兼取日月之照邪正自分每包涵其憃迂欲保全其終始兄弟孤立嘗親奉於德音死生不移更誓名於晚節湖州謝上表宋蘇軾臣軾言蒙恩就移前件差遣已於今月二十日到任上訖者風俗阜安在東南號為無事山水清逺本朝廷所以優賢顧惟何人亦與兹選伏念臣性資頑鄙名迹堙微議論闊踈文學淺陋凡人必有一得而臣獨無寸長荷先帝之誤擢置之三館蒙陛下之過聽付以兩州非不欲痛自激昻少酬恩造而才分所局有過無功法令具存雖勤何補罪固多矣臣猶知之夫何越次之名邦更許借資而顯授顧惟無狀豈不知恩此蓋伏遇皇帝陛下天覆羣生海涵萬族用人不求其備嘉善而矜不能知其愚不適時難以追陪新進察其老不生事或能牧養小民而臣頃在錢塘樂其風土魚鳥之性既自得於江湖吳越之人亦安臣之教令敢不奉法勤職息訟平刑上以廣朝廷之仁下以慰父老之望臣無任悚惶激切之至明州謝到任表宋蔡肇失職之誅尚容自劾非常之寵更以曲加弗獲固辭具嚴名訓叨塵特甚感涕難勝臣聞人有能有不能聖主量材而授職仕或去或不去人臣秉義以事君儻已試而可知敢懷安而自止雖君父保全之恩厚不汝瑕疵顧國人可否之論公有靦面目伏念臣昨繇省户擢置詞垣盡出聖神獨斷之明本無左右遊談之助然名過其實者殆用非所習則窮况逢聖治之日新竊仰睿文之天縱咸池張洞庭之野海鳥炫驚秋水灌涯涘之間波臣自蕩莫知攸濟宜厚厥愆敢期全度之恩更溢褒嘉之典既聫法從仍畀名城恭惟皇帝陛下如天覆臨以生以遂薄海內外悉主悉臣眷甌粵之偏陬控東南之巨浸鰐蛟霧濕之所蟠鬱夷𨽻􅔓舶之所往來方旋反於使軺將嗣修於貢職謂宜推擇以重拊循而成結約無奇間關少與徙溪潭之醜類素乏雄文贏賈客之購金初無佳句矧今郡國守令之政具存典謨訓誥之書奉以周旋雖不能識其大者求之度數庶幾或推而行之有以及民是為報國湖州到任謝表宋朝補之臣補之言奉敕就差知湖州已於四月二十九日到任訖始解蒲中即臨霅上去股肱之要郡得山水之名城除授每優事功常歉愚衷內揆感涕交揮臣補之本以寒生起於下國艱勤少日既孤露以不天問學長年又僻違而無類未足稱王裒之選奚取銓衡不能措遊夏之辭何知筆削臣昨所自陳列皆出悃誠已憂疾憊之莫勝更覺才殫之難強恐隕越無以塞責故遵循兾於食功終賴察微俾從補外逮令移徙復竊便安然臣自惟何人徼幸乃得若此斯蓋伏遇皇帝陛下道光前烈仁覆羣倫瑾瑜所貴於匿瑕菅蒯可收而代匱故容器使屢及下材而臣以五十嵗服官之時當二千石共理之任有心許國蓋早脫於冗員無地輸忠但益修於常職臣無任感天荷聖激切屏營之至湖州到任謝表宋王十朋逺障承流乏循良之善政近藩改命仰覆載之隆恩祗領訓詞彌增感涕伏念臣五年去國兩地分符饒俗浩穰有難調之巨室夔疆瘠鹵介絶險之烏蠻但思治已以先人豈忍擾民而生事幸田里安其不奪而獄訟由之少稀敢曰懷歸實緣多病輒控祠庭之請屢干扆寧之嚴既寬斧鉞重誅復畀股肱佳郡瞻清光於便殿展素藴之忠言謂能恤民忽蒙天語見奬徙於近地極佩聖德無涯何意衰庸有此遭際兹蓋伏遇皇帝陛下至仁兼被大智難名憐臣守志弗渝知留心於惠養奉躬匪懈甘盡節於勤勞故降異除華於朽質臣敢不持循憲度效法京師詠靈沼於真卿深體好生之德恢儒官於安定益陶善教之風嚴州謝到任表宋陸遊穿延和之細伏而咫尺天佩新定之佐符秩二千石叨塵過分感懼交懷中謝臣聞明主恩深書生命薄唐帝之知李白一官不及於生前漢皇之念相如遺稿徒求於身後况如臣輩敢望昔人猥緣一技之卑嘗綴百僚之末雖簪笏久違於昕謁乃姓名猶在於淵衷乘傳來歸兩奉召還之旨懷章欲上亟蒙趨對之榮親降玉音俯憐雪鬢勞其久别蓋寵嘉近侍之所宜勉以屬文實臨遣守臣之未有兹蓋伏遇皇帝陛下睿謨冠古英斷如神肆筆成書千載獨髙於聖學研經汲古諸儒絶企於清光以臣夙被化於明時憐臣未廢書於晚歲將激昻其素志故闊略於往愆臣敢不戴使愚使過之恩念有社有民之寄憩棠隂而聽訟期無墜於家聲及瓜戍而代歸尚少酬於君賜湖州到任謝表宋王炎便朝賜對近輔班條起諸間散之餘付以蕃宣之寄喜非所望懼不能堪伏念臣曩以散才濫升鄉貫老隨災至命與志違入三館者四年瑕疵不掩把一麾者數月瘡疣已成坐此罷歸宜其永廢乃從家食驟得守符况古稱苕霅之間湖山清逺而今此京畿之內事物浩穰自揆何人可居此地第緣疏淺不敢控辭識暗慮疏何以撥煩而治劇身衰氣憊難於扶弱而仆強縱欲佩韋終虞傷錦恭遇皇帝陛下皇明日照聖度天涵在知人而能官人雖加遴選善取物而無棄物亦或兼收臣敢不益戒曠官深思補過寧催科之政拙惟務便民但寬大之意行是為報國浙東提舉到任謝表宋朱熹宣教郎直祕閣提舉兩浙東路常平茶鹽公事臣朱熹上表臣言準告授臣前件差遣填見闕臣已於今月六日就本路蕭山縣交割職事訖者擢於偏壘付以外臺便道造朝單車詣部延見父老問其疾苦之因宣布詔書諭以丁寧之意榮逾望表懼溢情涯伏念臣生長田間棲遲林壑居然朴拙見謂迂踈潛心切慕於師承行己敢干於義命會逢聖旦參預時流驟自草萊起分符竹乾坤大德施且不資螻蟻私情報於何有屬歉嵗民無艱食詔愚臣職有微勞寵之册府之華畀以近畿之節雖駑馬之十駕緩者鞭之然鼯鼠之五窮技止此耳毋乃纍公朝之選重以為多士之羞兹蓋伏遇皇帝陛下闢舜四門馭周八柄欲尺寸之長並用致孱微之品亦收比奉對揚親叨臨遣大明委照不棄負薪之言零露疏恩更下賜緡之令顧受所在稱塞為難臣惟當恪意講求因時施舍不能則止戒小己之便文當官而行效古人之報國庶殫毫末上答丘山浙東提舉到任謝表宋潛説友一再命以為州咸無善狀六百石以察部誤拜渥恩身慚安便之為優衆謂甄升之獨異乾坤德大毫髮命輕竊惟斂散之微權莫重常平之使者山澤之利以裕國倉庾之儲均於民惟源流本末之阜通則上下有無之兼足豈特欲九年之益蓄亦戒夫一孔之不遺恪持經常當辨取豫至於民情休戚之本吏治否臧之分事毋壅於上聞澤乃周於下布求稱厥職蓋難其人如臣戅愚殖學荒淺謂其常更中外之職有志斯民尚可俾乘軺傳之馳往承休德庶以異時布宣寬大之意而為今日激揚清濁之公曽下下之考而未書乃皇皇者華而遽遣就臨所部實寵其行伏遇陛下器使羣工鑑觀庶物與我共理倘田里有庶民之安惟爾之能則命秩示列城之勸博求膚使下及孤蹤臣敢不尊其所聞期於不負無政事則財用不足肯用空言或登攬有澄清之風當希前哲力殫素學仰答殊知代胡宗憲進白鹿表明徐渭臣謹按圖牒再稽道詮乃知麋鹿之羣别有神仙之品厯一千嵗始化而蒼又五百年乃更為白自兹以往其夀無疆至於鍊神伏氣之徴應德協期之兆莫能罄述誠亦希逢必有明聖之君躬修玄默之道保和性命契合始初然後斯祥可得而致恭惟皇上凝神沕穆抱性清真不言而時以行無為而民自化德邁羲皇之上齡齊天地之長乃致仙麋遙呈海嶠竒毛灑雪島中銀浪增輝妙體摶氷天上瑶星應瑞且地當寧波定海之間况時值陽長隂消之候允著晏清之效兼昭晉盛之占顧臣叨握兵符式遵成算蠢兹小醜尚爾跳梁日與偏禆相為掎角偶幸捷闕之會嗣登和氣之祥為宜付之史館以光簡册內諸文囿俾樂沼臺覓草通靈益感百神之集銜芝候輦長迎萬嵗之逰疏吳興郡武康開漕疏宋始興王濬所統吳興郡襟帶重山地多汙澤泉流歸集疏決遲壅時雨未過已至漂沒或方春輟耕或開秋沉稼田家徒苦防遏無方彼邦奧區地沃民阜一嵗稱稔則穰被京城時或水潦則數郡為災頃年以來儉多豐寡雖賑賚周給傾耗國儲公私之弊方在未已州民姚嶠比通便宜以為二吳晉陵義興四郡同注太湖而松江滬瀆壅噎不利故處處涌溢浸漬成災欲從武康紵溪開漕谷湖直出海口一百餘里穿渠浛必無閡滯自去踐行量度二十許載去十一年大水已詣前刺史臣義康欲陳此計即遣主簿盛曇泰隨嶠周行互生疑難議遂寢息既事關大利宜加研盡登遣議曹從事史虞長孫與吳興太守孔山士同共履行準望地勢格評髙下其川源由厯莫不踐較圖畫形便詳加笇考如所較量決謂可行尋四郡同患非獨吳興若此浛獲通列邦蒙益不有暫勞無由永晏然興創事大圖始當難今欲且開小漕觀試流勢輒差烏程武康東遷三縣近民即時營作若宜增廣尋更列言昔鄭國敵將史起畢忠一開其説萬世為利嶠之所建雖則芻蕘如或非妄庶幾可立薦胡瑗充學官疏宋范仲淹臣聞臣之至忠莫先於舉士君之盛德莫大於求賢泰通之朝豈敢隱默臣竊見前密州觀察推官胡瑗志窮墳典力行禮義見在湖州郡學教授聚徒百餘人不惟講論經旨著撰詞業而常教以孝弟習以禮法人人嚮善閭里歎服此實助陛下之聲教為一代美事伏望聖慈特加恩奬升之太學可為師法代學使請復新建伯封爵疏明徐渭為請復功臣封爵以崇厚道作人心事臣本菲薄賴陛下聖仁令臣提督浙江學校首務在敦實行敦實行在先士風於是作為條約首令提調官以四孟月採士民之行而臣嵗一按臨以觀其風凡忠臣義士孝子順孫烈女節婦臣悉咨訪以備旌舉時至紹興府則見鄉大夫士及故老庶民爭來言故新建伯兵部尚書兼都察院左都御史王守仁始以倡義擒逆濠受封前爵逮後奉命平思田討八寨斷藤諸賊其撫勦處置功烈尤著既以勤事病困乃就巡厯屬地冀得便道待乞休之報遂死南安當時廷臣過從吏議謂守仁倒施恩威擅離職役身死未幾而削奪旋及使功臣之骸藁葬原野子孫下同編民非所以廣聖意勸忠良也臣既聞斯言復撿按諸所呈遞前御史裴紳所行紹興府山隂餘姚等縣學生員秦倪等呈詞及先後諸臣大學士方獻夫詹事霍韜御史聞人詮等論列之稿守仁生時厯年章疏文移處置施行之實參之臣疇昔所聞縉紳道路傳誦之言則知守仁平定逆藩之大功與陛下所以加守仁之懋賞舉的然有定議矣至其往處思田不血一刃不費斗粟遂定兩府之地活四省之生靈呼吸之間降椎結者以七萬至其往征八寨斷藤諸巢則以數千散歸之卒不兩月而蕩平二千里根連之窟破百年以來不拔之堅為兩廣除腹心之蠧卒以蒙犯瘴癘客死南安實亦在其所制境土夫功烈之髙如彼死事之情如此而當時廷臣抑使不揚後來諸臣復請之奏屢上陛下亦竟留不下何也臣雖至愚亦竊有以知其故矣蓋其故或在言事者之尚未悉其情也夫思田二酋向化而當撫至斷藤峽諸賊稔惡而當勦惟守仁親見其事而熟籌之其他在廷之臣未必知也兼總四省則江西本其屬地事畢而巡厯病困而乞休駐便道以待報私不害公此亦人情之常至於終不獲命以死尤可痛悼此在守仁宜自諒其無他其他在廷之臣未必知也故守仁求隨宜勦撫之實以副明旨而廷臣據專意二酋之名謂宜必勦守仁以巡厯地方幸冀其返還之便而廷臣因謂一意返還徒假借於巡厯之公則守仁之所為撫勦盡是矣而廷臣之所謂倒置似亦未盡非也守仁之所為待命盡忠矣而廷臣之所謂擅離似亦未盡偽也以未盡非未盡偽之言而陳於陛下之前陛下安得不信之乎故臣愚不敏妄意陛下果終奪守仁之爵於始者此也夫陛下既已信廷臣矣後之進言者又徒彼此求勝既不白廷臣未盡非未盡偽之意以緩其責遂亦不能指守仁盡忠盡是之故以互形其短長而破其兩可之疑則陛下亦安所取信而遂改易其前議乎故臣愚不敏又妄意陛下不欲復守仁之爵於終者此也如其不然以陛下聖明往年嘗復劉基之後矣復王驥之後矣此又復郭子興之後矣豈其獨忘情於守仁哉録其功而封之人告其罪而奪之審其無罪而復收之惟是之求而循環不已此陛下之所為至公也不能深明其故以啓陛下之聰明此臣所以有憾於言事者之未悉其情也不然陛下何憚一改議之煩爭千石之粟使功臣之績骨未朽而名實盡泯哉臣有以知陛下決不為也且守仁經略兩廣功烈無比此天下所共聞知謂宜有加爵之賞姑無論也遂使其倒恩威離職役誠如羣臣言猶不足以掩其擒逆濠衛社稷之功况乎以所謂廷臣未必知之説而欲盡棄其平生辟如以銖稱鎰其低昻亦甚枉矣臣聞式鼓氣之蛙則士卒尚勇買死馬之首則駿骨旋至方今海上告警士氣不振思效智能之徒每以前事為鑒守仁實生其鄉聞鄉人每一聚談知與不知皆為扼腕太息夫泯沒勞苦使閭巷得以藉口甚非所以作豪傑使奮起也説者又以為守仁聚生徒盈海內名為道德而實偽學為可遺棄臣竊意不然學術之與事功無有殊二此特學士自修之説也若朝廷賞罰當論功罪非以學術也椎埋屠販恣睢不逞亡人倫鮮行誼之徒猶裂土而封世世勿失此豈以學真偽哉守仁之於學其真與偽臣姑弗論縱其偽也盡其死力於艱難索其罪譴於講説朝以其勞而封之暮以其學而奪之無乃大相繆乎且人各有心難可洞視徒以猜量之虛而遂忘其舍生倡義定一大難之實使不得託於椎埋屠販之流其亦去人情逺矣臣職專學校首教化遂以採民風得知守仁之事至熟且悉又且兵革之役方興未已而掩抑戎勳非所以觀視逺邇也古語曰寵女不敝席寵臣不敝軒蓋悲恩愛之難終也周公曰故舊無大故則不棄也蓋恐恩禮之易奪也臣誠愚昧謂宜念守仁之勞苦察先臣之過舉以深味夫古語周公之意復守仁舊所封新建伯爵俾子孫世世承襲以彰國家報施之厚作臣下之心諸所宜葬祭贈諡之禮悉從故事四賢從祀奏疏明劉􅉅浙江等處承宣布政使司金華府知府等官臣劉􅉅等謹奏為褒崇正學以隆治道事準本府知府劉􅉅關竊惟道之顯晦有時人之抑揚有數時可矣而道不顯是天欲終晦之也數可矣而人不揚是天欲終抑之也然道顯則人亦揚顧所遭何如耳昔孟軻氏沒吾道絶學千五百年而周程張朱始續其傳朱熹之門聞道者衆可以繼道統之傳者亦只二三子黃幹乃其巨擘也熹臨終悉以深衣幅巾及平生遺書付之曰吾道之託盡在子矣若然則繼朱熹者非黃幹乎幹為臨川令婺州金華人何伯慧適為縣丞因命其子何基師事焉幹一見器重之因告以聖賢之學必有真實心地刻苦工夫而後可基乃悚惕受命於是因黃幹之言明朱熹之旨精思新意愈出不窮熹門人楊與立一見推服當時學者霧滃雲集基盡以所聞於幹者淑之曰立志貴堅規模貴大充踐力行死而後已學者翕然從之斯道遂大盛於東南然則功並黃幹者非何基乎一傳而得同郡王柏資稟英邁勇於求道盡探何基之祕蔡抗楊棟相繼守婺趙景緯守台聘為利澤上蔡兩書院講師鄉之耆德斑白皆執弟子之禮而師道為之再盛然則繼何基者非王柏乎再傳而得同郡金履祥講貫益密造詣益邃盎然春融怡然氷釋訓迪後學諄切無倦宋祚將移樊襄圍急履祥因進牽制搗虛之䇿請以重兵由海道直趨燕薊則樊襄之圍自解時不能用遂不復仕觀其所充拓所論著蓋親得何王之傳而並擴之然則繼王柏者金履祥也又傳而得同郡許謙致逺鉤深以聖人為凖的旁搜博採以義理為折衷其規模益宏大其涵蓄益深逺開門講學逺而幽冀齊魯近而荆揚吳越不憚千里皆來受業四方之人以不及其門為恥當時中外名臣薦者百數至以其身之安否為斯道之隆替觀其所體驗所著述蓋盡得何王金之藴而益充之然則繼履祥者許謙也是四子者皆親接黃幹之傳以上續朱熹之統寥寥三百年餘未從孔門之祀成化間按察司僉事辛訪亦嘗具奏未蒙準行當時議者曰朱文公熹與吕成公祖謙講道金華郡儒何基王柏金履祥許謙師徒纍葉出於文公之後而居於成公之鄉其於斯道不為不造其徑庭然造堂奧則未也為是説者誤矣聖道之奧在顔子且曰未達一間由夏輩升堂未入於室七十子宫墻外望者不知其幾而可輕造哉要在其有羽翼斯道之功生而可以淑斯人沒而有以啓後學如四子者亦可無愧於孔門矣議者又曰羽翼斯道莫如著述程朱之後如胡安國之春秋傳蔡沈之書傳真德秀之大學衍義吳徴之五經纂言學校以之育才經筵以之勸講其功偉矣何王金許之所以為書其用恐未若是之專其功恐未若是之偉嗚呼為是説者或未多得何王金許之書而讀之也何基所著大學中庸發揮大傳易啓蒙發揮通書近思録發揮王柏所著讀易記涵古易説大象衍義涵古圖書書疑詩辨説讀春秋記論語衍義太極衍義伊洛精義研幾圖魯經章句論語孟子通旨朱子指要詩可言天文地理考墨林考帝王厯數等書金履祥所著有論孟考證補集注之所未備通鑑前編多先儒之所未發其他如大學疏義尚書表注天厯初亷訪使鄭允中曽上其書於朝矣許謙所著有四書叢説讀詩集傳名物鈔觀史治忽幾微其他如天文地理典章制度食貨刑法字學音韻等書國初亦已梓行矣雖不能如胡安國蔡沈真德秀之顯行於時亦皆發明聖道禆益程朱不少其視吳澄許衡蓋不知其孰兄而孰弟也孔門從祀若專取著述不知當時多欲如申棖訴子路沮孔子之道如公伯寮所著何書雖不能無磯激警醒之功而終作聖門之梗方且偃然坐食兩廡其視何王金許何如也亦有僭經叛經詭道非聖惡人性而詆孔子善桀紂而偽堯舜作姦犯科得罪名教亂天下而禍後世者當時徒以注疏附會取之而今理學大明則糟粕棄餘積於無用今亦在巍坐侑食之列其為人其為書視何王金許又何如也議者又曰作於朱子之先而賢賢相承若朱子之會祖禰者楊時羅從彥李侗既不得以是之故而列從祀矣出於朱子之後而賢賢相承若朱子之子孫曽元者何王金許尚安得以是之故而列從祀焉為是説者蓋專以世次言也吾論祀道也夫庸知世次之先後乎如必以世次則顔無繇曽晳孔伯魚固當升之堂上不當在弟子之列兩廡之間矣臣又嘗聞之朱熹初見李侗侗語之曰理一而分則殊今君於何處騰空理會得一箇大道理説天下之事理一而已更不去分殊上體認熹乃幡然悔悟盡向分殊上尋求理一由是言之朱子翼道之功李侗實啓之從彥實傳之今楊時既列從祀而從彥李侗不與則是曽享祀而祖禰不與也夫人在堂上方能辨堂下人曲直臣亦隨衆觀場者也且學不足以博古才不足以通今未望聖道之蹊徑安敢品題道學於數百載之上但質之以大儒之格言以觀其取與否考之以諸儒之操存以觀其醇與否參之以各儒之著述以觀其有發明聖賢之道否察之以古今天下之嚮慕以觀其淑於後學否今儒先之許可既如此諸儒之操存之著述又如此古今後學無不尊仰又如此則人心未嘗一日而忘諸儒之功也臣望陛下隆重儒先紹續道統乞敕多官會議將羅從彥李侗黃幹何基等七人加其封爵俾之從祀使其不至淪沒則聖道有光治道增重臣嘗思之理學大明莫如有宋治道大行莫如我朝理學屬知治道屬行而知行未嘗不相因也今陛下誠能尊禮往哲闡明理學豈不知行並進政教兼舉感人心而風後世綿國祚於無疆乎此天下之公議非一人之私言臣所以先為之倡者誠以何基等地方之産臣地方之官已嘗祭掃其墓搜求其書贍其圭田而禮其後裔有司之職如此而已若夫主張之任表章之權端有望於今日之聖天子賢輔弼也當此有道之時而不得一遇則諸儒之道終晦而其人終於不揚矣臣是以不避僭踰合關本府轉奏等因緣係褒崇正學以隆治道事理未敢擅便合行具本差吏傅暹齎奏以聞請重建劉誠意伯祠疏明潘潤洪惟髙皇帝應天順人龍飛淮甸不數年間奄有大業當時佐命諸臣奉行天討削平僣亂於外者有徐達湯和輩而徐達為最察觀乾象運籌帷幄之內者惟劉基一人而已是劉基之功與徐達相伯仲也太祖常禮敬之而不名每曰吾子房也所以待之者至矣當功成之日舉報錫之典封徐達為魏國公食祿甚厚春秋祭祀之外時享不一封劉基為誠意伯恩寵有加所以報之者亦至矣厥後徐達之子曰輝祖者襲封公爵至今世代相承久而不替劉基之孫曰劉豸者襲封誠意伯自豸之後不傳臣原籍直𨽻廣德州建平縣人密邇南都自齠齔之時聞父兄遺論謂劉基之功與徐達相等而達之子孫襲爵如故基之子孫寂無所聞山林僻處莫知所由及臣幸登仕版聞士夫議論及覩基翊運録知景泰年間欽取基七世孫劉祿授翰林院五經博士天順元年劉祿奏請立誠意伯祠荷蒙英宗皇帝詔可其奏下有司營建祠堂於基原籍青田縣以安其靈恩至渥矣然五經博士之襲似未愜然祠堂規制俱涉茍簡事出不詳有懷未吐嘉靖五年六月內臣欽承上命知處州府事值公幹至青田縣參謁誠意伯祠果見規模卑隘及詢儀物亦不加隆其孫劉豫見襲處州衛指揮使臣乃追思父兄所以為劉基論者有由然也仰惟太祖之興也羣臣協輔如雲龍風虎之相從其報賞也論功錫豫如權衡輕重之不爽奈何厯世未逺事體頓殊如徐達者子孫輝映百年無異如劉基者子孫襲蔭僅一指揮春秋祭祀率多簡略功之在太祖實相頡頏報之在今日者似覺霄壤非惟無以慰劉基泉壤之望恐我太祖在天之靈亦不欲報劉基之止於如此也及查𢎞治十五年禮科給事中臣吳仕偉請建祠堂於府城前任知府臣梁宸謹奉欽依事理嘗置官地一所於皇華鋪前規模窄狹尚未建立故雲和民人鄭以璋鄭浤父子相繼為言者亦天理人心之不能已也臣昔雖耳聞今乃目擊有激於中不忍緘默為此披瀝愚悃冒死上陳伏乞皇上念太祖創業之難憫劉基功績之大特敕禮兵二部查照徐達湯和等於其襲蔭稍加爵秩於其祠宇稍加壯麗於其祭祀稍加豐隆較之徐達等遞減一等使彼子孫世守則上副太祖錫報元功之誠下協天下臣民之論而抑有以厲人心於將來矣永寬商竈疏明楊鶴臣奉命視鹺兩浙於役事竣故事報命之日率有條陳恭候聖明採擇臣愚無知識不能蔓引其説惟是通商恤竈兩言盡之按祖制兩浙每嵗行引四十四萬四千有竒分𣲖三十六場買補掣運浙直所轄食鹽地方賣銷蓋統計各場所産與各地户口所食無餘無欠而立為常法者也比時止有正引别無旁徑場之所産止以供四十四萬四千有竒之額故不患其不給民之所食亦止有四十四萬四千有竒之鹽故不患其不通自嘉隆以來創行票鹽而引始困矣票之值亷於引票之售又速於引票之利常倍於引臣初受事心欲革之及查票鹽之設蓋為産鹽地方正引不行利歸私販故假此以遏之自嘉靖十六年間台州因隔越山海商稱不便題準行票華上等縣復沿例以請國課取辦於票鹽者凡一萬四千四百五十兩有竒此外尚有各縣各場額課若止行正引餘鹽銀才八萬尚不足抵還商庫價勢不能革也嘉靖季年倭警告急而竈户息煙海若揚波而沙土傾瀉停引待鹽者已三四載餘鹽京解未嘗停也故存司引目積而至於今日有一百五十萬之多於是慮京解無䇿則預納之令下矣慮緩引無告則執程之令又下矣然法令愈嚴而引目愈壅於是前鹽臣韓浚有帶銷之條昔之四十四萬四千有竒者今則五十萬矣以四十四萬餘引為常額派納餘鹽以其餘五萬為銷壅止銷引目請不出三十年前壅可盡此亦疏通引目之法也然昔之壅壅在引而今之壅壅在鹽食鹽之地有定限産鹽之場不加多一嵗四掣前掣未完後掣接踵住賣者未銷運發者又至則閭閻得以操徴賤徴貴之權而商賈不能收子母三倍之利亦其勢也於是鞭笞之令日下季掣之遲自如緩之則病國急之則病商臣初到地方一意寬恤已而季掣愆期始嚴行督責提比綱紀各商幸完六季乃各商之鹽實在停積行鹽地方未盡賣銷也意者於帶銷五萬餘引之中大為除減庶各商之力少紓而季掣之期自在或亦疏通之一術乎內商之掣摰既通則邊商之引目亦易售此亦一舉兩得者也臣所謂通商者此也以竈户言之洪武中每竈一丁給與工本鈔二貫六十文以備器用給口食當時鈔一貫可易米二石竈丁之優裕可知今無有矣祖制每丁煎鹽給有灰場以資攤曬有草蕩以供樵採草蕩所收之值嵗可抵一丁鹽課之半不稱苦也其後貧富不齊力不能煎辦窮者糊其口於四方場蕩沒入於總催豪右之手或開墾成田收利入己猶於各竈名下徴收全丁課銀曰此額課也即轉徙他鄉而課必不可免故有賣妻鬻子以償課者有終身不娶有生子溺死恐貽竈丁之纍者窮竈之苦尚忍言哉每遇五年清丁清蕩之期名為清丁矣單丁獨户率未嘗豁也清蕩矣豪強兼并卒莫之問也臣查得嘉興分司蘆瀝場總催之役僉派最為不均本場豪户蕩連千畝而反脫役小竈苦無立錐而竟陷催富者收蕩之利而避催之役貧者躬催之役而無蕩之利甚有民户勢宦不畏令甲明佃竈蕩僅代納課而蕩去丁存之竈資身無䇿復令照丁當催役苦費煩賒死無路據該場竈户趙志奎等呈稱願行照蕩僉催之法臣檄下所司行之臣又查得松江分司六場浦東下砂等場墩蕩各不下數萬每丁課銀止納一錢三四分有竒獨袁浦一場風坍海嘯原額之蕩止存六十餘畝額課不減每丁實納課銀四錢有竒以一司之場分多寡懸絶苦樂不均一至於此據竈户翁亨等紛紛呈告懇臣具題以蘇偏苦其阻撓者謂祖制各場各有定額臣思以松江一司之場均松江一司之課即如民間以一縣之錢糧攤派於一縣與祖制有何違背且今日之浦東下砂等場安保無滄桑之變異日之袁浦場又安知不髙岸為谷深谷為陵耶臣竊謂一場之中納課不均者宜倣袁浦場之法行之其勢家豪族有以民户占種竈産者或係世逺人亡或係丁盡竈絶但令國課有歸自可相安無事彼既以民户種竈産量加錙銖包補竈課可也至清丁清蕩之年必委賢能有司會同分司官著實清查一洗宿弊如杭嘉寧紹溫台皆有場有竈之處鹽臣巡𩔶地方不過少費時日盡將竈户喚集公庭按籍唱名延問疾苦則承委之官自不敢朦朧了塞場官場霸書吏人等自不敢髙下其手矣查得先年竈户報出新漲沙塗量與升稅然有增則有減此長則彼消總之足課而止蓋海濱斥鹵之地為利幾何與其取之在官不若留之在民此正理也臣所謂恤竈者此也兩浙商竈自萬厯二十七年姦辨髙時夏妄奏不得已行廢引一十五萬加稅十五年共徴銀五十五萬五千兩而商竈之脂膏殆盡今奉詔蠲稅之後如病羸之人生意奄奄才有起色此亦去藥石而用梁肉慎起居以復元氣之時也臣何敢不盡言於明主之前哉如果臣言不謬伏乞敕下該部覆議將前鹽臣所題每年帶銷五萬餘引之數量銷一萬其五千清丁清蕩著實奉行務令一司之中通融一司之課一場之中通融一場之課一團之中通融一團之課至民户占種竈産者於常課之外量加包補新漲沙塗之稅即以抵坍塌地蕩之課庶幾商販得以疏通窮竈永沾實惠矣國朝請紓東南大困疏范承謨臣向在內院恭覩皇上日理萬幾每見必先垂問章疏中有報水旱災荒者否有則披覽不置憂憫見於天顔無非以民為邦本所宜加意培養者耳臣自奉命撫浙無日不仰體宸衷務期登百姓於袵席凡貪官汚吏不敢瞻徇情面稍有姑息所以除民害也獨是逃人一項為害甚烈臣不敢避紛更定例之嫌為我皇上陳之伏惟定鼎之初嚴立逃人之禁者原為旗下之人非伍中甲士即關中舊人倘被姦民引誘逃遁滿洲莊户既無所恃以謀生禁旅出征更無所用以隨伍故不得不嚴其治罪之條使百姓知懼不致自陷於法網但立法之始其所逃之人在旗日久舉動言語易於辨别有隱匿不首者處分宜嚴若近日之逃人辨别既難為害最大他省臣不得知在浙言浙則不禁慘目而傷心也臣自抵浙受事五日一至公所會審逃人日有數起視其人率皆無賴之徒如鬼如蜮或因借債無償將身折準或係遊手好間倚旗肆詐或朝賣身而夕逃或甫就獲而又逃其所牽連非務農黎庶即納賈商賈有因需索不遂而妄扳者有因宿昔小隙而仇揑者幸而駐防諸臣悉體聖懷反覆審問如得其情無不照例懲治然此輩雖經反坐而無辜之人家業生計已蕩然矣且所逃者非兵丁非舊人不過兵丁之家僕與雇工之奴子甚有非工非僕但常往來其家而亦冒充旗下者雖現行定例凡賣身旗下必有里鄰中保甘結地方官用印押契出示曉諭未嘗不詳且明也然城市居民或能知之至於鄉僻山民住居窵逺何暇入城探聽既不知其曽否賣身凡素所識認者或雇而耕耘或倩而負販一經拿獲即成窩主更有地方光棍欲詐某家串通逃人先至其門隨率黨羽蜂擁擒捉指為窩逃頃刻之間身家皆陷受害之人雖鳴之於官而官畏功令不得不盡法嚴訊乃逃人因之愈逞輾轉扳害致百姓日困生業消亡遺纍地方因而凋敝若不亟請皇上乾綱獨斷分别新舊另定處分恐朝廷輸課納稅之良民不足供此輩恣姦肆虐之魚肉也臣若一日不言皇上一日不聞國法一日不更百姓身家一日不保伏乞敕部詳議自後凡兵丁舊人有逃者在內限日報明督捕司在外報明將軍移咨督捕開明年貌籍貫立寫牌票通行所屬嚴諭地方總甲并移鄰省挨户查拿獲則照例治罪凡係駐防處所新買之人逃者如其父兄曽立賣契又容留隱匿是為明知故犯罪仍坐窩其餘誤留者槩行免究庶新買之人不得與關東舊人同例則天下百姓永受皇恩又不特賑一方之水旱免一年之災傷可比也請買榖平糶疏范承謨竊照嘉湖杭紹四府被災雖有輕重而小民總無儲蓄嗷嗷待哺拯救似難刻緩臣雖代為請蠲免請折漕稍蘇其困然有田者耕種三畨車戽之工已竭無田者貧無半菽將成溝瘠之捐設非買米急救何能暫延喘息除勸諭鄉紳富民及各官捐助並罰贖米榖通發備賑外更令災民墾除荒淤急種菜麥以備來春臣心已殫惟是民多米少雖目前稍可支吾至冬必竭非預為之計米榖一盡民必流亡彼時雖議招議賑恐無及矣臣再四圖維惟量發司庫存留銀兩遴選能員前往江楚等處採買米榖照價平糶得價之後照數還庫民免炊珠之歎官無仰屋之嗟救荒良䇿莫此為善更請敕下𣙜關守隘等官毋得苛稅阻撓庶百萬之生機可延而朝廷不蠲之蠲恩同天地矣請緩征漕折疏范承謨為照嘉湖二府異常水災臣以漕糧關係國儲不敢輕為籲免乃酌為改折之請荷蒙俞允百萬窮黎莫不仰沐如天之仁叩頭感激歡聲如雷惟是被災已深重者顆粒無收輕者斗石不繼入冬以來又雨雪連綿飢寒滿路呼泣傷心地方有司不敢稽誤正供凡漕糧白糧等項俱已極力徴完而折漕一項追呼盡術收納無多臣每檄問有司及傳窮民之在省者詰其拖緩之故咸稱小民感朝廷再生之恩恨不即日輸將奈以前用三番車插工費已窮以後秋未收成冬遭久雪不但錢米俱乏而田無稈草薪㸑皆空是以奉公之心雖急措辦之術無從臣聽其訴言深為憫惻伏念嘉湖所産惟榖與絲上年籽粒固已無成今嵗蠶桑尚有所望凡未完漕折銀兩懇乞皇仁準俟蠶熟之後催徴起解統於康熙十年嵗終奏報雖曰限期稍寬實於原額無損可免百姓賣妻鬻子之苦而恤災拯溺之洪恩始終克全矣請釐正白糧耗米疏范承謨浙省糧賦之重莫過嘉湖二府而額外多給之欵無如白耗一項案查全書開載嘉屬白糧每正米一石連耗并摏折準徴糙平米一石八斗而額設夫船經費每石銀八錢湖屬白糧每正米一石連耗并摏折準徴糙平米一石五斗五升而額設夫船經費每石銀一兩五分蓋嘉屬耗米比湖屬多編二斗五升而湖屬經費較嘉屬多編二錢五分兩府銀米之數雖若參差而嘉屬多米湖屬多銀兩相折算數亦相當至於耗米則皆以五斗五升徴給也惟是編徴正耗全書明注準徴糙米四字並未令徴白米也厯年奏册報銷無異乃該府兌給不分正耗皆係全白則不惟民力難堪且與全書甚悖夫全書所以給耗者原為徴糙以備摏折之費今既皆徴白則無摏可折乃仍徴摏折之耗且并耗而亦給白是軍之所取多而益多民之所出重而又重當此百姓窮苦之際安能嵗嵗供無已之耗贈乎臣自上年嚴飭行查隨發糧道確議兹據詳稱每石五斗五升之耗照條議舊例相沿未改臣以當時徴糙恐有摏折故加五斗五升今皆徴白並無摏折何可仍舊臣檢奏銷康熙七年等事案內部查進倉白耗止交四升有竒則是所交者甚少所給者甚多徒竭民膏以恣軍欲大非經制之初意也臣駁覆再三務求至當有議止給白耗四斗者有議仍給五斗五升平糙者臣恐辨軍借端稽遲致誤上供於是再四籌畫除原編銀米折算相當并各項經費俱照舊不議外今請將兩府正項白米一石外給白米四斗五升以為盤剝進倉之耗則運軍所得不為不厚而減徴一斗以抵糧里摏折則窮民之力藉以稍寬與全書徴糙之意亦無大悖軍民兩利事屬可行也今值全書改纂之際正宜核定永著為規不過釐正全書之所無並非議減全書之所有仰祈皇上敕部議覆俯賜允行刋入全書恪為遵守此後如有辨丁印糧官役私加顆粒者臣即據實題參庶厯年之積弊永除而國賦民瘼均有禆益矣浙江通志卷二百五十九
