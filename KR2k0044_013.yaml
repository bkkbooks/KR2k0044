body:
  text: 浙江通志卷十四山川六寧波府下奉化縣印山嘉靖寧波府志舊名髙青亭山在縣西三十步又以山小而圓土多紅色故名鳳山名勝志自華頂逶迤東來與印山相連一名含光山越五里即華頂山也北山嘉靖寧波府志在縣西二里在華頂山之北華頂山嘉靖寧波府志在縣西五里山秀而尊上有龍湫西圃山寧波府志在縣西北十里鯉湖塘山寧波府志在縣西十里髙出衆山有奇石山頂有龍湫不涸常出雲以為候石嶺山成化四明郡志在縣西十五里上有石髙聳狀如人形又名新婦巖名勝志有石如鏡臺宋封石嶺夫人祠湖山寧波府志在縣西北二十里剡溪繞後湖水繞前故名橫山延祐四明志在州西四十里腰山為路二十五里奉化縣志上有石文若篆謂之天篆小丹山奉化縣志在縣西六十里名勝志四明山之南剡源之三石村上有二洞如廣厦可容五六十人巖罅水流紫紺赤色雲笈七籖所謂四明洞天丹山赤水是也大雷山延祐四明志在州西南四十里登其山可見海二百里外四明洞天丹山圖咏集一名大慈晉漢時得道之士多隱此山內有金雞洞雪竇山嘉靖寧波府志在縣西六十里上有雪竇寺西五里有奉慈寺山多竒勝有妙髙臺藤龕含珠林錦鏡池石竇千丈巖瀑布泉桃花坑龍隱潭宋理宗嘗夢其處御書應夢名山賜之故有御書亭雪竇寺志按輿圖自天台摘星峰歷華頂至四明山心東來過二十里雲起為雪竇山又名乳峰正峰聳峙四山攢拱兩澗出水交會於前又東折而下逶迤六七里始抵山麓輿地紀勝丹碧照爛飛簷鱗鱗蔚在青嶂間晨霞暮靄遮露萬狀尤為勝槩謝翺夜宿雪竇下方詩眠山枕斧柯獨客愛盤阿畏日生塵夢尋仙到鳥窠下方聞夕磬南斗挂秋河寢服侵雲卷頮泉通瀑和竇分滄海月禪入沃洲歌此地精靈聚中宵弄薜蘿王守仁雪竇山詩窮山路斷獨來難過盡千溪見石壇髙閣鳴鐘僧睡起深林無暑葛衣寒壑雷隱隱連巖瀑山雨森森映竹竿莫訝諸峰俱眼熟當年曾向畫圖看鎮亭山漢書地理志鄞有鎮亭嘉靖寧波府志在縣西南一百里西界於越南跨於天台故其鄉為連山梨洲山名勝志在縣西一百里即四明山之西峰晉時孫興公與兄承公同遊至此偶得梨數枚左右環視莫見其迹意以為仙物也故號其地曰梨洲山桃花坑山延祐四明志在四明山之上二十里雲之南也山巖壁立數仞延袤數百里巖色紅白相間狀如桃花之初發故名寶化山成化四明郡志在縣南三里為邑之案山奉化山嘉靖寧波府志在縣東南五里一名瑞峰山特起周回三十里四面皆異名東為栲栳山西為龍潭山頂有龍潭南為吳郎山即後潭山北為南山元史載奉化州山石裂即此山也九峰山奉化縣志在縣東六十里九峰突兀産多烏桕秋霜葉紅爛若春花鮚崎山成化四明郡志在縣東南五十五里漢書地理志鄞有鮚崎亭師古注鮚蚌也崎曲岸也其中多鮚鄞後析為奉化縣因以為名蓬島山成化四明郡志在縣南四十里為邑之逺案其源來自四明山兀然為諸山之冠山谷間有龍湫為雩禱之所石樓山嘉靖寧波府志在縣西南六十里太平寰宇記在鄮縣南又名石柱山髙六百丈九女山嘉靖寧波府志在縣南二十五里小梅山奉化縣志在縣南三十里勞山馬迹山奉化縣志俱縣南二十五里三山延祐四明志在州南五十五里屹立大海中如三台然塘頭山廟山大洞山舊浙江通志俱縣南六十里天門山成化四明郡志在縣南六十里列峰排空髙入蒼莾漢書地理志鄞東南有天門水入海有越天門山舊浙江通志一名蜃樓門山瀕海裏港兩峰對峙若天門然舒嶽祥天門山詩煙樹連天逺漁樵兩地分仙舟滄海路僧錫石橋雲隂壑收虹影空林散鹿羣我來不敢扣沖漠恐驚聞剡源山戴良剡源記奉化之西六十里有山夾溪而出蓊然深茂者剡源山也以其近剡故名之新嶺山嘉靖寧波府志在縣東二十里由舍輞嶺來山有七十二曲嘉靖間更嶺道於後隴芟闢平坦行人便之謂天平嶺大樣山嘉靖寧波府志在縣東八十里石昌山嘉靖寧波府志在縣東一百里鄞城山成化四明郡志在縣東五十里古鄞城在下舊志云即赤堇山有草曰赤堇鄞以此名而加邑焉貌頭山清涼山馬頭山舊浙江通志俱縣東九十里青錦山嘉靖寧波府志在縣北一里一名蓮花巖銅山寧波府志由日嶺出其山甚尊周回三十里孝感山奉化縣志在縣東北一十里相傳昔人喪父廬墓側天忽降甘露草木花皆純白故名金鐘山嘉靖寧波府志在縣北十里形如鐘漢城山延祐四明志在州東北二十里山有五代漢時城基樓鑰漢城山詩城復于隍遺舊基山雲漠漠草離離當時雷鼓聲沉後留得寒巖伴落暉四明山成化四明郡志在縣西北六十五里遠連會稽近接天台詳鄞縣三嶺山奉化縣志在縣北十里赤莧山元和郡縣志在縣東十里嘉靖寧波府志夏侯曾先地志云亭頭有赤莧山秦始皇遣徐福求訪神仙至此或云昔有赤莧仙人常居此山因名江口山嘉靖寧波府志自四明山分為雪竇諸山東衍至此而止山上有塔山半有清水菴俯瞰長江山隂為鄞境山陽為奉化境梅山延祐四明志在州西南二十五里或謂梅福曾遊此英馬山寧波府志在縣北三十里相傳有神馬常夜出故名大小晦山嘉靖寧波府志在縣西六十里即四明山南來之兩峰四明洞天丹山圖咏集宋應則入山景色秀麗既而冥晦故云大小晦嶽林山名勝志在縣東北五里梁大同初建崇福寺於此黃甘嶺嘉靖寧波府志在縣西二十五里毛巔嶺嘉靖寧波府志在四明山之南接大小晦山巖谷﨑嶇行者艱阻宋紹興初有毛居士者鑿山以便往來六詔嶺寧波府志在縣西百里相傳王右軍常隱此曾詔起之舊志名陸照誤唐興嶺嘉靖寧波府志在縣西一百里通紹興府界桃花嶺嘉靖寧波府志在縣東南十五里即奉化山之東麓山隍嶺寧波府志在縣南五十里通西店驛寧海縣柵墟嶺嘉靖寧波府志在縣東南六十里宋建炎間立寨於此守戍亦海道一要衝也寨嶺寧波府志在縣東四十五里通東南邊海清修嶺嘉靖寧波府志在鵓鳩山下通鄞之小溪五嶺嘉靖寧波府志在縣東三十里桑社嶴通白社金溪千丈巖雪竇寺志此雪竇之勝懸崖飛瀑又名飛雪巖鄭清之題雪竇千丈巖詩並海危峰駕六鰲招提深處緣周遭松枝直上蛟龍起濤勢飛來兕虎嘷坐向亭空雲作伴待看身與月爭髙山靈意我酬清賞為酌冰泉讀楚騷徐島巖四明龍薈在雪竇西十五里重崖峭壁數百仞瀑布冬夏不絶巖下有神龍宅焉獅子巖延祐四明志在州東五十里狀如獅子周家嶴嘉靖寧波府志在華頂山內聖井嶴嘉靖寧波府志在清涼山東南棠嶴嘉靖寧波府志在公棠山渠水漢書地理志句章有渠水東入海北渡江舊名奉化江延祐四明志源於四明之鎮亭山出州之惠政橋下與諸水會南來亘府城之東然後與慈溪江會而入海謹按奉化當漢時鄞句章二縣境舊志云古句章縣在江口山北光溪境上漢書所謂渠水疑即奉化江也故並列之萬壽湖寧波府志在縣東五里即新婦湖本縣放生之處又名放生湖廣平湖奉化縣志在縣東北五里一名寺後湖范家河嘉靖寧波府志在縣北一十里通大江詳見水利西錦溪奉化縣志自華頂山下過石棋盤東流入城西水門至縣南嘉會橋俗謂之蛇腹溪以兩端稍狹也出城東水門至方勝碶剡源溪至正四明續志在州西七十里導自陸照左溪會同流於公棠逾泉溪會於三江口入北渡達於海舊浙江通志自四明山來其溪九曲金溪嘉靖寧波府志在縣東五十里源發金莪山東北過白杜河北入北渡江隱潭四明龍薈在縣西北五十里潭居兩巖之下兩巖相抗壁立數百仞仰以窺天僅如數尺瀑泉循崖而落水寒石潔聳人毛骨每遇旱禱旋應如響郟修輔隱潭詩在昔知何人鑿破青山骨飛泉直下來千尺瀉倐忽兩壁蒼翠間一陳風雷突傍無塵埃迹中有蛟龍窟寒氣不可嚮猛勢豈能屈安得當旱年為霖濟萬物耀碑潭延祐四明志在州東二里故老云官清則潭清陳著耀碑潭詩微風篆水自成碑清月磨潭不受疵萬里此通歸去路扁舟堪載送行詩靈濟泉名勝志在縣西南舊名包家潭透瓶泉延祐四明志在州東三里以磁器貯之水透瓶外裏港海奉化縣志在縣南六十里自湖頭渡分港入天門山至鮚崎接寧海浮溪鎮海縣印山延祐四明志在縣東二里嘉靖定海縣志地湧一石形方如印詳奉化縣梓蔭山延祐四明志在縣東一里寧波府志東北石壁陡起下有泉水巾子山成化四明郡志在縣東北二里與候濤山對峙為風濤蔽障招寶山吳萊甬東山水古迹記東逼海或云他處見山有異氣疑下有寶或云東夷以海貨來互市必泊此山嘉靖寧波府志縣東北二里舊名候濤山之東南峙一小山僅髙尋丈名昌國山潮汐於此分流舟行可達昌國謝翺採藥候濤山宿山頂精藍夜中望海詩蛟門南去島此地望迢迢積濕侵幡黑生寒入夢飄見燈歸舶夜聞偈解衣朝土植皆為藥山枝不滿樵暗光珠母徙秋影石花消擬候槎回漢寧甘客老遼却尋徐福島因問始皇橋於彼看日出羽旌焉可招金雞山延祐四明志在招寶山外屹立海中蛟門山名勝志在縣東海中約十五里一名嘉門山環鎖海口吐納潮汐有蛟龍穴處時興颶風怪浪古稱蛟門虎蹲天設之險即此虎蹲山嘉靖寧波府志在縣東五里屹立海口以形得名遊山延祐四明志在縣東二里海中烏石山嘉靖定海縣志在縣東南四十里山巔石色黝黑故名有巨人迹濶六寸長一尺五寸云佛迹世傳舍利始自此山飛入阿育王山盤嶴山延祐四明志在縣東南七十里水繞太白山隂而出凡三十六盤宋儒習菴先生陳塤墓在焉慈嶴山延祐四明志在縣西南九十里古傳左慈隱此伏龍山嘉靖定海縣志在縣西北八十里一名箬山首尾跨東西海門蜿蜒如龍中有千丈巖刺史門石壇乳井海眼泉澤山延祐四明志在縣西北八十里舊名櫟山宋吏部郎黃震改今名施公山延祐四明志在縣西北九十里北瞰大洋商舟往來多苦海寇元至元間縣達魯花赤張進創巡檢司民乃安居嘉靖寧波府志今置烽堠其上龍頭山嘉靖定海縣志在縣東南十二里側有葫蘆嶠縣令金九成築寨嶠口建樓於上以防海石門嶴山寧波府志在縣西南二十里陳山在東龍山在西儼若二門故名徐家嶴山寧波府志在縣西北七十里有五嶺通往來石同門山舊浙江通志青雷頭山東南海中數峰崛起潮汐經流其中旁午為十六門亦名十六門山瑞巖山嘉靖定海縣志在縣東南八十里有十二峰宋大中祥符五年有芝草生於青松峰之上守臣康孝基奏聞敕奬紀瑞云雁門嶺寧波府志在縣西北六十五里西南慈溪界大浹江名勝志在縣南城外自蛟門海洋分派為支江向西泝流七十里抵郡城三港口分流西南六十里至鄞縣它山堰西北二百里抵上虞縣之通明壩輿地廣記定海有大浹江越滅吳將遷吳王夫差於甬東韋昭以為句章東浹口外洲是也寧波府志晉安帝時孫恩寇上虞劉裕戍句章出戰退還浹口宋髙宗航海亦由浹口而出黃﨑江寧波府志在縣東南一百十里自﨑頭海洋分派為支江西北流約半潮至蛟門出大海梅江山寧波府志在縣東南十里自﨑頭海洋發潮西北流入烏﨑頭山港經大嵩通於海靈緒湖嘉靖定海縣志在縣西北靈緒五都周環二十里鳳浦湖嘉靖定海縣志在縣西北靈緒三都周環十八里西河舊浙江通志在縣西北四十里靈緒一都自慈溪縣香山發源東流至靈緒二都由澥浦入海西流向斗門山十五里合大河澥浦舊浙江通志在縣西北五十五里即古之渤澥玉泉延祐四明