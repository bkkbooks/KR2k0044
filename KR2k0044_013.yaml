煉丹井久旱不涸十二峰舊浙江通志在東胊山峰列十二森秀可觀蓮花峰大德昌國州志與馬秦山碧雲菴對峙三石層出如蓮花上有佛腳迹拄杖印馬迹痕山之四隅各有小浮圖地産草一種名長生不死云玉峰大德昌國州志在岱山鷂子尖嶺下岡巒秀拔林樾蒼潤時有白霧蒙其巔人以為福地盤陀石天中記明州昌國東海中有盤陀石平廣可立百餘人下瞰大海正扶桑日出之地燭龍將駕天光煥發頃焉一輪涌出其大有不可名者觀音洞吳萊甬東山水古迹記自梅岑山東行西折為觀音洞洞瞰海外巉中裂大石壁紫黑旁罅而兩岐亂石如斷圭積伏蟠結晝夜作魚龍嘯吼聲善財洞吳萊甬東山水古迹記梅岑西為善財洞峭石齧足泉流滲滴懸纓不斷龍女洞普陀山志在潮音洞外有石壁立中窅不可測白泉湖定海縣志縣東北周環三十里瀦水溉田源泉沸涌舊志名富都湖至正四明續志又名萬金湖查浦嘉靖寧波府志在昌國夏侯曾先地記云吳伐越次查浦即此黃馬溪至正四明續志在州西北五十里南墠水從奈嶺發源流注於海芙蓉洲貝瓊逺清堂記距昌國縣東三百武有洲曰芙蓉其水縈紆南流以入於海洲之上皆蓮芙蓉其異名也海印池定海縣志在普陀産白蓮九節龍潭四明龍薈在翁洲東五里田塍間昔人汲水得鰻刀臠九段烹諸釜俄頃不見翌日復汲於潭其鰻洋洋九節遊潭中人皆異之旱往禱焉岱山龍潭四明龍薈在縣東北山上有潭三濶不滿丈深不盈尺禱雨投以尺書則有物若蟹若鰻者出誠或不至書浮水面不沉大海定海縣志東接三韓日本南通閩粵西北直抵遼東潮汐往來日有定候蓮花洋定海縣志在縣東往洛伽必徑此普陀山志倭人入貢見大士靈異欲載歸海生鐵蓮花舟不能行懼而還之得名以此浙江通志卷十四
