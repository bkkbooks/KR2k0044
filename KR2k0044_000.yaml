二百七十四藝文卷二百七十五藝文卷二百七十六藝文卷二百七十七藝文卷二百七十八藝文卷二百七十九雜記卷二百八十雜記臣等謹案浙江通志二百八十卷國朝文華殿大學士兼吏部尚書兼管浙江總督嵇曾筠等監修浙江自嘉靖中提學副使薛應旗始輯為通志七十二卷至國朝康熙二十一年總督趙士麟巡撫王國安復因薛志增修斟酌損益義例粗備此本於雍正九年辛亥總督李衛開局編纂訖乙卯而告竣曾筠等具表上進司其事者原任侍讀學士沈翼機編修傅王露檢討陸奎勳也總為五十四門視舊志增目一十有七所引諸書皆具列原文標明出典其近事未有記載者亦具列其案牘視他志體例特善其有見聞異詞者則附加考證於下方雖過求詳備或不無繁復叢冗然信而有徵之目差為不愧矣乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書浙江通志卷首一詔諭世祖章皇帝順治二年六月二十八日欽奉恩詔光嶽合而泰階平南北一而甲兵息越稽往古罔不同符本朝立國有年幅員既廣醇朴為治無意併兼向來疆埸搆兵本欲言歸於好不期寇凶禍極明運永終於是整旅入關代為雪耻猶以賊渠未殄不遑起居隨命二王誓師西討而南中乘釁立君妄僭尊號罔聞國恤亟行亂政重困民氓負四海不義之名阻東南向化之路朕用夙夜祇懼思救煢黎故西賊既摧旋行南伐定國大將軍豫王扶義而東兵無頓刃河南河北次第歸誠甫克維揚隨平江左金陵士女昭我天休既獲福藩南土略定從此輕徭薄賦可漸進於升平將來制度考文冀徐興於禮樂朕念峻命之不易悼斯民之孔艱深切痌瘝宜矜詿誤特𢎞大賚嘉與維新所有河南江北江南浙江等處地方合行恩例具列於後於戲陟禹迹而方行大統斯正撫殷遺而若保天下為家既定亂而安民惟更化而善俗敬敷朕志式慰輿情有幹有年仍服先疇之樂利無反無側共遵王道之蕩平布告多方想宜知悉順治四年二月十二日欽奉恩詔自平定中原以後浙東全閩尚為唐藩所阻聲教未達稅畝增科越年橫斂爾百姓辛苦墊隘無所控訴朕甚憫焉爰命征南大將軍貝勒索羅等整旅而前救茲黎庶仰賴天地眷綏祖宗垂祐既定浙東遂取閩越先聲所至窮寇潛逋大將掩追及於汀水朱聿昭就滅列郡悉平顧惟僭號阻兵其民何罪眚災肆赦倍切朕懷方出之水火之中宜躋之平康之域昭兹大賚咸豫維新所有地方合行恩例具列於後於戲勝殘去殺用𢎞濟夫艱難布澤流膏務與之為休息大業克成於一統新恩誕沛於遐方偕兹率土之民永底太平之治布告中外咸使聞知順治十一年六月二十二日欽奉恩詔內開一東南財賦重地素稱沃壤連年水旱為災民生重困皆因失修水利致悮農功該督撫責成地方官悉心講求疏通水道修築隄防以時蓄泄俾水旱無虞民安樂利聖祖仁皇帝康熙二十年十二月二十日欽奉恩詔朕纘承丕緒統御寰區仰惟天地眷佑之庥祖宗付托之重聖祖母太皇太后慈訓之殷蚤夜孜孜勤求治理期於兵革寢息海宇乂安不意逆賊吳三桂負國深恩倡為變亂隂結姦黨同惡相援抗違詔令竊據疆土滇黔閩浙楚蜀關隴兩粵豫章之間所在繹騷肆逞痡毒三桂僭稱偽號逆焰彌滋負罪尤甚朕行天討分命六師勦撫並施德威互濟或縶頸於闕下或駢戮於師中擒捕誅鋤以次收服乃三桂既膺神殛逆孫世璠猶復鴟張踞六詔之一隅延殘喘以拒命朕惟賊患一日不除則民生一日不靖䇿勵將士屢趣師期於是虎旅協心追逼城下賊衆計窮勢蹙通欵軍門約日獻城凶渠授首之日市肆不擾邊境晏如捷書既奏上慰郊廟社稷之靈下抒中外臣民之憤神人胥恱遐邇歡騰念自變亂以來軍民荼苦如在水火披堅執鋭卒嵗靡寧行齎居送千里相望被兵之地既罹於鋒刃供億之衆復困於征輸朕憫恤民艱不忍輒加額賦間施權宜之令用濟征繕之需意在除殘事非獲已而身處宫寢之內厪懷閭閻之依中夜屢興旰食不暇惄焉思治八載於兹今羣賊削平疆圉底定悉剪歷年之蟊賊永消異日之隱憂用是蕩滌煩苛維新庶政大沛寬和之澤冀臻熙皥之風所有事宜開列於後於戲體覆載好生之德秋肅必繼以春溫法帝王更化之模義正尤期於仁育誕告天下咸使聞知康熙二十八年二月欽奉上諭朕因省察黎庶疾苦兼閲河工巡幸江南便道至浙觀問風俗簡約儀衛鹵簿不設扈從者僅三百餘人頃經維揚民間結彩歡迎盈衢溢巷雖出其恭敬愛戴之誠恐致稍損物力甚為惜之朕視宇內編氓皆吾赤子惟使比戶豐饒即不張結綵幔朕心亦所嘉恱前途經厯諸郡邑宜體朕意悉為停止又見百姓老幼男婦奔走雜遝瞻望恐後未免喧譁擁塞念此行原以為民不嚴警蹕但人衆無所區别髙岸水次或有傾跌之虞一夫不獲其所足軫朕懷此後止於夾道跪迎勿得紊亂追趨致有諸患著即詳加曉諭使知朕愛民切實咸為遵行特諭康熙二十八年二月十一日欽奉上諭朕稽古省方咨求治理閲視河道期底平成凡有利於民生必令霑夫實惠行次浙省禹陵在望念大禹功德隆盛萬世永賴應行親詣以展企慕之忱其致祭典禮所司即察例舉行政治所先在崇文教江南浙江為人文萃集之地入學額數應酌量加增永昭𢎞奬該督撫詳議奏請江寧鎮江杭州駐防滿洲漢軍兵丁鎮守要地久歷嵗時深用軫念應作何恩賚以彰優恤著該部議奏自南巡以來所經過地方官員除八法處分及列欵糾劾外凡因公詿誤降級留任者俱準與開復降級調用者著帶所降之級留任其經過地方見在監禁人犯除十惡及詔欵所不赦等罪並官員犯贓不宥外其餘自康熙二十八年二月十一日以前死罪及軍流徒罪以下已結未結俱著寬釋以示朕赦過宥罪之意備辦船隻地方各官效力勤勞者著該督撫會同奉差官員確查具題各加一級縴夫供役勞苦亦著該督撫察明人數量給恩賞朕厪念民依特蠲租賦總期實德潤澤蒼生近見民間有建立碑亭稱頌德意者雖出羣黎愛戴之誠但恐各郡皆然未免致損民力誠使閭閻殷阜則禆益良多碑亭何與焉嗣後亦宜停止江浙錢糧既經蠲豁猶慮有不肖有司借端詞訟朘削民生著該督撫嚴行禁飭至各處𣙜關原有則例朕舟行所至咨訪過關商民每不難於輸納額稅而以稽留關次不能速過為苦𣙜關官員理宜遵奉屢頒諭旨恤商惠民豈可反貽商民之纍自今應力除積弊凡商民抵關交納正稅即與放行毋得稽留苛勒以致苦纍違者定行從重處分朕早夜孜孜惟冀官吏軍民士農商賈無一人不獲其所故於民生吏治圖維區畫務極周詳爾等可即傳諭俾一體奉行稱朕意焉特諭康熙二十八年二月十六日欽奉上諭朕巡行江表緬懷禹德躬率羣臣展祭陵廟顧瞻殿廡圯傾禮器缺略人役寥寥荒涼增歎愚民風俗崇祀淫祠爼豆馨香奔走恐後宜祀之神反多輕忽朕甚慨焉在昔帝王陵寢理應隆重培護況大禹道冠百王身勞疏鑿奠寧率土至今攸賴豈可因循特書地平天成四字懸之宇下著地方官即加修理畢備儀物守祀人役亦宜增添俾規模𢎞整嵗時嚴肅兼賜銀二百兩給與守祀之人此後益令敬慎地方官亦須時為留心以副朕尊崇遐慕之懷其即遵諭行特諭康熙二十八年二月十七日欽奉上諭朕巡省民生風俗行次浙江見省會兵民俱相和輯生齒蕃庶閭里乂安但觀民間習尚好事爭訟一興則不肖有司因緣詐索勢所必至縱或官員無所朘削而胥吏作姦究不能無私行勒助之弊小民之牽連苦纍者多矣夫微忿不捐搆成嫌怨小則耗損物力大則傾隕身家其為蠧害不可勝言矜此愚民允宜深戒地方大小衙門官員亦應各簡詞訟勸導閭閻俾守分息爭共安生業又夙聞東南巨商大賈號稱輻輳今朕行歷吳越州郡察其市肆貿遷多係晉省之人而土著者蓋寡良由晉風多儉積纍易饒而南人習俗奢靡家無儲蓄日所經營僅供朝夕一遇水旱不登則民生將至坐困苟不變易陋俗何以致家給人足之風爾等可傳諭將軍總督等令家喻户曉務使敦本興讓崇儉黜浮兵民日益協和風俗日益淳朴詞訟日益減少積貯日益豐盈則教洽化行朕心實嘉賴焉特諭康熙二十八年閏三月初十日欽奉上諭國家設官𣙜稅原以通商裕課利益民生非務取盈致滋紛擾朕巡行地方軫恤民隱咨諏利弊有應興革者即見諸施行近聞江浙閩廣四省海關於大洋興販商船遵照則例徵取稅課原未纍民但將沿海地方採捕魚蝦及貿易小船槩行徴取小民不便今應作何徵收俾商民均益著九卿詹事科道會同確議具奏特諭康熙三十年十二月初四日戶部奉上諭朕撫馭區宇三十年以來早夜圖維惟以愛育蒼生俾咸臻安阜為念比嵗各省額徵錢糧業已次第蠲豁其歲運漕米向來未經議免朕時切軫懷所有京通各倉米榖撙節支給數載於兹今觀厯年儲積之粟恰足供用應將起運漕糧逐省蠲免以紓民力除河南省明嵗漕糧已頒諭免徵外湖廣江西浙江江蘇安徽山東應輸漕米著自康熙三十一年始以次各蠲免一年至江寧京口杭州荆州大兵駐防地方亦應預行積貯著將康熙三十一年起運三十年漕米各截留十萬石存貯倉厫令該地方官敬慎守視以備需用爾部即遵諭行特諭康熙三十二年六月二十八日欽奉上諭朕於各省往來及請安而至者必問其地方情形雨澤應時與否頃自江南浙江來者問之云江浙間今年甚旱戶部其擇司官二員一遣往江南一遣往浙江詳詢江南總督浙江巡撫雨水情形來奏欽此康熙三十二年九月十六日欽奉上諭江浙二省今年夏旱雖不成災秋收諒必有限若漕糧照常徵收起運恐民食將至匱乏朕為此常切軫念除浙江漕糧已經改於今年蠲免外其江南漕糧今年或三分免一或免一半俟至該省應蠲年分將今年所免米石照數補徵起運於漕糧既無缺少官民大有禆益著滿漢大學士等會同戶部堂官倉場侍郎等作速確議具奏欽此康熙三十八年三月十九日欽奉上諭朕眷念東南民生風俗特行巡省兼以黃淮為患親閲河工比巡歷堤堰詳加相度以疏導修築之法指授河臣刻期興作隨南涉江表遍察民依頃至蘇州府駐蹕有浙江文武官吏及在省官員迎謁於行在言浙民望幸之心至殷且切合詞諄懇不啻再三朕勉徇輿情揚旌前發以三月十九日啓行自京師以來一切供御之需皆出儲備其沿途日用令該衙門照各地方時價採辦一無所纍於民如有官吏借名科派致擾閭閻者察實以軍法從事地方大小文武官員與扈從官員借稱親舊私相餽遺與受之人及扈從大小官員隨從人等有橫行生事者一並軍法從事凡經過地方百姓各安生業皆如常時務令㕓無廢市隴不輟耕毋得遑遽引避方今正屆農時所過田畝勿令踐踏其軍民人等懷挾私怨受人指使擅於駐蹕處所輒行告訐者一槩嚴禁不準仍照衝突儀仗例嚴加治罪爾部即傳諭扈從大小官員人等併行該督撫於各府州縣城市鄉村遍張告示悉行曉諭務令億兆通知以副朕體恤加惠至意特諭康熙三十八年三月二十六日戶部奉上諭朕以省方問俗巡歷三吳比至浙省見緣路農桑固遍隴畝而地有肥磽時有豐歉歷年正供錢糧因輸納維艱致多逋負雖已準分年帶徵而新舊之賦取給於一時恐力作之民終難於兼辦應通行蠲豁以𢎞庥澤除康熙三十三年以前恩詔赦免外其三十四五六年奏銷未完民欠地丁錢糧米豆麥雜稅著一槩免徵爾部行文該督撫責令有司悉心奉行務俾均霑實惠如有官吏以完作欠詭詞侵蝕者察出定從重治罪夫朝廷頻賜田租所以優恤民力誠使閭里之間人敦本業家有餘儲則藏富在民朕深嘉賴可傳示官吏軍民人等令咸知悉爾部即遵諭行特諭康熙三十八年三月二十六日吏部奉上諭朕頃自江南巡厯浙省沿途供御悉經儲備不以纎毫取辦閭閻而地方官料理夫船等項一無缺悮殊屬勤勞此等官員有因公詿誤罰俸住俸降俸降級革職留任者著察明悉從寬免爾部即遵諭行特諭康熙三十八年三月二十六日刑部奉上諭朕巡視東南行次浙省因官吏軍民依戀誠懇特留駐數日以慰喁喁奏請之情獨念獲罪人犯身淹刑獄一干法網無由自新兹乘輿經臨惻然矜憫用沛好生之澤聿示格外之仁該省各屬地方有罪犯現在監禁者除十惡等真正死罪及詔欵不赦等罪與官吏犯贓不宥外其餘自三十八年三月二十六日以前死罪以下已結未結悉著寬釋夫省刑宥罪者朝廷之殊恩守身奉法者小民之常分必使黎庶嚮風咸知寡過期稱朕孳孳教育羣生至意可行文該督撫遍傳所屬張示曉諭爾部即遵諭行特諭康熙三十八年四月初二日欽奉上諭朕子育黎元勤求治理日孜孜以施德澤厚民生為急務而江浙二省尤東南要地朕時切軫念比歲以來蠲豁田賦賑濟凶荒有請必行無災不恤雖漕項錢糧向未蠲免者亦曽特旨蠲免愛養之道備極周詳庶幾民生日益康阜用是乘輿時邁於視河事竣巡厯江浙咨訪民間情形見淮揚一路既困潦災而他所過州縣察其耕穫之盈虛市㕓之贏絀視十年以前實為不及此皆地方有司奉行不善不能使實惠及民所以小民雖懷愛戴之誠而朝廷恩澤卒未下究朕目擊厪懷亟思拯恤截留錢糧寬免積欠另有諭旨惟各鹽差關差向因軍需繁費於正額外令在差官員以所私得贏餘交納充用今思各官孰肯自捐私橐勢必仍行苛取商瘠民困均坐此弊著將加增銀兩一槩停罷以紓商民之纍其兩淮鹽課康熙三十六年曽加增四十萬兩今恐商人辦課維艱有漸致匱乏者著減去二十萬兩此外有應行應革事宜朕還都以後仍加商榷次第舉行該督撫藩臬皆地方大吏亦著悉心體訪凡有可為興利除害者作速勘實陳奏嚴革雜派禁止刁訟然後胥吏不能作姦良民得以安業儻官吏有悖旨妄行者許商民首告該督撫察出即行參奏朕視民如傷惟恐一夫不獲其所兹值海宇升平兵革不事正當與民休息之時故特渙沛德音減徵寬稅以為閭閻留有餘之力萬一嗣後别有急需或不得已稍議加增想在小民亦能共諒朕懷輸將之恐後也至於江南浙江人文稱盛入學名數前已酌定增額今著於府學大學中學小學各增五名舉行一次以示奬勵人才至意爾部即遵諭行特諭康熙四十二年三月十八日欽奉恩詔朕為天下生民主宵旰勤勞勵精圖治凡國家之休戚閭閻之樂利晷刻之間無不注意於此天下之大兆民之衆朕誰欺欺天乎至今四十餘載親厯飢饉者不知其幾南北用兵者不知其幾人心向背者不知其幾天變地震者不知其幾自責涼德不能撫育履冰臨淵兢業惟守仰賴上天眷佑祖宗厚德幸生創業未久之際方免墜失今海宇升平年歲稍和生民俱已樂業邇來諸王大小臣工士庶因朕五旬輿情肫切屢請加上尊號朕堅意固辭不允所請蓋朕不以名譽稱揚為尚惟以海內富庶為心是以屢蠲賦役頻省刑罰總欲使老安少懷風俗淳厚漸幾於康乂隆平之治近因淮黃告成乃東南要務再授方略望有善後朕不辭勞瘁親往閲視見畿輔山左江浙等省耆老人民俱中心愛戴雖童稚亦咸歡欣瞻仰是知民心皆一用是益深軫念視切如傷所以星夜回鑾兹特大沛𢎞恩普施遐邇庶幾民生咸登夀域和協遍滿寰區所有應行事例開列於後於戲安民則惠益𢎞逮下之恩御衆以寬聿溥好生之德布告天下咸使聞知康熙四十三年十月初七日戶部奉上諭朕昨嵗南巡至浙江見其農桑遍野戶口蕃殖閭閻氣象較勝於三十八年巡幸之時甚為心慰浙省錢糧雖前此屢經蠲貸而朕車駕經臨應更敷恩寬恤俾民生益加充裕當回鑾以後即擬免四十三年額賦因山東急賑災荒遂爾少緩曽頒有諭旨兹直省皆獲有秋特申前命康熙四十四年浙江通省應徵地丁銀米等項除漕糧外著俱行蠲免諭旨到日該督撫即嚴飭有司張示遍諭務使窮簷蔀屋均霑實惠地方大小官吏仍不時訓誡小民令各守分節用不論年歲豐歉咸有蓋藏庶無負朝廷殷殷愛養賜租給復之至意爾部即遵諭行特諭康熙四十四年四月初七日刑部奉上諭朕頃因親閲河工濟江而南至於浙省見民間生聚殷繁菜畦麥隴逺近彌望農事可冀豐穰朕心用以稍慰凡車駕臨幸之地必大敷膏澤以下逮黎元而各省錢糧屢次遞蠲浙江本年地丁銀米又經全免無可加恩惟是刑獄為民命攸關朕每當重罪奏讞之時常深切矜恤今乘輿所至父老子弟夾道歡迎而身陷囹圄之人獨自新無路朕甚憫焉浙江福建兩省康熙四十四年四月初八日以前凡犯罪詔欵不應赦者不赦外其餘死罪以下已發覺未發覺俱著減等發落四十三年秋審奉旨監候緩決者一併減等發落仍開具人數奏聞爾等其體朕為民巡省布德好生之意即詳慎察明遵行特諭康熙四十五年十月二十五日戶部奉上諭朕子育黎元日求所以休養利濟之道念惟賜租減賦實有裨益於民生直隸各省錢糧次第全蠲一年者業經數舉獨是歷嵗逋負積纍加增舊稅新徴勢難兼辦縱使少寬民力分年帶輸而督令續完仍多拮據朕眷懷及此深切軫恤是用蠲逋已責大沛恩膏俾閭閻獲免追呼官吏亦不罹參罰直隸山東積欠錢糧今年俱已蠲免其山西陜西甘肅江蘇安徽浙江江西湖北湖南福建廣東各省自康熙四十三年以前未完地丁銀二百一十二萬二千七百兩有奇糧十萬五千七百石有奇著按數通行豁免或舊欠已完在官而見年錢糧未完足者亦準扣抵諭旨到日各該撫立行所屬張示遍喻如有不肖有司以完作欠朦溷銷算及開除不清者該督撫即時題參嚴加治罪爾部即遵諭行特諭康熙四十六年四月十一日欽奉上諭朕頃因視河駐蹕淮上江浙兩省官員及地方紳士軍民咸環道逺迎懇請臨幸朕勉順羣情涉江而南循省風俗所至郡縣見雨暘應時麥苗蕃殖比閭樂業可冀盈寧雖山東一路尚未悉覩而江浙田疇鬱蔥在望深愜朕懷方今二麥垂熟正將刈穫之時一切扈從人員皆以次舟行不致蹂踏誠恐百姓沿途迎送老稚扶攜動盈千萬越阡度陌未免踐傷朕心甚為軫恤雖民情依戀出於悃誠但農事方殷應令所過地方悉停止岸傍迎送且車駕來時小民業已瞻覲兹節候漸熱朕舟行乘夜迎涼亦未可定民雖逺來無由親見爾等督撫可張示遍加曉諭使各知悉俾無負朕重農愛民之意特諭康熙四十六年十一月初二日户部奉上諭江浙地方賦役殷繁倍於他省朕屢經巡歷時切軫懷比年以來業已節次敷恩頻行蠲貸頃因兩省偶被旱災隨命按數減徵豁免漕欠並分截本年漕糧令該督撫親往散賑猶念民間素鮮儲蓄生計不充非更加格外滋培則荒歉之餘未能驟臻康阜兹特再施膏澤用𢎞休養康熙四十七年江南浙江通省人丁共額徵銀六十九萬七千七百餘兩著悉與蠲免其今年被災安徽巡撫屬七州縣三衛江寧巡撫屬二十五州縣三衛應徵地畝銀共二百九十七萬五千二百餘兩糧三十九萬二千餘石浙江二十州縣一所應徵地畝銀九十六萬一千五百餘兩糧九萬六千餘石四十七年亦俱著免徵所有舊欠帶徵銀米並暫停追取俟開徵時一併輸納務使小民一歲之內絶迹公庭安處隴畝俾得優遊作息經理農桑庶幾閭閻氣象可以日加豐豫諭旨到日該督撫體朕孳孳惠愛黎元至意各飭有司實心奉行仍張示通曉令咸知悉倘蠲除不實致有侵冒察出定治重罪爾部即遵諭行特諭康熙四十六年十一月二十三日欽奉上諭朕在宫中無刻不以民間疾苦為念恐遇旱潦必思豫防至巡幸各省於風俗民情無不咨訪即物性土宜皆親加詳考每至一方必取一方之土以驗試其燥濕今歲南巡江浙見天氣久晴所經河渠港蕩之水比舊較淺即慮夏間或有亢暘之患是時麥田雖甚豐稔然南方二麥用為麯蘖者多不似北方専資麵食南方惟賴稻米北方則兼種黍稷粱粟有攜北方黍稷及蔬菜之類至南方種植者多不收穫此水土異宜不可強也且江浙地勢卑下不雨則蒸濕人不能堪有雨則涼人皆爽豁雖地稱水鄉而水溢易泄潦歲之為患尚淺旱歲則為患甚劇北方經月不雨亦尚無礙南方夏秋間經旬缺雨則田皆坼裂禾苗漸稿矣喜雨亭記云十日不雨則無禾蓋謂此也江浙農功全資灌溉今河渠港蕩比舊更淺者皆由素無瀦蓄所致雨澤偶愆濵河低田猶可戽水濟用髙仰之田力無所施往往三農坐困朕兹為民生再三籌畫經久之計無如興水利建閘座蓄水灌田之為善也江南省之蘇松常鎮及浙江省之杭嘉湖諸郡所屬州縣或近太湖或通潮汐所有河渠水口宜酌建閘座平時閉閘蓄水遇旱則啓閘放水其支河港蕩淤淺者並宜疏濬引水四達仍酌量建閘多蓄一二尺水即可灌髙一二尺之田多蓄四五尺水即可灌髙四五尺之田準此行之可俾髙下田畝永逺無旱潦矣爾等其以朕意曉諭諸臣詳議以聞特諭康熙四十七年七月十五日欽奉上諭去歲杭州等處田畝被災民生疲弊這支河港蕩淤淺之處若勸諭百姓開濬恐地方官員藉此私派害民亦未可定況需費無多著動用正項錢糧速行疏濬特康熙四十七年十月十六日戶部奉上諭朕屢次南巡見閭閻殷阜之象逺不逮於舊時故於民生風俗無不一一咨訪雖不時蠲免額賦停徵積逋僅可支吾卒歲絶無餘蓄且今承平既久生齒日蕃食漸不充用多不給亦理勢之所必致朕每念及此未嘗不為惻然去年江南浙江二省俱被旱荒多方軫恤始蘇民困逮今歲復報潦傷旋經照例蠲賑並下詔書留漕資濟但嵗再不登生計益匱欲令辦賦力必難供朕於國家一切經費屢年撙節帑藏充裕以此渙敷膏澤藏富於民俾得盡力農桑衣食滋殖百姓既足國用何憂康熙四十八年除漕糧外江南通省地丁銀四百七十五萬四百兩有奇浙江通省地丁銀二百五十七萬七千兩有奇著全行蠲免所有舊欠帶徵銀米仍暫停追取此朕因江浙二省為東南重地特於格外施仁用𢎞休養之至意該督撫各飭有司張示遍諭務令窮鄉蔀屋咸共知悉儻或别借事端侵冒徵派事發定從重治罪爾部即遵諭行特諭康熙四十八年正月二十三日浙江巡撫黃秉中凡為督撫者但能清以持已實心辦事不交通近侍不夤緣部院則無往而不可矣朕涖政四十八年如爾陳奏素無夤緣者所見不可勝數此皆浮詞耳未足為據日後真偽當自明也至地方遇有凶荒蠲免錢糧發倉給米煮粥分賑别無奇䇿止在地方官實心奉行斯有濟耳朕嘗南巡灼知江浙風俗如湖州地方乃係水鄉雨水既多則魚蝦菱芡之利俱可資以度日但北方人日止再食南方人雖遇荒歉亦必三餐州縣官平時並不留心聽民間耗費直至窘迫始具文題請命下之後上司又不過虛張告示而止小民無知但能現成就食豈有長計謀生且農民愚而讀書人巧往往受其愚弄至於困乏飢餓而死而終不悟所以致死之由以此思之良可矜憫爾到地方宜令州縣官時時為百姓豫加區畫庶幾可以有備而無患也其調補保舉之事皆有情弊寧波府介在海濵地方緊要知府陳一夔不必與湖州更調特諭康熙四十八年七月初十日戶部奉上諭湖廣江西米糧在江南浙江販賣者甚多而米價並不曽減令爾等會議今覽爾等與九卿所議大略相同却於朕意迥相懸殊如爾等議將收買米石堆貯者定例禁止儻因此借端妄行摉查則徒為衙門人役之利於百姓絲毫無益而且有損雖將稽察不清之督撫等降處亦不知畏何濟之有爾等所議者枝葉耳根本處全未講求朕意將此米石於根本處詳加稽察則收米堆積之弊自除湖廣江西之米或江南浙江官民及貿易之人或本地方百姓及他處貿易之人在某馬頭某鎮店將某家米買賣若干及姓名察明甚易行文湖廣總督巡撫江西巡撫令差賢能官員於有名馬頭大鎮店內察明買賣人姓名米數至月終即具摺奏聞江南浙江總督巡撫處亦照此奏摺咨會若如此行而湖廣江西之米不至江南浙江販賣則更於何處販賣耶凡此米石人皆共知買賣事情不待禁約而販賣者必多似於百姓大有禆益朕此旨並爾等所議奏摺付九卿同閲若皆以為是著交與該部將朕諭旨作速咨行湖廣江西江南浙江總督巡撫若更有應議之處另議具奏特諭康熙四十八年十月十六日欽奉上諭江南浙江連歲災荒地方困苦又今年兩省疾疫盛行人民傷斃者甚衆雖該省督撫未經奏聞朕訪知災病之狀深用惻然民命至重朕宵旰孜孜惟以矜全百姓為念一切刑獄奏讞尤加欽恤比年江浙盜案疊見凡犯盜劫者悉皆依律坐罪今閲秋審情真各案所議情罪俱屬允協但念災荒疾病之餘復將數十罪犯一時正法朕心甚為不忍江浙兩省應處決情真人犯俱著停止一年欽此康熙四十九年十月初三日戶部奉上諭朕恭膺天眷祇承列祖鴻庥統御萬方子育黎庶厪懷至治宵旰靡寧幸際海宇同風邉隅向化遐邇中外帖然袵席之安者是皆仰荷天地祖宗福佑之所致也方朕八齡踐阼之初太皇太后問朕何欲朕對臣無他欲惟願天下治安生民樂業共享太平之福而已迄今五十年矣惓惓此心未嘗一日少釋每思民為邦本勤恤為先政在飬民蠲租為急數十年來除水旱災傷例應豁免外其直省錢糧次第通蠲一年者屢經舉行更有一年蠲及數省一省連蠲數年者前後蠲除之數據戶部奏稱通共會計已逾萬萬朕一無顧惜百姓足君孰與不足朝廷恩澤不施及於百姓將安施乎朕每嵗供御所需概從儉約各項奏銷浮冒亦漸次清釐外無師旅餉餽之煩內無工役興作之費因以歷年節省之儲蓄為頻歲渙解之恩膏朕之蠲免屢行而無國計不足之慮亦恃此經畫之有素也比來省方時邁已歷七省南北人民風俗及日用生計靡不周知而民生所以未盡殷阜者良由承平既久戶口日繁地不加增産不加益食用不給理有必然朕洞矚此隱時深軫念爰不靳敷仁用蘇民力明年為康熙五十年思再沛大恩以及吾民原欲將天下錢糧一概蠲免因衆大臣集議恐各處需用兵餉撥解之際兵民驛遞益致煩苦細加籌畫悉以奏聞故自明年始於三年以內通免一周俾逺近均霑德澤直隸奉天浙江福建廣東廣西四川雲南貴州各巡撫及府尹所屬除漕項錢糧外康熙五十年應徵地畝銀共七百二十二萬六千一百兩有奇應徵人丁銀共一百一十五萬一千兩有奇俱著察明全免並厯年舊欠共一百一十八萬五千四百兩有奇亦俱著免徴其五十一年五十二年應蠲省分至期候旨行民間舊欠既經豁免嗣後每年額徵錢糧務如數全完倘完不及額或别有虧空託稱民欠則負國甚矣即責令督撫以下官員償補仍從重治罪夫地方大吏以及監司守令皆與吾民誼均休戚者也誠克體朕孳孳保赤之懷實心愛飬力杜侵牟朘削則閭閻咸得衣食滋殖無有失所而為官吏者亦身名俱泰豈非升平樂利之盛事歟爾部移文各督撫諭旨到日即刋刻頒布遍示窮簷令咸知悉特諭康熙五十三年七月十二日上諭大學士九卿詹事科道朕聽政年久深悉民生凡國家要務無時不預為籌畫今有前來奏摺之人俱經問及皆稱江南暵旱江浙米價亦不甚賤今春山東河南田麥歉收交冬米價必至騰貴彼時雖亟為料理亦不能及徒空勞爾朕詳悉思維將漕糧撥三十萬石江寧府十萬石蘇州府八萬石淮安揚州五萬石杭州府五萬石河南開封二萬石著漕運總督親身閲兌速行運至令其加謹照數收貯有此米石軍民心即寬慰而米價不致騰貴且與通倉無甚關係較之一年所缺之數亦不浮多至豫省漕糧該部亦應預行詳議今如雨澤及時田禾豐收則此項米石由水路撥給他處亦可特諭康熙五十三年十一月十七日户部奉上諭朕臨蒞多年無時不軫念民瘼每嵗於直隸及各省凡民間雨暘時候豐歉情形莫不留心訪察雖在僻逺必務周知偶值一二處災傷蠲免賑救不惜糜費倉帑以蘇我民困也近思賑濟災歉以速為貴必待督撫奏報往返候命使小民嗷嗷待哺何如豫備積貯於平時則所在有可恃之資糧而臨事免轉移之勞費今漕挽通行太倉充裕江浙地方年來頗有歉收州縣應酌量截留糧米分貯各處江寧原留五萬石今再截留十萬石蘇州原留八萬石今再截留二萬石安慶截留十萬石杭州原留十萬石今再截留十萬石皆於本年起兌內就近截留令地方官加謹收貯爾部即遵諭行特諭康熙五十六年十一月二十六日户部奉上諭朕撫馭寰宇五十餘年夜寐夙興為小民勤求生遂凡率土逺近皆期共享樂利聿成家給人足之休未嘗一日不厪諸懷也數十年以來各省正賦纍經全免歷年積欠業已蠲徴偶有雨澤愆期或發倉廪散給或截漕糧賑救不惜數萬萬金錢米穀頻沛恩施誠念窮簷之艱慮其至於顛連失所耳近者民力雖已稍紓然念分年帶徴銀兩若不格外優寬則小民一嵗所獲分納二年之賦以其贏餘養贍室家斷難充足朕每懷及此軫惻良深宜更加殊恩通行蠲免今將直隸安徽江蘇浙江江西湖廣西安草肅等八處帶徴地丁屯衛銀二百三十九萬八千三百八十兩有奇概免徴收其漕項雖例不準免亦著破格施恩將安徽江蘇所屬帶徴漕項銀四十九萬五千一百九十餘兩米麥豆一十四萬六千六百一十餘石免徵各半爾部即行文該督撫嚴飭所屬實心奉行遍加曉諭俾民間無徴催之纍均沾實惠用稱朕撫恤羣黎至意倘有不肖有司借端朦混私行徵收者該督撫嚴察參處如督撫失察一併從重處分爾部即遵諭行特諭浙江通志卷首一欽定四庫全書浙江通志卷首二詔諭世宗憲皇帝雍正元年十月二十六日户部奉上諭朕自御極以來宵衣旰食無日不以民依為念督撫以下守令以上凡有地方之責者皆宜公忠體國仰副朕心今年夏月朕以北省二麥歉收差員到南省於秋成後採買米石以備賑貸平糶朕意切於為民正欲酌盈劑虛以羡補不足也又恐有不便於民之處於差員臨行之時再三申諭地方米多方可採買不必定要買足今聞各省地方官因欽差買米禁止商販不許出境大負朕痌瘝一體之意甚屬不合况浙江及江南蘇松等府地窄人稠即在豐收之年亦皆仰食於湖廣江西等處今秋成歉收若商販不通必致米價騰貴該部速即行文各省總督巡撫凡有米商出境任便放行使湖廣江西安慶等處米船直到蘇州蘇州米船直到浙江毋得阻撓庶幾有無流通民皆足食以副朕愛養元兀之意特諭雍正元年十一月十一日户部奉上諭浙省偶值秋旱其被災地方已降諭旨蠲免錢糧令有司加意撫綏查杭嘉湖所屬被災十四州縣應有額徵漕米三十二萬石朕恐荒歉之歲民間納米為難著令徵收一半改折一半俾地方多存正米十六萬石又有耗米若干既可以濟民之食又可以紓民之力於閭閻大有裨益其改折之價著照康熙九年例每米一石折銀一兩按限解部又念被災之後所交米色未能純一其十六萬漕米著令紅白兼收以示朕軫恤地方格外施仁之至意爾部即遵諭行特諭雍正元年十二月初九日上諭江南浙江江西湖廣山東河南各總督巡撫漕船關係緊要除本船正副旗丁外其頭舵水手皆應擇用本軍庶各知守法不敢誤漕生事近聞多雇募無籍之徒朋比為姦不服旗丁彈壓當漕糧兑足之後仍延捱時日包攬貨物以致載重稽遲易於阻淺不能如期抵通及回空經産鹽之地又串通姦棍收帶私鹽此其弊端之彰著者聞尤有不法之事凡各省漕船水手多崇尚邪教聚衆行凶一呼百應邇年以來或因爭鬬傷害多人或行劫鹽店搶奪居民種種凶惡漸不可長亟宜懲治爾該督撫即嚴飭所屬各衛所嗣後糧船務於本軍內擇其能撑駕者充當頭舵水手不許雇募無籍之人更嚴禁邪教諭令歸業務為良民如仍怙惡不悛該地方官不時查拏從重治罪如奉行不力即將該管官辨指名題參特諭雍正二年五月十六日欽奉上諭國家輕徭薄賦小民輸將自當踴躍乃有纍年拖欠不完者多由包收代納之故若浙江之里書其弊尤甚里書一役祖父相承掌管一里糧册銀米悉憑收解致有需索花户併飛灑侵蝕之弊官民俱受其纍著即嚴行禁革如州縣有違禁私用者立即參處至徵糧全憑册籍務使挨户清造方可按名催比毋得因循致滋混淆特諭雍正二年八月十五日欽奉上諭朕思天地之間惟此五行之理人得之以生全物得之以長養而主宰五行者不外夫隂陽隂陽者即鬼神之謂也孔子言鬼神之德體物而不可遺豈神道設教哉蓋以鬼神之事即天地之理故不可以偶忽也凡小而邱陵大而川嶽莫不有神焉主之故當敬信而尊事况海為四瀆之歸宿乎使以為不足敬則堯舜之君何以柴望秩於山川文武之君何以懷柔百神及河喬嶽今愚民昧於此理往往信淫祀而不信明神傲慢褻瀆致干天譴夫善人多而不善之人少則天降之福即稍有不善者亦蒙其庇不善人多而善人少則天降之罰雖善者亦被其殃近者江南報上海崇明諸處海水泛溢浙江又報海寧海鹽平湖會稽等處海水沖決隄防致傷田禾朕痛切民隱憂心孔殷水患雖關乎數或亦由近海居民平日享安瀾之福絶不念神明庇護之力傲慢褻瀆者有之夫敬神固理所當然而趨福避禍之道即在乎此能敬則謂之順天不敬則謂之褻天褻天之人顧可望綏寧之福乎詩曰敬天之怒無敢戲豫又曰畏天之威于時保之朕固當朝乾夕惕不遑寧處以敬承天意亦願爾百姓共凜此言內盡其心外盡其禮敬神如神在實以至誠昭事而不徒尚乎虛文人意即神意一念之感格自足以致休祥豈獨一家一鄉之被其澤哉爾百姓果能人人心存敬畏必獲永慶安瀾著該督撫將此諭旨令該地方官家諭户曉俾沿海居民一體知悉特諭雍正二年八月二十四日户部奉上諭前因浙江督撫等摺奏七月十八十九等日驟雨大風海潮泛溢衝決隄岸沿海州縣近海村莊居民田廬多被漂沒朕即密諭速行具本奏聞賑恤但思被災小民望賑孔迫若待奏請方行賑恤恐時日耽延災民不能即沾實惠朕心深為憫惻著該督撫委遣大員踏勘被災小民即動倉庫錢糧速行賑濟務使災黎不致失所其應免錢糧田畝即詳細察明請蠲凡海潮未至之村莊不得混行冒蠲至於緊要隄岸衝決之處務須速行修築無使鹹水流入田畝朕念切痌瘝務令早沾實惠該地方官各宜實心奉行加意撫綏俾凋瘵得蘇生全速遂以副朕勤恤民隱至意該部即行各該督撫遵奉速行特諭雍正二年八月二十五日上諭江南浙江江西湖廣山東河南各總督巡撫漕船關係緊要朕前降諭旨除本船正副旗丁外其頭舵水手皆應擇用本軍庶各知守法不敢誤漕生事此雖係總漕專責然亦關爾等地方之事爾等當嚴飭所屬糧道都司衛所等官務須清查什軍毋令隱漏規避頭舵水手作何更換毋令假冒其換去之人作何安插毋令失所俱宜協同總漕悉心籌畫商確實力奉行以為永久之計如奉行不力即將該管官辨指名題參特諭雍正二年九月二十二日上諭湖廣總督楊宗仁江西巡撫裴􅏍度今歲各省秋成大有惟浙江江南沿海地方七月十八九等日海潮泛溢近海田禾不無損壞朕軫念災黎惟恐失所業經嚴飭兩省督撫發倉賑濟多方撫恤但杭嘉蘇松等府人稠地狹向來出米無多雖豐年亦仰給於湖廣江西等省今沿海被災恐將來米價騰貴小民艱食湖廣江西地近上流今歲豐收爾可速動司庫銀兩湖廣買米十萬石江西買米六萬石選委廉幹賢員陸續押送浙江交浙江巡撫平糶所糶之銀仍移還補庫其米應於何處交卸爾即咨會浙江巡撫酌議速行務於浙民有益毋得怠緩遲誤特諭雍正二年十月二十六日欽奉上諭江浙兩省沿海地方於七月十八十九兩日同時皆被潮患漂沒居民廬舍雖經頒旨加意賑恤然朕憫惻之念至今尚未能釋惟有朝夕警惕以答天意但海為衆水所歸無不容納今乃狂潮泛溢水不循軌或者海洋潛藏匪類亦未可定稽諸前事往往有之沿海各有督撫提鎮務須實心愛養小民整理營伍閭閻各安其業汛防有備無虞毋令海洋别生事端庶不負朕委任之意特諭雍正三年五月初七日户部奉上諭去歲江浙海潮衝溢沿海場竈淹沒之處甚多兩淮鹽政所屬地方經噶爾泰奏聞朕即發帑賑恤併將雍正元年二年竈户未完折價銀四萬餘兩悉行蠲免其兩浙鹽政所屬地方該巡鹽並未將被災之處題報今謝賜履以摺奏聞去秋海濤漂沒情形兩淮與兩浙無異朕博施一體之心務使率土羣霑膏澤著將華亭婁縣上海海寧餘姚蕭山慈溪等縣雍正元年二年未完場課銀兩悉行蠲免該鹽政通行曉諭俾各場丁户人人得沾實惠將已完未完場課數目確查報部倘有不肖有司將已完作欠或借端朦混私行重徵者即指名題參若隱匿通同後經察出將該鹽政一併從重治罪該地方督撫仍嚴加稽察毋使吏胥中飽以副朕勤恤窮丁普濟同仁至意爾部即遵諭行特諭雍正三年九月二十五日欽奉上諭古者視歲之上中為儲蓄之節蓋官民經畫久逺不為一時茍且之計積之於豐年用之於歉歲所謂有備無患法良而意美也朕自臨御以來宵旰勤求無刻不以民依為念乃重農積粟之詔屢下而閭閻卒少蓋藏官倉亦各虧缺即如直隸保定等府去歲頗稱有秋今春二麥亦熟乃以夏秋雨水過多田禾被潦而民間遂有飢色幾至流離若非多方賑恤窮民必至失所此皆草野無知食不以時用不以禮但快目前之有餘罔計異日之不足一遭旱潦追悔無從至於常平等倉原為備荒而設乃有司奉行不力多至缺額罪何可逭兹據江南浙江江西湖廣福建河南山西陜西廣東廣西雲南貴州等省督撫報稱今歲秋成八九十分不等朕覽奏不勝慰悅又重為吾民計及長久宜及此時講求儲蓄之道以備將來該督撫等可轉飭有司遍行曉諭務須撙節愛惜各留有餘預為他時緩急之需社倉之法亦宜趂此豐年努力為之勿但視為虛文故事朕為吾民籌畫養贍之道惓惓於懷無時或釋而吾民自謀其身家若但茍且因循不復長顧逺慮則重負朕軫念元元之意也至於州縣倉儲向有虧缺者若不趂此豐收之時速行買補將來發覺斷不姑貸慎之慎之特諭雍正三年十二月十七日户部奉上諭湖廣為産米之鄉穀石最宜多貯將來運往别省皆為近便今查湖廣通省存倉之穀只數十萬石為數無多今歲湖廣收成豐稔著即行文該督撫令其動支庫銀十餘萬兩遴委賢員採買穀石於省倉及府州縣應貯之處加謹收貯此時只宜陸續採買不可因官價一時採買致令穀價騰貴設若民間穀價稍昂即便停止俟明年再行採買江南浙江今歲俱獲豐收著落該撫就近商酌若亦可動項採買穀石有益著即一面定數奏聞一面採買可也特諭雍正四年十月初六日欽奉上諭朕臨御寰區惟以正人心端風俗為首務乃化導訓戒之旨屢頒而錮疾尚未悛改如浙江則有汪景祺查嗣庭之流肆行訕謗毫無忌憚可見浙省風俗澆漓甚於他省而今科主考陳萬䇿䇿問中有云浙省敝俗頗喜爭訟或本屬細故而張大其詞或僅有影響而鑿空妄作刁風未革積習日深等語益可見浙俗之難於化導為衆所共知者也若不力為整頓挽回及其陷於重罪然後加之以刑實有所不忍朕意專遣一官前往浙江省問風俗稽察姦偽應勸導者勸導之應懲治者懲治之應交地方官審結者即交地方官審結應參奏提問者即參奏提問務使紳襟士庶有所警戒盡除浮薄囂凌之習歸於謹厚以昭一道同風之治河南學政王國棟居官聲名甚好可著前往浙江膺斯職任其應給何等之銜並如何設立衙門鑄給關防之處著九卿詳議具奏王國棟著來京請訓旨再赴浙江新任其提督河南學政員缺著于廣去欽此雍正四年十一月二十七日欽奉上諭讀書所以明理講求天經地義知有君父之尊然後見諸行事足以厚俗維風以備國家之用非僅欲其工於文字也浙江文詞甲於天下而風俗澆漓敝壞已極如查嗣庭汪景祺自矜其私智小慧傲睨一世輕薄天下之人遂至喪心悖義謗訕君上以聖祖仁皇帝六十餘年聖德神功深仁厚澤普天率土浹髓淪肌自居心以至用人行政至公至正事事周詳盡善實為古帝王中所罕見者而查嗣庭汪景祺乃敢肆行謗議則凡為人君者更何道以免悖逆之譏刺乎設使議論及於朕躬其情罪尚猶可恕今觀查嗣庭日記於雍正年間之事無甚詆毁且有感恩戴德之語而極意謗訕者皆聖祖皇帝已行之事也本極盡善無可擬議而妄肆悖逆猖狂之言誰無君父能不痛心能不切齒昔孔子作春秋歷代因之各有史册以垂法戒今若容悖逆之人顛倒是非私行記載則史册不足憑矣豈非千古罪人乎浙江風氣惡薄如此查嗣庭汪景祺而外自有與此相類者若加窮究則不可勝誅倘聽其風俗頽敝不加整飭何以成一道同風之治朕思開科取士原欲得人任用豈以其文章詞藻之工可以有益於民生吏治今浙江風氣如此挾其筆墨之微長遂忘綱常之大義則開科取士又復何用且巡撫李衛等從查嗣庭家中搜出闈場懷挾細字密寫文章數百篇似此無恥不法之事查氏子弟如此必係浙人習以為常不但藐視國憲亦且玷辱科名應將浙江人鄉會試停止至於生員歲考仍舊舉行百姓皆吾赤子地方如有水旱之事朕仍加恩賑恤鄉會試既停且使浙人中師生同年彼此請託營求紛紜膠擾之習為之肅清將來人心共知改悔風俗趨於淳朴朕確有見聞再降諭旨朕因人心風俗關係重大不得不嚴加整理以為久安長治之計朕意如此著內閣九卿翰林詹事科道會同定議具奏特諭雍正五年二月初九日欽奉上諭浙江杭嘉湖三府上年秋冬之間雨水稍多收成略覺歉薄今年青黃不接之時已令地方官商酌平糶以濟民食但念米價雖不至昂貴而無力窮苦之民本無糴米之資甚屬可憫著動用庫銀四萬兩令巡撫李衛會同將軍鄂彌達觀風整俗使王國棟悉心商酌於地方或開濬河道或修理城垣堤岸令小民就近傭工藉以糊口倘四萬金尚不敷用著李衛等再行具奏請旨特諭雍正五年三月初五日兵部奉上諭浙江緑旗兵丁懦弱騎射生疏營伍不整陜西兵丁人材壯健弓馬嫺熟者頗多將陜西各標營兵丁內揀選一百名移住浙江分撥各標教習訓練浙省兵丁亦知鼓勵於營伍大有裨益其撥住兵丁內有人去得騎射嫺熟能約束教習者即行拔補千總總督嶽鍾琪現在四川爾部行文陜西提鎮將伊等標下及各營兵丁內漢仗弓馬俱好人去得情願攜帶家眷移住浙江者甘肅固原二提標各選二十名肅州涼州寧夏西寧延綏興漢鎮標各選十名共一百名如無家眷隻身願往者亦準其前往倘兵丁內不能得願往之人即行招募人材壯健弓馬嫺熟情願移住浙江者以足其數再兵丁自陜至浙路途遙逺搬移家口車輛船隻等項沿途費用煩多兵丁難以措辦係西安地方兵丁交與西安巡撫係甘肅地方兵丁交與甘肅巡撫酌量多少家口量給一路足用盤費務令兵丁得沾實惠但人多路逺照管需人文職著於同知通判內選𣲖一員武職著於遊擊守備內選𣲖一員沿途督送或一齊起程或分數起前後起程七八月間再令起程前往各兵起程之後一切養贍安置之處自有浙江巡撫提督會同料理欽此雍正五年十月十七日大學士九卿等蒙賜觀浙江巡撫所進一莖二穗三穗嘉禾回奏奉硃批上諭覽卿等所奏此非朕涼德之所致想浙省澆習必然丕變矣不然不能感召上蒼如此之瑞應朕深為浙省臣民慶幸焉將此諭發與李衛著通省曉諭欽此雍正五年十月二十七日欽奉上諭朕御極以來愛養黎元勤求治理耗羡之説原非得已本欲將各省錢糧之耗羡悉行革除因廣為咨詢留心體察知州縣官員實有必不得已之用度若將耗羡盡行禁止在廉謹之員實難支持而貪汚不肖之徒勢必藉口無以養廉而有恣意苛索之事百姓轉受其纍是以錢糧之有火耗由來已久各處俱有相沿之例其數亦多寡不同惟應於火耗過重之員重治其罪若有司官酌量收納不加重耗苛取於民小民亦覺相安此各省之大勢也查各省之中耗羡最輕者莫如浙江一省每兩不過五六分地方官員常以不能敷用為苦各省之中賦稅最多者莫如江南之蘇松二府浙江之嘉湖二府每府多至數十萬地方百姓未免難於輸將此二事皆關係官民之要務也查蘇松嘉湖賦稅加重之由蓋始於明初洪武時四府之人為張士誠固守故平定之後籍諸富民之田以為官田按私租為稅額夫負固之罪在士誠一人而乃歸咎於百姓加其賦稅此洪武之刻政也明朝二百餘年減復不一我朝定鼎以來亦照明例徵收蓋因陸續辦理軍需經費所在未便遽然裁減也我皇考聖祖仁皇帝常論及此雍正三年朕仰體皇考多年寬賦之聖心將蘇松二府額徵浮糧豁免彼時頒發諭旨甚明本欲一體加恩於嘉湖二府因浙江風俗澆漓正須化導不便啓其望恩幸澤之心故爾暫止今見浙俗漸次轉移將來可望改行遷善朕心深慰特沛恩膏查嘉興府額徵銀四十七萬二千九百餘兩著減十分之一計免銀四萬七千二百九十兩零湖州府額徵銀三十九萬九千九百餘兩著減十分之一計免銀三萬九千九百九十兩零二府共免銀八萬七千二百兩零永著為例著該督撫督率有司敬謹奉行以副朕蠲賦恤民之至意至於浙江地方各官養廉之資更無别項而耗羡則每兩不過五六分以通省額徵之數計之每年耗羡僅十四萬兩自督撫將軍副都統學政及藩臬道府同知通判州縣等官共一百二十員凡用度公費皆取資於此是以不足支應除嘉湖二府錢糧已經減免外著將杭州寧波紹興台州金華嚴州衢州溫州處州等九府額徵銀二百五萬兩按十分之一存半計算得銀十萬賞給各官以為養廉合之州縣耗羡則有二十四萬兩從雍正六年為始俱著提解司庫令該撫酌量官職之大小府州縣之繁簡秉公𣲖定數目奏聞餘銀存為本省公事之用朕軫念浙省官民施恩格外百姓賦稅之稍重者則將額徵之數特賜裁減官員用度之不足者則將惟正之供賞給養廉朕今施恩於官者實施恩於民之意無非欲百姓等催科不擾皆樂業於田間官員等俯仰裕如咸盡心於職守倘官民不知副朕愛民之苦心仍有作姦犯科隱糧逋賦及侵漁公帑剝削民膏者在天理國法俱難姑容加以重懲更無可貸思之慎之又如四川州縣錢糧甚少官員用度實無所出故一切供應俱出自里民前嶽鍾琪憲德等奏稱欲將通省耗羡定為加三而革去里民一切供應之陋規川民亦甚樂從等語朕以加三耗羡太重未肯允行命嶽鍾琪再加斟酌具奏今嶽鍾琪奏稱目前事勢非加三不能敷用况從前貪吏有加六七者今既革除一切供應之纍又實減耗而並未加耗誠百姓歡欣樂從之舉將來地畝開墾既多自可次第裁減等語朕思及於官民均便姑且令行看俟開墾加增之後再令裁減朕辦理天下事務惟喜據實無隱故將此明白諭衆知之朕之行政惟期官民上下相安並受其益無幾微未協之處然後可以望永逺遵行也特諭雍正六年八月二十九日欽奉上諭據浙江學政王蘭生摺奏生員以立品奉公為尚若有潛通胥役欺隱錢糧包攬抗欠者一經查出即行黜革重處又於按考所至嚴加曉諭並令地方官開報使其完糧然後收考若能久而成風人人以急公為榮以欠糧為恥則士習民風愈覺淳厚等語天下之民不外乎士與民天下之俗不外乎士習與民風士民雖分而為二而其實則一也有司有治民之責學政有課士之任雖各有專司而其實則相為表裏也嘗見有司但以為職在臨民而置學校於不問而學政則以為統屬士子若不優容庇護無以博其稱揚因而曲為徇隱百計包荒遇有生員違抗錢糧者又以催科乃地方官之事與督學無涉以致士子無所忌憚此等陋識實庸劣學臣之所同也不知士子乃百姓之坊表士習不端民風何由而厚況倚仗青襟抗延國課則士品頽壞已極其害實在世道人心不僅關係錢糧之逋欠而已王蘭生令地方官開報欠糧之生員必俟完納方準收考俾人人以急公為榮以欠糧為恥此實鼓勵化導之善政而他省學政從未有如此舉行者未必皆見不及此大抵瞻徇茍且之習未除耳王蘭生著交部議敘向來浙省士習澆漓中外所知朕為世道人心計不得不嚴加整理今二年以來李衛王國楝王蘭生先後奏稱兩浙士子感朕訓誨之恩省愆悔過將舊日囂凌之習痛自改除可稱士風丕變前年朕原降旨浙人秉性聰慧既知讀書必明大義非如強悍執滯之難於感化者一經指示則醒悟亦必最捷不出二三載可以望其自新今果然矣明年即屆鄉試之期浙省士子準其照舊鄉會考試以示朕訓俗牖民樂聞遷善之至意特諭雍正六年十月初三日欽奉上諭向來江浙收兑漕糧俱用本地粳米擇其乾圓潔淨者方準交納間遇收成稍薄之年該督撫每以紅白兼收為請朕皆允行夫米糧乾潔皆可久貯原不在色之紅白且江浙二省户口繁多且每年應納漕糧將及四百萬石若必拘定本地粳米恐致米價昻貴民間難於輸將朕軫念閭閻凡有裨益民生之計皆為之周詳籌畫自雍正己酉年為始江浙徵收漕米但擇乾圓潔淨不必較論米色準令紅白兼收籼粳並納永著為例特諭雍正七年二月二十六日欽奉上諭據欽差浙江清查錢糧之大臣性桂摺奏浙省雍正二年以前未完舊欠錢糧帶徵每年應完銀十五萬兩有零查雍正五年六年應完之項已於本年如數完納又雍正三年至五年未完之錢糧七十七萬餘兩於雍正六年之內已完四十餘萬兩其餘在奏銷以前大約可以全完民情感戴國恩踴躍輸納正賦等語浙省為財賦重地民力輸將朕所軫念其所舊欠錢糧非不欲開恩豁免祗以屢年未完之項乃頑户之所拖欠若以抗正供而霑膏澤則頑民獲利而良善轉未邀恩非所以化導人心風俗也今浙省紳士庶民咸能知朕教養之殷懷感朕訓誨之至意即此踴躍完糧一事可以見其戴恩遷善之誠朕實為浙省之士民風俗稱慶非重此數十萬之國帑也浙省因總督李衛正已率屬勸懲兼施實心任事故能令地方革薄從忠也如此然其嚮善之速該省之人亦甚屬可嘉用是特沛鴻恩將雍正七年額徵地丁屯餉錢糧蠲免十分之二共計六十萬兩著李衛轉飭各屬恪遵奉行務使閭閻均霑實惠並將朕加恩奬善之意遍行宣諭俾逺鄉僻壤咸共知悉特諭雍正七年三月十四日欽奉上諭在京八旗兵丁朕悉心為之籌畫其家若有吉凶之事需用之費無所取辦實為拮據可憫特給內庫銀兩令王大臣等營運生息以備兵丁一時之用今思外省駐防之滿洲漢軍兵丁等亦當一體加恩江寧杭州西安京口荆州廣東福建寧夏右衛共九處每處賞銀二萬兩天津河南潼關乍浦成都共五處每處賞銀一萬兩俱著於布政司庫內支給交與該將軍副都統等公同存貯營運生息如該處駐防兵丁家有吉凶之事將息銀酌量賞給以濟其用其本銀永逺為存公生息之項不必繳還該將軍副都統等務須盡心辦理使兵丁均霑實惠倘該管大臣官員有私自侵蝕那移或委任非人以致本利虧缺者定行從重治罪仍於該管及委用等官員名下嚴追還項其營運利息之處亦必公平辦理倘指稱官銀名色或占奪百姓行業或重利刻剝閭閻與商賈小民爭利擾纍地方著各督撫不時稽查即行參奏倘督撫徇隱不奏經朕訪聞必將該督撫一併議處此項本利銀兩每年出入之數交與在京八旗都統副都統查核一旗或管一省或管二省著怡親王大學士等酌量𣲖定每年歲底各省該管大臣官員等造册賫送各該旗查核奏聞再各省督標撫標提標兵丁等亦倣此例每標或給銀一二萬兩或給銀數千兩按兵丁之數分别銀兩之多寡亦著怡親王大學士等酌量𣲖定其銀即交與各該督撫提督委員料理以惠濟兵丁均照駐防之例行其前後接任之時將此造入交代册內查核至於各省鎮標兵丁等一時難以遍及量國用之出入次第加恩陸續降旨特諭雍正七年六月二十一日欽奉上諭我朝肇造區夏天錫人歸列聖相傳中外從乂逮我聖祖仁皇帝繼天立極福庇兆民文治武功恩施德教超越百王亘古罕有此普天率土心悅誠服雖深山窮谷庸夫孺子以及凡有血氣之倫莫不尊親者詎意逆賊吕留良悍戾凶頑好亂樂禍自附明代王府儀賔之孫追思舊國憤悶詆譏夫儀賔之後裔於戚屬至為疏賤何足比數且生於明之末季當流寇陷北京時吕留良年方孩童本朝定鼎之後伊親被教澤始獲讀書成立於順治年間應試得為諸生嗣經歲科屢試以其浮薄之才每居髙等盜竊虛名誇榮鄉里是吕留良於明毫無痛癢之關其本心何曾有髙尚之節也乃於康熙六年因考校失利妄為大言棄去青襟忽追思明代深怨本朝以博學宏詞薦則詭云必死以山林隱逸薦則欲剃髮為僧按其歲月吕留良身為本朝諸生十餘年之久矣乃始幡然易慮號為明之遺民千古悖逆反覆之人有如是之怪誕無恥可嗤可鄙者乎自是著邪書立逆説喪心病狂肆無忌憚其實不過賣文鬻書營求聲利而遂敢於聖祖仁皇帝任意指斥公然罵詛以毫無影響之事慿虛撰述所著詩文以及日記等類或鐫板流傳或珍藏祕密皆人世耳目所未經意想所未到者朕翻閲之餘不勝惶駭震悼蓋其悖逆狂噬之詞非惟不可枚舉抑且凡為臣子者所不忍寓之於目不忍出之於口不忍述之於紙筆者也今姑就其中數條略為宣示內外諸臣庶天下後世共知其譸張感憤之荒唐大吠狼嘷之忿戾自生民以來亂臣賊子罪惡滔天以姦詐凶頑盜名理學大儒者未有如吕留良之可恨人也其文集有云德祐以後天地一變亘古所未經又其行狀云有故人死於西湖為位以哭壞墻裂竹擬於西臺之慟又云將以小莊為桃花源為不知有漢無論魏晉之人又云遂削髮為僧茍延性命又辭山林隱逸之薦答友人書云有人行於途賣餳者唱曰破帽換糖其人急除匿已而唱曰破網巾換糖復匿之又唱曰亂頭髮換糖乃惶遽無措曰何太相逼留良之剃頂亦正怕換糖者相逼耳又示諸子戒慶生辰云如其有重於生也則偷息一日一日之恥也世有君子曰夫夫也何為至今不死也則其僇嚴於斧鉞又何慶之有使以辱身茍活者為慶將置夫年不滿一二十義不顧門户斷頭飛首以遂其志義者於何地也乂日記內詩句云若論五百年間事紫色蛙聲總正傳又云麻剌吉出城送者填塞飢渴易為飲食如此觀我民狼狽不知所歸可憐可痛也又云李雯華亭人甲申後入北幕與史道鄰書及下江南詔皆其筆也中有六合一而泰階平禮樂興而干戈息之句人傳嗤之又云沈天彜為妹求旌貞節且云其尊公棄車先生遺命不請有司之旌豫曰尊公之識高其命正當遵也棄車先生遭變後十餘年閉門不見賔客顛毛全好天彜忽以酒灌醉盡髠之醒為號痛而已所著述將及棟天彛盡取焚之恐其刺觸纍己也嘻亦異矣又祭友人云斯文將喪逆天者亡顧我逆天死反得後等語此即其梗化不臣明目張膽指我朝為閏統託吠堯以自文者皆此類也夫吕留良食本朝之粟履本朝之土且身立膠庠深被本朝之恩何得視如仇敵而毫無顧忌曾蜂蟻之不若乎又文集有云人心惡薄日甚即殺運所開聊避睹聞竊恐不免又日記云吳三桂乞撤之語甚有憤悶不平之氣三桂老不足慮其下恐未必安又云滇中於甲寅元日寅時即王位取四寅也今按其時正彼中日食云又云董允瑫出其新作乃平涼頌也豫不看曰先須改題目去首字改頌作嘆又云聞吳三桂死有吳國貴者立清遣人往講割雲貴罷兵又云聞閩亂為范承謨激成承謨亦死於閩又其行狀內云夙興夜寐終日乾乾等語夫普天之下莫非王土率土之濵莫非王臣吕留良於我朝食德服疇以有其身家育其子孫者數十年乃不知大一統之義平日之謂我朝皆任意指名或曰清或曰北或曰燕或曰彼中至於與逆藩吳三桂連書之處亦曰往講若本朝與逆藩為鄰敵者然何其悖亂之甚乎且吳三桂耿精忠乃叛逆之賊人人得而誅之吕留良聞其稱兵犯順則欣然有喜惟恐其不成於本朝疆宇之恢復則悵然若失轉形於嗟嘆於忠臣之殉難則汚以過失且聞其死而快意不顧綱常之倒置惟以助虐迎寇為心不顧生民之塗炭惟以兵連禍結為幸何吕留良處心積慮殘忍凶暴之至此極也且乾乾夕惕易經傳注皆以為人君之事而其子孫公然以加吕留良之身不更肆且妄乎又云永厯帝被執時滿漢皆傾心東宫勒馬前行以鞭梢東指則東邊滿漢兵皆跪西指則西跪弒之日天地晦霾日月失光百里之內凡關壯繆廟皆被雷擊等語查偽永歷朱由榔本竊立於流寇之中在雲貴廣西等處其衆自相攻剽劫奪貽禍民生後兵敗逃竄緬甸順治十八年定西將軍愛星阿等領兵追至緬城先遣人傳諭緬酋令執送朱由榔否則軍臨城下後悔無及大軍隨至城下緬人震懼遂執朱由榔獻軍前殺偽侯王維恭等一百餘人於是全獲朱由榔眷屬以歸此偽永歷之實迹乃中外之人所共知者朱由榔窮蹙無歸為我朝滿漢大兵所共擒獲豈有擒獲寇賊之人轉於伊馬前行跪之理乎其時之漢人兵丁亦恥而不為之事況於滿人乎此等瞽説荒唐鄙謬無中生有不知何自而來也至云關壯繆廟皆被雷擊尤為荒唐之甚朱由榔之死實由上天誅殛而人力豈能強為耶關聖帝君與雷神皆為奉天司令之人何以有凡關廟皆被雷擊之事於理亦甚為不順且本朝用兵以來事事皆仰荷上天眷佑之恩百神呵護之德即如我兵之守永興也士卒不過千人賊以重兵相攻勢甚危急蒙真武之神顯化神兵布滿巖谷狂寇寒心褫魄衆遂潰逃而散此有御製之碑文詳記其事者其克復雲南城也則有金馬飛騰之兆而逆寇即日蕩平此皆見之志乘萬目共觀之事天下所共知者然此不過舉一二事而言其他不可枚舉吕留良獨不聞之乎總之逆賊吕留良於本朝實有徵應之事迹則概為隱匿而不書而專以造作妖誣欲快其私憤伊之妄誕伎倆能逆天乎又文集內云今日之窮為羲皇以來所僅見等語夫明末之時朝廷失政貪虐公行橫征暴斂民不聊生至於流寇肆毒疆埸日蹙每歲糜費數百萬悉皆出於民力乃斯民極窮之時也我朝掃靖寇氛與民休養於是明代之窮民咸有更生之慶吕留良豈毫無耳目而乃喪心昧理顛倒其説轉言今日之民窮乎況逮我聖祖仁皇帝愛育黎元海內殷庶黃童白叟不見兵革蠲租減賦之政史不勝書民何由而窮至為羲皇以來僅見之窮乎試問聖祖仁皇帝六十餘年久道化成休養生息物阜民安內外升平兆民樂業即羲皇以來屈指而數蒙上天之眷佑可以比並我朝之盛者果可多得乎而乃云羲皇以來未有之窮不太甚乎即吕留良懷不逞之心動云萬金結客而其刊刻我朝時文貨賣謀利富仍不資觀其日記所載米鹽瑣碎算及糞壤營營求利之心惟日不足尚得謂之窮乎又日記內云四月末京中起怪風三日其色大紅著人面皆紅又云石門鎮堰橋水忽立二丈許舟中蘆席有飛至南髙橋復還原舟者又云有大星如碗後有細星隨之如彗又云十二月二十九日夜雨甚大霩然大電隨發震雷甚響而長不知明年作何運數耳又云初五日午後日光磨蕩有黑日如鬭狀又云日有三枚日旁有一差小者色白不甚動白日旁又一小者色赤而動甚又云河南郟縣有鳯至百鳥朝會數日有二赤鳥長丈許以身蔽鳯凰身五色陸離鳴如簫韶邑人怪之驅牛壓勝牛俱股栗不前路上死鳥甚衆又有死金色鯉狼藉地上時豫作鳯硯銘云德未嘗衰爾或不來善以道鳴必聖人生而忽聞此又一異也等語凡此毫無影響妄揑怪誕之記載甚多總由其逆意中幸災樂禍但以揑造妄幻惑人觀聽為事其荒誕不經皆不顧也夫災異亦古所時有上天垂象原以警戒人君令其修省進德未有事不實而可為鑒者也若如吕留良之記載一一皆虛天地間未有之事何以示警於將來假令傳諸後世以揑影捕風之語或信為實有之事必以從前太平盛世尚有如此非常竒怪災異倘遇日月星辰水旱之災必輕忽為無關於治亂而漫不經心其所以啓後世人君之怠玩者其罪不可勝數矣又日記云康熙甚吝吳中顧雲珵者寫真甚精供奉內庭不許其遍遊公侯之門一日入朝倉遽用舊服康熙曰此要銀子也薦之一王子送元寶二百兩及縀康熙收之臨行時康熙止豫二十四兩而已等語不但豈有此事而怪誕悖亂何至於此極也吕留良以此誣聖德夫韓昭侯藏敝袴曰欲待有功者史册相傳以為美談今一寫真之人即聖祖仁皇帝不輕加厚賜亦聖祖慎重賞賚之盛德耳而吕留良揑此浮言譏為吝惜財物乎聖祖仁皇帝在位六十一年除水旱賑恤外特恩蠲免錢糧不下數百萬萬此天下臣民所共知豈吝主所能為者吕留良獨無耳目乎忍心害理可謂極矣且吕留良誼屬臣民而漫稱康熙其悖逆無狀何太甚矣即此數條倡狂悖亂已極放言橫逆之罪況其他太甚之詞尤足令人痛心疾首不共戴天夫吕留良生於浙省人文之鄉讀書學問初非曾靜山野窮僻冥頑無知者比且曾靜祗譏及於朕躬而吕留良則上誣聖祖皇考之盛德曾靜之訕謗由於誤聽流言而吕留良則出自胸臆造作妖妄況曾靜謬執中國夷狄之見胸中妄起疑團若不讀吕留良之書不見吕留良之議論蜂起快心滿意亦必有所顧忌而不敢見之文詞是吕留良之罪大惡極誠有較曾靜更為倍甚者也朕向來謂浙省風俗澆漓人懷不逞如汪景祺查嗣庭之流皆以謗訕悖逆自伏其辜皆吕留良之遺害也甚至民間氓庶亦善造言生事如雍正四年內有海寧平湖闔城屠戮之謠比時驚疑相煽逃避流離者有之此皆吕留良一人為之倡導於前是以舉鄉從風而靡也蓋浙省士人等習見吕留良之恣為狂吠坐致盛名兼擁厚資曾無纎芥之患得攖其身是以轉相推服轉相慕效多被愚迷而不知也甚至地方官吏怵其聲勢之囂凌黨徒之衆盛皆須加意周旋優禮矜式以沽重儒之譽如近日總督李衛為大臣中公正剛直之人亦於到任之時循照往例不得不為之贈送祠堂扁額況他人乎此其陷溺人心濁亂世俗害己不可勝言矣數年以來朕因浙省人心風俗之害可憂者甚大早夜籌晝仁育義正備極化導整頓之苦心近始漸為轉移日歸於正若使稍為悠忽不亟加整頓則吕留良之邪説誣民者必致充塞膠固於人心而不可解而天經地義之大間泯沒淪棄幾使人人為無父無君之人矣吕留良之為禍浙省者不知何所底止耶今日天道眧然逆賊惡貫時至令其姦詐隂險盡情敗露則不容不正明其罪以維持世教彰明國法者也且吕留良動以理學自居謂已身上續周程張朱之道統夫周程張朱世之大儒豈有以無父無君為其道以亂臣賊子為其學者乎此其狎侮聖賢之教敗壞士人之心真名教中大罪魁也而庸流下愚不能灼知其心迹行藏乃以一不解天經地義之匪類猶且羣然以道學推之則斯文掃地矣即吕留良自撰之文亦云逆天者亡又曰顧我逆天反得後死明知逆天之罪大而必欲悍然蹈之死而不悔不知古今以來天地間乖戾悍暴之氣何獨鍾於吕留良也朕即位以來實不知吕留良有何著述之事而其惡貫滿盈神人共憤天地不容致有曾靜上書總督嶽鍾琪之舉曲折發露以著吕留良之凶頑而吕留良之子如吕葆中者曾應舉成名蒙恩拔置鼎甲仕列清華其餘子孫多列庠序乃不即燬板焚書以滅其迹且吕葆中既已身叨仕籍而猶世惡相承並未洗心滌慮前此一念和尚謀叛之案黨羽連及吕葆中其時逆迹早已彰著蒙我聖祖皇帝如天之仁免其究問而吕葆中遂憂懼以死就常情而論吕葆中之兄弟子孫遇如此驚危險禍且荷蒙聖祖皇帝如此高厚洪恩自當感激悔悟共思掩覆前非以為幸逃誅殛之計豈料冥頑悍驁習與性成仍復抱守遺編深藏笥篋此固吕留良以逆亂為其家傳故吕葆中等逆豎昏愚罔知警惕而實乃天道昭然不容少昧如有鬼神驅遣使逆賊之隂謀徹底呈現於今日逆賊之貽毒不致漏網於天誅也前此曾靜逆書朕所以一一剖白者緣朕即位以來深知外間逆黨甚衆自然布散訛言惑亂人之心志其所詆惟朕之一身者朕可以己意自為判定歸結若如吕留良之罪大惡極獲罪於聖祖在天之靈者至深且重即凡天下庸夫孺子稍有一線天良之人知此亦無不切齒而豎髮不欲與之戴履天地此亦凡為臣子者情理之所必然兹特降諭旨將諸條略為宣示其逆賊吕留良及其子孫嫡親弟兄子姪應照何律治罪之處著九卿翰詹科道會議直省督撫提督兩司秉公各抒己見詳核定議具奏特諭雍正七年八月十八日欽奉上諭前據浙江署督性桂署撫蔡仕􅘎等奏進湖州居民王文隆家萬蠶同織瑞繭一幅長五尺八寸寬二尺三寸父老皆稱為從來未有之事朕恐小民圖利望恩或用人力造作而成亦未可知令性桂等詳細體訪務令確實勿為所欺昨性桂蔡仕􅘎等於本地詳加驗看訪察實係自然成就並不由於人工具摺覆奏前來廷臣等以蠶桑織絍乃衣被之大原養民之切務今浙省有此瑞應則小民溫暖可期咸為國家稱慶奏請宣付史館昭示萬世朕素不言祥瑞數年以來每遇休徵必倍加乾惕警戒所頒諭旨至冉至三想中外臣民共知之矣朕愛育元元務期普天率土之人同霑實惠一時希有之物不足以禦飢寒倘蒙上天俯鑒悃誠錫福黎庶蠶桑普盛衣食充盈乃朕心之所謂祥瑞也朕命卿等觀看理應具奏然宣付史館之處可不必行欽此雍正七年八月二十三日欽奉上諭朕惟古聖人之制祭祀也凡山川嶽瀆之神有功德於生民能為之禦災捍患者皆載在祀典蓋所以薦歆昭格崇德報功而并以動斯人敬畏祗肅之心使之毋敢慢易而為非也雍正二年浙江海塘潮水沖決朕特發帑金命大臣察勘修築并念居民平日不知敬畏明神多有褻慢切諭以虔誠修省之道令地方官家喻户曉警覺衆庶比年以來塘工完整災沴不作居民安業已默叨神佑矣今年潮汛盛長幾至泛溢官民震恐幸而水勢漸退隄防無恙此皆神明默垂護佑惠我蒸民者也兹特發內帑十萬兩於海寧縣地方敕建海神之廟以崇報享著該督遴委賢員度地鳩工敬謹修建務期制度恢宏規模壯麗崇奉祀事用答明神庇民禦患之休烈且令逺近人民奔走瞻仰興起感動庶莫不盡消其慢易之私而益振其恪恭之志相與服教畏神遷善改過永荷庥祥則於國家事神治人之道庶有賴焉其一應事宜著該督等詳悉定議具奏特諭雍正八年正月十二日欽奉上諭爾等議政處原議乍浦地方駐劄滿洲兵一千六百名此內挑選杭州餘丁八百名江寧餘丁四百名京城餘丁四百名令其披甲前往駐劄朕近詢問將軍鄂密達據稱江寧餘丁披甲者可得八百名等語今京城不必揀發四百名即於江寧餘丁內著鄂密達酌量挑選八百名令其披甲前往乍浦駐劄乍浦地方創設駐劄兵丁則補放管轄官員事殊緊要補放之員務將年富力強黽勉任事者揀選補授交與將軍鄂密達著於江寧應補人員內揀補現任官員內應行調補者揀選調補如江寧應補之員不能足數於杭州應補人員揀選補授現任官員內揀選調補之處著將軍鄂密達與將軍阿里衮互商派委此兩處補授員缺著各該將軍題補倘兩處不能足數著將數目開明報部該部請旨具奏再由京城揀選人員補授發往此駐防之官兵移居起程著交與江南總督范時繹浙江總督李衛公同商議料理起身欽此雍正八年六月初七日欽奉上諭周書洪範言人身五事若有得失在天之休徵咎徵即各以其類應之此即朕每日所諭天人感應之理捷於影響者也夫所謂修人事以感召天和者必須君民上下各盡其道各殫其誠以為昭事上天之本若人君有朝乾夕惕之心而大臣官員不能宣化或君臣有移風易俗之念而民情士習不能革薄從忠此則偏而不全不克成會極歸極之盛而欲冀上天俯垂默佑普錫繁禧也豈不難乎其理如此確乎不易數年以來朕已諭之詳矣是以為君而存推諉於官民之心者非賢君也為臣為民而存推諉於君上之心者非良有司良百姓也惟當各盡其道以待天恩近見直省各處奏報雨澤頗覺均調麥秋亦屬豐稔朕心稍慰但聞江浙雨水稍多田禾間有潦溢之患朕悉心推求其故想因今年春夏之交京師雨澤愆期朕為畿輔祈禱並憂慮及於江浙地方已而京師得雨而朕心則專為江浙祈求至南方多雨情形朕未曾聞知但以少雨為懼所以朕屢諭外省大臣凡覺有水旱之機即當速奏朕知之者正為此也南方既已多雨而朕心仍復祈求或因此一念以致上天賜雨過多浙省有潦溢之處乎又考之洪範曰狂恆雨若浙省素稱人文華盛之區今年會試朕加恩取中至七十名既因中式人多是以殿試之時才更優於他省一甲三人悉登浙士或者士子之心不免驕矜之氣如洪範之所謂狂者至於恆雨之徵此朕就目前之天象人事而推測之有不能無疑者朕每遇雨暘不時即撫躬自省不敢玩忽況古聖人之垂訓千古為昭所賴浙之多士遇登進之榮即凜盛滿之戒見示警之象益深敬畏之心必能仰邀天眷於方來矣特諭雍正八年七月初四日欽奉上諭據浙江總督李衛奏稱乍浦新立水師兵丁所領錢糧已蒙恩諭照天津例每月加賞五錢衆兵莫不感戴歡呼但以兵丁內有緑旗兵四百名雖屬水師同營而滿漢攸分前項蒙恩賞賜生息銀兩未敢派令均霑隨將恩賞加給餉銀應否一體支領之處移查天津都統據天津覆文內稱彼處舵工水手等人皆係雇募在營支取工食非係食糧兵丁不曾加增等語是以浙省現在亦仍照舊額支餉未敢添給但查此項兵丁俱係熟於水務之人身既逺離鄉井或挈家而來或分住兩地皆須養贍家口之資其中如捕盜舵工阿班斗碇繚手等人皆自幼練習方能精熟將來滿兵即於水務極嫺而若輩仍須留用是其勤勞艱難之情非别營水師可比臣與將軍阿里衮副都統富森密商無異可否仰請聖恩將每月加銀五錢之處一體支領并將恩賞生息銀兩亦量為分派謹此請旨等語朕覽李衛所奏甚是緑旗兵丁既派滿營教習操練自應與滿洲兵丁一體加恩況其中捕盜舵工等人尤為效力勤勞應當體恤著照李衛所請每月一體加賞餉銀五錢其所頒生息銀兩亦酌量分派俾得同霑恩賜特諭雍正九年十一月二十八日欽奉上諭據浙江總督李衛奏稱嘉興府屬七縣並杭屬之海寧一縣於九月初旬正當禾苖秀實之時忽有細蟲生於苖腹以致禾穗黃萎通邑計之此有彼無此多彼少尚不至於成災但已將收穫之時未免少減分數而所收之米青白不一且有米粒細小者僅可食用難以完漕仰懇皇恩將嘉興等縣今歲應完漕米改為折徵或照雍正元年四年恩旨每石折銀一兩或照雍正五年部定每石折銀一兩二錢之例出自聖恩等語朕思數年以來杭嘉湖三府百姓於額徵錢糧急公輸納無有逋欠甚屬可嘉今兹數處小有蟲災米粒稍碎不能完漕應令減價折收以示體恤著照雍正元年之例每石以一兩折徵解部欽此雍正十一年十月十四日欽奉上諭杭嘉湖三府上年偶被蟲水年成歉收朕特沛恩施將應完漕米分年帶徵發帑賑恤黎民已不致失所惟是本地所産米石每不敷本地食用現今年歲雖獲豐收而上年借糶倉穀恐一時未能買補足數明嵗青黃不接時尚須米石酌撥平糶以濟民食不可不預為籌備著將杭嘉二府屬本年額徵漕米各截留五萬石存貯備用再歸安烏程二縣聞今歲收成稍歉所産米糧尤應留為本地之用著將兩縣本年分應徵漕米一十八萬餘石並帶徵雍正十年分漕米七千六百餘石一併照部定折價改徵銀兩解部著該督程元章嚴飭地方官實力奉行毋得縱令胥役人等額外需索以仰副朕加惠黎民至意特諭雍正十三年正月初二日欽奉上諭朕聞浙江海塘工程現在修理尖山已堵築三分之一人心甚是踴躍但尖山夫役每日給工銀三分六釐稍覺不足今當初春之月水淺潮平正趲築工程之候著照引河挑夫之例每日加銀一分四釐共足五分之數又聞從前採運石塊每方給銀八錢九分四釐六毫今運送多資人力每方增銀六分俾夫役等工食寬裕努力修築早告成功以慰朕念欽此雍正十三年四月初八日欽奉上諭據浙江巡撫程元章奏稱向因杭州漢軍四旗壯丁生齒繁衍於雍正十一年間倣照閩省之例挑選餘丁三百名撥歸督撫標下頂補緑旗名糧臣查浙省向無督標只有撫標兩營共額兵七百餘名內除隨糧公糧外實在兵丁僅止六百餘名非若閩省督撫兩標兵丁數千名可比杭城省會重地城守營兵原少而撫標辨兵亦一體派差凡巡緝私鹽查拏盜賊等事在在需兵差遣而新補旗兵例不派撥則標兵應付差使實有不敷況撫標兵數無多每年出缺有限計算一年有餘僅頂補四十餘名約略餘丁三百名非歷十年之久不能補足不但經年守候抑且先後不均且緑旗亦有餘丁無頂補之缺未免向隅等語查雍正七年朕曾降旨當日各省設立漢軍駐防因人數不敷是以添設緑旗兵丁令該將軍管轄今漢軍餘丁繁衍足供差操之用嗣後將軍標下緑旗兵丁缺出即將漢軍餘丁頂補如緑旗兵丁之子弟內有祖父食糧年久者於本省督撫等標營名糧準其充補此朕再三籌畫辦理者蓋以當年漢軍人數不足是以添設緑旗兵丁今漢軍餘丁日多仍令充補本將軍標下緑旗之缺於情理實為允當著照閩省之例以將軍所轄漢軍餘丁充補將軍所轄緑旗兵丁之缺從前閩省辦理未協況浙江撫標額兵本少豈可又分三百餘名令漢軍充補若果漢軍餘丁繁多當另思所以安頓之法著將閩省從前頂補緑旗之漢軍撤回俟本標缺出頂補其缺仍給還緑旗浙省亦著撤回頂補甲兵特諭雍正十三年七月初十日欽奉上諭浙閩江西等省有棚民之州縣朕皆留心揀發牧令前往俾司化導董率之任蓋此等無業民人聚散無常往來莫定其間良頑不一易於藏姦若稽察稍疏必至漸為閭閻之擾向聞棚民留住之地方皆責成本處地主山主出具甘結並非來歷不明之輩始許容留而牧令官員於每年歲底親往查點一次倘有作姦犯科而地主山主不行舉首者一體治罪此向例也今聞法久廢弛有司等視查點為具文而地主山主亦以保結為虛應故事大非朕除暴安民教民成俗之本意著該督撫等轉飭有司實力奉行毋或怠惰倘有不遵即行題參從重議處若督撫失於覺察經朕訪聞亦必加以嚴譴特諭雍正十三年七月十一日欽奉上諭前聞浙省海塘於本年六月初二日風潮偶作衝決之處甚多朕心甚為軫念已降旨詢問情由並令速行搶修以防秋汛今朕訪聞得今歲風潮不過風大水湧並非昔年海嘯可比且為時不久未有連日震撼衝汕情形若平日隨時補苴防護謹密自不致潰決如此之多總因數年來經理官員將舊日工程視同膜外並不隨時修補且將原題準其在於歲修案內報銷之工不許修築以致根腳空虛處處危險不能捍禦風浪又海防兵備道乃特設專司之員責任綦重從前隆升程元章等請將同知成貴題補朕因其平日不曾經歷河工誠恐未必勝任且升用太驟是以姑令署理試看今聞伊於工程並未諳練兼之患瘧經年不能辦事東塘同知張偉為人軟弱安坐海寧西塘同知李飛鯤存心狡猾日在省城奔競俱非實心任事之員而隆升與程元章等意見又不相合汪漋張坦麟但知隨聲附和不顧國家公事前因虐使民夫尅減工料經朕降旨申飭略知收斂然石萬斤尚折減六七折不等欲符原估六萬兩之數一任宕匠包賠逃亡誤工平時人事廢弛若此何以抵禦狂瀾況朕不惜數百萬帑金冀以保全一方民生而各官懷挾私意不知為國為民宜乎上天垂象以示警也兵備道係緊要之員今成貴患病溺職如此隆升程元章汪漋張坦麟總理協辦所司何事郝玉麟既在浙江豈無見聞何以俱不題參著伊明白回奏兵備道員缺即著伊等在於知府中揀選題委目今秋汛正大搶修保護最為急務一切事宜俱交與隆升程元章汪漋張坦麟等悉心料理倘仍蹈前轍再有疏虞致傷田廬民命必將伊等從重治罪不稍寬貸郝玉麟既不據實奏聞亦不能置身事外至於雇募人夫采辦物料務須公平給值聽從民便俾閭閻踴躍從事不得涉於勉強或繩以官法刑驅勢迫擾纍地方致辜朕愛養民生之至意特諭雍正十三年七月十五日欽奉上諭浙江海塘工程原在平日隨時補苴防護謹密始可禦猝然之風浪乃近年以來經理官員將舊日工程以為非己身經手者視同膜外不加修補以致今年六月初二日風大水湧遂潰決塘工如此之多此朕訪聞最確者朕為浙省海塘宵旰焦勞無時或釋且不惜多費帑金登斯民於袵席年來所降諭旨不下數十百次矣隆升程元章汪漋張坦麟皆朕特簡之大員委以防川之重任且訓諭諄諄望其實力奉行勉以和衷共濟豈料伊等私心蔽錮意見參差但分彼此之形全無公忠之念安有身在地方目覩隄岸空虛而不督率屬員先事預防急為修補者隆升程元章汪漋張坦麟俱著交部嚴察議奏目今江南塘工告竣王柔著補授浙江海防兵備道速赴新任欽此雍正十三年七月十九日內閣奉上諭浙江海塘工程關係民生最為緊要朕宵旰焦勞不惜多費帑金為億萬生靈謀久逺乂安之計所以告誡在事臣工者已至再至三矣不料經理諸臣各懷私意彼此參差以致乖戾之氣上干天和有今年六月風浪潰隄之事今雖勉力搶修尚不知能捍禦秋潮否至於建築石塘工程浩大若諸臣陋習不改仍似從前則大工何所倚賴朕再四思維大學士朱軾廉慎持躬昔曾巡撫浙江諳練塘工今雖年逾七旬精神不逮而董率指示似尚能為朕以此詢問之伊自稱情願效力著由水路乘船前往令該部給與水程勘合並令沿途撥兵護送伊子朱必階著隨伊父去朱軾到浙之日稽查指授總理大綱至一切工程事務仍著隆升程元章汪漋張坦麟等照前辦理俱聽朱軾節制若大臣中有懷私齟齬者著朱軾據實參奏朕必嚴加處分若文武官員有營私作弊或怠玩因循者朱軾即行糾參從重治罪朱軾未到之先所有應辦工程物料著隆升程元章等上緊辦理毋得藉口等候欽差徘徊觀望以致稽遲欽此雍正十三年七月二十一日欽奉上諭浙江鹽務漸不如前若不留心整頓必致廢弛難理程元章力量僅能勉強辦理巡撫事務不能兼理鹽政浙江布政使張若震年力精壯實心任事從前在鹽道任內曾經諳練其辦理亦屬妥協著伊兼管鹽政凡地方文武官辨有關涉鹽務者準其舉劾若有作弊掣肘者即著糾參欽此今上皇帝雍正十三年十月二十五日工部奉上諭浙江修理海塘工程該督郝玉麟等奏請增添捐納條欵經九卿會議準行朕思捐納一事原為一時權宜無益於吏治並無益於國帑朕知之甚悉浙省增捐之處不必行海塘工程著動正項錢糧辦理欽此雍正十三年十二月初八日總理事務王大臣奉上諭朕前降旨該部令傳諭江南督臣將雍正十二年以前兩淮場課舊欠查明奏聞蠲免今朕聞兩浙山東福建廣東諸處各有舊欠場課鹽折銀兩事同一體宜並施恩著該部傳諭各該督撫查明奏聞一併豁免欽此雍正十三年十二月二十一日總理事務王大臣奉上諭隆升剛愎自用怙過不悛若仍留浙江於塘工無益著解任來京其副都統織造二缺候朕另降諭旨程元章身為巡撫不能和衷共濟乃懷挾私心貽誤公事亦不應留於浙省著解任來京其巡撫印務即著大學士嵇曾筠兼管俾地方管轄與海塘工程歸併一手自無掣肘牽制之患張坦麟汪漋俱照司道例聽嵇曾筠節制委用隆升所管關稅事務著嵇曾筠委員暫行管理嵇曾筠摺內所參驍騎校常祿巡檢黃國標蔣文暹通判葉齊俱著革職黃國標蔣文暹葉齊仍著留工效力倘怠忽貽誤著嵇曾筠即行嚴參治罪江南總督趙宏恩駐劄江寧難以兼管河務江南總河員缺著高斌補授其管理兩淮鹽政候朕另降諭旨欽此浙江通志卷首二欽定四庫全書浙江通志卷首三聖製文聖祖仁皇帝南巡詩序朕念切民依咨詢幽隱於二十八年春再舉南巡爰自畿甸東臨齊魯沿泝江淮達於吳越曩者甲子之歲輿衛所經瞻顧閭閻觀省謠俗憫懷澤國軫恤羣黎未嘗一日忘於朕心已嘗形諸篇詠載前集中今兹重歷郡邑見民物漸殷生業就理逺勝曩時中心慰悅又不禁吟詠及之途中停警撤蹕欲以洞悉輿情數千里間百姓歡躍載路星攢雲集瞻依愛戴發於至誠朕自惟化理何以克洽民情益用是欿然也乃於巡歷所至沛膏澤飭官方戒民俗修典禮經武備覽河防施諸事矣又發諸言或御帳殿或撫船窗吟詠所及性情在焉古人云詩言志凡朕篇章所寓時以民生風化惓惓為念即間於眺覽之餘抒寫景物指顧河山要其寄託則自有在也因裒而集之為南巡詩一卷云禹陵頌有序朕閲視河淮省方浙地會稽在望爰渡錢塘展拜大禹廟瞻眺久之敕有司歲加修葺春秋涖祼粢盛牲醴必豐必虔以志崇報之意時康熙二十八年二月十五日也緬維大禹接二帝之心傳開三代之治運昏墊既平教稼明倫由是而起其有功於後世不淺豈特當時利賴哉朕自御宇以來軫懷飢渴留意河防講求疏濬漸見底績周行山澤益仰前徽爰作頌曰下民其咨聖人乃生危微精一允執相承克勤克儉不伐不矜隨山刊木地平天成九州始辨萬世永寧六府三事政教修明會稽巨鎮五嶽嫓靈兹惟其藏陵谷式經百神守護松柏鬱貞仰止髙山時切景行南巡詩序朕三度南巡咸因視河親為籌畫遂至江浙察吏安民所厯之地隨其時宜廣沛膏澤極疾苦焉兹行兼奉皇太后鑾輿而南既可無闕定省之儀且欲見先帝開基富有四海而朕守成教育率土清寧無慚付託以博慈顔之懌悅然往返遄迅絶無滯留百司章奏三日一送行在即與剖決舟行多暇仍覽書史日撡觚翰偶寄吟篇莫非記採風俗時存懷保兢業之意後之人讀朕前後南巡諸詩知朕心之有在云爾補陀邏迦山普濟寺碑記稽考梵書補陀邏迦山有三一居厄納忒里一居忒白忒一居南海即是山也本山志書未得其詳當年海寇猖狂凡禁海之外寺宇梵剎皆為灰燼自康熙二十二年蕩平臺灣海波永息故遊方衲子因舊基址斬蓬蒿刈黎藿而更新焉朕時巡浙西特遣專官虔修淨供敬書題額永鎮山門復發帑金重修寺宇務俾殿堂廡牖丹碧華曅棼橑煥美而一木一石悉出公家一夫一役不煩民力上為慈闈延禧下為蒼生錫祉也朕自幼齡誦經讀史以修齊治平為本未暇覽金經貝葉空寂泡影之文所以不能窺其堂奧而言之元者善之長也佛者以善為本推而擴之大約無二上天好生化育萬彚大士慈悲度盡衆生亦無二也朕求治勤民四十餘載矣今者兵革已銷而民生未臻康阜梗頑雖化而民情未盡淳良皆由水旱靡常豐歉各異此朕寤寐孳孳不能釋也以大士之力庶幾慈雲法雨甘露祥風使歲稔人安萬姓仁夀則普濟之𢎞功即時雍之上理是朕之心也夫爰書翰簡勒諸穹碑垂示無盡云康熙四十三年歲次甲申嘉平上旬南海補陀法雨寺碑文蓋聞圓通妙象般若真源開覺路於金繩大地證菩提之慧聞潮音於碧海恆沙誦普度之聲紺殿維新滄波永靜惟兹法雨寺者南海補陀山大士之别院也名山佛國大海慈航青嶂干霄高逼梵天之上洪濤浴日祥開淨土之場一柱如擎震旦指為名勝三山可接方輿記其神竒值氛祲之震驚致山川之閴寂僧徒雲散佛宇灰飛比者運值清寧慶海波之不作地連溟渤望法界而知歸特頒內府之金重建空王之宅鳩工揆日蔀屋不勞庀材築基鼛鼓弗作珠宫貝闕涵聖水以無邊鼇柱鼉梁覺迷津之可渡坐青蓮之寶像圓滿輪輝藝紫竹於祇林莊嚴毫相瞻慈雲之普照錫法雨之嘉名海若效靈天吳護法標霞髙建來萬國之梯航彼岸可登作十方之津筏藉其廣大上以祝聖母之遐齡假此慈悲下以錫羣黎之多福則旃檀香外盡成仁夀之區水月光中悉是涵濡之澤勒諸琬琰昭示來兹康熙四十三年十二月重修天竺寺碑文朕御厯凝庥心周區域省方設教駐蹕湖山眷兹民力於東南詎止皇輿之名勝若乃因其舊迹無侈前觀則天竺寺之所由以重修也粵惟鷲嶺著於西方法輪則一竺峰麗於南國名剎維三固緇梵所薰修亦仙靈之窟宅潮音送響遙接普陀塔影橫空長留舍利瑞光發於澗上竒木像大士之容白衣感夫夢中淨域建看經之院或旱乾間作禾黍告枯而幡蓋來迎霔雨濡足有禱輒應無福不臻斯固歷晉宋以迄今實亦載簡編而可信意者能仁之量等於好生佛道之成關乎民隱推斯指也不其偉歟將使般若之門隨方而啓仁夀之域舉世咸登有其興矣曷可廢哉朕曩者親奉慈闈式臨兹宇自芳湖而西顧望初地以南循輦過花迎旌回雲捲巖深乳竇含真珠之寶光峰轉飛來帶琉璃之紺色百靈斯護七聖不迷既祝我皇太后夀履康寧復冀凡兹庶民室家盈慶然則迦釋之𢎞慈與國家之布德豈有殊也顧山靈如昔寺貌未新皇太后為國發心為民祈福時申慈命重葺香林兹役之興不妨民事凌雲再煥將無乾竺之靈匪日成功實篤坤元之慶恆沙國土偕常樂以同升億萬蒼生享太平而無極是則我皇太后之聖心依然迦釋之心而於朕經營天下利濟生民之心亦適有愜也夫重修淨慈寺碑文蓋聞寶界三千咸歸淨業珍臺八萬同證慈航施布地之銀衣國名舍衛供彌天之珠樹園號祇洹自靈鷲西來至玉函南渡層軒飛閣起鹿苑於湖山芝蓋花幡記伽藍於崖谷皆為選佛之場實是棲真之室杭州淨慈寺者周顯德中締構也宿尊入夢殿闢永明白足藏書堂開宗鏡擔經錫杖卓石上之奔泉皈法金魚伏亭前之寒井南屏山色螺翠千盤北岸波光琉璃百頃高柯映户時來獻果之猿修竹參霄常見銜花之鳥數經營於越角已厯多年論景致於浙江信稱勝地乃者僧人不戒難返風輪遂爾象教延災適遭火劫禪基未續道迹將湮朕周覽餘杭巡行南國惜兹善果結此福因命集工徒重葺院宇蘭楣桂棟出炎網而煥金繩藻棁雕題化崑岡而為玉闕巍峩琳殿偕蓮座以俱新璀璨瑤幢對雷峰而並立飄孤山之香雪居然花散維摩舞方丈之長松依舊風清羅漢龍天護法鬱東嶺之煙霞獅象宣音應西興之鐘鼓蛟藏江浦再聽梵音鴿下晴空還看瓶剎智燈回照顯色相於已傾慧日高懸鎮檀林而永固俾下域顧瞻淨土時懷常淨之心願羣生感化慈緣悉發大慈之隱用摛紫翰述壯麗之規模爰勒青珉標建修之歲月康熙四十九年十一月穀旦詩聖祖仁皇帝巡幸杭州東南上郡古臨安親採風謠一省觀翠岫巃嵸猶舞鳯羽旗簡約不鳴鑾春暉草木江山麗户滿絃歌雨露寬德化逺敷吾未信如何夾路萬聲歡吳山左控長江右控湖萬家煙火滿康衢偶來絶頂憑虛望似向雲霄展畫圖泛舟西湖一片湖光瀲灧開峰巒三面送青來輕舟掉去波添影曲岸移時路却回春色初搖隄上栁惠風正發寺邊梅此行不是探名勝欲使陽和遍九垓西溪十里清溪曲修篁入望森暖催梅信早水落草痕深俗藉漁為業園饒筍作林民風愛淳朴不厭一登臨題西溪山莊以竹窗二字書賜髙士竒花源路幾重柴桑皆沃土煙翠竹窗幽雪香梅苔古過桃花嶺至玉泉寺度嶺穿雲路始平停鑣聊憩小池清遊魚自有悠然意豈識乾坤造化宏湖心亭水上起樓臺湖面平如鏡春風吹栁條逺與山光映渡錢塘江雪後春煙漠漠浮揚舲擊楫向中流江通潮汐分吳地路入溪山隱越州振武戈矛皆駐馬憶用武時大兵屯駐江干省方斿葆此乘舟風帆沙鳥看何限逺地雲霞望裏收山隂灌木叢篁傍水幽淡煙晴日漾芳洲蘭橈搖過山隂道在昔人傳鏡裏遊登卧龍山越望亭周覽山川歷井疆越峰突兀見青蒼爭流萬壑通城郭一一看來在下方雲棲竹樹甚茂幽蘭滿山山徑紆徐合溪聲到處聞竹深雲戛日木古勢干雲倚檻聽啼鳥攀崖採異芬韶華春已半萬物各欣欣虎跑泉并序西湖自昔畫舫笙歌之地朕兹行志本省方止一覽其山川風土未曾片刻停驂尚食但飲虎跑泉水一勺耳松林帶餘雪空山啼百舌石溜響涓涓寒泉自清潔靈隱寺靈山結幽秀鷲嶺起嵯峩梵宇盤空出香雲繞地多開襟對層碧下馬撫煙蘿羽衛間來往非同問法過飛來峰巖岫崚嶒洞壑竒懸藤古木半迷離冷泉亭子清溪上誰識源頭混混時諭浙省將吏軍民并序朕自武林回鑾百姓擁道固請暫留慰諭遣之因詔諸將吏務在調劑兵民共相輯睦息訟弭爭務本崇儉毋失末業以滋遊惰并賦斯篇省方浙西東山川極遐矚兹晨當回鑾諄諄一相勗軍民貴安和文武須聨屬息忿可無爭守分在忍辱日使訟庭間愚民免械梏奢侈尤當懲繁華莫恣欲儉乃保其富素履各敦篤惟令教化興益見閭閻足諸吏宜勉之期歸淳朴俗閲河之便奉皇太后臨幸武林是日喜晴雄城千雉帶江湖羽衛重臨氣象殊九有承歡逢勝日萬民擁戴滿亨衢時當豐歲人咸樂海不揚波澤逺濡况是春陽布暄暖無邊韶景溢輿區雲栖寺江路轉隈隩山行愜心賞古樹與茂竹翳蔽極深廣潺潺細泉流萋萋芳草長其際春之暮天氣堪俯仰鳥性鳴晴曦蜂蝶爭下上巡省歷窮谷所至察萬象小憩澗壑幽澤貴被草莽西湖湖光開瀲灧臨幸及芳時淺翠堆山色輕香拂水湄彩斿看自動畫鷁覺平移靜坐觀羣類資生得所宜湖心亭間覽虛牖層闌挹翠微春容淡沱送晴暉澄波如鏡涵天影魚鳥欣欣自息機宋臣蘇軾開湖溉田築隄瀦水杭民利之為政者不當如是乎長隄十里跨湖波官柳青青覆軟莎漫道只為遊賞地懸知布政在民和鷲峰何處飛來一塊石嵌空巖竇作玲瓏下臨巨澗淙淙冷上蔭長松謖謖風雲林寺無為幾事少問俗駐林邱衛騎森嚴減爐煙靉靆浮鳥啼香界古花綴梵筵幽野徑春風引輕鋪細草柔菜畦東南農事已春深菜隴花開滿地金獨愛小民勤力作馬頭堪慰省方心行宫雨中望吳山檻外青山縱目收繁花初落葉新稠更教點染煙雲色添得窗前翠欲流閲浙江駐防將士射羽林舊將分防重吳越名區古要疆講武正宜清晏日人人自擅技穿楊示江南浙江守土諸臣宇宙方清寧吏治尚端廉農使樂耕鑿民使適閭閻大寮總其要小吏毋苛纎紀綱不可弛隨時酌寬嚴為上能自愛羣屬必畏鉗訟惟善得情操守時警砭勿恃才妄作勿以媚自忺務令比户豐膏澤逺近霑朱轓與彤騶萬姓所具瞻臧否道有碑防口難可箝不見廣厦材聳幹從幽潛不見沖霄鶴飲啄本靜恬告誡示勉勗保護兹庶黔再過鷲峰愛此清幽一徑深馬隨泉響入雲林蒼苔古洞何年鑿脈脈韶光自賞心登吳山重經層巘暫停鑾天日晴和覽眺寬城市萬家煙火近念兹莫遣有飢寒望錢塘江江流幾折勢灣環指點遙岑是越山南朔東西無一事春風浩蕩奉慈顔虎跑泉靈泉湧地寒侵骨勝迹名髙著虎跑似恐被人頻汲取一泓清迥出山坳由淨慈寺經南屏諸山紆曲南屏路欣隨步輦來皇時奉觀覽太后鳥飛驚玉仗花落點經臺邃閣聞松籟疏籬迸竹胎雙峰髙不極更在白雲隈孤山放鶴亭處士人何在山前夕照來亭空不見鶴磴石尚留梅楊栁縈煙嫩棠梨過雨開今朝間繫艇還自愛賢才玉泉有五色魚賜名清漣寺錦鱗遊泳漾池紋隱藻穿蘋暗作羣濠濮會心原不逺清漣題額與傳聞西湖再作面面山容淡盈盈水態清流文瀠傑閣波影蕩髙城燕舞知迎棹花低解避旌乘春𢎞沛澤隨地稔民情浙省道上書懷遍野農桑繞翠旌畦邊童叟帶雲耕江山盡是升平日寸晷難忘終始情桑林乍緑蠶事方興詩以嘉之彌望桑林吐葉垂枝嫩碧初勻竹舍正殷蠶務天工雨露維均曉發嘉興數里城依水千門路向田菜塍無近逺桑岸互綿連土沃勤為最年豐儉欲先雲開林野秀初日上行旃過雲栖憩竹林下令人劚筍劚蘭尋春二月幸雲栖滿目天光入品題密林布蔭樵漁樂幽柏成行蕙芷齊浴手臨泉開籜筍傍巖倚石選蓬藜餘杭風景西湖勝未若山中待竹迷雲栖歸途遇雨錢江風雨促前旌竹樹繽紛細草明夾岸黎元瞻拜切頻施膏澤愜民情錢塘江潮相傳氷岸雪崖勢滚滚掀翻擁怒濤風靜不聞千里浪三臨越地識江臯西湖夜月月照清漣靜不波鸞簫象管夜來多輕舟豈羡江湖勝欲寫無私屬棹歌岸側桑葉初碧夾岸青青繞御舟濃桑初茁滿村謳省方遍問蠶家苦春雨連綿盡日憂癸未春二月二十日自杭回至蘇州是夜雨二十一日朕欲北行地方大小官員百姓留住二十二日雨甚再留不能起行二十三日雨晴又欲留書懷以示躊躇星夜兩河工又至吳鄉泊趠風春雨姑蘇留豹尾黎情江浙戀青驄翠華景從無停蓋遍覆時巡有折衷不意龍蟠虎踞勝豈因景物雜謙沖巡省江浙見閭閻有起色示諸臣省刑愛民巡方不用駕樓船白舫蘭橈問市廛和氣成春知歲稔清風布物愛時妍齊民但示蒲鞭辱報國應同竹節堅莫恃才名輕庶政冥冥中自有青天駐蹕杭州府越境湖山秀文風天地成南臨控禹穴西枕俯蓬瀛容與雙峰近徘徊數句盈民心多愛戴少慰始終情西湖遇雨雨洗催花葉滿林柴門曉色靜沈沈微飄栁絮春光晚輕縠徐紋見水心西湖戲作晴雨分山色臨流啓壯觀樓臺橫水面梵塔插雲端忽訝松間竹當誇巖下蘭風光被草木無處不成歡幸雲栖二首鳥道沿江問信潮石頭恬靜有歸橈轉移至險看洄洑盡得人防莫失調其二竹徑因依長緑苔桑田菜麥碧巖隈此來也為佳山水又恐遲行畏景催蠲江浙積欠賜撫臣張鵬翮國家財賦東南重已責蠲租志念殷雨澤何妨頻見渥普天願與樂耕耘初八日行宫題康熙四十四年四月歲月流光五十春兩江風景一時新蟠桃果熟春光好海屋添籌麗日明幸有百寮分節治噓嗟涼德際升平年豐物阜民安樂何必燕京是帝京文世宗憲皇帝浙江海神廟碑文國家虔修祀典以承上下神祗嶽瀆海鎮之神秩祀惟謹視前代為加隆朕臨御以來夙夜以敬天勤民為念明神之受職於天而功德被於生民者昭格薦歆敬禮尤至其為民禦大災捍大患合於祭法所載則尊崇廟貌以昭德報功蓋所以遂斯民瞻仰之願而動其敬畏祗肅之心使無敢慢易為非以得永荷明神之嘉貺意至逺也皇輿東南際大海而浙江海寧居瀕海之衝龕山赭山列峙其南颶風怒濤潮汐震蕩縣治去海不數百步資石塘以為捍蔽雍正二年潮湧隄潰有司以聞朕立遣大臣察視修築且念小民居恆罔知敬畏慢神褻天召災有自爰切諭以修省感應之道命所司家喻户曉警覺衆庶比年以來徼明神庥佑塘工完固長瀾不驚民樂其生閭井蕃息越七年秋汛盛長幾至泛溢吏民震恐已而風息波恬隄防無恙逺近歡呼相慶謂惟大海之神昭靈默佑惠我蒸黎以克濟此朕惟滄海含納百川際天無極功用盛大神實司之海寧為海壖劇邑障衛吳越諸大郡海潮內溢則昏墊斥鹵咸有可虞神之禦患捍災莫此為大特發內帑金十萬兩敕督臣李衛度地鳩工建立海神之廟以崇報享經始於雍正八年春三月洎雍正九年冬十有一月告成門廡整秩殿宇深嚴丹艧輝煌宏壯巨麗時展明禋典禮斯稱爰允督臣之請勒文穹碑垂示久逺俾斯民欣悚瞻誦共喻朕欽崇天道祇迓神庥懷保兆民之至意相與嚮道遷善服教畏神則神明之日監在兹顧答歆饗其炳靈協順保護羣生奠安疆宇與造物相為終始有永勿替朕實嘉賴焉雍正十年六月初一日普陀普濟寺碑文普陀洛伽山為觀音大士示現之地歷徵靈應自梁貞明中始立佛宇宋元以來代有修葺我皇考聖祖仁皇帝巡幸浙西遣官興建殿宇上為皇太后祝禧御題賜額勒文豐碑以紀其事山靈擁護聖迹丕昭朕纘紹鴻基於兹十載念兹山為古聖道場瑞像神光靈異顯著重以聖祖皇帝宸翰留貽尤宜敬謹崇奉爰特發帑金重加修飾著官往董其役經始於雍正九年九月越雍正十一年六月工成朕惟天下名山大川皆扶輿積厚之氣磅礴而融結普陀秀峙海壖迥立於天風紫濤浩涆無際之中尤靈秀所萃聚宜其為仙真之所栖息況大士以慈悲濟物為心隨聲赴感無所往而不在其示現在一時實無時而不示現神通感應不可思議即示現與不示現舉可不論也今夫佛法廣大無邊大海包含無際億萬百千里不足以測海之廣而一勺未嘗非海也億萬百千法不足以盡佛之相而一法無往非佛也今以大海視普陀一拳石耳而菩薩現相之場善衆皈依之地泛慈航於彼岸結寶筏於迷津證普陀之慈緣顯𢎞深之願力珠宫在望香界重新寧不與鷲峰鹿苑均為淨域之名區也歟用為斯記鐫諸翠珉以志靈山之勝概雍正十二年正月十五日普陀法雨寺碑文法雨寺者普陀山大士之别院也皇考聖祖仁皇帝既修建普濟寺上為慈聖祝禧復念兹寺為海氛所震蕩發帑重新俾僧徒得所栖止賜額立碑增輝瀛嶠厯今已數十載宜加崇飾朕特遣專官賫內帑庀材鳩工不勞民力香林梵宇丹艧煥然與普濟寺大工同時告竣督臣請摛文勒石以紀夫大士以慈緣普濟度盡衆生為願朕嘗繹法雨之義為濟物之普遍者莫如雨當夫慈雲布濩甘􅒴滂沱髙下逺近一時霑足凌霄聳壑之喬柯勾萌甲坼之微卉華葩果蓏無不濡被潤澤發榮滋長暢茂條達各遂其性而不自知假使物物而雨之朝朝而溉之將不勝其勤而終不足以遍給惟本大慈悲現大神力周遍一切在在具足所謂天降時雨山川出雲膚寸而合不崇朝而遍乎天下者濟物之功莫大於是神仙寶剎緇侣雲集自當有被時雨之化證心印而傳法乳普利生之實用以不負大士隨緣接引之慈恩而副朕𢎞振宗風護持正覺之至意者朕深有望焉雍正十二年正月十五日崇道觀碑文性命無二途仙佛無二道求長生而不知無生執有身而不知無相法身如以箭射空力盡還墮非無上至真之妙道也道祖云外其身而身存豈非世尊無我而有我之旨乎又云觀空亦空空無所空所空既無無無亦無無無既無湛然常寂夫此湛然常寂豈非常樂我淨之妙諦乎彼夫滯殼迷封癡狂外走者烏能測知萬一哉大慈圓通禪仙紫陽真人張平叔著悟真篇發明金丹之要自序以為是乃修生之術黃老順其所欲漸次導之至於無為妙覺達磨六祖最上一乘之旨則至妙至微率難了徹故編為外集形諸歌頌俟根性猛利之士因言自悟於戲若真人者可謂佛仙一貫者矣紫陽生於台州城中有紫陽樓乃其故居去郡城六十里有百步溪傳為紫陽化處又嘗焚修於桐柏崇道觀歲久香火岑寂特命發帑遣官載加整葺夫以真人靈源朗徹決定無生三界十方隨心轉用何有於蟬蛻之鄉更何有於塵棲之迹特以朕景仰髙蹤表其宅里俾學道之士人人知此向上一路千塗同軌非可強分區别自生障礙庶幾真人救迷覺世之薪傳不泯於後也自紫陽樓迄百步溪崇道觀三處各為殿堂門廡若干楹併置田若干畝以資香火有餘則以贍其後裔雍正十二年二月經理告竣爰志其緣起而刻諸石雍正十二年三月十八日報恩寺碑文古德有云行解相應謂之為祖又云明道者多行道者少可知心性邊事固貴眼明必須踐履行不應解定非真解明而不行豈是真明昔人十二時中並無雜用心處又謂數十年始得打成一片皆謂此也朕於玉琳琇國師蓋不勝仰止之歎焉國師紹法磬山年始二十有四即開堂於吳興之報恩寺提唱宗乘惟以本分事激發學者其自勵四誓與答客問七諦當因課誦示衆語自為為人悉皆如實具足無一虛字舞弄狂機疑誤後學實參實悟真修真行我世祖章皇帝慕其名德延入內廷對御敷陳無非道要朕常擬於黃帝之訪崆洞成湯之問隨光惟皇祖究竟真宗故能得此大士而國師實能無沗恩遇始終無一言一行世諦流布與本分間隔洵不謬為佛祖兒孫人天眼目者矣朕既選其語録刊布叢林復念報恩法席宜加修整爰命有司庀材增葺以昭我皇祖尊崇有道相得益彰之盛軌抑兹寺也磬山修先嘗演法而玉琳琇繼之所謂白雲千頃老屋數間一榻髙眠令土木瓦石為大衆轉大法輪者磬山之家風也合諸檀越建大禪堂十方聚會應時及節為大衆説法者玉琳之行履也今磬山玉琳皆已入大般涅槃而白雲如故木石依然法堂之鐘鼓重開十方之善信不少大衆入此門來還見種種轉大法輪相否還聞時節説法無量音聲否如果親見親聞則報恩法會儼然未散只在本人當下領取以毋負國師常住切實為人處是所望於努力修持者雍正十三年四月初八日重建天竺寺碑文浙中多名山古寺天竺乃昭著之大剎也湖山明秀勝地鍾靈觀音大士歷徵顯應竒木妙相舍利瑞光普現𢎞慈久而彌彰有感必通如響斯捷皇考聖祖仁皇帝巡幸浙西重新香界御製碑文照耀穹宇為慈聖祝釐為蒼生祈福意至厚也祝融不戒宜事鼎新爰因總督李衛之請命發帑金載加修葺雍正十二年十一月工竣璇題朱網丹艧煥如逺近人民瞻仰歡悅用勒文翠珉以紀其事夫佛法廣大無邊不可思議而大士慈悲為念隨聲赴感普濟羣生是以善信皈依有求輒應然天人感召之理無他曰誠敬而已矣當其誠心懇至雖以愚夫愚婦之微賤而冥漠之際呼吸相通如其不然即有靈明響應悲憫救護之聖心亦不能強迷頑者而施之惠澤故曰神無常享享於克誠又曰至誠而不動者未之有也不誠未有能動者也夫斯人生享太平之福日用飲食一絲一粟在在皆天地覆載之恩即在在皆明神庇祐之力使非時存敬信之心好善逺罪以迓福祥而獨於祈禱迫切之時奔走膜拜冀邀鑑格則誠意微薄豈能感應尚安望休祥之敷錫乎是以大士之慈悲靈聖振古如兹而斯人之昭受神庥必由自致誠能虔敬居心實力嚮善湔除惡念廣種福緣則善氣和會感致繁禧大士慈恩降祥錫祉年豐物阜風雨以時衍蕃昌而躋仁夀朕愛養黎元之至意其深慰矣夫雍正十三年八月初一日浙江通志卷首三
