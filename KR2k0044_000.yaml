front:
  text: 敕修浙江通志進表
  hash: sha256:cd1833931914ddb40ebde9d10c4282a642cec26692358968962810ed098a21c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0044_WYG_000-1a, image: WYG0519/WYG0519-0001a.png}
body:
  text: 上諭纂修通志成書謹奉表上進者臣曾筠誠惶誠恐稽首頓首上言伏以聖治同文九牧式職方之訓皇猷綏極萬邦陳王會之圖倬雲漢於天章奎壁輝騰玉燭煥階符於星紀斗牛墟接龍光發宛委之藏書緑字赤文總屬水土平成之迹闡陽明之祕籙日圭月簡無非山川經緯之文恭綴瑶編上塵黼座竊惟夏書職貢賦紀揚州周禮分星次占斗宿左氏語詳吳越知生聚教訓之有由趙曅例仿春秋識井邑封疆之所自襟山帶海郭景純箋綴蟲魚沿江溯河酈道元派分脈絡漢析丹陽吳會厥有三郡之書唐置越婺東嘉爰成十道之志記會稽之土地攸居作鎮南邦對越國之人文俊異善生海嶽龜齡賦陳風俗實七觀七述之權輿灌圃勝紀行都亦夢遊夢梁之嚆矢原夫圖經始作綜兩浙一路之見聞逮厥通志初編彚七越三吳之記載凡諸撰述悉隸版章欲事參稽須加薈萃然識大識小必期於典章明備之時而徴獻徴文幸際夫黼黻承平之會兹蓋伏遇皇帝陛下道契璿圖治隆金鑑緝熙時懋傳精一於執中聖敬日躋敕幾康於宥密觀人文而成化圖書啓河洛之祥繪風俗以陳詩疇範協苞符之瑞膏流解雨沾濡蔀屋茅簷和喣巽風披拂山陬海澨良由聖孝特隆於繼述是以皇仁遍浹於垓埏欽惟世宗憲皇帝知周萬物道濟羣生容保無疆並日月之照臨下土健行不息如剛柔之迭運四時羅宇宙於胸中萬方在宥運天下於掌上六合同風乃猶軫念民依特命纂修通志浙江於雍正九年二月興修至雍正十三年十二月纂竣首紀聖諭昭道法於千秋恭録宸章垂典謨於萬世繪圖立説辨井野之區分考古證今詳建置之始末覽山川而審形勢十一郡星羅碁布式廓版圖定賦稅而紀恩蠲億萬姓鑿井耕田咸歌帝力農桑為衣食之本積貯足而户口滋繁禮樂為教化之原學校興而風俗歸厚至於關梁陂池之必謹城郭廨宇之克完水利莫切於海塘識安瀾之胥慶兵制特詳於防海見恬波之永清挽漕上關天儲錢布切資日用通商即以裕國傳命速於置郵凡兹記載之宏綱悉係東南之大政若夫嘉禾岐麥並入珍圖朱草箑脯咸徴瑞應大者法小者亷官方胥飭或言揚或行舉賢路方翹傳宦迹則遺愛比於甘棠録鄉賢則芳徽流於桑梓至澗槃碩德有隱斯彰若巾幗完貞無潛不耀禮重春秋秩祀勝選仙佛精藍旁羅蠆紫蟫紅遍剔龜趺蟲篆或仍舊志或係新增發凡起例而類各分門比事屬詞而卷皆盈帙共成百册合為一編臣識陋測蠡學慚窺豹荷海疆之重寄時凜淵冰覽澤國之全圖用資龜鑑適當受任之始甫輟丹鉛爰於治事之餘檢畀剞劂欣逢盛典披函而快覩琳琅恭進成書捧帙而敬抒葵藿伏願離輝炳耀乾度汪涵稽古右文丹扆書陳無逸體元贊化御屏圖繪豳風光華逺被於堯封聲教遐宣於禹甸自兹吳山越水熙熙盡樂春臺白叟黃童處處咸登夀域將見金繩玉册綿萬年有道之長銀甕器車臻百福來同之盛矣臣無任瞻天仰聖激切屏營之至謹奉表恭進以聞乾隆元年月日浙江通志序欽惟我皇上纘承丕緒六宇同文敷政勤民德洋恩普軫念浙江海塘重關東南民命特命臣曾筠往董其役經畫綜理因閲視江海形勢親厯浙東西周咨審度竊見夫山川之清淑都邑之盛麗物土之殷饒人文之彬郁負山枕海控吳楚而引閩粵偉哉誠東南之都會而財賦之上腴也旋叨恩命授臣以節制撫綏之任甫受事適前督臣奉敕纂修通志成書將謀剞劂爰於治事之餘遞加檢閲重為審定尅期授梓閲半載而工竣為門五十有四為卷二百有八十蓋兩浙風教之所被掌故之所存胥於是乎在矣按浙省記載自左氏吳語越語而後有越絶吳越春秋之作遂為志乘嚆矢至漢分吳會丹陽為三郡有三郡記吳朱育作會稽土地記韋昭著吳興録而晉孔曅賀循並有會稽記王韶之有吳興郡疏鄭緝之有東陽記有永嘉郡記梁吳均有入東記若唐陸羽之志吳興宋周淙之志臨安羅濬之志四明施宿之志會稽陳耆卿之志赤城衛玠之志信安董弅之志新定皆是也沿及元明十一郡先後各有府志要皆自為一郡之記載而未有薈萃之者嘉靖辛酉臣鄉先達方山薛應旗為兩浙提學副使合十一郡所屬輯成通志七十二卷是為浙江通志之始國朝康熙癸亥歲奉文修輯蓋以薛志為藍本而斟酌損益之稱粗備焉距今五十年其間典禮之修明制度之因革政理之條貫民物之登耗文章功業之彪炳而建樹月異日新洪纎備具使佚而不紀何以彰前軌示來轍乎是編之作開局於雍正辛亥春訖事於乙卯冬厯數歲之久兼綜衆長考證得失參互同異旁搜博採可謂勤矣今按其體裁分門别類增舊志者什之三考古訂今增舊志者什之七而傳述舊聞恪遵內廷編纂之例悉徵引原文標列書目以備考索至記載時事謹依大清會典採録科條章奏務存實據以便稽查杜預所謂發凡言例皆經國之常制史書之舊章此則前志所未有也臣建旄兹土夙夜冰兢冀康庶事而答主知而竊懼識有未逮慮有未周恭閲是編誦聖訓庶知所遵循覽方域庶知所經理察禨祥庶知所警省采謡俗庶知所化導觀制置而閲廢興庶知所修舉攬形勝而扼阻要庶知所備禦按兵賦而審虛實庶知所綜核視土物而驗虧盈庶知所阜安景仰前徽庶知所矜式搜討遺文庶知所考鏡蓋治道之綱維民生之利病一寓目而盡得之他日或能䇿勵庸鈍勉竭悃誠鞏海疆而奠澤國以上佐聖天子維新之化則於是書實重有賴也爰裝就疏進謹拜手稽首而揚言於簡端乾隆元年歲在丙辰七月朔吉誥授光祿大夫太子太保文華殿大學士兼吏部尚書總理浙江海塘兼管總督巡撫兩浙鹽政印務加十四級臣嵇曾筠謹撰序欽定四庫全書史部十一浙江通志總目録地理類三都會郡縣之屬卷首一詔諭卷首二詔諭