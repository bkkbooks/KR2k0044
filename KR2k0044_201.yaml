body:
  text: 浙江通志卷二百二列女一禮記內則首曰后王降德於兆民則室家之範關乎風教審矣聖朝明章婦順凡貞淑不二操者雖極之掘門窮巷日月逾逺莫不搜幽夜之逸光登之坊表而風聲所樹至於心松筠竹簡不絶書蓋其盛也為列而次之而載於前史沿於舊乘者亦備録焉志列女杭州府三國吳錢塘縣孫堅妻吳氏三國吳志本傳吳主權母也本吳人徙錢塘早失父母與弟景居堅聞其才貌欲娶之吳氏親族嫌堅輕狡將拒焉堅甚慙恨夫人謂親戚曰何愛一女以取禍乎如有不遇命也遂許為婚生四男一女及權少年統業夫人助治軍國甚有補益建安七年臨薨引見張昭等屬以後事合葬髙陵三國志注策功曹魏騰以忤意見譴將殺之士大夫憂恐計無所出夫人乃倚大井而謂䇿曰汝新造江南其事未集方當優賢禮士捨過録功魏功曹在公盡規汝今日殺之則明日人皆叛汝吾不忍見禍之及當先投此井中耳䇿大驚釋騰夫人智略類皆如此唐馮孝女咸淳臨安志穆宗時人少孤無兄弟母子相依及長不嫁以養母母病篤思肉食刲股為糜以進後母死號慟嘔血既葬結草廬墓下日焚香蔬食刺臂血書佛經捨宅為寺以薦母長慶三年詔賜束帛仍賜寺額曰報恩今錢塘縣有孝女南北兩鄉唐醜娘夢梁録居孝女南鄉年十三母病刲腹取肝和粥以進母病愈醜娘以創入風而死謹按醜娘未詳何代人因與馮孝女居相近故連及之元輝和爾氏三女元史本傳家錢塘諸兄逺仕不歸母思之疾三女欲慰母意乃共斷髮誓天終身不嫁以養母同力侍護四十餘年母竟以壽終事上並賜旌異楊居寬妻馬氏元明善節婦馬氏傳參知政事楊居寬繼室錢塘民家女也至元十四年僧格誣居寬等死沒入其孥以氏賜衛士氏託狂疾呌呼遺糞溺不可近竟免侵迫楊氏隂贖之歸遂削髮廬墓誓死不嫁後僧格敗事得昭雪而氏以無子乞歸錢塘養其獨親楊氏許之日紡績給食凡十有餘年大德七年十月乳生瘍或曰當迎醫不爾且危氏曰吾楊氏寡婦也寧死此疾不可令男子見竟死年四十餘陳孝女癸卒雜識父業儒居胭脂嶺下乙亥兵火挈家永嘉山中為盜所掠僅留一女十歲攜之丐食以歸故居蕩不復存聞殊勝寺設粥攜女就食僧憐之留供榜疏職時孫元帥下李知事者東平人也欲延一士為友僧以陳薦一見投合館榖加厚女亦得其室之撫誨時屆仲春女謂其父云吾母墓在故居久不拜掃矣今值禁煙當一往祭奠父即備牲醴與俱至墓所拜奠罷女悲甚哽咽父勉之還則泣告曰比聞李氏將北歸吾父子必將從之父老子幼南北萬里何日得再至吾母墓下所以痛心遂劈踊呼號聲振林木久而仆地視之死矣因殮而祔於母塜之傍曹處女詩話類編名雪字玉英年十三善鼓琴十五工詞翰母沒竭力以葬其母年五十不嫁自誓云死作處女塜至正間錢塘喪亂處女閉户不食數日餓死楊亷夫弔之詩都納輟耕録杭城東輝和爾氏女奴也年十九勤敏謹願主卒某郡官所都納奉主婦日謹主婦亦委以腹心至正壬辰秋寇陷杭劫官民府庫至輝和氏家不得物乃反接主婦柱下拔刀礪頸上諸侍婢皆散走都納獨以身覆主婦請代死且告曰將軍利吾財豈利殺人哉家之貨寶皆我所藏主母固弗知若免主母我當悉與將軍寇允解主母縛乃探金幣帛等散置堂上寇取之竟又欲犯都納身都納持刀欲自屠曰我主二千石我誓不奴他姓况汝賊乎寇驚異捨而去都納泣拜主婦曰棄主貨全主命權也妾受命主鑰今失貨而全身非義也請從此死遂自殺黃仲起妻朱氏元史本傳杭州人至正十六年張士誠寇杭州其女臨安奴倉皇言曰賊至矣我别母求一死也俄而賊驅諸婦至其家且指朱氏母子曰為我看守日暮我當至朱懼受辱遂與女俱縊死妾馮氏見其母子俱死嘆曰我生何為徒受辱耳亦自縊死既而仲起弟妻蔡氏抱幼子與乳母湯氏皆自縊賊至見諸尸滿室執仲起將殺之哀求得脫遂盡掠其家財而去夏仁壽妻徐氏徐一夔夏君墓志仁壽配徐氏值寇難死於水以貞節聞翁氏姊西湖遊覽志餘年四十不嫁至正間寇陷錢塘與弟忠一家四人誓結袂死於河姊曰河之死者穢矣吾獨尋乾淨水死忠等赴河姊赴城隂古井死楊亷夫弔之詩周仲賔妻鄒氏武林紀事鄒世聞女嫁錢塘周仲賓為贛之瑞金簿非辜就逮鄒氏嘆曰夫必死矣吾出門安從遂投舍後池中而死明席祥妻吳氏徐一夔席孝婦傳山隂席祥娶錢塘吳氏留錢塘生子未晬而祥沒吳年二十有六曰吾席婦也義不當留父母家惟奉靈櫬葬先塋之次事舅姑以撫吾遺嬰至於成人耳他無所用其心也已而一如所言一日姑患痬痛甚醫者曰此為膿所苦有能吮之者乎吳氏吮之無難色姑遂愈胡氏守貞兩浙名賢録胡宗信之姊父母長弟相繼物故而宗信年幼未立私念嫁蚤晚無加損誠能輔弟樹立晚嫁無所恨遂經紀其家及宗信長娶婦王氏名志清甫五年而宗信沒王時年二十四生子貢暨一女守貞痛曰我終不可以嫁矣於是與志清誓死守存胡氏血食臥起相依貧無以為生每日闔門治女事寒機雙杼一燈欲滅坐至夜分如此者十九年洪武甲子嵗守貞年六十卒志清率貢行三年喪陳貞女兩浙名賢録許聘禮部貟外郎孫迪未成婚而迪亡柩返女告其父母衰麻至迪家見翁姑臨柩伏哭盡哀還服三年喪終身不嫁壽踰七十卒於家張景忠妻陳氏成化杭州府志字文婉生一子孩抱而景忠卒甫除服有諷其改志者唾去之舅姑沒喪葬貧儉稱禮姻族稱孝包謙妻鄭氏兩浙名賢録陜西臨潼人父任杭府稅課大使擇錢塘包謙歸之謙舉進士授行人卒於京師鄭時年二十六父聞命子至京迎回臨潼遺孤光弼方五嵗氏泣曰豫歸侍父兄即包氏宗祀絶矣遂扶柩還杭家屢空勤女紅以自給課子讀書焚膏盈勺竟始就寢誦讀稍怠即抱謙神主哭子亦奮勵應明經選官貴池縣學訓導鄭年八十三卒徐泰皓妻陳氏兩浙名賢録名妙善年二十歸泰皓越三年泰皓死無子以徐氏宗祧為念勸翁納副室生子嵓妙善慮其孱弱且翁年近七旬盡心撫養以至成立徐氏之宗賴以不絶嵓感嫂恩以母事之及卒嵓行三年喪君子以為宜華榮妻王氏萬厯杭州府志年二十歸杭州右衛千戶華榮為繼室越五年榮死遺孤幼矢志守節至老不渝終日蔬素雖鹽醯不以入口𢎞治年旌表年九十二華氏妙清兩浙名賢録杭州右衛千戶榮之女早嵗喪母茹素十餘年坐臥儼思恆若有見初榮代伯氏戍彭城永樂間纍功拜前官臨沒語女曰吾起戰陳出萬死得一生為千夫長期世世及也今中道死子震幼且弱族人利吾官者行將不利於震汝以女子從一年少後母其若之何女哭應曰吾雖孑然孱也請得事我母長我弟令嗣我父勳終不從婚媾去遺父憂矣榮卒女遂一意奉母保護震備至伯之子麟果欲奪震官令人百計誘女嫁女剪髮碎面以示己志旦則為震祈佑於天晝則勤女紅夜分不寐以給衣食竟育震成襲官且教以忠孝終身不嫁繼母王氏受旌女獨不及餘杭鄒幹為著孝烈傳謹按舊通志作葉妙清至載其母王氏則曰華榮妻考萬厯杭州府志亦作華妙清今改正何文貴妻范氏萬厯杭州府志生子二嵗而文貴以販鮮被風舟覆沒海中鄰舟歸報越數日矣尸漂泊不知所之氏乃抱其孤號劈水濱凡五日尸隨潮上止淺灘旁穢敗莫識既視其左手有約指在焉文貴物也舁之歸氏年二十三遂守節不變正德年旌表陸氏二節萬厯杭州府志張氏陸鎮妻年二十四鎮沒遺子榮誓死守志鎮弟陸二郎娶倪氏二郎赴京身沒倪氏扶柩回杭竭力營葬同守姪榮成立正德年旌表雙節金廣妻孔氏萬厯杭州府志名妙真歸廣生二子廷珮方三嵗廷瑞方周嵗廣卒妙真年二十七舅姑老紡績供養舅姑繼沒罄家資以營葬訓廷瑞讀書舉進士仕至光祿卿寡居五十年正德年旌表髙貞女兩浙名賢録杭州右衛舍人髙恂女許嫁陳文濠濠病夭女聞訃製服往弔比發引又哭送及墓因誓不再適或以未成婚諷之女曰一納陳氏幣即為陳氏婦何得以結褵與否異乃心居七年卒夫家迎其柩合葬焉陳經妻勞氏萬厯杭州府志名妙祥經沒遺三女上無舅姑下鮮兄弟氏年二十七日夕織絍為生教育三女閉户不出至親罕覩其面守節四十五年嘉靖年旌表金模妻呂氏兩浙名賢録模客死姑蘇氏年二十七孤寒伶仃衣食不給撫幼子山成立時郡城大火將及其廬氏焚香祝天旋即返風城南萬井煨燼而金氏之廬獨存嘉靖年旌表姚經妻蔣氏萬厯杭州府志經卒氏年二十七孝舅姑撫孤女選於宗屬得子銘為後又不祿以從孫彩嗣之嫠居六十年不窺户間田氏二節萬厯杭州府志朱氏秀蘭仁和人年十八嫁錢塘田鳯甫二年鳯死無子朱氏躬刺繡以自給日惟蔬素守志四十年朱氏育秀錢塘人年十九適田鵬五載鵬疾亟朱刲股進竟不起遺孤大年甫三嵗撫以成立不窺户外垂五十年家故饒特蔬食布衣以勵志操並嘉靖年旌表凌曰桂妻張氏兩浙名賢録夫後於伯氏夫卒舅氏繼沒遺孤僅五月氏時年二十六養所後嫠姑備盡孝敬有強宗某者圖攘其室嗾父張欲奪氏志又百計窘侮之氏乃截髮毁容拮據以植遺孤冀其立也命之曰立含哀茹戚六十年如一日孤長登進士官建昌守隆慶庚午二孫登名登瀛同舉於鄉瀛成進士宋道𢎞妻陳氏兩浙名賢録道𢎞挾醫術攜家僑居崇德適海寇至一邑人盡走氏抱持幼子與道𢎞相失遇賊賊迫之同行紿賊稍寬已置幼子井傍脫雙履投井中而死王應奎妻鄭氏萬厯杭州府志仁和人適錢塘王應奎應奎沒氏二十四嵗遺二女煢煢孑立誓死守志應奎六昆弟親屬內外皆富盛氏獨甘荼苦晚年王氏家益衰氏就母家及女長乃就養壻家年六十五卒何材妻葉氏萬厯杭州府志仁和人適錢塘何材材父嘗贅居梁氏復稱梁材材沒氏年二十五一女在襁褓日夕茹哀已瀕九死所親勸之曰梁何二族皆寡嗣息若幸有女長得善壻庶幾寄蒸嘗焉氏為強食女既長贅壻雖同居未嘗燕見年六十二卒郎氏元真兩浙名賢録許字髙瑞瑞出遊不返舅姑辭之父母欲更字氏以死誓一日從容言曰吾向許身為髙某妻弗獲嬪於夫家願一識其門而還父母許之至門拜舅姑比晚促之歸氏曰吾今日豈有還理乎婦人內夫家吾當於此代夫奉甘旨耳父母舅姑強之再三不可乃聽之居數嵗以孝聞舅姑為之置嗣後有托名為瑞來歸者時姑已亡而舅目雙瞽不能復辨聞其述舊事甚悉喜曰真吾兒也氏曰語言容可偽此當以形體物色之既乃察其無耳後痣非是遂拒之人於是益賢其有貞志偉識云李貞女兩浙名賢録名京許字王曰可未請期而王死京屏迹一小樓粗衣蔬食鬱鬱苦守八載而病劇他無所言但囑取王生之像一見而訣至則已不及矣生之父雍請從子合葬墓在石屋山之陽徐貞女萬厯杭州府志許聘沈麟為妻麟卒徐甫十九嵗泣告父母製服赴喪奉事舅姑以孝聞終年紡績一室不踰户限內外姻親莫覩其面年七十卒部使者表其門秦某妻顧氏萬厯錢塘縣志秦業醫不售兼病痿廢貧甚為父母所逐無所得食謂氏曰爾與我同餓死無益徒自苦孰若更事他人爾既得所天吾亦賴爾幸少須臾無死氏飲泣不答居數日秦父母攜酒肴來視其子相屬為耳語氏度其必以已市也因却不飲食比夜呼女出汲井水令返取罌即竄入井死明日出其尸衣裳內外俱紉綴連絡不見體時年二十九郎經妻俞氏萬厯錢塘縣志名敬淑年十六適經五年經沒痛哭服滷以救蘇撫二幼女繼姑張氏迫之改嫁氏截髮斷指以誓百計窘辱不可奪凡三十九年卒朱卓然妻徐氏萬厯錢塘縣志名淑順年二十適朱三年生子方一月夫亡六年子亦亡姑庇已女時有不堪氏勤愼端恪姑亦化之萬厯年旌表毛氏五節杭州府志陳氏名秀芳十九嫁毛珣踰年珣夭無子守貞五十二年珣姪希仲娶許氏希仲卒許年二十七茹素終身希仲子應鉉應鏞鉉亦早卒續娶婦童氏守節至八十三而沒鏞遊粵西客死妻孫氏守貞至八十又有毛鴻翰者幼得癎疾腳痿不能行妻查氏扶持左右之鴻翰沒查有貞操許三姑萬厯錢塘縣志許聘蔡九經未嫁九經卒許年十七聞喪即持剪刺喉流血救蘇奔喪劈踊登姑樓剪髮食淡勤女紅雖至親不覿其面髙氏三節杭州府志朱氏髙鎧妻年二十三鎧卒守節四十五年子倫妻吳氏年二十七倫卒守節三十五年隆慶年旌又姚氏髙自瀛妻年少守節萬厯年旌薑縉妻胡氏舊浙江通志年二十四縉卒族利其資逼氏再嫁訟之官讞者欲試之語曰爾少二子幼盍早決氏即拔骨簮刺雙目流血盈階目遂瞽卒年九十九毛偉妻沈氏舊浙江通志年二十七而寡家貧拮據飢嵗勤女紅哺三子殯翁姑不愆於禮以子文龍晉都督同知贈太夫人潘聖姑名山藏許聘孫登名登名卒聖姑聞訃欲奔喪父母不許遂毁粧垢面服縞斷葷閉門不出富室爭求之輒欲自盡父母救蘇久之登名之母死女聞哀毁幾絶密於室中置飯一盂遙奠夫姑遂裂衾自縊鄉人祠之以勵女節貽清堂日鈔烈女父母皆市井庸愚屢欲奪其志不從則大詬罵甚且楚毒俱下女卒不少易以生撤靈之夕閉户雉經遺語侍婢曰願以骸骨從生地下其中衣縫紉甚密父母憐其志乃歸生合窆焉丁昶妻張氏舊浙江通志昶日與酒人遊年二十九卒遺孤二家貧謀於母母曰今時重紵絲巾帽若為之庶濟朝夕乃如母言以勤十指萬厯初旌閭沈四姑杭州府志許字萬國彰彰年十五卒四姑固請視殮至則服斬衰稱未亡人守節四十五年卒周招姑杭州府志周友聞女許字郁從善從善訃至招姑欲往視含父母靳之亡何郁母病蠱危甚女欲請往父母默然時方製衣取剪自刺母知不可奪偕往侍姑湯藥刲股和羮以進姑遂愈繼族之宜後者嘆曰吾無憂矣當報死者於九原耳遂絶食數日死時萬厯乙卯年二十三凌淑瑛舊浙江通志年十四受沈九方聘未婚九方死淑瑛欲過沈守制母難之淑瑛曰委禽之先唯與否惟命今日非母所能制也衰絰入門撫棺哭氣幾絶起拜舅姑坐臥一小樓中又二年以病卒丁貞娥杭州府志丁竹崖女魏生聘為繼室方委禽郡守以豪右言置魏獄娥夢黃玉杯墮地坼問父何祥父告以故且曰魏郎病疫危甚奈何娥曰莫如誣服出獄門即不幸得正而斃矣父如言緩其獄出抵家卒娥聞慟哭請往父不許以死請母與俱往至則撫棺劈踊哭幾絶呼其二子前曰余與汝父問名耳然義與之齊豈以生死間哉余誓不出户守汝父喪服闋教二子成立年六十六卒倪朱謨妻沈氏杭州府志年十八歸謨生子洙龍謨卒氏年十九家貧取給十指值竒荒作粥食姑與子而自啖粳餅或糜湯度日教洙龍成立郡縣旌門葉履貞妻楊氏錢塘縣志生女一而履貞死族人使改適輒斷髮毁容自誓已而思曰此輩利吾財盡散所有與族人究心內典會壻母沈大白婦趙氏亦早寡撫孤婚嫁事畢樂修淨土與楊兩相得也先是趙有中表姑金幼字李九嵗李夭時金父母相繼沒遺弟五齡誓不更適教育成立依趙共居一室屏絶人迹者三十年顔其淨修處曰三貞云李隆春妻徐氏黃汝亨李節婦傳十五而嬪越四年而孀葬埋其夫亟赴水幾死矣姑救之得出泣解之曰新婦欲從吾兒甚烈然從吾兒母吾兒更慰地下節婦為感動自是不言死孝養舅姑姑病羮股肉以進姑竟起從弟富春有幼子因告於宗祏立以為子陳氏三節錢塘縣志髙氏陳泰妻年二十二泰亡泰兄謙欲火泰棺迫髙他適髙截髮自誓乃止孤名宗仁娶於邵舉子六嵗而宗仁卒時邵年二十五與姑共撫之髙年七十六卒邵年六十一卒後泰孫新娶妻許氏年二十三新亡亦守節五十年卒張一賢妻蔣氏杭州府志夫卒蔣勤機杼不言笑者三十餘年次女適汪茂枝茂枝夭女年二十餘守孤忍死有母風崇禎時旌門劉烈女毛先舒劉烈女傳劉鎮之女吳生嘉諫聘焉待年未行鎮家樓臨南新橋吳俗五月五日蕩舟水嬉劉氏家樓望見之母以命女女不肯行強之乃出里有惡少年張某者從橋下竊見之張素以氣力食閭里侮鎮家貧無所憚夜遂踰劉氏短垣而入女驚以為盜衷衣起大呼鎮及妻皆起擒得之張奴客數人闖入奪去遂為惡言衊女女聞嗚咽曰吾義不辱人言今橫被誣即死猶可自明乃投繯死鎮詣府以狀聞是嵗崇禎十三年五月七日也張隂行金屬詞丁甲求微文若和姦者七字上府府案鞠曰和也法不當死一日丁甲暴病言曰我劉烈女也惡少年能殺我生爾更汚我死得請於帝矣丁甲頭搶地俱碎食頃死知與不知盡以為烈女果秉節能為神也鄉大夫咸詣中丞言狀下其事司李竟以張抵罪題請起冡祠堂建烈女坊顧文秀妻王氏孫治顧節婦傳始文秀娶於鄭有一子及娶節婦生二子文秀死時婦年十九二子方襁褓謂前子曰汝家上虞故巨族也汝祖徒杭汝父以諸生即世若不早為治生計兩世魂魄不其餒而以遺槖悉畀之且言汝兩弟吾辛勤十指可鞠勿以為念前子乃盡載入京數年以吏選授縣尉道出吳淞遇盜殱焉節婦聞之攜子控當事緝巨魁斬之歸益發憤教子補邑弟子孫大成用薦官中書武林顧氏於是乎始大傅氏三節杭州府志莊氏傅元英繼室明末遊騎抵武林元英子與霖奉母莊及妻錢氏弟世禎婦陳氏同避兵於金家塍騎忽至家人競走林樾中莊及錢獨走江邊騎追之莊躍入江錢亦隨之陳稍後一騎猝及陳擲珠串祈免既入槖復以威逼陳大罵被創死人稱傅氏三節陳潛夫妻妾二孟氏舊浙江通志潛夫官御史明亡沈淵死其妻慨然從之妾亦把臂俱沈於河沈振傑妻黃氏孫治黃烈婦傳明末兵至被虜舟出陡門婦躍水死越五日尸出於河不順流東去而西溯至家酷暑中顔色如生其夫撫尸而慟婦兩目忽淚溢焉盛我凝妻李氏錢塘縣志明末戎馬蹂躙氏被劫至武康之下溪灣俟其不備即投溪而死越一日尸浮於溪胸抱大石逆流二十里見者收其骸胸石不解有力者不能脫數日後傳聞至家我凝往拜之石即下謹按宋元以前列女見於諸書者槩從採録明代節孝舊志所載頗多備列則卷帙太繁缺略則姓氏湮沒故事實卓卓者俱為立傳其守志完貞確符年例而事迹略同者均列姓氏於後各邑倣此吳怡妻孫氏王葵妻周氏林萬春妻陳氏朱登妻錢氏吳博妻殷氏陳綱妻張氏張把妻錢氏張翥妻朱氏李登勳妻沈氏李鸞妻陸氏鄒觀妻張氏尚邦寧妻沈氏李鑰妻彭氏劉萬春妻方氏劉洲妻周氏沈應科妻髙氏胡有慶妻褚氏胡萬鍾妻吳氏蕭鳯妻唐氏徐彥鯉妻胡氏何應聰妻郎氏范桂年妻錢氏沈尚友妻徐氏朱妻顧氏顧雙橋妻王氏陸三謨妻印氏朱珏妻傅氏國朝李士鈐妻蔡氏舊浙江通志士鈐痛母喪嘔血而亡蔡晝夜悲號竟扼喉以殉順治間奉旨建坊旌表汪知元妻王氏舊浙江通志知元早亡王年二十五奉舅姑訓子卒年五十三孫學敏妻楊氏舊浙江通志年二十三而學敏卒事舅姑孝姑有疾嘗割股以進而愈楊士毅妻王氏舊浙江通志年二十八士毅卒毁容茹素營葬舅姑訓遺孤樹駿成立年旨建五十九卒坊旌表以上三氏俱康熙九年具題奉王四姑舊浙江通志王一鳯女字徐天禧未婚禧亡姑方十五歲在室守貞誓不二適舅姑遣媒旨建勸其别字姑憂憤絶食而死康熙十年奉坊旌表王之輔妻邵氏錢塘縣志輔卒氏年二十八敬奉姑嫜姑亡常至姑墓攀木悲號灑淚著旨建樹樹為之枯逾數年復茂人異之康熙十一年奉坊旌表盧貞女錢塘縣志全人聘為繼室未婚全人死過門行三年喪上無翁姑下無子姓孤立守志夫旨建有遺田十畝巡撫范承謨檄蠲其役卒後題請奉坊旌表胡萬鋭妻姚氏舊浙江通志萬鋭卒姚教子具有法度守節四十年沈贊化妻楊氏錢塘縣志年二十二贊化死僅一女朝韲暮鹽鞠其女歸朱錫九守節三旨建十餘年卒坊旌表以上二氏俱康熙十二年奉王寅妻茹氏錢塘縣志寅沒於盱眙氏年二十五將娩聞訃劈踊號哭胎應聲而墮則男也已復産一男蓋孿生云家貧苦節教子年六十七卒王德隆妻凌氏舊浙江通志氏盛年守節白首完貞以上二氏俱康熙十七年奉旨建坊旌表楊氏三節題旌册楊之梃妻陳氏年二十而寡訓其子及孫皆有成立年八十五卒楊之瑛妻朱氏年三十而寡至七十二而卒楊哲繼室朱氏結褵三月而寡毁容截髮誓死守節康熙二十二旨建年具題奉坊旌表李士謀妻胡氏錢塘縣志年二十四而寡事舅姑孝姑病瘵力撫幼叔幼姑後長大分已奩資完嫁娶康熙庚申秋大火比鄰皆灰燼氏號泣籲天即風返滅火人謂孝感所至計功妻趙氏杭州府志二十一歲夫亡生子超甫周嵗飲冰茹蘖奉侍兩代舅姑生養死葬教子義方卒年五十七程一桂妻趙氏杭州府志一桂新安人業鹺居錢塘娶氏為繼室氏年二十五夫亡守節妾戴氏一桂遺命改適戴不忍去甘同撫孤氏守節三十七年以上三氏俱康熙二十三年奉旨建坊旌表汪起勳妻凌氏題旌册年二十七而寡守節三十四年沈嗣英妻韓氏題旌册年二十三而寡生子兆發才五月氏撫育藐孤守節六十四年孫有光妻包氏杭州府志年二十二夫亡一子長庚撫訓成立事舅姑生養死葬苦節三旨建十餘年坊旌表以上三氏俱康熙二十五年具題奉吳維翰妻沈氏題旌册年二十六而寡翁姑垂暮子女俱幼氏孝慈兼盡黽勉持家守節二十六年李育連妻季氏題旌册年二十一而寡奉舅姑撫孤稚苦節四十三年以上二氏俱奉旨建坊旌表見於舊册不詳旌表年分謝懋俊妻吳氏題旌册年二十一懋俊卒遺孤才五月伯氏欲奪其志終不許事舅姑盡孝子重綸亦以孝稱守節五十年汪嶽蘊妻馬氏題旌册年二十三夫亡氏有娠五月慮男女未卜繼姪紹武為子後生紹良撫育兩子無異視守節二十八年俱康熙三十三年具題奉以上二氏旨建坊旌表施元龍妻孫氏題旌册年二十八而寡遺孤貞珉才五齡氏奉衰翁甘旨及子讀書修脯皆晝夜勤十指以給荼苦備嘗氏祖姑徐夫嬸經俱少寡守志人稱一門三節氏守節四十餘年康旨建熙三十五年具題奉旌者有邵之鳯妻謝氏陳林坊旌表時錢塘被苑妻汪氏胡元泰妻吳氏陳愚見繼妻范氏徐恆泰妻蔣氏朱文鏡妻戴氏舊册無考俱見施節婦節孝録孫秀姑題旌册年十五歸楊文龍幼未婚也文龍父鼎元以康熙三十七年攜子負販之衢州秀姑與姑侯氏家居其鄰有閻士積者素無行與其黨胡起龍暴橫里中三月八日侯臥病樓居士積突入室將犯之秀姑嚙其指遂負痛逸去六月十六日秀姑獨坐門內士積穴壁持其足秀姑驚走泣訴於姑因并及前事侯氏聞於地總鄰人介士積詣楊謝比至侯憤甚擲茶碗擊士積誤中起龍起龍固袒士積者遂詈侯氏已又與士積踵楊之門辱之士積呼秀姑曰汝晝訴地鄰夜將安訴吾不能致汝者非夫也秀姑飲泣慰姑先燈下自縫紉其衣下及裙袴畢飲滷死則十八日之夜也天方盛暑顔色如生數日不變里甲以貞烈鳴於官巡撫具疏請奉旨建坊旌表士積諭辟陳大經妻金氏題旌册會稽人年十五歸大經於錢塘甫一載大經賈於粵病卒氏號泣絶粒求死舅姑百方勸諭遂勵志守節立姪學良為嗣至老不廢織絍健持門户守節四十餘年戴永崑妻吳氏題旌册年二十而寡觸棺流血不欲生舅姑諭止之苦節三十五年金璐妻沈氏題旌册年十六歸璐璐以痘死氏孝養翁姑撫繼子守節三十三年朱樹勳妻姚氏題旌册年十九而寡勤十指奉兩代孀姑甘旨無缺及兩姑繼沒力營喪葬守節三十二年胡宗稠妻沈氏題旌册年二十五宗稠客死氏號慟奔喪擬蹈水以殉姑諭止之乃勵節事姑勤蠶桑自給撫繼子承祧苦節五十年楊德宏妻余氏題旌册年十六適德宏結褵甫一載母喪未畢繼以姑喪哀痛倍至無何德宏患時症死氏勺飲不入口晝夜哀號而卒距德宏之沒十二日以上六氏俱奉旨建坊旌表見於舊册不詳旌表年分沈貞女題旌册沈瑞春女許字范國章國章沒有為女執柯者女聞截髮毁容鍵户自縊以救免祖姑王葺一尼菴居之旬日步歸曰非所宜居也仍依母家獨處一小樓勤蠶織以終老卒年六十旨建三巡撫趙申喬具題奉坊旌表武氏三節題旌册武孟蔭妻朱氏年二十五夫亡守節二十四年武關義妻李氏年十六歸關義關義客死氏挈幼子奔喪備厯艱險守節四十六年武光祖妻林氏年二十三夫亡事孀姑以孝稱守節三十六年費彥甫妻袁氏題旌册年十七而寡當明末寇盜充斥流離百折矢死靡他撫姪而姪殤依壻而壻死煢煢無倚守節五十四年汪廷樞妻吳氏題旌册年二十六而寡訓子啓嘉成立以上五氏俱康熙四十四年具旨建題奉表坊旌計貞女題旌册許字陳玉桓桓沒於閩訃聞女泣請往奠既至曰今日從一終矣桓家素貧舅姑老且病女日勤操作以供修隨舅姑沒家愈寠或日中未炊女卒無變志年六十餘巡撫黃秉中具旨建題奉表坊旌楊蓮原妻俞氏題旌册年十九産女方三日夫亡氏椎心絶粒舅姑勸諭乃繼姪為嗣敬事舅姑勤十指自給後室遭回祿囊篋益空子媳孤孫相繼卒煢苦五十餘年張裕善妻金氏題旌册歸裕善生二女裕善為廬陵丞留氏奉翁姑而已之任得瘵疾氏聞買舟往視而裕善卒扶柩歸里時年二十四已而翁姑皆殁無繼嗣依壻以終守節四十年顧濤妻王氏題旌册年二十九而寡守節三十年柴棟妻孫氏題旌册年二十八而寡守節二十七年吳欽相妻閔氏題旌册年二十四而寡守節三十年嚴家鼎妻徐氏題旌册年十九而寡守節五十三年以上六氏俱康熙五十年具題奉旨建坊旌表氏時錢塘被旌者又有程密妻傅氏周鍾亮妻何舊册無考見山隂王時履妻節孝録江榮舉妻凌氏題旌册年二十六榮舉卒無子立姪為嗣從襁褓撫育成人拮據娶婦子復夭偕媳王氏矢志苦守凌卒年八十九康熙五十一年具題奉旨建坊旌表其娣鮑氏年二十九而夫江以鼇卒子承甲方周歲三女俱幼氏赤手搘持生養死葬男婚女嫁守節二十四年見題旌册不詳年分張宗儒妻汪氏題旌册年十九適宗儒宗儒卒氏取刀自裁舅姑力勸乃止撫子芬成立旨建守節三十年康熙五十三年具題奉坊旌表方髙矩妻吳氏題旌册氏結褵未幾翁與夫暨叔俱逺出死客邸姑病於家氏時年二十五隻身侍奉百計醫藥不遺餘力里黨咸稱之守節三十一年范玉珩妻于氏題旌册年十八夫亡姑抱病臥牀氏飲泣侍奉厯久不懈守節四十一年鄭允中妻孟氏題旌册年二十四而寡事舅姑以孝謹稱撫孤子成立守節四十年程可發妻朱氏題旌册年二十八而寡事舅姑撫遺孤守節二十五年吳鑰妻姚氏題旌册年二十六而寡布衣蔬食以終其身守節二十八年孫煃妻陸氏題旌册年二十六而寡勵志苦守足不踰閾守節三十五年姚廷益妻鍾氏題旌册年二十六而寡奉其舅甚謹撫遺孤宗樞以讀書砥行相朂守節旨建四十年坊旌表以上七氏俱康熙六十年具題奉沃天麟妻余氏題旌册年二十二夫亡絶粒誓死舅姑勸慰乃忍死孝養守節三十一年陳映垣妻費氏題旌册年二十三夫亡遺孤未晬氏養老撫幼咸取辦十指守節四十年江臣五妻黃氏題旌册年二十八而寡家貧績麻以供朝夕事孀姑生養死葬靡不盡禮撫孤子有成守節二十五年沈文龍妻王氏題旌册年二十二而寡舅姑老氏晝夜勤十指以供甘旨及沒力完喪葬守節三十一年沈勝業妻趙氏題旌册年二十九而寡事孀姑以孝謹稱撫訓幼子家聲不墜守節三十旨建三年表以上五氏俱雍正元年具題奉坊旌金氏二節題旌册金城妻宋氏其弟金培妻梁氏宋年二十二梁年二十八夫相繼亡妯娌最相善冰霜節操彼此交勵宋撫姪錦為嗣梁撫姪祖望為嗣俱以母教成立苦節三十餘年朱寶針妻詹氏題旌册年二十八而寡無子姑年老多病氏侍奉左右朝夕不離立繼承祧守節四十一年髙正妻王氏題旌册年二十二而寡家貧藉針紉以養舅姑訓子守節二十七年顧豫中妻朱氏題旌册夫客死氏年二十五扶櫬歸里撫訓二子有成持家嚴肅言笑不茍守節一十七年王𢎞曾妻姚氏題旌册年二十六而寡二子斆度皆幼氏教以讀書砥行次子度以薦授延川知縣守節四十餘年潘起奎妻徐氏題旌册年二十四而寡遺孤二氏鞠育稍長即擇師督訓不為姑息守節三十四年湯紹武妻吳氏題旌册年二十七而寡勤織絍以事舅姑舅姑沒親營窀穸撫遺孤訓以禮義守節五十四年朱𢎞道妻潘氏題旌册年二十一而寡無子立繼承祧守節三十餘年俞紹曾妻勞氏題旌册年十八夫亡無子舅姑老寢疾藥必親嘗撫繼子則織屨縫裳以給膏火守節四十三年虞浩妻朱氏題旌册年二十三夫亡遺娠生子曰棠恩勤撫育守節三十一年余之錫妻王氏題旌册年二十夫亡遺孤甫五月健持門户撫子有成守節四十八年沈恆妻王氏題旌册年二十八夫亡無子立姪為嗣守節三十年沈玉如妻趙氏題旌册年二十三夫亡親操井臼撫三齡弱子遭鄰火室廬灰燼無存艱苦備嘗守節六十年趙裕妻金氏題旌册年二十一夫亡無子撫繼子以續蒸嘗守節三十餘年汪妻吳氏題旌册年二十四而寡遺孤殤繼子又夭復繼孫承祧守節三十七年以上旨建十六氏俱雍正二年具題奉坊旌表趙荃妻吳氏題旌册年二十九夫亡事姑嫜先意承志姑沒力營窀穸並葬其夫撫繼嗣成立守節二十七年陳必達繼妻沈氏題旌册年二十九而寡撫前室子及己子鞠育教誨無異視家貧力勤女紅守節五十四年方餘妻潘氏題旌册年二十四而寡遺孤幼舅姑年邁氏朝夕針黹以供饔飱課子讀書有成守節四十一年謝聖正妻程氏題旌册年十八而寡家貧姑老氏勤女紅奉養沒為營葬守節六十四年王鼐妻沈氏題旌册年二十九而寡事孀姑孝姑嘗病劇氏籲天求代姑病得瘳守節四十一年范允欽妻沈氏題旌册年二十一而寡無子撫繼子慶治為嗣長娶氏姪女亦早寡氏復偕媳撫孫守節五十一年黃右釗妻王氏題旌册年二十二而寡無子立繼承祧事舅姑潔供修瀡及沒營葬盡禮守節四十五年梁王曾妻莫氏題旌册年二十九而寡孝事祖姑雖處窘迫甘旨必備撫三子以養以教守節二十四年徐介眉妻楊氏題旌册年二十八而寡撫姪為嗣守節四十六年蘇授蒼妻裘氏題旌册年二十六而寡舅姑沒殯殮窀穸之事竭蹶以圖尤刻勵以教其子夜三鼓機杼聲猶與書聲相應也守節二十餘年趙躍龍妻薑氏題旌册年二十七而寡事姑孝姑病衣不解帶者纍月撫遺孤慈嚴備至守節三十六年方貽謀妻李氏題旌册年二十四而寡奉孀姑二十餘年孝敬不懈撫夫幼弟成立守節二十七年趙琦妻吳氏題旌册年二十七而寡無子立姪為後嘗割股以療姑疾守節四十七年盧麳妻虞氏題旌册年二十五而寡姑繼沒兩喪並舉衣資變易殆盡家益貧荼苦撫孤姪得延一線守節四十二年許𢎞劭妻俞氏題旌册年二十三而寡仰事俯育百計支持以成大志守節四十二年陳于王妻周氏題旌册年二十九夫亡課子成立舅姑沒旁無伯叔氏獨營喪葬備嘗艱苦守節四十四年盧茂妾管氏題旌册年二十八而寡父母欲奪其志氏剪髮毁容猶強之不已甚至赴水投繯乃懼而止事其嫡甚謹至老猶晝夜勤機杼不懈守節五十八年武德正妻陳氏題旌册年二十五而寡遺孤二齡又殤撫姪姪夭復撫姪孫文彬為後守旨建節五十二年坊旌表以上十八氏俱雍正三年具題奉陳氏二節題旌册陳元錫妻邵氏年二十九夫亡陳三錫妻范氏年二十六夫亡俱能孝養翁姑撫子成立守節各五十餘年趙承祿妻唐氏題旌册年二十九而寡遺二孤皆幼氏侍奉孀姑潔供滫瀡撫子有成守節三十二年蔡憲竒妻朱氏題旌册年二十九而寡事舅姑孝舅姑沒脫簮珥以完喪葬教子以義方守節二十四年屠翼昭妻裘氏題旌册年二十五而寡二子俱幼氏上事下撫孝慈兼盡守節四十五年章士傑妻朱氏題旌册年二十一而寡事舅姑以孝謹稱無子立繼子自襁褓迄於成人劬勞撫訓守節四十五年盛肇昌妻包氏題旌册年二十八而寡遺娠五月生一子矢志不二撫孤成立守節三十四年楊萬鎰妾蔡氏題旌册年二十七而寡遺孤洪溥方五齡家貧藉針紉以給饔飱守節四旨建十六年坊旌表以上八氏俱雍正四年具題奉羅天彝妻金氏題旌册年二十一夫亡遺孤甫十月氏截髮毁容誓死不移事姑盡孝撫子有成守節五十二年包紹榖繼妻李氏題旌册年二十八而寡家貧奉耄姑甚謹藉十指以供甘旨冬日兩手盡瘃若不知也遺孤濤力不能就外傅身自督課少怠則哭失聲濤用是淬勵後成進士守節四十五年葛文楷繼妻吳氏題旌册年十九而寡無子舅姑沒竭蹶營葬撫繼子以延似續守節三十三年朱紳妻李氏題旌册年二十八而寡家貧舅姑俱病勤十指供湯藥三載及沒躬負土以葬并其夫祔焉教子成立守節三十一年陸曾錫妻諸氏題旌册年二十五而寡家貧紡織養姑姑沒親營窀穸其母黃氏亦早寡氏事之甚孝守節三十七年洪雲漢妻李氏題旌册年二十九而寡翁年垂暮氏織絍奉養二子幼督令誦讀至午夜不輟守節三十三年宋嗣昌妻黃氏題旌册年二十九而寡事舅姑撫二孤守節四十六年翁爾湘妻傅氏題旌册年二十七而寡事孀姑撫嗣子守節四十六年陳華玉妻凌氏題旌册年二十二而寡事孀姑撫幼子力勤操作守節四十三年李兆文妻髙氏題旌册年二十九而寡家貧厯盡艱辛課子有成守節四十八年屠時隆妾張氏題旌册年二十六而寡奉養孀姑撫訓幼子守節四十二年以上十一旨建氏俱雍正五年具題奉坊旌表任菼妻孫氏題旌册年十八夫亡冰霜自矢事舅姑孝教其子家聲不墜守節三十三年姚廷誥妻劉氏題旌册年二十九而寡遺孤尚幼舅姑沒力營葬事健持門戶孤長娶婦生孫而子又夭氏復偕媳撫孤守節三十四年朱氏二節題旌册朱錫驊妻陳氏朱觀䇿妻李氏俱二十八而寡事孀姑撫幼子閨門嚴肅至老而足迹皆不出戶外陳守節四十二年李守節二十四年章氏二節題旌册章金鐸妻駱氏章金鼎妻沈氏娣姒也駱年二十六沈年二十九相繼而寡駱無子沈止一女兩孀交勵名義事舅姑甚孝駱守節二十七年沈守節四十八年魏書升妻施氏題旌册年二十三而寡織絍育孤孤長督之學亦不廢耕守節三十年沈引祖妻邵氏題旌册年二十三而寡遺孤又夭立繼承祧守節四十八年陳咸妻葉氏題旌册年二十五而寡撫孤成立守節五十年趙王麒妻吳氏題旌册年二十五而寡撫遺孤守節五十年田璵妻王氏題旌册年二十五而寡撫遺孤守節二十六年孫九錫妻丁氏題旌册年二十九而寡事衰翁撫遺孤守節四十六年汪元善妻邱氏題旌册年二十九而寡事舅姑撫孤守節三十一年朱官龍妻滑氏題旌册年二十九而寡割股以療翁疾鞠子景隆成立守節一十六年卒吳德昌妻戴氏題旌册年二十八而寡守節一十六年卒黃思沛妻吳氏題旌册年二十而寡翁姑繼沒鬻衣飾營葬繼姪為後守節二十六年季子舒妻謝氏題旌册年二十六而寡守節三十七年邵懷棠妻章氏題旌册年三十而寡守節二十一年周強妾潘氏題旌册年二十三而寡守節二十九年汪健師妾趙氏題旌册年二十四而寡守節三十五年莫孝女題旌册名勝儒性至孝年十三父京病侍湯藥不離左右及沒哀毁如成人聞其孝者爭欲締姻勝儒以兄美章逺出母傅氏無侍奉者誓不嫁母再三勸諭知其意堅遂聽之於是屏服飾棄脂粉布衣操作以供母母病衣不解帶藥必親嘗夜則焚香籲天願以身代母卒視含殮畢絶粒求死既而翻然曰父母未葬我未可死乃晝夜紡績銖積數年遂擇地營葬逺近觀者皆以為雖男子不能及也卒年四十一徐大姑題旌册許字施士標未婚士標沒大姑年二十一聞訃欲以身殉父母勸慰遂歸施守制以姪大勇為嗣自歸施後連遭八喪隻身經理備極荼苦守貞三十年以上二十二氏俱雍正六旨建年具題奉坊旌表陸宗靁妻章氏題旌册年二十七而寡遺子女各一撫教有成守節二十二年卒陳茂雄妻沈氏題旌册年二十而寡事衰翁撫繼嗣茹素終身守節二十五年張基妻金氏題旌册年二十七而寡事孀姑撫繼嗣守節一十六年卒段志召妻王氏題旌册年二十三歸段甫二載翁客死於粵夫奔喪亦卒於旅邸氏甫二十五歲無子以姪為嗣家貧薄田數畝饘粥不給夫之弟又私售於人族衆勸氏鳴官氏曰吾雖餓死不忍以田産細故傷夫手足也守節三十九年胡宗模妻陳氏題旌册年十七適宗模甫匝月宗模為鳴鶴場大使之任卒於官氏年十八聞訃悲慟絶食舅姑勸慰乃止後舅姑兩叔俱亡本支已絶氏告宗族擇繼承祧守節四十一年嚴其肅妻方氏題旌册年二十九而寡翁姑早喪子成憲僅三齡宗黨憐其無依勸更適氏誓死不從守節四十年袁𢎞謨妻朱氏題旌册年二十九而寡子彤甫四嵗訓誨極嚴姑目失明扶掖不離左右守節二十二年江國標妻吳氏題旌册年二十九而寡翁姑垂暮二子琳倫俱幼家貧氏力供菽水守節二十二年孫子範妻張氏題旌册年二十九而寡遺一女旁無可繼人有憐其無倚者勸之更嫁氏矢志益堅守節三十三年朱小溪妻孫氏題旌册年二十七而寡家貧鬻衣飾以完喪葬教育二子守節四十一年屠彬妻姚氏題旌册年二十七而寡事孀姑教二子一女守節二十六年李蓮妻程氏題旌册年二十三而寡事繼姑孝無子以姪為嗣守節二十八年王廷顯妻陳氏題旌册年二十五而寡撫二子守節二十七年倪允發妻黃氏題旌册年二十二而寡無子立繼守節四十年李季元妻謝氏題旌册年二十九而寡撫幼子守節三十五年以上十五氏俱雍正七旨建年具題奉坊旌表熊天琳妻邵氏題旌册天琳以難蔭授瑞安守備值閩變死之氏年二十九在署恐賊至被辱以子女托夫之友令急去而手執白創以俟幸賊不至遂矢節撫孤每厯陳先人忠烈訓其子子以蔭登仕籍無沗厥職母之教也守節五十三年卒裘錫錦妻張氏題旌册年二十七而寡事翁孝撫二子有成守節五十四年李之發妻徐氏題旌册年二十三而寡營葬舅姑及夫撫子延禧成立守節二十三年吳景鎮妻姚氏題旌册年二十而寡遺腹生子又殤立姪為嗣事姑孝守節二十六年沈法妻馬氏題旌册年二十九而寡繼姪玖璿為嗣俱有成守節二十年朱琦妻胡氏題旌册年二十五而寡事翁姑撫遺腹子守節一十六年卒孫之騮妻查氏題旌册年二十三而寡當于歸時夫已患瘵疾氏茹素禱天願以身代又先撫姪堂為子及夫卒堂始周歲氏鞠育教誨俾至成立事孀姑甚孝守節三十年徐文髙妻沈氏題旌册年十九歸徐未半載夫就幕河南七載而客死氏年二十五撫孤姪映薇為子越五載舅姑繼沒歸依母家教子有成守節三十一年聞人瑜妻沈氏題旌册年二十四而寡三子俱幼家貧棲止一椽日用之需悉出針紉值嵗歉竭力以奉舅姑舅姑沒二喪並舉荼苦備至教子以義方守節三十七年柴榮昌妻周氏題旌册年二十七而寡撫二子俱夭僅遺孤孫氏復撫之守節四十一年李長吉妻楊氏題旌册年二十八而寡家貧事孀姑撫幼子守節三十六年盛大熊妻何氏題旌册年二十九而寡舅姑繼逝氏力營窀穸撫二子守節二十六年王孫楫妻楊氏題旌册年二十二而寡家貧勤針黹以養舅姑立姪為嗣守節四十四年翁士麟妻沈氏題旌册年二十八而寡撫子成立守節三十一年王公宇妻馬氏題旌册年二十二而寡事姑撫子守節三十二年章纘符妻姚氏題旌册年二十八而寡事舅姑撫子守節二十四年周必昌妻錢氏題旌册年二十六而寡無子立姪為嗣守節三十五年范汝韓妻蘇氏題旌册年二十九而寡撫三子一女守節二十七年王宰妻鄭氏題旌册年二十八而寡事舅姑撫遺腹子守節五十二年蔣王元妻徐氏題旌册年二十七而寡事孀姑撫子守節三十二年俞申伯妻陸氏題旌册年二十四而寡繼姪為子子又夭復撫孤孫承祀守節五十年盛文彬妻孫氏題旌册年二十七而寡事舅姑撫子守節五十一年以上二十二氏俱旨建雍正八年具題奉坊旌表徐萬春妻金氏題旌册年二十八而寡家貧遺二子不能就外傅氏親課經書俾各成立壽至九十五兩子年踰七十孫曽林立人謂苦節之報沈濓妻朱氏題旌册年二十九而寡遺二子貧不能自存氏晝夜勤女紅以供饘粥撫教有成守節四十三年李永驥妻丁氏題旌册年二十八而夫客死河南姑已早喪祖姑癱瘓氏久奉湯藥無厭倦子甫周歲教育成立守節四十年楊日榮妻李氏題旌册年二十四而寡遺腹生子娣張氏亦早孀與之共事姑嫜無間言守節二十一年毛楷妻馮氏題旌册年二十二而寡撫遺孤葬舅姑并告於宗族出所積以葬先世十九棺之暴露者守節四十八年林兆哲繼妻楊氏題旌册年二十八夫通判平樂卒於官氏扶櫬歸里撫前妻子及己子無異視前妻子夭與媳徐氏共勵冰霜守節三十一年胡廷鐸妻范氏題旌册年二十七而寡斷髮自誓撫遺孤守節四十二年馬謹菴妻朱氏題旌册年二十七而寡事衰翁撫幼孤守節五十四年王育竒妻翁氏題旌册年二十而寡無子繼姪為嗣守節二十四年楊學顔妻柯氏題旌册年二十九而夫客死處州事孀姑撫二子一女守節四十年汪躍妻胡氏題旌册年二十九而寡事兩代孀姑撫幼子棠長娶吳氏亦早孀氏偕媳矢志守節三十二年王元信妻汪氏題旌册年二十九而寡撫遺孤及幼叔守節四十九年王國擯繼妻陳氏題旌册年二十六而寡撫二子守節二十八年張廷玠妻胡氏題旌册年二十六夫亡室廬燬於火氏甘心荼苦事舅姑以養以葬訓子有成守節五十四年程賡妻徐氏題旌册年二十九夫客死粵東遺子女各一氏事姑甚孝姑沒後以母老兄弟又逺出遂歸侍奉其母守節四十五年吳汝霖妻沈氏題旌册年二十六而寡遺孤二齡姑目瞽翁足廢旁無叔伯氏隻身奉養二老教子讀書守節二十六年張文標繼妻姚氏題旌册年二十五而寡觸棺暈絶救蘇即營葬舅姑及夫與前室而已築壙於旁以示志復遭鄰火室廬蕩然撫姪為子子復夭艱苦備嘗守節三十三年沈國瑛繼妻任氏題旌册年二十六而寡姑繼沒子與媳又夭僅遺孤孫煢煢孑立守節四十六年吳一龍妻陸氏題旌册年二十九而寡遺子女各一子夭亡立姪為嗣孝事孀姑守節三十六年羅大紹妻金氏題旌册年十八而寡撫姪為嗣事奉舅姑并父母兩姓咸稱其孝守節三十一年錢昭嗣妻徐氏題旌册年二十六而寡遺孤甫六月舅老籍十指以給饔飱孝慈兼至守節二十八年楊日廣妻張氏題旌册年二十七而寡姒李氏亦早孀張無子鞠李之子為嗣守節二十九年方吉甫妻宋氏題旌册年二十九而寡撫子子夭復撫孤孫守節五十四年盛觀華妻馮氏題旌册年二十二而寡事孀姑撫繼嗣布衣茹素守節五十六年沈俊生妻髙氏題旌册年二十六而寡事舅姑撫二子守節三十年陸元宰妻陳氏題旌册年二十五而寡事孀姑撫子守節三十六年徐淞妻盛氏題旌册年二十八而寡事衰翁撫繼嗣守節三十六年茅秀芝妻沈氏題旌册年二十八而寡事舅姑撫子守節四十五年張繼祖妻沈氏題旌册年二十四而寡事孀姑撫子守節四十年吳維正妾胡氏題旌册年二十九而寡親族以家貧令再醮氏以死自誓事其嫡甚謹嫡無子止氏一子訓之極嚴守節三十二年楊二姑題旌册楊學顔女生甫彌月而父亡及能言見母柯氏常哭問父何在母告之遂抱母號慟自是母哭未嘗不相對哭也聞其孝者爭欲求婚二姑不許戚黨勸之姑曰吾非母無以至今日母非吾無以終天年人各有志可相強乎遂侍奉其母母死哀毁成疾而卒胡貞女題旌册許字江承麟未婚承麟卒女年十五聞訃欲殉父母護之謹遂歸江守節孝舅姑立繼嗣貞操三十餘年九年具題奉以上三十二氏俱雍正旨建坊旌表李祖望妻邵氏題旌册年二十三而寡撫族姪為嗣守節四十年張起濤妻何氏題旌册年二十九而寡撫子守節四十三年沈仲新妻李氏題旌册年二十八而寡撫姪孫為孫守節五十一年范體仁妻吾丘氏題旌册年二十八而寡撫子守節三十年莫與兆妻唐氏題旌册年二十九而寡撫子守節五十三年方時澄妻王氏題旌册年二十三而寡時澄為孝子聲𢎞子氏結褵僅四載守節三十一年克循婦道與長姒潘氏並以賢孝著婁邦憲妻陳氏題旌册年二十八而寡守節五十年俞士鳯妻楊氏題旌册年二十八而寡守節二十一年徐中吉妻湯氏題旌册年二十一而寡撫子守節四十八年吳嘉曾妻張氏題旌册年二十七而寡舅以傷子疾痿氏虔事不敢懈撫幼子守節二十四年金紫菴妻沈氏題旌册年二十九而寡撫子守節二十四年汪濤妻楊氏題旌册年二十五而寡事祖舅姑及舅姑殯殮盡禮撫子守節二十九年顧佩錕妻沈氏題旌册年二十七夫亡孀姑在堂紡織以供甘旨姑病三年親奉湯藥衣不解帶沒後奉姑柩與翁合葬并以夫棺祔於旁躬自負土不避風雨哀感行路撫訓遺孤俾得成立守節三十四年李志良妻陳氏題旌册年二十八而寡撫子守節二十九年蔡賜英繼妻陳氏題旌册年二十九而寡撫前室子女守節二十四年沈仁嗣妻江氏題旌册年二十九而寡撫子守節五十二年馬紹恆妻蔡氏題旌册年二十七而寡事姑撫子守節二十八年鮑守恩妻章氏題旌册年二十七而寡事舅姑撫姪為嗣守節四十三年陳國安妻馮氏題旌册年二十九而寡事舅姑撫子守節五十一年滑吉登妾陳氏題旌册年二十九而寡撫子守節三十年蕭元宰妻葉氏題旌册年二十九而寡事舅姑一子二女皆夭繼姪為嗣守節二十六年陳學尼繼妻陳氏題旌册年二十六而寡撫前室子及己子皆成立守節二十五年張起鼎妻林氏題旌册年二十九而寡事老姑撫子守節二十二年沈士芳妻周氏題旌册年二十八而寡事舅姑繼姪為嗣復夭繼孫承後守節四十六年徐任保妻張氏題旌册年二十八而寡撫子守節三十二年沈君選妻夏氏題旌册年二十二而寡事孀姑撫子守節四十八年吳御六妻蔣氏題旌册年二十九而寡事舅姑撫子守節三十一年馮祐妻張氏題旌册年二十九而寡無子積女紅資為翁娶妾生一子周嵗即夭氏遵翁命以第三壻莫楷為嗣未幾女卒復為娶婦生子以繼蒸嘗守節三十四年盧涵妻吳氏題旌册年二十四而寡事舅姑撫子守節二十九年以上二十九氏俱雍正旨建十年具題奉坊旌表沈祚錫妻朱氏題旌册年十九夫亡投繯服滷翁姑救蘇勉以大義始進饘粥孝養克盡婦道撫繼子逾於己生勤女紅寒暑不輟長齋終身守節二十八年王宗翰妻孫氏題旌册年二十九夫亡絶粒不食舅姑曰汝死我亦不能再生乃進饘粥事舅姑凡甘旨必親奉以進沒後盡哀盡禮無子撫姪如己出守節四十年孔衍昌妻陳氏題旌册衍昌力學成疾氏日則調治醫藥夜則禱祈身代夫亡願以身殉氣絶竟日家人救之始蘇上有翁姑不以家貧貽堂上憂承歡一如夫在時教遺孤以義方出夫生前所著書以示之且泣且示書有淚䀶子亦號泣捧讀焉守節二十六年陳士麟妻鄒氏題旌册年二十八夫亡絶粒從死孀姑勉以大義始進饘粥事姑曲盡孝養遺孤二必朂以善事祖母姑沒盡鬻嫁時衣以供喪葬二子皆入泮苦節五十三年黃章妾施氏題旌册章任襄陽知府卒於官氏仰天長號曰上有垂白之嫡下有襁褓之孤奚忍殉死而不身任其事耶遂堅貞自矢嫡素染瘋疾事之如姑一子出繼夫兄未嘗以猶子膜視守節一十七年邱智本妻吳氏題旌册年十七而夫疾竭力奉湯藥衣不解帶者三年夫沒長齋事佛侍奉舅姑曲意承歡喪葬盡禮撫孤慈嚴交至守節四十七年章煥如妻張氏題旌册年二十四夫沒無子繼姪為子撫教成立勤儉自持守節四十六年莫爾吉妻馮氏題旌册年二十三而寡念翁姑衰邁強延喘息以代子職逮翁姑相繼逝世竭力以營喪葬無子依女以居守節四十九年孫兆龍妻張氏題旌册年二十六夫亡一慟幾絶老姑在堂曲意承歡姑每語姻婭曰吾有此媳不為無子姑沒喪葬盡禮遺孤復殤擇猶子以續宗祧守節二十九年朱應龍妻胡氏題旌册年二十一而寡翁姑在堂雖家徒四壁而甘旨無缺皆從十指中出也翁姑先後沒喪葬盡禮教遺孤以義方守節四十四年許鼎文妻江氏題旌册年二十五夫沒矢志以殉父諭以舅姑年髙因感泣守貞姑患目眚虔禱於神親為餂拭目復明後舅姑相繼沒喪葬盡禮守節二十年朱維周妻謝氏題旌册年二十四夫亡閉户不食翁姑勉以大義乃繼姪為嗣勤針黹紡織以供菽水守節三十年樊長齡妻陸氏題旌册年二十三夫亡事堂上能以色養翁姑窀穸之事必身自執役雖沖寒冒雪亦所不顧遺孤婚娶復沒撫孫教以成立守節四十七年翁元嶽妻張氏題旌册年二十七嵗而夫沒時方有娠􅑷身自墜樓下久而獲蘇後遺孤生遍體青紫蓋腹中受傷所致也姑亡事舅先意承志得其歡心訓二子極嚴均以髫年入泮每逢忌辰縞衣蔬食哀泣如初喪值初度二子稱慶泣誓不受曰身不死尚何祝耶守節二十七年仲季超妻金氏題旌册年二十八夫亡絶粒欲殉念翁姑在堂飲泣為未亡人事堂上備得歡心翁姑沒殯葬不遺餘力無子煢煢孑立立志彌堅守節四十九年黃錢昌妻董氏題旌册年二十一夫亡哀號絶粒親族勸以撫孤延嗣乃矢志守貞足不踰閾姻婭罕覯其面數十年如一日教子義方毫無姑息守節三十八年金慎言妻方氏題旌册年二十八夫亡翁抱喪明之痛大病幾危旦夕籲天願以身代翁病尋愈偕老姑在堂孝養以終其天年遺孤一子一女婚嫁之費皆從十指中出守節三十四年沈與録妻計氏題旌册年二十二歲夫沒號泣暈地死而復蘇者再翁亦相繼亡事姑先意承志以供菽水遺孤方在襁褓日勤紡績延師課讀俾得成立守節三十六年程鵬瀚妾施氏題旌册年二十九歲而夫卒事主婦克盡敬謹主婦沒哀痛若喪夫遺孤方幼撫育成人守節二十九年沈象新妻孫氏題旌册年二十一而寡事舅姑撫子守節三十四年吳序昭妻袁氏題旌册年二十八而寡事父母以孝稱家貧勤針黹營葬翁姑撫子成立足不踰户言不出閫苦節二十八年張貞女題旌册名二姑許字朱聖迪年十九聖迪卒聞訃慟絶屢欲投繯父母防範之不得行且議改適姑誓死不從父母沒遂歸於朱舅姑相繼逝生事死葬無失禮守貞三十五年徐士鈺妻朱氏題旌册年二十七而寡事舅姑撫子守節三十年嚴肇文妻沈氏題旌册年十八而寡守節三十九年以上二十四氏俱雍正十一年具旨建題奉表坊旌唐士竒妻沈氏題旌册年二十八夫亡家貧勤女紅以給饘粥雖祁寒盛暑每至夜分不輟教子世科讀書不為姑息守節五十九年薑與濓妻諸氏題旌册年二十七夫亡事舅姑每食必潔􅎵瀡以進甚至衣資罄盡而於舅姑前笑言相慰勿使聞知撫教幼子有成守節二十八年程自康妻吳氏題旌册年二十四夫亡孀姑在堂曲盡孝養姑沒營喪葬盡禮撫子斯敏慈嚴並至守節四十九年孫國鼎妻趙氏題旌册年二十二夫亡事舅姑生養死葬教二子以義方守節四十年戴恩榮繼妻朱氏題旌册年二十五夫亡前室遺七女氏分已奩佐夫嫁其四其三尚幼氏子方孩抱家無期功近親氏隻身教育至男有室女有家并營葬其夫守節三十五年陸介蕃妻周氏題旌册年二十九夫亡遺腹生一子鞠育教誨嘗泣而告之曰若父不及見若之生若能成人是若父雖死猶生也甫成童而氏卒守節一十六年潘大煜妻解氏題旌册年二十一夫亡事舅姑孝撫幼子成立守節二十年季望妻陳氏題旌册年二十六夫亡舅姑老子幼辛勤十指以給薪水舅姑沒喪葬皆拮據經營教子能讀書守節二十六年鍾尚元妻楊氏題旌册年二十九而寡家貧藉女紅以養舅姑撫二子長家稍裕猶不肯一日自逸守節二十八年武祐晉妻呂氏題旌册年二十九夫亡截髮自誓撫襁褓子至於成立事舅姑養生送死無遺憾守節二十五年吳柳妾黃氏題旌册柳官濟寧州知州納氏為側室生二子一女柳亡氏年二十五閲二載嫡又亡氏事舅姑每食必親捧盤匜以進疾則衣不解帶侍湯藥沒喪葬盡禮教子煜文炯文成立女歸士族守節二十七年劉爾升妻張氏題旌册年二十八夫亡遺腹生子兆元氏幼而撫長而教荼苦備嘗俾得成立守節二十四年陳元吉妻唐氏題旌册年二十九而寡事舅姑撫子守節四十九年陳綺章妻諸氏題旌册年二十五夫亡事孀姑孝教子有成至老猶勤紡績足不踰户親戚無識其面者守節三十七年俞濤妻沈氏題旌册年二十適濤二十三夫亡子甫三嵗女未彌月舅姑在堂值歲飢已食粳籺而奉養無缺教子女成立守節三十年王朝瑛妻周氏題旌册父世傑無子贅朝瑛於家生二子朝瑛亡氏年二十九舅姑早喪遂居家養父母父母卒家益貧窘炊煙嘗絶隆冬猶衣葛處敗屋中遇風雨輒震撼將壓若有護之者已而地忽生藤蔓延屋上盤結交錯天成一竇如户牖通出入風雨攸蔽屋賴以固氏紡績教子其中逺近異之稱曰王寡婦藤室守節三十年謝之鼎妻李氏題旌册年二十五夫亡子甫晬舅姑在堂氏上事下撫備極勞瘁舅卒事姑尤孝謹守節二十六年吳禹臣妻趙氏題旌册年二十九而寡撫子女慈嚴並至薪水之資取給十指守節三十六年周士名妻俞氏題旌册年二十四適士名生子殤夫亡氏年二十七遺腹生子又殤繼姪以延夫祀守節四十二年姚昌宗妻范氏蔡茂功妻范氏題旌册范勝甫女也勝甫無子長女字姚昌宗年十七將遣嫁泣告父曰父膝下無兒女即子也妹尚幼兒去誰為侍奉聞舅有四子夫即出贅猶有三子承歡盍言之父遣媒請贅昌宗於家甫一載昌宗卒無子事父母益孝且時以針黹所入購甘旨以餉舅姑次女適蔡茂功年二十九而寡生二子姑沒舅在堂生養死葬盡禮父母卒與姊協力營窀穸以一子繼姊撫教成立為父母後范氏血食賴以不墜長女守節四十一年次女守節二十三年奚皓妻陳氏題旌册年二十六夫亡遺子五嵗氏葬舅及夫事姑孝教子具有法度性好施親族貧乏者多待以舉火守節三十三年張守泰妻楊氏題旌册年十七適守泰事繼姑甚孝姑亡守泰方依兄平陽官舍氏産女甫三日即起治含殮盡哀盡禮守泰兄以官帑待償廢其公産至無尺椽之庇氏依父家以居略無怨言兄沒復拮據以歸其喪初守泰死氏年二十九號慟幾絶水漿不入口者數日遺孤三俱幼乃強起撫孤日夜課讀俾克成立長子摰尤才俊名動公卿間氏守節三十三年傅子厚妻韓氏題旌册年二十八夫亡無子止一女事姑孝姑沒氏以針黹所入錙銖積纍數十年始得營葬并祔其夫於旁守節四十二年江光秀妻王氏題旌册年二十七夫亡無子養舅姑一十六年取給於紡績者為多舅姑沒負土成墳家益貧窘無依其弟迎養之守節四十三年方孝女題旌册名閣英父大化官廣西撫標中軍未之任卒於京閣英上有三兄長依婦翁於粵東次就幕入閩季事戎伍閣英獨與母居有欲締姻者閣英曰諸兄逺離膝下兒願效古之撤環瑱至老不嫁者母勸之不從乃聽之事母先意承志母病奉湯藥目不交睫沒則哀毁骨立水漿不入口者三日諸兄歸為父母卜葬閣英悉出所蓄以襄事後有顯者喪偶聞其孝遣媒議姻諸兄欲許之閣英曰吾年逾三十安能復向人作新婦粧且彼宦遊無定吾終不忍離父母墳墓也遂依諸兄旨建終其身坊旌表以上二十六氏俱雍正十二年具題奉吳觀圭妻汪氏題旌册觀圭客死嘉定氏年二十五舅七旬失明一女六嵗子三歲氏上事下撫備極勞苦舅沒事姑尤孝謹母病歸寧值風雨室傾壓瓦礫中人疑為死矣出之無恙逺近異之後為子女營婚嫁心力俱瘁嬰疾不起守節一十六年周兆鑑妻江氏題旌册年二十六夫亡遺孤幼居廬被火所親悲其困乏氏安於義命守節一十六年卒劉于生妻倪氏題旌册年十九夫亡無子孝養舅姑舅姑沒氏年方艾旁無族屬有勸之他適者氏曰劉氏絶矣我縱不能為身後計然我在則血食猶未斬也貧不自給依母家以終老守節六十五年卒潘之謙妻屠氏題旌册年二十七夫亡遺孤幼撫之及長教以義方守節一十九年卒莊鼎鈺妻張氏題旌册年二十九夫亡五子俱幼室廬遭燬舅姑老且病常臥床褥氏拮據湯藥荼苦備嘗舅姑沒鬻衣資營葬其夫及夫之昆弟六棺並祔焉守節一十九年卒王玉宇妻李氏題旌册年二十八夫亡一子幼氏勤織絍教子成立守節三十四年蔡煓妻沈氏題旌册年二十二夫亡未幾舅又亡事繼姑孝撫姪肇麟為嗣守節二十九年蔡朴菴妻朱氏題旌册年二十三夫亡一子在抱家貧日夕勤女紅糊口嚴冬酷暑夜漏三下猶不輟守節三十五年周璽妻仲氏題旌册年二十九夫亡遺二子一女絶無依倚氏矢志不二工蠶歲常倍收有轉貸其種者亦如之自是名聞逺邇爭貿周節婦家蠶種家稍裕遂得撫其子女畢婚嫁守節二十四年黃巨源妻蔣氏題旌册年二十六夫亡遺腹生子嗣瑗撫之長教以義方為娶婦諸孫繞膝守節三十六年龔培和繼妻丘氏題旌册年二十八夫亡子女四人前室出者二家素貧復遇歉歲氏上事老姑下撫子女凡虀鹽薪米無不出自十指間守節三十六年俞俊妻邵氏題旌册年二十夫亡時曾祖姑祖舅姑舅姑三世俱存痛俊蚤夭遺孤孱弱慮氏年幼難自立氏誓不二天閨門整肅三代尊人相繼沒喪葬如禮子長娶婦生孫守節三十八年方繹如妻孫氏題旌册年二十八夫亡子方周歲家貧衣食不給歸依父母撫訓其子成立守節二十九年顧元吉妾馬氏題旌册元吉卒氏年二十八正嫡年逾六旬生四女氏一子氏事嫡如姑佐之婚嫁嫡亡哀毁過禮教子有成守節二十三年黃獻可妻余氏題旌册年二十七夫亡子幼氏撫訓成立事舅姑生則盡養沒為營葬守節五十六年方尚震妻吳氏題旌册年二十四結褵甫三月夫亡立姪肇賢為嗣事孀姑孝姑臥病經年侍奉湯藥無少懈及沒力營喪葬不以貧而儉其親守節四十五年裘峵生妻陳氏題旌册年二十七夫亡子女俱幼勤紡績以事姑完子女婚嫁守節二十六年陳昌妻閔氏題旌册年二十二夫亡舅姑在堂舅妾生一子氏念夫無後似續惟叔是賴自襁褓至成人皆氏撫訓守節三十八年仲貞女題旌册仲子亮之女許字吳廷俊婚有日矣廷俊亡女闔户投繯救蘇父母環守之乃縞素奔喪事舅姑能得歡心撫姪為子以延夫祀守貞三十四年以上十九氏俱雍正十三年具題候旌朝教謹按前明列女悉據舊籍登載我人女子皆知勵化日隆表章特著故窮鄉僻壤婦旌典名節敦孝行較之前代尤不勝書凡已邀册內失者均據題旌册年次先後備列於前其有載或未經旌表散見志乘文集及由地方官據各學公舉核實申報者均附録於後至志乘中之事迹略同限於卷帙不能備採立傳者謹紀姓氏如前例趙氏二節錢塘縣志勞氏廣德州守趙景和妻秦氏其妾也值馬士英亂兵沿途殺掠過州景和不納士英怒縱火攻城遂遇害勞欲自剄庶姑朱以藐孤當撫止之崎嶇戎馬間扶櫬歸杭荼苦備至教子蒼璧成進士官御史秦氏聞景和被殺密縫衣裾升樓躍入眢井死州民殮之顔色如生章一桂妻髙氏舊浙江通志歸章十月而寡姑徐寢疾厠牏浣濯逾年不厭姑且死執髙手曰願來生更為而婦髙經理姑喪貧益甚苦節六十年而卒施氏二節錢塘縣志徐氏施繼山妻繼山卒氏年二十遺孤三人家貧以針紉為業每瀝粥為飯飯子而自飲其瀋其次子有坤婦經氏年二十餘夫死守節綽有姑風謹按有坤舊通志府志俱作施士今從施氏苦節録改正張氏四節杭州府志沈氏張埁副室汪氏張堯彩妻朱氏張翥妻周氏張英妻沈年二十四埁沒服滷而死汪年二十二夫故厯四十九載完節而終朱與周其姪婦也朱以翥沒屢欲自盡父防之嚴不得死及撫孤稍長遂從容成其初志以瞑周亦早嫠苦節四十餘年人以為一門四節許鼎昌妻尚氏舊浙江通志事姑以孝聞姑死長號曰姑捨我去安往乎一慟而絶吳至乙妻姚氏舊浙江通志結褵期年至乙疾姚刲左臂進卒不起未幾姑疾刲右臂為糜卒亦不起兩臂創甚養疴母家已病且革舁繩牀歸強扶再拜與親訣曰非不知魂魄依父母也顧女有家義不可去仍返吳氏之寢曰得死所矣遂瞑汪亢宗妻鮑氏錢塘縣志亢宗病亡氏欲以身殉舅姑勉以立孤乃止已而二子俱殤氏遂閉户服滷死徐茂芳妻孫氏舊浙江通志年十七適徐甫五載而茂芳卒遺孤僅六月且茂芳同胞二人皆貧早逝無子孫氏旦夕焚香告天曰徐氏三枝共此一兒願天佑使成立惟教以義方不為姑息長姒趙亦早寡守志有同德焉項育禎妻張氏杭州府志育禎覆舟死氏奔赴投江以救得生守節撫孤始終如一逮子景修婚畢遂決意絶食而死其媳何氏夫喪亦矢志茹齋縞素人交頌之蔣佺妻徐氏舊浙江通志佺未婚失明姻戚謂佺無受室理徐聞之曰古人不以婦瞽棄成言吾敢以夫瞽有他志耶誓死嫁佺甫二年佺卒立志守貞以終其身顧氏二節杭州府志蔣氏毛氏妯娌也蔣為顧儒英妻儒英死蔣剪髮明志茹苦食貧教子讀書儒英弟竒英娶毛氏婚十月而竒英沒無子女空樓獨處五十三年年七十餘卒沈杰妾張氏杭州府志杰卒張年二十九家貧父母欲奪之不可會豪強強委禽張嚙指出血斷髮自誓晝夜織作以事其嫡嫡疾割股以進杰柩未殯百計營葬教兩孤成立年六十六卒張所修妻汪氏舊浙江通志年二十四所修得疾不起以目視汪曰吾死汝何如汪泣即舉刀斷一指曰設有不虞以此指先殉君地下吾當忍死教孤敢有他志乎所修乃瞑汪後夫三十年卒胡雲鵬妻王氏舊浙江通志年二十三夫沒以簪刺喉流血仆地子遵仁八歲痛哭抽簪出乃得蘇於是散髮毁面窮居守貞課子成立邵周書妻陸氏錢塘縣志年十九歸周書周書卒時陸方娩身抱孤隕涕曰天如不絶邵氏我當作未亡人十五年聞者弗為意也名孤曰芳逮年十五出應試陸謂曰汝可自立我將報汝父地下矣芳驚訝陸曰戲耳詰旦自縊死製衰絰及遺命皆預存簏中殮之日容色如生查梓妾王氏錢塘縣志梓客秦娶氏年十五挈歸浙中食貧操作者十年梓沒氏即服滷死吳錫妻戴氏毛竒齡吳烈婦墓志錢塘學生吳錫字天與比鄰戴氏女年十嵗父死哭泣過哀幾失明人以孝女呼之因聘焉年十六合卺病十八天與鄉試下第遂致病越三年死當天與時戴侍湯藥不脫衣知不治請先死天與曰吾未死而汝死是以死促我也戴泣而止天與將屬纊呼弟鑰曰汝嫂將必死我死囑家人伺之天與死以戴以首觸棺碎首血被面家人環伺之絞以巾刺裙刀凡求死者七最後吞金不得死乃密壞玻璃瓶吞其廉腸斷嘔碧血數升死距天與死時凡四十二日時康熙二十七年某月日也年二十二里人建祠於西湖葛嶺下曰吞金祠髙良妻童氏錢塘縣志良傭舂其舅陳四為輿夫傭巨商家瞰甥婦有姿色故虐使良不令與其婦合未逾年良死四隂計欲以氏獻某商為妾氏哭詈彌甚絶粒七日而沒未幾四暴疾卒翁常節妻孫氏妾滕氏杭州府志常節沒滕絶食死未幾子駿業亦死孫與媳孫氏共厲志守節郭貞女錢塘縣志海寧郭斗山女錢塘吳唐所聘也唐卒氏登門拜姑嫜服衰絰守繐帷厝夫棺於祖墓側翁姑沒父挈歸海寧衣縞茹素不聞笑語卒與吳唐同穴熊氏二烈公舉事實熊應鳳妻陳氏及其妾繆氏也應鳯官遊擊守溫州磐石營順治十五年海寇陷城應鳯不屈死二氏曰吾夫盡節我二人不死臨難茍免非烈女子也遂相與投繯而絶時陳年三十鏐年二十三羅育萬妻楊氏公舉事實年二十二歸羅三年夫沒姑已亡惟翁在堂子甫襁褓氏忍死事翁撫子越四載翁沒子痘殤氏泣曰吾所不死者以有子也今已矣遂絶食死時年二十九周墀妻俞氏公舉事實夫亡止一子錚甫離襁褓鬻手以給饘粥子稍長督課甚嚴中雍正癸卯副榜人稱母教云徐嘉謨妻金氏公舉事實性至孝年九歲母疾焚香告天終夜號泣願以身代及歸徐事舅姑先意承志姑嘗患癰醫不能治氏以口吸膿血手奉湯藥衣不解帶者三十七晝夜姑遂瘳翁貧而好施有姚姓以飢鬻子翁憐其幼而不言氏典衣飾以贖之嘉謨卒於京邸柩不能歸氏紡績二年常㸑火不舉而積資以奔喪後長子殁媳龎氏以死殉人稱節孝萃於一門張世韺妻姚氏公舉事實世韺館於外氏事繼姑孔克盡孝敬姑性嚴厲氏委曲承願一膳必察其旨否一寢必時其寒暖先意承志能得其歡姑患乳癰至危篤氏侍湯藥拂拭吮舐不辭汚穢至痛楚輒籲天求代姑沒哀毁逾節相夫力舉三喪宗黨咸稱其孝陳氏三節題旌册庠生陳嘉起字又虞之妻王氏年十七歸又虞甫七載而寡事舅姑能盡子職歲乙酉潞王竄杭人心煽惑氏奉姑暨母攜孤孥避嚴州建德之大洲村值方馬弄兵抗王師賊首艷氏才色強委幣聘氏曰吾固有以報夫子賊至搴帷視之赫然髮絶容毁血流衣裾矣相顧駭愕戒勿犯而去姑則驚悸不起治棺衾如禮賊平迎喪歸葬又值耄舅大故赤手拮據如禮一如喪姑時守節三十七年子士録字甄侯婦方氏孫嗣源婦汪氏皆以節孝聞方氏年十六歸甄侯既失所天哀毁幾絶念姑以節烈待旌而哀哀遺孤又一線千鈞之重非撫以長何以慰吾姑強起教育成立守節二十五年汪氏本世儒家知大義事孀姑盡孝教子以文名而恬恬愈愈能以苦節自甘者守節二十五年長子梓以三氏節孝請題俱得奉旨旌表吳士龍妻丁氏吳興周妻馮氏金志逺妻唐氏金大章妻毛氏裘昌嗣妻徐氏凌克開妻陶氏朱志達妻車氏楊天驑妻汪氏金萬鈞妻沈氏姚垣妻陸氏薑士鑑妻徐氏段起鴻妻陳氏嚴渤妻陸氏吳俊妻侯氏王豫賓妻潘氏曹守紀妻王氏王世祚妻許氏童必昌妻韓氏張懋德妻李氏徐可大妻嚴氏金祖錫妻張氏傅相妻路氏沈昭逺妻劉氏陳博學妻陸氏周羽侯妻馮氏錢彪妻李氏錢俸妻于氏楊志明妻張氏王英妻許氏梁欲濟妻徐氏吳果妻髙氏潘開暘妻翁氏竇尚璉妻蘇氏沈起龍妻俞氏吳農復妻章氏吳容妻陳氏吳爽妻張氏吳望中妻汪氏俞德輿妻章氏劉廷獻妻程氏妾惠氏王聘妻陳氏朱頴蕃妻趙氏翁遵厚妻何氏戴原育妻潘氏馬必科妻李氏李茂芳妻嚴氏蔡岑妻余氏劉兆選妻吳氏朱南絃妻吳氏周奭妻沈氏金之翰妻吳氏胡爾橙妻吳氏張昌裔妻趙氏陸鴻妻俞氏徐實妻陳氏盧程京妻陳氏吳德同妻程氏徐德厚妻沈氏周攀桂妻黃氏孔聞韶妻沈氏章茂叔妻屠氏胡雲上妻范氏鄭淵妻張氏薑與濓妻諸氏潘士第妻汪氏蘇瓚妻王氏范武音妻朱氏孫淵妻裘氏宋緒山妻沈氏錢允昌妻湯氏金頴實妻錢氏鍾卞妻錢氏金建烈妻方氏洪雲渼妻陸氏孫允昌妻程氏張文治妻汪氏吳賓賢妻程氏彭繼周妻朱氏陳其善妻徐氏謝天恩妻王氏查克澄妻徐氏陳煥妻郁氏陳有相妻沈氏趙啓禎妻金氏潘杓煥妻陳氏潘堯日妻陳氏盧鴻勳妻邵氏戴允中妻徐氏勞偉妻張氏汪元璇妻畢氏茹兆之妻顧氏胡承虞妻方氏浙江通志卷二百二
