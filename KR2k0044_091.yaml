汛兵二十名分防千嶺將台協防守金清洋嶼二汛之兵丁撥一百四十五名又於衢協存城額兵內撥出九十名合共二百三十五名添入太湖營則裒多益寡庶得實用等語應如該督所請準其抽撥調度以資防禦其湖內地方原係兩省交會遇有警息仍飭令該遊擊協同江南將備實力搜勦儻有彼此岐視互相推諉者立即題參照不行窮追例嚴加議處又疏稱太湖營既議添兵則一營之兵馬錢糧必須中軍守備為之綜理且大錢汛口為浙省咽喉要道原駐之守備既調歸江省應請添設守備一員以資彈壓其守備員缺聽部銓補等語亦應如該督所請準於大錢汛口照原制添設守備一員以資彈壓湖內遇有警息亦應仍照舊制令該備隨本營遊擊會同江南將備協力搜勦務祈湖干寧謐盜賊潛消其應撥船兵行令該督酌量派撥仍將該營官兵分防湖口汛地撥防船隻兵丁并將台衢二協抽撥兵丁數目各造細册報部等因奉此該本司查得太湖營制界連江浙沿湖各汛汊港紛岐額設官兵不敷分派巡防先蒙核疏具題大錢汛口添設守備一員於衢台二協抽撥戰守兵丁二百三十五名歸入太湖經制分防奉準大部覆允行令造册報部遵即轉移查取各册去後今準太湖并衢台等協營將分防湖口各汛配駕巡船并抽撥召募兵丁花名年籍細數開造各册前來本司彚造清册現在詳請核咨送部再查抽撥衢協戰兵二十七名守兵六十三名台協戰兵四十三名守兵一百二名共戰守兵丁二百三十五名應支兵餉即於抽撥衢台二協經制額餉內於雍正五年十月初一日彼此收除扣歸太湖兵丁支領銷算但添設大錢汛口守備一員奉旨將本營千總張雲煥補授於十月初六日領劄任事至年終應支俸薪等銀並無原估額設俸乾相應於本營奉撥餉欵下剩銀內支給歸入太湖營雍正五年兵馬奏銷册內造報聽候查核至抽添兵丁營房在所必需前經詳奉批司於解司羡耗公欵內支給已經遵照動支銀一千五百兩給發該營自為建造在案擬合一併詳明統候察核咨部到院為此合咨貴部煩請察照施行雍正七年三月浙江總督管理巡撫事務臣李衛題為遵旨查議事該臣看得湖協額設哨船三十隻準部咨發條奏以湖地情形港窄橋低汛多船少議於修造時少變其制將船改小每船約省工料又可多造小船分配各汛以資巡緝等因請旨交臣詳確查議今據布政司布政使髙斌詳稱查湖協額設快船三十隻原係身長三丈九尺板艙重疊梢篷尾大如遇支河小港橋梁低窄之處勢難駕馭巡緝議將二十隻減去七尺改為三丈二尺長巡船即將二十隻節省改小之費添造二丈餘尺長之小巡船二十隻即或工價稍有不敷增補亦是無多仍留額設原船十隻共計五十隻照依原定金字編號分派大小各汛巡查甚為有益應如條奏所議而行於來嵗屇當小修之期給以大修之價更改拆造以副巡防再查太湖營沙船八隻原係身長七大在湖面波浪之中乘風迅駛實為得力一至沿湖漊瀆橋低港窄無風難以動搖議留沙船六隻為湖中大汛巡防以沙船二隻拆造之費量增改造二丈四五尺快船二十隻酌量分防俾太湖邉之通達支河雜港向無設立巡船之一十九汛均得各派小船分防巡哨并稱嘉協水港雖較湖協稍寬但支河哨捕情形同屬一體應於屆修之期查明照例量為更改添造等情詳請具題前來臣詳加確核水鄉哨捕原藉巡船而因地制宜各隨所用支河窄港非大艘所能遊行尾大篷髙又駕馭不甚靈便若遇逸賊由低橋竄入小港則大船莫能窮追今即以原設大船修造之價酌量增補改添小船分派各汛巡防是費不多加而船可足用又靈捷便駛易於哨巡均應如議更改添造以資汛防相應具題兵部以應如所請覆奏奉旨依議雍正九年十月兵部為江浙事同一例等事會議得江南總督髙其倬會同浙江總督李衛等疏稱太湖界連江浙地勢廣逺汛兼水陸盜匪易潛雍正九年經前任督臣查弼納題請添設江南太湖左右二營浙江太湖一營及步戰守兵并巡船分隸巡防於水汛實為周密惟該營陸汛江南則轄有洞庭東山又兼荆宜無陽四邑地方湖營汛口俱屬陸地浙江則東自震澤西至荆溪兼洞庭西山向來盜匪往往潛匿均宜酌量稍設馬兵以資巡防伏查江南太湖營額設步戰守兵九百三十名浙江太湖營額設步戰守兵六百五十八名雖係水師實兼有陸汛請比照浙江定海玉環等營之例於江南太湖營量添馬兵七十名浙江太湖營量添馬兵五十名即於各營原設步戰兵內考拔仍於該營額設守兵拔充步兵以足原設步戰之數其拔戰守兵之缺毋庸再補以符原額至所添馬匹請於各營解存司庫朋扣銀內動支購買其應行增給糧餉及馬乾銀兩於該營扣存建曠銀內動支造入該年兵馬奏銷册內報銷如此則江浙兩省太湖營汛巡防益獲兼資之益等因應如所請準其添設選拔購買馬匹可也奉旨依議浙江通志卷九十二
