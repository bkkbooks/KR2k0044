body:
  text: 浙江通志卷九十二兵制三國朝各府協鎮城守水師分防杭協城守營𨽻提督管轄經制額設副將一員中軍都司僉書一員原設二員順治七年裁一員舊設守備二員七年裁一員十年裁一員千總二員把總四員外委千總二員外委把總四員俱於雍正五年添設有馬戰兵八十四名外委千把總六名在內無馬戰兵一百五十七名原額一百六十三名康熙三十五年為欽奉上諭事裁去一十八名又遵兵一十四名內十二名係旨議覆事派添京撥無馬戰各營京撥裁缺二名係本營原設守兵六百一十六名原設五百九十五名上諭康熙三十五年為欽奉事裁去七名又為遵旨議覆事派添京撥守兵三十二名內二十八名係各營京撥裁缺四名係本營原設各官自備坐馬二十八匹兵丁官給馬八十四匹駐劄省城副將一員都司一員千總一員外委把總一員有馬戰兵六十九名外委把總在內無馬戰兵九十四名守兵二百四十名各官自備坐馬一十八匹兵丁官給馬六十九匹分防北新關汛并八仙石炮臺十座千總一員外委把總一員有馬戰兵二名外委把總一名在內無馬戰兵十六名守兵一百八名官自備坐馬二匹兵丁官給馬二匹分防臨平鎮兼管新塘白澤廟劉家坂大均鋪黃天蕩章婆弄橋司戴家壩天開河翁家埠炮臺十座把總一員外委千總一員有馬戰兵三名外委千總一名在內無馬戰兵十名守兵七十名官自備坐馬二匹兵丁官給馬三匹分防海寧縣并海口潘家壩等處炮臺十八座詳見海防把總一員外委千總一員有馬戰兵五名外委千總一名在內無馬戰兵二十名守兵六十三名官自備坐馬二匹兵丁官給馬五匹分防餘杭縣把總一員原係錢塘水師營管轄後於康熙五十七年為欽奉上諭事將鱉子門歸於錢塘水師營河莊山汛管轄其餘杭縣歸城守營管轄有馬戰兵二名無馬戰兵十二名守兵五十八名官自備坐馬二匹兵丁官給馬二匹分防臨安縣外委把總一員有馬戰兵一名即外委把總守兵二十名兵丁官給馬一匹分防於潛縣把總一員有馬戰兵一名無馬戰兵五名守兵三十三名官自備坐馬二匹兵丁官給馬一匹杭協錢塘水師營隸提督管轄經制額設守備一員原設左右二營遊擊各一員順治八年裁左營各官改右營為錢塘水師營十年裁遊擊改設守備千總二員把總四員外委千總二員外委把總三員俱於雍正五年添設有馬戰兵六十四名外委千總二名外委把總三名在內水戰兵一百二十三名原設一百二十四名康熙三十五年裁一十一名雍正七年十月添設十名水守兵四百六十九名原設四百五十一名康熙三十五年裁四名雍正七年十月撥添二十六名各官自備坐馬一十四匹兵丁官給馬六十四匹駐劄省城守備一員雍正九年改錢塘水師營守備街為都司僉書馬步戰守兵丁共一百六十六名內馬戰兵五十一名水戰兵五十四名水守兵六十一名官坐馬四匹兵丁官給馬五十一匹分防鱉子門河莊山兼管司城一座唬船四隻炮臺一座千總一員原係杭州城守營海寧汛管轄康熙五十六年閩浙總督滿保題請將水師營原防餘杭汛派歸杭州城守營其海寧汛所轄河莊山汛歸水師營輪派千總一員帶兵巡防外委把總一員馬步戰守兵丁共八十一名內有馬戰兵二名外委把總一名在內水戰兵十名水守兵六十九名官坐馬二匹兵丁官給馬二匹分防新城縣千總一員外委千總一員馬步戰守兵丁共二十五名內有馬戰兵二名外委千總一名在內水戰兵二名水守兵二十一名官坐馬二匹兵丁官給馬二匹分防塘棲鎮把總一員外委把總一員馬步戰守兵丁共九十五名內有馬戰兵二名外委把總一名在內水戰兵九名水守兵八十四名官坐馬二匹兵丁官給馬二匹分防錢塘江把總一員外委千總一員馬步戰守兵丁共一百八十一名內有馬戰兵四名外委千總一名在內水戰兵二十八名水守兵一百四十九名官坐馬二匹兵丁官給馬四匹分防富陽縣把總一員外委把總一員馬步戰守兵丁共一百八名內有馬戰兵三名外委把總一名在內水戰兵二十名水守兵八十五名官坐馬二匹兵丁官給馬三匹錢塘水師營管轄防守河莊山唬船四隻防守運河內河快唬船一十一隻錢塘江渡馬船六隻共船二十一隻杭協城守水師二營共二十四隊每逢操演日期會同撫標左右二營齊赴欏木營教場操演武藝擺列陳勢詳見撫標城守營器械鐵盔甲八十四頂副鐵碗盔七百七十三頂棉甲七百七十三身排鎗三百桿大刀二十九把片刀五十把長鎗十桿馬鋼又二十把鈎鐮鎗十桿單刀六口藤牌六十二面五色綢緞旗一十面桿緑緞紅鑲大小旗七十二面桿督陳紅緞旗十二面桿救火綢旗二面桿救火布號挂五十六件帳房五十頂鑼鍋五十三口水飾營器械鐵盔甲六十四頂副鐵碗盔五百六十頂棉甲五百六十身排鎗二百五十桿三眼鎗十四桿弓九張箭二百一十枝腰刀一百二口片刀四十五把馬綱義三十一把鈎鐮鎗十五桿斬馬刀八把單刀四把藤牌五十面五色綢緞旗一十面桿緑緞紅鑲大小旗七十二面桿督陳紅緞旗十二面桿救火綢旗一面桿救火布號挂四十四身帳房三十七頂鑼鍋四十三口杭州城守水師二營現存頭號紅衣炮一位守護城池二號紅衣炮二位守護城池三號紅衣炮八位安設海寧縣河莊山炮臺四號紅衣炮四十三位內安設鳳凰山炮臺六位存省守護城池三十七位五號紅衣炮一位守護城池銅百子炮二位鐵百子炮十四位俱配河莊山唬船趕征炮十位守護城池行營炮二十四位施放各轅門并定更號炮應用劈山炮十二位給兵操演又續報衝出銅炮一位奉裁都司交存威逺炮二位存營行營炮五十三位存營淨瓶炮三位存營劈山炮三十六位存營雍正七年兵部為遵旨議覆事議覆浙江總督李衛奏稱浙省自杭州起至京師沿途設立塘撥兵丁二百四十二名凡閩浙二省一應京報部文及咨行外省俱各兵晝夜飛遞此項兵丁其初在浙江各標鎮協營按其衝僻均勻撥派安設仍給本等糧餉嗣後有事故者皆北直山東土著人民頂充臣查其設立原委順治三年前浙閩督臣張存仁任內題請設立提塘在京接抄沿途撥發塘兵常川派守一遇邸抄部文星速飛傳至今八十餘年維時節制兩省是以連福建一併傳送再查康熙四十八年兵部議覆原任川陜總督齊世武請裁陜西塘丁塘騾一案內開在京各衙門一應外發緊急公文差官從驛遞馳送尋常公文俱交提塘付塘丁傳遞若將塘丁盡裁交與驛站馳送驛站必致苦纍應將塘兵照舊留設不動正項錢糧令各該管官捐助支給通行直省又上年原任山東巡撫塞楞額以東省京報塘撥兵丁俱係撫標派出請行撤回隨伍差操經兵部議準令提塘將貼塘銀兩雇募承充均在案此各省皆有塘丁而動支給發之處則未嘗畫一臣查山東去京尚近浙閩遙隔數省一切兵機軍務全藉塘撥飛馳呼應極靈若將兵丁盡撤俱責之驛遞則各站不勝勞苦儻仍復設工食亦令公捐徒托空言有名無實雇丁安能枵腹勢必久而星散貽悮匪細在東省原有貼塘銀數千兩可以湊給浙江並無此欵其各官看報銀兩合省止有一千八百兩不敷在京在省提塘一切抄寫報資紙張工本等費豈能以此雇募如許塘兵臣細查京報部文皆有定限遞送一遇遲悮逐塘挨查立可究出若分任他省儻有沉失耽擱既多移咨轉行之煩難免支飾揑覆之弊此事勢之不可行也臣愚以為東省塘丁獨派撫標以致兵伍缺少浙江係通省撥出即使撤回每營所添無幾塘務一有廢弛所關甚重應否將撥兵照舊安設支給抑或將各營名糧收歸召募補伍仍用現在之人按照向日所給餉糧米數於恩賞備公欵內動給之處伏乞聖主指示欽遵等因應如該督所請將各營原派名糧照數收歸各營另行募補差操以實營伍其現在塘撥兵丁應需工食銀兩按照向日所給銀米數目於恩賞備公銀兩動給又奏稱杭州省會衝衢差繁汛廣嘉湖二協皆屬水鄉地方遼濶此塘撥兵丁酌撥杭協八十二名嘉湖二協各均給八十名使之配足汛防分派巡緝而兵餉無庸加添要地可資防範等語亦應如所請照數撥給可也奉旨依議雍正八年七月浙江總督管理巡撫事務臣李衛題為敬陳禁城重地等事該臣看得杭城周圍四十餘里地方廣濶向於十城門及水門甕城等處設有滿洲漢軍緑旗官兵輪班看守而城上未設暮夜巡邏之兵是以姦巧棍徒每有包攬商稅於夤夜深更伺巡兵已過將貨物縋城偷漏等弊屢經拿獲分别究處各在案上年經署將軍臣性桂條議請於城上派委官兵棲宿專司巡邏稽查酌動鹽務節省盈餘之銀建造營房等因欽奉諭旨此項當動用公用銀兩另議具奏欽此咨移到臣遵即行司查估省會十門城上應建營房窩鋪除望江門起至候潮門止中有水門係滿兵看守又候潮門起至鳳山門止相近未及一里均無庸添造外其餘惟鳳山清波慶春艮山四門因跨山近河偷漏較便應於鳳山門起至清波門止共建三處清波門起至湧金錢塘武林等門各建一處武林門起至艮山慶春等門各建二處其慶春門至清泰望江等門各建一處以上共建窩鋪一十二處每處鋪房三間竈披一間木坑三口請於雍正八年恩賞公欵銀內動支興建現在於此十二處會同將軍臣阿里袞酌量委官每處派兵八名輪班書夜專司巡查奉旨該部議奏部覆應如所請行奉旨依議嘉興營隸總督管轄額設遊擊一員原設副將順治十一年改設遊擊駐劄海鹽縣左營守備一員駐防府城千總一員把總四員右營守備一員駐防乍浦千總二員把總四員康熙五十年閩浙督臣范時崇題為請酌衝緩等事準改遊擊為副將駐劄府城彈壓七邑左營守備移駐海鹽縣城額設馬步戰守兵丁一千三百七十九名原設一千四百六十九名康熙二十一年為各省保泰之微權事陸續裁減無馬戰兵二十五名守兵二十五名三上諭十五年為欽奉兵三十名守兵一十名現在兵丁事裁去無馬戰共一千三百七十九名內有馬戰兵一百四十二名無馬戰兵二百四十三名守兵九百九十四名各官坐馬自備兵丁官給馬五十匹快唬船共三十隻駐劄嘉興府城副將一員中軍都司一員舊設中營都司僉書等官順治七年裁十一年又裁左右營都司僉書各一員雍正七年九月添設中軍都司一員係嚴協右營都司裁補千總一員把總一員馬步兵丁共四百三十二名快唬船五隻駐防海鹽縣城左營守備一員康熙五十年奉文移駐馬步兵丁共一百七十五名快唬船三隻臺寨九座駐防乍浦所城右營守備一員千總一員康熙五十七年將斜塘汛千總一員兵丁二十名歸入乍浦營額內分防西山嘴汛其斜塘汛并餘兵分入嘉善王江涇二汛馬步兵丁共二百一十三名快唬船二隻向設臺寨一十九座康熙五十六年閩浙總督覺羅滿保閲視沿海事宜題請增築乍浦天妃宫西山嘴等處炮臺撥兵守禦分防澉浦所城把總一員馬步兵丁共一百名快唬船一隻臺寨九座分防石門縣城千總一員馬步兵丁共一百一十名快唬船四隻分防桐鄉縣城把總一員馬步兵丁共七十六名快唬船二隻分防濮院汛把總一員馬步兵丁共六十六名快唬船三隻分防新城汛把總一員馬步兵丁共四十名快唬船一隻分防平湖縣城把總一員馬步兵丁共九十九名快唬船三隻臺寨二座今添築獨山寨炮臺一座撥兵守禦分防嘉善縣城把總一員馬步兵丁共七十四名快唬船二隻分防嘉興汛把總一員馬步兵丁共六十九名快唬船一隻分防王江涇汛千總