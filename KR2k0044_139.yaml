body:
  text: 浙江通志卷一百四十選舉十八明舉人萬厯二十五年丁酉科張應元鄞人王三才蕭山人辛丑進士楊守勤慈溪人甲辰會狀林把杭州人溫體仁烏程人戊戌進士李舒春杭州人莊學曽鄞人樂安知縣張九德慈溪人辛丑進士邵炳文餘姚人孫世芳會稽人馮盛典嘉善人辛丑進士吳尚文武康人馬中騋建德人癸丑進士李橒鄞人辛丑進士莊則孝嘉善人辛丑進士王德坤烏程人辛丑進士羅顯德慈溪人葉其蕃西安人戊戌進士錢夢祖桐鄉人劉廷元平湖人甲辰進士周吉士富陽人周夢可慈溪人陳論上虞人孫繼祚杭州人黃景章鄞人丁未進士胡震亨海鹽人定州知州曹震陽海寧人丁未進士商周祚會稽人辛丑進士錢象坤山隂人辛丑進士魏仕傑桐鄉人澄海知縣葉起元紹興人施時壵平湖人同知張邦豫奉化人工部司務陳璘山隂人壬戌進士盧洪圭東陽人癸丑進士王光經永嘉人丁未進士方堪新城人楚雄知縣趙應貴餘姚人陸元經紹興人王猷慈溪人戊戌進士陳九級新昌人張時永嘉人俞光寰紹興人徐應龍衢州人劉宗周山隂人辛丑進士范汝梓鄞人甲辰進士沈萬鈳嘉善人林紹明會稽人甲辰進士袁仲錫慈溪人知州蔡演傳德清人商之彞淳安人松江通判張把烏程人勞永嘉崇德人辛丑進士趙爾昌仁和人戴啓星烏程人陸典崇德人辛丑進士金仲卿東陽人上虞教諭吳大英杭州人徐如瀚上虞人辛丑進士徐良棟上虞人辛丑進士楊汝升慈溪人應朝玉仁和人己未進士蔣一聰餘姚人辛丑進士趙邦竒蘭溪人沈士麟仁和人李春光縉雲人應鳴時仙居人薛思順上虞人沈士龍秀水人朱勳鄞人松江同知林自芳仁和人胡惟忠武義人董光宏鄞人辛丑進士陳光祖嚴州人余德仁和人沈孚先嘉興人戊戌進士李振玉鄞人諸允修仁和人辛丑進士柴紹勳仁和人癸丑進士陳王道分水人黃公敏昌化人施梁歸安人庚戌進士張明憲歸安人知縣王國柱錢塘人趙嗣薦樂清人同知胡爾慥德清人甲辰進士潘紹淵湖州人陳用行台州人宋德洪餘姚人連江知縣吳仲偉海鹽人戊戌進士以下十九人順天中式茅瑞徵歸安人辛丑進士王舜鼎會稽人戊戌進士邵景堯象山人戊戌榜眼邵士斗桐廬人項鼎鋐秀水人辛丑進士張蔚然仁和人朱懷吳錢塘人李邦耀麗水人辛丑進士江鏐仁和人陳汝元山隂人同知葉士元慈溪人朱汝鼇長興人甲辰進士張子槐龍遊人河曲知縣陳嘉言會稽人謝錫教海鹽人陳承寵青田人閔洪學烏程人戊戌進士張柳芳鄞人丙辰進士金城湯溪人開州知州沈綰會稽人以下十人應天中式莊元臣歸安人甲辰進士黃三䇿餘姚人錢若任鄞人吳邦相仁和人辛丑進士潘名卿烏程人主事吳士熙錢塘人莫士元嘉善人王承恩會稽人陸時選秀水人王重巽會稽人以下三人雲南中式嚴實嘉興人嚴官嘉興人吳德光嘉興人以下四人貴州中式董紹舒山隂人戊戌進士葉可行西安人郁王瑛嵊人雲南副使萬厯二十八年庚子科葛寅亮錢塘人辛丑進士朱文敬錢塘人侯應賓樂清人甲辰進士陳志登上虞人陸昌祚烏程人鹽運判婁光逺嘉興人知縣邱履嘉嘉興人庚戌進士馬培平湖人沈光嶽慈溪人張道光烏程人臨潁教諭朱朝望蕭山人知縣項利賓嘉興人宜城知縣劉埁山隂人丙辰進士李為炅東陽人馬來逺嘉興人薛玉衡定海人己未進士趙昺平湖人通判薛三省定海人辛丑進士孫光裕嘉興人辛丑進士詹向善常山人癸丑進士葉官金華人庚戌進士鍾繼祖海鹽人俞志臯平湖人丁未進士王嗣奭鄞人陳應蛟定海人董懋史紹興人徐日新蘭溪人趙賢佐東陽人歸德通判鍾應曉歸安人尉氏教諭王家彥嘉善人甲辰進士余純中西安人永春知縣丁仕明嘉興人許士竒海鹽人癸丑進士劉康祉永嘉人庚戌會魁葛仁美鄞人方應龍慈溪人教諭錢士晉嘉善人癸丑進士林棟隆鄞人己未進士余用賓龍遊人瑞昌知縣洪世基嘉興人徐文耀烏程人知縣薑逢元餘姚人癸丑進士邵于獻仁和人姚祚端烏程人丁未進士聞人宗望餘姚人史啓英海寧人己未進士彭宗孟海寧人辛丑進士薑應徵慈溪人崔仲佳杭州人鍾世芳秀水人庚戌進士吳尚禮武康人周宗文嘉善人丙辰進士何其美德清人劉志斌慈溪人章在昌山隂人蔣汝礪紹興人張應簡鄞人馮來聘錢塘人壬戌進士楊𢎞名杭州人黃于郊長興人甲辰進士董元儒會稽人辛丑進士顧徵祥慈溪人教諭鄭之尹會稽人馮元鑑嘉興人涪州知州錢應期會稽人王世德永康人辛丑進士陳宇上虞人史起龍象山人辛丑進士婁大韶會稽人嚴嘉延歸安人董光烈象山人邵元凱餘姚人黃陂知縣魏廷相嘉善人甲辰進士沃光前定海人李良棟長興人甲辰進士王景雲長興人沈中英嘉興人癸丑進士李遵鄞人己未進士髙金體臨安人辛丑進士章志仲會稽人王昌祚永嘉人海陽知縣杜登益鄞人屠存仁嘉興人壬戌進士林正萼臨海人蔣應偉山隂人沈應華嘉善人童維坤杭州人吳伯銘嘉興人金以諌臨海人建寧知縣俞三晹餘姚人趙維寰平湖人解元刑部主事以下十八人順天中式王先鋐餘姚人經魁許光祚錢塘人韓孫愛慈溪人辛丑進士陶大邦會稽人祁承熯山隂人甲辰進士劉世教海鹽人閩清知縣黃承乾秀水人癸丑進士李事道仁和人支如玊嘉善人監丞張文濓湯溪人夏煒桐鄉人丁未進士章守讓會稽人同知吕元學崇德人繁昌知縣謝堯壽山隂人朱正邦烏程人毛柏餘姚人孫大中鄞人蔣士禮開化人以下三人應天中式王繼祀歸安人辛丑進士邵頴達餘姚人孫志元鄞人湖廣中式胡襄明山隂人山東中式薛思魯嘉興人經魁以下三人貴州中式薛紹魯嘉興人徐敏學蘭溪人萬厯三十一年癸卯科陳萬言秀水