子灣萬厯杭州府志在九曜山之西宋時莊文景獻二太子欑園枯樹灣萬厯杭州府志東通徳勝橋渟泉在孤山之麓聖因寺内寒碧一泓澄澈可鑒國朝康熙四十六年聖祖仁皇帝南巡駐蹕御書渟泉二字勒於崖石御製五言詩一首㳟紀首卷沁雪泉西湖㳺覧志在大佛身右壁棠陵方思道題後僕夫泉萬厯杭州府志元僧方洲所鑿也先是智圓居孤山有僕夫藝竹得泉遂號僕夫泉後徙寺兹山藉葛井以汲寺僧艱之方洲鑿地得此遂名參寥泉成化杭州府志在智果寺蘓軾應夢記云僕在黄州參寥子自呉中來訪一夕夢參寥子賦詩覺而記兩句寒食清眀都過了石泉槐火一時新後七年僕守錢塘而參寥子始卜居西湖智果院有泉出石縫間甘冷宜茶寒食之眀日僕與客泛湖自孤山來謁參寥子汲泉鑽火烹黄蘖茶忽憶夢兆於七年之前衆客皆歎傳記所載非虚語也六一泉萬厯杭州府志在孤山後巖東坡守杭時泉出有懐六一翁因名乃叙而銘之乆廢成化丙申南京大理寺卿夏時正間訪得蓁穢中命掃薙而濬發之泓然故物也蘓軾六一泉銘并序歐陽文忠公將老自謂六一居士予昔通守錢塘見公于汝隂而南公曰西湖僧慧勤甚文而長于詩吾昔為山中樂三章以贈之子閒于民事求人于湖山間而不可得則徃從勤乎予到官三日訪勤于孤山之下抵掌而論人物曰公天人也人見其暫寓人間而不知其乗雲馭風厯五岳而跨滄海也此邦之人以公不一來為恨公麾斥八極何所不至雖江山之勝莫適為主而竒麗秀絶之氣常為能文者用故吾以謂西湖盖公几案間一物耳勤語雖幻怪而理有實然者眀年公薨予哭于勤舎又十八年予為錢塘守則勤亦化去乆矣訪其舊居則弟子二仲在焉畫公與勤之像事之如生舎下舊無泉予未至數月泉出講堂之後孤山之趾汪然溢流甚白而甘即其地鑿巖架石為室二仲謂予師聞公來出泉以相勞苦公可無言乎乃取勤舊語推本其意名之曰六一泉且銘之曰泉之出也去公數千里後公之没十有八年而名之曰六一不㡬其誕乎曰君子之澤豈獨五世而已盖得其人則可至于百傳嘗試與子登孤山而望呉越歌山中之樂而飲此水則公之遺風餘烈亦或見于斯泉也玊泉夢粱録在錢塘九里松北淨空院南齊末有靈悟大師曇超開山説法龍君來聴撫掌出泉有小池水清可鑒異魚㳺泳其中萬厯杭州府志宋淳祐八年趙與籌甃治龍潭増築為二池元末寺燬而泉如舊至嘉靖間郡守陳仕賢為亭其上寺後有細雨泉周紫芝題淨空泉詩誰穿巨石貯清泉不見超公舊講筵龍伴白雲歸寳藏魚随流水下春田國朝雍正六年總督臣李衛復于泉上建亭曰洗心冷泉萬厯杭州府志在靈隱寺外飛來峯即石門澗水浦陸垕冷泉看放水詩泉聲飛出閘委折緑隂間此地原無著多時不入山草欹疑石墜水定見魚還難得同龜鶴㳺吟半日閒周紫芝冷泉放閘詩呼猿洞口水潺潺忽卷奔流下九天乞得少陵三峽句為君題作倒流泉煖泉咸淳臨安志一名渦渚在東嶼見陸羽二寺記茯苓泉咸淳臨安志在靈隱無垢院半山古松婆娑下有甘泉博物志云松脂入地千年為茯苓因名白沙泉成化杭州府志在靈隱西菩院方丈西有泉從白沙中流出武林泉咸淳臨安志西漢及晉地理志云錢唐有武林山武林水所出東入于海晏元獻輿地志云武林山錢唐泉所出顧夷吾山川記自南徂東臨浙江一𣲖謂之靈隱浦月桂泉伏犀泉永清泉丹井偃松泉聰眀泉倚錫泉萬厯杭州府志皆出天竺玉液泉萬厯杭州府志在永清塢心菴後白雲巖下定光泉成化杭州府志在西山長耳相院西定光庵側山腰有泉盤廻飛流濺沫可愛淳祐丁未亢旱此泉不竭寺僧用筧引泉供庖真珠泉萬厯杭州府志在集慶寺内周顯徳間泉自地迸出寺僧因甃為方池聞剝啄聲則泉益涌纍纍如貫珠宋景祐中官家取以釀酒遂以名酒雷峰路口亦有真珠泉筲箕泉萬厯杭州府志在赤山之隂合於恵因澗元黄子乆號大癡卜居泉上劉公泉萬厯杭州府志在南高峰下出石竇間清澈可玩宋常平劉寛甃池因篆書劉公泉三字於石蓮花泉萬厯杭州府志在飛來峰頂石巖無土清而可啜虎跑泉舊浙江通志在城西南十里大慈山上咸淳臨安志舊傳性空禪師常居大慈山無水忽有神人告之曰眀日當有水矣是夜二虎跑地作穴泉涌出因名蘓軾虎跑泉詩亭亭石塔東峰上此老初來百神仰虎移泉眼趂行脚龍作浪花供撫掌至今㳺人盥濯罷卧聴空階環玦響信知此老如此泉莫作人間去來想國朝康熙三十八年聖祖仁皇帝南巡臨幸御製七言詩一首㳟紀首卷儀和泉胡引嘉儀和泉記在錢塘大雄山麓方廣可八九尺甃石圍砌清水湛然㫁碣隱隱草際字畫磨滅洗而讀之曰儀和泉淳熙三年三月十日呉興沈彦重立共二十四字餘七字漫不可讀涌泉萬厯杭州府志在霍山清心院前山坡上宋紹興間高宗日遣人取之瀹茗寺僧䕶以朱欄泉從石罅中流出廟前折入黄山橋小河味極清甘亢旱不竭恵泉咸淳臨安志在長夀鄉大老山泉自地涌出亢旱不竭有寺以泉為名渦水西溪梵隱志在西溪東北本南漳湖宋百詠題曰蒹葭深處俗呼河水亦名渦水一望沙汀水瀨秋時荻花如雪方井咸淳臨安志在西溪有亭扁曰方井米芾書龍井武林舊事呉赤烏中葛稚川常煉丹于此在風篁嶺上巖壑林樾幽古石竇一泓清澈翠寒甘美可愛雖乆旱不涸石上流水處其色如丹遊者視乆水輒溢人去即減其西深不可測相傳與江海通有龍居之每禱必應或見小蟹斑魚蜥蜴之類井旁有恵濟龍王祠秦觀龍井記龍井舊名龍泓距錢塘十里呉赤烏中方士葛洪常煉丹于此事見圖記其地當西湖之西浙江之北風篁嶺之上寔深山亂石中之泉也每嵗旱禱雨于他祠不獲則禱于此有禱輒應故老相傳以為有龍居之然泉者山之精氣所發也西湖深靚空闊納光景而含烟霏菱芡荷花之所附麗龜魚鳥虫之所依憑漫衍而不廹紆餘以成文隂晴之中各有竒態而不可以言盡也故岸湖之山多為所誘而不克以為泉浙江介于呉越之間一晝一夜濤聲自海而上者再疾撃而逺馳兕虎駭而風雨怒過者摧當者壊乘高而望之使人毛髪盡立心掉而不禁故岸江之山多為所脅而不暇以為泉惟此地蟠幽而踞阻内無靡麗之誘以散越其精外無豪悍之脅以虧疎其氣故嶺之左右大率多泉龍井其尤者也夫蓄之深者發之逺其養也不茍則其施也無窮龍井之徳盖有至於是者則其為神物之托也亦奚疑哉葉紹翁秋日㳺龍井詩引道煩雙鶴攜囊倩一童竹光杯影裏人語水聲中不雨雲常濕無霜葉自紅我來何所事端為聴松風葛天民龍井詩龍䕶深潭草木昏㫁碑元祐典型存蜀仙已去呉僧少嶺上松篁亦㫁魂錢塘江萬厯錢塘縣志在縣東南本名浙江虞喜志林云潮水投浙山下折而曲一云江有反濤水勢折歸故云浙江一名浙河山海經云禹治水至於浙河説文云江水東至會稽山隂為浙江又漸水出丹陽黟中東入海今錢塘浙江是也秦始皇渡浙江至㑹稽則浙名舊矣桑欽載漸水所經入正今浙江而不名為浙漸字近浙而相變如邾鄒則浙之得名既以先秦而桑欽更以為漸許氏漸水浙水又復兩出皆不可曉又名曲江枚乗七發曰觀濤于廣陵之曲江一名羅刹江取風濤險惡意今名錢塘江其源發黟縣曲折而東以入於海潮水晝夜再上奔騰衝激聲撼地軸郡人以八月十八日傾城觀潮為樂昔有善泅者泝濤出没謂之弄潮徃徃没溺厲禁乃止其沿江之塘自唐宋來代有修築錢武肅王所謂射潮捍塘處任昉濟浙江詩昧旦乘輕風江潮忽來徃或與歸波送乍逐翻流上近岸無遐月逺峯更興想緑樹懸宿根丹崖頽乆壤喻坦之發浙江詩島嶼遍含烟烟中濟大川山城猶轉漏沙浦已搖船海曙霞浮日江遥水合天此時空闊思翻想渉窮邉白居易看潮詩早潮纔落晚潮來一月周流六十回不獨光隂朝復暮杭州老去被潮催羅隱錢塘江潮詩濤聲􅍅洶勢悠悠羅刹江邉地欲浮漫道徃來存大信也知反覆向平流任抛巨浸疑無底猛過西陵似有頭至竟朝昏誰主掌好騎赬鯉問陽侯蘓軾中秋看潮詩定知玉兎十分圓已作霜風九月寒寄語重門休上鑰夜潮留向月中看萬人鼓噪懾呉儂猶似浮江老阿童欲識潮頭髙㡬許越山渾在浪花中江神河伯兩醢雞海若東來氣吐霓安得夫差水犀手三千强弩射潮低仇逺觀潮詩一痕纔見海門生頃刻長驅作怒聲萬馬突圍天鼓碎六鰲翻背雪山傾逺朝魏闕心猶壯直上嚴灘氣始平寄語呉兒休踏浪天呉罔象正縱横餘杭塘河萬厯杭州府志在武林門外自江漲橋四十五里至餘杭縣北通新開運河詳見水利龍山河萬厯杭州府志自鳯山水門至龍山閘舊有河計一十二里置閘以限潮水嵗乆壅塞元延祐三年行省丞相托克托命民開浚造石橋立二閘洪武七年行省叅政徐本拓廣浚深舟楫始便詳見水利下湖河萬厯杭州府志在溜水橋沿東西馬塍羊角埂上泥橋至賣魚橋西合餘杭塘河一𣲖入左家橋河入江漲橋河沙河塘唐書地理志錢塘南五里有沙河塘咸通二年刺史崔彦曽開眀珠浦晏公類要在縣西仁和縣城外山川鳯凰山萬厯杭州府志在城南十里有金星洞郭公泉出焉西岡石筍林立名排衙石形家謂一郡旺氣藉此左瞰大江直望海門山下唐以來肇造州治五季末錢鏐旋加崇闢南宋建都遂環入禁苑劉過同郭殿帥㳺鳯凰山詩㢘纎小雨乆于梅喜得新晴亦快哉五色波光麗鳷鵲十分雲氣近蓬萊旌旗側畔宫牆轉戈㦸叢中武庫回走馬看花生怕晚果然桃李一山開名勝志舊在城内元末張士誠築城截之於外今沿城南巧山萬厯杭州府志在縣治北四十里名勝志俗傳錢王七夕登山乞巧於此又名珠山三峯山萬厯杭州府志鄉人呼為西南山在縣治北六十里三山形如品字皆相去半里獨山仁和縣志又名金鰲山在縣北三十里聳出一方傍無别山故名𤓰山萬厯杭州府志在縣東北二十五里高㡬一仞周三百歩望洛山名勝志一名落山在縣北六十里昔有髙士自洛陽來隱於此常登巔望洛故名臯亭山咸淳臨安志在縣治東北二十里髙百餘丈有崇善靈恵王祠名半山廟旁有水甕及桃花塢釋宗乗發率亭詩曉發凌蒼苔徘徊谷中歩松門磬已㣲空翠驚相顧澗聲雜幽禽巖花落深樹孤懐當何如復此春向暮青龍山成化杭州府志在臯亭山東約髙七十餘丈山脊蒼翠偃曲如龍母山咸淳臨安志在臯亭山東北高一百餘丈張翼左右如母顧子因名桐扣山咸淳臨安志在臨平山之西異苑晉武帝時呉郡臨平岸圯出一石鼓打之無聲以問張華華曰可取蜀中桐材刻作魚形扣之則鳴矣於是如言肇聞數十里黄鶴山咸淳臨安志在縣治東北三十八里佛日山之北高百餘丈巔有龍池一名渥洼山腰有黄鶴仙洞佛日山成化杭州府志在母山東北髙六十餘丈有佛日淨慧寺司馬槱入佛日山詩水冷苔生暈風髙竹度凉道人何處去春色半滄浪秦觀佛日山同作五里喬松徑千年古道塲泉聲與嵐影收拾入僧房臨平山成化杭州府志在縣治東北五十四里周十八里高五十三丈上有龍洞天井旱未嘗涸下有東嶽廟景靈觀又下有臨平湖僧道潛過臨平詩風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲高翥過臨平詩風㠶一似白鷗輕起揭篷窓香曉晴梅子著花霜壓岸自披風㡌過臨平張昱過臨平詩船過臨平欲住難藕花紅白水雲間只因一霎溟濛雨不得分眀看好山超山咸淳臨安志在縣治東北六十里高三十七丈周二十里黄山萬厯杭州府志在縣治東北五十里高五十丈周回五里北一里為横山名東西二横山皆相連絡大旗山咸淳臨安志在黄鶴山北高五十餘丈有青草塢居民可二百家名大旗村南山咸淳臨安志在大旗山北高十餘丈烏頭山咸淳臨安志在肇元鄉峰鋭而秀高八十餘丈石姥山咸淳臨安志在烏頭山東高五十餘丈有嶺南接運河塘赤岸嶺西有真珠塢東山萬厯杭州府志城西北五十一里高二十六丈周回七百九十三丈石膏山成化杭州府志去城西北五十七里出石膏如雪一名稽留山無毒獸惡䖝通典錢塘有石膏山敷用為最馬嘷山咸淳臨安志郡國志呉伐越至此遇大風雨軍敗騎兵有馬嘷呼求其主遂名亭市山咸淳臨安志在餘石鄉亭市村萬厯杭州府志石膏馬嘷亭市皆舊志所有於今無考姑録之以備叅訪艮山嘉靖仁和縣志在城東北隅一小土阜西湖㳺覧志艮山南山之盡脉也高不踰尋文沿城五六里漫為平原土沃疇腴禾菽芃茂盖餘氣之散衍耳嵗寒堂集艮山相傳為南渡宸㳺看新緑之處萬松嶺成化杭州府志在鳯山門外西嶺上舊夾嶺栽松唐白樂天詩云萬株松樹青山上十里沙隄明月中在南宋時密邇大内第宅民居高下櫛比後為空山曠嶺而松亦無㡬國朝雍正八年總督臣李衛補植萬株黄犢嶺萬厯杭州府志在城東北六十里安隱寺後咸淳臨安志安隱院後有黄犢嶺唐邱隱士每乗黄犢采藥故名吕紘黄犢嶺詩疇昔聞高隱紅塵隔逺林閑乘黄犢出踏破白雲深月巖七修類稿江干鳯凰山有石如片雲㧞地數丈有一竅尺餘名曰月巖惟中秋之月穿竅而出餘月則斜金星洞萬厯杭州府志在鳯凰山介亭下生金星草因名細礪洞咸淳臨安志在臨平山深十餘丈高一丈五尺出礪石龍洞咸淳臨安志在臨平山水深不可測祈禱多應海雲洞咸淳臨安志在超山上有乾濕二洞黒龍王祠臨平湖咸淳臨安志在縣東長樂鄉周回十里湖中有白龍潭赤烏二年寳鼎見舊名鼎湖三國呉志歸命侯皓天璽元年呉郡上言臨平湖自漢末草穢壅塞今更除平故老相傳此湖開天下平又于湖邉得石函中有小石青色長四寸廣二尺餘刻上作皇帝字俄而晉武帝平呉張祜過臨平湖詩三月平湖草欲齊緑楊分映入長隄田家起處烏尨吠酒客醒時謝豹啼山檻正當蓮葉渚水塍新築稻秧畦人間漫說多岐路咫尺神仙路欲迷御息湖一名詔息湖咸淳臨安志在縣東北一十八里相傳秦始皇東㳺暫憩於此水經注浙江北合詔息湖本名阼湖像光湖咸淳臨安志在縣治東長樂鄉唐神龍元年湖有五色光眀掘地得石佛像因立佛刹而名其湖曰像光石鼓湖咸淳臨安志在桐扣山下渥洼池鮮于樞臯亭山遊記淨慧寺循東廡下入庫堂觀渥洼池池泉玉色出東北山麓有石坡陀半在水中因蘓公句遂名蘓軾佛日山榮長老方丈詩東麓雲根露角牙細泉幽咽走金沙不堪土肉埋山骨未放蒼龍浴渥洼洗馬池萬厯杭州府志在城南二里鳯山右翼下宋有馬廐於此龍池萬厯杭州府志在城東北四十里黄鶴山下磨劍池咸淳臨安志在臨平山下有片石俗傳錢王磨劍於此浴龍池思古堂集臯亭山崇光寺有浴龍池宋高宗嘗洗手因名龍游潭咸淳臨安志在臯亭山時有蜿蜒出没其間鄉人稱為水甕旱禱必雨金沙泉萬厯杭州府志在永和鄉周公恵泉咸淳臨安志在湖墅下閘宋乾道三年周安撫淙重修邦人徳之故名安平泉咸淳臨安志在安仁西鄉安隱寺有池名安平泉蘓軾題安平泉詩策杖徐徐歩此山撥雲尋徑興飄然鑿開海眼知何代種出菱花不記年烹茗僧誇甌汎雪煉丹人化骨成仙當年陸羽空収拾遺却安平一片泉噴玊泉桐溪草堂集在臯亭崇光寺後味清甘石壁舊鐫噴玉二字横溪萬厯杭州府志在城北二十五里獨山之北傍皆藕蕩菱灘紅碧相間人家隱約于廻洲合浦之間舟船出没烟波𣺌瀰儼如畫境外沙河成化杭州府志自永昌門北繞城東過永昌壩螺螄橋東至蔡湖橋北達慶春門外河相合沿城轉西至㑹安壩下艮山河西入泛洋湖轉北至徳勝橋東與上塘運河合前沙河成化杭州府志在菜市門東太平橋外沙河北水陸寺前入港可通湯鎮赭山仁和鹽塲後沙河成化杭州府志在艮山門外壩子橋北上下塘河成化杭州府志自武林水門接城内大河西河過呉山水驛達清湖上中下三閘至徳勝橋東與外沙河菜市河泛洋湖合分為兩𣲖一𣲖由東北上塘至舊東倉新橋入運河至長安壩曰上塘河一𣲖由西北過徳勝橋至江漲橋與子塘河合流至北新橋西北入湖州界曰下塘河北接新開運河高翥下塘詩河水新添三尺高河邉蘆葦有龜巢波流夜夜漂魚箔空㸃籃燈照樹梢日出移船又日斜蘆根時復見人家水鄉占得秋多少岸岸紅雲是蓼花新開運河成化杭州府志在武林門外北新橋之北通蘓湖常秀潤等河凢諸路綱運及商販客舟皆由此達於城柳浦神州古史考在鳯凰山下宋書孔顗傳云呉喜至錢塘進軍柳浦舊唐書云隋自餘杭徙州理錢塘又徙州於柳浦是也呉越王後築宫堙塞多不可考鐵幢浦成化杭州府志在候潮門外呉越錢武肅王射潮築塘箭所至處立幢識之因以得名宋淳祐戊申趙與籌置亭其上藕花洲萬厯杭州府志在城東北六十里臨平安隱寺前按洲以參寥子詩句得名海門咸淳臨安志在縣東北六十五里有山曰赭山與龕山𨽻紹興府對峙潮水出其間郭璞地記所謂海門一㸃巽山起又曰海門筆架峰巒起皆指此浙江通志卷九
