body:
  text: 浙江通志卷九山川一自九土既敷而髙山大川以奠周秦而上呉越介在荒服然會稽雄鎮於南具區滙流於北皆為禹轍所經其間千巖萬壑競秀爭流乾坤竒偉清淑之氣薈萃於斯於以降賢哲出雲雨表畛域阜財用凡殽列於浙水東西者可按籍而稽焉志山川杭州府錢塘仁和二縣附郭呉山名勝志在府城内之南春秋時為呉南界以别於越故曰呉山或曰以伍子胥訛伍為呉故郡志又稱胥山凡城南隅諸山蔓衍相属總曰呉山西湖游覧志竒㟧危峰澄湖靚壑江介海門回環拱固扶輿淑麗之氣鍾焉是以邑居叢集殆十餘萬家聲甲寰宇恢然一大都㑹也陳允平吴山雪霽詩九天宫闕春風滿陸地樓臺夜月寒鐡笛一聲吹雁落片雲不到玉闌干楊載同平章庫庫子山吴山晚眺詩山椒翬構四垂寛上相旌旗㑹覧觀旁近江湖天廣大上連星斗地清寒龍宫永鎖函書閟鳯嶺重嗟苑樹殘此際獨無雲蔽日正宜翹首望長安朱彜尊呉山望浙江詩一峯髙出萬松寒磴道虚疑十八盤近海魚龍吹宿霧中天日月轉浮瀾風帆岸壓眀珠舶仙樹花濃白石壇舊是錦衣行樂地江山真作霸圖看金地山咸淳臨安志在城隍廟南寳月山成化杭州府志在布政司對巷東接吳山與蛾眉山並列石佛山西湖㳺覧志西聫寳山南面瑞石舊有大乗石佛寺宋大中祥符間改名積善海會寺寳蓮山方輿勝覧在呉山之北寳山萬厯杭州府志在呉山之西南東接石佛山蘓軾同秦仲二子雨中游寳山詩平眀已報百吏散半日來陪二子閑立鶴低昂烟雨裡行人出没樹林間七寳山西湖游覧志在白馬廟巷之西三茅觀在其東北瑞石山萬厯杭州府志在寳山南上有紫陽菴中有瑞石泉槖駝峯此山秀石玲瓏巖竇􅌄窱湖山奥區罕與倫比薩天錫㳺呉山駝峯紫陽洞詩天風吹我登駝峯大山小山石玲瓏赤霞日射紫瑪瑙白露夜滴青芙蓉飄飄雲氣穿石屋石上凉風吹紫竹挂冠何日賦歸來煮石篝燈洞中宿蛾眉山成化杭州府志在布政司南東接呉山其側有八眼井淺山成化杭州府志在蛾眉山前其側有漾沙坑竹園山成化杭州府志在呉山西相接一脉獨趨而北隱隱隆起隂陽家謂為府治之主山宋臨安尹趙與籌建閣其上扁曰竹山清平山成化杭州府志在呉山南鳯山門之北雲居山舊浙江通志在城西南上有雲居寺面聖湖接楓嶺頗稱佳境虎林山一名武林山名勝志在武林門内一里而近髙可三丈舊名祖山楊正質虎林山記錢氏有國時山在城外異虎出焉故名虎林音訛為武葉紹翁四朝聞見録謂虎林即靈隱山因避唐諱改為武林者非漢志眀載武林山為武林水所出安有避唐諱之説虎林武林原有二山未可混為一也紫坊嶺萬厯杭州府志在豐寜坊漾沙坑側平為民居不存駱駝嶺萬厯杭州府志在馨如坊三茅觀之麓鐵冶嶺萬厯杭州府志在豐寜坊七寳山之西青衣洞成化杭州府志在呉山重陽菴後故老相傳昔人至洞口有青衣童子問之不應良乆入洞逐之不見但聞風雨之聲毛髪悚慄而出有青衣泉西湖㳺覧志泉淅淅出石隙清鍳毛髪山頂巨石墜下有石承之若餖飣然前有石門上横石梁壁間皆細字水波文宋慶元間韓侂胄賜第寳蓮山下建閲古堂砌瑪瑙石為池引泉注之名閲古泉紫陽洞成化杭州府志在槖駝峯之側前有紫陽菴張寜㳺紫陽洞詩石級清懸絶薜蘿洞門深敞野人過霜林葉盡羣峰出風岫烟開夕照多誰躡白雲尋鶴蜕自摩蒼壁寫樵歌登臨日少歸期促白髪青山奈老何湧金池萬厯杭州府志在今湧金門内呉越錢氏時守將曹杲引西湖水為池呉越王元瓘刻石識其旁楊蟠湧金池詩湧金春色晚吹落碧桃花一片何人得流經十萬家白龜池嘉靖仁和縣志在錢塘門裡舊錢塘治側此水不堪汲飲止資洗濯仁和倉池成化杭州府志在倉之南相傳仁和倉舊為縣基乃呉公子慶忌故居古有此池白洋池成化杭州府志在梅家橋東周三里宋淳祐丁未夏旱湖水涸人爭汲此水至有以舟載賣如湖水者一方賴之謹按白洋池一名南湖宋時張鎡功甫構園亭其上號曰桂隱從捨為廣夀慧雲寺俗呼張家寺寺碑有鎡捨宅發願文云秀踞南湖之上幽當北郭之鄰是也大河成化杭州府志舊為鹽橋運河南自錦雲橋而北至通江橋與保安水門橋之河合又北過新定橋稍西與鍾公橋小河合又北至梅家橋合西河小河出武林水門又西一𣲖葛家橋由天水院橋出武林水門小河杭州府志舊為市河東自鍾公橋西轉北由灌肺橋直至仁和倉橋之北轉東與梅家橋合出武林水門又一𣲖自觀橋而西合清湖河北出武林水門西河成化杭州府志舊為清湖河西南自府前宣化橋東至戒子橋閘兒頭轉北至轉運橋與湧金門河合流東與西㫁河合北合曲阜橋河至結縛橋東由衆安橋與小河合出武林水門又一𣲖自八字橋西清湖橋下分𣲖西行轉北至紀家橋車橋達便橋出武林水門東運河成化杭州府志舊為菜市橋自東㫁河頭至章家橋北抵壩子橋出艮山水門與城外河合舊在城外今在城内呉山井咸淳臨安志在呉山北錢氏時韶國師始開此井品其水味為錢塘第一淳祐丁未大旱城中諸水皆涸獨此井日下萬綆如常都人神之趙安撫與籌奏立祠以旌異之又為亭覆井上成化杭州府志洪武七年浙江參政立石表刻呉山第一泉五字紀宋遺事於石表之隂復建亭井上屢燬里人随復以恵利在人深也相國井萬厯杭州府志在甘泉坊側今井亭橋者是也井上覆亭因以名橋西井萬厯杭州府志在舊安國羅漢寺今鄴侯李泌祠前者是也水口今為城基以井在相國寺西故名方井萬厯杭州府志俗呼四眼井舊富藏庫西水口在舊玊蓮堂北金牛井萬歴杭州府志即金牛池乆廢小方井萬厯杭州府志俗呼六眼井在錢塘門内水口在菩提寺前今為城基謹按以上六井唐刺史李泌所鑿白龜池亦其一也錢塘縣城外山川巨石山萬厯杭州府志在西湖北磊磈巑岏負郭挺立髙六十三丈周一十三里上有石甑山巍然如甑浮圖七層髙出雲表曰保叔塔以僧保所建也杭州府志一名寳石山山之勝曰石屏風獅子峯屯霞石下為寳稷山山下有乳泉佛足泉絶頂為寳峯霍山成化杭州府志在寳石山北於湖北諸山最小山形多骨石笋鱗起瀕湖諸山至此為㫁壤矣孤山咸淳臨安志在湖中稍西一嶼聳立旁無聫附為湖山勝絶處林逋孤山寫望詩水墨屏風狀總非作詩除是謝元暉溪橋裊裊穿黄落樵斧丁丁斫翠㣲返照未沉僧獨徃長烟如淡鳥横飛南峰有客鋤園罷閒倚籬間忘却歸張雨孤山晚歩詩瑪瑙坡前立荒陂接葑田試從樵子徑徃覓僕夫泉衆草寒猶短羣峯晚更妍誰歟結真隱共老太平年石佛山萬厯杭州府志即秦始皇䌫船石咸淳臨安志相傳始皇東遊艤舟於此俗呼西石頭北關僧思淨刻大石佛因名舊傳西湖本通海東至沙河塘向南一岸皆大江也故始皇䌫舟於此仙姑山咸淳臨安志在東山衖西湖㳺覧志仙姑山之西東山衖口可通古蕩西溪靈隱山脉至此少㫁若伏而連其旁有桃花衖集慶山萬厯杭州府志在仙姑之西南山前折而南曰飛來峯曰上中下三竺三面阻山中路直闢若函谷然長松夾道唐刺史袁仁敬守杭植松以達靈竺凡九里武林山即靈隱山漢書地理志錢塘西部都尉治武林山武林水所出東入海行八百三十里晏公類要十三州記曰錢塘武林山泉錢源出焉太平寰宇記靈隱山在縣西十五里許由葛洪皆隱此山萬厯杭州府志亦曰靈苑曰仙居曰武林俗稱西山其山起歙出睦跨富春控餘杭蜿蜒數百里結局於錢塘如引兩臂其南澗之源出自白雲峯北澗之源出自西溪峰東注經合澗橋又東二里過行春橋出靈隱浦入西湖謂之錢源雲麓漫鈔靈隱寺東西瀵二水東曰龍溪横過寺前冷泉亭在其上西曰錢源二水合出横坑橋方干登靈隱寺後峯詩絶頂無煩暑登臨三伏中深蘿難透日喬木更含風山疊雲霞際川傾世界東那知前夕興不與古人同葛天民西湖泛舟入靈隱山詩晴嵐漠漠水溶溶落葉遮船翠盖重秋色盡為漁者占山光多向道人濃雲連合抱前村樹磵繞飛來小朶峯送罷夕陽迎素月樓臺高下自鳴鐘粟山太平寰宇記在縣西十七里山下有石杵闊二丈長一丈四尺呉大帝刻為黄武二年嵗在戊午八月三日十二字㣲茫尚存太平御覧呉地記云一名新石頭山上有城下有飛泉成化杭州府志山髙六十二丈周回十八里南屏山咸淳臨安志在興教寺後怪石聳秀中穿一洞上有石壁若屏障然刻司馬溫公所書家人卦樂記禮樂不可斯湏去身中庸道不逺人各一章兩湖麈談杭有南屏山流俗相傳淨慈寺後山為是余考武林舊事及西湖百咏集皆謂在淨慈寺右興敎寺之後其山正對蘓隄與俗傳甚戾心甚疑之己丑春客謂淨慈有支院請㳺焉直抵山麓石壁離立試一登眺則司馬溫公𨽻書家人卦米元章大書琴臺皆在焉乃知其地即興教遺址山乃南屏也識之以袪羣疑僧祖銘南屏雨中詩五月雨聲連六月南屏雲氣擁柴扉林巒有穴山精出巖谷無人石燕飛詩句偶從行處得家鄉多在夢中歸曉來杖䇿湖頭去春水溶溶没釣磯王守仁春日南屏山詩溪風漠漠南屏路春服初成病眼開花竹日新僧已老湖山如舊我重來層樓雨急青林逈古殿雲晴碧嶂廻獨有幽禽觧相信雙飛時下讀書臺孫一元卜居南屏山詩道人占㫁南屛景十里青山帶郭斜對水柴門通鶴渚隔林烟火是漁家嵒頭老檜占風雨石上菖陽閲嵗華粧㸃太平還著我㯶鞵桐帽送生涯花家山咸淳臨安志在大麥嶺後一名蛇山仇逺蛇山詩間尋石澗到雲扉樹影生凉怯苧衣静碧軒窗聊寄傲軟紅塵土竟忘歸滿傾竹葉春霞滑輕摘蕉花曉露稀禪意法乗俱莫問且談舊事共依依丁家山錢塘縣志瀕湖水影山光上下相接赤山名勝志在太子灣西厥土赤埴故名玊岑山杭州府志在石屋嶺左夢粱録一峰聳出衆山繚繞古木列垂森翠難描徐集孫玉岑詩一抹斜陽挂淺林細聴山鳥説春心千年古寺多竒迹讀了豐碑看玉岑雞籠山咸淳臨安志在龍井風篁嶺側高而圓若鷄籠然靈石山咸淳臨安志一名積慶山在西山放馬塲側山石嘗見光怪故名郭祥正靈石山詩靈石山前路山深寺更深不知眀月去空惜白雲沉大慈山名勝志在縣西南十里有虎跑泉龍山成化杭州府志在城南十里一名卧龍山包家山咸淳臨安志在城南秦望山晏公類要在縣南秦始皇東遊登此山欲度會稽咸淳臨安志在縣南一十二里高一百六十丈周回百歩後唐同光中錢氏于秦望建上清宫有巨石二十餘株自然成行名金洞門有羅刹石在山之東南横截江濤商船海舶經此多為風浪掀覆因呼為羅刹五代開平中為潮沙漲没薛據登泰望山詩南登秦望山極目大海空朝陽半蕩漾晃若天水紅溪壑爭噴薄江湖遞交通而多漁商客不悟嵗月窮振緡迎早潮弭棹候長風余本萍泛者乘流任西東茫茫天際㠶棲泊何時同將尋會稽跡從此訪任公五雲山萬厯杭州府志在縣治西南二十里髙千丈周回十五里山半有伏虎亭梯以石墄以便徃來至巔平岡名月輪山江三折當其前有天井二大旱不竭錢惟善登五雲山詩普覺遺衣乆不傳五雲山色尚蒼然㫁崖蘿薜三千丈喬木風霜四百年龍井雨深泉獨厚漁村潮上月初圓寳坊金碧紅塵聚何似兹山更絶縁定山萬厯杭州府志一名獅子山在縣治東南四十里水經注錢塘縣東有定已疑作包諸山皆西臨浙江水流於兩山之間江水急迅兼濤水晝夜再來至二月八月最髙峨峨二丈有餘呉越春秋以為子胥文種之神也上有可避濤處行者賴之云是海神婦