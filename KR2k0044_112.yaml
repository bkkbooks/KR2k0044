body:
  text: 浙江通志卷一百十三職官三宋上節度使文獻通考宋興節度使事務悉歸於本州知州通判兼總之節度使無定員宣和末節度使至六十人中興後諸州升改節鎮凡十有二觀察諸使文獻通考宋沿唐制置諸州觀察使防禦使團練使唐防禦使在團練之下宋升之於上諸州刺史無定員都督府宋史職官志都督府長史左右司馬録事參軍司户司法司士司理文學參軍助教舊制建官如上南渡後以見任宰相充都督次有同都督有督視軍馬多執政為之雖名稱略同然掌總諸路軍馬都護諸將非舊制比也設屬咨議軍事參謀參議並以從官充書寫機宜文字幹辦官凖備差遣前後員數不一制置使宋史職官志制置使不常置掌經畫邉鄙軍旅之事中興後置掌本路諸州軍馬多以安撫大使兼之地重秩髙者兼制置大使或置副使以二之隆興以後或置或省又有沿海制置使以明州守臣領之肅清海道節制水軍大使置屬參謀參議主管機宜書寫文字各一員幹辦公事一員凖備差使差遣各一員餘隨時勢輕重而增損焉宣撫使副使宋史職官志宣撫使不常置主宣布威靈撫綏邉境及統護將帥督視軍旅之事以二府大臣充其屬有參謀官參議官機宜幹辦公事宣撫副使掌二使事安撫使宋史職官志經略安撫司安撫使一員以直祕閣以上充掌一路兵民之事聽其獄訟稽其錢穀甲械出納之名籍而行以法若事難專決則具奏即於機速邉防聽以便宜裁斷其屬有幹當公事主管機宜文字準備將領準備差使宣和三年詔杭越州守臣並帶安撫使建炎初李綱請於沿河沿淮沿江置帥府以文臣為安撫使帶馬步軍都總管武臣一員為之副許辟置僚屬將佐措置調發其後詔加裁定員額諸路或隨地輕重而損益焉嘉泰會稽志初錢氏國除杭守帶鈐轄提舉兩浙路州軍兵甲賊盜而浙東限濤江議者以為非杭所能兼領皇祐三年十二月始分兩浙為東西兩路杭越守臣各兼兩路屯駐兵馬鈐轄而越守自魏瓘始五朝皆因之至宣和二年有方臘之變五月己亥臣僚言睦賊已平慮班師之後餘孽尚在乞以杭越知州並兼本路安撫一方乃詔杭越江寧守臣並帶安撫使此浙東安撫使之始也走馬承受文獻通考走馬承受諸路各一員宋仁宗時置以三班使臣及內侍充𨽻經略安撫總管司無事嵗一入奏有邉警則不時馳驛上聞大觀中詔許風聞言事政和六年改為廉訪使者靖康初復為走馬承受發運使宋史職官志發運使掌經度山澤財貨之源漕淮浙江湖六路儲廪以輸中都兼制置茶鹽泉寶及舉刺官吏之事宋史太宗本紀淳化五年置江淮兩浙發運使仁宗本紀景祐元年罷淮南江浙制置發運使詔淮南轉運兼發運事四年復淮南江浙制置發運使宋史職官志宣和三年方臘初平江浙諸郡皆未有常賦乃詔陳亨伯以大漕之職經制七路財賦紹興二年省罷以職事分委漕臣八年再置經制發運使九年廢乾道六年復置是冬廢其職轉運使宋史職官志轉運使掌經度一路財賦以足上供及郡縣之費嵗行所部檢察儲積凡吏蠧民瘼悉條以上逹及専舉刺官吏之事有軍旅則供饋錢糧或令本官隨軍移運或别置隨軍轉運使一員或諸路事體當合一則置都轉運使以總之隨軍及都轉運廢置不常而正使不廢若副使若判官皆隨資之淺深稱焉其屬有主管文字幹辦官各一員文臣準備差遣武臣準備差使員多寡不一咸淳臨安志太平興國三年始置西南路東北路轉運使副至道三年分天下為十八路兩浙合為一獨得視京東西等並置使副或皆為使或皆為副或為同轉運使或以一員為判官熙寧七年沈括乞分為兩路於杭州置司詔從之建炎四年於東西二使外添差一員専一隨行在應辦錢糧又置隨軍轉運未幾省至紹興二年添差亦罷淳熙初始置一員或除運副或由判官而升後為定制宋史髙宗本紀紹興二年初置江浙等路都轉運使撫諭使文獻通考撫諭使掌慰安存問採民之利病條奏而罷行之亦不常置或不以使名則稱撫諭官所至以某州撫諭使為名具宣恩言俾民知德意提點刑獄宋史職官志提點刑獄公事掌察所部之獄訟而平其曲直及舉刺官吏之事宋史太宗本紀雍熙二年遣使按問兩浙路諸州刑獄文獻通考宋淳化二年以十一人分充諸路轉運司提點刑獄四年省景德四年置諸路提點刑獄公事天聖二年罷眀道二年復置治平元年罷歸轉運司熙寧二年復差宋史職官志舊志參用武臣熙寧初神宗以武臣不足以察所部人才罷之六年置諸路提刑司檢法官紹興初兩浙路以疆封濶逺差提刑二員其屬有檢法官幹辦官提舉常平司宋史職官志提舉常平司掌常平義倉免役市易坊場河渡水利之法皆總其政令仍専舉刺官吏之事宋史神宗本紀熙寧二年差官提舉諸路常平廣惠倉兼管勾農田水利差役元豐元年增置兩浙提舉官宋史食貨志元祐元年詔提舉官纍年積蓄錢榖財物盡樁作常平錢物委提點刑獄交管罷各縣専置主簿宋史哲宗本紀紹聖元年復提舉常平官徽宗本紀宣和七年罷提舉常平官屬髙宗本紀建炎元年省諸路提舉常平司紹興五年并諸路提舉常平入茶鹽司十五年改諸路提舉茶鹽官為提舉常平茶鹽公事宋史食貨志隆興二年遣司農少卿陳良弼點檢浙東常平等倉提舉茶鹽司宋史職官志提舉茶鹽司掌摘山煮海之利以佐國用給賣鈔引通商阜財時詣所部州縣巡歷覺察禁止私販按劾不法其屬有幹辦官宋史太宗本紀淳化四年置諸路茶鹽制置使宋史職官志崇寧三年始别差官提舉茶鹽政和改元詔江淮荆浙六路共置一員既而諸路皆置中興後通置提舉常平茶鹽司建炎元年常平職事並歸提刑司二年復置常平官未幾罷紹興二年復置主管其後置經制司改常平官為經制某路幹辦常平等公事未幾經制司罷復為常平官十五年詔諸路提舉茶鹽司改充提舉常平茶鹽公事提舉坑冶司宋史職官志提舉坑冶司掌收山澤之所産及鑄泉貨以給邦國之用文獻通考江淮荆浙閩廣之地皆有監係發運使兼提點至景祐二年始置江浙等路都大提點坑冶鑄錢一員元豐二年三司言江浙等路一員巡按不周欲增一員分路提點從之遂定為兩司在饒者領江東淮浙七閩在虔者領江西荆湖二廣焉至元祐元年以坑冶鑄錢通為一司宋史食貨志政和六年令兩浙漕臣皆領坑冶宋史髙宗紀紹興二十九年復置江淮荆浙等路提點坑冶鑄錢官宋史職官志乾道六年並歸發運司發運司罷復置提點兩司如初其屬有幹辦公事二員檢踏官六員稱銅官催綱官各一員提舉市舶司宋史職官志提舉市舶司掌蕃貨海舶征𣙜貿易之事以來逺人通逺物文獻通考宋咸平二年令杭州眀州各置市舶州縣兼領元豐中始令轉運司兼提舉兩浙以轉運副使周直孺兼提舉催行而州郡不預後専置提舉而轉運亦不復預矣宋史徽宗本紀崇寧元年詔杭州眀州置市舶司髙宗本紀建炎元年省兩浙提舉市舶司二年復置孝宗本紀乾道二年罷兩浙提舉市舶司文獻通考建炎中興罷兩浙福建市舶司歸轉運司眀年復閩浙二司乾道二年罷兩浙提舉委知通知縣監官同行檢視而令轉運司提督提舉學事司宋史職官志提舉學事司掌一路州縣學政嵗巡所部以察師儒之優劣生員之勤惰而專舉刺之事宋史神宗夲紀熙寧二年置諸路學官徽宗本紀宣和三年罷諸路提舉學官髙宗本紀紹興十三年七月命諸路有出身監司一員提舉學事九月詔諸州守二提舉學事縣令佐之管學事提舉保甲司文獻通考提舉保甲司掌什伍其民教之武藝元豐初置於開封府界遂下其法於諸路悉置提舉官如府界焉知臨安府尹少尹宋史職官志臨安府舊為杭州領浙西兵馬鈐轄建炎三年改為臨安府其守臣令帶浙西同安撫使時置帥在鎮江府紹興駐驆臨安遂正稱安撫使置知府一員通判二員簽書節度判官廳公事節度推官觀察判官録事參軍左右司理參軍司户司法參軍各一員領縣九乾道七年太子領尹事廢通判簽判職官置少尹一員判官二員推官三員少尹比知府判官比通判推官比幕職官九年太子解尹事臨安府知通簽判推判官並依舊置權知軍州事知府事州軍監通判幕職官諸曹官教授宋史職官志宋初分命朝臣出守列郡號權知軍州事諸府置知府事一人州軍監亦如之掌總理郡政宣布條教其賦役錢榖訟獄之事兵民之政皆總焉别其地望之髙下與職務之煩簡置之分曺以理之而總其綱要凡屬縣之事皆統焉文獻通考宋乾德初始置諸州通判建隆四年大郡置兩員杭益等州餘置一員掌倅二郡政凡事可否裁決與守通簽所部官得刺舉以聞建炎初諸州二員減一員紹興以後旋行申省添置宋史職官志簽書判官廳公事兩使防團軍事推判官節度掌書記觀察支使掌禆贊郡政斟酌可否白於其長而罷行之員數多寡視郡小大及職務之煩簡宋史職官志諸曹官舊制録事參軍掌州院庶務糾諸曹稽違户曹參軍掌戶籍賦稅倉庫受納司法參軍掌議法斷刑司理參軍掌訟獄鞫勘之事文獻通考慶歷四年詔諸路州軍監各立學學者二百人以上許更置縣學又置教授以經術行義訓𨗳諸生掌其課試之事而糾正不如規者委運司及長史於幕職州縣官內薦或本處舉人有德藝者充當時未𨽻朝廷也熙寧六年詔諸路學官並委中書門下選差至是始命於朝廷矣建炎三年罷紹興十三年詔諸州軍並置若試教官則始於元豐添差教授則始於政和縣令丞簿尉文獻通考建隆元年天下諸縣除赤畿外有望緊上中下掌總治民政凡户口賦役錢糧賑濟結納之事皆掌之三年始以朝臣為知縣其間復參用京官或幕職天聖間詔為舉法以重令選自是人重為令乾道二年非兩任縣令不除監察御史初改官人必作令謂之須入慶元後雖宰相子殿試科甲人無不宰邑者宋史職官志縣丞初不置熙寧四年縣户二萬已上增置丞一員以幕職官或縣令人充崇寧二年縣並置丞一員嘉定後小邑不置丞以簿兼宋史職官志開寶三年諸縣千户已上置令簿尉四百户已上置令尉令知主簿事四百户已下置簿尉簿知縣事咸平四年後江南諸縣各增置主簿中興後凡縣不置丞則簿兼丞之事宋史職官志建隆三年每縣置尉一員在主簿之下至和二年凡縣不置簿則尉兼之隆興間邑大事煩則置二尉武職宋史兵志神宗元豐四年置團結東南路諸軍共十三將兩浙西路為第三東路為第四凡諸將各置副一人東南兵三千人已下惟置單將凡將副皆選內殿崇班已上嘗歷戰陳親民者充且詔監司奏舉各以所將兵多寡置部將隊將押隊使臣各有差又置訓練官次諸將佐元祐元年司馬光言每將下各有部隊將訓練官等一二十人而諸州又自有總管鈐轄都監監押設官重復虛破廪祿欲乞盡罷諸路將官其禁軍各委本州長吏與總管鈐轄都監等於是稍省諸路鈐轄及都監員仍以將官兼州都監職事文獻通考宣和五年御筆諸路將副部隊自今並依元豐法選差乾道四年詔諸州各置準備將一員專管日逐訓練宋史職官志總管鈐轄司掌總治軍旅屯戌營房守禦之政令凡將兵𨽻屬官訓練教閲賞罰之事皆掌之守臣帶提舉兵馬巡檢都監及提轄兵甲者掌統治軍旅訓練教閲以督捕盜賊而肅清治境凡諸營各籍賞罰之事皆掌之靖康元年詔諸路將官掌統所𨽻禁旅而教習訓練之别其武藝強者待次遷補凡兵仗器甲之數廪祿犒設賞罰約束之禁令皆掌焉副將為之二若屯戌防邉則受帥司節制宋史職官志路分都監掌本路禁旅屯戌邉防訓練之政令以肅清所部州府以下都監皆掌其本城屯駐兵甲訓練差使之事資淺者為監押建炎初分置帥府以諸路帥臣兼要郡守臣帶兵馬鈐轄次要郡帶兵馬都監並以武臣為之副稱副總管副鈐轄副都監許以便宜行軍馬事辟置僚屬依帥臣法屯兵皆有等差遇起兵則副總管為帥副鈐轄都監各以兵從聽其節制紹興三年詔守臣罷帶兵職其逐路副總管依舊格改充路分都監為一路掌兵之官其各州鈐轄或省或置不一又有逐路兵馬都監兵馬監押掌煙火公事捉捕盜賊巡檢司文獻通考巡檢掌巡邏譏察之事中興後凡沿江沿海控扼要害及地方濶逺處皆置巡檢一員往來接連合相應援處則置都巡檢以總之皆以才武大小使臣充各隨所在聽州縣守令節制宋職官姓氏節度使錢宏俶見前鎮海軍節度使錢宏儀鎮東軍節度使錢惟治見前鎮東軍節度使錢昱錢宏儞靜海軍節度使以上並宋初任觀察使錢惟濬見前浙西觀察使李顯忠綏德軍青澗人浙東觀察使曽覿字純甫汴人浙東觀察使髙世則越州觀察使韋淵明州觀察使張説開封人眀州觀察使張薿明州觀察使藍安石湖州觀察使防禦使李顯忠浙東防禦使趙隆溫州防禦使團練使田欽祚汝隂人秀州團練使沈括字存中錢塘人秀州團練副使察訪使沈括見前李承之字奉世劉豫字彥由阜城人趙約趙與擇亷訪使李謙亨曲沃人浙東廉訪使周伯琦鄱陽人江東廉訪使巡撫使樂史字子正宜黃人宋初任夏侯嶠字峻極濟州巨野人潘慎修字成德泉州莆田人副使邢昺字叔明曹州濟隂人已上真宗時任巡察御史王子韶字聖美太原人顔思曽陳升卿字暘叔建陽人都督周瑩瀛州景城人趙元份已上太宗時任傅嵩卿字子駿山隂人朱勝非字藏一蔡州人呂頤浩字元直齊州人孟庾已上髙宗時任宣撫使童貫中官談禎中官已上徽宗時任周望郭仲荀副使張浚字德逺綿竹人已上髙宗時任賈似道字師憲台州人理宗時任王爚字仲潛新昌人恭宗時任經略安撫使呂頤浩見前再任韓世忠字良臣延安人劉光世字平叔保安軍人已上髙宗時任吳端光宗時任趙與􅊸字德淵太宗十世孫居湖州理宗時任馬廷鸞字翔仲樂平人度宗時任曽淵子謝堂已上恭宗時任安撫使裴莊字端已閬州閬中人真宗時任劉寧止字無虞歸安人康允之沈晦字元用錢塘人梁汝嘉字仲謨處州麗水人郉純已上髙宗時任陸持之字伯微金溪人張虙字子宓慈溪人王邁已上寧宗時任翟汝文字公巽丹陽人欽宗時任袁韶字彥淳慶元府人沈與求字必先湖州德清人馬光祖字華父婺州金華人何夢祥趙與歡字恱道常㮊字長孺卭州臨卭人已上理宗時任李芾字叔章廣平人洪燾臨安於潛人黃萬石已上度宗時在家鉉翁字則堂眉州人王霖龍已上恭宗時任謹按此外更有安撫使係臨安紹興守臣帶志不别出制置使錢惟濬見前宋初任陳建談禎見前已上徽宗時任郭仲荀王淵字幾道環州人呂頤浩見前再任陳文彥副使程千秋副使周望韓世忠見前張浚見前張俊字伯英成紀人劉光世見前康允之仇悆字泰然益都人湯東野李綱字伯紀卲武人梁汝嘉見前劉錡字信叔德順軍人已上髙宗時任厲文翁婺州人吳潛字毅夫寧國人已上理宗時任文天祥字宋瑞吉水人張世傑范陽人已上恭帝時任沿海制置使吕源仇悆見前郭仲荀梁汝嘉見前王彥副使已上髙宗時任趙子潚字清卿秦康惠王六世孫趙愷范成大字致能吳郡人趙師夔已上孝宗時任王介字元石金華人光宗時任吳琚趙彥逾字德光已上寧宗時任胡矩字仲方廬陵人趙與􅊸見前鄒應龍字景初趙善湘字清臣陳愷長樂人吳潛見前馬天驥字德夫衢州人李曽伯字長孺覃懷人後居嘉興朱熠溫州平陽人楊棟字元極眉州青城人已上理宗時任葉夢鼎字鎮之寧海人王爚見前劉黻字聲百樂清人已上度宗時任兩浙走馬承受公事劉文質字士彬保州保塞人發運使錢惟濬見前宋初任雷有終字道成同州郃陽人楊允恭漢州綿竹人李延遂王子輿莒人已上太宗時任劉師道字損之開封東眀人王嗣宗字希阮汾州人邵曅字日華荆南人馮亮孫長卿字次公揚州人楊覃字申錫浙人已上真宗時任方偕字齊古興化莆田人劉平字士衡祥符人蔣堂字希魯宜興人鍾離瑾字公瑜合肥人已上仁宗時任薛向字師正林旦福州人任諒字子諒眉山人蔡京字元長仙遊人已上哲宗時任曽孝藴字處善泉州晉江人趙霆陳遘字亨伯永州人盧知原字行之德清人已上徽宗時任權邦彥字朝美河間人李逮東平人李道字行之相州人程邁已上髙宗宗時任史正志孝宗時任程元鳳字申甫徽州人王爚見前趙與􅊸見前徐鹿卿字德夫豐城人吳淵字道父已上理宗時任王鼎字鼎臣館陶人徐的字公凖建州建安人副使蔣之竒字潁叔常州宜興人副使陳塏字子爽嘉興人張綸胡則字子正婺州永康人已上未審其次轉運使周渭字得臣昭州恭城人太祖時任楊克讓馮翊人趙齊副使劉保勳字修業河南人鄭遜副使李繼凝徐休復字廣初鄄城人副使雷德驤字善行同州郃陽人髙冕魏羽字垂天婺源人張雍德州安德縣人李若拙字藏用京兆萬年人柴成務字寶臣曹州濟隂人曾致堯字正臣南豐人任中正字慶之曹州濟隂人李建中字得中京兆人已上太宗時任姚鉉字寶臣廬州合肥人孫冕新淦人謝泌字宗源歙州歙人陳堯佐字希元閬中人副使孫何字漢公汝陽人梅詢字昌言宣城人張傅字巖師譙人已上真宗時任吳奎字長文濰州人葉清臣字道卿蘇州長洲人副使徐奭建安人章祐浦城人司馬池字和中夏縣人段少連字希逸開封人副使張夏字伯起雍丘人孫甫字之翰許州陽翟人江鈞張從革田瑜字資忠河南夀安人韓縝字玉汝雍丘人沈遼字睿逹錢塘人胡宿字武平晉陵人王琪字君玉華陽人方慎言興化人孫瑜字叔禮博平人鄭向字公眀陳留人副使張瓌字唐公范師道字貫之長洲人劉夔字道元建州崇安人已上仁宗時任王益柔字勝之河南人李肅之字公儀幽州人李復圭字審言徐州人已上英宗時任錢暄惟演子沈立字立之歷陽人劉彝字執中福州人副使已上神宗時任毛漸字正仲衢州江山人葉溫叟西安人蔡濛副使賈清韓城人已上哲宗時任莊徽江都人副使劉既濟應安道無為軍人副使王汝眀詹度蔣彝李祉侍其傅胡陳建蘇莊王復字景仁淄川人胡直孺字少汲奉新人王仲閎孟庾李堯夫曽讜陳昌弼李弼孺已上徽宗時任翁彥國黃䇿黃惇書已上欽宗時任劉蒙范沖字元長蜀人王淙副使湯東野丹陽人副使成大亨副使顧彥成副使陳國瑞副使李承運副使徐康國副使曽紆副使劉寧止見前副使盧知原見前梁汝嘉見前副使又都使馬成家副使張致逺副使王俁副使吳革字孚道全椒人副使再任宋縡副使李逮見前都使向子諲字伯恭臨江人都使張澄張滙副使三任汪思溫字汝直鄞人副使蔣璨宜興人副使王㬇華陽人副使張叔獻副使李椿年副使王鐵副使趙伯牛副使吳坰副使錢端禮字處和臨安人副使再任湯鵬舉金壇人副使沈該字約父歸安人副使唐遵一作道副使曹泳副使趙不羣字介然太宗六世孫副使陳璹副使張稱副使李邦獻副使趙子潚見前副使湯沂副使黃仁榮副使再任吕廣問副使林安宅副使王時升副使龔濤副使已上髙宗時任朱夏卿副使薛良朋副使王炎字晦叔婺源人副使薑詵副使周淙字彥廣長興人副使沈復字德之德清人副使胡堅常字秉彞晉陵人副使吳琚副使朱佺副使景秉副使再任張杓字定叟綿竹人副使錢沖之副使邱崈字宗卿江隂人副使鄭汝諧字舜舉青田人副使潘景圭副使已上孝宗時任沈詵副使再任黃黼字元章餘杭人副使已上光宗時任王溉副使趙師字從善副使趙善悉太宗後副使趙善堅字子固太祖十一世孫副使沈作賔字賔王歸安人副使葉簨副使趙彥勵副使陳景思副使史彌堅慶元人副使孟猷副使劉彌正副使吳鏜副使趙時侃副使章良肱湖州人副使趙伸夫副使沈皥副使邱夀雋副使朱在字敬之建安人副使已上寧宗時任趙崇和副使衛璞副使王野字子文金華人副使魏峻副使袁立儒副使章大醇副使余天任副使饒虎臣字宗召寧國人正使副使王克仁紹興人正使副使徐栗副使趙孟髙副使洪燾見前副使趙與訔字中甫秀安僖王五世孫副使正使已上理宗時任魏克愚卭州人副使潛説友字君髙縉雲人副使常楙字長孺同之曽孫副使正使曹元發副使趙與稙副使已上度宗時任許自漸副使恭帝時任馬尋項城人元綘字厚之錢塘人朱鈜建安人副使楊日嚴字垂訓河南人副使杜杲字子昕邵武人劉伯正餘干人呂沆字叔朝杜把字偉長常州無錫人費昌衡獲鹿人陳太素字仲華河南緱氏人喬惟嶽字伯周陳州南頓人已上未審其次浙江通志卷一百十三
