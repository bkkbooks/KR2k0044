body:
  text: 浙江通志卷七十六蠲恤二國朝順治二年六月二十八日欽奉恩詔內開一河南江北江南浙江等處人丁地畝錢糧及關津稅銀各運司鹽課自順治二年六月初一日起俱照前朝會計録原額徴解官吏加耗重收或分外科斂者治以重罪凡加派遼餉練餉召買等項永行蠲免即正額錢糧以前拖欠在民者亦盡行蠲免一大兵經過地方免正糧一半歸順地方不係大兵經過者免三分之一自順治二年六月初一日起至本年十二月三十日止一東南雖號沃壤但年來加派疊徴誅求無藝民力殫竭深可憫念凡近日一切額外加派準照三餉等例悉與豁免一窮民鰥寡孤獨篤廢殘疾不能自存者該府州縣申詳撫按動支豫備倉糧給養一明季軍興缺乏行一切茍且之政立借富糾貪等項名色巧取財物最為弊政除已徴在官外其餘拖欠未完者悉與豁免一各學貧生聽地方官核實申文該提學官於所在學田內動支錢糧酌量賑給一南直鎮江蘇州常州等府屬浙江紹興府屬江西南昌撫州饒州廣信等府屬應解會同館站價銀兩照北直等處恩例分别蠲免浙江江西福建廣東廣西雲南貴州應解節裁銀兩照地方煩簡斟酌蠲免順治四年二月十二日欽奉恩詔內開一浙江人丁地畝本折錢糧併衛所屯糧除杭嘉湖三府業經該總督題準照平南恩詔開徴今浙東八府俱自順治四年正月初一日起通照前朝萬厯四十八年則例徴收天啓崇禎加派盡行蠲免其唐魯二藩僭號竊據疊派橫徴地方尤稱苦纍一切悉行停止以蘇民困有司借名私派加耗虐民者事發治以重罪一新定地方徴收各項錢糧通自順治四年正月初一日起以前已徴在官者起解充餉拖欠在民者悉行蠲免一新定地方各儒學廩增附生員食廪肄業優免各學貧生聽地方核實申文該提學官於所在學田內動支錢米酌量賑給一新定地方兵民年七十以上者許一丁侍養免其雜泛差役八十以上者加給絹一匹綿一斤米一石肉十斤九十以上者倍之一浙江起解戶禮兵工四部金花果品菉筍黃白蠟富戶派剩米綿絹鹽鈔草束協濟昌平黃蠟扣價顔料餘銀輕齎藥材牲口會試料價雕填漆匠羅匠斑竹白豬鬃絶爐鐵課槐花梔子烏梅漁課麻鐵魚膠等料課鐵馬站併新改折盔甲腰刀胖襖箭弦等項漕白糧米綿絹黃蠟葉茶顔料黃麻栗果藥材金銀箔薦新芽茶弓折牛角筆管皮香狸皮山羊皮粗細銅絲鐵線鐵條針條鍍白銅絲青綿花碌子貓竹紫竹笙竹白硝麂皮狐皮槐花烏梅松香光葉書籍紙桐木黃白榜紙歲造段罩漆嚴漆桐油等項各本色錢糧以上併鋪墊水腳俱照前朝萬厯年間賦役全書徴收自順治四年正月初一日以前已徴在官者起解充餉拖欠在民者悉行蠲免一浙江起解江南各衙門折色永福倉米折絹折綿折厯日直部把門皂𨽻獄卒草折漕折山羊折桐油折餘絲易銀并本色漕白糧米絹匹合羅絲荒絲藥材金箔銀箔芽茶甘蔗等項俱照前朝萬厯年間賦役全書徴收起解赴戶部交納自順治四年正月初一日以前已徴在官者起解充餉拖欠在民者悉行蠲免一浙閩運司鹽課前代天啓崇禎年間加派名色甚多深為商厲令盡行蠲免止按萬厯年間舊額按引起課一關津抽稅原屬譏察非欲困商明末疊增數倍原額已經戶部題定照萬厯年間原額及天啓崇禎遞增額數一半徴收杭州南北二關先已差官其餘自順治四年正月初一日以後俱照此例一體抽徴其州縣零星抽取落地稅銀名色槩行嚴禁違者重治一丁銀雖有定額但生齒凋耗之後年老殘疾盡苦追徴甚至包納逃亡貽纍戶族殊堪憫惻自今以後各撫按官嚴行有司細加編審凡年老殘疾并逃亡故絶悉與豁免一窮民鰥寡孤獨篤廢殘疾不能自存者聽該府州縣申文撫按動支豫備倉糧給養順治五年十一月十一日欽奉恩詔內開一派徴錢糧俱照萬厯年間則例其天啓崇禎年加增盡行蠲免通行已久如有貪官汚吏例外私派多徴擾民者該撫按官糾察重處一地方災傷一經察勘即與蠲免有司官毋得仍行派徴及冒免有力之家致窮民不沾實惠一我朝定鼎以來恩詔有免荒地有免水旱災傷有免民間額賦不應再有拖欠或輸納已完地方官别項支用或侵入私槖以致小民虛受拖欠之名撫按確察某州縣額徴若干已完若干未完若干果係百姓拖欠自元年至三年悉與豁免一各處本色錢糧除顔料黃白蠟仍辦本色外其餘準解折色一半一軍民七十以上者許一丁侍養免其雜泛差徭八十以上給與絹一匹綿一斤米一石肉十斤九十以上者倍之一各處養濟院收養鰥寡孤獨及殘疾無告之人有司留心舉行月糧依時發給無致失所順治七年八月初十日欽奉恩詔內開一民間拖欠錢糧前次詔書已免元二三年今再免四年一年順治八年正月十二日欽奉恩詔內開一各省萬厯年間加派地畝錢糧八年一年準免三分之一順治八年二月十一日欽奉恩詔內開一各省人丁徭銀派徴不等八年一年曽分九則者上三則免七分之一中三則免五分之一下三則免三分之一不分等則者三錢以上免半三錢以下全免順治八年八月二十日欽奉恩詔內開一順治五年以前民間拖欠錢糧悉與豁免一各直省先加城工錢糧準抵八年正額內在恩詔未到以前先徴八年在官者俱各照數退還仍取花戶領狀繳撫按考察其有已解各部寺者併發該司府給領不得重纍小民一江南浙江福建江西山東等處題派綾紗紙張及三色榜紙龍瀝紙價姑念地方初定通免三分之一仍分三運起解一漕船缺額已準動輕齎銀兩責令運官自雇不得重派地畝又拏民船以蘇苦纍一各省府州衛所舊有養濟院皆有額設米糧該部通行設立給養該道府官從實稽察俾沾實惠一各直省儒學貧生該地方官核實申提學官於學田內動支銀米賑給順治十年戶部覆準浙江各屬旱災被災八九十分者免十分之三五六七分者免十分之二四分者免十分之一有漕糧州縣衛所準令改折順治十二年六月二十二日欽奉恩詔內開一順治六七兩年地畝人丁本折錢糧拖欠在民者悉與豁免一順治七年分厯日祭祀牛羊藥材本折錢糧拖欠在民者悉行蠲免順治十二年戶部覆準令各省地方官照京師例設厰煮賑以救飢民順治十三年七月初七日欽奉恩詔內開一罰贖積榖原以預備賑濟今歲水蝗為災秋冬之際恐民生艱困各巡按御史確察災荒地方除蠲免正糧外其流離無告者即動前項贖榖賑濟一十二年以前各省牛角料果有未解完者工部照例改折以紓民力順治十三年十二月二十五日欽奉恩詔內開一順治八九兩年地畝人丁本折錢糧該督撫確察果係拖欠在民者具奏豁免一順治八九兩年分厯日祭祀牛羊藥材本折錢糧拖欠在民者該督撫確察具奏豁免一十三年以前各省牛角皮料等項未解完者工部確察照例改折以紓民力順治十四年三月初十日欽奉恩詔內開一派徴錢糧俱照萬厯年間則例其天啓崇禎年間加增盡行蠲免通行已久如有貪官汚吏例外私派多徴擾民者該督撫按官紏察重處一貧民失業流落各地方官有能賑恤全活五百人以上者核實紀録千人以上者即與題請加級其有鄉宦富民尚義出粟全活貧民百人以上者該地方官核實具奏分别旌勸順治十五年正月初三日欽奉恩詔內開一順治十十一兩年地畝人丁本折錢糧該撫按確察果係拖欠在民者具奏豁免一順治十十一兩年分厯日祭祀牛羊藥材本折錢糧拖欠在民者該撫按確察具奏豁免一順治十四年以前各省牛角皮料等項果有未解完者工部確察照例改折以紓民力順治十五年戶部覆準浙江寧紹二府屬龍颶霪雨被災田畝按分數免本年正額錢糧順治十七年正月二十五日欽奉恩詔內開一順治十六年以前直省拖欠錢糧差亷幹滿官前往清查果係拖欠在民俱與蠲免順治十八年正月初九日欽奉恩詔內開一軍民年七十以上者許一丁侍養免其雜泛差役八十以上者給與絹一匹綿一斤米一石肉十斤九十以上者倍之康熙三年欽奉恩詔內開一直省順治十五年以前拖欠各項銀米藥材紬絹布匹等項錢糧槩行蠲免康熙四年三月初五日欽奉恩詔內開一直省順治十六十七十八年各項舊欠錢糧著照蠲免十五年以前錢糧一體蠲免其鹽課積逋催徴不得者著察明亦準酌量蠲免康熙六年十一月二十六日欽奉恩詔內開一近來徴收錢糧天平法馬太重多加火耗民受困苦著督撫司道等官嚴飭有司務要遵依較定法馬不許私自增加仍不時密察指名參奏及上司差役催提橫加需索凌逼屬官擾害百姓者併著嚴行禁戢督撫各官不行覺察者一併治罪一各處養濟院所有鰥寡孤獨及殘疾無告之人有司留心以時養贍無致失所康熙八年十一月二十五日欽奉恩詔內開一康熙元二三年直𨽻各省地丁正項錢糧拖欠在民不能完納者該督撫察明奏請豁免一罰贖積榖原以備賑冬月嚴寒恐鰥寡孤獨無以為生者著直𨽻各省督撫責令有司官將積榖酌量賑濟康熙九年五月初六日欽奉恩詔內開一地方災傷已經察勘蠲免賦役者有司不遵仍行濫派及但免有力之家窮民不沾實惠者事發決不饒恕一軍民年七十以上許一丁侍養免其雜泛差役八十以上者給與絹一匹綿一斤米一石肉十斤九十以上者倍之一各處養濟院所有鰥寡孤獨及殘疾無告之人有司留心以時養贍無致失所康熙九年戶部覆準嘉湖被災漕白折徴耗米及贈貼錢糧俱行免徴康熙十年十一月初九日欽奉恩詔內開一康熙四五六年直𨽻各省地丁正項錢糧實係拖欠在民不能完納者該督撫察明奏請蠲免康熙十二年戶部覆準浙省被災州縣許以秈米兑運康熙二十年十二月二十日欽奉恩詔內開一康熙十七年以前民欠錢糧稅銀及帶徴錢糧該督撫查明保題到日豁免一康熙十七年各行鹽地方起增閏月課銀除已完外如有拖欠者該巡撫御史查明保題到日豁免此後閏月停其增收康熙二十三年九月二十四日欽奉恩詔內開一江南浙江江西湖廣省分自用兵以來供應繁苦宜加恩恤康熙二十四年所運漕糧著免三分之一一自康熙十三年起至二十二年拖欠漕項錢糧著自康熙二十三年每年帶徴一年以免小民一時並徴之纍一各處孤貧口糧已復存留經管地方官務須從實給散以贍窮獨康熙二十六年五月初三日欽奉恩詔內開一康熙十三年以後加增各項雜稅銀兩該部查明俱與豁免康熙二十六年九月戶部覆準浙省西安等八縣上年被水田地免本年正額錢糧康熙二十七年十月二十三日欽奉恩詔內開一浙江康熙二十八年應徴地丁各項錢糧俱著蠲免一軍民七十以上者許一丁侍養免其雜派差役八十以上者給與絹一匹綿一斤米一石肉十斤九十以上者倍之一各處養濟院所有鰥寡孤獨及殘疾無告之人有司留心以時養贍毋致失所康熙二十八年二月戶部覆準浙省宣平縣上年旱蝗被災田畝按分數免本年正額錢糧康熙二十九年十二月十八日戶部為彚報秋災等事覆準浙省餘姚上虞諸暨慈溪四縣被災田畝應免銀三萬七千九百一兩一錢零照例蠲免康熙三十年十二月初四日戶部奉上諭恭紀首卷蠲免浙江康熙三十三年應輸漕米康熙三十三年二月戶部為彚報夏災等事覆準浙省餘姚上虞􅌘三縣被災田畝應免銀二萬六千一百五十六兩五錢零照例蠲免康熙三十四年十二月十七日欽奉恩詔內開一浙江等省康熙三十三年以前厯年積欠及帶徴未完銀米俱著豁免康熙三十六年七月十九日