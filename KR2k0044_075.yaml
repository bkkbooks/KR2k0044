但免有力之家致窮民不沾實惠者事發決不饒恕一罰贖積榖原以備賑冬月嚴寒恐鰥寡孤獨貧民無以為生著直省各督撫令有司務將積榖酌量賑濟雍正元年十一月戶部為彚報秋旱等事覆準浙江富陽等二十九州縣被災田畝應免銀八萬六千九百五十七兩一錢零十一月又為續報秋旱等事覆準仁和等二十一州縣被災田畝應免銀五萬七千五百九十八兩三錢零前項被災田畝應免銀兩與例相符照例蠲免至被災地方應徴本年錢糧俟雍正二年麥熟後催徴其應賑被災黎民該撫照例按口煮賑雍正元年十一月十一日戶部奉上諭恭紀首卷杭嘉湖所屬被災十四州縣額徴漕米三十二萬石令徴收一半改折一半俾地方多存米十六萬石以濟民食改折之價照康熙九年例每石折銀一兩其徴收一半漕米俱令紅白兼收互見漕運雍正二年八月二十四日戶部奉上諭恭紀首卷浙江七月十八十九等日海潮衝決隄岸被災小民著即動倉庫錢糧速行賑濟應免錢糧田畝察明蠲免雍正二年九月二十二日欽奉上諭恭紀首卷浙江沿海被災小民艱食著湖廣買米十萬石江西買米六萬石送交浙江巡撫平糶雍正三年五月初七日戶部奉上諭恭紀首卷海潮衝溢沿海場竈淹沒之處將雍正元年二年未完場課銀兩悉行蠲免雍正四年十月戶部為彚報杭嘉湖府屬雨水情形等事覆準浙江仁和錢塘石門安吉歸安烏程長興武康等九州縣湖州一所被災田畝應蠲免銀三萬三千五十八兩四錢零照例蠲免至被災地方新舊應徴錢糧俱緩至來年麥熟後徴收仍動存倉米榖按明戶口散賑雍正四年十一月戶部咨覆浙江巡撫李衛奏稱浙江杭嘉湖三府所屬之仁錢等十州縣一所其中地勢窪下者於本年八月初七八等日隂雨連綿緣太湖等處水泄不及以致低田被淹今據各地方里民呈稱漕糧為數甚多今秋田禾正值開花結秀之時水浸已久低處稻既無收髙處米色亦不能佳難輸正供若欲逺方買糴不但民力艱難且恐致誤冬間漕限懇為題請仍照雍正元年改折一半每石交銀一兩并準紅白兼收之例庶得勉力措納臣細加確查此十州縣一所內除餘杭縣旋即水退勘不成災並湖州一所例無徴納漕糧外其餘九州縣髙田尚可收成惟低窪被災傷重以通縣計之不過十分之一二三四分不等若將實在災田應納漕米改折為數無多但平地禾苖亦經水浸即髙處有收之田其米亦皆青腰白濕潤細碎民間日用則可若以之完漕州縣不敢收倉旗丁不肯受兌倘責令買糴則近處米色相同而江省湖廣向來出米之處亦有被水州縣較前出米數目頗少民力實有艱難可否仰邀皇恩照雍正元年之例懇將成災低田漕糧每石仍舊折徴銀一兩其餘被水州縣今年漕米暫令紅白兼收尖圓並納則於漕糧無虧而小民感戴天恩實同覆載矣奉旨著照該撫所請行雍正五年二月戶部為彚報杭嘉湖府屬雨水情形等事議覆浙江巡撫李衛疏稱仁和等九州縣一所田畝被淹仰蒙皇恩賑濟臣查現在被災里民近今猶有殘粒浥米可以糊口惟至來年二三月間青黃不接之際實屬艱難伏念發賑原以濟急當現在稍可自濟之時暫緩散給留至過歲二月前後求食艱難之日散賑使之實得藉以糊口一轉移間先後緩急似為得宜等因前來查仁和等州縣所被災里民該撫既稱現在稍可自濟暫緩散給應令該撫俟青黃不接之時出示曉諭照例按口散賑務使真實災民均沾實惠可也奉旨依議雍正五年二月初九日欽奉上諭恭紀首卷浙江杭嘉湖三府收成歉薄著動庫銀四萬兩或開河道或修城垣令小民傭工糊口互見城池雍正五年九月十二日戶部奉旨朕聞浙江近水之地有數處被水著浙江巡撫李衛動用庫銀一萬兩於應用之處散賑務令窮民均沾實惠該部知道雍正五年十月二十七日欽奉上諭恭記首卷嘉湖二府額徴浮糧共豁免銀八萬七千二百兩零永著為例雍正五年十一月戶部為彚報偏災等事覆準浙江仁和錢塘餘杭臨安新城安吉長興武康德清鄞十州縣并杭州前右二衛本年七月間山水暴漲被淹田畝應免銀一萬四千六百五十九兩三錢零又石壓水衝成溪田畝應免無徴銀三十八兩九錢零米二十二石五斗零應照例蠲免其本年應徴錢糧緩至雍正六年麥熟後催徴至漕米照浙省支給運丁行糧例每石以一兩二錢折徴完報雍正六年三月初四日戶部奉上諭君民上下之間休戚相同本屬一體論語曰百姓足君孰與不足是民間之生計即國計也自古人君有不恤民之災濟民之困者無此情理而至於歉歲蠲免之數往往多寡不同者則時勢贏絀為之出於不得已也如明洪武時凡水旱地方稅糧即與蠲免成化時凡被災之地以十分為率減免三分𢎞治時全荒者免七分九分者免六分以是遞減至被荒四分免一分而止我朝順治初年凡被荒之地或全免或免半或免十分之三以被災之輕重定蠲數之多寡順治十年議定被災八九十分者免十分之三五六七分者免十分之二四分者免十分之一康熙十七年議定歉收地方除五分以下不成災外六分者免十分之一七分八分者免十分之二九分十分者免十分之三此例現在遵行凡此多寡不同之數或旋減而旋增皆因其時勢為之亦非先後互異意為損益也嘗見地方有司每不願蠲免太多者蓋恐蠲賦則並減其耗羡不利於已耳此貪吏之見也朕嘗謂若於蠲免之時有所吝惜而平日不能禁官吏之侵漁是將災黎之脂膏飽姦貪之欲壑矣數十年來雖定三分之例然聖祖仁皇帝深仁厚澤愛養斯民或因偶有水旱而全蠲本地之租亦且並無荒歉而輪免天下之賦浩蕩之恩不可勝舉而特未曽更改舊例者蓋恐國家經費或有不敷故仍存成法而加恩於常格之外耳朕即位以來命怡親王等管理戶部事務清查虧空剔除弊端悉心經理數年之中庫帑漸見充裕以是觀之治賦若得其人則經費無不敷之事用沛特恩將蠲免之例加增分數以惠蒸黎其被災十分者著免七分九分者著免六分八分者著免四分七分者著免二分六分者著免一分將此通行各省知之朕視萬民實為一體痌瘝念切懷保情殷因思自古無不愛民恤下之人君亦斷無不急公親上之黎庶秖以時勢所值各有不同今就目前國用計之可以加惠吾民使沾渥澤是以斟酌分數定為規條倘將來國用益饒更可加增於此數之外假若經費或又不足凡爾百姓自然共知共諒踴躍輸將則此例又可變通必不因朝廷格外之恩而遂忘奉公之本念也如此則君民一心上與下各盡其道太和翔洽感格上蒼將見災沴全消雨暘時若豐亨有慶旱潦無聞豈不美歟並令各省督撫轉飭有司遍諭鄉村衆庶咸使聞知特諭雍正七年二月二十六日欽奉上諭恭紀首卷本年額徴地丁屯餉錢糧蠲免十分之二共銀六十萬兩雍正七年九月初四日戶部為報明江邑蛟水情形等事覆準浙江衢州府屬江山縣六月十七日東南山鄉峽口地方蛟水陡發田禾被淹於備公項下即動支銀兩賑恤仍作速遴選賢員查勘被水田畝一面題報一面加意撫恤毋致小民失業雍正九年十一月十一日欽奉上諭恭紀首卷浙江嘉興府屬七縣並杭州府屬之海寧一縣小有蟲災本年應完漕米照雍正元年例每石折徴銀一兩雍正十一年五月浙江總督管巡撫事臣程元章為陳奏事查嘉興府屬之石門桐鄉湖州府屬之歸安烏程等縣於雍正十年九月初九日偶被冰雹打傷田禾查勘被災情形請動支備公銀兩賑恤蒙聖恩俞允欽遵在案除石門一縣據該縣勘明被雹較輕小民尚可謀食毋庸賑恤外其桐鄉歸安烏程三縣被雹貧民委員會同地方官逐戶查明實在乏食名口飭令每大口賑銀三錢小口賑銀一錢五分共賑過貧民大口一萬五千四百八十八名口小口三千五百八十五名口共賑銀五千一百八十四兩一錢五分俱於備公銀內動支給發相應取具册結題銷奉旨該部察核具奏雍正十一年十月浙江總督管巡撫事臣程元章為咨明事查浙省上年田禾間生小蟲收成略減惟平湖海鹽武康諸暨等縣較重又安吉州天目山發水田禾浸淹委勘雖不成災而被蟲水之戶催令完漕未免艱於辦理酌令借動倉榖碾米應兌俟今歲早榖登場每米一石折徴銀一兩買榖還倉至於各府間被蟲水之田先經酌動備公銀兩助給資本令其補種菜豆飭各屬查明實在乏食貧民按戶賑恤節次具奏荷蒙聖恩俞允欽遵在案今據布政司王紘詳稱杭州等府屬之海寧等五十一州縣併玉環同知賑濟過乏食窮黎自本年二月起至四月底止煮粥散賑并各因地制宜賑米賑銀不等通共賑過大口三十二萬四千五百四十八口小口一十二萬八千四百二十九口共賑過米二萬二千八百八十九石三斗八升零榖二百五十石四斗零銀一千五百三十七兩零係動支生俊捐榖捐監銀兩恩賞備公并鹽道庫等案內米榖銀兩及玉環同知徴存榖價俱各查明按口逐日賑給造具各册詳送臣覆核無異理合題銷奉旨該部察核具奏雍正十一年十一月浙江總督管巡撫事臣程元章為彚報被雹情形等事查海寧石門桐鄉烏程遂安等五縣本年三月間被雹打傷春花經臣委員勘實成災田畝賑給籽本銀兩業經造册具題在案查石門縣上年今春兩被雹傷被歉窮民自應倍加賑恤其海寧桐鄉烏程遂安等四縣確查災戶實在乏食貧民從前蟲案未曽受賑者按戶口大小口數分别總給銀米五縣共賑過窮民二萬一千五百六十四戶內男婦大口五萬九千九百八十四名口小口二萬六千五百一十一名口共賑過米三千三十六石七斗銀二千六百七十三兩八錢係動支雍正八年買貯漕榖礱米并司庫雍正十年分恩賞備公銀兩應用造具册結理合題銷奉旨該部察核具奏雍正十一年十月十四日欽奉上諭恭紀首卷浙江杭嘉湖三府各截留本年漕米五萬石存貯平糶以濟民食湖州府之歸安烏程二縣本年應徴漕米并帶徴雍正十年分漕米俱照部定折價改徴互見積貯漕運雍正十二年十月戶部為彚報浙屬山田被水等事議覆浙江總督程元章疏稱浙屬昌化淳安遂安壽昌等縣地處山鄉田多傍溪緣本年五月間黴雨過多一時泄㵼不及以致禾苖被淹經臣備敘情形題報並聲明各縣被水田禾小民空費資本飭令酌給料種資本勸諭及時補種其酌給資本銀兩統於備公項下動支核實題銷在案隨又委員踏勘去後今據布政使張若震詳稱除昌化壽昌二縣被水田禾天晴水退補種有日不致成災外查淳安等縣勘實成災田畝通共給過籽粒資本銀一千三百九十三兩零在於雍正十二年備公項下動支給發理合題請蠲免以廣皇仁再淳安遂安二縣被災田地應徴錢糧請暫緩催輸以紓民力實在乏食窮民並請照例動支倉榖賑濟以免失所等因前來查該督册報淳安遂安二縣被災田地分數應免銀兩與例相符昌化等四縣散給資本銀兩係應給之項應準其蠲免散給淳安遂安二縣被災田地錢糧應準其緩至乙邜年麥熟後開徴乏食窮民動支倉榖賑濟仍令該督將蠲免銀兩賑濟榖石造册題銷可也奉旨依議雍正十三年正月戶部為彚報浙屬山田被旱等事覆準浙江杭州府屬之新城縣嚴州府屬之分水縣上年夏末秋初雨澤愆期髙阜山田間有被旱勘實成災田畝蠲免錢糧并將乏食窮民動支賑濟共賑過男婦大口三萬一千七百三名口小口一萬一百七十九名口雍正十三年九月初三日欽奉恩詔內開一各省民欠錢糧係十年以上者著該部查明具奏候旨豁免一軍民年七十以上者許一丁侍養免其雜泛差役八十以上者給與絹一匹綿一斤米一石肉十斤九十以上者倍之雍正十三年九月二十三日總理事務王大臣等奉上諭各省民欠錢糧十年以上者已於恩詔內槩豫豁免其餘未完民欠尚係應徵者朕思纘緒方初惟當繼述我皇考惠養黎元之至意俾服疇力穡之人均沐恩膏積逋全釋若未蠲之項尚事徵收民間不無煩擾兹特再行降旨於恩詔外將雍正十二年以前各省錢糧實欠在民者一併寬免從前江南積欠錢糧內曽有官侵吏蝕二項乃從民欠中分出者比時差往大臣官員辦理原不妥協亦著照民欠例寬免此朕仰體皇考誠求保赤之仁深願吾民厚生正德之意各省軍民人等身受國恩至渥自應感動天良屏除陋習明守法奉公之大義循則壤成賦之常經共為良民免追呼之擾纍倘疲玩性成不知悛改則是吾民中最為愚頑之人既無畏威之念亦鮮懷德之心國法具在朕亦不能為之寬貸也爾等即交部遵行欽此雍正十三年十月初七日欽奉上諭豁免雍正十三年以前民欠漕項蘆課學租雜稅等銀並令嗣後遇有恩詔俱將各項入於豁免之內永著為令互見漕運雍正十三年十月戶部為彚報秋禾被水等事議覆浙江巡撫程元章疏稱浙省地方今歲二麥豐收之後雨暘時若民間播種及時田禾俱各暢茂秀發惟台州府屬之仙居金華府屬之東陽永康溫州府屬之永嘉處州府屬之縉雲等五縣於六月初二初三等日山水驟發凡湧過之處田禾被淹房舍衝壞除飛飭各該府縣將被水窮民加意撫恤毋致失所并委員星馳會勘果否成災取結另題外所有被水情形合先題報再各縣被水之家佃種小民未免拮據應飭查明將應完錢糧暫緩催徴稍舒民力等因應令該撫即將被水窮民逐一加意撫恤毋致失所至應納錢糧準其緩至丙辰年麥熟後開徴可也奉旨依議速行雍正十三年十一月十二日欽奉恩詔內開一各處養濟院所有鰥寡孤獨殘疾無告之人有司留心養贍毋致失所雍正十三年十一月二十一日欽奉恩詔內開一直𨽻各省婦女年七十以上者給與布一匹米五斗八十以上者絹一匹米一石九十以上者倍之百歲者題明給與建坊銀兩雍正十三年十二月初八日户部奉上諭向來漕項銀兩不在蠲免之例朕前已降旨特行豁免以紓民力今查各省尚有帶徴漕米原應如期輸納但民間已完現年漕米又完先年留米民力未免艱難著該部傳諭辦漕各省督撫等將雍正十二年以前未完帶徴緩徴本色改折米銀逐一查明奏聞豁免欽此雍正十三年十二月十三日欽奉恩詔內開一罰贖積榖原以備賑冬月嚴寒鰥寡孤獨貧民無以為生著直省各督撫令有司務將積榖酌量賑濟毋令姦民假冒支領浙江通志卷七十六
