比各縣丁少勻攤田地為數無多是以不即輕於舉行續據藩司詳稱紳襟里民公同會議請將二縣鄉市人丁無論田地山蕩屋基均勻攤納俱出情願其租户完租者每畝米加二升銀加二分以助産主完丁之費其仁邑患區田地止以本區之丁攤於本區之産俱於雍正四年起照此辦納等因本部院以衆既情願亦即照議批行去後但深知兩縣勻納丁糧數目仁邑除患區外每兩勻完二錢九分七釐四毫三絲錢邑每兩勻完三錢六分二釐五毫較之往年所完多增三分之一民力未免艱難本部院耿耿在心已非一日是以遍查欺隱通融抵補因許村錢清兩場爭告漲出沙地一案搆訟數十年屢經官斷而翻騰更改案如轆轤皆係兩場光棍結聮黨羽藐法肆行本部院訪拿為首重懲將兩場漲地分界勒石永遵并查出伊等厯年隱占甚多特飭徹底分號清文於前報刈草地三萬三百餘畝之外實丈出現種棉花桑樹地二萬六千二百七十一畝八分六釐零每畝私收租銀三錢起以至一錢不等刮淋地一萬五千七百五十一畝三分四釐零每畝私收租銀自一錢五分起至五分不等樵柴地二千二百八畝八分六釐零每畝私收租銀六分刈草地一千五百四十八畝二分七釐零每畝私收租銀五分三分不等連前報升刈草地租銀九百九兩四錢五分零通共包收租銀九千三百四十二兩四錢七分零止據報升課銀五百一十五兩三錢五分五釐其餘盡行入槖分肥并將佃種窮民苛刻勒索受其魚肉何止千百餘家此等棍徒蠧國剝民本應逐名嚴拿究罪追贓今姑從寬典免其深求自雍正六年為始凡租地佃户俱行杭捕同知查明造册取願認完租領狀給與帖文永逺管佃其租銀每年赴該同知衙門上納惟是棍等從前所收租息諒係河銀市戥較之交官紋銀庫平每兩自有數分不敷又年景收成豐歉難齊今本部院格外軫恤將從前原納租息酌議折減每舊有租一錢止以六分五釐徵收折淨租銀約計六千兩零除扣完已報升科草地課銀五百一十五兩三錢五分零外尚有五千四百餘兩查仁和市丁糧銀二千六百六十一兩零錢塘市丁糧銀二千六百五十六兩零與此題數適足相抵本部院現將情由具疏寺基址地山明請以此銀抵補二縣市丁并雲林銀二十二兩四錢零米五石五斗二升零餘剩無多留抵備坍豁除之用其仁錢二縣亦於雍正六年起止將鄉丁錢糧照額勻攤於田地山蕩之內完納毋庸并攤市丁嗣後此項沙地內再加成熟可以種植棉花桑樹則仍照則加租倘冇坍沒查明豁除以每年餘存之銀抵補在爾沙地租户既受折減之益較之每年完租少出十分之三且得永為己業而仁錢二縣里民止須勻納鄉丁每兩亦得減去數分之惠况爾等有田地者原有本身應納丁糧今攤勻均出除去本等分內之丁所攤亦屬無多而為兩縣數萬赤腳光丁豁除無窮之纍豈非官民兩便之道即本部院自去年至今惓惓為爾等籌盡之苦心亦可以少慰矣除行布政司轉飭遵照外合行出示曉諭為此示仰仁錢二縣各里完糧紳士軍民并沙地租户人等知悉各宜急公輸將毋得自誤特示海寧縣照糧起丁原額户口人丁玖萬叄千伍百二拾叄丁口康熙二十年實在人丁玖萬叄千伍百二拾叄丁口康熙六十年原報原額人丁玖萬捌千捌百叄拾丁口雍正四年實在人丁玖萬玖千一百叄拾玖丁口賦役全書原額田地山蕩等項共徵銀柒萬柒千捌百玖拾捌兩一錢伍釐二毫肆絲捌忽叄微叄塵一渺共徵米陸萬叄千肆百二拾石陸斗二升一合柒勺柒抄柒撮捌圭二粟叄粒每銀一拾伍兩玖錢陸分玖釐二亳柒絲一忽二微捌塵玖渺一漠二埃柒沙派市民一丁口每銀捌錢柒分捌釐柒毫陸絲肆忽柒微玖塵陸渺柒埃柒纎玖沙米柒斗一升伍合肆勺肆抄肆撮玖圭玖粟柒粒二黍一粞一粳陸粃派鄉民一丁口雍正九年編審舊管人丁玖萬玖千一百叄拾玖丁口新收人丁二千叄百一拾二丁口開除人丁二千叄丁口實在人丁玖萬玖千肆百肆拾捌丁口內實在市民伍千一百玖拾玖丁口內除原額完賦市民肆千捌百柒拾捌丁口每丁徵銀捌分一盛世釐共徵銀叄百玖拾伍兩一錢一分捌釐外實浙滋生增益市民內别省寄居市民伍拾捌丁口省土著市民二百陸拾叄丁口共增益市民叄百二拾一丁口永不加賦實在鄉民玖萬肆千二百肆拾玖丁口內除原額完賦鄉民捌萬捌千陸百肆拾伍丁口每丁徵銀玖分共徵銀柒千玖百柒拾捌兩伍分每丁徵米叄升叄合共徵米二千玖百二拾伍石二斗捌升伍合外實盛世滋生增益鄉民內别省寄居鄉民㭍百捌拾陸丁口浙省土著鄉民肆千捌百一拾捌丁口共增益鄉民伍千陸百肆丁口永不加賦以上共徵銀捌千叄百柒拾叄兩一錢陸分捌釐徵米二千玖百二拾伍石二斗捌升伍合富陽縣照糧起丁原額户口人丁捌千玖百二拾一丁口伍分康熙二十年實在人丁玖千玖百陸拾肆丁口康熙六十年原報原額人丁一萬陸百陸丁口雍正四年實在人丁一萬柒百柒丁口賦役全書原額田地山塘等項共徵銀叄萬叄千陸百伍拾二兩叄錢㭍分肆釐肆毫叄絲陸忽肆微二塵二渺玖漠共徵米㭍千捌百柒拾叄石捌斗陸合二勺叄圭二粟捌粒陸黍每銀二拾捌兩一錢肆分玖釐二毫肆忽捌微捌塵一渺玖漠玖埃叄纎一沙派市民人丁一丁每銀肆兩二錢伍分伍釐柒毫伍絲叄忽玖微伍塵玖渺柒漠一埃二纎米玖斗玖升伍合㭍勺叄抄玖撮柒粒叄黍一粞叄糧一粃派鄉民人丁一丁每銀叄拾玖兩捌分伍釐二毫二絲一塵玖渺㭍埃肆纎二沙米玖石一斗肆升肆合玖勺伍抄肆撮玖圭叄粟陸粒伍黍二粳肆粃派食鹽鈔丁一口雍正九年編審舊管人丁一萬柒百柒丁口新收人丁玖百玖拾丁口開除人丁叄百玖拾伍丁口實在人丁一