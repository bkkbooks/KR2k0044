body:
  text: 浙江通志卷七十一户口一版圖之入天府藏之康樂之書小行人獻之皆所以重民數也自漢以後輒以人户之登耗課吏治之殿最法猶近古兩浙東西素稱殷庶而盛世滋生特加丁而不加賦誠曠代未遇之殊恩載稽版籍益徵休養生息之盛云志户口浙江布政司賦役全書原額户口人丁二百玖拾二萬捌千二百二拾肆丁口玖分二釐陸毫內除台州府寧海縣全書額載拆丁柒千二百二拾肆丁口加康熙三年據仁和縣報增人丁叄千㭍百柒拾陸丁據山隂縣報增人丁二拾口康熙六年為清各省等事案內清出人丁一萬玖千玖百叄拾叄丁口玖分柒釐捌毫陸絲共該人丁二百玖拾肆萬肆千陸百柒拾丁口玖分肆毫陸絲內除寧波府定海縣舟山無徵人丁伍千二百二拾丁口叄分順治十八年寧台溫三府屬遷遣人丁二拾萬肆千柒百二丁口一分肆釐二毫伍絲玖忽康熙六年邉海荒棄等事案內續遣人丁二千肆百陸拾二丁口又康熙六年邉海荒棄等事案內逃亡人丁二萬肆百陸拾捌丁口伍分瑞安縣優免人丁捌百玖丁又欽夲敕諭等事案內康熙九年展界招回人丁一萬伍千一百伍拾叄丁口陸分陸釐康熙十年展界招回人丁一萬一千柒拾叄丁口一分陸絲伍忽康熙十一年展界招回人丁一千一百捌拾㭍丁口柒釐伍毫陸絲柒忽康熙十二年展界招回人丁二千柒百肆拾捌丁口捌分陸釐二毫伍絲康熙十三年展界招回人丁伍拾丁口叄分伍釐康熙十六年展界招回人丁玖百二拾一丁口叄分柒釐玖絲伍忽康熙十八年展界招回人丁一百陸拾捌丁口康熙十九年展界招回人丁柒拾伍丁口叄分捌釐康熙二十一年展界招回人丁一拾一丁口康熙二十二年展界招回人丁叄拾肆丁口伍釐玖毫肆絲康熙二十三年展界招回人丁一千一百伍拾玖丁口陸分玖釐伍毫㭍絲康熙二十四年展界招回人丁一百柒拾伍丁口陸分肆釐又定海縣展界招回舟山人丁一百一拾柒丁口陸分伍釐康熙二十五年展界招回人丁叄百叄拾柒丁口叄分捌釐叄毫肆絲伍忽又定海縣展界招回舟山人丁叄千陸百肆拾丁口肆分一釐康熙二十六年展界招回人丁二百二拾伍丁口陸分肆釐叄毫二絲又定海縣展界招回舟山人丁叄百叄拾二丁口伍分伍釐康熙二十七年展界招回人丁捌拾叄丁口捌分肆釐玖毫又定海縣展界招回舟山人丁一百捌拾捌丁口肆分叄釐又金塘等三鄉招徠人丁叄百玖拾一丁口康熙二十八年展界招回人丁玖拾陸丁口叄分叄釐肆毫叄絲又定海縣展界招回舟山人丁捌百陸拾玖丁口叄分柒釐又金塘等三鄉招徠人丁陸拾二丁口康熙二十九年展界招回人丁捌拾丁口伍分柒絲伍忽又定海縣展界招回舟山人丁叄丁口伍分又金塘等三鄉招徠人丁一拾二丁口康熙三十年展界招回人丁肆拾㭍丁口捌分捌釐一毫肆絲又定海縣展界招回舟山人丁伍丁口又金塘等三鄉招徠人丁陸百㭍拾陸丁口二分康熙三十一年展界招回人丁伍拾二丁口一分柒釐㭍毫㭍絲陸忽叄微二塵伍渺又定海縣展界招回舟山人丁捌丁口又金塘等三鄉招徠人丁一百肆拾叄丁口陸分叄釐柒毫柒絲伍忽康熙三十二年展界招回人丁肆拾叄丁口叄分玖釐陸毫肆絲一忽肆微又定海縣展界招回舟山人丁伍拾伍丁口叄分玖釐又金塘等三鄉招徠人丁陸拾柒丁口康熙三十三年展界招回人丁玖拾捌丁口肆分捌釐玖毫陸絲捌忽又定海縣金塘等三鄉招徠人丁二拾㭍丁口伍分康熙三十四年展界招回人丁伍拾二丁口陸分陸釐二毫柒絲又定海縣金塘等三鄉招徠人丁肆丁口康熙三十五年鎮海象山寧海三縣展界招回人丁肆拾一丁口一分肆釐陸毫肆絲伍忽二微柒塵伍渺又定海縣金塘等三鄉招徠人丁一拾捌丁口肆分伍釐康熙三十六年鎮海象山樂清三縣展界招回人丁一百肆拾叄丁口柒分叄釐又定海縣金塘等三鄉招徠人丁一丁口二分伍釐肆毫康熙三十七年奉化鎮海象山三縣展界招回人丁肆拾柒丁口一分叄釐玖毫肆絲叄忽叄微又定海縣金塘等三鄉招徠人丁叄拾伍丁口伍分玖釐陸毫康熙三十八年象山縣展界招回人丁伍丁口捌分又定海縣金塘等三鄉招徠人丁伍拾捌丁口二分肆釐康熙三十九年奉化鎮海象山三縣展界招回人丁叄拾丁口二分一釐玖毫又定海縣金塘等三鄉招徠人丁一百肆拾叄丁口玖分康熙四十年奉化鎮海象山三縣展界招回人丁二拾丁口伍分一釐又定海縣金塘等三鄉招徠人丁一百叄拾二丁口捌分伍釐康熙四十一年奉化鎮海象山三縣展界招回人丁二拾一丁口柒分肆釐叄毫玖絲捌忽又定海縣金塘等三鄉招徠人丁陸拾一丁口二分一釐玖毫康熙四十二年象山永嘉二縣展界招回人丁肆丁口肆分伍釐伍毫伍絲又定海縣金塘等三鄉招徠人丁㭍拾肆丁口伍分一毫康熙四十三年象山縣展界招回人丁一拾二丁口肆釐捌毫又定海縣金塘等三鄉招徠人丁一丁口肆分捌釐叄毫康熙四十四年象山縣展界招回人丁二拾叄丁口陸分叄釐叄毫陸絲一忽柒微陸塵㭍渺又定海縣金塘等三鄉招徠人丁柒分叄毫康熙四十五年象山縣展界招回人丁一拾捌丁口叄釐肆絲陸忽康熙四十六年奉化象山二縣展界招回人丁一拾叄丁口伍分二釐㭍毫㭍絲捌忽康熙四十七年象山縣展界招回人丁二拾捌丁口捌釐一毫叄絲康熙四十八年奉化鎮海象山樂清四縣展界招回人丁一百二拾丁口柒釐肆毫肆絲二忽康熙四十九年象山縣展界招回人丁陸丁口叄分捌釐康熙五十年奉化象山二縣展界招回人丁柒拾肆丁口叄分肆釐玖毫二絲又定海縣金塘等三鄉招徠人丁叄百一拾一丁口肆分柒釐玖絲㭍忽玖微康熙五