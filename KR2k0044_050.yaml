body:
  text: 浙江通志卷五十一古蹟十三處州府古州城方輿勝覽在今州東南七里今呼為舊州城括蒼彚紀唐中和間徙於今地方輿紀要舊城在府東南七里栝蒼山麓亦曰栝州城麗水縣故城方輿紀要在府西三十五里唐初置縣於此今其地有古城岡縣頭山舊城塘之名唐舊州治洞天記小栝蒼山衆山環簇徑路盤紆有九盤嶺唐宋州治在焉即今之西山也方輿紀要唐末盧約竊據是州遷治於小栝山上楊億云郡齋逈在霄漢石磴盤屈是也至元中遷今所名勝志按州治在棗山之麓通志以為元幹勤好古所改輿地志以為唐末郡人盧約竊據遂徙今地二説不同王象之紀勝云舊城在府州東南七里則今治已三徙矣續㕔壁記云州治在小栝山上其路九盤宋崇寧三年楊嘉言為守削直之大觀元年髙士廣復舊審如此説則城東南七里者隋唐治也小栝山者唐末盧約所遷以至宋元治也其在棗山斷自元至元二十七年起然攷東南七里栝蒼山正在其處隋開皇以栝名州乃為栝蒼山耳非城中之小栝山也隋唐史書栝字從手宋熙寜間得古碣字從本云松身柏葉即欏木也以山多此木故名唐郡學括蒼彚紀初在檡山之巔宋康定初孫沔乃徙今址宋麗水縣舊治孟淳重修縣治記縣治舊在茭山之左莫知創始宋紹興四年重建元佛山寨方輿紀要在龍泉南十里佛山上元末邑人胡深築内外二寨於此唐黄龍山寨方輿紀要在縉雲縣西黄龍山唐末盧約據處州有施使君結寨山上以禦之寨門遺址尚存唐松陽縣舊治括蒼彚紀初縣治建於旌義鄉之舊市唐貞元間刺史張增改設今地方輿紀要舊市在松陽縣西二十里路出遂昌縣治故址也唐平昌縣治名勝志在遂昌縣東界西明山之次前後兩山形如昌字因建縣遂名平昌南園名勝志郡城小栝山與萬象山相連勢甚髙敞唐時南園在其間園内有蓮城堂鶯花亭其東有翔峰閣西有少微閣米芾書額又西有回溪閣照水堂亦米書其後有凝霜閣崇禎處州府志蓮城堂郡守范成大建括蒼彚紀翔峯閣郡守孔元忠建少微閣郡守闗景暉建回溪閣舊名松聲閣照水堂郡守李堯俞建凝霜閣楊億建蘇舜欽照水堂記括蒼郡署冠前山之椒林壑蔽翳咸平初楊文公起凝霜閣下覽平曠得遥岑遠林之賞當時固已為佳處矣景祐中孫公元規移守此郡署政之始衆務畢舉乃厯訪雄勝之地以圖燕休又得西北隅絶巚之巔剗去叢穢豁見異境溪山之勢奔放坌來始規地命名詔徙他郡後更三守冺然不尋李君然明之來刷剔隠滯綱條一新吏民曉然踰年甚便然後思有以自適且將留風迹以遺後人景與意并正獲元規之地遂構廣厦因以照水題之庨豁虚明坐視千里雖甚盛暑灑然如秋有長溪者源自閔來趨過檻下前對南明山盖三平之舊隠也蒼峰古刹隂晴隠見又於東南創月軒稍却為燕閣閣之右又為風亭亭前啓軒曰夕霏是皆輔於照水而發於新意也華榱髹楯下上相煥易去蓁莽與政俱新盖基於元規成於然明予慨然東望神爽坐馳恨不能劇飲酣歌俯仰周覽於其上或能圖以為貺尚可更發詠歌以足其未至者陸游南園詩安用移封向酒泉醉鄉只擬乞南園更添小閣臨灘石一洗人間歌吹喧春來歸路閲三州是處跏趺懶出游一到南園便忘返亭邉緑浸琵琶洲陸游鶯花亭詩沙外春風栁十圍緑隂依舊着黄鸝故應留與行人恨不見秦郎半醉詩江濤和放翁題鶯花亭詩春雨溪頭長栁圍游仙枕上賦黄鸝誰知醉卧古藤下却是浮生夢裏詩葉適題處州翔峯閣詩九盤在州中萬山來四遠納於牀第近尋丈未為褊日光既熙麗風氣亦清展悠然不離席所得甚宏閘隠峯招伏岫勝躍俱赴眼下視田中禾藁粒猶可見臨觀要親切亦復貴𦕈緬峽山絲線窄嶽極瀛海胘君看齊雲上往往無際限何當躡蓬萊一汎五湖淺錢竽少微閣詩少微閣應少微星㸃㸃雲間分外明過雨晩來添練水好山晴後見蓮城許尹照水堂詩清溪自古流溪流不見底日照鱗甲生風行縠紋起我雖仙都游不吐仙都地但欲問滄浪中流航一葦趙廱凝霜閣詩修竹蕭蕭三兩竿公餘時得静中看何須更避人間暑滿腹氷霜六月寒秦觀鶯花亭千秋嵗詞栁邉沙外城郭輕寒退花影亂鶯聲碎飄零疎酒盞離别寛衣帶人不見碧雲暮合空相對憶昔西池會鵷鷺同飛盖攜手處今誰在日邉清夢斷鏡裏朱顔改春去也落紅萬㸃愁如海椒園括蒼彚紀麗水縣椒山里人葉烓築書屋於山之深處隨地爲景皇甫汸詩云羡君辭邑賦歸田信有椒園在輞川王氏園括蒼彚紀郡城富山東為囿山有宋少師王信花園東谷園括蒼彚紀青田縣中天巖有東谷園池仙都館縉雲縣志在暘谷洞之西洋畈五雲館聞見録五雲館去縉雲縣五十里本名縉雲館金蓮館縉雲縣志在仙都元虞集書額粲文館松陽縣志在縣西明善書院朱文公嘗於此講道咸淳間葉再遇建長松館括蒼彚紀在松陽縣治東今城隍廟為長松館改建荆室館崇禎處州府志在龍泉縣東觀光門外竹口館括蒼彚紀在慶元縣義莊楊載義莊詩注在龍泉縣溪頭陳南峰創演政堂括蒼彚紀在府治元嘉興張伯淳為記今名經濟堂雲山堂括蒼彚紀在府治後堂劉基過雲山堂有感詩雲山堂畔垂楊栁曾見新堂結構成一吏傳言奔里役㡬家無意輟農耕花明粉黛春開宴月照樓臺夜按筝破瓦斷砧今滿地緑荷春草為誰生燕喜堂志喜堂喻良能舊州治記便㕔太守治事之所也由便㕔而入柱廊謂之凝香至燕喜堂幽邃静深灑灑可愛由燕喜至志喜堂遂至月臺好溪堂喻良能舊州治記由凝霜閣下至好溪堂軒楹開豁棟宇宏麗括蒼彚紀宋徐度建范成大書惠風堂崇禎處州府志在州治後㕔黄葆光建内有烟雲洞博古堂名勝志在舊州治宋别駕石朝散建張擴博古堂詩古人嗜書書不足家貧無錢就市讀今人收書書填屋紅牙垂籖手未觸别駕平生師古人傳癖書滛九經簏盧仝撑膓五千卷鄴侯揷架三萬軸河東安世工補亡伏日郝隆更曬腹近者聞説新臺成芭蕉急雨作秋聲請君掃榻迎燈火莫歌長檠歌短檠風月堂崇禎處州府志在通判㕔宋通判黄㽦建仰天堂括蒼彚紀麗水縣天堂洞上有仰天堂製錦堂青田縣志在縣治宋慶元中令黄由已建謝客堂括蒼彚紀在青田縣石門書院元廉訪副使王俁建崇禎處州府志自謝靈運來游好事者景慕髙致遂作堂繪像祠之縉雲堂晏公𩔖要縉雲山有縉雲堂隠真堂縉雲縣志爲昔賢劉處静作樹萱堂宋濂樹萱堂記樹萱堂者縉雲趙伯和奉其母之堂也仙都草堂鄭汝璧游仙都記仙都草堂即朱文公獨峰書院址也信美堂名勝志在松陽縣舍黄鎮周信美堂詩干名本代耕作邑反惆悵笞箠非蒲鞭徭役急丁帳輸粟無停時官軍待餔餉平生仁愛心漸負罔知向愁來置簿領小圃聊放曠適當初夏時景物和且暢竹色晩更深鶯聲老邇亮新荷㸃方池落日銜青嶂茲堂信云美吾獨増浩唱安仁何當歸風斾正飛颺甘露堂括蒼彚紀在松陽縣東光華門外為迎春之所蓮花漏堂名勝志遂昌縣舊有蓮花漏堂起自宋知縣王琮嘉瑞堂崇禎處州府志在遂昌縣㕔之西宋司馬掀因嘉蓮呈瑞乃建是堂會一堂括蒼彚紀遂昌縣西玉井峰有隠士尹廷髙會一堂籍桂堂崇禎處州府志在龍泉縣治東宋治平中因邑中五人登科建清節堂龍泉縣志在縣西五都木岱元守帥舒穆嚕宜孫建雙蓮堂括蒼彚紀宋紹興丁夘龍泉主簿韓元吉㕔前遍池開雙頭蓮花因建堂名雙蓮三賢堂龍泉縣志在玉峰寺宣和間邑人為邑令沈希稷并攝丞陳沔進士葉植立舫齋名勝志在推官㕔宋王孝嚴建楊億與章廷評書郡齋岑寂宛在深山獄訟甚稀賦輸易辦引領西月羣峰倚天清溪南奔淺深見底人家櫛次多在嵐烟中修竹喬林宛如圖畫苦齋劉基苦齋記龍泉章溢先生所居之室也室十有二楹在匡山之巔建溪之水出焉馬城苦齋詩辛苦年來只自知苦中樂事最相宜青茶入饌甘如薺黄蘖供茶味勝飴誰識長吟梁父日獨憐垂釣渭濵時少陵自是長憂國未必清癯只為詩夕霏軒喻良能舊州治記沿修廊至夕霏軒壁間盡刻名賢法書括蒼彚紀郡守李堯俞建擁青軒青田縣志在縣治宋紹興初縣令楊筠建擷芳軒競秀軒崇禎處州府志並在仙都山對吟軒名勝志在遂昌縣治宋縣丞韓允寅建雲谷軒括蒼彚紀在雲和縣鳳凰山王恕康建西亭崇禎處州府志在舊治西楊億建楊億西亭即事詩郡齋退食復何為縱目西亭景物竒疊翠雨餘泉眼出澄潭風静釣絲垂城臨古戍寒蕪濶路轉荒村野徑危㡬處唱歌聞白苧誰家沽酒見青旗蝶隨游騎穿花徑犬吠行人隔槿籬桃李成蹊春盡後魚鹽為市日中時桑麻萬頃時氛散絲竹千門夕照移吟際嶺雲飛冉冉望中隴麥秀離離烟迷喬木鶯遷蚤水滿芳塘鷺下遲車盖翻然肯相顧主人終宴豈知疲擬滁亭喻良能舊州治記由照水堂而下至擬滁亭前對溪山下臨絶壑南眀諸峰相距無一里横陳洲渚漁舟賈檝出沒烟波中欵乃之聲不絶於耳括蒼彚紀郡守蘇簡建夕霏亭明一統志在府治宋建吳説書扁拂雲亭崇禎處州府志在舊治少微閣下郡守錢竽建㸃易亭方輿勝覽在舊治南園括蒼彚紀通判司馬伋建栁邉亭名勝志在麗水縣税務後秦少游建蓮城一覽亭括蒼彚紀在城中萬象山崇福寺東披雲亭崇禎處州府志在麗水縣望京門内知津亭括蒼彚紀在麗水縣濟川橋南宋郡守范成大建緑波亭明一統志在府城濟川門外下臨南溪一名如錦亭栝蒼彚紀後為清波亭放生亭括蒼彚紀郡城清香橋爲淨池即古放生池宋紹興十五年郡守徐度建亭其上思賢亭崇禎處州府志在好溪唐郡守李敬仲築室於此後人因建亭王十朋思賢亭詩段公不到溪豈好李守已亡詩更竒我向思賢亭上坐愛溪兼愛昔人詩得月亭括蒼彚紀在郡城通惠門淨池北岸皇甫汸得月亭詩清溪一何湛源深白雲曲望舒忽東升浮光浙西陸蕪址匪舊存芳亭煥新築碎璧時復沈散金如可掬雖乏謝監悰聊寄庾公矚誰謂曠音塵古來共幽獨溪雨亭名勝志在麗水縣靈山宋紹興中郡守劉涇創千里亭方輿紀要府南七里有南明山舊有千里亭以髙曠得名獻花巖亭見王順游麗水縣南明山記冷泉亭白雲亭明一統志麗水縣西白雲山山半有冷泉亭山麓有白雲亭來鶴亭留舄亭括蒼彚紀在麗水縣紫虛觀東山巔招鶴亭青田縣志在縣治後堂之右八角亭名勝志在青田縣南宋陳汝錫建蔣存仁八角亭詩由來只説四簷亭今日先生八角成最喜瀟瀟春夜雨一簷分作兩簷聲見一亭名勝志在青田縣東百步宋鄭汝諧建亭後石壁其平如削髙二丈許水從石裂中出清泠不竭後山有石榻可坐上篆刻宓羲臺三字石門亭明一統志在青田縣西宋建王安石記銀河萬古亭括蒼彚紀青田縣石門山臨溪兩峯壁立髙數百丈飛瀑千仞中斷濛濛作雨狀瀑次有亭曰銀河萬古又有飛泉亭噴雪亭方輿勝覽青田縣石門洞有亭曰噴雪憇霧亭石門洞記洞前有憇霧亭㸃易亭青田縣志縣西三架䃪下有丹井因葉法善明易象乃建㸃易亭駐碧亭括蒼彚紀在青田縣登雲山下絶澗為橋亭曰駐碧問丹亭青田縣志在縣三坊游丹山者皆憇於此又名謝橋亭吏隠亭縉雲縣志在吏隠山上醉月亭縉雲縣志在赤巖前李陽氷建松壑亭縉雲縣志在縣西松臯之陽山水清勝元黄溍吕伯良時游咏於此共亭崇禎處州府志在縉雲縣東五里永泰院宋慶厯四年尉毛維詹建取松竹風月巖沼徑花之屬為十題雨松亭縉雲縣志步虛山斗巖有二松大數十圍每日晴則雨㸃滴􅅹隂晦則無舊有雨松亭巽亭名勝志縉雲縣毛翁巖