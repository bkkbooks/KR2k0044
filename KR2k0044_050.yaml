蕩乾坤供醉眼淒涼風雨送行舟慿誰為問槎邉客未必無人犯斗牛拜香臺喻良能舊州治記月臺舊名拜香臺天王峰居其前石僧峰出其側山之翠微近在杖履下圭山臺括蒼彚紀在郡城囿山上張敦仁登囿山圭山臺詩序予舊居北郭白雲里嘉靖嵗庚申以倭警徙入城居是山之麓按郡志稱栝蒼十景其一所謂囿山清氣是也宋時為王氏圃不知何時入官為觀風臺基邇年髙郡守築臺其上予以草堂宻邇闢小徑通之或厭塵喧則登此臺以舒眺望南則南明大梁巾山天馬隠約作列障狀北則夀元白雲麗陽似錦屏然其西則小栝山檡山如伏虎而踞東則好溪夾水諸山皆峯巒秀拔逈出天表自數百里西奔作龍蟠勢栝蒼舊名蓮城謂諸山盤矗如蓮花城居其中而臺又居城之中故一登此臺諸山水皆出几席下所謂城市山林者非耶縉雲臺劉澄山水記黄帝煉丹之所其址尚存忘歸臺名勝志在縉雲縣吏隠山唐李陽氷為縉雲令任滿挈家隠於此築忘歸臺鑿巖篆吏隠山三字霏翠臺縉雲縣志在吏隠山南麓羣玉臺縉雲縣志在仙都練溪將臺縉雲縣志在南田嶺都御史阮鶚建明月臺凌風臺西望臺松陽縣志並在縣西上方山凌霄臺方輿紀要在松陽縣西西屏山上名勝志米元章書三字於石壁上鸚鵡臺括蒼彚紀在龍泉縣古來山名巖寺雲臺名勝志龍泉縣西山有石方丈古刻雲臺二字釣臺崇禎處州府志在景寧縣豸山之麓相傳浮丘伯隠釣於此神仙宅括蒼彚紀在麗水縣東少微山舊祀少微星君於此名神仙宅李敬仲宅名勝志麗水縣好溪唐貞元中郡守李敬仲愛其林壑之勝築室為棲隠之地而居之官滿舍為寺李敬仲洞溪十詠潭翠標名直至今洞門寒浸碧沈沈一天星斗難藏揜萬古魚龍識淺深波起勁風疎噴雪岸隈髙樹宻垂隂凝虚澄象無盈溢合是淡交君子心右翠潭昔人卜築向深蘿幽徑閒門客少過寒覺片雲生棟宇静聞孤鶴下庭莎竹忩曉放茶烟膩火焙春收藥氣多一榻無塵夜生白不妨欹枕擬髙歌右青室壺中何必訪髙竒遶澗穿雲入翠微曉艷深藏樵客徑露香濃滴釣人衣風回片片隨流水雨霽枝枝帶落暉更有閒游難到處花問誰見隠仙歸右桃源碧嶼琅玕盡占幽孤烟輕翠瞰中流風敲清籟向深夕雨洗疎隂出素秋新籜委苔霞片墮淡筠經雨粉痕收當初好翫人何在萬古蕭騷送客愁右竹嶼慿林磷鏗逸響清寒樓長見有雲生天回霜月淒涼處誰愛絲桐向此横魚近翠根猶歛魄鶴翹孤影尚凝情不知亞尹千年後更有何人續正聲右琴石疊甃荒涼古釣磯長潭映帶占清虛只因倣世能輕禄未必投竿酷愛魚雨笠曉偎苔蘚合烟簑秋倚薜蘿疎若教吕望於今在不獨磻溪是勝居右釣磯陳忩虛棟駕峥嶸天氣銷回萬象清深蘚静攤隨步武淺峰相亞入簷楹寥寥鐘鼓殘秋逈黯黯燈光永夕明此處誰知閒意度白頭禪客自經行右虛廊潄淺浮深過㡬年古今長見去潺湲秋隂瀉破天雲碎清響琢成溪石圓孤客維舟嫌聒夢髙僧倚石任喧禪蘭亭逸少來茲地堪與流觴會列仙右響瀨壁立凌空目𣺌茫蛾眉曽見匪尋常洞門髙出寒稜正水面横鋪片影方野客手題文字澁嶽僧身靠衲衣涼雲磨雪洗花顏色不羨梁元古畫張右峭壁卓異曾分造化勞神仙占得稱游遨濃嵐畫鎖巉巖黒碧落秋晴突兀髙雲母徑深穿頂滑翠岷稜健把根牢白雲南面長流水閒見樛藤下渴猱石崎石巖湯思退宅幹勤好古遷州治記今州治乃宋丞相湯思退故第也鄭汝諧宅青田縣志宋鄭待制汝諧宅在縣東門外百步陳葵宅青田縣志宋陳葵宅在十三都石盖劉基宅洞天記青田縣南田山古稱七十二福地南田居其一誠意伯劉基世居此山沈晦宅名勝志松陽縣上方山宋狀元沈晦建炎間守處遂家於此有見山亭泠風臺梅花堆垂雲巖諸勝沈晦上方居詩天畔羣山一草亭半溪烟雨花㝠㝠老翁投老得此景日與溪山同醉醒此生真與世相忘投老生涯寄上方洗足闗門枕書睡連山松檜雨琅琅劉仲昇宅練魯隠居記仲昇劉君有故園池隠於北山之下松陽人周綰宅名勝志遂昌縣君子山有蓮花峰宋待制周綰居之號蓮花居士葉可權宅括蒼彚紀在遂昌縣桃源周與昂宅括蒼彚紀隠居桃源五峰之下鄭元祐宅括蒼彚紀在遂昌縣航頭元祐著遂昌雜禄管師復宅龍泉縣志縣東甸川其地襟山帶水宋時先賢管師復師仁家世族處於此何執中宅龍泉縣志縣南天馬山宋清源郡王何執中舊宅在焉季鏞宅龍泉縣志縣西蔣溪宋侍郎季鏞居此真徳秀宅括蒼彚紀龍泉縣西山宋真徳秀生於斯因號西山示不忘本章溢宅龍泉縣志在縣七都劉知新宅慶元縣志宋大觀狀元劉知新宅在五都番墺門前衢址猶存胡紘宅慶元縣志宋胡侍郎紘宅在雙股嶺下陳嘉猷宅慶元縣志宋禮部尚書陳嘉猷宅在九都舊有神童坊在竹口盧敖宅景寧縣志縣北盧棲溪相傳唐盧敖居其中浙東道院喻良能舊州治記由好溪至浙東道院簾影無塵草色映階閴然蕭然不知其為公宇也抱節菴括蒼彚紀在舊治惠風堂環植巨竹故名轉物菴括蒼彚紀在舊治拂雲軒後軒轅丘明一統志在青田之石門洞仙壇明一統志在青田縣西北七十里峰若蓮花相傳有仙人煉丹於此遺址尚存芳墅名勝志青田縣黄巖山下有芳墅宋髙宗選妃洪氏賜第有磚街十里開池皆種荷花黄帝宫晏公𩔖要在縉雲縣東二十三里縉雲宫晏公𩔖要在縉雲縣東九十里小桃源李棠小桃源記縉雲縣北二里一小澗出兩山間潺潺不絶澗之濵夾岸植桃春月花開彷彿桃源因名土鼓壇明一統志在遂昌縣大溪中上有雙峰塔龍泉精舎舊浙江通志在龍泉縣孟浩然有詩古龍壇龍泉縣志在縣治南三思橋東荷池中嘉定戊辰龍見於此馬跡壇崇禎處州府志在宣平縣山阬五里唐天師葉法善騎馬過此因名雙桂門崇禎處州府志在宣平縣北宋時鄭睿鄭通叔姪同登淳熙丙午第故名千載木太平寰宇記麗水縣石羊山蘭巖溪有大樹仰覩杳然博物志云千載木也天王像方輿勝覽天王山在州西北城壁繞其上有唐時天王像松陽樹名勝志松陽縣東南臨大溪有松陽樹大八十一圍腹中空可坐二十人秦時物也古樟龍泉縣志邑西飛鳳山有大樟樹百圍傳自石晉天福二年隘將季公魯所樹古松龍東縣志在萬夀宫相傳槲衣真人上昇處石耒軸龍泉縣志在一都萬松林五代時有神人吳三以山多石嘗劈巨石作耒軸欲磕而平之耒成夜驅神物駕耒直前隔山居民聞呵叱聲秉燭視之遂散今石耒横於山原浙江通志卷五十一
