body:
  text: 浙江通志卷四十六古蹟八台州府古州城赤城志按舊經云周囘十八里始築時不可攷其舊基東自小鑑湖循清心嶺而南縈抱舊放生池直接城山嶺古通越門土地廟處蓋今湖昔地皆闉闍中物也後乃徙而縮之州舊子城臨海縣志在大固山始建時不可攷相傳隋開皇時州治在山上城有三門南曰譙門東曰順政門西曰延慶門故址尚存王象祖修子城記子城東自鼔樓踰州學過東山閣包職官㕔厯玉霄亭入於州之後山西自鼓樓介於内外班之間而長於内外班曲而為洞門又曲而依於大城内外班者錢氏有國時子弟為守親兵所居也章安古城名勝志在臨海縣東一百十五里即章安鎮也台州府志相傳即後漢章安縣治前冇水即囘浦載赤城舊志新志則以為濵海薄山魚龍所腥豺虎所穴非可奠城市者未知孰是石鼓山柵城臨海記臨海縣石鼔山舊有柵城唐刺史李元奏置漢城方輿紀要在黄巖縣北十里建置未詳台州府志按舊志漢城去黄巖縣北十里有莆林郡城相傳昔置莆林郡於此然未詳何時亦無經可攷徐偃王古城輿地紀勝在黄巖縣南三十五里大唐嶺東外城周十里髙僅存二尺厚四尺内城周五里有洗馬池九曲池故宫基崇十四級城上有喬木可數十圍城東偏有偃王廟台州府志偃王古城在今太平縣西北三十五里又縣南五里有葉鮑二将軍廟或謂即偃王将也按韓文衢州徐偃王廟碑偃王走死彭城山下又曰偃王之走不之彭城之越城之隅衢故越地也赤城新志謂周穆王時越猶未通中國台去衢猶逺唐嶺又在台極南山谷中於此築城以居何哉又今所謂古城者兩山相距不一二里而謂城周十里其不足信尤昭昭矣但相傳已久姑仍之樂安縣舊城萬厯仙居縣志唐上元二年始築樂安縣城惟東西南三門東則文明樓西則義井頭南則過街樓即舊址也寧海縣舊城赤城志舊城在海游或云唐大厯間徙松門城嘉靖太平縣志宋熙寧間置土兵設廵司於此明洪武二十年置松門衛其故址尚存玉環古城嘉靖太平縣志在玉環海島上與楚門港隔洪武中徙縁海居民於内遂墟樂清縣志近縣有玉環城玉環鄉南社洪武中徙其民於内地古州治赤城志州治舊在大固山上今永慶院是其處有子城故址焉後隨州徙台州府志按舊州㕔置於大固山屈光公居宅以其地勝立屈氏次子恵坦為太守改家為州按恵坦呉人而臨海郡置於太元二年此建立之始也後以峻不可躋遂徙焉光公即晃宋諸㕔赤城志通判㕔在州西五十歩淳熙五年通判管鋭重建添差通判㕔在州東四十歩舊為判官㕔紹興十六年通判洪适改建判官㕔在州東七十歩淳熙三年以舊比較務改建推官㕔在州東五十歩嘉定三年推官趙師回重建録事㕔在州南六十歩州院在焉宣和三年工曹陳槖建司理㕔在州南九十歩嘉定七年司理呉焯重建司户㕔在州南五十歩宣和元年戸曹滕膺建司法㕔在州南十歩淳熙九年司法朱孝倫重建支鹽㕔在州東南報恩寺後開禧元年監官王栻以都監倉改建廵轄遞舖㕔在崇和門外淳熙十年廵轄趙舜舉建謝雩台州司戸㕔壁記台州司戸參軍唐至徳間著作郎鄭䖍嘗以謫官居之今州城東偏猶以戸曹名巷國朝宣和初滕君膺來創廨舍為屋三十楹榜曰戸曹㕔宋推勘院赤城志在州東南嘉定六年守俞建建宋軍營赤城志雄節第六指揮營在州東北天慶觀前威果第六十指揮營在州東米倉前崇節第三十一指揮營在州東南靖越門内牢城第十三指揮營在州東都米倉前壯城指揮營在州東崇和門内宋水軍營台州府志在崇和門外東湖宋端拱二年郡守張蔚建嘉祐中守徐億徙營入城宋貢院赤城志舊貢院在州東先以韓運判宅址為之後徙兠率院殿柱間刻云終場三千人院據山腹陟降不勝遂徙今地今院内有搴秀亭漢南部都尉治元和郡縣志南部都尉本漢之回浦鄉分立為縣後漢改回浦為章安輿地紀勝回浦縣即南部都尉治所呉臨海郡治嘉靖臨海縣志呉太平二年析章安置臨海縣復分㑹稽東部六縣置臨海郡徙治章安即今章安鎮漢回浦縣治方輿紀要臨海縣東一百十五里本漢之回浦縣治後漢建武中改為章安縣赤城志即章安城唐大郭營明一統志臨海縣東有寨溪舊傳唐末寇作遣方将軍駐兵於此側有大郭營宋新亭監赤城志新亭鹽監在臨海縣東南六十里按武烈帝廟記乾符二年新亭監給官莫從易重建堂宇又九國志載元徳昭知台州新亭監漢東甌國晏公𩔖要東甌居海中今臨海永寧縣也黄巖縣志黄巖本東甌地萬厯寧海縣志漢立閩君搖為王置東甌國後國徙乃以其地為回浦是為東部都尉漢東部都尉治方輿勝覽台州郡漢屬東甌國後立為冶縣東漢末分冶縣為東南二部都尉東部臨海即郡國志東部侯國唐永寧縣治後漢書郡國志永寧永和三年以章安縣東甌鄉為縣名勝志唐上元二年復置永寧縣則今之黄巖而改名則天授之元年也宋兵屯台州府志黄巖縣西将旗嶺宋牟大昌屯兵處又有軍營溪宣和中官軍禦寇結營於此唐洗馬潭寨赤城志在天台縣西北下馬橋唐裘甫之亂以天台國清寺建寨與馬敞墠三墩堂皆諸将議事之所又有王軍塘為犒軍之所台州府志舊志未有寨之名而今稱洗馬潭寨未知何時也唐石壘寨赤城志在天台縣北五十里闗嶺上壘石為之唐廣徳元年王師討袁晁處今遺跡尚存宋始豐寨天台縣志在赤城山西宋咸平元年建天台縣志有人於鎮國将軍廟基掘得古鏡文曰始豐寨主鎮國大将雷曄造疑此廟即始豐寨基晉樂安縣治元和郡縣志晉分始平南鄉置樂安縣唐上元元年復置於盂溪側萬厯仙居縣志晉永和三年析始豐置樂安舊治在西郭演武場北仙居縣志縣址凡三遷今址起於宋建炎二年令張亨所定舊志稱晉永和四年羊欣所遷誤也相傳羊公時治在金家店宋令陳公襄時治在西郭垟其巖老堂釣魚臺遺跡俱在舊治尚有存者方行可仙居縣㕔壁記仙居晉名始豐後析其南鄉别為縣曰樂安仙居即樂安舊壤至上元間再廢再置易曰永安而遷治盂溪即今縣舍也逮景徳中改曰仙居以其洞天名山屏蔽周衛而多神仙之宅因以名焉宋白塔寨方輿紀要在仙居縣西三十五里宋宣和中因寇亂置寨今為聚落晉寧海縣舊治台州府志縣東五里白嶠山晉武帝初置縣治於此萬厯寧海縣志晉初設於白嶠唐徙海游永昌元年徙今里錢惟演寧海縣新建衙樓記眷惟靈壤實曰奥區地接天台路連石姥時生英秀代出神仙一派桃源阮肇曾游之地千尋瀑布興公作賦之邦軒檐半空烟霄咫尺欒栱交結丹漆相鮮晴曦下照於觚稜翠巘四圍於爽塏雙扉洞啟宜駟馬之並驅層構鼎新若蜃雲之擎出宋松門寨台州府志太平縣松門山上宋時有松門寨潘伯修松門寨詩沙巷蛟涎白沙門蜃氣平强弩支江斷長槍落日明梅園赤城志在臨海縣仙宫後茶園雲笈七籖臨海蓋竹山舊傳葛元植茗於此結廬而居焉小鑑湖園台州府志在臨海縣東湖北宋參政賀允中先居天台萬年寺後寓此以唐賀知章自請鑑湖一曲故名有占春堂枕流漱石二亭琪山園臨海縣志舊名小寒山即南岡書院松隱園萬厯天台縣志宋開府曹勛宅在北城外嘉靖臨海縣志在縣之清潭山有明秀堂荘畔有陂廣十餘里陳氏園曾丰東巖堂記天台為二浙第一勝處今臨川陳公劃所辟城東數十畮而東西之東所掲曰小瑶曰生秋曰𤓰風曰蜜露曰齊芳凡五西所掲曰閙春曰見笑曰問開曰花嶼曰飲巢曰數紅曰記好曰渉趣曰四友凡九其外則二堂突兀東曰東巖五之㑹也西曰勝賞九之㑹也東巖則又西勝之㑹歟自慶元丁已經始自為韻語樂章發揮之園無遺景景無遺勝公名廣夀字成卿南園萬厯天台縣志縣東門外有宋待制黄宜南園今廢為農田俗稱黄府園其宅在縣東一里小西湖園赤城志仙居縣西有小西湖給事呉芾所創延袤數里内有亭館凡十數仙居縣志即今石井之畫眉潭呉芾蓄水為湖岸植桃柳朱闌環繞誠勝地也淡園萬厯仙居縣志在縣北光明山之陽内有倚嘯閣漣漪亭通幽處拜石軒諸勝宋張文肅公次賢投閒處也東澗園萬厯仙居縣志在城南東河宋提舉陳章引河水貫其中跨以虹橋叢以竹林有浮香羽波諸亭及五松臺為邑名園之冠閬風園崇禎寧海縣志在主簿署内劉次臯建雲海觀園崇禎寧海縣志丹丘見於孫綽賦其地有丁氏園名雲海觀王綽雲海觀記丹丘列仙之所萃松山丁君少雲即其所居依山闢園回環曲折曰堂曰亭曰臺曰榭曰林曰坡曰窩曰谷無慮二十餘具載於雪巢林景思之賦咏至於竒詭特異之觀則自小垂虹而入跨蓮蕩不知幾何畝有堂巋乎其上曰芙蓉此尤雪巢之所長吟而永歌者龍川陳同甫一見輒心可之距今五十有二年子植追想舊事因芙蓉故址敞為傑閣以雲海觀目之葢取坡公玉霄雲海之詞以補先世之未為者子植名木藥園謝伋藥園小畫記余家舍之旁葺茅竹為園總名之曰藥園下瞰黄甘塢後浸白蓮池有水芝軒靈泉館挽衣寮潤畦亭劚青堂薜荔堦明珠菴僧宗了畫為圖筆跡甚可喜丁園嘉靖太平縣志在温嶺宋嘉祐間丁仲鎰創熙春館赤城志在府治淳熙十六年守史彌正建天台館赤城新志在府治南一百三十歩宋紹定中倉使葉棠建赤城志俗名行衙嘉祥館赤城志在州東五十歩舊號小行衙泰安館石公孺臨海泰安館記紹興六年徽猷孫逸建望海館臨海記臨海宴室山上有越王望海館亭山館赤城志在黄巖縣南瀕河慶元五年令常濬孫建澄江館黄巖縣志在黄山樓側宋紹定二年令趙汝駉建并記靈溪館正徳天台縣志唐靈溪館在縣東許渾發靈溪館詩山多水石窮一葉似漁翁鳥浴寒潭而猿吟暮嶺風雜英垂錦繡衆籟合絲桐應有曹溪路千巖萬壑中鄭巢靈溪館詩孤吟疎雨絶荒館亂峯前曉露棲危石秋萍滿敗船溜從華頂落樹與赤城連已有求閒意來期在暮年金庭館名勝志在桐栢山北許邁與王逸少書云自山隂至臨海多金庭玉堂仙人芝草是也白鷗荘王士性白鷗荘自記余郭東溪頭小隱處也得二洲三島有白石山房空濤閣緑雲亭蓮社竹籬茆舍夕陽塢先月墩嘉樹臺白龍溪芙蓉城三星石曲水瀨竹林精舍小祗林雲碓卧雲坪忘歸石是地為宋秘閣陳良翰之故居靜鎮堂方輿勝覽在州治唐李嘉祐為守竇常贊之有雅登郎位靜鎮方州之句故名君子堂赤城志在靜鎮堂之前太平興國三年畢文簡士安來守真宗有君子之稱故名尤袤題府署君子堂詩堂堂文簡公一世䕫與臯君子哉若人此言聖所褒遺愛在斯民誰能薦牲牢獨有坐嘯地清風仰彌髙節愛堂輿地紀勝在州治君子堂右赤城志舊名燕豫淳熙四年守尤袤重建改今名尤袤節愛堂記過靜鎮堂之左少南為方池並池而南牆壁障礙敗屋傾欹問諸故老曰此昔之燕豫堂也池舊有橋横縱齊度其東為草堂今皆毁撤後人因基築臺以望月其下枕池為小閣名曰清平臺亦漸頽圯余既徙臺於參雲亭之後榜曰匿峰以望北山更作堂曰樂山以望西山之秀而池光山色且蔽於閣而不得見也乃徙閣於池之南因燕豫堂之基别為堂曰節愛取節用愛人之義旁為扶廊而上與樂山堂通池之北石崖盤踞土壤所壅疏剔理脈發露呈顯如枕股膊如覆囷廩如黿鼉之背負土而出西望連岡叠嶂如擁鬟髻如展旌斾如風檣陣馬排闥而入其南則帢幘二峯角立明秀若偉丈夫冠劍而坐雙塔亭亭影插半天於是仰山俯池逺樹近石環列先後若相拱揖烟消日出層樓飛閣浮虚跨空如展圖畫如望蓬萊之雲氣也夫昔人經始莫不相山川之宜一定而不可易後人見其蔽而不能復也始出已意變易之遂使昔之勝槩日就湮沒今余非獨能有所璔創也大抵無改前規無廢後觀覺天宇開明巖壑爭秀林木水鳥皆有喜色而後知昔人之規模可因而不可變也尚告來者嗣有葺焉始欲跨池為橋池上有老梅惜不忍伐遂不復作霞起堂赤城志在靜鎮堂後淳熙三年守尤袤建取孫綽賦赤城霞起之句台州府志明天啟中改為霞起樓凝思堂輿地紀勝在霞起堂後淳熙中守尤袤建雙巖堂赤城志在凝思堂後慶厯八年守元絳建謝伋雙巖堂詩霾没雙巖已百年班班勝事漫流傳幸陪佳客揮犀塵還欠傾城舞繡筵故老風流寒似鐵月卿英妙筆如椽拂衣便欲故山去復恐眼中無此賢樂山堂輿地紀勝在清平閣下淳熙中守尤袤建和青堂輿地紀勝在州治與清堂陳塤與清堂記台州録事㕔舊有挹翠堂趙君汝回作郡葺而新之更曰與清青青堂石公孺青青堂記㑹稽陳槖徳應司台之工曹事㕔之西為小堂植竹數百竿命之曰青青即録事㕔是也登瀛堂輿地紀勝在倅㕔慶元三年通判趙彦衛以欽廟所賜唐十八學士像刓於壁故名景沂堂歳寒堂赤城志並在通判㕔李宗勉重修台州通判㕔記㕔事穹隆堂宇顯敞廊廡纚麗戸牖爣閬總為楹三十有四舊有芝秀承其左登瀛景沂歳寒處其右堂後山巒鬱律林木青葱自蓮風閣登萬壑風烟最為竒勝旁列雲水梅榭雲海嵐闗無非嘯咏游息之所迎風納月恍若蓬壺觀者愕眙屹為千里壯觀清閟堂赤城志在添差通判㕔通判洪适建於分繡閣之下洪邁寄題清閟堂詩昔聞王子猷借宅亦種竹此君固可喜人亦清不俗伯氏貧而癯一飯不飽肉堂前自經始護此無盡緑一官嵗强半餘日如轉燭待其長稚子而已牽歸轂何由享嘉䕃償我志願足應煩彼邦人日報平安福遺直堂赤城志在推官㕔後熙寧中孔文仲為從事手植檜於堂後越八十年其甥曾幾來為守因掲今名曾幾題遺直堂詩三孔吾渭陽猶及見仲叔堂堂舍人公再拜但喬木長身一庭中勁氣九霄上思公立朝時凜凜不可尚虚照堂平心堂琴堂嘉靖臨海縣志並在縣治内宋淳熙中令彭仲剛新之並有詩孔先堂赤城志在臨海縣簿㕔嘉定七年主簿趙汝駉建葉適孔先堂銘非籍不有惟籍乃守先聖所止後學敢繆臨海之邑龠米寸帛必信必實以作民極景樞堂赤城志在臨海尉㕔内淳熙六年尉葉卨建以王淮先為尉後位丞相故名赤城志論尉㕔在州東四里地據形勝其前秀巒環峙曠野平鋪後有峯屹然龍囦水瀉出其右是以為吏者多通顯云瞻節堂赤城新志在郡城朝天門外元泰定間郡守趙鳳儀建共樂堂輿地紀勝在郡城外東湖台州府志宋慶元三年郡守劉坦之改名知樂緑猗堂赤城新志在臨海城門張哲齋建文天祥緑猗堂詩并引予自海舟登台岸至城門張氏葢國初時名将永徳之後主人號哲齋闢堂教子扁曰緑猗為賦八句義方堂上看窓戸翠玲瓏研裏雲壇月席間淇水風清聲隨地到直節與天通庭玊森如筍干霄雨露功清心堂民和堂赤城志在黄巖縣治紹興中令楊煒建堂名曰清畏後令胡璉去畏字改名清軒後令劉鼎孫又改曰清心并建民和堂於縣圃鄭伯熊清軒詩樹蕙餘百畝蓻蘭當路岐清風一披拂香氣無不知紉為楚纍佩辱我幽靚姿小草生澗底雨露無恩私不入兒女玩嵗晚得自持所以古君子清徳畏人知歡顔堂黄巖縣志在縣㕔後宋嘉定元年建香逺堂赤城志在黄巖縣丞㕔舊名紫翠軒嘉定十五年丞趙彦珽更今名左緯香逺堂詩試捲朱簾看青山冇幾重崢嶸秋色老蒼莽暮烟濃未辨清猿處遥知白鳥蹤藍田無此景留盼只雙松王公客堂太平寰宇記臨海仙石山有館土人謂之王公客堂兩邊有石歩廊王方平所游之地李商隱著書堂輿地紀勝黄巖縣西崇報寺靈石傍有唐李義山著書堂金山堂輿地紀勝黄巖縣金山上鋭下闊宛若金字王侍郎居安築堂面之號金山堂秀野堂王曕叔有題台人秀野堂詩見王梅溪集靜治堂樓鑰靜治堂記丁君大榮宰天台闢縣治之左為堂請書扁且求記焉平心堂赤城志在天台縣治淳熙三年令薛洪建瑞萱堂赤城志在天台縣治乾道二年令李異建嘉泰二年令丁大榮得粟一莖六穂更名瑞粟堂髙察書堂萬厯天台縣志縣北察嶺與金地嶺接漢髙察所隱之處舊有讀書堂故址顧歡書堂天台勝蹟録天台顧儒嶺舊名東岇有齊顧歡讀書堂天台縣志今普慶寺即其故址太白堂王士性遊天台山記度華頂有王右軍墨池上為太白堂其堂前有三娑羅樹四月花開如芍藥賈詩太白書堂詩太白千載豪神遊渺湖海漠漠此山中而有書堂在崖斷緑蘿深澗寂寒泉灑撫景一懐思彷彿瞻雲采雙清堂天台縣志在大隱峰宋錢厚之建王銍記玊輝堂王士性遊天台山記巾子山半為玊輝堂登堂見靈江來自西北環抱於前雷峯堂天台勝紀在興國寺上傍有智顗繙經臺巖老堂名勝志在仙居縣治宋皇祐元年令陳襄建輿地紀勝按陳襄仙居詩自注云嘗鑿池引水經竹林間以環流釣翁名臺習坎嘉魚名亭未知在縣治何處今不可攷矣陳襄巖老堂詩手持養性書此地學樵漁身𩔖龍蛇蟄情深木石居先迷成逺復正靜得中虛何必求深隱幽䝉是所廬安樂堂赤城志在仙居縣治紹興中令杜師旦建秀岐堂仙居縣志在縣治宋慶元中令尤棐建愛山堂仙居縣志在縣治宋嘉定中令董履道建衆樂堂仙居縣志在縣圃宋淳熙中令唐仲温建鼎山堂赤城新志仙居縣西有桐江書院宋方斵本唐方干之裔因朱熹因行部過此為書鼎山堂扁王十朋為書東南道學世家鑑玊堂台州府志在仙居南峯宋蔣應雷構理宗賜榜仙居縣志應雷祖覺軒與朱晦菴游鑿山南桃花洞築書院於上王魯齋詩云藥鼎香浮栖鶴寺書堂影壓釣魚船郭磊