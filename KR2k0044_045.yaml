徙伭廟食其地項斯宅萬厯仙居縣志相傳在介山下三學寺張阜宅赤城志仙居縣張阜山逸民張阜居此林達本宅台州府志仙居縣東山宋林達本隱此吕逢時宅台州府志仙居縣白巖宋吕逢時隱此蒋晉宅仙居縣志柘溪有宋蒋晉宅梅盛宅台州府志晉梅盛令章安遂徙寧海縣之寧和居焉有鳳集其庭今其宅為丹丘寺葛元宅赤城志寧海桐柏山有桐柏里葛元居此友鹿翁宅台州府志不傳姓名宋末隱居寧海縣耆山下方遜志為傳舒岳祥宅台州府志寧海雁蒼山宋舒岳祥隱此葉夢鼎宅台州府志寧海縣状元峯宋葉夢鼎讀書於此方孝孺宅台州府志寧海縣躍龍山方正學先生世居山下後因建祠其家徙城内其故居義井尚存名勝志國初刑部尚書魏澤謫臨海典史時捕正學家不許容留一人公為出其孤謝文肅詩所謂孫枝一葉存澤有過孝孺故居詩筍輿衝雨過侯城撫景令人感慨生之句王喬宅台州府志太平縣晉源山相傳晉王喬居此下有晉湖嘉靖太平縣志縣東屏山南有晉源明覺寺有小碑其文曰晉王游適處蔡鎬宅林昉先賢祠堂記鎬世居太平方巖鄉之白山因建閘功後與朱子並祀蔡鎬山居詩水從白塔流玉環門對葛洪丹井山老去腰鎌更垂釣時與漁樵相往還戴良齊宅嘉靖太平縣志縣治南宅前街宋戴少監良齊宅於此于恕宅台州府志太平縣桃溪宋于恕遺址在焉虞似良宅台州府志太平縣横溪宋虞司馬似良寓居其上號横溪真逸戴復古宅石屏詩集小傳復古字式之黄巖人所居在南塘石屏山其父敏字敏才號東臯有東臯集石屏之從孫昺號東埜有東埜農歌戴氏之名於詩者葢三世矣太平縣志戴敏世居石屏山俗名塘下子式之因以為號戴敏小園詩小園無事日徘徊頻報家人送酒來惜樹不磨修月斧愛花須築避風臺引些渠水添池滿移箇柴門傍竹開多謝有情雙白鷺暫時飛去又飛來謹按戴敏有後浦園廬詩復古有姪孫子固東池隱居詩昺有次韻屏翁會芳小集詩此皆戴氏宅中之名也盛象翁宅嘉靖太平縣志元判官盛象翁宅在三阬溪象翁生宋季從車玉峰游所居與聖水山近遂尊之曰聖泉赤城竒觀方輿勝覽在郡圃後山上赤城志舊名覽輝宋慶元三年守劉坦之建開禧元年守葉箋更今名桃源名勝志在郡圃守黄㽦建循雙巖而上植桃百餘倣劉阮故事也黄㽦郡圃種桃詩本自深村老圃來偶分符竹到天台漫山幸可容桃李莫待劉郎去後栽嵐闗赤城志在通判㕔雲海亭之右梅榭赤城志在通判㕔之右其側有梅峽銀谷石於菟峩眉嶺彝洲臨海記秦始皇遣徐福将童男女入海止於彝洲初學記臨海有彛洲山頂有越王射的鷺鷥林赤城志在臨海縣開福院傍陳白遊鷺鷥林詩鷺行飛起緑楊岸漁笛吹殘明月灘一片畫圖收不得何人終日倚欄干息菴方輿勝覽州東南巾子山巔赤山隱居徐一夔赤山隱居記同郡胡宗衡讀書赤山之下榜其所居曰赤山隱居仙源雲笈七籖黄巖縣有東西二仙源東源在縣東北五里地仙劉奉林主之西源在縣南嶠嶺九十里地仙張兆期主之台州府志按杜光庭福地記東仙源在台州樂安縣西仙源在台州嶠嶺樂安為今仙居縣而舊志皆從七籖云在黄巖即黄巖志亦然未知孰是壕頭黄巖縣志在縣南五里世傳漢兵七十二陣設於此劚地得箭簇之屬小樊川平遇黄巖山水記在縣北六潭山朱文公嘗著書其麓名為小樊川題曰溪山第一逺菴赤城新志在黄巖寧溪王氏建朱文公書扁思菴赤城新志在黄巖方山施氏建杜清獻書扁松山林壑陳耆卿松山林壑記丁君少雲幽栖之所也東接海西接仙源雪巢尤袤雪巢記呉興林君景思寓居天台城西之蕭寺榜其燕坐之室曰雪巢碧西山房萬厯仙居縣志在南峰下之黄村宋陳仁玉所構有松聲山隂濠上等名冲菴萬厯仙居縣志在縣南七里之前山宋處士郭磊卿别墅理宗御書冲菴二字賜之讀書徑名勝志在寧海縣西圃面水唐令薛抗建舊名風漪戎昱寄詩以出宰山水縣讀書松竹林為韻遂更今名書林崇禎寧海縣志在治㕔東宋隆興二年令薛抗建松竹林崇禎寧海縣志在治圃東下瞰官河宋慶元二年令李知微建丹丘明一統志在寧海縣南晉孫綽天台賦仍羽人於丹丘是也浮門輿地紀勝在寧海縣南土多陳姓葢陳霸先之後居於此家菴赤城新志在寧海縣西宋隱士王度建于有成記寓菴崇禎寧海縣志在閬風里宋葉子由所築梅花吟社台州府志太平縣有梅花洞昔逸士林原縉翁子實丘海何及邱鐔王禮何起直狄常程完九人嘗為吟社號花山九老陳彬題梅花吟社詩梅花洞口夾深溪九老當年任品題今日青山不容隱五橋車馬聽驕嘶按太平縣志林原縉作林元振車路台州府志太平縣南浦宋髙宗南渡時於此上車因名車路銅柱初學記臨海南三十里有銅柱乃漢疆埸之表銅塔輿地紀勝臨海縣赤山絶頂有古塔塔之下有石函盛小銅塔塔内有銀壺盛舍利相傳梁王詧所施台州府志塔髙六寸重三十五兩内有十七字文曰呉越國王錢俶造八萬四千寳塔乙卯嵗記錢氏子孫與鐵劵俱世守之錢王鐵劵台州府志長一尺八寸三分濶一尺一寸厚一分五釐重一百三十二兩其文嵌金共三百三十三字其畫皆内狹中寛呉越備史劵文維乾寧四年嵗次丁巳八月甲辰朔四日丁未皇帝若曰咨爾鎮海鎮東等軍節度浙江東西等道觀察處置營田招討等使開府儀同三司檢校太尉兼中書令使持節閩越等州諸軍事兼閩越等州刺史上柱國彭城郡王食邑五千戸食實封一百戸錢鏐朕聞銘鄧隲之勲言垂漢典載孔悝之徳事美魯經則知褒徳䇿勲古今一致頃者董昌僭偽為昏鏡水狂謀惡貫汚染齊人而爾披攘兇渠盪定江表忠以衛社稷恵以福生靈其機也氛䘲清其化也疲羸泰拯甌越於塗炭之上師無私焉保餘杭於金湯之固政有經矣志奨王室績冠侯藩溢於旂常流在丹素雖鍾繇刋五熟之釡竇憲勒燕然之山未足顯功厥有異數是用錫其金板申以誓辭長河有似帶之期泰華有如拳之目惟我念功之㫖永将延祚子孫使卿長襲寵榮克保富貴卿恕九死子孫三死或犯常刑有司不得加責承我信誓往惟欽哉宜付史館頒示天下輟耕録吾鄉錢叔琛氏贇乃武肅王之諸孫也嘗出示所藏鐵券形宛如瓦一角有斧痕葢至元丙子天兵南下時其家人竊負以逃而死於難劵亦莫知所在越再丙子漁者偶網得之乃在黄巖州南地名澤庫深水内漁意寳物試斧擊之則鐵焉因棄諸幽一村學究與漁鄰頗聞賜劵之説買以鐵價然二人皆不悟其字乃金也有報於叔琛之兄者用十斛榖易得青氊復還誠為異事錢王題梁赤城續志在城兠率寺有廣順年間呉越王題梁宋髙宗御座輿地紀勝臨海縣金鰲山善濟院髙宗航海至此有御座尚存石碁盤臨海記臨海縣王峴山本名黄石山相傳黄石公居此有石碁盤尚存仙人牀台州府志在巾子山有石牀并枕可卧桃都山桃木輿地紀勝台州桃都山有大桃木上有天雞日初出照桃木天雞即鳴天下之雞聞之而鳴天慶觀畫壁赤城志州前天慶觀殿壁有范子珉繪牛及來禽人傳其妙鐵盤黄巖縣志明成化間居民於海濵獲一大鐵盤形如車輪重數千觔腹中鑄二十八宿及十二生肖或曰朱文公治水利時鑄此以鎮水怪天然石台州府志在黄巖縣河埠朱文公大書天然二字今徙置冠山石馬跡赤城志仙居縣項羽山相傳項羽少時駐馬於此有石馬跡尚存梁王山古松赤城志寧海縣梁王山梁王寺側有主簿洪皓祠前有古松盤偃結曲若虬龍然相傳厯數百年隂葢數畝雖畫工不能竟其状宋紹熙四年令方懋列亭其側響石崇禎寧海縣志在朱嶴五里許以石扣之清亮作磬聲相傳自唐以來有此移之他處則無聲仍還故處則復響淵明繪像名勝志寧海縣北五龍山宋陶昭建書室於山趾繪淵明小像於壁朱文公遺墨嘉靖太平縣志文公為常平使者經營六閘夜宿洪亭長家有題壁二詩其一曰纔到重陽氣便髙雁聲天地總寥寥客懐今夜不能寐風細月明江自潮其一題洪氏菊曰解印歸來歎寂寥黄花難覔舊根苖祗因三徑荒凉後移向洪家不姓陶至明洪宣間遺墨尚在浙江通志卷四十六
