宸翰賜額大書紫極壽光之宫六字今存宣和辛丑經寇紹興甲子又圯於水後重建道士章思廉范子珉項舉之俱登仙籍今為道㑹司王鎡壽光宫詩井氣蒸雲濕石欄白頭道士自燒丹開門風帶琴聲出一陣松花滿醮壇朱應鐘紫極夀光宫詩仙境通靈室林香落斷霞鳥啼丹洞竹人掃玊壇花上士談𤣥秘名山貯法華塵羈如可脫從此覔丹砂太虚觀崇禎處州府志在邑西五十里大柘東樓山之下唐乾寧二年建尹廷高太虚觀詩路入烟蘿别是天我來散髮坐風軒玉壺積翠花香潤石洞藏丹雲氣温水影倒棲松頂鶴谷聲遥荅嶺頭猿此中妙處誰能畫寫入篇章當草𤣥雲和縣大慶寺括蒼彚紀在迎恩門内唐大中二年建舊名垂休為接詔迎春之所嵗久傾圮明萬厯六年知縣蕭淵重修改今名景徳寺崇禎處州府志在縣西十里唐大中初建清修寺雲和縣志在二都距縣十里廣因寺括蒼彚紀在縣西三十二里永福寺雲和縣志在九都距縣四十里大興寺雲和縣志在六都距縣十五里天眞寺雲和縣志在二都距縣五里光化寺雲和縣志在七都距縣十里萬壽觀崇禎處州府志在縣西百歩宋咸淳六年建華陽道院雲和縣志在縣北龍泉縣崇因寺括蒼彚紀在縣東金鰲山之北舊有銅鐘一口大數十圍時或飛去初有一行脚僧鳩銅鑄此鐘去之日曰俟我去三日而後擊僧去寺主即登樓撞之聲逹八十里自後凡叩鐘八十里外不聞也名勝志鐘忽一夕在嵇聖潭又一夕在吳岱山塢寺僧視之但聞鐘腹有咆哮聲而風雨逼人無可為計翼夜其鐘自還又有木魚在東廊長丈許唐物也宋時有竊而載之舟中者夜自有聲風波洶湧懼而返之明正徳八年寺火而木魚無恙又有石筆一枝出地尺餘圍三尺根深丈許龍泉縣志有七塔峙於外二塔峙於内崇仁寺嘉靖浙江通志在縣南五里五代時建有華嚴塔宋何執中常題詩於塔頂季達崇仁寺詩歩歩擁長林莓苔一徑深排雲雙塔迥背日片巖隂瀑泠清禪骨茶香醒客心興窮詩未就風外一蟬吟資聖寺崇禎處州府志在縣南十里明邑令鄭奎光重興鄭奎光資聖寺記自邑治度留槎洲左折而南三里許有寺曰資聖傳創自天福時故有香燈田若干頃以聚僧說法誘勸愚䝉中葉來田久没入民間法侣解散寺幾墟矣予視事來業卓塔於蓮山之脊多士言近資聖寺告圯予即躬自省視遂召僧真容肩修營事清理田計四頃二十七畝有竒其羡為梵修資者緯如也塔之麓即故嵇聖橋嵗久不復予復令涓吉載事夫緣塔及寺緣寺及梁道不偏廢用實相成予因是而恍然於資之義也龍故括蒼僻邑地錯萬山民相習蠢悍今者有田以處僧有僧以說法彼民亦資是而振䝉為醒化獷為惇破慳為施津津福利不敢恣縱資之為義大矣哉先於地中得石髙廣如碑制皆欣欣相告曰天資之以登盛美也請予為之辭予得暢言所以資聖之義云清修寺括蒼彚紀在縣北三里葉子竒清修寺詩翠㣲度禪房幽響發清磬雅稱觴咏娯初無笳鼓競飛花送餘春杯酒傳雅令歸鞭裊清影皎皎三月映性果寺崇禎處州府志在縣西六十里真山民性果院訪忠上人不值詩管領東風入杖藜落梅香裏過招提苔痕一徑白雲濕花影半窗紅日低欲見髙僧聊爾耳便乗餘興去來兮葛藤有話無人識付與隔林幽鳥啼鳳棲寺龍泉縣志在縣東二十里真山民遊鳳棲寺詩十載重遊古鳳棲連營新遶緑楊堤欲談時事佛無語不管閒愁禽自啼苔滑空廊妨散歩塵昏老壁失留題僧家田地隣家種菜甲春風緑滿畦集福寺龍泉縣志在縣西二里括蒼彚紀東廊有魯般鐘樓約高七丈人每登樓輙動撞鐘則四柱振撼有危殆欲墜之勢經今數百載如一日鄭奎光重修集福寺記龍邑西去二里桃源天台山洞奥絶選佛之地此居最焉晉天福間建集福寺於山下雄宫偉殿諸刹叢林不能與之爭勝長老言鐘樓出公輸子手昻霄挿漢縹焉若飛鐘可容百石造時士女競投釵釧痕尚宛然霜月飄鐘與唄聲俱冷卓錫之侣因而雲來自晉迄明有興無圯然嵗月變更流㓂為厲縱佛法全力其何能守予以乙丑夏來視邑事日與僚佐諸士問洞天台逡巡此寺見其蓮座欲傾獅象無主廣殿長廊幾臥荆榛中同人述景不勝今昔之感乃嘆曰法王亦有蹇乎孰主張是今零落如此㑹比邱真容發願新之予壯其志分微禄以資始費不下十千緡而衆願俱發不募而輸三年間殿宇禪堂門廊階戺吐日月之華飛烟雲之色諸佛攸館衆聖還所棲矣萬壽宫名勝志唐乾元中建名寳聖宫龍泉縣志在縣西四里宋慶厯二年重建改曰太和元符三年改名奉靈崇寧間住持吳應能以符水遇徽宗賜號妙應先生出内帑營繕偉麗倍前御書天寧萬壽之宫以寵之應能復卜宫後吉地請構皇帝本命殿仍賜名紫霄介福殿及聖像撥三衢田十頃給御用金器皿置衛兵勅令郡縣官嵗時朝謁寵遇隆盛何執中萬夀宫記崇寧四年九月詔即處州龍泉奉靈宫之舊址斥而新之改賜額曰天寧萬夀宫為國家祈天永命之地且以旌妙應先生吳應能施徳濟民之效也大觀改元冬十一月有司以宮成聞有㫖俾執中為之記謹按處州介閩浙之間地靈境秀洞天福地封陲相望而此州資以為勝者殆十之二仙風鬱然殊冠於一方應能生長龍泉棲迹奉靈自言常遭異人得布氣術雜用符水治病輙愈召見考驗不誣禮賜殊縟久之以其居為宫大其基構門闥殿寢窮極宏麗役不旬月民不知病而靈壇秘宇赫然一新賜道藏經四千五百五十一卷給田十頃嵗度道士一人紹興七年改為報恩光孝宫十三年詔復舊名隱眞觀龍泉縣志在縣西二里李大明隠真觀詩晚鐘敲罷茶烟歇白雲飛度清風發山童尋鶴未歸來閒拾松枝候明月慶元縣石龍寺慶元縣志在石龍山下唐乾符間邑人捨址建宋寳祐元年邑人吳濟造經藏一輪今廢明天順元年改名神力寺嘉靖三十七年邑人吳安慶募修易名塔院毛炳石龍寺詩陌上尋春儘日間門前新栁未勝攀溪環北郭浮龜石寺枕西峯對象山雨雜松聲鳴梵閣烟含竹色隠禪闗焚香對坐客中寂薄暮遥看宿鳥還國朝順治十七年重修天銘寺慶元縣志在縣東象山下建自蕭梁元至元間僧至善重建嘉靖間重修國朝順治間邑人姚鐸建後堂姚鐸天銘寺詩秋老山行悲落木黄花對酒一髙歌蘿侵斷壁題應徧蘚蝕殘碑字欲磨添水舊聞蕭寺鴿聴琴誰識遠公鵝渡江已舍津頭筏隔岸回看翠靄多淨心寺括蒼彚紀去縣四十二里唐乾符三年建久壊明萬厯元年僧募緣重修國朝順治十年僧勝道重修慈照寺崇禎處州府志去縣一十五里唐乾符二年建明正徳二年重修東有雲巖西有金龜南障薰屏北列中峯寺之出竒者也莊嚴寺括蒼彚紀去縣二十二里唐中和三年建宋大觀三年僧子端建藏殿并寳藏覺林寺崇禎處州府志在縣十一都宋太平興國二年建吴美中遊覺林寺詩呼泉撥火此山中一縷茶烟撩竹風忽見斜陽開晚色相將待月出林東勝隱菴慶元縣志在下管迴龍山國朝康熙九年僧海雲重修後有瀑布鶴洞蝶屋試劍石洗耳泉停仙巖飛嶂石印月潭修竹茂林夏不知暑宣平縣普照寺括蒼彚紀在縣西北一里唐㑹昌六年建舊名福田宋祥符改今名今為祝釐習儀之所隆福寺崇禎處州府志在縣西三里梁大同三年建雲巖寺括蒼彚紀在縣西五里原係鮑村鮑家菴元至元間為寺清修寺崇禎處州府志在縣東十六里梁大同二年建沖眞觀嘉靖浙江通志在縣北六里唐葉法善建有李邕所撰碑括蒼彚紀葉法善捨室為之賜額宣陽續名冲真今煉丹井及銅鐘尚存舒祥沖真觀詩短牆斷粉畫圖漫窗外餘隂竹幾竿過耳笙簧啼鳥歇隔簾香雨落花寒烟邊茶竈留賔語月下芸篇伴鶴看一著殘棋蕭散後無端清思好凭欄紫陽觀括蒼彚紀在縣南五十五里宋元祐四年朱芹捨宅為之景寧縣金仙寺括蒼彚紀在縣西一里宋咸平元年建續處州府志舊傳寺宇落成忽溪水暴漲泛一枯槎長十丈餘而圍半之横於寺前質𩔖沉香形如怪石遇一異匠剖而碎之疊於壁間成雲霞巖壑之狀中塑大士羅漢諸像渾若天成至今一塵不染亦大竒觀也潘琴金仙寺詩少年湖海憶仙闗解組重遊鬢已斑對竹最宜當戸月登樓尤愛隔溪山不探物外烟霞趣誰識静中天地寛清世已無塵土夢杖藜寧憚日盤桓澄照寺崇禎處州府志縣南四十里唐咸通二年建宋乾道二年遷大赤明成化六年重建潘琴澄照寺詩一出衡門百慮寛烟霞穿盡到禪闗松蘿虬結攢新翠棟宇翬飛改舊觀嵐氣著衣晴似雨山風醒夢暑猶寒小窗獨坐清無比莫怪閒雲久戀山王華澄照寺詩朔風肅寒威草木半摧落喜見松柏青山林未蕭索遂為郊原遊停輿登禪閣禪居斷俗氛幽閒有真樂鳴泉振玉聲羣巒擁屏幙爐香浮晝氤清茗薄燕酌野目盼征雲憑軒看巢鶴少憇覺心怡百慮俱忘却顧予縻祿人此心良自怍何如鶴溪翁髙志凌霄廓清修寺景寧縣志在縣東唐咸通二年建有趙孟頫書扁普化寺括蒼彚紀在縣南鸕鷀村唐天祐元年建今重修惠明寺崇禎處州府志在縣南十里唐咸通二年建今重修嶺後菴景寧縣志在盧山即馬夫人祖居殿後山巔飛昇處亦有小殿望之如青蓮然浙江通志卷二百三十四
