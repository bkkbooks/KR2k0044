body:
  text: 浙江通志卷二百三十四寺觀九溫州府永嘉縣附郭開元寺溫州府志在府城內習禮坊晉大寧五年李整捨宅建為崇安寺唐改今名宋置藏院御書閣千佛院明一統志建炎中奉安景靈神御於此永嘉縣志明洪武間立為叢林天寧寺萬厯溫州府志在永寧坊舊報恩光孝禪寺宋政和改今名有華嚴妙峰二閣貝葉生香閣明初逆川大師受戒於此景泰中重建普覺瑜伽寺嘉靖浙江通志在府城內五代周廣順中建萬厯溫州府志舊名寶陀宋祥符間賜名普覺紹興時奏為律院元至正甲申重建明洪武間立為叢林資福寺永嘉縣志在華蓋山林靈素築室於此名通真菴宋高宗巡幸改名資福元延祐間燬明永樂時重建萬厯中邑人王叔杲修國朝康熙間重修永嘉縣城外寺觀江心寺名勝志在江心孤嶼永嘉縣志永清門外唐咸通時建宋建炎四年高宗駐蹕御書清輝浴光二軒刻石先是山有東塔普寂院高宗改名龍翔西塔淨信院改名興慶紹興間西蜀僧清了來主龍翔始合二剎為一釋智􅞹江心寺記溫城北蜃江之上有二院曰普寂曰淨信冠以寶塔東西對峙江流中貫斷岸百尺飛梁而過之宋髙宗嘗駐蹕東院親灑宸翰以榜二軒紹興七年郡守李光疏於朝合二院為一詔以真歇禪師主之賜額龍翔興慶寺師説法其地未幾沙塗壅漲師乃簣土纍石以廣其址創殿閣稱壯麗焉乾道中海溢寺屋壞幾半而寂光常師再建如初淳熙改元止菴可師增其舊制元至元丙子燬而斗崖覺山無際無言北隱相繼重建至正壬辰又燬耆舊希逸於嵗乙未首建大殿又為觀音閣於東峯之麓後三載為洪武元年慧恩主席刻萬佛閣尊像閣下為正法堂明年宗齊修二塔又明年建經鐘二閣闢丈室僧堂官院翼以兩廡靣江回廊六十楹而百廢具舉矣江心寺志重建於明正德十二年至萬厯七年又建榜曰龍海珠林林景熙江心寺詩佛借龍宫五百年平分城樹與村煙叢林忽湧中流地雙塔曽擎半壁天石色帶雲籠客袖鐘聲和月落漁船袈袍不限侵門水十載何人坐象筵朱諫寓江心寺詩孤嶼清秋夜星河萬里查江山如有約雲水暫為家白髮隨鷗鳥輕舟采石華秋風動歸思淅瀝響蒹葭程嘉量江心寺詩東西兩寺絶塵囂齋飯全憑早晚潮解事江流更分斷為君題作小金焦朱彛尊秋日對酒江心寺同髙石埭作二首謝監尋山日江童擊汰迎寒潮天外落秋草渡頭生厯覽窮孤嶼逍遙倚化城行厨深樹裏乳酒正須傾驟雨連山暗回風病葉飛入林初緩帶改席忽沾衣客醉從髙枕川長得斷磯扁舟憐范蠡蝦菜久忘歸福聖寺舊溫州府志在四都宋開寶三年建高宗駐蹕於此有御覽閣留雲軒指西亭元燬至正間重建妙果寺永嘉縣志在集雲廂國朝順治十四年燬康熙十四年重建有古鏡相傳神異向墮土內今置亭懸之石門寺溫州府志在府城北十五里賢宰鄉永嘉縣志有青石山躍鯉灘伏獅巖諸勝謝康樂嘗遊咏焉國朝康熙間重建真華觀溫州府志在華蓋山麓唐開元間建國朝康熙二十年重建容成道院萬厯溫州府志在華蓋山下元延祐間曹淵龍建黃帝時容成子於此修煉上升今扁曰太玊洞天王光藴容成道院記天下名山稱洞天者三十有六其十八為容成太玉山是已山西俯郡治煙火萬井東連睥睨而長江煙波千頃山上為大觀亭舊有青牛谷五粒松三生石惜蕪沒不可復得惟煉丹井尚存相傳一日仙人著靈異於此因祠焉宋仁宗常夢遊太玉數遣使降香幣元提點曹君構容成道院以居全真之士逮方氏據郡城乃始蕪廢今𢎞治十年改建於墨池里豫歸臥舊林適邑侯同安林公鼎新道院爰為之記時萬厯辛丑十月也樂清縣白鶴禪寺名勝志在治西丹霞山晉邑人張文君修煉於此後乃捨宅為寺時有白鶴飛鳴其中因名樂清縣志唐天授二年郡城白鶴寺改為大雲寺因移其舊額於此宋紹興十六年重建趙崇暉白鶴寺記樂城勝甲東南以雁蕩龍湫之在其境也有丹霞山白鶴寺距縣尤邇溪流餘劑猶瑩金星竹所遺笙尚諧宫徴靈仙栖息隱者盤旋中罹劫火焚蕩略盡紹興季年廣聞圎鑒二師始崇堂殿嘉泰癸亥改為十方禪林蜀僧洪照少加興復有住持曰可升實繼其後爰究爰度鳩工運材增敞舊規於是佛廬僧舍皆為一新金碧陸離丹雘耀燦士女和會稽首瞻敬如入寶花淨域莊嚴法界矣豫方嘉之而升來求文因隨喜作記俾鑱諸石云寺西有聽琴樓前對瀑布後繞峯巒門扁曰丹霞山明洪武二十四年併成叢林沈佺期樂城白鶴寺詩碧海開龍藏青雲起雁堂潮聲應法鼓雨氣濕天香樹接前山暗溪乘瀑水涼無言頌居士清淨得空王焦千之白鶴寺詩曽是文君宅幽深鎖翠岑澗松迷白鶴溪石隱黃金丹竈今猶在簫臺尚可尋豫來不能厭誰共聽泉音王十朋遊白鶴寺詩間上簫臺頂山深喜路通人家煙色裏古寺水聲中金濺星猶在丹成竈已空神仙何處覔千載賞遺風貢師泰白鶴寺詩四山拔路金圍剎雙瀑垂天雪湧雷春暖丹霞生石壁夜涼明月照瑶臺張仙入竹蒼黿代王子吹笙白鶴來獨倚闌干望東海上方鐘磬接蓬萊林泉生白鶴寺聽琴樓詩青山如橫琴雙瀑為之弦何人作此曲一彈三千年上有倚天拂雲之喬松下有伏波步月之蒼黿松今未凋黿未老人間此曲何時了我來十月溪水消古木萬壑風蕭蕭飛流向我作宫徴使我聽之心寂寥臨軒再拜問此水巢由去後誰知已我今賸有兩耳塵不敢向此溪中洗山僧煮茗樵父歌吾亦無如此水何國朝順治十五年圮康熙十一年僧育美復建沐簫寺樂清縣志在沐簫泉旁明嘉靖間趙文韶建天啓丙寅僧真賚重建國朝康熙六年僧明鑄復葺十二年文韶孫久敬同僧性真實學復修煥然一新顔曰山水清音西巖寺溫州府志在湖上嶴石晉天福間建樂清縣志宋大中祥符元年賜額明崇禎四年寺燬僧真貫重建國朝康熙十八年僧如分性真復修能仁寺萬厯溫州府志在雁山西內谷名勝志相傳諾詎那為開山祖按西域書龍湫雁蕩乃吾佛弟子諾詎那尊者之化都也詎那至山中觀瀑遂坐化宋初僧全了結菴咸平二年始建殿宇樂清縣志四年僧居悅進百寶塔賜名承天寺政和七年改號能仁紹興十二年郡守閭邱昕奏改禪院緇素雲集遂為雁山大道場元至正四年燬明洪武二十四年立成叢林三十一年僧曇竺一新之溫州府志萬厯間重建焦竑能仁寺詩捫蘿古磴坐忘曛為愛名山隔世氛飛瀑濛濛疑挾雨靈風矯矯欲排雲林深忽送玄猿嘯夜靜時聞瑶草芬好趁天風凌海嶠滿空鸞鶴下仙羣吳元彬宿能仁寺詩重尋蠟屐舊時痕峻坂回流幾度村客倦白雲山外路僧開秋竹寺邊門一溪幽迹新過鹿萬壑清哀獨嘯猿苦憶能仁今始到上方鐘動月黃昏飛泉寺雁山志在東內谷宋天禧二年僧從吉建熙寧元年賜額元末遷於戴辰峰之西絶頂上明洪武二十四年歸併雙峰寺國朝康熙五十六年僧藏白又建雙峯寺雁山志在東內谷宋祥符元年僧法遠建後有禪僧善持誦每誦經於峯下有老人侍聽忽不見世傳以為寒坑神龍來聽法也國朝康熙二十一年僧果成重建本覺寺樂清縣志在大芙蓉唐乾寧二年建國朝康熙三十二年僧大智重建謹按唐僧貫休十八剎詩云本覺靈雲到寶冠能仁古塔上飛泉普明羅漢石門襄瑞鹿華嚴天柱邊古洞靈峯真濟並靈巖霞嶂淨名連石梁不與雙峯遠十八精藍繞雁顛今所存者本覺能仁飛泉雙峯四寺而已餘盡廢但四寺見貫休詩必唐時已有之然其始建無考壽昌寺萬厯溫州府志在黃塘隋仁夀中建唐光啓二年慧空大師欲構材遷址忽洪水漂木聚於此又遇一古井獲銅佛三乃成剎樂清縣志宋景德間賜額永安崇寧賜今名元至正間燬明洪武十六年僧文禪建薛嵎雁山夀昌寺詩野服挂僧單禪扉月未關桂香清近佛秋色老依山木落遙峯出溪回流水聞相傳登蕩路數處可躋攀芝嶂寺樂清縣志在鳳凰山宋時建後圮國朝康熙二十一年僧實性募緣重建徐化民芝嶂寺記寺創於趙宋綦五百餘年衰頽已久一瓦一木無有存者其地去邑東三里許山窈然以深境泠然而靜真焚修勝地僧實性誅茆栖寂毅然矢願循其舊迹而拓大之可見物無陋者而皆可以立事無難者而皆可以興豫望此邦人士廢者謀舉圮者謀整盡如兹僧之成兹寺也東塔院萬厯溫州府志在東塔山上為白鶴寺子院樂清縣志舊時九牛山尖有石塔震圮宋熙寧間令葛逢遷於此時有僧曰梅塔主者建塔九層仍建塔院淳熙中令趙彥暉袁采繼建明洪武十年僧善爽重修正德二年僧廣德建國朝康熙二十二年釋忘牧重葺西塔院舊溫州府志在西塔山上宋咸平間邑令邊秀建祥符七年有七寶祥光現於塔頂紹興間再現樂清縣志紹興二年賜額其西創觀音堂淳熙六年令袁采再創佛殿及溫星堂元改名廣福天柱教院明永樂間僧慧真重建國朝康熙十九年僧伯晊重修紫芝觀明一統志在縣治東宋至和中建樂清縣志張文君修丹地舊有道士林守淳依嶽祠築菴宋紹興丁卯道士丘大同經始成觀明永樂七年重建國朝順治六年道士張惠升重建十五年燬十七年又建集真觀樂清縣志在白石山宋至和九年道士李少和居此大中祥符賜名白石院宣和改今名觀宇架巖穴間客始登山羽士憑闌下瞰隱隱可數具飲俟之炊熟而客始至團圞山腹遇濺沫處必舍筍輿始登縈紆久之乃逹內有少和影龕焉平陽縣仙壇寺平陽縣志在東門外唐咸通間建層磴石柱上有葛仙翁丹竈旁為應節嚴祠劉平叟仙壇寺詩窈窕懸僧廬空山斷諸想猿鶴無宿期古今契真賞坐中風雅談林壑散清響涼飈灑我髮白雲隨我杖醉臥松石下不知海月上林景熙仙壇寺西林詩古壇仙鶴杳野鹿自成羣松氣浮清曉經聲出白雲石穿僧屋過水到寺門分人世無窮事山中了不聞淨明寺名勝志在夾嶼山宋有光禪師每入定後誦經則鳥雀皆來終卷乃去平陽縣志乾德間建黃允髙淨明寺詩空門流水淨一徑入雲間古寺欲無塔平田忽有山鳥啼遊客到花落定僧間寂寞棠隂晚孤舟帶月還五峯慈雲寺平陽縣志舊名五峯院在白巖唐咸通庚辰建祀真君許遜祈晴雨最驗國朝康熙二十八年重建東林寺溫州府志在西鄉唐大厯二年建國朝順治間重興神山寺萬厯溫州府志在萬全鄉後有石洞葛仙丹竈石棋枰尚存萬行禪寺平陽縣志在玊倉山擅雁蕩之勝名人多遊覽留咏宋咸淳間建國朝康熙間重興廣福宫嘉靖浙江通志在縣南宋治平中建平陽縣志熙寧戊申賜額聖夀紹興戊申改今名有葛洪丹井瑞安縣悟真講寺萬厯溫州府志在西北隅峴山東梁時馬真人捨宅為棲霞寺宋祥符間改今名左右有十八井仙巖聖夀禪寺名勝志在仙巖山唐貞觀年建司空圖聖夀寺銘巖之巔森戟鑱天中宅靈仙巖之瀑風幹洞壑池洶山鑿越之裔甌之隅人逸而腴某其師某其牧寺圮而復許景衡聖夀寺詩古寺重門裏回廊一徑幽水聲常帶雨山色最宜秋寓宿已多日題詩更少留此生隨利祿行路自悠悠鍾清仙巖寺詩一徑迢遙轉翠微蒼藤古樹淨禪扉草年不到山依舊此日重來人漸非梅雨有潭龍化去仙巖無迹鶴飛歸賔朋散去太守醉人影鳥聲添夕暉國朝康熙間重興朱彜尊仙巖寺詩咫尺仙巖寺雲峯望轉親夕陽鐘磬發猶有未歸人護國寺瑞安縣志在集雲山頂唐會昌間本寂院僧無斁因奉沙汰隱居於此禪定十餘年藤蘿繞身時號僧為藤蘿尊者因地立祠名聖堂嵗久圯明宣德間重建天順二年賜額嘉靖三十年燬復建陶山寺溫州府志在集善鄉唐天寶間建瑞安縣志會昌六年賜真身禪院額周顯德中改通明寺宋太平興國