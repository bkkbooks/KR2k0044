body:
  text: 浙江通志卷二百三十一寺觀六紹興府山隂會稽二縣附郭大能仁寺嘉泰會稽志在府南二里晉許詢捨宅建號祗園寺後廢吳越王時觀察錢儀復建號圓覺寺宋咸平六年從康戩之請用承天節名改賜承天寺政和七年改為能仁寺是嵗詔建神霄玉清萬夀宫以僧寺壯麗富贍者改建而越以能仁為之建炎中興命神霄復為僧寺而能仁寺復故州又有能仁院故郡人謂能仁寺為大能仁寺紹興府志元初燬至正間重創明嘉靖間有司議鬻諸寺院以助軍興能仁遂廢大學士呂本以其地建别業名樛木園崇禎十五年祁鳳桂買之仍為大能仁寺陸遊宿能仁寺詩小雨暗江城倦客寄僧榻孤燈如秋螢清夜自開闔遙憐萍青青厭聽蛙閣閣窗明竟無寐卯酒倒殘榼釋溥洽送會天住紹興能仁寺詩許詢故宅祇園寺童稚嬉遊不記年樓閣參差霄漢上山川迢遞斗牛邊縈池晝引芙蕖水負郭秋登䆉稏田今日送君迷舊迹他時回首定依然國朝康熙四十五年僧德禧次第修之復還舊觀小能仁寺萬厯紹興府志在府西北二里宋開寶六年錢儀建太平興國二年給地藏院額後改今額明萬厯四年道人李明性淨桂如曉重修寶林寺於越新編唐元徽元年法師惠基於寶林山下建時有皮道與捨宅連山造寺山巔石岫有靈鰻井旁有巨人迹錫杖泉嘉泰會稽志初晉末沙門曇彥與許詢建甎木二塔未成梁天監中嶽陽王察入寺忽悟前身造塔之事踵成之加修壯麗唐會昌中廢乾符元年重建改為應天寺萬厯紹興府志舊塔久燬宋乾德初僧皓仁復建塔九層號應天塔宋崇寧年詔改崇寧萬夀禪寺又改為天寧寺郡寮祝聖於此紹興年改廣孝又改光孝乾道末藻繪尤盛後燬明永樂十一年僧善怤重構嘉靖間郡人蕭鳴鳳言於郡召僧鐵瓦復建塔隆慶間塔將圮萬厯六年寺僧真理募緣修之李紳寶林寺詩最深城郭在人煙疑借壺中到梵天巖樹桂花開月殿石樓風鐸繞金仙地無塵染多靈草室鑒真空有定泉應是法宫傳覺路便消煩惱見青蓮方干題寶林山禪院詩山捧亭臺郭繞山遙盤蒼翠到山巔巖中古井雖通海窟裏隂雲不上天羅列衆星依木末周遭萬室在簷前我來可要歸禪老一寸寒灰已達禪杜衍寶林寺詩中懷無絆外緣間深掩禪扉客到難勝景可曽飛錫去好山多祇捲簾看晝升講坐天花落夜步吟軒海月殘今日逢師堪論道歸心愁思一時寬趙抃觀寶林院塔偶成詩寶山新塔冠山形心匠經營不日成突兀插天三百尺莊嚴容佛一千名下臨泉竇靈鰻喜上拂雲端過雁驚入境行人十餘里指浮圖認越王城鮮于樞題寶林寺詩越國龜峯寺樓臺曜錦翬許詢初有造徐浩久相依開戶琅玕裂登山窣堵巍昔聞禪板少今見講花飛禱雨靈鰻躍看雲老鶴歸童烹羅漢菜客禮國師衣白足三千指蒼松四十圍星河上界近煙雨下方微浮世自榮辱深林無是非天台五臺逺何必更驂騑國朝康熙初年僧性覺募修大善寺於越新編在府東一里有七層浮屠嘉泰會稽志梁天監三年民黃元寶捨地錢氏女未嫁而死遺言以奩中資建寺僧澄貫主其役未期年而成賜名大善屋棟有題字云天監三年歲次甲申十二月庚子朔八日丁未唐開元二十六年改名開元後唐長興元年吳越武肅王别創今開元仍復大善舊名嘉靖山隂縣志宋慶元三年寺塔俱燬明永樂元年寺僧重修光相寺嘉泰會稽志在府西北三里後漢太守沈勳公宅東晉義熙二年宅有瑞光遂捨為寺安帝賜光相額萬厯紹興府志明嘉靖初寺尚存十一年改為越王祠紹興府志萬厯間僧廣譽於祠西復建寺仍名光相國朝康熙間僧智尚與其徒德心次第修之遂成名剎戒珠寺山陰縣志在府治東北五里蕺山南方輿勝覽本王羲之故宅門外有墨池鵝池嘉泰會稽志其為寺不知所始陳太建二年有僧定光來寓寺中長立不卧寺之中為卧佛殿又有竹堂雪軒宇泰閣皆一郡登覽之勝寶慶會稽續志寺初名安昌唐大中六年改戒珠紹興府志明萬厯間僧越凡妙彩重建大殿南海僧募鑄銅佛像無所謂卧佛矣李邴雪軒詩四山環繞翠岧嶤想見凌晨雪未消四萬八千修月手一時何處琢瓊瑶王十朋九日遊戒珠寺詩九日重登古嶯山勞生又得片時間菊花今嵗殊不惡蓬鬢去年猶未斑藍水楚山詩興裏鑑湖秦望酒杯間醉中同訪右軍迹題扇橋邊踏月還周紫芝晚逰戒珠寺詩悠悠倦徂征忽忽厭羈旅出門復風埃况乃迫繁暑兹遊愜初心突兀見精宇髙人昔所廬樹木亦竒古微風入冠裳林影散廊廡僧窗靜無塵燈火照眉宇閲此坦胸次鬚髮稀可數樂死固不虛顔色如處女平地渺清深淅瀝過新雨誰言臨池工至技本天與鵝羣久已空團扇復何許興盡且當歸夜半月方吐髙翥蕺山戒珠寺詩葉葉東風吹客衣安昌寺裏晚遊時欹斜竹屋羲之宅磨滅經幢率府碑佛紀是誰留寶相鵝亡猶自見方池逄僧小作煎茶供略問源流笑不知國朝康熙間僧慈帆修五十七年僧法如募資重建天王寺萬厯紹興府志在蕺山東麓後唐天成四年吳越王錢鏐夢神人求祠宇或言祠本古天王院因重建天王院宋建炎末燬紹興中僧惠迪再建陸遊天王廣教院詩遊山如讀書深淺皆可樂道旁小精舍亦自一丘壑凄涼四十年始復堪著腳老僧逝已久講坐塵漠漠當時童子輩衰鬢亦蕭索掃壁觀舊題嵗月真電雹文章早不傳衣食窘如昨出門意惘然遼海渺孤鶴開元寺嘉靖浙江通志在縣治南董昌故宅嘉泰會稽志後唐長興元年吳越武肅王建奏以開元復為大善寺而以此為開元寺蓋處一州之中四旁逺近適均重甍廣殿修廊傑閣冠絶他剎萬厯會稽縣志宋咸平中僧曉原立戒壇遇聖節則開以傳度其徒宣和初災建炎庚戌復被兵燹尋復興葺會稽縣志明萬厯十三年僧真秀重建大殿易以石柱國朝康熙間重修大中禹迹寺於越新編在府東南四里晉驃騎郭偉建唐會昌廢大中年僧居元詣闕請僧契真復興此寺賜今名門為大樓奉五百羅漢甚壯麗宋末會文清公幾卜居寺東種竹賦詩延慶寺𢎞治紹興府志在府治東五里嘉泰會稽志唐大中十二年台州刺史羅昭權捨宅建龍華寺萬厯會稽縣志在縣東都賜里即江總所憩也俗呼龍王堂江總修心賦序太清四年秋七月避地於會稽龍華寺此伽藍者豫六世祖宋尚書右僕射州陵侯元嘉二十四年之所搆也侯之王父晉護軍將軍彪昔涖此邦卜居山陰都賜里貽厥子孫有終焉之志寺域則宅之舊居左江右湖面山背壑東西連跨南北縈紆聊與苦節名僧同消日月曉修經戒夕覽圖書寢處風雲憑棲水月已爾華嚴寺於越新編在府東五里今草子田後陸遊華嚴院記會稽五雲鄉有山曰黃琢山之麓原野曠水泉洌岡巒抱負巖嶂森立而地茀不治者不知幾何年矣或謂古常立精舍以待天衣雲門遊僧之至者有石刻具其事其後寺廢石亡慶元三年馬君正卿嵩卿以餘資買地築室擇僧守之乃告於府牧丞相葛公以華嚴院額徙置焉長春觀嘉泰會稽志在府東三里陳武帝永定二年捨宅建名思真觀萬厯紹興府志宋太平興國九年改額乾明天聖中章獻后遣使修建用玉清昭應宫别殿規式崇寧二年改崇寧萬夀政和三年改天寧萬夀紹興十二年改報恩光孝元更今名後燬明洪武四年重建明真觀於越新編在府東北二里賀知章行館宋乾道間史浩奏移千秋觀舊額建中為三真殿兩廡分享前代髙尚之士凡四十一人俗謂之先賢堂陸遊修千秋觀疏一曲澄湖千秋古觀瓊樓玉宇正須月斧之修蘂笈琅函未極雲章之奉至若傑閣翬飛於天半長橋虹卧於波心皆擬繕營用成勝絶況丞相肇新於真館與邦人仰禱於帝齡覆載之間共陶化日髮膚之外皆是聖恩願垂不朽之名更效無疆之祝明永樂中改今額王野遊明真觀詩賀監風流去不回千秋宫觀出塵埃數章喬木看濃蔭一曲荒亭空緑苔弔古人來惟短棹步虛聲杳落層臺不知敕賜黃冠後誰繼清風自後來太清蓬萊道院嘉靖山隂縣志在縣東北六十步卧龍山麓元延祐三年邑人孟成之捨地道士張元悟建明嘉靖十六年知府湯紹恩改名太乙仙宫二十一年知府張明道復題其額曰紫陽道院玉虛道院萬厯紹興府志在府東南二里元大德四年道士呂雷山建明𢎞治間道士馮迪元增修治平道院在玉虛院東山陰縣城外寺觀天章寺燕翼貽謀録宋太宗命內侍裴愈訪蘭亭舊迹僧子謙因請建寺於舊地以藏御札至道二年二月壬辰詔從子謙之請賜名天章仍以御書賜之泊宅編山陰有寺曰天章以藏真廟御製故名於越新編在蘭渚山蘭亭曲水在其測舊有右軍像及書堂萬厯紹興府志宋紹興八年髙宗御書蘭亭序石刻元季寺燬碑像猶在山陰縣志明永樂六年僧智謙重建髙翥天章寺詩地勝清秋人欲仙倚闌時節月初圓不知寺在煙霞表但覺身臨星斗邊寶墨舊歸天上去髙名今向世間傳登臨莫作匆匆會去後重來又幾年天衣寺嘉靖浙江通志在法華山於越新編晉僧曇翼結菴誦法華經多靈異內使孟覬請置法華寺梁惠舉禪師嘗隱此武帝徴之不至蕭統遺以金縷木蘭袈裟遂名天衣嘉泰會稽志寺有翼公所頂戴紫檀十二面觀音及梁太子統遺舉公金縷木蘭袈裟紅銀藻瓶紅琉璃鉢具在又有金銅維衛佛像本西域阿育王女所鑄梁武帝以施山中奉於西序李紳詩注寺內有梁朝銅龍吐水銅鯨飲水以注諸院會稽風俗賦注寺有杜鵑花最竒每嵗盛開觀者競集寺後有十峯堂堂之前有唐李雍撰碑斷石尚存李雍法華寺碑昔者法王道開崛山相現信是大事職非小緣順喻非多證入彌逺故以三界為宅五濁為家四生為子六度為門轉致熱惱之衆延巢清涼之都念兹在兹廣矣大矣法華寺者晉義熙十三年釋曇翼法師之所建也師初依廬山遠公後詣關中羅什早入禪慧尤邃佛乘與沙門曇學俱遊會稽覯秦望西北山其峯五連其溪雙帶氣象靈勝林壑虛間營卜蘭若專稱法華感普賢菩薩為下里優婆提稀子於竹筐寄釋種於蓬室及杲日初上相光忽臨乘裔上漢師想望太息沉吟永懷葉公好龍已遇真物羅漢測物獲了聖心太守孟覬以狀奏聞因以為寺則知妙物者真如之正體蓮華者淨道之假名是故宗厥經署厥榜了無量義成不住因至若髙僧慧基邑人陳載皆踵武宗迹傳燈襲明或五性範堂或七寶規殿立普賢座進蓮佛藍固足以發慧印啓元門入位畢臻出家偕應或慧舉以微或昭明再造或簡文瑞像或武帝香爐寶扇迎風珠幡交路僧繇墨意盡長毫之妙光宫女綖功織大身之寶相百寶盈於九隅羣經備於三載所以神鐘警夜保賢聖之大居祥烏肅賓迓軒蓋之雲集登山而野曠心空浴水而垢除意淨性通七事戒總八關金杖五分優劣既等繪綵四色功德豈殊頃者亳州刺史前此邦别乘太原王公名法海廣大慧去煩惱之外粳得慈悲之內實起普賢臺一級寫法華經千部廣化人吏大啓津途即普賢臺立法華社地效其靈山呈其秀夫名者事之華碑者物之表其或表不立則瞻仰失容名不興則纘述無地願言刻石是用齋山其詞曰會稽南山秦望北寺髙僧還住聖迹標寄耆闍北峯法華取義羣佛護持歷國檀施陸寶大來海珍總萃幡影連珠象光發瑞臺壓龍首殿開鳥翅松巘蕭疏竹澗蒼翠綱紀有光禪律不墜掾曹正直别乘仁智作為碑板贊述名字元末寺與佛像悉燬嘉靖山隂縣志明洪武六年僧曇敷復建且圯嘉靖間德瓚重創殿廡始復舊勝云宋之間遊法華寺詩薄遊京都日遙羡稽山名分刺江海郡朅來徴素情松露洗心眷象筵敷念誠薄雲界青嶂皎日騫朱甍苔澗深不測竹房間且清感真六象見垂眺二鶴鳴古今信靈迹中州莫與京林巘永栖業豈伊佐一生浮悟雖已久事試去來成觀念幸相續庶幾最後明僧清晝宿法華寺詩心與空林共杳冥孤燈寒竹自青熒不知何處小乘客一夜風前誦佛經韓性天衣寺詩春流雙澗深曉色十峯陰勝地青蓮宇千年靜者心焚香入空翠鳴磬出幽林去路白雲滿禪宫何處尋劉基法華寺詩城上餘寒曉氣凝湖邊春樹緑層層三山獨表秦皇望衆水皆朝夏后陵白眼嗣宗終嗜酒青鞋杜子漫尋僧仙都石室煙霞裏早晚相攜䇿瘦藤劉宗周遊天衣寺詩漸覺溪聲杳山深古木稀爛柯無客到飛錫有僧歸寶蓋臨丹闕蓮花傍紫微祗疑諸佛後此地説傳衣本覺寺嘉靖山陰縣志在縣西北梅山即梅福隱居之所嘉泰會稽志後唐清泰三年謝思恭捨宅建號靜明寺寺有雲峯堂後有適南亭子真泉寶慶會稽續志宋嘉定十五年郡守汪綱重加整葺復還舊觀趙抃本覺寺詩上方金碧冠諸峯知是蓬萊第幾宫畫舫去尋湖面濶危亭登望海門通梅山舊説為真隱佛子新傳倡祖風却憶前春曾遍覽至今來往夢魂中臨江寺於越新編在牛頭山一名牛峯寺晉天福中建上有石室并陸太傅書謹按嘉泰志無臨江而有延福院云在牛頭山麓晉天福年置景德初陸太傅軫習業於此今兩寺俱在牛頭山同年建同有太傅石室遺疏疑是一寺安昌寺山陰縣志在縣西北清風鄉唐長興元年僧安普建號安昌院國朝順治間重建福安寺萬厯紹興府志在塗山東麓地名西余嘉泰會稽志後唐長興元年於古棲隱寺基上建號資福院宋治平元年改賜今額羅頎遊福安寺詩密密松篁覆古阡入林方見寶憧懸樓聽潮汐三江近山引滄洲七寺連栖鶻枝頭傳粥鼓眠牛溪上起爐煙老僧盡日巖扉底迎客惟供禹井泉融光寺𢎞治紹興府志舊名靈祕在縣西柯橋鎮山陰縣志宋紹興六年僧智性創元末燬明洪武十四年僧海印重建正統間賜經一藏構重屋以貯之賜今額嵗久漶滅萬厯間太學生王應遴經營購募得全藏築御經樓上方寺嘉靖山陰縣志在縣西北清風鄉上方山晉天福二年僧寧光建號上方院嵗久圮明洪武十二年僧𢎞深重建周祚遊上方寺詩江邊靈氣聚孤寺發山隈萬竹銜春暮羣花入霧開乘間携屐履逺眺傍樓臺一水毫茫見千峯雜沓來崢嶸雲日出蕩漾海風回白石扶天表紅宫逼上台更疑金作地翻訝繡成堆物色移朝代虛無數劫灰陰房金碧刓古瓦玉芝栽披豁當荒野淹留對酒杯依然興不淺作賦擬鄒枚花徑寺萬厯紹興府志在花徑山元天厯中建蜀阜寺山陰縣志去縣西北四十五里舊名集善教寺宋太平興國元年里人馬氏捨地能法師建元皇慶二年燬泰定二年重建至正十五年復建通圎閣會稽縣城外寺觀石佛妙相寺嘉泰會稽志在縣東五里唐元和九年建號南崇寺會昌廢晉天福中僧行欽於廢寺前水中得石佛遂重建宋治平三年賜今額石佛今在寺中髙才二尺餘背有銘曰齊永明六年太嵗戊辰於吳郡敬造維衛尊像凡十有八字筆法亦工靈峯寺於越新編在府城東南二十二里宋開寶年錢儀建號三峯院治平中賜今額劉基靈峯寺詩靈峯寺閣倚松風風細松髙閣更空何處流泉生石上有人鳴玉下雲中花飄霧露春香滿影動龍蛇曉日融安得身如列禦冦翩翩髙舉共冥鴻樊阜遊靈峯寺詩步入靈峯寺嵐霏濕翠衣野塘蒲葉短石磴蘚花微潭靜龍長卧山寒鶴未歸老僧茶話久髙閣轉斜暉雲門寺會稽風俗賦注在縣南雲門山晉中書令王子敬所居也義熙三年有五色祥雲見安帝詔建雲門寺嘉泰會稽志唐會昌中廢止存一小殿面南未燬因附益以為寺即今廣孝寺非復舊址而舊址乃多犁以為田宋紹興中僧廣勤為雍熙副院常因牛足陷得小銅維衛佛像於田中蓋古雲門寺地也紹興府志明天啓二年僧福坤於舊址重建有僧雪嶠住持本寺卒瘞於寺之右隴國朝順治十七年賜帑銀五百兩修雪嶠塔謹按雲門山向有六寺雖一寺所析皆非舊址也此寺自會昌廢後歷明天啓間重建實古雲門寺地云雲門廣孝寺萬厯紹興府志在雲門山晉義熙三年建紹興府志唐會昌廢大中六年觀察使李褒奏再建號大中拯迷寺淳化五年改淳化寺咸淳中改傳忠廣孝寺額嘉泰會稽志寺有彌陀道場杭僧元照書額寺前有辨才塔虞集雲門廣孝寺記雲門寺在秦望山之麓精舍靜居環數十里寺本中書令王獻之宅東晉安帝義熙三年有五色雲見其上是以有雲門之稱髙僧帛道猷始居之後支遁道林講經於兹山焉至梁代受業雲門者則有洪偃智永永兄子惠欣並出家能書武帝重之號永欣寺智果其弟子智諧其兄師辨才永師孫也唐時有茂亮曇一𢎞明靈一靈徹諸律師皆有盛名會昌汰寺寺毁宣宗大中六年觀察使李褒奏請重建賜號拯迷寺五代之亂淨侶散去海宴居之度人傳派晉天福中子蒙作上菴宋建隆壬戌希晏作看經院開寶壬申重曜作永興懺院淳化五年改曰淳化寺慶厯七年國子博士齊某造山門咸淳中勢家奏為墳寺更曰傳忠廣孝之寺郡於南宋為畿甸若陸若賈等多所施與為師者求弟子極慎重祝髮於寺者多衣冠子孫是以至於皇元而日加盛也寺凡十二房曰紫霞丹井凝暉朝陽長春雲壑西巖東隱東院東谷東嵓寂照常推尊宿為主收租賦供給寺事每四房嵗擇一人以相之豐則分其贏儉則助其不給又築三菴於勝處曰龍山曰慶雲曰深居僧皆修潔不事馳騖是以能久安山川之勝焉今雲門有寺六廣孝廣福顯聖雍熙普濟明覺各有勝地嵗月可書兹不盡記云雲門志略明嘉靖十一年僧法慶建樓名看竹傍有松花壇紹興府志寺在雲門山者皆得稱以雲門寺故昔人題咏槩曰雲門又山中有六寺之目而題咏自昔共之無從分屬聊附於後云孟浩然遊雲門寺寄曹起居詩我行適諸越夢寐懷所歡久負獨往願今來恣遊盤台嶺踐磴石邪溪泝林湍捨舟入香界登閣憩旃檀晴山秦望近春水鏡湖寬逺情佇應接卑位徒勞安白雲無久滯滄海時來觀故園渺天末良朋在朝端遲爾同攜手何時方挂冠秦系宿雲門上方詩禪室遙看峯頂頭白雲東去水常流松間倘許幽人住更不將錢買沃州喻鳬宿雲門一上人房詩幽深誰掩關清淨自多間一雨收衆秫孤雲生逺山花萎緑苔上鴿乳翠樓間嵐靄焚香夕容聽半偈還項斯宿雲門寺詩松葉重重覆翠微黃昏溪上見人稀月明古寺客初到風動間門僧未歸山果經霜多自落水螢穿竹不停飛中宵能得幾時睡又被鐘聲催著衣蘇舜欽遊雲門寺詩翠嶂環合封白雲中有蕭寺三為鄰老松偃蹇若傲世飛湍奔薄如避人蒼猿嘯斷夜月古丹花開落陽崖春盤桓幾日不忍去舟出邪溪猶愴神陸遊遊雲門諸蘭若詩花過木陰合溪雲生暮涼牛行響白水鷺下點青秧古寺宛如昔稚松森已行耆年不下榻童子為燒香施鈞登雲門寺詩寺在髙峯最上層路盤危石躡雲登老僧似識話茶熟野鶴聞呼隔樹譍焙藥暖籠新劑火研梅寒結小枝氷木魚聲後晨齋罷一點圎明照佛燈敕賜寶嚴寺紹興府志舊顯聖寺也初名看經院周顯德三年建宋乾德二年賜號雲門寺至道二年改顯聖寺後廢明萬厯二十二年僧圓澄重建黃汝亨遊雲門記寺後有王子敬筆倉今為一眢井國朝康熙四十六年敕賜寶嚴寺御書扁額夀聖寺會稽縣志在縣東四十里即古夀聖院雲門寺老宿所棲菴也晉天福六年建初名上菴宋熙寧三年賜夀聖額陸遊夀聖院記雲門寺自晉唐以來名天下父老言昔盛時繚山並溪樓塔重復依巖跨壑金碧飛踊居之者忘老寓之者忘歸遊覽者纍日乃遍往往迷不得出雖寺中人或旬日不相覿也入寺稍西石壁峯為看經院又西為藥師院又西繚而北為上方已而少衰於是看經别為寺曰顯聖藥師别為寺曰雍熙最後上方亦别曰夀聖而古雲門寺更曰淳化一山凡四寺夀聖最小不得與三寺班然山尤勝絶遊山者自淳化歷顯聖雍熙酌錬丹泉窺筆倉追想葛稚川王子敬之遺風行聽灘聲而坐蔭木影徘徊好泉亭上山水之樂饜飫極矣而亭之旁始得支徑逶迤如線修竹老木怪藤醜石交覆而角立破崖絶澗奔泉迅流唅呀而噴薄方暑凜然以寒正晝仰視不見日影如此行百餘步始至夀聖嶄然孤寂老僧四五人引水種蔬見客不知拱揖客無所主而去僧亦竟不知辭謝好竒者或更以此喜之今年豫來南而四五人者相與送豫至新溪且曰吾寺舊無記願得君之文磨刻崖石豫異其朴野而能知此也遂與為記國朝康熙間僧慧雲道岸得石碑於荆莽間乃古夀聖院碑因復創為寺明覺寺於越新編在刺涪山唐開元年建會昌廢晉天福年復建有千嵗和尚塔碑韓性修明覺寺記沿邪溪而南十里許是為雲門溪回路轉蒼崖壁立佛燈僧梵危出山半稍上舉武數十步俯視飛鴻逺數衆皺山門橫陳是為明覺寺寺右蒼石磊磊是為燕坐嵓循廡而西有小浮屠是為寶掌師塔按舊碑師西印上人生周威烈王丁卯年魏晉間至中國唐貞觀初築菴浦江使人為真像像成語其徒曰吾始願住世千年加七十二表世夀也吾滅後六十年有僧取吾骨塔於他山慎勿止之言訖而寂乃貞觀元年丁巳正月初九日也其徒為浮屠以葬五十四年當永隆二年有僧自雲門至剌涪向諸塔作禮祝曰吾與塔有緣塔當自啓繼而塔戶頓開僧攜靈骨於此土因塔建寺寺燬於火塔巍然獨存僧因舊地稍營葺之寺完請記遂書其嵗月使刻之石塔之建以唐永隆二年寺之建以開元十八年賜明覺額於治平二年毁於至元二十年後三十餘年而寺復完會稽縣志明崇禎間山陰祁駿佳復建延高僧住持而寺復完陸遊明覺院詩細路盤青壁層軒倚碧空天香散塵外僧梵起雲中藤絡將頽石風號不斷松尤憐扶杖處直下數飛鴻方回雲門明覺寺詩寺與樓俱靜蒼崖最上頭雲分千嶂雨樹鎖一巖秋滌硯收新句停杯話舊遊人生行樂耳早合辦菟裘泰寧寺嘉泰會稽志在縣東南四十里周顯德二年建初號化城院又改為證道院宋建中靖國元年太師陸佃請以為功德院改賜名證慈米芾書額寺門外築亭曰慶顯萬厯紹興府志紹興初以其地為昭慈孟太后攢宫遷寺於山南二里白鹿峯下賜名泰寧而徙證慈額於曹娥其後宋六陵皆在此地故寺益加崇葺明永樂中災正德間遣僧德顓重建戴冠遊泰寧寺詩寺門斜掩獨鳴驂山色留人晚更堪雨後疏螢明宿草日邊歸鳥背晴嵐龍函經古神呵護骨塔年深鬼嘯談惟有道人星月下焚香猶自禮蘿龕虞滿泰寧寺次戴仲鶡韻詩不須鶴駕與鸞驂布襪青鞋到處堪霽景逺分千里樹秋陰清鎖一溪嵐漁翁放棹緣溪入釋子携經對石談回首城南塵百尺可能飛到白雲龕稱心寺嘉靖浙江通志在府城東北四十五里嘉泰會稽志梁大同三年建會昌中廢大中五年觀察使李褒奏重建在唐為名山與雲門天衣埒會稽縣志宋元豐五年邑令曽公亮重修明永樂十九年太史章敞重修嘉靖間倭燬崇禎八年給事章正宸重建大殿宋之問稱心寺詩步陟招提宫北極山海觀千巖遞縈繞萬壑殊悠漫喬木傳夕陽文軒劃清渙泄雲多表裏澄湖每昏旦問豫金門客何事滄洲畔謬以三署資來刺百城半人隱尚未弭嵗華豈兼玩東山芝桂芳明發坐盈歎方千稱心寺中島詩水本深不極似將星漢連中州惟此地上界别無天雲折停猿樹花藏浴鶴泉師為終老意日日復年年國朝康熙九年御史顧豹文進士章貞同僧成溥重建禪堂方丈天華寺萬厯會稽縣志在縣東六十里周廣順三年建亦號無礙浴院宋至道二年改今額老學菴筆記天華寺在鏡湖之東地名東關吕文靖常題詩云賀家湖上天華寺一一軒窗向水開不用閉門防俗客愛間能有幾人來今寺乃在草市通衢中三靣皆民間廬舍前臨一支港與詩殊不合豈陵谷之變遷已如此乎或謂寺本在湖中後徙於此紹興府志明太僕卿陶履中重建於東關寶山證慈寺於越新編在曹娥鎮本陸佃寶山功德院額以攢宫在彼改名泰寧乃徙額於此東山夀寧寺嘉泰會稽志在府城東二十五里宋宣和五年陸祠部傳所建初蔡京為黨禁凡故二府臣僚名在元祐黨者皆奪墳剎例更其名為夀寧陸右丞證慈院其一也政和中詔皆復賜之額亦復故祠部適以家資建東山院成遂請於州以夀寧名之福慶寺萬厯紹興府志在府城東南七十里晉將軍何充宅世傳充常設大會有一僧形容甚醜齋畢擲鉢騰空而去且曰此當為寺號靈嘉充遂捨為靈嘉寺寺有于闐鐘宋大中祥符六年改今額敕賜傳燈寺紹興府志在化鹿山舊為平陽觀羽士甚盛明初罹兵燹國朝康熙五年僧道忞創寺規畫宏壯甲於雲門諸剎後為奎煥樓藏御賜宸章經營甫就未有寺額土人因觀名遂稱為平陽寺康熙四十四年敕賜傳燈寺額五十二年復賜御書金剛經一部龍瑞宫龍瑞圖經在縣東南二十五里即大禹探靈寶五符治水之所明一統志龍瑞宫道家謂黃帝時曾建候神館於此中有龍瑞壇唐神龍元年置懷仙觀開元二年敕葉天師設醮而龍見因改賜今額嘉泰會稽志宫正居會稽山南峯嶂遒崒其東南一峯崛起上平如砥號苗龍上升臺大抵龍瑞尤宜煙雨中望之重峯疊巘圖畫莫及故邦人舊語曰晴禹祠雨龍瑞於越新編宋嘉定年汪綱以旱來禱雨如傾注後領郡事遂重建龍祠又請於朝賜額曰嘉應然未有廟額故仍名龍瑞而不及嘉應云孫逖尋龍瑞宫詩仙穴尋遺迹輕舟愛水香溪流一曲盡山路九峯長漁父歌金洞江妃舞翠房遙憐葛仙宅真氣共微茫方干登龍瑞觀北巖詩縱目下看浮世事方知峭崿與天通湖邊風力歸帆上嶺頂雲根在雪中促韻寒蟲催落照斜行白鳥入遙空前人去後後人至今古異時登眺同蕭山縣祇園寺嘉泰會稽志在縣西北一百步東晉咸和六年許詢舍宅建號曰崇化唐會昌中廢宋建隆元年重建萬厯紹興府志寺有閣藏仁宗御書後歸寶文閣治平三年改今額今為習儀之所覺苑寺蕭山縣志刋誤在治東北陳尚書令江總在梁時避難居此捨寓為寺總避侯景難至會稽郡嘗憩龍華寺作修心賦會其舅蕭勃先據廣州總往依焉前此總父紑以父蒨眼病常捨同夏縣界牛屯里宅改為寺名慧眼寺鑿井洗眼而病遂瘳總追念父孝因以會稽之永興所寓宅捐為寺云舊志中有云子承父志捨宅為寺以此作江淹者誤於越新編唐會昌中毁大中年重建賜名昭元宋祥符中改今額紹興府志明嘉靖十三年寺毁於風雨二十一年僧懷璁重建大殿今畫壁漫滅張即之書江寺二字扁於山門王守仁覺苑寺詩獨寺澄江濵雙剎青漢表攬衣試登陟深林驚宿鳥老僧丘壑癯古顔氷雪好霏霏出幽談落落見孤抱雨霽江氣收天虛月色皓夜靜卧禪關吾筆夢生草明化寺萬厯紹興府志在西興鎮後唐長興三年吳越文穆王建名化度院宋景德三年改賜今額陳益公重建明化院記本院乃唐安國禪師道場實兩浙往來一都會風濤阻者於兹憩焉中更兵燹乾道三年霅僧德休相廢基興之渟熙間實老揮衣鉢募衆緣獲田七百餘畝然土壤窪瘠嵗入僅了科役繼者交病堂寮鞠草香積無煙嘉定十四年慈覺大師宗明來自劍津探禹穴偶經斯寺發慈悲心作根固力罄已囊槖為法棟梁增至髙田逾六百畝越二年今丞相魯國公聞之曰嘻吾志也爾其為山主人因大出餘金俾竟其事度土裁基鳩工伐木門廊廡觀不日而成獨正殿巨棟尚缺其二工師旁午茫然無措忽寺旁渾水閘現起膚寸視之則木引而裁之二棟天成徑圍尺度不爽毫末吁亦大異矣殿既成宗明請志其實余謂丞相現宰官身正法眼藏分粟布金了此一大因緣宗明心領意會踵遺規而增大植勝果於將來可書也已廣惠寺蕭山縣志在孝悌鄉玉峯山下梁大同三年建名安禪寺隋大業十三年廢晉天福七年重建吳越改保安禪院宋景德二年改廣惠禪院范仲淹寄題溪口廣惠院詩越中山水絶纖塵溪口風光步步新求取會稽藏拙去白雲深處一行春葉清臣廣惠院詩雲中老樹冷蕭蕭溪上僧歸倚畫橈誰為秋風乘興去松窗先聽富陽潮淨土寺嘉泰會稽志在縣西一里唐開元五年於古善明寺基建號彌陀院宋太平興國七年改賜今額蕭山縣志寺後有塔明永樂初寺塔俱廢萬厯間善者於山麓創屋六楹仍曰淨土寺惠濟寺於越新編在鳳堰橋俗謂竹林寺晉天福年悟真師建名看經院宋太平興國年改惠通院理宗朝改賜今額王鴻烈重建寺記距邑治東有竹林寺石晉天福年建其名竹林則不知始何時寺僧奕葉以醫著自天子以至公卿自禁中以至濵海罔不盛稱功德凡瞻禮如來與念誦藥師者蓋七百有餘載適當明季兵火不戒延及上方遂使丈六金身惟餘舍利形骸土木復見茶毗於是主僧咨謀邑父老庀材鳩工始為大殿繼為天王殿釋迦中座諸佛左右僧廬藥舍繚以周垣然後復還舊觀而士女之所皈依疾瘍之所問療者亦遂如晉宋當日嗚呼以古佛為醫祖以靈鷲為上池以四十二章經為素問以十八弟子及衆沙門為盧扁仲景不亦千百年來民無夭札物無疵癘耶主僧即空重建斯剎夙興夜寐埏埴丹堊多取諸醫金所積蓋幾歷嵗月矣諸暨縣大雄教寺嘉泰會稽志在縣西一里梁普通六年大智禪師建號法樂寺萬厯紹興府志唐會昌五年廢大中二年改報國後改今額寺中舊有琉璃井琉璃軒先照樓黃溍先照樓詩初日團圓出海東凌晨光照最髙峯不知今日華嚴界樓閣先開第幾重永夀教寺諸暨縣志在縣南金雞山之北梁大同二年建名延夀寺唐會昌中廢咸通十五年重建名長夀後改今額相傳咸和中丹陽人髙理浦中獲一金像後有西域五僧至理家云昔遊天竺得阿育王像至鄴藏河濵夢感謂吾東遊為公所獲理驚出像五僧見之放光敕送像藏於寺正覺寺紹興府志在菩提山中晉開運元年建初名菩提院後改今額寺周圍皆山惟前一徑屈曲通山麓相傳寺中舊有菩提樹生子必一百八顆寶夀寺於越新編在寶聚山唐大中間建諸暨縣志初名聖夀後改今額相傳舊有來青閣涵碧亭又藏經之殿四字皆唐柳公權書五泄寺諸暨縣志在縣西五泄山中唐元和三年靈默禪師建名三學禪院咸通六年賜名五泄永安禪寺天祐三年改應乾禪院後仍改今名劉述遊五泄寺詩翠屏千疊水潺湲一簇青鵷杳靄間惜是晚年逢此景悔將前眼看他山瀑飛落磴終難畫龍蟄巖雲只暫間薄宦勞人無計住可嗟歸去又塵寰青蓮寺萬厯紹興府志在縣西十五里羣山中晉天福四年建初名碧泉院宋至道二年改今額後漸蕪廢明嘉靖中僧道林復建紫陽宫諸暨縣志在縣東五十里宋慶元中建餘姚縣龍泉禪寺紹興府志在龍泉山嘉泰會稽志東晉咸康二年建虞世南龍泉寺碑龍泉寺者晉咸康二年縣民王陽虞𢎞實等之所建立二人以宿植之良因修未來之勝果爰舍淨財興兹福事雖宏壯未極而嚴淨有餘其地勢則背巘臨流亭然孤立棲真之致莫與為儔道場之建於兹二百年矣值梁室板蕩四海沸騰玉堂金穴餘構莫存甲第髙門尺椽皆盡惟此伽藍嶷然不動清梵夜響和鈴旦揚行人宴默風塵乏警斯固三寶之力不可思議但自創立以來多歷年所室堂頽毁禪思或擾乃有清信士女隨時喜捨仁慈淨衆同護法城是用鏤之金石咸題姓字貽諸不朽云唐會昌五年廢大中五年重建咸通二年改今額方干龍泉上方詩牛斗正齊羣木末鳥行橫截衆山腰路盤砌下兼穿竹井在巖頭亦統潮海岸四更看日出石房三月任花燒未能割得繁華去難向此中甘寂寥護聖廣濟禪寺嘉靖餘姚縣志在燭溪鄉元泰定二年建至正二十年燬尋復餘姚縣志明正德二年燬嘉靖四年重建遷西石山後其故址為呂太傅衆樂園普濟寺於越新編在上林湖山西麓俗謂之西山寺山勢回抱亞四明之天童唐大中年普光法師建號上林院宋祥符年改今額國朝康熙初年重修積慶寺萬厯紹興府志在燭溪湖之梅梁山宋史巖之功德院也清流當門景物幽勝寺前石碑宋理宗御書積慶教寺四大字上又作行書賜史巖之四字鈐以玉璽今碑折為二半埋草中國朝順治間重修普明寺嘉靖餘姚縣志在雲柯鄉從山嘉泰會稽志漢乾祐元年建號松山報恩院宋大中祥符元年改賜今額黃溍重修普明寺記從山南麓普明教寺在焉僧法炬為豫言山之未有寺也里人陳氏居之有以身為僧而以家為寺者是為文通法師山之初祖也寺建於唐天祐號報恩逮宋祥符乃錫金額而俾以甲乙次相授黃牒故在可考嵗寖逺而繕治勿繼華榱文甓或委為土梗吾徒懼焉相與殫晝夜之勤日綴而月緝迄今餘二十稔未始資毫末之助於人而仆者起缺者完像座華幡鼓鐘食飲之物纖悉必具凡為三門而斫石為楹以棲扁榜於其外者炬之父舜若深及安也為室以禮六時者安及炬若觀也為輪藏實經其中而屋其上者炬父子也惟吾浮圖氏廟塔在人間廢興相尋如漚起電滅兹山之香灺燈炷閲幾成壞而不與劫俱化蓋吾祖之蒙被其後嗣者深且厚也願有述豫始至其處見其池深而木寒甍桷户牖隱顯煙際意以為此仙聖之宅必有化佛靈僧寓迹其間而炬言如此飛鴻印雪爪趾宛然固無俟豫擬諸形容也姑敘興復之槩使刻焉餘姚縣志明萬厯甲辰重修國朝康熙三年燬九年重建白雲寺紹興府志在四明鄉唐閩中僧巘雲披荆而廬講餘白雲時時入戶晉開運間錫是名王商翁白雲寺詩幽人何處住古寺白雲髙問路不知逺到山方覺勞半窗看竹石一枕聽松濤我亦清幽者烹茶讀楚騷廣福觀嘉靖餘姚縣志舊在祕圖山下宋天聖中建號聖祖院熙寧二年用治平德音賜額夀聖建炎二年燬縣以舊弓手營易其址今在縣治東五十步紹興二十五年重建三十三年改今額明成化間燬尋建上虞縣等慈寺嘉泰會稽志在縣東一里梁天監二年建始曰化民院後改上福禪院唐會昌間毁咸通元年重建紹興府志後唐長興四年吳越王錢鏐更院為寺宋大中祥符改今額明萬厯十三年縣令朱維藩重修上虞縣志萬厯丙申邑令楊為棟命僧德度重修智果教寺萬厯上虞縣志在查湖西南創自後唐清泰初年始名建福宋大中祥符元年改賜今額洪武間廢未幾復興陳堯佐智果寺詩蘿巖山下寺靜境絶過從芳草二三月碧雲千萬峯窗虛明落日樓迥響疏鐘却恐重來晚庭前記偃松國慶寺於越新編在東山相傳謝氏故宅唐元和年安禪師建咸通年賜今額有白雲明月二軒及無塵閣明嘉靖中燬謝氏捐資再建陸遊遊國慶寺詩豈少名山宇宙間地因人勝説東山江拖銀練秋波淡峯削芙蓉翠嶂環别墅有棋莎緝緝斷碑無字蘚斑斑幾更梵宇勳名在不與薔薇一樣殘大嶽廣福寺萬厯紹興府志在縣南六十里晉帛道猷結菴之地後唐清泰元年陳思益等改建為寺上虞縣志明初寺廢景泰天順間復興嘉靖初將圯住持僧法恆德慶重修明因教寺萬厯上虞縣志地名竹橋俗呼竹橋寺晉天福五年建吳越王於開運四年給額福泉院宋治平三年賜今額孫嚞明因寺記上虞距縣東十餘里有地名竹橋有井曰梅仙子真常汲以錬丹起自漢代考之圖經即今明因院舊號福泉其地東接娥江之勝南通古剡之幽烏膽峯嵯峨乎其後蘿巖山揖遜乎其前左鄰白水右帶青煙山川之氣融結於此居然名剎也宋寶祐間比邱夀昌智份革而新之開修門徑展拓規模棟梁杗桷之撓折者蓋瓦級