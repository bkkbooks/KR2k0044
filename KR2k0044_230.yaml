縣西三十二里舊名丹山五代時建宋治平三年改今額國朝順治十年僧普應重建善濟寺赤城志在縣東南金鰲山本祥符塔院西有如畫軒下瞰長江前挹海門諸峯台州府志宋建炎中髙宗航海泊此賜今額潘朝英如畫軒詩春潮暮落海門山百艇齊飛牡蠣灘分得魚蝦歸野寺滿江鷗鷺夕陽間倦客登臨力已疲髙僧故索小窗詩江山最好君知否春去秋來煙雨時昌國寺台州府志在縣南二十五里舊名佛窟周廣順二年建宋大中祥符中改昌國院國朝康熙十九年僧了鼎重建法海寺台州府志在縣南三十五里宋太平興國七年建治平三年賜今額國朝康熙二年僧通順重修顯恩寺台州府志在縣西四十里舊名顯名宋淳熙二年開府曹勛乞為香燈院改稱顯恩褒親院後燬國朝順治十四年僧蓮心重建普安寺台州府志在縣東南四十五里舊名寶藏蕭梁時建宋治平間改普安院國朝康熙十七年僧覺際建法堂飯僧堂鐘樓禪堂東西兩廊延恩寺台州府志在縣東七十九里舊名湧泉普太康中建因任旭女弟卓菴誦蓮華經俄有泉自地湧出生蓮花故名其後聖僧懷玉飛錫於此涅槃真身尚存祈禱多驗唐咸通中賜額延恩明末僧道竒募建無礙寺赤城志在縣東南一百三十四里舊名栖道梁時嘉法師建隋改攝靜五代時僧灌頂嘗升座講經時海寇擁兵入見持幟戟者甚盛身皆丈餘乃駭而竄宋治平中改今額寺有佛像舊傳章安客舟􅋈江滸挽之不下遇一僧云必吾挽乃可因以指撮取舟遂行繼共載至回浦僧忽墮水須臾浮出一石乃此像也台州府志明嘉靖間廢佛像碑記尚存國朝順治中僧圓鏡復建法輪寺台州府志在縣東三十五里梁大同中建宋崇寧五年改今額國朝順治三年僧伏明修康熙十六年僧圓延重建安福寺台州府志在縣西北四十五里舊名雲水菴宋建隆中建治平三年賜今額國朝順治五年僧密持重興法慧寺台州府志在縣東南五十里舊名靈峯宋大中祥符七年建國朝順治十年僧龍池重興康熙十九年僧覺幻重修澄靈寺台州府志在縣東南六十里舊名甘泉普開運中建宋大中祥符間改今額國朝康熙十五年僧了量重修清修寺台州府志在縣東南一百一十五里白楓山上舊名塔菴宋寶元元年建治平三年賜今額建炎初髙宗泊舟金鰲山渡江登覽御書清修風景千年在滄海煙嵐一笑開之句明永樂八年僧文贊新之國朝康熙九年僧密藏重建闡法院台州府志在縣西十五里宋髙僧戒闍黎過此羣牛環跪因為説法土人異之為置院遂呼説法臺併名其嶴為牛跪嶴國朝康熙十六年僧覺淨重修棲真觀明一統志在府城南五十里舊名蓋竹許邁故居普時建台州府志觀有石室登霞臺葛元禮斗壇卧龍壇隋大業中廢宋政和八年重建宣和元年改今額淳熙八年唐守仲友徙今地黃巖縣明因寺黃巖縣志在縣南一里赤城志舊名妙喜梁天監中周豹二女捨宅建唐會昌中廢大順中復建宋大中祥符元年改今額紹興十一年尼慧淵復新之台州府志舊為兩浙尼寺之冠後改僧寺明宣德九年令周旭鑑重建徙佛殿於僧舍前為祝釐習禮之所後圯國朝順治初僧慈修復建康熙十四年提督常進功延釋靈薰更擴新之慶善寺嘉靖浙江通志在縣東南五十步舊名安寧赤城志普永和二年建宋紹興二十一年改今額台州府志後廢為察院址惟古塔存王十朋宿慶善寺詩剛被篙工誤遲留一日裝川途隔浩渺燈火亂昏黃呼僕回行李尋僧到上方山前十里雪清入夢魂香國朝順治間僧寂爵重建康熙十一年總兵阿爾泰捐金併寺塔俱新之九峯寺台州府志在縣東三里宋開寶間僧德韶建名瑞隆感應塔院大中祥符元年賜額興善俗呼山嶴寺宣和中燬紹興二十八年重建孫令挺禱雨得應建觀音殿吳給諫執御讀書於此捐金修葺今釋靈燾重新之沈守正步至九峯寺詩穀雨相催物物新散行時讓汲泉人乍來牧子吹蘆管且任松花打角巾有竹有藤將廢寺好風好日半間身何當移榻溪流上怪石髙梧作比鄰多福寺赤城志在縣西三十里舊名興福吳赤烏中建宋治平三年改今額國朝康熙十九年僧紹峯重修寶輪寺黃巖縣志在縣南雞籠山吳赤烏中建寺前有一石碧色每潤澤有光則天必雨國朝順治戊子釋嶽淨重修靈石寺名勝志在縣西五十里東普隆安二年建赤城志舊傳有僧誦仁王經而甘露降遂名露山後以海寇孫恩屯兵其處忽有飛石擊之退改名靈石有隋智顗翻經臺唐李義山著書堂又有飛來石或傳自西北飄墜於此一鐘頗巨云自海門浮至鐫西度鐘三字宋紹興初謝參政克家乞為香火院賜名教忠崇報寺又傳昔有異人塑殿中佛像期以十旬啓門僧怪之未及期而啓忽有雙鶴飛出視所塑才二像珠髻熒然故寺舊名耀珠殿前有浮圖二藏舍利及貝葉等書云周志偉靈石寺詩野迥林真勝衝泥亦自行雲移山欲動風入谷齊鳴草滿平池緑花含宿雨明簿書吾已倦翻愛野禪清髙材宿靈石寺詩東風吹倦客客倦且山行雨過花爭發風柔鳥自鳴巖牙迎蓋出嵐翠濕衣明古寺僧留憩蕭然一榻清袁應祺逰靈石寺詩侵寒過靈石山色逺岧嶤寶砌懸雙塔丹楹起六朝竹深飛積雪樹老夾寒潮聊悟無生理乾坤寄一瓢國朝康熙間僧超偉修瑞巖淨土寺赤城志在縣西北四十五里唐景福初僧師彥建或云唐大順二年或云文德初建其山石皆紫色宋乾寧二年賜名瑞巖僧懷玊智顗皆常棲焉祥符元年改今額乾道中錢參政端禮乞為香燈院賜名移忠昭慶後其孫象祖還諸朝復今額楊傑遊瑞巖寺詩巖谷連天嶺杉松徹象山路從雲外入人自海邊還禪榻紅塵斷經窗白晝間玉蓮生有處香滿翠微間孫大廉瑞巖寺詩白蓮開緑水佛子舊家山淨境無南北塵心有去還林深天籟逺風定水雲間何日逢征騎重來翠巘間國朝順治間僧解若重修廣孝寺赤城志在縣西南六十里吳赤烏中建宋治平間賜額台州府志明洪武二十五年重建後圯國朝康熙二十年僧通應復修聖水寺黃巖縣志在縣南四十里唐大中年建宋祥符元年改額安國釋菊莊聖水寺詩蠟屐拖雲入翠嵐帶茶來試石泉甘青山繞路曲八九流水趁橋盤兩三欲識松風并松月須憑亭北與亭南僧房面面皆能好莫為斜陽墜短簷天皇寺台州府志去委羽洞一百二十步舊大有宫宋淳祐中道士王中立以縣南委羽山大有空明洞天居天下第一因自天台之玉京觀來謁至夕野宿夢一羽衣手握一扇題云念於明處須堅守事到空時好力行舉以授王曰三五為期當復會此若有所屬者宋理度兩朝命王主領西太乙宫一夕復夢前羽衣曰尚記前約否王寤前夢曰贈詩中有空明二字此必委羽仙人屬我以香燈之傳屈指今十五年蓋三五期也即以前事上聞頒度牒以資營建賜額大有宮元至元丙子兵毁改卜重建國朝康熙十五年邑人延僧嶽忍改創為寺易今名鴻福寺台州府志在縣西七十里普永和中建舊有永和堂相傳菩提引尊者持錫開基至唐咸通中重新宋大中祥符四年賜額宣和間燬靖康中重建明隆慶間又新之妙智寺台州府志在縣南三十里舊名靈感觀音寺宋建隆元年僧南慧自蜀舁觀音像至此少憩舁行不動頃之彩雲絢霞環匝紛擁且示現焉土人異之遂留慧營殿其後如吉代主之內有王羲之墨池內照菴滌慮軒見陸佃記證法寺台州府志在縣東三十里舊在方山東唐大順中守杜雄徙此因名資福即椆木道場也宋大中祥符元年改今額廣福宫黃巖縣志在縣南三十里新安橋西俗名北斗亭明萬厯四十一年道士葉一真建國朝順治間邑人蔡君實捐金重建康熙十年殿圯蔡元升復捐資建浙江通志卷二百三十一
