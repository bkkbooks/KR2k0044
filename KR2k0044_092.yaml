body:
  text: 浙江通志卷九十三兵制四國朝寧波城守營舊隸黃巖鎮雍正七年改歸提督管轄經制額設遊擊一員守備二員千總二員把總四員外委千把總四員雍正五年添設仍在有馬戰兵額內額設馬步戰守兵丁共七百三十名康熙三十五年六月為欽上諭奉裁減步戰守兵四十九名撥赴杭協收伍四十事七年十月為稟報事裁減馬戰兵四名步戰兵四名守兵三十二名撥赴紹協收伍雍正七年十月旨議為遵裁減京撥戰守兵丁共七名歸杭嘉湖三協覆事募補現存馬步戰守兵丁共六百三十四名內有馬戰兵六十七名無馬戰兵一百一十二名守兵四百五十五名十三年衢協改鎮添兵本協裁溢額馬四匹改步戰兵四名駐劄寧波府城遊擊一員守備一員千總一員把總一員外委千把總一員馬步戰守兵丁共二百五十六名外委千把總一名在內防守六門各口址分防寧波府浮橋戰守兵丁一十名分防慈溪縣城千把總一員一年輪換馬步戰守兵丁八十名外委千把總一名在內防守七門各口址巡防慈溪縣漁溪三七市等汛千把總一員一年輪換馬步戰守兵丁三十名分防奉化縣城千把總一員一年輪換馬步戰守兵丁一百三十五名外委千把總一名在內防守四門各口址分防奉化新驛千把總一員一年輪換馬步戰守兵丁五十名分防鄞縣橫溪汛外委千把總一員一年輪換馬步戰守兵丁五十名外委千把總一名在內遊巡鄞慈二縣沿江口次戰守兵丁二十三名象山城守營隸定海鎮管轄經制額設副將一員原設寧波副將康熙八年移設象山左營都司僉書一員守備一員千總二員把總四員右營都司僉書一員守備一員千總二員把總四員外委千總二員外委把總七員雍正五年添設仍在有馬戰兵額內額設馬步戰守兵丁共一千四百一十六名康熙四十七年為稟報事撥赴大嵐山馬步戰守兵丁六十名雍正四年為請更閩浙等事撥赴乍浦營守兵二十名七年裁減京撥戰守兵丁共一十四名歸杭嘉湖三協募補八年為敬陳管見等事昌石汛陸路改設水師裁去馬步戰守兵丁六十名現存馬步戰守兵丁共一千二百六十二名內有馬戰兵一百三十七名無馬戰兵二百七名守兵九百一十八名十三年衢協改鎮添兵本協裁溢額馬十一匹改步戰兵十一名各官自備坐馬五十二匹兵丁官給馬一百三十七匹哨船四隻駐劄象山縣城副將一員都司二員守備二員千把總共十二員外委千把總共九員輪防各汛存城馬步戰守兵丁共五百四十二名分防爵溪城汛兼顧嶽頭口隘并管田灣金并嶽頭龍洞屏峯長沙六臺千把總一員輪防汛兵一百二十名每臺瞭兵五名田灣臺安兵十名錢倉寨汛兼顧塗茨口隘并管雞報塗茨中堡蒲門四臺輪防都司守備一員千把總一員汛兵一百八十名每臺瞭兵五名朱溪汛并管下章木瓜二臺輪防千把總一員汛兵五十名每臺瞭兵五名海口汛并管馬嶴口嶼二臺輪防千把總一員汛兵五十名每臺瞭兵五名西周汛并管蝦蟇臺輪防千把總一員汛兵五十名瞭兵五名泗洲頭汛并管靈巖泗洲花牆三臺輪防千把總一員汛兵四十名每臺瞭兵五名關頭汛并管黃嶴烏江七里三臺輪防千把總一員汛兵四十名每臺瞭兵五名分防湖頭汛千總一員哨船四隻配水兵六十名又龍嶼口隘安兵二十名康熙二十二年開海二十三年設汛置哨船十隻專防千總一員管駕兵丁一百五十名每船捕舵水兵一十五名二十五年裁二隻雍正四年撥入溫州磐石營四隻今實存船四隻昌國營經制額設守備一員雍正九年改守備銜為都司僉書把總一員石蒲汛千總一員外委千總一員外委把總二員雍正五年添設額設馬步戰守兵丁共五百名康熙三十六年為欽奉上諭事裁去戰守兵丁三十名雍正七年為遵等事改旨議覆事裁京撥兵丁五名八年為敬陳管見設水師添造戰船六隻添設馬步兵丁一百名內於象協抽撥六十名本汛添設四十名實在馬步戰守兵丁共五百六十五名其分防內外汛地詳見海防鎮海營隸定海鎮管轄經制額設參將一員原係五千户所順治三年改設定海營康熙二十五年改為鎮海營守備一員千總二員把總四員舊設定海水師左右二營遊守等官順治十八年裁雍正二年題改陸路參將為水師參將外委千總二員外委把總五員雍正五年添設鎮海水師營額設馬步戰守兵丁共一千二百五十七名康熙三十五年裁戰守兵丁共九十名歸撫標招募雍正二年為請更浙閩等事裁官馬一百二十六匹將有馬戰兵一百二十六名改為水戰兵額設守兵內改二百二十四名為水守兵七年裁減京撥戰守兵丁共一十二名歸杭嘉湖三協募補又為遵旨議覆事題準復設官馬八十匹現在冇馬戰兵八十名無馬戰兵九十二名水戰兵一百二十六名守兵六百二十三名水守兵二百三十四名共一千一百五十五名戰哨船八隻配兵巡哨詳見海防康熙二十二年本營原防招寶山城兼防鎮城駐劄官一員帶領兵三百四十三名滾江龍汛駐劄官一員帶領兵一百三十四名龍山所汛駐劄官一員帶領兵一百四十名穿山所汛駐劄官一員帶領兵一百七十一名霩􅛾所汛駐劄官一員帶領兵一百四名崑亭寨汛駐劄官一員帶領兵一上諭百七十五名五十六年為欽奉撥歸招寶山汛管事改設笠山城汛將滾江龍汛轄所有該汛官兵移駐笠山城汛已上駐防官共八員將備駐劄鎮城千把駐劄各汛一年一換雍正二年為請更浙閩等事改鎮海營為水師奉文將備督巡洋汛每年四月一輪千把總防水陸汛口兩月一輪分定鎮海港口虎蹲山蛟門山搗杵山金塘山西首山腳太平山瀝表觜後海東霍西霍七姊妹一帶洋面將原防之陸汛穿山霩􅛾崑亭三汛撥歸提標左營管轄雍正六年間因鎮海關口出入船隻原係防城千把總稽查緣汛守事繁恐有顧此失彼之虞詳定將鎮海關口責令經制千把總一員為專防外委千把總一員為協防其鎮城事務亦令經制千把總一員為專防外委旨事千把總一員為協防以專責成雍正八年為請係凡有城汛兼顧者俱令專防駐劄查招寶山汛兼顧鎮城是以將招寶山汛著令外委千把總專防鎮海縣城著令經制千把總專防現今鎮城防守目兵二百八十七名鎮海關防守目兵一十三名招寶山汛防守目兵一百五名龍山汛防守目兵一百八十名笠山汛防守目兵二百一十名已上俱係陸汛馬步戰守兵丁共七百九十五名寧波城守營現存紅衣炮二十八位內安設慈溪縣城六位府城二十二位西洋炮二十七位守護城池威逺炮六位守護城池得勝炮一位守護城池靖氛炮四位守護城池行營炮四位守護城池百子炮一十八門內安設慈奉二縣汛八門新驛四門守護府城六門蕩寇炮一百桿俱給兵操演象協城守營現存紅衣炮十二位內安設爵溪城二位存城守護十位行營炮九十位內安設錢倉爵溪城十二位存城守護七十八位劈山炮四位存城守護百子炮二十九位存城守護蕩寇炮三百桿給兵操演昌石汛現存紅衣炮六位內安設石蒲汛二位守護汛城四位得勝炮四位守護汛城行營炮二十三位內安設石蒲汛一十位守護汛城一十三位百子炮六位內安設石蒲汛三位守護汛城三位蕩寇炮二百桿給兵操演鎮海水師營現存紅衣炮五十五位內安設招寶笠山城九位沿江汛一十二位守護城池三十四位劈山炮二十位內安設招寶笠山城一十二位配船八位百子炮三十位內配船二十六位存局四位行營炮一百四十八位內安設炮臺汛口五十一位配船三十九位存局五十八位八節炮一位守護城池得勝炮三十位內安設招寶龍山十三位配船八位存局九位蕩寇炮一百桿俱給兵操演又商船繳貯百子炮八位存局銅百子炮二位存局生鐵發熕炮六位內配船四位存局二位寧波府演武場在東津關內乂小教場在府治西管糧廳右首紹協城守營雍正五年設舊隸定海鎮雍正七年改隸黃巖鎮經制額設副將一員左營都司僉書一員守備一員千總二員把總四員右營都司僉書一員守備一員千總二員把總四員添設把總二員康熙四十七年十月為稟報事添設外委千總四員外委把總九員原額兵丁一千六百一十三名內有馬戰兵一百六十一名無馬戰兵三百一十三名守兵一千一百四十名康熙三十五年六月為欽奉上諭事裁減戰兵五十二名守兵一十八名四十七年十月為稟報事添設馬步戰守兵丁共三百四十旨議名雍正七年十月為遵丁一十一名歸杭嘉湖三覆事裁減京撥戰守兵協募補實存馬步戰守兵丁共一千八百七十二名十三年衢協改鎮添兵本協裁溢額馬八匹改步戰兵八名各官自備坐馬五十六匹兵丁官給馬一百九十五匹駐劄紹興府城副將一員兼轄左右兩營中軍都司兼管左營事一員係專防山隂縣汛左營中軍守備一員係專防會稽縣汛左營外委千總一員協防山隂縣汛左營外委把總一員協防會稽縣汛左右兩營存城馬步戰守兵丁共五百四十五名左營分防各汛內有官大汛九處兼管臺口小汛二十處防守蕭山縣兼防錢清迎龍閘西興楊新橋種山插尖山龕山行伍山義橋聞家堰西山尾千總一員係千把輪防協防外委把總一員馬步戰守兵丁共一百二十四名內尖山楊新橋二口汛行伍山一臺俱係康熙五十六年為會酌陸路營伍等事新設又龕山臺原屬三江汛管轄亦於本案內歸併蕭山汛管轄防守諸暨縣把總一員係千把輪防協防外委千總一員馬步戰守兵丁三十九名防守新昌縣把總一員係千把輪防馬步戰守兵丁三十名防守嵊縣把總一員係千把輪防協防外委把總一員馬步戰守兵丁二十九名防守向天嶺千總一員係千把輪防馬步戰守兵丁五十名防守三江所兼防桑盆宣港龜山黨山蒙池稱浦千總一員係千把輪防馬步戰守兵丁五十名內稱浦口次係康熙五十六年為會酌陸路營伍等事添設又題裁原設烏峯宋家漊鎮塘馬鞍四臺又龕山一臺改歸蕭山汛管轄防守瀝海所兼防西滙觜北門踏浦千總一員係千把輪防協防外委把總一員馬步戰守兵丁九十四名原係右營守備汛地康熙四十七年為題設大嵐官兵案內將守備移駐臨山衛將右營原防滸山所把總一員移駐防守并改歸左營管轄內西滙觜口次係康熙五十六年題請添設并題裁原設判官新炮二臺右營分防各汛內冇官大汛一十一處兼管臺口小汛二十三處駐劄餘姚縣都司一員隨防把總一員協防外委千總一員馬步戰守兵丁共一百四十九名原係千把輪防康熙四十七年為題設大嵐官兵案內將原防臨山衛都司移駐專防仍隨帶輪防把總一員兼管餘姚縣新舊兩城遊巡梁同中村北溪等汛駐劄臨山衛守備一員協防外委千總一員馬步戰守兵丁共一百五十九名原係都司駐防康熙四十七年將都司移駐餘姚原防瀝海所守備移駐專防兼防荷花臺顧家臺黃家路口次方家臺夏蓋山等汛內黃家路口次係康熙五十六年題請添設并題裁周家路一臺防守夏蓋山外委把總一員係臨山衛守備管轄戰守兵丁二十九名防守梁同汛兼顧夏家嶺丁家畈口次把總一員係千把輪防協防外委把總一員馬步戰守兵丁一百一十九名防守中村汛兼防杖錫上馬岡分水口次把總一員係千把輪防馬步戰守兵丁七十名康熙四十七年福浙總督梁鼐為稟報事題請增設防守上馬岡口次外委把總一員係中村汛經制把總管轄戰守兵丁二十九名防守北溪汛兼防雪竇西嶺口次千總一員係千把輪防馬步戰守兵丁七十名原係寧波城守營汛