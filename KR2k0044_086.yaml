body:
  text: 浙江通志卷八十七錢法自句踐冶銅於越浙省鑄錢於是乎始唐宋以來臨安湖睦諸州置監設官具有條制厥後錢鈔並行而厯久滋弊國朝因時制宜設局鼓鑄採前人不惜銅不愛工之説模笵既精而又申嚴私鑄銷毁之禁利民足用可為萬世法矣志錢法尚書禹貢揚州厥貢惟金三品孔安國傳金銀銅也漢書食貨志太公為周立九府圜法黃金方寸而重一斤錢圜函方注外圜而內孔方輕重以銖注金以斤為名錢以銖為重也故貨寶於金利於刀流於泉大學衍義補謂之泉者言其形如泉文古錢其形即篆泉文也後人代以錢字古者寶龜而貨貝至太公立九府圜法始用錢代貝或曰泉或曰布布取宣布之意泉取流行之意其實則一而已後世之錢其形質外圓內方始此謹按貨幣之設有三珠玉為上幣黃金為中幣刀布為下幣刀布古錢之别名也通鑑綱目云黃帝作貨幣路史云軒轅氏伐山取銅以為刀貨是黃帝時業己鑄銅為幣而世遠難稽班固漢志云凡貨金錢布帛為用夏殷以來其詳靡記然則夏殷不過鑄金為幣而鑄錢之始當自太公為周立九府圜法也越絶書姑中山者越銅官之山也越人謂之銅姑瀆六山者句踐鑄銅鑄銅不爍埋之東坂水經注楊亭東有銅牛山山有銅穴三十許丈穴中有大樹神廟山上有冶官山北湖下有練塘里吳越春秋云句踐冶銅錫之處采炭於南山故其間有炭瀆句踐臣吳王封句踐於越百里之地東至炭瀆是也史記平凖書漢興為秦錢重難用更令民鑄錢漢書食貨志鑄榆莢錢注莢錢重三銖文為漢興通典高后二年行八銖六年行五分錢注徑五分所謂莢錢至孝文時莢錢益多輕乃更鑄四銖錢其文為半兩令民縱得自鑄錢故吳諸侯也以即山鑄錢富埒天子錢布天下而鑄錢之禁生焉鹽鐡論文帝時縱民得鑄錢吳王擅鄣海澤錢布天下故有鑄錢之禁西京雜記文帝時吳王亦有銅山鑄錢故有吳錢微重文字肉好與漢錢不異吳興掌故銅官山下有兩坎名銅井深數丈方圓百丈即吳王採銅之所白楊山上有兩穴為採銅處太平寰宇記銅山高一千三百尺在安吉縣東三十里括地志云吳採鄣山之銅即此石郭山在鄣南五里輿地志云昔吳採郭山銅以鑄錢即此山三國吳志嘉禾五年鑄大錢一當五百通典文曰大泉五百徑一寸三分重十二銖詔使吏民輸銅計銅卑直設盜鑄之科赤烏元年春鑄當千大錢通典徑一寸四分重十六銖故呂蒙定荆州孫權賜錢一億錢既太貴但有空名人間患之大學衍義補後世鑄大錢始此資治通鑑吳赤烏九年吳人不便大錢乃罷之册府元龜詔曰謝宏往日陳鑄大錢云以廣貨故聽之今聞民意不以為便其省息之鑄為器物官勿復出也私家有者敕以輸藏計畀其直勿有所枉晉書食貨志元帝過江用孫氏舊錢輕重雜行大者謂之比輪中者謂之四文吳興沈充又鑄小錢謂之沈郎錢錢既不多由是稍貴孝武太元三年詔曰錢國之重寶小人貪利銷壞無已監司當以為意南齊書劉悛傳建元四年奉朝請孔顗上鑄錢均貨議其略以為三吳國之關閫比歲被水潦而糴不貴是天下錢少非穀穰賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用為纍輕輕錢弊盜鑄而盜鑄為禍深民所盜鑄嚴法不禁者由上鑄錢惜銅愛工也惜銅愛工謂鑄無用之器以通交易務欲令輕而數多使省工而易成不詳慮其為患也自漢鑄五銖歷五百餘年而不變者明其輕重可法得貨之宜若官鑄已布於人使嚴斷翦鑿小輕破缺無周郭者悉不得行官錢細小者稱合銖兩銷以為大錢貨既均遠近若一百姓樂業市道無爭衣食滋殖矣隋書食貨志梁初唯京師及三吳荆郢江湘梁益用錢其餘州郡則雜以穀帛交易交廣之域全以金銀為貨武帝乃鑄錢肉好周郭文曰五銖重如其文謹按五銖錢得輕重之中故通鑑綱目云用五銖無改者二西漢元狩五年後及東漢與隋皆終其世無改東萊呂氏亦云自漢至隋惟五銖之錢最為得中故終不能易自唐至五代惟武德時初鑄開元錢最得其平故亦終不能易唐書食貨志武德四年鑄開元通寶徑八分重二銖四參得輕重大小之中其文以八分篆隸三體乾封元年改鑄乾封泉寶錢徑寸重二銖六分以一當舊錢之十踰年而舊錢多廢明年以商賈不通米帛涌貴復行開元通寶錢天下皆鑄之開元十一年詔所在加鑄禁賣銅錫及造銅器者貞元十年州縣禁錢不出境商賈皆絶浙西觀察使李若初請通錢往來而京師商賈齎錢四方貿易者不可勝紀詔復禁之洪遵泉志會昌年揚州節度使李紳於新錢背加昌字以表年號而進之有敕鑄錢之所各以本州郡名為背文越州以越字在穿下浙西以潤字在穿上晏殊類要睦州銅官山唐時於此置官採銅謹按浙江鑄錢之官始於唐永泰元年劉晏充東都淮南浙江諸道鑄錢使宋自開寶平江南之後江浙尋復置監係發運使兼提點景祐二年始置江浙諸路都大提點坑冶鑄錢官一員以魏兼為之元豐二年三司言江浙等路提點坑冶鑄錢官通領九路水陸巡按不周欲增一員分路提點從之遂定為兩司至元祐元年從淮南提點李深之請以坑冶鑄錢通為一司紹興二十七年置提領諸路鑄錢官於行在以户部侍郎榮嶷為之元代錢鈔並行順帝至元十一年浙省置寶泉提舉司所轄有銅冶場凡三各置提領大使副使一人明設布政使寶泉局大使一員後遂革除文獻通考五代相承用唐錢兩浙自鑄銅錢亦如唐制吳越備史晉開運三年錢忠獻王召左右議鑄鐵錢以益將士祿賜王弟𢎞億諫曰鑄鐵錢有八害新錢既行舊錢皆流入鄰國一也可用於吾國不可用於他國則商賈不行百貨不通二也銅禁至嚴民猶盜鑄況家有鐺釡野有􅲱犂犯法必多三也閩人創鑄鐵錢不足為法四也國用幸豐而自示空乏五也祿賜有常而無故益之以啓無厭之心六也法變而弊不可遽復七也錢者國姓易之不宜八也王深嘉之乃止十國紀年周顯德四年正月忠懿王俶始議鑄錢玉海太祖平吳因舊制開監於鄱陽錢俶入朝又得杭州錢監尋廢宋史食貨志太祖初鑄錢文曰宋通元寶凡諸州輕小惡錢及鐵鑞錢悉禁之太平興國間詔所在用錢七十七錢為百以福建銅錢數少令建州鑄大鐵錢並行尋罷鑄而官私所有鐵錢十萬貫不出州境每千錢與銅錢七百七十等外邑鄰兩浙者亦不用大學衍義補太平興國後鑄太平通寶自後改元必更鑄以年號為文宋史神宗紀熙寧六年七月詔京西淮南兩浙江西荆湖等六路各置鑄錢監宋史地理志建德府本嚴州新定郡監一神泉元豐九域志煕寧七年置神泉監新定續志神泉鑄錢監在朝京門外今廢玉海崇寧三年九月詔東南十監舒衡睦鄂韶梧六監鑄小錢餘監鑄當十錢宋史食貨志崇寧四年命荆湖南北江南東西兩浙並以折十錢為折五舊折二錢仍舊五年兩浙盜鑄尤甚小平錢益少市易濡滯遂命以折五折十上供小平錢留本路俄詔廣南江南福建兩浙荆湖淮南用折二錢改鑄折十錢皆罷其創置鑄錢院及招置錢户並停繼復罷鑄當十二分之令盡鑄小平錢荆湖江南兩浙淮南重寶錢作當三大觀二年江南東西福建兩浙許鑄使鐵錢三年詔以兩浙鑄夾錫錢擾民凡東南所鑄皆罷宋史高宗紀紹興二十七年八月復置提領諸路鑄錢司於行在二十九年六月復置江淮荆浙福建廣南路提點坑冶鑄錢官建炎以來朝野雜記慶元三年湖州舊鬻監行於天下至是官自鑄之因復置神泉監以所括民間銅器鑄當三大錢仍權隸工部惟嚴錢直輸行在而建韶饒贛州皆自提點所泛湖由江入漕渠輸之京帑焉宋史食貨志慶元三年復神泉監又置市舶於浙於閩於廣舶商往來錢寶所由泄是以自臨安出門下江海皆有禁續文獻通考淳煕九年九月詔令臨安府諸路提刑司嚴姦民銷鑿見錢私鑄銅器之禁仍下殿步司一體施行嘉靖仁和縣志縣之平安橋宋時有金錫庫即銅錢局也大學衍義補至正十年詔鑄至正通寶錢與歷代銅錢並用王褘泉貨議銅錢之制自五帝三王下更歷代莫之有改其為法最古善為天下者因民之所利而利之民以為利上之人何故而不為今外宰相得承制行事亦既審察民情即江浙省府治鼓鑄纍月之間國用頗賴以資給則其為效固有不可誣者然其所鑄乃當十大錢止用於杭城而不足以行逺愚竊以為錢法之議有二一曰廣開鼓鑄二曰罷鑄大錢考之史傳漢郡國皆得鼓鑄而縣官往往多即銅山所在而鑄錢唐亦即出銅所在置監天下爐九十有九宋鑄錢總二十六監而諸路所鑄其數多寡各有差其法皆不可廢賈誼所謂事有召禍而法有起姦今令細民人操造幣之勢者此謂不可使民私鑄爾非謂官不當廣鑄也自周景王楚莊王欲鑄大錢其臣即以為非漢之赤仄以一當五王莽之大錢五十蜀之直百後周之當千唐之乾元後唐之永通宋之煕寧皆為當十大抵一時茍且之為張商英言當十錢自唐以來為害甚明蓋大錢質輕而利重利重故盜鑄者多質輕故寶愛者少小錢費厚而利均費厚故盜鑄者少利均故貿易者平由是言之鼓鑄不可不開而監局之置不可不廣大錢不可不罷而小錢之鑄不可不多為今之計無踰此者且今江浙地大物衆省府鼓鑄固必仍舊其浙東西江東閩中諸路宜各斟酌所在分置監局或一州二州即為一爐而凡所鑄錢必以漢五銖唐開元金大定宋大觀及今至正小錢為則其大錢更不復鑄夫鼓鑄廣則造錢多而人易致小錢多則稱物均而人知貴易致則其用不匱知貴則其行可久推而放之其法將遍諸天下而凖固不特浙江一省而已續文獻通考寶泉提舉司至正十一年置凡九所浙江行省一所所轄有銅冶場凡三各置提領大使副使一人掌浸銅事法傳録洪武七年令户部及各省鑄洪武通寶續文獻通考其制凡五等當十錢重一兩當五錢重五錢當三當二重皆如其當之數小錢重一錢浙江爐二十一座每歲鑄一千文一百六十六萬四千泳化類編永樂九年令浙江江西廣東福建四布政司鑄永樂通寶錢續文獻通考宣德九年令南京工部并浙江等布政司鑄宣德通寶錢明會典𢎞治十八年令南北直隸府州并十三布政司查盤洪武永樂宣德等錢并鑄𢎞治通寶續文獻通考萬厯四年題準通行十三布政司南北直隸開局鑄錢每府發鏇邊樣錢一百文照式鑄造呈樣又題準通行天下開鑄制錢與本地方舊錢相兼行使著各撫按官設法經理務在便民毋致勞擾十三年鑄萬厯通寶錢謹按鈔法之興自宋創交子會子金元承之以為鈔元劉宣言宋紹興初軍餉不繼造此以誘商旅為沿邊糴買之計比銅錢易於齎擎稍有滯礙即用見錢尚存古人子母相權之意趙孟俯亦言鈔乃宋時所創施於邊郡金人襲而用之皆出於不得已蓋所謂鈔者費直不過三五錢而以售人千錢之物用之者無權行之既久即不能無弊元自世祖頒行中統交鈔以錢為文厥後造至元寶鈔以一當五至大間浙江雖鑄當十大錢然印造交鈔實則兼用卒至物重鈔輕料鈔十錠易斗粟不可得明初置寶源局各行省置寶泉局顧以元用鈔省便仍設寶鈔提舉司造大明寶鈔命民間通行至立倒鈔法洪武二十六年又令大明寶鈔與歷代錢兼行鈔一貫準錢千文又以鑄錢擾民罷寶泉局時兩浙民重錢輕鈔有以錢百六十文折鈔一貫者由是物價湧貴而錢法益壞不行永樂時亦然至宣德三年停造新鈔然猶設立鈔關藉以收鈔而通鈔法嗣後始用錢而鈔法漸除是可知鈔法之設終不若鼓鑄之盡善浙江雖非産銅之處然觀元時之苦於用鈔而樂於用錢則錢法之利於民生固萬世不易之良規也國朝大清會典國家開局鑄錢頒行天下自部鑄外各省鎮或設或停隨時更定其設官監鑄採銅搭放咸有成法私鑄及行使廢錢禁例尤嚴謹按浙江之山産銅者少故開局鑄錢時行時止雍正四年欽奉上諭給價收買黃銅器皿以資鼓鑄禁是以命浙省設局開爐又復申嚴銷燬之國寶流通而私鑄自可屏絶矣爰遵搭放禁令為六會典成法分收銅開局官役鼓鑄條詳列於左收銅康煕十四年議準各省産銅及白黑鉛處所有民具呈願採該督撫選委能員監官採取康熙十八年覆準各省採銅鉛處令道員總理府佐分管州縣官專司任民採取八分聽民發買二分納官造册季報其近墳墓處不許採取或事有未便該督撫題明停止道廳官如得稅銅鉛每十萬斤紀録一次四十萬斤加一級州縣官得稅每五萬斤紀録一次二十萬斤加一級所得多者照數議敘上司誅求逼勒者從重議處其採取銅鉛先聽地主報名採取如地主無力聽本州縣人報採許雇鄰近州縣匠役如有越境採取並衙役擾民照光棍例治罪浙江開採銅鉛共六縣富陽採銅白鉛餘杭採銅武康採銅黑鉛山陰會稽採白鉛諸暨採銅黑鉛聽民開採官為抽稅屬杭州者杭嚴道總理屬湖州者嘉湖道總理屬紹興者寧紹道總理雍正四年九月户部等欽奉上諭錢文乃民間日用之所必需向因錢價昂貴朕悉心籌畫至再至三今鼓鑄日增而錢文不見其多錢價仍復不減是必姦民圖利以銷燬制錢打造器皿之事若不禁銅器則錢價究不能平而無以便民間之用從前九卿議令不許製造黃銅器皿其已成之銅器有情願出賣者俱作廢銅交官給與價值朕思如此奉行究不能盡除積弊且些微物件亦難彚集交官終屬有名無實嗣後京城之內除三品以上官員準用銅器外其餘人等不得用黃銅器皿定限三年令其將所有黃銅器皿悉行出賣當官給與應得之價如旗人則於本旗交出領價漢官民人則於五城該管之處交出領價不論輕重多寡隨便收買不許發價之人絲毫扣尅違者重治其罪如此庶可以永杜燬錢製器之弊而國寶流通民用充裕實為大有裨益著九卿確議具奏欽此欽遵臣等會議得雍正四年正月大學士九卿等會議欲杜銷燬制錢之源在嚴立黃銅器皿之禁嗣後製造器皿除紅白銅不禁并黃銅之樂器天平法馬戥子及五斤以下之圓鏡亦不禁外其餘一應器皿毋論大小輕重不許仍用黃銅製造其已成之黃銅器皿俱作廢銅交官給與價值等因奉旨依議欽遵通行在案但半年以來民間所有黃銅器皿交官領價者甚少而銅器店鋪仍行貨賣我皇上念切閭閻無微不照特降諭旨令臣等公同確議臣等謹議嗣後京城內三品以上官員準用黃銅器皿民間樂器圓鏡戥子仍照臣等原議外其餘文武各官軍民人等一應大小器皿俱不得仍用黃銅所有舊存黃銅器皿除箱匱上銅事件外其餘不論輕重多寡悉行交官領價按依成色估足銅鉛斤兩照部定每斤一錢一分九釐九毫三絲之價給發如有低銅冒開好銅及應領之價故意勒掯扣尅者冒開銀兩照侵盜錢糧例扣尅銀兩照尅減官價例治罪其收買銀兩酌量於户部支領所收銅斤該管處每季解交錢局以供鼓鑄并將所給銀兩實數造册報部寬以三年之限如有過限仍將黃銅器皿藏匿不交賣者以私藏禁物例治罪其小鋪收買零星銅器限三個月內盡行交官領價違者即照私藏禁物例治罪其打造銅器店鋪如有仍將黃銅製造器皿者照銷燬制錢為從律治罪如此則舊日之器皿盡收新造之銅器可斷銷燬制錢之弊既清其源而遏其流將來錢文日增錢價自平於錢法實有裨益請行各直省悉照京城之例均以三年為限交收俾各處之黃銅器皿盡行禁止則永無銷燬制錢之弊矣奉旨依議雍正五年四月初九日欽奉上諭制錢為民間日用必需之物向來錢價甚昂民間深為不便朕為籌畫宵旰焦勞因思鼓鑄日增而錢文不見其多必有銷燬制錢以為器皿之事是以令京城與直隸各府及各省督撫駐劄之省城不許鑄造黃銅器皿凡有黃銅器皿者俱著交官照數給與價值無非欲錢文充裕俾小民有資生之益而無乏用之苦也年來於京城內外屢次拏獲銷燬制錢之姦民而欽差官員於甘肅地方亦見有燬錢為器者可見銅器若不嚴禁則燬錢之弊必不能除而錢文必不能裕錢價必不能平此其相因之情勢固有灼然不爽者京城現今奉行惟謹凡黃銅器皿俱已陸續交納給價乃聞各處省城並未設有收買銅器之公所與專司其事之官員則民間雖有銅器何從交納此皆各督撫怠忽因循並不實心奉行之故也用是再頒諭旨著各省督撫設立公所於屬員中揀擇亷謹老成之人專司其事在司庫先撥數千金以為價值嗣後陸續給發凡有交納銅器者按其斤兩給以頒定價值不得絲毫扣尅亦不得以重稱令其虧折夫制錢為日用之所不可缺而器皿則不必定用黃銅此理甚明此事易曉各省督撫果能將朕便民利用之至意諄切曉諭而又核實給以價值則民間之交納銅器者自必踴躍爭先矣著各督撫將所買銅器斤兩每年歲底奏聞其所發價值報部奏銷倘委辦之員有侵蝕扣尅等弊督撫即行題參從重治罪直隸各府委官之處亦照此一體遵行特諭欽此浙江總督臣李衛欽奉諭旨屢經諄切出示反覆開𨗳隨於省城及嘉湖二府治各設局委官掌管其餘各府州縣著落印官并佐雜等分收凡民間交銅公平彈兌照依定價給發將所收銅器斤兩彚查題報雍正五年十一月户部為欽奉上諭事我皇上因各省設立收買銅器公所恐各州縣與所設公所窵逺之處民間交納未便令民間交納銅器準其抵作正賦錢糧奉上諭應如何舉行可行於何等省分並作何交納扣抵與生銅熟銅定價之處詳議具奏欽此臣部議各省有未完舊欠錢糧行令督撫酌量於各省民欠內以二十萬兩為率準令欠户交納銅器扣抵應完舊欠之數倘銀數抵扣完日尚有交納銅器者督撫再行具題請旨此所交銅器熟銅照頒定價值每斤以一錢一分九釐九毫三絲計算生銅價值比熟銅減二每斤以九分五釐九毫四絲四忽計算各州縣官於紳民交納時按其生熟成色斤兩以所定價值算抵如有姦民銷燬制錢充作廢銅片塊打成器皿物件者發覺之日照律治罪其收銅之州縣官不得絲毫扣減價值亦不得以重稱收兌令其虧折每季將所收銅器斤兩數目報明督撫解交公所督撫於年底奏報其無民欠之省分及無民欠之州縣與無舊欠之糧戶有以銅器交官者俱按生熟銅成色給與價值將所收銅器存貯公所於年底奏報如各省地方官有現將已資收買黃銅器皿者著解交公所掌管官即按生熟銅斤給與價值倘地方官有不遵諭旨借捐買名色以賤價收買民間銅器者督撫即指名題參交部嚴加議處可也奉旨依議設局順治六年令浙江設局鼓鑄順治八年議準各布政司止開一局餘俱停止順治十四年題準各省鑄局槩行停止獨令寶泉局鼓鑄順治十七年復設各省錢局康煕元年令停各省錢局康煕六年浙江總督趙廷臣條議各省爐座仍令照舊鼓鑄以補國儲而濟民困部議照該督所請各省爐座俱照舊例開鑄奉旨通行康熙十三年停浙江鑄局康煕三十五年浙江巡撫線一信奉文開浙江錢局在杭州府大倉前康煕三十八年停爐因改局為永濟倉雍正八年正月奉旨開鑄建寶浙錢局在仁和縣羲同二啚地方原係祖山寺基址並民地十畝零局門前牌坊一座一頭門一座爐神廟座庫丁班房八間選堆沙泥房三間間二門一座大堂三間青堂三間左右二作貯錢庫庫官住房三間項厨房三間東首平披各五間收貯鉛銅等大堂東側建設爐房五座編寶裕升平世五字號號大堂西側建設爐房五座編泉流富有年五字錢局之外周圍建造營房六處以住巡查兵丁官役順治元年令户部漢右侍郎一員督理京省錢法各省鎮開爐鼓鑄令布政司總理就近道廳官分管浙江承宣布政使所屬衙門舊有寶源局大使副使各一員後裁康熙三十五年浙江巡撫線一信奉文開局鼓鑄設督局官一員早晚稽查工匠出入雍正八年浙江總督臣李衛奉文建立寶浙局委監督鼓鑄官一員協理鼓鑄官一員協辦官一員庫官一員把守局門外委把總一員十巡查營兵二十四名局書二名錢局庫丁六名每爐設爐頭一名沙匠頭一名刮上爐匠一名刷倒火匠一名翻匠六名沙匠三名灰匠二名磨採錢匠二名敲杖錢匠三名煤滚錢匠二名錢匠十名銅匠一名熯匠一名省踏糙匠一名淘揀選匠四名雜穿數匠一名眼匠一名沙匠二名用小工四名鼓鑄順治二年題準京省鑄錢每文重一錢二分每七文準銀一分順治八年議準鑄錢每文重一錢二分五釐不許輕重違式順治九年題準各省鑄錢本息責成各該衙門按季報部年終彚報奏銷順治十年題準鑄造制錢務令精工背鑄一釐兩字户部添一户字各省俱添一字浙江添浙字鑄不合式者參究順治十八年議準無釐字舊錢每斤給價七分收燬鼓鑄又題準鑄成康煕通寶樣錢頒發各省局依式鑄造順治錢仍舊行使康熙七年浙江開鑄錢文每文重一錢四分以二萬文為一稱計錢二十串每稱用水銅一百七十五斤外加耗銅一十八斤十二兩共正耗銅一百九十三斤十二兩計炭罐工食物料等項銀共五兩七錢九分康煕二十三年議準鼓鑄制錢每文足重一錢行文鑄錢各省俱照新式鼓鑄康煕三十五年浙江開鑄錢文每文重一錢以二萬文為一稱計錢二十串每稱用紅銅六分白鉛四分配搭用正銅鉛一百二十五斤外加耗銅鉛十一斤四兩共用正耗銅鉛一百三十六斤四兩計給炭罐工食物料等項銀共二兩六錢八分五釐每年動用存庫銀二十餘萬兩給商採買紅銅倭鉛對搭鼓鑄設爐二十座每日鑄錢二十稱康熙四十一年鑄錢仍重一錢四分雍正七年正月户部奉上諭各省收買銅器鼓鑄錢文一事屢降諭旨令各該督撫酌量所收銅器可以鼓鑄即為奏聞何以至今未見一處奏到爾部再行文各省但所收之銅可以設局開爐即當鼓鑄俾錢法疏通不必拘定足放一成二成兵餉方行開鑄欽此雍正八年浙江開爐鼓鑄錢文每發黃銅一稱計生熟各九十六斤二兩外加白鉛十斤十三兩二分五釐黑鉛四斤十二兩鑄錢定例每發黃銅一斤加白鉛九錢黑鉛四錢銅鉛每百斤加耗九斤鑄出錢一稱計重一百七十四斤十五兩四錢計繳錢二十千文每千文重八斤十二兩如輕加補鑄錢一稱給工料錢三千四百一十六文每稱外收加鉛錢一千六百二十五文給鉛錢工料錢二百七十七文五毫五絲每錢一串繳補串錢二文旨行雍正八年四月浙江總督管巡撫事為遵會看得文事據布政使程元章鹽驛道副使王鈞浙省奉文設爐開鑄當將從前所設爐座應用爐頭匠役以及炭罐銅斤人工物料等項逐一詳議查康煕七年間浙省開鑄錢文每稱用銅一百七十五斤外加耗銅一十八斤十二兩計給炭罐工料等銀五兩七錢五分錢重銅足肉好完備民間至今流通行用續於康煕三十五年復開鼓鑄奉行未善將錢質改輕攙和銅鉛減少料價以致所鑄錢文不能流通官帑民資虧折無抵今奉議開鑄應請先以錢式為主每文應重若干每串用錢若干并南北民情土俗行使錢文不同務與現在民間流通制錢相等方無積滯之慮先經備晰詳請題逹兹準部覆內開康熙七年浙省鼓鑄每二十串銅價十二兩五錢九分三釐工料銀五兩七錢九分共用銀一十八兩三錢八分零今以廢銅價值合算每二十串銅價十九兩七錢八分四釐零加以工料五兩七錢九分合之銅本共銀二十五兩五錢七分四釐零較之康煕七年浙省所用工料每二十串多用銀七兩一錢九分四釐零即比照京局尚多用銀一兩九錢九分一釐零行令確訪時價據實核減至於耗銅每百斤俱係九斤浙省不便獨異行令仍照原議遵行今查浙省開鑄皆係收買廢銅分晰生熟二種定價給發比照康煕七年所用銅本原多銀七兩一錢九分四釐零今次實係銅價高昻並非工料過多且一切應用沙石料物産從外省採辦亦多水腳所需炭罐必選乾燥高厚價值自倍鑄出錢文務使合式精工須加滚錢匠作即如浙省食物等項較之别省貴賤不一匠作人工又難核減再查生熟銅器鼓鑄前經設爐鎔驗渣沫甚多今每百斤加耗九斤確係不敷難以核減除一面嚴飭上緊辦理另行擇期開鑄外所有鼓鑄工料加用耗銅等項擬請仍照原題之數允銷庶鼓鑄不致貽誤國寶亦可疏通矣為此咨部查照施行旨行雍正九年正月戶部為遵浙省鼓鑄難以預定咨文事咨覆浙江總督咨稱部照江西省已準之數試行鼓鑄核實報銷今已鑄有月餘每稱實須工料銀三兩四錢一分六釐較之江西省每稱工料銀二兩六錢五分八釐零雖屬不等但各省物件價值原有髙低匠作人等亦有貴賤是以未能畫一然較之京局每稱給工料錢三千七百九十六文實多節省請照三兩四錢一分六釐之數報銷委難再減擬合咨明等因前來查浙省鼓鑄工料先經該督請照江西鼓鑄之例暫行試鑄俟鑄有成效核實報銷本部行令作速料理鼓鑄去後今該督既稱每稱實須工料銀三兩四錢一分六釐本部核算較京局所需工料數目節省銀三錢八分應令該督將所需工料銀兩於鑄出錢文內動給如有浮冒短給據實查參可也旨行雍正九年正月户部為遵浙省鼓鑄雖係生熟銅文事咨覆浙江總督咨稱各半勻配但係民間使用器皿銅質原髙今經火煉鉛氣漸銷銅性燥烈以致每多缺損必須回爐復鑄不特糜費工料折耗分兩抑且有稽鼓鑄似應酌量加鉛以冀銅性潤澤應請加鉛配合每年約需銅六十九萬二千三百七斤遵奉部行每百斤折耗九斤得淨銅六十三萬斤細加試驗每銅一斤須加黑鉛四錢白鉛九錢共應加黑鉛一萬七千二百七斤零白鉛三萬八千九百四十二斤零除折耗外淨黑白鉛五萬一千一百八十七斤零應加鑄錢五千八百四十九串九百九十文但浙省非産鉛之地價實難以預定現委間員前赴産鉛之省採辦核實確價報銷等因前來應令該督將前項需用鉛斤作速委員前赴産鉛地方照也數採買運供鼓鑄其採買鉛斤價值報部查核可雍正十二年四月户部為欽奉上諭事雍正十一年十一月十六日內閣奉上諭鼓鑄錢文專為便民利用銅重則滋銷燬本經則多私鑄原宜隨時更定籌畫變通斯可以平錢價而杜諸弊順治元年每文鑄重一錢二年改鑄一錢二分十四年加鑄一錢四分康熙二十三年因銷燬弊多仍改重一錢嗣因私鑄競起於四十一年又仍復一錢四分之制逮後銅價逐漸加增以致工本愈重今寶泉寶源二局每年額鑄錢文每串需工本銀一兩四錢零歲計虧折銀約三十萬兩朕思錢重銅多徒滋銷燬而且銷燬姦民不須重本便可隨時鎔化屣緝殊難非若私鑄必須有力之人兼設有爐座器具易於查拏者可比若照順治二年例每文鑄重一錢二分在銷燬者無利而私鑄者亦難似屬權衡得中可以行之久逺再現今五省採辦洋銅三省採辦滇銅朕思與其令三省辦銅解部莫若即令滇省就近鑄錢將鑄成錢文就近運至四川永寧縣下船由水路運赴漢口搭附漕船解京可省京鑄之半似多便益至於户工兩局每年需用鉛斤每斤部價銀七分有餘聞貴州鉛厰甚旺歲出四五百萬斤每百斤厰價一兩五錢如酌給水腳令該撫選委幹員如數解交京局似較之商辦節省尤多再黃銅既禁用紅銅者自多其實黃銅即係紅銅白鉛攙和鎔成若不並禁仍於鼓鑄未便所有紅銅器皿應如何分别飭禁雲南開鑄貴州解鉛應如何酌定規條並現鑄錢文應否改重一錢二分之處著九卿詳悉妥酌定議具奏毋得輕率亦毋得拘泥欽此欽遵該臣等會議得錢重銅多以致姦民肆行銷燬是將國家有用之工本徒滋姦民射利之貪壑欲除其弊宜清其源應將現行一錢四分之例遵照順治二年每文改鑄一錢二分則錢本稍輕銷燬製器與買銅私鑄均無利可圖且每文節省銅鉛二分是每串節省銅鉛二十兩統計歲需銅鉛七百一十萬斤可節省銅五十一萬斤計省銀八萬九千二百五十兩省鉛五十一萬斤計省銀二萬九千五百二十五兩二共節省銀十二萬八千七百七十五兩在國帑既多節省而銷燬私鑄之弊又可盡除是鑄一錢二分之錢權衡得中實可永逺遵行至改鑄一錢二分銅鉛雖有節省而錢數仍照舊額所有工料仍應照舊給發俟命下之日户部行文錢法衙門照例鼓鑄仍將鼓鑄樣錢頒行開鑄省分一體照式鼓鑄至現行一錢四分之錢若分别增價恐不便於民用復行改鑄亦無裨於國計應仍一體行使如有不肖姦民射利私行銷燬者應令該管地方官辨不時巡查嚴拏治罪可也奉旨依議搭放順治十三年題準鑄錢搭放兵餉工食令州縣扣算刋入由單填注收簿順治十四年題準徵收錢糧銀七錢三銀儘起解錢充存留之用康熙七年覆準存留驛站官役俸工雜支等項俱照銀七錢三例收放制錢該督撫查取所屬徵收流水底簿磨對年終得收放數目造册報部如奉行不力指名題參康煕十年令直省存留錢糧照數收錢上下通行方無壅滯有不收制錢者以違制論雍正五年十二月户部摺奏查各省兵餉多者至一百四十萬餘兩少者三四十萬兩其餘皆百萬內外餉多之省以一成錢搭放需錢十五萬餘串得淨銅一百四十餘萬斤可以開鑄以二成錢搭放需錢三十餘萬串得淨銅二百八十餘萬斤可以開鑄餉少之省以一成錢搭放需錢三四萬餘串得淨銅三四十萬斤可以開鑄以二成錢搭放需錢五六萬餘串得淨銅五六十萬斤可以開鑄兵餉百萬內外之省以一成錢搭放需錢十萬串內外不等得淨銅一百萬斤可以開鑄以二成錢搭放需錢二十萬串內外不等得淨銅二百萬斤可以開鑄臣等以各省兵餉搭放一成二成錢文計算除雲南省現開鼓鑄外其餘省分應用淨銅若干斤可開鼓鑄之處另單録呈御覽浙江省歲需官兵俸餉銀一百萬八千七百四十五兩八錢零以一成錢搭放共該錢十萬零八百七十四千五百八十文得淨銅八十八萬二千六百五十二斤九兩二錢可以開鑄以二成錢搭放共該錢二十萬零一千七百四十九千一百六十文得淨銅一百七十六萬五千三百零五斤二兩四錢可以開鑄雍正八年浙江開寶浙局鑄出錢文九一搭放兵餉並府縣俸工及鼓鑄工料等項禁令順治四年令各省不許私鑄偽錢及前代舊錢通行嚴禁順治十年題準官爐夾帶私鑄者照枉法計贓坐罪順治十八年議準私鑄為首及匠人處斬家産入官總甲十家長知情者俱處斬家産入官不知者枷號一個月責四十板徒一年為從及知情買使者立行處絞告捕者照例給賞該管地方官知情任其私鑄者照為首例不知失察者降三級調用如經紀鋪戶販賣攙和私錢者枷號一個月責四十板流徙尚陽堡內外各官各按職掌照新例處分康煕三年題準失察私鑄該州縣官並吏目典史衛所官各降三級調用知府直隸知州捕盜廳官各降一級調用司道都司各罰俸一年督撫罰俸六個月運使照司道例分司照知府例大使照典史例議處康熙七年題準攙和私錢十文以上照例治罪九文以下仍枷責免流徙又題準私鑄人鄰佑不分知情不知情枷號一個月責四十板徒一年康煕十二年覆準銷燬制錢者犯人與失察官員俱照私鑄例治罪雍正三年五月十七日欽奉上諭制錢乃日用必需之物務使遠近流通始便民用京師錢局每歲鼓鑄則制錢應日加增今雖不致缺乏聞各省未得流布民用不敷是必有銷官錢以為私鑄者且聞湖廣河南等省私鑄之風尤甚為此特頒諭旨著直隸及各省督撫申飭該地方官察訪查拏嚴行禁止毋使姦徒漏網倘稽察稍疏仍蹈前弊一經訪覺定將地方大小官吏分别從重治罪爾督撫不可視為具文當實力奉行嚴加禁戢可也私鑄治罪之例如何嚴定律條著三法司詳議具奏特諭雍正三年二月刑部覆準各省如有燬化小制錢者仍照康煕年間例治罪其該地方官若徇情者與本犯同罪不知情者亦照私鑄例降三級調用房主鄰佑不分知情不知情亦照私鑄例枷號一個月杖一百徒三年載入定例遵行雍正四年二月刑部等會議得私鑄不能禁絶應通行直隸各省嚴行曉諭經紀鋪户人等嗣後私錢不許攙和一文從前有收買者每錢一貫量給官錢半價貯庫報部雍正六年正月欽奉上諭雍正二年朕即諭李維鈞聞得直隸滄州地方有偷鑄私錢之匪類應嚴行查拏李維鈞回奏已經嚴查該地方並無私鑄保奏甚力今步軍統領阿齊圖奏稱本月內準內務府咨稱番役因公事前來滄州拏獲私鑄之回子劉七等移送前來隨差千總江進祿帶領番役前往滄州將私鑄之夥黨悉行拏獲並獲鑄錢器皿等語觀此則滄州姦民私鑄之弊由來已久而地方大吏漫無覺察今始敗露阿齊圖差官將匪類夥黨俱即捕獲不使漏網甚屬可嘉著將阿齊圖及所差官辨交部議敘番役著加賞賚其私鑄一千人犯交刑部嚴審定擬具奏夫私鑄錢文大干法紀且私鑄不息則錢法不能畫一而銷燬制錢等弊皆由此而生何以便民間之用此事大有關繫畿輔近地尚有此等姦民而各省遠方難保必無此弊著通行曉諭再嚴加申飭倘直省督撫中如有似此疏縱不肯實力查拏者朕留心訪察密差京官緝捕若一經察出必將該督撫照溺職例處分欽此雍正七年二月二十日户部奉上諭錢為國寶固貴流通以利民然必權衡輕重使得其平方能便民用而無囤積私銷之弊近聞馬蘭峪地方每銀一兩換大制錢一千零二十餘文又聞奉天及直隸數府亦然錢價過賤民間貿易之際物價必致損虧且恐姦弊從此而生著該督及奉天府尹嚴飭地方官通行曉諭居民市肆嗣後錢價每銀一兩止許換大制錢一千文倘曉諭之後仍有出於一千文之外者即將錢鋪之人查出治罪並著該部行文各省督撫轉飭各地方官每銀一兩所換制錢不得過於一千文之外俾民用便利而國寶流通以為經久平準之定則特諭雍正十三年十一月十八日欽奉上諭國家制錢關小民日用之需必使流通充裕方能足用阜民乃每年鼓鑄而錢不加多京城之中康熙錢文甚少此必姦徒暗行銷燬之故也我皇考惠愛斯民宵旰焦勞留心錢法屢頒諭旨嚴飭內外官員查拏代銷之弊而目下仍然錢少價昂則有司奉行不力顯然可見將此通行曉諭凡京城內外各該地方官務必密緝嚴拏勿稍疏縱倘仍視為具文發覺之日必將該管官重加處分不稍寬貸特諭浙江通志卷八十七
