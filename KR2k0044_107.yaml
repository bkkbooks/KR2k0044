body:
  text: 浙江通志卷一百八祥異上洪範休咎有徴春秋禨祥竝紀漢唐以來五行符瑞史不絶書而於凝承修省之道尚多畧焉盛朝景運郅隆浙省嘉祥疊見而聖心常懐乾惕不言瑞應特以天人相感之理宣諭臣民諄諄誥誡所以迓天庥而儆人事者至深切矣志祥異漢漢書天文志景帝元年正月癸亥金水合於婺女宋書符瑞志漢髙后景帝時㑹稽人朱仲獻三寸四寸珠漢書天文志建平二年二月彗星出牽牛七十餘日後漢書天文志永平七年正月戊子流星大如杯從織女西行光照地後漢書天文志建初元年八月彗星出天市入牽牛三度積四十日後漢書和帝本紀永元六年四月會稽大疫後漢書天文志元初四年九月辛巳太白入南斗口中後漢書天文志永建六年十二月壬申客星芒長二尺餘色蒼白在牽牛六度後漢書天文志永和二年八月庚子熒惑犯南斗後漢書天文志永和四年七月壬午熒惑入南斗犯第二星後漢書天文志熹平元年十月熒惑入南斗中三國册府元龜黄龍三年夏吴興野蠶成繭大如卵由拳野稻自生十月㑹稽嘉禾生宋書符瑞志赤烏五年三月海鹽黄龍見井中二宋書符瑞志赤烏十二年六月寶鼎出臨平湖八月癸丑白鳩見章安三國吴志五鳯元年十一月星茀於斗牛三國吴志太平元年九月壬辰太白犯南斗册府元龜永安三年三月西陵赤烏見是嵗得大鼎於建徳縣晉書五行志天璽元年呉郡臨平湖自漢末穢塞是時一夕忽開除無草宋書符瑞志呉孫權時靈龜出會稽章安晉晉書五行志泰康四年會稽彭蜞及蟹皆化為鼠甚衆大食稻宋書天文志晉泰康八年九月星孛於南斗長數十丈十餘日通志災祥畧泰康九年春正月會稽吴興地震宋書天文志晉永康元年五月熒惑入南斗宋書天文志晉永興元年九月太白入南斗宋書符瑞志永興二年白烏見海鹽通志災祥畧晉永嘉六年秋七月火木金聚於牛斗之間宋書符瑞志晉建興三年八月甘露降新昌晉書元帝本紀建興四年玉册見於臨安宋書天文志晉大興元年七月太白犯南斗晉書五行志大興二年呉興東陽無麥禾大饑晉書五行志永昌二年五月吴興大水通志災祥畧大寧元年夏五月吴興大水萬厯温州府志大寜元年初立永嘉郡建城時有白鹿銜花遂名白鹿城三年又有白鹿銜花止於固安之白巖山晉書五行志咸和元年十月己巳會稽大雨震電晉書五行志咸和三年九月二日壬午立冬會稽雷電通志災祥畧咸和四年秋七月吴興會稽大水通志災祥畧咸和九年春三月丁酉會稽地震宋書符瑞志晉咸和九年四月甘露降錢唐右鄉東巷栁樹晉書五行志咸康元年六月大旱㑹稽餘姚特甚宋書符瑞志咸康二年四月甘露降永興縣戊午降山陰縣又降武康縣庚申又降武康宋書天文志晉咸康二年九月太白犯南斗因晝見宋書天文志晉永和六年八月辛夘太白晝見在南斗通志災祥畧晉太和中六月會稽大旱災火燒數千家延及山陰倉米數百萬斛炎煙蔽天不可撲滅晉書五行志太和中會稽山陰縣起倉鑿地得兩大船滿中錢錢皆輪文大形至眀旦失錢所在惟有船存通志災祥畧太和六年夏六月吴興臨海大水晉書簡文帝本紀咸安二年三吴大旱宋書天文志晉寧康二年正月有星孛於女宋書天文志晉太元元年四月丙戌熒惑犯南斗第三星丙申又掩第四星通志災祥畧晉太元十一年春三月客星在南斗至六月乃沒晉書五行志太元十五年吴興長城夏駕山石鼓鳴晉書五行志太元二十年五月癸夘上虞縣雨雹通志災祥畧元興元年夏四月辛亥有流星起斗東北行到須女晉書五行志元興二年十月錢唐臨平湖水赤萬厯紹興府志義熈三年若耶山五色雲見通志災祥畧義熈八年春三月壬寅山陰縣地陷方四丈宋宋書符瑞志永初元年七月戊戌鳯凰見㑹稽山陰册府元龜元嘉三年閏正月己丑甘露降吴興宋書符瑞志元嘉十一年六月海鹽獲白烏以獻通志災祥畧元嘉十二年夏六月吴興大水宋書符瑞志元嘉十三年甘露降武康董道益家園樹宋書符瑞志元嘉十三年九月己酉會稽郡西南向曉忽大光明有青龍騰躍凌雲久而後滅吴興諸處並以其日同見宋書符瑞志元嘉十八年八月庚午㑹稽山陰獲白鳩眼足俱赤宋書符瑞志元嘉十九年四月餘杭獲白龜以獻二十年四月復獲白龜宋書符瑞志元嘉二十年七月吴興郡後池芙蓉二花一蒂宋書符瑞志元嘉二十一年十月己丑永嘉永寜見黄龍自雲而下册府元龜元嘉二十三年嘉興鹽官野稻自生三十許種宋書符瑞志元嘉二十四年四月白雀産鹽官民家七月乙夘木連理生諸曁㑹稽太守羊元保改連理所生處康亭村為木連里宋書符瑞志元嘉二十五年八月辛亥黄龍見會稽宋書五行志孝建元年八月㑹稽大水宋書天文志孝建二年五月乙未熒惑入南斗十月甲辰又入南斗册府元龜孝建三年七月庚午嘉禾生吴興武康宋書符瑞志大明元年二月己亥諸曁縣獻白麂通志災祥畧大明元年夏五月吴興大水册府元龜大明四年六月戊戌木連理生㑹稽山陰宋書符瑞志大明五年四月辛亥甘露降安吉乙夘又降烏程通志災祥畧大明七年浙江東諸郡大旱宋書符瑞志永光元年四月己亥白雀見㑹稽宋書符瑞志泰始元年嘉禾生會稽宋書符瑞志泰始二年八月丙辰四眼龜見㑹稽丙寅六眼龜見東陽九月烏程獻白烏宋書符瑞志泰始六年四月木連理生㑹稽宋書天文志泰始六年八月壬辰熒惑犯南斗册府元龜泰始六年九月己巳八眼龜見吴興宋書符瑞志泰始七年二月戊寅木連理生錢唐宋書符瑞志泰豫元年四月乙酉醴泉出山陰宋書天文志元徽三年九月癸夘太白犯南斗第三星宋書符瑞志元徽四年十一月乙巳甘露降烏程余山