body:
  text: 浙江通志卷一百八十二人物六文苑五嚴州府漢方儕嘉靖浙江通志新安人與弟儲儼以孟氏易自相講授儕為南郡太守封闗内侯儼為大都督俱以文學鳴於時唐皇甫湜唐書本傳字持正睦州新安人擢進士第仕至工部郎中卞急使酒數忤同省求分司東都留守裴度辟為判官度修福先寺将立碑求文於白居易湜怒曰近捨湜而逺取居易請従此辭度謝之湜即請斗酒飲酣援筆立就度贈以車馬繒綵甚厚湜大怒曰自吾為顧况集序未嘗許人今碑字三千字三縑何遇我薄耶度笑而酬之皇甫松嚴陵志湜之子工文詞著醉鄉日月三卷其大隠一賦尤為綺麗而得名在樂府宫辭章八元萬厯嚴州府志桐廬人大厯六年進士貞元中調句容主簿遷協律郎少従會稽嚴維學詩號章才子嘗於郵亭偶題數句維大異之遂親指喻數年充賦擢第其題慈恩塔詩元白名家深為歎異且謂不意嚴維出此弟子與郡司馬劉長卿更相倡和為名流賞鑒章孝標萬厯嚴州府志八元子元和中進士為山南道従事試大理寺評事初下第流輩都為詩以刺主司孝標作海燕詩獨存忠厚侍郎庾承宣輾轉吟諷卒以受知李紳鎮揚州請孝標賦春雪詩命題於臺盤上索筆一揮深得風雅之㫖無題一篇張為取為主客圖時人為之語曰前有八元後有孝標方干孫郃方干傳新定人字雄飛父肅舉進士章協律八元美其詩以子妻之干為詩髙堅峻拔秀仙蕋於常花鳴靈鼉於衆響咸通乾符廣明中和間為律詩江之南未有及者始舉進士與同舉者謁錢塘太守姚合姚覽詩駭目變容獨館之數日一舉不得志遂遁於會稽漁於鑑湖文徳間卒後進相與謂之曰𤣥英先生徐凝萬厯嚴州府志分水人與施肩吾同時舉進士官至金部侍郎始白樂天刺杭時以開元寺牡丹詩受知既而與張祜較藝祜甘自屈白公解送以凝為元其縉雲一詩後来無敢題者漢宫曲段柯古錄之題襟集中其詩心悰𤣥逺閒澹孤清翛然自得於言外章碣萬厯嚴州府志孝標子乾符三年進士有集一卷行於世其東都望幸詩膾炙人口至如焚書坑一絶就題翻意深得風人雅致敖清江英深取之何希堯萬厯嚴州府志字唐臣分水人施肩吾之壻號常歡喜居士詩集行於世而以樂府名家其采蓮曲栁枝詞咏海棠等作神采既融情景俱到天才流麗節奏琅然氷清璧潤擬之肩吾何愧五代章魯封十國春秋桐廬人頻舉進士不第有雋才少與羅隠齊名武肅王既破董昌辟為表奏孔目官累遷蘓州刺史著章子三卷行世宋邵煥兩浙名賢録淳安人英年挺秀精藻逼人七嵗時隨父兄應舉時郡方建譙樓題詩於壁援筆而就郡守杜唯一竒之奏令赴闕真宗以其年幼賜帛遣歸咸平三年十嵗復以童子召赴闕令賦春雨詩文不加㸃是年登進士第除正字命於祕閣讀書常引之入宫令賦睡宫娥詩煥應聲云玉腕枕香腮荷花藕上開乃命就職官至金部員外郎胡楚材夀昌縣志字公喬慶歴中登進士第授廣徳儀真判官再調嘉興幕數以剛直忤權貴官至祕書省校書郎遂退居有勸之仕者答曰仕進易行道難仕而不得伸其志雖椽而有愧於心君子不為也即黙山構堂以琴酒棊釣自適善屬文尤長於詩邑山水皆有題詠落筆不類宋調方仲謀萬厯嚴州府志字公輔淳安人仁宗朝登進士第為歙州推官擢大理丞累官殿中丞秉性貞介而文采蔚然所著有雉山集贏二十餘卷其為詩不事雕鏤而聲律渾厚絶無纎穠華媚之態吴儔嚴陵志字子友建徳人幼穎悟讀書五行俱下熙寧初中賢良方正直言極諌科和平門内其讀書樓雙臺在焉盖自皇甫湜後三百年問儔始復中制科方元修嚴陵志字時敏桐廬人幼有詩名政和初審察監大觀庫後通判濬州嘗同吕居仁趙才卿入大名幕其詩善鍛錬視𤣥英差無愧初見梅花云北枝風力顧不早東閣詩情聊一新尤為人所誦方誾萬厯嚴州府志字彦和淳安人年十八詣鄉舉與兄閎弟聞同受業太學每試必迭為之魁徽宗幸太學特賜進士出身厯右文殿修撰至金紫光祿大夫以足疾乞歸髙宗御書杜詩四首及龍亭居士號以賜之閎為朝請大夫判南京國子監方聞嚴陵志字彦直誾弟年十五詣鄉舉徽宗幸太學賜䇿問得所對御書詞翰俱優四字遂賜釋褐上美之曰兩浙三方天下無雙盖與誾閎兼稱之也厯太僕少卿至銀青光禄大夫王昇嚴陵志字君儀建徳人博洽多識尤邃禮易家居不仕以山隂陸佃薦特起於家遂厯禮官晚以徽猷閣待制還鄉里卒年七十九滕岑萬厯嚴州府志字元秀桐廬人紹興中與陳塤相倡和其佳處自謂髙視大厯十子所作詩凡三千首多警句宋景濓序睦州詩派岑與焉方有開嘉靖浙江通志字躬明淳安人少倜儻有大志為國子録輸對論吴蜀偏重荆襄居中為用武之地因上聨形勢講攻守闢田疇建宿衞四篇孝宗大悦轉司農丞再對論規模荆襄宜講屯田為大計後運判淮西復著屯田詳議三十二篇以獻當國者沮之有奏議五卷詩文十一卷朱文公嘗為書萬溪書堂四字故自號溪堂云王日休萬厯嚴州府志分水人登紹興五年進士第授朝請郎嘗著九邱總要三百四十卷以進光宗嘉之進官一秩遷朝奉大夫洪夢炎萬厯嚴州府志字季思淳安人寳慶元年進士端平間禁軍搆逆命夢炎撫諭既受㫖索飲至醉卧省廡下徐以單騎入軍或引斧砍其導卒血濺衣而色不為動曉以逆順皆安堵聽命㑹髙沙軍變命夢炎綏之至維揚閫帥趙葵詭以指日可破夢炎曰攻討者制閫之大義撫諭者天朝之至恩殊恩曲赦非愛閧卒愛百姓也遂入城宣詔進叛酋開以自新之路一軍以安尋以大宗丞賛浙幕召拜司農差知衢州卒於任有文集二十四卷奏録三卷髙沙撫録荆襄語藁各一卷行世黄蜕嚴陵志字新之淳安人號警齋淳祐七年廷試進士第二方逢辰賀之蜕答云欲與狀元留地位先将榜眼破天荒次科逢辰果状頭蜕學博而正著作不留稿人得其片紙隻字必珍藏之自建昌軍僉判遷大理卿所至以文學知名未㡬歸老於家卒學者祠之於石峽書院弟宗仁字榮甫淳祐進士累官司農少卿亦多著書許繼先嚴陵志淳安人家貧力學淹貫經史咸淳問以春秋領鄉薦仕至宣教郎祕書省檢閱文字郭頤萬厯嚴州府志字養正夀昌人少孤貧力學従吕成公遊魁南省登進士甲科精於易通數學仕終軍器監主簿築室於所居之南號固齋讀書其中屢空晏如也吴攀龍萬厯嚴州府志字元登淳安人刻苦問學文聲藉甚登咸淳元年進士第任饒州安仁主簿少與方逢辰何夢桂為同門友嘗見器於趙白雲為大書齋扁曰愛敬又曰晉齋何景文嚴陵志字俊翁潜齋徙子同受學訥齋又同年登第御賜一聨云一門登兩第百里足三元以黄蜕榜眼方逢辰状元及夢桂探花為三元也初授合肥簿遷監行在文思院學問卓絶後進師之江自明萬厯嚴州府志淳安人學問博洽時稱江六經撰禮林義林合四十卷翁夢得嚴陵志字景説夀昌人唐詩人洮之後通春秋端平咸淳兩中詞科尋隠居敎授所著有春秋指南一卷摭實二卷要論十卷紀要十卷盤珠纂論十一卷地理總括若干卷並行於世鄭侍中萬厯嚴州府志字元璋夀昌人博學善屬文明五經兼通子史以漕試得舉見宋鼎将移浩然有遯世志研精覃思作春秋指迷詞㫖髙逺邵桂子鮑楹雪舟詩序青溪邵桂子字徳芳太學上舍登咸淳進士任處州府學教授宋運訖錄解組賦歸避地雲間贅曹氏居泖湖之闕溪嘗瀕湖構亭名雪舟著𫐠其間有脞稿十卷脞談二十卷皆以雪舟名之預為生壙號曰元宅著元宅七銘後七銘續七銘别七銘凡二十八事摹周易作忍黙恕退四卦汪斗建萬厯嚴州府志淳安人宋末遺老也嘗為學官隠居不仕其詩大有聲律號雲留小藁元洪震老萬厯嚴州府志字復翁淳安人延祐中領薦與時相書言詞鯁直士論韙之未㡬棄官隠石壁峯下著有觀光集日以吟詠為事其詩氣格昻然不落卑調詞鋒艶發覽物品游往往超脱夏溥嚴陵志字大之淳安人明易象春秋之學為文雄深簡古領至治三年鄉薦為安定書院山長轉隆興教授新安趙汸嘗問及詩法溥曰子之鄉先逹所謂格欲髙而律貴熟句欲圓而意貴新者真名言矣其教授豫章嘗従虞集遊集喜其詩自成一家稱為夏體汸嘗言夏先生詩似楊誠齋盖黄陳詩出老杜以格髙為宗至誠齋又稍變其法夏亦自杜而變者也何正嚴陵志字守中分水人至順間應薦授鰲川書院山長轉寧都下河巡檢尋棄官歸號雲壑道人能詩初被薦時試以詩二首人争傳之方子京萬厯嚴州府志分水人隠居山林至正間應薦起試以鑑湖風月詩時試者百餘人惟子京擢居前列除嘉興路教授致仕歸吴暾嚴陵志字朝陽淳安人八嵗能詩文不屬稿而成泰定間登第出丞畨陽時邑賦雲南葉金民患之暾言於朝始得輸常金民賴以甦厯轉峽州路經厯未㡬歸授徒講學従之者户履雲集若方道叡輩皆其門人所著有齊城集麟經賦并詩文二十卷李文兩浙名賢録桐廬人博學以能詩鳴與楊鐵崖宋溪相友善庫庫子山深器之江浙行省檄為桐廬主簿辭不就遂與吴立夫游金華山中飄然有物外意竟以詩文終所著有近溪集明徐􅷂青溪詩集傳字仲由淳安人幼頴敏日記五千字及長博習經史百家之書善屬文鄉里推為祭酒洪武初辟教邑庠三年自免去已詔徴秀才强起之至省力辭而歸號巢松病叟葛巾野服優游山水間以詩酒自放有巢松集徐尊生嚴陵志字大年淳安人七嵗能詩十五善屬文諸書靡不淹貫洪武初以遺逸舉與修元史竣事俾編禮書修日厯時翰林學士承㫖宋濂乞致仕上問卿歸孰可代者濂以尊生對乃拜翰林應奉草制悉稱㫖尋以老疾歸所著有春秋論一卷制誥二卷懐歸還鄉等稿二十卷汪一初兩浙名賢録字陽復淳安人少嗜學以詩文鳴洪武庚子守将薦之朝上方觀書命作詩立賦以進有花影上堦春滿地讀書餘暇問蒼生之句即命以白衣侍講踰月授儒學提舉尋以親老乞歸庚申復召見對䇿第一擢太常寺卿辭不就遂命白衣巡撫山西卒於潁川邵亨貞列朝詩集傳字復孺嚴陵人徙居華亭卜築溪上以貞溪自號博通經史贍文詞工篆𨽻入眀為松江府學訓導卒年九十三有蛾術文集十六卷蛾術詞選四卷後附學菴古詩一卷其子伯宣所作俞深嚴陵志字景淵桐廬人洪武中領鄉薦為汶上教諭陞建寧府學敎授學問該博為文章雄邁髙古有奇氣累校文衡所至得人性淳謹不遺小節詩多警句自號聽松老人著聽松集汪改萬厯嚴州府志字遷善桐廬人洪武中領鄉薦授丹陽縣教諭獻三䇿於朝深切時務陞臨清丞永樂改元棄官歸自號桐山歸牧以吟咏自適性行端潔不溷流俗晚好神僊年八十餘㸃校丹書不輟詩文取逹意不事雕繪𩔖其為人方定萬厯嚴州府志字志安淳安人博學善吟詠洪武間領京闈鄉薦分教東平州轉海州預修永樂大典遷長泰縣學諭所至造就有方著止軒集行於世方萬厯嚴州府志字宗源淳安人贍詞藻以太學生授蒙城令一以愛民為主其㕔事四壁徧書先正格言以自警秩滿引年卒於家所著有龜鶴山人吟稿二卷貽哂稿三卷章芸萬厯嚴州府志字振芳桐廬人由貢厯河南崇府紀善值世宗南巡獻詩稱㫖遷本府長史敦尚風節多輔導功進四品階遂歸所著有崇藩疏稿琴山雜詠吴世良遂安縣志字叔舉英慧磊落於書無所不窺走筆千言立就嘉靖戊戍進士知長洲縣改國子監博士厯廣信府通判性濶達不治生産亦無意身後名賦詩縦酒千金立散卒以氣豪迕俗没之日家徒四壁所撰詩文甚夥散佚不存商汝頤萬厯嚴州府志字景貞淳安人宏治三年鄉薦累官湖廣叅議幼嗜學為文精宻淵巧綽有姿態其詩覃思逺詣如素障子雖無爛目之華欲摘其瑕亦無下手處程文楷萬厯嚴州府志字守夫淳安人穎敏好讀書督學吴伯通奇其文擢冠兩浙領宏治五年鄉薦與王守仁林庭㭿友善賡和盈几為一時所稱著有方文集松柏稿春崖雜稿方寛夀昌縣志字敬敷以拔貢授寧徳縣令未㡬歸博聞廣見嘗著嚴陵賦櫽括一郡山川人物典麗雅贍其楓麓摘稿出入晉魏時以懐抱發揮於文字間落落自異吴御萬厯嚴州府志字一龍夀昌人少孤力學為名諸生以貢授膠州訓導著海運策陞福州府教授纂八閩通志校刋十三經注疏日與生徒講理學於道山書院尋以疾歸國朝姜燮鼎舊浙江通志字理夫遂安人鴻臚卿習孔之子性恬澹無紈綺習晚當循次貢於廷毅然棄去嘯咏山水間與兒童樵枚笑語竟日顯貴至門即避匿不見所著詩沖澹雋逸逈出塵表多隨手散佚好事者得一二藏之裒輯成帙名髙山集方象瑛鄉賢留祀册字渭仁少傅逢年孫九嵗能詩十三作逺山浄賦康熙丁未登進士以中書舍人分校戊午京兆試會舉博學宏詞試入髙等授翰林院編修纂修眀史癸亥典試蜀中盡心甄錄不茍充賦蜀士蒸然一變尋請歸里不復出苞苴竿牘一不至於門遇有利弊則嶽嶽言之卒之日闔邑建思賢祠於城南著有健松齋前後集行世毛際可遂安縣志字會侯號鶴舫順治戊戍進士授彰徳府推官㢘眀不阿有連奇才者殺人巧脱感風折庭槐之異讞實抵罪寜陵盗犯房有才等十三人已奏當大辟力奏白其寃釋之改商城令修湑河五門堰溉田五百頃再補祥符如故操尋以博學宏詞薦既試罷歸閉户著書文名馳四逺晚構問字亭以汲引後進所著有安序堂文鈔浣雪詞子士儀官思南府太守士儲官冀州知州方韓鄉賢留祀冊字若韓一字佐平負雋才跅弛不覊至取予大節介如也遇公正輒發憤康熙乙卯鄉試以籌閩策為主司徐秉義所歎賞従乙卷中甄㧞之明年成進士選入史館文名走海内尤善為古文議論證據鑿鑿氣勢如絶壁天懸騰波迅急壬戍為會試同考官歴左中允卒方士頴周起渭方士穎傳字伯陽淳安人祖尚怐萬歴癸丑進士官湖廣按察司副使父一鑣嵗貢生士頴就外傅即學為詩研揣聲分天然獨得顧不令父知也年十一就試歸父檢其行笈得詩一章中有句云野渡舟難覔沙汀客屢呼乃以手鈔杜詩一帙畀之於是益大為詩士穎詩雅潤為本遇象能鮮風流趣好論者謂不減中唐錢劉輩其長篇指事𩔖情鋪陳終始如白公諷諭諸篇老嫗可解也尤妙楷法賞其文者并其書以為雙絶著有偶存詩六卷賦二卷駢儷雜文三卷𩔖鈔五十卷以睦州詩派之無存也次第排纉為嚴陵詩選以補續之甫成二十四卷而卒士頴事親以孝聞當甲寅乙卯間山賊竊發居民四竄其父晚失明士頴洄沿登頓輙負之以趨父卒士頴年已六十裒踊如孺子慕者温州府宋林幹傳詳隠逸曹逢時温州府志字夢良樂清人少従鄭國材學易工文詞與王十朋劉鎮齊名以太學優選知臨江紹興丁丑中第授嚴州司户通練若素宦憲使王傅俾為牋表授簡累數百文無停筆所措畫皆出人意表陞福州教授卒初王十朋欲薦逢時以自代限於制弗果兄應時游太學亦有名萬庚萬厯温州府志字先之樂清人善詞賦太學興首中優選紹興甲戍上舍釋褐授全州教授清湘士子稀少庚至郡丐増廩餼以養士郡将異其才俾兼攝幕職為文雄深雅健湖南諸郡碑碣必屬庚撰述改洪州録恭虞允文入相王十朋貽書薦之擬除學官名未上卒陳堯英葉適陳堯英墓誌字秀伯平陽人少有大志紹興六年上書登聞陳策十二明年再上清朝政序亦十二語益切三日復上兵書指畫利害尤急髙宗異之令政事堂召問書語侵中書執政固不喜至召問長揖色倨論事泉涌不屈執政愈怒奏罷之後七年始入塲屋對䇿猶抗言如故以是無所合而卒林之奇平陽縣志字偉卿紹興中登進士授静江教授著史評千餘篇與同年福塘林少穎同姓名俱有聲文學潘翼温州府志字雄飛其先青田徙樂清貫穿諸子百家凡禮樂制度傳注箋疏雜説靡不淹通明天文作星圖證騐著九域賦山川里道若親厯括隠僻字補注篇韻遺漏辨爾雅本草名物訓釋舛誤尤工古文王十朋自少従游每歎不能竟其學後将編次其書刻之泉南會召不果陳季雅兩浙名賢録字彦章永嘉人氣質超邁自髙其才不樂師授與人持論無所降州将讀其書遒熟如素構往往有新意出人表遂薦髙等登淳熙第為隆興教授轉潭州未上益閉門盡抽古今文字且誦且索務為周覽鉤得其要著有兩漢博議等書鄭邦彦温州府志字國材樂清人學綜經籍政和初入京學月書連占五魁選兩學生欲一識其面不可得席益帥湖南辟為内幕趙鼎當國益薦之授婺州學官篤意講肄士多矜式焉王綽永嘉縣志字誠叟有氣節葉適畏友也薦充編校不就所著有春秋傳記及雜文王自中葉適王自中墓誌字道甫平陽人岸谷深厚山止時行所厯雖知名勝人或官序髙重逆占其無憂當世意直嬉笑視不與為賓主禮一日赴丞相坐有餽鹿至請賦之韻得方字朗吟曰世間此物多為馬寶匣還宜出上方相懐愠客惶恐不自得自中神色不異以此不悦於流俗每應試皆陳實策無一語𩔖時文或笑曰此劄子也然竟得乙第王藺薦於上得召對官籍田令以蔣繼周疏罷光宗朝知信州復召以王恬疏罷知邵州以謝原明罷知興化軍以髙文虎罷竟死陳同甫稱其韓筋栁骨筆研當獨步自謂不能及也盧祖臯萬厯温州府志字申之永嘉人登慶元第嘉定中以軍器少監直北門時慶澤孔殷綸言沓布祖臯抒思泉涌號為稱職工樂府詞意清逺江浙間多歌之有蒲江集潘檉温州府志字德久永嘉人以父任補右職繼恭戎幕召試為閤門舍人授福建兵馬鈐轄卒喜為詩下筆立成聲名籍甚永嘉言唐詩自檉始有轉菴集趙師秀兩浙名賢錄字紫芝永嘉人登紹興第浮沉州縣僅一改秩而卒自乾淳來濓洛之學方行諸儒𩔖以窮經相尚詩或言志取足而止固不暇如昔人體騐聲病律吕相宣也潘檉出始創為唐詩而師秀與徐照翁卷徐璣繹尋遺緒日鍛月鍊一字不茍下由是唐體盛行師秀詩名天樂集徐照葉適徐照墓誌字道暉永嘉人自號山民嗜苦茗上下山水穿幽透深拾其勝會有詩數百斲思尤竒皆横絶歘起冰懸雪跨使讀者變踔憀慄肯首吟歎不自已發今人未悟之機囘百年已廢之學使後復言唐詩自照始亦一快也翁卷温州府志字續古一字靈舒樂清人詩名西巖集一名葦碧軒集徐璣温州府志字致中一字靈淵仕長泰令工詩名山泉集自趙師秀以下四人號永嘉四靈館閣有四靈集周學古兩浙名賢録字會卿行已孫也兩薦漕闈不第遂息意塲屋以風雅自娱葉適序之云周會卿與潘徳久齊名徳久漫浪江湖吟不擇地故所至有聲會卿嘗閉户讀書盤摺生語有若天設徳久甚畏之居謝池坊窟山宅水自成深致其家集零落十數紙然一榦之蘭芳薌出林豈紛然桃李所能限斷哉趙汝囘萬厯温州府志字㡬道永嘉人登嘉定第終主管進奏院名重一時興髙吟苦自成一家従其學者多知名薛師石温州府志字景石弼曽孫卓犖有大志築室會昌湖上與友酌古今談筆墨善楷及篆隸書名家碑碣不得師石書為憾有𤓰廬集趙汝迕樂清縣志字叔午以詩名登嘉定第簽判處州嘗賦詩有夜雨梧桐王子府春風楊栁相公橋之句史相開之怒左遷淪落而卒趙崇滋兩浙名賢録字澤民永嘉人登嘉定第調嚴州司户尚氣不屈每與守諍守降意下之同年生多居要津不肯附麗以求速化工詩優入騷人閫域善筆札每興到拂紙援毫頃刻成數千言曵金玉而走龍蛇觀者神駭名重一時趙善得温州府志字季清永嘉人登紹興第厯忠州判官文思泉涌下筆輒千言嘗曰今人不能道古以胸次不如古人豈惟不能道古亦不能鋪今盖有四難意難濶閫難廣情難寫心難公又云作文如下黒白子有眼者勝閱文如閱好山貴起伏多也王奕瑞安縣志字子陵研貫該博杜門著書不求聞逹淳祐間有㫖下州索所著書太守趙汝騰為繕進且薦之朝奕竟不應所著有六經語孟説中庸本義周禮答問成周大事譜西漢通志補正漢天文志釋漢地理志復漢錄武侯遺事多識録薛據温州府志字叔容平陽人淳祐間臺省交薦賜出身嘗為天保采薇末議二卷又采諸子百家稗宫緯紀之書輯孔子集語二十卷摭古今輔相經濟之業為宅揆成鑑二十二卷景定元年史館劉克荘謝子强上之敕付祕書省李君錫温州府志字宗禹永嘉人博綜經籍援筆成章尤精於禮登寶祐第厯遷諸王教授司農丞時禮經自王氏倡新學訓詁皆穿鑿君錫學正而博由是擢太常丞除直祕閣有雜稿錢敬直葉適錢敬直墓誌字敬子永嘉人紹熙元年試禮部第一以祧廟諱改名易直字季荘以教授入為太學録博士太常博士祕書著作佐郎卒易直十嵗能通禮春秋三傳以其意作塲屋文字機縦開闔腴澤粹好長老之有聲價者反愧之稍長學知古人統緒則歎曰時文不足為矣積書自繞繙研覆精必以已所自到者為是由是雲蒸川流筆態横生膏潤氷釋義理溢發性沉宻不輕用所能人羣居論難紛起獨不出一語至在奉常乞為范祖禹諡正獻有内侍得㫖賜諡者拒弗為諡人始知其能陳義憤激蓄而後發云潘希白温州府志字懐古永嘉人入太學有文聲登寳祐第幹辦臨安府節制司早學詩於趙汝囘復工樂府俱著稱於時卜築栁塘極山水之勝一時文會名流咸集焉宋慶之永嘉縣志字元積文詞典贍登咸淳第監慶元府鹽倉辟浙東庾幕著飲氷集林一龍温州府志字景雲永嘉人在太學不就月書以求捷進登咸淳辛未第累祕書郎兼説書性直諒樂道人善工古文有石室文集梅時舉温州府志字舜臣永嘉人精於史學著通鑑新議剖析精微多前賢所未發陳聖元萬厯温州府志字道翁永嘉人天資穎秀善聲律工駢麗早貢於鄉築文峯樓與朋友徜徉其間賦詠自適胡芳平陽縣志字秀實九嵗黙誦九經與弟荂聨中神童科真徳秀竒之其學尤長於春秋魁鄉薦會試下第不復出積書數萬卷自娱晚薦入史館致仕年六十餘讀書不輟林千之平陽縣志字能一右庠賜第改文科厯南康江隂教授累樞宻院編修知信州明敏博洽工文詞為江萬里所知家藏圖書法帖甚富鑒裁精宻有雲根癡菴集元曹楨孫温州府志字徳堅瑞安人自少工文嘗謂人曰作文譬如立萬人塲中非劃然大囂而鳴人肯聽我乎宋亡寓居平陽梅溪以詩文自娱几一篇出人輙傳誦生徒數百人曹理孫瑞安縣志字悦道博涉經史談性命道徳之㫖粹然成章郡守趙鳯儀延至學宫模範後進立教嚴而有法尤善古文得韓歐家法著有心逺齋筆記讀書史要畧𩔖編杜詩訣汪鼎新温州府志字進卿平陽人少孤自樹立眀周易尚書尤工詩文著有桐陽稿官平陽州教授章嚞温州府志字春谷平陽人為永嘉教諭大徳元年颶風海溢浙東僉憲完顔貞浙閫都司鮮于樞按勘嚞作風潮賦上之因交薦於朝授國史院編修官嚞詞采雄㧞至大延祐間凡兩修郡志李孝光元史本傳字季和温州樂清人少博學篤志復古隠居鴈蕩山五峯下四方之士逺來受學台哈布哈師事之至正七年以祕書監著作郎召見於宣文閣進孝經圖説帝大悦賜上尊陞祕書丞卒於官孝光以文章名當世其文一取法古人而不趨世尚非先秦兩漢語弗以措詞有文集二十卷髙眀元詩選傳字則誠平陽人至正五年中第授處州録事辟丞相掾方國珍欲留置幕下即日解官旅寓鄞之櫟社沈氏樓因作琵琶記記成几上二蠟炬光忽交合因名曰瑞光樓明太祖聞其名召之以老疾辭所著有柔克齋集東海趙汸稱其學博而深才髙而贍云髙守奎温州府志字應文永嘉人讀書得言外意不錮師説於古今世故靡不窮究方明善據郡遂避地去文章感慨有荼薺齋集鄭東鄭采元詩選傳東字季眀號杲齋平陽人再踐塲屋不合主司程度遂棄去大肆力於古文詞日試萬言滚滚不休歐陽元功奇其才欲薦之會卒弟采字曲全名亦相埒遺文合釐十四卷曰鄭氏聨璧集宋濂序之以為杲齋之文氣質沈雄如老将帥師旗鼓紛錯咸歸節度曲全之文規製峻整如齊魯大儒衣冠偉然出言不煩曲盡情意皆有臺閣宏麗之觀而無山林枯槁之氣也張天英元詩選傳字羲上永嘉人酷志讀書二十年穿貫經史徴為國子助教性剛嚴不好趨謁再調不就遊浙西多居吴下與玉山主人顧仲瑛相友善肆為詩章尤善古樂府馳驟二李間自號石渠居士陳允文温州府志瑞安人性耿介每慕徐孺子陶靖節為人乃盡取陶詩和之與人交無町畦望之知為佳士嘗醉坐樟松橋臨流歌咏飄然物外年八十終吴子美温州府志字世英泰順人博通古今善吟咏所著怡情集多出性情之正詠史諸作卓有監戒薛漢元詩選傳字宗海永嘉人為諸暨州學正始擬北郊制宫懸上之泰定元年選國子助教赴教上都於古今制度名物創作變易年考月究無或有爽趙文敏號為鴻識得古遺器書畫必令辨之乃定魯子翬稱其詩律書楷嚴縝有法而慎慤不矜非雅交莫克知也陳髙温州府志字子止平陽人至正進士授慶元録事轉慈溪尹皆有聲末㡬方氏起乃浮海過山東河南謁王太傅論江南虛實安危其言娓娓王欲官之辭不受尋卒其為文上本遷固下獵諸子詩遡漢魏齊梁以下弗論也自號不繫舟漁者蘓太守序其文明林温萬厯温州府志字伯恭永嘉人元季以春秋魁鄉薦文名傾海内洪武初授秦王府教授典閩浙二省鄉試宋濂稱其詩文本於氣之所養與世之學詩者自異著有栗齋集余堯臣温州府志字唐卿永嘉人早以文學著元末客會稽越帥院判邁盖卿恭政吕珍羅致幕下與有保越功薦剡交上無意仕進即越之桐桂里治團結茆署曰菜薖已而入吴居北郭與髙唘張羽等為北郭十友洪武二年授新鄭丞尹道遜温州府志字克誠瑞安人七嵗工書永樂中以竒童應薦歴官太常卿致仕居官五十餘年囊槖蕭然日以詩畫自娱與吴祚蔡鼎結清樂會倡和吟詠年踰耄耋卒有太極心性圖説歸田百詠孫華列朝詩集傳字元實永嘉人僑居華亭年十三郡守課諸生春隂詩操筆立就落句云栁花只在斜陽外不肯分明過小橋守大竒之誦經考史以博雅聞尤好岐黄家用薦為醫學教授辭免戴折角巾衣鶴氅衣望山臨水步􅓏翛然所居小閣列古彛鼎法書名畫焚香静坐終日書非佳墨熟紙不作飲饌非精潔不食士非賢不與交卒年八十餘鄭繹樂清縣志字廷韶登浙省鄉薦心濂洛諸書為文期臻秦漢而詩宗李杜舉進士不第留太學前後積二十載所講授諸生去而成名者凡數十輩後通判九江長沙二郡卒官舍蕭然寒士莫及也有詩文二集學者稱豫齋先生周旋分省人物考字中規永嘉人正統丙辰進士第一擢修撰厯左庶子尋卒旋為弟子員即刻苦於學既在選首遂日夜進學不厭為文耻襲陳言務出已意每日引滿三數行索筆千百言立就汗漫演迤理致泓然求者接屨於户而應之常若有餘有集若干卷周令瑞安縣志字巽之幼工楷法郡守項澄以竒童薦為翰林秀才宏治戊午會脩累朝實錄授直祕書厯官太常卿通政使出入禁闈六十餘年始終恭慎朝論重之著有志善集周綱樂清縣志字時立家貧嗜學分教清江轉信豐所著有周禮補遺左氏觸璜等書學者稱玉臺先生項喬温州府志字遷之永嘉人嘉靖己丑會試第二由郎署出守撫廬河間三郡厯湖廣福建藩臬終廣東叅政仕宦二十餘年所至多善政平居未嘗一日廢書研窮理奥有所獨得輙劄記以自鏡為文不事險棘靡艶著有甌東文錄政録方繼學平陽縣志字一敬燧曽孫始習舉子業不售棄去涉獵經史百家所著有五經辨疑河圖衍輯鄉先哲文行為江南文獻輯兩浙名人詩為浙音會畧又欲行鄉約正䘮禮時稱西堂先生王健温州府志字偉純永嘉人嘉靖戊戌進士授刑部主事改禮部知制勅擢祠祭儀制二司郎中恭定樂律及調處宗藩章疏娓娓時論推之陞南光禄少卿卒於官操履清謹詩文典則雅馴尚論者稱為金玊君子著有應制録鶴泉集侯一元樂清縣志字舜舉年十三父廷訓以大禮繫詔獄伏闕再上書陳寃状都御史唐龍竒之出其父舉嘉靖戊戍進士授南刑部主事積遷江西左布政使所至有恵政解官林下闢園榭日携客登臨倡咏二十餘年文章稱名家居恒荘肅雖盛暑不袒露與人素狎亦未嘗有惰容孝友樂施凡親而貧疎而賢者悉周之所著詩文二十卷康従理静志居詩話字裕卿永嘉人任俠好談兵間闗戎幕劉子髙建纛毘陵病革従理馳赴與訣經紀其喪扶其柩至武林逺近義之居燕偕黎惟敬游西山其倡和詩尚存餘多散佚太倉曹子彦收而刻之曰二鴈山人集王應辰温州府志字拱甫永嘉人少慧負奇氣父好積書應辰徧取諸書日誦之不問家人生産詩文卓然名家所著有正情集㫖苕齋詩話葉耿平陽縣志字純仁少為諸生領䄂通尚書春秋詩賦文翰搦管便就従游者多知名士所著有尚書翼訓春秋要畧越東樵語劉康祉温州府志字以吉永嘉人萬歴庚戍進士任南司馬曹感時事作窽言上之熹宗朝改禮曹定朝鮮之議續康節之祀於時政多所匡禆出督山右學政厯兩廣憲臬晉右轄平生手不釋卷自經史百家以及稗官野乘咸丹鉛評㸃有識匡齋集行世戴宗璠戴宗瓛温州府志宗璠字瑞喬永嘉人弟宗瓛字瑞洲俱擅文名宗璠以貢授學博萬厯間與修温州府志宗瓛亦以貢任錢塘學諭尤精詞翰著名吴中時人稱為二戴姜準温州府志字平仲永嘉人博綜羣籍尤悉甌中典故著書二十七種時稱艮峯先生林應龍萬厯温州府志字翔之永嘉人精篆隸擅文學以不能淟涊權貴久淹印局大使所著有雅詞補義文説字海棊史傳於世處州府宋管師復傳詳隠逸葉濤崇禎處州府志字致逺龍泉人熙寧進士以文章見褒於神宗仕至翰苑以徽猷閣待制致仕徙居白下與王安石蘓軾相友善倡和甚富鮑慎由東都事畧字欽止龍泉人舉進士少従王安石學又嘗親炙蘓軾故其文汪洋閎肆而詩尤髙妙徽宗召對除工部員外郎厯廣西淮南轉運判官又知海州卒嘗注杜詩有文集五十卷鮑剛嘉靖浙江通志字弱翁括蒼人善屬文尤長於詩舉進士不第即毅然曰此非吾所學也徜徉於東南山水間俗事畧不闗意同時陶弼以詩名少許可得剛所作以為出已上願得為友剛亦雅聞弼因徒步歸之初剛與吕恵卿善熙寧中恵卿恭知政事欲用剛剛即日出京祝顔括蒼彚紀字景深麗水人大觀中舉八行貢入太學三年以舍選登進士嘗試孟軻勇於義賦膾炙人口時號祝孟軻終宣義郎詹乂括蒼彚紀字持國縉雲人以文學著北使至每問曰詹乂尚在否盖以乂為义也累官兵部尚書給事中歴仕四朝静正忠鯁為時所忌力丐休髙宗時進端明殿學士主管洞霄宫歸後髙宗語執政曰詹乂文章泰山北斗欲大用之屢召不起卒諡惠安田君右縉雲縣志字良臣幼習舉子業嘗一舉不合時文尺度遂隠居著書有太極通書説易春秋管見性理七篇河圖洛書太衍揲著太𤣥準易説恭同契辨律吕天文地理精考諸史𩔖考共若干卷蒋存誠嘉靖浙江通志字遂明青田人好學工文詞登崇寧五年進士厯官國子祭酒知饒州著國子先生集林越括蒼彚紀字伯仁龍泉人登紹興二十一年進士監行在諸司審計司平生學力深於漢史撮其文附以訓詁五十篇名曰漢雋葉禔括蒼彚紀字天祺麗水人問學該博文詞典贍任上饒縣簿馬光祖守建康辟至幕府多所賛畫梁椅華登雲朱天民吴梅皆出其門葉夢登舊浙江通志字天游麗水人博學多識以文學鳴嘗哀輯諸儒論史精語為一編名曰通鑑發揮中景定三年進士為安吉州教授葉謙亨括蒼彚紀字伯益青田人以文章藻繪為士林推重累遷起居舍人兼權中書終浙西提㸃刑獄所至有聲文集五卷外制二卷奏議一卷何俌兩浙名賢録字徳輔龍泉人以進士教授紹興時方與金和好俌裒少康周宣王漢光武晉元帝事可施行者為中興龜鑑上之乾道間以集英殿出知廬州上賜詩祖餞有奏議内外制西漢補遺大學講義若干卷鄭克已舊浙江通志字仁叔青田人登淳熙進士性清逸有晉宋人風範詩自成一家嘗云自是隆興新體製原非大歴舊詞章官至福建提刑司幹官朱筠括蒼彚紀字仲端青田人甫冠以詞賦魁鄉薦繼游上庠中特奏名第二人湯岐公一見奇之命子碩受業内翰李巘時亦従游除蘄春監卒有竹軒小集胡份舊浙江通志縉雲人文章氣節為學者宗官國子司業後守鄱陽有詩集行江西汪藻為之序李桂括蒼彚紀字芳叔縉雲人饒杭二州教授為文自出機軸従學常數百人多成名士識度偉卓議論慷慨作詩有晚唐風致余璘括蒼彚紀字仲文青田人不樂仕進博覽文史著介山集劉澹然兩浙名賢録字安道松陽人舉嘉泰壬戍進士歴官祕書省著作郎初為舉子游三衢試士以風雲龍虎之賦魁於衆作邑人項安世徙江陵其子容孫以浙東憲使行縣展墓安道以唘致之極其俊逸著有午溪集龔敦頤遂昌縣志原之孫博通羣籍撰元祐建中列傳譜述一百卷淳熙間修國史授潁州文學仕至宗正丞何侑括蒼彚紀字徳器龍泉人以恩補将仕郎累擢大理寺丞出知漳州代還尋除江南東路茶鹽司公勤㢘正入仕二十餘年多著績用曽作天爵銘吏治戒并歎習一篇皆中薄俗又裒次家集五十卷有覽古史斷二卷自號存齋寓居霅川鮑彪舊浙江通志字文虎龍泉人精史學以戰國䇿書失次為之註定時有論説以正其謬又有書解杜詩注為司封員外郎請老張津括蒼彚紀字子問龍泉人乾道特奏名第四廷對擢首授太寧簿居官不阿後歸日延邑老成講學誘掖後進著有曲江集四書疑義公簡筆錄季可括蒼彚紀字處仁龍泉人寳祐丙辰進士起義烏縣簿累官兵部尚書行樞宻院都承㫖政績甚著歸隠古來山所作詩文題曰隠怪者作著大學體卦五十卷元范霖括蒼彚紀字君澤縉雲人學問該博詞藻清雅嘗被召入獻八卦圖厯代編作圖授翰林編修出為江西浙江儒學提舉官至禮部侍郎陳繹曽元史陳旅傳繹曽字伯敷處州人口吃而精敏異常諸經注疏多能成誦文詞汪洋浩博其氣沛如也官至國子助教尹廷髙元詩選傳字仲眀遂昌人其父竹坡當宋季以能詩稱廷髙遭亂轉徙厯二十年始歸故鄉嘗掌教於永嘉謝病歸所著有玉井樵唱正續稿陳鑑括蒼彚紀字伯銖麗水人典教松陽善詩章有午溪集葉浚括蒼彚紀字仲明麗水人通經學著石山樵唱詩集又有葉烶號髙溪善詩有和陶集梁載括蒼彚紀字遜耕麗水人通經博學著元處州路志姪琪字完珪以文學世其家項壘崇禎處州府志字彦髙龍泉人好學能文尤長於詩舒穆嚕宜孫劉伯温葉世傑皆相推重前後續集凡八卷題曰山中言志劉明括蒼彚紀字峻明龍泉人博極羣書而詩學尤粹安南獠苗為亂提兵勦除民賴以安尋退隠與劉伯温胡仲淵相友善作詩唱和著集四卷鄭元祐元詩選傳字眀徳遂昌人家錢塘是時咸淳諸老猶在元祐徧游其門質疑稽隠充然有得父歿僑居平江至正丁酉除平江路儒學教授擢江浙儒學提舉卒元祐兒時傷右臂比長能左手作楷書規矩備至遂自號尚左生為文章滂沛豪宕有古作者風詩亦清峻蒼古晚年自彚其所作以授謝徽名僑吴集應覺翁括蒼彚紀縉雲人博覽古今好吟咏著有蒼山集明李恭括蒼彚紀字景恭麗水人詞華敏贍吟咏得盛唐體洪武初恭弱冠詣京師應制賦鍾山曉霽長律稱㫖賜晏罷命需次錄用以母老辭歸家政肅如三世不異㸑有泉石藁若干卷劉廌列朝詩集傳字士瑞誠意伯基之孫洪武二十三年襲封眀年以其叔閤門使事有連貶秩歸里築室於里第西雞山下命曰盤谷謫戍甘肅越三月赦還永樂中卒有盤谷集十卷盤谷倡和集二卷厲光舊浙江通志字仲青田人經史百家靡不淹貫洪武初宋濂薦任本學教諭日訓諸生實學不徒以文藝相髙著居集王潤孫崇禎處州府志青田人徳性温重顒然士望文章詩律風韻蕭然明初知縣耿亮薦任學諭作興學賦通五經尤長於易有圖解集練魯括蒼彚紀字希曽松陽人至正間中第南還明太祖詔求人材有司辟魯應聘不得已至武林作辭病詩九首聲調悲壯思志沈鬰若不知其意之所在歸而閉門謝客復撰朝會樂歌六章喜聖人之世出慶遭逢之不偶卓然可以垂後所著有倥侗集傳世包文舉崇禎處州府志字仕登松陽人従王西山受尚書得聞性命道徳之學應聘為國子助教一日太祖召入武英殿賜坐陳二帝三王之道稱㫖顧謂近臣曰此吉士也以時訪問數有匡正陞齊府長史潭王雅重之髙麗國亦聞其名所著有兩菴和陶璧水海岱等集陳徳詢括蒼彚紀松陽人號少微山人博通經史獨立不羣識者以為有仙風道骨好山水遇佳勝處輒延佇遐想思入風雲題詠務精絶嘗膺聘不起所著有少微集王濤崇禎處州府志縉雲人博學端行家藏萬卷號墨荘著有愚泉集戴夢麟括蒼彚紀青田人七嵗為文操筆立就一日先輩謂之曰項羽聞楚歌賦作者多不工童子能之乎夢麟唯唯移時草就坐客驚駭曰奇才也有司將以聞於朝其父固辭乃止後人名其所居之山為神童峯吴廷桓崇禎處州府志麗水人洪武中舉明經任王府紀善有百韻梅花詩詠史詩槐溪吟稿潘伯濟崇禎處州府志麗水人有學行美才儀明初以明經秀才厯監察御史河南按察僉事有巢雲集三十卷俞廣舊浙江通志字徳濟遂昌人幼孤長克厲於學渉獵既博従先生長者習詩律永樂六年詔翰林集四方士纂修永樂大典廣以能書薦詔就翰林益進其藝十八年擢兵科給事中坐累出為邯鄲丞復遷刑部主事獄無寃滯楊士奇稱之周景辰崇禎處州府志名煥以字行松湯人永樂中薦入文淵閣纂修國史試以鴛鴦菊詩立就擢知連城松溪二縣吏民愛之有東蒙集黄池括蒼彚紀字伯生麗水人師事劉基文學器識為時重官秦府紀善多著述有石樓文集潘琴括蒼彚紀字舜弦景寧人邃經博史為文典則有古風登天順丁丑進士授南吏部主事厯遷興化知府乞休作招鶴詞寓意傳聞京師朝士爭和之彚為鶴溪清風卷以寄思家居手不釋卷足不至縣廷文學齒徳隠然為東南望卒年九十所著有竹軒集詠史和唐詩行於世樊阜静志居詩話字時登縉雲人成化戊子舉人官延平學訓有樊山摘稿栝蒼風雅之士獨縉雲樊氏門才頗盛時登而外曰叙有用拙稿曰源有竹軒稿曰昌有友菊詩曰甫有磵礫集曰貴有桂岡集曰鐸有畏齋存稿樊濬括蒼彚紀字時清縉雲人少嗜學善詩章晚居雲門山有雲門集葉烓崇禎處州府志字季鼎麗水人逾冠博洽經史門壁皆書格言後以貢厯知豐縣生平考著甚富尤工詩畫别墅在椒山沿流倚岫游者謂不減輞川所著有遵制録椒山文集潘辰崇禎處州府志景寧人由薦舉官太常少卿深契性理博極羣書為文追擬秦漢直内閣二十七年誥勅多出其手動遵䋲墨不以非義自汙所著有南屏遺稿辰父流清博學工文中正統辛酉舉人曾上車駕幸太學賦深為大司成李時勉所重朱自强括蒼彚紀字體乾遂昌人博學好古坐卧處皆置書朝夕延文士談經史析疑義至老不衰以貢授莆田學訓飭躬却餽士論重之不二年謝病歸著易經破愚四卷黄中列朝詩集傳字文卿括蒼人嘉靖中以鄉薦知鉛山縣擢監察御史陞天津道兵備副使錢塘田汝成叙其集謂栝蒼詩派倡自郁離子郁離子沒凡二百年無聞而有黄西野出焉葉素括蒼彚紀字尚文青田人選貢任訓導致仕事父母以色養友兄弟白首不二身若不勝衣而是非可否卓然不可易與陳中州同學亦同志趣每言曰氣節文章吾畏陳子至其闇然日章渾然無迹雖中州亦自謂不及也所著有四書節釋易經羡記宋元綱目斷隙覿集葉瑞齡括蒼彚紀字仁夫青田人任漳州經厯學問該博居官涖事人稱㢘介乞歸所著冇禮記粕説杞憂畧春秋集潘援崇禎處州府志景寧人舉人貌古行方憲副沈暕嘗曰援詩文宜於兩漢間求之兩聘文衡陞翰林檢討授中書舍人家居二十年鄉髦或賴有造著有東崖摘稿詩林辨體李珘崇禎處州府志字朝光縉雲人敦孝友絶紛華淹貫詩書出入墳典外則椎魯樸誠中則青箱武庫遍游山水必紀其勝文詞援筆立就著醒脾鐵鏡月岩偶然錄詩韻音釋鐵鏡續㿑老人傳皆禆世教非苟作者王養端遂昌縣志字汝推倜儻負意氣談古今亹亹如懸河東下工古文詞作詩如出唐人口舉順天亞魁大學士表煒毎推轂下之著有震堂集山居論吴承恩崇禎處州府志字朝錫縉雲人涉獵羣書有冥解性至孝居喪三年不御葷酒居東郊結草堂書樂志論閒居賦於壁以自娱詩才韶令工書法善丹青寫梅花尤妙絶一時所著有東郊草堂雜録醉素堂吟稿黄九鼎遂昌縣志字禹鈞萬厯癸酉舉人除陜州守多恵政未㡬解職歸愛西湖之勝遂家焉名山異蹟題詠㡬徧尤善於樂府擬古諸體結社湖山與名公互相倡和督撫劉一焜為梓湖山百詠七二草行於世葉澳遂昌縣志字爾瞻髫齔時即負大志嘗受知於縣令湯顯祖萬厯甲午領鄉薦因抱疴不顯所著有四書注翼易通淇筠志感并詩集行世吴敬臣崇禎處州府志字景竹龍泉人聰頴博雅長詩歌工繪畫琴書一室吟咏自如以貢任定邊令遐荒布徳行李蕭然所著有纈璘館招劍篇此君愛助集王用臣青田縣志字羅南工詩賦自經史及星緯鍾律罔不鉤索司訓浦江其地有月泉為晦菴東萊講學處集士講肄於此尋陞象山諭又遷南安郡博有懴菴一集二集三集明志錄行世葉永華松陽縣志字玉果崇禎丙子舉人對智勇策近萬言主司黄景昉曰此必名士與掲重熙王宗熙稱海内三奇司成倪元璐謂其文骨崚嶒必能任天下事延入西席每與論經國大事著藕孔集讀書日記李邦樑崇禎處州府志字紫卿縉雲人瑰瑋𩔖陳同甫讀書鄙章句博洽今古為三都兩京之學弟子問奇不能難官台州府學訓導嘗賦豆腐為督學鄒嘉生鑒賞台人陳函煇素號博物遇邦樑自詘服再轉九江府學教授告歸所著有積石山房等集大易剖老子𤣥解捕虎奇門行世國朝梅調元温州府志字賛臣永嘉人淹貫經史工詞翰以貢授雲和教論所著有霽月軒詩集行世與林占春李元發王爾椒林健號永嘉五子林占春温州府志字梅生永嘉人少孤嗜學博洽淵通以㧞貢隠居教授著有輿志合璧月令合纂雪菴詩集詩餘行於世趙紹鼎温州府志字雲汾永嘉人博極羣書意氣豪邁以貢入京師偕友人宦遊南北所厯山川風物皆有撰述詩文尤閎贍浙江通志卷一百八十二
