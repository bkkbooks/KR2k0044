body:
  text: 浙江通志卷二百六十七藝文九跋唐湖州石記跋宋歐陽修右湖州石記文字殘闕其存者僅可識讀考其所記不可詳也惟其筆畫竒偉非顔魯公不能書也公忠義之節明若日月而堅若金石自可以光後世傳無窮不待其書然後不朽然公所至必有遺跡故今處處有之唐人筆蹟見於今者惟公為最多視其鉅書深刻或托於山崖其用意未嘗不為無窮計也蓋亦有趣好所樂耳其在湖州所書為世所傳者惟干禄字放生池碑尚多見於人家而干祿字書乃楊漢公摹本其真本已訛遂不復傳獨余集録有之好古之士知前人用意之深則其堙沉磨滅之餘尤為可惜者也跋傅給事崧卿竹友詩藁宋陸游王逸少寫經換鵞傅公籠鵞換竹二者皆我山隂絶勝事人皆能道之而換竹事未甚著鄉人以為憾獨游曰是不足怪也逸少志在物外不肯輕為世用故換鵞事易傳給事方南渡之初忠義大節一時稱首雖厄於讒誣不竟其用而至今聞其風者頑廉儒立為百世師則換竹事固可不傳蓋所見於世者大也給事遺文百卷今藏秘閣游領冊府時見之嘉定元年七月庚申識跋林和靖帖宋陸游祥符天禧間士之風節文學名天下者陜郊魏仲先錢唐林君復二人又皆工於詩方是時天子修封禪告太平有二人在天下麟鳯芝草不足言矣君復書法又自髙勝絶人予每見之方病不藥而愈不食而飽忽得觀上竺廣慧法師所藏二帖不覺起敬立法師能捐一石刻之山中使吾輩皆得墨本以刮目散懷亦一竒事也嘉泰甲子歳十二月丁夘山隂陸某書跋林逋薦士書後宋晁補之余嘗出錢塘門遵湖至北山一徑趨崦委曲深遠菱荇魚鳥可樂過林君居拜墓下塵埃榛莽山風蕭然至竹閣讀其棟間詩裵回徬徨有餘慕也吾師疾固見耦而耕者曰不可與同羣至㸃鼓瑟希則喟然歎曰吾與㸃志亦要志之所向仕不仕何有林君遭太平可以仕豈其天性自疎莫可尸祝不在枯槁伏藏也其推輓後來欲其聞達則反復致志如恐不及賢哉詩曰皎皎白駒在彼空谷生芻一束其人如玉安得林君者而從之元豐五年七月十四日晁補之記跋餘姚海隄記元黄溍書叙禹治水備著濬導之功其於海惟曰入而已太史公河渠書班孟堅溝洫志於海則存而不論餘姚居天下之東南地訖於海居人數有海患其故為縣時宋慶歴間知縣事謝景初嘗為隄二萬八千尺慶元間知縣事施宿為隄四萬二千尺而其中為石隄者五千七百尺其用力於海皆古所未及可謂難矣國朝易縣為州四十餘年而葉君恒來為州判官作石隄以尺計者前後總二萬四千較前人不愈難哉先儒胡文昭公以經義治事分齋教學者所治之事畢備水利其重也自世儒務為髙論而不屑於事為之末又或者指經義為無用之言以相詬病其惑不已甚乎君以經義釋褐入官而善於治事至於水利又能用力於古所未及大書深刻登載已為詳悉余獨推其能為人之所難能者由其知先儒為學之道而使經義之昭垂於世果不為空言也題北山紀遊卷後明宋濂同郡許君存禮以北山紀遊卷示濂請題識其後卷中諸詩皆鄉先達司理葉公侍講黄公太常胡公禮部呉公修撰張公之作禮部紀遊二文亦載其中然待制栁公山長呉公皆有所賦咏惜未及采録因為檢其遺稿繕書以補焉聞之權徳輿稱東陽為山水佳地今自北山言之潛嶽之峯如寳蓮華屹然居中而三洞雙溪之勝暎帶後先誠佳矣有若先達諸公文章巨儒同生於一時同出於一郡豈非尤佳者乎人物固藉乎山川而生而山川則專倚乎人物為重諸公顯而在上者已羽儀文化流聲四方其隐而在下者又能播芳譽於天朝蔚為當世儒宗此非人之瑰傑益以昭夫地靈歟侍講之詩蓋首倡者作於至大庚戌之歳自庚戌迨今五十餘年諸公無一存者間嘗採芝山中經諸公倡酬之處巖紅澗碧其餘音儼然在目有不禁慨然於中者矣嗚呼北山之雄麗依然不改於昔生祥兆瑞當無時而休也安知無俊偉疊興以繼諸公之軌轍者大篇短韻宜不止此此卷特其權輿者爾存禮尚襲以俟跋劉南坦峴山圖明楊慎蘭亭羣賢少長咸集竹溪六逸賓旅無忘曷若香山詩壇月泉吟社釋九愁而遣五噫具四美而并二難地則秔稻交疇里實桑梓䕃道春遊秋豫朝往夕來山堂仍襲峴山叔子之名畵圖兼摹天目王孫之舊緬懷古昔繼在今斯慎今猿鳥為儔魑魅是禦臨文景仰開訊踟蹰髙步九州徒有子建凌雲之想神交千里愁無長房縮地之能狼跋興歌鶴脛長引矣書馬君所藏新建墨蹟後明徐渭古人論右軍以書掩其人新建乃不然以人掩其書今觀兹墨非不翩翩然鳯翥而龍蟠也使其人少亞於書則其書且傳矣而今重其人不翅於鎰稱其書僅得於銖書之遇不遇固如此哉然而猶得號於人曰此新建王先生書也亦幸矣馬君博古君子也裒先生之書如此其多將重先生之書耶抑重先生之人耶國朝杭州府學宋石經跋朱彝尊宋髙宗皇帝御書石經紹興十三年知臨安府事張澂摹勒上石淳熙四年詔知府趙磻老建閣於太學題曰光堯石經之閣置石其下洪邁曾惇楊冠卿葉紹翁李心傳陳騤王應麟潛説友紀之詳矣宋亡學廢為肅政廉訪司治所西僧楊璉真伽造白墖於行宫故址取其石壘墖杭州路廉訪經歴申屠致遠力持不可然已損其什一元至正間即治所西偏建西湖書院以祀先師設有山長掌書庫其後明常熟呉訥乾州宋廷佐先後廵按浙江或覆之廊或甃以瓴甋崇禎末廊圯乃嵌諸壁中左易二書六詩十有二禮記向有學記經解中庸儒行大學五篇今惟中庸片石存爾其南則理宗大書御製序四碑在焉右則春秋左氏傳四十八碑闕其首卷通計八十七碑諸經雖非足本然書法甚工學古者所當藏弆若夫秦檜一跋已為訥椎碎其詞見於學士院中興紀事本末君子無取也咸淳臨安志跋朱彝尊南宋咸淳四年中奉大夫權户部尚書知臨安軍府事縉雲縣開國男處州潛説友君髙緝正府志增益舊聞凡一百卷予從海鹽胡氏常熟毛氏先後得宋槧本八十卷又借抄一十三卷其七卷終闕焉宋人地志幸存者若宋次道之志長安梁叔子之志三山范致能之志吳郡施武子之志會稽羅端良之志新安陳夀老之志赤城毎患其太簡惟潛氏此志獨詳合以呉越備史中興館閣錄續録都城紀勝武林舊事夢粱録大滌洞天志庶幾文獻足徴惜後之作通志者目未覩此以致舊聞放失可歎也夢粱録跋朱彞尊曩從古林曹氏借抄夢粱録係楊禮部南峯節文止得十卷後留京師聞棠村梁氏有定本其卷倍之亟録而藏諸笥歳辛巳寓居昭慶僧樓取而卒讀之嫌其用筆拖沓不知所裁未若泗水潛夫武林舊事之簡而有要也雖然自曾端伯編𩔖説朱藏一編紺珠集陶九成編説郛皆千百而取一説部之完書存焉者寡矣因贊徐舎人鏤板於吳下至元嘉禾志跋朱彞尊嘉禾志三十有二卷至元中經厯單慶延郡博士徐碩纂輯成書序之者郡人郭晦唐天麟也嘉禾之有志肇自宋淳熙間郡守張元成延聞人伯紀修之既而岳珂來守郡復延鄉先輩關栻表卿續修岳珂改調中輟僅存五卷是書蓋踵栻舊本而增益之者栻分門二十五碩廣之凡四十三而官師治蹟經籍目録俱闕焉又呉越錢氏建國曾改秀州為開元府乃是編不載未免失之疎畧然所采碑碣題詠居全書之半舊章藉以考證足快於心矣碩他無表見晦舉宋淳祐十年方逢辰榜進士天麟字景仁寳祐四年文天祥榜第四甲進士自稱納軒叟居嘉禾跋唐衢州刺史嗣江王禕石橋寺詩朱彛尊石橋寺在衢州府西安縣南三十里道書第八青霞洞天也康熙壬申冬知縣事鹿君祐邀予往游從寺登山尋仙人對奕所前後洞豁有碑峙其右則唐嗣江王褘所題五言詩以貞元三年正月上石末書朝散大夫使持節衢州諸軍事守衢州刺史賜紫金魚袋韋光輔建文稱刺史韋公於石橋寺橋下以外祖信安郡王詩刻石按新唐書表太宗第三子吳王恪恪第三子琨琨子褘舊唐書傳褘少繼江王嚻後封為嗣江王改封信安郡王景雲開元中兩為衢州刺史詩題嗣江王當是景雲間初為刺史作也成都楊用修不知薄烟羃遠郊遙峯没歸翼二語係王詩疑為仙人遺句誤矣文禱仇王神文唐白居易維長慶三年歳次癸夘八月癸未朔越十有七日己亥朝議大夫使持節諸軍事守杭州刺史上柱國白居易謹遣朝議郎行餘杭縣令常師儒以清酌之奠敬祭於仇王神嘗聞神者所以司土地守山川驅禽獸福生人也餘杭縣自去年冬逮今秋虎暴者非一神其知之乎死者非一神其念之乎居易與師儒猥居牧宰慙無政化不能使渡江出境是用䖍告於神惟神廟居血食非人不立則人神之主也獸神之屬也今縱其屬殘其主於神何利焉於人何辜焉若一夕之後神其有知即能耀靈申威伏猛禁暴是人之福幸亦神之昭昭若人告不聞獸害不去是無神也人何望哉嗚呼正直聰明盍鑒於此祈臯亭神文唐白居易維長慶三年歳次癸夘七月癸丑朔越六日戊午朝議大夫使持節諸軍事守杭州刺史上柱國白居易以酒醴香果昭告於臯亭廟神去秋愆陽今夏少雨實憂災沴重困杭人居易忝奉詔條愧無政術既逢愆序不敢寧居故昨禱伍相神祈城隍祠靈雖應期而未霑足是用選日祇事改請於神恭聞明神禀靈於隂祗資善於釋氏聰明正直潔靖慈仁無幽不通有感必應今請齋心䖍告神其監之若四封之間五日之内雨澤霈足稼穡滋稔敢不增修像設重薦馨香歌舞鼔鐘備物以報如此則不獨人之福亦惟神之光若寂寥自居肹蠁無應長吏䖍誠而不荅下民顒望而不知坐觀田農使至枯悴如此則不獨人之困亦惟神之羞惟神裁之敬以俟命悲剡谿古藤文唐舒元輿剡谿上綿四五百里多古藤株枿逼土雖春入土脈他植發活獨古藤氣候不覺絶盡生意予以為本乎地者春到必動此藤亦本乎地方春且有死色遂問谿上人有道者云谿中多紙工刀斧斬伐無時擘剥皮肌以給其業噫藤雖植物温而榮寒而枯養而生殘而死亦將似有命於天地間今為紙工斬伐不得發生是天地氣力為人中傷致一物疾癘之若此異日過數十百郡洎東雒西雍厯見書文者皆以剡紙相夸予寤曩見剡藤之死職正由此此過固不在紙工且今九牧士人自專言能見文章戸牖者其數與麻竹相多聽其語其自安重皆不啻握驪龍珠雖茍有曉悟者其倫甚寡不勝衆者亦皆斂手無語勝衆者果自謂天之文章歸我遂輕傲聖人之道使周南召南風骨折入於折揚皇荂中言偃卜子夏文學䧟入於淫靡放蕩中比肩握管動盈數千百人數千百人筆下動盈數千萬言不知其為謬誤日日以縱自然殘藤命易甚桑枲波靡頽沓未見止息如此則綺文妄言輩誰非書剡紙者耶紙工嗜利曉夜斬藤以鬻之雖舉天下為剡谿猶不足以給況一剡谿者即以此恐後之日不復有藤生於剡矣大抵人間費用茍得著其理有不枉之道在則暴耗之過莫由横及於物物之資人亦有其時時有斬伐不為夭閼予謂今之錯為文者皆夭閼剡谿藤之流也藤生有涯而錯為文者無涯無涯之損物不直於剡藤而已予所以取剡藤以寄其悲開湖祭禱呉山水仙五龍三廟文宋蘇軾杭之西湖如人之有目湖生茭葑如目之有翳翳乆不治目亦將廢河渠有膠舟之苦鱗介失解網之惠六池化為眢井而千頃無復豐歳矣是用因賑卹之餘資興開鑿之利勢百日奏功所患者淫雨千夫在野所憂者疾癘庶神明之隂相與人謀而協濟魚龍前進以破堅菰葦解拆而迎鋭復有唐之舊觀盡四山而為際澤斯民於無窮宜事神之益勵我將大合樂以為報豈徒用樽酒之薄祭也謝呉山水仙王五龍三廟文宋蘇軾西湖湮塞積歳之患坐閲百吏熟視而歎惟愚無知妄謂非難禱於有神隂假其便不愆於素咸出幽贊大隄雲横老葑席卷歴時未幾功已過半嗣事告終來哲所繕神卒相之罔咈民願肴酒之報我愧不腆祈雨吳山文宋蘇軾杭之為邦山澤相半十日之雨則病水一月不雨則病旱故水旱之請黷神為甚今者止雨之禱未能踰月又以旱告矣吏以不德為媿神以不倦為德願終其賜俾克有秋祈晴吳山文宋蘇軾歲既大熟惟神之賜害於垂成匪神之意築場為塗卧穟生耳農泣於野其忍安視生為楚英殁為呉豪烈氣不冺視此海濤反雨為暘何足告勞有潔斯醴匪神孰號戒弄潮文宋蔡襄牛斗之分呉越之中惟江濤為最雄乗秋風而益怒乃其俗習於此觀遊厥有善泅之徒競作弄潮之戲以父母所生之遺體投魚龍不測之深淵自為矜夸時或沉溺精魂永淪於泉下妻孥望哭於水濱生也有涯盍終於天命死而不弔重棄於人倫推予不忍之心伸爾無窮之戒所有今年觀潮並依常例其軍人百姓輒敢弄潮必有科罰嚴州祈雨祝文宋陸游新定為郡介於谿山之間雨暘少愆輒能病稼戊申水溢方禱於神曾未再旬復以旱告吏政無以格隂陽之和而惟神之瀆羣趨廟庭僕僕亟拜神固不以吏罪而棄斯民吏獨無愧於神乎尚力厥事以蓋兹愧神其監臨之丁未嚴州勸農文宋陸游蓋聞農為四民之本食居八政之先豐歉無常當有儲蓄吾民生逢聖世百榖順成仰事俯育各遂其性太守幸得以禮遜相與從事於此故延見髙年勞問勸課致誠意以感衆心非特應法令為文具而已今兹土膏方動東作維時汝其語子若孫無事末作無好終訟深􅎌廣耜力耕疾耘安豐年而憂歉歳太守亦當寛期會簡追胥戒興作節燕遊與吾民共享無事之樂而為後日之備豈不美哉戊申嚴州勸農文宋陸游蓋聞為政之術務農為先使衣食之粗充則刑辟之自省當職自䝉朝命來剖郡符雖誠心未格於豐穰然拙政毎存於撫字觴酒豆肉曷常妄蠧於邦村銖漆寸絲不敢輒營於私利所冀追胥弗擾墾闢以時春耕夏耘仰事俯育服勞南畝各終穮蔉之功無犯有司共樂舒長之日今者土膏既動穡事將興敢延見於耆年用布宣於聖澤清心省事固守令之當為曠土游民亦父兄之所耻歸相告戒恪務遵承上以寛當宁之深憂下以成提封之美俗定海勸農文宋陳造國家務重農榖凡張官涖政無非勸農之意又命守令率歳二月出郊延父老諭以此意其望爾甚切爾服勞力田頻享富歳之樂猶為爾勸不幾贅乎抑勤之外猶有可進者兹不容黙夫常賦不可缺爾寧不知而卒憚於輸送致煩追逮或加鞭扑田業已所有而假它人戸籍出沒遮覆覬不敗露卒不可掩毆詈閧訟以爭豪末墮棄耕耨糜耗裹囊是皆積習迷不反者不可不痛自改悛夫官租未輸官吏勞攘於上而里正長旁午於門酒食酬謝夫豈能免或受杖而不免於輸所損如何託名寄産已負刑憲歳或出榖人各有心終未必可保不忍小忿求伸其氣而不免俛首下顔胥吏之前捐金求售恐其却之所得幾何所喪多矣三者未去雖勤於農恐未能享農之利也爾以吾為非欺盡更舊習無撓官法心閒無事畢力於農晏受豐登之樂而令亦得少休憂勞不兩利歟爾父老訓誨子弟各諭鄉里無忽諸暨勸農文元黄溍古之有民社者必以農事為先拊循勸率具有其法我朝㕘稽故典郡邑守令悉以勸農入銜事莫重焉比以受任之初延登耆年詢以風土咸謂是州地産素薄兼之襟山帶湖旱澇相半仍歳凶歉民多阻饑夫不知盡其在人而一切聽之於天烏乎可也昔魏文侯使李悝盡地力以方百里之地為田六百萬畝理田勤則歳增粟百八十萬石不勤則歳減粟百八十萬石勤與否之利害相逺如此然則欲盡地力者亦在乎盡人力而已誠能率爾子弟竭其四肢以從事於南畝將見富歳之入益增蓄積既多縱有旱澇可無乏食之慮矧今聖仁在上茂育羣品至和之應必有豐年奬厲而成就之固長民者之責也兹以東作方興躬秉耒耜為爾農勸其尚勉之毋以為具文而藐藐其聽也議天台法門議唐梁肅論曰修釋氏之訓者務之而已曰戒定慧斯道也始於發心成於妙覺經緯於三乗導達於萬行而能事備矣昔法王出世由一道清淨用一音演法機感不同所聞益異故五時五味半滿權實偏圓大小之義播於諸部粲然殊流要其所歸無越一實故經曰雖説種種道其實為佛乗又曰開方便門示真實相喻之以衆流入海標之以不二法門自他兩得同諸秘宻此教之所由作也洎鶴林滅而法網散神足隐而宗途異各權所得互為矛盾更作其中或三昧示生四依出現應機不等持論亦别故攝論地持成實唯識之𩔖分路並作非有非空之談莫能一貫既而去聖滋遠其風東扇説法者桎梏於文字莫知自解習禪者虚無其性相不可牽復是此者非彼未證者謂證慧解之道流以忘反身口之事蕩而無章於是法門之前統或幾乎息矣既而敎不終否至人利見惠聞惠思或躍相繼法雷之振未普故木鐸重受於天台大師大師像身子善現之超悟備帝堯后舜之休相贊龍樹之遺論從南岳之妙解然後用三種止觀成一事因縁括萬法於一心開十乗於八教戒定慧之説空假中之觀坦然明白可舉而行是故教無遺法法無棄人人無廢心心無釋行行有所證證有其宗大師敎門所以為盛故其在世也光照天下為帝王師範其去世也往來上界為慈氏輔佐卷舒於普門示現降德為如來所使階位境智蓋無得而稱焉嗚呼應跡雖往正言不墜習之者猶足以抗折百家照示三藏又况聞而能思思而能修修而能信信而不已者歟斯人也雖曰未證吾必謂之近矣今之人正信者鮮遊禪關者或以無佛無法何罪何善之化化中人已下馳騁愛欲之徒出入衣冠之𩔖以為斯言至矣且不逆耳故從其門者若飛蛾之赴明燭破塊之落空谷殊不知坐致燋爛而莫能自出雖欲益之而實損之歟夫衆魔外道為害一揆由是觀之此宗之大訓此教之旁濟其於天下為不侔矣自智者傳法五世至今天台湛然大師中興其道為予言之如此故録之以繫於篇復鑑湖議宋徐次鐸次鐸竊見會稽山隂兩縣之形勢大抵東南髙西北低其東南皆至山而北抵於海故凡水源所出多自西而東南今衆流所聚者曰平水溪曰上竈溪曰攢宮溪曰寵瑞宫溪皆在會稽曰蘭亭溪曰南池溪曰離渚溪皆在山隂其他一派一坑所出總之三十六源當其未有湖之時三十六源之水蓋西北流入於江以達於海自東漢永和五年太守馬公臻始築大隄瀦三十六源之水名曰鏡湖隄之在會稽者自五雲門東至於曹娥江凡七十二里在山隂者自常禧門西至於西小江凡四十五里故湖之形勢亦分為二而隸兩縣隸會稽曰東湖隸山隂曰西湖東西二湖由稽山門驛路為界出稽山門一百步有橋曰三橋橋下有水門以限兩湖湖雖分為二其實相通凡三百五十有八里灌溉民田九千餘頃湖之勢髙於民田田髙於江海故水多則泄民田之水入於江海水少則泄湖之水以溉民田而兩縣及湖下之水啟閉又有石牌以測之一在五雲門外小凌橋之東今春夏水則深一尺有七寸秋冬水則深一尺有二寸會稽主之一在常禧門外跨湖橋之南今春夏水則髙三尺有五寸秋冬水則髙二尺有九寸山隂主之會稽地形髙於山隂故曾南豐述杜杞之説以為會稽之石水深八尺有五寸山隂之石水深四尺有五寸是會稽水則幾倍山隂今石牌淺深乃相反蓋今立石之地與昔不同今會稽石立於瀕隄水淺之處山隂石立於湖中水深之處是以水則淺深異於曩時其實會稽之水嘗髙於山隂二三尺於三橋閘見之城外之水亦髙於城中二三尺於都泗閘見之乃若湖下石牌立於都泗門東會稽山隂接壤之際春季水則髙三尺有二寸夏則三尺有六寸秋冬季皆二尺凡水如則乃固斗門以蓄之其或過然後開斗門以泄之自永和迄我宋幾千年民䝉其利祥符以來並湖之民始或侵耕以為田熙寧中朝廷興水利有盧州觀察推官江衍者被遣至越訪利害衍無遠識不能建議復湖乃立石牌以分内外牌内者為田牌外者為湖凡牌内之田始皆履畝許民租之號曰湖田政和末郡守方侈進奉復廢牌外之湖以為田輸所入於少府自是環湖之民不復顧忌湖之不為田者無幾矣隆興改元十一月知府事呉公芾因歳饑請於朝取江衍所立石牌之外盜為田者盡復之凡二百七十七頃四十四畝二角十二歩計工度量先從禹廟後唐賀知章放生池開濬百餘日訖工毎歳期以農隙用工至農務興而罷然次鐸出入阡陌詢父老面形勢度髙卑始知呉公未得復湖之要領夫為髙必因邱陵為下必因川澤豈有作陂湖不因髙下之勢而徒欲資畚鍤以為功哉馬公惟知地勢之所趨横築隄塘障捍三十六源之水故湖不勞而自成歴歲滋久淤泥填塞之處誠或有之然湖所以廢為田者非直以此也蓋以歳月彌遠湖塘既寖壊斗門堰閘諸私小溝固䕶不時縱閉無節湖水盡入江海而瀕湖之民始得增髙益卑而盜以為田使其隄塘固堰閘堅斗門啟閉及時暗溝禁窒不通則湖可坐復民雖欲盜耕為尺寸田不可得也紹興五年冬孝宗皇帝靈駕之行府縣懼漕河淺涸盡塞諸斗門固䕶諸堰閘雖當霜降水涸之時不雨者踰月而湖水僅減一二寸湖田被浸者久之訖事決隄開堰放斗門水乃得去是則復湖之要又較然可見者也夫斗門堰閘隂溝之為泄水均也然泄水最多者曰斗門其次曰諸堰若諸隂溝則又次焉今兩湖之為斗門堰閘隂溝之𩔖不可殫舉姑以其著者言之其在會稽者為斗門凡四所一曰瓜山斗門二曰少微斗門三曰曹娥斗門四曰蒿口斗門為閘者凡四所一曰都泗門閘二曰東郭閘三曰三橋閘四曰小凌橋閘為堰者凡十有五所在城内者有二一曰都泗堰二曰東郭堰在官塘者十有三一曰石堰二曰大埭堰三曰臯步堰四曰樊江堰五曰正平堰六曰茅洋堰七曰陶家堰八曰夏家堰九曰王家堰十曰彭家堰十有一曰曹娥堰十有二曰許家堰十有三曰樊家堰其在山隂者為斗門凡有三所一曰廣陵斗門二曰新逕斗門三曰西墟斗門為閘者凡三所一曰白樓閘二曰三山閘三曰柯山閘為堰者凡十有三所一曰陶家堰二曰南堰皆在城内三曰白樓堰四曰中堰五曰石堰六曰胡桑堰七曰沉釀堰八曰蔡家堰九曰葉家堰十曰新堰十有一曰童家堰十有二曰賓舎堰十有三曰抱姑堰皆在官塘兩縣之北又有玉山斗門八間曾南豐所謂朱儲斗門是也去湖最遠去海最近地勢斗下泄水最速其三間隸會稽五間隸山隂若其他民各於田首就掘隄增為諸小溝洎古諸暗溝及他缺穴之處難徧以疏舉大抵皆走泄湖水處也吳公釋此不察猥斤斤從事於開濬之末誤矣故吳公所開湖才數年皆復為田暨於今或歳輸所入於官或為慈福宫莊田及蕩地歳輸所入於莊或為縣公田及蕩地歳輸賃直於縣為應辦用度錢或為告成天長千秋大禹等寺觀因佃吳給事積土之山而包佃為田及蕩地故湖廢塞殆盡而水所流行僅有從横支港可通舟行而已毎歳田未告病而湖港已先涸矣昔之湖本為民田之利而今之湖反為民田之害蓋春水泛漲之時民田無所用水而耕湖者懼其害已輒請於官以放斗門官不從相與什伯為羣決隄縱水入於民田之内是以民常於春時重被水潦之害至夏秋之間雨或愆期又無瀦蓄之水為灌溉之利於是兩縣無歳無水旱監司府縣亦無歳無賑濟利害曉然甚易知也然則湖其可不復乎道聽塗說者方以闕上供失民業為説是不然夫湖田之上供歳不過五萬餘石兩縣歳一水旱其所捐所放賑濟勸分殆不啻十餘萬石其得失多寡蓋已相絶矣湖之為田若蕩地者不過餘二千頃耕湖之民多亦不過數千家以二千頃數千家之小利而使兩縣湖下之田九千頃民數萬家歳受水旱饑饉而弗之恤其利害輕重亦甚相逺况湖未為田之時其民豈皆無以自業乎使湖果復舊水常瀰滿則魚鱉蝦蠏之𩔖不可勝食茭荷菱芡之實不可勝用縱民採捕其中其利自溥何失業之足慮哉次鐸論載既畢又有援執舊説而詰之曰從子之説不必濬湖使深必須增隄使髙且懼隄髙壅水萬一決潰必敗城郭子將為之奈何是又未知形勢利害者也夫水之湍急者其地或隘不能容於是有衝激決溢之患今湖之水源不過三十六所而湖之廣餘三百里以其地容其水裕如也况自水源所出北抵於隄及城遠者四五十里近猶一二十里其水勢固已平緩於衝隄也何有且隄之去漢如此其久是必有虧無增今誠築隄增於髙者二三尺計其勢方與昔同昔不慮其決而今顧慮之何哉諸暨泌湖議明黄鏜諸暨之湖七十有二諸湖丈量陞科供辦糧差惟獨此湖田宋元及我國家相沿為湖而不以為田者此必有説某常相度其地審視水勢諏咨羣議則此湖斷然為湖而不可以為田也何則縣東之水發嵊縣會稽山隂諸界無慮十餘條皆注此湖而浣江發源浦江義烏分派東西兩江而又會流於三江口三港水道狹小旱乾之時兩江之水由三港舒徐順流入於錢塘若有霖雨崇朝則兩江之水暴漲壅淤於三港而其水反從東南逆注於此湖則此湖誠為衆水聚蓄囊貯之所若據以為田則必有壅塞懐襄之患而暨之為縣大受其害矣歴代以來中更老成定慮者不知其幾卒棄膏腴以為官湖而不以為田者非其見事之晚利害較然勢有所不可也武林山辨明邵穆生武林杭之名山因以名郡而古今皆朦朧未有直指的名為某山者舊志以近今武林門右土阜俗稱祖山者當之謂其山先名武林以避唐諱改稱虎林成化志引楊正質虎林山記謂錢王時祖山在郭外有異虎其山自名虎林非避諱也又引宋樓攻愧詩武林山出武林水靈隐後山無乃是且宋淳熙志言漢書明載武林山為武林水所出安有返避唐諱之説決非城内無水小山明矣是夏公斷以靈隐寺後山北髙峯為武林山矣與薛公通志同惜偏而未全一統志列武林山當矣下曰一名靈隐一名靈苑一名仙居乃合靈隐山飛來峯二山為武林山是矣特認而未的至沙門契嵩武林山記與泗水潛夫武林舊事直以飛來峯為武林山似矣又局而不廣近田公西湖游覽志陳公萬厯志皆不列武林山而於靈隐山下言一名武林山豈惟齟齬不明而名言更不正今予為辨之者三以俟質之君子凡郡邑之著稱者必以郡中佳山水為祖山蟻垤不足以當固矣特靈隐之名發於東晉其先秦兩漢厥名伊何愚意凡謂之山者以其全體而名也其髙聳者曰山之峯其如脊者曰山之嶺至於岡陵丘阜皆有分别而一山字足以槩之故武林山之名乃杭南北天竺靈隐諸峯慧理未來之先此其祖名總名也自慧理既來而後有飛來之名焉有天竺之名焉有靈隐之名焉有靈鷲之名焉有天竺而復有三竺之名焉傳五印度而後有中印之名焉至於蓮花佛國白雲白猿獅子香爐皆繼慧理發之而為武林之支名至於南北髙五雲雙檜乳竇月桂諸名又後人之濫觴也其曰形勝烏石靈苑仙居龍門楊梅西源善住興正瑞雲慶化集慶秦亭又土人之私諡也自有諸名武林反以無專指而晦如呼子之名而不詳其祖父之諱又如子孫寡而皆晦則父祖之名自傳子孫既多而又著則父祖之名遠而晦久而忘此常道也故呉山秦望以宿名非武林也定浮龍鳯以沿江别派非武林也九曜南屏玉皇大慈以過峽非武林也黄鶴臯亭臨平超山遠而對照非武林也孤山獨山寡不成林非武林也黄山安樂山七十二賢山焦山水山其所根源非武林也此外諸南西北三面之山㦸攢旗矗如武庫森列者有一曰非武林山不可也如羅浮有七十二峯皆謂之羅浮山黄山有七十二峯皆謂之黄山武夷有三十六峯皆謂之武夷山是可辨者一也然此意未經髙人明言而意實可見如羅處約靈隐碑曰浙水之右有山曰武林盧襄西征記曰杭地北環天隐楊太守孟瑛開西湖疏曰杭州南跨吳山北兠武林觀曰右曰環曰兠三字則非一二山之指羅公自是才子楊公極善堪輿盧公大於游覽故其所見之卓如此其可辨者二也且求武林山者必當求武林水杭南北二山之水孰有大於三竺靈隐之溪乎南則從捫壁嶺水出嶺合雙桂永清月桂諸塢北則從石人西源合白沙韜光諸塢正與舊志合曰武林山有二水南出者曰南澗北來者曰北澗若惟以靈隐寺山為武林山則惟有北澗而無南澗若以飛來峯為武林山則飛來峯無水不出澗若以靈隐飛來二峯山為武林山則南澗從天竺諸峯發源不全况舊志言西湖滙武林山水秦時名武林水至漢方有金牛明聖之號南北二山凡有水流入湖者皆武林山也其可辨者三也始焉求之人心之同昧既焉質之髙人之偉見終焉稽之形勢之現存吾於武林也奚疑國朝西湖不通江辨毛先舒按昔郡志云西湖故與江通誤也田學使汝成嘗辨之然未能了了按水經云浙江水出三天子都北過餘杭東入於海原未嘗云與西湖通也注云浙江至錢塘縣又東逕靈隐山山下有錢塘故縣浙江經其南縣南江側有明聖湖亦未嘗云與湖通也今靈隐去江已遠然山川之名古今屢變或當時靈隐山直抵江干俱名靈隐猶古呉中亦稱會稽浙江亦稱廣陵耳又水經注謂秦始皇將遊會稽道餘杭之西津西津亦未必正是西湖至駱賓王樓觀滄海日門對浙江潮靈隐之山至絶頂何嘗不可觀日對潮豈必湖與江通哉且詩人寫景嘗在虚實間即此詩末云待入天台路㸔余渡石橋豈可泥此而謂天台石梁亦在靈隐哉楊巨源詩曾過靈隐江邉寺獨宿東樓㸔海門義亦𩔖此今又相傳大佛頭為秦皇纜船之石或好事之附會或始皇東來遊幸西湖亦未可知總與湖通江之説無與陵谷雖有變遷而大段形勢故在西湖南面稍近江而尚有慈雲萬松二嶺大山隔之他處去江更遠古必無湖通江之理也又舊傳西湖本通海通江即通海矣可無更辨考吳越考宋潛説友杭地本屬吳屬越諸家為説不同以為屬吳者晏元獻公𩔖要皇朝郡縣志及乾道舊志皆然而不著其説惟淳祐志引吳越春秋所載越王句踐入臣於吳羣臣送至浙江臨水祖道又載吳王夫差為越所敗而走止秦餘杭山又史記楚威王伐越盡取故吳地至浙江遂謂吳越必以浙江為分界以為屬越者杜佑通典歐陽忞輿地廣記皆云春秋時屬越越敗屬呉東陽王象之本其説謂錢塘舊為越有夫差敗越地始入吳雖皆知為越地而未知分界所在惟太平寰宇記引呉地記云越國西北界至禦兒則是呉越以禦兒為分界二説各有所據今精考之當以後説為是春秋魯定公十四年五月於越敗吳於檇李杜預注云嘉興縣南檇李城又史記世家闔閭十九年伐越句踐迎擊之檇李賈逵註云檇李越地據此則檇李以南皆為越境杭在其中矣此杭為越地一也呉越春秋句踐既臣於呉夫差賜之書增其封東至句甬西至檇李南至姑末北至平原縱横八百餘里且謂越本興國千里吾雖封之未盡其國則是所封之地皆越故疆又越絶書越地記云語兒鄉故越界本名就李吳疆越地以為戰地至柴辟亭呉地記云柴辟亭到語兒就李吳侵以為戰地則吳越疆界猶極明白此杭為越地二也若淳祐志所引三説皆有可辨論者其一謂越羣臣祖句踐於浙江則是吳越以浙江為界殊不知是時句踐保棲會稽之山浙江以西皆為吳有宜其祖道止於江濱又未嘗云送之境上耶其一謂夫差走餘杭山姑蘇志云陽山又名秦餘杭山在長洲西北三十里夫差棲於此死因葬焉至今號夫差墓又越絶書吳地記云秦餘杭山去毘陵縣五十里有湖水近太湖今餘杭去長洲太湖遠甚豈可以名之偶同强合為一且越在東南吳在西北呉王不西北走蘇常而反東南走餘杭必無此理其一謂楚伐越盡取故吳地至浙江則浙江之西乃吳地殊不知此句自是兩義所謂故吳地者言越故取於吳者也所謂至浙江者言併越元有之地而盡取之也豈可概以為吳故地乎皇極經世以其詞不别白故於楚滅越盡取其地之下書曰東開地至浙江則是浙江以西本非吳境乃楚因越地而開者也合是三説則前志之誤可以渙然無疑矣三江考明張元忭嘉泰志曰禹貢三江既入震澤底定韋昭云三江者松江錢塘江浦陽江蓋江之名尚矣越絶云浦陽越王句踐兵敗衆懣於此故曰浦陽去山隂五十里今土人以錢清為古浦陽也酈道元水經注浦陽江導源烏傷縣東逕諸暨與泄溪合東回北轉逕剡縣縣開東門向江江廣一百餘步又云柯水東北逕永興與浙江合謂之浦陽江漢書潘水即浦陽江别名自外無水以應之又云浦陽江東北逕始寧縣嶀山其北即嶀浦又云東逕上虞縣南至王莽之會稽地名虞賓又云餘暨之南餘姚西北浙江與浦陽江同歸海又引闞駰十三州志江水至會稽與浙江合自臨浦南通浦陽江其説不一自相抵捂謝惠連西陵遇風詩昨發浦陽汭今宿浙江湄韻譜云水之相入為汭又云水北曰汭自浦陽江北流入浙江二水參錯其名曰汭宜矣始寕今上虞縣嶀浦嶀山皆屬嵊縣虞賓屬上虞又接餘姚江臨平湖在浙江以西其源殊别餘暨即諸暨距餘姚二百餘里謂餘姚西北浙江入海非也蓋此江東北流自山隂會稽泝曹娥江始至上虞餘姚嵊縣謂東回北轉入上虞嵊縣斯可矣道元未嘗身履浙東故其誤如此後人遂認此江為上虞江其失寖邈以地理考之自浦陽江至曹娥百餘里豈當時曹娥之名未著亦名浦陽耶或陵谷遷變舊流不循其故道耶十道志浦陽江有琵琶圻岸有曹娥碑信此則曹娥江即浦陽爾文選注浦陽汭經上虞謝康樂山居賦浦陽江自嶀山東北逕太康湖其説皆誤今山隂三十里有柯橋其下為柯水然則浦陽江與柯水一源由蕭山達於浙江古今不易也今按上虞縣志曹娥江始實名浦陽其源自東小江亦由浦江來十道志婺州浦江江之導源出此是知浦江一源而分二派一直由諸暨直下至山隂蕭山間為錢清江酈所謂逕諸暨與泄溪合餘暨之南與浙江同歸海至會稽與浙江合自臨浦南通者皆是也一則紆而東至嵊縣出始寧門乃折而北至上虞會稽間為曹娥江酈所謂東回北轉逕剡縣始寧虞賓餘姚西北者皆是也謝康樂山居目擊為賦又自為注不應有誤惠連謂昨發今宿若錢清似不須隔宿餘暨乃蕭山舊名非諸暨曹娥未溺之前江固當有名且今曹娥廟當運河渡口故其名特著若稍南稍北又自不以曹娥名謂當時曹娥名未著亦名浦江似與酈説亦未甚抵捂但身則實未至浙東秪據籍􅕍括不免稍有淆錯耳南湖考明陳善餘杭居天目萬山之下苕溪一帶下貫杭嘉湖三府大禹築塘名西海險塘諸水併瀉於溪不能驟洩以致漂没居民漢熹平間縣令陳渾開闢南湖一萬三千七百餘畝分殺水勢漸洩歸海原坐税糧派分各縣辦納逮唐寳歴間縣令歸珧誓死築塘大功克就及宋崇寧間蔡京欲請佃業縣令楊時奏阻之此三令皆有功於湖繪祀血食名三賢祠國初永樂間軍民計移籽粒為田耕之不能蓄水以致決塘漂没民居事聞於朝命尚書夏原吉通政趙居親臨勘明前項移糧並無升合在湖一槩剷平成化間土豪徐果等圍佔成田廵按吕鍾問罪解京田勒還官𢎞治間水利郎中臧某臨湖勘踏將各圍佔湖田一畝陞榖一石毎地一畝陞榖三斗毎蕩一畝陞榖二斗俱候秋成另倉收貯所築圍埂亦盡掘毁務令坦平意在蓄水利耕實非陞榖也豪民乗此紊佔獲利又不納榖甚為失䇿正德間水利郎中沈某經行本縣曉知南湖囊蓄天目萬山水勢保障三府行府查追各佔湖田稻榖築隄造閘盡將莊房竹木折毁通行開濬還官勒碑三賢祠内卒莫能禁嘉靖十八年豪家徐衢等復行佔據本縣知縣陳天貴申達廵按御史傅鳯翔通判王宗尹親詣湖所酌量水勢議將湖南五畝塍築砌滚壩一所寖盈寖洩徭編壩夫一名㸔守沿湖立碑永禁侵佔所圍土埂一槩剷平會陳令以遷秩去末底成績嘉靖二十三年奸民張景魁將湖田隂獻戚畹邵氏為䕶墳田事聞於朝勅令邵氏讓還官田嗣有豪軍張洪張鏞托名籽粒告佃廟山頭田七十三畝混佔半塘湖心田百餘畝共已二百餘畝矣前此徐衢等侵佔之田轉相貿易夫南湖之濬塞三郡之利害所關奸民規佔為害已甚更復展轉貿易忘非已有乃吏兹土者聽其藐法無忌不加究詰嘉靖三十四年縣民葛臣等將前侵佔之害聞於水利道王詢富陽令桂軏本縣令吳應徴勘得餘杭南湖原有上下二湖以便蓄洩今上湖民間佔據無餘惟下湖賴以蓄水又欲承佃不已漸不可長計其原蕩約有千數餘畝近存未佃尚有三分之二若不及今修築堰壩囊蓄水勢則貽患居民有不可勝言者矣蓋南湖本以蓄水堰壩不修則洩一洩則涸蓋湖蕩泥深而土沃耕之則為肥田不耕則為茂草故豪民便壩不修樂水速涸其涸也歳收膏腴厚産獨享其利其澇也坐視漰湃巨浸而不與其害餘杭一邑利壩不修而錢塘安樂鄉十有六里之小民實有剥膚之害也以故本鄉之民先年皆自用財力修築堰壩石易傾圯而奸豪又從而隂決之湖下小民幾為魚鱉蓋此湖乃重利所在而近湖皆豪右之家今不修築堰壩其勢必至於盡佔而後已將來無此湖則無安樂鄉十有六里之小民矣故欲息争訟在夫絶請佃而修堰壩蓋堰壩修則水可以長蓄既蓄水則湖不可以為田既無佃種之利則豪右自不至紛紛請佃而居民亦可免歳歳之告争矣且請佃者不過軍餉而已今查徐後等各侵佔湖田節經勘結承納佃價税糧及至追徴揑稱荒蕩遷延不納今官湖皆為勢豪私佔而税糧無絲毫入官且南湖未耕佃之先國課未聞減耗南湖既請佃以後軍餉未見充盈奸民蔑視憲禁侵佔不已上湖既已湮蕪下湖日漸填塞是沿湖數姓獨享其利而浙西三郡均被其害也近因羣奸欲決開滾壩下流居民哀鳴於上事下所司查勘乃用耆民費錢洪等議要將壩加添三尺免致水往南來保全三府田地仍照原議先將馬澗水灘二處内外深塹趂時填塞厚培塘基毋令坍塌其滾壩悉依水利道所定東池用大長樁木釘入實地然後加以大石務令堅固可垂久遠仍將五畝塍兩旁隙地召募勤實農人管種免其租税責令㸔守塘壩如有奸人肆釁盜掘洩水者即便呈縣拏問申處以警其奸又於湖之東北隄及五畝塍一帶立置石碑二十上刻察院禁諭永遠不許侵佔敢有倚恃勢豪仍舊圍田蓋屋者許諸人首告照先年奏准事例從重問治立界遵行是故思患預防勞身焦思當事不避居謗不疑一洗積弊以垂永利毋使陳歸楊三君子專美於前誠有望於當事者庸書以俟國朝西湖考王晫吾杭西湖名勝甲天下其盛自唐宋迄今笙歌畫舫無虚日甚至異域亦有披圖而歆羨者然天下之以西湖名者不一不可不知也即如浙屬湖州衢州嚴州寧波温州皆有之長興縣有西湖在縣西南五里一名吳越湖相傳吳王築吳城輦土於此遂成湖溉田至三千頃此西湖之在湖州者也龍游縣西南有西湖宋馬天驥擬杭之西湖開此以備游覽此西湖之在衢州者也嚴州府城西南有湖唐刺史侯温開亦名西湖寧波府治西南有月湖十景為四明遊觀勝槩宋時文人多有題咏亦名西湖謝靈運有詩曰側聽既窈窕環洲亦玲瓏仰視喬木杪俯臨大壑深此為温州府城西之西湖作也嘗讀元氏掖庭記燕京城北三十里有玉泉山山半為吕公巖帝於夏月嘗避暑於北山之下曰西湖者其中多荷蒲茭芡又開州城西南夏秋時秋水數百畝澄鮮若空曰西湖是北直有二西湖矣舊西湖在華亭城西南隅一水縈紆渟浸可百餘畝其上有西湖道院按舊志西湖在府西南二里周三里晉為陸氏養魚池又潁州西北亦有西湖長十里廣二里景象甚佳宋晏殊歐陽修蘇軾相繼為守皆常宴賞於此是江南亦有二西湖矣其在河南歸德府睢州有西湖開封府則有兩西湖一在許州周九里一在鄢陵周二里若孔武仲詩亭下湖光凝不流及百尺樓臺醮新緑之句皆所咏汝寧府城西之西湖也又云汝州城西有西湖一名龍塘坡其水四時不竭灌田千餘頃其在湖廣沔陽州東南一百五十里有西湖景陵縣西湖即唐陸羽傳所云景陵縣西湖有鴻雁集陂橋上是也孝感縣之西湖村宋太祖微時嘗索酒村姥姥持酒進言𣙜禁甚嚴此私釀幸密之後登極為弛西湖酒禁其福建西湖之在福州府城者湖上舊有山越王無諸時一夕飛往臨海郡西湖之在漳州府城西者泉極甘羙可辟瘴厲上有緑蘿幽勝古諺云圓山嘯西湖平此時出公卿蓋指此也而長泰縣西又有西湖池考之四川成都崇慶縣之西湖湖中亭館回環乃一州之勝漢川之西湖有金龜亭偽蜀武成三年庚午六月五日廣漢太守孟彦暉奏有金龜九寸遊於西湖荷葉之上繪圖以獻叙州富順縣有西湖輿地紀勝云西湖周三里有洞窈邃昔有入洞者見二女櫛髪於洞間遺以石鏡其人致富百倍一云水冽多嘉魚菱芡蒲荷充滿其中范石湖吳船録云由青城縣二十里至周家莊十里至蜀州郡圃内西湖極廣蘆花正盛呼湖船泛之繫纜修竹古木間景物甚野為西川勝處至於廣東潮州府治西有西湖焉綿亘十餘里山色湖光厯厯如畫宋陳堯佐故有詩曰附郭水連山公餘獨往還廉州府城有西湖焉上有平湖書院宋寇準蘇軾蘇轍相繼謫此東坡嘗有西湖平狀元生之語瓊州府城西有西湖焉一名頓崖潭天下西湖之最大者莫如廣西桂林府之西湖環浸隐山六洞廣七百餘里按范成大志云隐山六洞皆在西湖中隐山之上一曰朝陽二曰夕陽三曰南華四曰北牖五曰嘉蓮六曰白雀泛湖泊舟自西北登山先至南華出洞西西至夕陽洞窮有石門可出至北牖出洞十許歩至朝陽又西至北牖穴口狹隘側身入有穴通嘉蓮西湖之外既有四山巉巖碧玉千峯倒影水面固已竒絶而湖心又浸隂山諸洞之外别有竒峯繪畫所不及廣輿記載雲南亦有西湖在府治西周五里即滇池之上流蒲藻長青人多泛舟遊賞夫同是西湖耳獨杭州之西湖愛之者比於西子嫌之者等於銷金鍋又有為之解者曰西湖日銷寸金日生寸金議者紛紛而西湖自若也嗟乎造物忌名西湖且然况於人乎説鑑湖説上宋王十朋東坡謂杭之有西湖猶人之有眉目某亦謂越之有鑑湖猶人之有腸胃二湖之在東南皆不可以不治而鑑湖之利害尤重昔東漢太守馬臻之開是湖也在會稽山隂二縣界中周圍三百五十餘里溉田九千餘頃湖髙田丈餘田髙海丈餘水少則泄湖歸田水多則泄田歸海故會稽山隂無水旱之患自漢以來更六朝東西晉隋唐五代錢氏千有餘年民受其利至國朝之興始有盜湖為田者然其害猶微盜於祥符者一十七戸至慶歴間為田四頃當時三司轉運司猶切責州縣使復田為湖自是而後官吏因循禁防不謹侵盜愈多至於治平熙寧間盜田者八千餘戸為田七百餘頃而湖寖廢矣然官未嘗不禁而民亦未敢公然盜之也政和末有小人為州内交權幸專務為應奉之計遂建議廢湖為田歳輸所入於京師自是奸民豪族公侵强據無復忌憚所謂鑑湖者僅存其名而水旱災傷之患無歳無之矣今佔湖為田二千三百餘頃歳得租米六萬餘石官吏徒見六萬石之利而不知九千頃之害縱知九千頃之害而不知湖廢其害不止於九千頃而已也蓋鑑湖之開有三大利廢湖為田有三大害天之大水大旱不常有也至小水小旱何歳無之自廢湖為田雨稍多則田已淹没晴未久而水已竭矣説者以為患雖及九千頃之田而公家實受湖田六萬石之入嗚呼何不思之甚也夫有災必訴訴必檢檢必放得湖田之租失常賦之入所得幾何失常賦而以區區之湖田補之猶可也九千頃之民田所失不可勝計又何以補之耶王者以天下為家所入亦廣矣豈利六萬石之入而以病民耶况湖田在今日暫有所入而他日亦將同九千頃而病矣湖盡廢則湖之為田者其可耕耶今之病水旱者不獨九千頃之田也雖湖田亦告病矣無湖則九千頃之膏腴與六萬石所入之田皆為黄茅白葦越人何以為生六萬石又何從而入耶此其為大害一也鑑湖三百五十八里之中蓄諸山三十六源之水雖遇大澇而水不為病者以湖能受之也今廢為田三十六源之水無容納之地萬一積雨浸淫洪流滔天水無所歸則必有漂廬舎敗城郭魚人民之患嘗聞紹興十八年越大水五雲門都泗堰水髙一丈城之不壞者幸也假令他日湖廢不止於今而大水甚於往歳則其為害當如何此廢為田其大害二也自越之有鑑湖也歳無水旱而民足於衣食故其俗號為易治自東都以來守會稽令山隂者多以循吏稱見於史傳者不可一二舉也非必昔之守令皆賢也蓋民居樂歳之中家室温飽其為善也甚易比年以來獄訟繁興人民流亡盜賊多有皆起於無年之故去秋災傷致訟山隂會稽尤多非昔之民皆善良今之民皆頑鄙也禮義生於飽煖盜賊起於饑寒其勢然耳此廢湖為田不獨耕者受其病獄訟盜賊皆此之由其為大害三也自祥符慶厯至今建復湖之議者多矣而湖卒不可復非湖之不可復也異議者有以搖之也異議者得以搖之亦建議者之未能深究夫利害焉耳建議者曰湖廢則九千頃被害不可不復異議者曰九千頃雖被害而常賦不失以湖為田而官之利為多此建議者卒奪夫浮議之口使灼然知三大害以折異議則復湖自不可已也鑑湖説下宋王十朋廢湖有三大害固矣然亦有三難搖於異議一也工多費廣二也郡守數易三也今之佔湖為田者皆權勢之家豪强之族也侵盜已久一旦欲奪而復之彼必游談聚議妄陳利害曰勞民也費財也失官租也有科率之擾也無積土之地也爭為異説以沮害官吏方墮於因循茍且之習復為有氣力多口舌者之所動移而欲冀成功能乎此搖於異議一難也昔人嘗計濬湖之功矣日役五千人浚至五尺當十五歳而畢此張伯玉之説夫用工如此之多厯年如此之久其為費何如今不浚湖而財用猶不給况興至大之役有不貲之費耶此工多用廣二難也守令之於郡縣久任乃可以立事况鑑湖之開非一歳一時所能畢今之為守者或一歳而遂遷或半歳而遽易湖之利害不暇問知與不知不暇治其間慨然有志於開復者功未及施而去期已廹矣後來者所見不同屢變前議以數易之守而欲興浩大悠久之役可乎此郡守數易三難也湖不可不開而厄於三難是終無䇿以開之耶某切謂欲遏浮議不可不白利害於朝廷如向者經界之行於天下固有不樂其事而動搖之者多矣然經界卒行而民受其利蓋朝廷主之則事無不成者况一鑑湖耶異議者不過曰勞民費財耳夫勞民費財於無用不急之務則不可如鑑湖謂之無用不急可乎自湖之廢也歳多災傷細民艱食今於農隙募民浚治官出財民出力兩有所利民雖勞而不憚財雖費而不虚矣彼又曰官失湖田之租民有科率之擾夫鑑湖之開千有餘歳矣昔無湖田之租國不以不足為病豈今日獨少此耶况湖復而民利興常賦不失民無凶荒之訴官無檢放之煩較其所得與今孰多至若錢米之費一出於官而不取於民竹木之具雖資於民而盡酬其直胥吏有從而擾民者則嚴法以治之尚何科率之擾耶人多謂湖可開而土無所歸昔吳文長常論之矣今湖之側曠地固多擇其利便隨其遠近積泥塗以為邱阜非所患也沮浚湖者不過數説而皆有以折之尚何浮議之足恤耶謂日役五千人浚至五尺十五歳而畢者蓋通三百五十里之間而計之也某謂今之浚湖未能舉三百五十里而盡復之自熈寧以來建議者立兩存之説有牌内牌外之限今牌尚存而牌内亦盜而為田矣為今日計當先復牌内之湖其用工固有間自牌以外以漸治之可也所費之財自本府經畫外又當請於朝乞湖田所入之米以為雇工興役之費朝廷捐六萬之米不為多湖得此以辦事則沛然有餘矣復湖必遲以歳月之久有久興之役無久任之官以主之則異議一搖久必中輟又當請於朝置開湖一司於越命守倅帶提舉主管之職如勸農學事之𩔖又命二知縣分董之舊日會稽山隂知縣皆帶提舉鑑湖事守既職其事則必任其責雖遷易不常而後來者不得不繼非其術同職使然也又倅終任以管其事令終任以董其役則責益有所歸命監司督察俟湖成之日凡主其事董其役者皆次第加賞如是湖不患其不復也昔論復湖之利害者多矣莫如曾子固子固之言曰謂湖不必復者曰湖田之入饒矣此游談之士為利於侵耕者言之也使湖廢則湖田亦旱矣謂湖不必浚者曰益隄壅水而已此好辨之士為樂聞茍簡者言之也以地勢較之壅水使髙必敗城郭矣二者既不可用而欲禁侵耕則有蔣堂賞罰之法矣欲謹蓄泄則有杜杞啓閉之法矣欲痛絶佃者則拔其苗責其力以復湖而重其罰又有杜杞之法矣欲知浚湖淺深為工幾何為日幾何增隄竹木之費幾何使之安出伯玉已計之矣誠能收衆説而考其可否在我潤澤之則何功不可成何利不可復子固昔倅越知鑑湖利害為長故并記其畧有能舉行子固之言而不棄某之兩説則湖庶乎可復不然則姑存以俟馬臻再生可也浙江潮候圖説元褧伯宣凡水之入於海者無不通潮而浙江之潮獨異地勢然也浙江之口有兩山焉其南曰龕山其北曰赭山並峙於江海之會謂之海門下有沙潬跨江西東三百餘里若伏檻然潮之入於江也發乎浩渺之區而頓就斂束逼礙沙潬回薄激射折而趨於兩山之間拗怒不洩則奮而上躋如素蜺横空奔雷殷地觀者膽掉渉者心悸故為東南之至險非他江之可同也原其消長之故者曰天河激涌曰地機翕張揆其晨夕之候者曰依隂而附陽曰隨日而應月地志濤經言殊㫖異胡可得而一哉蓋圓則之運大氣舉之方儀之静大水承之氣有升降地有浮沉而潮汐生焉月有盈虚潮有起伏故盈於朔望虚於兩弦息於朓朒消於朏魄而大小準焉月為隂精水之所在日為陽宗隂之所從故晝潮之期日常加子夜潮之候月必在午而晷刻定焉夘酉之月隂陽之交故潮大於餘月大梁析木河漢之津也朔望之後天地之變故潮大於餘日寒暑之大建丑未也一晦一明再潮再汐一朔一望再虚再盈天一地二之道也月經於上水緯於下進退消長相為生成厯數可推毫釐不爽斯大地之至信幽贊於神明而古今不易者也浙江通志卷二百六十七
