body:
  text: 浙江通志卷一百八十七人物八義行上周官六行孝友之外兼重睦婣任恤葢好義雖由性生亦感孚於風教然也兩浙義門如㑹稽裘氏浦江鄭氏皆足樹範鄉閭流芳簡策況生逢聖世徳教翔洽孰不喁喁嚮化以成一道同風之盛也歟志義行杭州府晉孫拯晉書陸機傳拯字顯世呉郡富春人呉平後為涿令有稱績陸機既為孟玖等所誣収拯考掠兩踝骨見終不變辭門生費慈宰意二人詣獄眀拯拯譬遣之曰吾義不可誣枉知故卿何宜復爾二人曰僕亦安得負君拯遂死獄中而慈意亦死南北朝范叔孫宋書本傳呉郡錢塘人少而仁厚固窮濟急同里范法先父母兄弟七人同時疫死惟餘法先病又危篤喪尸經月不収叔孫悉備棺器親為殯埋又同里施淵夫疾病父母死不殯同里范苗父子並亡范敬宗家口六人俱得病二人喪没親隣畏逺莫敢營視叔孫並殯葬躬䘏病者並皆得全鄉曲貴其義行莫有呼其名者孝建初除竟陵王國中軍不就范元琰梁書本傳字伯珪錢塘人家貧惟以園蔬為業嘗出行見人盜其菜元琰遽退走母問其故以其實荅母問盜者為誰答曰向所以退畏其愧恥今啟其名碩不泄也於是母子祕之或有涉溝盜其筍者元琰因伐木為橋以渡之自是盜者大慚一鄉無復草竊天監九年縣令管慧辨上言義行揚州刺史臨川王安辟命不至十年王拜表薦焉竟未徴卒於家時年七十五代褚雅茅山志字元道錢塘人梁术隠句曲山中輕財重施拯物無厭營田若熟以乞貧者與人共居常早起灑掃取水徧以周給覓樵薪乞人夏月種𤓰任貧人來取不計也張儼咸淳臨安志餘杭人好學有賢徳不樂榮利嘗開圃種瓠以所貿錢造橋俗謂葫蘆橋宋焦中山海寧縣志鹽官人素好義自雍熙四年尸祝許睢陽至天聖九年遂捨地祠張許並塑其像時王可回曰中山一邑義士因名其坊曰忠義俞舉善成化杭州府志錢塘人異世同居號義門眀道二年旌表門閭葉曙西湖㳺覽志餘字杲卿錢塘人授桂州司法家故饒財諸弟盡用之而求異籍曙喟然曰家事至此繇吾禄不足以聚親族耳汝曹何咎在桂有呉謐為象州武儀令而死其妻挈二女歸閩至桂而妻又死曙哀其無歸娶為二子婦焉何押録夷堅志餘杭縣吏自壯嵗為小胥馴至押録持心近恕畧無過愆前後縣宰深所倚信又兼領開拆之職每遇受訟牒日拂旦先坐於門一一取閲之有挾詐姦欺者以忠言反覆勸曉之曰公門不可入所陳既失實空自貽悔何益也聽其言去者甚衆民犯罪麗於徒刑合解府問顧其情理非重必委曲白宰就縣斷治其當杖者又往往諫之使寛嘗置二竹筒於堂時擲三兩錢或一錢於筒中諸子竟不深曉迨謝役壽終始告之曰吾免一人徒罪則投一光錢於左筒免一杖罪及諭解一訟則投一糙錢於右筒剖之皆充滿無餘地遂卒後十年子鑄登儒科紹興中位至執政累贈其父太子少師蔣崇仁西谿梵隠志杭郡人居興徳坊喜賑施每秋成諸榖即湧貴如元值售之且聽糴者自量或捐與饑者終時屬二弟力行好事里人徳而祀之元賈執中海寧縣志字希賢與弟用中並負俠好施承父志建義塾於家奉先聖像配列諸賢後立講堂祔從祀主備禮器倉庾庖湢所儲經史百家言割贍田八百畝聘名師􅊩之教其邑之子弟隣郡之士聞風而來相與講義洽聞咸取具於此至正十八年事聞授執中山長栝蒼劉基有義塾序賈用中萬厯杭州府志執中弟海寧州黄岡人捨田百畝入儒學州牧上其事於郡先是州之人士未始有與計偕者己亥賈二子祥麟祥鳯俱中式馬宣教海寧縣志宣教以行稱萬十一其先汴人宋靖康間扈從南遷徙居鹽官黄灣里煮海致富值嵗浸羣滷丁將散去宣教出粟賑貸猶不贍變產殖以活之已而家益饒與黄岡賈氏兄弟並以貲甲一郡復起樓聚書萬卷延徐一夔貝瓊諸名儒教其子弟亦同賈氏義塾云時元末兵起張氏據呉方氏據越所在殘破而靈泉一鄉獨全則宣教保障之功居多何宗實楊維楨何宗實墓誌字誠甫其先由東平徒杭遂占籍為杭人仁孝慈愛所得俸奉母外以覃於族兄宗茂同居無間言妹一人適戴氏戴没給養其家子女為之嫁娶隣婦有哭甚哀者問之喪其良人貧無以治棺即賻之他日婦至請傭以償直曰周汝急豈望報乎婦謝而去朱景仁兩浙名賢録海寧人事父母以孝聞待宗族煦然有恩外婣亦如之交友敦相恤之義元季四方衣冠之士避地海寧者景仁悉解衣推食與同甘苦屢徴不就自號貞白道人眀朱燧杭州府志字質夫海寧人父圭以明經起家嘗捐腴田以益學廩宣城貢師泰知名當世至正末道􅠹居寧之北郭燧具舟迎歸其家後貢卒燧為經紀其喪捐地以葬别置田供祭明初㑹詔興學杭守辟之講藝錢塘侍御史薦於朝除粤東寧逺令柴望成化杭州府志字宗禮錢塘人為人樸茂見義輒為有友栝蒼金觀者前元某州學官退居錢塘母沒病不能葬以哀毁沒而其妻繼殞望哭曰吾友之不幸至是哉且子孱弱三喪在前吾責也乃捐貲治葬事及告於觀所常往來者因得舉從其先兆葬焉人義之徐一夔為作義行記孫適萬厯錢塘縣志字孟傳博覽羣集有詩名孝親友弟弟迪官禮部少與翰林王洪善洪家貧親老禄薄不給適周之始終弗渝善行草尤精於素問鍼炙之術隠居甘泉里有東巖老人集劉均美西湖㳺覽志號閲耕錢塘人世以醫名讀書通大義待異母弟如同母讓產悉與之洪武間以閭右徙實京師仍以醫行喜居善藥售不二價又喜施故四方持重價走均美市藥者日無算而貧無錢走丐藥者亦無算均美旦起視丐者先之而後及市者郡人許昉逰國學貧無以自給均美延之家昉死為之殯斂歸其棺年九十而卒盛濂張允修盛濂傳於潛人天性至孝親病殁哀毁幾絶兄弟五人濂居長教之耕讀終其身不分析比閭族黨間雍雍如也宣徳四年邑大荒濂出粟六百石賑濟全活甚衆輸金築黄泥堰溉田三千餘畝建青檀橋濟人徒涉復置田為修葺費以垂永久胡瓊杭州府志號靜菴臨安人正統間有皇木之役前此有以是役破家者時嵗大饑民不能完公費繋獄者衆瓊輸已資五百金以完其役里民徳之呉思敬餘杭縣志餘杭人好周人之急正統六年發榖一千五百石賑濟饑民奉勅旌表夏誠成化杭州府志字與誠鄞人徙居仁和勤儉喜施而尤敦於族隣姻故㛰嫁族孤子女殮葬親友之貧者十餘人遇嵗儉每罄所積以貸無所責償復值大侵饑餓盈途誠計家所餘米千餘石歎曰豈忍一家獨飽哉乃盡出以助官賑部使者以聞正統七年錫璽書羊酒復其家仍勅有司為樹門湖州墅居人自其先已冐官河禁傳之子孫無覺者後有覺而陳之官將悉逮理之誠一言釋千數百家之離析信義行於鄉為不善每有懼誠知而中輟者鄉以司直稱長子醇亦以義輸粟授冠帶官陳昊萬厯杭州府志字宏夫仁和人初贅顧氏生子鑑妻亡昊年二十五人勸其繼娶昊曰吾實有子以承祀事忍復求偶以負吾妻耶有兩女弟皆貧而嫠昊為周給之甚厚蔣暉成化杭州府志字廷暉錢塘人重友道一時同事貧不給者居停周給其有殁者復為殮殯歸其柩且為經紀其後而已與妻子不免饑寒弗恤也黄養正姚震咸有學行在謫戍中暉辨其寃後皆至顯官暉平生惠利人未嘗有所責報亦未嘗以語諸人故咸以長者稱之孫顯宗富陽縣志字存義惠愛霄井村人成化甲午遭歉嵗殍夫塞途捐粟二千石以賑鬻子女者贖之稱貸者贈之賴以存活者不可指數事聞召至闕下欲官之堅辭乃於光禄寺賜宴授正七品冠帶遣還既而復命地方官咨送其孫景南以諸生入鴻詞選顯宗欲其子若孫自以勤勞致富貴率景南陛辭乃已於是降勅旌表為尚義之門樹坊當道王斌舊浙江通志臨安人成化二十一年助穀八百石賑荒三院題請勅建尚義坊賜以冠帶呉定逺萬厯杭州府志錢塘人嘗於湖州墅孔公銓家買客桕油五十石計直當百金立劵三日發油半月歸直劵成次日客寓火呉率人往救之至則油室已在焰矣客哭曰油故假本於人今何以償之有死耳踊躍欲赴火呉急抱止之曰油既有成劵即我貨矣若何與半月後來取值耳客猶未信呉因與俱歸數日即措銀如劵歸之客拜祝曰碩公生貴子以報徳泣謝而去呉後生子瓚登進士官至通州守董慧海寧縣志字如魯富而好行其徳景泰甲戌嵗饑輸榖四百石成化癸巳海決民流又輸六百石丁酉大饑又輸千石有司例授以承事郎强之冠帶力辭又輸千石以為備荒計其他置義田葺文廟掩骼建橋諸善事未易枚舉程瑺杭州府志號栗夫臨安人性孝友崇理學捐已地為文廟壽九十三詔賜冠帶馮悦萬厯杭州府志字景和錢塘人𢎞治中有縉雲施三二者以讞訟於憲司桎梏抑歸有所攜二百金懼為途人所侮托寄於悦家施歸而卒其子不知也久之悦呼其子雲還之封識如故雲欲讓其半悦不受翁鐘呉遵晦翁鐘傳字子聲仁和人事繼母如所生有族叔亡其室貧不能自存鐘養之仍周旋其子女尤親禮貧交急患難厚施而不責其報傭有竊鐘金聘其妻者妻家悔婚願歸所竊鐘惻然謝無有凡環鐘里居者千餘家饑取食寒取衣婚姻死葬取經費俱不置劵即有劵而人負之固不較也一時賢士大夫重之號為西泠君云俞鉷臨安縣志好施與嘉靖初輸粟二百石濟荒助濬西湖銀五百兩撫按上其事贈承事郎歸潩陳昱丁仕卿萬厯杭州府志潩字源之錢塘縣南良里人前仁錢兩縣額辦馬價計毎丁出銀二錢有竒潩陳牒臺司請均之各邑奔走經營岡恤勞費嘉靖癸巳杭守婁志徳為議丁祇徴銀一分七釐九邑均無羸縮民省重賦又錢塘陳昱西壁人以兩邑僉報總甲之役擾民陳牒分巡康朗康下之邑議覈戸貧富定為上中下法多寡徴銀僱募充役均稱便焉又上虞人丁仕卿寓杭為東里坊之社教讀見㑹城之民憊於夫宿亦投牒當路謂官夫百七十名足備撥遣夜巡之役既戸出間架錢以召募總甲火犬而復差及保甲俾民財力兩敝請俱罷免事下諸司議徼巡員役以不便其私訐仕卿撓亂成法聽者不加深察嚴行箠楚桎梏回越者三矣萬厯二年仕卿仍來杭陳請再下兩邑議咸是之自是前兩役悉就蠲除又慮嵗久法弛更陳牒督府徐栻樹石垂逺錢塘陳善合三人為之論贊沈璋丁養浩沈璋傳字廷器號存濟仁和塘西人生平慷慨好施塘西為省㑹巨鎭水勢直瀉自宋元以來民居聚散不常堪輿家謂宜於鎭之東北隅建傑閣以當水之衝璋即捐貲就古清流亭舊址闢基構材建千佛閣髙二十餘丈立殿宇禪堂欎為叢林費貲以萬計里中賴以安居正徳己卯嵗大侵璋煮粥飼飢民越兩月全活無算又發廩米四千餘石以貸貧者次年大熟人俱倍息來償堅却之曰吾以周貧非以邀利也焉用償於是鄉人咸稱為孝義沈家子哲合州司馬孫修山東右布政徐江山錢塘縣志字六橋正徳辛巳進士官尚寶卿性耿直敢言夏言與曽銑受禍無敢白其寃者江山首上疏申救陶仲文段朝用以方術得幸江山力辨其奸雖數觸上怒然心知其不阿勿為罪又馮恩繫獄中子行可刺血寫疏自縛闕下江山力贊通政為引奏得末減其好義如此應眀徳杭州府志字養虚海寧人嘉靖癸丑進士授刑部主事時楊繼盛奏劾嚴嵩十罪五奸有㫖先下鎭撫司搒問究主者嗣發緹帥杖一百送刑部擬罪楊瀕死再蘇提牢皆奸黨也明徳獨檢湯藥視飲食者十四日復説尚書出之老監遷於外庫或訹以重禍勿懾也錢科錢塘縣志科敦行尚義嘉靖間連嵗洊饑當事設法勸賑入粟五十石者附學入監時科已出貢捐賑獨多巡按舒汀提學孔天允特請照景泰例已冠帶者陞其級授正六品職不支俸科又自設粥厰拯濟里民所居近渡船埠後架木橋徑曲險濘多溺者科特闢所居屋直衢達河且甃石為大橋行者徳之稱南橋以别於横河東西二橋科後遂以南橋為號更名其橋曰萬安呉元良兩浙名賢録字子匡錢塘人性樂施以節俠自喜父沒遺劵數十紙中屬杭人者計資可千餘緡元良悉召其人語曰吾書生雅不習收責事諸君各取劵去有固郤者元良勉之曰無庸俟若盈時割餘以佐我酒貲不後也皆感謝去其外屬呉人者貲略稱是元良不知其家特造呉市中焚之語市人曰碩傳語鄉閭有負杭呉長公責者吾已焚劵無煩歸直也時華亭徐相國階督學兩浙獨髙元良竒士厚禮之而元良裁謝外一不涉干請亦未嘗以此矜於人傅昇舊浙江通志號竹亭錢塘人眀經授王官淮安馬試無子娶妾嫡不容以贈昇昇辭不得有姊失眀不字昇即以其妾與同寢處試妻亡昇仍以其妾歸試後生二子初胡給諫麟謫台幕其子將之台寄二笥於昇子竟溺於湖後昇取二笥還麟封識宛然如故郭文範黄汝亨郭文範傳號型伯海寧人與弟友愛族子有鬻身為人隸者贖還之迎養寡姑與繼母同居者三十年邑之倉大使翁煌者虧糧坐法將鬻已女為妾文範輒輸金與贖兼資給歸之金陵更代償徽人呉兆大百金及廪無告老叟陳郊五年而沒曰於我殯凡里族故人之不能婚葬者時時給之慮弗逮晚年作生誌自號蝶栩子董欽餘杭縣志少敦孝友好施與祖父遺資悉公之族黨萬厯十五六年間嵗侵饑饉載道米價湧至一兩八錢發米三千石以賑之全活甚衆三院題旌立尚義坊於縣治之東南又安樂塔闗一邑文運欽因頺圮特為改建増五層為七層稱一邑壯觀又建文昌閣橋於南渠河以聚秀氣年八十五終子汝洲紹述父志乾嶺地僻往來嘗患虎盜為建亭觀俾人有依庇濬築龍潭便一方取汲陳灼杭州府志昌化人國子生豁達好施赴急困然諾無茍萬厯庚戌有司議造飭學宫方捐俸倡助無應者灼慨然請於令一切身任之凡費二千七百有竒旬月告成及殁祀鄉賢祠周棨富陽縣志號平齋少孤兄某主家政兄死始操家務見子錢契劵年稍逺者累數千金歎曰田園亦足自給何必營營為作三布囊束於卧樓之梁或持鏹償者告曰舊契已毁不取矣萬厯戊子嵗大侵煮糜十數缸陳於恩波橋以食餓者數月不倦或斃於賑所即為棺殮之陳中漸舊浙江通志字風山海寧人為名諸生喜周人急所貸予嘗焚劵不責償市有持膺銀行哭甚哀問知為里儈所欺即自探懐中銀如數與之有丁氏鬻房產既受價徙矣復據之中漸憐其貧為更授價及割他產予之有韓太史者嘗負中漸債已死其妻齎錢幣請償中漸謝不受某氏女坐怨家誣衊不能自眀中漸挺身御史前白其寃年五十五卒子與郊與相並中進士贈給事中周柯杭州府志號一巢富陽人樂於為善遇嵗歉捐粟賑饑有疾疫捨醫藥棺柩寒即施衣纊人有急難多方周濟間有鬻妻質子者必傾貲贖之里人共推為長者俞良謨海寧縣志字龍淵好陳民間利弊一議甦鹽竈之困一議豁解役之繁為公事破家沒齒無怨寧民利之闗大生舊浙江通志字玉門錢塘人性任俠家致千金隨散去戚黨中多賴以舉火里中貧兒負急債欲鬻其妻大生代償之使復完聚有中年患瞽不能治已去為丐延至家療之瞽旋復眀冬寒大雪親煮粥分給全活無算呉憲舊浙江通志錢塘人性謹厚喜義舉初徽商子弟不得與杭州試憲力請於巡鹽上疏報可乃立商籍得入泮於府仁錢三學如民籍之數徐季韶杭州府志字鹿園海寧人父輅與歸有尤陸樹聲為同年生季韶偕兩弟維揚繪觀肄業南雍時人目為三俊戊辰海嘯漂沒數十萬家隔江浮棺若鳧雁之集季韶斥腴田數十畝瘞埋之辛巳嵗大侵沿塘設粥厰十五所日費米三十斛又開藥局救瘟疫存活甚多呉元溟錢塘縣志字澄甫事繼母以孝聞女弟少寡無依迎養於家終身無間言故人程生負課千金久繫元溟即代償之崇禎庚辰嵗大飢出槖金往江右糴米五百斛悉散於親友與同郡王道琨華亭陳繼儒嘉定黄淳耀交俱有終始授光禄丞年八十二卒沈起虬王一竒舊浙江通志起虬字幼良仁和人崇禎辛巳嵗大饑鬻產市榖以賑有負漕而鬻女者代輸漕而還其女同里王一竒亦發榖三百石以賑飢隣家為官債所迫計鬻妻女將成劵矣王又代償三百餘金竟不責報王錫袞鄉賢留祀冊昌化人天啟七年官霍山知縣念父乞歸仁厚樂施嘗捐金倡率族人立祠沙干以奉祖先嵗時烝祀無闕宗黨姻戚時時有所賙予未嘗與貧佃較銖息崇禎十二年遇大侵出榖百餘石賑濟又每石減糶如常嵗里中賴以存活者甚衆又置義塚地於横溪橋國朝康熙十一年入郷賢祠章希義鄉賢留祀冊富陽人慷慨好施天啟中浙東大饑盡發所儲廩粟分給飢民賴以全活者甚衆宗族有不能婚嫁者為之捐資擇配不能就學者設義塾以教之代出修脯里中有爭鬬者必國朝曰寧為刑罰所加毋為章公所短康熙十五年入鄉賢祠嚴武順鄉賢留祀冊字訒公餘杭人太常大紀次子明季辛巳嵗大䘲武順力請當事勸里中大姓賑粟更經畫賑法俾官不煩而民普濟全活無算是時山寇蜂起户不安枕武順謀於邑長督修武備富者出財壯者効力延智勇士以保疆圉或難之武順曰富者出財非散儲也正所以保其富强者出力非藉捍也先令其不為盜巳而邑藉以寧三世同居家庭雍睦國朝順治十六年祀鄉賢祠陸竒鄉賢留祀冊錢塘人崇禎壬午舉人仁心為質輸粟賑饑多所全活建議修築海塘破產獨捐千金重建鎭海樓尤多隠徳遇色不亂解寃獄却暮夜金贖人婦女有客寄資旅亡道梗閲三載後國朝招其子付之封識如故康熈二十四年入祠國朝周之官公舉事實字待玉號純卿世居仁和以孝義稱父同氣五人皆友愛不析產人謂之義行周氏之官性好施與樂善不倦前眀庚辰省㑹大侵之官出家貲賑粥活人數千人子七人同居共㸑者四十年咸稱棣萼堂周王兆京鄉賢留祀冊仁和人家素封與兩兄析產盡以資財讓其兄眀末賊縛其兄子去是時產已罄無資為贖即走賊巢碩以身代賊取火灼其體無完膚曽道拾遺金坐守俟失者至還之御史表其廬康熙六年入祠邵泰卿舊浙江通志字九卿錢塘人經邦曾孫明崇禎辛巳浙大饑泰卿為粥以濟全活甚衆鄉賢留祀冊族人棺久暴者泰卿捐資購地瘞之顔所居曰樂善堂以子逺平貴封如其官康熙二十四年入祠童金焰公舉事實於潛人父病禱天祈以身代父病果愈弟早殀撫遺孤如已出性好施予崇禎間嵗飢饉輸粟五百石全活甚衆又邑中橋梁義渡凡所修建者三費皆不下數百金行人往來稱便項大章舊浙江通志字孟􅌢錢塘人眀崇禎辛巳浙大饑為粥以食餓者同里有負國租將鬻其妻大章捐貲代輸無徳色以子景襄官封𢎞文院檢討康熙二十七年祀鄉賢何爾彬鄉賢留祀冊於潛人順治三年拔貢厯陞禮部祠祭司主事潛邑處萬山中自縣南四十里七坑尤險窄峭壁五十餘丈直矗溪中其下小徑盤曲幾二里許行人往往失足彬鳩工築砌竟成坦道遇早災蠲榖倡賑人賴以安有姪十餘輩教育如已子親族待以舉火者數十家邑中重構學宫獨建兩廡顧景祚鄉賢留祀冊錢塘人順治丙戌拔貢任壽昌學博當兵燹之後宫牆傾圯捐貲修葺設立義學請増廣額改小學為中學致仕歸有鄉人負債鬻妻者出貲代償老友乏嗣贈妾續後凡善事靡不為之孫伯玉鄉賢留祀冊字美之富陽庠生孝友婣睦輕財好施每逢飢嵗輒發粟賑濟窮民賴以全活者無數順治初年山賊竊發所在剽掠邑令朱陞臣素知其急公好義屬以撫輯賊寇伯玉即持憲檄宣布徳意賊聞俱釋甲倒戈投誠分散内有飢寒切身不能存活者請發公帑散給之并竭家貲相助陳之閶海寧縣志字希亮海寧人候選兵馬司正指揮幼失怙恃持躬以禮雖燕居僕妾在御無惰容倨色遇有大興革及調遣徴發當事諮詢必抗言不阿並洞悉利弊切中機宜邑中頻經荒旱指囷賑饑必首倡焉或躬親散給毋令冐漏又寒者製絮襖施之流離者廩給之亡者給棺斂之嵗以為常復於西門外捐地為義塜毛應鎬舊浙江通志字叔成仁和人少孤母擕五百金挈應鎬往依族之分尊者既而不歸所攜母欲往詢應鎬以為尊行也且拊我久勸母勿言族有兩寡嫂迎養終身有貧不克葬無居址者悉為經理年八十一卒杭州府志子先舒好學有文名高允中鄉賢留祀冊錢塘人先籍餘姚遇饑嵗立粥厰於里門全活甚衆施棺掩骼交親貧者有所乞無勿應呉炌錢塘縣志字睿思四嵗母病不食炌號呼亦不食及母病稍瘥始進食一時競傳為異年十五家遭誣炌奮身庭質巡撫蕭起元韙之遂得白順治庚子嵗飢炌條議令十里置一局局設數村且捐貲為侣民不告災又嘗上巡撫范承謨七郡水利書凡萬餘言又代償疁民張佛鬻妻金皆義舉也許日章海寧縣志字崑生海寧人幼至孝父與母病疫刲股以進皆立愈稍長鋭意讀書經史無不成誦性好施予戚族中不能葬不能婚不能舉火者賙恤無筭偶入城見桎梏而呼號者數百人問其故乃欠官糧者約三千金歸即傾笥倒篋盡捐所有不足更轉貸以輸之買僕知衣冠後不責償更贈資使歸獲胠篋者素識其人贈金勸使改過以子汝霖貴歴贈光禄大夫禮部尚書陳之闇鄉賢留祀冊字始升海寧貢生封光禄大夫曲幼失怙哀毁盡禮奉母避亂盜掖之入巢委勸諭盜竟解散每遇歉嵗率先煮粥以賑流離樂善好施族戚里閭咸頌其徳與人交有終始遇失言愆儀輒面折之延師教子孫儀意兼至卒年八十八康熈四十九年入祠顧伯揆公舉事實號一齋海寧人少孤貧讀書勵行事繼母㠪盡色養事兄恭敬垂老無間言體先人友愛之意分授堂弟田畝俾得耕讀親知不能自存推解無徳色晚年子悅履督學山左迎養官署適當歉嵗命捐俸施賑全活甚多以悦履貴封如其官童養㢘鄉賢留祀冊昌化人持躬長厚處衆謙和捐貲修理學宫建文昌閣嵗旱蝗救濟貧人甚衆鄉里中死無所歸者買棺斂之貧鬻妻者捐金止之親友子弟有志誦讀者給以膏火勿吝汪以澄鄉賢留祀冊仁和人任刑部陜西司郎中居鄉多義舉嘗捐置祭產周䘏親黨凡貧不能葬及壯未有室者悉資助之賑飢施棺修學宫補祭器夏施蚊帳冬給綿衣濬川渠葺橋梁砌道路善行種種姊貧困守節餽膳金五十載不廢何嘉諌鄉賢留祀冊富陽縣庠生性尚義道得遺金係本邑蔣生鬻產完糧者立即還之至施棺木瘞遺骸散榖賑貧善行不可勝計友人胡紹宗疫死無所歸為殯殮其家數口族人有三世骸骨暴露者捐貲購地為合葬焉裘傚誠鄉賢留祀冊錢塘恩貢生性孝友母殁結素縵於柩側題曰永思廬伯兄早逝撫其遺孤成立人有急難叩其門即素不相識者必竭力以濟積逋數萬緡悉焚其劵不責償遇鰥寡困乏者嵗計所需給之至施藥治病掩骼埋胔行之四十年不倦以子充美官贈御史姚殿岳鄉賢留祀冊字鎭公仁和人家貧教授生徒事親孝養備至親卒獨力完喪葬并葬親族之不能葬者七棺兩次拾遺金俱候之以還失者年三十喪偶義不再娶孫有威鄉賢留祀冊餘杭人務篤行每逢嵗侵出粟賑饑免租貸息取貧者劵悉焚之然諾千金不易葛道眀徐元正葛道明傳字元亮仁和人幼倜儻善承先志厚待宗族七世祖後子孫蕃衍咸為堪輿所惑多浮厝未葬道眀毅然獨任卜葬二十餘柩同學江我正搆重獄道眀營解得釋與人交然諾不茍見義必為子寅中武進士選侍衛康熙四十四年道眀年八十三恭逢聖祖仁皇帝南巡跪迎道左賜元寶蟒縀卒年九十周麟舊浙江通志字渭濵錢塘久年十五母得竒疾三月不卧目為之眚入山遇老翁授以藥草疾始愈嵗饑經畫賑濟推解親族甚衆子禹吉博學能文張鍾發公舉事實字㑹生錢塘人兄弟三人鍾發以已身子女無多父遺產纖毫不受客遊新昌遇鄭逢可夫婦負債鬻身即解槖代償更給貲令其謀生有故人子沈國器早年聘金氏女孤貧未能娶出五十金為之婚康熙四十七年客逰嵊縣適嵗侵鄉民乏食即輸百金為倡更勸同逰及本邑富室捐貲煮粥饑民賴之施藥施棺樂善不倦壽八十有五高鳴鶴公舉事實富陽人嵗貢生授樂清訓導幼年自塾歸道拾遺銀十二兩掲單招失銀者隨有浦江木工陳君徳至驗明給還及長嬸王氏無後欲繼鳴鶴為嗣鳴鶴以非應繼力辭及嬸殁鳴鶴曰吾義不當繼而嬸氏厚意不可殁乃置田供祭祀捐修文廟購參連製藥施病疫者全活以千計遇嵗歉貸窮民榖石及年豐榖賤止取原借斗石不訃其價力不能償者即焚劵不復索邑有蔡某窮困借銀經商日久虧折無抵鳴鶴鬻已產代償之至施綿衣施棺木嵗以為常沈萬祥公舉事實於潛人慕義好施里有貧不能婚喪者出貲相助有負債力不能償者即焚其劵火延族人十餘家撤已屋居之并膳給焉每遇嵗飢出粟助賑有客死於途者為具棺殮造義塔於排嶺頭馬塢庵等處分别男女收蔵胔骼邑當江浙接壤行人往來不絶洪水泛溢橋梁盡圮重建新溪渡創木橋置田畝房屋以為久逺計重修馬谿橋亭口橋觀正橋鳯凰橋太平橋及天井潭之景坑橋雙溪口之泥鍾橋復於路口建亭施茶湯冬夏無缺前後邑令皆給匾以旌其義舉鄉飲大賓姚際晉公舉事實字錫蕃其先自休寧徙錢塘嵗貢生母疾刲股和藥以進遭父喪哀毁骨立墓在新安嵗時展省往返千里率以為常讓產於諸兄已僦屋而居後諸兄中落猶子婚喪悉為經紀撫其藐孤如已子性樂善好施凡成梁治途皆縮衣食為之而不喜近名如施藥餌則托之醫者施絮襖則托之友朋捨棺木則托之隣姓居鄉謙抑年八十子孫皆登科第猶徒步出入以子之駰官封翰林院編修弟際恒字立方仁和諸生篤學有文名著九經通論百七十卷庸言録二十四卷周垣公舉事實字輿衛仁和人年十一山寇竊發隨伯兄奉毋避居蕭山之金家塢寇至與母兄相失垣獨擕幼姪竄澤莽間晝伏夜行越數日得達母兄所姪賴以存及析產兄子四人各使倍已之半創建宗祠刊祖訓家規於内俾子孫世守其法有貧士館於家病不能歸留療之五年終不起乃厚為殮葬恤其孤而嵗給之家設藥局施病者逺近悉至凡三十年無倦色戚黨賴以舉火者不可勝計比鄰有以所居請售垣曰吾親見其由址構以迄落成吾焉忍居之乃給其所請之值而還其產子􅒴雍正庚戌殿試第一官修撰陳克鑑公舉事實字于人海寧人工部屯田清吏司主事寧邑學宫肇自有宋雖代加修葺然閲嵗既久漸不能支克鑑慨然身任不惜重貲捐已產設義塚骨塔於本邑十八都收瘞無主遺骸中表閔凱度物故無嗣為理葬事三喪並舉族人陳亦堂客死都門醫藥殯殮悉為措置復歸其旅櫬陳泰交中年未有家室憐其宗攴欲絶力為婚娶孀婦殳金氏餬口無貲給還伊夫所鬻產至於嵗荒施粟冬月施衣病者施藥死者施棺種種善事率以為常姚士章公舉事實字斐成錢塘國子生居家孝友好行其徳康熙甲寅乙卯間值閩變浙東婦女有被寇掠者士章為設法代贖使得完聚計二百餘人仁錢兩邑獄舍卑濕犯人易染疾病士章請於官獨輸金改造又施粥給絮屢嵗不絶當事稔其賢㑹建育嬰堂令董其事士章經理歴十二年費不足輒解囊給之無少吝省城貢院大門外舊無篷厰諸生應試候唱名者咸集於此雨淋日炙無所憩息士章始捐貲創葢迄今遂循之不廢呉維楨公舉事實字左廷錢塘人性孝友好施予人有緩急呼之輒應未嘗有徳色於宗族尤加厚嵗裝綿衣給貧者以為常康熙甲寅閩逆煽亂民間子女被掠多索金取贖窮民無貲者呼號載道維楨立捐千金為好義者倡俾得完聚事平制府李之芳特奬異焉生平立功過格日書以自警晩年作自述二篇遺誡子孫夀八十六以子炳官封國子監學正許頤齡公舉事實字友期錢塘國子生其宗族居新安遷杭者甚衆頤齡多方提攜貧不能婚葬者助之家素業鹽其友彭吉先許惠京負鹽帑力不能完頤齡倡捐代輸無吝色楊士雅公舉事實字晉彥錢塘人康熙戊午武舉居家孝友親族之貧者咸周之戊子秋禾中程生來杭應試卒於逆旅貧無以殮士雅捐貲治殮且歸其喪嘗買一婢係所知者女詢得之即令其歸不問值葉正榮公舉事實字仁則錢塘人性至孝父罹瘋疾衣不解帶藥必親嘗數載如一日養母先意承志母喪年已五句哀毁骨立水漿不入口哀感行路兄弟五人同居共㸑正榮秉家政毫無所私四弟早逝撫孤姪如已子於里黨親族間周恤無倦張歐氏早孀無子正榮資其衣食者三十餘年嘗客逰開陽途遇錢吉甫負債鬻子即解囊代償完其父子又親故朱龍若年老無嗣買婢贈之龍若亡復撫育遺孤俾成立焉壽至八十一而終方予泰公舉事實於潛人好周急施予嵗大飢出粟以賑全活甚衆甓塘路掩遺骸修橋渡收恤孤寡敦厚姻族至捐已資以釋訟先完賦以急公尤為人所樂道有司給匾旌之章煜公舉事實新城人性好解推而無徳色於邑之周王廟側貯棺給施者數十年康熈己卯錢江泛漲見溺骸暴露即聞家堰地置義塚募人殮埋復置義田數畝付琪樹菴僧以為春秋祭費邑南津橋圯於水獨捐工修葺之渌川母子嶺居山隘間建唐張巡祠延僧居住施捨茶湯以濟行人凡遇飢饉毎樂輸為紳士倡馮鼎珵公舉事實於潛人慷慨好義鄉民當青黄不接時鼎珵出榖八百石計口稱貸不取子息嵗以為常遇飢出粟賑濟恒至數百餘石嵗徴錢糧必先限全完親友逋負力不能償者即焚其劵他若施棺木捨葬地靡善不為孫光哲公舉事實字喆臣仁和人性孝事親能得其歡心居憂毁幾滅性至耄耋猶思慕如孺子待昆季友愛推祖宅讓之後被火又撤已屋重構以庇族人康熙甲寅閩變後光哲倡率同志贖還難民數千餘口仳㒧完聚又嘗贖故人之鬻子者兼為經畫生理他若焚逋劵建橋梁拯貧濟困力行善事通邑號為長者方擢公舉事實字書升錢塘人太學生家世業鹽於鹺政利弊尤悉康熙三十八年春聖駕南巡擢率衆迎末擢具陳之乃荷鑾召問加増鹽課始皇仁蠲免六萬三千餘金商民懽呼稱慶素於族黨姻婭貧不能自立者周給之嘗買俞家坦地收瘞親族中之棺槥暴露者又以餘地建普同塔蔵無主胔骼孫邦基中雍正庚戌進士呉甲公舉事實字扆賞錢塘貢生性好施予從姪業賈負千金力為補苴有友江姓貧不能娶贈以金復畀以衣飾西湖舊有義塚年久為牛馬蹂躪屍骸暴露甲捐資盡掩之至惜字紙施湯藥恤孤寡周貧乏皆力行不倦方啟元公舉事實字貞甫錢塘人聲𢎞子性狷介嚴義利之辨父與舅氏陳三治共經紀積貲數千宜均析啟元曰有母乃有舅力却之舅氏因以舊宅相畀治宅得埋金不取即出徙他所檢還舅氏子封識如故嘉興府晉李祥嘉靖浙江通志海鹽人隆安中從内史袁崧築滬瀆壘禦孫恩崧為賊所害祥突白刃收崧歸葬時皆義之名其所居璵城曰教義里五代薛仁徳萬厯嘉興府志嘉興人呉中戎府右職為蘇州中令官誥使自郊勞迄祖餞貺遺禮幣一萬餘緡禮畢還府過崇徳堰見牽船人多荷校仁徳驚異㑹令佐來謁因問之對曰崇徳當驛路衝要所逋秋税甚多堰役夫皆是物也仁徳曰今夕試與考覈簿籍實欠幾何眀日艤舟相待令佐侵晨具籍呈之所欠九千七百餘緡仁徳欣然命從者閲視橐裝幾及其數捐舟送縣空載而去宋戴顯甫舊嘉興府志嘉興人嘉祐癸丑進士選亳州永城尉與母舅杭州陶叔獻同舉進士陶登第纔旬月卒於京師顯甫扶舅喪歸葬舅妗擕子女還外家其母孫無所依迎養於家衛公佐兩浙名賢録字輔之海鹽人事繼母以孝稱族有不能婚嫁者悉佽助之聚書數千卷禮四方賢士教訓子弟時縣未有學捐地為址又獨任禮殿之役熙寧末飢疫邑人賴以救療元豐中復飢民皆負税令滿代者已至轉運使苛留使督逋負縲繫盈庭公佐悉出粟代輸之弟公寛公望並敦行宜聞人倣舊嘉興府志字彥則嘉興人輕財好施周人艱危閭里貧乏者輒實金於橐伺隙投其家及知而詣謝佯不知也中年未有子有相者謂人倣頷有黑子十一必得子後果得如黑子之數張仲淳兩浙名賢録秀州人居鄉教授好周人急務行隂徳不求人知偶一商疾篤投仲淳問其姓名鄉里言迄而斃裝冇十金仲淳具棺殮召其子䕶喪持金歸復捐貲經紀其𦵏事一夕夢死者來謝曰荷公厚徳無能結草公今生貴子矣已而生子師中舉進士為館職終京西漕使尚書工部郎中魯文謐萬厯嘉興府志字子順家當湖嘗置義莊義塾惠其宗人官終司理陶菊隠嘉靖浙江通志嘉興人以號行徳祐末元兵南下菊隠聞勤王之詔散家財招集義兵謁文丞相於軍中宋亡遺七流寓者多以為依當時同邑有趙孟僴華亭有殷澄稱秀州三義元項冠舊嘉興府志字儀甫嘉興人以富稱於呉欲散其財乃助婚喪蠲逋負一時江浙間莫不稱長者至元二十年境内飢輸粟數萬賑之活者無算元世祖聞而旌之授以將仕郎少府丞力辭不拜子衢授淮西㢘訪司副使呉英石門縣志石門人皇慶初即縣東南運河左周廣千畝構屋六十楹延師集友與鄉里子弟共學名曰延陵義塾戴光逺萬厯嘉興府志字君實嘉興白牛鎭人鎭逺郡縣學校不立光逺乃辟地三十畝為殿宇學舍四十餘楹聚生徒百五十輩延名儒黄玠主之自是鎭人始知學顧徳玉輟耕録字潤之檇李人自幼從寧國路儒學教授俞觀光學觀光無子嘗語人曰吾昔寢疾於杭潤乏侍湯藥情至切若父子醫為之感動弗忍受金今我行且老必託之以死既而訪醫呉中病且革趣舟歸徳正進次尹山卒明日至檇李徳玉奉其屍斂於家衰絰就位邦人士來弔者徳玉答拜越明年葬於海鹽近顧氏之先塋嵗時祭享惟謹范國寶嘉興縣志字谷保宋仲淹七世孫由姑蘇遷檇李數世同居友義不減張鄭博學多才趙文敏薦諸朝累官提領安撫使家居設義倉建義塾助修學宫著有最樂堂稿傳世濮鑑萬厯嘉興府志字明之桐鄉人大徳丁未大水渰禾鄉民苦飢鑑捐米千餘石以食飢者所活甚衆有司上其事給授富陽税務郎加將仕郎呉宣兩浙名賢録字泰然嘉興人有俠氣兄弟析居並以義讓元季苗兵將屠邑境宣獨叩軍門請以身代辭義嚴正主帥壯之竟釋城不屠明潘允濟海鹽縣圖經海鹽人邑捍海塘舊雜用土石易崩圯洪武三年海溢淪田一千九百餘頃允濟走闕下請築塘専用石朝遣宋署丞如法監築邑賴以安陸宗秀兩浙名賢録平湖人為人敦樸有至行永樂中應賢良詔徴至京仁廟御極賜寶鈔銀幣還正統五年嵗飢宗秀傾家廩助賑事聞賜勅褒獎表其門曰尚義子珪字廷玉景泰六年飢疫明年益甚珪與弟瓛瑜瑾共出榖五千餘斛以賑有司上其事詔授珪迪功郎兄弟四人皆賜宴光禄珪以徳義著於鄉鄉人有不平事皆就之取直不至官府邑初建學珪與沈昊共任之落成邑令酹酒祝曰願爾兩家世世衣冠弗絶也其後陸之孫淞沈之孫珒俱發解陸平兩浙名賢録字國平世居海鹽平生好施處事有繼里有訟者爭就質言出而解洪熙改元嵗大歉民食草木平盡免所貸錢榖作粥以食老弱餓者多全活正統壬戌至景泰乙亥屢飢前後入粟五千餘石麥八百斛佐有司賑濟詔旌為義民表其宅入京謝恩賜宴光禄寺授教官劉儼嘉興府圖記字敬先其先眞定人父貞官海鹽遂占籍焉儼博學善詩文娶瞽婦終身愛敬如賓門人蕭某貧郤其贄又恒周之友人沈徳常死無所歸儼止田三畝鬻以葬焉其行誼多類是屠機𢎞治嘉興府志字汝敬平湖人嵗飢兩輸粟賑濟例得階服輒辭弗受嘗雪夜過淞湖聞葦澤間有嗚嗚聲棹往視之乃一人手足被縛命舟人負至舟解其縛易故衣以火温之久而蘇知為句容商人徐甲為盜所刦養之踰月愈而歸以百金酬不納劉鳯兩浙名賢録字景儀其先大梁人曾祖恂仕元為海鹽州學正因家焉鳯慷慨好施舉丈夫子九人因大啟家塾延名師以教諸子及鄉之俊秀祖墓在城北近海塘每往墓所見海寧衛官軍乗戰船哨沈家門防倭遇颶風率多覆没鳯憫之具疏上奏畧曰海東遼逺防彼失此枉喪生靈無益請罷之立沿海堡戍便部下其議責居民能保百年無事否鳯乃椎牛釀酒大㑹里中人曰吾願以一家衆口保設有事請伏辜咸曰諾遂覆奏准罷沈家門之役去船立堡増戍以防嵗免生命數千百人以子泰貴封御史仇必顯海鹽縣圖經右所人與兄必逹同居㸑必顯嘗路遇暴屍勸必達買棺瘞之自此遂施棺及施絮襖濟寒數各五百正統七年夏四月百戸杜忠率衛卒乘船艦禦倭沈家門覆溺依逺島七日不食為出粟五十石募漁筏救之得生者七十二人歸而羅拜於門欲償僱值之費不受江濟嘉興縣志正統五年嵗大侵濟傾家產得粟麥二千一百五十石散賑鄉里賴以全活有司以聞賜璽書褒奬表其門曰尚義免雜泛差徭孫佐鍾鳴逺潘璧舊嘉興府志並平湖人正統五年嵗飢各出米二千石助賑有司上其事賜羊酒復其家三年沈本陶鉦萬厯嘉興府志本秀水人世居邑之永樂里積纎起家郡邑舉為萬石長守法奉公無侵漁正統辛酉嵗飢詔勸富民賑貸本首輸粟五千斛旌為義民表宅里未幾閩寇猖獗郡守帥民兵往禦之本毅然偕行無難色景泰癸酉募富民納粟以實邊本以白米數百斛應詔將上道疾作屬子淳代往同時陶鉦菊隠四世孫輸榖麥二千石以救荒朝賜勅獎子澤捐粟五百石助賑復輸粟七百石助邊授七品散官支茂嘉興府志字宗衍嘉善人幼孤弟榮甫三嵗茂遵遺命不析居異財歴四十餘年貢吏部授樂安丞奉府督租有王某者貧欲鬻女以償茂代輸之女繪像祀陸琦萬厯嘉興府志字文璐嘉善汾湖人宣徳中父坦將建學宫不果而沒琦承父命獻地復建義塾於汾湖之隂學士曾鶴齡為記顧昻海鹽縣圖經字文顒海鹽人成化中仕為奉新典史家澉鎭數上疏請行鎭城事宜皆報可一請濬城東南地為河載土築黄家㽘塘捍海一請豁澉所公佔城池軍營田地税糧一請以城濠空地海上新漲沙地為牧馬塲母令鎭軍縱牧民田一請免所軍運艘減馬軍舊額百匹為六十匹免逺漕及孳牧等苦人利賴之陸源兩浙名賢録字本深自嘉禾徙居海鹽性孝友為猶子婚娶如已子成化壬辰大歉為粥以食飢者鄰婦每伺炊畢相率攜幼稚入㕑下飽餐畢懐飯焦出勿問也繼來亦弗拒遂勅㕑下每日多作數十人食以待來者隣左右數十家遂竟日不舉火逋租佃戸入市貿布紀綱奪其布與之俱來竟還之責紀網曰以布易粟家中必枵腹待餐忍奪之耶好延納四方逰士戸履恒滿即淹留數年敬禮無倦容客有持宣公族譜來者曰素聞宗派請收之曰財非所吝海溢失譜久矣不敢妄冐論者以比狄武襄壽八十一夏安兩浙名賢録字世康海鹽人為人慷慨負義氣篤倫理重然諾有祝仲容者江右人也隨其父丞海鹽老而無子不能歸遂依安安為治田里切比其居以子昇為之壻無何仲容死或謂盍并宅省所費不許無何而子昇又死或又以為言安笑曰仲容所以託吾者徒以其妻女耳今身死壻亡其妻尚在亡友之約吾可背之乎自是周恤益厚終其身不變朱文才海鹽縣圖經澉浦人慷慨多智畧嘗甃六里壩閘興水利築文星臺於白苧水漾中及葺海門寺高閣造禪悦諸廢寺俱堪垂久醵金首事人或不盡應傾橐成之人咸目之為朱善士陶廷錦萬厯嘉興府志字公重秀水人有隠行友人坐事逮捕暮夜持數百金授之且示以無還期立為封緘授婦其後友人事雪舉囊歸封緘宛然族兄鑰死無適為後者戚里欲立其子力辭割腴田四百畝為食貧計竟不受任饒州司理陞鎭江府通判項元涍舊嘉興府志字子南秀水人以曽大父襄毅䕃為錦衣早孤有遺貲萬餘母黄孺人命舁寄府蔵嘉靖甲辰嵗侵元涍悉蠲以賑所全活飢民無算郡守欲上其事元涍曰我豈以此邀名乎力辭遂寢姚旭獻徴録字景陽自湖徙石門嘉施予於昆弟尤篤諸昆弟或不能守故產垂盡輒割產與之又盡則又與以是人皆推為長者官高郵州判時年已五十四一日行小堤上㑹風起湖中覆船船人多溺死者乃匍匐召水工救之其出水生者給之襦斂流屍葬之城北原上所獲篙櫓器械錢布以萬數令溺水者各自認其物而歸之其無主者悉以犒水工是時全活以貲還者幾百人葬者倍之道路皆咨嗟感涕以不善結納上官遂罷去夏雷兩浙名賢録秀水人叔璧客姑蘇餘三十年垂囊而歸病不起為治殯斂既辦微知呉人有負璧貲者索歸悉畀叔母無所私故人樂松為怨家所搆往來居間費數百緡隣有少婦窺雷獨寢擲餘桃以啖之面發赤流汗脱身走後被旌額賜章服里人以為榮項徳純秀水縣志名穆以字行元忭子官中袐輕財好施置義田四百二十畝捐郡學及嘉興秀水嘉善三學賑諸生之貧者書法與伯氏少嶽齊名有雙美帖行世族子有以襄毅公墓田售他氏者捐貲贖之時宗子俊卿為執金吾徙都門移書歸其直却勿受也所居燬於火撤壁發蔵金追返其原主鍾祖述舊嘉興府志字君明海鹽人嘗與兄祖保共經營割地葬宗人鳯彩家十餘柩窀穸甫就邑人王𣆀夢至一宫有王者進二縫掖諦視之則祖保祖述也王者曰君兄弟殯宗人一案天曹褒美兄當益算二紀弟錫一子同里劉世教紀其事陸珂天啟平湖縣志字子珍平湖人好義樂施䘏宗族和鄉黨貧不能婚葬者周之輯格言以朂子孫曰饒人一著讓人一步為善最樂無欲常安夀八十三子文典字希堯甲辰嵗飢捐貲設粥以活流民為貧民張亨娶婦還路拾遺金讓基田捐墓地種種好行其徳陸杲嘉興府志字元晉平湖人嘉靖進士置田八百畝歸景賢祠嵗收其入以周族人謂之族田又置田五十畝歸世徳祠畀宗子供禴祀謂之祭田羣里族之子弟啟塾講業置田二百畝以給稍廪謂之學田以宗族日繁更徭不支置田三百畝營贍之謂之役田又捐貲築邑城子光祖光祚各有名屠叔方舊嘉興府志字宗直嘉興人萬厯丁丑進士授鄱陽令靖難時死節諸臣中有胡閏者鄱陽人叔方宰其邑知之不勝感愴已入為御史即具疏為建文仗節諸臣請諡請祠及修治塜墓䘏録子孫其交逰姻黨之株累世世編戍者一體赦宥神宗從其言沈維錡天啟平湖縣志字震躬邑生嘉靖丁巳倭警總督胡宗憲設計誘降厚禮聘維錡往錡慨然曰此我建功時也時倭巢沈莊衆莫敢入維錡獨往説之欣然請降已而大兵四集盡殲之維錡實首功督撫欲疏請大用固辭但奏免沈氏十年田税沈鸞舊嘉興府志海鹽人訓導孫肯堂之僕也嘉靖癸丑倭掠邑西郊突入肯堂室執之將加刃焉鸞以身蔽其主請代死倭不忍害遂兩舍之陸基誠舊嘉興府志字存卿平湖人嵗侵設糜以食餓莩置義塜施棺藥自當湖至郡城陂塘五十餘里捐金繕堤途不病涉張濤舊嘉興府志字悦清平湖人多隠徳娶婦盲相敬如賔蘆瀝塲官逋二百金繫郡獄濤代償之越人駱某好學而貧濤嘗急其難及舉於鄉以百金為夀不受友人趙端償所負金攜七嵗孫漢以往濤器漢歸端所償金佐其讀書後漢任諫議執猶子禮終其身俞錦天啟平湖縣志字克美平湖人姪彬貧析產過於已子故人金杰死無以殯其子坤來鬻田計所需給之焚其劵嘉靖間築城當事以其居當城址欲廣數丈全之竟自毁其庭寢二十餘間郡守劉慤顏其門曰義門徐梗桐鄉縣志桐鄉人嘉靖二十三年捨田一百五畝於學宫以濟貧士是年荒復出米千石賑飢知縣徐麟旌其義萬厯二十三年子嶅復捐資三百金米二十石修學知縣陸錫功亦旌其義張亨嘉興府志家海鹽半路亭嘉靖甲辰官兵與倭戰孟家堰死者數千人亨斂殘胔盡瘞之又收甲仗數百餘上之官太守劉慤義而旌之蔣裔懿行編字隣江嘉善人事親孝舉腴產讓兄嵗凶賑粟全活甚衆倭變走避者皆遇害裔將出犬銜衣而止得免難渡泖失風忽蘆梗環舟咸謂敦行之報孫英成進士丁鉉舊嘉興府志字九玉嘉善人補光禄丞以父病不之官萬厯時大侵傾囊以濟衣食醫藥日不暇給蠲良田五十餘畝備學宫春秋之祀邑令上其事朝義旌之倪津舊嘉興府志字雲橋嘉善北鄉人萬厯中遇水旱散粟施糜創午莊橋建菩提菴六旬外連舉四子府縣以徳行給冠帶年至九十魯烈萬厯嘉興府志字元承平湖人任呉江訓導諸生貧者輒周之遇荒設粥救飢仍糴米百石以助垂虹亭壊捐俸修理生平所置田僅六十畝宦後以半分兄弟甘澹淡以終其身陸錫命舊嘉興府志字仲敬平湖人東省嵗灾以御史往賑捐榖千石佐之存活無算建坊褒美生平扶灾恤難親友待以舉火者常數十家率厚息稱貸為之又捐田百畝於家祠以贍族張鯢舊嘉興府志桐鄉清風鄉人居鄉遇事正言相解不狥人以非禮桐邑築城捐資助工監司旌之卒年八十三鍾啟眀嘉興府志字思梅桐鄉人讓產於其從兄邑城圮捐貲助築嵗荒為糜賑飢全活無算沈思忠石門縣志字東泉石門人人有緩急即應或不能償即焚其劵雖布衣不茍然諾冬夏施茶湯以濟行者道旁棄棺輒收埋之積二十餘年不倦縣獄失火獨力重建整理淨潔繫囚得安子國朝寧成庚戌進士康熙郁期郁際舊嘉興府志期字幾先嘉善人弟際字兆先兄弟敦倫尚義族黨中冇三十未娶者婚之三喪未舉者葬之崇禎庚辰嵗飢出米百石以濟後復患蝗施糜三月全活者衆王任相褒祀編字爾玉居嘉善清風涇日積籌記善行里黨稱貸嵗歉勿責償更應之有鬻子者焚劵給以貲生平信義自持排解立剖子辰舉人陸瑞銓舊浙江通志號宇屏平湖縣學生值嵗荒平糶煮粥全活甚多族指繁衍或不能舉火捐田六十畝入祠以分給之故人子有零落者輒為收録毘陵舊族有母子漂泊至湖鬻身者捐金贖之年踰八十卒徐彬臣舊嘉興府志字亦于秀水人好竒負志節崇禎丙子舉於鄉有司重其名欲一見不可得庚辰公車罷歸已抵宿遷矣聞友郁起麟病於費縣之旅舍策蹇往視之起麟死經紀其喪以傳染得疾卒兩櫬同歸人稱生死交誼曹爚懿行編字舒光嘉善人明季諸生隠居東干當事聞其賢每就訪利弊爚目擊踐更累條均田均役議上推恩及物無間親踈㑹雪夜行船於灘遇負舟夫婦溺水力救得免又解衣衣之終不告以姓名張甫嘉興府志字伯宣平湖縣庠生文名大著後閉户讀書不求仕進輯族譜創宗祠置祭田為闔族倡生平樂善好施壽九十無疾而卒子兆治亦庠生工詩文王道隆續嘉善縣志字爾愚嘉善人性至孝姊適郁早世撫孤甥分授田宅如已出妺壻沈某逋賦二百餘石代為輸納親族待以舉火者數十家崇禎辛巳旱蝗捐賑三百石復倡議平糶全活甚衆出私錢募人捕蝗縣令劉大啟旌其門陳梁舊浙江通志原名昌應海鹽人給事中陳所學少子入太學逰京師與魏大中定交大中被建裹糧從之預為經理其後事大中死賕無所償子學洢且就獄梁為乞貸知交輸納海内誦義故弁濮陽崇信三嵗孤女流落揚州贖歸撫育擇配士子鍾景音嘉興府志字飛卿石門縣庠生眀季嵗侵道殣相望景音鬻產賑給全活甚衆子朗進士歴任叅政張眀俊舊嘉興府志號九芝桐鄉縣庠生遇人吉凶曲意周䘏不計有無弟子家貧不受其贄嘗出見故家子逋賦被械代為之輸何浩然舊浙江通志字希孟嘉善人邑庠生博通典籍以道學為己任性仁愛好施家雖貧輒䘏寡助葬杜門不出蕭然物外年七十四卒門人私諡曰仁節先生國朝宋應祥舊浙江通志先世雍邱人眀季家禾之角里家貧有志操嘗客池陽旅舍得練囊於藁蓐間封記二百五十金止三宿不去有許邦偉邦佐兄弟踉蹌而至問主人遺金主人茫然且誶之許遂號踊爭欲死應祥問實即還之許以半酬堅不受同邸二十餘人環拜之子承武號繩庵力葬三世恩橅五甥曲事長兄惟謹勞俶融鄉賢留祀冊石門人邑庠生明崇禎壬午浙西大侵斗米至白金四錢漕不及額俶融率其弟括倉庾得米八千餘石俱輸之官補一邑荒缺無徴之數又以忠孝訓後人至如修葺學宫興築橋梁道路必勉力拮据為里黨倡壽八十餘卒康熙三十九年入祠陸維祺鄉賢留祀冊字九如嘉善人國子生幼即以長材聞而自處恂恂惟以孝友敦行為事明崇禎壬午癸未間嵗值飢饉死亡無筭維祺家本寒素典掲捐金買棺殯殮買米賑濟全活數千人桑梓稱為義士遊南雍同舍生寒不能絮立解衣以贈後是生貴顯特遣介持金相贈受書不答悉反其餽康熙三十二年祀鄉賢丁鑛鄉賢留祀冊嘉善人從孫以負人田土涉訟鑛棄產代償又追歴年籽粒鑛輸米二百石為族人倡文廟傾圮倡捐修葺明崇禎壬午米騰貴鑛計烟突按口賑給康熙九年煮粥以食饑者他若同善㑹廣仁㑹捐助無虚嵗呉夢寅公舉事實字弁玉石門人生而穎悟日覽萬言明崇禎壬午浙西大祲漕不及額夢寅設法勸輸得米八千餘石以補一邑荒缺無徴之數癸未以嵗歉蠲免糧銀而奉赦者多飽胥腹夢寅誥贈竭力爭之民乃得沾實惠以子涵貴通議大夫張惟赤鄉賢留祀冊海鹽人順治乙未進士累官户科給事居鄉捐造營房一百間使兵民分處嵗飢捐米賑濟修建學宫開濬海鹽運河邑人立碑記其事呉三錫鄉賢留祀冊秀水人順治辛丑進士讓田宅與叔及弟捐置祭田又置義田以贍族人為棗强令有昆弟爭產訐訟七載三錫以至情反復開導二人相對大慟和好如初著勸孝録行世終中書舍人董士昌舊浙江通志號寧庵秀水人順治進士砥行好學然諾不茍婣戚中孤寡貧乏者為之婚娶朋友有急解贈無恡色嵗歉倡始賑濟民間婦為亂兵所掠捐金完聚任陜西平利令卒於官查大焜舊浙江通志字伯符海鹽人事父母孝性抗直慷慨遇有不平身為排解與人交洞達無城府窮疾無告者多方周䘏之夏文華舊嘉興府志字茂榮石門人性質直事親篤愛與人交必信見枯骨必瘞之康熙庚戌霪聞奉雨民大飢捐資三百金煮糜賑給事旌周隆公舉事實字履綏嘉善人幼失怙事祖父母盡孝嘗慕范文正公之為人率二弟陶陛置義田二頃奉先之外以贍其族友人金姓葉姓負金累百不能償皆焚其劵更周之嵗饑賑粟冬夏施襦帳以為常著有訓家恒言嚴閶綸鄉賢留祀冊嘉興人康熙癸卯副榜六嵗喪母哀泣如成人事父孝養備至家貧逺館間日必一趨省雖風雨不阻遇饑疫廣製方藥以救人并約同志捐資設糜捨棺掩骼行數十年如一日張瀾鄉賢留祀冊秀水人國子生好施與康熙九年水災米騰貴倡行平糶之法全活無算普於茶湯四十四至濬河道築橋路皆盡力為之沈璜鄉賢留祀冊字若水嘉興庠生見義必為有薛姓者亦庠生也鬻其子以給衣食璜惻然心傷之即以售價如數贖歸戒以毋壊書香又庠生陳姓其父充里書逋糧數十金為運弁所辱璜捐貲周急而不收其劵戚黄姓雙棺在室貧無以殯勉力助其速葬葬三日其家旋被囘禄鄉里咸稱頌之納婢女諱言其父越日其父來彬彬儒雅因問曰何業對曰業儒即歸其女又葺學宫施藥石掩露胔著有均田平賦議兩赴賓筵屢舉優行沈綰鄉賢留祀冊秀水人邑庠生父廷勱任欒城令是時平清河之亂有婦女失散者勸父請於主將咸得釋放祖遺祭田倡立條議凡讀書乏膏火者給若干年臻壽耉者給若干寡孤獨者給若干以親近疏逺為差凡遇孝友誠篤之人必極力推獎使宗族鄰里則而效之雍正元年入祠莊匏鄉賢留祀冊嘉興縣庠生嘗買陳氏宅陳乏嗣其祖先神宇朔望供其香火嵗餘俟其有主然後歸之嘗需用柏木議價數十金已交其半及往取乃陳氏祖塋也瞿然急止不追其價郡庠鄉賢名宦二祠嵗久傾圮康熙三十年年已八旬寢處郡學鳩工五閲月告成乃歸陳華育鄉賢留祀冊嘉善人少失怗母復殉節毎忌日必素服茹齋閉户悲泣自弱冠至七十有六哀慕無間迎養寡姊撫諸甥誨養婚娶同已子負郭止數頃而節縮盈餘以贍三黨凡待以舉火者不下數百家冬授衣夏給帳施粥施棺疾疫施藥建育嬰堂橋梁道路應修者無不捐資修築沈志高鄉賢留祀冊喜善學庠生壬午入闈值嵗侵道有菜色者傾橐貽之抵寓資斧不給别貸以終試事嘗立㑹仿朱子社倉順治辛卯壬辰發囷賑濟復思廣之故號廣仁倉邑中貧士及貧士之妻守節者每嵗賙之沈允聞鄉賢留祀冊桐鄉人康熙庚午舉人篤於親誼憐表戚陸聲逺老而無子為之納聘賴有嗣息有售產救貧者紿其值不取其產每嵗設家塾備膏火課親族子姪之貧而無師者康熙四十二年入祠呉之振鄉賢留祀冊石門人康熙辛亥邑大饑糴米二千石分區賑濟全活無算巡撫范承謨旌其門前令李夢鸞以軍需去官之振代完之辛酉嵗侵捐粟八百餘石多設粥厰貧民咸受其惠他如捐修學宫嵗施藥餌建育嬰堂收養棄孩施棺槥埋道路死喪勇於為善一時宗族孤寡親友貧乏咸利賴之嘉興府志字孟舉以嵗貢授中書能詩工書著有黄葉村莊詩文集馮翊公舉事實字輔之桐鄉人少為諸生以純行聞於閭里事父母及所生母俱以孝稱父殁時幼弟纔十數齡翊撫之及弟殁以已子嗣之家不甚富人有告急無不應族人有老幼不能自存者輒周給之無吝色學宫久圮倡捐修復子景夏官少司寇屈希平公舉事實字又源平湖縣庠生性孝友父卒喪葬盡禮母殁廬墓三載周䘏族黨無倦色逢水旱出粟賑濟冬月施襦死不能殮者施槥一邑推長者事聞奉旌孫在鎬鄉賢留祀冊嘉善人父母殁事長兄必誠必敬撫諸弟長育教誨之凡喪葬徭賦之事皆獨任年二十登賢書性甘淡泊平居褐衣蔬食不厭而周恤親族無吝色治家嚴肅子弟不衣冠不敢見有萬石君之風何漢偉公舉事實字君階秀水人幼時割股療母疾人稱其孝長好施予凡族黨困乏解推周恤不責其償晚年偶疾恐不起檢篋中夙逋存劵悉焚之尋復愈嘗至呉門於閶門厠間拾白金一包坐俟之未幾有蹌踉而來呼號尋覓者詢之蓋嘉興舟子受托寄蘓行買貨者遂還之題旌册雍正十一年以孝行題旌錢同文嘉興府志字養真精岐黄術凡乞療者以至之先後為序不論富貴貧賤有不能具参附者每出笥中蓄入吺咀不以告有荷擅者嘔血數升來求治同文潛以白金半錠雜藥中其人以為誤遺持還之同文曰吾安得有金其人得金心喜投藥立愈金京望公舉事實字達庵平湖人父燈以善行聞於鄉京望讀書入成均有友無力營葬割贈腴產為兆域黌宫兩次修葺皆捐貲倡率祖居瀕水行者梗於途獨建石梁二逺近便之以子南鍈貴贈如其官胡光銓公舉事實平湖人幼喪父母哀毁若成人事祖母承顏不懈有叔病劇以幼子女托付光銓經營後事橅養教訓婚嫁既畢乃以歴年生息具一清册交還其子堂弟夫婦相繼早亡亦遺三子一女光銓復為婚嫁俾之成立他若周濟里黨修葺學宫多善行生五子紹高紹安成進士汪文桂公舉事實桐鄉人事父母孝於三黨九族中殫力周恤康熙戊子己丑間旱澇相繼設粥厰立藥局全活甚衆嵗丙午被水災首倡賑濟以食饑民他若新文廟築城垣修橋梁開河道好義捐資一無吝色以子繼燝官累封奉直大夫陸其燧公舉事實平湖人樂善好施仲弟早世撫其遺孤而以祖遺已屋讓焉割腴田為外父沈扶民卜兆且謀及烝嘗朋友以緩急告者無不應有潘紫翰者早卒無嗣而家有未舉之喪其燧出資為營葬康熙戊子嵗飢倡捐煮賑於報本塔院全活無算有逺道及老幼不能至者以米遺之有稱貸不責償或焚其劵人犯之未甞校也張崢公舉事實字如岡平湖人九嵗父喪晝夜號泣如成人母殁擗踊投地絶而復甦補邑庠生益以道義自守輕財利重然諾族黨中有緩急傾囊濟之戊子巳丑間水旱出米數百石設糜粥以賑之復廣施丹藥以療疫痢全活無算年四十殁聞者嗟悼焉程琳公舉事實字丹雲桐鄉人事母以孝聞且能推孝友之義旁及族黨逺及異姓於縣治之城隍祠青鎮之東塔院製棺施捨三十餘年未嘗輟捐修文廟及城隍廟水旱出粟賑濟積行累仁聲聞四達金學汾公舉事實字崑濬桐鄉人幼有器識與羣兒嬉水濵見一兒溺衆皆驚走獨蹇裳救之有負重貲者憫其無以為生焚其劵有附舟歸者中途病死殮之歸其喪他若賑粥施衣修學宫剏橋梁善事不可枚舉浙江通志卷一百八十七
