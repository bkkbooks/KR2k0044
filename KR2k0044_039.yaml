body:
  text: 浙江通志卷四十古蹟二杭州府下忘筌亭古蹟考在郡圃内唐時建咸淳臨安志在鳯凰山舊治今存其名白居易忘筌亭詩翠巘公門對朱軒野徑連只開新户牖不改舊風烟虛室閒生白高情淡入𤣥酒容同坐勸詩就滿城傳自笑滄江畔遥思絳帳前亭臺隨事有爭敢比忘筌西亭錢起有九日宴浙江西亭詩又作嚴維錢塘府亭羅隱有錢塘府亭詩為錢武肅王作碧波亭晏公𩔖要在子城北門外吳越備史天福三年十二月王大閲馬歩軍樓艣於碧波亭咸淳臨安志亭臨水面濶數丈元豐四年郡守張詵重建南園巽亭乾道臨安志慶厯三年郡守蔣堂於舊治之東南建巽亭以對江山之勝崇寧三年蔣之竒作詩紀其事蘇舜欽南園巽亭詩公自登臨闢草萊赫然危締壓崔嵬凉翻簾幙潮聲過清入琴尊雨氣來疇肯登臨何處好平生懷抱此中開東南地本多幽勝此向東南特壯哉望越亭乾道臨安志在舊治後慶厯中郡守蔣堂建政和元年郡守張閣遷巽亭於此曲水亭咸淳臨安志在鳯凰山舊治治平中守沈遘建清風亭乾道臨安志在中和堂側直望海門鳯凰亭咸淳臨安志在府治南通判北㕔隆禮亭乾道臨安志祥符舊經云在郡城錢塘舊治之南到縣一十三里敦禮亭乾道臨安志祥符舊經云在郡城錢塘舊治之南到縣一十二里崇禮亭乾道臨安志祥符舊經云在郡城錢塘舊治之南到縣一十一里安濟亭乾道臨安志在錢塘舊治南到縣二十里浙江亭乾道臨安志在錢塘舊治南到縣一十五里集賢亭乾道臨安志在豐豫門外湖堂前潺湲亭乾道臨安志古稱阿閃佛塔亭旁有溝牐引湖水以注相國井遂名潺湲亭通遠亭乾道臨安志祥符舊經云在錢塘縣舊治北到縣四里古泉亭太平寰宇記錢塘古泉亭有紫水如霞夢謝亭晏公𩔖要靈隱山畔舊有夢謝亭謝靈運父居會稽因不宜子息乃於錢塘杜明師舍寄養師夜夢東南有賢人來訪及曉靈運至故作夢謝亭名勝志一名客兒亭盧元輔詩絶頂客兒亭是也成化杭州府志謝屐亭在上天竺南亭萬厯杭州府志在郡城東南隅唐建杜牧南亭記趙郡李子烈播立朝名人也自尚書比部郎中出為錢塘錢塘於江南繁大雅亞呉郡子烈少遊其地委曲知其俗蠧人者剔削根節斷其脉絡人隨化之三箋干丞相云濤壤民居不一銲錮敗侵不休詔與錢二十萬築長堤人益安喜子烈曰㢲越古今多文士來吾郡遊登樓倚軒莫不飄然而増思吾郡之江山甲於天下信然也乃作南亭於城東南隅江平入天越峯如髻越樹如髪半夜酒餘殷殷浪聲起於月外東閩兩越宦遊善地也予知百數十年後登南亭者念仁聖天子之神功美子烈之㫖跡覩南亭千萬狀吟不辭已四時千萬狀吟不能去作為歌詩次之於後不知㡬千百人矣姚合題杭州郡齋南亭詩舊隱即雲林思歸日日深如今來此地無復有前心古石生靈草長松栖異禽暮潮簷下過濺浪濕衣襟冷泉亭方輿勝覽在飛來峰下唐刺史元藇建名勝志相傳冷泉二字白居易書亭字蘇軾續書白居易冷泉亭記東南山水餘杭郡為最就郡言靈隱寺為尤由寺觀冷泉亭為甲亭在山下水中央寺西南隅鬲不倍尋廣不累丈而撮竒得要地搜勝槩物無遁形春之日吾愛其草薰薰木欣欣可以導和納粹暢人血氣夏之夜吾愛其泉渟渟風泠泠可以蠲煩析酲起人心情山樹為盖巖石為屏雲從楝生水與階平坐而翫之者可濯足於牀下卧而狎之者可垂釣於枕上矧又潺湲潔澈粹泠柔滑若俗士若道人眼耳之塵心舌之垢不待盥滌見輙除去潛利隂益可勝言哉斯所以最餘杭而甲靈隱也杭自郡城抵四封叢山複湖易為形勝先是領郡者有相里君造虛白亭有韓僕射臯作候仙亭有裴庶子常棣作觀風亭有盧給事元輔作見山亭及右司郎中河南元藇最後作此亭於是五亭相望如指之列可謂佳境殫矣能事畢矣後來者雖有敏心巧目無所加焉故吾繼之述而不作長慶三年記梅詢冷泉亭詩古竇鳴幽泉蒼崖結虛宇六月期客游披襟苦徂暑開窻弄清淺吹鬢疑風雨不見白使君烟蘿為誰語毛友冷泉亭詩并序昔人以為冷泉未極其妙因加小亭其上然冷然水光滃然山翠以故去者過半予以謂不必加工但去其尤贅者斯善也如明鏡中而加繢畵非不美好所以為清明者逝矣拂拭菑翳舊觀復還可也面山取勢俯山中亭外安亭自蔽蒙眼界已通無礙物胷中陡覺有眞空試尋櫓響驚時異却聽猿聲與舊同萬事須叟成轉易我來閲世一初終曹既明冷泉亭詩朱簷日轉軒窻冷碧嶂雲低草樹香山影倒沉波底月夜闌相對㵼寒光張履信冷泉亭詩水石一闌干僧歸四山靜擕琴譜澗泉月浸夜深冷候仙亭咸淳臨安志唐守韓臯建乆廢安撫趙與􅊸更造自居易候仙亭詩蹇歩垂朱綬華纓映白鬚何因駐衰老只且有歡娯酒興還應在詩情可便無登山與臨水猶未要人扶沈亞之題候仙亭詩新創仙亭覆石壇雕闌峻宇入雲端嶺北嘯猿高枕聽湖南山色捲簾看虛白亭咸淳臨安志唐守相里君造見山亭咸淳臨安志唐守盧給事元輔建錢塘縣志在靈隱寺後一名巢雲觀風亭咸淳臨安志在冷泉亭側唐庶子裴常棣建武林舊事四亭俱廢惟冷泉存壑雷亭咸淳臨安志在冷泉亭側宋淳祐中安撫趙與􅊸創袁君亭萬厯靈隱寺志後人思慕唐刺史袁仁敬建紫薇亭咸淳臨安志郡守紫薇舎人唐詢暇日至靈隱山顧訪勝㮣後建亭於此因名翠微亭萬厯靈隱寺志在飛來峰半韓世忠建韓公因岳飛登池州翠微亭詩有特地㝷芳上翠微之句故以名亭亦隱痛之也曲水亭董嗣杲西湖百詠引曲水亭在下竺寺前一曰流杯亭有水臺盤在亭心宋淳祐間重建梅詢曲水亭詩鶴髪山中人流水鑿幽石如凭青玉案分遞白雲液泠泠濺鼎爼瑟瑟穿瑤席醉坐三伏中煩襟自消釋月桂亭古蹟考在月桂峰下望海亭萬厯靈隱寺志在北高峰頂石橋亭咸淳臨安志在武林山中路近翻經臺介亭咸淳臨安志在鳯凰山對排衙石熙寧中郡守祖無擇作天風泠然有縹緲慿虛之意蘇軾登介亭餞楊次公詩籃輿西出登山門喜與我友㝷仙村丹青明滅風篁嶺環珮空響桃花源前朝欲上已蠟屐黑雲白雨如傾盆今晨積霧捲十里豈畏觸熱生病根在家頭陀無為子乆與青山為弟昆孤峯盡處亦何有西湖鏡天江抹坤臨高揮手謝好住清風萬壑傳其言風回響答君聽取我亦到處隨君軒聽泉亭武林梵志近法相寺里許沿塢而上蘇軾題榜忠實亭武林梵志在介亭傍宋高宗御書橘園亭嘉靖仁和縣志在豐樂橋北傍水宋高宗創亭其上其地多美橘至今稱橘園亭乾道臨安志在鹽橋之南乾道五年郡守周淙重修馭舟亭乾道臨安志在鹽橋之北紅亭咸淳臨安志外沙河自竹車門北去繞城東過紅亭稅務武林亭四朝聞見錄太乙宫後有小土阜曰虎林山亦稱武林山上有亭曰武林環以花竹咸淳臨安志在城内虎林山高士堂後過溪亭施註蘇詩辨才法師退居龍井東坡守杭作亭風篁嶺上名過溪因東坡詣師師送至嶺上亦曰二老亭垂雲亭蘇軾有登垂雲亭飲參寥泉詩暢亭瀹俗亭咸淳臨安志俱在棲霞洞外宜對亭名勝志在九里松葉紹翁書如此江山亭成化杭州府志在呉山梓潼廟香月亭清新亭挹翠亭香蓮亭成化杭州府志並在孤山舒嘯亭武林梵志在烟霞洞傍秀江亭武林梵志在開化寺傍毛萬齡登秀江亭望海詩層樓落日海門開千里濤聲一瞬來我欲慿闌看起處晴江白雪滿瑤臺問水亭玉蓮亭萬厯錢塘縣志俱在湧金門外錢塘縣志問水亭明孫隆建游人歸憇湖舟皆集於下張遂辰問水亭歸船詩銀燭碧籠紗歸船喧㡬家仍呼小蘭葉月下理琵琶栁洲亭錢塘縣志即豐樂樓舊址明嘉靖間郡守陳仕賢建初名柳洲别館廣羣芳譜南渡後自湧金至錢塘沿城五里徧揷垂柳望湖亭成化杭州府志在寳石峰之陽萬厯杭州府志唐時在孤山之北宋時徙寳石峰國初復故址四面玲瓏夏月最快種德亭蘇軾種德亭詩序處士王復家於錢塘為人多技能而醫尤精築室候潮門外作亭榭以與士大夫遊人徒知其接花藝果之勤而不知其所種者德也乃以名其亭湖心亭萬厯杭州府志在西湖之中舊有湖心寺寺外三塔鼎峙𢎞治中寺與塔俱燬嘉靖中知府孫孟㝷遺址建亭萬厯四年按察僉事徐廷裸重建萬厯錢塘縣志湖心寺舊有三塔其中塔南塔乆廢乃即北塔基建亭於上名湖心亭西湖遊覽志萬厯四年僉事姑蘇徐廷裸大叅海虞王竺錢塘尹西蜀姜召同建亭額有太虛一㸃宛在水中央之題司禮孫隆重建四碪上植桃柳改曰喜清閣國朝康熙三十八年聖祖仁皇帝省方廵幸御書静觀萬𩔖四字額又御製湖心亭詩二首恭紀首卷放鶴亭萬厯杭州府志在孤山北元至元間儒學提舉余謙葺林處士墓構梅亭於下郡人陳子安構鶴亭配之並廢明嘉靖中錢塘知縣王釴建兹亭以續舊國朝康熙三十四年聖祖仁皇帝命刑部員外郎宋駿業督工重建御書放鶴二字扁於亭楣又書舞鶴賦刻石立亭上歲寒亭遂昌雜錄孤山之隂一亭在高阜上曰歲寒繚亭皆古梅喬木亭戴表元喬木亭記亭在清河張君燕居之東其先世忠烈王以功開國於循而置邸於杭子孫五世所居邸之坊至今稱清河焉梅亭四朝聞見錄陳讜題呉山三茅觀梅亭詩有云竹密不知雲欲雨山高盡見水朝宗駕霄亭齊東野語張功甫鎡於南湖園作駕霄亭於四古松間以鐵絙懸之半空而覊之松身梯登之眞有挾飛仙之意留雲亭武林梵志在南湖張家寺内宋建其地今為賽西湖江湖一覽亭萬厯杭州府志在七寳山三茅觀西左右有門曰凌虛獨歩涵鏡亭萬厯杭州府志在柳洲亭西北四面皆池中創一亭霽雲亭積翠亭發幽亭白雲亭釋契嵩遊南屏山記由山麓而上東則霽雲亭西則積翠亭由積翠亭而上抵於發幽亭由發幽而東至於白雲亭從麓至頂巖石皆竒世所無有盖湖山絶勝處也居然亭淨慈寺志宗鏡堂上為蓮花洞有居然亭秀爽特甚江湖偉觀亭萬厯杭州府志在慈雲嶺之巓清暉亭錢惟善題清暉亭詩段家亭子近呉山映發亭楊蟠西湖百咏有映發亭詩西水亭楊蟠西湖百咏有西水亭詩清芳亭萬厯錢塘縣志江上有清芳亭鍾翠亭錢塘縣志在三茅觀前明孫隆建贊元亭錢塘縣志在雲居寺後山頂稱楓林頂明總制胡宗憲建望雲亭萬厯錢塘縣志在金龍山宋謝緒讀書處曲水流觴亭嘉靖仁和縣志在縣内尊勝寺又有望江亭錦香亭成化杭州府志在海寧縣署仰高亭嘉靖海寜縣志在縣治西㕔宋建元時遷於正堂之後花木森然為遊息之所瑞隱亭方干有鹽官王長官新創瑞隱亭詩潄玉亭硤川志在紫微泉上宋淳熙中令鍾必萬建紫微深隱亭硤川志在西山百歩石右望呉亭硤川志在硤石湖北相傳越屯兵於此以望呉兵水口有望呉壩泗水亭海寜縣志在洛塘許睢陽讀書處唐乾元初公子玟即亭建廟水月亭硤川志在湖南宋時設砦處雙清亭富陽縣志在縣㕔事後宋令程珌植以梅竹勝覽亭折柳亭咸淳臨安志富陽縣觀山横截大江上有亭曰勝覽又山下有折柳亭客使多餞於此春山偉觀亭咸淳臨安志在富陽縣西南又名望仙亭近天亭咸淳臨安志在富陽縣權縣趙師燿建參政樓鑰書迎秀亭宣德富陽縣志前臨大江對峙西南諸峰據邑治之勝宋令趙汝崖建會江亭成化杭州府志在富陽江口據大江之勝宋令程珌建孫亭宣德富陽縣志在亭山因晉處士孫晷得名稽亭名勝志稽亭山在餘杭縣南九里上有亭基秦始皇築以望會稽鰲亭晏公𩔖要在餘杭縣南以其在湖中山上因號鰲亭咸淳臨安志亦名南亭又曰嘷亭聲之訛耳唐貞元初令盧鵬建大