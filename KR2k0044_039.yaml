嘗不以平一宇宙躋致生民為意鄙夫則不然胷腹空洞翦然無所存置但能行樵坐釣外寄心於小律詩時或鏖兵景物衡門情味則倒睨二君而反有得色凡所寓興輒成短篇總曰深居雜興六首蓋所以狀林麓之幽勝攄几格之閑曠且非敢求聲於當世故援筆以顯其事云隱居松籟細錚然何獨微之重碧鮮已被遠峰擎􅑨􅑨更禁初月吐娟娟門庭靜極霖苔露籬援凉生褭菊烟中有老夫披白褡瘦行清坐咏遺篇四壁垣衣釣具腥已甘衡泌號沉㝠伶倫近日無侯白奴僕當時有衛青花月閒懷看酒譜雲蘿幽信寄茶經茅君使者蕭閒甚獨理叢毛向戸庭薄夫何事苦姦姦一室琴書自解顔峰後月明秋嘯去水邉林影晩樵還文章敢道長於古光景渾疑剰却閑多少烟霞好猿鳥令人惆悵謝東山冉冉秋雲抱嘯臺一丘松竹是閑媒誰聞濟北傳兵畧枉說山東出相才樵褐短長披搕膝丹爐高下壘懸胎三千功行無圭角可望虛皇九錫來上書可有三千牘下筆曾無一百函閒卷孤懷背塵世獨營幽事傍雲巖僧分乳食來隂洞鶴觸茶薪落蠧杉未似周顒少貞勝北山應免略相衘松竹封侯尚未尊石為公輔亦云云清華自合論閑客元墨何妨事靜君鶴料免慚尸厚禄茶功兼擬䇿元勲幽人不作山中相且擁圖書卧白雲祝時泰訪林處士故宅詩湖畔訪逋仙晴攀林外烟亭畱放鶴處花憶種梅年故宅餘芳草高祠列四賢巢居不可作名共此山傳徐復宅避暑錄話徐復號冲晦處士宋仁宗朝召見賜號而歸杭州萬松嶺是其故廬也時和靖處士尚無恙湖南湖北隱廬相望一時稱二處士潘閬宅夢粱錄在潘閬巷後人即其宅基立為祠徐奭宅咸淳臨安志在大隱坊韓世忠宅武林梵志在江漲橋宋韓蘄王之賜第後捨為眞如寺呉琚宅四朝聞見錄琚為憲聖后猶子居近城與東樓平因城叠石曰南麓後為嘯臺下有堂曰讀書亭曰物表西直呉山有茅頂而圓者曰定菴鮑當宅泊宅編在清波門外鮑當郎中故居方勺寓杭創一小圃即當故宅也喬行簡宅武林梵志在呉山之陽竒石峭㧞東望海門宋紹定間理宗幸其第書見滄二字勒之崖石後捨宅為寺名寳奎周煇宅清波别志後序煇居清波門因著清波三志清波雜志自序煇祖居錢塘後洋街貫雲石宅嘉靖仁和縣志在鳯凰山下今之海鮮寺乃其故居黄公望宅錢塘縣志南山筲箕泉側王蒙宅嘉靖仁和縣志蒙字叔明文敏之甥善畵其宅近黄鶴山因號黄鶴山樵仇遠宅嘉靖仁和縣志仇遠字仁近卜居白龜池上仇遠卜居詩一琴一鶴小生涯兩巷深居度歳華為愛西湖來卜隱却憐東野又移家春城雨滑難騎馬小市天明又賣花阿母抱孫閒指㸃疎林盡處是烟霞楊維楨宅李曅題楊亷夫隱居詩飲馬橋南水亭好徐一夔宅嘉靖仁和縣志一夔織工對文云余僦居錢塘之相安里今考相安巷乃仁和地也褚無量宅太平寰宇記臨平湖在鹽官縣西褚無量家近湖邉年十二湖中有龍鬭傾里觀之無量獨讀書不輟趙忭宅硤川志忭於建隆時有翼戴功因賜第名趙家滙楊九鼎宅硤川志宋南渡楊由義子九鼎選為駙馬都尉賜第楊園里人稱駙馬基榮肇宅硤川志元祭酒榮肇故居在硤石鎭宋濓有贊許彧宅咸淳臨安志富陽桐江之水東注桐洲通孝子許彧故廬申屠氏宅名勝志富陽縣申屠山昔申屠蟠晦黨錮之名避地結廬於此今千載子孫家焉謹按咸淳志富陽屠山相傳有姓申屠者結廬以居乃以名其山復志其里攷後漢書蟠傳只言絶蹟粱碭之間後二年滂等果罹黨錮未嘗至富陽名勝志蓋附會也謝絳宅咸淳臨安志富陽縣小隱山謝絳遷居於此子景初景温築書室於山半今故基雙松尚存謝絳自題讀書室詩余近營别墅於小隱巖忽憶癸酉冬奉詔使金於陳橋驛夢中偶賦及寤寫在牘背今因巖名知所賦三言前契矣遂足為八句僕本塵外士功名若毫末因尋小隱園忽見羣芳發昔夢宛可記靈契方兹達㑹須挂朝纓歸弄巖前月又雙松亭詩築居喜物外披徑窮木末層阜繞襟帶澄江見豪髪芬芬山蜜熟決決春泉活林梢閃隕猿石罅慗銜月坐長百慮寂望遠孤興發何必較萬殊吾自思吾達又答梅聖俞問隱詩聖俞一幅書問我小隱居小隱詎有異築室數畝餘巖壑不峻粹田園非美腴所欲近丘墓歳時來掃除先人夢讀史尊道本聖徒絶筆於此詩子孫無忽諸刻石置中堂且使過者趨題牓為服訓義取銘盤盂後嶺雙松亭徑術何逶迂下臨富春渚萬象生有無東偏作草舎可以施琴壺門前碧塘水萬本栽荷蕖風來觸香氣長著人衣裾澄水泱泱流黍稻可勿枯柔桑及美果種廣莫記株澗草不識名野禽多異呼坐此易歳宴自與人世踈在昔東陵侯𤓰壠猶親鋤楊惲謝九列種豆南山隅余嘗有此志來者安敢誣誅茅實張本解組當後圖是時考槃賦從我者誰歟近來傳越石趣尚若不殊倘聞邱樊徃不顧升斗儲如君美才具日月升雲衢安敢預招挽粗自陳其愚諸葛起宅餘杭土風記餘杭縣岑山呉歩兵校尉諸葛起字岑世居山旁宗族蕃盛皆𦵏於此呉筠宅名勝志餘杭縣石室洞華隂道士呉筠居此又名藏書洞太平寰宇記筠餘杭人為唐内供奉因游天柱宫樂焉後葬於此今有碑存郭文宅水經注浙江逕縣左合餘干疑作餘杭大溪江北即臨安縣界水北對郭文宅宅傍山面溪宅東有郭文墓又縣南有大壁山即大滌山郭文自陸渾遷居也謹按文居凡數處一云餘杭由拳山見元和志一云新城縣靈耀寺見𩔖要一云臨安縣郭山墓亦在見名勝志此即水經注所云傍山面溪宅東有墓者是也郭山之名出自後人因文而名之耳然據水經注文宅已有二矣攷晉書本傳文本河内軹人入餘杭大壁山中窮谷之地而居焉後王導迎置西園凡七年逃歸臨安結庵山中縣令萬寵迎至縣中病甚求還山終後寵葬於所居之處據此則文初至餘杭後至臨安本傳與水經注悉合故據水經注登載許邁宅名勝志臨安縣西五里有西山多仙人芝草晉許邁移居於此昌化縣志縣西晚川山下有許遠游宅張道陵宅名勝志在於潛西天目山南峭壁高二百餘丈乃漢天師張道陵隱室旁有張公小舎洪載宅咸淳臨安志在於潛縣天目西麓舊為紫薇巖俗呼紫草巖寳福寺在右可菴在左皆玲瓏竒狀不一俞烈可菴記臨安天目山之西麓有逸民洪載字彦積自號耐翁以力農起衣食厪厪給愛泉石若嗜欲相攸紫薇巖之左得佳山峭壁稜層圭角冐土欲出荔鮮碧潤斑斑呈露翁放杖太息曰是必有異呼奴具畚臿厲斤斧剪薙榛翳輦除土礫則峰巒效竒直如立筍平若截肪岑銳巘疊爭見姿態既有端緒則銳意欲成之湊歳儉飢鳩旁近村民用闕錢移擔土以漫治四下灌栵蔽翳既芟除之泉脉欲流復釃導之則平衍清深嵌巖宛曲各有竒狀於是名其石之翼然欲升者曰飛雲峭然凝竚者曰玉筍窈然清深命曰闕然深邃命曰經龕山有峭立石壁而有形屭贔蹲負其下者曰金鼇泉眼流珠濺沫不為旱潦増損命曰靈泉闢微徑上飛雲頂築亭其巓名曰盤雲取樂天牛氏石記盤坳秀出如靈丘鮮雲之意巖石之下小築數椽扁曰可菴翁燕逰藏息之地也菴之東數歩曰長春塢西瞰清池曰含暉室徑直前依山植桃數十百株方春和時霞錦燦爛名曰小桃源稍西則為歸藏之闕始翁得此地神怡意適謂是已足吾心計當生死此中坐而對石則眼恍然明困而支石則意灑然醒客或扣門管領登山撃鮮醉釅必極其酣適然後已聞客譽石之辭則喜津津見顔面每疑其嗜好之異其中必有自得其道機轉物能與此石俱消忘者歟詣吾廬請記不已者翁之孫咨夔以儒學登第且試學官中其科今分教饒學與子交好遂為之記凌凖宅咸淳臨安志在新城縣西五十歩唐柳宗元有弔凌司馬凖詩羅隱宅名勝志在新城縣東五里新城縣志在雞鳴山下今改名學山許廣淵羅隱故宅詩廢宅百年後荒基一畝平獨憐新檜栢誰識舊軒楹閭里清風在溪山秀氣明當時苦吟夜應使鬼神驚凌誌羅昭諫舊居詩題山詠水遍天涯誰識東安是舊家半畝荒基山寂寂夜深風雨落梅花葛塢晏公𩔖要在靈隱山呉方士葛元隱居陸羽二寺記葛洪亦居此郭祥正葛塢詩二葛繼成仙猶存丹竈處有時化鶴來徘徊不知去朱墅咸淳臨安志在靈隱山梁隱士鹽官朱世卿之别墅阿姥堆神仙傳晉初有裴氏姥採衆花醖酒忽有三人至姥所授藥數粒姥餌之仙去今堆上花草猶存隂雨時或聞酒香淨慈寺志仙姥墩舊在長橋東杜牧塢咸淳臨安志南山與佛日山夾徑世傳牧墓在此無可考鮑家田武林梵志在錢塘門外呉越相鮑君福之陽田呉濟鮑家田詩摇斾家家酒扶犁處處村草深迷井口槿密擁籬根綠水明秧本青山失燒痕多應忌蠶事避客掩柴門柳林咸淳臨安志在錢塘門外松門四朝聞見錄九里松一字門扁呉說所書高宗欲自為書無以易說乃命金塡其字復揭於門萬厯靈隱寺志松門唐刺史袁仁敬立名袁公松門陳贄和題九里松門詩刺史袁君有古風沿湖九里植蒼松凉颸度處琴調韻積雪晴時屐印蹤一路波濤聲謖謖兩行幡蓋影童童森然總是徂徠種想與秦封不共宗劍門關咸淳臨安志在棲霞嶺舊多桃花爛然如霞桃花關咸淳臨安志在南包山冷水峪有桃花關上有蒸霞二字江湖偉觀遂昌雜錄保叔塔山上夀星寺西陟磴而上為江湖偉觀蘇文忠所謂一舸鴟夷江海去尚餘君子六千人今則磴道不復存矣董嗣杲西湖百咏引江湖偉觀在夀星寺最高處原名觀臺後圯矣至淳祐十年改建其上更創兩亭直至山椒車若水題江湖偉觀詩十年不向此凭闌景象依然一望間龍蜃吐雲天入水樓臺倒景日銜山僧於僻寺難為隱人在扁舟不是閒孤鶴似尋和靖宅盤空飛下復飛還朱繼芳江湖偉觀詩呉山表裏水為池百有餘年壯玉畿天目遠將雙鳯落海門近拱五雲飛胥濤白雪生秋思太乙紅霞駐夕暉江上沙鷗湖上舫柳邉花外兩依依鄴公菴萬厯靈隱寺志宋守祖無擇建在石笋峰有東坡少游魯直畱題文與可畵竹東坡菴咸淳臨安志東坡既名六一泉又於泉後築室自名東坡菴岣嶁山房萬厯靈隱寺志靈隱澗西李元昭結廬於此藕花居錢塘縣志在南屏即南港孫太初之鶴渚在焉南屏有八景為鶴渚中峰慈門琴臺古塔長橋蓮洲藕居俱稱勝景王守仁藕花居詩掩映紅粧莫漫猜隔林知是藕花開共君醉卧不須扇自有香風拂面來半道紅呉越備史在北郊舊植桃花之所陶家廂西溪百咏注在畱下禁酒碑後宋理宗朝有陶處士隱此建水竹居楊圩西溪百咏注楊統制宋之功臣兄弟和睦各置一圩在西溪北馬塍咸淳臨安志有東西馬塍在餘杭門外土細宜花都城之花皆取焉或云塍當為城蓋錢王舊城餘杭門外地與此相接劉泰馬塍看花詩一溪流水繞芳塘誰種溪南十畝桑樵谷暗通三竺寺人家住近百花莊偶隨碧草尋詩去却愛青林煮酒香便典春衣拚醉倒傍人慣識杜陵狂流觴曲水戴表元楊氏池堂讌集序霅周密公謹與杭楊承之大受有連依之居楊大受和王諸孫共居近苑籞多引外湖之泉以為池環廻斗折雖在城市而具山溪之觀流觴曲水者諸泉之最著也公謹安之大受損其地之西偏使自營别第公謹遂為杭人宴居畱青日札廬陵張昱至正間為浙省員外張士誠時棄位不仕所居在今城中花市名曰宴居古仙壇顧况有題臨平塢古仙壇詩讀書林萬厯杭州府志讀書林有二一在海寧縣治西㕔一在昌化百丈山下宋唐閻於百丈溪理茆茨讀書故名鍾必萬縣治讀書林詩簿書叢裏讀書忙驚散庭前雁鶩行獨有蒼官與青女對人依舊立斜陽觀濤所太平寰宇記富陽縣石頭山有觀濤所桑亭埭太平寰宇記在富陽縣漢末有桑君養犬數年不吠孫文臺經此犬忽吠之桑曰君其異相乎及貴欲報桑知其好張箄捕魚為作九里箄以貺之藥圃咸淳臨安志在餘杭縣大滌洞東山之前夏侯天師種藥於此芝畦术塢百藥之植靡所不有嘗言古人以上藥養神中藥養性下藥遣病自賦藥圃詩云綠葉紅英遍仙經自討論偶攜巖畔菊鋤斷白雲根至今圃蹟猶存茅嶺洞室杭州府志在臨安縣垂􅋼山晉許邁築精舎與陳安世茅季偉徃來於此洪氏山房咸淳臨安志在於潛縣寳福寺洪舜俞聚書其中魏鶴山為記魏了翁洪氏山房藏書記寳慶元年吾友洪舜俞自考功郎言事罷歸於潛讀書天目山下寳福僧寺寺靚深舜俞合新故書得萬有三千卷藏之闕復閣下如李氏廬山故事而移書於靖屬余記之東林萬厯新城縣志在縣西廣陵鄉淨嚴院施肩吾招徐凝同游有詩東坡林昌化縣志在治平寺後舊有東坡手書石刻因名藏春塢咸淳臨安志在昌化縣宋佽雲老有徐氏藏春塢詩隋朝檜天竺寺志在下天竺寺宋大中祥符間復茂號重榮檜葛仙翁虬松錢塘縣志在西湖履泰將軍廟前相傳仙翁所植宋銀杏武林梵志城内水陸寺銀杏二株甚巨宋時物也錢王鐵幢呉越備史王射潮箭所止處嘗立鐵幢後人因名鐵幢浦徐一夔鐵幢辨舊臨安志云呉越王鏐用强弩射潮箭止處立鐵幢以識又云錢氏子孫言築塘時高置鐵幢三以為水則在今利津橋北者其一也其地舊名鐵幢浦幢制首圓如杵徑七八寸首出土三尺餘趾皆䧟土故老曰初置幢時塘猶未成慮潮盪幢用鐵輪䕶幢趾以鐵絙貫幢幹且維絙石撻然後實土築塘故幢首出土宋淳祐間趙安撫作亭覆幢今平為民居而鐵幢之首嶄然出窪池可騐幢本有三一在舊便門街東南小巷今巷尚名鐵箭一在薦橋門外皆堙塞僅存在利津橋者若不表識亦堙塞矣近有指此幢為箭幢首為鏃不思方射潮時已逐潮去箭烏能存且鏐雖英雄一時精誠所激豈有異於常箭哉又謂幢首可撼而不可㧞以為神不察其下關鍵故也乃惑夷堅志之說謂此矢㧞則龜目紅尤謬辟塵爐錢塘縣志在六通慈德院非木非石叩之錚然纎塵不染岳墳檜舊浙江通志在鄂王墓前明天順間杭州同知馬偉鋸而植之以示分檜屍狀號分骸檜至今猶活鐵井闌明一綂志在六和寺南昔有蛟龍自井出攻損江岸錢氏鑄鐵井闌鎭之刻八卦於上仙人碁明一綂志在府城西五十里山上以丹砂為局路黑白碁子皆在葛仙翁六竈嘉靖海寧縣志在縣東北十六里相傳仙翁遺蹟廻紋璧海寧縣志在惠力寺正殿高三丈闊四丈砌法廻紋如織千年以來嶷然不動人以為公輸神蹟唐朝杉咸淳臨安志在洞霄宫外唐朝櫟大滌洞天記在洞霄宫外相傳唐咸通二年呉天師種宋咸平中自枯至祥符壬子復榮漕使陳堯佐圖狀進呈號重榮木神應鐘杭州府志唐大厯間旱禱於大滌洞既雨神見夢謂宜笵金為鐘以報宋宣和間燬紹興中重鑄赤城左蟠為記唐雙檜泊宅編鹽官安國寺雙檜唐宣宗時悟空禪師手植宋宣和中朱勔取以供進由海道遇風濤檜淪於海悟道松杭州府志在臨安縣葛稚川修仙天目每坐松頂高吟因名呉越將軍木咸淳臨安志在石鏡山錢王幼時所戲大木後貴封為衣錦將軍牧嶺古松舊浙江通志在於潛縣南有兄弟欲訟有司夜憇訟下遲明各悔而還時名松為木長官謹按古蹟一門舊志俱無定例如洲池井石當入山川隄塘當入水利鐫刻當入碑碣書院神祠佛塔當入學校祠寺各門分載翻多罣漏矣今從陳善杭州府志之例以古城首次以故都舊治又次以園館堂齋軒亭樓閣以及於故宅其不屬於𩔖者雜叙於末而以古物終焉遵皇輿圖表敝各縣之先後次第十一府總此例也惟古治縣名不同故以朝代冠之庶知所考焉浙江通志卷四十
