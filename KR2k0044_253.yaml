序諸暨孝義黃氏族譜裔孫周思文輯宋濂序重修童氏族譜三卷明初金華童常修商輅序家乘續編金華縣新志錢學孔著陳氏族譜分省人物考陳良謨著族譜二編分省人物考陳善著西甌黃氏家牒黃仁修宋濂記章氏家乘四篇龍泉章溢著宋濂序嚴陵汪氏家譜宋濂序夀昌胡氏譜胡榮修宋濓題後環水王氏重修族譜雲南道監察御史王賓修商輅序龍丘徐氏族譜閩藩參政徐貫原一修商輅序趙氏家譜六卷分省人物考趙鏜著江山人許氏家乘兩浙名賢錄許聞造著鄭氏宗譜崇禎浦江縣志鄭崇岳著俞氏家乘成化新昌縣志集其累世志銘誥勅及名人贈送詩文俞氏族譜成化新昌縣志俞鎔撰字元冶黃巖應氏族譜黄淮序重修畫溪姚氏族譜顧應祥序韶林顧氏世譜源流顧應祥序徳清瞰溪嵇氏族譜謝先申序馬要沈氏譜沈節甫序上蔡宗譜平陽縣志蔡立身著陳氏家乘四卷嘉禾徵獻錄陳懿典著孫氏家乘天啟平湖縣志孫成名著來氏家乘蕭山縣志來斯行著水澄劉氏宗譜八卷劉宗周輯右家譜葉信公年譜寧海縣志公子應友撰紀蹟錄萬厯紹興府志張爚嵊人每日所行必書之以自考至老不輟卓忠貞年譜黃氏書目宣徳中卓敬門人黃朝光編方正學年譜一卷按黄氏書目不著撰人項襄毅公年譜五卷實紀四卷遺藳一卷陸樹聲序五世孫廷堅纂嘉禾徵獻録實紀項臯謨著項襄毅補記秀水縣志項承芳著章恭毅公年譜一卷黃氏書目章綸子南京工科給事中元應編自述年譜十六卷萬厯杭州府志胡世寧撰商文毅公年譜四卷遺行錄一卷按黃氏書目不著撰人鄭端簡公年譜十卷黄氏書目子履洵輯楓山年譜兩浙名賢錄徐袍著楓山章文懿公年譜内閣書目阮鶚著陽明先生年譜十卷按焦氏經籍志不著撰人陽明先生年譜三卷聚樂堂藝文志錢徳洪撰陽明先生年譜二卷門人鄒守益撰閔莊懿公年譜一卷聚樂堂藝文志陸昆撰拙菴年譜二卷黃巖縣志牟賢著中山子自述括蒼彚紀毛仲著呉太宰年譜二卷黃氏書目呉鵬沈青霞年譜一卷沈小霞年譜一卷按黃氏書目不著撰人文長自著畸譜一卷尤氏藝文志徐渭撰劉蕺山年譜㑹稽縣志子汋編譜傳畧一卷海寧縣志郭濬著陸稼書先生年譜一卷陸隴其子宸徵錄右年譜明天真人司馬君傳一卷通志藝文畧羽山人有空撰葉法善傳二卷唐書藝文志劉谷神撰唐葉真人傳一卷道藏目錄葉法善開元年登仙闡教度人事實紀傳地祇上將溫太保傳道藏目錄黃公瑾述智者别傳一卷真觀法師傳一卷天台山方外志章安尊者撰注天台别傳天台山方外志四明照師撰明州三佛傳三卷戒香啞女維衛佛傳元僧悟光釋迦如來真身舍利寳塔傳元僧曇噩定應大師布袋和尚傳武林西湖髙僧事畧一卷宋永嘉釋元復輯永明道蹟一卷淨慈寺釋大壑輯宋永明禪師事蹟雲棲大師塔銘一卷按黄氏書目不著撰人雲棲大師𫝊一卷澹生堂書目虞淳熙撰右釋道浙江通志卷二百五十四
