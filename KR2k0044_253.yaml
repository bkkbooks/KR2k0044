body:
  text: 浙江通志卷二百五十四經籍兩浙志乘下蕭山學志蕭山縣志萬厯時敎諭王學孝著天啟時敎諭張汝醇修西湖書院志嘉靖仁和縣志仁和徐奇編虎林書院志一卷錢塘縣志聶心揚撰安定書院集呉興藝文補沈秱序崇正書院志十一卷金華縣新志胡僖輯石鼓書院志五卷内閣書目李安仁著鹿城書院集萬厯溫州府志郡守鄧淮編瀛山書院志萬厯嚴州府志方應時著貞義書院集萬厯溫州府志張孚敬撰語溪宗輔錄四卷萬厯崇徳縣志胡其久字懋敬傳貽書院址廢力請復之輯宗輔錄行世右學校水兵律令陸兵律令水兵操法陸兵操法各一卷萬厯杭州府志巡撫都御史谷中虚撰浙直分署紀事始末不知作者兩浙兵制考四卷萬厯癸巳將軍侯繼髙撰兩浙備兵杞言八卷崇禎間嘉湖兵備道呉郡蔡懋徳撰字維立右兵制兩浙海防考上下卷隆慶元年勅修海防考一卷萬厯杭州府志巡撫都御史劉畿撰兩浙海防𩔖考四卷内閣書目萬厯間都御史謝廷傑纂兩浙海防𩔖考續編十卷萬厯壬寅巡撫劉元霖令右布政范淶輯左布政史繼辰為序兩浙海邊圖籌海圖編兵部郎郭仁撰浙東海邊圖籌海圖編都御史周倫撰浙東海邊圖籌海圖編太守秦汴撰浙海圖籌海圖編總兵俞大猷撰浙海圖籌海圖編總兵盧鏜撰浙海圖籌海圖編都御史黎秀撰溫處海防圖畧二卷萬厯丙申兵備副使宛陵蔡逢時應期纂定海備倭紀畧海防纂要遊擊梁文撰海宼前後議二卷焦氏經籍志萬表撰東海籌畧海防纂要叅將徐一鳴撰備倭考籌海圖編寧波李賢撰浙洋哨守冊籌海圖編總兵盧鏜撰海防畧檇李往哲列𫝊錢薇著海防事宜籌海圖編副使茅坤撰靖海紀畧二卷黄氏書目嘉靖中海鹽知縣鄭茂著舟師占驗海防纂要叅將沈有容撰晏海編上下卷崇禎己巳浙江督撫張延登濟美輯兩浙戰船則例籌海圖編備倭都指揮李釡撰右海防海隄録一卷至正己卯餘姚州判葉恒敬常築石堤子晉輯名賢述作以褒揚之從孫翼刋行海塘記一卷焦氏經籍志黄光昇撰全修海塘錄十卷内閣書目萬厯間邑人編次海鹽縣海塘修築事實歴修海塘録九卷萬厯間纂不著撰人海鹽築塘記一卷不著撰人右海塘浙西水利書一卷萬厯間人輯不著名氏分宋書元書今書凡四十七篇杭州府水利圖說杭州府志知府劉伯縉纂濬復西湖錄一卷百川書志杭州知府西蜀楊孟瑛溫甫著海寧水利圖誌海寧縣志知縣嚴寛著水利議海寧縣志敎諭鄭日休著嘉興七縣塘圩水利圖七卷見嘉興府志不知何人作秀水縣水利考萬厯秀水縣志林應亮著東湖水利明金澄著四明它山水利便覽上下卷淳祐二年里人魏峴編輯四明水利圖說明游應乾著濬湖議甬上耆舊詩倪復著蕭山縣水利事蹟蕭山縣志錢塘項冲著沖以宋淳熙九年宰蕭山具載六湖二堰鄭河口事蹟為一冊垂於後又作湘湖水利約束刻石樹於縣庭湘湖水利圖蕭山縣志張懋著懋以明洪武初宰蕭山繪圖刻石又作湘湖志畧具載顧郭楊趙四公創建始末蕭山水利事述蕭山縣志本邑魏驥著驥以尚書致仕家居凡邑水利興廢之由利害之繫塘閘壩堰共十六所勒為成書授門人監察御史何舜賔舜賔清理湘湖忤邑令鄒魯被陷死壻福建副使富玹以此書併事蹟等書及禁革湘湖榜例皆刋板至今尚存湘湖水利志三卷蕭山毛奇齡撰紹興水利圖說二卷黄氏書目賈應璧撰溫州水利四卷不知作者右水利宣和兩浙㑹計總録程昌弼撰唐昌記二卷文獻通考知昌化縣趙希暨克家撰平陽㑹四卷文獻通考通直郎知平陽縣汪李良子駟撰以一邑財計自兩稅而下為二十一篇又為外篇五條如砧基副本催科檢放及書手除科敷之𩔖以為此財用所從出也㑹稽和買事宜七卷書錄解題浙東帥洪邁景盧提舉常平鄭湜補之集時紹熙元年礦防考一卷萬厯杭州府志巡撫都御史劉畿撰處州銀冶志新昌應子才著平凉趙時春序賦役詳議四卷黄氏書目浙江叅政錢嶫撰字民望南直隸通州人兩浙賦役成規十卷黃氏書目婁志德為浙江右布政時輯字存仁通許人浙江賦役全書萬厯壬子彚修康熙間再輯嘉善清賦平役新書四卷明沈受麒輯里役書黄氏書目章嘉禎著惠浙一條鞭一卷不知撰人兩浙賦役考錢塘呉允嘉著丈量則例一卷海寧縣志知縣許天贈著派貼均差書冊海寧縣志知縣林恭章著三邑田糧七辨明王儒撰婺治聚民政書金華縣新志張朝瑞撰北新關志一冊黄氏書目田藝蘅輯北新鈔關志十六卷黃氏書目荆之琦輯北新關志十六卷嘉靖十三年主事臨淮王文儒修二十三年員外郎涇縣王廷幹重修十五卷隆慶三年主事黟縣許天贈再修崇禎八年員外郎濟南王宫臻續増南關志六卷嘉靖仁和縣志工部主事薛僑編集兩浙南關𣙜事書一卷隆慶元年關吏楊時喬輯右賦役熙寧江淮浙鹽勅令賞格六卷宋史藝文志李承之撰江湖浙路鹽勅令賞格四卷玉海蹇周輔董唐臣修兩浙轉運須知一卷按通志藝文畧不著名氏兩浙鹺志嘉靖間廵鹽御史唐臣修兩浙鹺志二十四卷萬厯間雲間王圻修兩浙鹽法條例五十卷欽依鹽法要覽要覽續編共十四卷行鹽事宜六卷招商事宜一卷塲所公費事宜一卷萬厯杭州府志已上兩浙運司鏤板兩浙訂正鹽法四卷按黃氏書目不著名氏勅修兩浙鹽法志十六卷雍正五年浙江巡撫兼理鹽政臣李衛修右鹽法浙西提舉司社倉規不知作者備荒議一卷萬厯秀水縣志賀燦然著常平倉記又金華荒政黃氏書目張朝瑞著荒箸畧十二篇嘉禾徴獻錄劉世教字少彝海鹽人時浙苦水患著此獻當事議欲畱浙漕輓粟以備荒慨不得建明著幽憤集自寓荒政紀畧一卷尤氏藝文志楊徳周撰濟荒書秀水縣志顧鳳禎著救災集議甬上耆舊詩倪復著救荒全書嘉禾徴獻錄姚思仁著右積貯臨海水土異物志一卷隋書經籍志沈瑩撰會稽郡造海味法一卷按隋書經籍志不著名氏海味索隠一卷續說郛屠本畯撰水族加恩簿一卷清異錄呉越功徳判官毛勝以地産海物四方所無因造水族加恩簿越中牡丹譜二卷書錄解題僧仲林撰其序末稱丙戌歳丙戌者當是雍熙二年也永嘉橘録一卷書錄解題知溫州延安韓彦直子溫撰菌譜一卷百川書志宋陳仁五著筍譜一卷梅譜一卷天啟丁夘法華山釋真一撰桂譜一卷湖西朱鳳翔著正徳庚午自序金華藥物鏡三卷金華縣新志商大輅撰右物産先賢祠錄仁和夏時正裒集成化戊戌胡榮序武林旌徳全志上下帙邑人李唐裒次萬厯戊午陳禹謨序勲賢祠志一卷王文成祠志豫章喻均撰錢塘陳善校呉山城隍廟志一卷崇禎戊寅道士錢斯聲輯廵撫喻思恂序重修呉山城隍廟志一卷康熙甲申道士黄治中屬錢塘顧鳴廷修靈衞廟志一卷隆慶庚午海昌沈友儒梓萬厯丁未郡人楊廷筠重輯郡人夏賓纂修平湖陸氏景賢祠志四卷天啟平湖縣志陸基忠著清風祠録明徐恂輯清風祠錄聚樂堂藝文志戴冠輯方祠録海寧縣志明熊秀輯金華正祠録分省人物考凌瀚著金華鄉賢祠志明薛敬之著玉樹芳聲上下卷錢塘謝君錫允忠輯金龍事迹金龍四大王事蹟一卷康熙丙子仁和俞星畱輯海神靈應錄一卷書錄解題永嘉陸維則撰娥江題咏趙汝謮序娥有廟居江之濆廟旁小僧刹佐奉香火如瑩主之裒集古今往來欵謁題咏自唐已下時開慶己未曹孝娥名賢題咏一卷江西左叅政邑人張翰英裒集正統四年王鈺序靈孝録上下卷崇禎丙子郡守許捷雲賓著曹江孝女廟志十卷萬厯己未山隂諸萬里編末附孝女朱娥諸娥曹江孝女廟志十卷康熙丁未里人印繪張噩同輯沈志禮序右祠廟西湖淨社錄三卷宋史藝文志釋省常撰武林梵志十二卷萬厯壬子渤海呉之鯨採輯呉用先序西溪梵隱志四卷順治辛夘虎林呉本泰藥師編輯靈隱寺志八卷萬厯壬辰昌黎白珩子珮修靈隱寺志八卷康熙壬子仁和孫治宇台輯呉門徐増子能増修南屏淨慈寺志十卷錢塘縣志明釋大壑撰上天竺山志十五卷順治丙戌本山釋廣賓撰雲棲志錢塘縣志明釋袾宏撰慧因髙麗寺志十二卷天啟丁卯陽羡李翥飛侯輯妙行志一卷宋本山住持義隆編集接待寺志二卷康熙丁亥錢塘呉焯尺鳬輯妙行流芳集一卷住持慧定德濟仕良同集正徳紀元徐奇序佛日山淨慧寺志一卷古杭沙門大掄輯慧雲寺誌上下卷順治己丑寺釋行盛輯武林慈雲講寺志八卷康熙庚午寺僧續法集古杭崇聖院紀事一卷崇禎己卯寺僧行素輯鳳凰山聖果寺志一卷康熙壬寅石屋隱佛巖釋超乾石堂輯臯亭顯寧寺志錢塘徐士俊野君輯鳳凰山大報國寺考古錄一卷康熙甲辰本山釋智生靈繹敘述祥符律寺紀畧一卷康熙甲申寺僧等湛輯天龍寺志上下卷杭釋廣賓輯虎跑寺志四卷康熙甲申大慈釋法深本然輯理安寺紀四卷佛石巖沙門仲光輯普明禪寺志五卷寺僧智乾則菴編安國寺志二卷明董志稷輯聖僧菴集一卷明呉應賓輯潛陽梵刹志一卷三學院釋海濱輯天啟甲子劉志斌序長水塔院記六卷澹生堂書目俞汝為輯吳興東林志四卷聚樂堂藝文志黄維用輯弁山龍華寺志二卷明釋智聆輯弁山法華寺紀畧七卷不知作者天童寺志六卷崇禎癸酉寺釋通布輯天童寺集七卷嘉靖己未四明楊明纂修沙門無憂萬懷編次延慶寺紀畧一卷萬厯丁巳楊徳周孚先撰雪竇寺志畧一卷寺釋履平輯牧雲道者序雲門寺詩一卷按宋史藝文志不知作者天台䕶國禪寺畧志一卷不知作者天台䕶國集三卷明僧寂蘊撰江心志王叔杲序成化初寺僧𢎞斌輯遊江心寺詩一卷聚樂堂藝文志王瓚著江心志六卷萬厯温州府志萬厯庚寅王藴季宣輯仙巖寺志十卷康熙二十四年寺僧佛彥彚訂佛皋増輯洞霄宮圖志十四卷明一統志鄧牧著武林宮觀志錢塘吳元嘉輯重陽菴集一卷成化間住山梅古春輯嘉靖時住山俞大彰用昭増通元觀志上下卷嘉靖甲午仁和姜南輯開元宮圖一卷泰定二年栁貫後序通元觀志上下卷康熙癸酉本觀住持朱溶若始重輯紫陽菴志一卷不著名氏瀛海紀言至正四明續志大瀛海道院名公士人題咏瑞石山紫陽集二卷聚樂堂藝文志范棲雲輯仙都觀記二卷按宋史藝文志不知作者右寺觀武林錄金華賢達傳宋何淡著奉使二浙雜記一卷宋史藝文志沈立撰武林舊事十二卷萬厯錢塘縣志周密著夢粱錄十卷南濠文䟦錢塘吳自牧作古杭夢游錄一卷百川書志宋灌圃耐得翁著勝按錢塘縣志又有都城紀一卷行都記續文獻通考宋方勺撰行都勝事宋陳晦撰古杭雜記一卷焦氏經籍志李有撰錢塘𤨏記宋于肇撰錢塘勝跡記五卷咸淳臨安志西湖僧懷顯撰武林紀事八卷分省人物考呉瓚著武林近事雜記杭州府志馮廷槐著武林内外志靈隱寺志邵重生著錢塘遺事續文獻通考宋趙彥秬撰錢塘遺事十二卷續文獻通考元劉一清撰客杭日記一卷元京口郭卑天錫著西湖麈談四卷仁和沈儀懋徳著杭志三詰三誤辨一卷西河合集毛奇齡著武林雜志杭州林瀾觀子著湖壖雜記一卷說鈴錢塘陸次雲撰臨平記四卷仁和縣志沈謙著臨平續記仁和縣志潘雲赤著唐山紀事成化杭州府志元凌緯著嘉禾故事一卷書錄解題郡守毗陵張元成撰嘉禾事紀二卷尤氏藝文志鄭振先撰檇李記一卷鹽邑志林王樵著湖邑紀聞檇李徴獻錄陸上瀾著呉興雜錄七卷書錄解題湖州刺史張文規撰當㑹昌二年呉興鏡見錄鄭蟠撰西吳里語四卷崇禎烏程縣志宋鑒字子明著讓名於其父雷西呉枝乘二卷尤氏藝文志謝肇淛撰呉興備志崇禎烏程縣