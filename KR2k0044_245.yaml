body:
  text: 浙江通志卷二百四十六經籍六子部中釋藏金剛般若經疏一卷矢台山方外志智者大師撰建炎二年武林修悟將此疏入經為注金剛義疏七卷宋高僧𫝊唐越州法華山寺僧元儼著俗姓徐氏諸暨人金剛集解二卷天台山方外志假名湛師撰金剛般若疏二卷發軫鈔三卷天台山方外志淨覺岳師撰金剛通論一卷金剛事説一卷天啓平湖縣志可觀著字宜翁金剛辨惑一卷復宗二卷上天竺山志處咸著天台王氏子金剛疏嘉靖寧波府志釋元照著錢塘人金剛疏二卷天台山方外志仙潭倫師撰金剛般若經解四十二卷宋史藝文志王日休撰金剛元解上天竺山志善月著字光逺金剛新解天台山方外志北峯印師著金剛經集注上天竺山志元釋性澄著金剛經注一卷明一統志釋宗泐著金剛經注解附録二卷兩浙名賢外錄釋博洽著字南洲山隂人金剛三昧經注解一卷澹生堂書目圓澄著金剛演説一卷崇禎衢州府志葉秉敬著金剛經鎞上下卷雲棲釋廣伸述提金剛經十卷又金剛隨説又金剛别𫝊又金剛拈雲溪釋淨挺俍亭著仁王疏記上天竺山志釋善月著文殊般若經疏二卷㭊重鈔一卷天台山方外志孤山圓師撰般若心經永新鈔宋高僧𫝊漢杭州龍興寺僧宗季著俗姓俞臨安人心經疏天台山方外志天台曠師撰般若心經疏一卷詒謀鈔一卷天台山方外志孤山圓師撰心經注天台山方外志樝菴嚴師撰心經注天台山方外志桐江瑛師撰心經注上天竺山志釋性澄著心經科注一卷天台山方外志越溪澄師撰心經注一卷明一統志釋宗泐著心經文句一卷黄氏書目宋濂著至正辛巳序心經鬭輪解石門縣志釋通容著心經句義雲溪釋淨挺俍亭著彌陀經義疏一卷天台山方外志智者大師撰阿彌陀經疏一卷西資鈔二卷天台山方外志孤山圓師撰彌陀經新疏二卷指歸記二卷天台山方外志淨覺岳師撰彌陀義疏萬厯錢塘縣志釋元照著彌陀注解一卷天台山方外志越溪澄師撰彌陀畧解一卷天台山方外志蘧菴祐師撰彌陀經疏鈔四卷焦氏經籍志袾宏撰彌陀舌相雲溪釋淨挺俍亭著華嚴經清涼疏一百五十卷華嚴經畧一卷讀書後志僧澄觀撰法界觀摭一要記四卷郡齋讀書志僧遵式述華嚴骨目二卷天台山方外志荆溪尊者撰華嚴要畧二卷尤氏藝文志釋方澤撰華嚴論貫一卷衢州府志葉秉敬著涅槃義疏十卷續高僧傳釋慧皎著㑹稽上虞人涅槃元義二卷疏十卷佛祖統紀章安尊者灌頂撰師姓吳氏臨海章安人按宋高僧𫝊台州國清寺僧湛然重治定涅槃疏十五卷天台山方外志荆溪治定十五卷今十八卷涅槃後分疏一卷天台山方外志荆溪尊者湛然撰涅槃義評鈔十四卷宋高僧𫝊後唐㑹稽郡大善寺僧虛受著嘉禾禦兒人涅槃經注天台山方外志龍興皓師撰涅槃記十二卷天台山方外志華頂滿師撰涅槃經夾注八十卷宋高僧𫝊越州僧禮宗著俗姓宋㑹稽人百非鈔一卷發源機要記一卷三徳指歸十卷天台山方外志孤山圓師釋涅槃涅槃㑹疏雲門釋圓澄撰涅槃末後句雲溪釋淨挺俍亭著光明元義一卷光明文句三卷天台山方外志智者大師撰元義釋籤十卷文句記十卷天台山方外志荆溪尊者撰光明元義記天台山方外志靈光敏師撰光明元金鼓記天台山方外志廣教或師撰發揮記天台山方外志奉先清師釋光明元畧本索隠記四卷表微記一卷天台山方外志孤山圓師釋光明元光明元贊釋又光明句備急鈔天台山方外志寶雲尊者撰諱義通字惟逺光明元續遺記三卷光明文句記六卷天台山方外志四明慈雲師撰光明十願王天台山方外志法真咸師撰元籖備檢四卷文句箋難四卷天台山方外志樝菴嚴師撰順正記三卷新記七卷天台山方外志神智義師釋光明元䕶國記四卷天台山方外志假名湛師釋光明元義金光明經隨文釋十卷宋高僧𫝊宋秀州靈光寺僧皓瑞著姓張氏嘉禾人法華元義十卷法華文句十卷讀書後志智顗撰法華疏續高僧傳唐義淨著法華釋籖十卷法華疏記十卷宋高僧𫝊釋湛然著法華經解疏記十卷宋高僧𫝊唐湖州八聖道寺僧真乗著姓沈氏徳清人解宣律師法華序一卷宋高僧傳後唐杭州龍興寺僧可周著俗姓傅晉陵人法華注七卷天台山方外志愚谷慧師撰法華撮要一卷上天竺山志與咸著法華經注嘉靖定海縣志釋智朗著法華披荆鉞一卷天台山方外志明妙峯真覺法師著法華圖㫖天台山方外志象先清師撰法華意語雲門釋圓澄撰法華元義輯畧天台釋𫝊燈撰四明聞龍序法華懸譚雲溪釋淨挺俍亭著無量義經疏一卷天台山方外志孤山圓師撰雜珠記二卷天台山方外志慧覺玉師釋孤山無量義經疏維摩元疏六卷維摩文疏二十八卷天台山方外志智者大師撰維摩畧疏十卷維摩廣疏六卷天台山方外志荆溪尊者撰畧維摩疏十卷維摩疏記三卷宋高僧傳釋湛然著維摩饒舌雲溪釋淨挺俍亭著楞伽通義六卷上天竺山志善月著楞伽經注四卷明一統志釋宗泐著注釋楞伽經列朝詩集沈𢎞道著字存翁桐鄉密印寺僧楞伽經記慈雲寺志續法著字伯亭駐錫慈雲楞伽心印雲溪釋淨挺俍亭著觀無量壽佛經疏一卷彌勒成佛經疏五卷彌勒上生經疏一卷天台山方外志智者撰上生經暉理鈔又彌勒成佛經疏鈔又補猷鈔宋高僧𫝊後漢杭州龍興寺僧宗季著摭華鈔二卷天台山方外志孤山圓師釋圭峯蘭盆疏蘭盆補注一卷天啓平湖縣志釋可觀著觀音别行元義二卷觀音别行義疏二卷請觀音經疏一卷天台山方外志智者大師撰觀經疏記天台山方外志石壁靖師撰闡義鈔二卷刋正記二卷天台山方外志孤山圓師釋觀經疏觀經疏記天台山方外志寶雲撰觀音别行元記二卷觀音别行疏記二卷觀音疏妙宗