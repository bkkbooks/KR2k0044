body:
  text: 浙江通志卷一百五物産五台州府穀赤城志丹丘榖夏冬再熟言其土所宜也夏熟者曰早禾冬熟者曰晚禾其最早者曰六十日曰隨犁歸曰梅裏白曰便糧其次早者曰白婢暴曰紅婢暴八月白晚者曰白香曰白堇曰大細是數者名最著土人通藝焉又以色言之則大青矮青光頭青黃散秈馬觜紅金珠之類是也而馬觜紅尤香而甘以次言之則獻臺相連寄生第二遍之類是也而獻臺最貴至於旱稜宜旱倒水賴宜水是又其性之相反者也糯之種相傳有數十而可記者有流水糯白糯黃糯麻糯荔枝糯烏鹽糯皆以其色近似至葉婆糯郎君糯則因其人得名而矮子糯則以其穗短而稱焉占城自占城國至剡秈自剡至大中祥符中遣使於福建取種分給種之今土俗謂之百日黃是又得之閩中也名雖多總其目曰粳曰糯爾雅所謂黏與不黏者是其别與豆赤城志豆有五色又有形如虎爪羊角刀鞘者又一種白扁豆生籬落間可藥可食芥菜赤城志一名水蘇有紫芥黃芥青芥油芥數種出石罅者曰山芥味極辛出黃巖仙居瓜赤城志有金瓜銀瓜等種又有名八稜約青算筒者蘿蔔黃巖縣志萊蔔俗名蘿蔔宜於沙地出黃巖潮際者尤大韭天台山記赤城山有洗腸井昔曇猷禮石橋應真怪其腹中有韭氣猷出腸洗之至今韭尚叢生焉天台勝迹録今井邊生韭青而香薑本草綱目出臨海章安者佳枝甚長玉環志猴薑一名毛薑可入藥蒜崇禎寧海縣志有蓮花蒜又一種名八簡沙蒜黃巖縣志沙蒜另有一種曰塗笋筋竹笋笋譜天台圖經云五縣皆有言其竹韌也狗竹笋笋譜寧海以來多有三寸圍節間有毛筍三月生可食合菌菌譜邑西韋羌山高迥秀異寒極雪收林木堅瘦春氣微欲動土鬆芽活此菌候也菌質外褐色肥理玉潔芳薌韻味發釡鬲聞百步外蓋菌多種自柔美皆無香獨合菌香與味稱雖靈芝天花無是也宜特尊之以冠諸菌其始名合菌舊傳昔嘗上進標以台菌上遙見誤讀因承誤云數十年來既充包貢山獠得善賈率曝乾以售罕獲生致邑孟溪山中亦同時産惟菌柄高無香氣土人以是别於韋羌焉稠膏菌菌譜邑西北孟溪山窈窕邃深莫測秋中山氣重霏雨零露浸釀山膏木腴蓓為菌花戢戢多生山絶頂高樹杪初如蘂珠園瑩類輕酥滴乳淺黃白色味尤甘勝已乃傘張大幾掌味頓渝矣春時亦間生不能多稠膏得名土人謂稠木膏液所生耳合菌他邦猶或有之此菌獨此邑此山所産故尤可貴煮法當徐下鼎瀋伺涫沸漉起謹勿匕撓撓則涎腥不可食性參和衆味而特全於酒烹齊既調溫厚滑甘雉尾蓴不足道也或欲致逺則復湯蒸熟貯之瓶罌然其味去出山逺矣萬厯仙居縣志又名香椹韋羌大陳坑諸山皆有用椆樹標樹先一年砍伐以斧遍擊之次年雷動即生栗殼菌菌譜寒氣至稠膏將盡栗殼者則其續也桐菌癸辛雜識天台所出桐菌味極珍然致逺必漬之以麻油色味未免頓減諸謝皆台人尤嗜此品乃併􅐝桐木以致之旋摘以供饌甚鮮美天花菌赤城志生木上者曰木耳生木上而細者曰天花菌石耳日用本草石耳生天台石崖上逺望如煙巖衣臨海縣志生巖石上甚美椒始豐類藁蜀多美椒天台賈漢州解官歸時攜其種蒔之其味辛烈不減蜀産至今人稱漢州椒天台縣志紅椒色香勝於蜀産以赤山産者為勝赤城志其椒紅色天台獨盛胡麻飯埤雅天台有胡麻飯仙米台州府志太平縣天馬山龍湫下出石米通明如雪俗稱仙米山桑崇禎寧海縣志可為弓松王羲之遊西郡記永寧縣界海中有松門島嶼上皆生松金松平泉草木記木之奇者有天台之金松酉陽雜俎葉似麥門冬葉中一縷如金綖出浙東台州尤多李德裕金松賦並序廣陵東南有顔大師猶子舊宅即孔北海故臺余因遊眺忽覩奇木枝似柳松葉如瞿麥翠葉金貫粲然有光訪其名曰金松訊所自來得於台嶺乃就主人求得一本列於平泉敘其所自作此賦青春已暮白日將夕經顔子之故巷訪孔公之舊宅美珍木之在庭得嘉名於樵客曩擢本於台嶺近徙根於簷隙其柯肅肅可比於真松其葉纎纎實侔於瞿麥風入葉而成韻露垂柯而流液不受命於嚴霜諒同心於寒柏舍春靄而蔥蒨映夕陽而的皪疑翠尾之羣翔若金潭之旁射雜爽籟於簧竹混晶光於瑶碧奇樹以垂珠而擅名金松以潛穎而莫覿亦猶處子在於隱淪奇木遺於草澤我有衡宇依山岑寂類仲長之清曠如蕭宰之窮僻託根此地似在崖壁殊橘柚之不仙同甘棠之可惜庶封植於園林永愛玩而無斁琪樹赤城志按孫綽賦云琪樹璀璨而垂珠李善注云仙都所産未言其狀也至唐人詩詠始盛李紳詩注云垂條如弱栁結子如碧珠三年子可一熟每嵗生者相續一年緑二年碧三年者紅綴於條上璀錯相間此言其狀也李紳琪樹詩石橋峯上棲元鶴碧澗巖邊蔭羽人氷葉萬條垂碧實玉珠千日保青春月中滴露應同浥澗底侵雲尚有塵徒使茯苓成琥珀不為松老化龍鱗偃松赤城志土産最盛天台有怪松大數圍高不四五尺陸龜蒙嘗讚之寧海梁王寺亦有偃松極古怪香柏赤城志天台柏香峯以多柏木故名海石楠平泉草木記天台之海石楠金荆天台縣志木有文可為牀支赤城志謝靈運名山記云樓石山多有之枕赤城志出樓石山棕櫚崇禎寧海縣志棕櫚極多其皮可蔽雨索綯錦漆玉環志不凋多節又一種多刺者名棟漆可燒作炭山桃玉環志葉長有毛花如桃紫色不實花蕭玉環志花粉紅結黑子可染網網入鹹水不腐墨桅玉環志花如茶花葉如冬青皮似杉紅心其皮可毒魚出小陳嶴山椒玉環志大合抱高不過六七尺不花而實如山查不可食土漆玉環志其皮粘著人手即發腫若刀瘡見血搗此敷之即止釣樟玉環志與樟二木也其葉搗汁用熱水沖對膠粘和灰合磚牢不可破羅漢樹林憲題台州郡圃羅漢樹詩序其樹葉如楊梅經冬不凋生子若羅漢然奇特古怪前所未見也郡人相傳樹有白猿出於月明之時慶厯中有禽若鸞凰而紫色棲於曉煙中天台勝迹録菩提樹不花而實狀如羅漢至秋方收子名菩提珠天台山志山有菩提樹相傳西天梵僧遊化遺此種樹如柿花亦同未結蘂先乃别抽一葉長指半許濶兩指色白而光潤乃結蘂於葉下晝則覆子以蔽日夜則捧子以承露秋社後取子為珠十百中必有一二如羅漢者謂之佛頭他處所生則無之鴛鴦木赤城志通判廳後有連理樹號曰鴛鴦木寧海溪南櫟木亦然烏江栗玉環志不凋亦生栗房而無實又有青栗白栗紅栗青栗心帶青色為材最良山機烏玉環志又名林子結黑子如蠶豆有核可食烏那飯玉環志可燒白炭銀匠必用之子如椒黑色亦可食生櫳杠玉環志可作櫳桃鄭至道劉阮洞記鳴玉澗有塢植桃數畦落英繽紛點綴芳草流紅縹眇隨水而下此昔人食桃輕舉之地也赤城志桃多種以天台水南為勝皆夏熟惟紫桃一名崑崙桃以秋熟更有名寒桃以十月熟又有實心如梅者曰御愛桃又有水蜜桃綿桃餅子桃其無實者為碧桃緋桃李果囉羅納延赤城詩注金閣山在赤城西郊山中盛産青李來禽諸果水晶李花史出天台間間真人曽致元帝杏述異記天台山有杏花六出而五色號仙人杏林檎赤城志本名來禽出天台者佳楊梅赤城志子如彈丸赤色五月中熟近嵗土人所植多大而甘鶴珠棗羣芳譜出天台間間真人以致元帝山棗天台縣志色青黃其核似棗蓋今山棗一名楊桃本草名藤梨或名獼猴桃栗本草綱目剡及始豐皮薄而甜相傳有人病足往其下食數升即能起行始豐今天台也小者號芧栗棐赤城志花實相續而生天台仙居有之蒲萄赤城志有二種紫者微酸青緑者甘甘者名水晶味尤勝出仙居朱欒赤城志朱欒實大如甌理粗而皮厚其瓣堅酢不可食俗呼沙柑又有香欒蜜覃二種瓜方輿勝覽天台山石橋梁峭危石罅有木瓜華時有蛇盤糾至實落供大士乃去號為護聖瓜柑陳景沂橘録跋韓彥直之著録也但知乳柑出於溫之泥山獨不知出於天台之黃巖也出於泥山者固奇出於黃巖者尤天下之奇也薰橘嘉靖浙江通志台州出落花生萬厯仙居縣志原出福建近得其種植之金豆天台縣志果之屬有金豆味香可為蜜煎異果臨海異物志候闥子如指頭大味苦可食土翁子如漆子大熟時甜酸色清黑猴總子如指大與柿相似其味不減於柿多南子如指大紫色味甘與梅子相似皆異果他處所無藕赤城志出臨海蔡嶺者佳甘蔗赤城志有竹荻二種出黃巖亢山等處台州府志近世閩人教以栽蔗秋熟壓其漿煎之惟不能取霜故其利薄茨菰羣芳譜即鳬茨漢書作鳬茈葉有稏如燕尾生水田中今蔡嶺為多牡丹赤城志寧海縣柯仙山其地産牡丹特盛玉蘭天台山方外志台山處處有之其樹有合抱者土人謂之望春花山海棠天台山方外志土人謂之紅棠梨葉如梨樹花如紅梅紫荆天台山記寒巖下有通海池植鐵色紫荆樹玫瑰巖棲幽事天台有白玫瑰桂名勝志郡署有月桂齋唐時月中桂子降芳香味甘食之和暢本草綱目即今浙中山桂也台州天竺最多大樹繁花結實如蓮子狀天竺僧人稱為月桂是矣西湖棘黃巖縣志花屬中天棘有一種葉緑花紅名西湖棘鶴翎花天台勝紀花有鶴翎在石橋東五月開花非常奇異移植之不活名山記天台山有婆羅樹花一名鶴翎出華頂峯以多經風霜樹不高大樹數百枝枝十餘頭頭六七葉經冬不凋花如芍藥香如茉莉徐大受鶴翎花詩九葩一萼鶴翎紅開後梅黃細雨中千葉青蓮無路到不知春在石橋東仙掌花天台山方外志生石壁上如人掌冬花赤城志寧海鹿頭峯林壑中冬有花如桃李九頭蘭萬厯仙居縣志蘭有春夏秋冬四種又一種名九頭蘭暮春盛開挂蘭天台縣志生巖谷中水仙玉環志遍嶴叢生清芬襲人鐵線菊台州府志莖似藤而不曲附挺然直上惟以梢抱物若繫結然故名鐵索花以四月十月兩開一節二蘂色近緑豆外五大瓣先放如盤內則千片日放一層開最久然不易植蒲葵竹台州府志節相去逾尺可為笈笥不假丹漆佛面竹天台縣志節短而方色青黑根如人面苦竹赤城志仙居縣西苦竹橋其地多植苦竹甘竹實天台山志出天台山間間真人以致元帝竹瀝江鄰幾雜志蘇才翁嘗與蔡君謨鬬茶蔡茶水用惠山泉蘇茶小劣改用竹瀝水煎遂能取勝天台竹瀝水彼人砍竹稍屈而取之盈甕若以他水雜之則亟敗茶赤城志按陸羽茶經台越下注云生赤城山者與歙同桑莊茹芝續譜云天台茶有三品紫凝為上魏嶺次之小溪又次之紫凝今普門也魏嶺天封也小溪國清也而宋祁答如吉茶詩有佛天雨露帝苑仙漿之語蓋盛稱茶美而不言其所出之處今紫凝之外臨海言延峯山仙居言白馬山黃巖言紫高山寧海言茶山皆號最珍而紫高茶山昔以為在日鑄之上者也赤城續志黃巖紫高山土膏泉冽中産茶甚奇又寧海蓋蒼山一名茶山瀕大海絶頂其地産茶上雲茶嘉靖臨海縣志上雲峯産茶味異他處宋濂有記園茗抱朴子蓋竹山有仙翁茶園舊傳葛玄植茗於此蒙泉酒赤城志州有蒙泉嘗汲此水釀酒因以為名靈江風月赤城志州舊以靈江水釀酒宋嘉定中嘗以靈江風月名郡醖台芎本草綱目出蜀中者謂之川芎出天台者為台芎因地而名也金光明經謂之闍莫迦三黃黃巖縣志地黃有三種以水試之沈者曰地黃最佳半沈者曰人黃次之浮者曰天黃為下紅术赤城志白者葉大有毛甘而少膏赤者反是貫休詩黑壤生紅术指天台也杜光庭空明洞詩芝术迎風香馥馥指黃巖也玉柏本草拾遺生天台山石上似松此即玉柏之長者名山皆有之高一二尺山人取根莖用白芷赤城志近城及天台仙居多種之附子赤城志出仙居黃皮山比蜀産為下乾薑名醫别録出臨海章安數村作之香茅天台山志玉霄峯重崖疊嶂上産天台勝紀惟洞天宫後者佳地不踰丈道士多祕惜之商陸黃巖縣志有如人形者有神俗呼章栁草烏赤城志出蒼山虎豆玉環志葉如豆莢內有小豆入藥水梔赤城志寧海東郭巖秀石岝嶺石間生水梔卷柏菖蒲東西瀕海多薑术香艾天台縣志鳯林崖上所産艾甚香入藥最佳紫葛嘉靖浙江通志天台紫葛形類芍藥根苗似葡萄長丈許根子天台山志石梁北出向東者佳南燭天台山方外志太極真人青精乾石飢飯以山中南燭煮汁漬米為之烏藥本草别説世稱天台者為勝肉色頗赤差細小耳昆布赤城志東鎮山生山查玉環志紅子可食子與根皆入藥山黃荆玉環志子如胡椒可屑粉亦入藥能消食虎掌薯赤城志薯藥一名玉延一種出臨海寧海山中根圓而長名山藥其下品曰水薯藥又一種紫黃色曰虎掌薯以形似故名入藥最良出黃巖天壽根圖經本草出台州其性涼治胸臆煩熱仙人飯黃巖縣志縣有仙人飯俗呼山阿娘黃寮郎圖經本草生天台山冬夏常青治風天仙藤天台山志生山巖上春生苗抽蔓作藤葉似葛葉圓而小四時不凋根有鬚夏月采石南藤天台山志天台石南藤四時不凋清風藤圖經本草生台州天台山中其苗蔓延木上四時常青又名青藤百稜藤圖經本草一名百靈藤生台州山中春生苗蔓延木上無花葉冬采皮入藥天台縣志藤十二品皆出天台先是內廷常取清風藤無有識者後於臨海山中得之蓋天台六邑之總稱也含春藤圖經本草生台州其苗延木冬夏常青千里及藤圖經本草一曰千里急生天台山中春生苗秋有花花葉皆可入藥祁婆藤圖經本草生天台山中蔓延木上四時有葉無花百藥祖圖經本草生天台山中冬夏常青土人採葉治風催風使圖經本草生天台山中冬夏常青土人採葉治風伏翼太平寰宇記玉峴山鍾乳穴有伏翼大如鵝天台山方外志仙鼠即伏翼在山孔中食乳石其大如鳩鵲者仙經所謂肉芝是也石髓石脂臨海記天台縣寒石山産青芝耳目記赤城山頂有青芝二根天台賦五芝含秀而晨敷謂赤芝黃芝白芝黑芝紫芝也茅玉環志土人用以織壁堅硬勝竹緑苔崇禎寧海縣志苔如髮而緑生海崖赤城志生海水中出寧海古洞者佳紫草赤城志仙居縣清風鄉紫巖山石上産長生草天台縣志生古樹中取而空懸之曝以日經年不稿觀音草天台勝迹録生山谷中人以盆盛清水沙石植之則青著泥則萎候潮草太平縣志葉間有莢如榆潮至則開退則合鳯尾龍鬚萬厯仙居縣志草屬菖蒲天台山方外志幽溪菖蒲一寸九節十二節者最多其他溪谷皆有之潮雞赤城志雞有黃白烏花色大者喜鬭又有潮雞遇潮長則鳴孟浩然天台詩所謂鳴雞信早潮是也玉志潮頭雞隨潮食魚白色似雞而扁嘴天雞天台山方外志産桃都李白詩空中聞天雞是也竹雞赤城志俗傳白蟻聞之即化為水山中最多黃雀赤城志斑褐色又有黃色者八九月羣飛稻田間人取為披綿鮓或云海魚所化八月為雀十月復入海為魚鷓鴣天台要覽天台縣西北有龍湫其山常有鷓鴣鳴因名鷓鴣山金雀天台山方外志石梁方廣梵唄方作先有金色雀飛翔林石翠碧赤城志毛可為飾土人呼為紅翠陽遂臨海異物志背青黑腹下黃白五足長短相等不知頭尾所在生時體軟死即乾脆郭公崇禎寧海縣志此鳥鳴自呼又有婆餅焦王公斷磨皆自呼其名鸂鶒臨海異物志水鳥有五色食短菰説文作溪鶒搗藥禽赤城志其聲丁當似之泥滑滑黃巖縣志尾長色白者為雄尾短色赤者為雌春末自呼其名郡志作竹雞者誤也獨足鳥臨海異物志東陲有鳥文身赤口而一足惟食蟲豸不害稻粱其鳴如嘯聲俗名獨足相思鳥天台勝紀似雀而長緑背黃胸翼五色嘴距皆朱豢之者籠一放一雖逺必歸此羽族中匹配之最摯者一名雙雙黃巖最多桐花鳯萬厯仙居縣志陽溪桐林諸山中有之此即么鳯十二紅赤城志羽毛紅褐碧緑相間山馬萬厯仙居縣志蒼山常有之竹𪕋黃巖縣志患竹刺入肉者啖之良愈金絲猿天台遊考台山有猿而無猴嘗有金絲猿隱於石梁間栗鼠天台山方外志松鼠尾小栗鼠尾大黃鼠玉環志毛可作筆皮可為帽香魚黃巖縣志香而無腥色青一名細鱗每月長一寸至十月而止短魚赤城志項縮而短又有一種名曰鸚哥魚燭魚談薈䱼魚如指長七八寸但有脊骨曝為燭極有光明火魚嘉靖浙江通志台州火魚形赤類火鹿魚臨海異物志頭上有兩鹿角鯪魚臨海異物志腹背有刺如三角菱子魚黃巖縣志味美不減通應所産但不常有燕魚臨海異物志長五寸隂雨則飛或即海燕石首魚玉環志此魚冬月名報春二月名鯼八月名桂花石首四五月名黃魚出北洋烏洋漁市凡三汛楓葉魚赤城志形小味極珍土人重之海物異名記此魚楓葉入水之所化也箬葉魚臨海異物志比目魚南越謂之板魚今浙人謂之鞋底魚亦謂之箬葉魚臨海縣志魚各一目相並而行爾雅所謂東方有比目魚不比不行其名曰鰈是也段氏比户録謂之鰜吳都賦謂之魪上林賦謂之魼鰈猶屧也俗名鞋底魚又名婢篩魚臨海風土記名奴屩魚南越志名版魚南方異物志名箬葉魚皆因形也石斑魚本草綱目長者尺餘斑如虎文有毒南方異物志云高魚似鱒有雌無雄二三月與蜥蜴合於水上其胎毒人酉陽雜俎云石斑與蛇交南方有土蜂土人殺此魚標樹上引鳥食之蜂窠皆盡石帆魚海物異名記生海中石穴望潮魚述異記出台州臨海縣龍頭魚黃巖縣志一名􅤤骨柔無鱗身如膏髓銅哾魚臨海縣志鱵魚一名銅哾魚喙有一針地青魚臨海異物志尾有刺甚長逢物則撥之色白者曰地白又名邵陽魚撮千魚嘉靖浙江通志生溪澗中其小如針撮之可得千焉故名梅童魚黃巖縣志類石首魚而小謝豹魚赤城志杜宇鳴時有之秀才魚赤城志柿核一名秀才魚金銀鯽赤城志九頃塘有金銀鯽魚味絶美然有魚艇則覆焉飛魚臨海記越王望海館下有湖多金鵝飛魚金鰻崇禎寧海縣志青雷潭中乞雨者每得金鰻於此獺鰻崇禎寧海縣志鰻有一種形似篛曰獺鰻魚鰾崇禎寧海縣志元時邑貢魚鰾巨魚腹中取之松門鯗嘉靖浙江通志踺跳所在海中其鯗特鮮美台州府志太平有松門島在海中嶼上生松通小洋産魚曝之為鯗極為佳品玉環志此名黃花魚一名春來亦名鮫魚又名金鱗春月生子聲如羣蛙漁人聽聲收網聽法以竹筒測之知其頭向上即用網如匹布兩頭收合無不就擒若頭向下即皆從水底逸去四時皆有春夏用網秋冬用釣以松門伏鯗為佳驗鯗之法伏鯗兩翅相交過頭出伏則不過頭至秋冬則散開而不相交矣蟹吕亢臨海蟹圖蟹凡十二種一曰蝤蛑兩螯大而有細毛如苔八足亦有微毛二曰撥棹子狀如蝤蛑螯足無毛後兩小足薄而微濶三曰擁劍色黃其一螯偏長有光四曰彭螖爾雅注小蟹也吳人呼為彭越五曰竭朴大於彭螖殼黑斑有文章螯正赤常以大螯障日小螯取食六曰沙狗壤沙為穴見人則走七曰望潮殼白居則背坎外向潮來舉螯如望不失常期八曰倚望東西顧睨行不四五又望入穴乃止九曰石硯大於常蟹通赤狀若鵝卵十曰江足極小堅如石不可食十一曰蘆虎正赤不可食十二曰彭蜞大於彭螖小於常蟹車螯本草綱目殼色紫璀粲如玉斑點如花海人以火炙之則殼開取肉食之殼可飾器物灰可闉塞牆壁又可為粉飾面俗呼蛤粉亦或生珠其為用多矣其似車螯而角不正者曰移角似車螯而殼薄者曰姑勞似車螯而小者曰羊蹄螺張存遊國清寺記天台之勝其雙澗名螺溪有水一泓極深即智者大師放螺處今約有巨礪大或時出石上作吼聲則風雨輒作對蝦崇禎寧海縣志蝦種大者曰對蝦味至美潮蛤赤城志每一潮生一暈姚寬夫天台詩春潮生蛤暈是也石􅨒玉環志形如龜腳土人直以龜腳呼之海中山巖上附石攢生如花叢半截帶殼微青肉紅色軟毛南越志云得春雨則生花滚塘玉環志身圓有齒好入蝤蛑穴中俟其退殼而食之故又名蝤蛑虎海馬玉環志形如馬出水即死從小蝦中揀出之可入藥人鬼眼玉環志殼硬如鐵緑色肉如蛤蜊千人擘海物異名記聚刺獷殼擘之不能入穿山甲黃巖縣志一名鯪鯉似鯉而四足能陸能水蜂赤城志州有蜜巖多蜂名醫别録石蜜即崖蜜也在高山巖石間作之其蜂黑色似虻其木蜜懸樹枝作之色青白在人家及樹空作者亦白而濃厚味美今出東陽臨海諸處者多木蜜出於潛懷安諸縣者多崖蜜亦有樹木及人家養者諸蜜例多添雜及煎煮不可入藥必須親自看取方無雜耳凡蜂作蜜皆須人小便以釀諸花乃得和熟狀似作飴須蘗也絹赤城志出仙居黃巖者佳葛嘉靖浙江通志台州兼絲葛以葛雜絲而織之有黃白二色玉版紙赤城志蘇文忠雜志云吕獻可遺余天台玉版過於澄心堂又米元章用黃巖藤紙硾熟揭其半用之有滑淨軟熟之稱今出臨海者曰黃檀曰東陳出天台者曰大淡出寧海者曰黃公而出黃巖者以竹穰為之即所謂玉版也呈文紙萬厯仙居縣志出朱溪甲香太平寰宇記台州産楓脂赤城志可為香名山記云天姥山有長楓十餘丈今無之草席太平縣志出渭川莞田鐵廂席萬厯仙居縣志仙居之貨有鐵箱席朱砂台州府志樓旗山惠衆寺西砂狀如鐵研之可為砂柘絲太平縣志山産柘取其絲作琴絃清亮勝桑蠶棉花太平縣志山田多産色白者上淡黃者下鴉碗黃巖縣志以螺殼為酒盞俗呼鴉碗金漆臨海記東鎮山有金漆木用塗器物與黃金不殊赤城志其木似樗成林收漆時截竹管鋭其首以刀砍木寸餘入管取之藤杖避暑録話朝任道自天台來以石橋藤杖為贈自言親取於懸崖間柔韌而輕堅如束筋余自許昌歸得大壇藤杖外圓與此不類而中相若李汶遊天台紀略萬年藤為杖蒼黝糾結不知經幾風霜當是瓌奇物朱彞尊萬年藤杖歌我有天台萬年藤持贈吳下遂初翁想當李明柏碩迹未到此藤久已生山中偶然拾自金庭宫攜歸曉夜但拂拭重之不異長生桐翁昔史館文最雄南狐東馬卓有前賢風即如詩篇也壓蕭范陸長城笑把偏師攻歐陽黃九栁秦七新詞往往傳歌童翁今歸來雙耳聰厯頭六十更二十顔貌却如四十同況有才子籍早通兼珍之膳潔且豐人生快意亦已足豈必入海求方蓬西堂日暖花滿櫳楊梅漸紫櫻桃紅翁來期我花下酌清晨扶杖葑門東繭紙戢戢抽詩筒看翁遊覽興未窮水循練瀆山穹窿長松樹底芝草叢四方上下與翁逐杖兮杖兮藉汝功華頂杖天台紀勝天台山出仙樹杖皮日休華頂杖詩金陵仙樹杖過客自攜持探洞求丹粟挑雲覔白芝量泉將濯足闌鶴把支頤以此將為贈唯君盡得知陸龜蒙和襲美華頂杖詩萬古隂崖雪靈根不為枯瘦于霜鶴脛奇是墨龍鬚拄訪元談客持看潑畫圖披雲如有路兼可到仙都銀赤城志出天台赤巖鉛赤城志出天台赤巖郭婆坑等處銅鐵赤城志寧海縣龍鬚山産鐵砂崇禎寧海縣志東溪出冶者陶鍊成之方石輟耕録委羽山中藏洞穴其側産方石周正光澤五色錯雜雖加琢磨殆不是過大者三四分小者比米粒碎之亦無不端方印石天台山方外志石之丹者如霞青者如黛然求其美者不可得惟寶花山所出者可為圖書潢水山所出僅可為研碑石台州府志太平縣石蒼山産石可為碑黃監山石可為橋梁柱礎居民利之花乳石天台山志寶華山産色如玳瑁瑩潤堅潔可愛李德裕謝寄石詩聞君採奇石剪斷赤城霞林逋謝天台僧寄石枕詩斷石自何許枕之懷赤城皆謂此也花藥石萬厯仙居縣志出三十八都大洪地後為里人焚碎不可用荔枝石萬厯仙居縣志出四都又有羊肝石寶拳石宣和石譜天台縣石多華出土中其質頗與萊州石相類扣有聲色微白紋理斑斕土人鐫礲作器皿或為鐺銚但經火不甚堅久浙江通志卷一百五
