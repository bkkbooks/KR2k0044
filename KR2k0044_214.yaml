body:
  text: 浙江通志卷二百十五列女十四溫州府永嘉縣三國吳瞿素三國志虞翻傳注永寧瞿素遭盜劫賊死不虧行皇甫謐列女傳素受聘未配遭賊欲犯之臨以白刃素婢名青青乞代賊殺素後欲犯青青曰向欲代素恐被恥獲害耳今素尚死何以生為賊復殺之晉浣紗女兩浙名賢録居蜃川莫知其姓名家貧踰笄不嫁事母孝常紡績為養人每見其夜浣紗而旦成布易以供母及母卒抱石自沉水中里為立祠並建浣紗坊以表之唐闕宋楊成姐萬歷溫州府志永嘉楊定女母王氏疾篤成姐焚香割股為糜食之疾遂瘳陳氏女兩浙名賢録少孤不知父母墓所在誓不嫁獨居紡績以自給每望山泣拜曰吾父母葬於此吾將終身焉翁過妻黃氏萬歷溫州府志歸過數月即寡年甫二十遺腹生子夔人語以再醮泣而誓之婺矛牙居數十年未嘗出户庭命夔從陳植學易登淳祐第氏時年八十郡守楊簡為記趙必謠母丁氏萬歷溫州府志年二十九夫亡子方四歲氏堅志教育後必謠登第氏以夀終朱自厚母戴氏萬歷溫州府志年二十五孀居無子立自厚為嗣苦節以終孫氏女萬歷溫州府志適馬氏子以夫疾未成婚元兵入城女被執欲犯之不屈而死元陳昌嗣妻葉氏萬歷溫州府志年二十六夫亡子德浩僅九歲夫之伯季強分其産業氏無難色躬紡績自給命德浩從祕書林一龍學博洽有名後以孫軾貴贈潁川郡夫人夀九十三黃福妻蕭氏嘉靖浙江通志名轉年十九而夫亡未有子鄉有巨室子慕蕭姿色願為黃氏義子以求配舅姑以暮景無依許之蕭力爭弗能止因請葬其夫畢設席會賓將成婚盛飾入房以帛懸床屏間自縊而死劉公寬妻侯氏兩浙名賢録至正戊戌方明善據溫公寬守禦鄉井為其下所害取首獻明善侯氏收殮夫尸結蒲為首以葬乃撫膺而號曰吾夫以身殉國結仇方寇寇至必辱我以雪憤奈何以貞潔之頸飲賊刃乎乃自縊二子皆自殺明王守中妻劉氏兩浙名賢録字至貞守中卒劉年二十九子在襁褓自居舅喪輒不茹葷及夫亡愈甘清苦白首如一洪武初旌黃應發妻劉氏續文獻通考字文淑應發死無子鞠其婢之子通誓不再適舅老孝事甚謹舅卒撫通令就學通得狂疾文淑慮絶祀亟與婚配生子性而通卒乃抱性育之就學成名臨終謂性曰我為汝家婦不幸二世短命保汝成立吾可以下見汝祖矣俞姻奴名山藏父蚤亡母窘衣食欲改適女泣曰不幸無父失母何依不如死也赴水死不克而母歸郡人劉斌女依焉怏怏不自得亡何母卒斌前妻子遣婢潛説欲私之詈而唾其靣婢曰彼云不從將殺汝矣女曰與其不義而生寧守義而死一日斌他適前妻子􅋵刃即之女厲聲曰狂悖無禮吾不能辱遂刺殺之斌歸捕前妻子置之死郡中大旱守何文淵禱禜不應曰郡有寃乎耆老以烈女事告文淵為文往祭天果雨葉俊妾何氏兩浙名賢録名京女俊為太原知府致仕歸卒於家成喪後三日氏潛沐浴傅粉泣告夫人薛氏曰大人在日妾御不敢當夕今地下無人侍奉願以身當之與夫人永訣夫人以為此女連日過哀失神乃至此耳氏竟自縊而死有司題其銘旌曰烈女潘氏二節明實録成化十四年旌表陳氏潘洪瑤妻邵氏洪瑤弟洪琭妻陳氏夫亡時年二十六舅姑許改嫁邑民林存陳不從截髮𠢐靣乃不敢奪邵氏夫亡時年二十三醮民徐生來聘邵聞之亦破鼻流血誓不更適一門共㸑娣姒一節始終不改旌其門曰雙節林儉妻黃氏萬歷溫州府志夫卒兄弟議奪其志氏聞飲泣飾笄服赴後河拱立水中死程子文妻楊氏萬歷溫州府志歸時年十八不踰年夫溺於江誓不再卺越五稔舅姑憐之曰吾家貧汝又無子寧能孀守乎族衆亦苦勸之楊乃截髮割耳拒益堅已而計曰萬一夫冢貪賄逼我將奈何午夜抱石自沉詰朝得尸於沙渚靣色如生郡守洪垣祭之仍為建亭立石葉一蘭妻劉氏萬歷溫州府志年二十歸一蘭僅數月嘉靖戊午倭寇掠境氏與諸婦逃匿山谷間賊猝至諸婦披靡氏獨投崖死應鏜妻林氏萬歷溫州府志家貧執苦孝養舅姑以鏜艱於舉子罄服飾為買妾既乃有子嘉靖戊午倭至先執其子氏懼辱又甚痛其子即呌號抱女赴水死潘氏二節萬歷溫州府志林氏潘棨妻年十九夫亡遺腹生子珂父母欲其改嫁林截髮誓死撫孤珂長娶林氏珂殁林年二十八婦姑雙寡並以夀終詔建坊旌表陳氏三節萬歷溫州府志鄭氏陳紹妻年二十四夫亡守節遺孤世澤娶何氏年二十五世澤又亡與媵女李氏偕守人稱一門三節范烈婦萬歷溫州府志張問達妻吳興人年少美姿容從夫戍溫寓衛廊西問達故貪狠挾惡少逼令從姦婦堅拒因笞之身無完膚一日設酒肉生祭謂之曰不從且死婦泣願就死問達持鐵椎椎殺之死二日而靣如生問達欲竄足不能前如神攝者衆擒送府置之法葬婦白塔山立石表曰范烈婦墓林宗直妻陳氏萬歷溫州府志夫卒氏年二十殯殮畢即投水死詔建坊旌表彭時望妻諸氏萬歷溫州府志彭卒妾吳氏生子珍方三歲諸與吳及二媵同守志撫珍成立四節同心方日升妻林氏舊浙江通志歸六年夫亡族有逼之嫁者紿以母家接回氏覺號泣赴水以救止氏請夫木主拜泣抱主觸胸而絶事聞建節婦坊以旌之吳恕翁妻王氏王順童妻黃氏劉珖妻盧氏徐惟東妻陳氏王封妻周氏王楫妻陳氏汪素妻陳氏王宰妻黃氏朱瀚妻鄭氏王備妻韓氏劉瀚妻林氏林挺妻王氏邵理妻項氏葉希周妻王氏葉式妻諸氏王崇泮妻葉氏張遜志妻程氏朱鰲妻陳氏顔師孔妻陳氏包錠妻葉氏夏瓚妻髙氏王崇諫妻薑氏金昌齡妻鄭氏任一經妻徐氏趙思積妻陳氏嚴時泰妻程氏陳填妻林氏鮑公厚妻朱氏周君卿妻陳氏陳尚玉妻李氏陳天秩妻林氏柯寵妻戴氏蔣珂妻陳氏金邦華妻戴氏趙蒙亨妻陳氏王國彩妻謝氏王思隱妻薑氏王孟輝妻朱氏黃諍妻葉氏陳洪詔妻王氏王教民妻戴氏朱君佐妻陳氏國朝施瑞甫妻戴氏題旌册永嘉城守營兵婦也年二十九而寡兩子俱幼家貧紡績度日或勸之改適誓死不從守節三十八年雍正四年具題奉旨建坊旌表陳初㿩妻賈氏題旌册年二十六夫亡家貧紡績奉姑育子族伯勸其再醮氏厲聲曰寧為餓死鬼不為失節婦伯慚而退姑殁囊上成墳并以夫祔焉守節五十九年翁子咸妻林氏題旌册年二十三夫亡姑繼殁舅嬰風疾氏藉十指供奉歷數十載孝敬備至守節三十三年題奉以上二氏俱雍正七年具旨建坊旌表周氏二節題旌册周永錫妻林氏及子周文魁妻潘氏林年二十九夫亡時值閩變族黨諭氏改適氏求死者再訓子文魁為諸生娶潘氏生二子潘年二十八夫亡姑媳煢煢相依為命教子世塤世垣俱遊庠林守節四十一年而卒潘守節二十八年今存雍正七年具題奉旨建坊旌表張有沼妻朱氏題旌册年十八夫亡遺孤甫數月居濱海順治十五年海寇劫掠氏抱子奉其衰翁竄匿山谷間艱苦萬狀後徙內地而家業蕩盡常至終日不舉火值舅喪百計經營殯殮撫子至於成人卒年五十六吳佳繡妻葉氏題旌册年二十一適吳二十三而寡遺腹生子名鑑泰氏辛勤鞠育稍長令就外傅不假姑息及授室子婦衣飾令從朴素故家業不減於舊守節四十四年以上二氏雍旨建正九年具題奉坊旌表王氏二節題旌册王甡妻陶氏妾朱氏甡亡二氏矢志同守陶美姿容有謀奪其志者事已亟遂自經死朱痛主母殉節遺二孤幼乃以己所生子出繼他姓而日夕紡績以膳嫡之二子俱得成立守節六十一年九十卒子孫繁衍一堂四世謝夢祥妻邵氏題旌册年二十而寡撫子守節三十二年宋天植妻張氏題旌册年二十而寡撫子葬長教之讀書親操井臼勤儉持家守節五十一年林作楨妻楊氏題旌册年二十五而寡遺孤二撫育婚配善事舅姑守節三十一年卒李國達妻林氏題旌册年二十九而寡事舅姑撫子守節二十四年以上五氏俱雍正旨建十年具題奉坊旌表孫秀環妻王氏題旌册年二十四夫亡遺孤幼紡績養孤父母欲奪其志曰兒有子可冀其成立也况受夫奉母之托而可負之乎誓不從乃止值歲祲艱苦萬狀始終不渝守節四十年胡文升妻鄭氏題旌册年十六適文升一載文升卒遺腹生子閨門整肅事姑撫子克勤克儉為子娶婦衣飾俱從朴素獨於姑沒時絞衾棺槨咸從厚守節四十四年趙之珩妻黃氏題旌册之珩染風疾氏遍訪名醫治之不愈之珩卒氏年二十七長子一琴三歲次一鶴甫晬氏為人傭刺繡給饔飱撫教二子成立守節三十二年陳信楷妻戴氏題旌册年三十夫亡遺孤二以撫以教長子遊庠早卒氏益艱苦至老猶勤機杼足不踰户守節三十九年旌以上四氏俱雍正十三年具題候林元標妻馮氏舊浙江通志順治甲午海艘劫掠羅浮氏與元標同被執賊首欲妻之氏恐見汚投海死尸逆流而上直至羅浮人咸異之黃阿繼妻栁氏舊浙江通志順治戊戍海艘犯江北氏遇賊度不能免抱子投河死寇哀之為取富室棺殯之夫感其義削髮為僧蔣世鵬妻林氏舊浙江通志順治十四年海寇掠象河氏年方二十同姑遇賊賊欲犯之不從罵賊而死施曉宇妻楊氏舊浙江通志偕夫避亂山中兵欲犯之不從被殺三日不殯靣色如生王靜媛永嘉縣志王尚熊女幼許吳宗暹為室未嫁宗暹死女往哭奠竟循未亡之制後有富室欲委禽焉女聞遂自沉於水救免乃斷髮自誓終莫能奪陳氏二節溫州府志陳宗曽妻翁氏年二十四夫卒生子宣章僅踰周撫之長娶婦戴氏年二十二宣章亦卒姑媳同織絍以給薪水育孫成立鄭應酇妻戴氏溫州府志土寇嘯聚氏恐見汚乘夜投溪而死後夫為襄陵令贈孺人黃厥昌妻董氏溫州府志康熙十四年避亂禁山兵突至被脅遂投峭壁下死鄭國幹妻徐氏楊敬輿妻陳氏俱投溪死陳世德妻金氏永嘉縣志年二十四夫亡同妾薑氏方氏矢志撫孤一門三節何氏二節永嘉縣志何彥淳妻方氏年二十四夫亡子際期甫七歲長娶林氏年二十四際期復卒二氏同守節李象乾妻趙氏溫州府志會稽趙崇憲女適象乾年十九而夫殁遺腹生子挺矢志撫孤事舅姑孝姑殁氏曰吾可以報夫子命矣遂卒戴大聖妻王氏溫州府志年十八歸戴生子志逵甫二齡夫卒號慟不欲生已而念姑耄子幼乃矢志苦守備歷艱辛逵稍長讀書氏刺指血書其案曰汝不識父靣汝當知母心詩書手澤在何必纍千金後志逵力學有成陳以肇妻張氏溫州府志年二十三夫亡同妾連氏孀守後氏病篤子煒彰刲股以療母林占春妻童氏溫州府志閩逆之變避亂陳雅山寇至掠羣婦閉一室中氏知不免取竹簮自釘耳中不死乃抽賊刃斷其喉寇亦嗟唶而去朱昌國妻葉氏溫州府志年二十二而寡矢志不二未幾一子一女皆殤或諷之曰汝不去以有孤在今孤復夭何自苦為氏曰誰謂無嗣之婦遂可失節耶守節五十年卒年七十二黃君澤妻沈氏趙可順妻王氏葉茂秋妻諸葛氏王一鍊妻林氏趙方來妻汪氏黃象鼐妻林氏馮時雍妻張氏潘一鎮妻黃氏黃一鶚妻張氏林義孫妻陳氏劉應泰妻陳氏夏亨侯妻楊氏鄭之端妻張氏徐天聰妻王氏王端棣妻何氏厲宗文妻張氏金思毅妻包氏林汝璉妻黃氏王文昌妻項氏朱日晶妻王氏樂清縣宋鮑氏二女黃綰義烈記宋末元兵下溫州樂清鮑君任二女嫆娘婉娘皆絶色匿西坑山元將見而欲得之二女乃登髙投崖下死元柯大名妻蘇氏萬歷溫州府志年二十五夫亡無子喪畢或欲其再醮氏堅拒不許其弟憐而迎養之年七十病篤扶還柯門卒葉景芳妻王氏萬歷溫州府志年二十六景芳卒長男二歲次男遺腹家貧堅志誓守能孝養舅姑皆夀逾八十所居近市人罕識其靣盛貞女鄭夏盛女傳樂清盛叔浩女許嫁魯宜民未及歸宜民坐事赴闕訴寃而卒時女方笄為服斬衰誓不二志迎其母王氏以姑禮事之士君子稱之曰節義章文寶妻某氏許浩復齋日記文寶聘某氏未成婚納妾有娠而文寶得疾將死氏聞請往視父母不許氏堅欲往文實一見而逝氏撫妾守喪妾生子綸親教讀書後遣就外傳竟第進士官至禮部侍郎氏自為詩見志云誰云妾無夫妾猶及見夫方殂誰云妾無子側室生兒與夫似兒讀書妾辟纑空房夜夜聞啼烏兒能成名妾不嫁良人瞑目黃泉下林貞女萬歷溫州府志許配李全明全明卒悲慟踰年誓不適人其兄叔統繼亡乃與嫂朱氏同處一室氷操愈堅久之夫家迎養不可則使從子岠歲時往拜氏苐於帷中嗚咽禮之後以夀終朱元斗妻陳氏萬歷溫州府志年二十五夫亡誓守不嫁茅屋二間不蔽風雨里人有強娶之者先賂其夫之兄弟伺夜大風雨則以肩輿偵門外欲奪之陳覺逃匿鄰家豕圈中事乃已績絍度日以夀終侯惟鑾妻張氏萬歷溫州府志年二十七夫卒其兄微諷之張怒遂與兄絶侍婢進髻張引刀截之誓不復髻以從子廷弼為嗣夀八十一終陳瑞妻吳氏萬歷溫州府志年二十七夫卒矢志自守父母憐而勸之即引刀斷右指閉門不復出以夀終阿釧萬歷溫州府志李傅之妾有艷姿傅妻陳氏生子未期而傅卒陳有異志輒勸止之有聞釧之美者乃求陳兾并得釧陳密許之釧覺泣告曰主父有子何復從人陳不聽先行而盛遣人迎釧釧度不能拒乃設酒饌醉飽其人紿俟明日遂潛出投河死李槃妻盧氏萬歷溫州府志槃病氏自刺掌血和藥家貧無以謝醫泣解耳環跪致之醫不受槃病日劇潛焚香刲股肉以進遂愈後槃卒氏絶飲食而死施氏三節萬歷溫州府志方氏施恭諤妻年二十七夫亡斷髮誓守子從梗妻孔氏年二十一亦寡孫慈恩妻盧氏年二十四復寡三世守節楊良足妾林氏萬歷溫州府志林阿女嘉靖壬子扶主母趙氏避寇白沙塘趙病足不能前寇至舉刀斫趙阿女以身當之遂被重傷且死猶問曰主母無恙乎語卒而絶錢氏女萬歷溫州府志父名雁嘉靖戊午寇劫白石女年十八與諸女走匿米篩洞中已而寇入錢知事急乃躍下千仞崖死事聞旌表復其家錢氏女萬歷溫州府志父名泳寇至泳與妻女俱被執至龍泉潭女紿賊曰妾願從行盍釋我父母乎賊喜聽之乃麾其父母亟去而身隨賊行至合湖橋度父母已逺賊不能及乃躍投於水賊怒以戈刃之死又黃皓女嫁南經者遇賊投潭略如錢女徐某妻王氏樂清縣志王諴女戊午歲倭至王欲避之其夫玩寇弗聼乃夜紉其衣襦附身者為必死計次早登舟將發而寇至於是以兒并首飾授其婢謂曰必活吾兒語卒自沉死周思兼妻林氏樂清縣志戊午賊掠村落氏與弟妹走避之遙望見賊懼不免即以兒授夫曰君抱兒去我輕身易遁耳既前數步即自投於水而死王崇瑞妻管氏樂清縣志年二十三夫亡一子僅二月守節十三年而寇至匿鹽窖中賊搜得驅之去堅拒不從賊怒磔殺之并其子又方寬妻蔣氏陳文輝妻吳氏戊午乙未倭連至前後各遇賊皆不辱投河死翁烈婦萬歷溫州府志其夫惰農也去而為兵六年不返紡績自給及還欲嫁之弗從縊而死李宗來妾馬氏萬歷溫州府志名阿梅宗來娶趙氏生子守繼甫期而宗來卒外氏奪趙志攜阿梅他適瀕行阿梅踰垣而避時年十九誓志撫孤守繼補弟子員馬氏夀終守繼呈請守制督學允所請仍旌之趙氏母女二節樂清縣志王氏趙文珙妻年二十四喪夫兒女俱在抱氏屛簮珥守志女笄適李守腆年亦二十四而守腆卒無子克繩母志守節云李氏二節樂清縣志林氏李霞明妻年二十五夫卒守撫二孤其姑蔡氏邦樵妻亦二十七守志皆以夀終馮德新妻周氏朱垕妻徐氏周見妻鄭氏林敘妻葉氏南升妻林氏黃謹逸妻周氏盧季甫妻潘氏周韶妻李氏方篆妻陳氏楊永儀妻余氏李鵬妻南氏金權妻吳氏周辨妻屠氏梁宗稔妻朱氏吳九成妻任氏侯守衡妻周氏朱元壬妻方氏郭鵬妻張氏鄭篤妻陳氏黃一椿妻髙氏陳巨妻方氏朱恩妻王氏李岐妻髙氏焦明理妻鄭氏陳世雲妻林氏翁慎妻柯氏連浼妻陳氏陳昭妻鄭氏張迎妻鄭氏陳倉佲妻倪氏錢頓妻葉氏吳九韶妻陳氏陳璿妻林氏周鑰妻梁氏趙性簡妻葉氏葉必燦妻余氏余雍妻南氏趙嗣汴妻錢氏項必暹妻虞氏蔣助妻童氏周存厚妻余氏朱聘妻陳氏方豫中妻章氏趙君寧妻董氏周鐔妻呂氏陳星妻方氏金䇿妻趙氏蔣一澄妻盧氏林棟妻陳氏鄭輝妻王氏劉綽妻張氏髙爽妻胡氏王梅鼎妻潘氏吳一規妻鄭氏陳旭志妻鄭氏李紹新妻朱氏方守僅妻施氏陳九英妻趙氏趙應爵妻鮑氏李慶所妻湯氏周允諳妻鄭氏劉如川妻林氏蔡鳳鳴妻趙氏國朝宋廷棟妻侯氏題旌册樂清貧家婦也年二十三夫亡遺女二氏誓不二天勤䌟績以易粟養姑訓二女長適士族撫猶子續夫後自居孀足不踰關鄰里無識其靣者守節三十四年朱尹邦妻金氏題旌册年二十四夫亡子未周歲家貧有欲謀娶之者氏截髮自誓事姑孝訓子嚴嘗為鄰家織絍得值以供朝夕守節四十九年以上二氏俱雍正九年具題奉旨建坊旌表趙存洵妻髙氏溫州府志于歸二載夫遘危疾氏登屋籲天而夫已逝墜簷折足幾殞殮夫後歸母家罄衣資以遺內外子姪遂絶粒卒吳德馨妻汪氏溫州府志順治間海寇掠南陽獲氏脅以行大罵不從寇怒碎刃之趙應彩妻戴氏溫州府志海寇陷縣城氏走匿雙瀑潭為所獲氏紿賊下山至潭際躍入水死東湖烈婦樂清縣志不知其姓氏康熙十四年八月閩寇亂避難山谷中遇寇掠至望萊橋投水死趙君揚妻張氏樂清縣志同夫避難雞籠巖遭掠至湖邊遂躍入水中死趙氏二節樂清縣志李氏適趙興敏年二十八而寡子鼎燮長為諸生未幾又卒媳陳氏年二十六遺孫尚在襁褓姑媳孀居課孫入泮俱以夀終方世哲妻南氏徐潮贛妻趙氏趙興鵠妻包氏支廷梅妻蔡氏媳徐氏周道進妻萬氏盧君榮妻余氏王謨妻陳氏趙君質妻李氏梁楨妻顧氏周王函妻董氏谷慎甫妻王氏王伯曉妻葉氏周罈妻吕氏平陽縣宋林孝婦栁氏萬歷溫州府志居莒溪善事舅姑姑殁舅老而足苦瘡日為洗足傅藥久之痛甚不可近幾三年忽遇異人語之曰汝舅瘡惡苐吸醋和藥吮之可活也孝婦如其言吮至數月果瘳後三子待聘待問待舉皆貴顯年八十終薛歸大妻林氏萬歷溫州府志林孝婦栁氏四世女孫也自幼慕孝婦事母疾割股療之長適薛三年而夫亡兄欲奪其志弗許終身不出户姑病復割股和藥遂愈元周元德妻郭氏萬歷溫州府志廣州人元德任歷山縣尉因娶焉未幾元德卒無子其兄弟強之再嫁不許遂攜夫骨及義女涉數千里歸葬平陽孝事舅姑至正間旌之陳彥道妻胡氏蘇伯衡陳節婦傳年十九歸陳三年生一子而彥道卒族人以再行風之不動則強逼之婦曰我知之矣欲我他適而奪吾之田爾田與節孰重即棄田以卑夫之族而日夜紡績以養姑育子銖積其餘以葬其夫子長聘宋女為之室姑年八十乃終以禮喪葬嫠居五十一年年七十一趙氏女續文獻通考年二十未嫁為賊所執紿賊取藏金自投於厠而死孫信妻黃氏兩浙名賢録至正十四年為賊所掠以兜子舁之黃氏自墜於地時賊方焚燒居民火甚熾乃赴火死周誠德妻陳氏兩浙名賢録方明善攻平陽誠德率儀旅禦之戰敗與氏逃於邑之徑口氏曰吾不能從汝去賊至必汚我乃自縊而死誠德坎而瘞之賊至被執竟為明善所殺明潘氏二節萬歷溫州府志潘啓洪妻孔氏生子彰士甫二歲而啓洪卒時孔年二十九誓不他適及子壯娶鄭氏年二十五亦寡撫子養姑成化間邑令王獻以聞張宗惠妻孫氏萬歷溫州府志知書能文年二十四宗惠疾篤氏哽咽嚙指出血為誓夫卒奉姑侍疾經年靡間晝夜有讒於姑者姑怒之終不自辨姑卒感悟嘗有詩曰良人夢入九泉深妾在清河守至今夜雨青燈孤枕淚秋風素節百年心不圖丹詔沽名譽誓作哀詞苦自吟白玉無慚氷雪裡愁看明月幾升沉時又有黃叔安妻陳氏周朝宰妻龔氏俱以節著詔並旌之李萬妻潘氏萬歷溫州府志萬故無子潘依於母家其父議改適許廷寶既納幣矣潘一日遍謁族之女婦若與别者衆莫測其意及期潛自經於房中郡守李廷觀扁其門曰彰節王懷江妻陳氏平陽縣志萬歷三十八年倭寇犯境懷江挈家避難時氏年十九適懷江甫二月姑栁氏老病至中途不能行氏懼牽纍不能兼脫泣謂夫曰速負母走無兩相誤懷江不忍舍氏正色曰無母何以為人懷江遂負母遁去氏即赴水死吳氏三節平陽縣志陳氏吳寶秀妻寶秀知南康府萬歷己亥忤權璫被逮氏欲隨行不許因歎曰向聞日者言夫子今嵗當遘大難有刑剋可免今我一死可解厄矣夜潛自經百姓聞而哭泣天啓初詔遣官諭祭贈恭人南康及本邑各建專祠祀之林氏湯氏皆寶秀妾被逮時陳語二妾曰夫子蒙難吾義當相從地下惟此藐孤兩人其善撫之二氏曰諾乃共攜孤歸里後寶秀生還未及期卒二氏相誓死守紡績拮據撫育三子督學冇成崇禎年旌表王氏二節舊浙江通志王子修妻陳氏年二十三夫亡矢守撫孤大蔭娶媳周氏年二十五生子元美甫六月而大蔭亦亡堅貞如姑奉旨建世節坊表之陳氏夀八十四周氏夀八十七鄭氏二節平陽縣志孔氏鄭尹祥妻年二十而夫死長子秉賢甫三歲次子秉升方娠六月氏矢志堅貞教誨成立後秉升早逝婦陳氏年二十二生二子豫誠豫義俱幼亦苦志完節俱以夀終陳煥章女平陽縣志居八都年十五手抱幼弟避亂草莽中寇將近棄弟投河而死劉瑞昭妻徐氏平陽縣志年十七適瑞昭甫三載夫死無嗣氏守志不嫁其父徐白病篤慮氏不能終志呼而試之氏堅誓靡他白因取床頭劍授之題其匣曰霜劍原有匹靈光射牛斗雄者化為龍雌者長相守氏泣拜受劍隨身不離數十年如一日朱國祚妻許氏平陽縣志居坡南遇亂聞寇至端坐草堆舉火自焚死鄭景陽妻陳氏杜秉廉妻林氏章維初妻陳氏張元積妻葉氏周世彥妻林氏周朝敬妻伍氏王國賢妻鮑氏馮一鰲妻劉氏范彥卿妻陳氏伍列爵妻宋氏吳翰芳妻劉氏曹廷卿妻陳氏伍貞善妻陳氏馮德懋妻李氏宋大敬妻陳氏張履雍妻沈氏夏茂之妻施氏應思堅妻曽氏黃一鳶妻應氏蔡之俊妻黃氏孔興國妻唐氏周貞儒妻程氏國朝陳鯤妻黃氏題旌册年二十七而寡截髮自矢足迹不出户日夜勤織絍銖積以葬舅姑及夫撫幼孤成立守節三十餘年康熙五十六年具題奉旨建坊旌表曹調元妻林氏題旌册年十八夫亡家貧子幼苦節四十一載事姑孝課子有成王仁妻程氏題旌册年二十九夫亡事舅撫孤守節三十八年陳博妻鮑氏題旌册二十八歲夫亡事祖姑撫二子守節三十七年以上三氏俱雍正六旨建年具題奉坊旌表陳郁妻吳氏題旌册年二十七夫亡欲以身殉姑泣諭曰姑老子幼惟爾是依奈何言死於是紡績奉姑撫子姑疾衣不解帶姑殁哀毁盡禮守節一十八年卒施鍾篆妻白氏題旌册年二十六夫亡二子在襁褓上有舅姑氏生養死葬無失禮教子義方守節五十五年卒具題奉以上二氏俱雍正七年旨建坊旌表王朝泰妻金氏題旌册年二十三夫亡勤十指以葬夫舅姑老而多病氏殫心奉事撫遺孤教養兼至守節二十八年伊師益妻杜氏題旌册年二十六夫亡葬舅姑及夫盡心課子守節四十四年夏咸泰妻王氏題旌册年十九歸咸泰咸泰遊學瑞安客死氏于歸僅兩月耳聞訃親往視殮剪髮截指誓死無他時舅姑在堂旁無伯叔氏事之甚孝立繼承祧守節至二十七歲而卒余上棟妻陳氏題旌册年二十七舅姑撫子守節二亡奉五年張一純妻應氏題旌册年二十七夫亡家貧三子俱幼氏奉舅姑菽水及三子讀書修脯皆辛勤十指所出守節三十九年張球妾金氏題旌册年二十九夫亡生一子氏紡績以事其嫡適遭閩變流離失所而清操不易教子成立守節四十二年鄭國良妻陳氏題旌册年二十五夫亡家貧依叔同居足不出户訓子孫皆為諸生守節旨建四十六年坊旌表以上七氏俱雍正八年具題奉李應官妻吳氏題旌册樂清人徙居平陽順治五年八月山寇肆橫氏年二十九被掠度不能免乃擲叉飾餌賊賊爭取之遂乘間投江死應官在玉甑峯夢婦泣曰吾已至蕭家渡矣亟歸求尸果得之渡口逆流四十里經十日靣如生吳元鼎妻林氏題旌册年二十一夫亡遺孤在抱氏持家勤儉教子有法營築祖墓及夫墓畢生勞苦臨殁語其子若孫曰吾今日始可無愧矣願汝曹無忘吾志守節五十四載卒年七十旨建五旌以上二氏俱雍正九年具題奉坊表陳其文妻戴氏題旌册年二十八夫亡事舅姑孝又十年舅姑相繼卒鬻衣飾為含殮費銖積女紅所入營葬三棺撫子廷魁長命之力田自給守節二十三年卒伍可珍妻鄭氏題旌册年二十七夫亡舅姑老子幼紡織以供甘旨舅姑沒竭蹶營窀穸並祔其夫教子讀書有成守節三十年氏俱雍正十二年具題奉以上二旨建坊旌表楊希華妻陳氏平陽縣志居新陡門康熙十八年五月海寇登岸希華一家三口被掠寇以刃加氏頸逼令就汚氏大罵遂遇害李國楨妻蔡氏平陽縣志年二十二夫亡遺妊生女氏泣血三載蓬首垢靣以矢靡他父及姑憐其無依微探其意氏曰吾所以未亡至今者為女方乳哺耳今可從夫地下矣潛自經夏應章妻李氏林起鵬妻應氏丁汝奎妻蔡氏施啓北妻許氏孔瓚妻劉氏蘇文璲妻王氏潘錦妻張氏鄭廷臣妻蘇氏陳于侯妻馮氏華廷璋妻蔣氏瑞安縣元金幼芳妻髙氏蘇伯衡金貞婦傳瑞安人年二十六平陽金幼芳娶以為婦明年生子暉暉生七月而幼芳卒金故平陽富家盜起海上其家瀕海焚掠無遺繼以軍興盡賣其田以充供億是時方明善周從道日事兵爭婦煢煢一身襁負暉竄匿山谷間紡績以自給艱苦之狀人所不忍見或勸之擇所從婦曰我足一踐金氏門知死金氏而已與其隳節幸生孰若死飢寒死兵革也暉長八歲日夜策勵之以底於成吳璟妻林氏宋濓賢母傳瑞安吳欽子璟娶縣人林廉懷妊九月璟以病死後三十日生一子誓撫遺孤以不墜其家後六年寇盜蜂起市魁都伯各聚農為兵陽號保障陰則倚藉為姦有利吳氏多資欲奪廉之志亷年二十有餘善自閉拒不可撼遂有謀殺其孤者亷懼棄家挾孤而遁擇鄰境大山匿焉艱險備嘗室如懸罄無絲毫懟怨惟飭厲其子以力學無有寒暑晝夜年三十九卒子名荃為大儒明胡文璩妻季氏萬歷溫州府志名貞年二十六夫亡既而夫之父叔亦亡家務悉總於貞貞上奉祖姑下撫二孤祖姑年髙多病貞左右扶持藥必親嘗姑亡殯葬如禮夀一百五歲𢎞治戊申旌表陳貞女萬歷溫州府志名盼陳德升女幼許配鄰子既而鄰子有盜行女不肯嫁父母欲改適之不從及鄰子殁家人委曲諭勸終不聽獨居一室室後有一井朝夕自汲不飲他水以示志也𢎞治間纂修實録事聞史氏論曰知夫之無行而不嫁者守身之義夫死而終不嫁者愛夫之仁仁義兼盡允為烈女胡廷相妻陳氏萬歷溫州府志嘉靖壬子夏海寇犯境時廷相卧病閭巷悉奔竄氏扶夫出門至滴水巖遇賊驅之行氏罵賊賊睹其姿不忍加刃遂負氏於背氏大號嚙賊耳賊怒以刀剖其腹而死賊去乃得殯未幾夫亦卒鄉人賻財合葬於篔簹山呂寬妻徐氏瑞安縣志名還貞寬有文譽其父以還貞妻之踰五年寬卒還貞年二十五哀慟殊絶舁棺於卧室晝夜寢處其旁晨具沃盥巾櫛設蔬饌陳衣服若事生儀至晚乃徹每哭必曰先生聞者俱為動容形容不飾麻服終身以姪為嗣尋姪亦卒有司給廢寺田周之後以夀終陳一鶚妻夏氏瑞安縣志瑞安所軍夏育女年十八歸一鶚一鶚織屨為生家故貧娶三月病癩數年轉劇謂氏曰吾貧病若此汝不如他適兩得其所氏堅拒不從益操作奉養不倦後一鶚死於疫氏無措奔母家求殯殮母家懼染疫閉門辭之號泣歸抱所生女投井死邑令吳養忠親臨奠之且為舉三喪焉林氏三節溫州府志徐氏林大壯妻年十九夫亡子守身前配出也徐撫如己出有勸其再嫁者厲色拒之孀居五十年卒守身娶陳氏年二十九守身卒陳矢志無二後其家日落陳氏拮據奉姑課子年七十三卒陳氏生五子長得昭娶江氏亦二十五歲而寡子增彩方四歲增志僅踰月江誓守益篤姑遘疾五載奉侍湯藥寒暑不倦一門世節題旌建坊秦益蕃妻林氏瑞安縣志歸秦甫期而秦亡氏年二十一無子夫弟生子二撫其一為夫後明末家人議徙避村堡氏自經死初氏自夫沒凡櫛有遺髮指有落爪皆拾而函之死蓋其素定也卓朝賓妻胡氏季致中妻丁氏蔡建夫妻王氏周尚志妻曹氏周朝宰妻龔氏尤性妻黃氏陳恆濟妻葉氏李時信妻林氏金都妻鄭氏鮑潘妻蘇氏季時登妻林氏孫子龍妻王氏左某妻何氏林中端妻李氏國朝王兆琰妻陳氏瑞安縣志康熙己未三月海寇登岸掠子女陳年二十八賊驅以行誓死不從羣賊曵至五六里許髮盡落將近賊艘罵益厲賊怒刃之泰順縣元吳子友妻王氏萬歷溫州府志庫村人今屬泰順年十九適子友踰年子友卒遺腹生子泰和矢志不二泰和稍長督令勤學後登第明王維讓妻吳氏萬歷溫州府志年二十一夫亡遺腹生子志淵誓志守節事舅姑葬祭盡禮教子克家夀七十五嘉靖年旌曽文業妻張氏萬歷溫州府志年二十八夫亡誓無他志舅疾篤氏割股和藥進之愈姑病復割右股暈地救蘇和粥進姑姑復愈年八十餘卒林啇妻董氏溫州府志夫亡遺一子伯叔逼之改嫁氏曰吾夫止有此一線吾去此子無生理矣截髮不從復以子寄養母家以逺害勤苦自給子卒成立林文白妻包氏張鎦妻繆氏林哲妻朱氏吳儒妻包氏鮑絿妻董氏鮑杉妻徐氏林㿩妻徐氏王良仕妻魏氏潘廷珂妻陳氏國朝張聨標妾傅氏泰順縣志年方笄從夫令羅陽時山寇陷邑氏被拘於偽營賊渠令小卒百計誘之不從一夕擁至渠前令諸賊環刃以待詰其死與生孰願氏終不屈遂繯其刃以死周氏二節泰順縣志劉氏周家偉妻家偉殁劉年二十六遺孤奕燈才四歲劉毁容茹苦勉子力學苦節數十年長孫王郊弱冠夭孫媳年十九亦氷蘖自守善事舅姑越十五載而卒潘氏二節泰順縣志夏氏潘仲槐妻林氏潘仲李妻仲槐仲李俱早世時夏年二十六林年二十九共天靡他勤紡績歷艱辛撫孤成立潘世志妻夏氏胡大詩妻林氏夏茂梓妻張氏王煒妻梅氏髙聨霞妻夏氏梅元棣妻林氏王立經妻周氏胡大溥妻葉氏饒宗烈妻吳氏包茂貞妻何氏王念臣妻葉氏浙江通志卷二百十五
