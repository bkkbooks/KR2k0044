body:
  text: 浙江通志卷十八山川十衢州府西安縣附郭龜峰山𢎞治衢州府志府治在其背西北則綴崢嶸山崢嶸山𢎞治衢州府志今通廣門內小山鄭氏譜云孫吳遣將軍鄭平以千人守崢嶸鎮即此衢州府志王象之曰昔有柴宏者屯兵於此後乃訛為崢嶸孟郊崢嶸山詩疏鑿順髙下結構橫煙霞坐嘯郡齋對玩竒石路斜古樹浮緑氣髙門結朱華始見崢嶸狀仰止逾可嘉開明泉𢎞治衢州府志在東隅開明坊蓬萊泉𢎞治衢州府志在東隅烏橋南長街泉𢎞治衢州府志在南隅狀元坊口西安縣城外山川爛柯山爛柯山志舊名青霞第八洞天爛柯福地又名景華洞天在縣南二十里髙餘千尺周回十五里其址二百步穿空彌亘下得平處可數十步因名石橋又名石室今石室在橋之右五里太平寰宇記一名空石山元豐九域志晉樵人王質見石橋下二童子棊質就橋下看之二童子指視質斧柯爛焉水經注東陽記云信安縣有縣室坂晉時有民王質伐木至石室中見童子四人彈琴而歌質因留倚柯聼之童子以一棗核與質質含之便不復飢俄頃童子曰其歸承聲而去斧柯㴶然爛盡既歸去家已數十年親情凋落無復向時比矣陸庶爛柯山碑記爛柯仙躅圖諜詳矣觀夫巨石橫空矯如驚龍崒屼劃坼際於穹崇南走羣峰北控遐陸不遠人世宛如蓬瀛得非權輿之初俾宅真仙而幽贊人民脫籠檻於茲地不然者擾擾塵迹瀟灑靈蹤髙步遐矚相瞬而致則樵夫之遇二仙其所以示化與何元造無眹而壺中之日月可得而窺矣庶牧於是邦逮兹五祀政惟自守民亦安止乘春多暇爰契心期冥搜信宿機慮如洗頺然性復於靜靜復於真天地之萬類吾生之憂樂將不介於胸中矣心境相傳不知吾之遇靈境與靈境之遇吾與時元和元年三月十八日胡翰青霞洞天遊記山麓有寺曰寶巖觀曰仙集觀右拾級而上飛梁橫亘通趾頂背石蜷如蝃蝀其下劃然可居得地如坻者東西深百餘尺廣半之巨木蔽空飄風泛木葉虛徐漫衍後先不絶涼滿襟袖如坐碧雲蒼雪間求遺刻得唐宋以來陸庶錢顗徐霖遊鈞諸名輩往往可識惟庶碑最古劉迥遊爛柯山詩靈境偶一尋洞天碧雲上爛柯有遺迹羽客何由訪日暮悵欲還晴煙滿千嶂羊滔遊爛柯山詩採薪窮冥搜深路轉清映安知洞天裏偶坐得棋聖至今追聖迹可用陶靜性謝勮遊爛柯山詩宛演橫半規穹崇翠微上雲扄掩蒼苔千古無人賞寧知後賢心登此共來往項斯遊爛柯山詩步步出塵氛溪山别是春壇邊時過鶴棋處寂無人詩古碑多缺探幽路不真翻疑歸去晚清世纍移晨陸遊逰爛柯山詩籃輿訪客過仙村千載空餘奕局存曵杖不妨呼小友還家便恐見來孫林巒巉絶秋容瘦樓堞參差暮氣昏酒美魚肥吾事畢一庵那得住雲根鮮于樞石橋山留題詩旁通日月上星辰有路遙應接玉京仙奕未終人物換秦鞭不到海波平當時混沌知誰鑿他日崆洞強自名枯樹重榮事尤異欲從樵者問長生朱彛尊冬日同鹿明府錢廣文遊爛柯山二十韻道書詮洞天青霞居第八流傳負薪翁披榛入坱圠中有兩青童棋聲暗相戛俄驚斧柯爛逝節等奔鶻此事知有無特書在琳札我來太末墟十月方納秸曉出通仙門緣溪碎石滑拂林風騷騷鳴碓水㳐㳐明府政不煩廣文俗能拔于焉齊喚渡次第柅車轄飛梁忽在望相視笑且呾靈境茲最竒造物亦太黠疑經百蟲焚或受五丁匽連蜷虹霓偃垢膩神鬼刮傾崖穿一線斷塔盤秃鬝丹楓露已凋瑶草霜未殺剜苔讀遺碑汲井恣栻刷昔賢鬭茶地昧者莫之察日斜洗行厨得食鳥嘎嘎徘徊雙松陰惆悵别香剎鳳山西安縣志在芝溪源距縣北八十里髙五里其上極平曠可治田圃葉逢山𢎞治衢州府志距城五十里上有盧杜二禪師道場王貴山𢎞治衢州府志與烏巨相近舊傳貴乃質弟於此登仙九龍山西安縣志在靖安鄉去城二十里響谷山名勝志在縣南三十二里崖之半有石穴風噓則鳴塘臺山嘉靖浙江通志在縣東三十里趙抃塘臺山詩直到巢峰最上頭旋磨崖石著詩留重來轉覺寒松老三十六年前舊遊疊石山𢎞治衢州府志在縣南四十里有巖穴名仙遊洞爵豆山嘉靖浙江通志在縣南七十五里雞鳴山衢州府志在城東北十五里定陽溪流其下上有塔曰雞鳴塔烏巨山方輿勝覽在縣東三十五里林木薈蔚乃信安精藍第一山鵝籠山名勝志在縣東五十里一名繡峰上有三塢一池紫微山𢎞治衢州府志在縣東五十里一名迷茨山中有懸崖泉滴不休矻石山𢎞治衢州府志在縣西二十里平地撑拔五峰環以溪石翠微山崇禎衢州府志在仙巖秀峰之間髙十餘里巖山名勝志在城西十里四面壁立絶頂平曠略數十畝中有石井冬夏不竭前霧山舊浙江通志在臨江鄉去郡城三十里烏石山𢎞治衢州府志在湖山東距縣四十里巨石周匝若城之有石門中蓄水田嵗未嘗旱泉嶺山舊浙江通志在縣東南一百里元豐九域志朱買臣云東越居保泉山一人守險萬人不得上是也項山名勝志在縣北四十里項羽廟在焉金雞山𢎞治衢州府志在縣北百里髙可五里上有平坡昔有樵者於山得石如雞剖視之有金因名鹿鳴山西安縣志在縣西三里岡巒秀滌修竹蒼松掩映禪剎為郡人遊宴眺覽之所銅山舊浙江通志在縣西北百里宋時山出銅鉛錫今出礦前徽處州人羣聚取礦其後官兵蕩平今設兵防守狀元峰西安縣志在縣北四十里其山尖峻與南峰對梧桐峰𢎞治衢州府志在縣北七十里與紫微峰相望號南北髙峰或謂南北銀峰蓋南北銀場實二峰支麓故也悲思嶺隋書地理志東陽郡信安縣有悲思嶺余馬嶺𢎞治衢州府志西距城十七里唐余將牧馬處銅錢嶺舊浙江通志去郡城三里而遙國朝康熙十三年耿逆之變官兵列營於此與賊對河而陳厯三年王師雲集賊始大潰夜燒營壘而遁仙巖𢎞治衢州府志在縣東二十里中空可坐數十人寺在其側小靈巖𢎞治衢州府志在縣東二十五里橫山之右山本培塿下有蔭室如巖貿石者因而深之旁有偃王祠九仙巖名勝志在縣東五十里狀如屏扆唐侍郎徐安貞隱此亦名侍郎巖道巖崇禎衢州府志俗名大巖縣東南三十里與九仙巖相望朝陽洞𢎞治衢州府志去芝溪五里洞門才三尺其中石際水瀧深不能測紹興間邑令禱三洞取石龜創三洞龍王廟聞於朝賜額靈澤今故宇無存偶像移於龍寺白塔洞崇禎衢州府志在芝溪源去縣九十里口狹內寬入時先以足第二層有龍潭深不可測日夜水滴凝成白鵝管石宛似塔形故名士人採石療痰疾風清月白時聞仙樂聲井湖西安縣志距縣東三十五里太平寺側長五里餘廣百丈彭湖𢎞治衢州府志在縣東十五里俗傳有彭氏竈下忽茁兩筍斸之流血已即大雨頃陷為湖廣數百丈袤五里餘通石室水深不可測大旱不涸民常禱此西安縣志今無此湖但溪中有灘絶陡人號彭湖磯東溪𢎞治衢州府志按隋志名定陽溪源出紫微山至石室下東北流合為信安溪西溪西安縣志距縣二里源出徽州祁門之百濟嶺由開化常山縣流至城下又江山之水從仙霞嶺過峽口紅橋渡厯江山至雙溪口與開化常山溪合環城西以過而柘溪烏溪石碇溪馬尫溪儻溪後溪之水皆匯焉為信安溪縠溪方輿勝覽出西安合江山常山之水輿地志縠溪之水交錯如羅紋互見龍遊縣龍遊縣龍丘山龍遊縣志在縣東四十里後漢書郡國志東陽記太末龍丘山有九石特秀林表色丹白遠望盡如蓮花龍丘萇隱居於此因以為名其峰際復有巖穴外如窗牖中有石牀太平寰宇記山生龍鬚草柳柏望之五采俗呼為新婦巖南齊書曰太末徐伯珍宅南九里有青山班固謂之九巖山𢎞治衢州府志又名九峰山山際有石壁百餘丈復有巖名三疊唐徐安貞讀書其中東華山崇禎衢州府志在縣東二里下有姑蔑子墓岑山衢州府志在縣西南十五里山有五峰如筆格名筆架山又名婺女照臺自金華望之正當其面故名雞鳴山龍遊縣志在縣南三里宋嘉祐末邑人吕防講學於此有見雞鳴叢棘中羅得白金數十鎰輸之官而已不染後防三子皆貴人以為祥故名方山𢎞治衢州府志在縣東四十里頂正平如古冠形徐山𢎞治衢州府志在縣南四十里今名靈山山有徐偃王廟龍遊縣志山東一石卓立曰香爐峰山下有溪曰靈山港雜樹交映雲垂煙接白石山名勝志在縣南四十里山有圓石聳二十餘丈其色純白唐初以白石名縣大乘山衢州府志在縣治北四十五里山接西安縣界髙一千四百丈有竒白鶴山萬厯龍遊縣志去縣治四十里衢州府志即酆去奢上升處楊樹山萬厯龍遊縣志去縣治西南八十里龍遊縣志疊嶂重巒上戞牛斗登其巔望兼川陸上有五粒小松數株相傳楊盈川從華山移植後人因以名山杜山龍遊縣志在縣北四十五里峭壁長林疑無入路石壁山舊浙江通志在縣東三十里聖壇山崇禎衢州府志在縣南三十里山勢聳拔髙五里登其巔可見數百里鳥道盤旋名十八曲塔山崇禎衢州府志在徐山下溪中孤嶼峙立四水交流竹木掩映舟行望山上塔寺人物宛如畫圖三疊山衢州府志在縣東三十里一名三疊巖上有石室如層樓旁有石鼓擊之淵淵聲徹林杪中有乳泉甚清冽萬厯龍遊縣志宋度宗常遣祭其神有泉出龍吻中樓山龍遊縣志在縣南五十里隋書所載樓山即此土人呼為五鳳樓梅嶺龍遊縣志在縣北八十里名勝志稱宋建都臨安時此嶺最為要道王徴君日抄曰嘉隆時有女郎名賦雪者從征過此題一絶云太末山多竹似麻霧中雞犬幾人家此行探得春消息十里梅花送鹿車今嶺與壽昌接界赤津嶺龍遊縣志在治南七十里嶺崖峻隘為邑中五嶺之一舊置有寨守此則栝蒼之寇不能北下所謂五嶺者在南為赤津上塘在西南為小蓮豪嶺在北為梅嶺是也鸑鷟巖𢎞治衢州府志在縣西五里梁時有異鳥紫質五采羽族聚而隨之因以名下有潭深百尺多巨魚白佛巖𢎞治衢州府志在縣北四十里廣五丈四尺深四丈七尺巖中有佛堂地峻人迹罕至湖巖舊浙江通志在縣東十五里石巖橫截水面其下深巖窈然半入水中深不見底上築浮圖塔影松陰與水光上下相映五百人湖名勝志在縣東北三十里按異苑昔有五百人入此取魚先祈湖神丐水速竭至暮夢神云竭湖當如禱若見異魚必毋殺或得銅缶亦勿廢逮往決水得魚狀絶異遂羮之祭物猶在腹旋得缶以為金又共廢之已而水暴長五百人俱沒惟監督者免縠溪漢書地理志會稽太末有縠水東北至錢塘入海互見西安縣𢎞治衢州府志出西安合江山常山之水經縣之西團石潭匯於翠光巖下東流八十里入蘭溪界唐武德置縠州以此汪佖縠溪詩波紋端與縠紋同正倚闌干想像中更被輕舠橫截去斜陽染出半江紅團石潭𢎞治衢州府志在縣西二十里有石出潭上先是石峙旁岸孔世文洙南野史云團石圓出狀元紹興十四年大水石因轉面視正圓明年劉文靖公章果魁天下常山縣塔山衢州府志在縣治左六十五步一名文筆峰知縣蘇玭建塔其上挂榜山常山縣志在縣東五里山羅列如榜形故名三衢山名勝志在縣北二十五里昔有洪水暴出其支派分為三道故名州名亦取此太平寰宇記三衢山東陽記云山上有石周回三百步常山一名湖山萬厯常山縣志在縣東三十里山頂有田百餘畝湖廣數畝中有巨魚有石環繞如城故縣以此名按東陽記云常山仙人採藥處髙且神白馬山衢州府志在縣東四十里上有石如掌擎一盤水流不息紫竹山常山縣志在縣北十五里萬山中一峰屹起羣峰環擁容車山𢎞治衢州府志在縣北二十五里下有碧玉蓮花二洞山髙三百丈回環九