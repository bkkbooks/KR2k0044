body:
  text: 浙江通志卷一百七十三人物四武功三紹興府漢丁復漢書功臣表陽都敬侯丁復以越將從起薛至灞上以樓煩將入漢定三秦屬周吕侯破龍且彭城為大司馬破項籍於葉為將軍忠臣侯七千八百戶合傅胡害漢書功臣表貰齊侯合傅胡害以越戶將從破秦入漢定三秦以都尉擊項籍侯六百户功比臺侯華毋害漢書功臣表終陵齊侯華母害以越將從起留入漢定三秦擊臧荼侯七百四十户從攻馬邑及布革朱漢書功臣表煮棗端侯革朱以越連敖從起薛别以越將入漢擊諸侯以都尉侯九百戶鄭吉漢書本傳會稽人以卒伍從軍數出西域由是為郎為人強執習外國事自張騫通西域李廣利征伐之後初置校尉屯田渠黎至宣帝時吉以侍郎田渠黎積榖因發諸國兵攻破車師遷衛司馬使護鄯善以西南道神爵中胸奴日逐王先賢撣欲降漢使人與吉相聞吉發渠黎龜兹諸國五萬人迎日逐王口萬二千人小王將十二人隨吉至河曲頗有亡者吉追斬之遂將詣京師漢封日逐王為歸德侯吉既破車師降日逐威震西域遂并護車師以西北道故號都護都護之置自吉始焉上嘉其功效乃下詔曰都護西域騎都尉鄭吉拊循外蠻宣明威信迎丐奴從兄日逐王衆擊破車師兜訾成功效茂著其封吉為安逺侯食邑千户吉於是中西域而立莫府治烏壘城鎮撫諸國誅伐懷集之漢之號令頒西域矣吉薨諡曰隱侯綦毋俊會稽典録俊上虞人交址刺史拔濟一郡讓爵土之封廣西通志安帝元初三年合浦反遣御史任逴督州郡兵討之俊以蒼梧當合浦下蠻或流劫猝難回顧乃先保障蒼梧後往合浦所向摧靡功當封賞上書歸功於逴自謂致寇當誅詔下美之論者稱俊能讓朱俊後漢書本傳字公偉上虞人少孤以孝養致名為門下書佐好義輕財度尚見而奇之薦於太守韋毅稍厯郡職後太守尹端以俊為主簿太守徐圭舉俊孝亷除蘭陵令會交址部羣賊並起賊梁龍等萬餘人與南海太守孔芝叛攻破郡縣光和元年拜俊交址刺史令過本郡簡募家兵及所調和五千人分從兩道入到州界按甲不前先遣使詣郡觀賊虛實宣揚威德以震動其心既而與七郡兵俱進逼之遂斬梁龍降者數萬人旬月盡定以功封都亭侯徵拜諌議大夫及黃巾起拜為右中郎將持節與左中郎將皇甫嵩討潁州陳國諸賊悉破平之進封西鄉侯遷鎮賊中郎將時南陽黃巾張曼成起兵太守秦頡擊殺曼成賊更以趙𢎞為帥衆十餘萬據宛城俊及頡合兵圍𢎞擊斬之賊韓忠復據宛拒俊兵少不敵乃張圍結壘起土山以臨城內因鳴鼓攻其西南賊悉衆赴之俊自將精卒五千掩其東北乘城而入忠退保小城惶懼乞降俊曰納降無以勸善今若受之賊利則進戰鈍則乞降縱敵長冦非良計也因急攻連戰不尅俊登土山望之曰吾知之矣賊今外圍周固內營逼急乞降不受欲出不得所以死戰也不如徹圍并兵入城忠見圍解勢必自出自出則意散易破之道也解圍忠果出戰俊因擊大破之乘勝逐北數千里斬首萬餘級忠等出降頡積忿忠殺之餘衆懼不自安復以孫夏為帥還屯宛中俊急攻之夏走追破之賊遂解散明年春遣使者持節拜俊右車騎將軍振旅還京師以為光祿大夫更封錢唐侯復有常山人張燕輕勇趫捷軍中號曰飛燕與諸山谷冦賊交通衆至百萬號黑山賊河北諸郡縣並被其害漸冦河內逼京師出俊為河內太守將家兵擊却之復拜光祿大夫尋拜城門校尉河南尹董卓入關留俊守洛陽俊與山東諸將通謀為內應懼為卓所襲乃奔荆州復進兵還洛東屯中牟移書州郡請師討卓徐州刺史陶謙上俊行車騎將軍卓遣將李傕郭汜等拒俊卓誅俊入朝初平四年為太尉明年免復行驃騎將軍事持節鎮關東未發會汜與傕相攻獻帝詔俊譬汜令與傕和汜留質俊等俊素剛即日發病卒三國吳賀齊三國吳志本傳字公苗山隂人建安元年孫策察齊孝亷時王朗奔東冶候官長商升為朗起兵策以齊為永寧長領南部都尉事升乞盟求降賊帥張雅詹強等共殺升齊進戰破雅強黨率衆出降候官既平而建安漢興南平復亂齊進兵建安立都尉府賊洪明洪進苑御吳免華當等五人率各萬户連屯漢興吳五六千户别屯大潭鄒臨六千户别屯蓋竹同出餘汗齊兵進討斬明免當進御皆降轉擊益竹軍向大潭三將又降斬首六千級名帥盡擒復立縣邑拜東平校尉十年轉討上饒分以為建平縣十三年遷威武中郎將討丹陽黟歙時武疆葉鄉東陽豐浦四鄉先降齊表言以葉鄉為始新縣而歙賊帥金竒萬户屯安勤山毛甘萬户屯烏聊山黟帥陳僕祖山等二萬户屯林厯山林厯四面壁立髙數十丈徑路危狹不容刀楯賊臨高下石不可得攻齊隂募輕捷士為作鐵戈密於賊所不備處以戈拓斬山為緣道夜令潛上乃多縣布以援下人得上百數人四面流布俱鳴鼓角賊夜聞鼓聲四合謂大軍悉已得上驚亂守路備險者皆走還因是直上大破僕等其餘皆降齊復表分歙為新定黎陽休陽并黟歙凡六縣立府於始新加偏將軍十六年餘杭民郎稚合宗起賊數千人齊討破稚表分餘杭為臨水縣十八年豫章民彭材李玉王海等為亂齊討平之遷奮威將軍二十年從權征合肥徐盛被創失矛齊引兵拒擊得盛所失二十一年鄱陽民尤突為賊齊討破突拜安東將軍封山隂侯出鎮江上黃武初魏使曹休來伐齊以道逺後至因住新市為拒會洞口諸軍遭風流溺賴齊未濟偏軍獨全齊兵甲器械極為精好所乘船雕刻丹鏤青益絳襜干櫓戈矛葩瓜文盡弓弩矢箭咸取上材蒙衝鬭艦之屬望之若山林憚之引軍還遷後將軍假節領徐州牧後四年卒子逹及弟景皆為佳將鍾離牧三國吳志木傳字子幹會稽山隂人赤烏五年從郎中補輔義校尉遷南海太守還為丞相長史遷中書令會建安鄱陽新都三郡山民作亂出牧為監軍使者討平之封秦亭侯拜越騎校尉永安六年蜀併於魏武陵五溪夷與蜀接界懼其叛以牧為平魏將軍領武陵太守往之郡魏遣漢髮縣長郭純試守武陵太守率涪陵民入蜀遷陵界屯於赤沙誘致諸夷邑君或起應純進攻酉陽縣郡中震懼牧問朝吏曰邊境見侵何以禦之皆曰今二縣山險諸夷阻兵不可以軍驚擾驚擾則諸夷盤結可遣恩信吏宣教慰勞牧曰不然外境內侵誑誘人民當及其根柢未深而撲取之此救火貴速之勢也敕外趣嚴掾史阻議者便行軍法撫夷將軍髙尚説牧曰昔潘太常督兵五萬然後以討五溪夷是時劉氏連和諸夷率化今既無往日之援而郭純已據遷陵明府以三十兵深入未見其利牧曰非常之事何得循舊即率所領晨夜進緣山險行垂二千里從塞上斬惡民懷異心者魁帥百餘人及其支黨凡千餘級純等散五溪平遷公安督揚武將軍封都鄉侯徒濡須督以前將軍假節領武陵太守卒子偉代領兵晉謝琰傳詳忠臣戴􅋟晉書謝安傳􅋟字安邱處士逵之弟驍勇多權略逵厲操東山而􅋟以武勇顯謝安嘗謂􅋟曰卿兄弟志業何殊􅋟曰下官不堪其憂家兄不改其樂以軍功封廣信侯位至大司農南北朝孫處宋書本傳字季高永興人字行於世高祖東征孫恩季高隨高祖平定京邑以為振武將軍封新彛縣侯廣固之役先登有功盧循之難於石頭扞柵戌越城查浦破賊於新亭高祖遣季高率衆三千泛海襲番禺初賊不以海道為防季髙至東衢去城十餘里城內猶未知循守戰士猶有數千千人城池甚固季高先焚舟艦悉力登岸會天大霧四面陵城即日克拔循父擬長史孫建之司馬虞尫夫等輕舟奔始興即分遣沈田子等討平始興南康臨賀始安嶺表諸郡循衆力猶盛自嶺道還襲廣州季高據戰二十餘日循乃破走追奔至鬱林會病循走交州義熙七年季高卒追封侯官縣侯戴僧靜南齊書本傳永興人少有膽力便弓馬太祖撫畜之魏圍甬城遣僧靜戰蕩數捷袁粲據石頭太祖遣僧靜將腹心先至石頭時蘇烈據倉城僧靜射書與烈夜縋入城粲登城西南門列燭火處分臺軍至射之火乃滅回登東門僧靜率力攻倉門身先士卒衆潰手斬粲於是外軍燒門入以功除前軍將軍沈攸之事平封興平縣侯太祖即位改封建昌遷太子左衛率世祖踐阼出為北徐州刺史永明五年隸護軍陳顯逹討荒賊垣天生於比陽僧靜前進未至四十里頓深橋天生引魏步騎十萬奄至僧靜合戰大破之殺獲萬計天生退還比陽僧靜進圍之天生軍出城外僧靜又擊破之除淮南太守徙高平太守卒諡壯侯陳引叔南齊書戴僧靜傳引叔本名承叔餘姚人強辨果捷便刀楯初為左夾轂隊將泰始初隨太祖東討遂從征伐以功封當陽縣子官至太子左衛率永明三年卒王琳傳詳忠臣韓子高南史本傳山隂人寓都下陳文帝出守吳興子高年十六於淮渚附部伍寄載欲還鄉里文帝見而問曰能事我乎子高許諾稍長習騎射有膽決願為將帥及平杜龕配以士卒文帝之討張彪也帝據州城周文育鎮北郭香巖寺張彪自剡縣夜襲城帝自北門出倉卒暗夕軍人擾亂唯子高在側乃遣子高自亂軍中往見文育反命酬答於暗中又往慰勞衆軍帝散兵稍集子高引入文育營因共立柵明日敗彪彪奔松山浙東平帝分麾下多配子髙帝嗣位除右軍將軍封文招縣子臨海王即位宣帝入輔子高求出為衡廣諸鎮光大元年前上虞縣令陸昉告子高執送廷尉賜死隋王猛通志列傳字世雄父清為歐陽頠所殺猛時年五嵗母辛氏擕之遁於會稽及長博涉經史兼習孫吳兵法大建初釋褐鄱陽王府中軍參軍再遷永陽王録事參軍猛慷慨慕功名上疏陳安邊拓境之䇿詔隨大都督吳明徹略地以軍功封應陽縣子徙晉陵太守徵為左驍騎將軍廣州刺史馬靖不受徵除猛都督東衡州刺史領始興內史取靖猛至即擒靖送建鄴進爵為公加平越中郎將大都督發廣桂等二十州兵討嶺外荒梗所至皆平貞明二年授鎮南大將軍都督二十四州諸軍事徙鎮廣州未之鎮而隋師濟江猛總督所部赴援及聞臺城不守歎曰申包胥獨何人哉因勒兵緣江拒守以固臣節審後主在乃遣其部將辛昉馳驛赴京師歸欵隋文帝拜昉開府儀同三司仍詔猛與行軍總管韋洸便留嶺表經略猛仍討平山越奏聞文帝幸河東會猛使至大悅楊素賀因曰昔漢武此地聞喜因改縣名王猛今者告捷逺符前事降璽書褒賞以其長子繕為開府儀同三司猛尋卒於廣州贈上開府儀同三司封歸仁縣公子繕襲仁夀元年諡曰成五代顧全武十國春秋餘姚人從武肅王為親校常侍左右授武勇都知兵馬使董昌作亂昌將徐淑會淮南將魏約共圍嘉興全武將兵往救破烏墩光福二寨有功還守西陵以遏淮南安仁義之師已而敗昌將於石城復攻餘姚擒昌將徐章又降袁邠圍越州昌嬰城自守會蘇州陷王急徵全武趨西陵備淮南全武曰越州賊之根本奈何垂克而棄之請先取越後復姑蘇為便攻昌殺之明年復由海道至嘉興破淮南十八營擒淮南將魏約拔松江破無錫連取常熟華亭逐海冦王騰已又攻蘇州走臺濛敗周本所向無敵遂克蘇州陷崑山降其將秦裴天復元年吳王遣李神福帥師取杭州全武列八寨以待神福詐全福為其伏兵所擒明年吳遣全武易秦裴由是得歸國鮑君福十國春秋字慶臣餘姚人沈默少言有膽略從軍以驍果稱初隸劉漢宏為牙將曹埭之役來歸武肅王王使領一軍號向明都君福常側兜鍪臂弓注束矢馬上輪雙劍如飛出入陳中望之若流電人皆呼曰鮑閙纍積戰功為衢州應援指揮使屬刺史陳璋叛淮南人入其境脅君福為職君福不納伺守者李元嗣醉遂馳歸尋受衢數州刺史吳將周本守信州屢侵信安境君福率騎往追之本遁去天寶十一年王子傅球攻信州從斬吳將李師造擒偏將馮敏等功為諸軍之冠文穆王領清海節度使辟為副使及將罷郡武肅王勞曰比在任戰敵而已未足以盡副使才因復命之任君福在衢州凡一十二年後遷湖州纍職保大保順等軍節度使檢校太尉同平章事兼侍中天福五年卒年七十七諡忠壯鮑修讓十國春秋君福子治軍嚴整有法纍官上直指揮使遷衢州刺史天福十二年為戍將護李孺贇於福州孺贇叛修讓隨殺之傳首杭州顯德二年從吳承攻常州以應周世宗之師建隆元年知福州彰武軍事改上直諸軍都鈐轄使同參丞相府事宋孫沔宋史本傳字元規會稽人中進士第材猛過人所在皆著能績為陜西轉運司上書言吕夷簡識者喜其謇切為環慶路都總管安撫經略使知慶州元昊死諸將欲乘其隙大舉滅之沔曰乘危伐喪非中國體三司所給特支物惡而估髙優人因戲及之沔曰此朝廷特賜何敢妄言動衆命斬之徇將佐言此特戲爾不足深罪也沔徐呼還杖脊配嶺南明日給特支士無敢歡者厯知陜西河東都轉運使又知慶州聚戰亡遺骸葬祭之軍中感泣凡三知慶州邊人服其能遷知成都府為陜西都轉運使知徐州徙秦州時儂智髙反沔入見帝以秦事勉之對曰秦州不足煩聖慮陛下當以嶺南為憂臣覩賊勢方張官軍朝夕當有敗奏明日聞蔣偕死帝諭執政曰南事誠如沔所料以為湖南江西路安撫使便宜行事加廣南東西路安撫使沔憂賊渡嶺而北乃檄湖南北曰大兵且至其繕治營壘多具冥犒會遣狄青為宣撫使沔與青會青與智髙遇戰歸仁鋪智高敗走青還沔留治後事及還知杭州召為樞密副使後以尚書禮部侍郎致仕英宗即位歐陽修奏沔向守環慶養練士卒招撫蕃落恩信並著今雖七十心力不衰遂起知河中府又知慶州徙延州卒姚舜明嘉泰會稽志字廷輝嵊人進士宣和二年盜發睦州連陷杭睦衢婺處歙六州以舜明通判婺州兵數千人穿賊境以入郛晨登義烏門治城壁飛矢雨集舜明新率從兵以石擊賊既而引兵出戰賊遂大潰又賊帥洪載衆四十萬據處州不下舜明訪得其母妻令載所厚范淵往諭載即解甲來降除直祕閣提點兩浙刑獄建炎三年除知江州兼本路安撫制置使李成擁衆三十萬至城下舜明布列將士晝夜接戰賊衆斃踣不可勝計又開關奮擊生擒其將王林等賊攻益急舜明輒以訃襲破其營復充江淮荆浙都督府隨軍轉運使曹成馬友據湖湘間反側未定命舜明往招撫遂以二賊入朝韓世忠劉光世駐軍江上朝廷以舜明訃臣俾置司建鄴以總經費調發犒賞百須以給丐聞除集英殿修撰提舉江州太平觀進徽猷閣待制卒張定諸暨縣志定從軍建康時清流有磴冦屢征不服定建言冦本良民撫字失宜因而作亂願往降之遂令攝令入洞降冦五十餘人即實授厯潛江從守鄧州後以功授閣門宣贊舍人知泰州以言事不報去職起知通州改守德安卒元楊實萬厯紹興府志字國華諸暨人明經通武略補州弟子員延祐間以耆儒徴厯知吉州軍事逋冦犯境勢張甚實募驍勇數百人躬為先鋒奮擊悉平之以功擢淮南東路檢法遷大理寺丞董彥光成化新昌縣志雪溪人元至正間盜馮輔卿作亂陷新昌殺彥光兄弟彥光集子弟之驍勇者誓之曰盜吾讐也而敢為逆討逆復讐義不可失因欷歔流涕衆感憤遂軍於境上之松木嶺明日盜擁衆而西遇諸隘亟邀擊之彥光挺劍直前取輔鄉弟舜傳子谷彪廷輔左右翼以從賊披靡擒輔卿斬之俘其子弟姪洎徒屬數十人函其首送分省省臣大喜授武略將軍松江萬户僉海道防禦運糧義兵都元帥府事章廷圭新昌縣志字禹臣負竒氣與弟廷瑞相師友元末隱居龜山至正十二年方國珍叛據城邑廷圭奮然曰此大文夫立功之秋也遂與從弟廷璋集義兵設方略防禦有功俱授萬户邵文澤萬厯會稽縣志至正末值兵亂文澤率義兵保護鄉井有功臺省署為崑山州判官明劉性傳萬厯紹興府志字士原嵊人元季兵起散家財聚兵以捍鄉邑號義兵萬户明兵駐金華率衆歸附陳匡國安民之策數千言稱旨擢中書門下侍郎固辭改陜西鞏昌知府錢古訓萬厯紹興府志餘姚人洪武進士調行人時緬與麓川相搆緬主使使來貢而訴思侖發上擇古訓持敕往諭至則宣上威德罷其兵麓川酋長刁于孟者謀攻其主古訓曰吾以天子使從事邊徼乃弗能靖小醜何以報命馳入其部賁以大義皆稽顙無敢復逞思命發以古訓能休爭已亂薦方物欲留為援古訓却不受作書示以不可思侖發得書駭汗古訓敘次徼外山川風物為書還奏之上悅付史館後知漳州改湖廣參議蔣貴湯斌蔣貴傳字大富由燕山護衛卒從成祖起兵積功至昌國衛指揮同知進都指揮僉事移掌彭城衛宣德二年松潘蠻叛充右參將帥兵往討首募鄉導絶險而進一日數十戰大敗之進都指揮同知鎮守密雲諸關尋充副總兵貴大閲士卒進兵連破四十餘寨以功進總兵官佩平蠻將軍印正統初阿台朵兒只伯數擾塞下命貴以右副總兵禦之戰於石城斬獲功最冦竄兀魯乃地復自鎮夷間道兼行三日夜追至敗之阿台朵兒只伯以數騎遁去還封定西伯佩平羌將軍印雲南麓川思任發叛命尚書王驥督軍務貴為平蠻將軍往討抵麓川思任發間道走孟養獲虎符金牌信符宣慰司印進封貴為侯思任發既竄其子思機發糾餘衆居麓川往來窺伺復命驥總督雲南命貴佩印往討貴至雲南檄緬甸令送思任發緬人陽聽命而遷延不至驥謂貴曰此紿我也過江則厄我歸路且瘴厲將發不戰何待乃進次騰衝分軍為五驥與貴各將一軍馳之及江緬人擁衆大至驥誘其使宣言聽犒而貴潛以兵沿江工下焚其舟數百艘緬人潰遂趨者藍搗思機發巢破之思機發脫身走得妻子部落九十餘人象十一而還正統二年總兵禦邊明年卒贈涇國公諡武勇正德諸暨縣志貴義安卿三塘人謝瑩傳詳循吏陳禧荆州府志上虞人正統中同知荆州府事蒞政詳慎臨火事有膽略邑有激變者以反狀聞請亟勦戮僚友信之欲發兵禧曰人命至重盍察其實已而果誣貴州苗民逆命禧統兵隨大將栁侯征之所嚮皆克論功升湖廣右參議俞欽兩浙名賢録字振恭新昌人景泰進士選庶吉士改禮部主事兵部郎中會川貴山都長偕九姓土獠作亂命本兵督師往伐而以欽佐之既至主帥以下謂宜招撫為茍安訃欽獨持不可遂進兵連拔二十餘寨斬獲六千餘人遷太常少卿進禮部侍郎敵入大同以才略改兵部侍郎殫心孹畫邊境以寧尋卒賜祭葬録其子蔣琬吾學編貴之孫嗣侯成化初充平羌將軍總兵甘肅劾巡按御史罪狀八年為南京操江疏言江防控扼要害保護南京根本十年召還充團營總兵上言六事二年充總兵出雲中塞并統制宣府山西諸軍覘敵入偏頭關斬捕有功時議徙闕鶚堡于滴水崖琬曰獨石入堡聲勢相首尾滴水崖逺益難救援不可徙卒贈涼國公史琳湯斌史琳傳字天瑞餘姚人成化進士授工科給事中九年出為陜西右參議鞏昌番賊為梗率兵掩擊盡降其衆遂出行部自安定厯會寧金蘭抵秦州增斥堠繕城堡以斷賊路又轉關中之粟以實甘涼轉江西左參政南贛盜起督兵勦捕俘斬甚多𢎞治中擢保定巡撫尋以僉都御史經略紫荆等關進右都御史大同邊警以琳提督軍務琳馳至鎮會計兵馬錢糧十四年以保國公朱暉為大將軍出宣府都督李俊等為參將出大同與琳會師延綏覘敵兵所在乘夜潛師直搗河套敵不意大軍驟至驚遁乃毁其廬帳而還入朝陳邊務十三事十七年復與暉治兵京營武宗立代戴珊掌院事卒尹浦王守仁尹浦墓志字文淵山隂人郡庠弟子貢業太學成化甲午授廣西南寧通判時部中久苦猺患方議發兵浦至請緩旬日稍圖之乃單騎入猺硐呼酋長與語諸酋倉卒不暇集謀相與就問所由來浦曰斯行為爾曹乞生無他疑也因具陳禍福諸酋感動相率羅拜定約而出尋督諸軍討木頭等硐皆捷庚午擢同知平樂府事平樂地皆嶄山互壑猺慿險出沒深翳非時剽掠浦至居月餘從土著間行巖谷盡得其形勢縱火悉焚林薄猺失藉潰散浦因畫築城堡要害據守猺來無所匿從髙巔逺覘嘆息踟蹰而去自是平樂遂為安上居三年以老請致仕王守仁傳詳名臣吳兑山隂縣志字君澤號環州識膽沉雄為諸生時適越中倭亂鄉人率走匿兑獨部勒宗黨結柵禦之麻陽戍卒剽市兑執其渠告主者以徇嘉靖成進士為武選郎時武爵訛濫為置籍七百宿弊蕩然大盜曽一本嘯海上閩師以殱魁捷聞朝論且行賞兑曰魁之真偽未可辨也請核實後一本果未得凡邊功核而賞自此始嶺右有古田之師兑謂賊入楚其徑有三犒諭土司而禦之費省兵不勞升山東按察副使飭兵霸州塹塗布壘盜馬不得驟升右僉都御史撫治宣府等處度要害築外十三邊先足宣府屯糧溢故額至二十一萬軍多積逋乃疏請赦逋流人歸業者給以牛種由是耕者雲布粟價賤于中土嘗言火器之利造大小炮練為陳法兑督撫九年府庾充牣嵗省太倉太僕銀榖十萬尋擢兵部尚書太子太保廕一子世襲錦衣衛千户數月請告歸王鈁獻徵録字子宣會稽人嘉靖進士授主事厯升右副都御史提督南贛汀漳軍務洞賊竊出剽掠調兵轉餉無寧日鈁一解諸繁令惟責郡縣恤煢獨撫流離不煩兵而底定晉兵部右侍郎總督兩廣軍務肇慶府扶黎蔡海大羅山等處皆盜窟鈁發偏師授以方略擒其魁馬大恩李汝瑞破巢三百有竒倭冦自閩轉入揭陽鈁調兵邀擊斬首三百有竒復犯湘陽調兵擒勦百七十人未幾長樂興寧龍川程鄉諸處及羅絲洞賊復相煽動鈁會兵擒斬賊首楊球等復念廣中冦盜頻繁當遏其衝乃相度要害添設廣寧縣治斷賊出入先是督府自置賞功所金錢得恣出入無與核者鈁改貯梧州府每有犒賞移文給之出納有稽軍儲以充召為南京右都御史改工部尚書引年歸卒贈太子少保諡恭簡周如斗獻徴録字允文餘姚人嘉靖進士釋褐貴溪令入為御史按蘇松會島夷入冦嵗大侵如斗疏蠲常稅什伍然後以綏攘大計責之總撫將帥諸臣民歡聲動地士氣倍奮有青陽石湖婁門平望寶山水瀆分湖之捷如斗言兵在精不在衆於應援之兵力為裁減滿嵗吳民叩閽請留得允冦復至松鄉民避入城者以萬計撫院令杜門毋納如斗厲聲曰是驅民於死也乃洞開諸門以入賊屯桃花港調兵力戰斬獲無算仍會浙省兵夾攻之大捷於沈莊徐海麻葉陳東之衆以次蕩平按吳三年躬擐甲以戰者百數改督學南畿行部鳯陽倭由淮陽薄城下或請避之别郡如斗曰敢以職不任兵辭乎乃簡士卒飭將領使進擊賊遁升大理寺少卿晉右僉都御史撫南畿督郡縣選土著時訓練倭犯三沙如斗分布督戰纍以捷上轉副都御史巡撫江西未代會三衢礦賊竊發壤接婺源如斗曰婺非城不守亟令庀工令下而賊猝至如斗自太平馳往驅之賊始出境抵江西疾作卒於官吕光洵獻徵録字信卿新昌人嘉靖進士知崇安補御史巡按蘇松用餘皇破海冦大洋中會敵入古北口與仇鸞爭馬市一日章十三上謂有戰無和有進無退厯遷右都御史巡撫雲南至則首軍昆陽斬叛首馬苴李應朝水西宣慰安國亨叛冦霑益李向陽方廷美再反昆陽虧遮者索反尋甸並先後討平之晉尚書武定府土官鳯繼祖者鈎連他府大小酋僚有衆數萬據城以叛數出諸蠻攻城郭然孽始沐氏數莊豪而兵符故專沐氏光洵表其繇并乞符得自調賊倚川貴為三窟計其敗必從貴走川乞得暫領川貴諸兵道賊果敗遁竟授首於川武定平改工部尚書以歸商廷試獻徵録字汝明嵊人徙會稽嘉靖進士授刑部主事遷員外郎滇中率用土舍邏盜盜卒不可得懼獲譴則誘夷氓以充夷語侏離猝難辨廷試立為辨之全活數百人出為黃州守河南賊帥尚詔糾衆為亂光與黃接壤所司調兵以守廷試爭曰尚詔陸冦若走澤國祗就縛耳賊果不至黃與九江人爭界而鬭所司議發兵以攻廷試又爭曰此鬬而爭地非叛也請身諭之乃單騎往衆感泣相率羅拜請死遷山東按察副使備兵青州青故多盜而楊思仁者哨聚數千人廷試以兵掩捕賊擁衆走濰濰多礦徒廷試曰賊若合礦徒據險阻即難圖矣進兵急擊賊大敗度思仁必走河南先期遣徑卒要諸途果獲之蒙隂礦徒王恭劉顯聚衆亦千餘人廷試誘其腹心同某約期仲春為內應呼諸校至庭下謂曰嵗暮各放操乃遣周去而密令諸校兼程薄賊巢周歸以廷試語白賊且言已放操賊信之不設備除夜方張宴為樂兵舉火驟進賊悉就擒調雲南副使備兵金騰緬酋莽逹刺者脅三宣撫以叛廷試駐兵騰越間以禦之酋不敢動移陜西行太僕寺卿乞歸卒范檟獻徵録字子美會稽人嘉靖進士授工部主事轉員外郎中出知淮安府倭驟犯鹽城轉掠廟灣檟行次得報疾馳詣郡自將卒屯菊花溝以捍城盡繕兵械宵嚴守備時荒後府藏空虛諸軍所給餉日千石餽者三萬人商賈稀少倉糧告匱檟揭榜增糴價招之乃廟灣賊方發民屋甓墻築堡因鹽商積粟為持久計檟慮餉不繼言於漕臺請發數萬金告糴湖廣難之先是軍門已截留運糧五萬石檟擅發銀三萬兩六道往糴五旬米至就船中減價糶之頃得銀三萬償糴本而空獲米五萬石軍興給足卒以殱賊會景王舟涉淮舳艫萬餘艘羣盜知王重載出謀劫布黨分徒往來窺伺一日門卒報有貴客入潘氏園寓孥者曰有傳牌乎曰否命詗之報曰從者衆而更出入檟心疑為盜隂選健卒數十易衣帽如莊農曰若往視其徒入肆者陽與飲飲中挑與鬬相搏縶以來卒既去檟命輿謁客西門過街肆摶者前訴即收之得十七人陽怒曰王舟方至暇問汝鬬乎叱令就繫入夜傳令警備漏下二十刻出諸囚厲聲曰汝輩謂官府當出迎王而欲乘空虛為亂徒送死耳咸叩頭伏晨捕賊首已遁於是令飛騎馳報徐揚諸將吏而斃十七人於杖餘賊散潰後罷歸張天復萬厯山隂縣志字復亨嘉靖進士授禮部主事厯升雲南副使佩臬司篆沐氏不法以祖制戒之武定苗蠻亂詔進討監左軍用象戰之法雜以氊衫鐵鎧出入洞箐間擒偽王鳯繼祖俘名酋以十數沐氏欲冒功不許賂當事者齕之因被逮雲南父老蠻獠輩投臺省為陳枉狀得免歸子元忭及第請以已官贖父職復原官卒陳覲獻徵録字忠甫餘姚人嘉靖進士拜兵部主事升員外郎中佐尚書肅清軍府人無敢干以私者出為湖廣副使備兵衡永郴桂諸郡會新寧猺人冦掠江廣命覲討之覲遣使者招撫諭以威信猺人面縳降轅門願受約束廣東賊黃潮祖等流劫郴州桂陽覲督兵擊之斬獲數百招降餘黨廣西賊韋銀豹駕樓船泝衡永江大掠諸郡覲又督兵殱之江上時兩廣征古田猺獞軍門檄覲為備覲大張軍威聲聞入桂蒼梧間賊為禠魄兩廣得克奏首功者覲犄角之功居多升雲南左參攻徐甫宰張元忭徐甫宰傳字允平山隂人嘉靖舉人令武平當閩粵之界山冦蟠結甫宰擕一僕兼程就道至則問疾苦寬征徭拊循搔抑城久圮為亟完之近賊諸寨舊無城時苦剽掠為築城立堡者三李古春梁寧輩負險以叛督府將發兵討之甫宰單騎詣其巢曉以禍福賊羅拜泣下即解甲降嘗按事之福寧島冦突至州守病不能起城幾陷甫宰以便宜且守且戰城賴以全又以訃擒巨盜徐東洲梁道輝等藪賊一空調程鄉諸冦聞之相戒勿犯獨石窟首賊不悛令其黨擒之石窟平甫宰偶出相傳已他轉黠首楊六古良傑等遂謀作亂甫宰亟還誅倡亂者謀遂寢已而劇賊蜂起徴兵十萬不能克甫宰開誠釋縱懸賞以激衆心遂俘徐加悌縛林朝曦溫鑑斬首以徇餘黨潰降略盡督府上其功越格升按察僉事備兵潮州潮境巖箐四塞濵大海土賊島冦相煽亂甫宰或撫或勦降滅賊衆以萬計島冦屯鄒堂甫宰用所降賊授以方略搗其巢大兵隨之斬首萬餘自是潮無山海之患以勞瘁乞歸卒張元藩廣西通志山隂人官生嘉靖辛亥以後府經厯知平樂府時江南苦倭徴發連數省郡境猺獞竊發兵餉不支𠞰撫無定議元藩與僉事茅坤謀曰今朝廷方有東顧憂何暇及此惟公便宜除其首惡餘黨自平坤乃定雕勦之䇿賊首莫良三藍孟乾等次第受縳闔郡宴然癸丑計還里引疾不出吕光午新昌縣志號四峯有膂力善詩文工畫喜談兵嘉靖倭亂督撫胡宗憲養僧兵於杭之禪寺光午與少年入寺僧兵謔之光午怒擊五百人皆流血被面倭攻桐鄉急督學阮鶚被困光午單騎破圍殺倭數百救出鶚欲官之不可贈米五百石使入太學萬厯初年關白犯朝鮮聘天下將略者七人光午居第二辭不赴朱燮元傳詳名臣來斯行蕭山縣志字道之萬厯進士授刑曹厯升登萊道白蓮賊徐鴻儒倡亂斯行提兵協勦次廣川與賊黨遇進克滕鄒生擒鴻儒獻俘闕下升少參移貴陽按察使水西安酋煽亂恃苗長田阿秧為援斯行購素習阿秧者偽奔入巢斬阿秧首以獻諸酋震懾晉福建右布政使引年乞歸子彭禧字商老從父行間多所籌佐以太學生恩例授太平府通判燕禧字周老隨父任擊賊擒鴻儒授貴州遊擊世襲杭州前衛鎮撫俞相廷紹興府志字中嶽新昌人萬厯乙酉舉人為南江令當奢賊肆亂民力疲敝特以緩徴課練鄉勇為事賊入蜀逼邑境城守特固料敵自通江來必從山麓行預率民兵伏髙山乘其前後隊進滚木摧石自髙而下斃賊以千計城得全調雲陽令升御史徐人龍毛奇齡徐人龍傳字亮生上虞人萬厯進士授工部主事督學湖南崇禎乙亥任嶺北分守道以舊城庳隘冦屢陷增拓贛南五城遷蘇松兵備道會郴桂賊起圍長沙攻衡州上命兩廣江虔會楚合勦而檄人龍監軍時沅撫首請議撫人龍曰兵未動而遽議撫此冦之所以窺我也先勦後撫力足以死之而後得以情生之撫然其言斬賊曾冬保等以徇乃陽言楚兵當勦但暑不興師俟秋而前六月二十一日天雨夜晦冥忽下令三鼓入牛矢寨賊不虞兵至大潰焚其寨牛矢為賊寨冠既破諸寨皆膽落先是文吏輕武辨人龍在虔首擢遊擊謝志良參將董大勝引之後幕訃治盜事脫所絓食刀以贈至是以志良為前軍大勝繼之志良遂自效乘勝連破數寨擒賊雷天召蔣明宇等遂以七月從臨武與楚兵合大勝以偏師繼進連破數寨生擒渠帥劉紅鼻劉思榮等八月與粵兵合又破髙獠紫獠二源并搜檀源山破寨一其餘走羅源者願輸萬金犒軍中以求免𠞰不許會大勝自藍山還道經羅源人龍指授方略破殱之以數騎追獲李荆楚於大板沖捷聞遷武昌道晉參政拜都察院右僉都御史巡撫山東請告歸童朝儀山隂縣志字令侯天啓武進士任楚閫升大同副總兵勵精邊務征西前將軍王朴鎮雲中雅相敬重事必經區畫而後行楊嗣昌總督宣大首集文武詢邊事人莫敢發獨朝儀從容為言緩急形勢及熢燧儲備各務歷歷如指掌嗣昌瞪目曰名將才也後屢奏勦禦功調征河南流冦報捷擢升後軍都督時殺虎口方開馬市以朝儀久雲中得內外心命之往措置合宜崇禎十二年以疾豫告歸卒國朝沈文奎紹興府志字清逺會稽人佚宕有大志客遊遼東太宗文皇帝選士登第一人充祕書院纂修官順治元年扈從入關特命巡撫畿南次年總督漕務時區宇初定江淮多伏莽文奎綏緝多方自客遊至順治初與母妻相隔十有八年至是始拜疏迎養擢𢎞文院學士已丑充會試總裁再督漕運適有膠州將海時行之叛朝廷率先會勦兵部尚書豫蔭值白糧愆期鐫級後以嘉其績晉參政督理陜西糧儲勦平叛將身先士卒勞瘁成疾乞休卒鄉賢留祀册文奎兩任漕督賑濟淮揚等處飢民全活無數吳執忠山隂縣志字匪公山隂人遊學遼左歲甲申扈從世祖章皇帝入關任豐潤令授御史遷福建參議備兵漳泉值黃吳逞兵海上執忠輕舸入險昭布德威梧即率所部降于軍前尋備兵山西懷隆轉湖廣糧儲參政適李孽煽亂三省會師征勦供應億萬執忠跋履行間兵食充裕尋謝病乞休年七十三卒楊懋經公舉事實字九有山隂人性沉雄有勇善射順治丙戌遊京師江蘇巡撫張忠元邀與俱南甲午湖賊錢應奎肆出焚劫忠元委為太湖營總巡都司以勦之懋經出哨斬其前鋒紅孩兒賊衆奔竄海濵以功授崇明守備時崇明有海冦總兵梁化鳯方被圍北岸糧艘數十隻斂不敢發懋經即乘艘以濟圍解化鳯倚之為左右手己亥海冦鄭成功陷京口圍江寧化鳯將兵四千馳入江寧城屯教場懋經請決一死戰遂勒所部三百人旦蓐食既摩敵壘乃大呼奮擊敵出不意自相蹂躪生擒其將張順而還六月十七日成功與其屬會飲神䇿門門臨大江自明初閉塞懋經穿塞而出直搗中堅化鳯夾擊之賊兵潰走乘勝復鎮江成功敗還率餘衆犯崇明懋經奉令馳救至七了港值賊船一百三十餘號一鼓破之化鳯上其功晉崇明鎮左營都司世襲拜他喇布勒哈番遷廣東惠州遊擊升督標中軍副將升平陽總兵未任疾卒子二長柱承世襲次謙恩蔭生姚啓聖鄉賢留祀册字熙止會稽人奉天籍中特科舉人臺灣府志始任香山知縣以詿誤去官甲寅率義兵破紫狼山賊起溫州府同知加溫處道隨大兵平閩為福建布政使擢總督首陳平海十疏己未移駐漳州大開修來館懸賞格招賊任賢使能一材一藝之士靡不兼收數月賊稍有降者啓聖厚賞之偽將軍來天貴率師來降啓聖引入帳中相與同卧起出就館器具供帳更厚天貴大喜過望以故竭誠致命無有二心又遣興化知府卞永譽泉州知府張仲舉往説賊降而偽行人傳為霖心持兩端啓聖定密訃使自相賊殺為霖果伏誅後數日啓聖忽從數騎行城市中見宅髙大者輒鎖扄之榜其門曰某鎮公館某將軍行臺盛陳供具至晚得賊偵啓聖佯曰若非某將軍人乎歸語爾主某日之期不可爽信豫酒食遣歸得他偵亦如之海上喧傳賊遂自相猜忌源源納欵矣庚申二月二十二日啓聖乘賊懈遣兵攻破陳洲馬洲觀音山石馬等處十九寨次日復遣遊擊張定國都司張璽筆帖式羅密等引兵直抵海澄城下計誘偽將蘇侃等內變攻破城門降其衆二千餘人恢復海澄縣是夜又差知縣黃金從等乘潮分渡直入海門等處降其將鄭元堂黃瑞陳珍張雄張治等水陸目兵一萬二千餘人遂復金門厦門賊退保澎湖晉秩太子少保兵部尚書辛酉啓聖具疏請內大臣伯施琅為靖海將軍既至啓聖運籌決策琅率舟師而前啓聖具糗糧於後以康熙癸亥六月十四日從平海進兵二十二日克澎湖七月二十七日鄭克塽降臺灣平卒于官吳興祚紹興府志字伯成執忠子以貢知萍鄉縣改無錫縣康親王征福建知其才薦授福建按察使時耿逆已降鄭經遁歸厦門惟延建諸山多姦人嘯聚奉朱統錩為渠帥勢甚張興祚撫勦互用舉兵直抵西山遙布聲勢遣壯士持檄開誠諭之其大校陳龍何應元等先後輸欵解散萬餘人獨統錩潛贛州山中興祚陽曰贛屬江西非我部不奉詔不敢深入遂下令班師而默察降帥中可任心腹者令蓄髮奔統錩導以趨閩統錩果乘間來設伏擒之支蔓悉平擢巡撫同時姚啓聖晉總督兩人以同里相善軍旅指畫如應桴鼓鄭經將劉國軒攻圍泉漳二郡啓聖禦漳州興祚救泉州從亂山攀藤而進大敗賊衆復永春德化數縣國軒宵遁泉城獲全於是䇿掃厦門分三路進兵如聞進期會發鄭經潰捷尋遷兩廣總督兵部尚書豫世職台州府五代孫琰十國春秋臨海人驍勇有智時人謂之孫百計積功至牙將守蘇州淮南將周本吕師造圍蘇州攻法凡百出不可窮最後推洞屋攻城若帡幪然琰隨機應敵置輪於竿首垂絙投錐以揭之攻者盡露及炮至張綱以拒炮遇網輒止竟無所施淮南兵遂夜遁宋賈涉宋史本傳字濟川天台人慷慨有大志金犯光州涉知盱眙軍淮人季先沈鐸説楚州守應純之招山東人李全等以其衆至先招石圭楊德廣通號忠義軍圭等反斃鐸于漣水純之罷通判梁丙行守事欲省其糧使自潰圭等渡淮焚掠幾盡謂朝廷欲和金人置我軍何地涉上書曰降附踵至而金乃請和此正用髙澄間侯景遺䇿恐山東之禍必移於兩淮至若忠義之人不立定額處之北岸安能以有限之財應無窮之須飢則噬人飽則用命其勢然也授淮東提點刑獄兼楚州節制本路忠義人兵涉遣傅翼論圭等逆順禍福自以輕車扺山陽德廣等郊迎伏地請死誓以自新金僕散萬忠數十萬大入涉遣陳孝忠向滁州圭向濠州先德廣趨滁濠全要其歸路以翼監軍數日孝忠捷至圭屢破金人金人不敢窺淮東者六七年諸軍在漣水山陽者既衆涉分圭孝忠為兩屯李全軍為五寨又用陜西義勇法涅其手合六萬人汰三萬有竒正軍常屯七萬餘使主勝客嵗省費十三四涉遣李全取海州復密濰王琳以寧海州歸遂收登萊二州青州守張林以賓棣淄州降又收濟沂等州恩博景德邢洺等十餘州相繼請降涉傳檄中原擢制置副使兼京東河北節制金十餘萬犯黃州淮西帥趙善湘請援於朝涉遣全等赴之金人破黃陷蘄安慶甚危全馳至遂定與京湖制置使趙方掎角連戰俱勝先是蘄州受圍余暉往援鼓衆宵遁金乘間登城前帥不問涉斬暉以徇諸將畏懼用命勢大震金將三道渡淮涉以張惠當之惠金驍將歸宋所部花帽軍有紀律率諸軍出戰金人大敗陷失大半涉以所獲京河版籍及金銀牌銅印之屬上於朝元葉應槐始豐類稿字文舉以字行臨海人身長七尺倜儻有氣概儇捷過人善騎射至正初海上冦起應槐奮袂起曰此吾取功名時也因結鄉兵圖之朝廷置水軍萬户府行省丞相逹實特穆爾承制募應槐補水軍千戶應槐以所部鄉兵就募駐杭州應槐素諳海上利害條陳殄冦之䇿如指諸掌丞相韙之尋升水軍萬户行省方議大出舟師而海冦欵伏猶以海防為務調應槐出鎮海寧州之園花鎮會眀兵渡江南御史臺移治紹興御史大夫慶通選屬帥守禦臺城應槐以所部往應命三年外兵無敢犯境者實授明威將軍平江等處水軍都萬户府副萬户慶通罷去張氏遣其部將據臺城應槐將取道於海入元時海上未靖遂止明兵下蘇州徙凡故有官者於開封應槐在徙中居開封十有七年卒明李匡兩浙名賢録字存翼黃巖人宣德進士授太常博士改御史升四川按察副使時播州苗賊作亂委匡帶領官軍撫捕克敵一十五次景泰元年以軍功升左僉都御史巡撫四川播州未平敘州夷蠻又亂焚劫九縣全蜀騷擾復領敕勦捕而四川軍伍數少匡乃召民間壯丁凡九千餘教練操習雜處部伍匡號令嚴明措置有方屢戰屢捷羿蠻始息而播州餘冦尚未盡滅貴州總督王來咨請會兵攻草塘期而進兵至則來咨違期匡被圍乃堅守營寨偃旗鼓息刁斗五日一戰而捷蓋由示弱而勝天順六年兵部尚書馬昂奏保敕巡撫宣府匡親厯邊陲增塞堡斥堠崇密雞犬相聞八年乞歸卒於家蔡潮傳詳循吏戴德孺西江志字子良臨海人𢎞治進士厯工部員外郎遷臨江知府宸濠反遣使收府印德孺斬之與家人誓曰脫有急若輩沉池中吾不負國也即日戒嚴據臨江以障逆鋒會贛撫王守仁至德孺以臨江兵共滅宸濠世宗以德孺馭軍最整獨增三秩為雲南右布政使舟次徐州覆水死贈光祿寺卿豫一子官應大猷獻徵録字邦升仙居人正德進士除南刑部主事值宸濠謀叛尚書喬宇以戰守事宜付大猷大猷議嚴斥堠多詗謀以防姦細練軍實振先聲以安人心急遣精兵守皖城以扼敵衝使不得進於是宸濠兵至皖城而挫竟就擒武宗南巡大猷叩行宫力諍厯升廣東參政撫勦叛夷恩威大著纍擢僉都御史巡撫雲南改四川值都蠻勿靖大猷勒兵出其不意直搗巢穴擒斬數千級再撫山東升吏部右侍郎刑部尚書歸卒年九十五曾銑名山藏字子重嘉靖己丑進士授長樂知縣召為御史按山東遼陽軍士作亂銑疏乞原宥以安邊鎮上得奏喜曰真御史也銑單騎往諭朝廷恩威三軍歡聲動地反側漸寧銑簡任韓永慶等指授方略三城倡禍者率就縳餘安堵如故升大理寺丞擢右僉都御史巡撫山東二十一年敵濟農突入十八盤欲襲臨清銑奏築新城以阻之二十四年調撫山西銑大修邊墻添製火器敵攻浮圖峪率兵平刑以堵西突敵入鵓鴿峪直趨廣寧以防北衝敵不近邊者二年明年敵入陜西三邊總督難其人上以屬銑時敵十萬騎由寧塞突入銑命中軍參將李珍率徑卒先行復親督將士晝夜由新安邊外直趨定邊敵遂出塞去銑念河套為中國要害地乃上疏曰河套古朔方地是張仁願所城受降之界也以東勝孤懸撤之內守復改榆林為鎮𢎞治十二年敵牧套內孝宗志欲復之而未逮武宗方欲征之而未能寧夏外險反內備河伏乞敕下廷臣將臣此奏與修築榆林邊墻之奏詳計可否然築邊之議數十年之謀耳若復套之舉則臨河作障天險為池此社稷之至計也上曰銑奏具見壯猷其令銑務求長䇿嗣上方略銑復條上十八事晝夜講求復套䇿演成行師機宜列為八圖次第其説上之於是領兵入套斬獲千計敵多移營渡河時仇鸞為總兵驕恣銑劾其違法詔械繫鸞會嚴嵩父子方謀傾夏言鸞因重賂世蕃並搆銑下理官羅織成獄死西市天下寃之隆慶初召復銑兵部侍郎副都御史贈尚書諡襄愍賜祭葬台州府志銑世居黃巖倉頭街曾家巷父賈而貧與江都商者善銑年十二丰神俊異命題即能警對商謂其父曰此子後必大貴商别去其父􅉵甚遂以銑托擕歸江都今登科録及諡類鈔俱刻黃巖人石簡獻徵録字廉伯寧海人嘉靖進士授餘干縣知縣厯升廣東高州府知府高州當猺賊焚掠之餘多方料理民得蘇息更安慶府升雲南兵備副使接壤安南民苦山賊荼毒且險阻勢難征勦簡設計生擒二百餘人斬首不計其數地方以寧轉湖廣按察使升貴州左布政使時五溪諸蠻四出劫掠攻勦弗克撫按以簡威望檄委招撫遂單騎往諭以禍福悉皆投順改山東庫有餘銀悉資兵餉升巡撫雲南卒張元勳湯斌張元勳傳字世臣太平人嗣世職為海門衛新河所千户沈毅有謀值倭警從戚繼光破橫嶼諸賊進署都指揮僉事充福建遊擊將軍隆慶初破倭福安改南路參將從李錫破曾一本纍進副總兵五年擢署都司僉事代郭成為總兵官鎮守廣東惠州賊唐亞六等劫掠郡縣元勳進勦亞六等授首肇慶恩平賊陳金鶯等與鄰邑苔村賊羅紹清林翠蘭談權伯藤洞賊黃飛鶯黃高暉等相煽為亂故事兩粵惟大征得敘功雕勦不敘故諸將不樂雕勦總督殷正茂與元勳計令雕𠞰得論功諸軍爭奮又密遣副將梁守愚等屯恩平若常戍者掩不備斬翠蘭等生擒紹清權伯以獻其諸路雕𠞰者生得金鶯而高暉等亡去元勳逐北至藤洞生獲之諸賊盡平惠潮地相接賊首藍一清賴元爵馬祖昌黃民太曾廷鳯卓子望等各據險結寨連地八百餘里黨數萬人曾金鶯等滅諸賊頗懼佯乞降正茂知其詐徵兵四萬令參將李誠立沈思學王紹遊擊王瑞等分將之元勳居中節制數道并進賊遇之輒敗元勳追亡至南嶺一日夜馳至擊破李坑生得子望等明年破烏禽嶂廷鳯等阻高山元勳佯飲酒高會忽進兵擊擒之先後獲大賊首六十一人次賊首六百餘人破大小巢七百餘所進都督同知世廕百户潮州賊諸良寶既撫復叛犯陽江據故巢居高山嶺不出戰元勳積草土與賊壘平用火攻之斬首千餘級捷聞進世廕一級遺孽魏朝義等四巢亦降惠潮遂無賊其冬倭陷銅鼓石雙魚城元勳大破之儒洞五年大征羅旁賊進都督改廕錦衣尋以疾致仕李超吳執御李超傳字天衢太平人襲世職習騎射嫻韜略倭冦浙東兵備道談綸薦於總督胡宗憲委以備倭之任適冦至超單騎持矛直突倭營倭驚潰斬獲無算後綸以憂歸豫章冦亂超恐綸罹冦難私率部下百餘徑往豫章斬殺靡遺豫章獲靖綸喜出望外復言於江西巡撫特疏於朝授南贛遊擊屢著戰功遷金台嚴三郡參將會倭深入台南身督諸將大敗之倭自是不敢復冦遷全浙護軍駐鎮定海厯任十載績勞懋著再遷京城衛軍都督提督京營以疾致仕授特進柱國光祿大夫卒於家楊文台州府志號筠先臨海人嘉靖間倭屢犯台文應郡守談綸之募每戰先登自仙居至寧海又於太平南灣擒斬倭冦調廣東福建等處討賊多立殊功授台州衛指揮升海南衛參將萬厯二十年寧夏哱承恩之變文以南兵往討水陸夾攻襲破南關生擒承恩土文秀捷奏升湖松登萊等處副將仕終遼陽總兵官王士琦周頌王士琦傳字圭叔宗沐子萬厯進士授南工部主事厯兵部郎中按治驕兵不畏強禦論者以邊才許之會播州宣慰楊應龍反以邢玠總督四川特補士琦重慶知府至即授檄前往綦江趣應龍出安穩聽勘應龍觀望不前士琦徑至安穩應龍令弟兆龍以兵迎且請進赴松坎人咸謂無輕蹈不測士琦曰彼以我為怯也即單騎赴之見應龍責以大義開陳利害應龍率苗目膝行抱士琦足泣因論令至安穩應龍如命面縳蒲伏獻首亂十二人案驗抵應龍斬輸銀四萬兩助採木奏上報可倭冦朝鮮復以玠為經略晉士琦山東參政與總兵劉綖將苗兵二萬自蜀趨王京時倭據東西中三路西路行長據栗林曵橋最雄險玠使綎將陸兵陳璘將水兵攻西路士琦監其軍士琦促陸師前進至栗林攻圍十餘日賊求救於别酋平義智士琦恐二酋合勢叵測乃令水師解圍伺於海陸師急攻奪曵橋斬首數百級乘勝入城行長遁入海平義智與中路酋石曼子來救璘半洋邀擊燬倭船數百殺石曼子行長僅以身免會關白平秀吉死三路倭遁朝鮮事平論功升河南左布政使厯右副都御史巡撫大同調江西卒塢若虛寧海縣志字君受萬厯副榜授崖州守適黎蠻倡獗若虛增濬城壕與王總鎮協力拒守裹甲不解者五旬賊宵遁又海冦引倭蹂躪崖土若虛以信義糾集民兵先告妻子曰封疆重任身與城為存亡義不反顧爾等須自為訃妻洪氏亦預潔眢井以待於是厲氣登城將士用命時出竒計以疑冦冦乃驚潰遷邵武同知後家居十餘年卒葉昶黃巖縣志字仲火天啓甲子舉人署平湖縣教諭超擢建寧清軍同知大盜吳秀三聚黨數千人於松溪火龍井商民咸被其毒昶白撫按親督兵從間道生擒秀三四境帖然民建祠祀之張鐘音仙居縣志字律之天啓間貢生授樂清縣訓導有冦薄城邑鐘音戎裝詣宋令曰萬世瞻仰在此一舉公嚴為守請為揮戈擊之縣令為部少年勇敢五百人以從或疑衆寡不敵鐘音曰烏合之徒易與耳出戰不數合遂俘其首餘黨悉鳥獸散城賴以全遷湯溪教諭厯徽州教授張相霖仙居縣志字君璧崇禎間除寧都尉會廣西蓮子洞冦作侵寧都諸校憚戰相霖請部兵先大破之兵備祁逢吉撫軍陸問禮上其功升授驃騎將軍卒於京浙江通志卷一百七十三
