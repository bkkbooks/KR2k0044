body:
  text: 浙江通志卷七十七積貯上榖用出於委積而春頒秋斂旅師固以聚為散焉後世常平義倉之設皆師其意乃或舉廢不常則緩急奚賴聖朝念切民依廣為儲備而出易以時兩浙倉庾所在興積不待散利施惠而民食已足恃矣志積貯周禮地官大司徒以荒政十有二聚萬民一曰散利以保息六養萬民四曰恤貧周禮地官遺人掌邦之委積以待施惠鄉里之委積以恤民之囏厄門關之委積以養老孤縣都之委積以待凶荒禮記王制三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色漢書食貨志宣帝時大司農中丞耿壽昌白令邊郡皆築倉以榖賤時增其賈而糴以利農穀貴時減賈而糶名曰常平倉人便之通典永平五年作常滿倉晉書食貨志泰始四年立常平倉豐則糴儉則糶以利百姓謹按常平倉始於耿壽昌然是時止令邊郡築倉其餘郡國尚未舉行永平五年作常滿倉立粟市於城東則亦非通行可知至晉泰始四年立常平倉其時吳尚未平是浙省於漢晉時固未嘗有常平倉也然常平之設實昉於此故遞詳之以見原始通典宋元嘉中三吳水潦穀貴人飢彭城王義康立議以東土災荒人凋榖踊富商蓄米日盛其價宜班下所在隱其虛實令積蓄之家聽留一年儲餘皆敕使糶貨為制平價隋書食貨志開皇五年五月工部尚書長孫平奏令諸州百姓及軍人勸課當社共立義倉收穫之日隨其所得勸課出粟及麥於當社造倉窖貯之即委社司執帳檢校每年收積勿便損敗若時或不熟當社有飢饉者即以此穀賑給謹按隋時浙省設立社倉無憑考據但云諸州百姓及軍人勸課當社共立義倉則浙省之設立當亦始於此矣通典唐貞觀初天下始置義倉每有飢饉則開倉賑給高宗永徽二年九月頒新格義倉據地取稅實是勞煩宜令戶出粟上上戶五碩餘各有差唐書食貨志第五琦請天下常平倉皆置庫以蓄本錢謹按唐書食貨志太宗時置義倉及常平倉以備凶荒高宗以後稍假義倉以給他費至神龍中略盡元宗即位復置觀此則浙省諸州義倉在唐代雖不可考然與時廢興其大略當不甚相逺又德宗時趙贊言常平倉廢垂三十年請於兩都江陵成都揚汴蘇洪置常平輕重本錢獨不及江南道則是時浙省諸州常平之廢蓋久矣舊唐書食貨志元和六年制諸道州府有少糧種處委所在官長用常平義倉米借貸淮南浙西宣歙等道十三年戶部侍郎孟簡奏天下州府常平義倉等斗斛請準舊例減估出糶但以石數奏申有司更不收管內州縣得專達以利百姓從之文獻通考開成元年戶部奏應諸州府所置常平義倉伏請今後通公私田畝别納粟一升逐年添貯義倉斂之至輕事必通濟歲月稍久自致盈充縱逢水旱之災永絶流亡之慮從之文獻通考乾德元年詔諸州於所屬縣各置義倉自今官所收二稅石别稅一斗貯之以備凶歉給與民五年令諸州置惠民倉如穀稍貴即減價糶與貧民不過一斛景德三年詔於京東京西河北河東陜西淮南江南兩浙各置常平倉文獻通考司馬光言常平倉者乃三代聖王之遺法非獨李悝耿壽昌能為之也穀賤不傷農穀貴不傷民民賴其食而官收其利法之善者無過於此比來所以隳廢者由官吏不得其人非法之失也今聞條例司盡以常平倉錢為青苗錢又以其穀換轉運司錢是欲盡壞常平專行青苗也國家每遇凶年供軍倉自不能足用固無羡餘以濟飢民所賴者只有常平倉錢穀耳今一旦盡作青苗錢散之向去若有豐年將以何錢平糴若有凶年將以何穀賙贍乎臣切聞先帝嘗出內藏庫錢一百萬緡助天下常平倉作糴本前日天下常平倉錢穀共約一千餘萬貫石今無故盡散之他日若思常平之法復欲收聚何時得及此數乎臣以謂散青苗錢之害猶小而壞常平倉之害尤大也續文獻通考隆興二年詔司農少卿陳良弼往浙東點檢常平等倉良弼言比點檢七州常平倉其間失陷借支壞爛失收米麥共二十七萬六千二十餘石并常平錢一萬四千四十餘貫乞委提舉官遍詣所屬剗刷餘省錢米償納如所償未足俟收納秋苗日盡償從之續資治通鑑乾道七年提舉浙西常平李結乞以見管營田撥歸本司同常平田立官莊梁克家亦言戶部營田率為冇力者下價取之稅入甚微不如置官莊歲可得五十萬斛文獻通考乾道八年知台州唐仲友言鰥寡孤獨老幼疾病之人乞依乾道七年例取撥常平義倉賑給上命以常平米抵價出糶以義倉米賑濟朱子延和奏劄臣比因講求荒政復有事雖非今日拯救之急而實異時久逺之利不敢不言臣所居建寧府崇安縣開耀鄉有社倉一所係昨乾道四年鄉民艱食本府給到常平米六百石委臣與本鄉土居官朝奉郎劉如愚同共賑貸至冬收到元米次年夏間本府復令依舊貸與人戶冬間納還臣等申府措置每石量收息米二斗自後逐年依此斂散或遇小歉即蠲其息之半大飢即盡蠲之至今十有四年矣其支息米造成倉厫三間收貯已將元米六百石納還本府其見管三千一百石並是纍千人戶納到息米己申府照會將來依前斂散更不收息每石只收耗米三升係臣與本鄉土居官及士人數人同共掌管遇斂散時即申府差縣官一員監視出納以此之故一鄉四五十里之間雖遇凶年人不闕食竊謂其法可以推廣行之他處而法令無文人情難強妄意欲乞聖慈特依義役體例行下諸路州軍曉諭人戶有願依此制立社倉者州縣量支常平米斛責與本鄉出等人戶主執斂散每石收息二斗仍差本鄉土居官員士人有行義者與本縣官出納收到息米十倍本米之數即送元米還官却將息米斂散每石只收耗米三升其有富家情願出米作本者亦從其便息米及數亦與撥還如有鄉土風俗不同者更許隨宜立約申官遵守實為久逺之利其不願置立去處官司不得抑勒則亦不至搔擾伏望聖慈詳察特賜施行取進止朱子奏衢州官吏擅支常平義倉米狀竊惟常平之法所以準備災傷廣行賑給民命所係利害非輕今衢州當職官不能計度軍儲應副支遣而坐指常平儲蓄之備以為一時之用雖原其情實未必有他情弊而隳廢法度耗散儲蓄漸不可長故臣昨來不欲便具奏劾只具狀申尚書省乞與敷奏依法施行意謂朝廷必須薄行責罰以戒後來今乃一無所問亦不略行戒約即在本司何以約束諸郡況今來旱勢已成衢州尤甚城中米價已是七十文足一升兼本州水路淺澀尤宜愛惜不可違法妄有侵耗欲望將本州當職官吏略加責罰或念其委實欠闕軍糧即乞朝廷别行應副嚴行約束今後不得輒將常平官物妄有侵支實為久逺之利伏候敕旨續文獻通考嘉熙三年九月以江湖浙東旱傷詔諸路提舉常平司核所部州縣常平義倉之儲以備賑濟仍飭制總司今後毋輒移用違者坐之元史食貨志常平倉至元六年始立八年以和糴糧及諸路倉所撥糧貯焉續文獻通考至大二年九月立常平倉延禧四年二月敕郡縣各社復置義倉至治元年五月御史劉恆請興義倉泰定二年九月以郡縣飢敕有司治義倉至元元年立常平倉明會典洪武初令天下縣分各立預備四倉官為糴穀收貯以備賑濟就擇本地年高篤實民人管理續文獻通考正統五年正月令六部都察院推選屬官領敕分詣兩畿各省府州縣立預備倉發所在庫銀糴糧貯之軍民中有能出粟以佐官者授以散官旌其門明實録成化中敕藩司言異時州縣設預備四倉所以廣儲蓄備旱潦為民賴也比久廢弛宜核實見在儲蓄有無多寡之數仍儘各處在官贓贖糴為備有不敷聽於存留糧內借撥或於各里上中戶勸助以充其看守倉者於附近里分令殷實有行止者主之至通司官吏實收虛放為侵盜者論如律衛所地亦如之明實録嘉靖中侍郎王廷相言備荒之政莫善於古之義倉若立倉於州縣則窮鄉就倉旬日待斃宜貯之里社定為規式一村之間約二三百家為一會每月一舉第上中下戶捐穀多寡各貯於倉而推有德者為社長善處事能會計者副之若遭凶歲則計戶而散先中下者後及上戶上戶責之償中下者免之凡給貸悉聽於民第令登記册籍以備有司稽考則既無官府編審之煩亦無奔走道路之苦從之續文獻通考嘉靖十二年戶部尚書許瓚言郡縣贖鍰引稅多乾沒無稽宜令糴穀備賑從之國朝事例大清會典凡常平等倉順治十一年詔各府州縣俱有預備倉及義倉社倉積貯備荒責成該道員稽察舊積料理新儲每年二次造册報部該部察積穀多寡分别議奏以定功罪十二年題準各衙門自理贖鍰春夏積銀秋冬積穀悉入常平倉備賑置簿登報布政司彚報督撫歲終造報戶部如有假公潤私隱匿漏報者督撫查參其鄉紳富民樂輸者地方官多方鼓勵勿勒定數勿使胥吏侵剋及加耗滋弊十三年又議準積穀賑濟務令修葺倉厫印烙倉斛選擇倉書糴糶平價不許别項動支十七年議準常平倉穀春夏出糶秋冬糴還平價生息務期便民如遇凶荒即按數給散災戶貧民有司實力奉行十八年議準捐輸賑荒見任官員鄉紳願納米一千石或銀一千兩以上者加級納米一千石銀一千兩以下至米一百石銀一百兩以上者分别紀録商民納米五十石銀一百兩者給扁旌奬納米一百石銀二百兩者給九品頂帶納數多者遞加職銜生員俊秀準納米入監讀書康熙十八年題準地方官整理常平倉每歲秋收勸諭官紳士民捐輸米穀照例議敘鄉村立社倉鎮店立義倉捐輸積貯公舉本鄉敦重良善之人管理出陳入新春月借貸秋收償還每石取息一斗年終州縣將數目呈詳上司報部管倉人儲穀繁多題明給頂帶榮身有官吏掊克者照侵欺正糧例處分有強派抑勒借端擾民者該督撫題參治罪十九年覆準直省常平倉穀留本地備賑義社倉穀留本村備賑永停協解外郡康熙二十八年十月戶部為積貯天下本計等事覆河南道御史條奏一欵內開嗣後文武官員捐穀四百石或米二百石準紀録一次比此多捐者照所捐數目準其紀録俊秀人等捐穀四百石或米二百石廩生捐穀一百六十石或米八十石增生捐榖二百石或米一百石附生捐榖二百四十石或米一百二十石青衣生捐穀三百石或米一百五十石俱準作監生富民捐穀四百石或米二百石給九品頂帶榮身捐穀一百石或米五十石該地方官給扁旌奬又敬陳微臣一得之愚等事覆直隸巡撫題富民捐穀六百石或米三百石準給八品頂帶榮身將此一欵應入各省常平倉捐納事例之內令其捐納所捐米穀交與州縣官將常平等倉修理收貯該地方官照倉斛收取按季造册申報督撫如陸續捐輸米穀積蓄若多該督撫題請停止其捐納米穀仍照前捐納銀兩州縣衛所官升遷離任同正項錢糧一併交代接任官若有浥爛侵蝕短少等弊該督撫指名題參此項捐納米穀該地方官出給實收之時注明米穀交倉月日申報該撫咨報戶部到日換給執照將所捐月日轉咨吏禮兵三部俟命下之日通行直隸各省督撫遵行可也奉旨依議康熙三十一年五月初二日大學士伊桑阿等奉上諭積貯米穀最為要務倘能實有蓋藏則歲遘凶荒必不至於飢餒但小民不知儲蓄每於豐稔之年恣意糜費一遇歉歲即坐困不支今正值麥石收穫之時應行各該地方官勸諭百姓令各戶量力捐輸積貯該州縣官以輸納之人姓名數目詳記册籍其秋禾收穫以後亦以此例舉行如春月轉貸於乏穀之民俟秋月即照此數償還備用每歲當收穫遵行此捐輸之法不數年間米穀充裕縱使歲偶不登何至閭閻艱於粒食爾等與九卿詹事科道會議具奏欽此臣等遵奉上諭今正值麥石收穫之時應行各該督撫令州縣衛所官員勸諭鄉紳士民人等令各戶量力所能不論幾石幾斗聽便捐輸該州縣衛所官員將輸納之人姓名麥石數目造報該撫秋收後亦照此捐輸積貯若將米麥貸於乏穀之人俟收穫時即照原領米麥之數交納如有不肖官員混行抑勒多收情弊事發即照私派錢糧例處分每歲收穫時俱照此遵行至於收納米麥該州縣衛所官員於所屬地方城市鄉村適中之處酌量設倉幾所於本地方紳襟耆老內令公舉誠實可任者交付管理敬謹收貯無致浥爛一切借貸償還該管之人俱造册呈明地方官用印存案凡此捐輸乃為小民代謀積貯如有竟不捐輸者將姓名另記一册設遇蠲免錢糧此戶不準蠲免其地方官員將此捐輸米麥應不時稽察交代收受時俱照正項錢糧交代收受該知府於歲終察勘詳明該撫該撫將捐輸總數造報戶部遇有司薦舉時於事迹內注明勸輸有法字樣方準薦舉若有官吏侵蝕等弊即照虧空正項錢糧例處分可也奉旨依議康熙三十二年正月戶部為欽奉上諭事議覆浙江巡撫張鵬翮會同總督興永朝疏稱浙省産麥無多所收不敷民食且夏麥貯倉易於浥爛而鄉紳士民咸願夏秋併作一次每畝捐穀四合如零星小戶力不能輸者聽從其便至於修理倉厫如有舊設倉基該地方官設法修蓋如無倉基之處擇於空濶寺院亦令捐修備貯毋許派擾里民仍舉誠實紳襟耆老管理至次年耕種之後聽民借貸借存各半以備不虞定限十月內還倉其管理之人不許扣剋侵運并州縣等官不許抑勒多收如有違者照私派例處分交代照正項錢糧收受各府每於歲終詳明報部等因應照該督撫所題可也奉旨依議康熙四十九年九月戶部為請照江南開例捐監積貯等事議覆浙江巡撫黃秉中疏稱江寧開例納監部覆奉旨允行江浙二省為財賦之地人民繁庶今若止於江南開例捐納則湖廣江西之米俱聚集江南糶賣不能到浙而浙省捐納之人亦必將米運赴江南浙米勢必騰貴民食愈致艱難請於浙江亦開納監之例杭嘉湖三府各捐米十萬石或穀二十萬石其八府各捐米五萬石或穀十萬石俟捐足之日即行停止至客商販米來浙路程較江南稍逺故價值亦稍貴捐納數目應量為酌減庶捐納之人無有趨避等因查先經江寧巡撫張伯行會同總督噶禮以各屬倉廩空虛積貯之法請開常平倉納監事例經九卿議覆奉旨依議欽遵在案今該撫請於浙江亦開納監之例以裕倉儲應如所題照江南捐納監生之例捐納監生俟捐足之日即行具題停止再查杭嘉湖等府與江南交界米價自應畫一且台溫等府連年豐收米價亦屬平賤應將該撫所請捐納數目量為酌減之處無庸議可也奉旨依議康熙五十三年七月十二日欽奉上諭恭紀首卷行令總漕截留漕米五萬石撥運浙江杭州府以備積貯隨經大學士蕭永藻等議準又將截留江南江寧府之十萬石米內撥出五萬石一同運至杭州府收貯康熙五十三年十一月十七日欽奉上諭恭紀首卷浙江再截留漕米十萬石收貯杭州府以備賑濟康熙五十四年十二月戶部為欽奉上諭事議覆浙江巡撫徐元夢題稱浙省奉上諭先後截留漕米二十萬石加謹收貯以備不時之需先經平糶米十萬石時已秋成買補在即後次截留之十萬石俱經收貯仁錢等九縣倉厫但各縣倉房昔年俱照額徵米數建造今屆開徵新糧之際難以並貯議在省城之廣豐倉舊址建造倉厫二百四十間收貯現在飭行興建委員督造外所需工費臣等率同司道府縣各官捐濟相應題明等因前來應移咨該撫俟倉厫造完之日題報可也奉旨依議康熙六十年十二月戶部為籲懇皇恩等事議覆浙江巡撫屠沂題稱浙省人稠地狹民間素少蓋藏每遇歲歉米價騰貴小民多致乏食我皇上軫恤民隱於康熙五十三年間兩次截留漕米二十萬石預備積貯是以五十五五十八兩年水旱災荒不待挽運即支動截漕米內賑米一十二萬二千五十五石零今秋被旱成災之仁錢等二十八縣二所已經題請蠲賑其續報之於潛等十一州縣三衛所乏食災黎亦俱引領望賑但二次截留米內止存米七萬七千九百四十四石零目下動賑之後將來未有積貯其常平倉陸續收捐存倉米穀查寧台溫處四府連穀折算米二十萬一千一百八十七石零俱係環山濱海撥運維艱久經題明留備本處之用至於杭嘉湖紹金衢嚴七府屬收捐米穀連穀折算及義田餘租共米四千四百餘石現在儘數撥賑毫無儲蓄宜早為籌畫庶幾有備無虞請於浙省本年應徵漕米內截留二十萬石以裕積儲杭州府存貯十五萬石金衢二府各分貯二萬石嚴州府分貯一萬石其賑過及現動之原留漕米仍於生俊捐納案內補項再照浙地卑濕米貯日久不無浥爛之虞請於夏秋青黃不接之時借放兵匠月糧俟冬徵南米照數撥還等因會同督臣滿保合詞具題前來應如所題將浙省六十一年起運六十年分杭嘉湖三府屬應徵漕糧內均派截留二十萬石分發各府加謹收貯毋致浥爛如遇應用之時題請動用再查截留漕糧原為預備積貯使臨事免轉移之勞若將前項所截漕米借放兵匠月糧恐不能按時還項如遇應用之時反致有誤應將該撫題請留漕米石於夏秋借放兵匠月糧之處毋庸議本月十一日奉旨依議康熙六十一年九月戶部為仰體聖衷等事議覆原任浙江巡撫屠沂疏稱浙省年來屢被災荒捐穀不敷賑濟已將五十三年截留漕米儘數動賑復動新漕湊用前項漕米應於收捐生俊案內米穀補還緣從前海塘開捐以致常平之例暫停今海塘之例已停常平事例復開是可捐補還項但常平之例數重人皆趨少避多報捐寥寥以致漕米不能速補惟有倣照河工捐貢捐監之例米石數目無論本省外省俱準於杭州府永濟倉捐納庶原項易於補足俟補清之日分别州縣於常平倉收捐備賑等因會題前來應如該撫所請照六十年題定河工之例先於杭州府永濟倉收捐補項照數補完之日分别州縣於常平倉收貯備賑將四十九年所題杭嘉湖三府各收十萬石其餘八府各收五萬石之數撥補滿足即行具題停止可也奉旨依議浙江通志卷七十七
