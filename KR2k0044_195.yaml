body:
  text: 浙江通志卷一百九十六方技上龍門以龜策名篇蔚宗為方術列傳蓋體極藝能可以𢎞補時事亦史乘所不遺也在昔五絶八技皆屬浙産殊才異術馳譽寰區繼此專門名家後先疊迹多能雖曰鄙事而小道亦必有可觀志方技杭州府晉徐熙南史張融傳熙濮陽太守好黃老隱秦望山有道士過求飲留一瓠􅕧與之曰君子孫宜以道術救世當得二千石熙開之乃扁鵲鏡經一卷因精心學之遂名振海內生子秋夫彌工其術仕至射陽令常夜有鬼呻聲甚悽愴秋夫問何須答言姓某家在東陽患腰痛死雖為鬼痛猶難忍請療之秋夫曰云何厝法鬼請為芻人按孔穴針之秋夫如言為灸四處又針肩井三處設祭埋之明日見一人謝恩忽然不見當世服其通靈秋夫生道度叔嚮皆能精其業道度生文伯叔嚮生嗣伯亦精其業謹按南史敘熙於文伯傳內為道度之祖道度係宋文帝時人則其祖必非宋時人明矣故列熙於晉而以秋夫附焉南北朝徐道度南史張融傳道度有腳疾不能行宋文帝令乘小輿入殿為諸皇子療疾無不驗位蘭陵太守宋文帝云天下有五絶而皆出錢塘謂杜道鞠彈棊范悅詩褚欣遠摸書褚引圍棋徐道度療疾也徐文伯南史張融傳字德秀有學行倜儻不屈意於公卿不以醫自業為效與嗣伯相埒宋孝武路太后病衆醫不識文伯診之曰此石博小腸耳乃為水劑消石湯病即愈除鄱陽王常侍遺以千金旬日恩意隆重宋明帝宮人患腰痛牽心每至輒氣欲絶衆醫以為肉癥文伯曰此髮癥以油投之即吐得物如髮稍引之長三尺頭已成蛇能動挂門上適盡一髮而已病都差子雄亦傳家業尤工診察位奉朝請徐嗣伯南史張融傳字叔紹位正員郎諸府佐為臨川王映所重時直閣將軍房伯玉服五石散十餘劑無益更患冷夏日常復衣嗣伯為診之曰卿伏熱應須以水發之非冬月不可至十一月氷雪大盛令二人夾捉伯玉解衣坐石取冷水從頭澆之盡二十斛伯玉口噤氣絶家人啼哭請止嗣伯遣人執杖防閣敢有諌者撾之又盡水百斛伯玉始能動而見背上彭彭有氣俄而起坐曰熱不可忍乞冷飲嗣伯以水與之一飲一升病都差自爾恆發熱冬月猶單褌衫體更肥壯徐子才舊浙江通志雄之子幼俊發有機辨解天文圖讖之學善醫有人患腳跟腫痛諸醫不識子才曰蛤精疾也由乘船入海埀腳水中所致為剖得蛤子二大如榆莢和士開以為兗州刺史五代羅塞翁圖畫見聞志錢塘令隱之子善畫羊世罕有其迹惟餘姚陸家曽收一卷精妙卓絶喻皓夢溪筆談營舍之法謂之木經皓所撰也錢氏據兩浙時於杭州梵天寺建一木塔方兩三級帥登之患其塔動匠師云未瓦上輕故如此乃以瓦布之動如初密使其妻見皓之妻賂以金叉問塔動之由皓笑曰此易耳但逐層布板訖便實釘之則不動矣匠師如其言塔遂定謹按沈括筆談不詳皓為何地人考十國春秋附皓吳越列傳後且其妻在杭似為杭人無疑也胡某十國春秋目醫胡某者世療內外障眼針法獨神武肅王末年患目疾召使治之醫曰目易治耳然大王非常人殆天所以為大王患者若療之是違天也恐損王壽王曰吾起身行伍跨有方靣富貴極矣但得兩眼見物為鬼不亦快乎既而應手豁然王喜賜物以萬計悉不受明年其言果驗宋程奕東坡志林近世筆工不經師匠妄生新意擇毫雖精形製詭異不與人手相謀獨錢塘程奕所製有三十年前意味使人作字不知有筆亦是一快豫不久行當致數百枚而去北方無此筆也孫景璠書畫譜杭州水軍篆千字文為五十餘體太平興國年以獻太宗善之詔取去黥文隸御書院宰相宋琪請授以官秩太宗曰爵祿非所惜也顧此人靣痕尚在豈稱冠帶乎琪固言之乃授國子書學博士張介中山詩話以命術遊公卿間居錢塘西湖上常自京師南歸士大夫率為詩贈之吳説杭州府志字傅朋錢塘人師禮子善楷書虞伯生稱其深穩端潤非近世怒張筋脈之態九里松字其所書也思陵嘗欲易之御書十數卒莫能及乃命以金飾之郭昭乾錢塘志鈔字汝端汾陽王裔孫祖遠授宋建隆二年節幹昭乾自祥符初由汴徙杭州多隱德施子未常倦有異人乞齋郭膳之潛遺牡丹花三朵覆几上而去追詢之曰若纍世隱德故來相報花上書婦人症十三方若子孫世世用之無窮如法試之無不竒驗遂為婦人醫郭氏之以醫名自昭乾始三傳至曽孫時義高祖建炎元年孟太后疾召醫時義以母馮氏應召依牡丹方治之脫然愈封安國夫人賜田賜葬賜藥碾如鐵舟然又賜第海昌賜國姓至今稱趙郭里謹按郭醫名顯自宋真宗至孝宗朝益著絶無授方壻郭之説舊志以為蕭氏誤矣郭世稱六八節幹乃意斷為明初人此又誤之誤也戴厚甫輟耕録錢塘人精遁甲其母寢處樓上一夕忽見紅光貫室開幃視之乃一美女立榻前自拔金叉遺母既而無所見母以語戴答曰適祭遁神遂致此耳遁神見某必不久矣逾數月而卒嵇清兩浙名賢録字仁伯世傳祕術善療金瘡骨損初父自汴扈蹕南渡時方戎馬蹂躪全活甚衆清年未冠早諳先業宮中有患折肱者他醫莫措清為整治完好如昔禁掖詫曰小小嵇清能接骨耶壽皇躬親騎射時有誤損應期而瘳中外益重之沈上牢遊宦紀聞胡伯量記度史君所藏坡仙涵星硯云硯外周以二髹匣蓋陰各有朱字紀歲月及工人姓名外者己亥洋州造大方志內者辛未杭州後洋沈上牢馬和之西湖遊覽志錢塘人紹興中登第官至工部侍郎善人物山水筆法飄逸纎悉粉藻自成一家高孝兩朝最重其畫嘗書毛詩三百篇命和之篇畫一圖會成巨帙至今杭人嘗有存其散逸者其後有顧興裔者專師和之但設色不逮耳耿聽聲兩浙名賢録亡其名錢塘人以聲音占故稱聽聲癸辛雜識家候潮門內兼能嗅衣物以知吉凶貴賤德壽聞其名取宮人扇百柄雜以上及中宮所御令小黃門持扣之耿嗅至后扇云此聖人也然有陰氣至上扇乃呼萬歲上奇之嚴防禦養疴漫筆孝宗常患痢衆醫不效德壽憂之過宮偶見小藥肆遣中使詢之曰汝能治痢否對曰專科遂宣至問得病之由語以食湖蟹多故診脈曰此冷痢也其法用新采藕節細研以熱酒調服如其法杵細酒調數服即愈德壽大喜就以杵藥金杵臼賜之至今呼為金杵臼嚴防禦家孫守榮宋史方技傳富陽人幼病瞽遇異人授風角鳥占之術其法以音律推五數播五行以知休咎復授以鐵笛守榮因號富春子吹笛市中人初不異也寶慶間遊吳興聞譙樓鼓角聲驚曰旦夕且有變士人當有典郡者越兩月潘丙作亂王元春以告變功典郡由是名大顯甌江逸志周怛未第時坐於觀橋市肆厲聲詬僕富春子聞其聲往揖之曰狀元何來周以紿已不答後果擢進士第一李信杭州府志汴人小兒醫也從宋高宗南渡遂家於杭之羲和坊高宗詔信入侍因年耄賜安車至禁中時號李車兒劉松年畫法年紀錢塘人畫髓元銓居清波門淳熙畫院學士紹熙年待詔師張敦禮工畫人物山水神氣精妙名過於師寧宗朝進耕織圖稱旨賜金帶院人中絶品也陳沂兩浙名賢録其先汴人唐乾寧時有仕良者以醫名於時奉敕修聖惠方仕至尚藥局奉御子孫遂世其業建炎中扈蹕而南遂為錢瑭人萬厯錢塘縣志沂嘗起康王妃危疾賜御前羅扇使出入禁中仕至翰林金紫良醫子孫標木扇象之至今稱陳木扇而陳諫者無精先業決男女生死多奇中所著有藎齋醫要林椿畫史會要錢瑭人工畫花鳥翎毛瓜果師趙昌傅色輕淡深得造化之妙淳熙年畫院待詔賜金帶韓慥癸辛雜識紹興末賣卜於臨安之三橋多奇中庚辰春曾侍郎仲躬呂太史伯恭至其肆則先一人在焉問其姓宗子也次第推命首言趙可至郡守却多貴子不達者亦卿郎次及曽則曰命甚佳有家世有文學有政事亦有官職只欠一事終身無科第次至呂問何幹至此呂曰赴試曰去年不合發解今安得省試曰赴詞科曰却是詞科人但不在今年今年詞科則有人矣後三年兩試皆得之且不失甲科復叩其何所至沉吟久之曰名滿天下可惜無福已而其言皆驗靳儫杭州府志其先三晉人高宗南渡儫扈蹕至武林世為太醫數傳至從謙為御直翰林醫官賜敕特晉三階出內府百子圖賜之命以所居巷為百子圖巷馬遠西湖遊覽志號欽山其先河中人世以畫名後居錢塘光寧朝待詔畫師李唐布景齊整工山水人物花鳥種種臻妙獨步畫院其樹多斜科偃蹇至今園丁結法猶稱馬遠云兄逵亦善畫子麟能世家學然不逮父遠愛其子多於已畫上題麟字蓋欲其章也其時有蘇顯祖葉肖巖亦師馬遠蘇筆法稍弱俗呼為沒興馬遠葉小景酷似而大幅不如也夏圭格古要論字禹玉錢塘人寧宗待詔賜金帶山水布置皴法與馬遠同但其意尚蒼古而簡淡喜用秃筆樹葉間夾筆樓閣不用尺界畫信手畫成突兀竒怪氣韻尤高王輝西湖遊覽志錢塘人理度朝畫院祇候工人物山水釋道與李嵩同家間用左手描寫人稱為左手王其時有白良玉何青年方椿年亦工釋道椿年又喜著色山水其後有鼎臣者亦師輝羅知悌戴良滄洲翁傳字子敬錢塘人世稱太無先生宋理宗朝寺人精於醫得金劉完素之真傳而旁通張從正李杲二家之説成化杭州府志子敬以醫侍穆陵甚見寵厚宋末隱居少與人接丹溪朱彥修慕其術候門下三載始得見知悌念其誠盡以其術授之知悌能詞章善揮翰貧病無告豫之藥無不愈者仍贍以調理之資邢氏萬厯杭州府志失名紹熙間以醫名於杭術業甚奇時韓托胄知閣門事將出使俾之診脈曰和平無可言所可憂者夫人耳知閣回軺日恐未必相見也韓妻本無疾怪其妄誕然私憂之洎出疆甫數月而其妻果報卒矣又朱勝非子婦偶小疾命視之邢曰小疾耳不藥亦愈然不宜孕孕必死其家以為狂言後一歲朱婦得男其家方有抱孫之喜未彌月而婦疾作急遣召之堅不肯來曰去歲已嘗言之勢無可療之理越宿婦果卒李立之兩浙名賢録臨安人以小兒醫擅名一時有嬰兒忽患瘖求治立之令以衾裹兒乘高投之地兒不覺大驚遂發聲能言問之曰此乳搐心也非藥石所能療李嵩西湖遊覽志錢塘人李從訓養子工人物山水道釋又長於界畫光寧理三朝待詔其徒有馬永忠豐興祖顧師顏皆傳其法嵩老倦作多令永忠代筆其孫李章者亦善畫朱懷瑾畫史會要錢塘人寶祐間畫院待詔工山水人物樹木窠石作雪景用墨全師夏圭夏巨源夷堅志精於卜筮居臨安每來卜者一卦率五百錢紹熙三年洪禹之自贛倅受代造朝其子價侍行既至點檢敕造文書遺其一遣僕還家訪尋終不能自釋乃自詣夏肆夏書紙上曰事在千里外繼書一食字一堯字合之則饒字也曰文書見在係一多口人收得而鴛鴦為看守無足憂也既而僕從饒州至持所遺返蓋向者打併行李時忘在外小妾福安見之收置鴛篋內既悟鴛鴦看守之語而福字有口田字又四口所謂多口人也樓觀畫髓元銓錢塘人工花鳥人物山水學馬遠筆法咸淳年畫院祗候元王繹輟耕録字思善自號癡絶生其先睦人居杭之新門篤志好學雅有才思年十二三已能丹青亦解寫真李五峯俾作一圓光小像面部僅大如錢而宛然無毫髮異後得吳中顧周道緒言益造精微是故於小像特妙非惟貌人之形似且得人之神氣宋會之嘉靖浙江通志杭州人元時名醫其治水蠱法以乾絲瓜一枚去皮剪碎入巴豆十四粒同炒以巴豆黃為度去巴豆用絲瓜炒陳倉米如絲瓜之多少米黃色去絲瓜研之為末和清水為九桐子大每服百九皆愈其言曰巴豆逐水者也絲瓜象人脈絡也去而不用藉其氣以引之也米投胃氣也鮮于樞所記如此李和山居新語錢塘人精於碑刻凡博古之家或有贋本求一印識雖邀之酒食惠以錢物終毅然却之其印文李和鑒定石刻印韓文清賞録錢塘人善補硯雖百碎者但不失原屑補之若無損者亦能修吉銅器居蒲橋夜宿一石匱中與人言無尊卑皆爾汝得錢即付酒家一舉而盡陸華之西湖遊覽志錢塘人以賣卜馳名且通文學縉紳多與之友沈復東貝瓊東齋志錢塘人幼穎悟好讀書既長受醫術於海昌慧力寺之忠上人取黃帝岐伯所論及張仲景劉守真李東垣諸家書窮日夜讀之遂造其閫奧忠亦無以過之於是無貴賤貧富凡有疾者輒造請焉起人於阽危者數矣然一以利天下為心其施甚博而取於人者甚廉王淵輟耕録字若水錢塘人善山水人物尤長於花竹翎毛幼時獲侍趙魏公故多得公指教珊瑚網若水之畫天機溢發肖古而不泥吉西湖遊覽志若水畫法兼綜古人無一筆院體山水師郭熙花鳥師黃荃人物師唐人而水墨花鳥竹石無絶品范思賢徐一夔東臯隱者傳姓范氏名某以字行其先在宋時有為防禦使用醫小兒名思賢去防禦五世傳其業益精居旁近人無貧與富有小兒疾輒趨思賢求醫其為醫務利人不務利於人名愈益顯所居錢塘城東其地平衍有竹木禽魚之樂因稱曰東臯隱者謹按萬厯杭州府志及聶心湯縣志皆言思賢姓吳名觀善其業傳自外家范氏但一夔去思賢較近謂為范姓應無可疑者故録之沈麟成化杭州府志字秋澗杭人西湖遊覽志麟畫山水師郭熙兼能寫貌樹梢鷹爪松葉攢針山多盤聳石作雲皴頗得郭家風度明陶華名山藏字尚文餘杭人治病有奇效一人患病因食羊肉澀水結臆不可下又不能吐華曰可食砒一錢人駭不用曰殺人者砒也華曰試之一服而吐人請所以華曰羊血能解砒毒羊肉得砒而吐而砒得羊肉則不能殺人是以可愈華於治傷寒尤精論者謂仲景以後一人兩湖麈談華深切脈理旁察病源隨症製方不拘古法每遇竒疾應手而痊一女子大冬昏悶不食欲狂咸莫測其症陶與之香薷飲一服而愈詢之此女因取三伏中所曝衣遂得疾蓋中暑也吳恕成化杭州府志字如心仁和人號蒙齋精於醫常謂張仲景傷寒論旨意幽深學者未易得其要乃約為律賦以發其玄纂指掌圖開示學者世之醫學宗之陳岊山武林紀事仁和人居竹竿巷以星命為業得異人授以天文之術言事厯厯有驗一日與鄰老遊郊外欲回陳強之弗得云爾去必遭官杖其人不信偶沖郡守節級果遭杖又常見郭顔色門首竪幡欲為醮事陳曰此日不宜作醮道士云文奏已定不可改矣竟於是日行之後果遭官事岊山足跛性傲雖富貴人亦慢薄之終無求於人以貧死祝海鶴琴箋𢎞治間錢塘有祝海鶴惠祥高騰等造琴擅名一時人多珍之張翺西湖遊覽志仁和人精推步占候宣德間潘中丞將往南粵視師翺感知已強與行一日坐帳中見片雲隱隱起離震間謂潘曰事濟矣有頃烈風南來此捷音也已而果然曾潘欲疏薦翺逃去易名晦迹以終其身嘗賦詩云有意欲嘗千日酒無心去傍五侯煙蓋其志也鄒觀嘉靖臨安縣志臨安人精於醫術常有鳯亭貧民患疔毒請療之即愈其人以牛為謝辭勿受越二年道經鳯亭夜遇虎人馬皆驚忽有牛自灌莽中逸出抵虎遂得免難後牧者至詢之即前所療人所却之牛也士夫聞而異之葛林名山藏字茂林錢塘人善小兒醫成化中充太醫院官武廟在褓一夕癎作夜分召林一匕而安明日賜白金綵幣使與上公之宴汪比部有子患痘汪故知醫謂無害也林視其足底有泡結瘢膚內曰吁百日哉百日果暴卒汪問故林曰夫痘搆形之餘穢也纎芒未盡亦無生理是疾初發自腎而我知其不能暢是以必死既而流於足底以故發之緩而至百日也少師楊公子當暑而驚眩氣絶且移木矣林趨入曰無傷也亟出之楊曰兒已噤奈何劑也林曰無劑所恃者天上雲耳雲生而淒淒欲雨陰氣舒而陽鬱消吾以清利物煮水而蒸於下其可診乎如法而愈及暮兒復戲於庭矣纍官太醫院判壽八十八所著有杏塢祕訣葉文齡嘉靖仁和縣志字德徵仁和人以醫受知何陳二侍御起送禮部屢試優等例授冠帶供職於聖濟殿除太醫院吏目召診保和有功升御醫忽賜召對被溫旨御書忠愛額於堂再召對升院判後因母老乞終養繼患風疾致仕所著有醫學統旨行世葉折手七修類稿杭天順間褚堂有葉姓者左臂病風善奕棋高者下者俱可與之對局而局終則必勝也四方能棋之士過杭尋與之奕終無一人能過者世稱葉折手吳綬兩浙名賢録錢塘人著傷寒蘊要全書發明五運六氣畫圖立説究極玄微以名醫徵至京師仕至太醫院院判比歸時湖墅有馮英者病傷寒一時諸醫議用承氣湯邀綬入視之曰將戰汗矣非下症也當俟之頃刻果戰汗而解錢益獻徵録字孟謙其先汴人後徙杭之錢塘世業顱囟常懸一金錢於門以故凡求治小兒者必曰金錢錢氏云益性警敏早事舉子業遭家中落乃復習醫而顱囟術益臻其妙成化乙巳被召入太醫院升御醫致仕歸錢塘常奉詔校正袖珍等方考據精當凡經其指授者率為良醫張崙萬厯杭州府志字景嵩仁和人五歲喪明十三受易凡卜筮星厯諸書入耳藴心能了大義每論人祿命夀夭窮達利鈍厯厯有奇驗遠近異之名山藏武宗南巡浙中備供帳甚亟布政使徐蕃命崙筮得同人之離蕃曰同人親也離應南靣駕其來矣崙曰不然卦體屬乾西北其位兹應返也主上至尊人安得同之爻曰先號咷而後笑兆之矣其在純乾之日乎悉如其言俞橋寧志備考海寧人少業儒究心理學兼精岐黃術嘉靖間以名醫被徵纍官太醫院判橋於方書無所不晰更博詢諸名家得河間潔古東垣未刻諸稿及古今諸家授受祕方斟酌損益之以治病無不奇驗居京師恥事權貴而貧家延之必盡心療治以故名愈盛而家日窘士大夫雅重之所著醫學大原一書搜輯樞素以下諸家有關病症藥脈者次以賦括令業醫之士診脈製方皆有所考證焉王賜爵餘杭縣志字丹宇先世為宋御醫傳至爵世以醫顯爵為人治疾惟望色聽聲或以病狀相語聞病之陽論得其陰聞病之陰論得其陽藥至病痊范叔明畫髓元詮號元白錢塘人善繪事以右肱病廢專事左筆畫多宗董北苑黃大癡墨法纎細更工花鳥蘭竹偶一濡毫便成名筆吳東升兩浙名賢録杭州前衛百戶善楷書杭城十門并各公署皆其題額淨慈寺壁書南屏二大字結構尤佳憲宗時負重名屬纊前一日有詩戒子薄葬時人賞其達諸餘齡萬厯錢塘縣志字雲泉善書奕通醫家言而多新得四方爭迎致之晚隱靈鷲山每語客曰我巾車馳城中起死人何得身為死人馳喪車出城乎當終於此與徐鏜輩諸名醫為天醫社陸疉山西湖遊覽志杭城假山稱江北陳家第一許銀家第二今皆廢矣獨洪靜夫家者最盛皆工人陸氏所疉也堆垜峯巒拗折澗壑絶有天巧號陸疉山張靖之嘗贈陸疉山詩云出屋泉聲入户山絶塵風致巧機關三峯景出虛無裏九仞功成指顧間靈鷲峯來羣玉垜峨眉截斷落星間方洲歲晚平沙路今日溪山送客還戴進圖繪寶鑑字文進號靜庵又稱玉泉山人錢塘人山水得諸家之妙神像人物走獸花果翎毛極其精緻喜作葡萄配以鈎勒竹蟹爪草奇甚真畫流第一也兩浙名賢録宣宗善畫一時待詔有謝廷循倪端石瑞李在皆海內名手及進入京衆工妬之一日仁智殿呈畫進以得意之筆首幅為秋江獨釣圖一紅衣人垂釣水次畫家惟傅紅色最難而進獨得古法入妙宣宗閲之廷循從旁奏曰此畫佳甚但恨野鄙耳紅品官服色也衣以釣魚殊失大體宣宗以為然遂揮去餘幅不復閲子泉字泉淵山水得家傳有氣韻武林紀事進之父夢畫師沈明遠入門是夕生進畫品絶世名冠天下盧復杭州府志字不遠習岐黃兼通大乘子之頤善療奇疾凡尸蹶回風投劑無不中臟結一症之頤自以為發前人所未及舊浙江通志之頤著有仲景論本草乘雅金匱要略論疏諸書行世張文貴筆箋杭人畫筆以文貴為首稱而文貴亦不妄傳人嚴元兩浙名賢録字宗仁餘杭人少業儒不售從父耔謁選京師屬有詔選醫士元就試禮部授太醫院吏目世宗命纂修袖珍諸方録成賜銀幣甚渥世宗幸承天命元扈從居常宣詔診視及兩宮疾治輒效輒拜金綺賜至徹御前酒饌以優寵之九載考績授御醫為人所忌竟中蜚語落職朱玩泉武林紀事居太平門外善課命正德六年有花市朱氏子得疾甚劇父聞玩泉名往問子病時三月半後也算其子難過八九月其父又以已命與之推托言親戚之命朱推云此人立夏日死矣時去立夏止十數日耳父未之信歸以告其妻妻曰此妄言也已而皆如其言俞恩兩浙名賢録字天錫錢塘人號江村居士善畫人物花鳥性質直疏野不喜治生描染移時輒復中止故其畫雖佳而所傳不多子舜臣字治甫喜觀長流疉巘號海峯子工山水人物著色翎毛花卉尤為精絶藍瑛舊浙江通志宇田叔錢塘人少穎異八歲嘗從人廳事蘸灰畫地作山川雲物林麓峯巒咫尺有萬里之勢及治經生家言指河圖洛書曰古人未有書先有圖圖何必不名家遂留意繪事皴染皆合古法其細描宮樣則界畫衣褶色色飛動突過宋畫苑諸人薑師周圖繪寶鑑字周臣錢塘人善畫山水學宋石門下筆老健陰晴濃淡煙雲縹眇又善牡丹鈎勒設色俱佳錢塘縣志周臣嘗遊京師時關仲通以畫名師事焉與同郡藍瑛各拈匹練數丈相戒止寫獨樹高柯勿用竹石映帶嘗寫梧桐落筆數葉得秋風晨露之致見者以為神品為人深沉知大體魏忠賢枋國時師周與大金吾邢某善魏以鎮撫授邢將受旨起煆錬獄師周醉拍邢肩曰君不畏天道乎而輕為若是邢乃謝不受魏私人崔某欲得師周屏障為稱觴以他友名代求師周怒擲之地後以子圖南貴贈侍御自號花酒頭陀何有富陽縣志坊郭里人少讀書知文義為人迂古質直因讀易留心數學見康節梅花數玩月餘忽有悟一日鴉鳴占之云夜主夫妻相爭見血已而更盡時僕夫與其妻鬬於室急往禁之已撲婦額流血因名曰老鴉數所占無不立應四明周茂桂館於周美家督學使者業行檄試寧波矣桂書去字令占之曰字雖云去而畫直下筆鈎搭勿去也桂不之信又書壬字曰督學去任矣三日內即有徵必丁艱也至三日果然叩其故曰士上一撇是撇却士子去也督學任甫一年不可云升政聲甚美未可云罷故知丁艱此斷以理也國朝潘楫仁和縣志字碩甫號鄧林少以孝弟聞樂道不仕賣藥都市中人以韓伯休目之受業數百輩治疾皆有奇效所著有醫燈續焰行世劉度錢塘縣志字叔憲錢塘人藍瑛弟子也深得瑛筆意後更變其法師大小李將軍界畫樓臺約縮人物細入毛髮而形像宛然然亦間及他家沒後遺墨雖寸縑片楮人皆奉以為寶姚應鳯杭州府志字繼元仁和人以瘍醫顯一叟患脹滿諸醫多云膈症應鳯曰此肺癰耳取一大盂水向病者頂上傾之病者陡驚亟舉刀直刺心瀉膿血數碗而愈人問之曰人心下垂水潑而驚驚則心系提吾刀可入也一人身患痛左臂似有係之者應鳯曰君食內中鼠毒左臂生鼠懸刀擬之有鼠墜地而逸官太醫院院判謝彬仁和縣志字文侯上虞東村人隨父遊學至杭遂家焉少年從莆田曾波臣遊授寫真法凝眸熟視得其意態所在濡毫點次眉目如生精彩殊勝彬身不滿五尺臞然而清目如點漆兼善畫山水及作漁家圖清超絶塵逈與時别人多珍之子廷璋能得其傳同時諸升善畫竹橫斜曲直無一不可人意而雪竹尤佳遂稱獨步王佑賢舊浙江通志字聖翼錢塘人糼孤力學尤精方書濟人利物所得輒周貧乏巡按牟雲龍薦辟不就懸壺自逸庭有古梅最愛之當事強移植官舍不活還而復榮人號返魂香樹後梅遭火焚而佑賢亦卒子遵遜輯有古梅軒燼餘集沈好問錢塘志鈔字裕生號啓明錢塘人世業小兒醫至好問益精尤善治痘症張文啓杭州府志字開之仁和人遊於張遂辰潘楫之門盡得其傳於古醫書無所不讀與同志設惠民藥局創育嬰堂天醫院又請於當道建靖浪亭渡江者得免風波之厄徐琅舊浙江通志字子山臨安人精於象緯六壬諸書居常戴麻布冠踽踽行市中夜則露坐山頂以占候躔次吳嗣昌舊浙江通志字懋先仁和人世業醫總督趙廷臣遘危疾嗣昌獨排衆論投以氷水立愈後瞽居河渚著傷寒正宗醫學慧業等書行世章谷杭州府志字言在十餘歲從孰師學師出有友訪之羣兒忘其姓氏師怒谷即以筆畫其顴額鬚眉栩栩然也師笑曰某也叩之果然及長善八分書其烘染尤工絶有至性母遘奇疾割股療之范騋池北偶談字文園善相人謂武進周清原吳江徐釚皆當不由科甲入翰林己未皆授檢討其言良驗范海寧人驤字文白之弟也閔自成舊浙江通志字思樓豐寧坊人性孝友幼失所恃父喪明出入扶掖舉步不離精內外科求治者日不暇給遇貧乏輒不受值且診視必先往曰倘後彼恐其慚慍必殆矣丐者盈門一一應之不厭遠近翕然稱長者任二琦杭州府志號瑞庵姓韓氏宋忠獻公後裔扈蹕而南家於杭先世受醫術於任遂從其姓數傳至二琦技益精凡醫嬰兒投劑即效遇貧者則袖金錢與之并貴藥不吝早失母事後母張惟謹子允謙懋謙皆世其業馬更生舊浙江通志字瑞雲錢塘人少學醫於婦翁周某學成而未敢試周好奕有貴人疾革延周方奕令更生往一劑而愈自是名即大起嘗過舊府見一人暴死曰此可活啓其齒灌以藥立蘇或望色聽聲於數年前預決人死期皆奇中嘉興府五代陸晃五代名畫補遺嘉禾人性疏逸好交尚氣每沉湎於酒亦善丹雘多畫村野人物凡酒興情逸遇筆揮灑出於臨時略不預構南唐李璟嘗聞晃名欲召之侍者謂晃好縱酒歌舞無臣子之禮璟由是疏遠之書畫譜晃善人物多畫道像星辰神仙等而又喜為數稱者如三仙四暢五老六逸七賢與山陰會仙五王避暑之類是也宋唐希雅宣和畫譜嘉興人妙於畫竹作翎毛亦工始學李後主金錯刀書有一筆三過之法雖若甚瘦而風神有餘晚年變而為畫故顫掣三過處書法存焉沈圭春渚紀聞嘉禾人初因販繒往來黃山有教之為墨者以意用膠一出便有聲稱後又出意取古松煤雜用脂漆滓燒之得煙極精黑名為漆煙每云韋仲將法止用五兩之膠至李氏渡江始用對膠而祕不傳為可恨一日與張處厚於居彥實家造墨而出灰池失早墨皆斷裂彥實以所用墨料精佳惜不忍棄遂蒸浸以出故膠再以新膠和之墨成其堅如玉石因悟對膠法每視煙料而煎膠膠成和煤無一滴多寡也故其墨銘云沈圭對膠十年如石一點如漆此最佳者也墨莊漫録近世墨工多名手自潘谷陳贍張谷名振一時之後又有嘉禾沈圭金華潘衡之徒製作精緻皆不愧舊人李甲萬厯嘉興府志字景元工畫作翎毛生動有奇趣東坡嘗題其畫曰郭恕先之後一人魯之茂峽州志號雪村海鹽人善畫梅竹寧宗朝仕為郎吳先生夷堅志居崇德市中善易筮日惟一課鶉衣篛笠扃一屋於邸逼鄰圎溷上穿下漏惟一竹簀為牀下積敗瓶故甓蟲鼠遄走戛戛然風雪陰雨則終日閉户得錢米衣肉共置一窟中時為人竊去不問也無錫戴士先母病攣不能行七八年矣百計求愈不得士先過崇德攜百錢訪之吳為揲卦卦成曰當得有道之士治之姑蘇杲道人不為勢利所誘君純孝往求必得如志然其人無定居當以百日為期日厯一巷尋覔庶可見士先喜持書抵蘇行求不倦僅五旬果逢杲道人投以書欣然至無錫為戴母診視數日即能移步母拔金叉謝之笑曰且寄夫人處他時要用當取之但館我於外足矣館之歲餘忽言曰我且死幸鬻所寄叉以辦棺窆明日果死戴氏奉其教及將窆中已空矣蓋異人也周堯敏嘉興府志字禹卿號學山畫竹宗文湖州能臻其妙王鼎畫髓元詮字德新海鹽人好寫竹學丁子卿深悟筆意子泰之號竹趣亦能父學元張成楊茂尊生八箋嘉興府西塘楊滙有張成楊茂剔紅最得名但硃薄而不堅者多輒耕録嘉興斜塘楊滙髹工鎗金鎗銀法凡器用什物先用黑漆為地以針刻畫或山水樹石或花竹翎毛或亭臺屋宇或人物故事一一完整然後用新羅漆若鎗金則調雌黃若鎗銀則調鉛粉日曬後角挑挑嵌所刻縫罅以金箔或銀箔依銀匠所用紙糊籠罩置金銀箔在內遂旋細切取鋪已施漆上新綿揩拭牢實但著漆者自然黏住其餘金銀都在綿上於尉斗中燒灰鍋內鎔鍛渾不走失東谷子徐一夔推命解嘉興有東谷子者居春波門用五星躔度遲留伏逆法推人生年月日時所值貴賤禍福毫分縷析無有不驗嚴子成萬厯嘉興府志字伯玉其父秋蟾自河南賣藥秀州遂家焉子成益精父術趙文敏遘疾已殆子成診治翼日乃瘳文敏繪孫思邈圖以遺之薛如鑑檇李詩繫嘉興永安鄉人挾相術遊江湖一時名士多與交往楊廉夫高季迪皆有詩贈之子月鑑孫鑑心白雲秋蟾皆能世其術彭君實格古要論嘉興人創金山水人物亭觀花木鳥獸種種臻妙盛懋嘉興府圖記字子昭魏塘人父洪甫善畫懋世其家學而尤過之善山水人物花鳥始學陳仲美精緻有餘特過於巧時以吳仲圭墨竹嶽彥高草書章文茂筆及懋山氷稱武塘四絶朱華玉輟耕録嘉興魏塘人浙西銀工精於藝者池北偶談宋荔裳觀察藏有元人所造銀槎最奇古腹有文曰至正壬寅吳門朱華玉甫製華玉號碧山萬厯嘉興府志碧山所製酒器極精妙如蝦杯蟹杯之類不施藥銲注酒自能流走至今人珍之朱彜尊鴛鴦湖棹歌注碧山元時銀工也所製銀槎鑿張騫於上以七寶嵌之明梅玉貝瓊贈星學梅生序居殳山精五行之術其告人吉凶禍福咸可徵焉實賢而隱於卜筮者吳𢎞道正德嘉善縣志精於醫術洪武初仕太醫院御醫每療人疾無不愈者愈則各令種竹一竿尋至巨萬人稱其地曰竹所韓履祥海鹽文獻志號採芝海鹽人讀書能詩工畫洪武間受知高皇擢太醫院御醫成祖尤加眷注公卿大夫莫不與交精於切脈雖無疾壯夫能隔歲斷其死期殆通神也四世孫本字克誠能承其業張德剛萬厯嘉興府志嘉興縣西塘人父成善髹漆剔紅器永樂中日本琉球購得之以獻於朝成祖聞而召之時已沒德剛能繼其父隨召至京靣試稱旨即授營繕所副賜宅復其家時有包亮亦與德剛爭巧宣德時亦召為營繕所副吳瓘書畫譜字瑩之嘉興人多藏法書名畫能作窠石墨梅學楊補之頗有逸趣珊瑚網瓘畫寒雀爪喙生動不下錢玉潭滕道軒沈懋孝贈滕醫士序歲辛卯夏豫女弟忽患寒熱一日沉瞑所迎醫或曰傷寒曰痰火或又曰氣中又曰瘧也汗瀉雜投病益進七日幾絶亟走郡中迎道軒至至之夕瞑然木強已三日矣衆以為必不復生道軒按脈察形曰此症乃風入太陽痰迷心竅病名曰痓靈樞論之詳矣其症尚當角弓反張其初必於産中受風邪入血脈數年始發先必曽微見顚眴之狀問其家乃知自産來月事閉痼者七年今歲三月忽自仆已而遽醒衆始信其言之確越宿反張之症見此時舌強齒噤藥不下咽則以牛黃硃砂等丸天麻南星菖陽等飲微從鼻孔進初亦拒不可入乃連日夕煮藥呷下之僅涓滴滲漉耳治三日目始瞬七日口始微開手足始蠕動旬日升始能微出聲知疴癢藥液可受於是內外姻交莫不驚喜走告謂道軒能起死一郡傳以為神董仲敬𢎞治嘉興府志善觀天文諳推步之法以術鳴任欽天監挈壺正賀嶽海鹽文獻志字汝瞻少業儒因母病求醫醫無良乃束儒書盡購醫書誦之遂師澉川韓克誠得脈法師武林胡翠巖得針法又西走吳得王維雍親炙王道等方東走越得曹靖之延之以歸日與講求始知醫無常師明理是師師無常術圓神為術若東垣之藥內傷仲景之藥外感河間之藥熱丹溪之藥痰會而通之得其要略於是擇古今醫藥之既效者附以己見曰明醫會要猶以為未備也又博討而類摘之如制劑則有藥性藥鑑視疾則有脈法治法釋以先賢之總論徵以成效之醫案凡男女嬰兒內外針灸纎悉畢備曰醫經大旨二書人爭傳誦之用輒得效陳以誠兩浙名賢録嘉興人善詩畫尤精於醫永樂間應薦隸太醫院纍從中使鄭和往西洋諸國擢院判歸嚴樂善舊浙江通志嘉興人業醫有名永樂癸巳理藥星湖市南有一男子造其室出金飾一器跪而進之因附耳語未竟樂善擲金大詬且脅之曰我今不發汝隱汝若更求他醫殺汝同氣我必訟汝於官踰年男子感悟來謝是夜燈花光彩倍常發蓮花一朵有人形類菩薩坐蓮花中長二寸許鄰里競觀達旦始滅吳太史為燈花記樂善能運氣凝神及子午按摩法年七十五卒殮後五日鄰人有遇於西湖者胡日章海鹽縣圖經澉所人少學祿命術遇異人海上授之訣因益精每作絶句詩判人一生事無不驗與人言必依於孝友忠信有後母者尤諄切戒勉之蓋有道而隱於術者年九十餘卒其判虞氏女命云只愁水涸春歸早香冷簾櫳淡月黃後適董湄兩月而湄死以節終判沈氏命云年年空佩宜男草不見金盆浴鳯雛竟無子杭州一人問命判云自是豪華多樂事元宵燈下蹴鞦韆果於明年元夕止妻觀燈不從相毆縊死嘉興一人生二子戲水邊同日溺死其妻痛切亦自縊夫檢所批命帖有一雙紫燕入池塘紅粉佳人繞畫梁之句如是者甚多唐宗祚海鹽縣圖經左所人善傳神景泰間與日者胡日章隨都指揮脫綱征金華賊綱戰沒總帥孫問日章曽算脫公命否曰命書在公篋中又以傳神屬宗祚曰已為脫公寫之矣孫取篋視命書尅期一無所爽懸寫像於堂儼然如生孫泣而祭之二人名因以大振陸道光天啓平湖縣志字明暘父金精岐黃術濟人立效道光精幼科一兒食果多病脹氣急衆醫罔效道光獨取桂麝瑞香三味為丸一服即愈衆醫問之曰獨不聞果得麝則落木得桂則枯瑞香為百花妬乎一兒染奇疾四肢堅不可屈道光曰此非藥石能療另有術焉舉傘覆之點安息香繞牀四圍皆設爐焚沉檀衆咸以為笑兒即平復香少間疾又發隨屑沉香服之而瘳弟道充字賓暘晚亦精醫有陸氏金鏡録行世陳景初海鹽縣圖經善繪事與錢塘戴文進同時筆法亦類之蒼老可愛孫鳯尤善李伯時白描許敬嘉興縣志字孟寅感化鄉人曽祖廷芝祖文達父景芳皆以醫名江南治口齒者許為之最敬能世其業有聲宣德間院使蔣主善薦入內院英宗患喉風更數醫勿效勢增劇召敬進綘雪噙之遂愈拜太醫院御醫賜敕奬諭吳愛蕉紫桃軒雜綴嘉善布衣𢎞正間人畫法吳仲圭筆意朱端萬厯嘉興府志字克正海鹽衛後所人寫山水可方輞川海鹽縣圖經端於正德間以善畫直仁智殿授指揮俸賜一樵圖書遂號一樵畫宗馬遠山石水口效呂紀時有曽和者乍浦所人亦以善畫直仁智殿筆法甚高談時雍續見聞雜記嘉興人號繼巖世嬰兒醫術冠一時晨興遠近抱嬰兒至者不下三五十人視畢無不與藥酬以藥金大約十受二三焉姚能海鹽縣圖經字懋良號靜山善談論好吟詩精於醫理著傷寒家祕心法小兒正蒙藥性辨疑諸書胡奫正德嘉善縣志初名浚字元海陶莊人徙居魏塘賣卜於市言多奇中遊金陵寓神樂觀提點姚一山偶失金杯酷責其徒胡占得剝之頤曰金在土中未亡也汝第從居西南隅掘下五寸則得矣如其言果得杯永樂八年一山薦之於上至京卜無不驗賜今名授欽天監漏刻博士上新作殿命之卜布算訖跪曰某月某日午時當燬上怒囚之以待至期倩獄卒占視返報曰午過矣無火胡服毒午時正二刻殿果焚上急召胡死矣甚惜之賜馳驛歸葬子四人旻昊昱昂皆棄占筮而學畫曽孫昺遂以畫名宋旭檇李詩繫字初暘家石門號石門山人隆萬間布衣以丹青擅名於時層巒疉嶂邃壑幽林獨造神逸海內競購之年七十有八苕上諸名流招致繪白雀寺壁一時妙絶圖繪寶鑑續纂旭山頭樹木古拙巨幅大障頗有氣勢范摹畫法年紀字行式嘉興人工山水人物畫史會要摹涉獵經史善歌詩多藝能凡金石欵識篆刻書畫之類皆能著其時代辨其真􅎓畫山水人物筆力瀟灑意趣幽遠殳圭兩浙名賢録字廷肅魏塘人精於醫治疾有奇驗一婦妊及八月臥不語衆醫斂手圭曰此內經所謂胎瘖也十月當不藥自愈又有男子請診圭曰此疾不致死然脈無生理過三日當投劑期內忽溺死希遁舊浙江通志嘉興僧深於養生之術有所療治擇用日辰不必藥餌嘗遇海州司馬韋敷見敷鑷白鬚曰貧道為公擇日更之越五六日請鑷其半及生色若黧凡三鑷之鬢不復變意其術出於遁甲故自稱希遁云郁光始嘉善縣志字涵春嘉善人善醫不計利治病必先貧而後富先賤而後貴病家困苦者冬施絮衣夏施蚊帳小兒險症賴以全活者甚衆子國瑛能傳其業朱俸萬厯嘉興府志字廉夫嘉興人工字學考訂偏旁訛謬得六書旨精篆籀古文及漢唐隸法每倣管夫人書七十二篆金剛經人珍重之陸朝海鹽縣圖經鹽之世醫也其先有名麒者景泰間衛軍征沙冦以醫術療從行將士有功授醫官子孫遂世其業朝尤深於內經本草切脈洞見病源決死生不爽然朝治病不欲遲於見功每至女子及癆瘵不即起者輒推引嚴漢漢用藥以和緩取效名亞於朝至今稱美良醫者必曰陸紹泉嚴陵坡蓋兩人别號也王立本𢎞治嘉興府志魏塘鎮人工畫山水人物師盛懋臨摹逼真子繼宗能世其業朱儒嘉禾徵獻録字宗魯號東山其先吳江人以贅於秀水陳氏家焉年未弱冠貧不自存有浮屠楊時升者教以醫術頗精其業後遊京師朱恭時為太醫院判引為族屬復精究其業久之授太醫院醫士遷吏目供事聖濟殿適大疫多所全活人有貧病者或以白金投劑中戒其家人曰必令自發病者得金喜因遂愈隱德甚多尋遷太醫院判一年遷院使神廟有疾召診奏言肝氣未平胃脈微滯是以痰壅眩暈宜寬平以養氣安靜以益精上是之疾愈賜宴醫院舊浙江通志以子國祚貴贈太子太保大學士趙麟素舊嘉興府志海鹽人工畫正德間直仁智殿甚見重於時帶錦衣衛副千戶俸魯得之書畫譜字孔孫李太僕日華入室弟子工寫竹兼工歐顔書法沈雪坡林伯英嘉興府圖記皆魏塘人雪坡善寫梅竹伯英工畫花鳥俱師樓觀張紀海鹽縣圖經字文正工畫士女衣褶倭鬌與唐伯虎相上下而靣龎肉色淺染三停用積粉法三停謂額鼻頦此古法也今畫家不知矣石涵玉秀水縣志字啓秦行術鹽官治痘症奇效西郊沈氏子方見痘延視辭曰此終不能有功他醫療之過其門聞張樂則以痘愈酬醫也固邀入席呼子出揖以愧之涵玉曰明年今日不免於痢衆不悅已而果然一女患痘白色紅靣如灑脂涵玉曰內潰不治症也取紙炮一令其父燃耳畔如雷大驚靣部痘盡起數劑痘患少愈衆奇之問焉曰內潰通心竅為主驚則心竅開痘不內伏何足異子楷尤精先業徐𢎞澤舊浙江通志字春門春波里人所居當闤闠與老衲逸民相往來為詩類元白畫出入子久仲主間書法從吳興入門而尤愛張伯雨時稱三絶晚登峨嵋絶頂得山水之助歸而益工自號竹浪老人陳璣海鹽縣圖經字天器初受業陳景初後遊錢塘故家多戴進名迹由此入悟所繪山石雲樹各成一家其寫照則面部鈎染坐法衣紋皆後來所不及後有湯子英者傳其術往來苕中亦有名張漣嘉興縣志字南垣少學畫得山水趣因以其意築圃壘石有黃大癡梅道人筆意一時名稱藉甚董其昌陳繼儒亟稱之若李工部之橫雲虞觀察之預園王奉常之樂郊錢宗伯之拂水園吳吏部之竹亭徐司馬之漢槎樓皆其所作高騰舊浙江通志字九霄西塘人少識音律因父剛善琴通其譜後遊江湖愈知妙旨斫琴練絃郡邑皆禮遇焉沈子徹桐鄉縣志居青鎮善磁壺文具與宜興時大彬同名至今士夫家有藏其手製者價值甚貴國朝毛鳯翔嘉興縣志字貞所善按脈識病源立起危症尤精於傷寒年二十即知名年九十九卒八十年中活人無算徐真木嘉興府志字士白書法宗鍾王工篆籕每書一幅人爭購之曾鯨桐鄉縣志字波臣其先閩人後居青鎮善丹青寫照妙入化工張鳴岐池北偶談嘉興人善製銅為爐知名海內黃元吉嘉興縣志錫工也所造茶具種種精巧其色與銀無辨海內咸珍異之湖州府三國吳曹不興西吳里語烏程人尚書故實謝赫云江左畫人曹不興運五十尺絹畫一像心敏手疾須臾立成頭面手足胸臆肩背無失尺度此其難也惟不興能之厯代名畫記孫權使畫屏風誤落筆點素因就成蠅狀權疑其真以手彈之時稱吳有八絶張勃吳録云八絶者菰城鄭嫗善相劉敦善星象吳範善候風氣趙達善算嚴武善棋宋壽善占夢皇象善書曹不興善畫是八絶也廣博物志不興常於溪中見赤龍夭矯波間因寫以獻孫皓皓賞激珍藏之南宋文帝時纍月旱暵取不興所畫龍置水傍應時得雨晉戴洋晉書藝術傳字國流吳興長城人年十二病死五日而蘇説死時天使其為酒藏吏授符籙既而遣歸逢一老父謂之曰汝後當得道為貴人所識及長遂善風角好道術妙解占候卜數揚州刺史嘗問吉凶於洋答曰熒惑入南斗八月有暴水九月當有客軍西南來如期果大水而石氷作亂氷既據揚州洋謂人曰視賊雲氣四月當破果如其言王導病召洋問之洋曰君侯本命在申金為土使之主而於申上石頭立冶火光照天此為金火相鑠水火相煎以故受害耳導即移居東府病遂差司馬揚為烏程令將赴職洋曰君宜深愼下吏揚後果坐吏免官洋又謂曰卿雖免官十一月當作郡加將軍至期為太山太守鎮武將軍揚賣宅將行洋止之曰君不得至當還不可無宅揚果為徐龕所逼不得之郡年八十餘卒所占驗者不可勝紀姚信舊浙江通志武康人精天文易數之學仕至太常卿造昕天文南北朝姚僧垣北史藝術傳字法衛吳興武康人父菩提梁高平令嬰疾彌年乃留心醫藥僧垣年二十四即傳家業仕梁為太醫正元帝平侯景召僧垣赴荆州帝有心胸病諸醫皆請用平藥僧垣曰脈洪實宜用大黃進湯訖果下宿食因愈魏軍克荆州僧垣隨至長安金州刺史伊婁穆以疾還京請僧垣省疾乃云自腰至臍似有三縛兩腳緩縱不復自持僧垣即為處湯三劑穆服之悉除樂平公竇集暴感風疾精神瞀亂無所覺知醫先視者皆云已不可救僧垣後至曰困矣終當不死為合湯散所患即瘳隋開皇三年卒年八十五僧垣醫術高妙前後效驗不可勝紀聲譽既盛遠聞邊服至於諸蕃外域咸請託之乃參校徵效者為集驗方十二卷行世唐朱審厯代名畫記吳興人工畫山水深沉瓌壯險黑磊落湍瀨激人平遠極目唐朝名畫録審得山水之妙自江湖至京師壁障卷軸家藏戶珍又唐安寺講堂西壁最其得意其峻極之狀重深之妙潭色若澄石文似裂嶽聳筆下雲起楮端咫尺之地溪谷幽邃松篁交加雲雨暗淡雖出前賢之胸臆實為後代之楷模也宋牧羊子癸辛雜識湖州卜者識章文莊於未遇時及仕再筮皆不許其得祿果連丁艱既而曰今可仕矣且不在外遂由掌故以致兩地又常語醫者李重父曰君當飯於省中鄉人傳以為笑後文莊貴常招之診脈留與共飯於省閣因舉舊語一笑景歲吳越備史吳興人能言休咎以紙大書台字以貽裴充庭不旬日果貶台州刺史王克明葉適王克明墓志字彥昭家烏鎮生乏乳以粥餌活遂得脾胃疾長益甚醫以為不可治克明因自讀難經素問用意處藥夙病盡瘳始以其術行遊江淮常數千百里赴人之急卿大夫皆自屈與遊其針灸尤精有難知者必沉思得其要然後與藥則無不驗矣魏安行妻風痿十年不起牀克明施針而步履復初廬守王安道中風噤不語旬日他醫莫知所為克明曰此非湯劑之所及也令熾炭燒地灑藥輿安道其上藥氣薰蒸須臾而蘇纍官翰林醫痊賜金紫楊振墨史字聲伯長興人蓄古墨最富多精品故所製不下趙彥先馮生清容居士集咸淳間湖州筆工馮生製筆得截法圓不至軟媚徑不至峭直一筆可作萬字錢選格古要論字舜舉號玉潭霅川人理宗景定間鄉貢進士善畫人物山水花竹翎毛師趙昌青緑山水師趙千里尤善折枝其得意者自賦詩題其上許白雲集選嗜酒酒不醉不能畫然絶醉不可畫矣惟將醉時心手調和是其畫趣畫成亦不暇計較往往為好事者持去今人有圖記精明又旁附謬詩猥札者蓋􅎓本非親作也石塘文稿舜舉畫高者至與古人無辨常借人白鷹圖夜臨摹裝潢翌日以臨本歸之主人弗覺也湖之人經舜舉指授類皆以能畫稱珊瑚網舜舉多寫人物花鳥故所圖山水當世罕傳容臺集舜舉山水師趙令穰人物師李伯時皆稱具體俞澄竹𣲖字子清吳興人作竹石得文蘇二公筆意清潤可愛元唐棣玉山草堂雅集字子華吳興人由茂才為吳江令精繪事嘗畫嘉熙殿壁為上所知六研齋筆記子華學畫於趙松雪得其筆潤森鬱之趣張文樞兩浙名賢録字石隱德清人畫山水師巨然筆墨簡遠咫尺有千里之趣時烏程胡欽亮徐士元歸安孟玉澗莫廷暘俱以畫名一時馮應科西吳枝乘吳興人毛穎之技甲天下至與子昂舜舉並名明陸繼翁王古用䅂古要論筆最得名皆湖州人沈淵鑑𢎞治湖州府志烏程人少失明遇異人授範圍數推卜有奇驗施文用戒庵漫筆吳興筆工𢎞治時造筆進御有細刻小標記云筆匠施阿牛孝宗見而鄙其名內傳以小名對敕易名曰施文用小賀張鳯翼小賀傳名恩字子霑姓陸氏其父烏鎮酒家也燕良工賀四者偶之烏鎮客酒家左巨室王氏因多購檀梨烏木象齒犀角諸材留賀四作巵盂罌缶諸器恩時時過王氏觀賀四作歸以小材效作示賀四賀四奇之欲乞為弟子而父母勿許居無何崇德葉氏馳一力邀賀四賀四意非酒家兒俱往不可乃以情懇陸翁媼必欲得兒俱往且許罄其藝授之恩亦欣然請行乃遣之俱至葉氏凡工作者觚者圜而觚觚而圜者非恩莫與成而恩得心應手出入規矩中巧每越賀四上蓋青出於藍矣賀四死恩喪之如所生賀媼顧自有子恩亦時時護其緩急又時時以所得金饋陸翁媼蓋一身而仰事者兩家焉殆孝義人也關思書畫譜字何思號虛白烏程人善畫骨法筆韻入二李三王之微萬厯間與宋旭齊名畫髓元詮虛白遠摹荆浩關同董北苑梅道人王叔明近倣沈石田等筆法頗能亂真復探吐故納新之祕篆刻詩字舉臻妙境圖繪寶鑑關思一名九思字仲通凌漢章碧里雜存湖州人成化間針術神靈擅名吳浙兩浙名賢録漢章為人慷慨負義氣見人之病如痛在身有迎者雖昏夜風雨無不疾赴砭石所投諸患脫然每晨啓門輿疾求治者日數十百人貧者未嘗受直故身死之日家無餘資至今以針灸行者皆稱漢章弟子然術多不逮矣周濟萬厯湖州府志歸安人精於醫業療病無不奇中治傷寒尤驗雅好文墨馳譽浙中臧湘友池北偶談長興人少逢異人授以一卷書中有劍術臧得其傳海鹽陸辛齋云嘗見其劍合乃以雷擊木雕成有鐵丸二即雌雄劍也國朝張道岸今世説字懸渡湖州人性嗜酒少進輒醉醉即喜畫蘭勃勃有生氣陸子黃嘗得所畫懸之素壁忽發香滿室中因額其處曰蘭堂寧波府唐陳藏器本草綱目序例四明人以神農本經雖有陶蘇補集之説然遺沉尚多故别為序例一卷拾遺六卷解紛三卷總曰本草拾遺其所著述博極羣書精核物類訂繩謬誤搜羅幽隱自本草以來一人而已膚謭之士不察其該詳惟誚其僻怪宋人亦多刪削豈知天地品物無窮古今隱顯亦異用舍有時名稱或變豈可以一隅之見而遽譏多聞哉如辟虺雷海馬胡豆之類皆隱於昔而用於今仰天皮燈花敗扇之類皆萬家所用若非此書收載何從稽考宋日華子本草綱目序例日華諸家本草宋開寶中明州人撰不著姓氏但云日華子大明序集諸家本草近世所用藥各以寒溫性味華實蟲獸為類其言功用甚悉凡二十卷臧中立尚友録毗陵人元豐間客鄞南湖抱病求療者日數十人中立診治如神崇寧中徽宗后病甚詔求良醫中立應詔以布衣麻履見上命之入診出而問曰卿診得何症對曰臣所診脾脈極虛殆嘔泄之疾作楚和藥以進且曰服此得睡為效至夜半果思粥食不一月獲安賜歸詔出官帑市地築室南湖以居名迎鳯坊陸曮船窗夜話奉化人以醫術聞於時新昌徐氏為婦病産不遠二百里輿致之及門婦已死但胸間猶微熱陸入視之良久曰此血悶也購紅花數十斤為大鍋以煮之候湯沸遂以三木桶盛湯於中取窗格藉婦人寢其上湯氣微又復進之有頃婦人指動半日遂蘇蓋以紅花能活血故也元俞竹心輟耕録術士俞竹心居慶元嗜酒落魄與人寡合順其意者即與推算醉筆如飛道已往之事極驗時皆以為異人呂復戴良滄洲翁傳字元膺晚號滄洲翁其先自河東徙婺復自婺徙鄞遂家焉幼孤以母病攻岐扁術遇三衢鄭禮之謹事之鄭有古先禁方及色脈藥論諸書具以授之復日記診籍於方藥驗否悉為參訂又若干年為人治病效無不神有廟祝楊天成女在室病五閲月腹如有妊延復治之復曰病非有異夢為鬼靈所憑耳女不答趨入臥內密語其侍嫗曰我去夏追涼廟廡下薄暮遇黃衣神心動是夕夢一男子即我寢由是感疾醫言誠是也嫗以告復曰女靣色乍赤乍白者鬼也脈乍大乍小者祟也病與色脈符雖劇無苦乃以桃仁煎下血類豬肝者六七枚俱有竅如魚目病即已復之治病雖若不甚搆思然其鈎取古法動中肯綮多類此所注有內經或問靈樞經脈箋切脈樞要運氣圖説養生雜言各若干卷董筆潭成化四明郡志奉化人少牧牛夜常夢筆浮潭上達旦往視之果得筆遂以筆潭名一日見雙鷹止於巖石取筆狀之逼真由是寫鷹隼及驚濤古木皆絶倫至若鄞江方屼山之花果海錯王立本之花卉郭宗茂之水墨花鳥郭小山之水墨人馬皆稱絶品明吳國才嘉靖寧波府志奉化白巖人悉心唐舉之術言屢巧中遠遊歸訪縣中故舊某不值其孫開肆乃索紙筆為書緘别而去某歸孫曰頃有吳叟留書啓視之曰此吳國才先生也風鑒入神書中云相汝色汝婦當有粉骨碎身之災其愼之及期俾歸宴坐新室竟日不出抵暮食既至厨啓檻取水虎爪之入山以食門人袁廷玉嘗侍太宗一日問其受業之自以國才對召至試之果驗將寵賜以官國才以福薄辭亡何果卒袁廷玉戴良袁廷玉傳名珙以字行其先南昌人後家於鄞常遊普陀洛伽山有僧善相見而奇之謂其眼光如電法當以術顯因令仰視赤日待兩目盡眩濳布黑赤豆於暗處俾辨之又夜懸五彩絨線窗紙外使映月光别其色所試已皆中然後悉以相家之術授焉在鄞南臺大夫普化帖木兒由閩海道鄞見廷玉廷玉曰公神氣嚴肅舉動風生大貴驗也但印堂司空有赤氣到官一百四十日當奪印然守正秉忠名垂後世願自勉普署台事於越果為張太尉逼取印綬抗節而死見江西憲副程徐曰君帝座上黃紫氣見千日內有二美除但冷笑無情非忠節相也徐於二年後拜兵部侍郎擢尚書後歸欵為吏部侍郎其術之精類如此廷玉常言吾每占人吉凶即知其心之善惡心善必吉其不善者反是以故因廷玉之言格心改行者至衆鴻猷録姚廣孝至燕邸薦鄞人袁珙相術文皇帝使召之至令使者與飲於酒肆帝服衛士服偕衛士九人入肆珙趨拜帝前曰殿下何自輕如此帝陽不省曰我輩皆護衛校士也珙不對乃召入詳叩之珙稽首曰殿下異日太平天子也後果登大位列朝詩集傳長陵登極召拜為太常寺丞廷玉於九流百氏靡不涉究好歌詩人稱為栁莊先生袁忠徹涇林續記字靜思栁莊子能世其業相人富貴貧賤壽夭若燭照然與薛沖庵友善常主其家見童子方垂髫持壺斟酒謂薛曰此童目下有大災三日內當就木矣可急遣歸薛素神其術即令起行童子回至半塗登厠拾白金五十兩久之一人疾奔而來入厠審視無有號泣仆地童前詰其故知宋千戶家奴所失也因問銀若干奴對相符出諸袖中還之奴喜邀與俱歸宋千戶曰拾銀不取誠哉好人即繼以為嗣荏苒三年宋死而童襲職童念薛舊恩冠服登門謁謝薛見之大訝問得顚末頗疑袁相術之疏招袁至留酌仍令童變服執壺以侍指示袁曰此即昔年童子也子謂遄死而今幸存何耶袁熟視曰此非爾奴乃五品一武辨也吾向見其靣有死兆故云然今形容改易豈有陰德轉移其間乎薛笑述其事益服袁相術之神名山藏寧波衛人盛琦少役劉指揮家忠徹過劉盛執扇旁立忠徹謂劉曰善視之進士知縣也琦後登進士仕無錫知縣分省人物考建文初文皇召問忠徹對曰天命有之無憂也獻人象大成書靖難後官尚寶少卿卒年八十三楊尹銘書畫譜鄞人永樂間以楷法進厯官中書舍人小篆師周伯琦樓得達兩浙名賢録鄞人博文藝於奕則稱國手永樂初驛召至京偕江陰相子先入覲子先自謂天下無敵視得達蔑如也上命二人對奕顧中貴官密取紙畫冠帶置局下得達屢勝遂啓局視之命吏部給冠帶焉朱自方畫法年紀號夢庵奉化人成化四明郡志自方性尚沖淡喜寫水墨山水晚年出入郭熙范寬而自成一家同里卓民逸常師之而筆法精緻實有過焉婁穆中亦常師范寬而點染又在自方之下在鄞則有胡仲厚吳景行之青緑山水師董源而雲氣悠揚可愛然亦自祕惜人罕得者如史均民之水仙傅子英之橅寫人物各有生意之數人者雖出處不同皆一時之傑出倪光鄞縣志字應奎少受易時時沈玩先天忽朗然內覺若有神授自知不良於功名遂悉棄去觀消息盈虛輒能前知遨遊兩京名動諸公卿皆爭致説易一日在楊公文懿所忽中貴使至光見一雀自庭樹集於地已復還集樹即謂其使曰汝來得非失馬乎六日當復使大驚文懿問故光曰雀踴躍物也去樹而集於地舍所依也已還集樹復歸其所也其集樹也自北而南水數六也故曰馬失而六日復因復問馬色光曰以北水尅南火當黃而近於黑皆悉驗人咸以小康節呼之後閣老萬安欲薦官之光遽辭歸旅宿臨清中夜聞扣戶聲棘而辭哀光厲聲曰汝作歹將丐生耶其人吐實光謾曰南北東西皆汝路也旦起市已獲盜有産子者至而傘裂其人失色光曰傘裂而小人見汝細君已育子可喜矣年八十生而舉殯擬淵明自祭杜牧志墓事為詩自挽其達生委命如此人皆稱為味易先生所著有味易詩集凡十二卷高陽畫史會要字秋甫四明人善花鳥畫石極精如太湖錦川英石蠟石皆妙形似胡宏異林字任之寧波人少讀易遇一道人語曰我有祕術子可受之但不營仕乃可免禍耳宏謹受教遂以卜筮授之發無不中兩浙名賢録嘗有士人應試書串字宏云君不惟中舉兼中進士串字者二中也别一士聞其語亦書串字以問宏云君且勿言科名當憂疾病其後二人一連捷一得重疾幾不起或曰所問者字同而吉凶何以相反宏曰問者出於偶爾從而效之則有心矣串下加心故應得患也常著筮書曰黃金尺張德輝萬厯慈溪縣志字秋蟾號雲巢老人世居邑之薑嶴成化四明郡志少學寫龍自得其趣晚年烘染有法而飛雲驚電變化萬狀或纍日不下一筆或一日連寫數幅自有神妙徐詵成化四明郡志字和仲其先錢塘人曽祖字號雪汀父夢吉號曉山皆業儒善琴後父宦遊四明遂家焉詵性謹厚居家篤學以春秋經教授鄉里出其講下者多繩繩有師法為文章不俚不浮亦以琴著名於時洪武間太宗在潛邸遣使召至錫賚殊厚既歸舉明經為邑庠訓導詵世以琴名而詵尤工得心應手趣自天成同里若王禮金應隆吳以介親受業其門遠近從學者亦衆後子孫皆能踵其家學而浙操至今稱徐門云范瑱鄞縣志字行甫號墨逸工松兼翎毛草蟲春草蘭竹菖蒲清逸可愛嘗畫春草冬日展觀於庭蜂蝶並集趙備鄞縣志號湘南善寫竹縱橫雄逸迥出一時馬指揮斯臧領漕運北上乞備寫萬竿煙雨圖以奉要路得者大喜遂擢斯臧督運其為世所珍愛如此兼工諸種花卉題詩亦饒風致王育聞見類纂字用賢鄞人寫梅法王元章號香雪坡每寫梅一幅咏詩一篇遊錢塘無識者於城隍廟肆筆焉題詩云行盡錢塘數十家無人為我煮新茶一襟清思難消遣吐出胸中萬樹花呂紀兩浙名賢録字廷振鄞人精於藻繪時綴小詩其上初學邊景昭花鳥袁忠徹見之謂出景昭上館於家使臨唐宋以來名畫遂入妙品獨步當代嘗戲畫雌雞壁間而生雄谷谷繞其側勿去殆古點睛之流孝廟時召至京師官錦衣衛指揮同知其在畫院凡應詔承制多立意進規孝廟稱之曰工執藝事以諫呂紀有焉鄞縣志紀從子高字崇嶽號松石翁棠字德芳號竹村翎毛花石皆得家學從學於紀者蕭增字益之隨紀赴京得其用墨之妙佳者與師無辨官錦衣千戶劉俊字克美陸鎰字守重號古愚筆墨俱能入室王諤兩浙名賢録字廷直奉化人工畫嘗師里人蕭鳯盡其術乃肆力於唐宋以來諸名家凡奇山怪石古木驚湍之類盡摹其妙孝宗朝大承寵幸時上好馬遠畫亟稱曰王諤今之馬遠也同邑盧鎮常師諤亦稱絶藝幕講僧舊浙江通志不知何許人初來鄞善堪輿術無不奇驗邑中大家宦族先世墳墓多出其手久而益神所著書絶無刻本後人多托僧祕傳不知其術已不傳矣趙九成嘉靖寧波府志鄞人為郡學諸生以棋遊京師盡一時棋士對局皆屈焉孝宗御燕殿召九成試之果壓流輩所行算多出古棋譜外上曰真國手也命官鴻臚序班供御李麟李驥鄞縣志麟字次公精於人物及畫牛自署龍眠後身中年好釋氏禮紫柏為師遂專畫佛像其所題偈多有警悟四方寶之弟驥字次德藝與兄埓亦師紫柏常渡錢塘負擔者攫其行李而去迹之無所乃想其貌而圖之揭於通衢其同侶見而笑曰此某人也遂偕詣負擔家行李悉在一時聞者絶倒從子萼字芳叔所畫得麟傳陳錞天啓慈溪縣志字子平隨父鏐任銅鼓遇異人授岐黃術能以靈心運古法不拘拘刀圭當意到處眼前一草一木拈用之沉疴立起貧而修謝者輒却之人稱杏林先生王養蒙畫史會要鄞人畫葡萄障乘醉著新草履漬墨亂步絹上就以為葉布藤綴實天趣自然鄞縣志養蒙一作養明趙獻可寧波府志字養葵自號醫巫閭子鄞人好學淹貫尤善於易兼精醫其醫以養火為主嘗論命門乃人身之主養身者既不知撙節致戕此火以至於病治病者復不知培養此火反用寒涼以滅之安問其生著醫貫一書為醫家指南後遊秦晉著述甚多有內經鈔素問注及經絡考正脈論二朱一例諸書子貞觀字如葵亦精於醫鍾大延寧波府志字恆國本江右仕族後為鄞人精醫治病不執恆方嘗言今人但知醫病不知醫人病固有淺深人自有強弱豈得因病執方有二人同時病痢其一用補劑一用攻劑或問之曰此稟弱須補其正氣而後攻之彼體強故祗用攻耳徐大理病小便祕腫脹面赤發喘衆醫皆從熱症治大延視之曰是無火也急煎附子湯一服而愈一貴家孕婦病亦如之衆醫莫效大延曰是可勿藥也乃胎壓膀胱耳令其周身轉運而瘳一寺僧嗜鹽每食斤許衆醫雖知其為蟲然服藥輒痛悶欲絶大延曰是蟲不受藥也當有以餌之以鹽笋乾用藥煮仍加以鹽令服越數日果嘔蟲數升許而愈其用藥出新意多奇效皆此類李奎寧波府志字石梁鄞人精於醫洞究內外經心揣手追盡得其妙善起人痼疾有誤吞指爪喉梗幾殆奎令剪人指爪燬服之立愈或疑為古方奎曰不然此內經所謂衰之以屬者也聞者歎服王坡兩浙名賢録鄞人病瞽善六壬兼釋易繇至武林有驛傍人占家宅坡云今年四月十三日當雷震堂棟不傷人後果驗鄞斷塘有一祠初塑神像成鄉人托以人名占之坡曰此人如木偶難逃水火越期果為惡少投於江隨潮上下後復取而燬之按察使僉事黃譽性嚴重人莫敢近招坡筮之坡曰似得鬼責公前歸時失展先大夫墓有陰譴黃下淚曰然坡曰明年當轉官在本省藩職後果如其言毛來賓鄞縣志號岐陽多巧思善製沙漏大者盈尺小者僅數寸以定晷刻無毫髮爽者邂逅一僧異其術以重賄求授不許因以追魂法易之其法於密室之中潔壇坫薦牲牷香紙置繪具几上閲四十九晝夜能令神將驅攝亡魂追摹形貌無不曲肖來賓得其術未嘗輕試偶之霅川於閔太宰家繪其先父母像見者驚猶生會謝行人于宣死於流寇之變其父太僕延來賓追攝乃置壇如其法及期而素箋十幅細書皆滿凡生平履厯家事瑣屑童僕勤惰以至父母妻子間語有人所不可得知者無不縷縷曲盡其神異如此後懼役使鬼神遺子孫禍取書焚之其術遂不傳浙江通志卷一百九十六
