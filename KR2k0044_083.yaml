body:
  text: 浙江通志卷八十四鹽法中雍正四年九月浙江巡撫兼理兩浙鹽務臣李衛題為請專道員就近督緝以裕引課事查兩浙鹽政所轄浙江全省十一府屬并江南蘇松常鎮徽州五府廣德一州建平溧陽二縣以京口為江浙兩省分銷之界及江西廣信一府所屬七縣皆厯來應銷浙引均聽臣鹽政衙門所統隸者地方廣濶其中有近場之處私販繁多惟蘇松等府屬及太倉州所轄之縣為甚禁緝雖嚴奈強橫未除蓋緣鹽政衙門駐劄杭城而鹽道暨嘉松分司亦居省會雖有管轄之名焉能遙制凡遇公事止以文檄申飭州縣陽奉隂違難收緝私實效況蘇松州縣等官既無本處上司就近稽察不免有蠧役通同徇縱之弊臣查康熙四十四年間定例道府失察私販原有降職處分之條則就近該管道員應專督緝之責今蘇松二府業蒙皇上復設巡道一員則弭盜除暴與巡緝私鹽事同一轍若不請旨敕部議定專責不無推缷情故懇請專責蘇松巡道轉督該管府廳州縣官捕上緊巡拿私販如遇巨夥梟徒照依定例協同營員嚴督辨兵擒拏具報如有彼地鹽務大案即令該道就近承審嚴究夥徒産竈定案詳結免得逺解浙省拖纍日久並可督查失察各官勤惰倘或蠧吏兵捕玩法滋弊聽其懲處其常鎮二府亦責常鎮道就近照樣督緝以示勸懲之法至於徽廣二府所屬及各州縣逺離場竈沿途經過浙境盤鹽口岸甚多私販不能侵越且無道員兼轄毋庸陳請責成再浙江本省除寧台溫處二道所轄令其督緝外其餘失察私鹽處分以及各項鹽務事宜悉歸鹽道照舊辦理則督緝一端均有專責不致廢弛矣奉旨該部議奏隨經部議覆準奉旨依議雍正四年十一月户部為請將竈丁歸併竈地徴收等事議覆浙江巡撫兼理兩浙鹽務李衛疏稱江浙竈丁應歸竈地徴收一案經前署撫臣甘國奎清查會題接準部覆仁和倉暨許村等八場錢塘倉暨西路等九場峽門華巖二倉原有給丁之地作何定則攤納原無給丁蕩地作何通融足課應令逐一查明妥議造册具題至台溫二府屬無地攤丁並錢塘等倉西路等場原無蕩地之處交與鹽政查明漲墾新升并應否抵補減免之處造册定議具題等因行據鹽驛道副使王鈞詳稱仁和場之仁和倉及許村鮑郎鳴鶴西興錢清三江曹娥石堰等八場向有沿海灘蕩給丁樵刮例非按畝徴銀實皆計丁輸課者今即以每丁應納之課攤於給丁蕩地計弓按畝定則徴輸其原無給丁蕩地及丁多蕩少者係仁和場之錢塘倉及西路海沙大嵩清泉龍頭穿山長山玉泉袁浦等九場并北監場之峽門華巖二倉或雖有給丁課蕩而沙磧蕪亭刮煎無幾或海潮侵削坍沒無存均不便改攤丁課更有本無給丁之地無可攤徴者故將各場舊有科稅蕩灘暫行通融均加攤納至台溫二府屬之無地攤丁并錢塘倉及西路等九場北監場峽門華巖二倉黃巖等六場與北監場之白沙嶽頭二倉或係無地可攤暫令各丁照舊輸納者或雖有給丁樵刮蕩畝而地少丁多因而酌量分别於舊有納稅蕩灘之內加攤者此特一時權宜原非經久必須清查升漲抵補庶光丁得蘇苦纍辦糧蕩户亦免攤賠今查據許村仁和鮑郎鳴鶴海沙龍頭等場通共報升蕩沙塗地三萬四千六百九十二畝三分三釐共應升稅銀五百七十一兩八錢六分三釐零均應抵補丁銀惟是各場應補丁銀為數尚多前項升科銀兩不敷歸足如本場無地攤丁者即抵補本場丁銀如本場不須抵補者即抵鄰近場分之無地丁銀請於雍正四年由單內分晰刋入抵除前報暫攤納稅蕩灘之丁課並抵補無地可攤丁銀頒發商竈曉示輸將改刋由單詳咨送部其餘各場現在通飭清查如有續漲及坍缺地蕩星飛呈報察明照例將增減抵補各數刋入每年由單內曉諭徴輸逹部查核使漲者不能隱漏坍者得以豁除等情臣覆核無異謹會同江寧巡撫張楷合詞具題前來應如該撫等所請將有地倉場應徴竈丁銀兩攤於給丁蕩地之內按數徴收仍將所攤銀數刋入各倉場由單內送部查核至台溫二府屬之無地攤丁并錢塘及西路等九場北監場之峽門華巖二倉黃巖等六場與北監場之白沙嶽頭二倉亦應如該撫所請將許村等場新升蕩地稅銀抵除前報暫攤納稅蕩灘之丁銀但蕩地攤課原為撫恤竈丁起見該撫等務須酌派公勻使無偏纍仍將所攤銀兩造入雍正四年由單內送部查核仍令該撫嚴飭各場如有續漲及坍缺蕩地即行呈報該撫查明照例將新升蕩地稅銀抵補無地丁銀其坍缺蕩地稅銀照例勻派升科蕩地仍將抵補勻派數目造入該年由單送部查核可也奉旨依議雍五五年十月浙江巡撫兼理兩浙鹽務臣李衛題為謹陳鹽政錮弊酌量疏銷緣由仰祈睿鑒事竊惟裕課莫如銷引江浙各縣有於額引之外可以多銷者有僅能行銷足額并銷不及半者甚有片引不銷者在民間無食淡之理若能於少銷不銷之處設法疏通則多銷之縣錢糧豈不充盈而厯來鹽臣非不樂為但恐干例議不敢據實造報故將不銷之引移於多銷之地仍照原額奏銷是以錢糧不能多出而私鹽亦由此得以充斥也臣去年雖亦循舊例而行然日夜籌畫思所以杜私銷引之計未嘗不以稽煎督煎之事責之場官而微員功名之念輕貪利之心重受賄縱私無人不然即盡加斥革而所換新官仍復如故此場官之不可恃也又未嘗不以巡私之事責之廳縣汛辨而各官俱有地方公事豈能每日親查所差巡役兵丁又皆微末下人更無身家顧惜多將大夥賄放僅拏一二小販塞責此巡緝之不可恃也從前雖皆差有鹽政衙門承差督率商家雇募之巡丁各場查緝臣見其未能實心出力又不得已而差本標辨目帶領兵丁沿河遊巡梟等久已知風暫為回避亦難收有實效伏思官鹽之壅滯總由私販之衆多而竈户之賣私總在場官之賄縱惟有專設巡鹽員辨以緝私更換實心場官以稽竈庶可漸次杜絶查浙地私鹽出沒之所獨海寧海鹽平湖桐鄉為最且係嘉湖二府販私門户而海寧之長安鎮乃其往來適中孔道請專設巡鹽把總一員兵一百名在此鎮分巡隘口歸臣標左營管轄於海寧等四縣及嘉湖要泛接壤江南之處周圍巡查選募勇健兵丁充當以商人向日雇用巡役之工食給為月餉不足者即以所獲私鹽變價添補但恐兵少地廣不能周巡查撫標額兵八百名可於此中暫為抽派一百名酌委千把總一員幫同巡鹽把總協緝令其彼此稽查至出門船腳盤費即以商家所出鹽院承差巡費撥給俟一二月後酌量調換使不致熟識久而作弊此緝私之一法也至各場員官卑職小惟知利欲薰心萬萬不能改革應將現任場員分别優劣酌量咨部改補請以捐納候補候選録用之同知通判州縣等官如有家道殷實情願效力者發浙量才分往各場管事專其杜絶竈丁私煎私賣之責俟三年實有成效即豫保題請旨敕部準照原銜即用在任候憑其不能稱職者題明休致回籍不準再選倘有仍蹈故轍劣迹昭著者題參革職治罪伊等原有身家自能顧惜功名實心出力此稽竈之一法也以上二條雖不敢必其盡善無弊而以理勢揆度若能實力行之或亦不無禆益至於所轄江南數郡除徽州一屬每年實可多銷其餘鹽政情形更有與浙不同應為另行設法者蓋緣蘇松常鎮各州縣四面水鄉港汊雜沓巨梟大百十為羣巡捕兵丁力難制伏又江南止有松所四場民竈雜居向俱就團買食賤鹽孰肯捨近圖逺加以私鹽橫行商皆虧折消乏棄業逃避上海南滙二縣數年片引不銷前鹽臣噶爾泰曾將上海令傅之詮參革而壅滯如故臣雖剴切招商著令買補配銷并嚴飭地方文武巡拏私販又經題明責成蘇松太道並江常鎮道就近督緝其疏銷事宜業已不遺餘力無如浙商資本微薄非兩淮富厚可比既不能盡收竈煎之鹽竈户有鹽餘剩安能禁其枵腹以待而不肯售與私販乎一年之中拏獲問罪者不知凡幾非大為變通不能補救莫若將松所之浦東袁浦青村下沙四場場官於前項候補同知等官內再選最為殷實有身家者令其管理各竈所煎之鹽盡入官倉除商人收買外餘剩者請借動鹽臣筆帖式成規項下銀兩交與管場各員照依場價盡數收買再擇商人內之殷實者將鹽發與領去如能照引數完課聽其歸完本銀自行配銷倘不能完課則於原本之外酌量增價些須令其領出分於城鄉市鎮多設店鋪賣出價銀按季繳還場員即以此銀源源買發多出之價作為盈餘逐年將數目造册報部查核此四場事務更為緊要難辦管理之官三年內仍行考核保題果能錢糧清楚引鹽多銷上等出衆者以原銜應升之缺準其即升至急公稱職稍次者照其原銜即用倘照舊無益者分别參革在竈户鹽既得售必不定欲賣與私販而梟徒無鹽可買亦可望其改業耕耘既免無知愚氓多罹法網且使平素不銷引之縣得以疏銷則歷來多銷之處皆可溢出課額即管理之各場員先使習學歷練亦於將來臨民有益但此法之行原屬創始必三四年方得實見成效臣雖不能預期於數年之後惟是鹽法頽敝已甚臣兼理一日即有一日之責不敢緘默因循用敢縷悉瀆陳是否可行伏祈聖明睿鑒敕部議覆施行奉旨該部議奏隨經部議以均應如該督所請覆奏奉旨依議雍正七年四月吏部等為遵旨題覆事會議得浙江總督兼理鹽務李衛疏稱兩浙從前共有三十三場裁去十處有兩場而歸併於一甚至一官而管三處者如江南松江南滙縣之下砂原設三場自康熙四十二年雍正二年兩次併為一場皆因從前所出引鹽不及額數現今産鹽復廣竈地遙逺自非一官所能稽查周遍又浙江黃巖縣之杜瀆場於康熙三年歸併黃巖場查杜瀆地方山海交錯寬廣百餘里與黃巖南北相隔又有椒江之險近日丁竈殷繁一員實難兼顧又永嘉縣之永嘉南監二場於康熙二十一年歸併雙穗場以三處之竈舍引鹽而責一人之督煎稽緝殊有顧此失彼之虞請將下砂三場原地酌量中分除頭場有官外復設二場一員其杜瀆一場仍與黃巖分管永嘉則須另立一場以上共復設場官三員給與印記各自緝私督煎等語應如該督所請準其復設又疏稱橫浦浦東二場俱設金山衛之城外向將橫浦場課歸併平湖縣徴解但以附城竈戶令赴數十里外完納殊多苦纍應請將橫浦場仍歸江南金山縣完課庶為得宜兩場相去不過二十里一官足可辦理并請裁去浦東場官一員以節冗費等語應將橫浦場課仍歸江南金山縣完納浦東場官準其裁去又疏稱竈課向屬場員徴解因微職難任錢糧重寄是以改令縣徴現在場員既皆改用通判知縣州同等官應仍將各場課銀合場官就近設匱徴收原封解交各縣拆併等語應如所請將各場竈課錢糧令場官就近徵收解縣又疏稱場員惟司代比催納而完欠解給仍屬於縣若定以考成竟照經徵一體處分則各員因代縣催比使之詿誤孰肯踴躍急公臣愚以為催比場員如有未完分數除止於罰俸外其應降職降級停升者俱照離任官例罰俸一年免其停升倘催徵不力許該縣提比經識那用侵漁者仍即揭報另行從重議處如該縣不能稽察致有虧空仍照直隸州之例參處著落分賠至有一場而坐落兩縣者場官應合算未完分數無庸兩地處分其從前欠課即令場員就近察核會縣詳報著追等語查各場鹽課錢糧既令場員就近徵收原封解交各縣拆併是代徵之場員並非專管官可比若照經徵舊例處分原屬太過請嗣後代徵場員如初參欠不及一分者舊例罰俸六個月今應免其議處欠一分者舊例罰俸一年今應罰俸三個月欠二分者舊例降職二級今應罰俸九個月欠四分五分者舊例降職三級四級今應罰俸一年俱免其停升督催欠至六分以上者舊例俱行革職今若止於罰俸則欠數既多而處分太輕恐場員視為泛常代徵不力請嗣後欠六分者降職一級欠七分者降職二級仍令戴罪督催欠八分以上者即行革職再初參處分既已改輕則原參各官亦不便照舊例議處請嗣後代縣催比之場員原欠不及一分年限內不全完者舊例降一級留任今應罰俸六個月原欠一分年限內不全完者舊例降三級調用今應罰俸一年原欠二分三分年限內不全完者舊例降四級五級調用今均應降一級留任再限一年督催如再不完照所降之級調用原欠四分五分年限內不全完者舊例革職今應降一級調用原欠六分以上年限內不全完者革職如該場員催徵不力許該縣提比經識倘將已徵錢糧內有那移侵欺情弊即行揭報若該縣平時不能稽察查揭致有虧空者照直隸知州失察屬員虧空例議處至有一場而坐落兩縣者其場員兩地未完分數應合算併案處分其從前未完課項即令該場員就近查明會縣詳報著追又疏稱兩浙場員共二十三缺今請復設三缺裁省一缺計二十五缺又續準部文鹽課大使批驗所員缺俱照例揀選將奉旨來浙之二十三員選派委用又奉旨照河工例令赴臣衙門具呈效力者現在一併彚册咨部存案惟是鹽務各官既令在外揀補則將來事故缺出必俟選擇有人咨部候文補用於緝私督煎諸事有誤請於效力人員內慎加挑選凡各場有地廣竈多之處即派一員前往協辦再有私販出沒之所委之巡緝盤查俱令自備資糧俾其練習政務遇有相當缺出題補仍於每年嵗底照河工例造册送部等語應準其派委補放效力協辦又疏稱仁和許村二場向係鹽驛道所轄不由分司稽考但道員事繁不能親自查核請將二場歸於寧紹分司管轄仍聽鹽道統屬所裁浦東場之俸工原係江南地方應抵補復設之下砂場無庸另增其浙江之杜瀆永嘉兩場官役俸工請照舊核給等語俱應如所請行可也奉旨依議雍正七年四月户部為請頒預備引目以資疏銷事議覆浙江總督兼理兩浙鹽務李衛奏稱兩浙鹽務歷係壓銷二季每逢春夏掣驗僅可行銷秋冬之引臣兼理以來雨暘時若場鹽廣産文武同心竭力緝私梟風漸息引地得以疏通商皆樂於買補近又發帑儘收竈户賣剩餘鹽給商配掣在於向不銷引地方運賣以濟民食因此額引較前預銷二季但上年場有餘鹽乏引配運即將所存之肩票升課改銷近今肩引亦復廣售而預提引目一時不能接濟是以設法變通暫給印照捆鹽赴所掣驗現今停泊河干候領新引到浙給商抵補開賣但給照赴掣不過一時權宜未可據以為例此時若竟請加引則日後行銷不及必致貽纍商竈若聽其積鹽不收則私梟復萌請預為頒給額外引目十萬道發浙貯庫應用其年月季分暫停預定每於掣期額引配足之外如遇場有餘鹽準令商人完納課費呈明請領現填某年某季發給配銷原係額外多備之引聽慿各所之商通融配掣倘一年期內尚不敷用再行咨部請領若有餘剩報部存俟下年續銷盈絀隨時不在額定考成限銷攤賠之內仍於每年奏報時將銷引若干道增出課費若干兩附同奏册一體造送聽候查核再如富陽德清嘉秀善桐諸義浦等縣及江南松江所屬沿海之區從前原係住賣引地久被私梟占去除嘉秀善桐些須銷售此外各縣地方片引不銷每年課餉俱係改撥攤補均賠近今竭力禁逐設法調劑已令商人配引住賣頗見成效但厯來向食私販賤鹽倘商本太重鹽價稍昂又於民情未便是以臣斟酌通融凡此數縣行銷引目課餉照數完納外其每引公費雜費酌量多寡稍為減免將鹽價令其比别處每斤賤賣使官引得銷價值仍減民間樂於盡赴商買則私販便可永杜等因前來查各場産有餘鹽原賴官引疏銷查河東自雍正三年為始每年預發餘引十萬道如遇額引不敷之處令運使填給照例納課將已行餘引儘數題報存剩餘引仍繳內部遵行在案今兩浙請頒額外引目十萬道應如該督所請照依河東之例自雍正七年為始臣部照數刷印令該督按年差役赴部承領到浙貯庫每於掣期酌足之外準令商人領配餘鹽照引完納課費通融配掣倘不敷用再行咨部請領如有餘剩均於歲底即行繳部仍於每年奏銷時將所銷引目增出課費一同造册報部查核其從前該督所給印照解部查銷至富陽等縣亦應如該督所請每引公費雜費酌量減免鹽斤價值亦量為稍減仍將減免各數報部查核可也奉旨依議雍正八年正月浙江總督兼理兩浙鹽務臣李衛題為再懇續頒餘引以速配銷以裕課賦事竊照兩浙年行引目除票引外額銷正引七十一萬三百道查從前私梟充斥多有未能銷足每常遞壓二季於次年通融配掣若再不能完衆商攤賠包課臣蒙恩兼理鹽政逐一稽查設法整頓杜私疏引已將前鹽臣謝賜履接管任內未完錢糧悉經清楚而年行引目照額全銷且又儧掣從前存引溢銷後季鹽斤是以上年五月間臣在京陛見之時奏請頒發額外引目十萬道以備餘鹽配掣業蒙恩準頒發在案及臣回任後正值菜鹽旺銷之際私梟聞風斂迹官引疏通所有雍正七年分首次兩掣事竣合計掣驗商鹽共有一百二萬二千六百五十引查該年額引七十一萬三百引內除六年冬掣已經預提透銷過一十六萬六千四百五引外僅存本年引目五十四萬三千八百九十五引同前請發餘引十萬道因未足用又於上年十二月內附疏題請餘引二十萬道今尚不敷引目一十七萬九千有竒理合具疏題請再發餘引十八萬道到浙配銷雍正七年已掣全數其應完課費銀兩俯俟核明造册奏報但此項餘引原於年額之外溢銷並非每歲一定之數盈縮難以預期所增正課公費併請額外銷算不入考成之內稍有餘剩之引遵例送部繳銷庶下便商民上裕國帑矣奉旨該部議奏隨經户部以應如所請議覆奉旨依議雍正八年六月浙江總督兼理兩浙鹽務臣李衛題為續陳辦理鹽法事雍正六年七月臣摺奏前事浙江鹽政向因地方廣逺恐一時未能遍及故曾奏明將浙屬之寧台溫處四府并江南之崇明縣另為調劑次第舉行今臣查松江府城舊時附郭華婁二縣今又分出奉賢金山地方不為不大更有提督重兵駐劄宜乎私梟屏迹而從前片引不銷皆由向日提標及附近各營無不通同濟私大船裝載貯於兵丁屋內令其子弟家屬提擕籃筐滿街趁賣地方官不敢過問以致商人無可如何將此數縣棄出不復行銷城內雖有數家鹽鋪皆係與營伍交往地棍於商人處批出些須鹽斤為名借官行私亦止畏法之鄉紳富户不敢買食兵丁私鹽方向鹽鋪售取數十斤究屬片引不銷臣細看沿海形勢海塘之外不産鹽土其場皆在兩頭北則逼近川沙大營南有金山參將若加以提標汛兵肯與出力協同兩營實心巡緝鹽徒插趐難飛屢與提臣柏之蕃悉心計議預備賞賚以圖大破積習提臣亦肯身任其事近日辨兵奉法努力連報拏獲大夥私鹽數起查松郡原係商人不敢開店之處而雲南福建皆有文武官辨督銷之例若將公項所收鹽斤量行發交提標五營挑選誠謹千把總在於松郡城之內外監賣除出完課將鹽本解還源源接續則既豫以責成又不無稍有餘利自必實力巡緝臣仍與提臣時常留心稽查庶錮弊可除但産鹽之四場俟委官到日遵照辦理酌量收買發商完課儘力督銷自然有益惟所慮者崇明一邑向係海外包額之區煎出鹽斤止為本地民食例禁不許透越别縣充斥內地後産鹽日多梟徒勾通鎮兵縣役任意廣煎不但往來領餉運米船隻順便裝載亦且渡海各船夾帶進內殆無虛日文武衙門向來皆有陋規屢次行文從不攔阻昨見臣在松江恐被差員內港截拏始據報獲一起近日鎮標左竒兩營盤鹽甚屬上緊但恐不能久逺如是此地若不派官協巡稽查堵禦則蘇松常鎮等屬雖收餘鹽發商仍被崇明私煎攘奪引目仍舊難銷臣愚昧之見將現在命發管場各員內挑選明白強健者一人再派千把總一員發給盤費專在崇明要口駐劄並可往來稽察竈地其鹽應禁者嚴禁應收者酌收令其轉運發商辦課其私販小則移知營縣協緝大梟就近稟報總兵嚴拏解交蘇松道審究分别治罪翦除􅌪頓毋許流入內地實於江省鹽政大有禆益至浙之寧處二府尚有官鹽一半溫台壅引久不行銷此非專係私販衆多之故實緣梟棍強橫動成命案各商但有本錢者俱不肯往彼處貿易現在止有消乏數人每家不過三二百金大處不能行運始向此等地方賖欠竈鹽拉扯零賣搜索微利臣前疏業將四府場員亦在更換準行之內但收買鹽斤彼時若一齊並舉誠恐遙逺難以照應未敢率請今民頗知守法宜當一體動項廣收發給官商分頭運銷於産鹽多處添造厫座出入要路堵防隘口增課何止加倍即如從前諸義浦等縣梟徒潑橫難治之地業已漸次斂迹大銷引目此其明驗以上事宜臣恐具題遲緩等候部示往返需時有悮秋冬乘時辦理因敢仰瀆天聽伏乞聖鑒批示欽遵抑或原摺發議知照到日即當舉行為此謹奏奉旨怡親王張廷玉蔣廷錫議奏欽此隨以應如所請議覆奉旨依議速行欽此部咨到臣隨經轉飭所屬一體欽遵在案今自雍正六年九月初六日至雍正七年十二月底所有支發帑銀收買竈户餘鹽配銷正餘引目課費及額外盈餘等項數目據鹽驛道王鈞造册詳送前來臣覆加察核如支發帑銀一項查奏留公費分規銀八萬兩給與各鎮府場商收買竈鹽銀六萬七千六百四十三兩內已解還銀五萬八千一百一十二兩五錢一分一釐臣於上年十月回任後即在此內續給各場商買鹽銀五萬七千四百六十二兩六錢四分通計存庫未放銀一萬三千六兩八錢七分一釐存各場商銀六萬六千九百九十三兩一錢二分九釐現在隨引按數交還接濟收買餘鹽歸於雍正八年嵗底造報此八萬兩之數所當仍暫存留作本源源放給候餘息出有前數應用即將原動銀兩歸還充餉者也如收買餘鹽一項查從前竈户所煎鹽斤在行銷之地商人或因乏本不能盡收而梟販充斥之處則商人竟至裹足不前窮竈待以糊口不得不以之濟私今發帑廣收通計江浙各場除商人自行收買外共官厫收過餘鹽一十九萬八千六百九引凡此所收之鹽昔日盡售於私今已皆歸官賣此亦私梟斂迹之明驗也如配銷正餘引目一項查台溫二所年額止應銷引二萬七百七十八引二分五釐尚多壅滯未完松屬華婁奉金上南青福各縣額引三萬三千三百十七引歷來大半不銷又江屬之嘉定寶山浙屬之德清富陽諸暨義烏浦江等縣亦皆私販霸踞引目難以疏通今除各商銷運正餘引目之外所有發帑收買之鹽共配銷雍正七年正引及補銷六年壅引預銷八年額引計共三萬三千二百一十四引共完正珠引課及公費銀一萬四千四百五十三兩八錢八分五釐零俱於各該年題銷案內分晰彚册造報又配銷雍正七年請領額外餘引八萬四千七百九十三引共該正珠引課及公費銀四萬二百六十五兩二分四釐零現歸雍正七年額外餘引案內彚册題報以上止就帑鹽一項計之而所銷正餘引目較之歷年原額不啻加倍官引既多私販自少此行之已有成效者也至於正引餘引之外又有溢額盈餘臣通盤查核共有三項一係台溫二所暨鎮海縣嵩玉場餘鹽及台溫松三所官厫銷賣肩販漁鹽共計八萬六百二引各則科算正珠引課公費共銀一萬九千七百七十一兩三錢二分八釐零此因正引已完餘引未到而民食不能稍緩漁汛更難愆期暫以印照配賣接濟急需一係台溫鎮府暨松江提標中營參將等處將所收竈户餘鹽照時價發賣民食除歸還鹽本及賞給辨員養廉巡兵工食以及建造鹽厫官署運鹽腳價撥充玉環城工經費等銀外共存銀二萬二千一百九十九兩五錢五分五釐零在民既免食私之纍又無貴價之慮皆稱兩便一係各商人將官收餘鹽領去銷賣除配納正課公費外其鹽本銀兩如係一掣繳還者每百兩加銀五兩五錢五分五釐若兩掣繳還者每百兩加銀十兩此外餘利悉歸商得計共應繳餘利銀七千五百三十三兩四錢四分一釐零此皆商人既得官鹽配銷又獲多沾餘利悉皆踴躍急公隨引繳還者也以上額外盈餘共又得銀四萬九千五百四兩三錢二分四釐零現在已解道庫銀一萬五千四百四十八兩五錢五分四釐零存貯鎮府營場銀共二萬八千六百九十二兩八錢一分七釐零存貯商店銀五千三百六十二兩九錢五分二釐俱為陸續收買餘鹽源源接濟并臣從前分晣陳明如關地方緊要有益民生公務即於此項額外盈餘銀內動撥應用仍俟本年嵗底另行造册報銷惟是前項溢銷引鹽課費盈餘銀兩皆仰賴皇上洪福雨暘時若場鹽旺産俾得因地制宜隨時設法廣銷溢額非係將來每年一定之數盈縮難以預期相應一併聲明伏乞皇上睿鑒敕部查照施行奉旨該部知道雍正八年六月為敬陳鹽法相沿陋弊酌議調劑清釐等事議覆浙江總督兼理兩浙鹽務李衛將兩浙鹽政事宜酌陳四欵具題前來一稱鹽課錢糧額徴欵內有各州縣功績等銀七千八百一十五兩滴珠銀七千八兩一錢五分內除各縣地丁項下編徵抵課水手銀九百二十二兩五錢五分九釐有欵可徵外其餘銀六千九百七十兩五錢九分一釐並無原欵可徵此項課銀派於各州縣解納照縣分大小分别多寡限定一年獲變私鹽船物之價起解充餉少者罰令賠出在州縣以為有欵無徵又皆責之鹽捕弓兵賠墊完納此項錢糧久列額徵欵內未便竟請豁除而每年實獲船鹽變價罪贖等銀又不足七千八百一十五兩之數再四思維查各處商家本多引少者向係租賃本少乏商引目配掣每張給銀五六七八分不等今額外所發餘引俱係給商不須租價止有交部引張紙硃及往來領繳路費為數無多臣擬自雍正八年為始凡有情願請領餘引之商人每引輸銀四分內以六釐留為紙硃領繳路費以三分四釐交貯鹽驛道庫所有功績項下銀六千九百七十兩五錢九分一釐除將每年實獲船鹽變價罪贖等銀解抵之外其餘不敷數目即於餘引租價之三分四釐內補解抵欵不復再派各州縣捐解惟是餘引行銷多寡無定若遇銷多之年抵解有餘即留為下年湊解倘遇有銷少不敷之時於鹽務準留應用公費十二萬五千兩節省之項暫行墊解俟次年餘引充裕仍行扣完補項務使年清年欵不致虧額至於此外各縣編徵抵課等銀九百二十二兩五錢五分九釐原係地丁項下之欵請從雍正八年為始令各縣照編解交藩司解部造入地丁題銷案內聲明彚算考成毋庸再入鹽政以滋牽混又稱歷任鹽臣銷過殘引例應追出繳部其中或有水火盜賊遺失及肩挑小販道路碎裂醎漁户波濤漂沒不能完全從前每將後任殘引抵數繳送又撥解定限止有八十日之期而行銷州縣共有一百餘處未能如期解足故有後引先到者即行墊解而以續解之前引反抵後發之引其事不知起自何時至今數十餘年歷任皆照前例而行臣兼理以來嚴飭設法清查惟將本任銷過之引隨時追繳貯庫不許那移牽混而在已往者莫可究詰所缺殘引至今未能追清臣查每年引目數十萬張分散各處行銷原不能一無缺少在當日初起之時豈能保無重照之弊今逺年舊引難於影射亦屬無用謹據實題明將歷任現在者儘數繳銷其已經抵還别任及實係遺失無著者免其輾轉追究此後逐年清出次歲遞繳果屬水火遺失肩販漁户損壞取具官商印甘各結聲明存案扶同揑結加倍治罪又稱兩浙引課除江南松所外杭所每引徵課銀四錢四分零嘉所每引徵課銀四錢二分三釐零紹所每引徵課銀三錢四分零在當日原因地方衝僻行銷難易分别等差酌定課則今各處私鹽漸少官引疏通完課似應畫一臣經飭行鹽驛道王鈞委令寧紹嘉松兩分司傳集各所衆商公同酌議三所引目通共五十八萬八千七百六十七引七分五釐課銀二十三萬四千二百二兩一錢四分九釐零照額攤算杭嘉紹三所每引均納課銀三錢九分七釐零使額課均平不致偏有輕重羣情允洽相應一併題明均於本年遵照奉行又稱前任鹽臣噶爾泰題定每引輸腳價七釐乃就年額八十萬引目計算今臣題請之餘引係額外之欵不入考核已有每引六釐為紙硃路費不復另輸腳價以滋重復等語均應如該督所議可也奉旨依議雍正十一年十一月户部為遵旨議覆事議覆浙江總督管理兩浙鹽務程元章疏稱據浙江鹽驛道張若震詳稱江南靖江一縣久隸兩浙地雖逼淮場而從前題明包納浙課不歸淮屬者誠以靖江以南即屬江隂武進丹徒無錫及長洲元和吳縣各縣俱係行銷浙鹽之地若一運銷淮鹽則姦商巨販借官行私連艘飛渡蘇常引地盡為淮私透越在浙之官引必致壅滯而淮商之課鹽亦難疏銷今浙商楊恆裕既承認行銷則靖江食鹽自應仍歸浙省母庸改撥淮商更張舊制至於現在包課銀五百八十九兩零係照下下則例計算引二千二百六十九引今該縣户口繁盛暫以三千引為率在於每年餘引內照數配運但浙鹽路逺費繁難同淮鹽科則應請仍照康熙十八年題定下下則例每引完課二錢五分九釐零共完課銀七百七十八兩八錢三分三毫零倘銷不及數責商賠補額數有增再行升報惟靖邑與通州之場竈接壤向食淮私今既行運浙鹽應專令靖江文武官辨協力稽察添設巡役分路查緝所需工食商人自行捐給緝獲私鹽照例充餉其一切審詳私鹽案件仍由浙省鹽政衙門管理所有三江營同知巡緝核轉之處伏候題明更正再淮鹽已經運賣應請掣回飭令浙商楊恆裕運鹽接濟其包課銀兩原於地丁攤收應請於雍正甲寅年豁除臣謹會題等因查靖江一縣向納浙課自應行銷浙鹽應如所請將靖江食鹽仍歸浙省銷售專令靖江文武員辨協力稽察添設巡役分路查緝緝獲私鹽照例充餉一切審詳件案仍由該鹽政衙門管理從前三江營同知巡緝核轉之處準其更正已運淮鹽速飭掣回令該商運鹽接銷其靖江縣包課銀兩相應準其豁除可也奉旨依議雍正十三年十一月總理事務莊親王等為遵旨議奏事據署副都御史陳世倌條奏三欵內稱一鹽課額外之虛名宜停止也查鹽課引有定額斤有定數按引辦課未必定有竒贏即獲微利亦何妨留與商人裕其資本乃近年來多有以隨例歸公者且狡詐之徒仍於暗中令商人重出故在官多一分之歸公在商反添一分之誅求此商之受其弊者也請嗣後秪是按引辦課但令綱不墮壓課不虧欠便為稱職一切歸公捐助等項虛名永行停止等語查鹽規既已歸公止應如數完納豈得復於歸公之外勒索病商嗣後倘有不肖官員暗勒商人重出以飽私橐者許該商控告治罪並令該督撫鹽政時加訪察違者即行參處毋得徇隱至所奏捐助一事現奉諭旨禁止官吏勒派併將督撫失察及徇庇者均照例分别處分在案嗣後鹽政等官倘有借名捐助而暗諭商總勒令公派者該督撫即將該鹽政等據實題參如督撫有失察徇庇等情一經發覺將督撫一併議處可也奉旨所議甚是依議速行浙江通志卷八十四
