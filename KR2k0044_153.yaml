body:
  text: 浙江通志卷一百五十四名宦九台州府晉羊忻台州府志永和三年初置樂安以䕃補邑令甫至以縣治地偏非一邑正氣乃遷於青圭前功成而民不勞其治邑也以風流儒雅相尚而事無廢弛民戴之如慈父母焉南北朝臧熹宋書臧質傳質父熹字義和東莞莒人武敬皇后弟也為建威將軍臨海太守郡經兵寇百不存一熹綏緝綱紀招聚流散歸之者千餘家徵拜散騎常侍阮長之南史本傳字景茂一字善業陳留尉氏人元嘉十一年除臨海太守涖官有風績為後人所思宋世言善政者咸稱之傅昭梁書本傳字茂逺北地靈州人晉司隸校尉咸七世孫天監十七年出為智武將軍臨海太守郡有蜜巖前後太守皆自封固專收其利昭以周文之囿與百姓共之大可喻小乃教勿封縣令常餉粟置絹於薄下昭笑而還之普通五年進散騎常侍金紫光禄大夫昭所涖官常以清靜為政不尚嚴肅大通二年卒諡曰貞王筠梁書本傳字元禮瑯邪臨沂人中大通三年為臨海太守舊浙江通志筠任臨海實力輯撫流民歸者千餘家劉潛南史本傳字孝儀彭城人工屬文累遷尚書左丞長兼御史中丞出為臨海太守時政網疎闊百姓多不遵禁孝儀下車宣示條制勵精綏撫境内翕然風俗大變入遷都官尚書蕭洽南史本傳字宏稱南蘭陵人善屬文仕梁累遷臨海太守為政清平不尚威猛人俗便之後拜司徒左長史劉瑴台州府志字仲美沛國人天監三年射䇿髙第為寧海令有惠利及民唐來濟赤城志為同中書門下髙宗將以武氏為后濟諫曰立后以承宗廟宜擇禮義名家以副四海之望帝怒移台州刺史袁光孚台州府志天寶間為台州刺史沈佺期稱云大才沈毅雅度温良又云甘雨隨傳於往還仁風交扇於期月味其言可為良吏矣鄭䖍唐書本傳鄭州滎陽人元宗愛其才為置廣文館以䖍為博士後貶台州司户參軍䖍在官貧約澹如也舊浙江通志䖍至選民間子弟教之以身率先徐裕明一綂志為台州刺史自台遷衢州劉禹錫贈詩云聞道天台有遺愛人將琪木比甘棠李肇台州府志大中七年為台州刺史政善民安所著有國史補翰林志經史釋題等書李師望赤城志大中十四年以刺史至州討賊戰於天台觀前收復唐興縣陳仲通台州府志咸通中為寧海令以德政稱裘甫寇浙東將萬餘人入奉化寧海仲通率兵迎敵被害百姓哀之五代陳長官失其名十國春秋事武肅王為寧海縣令會王命増州縣賦税長官上書極諫王大怒逮之獄長官以死爭之得免寧海故稱劇縣租税視諸邑為獨輕者皆其力也至今猶廟祀焉宋畢士元赤城志代州人以大理寺丞知台州時吴越入朝以善撫摩得譽奏言錢氏所上圖牒皆張侈賦數不可信願一用舊籍以輯新民詔從之後改名士安景德中拜同中書門下平章事王子輿臨海縣志字希孟密州人雍熙元年知臨海縣事精敏有才略以公事申請者文牒紛委頃刻決遣曽無疑滯嵗旱禱於城隍輒應因新其廟宇而記之終右諫議大夫章得象赤城志泉州人大中祥符四年以屯田員外郎知台州簡重有實政寶元初以户部尚書同中書門下平章事諡文簡辛若濟赤城志天禧三年以衛尉寺丞通判台州引東北流瀑入城以濟民用人皆德之季匄赤城志慶厯五年知臨海縣掌西北隅城築有功彭思永赤城新志廬陵人慶厯五年以太常博士通判睦州時台大水敗城人多溺死檄思永往攝治焉盡𦵏死者為文以祭民貧不能葺居者伐木以助之黄瑊赤城志慶厯六年以太子中舍通判台州時遭大水瑊佐守元絳悉力贍䘏民用以寧官至虞部郎范仲温范仲淹范伯玉墓誌字伯玉幽州人唐末家於蘇臺景祐二年以恩例補試將作監主簿除越州新昌尉以誠接物民用知勸在邑三年盜不及境外計舉監杭州餘姚縣市征能寛其利商旅便之三載以績聞除寧海軍節度推官知台州黄巖縣慶厯七年海潮大至壞州城没溺者甚衆仲温教民為桴晝夜救之全活數千人上官請董衆以治城仲温雅喜利人長於慮事衆議築土為城用甓以傅之仲温謂人築且勞又捍水之衝甓何能久乃集民累土以牛數百蹂之堅而後表以長石互相銜枕勢莫得動其城八門皆設之閘衆服其善嵗飢州命邑官率富人出穀俾輕其價以助窮民而窮民乏貲無以得穀仲温諭貸之衆皆悦從飢者獲濟黄巖大邑民數萬户訟爭盈庭仲温專尚仁愛多以理遣民自愛服秩滿遷太子中舍致仕錢仲基赤城志皇祐二年以國子博士通判台州時郡大水請發官廩且丏粟當路以濟民飢石牧之太平縣志皇祐五年任天台縣令興建學校振作人材綽有政聲見陳古靈學記范世文赤城志仲温之子熙寧九年知黄巖縣鑿井闢坊巷鄭至道明一綂志元祐初知天台縣為政寛簡專務教化民心悦服後秩滿邑民攀留不忍其行因留家松闗至今有松關留鄭故事諭民書七篇尚存陳敏嘉靖浙江通志無錫人知台州朝命立元祐黨籍碑敏不肯立監司促之急敏曰誣司馬公為姦臣是誣天也倅立之敏碎其石或咎敏敏曰我死且不辭何劾之畏遂挂冠去范祖述宋史范百禄傳祖述知台州奏罷黄甘葛蕈之貢累官朝議大夫張元仲萬厯黄巖縣志字孝友建安人元祐五年以承務郎知黄巖縣事建橋西浦渡民甚便之呼孝友橋吕全赤城志元祐七年知臨海縣以政績聞時民役至七年始更全隨産髙下為久近民便之劉光台州府志紹聖二年知仙居縣政務簡惠黎民懷之後遷本郡守人多焚香道迎墨吏望風解綬去及代男女巷哭閉城使不得出滕膺赤城新志字子勤宣和中為台州戸曹參軍時睦寇方臘聲震東南守丞以下皆遁膺獨慨然自任即日移書訣其父母昆弟而閉其妻子於官舍悉召州人諭以利害人人感泣思奮乃亟下令發兵守險増陴濬隍分屯列柵為死守計既而吕師囊亦起仙居為賊響應先後攻城凡數四膺皆應機設械立摧破之手弓臨城殪厥渠魁賊遂退走而城卒全慶元初州人上其功勅賜義靈廟至今祀焉盧崇赤城志宣和二年知天台縣吕師囊攻城與戸曹滕膺守禦有功鄒柄嘉靖浙江通志字德久晉陵人浩子弱冠從龜山先生游靖康初薦補承務郎除編修權給事出守天台行其所學𩔖多善政莊外斂中與人不茍合前後奏議論列天下偉之陸寀台州府志字元珍無錫人靖康間以縣丞攝寧海令遇事立決老吏夙姧畏懾不敢動巫以淫祠惑民悉捕寘於法習俗為變會遷秩父老出境爭贐金帛寀拒之厯杭州仁和縣尉越州司功曹提舉京邑常平等事所至以治行稱謝克家赤城志上蔡人建炎二年以朝奉大夫龍圖閣待制知台州吏治精明人不敢犯後參知政事以資政殿學士知衢州終於衢遺命𦵏黄巖縣靈石山子孫因家焉黄子游周必大黄子游墓誌字叔言系出浦城紹興元年入監左藏西庫時移蹕臨安子游銜命先渡江經度臺省倉庫所寓畫圖以進後皆不易改知台州台産鹽姧甿囊槖其中重法不能禁子游治以輕典人不忍犯久之求浙東安撫司參謀官以歸楊煒赤城志紹興十九年知黄巖縣開官私河用工一百七十餘萬立斗門九所民賴之嘗移書參政李光詆丞相秦檜為豪民所訴付大理獄崔縱嘉靖浙江通志字元矩臨川人政和進士為仙居縣丞有恵政累遷承議郎二帝北行髙宗將遣使通問朝臣以前使者相繼受繫莫肯往縱毅然請行竟握節以死李浩宋史本傳字德逺其先居建昌遷臨川紹興十二年擢進士第孝宗即位除員外郎乞外得台州州有練中禁軍五百人訓練官貪殘失衆心不逞者因謀作亂忽露刄於庭浩推其為首者四人黥徙之迄無事除直祕閣並海有宿寇久不獲浩募其徒自縛贖罪即得其魁豪民鄭憲以貲給事權貴人門囊槖為姧事覺械繫之死獄中籍其家徙其妻孥權貴人教其家訟寃且誣浩以買妾事言者擠之疏方上權參政劉洪奏曰李浩為郡獲罪豪民為其所誣臣考其本末甚白上顧曰守臣不畏強禦豈易得耶國章安在洪袖出之遂留中不下大理觀望猶欲還其所没貲上批其後曰台州所斷甚允當鄭憲家貲永不給還流徙如故浩始得安除司農少卿沈介赤城志紹興二十七年以左朝散郎知台州為政有聲雨暘禱輒應龔滂萬厯黄巖縣志字清夫上饒人紹興二十八年以右從政郎知黄巖縣事有善政父老言紹興時良令必稱滂云韓元龍台州府志字子雲真定人紹興二十五年任天台縣時邑賦入籍悉力區畫有疏豪猾未稔闕謝不納曰一人入吾耳則不以善良待之矣聞者革心官至大理寺卿薛抗嘉靖浙江通志常州武進人隆興初令寧海清介絶俗甚有政譽邑濱海水鹵民甚苦之抗於邑東北廣度坊側鑿井得泉甚甘為亭於其上以便民汲自後次第凡開八井邑人利賴名曰薛公井趙思赤城志蘇州人乾道八年以左奉議郎知台州民有即山疊石以耕者或請籍其賦思奏除之詔簡卒赴行在所有不樂者欲為變思善誘其去徐物色為倡者黥之孝宗謂措置得體記名御屏尤袤宋史本傳字延之常州無錫人紹興進士累遷著作郎兼太子侍讀與郡得台州前守趙汝愚修郡城工纔什三屬袤成之袤按行前築殊鹵莽亟命更築加厚數月而畢明年大水更築之墉正值水衝城賴以不没會有毁袤者上使人密察民頌其善政不絶口乃錄其東湖四詩歸奏上讀而歎賞遂以文字受知除淮東提舉常平進直祕閣李兼嘉靖浙江通志宣城人博學工詩楊萬里推許之知台州居官有守既卒吏民為之巷哭罷市黄㽦明一綂志知台州勤苦夙夜先勸後禁訟牒銷縮郡稱平治為濟糶倉為抵當庫𦵏民之栖寄暴露者為棺千五百置養濟院又創安濟坊以居病囚皆自有子母錢使不廢丁大榮天台縣志毘陵人慶元間知天台縣主管農桑公事除差役之困斗糴之艱修廢興利民甚德之又捐俸刻天台圖經孫若無赤城志慶元六年知臨海縣催科不擾以糜費錢輸下户租以憂去楊圭萬厯黄巖縣志字國瑞建安人嘉定二年以奉議郎知黄巖縣修復經界剏利涉橋與唐守仲友同時人稱利涉之功過於中津云齊碩赤城志青社人嘉定十四年以宣教郎知台州闢貢闈修中津橋復經界補額台州府志郡舊無志前黄守㽦請陳耆卿修輯未就而去碩續成之郡之有志自此始趙善􅜜赤城新志嘉定間知仙居縣事愛民如子值嵗饑徧走拯給民懷其惠為立趙長官祠劉棟臨海縣志寶慶二年知臨海縣事律已以廉御民以寛鄉無邏卒圄無錮囚時臨邑儒學未建初附於郡庠被火寄於石佛廢寺中棟至歎曰人才之興由學校始邑無學可乎乃首建學宫以敷教化又取邑士之題名慈恩者刻諸石楊文仲宋史本傳字時發眉州彭山人寶祐元年登進士第升國子博士匄外添差通判台州故事守貳尚華侈正月望取燈民間吏以白文仲曰為吾然一燈足矣勸農東郊守因欲泛湖文仲即先馳歸召為宗學博士遷太常丞兼崇政殿説書章敏子台州府志為仙居令湔剔夙弊吏不敢欺尤作興學校後令夏嚞一遵敏子所為並著聲稱號為章夏程崇嘉靖浙江通志歙縣人淳祐進士厯大理寺丞出守台州抑絶權豪甚有政聲先是府治後山妖狐變幻崇至潛伏不見徐黙成仙居縣志博學善談兵為仙居尉朞月值呂寇之亂奮不顧身率勇敢與巡檢鄒進合力堵禦戰不利罵賊而死王華甫赤城新志初為黄巖令景定元年守台擊強扶弱正經界均賦役嵗連熟民為之謡曰若無王知州爭得碗飯磕鼻頭當時言守令者以為稱首趙子寅臨海縣志端平二年涖臨海任有遺愛咸淳六年又以編修守台賑饑修城民益懷之没無所歸子孫遂家於台度宗聞其賢贈直祕閣給官宅一區田二百畝養其孤以旌廉吏元王鋭臨海縣志字進卿至元間宰臨海在任十年廉明愷悌民甚安之二十六年婺寇延及邑境邢萬户帥兵殱寇欲抄黄奢鋭赴軍前爭辨軍士以刀磨其頸鋭益力民賴以全黄奢民立祠祀焉嘗建邑治書涖政箴於㕔壁以自警楊澤赤城新志以從事郎為黄巖縣尹存心恤民父老肖其像祠於城隍廟朱霽蘇天爵朱霽神道碑字景周初襲父官為淮東大都督知揚州元貞改元轉台州路十年總管衢州路延祐三年進通議改徽州路台州土不宜桑官嵗征絲纊於民民轉市於他所霽請止輸其直民甚便之或言郡産白金可以充貢行省命霽行視霽曰此作俑以害民者也力言無有議遂寢他若賦役之苛鹹鹺之擾纎悉委曲皆為條約以釐正之台人以為德黄巖嵗饑霽曰捄灾恤民守臣職也俟報而發民無餘矣亟出官粟賑之全活萬人海有劇賊數百恣行剽掠舟人患之霽擒制渠魁置於理餘黨聞之皆潰衢之西南黄陵堰溉田數百萬頃霽曰此農政先務也庀工完之霽所至廉平政理名聲流聞吏民愛慕豪強畏服趙雲甫台州府志元貞二年以武略將軍知黄巖州事時擬於黄巖置戍雲甫以密邇台營力陳利病議遂寢趙敏中台州府志大德元年任仙居縣尹明而能斷人皆服之凡利所當興者無不竭力以舉必得實効乃止有古循吏風韓國寶赤城新志以武略將軍知黄巖州事修學宫平寃獄興水利茂巴爾台州府志大德六年以奉訓大夫為黄巖州達嚕噶齊潔已奉公得守臣體去十年父老作去思碑於澄江劉慶赤城新志大德十年任天台縣尹鐫累朝勸學詔㫖以勵生徒佟復台州府志東平人皇慶元年任天台縣尹多恵政修儒學浚九女砩渠通水灌田民獲其利呼為佟公渠白凱赤城新志泰定三年以奉訓大夫知黄巖州事嚴明鎮靜吏民懷之王居敬赤城新志至順三年以亞中大夫為台州總管清修苦節視民如子置中津橋田以絶吏姧台民賴之月彦明台州府志元統中為台州錄事司達魯噶齊縣未有學首建孔子廟延儒士為之師以教後進林興祖台州府志字宗起福州人以進士為黄巖州同知廉而愛民境内大治有循良聲張元永台州府志字文逺東安人至正十年任臨海縣尹興學校禮髙年均力役民有訟諭之和頑不服者始刑之時行郊野集民間子弟與論耕桑樹畜謹身孝養之道嵗旱請蠲租上官以文折之元永力爭乃得免每平反大獄民頌其德既去立石思之周璉天台縣志字國器由進士令台剛介有守政聲大著陞本府通判趙琬元史趙璉傳琬字仲德仕至台州路總管至正二十七年方國瑛以舟挾琬至黄巖琬潛登白龍嶴舍於民家絶粒不食人勸之食輒瞑目卻之七日而死明范明敬赤城新志湖廣人洪武元年知台州府時海寇陳敬仲肆掠鄉邑一境騷動僚佐皆驚愕失措明敬曰母恐吾當自行即至栝蒼募民兵𠞰平之唐宏赤城新志洪武元年知黄巖州修政立事愛民禮士境内帖然王士𢎞史槩潞州人寧海縣知縣洪武七年海警吴楨領沿海各衛兵出捕往浙東收籍方氏台温明三郡故兵三郡亡賴挾私逞怨蔓引平民富家為兵瀕海大擾士𢎞曰誣良民為兵不可吾寧獲罪死當為民請命即上封事言狀辭甚懇切上即日詔罷之三郡之民賴以復安芮麟史槩字志文宣城人洪武間以太學生授台州知府明於治體吏民畏服嘗詿誤被逮父老泣送境外交遺之金不受後以薦授建寧知府唐伯逸赤城新志南昌人洪武間為仙居尉涖政公亷撫民有術嘗歎曰若取小民財物如鷺鷥股上割肉後陞縉雲知縣周公輔名山藏為寧海丞邑有瀕海塗田五十餘頃不勝税公輔為民請命未施行復奉檄役民二萬為象山縣築隄黄巖縣浚河公輔曰吾縣當築當浚者殊多嵗乏不易無敢輕役乃役民為旁縣乎復欲以聞同官曰君奏未行又再奏耶公輔歎曰古有屍諌死吾身而有救於民庶上聞之乎遂雉經於官舍王輝赤城新志河南人洪武中以監察御史知台州府不攜家屬獨與父俱僕隸給薪水之餘不留於舍為政廉明嚴毅吏畏其威民懷其惠張源萬厯寧海縣志成都人洪武中寧海縣丞先是邑税虧兑自源到追徵有方以時完足陞戸部主事吴仲勝赤城新志洪武間為台州推官貌恭而言訥郡守髙璞初甚易之旬日間淹獄悉理人皆服其明恕時僚佐競為奢靡仲勝獨以虀鹽自甘公退惟讀書而已龎惟方赤城新志洪武十二年知臨海縣為政平恕民有爭訟必從容諭之使之自服舊浙江通志陜西延安人督造海船徭役咸有條理民不知擾王謙赤城新志南昌人任臨海丞居官清慎愛民如子信國公湯和按郡獨加稱賞去官之日行李蕭然父老多追贐之一錢不受周悌萬厯黄巖縣志福寧人洪武三十年以監生知縣事德性淳厚政平訟理勸農桑興學校民咸思之張誠台州府志字則民安仁人洪武三十二年由監生任天台縣丞催科平涖事敏以民病累嵗逋賦佐令張時習請於朝得折鈔民甚德之陞臨海縣令任滿陞治中出守交趾王英寧海縣志蘇州人知寧海縣斷獄明決人不敢欺先是嵗洊飢邑多盜英至望風潰散厯官山西按察使張時習天台縣志樂平人洪武三十二年令天台修學宫繕城隍民不知勞秩滿去老幼攀轅不忍别江恕明一綂志永樂初台州知府有惠政嘗建言水利及軍衛儲糧之弊民甚便之康彦民嘉靖浙江通志江西泰和人洪武進士永樂初為天台知縣罷官家居宣德初巡按御史至天台民二百人言彦民廉公有為乞復召為縣以慰民望御史以聞吏部言彦民罷官十餘年難從所請帝曰其人罷去久民猶欲之必有政事及民召用為江寧丞張約仙居縣志曹縣人永樂元年由太學生任仙居縣居官精勤始終著清節慈祥不苛民甚德之戴新赤城新志山東人永樂初由進士知台州府勤儉公平有循吏名終雲南布政使魏澤世法錄字彦恩溧水人有學行謫寧海典史逮捕方孝孺藏其幼子以故方氏有遺種謝遷詩所謂孫枝一葉是君恩也鄭光與天台縣志永樂間知天台縣事居官不擾節冗費省徭役民甚便之殷序萬厯黄巖縣志無錫人永樂中以進士知黄巖縣廉潔仁恕政事修理士民頌聲不絶厯陞江西四川雲南布政使周旭鑑獻㣲録貴溪人知黄巖迎者待界上旭鑑已潛入邑中盡得諸豪主名一日坐庭中召諸曹與定約束未數月紀綱設張衆相戒勿犯文廟毁於颶師生處草屋數椽撤而新之奏減軍糈及風傷田禾度逋税不能償者達於監司請代以鈔編戸貲産髙下之數悉籍記之於是賦平徭均逃移復業民飲苦鹹而病乃鑿山引泉入市以便民汲縣北利涉橋久廢不葺往來濟以舟遇漲多覆旭鑑輒復之西鄉山多虎捕之不獲過一祠因與神約厥明虎不獲且焚祠是夜夢神吿虎所在如其言往虎皆就戮嵗甲寅大旱禱三日而雨槁苗復甦是嵗民間麥秀五穗桑生駢枝又有靈芝及一乳三子之祥邑士大夫因繪四異圖以紀其事陞台州府通判仍掌黄巖縣事賜璽書有廉潔公勤之褒正綂甲子台守以事罷闔郡軍民上章願補旭鑑上特從民請涖政一如在黄巖時而崇禮教飭信令正已勵下興學舉賢尤注意焉嵗己巳處州山寇葉宗留倡亂朝廷命將𠞰之勅旭鑑督義兵往贊其謀既行台民屢疏請還旭鑑以處郡據栝蒼之險奏置巡檢司増兵防禦時鄰郡皆騷動獨台晏然陞浙江布政司右參政仍掌府事卒台人立祠以祀之程賢赤城新志真定人宣德間由監生以刑部員外郎知台州府時郡城軍強民弱賢繩以法軍以更漏虐民乃更建齊政樓俾民司之衛不得奪郡有三闗中津屯頭闗嶺皆軍為之暴悉革去之童文台州府志應天人以進士任監察御史宣德間知臨海縣事涖下端嚴存心坦易尤持以勤恪嘗奏寛官田租以舒民力興廢舉墜不勞而集丞簿以下惟仰成而已謝恂嘉靖浙江通志武進人宣德三年以監生知臨海縣事一介不取於民自奉甚薄日再食明發眎事夜分而退民以事至庭諄諄戒諭凡利當興蠧當去者沮以權力勿顧也後知平陽府劉剛台州府志江西泰和人正綂四年知臨海縣每昧爽眎篆必戴星始罷外户肅然苞苴杜絶嘗捐俸修文廟葺中津浮梁役興而民不知擾時霖雨害稼積誠以禱俄頃而霽阮勤台州府志交阯人由進士以大理寺正擢知台州府事修學校建鄉賢祠及上蔡書院厯刑部侍郎致仕張韶赤城新志景泰中知寧海縣適嵗大飢民多殍韶先發預備倉賑之然後奏聞又抽已俸煮糜粥以食之存活甚衆劉忠舊浙江通志山東人天順間以監察御史知台州廉明端方不阿勢要任久有惠政仕終副都御史孔彦綸赤城新志句容人宣聖之裔由舉人天順七年為台州通判廉而愛民始終一致秩滿卒於官貧無以殮民爭賻之郭紳史槩字廷章宜春人成化乙未進士授寧海知縣方孝孺縣人也事淹國禁紳至首刻正學集創祠祀之擢御史厯南京刑部右侍郎袁道台州府志字德純吉水人成化十年由進士任太平知縣涖政廉平視民患如在已有強盜誣指應華等二十三人司府已鍛煉成獄道力為辨理至以去就決之華等得白備倭張勇以沿海倉糧腐折責償於民郡縣莫敢後道獨與抗曰糧在倉而責之民吾官可去實不能以是令民張亦無如之何黄巖縣界有賊殺捕盜官姜昕民驚悸幾激變道亟至其地招諭之曰獨殺人者死耳無憂也民以不擾豪民持官府短長武斷鄉曲者悉寘之法新學校建鄉賢祠行保伍法糾察姧宄廉請耆宿主鄉約月朔呈報善惡以示勸懲布衣有行誼者必躬禮其廬疏治迂浦閘興水利嵗以大穰邑西樂清民聞其風皆願屬乃奏割東南六都隸焉仕終監察御史褚祚台州府志字昌應常熟人成化十年以進士知臨海縣持身涖職動有準繩修學校築堰閘理橋梁多著成績而財無浪費民甚德之陞御史常熟縣志臨海縣有嶺雨三日淖陷則米薪斷絶民有飢者祚發工調役治之雨不為患邑人名其嶺為褚公嶺葉䞇台州府志山陽人由進士成化十八年知台州府廉靜守已治民以仁愛甲辰嵗歉民税無措力為奏免民賴以生以憂去仕終副都御史范亮太平縣志甌寧人成化十九年任太平縣丞慈祥廉慎勤恤民隱署邑事修學宫兩廡繕治鎮東橋嵗旱素食草履祈禱甘雨如注罷官日貧無以歸父老相率贐之一無所受張𢎞宜寧海縣志字時措華亭人進士成化十八年任寧海知縣明察剛斷大家怙勢作威者縮首斂跡而小民為之吐氣詞牘累幅一覽而盡裁答無遺黠吏無所措其手錢本弟寧海縣志四川人寧海典史有幹才時邑人穆惟英恃勇殺人聚徒象山依憑險阻大行剽掠人莫敢當其鋒本弟假道襲捕擒之百姓安堵戴韶寧海縣志任寧海典史清慎有為寧海故有坍壓田土該糧三千七百石民苦浮賠韶疏於朝每米一斗折納銀三分七釐糧不虧額而民稱便江澂寧海縣志字景吴江西南城人進士𢎞治元年知寧海縣涖事公勤每日黎明必北向再拜而出臨民以誠信為本初瀕海民苦坍江塘税澂覈一邑之田得欺隱及新墾五百餘畝充補糧額民得少甦後陞僉事陳釗臨海縣志䝉城人𢎞治三年以舉人知臨海縣政尚簡靜一儒生與宦族有爭竟以理折勢莫能撓之刑清賦省在任十年閭里宴然方印舊浙江通志字與信桐城人𢎞治間知天台廉以潔已仁以愛民闔邑利弊靡不興革甫一嵗教化大行卒於官囊俸僅八銖父老咸咨嗟嘆息建祠繪像祀之陳相舊浙江通志泰州人𢎞治間知台州府守已以廉撫下以仁任内屢獲豐年積穀殆將十萬舉廢備賑人皆德之陸琪舊浙江通志吴縣人𢎞治中同知台州剛毅而濟以寛嘗署府符事無停滯尤注意學校秩滿去民擁留之母恩台州府志蓬州人𢎞治十三年以進士知臨海縣剔弊補漏政令一新尤加意學校親為諸生講解輯頒家禮戒飭懃懇人樂從之陞監察御史劉弼太平縣志字邦直華隂人𢎞治十六年由進士任太平縣政事以袁道為師表修學校清刑獄勸農桑民翕然稱之調知黄巖馬岱台州府志江都人進士𢎞治二十年知台州府恩澤及人甚溥民以疾病來雖冗沓必與以良劑貧不能𦵏者助之府治及兩學改作一新於民無擾盧英台州府志由黄巖縣調知太平清約端嚴一如治黄以事至司府及行都鄙皆自賫饟具一不以煩民審里徭役甚均尤詳於治獄催科第嚴限程不事箠楚顧嚴於吏胥及勢要之家一犯科條輒置之法不少貸暇則校試諸生為説作文講書之法考滿上京囊槖蕭然擢户部主事張羽萬厯寧海縣志字鳳舉泰興人正德進士知寧海縣廉能剛介抑豪右惠困窮風裁凜然行取擢御史劾劉瑾被謫厯官副都御史喻茂堅台州府志字汝礪重慶人正德九年以進士知臨海縣為政持大體在任多所建立去後人思之立碑建祠仕終刑部尚書郁浩台州府志字子淵永州人進士正德九年任天台知縣廉慎明決平徭役恤小民人畏愛之調知西安縣祝𢎞舒舊浙江通志温江人正德間任太平縣綜理有方剖決無滯吏民不敢欺毛馭寕海縣志麻城舉人正德間知寧海厯任九載連遭水旱緩征薄斂勞來安集惠政及民傅清舊浙江通志詔武人正德間臨海丞時亢旱禾槁清䖍禱百神勿應輒自引咎以鐵縲繫頸當午塗拜既而大雨如注張巖臨海縣志彰德人正德間為臨海主簿才識練達每有催科單車厯山谷撫循勸諭不笞一人而課最所司牒委紛至先期事集曹廷桂仙居縣志武進人正德十五年由舉人任仙居縣性廉敏居官七年案無留牘有便民者暮計朝行綽有政績羅僑名山藏字惟升吉水人以進士知台州府興學禮士愷悌宜民訟者至與款語利害多解去嵗時循行阡陌舉冠婚喪祭禮以教民布衣張尺賢而貧僑禮之上坐訪民間疾苦尺具以所聞吿僑為置童僕給侍尊禮之台人多興起者擢廣東參政去獻徵錄台戍衛食倚各郡餉前守漁其中即溢取嗇出之入覲治裝咸苦民僑首除羨餉而覲行自給無他與吏部上守令殿最以僑為第一賜襲衣牢醴旌異之在台建祠祀方孝孺置祀田若干畝毛衢台州府志吴江人嘉靖二年由進士知太平縣明敏有才先是市豪𩔖包攬里徭二役侵漁都鄙衢革去之進田野小民服役公庭教以禮法民悦甚迂浦街有金星閣横湖堂有神祠嵗斂民錢為穿臂會云能消灾致福逺近如歸市衢毁其閣與祠曳神像火之罪主者數人害遂息民苦盜竊選飭游徼捕盜賊知名者悉瘐死獄中尤重學校調永康後官至副使王欽萬厯黄巖縣志候官人嘉靖三年以進士知黄巖縣愛民禮士弊政悉除修葺學宫大興文教周振常州府志武進人正德舉人令天台以興學善俗為首務天台有橋當要道橋長而水湍振禱於神橋成邑人名晉陵橋立祠祀之唐愈賢寧海縣志字子中辰州人嘉靖丙戌進士知寧海縣謁陽明於會稽得良知之學居官惓惓以勸學明道移風易俗為已責至於剔蠧剪弊扶弱抑強均田平徭張施措置悉當人情在任四年民懷吏畏擢南臺御史劉贊萬厯黄巖縣志宣城人嘉靖八年以舉人知黄巖縣廉勤剛正秉法不阿豪右為之屏息人稱劉硬頭陞成都府通判民攀轅不忍釋有赤子泣别碑陶秀台州府志字子實南城人嘉靖十一年由舉人知太平縣先是里役不均田多脱漏秀編造黄籍設為十甲均田之令又清稽脱漏田以充舊額民甚宜之瀕海故多軍衛莊田弗屬編管秀建議立為軍圖三服役視齊民又墊甃道路起皇華息肩二亭築治義塚民益懽悦調髙淳去方介黄巖縣志字子和合淝人嘉靖十七年以義烏令調知黄巖廉公有威痛繩豪右時有琴堂第一方之謠周志偉台州府志字士器南康人進士嘉靖十七年任台州知府大興學校日與士子講解經義時黄太瀕海諸地潮沖閘壞比嵗不登志偉請於御史傅鳳翔特疏建閘又請復河泊大使以司啓閉兩邑自是嵗有秋時有大姓楊某者爭田搆訟累嵗不止志偉親往按視開示大義且諭以詩於是感泣相讓民為勒石頌之張士賢寧海縣志江西人嘉靖間由舉人知寧海縣躬行節儉先德化而後刑罰有古循吏風劉子與台州府志海陽人嘉靖二十一年以進士任臨海令廉幹有惠政黄允謙寧海縣志廣東人嘉靖十年進士知寧海縣初姓黄復鍾姓以經學飭吏治涖事嚴而有法庭無私謁姧民黠吏莫敢欺建社學置社田留心教化陞主事厯官萊州知府胡叔廉台州府志字明發江西新淦人嘉靖十八年以進士知臨海縣時邊海洪潮驟發淹没者數千家叔廉單車走鄉落死者躬親瘞埋被灾者發粟賑䘏全活無數留意學政文廟自正德二年燬暫徙元妙觀叔廉復建於故址廊廡齋舍煥然一新張育才萬厯黄巖縣志壽州衛人嘉靖二十年以選貢為黄巖丞廉介自持公餘即荷鋤藝蔬以自給陞句容令陳堯台州府志通州人嘉靖二十一年任台州知府值兩嵗水患多方拯救廉敏寛仁闔郡德之仕終刑部侍郎髙材黄巖縣志字充甫無錫人嘉靖二十九年以舉人知黄巖縣之官不攜家累止以二力從愛民節費齋廚索然嫉惡如讐姧猾民抵法輒痛繩之性簡亢即權豪不少屈至接士𩔖則脱略勢分有下榻倒屣風會倭變免官民走請於朝留之不得立祠肖像祀之馬濂台州府志字濬卿無錫人進士嘉靖三十年授仙居令為政尚大體存靖難忠臣鄭恕後而復其産倭寇及仙濂率民兵與郡守宋治邀擊之賊遂逸尤著清節去之日父老歌曰民送兩行淚官行一擔書汪汝達黄巖縣志字志行無錫人嘉靖三十二年以進士知黄巖縣自倭變後邑里為墟汝達繕城堞濬河隍建先師廟改淫祠以祀朱子置學田以贍貧生一時興廢舉墜皆有禆政教陞户部主事蔡結臨海縣志字國凝漢陽人嘉靖三十二年由進士任臨海縣時倭寇嵗擾兵興役煩結調度有方事集而民不擾合邑安堵方輅台州府志任太平知縣嘉靖三十二年值倭變無城垣輅營費創築民藉以安林大梁寧海縣志福建同安人由舉人嘉靖庚戌知寧海厯任九載治尚寛平倭寇江浙閩廣四省騷動邑故無城民甚恐大梁力請於當道建築城垣為民保障城甫完倭猝至登城拒守民賴以安胡價台州府志號玉吾宜城人嘉靖四十二年以進士任臨海縣精敏有才略案牘駢集剖決無不適當吏不敢欺民懷其惠陞給事中余城台州府志江西鄱陽人嘉靖四十三年以舉人任仙居令先是邑遭倭變又經城役郡司李蕭文清督責過嚴民財力俱敝城至竭力撫循流氓始集尤不阿權貴務絶請托以中傷去官楊廷表萬厯黄巖縣志甌寧人嘉靖四十三年以舉人知黄巖縣愷悌愛民立丈量法精密不苛而宿弊頓革調東昌去民思之肖像祀焉楊道會黄巖縣志字惟宗隆慶二年以進士知黄巖縣年踰弱冠清約如寒士諳練如素宦吏胥不敢肆其故智徵科第嚴程限不事夏楚窮民積逋悉停之嵗校士精覈復賑其寠者士為奮興禁淹女全活甚衆舊鄉飲賓濫及匪人有司亦以彌文略之道會必得其人造廬禮焉陞户部主事周思稷台州府志號養初湖廣麻城人隆慶戊辰進士知臨海縣慈祥廉靜有古循吏風在邑五年嘗清丈田畝稽核丁口不事察察而人不敢欺又酌定鹽課上下利之陞户部主事向大有舊浙江通志辰州人萬厯間任同知在台五載嘗三攝郡篆有守有材人稱古之遺愛武煒台州府志台州府知事壬子倭入黄巖焚刦時承平日久聞者皆股栗欲竄煒獨挺身率兵往援至釣魚嶺倭設伏山谷間力戰不勝遇害事聞贈太僕卿建愍忠祠於巾子山春秋致祭曹學程舊浙江通志字希明全州人令寧海以厚風俗阜民財興學校為己任逾年百廢具舉時有芝生麥岐之瑞頌聲四訖擢屯馬御史王演疇寧海縣志字孟箕彭澤人萬厯壬辰進士為寧海令下車即建社倉廣養濟院又因南觀廢址闢為緱城書院増置學田四百餘畝俾邑士子肄習於中後知桂林府致仕湯聘尹台州府志江南長洲人進士授給事中萬厯十年出為仙居令為治務節冗費并里甲濬水利改舖舍有利於民者圖之惟恐不及民甚戴之吴正大台州府志休寧人萬厯九年為仙居主簿剛介自持不媚權貴攝縣事併課清丁法良意美大僚子姪殺人必得其人以置諸法時稱天下清官第一周孔教台州府志號懷魯江西臨川人萬厯庚辰進士十二年知臨海縣性敏操卓經畫皆可垂久義倉社學次第舉行治以教養為先向來所需器具辦自坊長日用資於館戸孔教一切革去皆官自庀設不以一毫累民治事暇與諸生講學論古一時士習丕變後擢御史張邦翼寧海縣志號軫南蘄水人以進士知寧海縣時西郭外洚水齧城率民修砌壩堰至今賴之築勢馬山㙮以培文脈調繁臨海晏文輝台州府志字懷泉南昌人進士任太平知縣修祭品葺學宫俱捐俸為之絲毫不取於民躬迎耆老以勵俗請表貞婦以維風士民皆翕然向化至鋤姧除猾風烈矯矯循河造舟濱海除道美政甚著顔欲章寧海縣志安福人萬厯中由進士知寧海縣處心恬靜與民休息以北門濠水直瀉不利於邑改抱城闉布橋以通往來調繁嘉興士民挽留不獲遂於濠畔置祠名曰顔公河厯浙江布政使周家棟台州府志號鶴陽黄安人萬厯己丑進士知臨海清理徭役弊剔而民懷之課士論文決科第皆不爽邑之儒習彬彬焉築湖隄尤利及永久陞御史巡鹽本省老穉逺近數百里擁馬足歡呼曰此我曩時父母也翁仲益太平縣志字受甫晉江人由進士任太平縣值嵗飢即請緩征賑濟天旱每禱輒應旦出視事吏人持文牒鵠立無一敢窺伺者後調繁去王明嶅舊浙江通志晉江人萬厯中知仙居冰蘖茹飲不以一錢自汚時有簿曾學周南豐人以廉能稱相得助理張𢎞代天台縣志靈壁人萬厯二十二年任天台縣識度凝重操守清廉興利革弊常修邑志以循良擢户部主事汪夢説台州府志貴州人萬厯二十六年以舉人知仙居縣禮士愛民修明倫堂其政與王明嶅相上下時有間架之税夢説以民貧強頃不奉法郡守強之不能得王孫熙天台縣志華亭人萬厯二十九年以進士知天台縣公廉慈惠練達精敏陞大理寺評事民戀不忍釋後陞本府知府擁道懽迎焉李應祥台州府志號雨亭無錫人萬厯丁丑進士戊寅任臨海令清白自矢時倭亂後水荒相仍應祥朝夕拮据殫心撫字賑濟全活者數千家諸所經畫如定條鞭除糧長釐夙弊一十四條皆斟酌盡善時論謂清慎勤三善實兼有之後陞主事林光庭寧海縣志字仲明莆田人萬厯進士任寧海縣敷政寛平而御下嚴肅尤鋭意作人増修齋館政餘就義學談藝勸課復創建文昌閣置田供祀厯陞武昌知府胡懋道寧海縣志寧鄉人任寧海丞兩署邑篆清火耗革常例邑偶飢民赴府市米驛宰每肩索米少許懋道廉知之遂懲其役復達上官禁諭之後陞濟寧州判吴絅台州府志字内闍増城人萬厯甲寅以舉人知黄巖縣至即誓於神勿私入一錢嵗祲不忍追呼府檄趲軍餉甚急民恐負秉燭爭輸不終宵有溢其額後左遷福建都事尋改樂清諭任滿經黄巖客舍百姓相與扶輿入公館拜謁者日以千數擁傳不得行胡來聘天台縣志全州人萬厯三十八年任天台縣廉介慈和精密果毅吏服神君民歌父母尤加意黌宫主持風教士民佩德焉喬時英台州府志上海人萬厯進士任臨海縣宅心仁厚清望峻絶除蠧剔姧積弊盡革卒於官王國材舊浙江通志號椒邱上海人初知黄巖調繁臨海賢聲如一適巡眎邊海方回以亢旱連晨步禱行至縣門而卒唐世輔台州府志桂林人舉人天啟壬戌知黄巖縣時里役苦於解餉下車即革去以官封運解嵗省費甚多胡接輝舊浙江通志江西廬陵人天啟中知天台清介禔躬仁慈接物嘗講學友仁堂捐俸緩修文廟秩滿陞御史陳起龍舊浙江通志海澄人天啟間仙居令凡訟者以善語解之民愧悔乃罷日與文士講學譪如家人去之日囊槖蕭然謝堅台州府志字用礪信豐人天啟五年以舉人任太平縣里役舊有陋規嵗輸無名之賦堅於正項外一無所取汰冗役嚴保甲繕城隍善政具舉崇禎三年陞員外郎李天秩台州府志號止菴雲南人由省薦授台州司理明末吏治刓敝天秩至廉積猾鉅蠧數輩立置之法問民疾苦如負重病在身興除不旦夕緩同官太守性嚴急於人不少貸一日語微侵天秩天秩曰節推法官也公已代專之何忍更為束濕太守愧謝自是事可否必咨天秩而後行直指檄同巡厯所過積牘如山頃刻裁之各愜其情而去務矜全小𤯝原而出者郡必十數人至墨吏大豪論竟如律雖威刦利誘屹如也事畢裹糧他去不費縣官一粟前後直指上其治行第一轉兵馬司指揮去之日單騎襆被鬻書史以自供百姓環馬足泣者數萬人後遷兵部主事劉士名舊浙江通志潁州人崇禎間黄巖令為政嚴肅晨起放衙左右却立案側㒺敢抱不急之牘以進大庭之上儼若神明攝太平篆政如治黄蔣鳴玉台州府志字楚珍金壇人崇禎丁丑進士任台州司理諸所釐剔皆有聲講明理學與諸生課藝論文指授矩度以台郡解額頗減植南北兩山䕃木以培地脈時臨邑周令壽明亦雅意作人與鳴玉所賞識者皆後先得雋馬鳴霆台州府志字瑞霞楚雄人領鄉薦崇禎十六年知黄巖縣吏治明敏理紛錯如抽絲校士尤虛心檢閲各因其材造就之明年海門兵譁進掠監司内署隨至黄巖不犒譟擾衢巷鳴霆陽為款慰授計捕兵合衆殱逐民賴以安陞刑部主事國朝李士𢎞台州府志字仔肩河南磁州人順治五年由貢生任台州推官性廉介執法不少徇時台初定悍弁縱恣士𢎞一繩以法城鄉之人始獲帖席仙居防將趙德悍而黠隂令所俘盜扳報平民會巡撫蕭起元檄士𢎞涖仙居督師趙畏其節制不敢恣民咸相吿曰李公生我及去任出郊數四輒為士民擁選不得行者累月至新昌為賊所害崇祀名宦鄭之文舊浙江通志字衷素山東臨清籍休寧人武進士任台巡道中軍康熙十三年馬信内叛執署道傅夢籲於興善門城樓之文抽刀欲救其黨自後踣之為所縛既而以計脱歸十四年城陷之文自誓殉國先令二妾投繯賊執之文去終不屈遂被害事聞廕一子世襲拖沙喇哈番徐化成舊浙江通志順天昌平州人順治八年由貢生知台州府寛徵省役與民休息奉母至孝一切笞杖不敢妄施悉遵母訓台州府志化成字文侯為人謙恭平恕甫下車值亢旱䖍誠步禱甘霖隨沛鎮兵月糧偶缺譁於途檄催黄太二邑米暮夜適至兵利在舟即給化成慮有變詣江滸運貯天寧寺倉猝夫不繼化成徒步率衆役挽攜百姓聞之爭先來助頃刻而畢升合無耗陞山西岢嵐道副使仕至湖廣巡撫蔡含靈舊浙江通志字子虛北直寧晉人順治丁亥進士知天台縣居官清慎有經濟才時值寇警團練鄉勇多方招撫山寇悉平凡遇經過官兵區置得宜民賴以安秩滿陞工部主事厯河南睢陳道劉登科舊浙江通志遼東人順治十三年由監生知舟黄巖縣十四年海䑸陷城脅降不從繫之入再脅終不屈遂縛投三江水中士民哀之張中選名宦留祀冊字龍城湖廣羸州人康熙二年由生員特授黄巖知縣在任八年利興弊革多方開墾以安集流民廣設粥厰以賑恤灾黎寛刑減耗建造學宫振興文教趙廷錫名宦留祀冊膚施人順治辛丑進士康熙九年知天台縣興起學校會文課士親為評閲公編審平徭役革弊政申減水衝虛税灾荒賦額民沾實惠修邑志未竣以憂去周貴台州府志號榮吾直隸東寧衛人康熙十年任台州副將在台三載捍衛封疆海䑸逺遁舊時軍中買穀辦料及油薪荼炭之屬無不取資民間貴悉除去申飭軍令凡官兵借住民房務令主客相安強横者置之法民為勒石紀德王鑄鼎台州府志字象九瀋陽人例監生康熙十三年知臨海縣時寇盜充斥援旅雲屯鑄鼎掘濠築屯親冒矢石辦餉給夫及寇退繪圖祈賑陳疏籲蠲立催科之法止查花户完欠除去現年圖差名色民稱利便以積勞成疾卒於官年僅二十五閆福玉表忠冊青州安邱人任黄巖鎮標左營遊擊康熙五十一年輪防北洋海汛五月二十三日遇海賊陳尚義於牛頭門力戰陣亡營兵王一倫柯國柱等五十四人同被害事聞贈副將廕一子閆灝以守備用王一倫等俱加䘏賞浙江通志卷一百五十四
