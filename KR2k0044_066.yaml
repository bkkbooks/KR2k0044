body:
  text: 欽定四庫全書浙江通志卷六十七田賦一夏后氏任土作貢歴代因之雖田制或有不同而則壤成賦之規未之有易國朝寛恤之政度越前古頒定賦役全書略凖唐兩税法而盡除其弊復荷皇仁蠲免嘉湖二府額徵十分之一永著為例則尤浙省曠代未遇之殊恩也志田賦國朝順治十四年九月初四日世祖章皇帝頒示賦役全書序朕惟帝王臨御天下必以國計民生為首務故禹貢則壤定賦周官體國經野法至備也當明之初取民有制休養生息至萬厯年間海内殷富家給人足及乎天啓崇禎之世因兵增餉加派繁興貪吏緣以為奸民不堪命國祚隨之良足深鑒朕荷上天付託之重為生民主一夫不獲亦疚朕懐凡服御膳羞深自約損然而上帝祖宗百神之祀軍旅燕饗犒錫之繁以及百官庶役餼廩之給罔不取之民間誠恐有司額外加派豪蠧侵漁中飽民生先困國計何資兹特命户部右侍郎王𢎞祚將各直省每年額定徵收起存總撒實數編撰成帙詳稽往牘叅酌時宜凡有參差遺漏悉行駁正錢糧則例俱照萬厯年間其天啓崇禎時加增盡行蠲免地丁則開原額若干除荒若干原額以萬厯刋書為準除荒以覆奉俞㫖為憑地丁清核次開實徵又次開起存起運者部寺倉口種種分晰存留者欵項細數事事條明至若九釐銀舊書未載者今已增入宗禄銀昔為存留者今為起運漕白二糧確依舊額運丁行月必令均平胖襖盔甲昔解夲色今俱改折南糧本折昔留南用今抵軍需官員經費定有新規會議裁冗改歸正項夲色絹布顔料銀硃銅錫茶蠟等項已改折者照督撫題定價值開列解夲色者照刋書價值造入每年督撫確察時值題明填入易知單内照數辦解更有昔未解而今宜增者有昔太冗而今宜裁者俱細加清核條貫井然後有續增地畝錢糧督撫彚題造册報部以憑稽核綱舉目令勒成一編名曰賦役全書頒布天下庶使小民遵兹令式便於輸將官吏奉此章程罔敢苛斂為一代之良法垂萬世之成規雖然此其大畧也若夫催科之中寓以撫字廣招徠之法杜欺隠之奸則守令之責也正已率屬承流宣化覈出納之數慎那移之防則布政司之責也舉亷懲貪興利除害課殿最於荒墾昭激揚於完欠恪遵成法以無負朕足國裕民之意則督撫之責有特重焉其敬承之毋忽全省總額原額田貳拾㭍萬玖千伍百伍拾肆頃壹拾貳畝貳分叄釐貳毫捌絲㭍忽壹微㭍塵康熙六年丈缺田壹千貳百肆拾㭍頃㭍拾畝貳分陸釐捌毫捌絲陸忽捌微伍塵玖渺加歴年新陞田伍百玖拾頃㭍拾叄畝叄分伍釐叄毫肆絲㭍忽肆微陸渺壹漠叄埃肆纖貳沙除新城上虞江山餘姚四縣水冲坍没田并各屬耤田共㭍拾玖頃捌畝叄分玖釐捌毫肆絲貳忽又除常山富陽麗水仙居四縣丈缺田壹百捌拾玖頃陸拾壹畝㭍分捌釐玖絲玖忽㭍微㭍塵捌渺又除仁和海寧二縣建築土備塘堤及東西二塘挑土挖掘田壹拾玖頃捌拾陸畝貳釐陸毫伍絲伍忽共該田貳拾㭍萬捌千陸百捌頃伍拾玖畝壹分壹釐壹毫伍絲玖微叄塵玖渺壹漠叄埃肆纖貳沙額徵銀貳百肆拾萬伍千貳百叄兩肆分陸釐伍毫伍絲㭍忽壹微㭍塵叄渺肆漠㭍埃玖纖壹沙額徵米壹百貳拾叄萬壹千叄百肆拾石貳斗壹升壹合肆勺陸抄玖撮陸圭伍粟陸粞玖糠壹粃歴年除荒棄田貳萬捌千捌百玖拾伍頃肆拾貳畝貳分伍毫叄絲叄忽玖微㭍塵捌渺歴年加開墾陞科田壹萬貳千陸百捌頃捌拾玖畝㭍分捌釐貳毫貳絲叄忽㭍微雍正六年嘉湖二府屬奉特恩減免錢糧十分之一内除田銀㭍萬壹千伍拾兩玖錢肆分玖釐㭍毫壹絲叄忽㭍微玖塵陸渺㭍漠肆埃伍纖貳沙雍正拾叄年實在田貳拾陸萬貳千叄百貳拾貳頃陸畝陸分捌釐捌毫肆絲陸微陸塵壹渺壹漠叄埃肆纖貳沙實徵銀貳百貳拾壹萬伍千㭍百㭍拾陸兩陸錢玖分陸釐捌絲玖忽壹微伍塵肆渺㭍漠壹埃叄纖陸沙實徵米壹百貳拾貳萬肆千伍百陸拾肆石陸升捌合玖抄捌撮叄圭陸粟壹粒陸黍伍粞壹糠肆粃温州府永嘉樂清瑞安三縣歴年報墾塗田共叄百㭍頃伍拾伍畝伍分貳毫貳忽共徵銀壹千伍百貳拾壹兩玖錢貳分肆釐肆毫捌絲伍忽叄微玖塵叄渺壹漠捌埃共徵米貳百肆拾捌石肆斗㭍升貳合貳勺㭍抄陸撮叄圭肆粟肆粒捌黍貳粞寧波府定海縣金塘蓬萊安期三鄉歴年開墾田共肆百叄拾頃捌拾貳畝玖分貳釐㭍毫壹絲捌忽共徵銀壹千㭍百貳拾肆兩貳錢壹分壹毫捌忽玖微肆塵共徵米叄百陸拾肆石伍斗陸升壹合㭍勺貳抄貳圭伍粟叄粒原額地陸萬壹千捌拾壹頃貳拾叄畝㭍分壹釐壹毫玖絲㭍忽叄微貳塵伍渺康熙六年丈出地貳千捌百貳拾肆頃陸拾玖畝㭍分㭍釐玖毫伍絲貳塵伍渺加歴年新陞并富陽麗水二縣丈增共地伍百叄拾捌頃壹拾壹畝伍分伍釐玖毫陸絲玖微玖塵壹渺陸埃陸纖叄沙除滿營界墻地捌頃捌拾叄畝伍分捌釐壹毫叄絲玖忽又除嘉興餘姚桐廬山隂東陽會稽嵊縣等七縣地改為田塘除地伍頃捌拾陸畝貳分陸毫肆絲伍忽又除江山餘姚二縣水沖坍没地并農壇錢局乍浦營房基地共玖頃玖拾陸畝壹分㭍毫㭍絲叄忽又除海神廟雲林寺基地壹頃叄拾捌畝叄分壹毫叄絲肆忽又除仁和海寧二縣建築土備塘堤及東西二塘挑土挖掘地叄拾貳頃叄拾陸畝㭍分伍釐玖毫㭍忽共該地陸萬肆千叄百捌拾伍頃陸拾肆畝玖釐伍毫壹絲叄微肆塵壹渺陸埃陸纖叄沙額徵銀貳拾陸萬捌千貳百捌拾㭍兩叄錢伍分陸釐㭍毫肆絲玖忽玖微陸塵伍渺肆漠玖埃玖纖捌沙額徵米壹拾壹萬陸千㭍百㭍石陸斗壹升捌合貳抄叄撮肆圭捌粟捌粒貳黍叄粞玖糠肆粃歴年除荒棄地陸千貳百玖拾頃㭍拾㭍畝叄分叄釐叄毫㭍絲陸忽叄微陸塵㭍渺肆漠歴年加開墾陞科地貳千叄百壹拾㭍頃玖拾伍畝肆分伍釐肆毫陸絲貳忽貳微肆塵雍正六年嘉湖二府屬奉特恩減免錢糧十分之一内除地銀㭍千叄百伍拾肆兩玖錢玖分肆釐伍毫壹絲玖忽陸微伍塵陸渺叄埃陸沙雍正十三年實在地陸萬肆百壹拾貳頃捌拾貳畝貳分壹釐伍毫玖絲陸忽貳微壹塵叄渺陸漠陸埃陸纖叄沙實徵銀貳拾肆萬叄千貳百叄拾玖兩肆錢㭍分叄釐伍毫伍絲陸塵肆渺壹漠伍埃伍纖叄沙實徵米壹拾壹萬伍千玖百肆拾肆石壹斗陸升陸合肆勺陸抄叄撮壹圭㭍粟捌粒㭍黍貳粞肆糠捌粃温州府瑞安縣歴年報墾塗地共陸頃叄拾貳畝陸分壹釐共徵銀貳拾伍兩伍錢捌分壹釐㭍毫叄絲陸忽捌微壹塵伍渺貳漠叄埃㭍纖貳沙共徵米壹拾伍石捌斗伍升肆合貳勺壹抄捌撮壹圭捌粟肆粒㭍黍陸粞貳糠陸粃原額石門縣告陞地壹拾肆畝陸分壹釐其額徵銀於雍正六年奉特恩減免錢糧十分之一除銀壹錢肆分叄釐伍絲貳忽叄微伍塵肆渺雍正十三年實在地數同前實徵銀壹兩貳錢捌分㭍釐肆毫㭍絲壹忽壹微捌塵陸渺實徵米壹石捌斗陸升貳合陸勺捌抄㭍撮叄圭肆粟寧波府定海縣金塘蓬萊安期三鄉歴年開墾地共貳百肆拾捌頃貳拾陸畝伍分㭍釐叄毫叄絲叄忽共徵銀玖百玖拾兩伍錢捌分貳毫㭍絲伍忽捌微陸塵㭍渺共徵米壹百伍拾壹石肆斗肆升貳合玖抄㭍撮叄圭壹粟叄粒原額山壹拾貳萬㭍千肆百陸拾玖頃肆拾叄畝伍分肆釐貳毫㭍忽康熙六年丈缺山叄百捌拾陸頃㭍拾陸畝肆分捌釐陸毫貳絲壹忽伍微加歴年新陞并常山麗水二縣丈增共山貳百壹拾肆頃壹拾伍畝玖分㭍釐叄毫㭍絲叄忽捌微除蕭山會稽嵊縣等三縣山改為田除山壹拾肆畝捌分叄釐肆毫又除乍浦營房雲林寺基地山肆拾叄畝玖分㭍釐叄毫又除富陽縣丈缺山叄頃伍拾叄畝玖分伍釐陸毫肆絲肆忽又除海寧縣建築土備塘堤挑土挖掘山壹畝肆分肆釐共該山壹拾貳萬㭍千貳百玖拾貳頃陸拾捌畝捌分貳釐陸毫壹絲伍忽叄微内太平縣官山叄拾壹頃玖拾壹畝陸分玖釐捌毫㭍絲例不起科外額徵銀捌萬伍千伍百壹拾伍兩叄錢玖分壹釐捌絲貳微貳塵玖渺玖埃㭍纖額徵米捌千伍百貳拾肆石叄斗伍升叄合㭍勺肆抄捌撮叄圭玖粒捌黍伍粞叄糠歴年除荒棄山伍千肆百捌拾叄頃玖拾伍畝叄分壹釐壹毫捌絲肆忽歴年加開墾陞科山貳千㭍百叄拾貳頃肆拾貳畝陸釐玖毫陸絲雍正六年嘉湖二府屬奉特恩减免錢糧十分之一内除山銀貳千貳百陸拾兩肆錢陸分壹釐㭍毫肆絲叄忽貳微伍塵肆渺㭍漠捌埃玖纖㭍沙雍正十三年實在山壹拾貳萬肆千伍百肆拾壹頃壹拾伍畝伍分捌釐叄毫玖絲壹忽叄微實徵銀捌萬貳千伍百㭍拾貳兩貳錢肆分伍釐肆毫壹絲㭍忽壹微伍塵貳渺叄漠㭍纖叄沙實徵米捌千伍百貳拾肆石壹斗貳升貳合貳勺貳撮伍圭捌粟玖粒捌黍伍粞叄糠寧波府定海縣金塘蓬萊安期三鄉歴年開墾山共壹百捌拾陸頃壹拾壹畝貳分玖釐共徵銀貳拾㭍兩玖錢壹分陸釐玖毫叄絲伍忽原額蕩塘灘河池溪湖潭坎蛤戽共壹萬㭍百㭍拾壹頃壹拾壹畝捌分壹毫玖絲伍忽玖微捌塵伍渺并魚櫃磯壹處康熙六年丈出蕩塘水漊等項肆百陸拾伍頃陸拾㭍畝陸分玖釐㭍絲壹忽捌微陸塵肆渺加歴年新陞蕩塘灘漊并富陽麗水二縣丈增塘共陸拾叄頃㭍拾捌畝壹分叄釐陸絲貳忽伍微除滿營界墻蕩㭍畝壹釐又除桐廬嵊縣塘改為田并仁和縣灌溉耤田池蕩共伍畝貳分伍釐伍毫壹絲伍忽又除常山仙居二縣丈缺塘肆拾肆頃㭍畝肆分伍釐肆毫陸絲玖忽捌微玖塵又除海寧縣建築土備塘堤及東西二塘挑土挖掘蕩漊陸頃壹拾貳畝肆分陸釐陸毫叄絲肆忽共該蕩塘等項壹萬壹千貳百伍拾頃貳拾伍畝肆分叄釐㭍毫壹絲壹忽肆微伍塵玖渺并魚櫃磯壹處額徵銀壹萬玖千肆百肆拾捌兩陸錢伍分叄釐玖毫壹絲伍忽叄微伍塵㭍渺貳漠叄埃捌纖伍沙額徵米壹萬貳千㭍百捌拾貳石壹斗貳升肆合叄抄捌撮貳圭陸粟叄粒伍黍玖粞伍糠歴年除荒棄蕩塘等項共貳百貳拾壹頃壹拾畝壹分玖釐伍絲壹忽歴年加開墾陞科蕩塘等項共玖拾陸頃畝貳釐壹毫叄絲肆忽雍正六年嘉湖二府屬奉特恩減免錢糧十分之一内除蕩塘等項銀肆百㭍拾叄兩㭍分貳毫貳絲貳忽陸微叄塵㭍渺陸漠玖埃柒纖玖沙雍正十三年實在蕩塘等項共壹萬壹千壹百貳拾伍頃壹拾伍畝貳分陸釐㭍毫玖絲肆忽肆微伍塵玖渺并魚櫃磯壹處實徵銀壹萬捌千捌百叄拾貳兩壹錢壹分肆釐玖毫叄絲陸忽㭍微捌塵陸渺捌漠叄埃貳纖壹沙實徵米壹萬貳千㭍百肆拾壹石伍斗捌升陸合捌勺陸抄捌圭捌粟陸粒壹黍玖粞陸糠伍粃寧波府定海縣金塘蓬萊安期三鄉歴年開墾蕩草蕩河共捌頃㭍拾壹畝㭍分玖釐叄毫伍忽共徵銀壹拾兩叄錢捌分玖釐捌毫壹絲㭍忽玖微玖塵共徵米貳石㭍斗㭍升捌勺伍抄㭍撮㭍圭陸粟原額永嘉縣蕩坦演水浹等項共貳拾貳頃陸拾陸畝叄分伍釐叄毫伍絲㭍忽加開墾坦㭍拾㭍畝陸分陸釐雍正十三年實在蕩坦演水浹等項共貳拾叄頃肆拾肆畝壹釐叄毫伍絲㭍忽例不起科原額寧波府續墾泰邱鄉田地叄頃肆拾伍畝壹分玖釐貳絲康熙六年丈缺田地伍畝玖分肆釐㭍毫伍絲肆忽實該田地叄頃叄拾玖畝貳分肆釐貳毫陸絲陸忽雍正十三年實在田地數同前實徵銀貳拾兩㭍錢貳分㭍釐㭍毫貳絲陸忽伍微貳塵陸渺原額金華府不等山成田地陸拾壹畝康熙六年丈出山成田地壹頃玖拾貳畝伍分陸釐肆毫實該山成田地貳頃伍拾叄畝伍分陸釐肆毫雍正十三年實在山成田地數同前實徵銀捌兩㭍分壹釐貳毫肆絲伍忽壹微實徵米叄斗壹升壹合壹勺