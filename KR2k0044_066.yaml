body:
  text: 欽定四庫全書浙江通志卷六十七田賦一夏后氏任土作貢歷代因之雖田制或有不同而則壤成賦之規未之有易國朝寬恤之政度越前古頒定賦役全書略凖唐兩稅法而盡除其弊復荷皇仁蠲免嘉湖二府額徵十分之一永著為例則尤浙省曠代未遇之殊恩也志田賦國朝順治十四年九月初四日世祖章皇帝頒示賦役全書序朕惟帝王臨御天下必以國計民生為首務故禹貢則壤定賦周官體國經野法至備也當明之初取民有制休養生息至萬厯年間海內殷富家給人足及乎天啓崇禎之世因兵增餉加派繁興貪吏緣以為姦民不堪命國祚隨之良足深鑒朕荷上天付託之重為生民主一夫不獲亦疚朕懷凡服御膳羞深自約損然而上帝祖宗百神之祀軍旅燕饗犒錫之繁以及百官庶役餼廩之給罔不取之民間誠恐有司額外加派豪蠧侵漁中飽民生先困國計何資兹特命户部右侍郎王𢎞祚將各直省每年額定徵收起存總撒實數編撰成帙詳稽往牘參酌時宜凡有參差遺漏悉行駁正錢糧則例俱照萬厯年間其天啓崇禎時加增盡行蠲免地丁則開原額若干除荒若干原額以萬厯刋書為準除荒以覆奉俞旨為憑地丁清核次開實徵又次開起存起運者部寺倉口種種分晰存留者欵項細數事事條明至若九釐銀舊書未載者今已增入宗祿銀昔為存留者今為起運漕白二糧確依舊額運丁行月必令均平胖襖盔甲昔解夲色今俱改折南糧本折昔留南用今抵軍需官員經費定有新規會議裁冗改歸正項夲色絹布顔料銀硃銅錫茶蠟等項已改折者照督撫題定價值開列解夲色者照刋書價值造入每年督撫確察時值題明填入易知單內照數辦解更有昔未解而今宜增者有昔太冗而今宜裁者俱細加清核條貫井然後有續增地畝錢糧督撫彚題造册報部以憑稽核綱舉目令勒成一編名曰賦役全書頒布天下庶使小民遵兹令式便於輸將官吏奉此章程罔敢苛斂為一代之良法垂萬世之成規雖然此其大略也若夫催科之中寓以撫字廣招徠之法杜欺隱之姦則守令之責也正已率屬承流宣化核出納之數慎那移之防則布政司之責也舉亷懲貪興利除害課殿最於荒墾昭激揚於完欠恪遵成法以無負朕足國裕民之意則督撫之責有特重焉其敬承之毋忽全省總額原額田二拾㭍萬玖千伍百伍拾肆頃一拾二畝二分叄釐二毫捌絲㭍忽一微㭍塵康熙六年丈缺田一千二百肆拾㭍頃㭍拾畝二分陸釐捌毫捌絲陸忽捌微伍塵玖渺加歷年新升田伍百玖拾頃㭍拾叄畝叄分伍釐叄毫肆絲㭍忽肆微陸渺一漠叄埃肆纖二沙除新城上虞江山餘姚四縣水沖坍沒田并各屬藉田共㭍拾玖頃捌畝叄分玖釐捌毫肆絲二忽又除常山富陽麗水仙居四縣丈缺田一百捌拾玖頃陸拾一畝㭍分捌釐玖絲玖忽㭍微㭍塵捌渺又除仁和海寧二縣建築土備塘堤及東西二塘挑土挖掘田一拾玖頃捌拾陸畝二釐陸毫伍絲伍忽共該田二拾㭍萬捌千陸百捌頃伍拾玖畝一分一釐一毫伍絲玖微叄塵玖渺一漠叄埃肆纖二沙額徵銀二百肆拾萬伍千二百叄兩肆分陸釐伍毫伍絲㭍忽一微㭍塵叄渺肆漠㭍埃玖纖一沙額徵米一百二拾叄萬一千叄百肆拾石二斗一升一合肆勺陸抄玖撮陸圭伍粟陸粞玖粳一粃歷年除荒棄田二萬捌千捌百玖拾伍頃肆拾二畝二分伍毫叄絲叄忽玖微㭍塵捌渺歷年加開墾升科田一萬二千陸百捌頃捌拾玖畝㭍分捌釐二毫二絲叄忽㭍微雍正六年嘉湖二府屬奉特恩減免錢糧十分之一內除田銀㭍萬一千伍拾兩玖錢肆分玖釐㭍毫一絲叄忽㭍微玖塵陸渺㭍漠肆埃伍纖二沙雍正拾叄年實在田二拾陸萬二千叄百二拾二頃陸畝陸分捌釐捌毫肆絲陸微陸塵一渺一漠叄埃肆纖二沙實徵銀二百二拾一萬伍千㭍百㭍拾陸兩陸錢玖分陸釐捌絲玖忽一微伍塵肆渺㭍漠一埃叄纖陸沙實徵米一百二拾二萬肆千伍百陸拾肆石陸升捌合玖抄捌撮叄圭陸粟一粒陸黍伍粞一粳肆粃溫州府永嘉樂清瑞安三縣歷年報墾塗田共叄百㭍頃伍拾伍畝伍分二毫二忽共徵銀一千伍百二拾一兩玖錢二分肆釐肆毫捌絲伍忽叄微玖塵叄渺一漠捌埃共徵米二百肆拾捌石肆斗㭍升二合二勺㭍抄陸撮叄圭肆粟肆粒捌黍二粞寧波府定海縣金塘蓬萊安期三鄉歷年開墾田共肆百叄拾頃捌拾二畝玖分二釐㭍毫一絲捌忽共徵銀一千㭍百二拾肆兩二錢一分一毫捌忽玖微肆塵共徵米叄百陸拾肆石伍斗陸升一合㭍勺二抄二圭伍粟叄粒原額地陸萬一千捌拾一頃二拾叄畝㭍分一釐一毫玖絲㭍忽叄微二塵伍渺康熙六年丈出地二千捌百二拾肆頃陸拾玖畝㭍分㭍釐玖毫伍絲二塵伍渺加歷年新升并富陽麗水二縣丈增共地伍百叄拾捌頃一拾一畝伍分伍釐玖毫陸絲玖微玖塵一渺陸埃陸纖叄沙除滿營界墻地捌頃捌拾叄畝伍分捌釐一毫叄絲玖忽又除嘉興餘姚桐廬山隂東陽會稽嵊縣等七縣地改為田塘除地伍頃捌拾陸畝二分陸毫肆絲伍忽又除江山餘姚二縣水沖坍沒地并農壇錢局乍浦營房基地共玖頃玖拾陸畝一分㭍毫㭍絲叄忽又除海神廟雲林寺基地一頃叄拾捌畝叄分一毫叄絲肆忽又除仁和海寧二縣建築土備塘堤及東西二塘挑土挖掘地叄拾二頃叄拾陸畝㭍分伍釐玖毫㭍忽共該地陸萬肆千叄百捌拾伍頃陸拾肆畝玖釐伍毫一絲叄微肆塵一渺陸埃陸纖叄沙額徵銀二拾陸萬捌千二百捌拾㭍兩叄錢伍分陸釐㭍毫肆絲玖忽玖微陸塵伍渺肆漠玖埃玖纖捌沙額徵米一拾一萬陸千㭍百㭍石陸斗一升捌合二抄叄撮肆圭捌粟捌粒二黍叄粞玖粳肆粃歷年除荒棄地陸千二百玖拾頃㭍拾㭍畝叄分叄釐叄毫㭍絲陸忽叄微陸塵㭍渺肆漠歷年加開墾升科地二千叄百一拾㭍頃玖拾伍畝肆分伍釐肆毫陸絲二忽二微肆塵雍正六年嘉湖二府屬奉特恩減免錢糧十分之一內除地銀㭍千叄百伍拾肆兩玖錢玖分肆釐伍毫一絲玖忽陸微伍塵陸渺叄埃陸沙雍正十三年實在地陸萬肆百一拾二頃捌拾二畝二分一釐伍毫玖絲陸忽二微一塵叄渺陸漠陸埃陸纖叄沙實徵銀二拾肆萬叄千二百叄拾玖兩肆錢㭍分叄釐伍毫伍絲陸塵肆渺一漠伍埃伍纖叄沙實徵米一拾一萬伍千玖百肆拾肆石一斗陸升陸合肆勺陸抄叄撮一圭㭍粟捌粒㭍黍二粞肆粳捌粃溫州府瑞安縣歷年報墾塗地共陸頃叄拾二畝陸分一釐共徵銀二拾伍兩伍錢捌分一釐㭍毫叄絲陸忽捌微一塵伍渺二漠叄埃㭍纖二沙共徵米一拾伍石捌斗伍升肆合二勺一抄捌撮一圭捌粟肆粒㭍黍陸粞二粳陸粃原額石門縣告升地一拾肆畝陸分一釐其額徵銀於雍正六年奉特恩減免錢糧十分之一除銀一錢肆分叄釐伍絲二忽叄微伍塵肆渺雍正十三年實在地數同前實徵銀一兩二錢捌分㭍釐肆毫㭍絲一忽一微捌塵陸渺實徵米一石捌斗陸升二合陸勺捌抄㭍撮叄圭肆粟寧波府定海縣金塘蓬萊安期三鄉歷年開墾地共二百肆拾捌頃二拾陸畝伍分㭍釐叄毫叄絲叄忽共徵銀玖百玖拾兩伍錢捌分二毫㭍絲伍忽捌微陸塵㭍渺共徵米一百伍拾一石肆斗肆升二合玖抄㭍撮叄圭一粟叄粒原額山一拾二萬㭍千肆百陸拾玖頃肆拾叄畝伍分肆釐二毫㭍忽康熙六年丈缺山叄百捌拾陸頃㭍拾陸畝肆分捌釐陸毫二絲一忽伍微加歷年新升并常山麗水二縣丈增共山二百一拾肆頃一拾伍畝玖分㭍釐叄毫㭍絲叄忽捌微除蕭山會稽嵊縣等三縣山改為田除山一拾肆畝捌分叄釐肆毫又除乍浦營房雲林寺基地山肆拾叄畝玖分㭍釐叄毫又除富陽縣丈缺山叄頃伍拾叄畝玖分伍釐陸毫肆絲肆忽又除海寧縣建築土備塘堤挑土挖掘山一畝肆分肆釐共該山一拾二萬㭍千二百玖拾二頃陸拾捌畝捌分二釐陸毫一絲伍忽叄微內太平縣官山叄拾一頃玖拾一畝陸分玖釐捌毫㭍絲例不起科外額徵銀捌萬伍千伍百一拾伍兩叄錢玖分一釐捌絲二微二塵玖渺玖埃㭍纖額徵米捌千伍百二拾肆石叄斗伍升叄合㭍勺肆抄捌撮叄圭玖粒捌黍伍粞叄粳歷年除荒棄山伍千肆百捌拾叄頃玖拾伍畝叄分一釐一毫捌絲肆忽歷年加開墾升科山二千㭍百叄拾二頃肆拾二畝陸釐玖毫陸絲雍正六年嘉湖二府屬奉特恩減免錢糧十分之一內除山銀二千二百陸拾兩肆錢陸分一釐㭍毫肆絲叄忽二微伍塵肆渺㭍漠捌埃玖纖㭍沙雍正十三年實在山一拾二萬肆千伍百肆拾一頃一拾伍畝伍分捌釐叄毫玖絲一忽叄微實徵銀捌萬二千伍百㭍拾二兩二錢肆分伍釐肆毫一絲㭍忽一微伍塵二渺叄漠㭍纖叄沙實徵米捌千伍百二拾肆石一斗二升二合二勺二撮伍圭捌粟玖粒捌黍伍粞叄粳寧波府定海縣金塘蓬萊安期三鄉歷年開墾山共一百捌拾陸頃一拾一畝二分玖釐共徵銀二拾㭍兩玖錢一分陸釐玖毫叄絲伍忽原額蕩塘灘河池溪湖潭坎蛤戽共一萬㭍百㭍拾一頃一拾一畝捌分一毫玖絲伍忽玖微捌塵伍渺并魚匱磯一處康熙六年丈出蕩塘水漊等項肆百陸拾伍頃陸拾㭍畝陸分玖釐㭍絲一忽捌微陸塵肆渺加歷年新升蕩塘灘漊并富陽麗水二縣丈增塘共陸拾叄頃㭍拾捌畝一分叄釐陸絲二忽伍微除滿營界墻蕩㭍畝一釐又除桐廬嵊縣塘改為田并仁和縣灌溉藉田池蕩共伍畝二分伍釐伍毫一絲伍忽又除常山仙居二縣丈缺塘肆拾肆頃㭍畝肆分伍釐肆毫陸絲玖忽捌微玖塵又除海寧縣建築土備塘堤及東西二塘挑土挖掘蕩漊陸頃一拾二畝肆分陸釐陸毫叄絲肆忽共該蕩塘等項一萬一千二百伍拾頃二拾伍畝肆分叄釐㭍毫一絲一忽肆微伍塵玖渺并魚匱磯一處額徵銀一萬玖千肆百肆拾捌兩陸錢伍分叄釐玖毫一絲伍忽叄微伍塵㭍渺二漠叄埃捌纖伍沙額徵米一萬二千㭍百捌拾二石一斗二升肆合叄抄捌撮二圭陸粟叄粒伍黍玖粞伍粳歷年除荒棄蕩塘等項共二百二拾一頃一拾畝一分玖釐伍絲一忽歷年加開墾升科蕩塘等項共玖拾陸頃畝二釐一毫叄絲肆忽雍正六年嘉湖二府屬奉特恩減免錢糧十分之一內除蕩塘等項銀肆百㭍拾叄兩㭍分二毫二絲二忽陸微叄塵㭍渺陸漠玖埃柒纖玖沙雍正十三年實在蕩塘等項共一萬一千一百二拾伍頃一拾伍畝二分陸釐㭍毫玖絲肆忽肆微伍塵玖渺并魚匱磯一處實徵銀一萬捌千捌百叄拾二兩一錢一分肆釐玖毫叄絲陸忽㭍微捌塵陸渺捌漠叄埃二纖一沙實徵米一萬二千㭍百肆拾一石伍斗捌升陸合捌勺陸抄捌圭捌粟陸粒一黍玖粞陸粳伍粃寧波府定海縣金塘蓬萊安期三鄉歷年開墾蕩草蕩河共捌頃㭍拾一畝㭍分玖釐叄毫伍忽共徵銀一拾兩叄錢捌分玖釐捌毫一絲㭍忽玖微玖塵共徵米二石㭍斗㭍升捌勺伍抄㭍撮㭍圭陸粟原額永嘉縣蕩坦演水浹等項共二拾二頃陸拾陸畝叄分伍釐叄毫伍絲㭍忽加開墾坦㭍拾㭍畝陸分陸釐雍正十三年實在蕩坦演水浹等項共二拾叄頃肆拾肆畝一釐叄毫伍絲㭍忽例不起科原額寧波府續墾泰邱鄉田地叄頃肆拾伍畝一分玖釐二絲康熙六年丈缺田地伍畝玖分肆釐㭍毫伍絲肆忽實該田地叄頃叄拾玖畝二分肆釐二毫陸絲陸忽雍正十三年實在田地數同前實徵銀二拾兩㭍錢二分㭍釐㭍毫二絲陸忽伍微二塵陸渺原額金華府不等山成田地陸拾一畝康熙六年丈出山成田地一頃玖拾二畝伍分陸釐肆毫實該山成田地二頃伍拾叄畝伍分陸釐肆毫雍正十三年實在山成田地數同前實徵銀捌兩㭍分一釐二毫肆絲伍忽一微實徵米叄斗一升一合一勺