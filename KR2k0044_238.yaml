body:
  text: 浙江通志卷二百三十九陵墓金華府金華縣呉留氏墓金華府志在縣西南十里相𫝊為留贊家墓宋東陽太守蔡興宗墓萬厯金華府志在迷村𫝊詳名宦呉越清海節度使判婺州錢元懿墓萬厯金華府志在縣東北六里名勝志地名沙溪墓有巨碑未刻而石羊虎之𩔖凡十餘頭宋秦國長公主墓金華縣志在仙洞側宋趙抃祖墓明一統志在縣北五里碑文尚存宋待制趙桓墓舊浙江通志在天王寺側桓洛陽人宋紹興間帥廬州死酈瓊之難子孫居婺之梵嚴寺因殯焉後郡守孟猷為葬兹土宋馬將領墓金華府志在天皇寺西南渡初潰卒任士安犯城將領拒戰於藕塘衆潰被執死之葬此宋徽猷閣待制潘良貴墓金華縣志在縣北二十里傳詳名臣宋資政殿學士鄭剛中墓名勝志在招福原傳詳名臣宋贈資政殿學士葉衡墓金華縣志在縣東南十里傳詳名臣宋少師諡文定王淮墓金華府志在縣西北十里宋提刑唐仲友墓金華府志在寶華寺側傳詳儒林宋崇政殿説書王師愈墓金華縣志在白沙鄉朱文公撰墓誌傳詳循吏宋端明殿學士王埜墓萬厯金華府志在東彌塘側傳詳武功宋北山先生諡文定何基墓萬厯金華府志在殿講山循理鄉油塘之原正徳十年郡守劉􅉅修復𫝊詳儒林劉􅉅請復何文定墓地碑記北山先生以咸淳五年己巳十二月壬申葬金華縣南山油塘之原豪右據而有之子孫莫之能直正徳甲戌春正月知府事劉􅉅率同官展修祀事墓已夷且陷惟趺獨存商生大輅復亷得完碑於油塘匿孔尚無恙乃繩其豪於法還其碑於趺正其田於籍歸其佃甲於隣壤伐巨石以封若堂而縈之以垣牆豎享堂四楹旁建連甍以處佃丁規制粗備庶幾有司崇儒重道礪世磨俗之萬一焉宋贈承事郎諡文憲王柏墓金華縣志在婺女鄉金村之原𫝊詳儒林元白雲先生諡文懿許謙墓金華府志在婺女鄉許官山嵗久荒圮明成化間推官林沂重為立石𢎞治間同知薛敬之題道左曰處士許白雲之墓𫝊詳儒林元昭勇將軍張英勇墓萬厯金華府志在縣北五里元戊戌年從越國公定婺有功辛丑年征紹興陣亡葬此明越國公胡大海墓金華府志在生薑隴𫝊詳名宦明歸全先生葉儀墓萬厯金華府志在東塘之原𫝊詳儒林明純孝先生范祖幹墓金華府志在赤山之原𫝊詳儒林明衢州教授胡翰墓金華府志在智者橋東𫝊詳儒林明布政使章聰墓金華縣志在西峯寺側𫝊詳循吏明僉都御史錢學孔墓金華縣志在鳳凰山側𫝊詳名臣明工部郎中姜絅墓金華縣志在白竹𫝊詳介節明贈右副都御史周鳳岐墓永康縣志在後鄭明崇禎間賜祭葬傳詳忠臣國朝總督河道兵部尚書朱之錫墓義烏縣志在孝順街𫝊詳名臣康熙年間賜祭葬蘭谿縣唐刑部侍郎舒元輿墓蘭谿縣志在惠安寺側𫝊詳文苑宋贈少傅蘇遲墓萬厯金華府志在靈洞棲真寺之側傳詳寓賢宋香溪先生范浚墓金華府志在寶惠寺側𫝊詳儒林宋龍圖閣待制徐良能墓萬厯金華府志在太平鄉界嶺傳詳介節宋左丞相諡文肅范鍾墓萬厯金華府志在惠安寺傍𫝊詳名臣宋葉臻墓蘭谿縣志在清江里應氏塢吕祖謙葉君墓誌始予道蘭谿葉君介其子來見視其貌恢然長者也進之語質樸少雕琢意雖浮湛閭里而協族輯隣若嘗知書者家故窘縮衣嗇食資其子學甫収一科以養而君不能待也銘曰置也饁之簋也奪之罔極之酬匪爵是縻宋知貴州章如愚墓萬厯金華府志在八石谿𫝊詳儒林元仁山先生諡文安金履祥墓蘭谿縣志在純孝鄉仁山後壠傳詳儒林許謙挽仁山先生詩徳粹身嘗潤時艱志莫舒治安曾獻策私淑幸遺書方寸涵千古襟懷湛太虛哲人今已矣吾道竟何如統緒𫝊朱子淵源繼魯翁誨人沛時雨對客藹春風志立修身本誠存作聖功遺言猶在耳一慟閟幽宫元禮部郎中呉師道墓金華府志在銅山鄉中徐𫝊詳儒林元大司徒銀青光禄大夫陳萍墓萬厯金華府志在甘棠鄉青山傳詳武功明副都御史邵玘墓慈谿縣志在純孝鄉花塘傳詳名臣明禮部尚書諡文懿章懋墓萬厯金華府志在竹塘𫝊詳儒林明工部尚書諡恭惠章拯墓金華府志在黄大山𫝊詳名臣明吏部尚書諡文襄唐龍墓蘭谿縣志在浩然觀傳詳名臣明贈太常少卿陸震墓蘭谿縣志在瑞山鄉胡磡督學胡瑞表曰皇明忠直之臣傳詳忠臣明太僕少卿鄭本立墓金華府志在平渡西北梅堂山都御史徐栻撰墓誌明贈太傅諡文懿趙志臯墓蘭谿縣志在横山鄉清湖堡傳詳名臣東陽縣漢張掖太守韓晏墓萬厯金華府志在馬鞍山下傳詳循吏漢合浦太守陳修墓金華府志在張墓山蘭谿童品記傳詳介節呉廷尉斯偉墓成化東陽縣志在孝義塘東陽縣志偉本姓史仕呉為廷尉呉孝子斯㪟墓萬厯金華府志在後吕村傳詳孝友樓鑰斯許二孝子墓碑跋束陽在婺為壯縣議者以東鄉曠逺别置一尉余里人姚宣伯師虎為之以書來曰管内有許斯二孝子墓許墓在藍硎村所居孝順里及其親塜尚有識者斯墓在後呂村地名孝義塘事并見圖經二人皆常表其門閭今不復存欲立巨石以表其墓且各刻其事於碑隂以詔邑人使慕焉其書之余既書其碑又以此勸宣伯并刻之晉孝子許孜墓東陽縣志在藍硎保坐東向西宋熙寧六年知縣王都官給憑紹興元年立石碑𫝊詳孝友謹按名勝記云此乃孜營其親墓也孜墓在縣東北五十里資福院側見王象之輿地紀勝象之東陽人其言當必有據録之以備㕘攷樓湛然墓未詳時代名勝志在白兆村梁僕射杜曉墓名勝志在縣西五里曉字明逺昭宗時痛父讓能死非其罪晦迹不出後仕梁官至尚書卒于難贈右僕射唐容州刺史厲文才墓金華府志在馬蹄坑傳詳循吏宋知處州賈廷佐墓金華府志在廣由寺傳詳寓賢宋沖素處士張志行墓東陽縣志在張公山傳詳隠逸宋趙彦棫墓金華府志在花牆塢宋工部尚書諡端獻葛洪墓東陽縣志在寶山寺後府志云在縣南五里者當是其先墓也傳詳名臣宋贈朝散大夫李誠之墓東陽縣志在七星墩傳詳忠臣宋監察御史喬夢符墓金華府志在縣西七里傳詳循吏東陽縣志據本宗譜云在六十四都坊前去縣二十里宋贈太師諡文惠喬行簡墓萬厯金華府志在泗渡之原傳詳名臣宋刑部尚書李大同墓東陽縣志在黄山傳詳名臣元國史院編修胡助墓金華府志在漕塘傳詳文苑明副使馬廉墓東陽縣志在十八墩傳詳介節明尚寶少卿陳顯道墓東陽縣志在東黄之原傳詳武功明給事胡澤墓金華府志在西峯下東陽縣志澤字叔霖永樂乙未進士初授行人陞兵科給事中明副使杜瑄墓金華府志在師姑洞下傳詳循吏明御史陸永安墓金華府志在林塢明布政使金淛墓東陽縣志在大地塔即其宅居之後是也淛字汝東嘉靖進士以河南布政司引疾歸卒明贈光禄少卿盧洪春墓東陽縣志在象山之陽與父懷莘同葬天啟初遣使諭祭𫝊詳名臣義烏縣秦孝子顔烏墓明一統志在義烏縣東四里萬厯金華府志在崇徳鄉其西三步孝子父墓也宋大觀間徐秉哲為建亭紹興間知縣黄袤立石以表之乾道間知縣林元仲修塋域後魏了翁又為題表之曰秦顔氏烏傷墓傳詳孝友何恪顔孝子墓碑記永嘉林侯元仲宰義烏下車未遑他事首訪顔孝子之墓曰邑由孝子名長吏宜致敬焉即束帶趣駕出邑之東四里展拜墓下禮容甚肅見二冢纍然蔽叢棘中狐交跡樵牧不禁侯愀然易色曰何以底民孝哉越明年政成將去部刺史列其治狀上於朝侯於是證圖牒盡反民所侵地繚以崇墉嚴扃鑰以限薪槱畜蹂蒔松檟數十百株表顔孝子墓四大字於道周使過者必式之庀工於乾道丙戌秋七月閲月而就黄溍過顔孝子墓詩丹青像設始何年翁仲遺墟自古𫝊時有北人來下馬不知秦樹幾啼鵑牧童解指看碑路野衲分耕祭墓田回首長安西日外茂陵松柏正蒼烟呉東海太守朱桓晉臨海太守朱汎墓金華府志並在雙林鄉蜀山里之下宋昇明初子孫招魂遷葬梁侍郎樓偃墓義烏縣志在香山唐臨海丞駱賔王墓名勝志塜記云墓在義烏縣東三十里上楓塘傳詳文苑宋平昌刺史劉豪墓成化金華府志在平山義烏縣志明隆慶戊辰裔孫尚恭重修墓碑掘數尺見墳臺臺上有磗方尺許刻晦庵卜墓數云天聖戊辰葬此邱䕃十八紀出公侯子子孫孫垂不替繩繩武武永無休五百四十一年損十六七世裔孫修戊辰戊辰新一石重修重修千百秋吕祖儉為之記云右數八句為卜劉公之墓天聖六年十月三日卜葬東平山先塋之原公諱豪字有開裔出漢光武封太孫於烏傷國除因家縣治南遂為烏傷人迨晉寧公萬章始為王官歴唐曰珊者翰林學士公以文學遷平昌刺史致仕曽孫輝熺同登乾道進士並游東萊晦庵二先生門故晦庵卜其祖墓之䕃有裔衍家昌千嵗之久余因識大畧於臺上以俟後日之騐云宋學士樓瑤墓義烏縣志在蜀山青龍崗宋寶謨閣待制諡文清徐僑墓萬厯金華府志在智者鄉五雲山智度寺後𫝊詳儒林連一鳴徐公墓碑記公在趙宋時為寶謨閣待制文章理學彪炳朝野晚而退老於林泉時探五雲之勝賦詩見志葢有甚樂於此者子孫成其初志殁葬於兹山而肖像於寺所有田地山俾僧時其祭祀數百年來守而不失今者寺日毀田日蕪賦日逋僧且去之惟恐不速公之雲仍懼先澤之湮没也質諸令令曰田屬諸寺祭責諸僧有舊章在無事更張惟愼擇住僧急為整頓毋旁撓毋朘削籍嵗之所入供賦税奉烝嘗敗棟頽垣以時修葺則名賢俎豆藉以長存因勒於石以貽來禩宋吉州守樓圖南墓義烏縣志在東溪宋録事參軍何恪墓金華府志在和溪傳詳文苑宋太常丞喻良能墓義烏縣志在智者鄉宋太常少卿朱質墓萬厯金華府志在雙林鄉巖庵宋朝議大夫虞復墓金華府志在水磡溪西之原𫝊詳儒林宋侍郎龔應之墓義烏縣志在馬拗嶺下宋朝散大夫黄夢炎墓金華府志在上者塘之原元進士戚仲咸墓萬厯金華府志在雙林鄉下仲咸永康人黄文獻溍銘墓傳詳儒林元進士王炎澤墓義烏縣志在湖陽山傳詳儒林黄溍王先生墓誌銘南稜先生至順三年八月十三日以疾卒享年八十十月十日葬縣南崇徳鄉湖陽山先墓之次銘曰婺女之墟孝子之里以儒起家肇自王氏世科世禄恒不乏人重珪疊組萃於一門是似是續蟬聨十葉復抱遺經修其世業先生承之弗墜益振如木有本如水有源教施於鄉佩衿濟濟道之將行乃止不仕尚克有子而又有孫餘潤所蒙有才彬彬趾美於前休垂於後嗚呼先生是謂不朽元侍講學士諡文獻黄溍墓明一統志在東埜山之原傳詳儒林楊維楨黄文獻墓銘大星煜煜兮繡水穆穆兮文之毓兮大星翳兮繡水㙪兮文之逝兮唯文之鳴兮大音在廷爾鏞爾筦兮我瑟我笙㭊之甹兮㑹之成兮氣一并兮有元氏之聲兮吁嗟今黙黙兮孰見古人之渢渢響以上馳兮膏吾車其昌從元丹溪先生朱震亨墓金華府志在朱山郭頭庵傳詳方技宋濓丹溪先生墓銘濂洛有作性學復明考亭承之集厥大成化覃荆揚以及閩粤時雨方行區萌畢達世裔之正實歸金華綿延四葉益燦其葩有美君子用世不利孚惠家邦庶亨厥志仁義之言繩繩勿休昭朗道真釋除欲仇旁溢於醫亦昭絶躅開闡元微功利尤博斂其豪英變為殺𢎞所以百為度越於人世途方㝠正資揚燎夢夢者天使埋其耀精神上征定為長庚與造化遊日光焞焞表徳幽墟遵古之義僉曰允哉是詞無媿元金涓墓萬厯金華府志在金庵山明贈學士諡忠文王褘墓明一統志在青巖之象鼻岡萬厯金華府志褘死節雲南子紳孫稌招魂以葬子綬紳皆祔傳詳忠臣明侍讀樓璉墓義烏縣志在智者鄉張