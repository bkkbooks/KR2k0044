鄂州刺史宋濂作浦陽人物記以為兩漢時洪撫二州為鄣郡鄂為江夏郡及隋平陳始置洪撫鄂三州則邵柔當是隋以後人今從人物記列於宋前仍闕其時代以俟考訂云宋孝子陳大竭父武鼎墓萬厯金華府志並在通化鄉梁處士何千齡墓金華府志在縣東三十里宋屯田員外郎于房墓萬厯金華府志在左溪山側傳詳儒林宋贈光禄大夫方資及子揚逺墓金華府志在仙華山下宋贈資政殿學士梅執禮墓浦江縣志在通化鄉或云祇葬衣冠之所傳詳忠臣宋布衣倪樸墓金華府志在石陵之原浦陽人物記樸字文卿唐侍郎若水之後贊曰樸以一布衣之微非有爵號之榮禄賜之厚乃能赤心憂國吐其耿耿直欲叩帝閽上之雖其書不能進其視賈廷佐之二疏陳亮之三書俊快朗烈照耀後先如樸者豈非人傑也哉宋黄景珪墓萬厯金華府志在縣北八里其父昉墓在縣西十五里昉乃黄廷堅之從父元學士義烏黄溍九世祖也宋沖素處士鄭綺墓萬厯金華府志在白麟溪傳詳孝友宋尚書右丞毛洪墓浦江縣志在毛庵塘左宋容州文學方鳳墓浦江縣志在化城縣側傳詳文苑元黄景昌墓萬厯金華府志在縣東南華塘之南𫝊詳儒林元翰林待制柳貫墓萬厯金華府志在通化鄉梅塢𫝊詳儒林黄溍柳公墓表公之先自杭徙婺之浦江家烏蜀山歴官至江西等處儒學提舉秩滿歸杜門不出者十有餘年以國史院編修官起於家到官僅七閲月以疾卒於寓舍至正二年十一月九日也夫人盛氏累封浦江縣君前公十二年卒以三年十二月二十二日合葬于縣西通化鄉荆山之原公之葬也中丞張公起巖既為之銘納之壙中復奉門人宋濓之狀屬溍為之表揭於冡上其詞曰柳君河東為時望宗從宋南遷再世外官公生其季逮今盛際以文易武承考之意延祐初元朝多俊賢公遊其間翺翔後先于于而來列於庶位詩書禮樂孰非吾事由中而外退也委蛇遺世獨立一紀於兹國之老成日益淪謝鋒車在門公不俟駕有懷欲陳堯舜吾君輪當次對乃以訃聞乗化而歸公乎奚憾士林盡傷失其一鑒斯文未喪儀型具存表以石章刻在墓門元應奉翰林文字陳公舉墓金華府志在磊石之原金華賢達傳公舉字正臣善屬文以薦應奉翰林文字甫兩月卒元集賢院學士呉直方及子處士呉萊墓浦江縣志直方在後呉山徐塢萊在盉塢直方傳詳名臣萊傳詳儒林明尚書鄭沂墓金華府志在松溪山金華賢達傳沂字仲與洪武丙子應召赴京拜禮部尚書明知縣謝沚墓浦江縣志在花山沚建寧人永樂間知浦江縣卒於官明觀察副使張元諭墓浦江縣志在五路嶺湯溪縣漢龍丘萇墓萬厯金華府志在龍游鄉龍丘山傳詳隠逸漢輔國將軍盧文臺墓金華府志在白沙源墳前有雙穴深如井宋邵彦榮夫婦墓湯溪縣志在縣之節義村文彦博節義坊碑記彦榮龍邱人以孝行著於鄉徴授青州郡判時元昊叛環慶告急奉勅禦冦偵者訛傳軍潰而主帥亡邵妻胡氏方少艾權貴子欲强娶之觸刃而隕邵聞之棄職結廬九峯之原終身不娶有司摭實以聞天子旌䘏之立坊褒贈廬陵歐陽永叔嘉其事乞碑文於余余惟邵君舉於孝完節義於夫婦之間為之序令與峴山之跡同志不朽云宋楊與立墓湯溪縣志在石坑傳詳寓賢國朝康熙四十七年里人張祖年重立墓碑題曰宋儒船山先生之墓明鴻臚寺卿胡森墓湯溪縣志在九峯之南麓森字秀夫正徳辛巳進士明南昌太守胡公亷墓萬厯金華府志在寶興寺之西即羅氏故址公廉字介卿嘉靖壬辰進士叔胡森有銘國朝知縣胡擢標墓湯溪縣志在盛村擢標字濟英康熙壬子科舉人任江南建平知縣衢州府西安縣晉信安侯陳𢎞墓天啟衢州府志在府治西北百步傳詳寓賢晉光禄大夫鄭平墓衢州府志在嘉慶鄉鄭氏子孫至今常拜其墓名勝志平戍崢嶸鎮咸熙元年以功遷左光禄大夫新昌郡公食邑信安年九十三卒葬於此晉征西將軍毛璩墓名勝志塜廟記云在信安縣南一里璩乃寶之孫也本傳云自寶至璩三世皆擁旄節傳詳武功呉越侍郎陳備墓西安縣志在縣西二里備事錢王鏐王俶國除不食以卒葬此宋資政殿學士諡清獻趙抃墓明一統志在欽化鄉傳詳名臣蘇軾趙清獻公神道碑公致仕時年七十二七年八月訃聞贈太子少師十二月乙酉葬西安蓮華山娶徐氏封東平郡夫人子二長𡵻次㞦銘曰蕭望之為太傅近古社稷臣其為馮翊民未有聞黄霸為潁川治行第一其為丞相名不逮昔孰如清獻公無適不宜邦之司直民之父師其在官守不專於寛時出猛政嚴而不殘其在言責不專於直為國愛人掩其疵疾葢東郭順子之清孟獻子之賢鄭子産之惠晉叔向之言公兼而有之不幾於全乎宋知晉寧軍諡忠壯徐徽言墓天啟衢州府志在清平鄉楊家壠傳詳忠臣宋司諫王珉墓西安縣志在濟下珉字中玉建炎初寓衢官臺諫卒髙宗賜田一頃令衢長吏葬焉宋衍聖公孔玠墓衢州府志在金溪隴西安縣志玠端友子字錫老紹興中襲封終通直郎宋寶謨閣直學士劉穎墓葉適劉公墓誌在靖安鄉巖山傳詳名臣宋知汀州徐霖墓衢州府志在臨江鄉石塘里傳詳名臣宋參謀王椿墓西安縣志在浮石鄉師姑隴明兵部侍郎鄭辰墓西安縣志在浮石溪西側正統九年賜葬傳詳名臣明提學方應祥墓在明果寺鉢盂山傳詳儒林國朝鄭烈婦徐氏墓西安縣志在朝京門外康熙三十六年知縣陳鵬年詳請建祠立墓傳詳列女龍游縣周姑蔑子墓明一統志在東華山下龍游縣志其崇纍纍百餘皆其疑塚宋慶元間為人所𤼵古物充牣隨即灰滅惟數瓦缶不壞貯水滿其中宋丞相郇國公諡忠肅余端禮墓衢州府志在靈山石壁之源傳詳名臣宋資政殿學士諡文靖劉章墓萬厯龍游縣志在靈山下傳詳名臣宋光禄大夫諡壯敏余嶸墓萬厯龍游縣志在縣南三十里嶸字景贍淳熙進士歴敷文閣直學士兼兵部尚書以光禄大夫致仕贈少師諡壯敏宋樞密信安郡侯馬天驥墓龍游縣志在西寺右天驥字徳夫端平初進士寶佑中拜端明殿學士同簽書樞密院事封信安郡侯宋户部侍郎胡大昌墓天啟衢州府志在金龍寺前傳詳名臣宋安鄉令劉愚墓葉適劉靖君墓誌在仁塘原傳詳儒林元處士趙縁督墓萬厯龍游縣志在鷄鳴山明潯州知府尹燾墓龍游縣志在西京塢老鷹巖明烈女徐蓮姑墓衢州府志在縣北四里傳詳列女常山縣呉越海州判官江景房墓常山縣志在馬尫林頭呉越鎮東軍節度使詹堯臣墓常山縣志在脱沙隴下宋修靖王趙希錧墓舊浙江通志在查瀨鳳山宋寶文閣待制王渙之墓衢州府志在牛路抱口傳詳名臣宋丞相諡忠簡趙鼎墓明一統志在縣北定陽鄉三十五里傳詳名宦汪應辰趙公祭文惟公兩登上宰皆值阽危之時一斥南荒遂為死生之别莫非命也豈有他哉事既定於葢棺恩特榮於歸骨僅脱鯨波之險獲至於斯孰為馬鬛之封未知所向昔任昉無漬酒之彦而劉峻廣絶交之書吁嗟此風何獨今日念嘗遊於幕府忍自比於路人奠以告哀言不盡意歐陽哲趙忠簡墓碑予讀宋史嘗慕公之為人正統九年行部衢州閲郡志載墓在常山縣北定陽鄉石門詢之士民無有識者明年自開化經墓下郵長導予視焉翁仲石獸俱仆在地樹木䝉翳命從者翦除之乃至其所墓雖尚存而甎甓人盡取去矣郵長告余有二孫在亟呼視之俱孱弱不給墳山已屬於邑人徐公逺為業為之惻然至常山適通判朱善在焉乃命經理之培其墓為起翁仲石獸之仆者伐山取道規制宛然仍復其舊皆善之力徐公逺已殁其子普濟亦持券還趙氏始公南來嘗避地常山永年寺故遂葬於此子孫因家焉公殁僅三百年而子孫衰微墓已毁壞如此因記其事鏡諸墓石與我同志者庶有考焉宋贈光禄大夫諡襄愍徐幸隆墓天啟衢州府志在䕶國山常山縣志幸隆字徳盛雒陽人舉制科補右正言擢淮東節制副使領河陽軍節鉞宣和間辭疾居常山靖康間金人再入率所部鏖戰死贈銀青光禄大夫開府儀同三司諡襄愍宋侍郎江鎬墓衢州府志在漁􅅹宋諫議大夫司馬康夫人張氏墓常山縣志在十三都容車山東宋太史范沖墓明一統志在縣北二十五里傳詳寓賢宋安撫魏矼墓衢州府志在登封鄉宅山傳詳寓賢宋端明殿學士汪應辰墓常山縣志在石潭頭應辰玉山人其母魯氏殁葬於此故依焉傳詳名宦宋尚書右丞樊清墓天啟衢州府志在賢良峯下明尚書徐恢墓舊浙江通志在左坑常山縣志恢字伯𢎞元末登進士洪武時拜都御史累官户部尚書退休卒明贈太子太保諡清簡樊瑩墓衢州府志在博望鄉華堂里正徳十四年賜葬𫝊詳名臣趙州弔樊尚書詩尚書幽宅繡溪原華表嶙峋石獸蹲一代典型唯直道三朝風力有清論山雲長䕶蛟龍蜕宰木深知雨露恩還化至今八十載令人起敬儼如存明廉使何永芳墓天啟衢州府志在呉家塢傳詳循吏明兵科給事中鄭林墓天啟衢州府志在埠儻溪之西傳詳名臣江山縣葛王墓天啟衢州府志在縣西三十五里不知何代人舊有碑田夫斵為磨一日雷震碎之有取花磗者雷復震今莫敢動唐祝奢墓江山縣志在景星山下武徳九年封妻陳氏為懷徳縣君詔合葬傳詳忠臣唐衢州刺史周美墓天啟衢州府志在江郎山下留春塢傳詳寓賢宋樂清令周穎墓衢州府志在五里原傳詳儒林宋梁忠獻公王失名墓江山縣志在縣東北崇善鄉嚴豅公世居汴梁宗澤辟參軍機累遷至樞密副使金人攻揚州被執不屈遂遇害子僎時年十六尋父屍於野廬其旁事聞賜葬於此宋武畧將軍趙善孚墓舊浙江通志在縣九都峯下宋逸平先生徐存墓衢州府志在南塘景里鄉明嘉靖二十二年知縣黄綸訪得之立碑曰宋大儒徐逸平先生墓又訪裔孫成章纔周嵗令著守祠仍置田六畝以供祭祀黄綸撰墓碑記傳詳儒林宋刑部侍郎徐復殷墓衢州府志在九都出青山内翰渙之孫正節公應鑣之祖也傳詳文苑宋殿中侍御史柴瑾墓天啟衢州府志在毛村石壁寺後傳詳循吏宋刑部侍郎周自强墓天啟衢州府志在禮賢鎮圓覺菴勅葬傳詳義行宋國史編修柴望墓江山縣志在長臺高齋衢州府志望字仲山淳祐中伏闕上書下獄以趙汝愚申救放歸端宗立授國史院編修宋進士柴隨亨墓衢州府志在櫸林九磜口江山縣志七嵗能文登文天祥榜進士知建昌軍宋柴䝉亨墓衢州府志在秀峯下南安寺後傳詳文苑明孝子何倫墓舊浙江通志在墳前山傳詳孝友明刑部尚書諡端簡毛愷墓衢州府志在景星山徐階為墓碑傳詳名臣明廣東布政使徐霈墓衢州府志在縣之上溪傳詳名臣明右僉都御史趙鏜墓江山縣志在懷玉祝家山鏜字仲聲號方泉江山人嘉靖丁未進士歴官右僉都御史開化縣唐魏氏塜天啟衢州府志在縣西里許魏鄭公家塜或以為魏謩所葬土人耕犁得古器如鐺而有足一鑼如有文者唐淮南招討使張自勉墓天啟衢州府志在玉山鄉石丘姜坂傳詳武功呉越錢王祖墓衢州府志在雲臺鄉闐子坑名勝志相傳呉越王祖錢氐微時為人負擔至此其主人曰此水九曲列岫如屏葬者子孫當興因取枯竹標識明日令錢往視竹已生根遂伐去而紿其主以失所在潛以父母骨葬之今猶有倒生藤蔓根下垂如掃云呉越江氏墓天啟衢州府志在縣北百步五代時江氏聚塜景房景諧躋溥萬里皆其後初為墓時未置縣有善隂陽者謂葬後當出斗粟官及置縣官為留地四十畝自五代至宋躋世科者九十九人明刑部侍郎吾紳墓開化縣志在縣北鍾山下永樂時官刑部侍郎宣徳間勅葬浙江通志卷二百三十九
