body:
  text: 浙江通志卷一百三十六選舉十四明舉人天順三年己卯科浙江登科考浙江試場原連杭州府學本年巡按及三司官言士子赴場屢有作弊者請改試場於城東廢倉隙地乃是今貢院又是科奏準兩京天文生隂陽人及官生子弟許就在京鄉試沈繼先仁和人戊戌進士謝鐸黃巖人甲申進士吾冔開化人教諭聞景輝餘姚儒士庚辰進士王賓淳安人丙戌進士潘璋金華人壬辰進士韓坦會稽人南升樂清人龔澤慈溪人己丑進士包謙錢塘人己丑進士姚恪山隂人知縣樂宗茂仁和人壬辰進士潘禎天台人丙戌進士薛綱山隂人甲申進士樊貴縉雲人甲申進士許章嘉興人甲申進士葛雍慈溪人教諭李湑縉雲人安福教諭姚稷桐廬人吉安訓導徐瓚餘姚人庚辰進士戴孚黃巖儒士教諭陳紀臨海人寧國通判石盤杭州人長史錢諤山隂人諸正餘姚人庚辰進士鄭昱常山人丙戌進士郭誠海寧人應珉黃巖儒士徐憲開化人桂昌慈溪人教授童俊蘭溪人趙州知州沈熊歸安人庚辰進士鄭璇山隂人訓導諸倫桐廬人崇仁教諭田濟杭州人劉莊錢塘人吕鳳新昌人庚辰進士丁川新昌人甲申進士徐正山隂人教諭李觀永嘉人丙戌進士俞智鄞人檢討謝宏麗水人福州訓導鮑愷鄞人知府沈立杭州人同知虞勳海鹽人應顒淳安人潛山知縣凌鎬新城人庚辰進士吳俊錢塘人丙戌進士李謹壽昌人劉縉分水人劉鐸麗水人長泰知縣沈巽仁和人吕鳴新昌人通判吕凱鄞人通判汪鎡山隂人甲申進士吳珍衢州人衛璁鄞人知縣沈同和烏程人信陽知州江純奉化人甲申進士陳清餘姚人丙戌進士馬文徵仁和人王榮常山人徐州同知吳瓊烏程人己丑進士柴傑鄞人知縣楊昊西安人胡鉉天台儒士吉安通判陸廣嘉興人甲申進士柴璇餘姚儒士宣城教諭駱巽山隂人教諭華黼餘姚儒士吉府審理王進上虞人丙戌進士樓偉鄞儒士朱義杭州人郎中徐福江山人福建同知彭俊永嘉人同知程搢奉化人順昌知縣張玘崇德人南雄同知周恬淳安人臧瓊長興人己丑進士黃韶餘姚吏己丑會魁徐廷耀遂安人寧化知縣胡琰龍遊人知縣倪輔平湖人甲申進士徐繼芳西安人胡恭餘姚人甲申進士胡節龍遊人山陽知縣王祐嘉興人同知徐志文新昌人甲申進士姚昺杭州人光祿寺寺丞陸瑾蘭溪人廣州通判湯滌嘉善人丙戌進士魏法慈溪人吏部吏解元以下七人順天中式徐鎡杭州人徐輝嘉興人丙戌進士樓啓鄞人徐銓慈溪吏舒春餘姚人己丑進士王琮龍泉人甲申進士陳圭仁和人以下七人應天中式徐瑄鄞人張組湖州人達頴處州人金澤鄞人丙戌進士滕霄山隂人庚辰進士胡懷龍遊人兵馬指揮陳暉上虞人魏政西安人丙戌進士山西中式王輔嘉興人山東中式天順六年壬午科盧楷東陽人俞藎桐廬人甲申進士章懋蘭溪人丙戌會元蕭昱蕭山人知縣趙勝義烏人甲申進士俞澤桐廬人甲申進士桂籍慈溪人同知易森平陽人泰州同知王環新昌人知縣項秉中瑞安人盧璣松陽人甲申進士周鑑紹興人甲申進士柳演平陽人丙戌進士楊粲慈溪人教諭朱俊海鹽人知縣張文曜象山人甲申進士商良臣淳安人丙戌進士王瀹上虞人通判陳吉鄞人孫能山隂人教諭翁遂餘姚人甲申進士沈復嘉興人知縣羅倫黃巖儒士教授張錫杭州人山隂教諭邵新淳安人己丑進士黃伯川餘姚儒士建寧教諭包鼎嘉興人戊戌進士范潤鄞人甲申進士范絪天台人壬辰進士王瑞永嘉人學正袁釗嘉興人通判裴淑澄天台人知縣達泰麗水人興國知縣李高慈溪人教諭陳瓘天台人通判陸愈平湖人乙未進士馬達紹興人訓導方銓新城人安州學正徐洪蕭山人己未進士余鐖臨海人乙未進士張伋諸暨人知縣夏增天台人教諭虞瑶縉雲人甲申進士袁寧天台儒士教授杜嶠鄞儒士甲申進士袁晟山隂人甲申進士郎澄杭州人同知沈澄錢塘人通判吳春桐廬人趙讓桐鄉人乙未進士金縢鄞儒士同知楊昱會稽人知縣楊榮餘姚儒士壬辰進士葉盛蘭溪人乙未進士余英西安人丙戌進士張琳臨海人廬州教授方輅平湖人丙戌進士徐海海寧儒士乙未進士馬文奉化人泉州教授周肅慈溪人同知應祐黃巖人蘇州通判向秉直慈溪人教諭錢珍餘姚人丙戌進士陳英鄞人壬辰進士詹巨卿黃巖人訓導章軫會稽人趙艮永康人己丑進士司馬壵山隂儒士郎中陳華慈溪人學正俞俊麗水人壬辰進士吳智餘姚人壬辰進士姚坰慈溪人訓導魯璵會稽人國子監丞鄭曅金華人吳慎上虞人紀善嚴裕仁和人丙戌進士樊鯤常山人汀州同知陳湘錢塘人朱瓘會稽人知縣章泓安吉人通判葉彬仁和人項旻瑞安人壬辰進士周鑑仁和人吳奎麗水人侯官知縣鄭繹樂清人通判盛璋鄞人知縣張珏仁和人甲申進士楊瑛平陽人錢鉞杭州衛人甲申進士徐璒臨安人張奎臨海人鄭宏鄞吏解元己丑會元以下十一人俱順天中式倪嶽錢塘人甲申進士楊霖嘉善人寶坻知縣章鎰鄞人丙戌進士桂廷圭慈溪吏丙戌進士桂永年慈溪人鄭仁憲會稽人陸淵之上虞人丙戌進士潘琚金華人甲申進士包𢎞蘭溪人六安知州李琮景寧人甲申進士薛穰鄞人以下七人應天中式李經鄞人徐綬山隂人通判趙嶽臨海人南陽同知江𢎞濟開化人丙戌進士謝暹永嘉人教諭金忠雲和人甲申進士孫偉秀水人經魁丙戌進士以下二人雲南中式朱謙鄞人甲申進士陸圭杭州人以下二人外省中式達毅處州人成化元年乙酉科楊守址鄞人戊戌榜眼石塘餘姚人乙未進士陸逺嘉興人乙未進士徐九思德清人丙戌進士張晟仁和人己丑進士陳暢天台人教諭詹雨松陽人丙戌進士吳志遂昌人丙戌進士陶性會稽人金石餘姚人任泰嘉善人乙未進士陳􅌔青田人屠勳平湖人己