body:
  text: 浙江通志卷二百三列女二杭州府仁和縣元陳文舉妻蔣氏嘉靖仁和縣志名淑貞歸學正陳文舉元季海寇方鶴臯兵薄郡濠文舉卧病賊及寢門欲兵之見氏姿艷覬得之氏意覺紿賊以脫夫計其去逺乃俟隙赴水死明何富妻平氏徐一夔何節婦傳仁和何子貴之母年十九歸富五年而富歿歿五月子貴始生時氏方二十有四生事落甚有不堪為生者人諷之易天氏峻絶之事舅姑養生送死無遺憾撫遺嬰至成人冰蘗自守四十餘年如一日何氏不絶如縷以氏而振夏思誠妻王氏成化杭州府志生子榮逹思誠卒氏年二十五家貧勤女工以養舅姑撫榮逹至成立舅姑相繼卒鬻居室治喪哀毁之至人弗忍聞嫠居四十七年洪武年旌楊泰奴明列女傳楊得安女許嫁未行天順四年母病疫不愈秦奴三割胸肉食母不效一日薄暮剖胸取肝一片昏仆良久及蘇以衣裹創手和粥以進母遂愈母宿有膝攣疾亦愈許敏妻鍾氏萬歷杭州府志名蘭芳紹興人年十八歸仁和許敏敏授南兵部司務尋卒止遺一女氏時年二十九母欲奪其志氏泣曰夫策名仕籍吾復改事他人何顔以生甘淡泊躬組絍以自給守志三十餘年成化年旌單祐妻俞氏成化杭州府志生子未晬而祐亡時氏年二十一孝養舅姑撫鞠幼子成立舅姑壽終葬祭以禮鄉邦稱其孝者無間言郁惟敬妻方氏萬歷杭州府志名妙壽年十七適惟敬夫亡二孤昊升俱幼氏深居密室雖周親罕見其面屏絶尼媪家僮年十三即出居戶外不得與婢接守志三十年成化庚子旌表鄭璽妻魏氏明實録成化二十一年旌表魏氏名德盛蕭山人致仕尚書驥之孫女仁和鄭璽妻夫死魏氏屢欲自縊從死為母妹所覺乃斷髮自誓後齧一指流血不止而死且能孝事其父母鄉人共稱之表其門曰孝烈謹按舊浙江通志作郭璽妻考兩浙名賢録及萬歷杭州府志於越新編俱作鄭璽與實録同今從之第舊志皆以璽為錢塘人今從實録改歸仁和孫玉妻楊氏鄒虞孫母楊氏墓志玉疾醫藥勿效氏刲股和縻以進稍瘳踰年病復作竟不起時氏年二十七有欲移其志者輒叱絶之久之家益貧叔逼其改志乃以繩絏其子女共投於河里人號呼趨救自此人不敢有異議翁姑歿殯葬之需皆出其手教二子以德義詔旌其門聞顯宗妻郭氏嘉靖仁和縣志年二十六顯宗卒遺子甫周嵗名韶值門戶中衰人竊議曰艱危單薄孰為養生何暇完節氏撫孤保祚孀居五十餘年勤苦備嘗正德年旌表張晟妻于氏兩浙名賢録名永壽肅愍公之女孫嫁吏科給事中仁和張晟為繼室晟奉命封滿剌伽國王道卒於贑輿櫬歸枕氏號慟欲死父母曰汝有遺腹若幸而生子宗祊攸係茍欲自盡如張氏血食何自是不復言死時年二十六撫遺孤成就歷四十二年如一日周顯妻張氏兩湖塵談杭之湖州市有周氏者其子死其婦少命之嫁弗從姑之女方弱齡謂母曰嫂弗嫁是胡為逼之母曰吾老家貧甚且無與為侣女曰我請勿嫁以與嫂俱母初欲強之後竟不能奪艱苦共歷白首無玷余鳳妻徐氏萬歷杭州府志歸安人適仁和余鳳鳳卒氏年二十四家貧無子伯氏鸞欲奪其志氏斷髮毁容流血被體絶而復蘇不食者三日知不可奪乃為立後氏辛勤哺之躬紡績為衣食計撫嗣子成立年七十四卒莫聰妻倪氏嘉靖仁和縣志年十九適聰八年而聰卒氏日夜哀號母諭之曰爾青年無子孰與從俗無貽後悔氏曰吾雖無子猶子即吾子也又奚悔母強之即赴宅後池幾死趨救乃免知其志不移乃取兄子雲章為嗣嫠居五十七年壽八十五趙安妻陶氏萬歷杭州府志安以督運赴京卒於道氏年二十五子女俱無舅姑欲奪其志氏矢志不渝囓指出血家無儋石日事女工以給守節五十餘年沈氏二節萬歷杭州府志洪氏名淑蘭李氏名淑秀洪為沈厚繼室而李則厚弟仁之妻也洪歸時年十八越明年厚亡李歸時年十四越二年仁亡皆未舉子而厚有初妻之子曰昌甫二嵗家甚貧昌又孱弱未可保兩少婦相依以居人竊議其難守二婦曰吾自誓者心耳他人烏知之乃共撫昌且養其舅姑閨門嚴肅人無間言嘉靖十九年昌既成立屬觀風使采節里中乃自詣言狀核寶表門曰雙節沈文美妻俞氏萬歷杭州府志名淑蓮文美卒氏年二十恐人以年少有他議既免喪坐小樓不下居常寡言笑閨壺中未嘗見齒守節六十年嘉靖中上官髙其節旌之卓彥卿妻徐氏黃汝亨徐節婦傳彔溪徐氏女歸彥卿無子有女一彥卿死遵遺命繼猶子爾臧為子有鬩墻而貪狠者彥卿死僅七日而訟婦於公庭為所魚肉者過半計節婦生十五年而嫁嫁十年而寡中更家難煢煢惴惴卒能訓撫其孤以迄於成立衣冠之澤賴以不衰其女奴感主母貞操寡而不嫁者二人劉世學妻朱氏舊浙江通志世學殁家有五喪在淺土氏盡葬之頻年飢饉食麩皮米殼延劉氏一線苦節四十餘年年六十七寢疾子萬祺孫永駿同日刲股而氏卒不祿太守嚴正矩旌其閭沈貞女孫治沈貞女墓表年十五許字何宗祚明年宗祚死女聞欲自盡母曲慰之已而白於母曰兒豈忍忘母第令一叩夫棺即偕母以終身母不得已許之至門撫棺泣拜畢謁舅姑慟哭時母促女返女曰兒去此則有死耳事針縷以奉舅姑亡何其夫兄舅姑相繼死棺殮殯葬皆貞女竭力經營家益貧饘粥不繼兄從雲迎歸分室而居初宗祚曾大父倫世稱何孝子有墓石在隧道其族人鬻於他所貞女泣曰我艱難困苦以至今日為何氏一壞土耳乃捐資贖之而貞女遂得合葬以成其志顧諟命妻陳氏舊浙江通志年未三十諟命遊粵客死氏檘踊幾絶子大觀年甫十二涕泣奔喪柩歸訓之讀書治家業日隆起崇禎庚午旌表其孫媳張氏夫歿年二十八坐一室中三十年不出戶限教子之珩能文章人稱嫓美云吳以學妻張氏杭州府志年十六歸吳六年而以學死氏哀痛幾殞念有子瀾在忍死固守後瀾娶潘氐數年亦卒姑婦相依守志人稱雙節李青虬妻張氏舊浙江通志夫亡氏年二十九家如懸整撫幼子三縫紉自給掬水為沐採藿為餐鄉閭共歎其苦節年六十八嵗焚香默坐而卒凌貞女仁和縣志許字沈人騏未婚而人騏死女至其家守節而終丁氏二節舊浙江通志丁明德妻鄭氏年二十五明德歿苦節教子年九十一壽終丁錫綬妻沙氏年二十七守節奉姑孝謹訓子成立五十四嵗而卒人稱雙節有司旌其門諸氏二節仁和縣志蔡氏諸三錫妻馮氏諸三策妻三錫結褵僅四月隨父任歿於廣東蔡年二十三錫弟三策患瘵疾卒馮年亦二十三皆無子事女紅以給朝夕白首交相敬愛從子允曅幼失怙恃二氏同撫為子壽皆至七十三允曅事之如所生沈基仁妻陸氏舊浙江通志年二十九基仁歿氏絶粒七日子晉垣秦垣在弱齡時時勉以大義一夕獲偷兒詢之故家子也釋之且誡子曰汝輩不能自立安知其不如是耶歲荒刺繡易米以供老姑年五十餘卒郭氏三婦杭州府志郭仲和死於仇妻任氏守節撫孤備極瘁苦未三十髮如雪親族稱為白頭節婦子府妻華氏因鄰火抱郭氏家譜祖像升垣戰栗不能下焰及投譜及像於外而死府媳邵氏亦早寡有貞操莫氏二節舊浙江通志莫若明妻王氏若明歿王年二十七朝夕哭泣至淚枯目盲一日胸間痛甚忽生一孔每哭有血從孔出人以為此心淚也逾年而殁殮時忽郤然有聲視之從孔中見心翕翕而動無不驚嘆子汝齊娶邵氏時祖姑年已七旬汝齊與邵氏曲盡孝意祖姑歿汝齊亦亡子瑕甫三齡邵氏撫夫棺曰余所以茍延者念莫氏三世血食祗此一藐孤耳苦節三十五年卒年五十九旌曰雙節龔夢虬妻何氏舊浙江通志氏居家以孝著歸龔事姑相夫事俱合禮夢虬卒何氏號泣柩前移時不聞聲息視之已絶矣年二十七朱義叔妻汪氏舊浙江通志十七嵗夫殁遺娠一女甫晬又歿氏忍死食貧奉姑撫幼叔針紉不輟晝夜叔喪偶無力繼娶氏鬻衣為買妾生子得延宗祀吳美中妻汪氏仁和縣志年十五歸美中越八年而美中歿遺孤二撫之備極艱苦時流離江上遇盜以身赴水一晝夜不死次日如有物乘之而起苦節五十年吳氏柏舟杭州府志許字陳允璧未婚而陳殁誓不更嫁或勸之則自縊遂不復強乃歸陳守節入門拜翁姑曰今始得稱婦矣子亡婦在子職婦職也布衣操作姑甚喜居數年而歿篋中得遺詞若干篇時崇禎癸未年二十七胡增煌妻丁氏杭州府志名印姑明末避難遭亂兵投水死王氏女杭州府志許字里人姚舜賢明末盜起女從父應臯隱林薄間盜見女走追之脅以刃女不從盜怒欲殺之應臯見女急奔至乞免甚哀女曰我死不辱翁何哭盜知不可奪乃斫其尸數假并殺應臯時年十七陸瓉妻鍾氏舊浙江通志避難狗葬村遇盜至欲執之大罵盜以刀斷其手又斫其腦而死董伯元妻張氏仁和縣志結褵二載生子甫兩月而寡遂代子職奉姑嫜以孝撫孤教養成立壽八十五守節六十三年督學金鏡給匾旌其閭霍鏞妻徐氏徐震妻李氏王毅妻沈氏髙璠妻陳氏郁時妻黃氏郎榮妻徐氏孫應龍妻林氏何其英妻陳氏郭景春妻陳氏翁仁妻童氏潘鏜妻張氏胡沂妻方氏潘宗妻梁氏蔣華越妻王氏沈仲山妻俞氏陳應登妻沈氏邵泰寧妻沈氏潘懋勳妻沈氏何汝器妻孫氏馬鴻圗妻沈氏孫育璋妻陳氏陳天相妻陸氏龔應嶽妻金氏國朝卓人月妻丁氏舊浙江通志人月死氏悲憤不欲生既而曰卓氏多才吾兒雖幼傳經具在吾敢隳先人之遺業乎卒教子大寅立名於世康熙間巡撫范承謨題請奉旨建坊旌表沈維忠妻吳氏舊浙江通志年十八夫殁藐孤在抱舅姑在堂氏以女工具養益加敬謹旨建守節五十七年康熙十年具題奉坊旌表王文蔚妻張氏舊浙江通志夫亡未幾翁姑復逝子始一周藉針工紡績以給饔飱教子旨建克家蒸嘗無闕守節三十五年康熙十七年奉坊旌表馮人驥妻何氏題旌册年十七夫亡欲自剄以殉姑奪刀慰諭乃止坐臥一小樓以針指旨建所積營葬守節四十五年康熙二十二年具題奉坊旌表趙燮英妻陳氏題旌册年及筓歸燮英為繼室姑老臥病脫簪珥延醫侍湯藥年餘無倦容姑卒燮英繼殁氏年二十一遺娠生子聖善教之有成官國子監典籍其視原配子聖恩鶴不異旨建己出守節五十餘年康熙二十四年具題奉坊旌表仲升妻曾氏題旌册年二十九而寡順治乙酉奉姑避兵鄉村值姑卧病賊且至鄰婦呼氏同行氏曰吾義不可舍姑去惟守死以待耳蓬垢侍湯藥榻前賊至不為動賊曰孝婦也舍之去守節五十三年女適費之煌十九而寡母女相依母亡女以痛母相繼死羅文宰妻孫氏題旌册結褵數載無子勸夫納妾夫不許乃私聘王氏女置密室伺夫醉即令侍寢生一子夫亡氏年二十九妾亦卒氏教子有成守節三十八年朱仕偀妻姚氏題旌册年二十而寡遺腹生子又夭立姪為嗣守節四十二年李黃中妻項氏題旌册年二十八而寡事病姑撫二子守節三十六年崔世儀妻李氏題旌册年二十四而寡事孀姑撫繼子守節五十六年孫系康妻金氏題旌册年二十二而寡守節四十二年鮑嘉績妻王氏題旌册年二十三而寡守節四十二年聞於朝妻李氏題旌册年二十八而寡守節四十五年鍾天墀妻程氏題旌册年二十八而寡守節四十八年以上九氏俱康熙二十七年具旨建題奉表坊旌李萬全妻沈氏題旌册年二十四而寡孝事翁姑守節三十八年康熙三十年具題奉旨建坊旌表周維新妻沈氏題旌册夫遊學客死氏年二十九攜子奔喪扶櫬歸葬夫嫂亦寡居氏膳養之守節三十二年耳聞韶妻馮氏題旌册年二十三而寡守節三十三年沈桐妻張氏題旌册年二十六而寡守節二十九年以上三氏俱康熙三十五年具題奉旨建坊旌表張時仁和被旌者又有翁紹曾妻王氏馮登翔妻氏孫汝坤妻徐氏舊册無考見錢塘施元龍妻節孝録湯汝元妻諸氏題旌册諸時寶女年二十八而寡教子範為諸生範復夭媳鄭氏十九歲遺孤未周氏偕媳撫孫備歷艱苦守節四十六載康熙三十七年具題奉旨建坊旌表諸氏長姊為姚宗之妻次姊為徐有威妻皆少寡守志人稱時寶三女皆不幸而成苦節云姚大成妻楊氏題旌册年二十六而寡守節二十七年康熙三十九年具題奉旨建坊旌表吳𢎞謨妻陳氏題旌册年十六歸吳為繼室十八夫亡遺孤痘殤撫嗣子及原配所生女旨建婚嫁成立守節四十三年康熙四十一年具題奉坊旌表薑國英妻陳氏題旌册奉天鑲藍旗陳竒策女竒策官陜西榆林總兵順治十二年以征舟山至杭娶仁和柳氏為妻生氏奇策回京病卒柳居母家守志撫氏長配仁和縣民薑國英氏年二十一母與國英相繼亡孑身守志至康熙四十四年年四十九以母柩在杭不得與父合葬具情聞奉叩旨建坊旌表柳氏柩交與陳奇策子陳留安葬顧亥生妻王氏題旌册年二十歸亥生為繼室撫前室女如己出生二子夫亡氏年二十六舅姑早逝尚在淺土氏曰吾不即葬先人吾夫目未瞑也鬻簪珥以襄事咸盡禮夫妹適繆氏亦早寡無依氏迎歸同處殁為殯葬守節二十八年吳霄妻姚氏題旌册年二十六而寡上有三喪未舉氏經營殯葬遺孤又殤繼姪為嗣守節三十八年沈大受妻周氏題旌册年二十八而寡守節五十年鍾運亨妻葉氏題旌册年二十二而寡守節四十二年徐瀚妻尚氏題旌册年十九而寡守節四十三年姚泂妻聞氏題旌册年二十六而寡守節三十八年湯渙妻王氏題旌册年十九而寡守節五十年上七氏俱康熙四十四年具題奉以旨建坊旌表嚴曾采妻吳氏題旌册年二十八而寡三子皆幼翁殁伯叔析産吳獨取所載書授諸子曰欲汝等盡讀是書知立身大義也已而家燬於火貧甚長子夭又育其孤孫復死吳慟不欲生因病卒守節三十二年夏時升妻陳氏題旌册年二十七而寡晝夜織作事舅姑撫子女守節二十七年周雲發妻袁氏題旌册年二十八而寡守節二十八年以上三氏俱康熙四十七年具旨建題奉表坊旌鮑望錫妻黃氏題旌册年二十而寡遺孤幼其祖姑汪姑許亦俱寡氏惟針紉紡織易米薪以奉時有三世孤芳一門篤孝之譽守節三十五年陳廷倫妻吳氏題旌册年二十六而寡守節三十年李圖龍妻王氏題旌册年二十九而寡守節三十三年靳德化妻卜氏題旌册年二十一而寡守節三十一年徐錫文妻金氏題旌册年二十七而寡守節四十四年龔國鼎妻陳氏題旌册年二十八而寡守節三十九年沈至倫妻趙氏題旌册年二十三而寡守節五十年以上七氏俱康熙五十年具題奉旨建坊旌表汪雲瑞妻王氏題旌册年二十八而寡子女俱幼伯氏屢以語侵氏至不可忍氏持益堅伯氏歿遺二子無養氏收撫之人曰以德報怨信有之乎氏曰吾為祖宗計耳德怨非所計也守節六十三年嚴甡妻俞氏題旌册年二十三而寡舅姑及叔兟繼殁娣張氏年十九氏偕娣共勵冰霜守節四十年沈士昭妻劉氏題旌册年二十二而寡守節三十八年范玉珍妻朱氏題旌册年二十而寡守節三十二年以上四氏俱康熙五十二年具題旨建奉旌表坊時仁和被旌者又有周之暹妻沈氏二十三而寡守節二十八年舊册失載見周氏節孝録金簡妻沈氏題旌册年二十五而寡事孀姑孝撫猶子為嗣葬舅姑及夫守節五十八年金城妻鄧氏題旌册年二十七而寡守節五十九年李世臣妻王氏題旌册年二十二而寡守節五十一年孫之駿妻潘氏題旌册年二十一而寡守節三十一年沈純福妻塢氏題旌册年二十二而寡守節三十一年龔澄妻朱氏題旌册年二十三而寡守節三十六年王國禎妻吳氏題旌册年二十五而寡守節四十七年于濟淳妻許氏題旌册年二十六而寡守節五十一年童元奎妻孟氏題旌册年二十三而寡守節三十四年孫肇起妻毛氏題旌册年二十一而寡守節三十三年姚蒼璧妻張氏題旌册年二十五而寡守節二十七年胡鎮妻沈氏題旌册年二十九而寡守節四十八年袁濤妻陳氏題旌册年十九而寡守節三十七年蔡廷琇妻沈氏題旌册年二十五而寡守節四十三年李婃題旌册父勉庵授生徒外舍有友張斌客武昌使其子仕華來學十三能文父喜遂以婃許婚焉既而仕華之母病其家來迎婃往未到門而姑死留視含殮返越二年仕華死時年十八婃初請視殮父不許既而請易服父曰百年甚遙兒以倉卒決之保無後悔耶曰百年時也決之倉卒者志也志決矣又何悔會其舅歸婃喪服出見舅嗥咷頓足曰吾不忍喪兒後復見有此且嗥且去去武昌不返婃乃闢一室立姑主及仕華主歲時祀之守志四十年以上十五氏俱康熙五十九年具旨建題奉表坊旌沈雲衢妻丁氏題旌册年二十二而寡遺子女各一家無伯叔事針縷以養舅姑者數十載子長又殁僅遺孤孫氏撫訓成人守節四十五年楊茂銓妻蕭氏題旌册年二十六而寡舅姑老且病氏奉侍歷久不懈舅姑殁拮據殯殮有叔不類逼之嫁氏截髮毁容終不能奪守節四十二年以上二氏俱雍正元年具題奉旨建坊旌表盧士麟妻章氏題旌册年二十三而寡二子幼夫弟士彪死無後章以次子繼之與娣韓共勵名節守節三十七年俞溥妻陳氏題旌册年十九而寡事舅姑孝教子有法守節七十四年周抗妻馮氏題旌册年二十三而寡事祖翁翁姑極孝母亦孀居無倚迎養於家課子嚴守節四十三年賀成章妻郭氏題旌册年十八而寡撫繼嗣事舅姑守節三十七年朱逹先妻沈氏題旌册年二十三而寡家貧無伯叔織絍養姑訓二子守節三十二年徐承華妻沈氏題旌册年二十九而寡義方教子守節三十三年墓在三台山都御史沈近思撰志銘祝文儒妻張氏題旌册年二十七而寡育周歲子成立守節三十年邵典妻唐氏題旌册年二十七而夫客死鬻衣飾扶櫬歸葬事庶姑撫三子守節四十九年金子蛟妻孫氏題旌册年十九而寡教子有成守節三十三年陳永齡妻邵氏題旌册年二十七而寡葬舅姑撫子守節三十四年江垐妻宋氏題旌册年二十五而寡事舅姑撫繼嗣守節四十二年管九玉妻楊氏題旌册年二十八而寡事姑撫子守節四十二年王起祥妻徐氏題旌册年二十四而寡撫遺孤守節三十三年計鈞妻周氏題旌册年二十七而寡翁客死粵東氏鬻簪珥命子扶柩歸葬守節三十二年唐圻妻張氏題旌册年二十一而寡事孀姑撫子守節四十三年唐鏞妻屠氏題旌册年二十四而寡事兩代孀姑撫遺腹子守節三十九年沈佩蒼妻顧氏題旌册年二十二而寡撫姪為嗣守節六十一年楊大奎妻劉氏題旌册年二十九而寡葬舅姑撫三子守節四十四年沈錫祚妻陳氏題旌册年二十七而寡事舅姑以養以葬守節三十八年吕宋昌妻陳氏題旌册年二十八而寡撫遺孤守節四十二年胡之紀妻陸氏題旌册年二十四而寡家貧養舅姑撫子守節六十二年陳茂銓妻蔡氏題旌册年二十六而寡事舅姑撫子守節四十二年湯修正妾姚氏題旌册年二十九而寡撫繼嗣守節二十三年潘文涵妾朱氏題旌册年二十而寡事舅姑撫弱女守節四十年蔡一綸妾陳氏題旌册年二十九而寡勤紡織以事其嫡撫孤有成守節二十九年朱貞女題旌册許聘何名立未婚夫亡聞訃易服奔喪孝事舅姑守貞三十七年以上二十六旨建氏俱雍正二年具題奉坊旌表金日燦妻朱氏題旌册年二十五而寡家貧有勸其改適者即厲聲堅拒剪髮自誓事姑孝教子嚴守節四十八年趙熊周妻景氏題旌册年二十五而寡父母欲奪其志氏截髮自誓事衰翁撫幼子守節三十三年諸長祚繼妻吳氏題旌册年十九而寡截髮明志葬舅姑子夭復撫其孫守節五十九年盧金源妻陸氏題旌册年二十五而寡事姑撫子守節二十八年沈鏞妻屠氏題旌册年二十而寡事兩世翁姑俱孝立繼承祧守節三十二年盧懋正妻俞氏題旌册年二十四而寡勤十指銖積葬夫立姪為嗣守節五十七年萬英妻劉氏題旌册年二十二而寡事舅姑撫子守節三十二年王際益繼妻汪氏題旌册年二十七而寡撫子守節二十四年萬萃妻徐氏題旌册年二十四而寡事舅姑撫子守節二十八年邵鼎鉉妻胡氏題旌册年二十六而寡事翁姑撫子守節三十年張金相妻范氏題旌册年二十九而寡葬舅姑及夫撫幼子守節二十三年劉禹錫妻蔣氏題旌册年二十九而寡葬舅姑撫子守節四十三年趙錫穎妻謝氏題旌册年二十九而寡勤十指教子守節二十四年孫燦妻吳氏題旌册年二十五而寡事孀姑撫子守節三十五年劉啓柷妻鍾氏題旌册年十七而寡事舅姑撫繼嗣守節四十年陳志濟妻沈氏題旌册年二十七而寡事舅姑撫子守節二十四年王瑜妻劉氏題旌册年二十而寡事舅姑撫遺腹子守節三十八年李允國妻何氏題旌册年二十四而寡家貧事姑撫子守節二十六年吳修齡妾陳氏題旌册年二十五而寡事姑撫子守節二十九年以上十九氏俱雍正旨建三年具題奉坊旌表周增妻張氏題旌册年十九而寡前室遺子兆鑑甫五齡己子兆錫生僅百日氏囓指出血以首觸棺號慟曰妾不死將撫二子有成也卒能如其言守節三十五年嚴又謙妻潘氏題旌册年二十九而寡事姑撫子守節二十八年陳泰正妻張氏題旌册年二十三而寡家貧子女幼藉針黹以給饔飱守節五十八年塢天茀妻唐氏題旌册年二十六而寡姑寢疾十四年氏奉侍不離左右無倦容歿則喪葬盡禮遺子殤立繼為嗣守節二十九年陳堯年妻吳氏題旌册年二十七而寡事舅姑撫繼嗣守節四十六年張楚臣妻章氏題旌册年二十七夫客死訃聞鬻衣􅎖往扶櫬歸葬立姪為嗣守節四十八年徐國士妻嚴氏題旌册年二十七而寡事舅姑撫女守節三十一年蔡志森妻李氏題旌册年二十七而寡事孀姑撫子子夭又撫孫守節四十六年朱雲鶴妻孫氏題旌册年二十五而寡家貧撫子子夭又撫孫守節五十三年陳爾飛妻錢氏題旌册年二十二而寡克盡生事死葬之禮後室遭鄰火氏棄家資惟從容抱先世木主以出即構一椽以奉蒸嘗康熙丙戌應繼子生彌月立為嗣曰吾願畢矣旋卒守節三十五年倪瑶妻汪氏題旌册年二十五而寡投繯救免家貧冬無絮衣夏無幛撫繼子又夭復撫孤孫守節三十三年題奉以上十一氏俱雍正四年具旨建坊旌表吕份妻張氏題旌册年二十三而寡侍姑疾晝夜撫摩歷兩載不倦姑殁事衰翁撫幼叔守節四十四年沈𢎞綸妻范氏題旌册年十七而寡事衰翁撫子守節三十三年傅熙妻周氏題旌册年二十而寡事舅姑撫子子亡守節三十二年以上三氏俱雍正五旨建年具題奉坊旌表沈瑗妻夏氏題旌册年二十四而寡事孀姑以養以葬撫繼嗣成立守節二十七年周鑣妻孫氏題旌册年二十八而寡上事祖姑下撫子女四人守節四十四年方于正妻潘氏題旌册年二十二而寡事舅姑撫子守節四十年朱萬化妻田氏題旌册年二十五而寡事舅姑撫幼嗣守節四十四年何建芳妻楊氏題旌册年二十二而寡撫前子及己子俱成立守節三十六年張德明妻華氏題旌册年二十四而寡事姑撫子守節四十三年袁景𢎞妾馬氏題旌册年二十五而寡訓育子女有成守節三十一年以上七氏俱雍旨建正六年具題奉坊旌表陳嘉會妻朱氏題旌册年二十九而寡家中落子甫七歲夜紡織逹旦砥節撫孤守節三十年周子逹妻鍾氏題旌册年二十四而寡止一女三歲撫長遣嫁年二十七亦寡能以節稱人謂母之教也氏足不踰閾言不出閫年六十翁姑尚存扶持不離左右守節五十七年毛應元妻楊氏題旌册年二十七而寡事孀姑撫遺腹子守節四十九年成之泓妻沈氏題旌册年二十九而寡撫前室子女與己生三子無異視守節二十四年沈上悅妻宋氏題旌册年二十三而寡繼姪維楷為嗣既而遺腹生維材撫教無二守節二十二年薛望如妻陸氏題旌册年二十四而寡遺女一伯氏主家政有逋負姑年邁常以為憂氏脫簪珥以償姑乃喜又葬其先世數棺並其夫祔焉女長擇配守節五十三年蘇承德妻唐氏題旌册年二十九而寡家貧鬻衣飾供舅姑舅姑殁喪葬盡禮守節二十二年陳長濬妻吕氏題旌册年二十五而寡止一女氏紡績養姑姑弟官江右迎姑任所氏依母家守志姑卒櫬歸氏百計營葬女長擇配守節四十四年沈靈長妻唐氏題旌册年二十九而寡遺子二次子娶郎氏年十七亦寡感姑之貞矢死靡他唐氏守節二十八年張士麟妻李氏題旌册年二十九而寡姑繼歿二子俱幼欲以身殉父慰之曰豫雖老爾能撫孤吾朝夕猶可相顧也乃止明年父殁氏操持綜理拮據幾三十年畢嫁娶守節二十七年旨建以上十氏俱雍正七年具題奉坊旌表王震妻胡氏題旌册年二十八而寡教子極嚴人有勸之者則曰吾所以不死者惟此子也如其不類何以見夫於地下子亦感泣自奮守節二十年姚守仁妻宋氏題旌册年二十七而寡遺腹生一子勉之力學遂得成立守節三十六年顧光前妻翁氏題旌册年二十七而寡子甫周嵗氏斷髮矢志鞠之長詩書皆氏口授不使須臾遊嬉守節四十七年陳庶霑妻魏氏題旌册年二十七而寡遺子女六人翁姑早喪又無伯叔氏營葬兩世畢子女婚嫁守節一十五年許永寧妻周氏題旌册年二十三而寡事姑撫子守節四十三年朱南鉉妻吳氏題旌册年二十而寡上事兩代翁姑下撫二齡幼女嘗兩遭鄰火歷遍迍邅守節二十七年唐龍徵妻徐氏題旌册年十九而寡無子歸依母家守節四十年王於濵妻潘氏題旌册年二十七而寡撫子子夭撫孫孫又夭復撫曾孫守節六十年諸九鼎妾黃氏題旌册年二十九而夫客死遺子女各一子巽發能讀書女適陸曾錫早寡有貞操氏之教也守節四十年朱恆孚妾蔣氏題旌册年二十九而寡事姑撫子女守節四十二年成廷模妻趙氏題旌册年二十九而寡二子幼以哭夫損一目晚年次子與媳俱亡復以哭子損一目兩目俱瞽守節三十六年汪景明妻楊氏題旌册年二十四而寡撫孤娶婦子又夭同媳堅守立孫以續蒸嘗守節二十七年陳埁妻徐氏題旌册年二十五而寡撫遺孤又殤立姪承祧守節二十六年孫韶妻羅氏題旌册年二十一而寡事孀姑撫繼嗣苦積數十年女紅所得以葬公姑及夫柩守節四十九年滑嵊妻周氏題旌册年二十七而寡子殤立姪為嗣守節二十四年劉應麟妻薛氏題旌册年二十四而寡撫前子如己出事祖姑孝祖姑殁喪葬皆氏獨任不以有伯叔為辭守節三十一年吳楷妻張氏題旌册年二十四而寡事舅姑撫子守節四十三年王廷鎔妻黃氏題旌册年二十七而寡撫子文瑋夫弟亦早卒遺孤文珩氏視猶己子俱撫教有成守節二十九年吳以寧妻茹氏題旌册年二十九而寡姑已先逝氏撫幼叔成立立姪為嗣守節三十五年韓世臣妻張氏題旌册年二十七而寡子甫周歲家無恆業日夕勤針黹自給守節三十一年俞瑞臣妻王氏題旌册年二十四而夫客死京邸翁年老氏親赴京匐匍經年始得扶柩歸里繼子卒復立姪為嗣守節三十三年章麟士妻李氏題旌册年二十五而寡子方在抱閲二載子殤立姪開緒為後又未婚而卒聘媳吳氏奔喪守志擇族孫為其後守節四十八年張漢卿妻吳氏題旌册年二十五而寡遺孤數月家貧勤女紅以養孀姑姑殁拮據營葬翁姑及夫柩訓子極嚴守節二十九年潘驥妻王氏題旌册年二十六而寡止一女翁姑殁積女紅所得十年而克葬并以夫祔焉女長擇配守節三十五年陸立廉妻汪氏題旌册年二十三而寡事孀姑極孝撫遺腹子以慈而嚴親紡織勤督課嘗誡其子曰父書可讀寸隂當惜輒至淚下守節三十一年周卜妻錢氏題旌册年二十九而寡遺女二家貧以針黹易粟養舅姑而己則以粳籺度日翁姑殁幼叔止七歲撫育婚配立姪為後二女亦得所歸守節三十四年馮泰森妻俞氏題旌册年二十九而寡無子立姪為後律身嚴謹足不踰閾守節二十六年錢修元妻王氏題旌册年二十三而寡舅姑早喪繼姪為後凡宗黨中貧者遇喪葬婚嫁氏必出資助之守節二十八年汪乘御妾張氏題旌册年二十七而寡紡績課二子事無巨細必稟嫡而行守節三十八年周之晨妾俞氏題旌册年二十九而寡遺子女各一子又殤撫女遣嫁守節二十八年吳貞女題旌册吳裕之女受章開緒聘未婚開緒卒女聞訃以頭搶地幾殞父母力止遂歸章侍奉孀姑晨炊晚汲無不躬親撫姪為後歷三十載如一日以上三十一氏俱雍正八年具題奉旨建坊旌表任瑞卿妻李氏題旌册年二十三而寡事姑孝教子有成守節四十五年張文九妻何氏題旌册年二十一而寡事翁姑撫二子守節三十七年項景修妻何氏題旌册年十六而寡無子投繯者再俱救蘇遂撫姪為後守節四十八年何詹雲妻周氏題旌册年二十而夫客死子又殤凡三立繼嗣卒使夫祀不絶守節四十五年倪雲卿妻陳氏題旌册年二十七而寡事姑撫子守節三十一年郭淇妻吳氏題旌册年二十一而寡子繼祖早夭遺女四氏偕媳張氏同撫之又繼姪為嗣守節四十八年劉駿業妻錢氏題旌册年二十五而寡事庶姑撫遺腹子守節三十五年吳瀞妻汪氏題旌册年二十二而寡無子引刀自剄以救免潛吞鉛粉不死乃撫姪為嗣守節四十一年景德亮妻支氏題旌册年二十三而夫客死粵東家貧甚氏撫三月子長名福祐肩販養母守節五十八年薑培霦妻王氏題旌册年二十八而寡葬舅姑及夫柩撫遺孤守節四十年錢世清妾曹氏題旌册年二十九而寡事其嫡甚謹撫教三子一女長子殤餘俱成立守節二十二年黃朴妾潘氏題旌册年二十七而寡嫡生一女贅於家氏待之甚恭撫遺孤延夫一線守節三十四年成廷模妾戈氏題旌册年二十五而寡家貧撫二子俱夭守節三十年吳氏二節題旌册趙氏吳光旭妻聞氏其妾也光旭客死湖南時趙年二十七聞二十九聞訃奔喪扶櫬歸葬侍姑疾九載無倦容子女九人二氏出也相與共撫之聞守節三十年先卒趙守節五十一年沈潚妻龔氏題旌册年二十五而寡夫疾革時欲從死夫曰兒幼爾若死誰其撫之於是矢志撫孤教養成立守節五十五年方召妻鄧氏題旌册年二十八而寡奉舅姑賃屋以居足不踰閾撫二子成立守節二十六年盛必選妻張氏題旌册年二十八而寡家貧事衰翁甚孝子長親自課讀守節五十一年王啓璉妻孫氏題旌册年十九而寡孝事翁姑翁姑殁拮據營葬撫子娶媳生孫子媳又相繼夭氏復撫其孫守節三十七年郭繼祖妻張氏題旌册年二十七夫客死粵東事孀姑撫遺女四立姪為嗣守節二十八年周􅱠妻楊氏題旌册年二十八而寡遺孤孱弱氏恐絶宗祧勸翁納妾舉子翁殁氏俱撫之守節三十三年袁慧妻王氏題旌册年二十五而寡截髮毁容自誓奉孀姑撫繼子守節三十六年陳倬妻沈氏題旌册年二十七而寡家貧營葬舅姑及夫柩撫子成立守節三十二年孟士成妻徐氏題旌册年二十一而寡一子又夭立姪為後守節三十六年潘啓鳳妻林氏題旌册年二十八而寡撫前室女及己子俱克成立守節五十一年費鉉妻沈氏題旌册年二十二而寡撫遺孤守節五十三年髙世隆妻湯氏題旌册年二十九而寡事舅姑撫子守節二十八年徐兆璋妻何氏題旌册年二十四而寡繼姪為嗣後四月遺腹生子氏俱撫之成立夫遺借券貧不能償者悉焚之親串有危急者悉周之守節三十七年許紹恩妻杭氏題旌册年二十九而寡事繼姑撫子姑殁氏兄機迎養於家守節三十四年汪文增妻吳氏題旌册年二十七而寡葬先世未葬之柩及舅姑與夫教子讀書守節三十年馮玉華妻王氏題旌册年二十而寡撫教子女有成守節三十六年莊嶨妻夏氏題旌册年二十九而寡事姑孝謹守節三十八年姑老且病猶左右扶掖浣濯溲溺稱其孝者無間言錢士成妻吳氏題旌册年二十六而寡翁姑繼殁氏鬻衣飾殯殮事庶姑一如親姑繼姪為嗣守節四十八年嚴儀煌妻朱氏題旌册年二十七而寡越四年翁姑繼殁拮據殯殮人勸其暫厝淺土氏曰緩葬非禮遂竭蹶營窀穸教前室子在昌及己子璲嚴而有法同登庚戌進士人以為節孝之報潘妻吳氏題旌册年二十六夫亡悲哀成疾行不數步輒喘息然猶強起事姑夢神授以藥沉疴頓愈未幾室廬被火構一椽奉姑以居姑殁鬻屋殯殮附居戚屬教子國昌為諸生守節三十二年王應鳳妻俞氏題旌册年二十三而寡事舅姑撫遺腹子守節四十一年吳琇增妻程氏題旌册年二十四而寡繼姪為嗣守節三十餘年忍飢禁寒紡織縫紉手瘃足瘏不少輟守節三十四年屠樹楷妻金氏題旌册年二十而寡家貧積麻易粟養姑訓子義方守節三十一年徐啓恆妻劉氏題旌册年二十九而寡撫遺孤守節四十一年陳嗣芳妻談氏題旌册年二十二而寡事舅姑撫繼嗣守節二十九年舒貞女題旌册許字陳朝焜未婚朝焜卒女泣請往弔遂不歸居年餘父私受聘於盛氏及請期始告女遂欲自盡以救解盛訟於縣鞫時令諭女從父女大慟曰吾知終身於陳而已令嘆息命其父還盛聘俾女終其志焉女不苟言笑終歲紡績至老不衰卒年五十四以上四十一氏俱雍正旨建九年具題奉坊旌表錢德智妻陳氏題旌册年二十五而寡遺孤二家日以落氏勤紡織持門戶撫子成立守節四十年卒郇鸞妻陳氏題旌册年二十三而寡守節二十三年周維新妻葉氏題旌册年二十一而寡繼姪為嗣守節四十年吕祧妻俞氏題旌册年二十而寡撫子守節四十九年丁鼎相妻沈氏題旌册年二十九而寡舅姑老二子炳煜俱幼氏以一身仰事俯畜孝慈兼盡守節二十二年章泓妻夏氏題旌册年二十九而寡撫姪為嗣守節二十四年陸聖存妻李氏題旌册年二十九而寡遺孤一氏勤針黹以奉舅姑教幼子守節二十七年張曾妻汪氏題旌册年十七而寡截髮置夫棺內以矢靡他事舅姑孝茹素終身守節三十八年葉世寵妻程氏題旌册年二十七而寡事孀姑撫子守節二十七年應琦璜妻朱氏題旌册年二十八而寡撫孤成立守節三十年沈子珮妻吕氏題旌册年二十五而寡無子贅壻承夫祀守節三十年黃樊渟妻許氏題旌册年二十六而寡事舅姑撫子守節二十八年沈昆妻倪氏題旌册翰林院庶吉士倪天騄女年二十三而寡撫子守節三十二年鮑安鼎妻葉氏題旌册年二十而寡事孀姑撫遺腹子守節三十二年以上十四氏俱旨建雍正十年具題奉坊旌表唐辛妻朱氏題旌册年二十三而寡孀姑在堂祖翁祖姑俱年八十餘氏一身兼子孫之職生事死葬必誠必敬遺孤三嵗教育動遵禮法故子亦能孝其母守節五十四年施鉉妻陸氏題旌册年十九而寡奉事舅姑及殯葬俱盡禮訓子讀書子登戊子鄉薦守節五十三年沈上勳妻顧氏題旌册年二十七而寡撫姪為嗣守節四十一年王為楫妻郎氏題旌册年二十一而寡奉事舅姑極盡誠敬無子撫幼姪以繼宗祧守節二十二年潘光宗妻徐氏題旌册年二十而寡守節六十一年金建烈妻方氏題旌册年二十九而寡撫子守節五十九年夏瑞芝妻徐氏題旌册年二十九而寡事姑撫子守節二十二年髙維三妻馮氏題旌册年二十五而寡事舅姑撫子守節二十四年張灝妻章氏題旌册年二十七而寡奉事舅姑生則盡養死則盡哀撫遺孤慈嚴交至守節二十五年林邦基妻曾氏題旌册年十五歸林十三年而夫殁訣時許以身殉家人百計阻之不得鳴於官諭以舅在且老宜代夫供子職母徒死氏乃不死事其舅敬謹無失逾三年舅殁經營喪葬訖氏曰吾今乃可踐吾言矣賦絶命詩一章不食十四日而死俞玉倍妻曾氏題旌册年二十九而寡事舅姑撫子守節三十四年鈕如恆妻傅氏題旌册年二十七而寡翁姑在堂備極孝養殁後脫叉梳以營喪葬遺孤六齡撫育教訓至於成立守節四十六年陳起鳳妻俞氏題旌册年二十八而寡上事孀姑甘旨無缺修瀡必恭撫二孤慈嚴並至守節三十七年吳宗楷妻張氏題旌册年十九夫亡絶粒數日不死翁姑之柩在室親兜土石以營窀穸撫孤子以義方未嘗姑息因得成立守節二十四年邱貞女題旌册生有至性母患癱癲親嘗湯藥聞有議婚者輒號泣不食誓奉終身母疾忽愈父許字鄧正時年已二十七矣將婚夫殁聞訃蓬首過門撫尸慟哭暈絶數次因留鄧氏侍奉老姑暨前室所遺子女仰事俯育終身長齋布素家日貧苦惟勤紡績以供朝夕守貞四十一年翁元鼒妻蔡氏題旌册年二十九而寡事舅姑身兼子職殁則盡哀盡禮無子以姪為嗣恩勤顧復一如己出守節三十一年朱大復妻張氏題旌册年二十四夫亡誓欲從死孀姑謂之曰我一子止有二雛汝死必不能成立我將何託因勉為未亡人奉姑極其誠敬姑殁喪葬盡禮為二孤娶婦必擇詩禮之門勿計奩資之厚薄守節三十二年顧嵩生妻吳氏題旌册年二十九而寡事姑撫子守節三十一年錢順元妻黃氏題旌册年二十而寡奉事翁姑承顔順志無子夫有胞弟尚在髫年為之婚配得生子抱立為嗣守節三十六年程祚璡妻張氏題旌册年二十四而寡事舅姑撫姪為嗣守節三十四年陳永昌妻湯氏題旌册年二十七夫疾每夜祝天願以身代夫臨終囑曰孀姑幼子托賴於汝子職父道汝其兼之慎勿輕生以貽我憂氏勉從夫命稱未亡人奉姑如母教子義方歲時墓祀必陳説夫命惟恐稍致隕越有負初志也守節二十九年江儼若妻沈氏題旌册年二十五而寡家無儲蓄日謀甘脆以奉舅姑皆壽至八十而終喪葬盡禮守節四十二年陳曾藙妻周氏題旌册年二十一夫亡慟絶復蘇者再依夫弟及前妻所生二子以居勤儉自守不茍言笑守節三十一年陸廷相妻都氏題旌册年二十夫亡慟絶而蘇翁卧疾數年侍奉匪懈姑目失明小叔小姑賴其撫育婚嫁從厚妯娌雍睦未嘗析箸翁姑送終咸合古禮撫姪為嗣守節四十五年馮長仁妻王氏題旌册年二十七而寡撫子守節二十九年翁世焜妻黃氏題旌册年二十五而寡事舅姑撫姪為嗣守節四十二年胡家珍妾汪氏題旌册年二十二而家珍卒投繯數次姑與嫡勉之曰爾懷孕數月冀生男稍延胡氏一線因泣拜受命竭力女紅佐嫡以奉姑後嫡及姑相繼亡經理喪事無遺憾家業中替命子服賈四方訓課諸孫俾克成立守節四十七年陳廷武妻諸氏題旌册年二十八夫亡哀毁欲以身殉緣翁老思盡子職躬承菽水得其歡心殁則奉姑合葬饗祀極其誠敬子奉母教家聲因以振起守節四十六年唐世璉妻沈氏題旌册年二十七而寡事姑撫姪為嗣守節二十七年張正玉妻王氏題旌册年二十而寡舅姑在堂日事女紅以供甘旨既殁盡脫簪珥以營喪葬無子撫姪為嗣守節三十四年王藎臣妻楊氏題旌册年二十四夫亡翁姑在堂孝養備至相繼殁喪葬盡禮遺孤復殁立姪為嗣守節三十年沈貞女題旌册許字錢繼芳未婚繼芳病故女年二十二父母欲令改適女不從舅思子成疾女賣衣倩兄寄與及殁盡鬻所剩粧奩以營殯殮守題貞三十一年以上三十二氏俱雍正十一年具旨建奉旌表坊徐宗洛妻童氏題旌册年二十三夫亡舅姑老子甫孩提氏健持門户於舅姑生養死葬無不盡禮訓其子成立守節三十年張聲逺妻朱氏題旌册年二十九夫亡遺子女各一上有兩世姑嫜氏養生送死無遺憾完子女婚嫁守節二十五年張紹德妻吳氏題旌册年十九結褵甫五月而夫亡遺腹生女撫長擇配每念繼嗣無人泣曰吾空守一生何以見良人於地下至臨沒時始得襁褓堂姪立以為子曰吾死無恨矣守節三十五年葉懋儀妻錢氏題旌册年十九適懋儀三載生一子而夫亡家貧棺衾無措鬻衣殯殮勤紡績撫教孤子成立守節五十年嚴肇標妻傅氏題旌册年十八歸肇標生子女四人肇標病將革囑氏曰吾上無伯叔中鮮兄弟此四幼稚者惟爾是賴言訖而瞑氏時年二十九卒能撫教子女俾各成立守節二十三年郭日復繼妻沈氏題旌册年二十二歸日復日復卒氏年二十四前室遺女五人時舅姑已先亡祖姑在堂同祖伯仲叔三房俱早世無子季有一子甫成童俟其娶婦生子即撫以為嗣事祖姑克盡孝養五女長擇壻遣嫁俾俱得所守節三十三年成之淙繼妻周氏題旌册年十六歸之淙二十四夫亡撫前室子及己子無異視終身茹素衣褐日事女紅守節三十六年沈鳳岐妻錢氏題旌册年十九適鳳岐甫三載夫亡舅姑老氏曲盡孝養以壽終撫姪為嗣又早夭復撫其幼孫成立守節三十年王雲生妻楊氏題旌册年二十八夫亡撫教子女四人長為婚嫁孫曽林立守節五十九年翁國梓妻沈氏題旌册年二十二夫亡事舅姑雖處困約必具羞腆子瑞徵出就外傅修脯之費皆出自十指間守節三十三年梅朗寒妻華氏題旌册年二十九而寡事姑孝教子以義方姑沒鬻衣飾治殮具負土成墳守節四十三年朱必先妻姚氏題旌册年二十八而寡無子截髮投棺以示不二家貧炊煙常絶淡如也氏叔憐而迎養之獨居一室足迹不出户積數年女紅所入為舅姑及夫營葬事守節四十年陸光揚妻馬氏題旌册年二十五夫亡事舅姑孝撫孤長娶婦生孫氏以積勞致疾臨沒呼子告婦曰太翁姑年逾八旬我死汝善事之以慰我於地下遂卒守節一十八年顧寅生妻沈氏題旌册年二十一夫亡無子以猶子為子家貧凡虀鹽薪米無不出自十指而律身甚嚴雖老足不踰户守節五十五年陳六謙繼妻華氏題旌册六謙為溧水縣令卒於官氏年二十九貧不能歸舅病於邸舍經營醫藥及沒力為殯殮荼苦備嘗子三長嘉會出繼官永寧知州後歸宗次子三子俱自襁褓中撫教成立守節六十三年韓奕明妻孫氏題旌册年二十九夫亡撫三子成立舅姑早卒有孀娌逺居他郡氏迎養於家擇地葬夫親負畚鍤成墳守節五十九年俞文徵妻鈕氏題旌册年二十八夫亡一子撫長娶婦又早夭復撫遺孫得延一線守節五十二年田元成妻魯氏題旌册年十八歸元成二十四而寡立繼承祧家貧藉女紅以仰事俯育舅姑沒喪葬盡禮守節三十年沈之鍔妻談氏題旌册年二十五歸之鍔甫二載而寡遺孤廷涵未睟氏上事衰翁下撫幼子終歲織絍以佐饔飱雖嚴寒酷暑不輟守節二十八年蘇繼瞻繼妻何氏題旌册年十九歸繼瞻二十五夫亡撫前妻孟氏勞氏子女悉為婚嫁守節四十四年徐謙繼妻潘氏題旌册年二十二適謙次年謙卒撫前室遺女長歸士族繼姪𢎞禧為後訓誨成立守節二十九年趙士芳妻邵氏題旌册年二十八夫亡子甫五嵗舅姑老氏上事下撫勤儉操作終身茹素子長而氏心力已瘁晚年多疾病子能孝養守節三十七年金武妻馬氏題旌册年十八適武二十一夫亡遺子方睟氏盡心鞠育俾得成立事舅姑生養死葬守節三十三年髙應龍妻吳氏題旌册年二十六夫亡撫姪為嗣事舅姑以孝聞閨門整肅親戚罕見其面守節二十五年文爾鑲妻盛氏題旌册年二十五夫亡撫子廷標成立事舅姑先意承志舅卒事姑益謹守節二十八年汪天榮妻吳氏題旌册年二十九而寡三子皆幼延師督課克繼家學夫有二妾孫氏洪氏諭以大義皆同氏守志親旌有貧乏者咸周之守節三十一年陳載式妻夏氏題旌册年十九適載式明年載式卒無子氏誓以身殉姑泣諭始止氏孝於姑和於妯娌撫姪以為夫後守節三十五年吕允斌妻姚氏題旌册年二十二而寡子甫周嵗家貧饔飱不給氏日事機杼供舅姑甘旨無缺教子以義方守節三十二年沈美千妻張氏題旌册年二十八而寡事舅姑二十餘年得其歡心沒為營葬教子廷元有成守節三十八年沈行千妻莫氏題旌册年二十九而寡家貧紡績以養舅姑撫幼子舅姑沒竭蹶營喪葬咸盡禮守節四十四年江祖相妻孫氏題旌册年二十七適祖相二十九而寡舅姑老子甫周嵗氏以一孀婦撑持門户備極勞瘁舅沒鬻衣飾為殮具事姑愈孝姑登上壽守節二十三年倪璉繼妻嚴氏題旌册年十八適璉璉亡氏年二十五事孀姑以孝聞夜漏三下猶勤女紅而令子讀書於旁親族婚喪無力者多方周恤無吝色守節二十六年葉豸臣妻韓氏題旌册年二十九夫亡二子幼氏辛勤撫育俱早卒乃繼姪以續蒸嘗守節二十六年馮明臣妻顧氏題旌册年十七適明臣十九而明臣沒遺孤方睟撫至九嵗而殤遭鄰火室廬俱燬棲托無所乃歸依父母有幼弟氏撫之長弟感其德事之如母守節四十年沈朝相妻方氏題旌册年二十八夫亡子方五歲女在襁褓家貧紡績自給守節三十年徐𢎞祖妻焦氏題旌册𢎞祖力學敦行中康熙癸酉舉人一上公車歸即卒氏年二十六家貧無子舅姑老氏力勤女紅奉養甘旨無缺舅姑沒鬻簮珥以營窀穸并以夫柎焉撫姪為子教以義方守節三十九年沈興國妻吳氏題旌册年二十三夫亡舅姑老旁無伯叔遺孤在抱氏以一身上事下撫荼苦備嘗守節三十三年陳啓元妻楊氏題旌册歸啓元二載而啓元卒氏年二十九事孀姑甚孝撫子至長教之誠實勿使習浮偽故子亦循謹能孝養守節二十六年胡學猗妻趙氏題旌册年二十八夫亡舅姑悲悼不已氏泣拜於前曰夫不幸早喪遺孤甫二齡媳惟兩老人是賴設以悲致疾奈何舅姑始慰卒能孝事不懈撫孤有成守節二十三年沈宏宗妻陳氏題旌册年二十六夫亡先是舅姑沒貧不能襄事氏脫簪珥以營喪葬至是夫沒子方二齡旁無伯叔氏歸與母相依藉針黹為饔飱計撫孤成立守節四十年沈伊仁妻馮氏題旌册年二十九夫亡無子舅病氏侍湯藥衣不解帶舅亡事姑尤孝年八旬扶持不離左右繼周嵗族子撫教有成守節二十五年陳武功妻孫氏題旌册年二十二夫亡無子小叔玉書年九嵗庶姑出也氏求父母以妹配之舉二子氏子其長子玉書又亡煢煢二嫠黽勉有無鄉黨咸稱之氏守節二十九年以上四旨建十二氏俱雍正十二年具題奉坊旌表項景仁繼妻周氏題旌册年二十四適景仁甫一月而景仁卒前室遺子方周氏忍死撫孤至六嵗又殤時無可繼之人欲自裁夫兄議以孫繼之教養勤劬守節四十五年許麒繼妻馬氏題旌册麒官建寧知縣卒於任氏年二十八子幼氏扶櫬歸葬家徒壁立晝夜針黹給饘粥子長又卒復撫遺孫守節五十五年俞天祐妻唐氏題旌册年二十七夫亡舅姑繼沒疊遭大故艱苦備嘗撫遺孤成立守節一十八年李烺妻翁氏題旌册烺素有瘵疾婚半載而卒氏年十七撫孤姪姪女為子女家貧以縫紉為生舅病奉湯藥歷久不懈守節二十七年徐國祥妻胡氏題旌册年二十八夫亡二子幼勤十指以事舅姑姑沒事舅二十五年人稱其孝守節三十四年沈士琦妻姚氏題旌册年二十九而寡無子繼姪為嗣撫長為娶婦生孫而子復夭乃偕媳撫孫沈氏之緒賴以不墜守節三十三年范觀銘繼妻歸氏題旌册年二十九夫亡前室遺一女己生二女皆幼舅年八旬氏生事死葬盡禮女長遣嫁前室女奩贈視己女有加焉撫族姪為嗣守節四十四年金長茂妻周氏題旌册夫亡氏年二十五姑孀居年邁病卧兩載氏親調湯藥始終不懈及沒喪葬如禮撫二子成立守節二十九年吳龍文繼妻沈氏題旌册年二十九而寡止一女立姪為後事姑孝母周孀居無依氏迎養於家越數載姑與母相繼沒棺衾兆域皆經營盡禮守節二十二年張輔臣妻沈氏題旌册年二十六夫亡子未周嵗家貧勤女紅以養舅姑而己常飢餒無幾微愁苦意舅姑卒以三棺未葬益勤操作積資營窀穸撫子成立守節三十八年顧時臣妻李氏題旌册時臣母早寡撫時臣長娶李氏甫三載而時臣卒無子氏晝夜紡績供甘旨稱其孝者無間言撫族姪為嗣守節二十七年邵世祿妾錢氏題旌册世祿卒氏年二十遺孤三嵗有覬覦其資産者欲奪其志不從則謀害其孤氏時為防護頃刻不離即一飲食非親烹飪不令嘗也子克成立守節三十一年沈翰器妻殷氏題旌册年二十九而寡一子在抱一子在腹事舅姑孝姑亡事舅益謹年逾九旬猶在堂教子不墜家聲守節二十九年鄭𢎞俊妻毛氏題旌册年二十四夫亡遺妊生子舅沒事姑先意承志遺孤早夭復撫幼孫守節三十二年金伯齡妻沈氏題旌册年二十九夫亡勤紡績以事舅姑撫幼子守節三十二年葛法祖妻董氏題旌册年二十四夫亡子五嵗延師訓課不為姑息子長入灃守節三十三年李士佩妻葛氏題旌册年二十四夫亡家貧善事舅姑舅姑殁脫簮珥以營喪葬教子有成守節三十五年葛從易妻俞氏題旌册年十八結褵甫半載夫亡繼姪為子舅宦陜西獨姑在堂奉侍勿懈守節四十六年吳子齡妻莊氏題旌册年二十八夫亡孀姑老子甫四齡家貧藉十指為饔飱計子弱冠遊庠人稱母教守節二十四年汪槐妻馬氏題旌册年二十五夫亡子未晬舅姑已老叔又夭娣感氏義亦矢志撫孤舅姑殁先世柩尚在淺土兩孀婦經營三世宅兆尤為女子所難能者教子問學遊庠序守節二十八年徐本盛妻沈氏題旌册年二十一夫亡生子甫數月鞠育保抱稍長令就外傅丙夜猶親課之俾得食餼郡庠守節三十一年沈世文妻吕氏題旌册適世文一載世文亡氏年十五無子時姑已先沒事舅及繼姑先意承志人稱其孝無間言長齋繡佛獨處一室足不踰户限守節四十二年金文庶妻吳氏題旌册年二十八夫亡二子幼室廬被火復拮據數椽僅蔽風雨撫二子長為娶婦長子殁偕媳共矢冰霜母老無依迎養於家姒寡命次子以母事之及卒力營殯葬守節三十一年三以上二十三氏俱雍正十年具題候旌沈學顔妻尤氏馮景沈節母傳沈近思之曾祖母也年十九歸沈四年而寡無子乃請於舅姑而立子時吉為嗣教以義方及長為娶婦俞亡何時吉俞相繼早世遺孤大震才十四歲母內撫孤孫外禦強侮母有兄某以豪暴雄於鄉見母無親子孫利其土田秋將刈乃率衆取禾母潛以針倒鍤滿髮踊而號曰而欲絶吾祖孫命耶以頭觸兄兄捉其髮針刺手血淋漓始驚避去欲搆訟母被衰提孤將號於官事遂寢母常憂其孫弱而羸曰吾目中得見曾孫死不恨矣後大震生子光斗近思兄也母卒年六十一後生近思成進士陸培妻陳氏舊浙江通志少時父病割臂肉進之愈年十九歸行人培培自縊桐塢變聞陳自樓上墮地絶而復蘇時年未三十歷三十八載冰霜之操如一日云吳豸妻陸氏舊浙江通志豸以父百朋事觸熱奔走死於江寧氏年二十四生子才一月聞訃勺水不入口者五日旦夕抱孤子磊設位而哭苦節二十年孫文標妻施氏杭州府志八嵗時鄰家火母病卧床父逺館氏出門呼曰能救我母者謝以臂鐲隨有人撲火救其母出即脫鐲與之年十五歸文標姑患痰症割股救之年二十六姑與夫相繼逝子烺生甫七月氏守節訓子為名諸生郭生妻李氏舊浙江通志夫沒不食涕泣因卧二十餘日死王端姑杭州府志王湘之女湘與同里宋英倩善湘病危英倩詣榻前問病湘指女曰幸善視之英倩曰內人將再索倘得男願偕伉儷湘點首隨逝英倩果生男訂盟而殤時端姑甫七齡聞之嗚咽不勝及長有議婚者遂絶食卒趙氏三節舊浙江通志趙松年妻錢氏年二十三守節至六十七卒松年姪育先妻金氏年二十五夫臨終命改適金毁容自矢織絍事姑子女皆幼訓之甚嚴松年兄掄仲妻亦錢氏夫亡守志至七十九卒蓋一門三節云孫憶峰妻張氏舊浙江通志年十五適憶峰夫亡無子脫簪珥為葬葬之日族人私語曰此阡長與新婦辭矣張聞之即廬墓不去長女迎養之始入城年七十六而殁劉貞女杭州府志許字王景維未婚景維沒女誓不二以悲鬱殁臨終語父曰兒為王死得與同穴目瞑矣父哀其志請於壻兄景華遂合葬焉傅應登妻袁氏仁和縣志應登殁氏年二十八繼姑病瘵氏扶持床第間二十餘年無倦色家貧止敝屋數椽族人有利其産者擠其孤長春於河氏奔搶號呼鄰人援之以出氏擁護歸家不較也卒年六十三長春子光遇成康熙乙丑進士嚴貞女毛奇齡嚴貞女狀嚴長發女許嫁柴際洛際洛亡女年十五聞訃隂却繡綺朱碧衣而以縞繩束其髮父惡之越一年俞氏來請婚父許之女僵卧不肯起父大怒詣卧所訶曰未嫁而守志禮乎審爾當立譴爾至柴氏門女聞語據床起請行父復揶揄之女乃屏食求死母憐之請以次女應俞聘父不許女遂不食咯血死死之日告其母曰必告柴氏父猶豫女既絶復瞪目曰父憐我必告柴氏否則吾死不瞑矣父曰諾遂瞑沈貞女杭州府志年十五許字姚江陳琪未婚而琪死女飲泣遂病臨卒第言無毁我木與陳生同穴謝氏二節杭州府志張氏適謝九成年二十七夫亡守節四十六年卒張姪女謝三姑謝賡女也幼許配嘉興卜生未婚而死三姑年十七聞訃衣麻茹素九死不移依母守節三十六年錢氏二節孫治錢氏雙節傳錢鼎鉉嫡母胡氏生母郜氏方鉉父奄逝胡年十九郜年十八鉉止生七月二氏矢志不嫁字孤朂之有成朱氏二節仁和縣志沈氏朱遵聖妻媳俞氏朱祖修妻沈年二十七守節俞氏二十四守節復羅火災室廬盡燬俞事姑以孝教子以嚴姑媳皆年六十餘卒金氏二節杭州府志陳氏金世貞妻貞卒陳年二十五子三錫甫九嵗長娶張氏而三錫又死張年二十四孤子僅五齡家貧甚姑媳相依以絲枲糊口後張氏迎姑同居父家事姑極孝聶氏二節杭州府志左氏年十九為聶紹震繼室十載而紹震殁在冰蘗自矢撫遺孤成立妾江氏年僅十八無子亦共勵貞操人稱雙節髙貞女杭州府志許字尤士紘未婚紘卒即製麻往哭誓不再適又三年而亡人皆作詩歌以弔之張孝女舊浙江通志年十九母汪氏病女割股愈母疾後母病復發女再割股進不效乃取藥置神前禱之願刺心血入藥救母刀入而暈絶於地家人救之得蘇其弟感姊事亦割股焉母卒不治女哭泣不已未幾卒沈人驤女杭州府志適陸有奇母病歸寧禱天割股創甚不可忍強起和湯以進出房血湧潰而死家人駭其暴殁及殮見臂肉已去半血浹滿襟袖始知之母賴生全倪元陛妻王氏仁和縣志氏祖國楨父文耀俱早世祖母謝母沈苦志守貞氏習聞禮訓夫沒年二十九藉女工易薪水奉翁姑教子苦節三十五年其女適柴選良選良殁女年二十五亦守節二十八年周之德妻柴氏孫模妻柴氏杭州府志姊適周之德年二十一德卒撫孤雄基方周嵗以針黹糊口苦節四十年妹適孫模年三十模卒撫遺孤鑣亦方周嵗苦節三十年盧之斌妻劉氏公舉事實年二十四而寡二子俱幼家貧時值鼎革土冦充斥氏流離奔徙卒能教孤讀書長子璉以明經官縣尹次子琦康熙丁未進士誥封至太恭人猶布衣食糲不改寒素風孫𢎞熹亦成進士守節七十五年吳氏二節公舉事實瞿氏福建壽寧縣知縣吳允焞妻王氏其媳也順治四年八月土冦攻城允焞力戰死之當冦至時瞿氏語其夫曰賊勢如此宜盡力勦除身家非所計也及聞夫被害即入室閉户投繯而死子嵩齡長娶王氏二十九嵗而寡遺子三人俱幼家貧半菽不飽氏晝夜績紡訓子俱克樹立守節三十年丁祖繩妻張氏公舉事實年二十七夫亡仰事俯育以代夫職姑遘疾侍奉湯藥者數載殁則經理喪事咸有條理子奉母訓克嗣家聲守節五十年王秉鈞妻丁氏公舉事實年二十二夫亡撫姪為嗣鞠育逾於己生婚娶復夭撫育幼孫上事舅姑惟謹守節四十七年夏仲甫妻梁氏公舉事實仲甫殁氏年二十五孤子二皆在襁褓苦節六十四年年八十有八當仲甫病時氏刲股和藥至今創痕宛然吳道昌妻丁氏公舉事實年十六歸吳夫亡奉祖姑與姑皆以孝稱教子義方年六十七而卒蔡仁涵妻孫氏徐劭妻王氏宋𢎞儒妻孫氏孫機妻陳氏徐仲彥妻金氏陳其治妻錢氏江文煥妻沈氏柴際潢妻陳氏陳孟縯妻髙氏王儀妻錢氏翁與睿妻傅氏姚世熙妻金氏徐宿妻屠氏王家驥妻孫氏卓彝妾吳氏田世治妻杜氏何登顯妻田氏沈兆謙妻相氏王震先妻邵氏張覲光妻吳氏汪國政妻黃氏汪光裕妻吳氏陳令儀妻張氏王都妻屠氏王之策母余氏王三才妻夏氏翁洪謨妻沈氏陳烶妻吳氏江世旦妻沈氏張陛妻賀氏鄭生源妻薑氏徐昌東妻潘氏翁纘伯妻王氏周耀奎妻陳氏姚時稷妻蔣氏沈平洲妻董氏何啓新妻劉氏李令芳妻胡氏朱紹輝妻翁氏孫國璋妻周氏李參貫妻吕氏李經邦妻朱氏沈一新妻張氏王惟志妻余氏張兆仁妻郭氏沈賔妻邵氏龔雲石妻沈氏余學綸妻張氏胡中晃妻董氏王士進妻駱氏沈必成妻蔣氏鄭瑞隆妻翟氏陸士銘妻邵氏張邦泰妻沈氏海寧縣宋楊奉直妻諶氏兩浙名賢録鹽官楊由義母也父奉直為軍前正將冦攻京師挈家從駕南渡留杭州遷安撫司將官未幾復冦杭奉直捍禦於外由義時年十七獨將母諶氏攜幼妹避走鹽官騎踵至諶氏泣語由義汝父必死國我當死夫遂攜女沉於運河元馬振母鄭氏徐一夔馬公墓表振居海寧之黃灣母鄭氏盛年而寡守志不易以撫遺孤馬氏世業鬻海藉羣鹵丁以事淋熬嵗大侵羣鹵丁散去其母盡鬻簪珥以活之家日以裕杜保二妻孫氏成化杭州府志海寧農家女嫁保二生男一方晬而保二殁氏篤志保守誓不移天勤事女工以終其身至元十九年旌表明沈鉉妻酆氏嘉靖海寧縣志年二十八鉉沒鉉父憫其少欲更之氏守義不屈持志終身洪武年旌表謹按萬厯府志與舊通志俱不載酆氏夫名蓋由成化府志悮以沈鉉為酆氏之舅也考前明實録洪武十七年正月旌表節婦海寧沈鉉妻酆氏與嘉靖縣志同今從之朱士亷妻董氏成化杭州府志海鹽董鎮女嫁海寧朱士亷年二十四喪夫撫養孤子守節不二洪武開旌表楊宗文妻金氏明實録宣德八年旌表金氏楊宗文妻夫亡時年二十九誓不他適家貧姑老子幼養生送死悉不違禮守節五十八年郭彥昭妻孫氏成化杭州府志彥昭以名醫赴召氏與偕往彥昭殁於京氏扶柩歸葬時年二十七姑欲嫁之遂斷髮以誓正統年旌表祝湍妻賈氏嘉靖海寧縣志適湍三載湍病卒氏守志不二成化二十三年旌謹按萬歷杭州府志作曹氏舊通志仍之又載董湍妻賈氏俱成化二十三年旌考新舊府志無董湍妻又海寧縣志於賈氏祝湍婦之下載明建坊龍山石場并附訂萬歷府志之悮今從之朱銓妻范氏萬歷杭州府志名福貞銓卒氏年二十六或慮其無子氏截髮以示不二居一室雖內燕不赴勤女工為甘旨事銓父母𢎞治年旌表吳慶真嘉靖海寧縣志吳礽之女許歸何謙未行謙卒遂不御膏鉛父母憐其少欲奪其志慶真哀號競日事遂寢父母繼殁兄嫂猶望其易志慶真破鏡以自矢遂依幼弟景暉紡績自養𢎞治丁巳舅姑為謙襄事慶真具牲醴偕兄弟哭奠返闔寢室自縊時年二十八舅為合葬焉吕詢妻居氏許相卿居貞娥傳詢幼喪母尋病風癎絶不省人事娥歸亡何詢死後姑激之他圖娥不為動乃分出處北鄉田舍娥奉詢柩如田舍間手織自營家殖屢空里母憐之曰婦人倚夫與子而今誰恃徒寒餓稿死荒野無人之地誰為也娥泣曰吾義不踏第二條路吾終下殉吕君矣願勿復言自是單約困悴幾三十年死葬城北二里橫塘之原董湄妻虞氏萬歷杭州府志名嫄年十六歸湄兩月而湄亡氏欲殉潛治後事衆防之不獲死於是哀哭無間晨夕丈室重扃攻苦食淡又刻木為湄事之年五十一卒朱璋妻章氏兩浙名賢録生子八月而璋死欲以身殉姑嘆曰我老家貧而孤幼婦復殉夫天其遂絶朱氏耶氏遂忍死守孤父母舉輕塵弱草之説諷之輒觸額濺血誓志不移四十年如一日孝養舅姑訓子成立徐㬗妻陳氏查秉彝徐烈婦傳歲壬子海上冦作據邑東石墩山常出剽掠㬗攜婦舟行去岸不百武里人譁傳冦至婦遽起持其季女三妹詣水所㬗牽衣止之曰胡遽爾耶婦曰冦至吾安得死所哉言己遂絶裾投水中與女並溺死冦退㬗始克舁婦尸藁葬方酷暑日正中冇隂雲暗靄自西北冉冉來覆其尸庭中蘇盡變為竹人爭傳之何為忠妻查氏查秉彝何烈婦傳壬子冦猖甚里中人四散奔突為忠具舟同婦行舟次祖塋楊廟橋之西風起不得進婦曰黑夜倉皇去將安之彼鬱鬱隆隆者吾祖父墓地是吾死所吾祖父且命之矣舟中人環守之乃紿為忠登岸取火舟中人懈即自溺水中以死水故積淤溷濁死五日獲其尸尸所忽有清泉流出澄徹可鑑面榮如生比葬有白鳥盤舞其墓焉毛穎妻李氏萬歷杭州府志穎卒氏年二十三生子鳳璋方周歲足不越户日撫嬰兒夜紡績以資匱乏尤善事翁姑教子成立守節四十一年張氏二節孫治張節婦傳馮氏張鳳妻年二十四而寡遺孤電方三齡婦矢志不奪撫電成立媵虞氏當鳳在時固未嘗抱衾禱進御也與節婦煢煢共守擁樹遺孤節婦以虞氏誓死不嫁俾子電以庶母事之死則附葬於域嘉靖時旌其門曰雙節周氏二節海寧縣志孫氏周易妻年二十六夫亡有子甸方在襁褓妾宋氏媵也年十九孫勉以大義誓撫孤成立聞王文成公倡道會稽屬甸往從遊焉守志四十二年吳氏二節海寧縣志鄭氏吳元礦妻年二十九夫亡無子妾周氏子白方二歲至十歲而夭以長支次子灝承祀二嫠苦節人皆稱之許釗妻潘氏明烈女傳年十六歸釗生子淮甫期釗卒既殮氏自經死已兩日矣有老嫗過之曰是可活也投之藥果蘇嫗忽不見釗族兄欲不利於孤嗾氏改適氏毁容自矢其人乃夜率勢家僕數十人誣以負債椎門入氏負子冒風雨踰垣而逸前距大河追者迫氏號慟投於河適有木浮至憑之以渡逹母家遂止不歸及淮年十九始歸淮娶婦連舉五子適氏壽五十宗人聚而祝釗族兄亦來氏曰氏所以得有今日賴伯氏玉成之目淮酌酒飲伯卒爵北向拜曰未亡人三十年來瀕死者數矣而顧強生獨以淮故耳今幸成立且多嗣復何憾語畢入室頃之宴徹諸宗人同淮入謝則縊死室中矣董學妾王氏舊浙江通志燕山王辨女也辨貧鬻其女於董侍御愚齋家侍御納之尋病卒王氏尚未筓楊太孺人欲遣之王氏矢死靡他遂率以告廟筓之監司旌之曰緑衣徑節居翼隆妻茅氏海寧縣志茅坤之女歸居三載而寡又三載以其孤托兄茅國縉子之曰吾向者須臾無死徒以兒故今幸兄收之兒不孤矣入戶自經氣絶而面如生年二十四張天俸妻殷氏海寧縣志年二十四夫亡子邦彥甫四歲亡何舅姑繼殁一身拮據旁無宗族倚毗産日以落躬紡績訓子力學勤苦卒年八十有二陳祖萊妻郭氏舊浙江通志祖萊卒無嗣以姪之暹為後氏訓子力學舉鄉薦崇禎間之進上疏建坊查懋功妻徐氏海寧縣志懋功早世氏時年十九破鏡見志茅坤為作半鏡贊陳祖臯妻錢氏舊浙江通志有怨家誣祖臯擊殺某辨收對簿獄且具氏度無由脫遂自縊死事久得釋後以子之伸貴贈太宜人孫曽永妻吳氏少寡守貞三十餘年三世見兩節烈云史宗妻王氏海寧縣志年十三母遘危疾氏刲臂雜湯藥以進尋愈年十九歸史史體素羸足痿不能起已而疾益甚語之曰死亦何恨獨念汝年少未有後我死豈得瞑氏曰君姑自愛我能自為計潛製衣二襲候夫疾亟哭之慟遂登樓自縊時崇禎巳卯六月也發笥出衣兼得遺書以謝舅姑鄉老咸稱曰烈胡縉妻朱氏舊浙江通志崇禎末年氏適歸寧於家兄以搶攘載途留之同居氏曰婦人有家危而去之不義歸及月而難作舉家泛舟出避猝遇亂兵朱即振衣躍入水死周宗彝妻卜氏海寧縣志明末硤川被兵宗彝死氏聞變曰夫死君妻當死夫遂攜其幼子及二妾朱衣紫衣溺死後園青蘿池內次日族人舉其尸三人相抱其子而出面如生沈聖趨妻潘氏舊浙江通志兵至其夫被執氏佯從行計脫其夫舟至梅溪市投河死謹按沈烈婦事詳梅溪蔣薰所撰傳作沈華區妻而府縣志均作聖趨或名與字異耶今已不可考姑從舊志汪祥明妻陳氏杭州府志兵至氏年二十餘慮遭辱遽赴水死同時斜橋鎮民陳氏婦吳亦赴水死朱士賢妻王氏許潭妻祝氏查模妻王氏許文奎妻勞氏朱俊妻董氏郁成妻施氏許某妻章氏談輔妻徐氏嚴執中妻范氏孫率祖妻馬氏馬鍾英妻許氏徐選妻吳氏陸士琦妻趙氏沈啓剛妻許氏許令英妻張氏國朝朱寧九妻徐氏題旌册海寧農家婦也美姿容秉性貞潔閭里咸敬慕之康熙四十年四月採桑湖畔有漁人章四欲犯之氏厲聲大呼章怒扼其吭而死章四按律究擬徐氏節烈捐軀奉旨建坊旌表浪坊在水側後有舟經其地者語涉褻狎忽風湧起覆其舟往來者咸相戒弗敢犯查繼序妻許氏公舉事實年二十四而寡撫子嗣㙋令從劉宗周遊力學敦行姑目喪明寢饋一室奉事惟謹以孫升貴贈太恭人康熙四十四年御書節孝流徽四字旌其門陳恂永妻查氏題旌册年二十九而寡事翁姑孝姑病侍湯藥者二十餘年撫教子女有旨建成守節四十餘載康熙四十四年具題奉坊旌表俞君亮妻施氏題旌册年二十二歸俞甫九月夫患癱瘓翁姑又同時染疫死家貧甚止遺卧榻布衣數種鬻為棺殮明年生子聖洪而夫卒族人諷之改適不從則私受聘於某氏及期鼓樂肩輿突至迫之行氏觸柱暈絶鄰黨驚救始散去氏矢志益堅訓子成立康熙四十七年具題奉旨建坊旌表楊中惺妻勞氏題旌册石門人年十八適楊甫七月而夫卒遺孤表匡表翊前妻出也氏撫育婚配表翊夫婦又早歿子正講在廷純熙俱幼氏復撫訓成立康熙五十二年具題奉旨建坊旌表陳維申妻黃氏公舉事實年十九歸陳甫三載夫卒丸熊教子守節四十一年以子邦彥御書貴封太淑人康熙五十六年節孝二字旌其門朱郭二節題旌册鄭氏朱國佐妻年二十三而寡遺孤周嵗誓死不二朱氏國佐女弟也適郭洪年二十一洪亡家貧無倚歸與嫂同居互相砥礪共撫遺孤人稱雙節朱元英妻范氏題旌册年二十九而寡遺孤廷相幼氏辛勤節儉積餘資先葬舅姑後葬夫柩訓子以義方守節三十餘年葛純妻張氏題旌册年二十而寡遺娠生子宗璜氏悉返嫁時粧具布衣疏食紡績以育子旋遭姑喪遺兩幼叔氏兼撫之守節三十年陸楷妻朱氏題旌册年二十六而寡事姑課子子卒刻苦訓孫守節五十年以上五氏俱旨建康熙五十七年具題奉坊旌表鮑枚妻王氏題旌册年二十八而女婚嫁葬舅姑守節躬操絍作畢子十年康熙五十旨建九年具題奉坊旌表朱世英妻吳氏題旌册年二十六而寡無子依弟糊口守節四十七年雍正元年具題奉旨建坊旌表吕國璐妻吳氏題旌册年二十八而寡姑又寢疾氏侍奉湯藥三載無倦容撫孤成立范氏二節題旌册范三台妻蔣氏范璵妻薑氏娣姒也蔣年二十六而寡遺腹生子士豪薑十九而寡無子二氏事耄姑生養死葬共撫孤兒成立蔣守節三十五年薑守節四十年王杞妻陳氏題旌册蚤寡力勤組織養老撫孤守節三十三年王聖榮妻蔣氏題旌册年二十九而寡孝事孀姑遺孤娶婦生孫子婦並死氏又撫孫成立守節四十五年許日霽妻錢氏題旌册年二十五而寡遺孤殤撫姪文源為後又卒偕媳撫孫守節四十七年姚公遜妻宓氏題旌册年二十五而寡姚故以裝潢為業家縣治左往來者如織氏閉戶績紡撫子廣涵成立至老人未識其面守節四十餘年以上七氏俱雍正二年具題奉旨建坊旌表徐源妻董氏題旌册年二十七而寡孝事姑嫜撫子成立李大純妻郭氏題旌册年二十八而寡遺娠生子德祚卒勤紡織持門户守節三十餘年許文源妻葛氏題旌册年二十六而寡事孀姑孝訓子遷有成守節二十八年以上三旨建氏俱雍正三年具題奉坊旌表張禹公妻褚氏題旌册年十九而寡無子子猶子又夭先世積棺盈庭貧不能舉氏晝夜勤織絍銖積寸纍者有年始得畢葬守節四十四年吳仲嘉妻李氏題旌册年二十三而寡越三年姑又亡氏力營喪葬教子有成宓彩生妻陸氏題旌册蚤寡兩子皆幼一在腹氏艱辛撫育營葬舅姑及夫皆以禮兄嫂亡又迎養其母兼撫其姪宋士璉妻陳氏題旌册年二十九而寡無何姑殁子又殤乃繼姪為嗣長為婚配姪又死守節五十一年章鳳起妻陸氏題旌册年二十六而寡家貧鬻針黹以奉舅姑撫姪為嗣又殤守節三十旨建八年表以上五氏俱雍正四年具題奉坊旌許惟櫺妻吕氏題旌册年十九適許五月而寡事姑孝撫姪勉勳為嗣躬紡織為夫營葬後姑卒謂其子曰吾可相從於地下矣遂絶粒而逝雍正五年具題奉旨建坊旌表周學舒妻朱氏題旌册年二十七而寡事舅姑及本生舅姑俱孝遺孤奕年甫五齡氏恆於機杼旁親自督課奕亦自知刻勵康熙辛卯舉於鄉凡四上公車卒於旅邸氏更撫訓其兩孫詩書之澤賴以不墜守節五十四年周之謨妻陸氏題旌册早寡守志善事孀姑撫教孤子有成以上二氏俱雍正六年具旨建題奉表坊旌張鞏藩妻周氏題旌册年二十而寡孝舅姑撫子守節三十五年俞廣思妻陳氏題旌册年二十而寡翁姑繼歿遺兩叔俱幼氏績紡撫教有成及叔生子氏即育為己後守節四十七年沈士亷妻馮氏題旌册年二十而寡繼姪為嗣葬舅姑及夫守節三十二年以上三氏旨建俱雍正七年具題奉坊旌表宋振麟妻屠氏題旌册年十七而寡姑繼殁翁老家貧氏紡績奉養後殁醫藥棺衾皆十指所出因無子遂百計謀葬囊土成墳聞者咸嘆惜焉守節五十五年張大觀妻周氏題旌册年十九而寡事太姑先意承志繼姪承祧守節三十二年祝宗泰妻居氏題旌册年二十五而寡事舅姑以養以葬撫姪為嗣守節二十七年孫在公妻陳氏題旌册年二十二而寡無子事翁姑孝翁姑殁孑身無倚歸母家織絍自給守節二十九年祝貞女題旌册祝安國女許字朱協中未婚協中歿女年十六決意過門守志性剛正同室咸敬憚之卒年三十一奉以上五氏俱雍正八年具題旨建坊旌表朱濟任妻查氏題旌册在室時母老且病氏決志侍奉不適人及母殁服闋始受聘歸朱為繼室年已二十六矣甫百日夫亡前室楊遺一子二女撫如己出教子廷彬能讀父書為邑諸生女亦有歸娣李亦早孀氏勉以大義同勵冰操氏守節二十二年卒王鼎謨妻張氏題旌册年二十九而寡撫前室三子一女躬親操作寒暑不輟畢婚嫁守節二十八年查嵋繼妻葛氏題旌册年二十而寡遺腹生子圭娶婦張氏圭卒遺孫復殤媳哭夫哭子又卒氏乃立姪為後守節四十八年陳之琳妻鄭氏題旌册年十九而寡家貧無子勤織絍以奉衰翁翁殁拮據營葬兩世守節四十一年朱孟直妻錢氏題旌册年十八而寡無子撫姪為嗣守節五十二年陳為章妻朱氏題旌册年二十一而寡時歸甫百日告翁姑抱姪為嗣守節五十三年都彥妻何氏題旌册年二十六而寡子女俱殤伯氏夫婦繼歿遺孤甫周歲氏撫以為子及長以伯為大宗仍命為本生後而别抱孫承祀焉守節三十八年朱羽臯妻李氏題旌册年二十一而寡繼姪為嗣拮據營葬舅姑與夫守節三十年范南溟妻莊氏題旌册年二十一而寡孀姑繼逝撫姪姪殤復立繼娶媳又夭煢煢無倚守節四十六年鍾繼英妻顧氏題旌册年二十七而寡撫前室子及己子女無異視事翁妾如姑守節四十年祝翼隆妻蘇氏題旌册年二十一而寡事翁姑孝翁姑歿力營喪葬撫子成立守節三十旨建三年表以上十一氏俱雍正九年具題奉坊旌董光圖妻朱氏題旌册年二十七而寡撫遺孤守節二十八年吳士錦妻張氏題旌册年二十五而寡無子遺女僅彌月撫姪作楫為後老年多病猶勤十指或勸其稍節勞答曰未亡人二十年來止欠一死安敢辭勞守節三十二年陳齊賢妻屠氏題旌册年十九而寡事舅姑撫姪為嗣守節三十八年陳有義妻吳氏題旌册年二十三而寡孀姑年邁遺孤僅八月家貧凡米鹽絲枲氏晝夜勤十指以資不給守節二十七年雍正十年具題奉以上四氏俱旨建坊旌表顧廷芳妻朱氏部咨案驗廷芳外出氏獨處廷芳小功服兄顧耀山入室犯之氏不從抓傷其面耀山逸出氏訴知廷芳廷芳訴於耀山之父父懲責其子乃懷忿揑造穢言玷氏名節氏忿投河死耀山按律究擬朱氏節烈捐軀雍正十一年具題奉旨建坊旌表陳學樂妻周氏題旌册結䄜甫六月而夫亡氏年十九欲以身殉舅姑止之為立嗣子長娶婦生孫舅姑享上壽奉事不懈守節三十二年王松山妻張氏題旌册年十九適松山二十一而寡無子事舅姑三十餘年凡甘旨之奉皆出十指舅姑卒喪葬盡禮撫姪為嗣長為娶婦守節三十九年以上二氏俱雍正十二年具題旨建奉旌表坊張與三妻吳氏題旌册與三以父老家貧服賈四安卒旅舍氏年二十九四子俱幼勤蠶織以給衣食閲十載舅卒拮據喪葬命四子各習一業或務農桑或專貿易向之赤貧者轉而為溫飽之家子各娶婦有孫十四人并及見曾孫而卒守節三十七年張瑞芝妻程氏題旌册年二十三夫亡遺孤甫三月姑老常病卧床褥氏侍湯藥歷久不懈姑卒營喪葬訓子有成守節二十六年祝鍈妻吳氏題旌册年二十八夫亡勤女紅以養舅姑撫子遇嵗歉百計供菽水而己常終日不飽後以姑沒舅病經營棺殮又中夜籲天願減已算延翁壽如此者七十日舅愈而氏病不起守節一十六年陳克奭妻湯氏題旌册年二十七夫亡一子又殤繼姪堅孝為後撫長娶婦生孫媳亡子舌耕外出氏復撫訓其孫積二十餘年紡績所入購屋旁地葬夫曰使吾長得與墓相依也守節五十三年嚴廷用妻胡氏題旌册年二十六夫亡孝事六旬姑嫜閲二十四載以壽終撫教三子咸有成立守節三十三年朱協勳妻王氏題旌册年二十六夫亡時結褵未及一載舅繼歿姑病叔幼氏以一身任家政經營兩喪叔長授室生一子即撫以為嗣又殤姑卒營窀穸祔夫於旁守節三十一年以上六氏俱雍正十三年具題候旌吳正宗妻許氏舊浙江通志順治初土寇蜂起氏被掠挾上馬三次墜馬詈誓不從行至沙河堤於馬上奪刀拽兵同投於河兵怒以槍刺之死年未三十沈兆廣妻朱氏杭州府志年二十五而寡子珩甫二周上無承怙下無倚毗且族繁而競視孤嫠弱雛朝暮不保氏秉禮執義伺隙者皆斂戢年七十四以壽終子珩中康熙甲辰會試第一管貞女舊浙江通志許字石門勞之芳將婚而之芳卒訃聞女請往父母弗從女曰兒請立死以骨往殉乃許之抵勞氏椎髻布衣不事鉛飾後感疾卒查亦林妻馮氏舊浙江通志亦林年二十三而沒馮以節自矢時有隂欲奪其志者氏遂自縊許丕潤妻周氏海寧縣志丕潤死所遺破屋數椽宅邊地二畝氏年二十三二子幼義不再辱地故有桑久蕪躬率其子椎髻而前未明而作日入而息不數年其地所出良倍嵗畜蠶夜則弄機杼逹曙不休衣食粗給又數年家稍贍二子娶婦舅姑及夫並克葬年六十七卒陳侯邦妻黃氏海寧縣志年二十六喪夫貧不能舉火撫遺腹子壯而夭又撫一嵗孫至長百折不挫陳氏二節海寧縣志許氏陳器永妻年二十七孀居御家訓子持門户其姒孫氏年二十四夫禧永死遺孤僅四齡手指拮據勤苦罔間人稱一門雙節唐之坦妻曹氏潘耒唐烈婦傳嫁六嵗無子會夫病亟志殉以死預治殮具每物必以副為夫繪像己亦繪像夫且死即不食母勸之食曰夫食我乃食耳比夫死將服毒以殉妯娌奪之稍間更啜灰水腹痛終夕不死復取錢吞之母急奪而兩錢已下咽矣又不死殮畢歸寢潛以滷置床下中夜服之有頃臟腑欲裂忽大吐竟不死乃大慟曰天乎死固若是難乎雖然吾終必死復絶食二十二日而猶不死乃夜啓牖投於河救出之氣絶復蘇水汨汨循腸下所吞錢隨出衆更強之食婦曰能強我食不能禁我死無何復絶食家人敬且憐之既已無可奈何遂不復勸又十五日為嵗除內外倥偬忽失婦所在行視柩側麻衣纍然懸帨在梁矣謹按曹氏唐煥媳也舊通志但書唐煥子婦失其夫名今從遂初堂集補正張貞女海寧縣志父訒許字查德昌甫議婚德昌訃至女家居御素服握髮椎髻六年疾作呼其父曰兒昨夢所天來有死當同穴之訂兒從此逝矣語畢而絶時年二十六王敬姑海寧縣志父佩蘭貧而舌耕女許字屠姓納幣請期以母疾侍奉乏人乃剪髮而辭曰俟髮長乃可加筓耳潛割臂奉母逾年病劇復剜臂而母已不能進食矣父悲悼成疾又剜臂罔效女赴舍北止水中以殉撫院張鵬翮旌曰貞孝管廷璧妻王氏舊浙江通志年二十五寡子甫周歲事舅姑訓孤兒婦道母儀兼盡陳英妻吕氏杭州府志年十五歸陳姑患面疽藥餌無效氏朝夕吮之久無倦色英為惠州别駕卒於任訃至一慟幾絶後命子道牧赴惠扶櫬歸遂持齋紡績苦節三十餘年陳蒼永妻彭氏嘉興府志名孫懿海鹽人適海寧陳蒼永蒼永卒孫懿泣曰必不令君獨死殮畢不食數日死陸禮妻徐氏許汝霖陸節婦傳年十六歸太學生禮禮父泰華以事陷獄母又喪明禮驚憂成疾氏朝夕以舌舐姑目數月目復明聞御史巡方至氏匍匐赴水伸寃翁得釋人稱孝婦年二十七夫亡無子止一女氏事舅姑益謹舅姑殁喪葬皆經理無遺憾女適陳康熙五十五年女之子元龍為廣西巡撫循例陳情贈外祖母為夫人徐貞女吳偉業徐貞女傳名文琳陳堪永之聘室也堪永為大學士之遴子殁於謫所女聞訃守志母家或勸以他適女曰富貴而許之患難而背之我不為也卒不從越四年姑徐氏得請歸里女曰吾今有家矣遂歸陳侍奉其姑撫姪于扆為嗣祝貞女海寧貞女祝氏徵詩序祝書紳女幼許字查臨昌臨昌染瘵疾不起女聞訃即易縞素請於母兄欲奔喪守志母止之即泣拜曰兒無歸矣願終身執婢子役老於此所母頷之已而哀其年少私議改適女偵知之遂絶粒不食而死時年二十一葛新永妻曹氏公舉事實年二十五夫病危篤氏瀝血書疏禱於神願以身代無何夫殁氏念翁姑早喪家貧無子又無可繼者不如死遂投繯摩筓家人救免多方勸慰弗聽絶粒吞金而殞同里欽其烈捐資殯殮與新永合葬焉時康熙六十年六月也酷暑數日始殮面如生俞煒南妻蔣氏公舉事實年二十四生一女而煒南死家貧紡績養姑及姑卒竭蹶營葬繼姪主宗祀女亦有歸卒年七十二苦節四十八年吳天菴妻查氏公舉事實年二十夫亡家貧柩停破屋中氏朝夕紡績為營葬計每遇風雨輒撫棺哀號閲二十餘年始得購地畢葬以積勞成疾卒時年四十九親叔無子立從姪仲升為後郭忠祥妻董氏孫元懋妻張氏王廷璧妻陸氏賈朝偉妻徐氏萬起龍妻郭氏李頵玉妻胡氏陳祥龍妻沈氏李晉妻周氏凌台符妻杜氏陸雲妻翁氏陳侯周妻張氏陳祖芬妻董氏賀薇弼妻范氏陳之邁妻徐氏陳侯熙妻酆氏許文穆妻湯氏沈華闕妻張氏楊雲妻唐氏董明良妻孫氏金良玉妻俞氏陳侯億妻吕氏陳之杰妻周氏陳之芳妻徐氏陳之然妻陸氏陳殿棟妻陸氏陳煒世妻董氏陳覺世妻朱氏蔣之琬妻張氏張季存妻髙氏蔣公胄妻吕氏沈志信妻潘氏沈志昻妻嚴氏唐天錫妻吕氏徐映華妻唐氏金之豸妻李氏陳鼎新妾趙氏張成祖妻沈氏張南仲妻趙氏徐廷遇妻浦氏查仲山妻葛氏胡文把妻汪氏蔡公釐妻湯氏沈邃妻唐氏曹元楨妻徐氏沈犀雯妻周氏富陽縣三國吳徐真妻孫氏三國吳志徐夫人傳富春人真與權父堅相親堅以妹妻真生琨琨隨孫策擊張英於當利口而船少欲駐軍更求琨母時在軍中謂琨曰恐州家多發水軍來逆人則不利矣如何可駐邪宜伐蘆葦以為泭佐船渡軍琨具啓策策即行之衆俱濟遂破英孫翊妻徐氏三國吳志孫翊傳翊字叔弼權弟也以偏將軍領丹陽太守時年二十孫韶傳注媯覽戴員親近邊洪等數為翊所困常欲叛逆時諸縣令長並會見翊翊以妻徐氏曉卜語徐明日欲為長吏作主人卿試卜之徐言卦不佳可須異日翊以長吏來久宜速遣乃大請賓客翊出入常持刀時空手送客洪從後斫翊郡中擾亂無救翊者遂為所殺洪迸走入山徐氏購募追捕中宿乃得覽員歸罪殺洪諸將皆知覽員所為而力不能討覽悉取翊嬪妾欲復取徐徐恐逆之則見害乃紿之曰乞須晦日設祭除服潛使所親信語翊舊將孫髙傅嬰等説覽欲見逼所以外許之者欲立微計願二君哀救髙嬰乃密呼翊時侍養二十餘人以徐意語之共盟誓合謀到晦日設祭徐氏哭泣畢除服薰香沐浴更於他室安施幃帳言笑歡悅示無戚容覽密覘無復疑意徐呼髙嬰與諸婢羅住户內使人報覽已除凶即吉惟府君命覽盛意入徐出户拜覽適得一拜徐便大呼二君可起髙嬰俱出共得殺覽餘人即就外殺員夫人乃還縗絰奉覽員首以祭翊墓舉軍震駭以為神異晉孫晷妻虞氏晉書孫晷傳富春人會稽虞喜隱居海隅有髙世之風晷欽其德聘喜弟預女為妻女棄華就素與晷同志時人號為梁鴻夫婦虞潭母孫氏晉書本傳富春人初適潭父忠有婦德及忠亡遺孤藐爾孫氏雖少誓不改節躬自撫養劬勞備至性聰敏識鑒過人潭始自幼童便訓以忠義故得聲望允洽為朝廷所稱永嘉末潭為南康太守值杜韜搆逆率衆討之孫氏勉潭以必死之義傾其資産以餽戰士潭遂克捷及蘇峻作亂潭時守吳興假節征峻孫氏戒之曰吾聞忠臣出孝子之門汝當捨生取義勿以吾老為纍仍盡發其家僮令隨潭助戰貿其所服環珮以為軍資於時會稽內史王舒遣子允之為督護孫又謂潭曰王府君遣兒征汝何為獨不潭即以子楚為督護與允之合勢其憂國之誠如此拜武昌侯夫人加金章紫綬潭立養堂於家王導以下皆就拜謁咸和末卒年九十五成帝遣使弔祭諡曰定夫人孫彥妻環氏鈕滔母孫瓊與虞定夫人書富春孫彥妻環少厲令節服膺道教逮適孫氏恪居婦職宗姻有聲奉禮未周彥母喪隕喪隕半年彥奄亡沒環率禮奉終抗義明節傾竭私産以供葬送禮服既終前無立子家欲改醮誓而不許明周道妻林氏杭州府志事舅姑以孝聞正德三年道病殁氏誓以同棺殯遂自刎死時御史巡富邑聞其事請旌胡鍢妻方氏萬歷杭州府志歸三月而鍢夭氏年僅十九鄰媪憐其孱弱挑之再醮氏齧指謝絶晨昏以絣䌟洸代二尊人之養疾則露禱割股者再歷七十年節孝如一日嘉靖年旌表張慎言妻俞氏舊浙江通志慎言早卒氏誓不獨生喪畢閉寢室投繯而死鄭貞女杭州府志錢塘人年十六字富陽施尚文未婚尚文患羸疾施父母引世俗例迎女過門謂之沖喜實未成婚也女居三日親為煮藥兩家父母憐之遣歸未閲月尚文卒女聞訃赴拜柩前慟哭幾絶遂守喪不返克盡婦道俟尚文弟有子立為嗣年七十餘萬歷間旌表孫貞女富陽縣志孫元化女年十七許字徐有生婚有期矣有生卒訃聞女固請赴弔其母止之曰此志節事日久甚難非心如鐵石未易終也女即以手探沸湯曰所不能終者有如此日母急持之而泣遂率女往唁女潛收紅紫色衣私焚之矢志不歸及叔氏有子立為嗣撫之卒年七十三陳逹道妻陸氏富陽縣志逹道卒氏年十九先是逹道父一品早卒母華氏亦年十九而寡至是嫠婦相對又無子母家隂為擇配氏聞之嘆曰未亡人茍不顧初盟陳宗不幾絶乎父曰初慮其不能終耳誠如是甚慰俟叔氏有子立為嗣萬歷中旌表王秉德妻陳氏舊浙江通志年二十二夫歿守節五十餘年巡撫疏請建坊邵起元妻吳氏舊浙江通志通孝經列女傳作五倫解又作廣五倫解未幾起元卒氏年二十八哀毁悲慟幾不欲生後以次子嘉貴封太恭人年八十六卒刻有冰玉堂集陸仲禎妻陳氏富陽縣志仲禎年二十餘得危疾卒氏悲泣慟絶水勺不進口惟求一死妯娌及姑姊妹咸諭解之氏曰豫非不知此但中心慘痛如割欲少忍須臾不可得安能復度歲月耶家衆共守之越數日人多倦解遂伺間自縊死俞欽逹妻陳氏富陽縣志欽逹耕作勤瘁值崇禎庚辰嵗大飢以勞傷致疾卒氏竭力備棺衾殯殮以酒肉設祭柩前母家相去僅里許隨以肉歸餉母悲哭示永訣母初不知其意所在旋至逹靈前再拜投繯以死周振燾妻馬氏杭州府志振燾卒無子氏嘆曰未亡人惟死節與立孤今無孤可立當死因入室自縊妯娌覺解之適大水遂密縫上下服俟人靜赴水死督學旌表曰白水長馨宋守俊妻張氏杭州府志守俊患痼疾氏忘寢食調藥餌及殁殮事畢隨自縊時年十九周文德妻何氏倪有誠妻沈氏何渠妻鄭氏章滂媳吳氏金鳴宰妻吳氏王澯母髙氏吳木妻陸氏何春毗妻鄭氏髙汀妻陳氏何孕美妻髙氏倪起聖妻周氏張作楣妻陳氏何其逺妻陸氏何崖妻俞氏周國鏵妻陸氏章希義妻楊氏國朝周士妻方氏富陽縣志年十七而夫亡無嗣煢煢孑立惟日鬻女工以自給鄉黨靡不稱其旨建貞操奉坊旌表章文茂妻俞氏題旌册年二十八而寡矢志不移備嘗荼苦卒能訓子有成章甫妻傅氏題旌册年二十五而寡冰霜之操始終如一何豫彰妻馬氏題旌册年二十九而寡撫幼孤蓬首垢面終身未嘗見齒以上三氏俱旨建雍正三年具題奉坊旌表王錫麒妻徐氏題旌册年二十三而寡事舅姑孝教子嚴守節三十年陳元鑑妻何氏題旌册年二十八而寡遺孤三氏辛勤撫育勤紡織以給饔飱守節四十八年鄭之鼎妻趙氏題旌册年二十六而寡勤女紅撫子守節二十七年卒鄭之翰妻華氏題旌册年二十八而寡事孀姑撫子守節二十四年何式武妻髙氏題旌册年二十二而寡事舅姑撫子守節三十年倪森妻劉氏題旌册年二十九而寡事舅姑撫子守節二十二年俞公琮妻陳氏題旌册年二十八而寡撫子成人守節三十四年胡秉詵妻俞氏題旌册年二十四而寡營葬舅姑及夫柩撫幼子守節二十七年以上旨建八氏俱雍正六年具題奉坊旌表方兆吉妻王氏題旌册年二十七而寡撫三子成立孫枝繁衍氏性好施鄰里有匱乏者無不周濟守節四十七年金廣五妻邵氏題旌册年二十六而寡遺孤襁褓氏晝採薪夜紡績以給饔飱子長娶婦生孫又早歿氏偕媳撫孤饘粥不繼勵志益堅守節四十七年施于京妻張氏題旌册年二十二而寡撫子之模又夭乃立姪孫為子後與媳章氏共撫之守節四十五年方遴妻趙氏題旌册年二十二而寡撫姪為後事舅姑孝舅殁姑年八十尚存氏奉侍惟謹旨建守節三十二年坊旌表以上四氏俱雍正七年具題奉鄭玉芹妻徐氏題旌册農家婦也年二十九而寡上有耄姑下有幼子家貧不能自存氏晝夜績麻度日子稍長即教以農事子亦誠實氏晚年衣食稍給守節四十三年卒何希孟妻李氏題旌册年二十四而寡子未彌月雖炊煙常絶而矢志益堅撫子成立守節三十五年胡士佺妻張氏題旌册年二十四而寡無子繼姪撫養教誨茹素終身守節三十八年夏必廣妻吕氏題旌册年二十五而寡踰年夫兄亦亡夫嫂俞氏孀居有疾氏事之如姑教子以義方好施舍守節三十六年沈明蛟妻周氏題旌册年二十二而寡孝事舅姑夫兄嫂早逝遺孤在襁褓氏恩勤撫育與己子等教之讀書皆有成守節四十八年倪士英妻劉氏題旌册年二十八而寡撫二子葬舅姑守節二十四年趙嘉言妻吳氏題旌册年二十八而寡事舅姑撫遺腹子守節二十四年趙玉璘妻馬氏題旌册年二十二而寡家貧鶉衣百結日止一餐遺孤又殤親族勸其更適氏矢死不從撫姪為嗣守節四十年何宏燾妻張氏題旌册年二十九而寡叔又早逝遺孤周嵗無母氏辛勤撫育與己二子無異視守節二十四年具題奉以上九氏俱雍正八年旨建坊旌表楊氏二烈題旌册二烈者楊友松妻朱氏及其子楊愈奇妻宋氏也順治間山冦竊發姑媳預謀避賊之地見田舍側清池曲繞岸多叢薄朱曰吾與爾逺避他處安危未可知不如匿此茍得免幸也否則赴池水死耳辛卯九月賊猝至朱與宋匿叢薄間賊搜之遂躍入池中相抱自沉賊抽矢射之而去翌日家人出之矢貫宋氏項面色如生朱時年四十四宋年十九朱乃玉妻何氏題旌册年二十五而寡無子撫姪模俊為嗣又夭偕媳汪氏共撫孤孫常以數珠一串授媳曰此一條心也吾每以此自持爾其佩之何氏守節四十一年孫東星妻章氏題旌册年二十三而寡無子氏矢志苦守孝事舅姑後十五年應繼始生遂撫育為嗣守節三十二年九年具題奉以上四氏俱雍正旨建坊旌表董志燾妻劉氏題旌册年二十七夫亡舅姑繼沒喪葬無缺禮遺孤甫晬訓育成立嵗侵親鄰中貧乏不能自存者至傾資空囷以濟之守節三十四年雍正十二年具題奉旨建坊旌表金一柱妻張氏題旌册年二十六夫亡子方周嵗舅姑相繼卒遺幼叔亦在襁褓氏撫養教誨俱克成立守節四十六年雍正十三年具題候旌王世鑑妻俞氏富陽縣志世鑑耕作勞瘁得疾卒氏竭力殯葬再逾月其父兄與媒利其聘私與故家諸生無子者為妾不令婦知計以他事誑使至至則留而不返先一日鄰有聞於氏者氏神色不變歸私室沐浴更衣向靈前再拜遂投繯而死里有不平者鳴之官罪媒者及其父兄因得旌表陳士禎妻陸氏富陽縣志適陳數年士禎殁臨訣囑氏曰汝能善事舅姑吾目瞑矣氏誓死不變士禎既死奉養髙堂十餘年菽水唯謹後舅姑卧疾各三載氏為侍湯藥親滌溺器略無惰容及卒喪葬盡禮年七十餘卒髙萬翊妻邵氏俞應秋妻馬氏髙萬翺妻邵氏何純然妻屠氏華文顯妻蔣氏陸繼全妻朱氏裘秉銑妻楊氏陸之行妻羊氏金有節妻吳氏裘黃中妻周氏邵國泰妻馬氏華國章妻徐氏周以道妻趙氏何幸宰妻趙氏邵日章妻徐氏俞嘉誼妻裘氏張奕羔妻胡氏許嘉壽妻李氏趙有源妻沈氏董九經妻錢氏浙江通志卷二百三
