body:
  text: 浙江通志卷一百二十三選舉一自鄉舉里選之法行而其後别為科目葢興賢育才為國家股肱耳目之寄典莫重焉兩淛人文自漢以來駸駸日盛聖朝養士百年人才尤為蔚起制科之外復廣登進之途或以言揚或以行舉科目之盛從古未有誠千載一時之隆遇也志選舉漢薦辟漢書惠帝本紀惠帝四年正月舉民孝弟力田者復其身漢書文帝本紀文帝十五年九月詔諸侯王公卿郡守舉賢良能直言極諫者册府元龜元光元年十一月初令郡國舉孝㢘各一人白虎通昭帝時舉賢良文學增博士弟子員滿百人又歳課甲科四十人為郎中乙科三十人為太子舍人丙科二十人補文學掌故先是武帝詔丞相御史列侯中二千石諸侯相舉賢良方正直言極諫之士令州察吏人有茂才異等可為將相及使絶域者令郡國舉孝弟有行義聞於鄉里者令三輔太常舉賢良郡國舉高第自此公卿大夫士吏彬彬多文學之士矣後漢書光武本紀建武七年四月詔天下公卿司隸州牧舉賢良方正各一人遣詣公車後漢書章帝本紀建初元年三月令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人漢官儀建初八年十二月己未詔辟士四科一曰徳行高妙志節清白二曰經明行修能任博士三曰明曉法律足以決疑能案章覆問才任御史四曰剛毅多略遭事不惑明足照奸勇足決斷才任三輔文獻通考東漢之制選舉於郡國屬功曹於公府屬東西曹於天臺屬吏曹尚書亦曰選部凡郡國守相視事未滿歳不得察舉孝㢘以其未乆不周知也嚴助會稽人舉賢良擢中大夫朱買臣會稽人嚴助薦為中大夫全柔錢唐人舉孝㢘桂陽太守沈豐烏程人辟郡主簿遷零陵太守費汎烏程人舉孝廉拜中郎梁相費鳯烏程人舉孝㢘堂邑令鍾離意山陰人舉孝㢘尚書僕射鄭𢎞山陰人舉孝㢘侍中大司農賀純山陰人舉賢良方正江夏太守趙曄山陰人舉有道韓詵山陰人舉孝㢘盛憲山陰人舉孝㢘呉郡太守戴就上虞人舉孝㢘孟嘗上虞人舉茂才合浦太守朱儁上虞人舉孝㢘謝彞吾山陰人舉有道荆州刺史楊扶烏傷人交州刺史楊喬烏傷人舉孝㢘方儲富春人舉賢良方正太常謹按薦辟之制自漢迄明科目不一惟實指孝廉茂才異等名目者自宜登載舊志漢薦辟中首列嚴忌考漢書忌無本傳但於嚴助傳内載助為忌子忌字夫子而無薦舉之文若但㨿舊志載入則自唐代未設進士以前凡䇿名登朝者孰不由薦辟何獨止列嚴忌以下諸人耶故薦辟中非有實指科目者寕闕而不書三國呉三國志注赤烏二年正月詔自今選三署皆依四科不得以虚詞相飾范平錢唐人舉茂才臨海太守虞翻山陰人舉茂才張悌臨海人薦歴丞相闞澤山陰人察孝㢘除錢唐長賀齊山陰人察孝㢘為永寧長晉晉書武帝本紀泰始四年六月甲申朔詔郡國守相士庻有好學篤道孝悌忠信清白異行者舉進之十一月己未詔王公卿尹郡國守相舉賢良方正直言之士文獻通考泰始五年詔州郡舉勇猛秀異之才冊府元龜元帝初制揚州嵗舉二人潘綜烏程人舉純孝縣長呉逵烏程人舉孝㢘賀循山陰人舉秀才除陽羨令謝沉山陰人舉孝㢘虞喜餘姚人舉孝㢘散騎常侍虞潭餘姚人舉秀才祭酒虞預餘姚人舉孝㢘著作佐郎任頊章安人薦授吏部功曹丁潭山陰人察孝㢘除郎中南北朝文獻通考宋制丹陽呉會稽呉興四郡嵗舉四人餘郡各一人玉海宋制州秀才郡孝㢘至皆䇿試天子或親臨之公卿所舉屬吏部序才銓用齊䇿秀才格五問並得為上四三為中二為下一不合與第從駱宰之議也六典注梁武帝欲招求後進五館生皆引寒門俊才即今之進士也玉海梁天監四年正月詔九流常選年未三十不通一經不得觧褐若才同甘顔勿限年次文獻通考陳依梁制凡年未三十不得入仕惟經學生䇿試得第得未壯而仕隋書文帝本紀開皇二年正月甲戌詔舉賢良十八年七月丙子詔以志行修謹清平幹濟二科舉人玊海隋大業元年七月丙子詔國子等學其為課試法三年四月甲午詔十科舉人孝悌有聞徳行敦厚節義可稱操履清潔彊毅正直執憲不撓學業優敏文才美秀才堪將略膂力驍勇文武職事有一於此不必求備三年始置進士科五年六月辛亥詔四科舉人學業才藝膂力絶倫堪理政事立性正直宋孔靖山陰人察孝㢘為功曹史孔覬山陰人舉秀才補主簿齊陳法明餘杭人舉孝㢘桂陽太守太史叔明武康人舉明經國子助教賀瑒山陰人舉明經五經博士朱仕明剡人舉秀才梁丘靈鞠烏程人舉秀才為主簿丘遲烏程人辟從事舉秀才除太學博士孔休源山陰人舉秀才郭世通山陰人舉孝㢘陳孔奐山陰人舉秀才虞寄餘姚人舉秀才唐薦辟唐書選舉志唐制取士之科多因隋舊其目有秀才有明經有俊士有進士有明法有明字有明算有一史有三史有開元禮有道舉有童子有三禮有三傳有史科此歳舉之常選也其天子自詔曰制舉所以待非常之才焉寶應二年禮部侍郎楊綰請依古察孝㢘乃詔明經進士與孝㢘兼行其天子自詔名目隨時所欲而列為定科者如賢良方正直言極諫博通墳典達於教化軍謀宏逺堪任將率詳明政術可以理人之類名最著而所以待之之禮甚優也唐會要貞觀十一年四月丙寅詔舉孝悌純篤儒術該通文詞秀美明識政體志行修立者給傳詣洛陽宫十五年六月戊申詔舉學綜古今孝弟淳篤文章秀異者以來年二月集㤗山冊府元龜貞觀十七年五月乙丑詔令州縣舉孝㢘茂才好學異能卓犖之士冊府元龜開元十九年舉博學宏詞科文獻通考會昌五年詔州府舉士人數其浙西浙東所送進士不得過一十五人明經不得過二十人冊府元龜唐天祐五年四月詔山谷隱淪之士鄉閭造秀之人仰所在長吏薦聞州府即當旌舉褚無量錢塘人舉明經左散騎常侍唐希顔餘杭人舉明經建威推官駱希聖臨安人舉賢良方正宣政殿學士駱奎臨安人舉博士左金吾大將軍徐堅長興人舉秀才集賢學士許伯會蕭山人舉秀才周丁會蕭山人舉宏詞沈融會稽人舉秀才孔若思山陰人舉明經刺史康希詵會稽人舉明經康子元會稽人舉明經徐浩會稽人舉明經尚書右丞羅讓會稽人舉賢良方正梁修臨海人舉賢良方正交州判官舒元謙舉明經進士唐書選舉志唐取士之科其目有進士凡進士試時務策五道帖一大經經䇿全通為甲第䇿通四帖過四以上為乙第先是進士試詩賦及䇿建中二年中書舎人趙贊權知貢舉乃以箴論表贊代詩賦而試䇿三道太和八年禮部復罷進士試論而試詩賦文宗詔禮部歳取登第者三十人茍無其人不必充數冊府元龜進士所試一大經及爾雅帖既通而後試文試賦各一篇文通而後試䇿凡五條三試皆通者為第進士有甲乙二科自武徳以來進士惟一科而已先試之期命舉人謁於先師有司卜日宿張於國學宰輔以下皆會而觀焉禮部闗試之日皆嚴設兵衞薦棘圍之搜索衣服譏訶出入以防假濫焉其進士大抵千人得第者一二其制誥舉人不有常科皆依其目而搜揚之試之日或在殿廷天子親臨觀之試已糊其名於中考之文册高者特授以美官其次與出身開元以後四海宴清士無賢不肖恥不以文章達其應詔而舉者多則二千人少猶不減千人所收者百纔有一唐會要開元十七年三月詔限進士及第每年不過百人太宗貞觀沈存誠武康人錢塘尉蔣允中仙居人奉直大夫厲文才東陽人龔宸龍丘人高宗麟徳陸齊望嘉興人祕書少監陸灞嘉興人吏部郎中陸偘嘉興人溧陽尉天后垂拱劉處仁金華人中宗嗣聖賀知章永興人太子賔客祕書監中宗神龍徐安貞龍邱人工部侍郎𤣥宗天寶錢起長興人祕書郎肅宗至徳顧况海鹽人著作郎嚴維山陰人又中詞藻宏麗科祕書省校書郎代宗大厯徐岱嘉興人修撰沈房武康人監察御史章八元桐廬人句容主簿徳宗建中陸贄嘉興人翰林學士同中書門下平章事徳宗貞元沈傳師德清人吏部侍郎孟郊武康人溧陽尉馮宿東陽人東川節度使馮定東陽人㪚騎侍郎馮審東陽人祕書監馮寛東陽人起居郎憲宗元和殷堯藩嘉興人監察御史陸𤣥感海鹽人黄州司馬施肩吾呉興人錢徽長興人吏部尚書陸彞行長興人同平章事孔敏行山陰人諫議大夫虞九臯餘姚人舒元輿東陽人刑部侍郎舒元褒東陽人御史中丞舒元肱東陽人舒元逈東陽人皇甫湜淳安人工部郎章孝標桐廬人大理評事徐凝分水人金部郎中穆宗長慶呉降新城人衡州刺史袁不約新城人職方員外郎顧非熊海鹽人盱眙尉張志和金華人待詔翰林滕葢東陽人敬宗寶厯朱慶餘越州人胡徳彰蘭溪人節度使胡仲武蘭溪人臨川令胡珏蘭溪人文宗太和厲元東陽人殿中侍御史武宗會昌朱可名越州人長安令項斯臨海人武昌尉馮袞東陽人蘇州刺史宣宗大中馮涓東陽人陳瑴桐廬人閩縣尹李頻壽昌人建州刺史懿宗咸通駱兢臨安人淮南節度使僖宗中和王祁諸暨人蔣琰仙居人諫議大夫僖宗光啓邱為嘉興人太子右庶子陸扆嘉興人尚書左丞翁洮壽昌人主客員外郎昭宗龍紀駱鈞臨安人御史中丞呉融山陰人户部侍郎昭宗大順呉蛻山陰人右拾遺羅讓山陰人呉少邽諸暨人門下侍郎昭宗乾寧孫郃仙居人祕書郎郟雲仙居人附年分無考進士褚璆杭州人禮部員外郎馮圖東陽人户部侍郎胡珪蘭溪人樓頴義烏人呉畦安固人諫議大夫薛正明永嘉人文房院使五代進士冊府元龜梁開平三年勅條流禮部貢院每年放明經及第不得過二十人文獻通考後唐同光三年勅今年新及第進士令翰林院覆試今後禮部所試委中書門下子細詳檢閲文獻通考周顯徳二年五月制進士帖經對義並試䇿文考通三以上為合格後梁太祖開平高彦海鹽人費州刺史朱行先海鹽人尚書右僕射呉全智仙居人光禄大夫樊騰蜚仙居人後唐明宗天成張文伏仙居人太中大夫石晉高祖天福黄遂東陽人工部尚書黄敔東陽人宋薦辟宋史選舉志宋之科目有諸科有武舉常選之外又有制科有童子試舉而進士得人為盛天祐初又入經明行修科分路别立額六十一人州縣保任上監司監司考察以聞無其人則否宋史選舉志制舉無常科所以侍天下之才傑天子親䇿之太祖始置賢良方正能直言極諫經學優深可為師法詳嫺吏理達於教化凡三科不限前資見任職官黄衣草澤悉許應詔對䇿三千言詞理俱優則中選開寶八年詔諸州察民有孝悌力田竒才異行文武材幹年二十至五十可任使者具送闕下景徳四年增置博通典墳達於教化才識兼茂明於體用武足安邉洞明韜畧運籌決䇿軍謀宏逺才任邉寄等科詔中書門下試察其才具名奏聞仁宗初又制書判㧞萃科以待選人又制高蹈丘園科沉淪草澤茂才異等科以待布衣之被舉者其法先上藝業於有司有司較之然後試祕閣中格然後天子親䇿之玉海大觀元年詔士有孝弟睦婣任䘏忠和八行貢入太學大司成考驗取㫖釋褐錢易錢塘人舉賢良方正直言極諫錢彦逺錢塘人舉賢良方正直言極諫錢明逸錢塘人舉才識兼茂明於體用錢藻錢塘人舉才識兼茂李尚錢塘人舉才識兼茂陸滋杭州人舉文學崔貢仁和人舉八行楊由義鹽官人薦授刑部侍郎李鞉富陽人舉宏詞童澤臨安人舉茂才陸韶之臨安人舉詞學兼茂李長民秀州人舉博學宏詞祕書省正字王應麟鄞人舉博學宏詞王應鳯鄞人舉博學宏詞莫叔光山陰人舉博學宏詞陸佃山陰人薦授尚書右丞相沈操會稽人舉直言極諫御史齊唐會稽人兩中制科夏噩會稽人舉才識兼茂許蒼舒會稽人舉