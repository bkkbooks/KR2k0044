body:
  text: 浙江通志卷一百八十一人物六文苑四台州府三國吳虞翔任次龍會稽典録山隂朱育曰文章之士立言粲盛則鄱陽太守章安虞翔與同邑任次龍各馳文檄曅若春榮唐項斯赤城志郡人字子遷張為唐詩主客有清竒雅正升堂項斯之語擢進士第官至丹徒尉張洎集序作江東人宋楊蟠宋史本傳字公濟章安人舉進士為密和二州推官歐陽修稱其詩蘇軾知杭州蟠通判州事與軾倡酬居多平生為詩數千篇後知夀州卒周辨寧海縣志字君儀父良史沒於日本辨不及見母施氏教之登嘉祐進士知青陽縣好讀書至老手不釋卷家貧未嘗語生事甚為王安石所器重有文集二十卷韻類十七卷行世陳貽序臨海縣志字叔彛治平元年進士性剛介有才學以詩名為蘇軾曾鞏所知官終湖南運判所著有天台集朱炌臨海縣志字寶臣元豐五年進士文詞藻麗一時諸公碑志多出其手有朱氏易行世王齊輿寧海縣志字之孟登進士知於潛再知崇安鑿渠星黃陂溉田萬餘頃百姓德之為立生祠擢知郢州遷告院刪定上殿論安邊擇將足國裕民之道髙宗大喜曰王齊輿南人似北議論可采既而臨安彌旬雨雪民乏食相枕藉死齊輿偶對及之上驚曰無人語此即命所司賑給之後以直煥章閣致仕營雲壑園與親故為真率會平生博學強記手不釋卷粗衣糲飯嘗如諸生而與名公巨卿酬倡語多竒崛社中目為詩虎有雲壑集劉知過天台縣志字與幾紹興中特科監南嶽廟與兄知變俱以文名尤工於詩時號二劉所著有江東天籟吳子良為之序王卿月臨海縣志字清叔博學工古文詞不隨時好力還古雅多藝能雖音律卜筮無不貫徹中乾道五年進士仕祕書郎權中書舍人直學士院掌制誥所草詞百餘篇深得代言之體嘗草胡銓制云吾寧身蹈東海獨魯仲連不肯帝秦至今名重泰山微藺相如何以存趙時論多之除太府卿卒著有醒菴集王及寧海縣志字達之乾道中進士以信州守致仕及學問淵逺為詩文粹而有法得人片言抄聚以寓品裁命曰藥籠取前人立身行已之事與志合者及諸時事之變從而折衷之命曰自信命所為文稿曰知過勇自刻厲老不少衰有桃源雜著三十卷王文舊浙江通志字希道警敏刻厲嘗師事王公綽葉水心取周易蒙卦之義以名其齋因購古今載籍枕藉讀之已而豁然有悟援筆為文日數千百言與陳耆卿吳子良為友著有東谷集行世吳子良臨海縣志字明輔寶慶二年進士官至湖南運使太府少卿幼從陳耆卿遊長登葉適之門適稱其文意特新語特工韻趣特髙逺雖昔之以文名世者不過若是何止超越流輩而已所著有荆溪集林表民台州府志字逢吉父詠道好古博雅儲書甚富逢吉承其家學而與陳耆卿吳子良遊嘗同耆卿修赤城志又自修續志三卷輯赤城集二十八卷于有聲黃巖縣志字君實跌宕不羈以詩自豪嘗舉浙漕已而謝去放浪江湖持其錦囊詩一帙歸謂家人曰平生事業盡在是矣王侍郎居安為題其集戴復古黃巖縣志字式之號石屏從林景思徐似道遊又登陸遊之門講明詩法後又走東湖浙西襄漢淮粵凡空迥竒特荒怪古僻之蹤靡不登厯蓋二十年然後歸而詩乃大進真德秀稱其句法不減孟浩然由是遂名天下有石屏集行世高耕臨海縣志字志伊詩文意不拔俗語不驚人不止晚歲益竒所著有帚金集聶蟾黃巖縣志字少明雅好吟咏多有真趣所著有金鰲詩卷車玊峯題云輕煤快筆非他人搜掐腎胃者可到虞似良黃巖縣志字仲房淳熙中官成都院判詩詞清婉得唐人旨趣尤工隸書時隸法多宗漢似良更出新意無一食頃去筆札卧猶運指習點畫衾禱當指處皆裂晚益竒古篆書益精有篆隸韻書行世從孫謙字子益隸書逼真似良時稱小虞丁希亮葉適丁希亮墓志字少詹黃巖人生二十九年適遇之於錢塘後二年適教諸生於樂清少詹始來人謂其年已尊老相與背笑之少詹不愠也又明年變名字從陳同甫於龍窟同甫驚曰是犖犖諤諤非妥帖為學徒者既而少詹盡師碩儒盡友良士盡聞名言夜誦逮晨手抄滿屋縱筆所就詞雄意確論事深眇皆有方幅人於是竒少詹為非人力可及卒年四十七左緯黃巖縣志字經臣強記善屬文劉元禮周行已皆兄事之初業舉子曰此不足為學文如韓退之詩如杜子美吾將遊其藩焉真德秀稱其避冦七詩可比老杜七歌有詩集行於世舒嶽祥兩浙名賢録字舜侯臨海人寶祐進士官終承直郎年二十六時以文見吳子良子良稱其異秉靈識如漢終賈後果以文學名所著有史述漢砭補史家録蓀野稿避地稿篆畦稿蝶軒稿梧竹里稿三史纂言談藂藂續藂殘藂傳藂肄昔遊録深衣圖説凡二百二十卷學者稱為閬風先生楊説孫舊浙江通志九歲通貫經史人稱神童有司試經義畫八卦賦河圖洛書論據筆立成胡三省台州府志字身之寧海人寶祐進士終朝奉郎因資治通鑑音義釋文各本乖異刋正為廣注九十七卷著論十卷以薦參賈似道軍言輒不用歸而遇亂失前書復購他本為之注始以考異及所著者散入通鑑各文之下厯法天文則隨目録所書而附著焉若釋文之舛謬悉改正之著辨誤十二卷復有竹素稿一百卷丁雷天台縣志字元震所著髙林詩稿葉夢鼎王應麟皆有題跋車安行台州府志字正路黃巖人遊陳潛室之門得武夷宗旨尤工於詩所著有鏤氷集鶴林吳詠稱其寬平雅淡不與近世較圭角而自得清修之趣翁時可台州府志號處靜黃巖人善樂府杜清獻公範稱之曰如絮浮水如荷濕露縈旋流轉似霑非著豈非遊戲翰墨之妙黃宏赤城新志字子約黃巖人博覽羣經尤長詞賦有以史才薦者不就落魄江湖幾三十年文章流播天下有榖城稿徐韶舊浙江通志字君美學於王藴文嘗著正朔郊祀禘祫辨及春秋精義學者尚之元陶宗儀嘉靖浙江通志字九成黃巖人少舉進士不第即棄去務古學於書無所不窺出遊浙東西師潞國張翥永嘉李孝光京兆杜本尤刻志字學工篆筆至正問浙帥泰不華南臺御史丑閭辟舉行人校官皆不就張士誠議以軍咨屈亦不往避地松江之亭林力耕以給食雅好著述雖在畎畝恆以筆研自隨嘗置一甕於樹間遇有所得輒書以投其中久之取次成帙名曰南村輟耕録凡三十卷行於世又著説郛一百卷書史會要九卷四書備遺二卷應文虎黃巖縣志字彥文通易詩書三經而長於詩嘗遊京師賦梅魂詩虞集楊載見之亟加嘆賞稱為應梅魂黃溍薦之不起人高其行李洧孫王溍李洧孫墓志字山甫寧海人以詞賦中選第一擢甲戍進士第授黃州司戶參軍未上而黃州以版圖歸國棲遲海濵者二十餘年郡府以名剡上乃為強起抵京師述大都賦以獻時大德二年也六年乃得杭州路儒學教授選為江浙同考官天厯二年卒學者尊之曰霽峯先生所著詩賦贊頌針銘表啓碑志序説總若干卷重修台州圖經列於學宫柯九思兩浙名賢録字敬仲仙居人官至奎章閣博士號丹邱生與虞集趙孟俯為友工於詩尤善畫竹木以書法作之筆勢生動每得意輒題詩其上一時稱為三絶陳德永元詩選傳字叔夏黃巖人從林紘齋盛象翁遊得王魯齋之學辟為和靖書院山長厯官浙江儒學提舉杜本稱其文似歐陽子尤長於詩所著有兩峯慙草邱應辰太平縣志字詠性博極羣書元貞間舉青田教諭不就作正異復井田諸論有憂憂集藏於家丁復元詩選傳字仲容天台人延祐初遊京師公卿竒其才薦入館閣當國者不能用不俟報可翩然去之遂家金陵宅故有兩檜樹醉則倚而咿唔因名其什曰兩檜亭詩中山李桓以為仲容學博才敏為詩精麗竒偉格超而趣逺深入古人閫奧云杜本台州府志字伯原其先自京兆徙天台為人沉靜寡欲天文地理律厯度數靡不通究兼工篆隸所著有詩經表義六書通編十原等書學者稱為清碧先生葉嗣孫黃巖縣志字本心大德中舉明經不就嘗試方石詩潞公張翥見之呼為葉方石有詩集行世子道滋博通經史所著有韻海明珠龜峯集王大本寧海縣志字仲孚舉進士官至祕書丞著述頗多方遜志謂其博學多識為元聞人舒卓寧海縣志善屬文至正辛邜鄉試左榜金華趙友桂有文才豪放自髙每讀人文章一語弗契輒覆手掩几上視雲漢作他語獨善卓卓至夜談屢及旦飯至且辨且食入咽不計多寡輒棄去蓋其文為所深服云黃庚元詩選傳字星甫天台人所著有月屋漫稿其自序曰齠齔時習舉子業不暇為詩自科目不行始得脫屣場屋放浪湖海凡生平豪放之氣盡發為詩若醯雞之出甕天也庚嘗於越中詩社試枕易詩推第一名重詞場張明卿宋濓張明卿墓志字子晦天台人教授里中不嗜榮名築幽齋於智山列圖書左右甃石蒔花遇賔至劇談賦詩望之猶世外人也作為文章珠貫玉聨有臺閣之風時遊戲翰墨筆法穠逸可玩兼畫竹石韻度清灑頗近文湖州至其學術則一以朱子為宗有言志稿四卷六藝編六卷存養録十二卷尚友編五卷世運略八卷家傳一卷政事書一卷潘從善太平縣志字擇可至元九年進士纍官同知制誥兼國史編修終福建儒學提舉攻古詩文善小楷書名重士林所著有松溪集郭公葵黃巖縣志字秉心元末翰林編修博覽載籍工詩文張承旨翥嘗評其詩文整密髙古雅趣絶俗進士唐肅亦謂其詩清若元酒雅若朱絲當時以為知言所著有諤軒集曹文晦元詩選傳字輝伯天台人少從兄文炳學穎悟多識而雅尚蕭散好吟咏大有情致築室讀書自號新山道人元季能詩者以輝伯稱首林昉太平縣志字仲昉由薦辟官國史檢閲善屬文尤深經學嘗作榖梁論辨震雷月食等説陸修正謂可以羽翼經傳宋濂謂乳甘記一篇行文絶類西漢所著有丹邱小稿半山文集劉仁本列朝詩集傳字德元天台人以進士業中乙科厯官江浙省左右司郎中至正庚子治師餘姚作雩詠亭於龍泉左麓倣佛蘭亭景物集名士趙俶朱右以下四十二人修禊賦詩仁本為之序明楊大中臨海縣志博學洽聞仕元為著作郎洪武中召見留文淵閣數月以老歸所著赤城志及隨手録三十卷陶凱臨海縣志字中立太祖起兵訪延上坐用其䇿以有天下定鼎後徴授翰林院編修與學士宋濓等纂修明史又撰大明集禮為五等封爵議定科舉式撰大明樂章九闋升禮部尚書長至日太祖出宿齋宫凱謂不可無篇什以示後世遂以星臨萬户動月傍九霄多為親凱首唱餘以次屬和太祖大悅命學士宋濂敘其首尋出為湖廣行省參政復為國子祭酒致仕後坐罪著有陶尚書集葉見泰赤城新志字彞仲寧海人明師取台州見泰衣褐造軍門謁其帥帥趣見之語三日夜不休署部從事遂取永嘉取福建收兩廣皆與有力焉未幾使安南諭其君長來貢以功授髙唐州判官遷睢寧令終刑部主事所著有蘭莊集弟惠仲亦能文號二葉陳基朱彞尊陳基傳字敬初臨海人從學黃溍遊京師授經筵檢討既而歸里奉其母入吳教授諸生嘗參張士誠軍士誠稱王基諌止不從洪武二年召入與修元史還卒於常熟縣基有文譽最為戴良所稱謂元之能文者虞揭黃桞繼之則莆田陳旅新安程文臨川危素其後則基而已許伯旅黃巖縣志字廷愼洪武初由選貢官刑科給事中以詩名時稱許小杜林公輔嘗見其感興諸詩問其得何法而然伯旅曰法可言也法之意不可言也上士用法得法之意下士用法得法之似吾詩幾用法矣識者以為不妄著有介石集徐一夔朱彞尊徐一夔傳字大章天台人吳元年詔儒臣纂禮書敕舉博古通今之士一夔首被微草創既就而還會元史成而元統後無事迹可徵將有事續修王禕以一夔薦復至京師洪武三年大明集禮成官杭州府儒學教授命編日厯靈谷寺初建敕一夔自杭州撰碑文以進稱旨賜蟒衣彩幣一夔工於文深而不刻質而不俚當元季自天台徙嘉興卜宅於春波門外白苧里陶宗儒臨海縣志一名宗誼字漢生宗儀之弟洪武時官禮部員外郎與會稽陶肅上虞謝肅等一十九人以詩名於時號稱皇明雅頌方行列朝詩集傳字明敏黃巖人詩名東軒集宋濂序云明敏仕元嘗參知政事於江浙行中書省襟度瀟灑善談名理於書無所不讀古詩俊逸超羣律詩麗婉清切於國初居然勝流也郭濬赤城新志字士淵寧海人洪武初詔郡縣貢秀士各一人寧海以濬名上既而上書論當世急務甚切召對忤旨令入太學太學所養士數千百人見其文咸吐舌驚嘆為不可及濬亦氣髙自負由是名起一時同學者見其名髙乃以弗及為憾譖諸師誣奏抵罪詹鼎寧海縣志字國器性豪邁方國珍聞其名強致之時明師臨慶元鼎為草表謝詞甚恭而辨太祖見之曰孰謂方氏無人乎更以國珍為左丞召鼎至京師為書萬餘言須車駕出上之太祖立馬授讀付左丞授以官後以刑部郎中謫陜西卒王修德赤城新志寧海人與郭濬皆以文名初宋濂見方孝孺文歎曰真竒才也遂留左右不忍舍繼見修德與郭濬文喟然曰吾道台矣林公輔嘗評之以為方之文如春氣方至津液之色充滿廣宇飛潛動植各有生意郭之文如蒼鶻摩空飛縱東西初無定適而俊逸之氣自為人所畏王之文如月墮澄江上下一色淨絶垢氛而清明之氣可掬也寧海縣志修德名琦以字行余尚則黃巖縣志名郁以字行博覽羣籍尤長於春秋洪武九年以選貢授河東鹽運副使奏正鹽法忤旨謫嶽州經厯與方孝孺林公輔輩為友以文學名當世其詩酷類晉唐有蛙吟集牟完舊浙江通志字元亮黃巖人博學能文章洪武九年廷試首選擢吏部驗封主事一時名士方孝孺郭濬咸稱其文理可望以董賈韓桞尋簡耆儒輔導親藩改燕府紀善仁宗為世子實受業焉所著有四禮家儀張廷璧臨海縣志名玨以字行工草書善詩文洪武中舉賢良方正授仙居訓導方正學論其詩刻峭新秀調信竒矣欲其知所趨向由大路而不失馳驅之正焉所著有張古學文集古學其號云鮑仁濟台州府志字原𢎞黃巖人嘗從陳鏗翁遊鏗翁之學蓋考亭支流也為文精密雄健一主於理洪武間薦授樂清訓導永樂初授伊府紀善進治國要道十二章數以直言忤王王不悅將中以危法仁濟先自歸京師王旋敗得免所著有恕菴集應宗祥列朝詩集傳字尚履黃巖人少好學讀書達旦懸髻屏牀以自警為諸生未久即棄去構書屋於澧川之上詩文好古不自貶以趨世弟子私諡曰文貞余吉祥黃巖縣志字大昌洪武中選貢永樂初用薦起臨海婺源訓導兩應聘主福建文衡擢禮部主事為詩文意逺詞麗周文襄忱陳祭酒敬宗咸稱其博雅有退菴集行世童一鶚赤城新志字伯昻黃巖人性淳厚穎悟絶人年十五善屬文嘗作運甓大椿等賦鴻生碩儒靡不歎賞有無謂稿傳世章陬台州府志字仲寅黃巖人領鄉薦試春官俱第二厯武庫主事武庫主百司傔從或得其竒贏以自潤陬獨斂退羸馬陋室如曩昔遇古今書會意處輒手録之退為其從遊者剖析無倦纍典鄉會文衡稱得士景泰己亥命同修宋元史續朱子綱目卒所著有詩經提要詩文集袁皓天台縣志號知止博學工詩喜讀周易參同契與杜司馬為莫逆交每戲曰袁書厨卒年九十著有知止集五卷陳嵩寧海縣志字伯高年十五邑令辟為胥吏不從求為邑庠生令考經義三篇又俾賦詩有平生縱有長楊賦也待吹噓送上天之句令加嘆賞永樂中以太學生特詔充纂修所著有春秋集義春秋名例張由益黃巖縣志名進以字行篤學好古嘗曰文以五經先秦為準詩以唐人為準性理以宋儒為凖庶罔謬戾所著有溆西集同時蔡阡號俟軒童琫號琴室俱有隱德能詩阡著風瓢遺響琫著懷癡子集陳大升黃巖縣志善詩時周令旭鑑以猛治邑一日忽召大升家人震讋莫知其由已至則命題西湖清景圖大升為題長句頃刻而就令大嘆服王一寧分省人物考仙居人英敏過於常兒年十三能詩仁宗在春宫聞之召試早過銀河詩立奏中永樂癸未會試尋丁父憂家居十年會宣宗求文士甚切吏部以應召見試表正萬邦論及詩賦皆見嘉賞擢吏部主事改翰林修撰預修宣廟實録充進講官主考應天鄉試厯遷禮部左侍郎卒贈太子太保諡文通一寧為人闓敏疏達為文必根於理詩詞翰墨清絶可愛孫元肅黃巖縣志名允惇以字行經明行修舉為海門縣訓導公暇吟咏性情獨立於萬象之表升靜江王府長史著有梅花百咏謝績太平縣志字世懋讀書務窮底藴貫徹為經實際為緯才髙數竒遁世無悶以詩自娛卒於家文肅公鐸輯其遺稿曰王城山人集山人之詩始規倣盛唐極婉轉流麗之妙晚獨愛杜少陵則盡變其故格益為清激悲壯顧其敘事引典雖往復開合未嘗不出於正可以知其為人矣李東陽陳憲章為之序應瓚仙居縣志號琴窗王一寧外孫幼携之遊長安一寧應制賦神京八景上稱善瓚次其韻語尤竒麗一寧奏呈其詩上大竒之曰斯真王學士甥乎命送中書肄業長遂放浪詩酒不營仕進有琴窗集句徐慶亨黃巖縣志字世嘉𢎞治己丑進士善屬文尤工詩嘗在京師與諸公詠雪有一鳥不鳴樹千峯半入雲之句人遂稱徐千峯李東陽見其白雁賦尤加歎賞厯禮部主事卒所著有西浦存稿公餘録管邦宰黃巖縣志字良卿以詩文著嘗賦金山夏相國言亟加歎賞尤工真草書領正德癸酉鄉薦未官卒著有二洞小稿王佐列朝詩集傳字仁甫臨海人號古直老人善草書作詩旅遊京師客公卿間三十年不置釡甑無僮僕意度率直不為崖岸遇所會意處欣然忘去李東陽作王古直傳潘淵天台縣志字默之由明經仕馬平知縣工吟咏嘗進嘉靖龍飛頌為璇璣回文詩數百首所著有玉屑吟雙澗集蔡宗堯列朝詩集傳臨海人嘉靖丁酉舉人司教松溪諸生刻其文曰龜陵集多識古文竒字詰曲取裁亦圭峯之流亞出於嘉靖中年知其蔑視李王矣集二十卷詩止樂府一卷秦鳴雷臨海縣志字子豫嘉靖甲辰進士廷對世宗親擢第一時方祈雨郊壇覩其名復大喜授修撰升左諭德厯國子監祭酒禮部右侍郎乙丑主會試時長陵神道橋圯巨璫請改建估費十萬餘金為自潤地閣臣以經始事屬禮曹鳴雷率衆度基而潛授意於擇日臺官報曰不利興造須二三年乃可舉事遂寢改吏部左侍郎兼學士教習庶吉士隆慶辛未升南吏部尚書乞休家居二十餘年凡吳越名勝無不探討卒年七十六所著有倚雲樓稿及談資蔡榮名台州府志字去疾黃巖人少負異才雅以古文詞自許王世貞見而竒之延之上座酒酣失足池中碎玉杯命作玊杯賦刻燭而就有太極圖注芙蓉亭稿行於世石文睿寧海縣志字文思萬厯庚辰進士引病歸杜門著書授南太常博士復乞養家居日事撰述竟以疾不起所著有白山文集葉良佩傳詳循吏陳公綸臨海縣志字渙中善為五言律詩清新婉至著有采碧集其自序以為本東野農夫因徙郡城誦讀章縫行迹不出其鄉獨六客錢塘平生好詩歌恥趨謁自禁諛語以玊室名其詩不欲著姓字云王薰黃巖縣志字簡之年十五作滕王閣賦為邵二泉王希文諸公所稱許補縣學生為詩文清逸典雅年三十卒人惜之所著有醒心集青林存稿時有張神童靂者八齡能詩謝文肅嘗以楮箑命題操筆立就云流水往來急青山逺近齊相期恐相失冒雨過橋西文肅大竒之陳錫臨海縣志字元之宏通該博嘉靖己酉薦於鄉卒業成均司成以五經疑義課考抉微訂奧司成歎服丙辰成進士授禮部祠祭司主事會日食時隂雲莫辨相嵩方以當食不食奏稱賀錫從實報所食分數嵩怒因考察罷歸益杜門著書嘗作易原辨隂陽象數之旨證以古今事變識者謂逺過焦氏易林善賦詩即席分韻數百言刻燭而成晚年著有楮癭集施黃巖縣志字定之由貢授武平知縣卒官為詩文對客揮毫詞采蔚然又精真草書著有搘頤稿北遊稿靈感録吳俸黃巖縣志字亷夫幼以文學著聲嘉靖初潘御史景哲萃兩浙名士於萬松書院試青山緑樹論竒之超貢上京以教授奉命修玊牒進紀善歸以吟咏老於家有叢桂山堂類稿張應魁黃巖縣志字星衡由明經授餘姚訓導遷諭寧化署邑篆力救諸生危案有崇德生祠所著寧陽圖説日蝕測影漆室末議大有山詩集王士性臨海縣志字恆叔慕向子平為人作為詩文幽深峻削孤情獨往萬厯丁丑成進士知確山縣擢禮科給事中典試四川升大理少卿晉右僉都御史巡撫河南力辭遂改南鴻臚寺正卿士性意氣凌厲以官為寄九州履其八所未至者獨閩耳諸名山自五嶽外窮幽極險凡一巖一洞一草一木無不精訂他若堪輿所𫐠象胥所隸千名百種無不羅致筆札間有五嶽遊記十二卷廣遊志二卷廣志繹六卷徐光允天台縣志字長卿九歲從祖於潮州能􅕍括韓文公廟碑為五言詩年十五補弟子員以歲薦老所至輒留題有山齋筆乘墨餘狂言醉蝶齋囈語諸書馮繩祖臨海縣志字武甫性慷慨不善謀生顧篤好詩文兼工米南宫書法晚不得志縱酒長歌雖㸑煙屢斷不之顧所著有窺圍草蛙鳴琴山雜咏母陳氏亦有繡佛齋草戴杏芳臨海縣志字屺人後改名栒通達古史百家言鑽幽嗜異為文輪囷離竒尺牘寸素人爭相藏弆當事者徵文走筆應之不往見見亦不干澤以是落落終其身有儛草諸集國朝洪若臯台州府志字叔敘臨海人順治乙未進士除户部主事厯郎中出為福寧道僉事連丁內外艱遂不出酷嗜學至耄手不停披林居三十載日以鉛槧為事凡生平未見之經濟一寓於著述讀者咸知為有用之文其板行者南沙文集文選越裁臨海縣志論定未梓者有明文瓊液樂府源流詩韻四書彚譜等書何衡臨海縣志字無頗幼補弟子員工文詞嘗賦白燕詩數十首紙為之貴隨父舜齡厯任山左閩中益得江山之助同人社集擁為雞壇祭酒兵火相尋數椽悉付灰燼僦居城北山房與二三故舊徜徉山水詩酒間所著有憶焚草客遊集鰲江雜著追昔萹等稿陳臣謙舊浙江通志字六吉臨海人為諸生有文名受知學使黎元寬明崇禎間以明經應北闈未舉返棹過姑蘇傾所携金市書籍以歸鍵户山房盡棄舉子業作為詩歌鏗鏘鏜鎝不忝家風陳璜臨海縣志字元卿為人軒軒磊落以能詩稱登順治壬辰進士授夀張知縣縣僻而簡署中藝瓜蔬以自給日手一編吟咏不輟以小誤降補寧德丞卒於閩著有寓園詩集文略旅書琪樹園詩話金華府唐駱賔王唐書王勃傳賔王婺州義烏人七歲能賦詩初為道王府屬厯長安主簿武后時數上疏言事下除臨海丞鞅鞅不得志棄官去徐敬業亂署賔王為府屬傳檄天下斥武后罪后讀至一抔之土未乾六尺之孤安在矍然曰誰為之或以賔王對后曰宰相安得失此人敬業敗賔王亡命中宗時詔求其文得數百篇舒元輿唐書本傳婺州東陽人始學即警悟元和中進士髙第裴度表掌興元書記文檄豪健一時推許拜監察御史遷刑部員外郎元輿自負才髙有過人者太和五年獻文闕下不得報上書自言改著作郎分司東都及李訓用事遷御史中丞輿兼刑部侍郎以本官同平章事甘露之變遇害元為牡丹賦一篇時稱其工後帝觀牡丹憑殿闌誦賦為泣下馮涓東陽縣志宿孫也大中四年進士文譽甚髙新羅方建層樓齎金帛奏請撰記時人榮之厯官眉州刺史時王氏阻兵強縻之署中不屈兼以恃才傲物幾為所危然憐其文藝每容之後朱梁遣使致書命諸從事具復皆不愜涓援筆立就大稱意五代劉昭禹金華先民傳字休明金華人刻苦攻詩有云句向夜深得心從天外歸仕湖南為天䇿府學士入南唐為嚴州刺史有詩集一卷凡三百篇宋徐無黨兩浙名賢録永康人從歐陽修學古文詞修嘗稱其文日進如水涌山出嘗注五代史妙得良史筆意皇祐中以南省第一人登進士第仕止郡教授而卒曹冠金華先民傳字宗臣東陽人博聞強記以文詞知名於時紹興甲戍進士第二擢太常博士後知郴州轉朝散大夫卒著有經進雜論萬言書恢復祕略時政救弊裕民政要忠言帝範十贊及雙溪集二十卷廬陵楊萬里見其集甚為推服范端臣金華先民傳字元卿蘭溪人浚之從子紹興中進士官至中書舍人雖入官未嘗廢學文詞典雅尤工於詩有集三卷出入諸家卓然名世至篆楷草隸亦造其妙學者稱為蒙齋先生喻良弼兩浙名賢録字季直義烏人與兄良能字叔竒俱以古文詞有聲太學良能成進士而良弼僅以特科尉新喻有杉堂集十卷樂府五卷龍川陳亮曰叔竒為文精深簡雅讀之愈久而意若新季直文蔚茂馳騁蓋將包羅衆體而一字不茍讀之亹亹無厭也尤工於詩一時巨公若洪邁楊萬里皆與為文字友何恪金華先民傳字茂恭義烏人好古藏書至萬餘卷工於文陳亮嘗稱其竒壯精緻反覆開闔卒能自闡其意登紹興三十年進士詣闕上萬言書及恢復十二䇿與朝論不合歸所著有南湖集陳炳金華先民傳字德先義烏人好古文務為竒語與喻良能良弼何恪號烏傷四子乾道二年登進士第為太平縣主簿所著有易解進卷巖堂雜稿倪朴浦陽人物記字文卿浦江人豪雋不羈喜舞劍談兵恥為無用之學紹興間草書數千言厯陳征討大計且以山川險阻户口多寡用兵者所當知乃遍考羣書成輿地會元志四十卷晚知不用復著監轍録五卷惓惓猶前志也好使氣與人多不合獨永康陳亮敬之淳熙中以豪俠徙家筠州會赦歸朴之友吳克已字復之縣之鶴塘人窮經博古尤邃於易旁通釋氏書多有著述朴嘗評其文汪洋恢怪如崩崖翻浪使人驚畏又玩之而不忍去陳亮宋史本傳字同甫婺州永康人才氣超邁喜談兵下筆數千言立就嘗著酌古論郡守周葵竒之隆興初婺州以解頭薦上中興五論不報益力學著書者十年淳熙五年更名同詣闕上書孝宗赫然震動欲用种放故事擢用之曾覿知之將見亮亮喻垣而逃待命十日渡江歸日落魄醉酒戲為大言涉犯上刑部侍郎何淡以聞下大理笞掠誣服為不軌孝宗亷知其事奏入劃其牘於地亮遂得免亡何亮家僮殺人臺官論亮情重王淮辛棄疾羅點援之力復得不死亮自以豪俠屢邅大獄感孝宗之知至金陵視形勢上疏激孝宗恢復而是時將內禪不報由是在廷交怒以為狂怪會吕興何念四毆吕天濟且死恨曰陳上舍使殺我取入大理衆意必死少卿鄭汝諧閲其單詞曰此天下竒才也力言於光宗免之未幾䇿進士光宗得亮䇿御筆擢第一既知為亮則大喜曰朕擢果不謬授僉書建康府判官廳公事未至官一夕卒亮志存經濟人人見其肺肝薦士恐弗及家僅中産畸人寒士衣食之久不衰卒之後葉適請於朝命補一子官端平初諡文毅徐次鐸金華先民傳字文伯東陽人紹熙元年進士又試宏詞科為山隂尉著復鑑湖議為樞屬以西府典故散在方册自建炎以來攻守之具編纂成書名曰中興兵防事類官止三衢倅嘗倣古周禮作漢官又作唐書傳注補注音訓總三百卷自號徐氏唐書又以唐書糾繆訛舛作釋糾辨謬十卷胡東陽縣志字景雲耽嗜六經子史學問深邃而行文典雅長於詩賦尤善表啓著傖鳴集八憤等詩喻侃宋濓喻侃傳字伯經義烏人慶元己未進士厯僉書鎮南軍節度判官尋請祠歸築室夫人峯下曰蘆隱性豪談論今古輒目光如炬氣軒軒出鼻吻間尤長於文詞當乾道淳熙間朱熹吕祖謙陸九淵張栻皆談性命而闢功利學者各守其師説陳亮倔起獨以為性命之微子貢不得而聞後生小子與之談不置殆多乎哉禹無功何以成六府乾無利無以具四德如之何可廢也於是推尋聖賢經理世故之大略明白簡大坦然易行人多疑其説而未信侃獨出為諸生倡扶持而左右之已而亮再下詔獄侃與同志極力營解遂脫亮於萬死一生之中人多義之所著有隨見類録二百卷蘆隱類稿五十卷方勺萬厯金華府志字仁聲金華人後居湖州西溪號泊宅翁潘良貴稱其超然遐舉神情散朗如晉宋間高士其詩文雄深雅健追古作者所著有泊宅編十卷夏明誠金華先民傳字敬仲金華人其學本於吕東萊而自負甚髙登慶元丙辰進士第三為安慶節推遂致仕嘗作八咏樓賦序直斥沈約為是樓之辱桞貫稱其巨作傑製在天地間如福物異瑞要不可多見而屢得之也時少章嘉靖金華縣志字天彞寶祐癸丑進士由南康軍教授擢史館檢閲授保寧軍節度掌書記卒自負甚髙談經自出新意史學最精平生所著有易詩書論孟大義六十餘卷論孟詩贅説易卦贊雜文古歌詩總曰所性稿五十卷鄭士懿稱其新雋峭拔自成一家吳師道亦云方鳳浦陽人物記一名景山字韶父其先自睦來遷浦陽鳳有異才嘗遊杭都將作監丞方洪竒其文以族子任試不中第後以特恩授容州文學未幾宋亡自是為汗漫遊北出金陵京口南過東甌海上顧盼徘徊一發於詠歌深於古今之感臨沒猶屬其子題銘曰容州示不忘也所著詩三千餘篇曰存雅堂稿子樗字夀父亦工於詩元傅野陳堯道金華先民傳野字景文堯道字景傳皆義烏人黃溍輯其詩為繡川二妙集而序之以為景文之詩精切整暇如清江漫流一碧萬頃而魚龍光怪隱見不常景傳之詩涵肆彬蔚若竒葩珍卉洪纎髙下雜植名園終日玩之不厭也張樞元史杜本傳張樞子長者婺之金華人幼聰慧外家潘氏蓄書數萬卷樞盡取讀之既長肆筆成章有問以古今沿革政治得失宇宙之分合禮樂之廢興以至帝號官名歲月先後厯厯如指諸掌其為文務推明經史以扶翼教道尤長於紀事嘗取三國時事撰漢末紀傳附以魏吳載記為續後漢書七十三卷朝廷取其書置宣文閣又春秋三傳歸一義三卷刋定三國志六十五卷林下竊議曲江張公譜敝彚編各一卷于石傳詳隱逸李裕元詩選傳字公饒東陽人嘗從許謙遊至治間詣闕上聖德頌補國子生至順元年舉進士厯道州推官所著有中行齋稿詩篇秀麗尤工七言樂府出入二李問金似孫萬厯金華府志字叔肖雋敏強記工舉子業文科既廢遂一意於詩清新警拔善諷切人吳師道稱其觸事感時足以附於風人之列云戴良金華先民傳字叔能浦江人初業舉子尋棄去專為古學時桞貫黃溍吳萊以文章鳴於浙東良往來諸公門下盡得其閫奧余闕持節遇婺聞良善詩與論古今作者詞旨優劣閲乃盡授以平生所得於師友者於是良之詩名遂雄東南至正丁丑以薦擢江北儒學提舉度無可行其志棄去益肆力於詩文瑰竒磊落清新雅潔往往無愧於作者有九靈山房集三十卷和陶一卷春秋經傳三十卷胡助萬厯金華府志字履信一字古愚東陽人曾祖居仁從吕祖謙學助刻志問學悉究經史百氏大旨舉茂才授建康路儒學録吳澄見其詩文大加稱賞用薦改翰林國史院編修官助狀貌清古平生誠實無偽見人有善亟稱之嘗作大拙小拙傳以寓意所著有純白類稿三十卷葉顒元詩選傳字景南金華人元季結廬城山之隅幅巾野服輕鞋瘦䇿時從樵夫芻叟往還自序所作詩以為薪桂老而雲山髙寒音調古而巖谷絶響故名之曰樵雲獨唱吳景奎金華先民傳字文可蘭溪人酷好為詩嘗遊山澤間方苦吟而雨至雨濡其衣弗知也所著集曰藥房樵唱宋濓為之序明宋璲浦陽人物補遺字仲衡濓之次子博雅善詩文尤精書法與宋克諸人齊名洪武中以薦為中書舍人一日帝出元內庫蟠桃核半片大可盈掌命濓記使璲書之稱為雙絶方孝孺稱璲書為威鳳沖霄祥雲捧日濓亦嘗謂二兒結篆鐵作文所著有水簾洞玉泉諸詩集子懌力學復工書蘇伯衡金華先民傳字平仲金華人少習舉子業中年專肆力於古文遂以知名明初召為國子學正舉入史館纂修元史書成授國史院編修以疾辭賜楮幣文綺遣還久之復起為處州教授以表箋失悮坐罪死士論悲之文集十五卷宋濓稱其精博而不粗澀敷腴而不苛縟劉基稱其語粹而詞達識不凡而意不詭人皆以為確論張孟兼金華先民傳浦江人以文詞知名性耿亮不阿每良朋盍簪抵掌笑談胸中森然芒角必盡吐乃已洪武初薦入史館與修元史書成授國子學録纍官山東按察副使與布政爭論中以危法沒於京師所著有白石山房稿若干卷初太祖與劉基論當時能文之士基首推宋濓其次自謂不敢多讓其次則推孟兼謂其文甚俊而意氣曅然云吳沉萬厯金華府志字濬沖蘭溪人師道之子與兄深傳其家學名重一時洪武初召為翰林編修轉國子博士以文學被寵眷官至東閣大學士禮遇亞於宋濓後以讒死嘗撰千家姓進御及所著有應酬稿瀔川集等書楊芾金華先民傳字仲章義烏人徙居東陽早從陳樵遊復登黃溍之門文詞典雅操筆立就洪武初􅈾薦上京以疾辭歸著有百一稿無逸齋稿輯元詩為正聲類編總若干卷自號鶴巖先生傅藻萬厯義烏縣志字伯長受業黃溍以文章知名由本縣儒學召授翰林編修尋拜監察御史官至河南廉使藻為御史時奉敕按鳳陽獄道途往還成紀行詩若干卷率有關於風教一日召對以詩進呈帝大悅作和章四首賜之王紳金華先民傳字仲縉義烏人禕仲子也禕死節時紳年十三落筆為文不可禦未幾母兄相繼沒煢煢憂患中而傑然負竒志盡取經史百家言出入上下務擷其精奧乃已宋濂一見竒之曰王子充為不死矣紳痛父遺骼未返首邱躬趨雲南求不獲乃即死所設奠慟哭招魂而返述滇南慟哭記以著志徵授國子博士卒所著有繼志集三十卷其文豐蔚雅贍稱其家法詩沖淡有陶韋風子稌字叔豐亦以文詞名有青巖集鄭棠鄭柏金華先民傳棠字叔美浦江人與弟柏俱受業宋濂之門以文詞知名棠尤善馳騁永樂初與纂修大典除翰林院典籍升檢討以疾辭歸所著金史評元史評及道山集二十卷柏字叔端隱居著書或以其名達之蜀王王曰可謂清逸之士人因以清逸處士稱之著有聖朝文纂文章正原續文章正宗金華賢達傳進德齊稿劉剛義烏縣志字養浩博學能文詞遊京師學文於宋濓嘗製鐃歌鼓吹曲十有二篇金華胡翰評其篇次體製皆承桞子厚之舊而才氣橫發音節鏗鍧則得之宋潛溪居多蘇伯衡謂其才雄氣暢詞與事稱有古作者之風沈賔國兩浙名賢録字用之義烏人性英特博閲經史弱冠即厭舉業攻古詩文嘗遊越謝文正遷一見之喜曰今之長吉也為詩多竒思不肯作尋常語所著有五經注疏太極圖衍皇極經世書疏文集若干卷盧格靜志居詩話字正夫東陽人成化辛丑進士除貴溪知縣擢江西道御史格難經伉伉所撰荷亭辨論八卷蕺山劉宗周為作序應廷育金華府志字仁卿永康人嘉靖癸未進士時值爭大禮廷育據濮議忤旨因乞養親改南刑部左遷知州尋備兵入閩致仕講學論道類多格言著金華先民傳編永康邑志又有刑部志讀律中庸本義等書胡應麟弇州史料字元瑞蘭溪人自號少室山人父副使僖元瑞九齡時從里社師習經生業而心厭之悉胠副使篋得諸書讀之遂能為歌詩已得薦鄉書然意不在一第先後購經史子集四萬餘卷手抄集録凡十之三築室曰二酉山房旦夕坐卧其間所著有詩八十卷文四十卷詩藪十八卷筆叢四十八卷行於世張一韶浦陽人物補遺字尚成髻年補博士弟子貢入成均癖嗜書自禮樂刑賦旁及方輿氏族星歷醫卜無不精究因慨然以著作自負攻古文詞縱遊三輔名都岱宗闕里匡廬九疑洞庭彭蠡嶺外盡交諸名士自是文益雄邁尤長於詩歌作咏史二百篇援引駮據率自成一家言又著厯代詩章辨體樂府考題晚善病然不廢吟咏有病餘集又著詒燕堂集三十卷張元銘浦陽人物補遺字演中精三易六樂曰樂易無異同損八十一之一分益三十二之三分陰陽變易六律旋宫盡此矣著樂則六卷以聘抵京與大理張懋學太常于正發髙攀龍何棟如諸公論樂於神樂觀著原樂大成復請講易於天玉書院著原易編過檇李樞部嶽元聲出震南兌北圖據易先後天變化之次力辨其非嶽屈服焉歸老著三皇五紀以明律度及地理連山醫墳欵要諸書行世金江義烏縣志字孔殷博通羣籍以著述為事由太學兩佐州治職務修舉未嘗以吏事妨學所著有續綱目書法續敬鄉録端本要略華川文派録義烏人物志太倉髙唐二州志總八十卷吳存中婺書字致之生而姣好通敏異常兒為文清壯有法好言古人中陸機王維喜法書著書論一卷字學十卷充任子入南雍時禮部侍郎葉向髙攝雍事存中手經義及詩古文上謁向髙讀未竟攝衣起以賔主禮見作萬厯紀元三大征頌一篇傳誦於時李維楨見之歎曰老夫不逮也龔士驤婺書字季良義烏人慷慨有志節十四補博士弟子能為古文詞折節讀書造請諸賢豪長者不避風雨凡星氣握竒博射暨形家軒岐諸方伎一見即能習試而絶出者莫如詩遺編數卷精苦沉細在唐人諸家中不多見也又作續文賦以明文章之源與近世之陋天啓辛酉舉於鄉崇禎戊辰成進士授溧水令卒吳之器義烏縣志字賜如年十一出就童子試冠其羣為諸生家有藏書十餘楹坐卧具間垂十年與斯一緒龔士驤輩六七人為八詠樓社崇禎壬午試南闈中式挾䇿遊二京慨然有匡世志所著婺書及婺書别録明月齋稿明月齋後刻稿衢州府唐徐安貞舊唐書本傳信安龍邱人善五言詩嘗應制舉一歲三擢甲科開元中為中書舍人集賢院學士上每屬文作手詔多命安貞視草纍遷中書侍郎徐珏舊浙江通志江山人五歲暗誦周易小戴禮大中十三年父舉明經携珏詣闕召試思政殿賜衣絹明年童子科及第父亦䇿名號所居坊曰雅儒宋徐泌𢎞治衢州府志字道深其先汴人官於衢因家焉泌登第終起居舍人知制誥有文集藏史館子庸直集賢院嘗表上周易意學藴蔡望衢州府志西安人咸平間進士注陰符經命翰林學士宋白看詳白奏此書當祕授中嶽主簿愼從吉宋史本傳字慶之知禮之子錢俶壻也自歸朝居散秩幾三十年頗以文酒自娛士大夫多與之遊大中祥符間判吏部銓臨事敏速所至務皎察多請對陳事上謂其無隱權知開封府請屬一無所受天僖四年坐與寇凖善以光祿卿致仕從吉善為詩有警語江鉞開化縣志字藝中性剛而行髙與人交有氣誼以進士知上元縣遷尚書郎棄官奉親放意泉石間與趙抃遊所著有金川集抃稱為劉白遺風毛維瞻兩浙名賢録西安人以詩名與趙抃同里相得為山林之樂元豐中出知筠州政平訟理民歡樂之時蘇轍謫監筠州酒稅相與倡和有鳳山八詠山房即事詩傳誦藝林毛滂衢州府志字澤民江山人元祐中為杭州法曹東坡為守滂秩滿去會有歌贈别小詞東坡問誰作以毛法曹對坡語客曰郡僚有詞人而不及知某之罪也翼日折簡追還留連數月滂因此得名官至祠部員外郎知秀州有東堂集劉鼎龍遊縣志學問宏博議論浩瀚一時學者皆從之同郡趙抃見其文嘆曰君當抗行韓桞非科目之文也子贊亦以文學名江褒𢎞治衢州府志字仲嘉開化人登進士第性髙簡娶曾布女布為相壻皆官中都惟褒調餘杭尉後終餘杭宰善楷書自謂鍾王虞褚以來皆傳一法非取其形似也篆隸俱入能品有遺稿五卷謹按萬厯常山縣志載縣人江袤亦曾布壻姓同而袤褒字形相似音亦相近或疑為一人但袤字伸長褒字仲嘉各因其名以起義開常異籍而一為太學生一為餘杭尉事迹亦各不同顯屬兩人今列袤傳於孝友拈出以俟博考程天民𢎞治衢州府志開化人幼即日誦數千言屬文操筆立就熙寧中進士官至太學博士程俱宋史本傳字致道開化人以恩補吳江簿近臣以撰述薦遷著作佐郎宣和二年進頌賜上舍出身厯知秀州紹興初始置祕書省以為少監奏修日厯祕書長二得預修纂自俱始時庶事草創百司文書例從省記俱托拾三館舊聞比次為書名曰麟臺故事上之擢中書舍人兼侍講後罷為提舉江州太平觀久之除徽猷閣待制秦檜薦俱領史事力辭不至卒俱在掖垣命令下有不安於心者必反覆言之不少畏避為文典雅閎奧為世所稱毛晃𢎞治衢州府志字明叔江山人紹興中免解進士嘗閉門著書留意字學增注禮部監韻行於世學者稱為鐵研先生子居正亦第進士有名於時江漢𢎞治衢州府志字朝宗常山人博學能文尤長歌行倅密州時秦檜為郡博士掌箋表漢每指摘竄定後至行在髙宗欲用之適檜為相以祠祿遣歸張恪張恢江山縣志恪字季武弟恢字季長皆舉進士以文學知名恪終著作郎恢嘗作士學聖人之極致賦乾道間入對便殿孝宗曰朕在潛邸已誦卿賦因除太學正徐巘徐嶢龍遊縣志巘字仲山少以文章名與梁溪尤袤善袤特稱之登進士第著紹興聖政寶鑑十卷以進上嘉之弟嶢字次山以進士厯國子監博士學富才贍尤長於詩有竹溪集張道洽𢎞治衢州府志字澤民開化人端平二年進士真西山所取士老始為池州僉判詠梅花詩三百首方萬里稱其篇篇有味雖古人已言之意而縱橫口手皆脫灑清楚有詩集行世柴蒙亨兩浙名賢録江山人甫能言即口授書十萬餘言不忘六歲暗誦九經通春秋大旨郡將面試童科作文者三以神童聞得免解端平二年初赴省嘗從幸六和寺上指示塔云一塔七層八面萬佛千燈蒙亨即應聲曰孤舟雙槳片帆五湖四海大嘉之有詩集若干卷徐復殷𢎞治衢州府志字元禮江山人中甲科召試玉堂由祕書郎厯遷左庶子言不合遽退學易宋理宗賜客齋二字鶴山魏了翁稱其文西澗葉夢鼎嘉其行東澗湯漢銘其墓張汝勤𢎞治衢州府志字賢甫開化人祖檀山父竹巖皆以文名至汝勤詩文尤工入元食貧不仕所著有詩集六卷講義史評古賦十卷擬漢唐制詔誥表雜文若干卷元鄭介夫𢎞治衢州府志字以居開化人著韻海至大間上太平䇿一綱二十目頗行之仕終金溪縣丞張宗元𢎞治衢州府志字仲亨開化人至順初進士髙古博雅罕與俗交以文詞名仕為祕書少監至正間部使者余闕行縣為立興賢坊以旌之程斗𢎞治衢州府志字仲元開化人世居龍山號龍麓子受業三江先生之門傳性理之學尤長於詩文有龍麓子集若程惟善戴彥則皆出其門明祝宗善兩浙名賢録江山人博學能詩洪武間舉為邑教諭秩滿之京館雞鳴僧舍客有微服倚闌吟者韻未竟宗善長揖續之客問其名而去翼日傳手詔召見擢知蘇州府始知微服倚闌者太祖也宗善守亷介以詩文擅名後坐誣籍其家惟圖籍數卷而已仍復其官方沃天啓衢州府志字化輔開化人風度灑落該覽古今詩宗唐人文尤典贍追古作者有素軒詩文集金𢎞訓天啓衢州府志字公懋開化人為人狷介竒雋甘貧力學試不遇遂棄舉子業為詩文豪邁佚宕人莫能及作史論數十篇皆出人意表有復菴集行世胡榮𢎞治衢州府志字希華龍遊人嗜學有文行從金華汪公若講學得其旨歸當道交薦不起著有榖溪漁唱徐履誠𢎞治衢州府志號迂叟龍遊人精春秋為學者宗師有司屢以明經薦不赴有城南集吾慶衢州府志字善有開化人舉博學為本縣訓導升東莞教諭淳古博洽文不屬藁所在稱為吾夫子徐以昭𢎞治衢州府志字用晦龍遊人讀書談道不求仕進所作文必有禆名教有風月交談集方瑛天啓衢州府志字廷藴開化人進士官行人司正亷介有文仕未一歲乞歸蕭然四壁人稱箬溪先生有雞肋集汪圻𢎞治開化縣志字彥達開化人隱居不仕長於五言古選人號為汪短選吾謹舊浙江通志字惟可開化人正德丁丑進士總角能吟詩博綜經傳子史天文地理兵家陰陽釋道等書過目不忘李夢陽竒之曰今之李賀也志輕軒冕得第後歸隱少華山與何仲默孫太初李崆洞相頡頏徐沆天啓衢州府志字清之西安人嘉靖庚子鄉薦知浴州改巴州歸嗜讀書不問塵事淹貫子史博極羣書督學華亭徐階目之曰書厨計偕邸中每夜背誦史書十數卷不漏一字鄰友疑其燈下披閲穴窗窺之漆如也始大駭服厯兩州愛民如子家仍四壁立居林下三十載夀九十一卒鄭孔庠天啓衢州府志號樾溪西安人穎敏絶世每過市賈書林輒取其書甲乙之業已默記仍與客談而記不輟年十六遊武枋盡和梅花詩名輩闕人士宴集約歌早朝詩以勸觴他客或記一二孔庠遍代席中人歌之衆謝不及也詩多不留草弟子識其什之一名樾溪集徐惟輯衢州府志號紫崖江山人博學能文少時詠回文詩知名嘉靖乙未進士為內閣中書舍人相國徐階應詔掣青詞命惟輯代為之上未嘗不稱善有詩集行於世余湘天啓衙州府志字育靈龍遊人以貢授臨武知縣性疏曠不慕聲華為文飛揚跋扈薄時藝好為古文詞尤表於詩詼諧排調倜儻不羈受業於鄒守益遂窺性命之微治臨武有仁聲余敷中衢州府志字定陽西安人少勤學沉酣子史工古支詞詩賦輯春秋五傳名曰麟寶以鄉薦秉鐸淳安與諸生闡析理奧所著有太末先生集南園北遊青溪諸詩柴惟道天啓衢州府志字允中江山人縞服臞形皭然不滓獨好為詩其詩清潔飄灑置之唐人中未可辨刋落世事卓然髙操天台友人王宗沐為作玩梅亭稿序徐應秋西安縣志字君義可求次子萬厯丙辰進士有書癖充棟之藏漁獵殆盡釋褐兩令劇邑皆有惠政擢儀部郎為魏忠賢所銜削奪歸里延里中時彥結社於足園授餐角藝手為丹黃戶外事泊如也著書甚富其已行世者談薈雪艇塵餘古文藻海古文竒艷駢字憑霄等集余鈺衢州府志字式如西安人方伯四泉之孫天資卓犖藏書萬卷皆丹黃數過終日下帷不與外事試輒冠倫古文詩歌沈欎華贍手輯純師集陳臥子吳幼洪為辨其首以貢齎志終葉國章西安縣志字含美三衢文習至國章而洗剔殆盡時文古文詞皆然其詩鑱刻新異有青藤道人之風以鍵戶恥問生計落其産潦倒而卒國朝徐國珩舊浙江通志字鳴玉西安人尚氣節敦行誼讀書上下千古為文奧衍雄肆尤好奬厲後進衢州府志國珩晚年優遊泉石好著述有隱史八卷及書畫軒東珂偶録北行草行於世余恂舊浙江通志字孺子龍遊人太僕卿日新仲子順治辛邜領解額壬辰成進士改庶常授翰林院檢討一歲三遷洊厯左春坊左諭德丁酉典試八閩試竣過里門會丁內外艱服闋以疾乞休林居二十年郡邑利弊悉心講求而自奉不異寒素卒之日邑人士與四方知交無不隕涕浙江通志卷一百八十一
