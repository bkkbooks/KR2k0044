body:
  text: 浙江通志卷四十五古迹七紹興府下希范亭名勝志清白堂遺址有清泉一泓上有希范亭因范仲淹以掘廢井而得泉也晚對亭嘉泰會稽志府廨招山閣之東寶慶會稽續志洪邁建極覽亭嘉泰會稽志在府廨賢牧堂之西北淳熙七年參政李彥頴建堵如亭輿地紀勝即越王臺故址王希吕建嘉泰會稽志王信為守改名觀德其西有桃蹊梅塢秋風亭寶慶會稽續志在觀風堂側嘉定十五年汪綱建汪綱秋風亭柱記秋風亭辛稼軒會賦詞膾炙人口今廢久矣豫即舊基面東為亭當必有高人勝士如宋玉張翰者來遊其間遊目騁懷幸為我留毋遽起思歸之興云多稼亭寶慶會稽續志在府廨嘉定十年王補之修近民亭嘉泰會稽志臥龍山之西舊有小茅亭名近民嘉定十五年汪綱即其遺址移越王臺於此其下為燕春雲根四面屏障步鰲拂雲並汪綱建望海亭輿地紀勝在府治臥龍山頂名勝志即今之越望亭也寶慶會稽續志望海亭在臥龍之西元微之李紳常賦詩則自唐已有之矣昔范蠡作飛翼樓以壓強吳此亭即其址也祥符末州將高紳植五桂於亭前易名曰五桂嘉祐中刀約增廣舊址再建復名望海自為記元徵之酬周從事望海亭見寄詩年老無流輩行稀足薜蘿熱時憐水近高處見山多衣袖長堪舞喉嚨轉解歌不辭狂復醉人世有風波望仙亭嘉泰會稽志直使宅之北紹熙甲寅趙侍郎不流建以梅福常隱此故名海榴亭萬厯紹興府志郡齋舊有海榴亭因唐李紳詩著名李紳海榴亭詩海榴花早開繁蕊光照晴霞破碧煙高近紫霄疑菡蓞逈依江月半嬋娟懷芳不作翻風艷别蕚猶含泣露妍搖落舊叢雲水隔不堪行坐數流年五雲亭萬厯紹興府志在卧龍東峯宋章岷建百花亭隆慶山陰縣志在卧龍之東宋建拂雲亭邃亭趙抃和程給事會稽八咏有拂雲亭邃亭清閟亭寶慶會稽續志在提刑司疊石為巖洞冠以亭淥秀亭冷香亭逍遙遊亭寶慶會稽續志通判北廳有小圃頗幽雅嘉定甲戍袁申儒臨池作亭名渌秀又於梅林中作亭名冷香又一亭曰逍遙遊因曾子固倅越劉貢父送以詩云君為逍遙遊亭名本此會稽圖畫亭寶慶會稽續志在通判北廳卧龍齋傍盡眺湖山之勝嘉定癸未沈繹作東亭嘉泰會稽志府橋北古為餞客之地唐人如宋考功輩皆有東亭詩史魏公改築蓬萊館然邦人猶謂之東亭宋之問夜飲東亭詩春水鳴大壑皓月吐層岑岑壑景色佳慰我逺遊心暗芳足幽氣驚棲多衆音高興南山曲長謡橫素琴西亭嘉泰會稽志在州治西北孫逖宴越府陳法曹西亭詩公府西巖下紅亭間白雲雪梅初度臘煙竹稍迎曛水木涵層景簾櫳引霽氛江南逼歸思春雁不堪聞惠風亭輿地紀勝在府橋北今為公庫酒肆光候亭嘉泰會稽志唐李訥餞崔侍御於此東武亭李紳東武亭詩注在鏡湖即元相所建春秋為競渡之所嘉泰會稽志世傳龜山自東武飛來因名白樓亭水經注重山上有白樓亭亭本在山下縣令殷朗移置今處太平寰宇記江夏太守宋輔於山南白樓亭立學教授又沛國桓儼避地至會稽聞陳業賢候之不見留書繫白樓亭柱而别名勝志常禧門外有白樓亭今地名白樓堰會稽記云亭在山陰臨流映壑柯亭太平寰宇記千秋亭一名柯亭蔡雍宿此亭仰觀椽竹知有竒響因取為笛一名高遷亭於越新編按舊志以柯橋寺為亭基蘭亭水經注浙江東與蘭溪合湖南有天柱山湖口有亭號曰蘭亭亦曰蘭上里太守王羲之謝安兄弟數往造焉太守王廙之移亭在水中晉司空何無忌之臨郡也起亭於山椒極高盡眺矣亭宇雖壞基陛尚存太平寰宇記在山陰縣西南二十七里輿地志云山陰郭西有蘭渚渚有蘭亭王羲之所謂曲水之勝境王羲之蘭亭集序永和九年歲在癸丑暮春之初會於會稽山陰之蘭亭修禊事也羣賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一咏亦足以暢敘幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懷足以極視聼之娛信可樂也夫人之相與俯仰一世或取諸懷抱晤言一室之內或因寄所託放浪形骸之外雖趣舍萬殊靜躁不同當其欣於所遇暫得於已快然自足不知老之將至及其所之既倦情隨事遷感慨係之矣向之所欣俯仰之間以為陳迹猶不能不以之興懷况修短隨化終期於盡古人云死生亦大矣豈不痛哉每覽昔人興感之由若合一契未嘗不臨文嗟悼不能喻之於懷固知一死生為虛誕齊彭殤為妄作後之視今亦猶今之視昔悲夫故列敘時人録其所述雖世殊事異所以興懷其致一也後之覽者亦將有感於斯文王羲之蘭亭集詩二首代謝鱗次忽焉以周欣此暮春和氣載柔詠彼舞雩異世同流乃攜齊契散懷一丘仰視碧天際俯瞰渌水濵寥閴無涯觀寓目理自陳大矣造化工萬殊莫不均羣籟雖參差適我無非親謝安詩二首伊昔先子有懷春遊契兹言執寄傲林丘森森連領茫茫原疇逈霄垂霧凝泉散流相與欣佳節率爾同褰裳薄雲羅景物微風翼輕航醇醪陶丹府兀若遊羲唐萬殊混一理安復覺彭殤謝萬詩二首肆眺崇阿寓目高林青蘿翳岫修竹冠岑谷流清響條鼓鳴音元蕚吐潤霏霧成陰司冥卷陰旗句芒舒陽旌靈液被九區光風扇鮮榮碧林輝翠蕚紅葩擢新莖翔禽撫翰遊騰鱗躍清泠孫統詩二首茫茫大造萬化齊軌罔悟云同競異標旨平勃運謀黃綺隱几凡我仰希期山期水地主觀山水仰尋幽人蹤回沼激中逵疏竹間修桐因流轉輕觴泠風飄落松時禽吟長澗萬籟吹連峯孫綽詩二首春咏登臺亦有臨流懷彼伐木宿此良儔修竹蔭沼旋瀨縈丘穿池激湍連濫觴舟流風拂枉渚停雲蔭九皋鶯語吟修竹遊鱗戲瀾濤攜筆落雲藻微言剖纎毫時珍豈不甘忘味在聞韶孫嗣詩望巖懷逸許臨流想竒莊誰云真風絶千載挹餘芳郗蕓詩溫風起東谷和氣振柔條端坐興遠想薄言遊近郊庾友詩馳心域表寥寥遠邁理感則一冥然斯會庾藴詩仰想虛舟説俯歎世上賔朝榮雖云樂夕斃理自因曹茂之詩時來誰不懷寄散山林間尚想方外賔迢迢有餘間華茂詩林榮其鬱浪激其隈泛泛輕觴載欣載懷桓偉詩至人雖無懷應物貴有尚宣尼遨沂津蕭然心神王數子各言志曽生發清唱今我欣斯逰慍情亦暫暢袁嶠之詩二首人亦有言得意則歡佳賔既臻相與遊盤微音迭咏馥焉若蘭茍齊一致遐想揭竿肆眺華林茂俯仰晴川渙激水流芳醪豁爾纍心散遐想逸民軌遺音良可玩古人咏舞雩今也同斯歎王元之詩松竹挺巖崖幽澗激清流消散肆情志酣暢豁滯幽王凝之詩二首莊浪濠津巢步潁湄冥心真寄千載同歸煙煴柔風扇熙怡和氣淳駕言興時遊逍遙映通津王肅之詩二首在昔暇日味存林嶺今我斯遊神怡心靜嘉會欣時遊豁爾暢心神吟咏曲水瀨淥波轉素鱗王徽之詩二首散懷山水蕭然忘羈秀薄粲頴疏松籠崖遊羽扇霄鱗躍清池歸目寄歡心冥二竒先師有冥藏安用羈世羅未若保沖真齊契箕山阿王渙之詩去來悠悠子披褐良足欽超迹修獨往真契齊古今王彬之詩二首丹崖竦立葩藻映林渌水揚波載浮載沉鮮葩映林薄遊鱗戲清渠臨川欣投釣得意豈在魚王藴之詩散豁情志暢塵纓忽已捐仰咏挹餘芳怡情味重淵王豐之詩肆盼巖岫臨泉濯趾感興魚鳥安居幽跱魏滂詩三春陶和氣萬物齊一歡明后欣時豐駕言映清瀾亹亹德音暢蕭蕭遺世難望巖愧脫屣臨川謝揭竿虞説詩神散宇宙內形浪濠梁津寄暢須臾歡尚想味古人謝繹詩縱暢任所適回波縈遊鱗千載同一朝沐浴陶清塵徐豐之詩二首俯揮素波仰掇芳蘭尚想嘉客希風永歎清響擬絲竹班荆對綺疏零觴飛曲津歡然朱顔舒曹華詩願與達人遊解結遨濠梁狂吟任所適浪流無何鄉孫綽後序古人以水喻性有旨哉非以渟之則清淆之則濁邪故振轡於朝市則充屈之心生間步於林野則寥落之意興仰瞻羲唐邈然遠矣近咏臺閣顧探增懷聊於曖昧之中期乎瑩拂之道暮春之始褉於南澗之濵高嶺千尋長湖萬頃乃藉芳草鑑清流覽卉物觀魚鳥具類同榮資生咸暢於是和以醇醪齊以達觀快然兀矣焉復覺鵬鷃之二物哉耀靈縱轡急景西邁樂與時去悲亦系之往復推移新故相換今日之迹明復陳矣原詩人之致興諒歌咏之有由文多不載大略如此所賦詩亦裁而綴之如前四言五言焉西溪叢語蘭亭之會自右軍太傅而次四十二人至唐大厯中朱迪吕謂吳均等三十七人經蘭亭故地聨句有賞是文辭會歡同癸丑年之句國朝康熙三十四年聖祖仁皇帝命刑部員外郎宋駿業督工重建御書蘭亭序刻石立亭上適南亭於越新編在山陰縣梅山頂宋熙寧中郡守程師孟創陸佃梅山適南亭記會稽山川之秀甲於東南自晉以來高曠宏放之士多在於此然山川之勝尚有鬱而未發者熙寧十年給事中程公出守是邦有以梅山之勝告公蓋其地昔梅子真之所居也因至其上望之峯巒如列間見層出煙海相值已而於山之高層築亭名曰適南取莊周大鵬圖南之義暇日領賔飲而賞之恍若登蓬萊之上可謂竒矣鑑湖一曲亭𢎞治紹興府志會稽賀監宅後為天長觀宋守史浩建亭嘉泰會稽志一曲亭前競渡不減西園鏡湖南亭元微之有宴鏡湖南亭詩皇甫山亭嘉泰會稽志孟東野賦皇甫秀才山亭詩云晴湖瀉峯鏡翠浪開萍蘚唐人多依鏡湖以為勝袁秀才林亭嘉泰會稽志在鏡湖中與方干别墅相近方干題越州袁秀才林亭詩清邃林亭指畫開幽巖别派象天台坐牽蕉葉題詩句醉觸藤花落酒杯白鳥不歸山裡去紅鱗多自鏡中來終年此地為吟侣早起尋君薄暮回覽勝亭萬厯紹興府志在柯山上覽全湖之勝黃猷吉柯山記亭前則萬峯羅拱其下則重淵澄浸此於吾越當稱絶勝而方册不載也張倬柯山覽勝亭懷古詩維舟鑑湖曲湖水照層巘蒲稗相因依鶩鳬戲平逺白雲天際來松壑怒濤捲一解塵垢嬰捫陟忘足繭昔賢有遺事亭子久蕪蘚叢桂煙未消疏篁露猶泫尚餘粉壁書俯仰若在眼富貴齊嵩嶽愚哲信有辨凄迷謫仙莊惻愴羊公峴撫景情鬱紆寄言聊自遣尚想化鶴來乘流弄清淺息柯亭山陰縣志在塔山東麓上有千峯閣臨池亭戴表元臨池亭記右軍祠孰之别築也正永和修禊處築亭者為東楚湯君垕懷賀亭寶慶會稽續志在鑑湖一曲史丞相建曲水亭吕祖謙入越録天章寺蓋王羲之之蘭亭由右軍書堂百餘步至曲水亭云是羲之鵝池墨池曲水蜿蜒若蚓必非流觴之舊歲久失其處耳犬亭萬厯會稽縣志在犬亭山越王畜犬獵白鹿以獻吳故曰犬山為犬亭陽春亭越絶書山陰故水道出東郭從郡陽春亭去縣五十里王子敬山亭嘉泰會稽志在雲門唐永淳二年春王勃修禊於此王勃修禊雲門獻之山亭序觀夫天下四海以宇宙為城池人生百年用林泉為窟宅雖朝野殊致出處異途莫不擁冠蓋於煙霞披薜蘿於山水况乎山陰舊地王逸少之池亭永興新郊許元度之風月琴堂寥落猶停隱遁之賔釀渚荒涼尚有適逢之客仙舟蕩漾若海山之槎來羽蓋參差似遼東之鶴起或昻昻騁驥或泛泛飛鳬俱安名利之場各得逍遙之地而上屬無為之化下棲元邈之風永淳二年暮春三月修禊事於獻之山亭也遲遲風景出沒媚於郊原片片仙雲遠近生於林薄雜花將發非止桃溪遲鳥亂飛有餘鶯谷王孫春草處處皆青仲統芳園家家並翠於是攜旨酒列芳筵先祓禊於長洲却申文而促席良談吐玉長江與斜溪爭流清歌繞梁白雲將紅塵並落他鄉易感每悽恨於兹辰羈客何情更歡娛於此日加以今之視昔已非昔日之歡後之視今豈復今時之會人之情也能不感乎宜題姓氏以傾懷抱使夫會稽竹箭則推我於東南崑阜琳琅亦歸豫於西北溪山竒麗亭紹興府志在府城東五雲橋跨溪好泉亭輿地紀勝在會稽雍熙寺陸少師佃所題窆石亭萬厯會稽縣志在禹廟之左思古亭嘉泰會稽志會稽山永興公祠之側有茗塢淘沙徑思古亭遺址萬厯會稽縣志在南鎮祠側越山亭劉基有越山亭曉望詩分翠亭涵虛亭𢎞治紹興府志在蕭山縣蕭然山上靖康元年令曾喜作望雲亭心逺亭適意亭萬厯蕭山縣志並宋乾道間邑人徐性建取石亭萬厯蕭山縣志梁會稽丞江革在官不納贈遺及還所乘舟輕易蕩乃取西陵岸石實之後人構亭於江岸因名一錢亭兩浙鹽法志錢清鎮有劉太守祠祀漢劉寵臨江有一錢亭麗句亭名勝志唐詩人秦系所居在蕭山縣之秦君里戴叔倫題秦隱君麗句亭詩北人歸欲盡獨自住蕭山閉戶不曾出詩名滿世間會景亭𢎞治紹興府志在蕭山縣廣慈院後有范希文葉道卿元厚之沈存中題詠臨川亭嘉泰會稽志在蕭山縣吳越兩山亭名勝志蕭山北幹山其巔曰玉頂峯有吳越兩山亭𢎞治紹興府志宋景德四年令杜守一建題曰知稼亭元令尹性修之改今名萬厯蕭山縣志今為四望臺貝瓊吳越兩山亭記蕭山尹侯本中築亭於北幹山巔題曰吳越兩山亭蓋岸江之山凡屬於吳者飛舞闌楯之外岸海之山凡屬於越者環繞窗户之間攢峯疊嶂或起而伏不可具狀考之紀載越之始封北至禦兒則錢塘亦越也吳勝越而取之然吳卒為越禽越卒為楚禽皆不能有其地今侯之登此亭也豈將覽兩山以寓懷古之思而已耶其亦觀山之不遷也思固其守思崇其業思漙其澤於民其庶幾乎薩天錫吳越兩山亭詩幹山孤亭據磐石老我憑高興無極長松參天凝黛色空翠滿山如雨滴長江中斷海門闢兩岸逺峰排劍戟或蟠臥龍形或鼓丹鳯翼仙乘縹眇東海東徐福樓船竟何益採藥人已陳鞭玉土有赤四海混一車書同形勝何須限南北吁嗟霸業今誰在吳山越山長不改芝亭𢎞治紹興府志諸暨芝山坊唐令郭密之作龜山亭紹興府志在諸暨縣放生湖郭密之建浣溪亭於越新編在諸暨縣浣溪黃溍浣溪亭詩巧笑回頭異態生明珠論斗比猶輕山圍故堞青蘿色水涌寒灘白苧聲十萬甲兵寧畏敵尋常花草特傾城歸來便作興亡鑒乞與陶朱一舸行芝泉亭諸暨縣志在孝感山唐張萬和廬墓之所句無亭萬厯紹興府志國語曰句踐之地南至句無今諸暨有句無亭釣隱亭名勝志在餘姚縣祕圖山麓以嚴徵君名嘉靖餘姚縣志當翠竇秀野兩亭之中北可望客星山雩咏亭於越新編在餘姚祕圖湖北元越帥劉仁本建劉仁本雩咏亭序至正庚子仁本治師餘姚乃相龍泉之左麓州署之後山得神禹祕圖之處水出巖罅瀦為方沼疏為流泉卉木叢茂行列紫薇間以竹篁倣佛乎蘭亭景狀因作雩咏亭以表之合甌越之士得四十二人同修褉事因曰續蘭亭會云於越新編即翠竇亭故址噴珠亭於越新編餘姚查湖有噴珠池宋元嘉中李信構亭其間遺址尚存更好亭於越新編在餘姚龍泉寺後宋高宗常登此望風物曰更好云橘亭蘇伯衡橘亭對越士陸孟文家於姚江之上歷山之下治圃蒔橘構亭龍泉亭喚仙亭嘉靖餘姚縣志在龍泉山龍泉寺後自山麓至絶頂背山面水為一邑佳處千巖勝槩亭萬厯上虞縣志宋令袁君儒於縣圃垝垣上建亭照心亭萬厯上虞縣志在尉廨射圃尉方申伯建觀風亭萬厯上虞縣志在縣治西臨河淳祐中令魏珉建今為水館亭仇亭水經注上虞江有仇亭在縣東北一十里萬厯上虞縣志今北鄉有柯山溝疑即仇亭遺址適越亭萬厯上虞縣志在晝錦門外宋寶祐中令趙時徵建雙檜亭寶慶會稽續志在上虞曹娥廟會稽縣志其上雙檜甚古虛籟亭𢎞治紹興府志在上虞縣宋杜思恭建一覽亭萬厯上虞縣志在長者山之椒元張興創以眺四山之勝楊亭萬厯紹興府志吳黃門楊哀明居嵊縣𢎞訓里開瀆作埭埭之西作亭亭埭皆以楊名戴溪亭嘉泰會稽志在嵊縣剡溪晉王子猷居山陰夜雪初霽忽憶戴逵時在剡便乘小舟詣之造門不前而退今人稱為戴溪邑令薑仲開建戴溪亭後改興盡今復其故王銍題戴溪亭詩碧玉仙壺表裏清我來間伴白雲行四山迤邐青圍野一水蜿蜒緑繞城試問春來觀秀色何如雨後聽寒聲昔人已寓煙霞外落日空含萬古情嘯猿亭𢎞治嵊縣志在東白山褚伯玉建天香亭王十朋天香亭記汝南周君汝能堯夫得爽塏於剡山之陽挾雙溪之勝有巖桂蒼然成林而亭乎其中真剡中絶景也星峯亭嵊縣志在星子峰上每逢重九邦人多登眺其上宋建宴休亭𢎞治紹興府志在新昌治元令完顔從忠建放鶴亭輿地紀勝在新昌縣沃州山沃州山西北有支遁嶺即支遁放鶴處愛山亭紹興府志在新昌盂塘山宋尚書黃度娛親之所自為記濯纓亭成化新昌縣志石城山有夾溪塘循塘而行有白鷴塢濯纓亭未詳所建新昌縣志朱文公建牧坡草亭萬厯新昌縣志在珠浦元吕不用建飛翼樓太平寰宇記按越城記六樓八門並四水門共十二門樓飛翼最高沈立越州圖序飛翼樓高十五丈范蠡所築以壓強吳也飛翼一作龍翼輿地紀勝今望海亭是其故址世號鼓吹樓唐庚登越王樓詩左綿城北長安道馬足翩翩人自老越王高樓藏道邊道上行人迷不到樓前西日墮江紅一見如逢鄰舍翁向來何處識面目應在杜陵詩句中新樓於越新編在使宅南白居易有和元微之新樓北園偶集詩李紳新樓詩戎容罷引旌旗卷朱戶褰開雉堞高山聳翠微連郡閣地臨滄海接靈鰲坐疑許宅驅雞犬笑類樊妻化羽毛惆悵桂枝零落促莫思方朔種仙桃北樓李紳有北樓櫻桃花詩望雲樓晏公類要在州東怪山上即句踐遊臺披雲樓寶慶會稽續志府廨有披雲望雲二樓俱唐時建齊唐披雲樓詩元和文物盛羣賢曾借蓬萊住列仙畫入簾櫳煙外寺鑑搖臺榭水中天滿桂樓杜鵑樓寶慶會稽續志在府廨俱唐建其迹已不可考李紳滿桂樓詩并序架樓城西南臨眺於外盡見湖山别開外扉通杜鵑樓不啓重扄清夜可以間宴因以滿桂為名也為憐湖水通宵望不學樊川却月樓惟待素規澄滿鏡莫看纖魄挂如鈎卷簾方影侵紅燭繞竹斜暉透碧流蕭瑟晚風聞木落此時何異洞庭秋又杜鵑樓詩并序七年冬所造自西軒延架城隅樓前植杜鵑因以為名杜鵑如火千房拆丹檻低看晚景中繁艷向人啼宿露落英飄砌怨春風早梅昔待佳人折好月誰將老子同惟有此花隨越鳥一聲啼處滿山紅和旨樓西溪叢語紹興臨街酒樓翟公遜為郡作西樓萬厯紹興府志舊記云在山陰縣西孫逖題山陰縣西樓詩都邑西樓芳樹間逶迤霽色繞江山山月夜從公署出江雲晚對訟庭還誰知春色朝朝好二月飛花滿江草一見湖邊楊柳風遙憶青青洛陽道望秦樓見趙抃和程給事會稽八咏修竹樓於越新編在會稽宋王英孫監簿所構對秦望山林德暘修竹樓詩秦望諸峯入几看仙居縹眇五雲端天高地逈三千界月白風清十二闌碧海氣侵珠珮濕明河影落玉簫寒超然身在鴻濛上何必蓬萊跨紫鸞高遷樓太平寰宇記蕭山縣有高遷樓吳志云孫䇿入都都人迎䇿於高遷聽潮樓客越志在蕭山縣望煙樓諸暨縣志在四十一都宋黃振每日登樓望村中有未舉炊者往送之糧鄉人德之因名舜江樓嘉靖餘姚縣志在縣署譙門之南瑞雲樓餘姚縣志在龍泉山北王文成所生之處艤雲樓紹興府志在嵊縣東曦門外下俯清流前對疊嶂宋嘉定八年令史安之建花光水色樓嵊縣志在金庭香爐峰之麓艤雪樓𢎞治紹興府志在嵊縣北明心寺東麓宋翰林學士高文虎建張氏藏書樓紹興府志在嵊縣西清化鄉元處士張鑰建黃溍題張氏藏書樓詩木杪出飛樓仙山在上頭可能無客至少為借書留藝草春仍長虹光夜不收何如試乘興一棹剡中舟來青樓於越新編在新昌縣東宋參軍吕嶸建紹興府志元末劉伯溫吕不用讀書於此蓬萊閣名勝志在州治設廳之後吳越錢王所建舊記云蓬萊山正偶會稽寶慶會稽續志蓬萊閣在設廳後臥龍山下章楶作蓬萊閣詩序云不知誰氏創始按閣乃吳越錢鏐所建楶偶不知爾淳熙元年其八世孫端禮重修乃特揭於梁間云定亂安國功臣鎮東鎮海兩軍節度使檢校太師侍中兼中書令食邑一萬戶實封六百戶越王鏐建其名以蓬萊者蓋因元微之詩而始得名也自元祐戊辰章楶修之又八十七年錢端禮再修又四十八年汪綱復修元稹以州宅夸於樂天詩州城回繞拂雲堆鏡水稽山滿眼來四面常時對屏障一家終日在樓臺星河似向簷前落鼓角驚從地底回我是玉皇香案吏謫居猶得住蓬萊張景修州宅蓬萊閣詩萬疊湖山煙水濵朱門畫戟間松筠登臨不踏紅塵路燕景長居紫府春晝靜欲驂風外駕夜寒疑是月中身我慚白首方懷紱猶得蓬萊作主人秦望閣寶慶會稽續志府廨常衙廳之上為秦望閣不知作於何時趙抃嘗有詩熙寧前已有之矣清涼閣寶慶會稽續志在府廨棣蕚堂下守洪邁重修改為招山閣𢎞治紹興府志閣後廊廡名雲近廊宋守趙彥倓建延桂閣於越新編在府署清思堂側宋守趙彥倓建競秀閣王十朋有州宅競秀閣詩曲水閣𢎞治紹興府志在府廨王十朋曲水閣詩王謝蘭亭久寂寥茂林修竹自蕭條蔣侯近代風流守曲水流觴意亦高注太守蔣堂建今為飛蓋堂稽山閣輿地紀勝在府治臥龍山東隅寶慶會稽續志有程大昌賦刻於梁間鎮東閣名勝志在府治左即舊子城之鎮東門萬厯紹興府志宋元以來名鎮東閣臨書閣嘉泰會稽志會稽縣雲門寺有永禪師臨書閣人來乞書戶限為穿用鐵裹之號鐵門限松風閣戴表元松風閣記山陰王德玉居州城之東隅因臺池之秀林丘之勝橫俯之以為閣而名之以松風高風閣嘉泰會稽志在餘姚縣廨令李祺壽建後吳興施宿知縣事重新之據祕圖山之麓前對南山為一邑佳處閣下為嚴公堂釣隱亭嚴光墓在其北也祕圖閣嘉靖餘姚縣志在祕圖山麓下瞰祕湖已乃改為翠竇亭中天閣紹興府志在餘姚龍泉山王陽明聚講處四山閣剡録縣治公廳相直有四山閣齊雲閣剡録在西白山南齊褚伯玉建凝香閣𢎞治紹興府志在新昌縣治元令完顔從忠建傳心閣成化新昌縣志在石溪義孰張南軒為銘朱文公跋議善閣嘉泰會稽志在新昌縣石待旦於萬卷堂傍又置議善閣占山水之勝越王臺萬厯紹興府志舊在種山東北今在臥龍山之西嘉定十五年汪綱因小茆亭基址為之為一郡登覽之勝曾耆年篆三大字刻於石名勝志蕭山西陵亦有越王臺李曰詩西陵拱越臺是也竇鞏南遊感興詩來遊欲問前朝事惟見江流去不回日暮東風春草緑鷓鴣飛上越王臺望月臺寶慶會稽續志府廨舊有望月臺汪綱建王十朋望月臺詩明珠遙吐臥龍頭漸覺清光萬里浮人望使君如望月要須如鏡莫如鉤虞舜巡狩臺述異記會稽山有虞舜巡狩臺望烏臺拾遺記越王入吳有丹烏夾王而飛故其霸也起望烏臺以表瑞紹興府志今溫泉鄉鏡湖旁山有望湖臺舊址陶朱公釣臺十道志在會稽縣南降仙臺會稽三賦注皇覽云宛委山上有巨石如臺號曰降仙臺苗龍仙人於此上升呼鷹臺於越新編在會稽石姥山相傳有異人登巗呼鷹即下拜郊臺諸暨縣志吳越武肅王建在大部義安二鄉界靈女臺嘉泰會稽志在諸暨縣東北𢎞治紹興府志在仙姑廟側倚杖臺會仙臺諸暨縣志在五泄山王𢎞之釣臺萬厯紹興府志在上虞蘭芎山上虞江有三石頭𢎞之垂釣於此任公子釣臺嘉泰會稽志新昌縣南巖世傳任公子釣魚之所一云在稽山門外齊顗題南巖南巖寺本滄海任公釣臺也今巖側尚有任公釣車石棺蛻骨存焉吹笙臺𢎞治紹興府志在嵊縣治宋建孔愈宅水經注侯山孤立長湖中晉車騎將軍孔敬康少時棲迹此山嘉泰會稽志孔愈封餘不亭侯為會稽三年營山陰湖南侯山下數畝地為宅山初無名以愈來居故名侯山今為小隱山園許詢宅輿地紀勝舊宅在山陰今為能仁寺新宅在永興太平寰宇紀會稽縣許君里在清風坊晉徵士許詢之故宅嘉泰會稽志詢父旻從元帝過江遷會稽內史因居焉詢隱居不仕東晉咸和六年捨山陰永興二宅為寺穆帝時名山陰舊宅曰祗園今為能仁寺永興新宅曰崇化縣西南四十里有慈雲寺縣西九十里有重興院皆詢嘗所居也郡國志云會稽山南有許君宅又許君里在會稽縣清風坊按皇甫冉詩云昔聞元度宅門對會稽峯者謂山陰宅也王勃山亭序云永興新郊許元度之風月者謂永興宅也王羲之别業嘉泰會稽志在山陰縣東北六里舊傳戒珠寺是也舊經云羲之别業有養鵝池洗硯池題扇橋存焉紹興府志在山陰者為右軍别業其宅則在嵊縣朱熹遊戒珠寺悼右軍故宅詩因山盛啓浮屠舍遺像仍留內史祠筆塜近應為塔塜墨池今已化蓮池書樓觀在人隨遠蘭渚亭存世幾移數紙黃庭誰不重退之猶笑博鵝時江彪宅太平寰宇記山陰郭北有江橋晉江彪居此嘉泰會稽志江揔傳云揔於會稽龍華寺製修心賦云晉護軍將軍彪昔蒞此邦卜居山陰都陽里寺域則宅之舊基左江右湖面山背壑東西連跨南北紆縈寢處風雲憑棲水月按晉書江彪傳永和中嘗為護軍將軍出補會稽內史當即彪也按江橋因彪而名今郡人乃以為江文通故居施肩吾宅𢎞治紹興府志在山陰陳堯佐過施肩吾故宅詩幽居正想餐霞客夜久月寒珠露滴千年獨鶴雨三聲飛下巖前一株柏嚴維宅嘉泰會稽志嚴長史維宅唐大厯中鄭槩裴冕等聨句賦詩與長史凡六人長史句云落木秦山近衡門鏡水通以詩考之可想見其處矣山陰縣志在縣北長史村又云在鑑湖皇甫冉秋夜宿嚴維宅詩昔聞元度宅門對會稽峯君住東湖下清風繼舊蹤秋深臨水月夜半隔山鐘世故多離别良宵詎可逢秦系宅於越新編秦隱君系所居在會稽若耶溪上秦系將移耶溪舊居留贈嚴維詩雞犬魚舟裏長謡任興行那邀落日醉已被逺山迎書笈將非重荷衣著甚輕謝安無箇事忽起為蒼生朱山人别業萬厯紹興府志在山陰縣南劉長卿送朱山人歸山陰别業詩越州初罷戰江上送歸橈南渡無來客西陵自落潮空城垂故柳舊業廢春苗閭里相逢夕鶯花其寂寥唐翊宅𢎞治紹興府志在府城新河坊翊宣和中鴻臚少卿陸遊宅山陰縣志宋寶謨閣待制陸遊所居在三山地名西村遊自著居室記於越新編三山在府城西九里鑑湖中與徐瓶鼎峙陸遊所居陸遊懷鏡湖故廬詩臨水依山偶占家數間茆屋半欹斜雲邊腰斧入秦望雨外舞簑歸若耶從宦只思乘下澤對人常悔讀南華病來更怯還鄉夢頻鬻簾泉試露芽謹按劍南詩集有以風月名小軒詩有漁隱堂獨坐詩有北園雜詠詩有新築龜堂詩有新葺東軒詩有小葺東園詩有晨起至參倚齋示子聿詩有南堂夜興詩有老學菴北作假山詩冇魯墟詩自注先太傅舊宅有道室詩自注豫道室以還嬰名之是皆宅中名也特拈出之全后宅名勝志會稽迎恩門外宋理宗母全后家也理宗童時育於母宅萬厯紹興府志山陰浴龍宫在迎恩門外虹橋理宗童時與弟與芮浴於河余天錫夢龍負舟即此地鄭𢎞宅水經注寒溪之北有鄭公泉漢太尉鄭𢎞宿居潭側太平寰宇記鄭𢎞所居在會稽縣若耶溪東陳囂宅嘉泰會稽志漢太中大夫陳囂宅在禮遜坊去會稽縣東二里初囂與紀伯為鄰伯竊囂藩地自益囂益徙地與之伯慚懼歸所侵地其中乃為大路鴻嘉二年太守周君刻石旌表號曰義里長簷路鍾離意宅嘉泰會稽志府城東會稽地有鍾離橋漢鍾離意仕至尚書僕射此其所居王獻之宅嘉泰會稽志在會稽縣南三十里晉義熙三年有五色祥雲見安帝詔建雲門寺何充宅嘉泰會稽志在會稽縣東南七十里充嘗為會稽內史居此今福慶寺乃其舊宅郭偉宅嘉泰會稽志晉驃騎大將軍郭偉宅在會稽縣東南大禹迹寺是也謝敷宅嘉泰會稽志在會稽五雲門外一里或云在雲門寺東唐僧靈一詩春山子敬宅古木謝敷家又宋考功雲門詩樵徑謝村北學井何巗東是也太平寰宇記餘姚縣南有四明山高峰軼雲連岫蔽日即謝敷居所何子平宅紹興府志在會稽東土鄉劉宋何子平仕為海虞令有孝行何允宅名勝志齊何允仕至中書令後棄官隱會稽若耶山雲門寺後以逼隘不容學徒遂遷秦望起學舍即林成園因巖為堵嘉泰會稽志衡陽王元簡守會稽時山發洪水漂拔樹木此室獨存元簡令鍾嶸作瑞室頌以旌美之江淹宅太平寰宇記在會稽縣招賢坊嘉泰會稽志宅在招賢坊又蕭山縣東北一百三十步有江淹故宅今為覺苑寺寺前有夢筆驛亦以文通得名按文通城中已有宅蕭山者殆别墅也謹按江淹故宅在山會者由江彪而訛也在蕭山者由江總而訛也但諸志相沿已久姑録之陶𢎞景宅於越新編會稽縣陶晏嶺陶𢎞景隱此賀知章宅嘉泰會稽志唐賀祕監宅在會稽縣東北三里八十步後以宅為千秋觀徐浩宅嘉泰會稽志在會稽縣五雲橋之東有遺址存溪山竒麗過者猶屬目焉張志和宅嘉泰會稽志元真子張志和隱居在郡之東郭唐大厯中觀察使陳少遊往見為終日留表其居曰元真坊以門隘為買地大其閎號曰回車巷車陽志志和本名龜齡金華人兄鶴齡亦有文學恐志和浪迹不返乃於會稽東郭買地結茅以居之一閉竹門十年不出方干宅𢎞治紹興府志會稽縣澄波坊方干所居華氏考古雄飛門巷雖改故池未湮名曰方干池齊唐宅會稽三賦注少微山在五雲門外職方員外郎齊唐所居寶慶會稽續志唐天聖八年進士致仕後家於鑑湖顧臨職方集序鑑湖東北有山巋然公親率箕畚栽培其上而闢其下為寢疏泉沼植花卉為圃與湖之西南會稽禹祠相望為山水竒偉之觀自名其山曰少微山趙宗萬宅嘉泰會稽志在會稽縣東南照水坊宗萬字伸淵祥符中被召不赴求為道士即其家賜羽衣以遂其志嘗有詩云斗懸金印心難動屏列春山眼暫開蓋自述也張復初宅萬厯蕭山縣志宋理宗敕建駙馬張復初宅號張家府范蠡宅於越新編在諸暨長山側今為翠峯寺吳處厚諸暨淨觀院碑陶朱公俗傳諸暨人今淨觀院其故居也鄉曰陶朱井曰鴟夷張蠙經范蠡舊居詩一變姓名離百越越城猶在范家無他人不見扁舟意却笑輕生泛五湖西施宅太平寰宇記諸暨縣巫里句踐得西施之所萬厯蕭山縣志縣南有苧蘿山屬苧蘿鄉山下有西施宅上有紅粉石于吉宅𢎞治紹興府志諸暨縣干溪吳方士于吉所居楊維楨宅名勝志諸暨縣烏芾山有鐵崖崖石如鐵元末楊亷夫世居於此因以鐵崖為號虞國宅嘉泰會稽志漢日南太守虞國宅按輿地志云餘姚縣西有嶼山山南有虞國宅國在日南愛及民物出有雙雁隨軒秩滿還家雁與偕至其宅今為百官倉黃昌宅𢎞治紹興府志漢大司農黃昌宅在餘姚黃橋南郗愔宅名勝志虞國别墅在餘姚羅壁山洛陽人云巖囿大勢具體金谷郗太尉愔遍遊諸境棲情此地後以司空臨郡遂卜宅居之虞翻宅嘉泰會稽志在餘姚縣靈緒山會稽記云昔虞翻嘗登此山望四郊誡子孫曰可留江北居後世祿位當過於我聲名不及爾然相繼代興居江南必不昌今諸虞氏由此悉居江北也賀循宅於越新編賀墅在雲樓鄉晉賀循所居岑全賀墅詩深村車馬驚鸞鶴散騎茆堂見杜蘭氷玉自甘山水味漫勞甲第賜長安虞世南宅宋元禧虞家城舊宅記餘姚梅川鄉有虞家城相傳為虞世南宅基按會稽記云虞國宅在嶼山南而世南宅基在梅川鄉人自其盛者傳之但知國宅不知永興嘗居是鄉耳王冕宅𢎞治紹興府志冕諸暨人隱餘姚九里山種梅千樹自題為梅花屋孟嘗宅嘉泰會稽志漢合浦太守孟嘗宅在上虞縣南有孟宅橋又縣東有還珠門取合浦還珠之義謝安宅嘉泰會稽志謝安本傳云安寓居會稽與王羲之及高陽許詢桑門支遁遊處相傳今上虞縣西南五十四里國慶寺乃太傅舊居山上有東西二眺亭寶慶會稽續志上虞東山文靖故居也絶頂有謝公調馬路白雲明月二堂遺址嘉泰會稽志東山因太傅而名者三一在臨安一在金陵非故居之東山也惟始寧東山乃其故居其證甚明世説王羲之與劉倓曰若安石東山志立當與天下共推之注引續晉陽秋曰安石家於會稽上虞縣優遊山林六七年間徵召不至雖彈奏相屬繼以禁錮晏然不屑也自咸康初辟召不起高臥厯年所以放情丘壑正在此山自東漢末析上虞之始寧鄉為始寧縣東晉有上虞始寧二邑陽秋所載得其實矣謝元宅水經注太康湖晉車騎將軍謝元田居所在右濵長江左傍連山平陵修通澄湖遠鏡於江曲起樓樓側悉是桐梓居民號為桐亭樓盡升眺之趣蘆人漁子泛濫滿焉湖中築路東出趣山路甚平直山有三精舍高甍凌雲垂簷帶空俯眺平煙杳然在下水陸寧晏足為避地之鄉矣嘉泰會稽志上虞江有琵琶圻臨江有石牀名釣魚臺為謝元所居之地田居當是舊居之訛孫綽宅孫綽遂初賦序經始東山建五畝之宅世説孫綽賦遂初築室畎川自言止足之分齋前種一株松柏手自壅治之葛洪宅水經序三石頭丹陽葛洪遁世居之基井存焉魏伯陽宅名勝志上虞縣南百樓山魏伯陽居之周元吉宅萬厯上虞縣志自金罍而南曰長者山宋周元吉所居嘗賑突不煙者鄉人德之因名戴逵宅嘉泰會稽志戴公舊居剡中郗超每聞欲高尚隱退者輒為辦百萬資并為造立居宇在剡為戴起宅甚精整戴始往舊居與所親晝曰近至剡如官舍事見世説𢎞治嵊縣志在剡源鄉有戴溪後徙桃源鄉其村多戴姓號戴村其遺氏也又孝節鄉有别業遺址其地稱逵溪王羲之宅剡録在金庭山其子孫世居金庭之側裴通王右軍故宅記越中山水竒麗剡為最剡中山水竒麗金庭洞天為最洞在縣東南循山趾右去得小香爐峯峯在洞天北門谷抱山圍雲重煙密花光照夜而常晝水色含空而無底真天下絶境也是以琅邪王羲之家於此山書樓墨沼舊制猶在至南齊道士禇伯玉於此山置金庭觀正當右軍之家書樓在觀之西北墨池在殿之東北處所遐深風景秀異即所謂赤城丹霞第六洞天者也通以元和二年三月與二三道友裹糧而遊登書樓臨墨池但見山水之異其險如崩其聳如騰其引如肱其多如朋不四三層而謂天可升再宿而還以書樓闕壞墨池荒毁語於邑宰王公微王氏子孫之在者理荒補闕使其不朽即題兹實録而已阮裕宅剡録裕居會稽剡山志存肥遁朱放宅剡録放隱於剡溪徵辟皆不就張嵊宅𢎞治嵊縣志在桃源鄉為梁侍中開府儀同三司諡忠貞張嵊遺址王緒宅𢎞治嵊縣志唐王緒居剡一曰王公别業皇甫冉送王緒還剡中别業詩不見閻山去何時到剡中已聞成竹木更道長兒童籬落雲常聚村墟水自通朝朝憶元度非是對清風袁稠宅𢎞治嵊縣志在剡溪李端寄袁稠詩花洞晚陰陰仙壇隔杏林潄泉春谷冷搗藥夜窗深石上開仙酌松間對玉琴戴家溪北住雪後去相尋吳處士宅𢎞治嵊縣志在溪嶼賈島憶吳處士詩半夜長安雨燈前越客吟孤舟行一月萬水與千岑島嶼夏雲起汀洲芳草深何當折松葉拂石剡溪陰阮肇宅寶慶會稽續志嵊縣南十里阮仙翁廟阮肇故宅也王十朋阮仙舊宅詩再入山中去煙霞鎖翠微故鄉遺宅在何日更來歸姚舜明宅𢎞治嵊縣志在永富鄉為宋太師開國男姚舜明遺址李易宅𢎞治嵊縣志在貴門里宋給事李易當宋末隱於剡中初寓獨秀山下有卜築詩王銍宅𢎞治嵊縣志在靈芝鄉銍忤賈似道去職居剡自號雪溪居士王銍自題幽居詩我家住在剡溪曲萬壑千巖看不足却笑當年訪戴人扁舟一夜去何速鳯林華氏考古在五雲門外世傳禹受圖籍時麟遊其庭鸞結其巢鳯凰鳴飛依於林木南林吳越春秋范蠡在越處女善劍隱於南林嘉泰會稽志南林在山陰縣南雁田晏公類要夏禹與諸侯樂於此聖人之化感於鳥獸故其地雁為田春披草根秋除其穗名勝志禹廟下有鳥田吳越春秋云天美禹德使百鳥還為民田是也采蓮田萬厯會稽縣志若耶山下有采蓮田都護門太平寰宇記在會稽縣南二里晉中將軍王恬為會稽內史成帝問曰與誰同行恬曰將弟薈偕帝欲見之薈未有官於時法白衣不得見天子因拜為都尉至郡别開此門出入時人貴之因以官為號名勝志督護門一作都督今失其處豈即都賜門耶雷門太平寰宇記句踐所立以吳有蛇門得雷而發以表事吳之意嘉泰會稽志雷門上有大鼓圓二丈八尺聲聞洛陽孫恩之亂軍人斫破有雙白鶴飛出雙闕山陰縣志在北門外闕外百步即雷門麋苑名勝志會稽縣白鹿山謂之鹿野按吳越春秋乃越之麋苑也防塢越絶書防塢越所以遏吳軍也朱室水經注句踐百里之封西至朱室嘉泰會稽志朱室今為朱室塢又謂在浙江西岸未詳古冶嘉泰會稽志在州東南越王鑄劍之所越大市萬厯紹興府志在郡城都亭橋秦漢時越人於此為市即薊子訓賣藥處筆倉輿地紀勝在會稽顯聖院有王子敬筆倉今一眢井陽明洞天嘉泰會稽志在會稽縣宛委山洞外飛來石下為禹穴傳云禹藏書處鏡湖一曲太平寰宇記唐元宗朝祕書監賀知章乞為道士還鄉敕賜鏡湖一曲嘉泰會稽志賀知章始求周宫湖數頃詔賜鏡湖郯川一曲耆舊謂今東城南望為賀家湖疑即剡川也其極目浩渺光景澄徹實東州佳觀云山陰縣志鏡湖中道士莊亦知章所居上虞賀墅亦嘗家焉其宅乃千秋觀此賜後所居也裘氏義門嘉泰會稽志平水雲門之間有裘氏自齊梁以來七百餘年無異㸑大中祥符四年用奏旌表門閭所謂旌表門閭者唐以來有聽事步闌前列屏樹烏頭正門閥閲一丈二尺烏頭二柱端冒以瓦桶築雙闕一丈在烏頭門之南夾植槐柳左右築臺高一丈二尺圬以白而赤其四角今裘氏用此制自平水適雲門者皆得望其旌表書巢𢎞治紹興府志宋陸遊藏書處遊自為記劍南詩稿有書巢五詠紹興府志按嘉泰志云越藏書有三家曰左丞陸氏尚書石氏進士諸葛氏中興祕府始建嘗於陸氏親傳其書而諸葛氏在紹興初頗有獻焉可知所蓄之富矣陸氏書特全於放翁家其編目甚巨諸葛氏以其書入四明子孫猶能保之石氏當尚書時嘗纂集前代古器為圖記亦無一不具其後頗弗克守而從子大理正邦哲盡求得之於是為博古堂博古之所有衆矣三家圖籍其二氏嘗更廢遷而至今最盛者惟陸氏耳五雲梅舍於越新編在府城內會稽地林景熙五雲梅舍記去越城東南三十里曰五雲村王自晉為江左著氏淳祐景定間仕為顯官今臥龍府治之西是其故第會陵谷變遷始各治别弟於東南隅誥院梅山君即其居纍土為山種梅百本復為堂而扁之曰五雲書舍梅花易洞徐一夔梅花易洞記山陰胡龍臣居越王山下植梅數百株因名其處八仙家寶慶會稽續志在會稽縣五雲門外地名白塔嵇叔夜過越宿傳舍遇古伶官之魄而得廣陵散鳯凰窠會稽縣志在義峯山下旁有上凰下鳯村松花壇𢎞治紹興府志在雲門唐大厯中嚴維吕渭茶宴於此聨句有歲歲松花下今來草色平之句青藤書屋山陰縣志明徐渭文長之居古藤尚存范蠡壇於越新編在諸暨縣南九里珠林諸暨縣志在五泄山讀書墩名勝志餘姚縣栲栳溪傍有讀書墩宋莫子純元岑安卿皆隱居於此粟里會稽三賦注上虞有粟里舜時供儲於此石壁精舍嘉泰會稽志上虞石壁山南對小山方正如樓世號鼓吹樓謝靈運石壁精舍還湖中詩昏旦變氣候山水含清暉清暉能娛人遊子憺忘歸出谷日尚早入舟陽已微林壑斂暝色雲霞收夕霏芰荷迭映蔚蒲稗相因依披拂趨南徑愈恱掩東扉慮淡物自輕意愜理無違寄言攝生客試用此道推顧墅嘉泰會稽志上虞縣顧墅杜京産與同郡顧歡在東山開舍授學世傳顧歡家墅在此一作故墅劉氏義門嘉泰會稽志熙寧十年趙清獻為守得上虞劉承詔十世聚族聞於朝旌表門閭獨孤處士山居釋棲白有寄獨孤處士山居詩見嵊縣志支道林放馬所嘉泰會稽志在新昌縣東有放馬澗道林隱居於此水竹所成化新昌縣志在平壺之桂山宋陳雷所營有緣就堂貯翠樓禹石船太平寰宇記塗山有石船長一丈云禹所乘者禹廟梅梁晏公類要梁時修禹廟欠一梁木忽有風雨浮一木至乃梅梁也名勝志梁乃鄞縣大梅山梅木張僧繇畫龍於上後飛入鏡湖與龍鬬乃以鐵索鎖於柱秦皇酒甕會稽三賦注在照湖東巨石狀如酒甕時人謂之秦皇酒甕石名勝志在會稽縣射的山之趾有三石品峙形如甕御史牀輿地紀勝在州東四里虞翻為長沙桓王所禮特設此牀以表賢客于闐鐘竇庠于闐鐘歌注鐘在越靈嘉寺從天竺飛來紹興府志靈嘉寺鐘按越中記此鐘本于闐國寺鐘因風雨失鐘所在有天竺僧過于闐識此鐘於越靈嘉寺至今鎖在寺樓龍松𢎞治紹興府志府城雲門淳化寺西廡有葛仙丹井有松如龍偃覆井上松花石山陰縣志馬自然古迹高四五尺大一圍松木所化今在會元董玘宅中畫水壁輿地紀勝蕭山覺苑寺後壁有胡舜臣畫水畫髓元詮舜臣與張著俱學郭熙山水宋宣和畫院待詔翠峰寺墨竹諸暨縣志翠峰寺殿後墨竹宋劉叔懷所畫九枝樟萬厯上虞縣志在崔公祠一本九枝五代時物浙江通志卷四十五
