body:
  text: 浙江通志卷一百三十選舉八明薦辟續文獻通考洪武初詔各府州縣薦舉賢良方正及山林巖穴隠逸之士并通曉經書儒士秀才孝亷俱各訪求到官審無過犯違碍不拘名數差人送部聽用明㑹典洪武六年詔罷科舉専用辟薦其目有經明行修有懷才抱徳有賢良方正有人才有孝亷鄉舉於朝而各省貢士皆卒業太學以次除用十三年又詔舉聰明正直孝弟力田文學術數之士續文獻通考洪武十三年十一月詔徴天下明經老儒達於治體可備顧問遣使召至量才錄用十七年令各省布政司直𨽻府州縣舉秀才人材必由鄉舉里選知府州縣等官㑹同境内耆宿長者訪才徳聲名著於鄉里之人先從隣里保舉有司再驗言貌書判方許進呈若不行公同精選者坐以重罪十九年七月詔舉經明行修練達時務之士年七十以上者郡縣禮送京師聽用續文獻通考永樂元年勅内外諸司文職官貟各舉所知或堪重任而沉滯下僚或可剸繁而優㳺散地或抱道懷才𨼆居田里無問逺近並舉以聞洪熙元年詔民間有行已亷正才堪撫字者許見任官具實舉薦宣徳七年詔各省有文學才行出衆之士自二十五歳以上令所在有司保舉赴京選用正統十四年詔各省舉到儒士照永樂年間事例送翰林院嚴加考試選用景泰三年詔各省果有才行卓越文學優長者許在内四品以上官貟在外廵撫廵按方面指陳實跡薦舉赴京天順元年詔處士中有學貫天人才堪經濟𨼆居髙蹈不求聞達者所司具實奏聞𢎞治十年詔府州縣正官保舉山林𨼆逸之士懷才抱徳經明行修衆所推服者許廵撫及布按二司官覈實奏送吏部量才擢用隆慶三年詔舉人中如有孝友睦婣名實相孚不分己未坐監許撫按官㑹薦遇有兩京博士之缺酌量推用姚璋錢塘人舉經明行修蔣琳錢塘人舉人才右通政姚寅錢塘人舉經明行修王輅錢塘人舉賢良方正瞿祐錢塘人舉人才周府右長史梁大舉錢塘人舉人才王謙錢塘人舉人才髙徳暘錢塘人舉文學宗人府經歴吳登錢塘人舉人才周子良錢塘人舉人才兵部郎中張存誠仁和人舉經明行修南鄭知縣胡山仁和人舉經明行修凌誥仁和人舉經明行修蔣實仁和人舉經明行修蔣暉仁和人辟授中書舎人陳璇仁和人舉賢良方正陳信仁和人舉人才蘇州府通判杜衡仁和人舉文學錢塘訓導朱祚海寜人舉秀才翰林修撰蘇平海寜人舉賢良方正朱禋海寜人舉懷才抱徳中書舍人胡奎海寜人舉人才教授陳景𢎞海寜人舉儒士辰州通判夏子謙海寜人舉吏才大理評事姚𢎞道富陽人舉孝亷刑部貟外郎姚肇富陽人舉孝亷李伯誠富陽人舉人才滕縣知縣陳希程富陽人舉人才蠡縣知縣陸士真富陽人舉人才大庾知縣馮以清富陽人舉人才成都知事盛可宗富陽人舉人才泗州訓導馬訓章富陽人舉儒士萬州知州陳宗理餘杭人舉經明行修餘杭訓導鄒濟餘杭人舉經明行修少詹事孫暲餘杭人舉賢良方正山東左叅政駱榮臨安人舉孝廉登州知府沈立臨安人舉茂才漢陽主簿趙承宣臨安人舉茂才崇徳州同知徐夢吉於潛人舉茂才傳貽書院山長袁時泰新城人舉經明行修徐子方新城人舉經明行修仙居敎諭袁播新城人舉經明行修項城訓導沃禮新城人舉經明行修桃源知縣蔣佳新城人舉經明行修郴州訓導錢敬新城人舉人才施州知事袁時億新城人舉經明行修吳江教諭張新城人舉秀才倉大使陳贄昌化人舉明經許得祥昌化人舉人才順昌知縣陳忠昌化人舉人才應天推官戴子忠昌化人舉人才順徳知縣戴仁昌化人舉人才順徳知縣楊任嘉興人舉人才袁州知州沈景文嘉興人舉賢良運同薛宗永嘉興人舉孝亷御史張景賢嘉興人辟授知縣金大節海鹽人舉耆老知府王文杰海鹽人舉賢良方正知縣常士昌海鹽人舉賢良方正知縣周徳成海鹽人舉秀才主簿沈繼宗海鹽人舉明經國子學正朱彦華海鹽人舉人才知府李孟濬海鹽人舉經明行修訓導朱𢎞道崇徳人舉明經御史程本立崇徳人舉明經僉都御史鮑恂崇徳人舉明經文華殿大學士沈宣崇徳人辟授僉事殷近仁平湖人舉孝悌力田平遙知縣張羽烏程人舉明經太常寺丞陳援烏程人舉明經大理寺丞朱允㳟烏程人舉老人監察御史俞觀烏程人舉楷書知府陳實烏程人舉明經主簿張溥烏程人舉人才文華殿大學士黃原質烏程人舉明經教諭黃野得烏程人舉明經訓導施惟中烏程人舉楷書布政丁景福烏程人舉人才布政黃原英烏程人舉明經叅政鄭貞烏程人舉人才知府張賢烏程人舉人才知府沈撝烏程人舉楷書知府鮑麟烏程人辟授尚寶丞錢公輔烏程人舉楷書斷事徐仲禮烏程人舉人才評事黃武烏程人舉儒士知府凌安然歸安人舉楷書薦歴吏科都給事中潘長夀長興人舉人才僉都御史曹孔章長興人舉人才教授陳引長興人辟授教授潘宗儒長興人辟授訓導蔣毅長興人辟授侍郎范鑄長興人辟授知州楊鞏徳清人舉賢良方正知縣陳廷佐徳清人舉賢良方正知府駱仲英武康人舉人才同知莫原亨武康人舉人才知縣方鐸武康人舉人才同知施誠武康人舉人才知縣黃文博武康人舉人才推官陳咨武康人舉人才郎中陳鳳安吉人舉明經主簿俞詮安吉人舉耆儒徴為文華殿大學士固辭放還俞克容安吉人舉明經通判朱本安吉人舉明經學録郎子真安吉人舉人才知府郎子林安吉人舉人才知縣郎汝丹安吉人舉人才叅議萬宇安吉人舉人才知府朱倫安吉人舉人才知州吳普延安吉人舉人才州判吳公瑾安吉人舉人才同知諸雲安吉人舉人才知府吳俊安吉人舉人才知府范俊安吉人舉人才蔣伯髙安吉人舉孝弟力田知縣路坦安吉人舉孝弟力田巡檢朱禮安吉人舉孝弟力田塲大使俞謙安吉人