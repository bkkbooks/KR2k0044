body:
  text: 浙江通志卷九十九風俗上記曰移風易俗天下皆寧是風俗之有待於移易由來尚矣兩浙水土風氣不齊故民俗淳漓不一聖朝六宇同風家不殊俗而厚生正德教養兼施浙民之感孚尤為淪肌浹髓是以民日遷善而不知道德以一風俗以同觀於浙而知王道之成也志風俗浙江全省周禮職方氏東南曰揚州其民二男五女其畜宜鳥獸具穀宜稻吳越春秋水行山處以船為車以楫為馬漢書地理志吳越之君皆尚勇故其民好用劍左思吳都賦士有陷堅之鋭俗有節概之風隋書地理志江南之俗火耕水耨食魚與稻以漁獵為業信鬼神好淫祀君子尚禮庸庶敦龎宋史地理志人性柔慧尚浮屠之教厚於滋味善進取急圖利而竒技之巧出焉葛澧錢塘賦歌唐誦虞詠仁蹈德長者皆不厭不倦幼者亦克岐克嶷升降以齒人遵長幼之序漸摩有素俗安禮義之守學古者不知力農之勞通鬻者不知竒巧之法熙熙陶陶含哺鼓腹沐浴皇靈優遊化國咸淳臨安志有車船橇檋之迹故其人至今忠以勤有苗山封爵功德之會故其人至今勸於為善有犀貝橘柚之貢故其人至今知尊君而愛親志雅堂雜鈔兩浙上直天市垣故市易浩瀚周起莘雷琴記兩浙人文區藪浙以西之文華而靡浙以東之文清以淑舊浙江通志浙東多山故剛徑而鄰於亢浙西近澤故文秀而失之靡杭州府錢塘縣附郭仁和縣附郭後漢書張霸傳郡中爭厲志節習經者以千數道路但聞絃誦之聲隋書地理志川澤沃衍有海陸之饒珍異所聚故商賈並湊歐陽修有美堂記其民富足安樂其習俗工巧邑屋華麗蘇軾上執政書三吳風俗自古浮薄而錢塘為甚雖室宇華好被服粲然而家無宿舂之儲蘇軾表忠觀碑其民老死不識兵革四時嬉遊歌鼓之聲相聞朝補之七述杭俗尚工巧家夸人鬬窮麗殫好八方之民車湊舟會角富而衍寶秦觀雪齋記其俗工巧羞質朴而尚浮華且事佛為最勤葛澧錢塘賦俗享再稔之利婦蠶八育之綿夢粱録杭州湖光山色之秀鍾為人物所以清竒特傑為天下冠方輿勝覽市列珠璣户盈羅綺湖山信美於他邦獄訟亦煩於諸郡武林舊事制度禮文倣佛東京之盛戴表元學古堂記三吳之州莫大於杭其地山穠水妍其人機慧疏秀而清明其俗通商美宦安娛樂而多馳驅萬厯杭州府志省城士夫多愛惜名檢不敢以貴勢凌人鄉人以事爭競來質者多閉門謝之無敢武斷凡置買田宅皆平價貿易若度越疆界公行占據者輒為清議所擯山澤舟航之利世業在人不忍攘之以自封殖蓋雖無公儀拔葵風度而自放於禮法之外者鮮矣至於大夫守令有愷悌宜民者同聲頌之無異詞其執持公道崇尚清議為列郡稱首庶民雖日覲上官威儀至以獄訟造庭者蒲伏不敢出氣其馴良畏法如此萬厯杭州府志鄉先達有于肅愍之戮力王室不顧私家故其民尚竒節而恥言勢利有胡端敏之慷慨致身見形察影故其民長慮却顧而務抉幽微有王僉憲琦之清介絶俗故其民知廉潔而好義有項郎中麒之力卻餽遺故其民多檢飭而惡貪近世如江大參玭之世篤忠貞惠憲副隆之杜門掃軌張少參銓之不昵貴幸翁太守相之靜退自甘許右史應元之內外修潔髙文端儀之正色立朝江學憲圻之純孝清修此數君子者大則成功於再造次則義烈於鄉邦次則行修於一已斯皆足以激厲士心敦厚風俗為杭之表式彬彬盛矣徐一夔告鄉賢文兹邦以德行文學事功風節顯者代不乏人錢塘縣志婦女雖喜華服飾而閭閻之習尚勤率作每日絡絲褙紙及針紉履襪之類日可入錢糊口仁和縣志地無曠土田無不耕海寧縣胡珵儒學記鹽官地並海民逐魚鹽為生列肆負販自張九成師弟以儒學顯一時三年之間磊落相望陳昱鹽官縣廳壁記耕桑之地足以衣食魚鹽之利足以資給劉基送張知縣序大民儒儒小民愈愈朝出暮歸謳歌滿塗張安茂儒學記鹽官地濱東海蓋僻壤云然人文之盛甲於四方邑之隸武林者九弗能尚也海寧縣志風俗簡儉農耕婦織家給人足俗尚敦慤鮮有遊惰其民操牢盆者輸鹽租治桑麻者任土貢富陽縣楊維楨曹侯惠政碑富陽無沃土美壤以當大府之需故民勞而貧俗訐而澆宣德富陽縣志富春雖濱江居民不以魚鹽為業男力耕耨女勤蠶織田野朴厚士習禮讓慕髙逸亦專科舉之習有弦誦之風焉杭州府志業詩書者崇氣節居畎畝者敦朴素富陽縣志邑人率造紙為業老小勤作晝夜不休村落多種桕樹參差成行採子為膏以應造燭之用餘杭縣劉希賢潛公井記尊愛長吏有兩都餘風徐一夔縣學記餘杭山水之邑其民多秀而知學嘉靖餘杭縣志早作晏休開闢種藝務盡地利之所有男務耕作女勤織紝尤善御蠶閭閻童稚皆知服業百工技藝舊皆外郡之人今多出本邑嘉靖餘杭縣志俗近還淳富室子弟循循雅飭崇朴素而去浮華遠詐偽而近禮義差役樂於趨事士大夫皆崇尚名節昏嫁喪葬一從簡約餘杭縣志山水清佳風氣朴茂孝弟力田有太古之遺臨安縣孫覿縣學記居大山谷中桑麻絲枲之富自足而無貧民徐一夔縣學記風俗淳固其人素知詩書黃汝亨縣志序其俗簡朴而勤嘉靖臨安縣志民尚朴素爭訟寡少士知學問禮義漸興男務耕桑女勤蠶織疾病多信巫鬼喪葬多尚佛老臨安縣志俗重遷徙數十世不忍析居故著姓較他邑獨蕃山多田少鮮巨富祇竭力農桑以給公輸乏珍産無竒技淫巧婦女繅絲北工於南商賈貿茶南多於北於潛縣邵文炳衮繡堂記俗儉而質民徑而武難服而易化愛敬而不忘於潛縣志男務耕桑女務紡織治生之勤踰天下山多田狹賦稅不及省會大縣十一朴魯尚質務本寡訟篤信巫鬼喪葬多用佛老新城縣方亷縣志序新城為縣僻處山間地瘠而産薄俗嗇而用儉敦厚朴茂之風未始或泯山居野處不競紛華男耕女織不習浮曠君子以儉小人以嗇萬厯杭州府志訟簡民安閭閻之樂可想見也新城縣志草萊盡闢機杼聲聞有淳厚之風士民冠服布素禮汰繁文仕則廉謹持法不茍徇榮祿昌化縣陳居仁縣學記僻在巖谷務本力田教明俗化俊秀輩出衣冠相望錢鉞譙樓記民朴以茂恆事耕作樵採以自食其力少爭鬬訟訐萬厯杭州府志刀耕火種力殫於山災畬刈穫力盡於地楮漆薪炭貨殖於商勤生嗇用視棄一錢如拱璧家延經師爭自磨淬章縫之盛倍於往昔民有疾輒巫禱故知醫者少昌化縣志環山而處敦土為安俗尚淳龎多至性杭州府志冠禮男子年十六筮吉日選賓僎告諸家廟三加訓戒女子于歸日母為之加笄重昏媾也昏禮士大夫家以門第相尚謀諸媒氏通東問名佐以簪珥綵幣謂之傳紅彼此持帖往還又謂之拜望次行納采咸尚豐美又次納徵復以羊酒東餌相餽謂之加笄婚期尚行親迎古禮間用綵轎華燈鼓吹前導迎至中堂壻婦行交拜禮合巹後盛服出拜翁姑次及尊長至閭巷細民多從簡約喪禮始卒男免女髽分訃受唁親朋多致賻奠猶存古意七日一祭好作佛事葬時靈輀前陳列方相銘旌導以鼓吹仙梵墓所親友軌紼畢集合窆始歸閲三日展祭新阡謂之覆墓祭重生辰諱日牲牷酒醴備極豐潔清明各携殽核香燭親詣封瑩展拜酹酒焚楮十月掃墓亦如之立夏祭先薦陳時物較他府為獨重至歲時伏臘或祭於家或祭宗祠豐儉不一皆藉是以展追遠之敬也夢粱録元旦士大夫交相賀細民男女亦鮮衣往來拜節遊玩琳宫梵宇竟日不絶西湖遊覽志正月朔為椒柏酒以待親戚鄰里以春餅為上供爇粟炭於堂中謂之旺相貼青龍於左壁謂之行春插芝麻梗於簷頭謂之節節髙簽柏枝於柿餅以大橘承之謂之百事大吉自此少年遊冶翩翩徵逐至十八日收燈然後學子攻書工人返肆農商各執其業杭州府志元宵前後五夜張燈通衢委巷懸額綴綵皆以錦縀綵繡為之如入萬花谷中終夕鼓吹不絶鄉村婦女於十五夜召厠姑以卜一歲吉凶并蠶田豐歉夢粱録二月朔中和節民間以青囊盛百穀瓜果子種互相遺送為獻生子花朝都人往錢塘門外至玉壺古栁林雲洞嘉會門外包家山張太尉園玩賞竒花異木包山桃開如錦障極可愛杭州府志二月花朝以往士女爭先出郊謂之探春畫舫輕舟櫛比鱗集先南屏次放生池湖心亭嶽王墳盧舍菴後入西陵橋放鶴亭比來臯亭山劉墳村每當春日桃花盛放一望如錦遊人多問津焉武林舊事清明人家上冢南北兩山間車馬紛然而野祭者尤多如大昭慶九曲等處婦人淡粧素衣提携兒女酒壺殽核村店山家分餕遊息至暮則花栁土宜隨車而歸錢塘縣志上已出遊西湖士女皆帶薺花海寧縣志四月立夏日以諸果品雜置茗碗親鄰彼此餽送名曰七家茶西湖遊覽志四月八日俗傳為釋迦佛生辰僧尼各建龍華會以小盆坐銅佛浸以糖水覆以花亭鐃鼓迎往富家以小杓澆佛提唱偈誦布施財物昌化縣志四月八日寺僧以棟葉染米作烏飯供佛或分送檀越夢粱録端午日家買桃栁葵榴蒲艾并市茭糭五色水團時果五色瘟紙當門供養佩赤靈符采百草製藥以辟邪杭州府志端午祀神享先畢各至河干湖上以觀競渡龍舟多至數十艘岸上人如蟻近日半山龍舟爭盛俱於朔日奔赴遊人雜沓不減湖中西湖遊覽志七夕市中以土木雕塑孩兒衣以綵服號為摩㬋羅夢粱録七夕女郎望月曕斗列拜次乞巧於牛女或取小蜘蛛以金銀盒盛之次早觀其網絲圓正名曰得巧中秋登樓臨軒酌酒髙歌為竟夕歡元和郡縣志江濤常以月十日二十五日最小三日十八日極大每年八月十八日數百里士女共觀舟人漁子泝濤觸浪謂之弄潮西湖遊覽志九日以蘇子微漬梅滷雜和蔗霜梨橙玉榴小顆名曰春蘭秋菊夢粱録九日以五色粉塑成獅蠻以小綵旗簇之以熟栗為細末入麝香糖蜜和之貰酒玩菊以應節序武林舊事十月杭人競售錦裝新厯門神桃符鍾馗狻猊虎頭及金縷綵花春帖幡勝之類為市甚盛夢粱録十月朔士庶出郊掃墓冬至歲節士庶所重餽遺儀文及舉杯相慶祭告宗禋加於常節除夜換桃符門神鍾馗祭祀宗祖夜則迎神備香花供物圍爐團坐謂之守歲嘉興府嘉興縣附郭秀水縣附郭葛邲貢院記得江山之助其人秀而文方輿勝覽土膏沃饒風俗淳秀文賢人物之盛前後相望百工技藝與蘇杭等至元嘉禾志罕習軍旅尤慕文儒不憂凍餒頗勤農務楊維楨聚桂軒記秀在宋為文物之邦至今士多興於學處廛者亦類皆鴻生碩彥𢎞治嘉興府志嘉禾之俗終歲勤動餉給於國而尺寸之土必耕衣被他郡而機杼之聲不絶士人好文而崇學衣冠文物煥然可觀萬厯嘉興府志春秋時檇李當吳越之交自越王甲粢乙黍丙菽丁粟非夫人之織不衣而農桑重吳王鑄山煮海而鹽鐵重務本節用寖以富強萬厯嘉興府志聲名文物冠裳濟濟逡巡揖讓無少惰容秉禮之家不踰矩矱蕭子鵬思樂堂記章甫縫掖之士誾誾秩秩李貞開煙雨樓賦城郭森羅市廛錯列髙門納駟甲第連雲紅粟流衍禮樂孔殷蔣靜黃田港閘記富商大賈長筏巨舶夷蠙海錯魚鹽米布之屬輻輳城市居民富饒市邑繁盛李日華秀水百詠序賦稅日增生齒日盛才傑輩出為時名卿第宅宫廬不讓兩京陸無險巇樹藝得食其膏水無衝激艅艎得以走集黃洪憲縣志序邑人士多饒秀􅈺文章接黻傳圭辨冕吳越秀水縣志秀邑人士斤斤自好以孝弟力田為本務嘉善縣錢福水利成功碑記嘉善膏腴之壤平鋪如席無髙山大澤賦稅户田最為繁盛𢎞治嘉興府志士慕文儒沃土腴壤民不勸而耕樂從乎上視他邑固易易也然而信巫鬼崇異教豈舊習未革歟胡潔表賢録序邑之俊造皆師古好學其民淳朴易治章士雅縣志序人文鬱勃風氣淳龎土沃而民饒莫大勳儒學序魏塘忠孝節義甲於嘉禾理學科名聲髙東國麟麟炳炳自昔攸聞謂非教育涵養者深歟姚𢎞謨築城碑記樂田畝重興作海鹽縣李正民儒學記海鹽地形髙仰潮汐之至非有山谷隄防而人居以安其土黃壤其井泉甘魚鹽之利既溥又溝洫之水不可瀦畜故民皆服田力穡利於早熟市廛編户家給人足喜教子弟以詩書士大夫之裔亦各世守其業地既斗絶一隅舟楫人迹罕至無竒貨異産動其耳目故能安習而不遷李棐小學記里巷間絃誦之聲相接許氏貽謀男勝耕悉課農圃女勝機悉課蠶織𢎞治嘉興府志海鹽素習魚鹽之利俗朴而好文儉而知義安土而不樂商賈士大夫喪葬率用古禮閭閻多化之海鹽縣志鹽邑斥鹵民率煮海為鹽田圃之間所産者禾麥麻枲而已其他多資之旁邑易之商旅石門縣沈括儒學記稻蟹之利轉徙數州朱德潤鄉賢祠記士美民秀夙稱多賢貝瓊西郭生傳俗質而尚文陳履縣志序崇故良邑以易治稱陳允堅學田記禦兒故稱饒庶石門縣志石邑接壤杭湖士大夫尚文學習禮義然射利近華信鬼重巫習未盡革也至重桑麻勤稼穡民多淳朴平湖縣𢎞治嘉興府志平湖多秀民天性巧慧重文學尚氣節其居田野者夫耕婦織最為勤苦然信巫鬼重淫祀習奢侈挾智鬬訟者往往有之年來文教漸盛而風俗亦漸移易矣朱維熊義學碑記湖邑大海回環生其地者多鍾九峰三泖之秀以故名臣輩出科名甲七邑平湖縣志邑既僻處東偏工作無他技巧枲多於桑布浮於帛士大夫家勤女工猶什之七平湖縣志其境僻無叢姦其習朴無窳貨其去鄉重其射利愜故男不逋畝女不下機桐鄉縣至元嘉禾志兼并好勝挾持善鬬楚越之舊染莫光朝青鎮徙役記青鎮介湖秀之間水陸輻輳生齒日繁富家大姓甲於浙右𢎞治嘉興府志俗務農而習朴髙原樹桑麻下隰種禾麥尺寸無曠者桐鄉縣志桐處古吳越之泰伯遜讓之遺風夏禹勤儉之遺習漸漬既久兼而有之至元嘉禾志冠禮男子十六始冠亦有昏而冠者女子于歸乃筓聚族張筵凡冠筓皆炊大糕餽遺親里始諱其名而字之昏禮納采納徵委禽親迎多遵古道喪禮始卒以六輪經辨生肖所忌曰批書男免女髽斂用綿及帛斂畢設銘旌賔始弔每七作佛事七七謝孝衰服拜其門葬日姻友至墓所餞祭具方相器銘旌梵音交雜流響葬後三日子孫至墓所曰覆墓萬厯嘉興府志元旦整衣冠焚香拜天地祀宗祖男女聚拜飲椒柏酒親朋互相投刺曰賀節人日女子上綵勝於祖父母元夕前鄉人束芻於木末燎以祈年曰燒田蠶城中揭燈於竿鼓吹遊行曰迎燈清明挂紙錢於墓立夏以百草芽揉粉為餅相餽遺端午艾旗蒲劒懸於門飲菖歜酒七夕瓜果雜陳曰乞巧八月望以百果為大餅名月餅以百果和糖名俸糖賞月達曙九日造栗糕插菊花十月朔祀祖先掃墓冬至合祀宗祠臘月鄉人以朱墨塗面跳舞於市行古儺禮除夕易門神桃符寫春帖井磑俱封爆竹燔柴設酒殽聚飲鑼鼓徹夜謂之守歲海鹽縣圖經元宵先結錦綺為竹棚夜放火樹縱遊人觀燈遠近百里畢集桐鄉縣志三月三日農家婦女出避於外曰避青晚食螺螄曰挑青嘉興縣志八月朔食鰻魚八月二十四日藁生日除夕燔柴於門外曰燒火爐嘉善縣志孟冬朔日食米團曰開爐節海鹽縣圖經除夕家置炒豆米元旦且食且祈曰湊投湊投湖州府烏程縣附郭歸安縣附郭杜氏通典永嘉之後衣冠萃止文藝儒術斯之為盛雖閭閻賤品處力役之際吟咏不輟蓋因顔謝徐鮑之風扇焉蘇軾墨妙亭記吳興民足魚稻菱蒲之利寡求而不爭張方平府學記吳興山水發秀人文自江左而後清流美士餘風遺韻相續王十朋湖州謁廟文湖學之盛東南鮮倫風似鄒魯民同蜀閩李直方白蘋亭記其人壽其風信實張世昌崇順菴記由吳興而東皆平川沃野其俗敦龎勤儉故治業易滋養生送終得以盡心而無憾有古之遺風焉程郇新復青塘隄岸記民淳俗厚政化易施李心傳南林報國寺記烏程之南林耕桑之富甲於浙右土潤而物豐民信而俗阜行商坐賈之所萃趙孟俯吳興賦家有詩書之聲户習廉恥之道商輅湖州府學記土田膏腴居室庶饒學校人才之盛稱於厯代楊慎跋峴山圖地則粳稻交疇里實桑榆蔭道趙時春送張湖州序地腴而民質傭租易給王稚登喜留亭記其産多蠶桑竹木魚稻果蓏之利俗號殷富茅瑞徵吳興掌故序吳興風俗最近古朴其土人雅稱率素濶達而峭直其里閈力本務穡惟斤斤以勤儉長子孫無敢傲康以墮先業西吳枝乘湖民力本射利計無不悉尺寸之隄必樹之桑環堵之隙必課以蔬富者田連阡陌桑麻萬頃而别墅山莊求竹木之勝無有也吳興掌故會集止以契濶慶弔不為戲遊飲謔陸博棊奕鮮所藏設范應期縣學記炳靈發祥代鍾名哲詩書弦誦等於齊魯巍科膴仕甲於旁邑烏程縣志俗朴風恬恂恂儒雅婚姻論財雖士大夫不免衣服飲食向多野朴布衣之外間以綢絹不尚綺飾上十區之民多貧下十三區之民稍富田之厚薄分而所入亦殊焉歸安縣志儀雅而周以巽語剽而輕以浮歸安縣志東鄉業織南鄉業桑菱蓄魚西鄉業薪竹北鄉業蔬靛長興縣史巖之進士題名碑吳興士風之盛甲於浙西而長城視旁邑為尤盛士由科第奮興肩背相望劉燾進士題名碑記水逶迤而清深山連屬而秀拔人才之生是以似之楊維楨韓侯去思碑地臨奧區農多艱食其土俗浮呰好盤遊喜氣勢競訐訟熊明遇箬溪書院記天目苕水之間鄒魯之風在焉長興縣志山水雄壯故人多尚氣士習較郡中差為淳朴德清縣蔡汝楠贈郝令序德清本山水之邑山鄉多樵蘇泉壑之利處水鄉者引水灌溉輒成腴田其民饒樂久遠金明時熊侯去思碑記邑介山澤之間俗瘠而役煩許孚遠縣學記德清山川清麗民俗淳簡為之士者有敦朴謹願之風焉德清縣志冠婚喪祭悉敦禮讓議姻則嚴氏族舉葬則急塋兆故立葬社以周貧行多婚於凶歲皆事之近古者武康縣桂華鄉賢祠記武康邑小地偏不邇商賈貨利故其民性願而近道習淳而敏於為善武康縣志務農桑而無曠土樂敦朴而無頑民所事山蠶藹有邠俗之遺安吉州劉希仁縣令題名記鄣南賦繁事劇尤為難治蔡汝楠州志序吳下文盛淳風久漓州在山中尚不失敦龎古始之意吳瓏明倫堂記吳興文明上郡獨安吉為州而人士舉業且蔚乎紛郁矣安吉州志其土瘠薄故鮮富室罕積聚其小民不出境事商賈不習工藝故多貧婦尚貞節郊外絶無遊女婚娶不親迎居喪不按家禮病不醫藥多事禱禳孝豐縣黃朝選縣治記林篁僻邃易服難馴孫在豐楊侯建學詩序人士大都視聽間靜未嘗馳騖聲華代有雋望孝豐縣志東地沃而侈近浮西地瘠而鄙且險好鬼而務訐尚詐而蔑禮近則壽考相望儒業頓起宫室率務堅朴無雕刻堊黝之飾男婦服制不常夏則衣苧冬則衣棉儉素之風居多富家燕飲多事豐腆山村儉朴有汙樽抔飲之風吳興掌故湖族婚時遇暮夜親知家各助以燈燭冇親喪者賵奠之禮舉不敢受云不敢以親纍及人喪葬送者雲集其費一出於親知所辦隨其力之大小以邀送客終制之日出外服素青服而家居素服若心喪者過三年方通用吉服吳興掌故元旦家具糕勝香燭供三正堂三日或至半月祀門户神甚謹不敢以家鬼先之孝豐縣志社日各村率一二十人為一社屠牲釃酒焚香張樂以祀土穀之神謂之春福烏程縣志二月二日士女皆摘蓬葉插於頭諺云蓬開先日早戴了春不老四月立夏家多祀竈以火德王也時蠶已三眠稍葉者三日後任從採摘梅雨農家賴以種田俗名燒鵝汁其時有雷則多魚無雷謂之啞黃梅立冬日以野菊花金銀花茄根薑幹之類煎湯沐浴謂之掃疥西吳里語清明居民各棹彩舟於溪上為競渡謂宜田蠶始於寒食至清明日而止謂之水嬉西吳枝乘吳興以四月為蠶月凡官府勾攝徵收及里閈往來慶弔皆罷不行謂之蠶禁歸安縣志四月八日以楝葉染米啖青精飯吳興掌故七月望日盛為蘭盆會好事者浮水燈為水陸會常以膏泛粥事神祀禮重十月朔墓祭與清明略同霜露感情不能自己正合古禮西吳里語各村歲晚以竹葦雜他草木東炬舉火燃之名曰照田蠶謂宜耕種育蠶二事寧波府鄞縣附郭陸士龍答車茂安書火耕水種不煩人力舉閘成雲下閘成雨官無逋滯之征民無飢乏之慮衣食常充倉庫恆實榮辱既明禮節甚備為治甚簡為民亦易三國志注會稽典録山有金木鳥獸之殷水有魚鹽珠蚌之錯海嶽精液善生俊異隋書地理志川澤沃衍風俗澄清海陸珍異所聚人雜五方俗類京口王應麟七觀世族蟬聨重圭纍組庠聲序音洋洋鄒魯習鄉上齒少長有序俎豆秩秩章逢楚楚錢彥遠衙司都目序田瘠且隘鮮蠯錯出王應麟鄞縣學記詩書之鄉禮節恭謹縣之子弟夙以衣冠鼎盛延祐四明志浙東七州明為厄塞户版物産清風舊德與昔之髙閎巨閥屬於宅里者猶可考也陸深棟塘翁傳鄞甬之東山水清嘉人喜種植務農功嘉靖寧波府志朴茂醇實農勤於耕女勤於織商賈鬻魚鹽工供日用絶無四方竒邪之習男女皆衣布素即髙資厚藏不曳綺紈冠婚一從簡朴僅取成禮賓至則擷蔬炊糲以為餉鄰里不相侵竊外户闢而不扄尨不夜吠捕吏不入於鄉雖王化所薰大都其習然也青襟之士亦皆甘於菲陋不羞韋葛昏旦閉户讀書絶鮮他營五邑大抵皆同嘉靖寧波府志鄞之風散緩其俗迂濶而善妬慈之風矯厲其俗尚文而善黨奉之風鷙健其俗負氣而矜髙定之風脆弱其俗習勞而寡營象之風朴直其俗好競而服義李璜府學記人才英拔比他郡為甲後進逢掖往往氷玉秀整廉利好學陸世科義倉記鄞邑介處海濱風俗近古四民各食其力鄞縣志神禹東狩及於會稽而鄞屬在封內被聖人過化之澤既而無餘建服胄衍神明厯商周之際漸被聲教句踐崛興事鉤盾驅長鬛力爭於上國而民遂感憤赴敵不恥鬬力風尚少變焉慈溪縣王安石縣學記慈溪小邑無珍産淫貨以來四方遊販之民田桑之美有以自足無水旱之憂也無遊販之民故其俗一而不雜有以自足故人慎刑而易治而吾所見其邑之士亦多茂美之才易成也楊守勤潘侯去思碑慈濱海而遙負山峛崺四民僅僅守常業無他營士大夫彬彬相率以禮義以故無桀黠梗化之患顔鯨杜白二湖碑記慈彈丸邑也厥土塗泥宜粳稻穜稑之饒三農九穀水泉是資其東西南表裏江河去海未遠借潮汐便利往往股引自給寧波府志唐房琯建縣取漢董黯孝養之迹為名蓋立教以孝云嗣後張無擇孫之翰繼之稱三孝鄉宋治平中得杜醇為學者師士皆興起道義建炎南渡衣冠氏族多卜居焉慶元以來慈湖楊簡得象山之學又有文潔黃震宋朱子之傳以訓迪後人人益敦倫尚行知廉恥而畏清議名師先達悃愊相將忘其貴勢與里黨相齒讓絶無侵漁暴橫之風儒生率儉約自守小民以耕織為事雖風氣固然亦物力有所制也慈溪縣志其士子往往以德業淬厲底于成材衣冠文物雍容典雅尊德樂義有士君子之風百姓止納稅糧橫差暴斂一無所干鄉村之人至老不識城市奉化縣樓鑰縣學記六邑奉化為望秀士尤多陳造縣丞廳壁記奉化民夥事叢號不易治陳著縣學記尚氣而畏法好義而知分詩書禮樂之澤一變可以近古王應麟縣治記其俗純如其士份如戴表元于伯顔去思碑記奉之為州山踈而水迅踈故土居者清勤力業而少餘資迅故仕遊者惝恍外顧而無留心張時徹城垣碑記性雖易抵冒好鬭訟然皆狎於耕桑守在四境嘉靖寧波府志奉化地不夷衍兼藝山坡海滷以食而民常勞水不瀦渟外方境內之物不得轉輸而民常嗇奉化縣志土狹民稠日以墾闢為事仰事俯育僅僅無餘人窘於財亦憚於為非富家大族皆訓子弟以詩書故其俗以儒素相先不務驕奢瀕海小民業網罟舟楫之利出沒波濤變化如神習使然也鎮海縣吳敦復縣治碑記魚鹽之聚土瘠民貧王應麟儒學大成殿記挹秀涵清俊人魁士含章挺出王存之鎮海縣碑記居山者以耕鑿為生瀕海者以漁鹽為業王震岱山書院記士生其間往往多鍾山海碩大之氣陶恭縣治形勝賦其氣善柔其文郁郁彬彬迄今龍翔鳳舉後先相望嘉靖寧波府志濱海斥鹵其土瘠其俗甘勤苦務織作溫柔敬愛有古遺風何愈貢舉題名碑記環海而邑扶輿清淑之氣孕靈育秀賢哲之士生於其間者蘊蓄為道德彪炳為文章樹立為勳業千百年來蓋屢有聞也象山縣嘉靖寧波府志民多剛徑而質直利魚鹽務稼穡樂於家居憚於遠出吳學周縣志序碩儒名德彬彬輩出衣冠文物之鄉舊浙江通志大抵五邑之氏樵山漁海衣食自足惟緣海之地兵民雜處禮讓文學不無少衰矣象山縣志俗儉而民易治事簡而賦易供黔首守畎畝跬步不出里巷婦人恥入市即窮簷陋室未嘗望見顔色士尚切偲鮮欺傲鄉薦紳班荆問舊未嘗以驕貴聞里中服食恬素不御綺縠吉凶從有無婚嫁嚴良賤其貧與富弗計也定海縣吳萊甬東山水古迹記昌國人家頗居篁竹蘆葦間或散在沙墺非舟不相往來田種少類入海中捕魚蝤蛑蛇母禪塗傑步腥涎褻味逆人鼻口歲或仰穀他郡胡宗憲舟山議五穀之饒魚鹽之利可以食數萬家定海縣志其民自讀書服賈外大半以力田樵採為業凡居服飲食婚喪宴會以及享祀伏臘悉尚省節蓋力勤而用儉比户皆然寧波府志冠禮男子年十六擇吉日告廟始冠亦有及婚而冠者三加請戒之禮習俗久略女子則當嫁時加筓焉婚禮士大夫家締姻多重門第先憑媒妁通柬將幣如古問名禮至納采納徵俱崇儉約不以金幣相炫女家具奩亦不以紈綺珠玉相耀親迎後翌日出拜姑嫜獻以女紅榛栗其風猶古喪則始卒及含殮多遵文公家禮或五日或七日服成受弔宗黨姻友各以香楮申奠俗好浮屠每七必作佛事葬用石槨貧者用磚三日展祭新塋標插紙錢祭祀特重宗祠春秋二分冬夏二至在祠合享清明及十月朔則祭於墓祭畢共飲餕餘其歲時令節各祭於家行三獻禮豐儉則稱其有無云嘉靖寧波府志元日設香楮陳果醴祀神祇宗祖序拜尊長畢出拜宗戚鄰里謂之賀歲里社祈年元宵各坊鄉之民集衆祀里祠設醮誦經祈福境內名雨水會清明各家為青糍黑飯牲醴祭墓封土插竹挂紙錢於顛立夏炊五色米為立夏飯端午為角黍駱駝蹄糕祀其先親戚各相饋遺三伏寺廟皆設醮婦女走禮神佛八月各鄉祠廟為會祀神以龍舟競渡謂之報賽與各處端午競渡不同九月在城各坊盡輿祠廟神像遊行街市導以兵仗綵亭金鼓雜劇各相競賽觀者塞路謂之社夥象山縣志元宵四街各設竹棚綵幛懸燈其上或以火藥為錦樹之戲至十八日乃止定海縣志人家多以八月十六日為中秋中庭陳設酒饌賞玩達曙象山縣志重陽士人登髙燕賞以茱萸泛酒各家製牡丹糕方粽親戚轉相餽遺象山縣志歲除換桃符寫春帖易門神謂之從新製辛盤燃爆竹爇蒼术辟瘟謂之碎邪紹興府山陰縣附郭會稽縣附郭越絶書性脆而愚見清知濁見曲知直越絶書春祭三江秋祭五湖大越海濱之民獨以鳥田史記貨殖傳楚越之地地廣人稀飯稻羮魚或火耕而水耨果陏螺蛤不待賈而足地勢饒食無飢饉之患以故呰窳偷生無積聚而多貧後漢書第五倫傳會稽俗多淫祀好筮卜三國吳志忠臣繫踵孝子連閭晉書地理志其民循循宋史地理志商賈工作皆著本業嘉泰會稽志建炎初嘗駐蹕於越山川之所形見風化之所漸被其儒風士業流聞彰布益以昌大非餘郡可比嘉泰會稽志登秦望探禹穴其委蛇盤礴之觀溫厚粹美之氣鍾靈孕秀雲行川流胚胎醞釀發為英傑好學篤志尊師擇友絃誦比屋相聞不事奢靡士大夫家占産甚薄縮衣節食以足伏臘重離别篤交親迎則聚間濶送則惜暌異豆觴迭進往往竟日寶慶會稽續志越州物産之饒魚鹽之富實為浙右奧區余闕均役記越地無甚貧甚富之家山谷之間有一夫而居十畝之田者祖宗相保至纍世不失又其土瘠民貧小人勤身而飭力其君子尚朴儉而敦詩書韓性儒學碑記會稽儒風之盛冠於東州徐渭贈潘公序嫁女者以富厚相髙歸之日擔負舟載絡繹水陸之途繡袱冒箱笥如鱗往往傾竭其家於越新編膏壤沃土民物廣饒紹興府志謹祭祀力本重農下至蓬户恥不以詩書訓其子自商賈鮮不通章句輿隸亦多識字家矜譜系推門第品次甲乙婦女無交遊雖世姻竟不識面不鬻男女於境外大家女恥再醮大扺於俗為美也山陰縣志其男女屛浮靡不事嚴內外以禮貞烈之行史不絶書會稽縣志民有四耕耨而誦其業絲布其服魚鹽與稻果蓏而螺蛤其食也蕭山縣王褘棣萼軒詩序蕭山為縣地偏而俗尚質田惟祜縣志序江海襟帶湖山竒勝風物之阜厚才士之德望甲於諸邑陳敬宗科甲題名記蕭山山水之秀會聚英華鍾靈賢才其碩德雅望英聲偉烈表表在人耳目者前後相望人物之盛習為風俗男女有别而耕織惟勤絃誦相聞而文風益振宦遊如楊龜山以道化倡於前遊定夫以德教闡於後羅豫章講道既去而李延平復來延平之去未久而朱子提舉浙東又至人才之造就良亦有所自矣李遇春縣志序山川之秀鍾為人物如鍾離意操行絶髙張孝伯參謀大政朱憲使獨持風裁魏文靖德望尊重如此者實多髙名美譽膾炙人口紹興府志西鄉稍尚縟禮東鄉乃近朴顧善議論或信浮説蕭山縣志民以耕讀為事士以氣節相髙諸暨縣商輅廟學記山川清淑士生其間偉然秀出蕭鳴鳳廳事記諸暨地阻而俗美田於湖山之間灌泄甚艱故歲無常稔紹興府志有陂池灌溉之利絲布魚鹽之饒其商賈工作皆習簡朴不事華麗諸暨縣志民性質直而近古好鬬而易解力稼不事浮費科第間出一二人輒能侃侃自持餘姚縣貝瓊北山書屋記姚江邑居野墅井然棊布重華文命之德猶在於人貝瓊復古堂記餘姚山石林木皆古民務本而不爭多至百歲往來阡陌間熙熙然如無懷葛天之徒風俗古矣嘉靖餘姚縣志其民知恥好修善讓儉而不陋華而不費勤而不匱質而不俚其思深其慮遠非有虞氏之遺風豈能若是嘉靖餘姚縣志其人敏柔而慧尊吏畏威其教易成占産至薄縮衣節食以卒伏臘輸賦以時其政易敷地多山林湖陂小江大海魚鹽材木之利頗饒其民易足無瓌竒之産以來四方之遊販其民一而不雜餘姚縣志餘姚愈貧寒者愈兀傲自矜士大夫類有節概然亦往往恃氣不相能其服食視諸邑為奢餘姚縣志民知禮讓士風大振君子以讀書為本業小人以技藝為耕作上虞縣葛桷縣志序上虞山水形勝不後於他邦所産人物忠義盈朝節孝連閭非偶然也郭楠縣志序俗尚淳古素親耕讀猶有舜禹遺風紹興府志居會稽餘姚之間地狹而好矜名類能飭廉隅篤孝讓然喜生事意氣多發揚少含蓄上虞縣志尚節義而恥習漓澆君子好文學鄙民理穡事嵊縣王洪鄉賢祠記山川鍾靈名賢輩出紹興府志嵊與新昌本一邑在萬山中其士子知好學砥行嵊尤近質不浮不作無益嵊縣志俗尚勤儉好古嚴尊卑之分然而市民輕薄鄉俗鄙陋新昌縣王畿甲科題名記溪山瓌麗似朴而文吕光洵縣志序新昌邑台剡之間地瘠民儉其財賦不足以當上邑之十二獨其俗淳厚先民之流風善政猶有存焉新昌縣志以讀書尚禮為美事不遠行商不尚華麗無淫亂之風然好歌舞明法律以繩人紹興府志男子年十六以上告廟行冠禮多於冬至或元旦婚必擇門第多士大夫為媒六禮遵古制親迎雜用踏藁牽紅傳席合巹諸儀即日拜翁姑以次及家衆三朝廟見張綺席合飲宗戚喪大率用家禮惟不行小斂不用布絞其墳塋多砌磚為槨家饒者乃以石既卒哭舍苴絰更用細麻布服出謝弔客祭以四時或用四仲分至日或元旦端陽中元冬至忌日必素服祭終身不廢清明及十月有墓祭嘉泰會稽志元旦男女夙興家主設酒果以奠男女序拜竣乃盛服詣親屬賀設酒食相款曰歲假凡五日乃畢立春先一日郡邑官寮畢出迎春東郊通衢遊觀相飲樂至期用巫祝禱祠謂之作春亦曰燒春元宵前二後三夕比户接竹棚懸燈朱門華屋出竒炫華豪奢相矜社日鄉有社祭三月二十八日俗傳東嶽誕辰蕭之蒙山餘之黃山皆有廟焉男女競往燒香羅拜大姓皆樓船載簫鼓鳴榔遊飲姚人謂之遊江端午日以角黍相餽遺設蒲觴磨雄黃飲之女子以繭作虎小兒則綵繩繫臂綴繡符簪艾葉採藥錬丹者率以是日夏至祀先以麵蕭山各供茶曰夏至茶六月六日觀荷亦乘畫舫多集於梅山本覺寺同時又遊容山項里六峯觀楊梅八月十八日蕭山有觀潮之會重陽登髙蒸米作五色糕佩萸泛菊府城剪綵旗供小兒嬉戲諸暨飲茱萸酒必配以豆莢是日俗忌不相過必有喪者乃往哭且致祭焉不知所始越中當三夏旱甚時有迎龍之賽不齋虔祈禱惟飾優伶及小户少年為諸神佛怪異或扮故事紹興府志諸暨元宵士女出觀燈名過橋謂可免一歲疾厄新昌街市張燈謂之歡門二月二日始開西園縱郡人遊觀謂之開龍口指卧龍山也新昌立夏則炙昌魚薤菜除夕聚雜柴爇於庭古謂之火山今曰笙盆光熖燭天爆竹腷膊之聲相聞不絶會稽縣志正月十四日用巫人以牲醴祀白虎之神祭畢以紅緑線釘畫虎於門謂之遣白虎浙江通志卷九十九
