body:
  text: 浙江通志卷一百三十二選舉十明進士正德三年戊辰科吕柟榜錢宏錢塘人副都御史陸溥錢塘人陜西左㕘政張術甫錢塘人邵鋭仁和人會元太僕寺卿江曉仁和人會魁侍郎朱鑑仁和人汪賜仁和人副使羅輅秀水人府丞錢琦海鹽人臨江知府孫璽平湖人雲南僉事黃雄烏程人長史姚僖徳清人楊叔通鄞人左布政汪玉鄞人僉都御史巡撫順天王應鵬鄞人右副都御史張福慈谿人姚溍慈谿人刑部貟外徐潭定海人胡克忠山隂人知縣胡文靜山隂人光禄寺少卿周礽山隂人刑部郎中郁采山隂人知州馬録山隂人監察御史章槩會稽人知府姚鵬會稽人副使陳銘會稽人同知田惟祐蕭山人知府盛瀧蕭山人知府汪克章餘姚人僉事徐文元餘姚人黃嘉愛餘姚人知州徐愛餘姚人南京工部郎中駱用卿餘姚人兵部員外謝顯上虞人知縣毛鳳臨海人御史趙淵臨海人四川㕘政唐龍蘭谿人吏部尚書太子太保童寛蘭谿人御史陸震蘭谿人車駕司貟外盧煦東陽人湖廣㕘議季滄永康人陳恩西安人中書徐金陵常山人㕘政周文興江山人鴻臚寺正卿方豪開化人湖廣副使吾翕開化人主事王浚建德人南京刑部侍郎呉欽淳安人僉事李顯樂清人南京大理寺卿汪瑛處州衛人會魁潘湘宣平人曲靖知府正德六年辛未科楊慎榜鄭元仁和人雲南副使張應祺仁和人刑部主事樂選仁和人工部員外方坤餘杭人大理評事章綸嘉興人徐咸海鹽人襄陽知府沈圻平湖人貴州㕘政屠應塤平湖人湖廣屯田副使趙漢平湖人山西㕘政曹恩烏程人廣東副使施儒歸安人副使余本鄞人榜眼通政董鏊鄞人給事中屠俓鄞人吏部郎中屠僑鄞人太子太保刑部尚書呉惠鄞人太常寺卿掌國子祭酒史立誠鄞人刑部郎中孫璋鄞人御史徐晉鄞人翁素慈谿人副使孫懋慈谿人府尹沈光大慈谿人知府劉棟山隂人兵部右侍郎韓明會稽人僉事汪惇餘姚人同知張璿餘姚人員外嚴時泰餘姚人南京工部侍郎施德禎餘姚人崑山知縣張文澐上虞人金鯉嵊人副使俞集新昌人余寛臨海人文選司郎中葉忠臨海人福建按察使郭橈臨海人刑部郎人何璧黃巖人潘漢天台人應良仙居人廣東布政臧相寜海人僉事戴馭太平人戴顒太平人吏科給事中戚雄金華人河南道御史李楫義烏人胡佩湯溪人知縣徐文溥開化人副使李階永嘉人廣東僉事李長縉雲人正德九年甲戌科唐臯榜葛禬嘉興人通政華淳嘉興人陶儼秀水人副使鍾梁海鹽人知府林桂平湖人祠祭司員外陸杰平湖人工部侍郎周仲仁長興人范禄鄞人知府吕愛鄞人桂林知府張懋賢鄞人長史俞文曦鄞人御史黃宗明鄞人禮部侍郎陸鈳鄞人副都御史聞澤鄞人江西叅議黃綬鄞人僉事袁文顯鄞人行人謝汝儀鄞人江西按察使姚釬慈谿人給事中朱良慈谿人按察使王蓉慈谿人知縣秦鉞慈谿人左都御史周士英慈谿人員外馮涇慈谿人主事李渾慈谿人運使徐州慈谿人御史沈教慈谿人右副都御史江鑣奉化人副使朱節山陰人御史王袍山隂人知府姚世儒山陰人知府蕭鳴鳳山隂人提學副使張思聰山隂人㕘政王軾山隂人知府羅江會稽人陳克宅餘姚人副都御史王時泰餘姚人長史邵德容餘姚人主事楊天茂餘姚人長史曹軒上虞人僉事張邦信嵊人僉事金賁亨臨海人提學副使陳子直臨海人福建㕘政陳器臨海人刑部主事范洵天台人吏科給事中呉廉仙居人禮科給事中應大猷仙居人刑部尚書張儉仙居人福建㕘政馮洙金華人瀘州知州張大輪東陽人江西㕘政邵豳東陽人監察御史虞守隨義烏人御史周文光永康人知府應典永康人車駕司主事朱方永康人㕘政胡斐湯溪人主事陳嘉言西安人祝品龍游人㕘政正德十二年丁丑科舒芬榜金廷瑞錢塘人光禄少卿呉鼎錢塘人廣西㕘政江暉仁和人庶吉士陳直仁和人許相卿海寧人兵科給事中劉景寅臨安人兵部郎中諸偁秀水人貴州副使髙璧秀水人胡汭秀水人刑科給事中戴繼先海鹽人張嶼崇德人主事陸澄歸安人刑部主事臧應奎長興人主事沈松德清人叅議陳良謨安吉人㕘政陳璧鄞人僉事葉應驄鄞人知府柴經鄞人副都御史戴鱀鄞人巡撫四川金樸鄞人主事陳沂鄞人太僕寺卿王鎔慈谿人湖廣副使徐錦慈谿人都御史汪應軫山隂人庶吉士江西僉事傅南喬山隂人同知何鰲山隂人刑部尚書蔡中袞山隂人提學副使季本會稽人長沙知府沈𢎞道會稽人僉事謝元順會稽人郎中徐官蕭山人僉事張懷餘姚人廣東㕘政毛紹元餘姚人㕘政陳煥餘姚人光禄寺卿顧遂餘姚人侍郎徐子瓏餘姚人知縣葛木上虞人㕘政車純上虞人右副都御史徐子俊上虞人曹輻上虞人㕘議杜民表嵊人雲南道御史秦武臨海人御史姜絅蘭谿人營繕司郎中章僑蘭谿人貴州㕘政葉觀義烏人李鶴鳴義烏人給事中吾謹開化人俞夔建德人布政使葉式永嘉人會魁修撰桑阡麗水人李瑜縉雲人鳳陽知府正德十六年辛巳科楊惟聰榜嘉興府志庚辰會試時車駕南巡明年辛巳世宗登極五月十五日廷試江山錢塘人尚寳少卿金輅錢塘人廣西僉事朱應昌錢塘人徐顥仁和人臨江知府邵經邦仁和人刑部貟外郎葉泰仁和人鄒瓚餘杭人和順知縣張徽秀水人南雄知府錢際時桐鄉人朱雲鳳烏程人刑部主事陸釴鄞人榜眼提學副使王相鄞人編修楊言鄞人湖廣右㕘議鍾潛慈谿人郎中劉世龍慈谿人少卿周祚山隂人工科給事中徐俊民山隂人僉事周文煥山隂人刑部郎中田麟山隂人僉事司馬相會稽人福建僉事王楊會稽人陳賞諸暨人同知張逵餘姚人刑科給事中胡昭餘姚人郎中邵煉餘姚人雲南僉事邵曅餘姚人副使楊撫餘姚人湖廣提學史立模餘姚人知府徐子貞餘姚人主事顧