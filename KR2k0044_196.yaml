body:
  text: 浙江通志巻一百九十七方技下紹興府周歐冶子越絶書楚王諂風胡子曰寡人聞吳有干將越有歐冶子此二子甲世而生寡人願齎邦之重寶皆以奉于因吳請此二人作鐵劍可乎風胡子曰善於是乃令風胡子之吳見歐冶子干將使二人作鐵劍歐冶子干將鑿茨山洩其溪取鐵英作為鐵劍三枚一曰龍淵二曰㤗阿三曰工布畢成風胡子奏之楚王楚王見此三劍之精神大悦秦伊越絶書民西大冢者句踐客秦伊善炤龜者冢也因名冢為秦伊山漢謝夷吾後漢書方術傳字堯卿㑹稽山隂人少為郡吏學風角占候太守第五倫擢為督郵時烏程長有贓釁倫使收案其罪夷吾到縣無所驗但望閤伏哭而還一縣驚怪不知所為及還白倫曰竊以占侯知長當死近三十日逺不過六十日遊魂假息非刑所加故不收之倫聽其言至月餘果有驛馬齋長印綬言暴卒倫以此益禮信之舉孝亷為壽張令稍遷荆州刺史鉅鹿太守所在愛育人物有善績左轉下邳今豫尅死日如期果卒韓說後漢書方術傳字叔儒㑹稽山隂人博通五經尤善圖緯之學舉孝亷與議郎蔡邕友善數陳災𤯝稍遷侍中光和元年十月言於靈帝云其晦日必食乞自官嚴裝帝從之果如所言中平二年二月又上封事尅期宫中有災至日南宫大火遷江夏太守三國吳吳範三國吳志字文則㑹稽上虞人以治歴數知風氣聞於郡中孫權起東南範委身服事毎有災祥輙推數言狀其術多效權欲討黄祖範曰今兹少利不如明年明年戊子劉表亦死征祖祖必生禽又言歳在甲子劉備當得益州後劉備盛兵西陵範曰後當和親皆如其言晉嚴卿晉書藝術傳㑹稽人善卜筮鄉人魏序欲暫東行時荒年多盜令卿筮之卿曰君當行必遭暴害之氣而非刼也宜禳之可索西郭外白雄狗繫着船前求索只得駮狗卿曰駮者亦足然猶恨其色不純當餘小毒及六畜軰耳序行半路狗忽作聲甚急比視已死其夕序墅上白鵞數頭無故自死而序家無恙南北朝夏赤松南史蕭惠基傳當時能碁人瑯琊王抗第一品吳郡禇思莊㑹稽夏赤松第二品赤松思速善於大行思莊戲遲巧於鬬碁錢祐太平御覽㑹稽餘姚錢佑以元嘉四年五月三日夜出屋後為虎所取十八日乃自還説虎初取之時至一官府入重門見一人憑几而坐形貌偉壯左右侍者三十餘人謂曰吾欲使汝知術數之法故令虎迎汝無懼也留十五晝夜語諸要術盡教道之方祐受法畢便遣令還而不知道即使人送出門仍見歸路既得還家大知凶吉無幽不驗賀道養南史賀瑒傳道養山隂人工卜筮經遇工歌女人病死為筮之曰此非死也天帝召之歌耳乃以土塊加其心上俄頃而蘇孔靈産嘉㤗㑹稽志靈産㑹稽山隂人南齊書孔稚圭傳稚圭父靈産宋㤗始中罷晉安太守有隱遁之懐於禹井山立觀事道精篤頗解星文好術數太祖輔政沈攸之起兵靈産密白太祖曰攸之兵衆雖强以天時㝠數而觀無能為也太祖驗其言擢遷光祿大夫以簏盛靈産上靈臺令其占侯餉靈産白羽扇素隱几曰君性好古故貽君以古物唐陳閎畵斷㑹稽人能冩真開元中召人供奉毎令寫御容妙絶當時人寫太清宫肅宗真容匪惟龍額鳳姿日角月宇之狀而筆力遒潤風采英逸合符應瑞天假其能閻令公之後一人而已歴代名畵記韓幹陳閎師於曹霸沈匕太平廣記越州人善卜天寳十四年王諸應舉欲入京於匕處卜得純乾卦下四位動變觀卦沈云公今應舉得此卦觀國之利用賓於王本是嘉兆然交動羣陰咸陽下成乾卦上變至四又不至五五是君位未得利見大人恐此行不至京而回果至東京屬安禄山反奔走却歸江東孫位宣和畵譜㑹稽人僖宗幸蜀位自京入蜀自稱㑹稽山人舉止疏野襟運曠逹喜飲酒罕見其醉光啓中畵應天寺壁勢若飛動後改名遇卒不知所在世稱龍木尤位所長五代王耕十國春秋越人善畵尤精牡丹遂為一時丹青之冠葆光録耕畵牡丹最佳春日張於庭廡間則蠭蝶萃至葉簡聞奇録剡人善卜筮凡有盗賊皆知其姓名有農夫失牛卜之曰占失牛已被邉家載上州欲知賊姓一斤求欲知賊名十千頭乃鄰人邱甲耳又有將橘子合之令占曰圖似珠色如丹倘能劈破同分喫爭不慙媿洞庭山又將雞子二箇占云此物不難知一雄兼一雌請將打破看方明混沌時西湖游覽志武肅王左右算術醫流無非名士有葉簡李咸者善占筮忽一日旋風南來遶案而轉召簡問之曰此淮帥楊渥已薨當早遣弔祭使去耳王曰生辰使方去豈可便伸弔祭簡曰此必然之理速發使徃彼若問如何得知但云貴國動靜皆預知之王從而遣之生辰使先一日到楊渥已薨次日弔祭使至由是楊氏左右皆大驚服宋鄭日新於越新編越州人少善棋世號越童丁權萬厯㑹稽縣志字子卿㑹稽人善畵竹自述竹譜又有鑑湖懶民者賀方回裔孫也作平逺細竹瀟灑可愛劉仲懐竹派山陰人元佑間徙居諸暨善畵墨竹筆法師文湖州張永舊浙江通志洛陽人為翰林醫學太醫令李㑹通同時出其方與㑹通無異但改煎為散耳散疾遂愈扈從髙宗南渡因家餘姚後登進士至禮部尚書所著有衛生家寳行世元項昕两浙名賢録字彦章由東嘉徙越江自號抱一翁外大父世業醫奉父命謁受其書讀之年未成童已暗誦岐扁素難王叔和脉經後以母疾醫誤投藥死痛之益勵志醫術於是為人治病決死生無不立驗平生喜詞章善音律工繪畵而獨以醫顯所著有竹窻小隔及脾胃後論子恕能世其業萬厯紹興府志昕㓜業醫從金華朱彦修錢塘陸尚靜集慶戴同父紹興陳白雲受五運六氣之説治病徃往奇中鮑敬嘉靖山隂縣志字原禮山陰人善畵花木禽魚尤長於人物嘗為折枝牡丹姿態天然陳憲章圖繪寳鑑號如隱居士㑹稽人工畵梅與王牧之齊名江仲謙劉基贈醫學録江仲謙序紹興人以良醫鳴於郡甲午歳余挈家來紹興地卑濕又寒暑易常度家人疾病相連屬不絶延仲謙診之劑所投無不愈由是倚仲謙以為安而信其為艮醫不虛矣方余家人之疾也仲謙來視曰某當某日愈某當變某疾疾作復幾日愈無不驗有所餽謝則堅拒不受楊維翰兩浙名賢録字子固諸暨人畵為何九思所推紫桃軒雜綴楊維楨之兄善冩竹石墨蘭妙絶一時明單俊良两浙名賢録蕭山人國初創圖籍覈數俊良上其式有詔命天下法之又以踏車灌田之勞剏造牛車以機輪轉之今郷之牛車單制也石逵於越新編諸暨人洪武中辟薦至京師㑹諸王有疾近臣或言逵善醫試視之有效自是遂以醫顯後為御醫院使張徳元霏雪録近世拆字言吉㓙者無如張乗槎按字畵以成卦余一日坐乗槎肆中有二童持一字來占曰是為吏縁同曹訟之當送刑部笞四十即回二童相視黙然既而曰皆如先生言子欲訴政司求決可乎乗槎曰此行不可逾旦矧欲已耶予謂笞四十未可知童曰律當然耳乗槎曰今夕非附軍器船即官鹺船也童曰果官鹺船乘槎姓張氏名某字徳元乗槎其號云両浙名賢録徳元避亂山陰有奇術其友病以豐字示之徳元曰死矣明日訃至或問其故徳元曰豐字山墓所也兩丰封樹也豆祭器也墓既成矣尚欲生乎嘗飲劉彦昭家曰今夕復有客已而客至間之徳元曰吾聞滌器聲故知耳馮汝賢𢎞治紹興府志諸暨人永樂中縣丞善觀字之形體參伍錯綜以知人之休咎所言無不奇驗滑壽紹興府志字伯仁先世儀真人僑居餘姚學醫於京口王居中授以素問難經乃𩔖次手抄而讀之且為之注已乃參考張仲景劉守真李明之三家得其妙又傳針法於東平高洞陽以盡醫之神秘由是所療無不奇效能决死生一婦孕患腹痛呻吟隔垣聞其聲曰此蛇妖也砭之産數蛇得不死又一婦臨産而死視之曰此小兒手捉其心耳砭之即甦少頃兒下大指有砭跡無問貧富皆往治不報不較也與朱丹溪彦修齊名在淮南曰滑夀吳曰伯仁鄞越曰攖寜生所著有十四經發揮三卷及難經本義讀傷寒論抄診家樞要痔瘻篇醫韻等書傳於世今子孫為餘姚人知府浩是其孫葉逄春云壽蓋劉文成基之兄易姓名為醫文成既貴嘗來勸之仕不應留月餘而去黄武於越新編山陰人治舉業不就乃學醫先是越人療傷寒輙用麻黄武曰南人質本弱且近世人鑿代甚多本已撥而攻其表殺人多矣乃投以參茋輙取奇效自是越之醫咸祖之楊宗敏両浙名賢録新昌人永樂間有異僧叩門父館榖之因授宗敏堪輿術遂得神解登山隔十里許即知作穴所向及倒杖不􅐩毫釐人稱為楊地仙周述學徐階周雲淵傳字繼志號雲淵子山陰人素負經濟尤邃於易歴南㳺楚北抵燕趙徧諏天官氏之術聞郭太史弧矢法以圓求圓循弦宛轉極與天肖名曰弧矢經時荆川唐太史博研古算箬溪顧司馬精演例法欲求弧矢不可得述學竭其心思撰補弧矢又續中經纂歴議歴學而歴法遂為完書嘗著圖書較理論以彰易之體極爻象著易義以逹易之用集京邵之文諧元韻之聲用占經世象識吉㓙其他輯㑹占而叅以命法纂通志而徴以世紀準晷極而定道里之數本山河而叙流峙之支水陸逺近有程以備行兵都省區域有界以表形勝星命砂水太乙六壬遁甲演禽風角鳥占靡不洞其𤣥㣲合所纂撰凡千餘巻總題曰神道大編徐蘭畵史㑹要字秀夫餘姚人善水墨蔔萄風烟晴雨曲盡其妙其枝蔓圓轉處藏有天下少人間無六字行書彷彿趙松雪樓英𢎞治紹興府志蕭山人精醫術被召至京以老疾辭歸著有仙巖文雋二巻運氣𩔖註四巻醫學綱目三十九巻范應春萬厯上虞縣志少負竒氣常自計曰匹夫而欲濟人利物惟醫藥乎乃徧讀岐黄家言遂以醫名世一日途遇姻親薛文龍驚愕曰公病劇奈何薛曰固無恙也應春就其家診之陽為好語密囑其子曰而翁臟脉已絶特浮陽在外不見劇狀耳夜半當疾作及晡而逝矣可亟治後事已而時刻不爽有按院行部至虞稱病不言所以徧召諸醫莫曉應春診之曰無他病祗患夜遺耳安神保元自己院囅然曰神哉又問曰富貴中人豢養安逸然多疾病時服藥餌寠人日勞筯骨奔走衣食而鮮病何也應春對曰户樞不蠧流水不腐院大竒之應春取董奉種杏故事自號杏莊有杏莊巻藏於家邢元愷於越新編嵊人課卜多奇中馬時暘萬厯㑹稽縣志名暄以字行㓜頴悟博通經史兼精丹青術尤善於古𨽻篆孝廟初徴入華蓋殿供御授錦衣衛鎮撫張員両浙名賢録字一民又字天民㑹稽人左目無瞳子自稱左瞽善草書工畵以筆墨自娛未嘗為貴勢人一作徃徃以金購之雖值屢空麾之不顧俞用古萬厯紹興府志新昌人以神醫名有病人方危篤延治一人無病避入帳内用古俱診之曰呻吟者可治初病者膀胱氣絶必死主人大笑已而其人果以忍便急泄卒而病篤者竟愈又王氏數人忽啞用古見雉毛盈廚曰吾得之矣蓋是時雉多啄夏其毒在内取姜汁飲之立愈一女子欠伸兩手直不能下用古曰須炙丹田因灼艾詐欲解其裩女子驚䕶之兩手遂下岑乾於越新編餘姚人童時從父遊武林或竟日他徃家人怪之乾曰有羣兒呼與奕自是奕頓異後游京師諸公爭延之名由此顯時又有顔倫者稱第一手乾嘗謂與顔奕必謝絶人事乃可乾馳名早人謂小岑王元美奕㫖今後進中閩有陳生蔡生越有岑生揚有方生而蔡與岑尤强甚皆未可量也馮道助紹興府志山陰人有奇術凡里中犬囓人者指之則狂猘以死有村夫板築道側見行者偶妨其業則詈之道助摘草置其上已而所築連堵皆潰三江戍卒侮之遜謝不與較但引之坐石橋上道助既去戍卒踰時不能起道助行三十里許摘草與樵者曰某橋上有戍卒數人可以此草與之樵夫如言戌卒始能去嘗至丁墟呼農夫渡不得遂幻雙鯉躍田中見者取鯉禾盡蹂躪後符録事發有司遣人持牒徃捕適與捕者遇於途取捕者公牒去而捕者昏然不見酈元真兩浙名賢録諸暨人㓜學道術年五十而術通能驅雷電宣徳間過大部鄉宿農家其家無烟而火沙石從空中下元真書一符焚之即有大雷震一狐死自是怪遂絶葉元紹興府志新昌人㓜時渡槐潭溺水見一赤面長鬚人救之不死自是遂通符呪諳五雷祈雨法成化間郡大旱郡守白公延之祈雨即時大澍府倅女為妖所惑書符懸之少頃震雷擊巨蛇死女漸愈後不知所終唐繼山紹興府志㑹稽人少喜讀書長而習醫多奇效尤精脉理能決死生於數年之前有脉決行世張介賓山隂縣志字景岳年十三隨父至京遇名醫金英從之遊遂得精醫道為人端静好讀書殫心内經著有𩔖經綜覈百家剖析疑義凡數十萬言歴四十年而成西安葉秉敬謂之海内奇書又作古方八陣新方八陣海内多宗之俞鵬畵史㑹要字漢逺上虞人善畵水波遊兩京名重公卿間有巨璫欲薦之即僵臥不肯起其畵亦不易得興至乃寫陳洪綬朱彝尊陳洪綬傳字章侯諸暨人年四歳就塾婦翁家翁方治室以粉堊壁既出誡童子曰汙我壁洪綬入視良久紿童子曰若不徃晨飱乎童子去累案登其上畵漢前將軍關侯像長十尺餘拱而立童子至惶懼號哭聞於翁翁見侯像驚下拜遂以室奉侯既長師事劉宗周講性命之學已而縱酒狎妓自放頭面或經月不沐客有求畵者雖罄折至恭勿與至酒間召妓輙自索筆墨小夫稚子無勿應也自稱老遲亦稱悔遲亦稱老蓮妄胡浄鬘亦善畵花草云台州府五代鍾隱圖畵見聞志天台人工畵􅋧烏竹木師郭乾暉深得其㫖乾暉始秘其筆法隱變姓名趨其門服勤累月乾暉不知其隱也隱一日縁興於壁上畵一鷂子人有報乾暉者亟就視之驚曰子得非鍾隱乎隱再拜具道所以乾暉喜曰孺子可教也乃善遇之遂馳名海内王氏畵苑隱字晦叔其畵在江南者悉為南唐李煜所有煜親筆題署以璽識之元胡徳亮徐一夔杏所翁傳字叔大别號杏所翁天台人少負羸疾有志讀書父母以岐黄之術有禆於衞生俾習之有深於其術者悉延致於家為講求補瀉虛實之法盡得其秘用是醫名口振而翁之志務在濟人不以貧賤富貴二其心既授藥寢食不自安必俟病家告愈乃已姚雪心畵法年紀黄巖人工墨竹竹𣲖雪心畵竹宗文湖州葉清友楊維楨送寫神葉清友序天台人其父可觀入京師嘗寫天顏被命為提舉梵像監清友紹其家傳嘗為予寫鹿冠吹笛像於五湖之間談者謂非徒得予形而實得予神不在顧長康之下也明王奇分省人物考字世英天台人為諸生通天文星數卜筮之學或曰有異傳焉遊金陵三原公在兵部方為權貴所尼屬奇筮之曰公歸矣越三載其起當銓衡乎已而果然刑部逸重囚奇筮之遇恒之大過曰五為囹圄賊入矣其焉逃之計其獲日與時皆不爽陳指揮妻死將斂其女病問命於竒竒曰女固無恙其母亦未死後當生二子即欲斂其必越午至午時妻復生後果生二子王郎中應奎問命竒曰是火氣太盛若官之南所至必有火災後守台州郡中災十室九燼嘗遊歡谷山中仰見星象嘆曰客星主急變奈何越三日復觀焉則喜曰無事矣未幾逆瑾敗此數事其尤異者両浙名賢録竒性至孝有所得付其弟以養母母年九十餘奇為嬰兒以悦之有佳果必袖以奉然介甚茍非義雖千金不顧也終身不受室以猶子宗元為之子賴賓國萬厯寧海縣志居十八都膂力過人能手博猛獸缸窰烏鵲一發疊中城東朱鼎善奕世無與敵時稱寜海三絶云邱良仁張榖邱良仁傳台州人正徳間推命多竒中百户陶炳以命扣之云將星入命禦敵必得竒功當陟二級世襲千户時承平無虞人笑之八年開化江西宼起總制陶琰舉炳將才從參帥李隆勦宼有功果陟二級世襲炳作洞徹元機巻求縉紳詩文以贈之王乾獻徴録字一清臨海人以輕墨淺彩作禽蟲𤓰果花草間出山石林藪芥蒼幽岑徃徃極妙尤妙寒塘野水拍泳朝暮之態間作茅屋竹樹雲氣㸃逗人物灑灑益可玩乾既卒雖尺幅人皆寳之潘爵天台縣志字明秩善占氣之術嘗詣所親黄某謂曰汝家十年行且敗矣時黄方鼎盛後漸凌替揆之果十年也褚某者乗馬經其門曰此人三日後必死至其日果然其家走市中鬻麻布或紿爵曰子言某三日後死今復乗馬過何耶爵曰鬻麻布耳人咸異之趙與慶黄巖縣志號草堂縣西橋人精岐扁術人有疾求治無不立愈一日有惡疾人臥道中穢甚行者皆避之與慶獨就前為診視曰六脉延延必是大仙其人即授以二鍼忽不見自是其術益神林益道黄巖縣志號心月牟村人四歳讀書日記千言十五歳當七夕與羣兒戲浴江湄有一叟置蓋於水亂流而濟衆莫見惟益道指示羣兒叟至以手摩其目曰好眼好眼歸即雙瞽臥病二年叟復至其家授以禄命書鄰人為之口授一簡其字即滅自是語禍福無不竒中金華府隋舒綽両浙名賢録東陽人宰相楊恭仁欲遷葬㑹陰陽家五六軰皆海内知名恭仁未之決遣人馳徃取葬地四隅土各一斗方面形勢悉書於歴密緘之出土示衆言人人殊獨綽定一土泚筆識之與恭仁所書之歴無毫髪差綽曰此土五尺外有五榖得其一即是福地世為公侯恭仁延綽至其處掘地七尺得一穴如五石甕貯粟七八斗是地昔為粟田蟻啄之入穴故然時以綽為聖唐陳昭太平廣記僕射房琯相國崔煥並貶任睦歙州官時有婺州人陳昭相之云後二公並為宰相然崔公為一大使來江南及至徳初上皇入蜀房崔二公同時拜相崔後為選補使廵按江東婁千寳呂元芳雲溪友議浙東李褒聞婺女婁千寳呂元芳二人有異術發使召之既到便令止從事㕔從事問曰府主八座便作何官元芳對曰適見尚書但前浙東觀察使恐無别拜干寳所述亦爾從事黙然罷問及見李李曰僕他日何如二人曰嵇山聳翠湖柳垂陰尚書畵鷁百艘正堪遊觀昔人所謂人生一世若輕塵之著草何論異日榮瘁自後李歸義興未幾物故是無他拜也又杜勝給事在杭州日問千寳以已為宰相之事曰如筮得震卦有聲而無形也當此之時或陰人所譛若領大鎮必憂悒成疾可以修禳後杜為度支侍郎草麻待宣府吏以上於杜門構板屋將布沙隄忽有東門驃騎奏以小疵而承㫖以蔣伸侍郎拜杜出鎮天平憂悒不樂去乃嘆曰金華婁山人之言果應矣欲令招二人又曰孤雲野鶴不知栖宿何處杜尋亦終於鄆州馬生定命録天寳十四年趙自勤合入考有東陽縣瞽者馬生相謂云足下必不動縱去亦却來於此禄尚未盡後至三品著紫又云自六品即登三品自勤其年果不入考至冬有勅賜紫乾元二年九月馬生又來自勤初誑云龎倉曹家生揑自勤骨云合是三品與趙使君骨法相似所言年壽并官政多少與前時所説同宋潘衡墨史金華人蘇子瞻云衡初來儋耳起竈作墨得烟豐而墨不甚精因教其逺突寛籠得烟幾減半而墨乃彌黒其文曰海内松煤東波法墨皆精者也衡今在錢塘竟以東坡故售墨價數倍於前然衡墨自佳可與九華朱瑾上下也李明甫両浙名賢録東陽人善醫尤精針法義烏令病心痛垂死明甫視之曰有蟲在肺下藥所不及惟砭乃可然非易也謬謂於肯上㸃穴密取水以噀之令方驚而鍼以入曰蟲已死矣既而腹大痛下黒水數升蟲亦去遂愈盧鴻萬厯金華府志字碩父舉進士善仙卜鄉人周師鋭既中省問之曰當魁多士且曰熟讀程易師卦已而廷對問師律之㫖遂舉第一人又善驅邪有條桑者忽墮地嘔血而死鴻曰行持可也宜靜聽之頃四山皆鬼呌病者忽呻吟嘔血數升而甦陳堯臣揮塵後録婺州人善丹青宣和初登科為畵學正王黼薦於上擢水部員外郎假尚書使遼堯臣即挾畵學生二員俱行繪天祚像以歸并圖其山川險易以上上大喜擢右司諌湯衡文獻通考湯氏嬰孩妙訣二卷東陽湯衡撰衡之祖民望精小兒醫有子曰麟登科衡麟之子尤邃於祖業湯晙正徳武義縣志邑之妃山人少讀書累舉不第遍遊淮汴間歸結廬以居號曰黙庵素能醫中年既絶仕進而術益精妙建炎間婺守室女患蟲病醫皆不效郡倅以晙薦使胗祝晙曰非蟲也已成胎孕矣然猶可治守不樂其言晙遂謝去倅曰彼既言可治何不試之復追晙至晙命作一大桶盛水女坐其中既飲女藥復以藥投水中俄産一物其狀如蛟但無角耳家人驚愕失色晙曰無恐此因舟經江湖為蛟蜃所感耳今可賀矣復以藥調治平復如初范疇萬厯金華府志字復初金華人宋建紹間得江西張九午蓍易之占神妙莫測杭有無籍子胡婆壽負罪而逃捕者即疇求筮爻成疇曰可於北方樹中得之如言迹至臨平果獲於空楊柳中遂繫獄後㑹赦出欲報疇持刀晨叩疇門紿以卜欲殺之疇決以占知其將不利於已隔門問之曰欲卜可擲下手中刀胡聞之駭服猶以刀畫其門而去疇由是避居於蘇設肆來問莫不神異王用和志雅堂雜鈔賈師憲用婺州碑工王用和翻刻定武蘭亭凡三年而後成至賞之以勇爵絲毫無遺憾幾與定武本相亂元厲周卿山居新語婺州人精卜術天歴間游京師一日揚琚冩一上字卜之厲即對本鈔録姓名出處之説皆如所見後一叚云商量更改事佳㑹喜金羊寅巳同申主好事喜非常其應果在十年後豈非萬事皆分也朱震亨婺書字顔修義烏人所居曰丹溪或稱曰丹溪生習醫於羅司徒知悌治疾徃徃以意為之巧發竒中按之書無有也諸醫皆驚已而訕且排之卒乃大服其名藉甚遍浙東西以至吳中罕不知有丹溪生者所著有宋論一卷格至餘論若干卷本草發義補遺若干卷金華逹逹傳彦修聞許謙承考亭之緒摳衣至門執弟子禮後母病延醫因自悟曰人子而不知醫或委之庸夫寜無失乎於是參究醫學所治多獲竒效王鏡澤正徳蘭谿縣志純孝郷人家貧好讀書不偶於時遂肆力醫學遊大都竇太師漢卿之門二十餘年悉傳其術以歸竇囑之曰傳吾術以濟人使人無病即君之報我也遇人有疾施針砭無不立愈至元初徴領揚州教授以母老辭所著有重註標幽賦傳於世明劉日新金華雜識日新金華星者太祖下婺召推命曰極富極貴太祖怒其不言官職劉請屏左右曰極富者富有四海極貴者貴為天子上喜洪武四年召至問所欲富貴皆對不欲惟欲求一符遍遊天下上題所御白扇賜之識以御寳劉持之遍遊焉戴思恭今言類編字元禮以字行金華人學於丹溪朱顔修初任御醫事太祖藥餌輙效洪武三十一年五月召諸醫官治疾無狀者盡付獄獨召原禮至榻前曰汝仁義人也事無預太孫即位誅諸侍醫者獨拜原禮太醫院使婺書初文皇為燕王時嘗患瘕久不愈召原禮視之因問王嗜何物曰生芹曰得之矣投一劑夜暴下視之皆細蛭也遂愈兩浙名賢録松江諸仲文盛夏畏寒常御重纊飲食必令極熱始下嚥㣲温即嘔他醫投以胡椒煮伏雌之法日啖雞者三病愈劇原禮曰脉數而大且不弱劉守真云火極似水此之謂也椒發陰之火雞能助痰祗益其病耳乃以大承氣湯下之晝夜行二十餘度頓減纊之半後以黄連導痰湯加竹瀝飲之竟瘳姑蘇朱子明之婦病長號數十聲暫止復如前人以為厲所憑莫能療原禮曰此鬰病也痰閉於上火鬰於下故長號則氣少舒經云火鬰則發之是已遂用重劑涌之吐痰如膠者數升乃復初卒年八十二著有訂正丹溪先生金匱鉤元三卷間以己意附著其後又有證治要訣證治𩔖方𩔖證用藥總若干巻皆櫽括丹溪諸書而為之虞搏萬厯義烏縣志字天民博覽羣書能詩因母病攻醫精於脉理診人死生無不驗韓方伯聞其名聘令驛送徃見雅敬重焉治病之餘叩問醫道搏告以節嗜欲戒性氣慎言語謹服食乃攝養之要韓益加禮敬著有醫學正傳方脉發䝉百字吟半齋稿行於世楊云両浙名賢録武義人業醫名動一時宣徳乙卯召至京師入對稱㫖超授御醫適英宗勿怡藥進有效陞太醫院使賞賚甚厚舊名榮英宗以其與楊尚書名同不便宣召賜更名云王葯六硯齎筆記字子約金華人善畵竹多用鉤勒與蘭谿徐良甫梅徐舜舉書號三絶蘇伯衡嘗為鉤勒竹歌以美之朱月檻畵髓元詮逸其名蘭谿人以善畵荷花得名所居之傍有小池植荷數品於其中構亭其上終日坐觀以察荷之消長榮悴苖葉花實容色態度方摹其真得之者以為珍玩號月檻荷云孟態嘉靖金華縣志任醫學訓科精於針灸其所㸃穴不循常法徃徃有神驗自後其法鮮有能知之者章明道東陽縣志善醫長於傷寒李進士謀與僕王四同日病章診之曰進士脉順可生王四脉逆當死七日進士大汗而解王四死又嘗與同遊道旁一家哭甚哀因問之傷寒死矣明道曰容吾一視之或可生也其人曰死半日且小斂矣明道入視之曰此厥耳與藥灌之立甦金養素東陽縣志邑之十九都人精太素切脉決人壽夭死生悉應如嚮至倉卒奇症衆醫束手却避養素談笑治之無不效者郭桂金華府志字時方其先有汪夫人者以善醫婦人顯於宋掌内府藥院事以功封温國太夫人子孫世承其業隨宋南遷散居於浙之東西杭紹者其族也而金華之族有名化龍者又遷於蘭谿後生桂醫道甚明起死回生百不失一葉容正徳蘭谿縣志字可法横山鄉人博通羣書貫穿史籍嘗從鄧太史習天官之學事之數十年精於其業言天象休咎證應亳釐無失其所著有太乙三辰顯異經十巻徐應明湧幢小品號濲溪蘭谿人少與趙文懿公同學趙日有名應明意不自得一日謂文懿曰汝醫國吾醫民各行其志可乎趙曰國醫賒且不必效民醫實人求而我應之造化在手矣遂從時師遊厭而去之遇異人有别傳決生死逺近皆奇驗遊楚中諸名公爭致之有欲傳其術者曰必有活人心地則可蘇中翰維霖有隱疾診之言狀約於一年前無一字虚發蘇將師事之忽一日卒人以為遺蛻也孫櫓金華府志號南屏東陽人性穎異精岐黄五都有單姓妻將産死三日心尚温櫓適過之一劑而甦竟産一男又有人頭生瘤痒甚櫓曰此五瘤之外名為虱瘤決破之果取出虱椀許遂痊著有醫學大成活命訣脉經採要等書國朝徐應顯金華府志字子祐永康人業儒精醫術多所全活晩年益精歴游公卿間貧寒以疾請葡匐救之所著有醫方積驗御史牟雲龍表其廬曰儒修相業年八十餘卒衢州府宋張鬼靈春渚紀聞三衢人其父使從里人學相墓術忽自有悟見因以鬼靈為名蔡靖安世先墓在富春白昇嶺其兄宏延鬼靈至墓下視之謂宏曰此墓當出貴人然必待君家麥甕中飛出鵪鶆為可賀也宏曰前日某家臥房米甕中忽有此異方有野鳥入室之憂鬼靈曰此為克應也君家兄弟有被魁薦者即是貴人是秋安世果為國學魁選余聽聲夷堅志三衢余山人善相氣色又工聽器物聲嘗至婺源邑士李熙仲家試其術使立户外而自登廊上鼔梯執兩椎敲擊數四乃呼入問之曰鼔有雙聲當應兩子弟喜慶事是歳淳熙十三年及秋試二子皆薦名祝不疑春渚紀聞近世士大夫棊無出三衢祝不疑之右者紹聖初不疑以計偕赴禮部至都為里人拉至寺庭觀國手栱劉仲甫在焉衆請不疑與仲甫就局始下三十餘子仲甫拱手曰敢問官人姓氏鄉里衆以信州李子明對仲甫曰仲甫雖不出國門聞衢州祝不疑先軰名品高著若審其人則今日適有客集不獲終局當俟親詣行館盡藝祗應也衆以實對仲甫再三嘆服曰名下無虛士後雖數相訪竟不復以棋為言蓋自知不敵恐貽國手之羞也葉茂實癸辛雜識三衢人造軟帳烟法以木作暖閣高足其上以紙罩地為帳高七八尺於閣下用椀數十貯油炷燈閉之宻室油氣透頂其輕且逺與他煤絶異膠法甚竒中用紫礦當歸秦芁腦麝畵燕支沒石子之𩔖蓋取其活膠而不滿也故經久而色光不少渝元沈裕楊維楨送沈裕序三衢沈生裕自其大父東臯子代為墨以絶藝繼古聞人之稱故裕所𫝊若有心法之秘者非人之所能識也顔輝畵法年紀字秋月江山人善畵道釋人物匏翁家藏集秋月畵鬼尤工筆法竒絶有八面生意明朱暉萬厯龍游縣志字徳明善天官家少從鄱陽趙友欽學得其革象新書日夜研究業遂精胡大海取金華暉獻平天下三䇿大海異之命領兵從攻衢州所撰有三振顯異經子謙齋尤精卜筮以術授方明明後以地理聞所葬地多驗時儼四友齋叢説字若思號晴川開化人以焦墨作山水人物皆可觀衢州府志儼嘗自題云書法即畵法也晦翁之秃筆禿而有致取妍則惑矣松江何良俊稱新安汪海雲法近正而墨氣逺不及儼他如蔣三松張平山輩俱不堪供揩抹其見推服如此伍子安正徳江山縣志㓜通經史長邃於醫請者如市皆不責報郡守張實薦為御醫所著有活人寳鑑十卷學士宋濓志其墓孫敬中尤能世其業療竒疾甚衆虞謙開化縣志號樵谷善琴嘗聽人讀大學聖經倚而譜之作商調曰讀書聲其高弟汪一恒為續中庸語孟之首篇知音者竟賞之徐暘常山縣志字用輝邑之東山人自其先梅友翁以醫名於宋至𤾉大顯善於脉理精窮㣲妙江山一少年每患陰雨骨疼暘診之曰隱毒深逺非遺體即胎體也其人愕然不省歸詢其母蓋孕時巨痏未全瘉也衆始神之又有徐氏婦患疾臥床暘診之曰此千日病藥與否期滿則起後果如其言余世規萬厯龍游縣志善軒岐術凡經其藥石者罔不獲效求者無貧富咸濟之衢州府志正統間授本學訓科祝望崇禎衢州府志號海鶴龍游人善琴為浙操之師尤長於詩嚴州府唐孫晤聞竒録家於七里瀨善葬法尤妙相墳即知其家貴賤貧富官禄人口數亦知穴中男女老少因某病而卒兼精三竒時楊集統師收復睦州至一巖下砦軍次忽一大石盤陊下楊占之曰此巖上有二十五人㸃兵收之獲居民二十人還楊曰合有二十五人何欠五人也民曰某等初聞大軍將至遂與二十五人同避於此内一人孫晤善卜到時立草舍畢有雙雉飛下孫曰軍至此矣宜徃别處不然遭擒某等不順其言有信之者四人相隨去矣楊曰得此人可師事之新定平後復在瀨上漁五代方生天中記錢元懿為新定時有士方生人號為龜精常疏卜辭以貽元懿曰太乙接天河金華寳貝多君候六十六别處下經過後皆如其言元李康續𢎞簡録字寧之桐廬人書畵琴奕冠絶一時林文耀建徳縣志字絅齋㓜即工書筆法遒勁中年失明臨池之興終不能忘乃剪紙為字勢飛動若龍蛇㸃畫不差毫髪人驟見之初不辨其為剪字也室人裝潢成軸易薪米以自給至今傳曰林剪稱絶技焉明方叔和嚴陵志字節之建徳人由儒醫授本府醫學正科精醫兼讀儒書成化中陞授御醫𢎞治四年奉㫖視岐王疾屢受白金文綺之賜八年陳乞歸田英國公張懋保國公朱永暨士大夫咸為文以贈吳嘉言萬厯嚴州府志分水人世以醫名盡得素難等書𤣥妙授太醫院吏目有名譽禮部尚書潘晟祭酒余有丁皆有贊贈所著有醫學統宗鍼灸原樞等書行世子學易亦以醫名後授雷州吏目仇鳳翔建徳縣志字敬寰㓜習醫比壯通悟方脉諸書尤善療小兒疾不用藥餌但視其經絡所至以手摩按令汗出立愈余徳遂安縣志字懋之精堪輿之學衢嚴之吉兆多其裁定同時周儼亦以地理學齊名温州府唐蔣直太平廣記永嘉人天寳十二載直云郡城内有白幕太守李江忽丁憂李欲歸江北蔣又云公至縉雲郡却回當有一緋一緑一碧人來相推按然終無事後果採訪使張愿着緋大理司直杜喬着緑判官張璘着碧來按遇赦而止宋葉谷春渚紀聞永嘉人作油烟墨絶妙與潭州胡景純相上下毛信卿圖繪寳鑑失其名温州人放意詩酒畵竹自給號篔山杭人得其片幅轉售於市輙争取之自言大竹畵形小竹畵意得法於趙牧之何生癸辛雜識平陽縣八丈村人雖為傭而能談五行有一士人以命來叩何云有孕方可免災問弄璋耶弄瓦耶答曰也弄璋也弄瓦不知為何等語而去後果孿生一男一女劉拱辰子萬厯温州府志永嘉人逸其名徽宗政和問以方技至京師甚見寵幸封為純和處士名其里曰純和里馬宋英畵史㑹要温州人至錢塘遊淨慈寺寫古松於壁題云磨殘一錠兩錠墨掃出千年萬年樹月明烏鵲誤飛來踏枝不着空歸去丁大全丞相賞其詩畵急命索之人忌其能悶不令出卒不遇此成詩讖作墨梅竹更妙釋仁舊浙江通志永嘉人善畵一夕夣見龍四百條自是益臻神妙每醉揮墨汁醒後乃補之人物花鳥形狀極肖元王振鵬畵法年紀字鵬梅永嘉人工山水畵史㑹要官至漕運千户界畫極工緻仁宗春愛之賜號孤雲處士道園學古録振鵬之學妙在界畫運筆和墨毫分縷析左右髙下俯仰曲折方圓平直曲盡其體而神氣飛動不為法拘嘗為大明宫圖以獻世稱神品陳時敏溫州府志瑞安人號復心有智慧通經史嘗玩後天圖及璇璣玉衡之説家設一石盆刻周天度於上自構巧法占之仍於髙山平衍處鑿竹為圭冬夏測景夜則仰觀星辰次舍雖遲留伏逆之難齊者推算皆晰時司天歴法頒行多不驗閩浙間盡用其歴稱為温歴至正壬辰正月朔日食榜示司天臺初食刻數時敏辨其差訛果如其言後徴不起薦其友張洙應命洙以其法入臺局正其舛誤臺歴遂得其宜陳相心楊維楨拆字説贈陳相心永嘉人以折字名於公卿間推原禍福考索成敗無不驗陳宗山両浙名賢録平陽人究心歴數遍遊江湖未得其要及歸欲受業於陳時敏適時敏卒得遺書研精覃思得不傳之妙於文字間時敏之徒所推歴多有舛訛宗山校正之十數年言歴者皆推宗山温州府志子子盛亦以通知歴數授歴官夏廸書畵譜字簡伯温州人工畵山水竹石明鄭希誠瑞安縣志年十八入山遇異人與語授以果老五星一帙為别自此意見旋發舉五星推之輙驗求推者填門其法問人生辰即書所生之七政四餘及千支化曜於盤上倒懸之仰觀至旬月人之壽夭禍福窮通歴歴言之錙銖不爽嘗與友對飲談及生命鄭曰明日我與汝各有官刑汝更倍之其友素信鄭乃拉避寳香山寺鄭曰不可避也第為之至期果有縣尉詣寺覔僧不至索得二人怒以為僧侶各杖之友私念竒驗顧鄭而笑尉怒倍杖之其占應率𩔖此卒後書不傳今所撰占詞七十二張行世永樂中汪庭訓效其術亦名取驗謝廷循萬厯温州府志永嘉人善繪永樂宣徳間恩賚最優授錦衣衛千户尋陞指揮郭純東里集永嘉人初名文通精繪事事太宗賜名純擢營繕所丞洪熙初陞閣門使水東日記長陵於畵最愛永嘉郭文通有言夏珪馬逺者輙斥之曰是殘山剰水宋偏安之物也何取焉東海集文通充内供奉宣廟嘗面促之畵不即執筆以死怵之對曰苦書樂畵寧死不敢草草上為霽威金子性萬厯温州府志永嘉人其先世嘗遇異人授以内消丸一方永樂六年取就内府藥院中制丸以進授太醫院未久賜鈔歸田養老虞君平樂清縣志其先永嘉人仕太醫院永樂初樂清大疫君平藥之悉愈邑人徳之遂留居焉子孫世其家包容永嘉縣志善書畵工篆章萬歴間授中書舍人張江陵當國雅愛重之一日以玊章相屬已鐫就促之急容怒磨而返焉遂拂衣歸周躔樂清縣志為人沉静工奕永嘉小鮑技絶天下獨稱其咄咄逼人乃心畏之虞侊温州府志永嘉人字君大工書真草篆隸無一不臻其妙萬歴間朱宗伯之蕃考入儒士上等凡宦遊於甌者無不禮重焉至今甌人善書者必以為得虞家筆法云兄岱亦以善書名處州府宋王伋括蒼彚記字肇卿一字孔彰其先汴人祖訥因議王朴金雞歴有差衆排之貶居江西贛州伋㓜務舉業再舉不利因棄家浪遊江湖愛龍泉山水遂家於松源伋生而穎悟明菅郭地理之學納交於何管鮑張諸家為之卜葬隨有何太宰管樞宻鮑制置張諫議者出卒後門人葉叔亮傳其所著心經及問答語録范純仁䟦之劉夣求陳亮贈術者劉夢求序括蒼劉夣求未嘗得邵氏先天數而知人休咎説㝠昧中事如燭照而面詰也或曰有術或曰是有神焉劉術行於三衢今遂為衢人士大夫之過衢者以不問夣求易卦為恨趙初暘兩浙名賢録字必復縉雲人生而神異右掌有雷使二紅字學道術能役使鬼神治疾無不愈歳旱呼吸可致雷雨時令小兒伸掌書一雷字握之開手則雷鳴兼能辟邪常賣雨於臨安市墨汁咒符雨㸃皆黒人皆稱為趙雷使毛梓孫松陽縣志字守庸崇禎處州府志好軒岐術受業於顧希武時御史吳叔潤病瘠環醫無措梓孫以數劑瘥之程恩與病惡寒已易梓孫曰可生使掘穽寘火設纊令臥其上覆以重衾用釡煮藥蒸之即起人以神醫目之陳言括蒼彚記字無擇青田人敏悟絶人長於方脉治病立效有不可捄者則預告以期晷無爽作三因方論研窮受病之源用藥之等醫者宗之其徒王碩為易簡并三論行世文獻通考言撰三因極一方六卷三因者謂内因外因不内外因其説出金匱要畧其所述方論徃徃皆古書也元張夣庚兩浙名賢録松陽人遇異人授易元末召居將幕推歩有驗後復垂簾於市賣卜一日有葉姓者無子多娶妾求卜夣庚以詩二句授之曰不是桃花貪結子更教人恨五更蜂持歸謂此老風字且不識何談理數乎其人豢蜂數十筒一旦蜂逸冐而收之忽集其面蟞而死人以為神明陳伯光劉基贈陳生序以醫名於括括故多良醫而伯光為能世其祖父業傳有之曰醫不三世不服其藥蓋其傳之也逺而試之也詳其可信而無惑也宜矣伯光嘗曰三才一理治道無二天地將病祲祥豫形人生將病氣色先徴病之將至其幾乃萌防徴遏幾百病不生幾動形見力倍功半知及此者其神人乎予甚韙其言祝定崇禎處州府志字伯静麗水人以醫術鳴洪武初授本府醫學提領轉正科註竇太師標幽賦醫學咸宗之陳徳顔書畵譜松陽人善畵真宋濓贈傳神陳徳顔序京都之間天下藝為之所萃至如徳顔者什伯之中僅一見焉鄭孟純兩浙名賢録麗水人多藝術尤精音律洪武初詔州縣儒學以雅樂釋奠頒其成書於天下時無知者孟純獨能按其音律以教諸生上聞而嘉之詔入成均與冷謙等共定一代之樂徐進括蒼彚記字公藴縉雲人性機巧學丹青尤精於寫神凡人一經目雖數十年後寫出逼真子廸得父術吳金陵括蒼彚記龍泉人字邦畿父遊太學生於金陵學舍因名讀書過目輙成誦善畵鷹妙傳神尤長於琴所著有畵鑑直指琴譜指南周漢卿名山藏松陽人以醫名括蒼蔣仲良為馬所蹄睛突出如懸桃羣工曰絲絡既損法當眢漢卿封以神膏越三日目如初華州陳明逺瞽十年矣漢卿曰尚可鍼為之翻睛刮翳欻然辨五色武城男子病胃痛不可忍奮擲乞死勿得漢卿納藥其鼻竅中俄吐出赤蟲寸餘口眼咸具痛旋止諸暨黄生背曲須杖行醫以風治之漢卿曰血澁也為刺兩足崑崙穴頃之技杖去其神效如此俞存熙崇禎處州府志龍泉人能詩善畵山水師事永嘉趙仕謙而筆趣過之永樂中召為金門畵士未幾引疾還子原澤亦善畵聶瑩括蒼彚記得湖州凌漢章針法針至病起雖厚衣可按穴而定不以錢帛介意人爭迎致之呂文英戒庵漫筆處州人孝宗朝畵士呂紀以翎毛呂文英以人物一時皆被恩寵人呼文英為小呂宋宗逺崇禎處州府志縉雲人丰儀峭古多術能文工畵山水筆格遒勁得烟巒之竒態為畵者所宗項賢輔兩浙名賢録龍泉人能詩工草書人有得其書以易鹽者商計字酬之毎字酬鹽百斤遂擅名一時稱曰草賢吳伯參括蒼彚記精太素脉指晰人修短禍福無勿驗浙江通志巻一百九十七
