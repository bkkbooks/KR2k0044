body:
  text: 浙江通志卷一百九十五寓賢下紹興府漢梅福漢書本傳字子真九江壽春人少學長安明尚書榖梁春秋為郡文學補南昌尉是時成帝委任大將軍王鳯王氏寖盛福上書譏切王氏不見納元始中王莽顓政福一朝棄妻子去九江傳以為仙其後有人見福於會稽變名姓為吳市門卒云袁忠後漢書袁安傳忠汝南汝陽人安之元孫與同郡范滂為友同陷獄得釋初平中為沛相乘葦舟到官以清亮稱及天下亂棄官客上虞嘗乘舟戴笠詣太守王朗見朗騶從繁麗鄙之即辭去後徵為衛尉未至卒子祕擊黃巾賊戰死詔旌其門許靖河南通志字文休平輿人於越新編靖舉孝廉與從兄邵俱有人倫之鑒董卓亂隱會稽後仕蜀纍官太傅陸璯江南通志字仲芳毗陵人明京氏易尚書尤精風角星算辟主簿謝病去隱會稽山蔡雍後漢書本傳字伯喈陳留圉人少博學好辭章數術天文妙操音律桓帝時五侯擅恣聞雍善鼓琴遂白天子敕陳留太守督促發遣雍不得已行到偃師稱疾而歸雍慮卒不免乃亡命江海遠迹吳會吳人有燒桐以㸑者雍聞火烈之聲知其良木因請而裁為琴果有美音而其尾猶焦故時人名曰焦尾琴注張騭文士傳雍告吳人曰吾昔嘗經會稽高遷亭見屋椽竹東間第十六可以為笛取用果有異聲兩浙名賢録雍書曹娥碑陰八字云黃絹幼婦外孫虀臼即其時也桓曄兩浙名賢録字文林龍亢人榮之五世孫舉孝廉方正皆不應初平中避地會稽止故魯相鍾離意舍越人化其節閭里不爭訟太守王朗給服食牛羊悉不受孔潛於越新編潛本宣聖十七代孫漢末避地會稽孔道隆孔覬皆其後也今世為山陰人三國王肅三國志王朗傳肅字子雍東海郡人輿地志王朗為會稽太守子肅隨之郡住東齋中夜有女子從地出稱越王女與語達旦臨别贈墨一丸肅方注周易多有滯思因此便覺才思開悟晉王羲之晉書本傳字逸少司徒導之從子年十三嘗謁周顗顗察而異之尤善𨽻書為古今之冠論者稱其筆勢以為飄若浮雲矯若驚龍起家祕書郎征西將軍庾亮稱羲之清貴有鑒裁遷寧遠將軍江州刺史羲之既少有美譽朝廷愛其才頻召為侍中吏部尚書皆不就乃以為右軍將軍會稽內史時殷浩與桓溫不協羲之以國家之安在於內外和因與浩書以誡之及浩將北伐羲之以書止之言甚切至浩果敗時東土飢荒羲之輒開倉賑貸朝廷賦役繁重吳會尤甚羲之尤上疏爭之雅好服食養性初渡浙江便有終焉之志會稽有佳山水名士多居之謝安未仕時亦居焉孫綽許詢李充支遁等皆以文義冠世並築室東土羲之嘗與同志宴集於會稽山陰之蘭亭自為序以申其志性愛鵝山陰道士養好鵝羲之往觀意甚悅固求市之道士云為寫道德經當舉羣相贈耳羲之欣然寫畢籠鵝而歸嘗在蕺山見一老姥持六角竹扇賣之羲之書其扇各為五字姥初有溫色因謂姥曰但言是王右軍書以求百錢姥如其言人競買之他日姥又持扇來羲之笑而不答既去官與東土人士盡山水之遊弋釣為娛又與道士許邁共修服食採藥石不遠千里遍遊東中諸郡窮諸名山泛滄海年五十九卒有七子知名者五人謝安晉書本傳字安石年四歲時桓彜見而嘆曰此兒風神秀徹後當不減王東海及總角神識沉敏風宇條暢王導亦深器之初辟司徒府除佐著作郎並以疾辭寓居會稽與王羲之及高陽許詢桑門支遁遊處出則漁弋山川入則言咏屬文無處世意常往臨安山中坐石室臨濬谷悠然嘆曰此亦伯夷何遠既纍辟不就安妻劉惔妹也見家門富貴而安獨靜退乃謂曰丈夫不如此也安掩鼻曰恐不免耳始有仕進意時年已四十餘征西大將軍桓溫請為司馬頃之徵拜侍中遷吏部尚書尋為尚書僕射加後將軍及中書令王坦之出為徐州刺史詔安總閲中書事安義存輔導時強敵寇境邊書續至安鎮以和靖馭以長算德政既行文武用命不存小察𢎞以大綱威懷外著人皆比之王導謂文雅過之苻堅強盛疆埸多虞安遣弟石及兄子玄等應機征討所在尅捷拜衛將軍開府儀同三司封建昌縣公性好音樂期喪不廢又於土山營墅樓館林竹甚盛每攜中外子姪往來遊集安雖受朝寄然東山之志始末不渝每形於言色雅志未就遂遇疾篤乃上疏遜位尋薨贈太傅諡文靖二子瑤琰瑤襲爵官至琅琊王友謝玄嵊縣志字幼度為叔父安所器重授散騎常侍會稽內史初玄父奕為剡令樂其山水有寓居之意玄因歸剡嶀山東北太康湖於江曲起樓樓側桐梓森鬱人號桐亭卒諡獻武葬始寧戴逵晉書本傳字安道譙國人少博學好談論善屬文能鼓琴工書畫其餘巧藝靡不畢綜總角時以雞卵汁溲白瓦屑作鄭玄碑又為文而自鐫之詞麗器妙時人莫不驚歎太宰武陵王晞聞其善鼓琴使人召之逵對使者破琴曰戴安道不為王門伶人後徙居會稽之剡縣性高潔嘗以禮度自處深以放達為非道乃為著論孝武帝時以散騎常侍國子博士纍徵辭不就郡縣數敦逼不已乃逃於吳吳國內史王珣有别館在武邱山逵潛詣一遊處積旬會稽內史謝玄慮逵遠遁不反上疏曰伏見譙國戴逵希心俗表不嬰世務雖䇿命屢加幽操不回陛下既已愛而器之宜使其身名並存請絶其召命帝許之逵復還剡後王珣為尚書僕射上疏復請徵為國子祭酒散騎常侍復不至太元十二年病卒長子勃有父風義熙初以散騎常侍徵不起王修齡世説名胡之常寓東山甚貧乏陶範為烏程令以米遺之不受直答云王修齡若飢自當就謝仁祖索食不須陶胡奴米孫統晉書孫楚傳楚孫統字承公太原中都人幼善屬文征北將軍禇裒聞其名命為參軍辭不就家於會稽性好山水乃求為鄞令居職不留心碎務縱意遊肆名山勝川靡不窮究後為餘姚令卒子騰嗣以博學著稱位至廷尉騰弟登少善名理注老子行於世仕至尚書郎孫綽晉書孫楚傳綽字興公博學善屬文少與高陽許詢俱有高尚之志居會稽遊放山水作遂初賦以致其意所居齋前種一株松恆自守護鄰人謂之曰樹子非不楚楚可憐但恐永無棟梁日耳綽答曰楓柳雖復合抱亦何所施耶嘗作天台山賦辭致甚工以示友人范榮期云卿試擲地當作金石聲徵拜太學博士遷散騎常侍領著作郎時大司馬桓溫將移都洛陽朝廷畏溫不敢為異人情疑懼並知不可莫敢先諫綽乃上疏桓溫見綽表不悅曰何不尋君遂初賦知人家國事耶尋轉廷尉卿領著作於時文士綽為其冠溫王郗庾之薨必須綽為碑文然後刋石焉許詢兩浙名賢録字玄度高陽人父旻為會稽內史因家焉詢有才藻善屬文能清言與太原孫綽齊名隱居不仕築室永興之南山蕭然自放一時名士無不傾慕劉惔嘗曰清風明月輒思玄度後終於剡山天中記許詢徵司徒掾不就乃杖䇿披裘憑樹構堂常與沙門支遁謝安石等同遊阮裕晉書阮籍傳裕字思曠陳留尉氏人居會稽剡縣拜臨海太守少時去職復除東陽太守尋徵侍中不就還剡山有肥遁之志有以問王羲之羲之曰此公近不驚寵辱雖古之沉冥何以過此在剡曾有好車借無不給有人葬母意欲借而不敢言後裕聞之乃嘆曰吾有車而使人不敢借何以車為遂焚之久之復徵散騎常侍金紫光祿太夫並無所就或問裕曰子屢辭徵聘而宰二郡何邪裕曰屢辭王命非敢為高也吾少無宦情兼拙於人間既不能躬耕自活必有所資故曲躬二郡耳孫盛晉書本傳字安國太原中都人父恂穎川太守在郡遇賊被害盛年十歲避難渡江及長博學善言名理於時殷浩擅名一時與抗論者惟盛而已盛嘗詣浩談論對食奮擲塵尾毛悉落飯中食冷而復暖者數四至暮忘食理竟不定由是知名起家佐著作郎桓溫伐蜀以盛為參軍賜爵安懷縣侯出補長沙太守篤學不倦自少至老手不釋卷著晉陽秋詞直理正咸稱良史兩浙名賢録盛渡江居於會稽南北朝王𢎞之宋書本傳字方平琅琊臨沂人少孤貧為外祖徵士何準所育從叔獻之及太原王恭並貴重之性好山水求為烏程令尋以病歸荆州刺史桓偉請為南蠻長史義熙初年何無忌又請為右軍司馬高祖命為徐州治中從事史除員外散騎常侍並不就家在會稽上虞從兄敬𢎞為吏部尚書奏為庶子不就乂陳𢎞之高行苦節宜招空谷以敦沖退之美元嘉四年徵為通直散騎常侍又不就敬𢎞常解貂裘與之即著以采藥性好釣上虞江有一處名三石頭𢎞之常垂綸於此經過者不識之或問漁師得魚賣否𢎞之曰亦自不得得亦不賣日夕載魚入郭經親故門各以一兩頭置門內而去始寧汰川有佳山水𢎞之依巖築室謝靈運顔延之並相欽重卒年六十三孔淳之南史本傳字彥深魯人也少高尚愛墳籍居會稽剡縣性好山水每有所遊必窮其幽峻或旬日忘歸除著作佐郎太尉參軍並不就居喪至孝廬於墓側服闋與徵士戴顒王𢎞之王敬𢎞等共為人外之遊會稽太守謝方明苦要之不能致使謂曰茍不入吾郡何為入吾郭淳之笑曰潛遊者不識其水巢棲者非辨其林飛沉所至何問其主終不肯往茅室蓬户庭草蕪徑惟床上有數帙書元嘉初復徵為散騎常侍郎乃逃於上虞縣界家人莫知所在阮萬齡宋書本傳陳留尉氏人少知名自通直郎為孟昶建威長史時袁豹江夷相繼為昶司馬時人謂昶府有三素望萬齡家在會稽剡縣頗有素情永初末自侍中解職東歸徵為祕書監加給事中不就元嘉二十五年卒年七十二何胤梁書本傳字子季點之弟也廬江灊人師事沛國劉瓛受易及禮記毛詩又入鍾山定林寺聽內典其業皆通起家齊祕書郎永明十年遷侍中鬱林嗣位胤為后族甚見親待胤雖貴顯常懷止足建武初已築室郊外恆與學徒遊處其內至是遂賣園宅欲入東山拜表辭職詔許之胤以會稽山多靈異往遊焉居若邪山雲門寺初胤二兄求點並棲遁求先卒至是胤又隱世號點為大山胤為小山求曰東山永元中徵太常不就高祖踐阼詔為特進光祿大夫遣領軍司馬王果宣旨諭意果至胤單衣廢巾執經卷下床跪受詔書因謂果曰吾年已五十七月食四斗米不盡何容得有宦情果還奏聞乃敕聚徒受業於是遣何子朗孔壽等於東山受學胤以若耶迫隘不容生徒乃遷秦望山山有飛泉西起學舍即林成楥因巖為堵别為小閣室寢處其中躬自啓閉童僕無得至者還吳居虎邱西寺學徒復隨之大通三年卒年八十六王籍梁書本傳字文海琅琊臨沂人七歲能屬文及長好學博涉有才氣樂安任昉見而稱之嘗於沈約坐賦詠得燭甚為約賞天監初除安南王主簿厯餘姚錢塘令並以放免久之除湘東王咨議參軍隨府會稽郡境有雲門天柱山籍嘗遊之或纍月不返至若耶溪賦詩其略云蟬噪林逾靜鳥鳴山更幽當時以為文外獨絶還為大司馬從事中郎遷中散大夫卒江總陳書本傳字總持濟陽考城人幼聰敏有至性及長篤學有辭采家傳賜書數千卷總晝夜尋讀未嘗輟年十八解褐丹陽尹何敬容開府除敬容府主簿遷尚書殿中郎范陽張纘琅琊王筠南陽劉之遴並高才碩學雅相推重為忘年交侯景寇東都總避難會稽郡憩龍華寺乃製修心賦其略云太清四年秋七月避地於會稽龍華寺此伽藍者余六世祖宋尚書僕射州陵侯元嘉二十四年之所構也侯之王父晉護軍將軍彪昔蒞此邦卜居山陰都賜里貽厥子孫有終焉之志寺域則宅之舊基左江右湖面山背壑東西連跨南北縈紆聊與苦節名僧同銷日月䁱修經戒夕覽圖書寢處風雲憑棲水月情可知矣元帝平侯景徵為明威將軍始興內史陳天嘉四年以中書侍郎徵還朝入隋為上開府開皇十四年卒辛普明於越新編河南人僑居山陰少就關康之受業家貧與兄共處一帳兄亡以帳圍柩蚊多不得寢處之怡然及葬鄉人爭以金賻後至者不復受人問之答曰本以兄墓不周故不逆親友之意今葬費已足豈可利餘贈耶徵為議曹從事不就王知元陳書孝行傳高宗世有太原王知元者僑居於會稽剡縣居家以孝聞及丁父憂哀毁而卒高宗嘉之詔改其所居清苦里為孝家里唐李白唐書本傳字太白其先隋末以罪徙西域神龍初遁還客巴西白之生夢長庚星因以命之十歲通詩書既長隱岷山州舉有道不應喜縱橫術擊劍為任俠輕財重施更客任城與孔巢父韓凖裴政張叔明陶沔居徂徠山號竹溪六逸天寶初南入會稽與吳筠善筠被召故白亦至長安往見賀知章知章見其文嘆曰子謫仙人也言於玄宗召見金鑾殿供奉翰林朱放全唐詩選傳字長通襄州人隱於越之剡溪嗣曹王臯鎮江西辟節度參謀貞元初召為拾遺不就陸參兩浙名賢録字公佐吳郡人蚤孤與兄隱居於會稽有佳山水率子弟耕汲其中因修桑門之法擯落人事貞元初兄既歿始為宗姻士友所強慨然有應世之心由試佐環衛厯大理評事攝監察御史後徵拜祠部員外郎出為歙州刺史參為人器度夷遠同心定交造次以之從善親仁發於肺腑文章𢎞朗有作者風齊抗嵊縣志字遐舉高陽人少值天寶亂奉母居會稽初棲剡嶺後遷玉笥山未二紀而登台鉉李紳全唐詩録傳字公垂亳州人嵊縣志貞元十八年紳為布衣東遊天台過剡令崔某座中有僧修真謂曰君異日必當鎮此修豫所居元和三年紳以前進士為故薛蘋常侍招致越中真已卧疾使人相告幸勿忘前言太和癸丑紳以檢校左騎省廉察蒞越果符其言僧徒悉殂謝寺更頽毁因捐錢三十萬率諸僚施俸以飾寺字工成紳有龍藏寺記宋劉安世宋史本傳字器之魏人登進士第不就選從學於司馬光咨盡心行已之要光入相薦為祕書省正字後宣和六年待制中書舍人安世儀狀魁碩音吐如鐘正色立朝扶持公道一時無不敬懾家居未嘗有惰容久坐身不傾倚作字不草書不好聲色貨利其忠孝正直皆則象司馬光年既老名賢略盡而巋然獨存名望益重成化新昌縣志安世母太常博士新昌石亞之女故自幼遊學新昌石溪義孰韓肖胄宋史本傳字似夫祁州安陽人以蔭補承務郎徽宗問其家世賜同上舍出身紹興三年拜端明殿學士充通問使至金國金人知其家世甚重之往返才半年與朱勝非議不合力求去以舊職知溫州提舉臨安府洞霄宮五年除資政殿學士知紹興府尋奉祠與其弟應胄寓居於越幾十年事母以孝聞卒諡元穆夏榮萬厯上虞縣志字子顯世居汴梁以詩禮名家俯就武職髙宗南渡扈駕東征髙橋之戰身被五十餘創忠憤益奮大呼而進金兵大敗遁去封兩浙制置使守越後退老上虞諡曰英周靖李大同周博士墓志字天錫先本南康人幼通敏好古善屬文舉宣和進士主中江簿轉郴州録事遏於守帥多掣肘靖守法不阿常預內銓已而靖康之亂乃以宗社大計關白大臣欲投書闕下當事者沮之靖知勢不可為遂棄歸紹興間薦章交上遂起為國子正録進本監博士三舍弟子業成而仕後多知名居無何力丐罷官得諸暨意其有中州風遂徙居之尹焞宋史本傳字彥明世為洛人少師事程頤嘗應舉發䇿有誅元祐諸臣議焞曰噫尚可以干祿乎哉不對而出於是終身不就舉靖康初召至京師賜號和靖處士紹興八年除太常少卿未幾稱疾九年以徽猷閣待制兼侍講召又辭秦檜當國見焞議和疏不樂遂不復留於越新編焞壻邢純迎養於越卒因葬焉今其祠在大夫橋榜曰古小學程迥宋史本傳字可久寧陵人靖康之亂徙紹興之餘姚孤貧漂泊無以自振二十餘始知讀書時西北士大夫多在錢塘迥得以考德問業焉登隆興元年進士所著有易傳外傳春秋傳顯微例目論語傳孟子章句文史評經史説諸論辨卒官朝奉郎曾怘東都事略字仲常鞏之孫補太常內舍生以父任郊社齋郎纍官司農丞通判溫州須次於越金人陷越以琶八為帥約詰旦文武官並詣府有不至及藏密不覺察者皆死怘獨不往為鄰人糾察逮捕詞氣不屈時金人帳中執兵者皆愕眙相視琶八曰且令出左右盡驅其家屬四十口同日殺之越南門外越人作窖瘞其尸金人去怘弟朝散郎􅘔知杭州餘杭縣置大棺斂其骨葬天柱山胡直孺兩浙名賢録字少汲華林人紹聖間進士纍遷工部尚書郎以龍圖閣學士知洪州率兵禦金人於營邱斬首干級高宗即位赴行在改刑部尚書奉敕治會稽攢宮因留家焉卒葬雲門曰水塘有西山老人集行世王俁兩浙名賢録字碩夫宛邱人政和二年進士厯監察御史建炎初扈蹕南渡遂家餘姚召拜右司員外郎紹興初命左右條具改正崇觀以來濫恩諸失職者為飛語上聞免官秦檜專國俁家居一十八年檜死起知明州厯工部尚書尋乞身歸王琰萬厯紹興府志字剛夫臨川人父榕為諸暨令遂家焉敏悟絶人博洽墳典由分寧尉纍遷知衡州所至有聲胡銓嘗薦之有曰治經有行亞西漢之名儒悃愊無華實東都之循吏兄瑊字寶臣知通州行業與琰齊名宋延祖兩浙名賢録字嗣宗濟南人建炎南渡因家上虞紹興中登進士官國子主簿除權給事繳駁奏論無顧避改諫議大夫兼侍讀遷兵部尚書延祖以公忠受知不三年而登八座自謂遭時遇主知無不言以讜直稱陳知柔福建通志永春人紹興進士授台州判官與秦檜子同榜檜當軸前列十餘人以扳援致通顯知柔獨不阿附以故齟齬雅好山水自天台至會稽耽其巖壑留二年所著有易本旨易大傳春秋義例詩聲譜論語後傳詩話古賦雜著曾幾傳詳名宦宋史本傳初家河南紹興末官浙東因居越禹迹寺未幾擢其子逮為浙西提刑迎養於官卒葬山陰鳯凰山羅從彥於越新編字仲素南劍人聞楊時得程氏學慨然慕之時令蕭山從彥徒步往從之即驚汗浹背曰不至是幾虛過一生矣久之卒業學者稱豫章先生王希呂傳詳名宦兩浙名賢録希呂移家會稽貧不能廬寓僧舍孝宗聞之賜地一區錢六百萬緡令有司治第於越之東隅子孫世居焉即今所稱後衙池也孟載兩浙名賢録鄒國四十八代孫高宗時扈駕南渡授環衛上將軍家諸暨卒贈太尉高世則山陰縣志字仲貽汴人扈從高宗南渡領越州觀察使紹興改元除保靜軍承宣使提舉萬壽觀詔令編類元帥府事迹寓居越州山陰之禹會鄉帝遣中使時給俸祿後加少保開府溫州子干之祕閣修撰世家於越張孝伯萬厯紹興府志厯陽人父寺丞寓蕭山因家焉孝伯登進士仕至同知樞密院事嘉泰四年進參知政事尋罷歸時韓托胄方嚴偽學之禁貶斥正人無虛日孝伯謂托胄曰不弛黨禁恐後不免報復之禍托胄然之自是黨禁寢解正人始有所容言通兩浙名賢録字宗文本吳人文學子遊之裔咸淳二年以敷文閣學士知紹興悅其山水之秀遂卜居北鄉子孫遂為山陰人王銍兩浙名賢録字性之汝陰人寓居剡中善屬文不樂仕進讀書五行俱下藏書滿架既卒秦檜子熹屬部將索所藏書許官其子銍子泣拒之曰願守此書以死不願官也熹竟不能奪元斡勒海壽寓厯紹興府志字允常河南人後家山陰剛正有志節拜監察御史劾奏殿中侍御史哈瑪爾及其弟舒蘇罪惡直聲震中外官至浙東廉訪使貢性之江南通志字友初師泰之子明初徵録師泰後有以性之薦者性之改名悅避居會稽耕漁自給邑人芮麟嘗遇之邀與俱歸辭以詩云遊絲落絮都成恨社燕秋鴻各自飛既卒門人私諡之曰貞晦先生鐂渙列朝詩集字彥亨號石田世家雒陽後為越人通毛氏詩至正間御史林奧薦為三茅書院山長道梗不赴老以詩酒自娛子績孫師邵皆有才名戴時才兩浙名賢録字仲文鄱陽人至正間薄遊兩淮買舟南下渡錢塘觀胥濤直抵蕭山探五泄之奇遂忘身世竟卜居湘湖之濱以登涉吟咏自娛人稱為南坡老人明邵伯正兩浙名賢録汴人洪武初徙家嵊縣由鄉舉為南京户部員外郎以廉能稱尋有令江浙人不得官户部遂謝事歸杜門好書善敦族明宗纂敘圖系剡俗為之歸厚云高啓紹興府志字季迪姑蘇人為吳下詩宗元季避地蕭山後還姑蘇其詩文有缶鳴槎軒等集蔡運會稽縣志南康人以貢起家厯官四川參政清徑直諒不諧於俗罷歸壬午靖難後剃髮為僧至會稽雲門寺寓焉紹興府志寓雲門寺不言其由每從一童子攜茗具筆牀泛舟四遊賦詩滿袖歸則焚之不留一字耶溪樵者會稽縣志永樂初一樵者寓耶溪日鬻薪兩束食足則已食已往畫詩溪沙上畫已輒亂其詩人怪之表忠録名廖平襄陽人建文時官兵部侍郎黃省曾名山藏字勉之吳人以詩經魁南都舉進士不第遂棄去自號五嶽山人是時王守仁講學越中省曾遊餘姚執贄道席每班坐請疑問至即答無不洞中生平不樂組綬杜門著書海內名耆若李夢陽康海王廷相楊一清霍韜輩或以翰札見知或以經濟加器聲噪一時高𢎞圖會稽縣志山東人萬厯戊戌進士講學東林寓居會稽明末絶粒死薑埰會稽縣志字如農山東萊陽人崇禎辛未進士屢遷吏部給事中時內豎指斥東林倪元璐等埰奏是小人傾陷君子帝大怒子杖劉宗周疏救謫戍邊海赦歸同弟垓奉母寓會稽章閭家曲盡孝養國朝王正中餘姚縣志字仲撝保定人崇禎丁丑進士知餘姚因家焉正中不事文彩好讀實用之書從閩人柯仲炯受天官之學談之往往有驗蔣平階紹興府志字大鴻華亭人明末華亭夏允彝青浦陳子龍主幾社見平階大驚亟邀入社後服黃冠假青烏之術東至齊魯登泰岱謁孔林轉徙吳越間樂會稽山水遂家焉詩文詳贍典麗以西京盛唐為要歸於書博覽洞究無遺著書十餘種卷以百計歿葬若耶樵風涇台州府晉李廞世説字宗子江夏鍾武人清貞有遠操少羸病不肯婚宦居在臨海住兄侍中墓下既有高名王丞相欲招禮之辟為府掾廞得箋命笑曰茂𢎞乃復以一爵加人湖廣通志廞好學善草隸足疾不能行常仰卧彈琴讀書不輟江逌晉書本傳字道載陳留圉人避蘇峻之亂屏居臨海翦茅結宇耽玩載籍有終焉之志中軍將軍殷浩將謀北伐請為咨議參軍甚重之遷長史甚為匡弼之益軍中書檄皆以委逌及桓溫奏廢浩佐吏逌遂免升平中遷吏部郎兼侍中纍讓不許逌在職多所匡諫著阮籍序贊逸士針及詩賦奏議數十篇行於世子蔚吳興太守南北朝庾肩吾兩浙名賢録新野人南齊庾信之父隱居天台信留周歲雖致通顯每多鄉關之思故作哀江南賦以致其意有云少微真人天台逸民階庭空谷門巷蒲輪移談講樹就簡書筠降生世德載誕貞臣文詞高於甲觀模楷盛於漳濱蓋頌父也王元規南史本傳字正範太原晉陽人八嵗而孤隨母依舅氏往臨海郡性孝事母甚謹晨昏未嘗離左右時山陰縣有暴水漂流居宅元規惟有一小船倉卒引其母妹并姑姪入船元規自執楫棹而去留其男女三人閣於樹杪及水退俱獲全時人稱其至行仕梁位中軍陳天嘉中領國子助教入隋卒於秦王府東閣祭酒唐王展天台山方外志不知何許人寓天台項斯有懷王展詩云赤城山下路無計得相隨嘗撰白郎巖記謹案天台方外志寓賢中載唐周朴泉州人寓天台死黃巢之亂查全唐詩録朴吳興人避地福州黃巢寇閩欲降之不從遂見害是朴本浙人流寓閩中非閩人寓浙也舊通志作周辨更謬今刪曹唐全唐詩録傳字堯賓桂州人天台山方外志寓天台以能詩名後為荆湘從事賦桃源詩膾炙人口任藩書目解題藩或作翻客居天台有宿帢幘山絶句為人所稱今城中巾子山也宋呂頤浩傳詳名宦赤城志頤浩其先樂陵人建炎四年寓臨海韓昭赤城志字用晦真定人丞相縝之曾孫官至直顯謨閣自號大同居士紹興初避地仙居仙居縣志昭隱於安州山陳與義宋史本傳字去非洛陽人登政和三年上舍甲科紹興元年知湖州七年參知政事上曰今梓宮與太后淵聖皆未還若不與金議和則無可還之理與義曰若和議成豈不賢於用兵萬一無成則用兵必不免從帝如建康明年扈蹕還臨安復知湖州遂請間提舉臨安洞霄宮卒與義長於詩體物寓興清邃紆餘上下陶謝韋栁之間嘗賦墨梅徽宗嘉賞之以是受知方輿勝覽號簡齋建炎中避地臨海陳瓘宋史本傳字瑩中南劍州沙縣人中甲科調湖州掌書記簽書越州判官通判明州徽宗即位召為右正言左司諌極論蔡卞章惇安惇邢恕之罪遷右司員外郎崇寧中除名瓘嘗著尊堯集謂紹聖史官專據王安石日録改修神宗史變亂是非不可傳信深明誣妄以正君臣之義張商英為相取其書既上而商英罷徙台州在台五年乃得自便宣和六年卒高宗謂輔臣曰陳瓘昔為諫官甚有讜議所著尊堯集明君臣之大分合於易天尊地卑及春秋尊王之法宜特賜諡以表之諡曰忠肅綦崇禮傳詳名宦尚友録崇禮退居台州賓客一介之士亦厚禮之故家子弟淪落者推橐金以濟之范宗尹宋史本傳字覺民襄陽鄧城人宣和三年進士建炎元年召為中書舍人遷御史中丞拜參知政事呂頤浩罷相宗尹攝其位時年三十宰相年少未有如宗尹者秦檜擠宗尹遂落職未幾命知溫州退居天台汪藻傳詳名宦天台縣志建炎中避地居台有道中詩浮溪集胡世將宋史本傳字承公常州晉陵人登崇寧五年進士臨海縣志嘗為兵部侍郎建炎中謫居台州題名巾子山及遊天柱寺有詩官終資政殿學士許仁天台縣志字性初巨野人從楊龜山遊登宣和何渙榜進士厯監察御史隨蹕南渡建炎初以右朝請大夫集英殿修撰知臨安府疏劾黃潛善汪伯彥直道不容於朝因偕修武郎趙士佇遊台山卜居於邑之墨湖建思敬堂金波亭所著有靈溪新紀編及奏疏若干卷馮原台州府志河間人祖寶以武德大夫從高宗南渡父安國以蔭厯官浙東觀察使巡視松門市舶卒於台賜葬赤城山原為機宜文字官家臨海之長樂鄉李龜朋赤城志字才翁長安人與兄龜年齊名中特科監南嶽廟紹興末寓居臨海郭仲荀赤城志字傅師洛陽人官至太尉慶遠軍節度使殿前都指揮使紹興中流寓臨海李擢赤城志字德升奉符人元符三年中第官至禮部尚書徽猷閣直學士紹興初寓臨海翟汝文傳詳名宦臨海縣志紹興二年與其子耆年偕來寓兜率寺有丹陽集行於世賀允中赤城志字子忱上蔡人厯資政殿大學士參知政事紹興初寓居天台萬年寺後徙臨海有應心泉記墓在天台縣一都張師正赤城志字子正大梁人宣和間官至都統制紹興中家於台蔡向赤城志字瞻明東平人挺之孫紹興初提舉本路常平因寓臨海自號淨空居士有繪水集藏於家薑詵赤城志字廷言長山人官至寶文閣直學士通議大夫贈少師紹興中寓居臨海子處度知惠州孫注大理丞成大亨台州府志字正仲河間人元符二年中第官至左朝請大夫直祕閣紹興初寓天台桑莊赤城志字公肅高郵人知栁州紹興初寓天台曾幾志其墓有茹芝廣覽三百卷藏於家子世昌自號莫葊有文集三十卷曹勛台州府志字公顯陽翟人宣和五年賜甲科以武義大夫從徽宗北遷過河奉徽宗御衣書自燕山間行詣康王高宗泣以示輔臣勛建議募死士航海入金奉徽宗由海道歸執政難之出勛於外兩赴金國正使何鑄伏地不能言勛反覆開論金主首肯以梓宮及太后歸孝宗朝加太尉贈太師葬臨海顯恩寺北嘉靖浙江通志紹興中寓天台子耜工部郎中知蘄州耘利州觀察使于恕太平縣志字忠甫諸城人紹興中以父定遠為州判官寓居邑之桃夏中特科厯官靖安尉昌國簿受學於張九成九成謫嶺表恕裹糧從之無豪於詩有文集數十卷林景憲文獻通考東魯林景獻初寓吳興從徐度敦立遊後為參政賀允中子忱孫壻寓臨海為人高尚詩清淡五言四韻古句尤佳逼陶謝梁溪尤延之誠齊楊廷秀為之序謹按赤城志作林憲舊浙江通志作林憲章未詳孰是楊棟宋史本傳字元極眉州青城人紹定二年進士第二授祕書省正字擢太子詹事兼修國史實録拜參知政事台州守王華甫建上蔡書院言於朝乞棟為山主詔從之因卜居於台尋奉祠以資政殿大學士充萬壽觀使所著有崇道集平舟文集謝伋黃巖縣志字景思上蔡人參政克家之子官至太常少卿紹興初侍父寓居靈石後寓三童號藥竂居士有文集葉水心為序初秦檜罷御批云秦檜不知治體信任匪人人心大搖怨讟載路後檜復柄意札在伋所有旨下台州追索擇酷吏劉景為守視事次日即遣吏追逮伋自分必死將抵郡城坐舟中望景郊迎相見執禮甚恭蓋景已得檜訃矣踰旬日伋拜處州之命楊揆黃巖縣志字子才真定人守楚州日秦檜初自金還泛海至楚揆疑其詐欲斬之所親者謂曰萬一果然朝廷知之非便不若津遣赴行在真偽自辨矣於是遣人陰加防護送至會稽檜既相揆屏迹黃巖踰二十年檜死高宗記其姓名召為工部侍郎敷文閣待制陳良弼太平縣志字希説祥符人以父繹恩補內黃門事宣和五年提舉京城增修城濠賜玉帶銀絹高宗於南都正位奔赴行在除寶慶承宣使尋致仕買舟順流而下抵邑境居焉卒贈平信軍節度使諡忠簡葬慶恩寺東有石碑洪擬傳詳名宦寧海縣志靖康間避地寧海遂家焉卒葬縣北項嶴趙不柔天台縣志字正之開封人安康郡王士説之子悼其父死靖康之難不樂仕進秦檜當國招之不出官至承事郎通判潮州紹興初避地於台孫汝遇淳熙十四年中第知吉州汝適慶元二年中第提舉福建市舶後徙臨海李彚天台縣志字推之覃懷人紹興九年通判州事寓家於台官至朝議大夫范開台州府志字宣之河陽人為洪邁辛棄疾所器重嘉定中寓居於台元卜元吉台州府志河西唐古氏寓天台鄉試副榜任慶元路翁洲書院山長明東湖樵夫臨海縣志不知姓名革除間採樵東湖上負薪入市口不二價成祖登極詔至臨海樵夫遂投湖中而死後人立亭湖上以祀之陸修正黃巖縣志號草屋吳郡人寓居盤馬善屬文時人稱為草屋先生有文集行世王顯方孝孺漁溪子傳號漁溪子江寧人少脫略不拘讀書不肯事帖括嘗遊寓天台與林右張轂景善右善擊劍長於為文轂放於歌詩二人皆自負一世顯嘗釣海濱望見二人踞坐大笑二人者知其非庸人也即與之語大驚異相辨難上下古今事折衷損益根據理道識者知其非狂生或又疑其為神仙中人云王彝列朝詩集傳字常宗其先蜀人父官崑山教授召修元史賜金幣以母老乞歸彝少孤貧讀書天台山中師事王真文得蘭溪金文安之傳學有端緒嘗著論力詆楊廉夫有三近齋稿范用修仙居縣志滇人舉孝廉將試春官會父以非罪見斥因不果北上窮山海披霜露﨑嶇險阻越數載方遘父尸歸葬應司寇容菴見其孝以女姪妻之為卜築麻姑山麓挈家居焉善畫人得其片紙珍若拱璧孫震台州府志字魯山桐城人由進士纍官兵部尚書明末避地仙居二都方宅後復移寓一都安寧有煙霞皆物外雞犬即仙家之句孫鼎徵臨海縣志字調宰號泖漁松江人崇禎時避居臨海能詩善畫有二子任安任昌皆以翰墨名金華府漢文臺名勝志字高明嘗討赤眉還誅新莽功成造鐵船遊東海見石帆於永嘉遍厯名山而歿於婺今白沙村有昭利王廟即此晉江惇晉書本傳字思悛陳留圉人孝友淳粹高節邁俗性好學每以為君子立行應依禮而動雖隱顯殊迹未有不傍禮教者也若乃放達不羈以肆縱為貴者非但動違禮法亦道之所棄乃著通道崇檢論世咸稱之蘇峻之亂避地東陽山太尉郗鑒檄為兖州治中征西將軍庾亮請為儒林將軍皆不就邑里宗其道有事必咨而後行東陽太守阮裕深相欽重養志二十餘年永和九年卒朱泛明一統志沛國朱雲之後永興中為臨海太守有政聲秩滿居蒲墟村遂為義烏人萬厯義烏縣志字孝祥曾孫幼揚州刺史治揚有功南北朝匡昕南史本傳字令先廬陵人有至性隱金華山服食不與俗人交母病亡已經日昕奔還號呌母即蘇人以為孝感所致劉峻梁書本傳字孝標平原人好學家貧讀書終夜不寐清河崔慰祖謂之書淫天監初召入西省典校祕書安成王秀引為戶曹參軍給其書籍使鈔録事類名曰類苑未及成以疾去因遊東陽紫陽巖築室居焉為山棲志其文甚美普通二年卒諡曰玄靖先生顧野王陳書本傳字希馮吳郡吳人幼好學七歲讀五經知大旨九歲能屬文長而遍觀經史天文地理無所不通梁大同四年除太學博士侯景之亂丁父憂歸乃召募鄉黨數百人隨義軍援京師體素清羸又居喪過毁殆不勝衣乃杖戈披甲陳君臣之義逆順之理抗辭作色見者莫不壯之逃會稽尋往東陽與劉福義合軍據城拒賊侯景平太尉王僧辨深嘉之陳天嘉元年補撰史學士太建六年除太子率更令時濟陽江總吳國陸瓊北地傅縡吳興姚察並以才學顯著論者推重焉唐韋莊婺書字端巳京兆杜陵人見素之孫乾寧進士授校書郎避亂客婺有和陸諫議懷山居詩曰望闕路仍遠子牟魂欲飛道開燒藥鼎僧寄卧雲衣故國饒芳草他山挂夕暉東陽雖勝地王粲奈思歸五代蔣勛十國春秋晉吳郡太守樞之後唐末避地婺州之東陽仕至金紫光祿大夫檢校司空兼御史大夫遂家焉宋王彥超兩浙名賢録臨清人徙居義烏之鳯林少事後唐厯晉至周顯德中纍官永興軍節度移鎮鳯翔宋初與太祖有舊遷為右金吾衛上將軍判街仗事初彥超自節鎮來朝與郭從義等侍宴太祖從容謂曰卿等皆國家舊臣久臨劇鎮非朕所以優賢之意彥超知旨即日解官時議許之周常宋史本傳字仲修建州人中進士第徽宗召為國子祭酒進中書舍人禮部侍郎蔡京用事不能容以寶文閣待制知湖州尋奪職居婺州楊時傳詳名宦舊浙江通志紹興間寓金華潘默成從之遊時王師愈方幼穎悟默成攜見龜山出論語傳相示師愈拜而受之呂弸中嘉靖金華縣志夷簡五世孫父好問尚書右丞弸中隨高宗南渡始居婺州子祖謙生於桂林甥館其學本之家庭得中原文獻之傳蘇遲金華賢達傳字伯充眉山人轍長子建炎二年以右朝請大夫直祕閣知婺州奏減稅額父老為立生祠因家焉卒葬蘭溪靈洞後贈少傅婺之蘇氏始此子簡䇿鄭淮浦陽人物記白麟十九世孫其先居榮陽遷浦陽遂為浦陽感德人孫綺字宗文事父母至孝厥後子孫同居六世厯二百年傅雱浦陽人物記世居汴父大理評事瑄攜雱遷浦陽之感德雱多膽略與李綱宗澤遊建炎元年遣雱為祈請使高宗命李綱草二帝表付雱以行獻二帝衣各一襲雱與王倫俱留金軍久之全節以歸官至工部侍郎賈廷佐兩浙名賢録字子野真定人剛毅有大節宣和二年入太學隨父淵扈蹕南渡遂家東陽登紹興二年進士授桐廬簿時金遣張通古偕王倫南來以詔諭江南為名廷佐一再上書纍千餘言劇論讐恥之不可忘名分之不可貶和約之不可信請誅王倫決意用兵以圖恢復辭旨剴切纍官大理司直出知處州致仕所著有善願集愚齋雜著若干卷栁森浦陽人物記河東人建炎中父鑄始從趙林自解遷杭森又自杭遷浦陽烏蜀山森子金擢咸淳三年進士為高郵令宋季城竇山民倡亂火金所居官欲盡斬之金惻然曰此豈其本心哉苐為飢寒所驅爾乃白戮其魁餘悉縱不問衆感金造室廬還之生子貫鞏庭芝正德武義縣志字德秀東平須城人建炎間遷居武義人號山堂先生登紹興八年進士第授建德主簿改秩知諸暨縣主管崇道觀升太平録事參軍嘗受業於劉元城先生之門以道學倡武義武義人士知尚理義之學自庭芝始隆興二年卒贈大中大夫趙相名勝志洛陽人紹興間帥廬州死於酈瓊之難子孫居婺州梵嚴寺殯焉王渙之明一統志大名人父良儒紹興間知永康因家焉又徙武義渙之幼穎悟能文嘗作王氏敘傳馬任仲明一統志建陽人從朱文公遊紹興間中進士乙科寓居東陽厯官州縣以廉能見稱所著有奏議雜著得齋集陸九齡宋史本傳字子壽居撫州之金溪幼穎悟端重稍長補郡學弟子員時秦檜當國無道程氏學者九齡獨尊其説登乾道五年進士第調桂陽軍教授改興國軍地濱大江俗儉嗇而鮮知學九齡不以職間自佚益嚴規矩肅衣冠如臨大衆勸綏引翼士類興起調全州教授未上得疾卒九齡治家有法閨門之內儼在朝廷而忠敬樂易鄉人化之皆遜弟焉與弟九淵相為師友學者號二陸舊浙江通志乾道九年八月來婺與東萊相會同觀實録淳熙六年復來東萊東考亭曰子壽前經過留此二十餘日幡然以鵝湖前見為非甚欲著實看書講論心平氣下相識中甚難得也陸九淵宋史本傳字子靜乾道八年進士除將作監丞主管台州崇道觀每開席講户外屨滿耆老扶杖觀聽自號象山翁學者稱象山先生嘗與朱熹會鵝湖論辨所學多不合及熹守南康九淵訪之熹與至白鹿洞九淵為講君子小人喻義利一章聽者至有泣下熹以為切中學者隱微深錮之病門人楊簡袁燮舒璘沈煥能傳其學云舊浙江通志淳熙元年來婺東萊自三衢歸相會時東萊與汪應辰書云陸君相聚五六日淳篤敬直流輩中少見其比楊與立正德蘭溪縣志字子權浦城人受業朱子之門嘗知處州遂昌縣因家於蘭溪以道淑人學者多宗之稱為船山先生所著有朱子語略十二卷王德良宋濂王秉彝傳字秉彝和州人鉤經索史智識過人間徜徉山水見巖姿川容絪縕獻狀情思烻烻然曰精聚神會吾殆與之無間豈古人所謂煙霞痼疾也耶勸之仕笑不答僑居金華建藥區市中蓄善藥以賑人急甚窶者不受其直由是樂善之稱聞四方秉彝曰是善名我遂以榜其堂明李曄獻徵録字宗表其先封邱人有諱初者從宋南遷遂居錢塘其占籍金華之永康則自曄始曄少從鄉里師口占詩能作驚人語往從永嘉鄭公僖學浙西憲副以茂才異等薦常山教諭包山書院山長皆弗就翺翔東陽永嘉二邑間陳世恭迎館於家士多敬愛之著書賦詩若將終老洪武初搜訪遺逸有司首以曄貢補國子助教日從其長設為教條以責成效未及考竟以疾免踰年還永康天性孝友奉母備至客於外月不見母必歸省有異味必以遺母在浙東時兄病疫得書倉皇戒行李至則兄病已危瞪目視曄指取計簿并篋笥鐍器藏之曄不避疫染百端營救而愈悉還其兄前所付博覽強記為文蒼徑詩緣情指事不煩雕刻有草閣集性天然七修類稿永樂初有自稱性天然者寓金華東陽縣東山儀容俊偉識趣超卓惟披麻戴笠不服常服盤桓於山南村落間與之遊飲者每得其詩畫將死囑主人曰斂吾懸於林木足矣主人卒葬之其邑里姓名終莫知之嘗見其歌及稱王姓者曰宗兄是必王其姓而建文朝之人也或又號玉華山樵國朝沈壽民金華府志字眉生宣城人為諸生有聲崇禎九年行保舉法巡撫張國維以壽民應詔入都抗疏論本兵楊嗣昌及總督熊文燦不報由是名動天下未幾移疾歸講學姑山攜家寓金華蘭溪武義諸邑山中隱居著述窮餓終身門人私諡曰貞文先生有間道録姑山文集諸書行世衢州府晉殷浩晉書本傳字深源陳郡長平人識度清遠弱冠有美名尤善立言與叔父融俱好老易融與浩口談則辭屈由是為風流談論者所宗三府辟皆不就於時擬之管葛王濛謝尚知浩有確然之志相謂曰深源不起當如蒼生何建元初衛將軍褚裒薦浩徵為建武將軍揚州刺史時桓溫既滅蜀威勢轉振朝廷憚之以浩有盛名朝野推服故引為心膂以抗溫為是與溫頗相疑二遭父憂去職服闋復為建武將軍揚州刺史遂參綜朝權以中原為己任上疏北征許洛將發墜馬時咸惡之既而桓溫聞其敗上疏罪浩竟坐廢為庶人徙於東陽之信安縣浩少與溫齊名而每心競溫嘗問浩君何如我浩曰我與君周旋久寧作我也浩雖被黜放口無怨言但終日書空作咄咄怪事四字而已永和十二年卒咸安初故吏顧悅之上疏訟浩追復本官元豐九域志衢州信安軍有殷浩宅土人號曰殷牆陳𢎞衢州府志字伯猷閬中人有勇略喜讀書初依晉益州刺史王濬擢參謀太康元年濬克西陵荆門彞道諸州自武昌抵建業所向克捷𢎞實左右之時鮮卑餘孽趙峻猖獗甚𢎞率輕騎襲擒之黠黨皆懾伏上嘉其績特授崢嶸鎮總管封信安侯食邑三百戶遂家於信安年九十薨洪武初以護國著靈異加贈寧邦感應侯更新祠宇以時享之唐周美正德江山縣志字元善淮右陸安里人為衢州刺史愛須江土沃民淳山水佳勝乃卜居江山家焉析子孫為五坦曰新坦同坦學坦麗坦平坦汪處崇龍遊縣志徽州人越國公華之孫尉龍遊遂家於團石世稱汪家灘有汪侯墓五代吳祐孚常山縣志宇齡交饒州人進士清泰二年守衢州解印綬居常山之紹德鄉晉天福五年復起守汀州周廣順三年仕銀青光祿大夫檢校工部尚書兼御史中丞八世孫嘉進為江山教諭遷居松峰詹從效常山縣志字堯臣以字行南陽人為錢王鏐賓佐方鏐起偏將攻王郢敗黃巢削劉漢宏兄弟之黨逐劉浩執薛朗皆堯臣功居多鏐建功臣堂立碑紀功堯臣與焉梁太祖即位封鏐吳越王堯臣亦進節度副使閩中亂遣堯臣領兵至常山草萍地鎮守後乞骸定居八都彤舊莊卒追封鎮東軍節度使開府儀同三司檢校太師鄂國公諡曰恭宋王仁裕衢州府志字德輦汴人晉翰林學士入周為左僕射加太子太保宋興棄官來信安隱居穆陵號穆陵居士著西江集行世吾渭衢州府志字清源姑蘇人多謀善斷曹彬下江南辟為參謀南唐既平進官都督授三衢守遂家焉子淵居西安滿居開化樊清常山縣志字從源南陽人元祐八年以薦授中書舍人尋拜翰林學士尚書右丞屢抗疏以裨時政南渡後居常山之疊石子盤孫遊俱登第曾孫充駙馬都尉趙鼎傳詳名宦兩浙名賢録聞喜人高宗即位除權戶部員外郎遂卜居衢州趙令矜𢎞治衢州府志字表之太祖裔孫大觀三年賜上舍出身高宗中興除都官郎因上章留張浚罷居衢州未幾復官襲封安定郡王尋奉祠歸孝宗親灑宸翰以寵其行號超然居士胡正衢州府志歙縣人仕至兵部尚書靖康中避亂來常邑卒葬郭山所居今名胡村孔端友兩浙名賢録曲阜裔建炎初襲封扈蹕南渡因家於衢後子玠嗣紹興六年詔權以衢州學為家廟賜田五頃以奉蒸嘗玠從弟傳字世文御史中丞道輔之後與玠同至衢後守臨川時建昌軍亦纍招降皆不受必欲見傳為信傳挺然往諭叛兵以平凡南渡後廟學皆傳所請所著有續白氏六帖續尹植文樞紀要東家雜紀杉溪集及道輔擊蛇笏藏於家魏矼宋史本傳字邦達和州厯陽人唐丞相知古後宣和二年上舍及第常山縣志建炎元年知常山縣四年改衢州管內撫幹辦公事尋被召極言時政秦檜用事士大夫少失其意禍輒不測矼終不少貶奉祠凡四任寓常山僧舍蕭然一室自奉雖薄而氣體甚充也紹興二十一年丁母憂卒於喪次子三欽承欽緒欽弼俱登第今子孫散居常山及西安凡五族惟開化杜川文物尤世其家馬伸兩浙名賢録東平人政和中進士厯官左司諌有直聲隨高宗南渡寓家龍邱抗疏劾黃潛善汪伯彥用姦誤國責監濮州酒稅死道中後胡安國訟其寃請官其子孫以旌直臣不報徐大興𢎞治衢州府志洛陽人父幸隆仕河南節度使時金人長驅入淮郡縣望風奔潰幸隆率河陽兵拒死朝廷旌其忠大興守衢廉謹節概有幸隆遺風尋奉父遺骸葬於常山之護國寺山遂解政家於常立祠於寺子孫世祀焉曾楙𢎞治衢州府志字叔夏其先贑人元符進士宣和七年知興化府金人陷燕山詔帥守各募敢死士入援楙率先諸郡以顯謨閣學士致仕楙祖平嘗為衢之判官因家焉有內外制文集東宮日記弟開字天遊登進士第權直學士院出知婺州羅汝楫謂開嘗阻和議遂落職寓衢十三年端居簡出類山林枯稿之士有內外制藏於家周大憲衢州府志字用章敦頤裔道州人宋南渡來衢見常山八都彤舊山奇秀遂家焉子旦五經博士逵進士子孫分居東門大街餘遷江山濟寧永豐徐雲翔常山縣志字允升汴人南渡遷臨安雲翔從呂祖謙周必大遊擢進士第授衢州路西安令悅衢風土遂遷居常山蔣羽江山縣志字汝翔家世居吳高宗朝舉賢良辭不赴繼舉文學亦辭適三衢聞徐逸平講學南塘里就訪酬和因見須江山水清邃占籍文明坊汪應辰傳詳名宦宋史本傳請祠歸寓居常山之永年院趙子晝宋史本傳字叔問燕王五世孫少警敏強記工書翰宣和初充詳定九域圖志編修官詔為刑部員外郎以憂去建炎四年遷吏部員外郎尚書左司員外郎試太常少卿集太常因革禮八十篇為二十七卷上言復春分祀高禖禮除權禮部侍郎遷徽猷閣直學士知秀州既而奉祠以歸寓於衢范沖兩浙名賢録字元長祖禹長子建炎四年守衢因請祠與趙丞相鼎同居高宗以神哲兩朝録多失實召沖為宗正少卿兼直史館沖遂盡削蔡京蔡卞所增宣仁太后誣謗事又極言王安石變法度之非蔡京誤國之罪上嘉納之書成遷起居郎兼侍讀改翰林侍讀學士未幾坐與趙鼎有連奪職歸馬希言西安縣志濮州鄄城人唐馬周後髙祖給事應圖與從父諫議伸皆以節義著南渡後希言為少卿寓龍邱華仁祖衢州府志延陵人父為黃門侍郎以沮和議忤秦檜落職知饒州卒於官仁祖扶柩至衢隱居城西黃茶後子孫遷居常山任古𢎞治衢州府志字信儒世居濟寧建炎初登第紹興間宰甌寧以母憂歸過衢因卜葬焉廬墓終喪除監察御史有拙齋遺稿三卷何若𢎞治衢州府志字任叟建康人弱冠登第擢御史除簽書樞密院事以疾奉祠家於衢所著有尚書春秋講義漢唐史評風山集邵知柔福建通志字民望政和人進士兩浙名賢録紹興間厯官國子祭酒以直龍圖閣奉祠寓西安城東之菱塘舍側有古木輪囷離竒卧塘上知柔因繫小舟扁曰野航日夕吟咏其中題其詩曰野航集韓公裔𢎞治衢州府志字子扆家本開封為康邸舍人積功遷嶽陽軍節度使先是史館修日厯凡藩府舊事與霸府建置本末人無知者公裔省憶成書秦檜遣史官楊願質之所記皆實檜欲賞公裔會除保康軍承使檜疑其舍己而自求於上使言者論公裔與願往來坐廢後奉祠家於衢卒贈太尉諡恭榮洪邁志其墓張毣𢎞治衢州府志字仲思南京人登進士第建炎初守昭武金遣使約毣降附毣怒亟斬之先是毣子申陷北和議成申欲取其父時毣居衢朝廷下衢趣遣行毣與秦檜書謂以子召父不孝背德犯順不忠誓不與逆子俱生以故鄉郡不為給祿者十五年檜死始奉祠卒韓元吉志其墓談惟寅尚友録字子欽高要人紹興中登進士第官至浙西憲府讀書一覽終身不忘嘗寓衢州祥符寺借燭閲碑不得遂以手摸之既歸畢録黎明對本不遺一字李處全江山縣志字粹伯洛陽人能文終侍御史弟處勵守衢州時處全寓須江仙居僧舍擇林壑之勝與弟同家焉趙希綰萬厯龍遊縣志汴人工部郎中為和州防禦使居龍遊四子與汶與潞與瀚與澧皆相繼登上第御賜其居曰傳芳堂徐士安衢州府志字公輔長沙人乾道進士令江山有政聲晚致政愛江俗朴茂遂占籍邑之南門徐國鎮常山縣志字定夫靈山人希賢六世孫封千戶侯率兵捍寇雄傑䡍倫輩理宗末棄職攜家居常山之十都馬路隴疾革命以戈甲從瘞表厥志子孫徙居彤弓山元左宗海衢州府志字百會東萊人至正間孝廉教諭西安作人造士諸門下依依不忍舍構廬設帳遂居於衢子孫十數世皆敦詩説禮好施明季有都御史忠義節烈名懋第者即其族也潘必卿西安縣志字國相號南江豫章武寧人至正間以明經任衢州路教授嘗師事吳澄得程朱要旨悉以所傳牖迪後學衢士婉留久寓以終教育性至孝迎父文江就養以衢俗淳厚遂治第孝義里因占籍云嶽𢎞𢎞治衢州府志湯陰人武穆王九世孫元末任江西鉛山州同知避亂僑居開化雲臺鄉之白沙𢎞治十年參政周木檄縣求其後十三世孫奉祠焉仍給居室田土以優養之明徐恢衢州府志字伯𢎞鄱陽人元末登進士授永新令時陳友諒攻南昌守將朱文正湯和嬰城固守明太祖引兵來援強弱不敵人懷觀望恢知友諒必敗明祖當興會友諒徵糧郡縣廬陵守遣恢運納恢竟以糧歸吳太祖大喜即軍中授都御史鄱陽之捷恢與有力焉纍官戶部尚書敕賜開國元勳初僑寓杭城六卿坊後遷常山左坑居焉徐演西安縣志字仲永福建人洪武鄉薦父宏明經舉任衢州教授道經浦城出江山鳯林鄉樂風俗淳雅命演占籍焉演厯官助教翰林試楮先生傳進呈第一名特拜右春坊以疾告歸自江山遷西安繼芳紹芳其裔也袁敬所明詩綜敬所不知其名靖難後流寓常山之松嶺酒酣書五栁圖詩有江右布商見之曰此吾鄉某編修何為在此敬所趨掩其口不顧而去常山縣志敬所五栁圖詩云藜杖芒鞋白布裘山中甲子自春秋呼兒檢點門前栁莫遣花飛過石頭班琴正德江山縣志京兆人號南軒福建布政使占籍江山子平字季清官至河南參政鄒璘江山縣志號復齋成都人崇禎庚辰進士任古田知縣調補餘杭有政聲擢刑部郎中遇闖亂國朝流寓江山南峰寺尋不食死子澄入籍登康熙壬子鄉薦國朝王虎衢州府志字在山山東文登縣人隨其父壽明至衢標驍勇善騎射康熙十三年討耿逆屢著戰功制府李之芳拔授衢左營干總委運軍糧又調集鄉勇練卒伍直逼賊壘晝夜攻守甚力及耿逆蕩平制府上其功候升補而卒贈守備虎處衢五十餘年雖起自戎行能以禮法範家戶庭肅然即比鄰未嘗見其譁聲忤色嚴州府唐喻鳬兩浙名賢録南昌人開成中登進士第以詩名於時徙家睦州嘗與方干賦詩往還仕至烏程尉有詩一卷行於世五代章仁肇兩浙名賢録浦城人仕後周為檢校尚書工部侍郎兼耀武將軍有功於時廣順中徙居桐廬安定鄉之窊石居仁行義鄉人敬服之宋季有名木者其裔孫也擅詩名號小客星有梅觀集今居梧村者皆其流裔也宋余稠嚴州府志河間人仕吳越太傅建隆八年錢王俶歸宋稠輔以行太祖留稠為睦州刺史因家於郡之分陽數傳至誠一宋南渡為國子丞有異績著南疇集行世尋以元兵至臨安避居郡城遂世其家商瑗兩浙名賢録其先汴人流寓西夏為都知兵馬使嘉祐六年因奉使歸宋奏獻密事上嘉其忠賜地於浙之淳安以居即今遼源之芝山也子孫因家焉以蔭補官者三世黃裳福建通志字冕仲南平人元豐五年對䇿第一政和間為端明殿學士禮部侍郎遷尚書嚴陵志嘗遊桐廬讀書於浮橋之禪定院又寓居閬仙洞者十餘載自號紫元翁舊時禪定院有紫元祠堂閬仙洞有紫元菴皆祠裳也江端友兩浙名賢録字子我陳留人博學能詩與呂居仁相倡和以元祐黨家居不仕亦不娶隱居封邱門外靖康初丞相吳敏薦為承務郎諸王宮教授上書辨宣仁誣謗被黜渡江寓居桐廬之蘆茨源自號七里先生後為太常少卿所著有七里先生自然菴集七卷謹按江端友舊浙江通志作汪端友誤呂本中宋史本傳字居仁宰相公著之曽孫好問之子幼而敏悟公著奇愛之少長從楊時遊酢尹焞遊紹興六年特賜進士出身擢起居舍人兼權中書舍人七年上幸建康本中奏當先為恢復事業求人才恤民隱講明法度詳審刑政開直言之路使人人得以盡情然後練兵謀以增師上流固守淮甸使江南先有不可動之勢又奏江左形勢如九江鄂渚荆南諸路當宿重兵臨以重臣八年兼權直學士院本中與秦檜同為郎檜既相私有引用本中封還除目檜風御史蕭振劾罷之提舉太平觀卒學者稱為東萊先生嚴陵志本中河南人寓居桐廬之蘆茨源詩學黃山谷而主於自然號彈丸法與江子我多唱和嘗作西江傳衣詩派圖列陳無已而下二十五人為法嗣謂皆出於山谷云卒諡文清所著有詩友淵源録春秋解童蒙訓等書行於世陳塤兩浙名賢録字伯和陽翟人博學工詩南渡寓居桐廬與滕岑相唱和岑盛稱之以為力追作者嘗次岑韻山居詩云解組滄溟畔攜家紫翠間地臨雙港勝天與兩年間茅屋靜聞雨竹籬疏見山所慚鄰舍老句險不容攀雙港者一名橫港即桐溪也以紹興進士終黟縣令謝翺宋濂謝翺傳字臯羽福之長溪人父鑰通春秋翺世其學試進士不中倜儻有大志會丞相文天祥開府延平長揖軍門咨事參軍已後别去及天祥被執以死翺悲不能禁隻影行浙水東嚴有子陵釣臺翺設天祥主再拜伏酹號慟者三乃以竹如意擊石作楚歌招之歌闋竹石俱碎性嗜佳山水雁山鼎湖蛟門候濤沃洲天姥四明金華洞天搜奇抉祕即著遊録遊倦輒憩浦陽江源及睦之白雲村尋隱者方鳯吳思齊晝夜吟詩不自休至元甲午去家武林西湖上明年肺疾作瀕死屬其妻曰吾去鄉千里交遊惟方韶卿吳子善最親愼收吾文及吾骨授之韶卿即鳯子善即思齊已而鳯等至痊子陵臺南以文稿殉伐石表之曰粵謝翺墓無子其徒吳貴祠之月泉書院所著手抄詩八卷雜文二十卷唐補傳一卷睦州山水人物古迹記一卷浦陽先民傳一卷天地問集五卷東坡夜雨句圖一卷宋鐃歌鼓吹曲一卷南史補帝紀贊一卷楚詞芳草圖補一卷浙東西遊録九卷元方回元詩選傳字萬里别號虛谷歙縣人宋景定壬戌别省登第元時為建德路總管尋罷徜徉杭睦間睨傲自高不修邊幅其自序桐江集云豫自桐江休官間居萬事廢忘獨於讀書作詩未之或輟時年已六十餘矣嘗選唐宋以來近體詩評論之曰瀛奎律髓於情景虛實間三致意焉明王宗顯傳詳名宦江南通志和州人元季避亂僑居嚴州達兼善遂安縣志西域人元蘭臺御史洪武初欲復其官力辭就教因家於遂今治東南達家井其故居也許全萬厯桐廬縣志丹徒人永樂間任縣尉操守不茍秩滿愛嚴陵風景因家焉子孫業儒不絶楊漢桐廬縣志雲南人由舉人正德十一年自金華改知桐廬忠誠篤厚不務時譽不妄興作及休致以親老家遠遂寓桐入籍初至金華時過桐江誤落其冠至是僑寓始知先兆云溫州府晉郭璞溫州府志字景純𢎞農人嘗客甌為阡郡城有白鹿銜花之瑞故城名白鹿嘗謂九山象斗華蓋松臺郭公海壇四山為斗魁積榖巽吉仁王三山為斗杓黃土靈官二山為輔弼且云此去干年地氣始旺唐孟浩然唐書本傳浩然襄陽人溫州府志常過東甌訪友張子容遊孤嶼有衆山遙對酒孤嶼共題詩之句又有樂成懷歸及别張子容詩謹按浩然集中又有宿天台桐柏觀宿桐廬江建德江及渡浙江耶溪泛舟諸作知其久客浙中遊厯殆遍不獨流連永嘉山水已也崔道融文獻通考自稱東甌散人著東浮集九卷乾寧乙卯永嘉山齋編成蓋避地於此者溫州府志道融荆南人五代吳畦瑞安縣志字禎祥登進士第厯官諫議大夫以諫舉兵討河東忤上意左遷潤州刺史時錢鏐與董昌爭郡欲劫以兵不屈夜率二弟侍父母避地安固庫村遂家焉後葬其地子孫繁衍散處甌栝惟安固為盛宋徐奭泰順縣志閩甌寧人祥符癸丑廷試賦鑄鼎象物擢第一自甌寧入安固居睦源今為木棉村呂夷簡宋史本傳字坦夫壽州人進士及第補絳州軍事推官遷尚書祠部員外郎改起居舍人知制誥再遷刑部郎中權知開封府治嚴辦有聲仁宗即位以給事中參知政事上疏陳八事曰正朝綱塞邪徑禁貨賂辨佞壬絶女謁疏近習罷力役節冗費語甚切至進位司空以太尉致仕溫州府志夷簡常慕東南山水佳勝寓雁山有淨明菴詩馮成兩浙名賢録字熙績滑州人魯國公守信之孫建炎間扈駕至溫州遂居永嘉德政鄉嶽飛數奇之羅致幕中屢與兀术戰捷收復州縣每念魯公以必死報國高宗書嘉忠二字賜之遂以嘉忠名堂飛既寃死成遂滅迹人間以琴書自娛號湖山居士洪模萬厯溫州府志丹陽人父擬知溫州有治劇才模厯官驃騎上將軍浙東宣慰使寓家於溫建總政堂夢草堂徐定兩浙名賢録字德操泉之晉江人釋褐調處州教授娶永嘉鮑氏因家焉知邵武縣通判太平州擢守潮州子璣字致中工詩世稱四靈璣其一也終長泰令孫似孫仕至浙東帥參宋末劉萬奴欲屠城似孫力爭獲免鄉人德之元黃公望輟耕録字子久自號大癡又號一峯本姓陸世居常熟後寓永嘉黃氏博學強記畫山水宗董巨自成一家所作寫山水訣甚有理致人多效之卒未有得其倣佛者馬德樂清縣志原名驥字萬甫任縣簿時方國珍亂海上德以生民為慮輒戎服戒軍旅為固守計樂民咸藉以安後以衰老謝事家於樂清葬丹霞山李光萬厯溫州府志字彥明貴溪人至正末官樂清量田畝均事役民賴蘇息光有文武才嘗教諭石門及溫郡又巡莆田掾樞府所至有績後以寇亂道梗即樂清家焉嘉靖間裔孫顯官至都御史明鄭善夫國寶新編字繼之福州人仕至南京驗封郎中發情聲詩古色精言高映霞表好遊名山嘗寓雁蕩峻陟冥搜都忘內顧與衢州方豪同好文徵明名山藏初名璧以字行更字徵仲長洲人父林為溫州太守文章政事有名於時徵明少從遊林卒官溫人斂數百金為賻徵明固謝不受溫吏士謂文氏父子皆能廉修故郤金亭以林配前守何文淵徵明書畫名重一時以貢至京尚書李充嗣大學士劉忠交薦授翰林院待詔致仕歸萬均佐樂清縣志江西人官監察御史與樂清范霖同官相善因過訪見山川秀麗遂家焉創室於縣東堡其墓在西漈山顧錫疇江南通志字九疇崑山人萬厯己未進士入翰林典福建試會政府以請託不從傅成其罪削籍歸崇禎初召用厯升至禮部尚書會父卒錫疇奔喪赴閩兵亂遇害葬溫州樂清縣志明末避地至甌從台州來雁蕩低徊不去有咏懷留别詩處州府唐李陽氷傳詳名宦畿輔通志為縉雲令秩滿退居吏隱山宋周啓明宋史本傳字昭回金陵人占籍處州四舉進士皆第一景德中舉賢良方正科既召會東封泰山言者謂此科本因災異求直言非太平事遂報罷歸教弟子百餘人不復有仕進意仁宗即位除試助教遷祕書郎改太常丞啓明篤學藏書數千卷多手自傳寫而能口誦之有古律詩賦箋啓雜文千六百餘篇趙希懌宋史本傳字伯和燕王八世孫崇禎處州府志寓居青田登淳熙進士守信州諸邑積逋數萬悉蠲之郡計亦無缺提舉江西歲飢賑濟給憑令民就糴厯官至端明殿學士昭信軍節度使開府儀同三司贈少保追封成國公諡正惠生平茹蔬施藥凡可以濟人利物靡不為子與與哲與勤皆貴顯與願寧宗召入宮賜名曮封榮王開禧三年立為太子改名詢寓居縣百步新市巷及召入迎以寶幢導出此街因名寶幢街洪煥縉雲縣志饒州鄱陽人適之子淳熙間任處州僉判因家於縉雲百岡山中誅茅縛屋翛然自放工詩文淹雅詳核克繼祖父之風鄒應龍崇禎處州府志福建邵武人慶元丙辰廷試第一纍官至參知政事先試禮部日麗水葉挺充考試官應龍實挺取中又娶挺之女因家麗水人名其所居之里曰德星里元李德大縉雲縣志唐令李陽氷之裔至正間授縉雲美化書院山長睹窪樽手澤遂結廬山麓扶長卿縉雲縣志揚州人元末仕縉雲典史有政聲秩滿遂居邑之回石明朱成遠括蒼彚紀宜春人洪武間知縉雲操持幹濟敻出人表善詞翰接禮賢士以詢民瘼罷官後僑寓邑城好植花木人以潘安仁擬之周皓慶元縣志字仲昭山西澤州人永樂十八年由太學授慶元縣丞厯九載清勤慈惠秩滿不樂仕進僑居邑城葬竹溪之原其子公榮因家焉阮廷貴慶元縣志四川永川人正統間由太學來丞慶元多惠政士民悅之遂家焉雪溪漁父青田縣志不知何許人獨擔囊至青田就村中沽酒囊出玉杯自飲問姓名不答但云雪溪漁父邑人陳中川邀至齋一飲數斗或終日不食見詩文輒為改竄又題所懸畫竹詞翰並妙後不知所往浙江通志卷一百九十五
