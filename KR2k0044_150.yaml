賊數百人為亂楙檄止調外兵獨部署縣人捍禦賊皆散走時倭寇鈔兩浙州縣皆相效築新城樓櫓雉堞相望楙獨不肯曰縣皆山賊何以至何困吾民為後果無事升駕部員外郎丘承祖德清縣志成都人進士嘉靖四十二年知德清大祲之後民不聊生承祖先民節省務在裕民有梟捕假捕盜破人産者立杖斃之不受干謁所拔多積學士狷介之守三年如一日趙煥崇禎烏程縣志字文光掖縣人嘉靖乙丑進士知烏程縣宿吏不能舒手訟堂可羅鳥雀編里遞充糧長貧富遍均羡餘贖鍰毫不濡染升監察御史至吏部尚書黃樞西江志字翼卿南昌人嘉靖進士授嘉善知縣留心里甲役法均平猾胥斂手邑大潦禾盡漂詣當道免冠頓首請括帑金以抵恆賦升工部主事厯知湖州府歲荒請蠲設賑不遺餘力卒於官孫樓獻徵録字子虛常熟人由舉人除湖州推官為治平而不苛第問法如何不事深文鈎距厯攝諸邑篆皆以愷悌名署郡事有璉里豪為萑苻暴客藪里中子女有稚齒而靡曼者率為所漁欲蘄免者必薦金資黨援甚固樓亷得罪狀朝逮而夕成讞立格殺之未幾移漢中栗祁獻徵録字子登夏津人嘉靖壬戍進士擢南京戶部主事𣙜稅杭州以清撡自矢月俸之外魚鹽蔬米無私毫髮隆慶辛未知湖州府下車即與吏民約輕徭平賦相與休息守湖三年政和役簡民無擾焉決獄平反不喜以微文巧中至舞文之姦又無不立發郡值水災亟謁部使蠲其十之二三漕卒故代他衛輸十餘艘請還其籍軍困以紓往郡多賈人𣙜會歲致羡金若干為管庫費祁悉罷之擢山西按察副使備兵懷隆顧其志長興縣志長洲人隆慶辛未進士知長興百廢具舉吏無敢有舞文者縣四安鎮界桐川夾浦界冝興大盜負嵎世為民患亷得巨魁置諸法遂成坦途遷南昌二守張應雷西江志金溪人隆慶進士授湖州府推官會大旱祈雨僚屬視為故事應雷獨齋居露處為民步禱大雨隨之以剛方坐謫再補楚令拂衣歸作金溪丈獻考行世李頤西江志字惟貞餘干人隆慶進士萬厯初擢御史清軍湖廣廣西請免土民逺戍祗充傍近衛所軍忤張居正出為湖州知府舊浙江通志頤知湖州才德並著葺先賢祠宇新道路橋梁百廢具舉曾紹芳崇禎烏程縣志字世德永興人萬厯丁未進士知烏程縣為政持大體戊申水荒竭力賑濟李際春歸安縣志號鑒如蘄州衛人進士萬厯初知歸安有惠政歲庚戌大水民飢捐俸賑之募商廣糴米價漸平次年大水力請改折民賴以蘇升戶部主事史朝祿德清縣志號直吾晉江人萬厯丁丑進士任德清洊罹水潦甘罰俸緩征輸曲為賑恤至辨人命之誣疏錢法之滯清丈量之姦葺治學宫不煩民力民皆頌之羅用敬崇禎烏程縣志字子直南昌人萬厯丁丑進士知烏程恬淡寡欲惟務拊循張江陵丈量之役逺近騷然獨行之以寬暇則課士論文有古循吏風升刑部主事吳文企湖廣通志字伯雪景陵人萬厯進士除南戶部主事𣙜北新關減雜稅三百餘金出守寧波丁母憂補湖州舊浙江通志文企守湖州治行清和勸農課耕其稅駕之所每繫人思陳幼學王鴻緒循吏傳字志行無錫人萬厯進士知湖州府甫至有施敏楊升者人奴也豪橫不法幼學逮治之敏賂權貴囑上官檄取執不發檄愈亟立杖殺之升懼稍戢姑置之已當遷念已去升必復逞遂捕升置之法郡民謡曰公來如炮施敏埋窖公去如雷楊升飛灰幼學疾惡嚴而於細民務安全之遇孝子節婦善人悉為旌揚郡以大治會霪雨害稼力舉荒政活民無算御史列其治行以聞升按察副使仍視郡事久之以副使督九江兵備楊應聘崇禎烏程縣志字志尹懷逺人萬厯癸未進士知烏程縣緩催徵平寃滯興隄防清闕田闕潛政倡教化不阿上官不假貴要里中惡少迹治稱最升兵部主事厯官兵部侍郎袁光宇崇禎烏程縣志字元讓常熟人萬厯丙戍進士令烏程適歲旱步禱為民請命稍祲不忍以誅求困民上供不及額郡檄數下守催之吏日至不為動主者怒其慢俸再奪處之怡然編審貧富以均漕兊不增一粟軍民稱平升工部主事鄧炳長興縣志湖廣監利人萬厯庚辰進士令長興適遇大祲後敲朴不施當道催督如織至鐫俸炳曰令俸可鐫瑣尾流離不忍賦也自奉甚苦往來交際謝絶升戶部去金玉節長興縣志字雅初湖廣麻城人萬厯戊戌進士知長興遇事勇於有為禮賢下士有貧不能婚者捐俸代之時值礦使為邑厲玉節繩以法隂剪其翼卒不敢肆歲當編審先是十二區以田額豪右詭寄單寒益苦於役玉節通融均攤謂之走區走甲裒多益寡民稱便焉熊明遇長興縣志字良孺江西進賢人萬厯辛丑進士知長興縣年甫二十餘簿書剖決如流在任七年興利除害道不拾遺幾於刑措厯官兵部尚書陳經正崇禎烏程縣志字敷奎晉江人萬厯進士任烏程令修學宫興文教時有辨山開礦之役調停中使得事止不行升戶部主事濮中玉長興縣志字琢如舒城人萬厯丁未進士知長興縣初蒞值大祲家履戶閲賑賚無遺表節孝起人文省船役皆其政之最先者厯官太僕寺卿曾國楨崇禎烏程縣志字德符臨川人萬厯進士知烏程縣編審善均田之法胥吏不及那移保正不得需索衆情允服厯太僕少卿金九皋江南通志武進人任武康知縣修學校嚴課程士論歸之秋大霖雨縣苦漂溺令甲災以七月上聞而諸司皆入聞不得達撤棘又格於例九皋偹查往年嘉興長興曾以災借運武康請於御史責償情悃迫切言與淚俱御史動容上請報可謝病歸著抱甕集石有恆長興縣志字伯常湖廣黃梅人萬厯己未進士筮仕遂昌有能稱調繁長興性簡約持大體徵輸以漸聽斷虛懷亷訪不遽施箠楚甲子元旦盜吳野樵等劫庫擁入內衙遂遇害贈太僕寺少卿馮可賓長興縣志字禎卿山東益州人天啓壬戌進士授湖州推官甲子元旦盜殺長興知縣愚民妄疑有屠勦之舉奔竄出境時無正官攝事者寡識閉城自守民益驚恐可賓奉檄安撫傳諭六門洞開聽民出入書榜安輯蒞縣捕治凶徒擒獲略盡一無株連招徠流亡旬日間熙攘如故李化煕舊浙江通志任湖州推官守法不撓居心寬厚治獄平允接士以禮凡所奬拔類多知名馬思理崇禎烏程縣志字達生長樂人天啓進士知烏程縣甫至即與民約催科給單遞比厯各鄉宣諭示勸懲新黌宫葺橋梁纂邑乘百廢具舉洊厯歲飢拮據荒政多方蠲賑日以窮民為念召拜給事中談元禮德清縣志字服膺湖廣景陵人崇禎辛未進士知德清縣省追呼簡訟牒尤喜奬拔士類時憫南糧折銀為巨蠧所蝕申請十年帶征夏稅絹匹絲綿積欠萬餘金力請大司農得蠲免李長清歸安縣志字瞻麓興化人崇禎甲戌進士知歸安縣軫念賦重民貧酌轉輸之緩急完欠之多寡而次第徵之民樂撫字不知催科之擾治姦胥懲豪右不少假修葺城垣振興學校稱吏治第一劉永豐崇禎烏程縣志字宜日上海人任烏程縣丞職水利值霪潦冒雨出勘率墟長修築隨以寓賑遂令墟岸如故升衛幕去李向中長興縣志鍾祥人崇禎庚辰進士知長興縣承俗抗弊姦蠧蝟叢向中亷得渠魁斃之杖下人皆股栗歲祲飢饉載道設法勸糴平價又煮糜以飼餓殍給廩以贍棄兒邑當編審計田均徭改定民籍較若列眉捐俸置田歲入租以餼貧士裁客籍冒免田數後調秀水舊浙江通志向中知秀水執法不撓禁革漕兌私贈置旗辨橫索者於法陸自巖江南通志字魯瞻武進人知湖州崇禎庚辰辛巳間郡水旱蝗疫相繼自巖甫下車即特疏請蠲請糴籼米充漕復設法廣糴輸賑造粥厰施藥餌盲嬰瘞骸存活不可勝計遷本省糧儲道楊大賓德清縣志號君山貴州人舉人任湖郡同知署德清值荒歉漕折未完者二干有奇欲行敲朴不可而上司屢促解大賓惻然曰將征民而留於民者無幾欲代償而存於已者空囊遂刎頸以殉當事始具題緩征丁文炳崇禎烏程縣志字質夫貴州平壩人以明經授烏程丞職水利適歲潦躬履阡陌求捍禦之方一障墟岸不致水勢沖激一撤罾籪以令水勢易泄一禁漁船不使蕩損墟岸當道嘉其用心稱為儒吏國朝劉璽烏程縣志字爾符朝邑人順治丁亥進士任烏程令寬以字民而嚴於治盜每歲暮量賑貧士當堂面給士民建祠於便民倉璽工書法所著有涉江草公餘草劉愈奇舊浙江通志滿洲人由貢生順治十四年知湖州府勵精為治百廢具舉奬拔名流士類歸心侯元棐河南鄉賢册字友召杞縣人順治辛丑進士知德清縣却吏胥餽金絶兌運積弊值霪雨害稼條陳利病巡撫范承謨奏行之為注考云清比冰懸才同犀利以外艱歸王業久歸安縣志字枝安平涼人貢生康熙十年令歸安政尚淳簡徵收有方請於上官免民間門攤課鈔編里均平舊規分毫不染壬子蟲災業久申請蠲折蒞任二載四境安堵卒於官貧不能殮士民醵金為旅櫬資羅為賡孝豐縣志四川南充人康熙十年由舉人知孝豐縣值歲荒禁革煩苛蠲賑飢民存活甚衆性嚴謹人不得于以私然慈惠愛民故戴之如慈母公餘集士子講明性理之學重修邑志高必騰烏程縣志字鳳翥奉天遼陽人廕生康熙十四年知烏程縣聽訟明允不徇干謁辛酉編審釐剔積弊官民一則貧富均徭在局月餘魚餐脫粟悉出署中不以煩民是歲冬又以漕艘未回部議雇船運糧至淮僉里押解人情驚擾力請獲免在任九年鼎新文廟纂輯邑乘擢守新寧去之日士民遮留填塞街巷潘麒甡名宦留祀册江南溧陽人進士康熙二十七年知湖州府性秉仁慈治尚寬簡然遇姦宄病民者未嘗不盡法懲之覩學宫傾圯即捐資倡修輪奐一新季試奬課士子催科有法差役無擾一切倉厫陋規盡行革除復留心水利疏濬城河浙江通志卷一百五十一
