body:
  text: 浙江通志卷一百五十一名宦六湖州府晉顧祕晉書顧衆傳衆父祕有文武才幹曾蒞吳興萬厯湖州府志太安二年為吳興太守時李辰起兵江夏祕與南平內史王矩前秀才周玘倡義傳檄州郡以討之賊黨悉降一郡以平周玘晉書本傳字宣佩義興陽羡人元帝初鎮江左以玘為倉曹屬玘三定江南帝嘉其勳以玘行建威將軍吳興太守封烏程縣侯吳興喪亂之後百姓飢饉玘甚有威惠百姓敬愛之期年之間境內寧謐陸納太平御覽字祖言吳郡吳人為吳興太守至郡不受俸祿頃之徵拜左民尚書領州大中正將應召外白宜裝幾船納曰私奴裝糧食來無所復須也臨發止有襆被而已其餘並封以還官陶回晉書本傳丹陽人司徒王導引為從事中郎遷司馬蘇峻之役以功封康樂伯遷吳興太守時人飢穀貴三吳尤甚詔欲聽相鬻賣以拯一時之急回上疏曰天下不普荒儉惟獨東土穀價偏貴便相鬻賣聲必逺流不如開倉廩以賑之乃不待報輒便開倉及割府郡軍資數萬斛米以救乏絶由是一境獲全既而下詔并敕會稽吳郡依回賑恤二郡賴之徵拜領軍將軍加散騎常侍咸和二年徙護軍將軍常侍諡曰成王藴晉書本傳字叔仁為吳興太守郡荒民飢輒開倉贍恤主簿執諌云宜先列表上待報藴曰今百姓嗷然若表上須報何以救將死之命乎專輒之愆罪在太守且行仁義而敗無所恨也於是大賑貸之賴藴全者十七八朝廷以違科免官士民詣闕訟之左遷晉陵太守朱序晉書本傳字次倫義陽人世為名將興寧末以功封襄平子太和中遷兖州刺史時長城人錢𢎞聚黨百餘人藏匿原鄉山以序為中軍司馬吳興太守至郡討擒之謝邈晉書本傳字茂度父鐵永嘉太守邈性剛鯁無所屈撓纍遷侍中後為吳興太守孫恩之亂為賊吳桀郜驃等所執逼令北面邈厲聲曰我不得罪天子何北面之有遂害之殷康嘉靖湖州府志為吳興太守嘗開城南荻塘溉田千餘頃至今利之南北朝袁湛宋書本傳字士深陳郡陽夏人高祖時以從征功封晉寧縣五等男出為吳興太守蒞政和理為吏民所稱太祖即位贈侍中左光祿大夫開府儀同三司諡曰敬公朱齡石南史本傳字伯兒沛人武帝以為建武參軍遷武康令縣人姚係祖專為劫郡縣畏不能討齡石至縣偽與厚召為參軍係祖恃強乃出應召齡石斬之掩其家悉殺其兄弟由是一郡得清以平蜀功封豐城侯向靖宋書本傳字奉仁小字彌河內山陽人名與高祖祖諱同改稱小字義熙三年以平京城功封山陽縣五等侯高祖西伐司馬休之以彌為吳興太守彌治身儉約不營室宇無園田商貨之業時人稱之謝述宋書謝景仁傳景仁弟述字景先太祖時除吳郡太守以疾不之官病差補吳興太守在郡清省為吏民所懷王偉之崇禎烏程縣志為烏程令亷介特甚書籍之外家無長物郗顒吳興掌故泰始中為吳興太守時孝子錢延慶為父報讐殺人自繫於獄顒表於朝詔不加罪張岱南史本傳字景山吳人遷山隂令職事間理泰始末為吳興太守纍遷吏部尚書出為吳郡太守武帝即位復為吳興太守岱晚節在吳興更以寬恕著名何敬叔吳興掌故為長城令平居以亷稱忽榜受餉得米二千斛他物稱是人多譏之有頃悉以貸貧民輸負租斗米尺帛皆不留李安人南史本傳蘭陵承人元徽初除司州刺史領義陽太守武帝即位為丹陽尹遷尚書左僕射屢上表以年疾求退為吳興太守侯於家載米往郡時服其清卒諡肅張瓌南史本傳吳郡吳人字祖逸齊建元元年封平都侯出為吳興太守瓌以既有國秩不取郡奉高帝敕上庫别藏其奉以表其清武帝即位徵拜左戶尚書加右軍將軍天監元年拜給事中右光祿大夫有子十二人率知名徐孝嗣南齊書本傳字始昌東海郯人八歲襲爵枝江縣侯尚康樂公主拜駙馬都尉建元初為晉陵太守尚書令王儉曰徐孝嗣必為宰相轉充御史中丞出為吳興太守儉贈詩曰方軌叔茂追清彥輔柔亦不茹剛亦不吐時人以比蔡子尼之行狀在郡有能名明帝即位進爵為公轉尚書令領本州中正謝草瀹南齊書本傳字義潔陳郡陽夏人世祖為中軍引為記室齊臺建遷太子中書舍人建元初以母老須養出為安成內史遷司徒左長史出為吳興太守在郡稱為美績永泰元年轉散騎常侍太子詹事諡簡子袁昻南史本傳字千里陳郡陽夏人雍州刺史顗之子仕齊為王儉鎮軍府功曹史後為吳興太守永元末梁武帝起兵州郡望風皆降昻獨拒境帝手書喻之昻答曰三吳內地非用兵之所况以偏隅一郡何能為役雖欲獻心不增大軍之勇置其愚默寧沮衆帥之威竊以一飱微施尚復投殞况食人之祿而頓忘一旦非唯物議不可亦恐明公鄙之時帝使豫州刺史李元履巡撫東土敕元履曰袁昻道素之門世有忠節天下須共容之勿以兵威陵辱元履至宣旨昻亦不請降天監二年為侍中遷吏部尚書范岫梁書本傳字懋賓濟陽考城人早孤以孝聞與吳興沈約俱為蔡興宗所禮興宗為安西將軍引為主簿遷臨海長城二縣令永明中以岫兼淮隂長史遷尚書左丞梁天監九年遷金紫光祿大夫岫居官恆以亷潔著稱為長城令時有梓材巾箱至數十年經貴不改易謝覽南史本傳字景滌選尚齊錢唐公主拜駙馬都尉天監元年為中書侍郎後拜吏部尚書出為吳興太守中書舍人黃睦之家居烏程子弟專橫前太守皆折節事之覽未到郡睦之弟迎覽覽逐去其船杖吏為通者自是睦之家杜門不出郡境多劫為東道患覽下車肅然初齊明帝及覽父草瀹東海徐孝嗣並為吳興號名守覽皆過之卒於官贈中書令庾沙彌梁書本傳潁川鄢陵人晉司空氷六世孫母劉氏亡晝夜號慟所坐薦淚霑為爛高祖嘉之補歙令復丁所生母憂還濟浙江中流遇風舫將覆沒沙彌抱柩號哭俄而風靜蓋孝感所致纍遷寧逺録事參軍轉司馬出為長城令桞惲南史本傳字文暢河東解人少有志行好學善尺牘竟陵王子良引為法曹行參軍太子洗馬梁天監元年除長史兼侍中厯吳興太守為政清靜人吏懷之於郡感疾自陳解任父老千餘人拜表陳情事未施行卒吳興掌故惲重浚青塘後人思其德政易名桞塘何逺册府元龜字義方東海郯人為武康令厲亷節除淫祀正身率職民甚稱之太守王彬巡屬縣諸縣盛供帳以待轉至武康逺獨設糗水而已彬去逺送至境進斗酒隻鵝為别彬戲曰卿禮有過陸納將不為古人所笑乎高祖聞其能擢為宣城太守遷新興內史天監十六年詔曰何逺前在武康已著亷平復蒞二邦彌盡清白政先治道惠留民愛雖古良二千石無以過也宜升內榮以顯外績可給事黃門侍郎張稷南史本傳字公喬吳郡吳人瓌弟也齊永明中為剡令山賊唐宇之作亂率厲部人保全縣境梁臺建為散騎常侍中書令纍遷尚書左僕射出為青兖二州刺史稷性明烈善與人交厯官無畜聚俸祿皆頒之親故家無餘財為吳興太守下車存問遺老引其子孫置之右職政稱寬恕蔡樽南史本傳字景節濟陽考城人少方雅退默與兄寅俱知名梁臺建為侍中遷臨海太守復為侍中吳興太守不飲郡井齋前自種白莧紫茄以為常餌詔褒其清天監九年宣城郡吏吳承伯挾祅道聚衆攻宣城轉冦吳興樽命衆出戰斬承伯餘黨悉平纍遷吏部尚書諡曰康子蕭琛梁書本傳字彥瑜蘭陵人起家齊太學博士時王儉當朝琛年少未為所識儉宴於東遊苑乃著虎皮靴䇿桃枝杖直造儉坐儉與語大悅舉為南徐州秀才纍遷司徒記室天監九年出為東陽太守遷吳興太守郡有項羽廟土民名為憤王甚有靈驗遂於郡廳事安施牀幕為神座公私請禱前後二千石皆於廳拜祀而避居他室琛至徙神還廟處之不疑又禁殺牛解祀以脯代肉琛頻蒞大郡不治産業普通元年徵為宗正卿張纘吳興掌故字伯纘范陽方城人大通中為吳興太守治郡省煩苛務清靜民吏便之懲為吏部尚書夏侯亶册府元龜字世龍車騎將軍詳長子天監十七年為吳興太守有惠政吏民圖其像立碑頌焉張嵊梁書本傳字四山吳人稷之子起家祕書郎中大同元年徵為太府卿俄遷吳興太守侯景圍京城嵊遣弟伊率郡兵赴援沈浚勸嵊舉義於是收集士卒繕築城壘賊行臺劉神茂攻破義興遣使説嵊嵊斬其使侯景遣其中軍侯子鑒帥精兵二萬人助神茂以擊嵊嵊為神茂所敗乃釋戎服坐廳事賊臨之以刃終不為屈遇害追贈侍中中衛將軍開府儀同三司諡曰忠貞殷不侫南史殷不害傳不侫不害弟字季卿居父喪以至孝稱好讀書尤長吏術梁承聖初為武康令時兵荒飢饉百姓流移不侫循撫招集襁負至者以千數陳宣帝即位為始興王咨議參軍後兼尚書左丞加通直散騎常侍到仲舉南史本傳彭城人字德言立身耿正仕梁為長城令政號亷平陳文帝為吳興太守以仲舉為郡丞與潁川庾持俱為帝賓客嗣位授侍中參掌選事唐韋承慶𢎞治湖州府志字延休鄭州人儀鳯中由太子諭善出為烏程令政化流行民為刻石頌德號韋公德政碑李適之唐書本傳恆山愍王孫始名昌天寶元年代牛仙客為左相封清和郡公萬厯湖州府志開元初為湖州别駕儒雅清曠決獄無滯喜賓客飲酒至斗餘不亂今峴山有李相石樽相傳適之所鑿云獨孤及嘉靖浙江通志字至之河南洛陽人天寶末以道舉高第為武康令嘗作亭於山後人思其澤因名其山曰獨孤山崔孚吳興掌故博陵人天寶末由越州餘姚令改湖州長城令長城之理又加於前政成秩滿解印罷去慶澄明一統志廣德初以左兵曹參軍兼武康德清二縣令邑經兵燹澄於瓦礫荆棘之場創置宇舍城郭未及期年悉復其舊越歲繁庶過半李晤白居易李晤家廟碑趙郡人厯烏程令為人篤於家行飾以吏事動有常度居無惰容所蒞之邑有善政辭滿之日多遺愛李清嘉靖湖州府志為烏程令二歲墾廢田復流傭肅胥吏崇本興行政績可稱于頔舊唐書本傳字允元河南人以蔭補千牛遷司門員外郎兼侍御史出為湖州刺史行縣至長城方山其下有水曰西湖南朝疏鑿溉田三千頃久堙廢頔命設堤塘以復之歲獲秫稻蒲魚之利人賴以濟州境陸地褊狹其送終者往往不掩其棺槥頔葬朽骨凡十餘所纍遷至左僕射平章事封燕國公辛祕唐書本傳系出隴西貞元中擢明經第憲宗初拜湖州刺史李錡反遣大將先取支州蘇常杭睦四刺史咸戰敗或拘脅獨祕以儒者賊易之未及至祕召牙將邱知二夜開城收壯士得數百逆賊大戰斬其將進焚營保錡平賜金紫僉謂祕材任將帥進拜昭義軍節度使贈尚書左僕射諡曰懿西吳里語元和二年祕造橋在郡城及去任百姓懷之名曰辛橋范傳正唐書本傳字西老鄧州順陽人父倫有當世名傳正舉進士宏辭皆高第授集賢殿校書郎厯湖州刺史有殊政改光祿卿權達嘉靖湖州府志字逢吉元和中為長興令縣西南有西湖可溉田三千餘頃舊引方山水注之為大姓所堰莫敢誰何逢吉決堰仍引泉溉田邑民賴焉令狐綯唐書本傳字子直舉進士擢左補闕右司郎中出為湖州刺史大中初宰相白敏中薦曰宰相器也召為考功郎中知制誥僖宗初拜鳳翔節度使就加同平章事湖州府志在郡有惠政杜牧唐書本傳字牧之京兆萬年人第進士復舉賢良方正纍遷膳部員外郎厯黃池睦三州刺史入為吏部復乞為湖州刺史以考功郎中遷中書舍人嘉靖湖州府志大中間為州刺史有惠政嘗建碧瀾堂宋刁衎宋史本傳字元賓升州人金陵平從煜歸太祖授太常寺太祝太平興國初知睦州桐廬縣會詔羣臣言事衎上諫刑書謂淫刑酷法非律文所載者望詔天下悉禁止之再遷殿中丞通判湖州上疏請定天下酒稅額修郡縣城隍條約牧宰除兩浙丁身錢禁汴水流尸凡五事俄知婺州真宗即位遷比部員外郎預修册府元龜書成授兵部尚書郎中戴融明一統志天聖中知歸安縣未期大治先是邑人困於茶賦融乃第戶豐乏而均之以絶追捕之苦又澤居者不務力穡融教之業農遂有恆産民立祠祀之謹按舊志作戴顒未詳孰是胡瑗宋史本傳字翼之泰州海陵人景祐初范仲淹薦瑗授試祕書省校書郎以保寧節度推官教授湖州瑗教人有法科條纎悉備具以身先之雖盛暑必公服坐堂上嚴師弟子之禮視諸生如子弟諸生亦信愛如其父兄從之遊者常數百人慶厯中興太學下湖州取其法著為令皇祐中授光祿寺丞國子監直講瑗既居太學其􅑫益衆禮部所得士瑗弟子十常居四五隨材高下喜自修飾衣服容止往往相類人遇之雖不識皆知瑗弟子也以太常博士致仕滕宗諒宋史本傳字子京河南人與范仲淹同舉進士仲淹稱其材以泰州軍事推官召試學士院改大理寺丞遷殿中丞降尚書刑部員外郎久之通判江寧徙知湖州倜儻自任所蒞州喜建學而湖州最盛學者傾江淮間湖州府志知湖州始至問民疾苦考視風俗屬意學校創新學舍風俗寖厚林槩𢎞治湖州府志字希聲閩人寶元中為長興令時邑人未知學槩闢庠舍選生徒躬自訓誨日出視政日昃詣學由是邑人登第者接踵長興縣志歲大飢富人閉糴以要價槩出俸粟庭下誘土豪糶米千石以飼飢者官至集賢校理馬尋嘉靖浙江通志鄆州須城人厯兩浙轉運使知湖州州飢人或羣入富家掠困粟獄吏鞫為強盜尋曰此脫死耳情與強盜異奏得減死論著為例終司農卿許遵東都事略字仲塗泗洲人舉進士為錢塘尉擢大理寺詳斷官知長興縣會縣有水災民多流徙遵募民出米賑濟終以無患益興水利溉田甚博邑人載其便利刻於碑熙寧間知壽州再判大理寺知潤州提舉崇福宫致仕張田西吳里語字公載澶淵人嘉祐中以屯田員外郎知湖州性剛直吏民畏服創軍資甲仗庫又重建都酒務永寧倉駱駝儀鳳二橋開子城東西二門公私為便立顔魯公祠籍吳興登第者題名於學在任二年移知廬州孫覺東都事略字莘老高郵人中進士第神宗即位除直集賢院通判越州徙知通州召還修起居注青苗法行覺論其非黜知廣德軍徙湖州沿江隄為民患覺易以石高一尋有奇長百餘里隄下悉為良田改右司諫哲宗即位拜御史中丞孫載中吳紀聞字積中崑山人治平三年進士初為河中府尹戶曹遷知德清縣聽斷精明不專任刑罰開説是非出於至誠訟有纍年不決者聞載一言即感悟去熙寧八年杭秀湖三郡飢載諭富室倍糴至明年平其價出糶全活者不可數計仕終朝請大夫知亳州提舉洞霄宫文同宋史新編字與可梓潼人以學名世操䪨高潔自號笑笑先生善詩文篆隸行草飛白又善畫竹第進士遷太常博士集賢校理厯知湖州萬厯湖州府志在任多善政世稱文湖州工彀嘉靖湖州府志山東人政和初知德清縣德清山間産茶最盛彀令民盡伐去以為茶株可復栽若租額一立貽纍甚大其後德清茶值果從輕減金鵝山下有蕩産藕極佳歲取以貢為民病彀亦論止之陳吉老萬厯湖州府志字子州京口人宣和中任長興縣時清溪方臘作亂陷及杭州縣邑之民亦有竊應者吉老整卒伍禦之民賴以安張燾宋史本傳字子公饒之德興人宣和八年進士建炎初通判湖州明受之變賊矯詔俾燾撫諭江浙燾不受以資政殿學士致仕諡忠定葛勝仲宋史本傳字魯卿丹陽人紹聖四年進士調杭州司理參軍試學官及詞科俱第一除國子祭酒尋知汝州改湖州建炎中復知湖州時羣盜縱橫聲搖諸郡勝仲修城郭作戰艦閲士卒賊知有備引去歲大飢發官廩賑之民賴以濟紹興元年丐祠歸趙子嶙嘉靖浙江通志建炎初知湖州時金人南侵子嶙親率將士禦敵人皆感勵死守事甫定罷去民攀戀涕泣御史達於上詔還郡汪藻宋史本傳字彥章饒州德興人中進士第調婺州觀察推官遷著作佐郎紹興二年除龍圖閣直學士知湖州以顏真卿盡忠唐室嘗守是邦乞表章之詔賜廟忠烈又言古者有國必有史今踰二十年無日厯何以示來世乞即臣所領州許臣訪尋故家文書纂集元符庚辰以來詔旨為日厯之備制可八年上所修書凡六百六十五卷升顯謨閣學士尋知徽州徙宣州卒贈端明殿學士湖州府志藻知湖州多著政績民懷其惠陳之茂西吳里語紹興間知湖州凡有徭役未嘗遣吏但揭片紙於譙門之下雖外縣鎮莫敢違慢時金人入冦修城郭治器械聚糧食東南士人多挈家依之王炎江南通志字晦叔婺源人登乙科知湖州不畏強禦邸第貴介有撓政者炎注於牘曰汝為天子親亂天子法炎為天子臣正天子法人誦之顔度臨海縣志字魯子乾道元年知臨海有異政嘗祈晴於靈康廟見寢殿右階下水津津溢地面穴之得泉命曰康濟泉後改長興令聽訟哀矜得情人稱神明云趙潗嘉靖湖州府志字伯逺淳熙間為長興令邑蝗令民搜捕至三百餘石又大旱河竭穀價騰踊出榖減值民不病飢又增學租設鄉校造就良多程九萬武康縣志九華人淳熙間為永康令下車首訪儒術設施有度豪右姦宄悉繩以法境內肅然秩滿去邑人攀餞閭巷為空孟浩萬厯江西通志字養直宜春人乾道進士國子監丞出知湖州狷亷不妄取與強毅精敏洞見事情與貴幸忤罷歸楊長孺吳興掌故嘉定間守湖州彈壓豪貴牧養小民治聲赫然張忠恕宋史本傳字行父浚之孫嘉定五年遷太府丞出知湖州寶慶初詔求直言忠恕陳八事疏入朝紳傳誦魏了翁嘗許忠恕拳拳體國似浚撥繁剸劇似其父杓於斂華就實則有志義理之學嘗有聞乎栻之教矣趙良淳宋史本傳守景程居饒之餘干咸淳末知安吉州先是知州李庚遁百事隳廢良淳至日與僚吏論所以守禦之備悉舉行之時歲飢民相聚為盜所在蜂起或請以兵擊之良淳曰民豈樂為盜哉時艱歲旱故相率剽掠茍活耳以義諭之衆皆投兵散歸其不歸者衆縛以獻有掠人貨財詣其主謝過而還之者良淳勸當人出粟賑之其言懇懇足以勸人皆倒困以應之元兵至軍其東西門良淳率衆守城夜就茇舍陴上不歸先是朝廷遣將吳國定戍安吉已而國定開南門納外兵良淳閉閣自經兵士解救之復蘇衆羅拜泣曰侍郎何自苦逃之猶可求生良淳叱曰我豈逃生者耶衆猶環守不去良淳大呼曰爾輩欲為亂耶衆涕泣出復投繯而死元史樞元史本傳字子明至元十二年以萬戶從丞相巴延伐宋宋平署安吉州安撫使時新附之民所在依險阻自保樞以威信招懷之復業為民者以千萬計拜中奉大夫山東東西道宣慰使楊景行元史本傳字賢可吉安太和州人登延祐二年進士授湖州路歸安縣尹奉行省命理荒田租民無欺弊所厯州縣皆有惠政民立石頌之以翰林待制朝散大夫致仕干文傳元史本傳字壽道平江人登延祐二年乙科授同知昌國州事遷烏程縣尹長於治劇所至有善政其始至昌國即能柔之以恩信於是海島之民雖頑獷不易治至有剽掠海中者亦為之變俗鹽場官方倚轉運司勢虐使州民文傳亟為陳理上官莫能奪民賴以免其在烏程有富民張甲之妻王無子張納一妾於外生子未晬王誘妾以兒來尋逐妾殺兒焚之文傳聞而發其事得死兒餘骨王厚賄妾之父母買鄰家兒為妾所生兒初不死文傳令妾抱兒乳之兒啼不就乳妾之父母吐實乃呼鄰婦至兒見之躍入其懷乳之即飲王遂伏辜治行為諸州縣最韓鏞時僉浙西亷訪司事作烏程謡以紀其績至正三年擢集賢待制以嘉議大夫禮部尚書致仕曹宗輔嘉靖湖州府志至順中尹德清數載仁惠之澤入於民心有所告戒揭之縣門民自不犯魏信𢎞治湖州府志為歸安尹終日端坐人莫敢干以私嘗定浙西坊里之役貧冨均一沈拱辰嘉靖安吉州志字國祥蘇州人至元丁丑尹安吉剛毅亷介事至立決抑強鋤暴姦宄斂迹後為浙西憲使宋文懿嘉靖浙江通志字德淵真定人至元中為烏程縣丞建學校以崇文教又築清塘堤甚有政聲韓約楊維楨韓約去思碑字彥禮真定人厯知長興州俗好盤遊大家喜氣勢多訐爭約盡刮去舊時積螙邑役素不均約下令産漏資匿者許若干日自陳即不陳許人檢沒不三月得列簿帳役無不平白烏鄉周福斫死其兄而誣訴他人約得其情出他寃反坐下箬寺僧為仇人誣姦吏右仇相為根株下僧獄幾死約伸其枉民大悅服秩滿相率涕泣遮馬首於東門呼嚕固岱𢎞治湖州府志至正中為長興達嚕噶齊新學校敦尚禮法政有惠澤仇治明一統志為德清尹獄訟幽枉必雪囹圄一空冗濫之弊悉革門無私謁上下肅然郭布延𢎞治湖州府志膠西人至正中為歸安主簿有美政及代百姓為立去思碑塔爾楚嘉靖安吉州志為達嚕噶齊至正壬辰冦犯境率民兵守獨松關遇賊不屈而死危止崇禎烏程縣志字公定江西人至正丙午知烏程縣公勤施政仁愛治民洪武二年卒官祀名宦明蘇從善嘉靖湖州府志字晉卿當塗人知長興州內屯重戍外抗強敵闢田野集戶口漸至生息為人所難楚嶽𢎞治湖州府志襄陽人洪武初為知府恩威並著百姓感化張居敬武康縣志字大欽保定人洪武元年知武康公正亷平吏民畏服學校壇宇靡不修治張桂安吉州志沙河人洪武三年知安吉亷介不茍所得俸祿悉以養親自奉惟蔬食而已政尚嚴密民始畏而終愛之陳卣𢎞治湖州府志永平人為歸安縣丞性剛直亷介門無私謁自奉甚簿布袍蔬食遇姦慝者務抵於法邑人畏服張士良嘉靖安吉州志字𢎞逺博平人洪武五年知安吉敦尚氣節事集不擾談士奇𢎞治湖州府志長沙人洪武十年為知府作興學校恩惠及民稱為賢守馬文敬安吉州志四川重慶人洪武中知安吉誠心愛民築墟濬渠民賴之何淵𢎞治湖州府志字澄仕河南人洪武初知歸安亷介不受餽遺為人所嫉以事誣繫獄邑民沈勝宗歎曰亷官受辱可坐視乎乃陳其寃願以身代遂得釋復其官吳率正嘉靖湖州府志金溪人洪武中知武康興學課農百廢具舉嘗被誣逮繫老人楊富七等具政績赴部陳寃疏上命頒布天下以旌亷能高彬舊浙江通志洪武中任歸安縣丞以事連坐耆民詣闕言彬公亷不擾民得安業釋之陳紀𢎞治湖州府志南昌人永樂間為湖州府推官性亷介厚重有威吏民不敢欺讞獄明允不假鞭朴而知其情郡中號為神明趙登獻徵録字從善河南祥符人永樂甲申進士拜禮科給事中以言事謫宣德改元遷湖州知府時詔天下郡國修義倉以備凶歉登召區里之長及鄉之耆民聚於庭諄切勸諭里中莫不感奮不浹旬得穀數萬石倉廩弗能容登增構若干楹選公正耆民慎守護知出納安吉有費氏者豪橫武斷奪人子女田園縣官莫能制登列其罪狀以聞州竟遷徙其家人口田産悉還之民郡中肅然治湖十有七年精白如一日張俊獻徵録字俊民江浦人授德清知縣縣積逋稅纍數萬凡十餘年不能足俊設方略不期年皆辦完時使者假公事行縣以苛酷取財民不勝擾令以下聞風多避匿俊聞其且至曰民恃我以安我先避匿民將何恃獨治事如故使者亦聞其名不復肆縣人賴以安民有隂伺官府動靜為姦利者俊亷得其實奏徙逺方一邑稱快嶽璿獻徵録字文璣河南祥符人景泰辛未進士授山西道監察御史天順元年以才望擢知湖州府先師廟廢捐已俸倡修春秋丁祀樂舞久廢璿敦延太常􅈺於樂舞者董正大成之樂以肅祀事謁胡安定墓考定侵界而封樹之禁樵采祀瑗之所廢又捐俸為構堂六楹有裨風教霅溪上遊有伏龍橋以木為之屢修屢圯璿以石易木規制宏偉先是湖州屬邑田賦科額不一而加耗無則吏胥詭