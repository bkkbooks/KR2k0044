body:
  text: 浙江通志卷一百七十八人物六文苑一史稱吳越多秀民山川英淑靈氣代鍾文學固其天性而聖朝化成以來沉浸醲郁已及百年其間述作斐然往往輝映前古夫載筆之士黼藻羣言所謂以翰墨為勳績者自范史標目而後未之略也志文苑杭州府三國吳孫桓三國吳志本傳字叔武河之子年二十五拜安東中郎將以功封丹徒侯注桓儀容端正器懷聰朗博學強記能論議應對權嘗稱為宗室顔淵孫瑜三國吳志本傳堅弟靜子瑜字仲異以恭義校尉始領兵衆建安九年領丹陽太守十一年遷舊威將軍領郡如故自溧陽徙屯牛渚濟隂人馬普篤學好古瑜厚禮之使將吏子弟數百人就受業遂立學官臨饗講肄是時諸將以軍務為事而瑜好樂墳典雖在戎旅誦聲不絶孫丞三國志注桓弟俊俊子愼愼子丞字顯世好古有文章作螢火賦行於世為黃門侍郎與顧榮俱為侍臣歸命世常使二人記事丞答顧問乃下詔曰自今以後用侍郎皆當如今宗室丞顧榮儔也吳平赴洛為范陽涿令甚有稱績晉孫惠晉書本傳字德施富陽人口訥好學有才識寓居蕭沛之間東海王越以為記室參軍專掌文疏預參謀議補司空從事中郎越誅周穆等夜召參軍王廙造表壞數紙不成時惠不在越歎曰孫中郎在表久就矣越遷太傅以惠為軍咨祭酒每造書檄或驛馬催之應命立成皆有文采褚陶晉書本傳字季雅錢唐人弱不好弄清淡間默以墳典自娛年十二作鷗鳥水磑二賦見者竒之陶嘗謂所親曰聖賢備在黃卷中捨此何求吳平召補尚書郎張華見之謂陸機曰君兄弟龍躍雲津顧彥先鳳鳴朝陽謂東南之寶已盡不意復見褚生故知延門之德不孤川嶽之寶不匱遷九真太守轉中尉南北朝宋廣之咸淳臨安志字處深錢唐人善清言初顧歡著三名論以正四本之失尚書劉澄臨川王常侍宋廣之並立論難與之往復而廣之才理尤精詣朱異梁書本傳字彥和錢唐人年七歲外祖顧歡謂此兒非常器既折節從師遍治五經尤明禮易涉獵文史兼通雜藝博奕書算皆其所長年二十詣都尚書令沈約面試之因戲曰年少何乃不亷異未達其旨約曰天下文義棊書卿一時將去可謂不亷也尋以明山賓薦髙祖召見使説孝經周易義甚悅之謂左右曰朱異實異召直西省俄兼太學博士自周捨卒後代掌機謀朝儀國典詔誥敕書並兼掌之每四方表疏當局簿領填委於前異屬詞落紙覽事下議縱橫敏贍不暫停筆頃刻之間諸事便了所撰禮易講疏及儀注文集百餘篇唐類函梁武帝曰朱異泓宇泓深神表峰峻金山萬丈緣陟難登玉海千尋窺映莫測杜之偉陳書本傳字子大錢唐人幼精敏有逸才十五遍觀文史及儀禮故事時輩稱其早成僕射徐勉見其文重其有筆力乃啓補東宫學士與劉陟等鈔撰羣書各為題目所撰富教政道二篇之偉為序尋除太學博士皇太子釋奠於國學時樂府無孔子顔子登歌詞令之偉製其文伶人傳習以為故事之偉年位甚卑特以強識俊才頗有名當世陳高祖受禪除大中大夫仍敕撰梁史永定三年卒之偉為文不尚浮華而溫雅博贍所製多遺失存者十七卷唐褚亮唐書本傳字希明錢塘人少警敏一目輒志於心年十八詣僕射徐陵陵與語異之後主召見使賦詩江總諸詞人在席咸服其工纍遷尚書殿中侍郎入隋為東宫學士遷太常博士貞觀中纍遷散騎常侍封陽翟縣侯卒年八十八諡曰康初太宗作文學館以亮與杜如晦等十八人並為學士命閻立本圖像使亮為之贊題名字爵里號十八學士當時在選中者天下所嚮慕謂之登瀛洲子遂良凌準栁宗元凌君權厝志富陽凌君字宗一以孝弟聞於其鄉讀書為文章著後漢春秋二十餘萬言又著六經解圍又文集未就有謀略尚氣節年二十以書千丞相丞相以聞試其文日萬言擢為崇文館校書郎遷侍御史浙東亷使判官召為翰林學士遂為尚書仍以文章侍從以連纍出知和州降連州以沒孫強萬厯杭州府志富春人因顧野王玉篇增字三十卷為大廣益會玉篇大概本説文云袁不約成化杭州府志字還朴新城人登長慶三年進士又試平判入等仕至職方員外郎有集一卷羅隱撰新城築城記有云天下無事吾鄉則有凌準吳降袁不約以文學進五代羅隱十國春秋字昭諫新城人本名橫貌寢陋凡十上不中第遂更今名能詩與族人虬鄴齊稱時人謂之三羅初寓池州梅根浦因自號江東生從事湖南厯淮潤諸鎮多鉏鋙不合久之歸杭州謁武肅王以所為夏口詩標卷首王覽大加殊遇王初授鎮海節度使令沈嵩草謝表成以示隱隱為更其略朝廷見之曰必羅隱詞也梁既篡唐進武肅王吳越兩國且以諫議大夫召隱隱不行而請舉兵討梁王不能用然心竊義之待隱日隆一日寢疾王親臨撫問因題詩於壁隱為續末二句幕紅紗於上以志恩遇焉纍官鹽鐵發運使著作佐郎司勳郎中遷諫議大夫給事中卒年七十七隱為文章多氣力而性傲睨嘗值韋昭範於舟次隱直呼舟子曰是何朝官我腳間夾筆可敵得數輩昭範慚恨卒以此沮之有吳越掌記集三卷江南甲乙集十卷江東後集三卷湘南應用三卷靈壁子兩同書十篇又有讒書五卷淮海寓言七卷多散失不傳宋錢惟演兩浙名賢録字希聖俶之子幼有俊才從俶歸朝為右屯衛將軍博學能文詞召試學士院以笏起草立就真宗稱善改太僕少卿獻咸平聖政録命直祕閣預修册府元龜大中祥符八年擢知制誥翰林學士纍遷兵部樞密使除大名軍節度使知河南加同平章事判許州改鎮崇信卒諡文僖惟演出於勳貴文章清麗名與楊億劉筠相上下於書無不讀嘗曰學士備顧問不可不該博故其家聚書侔於祕府所著有典懿集樞庭擢髦前後集金坡遺事録飛白書敘録逢辰録奉藩書事諸書行於世錢藻東都事略字淳老吳越王後順之子也舉説書進士又舉賢良方正為祕書校理三上書請慈聖光獻太后歸政天子神宗時纍擢知制誥直學士院除樞密直學士知開封府遷翰林侍讀學士元豐五年卒藻刻厲為學於書無所不究其見於文詞閎放雋偉常出衆上名動一時為人清謹寡過立朝無矯亢亦無雷同人稱其長者盛度東都事略字公量餘杭人舉進士稍遷至直史館三司戶部判官奉使陜西參質漢唐故地繪為西域圖圖漢所置酒泉張掖武威燉煌金城五郡復究尋五郡之東南自秦築長城西起臨洮東至遼碣延袤萬里繪其山川道路區聚壁壘為河西隴右圖以獻擢翰林學士史館修撰嘗請復賢良方正科又請建四科以取士尋授承旨兼端明殿學士翰林侍讀學士景祐二年拜參知政事尋罷知蔡州應天府以太子少傅致仕卒諡文肅度好學家居讀書未嘗釋手真宗嘗命與李宗諤楊億王曾石中立同編通典文苑英筆所著有愚谷集中書制集銀臺集翰林制集強至萬厯杭州府志字幾聖杭州吳山里人少有志節問學至忘寒暑鄉試為舉首賦出四方皆傳誦之慶厯六年登進士第素受知於韓琦琦鎮相魏嘗引至自助琦為詩遍和賓客獨至詩思致逸發不可追躡琦上奏及他書皆至屬稿琦乞不散青苗神宗閲其奏曰此必強至之文也琦數薦充館閣未及用而卒官至祠部員外郎有文集二十卷曾鞏為之序謂其文簡古不少貶以徇俗吳鈗成化杭州府志餘杭人登進士重定切韻進於朝後為史館校勘與邱雍校勘玉篇元絳東都事略字厚之錢塘人舉進士擢高等殿試被黜復舉進士中第為著作佐郎纍擢江西轉運使儂智高反嶺南以絳為廣東轉運使建瀕江水寨數十以待逋寇繕治十五城樓堞器械皆備軍食有餘以功遷纍拜龍圖閣直學士知鄆州召為翰林學士絳無特操然甚工於文詞名流皆推許之拜三司尋參知政事坐子耆寧黜知潁州致仕卒諡章簡有文集四十卷謝景溫成化杭州府志字師直景初弟方總角時錢惟演見之曰此兒舉措不凡若非龍駒應是鳳雛後當作黑頭公矣起縣令通判纍除刑部尚書博學洽聞歷事四朝為時吏師與范仲淹歐陽修王安石相友善吳天秩成化杭州府志字平甫杭州人勤苦該洽學者多從之資復恬退不嗜榮利杜門著書粹茹自適者幾二十年後以郊恩授大庾尉調浮梁到官逾年殁有文集五十卷沈遼宋史本傳字睿達錢塘人幼挺拔不羣長而好學尚友傲睨一世讀左氏班固書小摹倣之輒近似乃鋤植種拾自成一家趣操高爽飄飄然有物外意熙寧初為西院主簿故受知於王安石至當國更張法令遼與之議論寖咈意日益見疏於是罷去久之監杭州軍資庫攝華亭縣他使者適有所憾文致其罪下獄流永州從池州既至池得九華秋浦玩其林泉喜曰使我自擇不過爾爾即築室於齊山之上名曰雲巢悉謝棄少習杜門隱兒間作為文雄竒峭麗尤長於歌詩蘇軾曾鞏黃庭堅皆與唱酬相往來然竟不復起孫逢吉富陽縣志字彥同博學多文習於典故元祐間撰職官分紀五十卷周邦彥宋史本傳字美成錢塘人疏雋少檢而博涉百家之書元豐初遊京師獻汴都賦餘萬言神宗異之命侍臣讀於邇英閣自太學諸生一命為正居五歲不遷益盡力於詞章出知涑水還為國子主簿哲宗召對使誦前賦除祕書省正字歷知明州順昌府處州卒邦彥好音樂能自度曲製樂府長短句詞韻清蔚傳於世趙鞏咸淳臨安志字子固錢塘人乾道八年進士嘗奉使金金主問皇帝清問下民賦非所作乎歎服其文學從遊者甚衆號西林先生慶元禁偽學鞏以祕閣修撰知揚州入黨籍云趙汝譡咸淳臨安志字蹈中汝談之弟以祖蔭補承務郎韓托胄逐趙汝愚汝譡上書乞留汝愚斬托胄坐是廢斥者十年後登嘉定元年進士第除太社令纍遷湖南漕知溫州卒於郡汝譡自號懶菴英悟穎特與汝談稱二趙葉適謂其韓篇杜筆髙出於時晚愛韋蘇州詩其在潭以詩寄適説者謂如高漸離擊築過市云楊均海寧縣志咸淳間人工文詞邑令吳由修海昌圖經均實秉筆書成十卷又著先賢録以表邑先輩之名迹雙廟侑祭樂章亦均所作也張雯錢塘縣志字子昭其先浚儀人南渡居錢塘力學嗜書尤精律吕宋亡故宫老校猶有存者從之問宋遺事咸得其詳所著書曰繼潛録書畫補遺墨記子田亦工文詞田子肯從宋濓學所為詩文精麗有法尤長於南詞新聲汪元量錢塘縣志字大有為詩感慨有氣節嘗以善琴受知紹陵宋亡從三宫北去留燕甚久時故宫人王清惠張瓊英皆善詩相見輒共涕泣或至文文山鋃鐺所作拘幽十操文山倚歌和之元祖聞其名召入鼓琴一再行乞為黃冠歸錢塘既歸往來匡廬彭蠡間莫測其去留之迹自號水雲子有水雲集自奉使出疆三宫去國所厯故都遺迹可喜可愕可歌可泣者皆收拾於詩劉辰翁馬廷鸞目為詩史元周密萬厯杭州府志字公謹錢塘人宋寶祐間為義烏令入元不仕自號泗水潛夫詩極典雅善畫得意輒自題其上著有武林舊事齊東野語癸辛雜志謹按周密本湖州人其稱泗水潛夫者以湖有霅溪四水交流因以自名也考剡源文鈔云密與杭州楊大受有連大受和王之諸孫密依之遂捐其第之西偏以居密故密亦為錢塘人葉廣居成化杭州府志字居仲仁和人天資超邁才力絶人為古文詩詞下筆若有神助仕至浙江儒學副提舉所著有自得齋集吳復富陽縣志號雲槎少落拓不羈中年折節讀書晚遊湖海間見聞益博善樂府歌詩受業楊維楨維楨嘗稱其詩如雲歸沙嶼白日出水城黃蓋盛唐之選也所著有雲槎集十卷白珽宋濓白珽墓志字廷玉本四明舒少度遺腹子錢塘白嶸育以為嗣八歲能賦詩十三為科舉業有聲場屋間客授藏書之家晝翻夜誦燈墜花穴帽不知也李簡挽起之授太平儒學正轉常州學教授升浙江等處儒學副提舉秩滿署淮東鹽倉大使遷蘭溪州判官所居西湖有泉自天竺來榜曰湛淵因以自號卒年八十一珽自幼至老無一日廢問學長於詩文戴表元謂其注波五經之源披條百氏之畹劉辰翁又言其蒼然者不惟極塵外之趣兼有雲山韶濩之音皆確論也仇遠兩浙名賢録字仁近自號近村又稱山村西湖遊覽志元初為溧陽州教授工詩文遊其門者若張雨張翥莫維賢皆有名當時所著有山村集批注唐百家詩選馮士頤富陽縣志少倜儻博雅能文章作詩風格清峻與吳復齊名凌緯成化杭州府志字景文昌化人篤學能文大德中以才薦為雪江書院山長尋棄去著唐山紀事董子雅言壽者録氷室集事偶韻語等書年九十三卒邑令表之曰康德先生徐夢吉於潛縣志好學工文早舉茂才授傳貽書院山長厯常熟儒學教授詩得家傳有琴餘雜言行於世晚號曉山中人盛明叟昌化縣志邑南峽川人以文學鳴築蒙齋讀書因以自號工文詞有凍蠅説雪賦蕨薇子傳為士大夫所稱仕終甌寧縣丞盧浩萬厯杭州府志錢塘人好古博學其為詩如不經心天然超詣流輩罕及錢惟善朱彛尊楊維楨傳錢塘錢惟善字思復至正元年省試羅剎江賦時鎖院三千人獨惟善據枚乘七發辨錢塘江為曲江由是得名號曲江居士官副提舉張士誠據吳遂不仕吳福孫黃溍吳福孫墓志字子善杭州人強學好修未冠用察舉補嘉興路學録遷寧國學正名流雅望若戴帥初仇仁近胡汲仲鄧善之莫不折行輩與之均禮趙文敏孟俯以善書聞天下福孫得其楷法兼工篆籀文敏亟稱許之至治二年以教官借授潮州青洋山巡檢攝縣事獲盜之逋誅者八人脫平民被誣於盜者若干人而獲其真盜至順二年赴選集京師以所作小楷上進因得召見將用為閣職有沮之者至元元年調常州儒學教授改澉浦務稅使升授上海主簿卒福孫明敏豪邁自儒釋老氏至岐黃紀勝之書無不讀其書篆施於金石為尤宜奉贄幣求之者無虛日著有清容軒手鈔樂善齋集古文韻選若干卷古印史一卷葉森萬厯杭州府志字景修錢塘人早從吾衍遊古文歌詩咸有法則所著有瓦釡鳴集楊彞成化杭州府志字彥常錢塘人登進士第官至翰林學士以古詩文見重於臺閣工篆𨽻真楷張伯雨負詞翰名然自以為不及莫維賢萬厯杭州府志字景行錢塘人好學能詩雅尚標致築别業於靈隱天竺間繞屋栽杏號曰杏園日與騷人墨客遊詠其中列二十一題時人比之輞川所著有廣莫子稿梁建中萬厯杭州府志錢塘人早嗜伊洛之學復有志於文詞下筆滔滔數百言皆典雅成一家言金華宋濓序其文明凌雲翰萬厯杭州府志字彥翀仁和人博通經史工詞章領至正十九年鄉薦除學正不赴作梅詞霜天曉角一百首桞詞栁梢青一百首號梅栁爭春韻調俱美洪武初舉杭州府學訓導升成都府學教授所著有柘軒集王洪朱彞尊王洪傳字希範錢塘人八歲能文洪武十三年中進士除行人遷吏科給事中改翰林院檢討會修永樂大典充副總裁官歷修撰侍講尋左遷禮部儀制司主事尚書吕震巡陜西部務多決於洪帝竒其才詔作佛曲序洪難之為同官所擠不進用得末疾以卒洪敏於才在翰林時屬國以方物貢者不絶麒麟白澤騶虞芝草醴泉凡有歌頌以命洪輒立就與解縉王稱王璡王達號東南五才子稱最自負獨推重洪不敢與齒瞿佑萬厯杭州府志字宗吉錢塘人學博才贍年十四鄉人張彥復命賦雞詩美甚遂有名洪武中以薦纍遷周府右長史永樂間詩禍作編管保安久之釋歸復原職內閣辦事年八十七卒所著有春秋貫珠詩經正葩閲史管見鼓吹續音存齋詩集行世平顯兩浙名賢録字仲微仁和人博學多聞風流醖藉詩文皆有典則書法深穩可尚黔國沐公辟為教讀所著有松雨齋集馬洪列朝詩集傳字浩瀾仁和人善詩咏而詞調尤工皓首韋布含吐珠玊褎然若貴介王孫也其詞有花影集自謂四十餘年僅得百篇又有和曹堯賓遊仙詩百首一時盛傳之白范成化杭州府志字以中錢塘人才敏學贍詩格清竒仕至黃州府同知著有虛室集桂衡萬厯杭州府志字孟平仁和人博學能文詩極穠麗每一篇出人競傳録洪武中為錢塘學訓導轉谷府奉祀所著有紫薇稿劉儼明詩綜傳字敬思錢塘人元末隱居西湖明初徵入修禮樂書授廣東市舶司有樗隱集高得暘錢塘縣志字孟升洪武間以文學薦厯高州府學教授永樂初召為宗人府經厯纂修大典為副總裁進講春官博學洽聞詩文純雅名重一時著茆菴集姚廣孝嘗稱其詩韶濩迭奏綺組雜陳江漢奔流曲折千里而不可遏洵一代之竒作云胡奎兩浙名賢録字虛白海寧人博貫經史尤長於詩以薦為府教授嘗過望湖亭和東坡詩書於壁間有老人觀之曰六百年來無此作矣君非斗南先生耶言訖忽不見故人稱為斗南先生朱祚海寧縣志字永年洪武中有神童之目起家楷書科試事詹事府歷永樂洪熙宣德三朝皆以詞賦被賞纍官翰林修撰尚寶少卿有雪崖集行於世王榮錢塘縣志字希仁永樂中以乙榜進士歷淮府長史至宣德朝官太僕寺卿致仕榮天才敏捷為文不屬稿數千言立就有西漢氣骨立朝五十餘年聲實最著周昉萬厯杭州府志字元亮讀書樂道恆以古人自期詩文典雅作小楷得晉人筆意所述有西崦稿蘇平蘇正兩浙名賢録平字秉衡海昌人性頴悟意氣疏傲永樂間以賢良方正薦不就放情山水間著有雪溪詩集弟正字秉直工詩文與兄遨遊名士間時稱吳下十才子而平正兄弟與焉張楷寄詩有云浙詩門徑未荒蕪獨賴芟除有二蘇其推重如此所著有雲壑集劉泰萬厯杭州府志字士亨錢塘人負竒志特立不羣景泰天順間居武林城中好學篤行肆其餘力於詩精麗竒偉為一時絶唱每一篇出則競相傳誦南北之士來客江左者必得泰一詩以取重鄉里云所著有菊莊晚香雪餘倡和諸集劉英傳詳隱逸張輿成化杭州府志字行中弟輅字行索仁和人兄弟皆明經善詩文行中上書闕下授刑曹主事行素兩領鄉薦終臨淄幕官有聨珠集行於世董鏞成化杭州府志字孟聲仁和人永樂初進士入翰林授文學官久之薦知永豐縣有學行詩文和平類其為人文集凡三卷徐伯齡萬厯杭州府志字延之錢塘人博學強記洞曉音律尤工樂府嘗雜集瓷甌數十枚考其音之中度者奏曲一章茶頃而協所集有蟬精雋二十卷莫璠萬厯杭州府志字仲璵錢塘人居西湖與劉泰為詩酒友讀史三篇慨然慕謝安石文文山謝疊山之為人意氣橫發音節悲壯有古烈丈夫之風沈宣兩浙名賢録字明德仁和人由歲貢官安慶府學訓導鋭意攻古文詞尤長於詩下筆立就多驚人語晚節好畫山水頗自珍不輕點筆世亦以此珍之賀榮成化杭州府志字師桓錢塘人世以醫名至榮博綜經史百家言喜論當世之務娓娓可聽詩文古淡而存理趣家藏古書畫彛器之屬且善鑒賞經目輒定真贋所著有存齋稿王獻萬厯杭州府志字維臣仁和人景泰辛未進士時猶未娶也授編修與修寰宇通志續宋元通鑑綱目厯升少詹事兼學士皇太子出閣日侍講讀與修文華大訓成升太常卿仍兼學士獻美風神善詞令天才逸邁文思警穎在翰林垂二十餘年不得大用而卒人咸惜之諡襄敏張寧傳詳名臣吳瓚萬厯杭州府志字器之仁和人𢎞治庚戌進士授弋陽令調永新知南通州兩月乞休性好吟咏多撰述考求遺聞作武林紀事八卷卒年九十餘張文宿分省人物考字拱辰仁和人賦性竒偉風儀玉立每攻時藝輒歎曰今何不古哉遂獵泰漢盛唐諸名家書攻古文詞詩賦由是籠罩靡前正德癸酉薦於鄉屢試南宫不第釋褐晉江令遭讒落職就西湖傍築一小樓湖中置一舫與郡中沈青門方十洲輩結為詩社遇良辰輒登樓放舟賦詩作會其詞華沉著不為浮綺為一時取宗郎瑛仁和縣志字仁寶生有異質淡於進取督學惜其才欲推挽之卒謝不出家藏書史雜家言甚盛日危坐諷讀其中攬要咀華刺瑕指纇辨同異得失著書凡數種寧藩逆志始萌瑛先以為憂及聞陽明在贛喜曰豎子不足平矣事母孝有疾再刲股再愈所著有萃忠録二卷青史衮鉞六十卷七修類藁五十五卷吳鼎萬厯杭州府志字維新錢塘人正德丁丑進士授臨淮令以辦治稱屬武宗南巡有權貴人先驅橫索鼎不饜權貴人意遂見憤詬因呼梃梃吳令鼎鋭身先吏民當之吏民爭前衛鼎反擊傷權貴人事聞逮繫詔獄嘉靖初得釋復原治所徵為南刑部主事轉兵部以艱歸遂不出鼎伉厲守高魁然負氣既令臨淮以直節顯益務為危言侃侃無媕阿態沉涵六籍旁覽百氏為文宗法西京出入遷固大家自劉向揚雄而下意謂弗屑也與海昌許相卿友善文亦相伯仲所著有泉亭文集若干卷董淞兩浙名賢録字子壬海寧人故饒於資而猥視家産喜賑施慕賢達於書無所不窺尤好先秦西京卑魏晉以下不足學時經藝程文行天下淞居校中一簡不畜也用是試輒絀𢎞治中以薦應敷陳王道獻十萬言闕下下禮部試罷歸既歸益放誕為詩大篇短章多奧雅可誦然家日落好施日益甚室人交謫淞終自若至喪明乃已所著有聖學全書真儒藎語紫陽正脈并詩文雜稿若干卷沈仕列朝詩集傳字子登自號青門山人杭州人身本貴介而野服浪遊詩篇雅調逺近齊稱兼能遊藝王道思序其詩云觀其樂府古詞雜咏遊適之作至於觀覽京都覩制度禮樂之巨盛擬議應制形容功德頌美托華麗而有則蓋仕故少司寇省菴之子習其家學窺國家之光而講中外政俗之變非生於窘窶崛側者比也楊祐錢塘縣志字汝承少英敏年十八領鄉薦八年始成進士改庶吉士明年出知興國屢遭讒忌時起時蹶厯官湖廣按察司僉事卒於官當是時北地信陽以古文雄視西土而大江以南則故翰林江瀾參議吳鼎共祐後先倔起祐為文奔放陵轢若飇起泉涌其才氣岸偉旁不見曹伍然亦以此見忌所著有端居興國西曹鄄城濟南西江湖上荆南諸集兩浙名賢録祐典州佐郡皆以平賦役興學校訊決無枉既去民歌思之調湖廣擒劇盜廣招攜善政種種沈朝宣仁和縣志字三吾以貢入京師故事貢生不與直隸秋比朝宣詣登聞院上書乞就京兆試得報可遂捷京闈貢生得附試自朝宣始是年嘉靖辛卯也數上春官不第謁選教諭涿州遷江陵令告歸闢荒圃築精舍數楹蒔花藥觴咏流連客至談邑事間及先賢多湮沒者朝宣慨然網羅舊典採葺新聞成私志若干卷板燬今世所傳抄殘缺非其舊矣田汝成列朝詩集傳字叔禾錢塘人嘉靖丙戍進士授南刑部主事歷禮部祠祭郎中出為廣東僉事遷貴州僉事轉廣西右參議罷歸汝成在儀制肇舉南郊藉田親蠶西苑省耕課桑諸大典各有頌述歸里盤桓湖山窮探浙西諸名勝所著書凡一百六十餘卷而西湖遊覽志炎徼紀聞尤為時所稱茅瓚杭州府志字邦獻錢塘人少時夢神人授二巨字文曰見滄因以為號後讀書寶奎寺山巔夜雷雨大作崖坼數十丈獨所居無恙質明露見滄二大字適與夢符蓋故鑱宋理宗御書也嘉靖戊戍一甲第一厯官戶部左侍郎引歸有見滄集邵琇富陽縣志字佩之博綜載籍嘗與錢塘田汝成輩為文社有聲入南監師事湛甘泉嘉靖辛丑授四川崇慶州判官謫歸琇在蜀多託吟咏為諸公所稱至以佳句相呼如張三影云年九十四卒有曉峯集徐桂兩浙名賢録字茂吳餘杭人目偏盲而性警敏讀書一過目輒上口登隆慶辛未進士授袁州推官堅正不阿失上官指遂投劾歸居杭城東隅有亭池竹木之勝亭中列圖史金石遺文與彛鼎諸法書名畫日婆娑其中興至發為詩歌競響漢魏六朝間尤長咏物煆錬句字無不工著詩文雜稿數十卷田藝蘅列朝詩集傳字子藝汝成子年十歲從其父過采石賦詩云白玉樓成招太白青山相對憶青蓮寥寥采石江頭月曾照仙人宫錦船性不羈任俠多聞好竒世以比之成都楊愼晚嵗以貢為新安博士罷歸所著有前後正續集數十卷雜著數十種朱履杭州府志字與白仁和人善屬文有聲黌序陳善纂修郡志履與焉數竒不遇所交皆當世賢豪著周易正訛名劍記方輿覽勝統宗世譜博雅堂稿又工書丹青篆隸皆可觀虞淳熙列朝詩集傳字長孺錢塘人萬厯癸未進士授兵部職方主事時方用兵所條上皆有理實遷主客員外補稽勳郎黨人力攻之削籍歸凡三十載卒淳熙家貧無書與其弟淳貞字僧孺搜竒獵祕閉門鈔寫方術隂符靡不通曉已而偕隱南山回峰下採蓴行藥以終老焉少見知於李攀龍王世貞賦才竒譎搜抉竒字僻句務不經人弋獲以為絶出於時賢頗心折湯顯祖屠隆自詭以奡兀勝之黃汝亨評其詩文曰宏深微眇應念而作風生雨集排古蕩今斯善譽者矣子宗瑶宗玖皆有文刻德園集六十卷錢士鰲仁和縣志字季梁弱冠舉於鄉萬厯丙戍成進士授六安州知州徙刑部員外郎調知福寧州卒於官性孝友少受易於仲兄夢鰲稟約束惟謹不命之坐不敢坐至成立猶然屢空晏如不問家人生産山水之間得趣輒往發為詩文自抒胸臆生平最嗜太史公老蘇之文所著述甚富有槍榆集薄遊藁董子問釋擔志等書行世黃汝亨仁和縣志字貞父腦後稜稜有竒骨目如曙星萬厯戊戍進士授進賢知縣邑多浮賦汝亨上書臺司立爭之寬其征催又為建倉水次民不病輸挽暇則與諸生論文搜剔名勝復竹林舊址尋戴叔倫栖隱處築栖賢院為壇自署壇石山長奏最以忌者左遷久之起南工部主事升禮部郎中視學江西力持風格竿郵屏絶嘗以片言定諸王孫之變無敢譁者進參議備兵湖西踰年謝病歸結廬南屏題曰寓林以著作自娛持縑素碑版請者望於道每避客六橋之隂輕舟軟輿蹤迹繼至則啓窗一笑酒茗交行揮翰如飛人有得其片札者時以為榮焉聞啓祥錢塘縣志字子將博綜羣書武林東南都會江廣閩越之士登賢書者公車到武林必質義於啓祥品題甲乙命梨棗曰行卷制義之有行卷自啓祥始萬厯壬子舉於南雍嘗與吳郡李流芳偕計吏入京師已至國門忽意不自得徑趨車返後屢以薦被徵悉辭不赴性好延納每庀舟車飭厨傳宴會客若置驛然所著有自娛齋稿卓明卿兩浙名賢録字徴甫仁和人眉目如畫始薄章句竊與豪子弟學騎射劍術巳乃折節閉門博綜百氏所交傾海內豪傑茍失一名下士即恥之士或不為明卿知亦轉相輕誚好稱詩初為國子生賦桃溪書屋詩詩聲滿留都謁選銓光祿稱詩長安正中父艱服闋補珍饈署正著有卓氏藻林唐詩類闕文集續集北遊稿行於世何春畿富陽縣志字汝萃年十四為巡按王本固所知取冠浙士後屢舉不第萬厯中以選貢授江西臨江府通判升雲南新化知府詩文清綺婉麗所著四寄編草辨集壯遊集鴻鳴集各若干卷吳之鯨錢塘縣志字伯裔文才俊奭髙自標置與吳大山稱江臯二俊詩文甚富萬厯中舉於鄉數上春官不第謁選得浮梁令甫六月辛有武林梵志十卷閬閣詩一卷卓爾康靜志居詩話字去病仁和人萬厯壬子舉人有修靜堂集爾康匡濟之才著書等身詩特其一斑爾吳梯富陽縣志字仲升讀書為文章務自立堂奧恥為駢偶靡麗之習詩亦贍雅多丰骨不作近體自號狂生獨與仁和胡廷試一見如舊廷試氣豪邁見梯不覺自折仁和令劉洪謨聞而延致之會同遊湖山言及田汝成志西湖獨不及作賦梯請授楮筆據案疾書立成三賦一坐傾倒所著東南生四部稿八卷周羔富陽縣志字南甫學務博贍熟於經傳左國鎔鑄成文萬厯癸卯舉人連上春官不第益肆力於古文詞授天長知縣遷延慶州知州告歸所著幸笑館文集石梁草一集二集類篇各若干卷胡允嘉仁和縣志字休復沉邃讀書務探其奧每作文鏤心鉥腎如穿髙雲下蒼鶻挽徑弩射怒潮萬厯丙午舉於鄉癸丑成進士選入史館未及期而卒吉陽李邦華曰休復詩似陶韋序逼漢魏間雜桞蘇其切中事理經濟劃然又似朝賈頗得其實云嚴調御餘杭縣志字印持太常卿大紀之子生九歲而孤事嫡母髙惟謹撫異母弟武順敕薰然以和視弟母李如己母長身疏髯風神肅穆好讀書博綜今古交遊遍天下而最所矜契者則聞子將楊肇開二人肇開死子人騏幼調御以其子妻之子將疾革時值調御六十初度輟賀者而往哭為經紀其喪生平多技能凡絲竹管弦以及岐黃計算之學靡不通曉晚悉屏絶惟醫與書法不廢曰藥可以利人書吾藉以攝心也自弱冠補弟子餼廪三十年名聞海內而困於場屋其事業不克顯人多惜之嚴敕餘杭縣志字無敕武順同母弟幼失怙恃師事兩兄調御武順隨仲兄遊太學一時有三嚴之目是時文尚雕琢敕獨為淳古淡泊之音性孝友伯兄之亡也敕效仲作百憶吟而哀思過之年七十憶兩兄先逝合繪三逸圖以志思慕蓋一飲食不忘也晚歲才力愈健詩卷盈篋易簀時猶著枕上詩傳誦於世卓人月靜志居詩話字珂月仁和貢生有蕊淵集人月才情橫溢所撰續千文穩帖而竒肆詩亦不為格律所拘何萃錢塘縣志字輈亦少孤力學崇禎己邜以貢入南雍吳太沖時為少司成移書吏部曰萃武庫甲兵今朝廷急士當及鋒用之會為忌者所沮免歸設館鳳山之麓武林從遊者曰何氏學所著有古今治平略補草一史彚纂類法篇諸書吳本泰海寧縣志字梅里崇禎甲戍進士時年六十一矣深於經術凡官方兵制國計邊防屯田河渠一切利弊無不畢究平臺召見條對稱旨超擢吏部郎中纍遷尚寶司丞詩文詞賦時人目為淵海有論語頌使星堂纂西溪梵隱志行世王之獻富陽縣志字伯珍家藏書卷甚富喜讀古史好詩賦頗厭舉子業入南雍見以太學仕郡縣倅者類掣肘遂不就選退而益著書有吸月軒詩草花木韻譜雜著重修富陽志唐詩合錦古今女音詩餘樂府鵑啼録徐之瑞靜志居詩話字蘭生臨安人崇禎丙子舉人有橫秋堂稿之瑞熟精文選其五言古致紛披近體效韓冬郎尤極綺麗張次仲舊浙江通志字元岵海寧人舉天啓辛酉鄉試窮經好道自表其讀書之廬曰待軒性至孝童時母病刲股以進及長父為鹽賈所訟幾陷大罪百計脫之族指數千籍竈時以逋課坐繫為設法更置公田百七十畝歲輸族課銀百兩公私春賴之晚而喜易著困學記三十餘萬言兼述詩記秋分紀及史傳六十餘萬言傳於世嚴渡舊浙江通志字子岸餘杭人調御子方就外傅有督以記誦者曰書所已言大似吾所欲言者師其意何為師其詞聞者異之弱冠餼於庠未幾選入南雍名譽籍甚海內俊彥悉歸之年四十以明經終沈瑞徵靜志居詩話字靈繹海寧學生有慧居遺集其詩髙者近大厯十子下亦不失為四皇甫也年未四十而殁朱一是舊浙江通志字近修海寧人崇禎壬午舉人天才清拔敏悟過人無常師然亦不肯竟學嘗自言曰他人之學多得於書余獨得於友以述作自娛年六十二卒有史論十卷為可堂集續集百卷行世朱朝瑛黃宗羲朱朝瑛墓志字美之海寧人崇禎庚辰進士知旌德縣以外艱歸遂不復仕博稽六藝各有論著以為諸儒言易詳於所變而不詳於所未變變者象也未嘗變者太極也其言小序觀亡詩六篇僅存首句則首句作於未亡之前其下作於既亡之後明矣子由獨取初詞頗為得之辨古文尚書之非偽謂伏生之書如堯典臯陶洪範無逸何嘗不文從字順也謂春秋闕文錯簡不特郭公夏五觀於日食之先時後時可知矣其折衷諸家知此所著罍菴雜述金陵遊草行世五經略記文集藏於家顧懋樊舊浙江通志字霖調仁和人淹通書史以副車充貢舉賢良方正著五經積明年八十卒國朝胡文蔚舊浙江通志字豹生仁和人性嗜學雖嚴寒溽暑不輟明崇禎九年舉於鄉善詩古文詞足迹遍天下遇山川名勝輒為題咏順治間授髙州府推官尋去職歸至南雄卒所著有浮漚集十三卷約菴詩選十卷文集十卷談遷靜志居詩話字仲木一字觀若海寧人留心史學考證纍朝典籍博稽諸家撰述中年燬於火乃復沈思強記覆閲羣書訊故老墨枯筆禿晚歲成編云陳祚明舊浙江通志字引倩錢塘人潛夫弟博學善屬文以貧遊京師有乞文者口占授之語率竒麗填門迫促至廢寢食祚明長髯如戟雙眉如巖下電所著稽留山人詩二十卷詞一卷古文尤富陳之問黃宗羲陳之問傳字令升號簡齋海寧人陳氏科名冠兩浙而之問獨不以華膴為念好讀書自六經三史以下八家之集唐宋之詩丹鉛殆遍髙會廣坐有所徵引長篇纍牘應口吟誦以架上書覆之不錯一字於書畫古竒器賞鑒精絶而青烏素問龜卜雜述皆能言其理嘗從學於蕺山漳海兩先生顧未嘗講學與人言者不出詩書於詩文亦不多作當霜天寒夜漏已半往往於卧榻中聞其鏗然放筆以為常力學寒士中所未見也嚴津舊浙江通志字子問餘杭人敕之子嚴氏為文章淵藪海內翕然稱之津又繼起領袖時賢應拔貢中丞霍達表為督漕推官不就事親至孝家中落而甘旨不缺顔所居曰陶菴日哦詩數十章以明意陸圻靜志居詩話字麗京又字景宣錢塘貢生明崇禎間文章宗匠咸尊婁江張溥溥卒圻束芻絮酒往會葬賦五言長律一時傳鈔以為傑作後賣藥長安市其詩文采組六朝醫方酒令觸口悉成儷語晚訪淡公於丹霞精舍轉入武當不知所終杭西泠十子詩圻居首有從同集旃鳳堂集范驤舊浙江通志字文白海寧人性孝友才敏絶倫為文尚經術放黜百家人方之廣川董子書法鍾王同鄉先正吳本泰一見稱異悉以書籍與之環堵蕭然日以經籍自娛所著有十三經評注百卷古韻通補十卷愛日堂文集二十卷徐元倬舊浙江通志字為章海寧人童時負雋才詣舅氏張青來所時髙會大幔亭上張指亭為題曰汝方業文選能對客賦之否倬援筆數千言舉座嗟賞張摘其中賓餞日月吐納煙霞二語榜其楹十六餼郡庠為人嚴氣正性不妄與時流接鍵户讀書以尊遺經砭俗學為己任著有壑存集三十卷湛華樓詩集三十卷山圖别集四十卷吳名溢錢塘縣志字我匏錢塘諸生明季文體詭變尚諸子百家仙釋語録聱牙詰屈之文名溢乃沈酣六經蔚以實義作麟經詮解考三傳互異折衷諸家為春秋詳注兩喪皆廬墓著喪禮注晚年構藥園於城東與嚴沆查繼佐柴紹炳祁豸佳吳山濤輩觴咏其中有藥園盍簪集沆嘗語人云林巒標置當推是公非晚近人物也毛先舒錢塘縣志字稚黃錢塘人既而更名騤字馳黃六歲能辨四聲八歲能詩著白榆堂詩與陸圻張綱孫諸人倡和稱西泠十子山隂劉宗周講學蕺山遂往執贄問性命之學事父母色養遇有疾告廟請代於從父昆弟及族里皆厚遇之作詩一以大雅為主文不一格至辨析往復必本經術嘗輯宋儒語有禆實行者題曰針心愼鈔用以自砭生平好談韻學著韻學指歸又撰唐韻四聲表及詞韻南曲韻諸書他所著有思古堂集毛馳黃集小匡文鈔東苑文鈔詩鈔蕊雲集晚唱詩辨坻皆行世吳山濤錢塘縣志字岱觀領崇禎己邜鄉薦授陜西成縣令三年致仕終老吳山嘯歌自得書法飄逸能自成家畫不入蹊徑揮毫自如當出關日賦西塞詩三十篇因自號塞翁年八十七卒沈謙仁和縣志字去矜少穎慧能辨四聲長益篤學好為詩古文弱不勝衣與人語氣才屬及發辨議則電閃霆擊摧屈一坐為文雅淡秀欎錯以綺麗所著有東江集鈔詞韻詞譜古今詞選臨平記凡若干卷陸嘉淑靜志居詩話字氷修海寧人有辛齋遺稿崇情逺迹髙酣長謡文采風流溢於賓座章士斐舊浙江通志字淇上錢塘人九歲而孤繼母髙撫之感奮自勵遂為諸生祭酒文法昌黎晚乃學史遷詩兼昌谷東野之長歲擁臯比得修脯盡以奉母巡按王元曦察舉孝行貢京師病沒沒之日口不能言以手指母奄然而逝所著冇花隱亭文集五十卷詩集三十卷藏於家陸階錢塘縣志字梯霞父運昌與叔鳴時鳴煃有名當世號龍門三陸而瑎兄圻及培並以文章領袖一時復號三陸奉母隱於河渚之駱家莊以佃以漁間受雞林估人請選制舉文行世取所酬金為菽水資晚居里閈授生徒四方從遊者如歸市兩浙開府張鵬翮葺書院於萬松嶺集通省士子讀書其中奉階為十一郡師所著有白鳳樓集十卷子三人豐兆爵正夫皆能世其學而豐尤著李式玉舊浙江通志字東淇錢塘人孤雋落拓不以世務經意家近清波門往往禿巾野服入深山髙歌聲振林木為人篤孝義急友難至性所激沛然莫遏平生著書數十種今傳者魚川集二集巴餘集南肅堂詩稿武林雜事春城樂府張右民錢塘縣志字用霖為葛寅亮髙弟明季與龍門諸子創為登樓文選風行海內講學授徒負笈無逺近毛先舒以古文名家亦出其門康熙癸亥聘修浙江通志及郡邑志年八十三卒有東臯集史論史略竹窗語録凡若干卷徐汾舊浙江通志字武令仁和人少善屬文作娛賓寶刀賦驚其座人著有京山文苑經史徵萬卷樓集行世張芬錢塘縣志字子漸博綜典故有質疑者應之如數家珍與江浩虞宗瑶鄭鉉輩創為讀書社其法約數人共讀一書數日務了一義盈科後進最有條貫晚愛西溪衡山之勝時握一卷吟哦其中立石拒門編荆為户危冠大帶不入城市兵後盡亡其書老年默記從空指點甲乙雖貧且病亦不廢也陳廷會孫治杭州府志陳字際叔孫字宇台俱錢塘人廷會教授里中治時時出遊四方采所聞見為詩賦兩人所著書俱髙華有典則陸行人培殉難以妻子屬廷會廷會遂教其子繁弨於河渚陸茂才彥龍死有一女治為擇吳檢討任臣壻之兩人篤朋友急患難稱遺民髙士者咸以為首朱里杭州府志字商甪號青萊錢塘人邃於史學自西漢太初元年迄南宋祥興二年計一千三百八十三年凡一千五百九十九人各為論斷名青萊續史一十八卷書成而盲人以為符左氏云丁澎吳農祥丁飛濤傳字飛濤號藥園仁和人順治乙未進士纍官禮部祠祭司郎中典河南鄉試罷歸不問户外事而自娛於文工為詩頓挫清壯有沈欎之思康熙癸亥葺浙江通志實董其事云行世有藥園集顧豹文錢塘縣志字季蔚號且菴少以才稱讀書纘言能記他生之所習中順治乙未進士除真陽知縣招流亡立鹽肆建學宫為黃叔度祠設文會以殿最諸生行取擢臺班巡視東城尋出按湖北察川蜀諸賊竄伏要領所在嚴營堡逼其巢并疏捐漢安荆襄等州縣逋糧以及無征額課安陸有蘆洑口隄塍久圮潛沔被其災督所屬刻期竣役湖堤屹然建義倉一百四十餘所遭內外艱歸里時年四十九引病不出得城北葛氏廢園乃芟剃荒穢建小樓與二三老友商略經史名曰願圃追白蘇之遺風舉洛社之故事卒年七十有五楊鼐錢塘縣志字靖調順治乙未進士授大名府推官甫期月擢户科給事中聖祖登極以鼐充頒詔官時西川初闢撥秦兵鎮守并徙家屬實其地秦兵甚難之鼐至寧夏上言古有踐詔從更番休之制迭相轉調於法為便母老以終養請之改吏科內升鴻臚卿轉通政使旋疏陳衰老自是杜門却掃以著述自娛巡撫張鵬翮嘗詣其居見門巷蕭然僅一小童支户雖致身通顯猶不改儒生之素康熙癸亥董葺浙江通志卒年八十沈珩許汝霖沈珩傳字昭子海寧人康熙甲辰會試第一未釋褐而歸凡十五年不仕至戊午以博學宏詞薦試入格授翰林院編修充纂修明史官辛酉副順天主考亡何乞假歸珩淡於榮利愛素好古手不停披嘗輯一書曰十三經名文鈔凡所屬綴災畬經訓無一切遊談不根語有耿巖集若干卷行世邵逺平公舉事實字戒山仁和人康熙甲辰進士選庶吉士改戶部主事壬子順天同考官除江西提學葺白鹿書院大興文教擢光祿寺少卿會舉博學宏詞逺平試入等仍授翰林侍讀與修明史辛酉典試廣東轉庶子充日講官歷遷詹事府少詹事兼侍講學士與修一統志致仕歸初逺平髙祖經邦當明世宗朝以議禮廷杖謫戍於戍所著𢎞道𢎞簡𢎞藝三録逺平歸田後息影湖莊杜門謝客著續𢎞簡録四十三卷子錫章錫光同中丙戍進士吳任臣袁佑吳志伊傳字志伊仁和人為諸生試輒冠其曹其文流傳人口然非其好也耽書玩古多所論著嘗撰一書補梅氏字彚之缺廣郭景純山海經注又刺取唐季諸霸國事為十國春秋凡若干卷康熙戊午舉博學宏詞授翰林院檢討充纂修明史官未幾卒沈筠公舉事實字開平仁和人有雋才嗜學敦內行嘗刲股肉和藥以療父父病須瘳既而母病亦如之有女弟適周早寡歲時存恤數十年無倦容為文唾地立成而選簡清綺諸子百家咸集腕下其詩容與間易以陶徵士為宗然未嘗以摹仿傷格也康熙己未成進士改庶常會有以博學宏詞薦者試入髙等授翰林院編修未久卒所著有斗虹集八卷吳農祥錢塘縣志字慶伯宫允太沖長子少異敏一覽成誦家有賜書鍵户伏讀茹經涵史馳騁百家康熙戊午以博學宏詞薦歸而著書自娛詩不下萬餘首為文條貫五經尤精於易與蕭山毛竒齡友善然質疑送難不肯茍同所著有蕭臺集二百四十卷梧園雜志二十卷流鉛集四十卷詩餘二十四卷許汝霖公舉事實號時庵海寧人天性孝友中康熙壬戍進士選庶常厯贊善督江南學政釐正文體整飭士風所取試卷膾炙人口公明之聲徹於逺近升工部侍郎厯户禮兩部侍郎晉禮部尚豫告書汝霖讀書根柢六經旁及子史故發為文章詞歸醇理正未第時四方生徒負笈從遊及典試四川督學江左癸未科為會試總裁衡鑑不爽銖黍在江南考試事竣輒置酒金山大會諸生布席分題或詩或賦各展所長至今傳為盛事所著有德星堂文集十二卷詩集五卷行世陳論鄉賢留祀册字謝浮海寧人順治辛丑進士甲辰選翰林歷講讀學士副都御史晉刑部侍郎文學侍從三十餘年遷風紀之任風度端凝主試中州所拔皆寒畯揭曉日雖下第者無不心折子世儀令海澄築海塘修輿梁置文廟祭器建髙樓以鎮水口皆捐俸為之為令十年著有聲譽陸陛應撝謙陸陛傳字左墄錢塘人運昌子為文沉博絶麗類諸兄餼於庠是時文社飇舉陛繼起為諸生祭酒所至傾座人賣文為活積歲時所得束修手構一椽以庇燥濕以兄紫躔之散徙也復推與共之友張步青死遺孤無所倚為飲食之教之成立所梓丹鳳堂集漢魏齊梁如金在冶别有稿數十卷名經世驪珠蓋三通之支與流裔也年甫四十四而卒人惜之子冠以拔貢舉庚午京兆試汪煜公舉事實字寓昭父賡順治辛丑進士煜少好武挽強控馬膽力過人後折節讀書披擲無虛日行文兀傲自成一家言尤工詩間淡古雅康熙乙丑成進士授貴州鎮逺縣縣故古大田溪洞多苖民難治煜馭之有方戊寅擢吏科給事中掌登聞鼓院在職未久前後疏凡六上號稱敢言煜初席豐饒以鋭學不問生産家遂中落及官黃門無儋石儲卒之日同官助殯焉所著有同岑草願學堂集南歸北征録及平齋偶存諸稿陸繁弨徐林鴻陸繁弨傳字拒石行人培子培殉節死橫山繁弨甫十歲母陳命從陳廷會學讀書山中編摩經史發為詩文尤工四六有善卷堂集行世單行側注脫去排比之迹與陳維嵩方駕云查嗣韓陳廷敬查嗣韓傳字荆州海寧人家赤貧過時而學初不知有司尺度其族叔繼佐獨歎為未易才補錢塘諸生旋入監肄業十三年不拆家信埋頭誦習夜分欲睡輒舉火灼兩臂至無完膚康熙丁邜以五經應順天鄉試監試御史斥其違式既又竒其才以嗣韓及福建舉人林文英各聞奉二十三藝並皆奏旨召試殿陛間未踰時得文三首人已脫藍誠異數也上大喜命一體會試未揭榜而兩制科之式士占一經無有兼他生所習者自明代二百七十年間獨顔茂猷談貞良以五經進士稱嗣韓突起間簉循是似效者科有數人遂著為令五經中額實自嗣韓發之戊辰捷南宫廷試一甲第二授編修辛未充會試同考嘗主順天武鄉試未改官而卒湯右曾公舉事實字西崖仁和人幼穎異讀書十行並下及長博極載籍入太學有聲中康熙戊南辰進士選庶吉士授編修入直事中掌户科印疏書房丙子典試貴州改刑科給論銷燬制錢利病及請賑濟禁包攬陳積貯本計釐邊儲夙弊奏上輒報可癸未副武會試總裁會召試直省學政報滿南未之任復分校丙戍會試至豫擢第一督學河杜苞苴絶請托課士以朱子分年治經法士風振起巡撫汪灝疏薦公明第一內擢奉天府府丞轉差審右通政厯光祿太常卿升通政使奉生六案復廣東楊津叩閽案並察審巨盜馮唐命條奏海疆諸事宜悉見施行壬辰教習庶吉士尋授翰林院掌院學士兼禮部侍郎進經筵講官奉詩蒙命賦文官果御製一首俯同右曾韻有舉朝傳誦以為儒臣之至榮茸香葉密待詩公之句旨授凡翰林代言之作皆其撰擬每奏輒稱士居銓衡吏部右侍郎仍兼掌院學士教習庶吉上命九載盡職勤瘁遂得衉血症解部務專理院事病轉劇特遣御醫二員就第診視竟不起右曾詩髙超名貴不落一語凡近在黔有使黔草在豫有嵩洛吟在奉天有遼海集並行於世晚年益歸蒼老語輒驚人工行楷書尺牘華贍流麗人爭寶之查升徐倬查升傳字仲韋一字聲山海寧人康熙戊辰進士選庶吉士授編修己邜江西主考尋直內廷分纂諸書搜葺校讐恆至夜分不寐凡有御製御書必覽而升所進書詩一一稱命升觀旨歷諭德侍讀庶子晉少詹兼侍講學士隻字人爭寶寵錫稠疊升負詩文盛名尤工書法片楮貴所著有姓氏譜靜學齋詩稿尺牘偶存前扈從詩南巡五瑞詩塞北紀恩賦行世沈佳錢塘縣志字昭嗣兒時即有志伊洛之學及長著名儒言行録大全粹語春秋學晚著易大象玩易解明代人物考樂府中聲蒼野集省愆録多研窮性命之書所居名學士園自少壯以至通籍及歸養未嘗輟書卷登康熙戊辰進士初知監利縣補安化卒於官龔翔麟沈名蓀龔翔麟傳字天石更字蘅圃光祿寺卿佳育子以副榜補兵部主事督京倉𣙜粵關海稅改監察御史巡視西城察錢局歷掌浙江山西陜西諸道既而罷歸翔麟當官有幹實居臺中號敢言不避權貴而尤以文學名所著田居詩稿十二卷出入六季三唐而要其宿於眉山蘇氏詞以石帚為宗傍及於梅溪玉田蛻巖諸家之體自少即與秀水朱彛尊李良年李符平湖沈日皥沈覃九齊稱號曰浙西六家所著紅藕莊詞六卷别有珠海奉使記一卷皆刻以行世查愼行許汝霖敬業堂集序字悔餘號初白世居袁化康熙癸酉舉順天鄉試以大學士李光地召對薦直入南書房癸未成進士選庶吉士授編修供奉七年以疾告歸性穎異五歲能詩十歲作武侯論同邑范驤稱為曠世才既長遊黃宗羲之門所學益進最深於經諸經中於易尤邃作玩詞集解一書又著經史正訛人海紀陪獵筆記黔中風土紀廬山紀遊諸書極好蘇軾詩編年補注矻矻者三十年自裒其所為詩合他山詩鈔總為敬業堂集共一百五十卷翁嵩年張廷玉翁嵩年墓志字康飴號蘿軒仁和人生而穎異年十三即通六經大義長於百家之言靡不探測而尤精於左氏以文章名東南康熙戊辰成進士授户部主事歷刑部郎中督學廣東矢心愼恪務得真才先是學使者以瓊州在海外檄生童附雷州考試嵩年曰吾豈以一人易千萬人命乎出入忠信何畏焉竟渡海後著為令甲事竣歸里有别業在西湖退休其中以詩酒自娛夀八十二終所著有天香書屋稿白雲山房集友石居集顧悅履公舉事實字丹宸海寧人康熙甲戍進士第三授翰林院編修纍官內閣學士兼禮部侍郎丁酉出理清河既竣事明年病卒恱履工臨池館選後召寫御製詩文二集槖筆者凡七年充子史精華佩文韻府總裁官將脫稿以憂去適其子五達選庶吉旨俞士因奏請使踵其事得允一時榮之陳奕禧山西名宦册字子文海寧人以貢生任安邑縣丞攝臨晉篆著有循聲負詩文名工書法尺幅片楮皆摹勒為帖行於世山西通志號香泉由户部郎出知石阡府補南安所至人皆乞其書爭相寶貴常倣文選體集厯代詩文為文海序而行之徐林鴻錢塘縣志字大文一字寶名錢塘學生工辭翰上擬左氏下類兩晉康熙戊午詔舉博學宏詞以林鴻薦既而歸掃一室讀書其中作為詩歌清新典麗所著有兩間草堂詩文集四十卷尤篤友誼漢陽王世顯南昌王猷定客死於杭太倉王昊四明周容卒京師皆為經理其喪復收遺稿付其孤人髙其誼吳允嘉公舉事實字志上又字石倉錢塘人性孝友雅好吟咏為文原本六經旁通史漢而章法頓挫刻意規撫蘇歐於經世之學尤所殫心生平愛藏書丹鉛點勘晨書暝寫凡山經地志墓碣家乘下逮百家小説叢殘之書搜討不遺餘力晚年嗜好尤篤精力盡瘁有四古堂文鈔甑山詩集石倉存稿石倉箋奏東堂雜録藏於家其他輯録尤夥如武林耆舊傳武林文獻志錢塘志補皆足備藝林掌故焉浙江通志卷一百七十八
