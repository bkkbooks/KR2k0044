body:
  text: 浙江通志卷二百仙釋三紹興府漢魏伯陽神仙通鑑會稽上虞人修真潛黙養志虚無每視軒裳如糠粃焉不知師授誰氏得古人龍虎經盡獲妙㫖乃約周易撰參同契三篇三洞珠囊後入山餌神丹仙去劉晨阮肇方輿勝覽剡人永平中入天台山採藥失道食盡見桃實食之覺身輕行數里至溪滸持杯取水見一杯流出有胡麻糝溪邊有二女子笑曰劉阮二郎捉向所失流杯來便迎歸作食有胡麻飯山羊脯甚美後欲求去㑹集奏樂共送劉阮指示原路既出無復相識至家子孫已七世矣淳于斟眞誥字叔顯㑹稽上虞人漢桓帝時作徐州縣令靈帝時大將軍辟掾少好道明術數服食胡麻黄精後入吳烏目山中隱居遇仙人慧車子授以虹景丹經修行得道在洞中為典柄執法郎三國吳趙廣信仙苑編珠居剡小白山每日往長安市賣藥救人暮歸小白時人云朝離小白暮返長安剡録太白山峻極崔嵬吐雲納景趙廣信昇仙處也介象三國志注字元則㑹稽人有諸方術呉主聞之徵到武昌稱為介君從學蔽形之術試還後宫及出殿門莫有見者又使象作變化種𤓰菜百果皆立生可食呉主共論鱠魚何者最美象曰鯔魚為上吳主曰此出海中安可得耶象曰可得耳於殿庭中作方埳汲水滿之象垂綸塪中須臾得鯔魚吴主曰得蜀薑作韲甚好恨爾時無此象書符著青竹杖中使人閉目騎杖須臾已至成都買蜀薑還到吳厨下切鱠適了續文獻通考象入山見美女曰汝食氣未盡可斷榖三年來此象如期往乃授以還丹術虞翁主太平御覽㑹稽人愛仙人介君食日精法吴時來隱狼五山行服氣廽形之道精思積乆仙去晉葛元輿地紀勝字孝先句容人學道於若耶山號葛仙公嘉泰㑹稽志従左元放受金液仙經能絶榖曽游㑹稽有賈人過神廟廟使主簿語曰今欲寄書與葛仙公可為致之主簿以函書擲賈人船如釘著板㧞不可得報仙公公自取得之語弟子曰吾不得作大藥今當尸解八月某日時當發至期衣冠入室弟子燒香守之忽大風起發屋折木風止失公所在見衣在而帶不解今㑹稽有仙公釣磯及煉丹井具在嚴青仙苑編珠㑹稽人家貧常在山中燒炭忽遇仙人云汝骨相合仙乃以一卷素書與之兼教服石腦法青遂以浄器盛書置髙處左右常有十數人侍之每載炭出此神便為引船他人但見船自行後斷榖入小霍山去續文獻通考青嘗夜行都廵呵問何人青亦呵問都廵叱從兵收之青亦叱従神錄之青徑去而都廵等人馬不能動明旦鄉人曰必嚴公也報其家往謝青乃放去袁根杜碩廣博物志㑹稽剡縣民二人獵深山經一石橋甚狹而峻向絶崖崖正赤壁立名曰赤城徑有山穴如門既入内甚平敞草木皆香有一小屋二女子住其中年皆十五六容色甚美見二人至忻然云早望汝來遂為室家忽二人思歸潛去二女追還乃以一腕囊與根語曰愼勿開也歸後出行家人開其囊囊如蓮花一重去一重復至五葢中有小青鳥飛去根還悵然而已後根於田中耕家依常餉之見在田中不動就視但有殻如蟬蜕也於越新編根羽化碩年九十餘方外傳之亦如劉阮故事竺法深世説新語法深在簡文坐劉尹問道人何以遊朱門荅曰君自見其朱門貧道如遊蓬户名勝志法深名竺潜隱剡山哀帝遣使招之至建業後還山支遁求買沃洲小嶺潜曰未聞巢由買山而隱支遁世説新語支道林常養數匹馬或言道人畜馬不韻支曰貧道重其神駿好鶴住剡東􅢐山有人遺雙鶴翅長欲飛支意惜之乃鎩其翮鶴軒翥不復能飛乃反顧翅垂頭視之如有懊䘮意道林曰既有凌霄之姿何肯為人作耳目近玩養令翮成置使飛去太平御覽支遁本姓闗氏陳留人或云河東林慮人曇光佛祖統記晉沙門也至剡山石室宴坐山祇盛飾來見光為説法神奉山以結伽藍名曰隱岳嘉泰㑹稽志帛僧光或曰曇光竺法崇世說補注法崇有律學精法華經居剡之葛峴山茅茨澗飲孔淳之訪之信宿不去神思傾豁竺法曠雲門志畧晉興寧中東遊禹穴至若耶溪愛其孤潭遂依巖為廬孝武帝迎至京師以師事之𢎞明法苑珠林山隂人少出家貞苦有戒節止越山隂之雲門寺誦法華經深習禪定精勤禮懺六時不輟每旦則水瓶自滿實感諸天童子以為給使也毎明坐禪虎常伏室内南北朝許黄民雲笈七籖字元文上清仙公翽之子上清左卿穆之孫以昇平五年辛酉生京畿紛亂乃奉經入剡為馬朗所翹敬宋元嘉六年欲移居錢塘乃封其眞經一厨付朗語此是仙靈之跡非我自來縱有書亦勿與人及至杜道鞠家停少時而終時年六十九眞誥言黄民伯祖邁姑婆娥王伯聨與黄民子榮女瓊輝並得度世謝元卿名勝志㑹稽人好呼吸延年之術年百嵗精力不衰採藥入山值一横溪俯臨峻壁淙湍激溜上有石梁纔可並足乃匍匐而渡稍聞鐘磬聲尋之而往忽遇仙女數人被服纎麗元卿向前禮拜乃相視而笑曰子非謝元卿乎徐引之登峻嶺至一處豁然平敞玉堂朱閣女云此東華夫人所居也孫韜太平御覽字又藏㑹稽剡人入山師潘四明叅受眞法陶隱君手題握中秘訣門人罕能見之惟傳孫韜與桓闓二人而已魏道微於越新編上虞人好道相傳謂仙去今邑中有其墓又云道微得法於謝安山道慧嘉泰㑹稽志餘姚人讀逺公傳慕其為人遊廬山卜居西林三年王式辨三相義慧詰難之詞句煥顯又就學猛公猛講誠實為張融所難使慧當之挫其鋒氣融大服禇澄謝超宗皆加敬焉慧基釋氏稽古畧兩詔不起於會邑龜山立寶林精舍嘗著法華疏義入寂壽八十五曇斐嘉泰㑹稽志㑹稽剡人少棄家事慧基善莊老儒墨之書遊方攷究經典疑義還鄉居法華臺寺學徒甚盛衡陽孝王元簡廬江何子季皆師事之法慧於越新編持律甚嚴隱禹穴天柱峯誦法華經足不履人間者三十年王公貴人得一識其面以為美談僧䕶佛祖統紀齊永明四年沙門僧䕶於剡縣石城山見崖間光如佛燄乃鐫石為彌勒佛纔成面像齊末沙門僧淑來繼其功至梁有始豐縣令陸咸夢沙門二人謂曰建安王染患由於宿障剡縣僧䕶造彌勒石像若能成濟必獲康復咸以白王即召定林寺僧祐因舊功鏟入五丈至天監十五年畢功像身光燄通髙十丈世稱為三生石佛云謹按僧淑僧祐皆僧䕶後身也欲備見三生事迹故并錄於此慧皎續髙僧傳未詳氏族㑹稽上虞人學通内外博訓經律住嘉祥寺撰湼槃義疏十卷及梵網經疏行世又以寶唱所撰名僧傳頗多浮汎遂著髙僧傳一十四卷其序畧云前代所撰多曰名僧然名者實之賔也若實行潛修則髙而不名若寡徳適時則名而不髙名而不髙本非所紀髙而不名則備今録傳成通國傳之唐吳筠舊唐書本傳魯中儒士也舉進士不第乃入嵩山依潘師正為道士傳正一之法開元中訪道茅山久之東遊天台在剡與越中文士為詩酒之㑹所著歌篇傳於京師𤣥宗聞其名遣使徵之問以道法對曰道法之精無如五千言其諸枝詞蔓説徒費紙劄耳又問神仙修錬之事對曰此野人之事當以嵗月功行求之非人主所宜加意求還山許之復遊㑹稽逍遥泉石竟終於越中文集二十卷其元綱三篇神仙可學論為達識之士所稱苖龍寶慶㑹稽續志唐初人失其名能畫龍故呼之曰苖龍後得道仙去今龍瑞宮東南一峯崛起上平如砥人號曰苖龍上昇臺王氏墉城集仙録中書舍人謝良弼之妻東晉右軍逸少之後會稽人也良弼進士擢第為浙東從事而婚焉既而抱疾沉痼良弼赴闕竟不果行時吳筠天師駐䇿山隂王氏之族謁而求救為禁水吞符信宿即愈王氏感道力救䕶乃受籙精修焚香獨處絶粒嚥氣時有竒香異雲臨映居第宻接靈仙而人不知也忽謂其女曰吾悟道既晚修奉未精當隱景錬形洗心易藏二十年後方得蟬蛻耳歿後勿用棺器可作柏木帳致尸野中是夕卒家人如其言二十年有盜發殯棄其形於地隆冬之月忽聞雷震聲馳看之舉其尸輕如空殼孔莊葉三女仙於越新編上虞人天寶間學道武夷遇太姥元君授丹訣令往雲虛洞煉之宋治平間有江公者至山深入忽遇洞曰雲虛三仙女在焉仙童引見欵以胡麻飯江辭歸至家已三載矣陳寡言神仙通鑑字大初越州暨陽人隱居玉霄峯號曰華林天台科法有闕遺者拾而補之居常以琴酒為娱毎吟咏未嘗加飾有劉介者字處静聞寡言之名遂就華林請教奉几杖香火凢二十年盡寡言之道寡言將尸解謂處静曰當盛我以布囊置石室中愼勿以木為也享年六十四後處静與葉藏質應夷節為方外交久之將坐化以詩示其徒乃返眞别有詩十篇今存天台道元院秦景閑三洞羣仙録不知何許人㑹昌中寓止㑹稽市或飲酒佯狂凡十年好事者稍疑其異㑹稽張公每加欽禮忽一旦取秤鎚手挼良乆引之如餳取鐡杵搏之為餅良久皆復如故張素貧景閑曰我將去矣命取釡擊碎之以炭相雜壘於罏内告張曰炭火息後可取所化之物以豐爾家念道濟人可以世享其富翌日張視之皆紫金也印宗景徳傳燈録吳郡人姓印氏從師出家精湼槃大部唐咸亨元年抵京師敕居大敬愛寺固辭往蘄春謁忍大師後於廣州法性寺講湼槃經遇六祖能大師始悟元理以能為傳法師又採自梁至唐諸方達者之言著心要集盛行於世先天二年二月終於會稽山妙喜寺禮宗髙僧傳俗姓宋㑹稽人聞長壽寺和尚通達禪觀往叩其闗學習之心未嘗少懈師誨之曰汝之出塵有大利益可謂良玉度尺雖有十仞之土不能掩其光矣乃注湼槃經周二載挫鋭解紛恬然理順遂成夾注八十卷道亮髙僧傳姓朱氏越州人厥考前刺會稽郡亮年八歲出家極通經業受具後學河中三論復講湼槃經尋入深谷破衣覆形蔬食資命神龍元年詔亮與法席宗師十人入長樂大内坐夏安居二年詔於西園問道朝廷欽貴卒年八十一元儼髙僧傳俗姓徐氏事富春僧暉證聖元年隸懸溜寺從光州岸師諮受具戒後詣上京遇崇福意律師并融濟律師咸能昇堂睹奥共所印可後還江左徧行四分因著輔篇記十卷羯磨述章三篇金剛義疏七卷越邑精舍時稱法華晉沙門曇翼曾結菴山巔儼乃建置戒壇拓集律行晏坐不出㡬三十載天寶元載十一月坐終於戒壇院慧忠釋氏稽古畧越州諸暨冉氏受六祖心印居南陽白崖山黨子谷四十餘年不下山肅宗聞其道行徵赴京居千福寺西禪院帝問師在曹溪得何法師曰陛下還見空中一片雲麽帝曰見師曰釘釘着懸掛着又曰如何是無浄三昧師曰還見虚空麽帝曰見師曰他還眨目視陛下否帝領解至大厯十年十二月右脇而逝諡大證禪師國朝雍正十二年奉師致祭一次勅加封眞實大證禪慧海景徳傳燈録姓朱氏依越州大雲寺道智受業至江西參馬祖祖問曰來此擬須何事曰來求佛法祖曰自家寶藏不顧抛家散走作什麽師遂禮拜問曰那箇是慧海自家寳藏祖曰即今問我者是師於言下自識本心不由知覺踴躍禮謝後以受業師年老遽歸奉養自撰頓悟入道要門論一卷法門元晏竊出江外呈馬祖祖覽訖告衆云越州有大珠圎明光透自在無遮障處也智藏髙僧傳姓皮氏西印度種族留心律藏最為精敏大厯三年遊豫章因隸名天宮寺貞元中遇大寂禪師篤明心要及遊㑹稽於航塢山頂築小室安禪乃著華嚴經妙義宣吐亹亹學者歸之元和十四年無疾而終焚收舍利圓淨者建塔於院北峯靈一續文獻通考越中雲門寺僧持律甚嚴尤善詩與劉長卿皇甫冉嚴維相倡和有詩集一卷靈澈桂苑叢談越僧靈澈得蓮花漏於廬山傳江西亷使韋丹㑹稽風俗賦注㑹稽湯氏子善歌詩與劉栁善續文獻通考居東林寺字澄源與呉興詩僧皎然遊皎然薦之包佶李紓以是名顯元和十一年終於宣州開元寺建塔天柱峯有詩二十卷澄觀指月録姓夏侯氏山隂人才供二筆撰華嚴疏鈔窮圓頓之㫖化後門人見有金甲神人空中西逝拜問神何為曰取華嚴菩薩牙歸供養耳門人啓塔視之師容貌如生而失二牙以是知為華嚴菩薩也佛祖統紀開成三年勅𦵏終南山石室宰相裴休撰銘良价佛祖通載㑹稽人姓俞氏幼嵗出家年二十一往嵩山受具首謁南泉次謁溈山到雲巖問無情說法猶涉疑後因過水覩影大悟前㫖大中末於新豐山接誘學徒其後盛化於髙安之洞山國朝雍正十二年師勅封淨覺悟本禪寂然頭陀輿地紀勝太和二年春有頭陀曰寂然來遊沃洲山見道猷支遁遺跡泉石盡在戀不能去時浙東廉使元相國始為卜築寂然振起禪風白黑之徒附而化者甚衆樂天有沃洲山禪院記希圓髙僧傳姓張氏姑蘇人居㑹稽寶林山寺與時寡合多事㝠黙或問之則曰吾逍遥乎無形之場同師子遊戯耳景福中著元中鈔數卷恒勸人急修上生之業且曰非知之難行之為難圎居小房即瑯琊山頂相傳従瑯琊臺飛來有井應大江之潮候甚多靈怪一云此處禹鏁浙江蛟蜃之屬其名曰蛆蛆有雙耳其色蒼黄或縁竹木必風雨至矣圓為之受歸戒令勿作風雹之妖暨圓終多暴風雨五代全付十國春秋㑹稽人至豫章聞禪㑹之盛遂抵宜春仰山禮南塔已而還東府文穆王特加禮重賜紫方袍不受改賜衲衣號純一禪師天福二年東府戎將為闢雲峯山建院名曰清化開運中坐化有大風振林木逾時乃定惠舉舊浙江通志隱法華山梁武帝徵之不至昭明太子以金縷木蘭袈裟遺之天衣寺名始此宋老葉道人老學菴筆記龍舒人不食五味年八十七而平生未嘗有疾居會稽舜山天將寒必增屋瓦補牆壁使極完固下惟設簾多儲薪炭杜門終日及春乃出弟子曰小道人嘗歸淮南省親至七月望日鄰有住菴僧召老葉飯飯已亟辭歸問其故則曰小道人約以今日歸僧笑相去二三千里豈能必如約哉乃送之歸及門小道人者已弛擔矣武元照續文獻通考蕭山女子方孩母或茹葷即終日不乳及菜食乃乳母異之稍長忽夢神告曰汝本玉女坐累暫謫人世可絶食及覺欲不食母强食之又夢神怒曰違我戒剖腹滌之因授靈寶法以符水療人一日詣數十家聚話訪之已死矣陳明夷堅志越州攢陵舖兵也人呼為陳院長往來行歌無所定止能知未來事祁寒烈暑皆不畏避雪中不施一縷臥野橋上氣騰如蒸眼色正碧好以白堊書地且讀且歌字畫類五銖錢文觀者莫識中貴人典領攢宫者憐其寒常遺以衣乃轉與貧者淳熙辛丑嵗久不雨鄉民叩以豐凶應曰木災竹災魚災貧道災俄而髙岡發洪山水暴至所經竹木盡㧞魚鼈掃空陳大病不食㡬月腹皮皆凹入附骨隱隱見五臟人謂其必死俄復如初有蜀客來道堂見之焚香作禮曰先生正爲鄉里化縁造橋安得來此衆始悟其為異人神遊在彼云蔡華甫於越新編新昌人為縣從事遇道人授以術遂能驅使鬼神其婿常過華甫見園中有二虎倉皇驚走華甫曰無懼我當呼來即馴伏於地暮年丹成服之曰我將逺遊矣遂尸解時有從子在天台見其乗青騾從二童子問之曰道友邀我遊桐柏宮仲休於越新編越州人精習天台教而禪寂不接人事得紫衣海慧之號間作詩有天依十峯咏從朗嘉泰會稽志居蕭山祗園寺年逾百嵗門常晝掩毎誦蓮經衆鳥銜花匝坐潘閬一日謁之仍閉門不納閬留詩於門云門掩多年生緑苔想師心地似寒灰勞生擾擾休來此我是閒人尚不開梵卿嘉泰㑹稽志受具入台之東液山謁法眞聽天台教一日論經王義法眞嘆曰子得元妙於性相之外更謁照覺總禪師從容問荅心凝神釋遊鍾山居第一座入室常數百人住越之象田象田久廢師至乃復興今為名刹端裕五燈㑹元呉越王之裔六世祖守會稽因家焉師生而眉目淵秀十八受具往依浄慈一禪師未㡬偶聞僧擊露柱曰你何不説禪師忽微省去謁龍門逺甘露卓泐潭祥皆以穎邁見推晚見圓悟於鍾阜頓去所滯命掌記室㑹稽縣志年十八投大善寺則忠落髪受具見佛果勤和尚與語大恱遂往依勤住蔣山命典記室慈寧太后召裕演法於靈隱賜金襕袈裟紹興十八年移四明之阿育王倡道無倦二十年十一月示寂茶毘烟凝五色如車蓋收舍利無數弟子奉遺骨塔於鄮峯西華初賜號佛智大師至是諡曰大悟塔曰寶勝了演嘉泰㑹稽志少依東山廣化聴秀禪師夜叅即有省發趨衡陽投大慧禪師宗杲一見器許杲謂其徒曰若輩如針刺窗㣲見光影耳演乃一踏鴻門兩扇開也自臨安移住象田繼移靈隱慧暉續傳燈錄㑹稽張氏子幼依澄照道凝染削進具甫二十謁宏智智舉當明中有暗不以暗相遇當暗中有明不以明相覩問之語不契初夜定囬往聖僧前燒香而宏智適至師見之頓明前話次日入室智舉堪嗟去日顔如玉却嘆囬時鬢似霜詰之師曰其入離其出微自爾問荅無滯紹興丁巳開法補陀徙萬壽及吉祥雪竇淳熙三年勅補淨慈七年退歸雪竇十年仲冬沐浴而逝窆全身於明覺塔右淨全寳慶㑹稽續志諸暨人姓翁氏甫冠即出家入徑山投大慧宗杲杲曰汝有何能荅曰能打坐曰打坐何為全曰若問何為直是無下口處杲遂知其為法器全生長田家朴野不知書一日集衆採椒全亦預焉同輩戯云汝試作一椒頌如何全即應云含烟帶露已經秋顆顆通紅氣味幽突出眼睛開口笑這囬不戀舊枝頭衆皆嘆異志逺於越新編姓呂氏餘姚人於上虞等慈寺為僧遍遊諸方參聽天台宗教嘗講於朝錫師號遂為㑹稽講席之冠年七十卒經五日茶毗於烈熖中身不欹側齒根不壞重喜老學菴筆記㑹稽灋雲長老重喜為童子時初不識字因歸寺廊忽若有省遂能詩其警句云地爐無火客囊空雪似楊花落歲窮拾得斷麻縫壞衲不知身在寂寥中𢎞濟稽古續集字同舟天岸其號也會稽姚氏子從寶積寺舜田滿公出家授法華經輙能記憶既為大僧精持律學深究敎乗修懺懇切於觀定中見一尊者授以犀角如意自是辨博無礙開法於萬壽圓覺寺呪沙擲地以救海岸之崩後主顯慈集慶二寺遷主會稽圓通修念佛三昧詔住大普福寺歸清鏡閣是年寂法慈寶慶㑹稽續志上虞長慶寺僧灑掃一室終日晏坐庭有花竹泉石士大夫多造之慈善談論焚香煮茗延納無倦嘉泰初忽謝客閉門其行童辭往行在所慈戒其速囬久之無耗一日還慈喜曰汝歸甚好時方盛暑即令具湯沐澡潔畢易衣端坐其徒往視之已將瞑目亟呼云和尚何不留一頌乃云不曽生來無始劫今日當場又隨滅又隨滅萬里炎天覔㸃雪語僅脫口而逝仲皎於越新編居剡明心寺參竟禪學尤好篇章嘗於寺西星子峯前築白塔結廬其下號閑閑菴元陳嘉於越新編字志謨諸暨人文辭超邁每應舉主司必喜其文第以狂語見黜自號龍壇居士後為沃州山道人尸解去戴眞人㑹稽縣志性超曠逍遥物外行業為世所推嘗遊京師歸越朝士大夫多以詩送其行虞集送以詩曰戴先生日飲五斗不得醉再飲一石不肯眠昨從桃源來兩袖擕風烟長安道上小兒女拍手攔道呼神仙馬如游龍花如雨蹴踏春秋作朝暮東方不作窻間戯上帝還令海邊去海邊玉虹夜不收貝宮珠闕皆蛟蚪芝田玉樹久相待天上老仙那肯留戴先生鑑湖之水三千丈不可以鑑可以釀明朝亦脫錦袍去與汝酣歌釣船上與恭𢎞治紹興府志字行已號嬾禪餘姚九功寺僧戒行髙潔博通儒釋至杭題詩冷泉亭吳興趙孟頫見而異之遂定交焉後遊蘇州定惠寺端坐樹下而逝寺僧檢其囊無餘物但有雁峰詩云官路迢迢野店稀薄寒催客早添衣南分五嶺雲天逺雁到衡陽亦倦飛元長稽古續集字無明號千巖蕭山人族姓董始通九流百氏次習法華究律部於靈芝寺律師後參狗子無佛性話中峰為之決擇印正往烏傷伏龍山興復聖壽伽藍名聞朝廷降名香以寵嘉之賜僧伽黎衣及普應妙辨之號時習𢎞治紹興府志字定門山隂葉氏子延祐中以髙麗王薦召至京令說法於南城寺頂門忽現異光縈結如蓋賜號佛音眞應禪師南還主越之大能仁廣演妙義法名逺播善繼獻徵錄字絶宗諸暨婁氏子母夢神人授白芙蕖乃生始能言見母舉佛號合爪隨聲和之長客山隂靈祕寺窺三藏諸書嘆曰欲求出世非釋氏將疇依投其寺僧思恭祝髪習天台教觀天厯己巳住良陼大雄教寺講金光明經至正壬午移住天竺薦福甲子陞主天台能仁一夕集衆曰吾殆歸矣遂書偈而逝明金鬔頭於越新編㑹稽人𢎞治間住富盛之方泉橋生平不櫛沐服垢衲人呼為金鬔頭在青塘村幻出一舍有女織其中與金賡和已忽不見嘗於武林逢道者共飲已而覆杯去渡江道者擲雙履令渡金難之履忽化為舟道者竟渡金遂返過所飲肆譁聚百餘人云道者所覆杯膠不可啓金至啟之中有洞賔二字缽仙會稽縣志不知姓名年嵗常手捧數十瓦缽人叩之惟曰孝弟二字冬月赤身睡雪中體常温一夕卒衆殮之檢其缽有銀適如買棺之數將為營𦵏舉棺甚輕開視之敝衣而已元瀞稽古續集字天鏡號樸隱會稽倪氏子謁徑山元叟端禪師明單傳直指之道端公稱是般若中人洪武初召入内庭問道賜食而退後主靈隱卒自悅於越新編餘姚人戒行髙潔通儒書陶安毎與談易有異術能呪潮水不至洪武初被徵稱㫖僧玘厯代小史號太璞餘姚人專心禪學藏經五千四百卷無不成誦太祖雅愛之一日問曰為僧不了其報云何玘對曰為僧不了永墮阿鼻地獄上曰出何典玘曰出藏經第㡬卷上變色曰然則吾當何報邪玘叩頭曰天生聖人為生民主豈同於凡類邪上曰此又出何典玘曰出藏經第㡬卷命取經閲之信然大悅諭諸大臣曰卿等雖各有才不若是僧之忠誠也臨終沐浴更衣請上告訣適有事不見玘望位叩頭曰臣有生縁無死縁上聞知其語嘆曰噫玘死矣使人視之果卒遣人諭祭驛送還鄉溥洽列朝詩集傳字南洲山隂人族姓陸氏放翁之後於郡之普濟寺禮雪庭祥公禪定之餘肆力詞章洪武二十二年召為僧錄司右由左闡教陞左善世永樂四年詔修天禧寺浮屠車駕臨幸命公慶讚仁宗即位數被召問乞居南京報恩寺養老宣徳元年示寂年八十有二塔於長干西南之鳯嶺鄭曉今言靖難兵起溥洽為建文設藥師燈懺長陵聞其事囚之十餘年姚恭靖疾革車駕臨視問所欲言於榻上叩首曰溥洽繫獄久矣即日釋之白髪長數寸覆額成權萬厯紹興府志嵊人坐臥繩牀數十年日誦蓮華經一日牀前忽湧蓮花一樹圓澄㑹稽縣志字湛然東闗人俗姓夏少時為舖兵受杖投妙峯和尚薙髪為僧踰年得戒於雲棲蓮池以古佛期之掩闗六年適慈舟謁南海還寓越之止風相見契洽遂付囑焉澄素不曉文字一旦通豁講論經典俱有妙理開顯聖道場宗風大暢國朝圓信山隂縣志字雪嶠鄞人常遊若耶秦望山間瞥見古雲門三字豁然開悟嗣法龍池後駐錫雲門大闡宗風寧波府志號語風鄞朱姓子與圓悟同師二十九始祝髪常凍饑至赤體草宿乞食聚落而悟無入處後至秦望普濟寺始大悟結菴於武康之雙髻峰壁立萬山中遇虎不為害凡四坐道場南岳開仙徑山雲門皆其卓錫處順治四年結跏而逝瘞於寺之右隴十七年詔賜帑金五百兩修藏塔台州府周王喬靈異考字子晉周靈王太子好吹笙作鳯鳴浮丘公接以上嵩髙道家稱為右弼眞人治桐柏山掌呉越水旱台州府志五代時封元弼眞君宋政和三年封元應眞人紹興庚申加號善利廣濟真人台之寺院奉為䕶法伽藍名勝志吹臺山在永嘉縣南二十里上有王子晉吹笙臺劉奉林列仙傳周時人學道嵩高山積年後之委羽山能閉氣三日不息但服黄連已及千嵗名勝志委羽山在黄巖南十里世傳劉奉林於此控鶴輕舉漢茅盈三輔黄圖曾祖父濛於華山乗雲駕龍白日昇天先是邑人謡曰神仙得者茅初成駕龍上昇入太清時下元州戲赤城繼世而往在我盈帝若學之臘嘉平天台山志盈年十八委家學道詣南岳上眞西城王君受道道成命為太元眞人治大霍赤城玉洞之府時漢哀帝元壽元年也名勝志赤城有玉京洞蓋十洞天之第六茅司命眞君所治夏馥太平御覽字子治陳留人少好道服术餌雲母後入吳山從赤須先生受錬魂法又遇桐柏真人授以黄水雲漿法得道在洞中為明晨侍郎晉魏夫人南岳魏夫人内傳名華存字賢安任城人晉司徒魏舒女少讀老莊春秋三傳五經百子常别居一園父母逼之强適太保公掾南陽劉幼彥幼彦為修武令隨之縣舍閉齋别寢入室百日季冬夜半四真人來降於室夫人拜乞長生度世青童君曰此清虚眞人者爾之師也當受業焉景林真曰爾應為紫虚元君上眞司命封南岳夫人也後聖君命仙伯牙叔平授夫人青瓊之板丹綠為文位為南岳夫人使治天台大霍山南岳小録赤城山下别有洞臺方二百里魏夫人所居竺曇猷太平御覽燉煌人遊江左止剡之石城山乞食坐禪後移始興赤城山石室一日有神現形詣猷曰法師威徳既重來止此山弟子推室以相奉天台懸崖峻峙峯嶺切天古老相傳云上有精舍得道者居之雖有石橋跨澗而横石斷人無得至者猷潔齋累日往見横石洞開度橋少許覩精舍神僧謂猷曰却後十年自當來此今未得住於是遂反顧看横石還合如初虎薈竺曇猷赤城山石室坐禪有羣虎蹲於前猷因誦經一虎獨睡以如意扣其頭云何不聴經經畢而虎去支曇蘭太平御覽晉太元中憇始豐赤城山見一處林泉清曠而居之經數日忽見一人長數丈呼蘭令去又現諸異形禽獸以恐蘭蘭恬然自得乃屈膝禮拜俄而有人著幘稱珠斯王至蘭所乞受歸戒蘭即為授法辭别而去便聞鳴笳鼓吹響振山谷禪衆十餘共所聞見懷玉赤城志臨海人髙姓今樓石村其所居也號髙玉禪師居方山運水逺溪忽見一父老曰菴前石下有泉也玉舉錫迸湧盈尺乃入天柱山即今湧泉延息寺謹按髙僧傳懷玉唐時丹邱人今從赤城志作臨海人入東晉南北朝定光赤城志青州人許姓字靜照大同初隱佛隴三十年人罕知者初智顗在江陵夢光引至山頂曰汝當住此汝當終此及顗過佛隴光曰憶昔往時招手否顗即悟光曰金地吾已居之銀峯爾宜往今修禪寺是也陳太建十三年坐滅凡三瘞體骨踊出後置殿乃已慧命天台山方外志天台人叅南嶽思大禪師聞説三觀深悟元㫖得無礙辨說法如瀉將終誡門人精進淨行衆忽見佛與大士來迎即向西升空而去隋徐則隋書本傳東海郯人幼沉静寡欲精於議論聲傳都邑則嘆曰名者實之賔吾其為賔乎遂杖策入縉雲山陳太建時應召憇至眞觀期月又辭入天台山因絶穀養性所資惟松术而已太傅徐陵為之刋山立頌初在縉雲山太極眞人徐君降之曰汝年出八十當為王者師然後得道也晉王廣鎭揚州知其名手書召之遂詣揚州晉王將請受道法則辭以時日不便其後夕至五更死支體柔弱如生遣使送還天台定葬是時自江都至天台在道多見則徒步云得放還至其舊居取經書道法分遺弟子然後跨石梁而去不知所之須㬰柩至方知其靈化時年八十二王逺知方輿勝覽台州道士善易知死生禍福作易總十五卷一日雷雨雲霧中一人叱逺知曰所泄者書何在上帝命吾攝六丁雷電追取逺知惶懼據地旁有六人青衣已捧書立矣老人責曰上方禁文自有飛天保衛金科秘藏元都汝何者輙藏緗帙逺知曰青邱元老傳授也韓愈詩天官勅六丁雷電下取將蓋用此智顗景徳傳燈錄荆州華容人姓陳氏七嵗聞誦法華經即隨念之七卷之文宛如宿習於果願寺出家齊乾明元年謁大蘇山慧思禪師思一見謂曰昔靈鷲同聽法華今復來矣即示以普賢道場説四安樂行師入觀三七日身心豁然以所悟白思思曰非汝弗證非我莫識太建元年往金陵闡化凡說法不立文字以辨才故晝夜無倦七年隱天台山佛隴峯有定光禪師先居此峯謂弟子曰不久當有善知識領徒至此俄而師至宣帝建修禪寺割始豐縣租以充衆費及隋煬帝請受戒乃號師為智者門人灌頂日記萬言而編結之總目為天台教莂智晞續髙僧傳俗姓陳潁川人禀受禪訣加修寂定常居佛隴修禪道場樂三昧者咸共歸仰創造伽藍殿堂房舍悉皆嚴整惟經臺未構衆議曰香罏峯檉柏可共取之往諮於晞荅云山神䕶惜不可造次爾夜夢人送疏云香罏峯檉柏樹盡皆捨給經臺既感㝠示即便分部人工入山採伐未終數日告弟子曰今當永别㑹遇靡期言已寂然無聲諸弟子哭泣便開眼誡曰物始必終世相如是寧足可悲今去勿爾閙亂於吾也所窆龕墳在智者龕前二百餘步唐司馬承禎舊唐書本傳字子微河内温人少好學善篆隸書為道士事潘師正傳其符籙及辟穀導引服餌之術止於天台山則天聞其名召至都將還勅麟臺監李嶠餞之於洛橋之東景雲二年睿宗令其兄承禕就天台山追之至京問隂陽術數對曰損之又損以至於無為帝曰理國無為如何對曰國猶身也老子曰遊心於淡合氣於漠順物自然而無私焉而天下理固辭還山賜寶琴一張及霞紋帔開元九年𤣥宗又遣使迎入京親受法籙前後賞賜甚厚十年請還天台山𤣥宗賦詩以遣之尚書故實子微形狀類陶隱居𤣥宗謂人曰承禎𢎞景後身也尸解日白鶴滿庭異香郁烈號白雲先生謝自然白氏六帖蜀女眞謝自然泛海將詣蓬萊求師舟為風飄至一處山見道人詣言天台山司馬子微名在丹臺身居赤城眞良師也自然乃囬求子微受度後白日上昇唐類函自然於開元親受紫虛寶經於金泉山一十三年晝夜不寐兩膝上忽有印四壖若朱有古篆六字粲如白玉田虚應髙道傳字良逸得大洞法每水旱請禱蔽衣岸幘而坐應不旋踵元和中入天台屢詔不起因話錄良逸以虛無為心和煦待物不事浮飾而天格清峻人見者褊恡盡去呂侍郎渭楊侍郎憑皆北面師事母為喜王寺尼尼衆皆呼良逸為小師一日寺尼晨起見一虎在母門外走以告母曰此應是小師使送柴來不足畏也馮惟良神仙通鑑字雲翼相人也修道於衡岳中宮與徐靈府陳寡言為烟蘿友香火之外琴酒自娱久之就降眞堂師田虚應授三洞秘訣元和中東入天台桐柏觀自貞一先生完葺以來湮廢已久惟良乃再締構作上清閣降眞堂白雲亭翛閒院以三洞之道行於江表憲宗詔不赴即華林閣創栖瑶隱居以止一日命湯沐浴冠簡降庭若有所對召須臾陞階遂化年九十夏侯隱仙傳拾遺大中末遊天台獨止一室或露宿草樹間毎登山渡水則閉目而睡比至則覺人呼睡仙應夷節髙道傳字適中汝南人生時母夢流星入牖後遊天台與葉藏質劉處静為林泉友會昌中於桐柏觀之西南别建壇以居年八十五解化羅隱為之贊王可交神仙感遇傳蘇州崑山人年數嵗眼有五色光起㝠室中可以鑒物或謂其所親曰此疾也光盡即䘮其目父母召庸醫炙之光乃絶咸通十年十一月自市還家於河上見一大舫絡以金綵飾以珠翠張樂而遊可交立而觀之有青童引之登舫見十餘人峨冠羽服各執樂器傍一人言曰好仙骨為火所損未可與酒但不食十年方可得道耳以栗一枚與之令食遂奏樂飲酒童子復引之上岸忽如夢中足纔及地已墜於天台山瀑布巖下頃刻之間水陸千里台州刺史袁從疑其詐妄移牒驗其鄉里自失可交之日洎至天台時已三十日矣可交自此不食顔狀鮮瑩袁以羽褐授之使居紫極宮劉方瀛道教靈驗記天台道士常以丹篆救人與同志弋陽縣令劉翽按天師劍法以五月五日就弋陽葛溪錬銅造劍勅符禁水疾者登時即愈嘗於黄巖縣修齋勅壇以救疫毒咸通末無疾而終戒其門人使與劍俱𦵏乾符中和間台州裨將李生領徒發其墓欲以取劍見其尸柔軟容色不變顧視其劍哮吼有聲遂驚懼不敢取而去王仙姑輿地紀勝黄巖人小名子松家岱石村行至石櫃山遇仙成道灌頂天台山方外志姓吳氏始生三月能隨母稱三寶名有僧過門謂曰此子非凡因以灌頂為名七嵗入攝靜寺依慧拯出家年二十受具戒陳至徳初謁智者於修禪寺禀受觀法禎明元年隨智者止金陵光宅聽講法華隋開皇十三年夏受法華元義於江陵玉泉十四年夏受圓頓止觀於玉泉著湼槃元義二卷疏二十卷唐貞觀六年終於國清寺佛祖統紀義寧元年五祖章安灌頂禪師於天台國清寺為智威禪師説止觀心要智璪續髙僧傳俗姓張氏寓居臨海投安静寺慧憑法師為弟子聞智者為世良導即泛舸豐流直指台岫伏膺受道乃遣行法華懴悔第二七日初夜懺訖還就禪牀見九頭龍從地涌出上昇虚空隋大業元年引見内殿遣通事舍人盧正方送璪還山供給豐厚以貞觀十二年卒於寺春秋八十三明淨續文獻通考髙密人少出家後南遊天台至村中化食囬羣虎皆張口閉目若有饑相淨乃以匙挑飯納其口中明日化食囬虎又如之人皆駭異貞觀三年旱召淨至京祈雨大獲甘霖海内有年乃度僧三千以酬之後還義勝寺豐干寒山拾得赤城志號國清三隱豐干者貌尤寢被髪布裘或時唱歌人問之第云隨我騎虎遊松門三人每邂逅則長吟大笑人莫測也有詩偈三百題松石間如云日日日東出日日日西没不知千古萬古人送向青山成底物人競傳之貞觀中閭丘守嘗問豐干天台有何賢聖荅曰見之不識識之不見欲見而識不得取相國清有寒山拾得狀類風狂歌笑不常蓋普賢文殊後身也公至宜謁之至則二人方據火談笑閭丘遽作禮二人云豐干饒舌耶遂握手出門而去其後寒山隱寒石山拾得隱祥雲峯遺跡可攷獨豐干不知所終國朝雍正十一年度和聖大士拾得圓覺慈度合聖大勅封寒山妙覺普士一行舊唐書本傳姓張氏先名遂魏州昌樂人出家為僧師事沙門普寂後往荆州當陽山依沙門悟眞以習梵律開元五年𤣥宗徵至京置於光太殿數就訪安國撫人之道言皆切直無有所隱撰調攝伏藏十卷天乙太乙經及太乙局遁甲經釋氏系錄各一卷時麟徳厯經推步漸疏一行推周易大衍之數立衍以應之故撰開元大衍厯經至十五年卒年四十五賜諡曰大慧禪師初一行求訪師資以窮大衍至天台山國濟寺見一院古松十數門有流水一行立於門屏間聞院僧於庭布算聲謂其徒曰今日當有弟子自逺求吾算法已合到門豈無人導達也即除一算又謂曰門前水當却西流弟子亦至一行承其言而趨入稽首請法盡授其術焉門前水果西流湛然赤城志常州人戚姓號荆溪禪師天寶大厯間優詔不起晚歸台山注天台教今赤城釋籖巖是也一日説法竟隱几而化人號天台敎主云代病髙僧傳天台人姓陳氏出家國清寺次於河陽為民救旱立道場啓視畢雲起膚寸雷雨大作自此歸心者衆先是三城間多暴風雹動傷苖稼毒龍為之也代病為誦密語後經嵗序都無是患大厯元年登太行遊霍山乃深入幽邃結茅而居後於趙州救荒作施食道場前後八會遐邇賴之以貞元十九年七月跏趺示滅清觀髙僧傳字明中臨海人姓屈氏詣國清寺投元璋律師執侍瓶鉢年十八洞明三觀兼得深定仍善屬文長於詩筆大中初天下寺刹中興觀入京請大鐘歸寺鳴擊并重懸勅額則集賢院學士栁公權書題也復請藏經歸寺後無病而終遺則五燈㑹元京兆人姓長孫氏初謁忠襌師大悟元㫖遂南遊天台隱於瀑布之西巖元和中慕道者日至高僧傳始天竺達摩以釋氏心要至傳其道者有曹溪能嵩山秀學能者謂之南宗學學秀者謂之北宗學而信祖又以其道傳慧融融得之居牛頭山由是逹摩心法有牛頭學則既傳忠之道精觀乆之遂南遊天台至佛窟巖蔚為精舍傳則道者又自以為佛窟學坐殁夜山下人聞若山崩旦望之則綵雲翔泊於巖上希運舊浙江通志嗣法百丈嘗行脚至天台遇二僧與俱行阻大溪運趺坐水次二僧履水如陸以手招之曰渡來師叱曰這自了漢吾早知當斫汝脛僧歎曰眞大乗法器也言訖不見宣宗即位賜號斷際禪師後開法黄蘖法席冠天下實為濟宗之祖義元其法嗣也國朝雍正十二年奉師致祭一次勅加封正覺斷際禪五代厲歸眞赤城志嗜酒常單衣精水墨漢乾祐三年於中條山飛昇語人曰吾台州唐興縣人也珍珠船歸眞嘗遊洪州信果觀内塑像雀蛤糞穢歸眞於壁畫一鵰筆跡奇異自是鳥雀無復栖者朱霄外十國春秋台州道士也素有道術為忠懿王錢俶所知遂命葺台州之白雲菴為棲霞宫以霄外主之道育髙僧傳新羅國人自唐景福壬子來遊天台挂錫於平田寺日中灑掃殿廊料理常住得殘羨之食雖色惡氣變收貯於器齋時自食與僧供湢浴煎茶遇薪水中蠢蠢乃置之逺地䕶生偏切行之四十餘載未嘗少廢身出紺赤色舍利有如珠顆人或求之隨意皆獲晉天福三年終於僧堂云宗靖景德傳燈錄台州人初叅雪峰密承宗印歸故鄉住六通院錢王命居龍興寺廣順初年八十一錢王請於寺之大殿演無上乗黒白駢擁僧問如何是六通家風曰一條布衲一觔有餘問如何是和尚家風師曰早朝粥齋時飯錢王特加禮重署六通大師顯徳元年示滅塔於大慈山明眞景德傳燈錄黄巖人自元沙得法廽入浙中錢武肅王請説法住持上堂僧問如何是璿璣不動師曰青山數重僧曰如何是寂爾無垠師曰白雲一帶徳韶僧寶傳龍泉陳氏年十五有梵僧見之拊其背曰塵中無置汝所也乃往依龍歸寺剃髪十八詣信州開元寺受滿戒後唐同光中至曹山有僧問法眼禪師曰如何是曹源一滴水法眼曰是曹源一滴水於是大悟十國春秋文益立法眼宗謂德韶曰汝向後當為國王所師大𢎞吾道遊天台觀智者遺蹤如故居徳韶與智者同姓時謂之後身忠懿王鎭台州徳韶語王曰他日為霸主無忘佛恩及襲位迎入杭州尊為國師開寶五年示疾於蓮華峰集衆言别跏趺而逝國朝雍正十二年師致祭一次勅封妙慈圓徹禪羲寂十國春秋居天台國清寺善𢎞教法忠懿王遣使髙麗求取一家章疏髙麗君乃命國僧諦觀報聘以天台敎部還歸於我諦觀既至禀學羲寂於螺溪之上王為建定慧院賜羲寂號凈光大師卒追諡凈祖佛祖統紀螺溪以授寶雲寶雲以授法智法智大肆講説遂專中興敎觀之名宋張無夢神仙通鑑字靈隱號鴻濛子鳯翔盩厔人入華山事陳希夷先生多得微㫖久之遊天台登赤城廬於瓊臺觀行赤松導引安期還丹之法間以修煉内事形於歌詠累成百首題曰還元篇眞宗召對令講易即説謙卦上問曰獨説謙卦何也曰方大有之時宜守之以謙上喜復命講還元篇曰國猶身也心無為則氣和氣和則萬寶結矣心有為則氣亂氣亂則英華散矣此還元之大㫖也賜金帛皆不受乞還山復賜處士暢飲先生號亦不受居瓊臺十餘年遊嵩山泛湘漢抵金陵年九十九終三日頂中有白氣勃勃然髙三尺餘移時方散有瓊臺詩集行於世張用誠續文獻通考本名伯端字平叔號紫陽台州人嘗入成都遇劉海蟾得金丹術歸以所得著悟眞篇八十一首授扶風馬黙曰平生所學盡在是矣嘗與僧神遊揚州觀瓊花紫陽手中拈出僧無有也台州府志用誠臨海人為府吏在府辦事家送膳至衆以其所食魚戲匿之梁間平叔疑其婢所竊歸撻其婢婢自經死一日有蟲自梁間下驗之魚腐蟲出也平叔乃喟然嘆曰積牘盈箱其中類竊魚事不知凡㡬因賦詩云刀筆隨身四十年是非非是萬千千一家温飽千家怨半世功名百世愆紫綬金章今已矣芒鞵竹杖任悠然有人問我蓬萊路雲在青山月在天賦畢縦火將所署文卷悉焚之因按律遣戍先是郡城有鹽顚毎食鹽數十觔平叔奉之最謹臨别囑曰若遇難但呼祖師三聲即解汝厄後械至百步溪天炎浴溪中遂仙去至淳熙中其家早起忽有一道人進門坐中堂叩其家事厯厯隨出門去人謂平叔歸云百步嶺舊有紫陽眞人祠扁云紫陽神化處兩浙名賢外錄元錢塘瑞石山道士徐𢎞道常感張平叔住山傳訣故菴名紫陽國朝雍正十一年仙紫陽眞人勅封大慈圓通禪彭文昌赤城志邑之彭溪人有道行政和中令晁昌女惑於祟昌以市之淫祠為妖焚其廟怪遂絶王茂端天台山方外志行上清大洞法通眞達靈事驗甚著養母至百嵗茂端年九十八清健不衰人呼為王靈寶其弟契眞亦行大洞法號小靈寶所著靈寶教法秘籙十卷留桐柏觀戒闍黎天台山方外志臨海婁氏子十五出家至杭見天醫波利多乃為薙髪受具足戒故名善戒將滅之日於台州兠率寺擊鼓集衆為説觀音圓通法門乃下座出殿前湧身虚空現諸神變還入殿内復昇法座左手現日右手現月放百寶光明次於口中現蓮華十二朶華放寶光十二色又於頂上放無數光師曰老僧有如是妙用以彰釋迦如來正法世緣已畢與汝作别言訖合掌而逝行滿髙僧傳萬州南浦人聞天台靈聖之跡結束遊之棲華頂峯下智者院知衆僧茶竈居㡬十載未覩其慍色先是居房檻外有巨松横枝之上寄生小樹毎遇滿出坐其寄生木必嫋嫋而側時謂此樹作禮茶頭也開寶中預向人説我當行矣令衆僧念文殊名號相助黙焉坐化暜岸五燈㑹元洪州人於百丈門下得㫖後聞天台勝槩乃結茒薙草宴寂林下為四衆所知創平田禪院後終於本院遺塔存焉道榮天台山方外志淳化中居長隴院習禪定靈異頗多時以羅漢目之既入滅人有見於壽昌五百應眞位者今肉身尚存宋元符間縣令太史章以久旱躬往拜請迎至縣雨即充洽孑然赤城志臨海人薛姓號智湧法師住白蓮寺寺後有龍湫路嶢陿師咒之使遷一夕大風雨遂徙寛地寧海建法㑹請主法席寐中見有持牒來者曰兜率天請説法又夢一龍化為神告曰師七月當歸矣既寤而化圓智五燈㑹元台州林氏子兩浙名賢外錄初依仙法師削染因觀蓮燈發明具變二法往天台謁元公舉蘇子瞻東林偈始悟有溪若是聲山是舌無山無水好愁人之句元為之印可後住天竺稱法中龍象處咸天台山方外志天台王氏子七嵗入國清出家十四入天台閲藏經三年而畢初住赤城崇善姑蘇李庭芝將守台夢神人曰天台五祖臺下有龍頭九九和尚宜就見之至郡諮詢莫知其説閩士陳白曰天台五祖居赤城今咸師住此生於丙辰九月九日其龍頭九九之謂乎庭芝即往謁見寺宇隘陋乃卜就東南地開基之日獲銅磬於土中天祐元年正月法鼓擊之不鳴者七日至七月告衆曰二十三日吾將行矣至時趺坐而化法濟赤城志臨海人師黄巖浩先罕臥食冬夏不爐扇建炎寇亂與其徒各燼一指以保城邑毎誦法華至藥王品輙太息曰身如垂疣虚生何益遂采薪自焚是夕星月皓然忽天雨白花大如朔雪旦拾遺骨得舍利焉澤龕赤城志寧海人葉姓建梁王寺塔塔成或請記歲月龕曰吾自有之乃取一鐸朱書二十字使垂之絶頂曰此塔記也乾道中通守趙師夔侍母陳經行見塔壞欲新之使取鐸書以觀則曰二十世十八姓之僧造塔遇走小月東邑之氏修治趙母子駭嘆施緡錢百萬且繪龕像於塔下焉行機五燈㑹元台州楊氏年二十五學出世法晚見此菴宻有契証出應莞山刀耕火種單丁者一十七年一日偶看斫樹倒地忽然大悟未㡬有江州圓通之命乃曰吾道將行即欣然曳杖而去智策五燈㑹元天台陳氏子幼依䕶國僧楚光落髪十九造國清謁寂室光灑然有省往豫章謁典牛道由雲居風雪塞路坐閲二十四日午初版聲鏗然豁爾大悟及造門典牛獨指師曰甚處見神見鬼來師曰雲居聞版聲來牛曰是甚麽師曰打破虚空全無靶柄牛曰嶄然超出佛祖他日起家一麟足矣兩浙名賢外錄後住徑山之塗毒將示寂門人以文祭之聽至尚饗為之一笑越兩日沐浴更衣説偈而逝元黄雲翔黄巖縣志號雲庭道人少好道術習雷法能驅役鬼神隣有應氏子五人俱患􅐇疾醫治不效雲翔治之夜半神現致一木偶斧其腹有大蛇蜕盤旋其内有五蛇子破之五小蛇俱生雲翔為之焚化患者並瘳應以大蛇未獲為慮乃刻日勅雷電震殺之應氏捐其所居為道堂今施水菴是也曹法師天台山方外志居溪南大路旁曰大路曹氏去桐柏觀為道士謁張眞人盡通其法囬至杭適大旱禱雨無應法師書片紙於背上曰雨出賣有司聞之命往吳山用一大甕盛水燒磚投其中青天轟雷一聲四神將立左右曰上蒼主旱雨不可求法師曰權借太湖三尺水須臾隂雲四合大雨如注平地尺餘頃之開霽視簷下水悉有鮮魚蘊草太湖果乾三尺諸司厚貺皆不受年七十餘終今有法劔藥磨存焉行端續傳燈錄號元叟臨海何氏初叅藏叟於徑山尋以靈隱山水清勝往挂錫焉大徳庚子出世湖之資福名聞京國特㫖賜慧文正辨禪師平章張閭舉師主中天竺皇慶壬子遷靈隠有㫖設水陸大會於金山命師昇座説法竣事入覲加賜佛日普照之號至治壬戌徑山虛席宣政行院請師補其處三被金襕袈裟之賜慕其道者鱗萃至無所容以至正辛巳書偈訣衆垂一足而死本無稽古續集號我菴黄巖人依寂照於中天竺即有省更依湛堂澄公精研敎部寂照惜之寄以偈曰依教入禪今古有從禪入教古今無一心三觀門雖别水滿千江月自孤師後出世祝湛堂夕照二香初主四明延慶後遷杭之上天竺無疾而蜕明陳岳黄巖縣志字甫申元末隱居委羽山守道自髙間出遊闤闠中人問其里居則指山示之嗜學能詩文善書畫明初遊江湖已而返故山閉門謝事注道德經及元牝賦後莫知所終吳棲霞太平縣志棲霞二十都消村人居郡城棲霞宮天旱衆請禱雨吴以天譴不能多求隨持呪囑云行雨三分寄雨一分寄往太平二十都中是年消村藉此有秋慧日獻徵錄號東溟天台人依平山等公落髪渡浙河拜竹屋淨公於上竺觀音敎寺時下竺靈山敎寺災至正元年宣政使髙納麟謂非師無以膺起廢之任師至修普賢大士殿四年又遷住上天竺洪武改元詔入京時師年最髙白眉朱顔其班前列帝問以升濟沉㝠之道師備述其故帝恱顧衆言曰金剛楞伽皆攝心要典茍有不通質諸白眉法師可也辭歸天竺山十二年七月朔日夢青蓮花生方池中清芳襲人曰此生淨土之祥也至四日書頌而寂宗泐名山藏臨海人始生坐即趺跏人異之八嵗從全悟學經藏過目成誦自是深入秘密兼通古文詞與僧來復齊稱髙帝致天下髙僧泐首應詔至主天界寺奉使西域帝喜之命與吳印蓄髪將授之官印蓄髪拜官泐竟不受慧曇獻徵錄姓楊氏天台人年十六受具戒學律於明慶果公習教於髙麗敎公眞積力久忽嘆曰截斷衆流一超直入非禪波羅密曷能致之時笑隱訢公說法於中天竺師往造焉洪武元年三月開善世院特授演梵善世利國崇敎禪師住持大天界寺三年六月奉使西域至省合剌國國王館於佛山寺待以師禮九月庚午示㣲疾趺跏而逝王斵香為棺聚香代薪築壇而茶毘之祔𦵏其國舍利塔中無慍稽古續集字恕中臨海陳氏依徑山元叟出家剃度於昭慶律寺受戒性愛靜隱雖兩住名山甫及三載而退後日本國主以水晶數珠峨山石研為贄請命太祖祈師往化師以老病辭弟子居頂迎住於鄞之翠山是年七月書偈而逝𦵏於唐嶴之原有二㑹語錄續大慧竹山頌古山菴雜錄淨土詩偈頌等若干卷行世裘聖僧天台山方外志邑人幼嵗出家住國清寺後遊外二十年而歸常擕一小孫出遊途遇虎馴伏於側孫歸語家人師摩其肩曰莫説莫説遂失音師化後乃能語世傳伏虎禪師後身也國朝靈睿舊浙江通志號攝菴姓鍾太平人在襁褓即手不觸穢長娶某氏女定情之夕忽棄去有同行人指往大慈寺及門忽不見心怪之是日即薙髪時有門大師講台宗遂秉其戒私謂妙義當不止此㝠搜廣討始有心得逺近道俗宗師之越二十年始主講席發明台教宗㫖契理文符了無礙滯弟子從者日衆晚年鍵戸不出創度親菴於北固山麓卒年八十一金華府漢劉嚴龍城錄金華山有仙洞俗呼為劉先生隱身處其内有三十六室廣三十六里有石刻以炬照之云劉嚴字仲卿漢射聲校尉當恭顯之際極諫貶於東陬隱迹於此莫知所終道士蕭至元記趙炳後漢書方術傳字公阿東陽人能為越方時遭兵亂疾疫大起以其術療病與閩人徐登遇於烏傷溪上各試所能登乃禁溪水水為不流炳復禁枯樹樹即生荑二人相視而笑其道貴尚清儉禮神惟以東流水為酌削桑皮為脯但行禁架所療皆除後登物故炳東入章安百姓未之知炳乃故升茅屋梧鼎而爨既而爨熟屋無損又嘗臨水求渡船人不和之炳乃張蓋坐其中長嘯呼風亂流而濟於是百姓神服章安令惡其惑衆收殺之人為立祠於永康至今蚊蚋不能入也抱朴子趙炳以氣禁人人不能起禁虎虎伏地低頭閉目便可執縛以大釘釘柱入尺許以氣吹之釘即躍出射去如弩箭之發異苑趙侯以盆盛水吹氣作禁魚龍立見晉黄初平神仙傳蘭溪人年十五家使牧羊有道士見其良謹將至金華山石室中四十餘年翛然不復念家其兄初起行索初平厯年不得後見市中有一道士善易問之曰吾弟牧羊失之四十餘年不知存亡所在願君占之道士曰昔見金華山中有一黄初平非君弟乎初起聞之驚喜即隨道士去求弟果得相見悲喜語畢兄問初平曰牧羊何在荅曰近在山東初起往視之杳無所見但有白石纍纍曰山東無羊也初平曰羊在耳兄自不見初平叱羊起於是白石皆起成羊數萬頭兄曰我弟獨得神仙道如此可學否弟曰好道便得耳初起於是捨妻兒留就初平服松柏茯苓至萬日日中無影顔如童子乃俱還鄉里親戚略盡乃復去臨行以方教南伯逢初平改字為赤松子初起改字為魯班東齋記事婺州金華山赤松觀乃其飛昇之地徐公仙苑編珠金華鄉里人也入山見數道士飲酒乃與公一杯飲訖醉臥覺來見其地成一湖歸家已數代孫至今金華山中有徐公湖路光神仙通鑑又名大安西蜀大寧軍内黄縣人後徙居婺州舍家修道遊至河陽假舍驛亭吏曰不可宿驛中有妖光曰吾有神劍能斬邪怪遂投宿夜半風寒凜凜瞑目視之庭隅中有婦人悲楚告曰眞官乞賜救㧞此乃張氏古宅向為寇劫掠殺妾而埋此也若得收葬方遂往生翼日掘之果得連環白骨遂𦵏之於髙陵晉太康五年縱步姑射忽於古檜下見一老叟衣黄裘踞石而坐乃再拜求道叟以六天如意大法經籙謂之曰依此行持濟生度死妙用難悉拂袖而去復反顧曰修半紀相㑹自是往華山仙掌峰修煉至永康元年三月秦地血雨降妖星晝見疫毒流行敬施符水㸃混元燈越三旬方息二年正月虎兕入城民心揺動莫能禁止王戎奏帝召入内依混元法攝召虎兕自空飛至呪水噀之化為蠅蟆布氣吞之一城安静帝喜賜以綠紈朱服青絲縚碧玉環及以金帛贈之笑而不受遂居華山以混元籙傳之丁義以混元經傳之郭璞以混元法傳之許旌陽以混元針灸傳之妙通朱仙大安元年八月十二日倐忽飛舉昇天而去陳雷筆叢東陽人幼出許長史門長史常使典守經書頗加訓授得長史自步七元星圖長史去後因還東陽義熙十三年與東陽太守任城魏欣之兄子二人共合丹丹成三人前後服之皆有神異化遁而去南北朝孫遊嶽雲笈七籖字頴達東陽人嘗步赤松磵縉雲堂遂卜居之宋太初中簡寂先生至自廬嶽乃摳衣而趨嗣承奥旨授三洞經法并所秘楊眞人許掾手跡因茹芝却粒服穀仙丸六十七年顔彩輕潤齊永明二年詔主興世館門弟子數百人惟陶𢎞景入室焉惠約續髙僧傳字徳素姓婁東陽烏傷人母夢金像而有孕及誕日光香充滿身白如雪因名靈粲泰始四年於上虞東山寺剪髪時年十七事南林沙門慧静又隨静住剡之梵居寺竟陵王作鎭禹穴聞約夙徳雅相歎屬汝南周顒為剡令欽服道素於鍾山雷次宗舊館造草堂寺便有終焉之託齊太宰褚淵請講淨名勝鬘淵遇疾晝寢見梵僧云菩薩當至俄而約造焉遂豁然病愈即請受五戒後還都又住草堂少傅沈約隆昌中外任擕與同行在郡惟以禪誦為樂還住本寺天監十一年始勅引見大同元年九月現疾而臥異香滿空合掌入湼槃春秋八十有四於獨龍山寶誌墓左瘞之傅大士佛祖統紀中大通六年烏傷居士傅翕至松山結菴雙檮樹間自號雙林善慧大士令弟子奉書詣闕帝預勅鎖門以觀其異大士袖出木槌一扣諸門盡開見帝於善言殿婺書字元風遇胡僧與語因地大士不應僧令臨水照之乃見纓絡莊嚴法相具足即悟前因因問修道之地僧指松山下雙檮樹曰此可矣大士因闔室修道數見光怪所居恒有虎以餘食投之自是馴伏大通六年詔供養於鍾山後還松山兩樹根株異植枝葉連理因於其間置刹為輪藏以轉諸經太建元年示疾卒唐元朗佛祖通載如意中得度就㑹稽叩宗法師商畧律部依恭禪師研究心法行頭陀敎初南岳惠文禪師悟法華宗㫖以授惠思思授天台智顗顗授章安灌頂頂授縉雲智威威授東陽惠威朗奉事東陽盡傳其道獨處巖穴凡三十年宴坐左溪因以為號每曰泉石可以洗昬䝉雲松可以遺身世吾以此始亦以此終春秋八十有二弟子神邕元淨法燈消辨湛然等數十人傳其敎元策續文獻通考金華人嘗遊河洛往謁六祖後歸金華大開法席道悟符載碑記姓張氏婺州東陽人年十四出家依明州大徳祝髪二十五受戒於杭州竹林寺初叅國一於徑山大厯十一年隱於四明大梅山建中初謁江西馬祖二年叅石頭乃大悟遂隱當陽紫陵山後於荆城東天皇廢寺入寂法嗣三人曰慧貞曰文賁曰幽閒靈黙五燈㑹元五洩山靈黙禪師毗陵人姓宣氏初謁馬祖遂得披剃受具唐貞元初住白沙道場復居五洩元和十三年三月二十三日沐浴焚香端坐告衆奄然順化乾俊乾輔因話錄江南多名僧貞元元和以來越州有清江清晝婺州有乾俊乾輔時謂之㑹稽二清東陽二乾神暄髙僧傳俗姓留建陽人客遊婺州入開元寺出家誦七佛俱胝神咒昬曉不絶納戒畢於金華山北洞止息不構菴室作露地頭陀有神人吐紫色雲氣覆之遐望冉冉猶獨柱觀焉金華山北多寒少陽神人問曰師須何物曰吾在此山之隂苦於凛冽神曰此小事耳至夜聞喧闐之聲明旦見一小峰移矣文舉髙僧傳姓張氏東陽人身量六尺餘其形如山其貌如玉静若止水動如浮雲與佛窟則公禪道並驅相髙勅為國清寺大徳先是智者大師立七日金光明道場毎年九月黒白二衆無逺弗届主事僧清藴咨謀於舉置寺莊田十二頃自此光明會不聞告乏以㑹昌二年五月化去立塔於寺之西峰神智髙僧傳義烏人俗姓力捨家就雲門寺惟孝為師年十二一食斷中持大悲心咒應法登戒峻勵恪勤大中初年廵遊暨陽老於禪室恒咒水盃以救百疾飲之多差大中間入京兆相國裴休奏請院額曰大中聖壽仍賜左神策軍鐘一口天后繡㡧藏經五千卷裴君為書殿額以光啓丙午十二月終於東白山遷座歸暨陽南山入塔焉俱胝五燈㑹元金華山俱胝和尚初住菴時有尼名實際戴笠子執錫遶師三匝曰道得即下笠子三問師皆無對逾旬天龍到菴師乃迎禮具陳前事龍竪一指示之當下大悟自此凡有學者叅問師惟舉一指無别提唱將順世謂衆曰吾得天龍一指頭禪一生用不盡言訖示滅德謙指月錄在婺州智者寺居第一座㝷常不受淨水主事嗔曰上座不識觸淨為什麽不受淨水師跳下牀提起淨瓶曰這箇是淨事無語師乃撲破臨遷化問侍者昔釋迦如來展開雙足放百寶光遂展足曰吾今放多少侍者曰昔日世尊今宵和尚師以手撥眉曰莫孤負麽乃説偈曰驀刀藂裏逞全威汝等諸人善䕶持火裏鐡牛生犢子臨岐誰解凑吾機偈畢端坐而逝舒道紀金華赤松山志生長於婺為赤松黄冠師埋光鏟彩不求名聲自號華陰子常與禪月貫休為莫逆交日夕瞻仰二黄君之祠若意交神㑹人莫測其遇與不遇也後亦却食不疾而化又數年有於赤城見之者五代貫休十國春秋字徳隱俗姓姜氏婺州蘭溪人投本邑和安寺圓貞禪師出家日誦法華經一千字耳所暫聞不忘於心受具之後往洪州傳法華經起信論皆精奥義蔣瓌開洗懴戒壇命貫休為監壇乾寧中謁呉越武肅王獻詩云滿堂花醉三千客一劍霜寒十四州武肅命改為四十州乃可相見休曰州亦難添詩亦難改閒雲孤鶴何不可飛遂擔簦遊荆南與呉融相遇往復酬荅心相得也已而入蜀至成都獻詩有云一瓶一缽垂垂老萬水千山得得來呼為得得和尚太平清話貫休嘗自夢得十五羅漢梵相尚缺一有告者曰師之相乃是也遂為臨水圖以足之保暹婺書字希白金華普惠院僧景徳初陳充所序九僧詩暹其一也宋季道華兩浙名賢外錄季隱子名道華眞定人晚遊義烏青巾褐裘與陳炳交而以奕棋自晦隱居不食能飲酒嗜紙得紙即撚為枚以齒錬之無紙與酒則黙坐竟日或即危垣之巓踞坐下視大笑臥積雪中無寒色一旦語其徒曰吾飲止今日耳及期趺逝衆埋之明年金華吕道士元素過小茅山遇之語呂曰為我謝宛陵陳主簿蓋炳也瓊玉萬厯金華府志陳氏女年十九與姊浣於澗中得桃實大如拳啖之從此不復火食惟飲酒啖生果初不識字忽能詩辭為人言禍福悉驗一日邀其兄遊四明海中兄乗舟而己行水上閲數日衣不濡語兄曰我知來事恐泄天機姑以風花雪月為詠而寓意其中政和七年召見賜號妙靖錬師乞還山賜肩輿敦遣壽九十端坐而化法齊景徳傳燈錄婺州人姓丁氏受心印於廣法大師建隆二年廣法歸寂付授住持節使錢仁奉禮重請闡揚眞要太平興國三年捨衆就本院創别室宴居咸平三年示滅世壽八十九僧臘七十二志䝉佛祖統紀婺州徐氏衣錦衣喜食豬頭言人災祥無不驗一日坐化於三衢吉祥寺遺言吾是定光佛至是奉眞身祈禱神應不歇世目為豬頭和尚泊宅編祥符寺轉藏成僧俗設齋以落之一僧丐齋衆見其藍縷不加禮拂袖而去或曰此豬頭和尚也使人邀請曰我不轉此藏亦不轉衆聞其語異相率追之僧曰要我轉更三十年竟不顧而去三衢守饌豬頭召師食自窗暗窺之見一鬼從旁食師無預焉守以告之師尋坐亡自師之出寂無施金轉藏者故老憶師言相與修禮迎眞身歸至藏院郡人輻輳日獲數千贊元僧寶傳字萬宗義烏人雙林傅大士之逺孫也三嵗出家年十五遊方至石霜謁慈明禪師助舂破薪慈明移南嶽又與俱及殁𦵏於石霜植種八年乃去兄事蔣山心禪師心殁以元繼其席舒王與元游如昆弟元豐初王罷政府往來山中有詩贈之曰不與物違眞道廣每隨緣起自禪深舌根已淨誰能壞足跡如空我得尋人以為實錄懷志續傳燈錄婺州呉氏子年十四師智慧院寶偁二十二試所習落髪肄講宿學敬慕晚至洞山謁眞淨久之辭去菴居二十年不與世接崇寧改元冬曵杖造龍安人莫之留明年六月晦問侍僧日早暮曰已夕矣遂笑曰夢境相逢我睡已覺汝但莫負叢林即是報佛恩徳言訖示寂於最樂堂師一續傳燈錄字水菴居淨慈婺州馬氏子十六披削首叅雪峰慧照照深肯之住後上堂舉圓悟師翁道叅禪叅到無叅處叅到無叅始徹頭水菴則不然叅禪叅到無叅處叅到無叅未徹頭若也欲窮千里目直須更上一層樓牧䕶金華雜識留布衲於東陽法雲寺忽有病於寺者倉卒無醫藥乃取布縷煎湯飲之即瘥自是用者輙效久之惟餘一領今亦盡矣若芬畫禪字仲石婺州曹氏子為上竺寺書記模寫雲山以寓意求者漸衆因謂世間宜假不宜眞如錢塘八月潮西湖雪後諸峰極天下偉觀二三子當面錯過却求玩道人數㸃殘墨何邪歸老家山占勝作亭扁曰玉澗因以為號又建閣對芙蓉峰號芙蓉峯主嘗自題畫竹有云不是老僧親寫曉來誰報平安良俊金華雜識蘭溪人出家聖壽寺母老而貧乃闢室寺側供母其中躬致庖㸑母亡罄衣缽𦵏焉時有潛叟者名自天居聖壽嘗卜地葬親仍構祠曰報徳二僧既出世間仍以世法事親人倫祖意兩不背云元葉審思虞集天根子贊序金華人自幼求道甚切年四十餘始克盡屏諸累往來閩粤間大山叢林草屋石室宴坐定息或累數十晝夜人有疾癘水旱殃怪之屬强起之欣然往應如其禱而初無所為也至順二年自號天根子北遊醫無閭之山訪其友薊子訓之徒予邂逅見之守貴稽古續集字無用族甄氏婺州人十八學法為僧隨千巖興聖壽古刹後還天龍復叅中峯斷崖梁山反覆叩荅初無異致曰千江雖殊明月則一吾今無復疑矣是年八月作偈寄别丞相特穆爾擲筆而化塔於天龍西崗明陸瓚金華雜識蘭溪人碧眼蒼髯身長九尺餘頃刻數千里耽於修眞毎閉戸㝠坐旬月不食有士人問道之眞果内與抑外與徐荅云獨言其外不可以言道獨言其内不可以言道人稱陸長仙不知所終普仁獻徴錄字徳隱族趙氏蘭溪人依月公秋潭受具足戒至正乙未出世金華西峰淨土禪寺洪武戊申韶之南華不逺三千里來聘杭之中竺請如南華又加勤焉師欲往郡守鍾某問師曰佛法有重輕邪曰否曰佛法既無重輕師位寧有崇卑邪師笑而止淨慈居五山之一使者自武林來凡三至師乃起而應之開法筵之日黒白環聽者千人有三㑹語若干卷山居詩一百首傳於世僧淨稽古續集字月江金華人住持徑山一日念佛坐逝浙江通志卷二百
