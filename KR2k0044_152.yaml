body:
  text: 浙江通志卷一百五十三名宦八紹興府漢任延後漢書本傅字長孫南陽宛人更始元年為大司馬屬拜會稽都尉時年十九迎官驚其壯及到靜泊無為唯先遣饋禮祠延陵季子會稽頗稱多士延到皆聘請髙行如董子儀嚴子陵等敬待以師友之禮掾吏貧者輒分俸祿以賑給之省諸卒令耕公田以周窮急每時行縣輒使慰勉孝子就餐飯之有龍邱萇者隱居大末志不降辱掾吏白請召之延曰龍邱先生躬德履義有原憲伯夷之節都尉灑掃其門猶懼辱焉召之不可遣工曹奉謁修書記致醫藥吏使相望於道積一嵗萇乃詣府門願得備録延遂署議曹祭酒萇尋病卒延自臨殯不朝三日是以郡中賢士大夫爭往宦焉建武初徵為九真太守黃讜𢎞治紹興府志汝南人建武四年為會稽太守辟郡人包咸為主簿遣子師之任督郵鍾離意治屬縣救災恤患郡內大治第五倫後漢書本傳字伯魚京兆長陵人建武二十九年拜會稽太守雖為二千石躬自斬芻養馬妻執炊爨受俸裁留一月糧餘皆賤貿與民之貧羸者會稽俗多淫祀好卜筮民常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死先為牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆案論之有妄屠牛者吏輒行罰後遂斷絶百姓以安永平五年坐法徵老小攀車叩馬號呼相隨日才行數里不得前倫乃偽止亭舍隂乘船去衆知復追之及詣廷尉吏民上書守闕者千餘人會帝幸廷尉録囚徒得免歸里元和三年賜策罷以二千石奉終其身馬稜後漢書本傳字伯威援之族孫肅宗以稜行義徵拜謁者永元二年江湖多劇賊以稜為丹陽太守皆擒滅之轉會稽太守治亦有聲張霸後漢書本傳字伯饒蜀郡成都人年數嵗知孝親鄉人號為張曾子永元中為會稽太守表用處士顧奉公孫松等奉後為潁川太守松為司𨽻校尉並有名稱其餘有業行者皆見擢用郡中爭厲志節習經者以千數道路但聞誦聲霸始到越賊未解郡界不寧乃移書開購明用信賞賊遂束手歸附不煩士卒之力童謠曰棄我戟捐我矛盜賊盡吏皆休視事三年遷為侍中慶鴻後漢書廉范傳鴻洛陽人慷慨有義節位至會稽太守有異迹馬臻嘉泰會稽志永和五年為會稽太守創立鏡湖在會稽山隂縣兩界築塘蓄水水髙田丈餘田又髙海丈餘若水少則泄湖灌田如水多則閉湖泄田中水入海所以無凶年其陂塘周回三百一十里溉田九千餘頃越人至今廟祀之殷丹嘉泰會稽志為會稽太守時郡有孝婦以誣見殺連旱二年丹到郡刑訟女祭婦墓天應時澍雨度尚後漢書本傳字博平山陽湖陸人拜郎中除上虞長為政嚴峻明於發擲姦匪吏人謂之神明延熹五年擢為荆州刺史後漢書注尚擢門下書佐朱雋恆歎述之以為不凡雋後官至車騎將軍人竒尚有知人之鑒劉寵後漢書本傳字祖榮東萊牟平人拜會稽太守山民願朴乃有白首不入市井者頗為官吏所擾寵簡除煩苛禁察非法郡中大化徵為將作大匠山隂縣有五六老叟龎眉皓髮自若邪山谷間出人齎百錢以送寵寵勞之曰父老何自苦對曰山谷鄙生未嘗識郡朝他守時吏發求民間至夜不絶或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之陳重萬厯紹興府志宜春人與鄱陽雷義友世稱陳雷舉孝廉遷會稽太守有異政淳于式成化紹興府志建安中孫權表式為會稽太守時陸遜既平丹陽賊帥遂部伍東三郡強者為兵羸者補户得精兵數萬人式啓遜枉擾民及遜見權稱式佳吏曰式意在養民是以白遜三國吳顧雍吳志本傳字元歎吳郡吳人州郡表薦弱冠為合肥長後轉在婁曲阿上虞皆有治績孫權領會稽太守不之郡以雍為丞行太守事討除冦賊郡界寧靜吏民歸服封醴陵侯朱桓吳志本傳字休穆吳郡吳人孫權為將軍桓給事幕府除餘姚長往遇疫癘穀食荒貴桓分部良吏隱視醫藥飱粥相繼士民感戴之遷蕩寇校尉授兵二千人使部伍吳會二郡鳩合遺散期年之間得萬餘人黃武元年封嘉定侯陸凱吳志本傳字敬風吳郡吳人丞相遜族子黃武初為永興諸暨長所在有治績寶鼎元年遷左丞相封嘉興侯滕引吳志本傳字承嗣北海劇人起家為丹陽太守徙吳郡會稽所在見稱三國志注引每聽辭訟斷罪法察言觀色務盡情理人有窮寃怨苦之言對之流涕車浚萬厯紹興府志天璽初為會稽太守在官清忠值嵗荒旱以表求賑貸見殺晉紀瞻晉書本傳字思逺丹陽秣陵人以討周馥華軼功封都鄉侯除會稽內史時有詐作大將軍府符收諸暨令令已受拘瞻覺其詐便破檻出之訊問使者果伏詐妄論討陳敏功封臨湘縣侯尋除尚書右僕射轉領軍將軍諸葛恢晉書本傳字道明琅邪陽都人元帝為安東將軍以為主簿再遷江寧令愍帝即位召為尚書郎元帝上疏留之承制調為會稽太守臨行帝為置酒謂曰今之會稽昔之關中足食足兵在於良守政之所先君為言之恢陳謝因對曰宜尊五美屏四惡進忠實退浮華帝深納焉大興初以政績第一詔曰會稽內史諸葛恢蒞官三年政清人和為諸郡首宜進其位班以勸風教今增恢秩中二千石山遐晉書山濤傳濤孫遐字彥林河內懷人為餘姚令時江左初基法禁寬弛豪族多挾藏户口以為私附遐繩以峻法到縣八旬出口萬餘豪強切齒以遐輒造縣舍遂陷其罪竟坐免官後為東陽太守郡境肅然謝奕嘉泰會稽志字無奕陳郡陽夏人少有器鑒為剡令有一老公犯法謝以醇酒罰而遣之纍遷豫州刺史追贈鎮西大將軍王彪之晉書本傳字叔武初除佐著作郎後為鎮軍將軍會稽內史加散騎常侍居郡八年豪右斂迹亡戶歸者三萬餘口熊逺晉書本傳字孝文豫章南昌人元帝作相時引為主簿纍遷侍中出補會稽內史時王敦作逆沈充舉兵應之加逺將軍距而不受不輸軍資於充保境安衆為務敦至石頭諷朝廷徵逺拜太常卿南北朝王鎮之宋書本傳字伯重琅邪臨沂人父隨之上虞令鎮之初為琅邪王衛軍行參軍出補剡上虞令並有能名內史謝輶請為山隂令復有殊績桓元以為大將軍録事參軍時三吳飢荒遣鎮之銜命賑恤而會稽內史王愈不奉符旨鎮之依事糾奏愈子綏元之外甥當時貴盛鎮之為所排抑髙祖踐阼為輔國將軍琅邪太守褚淡之南史本傳字仲原河南陽翟人宋受命為侍中後會稽郡缺乃用為會稽太守景平二年富陽孫法先自號冠軍大將軍與孫道慶等攻沒縣邑建旗鳴鼓直攻山隂淡之遣陸邵水軍禦之而身率所領出次近郊敗賊於柯亭尋卒諡曰質羊元保南史本傳泰山南城人厯會稽太守文帝以元保廉素寡欲故授名郡為政雖無殊績而去後常見思不營財利産業儉薄王淮之南史本傳字元魯琅邪臨沂人宋武帝起兵為太尉主簿出為山隂令有能名預討盧循功封都亭侯宋臺建除御史中丞為僚友所憚武帝受命拜黃門侍郎徐豁南史本傳字萬同姑幕人宋永初中為尚書左丞山隂令精練法理為時所推謝方明宋書本傳陳郡陽夏人髙祖受命遷侍中出為丹陽尹有能名轉會稽太守江東民户殷盛風俗峻刻強弱相陵姦吏蜂起符書一下文攝相續方明深達治體不拘文法闊略苛細務存綱領貴族豪士莫敢犯禁除比伍之坐判久繫之獄東土至今稱詠之承代前人不易其政必宜改者則以漸移變使無迹可尋元嘉三年卒官江秉之南史本傳字元叔濟陽考城人宋少帝時為烏程令以善政著名東土後為山隂令人户三萬政事繁擾訟訴殷積階庭常數百人秉之御繁以簡常得無事以在縣有能出補新安太守元嘉十二年轉任臨海並以簡約見稱所得秩悉散之親故妻子常飢寒人有勸其營田秉之正色答曰食祿之家豈可與農人競利在郡作書案一枚去官留以付庫張裕南史本傳字茂度吳郡吳人元嘉十八年除會稽太守素有吏能職事甚理卒於官諡曰恭子顧凱之南史本傳字偉仁吳郡吳人厯尚書都官郎後為山隂令山隂劇邑三萬户前後官長晝夜不得休事猶不舉凱之御繁以約縣用無事晝日垂簾門階間寂自宋世為山隂務簡而事理莫能尚也後為尚書吏部郎卞延之南史卞彬傳彬濟隂寃句人父延之弱冠為上虞令有剛氣會稽太守孟顗以令長裁之積不能容脫幘投地曰我所以屈卿者政為此幘耳今以投之卿矣卿以一世勳門而傲天下國士拂衣而去王晏嘉泰會稽志為上虞令孔覬自會稽發兵反晏起兵攻郡覬卒千人趨石瀃竄於山嵴村村人縛以送晏斬之東閣外王僧虔南史本傳僧綽弟也泰始中為吳興太守徙會稽太守中書舍人阮佃夫家在東請假歸客勸僧虔以佃夫要幸宜加禮接僧虔曰我立身有素豈能曲意此輩彼若見惡當拂衣去耳佃夫言於宋明帝使御史中丞孫敻奏僧虔坐免官升明二年為尚書令齊武帝即位遷侍中光祿大夫開府儀同三司洪現會稽圖經官會稽太守既罷不欲令人知其清乃以船載土而歸傅琰南齊書本傳字秀圭北地靈州人在宋為諸暨武康令除吳興郡丞泰始六年遷山隂令山隂東土大縣難為長官父僧祐在縣有稱琰尤明察又著能名其年爵新亭侯元徽初遷尚書右丞太祖輔政以山隂獄訟煩積復以琰為山隂令賣針賣糖老姥爭團絲來詣琰琰不辨核縛團絲於柱鞭之密視有鐵屑乃罰賣糖者二野父爭雞琰問何以食雞一人云粟一人云豆乃破雞得粟罪言豆者縣內稱神明無敢復為偷盜諸傅有治縣譜子孫相傳不以示人周顒南齊書本傳字彥倫汝南安成人元徽中詔為剡令有恩惠百姓思之建元初為長沙王後軍參軍山隂令縣舊訂滂民以供雜使顒言之於太守聞喜公子良曰竊見滂民之困困實極矣役命有常祗應轉竭蹙迫驅催莫安其所險者或竄避山湖困者或自經溝瀆亦有摧臂斫手茍自殘落販傭貼子權赴急難每至滂使發動遵赴嘗促輒有植杖被緼稽顙階垂泣涕告哀不知所振下官未嘗不臨食罷筯當書偃筆為之久之愴不能已交事不濟不得不就加捶罰見此辛酸時不可過山隂邦治事倍餘城然略聞諸縣亦處處皆躓惟上虞以百户一滂大為優足過此列城不無雕罄宜應有以普救倒懸設流開便則轉患為功得之何逺蕭曅南史本傳字宣昭髙帝第五子也建元二年為會稽太守加都督武帝即位厯中書令祠部尚書性輕財重義有古人風罷會稽還都齋中錢不滿萬俸祿所入皆與參佐賓僚共之常曰兄作天子何畏弟無錢居止附身所須而已陸慧曉南史本傳字叔明吳郡吳人齊髙帝輔政除為尚書殿中郎建元初遷太子洗馬及武陵王守會稽上為精選僚吏以慧曉為功曹與府參軍沛國劉璡同從述職復為西陽王左軍長史領會稽郡丞行郡事慧曉厯輔五政立身清肅僚佐以下造詣必起送之或謂慧曉曰長史貴重不宜妄自謙屈答曰我性惡人無禮不容不以禮處人顧憲之南史本傳凱之孫字士思性尤清直宋元徽中為建康令時人號曰神明仕齊為東中郎長史行會稽郡事山隂人吕文度有寵於齊武帝於餘姚立邸頗縱橫憲之至郡即日除之文度後還葬郡縣爭赴弔憲之不與相聞時西陵戍主杜元懿以吳興嵗儉會稽年登商旅往來倍嵗西陵牛埭稅官格日三千五百求加至一倍計年長百萬浦陽南北津及柳浦四埭乞為官領攝一年格外長四百許萬武帝以示會稽使陳得失憲之議曰尋始立牛埭非茍通以納稅也當以風濤迅險人力不捷濟急以利物耳既公私是樂故輸直無怨京師航渡即其例也而後之監領各務已功或禁遏别道人生理外凡如此類不經埭煩牛者上詳被報蒙停格外十條從來喧訴始得暫弭案吳興頻嵗失稔今兹尤饉去乏從豐良由飢棘舊格新減尚未議登格外加倍將以何術皇慈恤隱振廩蠲調而元懿幸災𣙜利重增困瘼人而不仁古今共疾山隂一縣課户二萬其人資不滿三千者殆將居半一人被攝十人相追一緒裁萌千孽互起蠶事弛而農業廢賤取庸而貴舉責應公贍私日不暇給欲無為非其可得乎又永興諸暨罹唐宇寇擾公私殊燼彌復特甚倘逢水旱實不易思俗諺云會稽打鼓送恤吳興步擔令史會稽舊稱沃壤今猶若此吳興本是瘠土事在可知因循餘弊誠宜改張武帝並從之由是深以方直見知憲之雖纍經宰郡資無擔石及歸環堵不免飢寒王詢嘉泰會稽志永泰初為山隂令太守王敬則將舉兵反召詢問吾欲發丁丁可得幾人府庫錢有幾詢答縣丁卒不可得府庫物多未輸入敬則怒將出斬之劉元明南史傅琰傳臨淮劉元明亦有吏能厯山隂令政為天下第一終司農卿後傅琰子翽代元明為山隂令問元明曰願以舊政告新令尹答曰我有竒術卿家譜所不載臨别當相示既而曰作縣令唯日食一升飯而莫飲酒此第一䇿也庾蓽梁書本傳字休野新野人為驃騎功曹參軍出為輔國長史會稽郡丞行郡府事時承雕弊之後所在穀貴民多流散蓽撫循甚有治理唯守公祿清簡逾厲至經日不舉火太守襄陽王聞而饋之蓽辭不受天監元年卒無以殮柩不能歸髙祖詔賜絹百匹米五百斛江革南史本傳字休映濟陽考城人中興元年梁武帝入石頭令與徐勉同掌書記除武陵王長史會稽郡丞行府州事革門生故吏家多在東聞革應至並賫持緣道迎候革曰我通不受餉不容獨當故人筐篚至鎮唯資公俸食不兼味郡境殷廣辭訟日數百革分判辨析曾無疑滯人安吏畏百城震恐琅邪王騫為山隂令贓貨狼籍望風自解除都官尚書將還贈遺一無所受唯乘臺所給一舸舸艚偏欹不得安臥或請濟江徙重物以迮輕艚革既無物乃於西陵岸取石十餘片以實之其清貧如此蕭元簡册府元龜為會稽太守時何裔隱居東山元簡深加禮數月常命駕式閭談論竟日劉沓南史本傳字士源天監中纍遷尚書儀曹郎出為餘姚令在縣清潔湘東王繹發教褒美之褚玠陳書本傳字溫理河南陽翟人大建中山隂縣多豪猾前後令皆以贓汚免髙宗謂中書舍人蔡景厯曰稽隂大邑久無良宰卿文士之內試思其人景厯進曰褚玠廉儉有幹用未審堪其選否髙宗曰甚善卿言與朕意同乃除戎昭將軍山隂令縣民張次的王體達等與諸猾吏賄賂通姦全丁大户數多隱沒玠乃鎖次的等具狀啓臺髙宗手敕慰勞并遣使助玠搜括所出軍民八百餘户時舍人曹義達為髙宗所寵縣民陳信家富於財諂事義達信父顯文恃勢橫暴玠乃遣使執顯文鞭之一百於是吏民股栗莫敢犯者信後因義達譖玠竟坐免官玠在任嵗餘守祿俸而已去官之日不堪自致因留縣境種蔬菜以自給或嗤玠以非百里之才玠答曰吾委輸課最不後列城除殘去暴姦吏局蹐若謂其不能自潤脂膏則如來命以為不達從政吾未服也時人以為信然皇太子知玠無還裝手書賜粟米二百斛於是還都及為御史中丞甚有直繩之稱唐姚崇張説姚崇神道碑字元之洛陽人中書令出典越郡性仁恕行簡易虛懷泛愛而涇渭不雜真率徑盡而應變無窮常推是心以御於物故所蒞必氓庶風偃驁狠化從言不勵而教成政不威而事理去思覩頌來暮聞歌李俊之嘉泰會稽志開元中為會稽令縣東北有防海塘自上虞江抵山隂百餘里以瀦水溉田俊之增修焉民賴其利後令李左次又增修之郭密之萬厯紹興府志天寶中令諸暨建義津橋築放生湖溉田二千餘頃民便之王士寬白居易王士寬墓志太原人天寶中應明經舉及第選授婺州義烏尉以清幹稱刺史韋之晉知之署本州防禦判官無何假東州司倉專掌運務嵗終課績居多永泰中遷越府户曹屬邑有不理者士寬假領之所至必理大厯中本道觀察使薛兼訓以士寬清白尤異表奏之有詔權知餘姚縣令時海寇初殄邑焚田荒士寬乃營邑室創器用復流庸闢災畬凡江南列邑之政士寬冠其首其制邑闢田增户之績則會稽之課地官之籍載焉建中初選授揚州倉曹參軍金堯恭萬厯紹興府志寶厯中令上虞堯恭於縣西北置任嶼湖與梨湖灌田二百餘頃興利除害民甚德之崔協嘉靖浙江通志博陵人大中元年以户曹攝上虞值嵗大旱民賦無所出協請蠲於上不許遂傾家資代輸之及卒邑人立廟祀之張遜嘉奉會稽志乾寧初為山隂令董昌反署置百官召遜知御史臺遜拒曰王自棄為天下笑且六州勢不助逆王據孤州祗速死爾昌怒曰遜不知天意以邪説拒我囚之他日謂人曰我縱無遜何乏於事乃害之會稽令吳鐐亦為昌所殺宋張公良𢎞治紹興府志字希留太平興國中為新昌令立縣治興學校廉以律已卒不能歸民卜地葬之名曰官阡杜守一嘉泰會稽志景德二年以大理丞知蕭山先是縣東五里有虎守一為政虎負子西渡浙江而去鄉人名其里曰去虎里蘇壽萬厯紹興府志武功人大中祥符初以大理丞出知蕭山明剛柔審利害人稱其治天聖九年復知越州摧強燭弊曾未期月威聲大振丁寶臣王安石丁寶臣墓志字元珍晉陵人景祐中以進士起家用舉者遷太子中允知越州剡縣始至流大姓一人而縣遂治除弊興利甚衆遷博士就差知越州諸暨縣其治諸暨如剡越人滋以寶臣為循吏纍遷尚書司封員外郎嘉靖浙江通志寶臣之後有令錢厚之當建炎中奏減買絹四之三以紓暨人之困薑紹請粟於朝得萬餘石以賑暨人之飢又劉炳疏免淘金之役寇仲溫萬厯紹興府志慶厯初令諸暨未明視事亭午皆畢興學校廢淫祠父老稱之曾公亮宋史本傳字明仲泉州晉江人舉進士甲科知會稽縣民田鏡湖旁每患湖溢公亮立斗門泄水入曹娥江民受其利嘉祐六年拜吏部侍郎同中書門下平章事集賢殿大學士熙寧二年進昭文館大學士以太保致仕過昱萬厯紹興府志一名公彥皇祐初以祕書丞出令剡嵗飢流民集城下昱勸富家出粟賑之明年又飢乃出常平錢請糴取其贏米幾萬斛與流民又割俸麥為種役飢民耕種官田明年得麥五百斛復與流民使歸復業流民感激而去王逵萬厯紹興府志濮陽人皇祐初知越州濬治城隍布宣政令志有執持果於興革大為曾鞏所推服西園有池名曰王公蓋越人致其思云胡向萬厯紹興府志清江人皇祐進士倅越州奏課為天下第一後官大理卿決獄仁恕為時所稱任布宋史本傳字應之河南人進士及第知宿州時越州守闕寇準曰越州有職分田嵗入且厚今爭者頗衆非廉士莫可豫乃徙布越州有祖訟其孫醉酒詈我已而自悔哭於庭曰我老無子賴此孫以為命也布聞知貸其死上書自劾朝廷亦不之責厯樞密副使授太子少保致仕卒諡恭惠蔣堂東都事略字希魯常州宜興人舉進士第為河南發運使降知越州州有鑑湖溉田八千頃前此為郡者聽民自占既而多為豪右所侵水利寖耗堂後上所不便奏復之復知杭蘇二州以禮部侍郎致仕郭源明嘉泰會稽志字潛亮嘉祐六年知蕭山縣縣之宿豪有父子為姦利者悉置於法民有育孤女利其資過時不嫁者諭以禮律女遂得所歸太守刁約聞之曰郭蕭山厭民望矣曾鞏韓維曾鞏神道碑字子固南豐人嘉祐二年登進士第通判越州屬嵗飢鞏興積藏通有無老稚不出里閭果腹而嬉元豐五年擢拜中書舍人以翰林學士卒於越新編越舊取酒務錢給募牙錢不足則賦諸鄉户鞏亟罷之嵗飢度常平不足又慮民不能盡至城邑乃諭富人使攜粟往豫民民得不出田里而受粟又貸之種使隨秋稅以償民食其惠鞏政事過人所至務去民疾苦文章與歐陽修齊名世稱南豐先生云王存宋史本傳字正仲潤州丹陽人慶厯六年登進士第調嘉興主簿擢上虞令豪姓殺人久莫敢問存至按以州吏受賕豪賂他官變其獄存反罷去久之除密州推官紹聖初以右正議大夫致仕司馬光嘗曰並馳萬馬中能駐足者其王存乎張詵宋史本傳字樞言建州浦城人第進士通判越州民患苦衙前役詵科别人户籍其當役者以差人錢為雇人充皆以為便元豐初加龍圖閣直學士纍官正議大夫鄭穆宋史本傳字閎中福州候官人舉進士四冠鄉書遂登第元豐三年出知越州先是鑑湖旱乾民因田其中延袤百里官籍而稅之既而連年水溢民逋官租積萬緡穆奏免之元祐五年除寶文閣待制六年請老李子筠嘉靖浙江通志為餘姚主簿初有茶商航海與海舶相遭更疑為盜相格鬬殺傷十餘人久繫不決太守趙抃檄子筠治之子筠曰犯時不知在律勿問杖而遣之抃大稱賞程師孟宋史本傳字公闢吳人進士甲科知越州為政簡而嚴罪非死者不以屬吏發隱摘伏如神得豪惡不遑跌宕者必痛懲艾之所部肅然遊酢宋史本傳字定夫建州建陽人第進士調蕭山尉近臣薦其賢召為太學録遷博士晚得監察御史於越新編酢天聖中任蕭山辨決疑獄人稱神明在官數年德惠旁洽劉韐宋史本傳字仲偃建州崇安人第進士知越州鑑湖為民侵耕官因收其租嵗二萬斛政和間涸以為田衍至六倍隸中宫應奉租太重而督索嚴多逃去則勒鄰伍取償民告病韐請而蠲之方臘陷衢婺越大震官吏悉遁或具舟請行韐曰吾為郡守當與城存亡不為動益厲戰守備寇至城下擊敗之拜述古殿直學士沈公調𢎞治紹興府志宣和間為越州士曹掾會方臘亂太守劉韐募民得賊首一級賞錢二萬公調諌曰小人規利或殺平民以希賞不如令生擒而倍其賜自是民或俘賊以獻韐即命公調核之但誅其附賊者餘誤執皆免所活數千人宋旅宋史本傳字庭實莆田人第進士纍官奉議郎知剡縣方臘既陷歙睦杭衢婺五州且犯越越盜亦起應之縣吏多遁旅遣妻子浮海歸閩獨與民據守以忠義激勸部勒隊伍為豫備計俄而盜衆大至躬率壯鋭冒矢石雖頗殺獲終以力不敵死之越帥劉韐上其事詔贈朝散郎録其四子宇文昌齡嘉靖浙江通志字伯修成都人舉進士拜御史徽宗立以寶謨閣待制厯知杭越經理部政公私便之張守宋史本傳字子固常州晉陵人登崇寧元年進士第中詞學兼茂科建炎三年除起居郎兼直學士院後徙知紹興府會朝廷遣三使者括諸路財賦所至以鞭撻立威韓球在會稽所斂五十餘萬緡守既視事即求入覲為上言之詔追還三使時秦檜當國不悅守奉祠建康卒諡文靖李邴周必大李邴神道碑字漢老濟州巨野人崇寧五年進士除徽猷閣待制知越州為政清簡抑強扶弱後為資政殿學士綦崇禮宋史本傳字叔厚髙密人登重和元年上舍第嘗進唐太宗録刺史姓名於屏風故事曰連千里之封得一良守則千里之民安環百里之境得一良令則百里之民説以寶文閣直學士知紹興府時劉豫導金人入侵揚楚震擾髙宗躬御戎衣次吳會崇禮以近臣承寧方面謂浙東一道為行都肘腋之地備禦不可不謹密疏於朝得便宜從事於是繕城郭厲甲兵輸錢帛以犒王師簡舟艦以扼海道疚心夙夜殆廢食寢及春帝還七州晏然不知羽檄之遽期年上印綬退居台州卒贈左朝議大夫趙鼎萬厯紹興府志字元鎮聞喜人以尚書右僕射兼知樞密院張浚與鼎暌異鼎求去出知紹興府恤吏愛民不以故相自奉未幾復相秦檜主和議與鼎不合竟謫潮州安置孝宗朝追諡忠簡宋宗年萬厯紹興府志郊之孫建炎中令剡金人攻越守李鄴以城降屬邑皆潰宗年城守獨堅民賴以安官至中散大夫因家於剡張友直宋史張士遜傳友直字益之隂城人賜進士出身纍遷工部郎中知越州州民每春斂財大集僧道士女謂之祭天友直下令禁絶即取所斂財建學以延諸生陳休錫趙不搖萬厯紹興府志先後令上虞並加意水利疏聞於上禁民不得淤湖為田自是他邑或病旱獨上虞得湖水屢稔民甚德之林安宅於越新編閩三山人紹興中知新昌改建學宫置田養士諸廢墜無不修舉築東堤以禦水患浚七里井開孝行砩決縣渠自南門入郭出西門與砩水合以溉民田自宋中興有功於縣者安宅為最纍官尚書參知政事熊克宋史本傳字子復建陽人御史大夫博之後紹興中進士知諸暨縣越帥課賦頗急諸邑率督趣以應克曰寧吾獲罪不忍困吾民他日府遣幕僚閲視有無時方不雨克對之泣曰此豈催租時耶部使者芮輝行縣至其境謂克曰曩知子文墨而已今乃見古循吏為表薦之王師心𢎞治紹興府志紹興二十八年知紹興府時欲遷祐陵二十里內士民故冢師心固爭乃止獲免者七百餘家又薦獻之物舊取於民師心請以上供錢給直民皆便之葉顒宋史本傳字子昻仙遊人紹興元年進士知上虞縣凡徭役令民自推貨力甲乙不以付吏民欣然皆以實應催租各書其數與民約使自持户租至庭親視其入帥曹泳令今嵗夏租先期送十之八顒請少舒其期泳怒及麥大熟民輸租反為諸邑最泳大喜許薦於朝顒固辭賀正中薦顒靜退遂召見顒論語剴切髙宗嘉納除將作監簿知處州青田令陳光獻羡餘百萬顒以所獻充所賦湯思退之兄居處州家奴屠酤犯禁一繩以法思退不悅移知常州召為尚書郎厯尚書左僕射兼樞密使諡正簡萬厯紹興府志子元泳復令上虞助田養士人稱濟美張暉萬厯紹興府志淳熙中知蕭山會諸暨水溢詔開紀家滙浚蕭山新江以殺水勢暉上言諸暨地髙蕭山地下山隂則沿江皆山疏小江可導諸暨之水欲浚新江其底石堅不可鑿若開紀家滙則水徑衝蕭山桃源等七都田廬為沼矣時蔣芾為浙東提刑主諸塈之請欲開滙暉力爭曰暉頭可斷滙不可開乃止黃由萬厯紹興府志字子由長洲人淳熙中進士第一通判紹興督行荒政於新嵊改糴為賑擅發米五萬石豫民不取直嘉定初以正議大夫知紹興府聞嵊有虎患訛言虎有神變化叵測或為僧或為猿狚倏忽莫可蹤迹由禱於神募人捕之殄滅無遺官至刑部尚書兼直學士院贈少師張震兩浙名賢録字彥亨魏公浚五世孫乾道己丑登進士厯院轄寺丞知撫州江西倉以不附韓托胄論罷嘉定初召為右司郎官奉祠不復出時論以正人目之娶會稽曾文清公女其子逺猷後為紹興太守因家於越王希吕宋史本傳字仲行宿州人既仕寓居紹興府乾道五年登進士科除端明殿學士知紹興府尋以言者落職處之晏如治郡百廢俱興尤敬禮文學端方之士天性剛徑遇利害無回護意惟是之從居官廉潔至無屋可廬由紹興歸有終焉之意然猶寓僧寺上聞之賜錢造第袁説友李大性嘉泰會稽志嘉泰元年四月説友以寶文閣學士知紹興府十二月大性以禮部侍郎華文閣待制知紹興府萬厯紹興府志説友大性相繼為守並有善政會稽郡志之成實前守趙不迹及説友始終之而大性宅心仁厚修舉社倉法廣營義冢尤為越人所思趙彥倓宋史本傳字安卿知臨安於潛縣縣胥往往通臺省吏得肆其姦彥倓執其黠者械送府臺省吏從中救之彥倓力爭竟抵胥罪浮橋屢以水敗彥倓築以石民免溺死升臨安府通判開禧初知紹興府楮價輕彥倓權以法民便之復鹿鳴禮置興賢莊以資其費築捍海石塘亦置莊以備增築會旱飢民聚陂湖中彥倓取死囚羃首刖足徇於衆曰此劫菱藕者也遂散其衆乃第民髙下捐其稅有差免輸湖籍田米舉緡錢四十萬以助荒政民賴以濟劉伯曉於越新編山陽人嘉定中令諸塈值雷雨纍日夜洪水交作漂民畜田舍無算伯曉掩泣奔救力請於朝得蠲稅一年田之不可復者除其籍張逺猷山隂縣志字辰卿四川綿竹人景定改元録張栻後以蔭補官三年知紹興府時賈似道秉政造私第於山隂縣治之西官吏過其門者皆出車下馬如王府例逺猷迂道避之鏡湖田旱潦不時逺猷留心溝洫一遵馬臻遺制築堰修閘農民賴以有秋五年報政加中大夫賜緋衣金魚袋致仕四川道梗遂卜居山隂卒葬雲門石人山魏了翁萬厯紹興府志字華甫嘉熙初以資政殿學士知紹興初了翁與真德秀同召為翰林學士在朝凡上二十餘疏皆當時急務乃卒為忌者所排擯到郡未幾卒越人哀之丁疇於越新編晉陵人淳祐中令新昌時嵗荒太守命賑之疇曰欲行荒政宜緩催科欲恤貧民宜優上户乃緩刑薄斂平糴勸分有無相資嵗賴以不害己又作新學校制器置田文教聿起楊參萬厯紹興府志為越州録事時郡多盜太守督責保長甚嚴一日有盜入民家其主執之以送保長保長素苦盜以木杖擊殺之守更坐保長以殺人罪獄既具遣參按狀得實平反免死越人頌之留恭萬厯紹興府志字伯禮永春人丞相正次子初官浙西值大飢畢力賑恤全活甚衆後知紹興時稱循吏初正亦知紹興人謂父子濟美云家坤翁於越新編眉州人寶祐間令諸暨能文章好奬掖儒彥甚有政績嘗築長官橋為長堤障水植柳其旁人號家公萬柳堤張珦於越新編南軒之裔開慶初以進士知新昌當是時民財匱於兵而幸臣柄國者專事苛斂珦守正不阿寬徭節用雖獲譴不顧元兵南下珦團結義勇為固守計後卒於官子孫家焉元張升元史本傳字伯髙其先定州人後徙平州除紹興路總管初大德至大間越大飢且疫癘賦稅鹽課責里胥代納吏並緣為姦升為證於簿籍白行省蠲之前平江嵗輸海運糧布囊三萬俾紹興製如數民患苦之更數守謂嵗例如此置勿問升言麻非越土所生海漕實吳郡事於越無與章上卒罷之升既謹於繩吏又果於去民瘼故人心悅服至順二年為集賢侍講學士宋文瓚嘉靖浙江通志紹興路總管恩威並施事無不理及去任越人思之劉輝於越新編汴人為餘姚州同知郡守下輝均田賦時州籍失火豪猾乘時詭匿輝手植二柏禱之曰事成柏榮不成則否乃躬履田畝置魚鱗圖鼠尾册定等平役按畝給由出匿田萬餘畝初輝受檄出舍焦勞鬢髮為改及是賦均柏榮吏民愛之比於甘棠焉馮翼於越新編濟寧人元貞初知諸暨州始至察民隱鋤擊姦豪鄉胥有舞文增稅者悉釐正之民病山園稅重遂多拋荒乃請於總管但以中統鈔準輸田租而免山園之稅又奏罷採金之役政暇輒引諸生講論經史使州吏環聽皆凜凜色動及去任民遮留不得建祠祀之謹按舊志作米德孚未知何據存以俟考余洪嵊縣志字仲寬益都人元貞初尹嵊嵊夏稅絹洪請得納鈔減費之半先是田稅重而山與地不科洪為均之民稱便為人廉介明決為民蘇困救弊于九思於越新編薊邱人大德間知諸暨州俗好訐牒訴紛然九思密察情偽得其尤無良者痛繩之飭厲學校選擇秀茂示以禮讓囂譁寖衰或言地産水晶砂金調民丁採之闔境騷動九思力陳無産狀遂罷其役後為紹興路總管號良二千石單慶於越新編濟寧人大德間知諸暨嵗飢且疫慶曲盡救災之䇿民感更生慶益接以寬和有爭於庭者進而兒女語之皆慚沮去盜化為良鞭箠幾措有虎入市慶為文告城隍三日虎死浙東蝗飛蔽天入境咸抱竹死嵗且屢登及卒民皆巷哭挽柩而送者數千人張垕萬厯上虞縣志字德修成都人至治中尹上虞廉潔無私請托不行新學贍士嚴禁私鹺邑以治聞李恭萬厯紹興府志字敬甫關隴人知姚州廉平不苛又習文法吏姦不得行時州民役於官者嵗終乃代廢其生業恭為更定每季代之州産紅米官令市白米充稅恭疏請聽以土産上輸營建廟學乞增置師弟子員每與論難經義墾湖田數百畝益其廩士民戴之李拱辰黃溍李拱辰墓志字廷弼磁州人至大元年遷新昌縣尹嵗飢道殣相望乃稽貧民之數老弱者賑給之少壯者俾富家收而傭之疾疫者救療之所全活甚衆患經界之不正則考核其實而圖其地形書其保甲編次鱗集印分兩券官執其左户執其右鬻産則券隨之隱沒詭併之弊無所容而賦役以均邑去郡逺舟楫不通民疲於輸糧請以土産布代其入俗惑於隂陽拘忌親死數十年不葬下令不葬其親者以不孝論不旬日而葬者千數有鬭爭悉送耆長使質其是非而戒諭焉或委以鄰境不決之獄凡所平反無不服其明允大修孔子廟新其學舍至縣廨驛亭川梁逵路有廢畢舉皇慶二年改歸安縣尹有爭家財而骨肉相戕者諭以天理感悟而去有以死獄誣平民者折以片言遂服其辜先是圭田多荒責里胥代輸其租拱辰屏吏卒入阡陌視地肥瘠定為嵗入之數募有力者墾種之有旨經理田土奉行者率務增加以為功拱辰聽民自占主者以所增田僅百五十頃議倍其賦拱辰曰吾官可棄民不可病也省臺交章舉廉能延祐六年擢監察御史吕誠𢎞治紹興府志字實夫皇慶初為會稽尹蒞政循良民服其化哈喇蘇默於越新編輝和爾人至元間新昌達魯噶齊時浙鹽法峻豪猾夤緣為姦蘇默得其狀馳白運司婺州賊楊振龍突入新昌焚掠千户崔武德戰死蘇默獨鼓衆力戰連日夜不解賊敗走三月賊唐仲復聚衆來寇蘇默遣間聲言大軍且至隨率數十騎襲賊於五峯嶺賊驚散蘇默會兵討振龍餘黨盡降其衆新嵊兩邑疆宇復完髙閭萬厯紹興府志蒙古人至大二年嵊達魯噶齊政尚嚴肅裁吏卒之冒濫者若干人鎮守千户縱戍卒擾民閭以法繩之尋白帥府罷鎮守司民獲安堵與尹萬願相規以正並稱循良閭之後有嘉琿達者集賽人泰定初達嚕噶齊能潔已愛民以糧稅輸郡道路艱阻請折以布民感其惠趙誠於越新編宛平人簿蕭山為民捍禦災患有政績既罷官遂家蕭山邑人祀之托克托萬厯紹興府志字子安燉煌人餘姚州達嚕噶齊為人廉明持重莫能窺其際及事至刃解斧斷張弛得宜圖卜特穆爾黃溍圖十特穆爾墓志字可與蒙古遜都台氏世祖命相臣總兵伐宋圖卜特穆爾以管軍萬户實預在行渡江後加金虎符為湖廣等處行樞密院判官延祐二年遷宣武將軍泰定三年轉明威將軍分城坐鎮自明而越前後三十餘年越人蔡定父年七十餘以事繫獄定請以身代不報乃自沈府河以死郡為立廟臥龍山之麓嵗久事廟廢居民侵其地官不之省圖卜特穆爾攝萬户慨然曰孝子不祀人奚以勸即日歸其侵地廟以完復元兵至天台民婦王氏為軍士所得不辱至剡之清風嶺投崖死圖卜特穆爾移文有司為立廟剡有隱士吳君與圖卜特穆爾友善既卒貧不能喪輟俸資葬於書院之側其好義如此王正紹興府志霑化人父簡為烏程尹至元中移知福寧州禦賊力戰死立不仆無血惟白沫而已事聞贈太原郡侯正襲爵授紹興路總管張士誠陷郡亦不屈而死王璘𢎞治紹興府志字景文臨沂人至元末為上虞知縣氷蘖自守刑不妄施獄屢告空優老興學人皆德之巴蘇呼萬厯上虞縣志至正中達嚕噶齊時同僚皆尚嚴刻思忽以寬濟之事集而民悅民田有坍江者稅額未除皆優使輸布他邑有疑獄不能決憲府檄令讞之有持執政風旨俾上下其手者思忽不聽枉直無所失邑人稱之又有佛嘉努亦為監邑政令不擾四境晏然鼎鼎萬厯紹興府志字君輔輝和爾氏至正間為山隂縣達嚕噶齊均賦興學表賢良明教化吏民稱之李睿萬厯紹興府志字星明武平人至正間尹上虞和易有守嵗久旱方病目弗顧周視阡陌免其租稅嚴湖禁重兵防民賴以安秩滿居於虞卒葬焉於善蕭山縣志至正間尹蕭山性寬和率民以禮作新學校築堤捍水民受其利後家於長山鄉傅常嘉靖餘姚縣志字仲常鉛山人舉進士至正十一年調餘姚判官視州符姦沮滯決吏民服之海上有警宣閫檄常偵賊定海而常所統徒民兵與賊遇弗敵死之常居官有氷蘖聲其母及兄貧不能歸遂家於姚裴思聰萬厯紹興府志至正間尹蕭山務以德化民天旱蔬食退居引罪自責雨輒沾足張士誠據浙遂棄官居嘉興士誠厚聘之不受周舜臣萬厯會稽縣志至正十九年尹會稽蒞政公勤廢墜修舉田稅宿弊靡不釐革民畏愛之彭仲宣𢎞治紹興府志至正末為會稽丞政平訟理居民樂業時有主簿毛彥穎執法不阿人呼為鐵主簿戴正𢎞治紹興府志鄱陽人元末丞山隂年甫十九清慎有守政尚寬平時民多詭冒正履畝注主名根由驗步精核而民不擾趙元齡萬厯上虞縣志字子年宛邱人尉上虞先是縣官收職米倍三佃者病之元齡獨無升勺過取土兵隸於司者視之如子秋毫不擾於民時人為之語曰縣尉不要錢只有趙子年穆爾古蘇元史舒穆嚕宜孫傳穆爾古蘇寧夏人字善卿至正十四年進士授紹興路録事司達嚕噶齊苖軍主將楊完者在杭縱軍鈔掠至紹興城中強奪人馬穆爾古蘇擒斬數人苖軍懼不敢復至其境會江南行臺移治紹興檄為行臺鎮撫乃大募民兵為守禦計處州山賊焚掠婺之永康東陽提兵往擊之與舒穆嚕宜孫約期夾攻搗其巢穴山賊以平擢江東廉訪司經厯仍留紹興以兵衛臺治時浙東西郡縣多殘破獨穆爾古蘇保障紹興境內晏然民愛之如父母授行樞密院判官分院治紹興後為御史大夫拜珠格所殺監察御史珍通糾之寃始白明欒鳳於越新編髙郵人元至正末知諸暨州及明兵下諸暨仍以鳳知州事時州民初附軍士下鄉索糧民不勝擾鳳乃置倉出納上下便之院判謝再興謀叛以兵脅鳳鳳不屈刀加頸氣益厲鳳妻王氏以身翼蔽皆死之唐鐸於越新編虹縣人洪武初授西安縣丞厯知紹興御下以誠人不忍欺凡徵賦有非土産者悉奏罷之餘姚上虞爭夏蓋湖水利經嵗不決鐸至斷以至公民皆悅服官至刑部尚書崔東明一統志洪武初山隂知縣賦均事簡有治聲民思之戴鵬明一統志洪武初任會稽知縣清慎自守時軍駐四明鵬往供饋餉期限嚴急率民步行日晡飢甚從者進餅却不受掬道傍水飲之王宗仁明一統志洪武初會稽知縣蒞政廉明吏畏民懷滿去父老擁馬幾不得行田賦於越新編蒲圻人洪武初知諸暨時兵燹之後官吏皆寄宿民家賦夙夜經畫招撫流散墾闢草萊興起學校無不竭心力而營建亦稍備焉張懋蕭山縣志洪武初知蕭山重農恤民尤注意湘湖水利為圖記刻石今存於儀門之左趙允文𢎞治紹興府志鄆城人洪武元年為上虞知縣招撫流散差定賦役民樂吏化邑里晏然曾衍文舊浙江通志廬陵人洪武初為新昌主簿勤惠廉潔甚著聲稱著有濮泉稿陽春舊浙江通志洪武中尉山隂清勤有幹局晨起視事日晏未罷惟啜糜而已隆冬無衣長官以衣衣之受而不服其介如此鄒魯萬厯會稽縣志鳳陽人洪武中會稽典史釋滯理寃輕刑緩役招集流亡父老奏魯治有異績擢知本縣廣寧衛鎮撫趙興以公事至為人私請不從誣逮刑部事直上嘉其守擢大理丞髙孜嵊縣志洪武七年任嵊縣涖政明敏愛民如子三載卒於官丁壯號哭老人兒啼為葬北門外星子峯下周文祥成化新昌縣志淮安人洪武元年任新昌知縣廉能剛決為政有方縣自兵餘官民舍宇悉燬於火文祥蒞政凡官廨吏舍壇墠學校靡不修舉升杭州府通判凌漢萬厯紹興府志字斗南河南人以秀才授司經局正字出知會稽寬簡仁恕愛民如子以詿誤繫按察司獄太祖知漢無罪釋之拜御史謹按會稽縣志謂漢病卒會稽今據嘉靖通志正之王谷器明一統志徽州人洪武間蕭山知縣涖政明敏長於治才果決如流事無壅滯陳公達嘉靖餘姚縣志清江人為餘姚令時民籍新附狡黠者重輕其籍役法病不均公達令各詣縣自實而使里甲羣證之皆悉其情偽乃次為上中下户效元劉輝造鼠尾册次第書之亦定役為三等如户遇有差役視册等差與之無不稱平者賈驥明一統志洪武間為新昌知縣廉謹自守九載滿去民擁道涕泣挽留不已張真於越新編蘇州人洪武末知諸暨厚重廉介時兵民稍營聚而土瘠賦重皆棄不耕元知百姓翼力請蠲賦乃佃墾至是欲履畝升科憂懼真持不可以身為請乃得減額李慶於越新編順義人洪武末以國子生署右僉都授刑部員外知紹興威信並濟庭無滯獄暇即躬理園蔬以供朝夕照磨侯鑰守職清貧每分俸資給由是幕僚競厲擢右都御史𡊮時億諸暨縣志東安人洪武末為諸暨學教諭深經術善文章誘進諸生未嘗辭倦時官聮法峻人以田里為安不肯就學求仕宦及時億至聞有師模乃多從之遊時億著忠臣孝子輔相守令等篇與子弟論説談應奎舊浙江通志廣東人洪武末知山隂有治劇才摘發姦蠧吏民不敢欺蕭九萬嘉靖浙江通志南昌人洪武嵗貢為諸暨縣丞嘗書容忍思慮四字疏其義揭門屏間百姓以訟至者必諄諄以是誨之唐復嘉靖浙江通志字復亨武進人庚戌進士知餘姚為人直方斷擊無滯拊循懦弱甚著惠愛仕終平樂知府孫貞獻徵録字宗正南昌豐城人中癸酉鄉試甲辰登副榜者百六十餘人詔三等銓之貞得教授紹興振教規務行公正有施御史者按郡甚嚴私於給事徐氏子既令充增廣生又升而廩膳之貞諍不可御史氣沮郡官皆從傍私語使姑許之退可改行勿與面質貞曰君子與人以信焉有今日許之而明日可改御史知不可奪遂止作育諸生旦夕講解不倦秩滿升國子助教轉博士都昶嘉靖餘姚縣志字文達海豐人以太學生知餘姚縣勤敏好禮士數過髙士張一民所執禮甚恭張具青菜糲飯昶飲食之極歡治縣得體百姓親附之永樂初營建追督材需者旁午姚恃昶無擾終九年任去吏胥莫能鈎致一錢然亦不笞辱吏以故吏無怨焉頻行民爭留其靴於舜江亭有見靴泣下者熊禮於越新編臨川人永樂初知諸暨詳於治體使者抵金澗山取金民皆閧擾禮與府判董瑛極言山本無金前時淘采無獲不可復啓禍階使者按視得實事遂寢鄭汝敬獻徵録字行簡以字行居歙西永樂乙未進士知上虞先是令以貪冗去民素知行簡名皆踴躍歡迓載道行簡至抑豪右勸農桑賑飢窮治輿梁棧道而大興學宫居二年邑大治監察御史尹崇考浙七十二縣令置行簡第一凡别縣有疑訟不決者多付理之行簡亦悉心民隱不遺餘力然同僚猜忌日甚先是邑有耆儒曰柳南仲賢而有文行簡敬之憫其貧贈以綿絮南仲狷介不受以錢百文槖詩為謝行簡辭錢受詩同僚以是誣之將左遷行簡以母年髙無以為養遂自解職歸上虞人請留不得相與擁泣而去朱彤紹興府志蘄州人永樂初為紹興通判廉公有威人不敢干以私及去官士民走送者闐溢郊外父老來自山谷皆欷歔流涕而别岑子原紹興府志南海人永樂初為錢清北壩官廉介勤敏役夫餽酒肉悉却之敝袍蔬食處之怡然政暇必兀坐讀書人謂子原卑官而清操獨立為可異云王耕山隂縣志字舜耕山東單縣人永樂中知山隂縣有經濟大略時營造殷繁逺衛勾攝旗校絡繹旁午供應調發民且不堪耕經理節約不廢法亦不病民內官鄭和下西洋索寶玉道所經輒縱恣直入人户室廬探囊發篋逺近騷動耕言邑小民貧土産布粟而已寶玉非所出也和遂去吳亨於越新編字通夫鄆城人永樂中知諸暨清介方嚴悉心撫字縣湖田堤壞頻年苦潦亨疏請築堤遏防堅固水不能齧民享其利尋以目眚免官貧不能歸遂寓安俗鄉卒而葬焉民率錢表其墓曰清廉縣令吳公墓談思敬嵊縣志湖廣人由鄉舉永樂間任嵊令政先教化時以孝弟格言告諸父老使歸訓其子弟邑民景從日誦所訓曰教我孝者談乎因呼為孝談九年滿秩民奏留復任九年民不忍舍遂家於禮義鄉子孫世為剡人胡敏舊浙江通志荆州人宣德中守紹興方正廉簡時庶務繁劇敏處置得宜民不擾而郡治羅以禮於越新編桂陽人宣德中守紹興寬猛得宜利弊無不興革好敦禮隱逸在任九年或雨暘不時祈禱輒應民歌曰太守羅以禮存心合天理祈晴即得晴祈雨復得雨錢浩𢎞治紹興府志華亭人宣德間為山隂知縣政尚廉慎抑豪強伸枉滯邑人有鬻其子於鄰邑而誣富室殺之者浩訪得之為白其事片言折獄民莫能欺蘇琳蕭山縣志山東蒙隂人正統間由進士為御史出知蕭山縣産櫻桃嵗入貢後遣中官摘取多索常例琳抗不與中官故不時採之使易壞欲以罪琳琳遂與中官相格逮械至京英宗問曰爾何以格我內官對曰朝廷以口腹戕民內官以威勢虐朝廷命吏臣是以抗之英宗歎曰直臣也令還職琳曰但使櫻桃復貢蕭民死過半矣自是蕭邑得免貢櫻之害徐士淵嵊縣志定逺人由鄉舉正統間知嵊時值旱蝗力請得米八百石以賑已而洊飢憂惶成疾卒於官無以為殮先二年有令徐雍毗陵人潔已愛民問民疾苦憂勞遘疾子彥華刲股以救勿愈卒百姓先後哀之張鉞於越新編河南新安人正統末知諸暨縣訟清徭省飭學宫易浮橋凡所建置皆逺猷大利會栝蒼盜起轉逼壓境而暨東南鄙有大山當婺越界居民葉氏盤據其間素不奉法將應盜鉞潛率義士夜搗其巢羣醜奔散盜不敢復窺縣賴以安袁通舊浙江通志正統中為紹興推官值處州賊葉宗留之亂通奉檄率鄉兵往討即日與其子就道徑抵賊巢列柵以扼其衝賊夜劫其營父子奮鬬俱被害彭誼於越新編東莞人為御史纍遷右僉都天順初以忤權貴調知紹興民苦飢即發倉賑之吏白當上請誼曰待請而發死者多矣吾何愛一官不活萬命耶明年有秋民爭輸實倉湖田正稅既重復加折耗鬻産不能償誼請按畝起耗不分輕重槩以三升為率民始獲蘇又築白馬閘障鹵水使不得入一郡蒙利最聞擢山東布政晉副都御史周鐸𢎞治紹興府志大竹人景泰初知山隂縣外剛內恕豪強痛繩以法民相戒不敢犯尤留意學政邑以稱治秩滿升知州蔣誼萬厯紹興府志字宗誼句容人成化間推官好文學引接儒生讞決平恕人無號寃者召拜御史李鞏蕭山縣志武陟人成化間由舉人任蕭邑會風潮突新林塘田廬漂沒鞏撫存患家收掩漂骸力請藩臬貸鄰郡儲粟以賑之補築隄岸不遑寢食尋以才能知紹興胡瀛於越新編羅山人成化中知餘姚時日本入貢所至騷動瀛多市瓦器實魚菜糗糧至即人與數器夷得飽輒就道嵗飢發廩以賑之全活甚衆奏免田租之半復請折不免者監儲督折銀急甚瀛弗徵坐奪俸又弗徵其明年有秋民爭輸恐後無一逋者平徭息訟每詘豪右人皆畏悅以憂去百姓思之洪楷洪珠萬厯紹興府志字學庸莆田人初為御史出知紹興儉勤廉慎賦寬刑平成化辛卯嵗飢瀕海多盜楷令防守要隘盜遂屏息復勸富家出粟以貸貧弱由是嵗不為害從子珠字玉方嘉靖初復知紹興建忠臣劉韐先賢尹焞祠封耆儒羅頎墓表節孝聘遺逸若王野王琥輩皆躬造其廬一時士氣大振尋遷本省右參政人謂大洪小洪先後同風黃璧萬厯紹興府志字廷玉浮梁人成化間同知紹興守潔政平秩滿去郡惟圖書衣被而已張齡萬厯紹興府志字延壽華州人成化中通判紹興廉靖謙和愛民下士勤勞致疾卒於官劉􅒑舊浙江通志四川人成化中知餘姚凡所推行務當羣情監司或阻其事􅒑持之勿變時中官暴橫􅒑獨挺身當之海溢大飢力請蠲賑尋以憂去後有賈宗錫張𢎞直者相繼與􅒑並稱金爵山隂縣志字良貴綿州人成化中知山隂縣平易守法節賦省刑民愛之如父母時郡多虎獨不入境人以為德化所感擢太僕丞仕至刑部尚書許嶽英嵊縣志字邦賢潮陽人由鄉舉成化中知嵊縣當春出郊視農事民為建勸農亭舉行藍田吕氏鄉約崇奬節孝率諸生習射於射圃開社學教闕子弟建廟學齋廡及豆籩罍爵等一切省視修飭闕田土舊多詭冒賦役不均特為丈田均賦宿弊一洗朱栻萬厯紹興府志字良用崑山人成化末知蕭山縣為政切於愛民催科不擾開濬湘湖豪強屏迹立丁田法頒行諸郡邑利澤甚溥徵拜御史臧鳳劉玉臧鳳傳字瑞周曲阜人庚戌進士壬子選知嵊縣嵊齒繁而賦殷鳳勸農桑興學校又礱石甃堤百八十丈以障水衝民甚便之徵拜御史厯升南京刑部尚書陳堯弼萬厯紹興府志字秉均大理人𢎞治初知會稽務興利除弊尤注意學校為闢地置田時中貴出鎮者張甚堯弼遇之無加禮斂迹而去劉麟湯斌劉麟傳字元瑞南京廣洋衛人𢎞治九年進士厯郎中出知紹興府時劉瑾擅權士大夫遷除者必候謁而後敢受任麟獨不往拜命即行涖郡政號廉平而瑾銜之甫五月托細故罷為民士民醵金為贐麟曰昔劉寵一錢兹何多金也麾之去瑾誅起陜西參政進副都御史以工部尚書致仕姚隆獻徵録字原學家金陵𢎞治壬戌進士令新昌時嵗旱民多流殍設法賑濟多所全活數辨寃獄有懷金謝者力拒之不受升禮部主事轉郎中出守荆州潘珍分省人物考字玉卿婺源人𢎞治壬戌進士授諸暨知縣政務循良不事苛矯創建預備倉更拓養濟院新孔子廟程力計工民不知勞升大理寺右評事厯南京兵部右侍郎致仕陳祥於越新編髙安人𢎞治中知上虞臨政嚴明人莫敢干以私嵗飢按口施賑復請於朝得內帑金以繼之仍蠲秋糧十之七他邑流徙者為煮粥僧寺以食之逺近全活者甚衆又嘗刻鄉約與民更始遇諸生有恩禮咸懷感奮期年以憂去戴琥於越新編浮梁人由御史知紹興持身廉介馭八邑令長每甄别其黑白稍有過輒庭叱之諸令凜凜無敢犯暇則舉鄉射禮名士間至梅山造隱士羅頎之廬召諸長老共揚榷今古即窮鄉單户有竒節獨行者封墓式閭遇民疾疫必遣醫分療文廟樂久廢特崇修之朔望進諸生講論經史尤究心水利若夏蓋湖西小江疏防得宜扁拖玉山築塘建閘蓄泄有候功利甚溥李良舊浙江通志山東人𢎞治中知山隂才略過人廢墜畢舉運河土塘坍頽水溢害稼良甃以石五十餘里田不為患唐夔新昌縣志字希昭廣西全州人𢎞治庚戌進士知新昌縣性資明敏折獄曲盡隱衷時以神君稱之涖事二三月庭無留牘隸卒皆令業屨門不設禁有事得徑入自白省事節費姦弊肅清吏胥困飢多辭去民呼唐青天未幾更調東陽民涕泣送出境留像譙樓以志思後邑訟有不理者或往彼求決焉官至知府劉希賢嘉靖餘姚縣志宣城人𢎞治十五年由吏員授餘姚主簿不以家纍自隨性狷介遇事顧義當否恥隨俗俯仰卒之日同僚檢其篋止俸餘五錢帕二方而已縣為殮其喪歸之南大吉獻徵録字元善正德辛未進士厯紹興知府政修廢舉建嵇山書院萃屬邑髦士教之成者什九囚多不決者一鞫即得其情屬吏有被誣者特為洗雪盡力陂塘備旱潦運河為勢家所侵疏而復之郡有大盜數為權要所庇悉置之法有學士侵王右軍謝太傅故地悉割歸其主竟由是罷歸吳成器王鴻緒任環傳成器休寧人為會稽典史倭三百餘劫會稽為官軍所逐走登龕山成器遮擊盡殪之又破賊曹娥江擢浙江布政司經厯旋擢紹興通判與賊大小數十戰皆捷身先士卒進止有方略所部無秋毫犯士民率於其戰處立祠祀之後改武秩毛伯溫於越新編吉水人正德中任紹興府推官每讞獄必兀然凝坐徐察言色務得其隱哀而能斷無縱無枉諸郡邑有訟寃者必求直於伯溫攝理盈案能譽大起尤好敦禮士夫學行有聞必造門咨訪拜御史厯兵部尚書進太子太保汪度於越新編績溪人以鄉貢知上虞自奉過儉衣至十浣不易朝夕惟豆羮一盂而事母則極豐闕闕有賣犢以償其俸者廉知之命歸贖其犢或有必以理諭再三未嘗輒加鞭撻民亦不忍欺正德間劉瑾誣以受賄落職室如懸罄民爭助不許去之日士民擁留不獲為樹碑頌德張煥山隂縣志字主奎泰和人正德間以進士知山隂平恕近民裁政務先大體丁卯秋海溢漂溺廬舍煥躬自巡省弔死問生請寬租賦以賑之比嵗登令民築塘捍海復於上流建扁拖閘以時蓄泄自是無水患留心學校邑故有嵇山書院煥復修之顧鐸萬厯紹興府志字孔振博興人正德間以進士知山隂嚴明威斷吏不敢為姦豪右斂迹張讚嘉靖餘姚縣志字宗器六令人由鄉貢知餘姚正德壬申秋海溢溺民浮尸蔽江涕泣躬督瘞之時邑里蕭條民免於溺者皆飢寒不免讚力請賑之而當路猶督租如故讚俟其行縣檢荒率飢民路號請貸當路盛氣加讚讚應對如響租終獲免民賴全活寧欽諸暨縣志字宗堯衡陽人正德間以舉人署諸暨學諭士有不能婚喪者輟月俸為助先是諸生有持學事短長者欽至繩束之莫敢犯俗婚喪多不以禮欽為繪六禮圖疏附儀注陳肄學宫令衆觀覽且有精鑒諸生中凡許可者無不向進六年召為監察御史邱養浩於越新編晉江人正德中知餘姚才識明敏視義勇為旌善良抑豪橫民皆知所勸戒時姚賦役多姦欺養浩洞見弊源乃定為橫縱册釐正之最稱均平擢御史去張暄嵊縣志由鄉舉正德間任嵊縣清操凜凜時謂之張強項中官橫肆使者下邑誅求莫敢誰何暄立笞其使中官識暄名置不問上官以所不便檄令諸邑暄獨封還或反論駁見者吐舌暄不為意上官亦嚴憚之顧存仁嘉靖餘姚縣志字伯剛太倉人以進士除知餘姚姚賦役自邱令釐正豪猾復為姦欺飛詭漏免貧民一丁有出銀九錢以上者存仁乃罷丁科田每嵗畝出銀六釐於是無田者得以無擾富者無能夤緣民皆稱平監司推其法於全浙又病姚無邑志謀纂述之未就尋遷給事中去丞金韶嗣成之應佐山隂縣志江都人少以志節聞其鄉有妖為辨怪佐禱於神妖遂息貢入太學丞山隂清而有執以文學飭吏治遷髙陽知縣朱廷立諸暨縣志字子禮通山人嘉靖初知諸暨縣先是縣有額外長短差嵗費民財八百餘兩廷立為蠲除之山會二縣有海隄之役議者令暨亦嵗出夫錢廷立曰居民守土各有分域禦災捍患從其封疆山會之隄而暨與修之暨亦嵗有湖隄之役可率山會之民從事乎作訟誡勒諸石諭民無相告訐置鼓於獄囚繫有所苦令擊以聞後遷監察御史官至禮部侍郎湯紹恩毛竒齡循吏傳字汝承安嶽人嘉靖五年進士十四年以郎中出知紹興山隂東南有浦陽江為三江之一上接金華浦江諸水北流至諸暨與東江合北遏峽山東滙山隂之麻溪然後盡注錢清江而入於海是時浦陽已通浙第口隘浙常髙水反入浦陽而灌麻溪其錢清之入海者勢若建瓴又傾泄不可止所以既苦潦又苦暵紹恩至相浦陽上流恢前守戴琥所開績堰使浦陽之通浙者坦而易泄乃塞麻溪以遏其來不使浦陽之水得復入山隂東南於是相其尾閭凡在紹諸水濫則易浙泄則易竭者為水坊海濱以伺瀦瀉而定啓閉初錢清江下流原有二閘嵗久堙廢紹恩相下流三江之口其地夾兩山為浦陽入海故道下有石峽橫亘數十丈泅水得之乃伐石於山依峽建閘石牝牡相銜烹秫和炭以膠之石之激水者剡其首使不得與水爭下有檻而上有梁施橫坊其中刻平水之則於柱石間而啓閉之兩隄築土冶鐵而澆其根凡二十八閘應二十八宿隄數百丈而大閘之內又置備閘數重曰經漊曰撞塘曰平水閲一年工成共得良田百萬畝漁鹽斥鹵桑竹場畷亦不下八十萬畝初紹恩築隄隄潰有豚魚千頭乘潮而上衆驚告紹恩曰此隄成之兆也在易之中孚豚魚吉利涉大川立令入水築人多怨讟又其時潮大至見者洶洶紹恩不顧禱於海潮忽下望隄而却後以次遷去厯官布政使佟應龍萬厯紹興府志淮安人嘉靖初知新昌縣病賦役不均下車詢知其狀亟為平啚里汰冗濫矯偏救弊意在佐貧弱抑富強有請托者初不峻拒而臨事一斷以理士民德之施堯臣蕭山縣志字欽甫青陽人嘉靖中以進士知蕭山蕭自建邑以來無城屢經海冦始議築城竟莫能就堯臣至力請築城相地鳩工聚石晝夜督率不數月而成堅厚周緻屹然一方保障涖任不挈家屬止攜一簏及遷惟贈言數紙而已官至順天府尹王聘萬厯紹興府志字念覺利津人嘉靖中以給事中謫知蕭山馭吏撫民威惠並著尤究心水利纂修圖志吳三畏嵊縣志字日寅莆田人由鄉舉嘉靖間以臨海學諭升嵊令時海冦猖獗三畏覩邑無城曰不城是以其民棄也周遭相度則城故有址多屋於民令撤去即懟怨不避計費當巨萬緡役當數萬衆或有難色進之曰城勞民不城無民則奚擇乃翕然惟命三畏晝夜省督數月賊自天台突入境相望五里三畏曰城即半猶愈於無城率民兵上半城燎火燭天呼噪動地賊知備乃宵遁明年城成賊復至三畏乘城守禦賊不敢近升廣信府同知劉昺山隂縣志字晉初鳳陽人嘉靖間以進士知山隂性穎敏剖決無滯牒邑瀕海漲沙千頃民因為田嵗有穫而無徵額昺躬親履畝而以無抵糧稅量均於內民甚便之視事三年職務盡舉公庭閴如遷刑部主事陳宗慶嵊縣志金溪人由鄉舉嘉靖間為嵊縣令至邑勞問民瘼上書論列兩事其一謂嵊民協濟東關重役不均纍苦萬狀竊計曹娥東關兩驛隔一衣帶水耳誠得併一費減十四五其一謂嵊例食台鹽乃里道險阻經年鹽不一至而私鹽禁且厲是使民率不得食鹽也姚會鹽場與嵊接壤宜以彼鹽令商人告稅載發抵嵊使窮民得以商鹽展轉貿易官民兩便書上皆不報改官去去十年兩驛併又十年商鹽通其言大驗民益思之張鑑萬厯會稽縣志字汝明南充人嘉靖進士知會稽時縣中匿稅與畝以萬計賠者苦之鑑請履畝一稅經歲寢食田畝中逮訖事民大稱便商旅苦濫𣙜鑑請裁冗署凡五所政寬不妄撻一人任滿去服御蕭然厯官都御史黃綰萬厯紹興府志字子賢汝南人以刑部郎遷知紹興府簡靜寬大刑清政理士民愛戴始綰居部時按問給事中陳洸罪後洗依附權相遂逮綰詣詔獄郡人無少長攀號塞道車不得前陳讓於越新編晉江人進士為紹興推官讞獄明恕凡郡中大利病贊太守行之尤以正風俗明教化為己任毁淫祠奬節孝增置學田崇祀先哲蓋斌斌以文學飭吏治拜御史鄭藝獻徵録字士馨莆田人嘉靖乙未進士知松陽縣精敏有聲部使者疏其才移上虞首濬沙河通商舶蘇郵傳復上妃白馬夏蓋三湖即以湖歲入魚蝦錢倡築上虞城後十五年倭寇浙東獨上虞以有城免鋒鏑遷監察御史陳懋觀紹興府志字孔質長樂人初知會稽政聲流布憂去除補山隂蔬食布袍淡若寒士順民好惡賦緩訟簡嘉靖中循吏以懋觀為最曹天憲於越新編浮梁人嘉靖中知新昌性剛直時縣官公出必攜苞苴廣為餽遺及祭祀宴飲務極侈靡天憲一切罷省之不攜家纍延諸生至寢室蔬食相對如寒士著賦役成規勒之石縣阻山民苦夫役為言當路悉從裁損一監司過首問沃洲天姥憲對曰山不在髙有仙則名今仙去矣止荒山耳嵗大旱布袍芒履行禱烈日中出舍僧寺望見枯稿即泫然淚下至欲自焚以謝百姓已而雨浹嵗登官四川參議宋賢新昌縣志字及甫華亭人嘉靖進士知新昌縣繼曹天憲為政守其畫一而精密過之庭無滯獄人服其明邑田畝多坍荒或抱空稅姦巧者或饗無糧之田賢履畝度田上下山阪躬較量之編為經緯二册以便稽閲一時弊盡賦均民以曹宋並稱擢御史曹祥王世貞曹祥墓志字世竒太倉人領鄉薦為新昌令洞坦不設鉤距諸來訟者取片語而決間擲一二訟師斥之境外是時民貧苦嫁多弗舉女祥乃為嫁程若嫁厚者取婦而責裝奩者及棄女者以次受法欲築長堤捍溪水親行隄所吏民無弗從者闕土告衆曰視吾力所任而準辰刻至酉而罷亦視吾出入為準不易月而隄成為令九載其俗一變比滿當代邑人之有女者以千數攜而送且指謂女曰此而父也母卒終喪遂不復仕萬鵬於越新編武進人嘉靖中知松陽縣改新昌明習吏治常曰吾訓士惟一經治民惟一律耳時倭寇自天台突至邑舊無城民皆倉皇奔去鵬乃決議築城度方廣量丁土聚石鳩工使分築之日視其勤惰而賞罰之民爭效力踰年而成以勞瘁卒於官李邦義萬厯上虞縣志字宜之連州人嘉靖中以進士知上虞時督撫禦倭海上大兵往來邦義委曲籌應民賴以安為政嚴明而不傷苛察待士有禮處民事如家事務不拂其好惡拜給事中沈啓口山王世貞沈啓口山傳字子由吳江人嘉靖進士為紹興守所屬會稽新昌蕭山田與賦左纍其長至賠産以償啓口山平其額而散之里俾輕而易完人人稱便郡田於山多苦旱室廬櫛比苦火又濱海鯋為虎啓口山禱於神虎復為鯋渡海去李僑於越新編長清人嘉靖間倭寇擾越僑為武選郎有聲遂簡知紹興府既至務為持重令丁壯歸田郊市晏如賊亦不敢犯督府方用兵征求四出僑每持議節省又欲發會稽銀礦僑堅執不可督府甚怒而事竟寢為政精嚴吏屏氣不敢玩越俗競尚淫靡有犯必繩即請託弗貸時山隂李令每出則以兩鐵索前導僑出必懸兩爐爇香越人語曰府香爐縣鐵索一為善一為惡在郡六年遷按察副使終山西左布政楊行中山隂縣志字惟慎嘉靖間以進士知山隂厚重寬大脫略苛細雖棼劇中不越常度寬猛相濟士民歡洽擢御史許如蘭舊浙江通志廬州合肥人以工部郎出守紹興三江自湯守建閘久漸圮捐俸修築一還舊制海塘關繫三縣田禾區畫永久疏通之法越民賴之擢密雲兵備道毛壽南山隂縣志吳江人由進士授山隂令值嵗歉道殣相望壽南請蠲不得則停征兩限監司讓之勿顧仍捐廩祿賑濟餓者得糜病者得藥時有乘災謀為亂者廉得渠魁捕治之餘黨悉散先是吏胥媚攝篆詭報完賦以為功會赦撫院據完額索賦壽南具實以報卒罷徵越俗多以殺人相誣一訊家輒破乃先驗尸然後訊遂使誣者懾息民艱於漕則為權豐歉議改折邑有麻溪壩壩外為天樂鄉田三萬七千有竒江潮衝溢乃築堤於貓山鄭家山之間以捍外潮民爭赴工不費一緡而事竣治縣五載拜御史林森萬厯紹興府志候官人嘉靖末知嵊奉母孝嘗曰吾何以慰母惟當為好官耳舊有糧長常例金森至首革之即修衙公費亦不受每恤困窮抑豪右定啚均役吏胥束手調象山行李蕭然里老醵金為贐卒不受蔣正元新昌縣志廣西灌陽人由嵗貢授新昌令民稱為蔣父創立義倉三十間積穀以賑荒申除斗級之害升藩府長史值寇亂以身蔽藩遂遇害許效賢萬厯紹興府志字子官莆田人嘉靖中為新昌訓導誦説仁義論難經旨署縣事以贖金置學田若干畝朱一柏嵊縣志寧國人弱冠舉於鄉隆慶五年除知嵊縣始至人疑無治幹甫月有胥玩法懲之一老胥抱牘陳事微言欲中以利又懲之人大信服兩造設平心而聽往往諭其自解後訟日簡堂下肅然嵊士三十年無舉於鄉者諸父老言往時溪流環邑若抱今南徙風氣用漓然故道可濬即民灌溉亦利賴一柏曰茍利士民吾其任焉不數月河成集羣士子於學宫厚其餼廩月凡三試皆身臨之終嵗無惰容是科舉者三人升南京光祿署正厯慶逺知府朱芥舊浙江通志富順人以刑部郎出守紹興始下車周咨民隱清課額崇學校省刑出滯不數月士民頌之田琯新昌縣志字希玉大田人辛未進士萬厯二年任新昌俗以人命誣訐每至破産琯痛懲數輩由是惜命保家鄉苦盜琯每鄉廉真盜一人立為總甲凡盜發令其捕緝盜風頓息嵗旱徒跣禱赤日中闕修嵗乃大稔一日行野見田有渠無水問故民曰渠則屬民而得水則屬勢家我何徒苦為琯曰有是哉乃舍郊外督民濬築且為履畝均放之自是豪強不得復專編氓咸被其澤負郭田一萬三千餘畝悉成膏腴民每候其出爭為舉輿歡聲溢田野間作分水亭以憩之琯慮嵗久法湮捐俸置田為每嵗濬渠之費纂修縣志序論記跋俱出其手升戶部主事徐貞明山隂縣志字伯繼貴溪人以進士授山隂令在任五載抑豪強扶善良緩科勸農以至葺官路築海塘不取行鋪不差公勾不畏勢閥不避上官舉士之公正者為民導善止惡及內召民泣送輿馬擁不能行劉會舊浙江通志惠安人知蕭山建西興石塘及龍口閘為民永賴施三捷嵊縣志字長孺福清人由舉人知嵊縣強毅有為尤精於律諸讞決手自填注吏書無敢骫法待士有禮尤重行誼有私謁者謝不受即豪右相戒無犯上官皆敬憚之建南橋邑人名以施恩升順天府推官陳允堅諸暨縣志號毅軒長洲人萬厯進士授諸暨令治尚愷悌勸民息訟調繁石門士民攀轅者百餘里嵗時走石門謁之秦尚明舊浙江通志太康人蕭山令廉明並著減賦額却例金於署門外立榜亭置爨器民有以訟牒至者即令居此攝被訟至立為斷遣劉光復諸暨縣志號貞一青陽人萬厯戊戌進士任諸暨縣暨介萬山間而七十二湖處於下流山田易旱湖田易潦民常患之光復相度地勢壩麻溪導七堰旱潦有備且於諸湖中畫為經界築長墟以捍水沿江起大堤開水門以時啓閉立墟長數十丈墟之坍塌令督領培補浣江出縣界地勢犬牙水至此盤渦不瀉上遊潰溢光復欲直其江以地屬蕭山率民夫數百人一夕開通謂之新江水患大減置義田數百畝貯租備賑立義冢百餘處掩骼埋胔停喪溺女錮婢及同族為僕之弊相沿不已光復悉革除之胡思伸紹興府志績溪人萬厯進士令上虞利弊纎細罔不周知下車即清丈田土息民爭訟又捐俸多置學田修築新安巽水二閘合邑利賴焉董羽宸舊浙江通志華亭人萬厯間知餘姚時當倭患姦民與市以致闌入羽宸廉得其人按以法海患始息時鄉豪有殺其族屬箝里勿聞者羽宸偵知立出其骸於荆棘中民服如神明徐待聘上虞縣志常熟人萬厯進士自樂清調繁上虞雅好文學惠民息競核漳汀湖侵占清玉帶溪壅淤度西溪湖地形又廣置義冢政餘課士不倦秩滿升刑部主事王應朝嵊縣志字我辰六安州人萬厯中由鄉舉知嵊立意釐剔姦猾屏迹而不事繁刑堂清如水調繁桐鄉陳如松舊浙江通志同安人知蕭山以邑水東去不利民財乃築壩截其流别開雙河塍使水折而南注繞出大通橋又北注以繞於舊道凡為橋者三建塔二後升知州去馬如蛟舊浙江通志字騰仲和州人天啓中令山隂口吃而斷決如流嘗治海塘修麻溪壩定閘規蓄泄又建義倉立大善社每訊盜賊毋許妄攀善政不一行取升御史孫蘭毛竒齡循吏傳字畹仲無錫人崇禎進士知紹興府會嵗飢蘭定賑救法預為分區使鄉官分主之籍記飢民之受賑者合萬九千六百零口立厰二百七十六所設散米給錢粥厰移粥藥局病坊官糶民糶官積民積諸事共二十六則浙東三府十九縣皆行其法所全活以千萬計御史祁彪佳著為救荒全書一十八卷可嵗行之如官積先闢厫於秋收時征米每畝征升以時直給契登厫次年官出如舊直民積計民田積米凡三十以上畝積五升六十以上畝積七升百畝以上積斗三百以上遞增而米藏其家不俟官驗明年計畝以時直糶米於本啚其法如此升廣東按察司副使袁定舊浙江通志華亭人崇禎間知餘姚嵗飢貧民聚衆肆掠捕得數人未及報即掊殺之而自劾不職隨設法賑濟多所全活余揚舊浙江通志莆田人崇禎間令上虞土賊竊發猝入城揚勒鄉勇巷戰格退之所擒獲即斃之杖下及得賊籍勿展視燔其籍一時良莠無不感泣蕭琦諸暨縣志號韓若吉水人崇禎甲戌進士知諸暨縣暨民健訟琦片言折服庭無留牘癸未冬東陽人許都倡亂時承平日久人不知兵數百里內外無不震駭奔竄琦閉城靜鎮人情始安李拯舊浙江通志晉江人崇禎間令上虞所按訟牒明是非而止罕及刑楚紳士或餽以修脯辭勿納布袍蔬食宴如也夜則篝燈讀書喜與士諭文所奬拔皆譽髦出清俸以修學校不借民工不資贖鍰升工部主事陳子龍諸暨縣志號臥子松江華亭人崇禎丁丑進士為紹興司李署諸暨篆時嵗大飢姦民誘聚亡命肆以剽掠子龍以計擒之民賴以安王正中舊浙江通志比直人崇禎間知餘姚時山寇竊發邑如沸螳正中彈壓有方民依為命錢世貴諸暨縣志字聖霑江南青浦人崇禎庚辰進士涖暨二載值嵗大祲死亡相枕藉世貴設法賑濟民賴以生縣治堂署廊廡傾圮庀材鼎新釐正民間權量至今畫一梁佳植餘姚縣志字南有宜春人崇禎進士令餘姚體緩弱未嘗形喜怒人莫窺其際及鞫訟則屹然不可移姚邑錢穀久為吏胥乾沒解户苦之佳植一洗積弊民輸將恐後涖任四載與民休息盜賊鮮少去官時涕泣送者無算王章邵長蘅三忠傳字漢臣武進人崇禎進士初令諸暨調繁改鄞鄞人來迎暨人逐之曰王君我父也鄞何與鄞人爭之曰王君我父也暨安得留章兩慰遣之乘夜啓門牡去治鄞如暨兩邑皆肖國朝像以祠擢御史殉甲申難賜諡節愍國朝劉方至舊浙江通志山東人順治三年以貢生授紹興推官寬和慈惠涖任甫一載政清刑簡視上虞篆山賊王嶽壽夜率衆攻城時守兵單弱城陷方至死之事間贈按察司僉事廕一子入監讀書韓昌先舊浙江通志遼東人順治九年知蕭山縣涖事明敏立里甲均當法徭役均而詭寄之弊絶至今遵行卒於官張邦福舊浙江通志湖廣蘄水人順治十八年以進士任紹興府推官精敏練達摘發如神有訟者訴牒悉置內署勾攝罪犯惟姓名而已故訴者不知其訟訟者亦不知其訴胥吏不能為姦詰訊之下情偽立辨人頌公明賈國楨紹興府志字蒼嶠山西曲沃人康熙五年由貢生任蕭山縣蕭密邇省會營兵往來畜牧民甚苦之一曰盤債患在貧民一曰圈賭患在愚民下此則馬厮入市有短價勒貨之患國楨潔已執法前患悉除旁邑聞之質成踵至二載卒官張三異舊浙江通志漢陽人由進士康熙七年任紹興知府王嗣臯重修紹興府志序三異守郡力舉廢墜民式於法耕夫牧豎咸知從士大夫後蒸蒸丕變焉陳可畏重修府學記郡庠圯三異捐俸重建若殿若廡若櫺星門若泮橋若名宦祠次第畢舉育才興行多士嚮風紹興府志入祀義愛祠許𢎞勳舊浙江通志遼東人康熙十三年知紹興府鎮靜有大度涖任甫一月閩逆竊發越屬暨嵊新三邑姦民嘯聚圍攻郡城𢎞勳乘夜率兵出殱縛渠魁餘皆撫慰散遣之郡境得安升寧紹道厯河南市政使髙登先山隂縣志字倩升湖廣鍾祥人順治已亥進士任山隂以誠信和易待民不尚苛察而人不敢欺康熙十三年山賊竊發攻常禧二門城幾陷登先率民多方守禦援兵至賊始退十五年大兵𠞰閩過天樂橋登先供應軍需倉卒間溺於水衆救獲蘇遂構石梁百姓以登先誠於為民遂名曰髙公橋尋擢闕姚文熊名宦留祀册江南桐城人康熙丁未進士十五年知蕭山秉性慈祥操守清潔凡訟於庭者曲直立剖莫不心服而去尤振興文教優禮士類惠政循聲協於遐邇秩滿士民建祠於江寺之左肖像焉李鐸紹興府志字天民奉天鐵嶺人以兵部郎出知紹興府性喜有為自郡署城垣社稷壇暨鐘樓驛館書院賢祠一切陂塘古迹期年掁起康熙二十九年餘姚大水漂溺民人廬墓以萬計其存者飢乏待斃鐸與知縣康如璉設粥厰數十哺之已又念就食妨業令各鄉坊上民籍每男婦一人給米四斗幼者半之復製木棉衣若干豫寒者全活無算守越四載始終不名一錢三十一年調繁杭州民遮道蜂擁大哭鐸亦流涕而别王風采公舉事實字汝載黃岡人康熙己未進士二十八年令會稽清介自矢俗好訟以謙讓誨化之嚴絶請托大嵐山連金寧溫台四郡界有號白頭賊者乘嵗飢誘民為亂風采廉得其魁捕置於法餘黨解散乃勸富民賑貸全活甚衆捐俸建造范陽閘土人利之在任十一年邑稱大治毛上習名宦留祀册廣西賀縣人康熙二十九年由舉人知諸暨縣捐俸賑飢愛民如子徵糧有法設立義學延師訓誨邑中寒士若坐春風在任三年疾卒奠送者塞道卞之釗名宦留祀册正白旗人康熙四十七年由監生知諸暨縣持身廉謹每月遴選鄉耆宣講聖諭寒暑不輟捐俸修學訓課生童築湖埂以禦水設戶單以徵糧建粥厰以賑飢聮保甲以弭盜善政不可枚舉浙江通志卷一百五十三
