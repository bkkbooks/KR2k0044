body:
  text: 浙江通志卷二百四十四經籍四史部下故事南宫故事百卷梁書丘仲孚傳字公信吳興烏程人撰南宫故事漢制考四卷宋史藝文志王應麟撰漢唐事要二十卷嚴陵志錢文子撰漢唐會要元史孟夢恂傳夢恂著通典輯要續文獻通考詹師文撰宋通志五百卷萬厯溫州府志秦範撰故事備要四卷嘉靖金華縣志唐仲友著厯代制度詳説二卷淡生堂書目吕祖謙撰經筵口奏故事續文獻通考葉味道撰進講故事五卷赤城後集杜範著經筵東宫故事四卷餘姚縣志胡沂著淳熙經筵日進故事一卷淳熙東宫日納故事一卷宋史藝文志詹儀之撰憲度權衡𢎞治衢州府志江山柴紱著憲度權衡續文獻通考劉敏士撰合宫嚴父書一卷宋史藝文志倪思撰宅揆成鑑二十三卷采薇天保末議二卷南鴈蕩志薛據著金使問答金華賢達傳趙彥秬撰政和大理入貢録一卷書録解題錢塘周邦撰宋朝衣冠盛事通志藝文略錢明逸撰國朝臨雍故事宋史髙文虎傳孝宗幸兩學祭酒林光朝訪文虎具儀注文虎輯國朝以來臨幸故事授之攬抄一百卷咸淳臨安志洪咨夔著國初禮賢録一卷焦氏經籍志劉基撰國初功臣封爵考八卷分省人物考鄭汝璧著皇陵正議萬厯義烏縣志虞守隨著安南職貢議崇禎烏程縣志沈應龍翔卿著辨姦録一卷續文獻通考宋濓撰存心録十八卷精誠録三卷內閣書目吳沈等編撰國朝典彚二百卷婺書徐學聚著國朝典故記聞十八卷兩浙名賢録余繼登著國朝宏略常山縣志詹在泮著弇州三述補秀水縣志俞汝言著經世要略八卷崇禎衢州府志葉秉敬著識小編內篇九卷外篇五卷黃氏書目周應賓著識大録歸安縣志王豫著宗藩議一卷萬厯秀水縣志戚元佐著厯代君臣紀略四卷金華縣新志戚雄撰君臣集議萬厯寧海縣志陳嵩著名臣寧攘編三十卷秀水縣志項鼎鉉輯明武功雜録又詞臣恭題聖製集録二卷祁承熯輯見淡生堂書目中興龜鑑延祐四明志林保宇芘民鄞縣人集中興事迹繇夏少康至唐肅宗中興龜鑑括蒼彚紀何俌著中興要鑒十卷𢎞治嘉興府志聞人宏著時務經濟總論十卷分省人物考王杰著經濟考略嘉靖寧波府志戴䲀著經濟日抄仁和縣志鍾化民著經濟録十卷嘉禾徴獻録錢士晉著字康侯嘉善人康濟譜二十卷檇李詩繫郭紹儀著經濟環應編六卷嘉禾徴獻録錢繼登著古搜二十卷今宜二十卷嘉禾徴獻録陳懿典著經濟指南錢塘徐繼恩世臣著古今名臣經濟録杭州林瀾觀子著政機要䇿嘉靖浙江通志邵炳著憂國論十卷台州府志宋應松著太平十議十卷罪言一卷金華先民傳宋陳炎著恢復機密十論制敵權鑑四十卷富強要䇿十卷延祐四明志趙粹中著字叔達清朝政序南鴈蕩志陳堯英著治安十䇿萬厯龍遊縣志宋祝景先著資時朴議二十篇萬厯崇德縣志陳之純著字仲誠時政更張議五卷鄞縣志王珩著太平策宋濓題後大德中三衢鄭以吾宿衛禁中覽時政有所缺遺疏太平策一綱二十目上之治平首策二卷東陽蔣元著見宋濓蔣府君墓志太平策略分省人物考凌浣著曲江三議太平縣志金孚兑著時務議兩浙名賢録沈槩著守欽蠡見嘉木徴獻録張應宿著讞閩録又兩河日記又江藩紀略鄞縣志董光宏著守藩事宜鄞縣志陳良謨著畿甸事宜金華縣志錢學孔著代庖公案八卷分省人物考沈節甫著甌東政録萬厯溫州府志項喬著牧政略黃氏書目許孚遠著東川政績十二卷分省人物考包澤著字民望號東川鄞人京兆政略嘉禾徴獻録姚思仁著漢南政紀崇禎衢州府志王家業著曲陽政略嘉禾徴獻録姚以亨著字思仁寶坻政書二卷袁氏政書二卷黃氏書目袁黃撰治潭紀事録嘉禾徴獻録包鴻逵著政績録黃氏書目胡友信著惠愛録又玉陽録萬厯溫州府志戴賞著字從善永嘉人西江治譜十五卷錢塘縣志陸運昌著愛政編又均平議天啓平湖縣志沈𢎞光著政書二十卷黃氏書目陳龍正著兵略十卷會稽續志李光著厯代邊防六卷屯田便宜一卷會稽續志黃度著邊防兵政十六事嘉興府圖志徐綱著安邊史鑑一百九十六卷萬厯溫州府志蔡卓撰隆慶平陽縣志林翬修中興兵防事類金華先民傳徐次鐸撰防柘録嘉靖寧波府志袁甫著屯田詳議二十二篇嚴陵志方有開著備邊五論分省人物考車純著字秉文上虞人備邉八䇿一卷尤氏藝文志王守仁撰兩邉紀略縉雲縣志李正開著樞管集又籌邊要略萬厯湖州府志蔡汝楠著籌邊七略檇李詩繫沈堯中著國計邊防風俗書歸安縣志錢鎮著字淡菴三雲籌俎考四卷台州府志王士琦著備倭圖記四卷征苗圖記一卷厯代市舶記一卷萬厯秀水縣志卜大同著厯代備邊䇿又河套議檇李往哲列傳錢薇著海議又一庵雜記籌海圖編主事唐樞撰平番議又安南議又撫黎議分省人物考沈應龍著河防一覽十卷治河全書六卷尤氏藝文志潘季目馴撰按內閣書又有宸斷兩河大工録河防一覽𣙜十二卷潘季馴子大復輯北河紀略十四卷漕河通考四十五卷萬厯秀水縣志黃承元著治河管見四卷嘉禾徴獻録桐鄉潘鳯梧著河防要書十卷錢塘縣志吳繼志著治河録金華縣新志潘希曽撰河渠志德清陳元㺱玉仍著河工見聞録一卷仁和邵逺平戒三著海運紀原七卷龍遊徐泰亨和甫著見黃晉徐君墓志海運志二卷內閣書目王宗沐編治水正傳又皇都水利考一卷萬厯嘉善縣志袁黃撰問水贅言甬上耆舊詩黃景章著膠萊末議蕭山縣志來斯行著河海圖議又水田議崇禎烏程縣志張兆元著字子宿開講法一卷治汴書一卷崇禎衢州府志葉秉敬著採運條議一卷嘉禾徴獻録徐學周著字尚文海鹽人開採圖説黃氏書目姚思仁著清糧臆説嘉禾徴獻録陸長庚元白著平湖人留儲志二卷黃氏書目余懋學著仁政活民書二卷書録解題會稽丁鋭集乾道賑濟録又戶口田制貢賦書又乾道新書𢎞治紹興府志程迥著江東荒政録嘉靖寧波府志袁甫著墾荒兆行又救荒策書檇李往哲續編陳龍正輯文武學則黃氏書目胡拱辰著督撫中州學政書七卷黃氏書目鐘化民著湖湘學政一卷黃氏書目蔡潮著臨海人八閩學政記嘉靖寧波府志楊子器著江西學政申言一卷黃氏書目黃汝亨著藥洲學政分省人物考田汝成著學政要録一卷崇禎衢州府志葉秉敬著郴桂治軍雜録又河南分守事宜嘉靖寧波府志楊子器著職官司徒儀一卷隋書經籍志干寶撰注按唐書藝文志作司徒儀五卷新定官品二十卷隋書經籍志梁沈約撰卷按唐書藝文志作十六職官分紀五十卷書録解題富春孫逢吉彥同撰職源五十卷漢官總録十卷書録解題金華王益之行甫著職林二十卷通志藝文略楊侃撰漢官萬厯會稽縣志徐次鐸撰宋朝職略𢎞治開化縣志鄒補之著厯代官制説隆慶平陽縣志陳剛述皇朝宰輔拜罷録一卷續百官公卿表二十卷質疑十卷書録解題永嘉蔡幼學行之撰官制備考二卷黃氏書目李日華著晉軍將佐表又漢官差次考又品級廣考又崇禎大臣年表又卿二表秀水縣志俞汝言著宰輔沿革吾學編謝鐸著直文淵表一卷典銓表一卷焦氏經籍志鄭曉著列卿年表黃氏書目項篤夀著掾史列卿表秀水縣志陳懋仁著金坡遺事三卷郡齋讀書志錢惟演撰麟臺故事五卷郡齋讀書志志程俱撰中興館閣録十卷續十卷書録解題天台陳騤叔進撰翰林學士年表一卷宋史藝文志沈該撰館閣漫録十卷焦氏經籍志張元忭撰館閣類録二十二卷焦氏經籍志呂本撰記按淡生堂書目又有纂修注二卷舊京詞林志六卷焦氏經籍志周應賓撰明翰林志一卷黃氏書目陳沂著瀛洲道古録十四卷秀水朱彛尊著見陳廷敬朱公墓志金鼇退食筆記一卷天祿識餘一卷説鈴錢塘高士竒著吏部職掌八卷淡生堂書目張瀚撰封司典故八卷黃氏書目鄭汝壁撰天官紀事黃氏書目袁祥著刑部志八卷黃氏書目應廷育撰刑部獄志四十卷蕭山縣志來斯行著提刑通要嘉禾徴獻録彭孫貽著齊齋臺諫論二卷書録解題霅川倪思正父撰臺省因話録一卷柏臺雜著一卷書録解題石公弼著留臺雜記八卷黃巖縣志符驗著南京都察院志四十卷秀水縣志徐必達著憲綱規條一卷會稽縣志劉宗周著太常志黃氏書目天順中陳贄修太常志十卷仁和縣志夏時正著南京太常寺志四十卷嘉善沈若霖輯杜士全序太常紀二十二卷內閣書目括蒼呂鳴珂纂輯太常典録六卷鄞縣志屠本畯著光祿寺志四卷焦氏經籍志徐必達撰光祿須知三卷黃氏書目嘉靖中黃宗明編進六科仕籍六卷黃氏書目嘉興周崑官刑科都給事中時輯國子監續志十一卷黃氏書目謝鐸著吳興厯官記三卷湖州刺史記一卷陸羽著見陸文學自傳按羽為寓賢所著若茶經南北人物志江表四姓譜源解占夢等書概不收載厯官記二書以其為吳興掌故故録之凡傳記中有關於浙事者例皆凖此時令月令事紀四卷焦氏經籍志許仲譽撰月令合纂永嘉縣志林占春著北京歲華記一卷尤氏藝文志陸啓浤撰歲時節氣集解一卷黃氏書目洪常著食貨相貝經一卷七録嚴助撰鼎録一卷宋史藝文志虞荔撰雲門石譜三卷夷門廣牘山隂杜綰著石譜一卷尤氏藝文志范長泰著後觀石録一卷西河合集毛竒齡著雲煙過眼録一卷唐宋叢書周密撰續雲煙過眼録一卷寶顔堂祕笈湯垕撰雲煙過眼録嘉禾徴獻録項夢原著續欣賞編十卷歸安茅一相輯清賞録十二卷黃氏書目包衡撰江村銷夏録三卷錢塘髙士竒著右貨寶準齋几漏圖式一卷説郛孫逢吉撰羣物竒制一卷元賞編一卷梅墟别録周履靖著山家清事一卷文房職官圖贊一卷百川書志宋可山林洪龍發著硯譜二卷郡齋讀書志唐詢撰又名東海公硯録硯箋四卷讀書敏求記髙似孫修經籍志作一卷誤硯譜一卷林下盟一卷續説郛古杭沈仕撰十處士傳一卷萬厯嘉善縣志支立撰十影君傳一卷尤氏藝文志支庭訓著廣古竒器録二卷黃氏書目徐象梅著古器具名二卷古器總一卷黃氏書目胡文煥著漢晉印章圖譜一卷焦氏經籍志王厚之撰印史二卷續文獻通考趙孟俯撰古印史一卷吳福孫著見黃潛吳君墓志古人印式二卷吾邱衍著見學古編名劍記一卷續説郛括蒼李承勛撰香奩一卷尤氏藝文志屠本畯撰右器用醉鄉日月三卷宋史藝文志皇甫松撰酒譜一卷韋孟酒乘臨安徐炬撰酒譜一卷宋史藝文志葛灃撰煮泉小品一卷寶顔堂祕笈田藝蘅撰茗笈三卷黃氏書目屠本畯著茶箋一卷續説郛四明聞龍撰茶解一卷續説郛古鄞羅廩撰右酒茗坡公食飲録二卷黃氏書目孫礦著飲食集十卷錢塘于彰暗之著續易牙遺意一卷湯品一卷夷門廣牘周履靖著右食經忘懷録二卷郡齋讀書志元豐中夢溪丈人撰或云沈括也焦氏經籍志飲食器用種藝之方全芳偹祖前集二十七卷後集三十一卷黃氏書目陳景沂著天台人寶祐元年韓境序灌園史四卷秀水縣志陳詩教著山居四要嚴陵志元汪汝懋著字以敬淳安人三徑怡間録二卷黃氏書目髙濓著花史左編二十四卷檇李王路仲遵輯天啓元年李日華序海棠譜三卷百川書目宋錢塘陳思編筍譜二卷文獻通考釋贊寧撰花木韻譜一卷富陽縣志王之獻著茹草編四卷菊譜一卷尤氏藝文志周履靖撰閩中荔枝通譜八卷黃氏書目屠本畯著續牡丹譜一卷嘉禾徴獻録李芳著字叔承嘉興人瓊花考一卷讀書敏求記成化丁未四明楊端木輯芋記一卷尤氏藝文志楊德周撰盆史一卷尤氏藝文志屠本畯撰右種藝與物傳一卷尤氏藝文志王文祿撰小化書二卷嘉禾徴獻録談貞默