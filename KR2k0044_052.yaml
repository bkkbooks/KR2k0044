body:
  text: 浙江通志卷五十三水利二杭州府下仁和縣城外河道上塘外沙河自草橋門北繞城東過永昌壩至蔡湖橋北達菜市門外河沿城轉西過東復過西轉北至徳勝橋與上塘運河水合唐書地理志咸通二年刺史崔彦曾開咸淳臨安志潮水衝擊錢塘江岸奔逸入城勢莫能禦開三沙河以決之曰外沙中沙裏沙宋政和元年郡守張閣表識其處近南有壩成化杭州府志今遺跡俱無存謹按沙河成化杭州府志載入錢塘今查三沙河首尾俱在仁和縣故改入仁和前沙河在菜市門外東南接外沙河北達後沙河咸淳臨安志蘇軾嘗於此督役開湯村運鹽河後沙河在艮山門外壩子橋北蔡官人塘河在艮山門外九里松塘東由姚陡門通何店湯鎮赭山赤岸河在赤岸之南自運河入港通髙塘横塘諸河去城東北三十五里施何村河在桐扣山水達堰東去城東北四十五里方興河在臨平鎮東去城東北六十里東通海寧縣長安壩謹按赤岸河施何村河方興河皆南宋時運河也其名雖殊實一道耳凡舟由蘇州嘉興而來者過長安壩從方興河入艮山水門抵斷河而止上塘河在艮山門外成化杭州府志自徳勝橋東至長安壩又東抵海寧城百有餘里一帶土田水利俱賴此河嵗久河不開濬沙壅漸髙而隔塘諸筧低入河底每為走洩天稍無雨水即涸竭苖槁無濟舟阻不行明天順間知府胡濬以郎暹言同知縣周博起夫開濬旱乾獲利舟行通便國朝雍正五年巡撫臣李衛委杭防同知馬日炳動支海寧縣邑紳陳邦彦捐輸銀開濬自艮山門外施家橋起施家堰止計七千七百九十九丈下塘河在武林水門外經清湖閘入運河國朝雍正五年巡撫臣李衛委分司徐有緯動支帑銀開濬自驛橋起至清湖閘計三百二丈新開運河在武林門外北新橋之北通蘇湖常秀等河宋史河渠志浙西運河自臨安府北郭務至鎮江江口牐六百四十一里淳熙十一年臣僚言運河之濬自北闗至秀州杉青各有牐堰自可瀦水惟沿河上塘有小堰數處積久低陷無以防遏水勢當時加修治兼沿河下岸涇港極多其水入長水塘海鹽塘華亭塘由六里堰下私港散漫悉入江湖以私港深運河淺也若修固運河下岸一帶涇港自無走洩上以為然十四年七月不雨臣僚言奉口至北新橋三十六里宜開濬從之咸淳臨安志淳祐七年夏大旱運河乾涸安撫趙與􅊸奏請開掘修築塘路一自北新橋至狗葬開闊三丈深四尺一自狗葬至奉口開濶一丈趙與􅊸請開河奏勘得臨安府客旅船隻經由下塘係有二路一自東遷至北新橋今已斷流米船不通一自徳清沿溪入奉口至北新橋間有積水去處亦皆斷續每未一石歩擔費幾十餘千米價之増實由於此若不急行開浚事闗利害今委官相視見得自奉口至梁渚僅有一線之脈止可載十餘石米舟自梁渚至北新橋則皆乾涸不可行舟共三十六里計五千五百三十九丈五尺除已雇募鄉夫差委官屬分段開掘外又契勘塘岸一帶多係久失修築日漸隳坍縴路狹窄艱於行舟今就此河掘令深闊幫築塘路庶幾水陸皆有利濟實一舉而兩得成化杭州府志元至正末張氏軍船往來蘇杭以舊河為狹復自五林港口開浚至北新橋又直至江漲橋廣二十餘丈遂成大河因名新開運河國朝康熙四十七年巡撫王然奉㫖重濬自一都十五啚登雲橋起至泥壩内戚家橋止計三百九十丈二都十一啚柴公橋起至南石橋内張家浜止計一百二十丈二都十五啚駝子橋起至北石橋止計三百四十丈三都七啚石灰橋起至禮佛橋内謝家浜止計一百七十丈四都七啚義橋起至治平寺内河港口止計一百八十丈又五杭橋東太平橋港凡一百一十五丈俱挑濬深濶宦塘河去城西北三十五里南接北新江漲橋河北達奉口河咸淳臨安志淳祐七年旱安撫趙與􅊸開濬奉口河去城西北四十五里抵徳清縣界國朝雍正七年總督臣李衛動給帑銀一千三百有竒委員開濬臨平湖在縣東長樂鄉往時周四十里溉田三百餘頃唐後湖日淤近多廢為桑田魚池僅存小河謹按陳善府志曰仁和之水其河渠之大者有三曰上塘曰下塘曰宦塘上塘自艮山門迄長安壩下塘自北闗迄大麻村宦塘自髙橋迄奉口洪流鉅浸分為支河者無算旁近之田仰以給溉潤焉下塘上塘髙下相去七八尺以一塘為隔上恒苦旱下恒苦澇故置筧閘以為蓄洩而一郡之田皆成沃土云五里塘在艮山門外五里舊尉司衙側走馬塘在艮山菜市門外謝家塘在菜市門外一里菜市塘在菜市門外三里土塘一在菜市門外十二里宋殿司右軍教塲之側一在團圍頭石塘北月塘在艮山門外沈家塘在縣北二十五里宦河塘在北新橋之北接連運河大塘長三十六里其西又有一塘曰西塘袤十八里直抵安溪宋淳祐七年安撫趙與􅊸修築西塘頽圯亦加築治大雲寺灣塘在五都二啚國朝雍正七年總督臣李衛動給帑銀四百兩委員重修運河下塘自北新橋北直抵石門縣界横亘九十餘里其地有三里漾十二里漾蘆葦水濼無塘遮護遂為盗藪正統七年通判易輗條上利害巡撫侍郎周忱相度便宜修築塘岸一萬三千二百七十二丈四尺橋七十二座水陸國朝並行便於漕餉劉兆麒廵撫范承謨以是塘河路康熙九年總督利濟攸闗遂酌議興工計水闕共一千三百六十三丈每丈工料八兩坍塌石塘共四千二百九十五丈每丈工料四兩七錢無石塘路共一千二百二十五丈每丈工料五兩約需銀四萬兩是時督撫布按捐俸紳士義民樂輸委耆民施國賢董其事厯一載築成石塘四千三百八十三丈橋六百二十三洞雖以工費不繼未及竣工然往來利渉漕艘通行商民稱便焉雍正七年總督臣李衛動給帑銀八百六十兩有竒委知縣王廷藩縣丞于平修築北新闗外一帶塘岸永和塘在永和鄉當仁和海寧二縣之間俗謂之三里險即白龍潭也宋紹定己丑邑士范武捐財以助修築塘成嵗無水患邑宰范光名曰永和隄許應龍永和隄記運河有塘衣帶浙水綿亘千餘里闗提封者六州帶主管者十縣仁和首當其一郵遞輦運憧憧旁午惟永和隄阻鼎湖白龍潭之險卯風湍流夤夕鼓蕩一有綫溜則膏腴數百頃瞬刻就浸繄欲經久不擾是豈一日一人之力哉邑有范任二君倡為義役乃悉心討究謂土力屢潰於成也於是率衆僦工築以石樁以松迄成二百五十丈為錢數千緡范君為費獨當什五董視犒賚尤詳焉傍築道茂菴給伏臘俾早晏廵徼事無遺慮整如也肇始於紹定己丑之春告成於是嵗良月之望隄成請記顛末裏沙河堰在武林門外上堰在小北門外下堰在餘杭橋側雋家堰在沈塘灣去城東北一十八里金家堰在臯亭舖去城東北二十五里湯家堰在臨平鎮西北十里梅潭堰在臨平鎮中舊名梅潭壩費仁堰在臨平鎮東二里蓮花舖左俗稱費兒堰呉家堰在臨平鎮東三里永和塘去城東北四十五里施家堰在臨平鎮東四里舊名施家壩永昌壩在永昌門外通錢塘江明洪武二年建會安壩在艮山門外洪武五年建猪圏壩在武林門外陸家塲洪武三年建徳勝壩在城東北五里夾城巷内洪武五年建石灰壩在徳勝橋東雋家壩在沈塘灣東去城東北二十五里周家壩近華橋宅前壩近北荘胡家壩在施家壩東五里車前壩近餘慶橋毛家壩八道壩俱近超山諸家壩在呉下村葉家壩在戴家橋北范家壩薛家壩戴家壩俱在東北區徳勝閘在徳勝壩雋堰閘在雋堰壩臨平閘在臨平鎮三閘俱在運河官塘一帶潦漲河溢皆由此洩入下塘明天順間知府胡濬重修國朝康熙十年士民郭定生等以諸閘為土豪阻塞具呈督撫令如舊開濬修築上下塘均受其利小林大閘在仁和縣十五都十七都東西界間閘莫詳所始以運河塘下髙田不與下塘河接旱無車灌置此蓄洩隔塘白洋石目二筧下流其為塘下髙田之利最溥年久坍圯明天順間知府胡濬知縣周博重建一鄉蒙利溉田數千清凉閘在艮山門外臨江八啚清凉橋國朝雍正七年總督臣李衛委仁和知縣董怡曽重修柳林閘在武林門外鳳口陡門閘在縣西北奉口勞家陡門閘在縣西北勞家村唐涇陡門閘在縣西北唐涇小林閘一名元鎮閘在小林臨平湖四閘在臨平鎮東南五里南陡門閘在武林門北里半北陡門閘在武林門外二里潘公閘在臨平鎮東龍興橋西娑婆閘在呉家堰東雋堰西筧李王塘筧金家堰筧石目舖筧白洋筧馮家筧俱在運河官塘一帶曹家渠河底石筧在臨平鎮西西茅橋甃石於運河之下以洩曹家渠之水暗注於下河以上七筧不知建自何代宋元間屢修明天順間知府胡濬相度筧門太低者重砌令髙其檢水閘圮者重修令民以時啟閉崇禎十四年大旱諸閘筧俱髙不能洩水當事議去運河底石洩水至下河可救田數十頃比洩水後石縫不能合多方彌綸水終漏下里人陶子昻獻䇿截運河兩邊水戽乾以猪肝雜瓦灰搗爛合石縫不半日而石底如故至今猶堅固也海寧縣縣市河在縣城内北通二十五里塘河自城北拱辰水門入東南經勝安橋透安戍水門會淡塘河萬厯杭州府志隆慶六年十月重濬呉遵重濬市河記海寧縣市河者郭内之通渠也其源出西湖達二十五里塘河自城北拱辰門入東達春熙西達安戍二水門舟楫往來脈絡條惕豈惟利商賈通貿易而一邑之文運實闗焉宋元迨今日就堙塞嘉靖己酉縣尹廉泉髙侯嘗一治之未幾島夷蹂躙中外戒嚴盡塞諸水門以杜奸萌小民並縁侵竊河遂成周行邑中市井蕭疎科第稀曠民病久矣隆慶壬申三月廉訪少浦徐公按部至邑諸生以請公毅然曰地運之繫河渠猶血脈之周營衛一日閼遏斯病矣矧兹渠利厚且廣而今梗之是誠予責也乃下教曰周官川衡掌巡川澤之禁令而平其守凡犯禁者執而誅罰之兹渠之便實由於民茍繩以周法則民大者流小者刑殆将弗堪其議舍所罰而令各分工任事興利除疾固民所樂趨也檄文月至踰數百里外無忘昕夕迺命丞崔穎經其北朱廷芳理其東典史戴中疏其西覈驗成績長吏以時督察之於是縣尹良禎余侯供命惟謹丞若尉咸事其事均勞祗役善崩者甃以堅石既固者仍其宿址濬深一丈四尺廣加深十之二余侯復捐俸新三水門凡數閲月而竣事居者寧宇行者比舟士忭民懽相與伐石徵言為記國朝順治十年知縣秦嘉系重濬秦嘉系重濬市河記市河之源首自西湖達於二十五里塘河自拱辰水門入遶城東經勝安橋過安戌水門西出會淡塘河宋元間縣東有賦亭驛舟楫往來元末移驛長安併作水驛自此河漸堙塞後因市房稠密始而架閣後漸填砌石岸僣塞官河城水不通嘉靖間令蔡完稍為開濬經今百餘年泥沙壅塞地脈阻絶今力行開濬興復舊制使城市之水瀠洄流遶工始於順治十年十月甫越月而告成雍正七年總督臣李衛委湖州知府呉簡民開濬自拱辰門起至安戍門止可通舟楫淡塘河在縣西北二百歩其派自錢塘來東抵縣城壕西則堙塞北通運塘河二十五里塘河自拱辰水門透西南二十五里會於運河而達長安壩宋史河渠志淳熙二年兩浙漕臣趙磻老言長安牐至許村一帶漕河淺澁請出錢米發兩岸人戸出力開濬從之國朝康熙十四年知縣許三禮重濬許三禮濬河記余癸丑冬抄來牧海昌適值河流淺涸舟楫難施未幾告竭詢及里中父老僉曰寧處省會之東地獨髙阜河道淺狹旱易乾澇易溢民間苦此甚久乙卯冬躬率分委萃力鳩工自宣徳門外開起東至袁花北至郭溪止丙辰秋又開自拱辰門起北至長安西至許村止民情鼓舞告厥成功今積雨不灾久旱不涸由是溯中塘窮六十里河源相薛家壩址開其壅塞轉西安戍門外淡塘又轉拱辰