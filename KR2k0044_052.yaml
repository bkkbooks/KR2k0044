天宕北至大佛山源流浩浩故厚築安禾支下壩以殺水勢共溉田一千餘畝苐安禾之壩無虞惟支下壩久為積水所壊明萬厯時令喻效龍親詣本所督令得水之民量田出費捐助無礙官帑下砌以石上築以土遂免旱澇之患徐岱閘在惠愛里塔堰閘詳見塔堰孫浦閘在太平望仙二里胡公閘在縣南臨江明天順間杭州知府胡濬置餘杭縣南渠河在縣南一里餘杭塘河在縣東南三里詳見錢塘南上湖在縣南五里塘髙一丈四尺上下各廣二丈五尺周迴三十二里二十八歩與下湖相接南下湖在縣西二里塘髙一丈四尺廣一丈五尺下廣二丈五尺周迴三十四里一百八十一歩水經注縣後谿南大塘陳渾立以防水在後漢熹平二年咸淳臨安志陳渾開湖溉公私田一千餘頃唐書地理志寳厯中令歸珧因陳渾故迹置又築甬道通西北大路髙廣徑直百餘里行旅無山水之患咸淳臨安志熙寧中因水衝激㟁漸低紹聖中縣令李元弼率民築増三尺州又差捍江兵士及濠寨官助之塘漏則以藁為箔捍護慶厯以後不復修治遂致堙塞又南湖東南嶽廟側有石櫺橋五畝塍二處皆陳渾遺蹟昔湖水深低則引兩湖之水由此入安樂鄉其塍上下各濶丈餘後湖堙塞民侵湖成田梅月連雨必苦大浸欲其快於流洩於是塍與橋弗修宣和中知縣江袠躬訪利害紹復前蹟陳無玷開湖記苕水發源天目經兩郡六邑以入於具區六邑者二當天目之麓山隘地髙水經三邑處其下流水勢奔放不可為力餘杭界其間襟帶山川地勢平徹當苕水之衝洪流嵗常一再至久雨或數至倐忽瀰漫髙處二丈許然不三日輒平其為患雖亟除而難卒以禦也故隄防之設比他邑為重餘杭之人視水如寇盜隄防如城郭旁郡視餘杭捍蔽如精兵所聚控扼之地也東漢熹平中陳公為是邑始築南湖以為水瀦並溪者曰南下湖環三十四里並山者曰南上湖環三十三里洪流從髙赴卑其勢悍甚得所謂石門函者則折而滙於湖既就寛平其暴必殺溪流紆餘徐引而東湖之水洩於南渠河河流而東接東溪五福渠之水以入於呉興其派别而北者為黄母港十二里與苕溪㑹於其㑹處節以石埭曰西函溪流方漲則閉以固東鄉之田竢其稍落則啟函以走渠港之潦下田函乾水不儲浸若旱暵亦開函以灌溉膏腴千頃餘無水旱號為沃壤衣食萬室出賦輸公無慮萬斛而計其為旁利又倍蓰也其為塘㟁規模甚工得周官善防之意厯年寖逺溪湖皆髙隄堰傾圮水或逆行漂没廬舍西函既自疎罅守者貪賂竊開以度舟水因大至官趨救目前遽塞之以弭患自函之塞十嵗九潦民日以困土脈沮洳殆成棄地今大夫江公以宣和四年來臨此民屬兵火之餘眎民瘠甚為之惻然思所以振之者徧諏耆老得溪湖利病甚詳民以厭患於闕防來告大夫乃以是年冬度工賦事民歡趨之始闕西函次五畝塍次縁湖之㟁當溪之衝者曰紫陽灘尹家塘次護郊之隄曰中隔塘次縁溪之㟁當西函之左右者西踰明星瀆東接廟灣之塘次上湖可洩者渠河受水處曰石櫺橋次縁溪之㟁當石門之左者曰閑林塘南㟁皆全矣凡北㟁之塘與南對修西北之外曰五里塘西山之横隴當溪之衝者曰龜邊塘及東鄉之外盡十四壩之塘一皆圓治於是決渠之岸無偏强之患其下流逺近與錢塘接境之田犬牙綺錯而塘在吾邑者曰廟灣曰許家壩曰菱蕩曰塘口曰蜃潭曰化灣與其西岸石瀨曹橋之間十餘壩之岸亦皆増葺凡隄防之設西函最為鉅大夫躬勸相撫循之以迄役凡函之制堅厚精密經始十二月甲寅落成於明年三月己巳其髙七仞其厚一百三十丈兩涯横敞其中開閉處小陿從陿度敞去相尋有半加膚寸焉故石之工九百九十役庸萬有六千三百用緡錢四十三萬皆函之氓計畝樂輸足用無贏不愆於素自餘隄防由東塘而上分委邑佐董之各因其地之民故役不勞而功並集由廟灣而下則因其塘長而語之靡不聽令併力以趨洎成如期若五畝塍者他時蓋為防今不盡復水無所趨齧中隔塘闕為城邑病故今五畝塍之制其髙下僅可隱人其長止四百九十五尺其北田岸漸髙屬於山足者凡五百尺下於塍尺許皆空不築湖水過五尺則般塍北空處以流過六尺則般塍以流水之留塍下止五尺溪流平則五尺之水復自石門函還納於溪西湖水般塍者勢緩不為東郡及南渠河病無玷承公命直書其事俾後有考宣和五年四月朔記萬厯杭州府志紹熙甲寅畿漕黄黼重修徐安國重修南湖塘記紹熙五年秋八月霖潦不止洪發天目諸山倐忽水髙二丈許衝決塘岸百餘所漂沒室屋千五百餘家適侍御黄公黼弭節畿漕悼湖塘之廢重為三州六邑之害鋭意興復力請於上取棄地於馬監發陳粟於豐儲出錢幣於漕庫闗器用於殿司揆時庀徒悉募饑民羸者以畚壯者以築日役數千人所活甚衆填築敗岸幫廣舊隄列木以捍基編竹以簣土増髙既隆於舊横敞復袤於前環視上下兩湖數十里間如連岡之隱起堅壁之横亘邑既籍定民可耕殖復以溪塘環繞一邑補治如初獨閑林塘附湖當溪水之衝隨築隨隳迺去其激水之平陸以實敗岸之罅隙沿舊隄幫築其址益厚綿五十餘丈工以夫計二十萬四千二百二十有四錢以緡計二萬八千二百九十有二米以石計六千六百一十有六經始以是年十月九日至慶元二年正月二十四日訖事邑令周章董工役簿吕大勲主錢榖丞鄭昌時徐夀卿尉胡輔之佐其事漕屬李耆明葉時兼護之始終盡瘁焉嘉靖浙江通志元至正十三年餘杭尹常野先増築南湖塘又増築縣西官塘十八里成化杭州府志明永樂二年戸部尚書夏元吉増築濶厚以防水患萬厯杭州府志正徳十三年十二月提督蘇杭水利河道工部郎中朱袞築南湖餘杭縣志萬厯三十七年重濬竪碑八座以三官廟為東界下鳳山為