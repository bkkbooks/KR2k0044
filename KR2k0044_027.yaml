body:
  text: 浙江通志卷二十八學校四書院附金華府金華府儒學在府治西嘉靖浙江通志宋初在縣東慶厯間知州關詠徙子城外熙寧間知州蘇頌徙子城内西南大觀二年校官葉夣得徙今所又請司理院及竹木場地廣之元皇慶間兵燬憲臣敬儼楊友直相繼修復明一綂志洪武初重建金華府志明太祖取婺州改寧越府命知府王宗顯開郡學延儒士葉儀宋濂為五經師戴良為學正吳沈徐原等為訓導時䘮亂學廢至是始聞絃誦之聲萬厯金華府志正綂二年燬知府蔣勸重建錢習禮為記成化中知府周宗智𢎞治中知府韓燾加葺國朝順治三年燬五年知府張安豫重建自為記康熈五年知府吳翀十七年知府張藎相繼重修雍正九年知府馬日炳濬泮池圍以石欄重修櫺星門射圃名宦祠祀丁潭以下四十六人鄉賢祠祀顔烏以下一百十三人麗澤書院在旌孝門外嘉靖金華縣志宋吕成公作書堂於城西覩前二湖悅焉取易兊象之義以麗澤名及卒鄉人為祠宇以祭淳祐間郡守許應龍建於雙溪之滸咸淳間徙今所元至元間重建明成化間僉事辛訪令郡守李嗣重建祀晦菴南軒東萊三先生正學書院在旌孝門外金華縣志元浙江行省建祀郡儒何基王柏金履祥許謙明成化十四年僉事辛訪奏請特額郡守李嗣重建萬厯元年増入章懋稱五賢祠崇禎十六年燬麗正書院在府治西北雍正四年知府張坦讓即金衢嚴道故基建中奉朱文公吕成公張宣公并何王金許四先生為七賢祠前設講堂列齋左右以為書院金華縣儒學在光孝觀址嘉靖浙江通志宋以前附於府學嘉靖金華縣志元至元十三年始創於醋坊嶺大徳三年㢘訪副使髙伯元改建於夏塘萬歴金華府志皇慶元年燬泰定四年憲司經歴袁永澄以門北向遷明初燬同知潘廷堅知縣王興宗重建永樂甲辰復燬知縣郭瑛建楊士竒為記天順間知縣林恂修林文為記正徳壬申知縣李玘修章懋金華縣儒學記正徳己巳玉山李侯玘謁廟視學將圯喟然太息有志修葺而两值艱嵗費無所出乃銖積公用之餘至於壬申之春始克興事其文廟若西廡若兩齋則易其朽敗新其漫漶而增飾之惟東廡及講堂頽圯已甚乃重作焉堂東西作為廨舎以居其師齋後則為米廩以食其士又於堂後建閣以藏經籍其下為栖士之室而四圍有廂且濬渠引流於其前以絶囂塵而來清泚因名其閣曰清源使諸生講肄之餘於是而玩適焉侯亦時之學與諸生討論經義商𣙜古今視其所學而勸勵程督焉金華在昔碩儒名公輩出道學若東萊兄弟與何王金許諸賢著述傳於後世學行氣節若潘黙成勲業若鄭忠愍讜言善政若王莊敏煥章兄弟若王忠簡端明父子皆聲實卓乎當時非其學之為巳而清明在躬者能若是乎邑人君子來逰於是者因其作新之機勵其景行之志奮然從事於為己之學使先正之氣脉於是乎益昌天下國家將有賴焉嘉靖十七年同知蕭𢎞魯知縣姚資修三十六年知縣顧曾唯廣其址而重新之姜良翰為記萬歴金華縣志萬歴間邑令汪可受得光孝觀址遷建後知縣熊鳴夏買民居廓之陸可教金華縣學記吾郡附郭之邑自建學以來士之自奮者踵相接盖起家為賢公卿以風節事功名世者若而人矣而邇嵗不無少讓於前或曰學地褊且庳又左壓於方岳大吏之分省斯其故歟於是前令汪君可受度地得光孝觀負隂抱陽博大􅐩塏實稱絃誦之區遂撤而徙之而門巷迂曲民居前屏市雜喧囂多士出入頗病之今令熊君鳴夏治邑逾四年乃盡裒公私之積市民居撤之繚以周垣中通直道前為傑閣顔曰聚奎内為泮池縱廣若干尺先是觀後有聖覽亭易為尊經閣南北屼然對峙景行在望前眺雙溪瀠洄如帶遶郡城而西注焉多士出入逰息於斯其必有勃然而動惕然而思曠若發䝉者矣四十四年知縣解學龍重修葉官為記國朝順治十年知縣王世功康熙十七年知縣王治國教諭鄭濂訓導沈麟趾重修王治國自為記射圃名宦祠祀王興宗以下五人鄉賢祠祀潘良貴以下三十一人社學四所圯北山書院在盤溪上續文獻通考宋末為何基立山橋書堂在縣治北金華府志宋王埜建圯蘭谿縣儒學在縣治東嘉靖浙江通志宋崇寧間建萬歴金華府志紹興間知縣柴􅌧重建咸淳庚午知縣薛至增修元陞州學至治初知州爪爾佳蘇爾哈圖增拓之吴師道重新蘭谿州學記蘭谿升縣為州餘二十年任守牧者襲有興作神祠之侈醫宇之崇官舎亭傳之新咸出意相勝獨學宫在城東因舊制卑陋日就圯朝廷右文開科風厲鼔舞是宜在所急而曽無一人顧省者豈所謂徂知本哉至治元年知州爪爾佳侯銳意改作歴夏秋中外告功殿庭門堂齋廡視舊咸闢周垣夾廡官署庖庾實昉於今嚴嚴翼翼始肅其觀未幾去官事遂格今知州崔侯雲翼慨然葺其緒補其缺飾其所未及而州判王君淮復賛助而督之既底績職教者朱天富來請文謂爪爾佳侯能新之於數月之間而六年之後得崔侯乃完二侯之功皆宜書也既直紀其事而復為之說曰天下事後出者必有加於前而俗之趨下者常莫能挽而歸於古安宅廣居人孰無之博厚髙明可以自致如使宏其宫而人之𦕈新其室而習之汚則賢州侯之意荒矣故愚願以諗於衆庶其逰居周旋仰瞻俯察警悚振飭思所以稱是而度越於前人哉明復縣學永樂中知縣宋哲趙克寛繼作天順後則知縣王魯唐韶劉恩又拓而新焉正徳蘭谿縣志正徳二年知縣蘇琰作泮橋明年知縣許完教諭段濂遷學門蘭谿縣志正徳十五年郡倅趙天定掌縣事重修大成殿知縣錢炯踵成之章懋為記國朝順治十二年知縣張浩教諭章一奎訓導王萬彦重修朱之錫為記射圃在明倫堂西後改為啟聖祠名宦祠祀洪少卿以下二十一人鄉賢祠祀楊與立以下六十五人社學圯仁山書院在縣西天福山上萬歴金華府志在仁山下金仁山先生建何文定公書其扁曰仁山書堂學者於是受業焉後移建天福山董遵為記重樂書院在縣西十里金華府志宋葉克誠先生延仁山先生講學處瀫東書院在縣南鸕鷀塢續文獻通考宋葉誕讀書所齊芳書院在住竿山之陽續文獻通考元唐良驥延金仁山講學於此東陽縣儒學在縣治東南明一統志宋慶歴間建萬歴金華府志皇祐元年知縣鮑安上作大成殿明倫堂毛維瞻東陽縣學記慶歴初詔郡縣立學天下丕變幾至於道獨此邑雖有夫子廟隳落卑隘上露星日使民無所瞻仰明府鮑公至慼焉病之謂其寮曰豐屋疎堂非道之强窮檐陋巷非道之䘮宫室之奢儉於聖人之道吾未見毫髮損益雖然豈治朝尊嚮儒術之意耶將圖再新實惜民費㑹邑豪之義者請入金以畢其構俟成願遣子弟舎其中從大夫學焉鮑公然其謀經始有期且患舊址迫狹遂闢東南官圃以廣之役興於戊子夏訖於己丑而成既乃裒羡緡撰祭噐以給春秋釋奠之用置經史諸子百氏之書以補弦誦之闕廟成民悅父督其子兄携其弟咸執經北面而請嗚呼學所由興矣治所由適矣公政之暇尚考典禮羣肄於廟宫使民觀之而化致此邑為禮遜之國鮑公其知政之本與淳熙六年知縣王袂作藏書閣後知縣趙與更造堂齋及先賢祠元至元二十七年按察副使王俁新之嗣是縣尹郭瑛任謙許思忠趙鉉迭為修建黄溍為記明永樂二年知縣詹奎彰增修成化十五年知縣繆樗又增之嘉靖浙江通志嘉靖四年知縣李邦直毁老君堂闢神道導南山水入泮池東陽縣志嘉靖四十五年知縣陳應春建名宦鄉賢祠隆慶間知縣鄭凖更新之萬歴三十三年知縣郭一鶚重修崇禎十二年教諭劉振之訓導彭如翺重修國朝順治六年知縣潘士璜訓導金英重修十七年庠生吳良栻等建明倫堂學門康熙二年復建先師廟及兩廡修啟聖祠十年庠生李元毅修㦸門十七年知縣胡啟甲重修先師廟十九年知縣俞允撰成之并建名宦鄉賢祠趙行撰文廟記吳從臯為名宦鄉賢祠記射圃在文廟東今為啟聖祠名宦祠祀戴叔倫以下七人鄉賢祠祀斯敦以下五十七人社學在西北隅南園書院在縣東四十五里萬歴金華府志宋蔣友松建聚書三萬餘卷賔碩儒以教其族黨子弟圯石洞書院在縣南六十里萬歴金華府志宋郭欽止建葉適石洞書院記東陽郭君欽止作書院於石洞之下石洞郭氏名山也初洞深複無行徑薪者拾採而已君始以意疏治前阻崖壁衆不知所為欲止君逼視其罅遥聞水聲出空中鑿崖百歩梯級而後進土開谷明俄若異境稍復深入臻於曠平則石之髙翔俯踞而竹堅木瘦皆衣被於其上水之飛湍瀑流而蕉紅蒲綠皆浸灌於其下潭澗之窪衍阿嶺之嵌突以亭以宇可釣可奕巧智所欲集皆不謀而先成君又䕃茂宻以崇其幽植芳妍以絢其陽左右面勢彼此回薄而山之向背曲折隂晴早暮姿態僃矣君甚樂之以為山水之羙千載而潜譬猶趙璧隋珠璞於外而韞於中其一日忽彰何異武陵天台顯於今而閟於昔也既而嘆曰地之偶出於吾廬非私賜余者吾其可自泰將使子孫勤學於斯學其可以專盍使鄉黨之秀並焉於是度為書院禮名士主其學徙家之藏書以實之儲洞之田為書院之食而斥洞之山為書院之山示郭氏不敢有也君既卒諸子修之不廢而請余為記嗟夫郭君逺矣以學易游而不以物樂厚其身以衆合獨而不以地勝私其家也自君之為是至今五十年成之之難傳之之久也游之興廢家之盛裒占焉學之興廢人之盛哀占焉學不待地也螢燈雪屋苟取尺寸而聖賢之業可成矣學以知意為始以盡力為終今夫悉其聰明傳之文字深已造於性命淺亦重於科舉而不能知其意猶為無所始也將何以終之乎君之子孫與其鄉人必勉之使玩雲嵐挹泉瀨心形潔清以始其學而卓異豪傑之材出焉然則學雖不待夫地而地固有待夫學也慶元四年十一月十四日崇正書院在縣東北三里萬歴金華府志知縣吳翰詞建久圮復初書院在縣城南萬歴金華府志知縣趙善政建八華書院在縣西三十五里萬歴金華府志元許文懿公講學之所許彦洪建横城義塾在縣南十五里明一統志宋景定五年邑人蔣沐建延師以訓四方來學之士方逢辰為記元至正間沐四世孫大同重修胡氏義塾在縣治南東陽縣志宋咸淳間邑人胡祐建義烏縣儒學在縣治西南嘉靖浙江通志舊在縣南宋慶歴九年令毛維瞻徙縣東崇寧間徙縣西宣和兵燬紹興八年令張公衮徙縣北萬歴義烏縣志紹熙四年知縣虞汝翼重建大成殿開慶元年令趙必升建明倫堂萬歴金華府志景定二年知縣李補四年知縣林桂發新之元天歴二年逹嚕噶齊特哩遷明倫堂於廟後至正元年逹嚕噶齊特穆爾新廟柳貫為記三年縣尹周自強築杏壇黄溍為記明洪武三年知縣張允誠建廟學二十九年教諭張復祖遷明倫堂於廟西三十三年知縣吳祐修正綂間縣丞劉傑知縣劉同相繼修之正徳十三年御史吳華遷今所自為記嘉靖十四年通判汪昉修胡森為記二十九年知縣汪道昆四十四年同知張書紳重修崇禎義烏縣志萬歴七年知縣范儁修文廟明倫堂創尊經閣二十一年知縣周士英重修國朝順治七年署縣事推官徐振儒建㦸門九年知縣宋雲梯建明倫堂十六年知縣范鼎鉉教諭徐𢎞彰建文廟康熙七年知縣孫家棟教諭譚觀成重建西廡十一年知縣于漣復建啟聖祠并鄉賢名宦二祠射圃在明倫堂東名宦祠祀王允誠以下一十五人鄉賢祠祀顔烏以下三十三人社學九所五雲書院在五雲山下萬歴金華府志元大徳間樓如浚建宋景濂嘗逰學其間圯永康縣儒學在縣治西嘉靖浙江通志宋崇寧間建萬歴金華府志政和四年令周虎臣新之宣和三年宼燬紹興十一年令強友諒重建洪清臣為記寳祐四年方夢玊攝縣拓地更新吳邃重新永康縣學記寳祐四年春方君來攝邑事載見於學顧齋廡仰漏俯濕拜弗容膝慼然曰政有先是者耶朝經暮營若償重負縉紳學士弗勸而集閲月七告厥成又祀邑之先正襄靖樓公炤正惠林公大中文毅陳公亮以致髙山景行之仰揖諸生而策之曰古䴡山秀水腴斯文之符也自胡公則開科於端拱徐公無黨冠南省於皇祐先後以行顯文風日起逮於南渡有迭位樞筦為國柱石者有持崇槖登臺省歴郡麾表表以名節照世者有首唱廷陛抗中原大義為社稷吐氣者其他魁偉傑出磊磊相望固不止三賢而已當乾道淳熙間巨儒元老或自武夷自金華自臨川自永嘉來逰於靈沼蕭寺之下糲食蔬酒累晷浹夕相與講明聖賢之深緒一草一木經其盻矚者猶有光彩聲蹟寖逺風㫖尚存得無潄餘芳叩逸響者乎咸拱手曰敢弗力於是諸生轉相語重請於予願有述也予乃言曰邑大夫遊刃動中窽節日劊千牛無難也然籧廬其身而梀宇厥士可不謂知所先後乎哉䆳嘗聞為學之要不過明辨義利而已孟子指雞鳴而起為學者一大期㑹書謂之幾中庸謂之獨孟子謂之間周子謂之動静未形一也有能存夫静以涵動之所察察夫動以見静之所存一念微差勇鋤勾蔓去其不如舜者就其如舜者庶乎誦詩讀書光昭前哲目溪山而有耀對邑大夫而無慚願吾黨共進焉元至元三年宼燬二十九年縣尹苗廷瑞增修復燬延祐五年監縣沙班重建明洪武三年知縣魏處直宋顒即元之故學葺成之永樂間知縣魏㢘丞歐陽齊復修正綂十四年宼燬知縣孫禮重建成化七年御史劉珂拓尊經閣址𢎞治四年知縣王秩撤齋廡而新之十四年知縣張鳴鳳新廟正徳八年知縣黎鐸新學十四年御史吳華同知張齊新饌堂號舎嘉靖三十年知府陳元珂建仰聖興賢坊永康縣志萬歴二年知縣楊徳學諭盛於唐知縣吳安國重修國朝康熙十一年知縣徐同倫訓導虞輔堯重建二十一年知縣謝雲從重修射圃在縣治東名宦祠祀何炯以下一十四人鄉賢祠祀胡則以下三十五人社學在舊藩司行臺故址龍川書院在縣東六十里龍窟橋萬歴金華府志宋陳亮讀書之所五峰書院在縣東五十里萬歴金華府志宋朱文公吕成公陳龍川舊逰之地嘉靖初邑人應典因為祠以祀三賢知縣洪垣更為書院綠野書院在縣東門外金華府志康熙二十一年知縣謝雲從允士民請為總督武定李文襄公建武義縣儒學在縣治西明一綂志宋崇寧中建嘉靖浙江通志宋初在縣南紹興十四年令陳一鶚徙今所元至元十三年監縣竒塔特蒙古仍徙縣南十六年令韓昌復建今所萬歴金華府志至正間尹隋守中許廣大翁景成相繼新作張樞為記明正綂十四年宼燬時布政使楊瓉居守因新之嘉靖武義縣志成化十六年知縣陳奎建奎星閣廣學基十九年知縣曾祿建射圃號舎𢎞治十一年知縣汪亨毁妙相寺廓之正徳十年知縣胡琇重建明倫堂十四年文廟大新則御史吳華之功也金華府志萬歴元年知縣譚音重建學三十三年知縣張國裳重修自為記射圃在文興橋之南名宦祠祀劉元以下九人鄉賢祠祀徐邦憲以下一十六人社學二所並在城浦江縣儒學在縣治東南萬歴金華府志宋皇祐六年知縣楊洙作廟崇寧中即廟作學嘉靖浙江通志初在縣西南後徙而南宣和七年徙城外萬歴金華府志淳熙十五年知縣鮑祖文主簿葛采新作唐仲友為記嘉定三年復遷縣南今白佛寺址紹定三年知縣李知退復於廟西斥大之葉味道為記端平元年知縣石孝垓嘉熙元年知縣鄭思聰淳祐十年知縣張楩寳祐二年知縣何宗姚景定三年知縣王霖龍咸有修建元大徳九年縣尹蔣恕修至元三年尹林以順更新柳貫重建浦江縣學聖廟記重紀至元元年莆陽林侯以進士得邑以臨於兹謂舊廟規制湫隘進吾黨之士而申儆之曰庠黌之舎在百里間贏一區而汚衊蕞陋若是孰思有以奮起而作興之里有耆士張一寧與松江府教授吳貴孫合辭於侯曰願悉吾力毋煩有司而他若有藉於學者亦相率以其資來相於是作櫺星門於泮池之南徙土祗祠於明倫堂之西而堂亭齋館門廡庖庾無一之不理越明年告成侯之興是役以禮帥人人亦樂從之後之遊乎斯者周旋揖讓乎其間將因其角弓嘉樹之思而有得乎見聖由聖之一機其感發而興起者宜何如耶至正十一年尹蕭文質復新明洪武三年知縣張希顔建造嘉靖浦江縣志永樂九年知縣戴文彬修嘉靖浙江通志正徳七年知縣鄒輗徙今所十一年知縣郭楠繼成之崇禎浦江縣志萬歴十四年知縣張而絅典史鄭騏建明倫堂尊經閣啟聖鄉賢名宦諸祠金華府志萬歴四十三年知縣黎𢎞道重建文廟天啟六年知縣蘇國翰重修崇禎八年知縣吳應台重修尊經閣十一年教諭王徳溥修文廟國朝順治四年知縣韓文明重建聖廟康熙十八年教諭顧爾敏訓導金漸雝重修射圃在東門橋邊名宦祠祀李知退以下二十一人鄉賢祠祀楊璇以下四十一人社學在分司東月泉書院在縣西北二里萬歴金華府志宋政和三年浚泉構亭咸淳間令王霖龍建月泉書堂立朱吕二先生祠於泉亭西北元置書院山長後廢明嘉靖五年知縣毛鳳韶建正堂繪二先生像祀之且令邑庠生肄業其中久圯東明書院在東明山之陽萬歴金華府志宋景濂與其徒方希直講學之所湯溪縣儒學在縣治西嘉靖浙江通志明成化八年知縣宋約建吳寛新建湯溪縣儒學記成化庚寅知金華府南海李侯嗣以湯溪置縣既得請知縣胙城宋君約有事於學校相地於縣治西一里而近曰官山壬辰秋爰興厥功凡為明倫堂東西齋為庖廚為射圃亭若干楹又以學必有廟為大成殿為兩廡為宰牲房若干楹門牆嚴深堦庭髙廣凡所創建舉皆如法又明年而功告完遂選民之俊秀者充其中而置書籍繕器用以為講習之資托予文以為記予惟湯溪縣之新者也湯溪之民民之新者也譬若㓜子然始而訓之以正言示之以正事自然一言一行皆趨於正久之習與性成而終為賢人君子之歸以之出而用於天下國家無弗可者也夫有人民而不能教之與未教而遽責其人皆非也故尤不能無望於為師儒者萬歴金華府志嘉靖四十五年知縣樂金重修唐汝楫為記湯溪縣志萬歴二十七年知縣林雲龍修明倫堂徐用檢為記三十年汪文璧修啟聖祠聚奎亭崇禎十二年知縣羅洪基邑人劉文敬重修國朝康熙三年知縣柯弼十八年知縣陳獻圖二十四年知縣譚國樞四十四年知縣殷式訓四十七年知縣杜光先相繼修射圃在學東名宦祠祀宋約秦延黙二人鄉賢祠祀龍邱萇以下五人社學在縣南衢州府衢州府儒學在府治西嘉靖浙江通志衢自唐建學於今所宋宣和二年兵燬守髙至臨重建髙至臨重建衢州府學記衢之學舎最宏壯依郡山西隅山形如龜四趺盤峙大成殿坐右後趺之南丙向學殿西稍下移向為巽宣和庚子冬方臘竊發陷睦歙杭次年陷婺衢處獨衢遭焚劫尤甚尺椽片瓦蕩然無遺朝廷以至臨有守信復衢效命為守至則招集創餘開瓦礫俾各辨居界公私作茇舎扶持完養累月乃蘇將欲化民成俗教養人材因謀諸衆而士之抱英偉者願共力成之初造大成殿次造堂齋閣及庖湢之所靡不周僃共力之士盧定葉公弼張因吾㸃徐惇禮柴邦憲陸逹虞大一沈術沈鎬徐執剛教授鍾燮實董其成元初又燬至元十五年教授吳安朝為屋廟址之上以祀孔子曰燕居二十一年教授徐夢龍建廟廡方逢辰重建衢州府儒學記教授徐君夢龍以癸未秋來蒞學事明年乃興作整刷廟前為軒庭四楹為大門八楹又明年作兩廡東西各十有四楹即燕居為講堂堂之東西挾以齋舎各三楹外為櫺星門周為垣墉丁亥訖事諸生於是請記予惟學校三綱四維之所自出所以維持人理以撐柱天地者也故其選任至重今之祿仕者率以為冷曹而舎之徐君挾其英華果銳之才足以行其志然不以用之他曹而求自試於斯文之地此其所見已拔出流輩今以三年之勤卒能易榛葬而宫牆之厥功隽矣哉大徳八年通判帕克台羅丹修廟學鄭鳴鳳為記衢州府志延祐七年治中訥古伯修洪焱祖為記至正六年總管白景亮重修明年同知崔思誠成之鄭汝厚為記明一綂志洪武初重修𢎞治衢州府志正綂三年同知張琛重建大成殿十二年知府白琮建號房十四年同知彭瑛建觀徳亭衢州府志景泰七年知府王髙天順六年知府唐瑜相繼成之吳錫為記成化十九年知府李汝嘉重修章懋為記嘉靖十年知府李遂改建明年推官劉起宗成之三十九年知府楊凖隆慶三年知府湯仰修萬歴五年知府陳澗修建明倫堂趙鏜為記三十四年同知朱朝望改建金學曽改建衢州府儒學記郡學自唐歴宋廟貌如昨嘉靖中克齋李公來守是郡議稍迤而右以迎江常二水之合尋以選擢行嗣公者失公之意改西向迄今近七十年使吾夫子背辰向夕光景不耀萬歴甲辰朱公朝望丞於衢下車謁廟憬然曰向陽明背幽關制爾乃易南而西堂髙而廟下可乎集卿大夫士庶耆老肇舉遷改鳩工集材不踰時獲貞珉二焉一即唐李公重新郡學碑記一即𢎞治乙卯太守饒公所撰諸鄉賢行略越旬廟貌崇矗丹碧黝堊煥然一新再越旬兩廡就堂齋飭泮池漣漪重門平直登髙眺逺浮流襟帶可俯而挹也四十四年推官荆茂實修徐可求為記天啟五年知府舒崇功重修崇禎元年知府蔡三復成之汪慶百為記十四年知府張文達重修明倫堂造尊經閣國朝順治七年兵道李際期知府韓養醇重修徐應秋為記十七年知府袁國梓修余恂為記康熙三年推官孫魯十年守道梁萬䙫三十三年知府王文錦三十六年知府張濬先後繼修四十七年知府楊廷望重建車徳輔為記射圃在明倫堂東今改為崇聖祠名宦祠祀江逌以下二百七人鄉賢祠祀徐安貞以下三十六人柯山書院在爛柯山右𢎞治衢州府志宋宣和間郡人毛友子幵鄭可簡子待問隠居不仕築室梅巖扁曰梅巖精舎郡人徐霖仕於朝道不合歸隠著書郡守游鈞建柯山精舎延霖開講士友羣集景定壬戍郡守謝奕中復請衍聖公孫孔元龍為山長後燬於宼丁丑山長徐天俊重建明年改為柯山書院衢州府志景定間徐囊以監察御史辭祿養親率衆重興久圯清獻書院在拱辰門外二里續文獻通考宋咸淳中郡守陳䝉請於朝即趙抃故居立書院因以抃謚扁焉西安縣志明天順三年參議髙某郡守唐瑜重建成化間郡守李汝嘉增修𢎞治己未郡守沈杰立祠主祭後祠遷於城北書院遂廢衢麓講舎在郡治北衢州府志明嘉靖戊戍李遂來守率六庠諸生發明心學聯以講㑹士民欲承公教構講舎孔氏家廟在郡城南明一綂志宣聖四十八代孫襲封衍聖公端友從宋髙宗南渡賜居衢州紹興六年詔權以衢州學為家廟宋史髙宗紀紹興八年賜衍聖公孔玠衢州田五頃奉先聖祠事𢎞治衢州府志寳祐乙卯郡守孫子秀請於朝建廟城北菱湖之上後燬遷城南衢州府志明永樂初禮部尚書胡濙奏遷廟於郡城崇文坊𢎞治初知府張俊重修羅璟為記嘉靖浙江通志𢎞治十八年知府沈杰請官其嫡孫世一人為五經博士主祀事正徳十五年巡按御史唐鳳儀疏徙府治後即故縣學址為之謝遷為記博士嵗率其族祭薦如曲阜國朝康熙二十一年總督李之芳重修李之芳重修孔氏家廟記自唐開元後郡邑皆立孔子廟嵗時奉祀至於今不廢而為孔氏家廟者獨曲阜與衢州耳曲阜之廟六飛時巡恒循漢世祖明帝故事而宗子之承祀者爵列公侯廟堂車服禮器多存古制瞻仰者如遊三代之世尚矣衢之有廟肇自宋數百年來東南之士不克登洙泗之堂者爼豆羮牆於焉是寄今皇帝御極之十三年滇池弗靖閩孽繼起之芳與大師駐軍兹城先聖閟宫靡獲寧晏今四方既平百廢漸舉爰進庶司以商妥侑於是聖裔五經博士孔行楨廣為募助撫軍藩臬以下咸捐貲庀材鳩工郡丞楊道泰董其役嵗壬戌八月之芳將班師武林來告成事因展敬庭廡仰惟先聖之道如日月之在天其於廟貌之盛衰固無與然而郵傳道路之整弛入其境者覘治忽焉矧奕奕寢廟先聖之天子所憑依者乎以昭示海内之芳參師帥之職保此方崇儒重道海邦願偕百爾君子共襄烏革翬飛以式觀瞻且之芳生爽鳩氏之墟去鄒魯之鄉不逺登斯堂也琴瑟管絃之聲於是乎在使浙之士民觀感薫陶將見風俗淳羙為天下先升堂觀奥者寧必陟龜䝉而臻闕里哉家塾在府城南衢州府志推官劉起宗以東嶽祠廢址建鄒守益為記西安縣儒學在縣治西北嘉靖浙江通志舊在禮賢門外明洪武二年知縣何忠徙縣東𢎞治衢州府志洪武五年知縣靳逹建堂齋射圃正綂間郡守白琮開拓重建衢州府志正徳十四年知縣張潤身遷於宋貢院遺址嘉靖二十三年教諭譚敷遷於祥符寺址程秀民為記三十八年知府楊凖重建明倫堂四十年知縣俞大有遷啟聖祠於明倫堂東萬歴十七年知縣許國誠修署縣事推官陳三樂成之徐一檟為記二十四年知縣蔡天相修鄭有年為記崇禎二年知縣賀康載重修自為記國朝順治十一年知縣白拱微重濬泮池康熙七年知縣李忱重修葉南生為記十年又修徐之凱為記三十年令鹿祐葺文廟建兩廡明倫堂朱􅉓尊修建西安縣儒學記西安縣學舊在禮賢門外一徙於城北再徙於貢院遺址復徙於大中祥符寺規制差僃自耿精忠逆命六師致討屯兵於府郭久縣學牆屋皆毁惟文廟僅存梁棟亦圯㑹進士鹿侯祐來知縣事下車謁廟顧瞻太息乃豫為規畫俾山農之産竹木陶人之治瓦甓鍛冶之攻釘鉸者咸得以其物輸官抵井稅儲興築之具於是鳩工庀材士大夫學官暨其子弟咸率私錢為助首葺廟宇次營兩廡次建明倫堂然後繚垣牆塗丹粉濬泮池種樹廟庭經始於辛未之秋今年春二月成觀者交悦頌侯之功侯曰未也堂雖成祠與閣未僃且曩時賜書未有存者經以載道而學舎無之其可哉乃購羣經疏義凡百餘家納之廟篋以示學者噫侯之用心勤矣夫三衢固仕國也昔之言經術者若鄭灼之三禮劉牧徐庸柴翼之易徐晉卿王宏之春秋皆是西安産也西安之俗其君子敏於事士之志於學者不少特為兵與嵗所苦居無黌舎市無書肆其何所資以講習焉得侯所購之書貯於學有不相觀而善相恱而解辨其同異而博喻之者乎吾知教之所由興必自西安始爰摭其本末而書之於石射圃在縣東名宦祠祀張潤身以下九人鄉賢祠把趙抃以下二十人社學七所四隅各一二在光逺門外一在通仙門外明正書院在縣治東續文獻通考宋汪應辰及子逵寓衢郡守張嵲築室居之後人即此建祠咸淳中趙孟奎重建定志書院在縣學右衢州府志萬歴中建祀贈給事張元卿都人士肄業其中圮克齋講舎在龜峰之麓西安縣志為郡守李公遂建明嘉靖甲子郡守鄭伯興同知薛應元通判夏寳重修鄒守益陳九川錢徳洪王畿王璣嘗㑹講於此青霞書院在拱辰門外西安縣志康熙間為總督李之芳建以為講學之所蔡啟僔為記龍游縣儒學在縣治西𢎞治衢州府志宋慶歴間始創文廟至和初縣尉劉逹元建學後燬宣和七年令邵洪重建於縣西元至元二十一年鎮守千户周旺重建徐伯彪為記至順三年逹嚕噶齊徹爾克哷木重修徐桂蟾為記嘉靖浙江通志元末燬明洪武三年知縣劉庚重建天順四年知縣王瓉修商輅為記𢎞治六年知縣袁文紀復建於今所謝鐸為記萬歴龍游縣志嘉靖二十一年火明年知縣錢仕重建自為記三十八年知府楊凖知縣甘用世重建文廟萬歴四年知縣凃杰翼以外垣建坊門三座六年知縣江濯之撤文昌祠建閣又於泮池前濬兩湖衢州府志萬歴十二年知縣魯崇賢修秦鳴雷為記二十五年知縣郁徳據二十九年署縣推官王學孝縣丞潘熙文相繼修三十六年知縣萬廷謙修崇禎元年知縣劉日曦修國朝康熙七年知縣艾朝棟教諭黃濤修余恂為記十二年知縣許琯十九年知縣盧燦先後重修黃濤楊昶各有記五十二年知縣孟繼祖重修射圃在學南名宦祠祀江逌以下九人鄉賢祠祀龍邱萇以下一十六人社學四所一在學西一在王村一在靈山一在湖鎮九峰書院在縣東九峰山下萬歴龍游縣志唐侍郎徐安貞讀書處圯鷄鳴書院在儒學北萬歴龍游縣志隆慶六年知縣凃杰建二十一年知縣郁徳據改為憲臺後改按察司楓林書院在縣南龍游縣志明督學方應祥集諸生㑹文處圯常山縣儒學在縣治西𢎞治衢州府志舊在縣治東南宋紹聖丙子令林卞建後遷於縣之西尋廢紹興辛巳令胡伯能復舊址重建元至元甲午令李亨建成徳堂大徳己亥令鄭玊增建齋廡元綂乙亥令李盤重修衢州府志明洪武七年知縣劉利用建射亭九年知縣李希顔建膳堂十一年縣丞朱貞立東西二齋永樂元年知縣仇經重建正綂十二年知縣周文重修汪芳為記萬歴常山縣志成化初提學僉事劉釪命知縣李溥重修嘉靖浙江通志嘉靖九年知府趙可與建於今所鄒守益為記常山縣志崇禎間署縣事通判湯瑩重修國朝順治五年署教諭丁應聘修十四年訓導夏之璜修知縣王明道成之孫魯為記康熙二十一年知縣楊濚重修自為記射圃在縣治東南名宦祠祀嚴思忠以下三十人鄉賢祠祀江景房以下一十六人社學三所並在城石門書院在定陽郷𢎞治衢州府志為宋趙鼎立今遺址存江山縣儒學在縣治西𢎞治衢州府志舊在縣治東前俯小河沿河為牆後以言者撤之宋紹興十四年邑令丁昌朝闢而新之為門造飛梁絶河以渡正徳江山縣志淳熙二年尉熊可量修朱子江山縣儒學記建安熊可量為衢州之江山縣尉始至以故事見於先聖先師之廟視其屋皆壞漏弗支而禮殿為尤甚因問其學校之政則廢墜不修已數十年矣於是俯仰嘆息退而以告於其長湯君悦請得任其事而一新焉湯君以為然予錢五萬曰以是經其始熊君則徧以語於邑人之宦學者久之乃得錢五十萬遂以今年正月癸丑始事首作大成殿踰月訖工棟宇崇䴡貎像顯嚴位序丹青應圖合禮熊君既以復於其長合羣吏率諸生而釋菜焉則又振其餘財以究厥事列置門㦸扁以奎文師生之舎亦葺其舊於是熊君乃復揖諸生而進之使程其業以相次第官居禀食弦誦以時邑人有識者皆嗟嘆之以為尉本以逐捕盗賊為官茍食焉而不曠其事則亦足矣廟學興廢豈其課之所急哉而熊君乃能及是是其志與才為何如耶熹時適以事過邑聞其言則以語熊君曰吾子之為是役則善矣而子之所以為教則吾所不得而聞也抑先聖之言有之古之學者為己今之學者為人二者之分實人材風俗盛衰厚薄之所繫而為教者不可以不審焉者也予顧不足以議此子之邑故有儒先曰徐公誠叟者受業程氏之門人學奥行髙講道於家弟子自逺而至者常以百數其去今未逺也吾意大山長谷之中隘巷窮簷之下必有獨得其傳而深藏不市者為我訪而問焉則必有以審乎此而知所以為教之方矣熊君謝曰是則敬聞命矣然此意也不可使是邑之人無傳焉願卒請文以識兹役而並列之熹不得而辭也因悉記其事且書其說如此俾刻焉既以勵熊君且以視其徒又以告凡後之為師弟子而食於此者使知所以自擇云爾嘉定間知縣黃汝嘉修章穎為記嘉靖浙江通志元至元間逹嚕噶齊瑪哈穆特徙今所何夢桂為記天啟江山縣志延祐初馬合謀建禮殿齋廡至正庚寅尹宣聖五十三代孫孔淮重修文廟㦸門建講堂兩廡明洪武初知縣程鵬重建縣丞劉有恒創射圃永樂初知縣潘銳闢東偏為門衢州府志天順間知縣李景修修成化八年知縣戴璋黃寯二十年知縣何澤二十二年知縣王進相繼修之𢎞治八年知縣王奎正徳五年知縣趙遷十一年知縣劉節十四年知縣吳仲相繼修之嘉靖二十一年知縣黃綸重修三十九年知縣陳湯敬修明倫堂兩齋及號房隆慶初知縣余一龍重建明倫堂天啟三年教諭張大基修啟聖祠六年知縣袁一鼇重修方應祥為記崇禎十七年訓導梅友松重修國朝順治九年教諭龔瑛訓導梅夢熊重修康熙六年知縣萬里侯重建明倫堂邑人鄭文綱重建名宦祠十八年教諭嚴曽業汪珝重建㦸門二十一年教諭鍾定訓導沈九如重建櫺星門鄉賢祠二十二年知縣佟國琪建啟聖祠教諭鍾定建習安堂三十四年知縣楊愙教諭朱長吟訓導吕際發重修四十年知縣朱彩重建啟聖祠射圃在文廟西名宦祠祀熊可量以下十八人鄉賢祠祀周穎以下二十人社學四所一在寳成寺一在海㑹寺一在施水寺一在靈寳經堂景行堂衢州府志宋淳熙十二年知縣邵浩建朱子景行堂記江山縣學故有三賢堂以祀正介先生周君穎贈宣教郎徐君揆逸平先生徐君存而今知縣事金華邵侯浩又益以故諌議大夫毛公注贈朝請郎毛公㮚更其扁曰景行之堂而狀其事且為書來告曰願有記也熹考其狀既知五君子之學行氣節真足以風厲當世而興起後來讀其書又嘆邵侯所以教人者僃而待其人者逺也葢正介之行信於鄉而聞於朝其立言垂訓褒善貶惡又皆足以為後世法雖其事業不得見於當年然其所立已不但為一鄉之善士而已也諫議遭時遇主奮不顧身排擊巨姧奪其政柄當是時天下庶幾望至治焉不幸不究其用而廢絶以死有志之士至今恨之然不特為公恨也至於叔縝罵賊不屈以明官守之義宅卿捐軀敵營以紓君父之急其事尤難其節尤偉而逸平受業程氏之門人得諸心成諸行又能推其說以教人儀刑音㫖之傳於今猶未逺也夫以區區百里之問而其先賢之學行氣節可以風厲當世而興起後來者如此可謂盛矣昔人之祀之也其意豈不羙哉然得其三而遺其二又限其目而不使後人復有勉慕企及之思也是則識者猶或病之邵侯於此乃能增益而葺修之且易其名以致其俛焉孳孳之意而撤其限以示若有待於來者是不亦教其人之僃而待其人之逺乎是可書也已抑熹又嘗竊有說焉葢士有學有徳而後其言行有可觀有行有言而後其節義有可貴此士君子立身行道次第始卒之常而不可易者也然人之所禀不同而其所遭亦異故得於身者或無以驗其事成於終者或無以考其初此論世尚友者所以每恨全徳之難而欲擇其所從者又不免有多岐之惑也然則登是堂而有志夫五君子之事者又可不知其所務之先後而循序以求之哉邵侯讀大學之書而有感於絜矩之一言其平居論天下事而有所不平未嘗不慨然發憤而抵掌太息也然則其於五君子者固已非茍知之而亦庶幾得其所以求之之序矣此其為學夫豈偶然而已哉因為之識其本末而并記此意以示其學者云明𢎞治八年知縣王奎重建逸平書院在騎石山下正徳江山縣志舊名南塘在縣西五里宋逸平先生與朱子講道之所後廢明正徳十五年知縣吳仲改建於騎石山下易今名朱子弔逸平詩不到南塘久重來二十年山如龜背擁地與焉鞍連徐子舊書址毛公新墓田青松似相識無語重凄然江郎書院在縣南郎山上正徳江山縣志宋祝維建圮克齋書院在獨秀峯西正徳江山縣志侍郎徐復殷退居學易之所宋理宗御書扁圯崧山書院在長臺鎮正徳江山縣志宋咸淳中邑人柴氏立圮清漾書院在縣南正徳江山縣志鎮安毛氏建趙一齋主之圯集義書院在獨秀峰西江山縣志宋著作郎張恪同弟太學生正恢建圮仰山書院在縣南舊浙江通志明嘉靖間知縣黃綸即東嶽行宫改建景濂書院在石門江山縣志明周二峰建留齋書院在石門江山縣志明趙方泉建今存石亭三益書院在石門江山縣志明趙洙建圮東溪講舎在寳成寺後江山縣志明徐東溪講學處開化縣儒學在縣治東西𢎞治衢州府志舊在縣治西宋政和間令李光徙縣南程俱為記宣和中燬淳熙乙未令朱慶遷於溪濵元初兵燹至元二十一年令陳宜孫重建大徳元年復以水壞令曹祚建廟宇齋廡其後延祐泰定元綂至正間嘗修理明初知縣歩從信修建魯貞為記𢎞治開化縣志洪武三年知縣張髙建兩齋築射圃十年知縣畢進忠重修成化二十一年知縣蔣績縣丞陶瓉闢而廣之𢎞治六年知縣程倫重建明倫堂嘉靖浙江通志𢎞治十四年復燬十六年知縣葉錄重建衢州府志嘉靖五年僉事孫從一重修方豪為記十八年知府李遂遷於縣東南萬歴三十三年知縣蘇珵復遷於望極門外鐘山之麓徐公敬為記崇禎四年知縣朱朝藩重修徐世䕃為記國朝順治六年知縣朱鳳台修自為記康熙十九年知縣吉祥重修丁澎重修開化縣學記古者天子諸侯自國至於鄉邑皆有學凡朝廷禮樂兵刑之事無不在其中不特絃歌洗爵養老勸農鄉射合學以修考藝選言之政也其在詩曰矯矯虎臣在泮獻馘則出師必受成於學及而釋奠以告成功故興崇徳化曰文戡定不率曰武先王寓武功於文治之中士所觀而習者無非干戈羽籥之事使作其氣以勵其操往往歡欣鼓舞而不倦者今天所以収文武並用之材也被海澨而么䯢蠢動尚子臨雍拜道文教誕敷逺有逆我顏行者康熙十三年三月閩㓂告變東道孔棘吾浙三衢界甌越之衝谿嶺險阨開化僻處閩豫咽喉州將納墾户為内應脅邑令崔君華欲以城降崔令諸生抱禮器入山野募鄉兵二萬人呼躍破圍城遂復時制府大中丞兵部尚書李之芳奉詔移鎮姑蔑民情大悅賊衆踞木寨營北源口𤇺燧遥相望全浙震動公以帷幄重臣親冐矢石勦撫互用分守梁萬䙫郡守王𢎞仁為制府左右手轉餉臨衝夜不解胄戮力銷鏑中凡三載自八月巳及戍不五日東浙悉平當是時國家承平日久父老子弟相安於春秋讀法目不見兵革漸摩於禮義者深且厚一旦猝然有變有以激發其忠信勇敢之氣故亂可復治而治亦垂久而無敝獨非庠序之明效乎歸徳吉祥來宰是邑覩學宫鞠為茂草捐貲庀工葺頽圮而新之因從士民請奉制府尚書李公祠於廟梁少參王郡守崔邑令得祔焉志不忘也豈非以功在社稷施及於民之義有合於祀典者與二十七年知縣董鐸教諭姚夔重修四十一年知縣韓雲重修明倫堂四十八年知縣王克興重修大成殿康熙六十年貢生詹錫武請捐貲重建廟學教諭查謹訓導陳昕烈具詳各憲明年徙起鳳門内今址鼎新其制輪奐改觀覺羅滿保重建開化縣學記國家設立學宫自京師以至郡邑雖山陬海澨僻逺之地莫不有學所以育賢才羙風俗法至善也開化邑在萬山中舊有學宫屢廢屢修明萬歴間遷於城外之鍾山離縣治少逺師儒之絃歌月吉之讀法不能具舉於是日就頽圮官斯土者有志修復而力未逮邑孝秀詹錫武奉其父奎光之遺命鋭意營建而學諭查謹偕訓導陳昕烈具文通詳經如於康熙六十一年三月告成於雍正元年九月積屋之楹若干而門序正位講藝之堂休息之盧至於庖湢庫廏咸具用緡錢若干落成之日請記於余余嘉詹生之孝而趨事之敏也因招開士而告之曰爾知國家建學之意豈惟是訓詁詞章以為弋取科名之具乎亦教之孝悌而已夫孝者百行之原聖人有言我行在孝經誠使家敦天性之愛户有罔極之思則風俗醇羙修於身型於鄉逹於政事舉而措之耳記不云乎事君不忠非孝也涖官不敬非孝也朋友不信非孝也居處不莊非孝也戰陣無勇非孝也詹生奉其父之緒言揮斥多金以建此廟學爾多士來㳺來歌以瞻以儀其亦有所觀感而今天興起乎孝治天下尤尊崇聖教以風動海内崇啟子以大聖之封號加鄉㑹之恩科廣取進之額數其加意於學校者恩澤至溥而開學適成於斯時大澤將至有開必先育賢才而羙風俗余於開有厚望焉射圃在學側名宦祠祀楊居仁以下九人鄉賢祠祀魏謩以下二十三人社學二所一在縣東一在縣西包山書院在縣北二十五里𢎞治開化縣志宋淳熙間汪觀國建逍遥堂翼以軒曰聽雨與其弟杞論道讀書其子浤立書院以祀朱吕二先生後孫繼榮請於朝賜額包山書院圮浙江通志卷二十八
