body:
  text: 浙江通志卷二百十列女九紹興府蕭山縣南北朝吳翼母丁氏南史本傳會稽永興吳翼之母丁氏少喪夫性仁愛年荒分衣食以貽里中飢者同里陳攘父母死孤單無親戚丁收養之及長為營婚娶又王禮妻徐荒年客死丁為買棺器自往斂葬元徽末大雪商旅斷行村里比室飢餓丁自出鹽米計口分賦同里左僑家露四喪無以葬丁為辦冡槨有三調不登者代為送丁長子婦王氏守寡執志不再醮州郡上言詔表門閭蠲租稅王氏女南史本傳永興概中里王氏女年五歲得毒病兩目皆盲性至孝年二十父死臨屍一呌眼皆血出小妹娥䑛其血左目即開人以為孝感元吳世澄妻竇氏徐一䕫吳世澄墓誌世澄初配徐繼配孫末配竇氏世澄歿時竇氏纔二十有八守節不移撫育前妻子如己子朝廷旌表其門閭顧應法妻余氏於越新編名守元夫歿時年二十五至正年旌張鯨妻曹氏萬厯紹興府志生四子而寡年二十二貧不二志八十六卒丁京妻吳氏於越新編元季兵亂吳攜女仁奴出亡遇兵於途將侮之皆不屈死里人立雙烈祠楊伯逺妻王氏嘉靖浙江通志西興人至正間鹹水決堤灌田傷稼其夫充里正差築圩堰江潮衝激久不能就官督其慢日受楚責王氏痛之割股投於水沙遂漲堤得以成因名曰股堰鄉里異之堰至今存明陳曙妻張氏續文獻通考曙聘後貧不能娶父謀改嫁之張引刀自刎母力奪得不死後歸陳未幾而夫亡張哭之哀未三月即自縊於寢所張惟寛妻洪氏𢎞治紹興府志年二十四而惟寛死守節至七十九而没鄰有徐姓者其女亦寡徐臨終命其女曰汝之守節宜效張母徐黼妻李氏嘉靖浙江通志黼任晉江訓導妻亡就彼娶李未期黼卒於官李時年十九父憐其少戒勿隨行誘之歸集諸姑嫂姊妹懇切留之乃圖自盡父母遂縱之扶櫬歸葬訓子成立孫貞女兩浙名賢録幼許聘葉氏其鄰有沈氏女者許聘汪鑑既納采鑑死女聞訃欲往父不從將自經乃許孫時年十七聞之曰誤矣只死方好未幾葉氏子病篤將不起孫即潛製斂具已而訃至孫取殮具囑父母納葉棺尋自盡太守戴珊躬禮其家以旌異之汪欽妻周氏名山藏山隂周氏女年十九適蕭山汪欽欽兄弟五人俱殀歿獨父湛及母在夜有劫盜湛起禦之遇害盜盡掠其貲去周號泣曰貲不足惜何乃刃吾舅誓不與俱生挺身訴於官不獲則走奏京師茹荼三年竟獲盜三十人斬於市來志妻何氏蕭山縣志年十八適來嘉靖二年九月夫溺於江何號泣不已距夫亡六日沐浴更衣縊於床而死方逢㤗妻錢氏舊浙江通志年十九隨舅姑居京邸逢㤗卒錢絶食九日而死徐中孚妻戴氏舊浙江通志寡居二十餘年鄰火延至族黨勸之避不從遂焚死毛京妻徐氏蕭山縣志名靖端京死時年十九親族勸之他適泣而拒之曰禽獸之行豈人道所為守節八十餘年冰蘖之操始終不渝來仲康妻金氏王世貞來節婦傳年十九歸仲康農家子也有一子甫襁褓仲康死婦方妊身及期舉子名襁褓子曰五經遺腹曰五倫族之亡賴者利其他適使鄰姬誘之婦囓指血噀姬面亡賴者恚甚夜縱火焚其舍婦掖姑起跪而祝天火即熄亡賴益恚適溪水漲乃候兒出欲溺之婦夜夢神語勿令兒出久之亡賴者徙去婦始獲安五經長穎敏而文五倫壯未有子市妾入門而有涕容婦問之曰夫貧故見鬻適與所生子别耳婦謂五倫亟返之不復問值郡邑上其節得旌表年八十四卒沈炳秀妻陳氏蕭山縣志父遘疾贅炳秀於家時氏年十四甫四月炳秀死有富人倩一達者為媒父為治具氏慟哭且罵媒遑遽走遂辭父歸夫家立夫兄子為嗣㷀然一室人罕覯其面丁貞女紹興府志許配黄承元將嫁而承元卒氏至喪次視含殮截髮納柩中遂不復歸韓烈婦蕭山縣志夫張宏思住西河貞節里家素温飽舅姑没夫日事遊蕩竟至窮甚先鬻其子後計其妻氏僅三旬聞而泣曰焉有婦人而事二姓者乎夫方與人議嫁禮而氏已投繯死王氏二節紹興府志王延祚妻黄氏崇禎間延祚為應天檢校過夏津遇兵夫婦被執擊延祚垂斃黄紿卒曰釋此我當與汝取寓中財物卒信之黄揣夫脫去乃曰我死即死矣何財之有遂被害後四年子令髙為臨清守城將陷妻黄氏赴井死周貞女舊浙江通志周來蘇女許山隂余本通未嫁而本通死聞訃即往守制嘗自誓曰妾貞如竹異日墓上當令枯竹復生及葬送者以杖植之皆抽葉如其誓傅氏二節蕭山縣志徐氏傅承寵妻俞氏傅承宸妻承寵未娶得癎疾徐父欲悔之氏不從卒歸傅調䕶曲盡至六載寵卒承宸方娶而病瘵距六月亦卒二氏為妯娌守節並篤俞氏之父憐女少欲奪之氏自刃頻死乃止邑令楊維喬為作雙節傳徐鳳梧妻魏氏蕭山縣志鳳梧死氏年二十惟一子復被人畧賣㷀處一室突常無烟夜以草薦自覆或勸之改適至以勢惕之氏曰人患不能死耳他何畏焉乃止後子長脱歸漁釣為業以養其母吳馴妻蔡氏題旌冊年十八而寡時萬厯十七年也母憐其苦諷之改適氏引刀自刺其臂泣曰若有他命吾頸視此耳一日同舍火起延及氏屋氏抱孤向天哀號須㬰風返火熄夫葬即穿國朝壙其旁以誓同穴守節五十六年雍正十年具題奉㫖建坊旌表沈雲英蕭山縣志刋誤父至緒武科進士雲英少隨父出入京師能馬射通春秋胡氏傳崇禎間隨父任道州守備流賊寇道州父出戰為賊所殺掠其屍去雲英年二十自率十騎束髮被革直趨賊砦乘賊未集伍連殺三十餘級負父屍而還湖撫王聚奎奏請降勅以雲英為遊擊將軍使仍領父衆㑹其夫賈萬策為都司守荆州南門流賊陷荆州被殺雲英號呼曰吾命絶矣因哭辭詔命扶父柩囘籍貧無食開塾於家訓其族中兒族中兒習胡氏傳者悉師之金玉鯨妻孫氏舊浙江通志明末避兵湘湖遇邏者以刀砍玉鯨倒地執氏欲汚之氏怒詈復欲殺其子子奔啼乃自盡又一時以節死者趙逢元妻張氏王九龍妻戴氏皆沉湘湖來冠朝妻何氏來逢盛妻黄氏來冠倫母俞氏妻任氏沈驤妻來氏皆於長興鄉赴水黄竒英妻于氏來裕之女及婢小春皆赴水楊守程妻湯氏抱石投池來逢時母王氏自縊張家村楊梅樹有被掠而殉節者胡光樞妻徐氏奪刀自剄來夢齡妾程氏投白馬湖韓時雍妻來氏寡居二十載赴水徐喬椿妻沈氏乘間自縊龍山嶺翁氏二女長女年十六許字汪姓幼女十四未字經珠墅橋躍入水王國幹妻俞氏為土寇所害蕭山縣志王國生妻徐氏傅日新妻戴氏俱赴水死象山婦紹興府志兵掠至錢清禹㑹橋赴水死居民獲屍衣皆縫紉具棺葬之歲時致祭題為象山烈婦云丁岳妻汪氏徐元福妻張氏衞軺妻汪氏王茂妻沃氏王渭妻胡氏翁堯妻蕭氏徐堯卿妻李氏丁露妻陳氏張誼妻黄氏周大器妻徐氏丁令金妻瞿氏王廷相妻任氏包曽義妻孫氏單之祥妻盛氏王宗岱妻張氏陳夢蘭妻張氏王命正妻戴氏徐茂芳妻孫氏徐世道妻張氏何之杞妻黄氏張芳春妻徐氏黄方妻來氏張孫祥妻周氏周邦儒妻張氏張試妾陳氏洪緒妻鄭氏沈聖基妻施氏蔡一亮妻史氏國朝趙應榜妻丁氏紹興府志夫死苦志守節躬親操作至耄未嘗怠順治十三年具題奉㫖建坊旌表周萬紀妻童氏蕭山縣志歸周五載夫歿一子方襁褓家貧備歴諸艱貞操愈勵何之楠妻黄氏題旌冊歸何六載而之楠殁子又早夭葬舅姑躬任拮据以節終以上㫖建二氏俱康熙九年具題奉坊旌表賀國祚妻蔡氏蕭山縣志年十八適賀生子昌圖甫七日夫歿家貧有嫠姑躬操作以奉菽水昌圖歿又撫五孫俱成立苦節五十載康熙十二年具題奉㫖建坊旌表蔡恂妻王氏題旌冊年二十五而寡時舅姑亦病氏外延良醫内調湯藥時時寛慰舅姑乃漸愈撫幼叔鞠孤子尤辛勤倍至康熙三十年具題奉㫖建坊旌表陳六姑題旌冊年十七未字有俞裔臣者瞷室無人潛入欲汙之六姑大呼不從震動鄰人裔臣㫖建驚逸六姑閉門自經死康熙五十三年具題奉坊旌表王氏二節題旌冊趙氏王德璋妻夫死時年二十一立姪為嗣守節至六十二歲卒汪氏王鉽妻鉽早卒氏事孀姑撫幼子年踰五旬清白無玷以上二氏俱雍正二年具題奉㫖建坊旌表沈士瀾妻王氏題旌冊年二十一而寡繼子承祧霜操不二戴嘉棠妻朱氏題旌冊年二十一而寡孝事舅姑撫育幼子成立守節三十年王圖鞏妻吳氏題旌冊年二十一而寡事舅姑以孝教子有成守節三十五年以上三㫖建氏俱雍正三年具題奉坊旌表王氏二節題旌冊金氏王竒勲妻年二十四而寡立姪為嗣守節四十六載吳氏王錞妻年二㫖建十七而寡孝姑撫子年逾六十雍正六年具題奉坊旌表趙繼日妻黄氏題旌冊年二十五夫亡撫遺孤守節至九十五歲當初寡時有欲奪其志者氏不為動事姑二十餘年紡績奉養時或不給至掲屋瓦以易升斗而自甘飢餓不使姑知也里人皆稱其節孝倪潤妻金氏題旌冊年二十九而寡守節至七十六歲而卒以上二氏俱雍正七年具題㫖建奉旌表坊吳樞妻陳氏題旌冊年二十三而寡事姑撫前室子守節三十年雍正十年具題奉㫖建坊旌表陳日㤗妻范氏題旌冊年二十六而寡撫子守節二十六年雍正十一年具題奉㫖建坊旌表丁君平妻鍾氏題旌冊年二十六夫亡子幼氏紡績以給饔飱子長為娶婦早夭遺一孫氏復撫教成立守節四十五年雍正十二年具題奉㫖建坊旌表楊文登妻何氏題旌冊年二十一夫亡事姑孝撫遺孤自幼至長教以義方自奉極儉族黨中有貧乏者輒出所積以周之守節三十二年田氏二節題旌冊田嘉時妻張氏及其子田雲漢妻郎氏嘉時卒張年二十五子雲漢尚在襁褓撫長婚配生二子雲漢卒郎年二十七㷀㷀姑媳冬夏一幃晨昏一室紡績撫孤足不踰張守節三十一年郎守節三十二年旌以上三氏俱雍正十三年具題候來斯行妾張氏蕭山縣志山東東平州人父昌官千戸母王氏遭蓮妖亂不屈而死因鬻於斯行為妾斯行即世斷髪秉節順治丙戌避寇湘湖寇至為所執欲汙之氏豫縫衣帶堅不可解罵賊被刃而死蕭君梁妻徐氏紹興府志抱幼子避難遇兵殺子掠氏氏兩手抱木不放衆叢射之至死不屈單人傑妾張氏舊浙江通志避亂湘湖兵欲汙之氏不從赴水死富時異妻徐氏蕭山縣志年十八歸富富長山農民也甫四十日夫死將葬氏乞於姑營雙穴不允遂自經於墓側陸道見妻徐氏毛竒齡陸節婦傳陸守訓母也靑年守志族人利其産一日誘孤至柳巷刃之忽後有呼殺人者廻視則黄衣道貌者也因竄去孤傷左頰血䝉面仆地黄衣出藥塗之扶孤扣母門母急訊故轉瞬不知所之乃以為神也於是謀所以逺害者僦母家居焉躬自課讀長為之婚復故居恢先業子姓繁昌苦節之報也翁大捷妻王氏舊浙江通志大捷客死柩歸氏撫棺哭曰吾不敢自盡者因柩未歸耳今而後死可同穴矣赴水死張氏二節蕭山縣志魏氏張堯仁妻年二十五夫亡子師賢方四齡堅志守節師賢娶李氏二十歲而卒子方在襁褓李事姑育子孝慈備至張蘭莊妻王氏蕭山縣志年十七適張明年蘭莊卒殯葬畢氏以杖植墓前曰吾能完節枯竹當再生後竹果生以節終胡氏二節公舉事實胡恒妻金氏胡文熊妻金氏娣姒也俱二十二而寡初恒妻寡時姑曰家貧爾年方盛毋以我故久稽也金涕泣不從事姑益䖍及文熊卒其妻欲自縊以殉姑曰爾有遺孤宗祀係焉且爾伯姆孀居爾兩人其相依為命無徒死為於是飲泣承命事姑課子恒妻守節四十九年卒文熊妻守節二十五年尚存何之棟妻朱氏周應明妻來氏葛堯勲妻陸氏孫應訓妻單氏來孫芝妻韓氏於竒玉妻徐氏徐一曽妻黄氏任元齡妻徐氏蔡文治妻來氏黄岳齡妻倪氏黄化龍妻蔡氏施懷榮妻華氏任士進妻蔡氏沈大球妻徐氏張上甲妻朱氏張邁妻韓氏王洪珽妻華氏王基妻蔡氏徐世薦妻楊氏陸一龍妻沈氏王長祚妻沈氏王承乾妻李氏許同寅妻蔡氏王承式妻來氏戴萬象妻來氏單匡周妻來氏朱大棟妻任氏任五仁妻童氏王之麟妻朱氏何愈髙妻王氏陳繼魁妻朱氏韓麟妻蔡氏蔡國治妻來氏張全甲妻王氏魯良驥妻金氏蔡良祐妻郎氏蔡君球妻趙氏單彝妻楊氏鄭龍章妻陳氏王鴻京妻蔡氏張濬祥妻黄氏葛士俊妻陳氏章國光妻樓氏王圖昌妻倪氏林楠妻任氏陸守舜妻陳氏戴元簡妻沈氏王士驤妻郭氏胡心傳妻黄氏沈士蘭妻黄氏張文廣妻富氏王附翔妻楊氏張大阡妻王氏魯士升妻蔡氏來彰妻童氏周建㤗妻陶氏王延社妻詹氏周維京妻童氏錢士鵬妻張氏許學熹妻婁氏諸曁縣南北朝賈恩妻柏氏宋書孝義傳恩母亡未葬為鄰火所逼恩及妻柏氏號哭奔救鄰近赴助棺櫬得免恩及柏俱燒死有司改其里為孝義里屠氏女南齊書孝義傳諸曁東洿里屠氏女父失明母痼疾親戚相棄女移父母逺住苧蘿晝樵採夜紡績以供養父母俱卒親營殯葬負土成墳鄉里多欲娶之女以無兄弟誓守墳墓不肯嫁為山賊刦殺宋倪夢應妻孟氏兩浙名賢録夢應早世孟刻苦不嫁以冰霜自勵而訓子孫獨以仁厚餘粟出糶必縮直十二三歲以為常時以比椓斛夫人王友任妻方氏萬厯紹興府志友任父厚之所積書籍甲於海内友任卒子澹尚在懷抱氏闢樓居藏之嘉定中柄臣遣使者書幣指求再三竟謝不與元楊敏妻齊氏兩浙名賢録年十八敏卒子甫周歲舅姑欲奪其志齊斷髪破面抱其孤向舅姑哭曰我為死者守孤忍令此孤之無歸乎舅姑怒令自食齋居斗室晝夜紡績以資養舅姑卒托老婢經理其家閉門不出開一竇以通飲食如是者二十年年六十七卒章瑜妻傅氏輟耕録年十八適瑜瑜為苛吏脇軍興期會迫死道上訃至傅氏蒲伏抱屍而歸號泣三日夜不忍入櫬屍有腐氣猶依屍呵含冀甦既入棺至嚙其棺成穴及葬投身壙中母强挽以出未百日母欲奪志語聞遂大慟連日不食母囑侍婢謹視之閲數日紿婢曰吾當浴若理沐具俟予旣而失所在明日婢汲井見二足倒植井中乃氏也楊維楨為之贊張英妻莊氏兩浙名賢録至正乙巳張士誠攻城氏被執度不可免厲聲大罵曰爾輩鼠賊耳敢肆行無禮執畧衣冠子女乎我死即死奪我終不可得也賊怒抉其口而死王琪妻蔡氏元史本傳至正二十二年張士誠陷諸曁蔡氏避之長寧鄉山中兵猝至有造紙鑊方沸遂投其中而死兩浙名賢録賊驅其從婢婢曰主母死我可驅乎賊怒殺之趙宜震妻郭氏兩浙名賢録名靚元季亂夫婦伏莽蒼中數月始歸而宜震死郭年少苦節遺孤從師以練布為贄師辭之乃令孤致辭曰非此無以成弟子禮茍憐死者而及其孤則請勿辭後疾革呼其孤曰爾既有成我以得死為幸遂瞑明周本恭妻趙氏宋濓周節婦傳名淑始歸而姑卒既而舅及兄公姒亦相繼死兄公子顯宗幼婦相夫飭喪治葬育顯宗如子歸十一年生三男夫卒婦年二十九明年國朝與偽吳拒戰兩兵交焚掠家資無纖毫存婦抱兒及顯宗出走匿惟持田籍以行深山窮谷間飢餓顛踣削木膚采藜藿以食或勸之曰呱呱者何足恃婦剪鬢髪益自裁戢人莫敢近兵定歸富民侵其田幾盡婦持籍與辨卒賴以完知州高其行乃復其家樓氏四節萬厯紹興府志樓師忠妻斯氏名鞠字妙善元末避亂山谷間師忠出負米罹鋒鏑卒斯年二十六後一年師忠弟師實亦遇遊兵卒妻何氏年十八師實弟師彰卒妻陳婉年二十一從子珏又卒妻錢年二十九皆不嫁人稱一門四節又有吳璟妻鄭貴澄璟弟妻鄭貴深弟瑛妻黄昭從子儉妻斯氏亦一門四節李氏二節𢎞治紹興府志王氏秉適同邑李通與通弟逺妻阮氏貞並早寡以志操自立備經飢亂逺遁深山得以自免親族勸使再醮二婦歎曰吾寧餓死肯為是哉洪武初旌表俞氏三節𢎞治紹興府志俞潚妻童氏年十六歸潚未幾而潚死童剪髪納棺誓不再醮瀟仲弟滋妻趙氏季弟潤妻金氏亦相繼夫歿趙惟一子金惟一女妯娌並守志紡績養舅姑撫子女人以三節稱之戸側産異竹縣令蔣昇以聞旌其閭孟貞女嘉靖浙江通志名蘊許嫁蔣文朂未成婚文朂卒藴年二十聞喪號慟歸蔣氏執喪三年養其舅姑盡孝宣德中旌表酈浹妻馮氏於越新編名寶娘適浹未數月浹卒馮年二十三以姪為嗣苦志自守一婢有殊色人求娶馮命之辭曰願與主母同老終不嫁蔡温妻吳氏於越新編年十六歸温明年温卒守節八十五年至一百一歲乃卒何暎賢妻黄氏諸曁縣志年二十歸暎賢比孀居值亂兵焚掠遭驅迫冒死詈拒被刃而殞時盛暑屍横野至五日始殮神色不變蔡鈸女舊浙江通志名六主及笄王虞兩姓爭婚致訟不已六主恥之剪髪誓為貞女余獅妻曹氏徐溥仁妻洪氏駱黼妻錢氏駱宗廸妻鄭氏酈煉妻楊氏吕元鎮妻傅氏劉子美妻吳氏徐夢旦妻王氏胡斗輝妻許氏周之德妻柴氏盛鳳鳴妻孫氏傅大詔妻郭氏袁仲解妻黄氏酈元翀妻周氏孟蘭妻傅氏陳妻俞氏陳隱妻張氏鄭復修妻酈氏孟夢蛟妻孫氏國朝壽芳榗妻斯氏題旌冊年二十五而寡守節三十九年酈經妻蔣氏題旌冊年十九而寡守節四十七年以上二氏俱雍正二年具題奉㫖建坊旌表陳首安妻周氏題旌冊年十六歲夫亡斷髪毁容誓守繼子承祧苦節至五十一歲余九霞妻錢氏題旌冊年十九歲而寡守節三十二年樓縣亮妻鄭氏題旌冊年十九歲而寡守節六十八年郭琦妻酈氏題旌冊年二十三而寡守節十九年趙友齊妻楊氏題旌冊年二十三而寡守節四十一年何兆隆妻詹氏題旌冊年二十四而寡守節四十九年何兆鼎妻陳氏題旌冊年二十四而寡守節三十三年樓拱璧妻酈氏題旌冊年二十一而寡守節五十二年袁爾倬妻許氏題旌冊年二十二而寡守節三十四年趙宏猷妻郭氏題旌冊年二十五而寡守節一十六年方爾棟妻樓氏題旌冊年二十六而寡守節四十五年以上十一氏俱雍正三年具題㫖建奉旌表坊傅愉妻張氏題旌冊年二十三而寡無子止二女愉兄憬亦惟一子無可繼者氏事舅孝舅没女亦有歸已而愉姪侵盜其産畧盡貧不自給苦節至六十六歲而終雍正四年具題奉㫖建坊旌表何習讓妻王氏題旌冊年二十二而寡撫姪為嗣守節二十九年雍正五年具題奉㫖建坊旌表陳𢎞僴妻許氏題旌冊年二十六而寡立繼承祧守節二十五年雍正六年具題奉㫖建坊旌表周遇暲妻戚氏題旌冊農家婦也年二十一夫亡長子在襁褓次在腹人勸其他適氏斷髪毁容堅拒之事翁姑孝鞠二子成立湯大姑題旌冊湯舜臣女許字趙源未婚源卒大姑年十九父母不以聞姑偵知之堅請奔喪至則執喪成禮事舅姑盡孝服闋父母憐其少復强之他適大姑服滷者再皆以救甦後舅姑歿歸母㫖建家守志終其身坊旌表以上二氏俱雍正七年具題奉郭民效妻吕氏題旌冊年二十歸郭生一女夫病瘵及革謂氏曰父母生我一人我死誰供子職乎氏泣曰倘不幸子職卽婦職也夫卒氏年二十五事舅姑及庶姑養生送死無遺憾女長又殤立繼以續烝嘗守節四十八年蔣義妻孫氏題旌冊年十八歸義二十五而寡孝事舅姑敎子具有法度性好施里人有代客貿布而失之者將鬻其子以償氏出貲以全其父子鄉黨稱之曰義守節三十二年孟德名妻應氏題旌冊年十六歸孟二十一而寡子女幼氏事翁姑孝姑患腹疾氏懷兒侍藥中裙厠牏躬自湔滌舅姑卒力營喪葬子殀繼姪為嗣守節三十五年酈鼎錩妻錢氏題旌冊年十七適酈二十而寡無子子猶子女適袁文潤亦早孀依母以居氏偕女靜坐一室跬步不離守節三十七年壽貞女題旌冊名鳳姑許字謝世琮未婚世琮卒氏請於父奔喪守制三年父母迎歸於家有勸之他適者氏斷一指為誓守貞三十九年五氏俱雍正九年具題奉以上㫖建坊旌表葛蕃妻濮氏題旌冊年二十八而寡事姑撫子夫兄欲奪其志截髪毁容以死自誓雍正十㫖建年具題奉坊旌表趙次範妻周氏題旌冊年二十三而寡事姑撫子雍正十一年具題奉㫖建坊旌表周魁先妻徐氏題旌冊年二十七夫亡遺孤一氏事舅姑孝舅没事後姑益謹後姑疾侍湯藥衣不解帶者歷寒暑勿懈姑疾瘳而氏病不起守節二十年雍正十二年具題奉㫖建坊旌表郭錦妻孟氏題旌冊錦官平陽教諭父年逾古稀不欲之子任所氏居家奉侍十餘載先意承志舅與夫相繼卒子卜地葬父氏恚曰爾祖未葬奈何先營爾父兆域乃分上下穴合窆焉雍正十三年具題候旌王祖念妻陳氏諸曁縣志順治乙酉方兵焚刦脅氏隨去氏縱身投沼内死越三日家人收其屍顔色如生徐承明女舊浙江通志年及笄未字丙戌遇遊兵縛之上馬過全湖女躍入水死郭陳二烈諸曁縣志蔣氏郭増妻俞氏陳守義妻順治四年遇兵於途將汙之蔣堅不從奪刃自殺俞見其夫被殺亦自刎傅有益妻應氏諸曁縣志順治丙戌六月亂兵至氏恐為所辱投屋側塘内死又余長二十一妻吳氏被掠投塘死陳賓妻王氏諸曁縣志年十五歸陳甫五載夫疾劇囑氏曰我兄弟必不相容請改圖毋使我泉壤遺憾氏不應適畫工傳夫容氏請併已容入焉傳成語夫曰此同歸意也逮夫卒殯殮成禮氏從容至樓端坐投繯自盡鄭復修妻酈氏諸曁縣志年十八復修亡舅病劇酈割股療之有女適樓姓者不數月而夫卒矢志勿二人以為得母氏之敎云吕貞女紹興府志許字俞文昇文昇卒女髽髪縞衣願終身於俞舅欲奪之女益矢冰蘖舅年七十續姑生子虹姑死女育虹至長年六十餘卒孟氏五節諸曁縣志戚氏孟大壯妻二十五而寡六十九歲卒黄氏孟大有妻十九歲而寡八十一歲卒大有子應瑞娶楊氏二十二而寡六十九歲卒大有孫二明琦娶楊氏二十三而寡年六十五明球娶翁氏二十五而寡年五十九皆力貧守志養老撫孤世著貞節一門繼美長清嶺烈婦紹興府志康熙十三年土賊朱德甫踞諸曁紫閬山官兵進勦有一卒繋良家婦并其幼子於馬後隨行婦好謂卒曰吾既被獲從汝固宜但夫止一子今在此吾夫必來俟其至以子歸之然後任汝所欲卒許之行可半日至長清嶺其夫奔而前婦請於卒以其子付夫度其去已逺遂投巖死宣拱妻宋氏紹興府志拱卒無子拱兄君修狡而貪氏年甫十七容髪姝麗淮安巨商適諸曁見之以多金啖君修將縛氏置輿中擁至寓第鄰婦知其計告之氏唯唯無一言更强歡笑遂宻縫其上下衣夜開門至下堰塘投水死時康熙二十二年十一月十三日也天寒冰結氏死層冰下君修求之不得疑匿他所頃之狂風怒起池冰裂開數尺聲若雷吼僵屍蹶起寒峭如生冰結衣服間稜稜然觀者成市士民聞於縣轉申督撫祔蔡烈婦祠因名其池曰殉節池池水汙濁自氏死後澄碧如秋顧氏三節公舉事實顧英竒妻石氏年十五歸英竒逾年而寡舅姑勸改適不許躬紡績以供甘㫖其娌姚氏顧綱四十八未婚妻也幼育於顧與石氏寢處一室相懽如同産順治三年土寇竊發石年甫十八姚年十四度勢不能保約與俱死婢秋桂亦慷慨願從一日宼猝至三人相抱同赴三江口磨心潭死秋桂年十五姓蔡陳仲學妻應氏陳有謨妻翁氏陳瀛緒妻孟氏錢宷肅妻蔣氏朱濓妻沈氏張國光妻俞氏陳烈妻傅氏陳克智妻王氏陳紹炳妻王氏酈一俊妻壽氏酈吉士妻周氏周一鼎妻宣氏孟立志妻陳氏周祚明妻許氏王之佐妻袁氏石學漢妻袁氏許黌妻壽氏馬孟元妻趙氏餘姚縣宋岑斌妻王氏兩浙名賢録早寡或利其裝欲强委禽氏曰是賈禍也盡散以周宗黨晩年子全登科有司欲上其節行於朝氏令全謝之曰夫死守節婦人之常以此得名非吾志也有司髙其識卒年八十二莫子純母虞氏兩浙名賢録幼習詩書既歸莫則力任粗作晝夜無所厭苦夫死焚券舍責趣其子子純就學發解南宫及廷試俱第一子純連補外夫人無愠容常曰吾憂吾兒不及古人他復何覬故子純克奉母教以恬裕聞元楊彦廣妻董氏萬厯紹興府志董仲安女名淑真生子鎮甫歲餘彦廣死氏年十八以死自誓高義婦嘉靖浙江通志許嫁張氏子已而子病瞽其家使媒來曰吾子不幸瞽惟改卜所歸父母將諾之婦涕泣曰命之所遭義無離貳今夫不幸瞽我遂棄之何面目立人世耶父母悟卒歸於張養夫以終老郷閭高其行號曰義婦王伯純妻張氏於越新編年二十一而寡守志不貳被旌韓孚妻黄氏嘉靖餘姚縣志名妙權歸韓五月而寡誓不再嫁至正初千戸伊喇知其有殊色欲娶之媒者以權貴動之氏叱之曰千戸受朝命鎮撫民者乃欲奪寡婦志耶伊喇不敢復强既而方國珍驍將葉某欲脅娶之氏操刃劃檻曰敢越此戸議婚者吾以頸血濺之葉聞而歎曰吾為男子受大將付託臨陣顧不能死彼婦人乃獨肯輕生誠羞之自是無復敢言卒全其節明姜榮妾竇氏於越新編京師人為餘姚姜榮妾正德中榮自主事謫判瑞州適缺守榮䕶郡符華林賊攻城榮出拒戰城破賊入榮舍竇匿其符被掠以行慮榮未知符所有郡民盛豹在賊中還竇乃宻語以符所且曰吾必死矣歸報官府毋我念至花塢村見道旁有井佯渴求飲賊縱之遂投井死事聞詔表其門立祠祀之姚孝女明列女傳適吳氏父早世迎母養於家母出汲被虎銜去女追掣虎尾虎欲前女掣益力尾遂脱痛甚舍母而逝藥之獲愈奉其母二十年諸士俊妻舒氏續文獻通考名貞年十八歸士俊數月士俊死於商姑念其年幼謀嫁之以死自誓慕貞者乃重賂其父母私盟之貞知不免紿父母治齋薦夫齋畢沐浴衣麻自經死吳江妻李氏嘉靖浙江通志夫死李年二十有黄某者謀娶之因其夫族吳琰貪賄乃厚賄琰使輔其姑而以尊刦之李誓死不從則陰與黄氏及父家約稱其母暴病遣輿迎李李倉卒升輿既及門非母家也姑亦尋至布几席速李出輿成禮李度不可脱佯諾曰妾所以不嫁者為姑老無倚姑既許妾復何言然必湯沐乃可成禮辭色從容衆以為誠從之久而不出闢戸視之則已自經矣丁時妻孔氏錢德洪慈節傳丁行母也年二十三而夫亡長子任方二齡行孕未彌月茹飢服寒治麻枲為食二子長脩贄使求陽明弟子事之任又早世歲乙卯倭入寇行負母以逃賊至縛行母奮身救䕶賊斷其左臂死之行血泪交下賊亦動容遣之歸葬王棋妻朱氏錢德洪王節婦傳棋之祖譒父渭皆夭祖母胡母嚴少寡食貧棋又短折婦年二十二生子練甫數月瘠田數畝量所入為十二分每月用米一分煮粥作糜沉者奉姑浮者自食茍是月有意外之需借月米措給則忍餓勤作以補不足不移餘月之儲糠粃糟糵樹根蓏實莫不遍食以自度又掩覆其事以慰姑心練長教之持書隨人問字久乃出課童子以助母食嚴壽終婦割田易貲以終喪葬積勞成病而歿得壽五十有八沈烈婦嘉靖餘姚縣志莫潤妻也莫暴悍不能治生婦早夜勤苦紡績養姑而身恒凍餒既生子食益不給莫晝夜促其妻曰一日不怕羞三日喫飽飯汝好為之沈曰但有丐乞爾莫曰乞來食豈能飽我婦泣曰除此但有一死莫乃陰與富者約改嫁之婦遂縊死其前有任鵬妻某氏者鵬死年少親屬欲奪其志自沉於江有葉某妻某氏者夫死姑奪其志縊而死近時有胡東昇妾魏氏東昇死縊以殉汪氏五節萬厯紹興府志汪錦妻大符氏汪桓妻宣氏汪材妻小符氏女吉媛汪季妻夏氏嘉靖三十二年遇海寇俱不屈赴水死張椿十七妻陳氏舊浙江通志夫死止一女氏自誓靡他女長于歸一日鄰姬有詈失雞者語稍侵氏氏曰吾以息女故忍死以至今日今女已有家乃不能死而受辱彼婦之口即登樓閉戸絶粒其家人涕泣饋飲食氏自戸隙接而置之終不食如是者十日不死自縊而絶史茂妻谷氏明列女傳父以茂有文學贅之於家數日鄰人宋思徵債於父見氏美遂指逋錢為聘物訟之官縣令馬從龍察其誣杖思而遣之及氏下堦茂將扶之以行氏故未嘗出閨閣見隸人林立而夫以身近推而逺之令望見以其意不屬茂也立改判歸思思即率衆擁輿中而去母隨之至思舍氏呼號求死斷髪囑母遺茂思族婦數十人環相勸慰不可解乘間縊死令聞之大慚捕思思亡去茂感義終身不娶朱孔思妻白氏舊浙江通志薊州人適餘姚朱孔思思以縣尉需次卒於京殮畢氏自刎靈前賜葬建坊有司春秋祀之金一龍妻黄氏明列女傳一龍早歿氏截髪自誓與姑相依崇禎十五年熊氏子欲娶之母黨利其財紿令還家間道送於熊氏知勢不可挽願搜括所有以償聘金不聽相持至夜深引刀自刎未殞其姑聞其事急趨熊視之氏曰婦之所以未即死者欲姑一面耳今復何求遂剜喉以絶邑令聞之斃熊氏子於獄王烈女舊浙江通志王篤菴女年十三許字黄百學未歸篤菴殉難女為營將所掠有劉弁欲娶之奪劍自刎弁義之以劍殉其葬徐陳二節餘姚縣志徐士觀妻孫氏夫喪畢不食死陳尚禎妻景氏夫死亦自縊死孫元吉妻陳氏魏仲孫妻霍氏滑志能妻汪氏邵宏學妻汪氏史錦妻楊氏徐逯妻祝氏王忠妻陳氏胡鏜妻謝氏徐選妻張氏黄忠妻周氏吳天祚妻陳氏毛􅌔妻潘氏胡悦之妻黄氏楊芸妻薛氏謝選妻陸氏徐文元妻章氏聞人才妻黄氏諸永言妻鄭氏魏朝龍妻孫氏潘秉彞妻徐氏黄綺妻范氏余乾妻施氏史鸞妻陳氏任正妻潘氏邵潮妻鄒氏張一致妻蘇氏邵童妻陸氏韓塤妻項氏翁璧妻錢氏王紳妻范氏王綺妻鄒氏顧蕙妻高氏顧􅉅妻王氏王爚妻陸氏王灴妻陳氏黄稔妻章氏黄國宗妻應氏周如登妻沈氏謝用模妻吕氏諸暲妻蔡氏史立恒妻潘氏唐景禹妻徐氏陳孟愷妻傅氏邵垈妻陳氏陳克華妻楊氏諸璧妻李氏陳有智妻李氏陳有容妻姚氏楊山妻徐氏聞詩妻李氏嚴金妻翁氏楊九韶妻羅氏鄭養銳妻于氏滑鳳妻陳氏翁守成妻韓氏翁宗實妻袁氏翁煇妻周氏施良心妻吳氏邵洪化妻洪氏國朝阮邦尹妻張氏題旌冊年二十四夫亡苦節自持時上有翁姑下有三子氏婦容不飾紡㫖建績奉養康熙二十五年具題奉坊旌表謝某妻傅氏題旌冊年二十八夫亡矢節教子春景子卒又教諸孫曽有成厯七十餘年壽百歲先是翁姑在堂氏事之甚孝姑常祝之曰好媳婦願汝多壽多子孫至是果驗康熙五十二年㫖建奉旌表坊邵煊妻朱氏題旌冊年二十而寡事後姑先意承志姑晚年病牀三載氏調湯藥衣不解帶㫖建獨任勞勩不以委之他人雍正三年具題奉坊旌表謝盈若妻景氏題旌冊年二十三而盈若卒氏矢志不二守節二十八載雍正六年具題㫖建奉旌表坊蘇滋忭妻聞人氏題旌冊年二十四歸滋忭為繼室滋忭舉進士授四川丹稜縣之任卒於途氏時年二十七迎柩於途哀感路人家貧罄奩資竭力營葬撫教前妻子新鉞為諸生有文名氏晚年猶勤女紅未嘗聞笑語聲雍正八年具題奉㫖建坊旌表朱葵忠妻周氏題旌冊年十七歸葵忠葵忠亡周年二十八孝養舅姑舅姑病輒龥天求代及卒喪葬盡禮敎子不吝脩脯嚴於督課至夜分絡緯聲猶與書聲相間也守節三十二載雍正㫖建九年具題奉坊旌表毛應昌妻洪氏題旌冊年二十五夫亡舅因哭子喪明氏奉養十年克盡孝敬及歿經營㫖建喪葬撫子成立雍正十年具題奉坊旌表華志登妻厲氏題旌冊年二十八而志登卒氏撫子守節四十三載雍正十一年具題奉㫖建坊旌表鄭子凝妻朱氏題旌冊年十九歸子凝甫半載子凝卒舅姑以長子之次子為之後氏長跪請曰姪與媳年相若願更得幼者舅姑韙之乃易以弟襁褓兒也氏撫教成立守節三十八年翁成德妻葉氏題旌冊年二十三夫亡遺孤未晬氏毁容自勵子稍長每泣語之曰吾不望爾貴顯第能讀書吾願畢矣子受母教讀書入泮姑早喪舅年八十餘疾篤隣人不戒於火將延至室氏長號籲天曰舅病不能出氏豈能獨全乎言訖囘風返火人咸異之守節三十五年周諸嵋妻蘇氏題旌冊年二十九而寡無子以猶子為子屏絶膏沐終身布衣椎髻守節㫖建二十五年坊旌表以上三氏俱雍正十二年具題奉黄鏞妻汪氏紹興府志順治五年山寇亂鏞與汪氏俱被執逼汪上馬不從斫之仆地至家而絶時又有黄聖質妻姚氏兵逼之以兩手抱桑樹斫其首首倒垂而抱如故又黄文備女兵逼之雙手握其裏衣斫死其手猶不可拆姚婦馬氏被驅出門投洋溪死沈之泰妻吳氏事迫亦自縊死茅貞女餘姚縣志名志茅其蕙女許字陳廷簋未納采而陳死富室張氏子聞其賢力求焉將舉媒妁女沐浴更衣自經以死鄭養鋭妻于氏紹興府志年十七歸養鋭未幾卒家貧夜織絍課兒苦讀尤敬事舅姑得其歡心子光國順治戊子舉人陳四七妻項氏餘姚縣志歸陳數年而夫死舅姑勸之改適氏曰舅姑無他男何以為活未幾舅姑死家業零落廬舅姑墓側紡績自給嚴三接妻錢氏公舉事實氏幼喪母育於祖母趙年十四祖母疾篤氏刲股投藥而疾愈後父病亦如之夫病亦如之股凡三創而三愈姑患臌翁患膈皆衣不解帶奉侍不倦徐宏基妻胡氏鄒光繩妻葉氏鄒光紀母郁氏孫德光妻魯氏盧時遵妻黄氏朱岐妻李氏韓子龍妻陳氏鄒珽妻柳氏陳大魁妻邵氏吳文龍妻徐氏鄔應高妻陳氏沈景怡妻劉氏蔣煜妻童氏邵洪化妻翁氏倪洪炎妻許氏王貽植祖母黄氏上虞縣漢曹娥邯鄲淳曹娥碑上虞曹旴之女也旴能撫節按歌婆娑樂神以漢安二年五月時迎伍君逆濤而上為水所淹不得其尸娥年十四號慕思旴哀吟澤畔旬有七日遂自投江死經五日抱父屍出度尚設祭誄之上虞孝婦後漢書孟嘗傳上虞有寡婦至孝姑年老壽終夫女弟誣婦厭苦供養加鴆其母列訟縣庭郡不加尋察結竟其罪孟嘗為吏知枉狀備言之太守不為理婦竟寃死自是郡中連旱二年後太守到官嘗具陳寃誣之事因曰宜戮訟者以謝寃魂庶幽枉獲申時雨可期從之刑訟女而祭婦墓天應澍雨穀稼以登謹按萬厯上虞縣志作包孝婦孟淑於越新編中郎將質之女當嫁適聘禮至為盜所刦淑祖對戰不敵見害淑以致盜由已哀慟毁形曰淑以身害祖雖活何顔於是自經而死宋朱娥宋史本傳上虞朱囘女也母早亡養於祖媼年十歲里中朱顔與媼競持刀欲殺媼一家驚潰娥獨號呼突前擁蔽其媼手挽顔衣以身下墜顔刀曰寧殺我毋殺媼也媼以娥故得脱娥連被數十刀猶手挽顔衣不釋顔忿怒斷其喉以死事聞賜其家粟帛其後㑹稽令董皆為娥立像於曹娥廟歲時配饗焉顧生妻俞氏徐一夔上虞顧生墓誌穆爾古蘇為元守越生團結鄉兵以應方氏侵上虞與戰遇害其配俞氏盛年而寡事姑以孝聞敎其子皆有成立寡居三十年能使家貲裕於夫在時冰雪自守前後如一日内外無間言明柳氏二節宋濓柳氏二節傳柳宗逺妻唐氏及其子桂之婦陳氏也初唐年二十三歸宗逺事其姑孝越二年生子桂而宗逺卒苦心瘁力營粟帛以養姑命桂學詩書姑年八十餘乃終桂長娶陳氏為婦逾年桂亦卒陳年甫二十四或憫陳無子勸其再配陳哭曰吾姑不負吾舅吾敢負吾夫乎吾寧即死柳氏牖下不願聞他語也乃與姑相依以居姑食然後食姑寢然後寢家内外事必告而後行姑婦孝愛如母子盧氏二節𢎞治紹興府志盧用濟妻陳氏年二十二而用濟殁無子抱夫姪伯寧為後伯寧長為娶婦樊氏亦早卒姑婦相依至老孫景雲妻鍾氏萬厯上虞縣志景雲登進士授玉山令夫婦相敬如賓氏年二十二而景雲卒於官且乏嗣氏至夜分密設椅桌於夫之座右沐浴更衣縊於座上厥明姑舉其屍於袖中得銀一錠題曰買棺詔旌其門而景雲亦祀名宦云陳氏三節萬厯上虞縣志龔氏陳榛之妻年二十夫亡撫子國華娶沈氏國華亦亡沈年二十一遺孤文奎長娶馮氏未久文奎又亡三世孤燈僅延一息事聞詔以三節旌其門葛璋妻蔡氏兩浙名賢録年十七歸璋明年璋卒里中兒屠某謀欲娶之其姊蔡妯娌也假他事紿與姊㑹而屠從傍竊視之氏覺哭曰何顔再生人世耶奉舅姑夜膳畢沐浴服衰自縊死成孟吉妻唐氏萬厯上虞縣志夫卒氏年二十一遺孤甫五月室如懸罄老姑相依為命父母諷使更適繼且逼之唐斷髪跣足若廢人然由是無敢言者養姑育子至七十餘終盧憲章妻俞氏於越新編年二十生子女各一憲章卒子亦卒誓無他志有富室欲娶之者俞聞即縊以家人救得免復有陳姓貴者以威力脇之俞度不免乃紿入更衣竟縊死時隣有金婦孀居聞之亦自縊唐氏二節萬厯上虞縣志許氏唐亮妻亮卒許年二十四遺孤偉為娶錢氏偉亦早世錢年方十九事姑孝養剪髪自誓後姑喪明錢扶持益力姑婦相依如母子者四十年范廣瀚妻吳氏萬厯上虞縣志年十八適廣瀚二年廣瀚卒貧無立錐叔廣沔迫令改適窘辱備至氏嚙指截髪自縊者數四里媼有憐之者曰汝家貧無倚復遭内訌何自苦如此氏泣曰吾知有死耳豈負亡夫哉淚墮皆血矢志益堅竟以壽終徐萬選妻陳氏上虞縣志幼而警敏知書能詩年二十適萬選萬選病羸死家人環哭忽不見氏亟呼之已扃門縊矣救之移日始甦自是絶飲食父母來奪之歸奄奄不起一日遣人抱遺孤復姑且口占詩送之曰今日兒生離明朝娘死别兒去不知娘娘死向夫説遂瞑一紙置拇指間云尋夫萬選妻陳氏七字將殮取手中紙堅不可拔時年二十六陳孝女上虞縣志陳志竣女天性篤孝及笄值母病劇剪股以進母死女亦哀號哭泣以死潘景鏞妻俞氏俞宗琳妻章氏劉禧妻陳氏張廷揚妻陳氏葉廉妻祝氏陳大純妻史氏徐廷仁妻丁氏曹顯妻吕氏曹琪妻屠氏車廷珏妻朱氏徐彦明妻孫氏羅明二妻王氏姚守約妻宋氏葛棐妻劉氏顧院妻何氏劉鳴陽妻黄氏陳宏兆妻倪氏竺方妻薛氏徐郡妻馮氏徐振德妻丁氏唐應奎妻吕氏林苓妻胡氏葛之㤗妻徐氏徐如山妻邵氏許成義妻陳氏俞仲溥妻陳氏國朝倪子瀚妻周氏題旌冊適倪七載而夫亡守節十七年至四十三歲而卒雍正二年具題㫖建奉旌表坊黄榮昌妻羅氏題旌冊年二十三姑亡夫繼歿無嗣氏拮据二喪盡禮服闋祭畢即闔戸自縊叔姑救甦與夫之寡嫂同居共撫姪原成立年八十四猶勤紡績雍正三年具題奉㫖建坊旌表范氏二節題旌冊姚氏范鼎㤗妻羅氏其媳也姚年十九姑與夫相繼亡遺孤自起僅周歲家貧其兄勸之嫁姚手執裙刀厲聲曰兄妹也何出此言必欲相逼有死而已勤苦撫教自起補弟子員初娶某氏無子早亡繼娶羅氏生一子三歲而自起卒姑媳雙寡撫孤廷耀成立生三子能繼家㫖建聲雍正五年具題奉坊旌表羅益兹妻蔣氏題旌冊年十八適羅夫卒於京氏年二十八子甫周歲訃聞氏念夫柩未返乃鬻簪珥同父蔣星移姪蔣某赴京奔喪而父與姪俱卒於外氏隻身扶三柩歸里育子成立守節至六十歲而卒潘元賓妻陳氏題旌冊年二十歸潘姑孀居病瘋臥牀即脱簪珥營醫藥歷久無倦六載夫卒彌留時語氏曰吾素知子志病姑弱子惟子是賴氏涕泣受命於是奉養益䖍訓子益力守節三十七年潘世貴妻周氏題旌冊年二十四歸潘二十七而寡家貧舅姑老氏嘗每食不飽而舅姑甘㫖必備子長教以詩書家聲不墜守節三十一年以上三氏俱雍正九年具題奉㫖建坊旌表趙顯伯妻柴氏題旌冊年二十適顯伯閲一載而顯伯亡繼姪志學為後家貧鬻衣飾以養舅姑衣飾盡則晝夜紡績以給朝夕有憫其勞瘁者氏曰吾夫彌留之際以兩老人托我敢自愛其力耶舅姑壽終營喪葬守節三十四年雍正十二年具題奉㫖建坊旌表張宏議妻王氏題旌冊年二十二夫亡子未晬姑老且病性卞急臥床褥間有所欲即難致者必立購以進呼之雖中夜不敢遲頃刻姑没喪葬盡禮子稍長督課甚嚴不為姑息愛守節三十二年雍正十三年具題候旌王肅三妻張氏舊浙江通志順治戊子山賊亂被縛置馬上經交水橋躍入水中觸石破顱死又徐炳龍妻陳氏避匿黄家嶴不辱被害謝宏濟妻車氏山賊陷城躍入城河死車元衡妻徐氏以利剪刺喉死鄭宗英妻張氏舊浙江通志山寇出没氏與其姑避入珠龍山忽有寇至掠張以行行里許乘寇不及防躍入施家池死葛承憲妻陳氏上虞縣志年二十三承憲亡子幼先姑族有盗者承憲擯斥之乘承憲亡欲殺其婦及子氏避得免盜焚其廬後苦積復構堂伯某以祖塋盜賣於人氏罄家貲以贖事舅孝課子二龍三友俱邑庠生周國光妻章氏上虞縣志國光死氏年十七族人以無子家貧勸之他適氏持刀欲自殺遂莫敢言形影相弔苦節數十年始終不二謝采妻葛氏紹興府志當未適時采冒狂疾及嫁殫力調䕶垢穢不辭年二十五采卒氏以死自誓病不服藥卒宋大賓妻黎氏上虞縣志年二十大賓患病浹歲漸劇氏即治棺及殮衣各二人皆異之大賓歿殮其夫訖隨衣所治衣自縊於棺側墓葬皂李湖東唐裕妻張氏趙之鼎妻張氏趙則乾妻陳氏張起龍妻項氏鍾强妻任氏曹夢斗妻王氏徐啓聰妻李氏陳尚禮妻俞氏石元道妻陳氏陸尹淳妻陳氏謝國武妻王氏陳元新妻龔氏徐禄妻章氏金文煥妻竺氏朱寰之妻張氏鍾省一妻虞氏唐聞樂妻潘氏陳允敬妻謝氏陳鼎和妻顧氏王寅妻陳氏陳範妻袁氏馮宸鑣妻符氏徐承宣妻陳氏謝宏功妻徐氏陳季玉妻黄氏嵊縣晉公孫夫人於越新編剡人失其夫姓名以節操聞鈕滔母孫氏為之作序贊南北朝韓靈珍妻卓氏南齊書孝義𫝊㑹稽剡人靈珍亡無子氏守節不嫁慮家人奪其志未嘗吿歸陳嫠兩浙名賢録剡人少寡與二子居好飲茗宅中有古塜每飲先祀之二子欲掘去母禁而止夢一人曰吾止此三百餘年賴相保䕶又饗吾佳茗雖潛壤朽骨豈忘翳桑之報及曉於庭内獲錢十萬陳年九十終元商淵妻張氏於越新編名貞時兵亂聞白泥墩有一婦掠於軍賦詩自經曰一旦危急當如此至正年兵至果赴水死胡氏妙端輟耕録適同邑祝某至正庚子為苗䝤擄至金華縣將妻之義不受辱乘間齧指血題詩壁上已赴水而死䝤帥服其節為立廟祀之曰烈女廟詩曰弱質空懷漆室憂搜山千騎入深幽旌旗影亂天同慘金鼓聲摇鬼亦愁父母劬勞何日報夫妻恩愛此時休九泉有路還歸去那箇雲邊是越州明張氏二節嵊縣志張彦聰妻范氏及其弟彦明妻錢氏范年二十一適彦聰五年舉一子甫週夫卒錢年二十九子在襁褓夫亦卒妯娌矢志靡他家貧值兵興喪不能舉二婦日夜號慟鄰人憐之相與舁櫬葬先塋側二婦攜孤廬墓傍洪武年旌表曰隻節盧氏二節𢎞治紹興府志西寧衛知事盧允中於洪武十五年西征而没婦許氏年二十六允中弟允端亦早亡其婦黄氏年二十四泣曰盧氏不幸兄死於外弟歿於家吾妯娌命薄故耳相與竭力奉姑人稱其孝二婦各年八十而終應源妻錢氏於越新編名宜源贅之無何源還父家卒宜年十九聞訃偕母往觀殮母促之返宜曰此兒家也焉返耶已而營夫墓即造兩穴既葬母乂促之不得已偕返勸之嫁不可令隣媼諷焉又不可母强未已乃引繩自縊覺而救之始聽歸夫家源無子以姪則民為子年八十餘卒𢎞治間旌表姚旭輝妻屠氏嵊縣志旭輝貧役於公氏勤紡績供舅姑或不繼遭詬詈則婉愉以承之夫免役歸家益窘謀出婦婦痛陳堅志詞極酸楚不聽乃宻紉裏衣夜啓户出抱石沉百尺潭而死裘烈女紹興府志許字史自和未娶自和罹重辟入獄女欲一見之不可得聞以讞出女隨父至南溪隔樓遥問曰君可終脱否自和謂獄成無生理願子自擇良偶女抆淚歸自縊死羅某妻黄氏舊浙江通志夫喪舅且耄夫弟欲亂之氏覺宻綴其衣不寐者累月竟自縊死李廷獻妻周氏嵊縣志夫歿氏年二十三遺孕三月小姑屢危之謂孕未必男男未必長氏曰孕即非男男即不長吾無他志生子振才孱弱小姑曰如不保奈何須早為計氏志益堅雖凍餒屢經不少變謝源妻袁氏王瓊妻石氏王慕妻陳氏王􅲳妻韓氏王應坤妻李氏王莊妻張氏王應星妻施氏王和賓妻姚氏王繼選妻俞氏姚安輝妻吳氏姚學箕妻王氏姚仍妻孫氏李光堯母胡氏吳有本妻石氏鄭郊妻王氏吳梓三妻詹氏鄭蕃一妻諸氏鄭景六妻鮑氏鄭本深妻胡氏金汝發妻鄭氏國朝錢斐章妻邢氏題旌冊年二十一喪夫舅姑父母勸其改適氏聞言即涕泣誓死遂止雍㫖建正五年具題奉坊旌表周思孝妻盧氏題旌冊歸四載夫溺死氏奔哭溪邊欲以身赴水其姑曰爾有遺孕倘得子吾兒猶不死也今俱死我何望乎亦欲投水氏遂止於是奉姑撫子守節終身尹定宸妻王氏題旌冊夫死守志養舅姑撫子以終宋君惟妻沈氏題旌冊夫死家貧甚守節事舅姑喪祭盡禮人稱其孝孫嘉馨妻王氏題旌冊夫早亡氏守志不二家貧孝事舅姑冰霜之操始終如一商貞女題旌冊許聘吳志洽未婚而志洽卒女聞訃即欲奔喪父母不許乃易服誓志守貞以㫖建上五氏俱雍正六年具題奉坊旌表趙羲日妻朱氏題旌冊年二十一夫亡遺娠生一子又孱弱多疾而氏堅操不二卒能撫㫖建孤成立守節三十三年雍正八年具題奉坊旌表錢鼎為妻馬氏題旌冊年二十三夫亡舅姑老氏養生送死無遺憾撫三歲子至弱冠遊庠守節三十三年喻恭咸妻王氏題旌冊年二十三夫亡遺一子殤乃撫族姪為嗣撫訓成立家故有宗祠春秋會族人祭祀歲久傾圯氏獨捐資重葺守節五十七年以上二氏俱雍正十三年具題候旌周某妻夏氏舊浙江通志居鹿苑山官塘順治丙戌山寇突至殺其夫與家屬八人見婦麗欲辱之不屈死於刃周清新妻胡氏嵊縣志胡承達之女適周後歸寧母家下相村適山寇至逼不受辱被創母金氏冒死奔救並遇害時又有鄭品二妻陳氏被逼投長橋潭死尹燦妻唐氏逃難入山仇家掠其貲懼辱死之沈祖述妻陳氏嵊縣志年十五夫亡遺腹生子守𤾉娶吳氏守暘亡婦亦守節無嗣繼一子娶吳氏夫又夭克繼貞操有司表其閭邢克威妻胡氏嵊縣志年十九夫亡氏兄弟以無子欲奪之氏曰兄弟不我知尚誰望焉遂自縊死孫清五妻張氏嵊縣志父名俊貧弱獨居沙塢贅清五相依里有劣生董信謀奪其婚訟於官縲繋其父兄氏曰以我一人貽一家辱我不死事不白遂閉門自經死孫日恭妻吳氏錢子文妻吳氏錢雲集妻邢氏過廷用妻奚氏過廷舉妻王氏裘曰彦妻張氏裘廷器妻王氏裘繼旻妻周氏裘允登妻應氏裘三策妻史氏裘尚友妻應氏裘素妻吳氏史原壽妻陳氏史佳元妻邢氏張妻王氏張侈妻邢氏董和妻姜氏吳振寰妻劉氏周亮德妻尹氏周琅妻吕氏周亮清妻錢氏周妻馬氏周家祺妻邢氏邢便善妻商氏邢淙妻張氏邢魯母錢氏邢堯妻商氏邢本肅妻朱氏邢鑑妻吳氏邢鎮妻史氏邢釵妻吳氏許如朝妻葉氏周璉妻俞氏周楞妻高氏尹琦妻趙氏尹紹信妻魏氏尹志本妻張氏尹志尚妻韓氏鄭金妻宋氏喻通妻王氏胡成義妻周氏袁祖興妻張氏丁一松妻董氏新昌縣宋劉安世母石氏兩浙名賢録新昌石亞女安世除諌官以母老辭母曰諌官當捐身報國汝但好為之若得罪流竄無問逺近當從汝後果南遷石欲與俱安世百端懇免不聽徧歴惡地母子終無恙石烈女兩浙名賢錄石公巖女方臘寇縣女被執紿曰願容粉澤賊聽之取剃刀自剄死張行先妻王氏於越新編早寡矢死靡他咸淳中以子貴封太孺人壽百歲吕瓊妻石氏兩浙名賢錄瓊逃元難溺死錢塘江石適歸寧夢夫吿之故且云側室吳氏今育男六指盍歸視之石氏寤而駭愕徒步走歸則生男果六指也既喜且泣已乃得夫凶問遂哀泣撫孤與吳偕守元張減妻章氏於越新編名孝行至元二年從姑逃亂為軍所掠不從遇害姑在叢棘中抱其屍慟哭而絶黄元珪妻余氏成化新昌縣志至元丙子歸寧父母值南征軍馬過縣母家被火家人走散軍卒擁余氏出自知不免奮躍入火而死周烈女元史本𫝊周如砥女年十九未適人至正二十年鄉民作亂如砥與女避於邑西之客僧嶺女為賊所執賊曰吾未娶當以汝為妻女曰我周典史女也死即死豈能從汝耶賊遂殺之如砥時為新昌典史張彌逺妻謝氏成化新昌縣志至正庚子三月為賊所擄迫脇備至不屈而死明唐方妻丁氏名山藏名錦奴洪武中方為山東僉事坐法死妻子當没入官押卒欲挑錦奴從錦奴借梳掠鬢錦奴擲梳地下予卒卒掠畢持還錦奴不受竊謂家人曰此輩無禮必途辱我不若預為計行至陰澤崖峭水深四無援路從肩輿躍下投水中衣厚未沉以手斂裙隨流而逝押卒數輩驚救至則死矣今稱其處曰夫人潭石士嘉妻吕氏成化新昌縣志名清明婚三月而寡時年二十守節至七十八而終姑蘇沈周為作石節婦詩石孝女名山藏父潛洪武末坐事籍没繋京獄妻吳走依父家以居一日潛亡歸匿吳吳兄弟懼連坐遂殺潛投尸大窖中時孝女襁褓耳既長問母曰何無父族母吿之故女大悲憤永樂初年十六舅氏以配其族子女白母曰殺我父者吳也忍事其家廟耶母曰我不幸寡事不由我奈何及期已届將治裝歸吳禮賓未畢女雉經室中衆驚愕詰其母母仰天哭曰吾女之死為父報讎也號慟數日亦死有司聞之為治殺潛之罪吳八娘於越新編父緡早卒女未及笄母石氏泣謂曰我幸有孕若生男則汝父為不死矣奈家貧何女誓曰倘犬祐我父使有弟願在家輔之後果生男遂堅守前誓母欲為贅壻不可曰有壻即有外心遂終身不事粉澤日夜拮据無少怠年七十六卒葬銅坑陳家塢丁烈婦萬歴紹興府志御史劉忠器之子婦也忠器居官亷既歿諸子不善治生家益窘氏拮据茹荼卒不能支其夫欲鬻之氏不可夫潛受聘氏歎曰婦有二夫犬彘也乃沐浴更衣自縊死張氏二節新昌縣志董氏張舜士妻伉儷甫及期夫遘痎瘧彌畱時遺命他適氏以死自誓後垂老病革取導髪角簪一枝以從殮簪刓敝過半蓋與夫所誓故物也子尚才娶石氏而夭石與姑同守人謂之清河雙節章爾程妻張氏舊浙江通志張立朝女夫亡舅宗愚任四川灌縣流賊陷城氏與父皆在署中父遇害氏抱屍慟哭罵賊自焚死何遵道妻吕氏王廷玉妻石氏張堙妻章氏俞鈊妻王氏石潠妻吳氏吕廷安妻張氏潘憲榮妻王氏章懷德妻張氏陳眸妻吕氏張懷經妻袁氏張伯蘭妻丁氏俞明德妻董氏吕仲易妻蔡氏妾韓氏吕原學妻俞氏陳蕡妻王氏趙學柱妻俞氏國朝吕亮中妻陳氏題旌冊夫亡無子年方少艾家貧甚誓不再嫁姑老紡織供養不怠雍正㫖建六年具題奉坊旌表吕新憲妻張氏新昌縣志生二子夫亡二子繼喪或勸以他適即持利勿自刺隣母力救免自後藏利刃於枕晝夜織絍自給以終其身王茂芝妻梁氏新昌縣志生一子甫三歲茂芝卒氏誓死不二父母微諷之輒大慟入粧閣書衣衿云裙釵自是一孤身節比松筠不改真父母豈知情誼重願將完璧報良人自是勤紡織供姑甘㫖姑傷足痛楚氏扶掖撫摩揩拭臭穢歴十餘年姑忽起行坐如舊人以為孝感孫景山妻吕氏舊浙江通志有營卒犯之吕堅拒不已自以剪刺喉死俞氏三節新昌縣志石氏俞應允妻年十九歸應允三載生子心尹未數月夫亡其姑黄氏亦年二十六而舅秉佳亡守節家貧石遂與姑同寢處紡織自給撫育心尹長娶翁氏生孫二翁亡續娶吕氏又生孫五而心尹亡吕氏年三十亦同姑苦守貞節之操後先輝映云吕曾榯妻陳氏陳世彰妻俞氏陳學尹妻潘氏陳修疆妻何氏吕忠顯妻章氏吕爾葉妻潘氏章乃成妻吕氏楊應春母蔡氏楊應春妻舒氏楊曰煥妻王氏陳日章妻潘氏石宏化妻張氏袁大器妻胡氏袁鳴聲妻俞氏陳昌言妻俞氏潘以秀妻袁氏吕泌妻李氏潘沐日妻吕氏俞立道妻韓氏浙江通志卷二百十
