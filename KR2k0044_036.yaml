body:
  text: 浙江通志卷三十七關梁五台州府臨海縣附郭平橋赤城志在州治小廳前宋淳熙十五年宗守頴重建跨池為屋左右植芙蓉曽幾平橋詩浪説吾邦小清池思有餘水風涼枕簟芳氣馥衣裾客位經過少官曹簿領疏良辰不行樂秋水落芙蕖悟真橋明一統志在府治東北宋張平叔所居之地赤城志舊名黃牛坊橋慶元三年葉守籈更名狀元橋赤城志在州東一里陳侍郎公輔居之臨海縣城外關梁中津橋輿地紀勝在縣南一里修八十六丈廣一丈六尺宋淳熙八年守唐仲友建唐仲友修中津橋記郡介栝蒼天台間城臨三津其中最要道招舟待濟寒暑尤病仲友以淳熙庚子來守自念承乏牧養大利可作乃分官吏庀工徒度髙下量廣深立程度以寸擬丈創木樣置木池中節水以效潮進退觀者開諭然後賦役始於四月丙辰成於九月乙亥築兩堤於皇華亭之東甃以巨石貫以堅木載護以災楗中為級道兩旁為却月形三其層以殺水勢南堤上流為夾水岸以受水衝堤間百十有五尋為橋二十有五節旁翼以闌載以五十舟舟置一碇橋不及岸十五尋為六筏維以柱二十固以楗筏隨潮與橋岸低昻續以版四煆鐡為四鎖以固橋紐竹為纜凡四十有二其四以維舟其八以挾橋其四以為水備其二十有六以繫筏繫鎖以石囷四繫纜以石獅子十有一石浮圖二纜當道者植木為架遷飛仙亭於南岸遷州之廢亭於北岸以為龍王神之祠為僧舍及守橋巡邏之室二十有一間凡橋闌舟筏竹纜之須用錢九百八十萬既成因其地名曰中津銘曰台江之津憧憧往來橋之未作吾民其咨豈無智謀亦阻浮議橋之既成其勤在繼矜吾民兮閔吾勤兮永詔厥後見斯文兮赤城志紹熙元年江守乙祖慶元元年周守曄二年劉守坦之嘉定四年黃守畇六年余守建皆重修之劉更名慶元黃仍其舊十五年齊守碩逆防其壞大加崇葺舟補舊者四十創新者十有四布版道二十有九鈎闌一百六十有二又以餘財别為舟五穴南岸藏之以備異時更易臨海縣志明𢎞治初郡守馬岱置田九頃八十一畝歲課租銀九十八兩以供歲修今廢正德間郡守顧璘重修歲僉橋夫二十名守橋以防橋船漂失國朝順治十八年造石橋成移於上津西門外康熙二十五年石橋壞於大水仍遷浮橋於故地上津橋台州府志在朝天門外舊時亦有浮橋兵燹後橋廢馬守岱所捐田盡遭隱占國朝康熙三十八年知府閻承詔查出捐田四百五十餘畝重建上津浮橋並將租銀及臨太兩邑欵銀詳請各分一半為橋夫工食及歲修之費後壞於大水五十三年知府張聯元清查租銀欵銀並捐俸重建歲加修葺通詳勒石赤欄橋廣輿記府城臨海門外晉成公綏為章安令嘗登橋望江作雪賦臨海縣志又名章安橋其上有亭東西有樓懷義橋輿地紀勝在縣東二里乾道六年守向汮建交禮橋赤城志在縣東二里一作交鯉因唐開元中蛇與鯉鬬而名臨海縣志因大固鄉舊有交禮里故名吉祥橋明一統志在縣西三里宋天禧中建赤城志以近吉祥寺故名乾道六年亭其上通明橋赤城志在縣東三里以其路通四明故名台州府志宋有十將鄭者居之又名十將橋溪流原抱城南下後決而東國朝康熙五十八年知府張聯元修復形勝東築巨壩俾溪水由橋下直入東湖合流靈江亦使城壕水深便於防禦大固橋臨海縣志在縣東一十五里赤城志一名雙橋濱溪舊多梅花錦衣橋台州府志在縣東二十里舊為邵家渡以明布政蔡潮出已衣以成橋故名九星橋台州府志在縣東一百三十里宋乾道間建有九洞三十六渡赤城志在縣東二十里自潮漈東至小芝凡三十有六節故名三江渡臨海縣志在縣西十五里舊有官渡歲久漸壞明嘉靖戊戍同知朱世忠邑令劉大直移徙上流里許築大埠造巨舟建濟川堂買廢寺田三十畝給篙工民多便之蔣鳴玉三江渡詩靈江活活自西來潮口沙鳴兩岸回萬木參天渾未曉鳴榔一響霧中開黃巖縣縣橋赤城志在縣南一十五步宋宣和五年建黃巖縣志明隆慶二年楊令廷表重修增二橋於左右利涉橋嘉靖浙江通志俗稱浮橋在縣北一里台州府志在澄江上舊為江亭渡宋嘉定四年楊令圭建長一百丈廣三丈為台溫通衢葉適利涉橋記嘉定四年二月黃巖縣浮橋成林鼒叔和為其知縣楊君言曰橋長千尺籍舟四十欄箘繂索隄其兩旁棞圖狻猊訖三十旬斤鐡九千木石二萬五千夫工六萬餘縣東南車馬擔負而客之塗皆達於橋西北樵採携挈而民之市皆趨於橋諸公跨天台陟鴈蕩行過黃巖皆喜曰增一橋矣蓋奔渡爭舟傾覆蹴踏之患既免而井屋之富㕓肆煙火與橋相望不絶甚可壯也台州有橋自唐守始君一縣作之抗其力如州倍難也願子記以為君酬豫少從叔和兄弟遊每為豫言縣直北山爽氣浮動花栁之麗雪月之勝無不在江北豫間至程頭必徘徊顧瞻輒阻江而返屢矣今既橋而叔和與邑人日曳杖娛戲於北山潮生汐落隨江降升悠然如泳漢浴沂以歌詠令君之遺德而余已老不復有四方之事徒慨想而不能從也因附見之亦以志豫之不忘斯遊爾舊設利涉橋田千餘畝蠲其他徭貯租以備修理費不及民公私兩便明成化間折其半𨽻太平𨽻黃巖者六百二十二畝有竒潘士驥利涉浮橋詩陽侯欲截澄江道江北江南天杳杳魚貫輕舟影不流蟻移過客何時了幾回吹斷西風顛雲斤月斧費萬錢沙禽冷眼崖花笑空山有石無人鞭孝友橋赤城志在縣西一里修六十丈廣三丈跨大江别浦宋元祐中令張元仲纍石為之元仲字孝友因以名橋慶元二年圮於水縣人趙伯澐重建築為五洞橋面亦五折取道其中坎兩旁以竅水翼闌其上視舊功十倍焉今但呼西橋潘士驥西橋秋月詩玉虹橫處隔市喧夜痕冷浸青青天風生萬籟瀉金液風定一顆摩尼圓飛步如逰桂香陌影濕虛闌和露拍蘆花灣近霜鴻驚亂啼錯認東方白東浦橋赤城志在縣東北一里許即混水閘橋桂枝橋赤城志在縣東二里左㻫居之宋紹興二十八年建利渡橋台州府志在縣西十五里舊為斷江渡江流湍悍人多溺死明袁令應祺建橋成於萬厯己卯秋名利渡秦鳴雷利渡橋記黃巖邑在山海間往來之道非緣崖而躋即跨江而渡若橘江視他渡特險艱於濟焉肖海袁侯涖治問民所疾苦而興革之於是居民羣入以告侯曰是誠不可已顧帑無羡資乃捐俸為倡逺近聞侯意爭相捐助唯恐後乃以僧元藴練實可任悉以委之僧乃測江之南北若干尺分為七梁梁廣如長數而殺其二鍥趾所立皆以身泅於水而定之已乃攢木以抵衝懸機以引縴蓋慿虛搆實務俾堅好以為永利比成侯以酒往落命以今名得勝橋黃巖縣志在縣東南三十里宋宣和中建赤城志宣和寇亂逼南鄉翼日與寇戰廟前橋上見神立空中飛矢石如雨寇驚走南鄉得全故名丁家渡台州府志在縣西五里有丁婦死節於此故名黃巖縣志明嘉靖間教諭黃統仁捐資治舟割田三畝募舟夫以便往來亢山渡黃巖縣志在縣西二十五里里人鄭于礦造舟以資往來置田以備修理鄉人德之天台縣孝義橋台州府志在縣東九十步宋淳化元年建以近孝義坊故名臨川橋嘉靖浙江通志在縣西一里赤城志舊名西橋宋隆興二年令王琰絫石而建且亭其上琰臨川人故名陳騤臨川橋記隆興元年冬十月甲戌臨川王琰新作橋於邑西之溪從民欲也溪距邑庭可一里聫彴以度歲作歲圮編氓苦其役逮公之來會費五百萬錢出俸四十萬為邑先爰即故址營之穹石以為楹巨木以為梁甓以培石灰以塗甓二年閏月丙辰告成公率僚友觀之僉曰大夫之力也願即以臨川名遂歌以落之曰壯哉滄溟跨蛟龍麗兮霄漢垂螮蝀疑若有神施磨礲鞏然不動嶄華嵩環瞻山幄凝翠空俯睨溪紋織微風夜半橫浮沆瀣中朝來掩映扶桑紅車馬颯沓西復東宏規碩利繄誰功競將大年壽我公願與此橋俱無窮天台縣志元祐五年水壞復修亭廢明永樂七年暴漲衝壞知縣張坰委陸孟洋許均重建國朝康熙六年知縣侯仁爵率里民陸必捷薑承齊等重修思賢橋天台縣志在縣西二里赤城澗上宋嘉定二年令詹阜民有德政秩滿邑人送至此刻石名橋以紀善政又名迎賓橋橋側宋儒潘子善故宅在焉圖經云咸平五年建後壞明萬厯十九年義官許榜重建長洋廣濟橋台州府志在縣十八都長洋澗上明洪武年間建宋濓長洋廣濟橋記天台縣西二十里有山曰鷓鴣二水發源其間合流至長洋復折而西與大溪滙然後滔滔東逝當夏潦秋霖水驟進氣勢奔突咫尺如隔秦越里人壘石為小橋不能殺水怒竟蝕而去邑大姓洪紹生憂之乃集子姓與謀纍址於淵鑿石於山犬牙相函魚鱗密比架為髙梁崇以尺計者二十有五修倍之翼以石闌與橋相齊甓東西兩堤各二百尺有竒傍築菴廬三楹招浮屠惠澄者守之始事至元己亥之三月訖工於庚子之十二月費錢一萬緡夫工一萬一百橋成隱然如虹霓跨空而收截險利涉之效下視飛濤如履袵席遂名之曰廣濟云清溪橋赤城志在縣西五里天台縣志宋令丁大榮建大橋以鶴仙名之楊嗣起清溪攪記清溪在縣西五里奔注湍悍每遇淫潦輒成巨浸慶元庚申縣令丁侯來長斯邑亟詢之衆衆曰往昔大夫嘗有意於斯不短於幹局則嗇於資財以故無所建立侯曰事弛於偷安功成於有斷茍利於人以後為羞於是敷敘利害貢書於尊君京尹侍郎求度牒以就成之得錢二百萬且捐俸以繼其乏禮致鄉之士急於義者十餘輩分董是役士皆欣然承命始於壬戍之春訖於癸酉之秋橋成見者歎曰是橋之成君之功盍以鶴仙名庶幾召伯埭白公渠之遺意使後之人知所自侯名大榮毗陵人明萬厯六年令嶽如厚重修之橋環洞二十有八名嶽公橋四十三年令胡來聘修崇禎間知縣程良符重建石橋七大洞廣一丈餘行人利焉國朝順治間橋廢建木橋以濟涉振錫橋赤城志在縣北一十里國清寺東舊名東橋後寺僧亭其上以水聲如振錫更今名飛泉橋赤城志在縣西二十里蓋取孫綽賦瀑布飛流而名茅橋天台縣志在縣西三十里赤城志舊名通濟後以地多茅姓更今名澥渚渡赤城志在縣東一十里始豐之水出於此其清如紺碧焉溪南下渡天台縣志在縣東南一里官渡在此仙居縣觀政闕市橋赤城志在縣西一百三十步景德四年建平政橋台州府志舊名白水橋赤城志在縣東一百五十步宋嘉定十六年建以溪水白色故名仙居縣志明萬厯二十年主簿曽學周重建改今名知縣汪夢説顧震宇屢修之迎恩橋赤城志在縣東六十五步舊名東河橋宋嘉定元年令姚偓重建以嘗迎詔書於此更今名社橋赤城志在縣西二里以其處社壇側故名上有傾蓋亭三橋嘉靖浙江通志在縣西三里台州府志以盂溪馬蹤張阜三水合流而名明正德間知縣曹廷桂偕主事張粳重建明季又圮水月堂僧德進募而新之苦竹橋赤城志在縣西五里其側多植苦竹故名慶雲橋仙居縣志在縣東十五里赤城志宋慶元元年建以有慶雲之瑞故名斷坑橋台州府志在縣東二十里宋紹定六年令程士龍政成解組民送之於此又名留程橋折桂橋仙居縣志縣西三十里以宋吳芾子侄聨科故名廣業渡仙居縣志在縣西六十里即九郎溪也明萬歷間主簿曽學周造舟濟人羅漢渡台州府志在縣東南三十五里即今羅渡國朝康熙十七年僧於渡頭建三層樓頗壯麗寧海縣遺惠橋台州府志在縣東跨玉河明萬厯壬辰令曹學程建近程長官祠故名桃源橋赤城志在縣東一百九十步夾岸多桃花舊傳水源出天台因取劉阮事而名台州府志元儲國秀自稱桃源主人令王士宏號桃源仙宰桃源寧海之通名也過