以充費工訖凡三十楹浮屠七級文昌祠巋然居首費金一十有竒橋遂翼然改觀自是襟帶山河連環織鎖地脈輪轉人物蔚興架梁之功豈曰小補之哉龍遊縣志崇禎十三年為水所壞十六年知縣黃大鵬重建國朝順治十五年橋燬於火康熙二年知縣艾朝棟重建十六年復燬十九年知縣盧燦縣丞何應武典史李斌重建縠水橋明一統志在縣五里宋嘉祐間建九里橋衢州府志在縣西九里明永樂間義民余希哲建嘉靖間呂廷宣重建馬報橋萬厯龍遊縣志在縣東十五里相傳扶風守徐𢎞戰死家人不知其所乘馬馳歸報始覺因名明嘉靖間知縣甘用世重修隆慶間知縣凃杰重建為矼五墩四廣二丈長十五丈築溪橋𢎞治衢州府志在縣東二十里景泰間知縣張惠重建萬厯龍遊縣志偃王築室居此故名嘉靖間知縣甘用世重建為矼五墩四廣二丈長二十丈笋墩橋龍遊縣志在縣北六里義民余緝建廣一丈五尺長十丈為矼四為墩三國朝順治年間邑人余宏重修仙迹橋𢎞治衢州府志在縣北三十五里舊名上虹萬厯龍遊縣志洪武間里人龔子禮建有異人過擲錢賚匠氏錢迹印石猶存故名通濟渡崇禎衢州府志在通濟門外常山縣仁壽橋常山縣志在城內南隅坑頭觀風橋萬厯常山縣志在縣東文筆門外下跨龍潭舊名迎恩成化間知縣余完建圮於水嘉靖元年知縣侯正綱重建覆屋九間改今名廣濟渡浮橋嘉靖浙江通志跨縣東大溪𢎞治衢州府志明初知縣劉利用建名靈濟橋尋廢永樂間知縣仇經設渡夫以舟濟𢎞治戊午知縣王錫等仍建浮橋吾哻常山浮橋記常山廣濟渡故未設橋涉人告病𢎞治丁巳浙藩大參湖湘吳公紀行部至縣謂知縣王錫曰古者辰見角而雨畢則除道天根見而水涸則成梁有司者可恝然乎三侯曰諾乃造舟二十束板其上旁翼以楯聨以鐡繩繫於兩崖之石以原設渡夫十二人易名橋夫俾專視守葺興事於丁巳冬十月訖工於戊午秋八月衢州府志正德初舟壞知縣陶金築石墩十座架木梁於其上鐡鎖橋夫如故遂為經久之規鎮安橋衢州府志在縣小東門外明萬歷間邑人陳朝等募建新溪橋萬厯常山縣志在大南門外嘉靖間邑人汪文鳯建儻溪橋崇禎衢州府志在縣北五里萬厯常山縣志舊以舟渡名金川渡𢎞治間分巡吳紀知縣王錫建浮橋於其上正德初改為石橋嘉靖末年圮隆慶三年魏誥等重建巖口橋萬厯常山縣志在縣西南鄉七里巖嶺下僧永增巖口橋題碑溪之水一雨則漲涉者病焉在城詹斯詹潛詹瓊詹輝思有以濟之正德乙亥秋捐資創建石橋一所屬豫董其役告成甫五載而水壞斯乃獨力了結前緣髙堅益加於舊雖雨病涉者免矣實正德辛巳仲春望日也龍繞橋衢州府志在縣西北六十里橋旁兩峯峻削相傳有髙僧日坐河壖誦經募錢每人止取一文積數年成此橋後有龍欲踰橋去不能乃爪攫東壁山飛去降遂安北鄉今兩處皆有迹可驗永安橋常山縣志在七都球川石潭頭徐烈永安橋詩兩岸青山一水遙桃花三月漲春潮何緣谷口通樵客恰好沙灣架石橋湖澄渡萬厯常山縣志在縣北二十里詹山湖澄渡詩漠漠煙雲午未開危樓獨倚漫徘徊行人待渡心方急隔岸小舟來未來招賢渡𢎞治衢州府志在縣東三十五里江山縣仙霞關明一統志在縣南一百里抵福建界為入閩咽喉之地薩都拉度閩關詩白雲下千峯盡入懷袖裏振衣度閩關灑作山下水仰登天無梯俯視井無底古來守關人豪傑存有幾寒食百草青春風吹不起劉基過閩闕詩二首關頭霧露白濛濛關下斜陽照樹紅過了秋風渾朱覺滿山粳稻入關中峻嶺如弓驛路賖清溪一帶抱山斜髙秋八月崇安道時見棠梨三兩花張以寧登閩關詩獨步青雲最上梯八閩如井眼中低泉鳴萬鼓動哀壑山飲雙虹垂逺溪家近尚無鴻鴈信客愁復有鷓鴣啼書生未老疏狂意更欲崑崙散馬蹄謹按仙霞嶺即古泉山也杜佑云泉嶺山在衢州信安縣西南二百里漢朱買臣云東越王居泉山一人守險千人不能上今其山周圍百里皆髙山深谷磴道凡三百六十級歷二十四曲長二十里唐乾符五年黃巢破饒信歙等州轉略浙東因刋山開道七百餘里直趨建州即此嶺也宋紹興中史浩帥閩過此始募人甃以石路自是鐫除鏟削舊時險厄稍就寬平凡自浙入閩者由清湖渡舍舟登陸連延曲折逾嶺而南至浦城縣西復舍陸登舟以達於閩誠兩浙之鎖鑰八閩之咽喉也仙霞關之東西復有五關一曰安民關在仙霞東南三十五里路通處州遂昌縣一曰二渡關在仙霞西南八十里路通江西上饒永豐縣一曰木城關在仙霞西南六十里一曰黃塢關在仙霞西南五十里路通永豐縣一曰六石關在仙霞西南三十五里路通江山縣及廣信之玉山皆江浙往來之間道與仙霞共為六關故土人有仙霞六關之稱九清橋天啓江山縣志在清湖萬厯二十二年知縣蔣光彥建天寧寺僧性德與周德福等募化採石作九垜每垜髙七尺橫二丈直三十丈作屋覆其上共二十四間自為記天啓三年被水衝壞國朝康熙間總督郭世隆即九清橋舊址建橋船二十隻鐡索二條知縣朱彩建亭兩岸浮橋嘉靖浙江通志在鹿頭溪縣東二里橫湖橋𢎞治衢州府志在縣南十里景星鄉天啓江山縣志邑人王溥建萬厯間溥孫良佐重修延齡橋𢎞治衢州府志在縣南三十五里江山鄉江山縣志明嘉靖間知縣黃綸重建國朝康熙二十五年大水摧壞三十六年福建提督張旺重建昭明橋正德江山縣志在縣南三十里江山鄉宋僧木菴建衢州府志明知縣劉桂重建邑人指揮王允德倡募王志鄭思澤董其役程澤捨田助銀贍之天啓間知縣張鳳翼令澤孫程德春重建國朝康熙三十七年改建石矼旁置菴亭慶雲橋天啓江山縣志在長臺里人朱夏柴時秀建韓駒慶雲橋詩縣郭連青野人家蔽緑蘿地偏春事少山逈夕陽多暗水披崖出扁舟掠岸過傳聲細扶柁吾老怯風波辛棄疾慶雲橋詩二首草稍出水已無多村路瀰漫奈雨何水底有橋橋有月只今平地怯風波斷崖老樹互撑拄白水緑畦相灌輸焉得溪南一丘壑放船畫作歸來圖吳村橋𢎞治衢州府志在縣東四十五里感化鄉正德江山縣志一名步雲橋吳祿應建太平橋正德江山縣志在縣西南五十里薑叔彬建國朝康熙三十五年大水衝沒三十八年祝禮鎮徐良梓重建峽口渡正德江山縣志在縣南七十里為閩浙要道知縣吳停造船砌埠翼以兩亭往來者便之衢州府志明嘉靖間知縣黃綸置渡船二隻夫四名開化縣和平通濟橋明一統志在縣治東𢎞治衢州府志宋紹興丙子邑令喻仲逺建庚子令丁朝佐重建江溥通濟橋記開化溪水湍悍舊為民病政和間參政李光為令日始為橋以便往來草創之初其制未盡不能支久紹興丙子令喻仲逺集材鳩工倣松江垂虹之制為之壯麗精密期年而成歲壬辰復圮於水又十年市醫胡應瑞易為浮梁徙諸上遊溪水淺涸不常易以腐敗今令金華丁朝佐下車父老皆以橋為請君乃因舊址度其廣袤之數截流而東其長六十丈分為二十三節捐已俸先造三節以為民勸應者紛然遂足其數始於庚子七月壬子成於九月辛未每節為六柱三械兩旁益以二楯橫貫以巨木四下施鐡鎖鈎聫以為固板厚二寸五紛廣一丈四尺盡布以甎傍壓以石為屋以蔽風雨中為亭奉浮屠氏為民保護負者乘者如履平地不知身在風濤之上也橋成書來求記豫在桑梓實聞其詳故紀其實慶元間令趙伯玉重修咸淳圮於水里人徐斗髙等起造浮橋縣令胡通直重修元至元間主簿丁世傑架橋蓋屋至大間里人方景任鳩工建造尋壞元統間主簿訥古伯重建明洪武初知縣何永安復建九年圮洪熙乙巳洪田寺僧向誠募緣侍郎吾紳主事宋玘與好事者徐叔謙倡率造舟為梁國朝順治中知縣朱鳳台重修雙溪橋嘉靖浙江通志在縣東一里𢎞治開化縣志宋政和中縣令李光建後圮於水紹興乙亥令喻仲逺重建毛幵雙溪橋記開化二溪古未置橋政和中會稽李光嘗涖茲邑始教民為橋然制度陋甚卒為湧水所毁厥後里豪相與踵之而功大費夥纍歲不竟紹興乙亥歲今令桐汪喻仲逺之來審知其故因行視地勢商度工用勸募閭伍應者雲集即近山得巨材數百根費以大省未幾橋成如所素計丙子某月某日明年某日則始訖之歲月日也鑿溪之深聨木為械步二而柱橫木貫之三藉以大板其厚四寸飛欄相扶以翼其外中為亭以便休息乘者得以安行者得以肆千百年之缺一朝而舉之是亦難矣始豫聞而心善之會衆請文為記故備述其本末以告來者衢州府志後圮明成化間令林清伐石甃墩嘉靖間復圮令李文重建石梯橋開化縣志在縣北三里石壁峭立下臨密賽淤有道士疊石為梯七十餘級橋成勢若飛虹金溪橋𢎞治衢州府志舊名南歸橋在縣南五里察溪橋𢎞治開化縣志在縣北十里徐滔建宋咸淳間圮於水遂創渡船仁壽橋崇禎衢州府志舊名虹橋在縣東二十里巨濟橋𢎞治開化縣志舊名孔埠在縣南三十里鄭原善巨濟橋記金溪邑萬山間去治三十里曰孔埠其地當吳楚閩越之往來一川清瀉涉者病之始里人劉同祖度為浮梁其季父清暉公扁曰巨濟里之陟是橋者如履康莊喜之相與為永久計得田二十五畝籍其歲入更無後顧憂居數年日朽月蠧摧剝就圮田之籍於橋者已歸於故主而扁亦不復見延祐四年春清暉之子文敘與同祖之子秀孫復經工庀材為舟凡十有六縻以鐡繩翼以丹楯踰月悉復舊觀田與俱復視昔增善因擇謹厚者司其籍以相其後又數月而舊扁出焉默若有應者嘻亦異哉是不可以不記其助田之姓名類見之碑隂云國朝順治中知縣朱鳳台重建龍山溪口渡嘉靖浙江通志在縣南二十里石門鄉浙江通志卷三十七
