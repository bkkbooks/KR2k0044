body:
  text: 浙江通志卷六十水利九嚴州府建徳縣附郭東湖在東門内縣治左萬厯嚴州府志明嘉靖四十年知府韓叔陽因旱澇不常築隄以捍之遂成巨浸由太平橋遶入西湖建徳縣志萬厯四十一年知府吕昌期華敦復相繼開濬嵗久堤潰湖水盡從東去國朝康熈十一年知府梁浩然同知金雲鳳通判王興禹協鎮鮑虎知縣項一經捐俸暨闔邑紳士公助開濬築壩於湖之左以防水之洩俾水上玉街自太平橋下遶江家塘直至西湖淺則西湖蓄水漲則由西湖壩出吕公橋以逹於江康熈二十年復圮知府任風厚率縣令戚延裔及紳士捐資重築令邑人宋維藩董役築堤甚堅建徳縣城外河道西湖在縣西南和義門外嚴陵志廣袤五百四十二丈唐咸通中刺史侯温開宋靖康元年知州凌唐佐申乞充放生池景定二年秋七月暴雨烏龍山洪水迸出決湖趨江湖遂涸知州錢可則亟於冬隙隄之建徳縣志明嘉靖間分守參政張子𢎞知府張任重修萬厯間知府陳文煥累石成隄榜曰來賢湖栁本泰重修西湖壩記嚴州西湖始見於唐書方干集而詳於宋史靖康景定之間作者具載郡志歴元潰廢已久至明修復則自藩參廬陵張公始嘉靖癸亥公旬宣於嚴廣詢民俗鋭志復古逮今甫踰一紀而湖之決者再甲戌霪潦春夏為甚烏龍諸山萬壑争流皆下於湖一時衝激壩遂不支太守臨川陳公目擊其壊諗於二守林公三守潘公節推周公遂捐金若干以為傭直日資三守以提其綱公則旬一課之經始於是年十月之吉迄次年春初而厥功告成考其壩視舊進徙若干丈得𥪡址廣若干丈兩岸無踈土沿隄増築髙厚樹以檉栁内外盤錯較昔有加而功垂於永久矣國朝康熈十一年知府梁浩然率屬捐俸暨闔府紳士公助復築長堤濬湖蓄水并開流水埠舊濠以導去水之勢何士錦重築東西湖壩序嚴城扼山川之勝枕龍岡面馬目東西湖迴環左右築堤引水逆流宋地師呉景鸞所謂腰帯水明青溪令呉天洪所云復引東湖上御街是也明萬厯大清四十五年太守華敦復濬湖而深之字三十年間鼎興名勝猶存而兩壩崩潰水分八科第罕繼余乃籲之郡守梁公邑尹項公首捐俸為士民倡余與各紳亦相率鼔舞傾囊從事經始於壬子季冬迄癸丑季春甫三月而兩壩告竣舉數十年之淤塞一旦開通故書其顛末以為後來者勸石澳谼在縣西三十五里慈順鄉徐村有曠地數十頃無水不可耕徐氏叟穴山三十丈注水南下遂為良田刻石識崖上蓋宋天聖二年也南堤在城南澄清門外南臨江北負城舊有路為洪水衝坍洗逼城脚地勢傾欹行者患之明成化十一年知府朱暟募舟人運巨石築長堤以禦水患且便行者東抵興仁門西抵税課司為堤三級廣踰四丈袤數百丈堅緻平坦足以障狂瀾而便徃來郡人徳之穿塘在縣東以下二十四塘並明洪武二十七年遣官修築白栗塘後塘俱在縣東南蓮塘長塘興福塘山還塘直塘芙蓉塘項村塘髙塘俱在縣南二古塘泉塘缷塘孫塘塢塘張塘俱在縣西南横塘周家塘路口塘朱池塘回龍塘俱在縣西溪西塘在縣東北清公塘在縣北後村堰在縣西以下諸堰並明洪武二十七年遣官修築川堰麻丘堰宋岸堰大堰俱在縣西大堰在縣東北上塘堰下塘堰莆田堰芝川堰胥村堰俱在縣東北淳安縣古渠在縣南引西山泉横貫市中而東注嚴陵志宋元豐淳熈間知縣何友直陳曄皆濬之方重謀重興古渠記縣之西城舊置暗溝一道引西山泉通注縣渠直東而流不二里而出溪城居之民頗為至便自舊城潰委日月浸逺闤闠地多為民户請射而耕鑿之家貪其利遂平溝占為巳業泉既不通城中古渠亦從而淤每春夏之交霖雨暴作積水無所決洩衝没街道居民墻壁徃徃摧壊民甚苦之熙寧丙辰秋著作佐郎何友直出宰是邑下車月餘考圖牒訽訪古跡遂令興工不崇朝果見故道而溝中鐵牕尚存浹辰而畢工又諭臨渠居民各居界分疊石固岸以圖經久衆皆悦從元豐元年記方有開重修古渠記還淳有泉源於北山注為西池亘闤闠以東劚石為渠冶金為牕其來舊矣熈寕中嘗堙塞著作何公按其舊浚治閲四十有五載宣和庚子邑燬於兵泥塗瓦礫弗渫弗治執事者間嵗鳩民具畚鍤號呼以渠從事民樂趨之吏輒裒取其傭直以自利淳熈五年令尹陳公為邑究民情所欲决意開導乃闢乃理且為三閘以節其出納焉淳安縣志明萬厯甲申知縣蕭元岡濬古渠築二湖陂汪道昆重濬古渠開東西陂記淳安占始新縣也漢建安中引郭西水渠而東流遶郭若鞶帶廣尋有二唐仍其舊迄宋熈寕淳熈間遞濬如故頃罹冦虐城壊淤堙者什三沒者什七萬厯癸未蕭君下車諸父老上渠便宜君復酌時宜與之更始渠廣僅當疇昔之半隄廣當渠之半隄窮則梁之又以西郭諸山谷水東注如建瓴其盈涸可立待也藉令渠復而水不斷將焉用渠乃闢雉潭為西陂諸山谷水皆來會即龍山之麓東陂約下流而捍之就西陂築隄一東陂二修廣皆倍西乃籍浮橋田若干畝壇場地若干畝易民田為陂少不足則捐禄入而與之賈鳩工伐石則市閒田以供渠修三百尋有竒為石防者三梁者五冬十月農隙首事明年春正月告成魚袋港在縣南一里俗名漏港萬厯嚴州府志明萬厯十年知縣戴廷槐捐俸修隄王錫爵重築青溪隄記縣界萬山中據全浙上游水之乘髙來者勢若建㼨而會於新安江之源出於新都之浙嶺自西北流遶縣治而東與東溪相合當其湍激之所非設隄以障之則奔潰四溢罔有定極青溪之宜有隄也其議久矣正徳以來水寖瀉而南宰縣黎君嘗隄捍之嵗久仍圮郡守楊侯議行之而邑令戴君褒其事將底績兩君先後各以事去輟工數載山水時發發則毁廬壊舍邑父老子弟請於新令顧君顧君具牘白於新守郡侯既報可自壬午夏始渉秋乃成顧君