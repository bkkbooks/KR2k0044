body:
  text: 浙江通志卷二百四十八經籍八集部一别集謹按隋書經籍志云别集之名漢東京之所創始也郡齋讀書志云軌轍不同機杼亦異各名一家之言故别而聚之命之為集文獻通考引宋兩朝藝文志亦云别集者人别為集今仍諸家之例凡詩文集總以别集冠之三國吴虞翻集隋書經籍志梁三卷録一卷三國吴志翻字仲翔餘姚人姚信集二卷録一卷隋書經籍志梁有亡三國吴志注信字元直一字徳祐西吴里語武康人志按唐書藝文作十卷晉吴商集五卷七録益陽令西吴里語商字彦聲故鄣人賀循集十八卷隋書經籍志梁二十卷録一卷晉書賀循傳字彦先山隂人虞喜集十一卷七録奉朝請晉書虞喜𫝊字仲寜餘姚人虞預集十卷録一卷隋書經籍志梁有亡晉書虞預𫝊字叔寜喜之弟所著詩賦碑誄論難數十篇干寳集四卷隋書經籍志梁五卷海鹽縣圖經父瑩新蔡人令海鹽因家焉鈕滔集五卷録一卷七録吴興孝亷楊方集二卷隋書經籍志髙涼太守梁有亡晉書楊方傳字公囘會稽人謝沈集十卷隋書經籍志梁有亡晉書謝沈𫝊字行思㑹稽山隂人詩賦文論行於世戴逵集九卷隋書經籍志殘缺梁十卷録一卷晉書戴逵傳字安道譙國人世居剡下孫瓊集二卷七録鈕滔母沙門支遁集八卷隋書經籍志梁十三卷宋沈演之集十卷七録宋金紫光禄大夫宋書沈演之傳字臺真吴興武康人深之集七卷隋書經籍志梁十五卷録一卷西吴里語深之字思元烏程人丘按唐書藝文志作六卷沈懐文集十二卷隋書經籍志殘缺梁十六卷宋書沈懷文傳字思明吴興武康人文集行世志按唐書藝文作十三卷沈懐逺集十九卷隋書經籍志梁有亡宋書沈懐文傳弟懐逺文翰集十卷咸淳臨安志僧慧靜著本姓邵餘杭人齊顧歡集三十卷隋書經籍志梁有亡南齊書顧歡傳字景怡吴郡鹽官人婁幼瑜集六十六卷隋書經籍志梁有亡南齊書徐伯珍傳幼瑜東陽太末人孔稚珪集十卷隋書經籍志金紫光禄大夫南齊書孔稚珪傳字徳璋㑹稽山隂人按書録解題作一卷沈麟士集六卷隋書經籍志太子舍人南齊書沈麟士傳字雲禎吴興武康人梁丘遲集十卷隋書經籍志并録梁十一卷梁書丘遲傳字希範吴興烏程人沈約集一百一卷隋書經籍志并録梁書沈約傳字休文吴興武康人按唐書藝文志作一百卷又集畧三十卷書録解題作十五卷别集一卷又九卷宋史藝文志詩一卷吴均集二十卷梁書吴均傳字叔庠吴興故鄣人宋史藝文志詩集三卷沈君攸集十三卷隋書經籍志散騎常侍卷按唐書藝文志作十二陳杜之偉集十二卷隋書經籍志大匠卿南史杜之偉傳字子大吴郡錢唐人集十七卷沈炯前集七卷後集十三卷隋書經籍志侍中陳書沈炯傳字初明吴興武康人志按唐書藝文前集作六卷沈不害集十四卷見陳書本傳字孝和武康人按唐書藝文志作十卷顧越集二卷見陳書本傳字思南鹽官人南史顧越傳詩頌碑誌箋表凡二百餘篇姚察集二十卷見陳書本傳字伯審吴興武康人孔奐集十五卷彈文四卷見陳書本傳字休文㑹稽山隂人諸導文二十餘卷詩賦碑集三十餘卷續髙僧傳隋杭州靈隱山天竺寺釋真觀著字聖逹吴郡錢唐人姓范氏唐虞世南集三十卷見唐書藝文志唐書虞世南傳越州餘姚人字伯施褚亮集二十卷見唐書藝文志唐書褚亮傳字希明杭州錢唐人貞觀中累遷散騎常侍褚遂良集二十卷見唐書藝文志唐書褚遂良傳字登善亮子孔紹安集五十卷見唐書藝文志賀徳仁集二十卷見唐書藝文志駱賓王集十卷郡齋讀書志義烏人中宗詔求其文得百餘篇命郗雲卿次序之徐堅集三十卷見唐書藝文志唐書徐堅傳湖州長城人字元固丘為集一卷見唐書藝文志至元嘉禾志嘉興人秦系詩一卷見唐書藝文志唐書秦系傳字公緒越州㑹稽人錢起詩一卷見唐書藝文志極𤣥集起字仲文長興人按郡齋讀書志作考功集二卷書録解題蜀本作前後集十三卷顧况集二十卷至元嘉禾志况字逋翁吴郡鹽官人郡齋讀書志至徳二年江東進士有皇甫湜序書録解題集本十五卷今止五卷不全顧非熊集一卷書録解題顧况子㑹昌五年進士嚴維集一卷書録解題山隂嚴維正文撰至徳二載辭藻宏麗科章八元詩一卷見唐書藝文志嚴陵志睦州桐廬人大㦄中進士馮宿集四十卷見唐書藝文志唐書馮宿傳字拱之婺州東陽人貞元中進士按宋史藝文志作十卷殷堯藩詩一卷見唐書藝文志嘉興人徐凝詩一卷見唐書藝文志睦州人皇甫持正集六卷郡齋讀書志皇甫湜睦州人元和元年進士雜文三十八篇按唐書藝文志作三卷孟東野詩集十卷郡齋讀書志孟郊東野湖州人貞元十二年進士宋次道重編章孝標集一卷書録解題祕書省正字章孝標撰元和十四年進士西山集五卷郡齋讀書志施肩吾吴興人元和十五年進士以豫章之西山乃十二真仙羽化之所因卜隠焉且以名其所著自為之序按唐書藝文志有詩集十卷袁不約集一卷書録解題袁不約還朴撰長慶三年進士朱慶餘集一卷書録解題朱可久慶餘撰以字行寳厯二年進士全唐詩越州人舒元輿集一卷見唐書藝文志唐書舒元輿傳婺州東陽人項斯集一卷書録解題江東項斯子遷撰會昌四年進士李頻集一卷書録解題新定李頻徳新撰大中八年進士李郢端公詩一卷郡齋讀書志李郢楚望也大中十年進士居餘杭章碣集一巻書録解題章碣撰僖宗時人周朴詩二卷文獻通考處士周朴撰唐音統籖字太璞吴興人沈嶠文集十卷𢎞治湖州府志烏程人馮涓集十三卷西吴里語涓字信之東陽人或曰信都人唐英集三卷書録解題吴融子華撰龍紀元年進士褚載集一卷書録解題褚載厚之撰乾寜五年進士孫子文纂四十卷孫氏小集三卷唐書藝文志孫郃撰郡齋讀書志字希韓四明人乾寜四年進士陸扆集七卷見唐書藝文志唐書陸扆傳字祥文吴郡嘉興人李洞詩一卷郡齋讀書志洞字才江諸王之孫書録解題與張喬同時稱餘抗明經潘熈載編丘光庭集三卷見唐書藝文志吴興人許彬詩一卷唐音統籖睦州人光啓中進七方干詩集一卷郡齋讀書志干字雄飛歙人甥楊弇與孫郃編次遺詩王贊為序甲乙集十卷郡齋讀書志杭越羅隠字昭諫餘杭人通志藝文畧隠集二十卷江東後集三卷宋史藝文志湘南應用集三卷外集詩一卷啓事一卷羅鄴集一卷見郡齋讀書志比紅兒詩一卷郡齋讀書志羅虬撰主父果詩一卷通志藝文畧天台道士宗元先生集十一卷宋史藝文志吴筠撰卷按唐書藝文志作十僧神邕集十卷宋髙僧傳唐越州燕山大厯寺僧字道恭姓蔡氏皇甫曾為序杼山集十卷郡齋讀書志僧皎然字清晝吴興人謝靈運十世孫集前有于頔序僧靈澈詩一卷文獻通考姓湯字源澄越州人劉夢得序按輿地紀勝作二十七卷靈一集一卷書録解題唐僧續文獻通考越中雲門寺律師栖白詩一卷見宋史藝文志全唐詩越中僧清江詩一卷全唐詩㑹稽僧𧦬光上人詩一卷見宋史藝文志宋髙僧傳字登封姓吴氏永嘉人寒山子詩七卷唐書藝文志僧道翹集得按宋史藝文志作寒山拾詩李季蘭集一卷書録解題唐女冠詩女史李冶字李蘭吴興人女紅餘志二卷武康常陽妻龍輔著五代劉昭禹集一卷書録解題湖南天策府學士桂楊劉昭禹撰金華先民傳字休明金華人贅書十卷郡齋讀書志吴沈顔字可鑄傳師之孫天復初進士正本集宋史吴越世家忠懿王俶在吴越日自編其詩寳月詩一卷郡齋讀書志唐僧貫休撰字徳隠姓姜氏婺州人初有西嶽集吴融為之序其弟子曇域削去别為序引卷按通志藝文畧作三十雜詩賦十五卷宋高僧傳漢錢唐千佛寺希覺字順之姓商氏又有注林鼎金陵懐古百韻詩雜體四十章宋錢儼前集五十卷後集二十四卷宋史吴越世家字誠允俶異母弟貳卿文稿二十卷十國春秋錢昱著字就之忠獻王長子錢昆文集十卷十國春秋昆字裕之忠遜王子滑稽集四卷歌詩二卷書録解題吴越錢易希白撰宋史錢易傳有金閨瀛洲西垣制集一百五十卷通志藝文畧錢易集六十卷錢守讓集二十卷宋史吴越世家惟濬子擁旄前後集五卷伊川集三卷書録解題吴越錢惟演希聖撰按東都事畧有樞庭集宋史本傳有典懿集三十卷通志藝文畧有錢文僖集十卷錢惟治集十卷十國春秋惟治字世和忠遜王長子又有寳子垂綬連環詩玉季集二十卷十國春秋錢惟濟著字嚴夫忠懿王第六子俞文遂詩文集成化新昌縣志張文潛序大隠集五十卷成化杭州府志楊大雅著字子正錢塘人愚谷集又中書制集又銀臺集又翰林制集成化杭州府志盛度著餘杭人謝炎集二十四卷𢎞治嘉興府志字化南嘉興人林和靖詩三卷西湖紀逸二卷郡齋讀書志林逋著字君復錢塘人右建隆至天禧時人孫沔集十卷見宋史本傳字元規㑹稽人懶吟稿三卷台州府志王郎中珪著清吟集台州府志王郎中琥著少微集三十卷寳慶會稽續志齊唐著字祖之葉清臣文集一百六十卷見宋史本傳字道卿烏程人雉山集二十卷嚴陵志方仲謀著字公輔淳安人唐詢集二十卷成化杭州府志肅之子樓郁遺集三十卷延祐四明志字子文自奉化徙鄞退翁吟稿三卷嘉靖金華縣志鄭詳著字敏甫永嘉唱二十卷成化新昌縣志石牧之著字聖咨石仙居文集二十卷詩集十卷成化新昌縣志石衍之著字克美黙山詩集萬厯夀昌縣志胡楚材著字公喬詩賦文論二十卷兩浙名賢録陸滋著字元象世家於杭謝絳文集五十卷兩浙名賢録絳字希深富陽人周少師集二十卷萬厯寜海縣志周弁著字君儀杜衍詩一卷見宋史藝文志玉堂集二十卷詩集十卷書録解題錢塘元絳厚之撰讀書後志有元氏集三卷陳都官集三十卷書録解題嘉禾陳舜俞令舉撰西溪集十卷書録解題錢塘沈遘文通撰長興集四十一卷書録解題沈括存中撰於文通為叔雲巢集十卷書録解題沈遼叡逹撰遘親弟以上三集刋於括蒼號三沈集劉克詩一卷萬厯龍游縣志劉愚子葉適稱其可繼陶韋劉冠集一卷萬厯龍游縣志周必大序無相居士集十六卷萬厯溫州府志陳桷著字季任先平陽人徙居永嘉雲海敝帚五十卷萬厯溫州府志宋之才著字廷佐瑞安人黙成居士集十五卷書録解題潘良貴子賤撰一字義榮朱侍講序平山文集成化四明郡志陳顯著字文昭鄞人適齋集赤城志蔣旦著仙居人字澹然陳鼐詩稿五卷萬厯義烏縣志字孟容錫子磨衲集延祐四明志王廷秀著字頴彦子璧有相山集竹軒雜著永嘉縣志林季仲著吕渭老集嘉興府圖記渭老字聖求嘉興人雲巢集浦陽人物記錢億年字伯夀卧駝集十卷正徳崇徳志莫䝉著字養正曹粹中詩文三十卷延祐四明志粹中字純老定海人敬亭文集萬厯溫州府志鮑若雨著字商霖永嘉人張忠簡文集萬厯温州府志張闡著字大猷永嘉人松隠集二十卷嘉靖寜波府志李大亨著字嘉甫沈銖集十卷沈錫集十二卷見宋史藝文志北山小集四十卷書録解題信安程俱致道撰横塘集三十卷書録解題瑞安許景衡少伊撰赤城集十卷書録解題寧海羅適正之撰韋先生集十八卷書録解題錢塘韋驤子駿撰强祠部集四十卷書録解題餘杭强至幾聖撰趙清獻公集十五卷内閣書目趙抃撰章安集二十卷明一統志楊蟠著臨海人㑹稽公集一百卷吴越武肅王五世孫勰著字穆父見李綱贈少師錢公墓誌右天聖至嘉祐時人劉誼文集三十卷嘉靖長興縣志誼字宜翁慶善集尊鄉録詳節陳貽範著臨海人字伯模求仲弓文集赤城志黄巖人字徳夫錢遹遺文八十卷浦陽人物