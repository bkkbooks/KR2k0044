body:
  text: 浙江通志卷七十田賦四温州府永嘉縣實在田陸千貳百伍頃叄拾壹畝叄分肆釐叄毫壹絲伍忽徵銀貳萬捌千柒百貳拾兩壹錢柒分伍釐捌絲柒忽柒微玖塵肆渺陸漠叄埃徵米壹萬貳千捌百叄拾叄石柒斗伍升肆合叄抄貳撮柒圭柒粟貳粒叄黍柒粞實在地捌百伍頃肆拾壹畝柒分捌釐叄毫貳忽徵銀貳千陸百肆拾陸兩伍錢叄分陸毫壹絲叄忽叄微壹塵貳渺玖漠陸埃徵米壹千壹百貳拾柒石陸斗肆升柒合柒勺壹粟伍粒肆粞實在山叄百壹拾叄頃柒拾壹畝肆分肆釐貳毫貳絲貳忽徵銀壹百兩叄錢捌分捌釐陸毫壹絲伍忽壹微肆渺實在池塘伍頃貳拾捌畝伍分伍釐叄毫玖絲伍忽徵銀壹拾玖兩叄絲肆忽陸微陸塵玖渺玖漠陸埃玖纎捌沙徵米玖石玖斗伍升貳合壹勺玖抄玖撮壹圭叄粟叄粞貳粃蕩坦演水浹等項貳拾叄頃肆拾肆畝壹釐叄毫伍絲柒忽例不起科以上共額徵銀叄萬壹千肆百捌拾陸兩玖分肆釐叄毫伍絲捌微捌塵壹渺伍漠伍埃玖纎捌沙遇閏加銀玖百壹拾貳兩肆錢貳分伍釐壹毫柒微貳塵陸渺肆漠柒埃壹纎壹沙共額徵米壹萬叄千玖百柒拾壹石叄斗伍升叄合玖勺叄抄壹撮玖圭壹粟柒粒肆黍肆粞貳粃遇閏加米壹百壹拾柒石柒斗貳升樂清縣實在田叄千叄百叄拾叄頃伍拾貳畝陸分叄釐肆毫伍絲陸忽徵銀壹萬柒千陸百兩肆錢捌分伍釐柒毫肆絲伍微伍塵貳渺柒漠肆纎徵米伍千伍拾柒石肆斗玖升伍合伍勺陸抄捌撮玖圭柒粟貳粒伍黍柒粞陸糠實在地肆百貳拾壹頃叄拾叄畝肆分捌釐伍毫柒絲玖忽徵銀壹千伍百陸兩叄錢玖分捌釐伍毫壹絲柒忽肆微肆塵玖渺捌漠柒埃徵米貳百柒拾伍石捌斗肆升柒合玖勺叄抄壹撮肆圭陸粟柒粒壹黍叄粞實在山叄拾伍頃叄拾柒畝柒分壹釐玖毫柒絲肆忽徵銀玖拾叄兩叄錢玖分伍釐捌毫壹忽壹微叄塵陸渺實在池壹頃陸拾畝捌分玖釐捌絲捌忽徵銀肆兩玖錢貳分捌釐伍毫玖忽叄微伍塵伍渺叄漠叄埃叄纎叄沙徵米壹石伍斗叄升玖合叄勺肆撮貳粟陸黍陸粞陸糠陸粃以上共額徵銀壹萬玖千貳百伍兩貳錢捌釐伍毫陸絲捌忽肆微玖塵叄渺玖漠柒纎叄沙遇閏加銀伍百壹拾壹兩玖錢貳分叄釐叄毫叄絲捌忽壹微伍塵肆渺肆漠肆埃伍沙共額徵米伍千叄百叄拾肆石捌斗捌升貳合捌勺肆撮肆圭陸粟叄黍柒粞貳糠陸粃遇閏加米壹百壹拾壹石伍斗貳升平陽縣實在田地園肆千柒百貳拾捌頃柒拾伍畝伍分陸釐柒毫捌絲陸忽徵銀貳萬貳千捌百壹拾壹兩壹錢伍分陸釐叄毫叄絲陸忽貳微肆塵玖渺叄漠叄埃徵米玖千伍百玖拾伍石玖斗叄升捌合捌勺壹抄肆粟捌粒陸黍陸粞玖糠玖粃實在山叄拾壹頃捌拾陸畝玖分柒毫例不起科實在屯田園捌頃肆拾陸畝貳分叄釐陸毫肆絲貳忽徵銀捌拾貳兩捌錢捌分壹釐伍毫壹絲伍忽壹微肆塵柒埃壹纎伍沙以上共額徵銀貳萬貳千捌百玖拾肆兩叄分柒釐捌毫伍絲壹忽叄微捌塵玖渺肆漠壹纎伍沙遇閏加銀陸百陸拾叄兩捌錢伍分貳釐陸毫壹忽玖微壹渺伍漠肆埃柒沙共額徵米玖千伍百玖拾伍石玖斗叄升捌合捌勺壹抄肆粟捌粒陸黍陸粞玖糠玖粃遇閏加米貳百肆拾捌石肆斗貳升瑞安縣實在田地肆千陸百柒拾陸頃陸拾捌畝貳分柒釐玖毫陸絲陸忽徵銀貳萬壹千捌百陸拾捌兩捌錢柒分叄釐肆毫玖絲貳忽柒微玖塵陸渺柒漠伍埃陸纎徵米壹萬肆千陸百肆拾肆石壹斗壹升叄合貳勺叄抄肆撮壹圭玖粟柒粒貳黍肆粞叄糠柒粃實在山地塘壹拾壹頃伍拾陸畝陸分壹釐捌毫叄絲玖忽徵銀肆拾陸兩貳錢陸分肆釐柒毫叄絲陸忽壹微玖塵以上共額徵銀貳萬壹千玖百壹拾伍兩壹錢叄分捌釐貳毫貳絲捌忽玖微捌塵陸渺柒漠伍埃陸纎遇閏加銀捌百壹拾玖兩玖毫玖絲伍忽玖微壹塵共額徵米壹萬肆千陸百肆拾肆石壹斗壹升叄合貳勺叄抄肆撮壹圭玖粟柒粒貳黍肆粞叄糠柒粃遇閏加米壹百伍拾伍石玖斗肆升泰順縣實在田陸百捌拾柒頃玖拾畝肆分叄釐貳毫肆絲陸忽徵銀肆千貳百叄拾玖兩肆錢捌分壹釐叄毫肆絲貳忽貳微伍塵貳渺伍漠壹埃叄纎壹沙徵米柒百玖拾石貳斗陸升陸合柒勺肆抄貳圭玖粟捌粒肆黍捌粞陸糠玖粃實在民地園塘壹拾貳頃柒拾壹畝壹釐柒毫壹絲肆忽徵銀柒拾肆兩玖錢壹分貳釐玖毫伍忽肆微柒塵叄渺玖漠叄埃捌纎伍沙徵米壹拾陸石陸斗叄勺貳抄捌撮陸圭陸粒陸粞壹糠陸粃實在山捌頃壹拾伍畝壹釐柒毫柒絲壹忽徵銀玖錢柒分捌釐貳絲壹忽貳微伍塵貳渺實在金鄉衞歸縣下則屯田壹拾肆頃玖拾柒畝柒分肆釐陸毫徵銀陸拾捌兩肆分伍釐貳毫捌絲陞科民人帶種屯田陸頃玖拾捌畝陸分徵銀陸拾玖兩捌錢陸分以上共額徵銀肆千肆百伍拾叄兩貳錢柒分柒釐伍毫肆絲捌忽玖微柒塵捌渺肆漠伍埃壹纎陸沙遇閏加銀叄百陸兩陸錢柒分叄釐壹毫玖絲叄忽肆微壹塵叄渺陸漠壹埃肆纎捌沙共額徵米捌百陸石捌斗陸升柒合陸抄捌撮玖圭肆粒伍黍肆粞捌糠伍粃通計温州府屬五縣田地山蕩等項共貳萬壹千叄百叄拾叄頃捌畝貳分捌釐玖毫伍絲貳忽共徵銀玖萬玖千玖百伍拾叄兩柒錢伍分陸釐伍毫肆絲捌忽柒微叄塵柒埃陸纎貳沙外加收零積餘米改徵銀伍拾兩玖錢叄分貳釐肆毫壹絲捌忽玖微叄塵叄渺陸漠肆埃柒纎柒沙孤貧米改徵銀叄百肆拾叄兩捌錢顔料臘茶折色加價銀壹百捌拾玖兩貳錢捌分伍釐貳毫肆絲壹忽陸微陸塵貳渺玖漠玖埃伍纎壹沙補徵鹽課棄置銀壹百柒拾兩伍錢捌分壹釐肆毫叄絲捌忽捌微㭍塵柒渺叄漠叄埃伍纎壹沙匠班銀柒拾伍兩柒錢玖分壹釐柒毫温州衛屯糧充餉銀陸百玖拾捌兩捌錢柒分玖釐肆毫