body:
  text: 浙江通志卷七十田賦四溫州府永嘉縣實在田陸千二百伍頃叄拾一畝叄分肆釐叄毫一絲伍忽徵銀二萬捌千柒百二拾兩一錢柒分伍釐捌絲柒忽柒微玖塵肆渺陸漠叄埃徵米一萬二千捌百叄拾叄石柒斗伍升肆合叄抄二撮柒圭柒粟二粒叄黍柒粞實在地捌百伍頃肆拾一畝柒分捌釐叄毫二忽徵銀二千陸百肆拾陸兩伍錢叄分陸毫一絲叄忽叄微一塵二渺玖漠陸埃徵米一千一百二拾柒石陸斗肆升柒合柒勺一粟伍粒肆粞實在山叄百一拾叄頃柒拾一畝肆分肆釐二毫二絲二忽徵銀一百兩叄錢捌分捌釐陸毫一絲伍忽一微肆渺實在池塘伍頃二拾捌畝伍分伍釐叄毫玖絲伍忽徵銀一拾玖兩叄絲肆忽陸微陸塵玖渺玖漠陸埃玖纎捌沙徵米玖石玖斗伍升二合一勺玖抄玖撮一圭叄粟叄粞二粃蕩坦演水浹等項二拾叄頃肆拾肆畝一釐叄毫伍絲柒忽例不起科以上共額徵銀叄萬一千肆百捌拾陸兩玖分肆釐叄毫伍絲捌微捌塵一渺伍漠伍埃玖纎捌沙遇閏加銀玖百一拾二兩肆錢二分伍釐一毫柒微二塵陸渺肆漠柒埃一纎一沙共額徵米一萬叄千玖百柒拾一石叄斗伍升叄合玖勺叄抄一撮玖圭一粟柒粒肆黍肆粞二粃遇閏加米一百一拾柒石柒斗二升樂清縣實在田叄千叄百叄拾叄頃伍拾二畝陸分叄釐肆毫伍絲陸忽徵銀一萬柒千陸百兩肆錢捌分伍釐柒毫肆絲伍微伍塵二渺柒漠肆纎徵米伍千伍拾柒石肆斗玖升伍合伍勺陸抄捌撮玖圭柒粟二粒伍黍柒粞陸粳實在地肆百二拾一頃叄拾叄畝肆分捌釐伍毫柒絲玖忽徵銀一千伍百陸兩叄錢玖分捌釐伍毫一絲柒忽肆微肆塵玖渺捌漠柒埃徵米二百柒拾伍石捌斗肆升柒合玖勺叄抄一撮肆圭陸粟柒粒一黍叄粞實在山叄拾伍頃叄拾柒畝柒分一釐玖毫柒絲肆忽徵銀玖拾叄兩叄錢玖分伍釐捌毫一忽一微叄塵陸渺實在池一頃陸拾畝捌分玖釐捌絲捌忽徵銀肆兩玖錢二分捌釐伍毫玖忽叄微伍塵伍渺叄漠叄埃叄纎叄沙徵米一石伍斗叄升玖合叄勺肆撮二粟陸黍陸粞陸粳陸粃以上共額徵銀一萬玖千二百伍兩二錢捌釐伍毫陸絲捌忽肆微玖塵叄渺玖漠柒纎叄沙遇閏加銀伍百一拾一兩玖錢二分叄釐叄毫叄絲捌忽一微伍塵肆渺肆漠肆埃伍沙共額徵米伍千叄百叄拾肆石捌斗捌升二合捌勺肆撮肆圭陸粟叄黍柒粞二粳陸粃遇閏加米一百一拾一石伍斗二升平陽縣實在田地園肆千柒百二拾捌頃柒拾伍畝伍分陸釐柒毫捌絲陸忽徵銀二萬二千捌百一拾一兩一錢伍分陸釐叄毫叄絲陸忽二微肆塵玖渺叄漠叄埃徵米玖千伍百玖拾伍石玖斗叄升捌合捌勺一抄肆粟捌粒陸黍陸粞玖粳玖粃實在山叄拾一頃捌拾陸畝玖分柒毫例不起科實在屯田園捌頃肆拾陸畝二分叄釐陸毫肆絲二忽徵銀捌拾二兩捌錢捌分一釐伍毫一絲伍忽一微肆塵柒埃一纎伍沙以上共額徵銀二萬二千捌百玖拾肆兩叄分柒釐捌毫伍絲一忽叄微捌塵玖渺肆漠一纎伍沙遇閏加銀陸百陸拾叄兩捌錢伍分二釐陸毫一忽玖微一渺伍漠肆埃柒沙共額徵米玖千伍百玖拾伍石玖斗叄升捌合捌勺一抄肆粟捌粒陸黍陸粞玖粳玖粃遇閏加米二百肆拾捌石肆斗二升瑞安縣實在田地肆千陸百柒拾陸頃陸拾捌畝二分柒釐玖毫陸絲陸忽徵銀二萬一千捌百陸拾捌兩捌錢柒分叄釐肆毫玖絲二忽柒微玖塵陸渺柒漠伍埃陸纎徵米一萬肆千陸百肆拾肆石一斗一升叄合二勺叄抄肆撮一圭玖粟柒粒二黍肆粞叄粳柒粃實在山地塘一拾一頃伍拾陸畝陸分一釐捌毫叄絲玖忽徵銀肆拾陸兩二錢陸分肆釐柒毫叄絲陸忽一微玖塵以上共額徵銀二萬一千玖百一拾伍兩一錢叄分捌釐二毫二絲捌忽玖微捌塵陸渺柒漠伍埃陸纎遇閏加銀捌百一拾玖兩玖毫玖絲伍忽玖微一塵共額徵米一萬肆千陸百肆拾肆石一斗一升叄合二勺叄抄肆撮一圭玖粟柒粒二黍肆粞叄粳柒粃遇閏加米一百伍拾伍石玖斗肆升泰順縣實在田陸百捌拾柒頃玖拾畝肆分叄釐二毫肆絲陸忽徵銀肆千二百叄拾玖兩肆錢捌分一釐叄毫肆絲二忽二微伍塵二渺伍漠一埃叄纎一沙徵米柒百玖拾石二斗陸升陸合柒勺肆抄二圭玖粟捌粒肆黍捌粞陸粳玖粃實在民地園塘一拾二頃柒拾一畝一釐柒毫一絲肆忽徵銀柒拾肆兩玖錢一分二釐玖毫伍忽肆微柒塵叄渺玖漠叄埃捌纎伍沙徵米一拾陸石陸斗叄勺二抄捌撮陸圭陸粒陸粞一粳陸粃實在山捌頃一拾伍畝一釐柒毫柒絲一忽徵銀玖錢柒分捌釐二絲一忽二微伍塵二渺實在金鄉衛歸縣下則屯田一拾肆頃玖拾柒畝柒分肆釐陸毫徵銀陸拾捌兩肆分伍釐二毫捌絲升科民人帶種屯田陸頃玖拾捌畝陸分徵銀陸拾玖兩捌錢陸分以上共額徵銀肆千肆百伍拾叄兩二錢柒分柒釐伍毫肆絲捌忽玖微柒塵捌渺肆漠伍埃一纎陸沙遇閏加銀叄百陸兩陸錢柒分叄釐一毫玖絲叄忽肆微一塵叄渺陸漠一埃肆纎捌沙共額徵米捌百陸石捌斗陸升柒合陸抄捌撮玖圭肆粒伍黍肆粞捌粳伍粃通計溫州府屬五縣田地山蕩等項共二萬一千叄百叄拾叄頃捌畝二分捌釐玖毫伍絲二忽共徵銀玖萬玖千玖百伍拾叄兩柒錢伍分陸釐伍毫肆絲捌忽柒微叄塵柒埃陸纎二沙外加收零積餘米改徵銀伍拾兩玖錢叄分二釐肆毫一絲捌忽玖微叄塵叄渺陸漠肆埃柒纎柒沙孤貧米改徵銀叄百肆拾叄兩捌錢顔料臘茶折色加價銀一百捌拾玖兩二錢捌分伍釐二毫肆絲一忽陸微陸塵二渺玖漠玖埃伍纎一沙補徵鹽課棄置銀一百柒拾兩伍錢捌分一釐肆毫叄絲捌忽捌微㭍塵柒渺叄漠叄埃伍纎一沙匠班銀柒拾伍兩柒錢玖分一釐柒毫溫州衛屯糧充餉銀陸百玖拾捌兩捌錢柒分玖釐肆毫