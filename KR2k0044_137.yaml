body:
  text: 浙江通志卷一百三十八選舉十六明舉人嘉靖七年戊子科姜良翰金華人甲辰進士謝紘會稽人己丑進士周如砥餘姚人己丑進士俞介餘姚人甲辰進士許來學餘姚人知縣顧四科錢塘人壬辰進士符騐黄巖人戊戌進士錢應揚餘姚人乙未進士羅洪慈谿人宿州知州徐建餘姚人福清知縣夏淳餘姚人翁溥諸暨人己丑進士張嘉秀海鹽人己丑進士石繼興餘姚人徐轂山隂人知縣費滂嘉興人辛丑進士江樊開化人周宗文山隂人仙逰知縣沈鎜秀水人乙未會魁王鶚鄞人吳朝鳳樂清人甲辰進士曹金平湖人同知徐緯山隂人戊戌進士李本餘姚人壬辰進士沈師賢德清人己丑進士張純永嘉人南康知府吳至餘姚人壬辰進士趙鑾永康人己丑進士陶謨秀水人壬辰進士秦鳴春臨海人工部員外吳源錢塘人戊戌進士錢照慈谿人壬辰進士余鳳遂安人吉安通判商廷試會稽人辛丑進士邵基餘姚人乙未進士許安餘姚人同知趙術東陽人許仁卿臨海人江西副使馮璋慈谿人戊戌會魁徐雲路武康人馮良亨臨安人慶逺同知鄭邦仰餘姚儒士辛丑進士王璣西安人己丑進士顧翀慈谿人壬辰進士邵濬太平人毛文邦松陽人庚戌進士吕鑾永康人鎮江通判徐一鳴餘姚人辛丑進士孫宗器蕭山人寳坻知縣王元春山隂人庚戌進士沈渭定海人知縣童珂鄞人通判鍾藻慈谿人包桐鄞人知縣余永麟鄞人蘇州通判鮑龍臨安人乙未進士胡希周餘姚人長山知縣葉禎麗水人賈大亨上虞人戊戌進士謝瑜上虞人壬辰進士金志山隂人戊戌進士王杏奉化人己丑進士姚翔鳳餘姚人壬辰進士孫憲奉化人溧陽教諭黄九臯蕭山儒士戊戌進士陸芹餘姚人知縣沈夢鯉山隂人乙未進士蔡鴻漸鄞人知縣徐緝山隂人乙未進士杜鍷鄞人壬辰進士范欽鄞人壬辰進士黄齊賢餘姚人乙未進士嚴諒慈谿人通判吕用和湖州人魏夢賢山隂人戊戌進士陳束鄞人己丑進士虞介山隂人同知毛夢龍餘姚人黄德賢蕭山人知縣黄金鄞人知州張榮東陽人沈維鏞嘉興人毛國賢鄞人知縣陸鰲平湖人南京同知徐楚淳安人戊戌會魁徐澤海寧人李一翰仙居人戊戌進士王珽諸暨人知縣閔如霖烏程人壬辰進士方綱慈谿人胡崇德餘姚人乙未進士王健永嘉人戊戌會魁以下八人順天中式錢萱海鹽人乙未進士江良才常山人貴池知縣李綸鄞人沈謐秀水人己丑進士盧㸃縉雲人桂林知府唐魯秀水人楊應鸞海鹽人知縣許仁卿臨海人解元以下七人應天中式包節嘉興人壬辰進士徐楩海鹽人通判黄瑚義烏人安東知縣會銑黄巖人己丑進士童吉餘姚人王心定海人戊戌進士蔡允昌慈谿人知縣湖廣中式鄭廷鵠德清人戊戌會魁廣東中式胡俸慶元人己丑進士廣西中式唐金淳安人雲南中式嘉靖十年辛夘科浙江登科考貢生得附京鄉試自嘉靖辛夘科沈朝宣始張濓仁和人戊戌進士葉澹慈谿人吳轅仁和人乙未會魁夏維寜餘姚人知州于廷寅餘姚人壬辰進士姚篚平湖人僉事沈𢎞訓武康人施峻歸安人乙未進士王梅平湖人壬辰進士孫銳臨海人庚戌進士陳憲嘉興人戊戌進士童漢臣仁和人乙未進士楊梁西安人戊戌進士張淶杭州人周大有餘姚儒士辛丑進士谷鍾秀餘姚人辛丑進士王梴象山人壬辰會魁包燿鄞人顧霑海鹽人乙未進士余淑遂安人毛愷江山人乙未進士侯一元樂清人戊戌進士徐方餘姚人乙未進士馮秉義慈谿人鄒平知縣管州餘姚人司務方九叙錢塘人甲辰進士應雲鸑象山人辛丑進士葉經上虞人壬辰進士吕光洵新昌人壬辰進士梁爵麗水人永寜知縣顧亷餘姚人乙未會魁袁大誠鄞人丙辰進士應世亨慈谿人蔡汝楠德清人壬辰進士翁學淵遂昌人壬辰進士馮汝弼平湖人壬辰會魁錢椿杭州人馮熊金華人甲辰進士閔宜邵烏程人荆州通判史元中鄞人魚臺知縣尹照龍㳺人新會知縣楊世芳餘姚人丁未進士趙伊平湖人壬辰進士戴維師蕭山人戊戌進士宋大勺餘姚人辛丑進士應鳴鳳西安人壬辰進士陳方仁和人成都推官駱驥諸暨人壬辰進士沈奎海鹽人戊戌會魁丁克卿餘姚人永寜同知葉芬金華人萬載知縣邵楩仁和人戊戌進士章美中會稽人辛丑進士何繼髙仁和人壬辰進士髙警山隂人同知程秀民西安人壬辰會魁馮亮金華人壬辰進士秦鳴夏臨海人壬辰進士王文禄海鹽人沈垣平湖人乙未進士盛唐嘉善人戊戌進士黄中遂昌人山東按察副使王典黄巖人吳遵海寕人丁未進士周浩山隂人乙未進士沈鍊會稽人戊戌進士周鎬慈谿人壬辰進士江應選常山人乙未進士蔣懷德山隂人戊戌進士朱公節山隂人知州俞咨伯平湖人壬辰進士朱執中海寜人戊戌進士趙元彦蘭谿人象州知州邵炤餘杭人知縣蔡憲東陽人唐鉞蘭谿人揚州同知陳相烏程人顧鏞餘杭人泉州推官羅椿枝桐廬人乙未進士徐恒錫餘姚人知州張謙慈谿人壬辰進士韓岳餘姚人壬辰進士陳如愚上虞人長史沈學山隂人錢大經餘姚人應元清太平人鍾世給太平人陳紹先餘姚人杜然東陽人興業知縣陳煉黄巖人胡汝存餘姚人王椿錢塘人壬辰進士以下九人順天中式王楠會稽人戊戌進士陸裴平湖人謝廷訓會稽人知縣沈朝宣仁和人涿州學正周霆崇德人鄧州知州潘璋上虞人知縣施應婁黄巖人徐應竒龍㳺人工部員外駱居敬山隂人推官以下三人應天中式包孝嘉興人湯輔黄巖人王鵬鄞人福建中式章懋長興人庚戌進士四川中式洪儒錢塘人以下二人雲貴中式王朴鄞人張相仁和人河南中式嘉靖十三年甲午科張志淑台州人陳善錢塘人辛丑進士潘仲驂歸安人辛丑進士楊機慈谿人孫汝賢餘姚人丁未進士慎䝉歸安人癸丑進士查秉鉞海寜人大理評事來日升蕭