body:
  text: 浙江通志卷一百六十七人物三循吏一自遷史傳循吏而後世史家多因之顧其言要於奉法循理初非有驚竒難能之事以震世而駭俗也東南美逾竹箭不乏政事之材然必如孟堅所云淑人君子民有餘思者乃足稱焉詩不云乎不競不絿不剛不柔布政優優雖奕世而下猶旦暮遇之志循吏杭州府南北朝范述曽梁書本傳字子元錢唐人齊明帝時出為永嘉太守為政清平不尚威猛民俗便之所部橫陽縣山谷險峻為逋逃所聚前後二千石討捕莫能息述曽下車開示恩信凡諸凶黨襁負而出編戶屬籍者二百餘家自是商賈流通居民安業在郡勵志清白不受饋遺帝聞甚嘉之徴為遊擊將軍郡送故舊錢二十餘萬述曽一無所受始之郡不將家屬及還吏無荷擔者民無老少皆出拜辭號哭聞於數十里東昏時還鄉里髙祖踐阼詔曰中散大夫范述曽昔在齊世忠直奉主往涖永嘉治身廉約宜加禮秩以厲清操可大中大夫賜絹二十匹宋謝濤范仲淹謝濤墓碑字濟之富陽人淳化三年進士除梓州𣙜鹽院判官會盜據成都發其徒攻縣濤守備既堅十旬弗破事平就遷觀察推官權知益之華陽縣時冦亂之餘民多散亡上言者請募人占田可倍其租朝廷從之於是有力者得并其田濤曰奪民世産以資富人豈朝廷意耶乃盡取其田以歸於民真宗即位召試學士院會京東有強冦而曹南闕守遂命濤往至郡稱治冦不敢犯有趙諫者出入都下務乘人之弊以告訐濤奏之斬都市乃下詔曰凡民非干已事無得告言遂著為令自是天下訟息而刑清厯遷兵部員外郎出為兩浙轉運使恥尚文法雖任在按察而誠意坦然吏樂其職民安其俗還臺進禮部郎中兼侍御史知雜事清靜端介百辟望其風采乾興初進吏部郎中直昭文館遷太子賓客郎簡宋史本傳字叔廉臨安人舉進士第知寧國縣徙福清縣有石塘陂久湮塞簡募民復築溉廢田百餘頃邑人為立生祠知竇州有縣吏死子幼贅壻偽為劵冒有其資子長屢訴不得直訟於朝下簡劾治簡示以舊牘曰此爾翁書耶曰然又取偽券示之弗類也始伏罪徙藤州興學養士一變其俗藤自是始有舉進士者知廣州捕斬賊馮佐臣厯右諫議大夫致仕元奉宗范仲淹元奉宗墓志字知禮餘杭人景德中甲科初命歙州知績溪縣事再命常州武進令皆以廉愛稱遷知通州海門縣入拜尚書屯田員外郎告歸卒在海門日邑有大瀆亘數十里堙而不治奉宗抗議藉力導至於海人咸利焉謝景初於越新編自大理丞出知餘姚民所利病相緩急設方略北偏瀕海為築堤捍之豪強率侵湖為田具奏禁止民又爭水泉乃創立規繩簿記其髙下廣狹啓閉晷刻令各鄉遵守名曰湖經有盜湖爭利者證經乃息瀕海多盜煮海乃頒示約束令民無失利法亦罔忤而鹽課倍昔又飭厲學官化誨子弟時景初知餘姚其弟師立知會稽王介甫知鄞韓玉汝知錢塘皆有聲吳越稱四賢云兩浙名賢録富陽人絳之子慶厯十年甲科及第以大理評事知餘姚縣遷益州路提點刑獄以屯田郎致仕博學能文尤長於詩壻黃廷堅自謂從謝公得句法唐肅宋史本傳字叔元錢塘人舉進士調郿縣主簿徙泰州司理參軍有商人寓逆旅而同宿者殺人亡去商夜聞人聲往視之血沾衣為捕吏所執州趣獄具肅探知其寃持之不數日果得殺人者後為龍圖閣待制登聞檢院知審刑院韋驤武林紀事字子駿錢塘人皇祐五年進士以薦擢利州路運判移福建路年飢不俟奏聞亟發倉廩賑活甚衆閩盜熾驤設方略捕獲誅之召為主客郎中出知明州乞祠沈遘東都事略字文通錢塘人舉進士通判江寧府遷知杭州為人疏雋博達明於吏治令行禁止民或貧不能葬給以公錢嫁子女數百人倡優養良家子者奪歸其父母善遇僚寀皆傾心為之耳目刺閭巷長短纎悉必知事來立斷召知開封府治如在杭州拜翰林學士判流內銓丁母憂歸黃黼宋史本傳字元章餘杭人纍遷太常博士除兩浙路轉運副使浙東瀕海之田以旱潦告常平儲蓄不足黼捐漕計貸之毗陵飢民取粳粃雜草根以充食郡縣不以聞黼取民食以進乞捐僧牒緡錢賑濟所全活甚衆麋弇黃氏日鈔字仲昭富陽人開慶中知建昌軍民詞數千立剖決皆洞見其情蠲未催苗三千餘石豪族有誣民為盜者獄已具弇直之武斷之民遂戢元楊瑀楊維楨楊瑀墓碑字元誠杭人天厯間擢中瑞司典簿帝愛其廉慎有深沈之思嘗謂薩木丹巴勒曰楊瑀有謀事必咨之超授奉議大夫太史院判官至正乙未江東浙西盜羣嘯乃改建德路總管建德在萬山中屬邑淳安又連歙境賊由歙窺界而邏者疑長樂鄉民為盜執以歸諸獄連數百家民益洶洶主帥者謀往捕瑀不可曰倘因疑枉鼓衆亂賊得乘釁突來悔焉及我請撫之果不測當任其咎遂肩輿從數隸直抵淳安邑人嘗厄官軍抄掠散匿山谷間瑀載米二百石聲言賑濟使縣令馳諭民皆歡呼持牛酒來拜瑀喜曰吾固知民不吾負即日還瑀蒞郡視之如家民亦視如父母其像而祠者凡十有四所行省最其功進階中奉大夫林堅蘇天爵林堅墓碑字仲實錢塘人大德初授常湖茶園副提舉茶戶嵗貢有常有司又復役之皆以為苦堅聞於朝即蠲其役升承直郎中政院斷事官用刑惟務寬平或有鞫問第以情求之不事搒掠進階承德郎致仕堅為人慈祥愷悌嘗奉旨監製茶品於閩前為使者指以尚食需索多端民不勝擾堅以廉自律復為戢其撓政者民甚安之頌其美於石孫德潤兩浙名賢録字以誠錢塘人由江浙行省掾史為處州松陽令先是縣籍失實力役無稽民困於徭役德潤力行計畝均役之法以方田履其頃畝以土會等其磽沃以出賦定役籍既具適南北多事徵斂旁午縣惟按籍征之民大恱明周斌萬厯杭州府志錢塘人洪武初知登州九年升州為府遂遷知府登地並海民瘠斌撫綏有方民日熙阜勸學崇教使海陬僻壤興於禮義吏民咸化服之王思祖兩浙名賢録仁和人洪武初為安州同知尋進知州在州十年餘為政廉平公慎簡易近民國初甫離兵燹萬事草創凡學校社稷壇壝多所創建思祖撫循綏靖民不告勞嘗手植柏數千章至今民蔭其樹而思之不啻甘棠也卒於官子孫貧不能歸因家於安遂為安州人梁大舉萬厯杭州府志字仲仁錢塘人洪武間以人材授陜州判官卓有異政清白聞逺邇以母老歸趙文廣西通志字夢得錢塘人洪武七年知藤州廉以自持誠以待物政尚仁恕秩滿去民有言及者輒流涕李貞萬厯杭州府志海寧人洪武間補弟子員宣宗朝為揚州知府三載章纍百上民被其澤考績入覲以疾乞歸謝還初所賜敕諭上曰知府無與敕者與爾以旌賢也其傳示子孫以見朕優禮之意既歸家徒四壁立湛禮萬厯杭州府志字用和錢塘人永樂甲申進士授內江縣知縣升大理評事再遷知韶州府韶嵗貢藤而産於渤海禮疏於朝得免貢又曲江豪民二十餘戶皆投充軍戶以免糧差禮乃列其狀以聞事得勘正嘗遣吏卒往樂昌督稅法外需求無已令械繫以來禮下教曰暴橫殃民法所必禁令能不以府役故屈法貸之其賢可知由是府役至邑皆斂戢不敢肆甲乙訟田禮斷歸乙甲復誣訴藩司知其偽命禮按致其罪禮慰遣令去約五日乃來辨析竟亦不加罪也其寬厚如此清白自持始終無替及引年歸貧乏不能自存周文嘉靖仁和縣志字宗武永樂二年進士選庶吉士改擢湖廣布政司參議聽訟明決人稱無寃分守武昌道時黃州荒旱餓殍載道文多方籌畫一方賴以全活無何卒於任民哭弔為服以送歸櫬何澦萬厯杭州府志字彥容仁和人永樂甲申進士官刑曹郎持法嚴不撓貴勢京師為之語曰毋縱誕避何鐡面受知成祖每大獄親呼澦名使決之出知辰州裁抑豪強凡鎮守總戎殘擾市肆者悉舉正其罪民立生祠以祀俞益兩浙名賢録字友謙臨安人永樂甲申進士選庶吉士預修永樂大典授靖安知縣有惠政改潛山大興學校造士多為聞人秩滿當去邑民千數詣闕乞留再任卒於官室如懸罄至無以為斂吏民哀慕而助給之始克襄事歸傅潤萬厯杭州府志字克溫仁和人永樂丁酉舉人授滄州同知廉明服人能白誣獄有傅城隍之稱以薦擢保安知州正統初中貴王振用事振姪顯順怙勢侵奪民産莫敢誰何潤亷得其實竟置之法及入計復不為餽遺振銜之以廉無可指再逾期振嗾總兵者委潤備糧瘁疾而卒周安萬厯杭州府志字元靜仁和人永樂中以國子生授刑部主事升郎中精聽讞慎刑法務得獄情以是狴無寃繫擢江西按察司副使矢志清白厯官二十餘年家無尺寸之儲陳敏政兩浙名賢録字志行其先長興人後卜居仁和宣德丁未進士初授潛江知縣為政廉平不苛四民樂業賢聲蔚起再轉至南康知府宅心公正輔善抑強復社倉修石堤建白鹿書院百廢具興郡人德之子良器官至應天府尹沈和兩湖塵談字用禮仁和人正統乙丑進士纍遷刑部郎中居官持法不撓曹吉祥恃勢時其麾下卒姦人妻為親夫所殺吉祥必欲致其夫死和執不從竟俱下詔獄門達苦煅之終不引伏降通判以去後擢撫州知府致仕朱鏞兩浙名賢録字廷用仁和人景泰卒未進士授南京兵部主事厯郎中出知廬州時合肥僧殺其師舒城民婦以姦殺其夫六安民殺從弟皆誣坐他人鏞至閲成案逮治廉得實俱改坐御史驚以為神秩滿升廣西參政適鬱林賊起督撫統兵往征命鏞紀功師還感疾遂致仕歸孫暲兩浙名賢録字景章海寧人景泰壬申以賢良方正薦授江西泰和縣丞嘗親定徭役旦夕令下請託不及行人稱為霹靂手指其牒為鐵板榜文言其公平允當不可更易也擢博白縣知縣韓雍征大藤峽暲從行多著勞績超授潯州知府嵗飢米價翔湧出公廩粟減值以惠飢民屬邑有為民螙者悉置諸法邊郡大治擢山東右參政致仕邵琮萬厯杭州府志字叔璋仁和人天順庚辰進士授大理評事讞鞫多所平反纍升湖廣僉事時武岡諸縣初燬於兵琮至竭力撫綏築城建縣士民倚之又運竒設策擒孝感巨冦李善境內帖然升四川按察司副使俗善告訐而琮聽斷精核庭無留獄至於抑陳謙之橫雪李明之寃尤其著者未幾致政歸方銓嘉靖浙江通志字景衡新城人天順壬午舉人任安陸州學正治易以專門授諸生其有習他經者訪鄰郡明經之士為具幣往卒業焉一言一行必步趨先民凡教人悉以身先之多所成就從子源𢎞治間鄉貢授侯官訓導升建寧教諭訓士一如詮法溥以舉人厯任婺源龍溪知縣所至皆有聲一時稱善政善教者必曰方氏云陸偉錢塘縣志補字仲奇成化乙酉舉人授澤州知州時州罹洊飢人相食偉奏發內帑沿門賑救區畫纎悉全活者數萬州有寧山衛軍民雜處恆患不靖偉懾之以威彼此帖然葺州治新儒學至漏澤園常平諸倉路塗橋梁靡不備舉致仕歸州民攀留數十里不絶車至不得行錢鉞河南通志字大用仁和人成化中知汝寧府事至皆自剖決吏胥無所容其姦暇則行縣教民開陂堰勤種稙嵗獲其利於是逋亡歸者戶八千有竒郡內熙然稱治在任九年升陜西參政沈禎兩湖塵談字天祐仁和人以貢生授香河訓導正德初流寇起禎上疏請城香河奏下巡撫即以委禎禎旦暮躬蒞版築乃成冦至賴以安祝萃萬厯杭州府志字維真海寧人成化甲辰進士授刑部主事改工部從徐侍郎貫治水吳中發卒二十萬綜理有方士卒樂為之用進虞衡司員外郎嘗上疏請上親禮儒臣以資啓沃詞甚剴切不報乃疏乞歸養正德壬申起為陜西提學副使進廣東左參政遂解官歸沈儀萬厯杭州府志字懋德仁和人正德已卯舉人授清江縣知縣安靜不擾吏民歡樂之督學使者徐階行部至清江見其衣冠朴野心頗易之居數日則察其六事修舉所守卓然乃歎曰設吾以皮相天下士幾失賢令矣升惠州府通判投劾歸許仁萬厯杭州府志字元夫仁和人正德庚辰以舉人授巢縣教諭擢河南郾城令雪寃獄減重徭弭盜捍患勤於撫綏以性狷執不能事上官調德化德化瘴鄉民獷悍難治仁一以簡重鎮之毁淫祠改社學建公署導埂渠勞績顯著調同安豪右以舊憾騰謗遂罷去許應元獻徴録字子春錢塘人嘉靖壬辰進士當選庶吉士執政者欲一見應元不往曰吾始仕也而傴僂鼎貴之門冒謁干進哉坐是竟不得館職出知泰安州有豪右觸死法賂權貴人以請應元不為撓竟斃之廉白自持苞苴斷絶擢工部員外郎遷夔州府知府夔當楚蜀孔道號難治應元馴以廉靖時斥其桀黠者法之郡以蘇息治為一道最擢四州按察副使調廣西已又攝兵府江巨獞莫氏兄弟三人以雄勇名兩粵間往嵗嘗大嘯聚破城殺吏討之漏刃去前兵備以擒獲報而罷兵及是復出益猖獗應元設方略購土人浹旬而三凶授首江道底寧轉雲南布政徙廣西髙應冕馬三才髙應冕傳字文中仁和人嘉靖甲午舉人選湖廣綏寧令務寬恤懲豪右設預備倉建虎溪書院府陽兵變應冕謁監司請單騎往諭皆叩首棄兵改刺光州延見父老察民疾苦除鋪戶雜派捐𣙜稅之無藝者盜魁鄭某大族也計擒而錮諸獄其黨鳥獸散始視事時老掾吏抱疑牘嘗之立為剖決於是訟堂閴然以養母乞歸姚良弼兩浙名賢録字夢賢錢塘人嘉靖乙未進士授南刑部主事出知惠州先是嶺海間多盜良弼請募民兵團保伍每隘列柵建樓懸鼓其上令曰遇盜發某處輒登樓擊鼓餘隘聞各鳴鼓應之然後陳兵守隘盜至即擒者賞縱者與盜同罪於是盜悉解散民得安枕旋擢雲南按察副使歸許貫之萬厯杭州府志字道卿錢塘人嘉靖乙未進士授吉水令時按浙使者吉水人也意有所屬即欲酬以浙事以微言諷之貫之曰如此則類貿易有市心矣拒不可愛民若子權貴干請一切謝絶治行為江右冠徴入為兵科給事中將去官出已資葺廨宇繕完器具以待後尹曰吾不忍重勞民也其瘠已厚民若此翁相獻徵録字輔卿錢塘人舉進士授虞衡司主事改刑部郎中出守廣平郡故多盜白晝劫獄殺略吏民相擒一二盜魁餘悉下教原之盜遂平時嵗祲河北諸郡飢甚相不及檄聞輒開倉放賑全活者數萬人治行冠河北以病免歸徐炳萬厯杭州府志字仲孚海寧人嘉靖癸丑進士授南刑部主事進郎中厯升河南副使備兵大名減供餉汰冗費裁省民兵濫額以休養魏人魏人咸德之屬邊戍缺伍部使者出清查勾諸郡邑令甚峻炳曰勾軍補尺籍無益戎備秪破民家又發閭左護之行兼亦破里乃入言部使者不便狀一道賴以全活轉山西布政司參政卒謝教於潛縣志字文載嘉靖戊午舉人授懷逺知縣遷忠州知州時宣慰土司馬得和擅據疆土教以大義責之遂還土地三十里厯撫州同知補任吉安同知興利除弊所在有循吏名遷淮府長史受遺輔幼厯著勞勩進階中順大夫以年老致仕查志隆石星查志隆傳號紹庭海寧人嘉靖己未進士授寧國司理刑清訟簡聲望蔚然丁艱服闋補南駕部主事厯員外郎中出守皖城調保定旋晉天津兵備地多巨盜治事月餘雖夜行亦安堵又葺城隍復團兵功最著轉總儲山東卒髙汝梅仁和縣志字子和嘉靖辛酉舉人令繁昌地濱江嵗苦潦汝梅創築髙塍植樹障隄又濬陂池備山田蓄泄民永賴焉會丈田役興乃酌頒弓式令民履畝自報而單騎覆核之臺監檄逺近為式課最遷福寧州守時悍卒以尅餉將變汝梅躬慰諭皆帖服以親老告歸林梓杭州府志字汝林仁和人嘉靖壬戌進士授中書舍人改刑部員外讞決多平反海忠介得罪械繫梓持論得緩議厯郎中擢延平知府常俸外絲粟不染永安山漲衝沒民田八十里糧無出當事議加派取盈梓力陳不可凡七移牒往返撫按不能奪賦額得減訟訊不留行嘗曰四民皆有恆業一日稽留則一日失業矣升雲南金騰副使謝病歸結廬葛嶺題曰從吾别墅足迹不入城市年八十七而終延平人追思不置崇禎十年祀名宦錢立兩浙名賢録字守禮仁和人嘉靖乙丑進士授刑部主事調兵部復改工部汰冗剔螙以廉幹聞厯員外郎中出知太平府時蕪湖盜剽關稅守令執賈人誣伏立閲牘歎曰是非盜有司乃真盜矣悉解縱之授捕者方略不浹旬盜盡獲擢廣西副使備兵永寧適土夷爭田治兵相攻諸武吏請𠞰立不聽檄諭以禍福皆羅拜受命因法其一二首難者餘置不問所全活無算尋致仕歸查志文兩浙名賢録字鳴周海寧人隆慶丁卯舉人選廬州府通判絶苞苴却稅羡嘗割俸代輸贖鍰時河工告急當事檄治懷逺睢寧等處志文輒負畚鍤以身先之會雪甚役者墮指志文請便宜當事者利亟成不許乃私自散遣約以解凍而集工咸如期至感恩奮勵不督而成遷無為州守敘河功加廬州府同知仍管州事州治濱江患水志文不及上請即發粟以賑全活數萬又值大祲郡守督稅急牒三四下復遣吏督促志文乃解印綬更皂帽請以身坐吏還報郡守乃止尋為忌者所中遂解歸金俸福建通志杭州人萬厯初以鄉薦任汀州府司理執法平反民稱不寃署建寧篆時當丈量多溢額俸定為四則上下均勻填還原額民甚賴之髙江王在晉髙江傳字襟之應冕子萬厯乙酉舉人選諸暨諭擢尹江西新城新俗澆漓巨猾善持短長江以法繩其魁采風謡察疾苦條上十四事臺司著為令杜一切請謁賂遺及贖鍰奇羡嘗覽訊牒有文某撾殺王女事一夕夢女跽訴詞惟駟斐二字江乃悟殺人者馬四非文也庭質果欵服有婦誣人殺其夫坐辟久江閲爰書曰實婦殺之也脅骨已折安能行五里許而歸婦具服有理刑欲中傷之即日移疾歸改教東光攝吳橋令篆大璫盧受延之賞雪出貂裘衣之拂袖起會疾卒縣令宋某入視含殮見一裘一葛竹牀縑帷篋中止俸數金歎曰真清白吏也查允元江西通志字虞臯海寧人萬厯癸未進士厯禮部郎中出為江西提學僉事再任江西參政持守廉介蒞事六載始終不移遜國忠臣練子寧八世孫練綺自福建長樂回原籍允元訪得之給衣巾復給學租百石令奉祀金川書院年未五十以疾乞休錢養廉杭州府志字國維仁和人萬厯己丑進士授工部都水司主事管河夏鎮時汶泗諸水以夏鎮為壑而昭陽諸湖在其下流養廉乃先從堤旁開二支河以殺水勢又議於昭陽湖側鑿石通道至徐邳以下出口則內水無壅閼而漕渠可百年無事會以父喪去官後人卒用其議服闋召補吏部考功署郎中事日本犯界尚書石星主和議總督孫礦不從星乃誣礦通書幣下廷議養廉屬草剖析極明和議止礦亦無罪尚書孫丕揚以清望用養廉非閣臣意丕揚去養廉亦奪官歸楊廷槐獻徵録字祖植錢塘人萬厯乙未進士任浮梁令邑景德鎮嵗辦貢磁外供應諸司廷槐一無所賦曰吾去日必不攜一磁以傷吾民也擢刑部郎會楚獄妖書相繼起廷槐於中調護甚力晉憲副備兵閩海忌者假大計中之左遷鹺判稍移南比部厯禮部出備兵徐淮議開駱馬湖以通漕運徙徐州城以避河患改州為府以便控制併淮徐道以一統體清沛縣妖黨以安反側尋調天津津故魏璫鄉里先是監司有匍伏庭下者槐曰吾自用吾法與平交一刺璫大不懌令璫私人李明道出監漕勢張甚槐擒治其下隸遂以凍糧不前罪槐削籍後璫敗復官再備兵徐淮築歸仁堤停課稅行捐賑葺浮橋立軍營復河道善政不一而忌者復中之竟拂衣歸尋調江西參政再除湖廣按察使俱不起翁汝遇翁汝進杭州府志汝遇字子先仁和人萬厯戊戌進士授東管令𣙜蕪湖關最後守朝歌俱有惠政所在尸祝弟汝進字獻甫萬厯乙未進士授興化令疏河四百餘丈東入海建四門石關以為水防厯官至山東參議以忤逆璫罷歸鄭圭廣西通志仁和人天啓三年知平樂縣蒞任七載撫字催科有方捐鹽羡以助糧餉積公餘以造浮橋庭無訐訟野無追呼升去士民作逢年亭以寄思焉郭正中朱一是郭正中傳號黎眉海寧人天啓舉人選授山西代州知州未赴留京修厯在厯局指斥時政皆人所不敢言出蒞代兼司理事治獄多平反期年決罰者僅二十六事尋與監司不合自劾歸後以薦起邊才為兖東兵備副使單騎就道嚴清軍之法倣義倉之制撫流民練鄉勇勞來安集盜不敢犯史可法保舉監淮東諸路軍忤四鎮拂衣歸陸運昌陳子龍陸運昌傳字夢鶴錢塘人崇禎甲戌進士授永豐令豐地墝埆又新被兵逋賦以十萬計運昌將之任上書言永豐積逋十萬今臣之官當疾徵之耶抑縱之耶縱之則無以佐軍興按籍而誅慢令臣罪無赦疾徴之則民不堪命挺而走險非誅臣無以謝黔首罪亦無赦臣旦夕死等耳何忍困此一方民惟陛下幸哀憐之書奏帝下大農議遂蠲復焉視豐未二載以治行最遷吉水令吉田賦多乖紊邑民周正淑請於朝願履畝丈之事下所司運昌召正淑糾畫形便審度利害并集文學弟子嗇夫司里雜議其所由廢興之狀往覆辨難以十數民辭窮又爭言不大便運昌曰凡前言當丈與今言不當丈者皆非知治體者也於是核民實無田有賦其賦浮於田者皆上其數取河壖棄地非民業者代其賦不及田者寧失輕以加惠之具方略上奏制曰可民咸樂業建饒虔廣冦大起攻宜春去吉僅百里運昌捐俸築城樓櫓畢具賊亦不至以母憂去官張懋謙江西通志字顧存錢塘人崇禎間知九江府時張獻忠陷蘄黃蹂躪梅廣分掠九江界懋謙多方防禦民得安堵無何飢饉洊臻疫癘交作懋謙發粟賑救施藥療病築堤修閘事皆可紀錢朝彥杭州府志字殷求錢塘人崇禎丁丑進士知句容縣蒞任數月有飾金珠偽為藥餌以獻者立置之法嵗飢民晝掠於市朝彥亷得其首惡斃杖下民乃戢被誣調簡旌德遂投劾歸國朝何元瑞鄉賢留祀册富陽人順治二年由貢生任安慶府通判職司漕務時民運軍運之議未定百姓苦於輸挽元瑞以民運一定貽纍非淺於撫軍前痛切言之遂著軍運為定制民得安業委署桐城縣重士愛民輕徭減賦後以親老告歸駱鍾麟鄉賢留祀册臨安人順治丙戌舉人丁亥會副任盩厔令時值淫雨渭河大決鍾麟禱於神水不落願以身殉翌日河身他徙邑人立碑志異歸修邑乘建輿梁嵗飢鬻産捐賑吳道煌鄉賢留祀册錢塘人順天籍順治己丑進士初任武康令補閬中皆有惠政以循卓擢禮部郎出為蘇州知府錢塘縣志道煌守蘇州時新立駐防旋奉撤回以舟楫資裝不能具咸觀望不即去道煌具屝屨集餱糧且曰太守為諸軍祖道勿逗留獲愆千艘一夕發巨家被誣以家釀進發之皆金珠也道煌力却之仍為雪其誣有以通洋搆大獄意在多株連道煌驗其所駕舶曰誣也海舶必用巨木長數尋貫首尾名龍骨非此不能行逺此獨無直民間小舟耳竟從末減去任後吳人祠祀虎邱顧鼎銓鄉賢留祀册仁和人順治甲午舉人知山西蒲城縣值兵燹之後百計招徠民皆復業嵗旱鑿石為渠以資灌溉又廉得巨猾素為閭里之害置之法民曰較疏山引水之利更什伯也子祖榮官內閣學士邵嘉鄉賢留祀册富陽人父啓元稟異姿過目成誦行文雄博自成一家言嘉中順治乙未進士厯督捕主事典試滇南督江南學政時每學入泮額止四名嘉每得佳卷不忍棄置即捐俸代為援例所厯學宫頽廢輒為修葺總憲魏象樞疏薦晉鴻臚寺少卿以終養歸柴望錢塘縣志字秩于仁和人順治丁亥進士由縣令厯廣東布政使萊州府志望守萊州遇水潦捐俸賑粥鄰郡百姓襁負就食全活甚衆膠州牧與總鎮不協鎮兵譁望親往安撫始定創築城東濠隄士民德之名其隄為柴公隄周甸公舉事實字屆孚新城人順治丁酉舉人兩任學諭升湖廣宜都知縣勤勸課革徭役慎聽斷絶差擾民咸便之會亢旱虔誠步泣禱甘霖隨沛後病卒官署合邑感俞宣琅公舉事實字雍來海寧人順治己亥進士由學諭轉大竹令邑經獻賊殘破居民鮮少宣琅下車即稽户口墾田畝招徠拊循靡不至先是邑令公膳籍編戶按月供億宣琅一切罷之疲民稍蘇歸籍者亦漸衆會以病卒貧不能返櫬邑民醵金送之柩始得歸王典河南名宦册字備五仁和人康熙二十年由恩貢任湖南永興知縣經吳逆兵燹後招流亡開荒蕪民以安集有虎為暴禱城隍神虎自斃於市以滇黔餽餉功調杞縣政尚寬仁不事鈎距孺子彭某誤傷人典察其情出之建社倉興義學公暇與諸生課藝多所成就卒於官祀名宦何矞雲錢塘縣志字令名號曽園錢塘人康熙丙辰進士授中書改桂東令初至訃民口止六百有竒城傾戶毁乃募流散給牛種具田器緩繇賦流亡漸復邑無書籍因發篋出所攜經史諸書召諸生曉文義者授之闢學舍聚徒講習請留貯學租佐膏火邑中戶聞弦誦聲楚南多雜派桂東代鄰郡監司買米五百石轉運千里道險而費多民甚苦之矞雲毅然不應具文白督撫上開湖南州縣六十有三因矞雲請得豁免者四十有二治桂東十二年行取以主事用請假歸蔣德昌公舉事實字聿修海寧人康熙壬戌進士授中書改屯田主事兼督兩窰值新建太和殿綜理精密厯營繕都水員外郎擢刑部山西司郎中讞獄克允出為湖廣提學僉事矢公矢慎試牘不旁假恆夜分不寐年七十卒同官醵賻以歸諸生炷香泣送者數百里不絶陳履升鄉賢留祀册錢塘人任浮梁巡檢景德鎮産磁器每一器必欵識年代於下器損而字不滅遂至棄擲履升通詳勒石禁止窰户集金走賂求勿禁履升曰六書聖賢之寶可使狼籍糞壤中耶厲色却之錢塘縣志履升在浮梁時有為盜囊槖者令畏勢不敢問履升用計擒之置於法時閩寇方平悍辨虐民履升列欵上之其人隂謀中履升既而悔曰陳君正人也敢不服且謝過焉張曽裕公舉事實字昆詒號容軒海寧人康熙戊辰進士授臨朐令濬木刀溝以通水利分四鄉限以勸徴輸邑西南山僻常有盜為立保甲法時單騎巡緝至寒月尤厲年餘盜絶丁艱服闋補新樂縣縣故有社書取辦公事每嵗一更例以鄉之富而愚者當之常破析家産曽裕知其弊乃擇每里知書算者面詢以充不願者聽退民踴躍稱便聽訟時無論巨細必溫辭絮語欵曲推究務得其情故雖加箠責不怨有劉某惑於後妻訟子不孝子懼而逃曽裕召其父諭以天性果悔泣子出服罪父為哀懇乞免又俗相沿畜異姓為子有孀婦曲庇其義子反控應繼之姪庭訊時以大義明白開曉婦亦泣謝而去擢吏部文選主事未數月改御史卒於官曽裕性坦易無崖略讀書勵行至老不衰尤好汲引後進遇一材一藝常稱之不容口卒之日聞者多為泣下陳嵩公舉事實字巨髙海寧人康熙癸未進士授刑曹郎執法不阿有姦人怗豪家勢謀奪人婚力為判完原配盜誣良民廉得其情釋之邏卒斃人蘆溝橋或隂左右焉嵩不聽卒抵於罪遷儀部郎值髙麗入貢使例有私覿峻拒之一無所受歸田後杜門守正當事不通一刺混迹村氓見者莫知為貴官也楊宫建公舉事實字千門海寧人由貢生任山東城武知縣邑為單邑上流堤河久塞不治兩邑俱病宫建力請於大吏期與單邑同時修築瘠土遂成沃壤丁艱服闋補河南寶豐復疏鑿長渠備水潦豐人戴之曰楊公渠子存理癸未進士性孝友官刑部郎有能聲厯兵科給事中楊中楠公舉事實字公三海寧人康熙甲子舉人選授河南鹿邑知縣下車廉明子諒遭年飢民有鬻妻子者惻然曰為令不能謀保聚奚撫字為乃捐俸代之贖邑地勢窪下民居常患水中楠開渠濬河躬督畚鍤由是闔境無淫潦之患尋以病卒於任汪泰來公舉事實字陛交錢塘諸生好學工詩文康熙乙酉聖駕南巡泰來迎鑾於尹山橋進詩册欽擢第一召入內廷與纂修中辛卯順天鄉試壬辰海多盜且姦特賜進士出身授廣東潮州府同知潮瀕販往往運米出洋泰來嚴行禁緝民始安堵管東西兩界鹽場發帑不假手胥吏赴場督收餘鹽不令利歸私販場課溢額革魚船規例禁踏勘供應以羡補前官之缺捐俸助屬吏之喪戊戌夏山水陡發衝決北門外堤田廬漂溺泰來創議捐築躬先畚鍤不數月隄成潮民建祠立碑名曰汪公隄丁內艱歸服闋赴補卒於京邸有後山文集半舫詩梓行問世邵錫光公舉事實字克大仁和人逺平子康熙丙戌進士任江西新建知縣下車即革陋規減耗羡又善決疑獄上官輒以旁邑事屬代讞清江縣何氏夫死族人誣為氏毒其夫獄已具錫光奉檄覆檢傷在腎光曰此隂症也寃遂白貴溪楊胥妻為無賴子所私賄捕誣以盜錫光發其姦遂服丁內艱服闋補江南潁上縣調繁溧陽武生宋武潛謀不軌錫光以計擒之餘黨解散升雲南祿勸州知州卒於官嘉興府宋趙汝能𢎞治嘉興府志字公舉崇德人系出濮邸登紹興進士知泰之海陵嵗歉民飢嘯聚為亂人情洶洶汝能曰是非巡尉可辦即部勒弓手土兵設方略直前當之擒捕百餘人其黨潰散罪渠魁餘悉末減連倅舒蘄諸司多以滯訟委之剖析簡明號稱平允知鬱林州首興學校士風丕變調守全州厯浙西沿海議幕官至朝議大夫謹按徐一夔崇德趙氏世譜序汝能贅居崇德占籍故崇德志之而常濬孫海鹽縣進士題名記汝能在三十九人之數海鹽圖經據之作海鹽人徐綱𢎞治嘉興府志字晞顔桐鄉人乾道八年進士出宰江隂嵗旱鄰境流移踵至綱先條畫利害申請臺郡發廩分場便糴盡革吏姦全活甚衆入除提轄文思院著史論百篇及邊防兵政十六事以上之不報力丐祠歸里陳之綱正德崇德縣志字仲宏登淳熙進士第令泰之海陵政先惠愛聽訟明敏民頌廉平縣有捍海堰綿亘數十里天聖間范文正公任西溪鹽監日所築至是堤址頽闕潮汐衝突浸害農畝之綱請於郡修治勿憚寒暑躬董其役視昔堅壯改知仁和縣卒蔡開正德崇德縣志字子明登淳熙辛丑第厯除監六部門添倅平江旋知邵武郡山多田少嵗入不足支嵗出例輸官租一石則帶糴四斗官寖求贏民益困開至俾民自用槩糴價視時低昻白於朝為定式盡杜增收之害未幾除武昌漕司尋改漕江西屬郡旱歉捐漕計以濟所活不可勝計卒於官莫若沖嘉興府圖記字子謙石門人知安吉吳江有聲除司農簿出知嶽州時兵荒盜起若沖督捕賑發境內帖然知全州漕司檄解軍糧州處湘源壤髙易涸客舟聞裝糧絶不至若沖發官帑造舟搬運率先諸郡明年靖江暴水民賴以濟除大理丞丐祠歸莫若晦正德崇德縣志字子明舉進士除守宜春始至承積蠧每事撙節盡蠲四邑宿逋數萬緡以寬民力期年郡計稍舒乃新黌舍築城堞修浮橋百廢具舉役不告勞厯除工部郎中請外知徽州改知嚴州致仕沈木萬厯嘉興府志石門人第進士宰石城汀冦猖獗邑豪熊子開等為冦鄉導巡尉司妄指同姓者捕之木察其非是破械使捕子開等邑境遂安守真定民有以田多賦少告訐其仇者木謂東西無經界冒占者衆不可勝詰亟懲遣之有建議籍民所據官田為屯可以富國經制司委州根據株連六七百家木曰此事行則變生矣亟以前牘上之事遂寢陳炳嘉興府圖記字宜之石門人令上虞有西溪湖瀦水利及三鄉中廢為田參政張綱嘗浚之刻石為記嵗久豪右復據夏大旱民持綱所刻石請復湖豪右撓沮之炳奮曰令寧以罪謫去必不忍畏避強禦委棄三鄉民命也卒浚復之百姓歌曰前復湖張參政後復湖陳縣令與我衣食全我命後除提轄文思院卒元沈兼善昌化縣志字達卿崇德人至正八年任昌化縣主簿蒞事明敏參政董摶霄敗蘄黃冦於昱嶺關兼善多協贊焉及冦平撫綏有道民深德之明丁豫海鹽文獻志字叔寬洪武初以儒術聞幣聘入京召見問天下治否對曰盜賊已息但恐復生願以安民為本稱旨授江西按察司僉事詳刑慎法澤被於民民頌之不衰沈貴河南通志字廷臣崇德人宣德中知汝州編民户等級以均差役循行田里教民樹藝作陂堰溉田民享其利以疾卒於官士民立祠祀之吕聲正德崇德縣志字廷和景泰甲戌進士知進賢縣至即咨民隱規利弊興學校成禮俗任滿民相率請於朝得復仕厯十有三載冰蘖之操終始一致以治行升太僕寺丞上馬政五事見採納成化丁酉引疾歸薑諒萬厯嘉興府志字用貞秀水人天順甲申進士厯遷南刑部郎中知漳州府龍溪漳浦田皆傍海多㵼鹵乃築長堤凡一百八十六所又濬塘渠置社倉作義冢立鄉約患郡中田賦為里胥乾沒飛射詭寄者多乃悉為斷理復其舊籍按户計丁分為三等遇徭役酌量輕重授之民役視舊額減半以親老乞終養歸梅江兩浙名賢録宣城梅聖俞之裔宋南渡後始居嘉興江登成化己丑進士授廬江令興利剔蠧政聲藉甚士民畏愛之擢南御史時儲位未定大臣莫敢言江首疏力請上嘉納賜織金豸服奉命清戎兩廣寬恤部伍招撫流移遷四川僉事決疑獄數十事蜀人以梅鏡稱之陸逺萬厯嘉興府志字德毅秀水人成化乙未進士知海州清修鯁介聽斷明允一日行部有旋風三匝馬首逺疑有寃令吏卒邏察之見一人死樹下折擔尺許貫其喉乃土人殺買牛者移尸於此密擒之一訊而服於是訟衰盜息擢廣東按察司僉事陸愈兩浙名賢録字抑之平湖人成化乙未進士知江都縣窮鄉下里靡不巡厯殆遍月召有年德者鄉一人詢民利弊而興除之嵗凶民多鬻子女於江南愈捐俸出罰鍰贖以完聚者幾百人每新穀未登輒發舊廩散之約秋成償而不取其息又築邵伯堤教民鑿溝洫時瀦泄以溉田旱潦不復為患召拜監察御史出按西蜀下車鋤豪強斥貪墨發姦弊風稜甚峻出成案之不能生者亡慮百十數滿一載將代以盛暑行炎鄉得疾卒劉暐海鹽縣圖經字公竒成化甲辰進士選御史督兩淮鹽政兼治河道時兩浙山東水旱疏請賑以鹽策餘銀全活者甚衆髙郵湖風濤不測時時壞漕艘暐乃築堤四十里别為裏河通漕名康濟河舟免覆溺擢廣東按察副使正德初請老項經檇李往哲初編字誠之嘉善人成化丁未進士授南福建道御史出為太平知府經一意撫循流亡來歸者萬計移治臨江與袁筠諸郡接壤土冦剽逸出沒其間前有司率玩愒慮他變弗敢動經至立捕諸豪賊百八十人置之法一郡大治逾年臨江飢有司方請賑經曰民飢甚矣必請而賑是懸口以待斃也賑而弗請罪在太守於是發府庫金建和糴之法民賴以濟時監司督賦方急經不奉命監司怒甚繼而嵗大稔民入賦恐後為諸郡最後以江西右參政致仕吳昻海鹽縣圖經字德翼起家進士令宜城廉介自持改新建新建人困寧濠索租匿丁家山以拒濠言民反宜速兵昂勿為動入山諭民民立散嵗大飢官無儲粟昂立抽補法賑贍全活萬人厯官福建參政古田礦盜起發兵躡捕渠魁散其黨進右布政未幾致仕陸鋹兩浙名賢録字克潛平湖人成化間由貢士授程鄉知縣程鄉在山海間多劇盜鋹初至議者皆以殄盜為急鋹謂與民未有恩信何遽勞民乃新學舍以禮義勵諸生問民疾苦晝夜不息期年之後始團練義勇間出𠞰冦斬捕常至千百盜賊畏威慕化相約無犯程人搆訟多以賂取勝鋹門無私謁健訟者不得行訟遂息以母喪歸民號泣攀轅者數千人出境而後返行至常山以哀毁致疾卒平湖鄉賢實略鋹性至孝父圭患癰吮之而愈母畏雷輒趨侍達旦不寐任程鄉為政廉肅程鄉人立祠祀焉卞諶正德嘉善縣志字信卿以進士授廣信府推官決獄精當雖老吏不逮嘗經鉛山嶺道有卧尸忽夜夢一人謂傭者為主所殺密訪其人得之遂伏辜郡稱神明孫璽嘉靖浙江通志字朝信平湖人正德戊辰進士知興化有惠政轉揚州府同知嵗飢悉力賑救全活以萬計終山西按察司僉事獻徵録璽在揚捕州時值宸濠反攻安慶璽奉檄守儀真扼江之衝儀賓之為諜者與其黨十餘人武宗南巡璽署淮安守調發百出而人不知疲薊州銀冶盜嘯聚千餘乘利據險為患璽攝兵備選吏馳山寨榜示禍福各自縛詣璽罪其首餘遣復業及徙雲南分巡洱海道麗江土官川蜀爭金沙江相讐殺璽會勘其事土官以金賂同勘者久伺璽卒莫敢賂由此解讐奉約束如故大同經兩亂後卒伍驕悍璽以僉事巡大同盡心撫馭人賴安堵會山西巡按以考察中之遂罷錢琦嘉靖浙江通志字公良海鹽人正德戊辰進士授盱眙縣流賊入境琦竭力戰守邑賴以全厯升臨江知府德政懋著調思南府尋請老歸檇李詩繫傳琦厯禮刑二曹永嘉爭大禮出疏示琦請署名琦不從自思南告歸築樓曰東白吟咏自適著臨江集公良詩選雩史測語行世鍾梁海鹽縣圖經字彥材正德中登第為刑曹郎嘗諫止南巡杖闕下幾死世宗嗣位録其忠加俸一級奉敕慮囚江南平反死者百三十餘人擢知濟南郡平萊蕪冦邵志多擒斬功改知南昌裁正湖地賦役權貴斂戢丁艱歸年僅四十即疏請致仕張徽萬厯嘉興府志字德卿秀水人正德辛巳進士嘉靖初授大理評事會議大禮忤旨廷杖尋復官進寺副奉命慮囚雲貴釋殊死以下百三十人進寺正擢守南雄墾荒田籍流民開商市清軍屯多著惠政錢术海鹽縣圖經字汝沖嘉靖癸未進士授威縣令威賦厚薄不等版籍絲棼术仿朱文公漳州圖帳為則壤畫界雖勢有力者請寄不聽威有門丁産三徭吏上下其手與姦市术復就中裒益令適平時河北三郡賦役咸苦不均父老聞威法良便爭請往均术受臺檄遍厯旁邑盡均之惟內黃南和弊尤甚獨留經理三月至今二邑民建祠祀之如威民也滿七年丁艱歸即家擢工部主事未赴卒馮汝弼獻徵録字惟良平湖人嘉靖壬辰進士為工科給事中奉命視光祿及盔甲厰劾巨璫數人置於法中貴人憚之左遷常熟令築堤建閘丈田均賦事有便於民率先諸邑嚴辦擢知太倉州至則減供億除民所疾苦有劇盜聚江海間前守不能詰汝弼設方略擒之復襲擊其黨轉揚州府同知遂歸值倭冦發海上往言於督府請城平湖躬畚鍤以先作者及冦至賴城守得全沈鎜萬厯秀水縣志字大新嘉靖乙未進士授興化府推官廉平不苛攝莆田邑篆海堤決時為田患鎜令堅築石堤以絶風濤之險升南虞部主事𣙜稅蕪湖令商自籍其稅而上計時即以其籍往不更他籍胥吏不能為姦後升江西按察副使備兵饒州計擒劇盜數十人卒於官周崑豫章書字孟登崇德人嘉靖進士授玉山知縣調進賢威惠並行邑有盜魁蹤迹詭祕崑偽為出遊抵鄉捕得數其罪杖殺之人稱神明沈垣獻徵録字子完平湖人嘉靖乙未進士除大理評事厯寺正出知惠州府事至立斷務得民情有李鑑者和平劇盜也糾羣偷負險出剽劫垣設方略調兵餉遣人入巢諭禍福鑑自縛伏罪支附皆解散值嵗祲發廩賑贍為平糶法通有無全活數萬人會郡有利病條上詣督府議途遇瘴卒於番禺館舍卜大同獻徵録字吉夫秀水人嘉靖戊戌進士授刑部主事厯湖廣按察司僉事督下江防按行猺俗去民所疾苦飭封守立里保令行期年羣盜屏息會海冦挾倭作難而閩為禍首時論推大同才擢福建巡海副使諸所興革咸與民宜賊知有備終其任三年弗敢犯所著有征苗圖記備倭圖記吳淞萬厯秀水縣志字秀東嘉靖丙午舉人選知閩州戢苗獠使同編户輸稅會山水驟漲民溺死無算淞亟懸賞格拯一人者與十緡又躬令人置筏以須未渡者二守九江時湖口關值水衝商舶多壞淞曰寧算錐刀而傷民命乎請於觀風使者議革之商大稱便巳遷福建鹽運司同知引年歸屠仲律萬厯秀水縣志字宗豫嘉靖庚戌進士令弋陽遷廬州守時軍興浩費更以景府之國郡邑騷然仲律一意節省費減他郡十之五嵗大祲民多逋稅為出贖鍰代償又出積榖數十萬平糶所全活甚衆以勞瘁殁於官劉炌兩浙名賢録字元白海鹽人术之子术贅於錢從其姓炌始復為劉嘉靖庚戌進士除知金溪縣考最稱治行第一擢南工部主事厯升撫州府知府值鄰冦初退炌撫循瘡痍簡兵保穀又築崇仁樂安宜黃三城修千金堤民享其利進按察副使備兵福州山冦緣間鈔暴炌以計芟剃略盡擢廣東右參政大盜曾一本出沒雷連間炌與俞大按猷戚繼光等贊畫進止暨軍實炌功為多升貴州察使嘉禾徵獻録貴初寄治土司無屬縣炌議省會之地不可孤置府治宜革程番府所轄貴陽移治會城為貴陽府而以其地設附郭新貴縣從之後降湖廣右參政徙廣西羅施道參議粵地介在溪谷蠻漢雜處省城兵力孱弱不足彈壓乃大閲簡士馬嚴整部伍妖人金雲峯挾米賊術作符書招納亡命簧鼓楚蜀黔諸大酋炌立誅之值張居正歸葬炌獨不往御史奏罷卒於家范之針獻徵録字從敬秀水人嘉靖乙未進士任行人升工部郎中出知永州府時猺賊內訌官軍屢潰之針以計悉擒之兵備潘某欲張大其事以為已功遂多株連無辜者上其名且就戮之針謁潘紿之曰土冦陸梁罪固無貸但人心方洶洶不開釋一二恐為頑梗者藉口曷付之針核實始置法潘許之事既下遂盡釋之潘大怒以為賣已疏劾之針上察知其狀罷潘調之針漢陽府遷雲南副使湖廣參政皆著勞績進雲南按察使致仕陸相儒兩浙名賢録字大行嘉興人嘉靖乙未進士授工部主事出知延平府首行條鞭法為八閩倡閩人稱便又創義倉行鄉約興學右文郡大治擢貴州副使土冦拒命數載時議撫議𠞰無定畫相儒獨許其自新卒歸順以憂去服闋復補閩中會島夷入犯遣材官逆於海斬獲有功以疾卒於官張應治萬厯秀水縣志字體徵嘉靖壬戌進士擢南户科給事中彈劾不避權幸如請正宮闈劾遣巨璫邢保疏革南司禮監神帛皆人所難言者出為九江守首復軍餉議條鞭緝盜賊會江右大祲流民相攜入境應治以便宜發廪賑之全活甚衆萬厯初舉卓異升臨清副使馮敏功獻徴録字元卿汝弼子嘉靖壬戌進士授禮部主事厯員外郎中出為江西參議會浙兵挾餉鼓噪敏功召其長怵以利害皆叩頭謝趣授餉以次屬於舟使一倅導之勒兵隨其後衆咸戢轉副使備兵徐邳是嵗河溢睢寧新安間大小十餘決敏功晝夜并作凡所獨治南自曲頭集抵青田八十里北自陸灣至吕梁四十里所與監司曹郎雜治直河南岸堤九千丈茶城而上接曹單隄百六十里一切指畫皆可經久遷山東左參政抗議泇口膠河俱不可開忤柄臣意自引歸言者交薦起督漕於淮按視淮南邵伯等三河疏內河以通漕艘力任艱巨致疾篤趣召同官囑曰內河誠便利然太逼湖隄易潰宜别為護隄不即數百里魚鱉矣遂瞑神宗朝贈太僕卿王朴萬厯秀水縣志字德純以貢授徐聞令邑故有珠池課中官恣溪壑為民患朴請罷之又有檳榔稅佐縣官厨傳往往入為槖中裝朴首革之著為令釋寃獄賑飢民立社學教民鑿渠溉田民肖像祠焉葉朝陽兩浙名賢録字文榮秀水人嘉靖乙丑進士恂恂若書生及當事執法雖豪貴不能奪初知信陽州首均田賦豪民不得相冒為姦晉工部虞衡司郎中司鑄錢中貴人索例弗與出治鐵冶嵗有羡金數千絲毫無染尋升常德府知府有劇盜張金者嘯聚洞庭殺掠官府乃以計殱其渠魁餘黨悉散尋升鄖襄兵備轉廣東參政致仕倪壯猷嘉禾徴獻録字華芳平湖人隆慶庚午舉人知江浦縣江至邑可六十里往往漂沒為患壯猷議開新河五十里涉者便之尋升南刑部主事出為貴州僉事紅苗反上𠞰撫機宜尋擒苗首石阿四等遷雲南兵備副使黔國莊田私徵為民害壯猷請下郡縣代徴著為令沐藩亦不敢撓後歸年八十四卒洪蒸兩浙名賢録字維進平湖人隆慶辛未進士授陳州知州停解京俵馬三百餘匹以折色代又議處河北嵗派驛費省民數千金報最擢駕部副郎攝治部事曹無閣案尋晉吏部選郎卒於官許應逵嘉興府志字伯漸嘉興人隆慶進士知東平州廉聲大著調工部司𣙜清江厰建議於老堤外開越河總河難之應逵言越河成則水性順得報可身行河上布算周密四閲月而河成延袤四十里費僅十二萬金而河堤鞏固又於瓜州創屯船堝使艘自江入者曲折免風濤范家口裂三百餘丈衆錯愕莫為計逵曰塞之便功亦成未幾改蘇松水利發留都帑金十萬治水首開吳淞凡七十里次諸州縣支河又次田間小河及諸圍岸津梁一嵗而成費減所發之半以病歸起補昌平卒朱大雅嘉禾徵獻録字元渚桐鄉人萬厯已酉舉人知祁門縣有監生某為人誣訟前令以其家饒出之恐汚已名獄久未決大雅至立釋之數日生來謁曰某有佳墨數圭欲以奉公大雅受之諸子取墨磨視則赤金也以白大雅大雅召生責之曰我所以出子者以我素廉謹不畏人議故也今反以此相汚耶立還之生謝罪持去入為大理評事以清直稱子萬錡字潔湘崇禎舉人孫彝字聲始成辛丑進士夏九鼎西江志嘉善人萬厯進士任安福縣撫民如子待士大夫以禮莫敢干以私時稱為夏鐵耳談昌言嘉興府志字聖俞嘉興人萬厯辛丑進士令常熟改知婺源縣故有金竺坦徑久廢行者繞經英蓉嶺險同蜀棧昌言闢新嶺號談公嶺厯升南車駕郎中時急令福藩之國詔需馬快船五百艘期以閲日即發昌言如期立辦濰縣令與遼將李性忠有隙兵民阻鬬致鬨昌言身入遼營諭以禍福即傳箭而定卒贈太僕寺卿賜祭葬子貞默貞良俱進士包鴻逵嘉禾徵獻録號儀甫嘉興人萬厯庚戌進士任湘潭知縣值嵗飢出粟賑濟全活甚衆更為建倉積穀以備患湘潭夙困於馬政及解運之役鴻逵極力振刷洞悉幽隱役遂寢行取兵科給事中未赴卒於官胡士相西江志字端甫平湖人萬厯進士知弋陽縣縣故多盜士相嚴保甲法盜風頓息厯官江西參政分守湖西道姦民請開礦部檄至士相覆寢其事衆建魏忠賢祠獨持不可請蠲袁州積逋建義倉修城堞興學校奉旨賜金增秩沈萃禎平湖縣志字裒中萬厯癸丑進士授工部主事𣙜荆州關稅盡革諸小稅名目以羡金築堤沙市以避水衝荆民稱沈公堤厯知蘇州府舉卓異升福建副使備兵興泉紅夷犯銅山侵中左萃禎即日移駐同安身冒矢石出竒兵撓之五閲月而就欵轉本省參政以親老乞歸當守蘇時吳江令曹欽程贓私狼籍因列貪迹注下考及魏忠賢亂政欽程夤緣報復鐫萃禎三級崇禎元年起補湖廣參政厯升福建按察使備兵福州時海盜叵測巡撫鄒維璉新任未習閩事投誠者意頗觀望聞萃禎至皆曰沈公來吾屬無虞矣遂委心歸順尋升湖廣右布政歸卒劉泓嘉禾徵獻録字止澄海鹽人萬厯己未進士除營繕司主事奄豎崔文升督兩淮鹽漕驕橫特甚莫敢抵牾泓疏暴其害得旨撤回淮人德之升兵部郎中出為淮徐兵備副使徐當河決之餘盜賊蜂起蕭碭間各聚衆數萬泓擒其渠帥散其脅服總河侍郎朱光祚深器之令開濬馬陵山駱馬河口等處皆有成績後致仕歸吳麟瑞續獻徵録字在賢海鹽人萬厯己未進士授常州府推官轉南儀曹主事進郎中擢常鎮兵糧道時武備積弛麟瑞力為振刷兵甲一新丹陽練湖淤四十餘年麟瑞以漕挽所關且滋灌溉遂躬自程督履畝計工民不告勞官不費帑績用以成移江西參政分守湖西道時流冦蹂躪三楚而湖西之袁州鄰楚新燹於冦麟瑞至即移駐袁州嚴戰守之備以故終任無患遷按察使尤以澄清為己任貪吏雖才必黜民有獄訟必親鞫不輕委之守令轉右布政請告歸及甲申之難感憤成疾卒陸懷玊平湖縣志字石含萬厯己未進士授工部主事晉郎中董三殿工竣例擢京秩因不謁魏璫出知鎮江府廉靜嚴明郡大治升湖廣武昌道轉鹽法參政商民戴德建祠祀之觀察山左出殊死數十人尋擢閩省右轄謝病歸周贍親戚不干郡邑事子祚蕃成進士厯貴州參政循績著聞能濟美云袁黃嘉興府志字了凡嘉善人萬厯進士授寶坻令縣賦煩重具疏乞減上從其請升主事卒鄭心材海鹽縣圖經字敬中以王父曉廕為督府都事厯應天治中南都劉天緒之獄本以白蓮教聚衆無兵仗左驗訛言謀反訊者欲借為功心材止案坐渠首取天緒所募籍悉焚之全活甚衆署上元篆定浦口渡值掣驗江鹽卻諸商例餽及歸修家規立宗法置義田後人奉為家誡焉曹履泰嘉禾徵獻録字大來海鹽人天啓乙丑進士知同安縣時海冦紅夷交訌羣盜盤踞同安無兵履泰編漁民為伍團結村落互相應援賊不敢犯督撫熊文燦受李魁竒鄭芝龍降芝龍部下卒橫行輒以法繩之未幾魁竒挾鍾斌叛去履泰乃隂搆斌使叛魁竒而復説芝龍招斌遂與芝龍合圍魁竒斬之行取授吏科給事中疏糾吏部李希揆躐等典銓希揆嗾大璫王永祚使誣履泰下獄論戍嶺南應天巡撫祁彪佳疏訟其寃補行人司副不赴子元方崇禎進士馬家植嘉禾徴獻録字培元平湖人崇禎甲戌進士知武進縣申布條教積弊肅清以治行第一行取吏科給事中屢有建白甲申奉敕督餉江西福建以與馬士英不合謝事歸髙承埏舊嘉興府志字寓公嘉興人崇禎庚辰進士授遷安令鋤豪強招流散設法濟急餉省費萬計改江南涇縣數月政成民有清髙之謠遷工部主事上書白父道素之寃即乞養母歸涇人奉祀水西王文成書院承埏藏書數萬卷博學強記雖簿書鞅掌不廢涉覽所著有稽古堂集國朝陸濬睿平湖縣志字以愚號未菴順治丙戌舉人授宣化府推官宣府古上谷地軍民雜處頗稱難治前官皆用法繩之睿獨以寬察重囚鞏加世段大康性全等之寃出之獄所拔士皆一時雋去塞外士習為之振起陸世楷公舉事實字英一又字孝山平湖人順治五年以選貢生除平陽府通判甫至薑瓖搆亂平陽被圍世楷登陴固守百日旋誘降其魁釋其黨師後大飢人相食世楷為粥給飢者全活甚衆遷同知登州府海冦揚帆猝至立設守具率舟師禦之冦逸去時叛帥海時行剽掠州縣獨戒勿犯境登有嫠婦夜為人所殺鄰里訐其媳世楷時攝縣事察其寃禱於城隍神卒得殺人者遷知南雄府時平南靖南兩藩並駐廣州有入始興山自稱平藩侍衛發民鑿礦世楷曰王雖尊不得擅役吾民今不使太守知詐也縛送廣州平藩不敢問又黠僧昵於藩倚勢為虐世楷計縛之斃諸杖築天峯書院課諸生講學以外艱去郡老稚遮道不得行立祠府治東士民春秋社祭服闋補思州未幾以病引歸魏學渠鄉賢留祀册號青城嘉善人順治戊子舉人授成都府推官時蜀中初定戶口尚少民疲於差役學渠招撫綏輯事事得宜舉博學宏辭升刑部主事厯官江西分守湖西道加意撫綏務從寬簡其俗生女多溺死者嚴為之禁生全者甚衆嘉興府志學渠在蜀定嘉眉卭雅四州賦額公私稱便鄭龍光廣東名宦册字韜生平湖人順治己丑進士任南雄府知府時藩帥初克城龍光以廉介見憚剔姦除蠧扶弱存孤民倚賴之嘗履畝省荒過五斗嶺前有虎負嵎衆莫敢進龍光曰昔劉昆為治虎北渡河今太守以勸農入山虎曷為而來哉叱馭驅之虎隨遁去以一童二僕自隨客投謁無所拒至其家見其清素無敢以私請者厯任六年擢西寧副使郁之章福建名宦册字衷恆嘉善人順治己丑進士十年以分巡道駐上杭時海冦入漳聲言來攻人情驚恐之章靜持之密約城守張國棟整飭營伍趣通邑士民集演武廳手自草檄以忠義激發士民咸願效死賊知有備而退人謂章寸管賢於萬鏃也查培繼鄉賢留祀册字王望海鹽人順治壬辰進士除廣東東莞知縣有政聲厯兵户刑三科給事中疏章數上如清關弊行官兌禁鷹户等疏皆關國計出為江西按察副使分巡饒九南道時冦亂初靖培繼力事拊循尤以興學校敦教化為首務建義孰禁淫祀慎蘆課扞水患拯飢民捐俸修白鹿洞書院時時與諸生講學興賢育才造就實多沈棻嘉興府志字子佩平湖人順治壬辰進士授西平知縣初下車值嵗大歉民多流亡棻設法招徠給牛種諭以嵗豐取償免其􅒚其貧民完稅無金錢者許以布粟代又嵗募河夫多逋逃棻按貧户之逋稅者充役民喜得食且以工價完逋爭先赴工工易竣甲辰飛蝗遍野獨不入西平境三年邑大治以勞瘁卒官士民建祠祀之曾王孫鄉賢留祀册字道抉嘉興人順治戊戌進士為漢中司理改令都昌入為戶部主事轉員外進刑部郎中官至四川提學道敡厯中外所至有聲其在秦則均賦役興水利平棧道理寃獄在豫章則安集流亡興崇學校及官提學道杜絶苞苴釐正文體蜀人稱之鍾朗鄉賢留祀册字玉行石門人父景音慷慨好施力行善事朗中順治己亥進士選翰林改工部主事出視江南蘆政蘆故姦猾弊藪強弱輸賦不等積逋至二十萬時方遣使者督令清丈朗偕使者按籍履畝確查得豪富侵占胥吏飛灑等弊陳請豁免貧戶積欠數萬兩厯刑部郎中陜西提學道嚴絶苞苴振興文教升布政司參議致仕沈鱄福建名宦册字木門嘉善人順治辛丑進士康熙八年知建安縣事兵燹後土田荒蕪蠧胥巧為影射民苦之鱄廉得實窮治不少貸先是藩厮以錢貸窮民勒息數私禁榜掠有鬻妻孥以償者官莫能制鱄曰愛一官而脅於輿隸使民無告吾恥焉捕置之法民大悅沈廷勱鄉賢留祀册字克齋秀水人由貢生授新寧縣令時兵燹之後戶不滿百廷勱輕刑薄賦招徠撫字民相率來歸再令欒城值三逆之變出師南征廷勱轉輸供給無有匱乏尋改商州知州以疾歸俞雲來嘉興府志字漢乘海鹽人康熙庚戌進士授安仁令時當兵燹隨大兵招降賊朱天錫等數十人全活閩廣諸郡飢民甚衆調任湖口擢兵馬司正指揮朱振鄉賢留祀册字千仞嘉興人康熙己未進士知舒城縣均賦役嚴保甲舒有七門堰者壅塞已久下流苦旱振力排衆議卒興其利民咸德之虞兆清鄉賢留祀册字鑒斯嘉興人康熙己未進士知綦江縣綦當兵火之後邑里蕭條兆清招徠勸墾戶口日增建學宫設義學延師以教士官至湖廣道御史弟兆湰有詩名孫衍鄉賢留祀册字宰工嘉善人康熙甲子舉人選長山知縣在任五年減羡耗賑貧乏以病乞休邑人攀轅卧轍者相望於道陳霆萬鄉賢留祀册字子敦嘉善人康熙甲戌進士授臨胊縣息盜安民四境肅然邑正供四萬餘兩向有胥蠧私收包納之弊甚至飽壑逺遁纍民重完霆萬至一變其法散歸業户使各自輸糧其弊遂革張王典鄉賢留祀册字堯若嘉善人康熙丁丑進士授山西平順縣下車之始減耗費絶苞苴省差徭善良安堵姦邪屏迹值嵗當編審秉公釐剔從前隱漏之弊重役之苦一時頓清報最升吏部主事旋擢吏科給事中宦京七載賃屋數間僅可容膝公餘則焚香玩易以圖補過及卒行李蕭然惟圖書數束徐升貞湖南名宦册字君階海鹽人由拔貢補嶽州通判蔬食布衣官居如貧室盡革陋規嵗旱步禱淚痕被面兩釋寃獄人號活命菩提許湄嘉興府志字臨洲康熙庚辰進士知湖廣石門縣苗蠻雜處湄開誠撫諭諸土司咸格心向化巡撫趙申喬保奏內召卒於途居官十五年家無寸椽尺土殁後人益信其廉陸張烈公舉事實字昂千海鹽人康熙庚辰進士山西浮山令抵任即謝餽遺除浮耗嵗旱倡輸賑粟民無失所者力振文教童子試漸增至數百人詳請改小學為中學治訟口決如流獄無留繫行取授吏部文選司主事官至兩廣運使王顯一公舉事實字立峯海鹽人康熙丙戌進士選鞏昌府成縣知縣始至郡禁加派除陋規慎詞訟興文學在任五月調赴西寧委解羊餉銀至古木額爾格軍前如期交納及歸復委至鎮海堡地方收放草束顯一躬自料檢不假手胥役鎮民德之上官嘉其才遂留軍前效力委解鹽菜銀至古木額爾格軍營又令收放各郡解到倉糧料豆顯一辦理精明效力三載刻無寧晷庚子春奉派運糧至木魯烏蘇地方兼程而進先期至軍主兵者深嘉之即令其沿途放糧回西寧行至第十八特廕臺積勞成疾而卒雍正元年凱旋撫臣核實奏績一子入監蔣鶴鳴公舉事實秀水人為舒城知縣舒自明以來水道淤塞田多旱患鶴鳴下車即講求濬治捐俸勸輸士民樂助是嵗適遭荒歉即令貧民受值執役不三月開久湮之河七十餘里民不告勞工亦速竣浙江通志卷一百六十七
