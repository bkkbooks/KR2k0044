body:
  text: 浙江通志卷十九山川十一嚴州府建德縣附郭烏龍山嚴陵志在府治北三里郡之鎮山也髙六百丈周回一百六十里宋宣和初臣僚建言龍為君象山水地名有龍字當避乃改為仁安山明洪武初號廣濟廟神為烏龍山神仍復今名趙抃烏龍山詩泉石淙淙瀉百尋羣峰環翠起春林危巔召雨雲先作不失蒼生望嵗心東山嚴陵志在府治北一里烏龍山支脈下走平陸繚入郡城各有其名此其一也秀山新定續志以秀亭得名西連東山西山新定續志在城內西北道場山建德縣志西連西山唐髙僧陳尊宿嘗結菴其上因名建安山嚴陵志在府治北一里秀山之東府城隍廟在焉建昌山萬厯嚴州府志在府治西二里又名建蒼山有順濟龍王廟下瞰江水左有西湖諸水皆出於橋下三雄山太平寰宇記在縣治郡國志云山有石門故關多牛馬迹在石上故也界山太平寰宇記在縣治郡國志云界山欲雨輒聞鐘鼓之聲錦沙岡新定續志在城內北方正脈融結萃為郡治東湖建德縣志在興仁門內建德縣治左湖廣袤數十餘畝水自太平橋下繞江家塘直至西湖聖水池明一統志在烏龍山巔池有二一清一濁俗謂之聖水嵗旱禱雨多應瀟灑園池舊浙江通志在府治後建德縣城外山川橘山明一統志在府城南十里相傳上有羅浮橘一株熟時風飄墜地得者詫為仙人橘棋枰山嚴陵志在縣南十五里山巔有石若棋枰明山巖山舊浙江通志俱縣東南二十里萬嵗山新定續志在縣東南二十里與明山巖山相連巒秀環繞為山水佳處馬目山名勝志在縣西南二十五里一峰狀如馬首中有小峰如目又名南髙峰陸遊聼事望馬日山詩官身早暮不容間塵土堆胸愧滿顔也有向人誇説處坐衙常對水南山九峰山嚴陵志在縣西五里上有九峰寺趙抃九峰山詩龍丘石室人難繼安正書堂世莫登但見煙蘿最髙處九峰排列一層層羊亭山萬厯嚴州府志在縣西八十里晉太傅羊祜祠在焉方門山嚴陵志在縣東七里烏龍山之支也對峰列嶂臨於江滸其狀若門故名屯軍山嚴陵志在縣西北一里相傳黃巢屯軍於此青山嚴陵志在縣西十里四時蒼翠色蔭黛潭平壁山嚴陵志在縣西十里馬目山之支也千仭壁立因名銅官山萬厯嚴州府志在縣西八十里元豐九域志新安記云秦時於此置官採銅因名髙峰山嚴陵志在縣東五里即北髙峰烏龍山之支也雙峰聳秀林木清幽為一郡偉觀建德縣志上有浮屠七級與南山天寧寺塔相望南山嚴陵志在縣南五里與城對峙馬目山之支也蕙巖山萬厯嚴州府志在縣西十五里赤山建德縣志在縣西北一里山無樹木土石殷然龍門山嚴陵志在縣東二十七里山巔纍浮圖下瞰江渚有石壁飛瀑上連胥水下接嚴陵幽徑山名勝志在縣西四十里朱買臣常寓此滌硯於池後人因名為朱池雲岫山嚴陵志在縣東北四十里湫山嚴陵志在縣東北四十五里髙六百丈周回一百餘里與烏龍清冷二山相埒中有石湫俗呼為聖水遇旱禱之輒應尖山新定續志在宣政鄉峰亦峭拔吳氏山嘉靖浙江通志在縣西北四十里山下有吳村義湖山建德縣志在縣西四十里山有池大旱不竭焦山嚴陵志在縣西五十里臨新安江滸安仁山建德縣志在縣東北六十里蓮花山嚴陵志在縣西五十里與楊溪峰相連狀如蓮花故名芝山嚴陵志在縣東六十里桐廬縣清冷山之支也與安仁相對下有芝水環之故名靈巖山嚴陵志在縣西八十里與淳安紫蓋峰相連巖泉不竭遇旱禱之即雨五寶山新定續志在建德鄉西八十里五山共一源曰金山曰銀山曰銅山曰緑山曰鐡山楊溪峰萬厯嚴州府志在縣西四十五里如卓筆烏龍嶺建德縣志在烏龍山側樵採從此過嶺罾潭嶺萬厯嚴州府志在縣西二十三里下有罾潭又名鐘潭午方嶺明一統志在府城東北六十里以在烏龍山之南故名絶頂有金雞窠石穴新安江萬厯嚴州府志在府城南一名歙江經淳安一帶又名青溪至城東二里合婺港又東入浙江東陽江舊浙江通志在府城東南二里來自金華與歙港合如丁字然胥口江一名建德江建德縣志在縣東二十五里以伍子胥經此因名孟浩然宿建德江詩移舟泊煙渚日暮客愁新野曠天低樹江清月近人西湖建德縣志在城西南和義門外廣袤五百四十二丈中有寶華洲桐溪建德縣志在縣南十里自南髙峰發源七里至溪口吳萬睿曉過桐溪詩桐溪一夜雨侵曉趁歸舟逺樹圍沙觜寒煙簇市頭未忘泉石癖不解稻梁謀此地堪終老行吟得小留大洋溪嚴陵志在縣南二十五里自馬目山發源十五里至溪口胥口溪嚴陵志在縣東二十五里自胥嶺發源三十里至胥口逆流十里達於胥口江下涯溪嚴陵志在縣西三十里自太周招賢橋東北塢發源六十里至溪口楊溪嚴陵志在縣西四十里自蛇嶺發源五十里至溪口大郎灘新定續志在縣東十里江南寧順廟顯應妃長男倪惇募鄉兵決流感神兵不期而集風雨震作廣決水道因號大郎灘烏石灘嚴陵志在縣東十五里以上二灘並在東陽新安二江會流之下沿入桐廬縣界玉泉嚴陵志在府東北七里烏龍山麓昔人甃石為瀑流如噴玉傍有石佛嵗久漸長殆所謂息石也淳安縣南山一名青山新定續志在溪南為縣治對山巖石層繚林木陰翳有亭曰物外一邑竒觀也仙壇山隋書地理志遂安郡雉山縣有仙壇山都督山名勝志在縣南六十里相傳後漢方儼為都督常駐兵處太平寰宇記都督山髙峻臨江邁山嚴陵志在縣西北六里新安記云其山重疊秀邁諸山故名三鶴山嚴陵志在縣南三十五里相傳昔有潘氏兄弟三人於此乘鶴上升故名羡山嚴陵志在縣東三十五里山形甚峭拔其麓有數洞相連接外一洞有石龍水自龍口下注石盆中常滿不溢盆前有石果數品甚異遇旱請水於池輒雨金鈎山淳安縣志在縣東八里一名象鼻山燕山嘉靖浙江通志在縣東三十二里東山明一統志在縣東五十里絶頂有僧菴中祠石佛龜鶴山嚴陵志在縣東五十里兩峰相值以形名安樂山明一統志在縣東六十五里山頂有泉及石棋盤遇旱禱雨多應重坑山明一統志在縣東八十里山有二坑故名雉山嚴陵志在縣西南一里周回七里四十步新安記云郡西南渡水一里餘有山如雉蹲因名隋時常取以名縣靈巖山嚴陵志在縣東北六里周回十三里舊名龍山吳永安五年黃龍見於此因名唐元和元年觀察使牒改靈巖山宋時方逢辰舍其下更號蛟峰蔗山名勝志在縣東北三十八里山分八面水注十派淳安縣志昔有人植蔗故名岐山萬厯嚴州府志在縣東北九十里石門徑內吳山淳安縣志在縣東北一百里上有仙姑洞子胥祠三寶石五蓮峰與杭之吳山相類因名聖姥山淳安縣志在縣東南二十五里山巔有平地餘一頃洞泉冬夏不竭祈禱輒應密山嘉靖浙江通志在縣東南五十里程嘉燧發淳安記密山諸巖自淳安縣而下溪濶可四五里兩巖若頺岸髙一二丈或時有小山臨岸遠者去數里蓋東平水舒曠如也凡若干里而見兩山如闕溪回入其間舟行狹中其右一山崖石嶙峋苔繡丹碧如霞峰首甚崒嵂其後數峰泝流擁之從絶頂墮一峰俯溪涘有廟踞其上下為澄潭曰羅山潭馬石廟在焉廟前有石如馬藤蘿罥其上不知為何神也又若干里而為合溪浦有山壁立綿亘如城石半作鐡色其將盡一峰皴文其五采時方晝餔坐舲間觀潭水如展鏡浸濯峰趾倒影沈碧菖蒲藤樹披拂涯涘悠然厯之疑非人間也溪稍折而右其左一峰髙數仞皴理與前埒而多草樹半叢石罅間形正圓如月半出水上最竒其下復有密山巖巖嶄然嵌空其髙可數百仞山形亞缺如朽株其理皆衡旋舟徐移其下山勢側出凹凸亦異狀中稍斷為狹按山形如堂者曰密豈窪缺處形肖堂室與其石大都瓦裂氷拆參錯骨立或瑣碎攢紫如鳥獸器物之形者不可勝計時微雨自逺至過乳香潭潭壁亦竒麗晦冥不可辨矣並桃山新定續志跨常樂永平兩鄉登絶頂杭歙衢婺之山依約在目山下望之如二桃因名南來山明一統志在縣西北一百三十里山勢自北而南故名東泉山萬厯嚴州府志在縣東北一百三十里舊名覆船其一支南出為紫瑞峰當龍池之上望之如青芙蓉出泉三派並東注唐改今名小金山嚴陵志在縣西十里屹立大溪中上有佛宇有似鎮江之金山而小故名鄭玉小金山記新安江東流三百里為淳安縣未至縣十里江心兹山在焉古樹蕭然出煙蒼水黃間石色崚嶒苔蘚如繡上有佛寺嵗久頺圯傍一石出灘瀨中如龜形溯流而上號龜石灘去錦沙村才一二里燕石崖相對峙若樓閣飛簾出臨水上蓋一縣山川之勝聚會於此胡朝穎小金山詩天光嵐影碧相涵百頃玻璃一望間緑水繞門迷客渡白雲終日伴僧間疏鐘破曉潛虬動老木成隂倦鳥還喚取頭陀磨石壁為渠題作小金山響山名勝志在縣西十八里石壁如削下有深潭澒洞舟人呼之其響相應尹山嘉靖浙江通志在縣西南七十里兩峰南峙跨石如橋倚石如人中有石室石棋皆天然之勝也擔鹽山嚴陵志在縣西北一百一十里相傳錢鏐微時常販鹽經此因苦渴以拄杖觸巖泉忽涌出後人因名其山雲濛山名勝志在縣南三十里髙五百丈周回七十里天欲雨則雲霧滃騰山頂芝山名勝志在縣南六十里商文毅公家於此百桂山淳安縣志在縣西七十里香桂叢生蜀阜山名勝志在縣西六十五里以其山似蜀三峽故名鳳山嘉靖浙江通志山有二一在縣西北一在縣東北金紫峰嚴陵志在縣東北八十里髙二十餘丈中峰有圓石起數十丈光瑩無草木其旁兩峰若俯每旭日照灼則有金紫閃爍之色上有九隴瀑布魚口峰淳安縣志在縣西十五里當儒學櫺星門之前虎峰舊浙江通志在縣東北二十五里渡市相傳方仙翁儲與弟忠烈侯儼常隱此梅花峰明一統志在縣南三十里望之如梅花五出紫蓋峰新定續志在安福鄉山腰微瘦上乃旁拓形如擁蓋因以為名銅嶺嚴陵志在縣東七十里中有石洞出泉又有田號曰仙人田遼嶺嚴陵志在縣南七十五里乃壽淳二邑限隔之地懸崖絶壁無路可通舊惟水中往來成化間知府朱暟通判劉永寬命工修砌遂成坦途其有不可椎鑿者悉為橋以濟之行旅多賴焉登雲嶺一名黃泥嶺淳安縣志在縣西北六十里永平鄉之蜀阜西嶺舊浙江通志在縣治南八十里亦與壽昌接境在玳瑁之西故名方壺嶺淳安縣志在縣西七十里御史王賔出入於此更名驄馬嶺燕石巖明一統志在縣西一十五里穹然如石屋可坐數人俗呼積甲山保安巖明一統志在縣東北六十里一名玉笋峰側視如圭正視如筆小溪巖淳安縣志在縣東六十里怪石巉巖水陸俱險明嘉靖間知縣洪英明立錦溪關於此以禦礦冦仙居洞名勝志在縣東三十五里羡山連接十數洞皆一竅相通最外一洞狀如龍蟠中有石座座有石盆龍口水下溢盆中靈巖洞嚴陵志在縣東五十里青溪鄉千仭里里東諸山一峰特髙號千仭峰下有兩水源東曰聰明西曰龍門其源下又分二洞一曰龍泓一曰均濟各溉田數頃宋時邑人邵晃讀書於此其子炳兄弟復建室洞側隱居焉元祐中通判殿中丞楊備行縣訪之名其洞曰靈巖仙女洞明一統志在縣東北六十里洞口有祠每嵗旱禱之則環山皆雨不及他境威平洞嚴陵志在縣西七十里一名清溪洞一名幫源洞宋宣和中方臘反韓世忠擊敗之窮追至此洞賊深據巖屋為三窟諸將莫知所入世忠乃潛行溪谷間問野婦得徑即挺身仗戈搗其穴擒臘以出賊平改今名鶴迹石嚴陵志在縣東北一十五里石髙五丈許上有鶴迹長徑尺餘傍有馬虎迹相傳方儲兄弟三人各乘一物遊此其迹