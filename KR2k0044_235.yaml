body:
  text: 浙江通志卷二百三十六陵墓二嘉興府嘉興縣周徐偃王墓至元嘉禾志舊傳在縣西復禮鄉廣輿記在府城西北謹按韓愈偃王廟碑記偃王走彭城下民鑿石為室以祀偃王則墓當在彭城又曰王之走不之彭城而之越城之隅棄玉几硯會稽水中今龍遊有祠象山有廟而墓在嘉興未知何據存以俟考周衛大夫墓𢎞治嘉興府志在嘉興縣西南圖經云衛大夫宏演墓也衛懿公為狄所滅食其肉唯肝在地演剖己腹而納焉張堯同衛墓詩惆悵黎陽客飄零浙水濵定忘空腹恨知是赤心人謹按漢書衛地在魏郡黎陽演墓何以在此黃濤賦檇李古迹以為衛涇叔清之墓因和張堯同詩云衛姓宣和後直臣多水濵前賢何所據詩弔納肝人其辨良允吳相國伍員墓𢎞治嘉興府志在胥山上詳見祠祀嘉禾百咏考碑語有石棧自錢塘抵禦兒之胥口凡十一字惜不得其全文又有磨劍石長二尺許劍痕在焉其巔相傳即子胥墓也徐春逰胥山詩伍員埋玉地千載閟煙霞草緑藏殘碣泉香潄落花海天歸老鶴林木怨啼鴉飛屩凌髙頂愁雲入望賖漢朱買臣墓至元嘉禾志在縣東三里萬厯嘉興府志東塔講寺乃朱買臣故宅後有一邱相傳為買臣墓劉克莊朱買臣墓詩翁子平生最苦貧晚將丹頸博朱輪老儒五十無章綬歸去何妨且負薪方孝孺朱買臣墓詩五十年前只荷薪瘦妻渾不耐家貧會稽太守黃金印方信詩書不負人吳偉業朱買臣墓詩翁子窮經自不貧會稽連守拜為真是非難免三長史富貴徒誇一婦人小吏張湯看倨傲故交莊助歎沈淪行年五十功名晚何似空山長負薪謹按劉餗隋唐嘉話云東封之嵗洛陽平鄉路北市東南得石銘漢丞相長史朱買臣墓又鳯陽府虹縣歸德府夏邑俱有買臣墓買臣為會稽太守西漢之會稽由拳其屬縣也則墓在嘉興為是又按梁元帝時有兩朱買臣一武昌太守一宣猛將軍或别有屬耳漢吕氏榮塜嘉興府圖記在由拳郭里墟北名吳義婦坂傳詳列女朱彞尊吕塜考半邏之南有吕塜相傳謂吳孱陵侯蒙塜也考吳志蒙卒於公安史不言其葬處而盛宏之荆州記云長沙蒲圻縣有吕蒙塜則塜之在楚可信矣按漢末黃巾之亂史有許升妻吕榮不辱於賊為所殺糜府君斂錢葬之嘉興南土人號義婦堰然則吕塜殆吕榮之塜其音聲相近遂訛榮為蒙爾晉劉伶墓檇李詩繫在胥山下俗呼金伶墓蓋避吳越王諱也蘇軾劉伶墓詩嘗笑劉伶死便埋豈伊忘死未忘骸烏鳶奪得與螻蟻誰信先生無此懷嶽元聲劉伶墓詩鹿車一壺酒荷鍤以自隨云死即我埋曠達不可羈如何此墟曲有塜髙纍纍刻石記道旁無乃好事為齊施修琳墓𢎞治嘉興府志在縣東二十里圖經云齊長沙王府長史也張堯同施修琳墓詩蒼苔侵壞道晚雀散空林莫問人賢否浮生一古今陳顧野王墓嘉興府志補即顧節墩在嘉興縣東北十里髙啓顧野王墓詩南朝舊碑倒墓近樵蘇道應與讀書堆離離總荒草謹按吳地記云顧野王墳在橫山東平陸地橫山又名據湖山在吳縣西南十六里則志補所載顧墓未知何據宋侍郎聞人鼎墓嘉興縣志在德化鄉朱涇村鼎建之弟以子安道貴贈刑部侍郎安道弟安逺以子宏貴贈朝散大夫俱祔葬侍郎兆域宋參政婁機墓明一統志在府城南五十里樓鑰撰神道碑傳詳名臣宋嚴處士墓檇李詩繫宋時賣藥秀州遂家焉墓在蒯塔坊元學士王昶墓舊浙江通志在王店市東元經厯吳傑墓𢎞治嘉興府志在縣東二十五里傑字景良元人仕至廣州路總管府經厯趙孟貫撰墓記明少卿髙巽志墓舊嘉興府志在地字墟奚家橋傳詳寓賢謹按朱彞尊髙太常嗇庵遺稿序云靖難師入自金川門太常少卿髙巽志潔身去其官走永嘉山中窮餓以死其門人翰林侍書同里蔣兢斂而葬之芙蓉峯北野史所載盛庸兵敗自經者誤也則墓自在溫州永嘉縣其在嘉興者當是衣冠葬處耳明侍郎俞山墓嘉興縣志在縣東南永豐都成字墟傳詳名臣明布政黃懋墓明一統志在府城東北二里北板坊傳詳名宦明處士吳賢忠墓舊浙江通志在嘉興縣春波坊虹橋之東賢忠舊居於此卒葬焉為興國吳國倫六世祖吳國倫感祖墓在嘉興詩闕下仙班夢未回白頭相望逺登臺馬經芒部山煙過雁帶昆明瘴雨來萬里論心天咫尺百年懷土日徘徊離離髙塜虹橋畔猶是延陵旺氣開明文淵閣學士諡文懿吕原墓嘉興縣志在縣東南長水都宇字墟傳詳名臣明少保俞綱墓舊嘉興府志在五鶴涇綱字中立官至太子少保南禮部左侍郎成化戊戌卒賜葬於通濟門外禾山之陽正德初徙葬於此明光祿卿陸淞墓嘉興府志在胥山東諭祭葬傳詳名臣明刑部尚書諡簡肅孫植墓嘉興縣志在永豐都麒麟壩明嘉靖間賜祭葬傳詳名臣明神宗諭祭文惟爾賦性朴忠持身亷介起身郎署洊陟部臺敡歷三十餘年清謹始終一節秋曹正席而南國騰聲晚嵗懸車而邱園益賁遽聞長逝良軫朕懷祭葬特頒靈其歆服明兵部侍郎贈尚書徐必達墓舊嘉興府志在感化都石龍橋諭祭葬明贈太僕寺卿談昌言墓嘉興縣志在白苧都一陽字墟傳詳循吏談吉璁鴛鴦湖棹歌市舶風檣五兩飄桑東太僕墓非遙黃腸華表千年石長映雙溪百尺橋明贈光祿寺卿王引昌墓舊嘉興府志在新行鎮傳詳忠臣明贈太僕少卿徐世淳墓嘉興縣志在感化七都王字墟傳詳忠臣明董節婦王氏墓嘉興府志王名桂芳夫卒自縊死邑令洪範葬於鹽倉橋北嘉靖中佃為民居移窆清真觀旁傳詳列女國朝布政王庭墓嘉興府志在王店鎮項家灣傳詳文苑禮部尚書杜臻墓嘉興府志在縣東馬涇傳詳名臣康熙年間賜祭葬內閣學士徐嘉炎墓嘉興府志在新十二都荒字墟秀水縣漢嚴忌墓名勝志塜廟記云忌墓在治西北新城鎮世稱嚴夫子墓傳詳文苑漢將軍嚴助墓名勝志在天寧寺毗盧閣後俗名嚴墩傳詳文苑舊嘉興府志墓有古樹大數尋枝葉皆西北向天將風雨輒作劍佩聲章士稚嚴助墓詩言尋舊迹來山寺衰草離離識墓門太守樓船何日去將軍碣石到今存文章不共煙霞散劍佩猶隨風雨翻古木千年向西北牛車遺恨未須論宋沈演之墓至元嘉禾志在望吳門外二十里傳詳名臣唐中書朱巨川墓舊浙江通志在上蔡原之舊塋北海李符銘墓周都官墓嘉禾百咏考在秀水治西北水中旱不加髙潦不加沒今尚存許恂如周都官水葬墓詩序周都官疑唐宋時人佚其名墓對月波樓址在荷花池西水中用古水葬法也吳越御史中丞聞人圭墓嘉興縣志在阜城門外竹橋之西圭汴梁人吳越王時賜鐵劵居錢塘子新周顯德四年徙嘉興宋尚書聞人建墓𢎞治嘉興府志在澄海門外五里嘉興縣志建天禧己未進士監秀州都監倉轉祕書丞以子安夀貴贈工部尚書初葬德化鄉髙豐雀墓村後改葬白苧鄉薛家兜桃花原鮑恂瑞芝墓頌序聞人尚書墓有芝出焉凡十二莖非尚書公忠義之氣發揚於上則聞人氏之子孫必有以孝感而致之矣宋施府君伯成墓秀水縣志在思賢鄉地字墟靈顯廟中伯成九嵗為土神凡旱潦疾病有禱必應互見祠祀墓有靈丹樹取葉煎服可治百病宋知州趙叔近墓秀水縣志在真如寺叔近悼元王孫榮良公克類之子建炎丁未知秀州王淵誣殺之殯於寺中元同知李復墓𢎞治嘉興府志在縣南三里復字希賢南陽人元員外郎後為嘉興路同知卒葬於此明兵部尚書贈太子太保諡襄毅項忠墓嘉興府志補在澄海門外五里傳詳名臣沈邁項襄毅墓詩名臣竹帛重千秋故國祠荒斷碣留襄鄧恩深猶説項平涼功著克安劉圖殘四壁侵蝌蚪氣壯山河映斗牛石獸苔斑餘舊賜英風謖謖起松楸明侍郎姚宏謨墓秀水縣志在白苧鄉馬當涇贈禮部尚書豫祭葬明工部尚書諡清惠丁賔墓舊嘉興府志在正收字墟萬厯間豫祭葬傳詳名臣計敬謁丁清惠公墓詩長别歸何處春隂此獨尋六朝名世業三問老臣心入廟威儀在瞻碑涕淚深暮風號石獸松柏更森森明大學士諡文恪朱國祚墓秀水縣志在百花莊傳詳名臣朱彞尊鴛鴦湖擢歌百花莊口水沄沄中是吾家太傅墳當暑黃鸝鳴灌木經冬紅葉映斜曛明詹事府少詹事陳懿典墓秀水縣志在圓珠灘傳詳文苑明兵部侍郎嶽元聲墓秀水縣志在穆河溪傳詳名臣明刑部侍郎贈尚書朱大啓墓秀水縣志在縣西北范灘傳詳名臣張有譽撰墓志豫祭葬明烈婦楊氏墓嘉興府志在端平巷杉青道旁傳詳列女陳繼儒弔丁烈婦詩撮土雖新骨尚香行吟到此盡沾裳劍花血濺千年碧墓草隂扄六月霜正氣晝能驅魍魎清魂春不化鴛鴦道旁古塜纍纍者誰采溪蘋薦一觴國朝檢討朱彞尊墓嘉興府志在百花莊朱文恪賜塋之西南傳詳文苑大學士陳廷敬撰墓志嘉善縣宋餘杭主簿婁億墓舊嘉興府志在胥山五都億參知政事機曽祖也其地名婁墳宋通判聞人宏墓舊嘉興府志在遷南都奠亭山傳詳文苑宋節度使吕伯四墓萬厯嘉善縣志在永七區荒字墟今預備倉後墓草止一種俗呼為一草墓宋保義郎陶文幹墓𢎞治嘉興府志在妙員山陶莊市後近為盜發得志石云宋淳熙十四年新監鎮江府𣙜貨務都茶場門陶達自為志葬其父文幹於此宋揚州正將趙勤夫墓正德嘉善縣志在永七都保義郎趙崇璽銘孫若誦祔宋知吳縣卓友龍墓正德嘉善縣志在遷五北區子黃巖州判官瑛祔宋迪功郎陸瑀墓正德嘉善縣志在奉四中區瑀唐宣公之後嘉熙丁酉葬舊嘉興府志子鄉進士端仁墓在水字墟孫三司計正墓在大日字墟與瑀墓鼎足相望俗呼三角墳宋陳坎正墓正德嘉善縣志在永八北區坎正忠肅公瓘之孫其子鑄為魏塘務副使遂占籍焉鑄沒亦祔葬於此元義士吳森墓萬厯嘉善縣志在靈塔之北傳詳寓賢元隱士吳鎮墓𢎞治嘉興府志在縣治東二百五十步傳詳隱逸舊嘉興府志魏塘東花園弄之右鎮自題石曰梅花和尚之塔後吳令道昌修其墓築僧舍於旁以司香火董其昌榜曰梅花庵墓側有橡林今廢黃魯德仲圭墓詩老子平生學薊邱晚年筆法似湖州畫圖自寫梅花號荒草空存土一壞史鑑梅花道人墓詩問津武塘下攬衣獨吟行徘徊古道旁纍然見孤塋荆榛竄狐牧豎時來登橡樹半無枝曲池猶未平哀哉梅花庵一仆不復興空遺水墨蹤允為後世程生前徇名教豈樂浮屠名將非有深識季世多兵爭愚人信因果庶幾保其形同時富豪家厚葬侔山陵毁盜殆無餘遺骸縱復橫珠柙去已久蔓草來相縈何如一壞下晏然無震驚取重亮在人信非山水靈采蘋薦清醑日落風悲鳴遙遙望遐躅感歎有餘情沈周梅花道人墓詩梅花空有塔千載莫欺人草證辨光妙山遺北苑真短碑深刻字古橡未回春欲弔誰為伴秋塘老白蘋元萬户陳景仁墓正德嘉善縣志在縣東北一里檇李詩繫元萬户陳景仁闢有愛山亭雪月樓置書畫玩器亭榭凡七十二以延四方名士元教授顧深墓舊嘉興府志在奉四中區古賢里人呼顧淵白墳淵白深字也元凌貞女墓萬厯嘉善縣志在北亭坊傳詳列女明郁秀一墓舊嘉興府志在北門外牛橋東秀一字子英洪武中杭嘉機户纍民秀一叩閽言事為罷織造明僉事薛宗永墓萬厯嘉善縣志在城東黃庵巷北通衢左其妻節婦沈氏合葬邑令于業立石表之明博士胡源海墓嘉興府志補在縣東二里源海為欽天監博士卒於京賜棺給衣令馳驛回葬此孫詢胡博士墓詩讀書讀易在青年龜筮精通術最専象板幾隨仙仗立玉階長受聖恩宣能窮邵子先天理不用君平賣卜錢武水源頭遺恨在荒墳三尺草芊芊明太守劉侃經歷張彥倫隱士袁祥墓舊嘉興府志宣德初築城凡民間塜悉令遷出唯留侃彥倫祥三墓劉墓在梅花里半里張墓在學