泉一日身死名千年至今石門山下路烈婦人稱禹家墓墓前此日一僧歸猶是當年十嵗兒王豫貞母阡詩浩浩巴陵江虹光貫明月峩峩清風嶺壁色立積鐵石或有時泐水或有時竭卓哉韓王二節婦囓指題詩迹不滅縱使字迹有時滅汗青不磨此貞節猗歟禹氏生嬋娟節與鐵石應同堅良人與子各離散母抱幼子身投淵哀哀危苦詞籲天天何言妾生何不辰薄命凋芳年妾臂可即斷妾身不可牽烏合羝跪彼何人我獨大義報所天指血倉卒不得書淚血直欲流成川明珠白璧委魚腹至今生氣猶凛然嗚呼丈夫秉節有如此身後千秋長不死明西溪先生鮑恂墓嘉興府圖記葬千金鄉傳詳儒林明僉都御史程本立墓桐鄉縣志在梧桐鄉張蕩傳詳忠臣明遼府長史楊述墓舊嘉興府志在濮陽鎮北靈宿原子青江南按察司僉事祔葬明韶州知府沈榮墓桐鄉縣志在千金鄉覩谷村明南寧知府趙讓墓舊嘉興府志在永新鄉前朱村桐鄉縣志讓字元遜成化進士以刑部員外郎出守南寧府明禆將霍宗道墓舊嘉興府志在皂林鎮秀溪橋東嘉靖中拒倭寇與將軍宗禮同戰沒葬此明尚寶卿李樂墓桐鄉縣志在青鎮北樂號臨川隆慶戊辰進士歷尚寶司卿傳詳介節明操江沈蒸墓桐鄉縣志在永新鄉蒸字華東萬厯癸未進士歷升江南督理操江明副都御史錢夢得墓嘉興府志在永新鄉甑山夢得字國賢萬厯癸未進士纍遷副都授江南巡撫不赴歿賜祭葬浙江通志卷二百三十六
