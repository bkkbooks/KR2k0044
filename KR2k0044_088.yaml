body:
  text: 浙江通志卷八十九驛傳下紹興府蓬萊驛紹興府志在迎恩門外唐曰西亭宋曰仁風傾廢已久康熈二十九年知府李鐸重建現設驛丞一員蓬萊館詳見古蹟嘉泰會稽志在臥龍山之左東問津亭北通川亭皆臨府東大河舟車既届必次舍焉今廢府東北有安軺驛是爲軺亭今亦廢山隂縣柯橋驛嘉泰會稽志在縣西二十五里久廢錢清驛嘉泰會稽志在縣西北五十里久廢苦竹驛山隂縣志去縣二十九里迎恩鄉有苦竹城在唐時爲驛今廢舖舍賦役全書衝要七舖府前舖司兵五名青田高橋梅市柯橋白塔錢清司兵各四名次衝要四舖鑑湖金家店赤城洪口司兵各四名偏僻三舖昌安司兵三名鹿山三江司兵各二名會稽縣東關驛紹興府志在縣東九十里曹娥江經其東現設驛丞一員雍正十三年改併曹娥巡檢兼管東城驛嘉泰會稽志在縣東六十里今廢舖舍賦役全書衝要一十一舖五雲舖司兵五名織女臯部茅洋陶家堰𤓰山黄家堰東關小江白米堰曹娥司兵各四名偏僻二舖桑盆周家司兵各三名蕭山縣西興驛紹興府志在西興鎭運河南岸唐之莊亭也宋曰邊驛現設驛丞一員夢筆驛嘉泰會稽志在縣東北百三十歩久廢日邊驛嘉泰會稽志在縣西一十二里久廢漁浦驛嘉泰會稽志在縣南三十六里久廢蕭山館嘉泰會稽志在縣西北百二十歩久廢駐旌亭嘉泰會稽志在縣西一十二里舖舍賦役全書衝要五舖鳳堰沙岸十里新林白鶴司兵各五名諸暨縣待賔驛嘉泰會稽志在縣西南六十歩今廢興樂驛嘉泰會稽志在縣南五十里今廢亭濶驛嘉泰會稽志在縣南二十里今廢楓橋驛嘉泰會稽志在縣東南五十里久廢使華館嘉泰會稽志在縣東百六十歩久廢舖舍賦役全書衝要八舖縣前十里張駝嶺新店灣櫟橋楓橋乾溪古博嶺司兵各五名偏僻五舖楓木鯉魚橋寒熱畈李家橋司兵各三名羅嶺司兵三名餘姚縣姚江驛紹興府志在東門外大江北岸康煕元年裁歸併餘姚縣寧波驛嘉泰會稽志在縣西五十歩今廢津亭二在縣北一里使華驛餘姚縣志唐初名待賔館大厯中令邱岳改諸暨驛宋興國間號新驛改皇華仍復使華元改暨陽站罷革又爲驛館裁併舖舍賦役全書衝要五舖縣前舖司兵五名任渡曹墅三十里桐下湖司兵各四名偏僻九舖方橋衛橋四門化龍眉山蔡山關山道壇洋蒲司兵各三名上虞縣曹娥驛上虞縣志舊去縣西三十里梁湖鎭名曹娥站元大德癸卯江濤衝壊尹阮惟貞遷置縣治西明洪武初復移置舊所總管廟邊嘉靖間令楊文明移驛出江口驛丞仍給夫船迎送使客徃來其舊址居民納價佃訖自遭倭寇兵興支應山積按院龎尚鵬力拯其困爲奏革之其夫船等項仍存其半以梁湖壩官領焉康煕元年奉裁歸併上虞縣金罍驛上虞縣志在縣東等慈寺西宋慶元中令施廣求改旌麾亭爲之廢久池湖驛嘉泰會稽志在縣西南五十里久廢百官驛上虞縣志在縣百官市南明建隨革今爲梁湖巡檢司舖舍賦役全書衝要五舖蒿陡司兵五名崑崙蔡山板橋池湖司兵各四名次衝要六舖縣前通明渣湖華渡蔡墓新橋司兵各四名偏僻四舖瀝海烏盆夏葢踏浦司兵各三名新昌縣南明驛嘉泰會稽志在縣西一百歩久廢天姥驛嘉泰會稽志在縣東南五十里久廢舖舍賦役全書衝要九舖市西舖司兵五名三溪石溪小石佛赤土斑竹會墅泠水關水司兵各四名嵊縣訪戴驛嘉泰會稽志在縣東南五十五歩久廢舖舍賦役全書衝要三舖上管諸林天姥司兵各五名偏僻五舖縣前五里仙巖禹溪八里司兵各四名賦役全書紹興府驛站銀玖千捌百叄拾柒兩柒錢捌分伍釐玖毫加閏銀柒百伍拾柒兩壹分叄釐捌毫壹絲貳忽養膳應差夫一千一百五十二名館夫四名應差馬改膳兠夫二十五名站船紅船中小河船共一百六隻雍正十三年鹽驛道冊開山隂縣均平縴夫一百四十名共工食銀壹千玖兩柒錢玖分遇閏加銀捌拾肆兩差船銀壹百貳拾陸兩遇閏加銀柒兩捌錢會稽縣均平縴夫八十名共工食銀伍百柒拾陸兩遇閏加銀肆拾捌兩差船銀肆拾玖兩貳錢貳分伍釐遇閏加銀叄兩叄錢蕭山縣均平縴夫一百四十二名共工食銀壹千貳拾壹兩玖錢肆分遇閏加銀捌拾伍兩貳錢餘姚縣均平縴夫一百名共工食銀柒百貳拾兩遇閏加銀陸拾兩兠夫二十名共工食銀捌拾叄兩叄錢叄分叄釐肆毫遇閏加銀壹拾貳兩上虞縣均平縴夫一百一名共工食銀柒百貳拾陸兩捌錢捌分陸釐柒毫遇閏加銀陸拾兩伍錢柒分叄釐捌毫壹絲貳忽分兠夫二十名共工食銀壹百貳拾壹兩叄錢叄肆釐叄毫遇閏加銀壹拾貳兩兩僱船銀伍拾新昌縣均平縴夫五十名共工食銀叄百陸拾兩遇閏加銀叄拾兩嵊縣均平縴夫四十一名共工食銀貳百玖拾壹兩叄錢貳分遇閏加銀貳拾肆兩陸錢蓬萊驛水夫一百一十名共工食銀柒百玖拾貳兩遇閏加銀陸拾陸兩内山隂縣徴給銀叄百陸拾玖兩加閏銀叄拾兩柒錢伍分兩諸暨縣徵給銀肆百貳拾叄兩加閏銀叄拾伍貳錢伍分站船柒隻紅船捌隻釐支應銀貳百兩内山隂縣徵給銀壹兩伍分肆會稽縣徵給銀陸拾肆兩肆錢貳分貳釐陸毫貳絲陸忽姚諸暨縣徵給銀伍拾壹兩陸錢肆分柒釐餘縣徵給銀壹拾捌兩伍分柒釐玖絲玖忽嵊上虞縣徵給銀貳拾兩叄分貳釐肆毫玖絲縣徵給銀肆拾肆兩柒錢捌分陸釐柒毫捌絲伍忽徵驛皂二名共工食銀壹拾貳兩山隂縣給西興驛水夫七十名共工食銀肆百捌拾玖兩柒錢柒分捌釐伍毫遇閏加銀肆拾兩柒錢肆分探聽夫一名工食銀柒兩貳錢遇閏加銀陸錢名馬銀壹百捌拾兩不敷養馬改膳兜夫二十五遇閏加銀壹拾伍兩遇渡夫一十六名共工食銀壹百柒拾貳兩捌錢閏加銀壹拾肆兩肆錢肩輿夫一十名共工食銀柒拾