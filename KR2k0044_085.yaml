職缺額錢糧免其追賠溢額不准議叙至商稅不令親填簿冊及不給紅單者俱罰俸一年如將部頒稅薄用伊印添送或將稅簿紅單不按季報部者俱罰俸半年收税單簿送部限期北新闗限四十五日十四年題准各闗欠不及半分者降一級留任餘照前例全完者紀錄一次溢額每一千兩者加一級至五千兩以上者以應陞缺先用十六年題准各闗税額二萬兩以下者仍照前例議叙二萬兩以上者額稅全完紀録一次溢額半分以上加一級一分以上加二級一分半以上加三級二分以上加四級三分以上以應陞缺先用數多者遞准加級十七年令闗稅足額者不准議叙十八年諭各闗額外横征差役四出擾害商民者該部嚴禁察叅二十五年議准嗣後稅銀四季報解部科簿單候任滿日彚報有溢額者停其議叙本闗額辦銅觔三十萬七千六百九十三觔每觔部定價銀一錢於春夏兩季内動支銀三萬七百六十九兩三錢交給商人採買解赴錢法堂交納又每觔本闗自貼水脚銀五分共銀一萬五千三百八十四兩六錢五分此項於康熙四十五年四月内准到部文銅價銀兩不在各闗給發在江蘇藩庫支領其水脚銀兩造入稽考簿内解交户部計每年課稅正額并銅觔水脚共銀一十二萬三千五十三兩六錢五分四季解交户部其解餉水脚等費在外本闗茶税一百觔為一引毎引納銀二分九釐三毫八絲每年額銷茶引一十四萬道貨未到闗先具摺開報完銀填給闗封領引運行其茶引截角於年終奏銷解部每年約收銀四千兩不等本闗商稅船料銀存貯闗庫催齊七務六小闗各口便商等銀每季填批咨院轉發藩司貯庫聽候便員附搭解部本闗徵收錢糧於康熙五十五年間巡撫徐元夢定額每兩加貼解銀八分以為解餉并奏銷考核解冊等費及修理衙署書吏柴米各役工食各口房租等項支給本闗區行埠鈔銀有武林區陸家區城南區永昌區新如區前右區北新區艮山區臨平區長安區保安區觀音區觀音下區四板區東新區回回區徳勝區各按季差役徵收完後印給小票每年盈縮不一約有三百餘兩此項於康熙五十七年巡撫朱軾監收時捐俸免徵康熙五十七年准户部咨每年解部稅銀每兩解隨平銀三分二釐每兩水脚銀一分至雍正元年四月内准咨嗣後隨平銀兩停止解送又於雍正二年正月内准咨各省稅銀應解飯銀散碎者每兩一分五釐水脚銀一分俟解員起行之日赴本闗當堂給發雍正二年五月准户部咨從前巡撫等奏報北新闗每年贏餘銀三萬二三千不等康熙六十年十二月内尚書孫渣齊等議定北新闗每年額定解贏餘銀四萬兩今奉恩詔議准各闗贏餘銀兩盡行裁去每年將應徵額稅銀兩照數充解外如有贏餘另行據實奏報雍正七年續准部頒添發商人親填紅簿凡七務六小闗等處每季一扇令商完稅之時即行親自填寫按季送闗一年彚送户部其底單各月送闗磨對雍正九年正月内准户部咨奉上諭辛亥年春撥解部銀兩照從前餘平之銀減去一半該部即行文各省嗣後着將一半留存以充公用欽此本闗遵照舊例每兩扣留添兌銀三分咨院交貯藩庫除遵㫖聽解一半外其餘留存以備公用本闗季鈔銀每季完銀一錢六分有認一季及二三四季不等總之皆是秤手有不認鈔者即為私牙私秤差役往各縣徵收按季完納每年計徵銀三千五百五十三兩八錢六分計共二十八縣此項於康熙四十年間批歸各縣徵收按季解闗今於雍正九年本闗㑹同總督部院頒行鈐印闗票發縣填給牙户按季徵輸解完印票仍令季終彚收送閱繳銷其仁錢二縣額徵鈔銀併歸七務大使分催完納亦按季解闗馬如龍北闗季鈔説王者捐山澤之利以與民未嘗物物而取之也夫一絲一粟必有牙人一出一入必由行户然天地之生物日盛民間之貿易無窮豈能盡數而稽乎牙人領帖逺近不齊行户應行大小各異乃貨物之交易不常遊手之往來莫測豈能比户而求之乎是故一人也而有春夏秋冬之不同一名也而有一二三四之互見方春認納而入夏不改則一時而四季兼之矣此纔輸納而彼復借名則一票而數人充之矣况十室之邑三家之市有物産即有土棍有土棍即有藉季鈔名色以吞噬鄉曲者夫季鈔行而使不逞之徒多藉口於闗部若闗部又無從核其實其為弊可勝言乎至於徵收之法前代髙君凌溪許君天贈荆君之琦論之詳矣向第謂其查核不至則經收並得侵漁於是附闗近地議責保人隔屬逺方派分該縣而王君宫臻以為有司各止徵收該管錢糧猶尚慮有逋負今若以闗役催徵未便而委諸州縣無論輸解不至難以考成即使州縣力為催輸豈無房書之額派衙役之征求復闗於庫藏轉解於北闗其為煩費固當不少善哉斯語今亦不必更議改絃也愚謂釐剔之法止照定額徵收按季催取記籍必清交納必核給票必審苛索必嚴則闗役自不得為奸而課額亦不致偶缺矣本闗便商牙行認納長單鈔銀每年增減不一約四百餘兩本闗七務稅銀每年儘收儘解本闗頒發循環二簿循去環來印給三連合縫由單一繳本闗查對一給該商於經過地方照驗裁繳一給商人收照其中縫裁繳不許本務自裁以杜弊竇每五日各務呈報收銀數目務書赴内櫃交納杭州通衢四達往往奸商地棍偷走包送陸續搬運本闗差役巡查每五日於各口址查驗往來貨物如遇奸商偷走僻路或以多報少以細報麤並貨票不同者即刻呈送到闗審明按律懲治若經過士客齎帶禮物併小民無知偶犯與前項奸商地棍不同酌量發放人七務六小闗各地方有大起貨税或包頭扳先等積慣􅩲頓偷漏搬運等項即刻禀送大闗聽候訊實分别發落懲罰其罰税俱赴内櫃交納以憑登簿給單南闗舊額南闗𣙜事書本厰初立例取本色解淮安清江衛河二提舉