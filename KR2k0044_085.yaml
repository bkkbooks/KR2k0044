數完解如有贏餘另行據實奏報謹按海闗初設嵗無定額嗣後洋舶日増樑頭貨税等項額定三萬二千餘兩每年贏餘無多雍正六年䕶理闗務台州府知府江承玠於額徵外報收贏餘銀五萬四千餘兩七年至八年寜紹台道孫詔監收實徵贏餘銀五萬九千六百有竒葢江海風清梯航雲集從未有如斯之盛者也額設紅毛貨稅銀一萬兩𣙜闗徴收解司充餉繆燧番舶貿易增課始末按紅毛即英圭黎國在身毒國西其人有黒白二種白貴黑賤背髙凖碧眼髪黃紅色中土呼為紅毛又呼為鬼子其國以貿易為務軍需國用皆取給焉自英圭黎至中國水程數萬里舟行約半年餘船式夾板頭尖尾大篷桅隨風逐節増減與中國殊雖逆風亦可戧駛船艙極深梯級上下凡三層船底夾幫雙板塗灌松脂柏子油堅硬若鐵能敵風浪往來於廣東嶴門福建厦門間有乗風至定海者地方文武官不敢擅留康熙三十三年監督常在具題謂初設海闗時定海尚未置縣故駐劄寧城凡商船出洋回洋出入鎮海口往還百四十里報稅給票候潮守風又蛟門虎蹲水急礁多繞道陟險外國番船至此往往回㠶而去請移闗定海嵗可增稅銀萬餘兩部議移闗定海府城市廛必致棄毁定邑又須建造仍令駐劄寧波差役前往收税三十五年監督李雯復題請移闗鎮海縣照閩省設闗厦門粤省設闗嶴門之例設紅毛館一座外國商船必聞風而至部議移闗殊毁成功設館恐糜正帑俱未准行三十七年監督張聖詔題定海嶴門寛廣水勢平緩堪容外國大船可通各省貿易海闗要區無過於此自願設法捐造衙署一所往來巡視以就商船之便另設紅毛館安署紅毛夾板大船人衆可增稅一萬餘兩府城廛市仍聽客商貿易不致毁㫖依壊部議覆允奉十九年六月到有紅毛船二隻船議欽遵康熙三主一名未氏羅夫一名未里氏乂八月到盧咖唎船一隻九月到飛立氏船一隻一時稱為盛事云雍正元年八月初二日欽奉上諭國家之設闗税所以通商而非以累商所以便民而非以病民也朕撫馭寰區加惠黎庶惟恐民𨼆不能上達近聞𣙜闗者往往寄耳目於胥役不實騐客貨之多寡而止憑胥役之報單胥役於中未免髙下其手任意勒索飽其欲者雖貨多稅重而朦蔽不報者有之或從輕重報者有之不遂其欲雖貨少税輕而停滯闗口至數日不得過是以國家之額税聼猾吏之侵漁以小民之脂膏飽奸胥之谿壑司其事者竟若罔聞知乎又聞放闗或有一日止一次者江濤險急河路窄隘停舟候闗於商民亦甚不便嗣後𣙜闗者務須秉公實心查騐過闗船隻隨到隨查應報税者納税即放不得任胥役作弊勒索阻滯以副朕通商便民之意至於崇文門收税及分派各處查税之人亦有多方勒索分外苛求之弊京師為四方輻凑之地行李絡繹豈宜苛刻滋擾監督尤當不時稽察杜絶弊端爾等若不遵諭㫖經朕訪聞定從重治罪特諭雍正二年十一月初四日欽奉上諭各省兼管闗税之巡撫凡商賈貿易之人往來闗津宜加恩恤故將闗差歸併巡撫以巡撫為封疆大吏必能仰承徳意加恵商旅也但各闗俱有逺處口岸所委看管之家人賢愚不一難免額外苛求及勒取飯錢等弊稍不如意則縛送有司有司礙巡撫之面狥情枉法則商民無所控訴矣嗣後着將應上税課之貨物遵照則例逐件刋刻詳單印刷多張各貨店俱給一紙使衆人知悉其闗上所有刋刻則例之木榜務令竪立街市使人人共見不得藏匿屋内或用他紙掩葢以便髙下其手任意苛索立法如此自能剔除弊端但爾等受朕委任之重尤當仰體朕心遴選誠實可信之人以任稽查之責必期商民有益方為稱職特諭雍正七年二月二十三日欽奉上諭各闗開放船隻之處向例有部頒號簿以便稽查兹聞各闗另設私簿徵收惟於報部之時始將號簿挨日填造其意以水路船隻往來多寡不齊若據實填簿則不能逐日有徵收之數目恐干駁查是以設法匀派填造如此則簿内全非實在數目與商船過税串票毫不相符殊非政體且凡事據實則可以無弊作偽則弊竇叢生今既任意匀派填造則號簿亦為虚設矣嗣後各闗於部頒號簿務須據實填寫如無船隻過税之日亦即注明不得仍蹈前轍如敢故違定行嚴加議處該部亦不得混行指駁致滋弊端特諭雍正七年四月户部為遵㫖查議事議覆浙江總督管巡撫事李衛題稱浙省南北海三闗向照舊例徵税其間有與部頒則例不符之處皆厯來通商寛恤相沿已乆兹准部行令將現行徵收則例徹底清查據實陳奏查核後將條例頒發各闗刋榜曉示永為定例行據各闗造送清冊并聲明北闗則例糧食向來止徵船料所有嘉湖二府解省南糧并民間進闗完納漕糧以及租米等項原非商販其船料一槩免徵又濮院王庄紬因閩粤江右各省商人凡屬大起恐其航海越渡故特寛減以示招徠其本省店舖以及零星擕帶者皆照紡紬一例徵輸又比則科税而有加倍者以貨本稍貴之故恐日乆弊混可否將比例免其加倍止照正數徵收理合請㫖勅部查核議覆行知將條例頒發刋榜曉示等因查浙省南闗現在徵收各項則例北闗現行減例並貨物比例及海闗各口徵收税銀事宜原刋估單則例據該督李衛造冊題明臣部逐欵較對原頒則例與現行比例均屬平允果無寛減市恩亦無濫加病商應行該督轉飭管闗各員將則例比例均刋木榜竪立闗前務使衆商共曉咸遵按則徵收著為定例至北闗糧食止徵船料嘉湖兩府南糧并民間完納漕糧租米等項原非商販其船料一概免徵濮院王庄紬既經寛減所有零星擕帶照紡紬一例徵輸又比則科稅而有加倍未免輕重不均亦應如所請免其加倍止照正數徴收一併刋載例内遵行庶奸蠧無侵漁朦蔽之弊而商民永沐均平之恵矣奉㫖依議雍正十三年十一月户部為請除𣙜闗吏役之積弊以便商旅事内閣交出總理事務王大臣等議覆詹事府少詹事許王猷奏稱各闗刋刻木榜奉行不實間有未曾設立者亦有書寫小字懸之僻處者往來商賈無處覔看胥役因得額外多取請勅令各闗監督務須遵照設立并大書立於闗口使商賈一見了然等語查各闗應納税課例應刋刻木榜大書設立闗口使商賈一目了然吏胥無從額外苛索立法原為周宻乃監督與吏書皆惡其害巳奉行不實或竟不設立或書小字暗置僻處均屬不合應照所奏交部通行各闗嗣後務須遵照設立并大書榜示違者該督撫即行題叅治罪又據奏稱各闗巡役每於商賈未行納稅之時先索飯錢少不滿欲即故意留難水次則波濤驚險陸路則風雨暴露商賈苦於守候任其勒掯請勅行嚴禁等語查商賈未行納税之前胥吏先百般苛索係實有之事應照所奏交部通行嚴禁違者巡役計贓論罪監督一併處分其往來行客及肩挑歩擔不應納税者聽其竟過不得借端需索又奏稱近闗前後數里之内多設巡役櫛比搜求或以騐票為名或以查檢漏税為辭需索飯錢阻滯行旅應請勅令嗣後除岔路小口仍准巡查外其近闗前後巡役悉行撤除以息煩擾等語查商賈載貨至闗既經照例上税原不必數番查騐若於前後數里之内多設巡役自必重重苛索應照所奏交該部通行各闗除岔路小口准設巡查外其近闗前後濫設之巡役悉行撤除違者叅劾治罪又奏稱巡撫以家人為耳目每派往闗口意在覺察而不肖屬員朋比奸猾胥役倚為䕶符藉勢勒索横作威福請勅令督撫專任屬員以時覺察不得叅雜家人致滋弊竇等語查各省督撫兼管闗口原令慎選屬員經管而委員之外又派家人者葢以屬員或未深信故復令家人巡查應聽各該督撫照舊派遣但毋得縱容生事滋弊其所委管闗之員仍行不時查察毋得任其苛索侵漁可也奉㫖依議浙江通志卷八十六
