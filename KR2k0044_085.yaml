職缺額錢糧免其追賠溢額不準議敘至商稅不令親填簿册及不給紅單者俱罰俸一年如將部頒稅薄用伊印添送或將稅簿紅單不按季報部者俱罰俸半年收稅單簿送部限期北新關限四十五日十四年題準各關欠不及半分者降一級留任餘照前例全完者紀録一次溢額每一千兩者加一級至五千兩以上者以應升缺先用十六年題準各關稅額二萬兩以下者仍照前例議敘二萬兩以上者額稅全完紀録一次溢額半分以上加一級一分以上加二級一分半以上加三級二分以上加四級三分以上以應升缺先用數多者遞準加級十七年令關稅足額者不準議敘十八年諭各關額外橫征差役四出擾害商民者該部嚴禁察參二十五年議準嗣後稅銀四季報解部科簿單候任滿日彚報有溢額者停其議敘本關額辦銅斤三十萬七千六百九十三斤每斤部定價銀一錢於春夏兩季內動支銀三萬七百六十九兩三錢交給商人採買解赴錢法堂交納又每斤本關自貼水腳銀五分共銀一萬五千三百八十四兩六錢五分此項於康熙四十五年四月內準到部文銅價銀兩不在各關給發在江蘇藩庫支領其水腳銀兩造入稽考簿內解交户部計每年課稅正額并銅斤水腳共銀一十二萬三千五十三兩六錢五分四季解交户部其解餉水腳等費在外本關茶稅一百斤為一引每引納銀二分九釐三毫八絲每年額銷茶引一十四萬道貨未到關先具摺開報完銀填給關封領引運行其茶引截角於年終奏銷解部每年約收銀四千兩不等本關商稅船料銀存貯關庫催齊七務六小關各口便商等銀每季填批咨院轉發藩司貯庫聽候便員附搭解部本關徵收錢糧於康熙五十五年間巡撫徐元夢定額每兩加貼解銀八分以為解餉并奏銷考核解册等費及修理衙署書吏柴米各役工食各口房租等項支給本關區行埠鈔銀有武林區陸家區城南區永昌區新如區前右區北新區艮山區臨平區長安區保安區觀音區觀音下區四板區東新區回回區德勝區各按季差役徵收完後印給小票每年盈縮不一約有三百餘兩此項於康熙五十七年巡撫朱軾監收時捐俸免徵康熙五十七年準户部咨每年解部稅銀每兩解隨平銀三分二釐每兩水腳銀一分至雍正元年四月內準咨嗣後隨平銀兩停止解送又於雍正二年正月內準咨各省稅銀應解飯銀散碎者每兩一分五釐水腳銀一分俟解員起行之日赴本關當堂給發雍正二年五月準户部咨從前巡撫等奏報北新關每年贏餘銀三萬二三千不等康熙六十年十二月內尚書孫渣齊等議定北新關每年額定解贏餘銀四萬兩今奉恩詔議準各關贏餘銀兩盡行裁去每年將應徵額稅銀兩照數充解外如有贏餘另行據實奏報雍正七年續準部頒添發商人親填紅簿凡七務六小關等處每季一扇令商完稅之時即行親自填寫按季送關一年彚送户部其底單各月送關磨對雍正九年正月內準户部咨奉上諭辛亥年春撥解部銀兩照從前餘平之銀減去一半該部即行文各省嗣後著將一半留存以充公用欽此本關遵照舊例每兩扣留添兌銀三分咨院交貯藩庫除遵旨聽解一半外其餘留存以備公用本關季鈔銀每季完銀一錢六分有認一季及二三四季不等總之皆是稱手有不認鈔者即為私牙私稱差役往各縣徵收按季完納每年計徵銀三千五百五十三兩八錢六分計共二十八縣此項於康熙四十年間批歸各縣徵收按季解關今於雍正九年本關會同總督部院頒行鈐印關票發縣填給牙户按季徵輸解完印票仍令季終彚收送閲繳銷其仁錢二縣額徵鈔銀併歸七務大使分催完納亦按季解關馬如龍北關季鈔説王者捐山澤之利以與民未嘗物物而取之也夫一絲一粟必有牙人一出一入必由行户然天地之生物日盛民間之貿易無窮豈能盡數而稽乎牙人領帖逺近不齊行户應行大小各異乃貨物之交易不常遊手之往來莫測豈能比户而求之乎是故一人也而有春夏秋冬之不同一名也而有一二三四之互見方春認納而入夏不改則一時而四季兼之矣此才輸納而彼復借名則一票而數人充之矣况十室之邑三家之市有物産即有土棍有土棍即有藉季鈔名色以吞噬鄉曲者夫季鈔行而使不逞之徒多藉口於關部若關部又無從核其實其為弊可勝言乎至於徵收之法前代髙君凌溪許君天贈荆君之琦論之詳矣向第謂其查核不至則經收並得侵漁於是附關近地議責保人隔屬逺方派分該縣而王君宫臻以為有司各止徵收該管錢糧猶尚慮有逋負今若以關役催徵未便而委諸州縣無論輸解不至難以考成即使州縣力為催輸豈無房書之額派衙役之征求復關於庫藏轉解於北關其為煩費固當不少善哉斯語今亦不必更議改絃也愚謂釐剔之法止照定額徵收按季催取記籍必清交納必核給票必審苛索必嚴則關役自不得為姦而課額亦不致偶缺矣本關便商牙行認納長單鈔銀每年增減不一約四百餘兩本關七務稅銀每年儘收儘解本關頒發循環二簿循去環來印給三連合縫由單一繳本關查對一給該商於經過地方照驗裁繳一給商人收照其中縫裁繳不許本務自裁以杜弊竇每五日各務呈報收銀數目務書赴內匱交納杭州通衢四達往往姦商地棍偷走包送陸續搬運本關差役巡查每五日於各口址查驗往來貨物如遇姦商偷走僻路或以多報少以細報粗並貨票不同者即刻呈送到關審明按律懲治若經過士客齎帶禮物併小民無知偶犯與前項姦商地棍不同酌量發放人七務六小關各地方有大起貨稅或包頭扳先等積慣􅩲頓偷漏搬運等項即刻稟送大關聽候訊實分别發落懲罰其罰稅俱赴內匱交納以憑登簿給單南關舊額南關𣙜事書本厰初立例取本色解淮安清江衛河二提舉司造淺船成化十六年因解户不便部議奏解折銀本年解四千兩十七年解五千五百兩十八年至二十一年各解七千兩𢎞治元年解九千五百兩二年至十三年俱解一萬八百七十兩十四年起每年俱解一萬四千四百四十兩遂為常數內清江一萬三千二百四十兩衛河一千二百兩嘉靖四年為營建宫殿將本年及五年該給清江衛河二提舉司料銀并板枋餘銀俱差官解部以濟大工支用自六年後仍給二提舉司其板枋餘銀部題為供應器皿坐派本厰每年折解杉板料銀四千七百八十二兩五錢俱以餘銀解部十年部題加派一件查催拖欠料銀內開供應家伙急缺物料及備用冠頂等銀一千二百四十兩七錢九分六釐七毫又一件急用物料造辦家伙以備鋪設銀二萬七千三百六十兩每年俱以餘銀解部至四十四年補完因交代過期二提舉司銀漸有積欠本年議定解清江衛河二提舉司正額一萬四千四百四十兩以每年十二月每月三十日扣算每日該銀四十兩一錢一分一釐一毫為正額有剩悉為餘銀四十五年餘銀題留浙江布政司湊給織造縀匹隆慶元年餘銀仍盡數照舊解部又議定照日扣算仍逐年清結不得踰年過月自隆慶二年正月初一日為始至十二月終彀足前數類貯府庫聽解外日剩及閏月俱為餘銀解部以給器皿厰及補工需萬厯一十七年差內監劉成徵一應課稅因及𣙜木本厰主事王在晉議得米稅十分抽一較之别稅百取其一者大相徑庭若增一稅監木商必至竄去定額必至不敷力持者久之本關得免橫抽國朝稅額大清會典南𣙜抽分嵗額稅銀二萬二千八百兩順治十五年增銀一千二百兩康熙二十五年增銀二千五百七十二兩共額銀二萬六千五百七十二兩今額稅銀三萬二百四十七兩五錢每年額留織造銀四千七百八十二兩五錢額解淮安造漕船銀一萬四千四百四十兩額解銅斤銀七千三百四十九兩本關解部銅斤節省水腳銀三千六百七十五兩本關解司杉板料銀四千七百八十二兩五錢本關稅銀厯任監督係年滿自行解部至康熙五十五年間以巡撫兼理題明稅銀存貯司庫俟有解餉便員搭解其解部水腳銀額定每兩一分本關解部隨平銀向例每兩六釐六毫六絲雍正二年正月奉文改為飯費隨正額解部每兩銀一分五釐康熙六十年十二月內尚書孫渣齊等議定南新關除正額錢糧外每年加增贏餘銀六千兩雍正二年四月户部為欽奉恩詔事議準加增銀兩盡行裁去如有贏餘另行據實奏報本關解部添兌銀兩雍正三年三月內巡撫酌定每兩銀三分每年解翰林院幫帖庶吉士俸銀三十兩每年請領部科親填册檔給發銀一百五十兩每年期滿考核批差吏書齎奏及部科各項公費銀六百兩又每年給發册書攢造奏銷册籍費銀五十兩又包箱紙張工費銀一十二兩每年解司牙稅銀一百五十兩每年給吏書節賞銀二百兩每月給發吏書心紅紙劄銀一十兩每月給發吏書工食銀八錢各府屬木牙領關帖輸稅每名納銀六錢加二耗一年約收銀二百六七十兩不等除解司一百五十兩外餘銀同季稅羡餘補入正關額稅各鋪户認納季稅每名每季完稅三四錢不等加二耗一年約收銀八九十兩不等諸浦小販每年認完稅銀一十六兩加二耗本關設立賣買兩牙商人木植交易從中酌估定價每兩取用二分七釐以七釐繳官名為葺辦一年約收銀六七百兩不等以供請領奏銷册檔並給發心紅紙劄及吏書節賞等費仍設正關交易簿一本續報交易簿一本飭著牙行將交易木植字號銀數登填繳查本關設立攏塘簿凡商人木植攏塘著令牙行查明清數登填簿內俟裝清排甲赴關抽分對同銷號仍置循環簿二扇挨填總數每五日赴署倒換如有以多報少隱匿朦朧即行查究本關抽分後該保頭將某商應完稅銀若干登記親填簿內值日包簰將本日抽分若干號開具總單交該書填入循環簿一併送閲仍設坐簿俟完納錢糧一併銷號其抽分過木植仍留壩上俟商人完納錢糧發串票方許過壩若商人木植在城及城隅發賣不必過壩者向例統限一月內完稅今改十日差追本關分設十小口每月掣差委役給發鴛鴦票往口協同內使關總巡查稅務凡有大起竹木仍令民人報單差役查估若零星小販差役即填票收稅美政北新觀音板橋敉粫古蕩六關五日一回稅數良畎安溪漁臨富新四關半月一回稅數漁臨關逺隔江表最為緊要恐有姦販串同委總隱匿偷漏應委幹辦內使嚴加稽察美政關亦屬緊要除零星版片毛木圍圓六七寸以下者準照例在口填給小票若毛木八九寸以上者及八九寸以下有官眼之木仍赴正關報抽又杉板攏塘商販赴關報單隨差內使執板印協同板行人赴美政關抽驗即將板印封繳仍于正關量篾科稅安溪關遇春水充足則竹貨盛行應不時差查以免偷漏所有呈報方簰即差竹厰行人查驗量明丈尺科稅毋許花竹填心以虧額課西涵盤竹弄瓶窰化灣閘係産竹之所例設循環簿二扇給發閘夫竹行人在地巡查凡遇竹貨經過查明報數并往某口抽分登簿內半月送署倒換以憑查核海關稅額國朝創設海關嵗額稅銀三萬一千九百五十二兩四錢三分八絲本關正額梁頭貨稅銀三萬二千三十兩六錢二分外增長江稅銀一百二十七兩六錢一釐八絲又加徵絲稅銀五十二兩二錢舊額四十八兩二錢四分通共稅銀三萬二千二百一十兩四錢三分八絲內除動支各役工食銀二百五十八兩實徵淨銀三萬一千九百五十二兩四錢三分八絲每年解貯藩庫本關派解銅斤水腳銀三千七百五十兩康熙六十年十二月內尚書孫渣齊等議定浙海關除正額錢糧外每年加增銀一萬兩雍正二年四月户部為欽奉恩詔事議準加增銀盡行裁去將每年應徵額稅銀兩照數完解如有贏餘另行據實奏報謹按海關初設嵗無定額嗣後洋舶日增梁頭貨稅等項額定三萬二千餘兩每年贏餘無多雍正六年護理關務台州府知府江承玠於額徵外報收贏餘銀五萬四千餘兩七年至八年寧紹台道孫詔監收實徵贏餘銀五萬九千六百有竒蓋江海風清梯航雲集從未有如斯之盛者也額設紅毛貨稅銀一萬兩𣙜關徴收解司充餉繆燧番舶貿易增課始末按紅毛即英圭黎國在身毒國西其人有黑白二種白貴黑賤背髙凖碧眼髮黃紅色中土呼為紅毛又呼為鬼子其國以貿易為務軍需國用皆取給焉自英圭黎至中國水程數萬里舟行約半年餘船式夾板頭尖尾大篷桅隨風逐節增減與中國殊雖逆風亦可創駛船艙極深梯級上下凡三層船底夾幫雙板塗灌松脂柏子油堅硬若鐵能敵風浪往來於廣東嶴門福建厦門間有乘風至定海者地方文武官不敢擅留康熙三十三年監督常在具題謂初設海關時定海尚未置縣故駐劄寧城凡商船出洋回洋出入鎮海口往還百四十里報稅給票候潮守風又蛟門虎蹲水急礁多繞道陟險外國番船至此往往回帆而去請移關定海嵗可增稅銀萬餘兩部議移關定海府城市廛必致棄毁定邑又須建造仍令駐劄寧波差役前往收稅三十五年監督李雯復題請移關鎮海縣照閩省設關厦門粵省設關嶴門之例設紅毛館一座外國商船必聞風而至部議移關殊毁成功設館恐糜正帑俱未準行三十七年監督張聖詔題定海嶴門寬廣水勢平緩堪容外國大船可通各省貿易海關要區無過於此自願設法捐造衙署一所往來巡視以就商船之便另設紅毛館安署紅毛夾板大船人衆可增稅一萬餘兩府城廛市仍聽客商貿易不致毁旨依壞部議覆允奉十九年六月到有紅毛船二隻船議欽遵康熙三主一名未氏羅夫一名未里氏乂八月到盧咖唎船一隻九月到飛立氏船一隻一時稱為盛事云雍正元年八月初二日欽奉上諭國家之設關稅所以通商而非以纍商所以便民而非以病民也朕撫馭寰區加惠黎庶惟恐民隱不能上達近聞𣙜關者往往寄耳目於胥役不實驗客貨之多寡而止憑胥役之報單胥役於中未免髙下其手任意勒索飽其欲者雖貨多稅重而朦蔽不報者有之或從輕重報者有之不遂其欲雖貨少稅輕而停滯關口至數日不得過是以國家之額稅聼猾吏之侵漁以小民之脂膏飽姦胥之溪壑司其事者竟若罔聞知乎又聞放關或有一日止一次者江濤險急河路窄隘停舟候關於商民亦甚不便嗣後𣙜關者務須秉公實心查驗過關船隻隨到隨查應報稅者納稅即放不得任胥役作弊勒索阻滯以副朕通商便民之意至於崇文門收稅及分派各處查稅之人亦有多方勒索分外苛求之弊京師為四方輻湊之地行李絡繹豈宜苛刻滋擾監督尤當不時稽察杜絶弊端爾等若不遵諭旨經朕訪聞定從重治罪特諭雍正二年十一月初四日欽奉上諭各省兼管關稅之巡撫凡商賈貿易之人往來關津宜加恩恤故將關差歸併巡撫以巡撫為封疆大吏必能仰承德意加惠商旅也但各關俱有逺處口岸所委看管之家人賢愚不一難免額外苛求及勒取飯錢等弊稍不如意則縛送有司有司礙巡撫之面徇情枉法則商民無所控訴矣嗣後著將應上稅課之貨物遵照則例逐件刋刻詳單印刷多張各貨店俱給一紙使衆人知悉其關上所有刋刻則例之木榜務令竪立街市使人人共見不得藏匿屋內或用他紙掩蓋以便髙下其手任意苛索立法如此自能剔除弊端但爾等受朕委任之重尤當仰體朕心遴選誠實可信之人以任稽查之責必期商民有益方為稱職特諭雍正七年二月二十三日欽奉上諭各關開放船隻之處向例有部頒號簿以便稽查兹聞各關另設私簿徵收惟於報部之時始將號簿挨日填造其意以水路船隻往來多寡不齊若據實填簿則不能逐日有徵收之數目恐干駁查是以設法勻派填造如此則簿內全非實在數目與商船過稅串票毫不相符殊非政體且凡事據實則可以無弊作偽則弊竇叢生今既任意勻派填造則號簿亦為虛設矣嗣後各關於部頒號簿務須據實填寫如無船隻過稅之日亦即注明不得仍蹈前轍如敢故違定行嚴加議處該部亦不得混行指駁致滋弊端特諭雍正七年四月户部為遵旨查議事議覆浙江總督管巡撫事李衛題稱浙省南北海三關向照舊例徵稅其間有與部頒則例不符之處皆厯來通商寬恤相沿已久兹準部行令將現行徵收則例徹底清查據實陳奏查核後將條例頒發各關刋榜曉示永為定例行據各關造送清册并聲明北關則例糧食向來止徵船料所有嘉湖二府解省南糧并民間進關完納漕糧以及租米等項原非商販其船料一槩免徵又濮院王莊紬因閩粵江右各省商人凡屬大起恐其航海越渡故特寬減以示招徠其本省店鋪以及零星擕帶者皆照紡紬一例徵輸又比則科稅而有加倍者以貨本稍貴之故恐日久弊混可否將比例免其加倍止照正數徵收理合請旨敕部查核議覆行知將條例頒發刋榜曉示等因查浙省南關現在徵收各項則例北關現行減例並貨物比例及海關各口徵收稅銀事宜原刋估單則例據該督李衛造册題明臣部逐欵較對原頒則例與現行比例均屬平允果無寬減市恩亦無濫加病商應行該督轉飭管關各員將則例比例均刋木榜竪立關前務使衆商共曉咸遵按則徵收著為定例至北關糧食止徵船料嘉湖兩府南糧并民間完納漕糧租米等項原非商販其船料一概免徵濮院王莊紬既經寬減所有零星擕帶照紡紬一例徵輸又比則科稅而有加倍未免輕重不均亦應如所請免其加倍止照正數徴收一併刋載例內遵行庶姦蠧無侵漁朦蔽之弊而商民永沐均平之惠矣奉旨依議雍正十三年十一月户部為請除𣙜關吏役之積弊以便商旅事內閣交出總理事務王大臣等議覆詹事府少詹事許王猷奏稱各關刋刻木榜奉行不實間有未曾設立者亦有書寫小字懸之僻處者往來商賈無處覔看胥役因得額外多取請敕令各關監督務須遵照設立并大書立於關口使商賈一見了然等語查各關應納稅課例應刋刻木榜大書設立關口使商賈一目了然吏胥無從額外苛索立法原為周密乃監督與吏書皆惡其害巳奉行不實或竟不設立或書小字暗置僻處均屬不合應照所奏交部通行各關嗣後務須遵照設立并大書榜示違者該督撫即行題參治罪又據奏稱各關巡役每於商賈未行納稅之時先索飯錢少不滿欲即故意留難水次則波濤驚險陸路則風雨暴露商賈苦於守候任其勒掯請敕行嚴禁等語查商賈未行納稅之前胥吏先百般苛索係實有之事應照所奏交部通行嚴禁違者巡役計贓論罪監督一併處分其往來行客及肩挑步擔不應納稅者聽其竟過不得借端需索又奏稱近關前後數里之內多設巡役櫛比搜求或以驗票為名或以查檢漏稅為辭需索飯錢阻滯行旅應請敕令嗣後除岔路小口仍準巡查外其近關前後巡役悉行撤除以息煩擾等語查商賈載貨至關既經照例上稅原不必數番查驗若於前後數里之內多設巡役自必重重苛索應照所奏交該部通行各關除岔路小口準設巡查外其近關前後濫設之巡役悉行撤除違者參劾治罪又奏稱巡撫以家人為耳目每派往關口意在覺察而不肖屬員朋比姦猾胥役倚為護符藉勢勒索橫作威福請敕令督撫專任屬員以時覺察不得參雜家人致滋弊竇等語查各省督撫兼管關口原令慎選屬員經管而委員之外又派家人者蓋以屬員或未深信故復令家人巡查應聽各該督撫照舊派遣但毋得縱容生事滋弊其所委管關之員仍行不時查察毋得任其苛索侵漁可也奉旨依議浙江通志卷八十六
