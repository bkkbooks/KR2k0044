body:
  text: 浙江通志卷八十六𣙜稅周禮司關掌其治禁與其征廛蓋不徒譏察非常而重本抑末之意亦寓焉兩浙水陸輻湊百貨交集自宋及明𣙜利滋紛國朝頒行定則嚴禁苛徵是以商願藏市旅悅出塗法良意美厯久而可遵守矣志𣙜稅設關北新關北新鈔關志關據杭之北去會城十里而遙當三吳上遊其地即仁和芳林鄉也附關有橋曰北新故以名關關有柵柵上連木作平臺捲篷以蔽風日於此稽放船隻署在柵之東南關前建鼓樓一座髙三丈以警晨昏臨河為牌坊坊下置柵環護左右門外置榜亭本關一應榜文張挂於此凡應行事宜刋立木榜永為遵守謹按北新有關自明宣德四年始成化四年廢七年復設遂為定制國朝順治二年設立北關以徵船料商稅歷今無改務七杭州務稅課司在省城內洋壩頭去大關東南二十里以城內商貨所聚故設此務江漲務稅課分司在武林門外去大關東南十里通北新河水陸衝衢因設此務城北務稅課分司在省城艮山門內去大關東南十五里通水門上河亦商賈出入之地因設此務城南務稅課分司在鳯山門外去大關東南三十里通閩廣江西徽州浙東等處因設此務橫塘臨平務稅課局在仁和縣臨平鎮去大關東北四十五里路通省城長安因設此務西溪務稅課局在錢塘縣西溪留下去大關西南三十里通餘杭等處因設此務安溪奉口務稅課局在錢塘安溪鎮去大關西北三十五里通餘杭嘉湖各府因設此務小關六東新關在仁和縣一都七啚去大關東南八里北通海寧蘇松等處南通省城商船自長安鎮入者由此而達省城自回回墳艮山門陸家蕩德勝壩等區出者由此而至長安鎮設關以稽查商稅兼收船料過此則為城北務板橋關在錢塘調露鄉去大關西北一十里西南通臨安餘杭等縣東接大關省城北通嘉湖蘇松等處舊為女兒關隆慶元年員外郎鍾道改建於此觀音關在錢塘縣調露鄉去大關西南五里通餘臨於昌等四縣設此稽查以防漏稅良馬關在錢塘縣靈芝三都六啚去大關西北三十里地名梁渚鎮下通嘉湖良畎關在靈芝三都二啚去大關西北二十里亦通嘉湖蘇松等處打鐵關在仁和縣太平鄉西接東新關置立木柵看守盤驗早晚啓閉以便農船六小關內東新觀音打鐵三關因在各務中稅俱報過止收料銀其料不論船之大小按稅起科板橋良畎良馬三關稅料兼收每關印給單簿差役徵收每五日各役將收過銀兩赴內匱完納呈繳由單牌簿南新關南關𣙜事書在候潮門城隍之間其地仁和似蘭隅也門坊堂室俱有次第面河為軒數楹疊砌階級以便抽分司啓閉者有慶豐橋舊浙江通志南𣙜分司在巡鹽察院之右改市舶司為之本宋德夀宫後圃基址明永樂中命內臣掌海舶互市景泰四年乃建為署嘉靖三十六年南關因倭寇拆毁員外郎李方至具題命擇地重建因改今處謹按明制杭之抽分屬城南稅課司特三十而取一成化七年千户汪禮奏乞於杭州府設關抽分商木應用以免軍民之擾乃從其言於浙之杭州建抽分厰凡商販竹木十取其一嘉靖間拆毁後國朝建官廳平屋輯面河軒亭照常抽分城外舊厰而順治二年設立杭關其抽分驗放在駐節則仍於城中𣙜署焉小關十漁臨關在蕭山縣昭明二十一都十一啚地名單家堰去分司東南八十餘里有杉梢平溪花雜等木秋問本關親詣抽驗餘月有竒零竹木由此抽分安溪關在錢塘縣孝女北管二啚去分司之北八十里四季皆有貓青椽料籬篌鐵搭柄捻杆稻簽木苦等竹并竒零木植裝為方簰由此抽分觀音關在錢塘縣調露鄉一啚去分司之北約二十五里四季皆有貓青椽料籬篌傘柄等竹由此抽分良畎關在錢塘縣靈芝三都二啚去分司北四十里四季皆有貓青籬篌料椽薑稻簽等竹由此抽分板橋關在錢塘縣調露鄉下分十二啚去分司之北三十五里四季皆有貓青椽篌薑簽稻簽等竹由此抽分敉粫關俗名女兒關在錢塘縣欽賢鄉一啚去分司之西北四十里春秋二季有鐵搭柄稻簽捻竿等竹由此抽分餘月止有小竹船認領票納紙從此往北新關在錢塘縣調露鄉上分一啚在官河之西去分司北二十五里四季皆有椽料傘柄竹北來楠木沙板由此抽分美政關在錢塘縣城南上隅五啚去分司之南約四里四季皆有青椽料貓花籌傘柄等竹松杉雜板棗梨板木松花梢木十根片以下并長短圍篾篦箕軟篾竒零者由此抽分古蕩關在錢塘縣尉司下扇一啚去分司之西北十五里四季每日皆有肩馱雜竹并零少松雜等木過者減額抽分富新關在富陽縣南門外去分司之西約百里此關係新設每月掣差委役查驗富陽新城一帶地方商販木竹板柸等項海關鎮海縣志在鎮海縣南薰門外國朝康熙二十四年建寧波府志海關行署在府治南舊理刑廳館地雍正五年寧波府知府江承玠護理關事增葺又𣙜關公署在定海縣城東康熙三十七年海關監督張聖詔建謹按浙江向嚴海禁自康熙二十三年臺灣既入版圖海氛盡殄乃差巡海大人弛各處海禁通市貿易康熙二十四年部議覆準浙江照福建廣東例亦許用五百石以下船隻出海貿易地方官登記人數船頭烙號給發印票令防守海口官員驗票放行口址一十五處大關口離關署二里屬寧波府鄞縣古窰口離關署一百五十里由陸路屬寧波府慈溪縣鎮海口離關署六十里由水路屬寧波府鎮海縣又旁口二蟹浦邱洋湖頭渡離關署一百五十里水陸兼半屬寧波府之鄞縣奉化縣及台州府之寧海縣地方小港口離關署九十里由水路屬寧波府鎮海縣又旁口二穿山大碶象山口離關署三百六十里水陸兼半屬寧波府象山縣又旁口一泗州乍浦口離關署七百二十里由小路屬嘉興府平湖縣頭圍口即澉浦口離關署七百里由水路屬嘉興府海鹽縣瀝海口離關署三百里由水路屬紹興府山隂會稽餘姚三縣地方又旁口一王家路白嶠口離關署二百二十里水陸兼半屬台州府臨海寧海二縣地方乂旁口一跳健海門口離關署四百五十里由陸路屬台州府臨海寧海太平三縣又旁口一金清港江下埠離關署五百里由陸路屬台州府太平縣溫州口離關署七百八十里由陸路屬溫州府永嘉樂清二縣地方乂旁口四寧村狀元橋黃華關蒲岐瑞安口離關署八百五十里由陸路屬溫州府瑞安縣平陽口離關署九百二十里由陸路屬溫州府平陽縣又旁口一大漁添設口址一處定海紅毛館屬寧波府定海縣係航海渡船風汛不定如遇順潮二日可到關署謹按紅毛至中國水程不啻數萬里康熙三十五年監督李雯請設紅毛館部議未準施行至康熙三十七年監督張聖詔以定海嶴門寬廣水勢平緩堪容外國大船可通各省貿易題請捐資建署往來巡視以就商人之便另設紅毛館一座安置紅毛夾板大船人衆可增稅額經部議行奉旨依議嗣是海外番舶源源而來不特紅毛一國輸誠貢市也司𣙜北關監督北新鈔關志關吏品員隨代更置周為司關漢為關都尉梁為太府卿唐則轉運使兼領宋始令樞密直學士監州稅元設財賦都總管明永樂七年差御史監生於各處收課衙門閘辦課程宣德四年差御史及户部官照鈔法例監收船料鈔正統四年令取回監收船鈔御史止令原設官收管明會典景泰元年令差主事二員於蘇杭二府監收船料鈔六年取回各府委佐二官一員每歲輪收仍行各處巡河或巡按御史提督兼管成化三年令杭州委官監收錢鈔四年罷七年復設差主事一員監收𢎞治六年令淮安揚州杭州錢糧少處南京户部各差官一員俱一年一換各給精微批一道隆慶二年令北新淮安滸墅九江臨清河西務各鈔關主事各鑄給關防撰給敕書今後所屬司局等官該關差滿備開賢否送部移咨吏部以備考察其各關收稅同知通判等官務要親身到關驗放船貨眼同抽分登記簿籍封收銀兩不得專委首領等官有抗違者悉聽該關呈部參治萬歷二年給北新淮安揚州三鈔關監收員外主事不坐名敕書三道差滿更替之日同原降關防傳流收掌大清會典順治元年題準各關專差户部漢司官一員照例撰給敕書精微批文四年題準杭州等關差歸併户部兼差滿洲漢軍漢官八年定各關專差漢官一員十一年題準各關兼差户部滿漢官筆帖式十三年題準各關專差漢官康熙元年題準各關兼差滿漢官筆帖式各一員六部各咨送滿漢官筆帖式各一員輪掣蒙古漢軍俱停差遣三年題準各關差令六部滿洲蒙古漢人漢軍各司官及筆帖式一併掣籖又題準各關停差筆帖式四年題準各關稅俱交地方官管理北新關歸浙江布政司七年題準北新關改隸兩浙運使八年覆準各關仍令六部滿漢官員論俸掣差十四年議準各關選差賢能官員其筆帖式仍論俸差遣停其議敘議處康熙五十五年巡撫徐元夢奉旨監收五十七年巡撫朱軾題委杭州同知金上志管理嗣後每年皆以同知管理雍正元年巡撫李馥奉旨監收二年巡撫黃叔琳題請以主事管理三年署巡撫傅敏監收四年巡撫臣李衛題委鹽驛道王鈞管理七年總督臣李衛題請將北關稅務交與杭州織造許夢暫管一年經部議覆奉旨依議九年十一月織造隆升接任監收北新鈔關志舊例凡役於官者聽事官四員書辦吏一名聽事吏四名書辦三名造册書手五名書算手一十七名解户八名隂陽生六名門子二名皂隸九名鋪兵二名聽事夫一十六名總小甲一十八名轎傘夫一十二名軍牢八名或奉公事役或應徭役或以力役俱不可缺但裁節之使不冗而已其船户及掌守柵巡風之役與夫過塘主人店户船埠頭止遞數以防欺隱官未嘗役之也國朝謹按各關多設吏役則日有侵冒而姦弊易生不順治十年禁關役包攬報單康熙四年禁各關許復用舊役十一年裁各關典吏攢典邇來司𣙜者正關親自驗放早晚二次其餘小關各口遣內使協同差役查驗限期回明稅數庶侵蝕者少而弊竇亦塞矣南關監督杭州府志明成化七年三月杭州增置抽分厰以工部屬官往浙江於杭城之南專理抽分大清會典順治初差工部漢司官一員四年歸併户部八年仍歸工部十二年添差滿司官筆帖式各一員十四年裁滿司官及筆帖式康熙元年復差滿司官筆帖式四年歸併地方官管理歸併杭嚴道或以杭同知兼攝八年復差滿漢司官筆帖式各一員六部兼差十一年題準杭關不拘滿漢止差司官一員筆帖式一員康熙五十五年巡撫徐元夢奉旨監收五十七年巡撫朱軾題委杭州同知金上志管理嗣後俱委同知管理雍正二年巡撫黃叔琳題請以主事管理三年仍委杭捕同知四年巡撫臣李衛題委鹽驛道王鈞管理七年總督臣李衛題準以杭州織造兼管南關𣙜事書舊例設聽事官二十二員聽事吏四名隂陽生十二名舍人四名書辦算手一十六名取供書手三名正關寫單書手四名小關寫單書手二名造册書手七名門子六名水口看廳門子一名漁臨關看守分司門子一名皂隸十六名看厰皂隸八名轎傘夫十二名聽事夫十一名鋪兵一名甲首八十名軍牢十二名木行人五十二名板行人六名竹行人四十三名厰夫三十二名包簰三十一名正關保家二十名漁臨關保家四名安溪關保家五名沙板保家五名賣木中牙二十五名買木中牙二十四名各小關把門總甲二名水口總甲一名撑關火夫十名義橋新壩歇家二名外江歇家一名外江總甲一名綱首六名馱木腳夫頭三名小關保家二名謹按南關吏役為數多於北關如厰夫木牙之類自不可缺至聽事官綱首之名久經裁革除正關外十小關委役估單俱遣內使協同查驗仍不時稽察以杜侵