body:
  text: 浙江通志卷一百四十二選舉二十國朝薦辟康熙十七年正月二十二日奉上諭自古一代之興必有博學鴻儒振起文運闡發經史潤色詞章以備顧問著作之選朕萬幾時暇遊心文翰思得博洽之士用資典學我朝定鼎以來崇儒重道培養人材四海之廣豈無竒才碩彦學問淵通文藻瑰麗可以追踪前哲者凡有學行兼優文詞卓越之人無論己未出仕者在京三品以上及科道官員在外督撫布按各舉所知朕將親試錄用其餘内外各官果有真知灼見在内開送吏部在外開報於該督撫代為題薦務令虚公延訪期得真才以副朕求賢右文之意爾部即通行傳諭遵行特諭欽此内外大臣欽遵薦舉十八年廷試欽取浙江一十四名彭孫遹海鹽人編修吏部侍郎倪燦錢塘人檢討汪霦錢塘人編修户部侍郎徐嘉炎秀水人檢討内閣學士陸葇平湖人編修内閣學士朱彝尊秀水人檢討沈珩海寧人編修沈筠仁和人編修方象瑛遂安人編修毛竒齡蕭山人檢討呉任臣仁和人檢討陳鴻績鄞人檢討毛升芳遂安人檢討邵呉逺仁和人更名逺平少詹事雍正元年四月十五日奉上諭直省督撫國家敦厲風俗首重賢良舉髦士以勸秀民實為政教之大端凡封疆大吏宜共體此意廣詢博訪不可視為具文漫不加察也前所頒恩詔内有每府州縣衛各舉孝廉方正暫賜以六品頂帶榮身以備召用距今數月未有疏聞豈通都大邑之中海澨山陬之逺遂無潛修砥操克稱俊乂可應詔㫖者歟誠恐有司怠於採訪雖有端方之品無由上達殊負朕殷殷延攬之至意特著直省各督撫速遵前詔各訪所屬果有行誼篤實素為鄉黨所推者即列名舉奏毋得𨼆蔽及濫引塞責特諭欽此浙江廵撫李馥欽遵保題引見奉㫖錄用四名李庚星仁和生員知縣諸璧發仁和生貟趙用熙蘭谿舉人知縣鄭璧浦江生員雍正五年四月初十日奉上諭從來為政在乎得人書曰野無遺賢萬邦咸寧盖賢才登進在位者多則分猷効職庻績自能就理而民生無不被其澤也朕即位以來加意旁求凡所以延訪擢用之道盡朕心力如現任官員及候補候選科目諸人每特令薦舉遴選引見廣開錄用之途冀收羣策之力又念各省學校之設原以樂育人才爰命學臣保舉賢能升聞於朝以備任使乃直省學臣所舉人數不多又多草率塞責不能副得人之實夫十室之邑必有忠信今直省府州縣學貢生生貟多者數百人少亦不下百餘人其中豈無行誼醇篤好修自愛明達之士乎著知州知縣官會同各該學教官將府州縣之貢生生貟内居家孝友行止端方才可辦事而文亦可觀者秉公確查一學各舉一人於今年秋末冬初申報該上司奏聞請㫖其或僻逺中學小學實無可舉者令知縣教官出具印結該督撫查實奏聞朕因廣攬人才舉此曠典所以黜浮華而資實用州縣教職等官為一方師長選賢薦能乃其專責倘敢有輕忽之心虚應故事濫舉非人者定照溺職例革職若或狥情受賄則又加倍治罪八旗之滿洲䝉古漢軍亦照此例將人品端方通曉漢文者著該佐領各舉一人如不得其人之佐領亦具印結令該都統彚齊奏聞請㫖庻使潛修篤行之士得以表見而國家亦收得人之效矣特諭欽此浙江總督臣李衞欽遵保題引見奉㫖錄用七名徐承熙杭州貢生河南試用周本孝錢塘生員武義教諭胡士煒臨安貢生河南試用萬承勲寧波生員磁州知州楊純恭鄞生負河南試用張阜新昌生貟景寧教諭林培樂清生員象山教諭雍正十一年四月初八日奉上諭國家聲教覃敷人文蔚起加恩科目樂育羣才彬彬乎盛矣朕惟博學鴻詞之科所以待卓越淹通之士俾之黼黻皇猷潤色鴻業膺著作之任備顧問之選康熙十七年聖祖仁皇帝特詔内外大臣薦舉博學鴻儒召賜授職一時名儒碩彦多預其選得人號為極盛迄今數十年來館閣詞林儲才雖廣而宏通博雅淹貫古今者未嘗廣為搜羅以示鼓勵自古文教休明之日必有瑰竒大雅之才况蒙聖祖仁皇帝六十餘年夀考作人之盛涵濡教澤薄海從風朕延攬維殷闢門籲俊敦崇實學諭㫖屢頒宜有品行端醇文才優贍枕經葄史殫見洽聞足稱博學鴻詞之選所當特修曠典嘉與旁求除現任翰詹官員無庸再膺薦舉外其他已仕未仕之人在京著滿漢三品以上各舉所知彚送内閣在外著督撫會同該學政悉心體訪遴選考騐保題送部轉交内閣務期虗公詳愼搜㧞真才朕將臨軒親試優加錄用廣示興賢之典茂昭稽古之榮應行事宜著大學士九卿會議具奏特諭雍正十三年十月初九日奉上諭周官以六徳六行六藝教萬民而賔興之而黨正之所教族師閭胥之所書皆以六行為本師氏保氏以三徳三行六藝教國子而徳亦以孝為先盖徳藴於中藝之敏鈍隨其材惟行則徴實積久不可掩飾而孝弟又百行之根源也朕即位之初頒布恩詔即令直省府州縣衛察舉孝亷方正暫賜六品頂帶以備召用因念八旗根本之地尤宜敦尚實行以為天下倡諸參領佐領各考察所屬人士孝弟端方厯久不怠者詳列實行申報都統都統實心核驗擇其徳行才識俱優者切具考語送部引見即篤實拘謹無他藝能亦題請旌表賜以頂帶榮身至前詔直省所舉孝亷方正擇其尤者亦送部引見夫十室之邑必有忠信三人並行厥有我師豈得漫言所領州郡竟無其人亦不得冒濫以輕名器特諭雍正十三年十一月初十日奉上諭國家久道化成人文蔚起皇考樂育羣材特降諭㫖令直省督撫及在朝大臣各保舉博學鴻詞以備制作之選乃直省奉詔已及二年而所舉人數寥寥朕思天下之大人材之衆豈無足膺是舉者一則各懐慎重觀望之心一則衡鑒之明視乎在已之學問或已實空疎難以物色流品此所以遲回而不能決也然際此盛典安可久稽朕用再為申諭凡在内大臣及各直省督撫務宜悉心延訪速行保薦定於一年之内齊集京師候㫖廷試倘直省中實無可舉亦即具本題覆特諭進士舉人大清會典國家以科目取士其制最重自順治二年秋初行鄉試三年春初行會試嗣後定子午夘酉年秋八月舉鄉試丑未辰戌年春二月舉會試康熙二年停止八股文章鄉會試以策論表判取士分為二塲第一塲試策五道第二塲四書論一篇經論一篇表一道判五條七年仍以八股文章取士凡鄉試中額順治二年題准浙江省中式一百七名八年恩詔浙江加中十五名易經四名詩經五名書經三名春秋二名禮記一名十一年恩詔浙江加中七名易經二名詩經二名書經一名春秋一名禮記一名十七年題准鄉試中式照舊額減半浙江中五十四名康熙八年恩詔浙江加中十名二十年恩詔加二十三年鄉試中額大省十名凡會試中額順治三年初行會試取中四百名再行會試取中三百名不分南北卷六年會試取中四百名八年恩詔會試照三年例取中四百名南卷取中二百三十三名北卷取中一百五十三名中卷取中一十三名十五年題准每科取中進士一百五十名十六年雲貴蕩平再行會試增額三百五十名十八年恩詔會試中式照丙戍科增額四百名仍分南北卷康熙九年會試加中三百名十五年恩詔加中四十六名康熙三十九年題定直省鄉試將在内文武京堂以上及翰林科道吏禮二部司官武官叅領以上在外文官藩臬以上武官提鎮以上之子孫及同胞兄弟并同胞兄弟之子不論官貢䕃監生員俱編為官字號民卷取中九卷官卷取中一卷各以定額照數分别取中如零數不及一半者不准取中雍正七年議准官貟子弟應試有本係嫡子孫及同胞兄弟之子若已經出繼者不准編入官號康熙四十一年浙江廵撫趙申喬疏稱浙江同考官舊例用一十三員查應試士子每科不下萬二千人以三塲合計之每貟應閲二千餘卷責以悉心校閲勢所不能請自壬午科為始除春秋禮記不添外其易詩書三經各増房考一貟部議覆准浙江同考官加増三貟康熙四十一年禮部議覆浙江廵撫趙申喬題稱江浙並稱才藪江南解額八十三名浙省少十二名副榜亦少三名請比照江南取中等因奉㫖浙省舉人副榜額數著照江南額數加増康熙四十一年題准鄉會試作五經者不論南北官民等卷應於額外取中不得過三名倘佳卷果多不便棄置臨期酌奪題明其第二塲加詔誥二題令其兼作闕者不録康熙五十年議准各省鄉試中額俱於五分之内加増一分浙江原額取中八十三名今増十四名其副榜并分經取中之處俱照例計筭取中各省習五經者原額取中三名之外酌増一名會試五經中額亦酌増二名如或未優寧闕毋濫五十六年停止康熙五十年十月禮部等為欽奉上諭事題准直省生貟舉人額數屢次加增赴考士子較前實盛掲曉期廹主考不能細心詳閲以致房考草率完事查會試掲曉日期原於三月初五日内今寛限三月十五日内鄉試掲曉日期大省原於九月初五日内今寛限於九月十五日内中省小省俱於八月内今寛限中省於九月初十日内小省於九月初五日内其直𨽻江南浙江人數倍於他省應照會試例加用房考官二員康熙五十二年恭逢聖祖仁皇帝六十萬夀特開鄉會試於二月舉行鄉試八月舉行會試康熙五十二年十月禮部議准鄉會試考官出題不拘忌諱凡四書五經聖賢講理明道之語俱可出題庻士子難以揣摩不致以宿構倖獲則實學共敦人才輩出康熙五十三年議准嗣後文生貟有願改入武塲武生有願改入文場者照文武生貟鄉試例起送各文武場鄉試文舉人有願改入武場武舉人有願改入文場者照文武舉人會試例起送各文武場會試其中式者照例造入新册不中者仍各入文武原册内不准再行改考康熙六十一年十一月恭逢世宗憲皇帝登極特開鄉會恩科於雍正元年四月舉行鄉試九月舉行會試二年二月補行癸卯科鄉試八月補行會試雍正元年五月禮部欽奉上諭鄉會科二塲論題仍用孝經雍正二年五月禮部為欽奉上諭事議准鄉試中式計中額十九名五分加五經中額一名其零存之數過十名者亦准加一名不及十名者不准加增浙江中額九十九名應加五經中額五名或五經應試人數果多佳文果盛正加之額不能盡者酌量加取副榜三四名准其作貢雍正四年十月禮部為題明事覆山東考試官於正額外加取五經副榜二名准其作貢本月十六日奉㫖近來科塲取士試官多以四書文為主而於經義不甚留心士子讀書制行之道首在明經其以五經取中副榜必係有志通經之士著將今年各省五經取中副榜俱准作舉人一體會試再今科各省所中副榜内有兩次中副榜者亦准作舉人一體會試以上二項加恩之處俱係特典後不為例欽此雍正五年十一月禮部等為欽奉上諭事題准嗣後鄉試房考除順天鄉試仍照例開列各衙門官貟恭候欽㸃外其外省鄉試飭令所屬地方官各將在籍候選之進士舉人確訪讀書立品不干外事文行素優者該縣備造履厯經書清册加結送府該府出具保結申送督撫衙門親加騐㸔以備隣省調取大省十八房者取用三十名浙江應取江南十名江西十名福建十名俱限八月初一日齊集省城俟主考官進闈之日監臨督撫傳集調取之進士舉人當堂公同掣籖得内簾者令入闈分校其餘即令回籍十年三月議准其餘未得掣入内簾者即令分掣外簾雍正七年禮部因建文廟大成殿上梁前二日慶雲現於曲阜奉㫖着將明年會試取中額數廣至四百名壬子科各省每正額十名加中一名其十名之外有零數者亦加中一名欽此浙江中額九十九名五經中額五名共一百四名應加十名共中一百一十四名八年會試欽奉特㫖浙江中額七十