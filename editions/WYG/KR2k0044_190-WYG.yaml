body:
  text: 浙江通志卷一百九十一人物九介節下紹興府三國呉魏滕三國志㑹稽典録字周林祖父河内太守朗宇少英列在八俊滕性剛直行不茍合雖遭困偪終不囬撓初亦忤䇿幾殆賴太妃救得免厯厯山潘陽山隂三縣令鄱陽太守晉孔安國晉書本傳愉㑹稽山隂人子安國年少諸兄三十餘歲羣從諸兄並乏才名以富强自立惟安國與兄汪少厲孤貧之操汪既以直亮稱安國亦以儒素顯孝武帝時甚䝉禮遇厯侍中太常再為㑹稽内史領軍將軍安帝隆安中下詔曰領軍將軍孔安國貞慎清正出内播譽可以本官領東海王師必能導達津梁依仁游藝後厯尚書左右僕射義熙四年卒贈左光禄大夫孔羣晉書本傳字敬林有智局志尚不羈蘇峻入石頭時匡術有寵於峻賓從甚盛羣與從兄愉同行於横塘遇之愉止與語而羣初不視術術怒欲刃之愉下車抱術曰吾弟發狂卿為我宥之乃獲免後峻平王導保存術嘗因衆坐令術勸羣酒以釋横塘之憾羣答曰羣非孔子厄同匡人雖陽和布氣鷹化為鳩至於識者猶憎其目導有愧色任厯中丞卒於官嗣子沈南北朝孔覬宋書本傳字思逺㑹稽山隂人孝建六年為江夏内史為人仗氣不能曲意權倖莫不畏而疾之居嘗貧罄豐約未嘗闗懐弟道存從弟徽頗營産業二弟請假東還覬出渚迎之輜重十餘船覬見之偽喜謂曰我比困乏得此甚要因命置岸側既而正色謂道存等曰汝輩沗預士流何至還東作賈客耶命左右取火燒之燒盡乃去先是庚徽之為御史中丞性豪麗服玩甚華覬代之蓬首緩帶風貌清嚴皆重迹屏氣莫敢欺犯徙司徒左長史道存代覬為内史時東土大旱都邑米貴道存慮覬甚乏遣吏載五百斛米餉之覬呼吏謂曰我在彼三載去官之日不辦有路糧二郎至彼未幾那能便得此米可載米還吏曰自來無有載米上水者都下米貴乞於此貨之不聽吏乃載米而去太宗即位召覬為太子詹事王思逺南史王鎮之傳思逺晏從父弟也父羅雲平西長史思逺八嵗父卒祖𢎞之及外祖羊敬元並栖退髙尚故思逺少無仕心建武中為吏部郎思逺以晏為尚書令不欲並居内臺權要之職上疏固讓改授司徒左長史思逺立身簡潔明帝從祖弟季敝性甚豪縱使詣思逺令見禮度都水使者季珪之嘗曰見王思逺終日匡坐不妄言笑便憶邱明士見邱明士蓬頭散帶終日酣醉復憶見思逺言其兩反也上既誅晏思逺遷為侍中及起居注卒贈太常謚曰貞子謹按思逺先世琅琊臨沂人祖𢎞之徙居㑹稽上虞已列寓賢故思逺入紹興人物唐孔若思唐書本傳山隂人紹安之孫早孤其母躬訓教長以博學聞有遺以褚遂良書者納一卷焉其人曰是書貴千金何取之亷若思曰審爾此亦多矣更還其半擢明經厯庫部郎中嘗曰仕宦至郎中足矣座右置水一石明止足之義中宗初以若思多識古今凡大政事必咨質以行三遷禮部侍郎出為衛州刺史故事以宗室為州别駕見刺史驁放不肯致恭若思劾奏别駕李道欽有詔别駕見刺史致恭自若思始累封梁郡公卒謚曰恵子至字惟㣲厯著作郎明氏族學撰百家𩔖例宋石亞之成化新昌縣志石城先生之子嘗築室讀書於皷山景祐元年進士唱第時年十七丰神秀整天子將以尚主使卜其意辭曰父母老願奉甘㫖家已别議姻王姬非敢偶也遂不强仕至太常博士趙炎成化新昌縣志宋咸淳中權刑部員外郎王爚為左相炎責其附賈似道爚乃上言極奏似道之罪似道遂罷徐天祐兩浙名賢録字受之山隂人以父相恩為將仕郎銓試詞賦第一尉歸安時年尚少即以吏事稱嘗出郊吏具供帳甚飾天祐詰所從出吏以例對天祐曰費出於官則犯法於民則重擾例安可用盡却之貴人居邑者將囑事出謂人曰吾見尉自不敢有所請中進士第為大州教授日與諸生講經義聽者感發徳祐二年以國庫書監召不赴退歸城南杜門讀書四方學者至越必進謁天祐髙冠大帶議論卓卓見者以為儀刑明趙淵𢎞治紹興府志字澤明㑹稽人洪武初膺薦為陽榖知縣擢山西按察使去贓吏興學校卓有時譽及解官結茒先隴之側旦暮讀書不以貧窶為戚屠任𢎞治紹興府志字彦任嵊人家貧好學性耿介洪武中任蕭山縣學訓導陞武陟知縣以亷謹聞𨽻卒有餽瓜菜者任郤之曰此苞苴之漸也秩滿以政最擢刑部主事及卒惟餘書篋敝帚而已薛常生𢎞治紹興府志字士容上虞人永樂丙戌進士以母老不敢行逺陳情當道乞就邑學教諭至則嚴立條約朋舊皆畏憚之厯陞吏部郎中嘗督北征餽餉多効勞績故人陳重器贈絹數端堅却不受陳叔剛嘉靖餘姚縣志初為縣從事永樂初舉賢良起為吏部主事厯郎中性亷潔在官三十餘年居處服御如寒士上方屬意大用叔剛屢乞休勉從之宣徳中再被召不起有啓䝉故事陳吏部集行世孫謨舉進士官終提學僉事蔣琰萬厯紹興府志字尚圭新昌人永樂間以貢授九江通判在官滿兩考一以公亷自持時勅造廬山廟出帑金萬餘琰用其半餘悉封還於朝用薦擢貴州思南知府清操愈勵嘗於宅傍植棗一林謂子孫曰吾以木奴千頭貽汝矣入覲卒於京張禎遜兩浙名賢録字友讓㑹稽人性剛正清介讀書嚴義利之辨嘗曰我私淑孟軻氏人稱為張孟子永樂中舉賢良方正授福建按察使照磨持己慎密克修其職數與上官辨時政得失言論侃侃不少詭隨上官嫉之不得行其志即引年返初服一時諸名人競為詩文以髙其行趙魯分省人物考字尚確山隂人宣徳初膺鄉薦厯任教諭秩滿不調恬靜自如正統間陞國子典籍日端坐觀書鳴琴自娯祭酒陳敬宗謂人曰趙尚確仕不近利學不近名對之坐談簡淡有味今之黄叔度也秩滿致仕行李無一長物惟囊書數百卷而去陳金萬厯上虞縣志字汝礪宣徳中由進士任行人奉使安南厚贐以金金謂天朝使臣義無私交峻拒不受安南人義之為立却金亭累官廣東巷布政使清修簡約丁外艱歸民攀留者填溢衢潘楷嘉靖餘姚縣志字貴謨舉明經除仁和縣訓導擢監察御史坐劾逆豎王振左遷通州學正振敗復為御史氣節益勵尋致仕歸落魄無業飢寒濱死而未嘗少挫其節從弟英宇時彦以進士拜南臺御史與同官劾奏都御史周銓銓自經英戍遼陽景泰改元詔復英官而英已死司馬恂萬厯紹興府志字恂如山隂人正統中貢入太學尋中順天鄉試第一拜給事中在職論事能持大體不為苛察英宗復辟率同官極論人臣之懐二心者慷慨引義擊刺權奸辭甚切至未幾選為春宫贊善是時石亨曹吉祥内外相要結朝士多趨附之恂獨簡黙自守亡何亨敗附者皆獲罪而恂竟以叙遷進少詹事兼國子祭酒敦禮範衆持其科條諸生無敢自便者尋以病乞歸陳壯紹興府志字直夫山隂人初從父戍燕清苦力學慷慨有大節天順間成進士拜南京監察御史以亷介稱尋改江西僉事督察官吏雖素所愛厚無所假未幾抗疏歸李少師東陽重其去有莫與越人謀出處直夫先謝外臺歸之句歸十餘年用薦起官福建辭弗許尋擢河南副使甫蒞官又懇疏乞休壯直道事人志未竟而退退而為鄉之典型者三十年黄珣於越新編字廷璽餘姚人成化辛丑進士厯官南吏部尚書時劉瑾方進退大臣遂致仕卒於家嘉靖十年禮部題珣厯事三朝有清謹名乃追謚文僖諸觀西江志字民瞻餘姚人成化進士以工部員外郎陞瑞州知州嘗自誓曰貪墨之吏猶不貞女一有㸃汚何以見人時有訟者暮夜饋金不受卒寘之法後以忤時貴調南安盛瀧萬厯蕭山縣志字源之登進士初知臨淮終南寧守為政嚴明一毫無所染以直忤當道解官歸行李蕭然抵家杜門讀書不入城市有御史以巡鹺按浙知其饘粥不繼延之入省飲欵甚洽瀧終無所言一巨商敗法當戍擕千金因瀧子以請子乗間謂曰父忍兒輩飢寒以死耶瀧曰吾誓不以飢寒易晩節子悟還商人金相與甘心不悔越中稱清白吏必曰盛南寧徐官蕭山縣志父洪成化乙未進士弟守與官同舉正徳癸酉鄉試官登進士清苦自勵厯廣西僉事之任不能具裝臨行子請曰家世清白願稍為後嗣計徉許之抵任一載無所寄子復以書請官還報曰青天白日之下稠人廣衆之中豈可為此前言戲之耳蕭人至今誦之王鑑之嘉靖山隂縣志字明仲以進士知元氏縣有治才擢御史督南畿學政士咸畏而愛之轉都御史厯刑部尚書時逆瑾擅權六卿見者皆長跽鑑之獨與抗禮且責同列曰大臣可屈體於宦豎耶遂謝病歸劉忠器紹興府志字世用新昌人成化初進士出知永安改崇仁擢南臺御史終太平守為人清苦自勵不可干以私郡有豪宦専持守令短長以行其私忠器待以禮稍有請託輙拒之居鄉出入徒步自登科至貴顯匹馬隻夫不以煩有司或以為舊例當得忠器曰吾無一毫徳及鄉里敢勞費耶居常惟以園蔬自給卒之日囊無餘金子孫窮乏不能自振陶懌兩浙名賢録字習之㑹稽人𢎞治進士授刑部主事時戚里有殺人者同列並寛之懌曰法者天下所公豈可以勢屈耶竟寘諸法累遷福建僉事時逆瑾邀賂曰與我不愁無好官懌歎曰不義富貴於我浮雲遂致政而歸呉蕣於越新編字子華山隂人𢎞治中選庶吉士拜吏科給事中剛直敢言每彈劾大臣及諸貴倖不法事無所顧避中外憚之嘗以事觸天官卿竟中傷之免官歸環堵蕭然杜門不出費愚萬厯紹興府志字希明山隂人𢎞治進士初為廷評執法無私時有邉將數人坐失機當刑賄權貴將釋之愚廷奏其罪悉置諸法後出知成都以忤當路謫戍尋放還平生甘清苦儋石不儲妻子或凍餓不以為意成都有門人官於浙知其貧甚因請過省中晏欵累日微以交闗事諷之愚正色曰爾乃視我為何如人即日拂衣歸遂與絶交郡守讀法請教愚曰公刑太苛斂太急守為面赤其介直𩔖如此子思義精於醫端慤有父風惜無嗣倪鎧萬厯上虞縣志字右文年二十舉於鄉始授興國學正日舉伊洛淵源課其弟子時四明趙文華以郎署典山西試事鎧為同考試官趙將有所私鎧亷得之固爭竟不中選遷樂平令三月治聲大著調繁南城迄二年聞母病即乞歸養居田三十年不入城市日以讀書課子為事著有西原日紀務本録等書陳塏舊浙江通志字山甫餘姚人嘉靖壬辰進士由行人轉南給事中劾武定侯郭勛驕恣嚴嵩欲見之不可出為湖廣㕘議厯廣東提學副使海瑞龎尚鵬方為諸生皆第之髙等行部過厓山改張𢎞範立石書宋少帝及其臣陸秀夫死國於此轉湖廣㕘政歸林居四十年讀書如寒士詩文不為奇崛有洪永風賈大亨萬厯上虞縣志嘉靖戊戌進士初授行人奉使出入惟箬笥砂礶後入臺中厯按湖廣河南廬鳳淮揚風節凜然河南有卞姓者坐誣大辟為辨出之卞以厚貲隂謝大亨峻却之歸田日以所遺薄産與弟姪均之羅萬化㑹稽縣志號康洲隆慶戊辰廷對第一授修撰江陵柄國每思招致託客周生通意萬化峻拒之其僕尤七私請作記萬化怒曰吾為天子侍從臣而為僕人作記耶江陵又為其子先期請試題萬化拂衣起曰吾晩裝兩篋明日出宣武門而謂我難去官乎江陵益恨之故久不得調江陵敗始遷諭徳陞南祭酒厯禮部尚書㑹推閣臣或言中人須少遺之萬化歎曰吾以單寒被遇至此於吾過矣此何官而可貨取耶又推冢宰而忌者卒沮之復中罷萬化亦瘁病思母連疏乞歸至寳應卒贈太子少保謚文余増逺邵廷采余増逺傳字若水㑹稽人崇禎癸未進士除寳應知縣時劉澤清開府淮南欲以公禮格府縣増逺投版棄官歸集村童五六人授以三字經旦則秉耒與老農雜作同年生王天錫按浙欲與話舊増逺擁衾不起曰不幸狗馬疾不能與故人為禮天錫方出門乃與婢子擔糞溉𤓰天錫遙望見之歎息而去金廷韶舊浙江通志字二如山隂人崇禎癸未進士為江西贛縣令贛營兵變撫道皆不敢出廷韶頃刻定之甲申後退歸匿影山澤自號恥廬終老不出俞漢逺分省人物考上虞人能詩畫常膺保舉寓京師時吏部尚書郭某知其能畫使人召之不赴召者曰冢宰人欲一見而不可得子何獨不往漢逺曰吾以應䇿而來今往為之畫使他日得美除人將謂以畫得之卒不往後卒旅邸貧無所資鄉人裒金斂之國朝魯㮚紹興府志字季㮚㑹稽人明崇禎癸未進士改庶吉士不數月告歸杜門不出國朝順治十二年浙江巡按御史葉舟疏薦於朝以老疾辭好讀書雖耄不衰丹鉛甲乙常至丙夜居城南栁潭杖履蕭然見者以碩果目之兄孫徳升康熙壬戌進士官檢討假歸亦以清節著吕正音紹興府志字五正新昌人順治乙未進士除昌樂知縣以亷善得民徵入為户部主事乏行資父老為治裝悉謝不受典衣而行後以主事出視鳳陽糧儲兼𣙜闗入督寶泉局皆脂膏右職正音皎皎自持無絲毫染康熙丙午典試廣東遷刑部郎中擢江南僉事分巡徽寧㑹裁缺歸年七十五卒周之麟紹興府志字石公蕭山人順治己亥進士改庶吉士授檢討厯國子監司業進少詹事左遷太僕少卿復晉僉都御史太常卿通政使通籍三十餘年謹慎詳密遇事不激不隨以恬和導迎善氣平生嚴取與屏絶華艷服官雖久田宅不及中人見人則握手斂容非素識者不知為朝貴常語其子弟曰我居處服食較諸生時不敢一分増我意氣襟懐較諸生時不敢不十分減人以為名言王穀韋紹興府志字鄂叔㑹稽人康熙庚戌進士厯官淮安知府致仕居鄉有矩矱歲時一報謁長吏外片牘不至門所從老蒼頭數輩皆衣屨敝敗飭子弟攻苦食淡絶不預戸外事其家法稱越中最陳捷鄉賢留祀冊字穎侯新昌人康熙己未進士選庶吉士授編修幼失怙奉母吕色養備至處兄弟同仁均愛嘗道拾遺金訪還失者紹興府志丁夘典河南鄉試有勢要暮夜齎金求闗節捷峻拒之其人曉譬百端卒不納悻悻而去榜發多中州名雋磨勘時以三塲發䇿有二程見周茂叔吟風弄月之語摘其瑕謂非考官所當言遂鐫級歸田軒來四川名宦冊字東軒山隂人康熙辛未進士知成都縣盡革支派陋例需應皆出捐辦邑自明季兵燹後多荒士軒來招徠墾復履畝起科不漏不苛課日増而民力裕俗尚輕生委曲開諭幷出示嚴禁有犯者即單騎往騐立行斷結保全善𩔖甚多修學校勤講課多方鼓舞士風以振遇地方大事陳請於上官或不允即義形於色不少改移必得請而後已上官每以鐵長官目之陞戸曹邑民扶老擕幼泣送百里外擢御史掌江南道甲午主順天鄉試稱得人假歸家無儋石儲足跡不入城市日與田夫野老處若絶無名位之榮者台州府宋彭椿年台州府志字大老黄巖人紹興進士初授蘄春縣梁丞相克家薦之未用而梁去椿年即詣部汪松溪㕘政龔茂良奏曰臣備位丞弼每見朝士希進獨彭椿年退然不營遷樞密院編修官有私於椿年者曰閣長致意指日有峻除椿年曰不識閣長正恐誤耳厯知處州吏部郎中以祕閣修撰致仕趙汝掄黄巖縣志字徳澤宋宗室祖不曲由舍選得官清白有厚徳秦檜當國投聞三十年紹興未始除軍器少監汝掄端潔好修初官呉門與韓􅇑胄有僚寀之好及其専政同時無不貴􅇑胄嘗招致之卒不往終知永嘉縣陳庸仙居縣志字時中紹興進士終江西提㸃刑獄以亷介稱解組歸惟圖書數卷而已卒謚忠簡子章淳熙進士厯官提舉建康崇禧觀有父風時呼小提刑以别於庸鄭雄飛赤城新志字景温仙居人端平進士累官戸部侍郎以清節著陳宗太平縣志字正夫堅之子寶祐四年侍御史丁大全既逐丞相董槐益恣横用事時宗為太學生與黄鏞陳宜中林則祖曾惟劉黻上書攻之大全怒嗾御史呉衍劾之削籍編管遼州時號六君子王象祖台州府志字徳父臨海人負異質學於葉水心而與陳篔牕為友和厚嚴重學邃行髙守令欲見不可得真文忠公極重之有故人作相象祖已寢疾猶藁數千言規正之時論比之蘇明允趙時橐天台縣志淳祐丁未進士厯工部侍郎咸淳亷吏三人橐居其一林應丑黄巖縣志字子寅喬年從子咸淳三年發解厯官兵部員外郎上疏攻賈似道引病歸明林思英寧海縣志字嘉睿昇之弟洪武戊午以人材授福建汀州知府居官節儉任五載聞母訃悲悼不已眥血迸流七日而殞櫬歸行李蕭然路費不給子尹昭沿途告貸時稱為林清孝云王敏方孝孺王進徳傳字進徳寧海人嘗與友夜讀空舍中夜半鄰女叩門求宿其友欲納之敏厲聲曰吾在此誰敢入因疾呼使聞於外友愧謝不敢出聲女逸去後學舍諸生相戒不敢為非義分教北方藩鎮主將苦其清介異己欲試其所為召使飲酒坐婦人幃中酒酣鑰門以出敏入見婦人大呼排門出取廏馬乗之逃還主將驚謝後拜御史免歸魯穆獻徵録字希文天台人永樂丙戌進士拜監察御史以敢言稱陞福建按察司僉事理寃繩奸民目之曰魯鐵面厯都察院右僉都御史以疾卒穆為人剛方亷介始終不渝厯仕中外二十年被服如寒士卒之日無以為殮同朝卿士咸賻助之李茂宏台州府志字用受太平人永樂乙未進士授刑部主事陞考功員外郎氷蘗之操終始如一大臣爭論薦之年六十乞致仕歸李文達公嘗語人曰茂宏為人恬澹少許可與人不茍合而疾惡之心太勝以故未至卿佐也張璣黄巖縣志字士璇以貢入太學嘗持部檄督宣歙等州筀竹謝絶賂遺授定州同知廨内蕭然如僧舍丁内艱歸再起涿州奏減荒地税民甚徳之秩滿告歸行李惟故篋敝裘竂寀醵贈以金不受州人呼為乾張黄尚斌赤城新志號松塢太平人每讀史至佞倖傳輙掩卷涕洟或感憤至唾罵嘗見人有盜其囷者徉為不知而避之年九十終以孫孔昭貴贈工部右侍郎郭絍臨海縣志字仲端成化辛丑進士令績溪以亷幹稱擢監察御史風裁清峻正徳己巳以山東㕘政管順徳府事尋改安慶府介潔之聲聞於逺近迄致政歸行李蕭然歸家杜門如寒士僮僕不能堪多逸去時人歌之曰郊外兒童迎屋裏兒童走亷愛自有真古今郭太守子橈正徳進士蔡餘慶黄巖縣志字從善成化丁未進士授中書舍人為李東陽所重欲引直内閣輙辭謝陞南京刑部郎中轉汀州知府亷慎自持恤民疾苦考績陞福建鹽運使益厲清操秋毫無所私惟積圖書數箧當道交薦有獨不亷於儲書之語陞山東㕘政未幾以忤中貴人歸三十年足跡不入公門著有瘦石亭稿燭光録王中寧海縣志字時中成化丁未進士授河南道監察御史陞山東按察僉事𢎞治中分巡遼東以邊事與大理卿呉一貫等九人連逮至京坐失奏左遷石屏州同知武宗御極陞同知南雄府當路以中素著清望特委専理抽分人皆以為錢貨藪中益勵清操俸入皆儲公帑及病革惟一老婢侍囑之曰吾一閨女也今當歸勿汚吾節言訖而逝舁喪歸至杭闗盤詰者發其囊惟敝衣書卷而已咸歎曰真天下窮官也自號夢卜子葉廷榮臨海縣志字尚本池州守恩之子成化丙戌進士厯監察御史彈劾有聲一塵不緇恬於進取乞告家徒壁立至不能支疾且革當道欲因事周之家人慫恿終不受鄉人稱其垂死不以一言博千金守約之義足以範俗云林克賢太平縣志字一中鶚從弟成化丙辰進士授刑部主事轉員外陞福建按察僉事其在刑部治獄不為苛刻有阮成者錦衣也嘗以大辟屬克賢讞之知其寃白尚書陸公曰固知錦衣權重然殺人以媚人某勿為也卒從未減又吏部誣王宗穰投匿名書罪宗穰父淵嘗以言官獲譴衆咸曰非林員外莫能辯遂以屬之事竟得白其在按察力振風紀巡按御史某舞文恣奸嘗面折其過坐是十年不調嘗兩監鄉試御史欲以意黜陟人抗執不從周玉臨海縣志字朝振臨海人𢎞治癸丑進士官祭酒以逆瑾用事致仕歸屢薦不起時論髙之家居三十年恬淡自好曾修臨海縣志年踰九旬而終秦禮臨海縣志號樗菴𢎞治己未進士令常熟直道正辭執節不二先是貴游歸鄉縣盛供帳交迎禮一切除去厯官刑部員外陞福建按察司僉事剔奸蒐蠧稱為秦龍圖弟武號幘峰正徳丁丑進士由行人擢御史直諫有聲蔡徳器台州府志字重之黄巖人領鄉薦授上饒教諭陞靖江知縣亷潔自持皭然不滓靖江故盜藪民浚河得金銀器盈車以一盤來餽却不受刷卷許御史行部通貨賂吏以白徳器曰行苞苴於權門吾寧考殿不屑為此許發白金令鬻文綺以諷之執不從許怒欲逐之遂引疾歸行李蕭然家居杜門掃軌足跡不入公府晩年布衣蔬食或至不給怡然不以介懐陳勉廣東通志字汝勉黄巖人舉人𢎞治間肇慶同知有文學清介自勵庖無粱肉或以為矯勿恤也陞太平知府蔣泮仙居縣志字良潔父禄令安溪以清節聞卒於官當路賻贈三百金泮却勿受正徳庚辰成進士授工部主事榷稅荆州江陵驛日餽支應銀若干泮行州令貯庫備賑陞員外郎督理倉厫中貴楊某素聞泮名希交驩焉泮絶不與往來楊慚思中傷已而跡泮所為曰蔣副郎氷心雪肝未數數覯也遷郎中奉使再如楚抵姑蘇而卒囊橐蕭然無以為殮郡守胡纘宗經紀其喪秦紹科黄巖縣志字𢎞哲弱冠領鄉薦授海州知州值旱蝗殫心荒政巡撫席書檄行旁郡為式陞福建鹽運司同知氷蘗自勵秋毫不緇擢知大理府首禁輕生之俗多所全活減繇役冗費數千金有土官欲有所請夜懐金數百伺於途杖而遣之因榜於廷曰公庭三尺法暮夜四知心大理人至今頌之居官凡三十年所至一惟節用愛民執法不阿以是不悦於貴勢坐罷歸戴時弁台州府志字貞甫臨海人嘉靖癸未進士殿試二甲例授京曹有權貴重其名欲致之門下啖以官職時弁曰結奥援以進此吾讀書時言之而面發赤者今忍蹈之耶以此忤出知亳州未幾以母老乞養歸後起工部員外授河南按察僉事卒以不善事上官致仕宦故薄不能備肩輿畜一驢以代步墮驢傷足嘗作墮驢謠著有東華文集林應麒仙居縣志字必仁嘉靖進士授呉縣令呉多豪右為民患應麒下車輙収訊之㑹御史茍汝安按郡應麒晉謁茍端坐不為禮應麒徑長揖出豪右乗間誣之遂被劾已而除國學博士調金谿令尋陞恵州府同知其令金谿時為鄭副使世威屬稿議革餽送内引分宜進賢二邑嵗費六千金為證語頗激切嚴世蕃萬鏜諷言者文以他事迺罷歸張志淑臨海縣志字世彦嘉靖甲午舉人選授瑞州司李合境稱神明直指巡列郡輙檄志淑與俱志淑亦慨然以激揚自任墨吏悉望風解綬分宜柄國志淑半刺弗與通遷廣西思恩郡守思恩蠻獠雜居志淑履郡示以威信衆咸懐之未幾土酋以兵逼城下志淑率吏士奮擊郡賴以安後致政歸家惟圖書數卷而已林貴兆台州府志字道行太平人嘉靖庚子舉人授江西都昌令茹蘗飲氷始終一轍時嚴嵩父子秉政大小趨附貴兆曰我豈能為若作鷹犬耶即日解印綬去行李蕭然父老涕泣留之兆别以詩曰湖邉植栁維官騎栁未成隂官已去慇懃父老莫留衣舊瓢曽掛衙前樹士民為之立祠周弼黄巖縣志字文佐性耿介不茍合為諸生縣令方深器之有貴宦延主師席為求解計者謝弗往貢京師時冢宰為鄉人諸生進謁率跽階下弼執鄉黨禮平立授恩縣訓導陞邱縣晩嵗免官歸家益窶恬然弗問也年八十餘終孫惟中畿輔通志寧海諸生隆慶中由永年丞遷清河一僕自隨獨勵苦節士民歸其徳化自言死期逾月暴卒檢囊中僅遺錢二百文士民為舉喪甚哀余鐸黄巖縣志字振之以貢授崇義訓導邑僻左士陋弗學鐸日與敦説詩書衆皆奮起故事齋膳夫直率倍徵鐸請於縣革之學旁多隙地募人藝蔬收其税歸之官屢請歸不許㑹峽江尹成某以御史檄行縣勢張甚鐸獨與抗禮成隂以濫酒中之坐免不知其不善桮杓也及歸諸生垂涕送之數百里外不能别家居二十年杜門著書後先邑令莫覯其面平生學務實踐不屑近名於紛華勢利泊如也所著有雲屏稿西山集石承芳舊浙江通志字子孝寧海人讀書力學無他嗜好以明經授常熟丞邑有梅李地磽因逋糧往勘賦詩有飛沙迷望逺瘠土不毛同之句涇陽顧公傳之而此城糧額遂減署尉篆民有犯盜者匿勢家承芳卒擒獲後陞廣東興寧令因與府道忤遂辭歸老穉郊送囘舟僅餘俸金七金環堵蕭然日以書吏自娯家居十載卒金華府漢陳修南昌府志字奉遷烏傷人家貧為吏步擔上下恒食乾糧每至正臘僵卧不起同僚飲食䖍請不一赴遷豫章太守計月取俸受米不受錢十日一炊不燃官薪布被覆體金華先民傳修遷合浦太守大著治聲卒於官合浦民懐其恵䕶喪歸葬楊喬婺書字聖達烏傷人桓帝時為尚書風儀偉麗帝嘉其才名尚以公主固辭不聽因不食而卒宋徐端益嘉靖金華縣志建炎初為虹縣尉時張邦昌手書至縣令以下皆迎拜宣讀如常式端益以武人獨不屈膝事定向子諲言於朝為易文資朱有聞浦陽人物記字子益刻苦為學悉通諸家書作文尚質實有理致視富貴無所屈縣令丞而下欲見之不能得同郡吕祖謙名重一時知其有守而多聞訪之逆旅中再以書速之止修報謝亦竟不行祖謙愈重之徐良能金華先民傳字彦才蘭谿人紹興五年進士厯知宿松安吉二縣其在宿松撫流亡勤勸課不以土産供餽遺前政私増俸給盡削去之吏白舊例所當得則曰此贓也爾欲以是餌我耶及為安吉賑艱食之民除水災之賦民感其恵繪像於學宫刻石以紀其政去之日衆爭致贐一無所受待次家貧至鬻産以供以薦起為御史遷給事中除龍圖閣待制以終黄中輔萬厯金華府志字槐卿義烏人紹興中秦檜和議既成日使士大夫歌頌太平之盛但有言其奸者輙捕殺之中輔作樂府題太平樓有快磨三尺劍亟斬佞臣頭之句檜聞大怒踪跡不得而止居鄉每為仇家所挾將發之㑹檜死乃免自號細髙居士名其齋曰轉拙陳黼東陽縣志字斯士少從吕東萊遊永康林大中聞其賢妻以女黼未嘗倚為重也淳熙八年登進士不汲汲進取以恬静自守林欲召為樞密院黼力辭嘉定元年大中卒乃遷國子博士著作郎凡三十年偃蹇宦途而不改其樂後丐祠歸貧無室廬僦居永康以終金式嘉靖金華縣志字元度淳熙十一年進士以右正言終在官三十年清貧如一日鞏豐狀其行謂金華之人傑倪千里兩浙名賢録字起萬東陽人七嵗能黙誦九經諸子登淳熙進士議論文墨藉甚開門授徒戸外屨滿擢御史公饋不入門退食蕭然如山居遷右正言以言事忤大臣除起居舍人兼國史編修實録檢討卒於位特贈右文殿修撰階朝奉大夫胡侁金華先民傳字子先永康人寳慶進士累官監察御史内侍董宋臣竊國柄侁屢疏劾之宋臣怙寵奪侁言職調將作少監即日棄官歸稍治田園自給泊然不復以勢利經心後累召之堅卧不起又稱雲岫先生著有孝經論語釋元王餘慶金華先民傳字叔善金華人受業許謙之門嘗逰京師有番僧官為總統者勢焰烜赫得其一言官爵可立致或以其名聞僧召之拒曰吾學將以伸正道寧有屈身而道可伸耶至正初入經筵為檢討官累拜監察御史使廣東詢問疾苦多恵政呉中東陽縣志字子善少從陳樵遊樵卒從其母獨居陋巷間家貧年三十不能娶不以介意每鼓琴自娯或把筆吟咏宋學士濓與善卒為之銘以固窮稱之明馬亷分省人物考字原清東陽人幼有志操博通經史洪武初薦授徳清丞招徠流離撫綏凋瘵甚得民心既而調丞夀陽有候卒於廢寺得埋金五十兩以進亷命簿録其數蔵於官庫後厯遷山西副使讞獄詳明民無寃滯以親老謝政詔進一階致仕卒鄭子祥金華賢達傳浦江人義門踈族也嘗為義門師塾洪武中薦授知縣守職亷平謹畏自持或賂以賄毅然曰吾為義門族可使簠簋不飭玷吾宗乎陳俊兩浙名賢録字俊民東陽人永樂乙未進士除監察御史巡按南畿劾贓吏革宿弊郡邑肅然累官應天府尹以嚴峻繩下吏有舞文者即杖殺之處同僚不阿以私嘗曰吾不能自立清流然隨波汨泥吾不為也未幾卒於官貧無以殮童俊正徳蘭谿縣志字邦英由舉人知嘉定又知趙州因内臣王振巡厯其地不肯折腰遂致仕歸民攀車泣留不得立生祠祀之歸家饔飱不繼遂撤其几以易米但以手持卷門人問曰何居曰將以辦早厨耳日夕考索經傳作書韻㑹通若干卷聊讓豫章書字公遜蘭谿人景泰進士天順中知南昌縣守禮執法不徇上官意時鎮守中官恃恩恣横有所苛取讓即納冠帶求去中官愧而留之自是不敢有加於讓胡節分省人物考字孟通浦江人天順舉人授淮安知縣為一時亷能首值外艱歸行李蕭然邑人欲贐以金堅拒不納乃建却金亭於西禪驛之渡口自恨勿克終養廬墓而卒黄傅蘭谿縣志字夢弼從章楓山逰以名節自勵𢎞治庚戌進士授江隂令稱神明三年授御史朝貴聞其風裁相戒斂避不乆以病歸病劇無資以供藥餌家人尤之傅賦詩曰病餐藜藿神猶壯餓死溪山鬼亦清所著有白露集及江隂志姜芳兩浙名賢録字實夫蘭谿人𢎞治中領鄉薦數上公車不第授廬陵教諭以名節為訓應聘校試於閩或有以私求舉者峻拒之居憂起蕭縣厯陞大理寺司務未幾逆瑾竊權流毒縉紳芳慨然以不得行其志為恨遂乞休歸蕭然一室下楗讀書微疾能自知死日具衣冠端坐而逝嘗自志其墓曰吾以媿世之好諛者李滄金華先民傳字一清永康人正徳戊辰進士授南工部主事嘗奉差督甓儀真及司龍江闗抽分亷慎有為人不敢以私干雖中官同事者亦嚴憚之公暇輙與崐山魏校永豐夏尚朴講學窮理以求檢身之方一切世味泊如也卒於官貨所乗馬乃克斂鄉人髙其風操率私錢為樹坊以表之章楓山題其額曰清修吉士姜絅萬厯金華府志字幼章蘭谿人性剛介由進士任南刑部主事嘗請除方遜志奴籍理髙介夫寃訟以議大禮與時宰不合吕涇野官武選於稠衆中問及同鄉能詩文者絅不應吕前席復詢答曰徳行本也詩文末也本之則無如之何吕改容謝之轉工部營繕司郎中剔蠹斥奸為吏卒所憾共誣搆用官物下錦衣獄尋得辨釋落職家居淡薄自守不預外事亦不以營家為念植方竹於庭自為贊曰方不就曲竹不諧俗知我罪我其惟方竹遂自號方竹著有鳳林𩔖稿經史等記若干卷朱方永康縣志字良矩正徳甲戌進士厯官雲南副使進右㕘政性誠樸言笑不妄舉進士時年三十九或勸以隱年方曰初學事君即可欺乎初令泌陽官道傍植栁歲贏千金方不取後邑人復追餽於丹陽亦弗納在淮安代守入覲諸屬邑供送行齎俱峻却守贐以履韈亦却之守書亷吏二字以贈在雲南凡八年從惟二僕一榻蕭然章适分省人物考字景南蘭谿人嘉靖進士授行人擢禮科給事中言建儲忤上㫖風節凜然未幾引疾歸家無羨儲依然一布衣也鄭宗錦浦江縣志字世章為石阡司理清介不茍取日以孝弟訓其民比歸家徒四壁無以自存為塾師以給朝夕邑令或憐其貧捐鍰以贈不受從子崇憲為清江丞清操克紹徐玭萬厯金華府志字叔明蘭谿人家素貧既舉於鄉絶不以家計為念嘉靖癸丑成進士授南刑部主事靖共厥職甫八月卒於官至無以為殯徐用光蘭谿縣志字仲孚嘉靖進士授工部主事陞員外郎督臨清甎厰中貴往來河道有肆横者每折之不可干以私厰賈給發金錢數十萬故事割贏佐公費用光一切謝絶遷郎中道病行李蕭然窰戸獻贏金為湯藥資輙指衣曰我如此衣耳何以墨汚之亟持去不數日而卒年僅三十有五著有徐工部詩集金傑湯溪縣志字世英嘉靖丙午舉人授廣西富川令居官六年一介不取時權相當路傑不事夤緣前後薦章凡八上乃擢江寧尹甫三月歸三十餘年足不履公府有肆隱通集行世胡檡分省人物考字仁甫蘭谿人由舉人厯邵武長沙建昌三府通判陞景州知州真定府同知所至亷謹練達人以法家老吏稱之致政歸讓産於兄弟至已不能自存李學道東陽縣志字汝致萬厯壬戌進士授丹陽令邑有羨金至則籍而歸之官以父憂歸貧不能具喪授徒自給在丹陽嘗雪一寃獄既歸其人以百金夀謝郤之服除拜監察御史巡視中城中涓爭治室蓄倡童牟非分利悉逐去之内相許義挾刅闌入民家取財物按治之繫諸獄諸涓聚午門俟罷朝邀而箠辱之御史大夫以下俱上疏論涓逮首惡三人杖發邊戍學道亦外調司理廬州已而擢南兵部主事進職方郎中承重歸服除補山東之青州入覲卒陸可教金華府志字敬承蘭谿人萬厯丁丑進士改庶吉士授編修尋掌誥勅使者餽遺悉郤之擢春坊諭徳為經筵講官時朝廷乆不御殿因為十二頌首列聖訓疏入上感動下罪已之詔奉命主應天試有司援故例餽金堅辭不受抵京擢祭酒陞右宗伯遭父喪哀毁卒鄭𢎞道蘭谿縣志字克修性至孝七歲遘親疾治湯藥衣不解帶萬厯甲辰成進士授徽州府司理有士人投謁門牆贄以一硯試之則紫金也立召至郤而絶之俸入不足以供日用室人歎曰為亷吏婦自甘淡泊亞旅不能宿飽奈何𢎞道巽言慰之攝郡篆餘羨數千金不入私槖為造紫陽橋利渉者感之號鄭公橋又攝休歙二邑羨贖所積幾萬金悉以葺泮宫資貧士調南雄去行李蕭然徐可期永康縣志字烜父崇禎戊辰進士初授行人奉命冊封蜀藩屏供帳省夫役蜀藩以金帛贈行堅辭不受又奉命諭祭豫藩清望益著考選福建道御史以鯁介觸忌改刑部主事時山陜宼起大臣多無辜被逮可期力為申救乙亥病卒於官同官賻之舉柩歸國朝倪懋祚四川名宦册金華人康熙庚戌進士宰犍為不名一錢致政歸民餽以贐置之江干不受而去衢州府宋王介萬厯常山縣志字中甫言之子博學善屬文慷慨負氣喜直言慶厯進士嘉祐六年䇿賢良方正直言極諫之士介取上第後以祕閣校理出知湖州休致卒於家初介與王安石遊甚欵及見其新法乖謬遂與之絶子漢之渙之沇之弟悆悆子溈之皆舉進士樊澥崇禎衢州府志字徳潤西安人元符進士徽宗欲用之以不附蔡京出守鄱陽後奉祠老於家毛抗正徳江山縣志字節之登甲科時新法行抗持論不合去終祠部郎柴天錫崇禎衢州府志江山人仕為司封郎中時蔡京當國鄭居中説往謁之天錫曰曵裙權門吾弗為也明汪益民𢎞治衢州府志開化人元季不仕洪武初詣行在獻䇿陳開國綱紀朝廷嘉納之尋召赴闕授慈利縣令守官亷介任滿乞歸上憐其貧解御袍賜之仍命有司優給衣食蔡徳政萬厯龍游縣志永樂初舉明經擢福建道御史彈劾不避權倖嘗曰張綱埋輪彼何人耶吾紳嘉靖浙江通志字叔縉開化人永樂甲申進士授庶吉士改刑部主事陞郎中文學政事為時所稱官至禮部右侍郎仕宦二十餘年蕭然如寒士胡超萬厯龍游縣志字彦超舉進士授都水主事改虞衡奉使華陽饋遺皆不取强之勉取其一出投之江人以投金名其處判通州盡剔宿蠹尋乞骸歸𢎞治初歲給米四石子授舉人呉䕫崇禎衢州府志字學夔西安人𢎞治舉人為永春教諭士有惜别頌調濰縣士有難得歌致仕家居僉憲韓邦竒夔之門生分巡三衢龍游胡癩頭以罪求釋遺數百金峻拒之嚴守喬遷亦門生治西安梁宰獄梁以二百金求囑復拒之性孝友吮母疽父喪廬墓郡守沈杰請總緝郡志汪璀開化縣志𢎞治間以貢授古田令下車誓不取一介時當路有欲横征者璀獨不奉令曰吾不能剝民脂以媚人遂托疾歸家居二十餘年絶跡城市一日有友人謁邑令借冠於璀璀取冠彈曰此冠不屈於人乆矣友悟歸其冠亦不往謁周文興分省人物考字用賓江山人正徳進士甫登第即疏歸讀書於江郎山中八年起為刑部主事厯官鴻臚卿屢起屢退前後實厯不踰二考舉朝重其恬退特越次遷之逾年致仕愛抗郡山水之勝築室清平山下與人交樂易無城府放言髙論意豁如也總督胡宗憲表其里曰髙士坊汪嘉㑹衢州府志字亨夫開化人正徳辛丑進士為刑部主事陞郎中事繼母甚孝恬退清守不茍取不兢進審録四川多所平反楊石淙以公平仁恕薦之未幾卒於家周任江山縣志字以仁幼事章楓山登進士時逆瑾用事誘以殊擢不聽乃外謫尋陞刑部郎武宗南巡陸震以直諫下獄抗疏救之後出守梧州以勞瘁卒於官陸郁崇禎衢州府志字文盛西安人歲貢生令湖口時值宸濠之亂州縣被收印篆郁佩印死守卒免郤漁船常例金秩滿啓行糧長積每歲常例二百金餽以供路費毅然却之在任八年每食蔬素人稱陸青菜後任鹽運使政聲尤著陸瓚萬厯廣東通志龍游人進士嘉靖中知雷州寛簡臨民尤勵苦節時當入覲故事有夫馬供億瓉一切罷去及所餘贖鍰皆蠲除之在官三載不擕家屬歸途行李蕭然楊希聖崇禎衢州府志字恒初西安人萬厯戊戌進士官翰林編修攻苦茹淡飯止脱粟衣皆布素奉差道經武林織匠以千金求囑怒而却之蔣士臯開化縣志字仁宇六嵗失怙事母程以孝聞任岢嵐州吏目萬厯庚戌嵗大饑委催軍餉甚迫徵急則慮民變餉遲又懼軍譁士臯請暫停徴兩月支五寨所儲馬料代餉知州難之馳告本道力請始得允軍民兩便致仕歸杜門課子家無長物翁祚龍游縣志字子長少逰呉中與張西銘楊維斗張受先諸人友篤學嗜古終老不輟家無儋石儲處之晏然不問家人生産有言及阿堵物者輙面發頳揮使去每嵗教授生徒束修外雖片楮寸管亦不妄取丙子選貢不仕國朝方輔圓開化縣志字左一順治間由監生知臨汾縣時查墾令下上官恐有隱匿催提旁午里胥欲増畝以為守令地報牘盈三千輔圓集士民謂曰奉文查隱漏非増税畝也今若此是遺爾民無窮之患且非朝廷愛養爾民之意矣聚牘焚之外艱服闋補合水令地瘠民貧鬻邸第以代逋賦民徳之忽一日心動遽乞養歸士民泣送數百里外抵家而母病已劇奉湯藥三日而歿卧柩側三載終喪杜門不出垂三十年絶不聞戸外事有福建流寓持三百金求冒墾戸應試堅拒不納事乃寢嚴州府宋陳彦才竹坡詩話字用中平陽人宣和進士居官亷靖以不附秦檜終不大用有述懐詩晦翁跋之紹興初嘗有故相寓永嘉彦才雖鄰不謁也後其人再相彦才僅注邑連江云洪璞嚴陵志字叔玉淳安人為鎮東節度推官遷卲武通判慈湖楊簡薦之朝曰守官數十年而無屋可居舉家三百指而無田可養節操方正可備獻納科未報而卒所著有省堂文集方恪嚴陵志字徳奎淳安人以春秋領鄉薦仕祕閣校理耿介自持時貴忌之乃棄官歸童堯民萬厯嚴州府志遂安人登紹熙四年進士第累官至右正言以言事忤韓侂胄罷歸俞誠一嚴陵志字則明分水人嘉定十六年進士累官南康教授兼白鹿書院山長淳祐七年遷國子監丞磨勘轉奉議郎平居喜怒不形遇事剛果不為禍福怖自奉儉約菲衣糲食破窻敗几澹如也居家蒞官内外如一著南疇集十五卷徐唐佐淳安縣志字君輔咸淳四年進士厯衢州教授至行在權院官生平力學自奮未嘗隨俗俯仰晚年居家貧甚操行峻潔為後學師表從弟夢髙字明叟學尤精粹教授衡州有菊存稿一卷明盧義嚴陵志字希正淳安人洪武進士累官刑部郎中出知建昌府以誠確愛民稱盧慈悲然寛而不縱豪强有所犯不少貸且曰今不慈悲矣秩滿民借留復任九載當遷以疾辭歸囊無餘貲吏部侍郎洪璵嘗寄以詩云袍笏賣來供國賦詩書留得當山田蓋實録也洪堪淳安縣志字子輿洪武丁丑進士授監察御史以年少辭俾冠豸暫歸候長永樂召入臺彈劾不避權要同寅有遺雙白鷴者堪却以詩曰白鷴本是山中物何事飛來到柏臺胡拱璧淳安縣志字寶之號更拙穎敏好學經史百家皆貫通大㫖恬淡閒雅不以紛華易志兄莊懿公既貴顯拱璧愈韜晦邱園足跡不履公府邑令特加禮敬終不能致家居惟讀書吟咏以孝友忠直為素履六十年不變所守縉紳咸重其品行陳道建徳縣志字霽宇事繼母以孝聞撫幼弟不欲分著盡以腴田歸之充萬厯癸巳貢授廣西遷江知縣縣界安南苗民雜處有豪苗陸轉者殺傷差胥諸司欲𠞰之道執不可乃單騎入陸村諭以順逆擒陸轉一人置之法餘衆得全安南人聞道名餽金十三條峻拒之其人已越界去道呈之撫按以其事聞有㫖令安南人前來領金以彰其亷秩滿陞王府長史致仕歸淡泊一如寒士呉希敏公舉事實字魯卿淳安縣學生崇禎中以薦授四川大寧知縣未至任而卒年十四時刲股療父疾父卒事母至孝及長兄希哲以進士官司李於粤希敏至其署越數月告歸瀕行兄贈以金希敏笑而郤之曰弟不憚數千里為省兄來非為分潤來也辭不受與人交一介不取里稱篤行君子云温州府宋王公彦萬厯温州府志字成徳永嘉人與兄公輔同登紹聖第調江夏尉元符未上書論宣仁無負於先帝司馬光無負於天下且言章惇悞國之罪與李林甫盧杞無異由是廢斥入元符黨籍紹興初褒録轉官奉祀徐履嘉靖瑞安縣志字子雲尚氣節紹興戊辰省試第一時秦檜專權力主和議朝野側目履不勝憤怒及聞檜欲以女妻之廷試對䇿指斥其奸朝臣視之愕然髙宗憫其戇直特置榜末厯刪定官國子博士終朝請郎所至有聲止齋陳傅良嘗曰吾鄉徐少初天下士也顧岡平陽縣志字次鳳紹興進士授錢塘簿時趙鼎去位秦檜擅權力主和議盡斥不附己者岡深憤歎因致書其鄉人工部侍郎蕭振極論二相邪正之黨遂不復仕徐瑄萬厯温州府志字純中定子由評事積遷朝奉大夫大理少卿濟邸獄興史彌逺囑其傅㑹殺無辜啖以美官瑄不從削秩謫道州卒端平改元詔復原官贈集英殿修撰命有司立勸忠坊於第左邱何兩浙名賢録字漢規瑞安人乾道二年進士宰連江有聲部使者交薦不自售由是浮沈州縣晚始登朝監進奏院遷太府簿時方詆道學何獨奏疏論中庸及皇極偏黨之義語意懇切慶元丁巳將有事於南郊太常缺卿丞肄儀宰相以何名聞遂攝卿行禮自受誓戒至飲福細大無違以不肯謁當路出守袁州卒夏祐江西通志永嘉人由進士嘉定八年尉上髙以亷介自持有委一斷以公未嘗通當路嘗謂人曰仕途奔兢相率成風吾竊恥之窮達有命豈可枉道求伸耶曾鼎臣永嘉縣志倜儻篤氣節許及之嘗奏以官鼎臣恥附之辭不就徐儼夫兩浙名賢録字公望平陽人淳祐辛丑廷試第一厯官館閣以忤丁大全拂衣歸里杜門不出家貧幷日而食抱膝髙吟聲出金石或勉其抑已謝過儼夫笑而不答景定中起為禮部侍郎趙時詀樂清縣志立夫子為浙西憲時道經太湖遇賈似道還京邀之引舟避去後為太府卿又數忤之遂貶融州貽書諸弟歎國柄下移冀有為以行其志遂卒明任道遜温州府志字克誠瑞安人七歲工書永樂中以奇童應薦厯官太常卿致仕居官五十餘年囊槖蕭然日以詩畫自娯與呉祚蔡鼎結清樂會倡和吟詠年餘耄耋卒有太極心性圖説歸田百詠諸書范霖温州府志字時雨樂清人宣徳丁未進士以行人使萬里外歸篋蕭然擢御史彈劾不避權貴時都御史周銓苛刻貪暴霖悉條其不法事合十三道共劾之有詔逑都御史銓心悸自經十三道譴謫霖係首議下獄擬大辟霖了無怖色㑹詔恤刑乃減死出獄陳鈍萬厯温州府志字斯鈍樂清人以孝行聞正統丙辰進士授行人厯使逺藩至朝鮮世子親餽毫無所受凡再進再却且諭以詩有天使非闗賄賂來之句朝鮮人相顧動色進吏部文選郎中遂乞休有全歸集陳宣萬厯温州府志字文徳平陽人成化辛丑進士授工部主事治徐沽頭等閘漕商兩便陞刑部郎中以同列章霆事連坐謫夷陵州其俗女耕男織信巫事鬼宣教以男耕女織崇祀祖先俗遂雅化尋陞河南知府毁滛祠十數創二程祠署後多曠地散步圃中見一僕揮鋤有聲令掘之得蔵金即白之臺臬盡以其金充邊餉晉雲南左㕘政乞休歸王朝佐平陽縣志字廷望𢎞治丙辰進士授南禮部主事遷工部員外居官清貧父卒不能葬郡人張孚敬知其賢為言於郡守徐宏賻之金始克葬所著有蛟川集東嘉先哲録鍾城萬厯温州府志字文獻瑞安人以例貢入太學授鉛山丞六年考績擢本縣尹清謹一節不畏强禦以忤權貴引疾歸林居結社賦詩以終章朝鳳萬厯温州府志字鳴仲樂清人恭毅綸曽孫嘉靖甲辰進士任刑部主事陞福建僉憲轉廣西㕘議厯官十餘年常俸之外一無所取在閩表章龜山延平諸儒及新李忠定祠謝病歸屏居山中不入城市朱廷萬厯温州府志字司理少孤力學為士林所推嘉靖乙夘舉人授藁城令亷謹自持而拊循特至及期政聲籍甚北地苦寒念母老弗克迎養中心鬰結既聞訃邑民泣留出百金以贐固却之竟哀毁卒藁人祠祀焉林宗教永嘉縣志字希道嘉靖戊午舉人任永福令遷貴陽府判尋投牒歸宦槖蕭然家徒四壁敝衣蔬食恬如也張陽春福建通志字文復永嘉人進士知尤溪以清白著出贖鍰改建學宫卒於官無以為殮趙嗣薦樂清縣志字似川萬厯丁酉舉人署夀州教諭捐俸葺學周恤貧士陞廣西太平司理崇禎元年取天下清亷第一進京時相温體仁重其名欲延見之竟不謁遂授漳州同知氷節愈勵時有尹大使以金密進責而勿受卒於官處州府宋呉畀慶元縣志熙寧癸丑進士教授峽州學士翁彦深知其名謂之曰以先生學問操行宜居太學之選以範多士奚逺處湘湖哉畀笑曰吾道其事干求耶他日出一書示彦深曰吾將以此書干丞相范公深怪其前後語不相符啓其書則以大義責范公不能用正才以興起太平徒取法度紛更之語也管師常龍泉縣志熙寧間舉逸民召試賜進士第授校書郎知江陵府監利縣事時天下方以苗役新書為政州縣上下咸趣辦師常獨置得失與察訪使抗論可否人為師常危之後去官道出安州應城無疾而逝初居白雲巖自號白雲翁有集行世孫薪蓉塘詩話麗水人字至豐元祐中以明經擢第授荆門軍教授不赴絶意仕進與黄葆光為太學舊逰宣和六年黄以侍御史出守處州薪不肯詣郡謁見黄約以勸農日㑹於洞溪僧舍至期薪以扁舟來㑹時有里胥欲賂黄而無由將因薪納之俾薪家僮導意薪叱曰無語使吾聞此便是入耳贓年八十卒周綰括蒼彚紀字彦約瑞昌人崇寧五年進士五剖符持節再領大藩為吏部侍郎以敷文閣待制致仕始終以亷節著名呉詳兩浙名賢録字守約麗水人崇寧間為蘇州教授髙簡自持不為貴勢所屈時中貴朱勔以花石綱住蘇州勢焰薰灼有司脅息奔走如屬官詳獨不屑見之及為福建路茶司提舉以亷著名入仕四十年無一椽以庇風雨子祇若登紹興進士胡升兩浙名賢録字子上麗水人博雅工文辭初任彭澤丞終湖北提舉紹興初郡將耿廷禧創譙門委譔上梁文幷記刻石畢以錢十萬酒百壺餉之辭曰升雖貧終不為一譙門所鬻閭邱昕嘉靖浙江通志字逢辰麗水人知温州時有秦檜親黨薛某為郡丞承檜密㫖俾造漆器昕不從薛怒諷秦相黜之昕嘗憤權臣專政作周易二五君臣論以排用事者平生不殖産至無宅可居郡守馬光祖建祠祀之扁曰清風程榆隆慶松陽縣志字森之九嵗能屬文既登第孤介特立恥事媕阿宰玉田真西山疏其天資靖重心術端良有古循吏風不報嘗倅鄞史彌逺挾勢干請榆却之後持廣左憲節彌逺以夙忿風言詆毁榆安命不易志官至中奉大夫謚曰安節呉淇慶元縣志嘉定甲戌進士時相欲以淇為監察御史淇以臺諌不宜出宰相薦舉抗不就職忤當道出知南劒州呉懿徳崇禎處州府志字夏卿慶元人嘉泰二年進士知玉山縣改新㑹每新令至有給繇錢受訴牒者有酷息錢一切罷去進廣州通判未及赴而卒將卒前二日書於冊曰平生薄宦每受凍餓一介不取一毫不私嘗祀晉刺史呉隠之於縣東邑人以其無愧遂配享焉潘大臨隆慶松陽縣志字舜舉嘗以兩浙運司主管文字官攝温州獲海冠釋無辜者半復以太府寺丞出𣙜真州茶鹽時丁大全使人諷之曰有羨獻即受賞大臨曰吾一錢皆籍縣官羨餘何取大全怒馳代者夜半奪印去後知廣徳軍毛蘭兩浙名賢録字君玉松陽人資性簡黙官福州司理時宰相趙汝楳之黨曰林冕者有罪下獄使人夜懐金私之蘭正色不受復賄當道者以威怵之不動卒坐冕以法汝禖聞而歎曰蘭持法如此何有廷尉乎後召蘭不果行累官二十載厯叙凡九考居最止承直郎趙崇潔縉雲縣志字敏則累官右司郎官每以人才為宰相薦理宗朝中貴盧必升等專權無一人敢言崇潔乞罷斥以肅宫府自是名振朝野居官不受私謁所至以激揚著聲明楊仲吉崇禎處州府志麗水人洪武中辟至京師上問在家何為對曰春耕夏耘秋收冬則教子讀書通義理特授崖州知州及歸惟衣被而已戴銓括蒼彚紀字文衡處州衛人由嵗貢授鹽城訓導值嵗歉當道命監賑至興化得銀九百兩縣官請分銓毅然拒之悉以賑陞益都教諭兩任皆入名宦金旅括蒼彚紀字從吉麗水人信仲子力學篤行十歲遇母疾龥天求代母病革粒食不入口者三日與兄祥弟禖自相師友以貢授雲南永昌府判慎守官常嘗承檄撫安干崖隴川酋長餽以白金良馬拒郤不受謝事歸杜門斂跡賦詩徜徉自適卒年八十八著有易意白湖詩文集周徳琳遂昌縣志字廷獻由進士厯刑部郎中亷謹平恕不阿權貴正統間清理江西刑獄多所全活陞雲南布政司㕘議時宦官金姓者要其一見以美官誘之卒不往遂乞歸金忠崇禎處州府志字尚義麗水人天順甲申進士授監察御史使車所至聞者披靡值星變疏陳三事皆人所不敢言者事侵權貴坐是中傷繫獄謫戍遼東怡然就道杜門著書有甕天稿東甌童子吟陳中州青田縣志字洛夫詔之曽孫以貢為廬江教諭復除玉山以興起人文為任往與永嘉張少師游及上銓選張令作清馥賦將薦授館職不就作詩諭意曰上馬伏波猶未老下車馮婦也堪羞人稱其氣節歸結一室依古木下自號依樹老人葉雲崇禎處州府志字民望遂昌人由嵗貢除江西建昌府推官為人砥礪名節居官亷介捐俸修曽南豐祠執法忤當道懇致仕居家甘貧有司以蔡相公廟基地遺之計直數十金辭弗受今湖山所建風池書院即其地也李鍵舊浙江通志字廷守縉雲人嘉靖丙辰進士任工部晉光禄少卿抗疏陳職守十事頓革靡濫擢南都給事以持宗藩事儀忤權要左遷守蘇州有飲呉水之謠入覲無餽遺因議官屬復忤執政遷長蘆鹺使氷蘗自持至今商人春秋祀之晉四川大㕘念親老厯䟽乞養歸卒年九十一著有賜養堂詩集李寅縉雲縣志字敬之由進士厯廣西布政誓不取一介搜應得羨餘銀一十三萬解部無私告歸行槖蕭然夀一百八嵗臨終作詩云身曾許國生無補恨不除奸死不休其志節可見矣著有晹谷空音行世葉溥畿輔通志龍泉人嘉靖五年知大名府剛介自持寡言笑人不敢干以私宴賓客魚一盂菜菓一盂酒數行輙止費不過數十錢以上隨至官惟兩童子琴書一肩而已去郡之日亦如之人呼為葉青天王一中舊浙江通志字石門麗水人萬厯丁未進士厯三邑皆以清亷著擢御史疏罷内市糾保姆客氏權璫魏忠賢巡按山東平妖寇徐鴻儒等陞京卿忠賢矯㫖削奪居家十餘載研究道徳性命之學述五經輯郡乗至老手不釋卷起光禄以不附時要調南光禄疏乞休卒所著有瑞芝堂集經書疏解東巡疏草諸書浙江通志卷一百九十一
