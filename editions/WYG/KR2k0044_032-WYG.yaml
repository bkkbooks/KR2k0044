body:
  text: 浙江通志卷三十三關梁一天官家皆以牽牛主關梁而呉越適當其次且地居水陸之衝舟車輻輳觀天象而審地利關梁之謹在所必先故月令著察禦之文王制垂火覿之戒寜得以至徳之世山無蹊遂澤無舟梁也而忽不加之意焉志關梁杭州府錢塘仁和二縣附郭錦雲橋成化杭州府志宋名六部橋元名通恵橋西湖㳺覧志東通候潮門大河之水自龍山閘入鳯山水門從南而北首過此橋安和橋成化杭州府志原名聖安寺橋州橋萬厯杭州府志舊府治在橋西因名黒橋咸淳臨安志六部橋北通江橋西湖㳺覧志本名慶元橋橋之南為過軍橋望仙橋桯史朝天門之東有橋曰望仙仰眺呉山如卓馬立顧紹興間望氣者以為有鬱葱之符秦檜専國心利之請以為賜第其東偏即檜家廟而西則一徳格天閣之故基也新宫橋成化杭州府志舊名宗陽宫橋宫在橋東西湖㳺覧志小河之水自新宫橋分泒三聖橋萬厯錢塘縣志舊有三聖廟故名佑聖觀橋萬厯杭州府志今呼為鐡佛寺橋武林梵志旁有慈光寺寺有彌勒佛以鐡鑄之俗稱鐡佛寺因以名橋府橋杭州府志原名榮府橋成化杭州府志宋榮王府在橋東因名太和橋夢粱録常慶坊東北曰太和橋俗名柴垜清泰橋成化杭州府志舊名薦橋錢塘縣志上有英濟廟以祀潮神今名清泰庵積善橋萬厯杭州府志舊有回回拜佛堂俗呼回回新橋豐樂橋明一統志在府治東四里西湖㳺覧志宋有豐樂樓酒肆其北有橘園亭宋時此地多樹橘油局橋西湖㳺覧志宋時為油蠟局成化杭州府志元名新橋恵濟橋西湖㳺覧志俗稱鹽橋宋時鹽船待𣙜于此上有廣福廟仙林橋明一統志在府治東北五里夢粱録仙林寺東登雲橋嘉靖仁和縣志新建舊名西橋宋時有平糴倉仁和縣志貢院在其北每棘闈榜發獲雋者由貢院赴布政司飲宴鼓吹導引必登此橋取登青雲之義故名西橋仁和縣志一名塌坊橋東有宋時御酒庫平安橋嘉靖仁和縣志宋時有金錫庫即銅錢局通濟橋咸淳臨安志豐儲倉後俗呼梅家橋西湖㳺覧志橋畔有真濟廟傍有臙脂橋梅東高橋仁和縣志梅東高橋北為小梅家橋白洋池橋方家橋今廢中宫橋杭州府志或作鍾公東南通新宫橋大河西湖㳺覧志通上下抱劍營本名寳劍營錢王屯軍之所又北通集慶巷熙春橋西湖㳺覧志宋有熙春樓金波橋咸淳臨安志通和坊内寳祐橋咸淳臨安志寳祐坊内杭州府志橋北有巧兒橋亨橋今廢平津橋夢粱録賢福坊東俗名貓兒橋武林紀事明正統四年杭城貓兒橋河水五色旬日方觧是嵗橋北陳綱中觧元方便橋錢塘縣志舊名平安橋南有舎人橋乆廢永清橋咸淳臨安志舎人橋北錢塘縣志俗名水巷橋芳潤橋夢粱録元名炭橋西湖㳺覧志宋時為藥市又北為書坊沿河而南為履善坊國朝康熙二十六年重修李博士橋萬厯杭州府志宋李性傳為武學博士嘗寓居此巷以修武志故名橋曰博士橋巷曰武志坊國朝康熙二十六年重修棚橋嘉靖仁和縣志因近棚心寺故名國朝康熙二十六年重修清寜橋萬厯杭州府志舊名度生橋西湖㳺覧志俗稱鵝鴨橋橋畔宋有春風樓謂之北酒庫國朝康熙二十六年重修軍頭司橋仁和縣志貢院在東院坊在西國朝康熙二十六年重修倉橋杭州府志舊名仁和倉橋嘉靖仁和縣志東有宋時豐儲倉國朝康熙二十六年重修天水橋咸淳臨安志六部架閣庫前破倉橋咸淳臨安志淳祐倉前仁和縣志舊名百萬倉橋國朝康熙二十六年重修普濟橋錢塘縣志上有華光廟今廟在平陸侍郎橋夢粱録向有侍郎郎簡居此有徳及人里巷賢之以名其橋三橋杭州府志俗呼三橋子夢粱録在韓府南曲阜橋萬厯杭州府志在河之西跨街南北西湖水由此入西河西湖㳺覧志一名溜水橋宋有韓樞宻府又軍將橋宋有茉莉園井亭橋仁和縣志以相國井得名宋煮庫在此洪福橋咸淳臨安志清和坊東嘉靖仁和縣志西有楊和王府鞔鼔橋咸淳臨安志洪福橋北西湖㳺覧志宋太學造工之初鳴鼓集飯有劉耆者山東來目雙瞽善聼聲過之問曰此何地適聞鼓聲官氣甚旺旁人以建太學語之耆曰若如此則不出宰相永無火災嘉泰中高文虎為祭酒欲為陳自強之奉遂謂鼓壊請更鞔之未㡬自强正拜因名其所曰鞔鼓橋八字橋夢粱録在十官宅前舊呼洗麩橋成化杭州府志與清湖橋成八字江學士橋仁和縣志以明學士江曉居此得名石湖橋嘉靖仁和縣志宋范成大號石湖居此一名石灰橋結縛橋西湖㳺覧志相傳宋時下瓦勾欄觀者雲集時馬光祖尹京令行禁止得遺物者縳于此以待失者故名衆樂橋夢粱録自衆安橋轉西成化杭州府志跨東西河路通南北舊名下瓦後橋衆安橋成化杭州府志南北跨大街國朝雍正九年總督臣李衛建南糧倉于駐防城内因濬西河以通轉運以舊橋過卑有礙舟楫與衆樂橋同時増築加崇徃來始便觀橋咸淳臨安志在報恩坊北成化杭州府志跨大街南北下為㫁河頭自北而西一帶為觀橋河西湖㳺覧志呉越王建題其梁曰呉越王寳正六年辛卯四月八日因建錢明觀造此石橋賈愚觀橋春水詩門前流水緑迢迢春抹鵝黄上柳條半夜雨聲渾似洗一篙新漲欲平楊貢院橋嘉靖仁和縣志元時貢院在此西湖㳺覧志俗稱濶板橋祥符橋西湖㳺覧志橋畔有祥符寺故名迴龍橋兩湖麈談潮鳴寺舊名歸徳南宋時駕幸至此聞潮聲而回今寺後有橋曰迴龍仁和縣志即小新莊橋過西落北厯敎塲師姑斜橋出武林水門清湖橋萬厯杭州府志八字橋河西跨街南北自北而西一帶名清湖河安濟橋咸淳臨安志在楊駙馬府前西杭州府志東有黒橋左藏庫橋今俱廢長生老人橋咸淳臨安志在霍使君廟前紀家橋西湖㳺覧志在按察司左元時改乗驄橋其西為西湖書院車橋嘉靖仁和縣志宋時車馬門近此長夀橋咸淳臨安志茶塲巷元名楊四姑橋仁和縣志以近長夀寺故名教塲橋仁和縣志在敎塲門東東達觀橋大街舊名大新莊橋國朝康熙二十六年重建師姑橋仁和縣志亦名獅虎橋國朝康熙二十六年重建中正橋西湖㳺覧志俗呼斜橋自此而南至正陽門為宋時御街湧金橋成化杭州府志在運司後水從西湖水口來轉運橋西湖㳺覧志俗稱渡子橋從此而南為普安橋在運司前臺後橋成化杭州府志宋御史臺後因名恵遷橋西湖㳺覧志一名金文橋其南宋有金文酒庫成化杭州府志水自湧金橋至此入三橋河宣化橋西湖㳺覧志宋時俗稱懊來橋至今仍之謂好訟者至此皆有悔心也戒子橋萬厯杭州府志舊慈幼局前流福橋夢粱録元呼閘兒橋凌雲橋成化杭州府志舊名凌家橋錢塘縣志俗稱廟橋府學路舊由此入故曰凌雲福寜橋萬厯杭州府志舊名福夀東達油車巷今入織染局轉運新橋錢塘縣志運司前又二門内有玉帶橋西通湧金池環署合流出新橋壩子橋夢粱録在艮山門東曰順應橋舊名壩子橋國朝康熙間重修新橋仁和縣志一名廣積倉橋國朝康熙間重修太平橋萬厯杭州府志在菜市橋北菜市橋杭州府志舊名慶春橋萬安橋錢塘縣志在淳佑橋北國朝康熙間重建横河第二橋萬厯錢塘縣志俗呼東横河橋横河第一橋萬厯錢塘縣志俗呼西横河橋土橋仁和縣志舊稱泥橋向逢霪雨行者裹足不前里人李茂玊創改石橋徃來稱便淳祐橋咸淳臨安志在章家橋北春熙橋西湖㳺覧志一名裝駕橋相傳宋高宗自越州渡江還臨安泊舟裝駕於此盖其時橋在城外故也土人訛為章家橋國朝康熙八年重建安樂橋杭州府志近章家橋平安第三橋萬厯杭州府志俗呼豆腐三橋平安第二橋萬厯杭州府志俗呼豆腐二橋平安第一橋杭州府志俗呼豆腐一橋豆腐亦曰鬬富諸家橋錢塘縣志一名車駕橋宋有車駕司閘橋杭州府志原名保安閘橋又有保安橋水門橋普濟橋萬厯杭州府志舊名過軍橋錢塘縣城外關梁安溪關南關𣙜事書孝女北管二啚詳見𣙜税觀音關北新關志在調露鄉詳見𣙜税錢塘縣志觀音橋在餘杭塘河岸板橋關北新關志在調露鄉詳見𣙜税萬厯杭州府志板橋去城北二十里萬厯二年僧通本重建良馬關北新關志在靈芝三都六啚詳見𣙜税良畎關北新關志在靈芝三都二啚詳見𣙜税敉粫關南關𣙜事書在城南上隅五啚詳見𣙜税美政關即美政橋南關𣙜事書在城南上隅五啚詳見𣙜税古蕩關南關𣙜事書在尉司下扇一啚錢塘縣志明洪武中建詳見𣙜税濟川橋西湖㳺覧志在抽分厰前初名欏木橋相傳錢氏偏據時旁堆欏木俗因呼之又謂普濟橋或曰因舊有普濟寺得名明正徳六年主事王光佐重建改今名跨浦橋成化杭州府志通浙江與渾水普濟二橋相連蕭公橋錢塘縣志今名慶豐關關東南有乾橋宋名銀洞橋少北進方家峪有環翠橋皆不通舟楫外横河橋咸淳臨安志便門外杭州府志今名炭橋裏横河橋咸淳臨安志便門外南杭州府志今名南新橋梁家橋西湖㳺覧志進九曲巷出青果圑諸橋西湖游覧志街通上輗路洋泮橋西湖㳺覧志有龍王廟明萬厯中建海月橋於橋南化仙橋萬厯杭州府志舊抽分木橋人多溺死里人徐原甃以石其患始免因以化仙名之水登橋錢塘縣志西通水登廟龍山上閘大橋錢塘縣志閘高江水卑不入閘晉龍橋虎跑寺志建于嶺下入山第一橋為江鄉關鎻寔本寺始歩國朝康熙六十年廵撫屠沂重建徐村大木橋通富陽驛道為徃來要衝舊係木橋國朝雍正五年總督臣李衛改建石橋萬年橋萬厯杭州府志范村南十里萬厯戊子杭守余良樞建余良樞建萬年橋記萬年橋舊名上諸去郡城三十里許濵錢塘江潮激屢圮耆民胡璋募修復舊未十年復圮予聞之乃捐俸伐石工徒並作属邑爭率錢佐費有差督幣三河孫公又大捐助並付僧如通者主之工未強半復圮于潮予大驚異曰潮日再至屢修屢圮是終不可成乎然潮波吞岸濵江不宜橋也盍徙入百餘歩相其地盖兩山之麓相峽于道若有待者為文告于馮夷移所建石改建其地始今年四月之朔日告成于秋四閲月計為工凡幾糜金凡㡬下纍趾捲石為甕高五丈有竒廣二丈餘東西長各五丈有竒規制比舊更飭頗稱堅好行人胥慶先是改建之日有敝衣道人乞食工所食既道人曰此萬年橋也道人忽不見人並異之至是橋成里人遂以萬年名橋云石函橋夢粱録錢塘尉司西水磨頭曰石函橋又呼西石頭橋神州古史考白公錢塘湖石函記設石函南筧蓄洩之法既備郭祥正白公石函橋詩開函測淺深啓閉以時均欲識白公恵堂堂勒翠珉董嗣杲石函橋詩函開函閉管年豐白傅能方夏禹功湖石記埋泥蘚裡斗門字蝕水花中犂平阡陌猶春雨船載笙歌自晩風遍倚暮䦨懐古徃月明無奈瀑聲空溜水橋成化杭州府志霍山路西西湖㳺覧志洩湖水以入下湖可通新河壩九曲昭慶橋咸淳臨安志原係小渡咸淳六年剏建廣濟橋萬厯杭州府志昭慶寺前羊坊橋成化杭州府志石函橋北西湖㳺覧志宋時滌羊之所也有酒庫瓦子在焉其西為古柳林㫁橋武林舊事又名叚家橋西湖㳺覧志本名寳祐橋自唐時呼為㫁橋張祐詩㫁家橋蘚合以孤山之路至此而㫁故名董嗣杲㫁橋詩繡轂青驄驟晩風柳絲翠裊石闌紅彩篙刺水停飛鷁華表侵雲截臥虹杖履誰歸瀛嶼去笙歌自補玉壺空重招張祜商新詠不與當時蘚合同洪烝㫁橋閒望詩閒予歩上㫁橋頭到眼無窮勝景收細柳織烟絲易滑青屏拂鳥影難留斜拖一道裙腰遶横看千尋鏡靣浮投老近來忘俗累脊懐逋客舊風流涵碧橋萬厯杭州府志孤山路中陳堯佐重修涵碧橋記兩越之郡杭為大附郭之勝又得西湖焉湖之西南地