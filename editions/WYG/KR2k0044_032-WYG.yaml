建太平橋成化杭州府志縣西三里通江潮富陽縣志明萬厯間圯邑人周吉臨重建國朝初年橋又圯僧雲臺募建榮華橋萬厯杭州府志縣西五里舊名牛家橋正統四年令呉堂重修因里有陳觀暨厥子冕聫登科第扁今名新橋咸淳臨安志在縣北十里上有亭名安仁萬厯杭州府志宋淳熙甲辰縣尉林端厚重建糜師亘新橋記去縣治十里跨溪為梁名曰新橋而敝寔甚盖自淳熙辛丑巨浸之後支撑蕩兀風摧雨剝溪湍潮汛相與蕩摩馬牛擔車睥睨而不前行客過之顧視愕眙揶揄咄嗟謂斯民宜有主張是者適嵗薦飢公私俱困無敢議此越甲辰既有秋乃克講䆒尉平陽林公寔始掾邑慨焉請任是事爰延致邑之儒先鄉貢進士元復暨縣學經諭謝邦寵醫士王善時為之謀里居之彦各捐私錢三十萬仍率其一郷之善視力多寡以序相賛成之且謂昔者純以木則燥濕不齊用不堅入鑿石北山楹梁偃負大小悉具斲長松鋭其首植土中數尺荷杵椎之二十餘尺凡八列用木㡬千章墨鋸平其本叠石其上而楹立焉謂若是可以支數百年而舊材之善者尚可移之以修他橋也經始于是年冬十月告成于明年春二月值余秩滿去林公貽書丐記因為之書富陽縣志明崇禎九年橋圯十一年邑人俞昌言重建申屠霆新橋夜泊詩樹雲低䕃石橋邉宿鳥驚飛墮露蟬隔岸有風潮未落一燈猶在拗罾船青雲橋成化杭州府志縣西十里元大徳間里人徐學録中舉題橋因名白鶴橋成化杭州府志縣東二十里世傳赤松子駕鶴于此昇仙元至正間令馮祥重修合溪橋富陽縣志在縣北二十五里開化村汪家堰千家村二水合流故名乆圯國朝康熙二十一年里人邵士莊重修洪濟橋杭州府志在縣東南四十里靈峰村元天厯中里人施岳山鑿石為橋富陽縣志元末燬于兵明洪武初施叔拳架以木永樂間僧興易以磚皆不乆而圮正統四年知縣呉堂重建以石廣一丈六尺長三倍之俞膺重建洪濟橋記漁溪之水發源既逺奔流側注湍急深險至與江㑹其勢始平距江不一里而近民居兩岸非橋莫能渡天厯中里人施岳山鑿石為橋名曰洪濟不乆而圮正統己未春縣令呉侯堂勸農臨兹見民病渉因慨嘆曰此吾責也即以建橋之事属之趙公自安侯仍捐俸為倡衆皆和之于是購匠募工先闢厥址使寛以殺水勢然後伐木架梁貫穿廽斡擇石累萬魚鱗宻次石既相貼乃除木架而橋穹然横亘于滄波之上矣是役也經始于是年之二月至九月而落成廣一丈六尺修三倍于廣之數其高則出于民居可以逺眺大江俯接景物當潮平水漲之時㠶檣來集鷗鷺下上不特洪濟于民而且為鄉之偉觀矣侯以膺熟知顛末命紀其寔以貽後人故記之𤓰橋萬厯杭州府志縣南五十五里感化村世傳孫鍾種𤓰于此廣恵橋萬厯杭州府志縣西馴雉村舊名鮆綱嵗乆圯邑士何永年重建石頭灣渡富陽縣志在縣東一百五十歩即觀山渡縣𨽻十鄉四居江北六居江南凡為津五惟是渡徃來者多初民間自渡宋紹興間中人張氏創列買撲錢足舟滿乃始離岸渡者苦之甚至覆溺進士謝安頤移書弗聼遂陳于府守韓尚書仲通為奏罷未㡬貴戚復擅之為害尤盛安頤乃叩閽投匭劄下版曹大書鏤榜永不許陳乞買撲任民私渡嘉泰中權要又請于府府宻諮訪縣令陳晃國具述始末申詳諸司其説始寢下口渡富陽縣志在縣南二百五十歩江濶五里一百二十六歩今南門沙洲是也故又名南門渡范成大下口渡詩不到江湖恰五年歙山青繞屋頭邉富春渡口閒舒目落日孤舟浪拍天浙江通志卷三十三
