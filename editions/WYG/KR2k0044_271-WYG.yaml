body:
  text: 浙江通志卷二百七十二藝文十四詩五言古桐廬道中元趙孟頫歴歴山水郡行行襟抱清兩崖束滄江扁舟此宵征卧聞灘聲壯起見渚煙横西風林木浄落日沙水明髙旻衆星出東嶺素月生舟子櫂歌發含詞感人情人情苦不逺東山有遺聲豈不懐燕居簡書趨期程優游恐不免驅馳竟何成我生悠悠者何日遂歸耕送趙虚一道士降香南海諸名山元袁桷振策峨眉巔身輕瞥飛鳥懸崖飲崩流側石穿暗篠髙騫蕩心目毎恨所歴少捧香南溟使絶足騰騕褭龍淵明玕秀恍惚百靈皦乗飈訊八公挂席招五老巖光候隂晴水氣變昬曉神君層巒倚商祭通杳眇念昔結空寂厓厂絶登眺希彼巢居子寢作止林杪鐘鳴驛吏動危坐萬籟悄餘齡水赴壑歴塊跡電掃韜精習澄觀俯矚八紘小送俞元明之官仙居縣元貢奎赤城離東南蒼巖間石扉靈槎絶塵界曉月明煙霏古稱神仙居欲往事已非林樹藏野縣空街行迹稀之子萬里役黄塵手頻揮辛苦事科舉一笑辭布衣我公得兹地扁舟愜南歸訟簡民俗淳官清吏仍饑荒庭齧痩馬鉤簾燕交飛健筆凌青雲江梅素英蜚性静恒自安謬辭速羣譏士生亦樂道矧以友道㣲持罇贈逺别矢心諒無違題汪華玉所藏蘭亭圖元虞集衡茅負晴旭有客至我門共披㑹稽圖山水盛繽紛衆賢坐水次飛觴汎沄沄夷曠各有趣髙閑知右軍幽情付後覽陳迹感前欣悠悠千載來不異更旦昬探穴問神禹望海悲秦君逝者皆如斯生死固奚云所以鼓瑟人思從童冠羣春服沂新浴歸歟聊永言撫卷不知老遐思在兹文東南極積水日暮多浮雲晚泊釣臺下元黄溍四山環一水遺臺故㠝岏那無漁樵居政復不敢安舍舟衝㣲雨憑軒俯青灣念昔乗興來無從寄游觀今我有行役乃爾容躋攀山靈豈愛我為解塵土顔落日薦蘋藻清風聞珮環幽尋不可極林暝吾當還却去望層碧孤舟生晚寒陳孝子詩元黄溍南仲杭陳氏斗龍父所名家臨百丈溪父書傳考亭夫亦人之子胡獨以孝稱維仲適母盛王實生寜馨盛謂我已出無殊祝螟蛉仲父諱弗言王卒不自明睠然舍之去呱呱聞泣聲年運日已往頭角稍峥嶸籲天乞隕滅願以益父齡父沒盛亦亡弔影傷孤煢或乃告之故曰汝王所生王居清湖上去此無十程時仲新捧檄精廬擬横經悲號棄其官肩輿親奉迎安知世代易人非餘故城鄰有鶴髪嫗叩之久始譍言我與汝母少小俱娉婷汝母生汝歸去作江東行不知今在無我老猶零仃仲也聞益悲贏糧事晨征六年困逆旅冷雨啼青燈譬彼無母雛投林輒哀鳴永豐有施氏大屋深重扃于焉得母處一夕相合并母子更抱持淚如九河傾三日負母還盜賊方搶攘倉皇與之遇白刃紛交横頓首前致辭覼縷陳衷誠能令激髙義相戒勿敢驚仲昔以至行上天降休禎靈雁既羣集嘉𤓰復冬榮區區彼蝱蟁豈遂無人情聖人語純孝厥有閔與曽未聞樹竒莭謡頌傳轟轟此道古或稀此事今可徴我歌雖云俚庶感蚩蚩氓赤城元黄溍雞鳴秣吾馬晚飯山中行何以慰旅懐赤城有嘉名灘長石齒齒樹細風泠泠時見巖壁間粲若丹砂明溫泉發其陽撝訶勤百靈前峰指金閣真境標珠庭白道人跡稀青厓雲氣生信美無少留緬焉起深情曉行湖上元黄溍曉行重湖上旭日青林半霧露寒未除鳬鷖静初散夤縁際餘景閃倐多遺玩㑹心乍有得撫已還成歎夙予丹霞約久兹芳洲畔獨往願易違離居嵗方換沙暄芷芽動春逺川華亂存期乃寂寞取適豈爛漫小隠倘見招漁樵共昬旦金華北山紀逰八首元黄溍偶為山中逰逺過雲闗宿蒼燈閃初夜雨氣蒸深屋時聞清梵音窈窕松林曲靈源迢迢上方界水木翳清景山深不可留日暮衣裳冷凄其懐昔逰百嵗嗟俄頃草堂仙山髙不極萬古積蒼翠清興薄暮移遺跡洞天祕巖阿春寂寥羣仙勿予遲三洞披榛度空荒突兀崖寺古幽花雜紅白老屋亞雲雨前瞻石徑㣲咫尺不得取鹿田下山復上山躡屩行沮洳宿雲冒長嶺旭日映髙樹山僧亦何為獨向城闉去寳峰潘公古逹人陳迹閟邱壑草生春晝長鳥啼巖花落神交千載上未敢付㝠漠潛岳行行指木末路逐飛雲上時登巨石憇共聴春泉響尋源竟莫窮即事成幽賞山橋暮投招提境明發首歸路舉頭望山椒遥認經行處重重巖壑間蒼然正煙霧寳石送楊學正歸餘姚元黄溍舜江吾舊逰風物殊不惡江水天際來宛宛帶郊郭雲帆渺沙溆翠嶂森樓閣别離不可念此日忽已昨想見春水生烟栁仍濯濯君胡久去此三徑獨盤礴空齋耿燈火月冷潮聲落近聞故人書逺致江上作白駒幸無遐淮陽詎云薄招邀忻良㑹綠酒春可酌采芹有遺萹風雩多新樂因君訊同志何用慰離索逰西山同項可立宿靈隠西菴元黄溍薄逰厭人境振䇿窮幽獨理公所開鑿遺跡在巖􅅢秋杪霜葉丹石面寒泉淥仰窺條上猿攀蘿去相逐物情一何適人事有覊束却過猊峰廽遥望松林曲前山夜來雨濕雲漲崖谷縹緲辨朱甍禪房帶修竹故人丹邱彦抱被能獨宿名萹聊一詠異書欣共讀蹉跎未聞道黽勉尚干禄夙有邱壑期吾居幾時卜同陳太傅諸公同登六和塔元白珽龍山古化城浮屠峙其巔開殿生妙香金碧森貝筵應真儼若生倒飛青金蓮頭陀紺林叢導我丹梯縁初猶藉佛日閟境儵已元囬頭失誰何呌嘯衣相牽且復忍須臾當見快意天嬌兒詫先登網戸相鈎連炯若蟻在珠九曲隨盤旋爛爛滄海開落落雲氣懸羣峰可俯拾背閲黄鶴鶱竒觀興懦夫便欲凌飛仙絶頂按坤維始見南紀偏神京渺何許王氣須停躔舟車集百蠻島嶼通人烟一為帝王州氣壓三大千剛風灑毛髪鐸語空蟬聯紅紅杏花園媿乏慈恩萹龍吟軒元吾丘衍四山若龍盤精廬剡溪曲中有不蟄龍長吟破幽緑道人宴坐起拂袖窗牖開手持碧琅玕聴此風雨來飛來峰元陳孚寒峰插天出玲瓏萬菡萏㣲風起松際歸石勢摇撼上有百尺松幽花綴紅糝野猿忽躍去滴下露千㸃囬首冷泉亭天鏡光㶑㶑㳺姬長眉青嬌童兩髦髧平生山水癖如人嗜昌歜對此一壺酒玉色翻醉臉路逢老祝髪絳袍金光閃兹山信自佳恨為緇塵染置之且復醉天竺鼓紞紞小石塘源源深逺㡬百里屬嚴之建徳婺之浦江民俗淳古元于石萬山鬰囬合羣木尤老蒼細路百盤折﨑嶇陟羊腸凉隂覆峭壁縈廽澗流長縁蘿下百尺笑挹清泉香甘寒試一潄齒頰凝冰霜拂石坐未去樵叟來我旁云此澗中水其源來浦陽浦陽婺屬邑亦我父母邦欲我飲此水而不忘故鄉叟言起予意振衣欲飛揚便将隨水源徑度千仞岡叟前挽我衣遲留且勿忙吾家隔前坡林居媿荒凉寒醅旋可壓為子炊黄梁微徑行犖确柴門隠松篁推戸拂塵席延我入中堂呼兒出長揖濶歩何蹡踉問我從何來驚顧走欲僵屢呼不復出自起致茶湯坐不分賔主髙談到羲皇炊煙淡茅屋勸我飲盡觴葫蘆爛鵝鴨盤飣羅芥薑一飽共酣寢此樂殊未央攝衣起謝叟聴我歌慨慷風埃暗宇縣幾人失耕桑而此源中民熙然獨徜徉數家聮聚落茅茨帶林塘笑語聲相聞隔籬燈火光翁嫗各垂白童穉紛成行嫁女必近鄰生男不行商死徙無出境耕織各有常地罏老瓦盆竹几素木牀俗淳氣亦古豈識時世粧瓜瓠滿籬落麻苧翳門墻缺竇出雞犬平坡散牛羊豚蹄一盂酒神休答豐穰村謳雜社鼓醉舞衣淋浪晝無悍吏苦夜無羣盜狂生者遂所養死者得所藏其樂有如此宜與世相忘叟前從致詞為子言其詳使我居華屋綺疏交洞房使我服鮮麗翠襦繡羅裳食必具水陸飲必酣瓊漿出則盛車騎錦韉紫逰韁歸則擁歌吹粉黛環姬姜貴封侯萬戸富儲粟千倉如此豈不樂患至難預防利者禍之的何地非戰塲況有吏椎剥寜免盜陸梁安貧即樂土多財必遺殃人生守常分世事胡可量我聞重歎息臨風幾徬徨林霏掩蒼翠囬首路杳茫逺山銜落日慘慘塵沙黄因思桃源中人多壽而康山深事簡寡居安俗淳良不與外人接别在天一方世以為神仙此説誠荒唐平生志逺逰恨不窮八荒去家百里近異境見未嘗邈與桃源居異世遥相望安知千載下以我非漁郎獨恨無桃花夾岸摇紅芳花落春水漲一葦或可航次韻鑑中八詠元于石青山削芙蓉上有浮雲生窈窕俯長流逶迤帶重城朝光散霞彩暮色涵空青鴟夷去不囬遺爾千古名種山蓬萊失左股負以垂天翼中有仙人居珠宫燦瑶席凝雲不飛去化作輪囷石彈琴坐石上長憶三山客三山㑹稽山水國崇山幽事多當時觴詠處春浄花顔酡磊落黄金罍玲瓏白玉珂行樂須及時美人在邱阿崇山梅山如積翠的皪手堪捧遥遥仙人尉盤盤故時隴丹泉清可鑑石乳甘於湩行將解塵纓于焉蹈髙踵梅山我愛鑑湖水明如照膽銅澄清若有待渾濁那能䝉當時賀知章富貴如苓通豈無一畝地來築仙人宫鑑湖驅車曉行邁行行出郊郭斷岡屹崇墉虚籟殷靈壑雨深瑶草長風定松花落西山有爽氣逍遥倚晴閣古城樓居本髙明況在松竹間溪流深㡬尺新雨過前山浮雲多變態好鳥亦間闗偃蹇樓中人對酒還開顔縹白樓視心如蓮花浄明涵十虚出泥本無垢露體皆真如大千入一息晏坐忘百須陶公雖飲酒時能到林廬芬陀室蘭亭元韓性昔人蓺芳蘭遺跡越溪上風流晉諸賢好竒極尋訪坐令後來人弔古更惆悵憶昔初來逰精廬適新剏俯三十年故交獨青嶂今晨天氣佳煙堤繫輕舫相携得良朋舉酒互酬倡散策依晴林沿洄俯新漲地偏塵易遣慮淡情自暢囬首昔時逰樂事終不忘誰謂古人逺千載欣一餉彭殤端齊軌蒙莊諒非妄徑山五峰五首元釋祖銘天勢下凌霄坐使萬壑趨元氣結巒岫獻此大寳珠翊殿䕶釋梵鼓鐘殷人區堆珠峰五髻生雲雨鎮踞何舂容具此大人相題為大人峰偉哉天地間萬象同擴充大人峰峰勢來大鵬鼓此垂天翼培風本無待適兹造化力何須問天池在在六月息鵬摶峰杉松太古色不别春與冬道人此宴坐一念萬劫融不持座燈王等了諸法空宴坐峰二儀開幽漠日月臨下土萬物麗髙明此峰正當午堂堂大聖人兩眼空寰宇朝陽峰送林彦清歸永嘉元柯九思雁蕩接銀漢翠湧生髙寒芙蓉散秋景飛落秋雲端我昔造絶頂天濶路漫漫遥瞻廣寒殿素娥正憑䦨白兔𢷬月魄指顧成神丹因招宋成公吹簫乗紫鸞俯視九萬里元氣清團團别來知幾時弱水如平灘忽遇雁山客霞珮青蓮冠還入雁山去玊髓供晨餐報我舊逰者久待凌烟巒吾患為有身南望空長嘆送黄中玉之慶元市舶元張翥昔我逰四明壯觀真海波褰裳寳山頂曙色寒嵯峨日輪鎔生金湧出萬丈渦雲氣忽破碎朱光相盪摩決眥蓬萊宫携手扶桑柯羣仙迎我笑佩羽紛傞傞颶風歘驚潮騰擲鱷與鼉浮槎徑可擥從此超天河精神動百靈上下煩撝訶歸來已十載逺夢時一過君家賢父兄儒術傳世科薄言捧省檄舶署聊婆娑是邦控島夷走集聚商舸珠香雜犀象稅入何其多權衡較低昂心計寜有訛資閲須歴試壯圖詎蹉跎維君官事隙為訪巖之阿懸應仙者徒徃徃嘯且歌遐征渺不見空響遥相和因聲兩黄鵠持我紫玉珂豈無滄洲興奈此塵劫何天台林氏山齋瀑布泉元貢師泰飛龍上青天忽聼山石裂怒驅萬壑雷散作半空雪脫巾弄潺湲展布映澄澈毛髮為森立盡洗人間熱浩歌下山去日莫風烈烈浦陽舊有明月泉久而不應今乃疏導其源似頗與弦望晦朔之間相為消長者遂作是詩元呉萊天區何渾淪元氣乃潛洩忽然為山水無徃不融結遥天偶一照厚地空餘冽盈將光共生涸與魄同滅元機自消長至理誰圓缺發揮雖有在窺測尚未決枯查曾幾棲斷洑遽中裂半倚嵐翠雲㣲通海潮雪昔人來推求于此得表蕝虚亭奚其敞静甃獨不齧嵗年竟悠逺沙石漸填咽寜加疏瀹功肯使見聞䙝恍疑合圖經環坐列稚耋倘非蟹投碕幾𩔖鮒處轍纖纖浮晶彩湛湛浸寥泬舊觀方爾還真源可吾􅓟争言彼月行豈為兹泉設蕭邱胡長寒漢井或再熱逝尋白兎公直探神龍穴狂歌水仙詞擊碎如意鐵次定海候濤山元呉萊悲歌忽無奈天海何渺茫放舟桃花渡囬首不可量南條山斷脈北界水畫疆居然清泠淵枕彼黄茅岡朝滲日星黑夜凄金碧光蹲虎巖倚伏鬭雞石乖張磨礲越湛盧盪汨呉餘皇幽波視若鏡巨壑深扶桑招徠或外域貿易叢兹鄉嗢咿燕國語傎倒龍文裳方物抽所寳水犀警非常驅鰌作旗幟駕鼇為橋梁似予萬里眼徙倚千尺檣稍疑性命輕終覺意氣强寄言漆園叟此予直望洋便擬學仙子被髮窮大荒夕泛海東尋梅岑山觀音大士洞遂登盤陀石望日出處及東霍山回過翁浦問徐偃王舊城八首元呉萊山月出天未水風生晚寒扁舟劃然徃萬頃相渺漫星河白摇撼島嶼青屈盤逺應壺嶠接深已雲夢吞蟠木繫余纜扶桑纓我冠寸心役兩目少試鯨魚竿起尋千歩沙穹石塞行路怒濤所摐擊徒以頑險故卓哉梅子真與世良不遇上書空雪衣燒藥乃煙樹元螭時側行縞鶴一廻顧從之招羨門滄海晝多霧茫茫瀛海間海岸此孤絶飛泉亂垂纓險峒森削鐵天香固遥聞梵相俄一瞥魚龍互圍繞仙鬼驚變滅舟航來旅游鐘磬聚禪恱笑撚小白花秋潮落如雪長嘯山石裂我今在東溟逰目出窮徼搴衣窮絶陘竒氛抱珥赤逺影摩空青想像暘谷水徘徊燭龍形晨昏相經絡稚耋不得寜豈若柯斧爛看棊了千齡遥觀杳無極宛與東霍鄰悲夫童男女去作魚鼈民紵嶼尚餘聚蓬山寜爾神古棹苔駐迹仙枰竹驅塵短褐徒為拂飛槎邈難親好攜支機石去躍織女津笑揮百川流東赴無底壑青天分極邉白浪屹為郭卉裳或時采椎髻亦不惡投珠鮫人泣淬劒龍子愕海宫眩鱗纕商舶豐貝錯何不呼巨鵬因風泝寥廓老篙廻我舟沙嶴晚烟起蒼茫魚鹽塲寂歴鼓吹里人民悲舊土嵗月祀遺址終捐玉几研不捄朱弓矢東西八駿馬今古萬螻蟻此事如或然須湔會稽水我行半天下始到東海隅水落嶕石出中飛兩鵜鶘情知瓌竒産勢與險阻俱浮海豈必陋雖聖猶乗桴吭風丹穴鳳尾雨青丘狐幸隨任公子不愧七尺軀還舍後人來問海上事詩以荅之元呉萊去家纔五旬恍若度一嵗豈不道路艱周流東海㵝故人喜我返來問海何如所經何城邑相去幾里餘我言始戒途尚在越西鄙隨波到句章滿目但積水人云古翁洲遥隔水中央一夜三百里猛風吹倒檣初從蛟門入極是險與惡白浪髙於山神龍䀜以躍似雪復非雪倚檣欲上看舟子禁不可使入舟中蟠尋常重性命今特𩔖兒戲信哉昌黎言有海無天地掀掀終逹岸鹽鹵間黄蘆人煙寄島嶼官府猶丘墟水旅紛異嗜魚蠏及螊􅒹我寜不忍餐抹蘚相吐沫荒塵棲予髮旭日照我身似聞六國港東厭扶桑津或稱列仙居去此亦不逺蟠木秋更花蓬萊闢真館我非不願往此險何可當天呉布牙爪出没黑水洋千竒豈易得似足值一死方去徒自驚既歸亦云喜珍重故人言勿以險為竒兹行已僥倖慎勿疾平夷雖然此異鄉固是難久客聖出風且恬時清海如席我猶愛其然恨不少淹留爾母為我懼遭此千丈虬試看塵世間甚彼大瀛海衣裳日沈溺篙艣相奔潰奔潰孰能救沈溺將奈何口呿舌不下聊為故人歌金華觀分得琴字元呉師道春宴踐宿期雲間陟髙岑獲從勝友俱遂此物外心月窟探萬仞臨淵測重隂盤坐白石臺長嘯青櫟林暮探虚皇居急雨含蕭森松風飛淙合終夜凄笙琴何能發孤咏千載同遺音過常山趙忠簡公墓元呉師道客行常山道溪駛波沄沄􅑴流睇崇岡問是丞相墳舍舟歩榛翳隧道不復分石麟已零落宰樹何披紛其傍曽元居混迹隨耕耘亦有顯仕者逺去忘榆枌長吏𩔖俗流但識期㑹勤葺治禁樵采此事今無聞堂堂中興烈中正而徳文禍胎偃月姦寃魄炎海氛凄涼槥車還倉卒書疏焚誰知尉職卑乃能杜使君蒼天佑賢俊㣲爾幾空羣興懐慨前事空山黯愁雲咸陽骨安在唾罵奚足云騎箕儼天上千載彌清芬九日偕友登東巖定香寺元周權兹巖何穹窿迥出塵壤隘當時補天餘偶墮靈鼇背神丁挾竒功塞此滄溟滙翠濤化千峰尚作掀舞態色連空宇髙氣薄坤輿大紺廬切層雲粲然金銀界猶封開闢土迂曠無斬薙至今絶頂泉下迸萬丈内隂陽互轇轕造化自根蔕崖壁鑿靈境洞壑橐寒籟旁開一罅峽天影落青黛隂嵐灑晴雪夏練結幽晦石門聳峩峩屹若劒門勢在昔乾符間緑林肆凶厲託兹保遺黎殘石猶紀載憑髙逹遐觀訪古起餘嘅盪胸㵼河漢散髮沐沆瀣煩襟忽如遺舉歩寄一快携朋作重九秋髙崖菊細濁醪豔華觴浩唱發雄邁反身下天磴百盤經險怪目眩神蕭森冷風蕩歸袂人生諒逍遥嵗月豈予貸吁嗟謝公屐去此遺勝槩囬首山蒼蒼夕鐘渺雲際華盖山元許謙羣山如斗形華盖氣獨壯奮身地勢髙極目天宇曠周廻萬象澄一一來獻狀中江漾孤嶼瀕海横疊嶂樓臺市中居棋列相背向烈風攪蒼林落日鳴白浪蜃氣薄浮雲溟濛杳東望長濠浸寒水短楫起漁唱同遊豈特達竟爾忘得喪山下出䝉泉夷坐待清漲一掬襟懐空自謂羲皇上蘭亭元余闕奉節過東鄙總轡臨越墟覽此崇山阿亭樹猶晉餘陽林積珍木禊館疏鏤渠微風旋輕瀨委宛寫成書秋秒霜露滋清商滿縣隅紅蓮凋綺蘂㣲瀾見躍魚藉芳泛羽觴㫝聴良有娯逍遥大化内豈必三月初過馮公嶺元陳髙絶壁倚霄漢千峰勢如馳何年五丁士鑿石連天梯縈紆不可上髣髴登峨嵋白石齒我足霜風吹我衣前途政迢遞我已筋力疲寒花道旁開幽鳥林間啼彷徨俯自慰少憇日已西浮生浪奔走困踣胡爾為他年履坦道慎弗忘嶮巇發嵊縣元陳髙行役苦晝熱戒程當夜䦨睡覺呼僕夫出門終漫漫明月照人影踈星挂樹間流螢㸃衣袂零露濕巾冠朝逺剡溪水俄入新昌山屬兹干戈際愈覺行路難愧無經世資何以濟險艱悒悒抱逺思綿綿起憂端東風忽已白林島鳴間闗前瞻石嶺峻喟然發長嘆公署望鳳凰山元陳基秋氣日以佳㣲雲不成雨青山天際來與我為賔主飛龍及舞鳳突兀在庭戸須臾霧靄収草樹粲堪數謇予麋鹿姿詎意嬰圭組蹙縮非天真驅馳漫塵土偶坐無喧晴容湛空宇欲去復踟蹰此意誰當與六客亭分題送趙季文知事湖州元楊維楨秋水城下碧秋山城上青水晶出宫闕雲氣列車軿風流五馬貴六客聮華星美酒來東林朱果取洞庭竒畫掃寒蕩妍辭約浮萍焉知後不繼髙堂葺殘扃送子河風道賔鴻集修翎官奴重秉燭泚筆懐蘇亭汎舟黄顙湖望梅山元張憲汎舟黄顙湖望見梅仙山嵯峨結寳髻皛淼浮銀灣長風蕩青蘋雪浪相飛翻魚龍現怪誕水怒山自閒詎知神靈意杳在虚無間􅃡思學仙尉一去何時還幽姿不可見髙風邈難攀落日動簫鼓把酒酬潺湲望江郎石元王逢仲春天氣佳萬象欣改色我行六峰外遥見江南石二儀闢混沌牽牛委晶魄鼎列台輔姿玉藴圭璋徳三神浮瀛海噴薄東一極巨鼇因戴之仙宫晃金碧斯連厚坤軸乃棄姑蔑域直上青蓮花或隕樵舍側安知非異境自與三神敵於時攬深秀雲霧忽巾冪㣲風稍飄颻空翠疑亂滴雜英敷陽豔嘉木生午寂交交黄鳥音好在千丈壁二年思晤對百里今咫尺煙波動落照道路隂已夕尚戀女媧功躊躇望西北王節婦詩元髙明清清慈溪水蘋藻被涯涘昔年修婦職采擷薦明祀殷勤執豆籩齋肅事君子一朝雙鴛鴦别離隔生死死者無還期生者當同歸奈何姑嫜老重以膝下児升堂奉甘脆篝燈訓書詩庶以未亡人慰彼泉下思溪水波可竭妾身不改節溪水有停汚妾心但明潔熒熒瑶臺鏡𤣥髪今已雪孤鸞雖不舞寒影自澄澈溪水常流東餘波總相從結髪為夫婦永别何由逢青山有元寂百嵗須當同願言合歡樹化作壠上松蔦蘿更纏綿相依無終窮自衢州至蘭溪明劉基秋郊歛㣲雨霽色澄人心振䇿率廣路逍遥散煩襟疎煙帶平原薄雲去髙岑湛湛水凝碧離離稻垂金薺麥霜始秀元蟬寒更吟幽懐耿虚寂好景自相尋心契清川流目玩嘉樹林歌傳滄浪調曲繼白雪音仙山在咫尺早晚期登臨楊貞婦王氏詩明貝瓊王静安天台金沙里女年十七歸同邑楊伯瑞伯瑞為樞宻院斷事官未幾死於兵静安守節權貴争求之斷髮自剄余讀其傳而悲之為賦四章石上有琅玕孤生何猗猗婉彼深閨秀笑語閒且儀榮華諒未晚芳潔常自持玉鏡一朝委相求豈無媒冰泮當時歸遥峰翠新拂行行别父母遂居君子室君子官已崇新歡鼓琴瑟如何事前驅中道永相失東家有宋玉西家有王昌皆知慕明豔詎忍隳大綱露多焉能汚江永不可方貞心耀白日峻節厲秋霜泣淚欲成河捐軀遂如墓寜仝陌上花誓比山頭樹織綺獻秋功條桑事春務向非厄强暴豈知今日固剡溪九曲明陳秀民欲知溪流長百轉來越嶠舟行安能極嵐路入斜照清景不足娯昔人豈辭詔石硯久誰磨空林閉遺廟殿中初未仕髙莭振衰謝讀書在兹丘蕭然竹間舍王來有涂言留宿山水夜誰云南陽翁獨枉將軍駕山折水暫旋山開水仍往東陂滙初成秋色瀰然廣碧蘿花茸茸月映石壁上何時試􅆓洄一理煙中舫宻篠覆碕岸石穴黝而深居人負薪歸駐聼風水音回看蓮花峰靄靄生夕隂不有僧鐘來髙路誰能尋石洞篝火入石室敷床居白雲開層巔上有丹霞書神仙不逺人但使粗穢除何必瀛洲外茫茫問飈車危梁渡清瀨逶迤入前渚犬鳴樹蒙籠煙景時虚聚雨中耕叟歌月下歸人語欲尋仙尉踪凄凉一茅宇清暉汎悠悠東與班溪合菱葉間荷花風來秋颯颯久行愁寂寞忽有人煙雜我欲發櫂謳漁郎肯相答俗駕不可到有地㠗中小廻廻别澗通宛宛連岡繞人家陵谷暗不見旭光曉東作起炊藜惟應候啼鳥入江水稍決霜降未可渉頗聞往來人出門即舟楫前飛驚鷺逺下飲垂猱㨗何處問興公風吹赤棠葉夜抵江上候船至曉始行明髙啟夜辭西陵館霜谷呌猿歇津卒未具舟天險不可越漁啇雜候渡寒立沙上月蒼烟隠遥汀益覺潮漲濶開橈散驚鳬海色曙初發曨曨前山來稍稍後嶺没中流聞鼓角隔岸見城闕客路得竒觀臨風悶俱豁宿湯氏江樓夜起觀潮明髙啟舟師夜驚呼隔浦亂燈集潮聲若萬騎怒奪海門入初來聴猶逺忽過睇無及震摇髙山動噴灑明月濕霜風助翻江蛟龍苦難蟄應知隂陽氣來往此呼吸登樓覺神壯憑險方迥立何處望靈旂煙中去波急早過南湖明髙啟湖黑月未出蒹葭露凄凄榜人識浦溆不畏荒煙迷殘夢詎可續舟摇櫓聲齊開篷望天邉斗柄插水低津遥未見樹邨近纔聞雞自嗟逺逰人中宵走東西不如沙頭雁宛頸猶安棲春初逰戴山明張羽雲羅横四海田野無遺英尚賴二三子共怡山水情煦煦新陽動寥寥天宇清昔人稱四美兹晨遂成并前登髙邱阻遥睇澄湖明憑林招逺風松檜自成聲俛仰天地間㣲軀良不輕安能自覊束坐使衆累縈處賤足為貴抱素詎非榮逍遥解神慮庶以適吾生白蘋洲明張羽層城鬰迢迢長溪貫雙流喧然闠闤中乃有白蘋洲兹晨杖䇿往秀色散我憂窅渺蛟龍窟澄明鷗鷺秋開花照白日接葉暗漁舟涼風起其末客衣薄颼飀我欲擕童稚具此雙釣鈎髙歌緑水曲散髮洲上頭安能隨世人負我平生逰尹明府呉越兩山亭明徐賁長江接海門一水限呉越兩山鬰相對峰巒各羅列勁勢争吐吞蒸嵐互出没尹君好逰觀結亭山水窟䦨干出層顛細路縈百折崩石絡垂藤老樹著棲鶻平生登臨興盡為山水發不知嘗膽人此地㡬征伐至今兩山雲來往似奔突嗟予歴江海所歴多竒絶何當上斯亭長歌弔遺烈張氏白石山房詩明詹同浦江有名山白石如積雪玉氣亘中天龍湫無六月於兹隠君子結屋依翠㣲讀書日平樹看泉風滿衣誰謂野鶴姿從心自飲啄一落樊籠間清夢繞巖壑豈不念白石好煉五色紋獻之補天手歸卧山中雲白野太守游賀監故居得水字明錢宰崇岡散新陽寒日舒短晷晴飈一披拂波影上沙尾意行遂忘疲情語相慰喜賜宅知己非歸舟更誰艤樹暗山始夕川明月初起停杯成嘅歎覔句聊徙倚前林樵唱來驚鴻下寒水題呉山伍子胥廟明解縉朝驅下越坂夕飯當呉門停車弔古跡靄靄林煙昏青山海上來勢若游龍奔星臨斗牛域氣與東南吞九折排怒濤壯哉天地根落日見海色長風捲浮雲山椒載遺祠興廢今猶存香殘弔木客樹古啼清猿我來久沈抱重此英烈魂吁嗟屬鏤鋒置爾國士寃峩峩姑蘇臺荆棘曉露繁深宫麋鹿逰此事誰能論因之毛髮竪落葉秋紛紛望南屏山明藍仁游目南屏山逍遥税塵鞅清溪亂流渉疊巘縁雲上輝輝瀑泉落隠隠天籟響荒途理通塞虚室静宏敞中有餐霞人長聆御風想不乗緱嶺寉還顧漁郎舫芝草甘若飴雕胡大盈掌雖為頺齡駐亦忌流光往永懐山中逰觀化歴清賞發雙溪明李曅峩峩金華城行李何淹留閏十月初吉始能具扁舟輝輝晴旭升莽莽寒烟収篙師戒晨發浩嘯當中流揮手謝送者此行實夷猶昔為山林居今作江海游撫心媿麋鹿放迹同鳬鷗丈夫既許國生理焉得謀功成纔拂衣庶以追前修錦屏明陳約赤城多竒峰錦屏亦殊勝不知何仙人遺蹟在幽徑松霏灑石床竹雪墮風磴徘徊對巖花忽送一聲磬始得東洞遂改為陽明小洞天明王守仁童僕自相語洞居頗不惡人力免結搆天巧謝雕鑿清泉傍厨下翠霧還成幕我軰日嬉偃主人自愉樂雖無棨㦸榮且逺塵囂聒但恐霜雪凝雲深衣絮薄我聞莞爾笑周慮愧爾言上古處巢窟抔飲皆汙樽沍極陽内伏石穴多冬暄豹隠文始澤龍蟄身乃存豈無數尺榱輕裘吾不温邈矣簞瓢子此心期與論秋夜同紫峽逸士雪江老僧軰十人宿南屏山中分韻賦詩余得夕字明孫一元荒翠散不収殘山帶遥碧林鵶晚依依草雉時嗝嗝斜光明不定居人掩荆柵朅來喜盍簪林下語幽賾厓屋燈火青野蔬旋新摘豈無伏虎禪亦有飛鳬客愛此小崑邱人世白雲隔願當抱竒幽炯言永終夕發郡城之天台道中述所經覽明皇甫涍夕夢層城阿曉行蒼波上縈溪復含流連岑時隠嶂風湍信千轉雲峰非一狀錦繢紛迎翫氤氲忽彌望蘭泉芬可掬苔壁險難傍思偕同懐子擕手追禽尚桐巖曉發明皇甫涍厲澗越南岑拂霧趨東土宿處惟蒼烟遥天徑如縷林光曙鳥散海氣黄雲聚憫勞感婦嘆摇摇涉春雨遊天竺寺有懐謝康樂明李奎秋光淡巖岫入谷聞晨鐘白雲嵌紫芝峰朶開芙蓉林香晝自結夾道羅長松沙廣草煙薄溪深花露濃梵嶺鬰飛鷲咒潭降毒龍閒禽互交語道侣時相從久矣悟空寂齋心禮金容精廬隠暮色蔬食修珍供還憇崖亭上永懐髙人蹤過臯亭龍居灣宿永慶禪院同一濓澄心恒可諸上人歩月二首明李流芳歸裝出西湖間道向黄鶴黄鶴峯為臯亭最髙處屢愆桐塢期偶遂龍居諾桐塢為慧文法師結廬處在臯亭之西輕舟凌晨風遥山滿晴郭丹林尚可數寒條紛無托披松指㣲徑聴水捫暗壑新搆争逺勢平臺攬摇落霜餘山容淺天清海氣薄暫歇塵勞心始信寂滅樂天台山中明呉鼎芳白雲伴衾宿開户雲飛去出尸尋白雲蒼厓濕芒屨峰頭異域僧洞口先朝樹流水帶餘花從來不知處遊五泄五首各有序明陶承學青口從諸暨縣行五十里皆山中然勢散緩行者頗疲怠將至青口前有巖嶄然出雲間客望見皆喜心踴欲趨比至山忽轉面截去路純若無罅並崖行半里許溪澎然鳴隔溪廼覺有門竇渉而入如行委巷中矣兩山離立不數丈壁絶梯磴翕翕如欲闔行數十武輒一轉溪隨而縈之十數武輒一渉山純石峰㟧皆傾欹聳特各各取態或如廩囷或窪如堂或如案上果罩也疑初是一山將有神人斬其脊而中開耶石壁上躑躅盛開紅紫如繡不可采掇五泄山上有劉龍子墓龍子人而龍故詩云然龍子為龍時陽精洞邱谷神行物無礙摧山如剖竹青口當其塗長巒勢奔蹙􅒂若萬羽林分行避黄屋祗今苔蘚壁即是羣山腹天空墮石罅雷與斲雲足鬼斧一以劖神鞭驅不續躑躅花其巔聊舒逰者目第五泄五泄之名以瀑水勝然山徑固已竒絶矣入青口十里至五泄寺寺右縁溪峛崺而上復折遂至瀑布所水懸可千尺石壁如削左右環擁映水益壯不知視匡廬雁蕩何如也然聲勢震蕩口喑目旋神魄失守亦雄偉竒特之觀題名於壁曰萬厯丁酉三月廿日公安袁宏道歙方文僎山隂王贊化㑹稽陶望齡奭齡同逰白蜺飲晴壑一飲萬人鼓腥風噴涎沫下有神龍府傾崖與廻薄獷石佐虓怒千里骨立山洗濯無撮土遥源杳何處落地名第五客來泉亦喜舞作千溪雨赤脚立雨中衣沾翳崖樹廿年成始至重逰在何許憑君鐵錐書一破蒼苔古白龍井五泄有二龍井黑龍井即第五泄下石潭白龍井在寺南五六里許穿谷中而入大抵如青口道也而兩壁加隘巖巒加巧溪加駛石門石囷石果罩皆具而加巨轉折變換不可名狀稍進云已是寺前案山背似非人世行客相顧恍然而已時日漸曛幽陗可畏不至龍井而還招提萬山裡門與蒼厓對嘗聞白龍井窈出清溪外沿洄未覺逺忽抵前山背半壁仙屋深廻峰洞門礙竒巒互傾昃飛溜各形態厓松老将化石笋看來大盤谷戴土耕寒苗接流溉溪幽生晚畏逕轉添新愛已謂人境窮驀與村翁㑹息肩支短䇿洗足坐鳴瀨但見元髮垂安能辨年軰因知雲霧間神仙宛焉在第一泄宋景濓記云諸泄惟第四級不可至或以綯圍腰繫巨栰俯而瞰其取道盖從嶺上下耳僧言山下有細路縁厓可上則四泄皆可至也時方雨險滑不可置足褰裳從之從者多諫罷歸寺詰朝歩上響鐵嶺從山腰得斜徑攀挽而行臨其巔望之四瀑皆宛宛可見夫匡廬雁蕩一級水耳猶得名况五泄耶山雨無崇朝青苔助巖險四泄安可求山僧只指㸃興來性命㣲危磴幾欲犯童僕進苦規同遊亦譏砭慮深膽易慴計阻心竟歉勝事忽若吞清眠夢如魘辰餐動歸䇿臨瞰勢已儼蘿葛疲攀縁荆榛費誅斬跖石愁足趺蹲泥任衣染下望五白龍遥遥競騰閃紫閬泄之水百仞五之意是天上落也從響鐵嶺而登至絶頂謂便當下乃忽見平疇長林桑竹蓊翳溝塍組織水皆安流審之即墮而為泄者地名紫閬民居頗稠或至巨富四望緬然平逺亦更有羣峰環之上山即富陽縣界予與客皆言兩縣地勢髙下遽如此復不謂是山頂行十里忽復下走如一二里始至地由此言之安知今所謂大地者非處於孤峰絶頂乎一瀑懸百仞五瀑方到地毎縁風霧開畧想峯頭翠即此料泉源應從白雲墜攀籐漸躋陟屢息始能詣誰謂孤峭中忽有桃源事鷄犬散邨落竹木成位置連疇溪女桑卓午樵人市向來五瀑布平流若溝隧十里方下山人家在天際山隂道上明袁宏道錢塘艷若花山隂芊如草六朝以上人不聞西湖好平生王獻之酷愛山隂道彼此俱清竒輸他得名早弔曹娥明倪元璐泿影日夜翻一翻一酸楚丹眼認碑氣神童而貌古龜汗洗籀文蟲口箋痛譜健哉十四姝脛走天呉府今看江面憨浮漚痩於黍昔聞呈秀格雙屍繡怒浦神人相媚時波心五月五旴有技絶倫媚神以妙舞神何以報之媚旴以死女不由旴有女那知娥有父一浪使旴殂一浪使娥腐誰知死娥處不是生娥所茫茫忠孝魂入水即水主近從胥江頭割來潮一縷一衣帶水耳翻出竒如許初入剡中明陳子龍夙昔躭竒異久負名山期詎意肅於役心賞獲在兹髙峰叠遥巘曲徑沿廻溪沉沉迷積翠靄靄含輕暉洩雲岫時没急雨瀨屢移青蘿被修坂絳樹灼隂崖廻互見别趣登降各異姿碩人昔考卜荒途恒若斯心跡既杳㝠衡宇亦參差抗懐感人代尚志徴前規終焉協要妙遲暮良可悲曉發諸暨大霧不見苧蘿明陳子龍長山既西廻浣江亦東注凌晨理驂服出闉遵軌路初暘失清暉寒郊無榮樹瀰瀰塞虚寥漫漫混蒼素平川蒸亂雲宿莽凝瀼露我思傾城人綺羅如可遇芳懐耿不明紅顔向烟霧縁流號無津躡嶝渺難度越客心悠悠俯仰勞嵗暮國朝泛舟至雷峰歩登南屏絶頂下憇浄慈寺袁啟旭輕烟裊素波花明見㣲磴艤櫂栁港隂遂躋層巒勝浮圖積古色石竹隠凌競山風何飄飄吹袂上蘿徑苔蘚重逾膩松栢森猶勁峰回萬象開水迥孤霞映紺宇嵌空冥精藍窈深靚一叩蒼扃幽便滌塵襟浄邈然人代感緬想真如境浮生胡攘攘至理誰復證安排在巖棲朝昬永游泳循煙霞洞下嶺至石屋洞袁啟旭晨興渉亂山亭午憇修畛巖髙哀狖吟樹宻春禽隠交藤路漸披獨鶴徑徐引石竇閟元㝠巨霛􅈔真境開鑿自何年潛虬遯虚牝海氣通平逺寒煙錮深迥雕鎪非一壑險仄有孤嶺仙室越隂涼人世異朝㝠渴欲潄乳泉饑將摘松菌於此託賞心無勞慕張邴自大嵩嶺上二十里至福泉精舍李鄴嗣舍舟上樵徑晴眺分纎毫循塗凡屢盤獲竒隨所遭崩厓露雲根長風勢漸饕諸巒徐束體始識身已髙過雨忽足下髮上天氣交在輿尚若疲何况舁者勞首虐乗人車筋力嗟爾曹斗上復稍垂豁然闢林坳老松得成鱗巖土抽春毛梵僧搆幽棲人龍同一巢入門氣得蘇豆筍羅山庖到此慚浮名徒為猿鳥嘲我何不徑然將家住藤稍寓山夜遊作宋徴輿清酒泛玉尊繁燈燿幽館月華流雲中前墀素輝滿主人啟名山客子不辭逺揚舟駭潛魚入林走棲鼴白雲湛深池明水照修坂陟徑無遐蹊聿憑千仞巘閣際星影疎林間露光泫萬里攬碧煙泠然御風善遥聞荒鷄鳴始悟歸志晚嗟此秉燭逰悵彼秋夜短寄萬開來永嘉王士禎昔有謫仙人清風照寥廓文采映江表翺翔出東洛遂渡永嘉來言尋謝康樂康樂不復有但存謝公巖赤霞自照耀緑水猶潺湲放懐山水外跂脚天地間開元儵千載斯人杳難攀萬公具仙骨妙筆餘清妍昔者東萊城㟁幘吟三山至今海上鷗猶思使君賢傳聞去金陵秋江正澄清過江富文流盡識使君名牙檣朱絲繂鹿子趁風汐送君石頭城去作永嘉客永嘉何菁葱叠嶂入晴空龍湫落千丈海日亂蒼紅雁蕩七十曲曲曲盡􅌑瓏容裔玉甑雲摇曵吹臺風齋閣倚青壁秋香金桂叢風物固洵美定復思謝李把酒問前賢主賔更相似吾家陸士衡公門稱國士玩世誠踈狂高義託君子自公南渡後結襪風邈矣長謡寫心胸逺寄東甌水送湯荆峴侍講于赤山禮部使浙江王士禎我愛西子湖夙昔夢見之湖光與山緑樂事輸呉兒譬客談江瑶未免思朶頤聞君往東南起舞軒兩眉緑蒲十幅帆西風美滿吹初下南徐州三山已麗﨑行行過震澤萬頃青玻璃夜航到臨安高枕殊未知新笋晚花過橘緑橙黄時湖水雄鴨頭緑浄相參差掩映湖上山影娥照清池錢唐八月潮詭異天下竒疾雷震百里蛟龍競躨跽潮頭坐靈胥重水汨後隨三千彀强弩射潮勝雄師至今擊西陵鐵幢髙以危釃酒臨樟亭江海為東馳壯觀今古無寄之於聲詩歌送潞河船郵籖報畫旗南屏精舍龔翔麟東風西子湖鱗鱗緑於釀呉儂刺釣船拏煙闖肥浪樹杪見孤塔移船埠頭傍蠟鞵縛兩脚扶篙雁齒上跬歩到寺門花宇十層壯我尋南渡蹟圓照井無恙井南有細路黄犬吠深巷沉沉松插雲戛戛竹鳴嶂蹣跚未半里丈室牖南向背不繚粉垣依山作屏障米囊花滿街春殘萼未放書幌借地停吟飲兩無妨鄉僧亦解事汲泉挑筍餉指㸃慧日峯引我試畫杖側眺錦軍城紅埃卷蹄輛何如事幽探寄情得遐曠懐西湖次東坡原韻宋犖西湖東南美遊眺多髙賢白蘇兩寓公領畧得其全繄余愛山水出郭疾病捐譬如蜂就蜜所性良由天盤山與廬阜入手自往年西湖咫尺耳徒聞好事傳今夏六月中緬想荷花鮮秋憐湖上峰娟秀縈雲烟何待段橋畔桃栁争芳妍晴空毎矯首清夜或廢眠幾日冷泉亭佳茗手自煎一枝老藤杖須趁腰脚便勝地如勝友堪結嵗暮縁鴨觜船易買已辦囊中錢扈蹕西湖紀事宋犖平生慕西湖聞說便神王呉越咫尺耳七載勞悵望何意奉宸遊夙懐得一暢朝出湧金門耳目忽清曠水潑葡萄醅山矗翡翠障白蘇勾留處西子譬允當追隨豹尾間未敢䇿笻杖聖情厪民依物外聊探訪御墨灑湖亭勾陳入雲嶂召許侍從臣小憇就畫舫亭午獨徘徊迢逓聞漁唱六橋宛沿縁兩峯屹相向指㸃從山僧脱帽廻堤上瞻拜武穆墳酹酒發悲愴還過冷泉亭兀坐茶煙颺竒峰真飛來驚嘆莫能狀勝地難久停歸趁湖波漲道人索題詩留待後來償殘陽挂斷塔古色落㰕榜薄暮趨行宫劒珮依仙仗西湖王鴻緒夙聞西湖名直比西施靣薄宦阻勝逰夢寐思一見今朝扈蹕來天假人之便清晨出城闉全湖浄如練周圍三十里中流聳樓殿春風駕畫橈波紋劃深靚十景烟靄重六橋桃栁絢山長刹影明水濶花光眩何石不鸞鶱何溪不珠晛吾觀西北山無水乏婉孌載觀東南水無山寡峭蒨山與水相涵固維此盡善乾坤毓竒秀乃萃呉越甸況兼白與蘇風流昔所擅遺蹟至今存好事争修繕人來勝地清女競春時倩珠幰帶詩筒畫舫飄歌扇撥雲或獨往拾翠還擕串是處可浮觴小憇亦花院盡日無歸情相看曽不厭素懐聊足酬幽賞顧未徧明朝發前途數月有餘戀吾邑於前明宣徳年間析自鹽官古蹟無可稽考偶閲宋人括異志有數則近古者各系以詩附於邑乗之末陸世楷當湖志云南北十二里東西六里東北泖港直通太湖今湖日淺土日増矣陵谷常變遷傳聞今昔異陸沉自何年昏墊誰復記民居漸以稠蛟龍亦知避豈有靈物存銀鐺尚拘繫志云漁者獲一鐵鏈長不計極舟滿㡬覆懼而棄之或云繫蜃於此出郭俯澄瀾遥堤互葱翠濃淡分畫屏海上峰十二春風颺輕舟晨夕雜歌吹左瞻梵刹雄右顧園亭麗栁岸與花田在在恣游戲孤城浮水濵毋乃廹危地廣袤非舊觀襟帶渺焉寄桑田跡未湮井木久淪棄寸壤及尺波咸資巨室利芳洲名偶同髙樓日陵替休誇作賦才能言衆所忌金山忠烈王漢博陸侯廟志云建炎間建堂堂博陸侯廟食自漢世椒房寵已移麟閣功未替豈同若敖餒而享非其祭廓然天壤間正氣日蟠際兹方偶鑒觀於時特憑契睠兹東海隅萑葦成棄地大澤多龍蛇驕陵恣為厲驅除奮神威金湯萬家庇行宫啟湖濵雲旗逺來賁縱横征伐年往往著靈異明嘉靖倭亂時隂助守城嶽降遡清和祈賽紛焉至赳赳部曲雄帷幄凛叅侍英風儼在兹過者尚送刺白沃史君廟水患方滔天四望鮮髙阜史君何神術躍馬東南走揮鞭使倒流蛟螭遂弭首邱原乃可依厥民安井臼園廬漸以完村村徧花栁微君我已魚遺恩頌耆耉白屋煥朱屝榱筵崇不朽旱澇輙有祈嵗時薦椒酒叢祠滿寰區文繡被土偶稽古洵足徴徳馨庶能久捍患與禦灾豐碑在人口鼎據雄三方孰為龍虎狗志云史君兄弟三人一在沙腰一在乍浦一在白沃齊景鄉北海去南海悠悠幾千里古云風馬牛越國逺難鄙如何勾呉鄉親辱齊侯趾鄉以景公名曷由辨其始千駟民莫稱二桃士為死功徳媿生前没世誰崇祀巋然青墩傍古廟丹青峙思昔戰艾陵薦食憂封豕未覩越溪來終抱齊門恥牛山収淚餘魂魄寜留此野語昉齊東遵海漫無紀三老泥前聞娓娓談孟子陳山龍母塜志云毎嵗七月風雨人謂龍洗墓誕降有嘉徴夢中龍據腹奈何神靈物戕毋以自育崔巍陳山巔有墓拱其木青峰繞佳城幽宫協天卜圻堛即飛騰於毛豈有屬猶念鞠我恩嵗嵗來洗沐一泓侍巾缾孝思常在目安得㵼飛泉分流遍巖谷海濵多逸民䇿杖訪林麓咄咄駭異聞兩石自相觸石如雀鼠穿而不損墉屋志云廟後觀音庵忽有兩石半山鬬墜而下一從殿後壁滚入一墜殿之西屋瓦無所損昭昭龍之靈磊磊石之族動静理固然幻態驚反覆君子道其常龍潛而虎伏宿韜光山房潘耒招提宅山巔而有清泉㵼濤聲亂隂晴瀑勢無冬夏殿門俯層巒萬象森在下湖帆曵林空海日升巖罅我來嵗已晚楓菊猶未謝白石浄可餐流雲駛堪駕浮生如窗塵㡬人得休暇遇坎且當止茅齋倘相借杭州水利不治者累百年矣廵撫趙公考城河故道悉濬治之鄉人來述喜而作詩凡二十四韻朱彛尊武林古澤國十八澗九溪當年宋宮闕溝水流東西陳迹漸已湮深谷皆成蹊民居日湫隘編竹兼芘莉猛火一燎原悲燄百室迷塗徹大小屋繘井愁難躋女丁配夫壬相顧但愴悽吏治狥目前孰能防禍梯中丞溢世才利器剸水犀下車命丞倅故道資考稽率錢具畚鍤曾不煩鉏犂經始底告成嵗序尚未暌坐令闤闠間無異蘇白堤紅䦨雁齒列赤石羊肝刲嘔啞小航船蹀躞快馬蹄停鞭市蓮藕倚檻來鳬鷖栁隂榖犬鳴露脚莎鷄啼祝融廻其馭婦子方安栖乃知濟時䇿不在拯顛隮公之治水術豈獨過白圭泉清原隰平名與召伯齊我家由拳城閭巷多蒿藜願公祛墨吏如決濁水泥上以答天子下以寧羣黎桐廬雨泊朱彞尊桐江生薄寒急雨晚淋漉炊煙起山家化作雲覆屋居人寂無喧一氣沉嶺腹白鷺忽飛翻讓我沙際宿南山雜詠十四首朱彞尊蒼天入夏寒一泉自溫谷其流浸蘭蕙其音喻琴筑􅒂然石扇開飛出白蝙蝠水樂洞山泉可用汲酌以長頸匏虎跡久已湮深穴猶窙窌松隂轉三靣未肯囬鞦鞘虎跑泉澀磴上招提不知幾十級入厨筧泉枯過雨佛身濕石乳滴空嵌髣髴龍象泣烟霞寺一亭四無鄰棟壊柱已折山僧慣迎客不忍過溪别偶語莎草間夕曛信明滅過溪亭我行楊梅塢惜是孟夏初是時果未熟但見柯葉舒思包緑荷飯五月來精廬楊梅塢一泓停山坳過者不敢唾雖然龍窟宅亦許鬭茶坐起摹襄陽碑惜為僧所涴龍井峰頭石縹緲豈異一片雲有時風雨過獨立雲中君安得五丁手移置長水濆片雲石朅來給孤園玩此薩埵石石上生莓苔千年暈濃碧不見飤虎人且鋪苮草席薩埵石溪廻凡幾折早已滌塵慮静看三樹松深隂坐箕踞客去鶴飛來客來鶴飛去納翠山房尋遍十五寺九溪鳴淙淙下無一寸魚上有百尺松縁流思濯足奈此菖蒲茸九溪暮經南山南曲澗一十八山橋往而復山路坱兮圠夕陽漸催人延首望香刹十八澗句曲一道士愛住山之幽褰裳慮深渉賣彼白玉鉤築橋訪詩侣兹事宜千秋玉鈎橋巖巖翁家山松花滿深塢村民髙下居少長齊捕虎但誇弓弩强不識耕稯苦翁家山桂樹花不實何年種山椒良由山中人嵗暮不自聊殷勤與我期秋日來逍遥桂塢晚過寳林山寺朱彞尊春風從何來吹彼芳樹枝客心坐惆悵日夕千里思出門異南北獨往任所之眷言登兹山已見西日馳羣峰趨尸外出没成參差置身空濛間恍忽飛來時向下聼鷄犬極視窮髙卑沉沉西林路光闇從此辭囬瞻白雲合林外鐘聲遲雨中遊飛英寺查慎行春隂覆城堞花淺遊人稀愛此北郭幽晨征夕忘歸盤旋上窣堵恣眼窮清暉東風拂面寒細雨濕我衣客來僧啟鑰客去僧掩扉迹在有送迎心空無是非登道塲山查慎行船廻浦溆淺徑轉村塢小不覺坡陀高騰身萬松杪菰城浸藪澤白塔􅑨雲表浮氣盪一州湖波白渺渺天長接遥翠目極青未了漸上伏虎闗羣峰忽環繞清颸吹戸牖古殿深且窈脉絡引檻泉渟泓滙池沼長廊百餘歩旁入逾幽悄蒼鼠竄别枝投空攫啼鳥巋然翠微閣中敞外見少野火不到山薈蔚復誰燎坐令杉桂材䝉茸委蓬蓼飛蟲晝轟聚高蔓晴天矯老僧守空庖恐作山中殍軍持乞米出厭寂喜膠擾我來久徘徊愛此吟風篠春深花澹澹日暮雲裊裊餘暉帶踈鐘詩境墮空杳古今一大夢囬首失昬曉晚抵髙陽山麓上九曲磴投雲岫菴查慎行到山路疑窮壁立青巑岏松隂十二轉一上一改觀忽聞雁呌風側背來髙寒夕陽墮西陸返景飛彈丸閴寂禪者居地偪天形寛鐘聲落海外列宿棲巖端老僧笑迎門藹若平生歡謂言登陟險知我歩履艱汲泉為烹茶拂床與安單蕭然一行脚只作道侣看還珠亭呉興張母史孺人孝㢘映斗之毋也有章嫗者以鬻珠往來母家醉遺美珠而去數日不至呼來還之嫗泣謝如更生母終身弗言及殁嫗年八十餘匍匐來𦵏所口述其事聞者嘆異焉孝亷葺丙舍為亭仁和沈都憲近思榜曰還珠余為作詩呉襄呉興有賢媛禮法樹矜式論定揭大端卓哉無茍得一解閭嫗鬻百琲醉墮紅羅襦不貪為我寳胸中自有珠二解經由雖已忘什襲固能審還爾性命資朂以勿崇飲三解流年女宗謝執紼親朋來嫗年過八十雪涕銜餘哀四解嫗且弗復哀賢媛未曾没不見還帶橋古藤縛碑碣五解浙江通志卷二百七十二
