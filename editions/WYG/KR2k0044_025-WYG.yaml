御書閣元至正十年達嚕噶齊哈喇哈達重建大成殿明倫堂兩廡兩齋萬歴湖州府志明洪武初知縣蕭洵重建廟廡二齋𢎞治間知縣徐浤重修嘉靖浙江通志嘉靖十年推官王濓徙今所姚一元為記長興縣志嘉靖三十七年知縣王扆置學田隆慶八年知縣顧其志重修徐中行長興縣重修儒學記隆慶五年令吳中顧君下車謁廟歎曰余子游之鄉人也將弦歌於斯邑顧宫牆有闕狀何以稱長上乃修學宫属尉董之先師殿廡啟聖諸祠齋居神庫肅肅如也明倫堂尊經閣號舍庖湢重門坊屏秩秩如也繚以周垣飾以丹堊綜理甚具舍菜告成冠帶縉紳圜而觀之天目居南桐汭在西東北涯以太湖三箬罨畫流經泮宫之前宫牆煥於其間雖山川藴藉如故而其秀發於文人者心志耳目作新不倦也萬厯二十四年知縣劉一臨重修三十一年知縣熊明遇重修創觀徳堂甲秀閣崇禎初知縣向鼎十年知縣吳鍾巒重修國朝順治九年知縣劉邦貴敎諭李𢎞名康熙十一年知縣韓應恒敎諭張佩綸各重修射圃在明倫堂西名宦祠祀耿炳文以下九人鄉賢祠祀陸龜䝉以下七十一人社學二所俱在縣南東湖書院在縣治東北二十五里續文獻通考元邑人蔣必勝創詔賜額名圯講徳書院在承恩門内長興縣志嘉靖三十七年知縣黄扆建養正書院在長安門内長興縣志明大司寇顧應祥建延師訓邑中童稚圯箬溪書院在金蓮墖院之右長興縣志萬厯三十四年知縣熊明遇建松水社堂在金蓮墖前長興縣志明熊明遇建霞舟書院在箬溪書院右長興縣志明邑諸生為令吳鍾巒建吳頗右文學諸生以時執經問字其中徳清縣儒學在縣治東𢎞治湖州府志宋大中祥符庚戍令劉洞創於縣之西南隅明道壬申令竇充與邑人沈當徙建於尉㕔之左紹興癸丑令楊錟重修沈與求重修徳清孔子廟碑子少時嘗聞諸長老言吾邑初脱五季之亂人樂更生敦朴力穡未知學也大中祥符間予從祖書記始以儒學中進士甲科名稱藉甚鄉黨榮之邑之子弟遂風勸於學其後正議大夫盧公父子踵取名第翺翔要途而學者日寖以盛故有孔子廟基下制狹既不足以揭䖍妥靈而衿佩野逸弗克羣處迨明道壬申河南竇充來是邑以為餘不溪來自天目之山注於邑之東南兩山挾之秀氣横出宜益有縉紳之祥乃作今廟高明亢爽非復舊比而文雅之士班班出焉迄今百有三年而牆屋頽圮草茀於堂廟貌雖存丹青缺落使人喟然有寜不嗣音之嘆太末鄭如幾隠居溪隂率邑子沈良能相與告於邑令楊錟及境内之士大夫士大夫悉勸趨之爭出緡錢以佐其費乃盡撤而一新之視昔有加焉經始於紹興癸丑之仲冬越明年春上丁行釋奠之禮落成焉是日也予兄次律攝衣升堂談春秋大㫖凡邑之士大夫濟濟在列咸有肅容邑令請予文以記乃為書其本末而系之以詩曰餘不之源來自天目注之兩崖其勢若東惟邑東南山縈水洑始建廟宫兹焉考卜士也來逰文風載郁更時搶攘園蔬是鞠豈其山川秀氣回復厥有吾徒輸金委粟載新棟楹工靡程督有神司之不疾而速揭揭元聖端冕衮服羣公從之祀事孔肅嗟我令尹崇化表俗曰興自躬往繼前躅勉我士子荒怠則辱惟以嗣音豈惟干禄祥源洋洋庶來其續嘉定丙子知縣黄耕益學田淳熙三年知縣趙汝巋大加興繕嘉靖浙江通志正統六年知縣王敬徙今所胡濙徳清縣重建儒學記徳清縣儒學舊在縣治之南嵗久頽圮正統六年毘陵王敬來作令下車之初釋菜廟庭徘徊周覽謂其雜處市㕓非育才之地退而謀諸縣丞崔時雍楊冕敎諭戴冔訓導范敏俱慨然有改作意遂相基於縣治之東得義民蔡凱隙地高明寛爽堪為學宫時巡撫亞卿周公恂如適來按邑亦甚稱許遂奏易之官民捐助市材鳩工經始於壬戍之冬先作禮殿次及兩廡以至明倫之堂肄業之齋習射之圃治饌之㕑儲粟之庾及夫祭祀之庖庫師生居宿之廨宇凡學之所宜有者罔不畢具宏深靚奥藻飾大備萬歴湖州府志𢎞治十年知縣王良臣増建嘉靖四年知縣方日乾修邵鋭為記隆慶元年知縣陳宜重修許孚逺為記徳清縣志萬歴六年知縣史朝録修二十八年知縣湯宏重修三十八年知縣熊得陽天啟四年知縣敖榮繼修崇禎十年知縣丁煌修國朝順治十二年知縣謝延嗣修建十八年知縣馮壯重建明倫堂雍正十年知縣錢學洙捐俸倡修自大成殿暨兩廡㦸門櫺星門明倫堂及崇聖祠名宦鄉賢祠文昌祠整煥一新射圃在城内市亭山之陽紫陽觀之左名宦祠祀孔愉以下二十一人鄉賢祠祀沈麟士以下四十二人社學在射圃之南東萊書院在慈相寺東萬歴湖州府志宋嘉熙間令章鑑創建明𢎞治九年知縣王良臣復即寺之披雲閣建嘉靖四年知縣方日乾重加完繕織簾書院在吳羌山之陽萬厯湖州府志南宋時建祠於此祀織簾先生沈麟士嵗久頽落明嘉靖四年知縣方日乾創立書院陳霆織簾書院記初南宋沈先生麟士聚徒受經四方來學者恒數十百人先生於世無所取鬻簾自給迨年且八十猶手抄故所毁亡書至二三千卷其歿也門人尸而祀之稱曰織釐先生葢表其高節清行思以激天下之貪夫鄙人若昔聞伯夷之風者云爾嘉靖二年方侯日乾來為徳清考徳問政拜先生遺祠於榛棘中顧見棟傾墁頽鳥䑕之跡交案乃愀然興嗟已而眺瞻於元峯則長溪前縈層殿後聳羣巒疊巘環列於煙雲杳靄之間侯喜見顔色曰是可以宅先生矣四年秋書院告成作先生之主而奠焉謂霆宜有記傳曰雖無老成人尚有典刑先生往矣而書院之作其典刑固在也嘗試登山而眺白雲在巖明月來岫意先生尚高卧其中思起而從之逰則既不可得矣溪山之間松濤有聲猿鶴酬和耳目所接固其流風遺韻也乃援楚騷賦招𨼆一章先生有知庶其来妥其辭曰若有人兮雲林高風激兮靈襟世誠溷兮孰諧表獨立兮秋岑空九州兮朓逺眇齊烟兮九㸃㔉芝田兮足糧何百嵗兮修短紫荷裳兮秋匀青蘿屋兮夏寒君可樂兮山間乗白麑兮從元虎朝東崦兮夕西塢還夜誦兮蟲勞苦􅆽澄泉兮在斝采秋英兮盈掬儼嵗時兮奉薦慨千古兮遐躅徳清縣志祠宇廢徙主於東萊書院萬厯三十二年因故祠旁有尼菴應毁邑諸生請於令改為書院履齋書院在新市鎮徳清縣志宋丞相吳潛宅淳祐間奉勅建有御書樓圮武康縣儒學在縣治東嘉靖浙江通志舊在今學之西宋天聖中令何湜遷於縣東南𢎞治湖州府志建中靖國元年令毛滂修建自為記乾道三年知縣張端友校尉周粹中改築易向増其舊規淳熙十五年邑巨室聞人觀國觀時作大成殿造四齋蕭徳藻為記元至正十六年燬於兵明洪武三年知縣李大春重建六年知縣張居敬重加修建張文昱為記宣徳八年知縣華璿重建明倫堂正統十二年知縣黄玶復加修繕嘉靖浙江通志𢎞治九年知縣郭祚徙今所萬厯湖州府志正徳七年知縣謝珊拓而新之嘉靖十四年知縣馮霄建尊經閣唐樞為記隆慶三年知縣金九臯改建廟廡㦸門萬歴元年知縣楊譽修武康縣志萬厯四十三年知縣周宗建更新之崇禎九年知縣鄭朝彦修飭射圃在學東名宦祠祀賀循以下二十一人鄉賢祠祀沈勁以下五十一人社學一都至十八都南北界並設一所安吉州儒學在州治西𢎞治湖州府志舊學在縣東宋建炎中為水所没紹興初令馮康重建元至正十二年燬於兵嘉靖浙江通志明初知縣王津徙今所萬厯湖州府志洪武四年知縣孔克剛建明倫堂兩齋嗣是修治増飾不一正徳二年陞縣為州遂為州學嘉靖二十一年知州范敏闢宫牆鑿泮池莫如爵為記三十四年知州江一麟重建先師廟及神㕑祭器庫文昌土地鄉賢名宦諸祠復修兩廡啟聖祠明倫堂并兩齋舍泮池劉麟為記國朝順治八年知州劉道著重修十四年先師廟災越二年知州楊茂祖重建康熙十年知州曹封祖増建明倫堂射圃在州治南名宦祠祀裴松之以下一十六人鄉賢祠祀王文殊以下一十一人社學在州治南圮孝豐縣儒學在縣治東嘉靖浙江通志明𢎞治元年知府王珣建萬厯湖州府志嘉靖二年知縣郭治修孝豐縣志嘉靖三十二年邑人吳松捐貲徙建東門張懋為記天啟三年知縣王新政改遷今處國朝初知縣田養民又遷東門康熙七年知縣楊錫汝仍遷今址射圃在文廟右名宦祠祀王珣以下六人鄉賢祠祀王麟高冕二人社學五所二在縣西一在縣東一在縣南一在縣北浙江通志卷二十六
