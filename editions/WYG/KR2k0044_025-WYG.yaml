body:
  text: 浙江通志卷二十六學校二嘉興府嘉興府儒學在府治西北𢎞治嘉興府志舊有廟在天星湖上唐開元二十七年建廟後有學室宋太平興國二年錢氏納土知州安徳裕立學祥符二年知州耿肱移於望雲門内西偏崇寜元年知州錢遹改建至元嘉禾志建炎兵火移於州治東即故禮賔館為之紹興壬戍知州方滋於通越門内立學張嵲重建嘉興府儒學記紹興壬戍右奉議郎直秘閣知州方滋言郡學簡陋前臨河渠旁迫治所喧囂混淆大失古人處士於燕閒之義請更諸舊基以詔令從事四月壬午上尚書省禮部以為宜下其事於州乃審曲面勢計間楹量功庸慮財用練日庀事作殿於前築堂於後齋宿有所絃誦有舍歩橺周垣門庖湢浴莫不備具先是學無典籍乃市書於四方貯之以庫而謹其出内為屋凡七十冇三間以六月乙亥始事以十月庚申告成邦士大夫郡儒逰士耆稚畢㑹仰瞻歎息咸多太守之義𢎞治嘉興府志淳熙四年知州吕正已建御書閣嘉定十一年知軍府岳珂改建廟學經營未就十三年知軍府鄭定落成袁燮為記紹定二年知軍府莫叔益重建觀頤堂黄夢高為記端平二年知軍府趙與建御書閣寳祐丁巳郡守謝堂闢大門疏潢池創講堂改建觀頤堂於東張鎮為記元至元丙戍陳紹在徐碩等改御書閣曰尊經閣徐碩為記大徳三年總管辛仲寳重建廟學十一年敎授孔演學正趙由漳學録沈徳華嗣葺牟巘為記至順二年達嚕噶齊巴扎崇建大成殿㦸門兩廡張采為記嘉興府圖記至正二十三年知府陳宗義闢地重修徐一夔為記𢎞治嘉興府志明洪武二十七年參議李文華重建明倫堂於舊基宣徳間巡撫大理卿胡槩重修建四齋正統二年知府黄懋購地移建明倫堂號房饌堂射圃按陳循記内作正統九年嘉靖浙江通志成化十八年知府徐霖増建學舍萬歴嘉興府志嘉靖二十七年郡守趙瀛大加修治嘉興府志萬歴初知府李橡三十九年知府吳國仕崇禎十三年訓導吳祖稷重修國朝順治十三年郡守史載修譚貞黙為記康熙十六年知府盧崇興敎授姜廷櫸重建明倫堂啟聖祠姜廷櫸為記十七年訓導范光燮重建饌堂五十五年知府吳永芳重修次年移名宦鄉賢祠於㦸門西建文昌閣於學東射圃在文廟西名官祠祀高史君以下七十六人鄉賢祠祀陸贄以下二百三十人宣公書院在府治北明一統志元至正間建劉基宣公書院碑嘉興郡學舊有宣公祠其詳見於吕公祖謙之記而郡城之東鴛湖上又有宣公書院其地有橋曰宣公橋故老相傳宣公實生於此故於此立祠以祀公至宋景定癸亥始以祠堂為書院丙子之嵗書院延燎於兵而公像故存衆白郡迎於太初堂因以堂為書院大徳九年濟南趙魯為山長病其簡陋始改作之其詳見於牟公巘之記自是城東故址遂廢為墟泰定中有僧以賄請佃而建庵焉後至元二年庵災地復於書院是嵗六月其僧復創庵如故山長雖爭之弗能得也至正十四年宣徽院判海岱劉公貞為嘉興路總管至則首治學校之闕欲新之而地隘弗稱乃用推官方君道壑言命所司督其僧撤庵歸地復建書院其中為先聖廟兩廡儀門東西禮亭櫺星之門具焉其西為宣公祠祠西為室東鄉以祀郡之賢其外為三門廟東為講堂其前軒仍舊扁曰仁義之堂以藏宣公奏議謂其言無非仁義也西齋以延師敎弟子又増買蕩地若干畝以益禀膳庖㕑倉溷各得其所將成而公改除海道萬户於是以属之方君方君力贊成之經始於至正十四年四月竣事於十五年二月明大理卿胡槩知府黄懋皆重修仁文書院在三墖東嘉興府志萬歴中推官曹光徳建久圮鴛湖書院在郡學東嘉興府志康熙五十八年郡守吳永芳建嘉興縣儒學在縣治東至元嘉禾志舊有廟在縣西北後廢附於州學縣學址更為郡社壝宋咸淳五年令張抃以西城舊驛舍為縣學梅應發為記嘉興府圖記元至正間縣尹陳伯顔新之陳達為記𢎞治嘉興府志明洪武六年重修陳世昌為記宣徳二年廵撫胡槩命知府齊政知縣趙良大建禮殿明倫堂改建櫺星門正統十一年知府黄懋復廣民居増號房官舍嘉靖浙江通志嘉靖十四年徙今所姚淶遷建嘉興縣儒學記學僻在城西規模隘陋侍御張景按涖是邦有司言易以興聖寺公亟命行之時大叅洪主方僉憲焦伯升胥贊其役督學徐子升相與成之檄郡守鄭南金邑令黄獻可身綜厥事乃改寺殿為文廟殿左右為兩廡即其重門為㦸門其外門為櫺星門遷明倫堂於廟之東鑿堂前地為池遙與天星湖相映建尊經閣於池東南池左右為東西二齋廟之後堂仍而葺之為啟聖祠堂之後新建敬一亭經始於乙未之冬落成於丙申之春萬歴嘉興府志嘉靖三十三年明倫堂毁知府劉慤新之嘉興府志萬歴二十四年令陳儒新大成殿許應逵為記崇禎十一年明倫堂毁令羅炌重建并修大成殿兩廡儀門十三年訓導孫肇元起聯奎樓廣學前道國朝順治十三年知縣張厥修修廟廡㦸門康熙六年知縣金鏞改修明倫堂儀門十三年知縣梁沖霄修啟聖祠儀門二十一年知縣何誌重修明倫堂聯奎樓四十四年知縣陳大宏修大成殿未完五十四年知縣徐岱成之徐鳳池為記五十六年徐岱修明倫堂射圃名宦祠附府學鄉賢祠附府學社學五所一在東津四在各鎮秀水縣儒學在縣治東𢎞治嘉興府志明宣徳五年吏部員外郎李亨闢基七年户部侍郎成均命同知孟迪建明倫堂及後堂明年復建大成殿暨兩廡二齋櫺星㦸門萬歴秀水縣志正統十年知府黄懋増建文昌祠及號舍景泰二年知府舒敬造膳堂庖湢舍三年僉事陳永造櫺星門觀徳亭五年知縣童暉立射圃嘉興府志天順四年知縣莊徹易櫺星門以石重新兩廡明倫堂膳堂二齋建退居舍林文為記萬歴嘉興府志成化十九年知府徐霖闢學之東建鳴陽門嘉靖戊申知府趙瀛浚河閼廓侵地萬厯二十四年知縣李培建尊經閣陳懿典為記國朝順治十四年知縣賈曽康熙四年巡道上官鑑十二年知縣李見龍敎諭李文華先後葺建康熙十七年訓導袁日華復正誼齋十九年敎諭范正輅修四十一年布政使趙申喬檄知縣于勛重建明倫堂姜橚杜臻為記五十三年知縣吳楷芝重建啟聖祠五十六年知府吳永芳知縣丁兆啟重建大成殿兩廡櫺星門射圃在學南名宦祠附府學鄉賢祠附府學社學五所一在北營四在各鎮聞湖書院在聞家湖秀水縣志明嘉靖中叅議沈謐構以祀王陽明嘉善縣儒學在縣治西𢎞治嘉興府志明宣徳五年始立學基知府齊政募邑民陸坦建大成殿黄澤新建嘉善縣儒學記宣徳庚戍春大理卿胡公廵撫東南以嘉興府地廣民衆賦税浩繁釐其地别立縣治分理焉遂聞於朝許之曰嘉善凡新邑制度所宜有者咸創置如式乃以學校在所當先因區畫廟學位於邑之西姑就王益來典敎事謀諸邑之令佐始構明倫堂而禮殿廡齋尚缺又明年莆田林勤分敎來兹四顧榛蔓惟巋然一堂大懼弗稱適知府齊政至邑勤以書白之政念工鉅費繁不欲徴諸細民也邑之巨姓曰陸坦者慨然捐白金三百有竒市材陶甓鳩力僝功而禮殿是營其崇四十六尺修如崇而殺其八廣如崇而加其七經始於是年九月落成於次年四月匠師工傭則有司給其直人喜其成而不知其勞也正統六年知縣李遜建後堂成化八年同知楊冠募富民建明倫堂及兩齋後堂萬歴嘉興府志成化十九年知縣江貴新門廡㕑庫饌堂號舍萬歴嘉善縣志𢎞治九年知縣吳傑訓導王緒増葺嘉興府志𢎞治十一年知縣劉子厲縣丞潘瑜先後増號舍及神㕑牲房程楷為記國朝康熙十一年知縣莫大勲敎諭任雲蛟増修三十六年學使鄭開極檄知縣徐現麟修五十三年邑人錢煐五十八年知縣孫錦修射圃在明倫堂西名宦祠祀洪皓以下一十八人鄉賢祠祀陸䞇以下五十七人社學六所一在思賢書院一在慈雲寺四在各鎮戴氏義塾在郡城東北黄溍戴氏義塾記嘉興郡城東北六十里曰白牛鎮居人數百家為其鄉之望者曰暘谷處士戴氏患鎮學之弗立而後生小子無所受敎規創義塾以私淑乎里人有志未遂而没後二十年其子曰光逺字君實始因其經畫之素度地於鎮東若干歩廣袤可二十畝而贏程土物畧基址考正面勢召匠簡材揆日興作先聖先師之殿峙其中論堂踞其後齋廬翼其旁䆳廡穹門下至庖湢庫庾直舍之属為屋總四十有五間圖史之藏什器之須纖悉畢備周以繚垣環以幽篁佳木花徑成蹊而瀦其流泉為芰荷菰蒲之區又十畝不啻起至正六年八月訖七年十月告成八年春二月乃延儒師招來學用仲丁行舍菜之禮退即講席俾序進而請業焉四齋職敎者各一人生員恒百五十人割上腴之田五百畝以贍之既成前人之志又將有以昭示後人而圖其永久於是慈谿黄伯成以高文宿徳主領敎事伻來求予記之予聞昔人有言惠有術也養有道也惠不在豐而在乎不費養不在大而在乎不窮戴氏父子其深知夫惠之之術養之之道乎古者五家為比比五為閭門側之堂為塾大夫士年老不仕者為左右師而閭中之子弟學焉今之義塾猶其遺意若夫屋室之多則不止於門側之兩堂學徒之盛則不止於閭中之子弟是皆非古之所有其為恵也豐矣古者歩百為畝為一夫之私田今俾以田五百畝則十家之産也而況今一畝為歩至二百四十則又不止十家之産而已是則出於古之所無其為養也大矣天之生人也莫不賦以仁義禮智之性因其根心者使之尊師取友而日趨於善逮夫深造自得皆其本然之固有初非損於此而益於彼斯不亦惠而不費乎物之聚也有數而其用也易耗雖封君之富欲以萬鐘為子弟之養尚恐廪人之粟有時而弗繼今乃使之因地之利嵗取之而弗竭利於今者有以施及於後斯不亦養而不窮乎葢設敎必有先後次第此特導以㓜學之節而養其良知之本云爾他日而以俊選論於鄉以賢能登於天府授之以政將見利澤之加於人為惠益豐為養益大戴氏父子之功奚獨善於一鄉而止乎按郡乗宋名臣陳公舜俞其地人也舉進士應制科皆在前列以山隂宰召試館職不就而上書力詆青苖法忤執政意謫為監當官公以直道自信無所回撓每跨犢往來山中自號白牛居士遂以名其故里諸生息斯㳺斯仰企前修儀刑未逺誠有所感慕而興起安知無如公者生於其間戴氏父子且與之同不朽矣陸氏義塾在汾湖嘉興府圖記宣徳中陸垣建曽鶴齡記思賢書院在縣治東萬歴嘉興府志正徳間縣丞倪璣建鶴湖書院在北門外舊浙江通志明崇禎中知縣李陳王建海鹽縣儒學在縣治西南至元嘉禾志舊在縣東宋太平興國中主簿攝縣事石知一建景徳二年令翁緯移縣南重建嘉祐八年令褚珵立學於東南自為記紹興十五年令徐光實新之李正民為記乾道二年令劉銓遷於縣南淳熙十五年邑丞李直養新廊廡紹熙元年李自丞遷令修大成殿立小學置書籍祭服嘉靖浙江通志元元貞五年陞州學知州趙孟貫徙今所陳旅為記至元元年知州陳某作大成樂黄溍海鹽州新作大成樂記古之釋奠折爼升觴而已其為禮也略故其用樂之始莫得而詳記曰凡釋奠者必有合也説者或以合為合樂然則釋奠之有樂其出於古歟若其音節器數則自漢儒未嘗言之前史所載元嘉之六佾特施於太學開元之宫懸僅設於兩京政和造雅樂名大晟始頒行於天下而紹興著令郡邑釋奠其樂三成葢至是而州縣學有事於先聖先師無不用樂者矣國家有因有革存其聲音物器之舊而變其稱號以新一代之觀聽其所謂大成樂是也海鹽昔為縣時既立學而廟祀孔子逮版圖入職方朝廷以其地大人夥易縣為州而廟學之制猶循其故禮具而樂缺有司以吏議所不責久置不講至元元年夏四月陳侯某來知是州首務興舉學政問其籍則為士者百家為田者萬畝問其春秋之事則有牲幣而無樂侯為之惕然與僚佐諸儒共圖之僉言儀真有周君者善樂事老而不仕寓迹於雲間欲正雅樂非君不可侯即俾持書幣迎致焉君曰樂以導和不和不足為樂僕觀江淮間所用樂雜出於伶人賤工之手器不中法音不中律左右高下參差混淆惡足以致和哉茍徒損厚費而飾虚文僕弗為也侯曰作樂以和神惟君言是聽君乃為考其數度齊量範金為鐘而協以古律管彼此適均吹其律而鐘自應至於琴瑟亦悉自制惟笙磬之属擇善工使受指畫而為之集諸生三十有二人敎之肄習而以明年春二月上丁合奏焉在列者無不欣豫於是敎授陳陽翁以狀來属予書於麗牲之石用垂永久葢古之設敎莫重於樂非止用於釋奠也侯之於樂不但欲辨其鏗鏘又必求通其義者相與討論之可不謂知所本乎諸君子從侯修其時事周旋升降於堂序之間必有聞其樂知其徳而鼔舞於鳶飛魚躍之下者矣是舉也有功於敎其道甚大非徒備其闕典而已可無書乎明復為縣學𢎞治嘉興府志正統十二年知縣曽昌建神㕑牲房萬歴嘉興府志景泰四年敎諭王恭改建門樓於東南海鹽縣圖經明倫堂成化中知府楊繼宗重建張寜為記𢎞治海鹽縣志成化十二年知縣徐朴重建大門嘉興府圖記嘉靖辛卯知縣夏浚新之嘉興府志萬厯五年知縣饒廷錫建㑹講堂天啟初知縣樊維城修射圃在櫺星門東南名宦祠祀李諤以下二十五人鄉賢祠祀干寳以下六十九人社學在縣治東馮氏義塾在縣治東徐一夔馮氏義塾記海鹽縣治之東十有八里地曰砂腰實斥鹵之處馮氏世居焉大厯中有號梅軒處士者病其鄉閭無講學之地創為閭塾殿堂齋廡如學校而以田百畝入於塾擇勤敏者掌之以其所入延士之有學行者為塾師使馮氏與其鄰里之子弟入學於塾且給之餐後至元初知州事趙侯孟貫義之署為馮氏義塾至正初塾燬於兵其子更作之而禮殿未備㑹官府計田以賦而塾有田不能獨貸其長孫椿集其諸弟議曰塾之設吾祖義事也使田以塾用而充賦則塾無所入而已成之規隳矣吾共以家田所入當塾田之所輸則塾可存諸弟韙之椿且將與弟完塾之所未備以畢其初之志繼自今瀕海之土俗有慈讓之風人有君子之行有以見義塾之化底於成矣石門縣儒學在萬嵗橋東至元嘉禾志宋元豐八年令吳伯舉始創縣學於縣南運河之西岸沈括崇徳縣新建儒學記崇徳居山澤之介孔道四出戰國之時闔閭句踐嘗大戰於檇李禦兒之間裂其地而守之至今墟壠綱絡稻蟹之利轉徙數州元豐八年栝蒼吳君伯舉為是邑也始為築宫廟以祀孔子褧學者擇經師而敎之以義理行能不茍使之為文章誦習務中有司之程而已培高為堂燕有二室繚以環廬豐約稱事四方聞令賢皆來學惟恐在後崇徳為逺邑縣令為小官興材賦工動觸吏禁非篤誠自信强有才者不能任也此其成就之難又未若持之之難也僨犀象為鴻鵠之器非深山大谷則無以養其材執規矩而求之者不視其材視所養則躭躭之室執規矩者所視也養之以先王之所待以興者而不徒循其末跡則其為役也不為茍羙矣嘉靖浙江通志紹興間令黄楊徙河東元至正間知州王雍徙今所正徳崇徳志明洪武六年知縣田慶元重建𢎞治嘉興府志天順八年知縣郁倫修成化庚寅知縣王輿重建明倫堂𢎞治辛亥知縣吳浚重建大成殿萬歴崇徳縣志隆慶初朱令潤萬厯丙子蔡令貴己卯陳令履戊戍陳令允堅修嘉興府志崇禎十七年知縣解學周敎諭孫肇元重建明倫堂國朝順治十二年署縣通判韓範敎諭周有亮重建大成殿谷應泰為記康熙二年敎諭陳祖法重建尊經閣雍正元年知縣王以和修櫺星門六年知縣李廷鑄重修明倫堂尊經閣及儒學大門射圃在尊經閣東南名宦祠祀吳伯舉以下八人鄉賢祠祀趙汝能以下三十人社學在縣東傳貽書院在縣治東北續文獻通考宋儒輔廣讀書之所後人立書院以祀焉文及翁傳貽書院記朱文公受學於延平門人遍天下中更偽禁磨湼而不磷緇者絶無而僅有於時潛菴輔公獨立不懼自祠官報罷歸𨼆語溪題讀書之堂曰傳貽蓋將以傳之先儒貽之後學為己任著書滿家至今語溪之人薰其徳而善良不知其幾祠而奉之尸而祝之宜也崇徳縣大夫家之柄以元祐同門元符上書故家著閲詩禮及見典刑洋洋輿誦挺挺柤風簿書期㑹整暇之餘思所以彰善癉惡表厥宅里樹之風聲此傳貽書堂所由建也堂成移書謁記敢拜手稽首對揚我朝道學源流之盛以諗同志庶學者於善惡之幾正邪之别義利之判人心道心之危微天理人欲之消長知決擇而定趨向焉其於國家化民成俗之意豈曰小補之哉若夫講席堂規書糧工築創造嵗月詳記備載則有司存春秋之法常事不書賢者識其大者而已白社書院在石人涇舊浙江通志衛富益敎授講學處久圮平湖縣儒學在縣治東瀕當湖𢎞治嘉興府志宣徳五年立縣吏部員外郎李亨肇建講堂後四年縣丞孫華建大成殿兩廡温純始建平湖縣廟學記縣有學而建大成殿則自縣人陸廸功珪始廸功故以博學孝友聞景㤗中施榖種施捾瘞餓夫千詔授廸功郎故稱廸功云初建縣㑹時詘力不及廟學廸功曰范文正公以其宅為吳學吾與以資豐後人寜佐公家急於是捐資構大成殿又同縣人沈昊佐建學宫廟學工甫訖縣令酹酒仰天為陸沈祝願世世簪紱不絶已而果然景泰二年知府舒敬重造膳堂庖湢三年僉事陳承重造櫺星門五年知縣童暉立射圃天順六年知縣張寜建明倫堂兩齋儀門成化十年知縣郝文傑新之癸卯御史劉