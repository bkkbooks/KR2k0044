body:
  text: 浙江通志卷一百八十六人物七孝友四衢州府唐徐知新唐書孝友傳知新西安人𢎞治衢州府志性孝葬父後灑掃墓所者十年產金芝叩之有聲父老白其事郡邑以聞徐惠諲唐書孝友傳惠諲西安人𢎞治衢州府志五世同居父母亡哀慟過禮靈芝生十連理鄉里稱其孝感御史大夫宇文融以事聞表其里為孝義余長安唐語林衢州人父叔二人為同郡方金所殺長安八嵗自誓十七乃復讎大理斷死刺史元錫奏余氏一家遭横死者實二平人蒙顯戮者乃一孝子引公羊傳父不受誅子得復讎之義時裴垍為宰相刑部李鄘為有司事竟不行謹按長安府縣志俱作常安考厯代小史與語林同作長故從之鄭崇義兩浙名賢録西安人為郡學士讀書序中忽心痛不可忍曰得無母有故乎奔歸母果病比卒結廬躬耕墓田以供時薦郡境有蝗獨不食其苗舍南木生連理處置使崔文上其事詔旌門閭後以眀經中第謝而不仕宋愼知禮宋史本傳衢州信安人父温其仕錢俶終元帥府判官知禮幼好學年十八獻書於俶署校書郎命掌書記宋太平興國三年授鴻臚卿厯知陳州興元府母年八十餘居宛丘懇求歸養退處十年縉紳稱其孝友母服除表請納禄至道三年以工部侍郎致仕知禮自幼至白首嵗讀五經周而後止每開卷必正衣冠危坐未嘗少懈咸平初卒年七十七趙雲名勝志清獻之子㞦執父喪甘露降於墓木孝友傳㞦子雲又以毁死人稱世孝江袤萬厯常山縣志字仲長少隨父通議公至京師樞密使曽布以女妻之還鄉閉戸讀書窮日夜不輟元祐八年補太學生丁父母憂哀毁如不勝廬墓側以孝聞宣和間方臘作亂自嚴州趨衢常山巳燬袤時避地嚴坑躬率鄉兵團保伍為守境計紹興四年謝克家出守衢州首加詢訪隆禮延致之以才行奏聞召見除編修所刪定官抗疏辭免還山周子言正徳江山縣志禮賢鄉人有孝行父母殁廬墓終喪不以寒暑易心人稱其孝蔡椿𢎞治衢州府志字永年西安人博學强記善屬文登進士第父殁廬墓弟松出繼鄭氏椿既仕得俸即取松歸凡先疇故廬悉遺之毛蕃八正徳江山縣志棠峰人膂力絶人曉武藝尤長於連珠箭父信叔遭賊執欲刃之蕃八直衝賊陣救父力戰於經堂山賊憚釋其父謂之曰所過鄉邑破竹而下若驍悍善射能以牛酒勞我我即去蕃八大罵復戰遂遇害屍棄石塘泥坳中是夕土石掩埋若神為者兄攀能從徐霖學遭母喪廬墓三年縣尹程珣為作孝思記蓋兄弟皆有孝行焉王撰正徳江山縣志父樞密副使被金人執仗義不屈而死撰時年十六身犯鋒鏑尋父屍殯於野晝夜號泣廬墓側者六年事聞録其官呉槩西安縣志字致一事繼母以孝聞上舍釋褐數歴郡守部使其貧如未達時陳晅西安縣志字子舒少喪父事母至孝登第後召入史館以不謝用事者出倅隆興府元蔣珏𢎞治開化縣志字伯玉事父芹澗至孝芹澗殁嘗謁墓念親嗜魚徬徨河側忽雙鯉躍出因取以祭當道異之薦舉不受眀王盛正徳江山縣志事母孝母死廬墓三年鄉人稱之趙一齋為作孝子傳趙夔江山縣志字舜臣弱􅃣補邑庠生宿齋肄業恐違定省涕泣不忍去及司訓髙郵迎母就養雖苜蓿必竭其誠母喪哀毁骨立嘗以靜逺名齋弟子稱為靜逺先生徐履成萬厯龍㳺縣志立徳鄉人性篤孝讀書談道門多知名士累辟眀經以母老不就母卒不食五日幾絶既葬廬墓三年徐珙眀實録龍游縣學生以善剪字篆書授陜西都司經歴父喪蔬食廬墓三年服闗改任常州府通判迎母錢氏就養錢殁合葬父墓復蔬食廬墓三年以父存日最愛蓮植蓮數本於墓下未幾花開並蒂詔旌其門曰孝行方冕萬厯龍㳺縣志字尚周性孤介事繼母撫昆弟遺孤人稱孝友以貢除兵馬副指揮年餘念母老上書乞終養居官一無所取嘗却徐總戎金而寘之法時服其廉及母死朝夕哀號目為失眀子鏜贑州寕都簿楊錞衢州府志西安人添之曽孫兒時即習定省儀長不染貨利正徳中貢入太學忽心悸遄歸父昊果疾越十日卒後以母老遂不赴選母病三年非迎醫未嘗去左右母卒錞以哀毁殁孫梁登進士何倫趙鏜孝子何倫傳字宗道江山人天性至孝居父憂哀毁踰禮忌日涕泣如初喪事母毛氏尤謹温凊定省事事必如禮家雖貧甘㫖不缺衣服必備一日母失雞陽為尋覔隂求其似者以進或笑其迂則曰不若是無以慰母心及母亡喪葬盡禮三年疏食如一日喪畢猶不釋服不入内鄉飲亦不赴曰親在淺土吾其忍乎家貧失學年二十七始發憤讀書初從陽眀先生學既從王心齋王龍溪諸公遊晚復拜甘泉先生於南都及歸充然如有得一夜盜入其室竊器物而出倫覺其入而不呼將取釡始言曰盍留此以備吾母晨炊盜赧然盡還其器發聲曰盜孝子物不祥自是其人亦不復為盜程本金實程孝子傳開化馬金村人幼好學涉聞經史大義永樂丙申母疾殆甚百計不療乃齋沐夜禱於玉霄宫置刀案上頓顙出血引刀刺脇者三刀墜地血滂然流仆絶良久乃蘇而受刀處痛稍止刀上見紫血一縷長尺餘大如韭葉視之肝也持歸煮糜以進母絶粒彌句至是聞粥香啜之畧盡乃不藥而瘳後六年母復遘疾數刲股以進不數日諸疾盡脱康强十餘載年八十而終宣徳間有司辟為江浙帥閫掾三司之長莫弗賢之兄性存為河南某縣丞以疾卒本悲痛號絶匍匐扶櫬歸葬撫其遺孤愈於已子𢎞治衢州府志字邦寧性至孝大學士商輅為作墓銘張永昌𢎞治衢州府志開化人𢎞治九年家大疫母垂死無可致力乃籲天潛以刀剜股肉熟而奉之母云何從得此吾心頓爽矣永昌血甚昏仆人莫之知適有靈祠巫降者曰前村張某為母割股流血且死宜亟往救衆往果然傅以藥久之乃甦母卒愈人皆稱為張孝子徐曦天啟衢州府志字叔睿開化人由舉人學正官文淵閣纂修父年髙乞歸養與弟叔謙甘㫖盡歡塤箎為樂喪葬盡禮人皆以孝友稱之汪悅萬厯常山縣志字徳進甫三嵗父行賈虧匱流離二十餘年莫知向往悦育於母稍長時時向母問父狀貌知左脇有黒痣欲求之不能自給比業醫頗得資訪知父在山東乃裹糧躡屩四年始得之濟南郡中解脇驗之良是父子相持而哭父於旅邸已别娶生女贅夫遂以家事付其女夫而歸奉養二十餘年以壽終悦年八十餘卒璩伯綵江山縣志字子光家貧力耕以事母母病躬視湯藥妻拂母意即出之母吐痰盈毆伯綵私取吞之曰痰寜病我因引刀割乳刲股弟伯縉亦刲股煮粥糜以進疾果痊後十年母卒哀毁廬於墓側有芝草生其傍直指以狀聞詔旌其閭王仲義江山縣志字宜之父篤疾􅂅以身代及卒廬墓三年刻木為像事之如生母薛病卒廬墓哀毁過甚竟死墓所妻徐亦以孝聞有司旌之徐員萬厯常山縣志字必方少孤貧依母再醮其弟曰進曰安曰掌俱四散糊口員稍長蚤起獲金環一枚於道用居積輒大售以起乃迎母歸養以次贖諸弟進先至後召安末欲召掌二弟有難色員曰義不可以利制弟而可棄吾不得與子先共餔糜矣二弟悟掌亦歸家成均析鄉黨服其義員年八十餘子琳廣信府教授張懐貞𢎞治衢州府志字應祥開化人父邦達任知縣有罪當刑伏闕陳情乞以身代上憐其意俱釋之尋陞邦達監察御史王鐸衢州府志字孔振西安人正徳庚午舉人為崇仁知縣疏立呉與弼專祠調湖廣竹溪縣決屢年滯獄三告養親不允及父卒遂終身不仕以事母毛公器正徳江山縣志父殁廬墓三年母殁仍廬墓側朝夕哀號有烏鳥馴遶人以為孝感有司以事聞旌其門邵信賢𢎞治衢州府志字啟眀常山人幼失父事母徐尤加謹母病躬侍湯藥衣不解帶母年九十四信賢時亦七十母殁葺草為窩僅可容身置喪側枕塊而卧朝夕哀慟因疾以終與母同日葬焉後以子思祥貴贈員外郎龔崇堯萬厯龍㳺縣志父有疾經嵗不瘳崇堯日夜衣不解帶及卒哀痛幾絶會隣人失火風烈甚崇堯號泣柩側俄返風火滅𦵏時有異鳥數百集塜上監司屢旌其門欒惠兩浙名賢録字子仁西安人師事王文成潛心理學事父母曲盡孝道母嘗患瘋疾手足拘攣者十三年惠温衾扇枕飲食撫摩必躬必親始終不怠及父母相繼卒與妻呉氏負土成墳廬墓三載朝夕哭奠裒絰不去身一夜風雨虎入其廬馴若畜犬服闋南胄移為六堂學長辭不赴時龍㳺水北梗化郡邑請惠往布行鄉約梗化者革心自是深居寡出而四方學者數百人以壽卒於家陳恩衢州府志字廷受西安人正徳戊辰進士為中書舍人充趙王陵寢使郤王餽先是公車北上聞父疾遂歸其在南雍時夢母疾徒步至家兩足重繭母疾竟瘳咸謂孝行所感葉希學萬厯龍㳺縣志幼孤育於母傅既長孝謹備至兄客死撫其三子如已出母卒哀毁垂絶子茂堅亦以孝稱茂堅子昌竭力奉父父病龥天以身代及不起廬墓終喪靈鵲來巢人稱孝感年百嵗而卒萬厯十六年詔建坊曰孝子百嵗坊施介夫開化縣志字公毅尚書郎恕之子母虞有疾侍奉湯藥衣不解帶者逾月母逝嘔血毁瘠扶柩還至丹陽時久旱河水絶流呼天號泣是夕大雨河水溢遂得歸葬母性嗜李介夫見之必泣家人不敢復設從陳白沙莊定山張東白遊余居中西安縣志性純孝二親逝幾不欲生每當春秋舉奠時必伏地悲號杖而後能起旁觀者為之酸鼻以母諱日嘔血而卒劉士傑西安縣志少孤事母至孝母病龥天割股母殁廬墓三年縣牓其門曰敦孝徐日敷徐鳴玉徐孝子傳西安人甫九嵗父病篤龥天􅂅以身代及殁哀動路人稍長事母克盡色養侍寢問膳愛敬備至五十年如一日母七旬齒落令婦以乳哺之兄亡撫姪姪亡嫁姪孫女不異所生學行兼茂為鄉里所式陳情衢州府志字汝孝西安人親疾龥天求代既葬有馴燕舞於墓側甘露降於墓木者五日為府學生與同邑王之屏講明理學旁及天文地理諸子百家之書數竒不售晚舉孝行郡守易倣之為作傳汪令徳開化縣志字潤中孝廉朝仕長子總角失怙事寡母張承顔迎志曲盡心力撫弟妹各底於成與弟令儀舌耕供母晚舉眀經司訓瑞安徐應雷衢州府志字震伯西安人五嵗喪母哀毁如成人事繼母呉氏以孝稱呉多病應雷禱天􅂅以身代叔某故庶出也父任道友愛之甚篤父卒應雷事之無異於父一時皆稱其孝友國朝葉南生舊浙江通志字珂玉號蒼眉天性孝友幼失恃哀毁骨立如成人及長父病革告天刲股絶而復甦者踰月及卒家雖貧祭葬如禮事繼母盡孝撫幼弟極友愛扶之成立己卯舉於鄉司李荆南尋解綬歸卒年七十江上達衢州府志字仲顯開化人性至孝父愛延客上達帣鞲侍立至午夜父不寢不敢寢遵父命焚遺劵濟急拯危無虚日明季寇盜充斥過其門皆曰此長者居勿入也二子長南齡次南極以南齡成進士封奉政大夫年八十六卒徐錫徳衢州府志字克明常山人大雅孫少孤貧母江氏病革龥天􅂅減已算延母壽率妻江氏侍奉惟謹湯藥必親嘗衣不解帶者累月撫弟姪皆篤恩義取產均析則讓膏腴而受磽􅇤其他樂善好施或焚劵或輸金不可枚舉題旌冊雍正六年具題奉旌宋觀教公舉事實開化人性孝父衍孺卒哀毁不欲生遇祭辰必號泣終日母金患瘋疾親侍湯藥不離卧榻者十五年後復染他症觀教焚香龥天􅂅以身代疾漸愈又三年乃殁哀痛如喪父時廬墓數載甲寅嵗姪𢎞禮𢎞信為寇所擄觀教罄囊贖歸事聞奉旌樊之鑛公舉事實常山學廩生父堯廩卒躃踊成服水漿不入口者七日事母詹氏尤孝謹母疾躬視湯藥衣不解帶龥天􅂅以身代及殁哀毁如喪父時既葬結茅墓側者二十一年後以哀毁成聞奉疾竟不起事旌董斌公舉事實龍㳺人甲寅閩變奉二親避居村落力田以供父母父病篤龥天請代雙目流血父母相繼終廬墓三載雍正六年具題奉旌趙叔廣公舉事實常山人父為賊所擄叔廣牽衣號慟不忍舍賊怒拔劍欲殺父叔廣冐刃請以身代賊憐而釋之遂得俱免於難母老兩目失眀叔廣以舌砥之嚙指血和藥以療期年復明雍正六年具題奉旌詹鳯儀題旌冊字韶成常山人九嵗喪父呼天搶地幾不欲生每出就外傅必禀命先歸代母執㸑母殁悲慟終其身雍正六年具題奉旌汪允祐題旌冊開化人負母避賊不憚險阻棄妻不顧妻投水而死允祐逃至遂邑山中糧盡乞食以奉母後母卒廬墓三年雍正六年具題奉旌張延聖題旌冊開化人性至孝家貧菽水承歡康熙甲寅值閩逆之亂山寇竊發父為賊所獲延聖星夜匍匐直闖賊營求以身代賊并繫之並受拷掠日久􅃹束少懈乘夜負父越牆而逃追急匿橋下深水中遂得脱兄延毓早喪遺孤森年十嵗亦被擄不知所往父痛念其孫延聖不避艱阻尋至江西樂平縣聞在賊寨百計措金贖回母病衣不解帶及殁哀毁骨立廬墓三年雍正六年具題奉旌徐灝公舉事實字景梁常山人性至孝康熙甲寅耿逆䧟城父錫徳被擄酷刑索餉時灝甫十四以身蔽翼叩顱流血曰寧箠我勿傷吾父賊感其誠兩釋之後父患喘疾灝侍湯藥衣不解帶者五載及殁殯葬盡禮廬墓三年猶不反親舊以禮相䋲灝泣曰吾久侍左右何忍置親獨處荒邱也族人有爭產者經年不能解灝開誠諭之曰若輩苐知有產亦念先人原屬一體乎遂割己地以釋其爭嚴州府晉夏孝先水經注孝先少喪二親負土成墓數年不勝卒元豐九域志嚴州州民喪父廬於墓側嘗有野火奄至俄而火為之滅尋復湧泉出其地唐祝希進唐書孝友傳希進桐廬人嚴陵志父喪廬墓側芝草生有巨蛇至其所元和四年旌表許利川唐書孝友傳利川睦州人冊府元龜為睦州司士參軍居母喪以孝聞有芝草八莖及連理樹一株產於墓廬詔旌表其門陳京明一統志桐廬人有至行親喪廬墓大厯十年刺史蕭定上言表其門時人目所居鄉曰至徳里日如曾戴元益唐書孝友傳元益桐廬人嚴陵志五世同居庭木紫薇枝生連理咸通八年刺史張蒸以聞旌其門閭何起門唐書孝友傳起門建徳人續文獻通考父死廬墓大厯中刺史蕭定以狀聞旌其門宋周大雅嚴陵志夀昌人業進士治平中居親喪廬墓三年羶葷不入口有羣鳥馴其旁趙清獻林還自京師道縣聞之因訪焉察其實行請於朝改鄉曰至孝里曰求忠今艾溪南即其廬陳氏三子嚴陵志分水人莫詳其名因父抱患危重三子同日刲股肉煮粥進父即愈景定庚申知縣蔣曉立坊旌之徐亨嘉靖浙江通志桐廬人宣和初方臘寇起亨兄為賊所執享叩頭告曰家有老母兄能養請代其死賊舍其兄而殺亨陸時雍嘉靖浙江通志淳安人幼孤貧與兄力樵以養母稍長補郡學生念母兄食不給語掌膳者曰吾日飯勿盡炊願輟一膳遺母自以一膳分為晨午後登宣和三年進士第中博學宏詞科歴秘書丞知建昌軍請以恩官其兄子徐眀嚴陵志建徳人紹興九年母病刲脅取肝以療之母病即愈余機嚴陵志字大倫遂安人母喪明以舌䑛之復眀如故嘉定元年舉孝㢘授江隂令方彞萬厯嚴州府志淳安人事父母至孝嘉靖戊寅知州鄭之悌名其里曰孝養唐時澤萬厯嚴州府志淳安人兄弟友愛終身無間言嘉定戊寅知州鄭之悌名其里曰友恭何崇源新定續志居建徳縣買犢鄉母蔣氏年八十四景定四年抱患沉重崇源於右股刲肉煮粥奉母即愈咸淳五年母再疾復行刲股母病隨愈本縣躬親存問申府永免戸役陳師清新定續志居建徳縣仁行鄉母年八十咸淳五年六月抱患危篤師清就右脅取肝煮粥奉母即安事聞旌表蔣徳定新定續志居建徳縣買犢鄉母呉氏抱患沉重徳定就右股刲肉煮粥奉母即愈有司以聞詔旌其門徐大發新定續志居建徳縣慈順鄉母劉咸淳六年七月抱患危重大發同姊五娘各就左股刲肉煮粥奉母即愈事聞詔表門閭元余丙元史本傳遂安人幼喪母泣血成疾父亡不忍葬結廬古山下殯其中日閉户守視有牧童遺火延殯廬丙與子慈亟撲不止欲投火中與柩俱焚俄暴雨火滅姜兼元史本傳淳安人七嵗而孤養母至孝母死哀慕幾絶既葬獨居墓下朝夕哭奠寂焉荒山中躬自樵㸑蔬食飲水一哀麻寒暑不易同里陳氏戴氏子不能事其父母聞兼之行慙感而悔皆迎養焉汪以興嚴陵志字伯可淳安人母聶氏生以興一嵗被逐鞠於嫡母既長知其故乃裹糧四方尋訪日久糧絶草眠丐食至宣城方得遇遂奉歸養十年乃終邵景新嚴陵志淳安人幼失父事母黄氏甚謹每遇病衣不解帶湯藥必親煮嘗而後進母年九十餘常穢床褥間景新輒以手除之及母殁停喪三年卧棺側寢苫枕塊朝夕哭奠如初喪眀姚甫姚夔姚甫擔骸傳字伯華桐廬人元末兵亂甫家頗温厚奉二親匿閬原山中各挾資費以行倉卒為羣盜所迫投叢莽間散失不知所在盜過父出呼子為後盜所得母聞賫所挾物馳救盜並推崖下墜石死眀日盜稍退甫遍野號呼追求不得哭聲徹天有告者曰爾親在崖下趨視之則皆死矣甫用絳紬被二襄其父母以肩擔之乘夜由間道奔桐江至姚家山祖墳之右採樹葉掩之晝伏夜作二晝夜穴成負二骸殯於穴仍負土築壘髙三尺痛哭嘔血而出計遇難時二月也不知死日每臨二月則終月絶酒食擁爐而泣淚傾注灰盡濕不已奉祭祀執爵哀呼如在膝下路人聞之無不感動子唯大仕洛陽令孫夔吏部左侍郎龍河南左參政甫壽七十卒贈通議大夫禮部右侍郎葬祖墳之次人號為延慶墓云蔡廷瑹嚴陵志建徳人性孝友父子儀病篤廷瑹焚香龥天乞以身代遂愈母盲廷瑹捐資濟貧祈保母目復眀成化四年知府張永以聞旌表其門潘仲春分水縣志字正和嘉靖癸巳父訪卒喪葬盡禮同兄孟春弟應春廬於墓左邑令旌其門朔望必親詣焉己酉以眀經選撫州府教授署臨川金谿二縣事循良大著仕豫章十年歸著有文集行於世汪士臣淳安縣志邑諸生父病劇晝夜衣不解帶因積瘁病目失眀比父病痊已目亦復明人以為孝感後父故叔嬸繼逝遺孤三尺親愛甚篤延師擇配分己產以贍之鄉族稱其義邵焜嚴州府志淳安郡學生孩提時即知謹事二親父遘重疾百方禱治不效乃割股以進尋愈萬厯二十九年學使題額曰旌孝以表之方汝成淳安縣志邑東金坂人事父母温凊必敬父殁廬墓三年母殁亦如之縣令海瑞親謁其廬題贈旌孝二字徐璠建徳縣志居父喪盡禮母病家被火乃衝火負母以出母生而璠則患燎以死妻宋氏安貧守志方雲槐遂安縣志字慕庭六嵗父文謹卒事母余氏至孝家貧力耕卜葬祖父負土成墳孺慕七十年如一日晚賔於鄉壽終隆慶二年知縣周恪表其閭曰節孝之門王瑁兩浙名賢録桐廬人幼失父事母至孝居喪哀毁骨立負土營葬廬墓三年慈鴉數百集於塜木瑁朝夕哭鴉亦哀鳴與相應喪畢瑁歸鴉亦散去人以為孝感章琳桐廬縣志字元器鍾山鄉人節婦駱氏子也六嵗母病時值溽暑即能為母扇枕人號為小黄香母寢室後有巨木多蛇母見驚病琳焚香籲天是夜風雷大作拔木出墻外母病即愈母殁廬墓三年寒暑無間作哀思録數十章府縣申請旌表給以冠帶年八十卒方貫萬厯嚴州府志淳安人家貧采薪以養父母父母殁負土為墳廬側三年虎至貫所亦不為暴終喪繪二親像凡事必告飲食必薦如親在時終身不娶迭奉院道旌異戴啟祥建徳縣志字警絃震享子為國學生父卒哀號幾斃以母在勉强飲食母年八十六卒撫棺慟曰兒一終母事即相隨地下矣抱病伏上以哀毁嘔血而亡子東旻成萬厯己未進士疏其事於朝命有司建坊旌表祀鄉賢毛國章遂安縣志字思程邑庠生吏部一瓚次子事父服勤盡孝及居憂廬墓三年足跡不至私室朝夕哭臨如初喪承遺命為伯父一珍服三年喪貲產一無所取姜宗齊嚴州府志建徳人父病篤割股救療以生後父故家貧如洗奉寡母撫幼弟不辭勞瘁母病焚香祝天願以身代湯藥親嘗跪送得母歡心母終以香木刻二親事之毛存元獻徴録字時春事母至孝母愉亦愉母泣亦泣母不食亦不食母恚怒則長跽竟日必怒釋而後起後母病將革存元目不交睫衣不解帶者浹旬祝於天願以身代迨逝絶漿屏粒雞骨支牀為孺子泣邑令感其孝以詩弔之并及母節陳滄王思任孝紋堂記字友泉淳邑諸生事嚴父惟謹母疾終月不解帶母卒廬墓三載事庶母若嫡友異母弟若胞晚年紋在其手曰全孝其孫王政徴堂額於予為題孝紋堂以歸之國朝徐萬照舊浙江通志分水庠生父志進崇禎間任㐮陽通判旋致仕丙戌山賊執志進索餽貧無以應萬照奔前救父願以身代賊不聽殺志進萬照奮不顧身以頭觸之亦遇害詹符舊浙江通志遂安人在前子康熙甲寅山寇亂符負父疾走數里賊追及以身蔽父賊怒殺之父卒以免毛周尹遂安縣志字藩侯十一都義門人性至孝母卒哀毁骨立順治乙未山寇掠其父之恒索重貲取贖周尹鬻產稱貸三赴賊營贖父不得力已竭乃號泣請以身質代父歸數日其父往贖則賊已解散周尹不可踪跡蓋死於賊中云康熈五十二年旌表其門妻王氏守節撫孤並同旌表時同族毛如絲父亦䧟賊力不能贖乃以身代父復自用計脱歸卒父子俱全衆尤異之方之琪公舉事實遂安人侍父病衣不解帶湯藥必親嘗及卒廬墓三年如一日甲寅弟為寇所擄母朝夕思念不已琪跋渉七年備歴勞苦始得弟歸事聞奉旌童愷公舉事實遂安人父升卒勺水不入口者三日孺慕終身母病涕泣悲號至嘗矢以驗及母卒哀毁廬墓郡守聞之扁其門曰純孝足風余琪公舉事實遂安人父人龍病龥天請以身代病獲痊母患瘋攣躬視湯藥衣不解帶者數載居喪哀毁聞者垂涕後葬松靈山三年寢食墓側奉侍如生後琪年至八十子孫介壽稱觴猶相顧泣曰爾逮事父母予不逮事父母耄年隠痛其有極乎任鼎福題旌冊遂安人母病醫藥弗痊鼎福龥天䖍禱五晝夜而母疾愈後年六十乃終與父合葬廬墓三載始歸康熈五十九年具題奉旌汪逵題旌册淳安人母卒哭泣擗踊水漿不入口毎念劬勞之恩輒嗚咽不自勝竟以憂思成疾越三載亦卒雍正四年具題奉旌呉逹觀題旌冊淳安人母喪號慟兩目俱昏父喪哀毁骨立廬墓數載雍正四年奉旌呉家駿題旌册淳安人母病癰家駿以口吮之夜則焚香露禱願減已年以益母壽母終執喪哀毁既葬守墓三載雍正四年具題奉旌余樹勛題旌册遂安人父卒廬墓三載事寡母尤孝謹凡服食起居必親為調理母殁哀毁盡理如喪父時雍正五年具題奉旌阮駿題旌冊淳安人八嵗失母號泣柩前不飲食者累日年十八父病篤籲天求代及殁哀毁骨立葬後廬墓三年雍正六年具題奉旌温州府宋仰忻宋史本傳字天貺温州永嘉人年五十餘執母喪盡孝禮躬自負土廬於墓側有慈烏白竹之瑞紹聖中郡守楊蟠表其里為孝廉坊大觀二年以行取士郡以忻應詔未幾卒贈將仕郎王輔甌江逸志父格病篤思得鯽魚方盛暑不易致輔禱於井釣而得巨鱗進父病旋愈輔子年十一親見之王十朋孝感并詩注予家有井稍大俗稱大井王家宣和壬寅秋先祖有疾思鯽魚時暑不可致先人釣於井而得之井素無魚葢孝感也趙彥霄自警編政和間温人趙彥霄兄弟二人父母服闋後同㸑十二年兄彥雲聲色自娛遂求析籍五年生計蕩然逋負尚三千餘紙霄因除夕置酒邀兄嫂告曰向者初無分㸑意以兄用度不節恐皆蕩盡俱有饑寒之憂今幸留一半亦足以給兄自今復歸中堂以主家務即取分書焚之管鑰之屬悉以付焉且言所逋負已儲錢償之矣兄有慚色從之次年彥霄與長子俱膺鄉薦一舉登第陳宗宋史本傳永嘉人年十六母蔡病篤刲股為餌病愈已而復病不救宗一慟而絶郡守陸徳輿云陳宗自毁其體哀慟傷生雖非孝道之正而能為人所難為之事亦天性之至官為合葬榜曰陳孝子墓薛特立萬厯温州府志字才翁永嘉人事母孝母年八十四齒盡脱特立夜焚香以禱於天嵗餘母齒更生後以特科授承奉郎張氏子萬厯温州府志逸其名性至孝親殁廬墓錢文卿嘉靖浙江通志樂清人方數嵗執父喪如成人時三舍法行文卿方冠領郡學生諸生肅然欽之奉母居白石山闔族同居三十餘年無間言連世瑜萬厯温州府志樂清人同妻方氏事母孝母死刻像以奉王十朋詣其家詢得實迹白之郡具酒禮之周忠輔萬厯温州府志字端臣永嘉人母葉氏嘗病癰竭力醫治藥必親嘗衣不解帶及母亡哀毁成疾卒元周樂元史本傳温州瑞安人宋狀元坦之後父日成通經能文海賊竊據温州拘日成置海舟上樂隨往事其父甚謹一日賊酋遣人沉日成於水樂泣請曰我有祖母幸留父侍養請以巳代父死不聽樂抱父不捨遂同死焉王貴翁瑞安縣志字君傳家貧授徒養母至正丙申山寇至貴翁不顧妻子負母避北海山為賊所執求貲弗獲褫其母衣貴翁抱母血泣賊怒殺之越三日母亦卒朱童子永嘉縣志逸其名居江濵海宼猝至母投江童子哭母亦投江死李寔萬厯温州府志樂清人元兵南下寔奉祖母母匿山中祖母母被執兵索金不得束火灼其祖母肩母號泣取水以沃火主者怒將斬之寔懸金刀頭挺身求贖見無活母意置金地上曰若去父母妻子萬里至吾土獨不愛其身乎若殺吾母吾寧甘心若耶主者顧左右曰真男子不畏死令取金而俱釋之後以子孝先貴贈員外郎胡野廬永嘉縣志父義為縣胥徒縣尹劉公源弟公寛以兵襲方眀善弗克方盡捕劉氏黨義被執野廬挺然出曰事劉尹者我也執父奚為遂斬野廬而釋其父周士威萬厯温州府志永嘉人至元戊戌方明善據温居千佛寺士威兄士行為明善守柵門因劉公寛夜襲罷守門眀善囚士行於獄士威詣獄吏請曰吾兄弟皆孤藉外祖母夏氏以存今夏氏八十六矣幸兄在求食養之吾無能為願以身代獄吏憐而易之士威遂遇害魏保萬厯温州府志永嘉人父忠亦以守門為眀善所執將斬之保趨刑所以身蔽其父曰是夕守門者保也保當罪伸頸受刃父得釋林甲乙萬厯温州府志樂清人早喪父傭作養母及母卒家貧歛以薄棺越數日屍壊液流棺外穢氣逺聞甲乙盛以磁器對天慟哭盡飲之流液遂止穢氣亦息人以為孝感所致張端平陽縣志涿州人父君錫至正末任平陽州判官因家焉時方眀善破平陽俘君錫入郡城端隨往日夜涕泣不食父曰我分在必死爾歸視家勿以我為念端曰父辱子死兒寧獨生既而眀善沉君錫於江端抱父俱沉死王泰最樂編永嘉人幼失怙恃鞠於伯父呉元年冬明兵至伯父為兵所執求財物不得將殺之泰年十五匿叢薄中躍出紿兵曰兒知瘞物處伯父遂得釋去泰引兵佯掘數坎悉無物乃涕泣告曰兒實欲脱伯父而代之死兵怒斬之仆於地各散去伯父還撫泰屍哭見頸骨已斷而喉尚連屬乃捧其首合於頸取藥塗瘡舁之床試以水滴口稍能嚥七日乃甦言方斬時若風泠然過頸良久熱痛暈去若有數人過且指曰此子甚孝不當死即令一人療治之頸若氷雪痛遂止凡八越月瘡始合而首竟偏眀薛敬萬厯温州府志字思恭永嘉人幼孤同兄養母一日母過姻戚家至暮敬往迎歸經池側母堕池中敬投水兄抱母兄適至援母得生敬竟殁張正蘇伯衡張正傳字思中平陽登瀛里人九嵗父仲逹喪鞠於母林十三嵗母瘡發於額醫視曰此瘡惡不可言腫若至鼻即不可治正憂懼倉皇走城隍祠匍匐泣禱引刀刲股肉持還家粥以食母瘡立愈年三十娶婦陳事姑稍懈正曰娶所以為養也若不盡力奉母何以爾為妻亦感悟洪武丁巳秋母滯下伏枕血糞淋漓正時以手掬去之無難色後六年母疾醫謝不可為正禱於東嶽行祠復刲股和藥藥未進而母殁矣朝夕悲號既葬日至墓所哭泣無間寒暑陳經孚名山蔵平陽人少孤事母至孝遇倭至負母逃避竟遇之途倭索母耳環經孚䕶之倭以刀截母耳及其肩而死手猶未釋母也黄遜永嘉縣志痛父早逝奉母極孝母肱目失明遜扶持不少離母殁哀毁踰禮與人言及父母輒涕泣廬墓終身章友善平陽縣志父成髙在海塘虎攫之友善奮不顧身疾奔以拳毆虎筯骨盡露虎棄去父得活後友善手愈而骨折薛必光温州府志平陽人少孤年十三事母及祖母盡瘁傭作以養祖母及卒鬻身以供喪事母病刲股以療及卒柩在家倭寇大至空村避去必光獨守母柩不避賊亦不入人謂孝感南孟眀温州府志永嘉人父文相以荒榖事罹罪孟眀方弱冠挺身代父備受箠楚事白郡守劉芳譽褒其孝王欽穆温州府志永嘉人父以中書謫戍閩省欽穆年十三詣闕上書朝憫其孝為復父職朱元昊名山蔵樂清人事母孝母性嚴厲元昊年五十嘗受笞治生池上值寒凍誤墜水中母疑其受笞而愠也怒復杖之衆為跪請得已其妻又以子婦之讒不悦於姑元昊不敢辨屏之十餘年寢處常在母側後以庠生應貢且行母乃召其妻復為姑婦如初陳序平陽縣志字惟倫正綂間父侃病劇三刲股以療大學士李東陽作詩紀其事葉世愛萬厯温州府志字友敬樂清人家貧出遇甘美必懐以遺親親病時多蚊乃裸卧其旁以身飼蚊親不食亦不食早喪妻或勸之娶曰男子失義何以責婦人乎陳厚樂清縣志業傭作漁於海得鮮必供母母病蠱衣被單寒以身温母母死殯山谷間夜雨常以簑笠往卧柩側一日外出夜半暴雷即奔赴柩所何小二萬厯温州府志樂清人年十嵗父為寇所執貧不能贖小二請往代母固止之泣曰父歸則舉家可活否則俱死遂竊往得父還小二竟不知所終姜約姜絅瑞安縣志約字子充弟絅字子斐俱廩生事親孝養備至兄弟燕見如賔斗粟尺帛未嘗私入親殁廬墓三年約以貢死京邸絅聞朝夕慟哭迎櫬歸數日亦飲哀而卒葉瀚永嘉縣志幼孤事母病數嵗不懈妻不順母意逐出之邑令邱汝材表其門國朝吕世英舊浙江通志永嘉人父鳴益疾篤世英割股療之至再病再割皆愈順治六年巡按趙㟨具題奉旌處州府宋何執中宋史本傳字俗通龍泉人進士髙第為大學博士以母憂去寓蘇州比隣夜半火執中拊柩號慟誓與俱焚有頃火郤柩得存大觀初進中書門下侍郎為太宰遷少師封榮國公卒贈太師追封清源郡王諡正獻高停肱括蒼彚紀麗水人七嵗喪父廬墓盡孝至和中郡上其事表其門後名其子曰孝臣陳茂元括蒼彚紀麗水人居母喪哀慟水漿不入口者四日既葬廬墓太守崔愈躬顧其廬改所居為孝行鄉表其行實於朝治平元年勅賜粟帛趙文澤續文獻通考麗水人六嵗喪父廬墓有羣鼠啣花白鶴來巢之異郡表於朝大觀初詔賜帛五十疋周竒括蒼彚紀麗水人九嵗喪母卧墳側二年有赤雀數十巢其旁可俯而窺崇寧中詔賜粟帛周智括蒼彚紀字惠卿麗水人六嵗喪父廬墓有紫芝一莖七葉之瑞郡上其行於朝㑹成均策試多士以商山節婦麗水孝童為問徽宗覽之命編入時政記高宗朝勅賜孝童出身終從政郎嚴州建徳丞潘洵仁括蒼彚紀字行中松陽人宣和中盜起奉親逃匿遇賊奮身翼父身被重創不少却賊内刃相顧曰孝子也引去及長遊塲屋不利遂躬耕以悦親孫重開登淳熈十一年進士周孝聞括蒼彚紀龍泉人七嵗居母喪廬墓政和十年以孝行薦命以官不受邑人即其所居立門曰孝子以旌之楊富老續文獻通考麗水人七嵗喪父廬墓三年不返烏鵲來巢木生連理紹興中太守葉顒奏於朝詔賜粟帛録付國史王源司蒼彚紀麗水人父大方紹興中任江西安撫既卒歸葬於鄉之梅村源方九嵗廬墓哀毁癯瘠服闋父老列狀於郡太守謝伋延入郡學奏於朝賜粟帛宣付史館詹迥括蒼彚紀字眀逺縉雲人幼廬墓致甘露降於家官至禮部尚書觀文殿大學士少保齊國公致仕葉應光括蒼彚紀麗水人咸淳中母王氏病革應光夜半燃香禱天俄有鳩飛墜應光取烹和粥以進母病即愈元至元間耆老舉其孝行表其門薛溶括蒼彚紀字平川松楊人繼母項氏性酷溶曲為承順奉養備至每嵗時為壽率子弟羅拜積久項感悟愛溶若已出及項殁喪祭盡禮宋太史濂嘗稱之元祝公榮元史本傳字大昌處州麗水人隠居養親事母甚孝母殁居喪盡禮竈突失火公榮力不能救乃伏棺悲哭火自滅鄉里異之塑二親像於堂朝夕事之如生潘抃景寧縣志字熙道惟徳子父喪哀毁蔬食三年不入内寢事後母朱尤孝謹元祐中以孝行徴葉峴括蒼彚紀字見山青田人母嘗病心痛扶持不離側母憐之令外息峴夜潛入間壁捫心逹旦母終舉進士歴官南安尹詹國芳括蒼彚紀松陽人元季兵亂親不獲葬寇至國芳抱棺號泣寇曰孝子也不忍加害既葬廬墓哀戚積雨崩廬體不受傷衆異之劉順括蒼彚紀字子謙松陽人父故母病竭力罄家貲以延醫至廢寢食母將危刲股進療焚香告天願以身代迄母病瘳絶葷酒以祝母壽邑尹表其門眀祝崑眀孝友傳麗水人元末奉母避賊山中賊追及母急投崖下崑擲身赴捄忽雷雨大作賊駭散一時避難者俱脱母墜深崖幾絶崑挂樹梢不死卒負母而登洪武七年舉孝廉授知縣未幾乞養歸祝金兩浙名賢録字廷心麗水人師事宋景濂洪武甲寅父彥方同知安樂坐累謫役鳯陽金即脱縫掖衣短後衣負貲裝往代勞役眀年父遘癘金龥天請以身代父瀕死者數四絶而復甦已而父遇恩得復官遂引年致仕既歸而疾作弗能起金盡心湯藥衣不解帶者七年父殁擗踊不欲生恐傷母心扶杖啜粥治喪寢苫三年毎夜伏塊飲泣比曉拭淚以事母備極甘㫖時時强笑以求母歡未幾母復殁哀毁如喪父凡父母平生所嗜終身不忍食遇忌辰必先期齋沐致祭必慟哭不食者累日己卯分教嚴水改江浦教諭乞致仕歸葉繼華松陽縣志年十六父僉解白糧洪武初軍興糧急違限輒死四子皆哭别繼華獨曰吾隨父往設有意外吾當代奚哭為父以繼華年少不聽往繼華尾之而行比至果愆期將就刑繼華乞請代父適同時亦有母子爭死者皆哀號動地司刑哀之上其事得俱釋高文㫤括蒼彚紀字仲暘處州衛人力學安貧事親孝母病刲股救療籲天願以身代既喪停柩寢室夜半聞母大呼曰好看我文㫤驚須㬰隣家火起文㫤撫棺痛哭火至舍傍而止又葺廬墓側虎夜啣豕遺之去人皆謂孝感後以貢任廬州訓導陞潼闗教授即致仕歸年九十餘鄉里稱耆徳陳遂括蒼彚紀字宜民麗水人由選貢任曹州學正天性孝友割股廬墓出於至性兩奔親喪徒步千里嘗易己產代姪輸逋負著有孝順言行録厲孝先崇禎處州府志青田人少貧父被誣繫京師身往代之尋白其事父遘疾卒孝先竭力營喪欲還柩路逺乏資悲泣不勝思自鬻其身鄉人仕於朝者聞而憐之贈以金帛始得歸葬馬璉崇禎處州府志字宏器縉雲人父病癱瘓璉衣不解帶焚香於臂龥天祈代父殁哀毁莫任負土築墳自程其力日致四十擔里人名其墓曰孝子樓景明括蒼彚紀縉雲人父疾刲股和羹以進籲天祈代父卒停柩中堂居隣失火號天大慟火隨息後舉孝廉知魏縣鄭濂括蒼彚紀縉雲人代父往戍遼陽以不及事父望雲悲泣不置同役者呼為望雲先生統兵者聞而憐之令代還奉養益謹及父亡哀毁成疾卒周豪縉雲縣志父久病醫禱弗效祝天斷葷飲三年毎夕聞香拜斗祈代忽一夜夢神告曰園有鳥可療起索果得一鳥為羹進父疾瘥發為疥豪日夜抑搔之其妻屢勸治生怒出之父疾復作斷葷祈禱如初疾又愈後父終無葬具傭身取直以葬廬於墓側越期而死鄉人憐而葬之從子紋事父亦孝父疾升屋籲天願代果先亡父壽竟期頤丁愈括蒼彚紀縉雲人早喪父事母先意承順母病龥天願以身代及卒罄產營葬泣血三年貢授景州訓導曰仲弟姪壯未室季弟業儒未官安得自享公禄迺為姪娶婦與弟貲納為典儀自少至老無一忘語識者咸稱為道義之士吕琅縉雲縣志好讀書至老不輟丞建平有徳政未幾歸值父喪時方沍寒水漿不入口赤足履地四日而病六日而死周思立遂昌縣志洪武末父閎宗畏為掾自斷其指時法當徙事覺逃匿官執思立詣獄㑹大雪數尺思立被拷掠置雪中幾死遇赦乃求得父父意思立必死悲泣喪明思立日䑛其目卒復眀人稱孝感黄夢庚黄夢裴蘇伯衡黄夢庚夢裴合傳夢庚字伯眀弟夢裴字伯晉麗水人兄夢池為龍江宣課司大使以入課鈔惡繫刑部獄夢庚走京師視之㑹有詔眚罪無大小得輸粟邊郡自贖夢庚謂夢池曰兄罪不可測天幸有此願鬻家田往輸夢池持不可曰今日鬻田父母他日何食夢庚曰兄繫獄父母朝夕食不下咽使兄獲免罪歸父母啜菽飲水無不樂者兄如終不可當擊登聞言於天子夢池恐乃許之夢庚馳還家白其父夢裴欣然持券東西奔走貿白金予夢庚乃北行道病幾死者數達大同輸栗五百斛刑部乃議出夢池周子輝括蒼彚紀字彥華遂昌人弟子忠永樂初被誣坐死罪連妻子子輝謂其妻曰吾弟死二子尚幼未能保其必嗣若姪與其母俱死吾忍弟弗嗣乎妻曰以吾次子孟曉代之子輝曰是吾意也遂以曉往曉方十四嵗慨然從命往竟刑於市子愛與妻愛弟二子若已生後俱長復以己產均分鄉人義之稱為伯道李洞眀一統志麗水人舉進士賊䧟郡父没於寇洞隨官軍収復得殺其父者手刃之盧猛崇禎處州府志龍泉人幼盡孝道行跡甚著郡守監司上其事號所居曰孝義山趙初兩浙名賢録麗水人少逰邑庠生貧力學事父母以孝聞宣徳間父以疾卒初哀毁骨立杖而後起苦無葬地友人呉伯昭割地與之躬負土成穴遂成疾竟不起其友牛通憐初之死於孝也并其親葬焉李僶兩浙名賢録縉雲人侍郎棠之子事父母承顔怡志竭盡其誠父撫廣西侍母左右頃刻不忍離及應貢母固遣赴部冢宰王翺欲授京職以母老辭曰願歸養不願仕也與金華教授又辭翺曰有此父乃有此子既居喪蔬食三年足跡不履私閾祖母楊氏久患痰僶以口吸之無難色樊廸崇禎處州府志縉雲人事父母承順温清動遵古禮雖薄味必親製以進母年九十終寢苫三年得疾事父益謹同寢處垂三十年父百有三嵗殁哀毁如喪母都憲周南傳其事副使朱裳為文以祭黄鐸兩浙名賢録字仲信遂昌人曾祖道俊丞襄陽以詿誤下大理祖原昭擊登聞鳴寃撾死鼓下鐸痛祖以孝死乃建望雲庵肖像於中哭泣不輟以孝友名其堂至今稱孝友黄家顧仕成崇禎處州府志龍泉人事繼母孝謹母病疽吮血而愈及殁哀毁既葬廬墓三年有白兎紫芝之祥景㤗間旌表楊泮括蒼彚紀字肇卿慶元人幼喪父甫冠補邑庠生竭力事母母病焚香祝天請以身代仍割股療之未嘗頃刻離母側母殁數日不食二親墳土石皆躬負廬墓三載歸歸母素畏雷毎遇風雨往墳哀哭樊灃縉雲縣志字時逺父敬宦北京居官清苦灃履艱厯險備盡孝養父殁哀慟成疾而卒著有永思録季叔眀慶元縣志字正吾官無錫丞母老告歸母卒哀傷絶食而殞當道旌其廬曰純孝湯成大景寧縣志事母孝謹妻潘氏少拂母意黜之母年漸老雙目俱瞽日為梳洗澣滌問寢視膳年七十無懈母壽九十卒葉志遂昌縣志字希尹母病割股以進後志病篤子尚木亦割股以進孫克芳方九嵗亦割肉療母人稱世孝單槐崇禎處州府志處州衛人事母盡孝逮貢母年七十依依子舍不忍離母病躬親湯藥日夜忘寢致右目失明冐雨渡溪延醫失足水中得漁人救不死子熙載陳州同知有父風張處重兩浙名賢録景寧人父伯澄以詿誤被逮檄至度不能免欲自經兄弟四人皆徬徨無措處重年二十獨毅然曰事雖難脱顧可坐視父刑乎囑其妻周氏曰我往必死汝當善視吾親撫吾子也言訖就逮竟死於獄周氏刻苦自立終全晩節人稱孝節呉翺括蒼彚紀字存翔景寧人成化丁亥母陳氏遘疾越眀年疾且劇百為不療計無出翺忽晨起悉以家事屬諸弟若有事逺行者貿貿而出衆莫測其意至墓扶憊而歸喘息仆卧出肝肉寸討付諸弟衆方詰之曰吾度母疾不可治走謁神祠剖􅅐取肝以香爐中灰塞血穴血出不止遂昏然無所省比覺日已向夕蓋既夕而復甦也遂剉肝内糜中母食之疾頓愈聞者為之垂涕焉梁祚潘琴孝感記景寧人母終未葬成化間洪水暴至衆競挈資具以避祚獨念母櫬未舉號泣徒跣躬往攀扶漸水深不可立顚踣幾沈没者數四祚盡力以必濟為期既而水勢盤旋若有推而助之漸入堂奥得一樓梯為固乃號於人曰母櫬可以無虞矣既而檢其家具所漂失者亦甚無幾衆咸異之王葑續處州府志字徳敷麗水人嘉靖己未進士觀政刑部接丁兩憂廬於墓側者五年跬步不入私室致有馴鹿之瑞竟因哀毁遘疾而終入祀鄉賢易文續處州府志字宗周處州府學生天性至孝學使屢旌之因父以中風卒於浴盤終身不浴者三十年由貢仕至益府教授以壽終呉一鵬續處州府志遂昌人年十七同巷失火一鵬在外念母奔回家己在烈熖中狂號欲入人以火勢甚熾殺身無益力挽之一鵬曰母死何以生為挺身而入火斷出路母子俱斃有司白諸當道建坊以旌焉李正蒙崇禎處州府志字汝眀縉雲人萬厯庚辰進士禮部儀制司主事考滿當選以父老乞終養先意承志十餘年如一日著有白華樓集潘沆崇禎處州府志景寧人謹厚業儒凡詩文過目成誦事母甚孝冬必以身温被母卒家貧跣足營葬結廬於樹守之子琴成進士徐鼎臣崇禎處州府志字忠孺松陽人總角時母有危疾龥天刲股幾絶母卒不能起號痛廢寢食服闋補弟子員以扶父櫬於京邸勞瘁而卒人稱其孝鄭賡居舊浙江通志字而名號寳水縉雲人少以聖賢自勵天啟丁卯舉於鄉事母極孝一舉動必稟命晨昏愉惋如孺子執親喪水漿不入口三日葬則躬營土石所著有讀易蒐春秋引斷質疑語林諸書國朝㠪家較題旌冊雲和人康熈十三年耿宼掠鄉邑父王產被擄燒身索金帛將斃家較直走宼所哀懇求代寇乃解父索繫其頸家較割衣一幅剪髪一縷授父曰兒必死以此寄兒婦為他日遺腹作念寇挾之行至泰順遇官兵得釋歸見父相持號泣事聞奉旌浙江通志卷一百八十六
