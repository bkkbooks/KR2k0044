五每高二丈濶比高之數縮其半覆屋三十七楹礱甃精宻結構堅固民有攸濟矣橋成徵予為記尋壞今建草橋阜梁橋崇禎處州府志在九都竹口慶元縣志明永樂九年里人周喜初建嘉靖十一年通判周紳重建萬厯四年壞知縣沈維龍修建國朝順治間竹口居民重建雲和縣縣前橋嘉靖浙江通志在縣南雲和縣志知縣劉琛建桂林橋崇禎處州府志在萬壽宫前步月橋括蒼彚紀在鳯山麓旋帶學宫縣治沙令橋舊浙江通志在􅂷休寺西括蒼彚紀橋南倚溪之側有覺是亭邑人吳浩建梯雲橋括蒼彚紀與沙令橋近祈豐橋雲和縣志知縣林汪遠建祈年有應故名石門橋舊浙江通志在縣東五里兼濟橋括蒼彚紀通景寧邑人陳良言柳仲楷建七尺渡嘉靖浙江通志在四都雲和縣志縣編渡夫四名謹按七尺渡在縣西三十里尺一作赤西至龍泉縣之武溪隘十里兩縣接境處也羣山四合溪流横亘其中疊石架梁以通行者有間道達石塘及松陽至為險要石塘嶺根渡雲和縣志在八都舊無船往來阻涉明嘉靖壬午知縣胡希銓歲編渡夫一名宣平縣三元橋嘉靖浙江通志在縣南一里宋景定初建明正徳甲戌重建王塤重修三元橋記距城一百二十里為宣慈鄉北抵金華南通甌海沿流浚源於樊岡春湍夏潦衝激悍駛涉者病焉宋景定間鄉之祝氏王氏鄭氏協力以建二橋厯年多壞於水火歳甲戌松坡王君子文好善勇義慨然勉承舊緒復捐金穀崇址於淵釃流為三道梁駕其上每長二十丈有竒每一丈有四翼以扶楯如其長之數而倍之翬飛輳集烟火相望普照寺覺菴圓上人白業宏願協衆皆樂施舍而王君子仁克敦祖訓又子以地遂捐衣鉢建佛堂於岸左又助田若干資湯茗暍日以飲行者於是橋與堂相與為無窮矣槐溪橋崇禎處州府志在縣東五里天順六年道士高希度建通濟橋括蒼彚紀在縣南宋里人鄭嘉遯建歲久屋壞明景泰間同知鄭建主簿練敬同修尋壞於水嘉靖間知縣張僎縣丞宋鎬為石址橋屋改舊名通徳為通濟癸卯夏洪水復圮其半知縣蕭彦重修蕭彦重修通濟橋記宣平縣南有通濟橋初以木為之而屡廢嘉靖五年縣尹張君僎來宰是邑乃與二尹宋君鎬謀修之鳩材命工以石為基者五以木為橋屋者二十四梁成而張君擢興化府判宋君亦更餘姚去予至宣平縣之三年癸卯夏暴雨蕩溪而橋圯者半是秋予議重修捐俸金付諸尚義之士市木石趂寒沍而急舉焉甲辰夏四月橋則煥然復新矣杉坑橋栝蒼彚紀始建前灣潘儀倡明隆慶三年大水衝圯署縣事縉雲敎諭劉瓚捐俸命儀之子正忠重修濟民橋崇禎處州府志在縣南六十里明洪武初里人祝伯思架木為梁景泰間推官黎諒重建天順四年奉御楊均保重修嘉靖間知縣蕭彦重建思恩橋舊浙江通志在縣南六十里括蒼彚紀明成化初縣丞溫潤重建尋廢置舟以渡通仙渡嘉靖浙江通志在縣南三十里即三港渡路通郡城崇禎處州府志邑人祝宗捨田給之王深源三港渡記隸栝之縣七麗水為之冠隸縣之鄉十宣慈為之冠其途四通五達有津曰三港行者必經焉凡鄉之水皆㑹於兹素無舟梁之備是以旱乾水溢行人莫不告病有祝君希聖者鄉之好義君子也見而憫焉乃築室於津之陽擇謹厚者居之籍良田三十畝俾歳收其入水縮則架木為梁以利徒涉溢則具舟楫濟險灘且設茶以飲憇息之勞者於是行者若履平陸無墊溺沾濡之患莫不咨嗟歎息共稱其賢屬余為之記赤􅙹渡崇禎處州府志在縣西北二十里路通白㟁坑及松陽景寧縣龍首闗景寧縣志在六都黄水坑去縣東二十五里謹按龍首闗地名黄木坑懸崕絶壑最為險要闗即龍腦橋水流峽中兩㟁陡絶架橋其上明嘉靖中以倭亂故設闗以備之又有龍滙闗在縣二都白鹿闗在縣一都俱嘉靖三十六年備倭知縣鍾夏嵩建黄垓隘青草隘崇禎處州府志俱可防禦過此為慶元縣謹按青草隘東有緑銅隘去縣東五十里與青田八都相接正綂間黄壇盗起守此拒之冦不能上又盧棲隘在縣東八十里與泰順縣小堰相接蜂桶隘在縣東南八十里又南十里為石佛隘與泰順之平寮相接明嘉靖間倭陷泰順莒岡守此三隘以却之上橋景寧縣志在縣治左下橋景寧縣志在縣治右相傳有仙人臥橋上以扇揮蚊至今上下半里蚊皆不集遭焚久廢國朝康熙四十四年重建改名睡仙橋聚仙橋括蒼彚紀在縣南十里湯夫人靈應仙蹟在焉洪嶺橋景寧縣志在縣北十里適府必由之路山水暴溢民艱於涉明隆慶五年知縣陳嚴之始設木橋民便之白鶴橋崇禎處州府志在縣南四十里建時有羣鶴來集故名渤海橋舊浙江通志在縣北四十里沈庄橋景寧縣志與雲和接壤適府必由之路明隆慶間邑民黄五掘地得金捐建浮傘渡括蒼彚紀在縣西大均潭馬女仙常以傘渡故名鍾夏嵩浮傘渡詩古渡春雷動桃花浪欲生片雲三島遠孤嶼一潮平樹繞神仙國溪通錦繡城横舟頻擊楫莫負濟川名浙江通志卷三十八
