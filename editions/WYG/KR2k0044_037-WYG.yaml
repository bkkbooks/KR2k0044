body:
  text: 浙江通志卷三十八闗梁六嚴州府建徳縣附郭縣治橋建徳縣志在縣前明萬厯十一年知縣俞汝為建三元橋嘉靖浙江通志在郡治南嚴陵志舊名卧龍明洪武初改名宣威正統十三年知府黄澍以郡人商輅中三元立坊其上橋亦以名建徳縣城外闗梁烏石闗嚴陵志在縣東十五里謹按烏石闗以烏石山而名江流所經下有烏石灘又有三河闗在府南四十里即東陽江渡口也唐置三河戍於此宋為三河驛當金華大道鮑公橋建徳縣志在城西和義門外龍山之水從北門遶城至武定門以達西湖向有磚橋跨其上國朝康熈九年協鎮鮑虎易以石梁左右皆竪石楯故名吕公橋嚴州府志在城西一里為徽寧及淳遂夀經行之要路當山谿之水直入大江行道患涉明萬厯三十八年知府吕昌期捐俸倡成余浦橋新定續志在朝京門外宋景定辛酉建圮於水郡貢士王炎重築嚴陵志明洪武初重建成化七年知府朱暟復拓而新之國朝康熈七年協鎮鮑虎改建石橋圍以石欄苔溪橋建徳縣志在城東南十五里通浦江為浙東要衝明萬厯三十五年建復於橋之西建一菴以䕶之知府吕昌期題扁曰長虹永鎮國朝康熈元年重建後山水衝決橋圯為木筏以渡行人胥村橋嚴陵志在縣東北三十二里胥村舊名朱紫橋明洪武三十二年建正統間圯𢎞治五年知府李徳恢勸諭邑人王景貴捐貲重建長二十餘丈改今名李徳恢為記風硎橋新定續志在陪郭塢有亭八楹宋景定辛酉圮於水嚴陵志明永樂十六年九峰寺僧重建濟川橋明一統志在府城東北五十里白馬澤嚴陵志元至正七年里人吳元俊重建賀方為記招賢橋建徳縣志在城西六十里嘉靖浙江通志漢會稽太守朱買臣嘗寓此築室讀書鑿池為滌硯所後人因名曰朱池又名其里與橋皆曰招賢烏石渡紫溪渡嚴州府志二渡在東闗下五里風濤最險時有覆舟之患明萬厯四十年知府吕昌期捐造船二隻分為上下兩渡令其遇風覆舟協力相救閒則渡人往來仍置田六畝以給工費淳安縣錦溪闗舊浙江通志在縣東六十里謹按錦溪闗其地有小溪巖怪石巉削水陸俱險嘉靖間知縣洪英明設闗於此以禦礦寇青溪橋嚴陵志在縣南跨溪為浮梁舊名百丈橋宋淳熙六年知縣陳曄建胡南逢百丈橋記淳安舊名青溪以瀕溪而名也源自黟歙東注浙江旁連衢信甌閩諸郡以趨吳㑹往來櫛比朝夕不絶舊有浮梁規模狹小車馬之蹂轥雨暘之剝蝕漫不加飭至布板以渡渡者凌兢或墊溺以葬魚腹令尹慨然捐俸以先之邑人皆喻歡趨樂助命僧如海總焉自始庀工越五月而竣南北百丈因以名橋堅厚平夷如通衢軌道行者嘆因循之久而作新之速又念風雨燥濕之不齊腐朽波蕩之不保於後也市田百畆有竒歳收其入使修者有繼較夫粉飾目前而不計異時以傳舍梯榮者相去億萬鄉父老屬予為記乃次第其語題於橋之礎庶幾遒人過之或摭以上聞也慶元三年知縣鄭擢新之淳祐丙午知縣虞兟改令名王遂青溪橋記淳祐六年淳安縣青溪橋成知縣事凌陽虞君兟求文以誌不朽淳邑山溪上受歙流下過錢塘而注之海比歲邑多水患屋廬漂蕩津梁之設屢修輒毁虞君捐俸錢四十萬為之倡官吏人士駢首聚財長橋貫之為節一十有八浮橋跨之為節二十有七絙鐵聨舟其數一倍始於秋七月成於十月妄費盡省而徒杠輿梁之病不聞易名青溪廢興之故曷可以不記因采民之歌而繫以詩馬踏橋嚴陵志在縣東一里相傳昔有仙人騎馬過此馬跡猶存西硎橋嚴陵志在縣西三里上有戈府君祠又名闕安橋淳安縣志一名武安橋邑人洪本美重修惠人橋新定續志在龍山鄉跨合洋溪長三十丈累石為趾架屋其上嚴陵志宋淳熙二年重建一名合洋橋陳􅈌合洋惠人橋記合洋有溪衝衢絡繹行李問津憧憧不絶異時編新獨木以濟投步惴心若春夏淫潦狂湍坌來則蕩析委波而逝咸逾旬阻絶無以濟不通民病涉久矣今為橋其上修三百尺廣十二尺負幹甚隆布版則宻覆以長廊掖以朱闌堅縝傑麗長虹卧波若濟巨川毋假舟楫予甞揆諸易凡履險者必曰涉川所以利涉而濟險者莫橋若豈惟橋哉凡爾民處心惠濟毋行險而胥溺毋薄人於險能如是橋以通往來無彼此隔阻之虞居斯世也豈不砥如坦如永底蕩平哉是為記淳熙二年徒杠輿梁告成之月也平水橋嚴陵志在縣南五十里溪流峻急涉者每有墊溺之患明成化間知府朱暟通判劉永寛始為木橋以濟之名平水橋聚星橋淵鑑𩔖函在縣東南五十里相傳宋時近橋有邵氏前後五人登第故名魁星橋明一綂志在縣東北六十里以其地有魁星石而名馬巖橋新定續志在安福鄉制如合洋橋而其長過之仙人橋嚴陵志在縣西八十里尹山銅源古有汪聖僧菴橋居菴前其北一石儼立若人鄉民因以禱祠焉青溪渡嚴陵志在縣南一名縣前渡楊彜過青溪渡詩天闊銜江雨濛濛上客衣潭清魚可數沙晚雁爭飛川谷留雲氣鵜鶘傍釣磯飄零江上客欹側一帆歸江暉青溪夜渡詩月沉河静水無烟獨倚中流欲進船兩岸山光涵夜色數聲漁唱白雲邊桐廬縣水闗嚴陵志在縣東二里桐江口謹按水闗當桐溪入江之口合江巡司置於此又有浮橋闗在縣北五里桐溪上柴埠闗在縣東南二十里柴埠灘舊有兵戍亭寶慶橋新定續志縣市橋桐廬縣志宋嘉定間令趙汝憚建橋成適改元寶慶因名俗呼縣橋進賢橋嚴陵志在儒學前明宣徳間邑人姚惟可甃石為橋敎諭陳鈞訓導胡如暘等復高廣之大使藍致甃路桐廬縣志俗呼為新橋龍津橋桐廬縣志在上坑埠一名邏浦橋又名楊家橋明洪武元年洪水衝圯𢎞治間邑人王希哲義民王孔昭重建丁橋嚴陵志在縣東北十三里相傳昔有丁丞相者養馬於此為澗所隔因造橋以渡後人遂以名之濟川橋嘉靖浙江通志在縣西北十五里桐廬縣志宋嘉定年里人重建易以石今名霧露橋安福橋桐廬縣志在縣西北二十五里明𢎞治年義士柴溥率衆建尋圯正徳間溥獨重建萬厯三十五年又圯王應徳募建國朝順治十二年大水壊邑人柴文卿王家臣等募建石梁二洞朝京橋嘉靖浙江通志在縣西三十里當驛路要衝宋淳熙十三年建世濟橋明一綂志在縣西北三十里元至正六年里人姚壽翁建翰林學士承㫖歐陽𤣥書額朱橋嘉靖浙江通志在縣東南三十五里漢朱買臣嘗負薪於此故名嚴陵志一名朱家橋元至正三年里人重建月梁橋桐廬縣志在縣東南三十五里橋灣如月故名袁闡橋嚴陵志在縣西北三十五里路當溪險歲久壞宣徳間里人喻叔良募縁重建國朝順治十八年圮皇甫應谷募修康熙十一年復圮皇甫一璋等重建凝紫橋嚴陵志在縣西北四十五里元大徳二年建浮橋渡桐廬縣志在縣北三里宋名裏口渡景定五年令胡太古建浮橋以船為之徳祐末文丞相潰軍數萬至東溪縣令李友仁撤浮橋拒之遂廢自元迨今設舟以濟猶呼浮橋埠有渡田若干畆遂安縣鍾義橋嚴陵志在縣南跨溪為浮梁邑士王總得捐田五十畝命永濟菴僧掌其入隨圯即修往來者徳之菴廢橋毁邑人為舟以濟遂安縣志一名南韓橋明嘉靖間邑民王思洪倡義建橋墩十一架屋覆之十八年大水墩屋盡壞隆慶間知縣周恪建木橋萬厯辛亥知縣韓晟修復石墩架板成橋壬子大水復壞自後仍用板橋歲歲修易以為常王穉登寄題南韓橋詩山縣橋成帶郭斜詩傳鴈足寄天涯虹蜺跨漢波千頃烏鵲浮空邑萬家曉涉不勞歌瓠葉春流還許泛桃花濟人誰似神明宰溱洧乘輿莫漫誇龍渡橋萬厯遂安縣志在縣東三里洪武二十八年建姜石安題龍渡橋詩龍溪遠與大江連驅石為橋不記年虹影静搖波底月鴈行斜渡澗湄烟風清客使歸驄馬日落漁人繫釣船愧我自非題柱客也應從此去朝天買儀橋嚴陵志在縣南十里明景泰元年里人王智榮建地名買儀因名豹石橋嚴陵志在縣西十五里溪旁有巨石如豹故名東亭橋嘉靖浙江通志在縣東二十五里其水自北來者出於松源自東北來者出於東塢自西北來者一出於燕源一出於霞嶺四水流至東亭之地始合為一萬厯遂安縣志成化十三年嚴州府通判劉永寛修建邑令朱福董成之蕭彦立重建東亭橋記東亭在邑東僅一舍許舊有橋年久傾圮大尹朱福少尹張敏盧端幕仲士高各輟俸資以倡改作上其事於郡邑之耆庶欣然助費於八月癸未始事其制中為二墩墩之形南則正方北則斜銳其上以殺水怒兩崖皆為石堤而中拱其脊仍設扶闌於上以防顛墜其崇一丈八尺廣如之修五倍於崇之數而加强焉冬己夘訖工風沂橋萬厯遂安縣志在縣西三十里舊名豐沂元至元間改今名明天順間里人毛希誠重修正徳三年毛彦恭因其頽用石添砌馬石橋遂安縣志縣西三十里相傳明太祖略地新安過連岑至此旋師於石間上馬因名龍峯橋嚴陵志在縣西四十里一名壽春橋明正綂間重建黄村橋嘉靖浙江通志在縣西北四十里萬厯遂安縣志以村名宋宣和間邑人詹安建明嘉靖時安十二世孫詹廷輝重建并創屋九間於上陸希和為記宋家橋嚴陵志在縣南五十里宋家塢故名明成化八年里人徐叔賓重建罟網渡遂安縣志在縣東南三十里路通西安明崇禎間余兼善捐田十畝造渡船木橋往來利之夀昌縣㑹通橋新定續志在縣西市中跨湖表為之嚴陵志唐縣令戴筠建宋理宗時里人劉仕重建明洪武六年知縣彭子冲累石釃水為二道仍建瓦屋五間萬厯壽昌縣志景泰中復壞義官翁志常建嘉靖乙亥志常後人翁徳静翁如臯重建宋公橋新定續志在縣西二里長一十五丈宋郡守宋鈞倡建因名壽昌縣志後圮元静廬寺僧鎮重建繪千佛於上又名千佛橋後圯明嘉靖三十六年廣安寺僧太祥募建累石釃水為十二道至仁橋萬厯壽昌縣志在縣東五里以居至孝仁豐二鄉界故名翠溪橋嚴陵志在縣東南七里累石釃水為三道上布石䦨宋端平間里人葉常管建周養吾翠溪橋晩眺詩晚步翠溪上恐驚魚烏知看雲偶成頌洗硯欲題詩雨潤花生筆風輕絮㸃眉忽聽鶯語好不覺立多時廣濟橋萬厯壽昌縣志在縣南十里景泰三年邑人徐彦銘建後圯邑人李親等重建顔公橋新定續志在縣西十里曰航頭長四十二丈累石釃水為十道宋郡守顔頥仲建因名嚴陵志後圮於水元静廬寺僧鎮重建翁洮春日題航頭橋詩故園橋上絶埃塵此日凭闌興自新雲影映將仙掌曙水光迷得武陵春薜蘿烟裏高低路楊柳風前去住人莫怪馬卿題姓字終期雲雨化龍津玉虹橋明一統志在縣東二十里嚴陵志宋嘉定間邑人鄭執信建鄭以耕過王虹橋詩玉虹跨水久知名南北驅馳此問程風雪䇿驢天上下凉秋􅂿月夜虚明荷花隔岸薰殘照柳絮撩人弄晚晴愛有四時橋畔景酒旗茅屋更書聲梅川橋嚴陵志在縣西南三十里累石釃水為三道宋南渡後建皆喜橋壽昌縣志在縣西北四十里明成化十一年僧净圓募建西有皆喜亭龍嶧橋嚴州府志一名壽春橋在縣西四十里明正統間余公茂徐士敏建淤堨渡嚴陵志在縣東十里周養吾淤堨渡詩野水滔滔此㑹通往來行色見孤篷桃花錦鯉千層浪柳絮黄鸝兩岸風明月滿船天上下青雲萬里客西東如今歳暮無人渡閒却溪頭簔笠翁分水縣慶雲橋嚴陵志在縣南一里慶雲坊雙桂橋嘉靖浙江通志在縣西一里宋王縉子日休日勤同登進士因以名橋定安橋分水縣志舊名順安橋在河頭溪係東門孔道向建石橋圮於洪水後易石以木國朝康熙二十年知縣李檠重建石梁比舊增高五尺洞橋嚴陵志在縣西二里縣丞李徳固重建濯仙橋嘉靖浙江通志在縣西四里嚴陵