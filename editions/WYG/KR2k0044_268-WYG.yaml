body:
  text: 浙江通志卷二百六十九藝文十一賦上觀濤賦晉顧凱之臨浙江以北眷壯滄海之洪流水無涯而合岸山孤映而若浮既藏珍而納景且激波而揚濤其中則有珊瑚明月石帆瑶瑛琱鱗采介特種奇名摧巒填壑傾堆漸隅岑有積螺嶺有懸魚模茲濤之為體亦崇廣而宏峻形無常而叅神斯必來以知信勢剛陵以周威質柔弱以協順修心賦并序梁江總太清四年秋七月避地於㑹稽龍華寺此伽藍者余六世祖宋尚書右僕射州陵侯元嘉二十四年之所構也侯之王父晉護軍彪昔涖此邦卜居山隂都泗里貽厥子孫有終焉之志寺域即宅之舊基左江右湖靣山背壑東西陵跨南北紆縈聊與苦節名僧同銷日月曉修經戒夕覽圖書寢處風雲馮棲水月不意華戎莫辨朝市傾淪以此傷情固可知已啜泣濡翰豈攄鬱結庶後生君子憫余此槩焉嘉南斗之分次肇東越之靈秘表檜風於寒什著鎮山於周紀藴大禹之金書鐫暴秦之石字太史來而探穴鍾離去而開笥信竹箭之為珍何碔砆之空寘奉盛德之鴻祀寓安禪之古寺實豫章之舊圃成黄金之勝地遂寂黙之幽心若鏡心之逺尋面層阜之超忽邇平湖之迥深山條偃蹇水葉侵淫挂猿朝落饑鼯夜唫果叢藥苑溪橘林捎雲拂日結暗生隂保自然之雅趣鄙人間之荒雜望島嶼之邅迴面江源之重沓汎流月之夜迥曳光煙之曉匝風引蜩而嘶噪雨鳴林而修颯鳥稍狎而知來雲無情而自合爾廼埜開靈塔地築禪居喜園超滯樂樹扶疎經行藉草宴坐臨渠持戒振錫庇影甘疏堅固之林可喻寂滅之場蹔如異曲終而悲起非木落而愁予豈降志而辱身不露才而揚己重風雨之掩藹倦雞鳴之聒耳幸避地而扄棲馮調御之遺旨析四辨之微言悟三乗之妙理遺十纒之繫縛袪五惑之塵滓久遺榮於勢利庶忘累於妻子感意氣於疇昔寄知音於來禩何逺客之可悲私自憐其何已㑹稽風俗賦并序宋王十朋昔司馬相如作上林賦設子虛烏有先生亡是公三人相答難子虚虚言也烏有先生者烏有是事也亡是公者亡是人也故其詞多夸而其事不實如盧橘黄甘之𩔖蓋上林所無者猶莊生之寓言也余賦㑹稽雖文采不足以擬相如之萬一然事皆實錄故欲設為子真無妄先生有君問答之辭子真者誠言也無妄者不虚也有君者有是事也以反相如之説焉今有客過越自稱子真介於無妄先生贄見於有君謁入乃膝而前曰聞有君之名雅矣今幸際顔色接話言僕輙有請君其聽焉君世家於越以風流自命業傳湘素才播歌詠越之山川人物古今風俗載在君腹願聞其畧可乎有君乃斂袵肅容謝曰唯唯客姑坐焉吾以語爾越於九域分曰揚州仰瞻天文度當斗牛在辰為丑自夏而侯郡於秦漢霸於春秋州於隋而使於唐公有素而王有鏐因種山而中宅廓蠡城而外周龍樓翼而乾峙石竇伏而巽流法天門兮地户惟崑崙兮是侔實東南之大府號天下之無􅤌其山則鬱鬱蒼蒼巖巖嵬嵬磅礴蜿蟺崷崪崥崹若騫若犇若闔若闓或凸或凹或或􅎧或斷而聨或昻而低虎臥龜蹲龍盤鳯迴舒為屏障峙為樓臺掩映江湖明滅雲霓八山中藏千峯周回彭鮑名存蛾馬迹迷鉅者南鎮是為㑹稽洞曰陽明羣仙所棲石􅐸如張石帆如揚石簣如藏石鷂如翔石壁匪泥石甕匪攜香爐白烟天柱可梯韞玉有笥降仙有臺禹穴窅而回深葛巖蜚而自來射堂豐凶之的宛委日月之珪應天上之玉衡直海中之蓬萊至若嵊山巋其東嵞山屹其西阜至繇蜀龜來自齊梅山乃隱吏之窟苧蘿蓋西子之閨五泄爭奇於雁蕩四明競秀於天台五雲中令之故居十峯曇翼之招提故越為之首兮剡為之面兮沃洲天姥眉兮目兮金庭銅柏仙子宅兮南明嵌崆寳相湧兮南巖嵳峩海跡古兮陟秦望而望秦兮登洛思而思洛兮采葛食蕺敬弔前王兮修竹茂林緬想陳迹兮連山如珠秦皇之所驅兮壓山如玦亞夫之所割兮北幹隱兮明月在東山臥兮白雲迷少微寂兮幽鳥怨太白空兮埜猿啼其水則浩淼泓澄散漫縈迂漲焉而天風焉而波淨焉如練瑩焉如磨溢而為江瀦而為湖為沼為沚為潢為汙滙為陂澤疏為溝渠􅐛而田疇淤而泥塗生我稻􅆝溉我果蔬集有鳬雁戱有龜魚實有菱芡香有芙渠鶻舟如擊馬檝如驅船龍夭矯橋獸睢盱堰限江河津通漕輸航甌舶閩浮鄞達吳浪槳風㠶千艘萬艫大武挽繂五丁譟呼榜人奏功千里須臾境絶利博莫如鑑湖有八百里之回環灌九千頃之膏腴浮賀監之家浸允常之都人在鑑中舟行畫圖五月清涼人間所無有菱歌兮聲峭有蓮女兮貎都日出兮烟銷漁郎兮笑嘑東泛曹江哀彼孝娥西觀驚濤弔夫子胥槩浦思夫槩之封翁洲訪偃王之廬簞醪投兮沼吳國扁舟去兮變陶朱鼓樵風兮遊若耶興雪櫂兮尋隱居禊事修兮觴蘭渚陶泓沐兮池戒珠了溪鑿兮禹功畢刑塘築兮長人誅酌菲泉兮懷古飲清白兮自娛其物則有魚鹽之饒竹箭之美山涵海蓄育其有幾貢入王室利周遐邇耕焉以火耨焉以水南風翼苖翠浪千里􅛉稏一空玉粒如峙炊粳釀秫既甘且旨檿桑之奇號為第一蠶精㒩㒩吐􅁝滿室萬草千華機軸中出綾紗繒縠雪積縑匹木則楓挺千丈松封五夫桐柏合生檫棐異隅文梓楩柟櫟柞櫧榆連理之柯合抱之株乃斧乃斤以輿以廬乃有蕭山陸吉諸暨三如胡柟成林賀瓜滿區棗實全赤檎腮半朱火榧殻玉櫻桃薦珠鴨脚含黄雞頭去盧百益七絶之奇雙頭四角之殊蔗有崑崙之號梅有官長之呼蔓生則馬乳蘡薁土實則鳬茨慈菰野蔌谿毛園蔬木菌湘湖之蓴箭里之筍可薦可羞采擷無盡鱗蟲水族海生池養丁首丙尾皤腹縮項赤鯶文鯉元􅠧黄􅶞漁人駢集以釣以網羹金膾玉不數熊掌能言之鶩善鳴之鵝輸芒之蟹孕珠之蠃文身合氏之子跛足從事之徒街填巷委與土同多異獸珍禽屑銅吐綬猛虎負子靈烏送􅑹鳯棲鹿化鶴拾雁耨熊羆貍豹猴􅙱猿狖鵁銜鸕吐鸎求鶉鬬鷗浮鷸浴鵶寒鳦痩巧婦錐喙舂鋤雪脰林棲水宿修尾長咮江湖為籠山林為囿以牡以牝以蜚以走甲第名園奇葩異香牡丹如洛芍藥如揚木蘭載新海榴懷芳蘜山黄華蘭亭國香天衣杜鵑東山薔薇湖映香雪鑑生水芝鴛梅並蒂仙桂丹枝司華騁巧天女效奇桃李漫山臧獲眂之藥物之産不知其名白术丹參甘菊黄精吳萸越桃禹糧石英薊訓鬻之以療疾彭祖服之而延齡秦皇求之而莫致葛仙餌之而飛昇日鑄雪芽臥龍瑞草瀑嶺稱仙茗山鬭好顧渚爭先建溪同蚤碾塵飛玉甌濤翻皓生兩腋之清風興飄飄於蓬島剡藤番番管城斑斑冰敲嵊水竹剪顧園製於䝉蔡之手游於羲獻之間友陳元與端紫同文字於人寰至若龍護金書苔封石刻苖山金玉耶堇銅錫黄帝之鑑神禹之璧歐冶之劍蔡邕之笛虞翻之牀秦皇之石淳碑斯篆江筆蕭墨雷鼓銅漏梅梁窆石壘金履鐵罌銅印玉胎草蹄石黄竹神木流黄漢簟錞于周樂活人之草止痛之木柘敷榮而花含戚天雨錢而山儲粟皆希世之竒迹蓋欲言而不足其人則見於吳越春秋㑹稽典錄圖經地志歴代柬牘大書特書斑斑滿目孝者弟者忠者義者亷者遜者智者健者優於文詞者長於吏事者擢秀科目之榮者䇿名卿相之貴者殺身以成仁者隱居以求志者埋光屠釣之微者晦迹佛老之異者虞翻之言有所不能盡朱育之封有所不能既予亦焉能縷數之哉姑摘其尤之一二前則種蠡計然號賢大夫後則嚴助買臣直承明廬孝悌則張萬和之父子韓靈敏之弟昆鄧期祈樊自殁以代罪薫黯朱魏報讐而名聞或濕衣以障火或泣血以戢焚或銜哀而廬墓或負土以成墳或以行而名里或以義而旌門懿矣三女賢哉二娥處子之孝凛然可多節義則夏黄公居四皓之列魏少英叅八雋之儔䝉難衞生則有若丁潭委身授命則有若王修虞喜躬歲寒之操孔愉懷止足之謀或一門死三世之義或一邑萃三康之流至若松陽柳朱永寧瞿素婦節崢嶸蹈死不顧卓行則鄭洪韓説鍾離意朱雋戴就舉於孝亷虞潭孔魚沈融朱仕明舉於秀茂虞寄起於對䇿趙曅擢於有道陳子公退侵地之藩鍾離牧拒慙還之稻循吏則有還珠孟嘗致鴈虞國郗銑遺四州之愛夏香著厯任之績儒學則王充以論衡顯沈珣以大義稱謝沉謝承之史學孔僉孔袪之明經賀孝先擅儒宗之號虞伯施專博學之名文章則孫興公掞金聲之賦徐季海輝玉堂之䇿曅若春榮則任奕虞翔文不加㸃則四明狂客二賀二虞蜚聲籍籍吳融十詔成於俄刻隱逸則嚴謝秦方述睿克符方術則介象吳範嚴卿彝吾丹青則孫遇道芬筆札則孔琳徐嶠浮屠則道林靈澈神仙則劉晨阮肇乃有溪上浣紗之女林間舞劍之姝色白天下氣雄萬夫故句踐復國也有六千君子項氏崛起也有八千子弟霸有江浙横行當代彼二霸之得人尚斗量而車載矧厯代之人材亦足明其大槩逮我國朝尤號多士二百年間不可勝紀大則杜正獻之勲德次則孫威敏之功名姚文郎司元祐之直顧内相號江南之英萬石雲仍匪建則慶二陸棠棣如雲與衡吳先生風髙於賀老齊職方迹擬於淵明錢氏世賢科之盛史門繼衣錦之榮劉求以義門顯杜趙以處士稱或覽古以流詠或編圖而著名至若聨翩桂籍焜燿簪纓名登史䇿足疊天庭蓋嘗詢之故老往往莫識其名矣故千巖競秀萬壑爭流者顧長康之言也山轉逺轉髙水轉逺轉清者李淛東之記也瑰奇市井佳麗闉闍者白餘杭之詩也忠臣係踵孝子連閭者虞功曹之對也越之山川人物其大畧如此子真始驚而疑卒歎而喜曰壯矣哉盛矣哉山川如斯人物如斯吾未之前聞也然越在春秋僻處東夷夫子作經擯為於越其人材風俗固未可與齊晉魯衞諸列國抗衡也今有君所稱幾不容口豈昔日逺於京畿含香未越如黄景興之言耶抑山川降靈孕秀固自有時耶抑亦因人作成而致然耶有君曰昔嚴朱二子為漢名卿晝錦故鄉夾道郊迎爭觀快覩歆艷其榮故其俗始尚文學而嘉功名晉王右軍為越内史雅㑹蘭亭流觴曲水臨池墨妙輝映千祀能使遺文感慨君子故其俗始尚風流而多翰墨之士唐元微之一代奇才罷侍玉皇謫居蓬萊賓竇鄰白酬唱往來繇是鑑湖秦望之奇益聞故其俗至今好吟咏而多風騷之才不獨此數君子也任延張霸以尚賢為治而俗始貴士劉寵車俊以亷已化下而人斯尚清第五倫下令而淫祀之風革諸葛恢蒞政而凌遲之俗興至若李唐刺史九十八公首有龐玉顯有姚崇圖經十子郡績稱雄國朝逮今蓋百餘政前有文簡後有文正題名所記比唐為盛承先得人風俗斯美蓋亦理之然也子真曰是誠有之然皆二千石之事耳未足多也願聞其上者有君曰昔句踐懲㑹稽之棲也痛石室之辱也蓼木水足抱冰握火采蕺於山置膽於坐葛婦興歌名曰何苦其詞曰嘗膽不苦味若飴令我采葛以作絲二十年間焦心苦志卒滅强吳以雪前恥越絶之稱權輿於此故其俗至今能慷慨以復讐隱忍以成事若是何如子真曰茲霸者之事也傳不云乎粹而王駮而霸彼齊桓晉文之盛猶不足稱於大君子之門況句踐乎有君曰昔禹治水既畢與羣后計功苖山更名㑹稽卒而葬焉祠廟陵寢於今尚存上有遺井下有菲泉過而飲者莫不發免魚之歎興河洛之思不獨句踐有其烈馬侯嗣其功至今其俗勤勞儉嗇實有禹之遺風若是何如子真曰美哉禹功宜其代舜而有天下也游於是穸於是廟食於是兹所以化被萬世之久也然説者以為入聖域而未優其必有大於此者乎有君曰舜生於諸馮孟子以為東夷之人歴世逾逺流傳失真太史公以為冀州然耶否耶然越之邑則有上虞餘姚山則有虞山歴山水則有漁浦三憮地則有姚邱百官里焉有粟陶焉有竈汲焉有井祀焉有廟皆其遺迹也意者不生於是則游於是乎舜為人子克諧以孝故其俗至今蒸蒸是傚舜為人臣克盡其道故其俗至今孳孳是蹈舜為人兄怨怒不藏故其俗至今愛而能公舜為人君以天下禪故其俗至今亷而能遜若是何如子真矍然離席而立拱手而對曰於戲噫嘻盡善盡美雖甚盛德蔑有加矣昔季札觀樂而止於韶自韶之外不敢觀余問風俗亦極於舜自舜之外不復問矣無妄先生粲然失笑於旁曰固哉子真之問有君之答也兹皆古之越非今之越也人死骨朽世變風移山川雖在人物已非前日淳朴變而澆偽前日亷遜變而爭競前日勤儉變而驕怠前日忠孝變而凶悖尚何執紙上陳迹而譊譊其煩舌耶有君曰先生之言是也然風俗不常美亦不常弊善焉惡焉維人是繫今朝廷駐蹕東南越為鉅藩密邇堯天蓋尺五間帝命重臣來鎮是邦入境問俗登堂觀風因舜禹之遺化明吾君之至仁布德教於黄堂變薄俗而還淳矧何世之無才亦奚有於古今子不見夫銜命使金死於王事如陳公張公者乎議禮靖康赴難建炎如華君傅君者乎是豈異代之人耶又不見夫姚江陳公所臨有聲亦克知退身名兩榮執政李公忤意權臣老於淪落世賢其人愍孝蔡子捐生可悲同彼旌忠廟食於兹隱吏王君斬讐著名一門可稱賢父難兄兹固先生目所親覩也安知後之視今不如今之視古乎先生曰有君越人也知越之風俗而已矣昔子虚夸雲夢烏有先生詫齊亡是公折之以上林之事今越未足侔齊楚之大尚何足以夸之有君曰昔吳子問柳先王以晉國之事而柳以晉對今子真問余以越國之俗而予以越答亦各因其所問而及之爾余豈瞢然無聞無知於越之外哉今天子披輿地之圖思祖宗之績求治如不及見賢而太息文德既修武事時閲蓋將舞干戚而服逺方復侵疆而旋京闕余竢其車書同南北一倣吉甫美周室賦崧髙歌吉日招魯公命元結摩蒼崖秃鉅筆頌中興紀洪烈邁三五夐前牒亘天地昭日月於是窮章亥之所步攷神禹之所别覽四海九州之風俗掩兩京三都之著績騰萬丈之光芒有皇宋一統之賦出回視㑹稽蓋甄陶中之一物無妄先生自知失言色有餘媿乃與子真逡巡而避有君退而寄傲於南窗有飄飄凌雲之氣蓬萊閣賦并序宋王十朋越中自古號佳山水而蓬萊閣實為之冠昔元微之作州宅詩世稱絶唱近代張公伯玉三章膾炙人口好事者從而和之獨未聞有賦某筮仕初辱為客乃中秋之夕與同僚㑹飲於茲覽湖山之勝翫月於樽爼間即席賦詩諸公皆和既念閣不可常登一詩不足盡意遂賦焉王子遊㑹稽客蓮幕登臥龍之山躡巨鰲之閣秀閲千巖流臨萬壑縱逺目於東州暢幽懷於寥廓於時天髙氣肅秋色平分簪盍良朋把酒論文俯仰湖山懷古傷今登髙賦詩以寫我心周覽城闉鱗鱗萬户龍吐成珠龜伏步武三峯鼎峙列嶂屏布草木蘢蔥烟菲霧吐棟宇崢嶸舟車旁午壯百雉之巍垣鎮六州而開府東望稽山思禹之功喬松鬱乎故陵丹青儼於祠宫藏丹書於神穴流遺畫於無窮南目秦望哀秦之過方鑱石以頌德驕顔色而相賀嗟仙藥之不來俄腥風之已播西望夕陽日送蘭亭懷王謝之風流感斯文而涕零徒觀夫茂林修竹鎻烟霧而冥冥北望滄海渺其無涯方吳門之畫龍視越國其如蛇轟雷鼔於一震墟吳國而成窪訪麗譙之故址苐見夫古木之號鴉前瞻鑑湖滿目雲水嘉馬侯之偉績慕賀監之髙軌祠荒兮遺跡半湮宅冷兮黄冠有幾徒見漁舟鼓楫風樵航葦往來乎鷗鷺之鄉欵乃乎烟波之裏仰承髙閣翬飛崔嵬俯瞰州宅緬想髙才向無虧之屏障家終日之樓臺張湖山於几席之上惜斯人之安在哉言未畢客有指閣而謂曰子亦知夫閣之所以得名乎始於元和之才子以玉皇案吏之尊擁旌麾於千里蓬萊隔弱水三萬以筆力坐移於是也齊名有白從事有鞏胷懷萬頃之湖真一代之奇偉詩章一出遂能發揮秦望増光鑑湖蘭亭絶唱亘古今而莫擬子亦讀才子之傳乎姑問其從何而來集乎彼而至於此也才子之才固足以起吾子之聳慕才子之所以獲侍玉皇者亦吾子之所顧望而深恥也於是引客之手揚袂而起言契予心諾諾唯唯有是哉斯人也而至於斯也尚忍言之哉俄而鼓角作於人間明月出於林端妙三弄之梅花爛十分之銀盤釂一觴而徑醉有不盡之餘歡頃之隂雲忽興㸃綴青天漸山川之䝉籠若有妬乎嬋娟倚危欄而感慨覺興盡而思旋於是相與啜茗於清白之堂礪齒於清白之泉閲唐宋之題名終夕為之慨然嗚呼噫嘻死者可作吾誰與歸其無出乎文正范公之賢民事堂賦并序宋王十朋堂名民事志天語也某備員越幕歲將及期顧惟不才瞢然無補日以敗官曠職為憂所幸黄堂主人甚賢同僚皆士君子朝夕講論無非民事之要者因為之賦以志其一二云繄越幕有下僚兮名所寓曰民事之堂誦天語之丁寧兮銜聖恩而不敢忘啖民脂以飽妻子兮猶雀鼠之偷太倉茍不民事之是思兮又将奚逭乎天殃嗟㑹稽之大府兮罹洊歲之凶荒颶風作於孟秋兮雨浸滛而異常天吳怒而江濤沸溢兮飄廬舍而壞隄防粢盛害而歲大侵兮民餓踣而流亡射的黒而米斛千兮擷蓼花而為糧痛瀕海之蚩蚩兮葬江魚之腹腸予嘗告其故於前使君兮請敷奏於巖廊顧幕中平日之辨兮人廼靳其為狂㑹伯尊之赴召兮達民瘼於九重予殆有𩔖於輦者兮亦何恨夫言之不庸洪惟當宁之至仁兮視赤子其如傷蠲常賦而救天菑兮出内帑之所藏哀東州之無告兮惠吾民以龔黄左公孝而右孟博兮相與協贊其惟良先撫字而後催科兮正今日之所當寛公私之積負兮以俟乎歲之豐穰省訟牒之煩苛兮抑蠧政之豪強節無用之浮費兮俾斯民之小康兹政事之所急兮敢不忠告乎黄堂至若鑑湖利及九千頃兮日侵削而就荒歲和買無慮十萬縑兮曽無一錢之償𣙜酤之利半奪於有力兮財賦浸以荒涼兼并之弊熾於天族兮編氓餒於糟糠兹又越中之巨害兮姑畧言其大綱若夫民事之在天下兮固不足以知其詳有一言以盡之兮曰生之而不傷擇守令兮去姦贓慎勿擾兮如牧羊兹畎畝之惓惓兮願入告於天王錢塘賦并序宋葛灃錢塘據東南之都㑹號天下繁盛之樂土其山川之秀麗井邑之浩穰人物之豐景槩之美詳詢熟覽實浮於名攷按圖籍見於前人之稱述備矣因摭其大畧總而賦之其辭曰茹華大夫遺棄歊塵采擷芳英窮足力之所暨徧九垓而週行相見東南之域有名區焉據一方之都㑹萃萬景而敷榮贏糧首途洊罹寒暑始入其城徜徉踸踔四縱研矕紛錯呈露莫能識覽目眩神聳惕慄而驚稔聞摛藻先生謝迹人寰屏除俗慮繹黄庭之秘術韄佺僑之髙趣眠雲嘯月隱林泉之勝處廼滌垢心齋鞠躬緩歩徐屆衡門情懇厥故曰先生髙臥久矣蘄有攸聞願洞開而悉諭先生囅然笑曰眂子辭氣若有所覩有弗當於中心者乎豈生於偏城下邑而未究雄藩巨鎮之浩穰也邪子來前予語汝粤若一氣肇分二儀聿建有清有濁或合或散凝為山岳融為河漢五方各殊號名易辨烏䇿篆素文該迹備顧兹都督之大府上當星紀之躔次騐夏書之所别為揚州之内地春秋之際屬吳春秋之後屬越嬴秦統於㑹稽歴世藩於東北至陳始建錢塘之號當隋重置杭州之額總管府立於仁壽初餘杭郡更於大業末唐武德時因名於開皇李子通後嘗䧟於公祏及貞觀之休明𨽻江南之疆埸開元中分東道之採訪乾元來歸江西之觀察厥後景福間剏鎮海軍之節度聖宋淳化制海寧軍而改易有山有川有市有廛提封千萬井丁壯幾萬千景槩之佳美百物之富繁可指而言焉七雉維髙數尋維厚矗然屹然長雲斷岫敞以髙臺穿以㢋竇甃以陶甓覆以鴛霤其出入有譏其啟閉有守内足以衞居止外足以禦戎寇周袤連亘五十餘里耽耽然虎踞麟伏羅峯列岫是為州城城中則有東西之陌南北之阡四達之衢九出之逵開通且長方軌甚夷清流中貫蕩漾漣漪畵船來艤郵亭枕漘構禮㑹别去思披雲寳石七星清輝吳門彩虹横帶欄楯夾蒸常樂延寳千秋普明清湖衆安通仙都亭綺分瓜列各撫界分時則有壩南壩北南城西城開道奉國温泉水明中棚清波朝天清平巡邏糾集晝警宵繩剖㭊途巷標題坊號時則有通和延福廣文常慶興禮㑹昌義和從訓慈孝清飌安國延定通寳豐財紫雲立政大書深刻誇詡爭勝坊中則有塈茨之垣墉肯剏之堂室上棟下宇以避燥濕構櫨闗鍵以輝地闑綠窗朱扉畫簾繡幕聳樓閣兮千門叢綺紈兮萬闕或對牖而胥瞰或面水而穩植崇庳列峙交錯雜出如櫛密比如鱗疉集夫家於焉而樂生稚艾於焉而燕息鑿井渴飲實廪饑食漢志載用物常足之言隋史有尚禮惇龐之説牧之具甲於天下之稱居正叙繁㑹雕麗之迹邑屋華麗文忠公之記可稽萬屋相誇王文公之詠紀實蔡侯云為一都㑹呂公云為天下劇伯鳯言地多奇勝沈立言人物安逸世守良工競精舊業繢畫函韗刮摩搏埴裂帛之槻裁木之鈲剏物器具交持遞挈百所為備纖微㒺闕背窳就攻豐阜積墆學古者不知力農之勞通鬻者不知技巧之法熙熙陶陶含哺鼓腹沐浴皇靈優游化國其阜通雜賄懋遷化居則建垂旌之思次分朝夕之三市旗亭五重俯百隊列族聚貨通闠陳次有所次叙有地度量有式偽飾有禁大質小劑亮執其言胥師肆長各謹其令江帆海舶蜀商閩賈水浮陸趨聨檣接武紅塵四合駢至叢貯譶澩㺒揮袂飌舉息操倍蓰功辨良楛廼有安康之麩金白膠汝南之蓍草龜甲上黨之石蜜貲布劍南之縞紵牋錦其他球琳琅玕鉛松怪石蠙珠檿絲桃榦栝柏金錫竹箭丹銀齒革林漆絲枲蒲魚布帛信都之棗固安之㮚暨浦之三如奉化之海錯奇名異狀夥够堆積貿易者莫詳其生博洽者疇克徧識其承流宣化聽訟訊獄則有官府焉貴有正有貮有僚有屬賤有府有史有胥有徒牧伯之宇雄峙於爽塏亷按之司對列於通衢繡栭雲楣鏤檻文㮰瓌榦虹梁藻升橑俘長廊廣廡連閣門庭碝磩緻砌渥彩紛敷塞門内立儀簷豁如於以植其畫㦸於以通其軺車列鎩垂警戒不虞詔條自是以宣揚吏民於焉而犇趨聨識之第等並建征商之局據要濶居圜扉静兮束矢罕入帑藏啓兮金帛廣儲鹹礬𣙜酤秉式法而授受常平鎮城積紅腐而羡餘其歲月有㑹有計其參考有籍有書庭無壅滯繄師師之明健人恥鬬訟由易俗於恬愉其常供正取時運而益大府之用其休聲美政時傳而達天子之都毓材養士有學宮焉肄習有舍勸講有堂模範有師切偲有友升降有齒而人遵長幼之序漸摩有素而俗安禮義之守春秋祭饗多儀必舉由是習先王之典歲時較藝工拙精分由是勵循循之誘故得圃澤之多賢妹邦之君子楚材南金汝頴神錐鼓篋朋來袍紛鷺集爼豆莘莘獻酬交錯歌唐誦虞泳仁蹈德長者皆不厭不倦幼者亦克岐克嶷日就月将自強不息人人號為書淫處處稱其傳癖念夏侯拾芥之言慕桓榮稽古之力杏壇茂䕃扇習習之清風泮水澄波漾明明之皓魄衣冠不特盛於鄒魯齗齗豈專美於洙泗輔助文德有武備焉養以稍食衣以繒帛㑹以什伍居以營屯駐泊崇節龍山水軍船務寳興捍江牢城統目節制訓以五兵焠刃沙浦刷馬江濱大閲有時賞罰有經或揮左或揮右或三令或五申暨暨詻詻堂堂烝烝跿跔楻觱儵眒麠䲔密須之鼓闕鞏之甲繁弱烏號黄間千鈞枉絜殺鍭龍藻龜文褊裻重襲矛鋋飄英奮烏合兮其陣猛厲鷹揚兮其敵勍稔坐作進退疾徐疏數之節熟釗鐸鐲鐃旗􅤌矟之名器用犀鋭人習精明陣整魚麗法嚴柳營勇者壯者大以備不虞不庭弱者脆者小以充執役使令足以鎮南國之疆宇足以暢皇家之威稜府地之北有吳山焉嶻嶭􅴀㟎峞㠔􅧓墱道邐倚刻陗可步英烈廟庭架植其所伊昔楚國有臣子胥憤讒夫之浸潤哀天屬之非辜解劍以訊漁父渡江而犇東吳五戰至郢而昭王大去破塚鞭尸而宿恥已除聲光既振措國強盛南服越人北威齊晉徙闔閭之撫封實子胥之輔政逮夫差嗣立宰嚭用事納句踐之幣遺欲伐齊而肆志雖輸忠讜之諫覬悟君心莫逃讒佞之謀終行詭計於戲身雖殞而德愈光事雖往而名彌彰致黔黎之愛慕建祠宇於髙岡以迄於今餘千禩矣回廊邃殿覃覃増壯直誠大節藹藹騰芳顔貌如生濟濟鏘鏘孱夫觀之而激懦志烈士過此則厲剛膓駊騀巍巔夏屋大啓荑茀崴㠢䡾䡾嶊嶉越軼埃􅅽炳燿曅韡仰攀雲兮俯杳𦕈是為堂兮曰有美坁崿棧控壓羣峰飛翬老拱誕豁雲際前瞻後盻左顧右睨江湖匌匒波瀾蕩沃翠屏碧嶂極目無翳夫尊榮之飾必因聖人吟咏而後得誰其詠之我仁宗皇帝夫景趣之佳必待賢者輯洽而後顯疇其輯之前守臣梅摯由是天下想望而玩慕邦人咨嗟而欣憙當其陽和焕發景物華鮮值清明之後或禁火之前依依之綠野無際茸茸之芳草連天撲春歡之燕乳啼春恨之鶯遷汀蒲岸柳之裊娜紅葩綠蕚之芊綿都人士女妬艶爭妍鞚香韀擁翠軿闐郛溢郭累迹差肩駢衍佖路要遮鮮翩水畔遲遲問誰人之祓禊林梢隱隱知何處之鞦韆若曰山之氣候則變態而無窮卻躬逺望穹林隱藪出没於杳靄嵐光翠色合散於空中移跗近觀低坡崇岌彌絡開奠幽禽野鳥嘲哳舞歡州城之外有西湖焉泉流瀦滙廣深停蓄漴淏澯潾止而清些渹􅝞動而聲些沙洲之垂柳綻嫩波心之浮圖弄影湖中廼有千艘荃橈萬舸桂楫紼纚輕維蘭栧鬬㨗行客遊人旁午雜遝或浮泛綠漪之上或艤泊他山之脅梵宇樸縟峯巒襵濌相攜首東水心定水崇福興福惠明玅惠法善土宿其山有若外園其嶺有若鐵埜其亭臺則有衆樂集賢在焉徙履回南淨慈佛惠昭慶普寧淨因淨相真如寳林其山有若南屏其嶺有若慈雲其亭觀則有發符白蓮在焉縱步尋西惠因香積法雨法空廣果資國正濟六通其山有若靈石其嶺有若麥嶺其亭檻則有流杯涵溪在焉隨徑羾北菩提招賢寳積寳雲普濟寳勝智果壽星其山有若巾子其嶺有若衣眉其樓臺則有㸔經英遊在焉傍西深入巖谷益秀上下天竺靈隱靈鷲爭出竒巘互獻重岫烟籠黛染澤通雲覆十里之松徑隂隂萬脈之列泉澑澑又其西則南北髙峰獨透羣嶺之表亭亭插天亄費浮雲在其下而可以攀瑤光曵玉繩者也植中巖巖則有孤山西陵報國崇因廣化開閤扉楹層厠碧瓦或跨閣於陛砌或引泉於堂下在昔林逋傲世嘉遁慕㝠㝠之髙飛潔皎皎而率性幽居逐志遺累深隱飄飄杖屨泛泛小艇去尋精刈步隨幽徑縱鶴翔雲延客反命常留長者之車屢至公卿之迎蕙帳久虚而遺迹永存幾換園林而猶佳故境芬芳播傳而不冺湖山得是以増勝誕安步屧則有長隄隆隆防障横臥湖心其長千尋其廣並輪増卑培薄完繕砥平跨以徒杠夾以柳隂其他嵓曰玉女佛手洞曰煙霞香林石曰䌫船隱士峰曰蓮花白雲亭曰夜講映發塢曰大慈楓林塔曰慈雲黄皮澗曰呼猿石門井曰金沙烹茗菴曰永安寳雲泉曰虎跑臥犀池曰定箭湧金錢源龍濺袁松陳檜渦渚别嶼塢漾曲水綠竹有並生之竒偃松有八盤之面小嶺有飛來之號髙臺有翻經之志畫橋碧沼觸處逢之月觀歡亭時時見矣或逺或近四週環列妙景幽趣殊踪異迹名不可以殫紀足亦囏於徧歴供騷人無窮之吟付丹青意外之筆故張祐載樓臺髙聳翠岑之言賈島有烟濃景晚難狀之述春波千頃見文正之句魚躍蟬嘶形舜欽之什楊蟠以百咏而譽佳元之以圖畫而顯飾每歲孟夏初旬八日郡人數萬以胥㑹競縱羽鱗而祈福者天禧中故丞相王冀公始請為放生之㑹也水涸則草生水淺而葑横涂虞堙塞之漸力陳浚治之言者元祐歲前内相蘇東坡敷奏乞興役之䇿也廣乎大哉東抵郭瀝之境西接新安之際中畫郊圻幾七百里之地若稽古先建邦蕃衞以守民社以壯形勢設法備具莫盛於成周之世析之則有隣有比統之則有鄉有遂豈王畿特私然舉六服皆若是故得内外同歡遐邇均惠國家大猷是經議事以制夐觀典則損益其事總之有州附之有縣縣則分鄉以識别鄉復分里以表異惟此錢塘疆界既廣故立縣有十而縣之所治九十二鄉鄉之所管四百二十有七里髙厚邍隰迺疆迺理其為縣也錢塘置號以華信出私錢而築塘餘杭立名因秦皇捨舟航而登陸於潛鹽官始自漢家臨安富陽更由晉室孫吳分富春而剏新城之邑我宋以仁和而易錢江之目南新立當淳化之年昌化改在太平興國或為緊或為望或為中或為上其為鄉為里制名取義亦各有所因焉如曰七賢因覩仙客如曰新登因更縣額若兹之𩔖有所因而名鄉者也如云勲貴因命錢鏐如云白雀因見白雀若兹之𩔖有所因而名里者也生齒居聚畜牧養蓄有塲有圃有廬有園有桑有梓有林有泉㸑烟相望雞犬相聞隱隱振振繚垣綿聨秀菰蕙象耕鳥耘賽華薌之重秬散􅓳臯之香秔俗享再稔之利婦蠶八育之綿家蓄鶴膝之器戸衒犀渠之精出入足以相友賙救足以相生閒暇足以相樂急難足以相捄頒白不負戴於道幼疾各得所而安吳地舊俗歴世仍傳尊釋氏以崇奉習巫覡以相先故蓮宮紛置五百三十有二而祠廟建立一百七十有三其為寺也在内則有若承天梵天廣慧竺林淨戒淨性明心法雲寧邦延壽仁王國清寳月翠峯澄鑒福明在外則有若寳輸龍光晝錦瑞竹朱金龍華雲霄淨福靈曜普光圓通正覺昕慈靈巖昕平石室紺園洞啓淨土廣闢殿閣横敞廊廡深邃寳相璘㻞花香列衞光以堊丹飾以金具珊瑚琳碧瓀珉翟翡藻繡纖縟瑰奇屬綴雕繪椽爭華競麗幡幢元出摇摇曵曵梵歌唄音磬低鈸厲晨魚數擊散落民家暮鐘沓沓縱横四起其為廟也近則武烈普濟福安福利福隆廣靈武寧衞寧保定立德護國始興夫差臯亭威勇老人逺則保慶興聖彭澤七松隆福迎陽安惠桑亭廣慶懷柔徐偃郭文塔山松溪白石崇寧雄姿偉貎仗衞森然或因功血食或以德顯名或當朝近世或數百千齡載於祀典咸秩其文傳記紀厥美實金石播厥馨芬至若旱潦流行札瘥驟起竭蹷䖍禱肅将祀事立致感格黙符人意故兹信仰弗怠弗替若夫疆圉形勢則有羣山焉鳯凰白鹿秦望鑿石功臣衣錦壁茂安國岝㠋金牛流襄峻立石甑金硯玉座與邑阿頂獨角金樓華石峴曰顧望墩曰仙姥嶺曰金鵝峯曰卓筆巖則虎頭雞棲龍池朱積惟名山暨幽洞多異事及靈迹或振奇於一時或罕聞於曩昔如臨平山石皷嘗出唯張華有言用蜀桐可擊天井開兮涸溢蔑増損龍洞闢兮源深不可測如仙姥則裴姥嘗居采衆卉之華蘂因釀酒以當罏異人采飲授藥與俱如曰仙穴則有仙客回鸞駐蹤雖有獵徒之偶到第見白鶴之飛空如曰金錢有僧智度棲隱山巔忽覩神人之出現因建精舍以相傳言其山勢􅪾㠑峻嶒屹岦岝峉嶚􅥲峛崺嵽嵲猶雲之蒸猶林之疊猶獸之蹲猶陣之列或如旒垂或如佩委或如鼎峙或如壁植遶者若朝近者若在後若拱居前若揖繚若篆籀妥若弭伏揭若㽅梪赤若秃鬝其上乃有薜荔芷术蒲黄牛膝桃李梅杏柑橘棗栗薑藿芋蒜葵蘇芹蕨榆柳楓檀桑柘梓櫟葔茥􅶽箭葦苕茅荻髪蔓滋茯甫培露葅攅柯拏莖重菂掩葉素蘂丹秀紫房青壁麗藻燦燦芳㽔馥馥橚矗森莘冒霜停雪侯樵侯採莫有藝極噫嘻山雖多矣莫若天目為大焉其廣也厜㕒甗隒縈繞盤礴連延負厭週遭有八百里其髙也侵接霄漢彌茫眇眂莫見其脊凡三萬九千尺仰太虚兮日月低坐絶頂兮乾坤窄圍八極於寸眸撫四海於一息帶絡虹蜺襟包块軋其上則有東西澗可度谷塢澳湖蛟龍池其冢坦平兩湖對列若人之有䨇眸兹其名曰天目又有洞府三十六所每至深秋風雨晦㝠而叵測蓋靈異之所潛藏神仙於焉居宅異時嘗有徐五仙張道陵或餌霞而服氣或舉室而飛昇近世亦聞隱者結廬危層髙臥棲真每下眂山半薈蔚紬隮如聞嬰兒之聲必有霶霈虚霫大雷大霆則其穹窿峻極從可知矣主之有神司之有責飌兮宣威雲霏霏兮降澤靀靀其零祁祁溥及以沃我田埜以稔我稼穡山所蓲布濩蟬聨觸𩔖推覈斯可畧言其木則山榎山樗杻檍椵榆楈㮿㰋虆楮㰘楤莖葉喬抗樛垂蓊鬱薆薱吐葩颺㽔杉松青青並榦接枝其髙千仞其大百圍擁腫拳曲發􅟨權奇蔓根鏁石落影臥溪其草則有若苜蓿藷蔗芩䓪薊蘋旨虉菤蓪䕍芊芊散葉茸茸合瓣華黝䨹竦擢豔異萬色爭妍千枝鬬麗其羽則有若鸑鷟䳺鶙䳭鴒䴑鸝鷤䳏鷦鷯鶢鶋鸍排虛軒翥彳亍叅差近呼逺應木巢草棲或曵尾而食或埋翮而飛其毛羣則有若􅣕犦白甝羭羖獑毚􅛖騃騤瞿彌迒駢田或遁藏密林或長養幽巖或馳逐而飌雲起或吟嘯而山谷寒若夫疏通灌溉則有衆流焉溪則停辭石鑒頰口上轉無他平渡下阮盤石曰苕曰猷曰松曰葛湖則御息明聖陽陂臨平南上南下明星建寧曰查曰北曰髙曰谷渡則鹽橋廟山古渡剡口塘則武丞捍海沙河其諸潭則浣沙玉兒浦則百尺明珠渠曰五福濠曰中外或始濬或增治或築以去害或開而興利或因事建名或因名顯義如停辭溪始於范蠡欲開鑿為山通浙江之水因民弗願辭訴而停焉如南下湖修於歸珧溉公私之大田興利澤於無窮因對上都以立名焉在臨平湖則開通壅塞以顯祥得石湖邊以呈瑞捍海塘則彊弩射濤以弭衝決詩什投海以回潮勢兹惟神奇之殊迹因以播傳於後世言其經理開竇釃流隄塍相軺或遂之縱或溝之横或洫之廣或澮之深以列以舍以寫以揚以蓄以止以蕩以均潦則引出俾免滔溢暵則通入以遂耕耘噫嘻水雖衆矣莫若浙江為大焉自婺歙之深山合二州而發源潨流㑹派東下淪􅞹由建德注富春而後入海昔神禹行水嘗躬臨其厓厥後而守横渡㑹稽想其服乗之車馬儀衞之旌麾鐘鼓撞磕邍埜生輝應足以暢文宣武普暨博施若江流之浩蕩盡目力而渺淼沋沋潚潫漎㵅㶎兹其深些漡涾淢滮淲浟㳁兹其流些貎也浤浤淈淈渳滭㵹潗廣也漭泱瀠澐沺㶍瀿西顧則疑達濛汜東盻則恐近扶桑歲時之潮有信不妄其大必於哉生明月既望其微必於上澣之休下旬之半當星虛之正中異三時之汎濫湧激澎浩溔滉瀁浴日之波浮天之浪沸騰回復其髙數丈眇覿若赴敵大兵貫弓捧㦸攢刀列杖爭先挺出猛奔急趨而俯仰又如白練颺空隨狂飈而舒卷飛騰於波而聽之則之聲千車萬馬雜錯轟吼而前鄉又如破山疾靁悸神迅電驚天震地而動蕩西覩浮石之隨出時玩曙樓之呈像離婁注目而矎矎陽侯傾耳而伎懩眡無巔倪稽盧賦之鋪陳狂抛猛過發羅詩之咏賞雄乎偉哉岷出之江桐柏之淮亦有潮焉異若是也逮其平時則湛湛波光彼蒼一色廼有艅艎䑿䑽䑳䑼䑦􅑳艬舶鷁首載浮鼓棹乗飌破浪以濟以渉自西自東或南或北輕颿㨗櫓朝吳暮越以言所産則有若鯄鰼鮦鰶魦魨鯦鮥䱾䱏鮍䱂鯇􅗫鯷鱳鯖鰡鯽鰅鰫鰬魠隨波去來逐流出沒梁笱交設網罟互撒其他水蟲水草水畜水鳥傳記鮮備方言莫攷筆難覼縷而細道至若烏雲入河兮俗仰諸葛之神十石大瓠兮衆嗟張儼之奇光怪生於先壠知孫氏之當興歛板而見長吏美凌統之肅祇柯相因溺舟而顯異元遜以老桑而爛龜寄魚還刀兮術嘉子恭靈運欲至兮夢應明師猛獸報郭文之德鄉譽髙叔孫之為卻練顯孫謙之潔猾吏畏允恭之威江巖剖石而獲紫玉之珍亷使繪圖而獻蔓竹之枝仰孝義於公弁之門慕道德於吳筠之碑詰偽駮假人服其明者張無澤之為叅軍也風流雅韻播於吳中者房孺復之為州牧也梟尹盧於中江破曹休於石亭征六安不務徼倖圍珠厓力諫無行則全琮之将畧殊於衆也挺直致主則毅不跲載筆謂君舉必書還笏扼艶嬖之立則遂良之秉節尤足尚也匠施及泉之工俗享勿幕之利二三散處永世叵廢則李泌之政誠可嘉也增築塘隄時其鍾泄以灌以溉勿湮勿窒則居易之澤是足道也禪師振錫而歸淨界德輿述序以送之惠皎石壁而鏤法華元稹撰記以紀之候仙亭立於韓仲聞之任觀風亭剏於裴庶子之時見山置於盧子望冷泉建於元左司清輝之榜未掛幽致想嚴郎之風度胥山之銘已刊叙實見元輔之芳詞虚白花開兮念賢牧之栽植南庭記成兮仰子烈之施為術士識牛斗之王氣紹威薦羅隱之能詩錦樓集成兮傳元瓘之篇章庖人疾愈兮悟靈龜之酬私陳文惠以薪土易籠石而就工杜偉長自官浦至沙徑而築隄范文正發粟游晏大施荒政之惠耳沈文通鉏治姦蠧人皆繪像以祠之砌石為函接竹引水以注六井散在閭里而一城足用者長樂陳公之恩以及民也因舊佛祠剏新道觀前旌錢氏之順服後作臣子之奬勸而表忠為名者清獻趙公之請以有立也以至仙人臺髙兮聞琴瑟之音陌上花開兮起緩緩之詠燈市於祥符而尤盛九曲花王有吉祥而冬日􅃩異亭牓碧波於道左堂標中和於府内南園之萬卉爭春别圃之翠幄殊麗羽宮之三教名垂理公之石室仍置百尺之佛樓齊巘後嶺之鰻井洩洩前建後増昔殊今異逺覽近觀萃佳擅美棊散域中孰窮孰計先生言未既茹華盱衡愕眙曰富哉言乎可謂多聞而博識者也僕嘗聞之有唐之世分符守土多用名曹星郎老成宿望而名世佳士蓋嘗酸辛哀鳴投書相府願擁朱轓一闖是境而終不可得者今兹先生羣曉猿侣夜鶴雲冠霞裳鴻飛遁迹藝苑百家飽爛胷臆日玩山川之勝槩優為聖代之真逸其至幸乎是言也播之天下傳之後世雖千萬齡之永足以知今重熙累洽極富極貴比迹於二帝三王之盛際其蕃方外地尚至於此則内之宸居帝都其皇皇之美赫赫之盛雖駕江河之辯秃南山之竹亦不能形容其萬一若兹山川祠廟之號名閭里景物之故迹因革興廢之所由人材産殖之攸出括古今之流傳備版圖之闕失則将即此以覈實徐罄折而復請曰我宋中華疆境萬里泰平一家名邦大城特勝相誇如大江之南則有建康劍閣之西則有成都彼二邦者青山碧水與夫邑都非不衆且雄些然莫儷兹之盛者豈有説乎先生曰猗嗟二邦昔事詎忍言哉夫風聲氣俗繫一時理亂而盛衰景趣由羣情憂愉雖歴年已久而未能悉變譬若病既痊而尚覺纍癯劉備鼎分之時鄧艾鍾㑹之討伐東晉建都之後祖約蘇峻之戰爭去世愈逺姑置勿談至其近代之事則可按典籍而推言稽昔唐季王綱縱弛姦雄伺隙而虓闞攘臂唾掌而競起僭竊位號者有焉逐鹿四方者多矣逮朱梁既立之後咸負固而列峙由是王建據蜀濶䀨至後唐莊宗之時當同光乙酉之歲迺詔軍將曰郭崇韜舉兵往伐所鄉犇潰翦除妖孽削平僭偽即以孟知祥鎮撫而臨治及明宗應順之初知祥復肆其奸計跳梁一方攫拏傲睨豈非僻處方隅保棧閣靈闕之阻又幸中邦之多故因得逞爪牙而博噬乎當彼之時五六十歲之間經幾戰而幾爭封豕其土糜爛其民鉦鼓一過則牛羊竄伏士卒所至則草木戕殘我宋龍飛乾德二年爰命全斌副以仁贍統師西征入境問辠故蜀㫤始降而劍嶺屬内若夫建康之事亦大同而小異始唐明宗本以徐温而鎮守至晉天福厥子知告迺竊位自稱唐裔還姓李氏建國立號昇殂璟嗣恃長江之險保甲兵之利我太祖之御宇應天神而順舉愛惜元元之生命姑與包容之未取待其自悛十有五年輕肆桀驁終昧神天致皇威赫怒而大軍首南擁以熊貅度以龍船驍兵鋭卒既逾采石一入其城李煜遂擒彼二邦者如成都之濯錦江浣花溪武都山錦里城與夫相如之舊壚子雲之故居君平之筮肆子美之草堂之𩔖如建康之龍洞山白鷺洲烏衣巷華林園以至齊武射雉之地鳯凰棲集之臺大江秦淮之波濤茅山蔣山之崔嵬之𩔖非無風光之美景物象之繽紛可以搜羅而賦咏可以悦目而娱情奈何自前世之用武罹兵火之蕩滅頽垣廢址鼠穿狐穴殘刻斷礎燒昏塵没幸逢聖世昌運大來睿澤洋溢而無𩔖鴻恩共被其根荄道綏德撫薫醲涵浸一百五十載之久矣風聲氣俗雖移易而一於正而山川景趣猶未克逺邁於雅無征戰之邦也如論錢塘請申厥旨自唐乾符之後擁戎車者接軌徐綰劉浩之徒孫儒董昌之輩或毒螫於淮甸之邦或剽掠於二浙之内蘇常近境允常故都鞠為戰塲蕩為兵墟至錢塘則不然賴守土以安居雖黄巢之衆不能逾臨安而深入雖田頵之暴弗克破北門而馳驅歴五季之後迄聖朝之初幾百年間安堵無虞干戈有備而不試四民奠枕於里閭方太宗皇帝之當天繄太平興國之三年鏐裔曰俶遂捧圖籍以所管而獻焉是邦之内曰民曰軍詎知血戰之憂苦疇當矢石之辛勤矧歴休平八聖相承鋪鴻藻申景鑠灑德波散休明教條備民風純小而任一邑之宰皆是榮途之遴選大而擁麾旄之牧莫非鵷行之貴臣勤勞勸課惠養斯民兹其繁富日増者也茹華曰二邦以戰爭而其迹若彼錢塘以効順而其盛如此非特其邦也三家苖裔盛衰同之且清時待士如皇天罔私蓋有臧而有否豈特用而特遺質以禍福報應之明騐實縁忠順惡逆之殊歸因先生之言將使忠臣義士聞之而咸奮又足以貽萬世姦宄之永戒者也雖然是邦之内或今或古抑有遺美可以為風化之補者乎先生曰昔者范子安不受蒲輪之召命褚伯玉優游林泉而自娛或追諡而褒其節或立館以安其居孫鍾色養而孝行感天成緬廬墓而紫芝顯符或致司命之降顧或得旌表於門閭此其髙尚之操純孝之行尊之榮之足以粉飾王政當今明天子將聖在上賢公相以道弼丞孜孜圖治勉勉厲精惟是崇化阜俗之本常加宵盰探討之誠逸民之舉孝亷之科旌表之式追諡之榮既聞講求而悉行矣茹華曰大哉言矣經國懿範豈伊匪美實美風俗豈伊匪厚足厚人倫儻緣疎逺而難達蓋亦投獻於縉紳或因言以寤意將探摭而中明庶或不負煌煌帝言言訖曵踵而退南湖賦宋陳彦博禾城之南有積水焉介吳越之土疆直牛斗之星躔雖用涂之不侔亦泛濫之所先挾地勢之爽塏滙清波之淪漣紛纚纚其來屬咸爭奇而効妍若廼其源委也則天目之崖苕霅之溪東㑹吳淞西控禦兒支流旁達聨絡相繼以灌以溉以遂夫土宜其南則長水之塘殳山之鄉出硤石道海寧岸絶兮望洋其北則杉青之閘平望之亭表裏湖江并包濁清衆流之趨混浩浩以達於滄溟其上則有良田衍沃灌木叢泓麻麥夏熟秔稌秋登溝塍綺錯原隰縱横蔬圃之利瓜芋薤菘蘆菔茄莎實繁有生其中則有􅍉蒲葭菼澶漫渺瀰翠荇牽絲紅蕖濯錦菱生而紫角爭奮芡長而紅頭欲齊玉截肪而無玷珠脱蚌而未纍可以續食代飽為水蓏之珍奇魚則鰷鰋鱖鯾鯉鯽鱭鰕白小羣鮮雜以蚌螺網罟相求泌􅫶交加霍如霧散率爾雲遮或鱗甲璀璨或鬐鬛鬖髿或貴列鼎爼或賤比泥沙以得之而饜飫恒家益而户夸鳥則鴛鴦鵁鶄鳬鷖春鋤羣娭競沒去曉來晡起如飄風泊若浮壺逶迤沚渚唼喋菰蒲矰弋之所只且若乃時雨降川澤盈春流汨其乍起綠波艶以鱗生於是淑景布麗微風扇和青莎縁堤虹梁跨波都人士女往來婆娑列綺席間清歌揚桂楫浮彩舸以樂時雍既麗且多又若潦水盡寒潭澄天翳絶湖鏡平望頽陽之西下見明月之東生漁歌互答水調凄清輕艖短棹北渚連汀實豫且之攸樂非伊人之所恒别有浮屠之宮號為真如孤塔岧嶤仰攀雲衢俯瞰川陸渺漭縈紆巨浸涵其表遥峯峙其隅極南湖之壯觀􅄃秀色而無餘唐名臣實為風氣之所聚亶乎昱而光新凡湖之美盡是而不乏所陳矣嗚呼噫嘻惟昔春秋敵國為讐夫差句踐各奮其謀疲民以逞暴骨為丘檇李敗師甬東使居越不為僇吳其沼乎然則是水也洗干戈之汚衊復民生之凋瘵語其量一勺之多語其用五行之大豈直涵烟波浮藻采狎遊觀資玩愒而已哉客有謂賦者曰洞庭彭蠡之水天下之大也子不是之求而獨甚譽於兹水不已過乎予曰不然人情忽於所近小大各有攸當是故鯤鵬扶揺萬里而鷦鷃亦自足翺翔太山之髙千仞而不能有加於毫芒莊生所謂目擊而道存隨寓無方者也亦奚病哉乃為之歌曰南湖之清兮可以濯纓南湖之上兮聊寄我情地之勝兮獨不以人而後名後千載兮亦有慕其遺聲雁蕩山賦宋薛季宣溟渤轉乎東南雁蕩嵬其髙峙抱層巒之四合聳翠峯之崛起仙凡道絶𩔖隔一塵摩空下望儼若雲屯聊登雲以寄傲循石磴之縈紆移顧歩於觀瞻瞥風氣之懸殊幽谷之中别有天地石笋排空而剡翠瓊館憑虚而綺麗微埃不入其方寸尺土不留其度内峯夏雲之競秀均倚劍於空同崢萬仞之嵯峨羅巧妙之巃嵸粤若邃初天愛其道靈雲秘秀孰知其寳傳西域之仙書肇栖神於羅漢睠人寰之緬邈極希夷之汗漫徧歩幽獨蓋始得於唐僧之咏看之不足此樵翁之浩嘆者也我國家太平興國之二禩天下車書始同有禪師曰全了菴廬初結於芙蓉行亮文吉踵於前甄昻作尉從而後靈巖碧霄巑岏而並露南閤白巖孱顔之盡剖起初凡七十有三年而後隴斷之不遺蓋成終於皇祐之己丑稱始開於祥符之伐木者故適當其㑹詔遷就於貫休之詩者見不臻乎首是知水鑿之為􅊿論又何知造化成功之不有乃其東望秀嶺道屬天台山川襟帶於四明風雲呼吸於㑹稽無非仁人三乗之窟宅誰能見其一日而數相往來其西則蓋竹雲門白巖白鶴魔軍退舍而真宅斯見至神入竹而誠明可作洞天髙逺以誰訊福地潛通而叵度隂有楠溪其陽際海幹地軸之盤踞望天闕之斯在崖有千里之石壑有萬年之松金雀幺而不大金猿線而多茸樂官羣處而和聲山羊歴險而純素若夫王孫麖麂鷹鸇鳥鵲衆獸常禽之𩔖他山既多有之兹故不詳其名𩔖山之狀也崇倚青天峻連碧霄凌霞傑出於疎雲疉嶂牽聨於紫極工如大巧特若小高三巨相形而岝㠋獨秀孤立而峩瑞星明而治世皆見霹靂轟而聵者不聞常雲舒而莫卷白雨霽而猶雰牛女從橋而星河夜渡雷張望氣而龍泉可得璧月懸空而夜夜常滿朝陽薄暮而光明烜赫貫香珠之落落起祥雲之圛圛玉峯髙並於兩巒利孔開通於䨇穴積翠合於拾羽之潨紫微居而衆星拱列觀架海之騰波浩浩望平霞之火炎烈烈苞有菡蓞菌有靈芝立筍圓而削玉丹桂茂而欒枝蓮花芬坼而木末可採圓蘿糾結而鱗比相差其於人也總者如角直者如指圓者如臍礪者如齒佛掌髙而頂可摩神跡巨而武可履詣方丈而問維摩之居士行妙髙而見香嚴之童子龕巧合於佛影得又同於僧寳五通變化之有靈三清逍遥而適道天王朝祭而明堂斯在西真翔集而瓊臺莫訪上人道術之相忘朝賢仁義之為尚尋招賢之舊隱得侍郎之菴居觀音行而隨形示現羅漢游而飛錫騰虚三傑隱風雲之㑹七賢從竹林之下五老來兮書籍校千里㑹兮德星聚朝天義重於尊君抱兒愛均於慈母爾乃展旗障日立㦸排雲闗弓飲羽長劍倚天射垜逺而破的馬鞍跨而絶塵文筆擅塲於文㑹戴仁踐履於安仁寳印得之而如斗金鼎負之而調􅃵鼓槖籥而布化鳴鍾子而振聲碑摩崖而沒字鏡無心而鑒形乃有琢䨇玉獻連珠咀文英讀靈書對棋枰舉覆盂振藥杵火茶爐盍簪加導於仙冠折角尚賢於巾子藏珠媚而測水不涸爐藥就而羽人不死行道周遭於石佛棲真髙蹈於迎雲空洞虚而無物雲霧合而神仙登有石城度有石梁入有天門窺有天窗有堂有室有斛有倉旌有石表葢有版藏門樓高屹以超雲嶤闕對峙以迎陽澡身莫便於浴室修道何樂於禪床考室而柱金矗立蔽風而翠屏是陳版障駢而可隱行廊修而可循像有獅子鹿影靈龜鯽魚三燕頡頏而穿幕戲龍驤攫而含珠飛羣鳯之徘徊戲䨇獅之矍鑠猴不可以加冠魚有時而登陸羚羊挂角以棲止回鸞鶱翥以翺翔犬以警而司門猫以游而存堂龍倦游而或臥虎已蹲而更伏禦火共施於䲭尾照水孰燃於犀角天柱之峯上凌空碧其旁無附其趾無蹠削貞珉而介出崇髙切於青雲圓度可規直中可緡望之者目極倚之者神驚疑共工氏之不作不周未觸而今存此峯巒之峉立者餘蓋不得而數陳彼有同名而不相似者於彼吾又何言其水則二龍之湫東瀑西瀑合掌摩訶劍峯乳酪水簾眩目以舒耀新月弓彎而出谷清涼之滴滴無已照膽之澄潭可矚彼潭之泳者湖鰻或澗而流之筋竹決而下也銀河瀉而垂練委而去也錦文鮮而漬淥觸潛虹而聲韻鸞和潄堆埼而皴如縐玉委蛇而動行乎巖石之間者何容窮盡又豈祗清溪之幾曲也泉流之冠大者龍湫崖奔如赴氣凛如秋界青山而澎湃吸蕩水之宗流上擬青空下臨無地霏微雨露之飄散晃朗白虹之下墜乍垂雲而零露恍山崩而川至雖淮流破荆山之堰曽不足以言其髣髴也衆水之淵發源雁蕩厲巍巒之峻極侵山椒之修廣箴竹叢生以䝉翳娑羅挺幹以駢擁征鴻攸聚牡蠣生之浮鐵船之蕩漾沉古鐘之逸響派旁泄之奔波羌不以五水九旱而為之消長傳或謂滄海此遺波焉今固莫詳於既往矣乃若浮圖天成古塔神造香爐既設寳幢戴好楞嚴飛大乗之典寳陀襲白衣之號髙僧梵唄之相和仁祠金碧之相耀惟兹華頂花壇是陟居者有積行者有食無芸仙者之田每駐仙人之屐然雖曠世而彌年未覩周游而渉歴者也爾乃樂成首路東騖幽尋絶白沙之古塞陟峭嶺之芳林秣馬於芙蓉之驛驅車於長皦之原招提寳塔屏障横焉千巖萬壑是途伊始扶笻竹以自杖屐登山而後齒於是奇巒卓犖怪岫崢嶸傍顧而塵心都息相羊而油然意生登寳冠之蘭若跨飛瀑之修梁引仙簪而峩首裛熏爐之裊香前眺諸峯崒焉亭直揖䨇人而問道届凌雲而一息九龍垂頭而來下梅霖飄洒而雰零洗予心之宿累拂襟袖之泠泠望啣珠而返顧跨伏虎於石門里連霄之十五窺蕩水之靈源凝神寓目十里為近羣玉浮天全乎一瞬度東岡之崇嶺禮化士於䨇巒指游龍於戲鳯鏡三京而膽寒大屏之下寺曰能仁四溪交流並凑天門舞羣鳯之垂天儼華陽之挺立吞衆壑於朝宗拱萬山之環揖是雖奇峭無多焉固已冠羣峯之嶪岌也羊腸回於六八俯在下之蕖山羌有鳥而有花悟達士之微言回巒之障隱若金城漢唐道隔言訒天升惟隱顯之有時殆匪由於人力何先古之神閟須後來之抉剔載旋予歩溪滸攸行天柱華嚴接阜連岡躐層巖之鹿苑窮逶迤之淵泉屏翠彩之蒼蔥聽天樂之喧闐仰大龍之懸水飛小雨之濛濛樂尊者之優游得從容於下風指普明而回御探龍窟於飛泉勒馬鞍而東之望奇峯之隱天觀音大士如住虚空漠漠行雲如尋舊踪安禪之谷萬㠋宗焉大筆書空一柱擎天重樓俊傑以連甍䨇闕當塗以相向天聰玲瓏其四達自在慈悲而有像龍蜿蜒而歸洞離小湫而曵尾擁在定之薫聞鼻凹窪而出涕奮天然之鱗鬛回元造之頭顱諒兹山之多怪猶斯巖之匪如摩虎口以東游瞻石神而近止訪淨名於丈室挹乳泉而一洗乃觀初月乃下虚簾鮫人織素近在危簷閲靈峯之景物奇特亞於靈巖犀黒闇而通天龍神游而處潭五雲閣道應真矯矯谷有靈珠歘生芝草入㑹聖之崆峒仰虚空之谽谺信真如之可學烹乳茗而生葩金掌髙呈亭亭空際訪三賢而景仰遂回車於真濟過胡公之棲宅遵靈運之迷途造石室於東梁髙禮佛之勤渠亭白箬而下道窮三閤於蕩隂忘散漫之岡巒蓀蕪隱於追尋北有白巖石溪九折仙橋跨焉巉巖影絶斯葢水之奇也履芝田而種玉煉爐火以飛霞企時人之不及厭時俗之囂譁過湖坑於南閤峩上藏之孤髙壯瀑水之滂流訪隱仙而遊遨至窮途而輙哭等游夢於華胥問山僧以前路固有匪吾人之所知者殆不可以窮竟又安得而論諸至若大洞神山仙靈是宅龍湫晏坐者若矩羅之住世虎蹲守護者蔓定僧之衣裓也至人遐造踐迹無同運無言之元化闡不二之宗風説法詎離於住定經行何間於神通縮地於偷桃之谷神飛於窺鏡之童龍丹成於老父九二讖於元豐汚名山以世緣夢頽像之形容神屠履崖以如地聞思光熖以如虹盜道而江波激怒觸鼻而涓泉不通者非人耳目之見而又烏得以議其汚隆也惟兹山之神秀嗟近在於目前曽跬歩之不到乃人窮而上天化石橋於似閤企筋竹之飛泉抑子晉未成於羽化而謝客不得善於游山也今夫天下之山江東居最永嘉富甲於江外而雁蕩為大焉可以超羣而拔萃矣他山之秀幺麽稱妍陽臺十二秋浦九蓮詩文振古名字喧天僅得此山之一丘一壑猶拳石之細夫何足言所謂夷泰山而吞雲夢者惟雁蕩之山為然西湖賦宋白珽杭之有西湖不獨如人之有眉目也如楚有金如蜀有錦人得貴而玩之也凡水在天地間由山而出由地而受為里合萬有六千奚止此水可誇絶於天下哉顧一州一縣理所在水之東者皆西湖也潁有之松有之山陽四明𩔖有之獨在杭者齒響諸夏而筆騁羣彦是蓋有明珠玉樹不待斲而成大圭圓璧必待繅而貴者矣是湖也發源南北之諸峯而風氣曼延乎東州之列岫近而秦望逺而桐扣左龍飛之兩乳右鳯凰之孤咮勢将合五州之芳澤集萬山之鮮溜豈惟武林之一泉武林即靈隱山也俗稱錢塘門裏太乙宮小阜非能專此江北江南之秀原夫奇狀天造麗景人為古稱圖畫之如則陋今曰蓬萊之山亦非若欲知三嘆望洋之盛當不憚登一覽衆小之危悵天地之尤物何簡牒之偶遺於鄴侯之六井獲肇見於唐碑盪海瀕之瀉鹵弭疾厲於羣黎今衍之而為井十或通貫乎園池繼崇隄而節水将下塘而注陂羌運漕而達河亦既旱而􅁋瀰澤及田疇之廣乃繼聞於太傅之記辭錢氏置千兵而設撩陳氏述古資衆僧而繕治既大備於蘇公樹三墖於中流横六橋於長隄復繼志於趙侯與􅊸擴波光於板目續麴院之一支亭館日増而月益崇築前規而後隨此特表其人為之序迺以見夫天造之機南北兩峯亦有祠宇譬之龜䝉為望於魯皇妃保叔䨇擎窣堵截羣峯之駿奔為西湖之門户冠之以南屏襟之以赤土宮其湄以致齋圃其墟而閲武煙霞乍舉白雲不去金鐘無聲玉岑有數鵶鷄延為向背靈鷲衍為胥附五峯飛來白猿蓮花稽留月桂指列乎虎林三竺駢羅乎玉女按駞巘而巾子巍如帶粟山而石甑酷似在水中央孤立一嶼遼鶴不來處士誰與幸庾梅之猶昨惜陳柏之非古由四刹負鼇而徙報恩智果廣化瑪瑙成太乙祝釐之所復有寳蓮瑞石逺暎胥山之輔金地七寳南屏至此皆叙遶湖山名翠瓦丹桂寫影乎水滸凡此前後聨絡復多嶺隝葛公已往而丹井不改仙姥既去而慈雲如故二麥當風篁之衝臙脂割黄泥之據萬松東接乎宮垣棲霞南峙乎岳墓紫坊鐵冶石人大青之儔散不計其在處中有水竹青芝法華大慈桃花瑞岡之相背巢溝龍駒之並馳詠吳王之楓木表金嫗之楊梅抑不過因人煙之所聚曽不若朱野葛隝之得人而奇洞則有龍泓香林水樂石屋呼理公之白猿號里人之蒼蝠煙霞後即蝙蝠洞乾濕二洞在棲霞嶺往往刓巖而嵌谷雖形勢之或列皆所以發湖光而増山綠泉石井潭澗谷實繁釐為十八合為一源濯惠因之滄浪弄金沙之潺湲冷可洗耳甘可滌煩旁城有甘泉坊禱白鱔而祠烏龍記水魚龍井而碑靈鰻限玉為池跳珠為軒香山六一叅寥東遷各井其井各泉其泉終歸乎一萬頃之湖天若乃園池樓觀佛宮仙宇辯口不能殫其名巧厯不能知其數余固拙於言辭始槩陳其洩露尚慮齊人不知有稷下徂邱徒知有管仲晏子湖詠維百先言御園爰有聚景圖經所尊致坤宫之孝養據震位以生蕃來四朝之遊幸􅄃衆逺以平吞􅄃逺堂名南有翠芳蘭栧在焉御舟名接蓬萊於中沚甘園有水中蓬萊堂賓慧日於前軒北有玉壺紅鵑尚存創於鄜王隸於慈元去環碧兮百櫂隔水月兮一垣慶樂有梅闗桂林之勝珍鳥異獸之繁内畜天鵞牯牛元鹿三尾龜等亭連棟為十景碑蝕苔以千言記南園之絶景扁西湖之洞天此皆始屬於禁籞又不但嘗錫之侯藩次則仰真珠之髙寒聽水樂之聲在髙寒聲在皆園中堂名雲洞居下湖之左古柳列昭慶之外得萬景之天全擅九曲之紫翠萬景天全堂名前有紫翠間亭總宜盡晴雨之奇養樂集彫鏤之藝廖氏九經等書鏤版其中梅岡班衣擇勝秀野藹梅坡之緑隂通花家之紅靄尚名苑與勝圃滋角竒而鬬異矗不知其幾百十所所可言者特言其最堂則有德生溥泳飛之仁依光覺貪濁之迷偉觀興頑懦之志湖山廣壽樂之基三賢先賢序列一隄表義夫節婦三十九人之樂石儼大人君子千載一心之令儀閎雪江之講肆湖光講堂在新路褰冰壑之書帷金淵書堂在南山下隱居思真玉蓮舊名一清翠樾九師有美尚可按跡於品題亭稱冷泉旁連壑雷上有天香下有客兒花光巧於公輸通元掩於招提春雨為觀香月為鄰水竹院落無邊風月見天地心以總之皆賈氏亭館名池有湧金金牛白龜瑶池白洋分占湖之四涯林塘之鑿花徑之構各擇其地各揭其楣非窺園則莫知禮重崇報有國所祠夏禹據神隍之堞神胥峙輦道之陴旌金祝之奮忠慨朱蹕之蹈危朱蹕金祝皆湖上捍禦烏珠死節者嘶府君之神馬游宰相之白衣海州死節張玘卾國錫圭傳唄林於霍山之阜薦菊泉於嘉澤之墀維廟食於百世皆功德蒐於祝典非若倚草附木徒禍福於六時陵墓則有后妃引嗣之攢宫侯王君公之瑩碑朱少章之節旄已落馬三寳之壺蜂不飛和靖贊寧花翁紫芝孫惟信趙師秀皆炳乎山林水棐之潛輝四聖顯應報隂相於中興三茅表忠見闡靈於内向安晚峙上清之下初陽臺玉清之上雲濤靈曜崇真希夷明真神仙雖藏幽占爽隱顯乎此湖要不若佛寺蘭若後先乎重山複水之廣松門九里袁公是崇仁敬七峯兩澗靈隱在中秀石奇水靈泉怪峯兼幽人禪衲之盛將互見於累代能言之鉅公犍竺有三連甍接墉觀自下而中而上始王囿而臻大士之宮神檜重榮御梅猶紅草堂繞枕流之翠香林挂古藤之虹禮寳掌而登天巖瞻珠鬘而下乳峯前生仙而廣利普福寺後月桂而洪鐘集慶寺圓覺藏思陵之扆靈芝抱越王之弓遡雲扉之幽窈顯慶寺撫靈石之玲瓏演福寺現長耳之妙相演句麗之慈風南屏列家人之象瑞龍豁奇觀之胷五百應真萬鈞巨釡畫廊絢日鐵墖插空推淨慈為南山衆刹之宗瑪瑙而坡鳥窠而叢佛三寸不為小樓十三以龕其像佛百丈不為大舟萬斛以維之蹤借竹智光掃缶中庸惟壽星為北嶺叢林之雄豈唐朝四百八十猶有存者而宋興幾三百載損益其中樓閣則豐樂中峙據湖之㑹叢以亭榭附以闤闠魚莊曼衍柳洲縈帶竹山城而可眺迎光張循王園樓雲而不礙清曠專負山之美南屏山下先得俯近水之快即蘇公望湖樓紅梅閣於孫沔緑竹閣於居易巢居瘞杖於屏下四照插峯於鏡外二閣在孤山上外如延賓望海蓬萊雲漢正遍海㑹顧層見迭出之多而半為白鶴青鸞之所蔽皆在道宮佛寺中也復有如虹者六御筆仰題西林處士宛武揚鬐斷橋非荒蘚之舊長橋有古木之依琮老金佛二橋在上竺節奔泉之所發行春合澗條衆壑之攸歸餘則凌金跨玉斜斜整整将舉趾而皆迷其或男裙女袿東游西汎畫舫蘭舟輕舠巨艦各標令名明淥清泛金勝小而善疾寳瓶大而宜緩明玉坐百客而有裕總勝列四筵而才半賞心汎綠百花望月皺綠翻篙流蘇颭幔坐若室處行若物换值御舟之游幸從去水嬉之宣唤前金吾而不禁後天香之拂面鱗如翼如恍衆星拱辰於天河之畔非萬斛之能擬豈千丈之為算史記船長千丈謂積數也别有龍舟兩兩鼉鼓馮馮花帽表於御愛繡袍見於神歆陳百戲於水面豎六標於湖心叅前兩後三令五申觀者舟兩行如廣陌迓者錦萬竿如長林五歩一亭酒旆茶䄄笙歌沸騰軒鞅紛紜柳行撲地花陣排雲梭門秋千出没乎翠圍舞衣歌扇周旋乎香塵新路習金雞之跖郊祀大禮歲則御前百戲豫於南新路習肆赦之藝祠山迎寳馬之羣二月八日迎七寶社馬社祭於霍山張祠觀者甚盛目不暇瞬歩不得循想見進魚􅃵之宋嫂猶多呈鶴舞之優人剪羅飣採花之籃範飴為穿柳之鱗飾木兵於小桁串家具於修筠篙矢激半空之霹靂紙鳶競九天之經綸柘彈象弩畫棍髹盆踏棍才潑巨盆皆水戲羅襪凌波金釵照春時固多􅄃紅拾翠之子亦豈無尋幽討勝之賓此特言萬一於春光九十之辰薫風動弦清和云始粲裏湖之梔林沸夾塘之荷翠紫燕瞥過白鷗乍起早崔祠之初度磁州府君六月六日誕辰都人於顯應觀進香已集湖中為避暑飲正盾日之方熾水鏡濯髮謂善泅者冰山礪齒移舟南向􅂝衾夜艤無人世之熱惱有月宫之寒意艶麗見於水如見於仙醲鮮取諸舟如取諸市秋容不淡拒霜已紅映後開之菡蓞雜戰水之游龍剖霜柑於驄轡簪露菊於船篷西山賦紅葉之句南山釂紫萸之鍾北風戒寒城人簡出肉輦酒船亦無虚日延祥之紅白梅城吳阜之髙低雪域寳騎躍長隄而蹴􅌦瑶幔車穿名園而擿珠瓅是蓋四時之景不同亦各以見賞心樂事之不一爾乃既聞遨娛之盛請言風土之美水憑山而甘潔土得湖而豐泥去菘葍取種於苕霅蓮芡移根於檇李紫芋菁菰白藕紅芰文鳬章鸝黄雀錦雉魚甜蟹香筍鮮芹脆松杉檜柏參术蘭芷實種此湖山之秀故無物而不備矧佳氣之磅礴至人材而尤異所謂傭兒販婦涵冰玉之不翅況彼都人士褚陶晉人十三歲作賦才德為張華所稱杜栖之文行南齊人篤孝為學士全琮吳人父令齎米數千斛皆以賑饑貧者以功為大司馬許逺之忠義元絳唐肅皆宋人有功德及物廣恩惠於民人伯玉姓褚南齊人隱瀑布山累召不至君復抱孤貞於林翳褚氏世濟其美於大唐錢氏開國承家於五季顧歡郎簡之豈弟宋齊間人以學術濟人者羅隱楊蟠之峻烈豈工詩而已矣惟此人物之盛不可殫紀方外則郭文王復馬湘潘閬管歸真之流以發揮其英聲法照贊寧道潛清順抱一子之徒以陶寫其清氣時人但知游觀之可樂而不知景物緣人之可貴且自有天地即有此湖羣峯注流底而成瀦尚念東浙於海鹹惡所濡草木齧餘而色變山川薄久而氣殂所以消沮沈昧之不已雖有此湖而如無於是築而防之使涇渭各得其所浚而闢之俾鳶魚各遂其初風無大浪雨無奔湍将翺将翔以佃以漁以此知古人有功於此水将舉一朝而利萬世以無餘何寳正以還六龍南渡搜勝抉奇重丹疉素致洞心駭目之觀非晴光雨色之故彼徒知歲増侈而月益奢至以釡銷金之為喻殊不知神京不返憂勤聖宇千官展轉而擇棲萬姓彷徨而懷土故思極耳目之娛而為安旦夕之具不然中原豈無黄河泰山之雄觀花石艮嶽之奇趣日月云邁徘徊瞻顧嗟居人游女不能不竭盤游無度之歡而志士仁人不能不興宴安酖毒之慮咸淳庚午歲作浙江通志卷二百六十九
