body:
  text: 浙江通志卷二十山川十二溫州府永嘉縣附郭華蓋山萬厯溫州府志一名東山在郡東偏城沿其上郡城九斗山此山鎻其口有容成太玉洞道書為天下第十八洞天又有石龜池三生石青牛塢丹井蒙泉諸勝楊蟠華蓋山詩七山如北斗城鎻幾重重斗口在何處正當華蓋峰米􅃔尊太玉洞詩亭亭五粒松華蓋神君宅風吹寸草生依然緑袍色積榖山名勝志在城東南隅山形圓正如髙廩故名萬厯溫州府志又名飛霞山城沿其上麓有謝客巖謝靈運書白雲曲青吟草於崖上今蕪没惟謝客巖三字存又有飛霞洞春草池松臺山萬厯溫州府志在郡治西又名淨光山朱彛尊松臺山詩蒼蒼山上松颯颯松根雨松子落空山朝來不知處海壇山永嘉縣志在縣治東北其支阜為慈山坐鎮海門内外最關郡城來龍舊云海壇沙漲溫州出相宋陳宜中明黄淮張孚敬皆應之郭公山萬厯溫州府志在郡西北晉郭璞登此山卜居故名湧泉太平寰宇記永嘉華蓋山周回九里遥望似華蓋有湧泉旱則水不減雨則水不加謝公與從弟書云地無佳井賴有山泉謝池嘉靖浙江通志謝靈運嘗游息於上池水澄湛俗呼靈池張又新謝池詩郡郭東南積榖山謝公曽是此躋攀今來惟有靈池月猶自嬋娟一水間永嘉縣城外山川金丹山名勝志去城西三里上有三峰色如丹霞㢲吉山萬厯溫州府志去城東南二里當郡治㢲位世傳白玉蟾駐鶴於此陳髙選陸有章分題得㢲山詩㢲山如層臺積翠俯城郭古木秀松櫧元鳥隱樓閣雨散飛素雲風静語丹鶴游人日躋攀杖履相繹絡陸郎吳中來雅志放丘壑哦詩松間題攜尊石上酌我性亦愛山方期結幽約於焉送子去登陟􅃤不樂逺别已傷懐真境况寥落佇立睇大江孤舟入冥邈仁王山萬厯溫州府志去城南五里旁有小阜曰湖嶼正對府治黄土山永嘉縣志在㢲吉山側靈官山溫州府志在府城南五里一名覆釡林靈素塟此故名按郡城九斗松臺郭公海壇華蓋為斗魁積榖㢲吉仁王為斗柄黄土靈官為左右輔弼暘奥山溫州府志在府城南十里下有暘湖孤嶼山江心志在郡北江中因名江心東西廣三百餘丈南北半之距城里許初離為兩山築二塔於其巔中貫川流為龍潭川中有小山即孤嶼宋時有蜀僧清了以土室龍潭聨兩山成今址孤嶼之椒露於佛殿後謝靈運登江中孤嶼詩江南倦厯覽江北曠周旋懐心道轉逈尋異景不延亂流趨正絶孤嶼媚中川雲日相輝映空水共澄鮮表靈物莫賞蘊真誰為傳想像崑山姿緬邈區中縁始信安期術得盡養生年張又新孤嶼詩碧水逶迤浮翠巘緑蘿蒙密媚晴江不知誰與名孤嶼其實中川是一雙文林孤嶼詩孤嶼蒼茫雲水鄉魚龍吹浪濺僧房暗潮浮動乾坤小髙樹遥連吳越長千古江山根地軸幾人功業破天荒謝公亭畔題詩石半蝕蒼苔字兩行東山太平寰宇記去城西四里其山北臨永嘉江東接蒼海西山溫州府志在府城西五里連峰疊巘如列畫屏若䕶國山甌峰紫芝峰慈雲峰䉡竹峰瑞鹿峰皆其支也又有愛泉鑒泉玉乳泉飲鶴泉虎跑泉龍珠塢丹充洞赤松洞雲霞嶴桃花澗小雁谷藏春谷諸勝為登覽勝地凌福山溫州府志在府城北六十里一名雞嶼山峙永寧江中羅峰山嘉靖浙江通志山在羅溪之上吹臺山名勝志在府城南二十里上有王子晉吹笙臺下有飲鶴泉山之隂屬永嘉山之陽屬瑞安太平寰宇記吹臺山其山狀如樓臺下有飛泉石池生椅梧及笙簫之竹梁丘遲為太守常採琴材寄吳興桞文暢張又新題吹臺山詩吹臺山上綵煙凝日落雲收疊翠屏應謂焦桐堪采斲不知誰是桞吳興慈湖山竹嶴山舊浙江通志俱府城南二十里太平山溫州府志在府城西八里山北臨江有太平嶺大羅山嘉靖浙江通志在縣西南四十里溫州府志上有菊花潭臥龍潭玉涵潭龍鬚潭飛來巖動石茶山霹􅋬尖萬厯溫州府志唐劉沖隱此明少師張孚敬羅峰書院在其下挂綵山舊浙江通志在府城東北二十里永嘉縣志其石壁立燦爛若綵繢然故名岷岡山溫州府志在府城西南三十五里亂峰環簇如蓮花瓣宋儒戴溪讀書於此五峰山萬厯溫州府志在建牙鄉俗稱丁公山有西華洞乃右弼真人吹簫地瞿溪山萬厯溫州府志在郡西南五十里太平寰宇記沿山石壁髙十二丈古老傳云是石室歩廊謝靈運過瞿溪山飯僧詩迎旭凌絶磴映弦歸溆浦鑚燧斷山木揜岸墐石戸結架非丹甍藉田資宿莽同游息心客瞹然若可睹清霄颺浮煙空林響法鼔忘懐狎鷗䱔攝生馴兕虎望嶺眷靈鷲延心念浄土若乘四等觀永拔三途苦瞿嶼山嘉靖浙江通志在城東二十里獨峙江濆吳義士瞿素所居石鼔山溫州府志在府城西四十里名勝志山有石如鼔扣之則響謝靈運登上戍石鼔山詩旅人心長乆優優自相接故鄉路遥逺川陸不可渉汨汨莫與娯發春托登躡歡願既無並戚慮庶有協極目睞左濶回顧眺右狹日永澗増波雲生嶺逾疊白芷競新苔緑蘋齊初葉摘芳芳靡諼愉樂樂不燮佳期緬無縁騁望誰云愜青嶂山萬厯溫州府志在郡城西北四十里即陶貞白隱居之地宋柯可崇於此辟榖麓有陶真君祠羅浮山名勝志在永寧江北岸與孤嶼相望永嘉記云秦時從海上浮來張又新羅浮山詩江北重巒積翠濃綺霞遥映碧芙蓉不知來後滄溟上減却瀛洲第幾峰永寧山舊浙江通志一名北山在江北郡之主山也綿亘賢宰仙桂永寧清通四鄉緑嶂山萬厯溫州府志在府城北永寧之支也謝靈運登緑嶂山詩裹糧杖輕拏懐遲上幽室行源逕轉逺距陸情未畢淡㶑結寒姿團欒潤霜質澗委水屢迷林迴巖逾密眷西謂初月顧東疑落日殘夕奄昏曙蔽翳皆周悉蠱上貴不事履二美貞吉幽人常坦步髙髙邈難匹頤阿竟何端寂寂抱寄一恬如既已交繕性自此出白茶山茶經永嘉圖經縣東三百里有白茶山華嚴山名勝志在府城北八里有石可為硯王右軍帖云近得華嚴石頗佳即此石門山溫州府志在府城北十五里賢宰鄉謹按溫州永嘉石門山無瀑布謝靈運邱遲石門諸詩括蒼彚紀俱載入青田石門山下萬厯溫州志則係之永嘉觀唐邱丹奉使過石門觀瀑詩有吾祖昔登臨謝公亦游衍之句而李善注文選引靈運游名山志云石門遡水上入兩山口兩邊石壁下臨澗水正與青田石門瀑布合今青田縣劉宋時屬永嘉郡則謝公所遊處當在青田不得以永寧支山混之也破石山名勝志在城西北二十里臨江壁立如張帆水上安溪遶其下上接青田惡溪七十二灘之水東流入蜃江元豐九域志永嘉記云永嘉江岸有枯石乃堯時神人以破石為堆将入惡溪置之溪側遥望有似張帆石櫃山溫州府志在府城西北一百八十里名勝志上有方石狀如櫃舊傳黄帝緘玉版篆册於此石室山嘉靖浙江通志在府城東七十里上有石夫人及瀑布泉太平寰宇記石室山南溪入一百二十里有石室可坐千人謝靈運石室山詩清旦索幽異放舟越坰郊莓莓蘭渚急藐藐苔嶺髙石室冠林陬飛泉發山椒虚泛經千載崢嶸非一朝鄉村絶聞見樵蘓限風霄㣲戎無逺覧縂笄羡升喬靈越久韜隱如與心賞交合歡不容言摘芳弄寒條天臺山名勝志在大若巖之北環列一十三峰中有傅巖瀑布蟾蜍石龍聼洞石柱諸勝青嶴名勝志在府城東北二百里海中兩山對峙如門宋永明中郡守顔延之於此築亭觀海大若巖萬厯溫州府志在府城西北一百五十里又名赤水山為天下第十二福地乃地仙李方回所治梁陶宏景於此纂集真誥故又名真誥巖吳甘露中道士傅隱遥亦於此飛昇此山地勢幽阻水石清竒略如雁蕩云尹廷髙真誥巖詩真人仙去久洞穴尚谽谺殿滴空巖雨廊穿别嶂霞對門孤石峭開牖亂峰斜欲跨蟾蜍背騰空采月華􅇶清源大若巖詩山行一百五十里人家鷄犬如桃源上有太古白石洞中是羣仙煉丹壇人間風雨不敢到梁時棟宇今猶存陶公真誥已入奏孺子崑崙去未還帝遣蛟龍䕶靈石時聞鐘鼔鳴空山簫臺迴光日月白河漢挂影星辰寒休糧道士逐白犬種桃金母驅青鸞千年茯苓長根蒂百嵗老人古衣冠曽聞赤水出巖洞飲者白日生羽翰前朝此地禁樵採邇來勝致多凋殘長松滴露封丹竈獨鶴衘煙鎻洞門神仙有樓不肯住我輩走馬何時閒願分半間明月屋自種數畝枸杞園巖頭獨坐洗塵耳消此兩澗清潺湲童子峰三洞羣仙録朱孺子居大若巖見二花犬入枸杞叢下掘得根烹食之飛於峰上雲擁而去今謂之童子峰甌海溫州府志在府城東九十里一名蜃海城北甌江即海之支江也江流東至磐石寧村㑹於海洋茫無際涯是謂甌海海山之際常有蜃氣凝結忽為樓臺城櫓忽為旗幟甲馬錦幔甌江太平寰宇記一名溫江東達大海西通處州青田溪名勝志舊名慎江一名蜃江一名永嘉江永嘉縣志潮汐往來旁流四達東西接台處二郡南北抵瑞樂兩邑内通三洲四溪及十三鄉十三浦無不悉貫焉張子容泛永嘉江日暮迥舟詩無雲天欲暮輕鷁大江清歸路煙中逺迴舟月上行傍潭窺竹暗出嶼見沙明更值㣲風起乘流絲管聲蜃川萬厯溫州府志在府治西或云即浣沙潭自西南至西北凡七曲有放生池樂湖荷花灣西溆廟灣綺川虹橋滙津漁郎洞以西城枕水如臥蜃之象故名蜃川會昌湖溫州府志在府城西南五里名勝志唐會昌四年刺史韋庸重浚因名又分為南湖西湖總謂之會昌湖也楠溪太平寰宇記在州西南十五里水入溫江溫州府志源出台州仙居諸山與賢宰永寧清通仙居四鄉水合流為欓樟羅藤蓬珍小李八溪至潮漈合入永寧江樂清縣縣後山萬厯溫州府志一名翔雲峰厯台之仙居及永嘉柟溪西北皆髙山大谷至縣後雜㳫若翔雲然縣治建於山麓東塔山萬厯溫州府志在縣治東有峰如筆宋紹興二十六年景雲見其上明年王十朋廷對第一西塔山樂清縣志一名馬院山在縣治西與東塔山對下瞰阡陌室家如魚鱗然九牛山萬厯溫州府志在縣治東有大石九逺望若牛又名謝公山以靈運常游此丹霞山萬厯溫州府志在縣治西舊名白鶴山山色多丹本名赤巖唐天寳六年改今名晉張文君煉丹於此太守王羲之訪之遁入竹不獲見下有金星溪其石名金星石巖下有招賢巖丹霞塢張又新白鶴山詩白鶴山邊秋復春文君宅畔少風塵欲驅五馬追真隱誰是當年入竹人周邠白鶴山詩簇簇峰巒繞四圍神仙舊隱歎今非溪中不見金沙出山外空驚白鶴飛石上瀑泉清照眼竹間嵐氣冷侵衣玉簫聲斷人何處千古煙雲鎻翠㣲簫臺山名勝志一名玉簫峰相傳王子晉吹簫之所其麓有沐簫泉王十朋簫臺山詩蠟屐穿雲去山深喜路通人家煙色裏古寺水聲中金濺星猶在丹成竈已空吹簫人不見臺下想仙風皇甫汸登簫臺訪沐簫泉詩仙踪詎可扳荒臺尚堪訪簫弄清泉中舄振紫巖上波動若鸞沉雲飄似鳬往浮雲本無垢托心在塵想花溪如有靈應流蓋山響蓋竹山舊浙江通志在縣西三里其上有蓋竹洞天俗呼楊八洞竒峰怪石峻峭幽深舊八洞今止三洞可通陳希文游蓋竹洞天詩劉阮游來境絶嘉復於蓋竹問仙家天開洞府少行跡煙冷丹爐空舊砂茅屋雲深有雞犬石田春暖長桑麻桃源景物知無異溪上東風幾度花西際山萬厯溫州府志在縣西三里三面蒼厓峭立惟東軒豁如門前臨大海瀑布懸崖而下章奥山溫州府志在縣西十二里一名雙峰湖横山盤谷山舊浙江通志俱縣西十里嘉靖浙江通志湖横山石崖横亘澗水出自深谷盤谷山東臨於海宋時王十朋孫閩讀書於此左原山嘉靖浙江通志在縣東北三十五里羣山環繞中有田二千餘畝居民悉藏谷中一峰如卓筆更有四景曰梅溪曰蓴湖曰左嶺曰小雁蕩白石山