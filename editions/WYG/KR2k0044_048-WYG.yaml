body:
  text: 浙江通志卷四十九古蹟十一嚴州府上古郡城嚴陵志在今淳安縣乃郡城舊址吳賀齊所築縣西古城基則其外城也晉太子城新定續志在今淳安縣西梓桐鄉普慈山之巔相傳晉太子嘗避地築城於上今跡猶存始新城水經注浙江又左合絶溪溪水出始新縣西東逕縣故城方輿紀要在淳安縣西六十里威平鎮吳賀齊置縣於此古嚴州城名勝志在桐廬縣西十五里桐江西岸隋仁夀二年鴻臚寺丞蘇綸築桐廬故城萬厯桐廬縣志在縣西二十五里吳黄武四年築隋開皇九年并縣入錢塘其城遂廢今孝泉鄉漏港有故址存焉古縣城嚴陵志在桐廬縣治西北十五里唐貞觀二十年廢桐江西岸城改築開元二十六年以水患復移城桐江口即今縣治是也故邑人謂此為古縣城嚴州府志元張士誠令其部將劉真據桐廬謀築城毁安樂墖及牛山臨江扶䦨取其砧石掘地作河事尋寢今市心及横港一帶𨼆然隆起者皆新城基也唐㝢之城方輿紀要在桐廬縣東南三十五里南齊永明中築地名舒灣𢎞治嚴州府志寓之富陽人僑居桐廬南齊永明二年冬聚黨作亂郡丞張思祖遣浹口戍主楊休武拒戰大破之事載南齊史今相傳為孫恩亂時㝢之築城以禦冦自齊永明上距晉隆安孫恩之變八十有六年不知舊經何據也遂安古城萬厯遂安縣志在木連村溪北唐武德四年遷縣治於今處其故城廢而址存夀昌舊城嘉靖夀昌縣志即今桂村東臨小溪乃七里橋也城壕形跡尚存新昌城方輿紀要在夀昌縣西永平鄉孫吳時置昭德城方輿紀要在分水縣西北嘉德里唐寳應二年築宋遂安軍節度治嚴陵志在子城正南宣和三年知州周格建門曰遂安軍門宋州治嚴陵志舊在子城内正北宋宣和三年知州周格重建元末燬宋諸㕔新定續志通判㕔在軍門内西添差通判㕔在東山下淳熙丙午陳公亮創知録叅軍㕔在嚴州門内街西司理叅軍㕔在嚴州門内街東路分㕔舊無定居南渡後在兠率寺東觀察支使㕔節度推官㕔觀察推官㕔司户叅軍㕔司法叅軍㕔並在遂安軍門内東偏宋倉庫新定續志都倉在子城東門内街北平糴倉附常平倉軍資庫在儀門外街西甲仗庫在州衙㕔西廡樓屋上回易庫在儀門外街西公使庫在州衙㕔東廡樓屋上抵當庫在州東比較務抵質庫在遂安軍門内之東醋庫在遂安軍門街東合同場在善利門内都酒務在嚴州門外比較務在州東下市贍軍務在和平門外都商稅務在比較務東東津税務在東津神泉監在望雲門外宋軍營新定續志遂安軍在子城内即嚴州治也威果營在望雲門内街南雄節營在望雲門内街南崇節營在軍門内街東壯城營在安流門内牢城營在州南寧節營附在牢城營屯駐兩指揮並寓廂軍營宋貢院嚴陵志舊在兠率寺西淳熙乙巳知州陳公亮就州學之西建宋建德縣尉司嚴陵志在府治東南隅之阜俗坊今税課司即司舊基漢新都郡治萬厯嚴州府志舊在新定里今淳安地名勝志淳安縣在三國為始新即新都郡治在隋為新安即睦州治也吳新安郡治嚴陵志在淳安縣城正北依山阜為之即今縣治漢始新縣治嚴陵雜識在今淳安縣西六十里永平鄉名勝志後漢書建安十三年遣威武中郎將賀齊討安黟歙因表葉鄉為始新縣此置縣之始今縣西六十里永平鎮有賀將軍祠志稱縣在永平鄉者是也漢始新尉治水經注立始新之尉於歙之葉鄉隋雉山縣治嚴陵志在淳安縣南二里大業初遷於此唐神功元年徙今治漢新定縣治太平寰宇記漢建安十三年置新定縣今遂安縣詳見城池隋遂陽縣治萬厯嚴州府志舊在遂安縣之木連村唐武德四年遷於五獅山之南是爲今治吳新昌縣治嚴陵志在夀昌縣西永平鄉六都花園平吳分富春立新昌縣治於此今地名猶曰故城坂元西塢寨嘉靖夀昌縣志縣西南梅峯之頂望金衢二州之境厯厯在目山有壘號西塢寨乃元時鎮守之地唐昭徳縣治嚴陵志在分水縣西北生仙鄉嘉徳里唐寳應中析分水置昭徳縣於此唐分木縣尉司新定續志分水縣尉廨相傳為唐時建宋政和間簷瓦墜有唐會昌四年八月字宋定安寨新定續志在分水縣東二十里吳村瀟灑園輿地紀勝郡治圃之總會也舊名後樂杏園新定續志在郡治瀟灑園池之西北園新定續志在郡治自為一區淳祐己酉知州趙孟傅改建讀書堂西園新定續志通判㕔有園曰西園為亭三曰第一開亭舊名梅亭曰愛蓮亭曰仰髙亭舊又有茒亭湛碧蔬畦三亭建徳尉嚴康朝撰西園記多慶園名勝志宋新定驛舊在州南門外謂之行衙即多慶園舊址水竹園新定續志在桐廬縣定安鄉地名吳村唐乾符間吳琠舍園為長樂院桂館輿地紀勝在郡治瀟灑園池之西西館嚴陵志在安泰門外東館嚴陵志在府城東南五里前臨江岸今為富春驛定川館萬厯嚴州府志在定川門外臨歙江錦溪館陳畢繡衣堂記余治淳安淳熙辛丑夏四月既葺錦溪館又一月而繡衣堂成乃屬王君勉中大書其榜雉山館嘉靖淳安縣志在縣西南五代時建桃李莊新定續志在郡治瀟灑園池之西相莊萬厯嚴州府志宋齊龍髙淳安人創讀書之室聚徒授學昇平圃新定續志在分水縣街前揖巖山後帶雙峰亭館乆廢髙風堂新定續志在郡治治事㕔之東紹興七年知州董弅建汪藻髙風堂記漢之二祖皆以布衣取天下髙祖之時有若東園公綺里季夏黄公甪里先生世祖時有若嚴子陵皆人主不得而臣者園綺四人避秦之亂入商雒山帝雖髙此四人召之莫能致也嚴子陸亦厭新室之暴不肯辱其身逮光武立猶披羊裘釣澤中雖三聘僅能一致而卒不為帝留是五人者出處豈不相𩔖哉然園綺之徒晩從太子之招畫自安之䇿正國本於談笑而史不記其所終故西漢之士聞其風而慕之者以計行為得而風節減於功名子陵本帝故人既物色求之而來髙卧不朝帝為親幸其館漠焉不應終其身退耕於野故束漢之士聞其風而摹之者尚風節以功名為不足道也子陵世家富春既歸耕於家後人名其釣處為子陵瀨今釣瀬并臺俱存而富春之境析為嚴州紹興七年吾友董弅令昇為是州期年政成乃爲堂於州治之左日從賔客觴詠其上而名之曰髙風以景慕先生之賢且立文正范公所建祠堂碑於其傍而求子文為記令昇可謂能尚友千古矣故余論先生出處大概以告令昇使併刻之思范堂新定續志在郡治瀟灑樓下嚴陵志後人思范仲淹之遺愛故名秀岐堂新定續志郡治黄堂之北舊名省心知州錢可則以近郊獻雙穗麥因更此名黄堂新定續志郡治設㕔之北爲黄堂舊名凝香賦梅堂嚴陵志在府治面山閣下即黄堂舊址宋淳祐十二年知州季鏞以黄堂扁於設㕔之北易名賦梅燕堂新定續志在郡㕔事之北又北爲緑隂堂南薫堂新定續志在通判公㕔右嘉定癸酉通判謝采伯建錦繡堂新定續志在通判㕔南薫堂右淳祐辛亥通判吳溥建風月堂新定續志在通判公㕔後宋景定庚申通判曹元發仍以舊扁題之平分風月堂新定續志在添差通判公㕔後琢句堂嘉靖淳安縣志在縣治内宋嘉定元年知縣鄭湜建鄭湜琢句堂記湜至淳安縣治東有讀書林又東有堂四楹其北東及南又各挾一室而皆無名訪其營創之始則曰前二十年令章君子獲為之他日披地志縣初號始新自吳厯晉宋齊梁陳為新安郡治在隋唐為睦州後改治建徳改曰新安曰雉山曰還淳曰青溪宣和間又改今名方昔之為新安也溪山之勝聞天下今縣治在半山間前臨溪其南羣山萃然争出若顧若揖忻於相遇跂其東溪亦可見乃即其址而南之再旬浹而屋成凡規模短長畧皆如舊前加崇軒面勢羣山髙明亢爽絶出囂塵之外遂為縣治環偉絶特之觀取東坡送李陶通直赴青溪有溪山琢句新之云遂以琢句名之勤清堂嚴陵志在淳安縣治内宋嘉定五年知縣楊恕建待問堂嚴陵志在淳安縣學宋淳熙六年知縣陳曄建嘉定九年知縣應與權改名謹教堂十三年知縣趙崇斌改名崇化堂淳祐四年知縣趙崇嶓改名化成堂萬溪書堂萬厯嚴州府志在淳安縣邑人方有開建朱熹爲書扁睦山堂葉適睦山堂銘序周茂良居睦源家傍山拱水揖望神洞白雲遠近顯敞作屋聚書草木脩列余名之曰睦山堂敬悦堂錢時敬悦堂記吳正甫築堂曰敬悦又築亭於池上曰詠春既為作𨽻古字且為記聞闕堂萬厯桐廬縣志在縣治宋慶元五年知縣陳宋興建招隠堂新定續志在釣臺書院紹興八年知州董弅建清風堂遂髙堂新定續志淳祐辛亥知州趙汝厯重建釣臺書院由官㕔而右為講堂榜曰清風北爲複屋榜曰遂髙萬卷書堂萬厯桐廬縣志在縣後宋進士方慤建思遜堂萬厯嚴州府志在夀昌縣治縣在萬松山宋時枕山為思遜堂漾月齋嚴陵志在府治西安泰門外西湖虛舟齋張栻虚舟齋銘序遂安詹儀之體仁闢齋於便坐以其虚以長也則題之曰虚舟正已軒嚴陵志在淳安縣治宋建拄笏軒名勝志淳安縣尉㕔西序嘉靖淳安縣志乾道中尉周操建周莘拄笏軒記今吏部尚書周公嵗在己未嘗尉茲邑茸一室於官廨西序為藏修校讐之地面勢羣山壯聳聯峙名之曰拄笏軒迨今三十稔莘適踵後塵至此則其室已墟矣獨環翠競秀自若也忽一日鄉老先生葛勉之出示周公拄笏軒二詩且謂莘曰賢者之興而愚者之廢公與尚書公同里通内譜興其廢詎宜後莘曰興不専乎賢廢不必乎愚以周公而興之誠賢也其所以廢之者果皆愚乎廢而復興者果賢乎願推之於適相值而冺其賢愚可也請於邑大夫得官錢十萬以供是役取故名書以揭於楣間梅隠軒新定續志在淳安縣尉司羊裘軒新定續志在桐廬縣釣臺書院紹興四年知州顔為建瑞芝軒萬厯嚴州府志在桐廬縣禪定院宋紹興間張浚訪分水王縉憩於寺中經宿而芝草生僧構此軒以表之聽松軒萬厯桐廬縣志在縣南俞深著書之所軒側多松觀魚軒萬厯桐廬縣志在質素鄉俞星叟隠居植賢亭松月亭新定續志郡治治事㕔之東北爲植賢亭為松月亭銀潢左界亭新定續志郡治内東溪射圃之南有亭曰銀潢左界舊名飛練賞春亭嚴陵志在府治内後圃宋嘉祐中知州趙抃建趙抃賞春亭詩羣芳開遍滿亭隈當盡芳尊醉看來始信春光無限好亂山窮處亦花開環翠亭輿地紀勝在郡治千峯榭之東錦窠亭新定續志在釀泉之南舊名采岐寳祐中知州吳槃改今名擬蘭亭新定續志在郡治掬泉為流觴曲水舊名流羽其東北為釀泉秀亭新定續志添差通判㕔有秀亭枕東山為之足遠眺望寳祐癸丑通判楊敬之重建越三年乙卯通判吳堅以舊扁題之翔蛟亭新定續志在郡治東溪之東環溪亭方輿勝覽在郡城中唐建方干睦州吕郎中郡中環溪亭詩為是仙才登望處風光便是武陵春閒花半落猶迷蝶白鳥雙飛不避人樹影睡餘侵枕簟荷香坐乆著衣巾暫來此地非多日明主奚容借㓂恂盍簮亭新定續志在郡治東舊名東館淳祐中知州季鏞重建分歙亭嚴陵志在府治南紹興八年知州董弅為亭以待艤舟者以其下臨歙江取孫權分歙之義為名溪山偉觀亭新定續志在郡城朝京門南與南山瀟灑亭相望羣山獻竒二江成字桅櫓下上一舉目而盡得之景定辛酉知州錢可則建孤髙亭輿地紀勝郡城西山上舊有孤髙亭玉泉亭萬厯嚴州府志玉泉在府城東烏龍山麓宋時嘗構亭於上趙抃玉泉亭詩潺潺朝暮入神清落澗通池繞郡􅆹亂石長松三十里尋源須上玉泉亭萬松亭嚴陵志在建徳縣北烏龍山瀟灑亭新定續志在建徳縣光孝寺後山上錢可則登瀟灑亭詩有縁結得南山境潇灑亭髙最可人此景古今吟不盡熙熙客裏且行春方回兩至南山飲瀟