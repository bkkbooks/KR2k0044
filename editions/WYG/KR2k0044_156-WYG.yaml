body:
  text: 浙江通志卷一百五十七名宦十二處州府晉孔松陽嘉靖浙江通志史失其名為松陽令後人繪像祠之孫綽作孔松陽賛序云君德器純固氣宇高邃荆玉不足論其溫南金未能方其厲夫其溫恭篤誠善誘勤勸外身崇物菲躬厚人指撝必謙動靜克讓允有古賢之流風乃祖之遺文矣賛曰於穆我侯含和體仁行範乃祖徳冠縉紳降跡垂化澤侔三春超然遐舉遺愛在民南北朝江子一南史本傳字元亮濟陽考城人晉散騎常侍統之七世孫少慷慨有大志家貧以孝聞仕梁起家王國侍郎奉朝請啟求觀書秘閣武帝許之有敕直華林省為遂昌令著美績後為南津校尉侯景攻陷厯陽子一赴建業及弟子四子五並力戰死韋沖冊府元龜沖簡校栝州事東陽賊帥陶子定呉州賊帥羅方惠並聚衆為亂攻圍婺州永康烏程諸縣沖率兵擊破之唐李邕唐書本傳字泰和揚州江都人𤣥宗即位為戸部郎中左遷栝州司馬徙灃州開元二十三年為栝州刺史喜興利除害坐誣枉且得罪天子識其名詔勿劾後歴淄滑二州刺史北海太守時稱李北海李陽冰畿輔通志字少溫趙郡人以詞翰名乾元間為縉雲令修孔子廟自為文記之嵗旱禱城隍與神約不雨焚其廟及期雨霑足亦自為記秩滿退居吏𨼆山後遷當塗令篆書尤善李繇嘉靖浙江通志建中間為縉雲令有政聲邑有孝婦陶氏喪姑負土成墳一哭而絶繇為立碣請陸羽撰文以表之齊抗權徳輿齊抗神道碑字遐舉高陽人累遷諫議大夫當軸者不能容坐細故出為處州刺史先是山越寇攘蕩覆城市抗乃卜勝勢之爽塏目習俗之便安三時不害百堵皆作後拜中書侍郎同中書門下平章事贈户部尚書李蘩嘉靖浙江通志京兆人泌子元和十二年為處州刺史至郡即建置廟學於檡山之巔立顔子以下十八像其餘六十子及公羊髙左丘明等數十人皆繪之壁選擇博士弟子員為置講堂俾之行禮肄習其中廩餼供億雖小亦備處之人士皆知興學實自蘩始韓愈為孔子廟記謂其為政知所先後云邢羣嘉靖浙江通志字渙思會昌五年自户部員外郎刺處州在任刑清事簡束縛黠吏撫輯良民冗事弊政必盡拔其根株而後已去任之日老穉泣送於途李中敏嘉靖浙江通志字藏之為人性剛峭有氣節會大旱上言乞斬鄭注則天且雨不報遂以病告歸潁陽注既誅召為諫議大夫給事中會昌六年刺處州政平訟理段成式輿地廣記字柯古臨淄人栝州縉雲山冇好溪本名惡溪多水怪大中中刺史段成式有善政怪族自去因改曰好溪宋楊億宋史本傳字大年建州浦城人雍熙初授祕書省正字淳化中賜進士第遷光禄寺丞真宗即位拜左正言知處州郡人周啟明篤學有文深加禮待召還拜左司諫知制誥為翰林學士兼史館修撰舊浙江通志億知處州以寛大為政嵗稔刑清甄旦明一統志至道初知麗水縣吏道詳敏而飾以文學清白以率下明察以照奸到任未期政治大成房從善栝蒼彚紀清河人雍熙初為遂昌主簿建文廟設聖像興教化正風俗通判梁鼎嘉其能立石記之仲簡嘉靖浙江通志字畏之江都人歴知處州稱治為浙東第一後知廣州徙洪州崇大年明一統志慶厯中知青田縣民貧無以納稅州符追逮縣吏大年悉令候冬熟納足民感其惠何辟非栝蒼彚紀建安人皇祐中宰遂昌興學立教得為政大體初邑未有學而夫子廟在西郭至是乃於邑之東南隅剏立殿堂齋序後令施肅李喬李宗孟王淵相繼成之傅楫宋史本傳字元通仙遊人第進士知龍泉縣孫覺為御史中丞語之曰朝廷欲用君盍少留楫曰仕宦所樂居中者免外臺督責耳令俯首權門與外臺奚擇且外官已所當得也遂去不顧栝蒼彚紀楫在任發摘𨼆伏奸猾屏跡張仲倩明一統志神宗時縉雲尉治有政聲縣有淫祠曰五通嵗旱仲倩遍祈不及五通吏民以請仲倩徃命毁之嵗亦大熟劉琦明一統志宣城人熙寜初為侍御史疏論王安石言行乖戾坐貶監處州酒稅以直聲聞李長卿括蒼彚紀開封人元豐初知縉雲政治嚴簡百里安之黄發崇禎處州府志泉州人元豐初知龍泉縣修崇學校進諸生講論經學自是邑多聞人劉彞宋史本傳字執中福建人從胡瑗學瑗稱其善治水凡所立綱紀規式彞力居多第進士為兩浙轉運判官知處州俗尚巫鬼不事醫藥彞著正俗方以訓斥淫巫三千七百家使以醫易業俗遂變加直史館知桂州坐貶元祐初復以都水丞召還邱括崇禎處州府志荆州人元祐初知龍泉縣距郡溪行三百里多灘磧中為最險括與簿馬應共議疏鑿至今賴焉秩滿吏民争挽留之夜潜遁去劉芹明一統志海州人元祐中知青田縣時邑未知學芹躬為訓誘風俗一變競以儒業相高徐公武崇禎處州府志潤州人元祐末知青田州舊貢黄連征屬邑邑非所産民以為病公武力言於州而罷之後仕至鴻臚卿黄葆光宋史本傳字元暉徽州黟人賜進士出身擢左司諫蔡京權勢震赫葆光攻之京中以他事貶知立山縣京致仕召為職方員外郎改知處州州當方臘殘亂之後盡心牧養民列上其狀加直祕閣再任卒州人立祠祀之張根宋史本傳字知常饒州徳興人甫冠第進士調臨江司理參軍遂昌令括蒼彚紀根下馬積案數十不閲旬而決曲直情偽無不曲中由是猾吏革心獄訟衰息既又築二堤創三橋立四門興利除害治績顯著陳戩括蒼彚紀徽宗時教授本州後以朝奉大夫充寶文閣待制知本郡時久旱戩下車雨霑足人以為隨車雨云王禔栝蒼彚紀揚州人政和初知麗水賦役均平吏無容奸縱囚使歸尅期而至邑有通濟堰灌田數千頃久而沙石積塞渠噎不通民甚苦之禔作石函度沙石修斗門泄暴漲無堙塞患民為立祠配詹南二司馬嵗時祀之紹興中復以朝散大夫知處州黄烈嘉靖浙江通志字元功浦城人宣和間守處州時清溪盜發麗水青田松陽遂昌皆沒於賊而劍川獨完烈奉詔即劍川治事能奮勇宣力區畫得宜賊將洪載以城降仍與通守會稽石端中謀築郡城民賴以全張觷宋史本傳字柔直福州人舉進士守南劍州遷福建路轉運判官未行㑹范汝為陷建州遣葉徹擁衆寇南劍觷率州兵與之戰徹中流矢死衆敗走城賴以全以直龍圖閣知處州蕩平餘寇進祕閣修撰江安止明一統志字元靜建寧人靖康間知麗水縣為政明敏囹圄屢空案牘無積又練鄉兵以禦寇邑賴以寧許尹嘉靖浙江通志樂平人政和進士厯知處州有善政高宗時攝蜀帥甚得人心遷司農卿孝宗即位上疏乞延儒臣講求治道尋以敷文閣待制致仕胡涓括蒼彚紀字霖卿鄱陽人靖康中應神童科後登進士第丞遂昌縣治距溪不數步而儒學切近於其側每霖雨溪流漲溢則堤湍齧害叵測涓因仿舊龍圖張根所築堤址而修甃之身自董役堤成百姓蒙其利董伋括蒼彚紀饒陽人建炎中知遂昌邑民夏賦輸綢舊用絹絲伋不忍重困民曰是給諸卒雖麻何傷諭輸綢者悉以麻郡從例責吏亟易伋即詣郡白其故郡不能强後守至諸邑宰畢㕘率獻無名金伋稟命而旋力陳已之其以身庇民如此汪汝則括蒼彚紀宛陵人紹興初知龍泉縣適劇寇楊就焚蕩之後閩盜范汝為復擁衆出沒縣界時欒孤輩詭謀鼓譟欲從之且肆掠於市民不寧居汝則至恬若無聞視事三日捕首姦二人尸諸市其徒股栗莫敢動事平以擅殺告待罪郡守蘇達曰當多難之時為百姓除害何必爾也請於朝以留之因疏名於屏任滿陞紹興府判艾若諾崇禎處州府志紹興初青田令留心撫字嚴於馭吏尤惡鄉胥之舞文嘗大書座屏曰愛民如惜血撻吏勝看經棒折鄉胥手何勞誦大乘游九功嘉靖浙江通志建陽人紹興中知慶元有古循吏風葉綰嘉靖浙江通志閩人紹興十七年知龍泉令行禁止訟牒至庭灼見誠偽民所爭辨必曉之理委曲開諭其抵罪者咸自輸服習俗好爭綰教以懲忿息怒率多感化先是邑佐括民老病以為𨼆丁抑之輸納綰驗而免之鄭必明崇禎處州府志字南仲閩人紹興中宰遂昌以儒雅飭吏事好賢下士以名教為先修學宫謹課試風動四境范成大宋史本傳字致能呉郡人紹興二十四年擢進士第隆興元年遷正字累遷著作佐郎除吏部郎官罷奉祠起知處州處民以爭役囂訟成大為剏義役隨家貧富輸金買田助當役者甲乙輪第至二十年民便之其後入奏言及此詔頒其法於諸路處多山田梁天監中詹南二司馬作通濟堰在松陽遂昌之間激溪水四十里溉田二十萬畝堰嵗久壞成大訪故迹疊石築防置堤閼四十九所立水則上中下溉灌有序民食其利除資政殿大學士充金祈請國信使全節而歸改敷文閣待制四川制置使召對拜㕘知政事奉祠起知明州奏罷海物之獻除端明殿學士進資政殿學士再領洞霄宫加大學士李大正崇禎處州府志字正之建安人乾道中始為遂昌尉去為會稽令念遂民不忘求知邑事既至得滯案數十判決如流無不快人心先是丁役不均科折違法丁産與稅乘除不以時大正盡革其弊凡學之宫室器用廢壞者皆新之陳戒崇禎處州府志乾道時松陽令律已清亷勸民義役以息爭訟卒於官縞素祖奠者數百人林采括蒼彚紀字伯玉閩人淳熙中知遂昌始至一新學舎請還贍學金於郡括匿稅田於鄉以廩士旬有課季有考學者翕然向風核隱户定稅名置都籍事無不舉傅兆崇禎處州府志上饒人慶元初知龍泉為民備荒出所得俸錢六十萬有竒會嵗豐穀賤盡以博糴為米三百餘斛置倉别儲俟農事方殷舊穀將沒則如其價以出之至秋復歛名其倉曰勸儲擇邑有行誼者司之嵗率為常民懷其惠富嘉謀崇禎處州府志慶元初以松源鄉立慶元縣嘉謀莅任始闢街衢營公署立學校建壇壝不期年而就民無勞擾朱元成崇禎遂昌縣志字少翁平江人慶元中知遂昌練達吏治縣之役錢累至積壓預借及三料計一萬三千五百緡乃根括舊逋撙節浮費補填其數迄今邑無預借之擾創常平倉儲粟米以備凶荒皆利民經久之計司馬掀括蒼彚紀字仲舉嘉定初自左藏出宰遂昌撫字教化上格於天是年有嘉蓮一柄雙花粟一本發十八莖莖生八九穗觀者如堵民為立堂扁曰嘉瑞楊大異明一統志醴陵人嘉定進士調龍泉尉攝縣事適嵗飢提刑司遣吏和糴米一萬石於邑未價頓増民乏食大異即以提刑所糴者如價發糶民甚德之陳逵崇禎處州府志三山人嘉定間知遂昌首謁學宫引試士子一時士風丕變囹圄空虛既去民繪像立祠祀之王圭崇禎處州府志吳郡人先為麗水簿秩滿攝松陽民安之請郡上其事詔即真焉正疆界定版籍惠政在民實多葉武子括蒼彚紀紹定初守栝時民生凋敝兩稅外尚有浮財物力之徴民不勝困武子慨然身任其責即䟽其弊懇乞除豁可其奏民賴以甦立碑於麗陽廟劉􅍲明一統志莆田人淳祐中由進士知青田縣明於政事洞見源委吏無所欺以崇學校厚風俗為先民懷其惠肖像祀於義倉李雷奮明一統志鄱陽人咸淳中知處州在郡亷謹嘗捐俸造郡學士民立祠於學祀之元趙賁亨元史本傳字文甫冠縣人襲行軍千户至元十四年授虎符懐逺大將軍處州路總管府達嚕噶齊未行適盜發澉浦行省檄為招討使率兵平之未幾處州青田縣季文龍章焱殺趙知府以叛賁亨獲其黨始知七縣俱反文龍自署為兩浙安撫使據處州天慶觀賁亨率衆圍之將騎士三百陳於下河門賊出戰以精騎蹂之遂棄城突圍散走賁亨入城招散亡立官府章焱復合二萬衆來攻陣惡溪南賁亨分官拒守自將精銳亂流衝擊屬萬戸呼喇岱以援兵至自己至亥賊方退文龍溺死呼喇岱以處即亂山為州無城壁可恃且反側欲屠之賁亨曰我受命來監此郡賊固可殺良民何辜不從將士擄掠子女金帛賁亨捕得倡率者杖之仍各求所失還之州民悦服十五年龍泉縣張三八合衆二萬殺慶元縣達嚕噶齊伊蘇岱爾且屠其家賁亨將騎士五百徃討與賊將鄭先鋒陳壽山三千餘人戰於浮雲鄉斬首三百餘級賊三戰俱敗軍還賊衆水陸俱設伏賁亨擇步卒驍悍者使前賊不敢近既而衢州賊陳千二聚二萬人遂昌葉丙六亦聚三千人助之賁亨前後斬首三千級悉平之十七年改處州路管軍萬戸沃呼好古括蒼彚紀至元間以中議大夫為處州路總管始遷建郡治修飭學校有功於民而士論尤推重焉石谷遂昌縣志南陽人至元二十年任縣尹興學校施善政有訟者輒諭以理民感之額延哈雅崇禎處州府志大德初令松陽首捐俸經理縣治凡儒學公署莫不一新士民稱之舒穆嚕繼祖元史舒穆嚕宜孫傳繼祖字伯善襲父職為沿海上副萬户初分鎮台州皇慶元年又移鎮婺處兩州馭軍嚴肅平寇有功且明達政事講究鹽筴多合事宜為學本於經術而兼通名法縱横天文地理術數方技之說見稱縉紳間宜孫其子也伊遜哈雅崇禎處州府志太師恒陽文正王之孫至順初出掌龍泉縣事鋤强植善衆志孚服蓮珠崇禎處州府志家世唐古氏居廣平元統元年舉進士任安州同知轉松陽達嚕噶齊涖官政徳彰著民為立石者四曰善政曰新築宣公堤曰遺愛曰去思殷輅獻徴録字乘之華亭人為上海縣吏歴鹽司横浦調嘉興僧司僧告其族賊殺事吏讞四月餘不白移輅讞輒㣲得其賊而被寃者二十人悉平反出之又甲民訴乙民縛其子屍於水縣讞又不白輅鞫之乃他姓疾子為盜私捶殺而誣乙也良民有與盜首疑名者吏脫正犯而收之輅白諸長令即日釋去以省檄對調湖州舉廣東憲史檄且至以病辭乃以行中書選出長縉雲縣幕縣豪號兩虎者閉户歛迹終輅三年不敢肆有富民坐令門䜿捶殺平民連七人司牘吏欲出甲繫乙且以脫富民輅問故曰甲多子女繫之必有詞乙獨且鰥不慮也輅曰人茍以勢利殺無子者尚謂有天道乎遂正其法杜百思遂昌縣志至正十七年知遂昌縣嵗大旱箬川盜杜仲光聚衆殺人百思率弓兵禦之為賊所執罵不絶口遂死於難明孫炎史槩字伯融句容人辟行省掾師克處州以炎為總制匹馬入城召父老諭以天命所集宜稟教化不且為僇衆皆感悦仍擇健勇者練為兵紀律嚴明賊皆退縮時才俊士多伏居山谷中不肻出劉基章溢葉琛皆處士所推基尤有名使者再徃返不起以一寳劍送炎炎作詩以為劍當獻之天子斬不順命者我人臣不可私受封還之革數千言諭基基就見置酒與飲論古今成敗之事基乃深服遂送基於京師上方征伐無一乒與炎止以口舌安反側郡壬寅賊畔炎被擒幽空室中賊恐留之自遺患燖雁攜斗酒噉炎曰以此與公訣炎拔劍割雁舉巵酒曰嗟乎我乃為鼠輩所陷賊持刀視炎飲酒自如賊叱解衣炎罵曰此紫綺衣主上賜吾當服以死何可解引枕而卧賊不忍伺其睡乃害之年四十事聞追封丹陽縣男妻為賊擒亦不屈死王道童栝蒼彚紀洪武初有功知處州及苗軍作亂執道童不屈遇害劉澤民縉雲縣志宜興人洪武元年知縉雲縣事元季縣治儒學皆燬於寇以次修舉措置有方民不知勞親詣學宮勸課咸以劉父稱之陞嘉興同知石驥嘉靖浙江通志字天騏濮陽人洪武初知松陽縣明敏果斷吏民不敢欺凡有賦役務稽其實民皆服其均平凌玉嘉靖青田縣志洪武初知青田縣興學勸農遺愛在邑謝成嘉靖浙江通志字德用定逺人從太祖克長興攻嚴州拔之洪武四年授處州守禦副千户守處領兵捕獲青田私鬻鹽寇周大豹等四百餘人寘於法民賴以寜從都督孫恪捕倭海上詔成守禦平陽縣先是守平陽者以其濱海過於闗防民動輒獲罪成至一切除去逺近安之黄聰崇禎處州府志賓州人通判處州清慎明敏有經濟才以興學為首士咸德之魏明德栝蒼彚紀洪武間為慶元縣丞創始立法愛民如子時青田寇葉丁香呉達三等作亂朝命延安侯唐勝宗統兵勦捕侯以邑之二都與賊連境欲戮其衆明德直抵軍營泣涕白侯曰吾邑民悉從化無從盜叛逆者公戮之是汙良民也請以身代侯重之遂寢民得生全林復栝蒼彚紀連江人同知處州廉能公恕剖事無滯去後士民咸思之李納嘉靖浙江通志洪武中知遂昌縣以恩信感化山砦七十餘所招復離民萬有餘家政績為最劉仲濂栝蒼彚紀武昌人洪武間知處州亷謹有為政尚寛平深得牧民之體尤以興學校為急務官至工部侍郎謝子襄獻徴録名衮以字行江西新淦人以才薦授青田縣知縣有惠政嵗滿民奏留之陞處州府知府居官廉謹拊小民興學校初郡多虎及旱蝗為災子襄禱於神大雨二日蝗盡死虎亦遁去嘗有盜入庫竊官鈔子襄投檄城隍神盜方閲所竊於室忽風捲墮市中遂獲盜正其罪民鬻牛於市將屠之牛逸至子襄前俛首若訴者遣人問得實捐俸贖牛小校呉米逃山谷時鳩衆出為民患朝廷發官軍二千勦之處人大恐子襄力請止軍城中母出而自以計掩捕之送京師兵不勞而民以安性簡静歴官三十年不以家累自隨永樂二十二年卒倪孟賢嘉靖浙江通志南昌人洪武中知麗水縣民有賣卜者嘗干謁富室不應所求乃詣闕告大姓陳公望等五十七人聚衆謀亂命錦衣衞千戸周原徃捕之孟賢聞原將至密召父老詢之父老皆曰無是事孟賢又㣲服徃察見其男女耕織如故乃歸謂僚屬曰朝廷命孟賢令是邑惟欲撫輯斯民安於田里今使良善者受惡逆之名豈朝廷命孟賢意耶即具䟽上聞復令耆老詣闕訴其妄上命法司論妄告者罪韓時中栝蒼彚紀洪武末同知處州亷潔公平督造海舟青器措置得宜民心悦服黄韺周瑛黄聲叔祠堂記字聲叔莆田人宣德中以明經授麗水縣學訓導天順中以教有成績陞廣元縣教諭在麗水時浙寇張甚衆以韺有才畧推以捍賊韺部署既定乃諭以忠義衆感激效死鼓之而進賊奔北境土以平張祐栝蒼彚紀含山人正統間以給事中知處州嚴毅有為丁外艱去後陳鑑胡作亂言必得如張公者亂方可定當道交薦祐復來任統領兵衆專制一方而賊遂服為之立碑曹紘栝蒼彚紀淮安人正統間同知處州遇事通解若素習者每攝郡事決獄無留滯衆咸推服鄭建獻徴録字𢎞中福唐人登進士改庶吉士出為南雄通判時閩浙之交民盜銀礦相爭至有與官軍拒者朝命處州專設通判一員以建莅其事既至諭民以禍福且首為平其力役民遂以寧銀礦亦不勞而辦閩寇鄧茂七嘯聚流民越界攻掠建時分守龍泉偕其子躬擐甲胄率民兵與賊戰斬首五百餘級龍泉以平秩滿將行巡撫奏留之陞同知改浙江按察司僉事有奸民不得逞者搆詞危建致被逮事直再令復任既還以老病致仕黎諒栝蒼彚紀寧都人初任處州府推官斷獄明決正統間以殺賊陞通判後知瓊州王俊栝蒼彚紀水人正統末為青田縣丞剛直廉謹適山寇亂俊遍歴撫諭人心始安景泰初政和賊呉全八誘脅本縣頑民同徃瑞安刦掠復率民兵邀其歸路而𠞰除之一境帖然侯藎分省人物考字惟忠華亭人景泰進士同知處州屬邑龍泉慶元居民盜鑿銀礦恃險為亂鎮守中貴欲請於朝盡𠞰絶之藎願徃諭禍福民皆散去秩滿擢鹽運司同知楊殖宗栝蒼彚紀莆田人由吏員任青田典史景泰初盜作率民兵守黄壇邀賊歸路有功陞主簿後置景寧縣陞知景寧時經始創治大小衙門成於一嵗之間兵火之餘民多失所殖宗制伏豪强撫綏良善民獲安輯顧立李東陽顧侯祠記字成夫常熟人景泰初處州寇作都御史軒輗置之幕下給餉有功時雲和新置僻在山谷乃以屬之至則搆廨建學置驛傳立壇壝百務咸備東有雲章道甚險民病樵採立闢為通途馬聰舊浙江通志江西人景泰間由御史改調處州推官亷能仁恕吏民戴之李信圭栝蒼彚紀江西人正統間知處州廉静有為始立義塚人多感之李葉栝蒼彚紀豐城人景泰初為宣平知縣時縣初設威行惠流吏民悦服萬安栝蒼彚紀京山人知處州府立心簡直政尚寛厚明敏善決獄囹圄空虚人稱之曰無牢萬父被召去職老穉赴闕借留詔命還官安衣敝袍借二家僮步還城中衆皆讙呼曰此吾萬父也扶掖登堂涖政如舊馬偉崇禎處州府志故城人天順間知處州簡重廉明不尚苛刻以老致仕周祺栝蒼彚紀貴溪人成化間為處州通判剛斷有為後擢知本府修舉廢墜郡學一新韓斐栝蒼彚紀泰州人由御史知處州興學校培士氣栝之東鄉大堰久塞不通灌溉斐捐俸修築民感其惠陞山東㕘政胡琮獻徴録字文德長洲人成化進士以監察御史左遷同知處州處故有礦穴官守之民忽他處發地得礦中官即奏籍於官琮曰愚民偶有所獲既非故穴其出不常一籍官則有常課一不登則將取足於民民獲重困即上疏具言不可言甚懇至從之以山西㕘議致仕彭韶以都御史巡視兩浙嘗以邑人為丞者屬琮琮黜之韶不以為忤反益賢琮及去尤甚惜之郭忠栝蒼彚紀肥鄉人以戸部郎出守處州剛介有威面如鐵人呼為郭黒面勤於政事審知民為侵科所苦細查户口糧差通融均定應納户口給一票縣官不得科派豪右不得侵漁民甚便之專意作興人才士心感奮以勞瘁卒於官厲昇獻徴録字文振無錫人由太學生選知青田縣民有周姓者與盤石衞軍訟五年矣昇聽之數語遂服邑八都地報銀礦發監司臨焉術者謂山木潤秀所産必廣昇曰吾聞金能尅木若金氣盛木何得秀潤如此申辨數四必寢乃已鎮守中貴嵗以礦一至其邑所費不貲昇不缺禮而已至他費嵗率省昔之半由是民安其業昇勸學興賢旌舉節孝禮文亦彬彬焉請老民為立碑建祠何昌獻徴録字克昌順德人舉人知麗水縣甫三月以内艱去服除補宣平宣平故麗水分邑道出麗水麗水之民爭迎焉為政寛厚無擾邑方草創乃修學宮置祭器繕公署樹坊表庶務具興役之以義民為盡力邑有劇盜毒痡閩浙諸郡縣兵不能制昌設方畧擒之霪雨水溢漂民居先賑後聞請减稅銀一千餘兩九載致仕韓綸獻徴録字緡之上海人以貢入國學選授處州景寜縣主簿景寧險瘠而民獷因礦而盜綸捕其尤者論法餘撫諭之皆帖服縣故多虎患綸設法弭之縣每缺尹即綸署篆以亷勤聞時隣縣有殺人獄三人悉論死處守梁某檄綸鞫之綸立釋其二曰法抵死者一人耳處屬十縣多宿逋御史委綸辦理甚嚴綸曰是徒驅窮餓於溝壑也曷若俟秋成帶徴乃具申詳會有詔蠲焉以疾請還民思之陳仲堅栝蒼彚紀福州人𢎞治初知麗水縣發摘如神吏民無敢欺者凡隣邑疑獄上司必檄徃核實每得其情遷廣信通判歸貧不能自存謝緝崇禎處州府志樂安人𢎞治時以工部郎知處州清儉化俗自奉若貧士直道事人每見詘於當道屢疏請老得休黄芳遂昌縣志字士英莆田人𢎞治間舉人以雲和令調遂昌才識通敏決獄如流凡學校城門皆其剏建督民葬埋禁作佛事清理田糧罷征商稅為政知大體小事亦不遺擢太僕寺丞范天錫舊浙江通志冀州人同知處州明習法令吏民敬畏後陞南部副郎何良輔栝蒼彚紀江西人以進士任處州府推官體弱多病凡訊獄必求審詳毫不假借兼理鹽務法無所屈病篤商人餽以金時不能言强起書於紙曰不可竟却之卒何鰲慶元縣志正德初知慶元縣先是賦税無定式民病之乃平其田以二頃為一里彼此適均民無偏累輕刑緩賦革弊省費擢御史至副都御史李惟貞栝蒼彚紀初授浦江教諭正德初知慶元宅心仁恕愛民如子凡干以私者悉斥之時旱行禱於薰山之巔伏烈日中不起須臾大雨是秋豐稔陳傑景寜縣志莆田人由進士正德間知景寧才識通敏為政一以愛民為主莅政三年始終一節後擢南京監察御史戴鑾遂昌縣志字時鳴廣西馬平人正德間舉人任遂昌教諭身率諸生教誨不倦葺學宫始竣值火患不能救遂抱先聖先賢廟主及祭器而出私舎器物罄燬弗顧復力請郡守重建士子立石紀功殷雲霄栝蒼彚紀壽張人由進士正德間知青田縣有志操不阿上官愛民如子擢給事中父老兒童擁馬號泣里中為之謠曰脫公靴將奚如公行無靴公行遲遲又曰脫公靴取其一隻匪遺其一公不可再得唐恩崇禎處州府志嘉定人正德間知松陽操行㢘潔保百姓如嬰兒雅有惠政奉養極菲機杼之聲聞於外嵗旱禱雨則雨注禱雪禳灾則雪應卒於官貧不能斂曹濛栝蒼彚紀句容人正德間知縉雲縣舊役畝數多寡不均濛不畏强禦悉為均之合邑稱便呉仲栝蒼彚紀武進人嘉靖初由御史知處州府精敏持大體片言折獄修築通濟堰舉數十年廢墜不踰時而成作興學校勤於課試擢湖廣㕘政歴太僕少卿張僎舊浙江通志餘干人嘉靖初知宣平禁奸除暴吏畏民懷捐俸鑄文廟祭器陞興化府通判潘潤崇禎處州府志建平人知處州時方亢旱下車後即積誠祈懇大雨濡足後屬邑申旱核實報荒果得減半莅政扶弱鋤强力除民害優禮學校士懷其德而吏畏其威方逺宜青田縣志字伯時歙縣人進士知青田縣事官居蔬食下車召富人取金銀酒器入署公用三年給由北上分還前器富人伏地不敢取逺宜笑曰公宴上官不嫌美器數出數入吾懼厮役輩乗間竊沒非有他也嵗祲施糜粥所活甚衆擢御史陳思順栝蒼彚紀懷安人由舉人嘉靖初知雲和縣莅政公勤操履端潔節冗費均徭賦建學宫修齋舎士民德之朱世忠舊浙江通志南昌人嘉靖初知龍泉縣清慎明敏平易近人民間貧乏而男讀女紅者量以俸米給其家歴政始終如一董德明栝蒼彚紀桂林人嘉靖間知處州府周恤民𨼆府縣常例釐革悉盡胷次洞達四境安其治理守郡五載擢兵備副使鄭鏊青田縣志字亦鼎莆田人嘉靖間舉人知青田縣遇事即遣案不留牘有老農訟其子不養者鏊出俸銀與之因對僚吏曰吾未仕時家貧舌耕以供菽水今食禄而親不逮養淚隨言下訟者父子相攜而出又富民田多𨼆漏詭灑鏊按圖察之積弊盡除遷袁州同知陳仁栝蒼彚紀茶陵人舉人嘉靖間知雲和縣守已廉潔慨邑小民貧條陳當道遂得減縣佐二員訓導一員萬質遂昌縣志字宜文清江人嘉靖間舉人知遂昌縣性行端方人不敢干以私民有爭者諭而遣之五月政通事簡時按察行邑見其獄中草長過膝深加歎賞三年境無盜賊豪猾屏息林性之獻徴録字師吾晉江人嘉靖進士知麗水縣不事擊搏而邑以治豪黠吏束手坐曹中至不能具饘糜山谷素捍文網之民有十餘年捕不能得而涕泣歸誠於性之之一言者邑故有窰課後窰户以課重徙盡則均其課於居人之不為窰者性之至會造籍里中以竄絶自言者三十餘户吏以為無故減户且得罪性之竟減之周世逺縉雲縣志江津人嘉靖間知縉雲少年莅政練達如老吏心公守潔訟簡刑清張綋舊浙江通志字文儀上海人進士知處州清慎寡言薄於自奉男躬園圃女事機杼聽訟明斷事上不阿以簡調睦州池浴德崇禎處州府志同安人嘉靖丙寅進士知遂昌縣清丈量設防守置木皂澤枯骨擢銓部士民送至龍游依依不忍舎貿地置曳舟亭尸祝於邑東西明山董琦栝蒼彚紀山東恩縣人由嘉興府通判同知處州厚重寛仁政務明允擢南户部員外郎王近思崇禎處州府志崇陽人嘉靖中知麗水性剛果心仁慈守潔政嚴吏民畏威懷徳陳元栝蒼彚紀峽江人嘉靖間知慶元時值開礦民苦油糧之費又以坑税立定額使民稱貸益之民愈不堪元請損其數以蘇民困遂忤上官去任良翰崇禎處州府志電白人舉人嘉靖間知宣平剖決精明人莫敢欺捐俸建學政事文學兼備擢判福州府蘇民望舊浙江通志南安人嘉靖間為宣平諭敷教不倦攝縉雲邑事有剸煩之才挺立之操魏良弼栝蒼彚紀字師説新建人嘉靖間知松陽興學恤民鑄造祭器葺修尊經閣東西號房闢櫺星門路春秋省耕斂别勤惰教民植桑凡聽訟一剖立斷諸役必擇樸厚者為之里中有小學諸生稍慧者賞以紙筆百姓親如父母秩滿擢給事中翟宗魯崇禎處州府志博羅人舉人嘉靖中任宣平教諭卻餽周貧婚喪助俸培文明山鑿泮水建聚英樓立澄心堂擢知融縣萬鵬栝蒼彚紀武進人嘉靖間知松陽縣立心正大持已㢘潔凡案牘必裁自已出催科用一緩二調新昌令歐陽烈栝蒼彚紀泰和人嘉靖間署松陽教諭訓諸生以窮理力行為要遇祭祀必齋宿致􅐚祭器祭品務躬閲之鑄爵若干以補其不足鼎新文廟厥功最多後官比部譚孔言青田縣志貴溪人舉人知青田縣政尚平恕每刑人哀矜形於色對僚屬嘆曰將無悞撻耶時虎白日入境傷人孔言禱於神害遂息改官日殘書羸馬外無長物容璊遂昌縣志字廷圭新會人嘉靖間嵗貢任遂昌主簿勤謹敦樸愛民禮士動遵古道去官囊無餘資父老涕泣攀送不忍舍去陳澤栝蒼彚紀南海人嘉靖中知慶元值山寇不逞率義士呉元輔統鄉兵徃捕之斬首百餘級寇乃平邑無城遂申當道鬻寺田公署故址充費不三月而成擢監察御史張賀栝蒼彚紀龍溪人嘉靖間知松陽縣政尚寛簡對百姓恂恂然如家人暇輒詣學講藝出餘帑重新文廟儉私養慎公費不徇額斂以阿上官凡使客應付符檄外不加毫末焉呉從周慶元縣志邵武人嘉靖間訓導署篆慶元縣時山寇薄城誓以死守七日寇遁以城西在山之下懼寇據其上申請當道改築於山巔捐俸首築二丈以為民式遂成保障之功陞國子監學正杜時達遂昌縣志上海人嘉靖末為遂昌縣主簿邑多積逋以漸追徴民樂輸納攝邑篆僅期月聲稱大起去任時囊無一錢陳烈崇禎處州府志建安人以南御史任處州清里甲議條鞭復學田修水堰士庶沾恩遺思去後孫烺栝蒼彚紀豐城人隆慶初知麗水縣立三限以均徴輸修兩堰以通灌溉開立行市便民貿易宣諭化俗仁聲藉甚陞杭州府判方亮采遂昌縣志莆田人由舉人隆慶間知遂昌縣雅重學校乘量田後行扒平新法歸額定里手自裁定折獄每諭以人倫大義聞者感悦入覲麾羨金弗納至京卒熊子臣續處州府志江西新昌人萬厯間知處州府修郡乘建譙樓創軍器庫政績最著陞雲南副使顧憲成舊浙江通志無錫人以銓部郎謫處州推官奉法循理上下藹然青衿以文贄者面為品題多方誘掖有兄弟訟數年不決者呼謂之曰爾手足也而自相爭既相爭盍自相治各授之杖謂其兄曰為吾撲若弟謂其弟曰為吾撲若兄兩人相顧愕然憲成故促之兩人叩首曰向者官為論曲直故不服今知兄弟矣不知有曲直也令相揖謝乃抱持大哭郡人化之陳應芳舊浙江通志泰州人萬厯間令金華復除龍泉愛民勤政布德施仁修理學宫優恤士𩔖擢禮部主事郭宗磐崇禎處州府志晉江人進士以比部郎知處州府精明嚴肅鉗束佐貳官片紙不敢受嚴溺女之禁革坊里供應家伙等費極為便民呉之鵬崇禎處州府志武進人任處州司理存心仁恕聽斷敏決上官委勘人犯多所株連片言剖析輕重燭照平反生全者甚多公餘課士人服其鑑任可容續處州府志直隸懐寧人由工部郎知處州府省刑訟裁里供清奸弊嵗旱步禱多方救濟培養士氣修學宫剏文昌閣時有連理紫芝之瑞擢廣東副使許國忠續處州府志宣城人同知處州歴攝府縣篆建議復浮橋於故址泊鹽船於上河修學築壩止開採以杜釁隙擢本府知府鍾宇淳續處州府志華亭人進士知遂昌縣廉明剛斷庭無滯牘築通惠石橋剏寅賓館銳意造士修學室建聚奎亭置學田以贍貧生又立石西安縣界革巡檢司木排常例擢給事中湯顯祖遂昌縣志臨川人萬厯間進士授禮部郎建言謫尉陞遂昌令下車惟較文賦詩而獄訟庶務亦迎刃而解剏尊經閣於學中建象德堂於射圃置滅虎祠啟明樓士民就射堂尸祝焉李淳續處州府志四川内江人由大理評擢知處州府量寛識敏人不敢干以私盈庭案牘片言立剖不忍輕入人罪政平訟簡吏畏民懷他若修學宫濬泮池復浮橋鋭然興理以外艱去方淡然青田縣志祁門人舉人知青田縣慈祥練達萬厯間大水廬舎田畝蕩析殆盡極力拊循民得寧止改修學宫城郭邑永賴之周道長續處州府志成都人萬厯間知慶元敦本課農周助不給鰥寡孤獨尤沐其施值蝗入境引咎籲天羣鳥競食殆盡稱異政焉辜志會遂昌縣志會昌人萬厯舉人知遂昌縣會山賊刦掠修葺城垣為民防禦邑遂有保障陞萬州知州華廷詔續處州府志無錫人進士知龍泉以教化為先建尊經閣復稽聖橋自奉寒素入覲鬻家産以充路費後卒於官胡雲獻徴録字雨之無錫人舉人為松陽知縣松陽僻在山巖中數饉於水又屬開礦居人駭散雲周旋撫諭僅而安集其諸閹校以礦事至者又競欲炰勃威雲以朘於民而土人之不逞者又隂唆之雲慷慨辨詰不少屈竟與抗禮雲又素亷摭拾無所得其人至相誡曰毋生事非他縣比也是以礦事首尾二年民不知擾松俗嫁女破産多不舉女有踰四十不能妻者雖良族亦以搶婚為常雲患之下令毋溺女溺女者重坐之又下令嫁女費毋過若干過者重坐之由是女亦浸育陳見龍崇禎處州府志潮陽人自建寧知府移知處州遇事精明廢興墜舉郡自已酉洪水城署傾頺多方葺治不動官緡不程民力皆捐貲竣役凡聖賢祠廟城樓橋埠官亭公署煥然改觀至於増兩庠賓興路費革漕運餽遺公費衿弁咸被其賜游之英崇禎處州府志蘄水人以舉人知麗水縣時嵗屢歉賦額頻加之英戴星出入催科不擾至修廢舉墜唯力是視聖殿傾圮捐金為倡他如誠意祠麗陽祖祠好溪堰通濟堰下河官埠栝蒼門大埠嵗久坍塌咸加修葺丙子春苦水力請開預備倉以賑不能前者施粥六門以食之夏苦旱步禱齋宿誓神如約霑足異虎傷人即籲城隍祠誡兵懸賞三日械虎至其積誠通神如此姜師閔景寧縣志字以孝江西進賢人由舉人萬厯十一年知景寧性敏材裕革鹽舖戸除寺租拓四所桑園築長堤建書院鑄祭器招流移均差役減贖穀嚴吏書著提金鎖事以教民延名儒以修邑乘善政多端後陞台州通判沈維龍崇禎處州府志南安人萬厯間知慶元縣修邑乘置學田苞苴盡絶龔廷賓縉雲縣志晉江人萬厯間進士知縉雲縣重建賓館移置譙樓縣治煥然改觀其經畫荒政疏通水利民尤賴之段𢎞壁舊浙江通志金壇人萬厯間知遂昌縣才猷敏達以德化民張翼新處州府志晉江人由舉人授處州郡丞遇事精明御下嚴肅值旱步禱得雨乃止嵗賴有秋黄壽之景寜縣志廣東瓊山人由舉人萬厯間知景寧為海忠介之壻清亷節愛綽有婦翁風時民散田荒官民交困申請丈量合邑安堵陞本府同知後致仕陳九功續處州府志江西建昌人萬厯間由鄉舉知慶元公平明決實意御下尤加隆學校開渠引水自馬巖而來注入學宫以増秀麗餘水散流市溝調繁麗水張繼桂崇禎處州府志同安人萬厯間進士知松陽縣均役清田徴糧息訟鞭扑不煩教化斯舉林大佳舊浙江通志隆安人單車赴松陽忠誠真率不輕怒訶人亦卒不能欺事皆獨斷形家言松水過氣洩宜建塔青蒙山鎮之遂發俸鍰倡始而塔成鄭邦德崇禎處州府志安東衞人縉雲丞治尚亷明引經按獄當道稱為科目遺才後擢望江令龍奮河舊浙江通志貴州舉人知縉雲縣練達周詳案無留牘撫循遺黎尤極盡心方之壯舊浙江通志上饒人萬厯間知景寧縣政務清嚴歴年丁田隱漏稽覈精明民無畸賦張學書崇禎處州府志平樂人萬厯間知慶元先是慶有商鹽之累官吏受賕役丁夫自龍泉轉運抵邑困踣道途既而高價使舖户屯賣鹽復穢惡食者多病商坐取盈額至傾家質子女以償學書著鹽書上鹺院每嵗納鹽課二十四兩民間便之邑有班匠始編者悞重其六嵗班錢為子孫累學書力為申豁又礦稅徴溢數倍為裁損僅足額而止當道檄民充木大户隣邑騷動學書申地僻民貧不産巨木卒賴以免他如罷里甲蠲贖鍰至割俸以充費莅任三年士民建祠祀之雷叔聞縉雲縣志南郡人舉人自雲和調繁縉雲縣法令嚴明聽斷果法釐奸詰盜境内肅然袁遇春舊浙江通志分宜人任處州推官廉明慈恕攝篆郡邑並著廉聲擢彰德郡丞李質續處州府志廣東普寧人由貢士知慶元縣簡易慈祥不阿强禦時有奸民以田投獻勢豪㢘得其實即上之當道以重法繩之權貴肅然曾惟謙續處州府志江西泰和人由鄉舉知景寧縣嵗旱菅履步禱雨果霑足有秋以士處山鄉少有師授捐俸延師以教之偶以事至郡值霪雨止宿石塘夜夢神餉三赬鯉念少嘗戒不食固讓之遂投水中晨起舍陸而舟忽至九龍水勢大作顛危欲覆俄赤鯉四五浮水觸舟頃之波平獲免相傳以為神吳尚友崇禎處州府志江西湖口人知麗水縣寛洪厚重練達老成禮士恤民省刑節用合邑共愛戴之陞南刑部主事蔡應吾舊浙江通志平和人知處州府讞獄不輕入人罪全活甚多覈官評却餽送待人恕而責已周文似韓崇禎處州府志高安人任處州判有為有守每署各縣道路供給皆自齎毫不擾民為政以寛為本鍾武瑞續處州府志湖廣雲夢人知麗水縣存心謹厚聽訟惟恐寃民必覆審再四擢知遼州百姓攀轅泣道如赤子之慕慈母傅時勉崇禎處州府志無為州人崇禎間知松陽冰蘗自持撫小民極真摯詞訟願息者聽經旬不用鞭扑夏旱停徴適大府檄取舊逋時勉曰此何時而克辦此詳請緩期竟以獲罪降調松人罷市巷哭盛可藩崇禎處州府志桐城人以舉人署龍泉教諭待諸生若子弟當道以賢能委攝邑符三月化行俗美捐鏹以賑貧士給米以活獄囚士民感戴擢南雍學正陳以瑞崇禎處州府志進賢人知麗水縣革火耗滌繁苛一意與民休息士以藝文贄者延接殷勤或有闗説委曲謝絶吏肅民安調漳浦王懋鋙縉雲縣志金壇人由舉人天啟間知縉雲縣練鄉兵嚴保甲盜賊屏跡尤禁溺女立保嬰冊所活甚多擢工部主事姚元引舊浙江通志華亭人知麗水精明練達遇事有擔當革羨餘興水利振人文人歌來暮許有寰崇禎處州府志揭陽人舉人通判處州五署邑篆秋毫不染所在見思職司糧鹽一切陋規盡革署松陽捐貲修學比擢守滇中捐俸貿田以濟貧士及賓興津費徐維藩崇禎處州府志巴縣人崇禎戊辰以比部郎知處州府遇事精嚴務情法得平上下允服愛民禮士終始不渝陞雲南副使卧轍攀轅畱舄寄思鄭龍光崇禎處州府志大田人崇禎初由明經知宣平縣獄無滯囚三載政成捐俸置學田為課士賓興津送之費康晉遂昌縣志合州人崇禎初恩貢知遂昌清貞絶俗儉約自甘訟牒勾攝兩造聽其自息楊兆鯤崇禎處州府志即墨人崇禎初由選貢知雲和愛民如子時邑多流亡加意拊循逺近復業朱葵崇禎處州府志丹徒人崇禎間以南户部郎知處州府甌郡海賊震隣外省流民結寮佃種甚多人情洶洶葵黙運潛調出示安撫主客無譁地方以安省科罰節桁楊刻刑戒以示庶僚造浮橋置渡田民無病涉連年水火迭灾親徃勘踏賑恤凡城樓垣堡建葺一新捐貲修輯郡乘陳學伊舊浙江通志侯官人崇禎初知麗水粹潔端方嚴明整肅無重刑苛罰閭里獲安王明汲崇禎處州府志平樂人崇禎間舉人任推官署各縣篆多惠政署府持大體謹官常修造浮橋贊輯郡志並著能聲陳之恪舊浙江通志武陵人崇禎間舉人知處州府寛柔溫厚樂與民無事而御下嚴整持體端莊望而知為君子汪宗明崇禎處州府志泉州人崇禎間舉人知處州府飲人以和而持已嚴刻自俸薪外一無所取二親迎養淡泊共甘艱去之日行槖蕭然人以為會稽劉寵復見許啟洪遂昌縣志字任宇宜興人崇禎間舉人知遂昌縣值攢造編里聽民自相朋便以府差擾害申請府㕔各撥縣役聽差村落無擾馬承緒崇禎處州府志寧海州人明經歴河間别駕擢處州倅廉平嚴毅聽斷得情兩地有神明之頌張建高舊浙江通志遼東人崇禎間任麗水訓導有才幹歴署邑篆討平黄村口山寇有功授松陽令多善政馬瑞麒舊浙江通志祥符人處州府教授署雲和縣事招撫流亡清盜源瘞遺骸禱雨輒應國朝杜之璧舊浙江通志河南人順治初處州府推官㢘約自奉如儒素而案無煩牘有刑措風朱宗時青田縣志兖州寧陽人順治初由舉人知青田縣鎮靜有才畧初盜寇蝟起預為繕城後濠寇至攻圍數晝夜露宿堅守民賴安堵後引年歸趙如瑾處州府志字卧齋直隸雄縣人順治三年以舉人知遂昌縣下車集士民博詢利弊逮一二巨憝置之法羣不逞嘯聚逼城竭力堵禦遣役從間道走婺請兵殱擊不動聲色而黎民晏然嵗飢設策賑救全活者萬計尤隆禮學校多士蒸蒸向風征賦不事桁楊漸次鼓勸民自樂輸以卓異擢御史項始震舊浙江通志麻城人進士順治初知縉雲時山寇縱横鄉邑殘破下車招撫寇散民安民間婦子散失者悉捐金贖還之陞大理府同知徐可先龍泉縣志武進人順治丁亥進士知龍泉縣當兵燹之後人多遷徙可先設義勇嚴保甲民始復業尤加意拊循革宿弊戢囂卒與之休息邑有秋米舊解折色以兵興軍餉遂徴本色可先申請復舊捐俸重造濟川橋及鄉中之梧桐等橋待士子尤有恩張元樞處州府志良鄉人進士順治間任處州府推官仁廉明察視郡篆諄諄勸民遷善從正有勾引營兵賭博者罪勿宥親臨屬邑踏勘荒田請蠲積逋寇氛未靖間有株連者輒𤯝宥之尤加意學校葺建黌宫殷殷課士周茂源舊浙江通志字宿來華亭人順治己丑進士十四年知處州府經山寇之後闔郡成墟錢糧無徴茂源抵任上請得免復竭力招徠捐俸每三户給牛一頭每人給米一石十邑共報墾荒田一千九百頃有竒正供始得不虧是年寇入縉雲率鄉兵千餘奮勵死守賊宵遁十五年海䑸犯甌率兵固守青田賊不能犯范達禮處州府志遼東人順治十六年溫寇猖獗栝郡震動達禮以精竒尼哈畨銜命領大兵援栝時卒伍皆西北人民心疑懼達禮駐師二載紀律森嚴有不法者無少假貸市肆安堵鄰邑羣醜聞風宵遁汪宗魯縉雲縣志睢寧人順治間由進士知縉雲縣廉明剛直遇事不阿𠞰除巨魁張日新金大虎顧老三等縉始平定革弊釐奸不遺餘力優禮士子陞沁州知州王亮教舊浙江通志山東章邱人順治間知宣平縣政多卓異時防隣警亮教不用官兵選鄉勇授以折衝方畧寇不敢犯李翔遂昌縣志字天羽陜西城固人順治辛丑進士康熙八年知遂昌縣邑遭兵燹人逋田荒官民胥困翔申請履勘題咨豁荒徴熟時苦現年賠累翔復申請革除因田定里滾籖挨催積害盡捐殁於任囊槖蕭然逺近醵錢助櫬歸里崇祀名宦左朝極表忠冊陜西鎮番衞人任處協右營把總防守景寧縣康熙十三年五月初八日與閩賊賜祭蔡林二力戰陣亡事聞以衞千總用葬贈威逺將軍廕一子張景留處州府志遼東人康熙間任松陽縣勤敏有聲當閩寇蹂躪之後招撫流移設立義學修葺學宫至力請蠲荒代償舊逋皆稱實政崇祀名宦浙江通志卷一百五十七
