彚紀又西四十步與東巖對峙唐袁晁宋方臘之亂郡人避此獲免何鏜西巖記海内稱十大洞天栝蒼居其一環栝蒼千里内名山川以什數惟青田之石門為最勝縉雲之仙都為最奇而穹窿崛起中嵌洞穴怪偉環峙莫過於宣平之東西兩巖白泄巖崇禎處州府志一名雲巖高百餘丈一徑可拔蘿而上正統間寇亂鄉人避難於其巔籙溪栝蒼彚紀發源於曳嶺至洗灘㑹馬村水茭溪栝蒼彚紀在縣治西自礱坑出大溪口達麗水玉環玉環山太平寰宇記一名木陋嶼又名地肺山在海中週五百餘里去郡二百里上有流水潔白如玉因以為名按登真隱訣云郗司空先立别墅於此東晉居人數百家至今湖田見在洞天福地記山為第七十一福地在溫州樂清縣台州府志一名木榴山避錢王諱改今名國朝雍正八年浙江總督臣李衞題請展復奉㫖設立同知一員築城於其上謹按晉書地理志孝武帝寧康二年分臨海郡永寧縣置樂成縣宋屬永嘉郡後廢置不一至五代吳越時改為樂清今玉環山在太平樂清兩縣界海中中靑山玉環志半在城内東靑山玉環志半在城内西青山玉環志在城外靈山台州府志在楚門港中與玉環山相接連潘伯修靈山詩玉環諸山靈山深環以大海根太隂空青水碧淡相映散為風露來蕭森嗟予賦命落台鴈調笑魚鳥成滯淫南遊華葢動連月勝地在近徒歆歆風帆輕渡不再宿綬裏長劍理青琴種榆瓊田中吹笙玉山岑吾將於兹養年命岐路四斷誰能尋筆架山玉環志在西潭仙人山玉環志舊有寨城週五里今廢城址猶有存者龍尾山玉環志山嶴内有巖方八尺周三丈餘號印巖錦屛山玉環志山頂有巖方如巾又名方巾山分水山玉環志樂清太平分界處牛頭山玉環志抵海十餘里前有溪名大密溪高椅山玉環志抵海二里前有溪名小密溪尖巖山玉環志抵海五里前有溪名小溪考功山玉環志舊有臺寨今址存抵海二里木岡山玉環志上有龍潭能興雲雨虎乂山玉環志山有鐵樹二株每踰四五年一發至今不改金竹山太平縣志在玉環鄉俗呼竹岡大烏山小烏山溫州府志俱在海中雞冠山玉環志一名長嶼山在海中花巖嶼玉環志在白沙屛百丈巖玉環志在蘆㠗女兒洞玉環志在漩門流沙洞玉環志在沙嶼天開河在玉環城外國朝雍正八年浙江總督臣李衞題請展復玉環山奉俞旨允行將築城垣七月初一日暨二十一日兩次雷雨滂沛衝開一河直通後浦長一千三百二十丈濶約二三丈許載石之舟直抵城下商民舟楫可通兵船出哨甚捷仰見聖徳感孚為千古未有之嘉祥也龍潭玉環志在大理嶴東北叢山峻嶺中有大溪溪水入潭深邃莫測浙江通志卷二十一
