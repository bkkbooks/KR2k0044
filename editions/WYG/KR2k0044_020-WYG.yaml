body:
  text: 浙江通志卷二十一山川十三處州府麗水縣附郭檡山嘉靖浙江通志在縣西南一里長岡秀隴多生檡木上有孔廟又名廟山棗山栝蒼彚紀今郡治在其麓茭山栝蒼彚紀在棗山北皇甫汸過茭山詩張平棲隱處閉户只翛然心遠雲林外春歸花鳥先草間寒積雪竹下暗鳴泉欲訪辛夷塢題詩寄輞川錦山崇禎處州府志在棗山東北舊多蒔桃栁若錦繡然月山嘉靖浙江通志在茭山西海月初升此山先得其光萬象山栝蒼彚紀在月山西俯臨城邑近挹溪光城中山之最高者皇甫汸登萬象山詩蓮城最高處蘭若此中開水見東溪去僧聞西域來鳥啼喧梵座花雨淨經臺觀萬俱清絶何須得象回梅山姜山名勝志並在棗山西南富山崇禎處州府志古三皇嶺麗水縣城外山川夀元山舊浙江通志為郡治鎮山名勝志在北城外白雲山舊浙江通志在府城北十里山頂有鏡心池孟淳白雲山詩萬疊巉巖一徑開中間空洞白雲堆陽坡草軟人稀到定有青猿曝背來靈山栝蒼彚紀上有靈山寺劉涇游靈山詩塵土孤城空自忙不知精舍早秋涼林間磬曲折三里天上金光明滿堂淨飯打魚刳老木寒灰添火爇名香鵓鴣山脚溪聲好流入人間雨意長城門山名勝志踰白雲為城門山永嘉記云城門山瀑布值風散為雨遇日散為青虹麗陽山嘉靖浙江通志在縣北七里縣之名麗以此上有龍潭石室天井下環清溪曰麗陽溪稽勾山栝蒼彚紀在夀元北百里崔巍盤繞亘二十餘里為甌栝士民往京省之間道劉山栝蒼彚紀宣徳間溫守何文淵卻金於此有司就其地建卻金館大連雲山名勝志在縣西南六十里巉巗陡絶上連雲霄栝蒼彚紀一名沙溪尖與青田小連雲山相界大杉源山崇禎處州府志跨麗水雲和之間山下有大杉狐梯二潭木竂山崇禎處州府志景寧接界石羊山太平寰宇記山石如羊有蘭若溪溪有一穴深數丈天馬山栝蒼彚紀山形如馬又如幞頭俗呼幞頭山北拱縣學南明山栝蒼彚紀在府城南七里上有印月池獻花巖高陽洞石梁米芾書南明山三字崖刻靈崇二字乃葛洪穎書夏浚南明山詩栝蒼南明山天造頗奇絶瀑布灑晴雨石梁度夜月洞引高陽侣亭表靈崇碣興來一振衣清風生兩腋大梁山名勝志在縣南二十里北跨麗水南跨青田巾子山名勝志在城東十里山形如巾少微山舊浙江通志在府城東南十里郡應少微處士星故以之名郡乂以名山舊祀少微星君於此劉基少微山詩少微山上太微宫山下樓臺起半空丹井石牀纒土脈瓊窗翠户出天風傳聞仙子時常到應是神霄有路通㑹待九秋明月夜高吹鐵笛看青葱高畬山栝蒼彚紀去郡西五十里北跨宣平西跨松陽峯巒攅簇草樹蓊蔚俯視諸山環列如几席下西山之最高者鷹鳥山栝蒼彚紀山有三峯在高畬之南上曰靈峯中曰翠峯下曰岑峯俱有僧舍林巒秀麗為諸山冠風門山舊浙江通志在府城西三十里栝蒼彚紀上有三穴深邃風自中出每夜靜月明白氣起自山麓上徹霄漢石僧山舊浙江通志在府城西四里栝蒼彚紀山有一石狀如癯僧崇禎處州府志宋紹興間劉大中以兵部尚書出守未幾召還上問石僧之狀大中對以詩曰雲作袈裟石作身巖前獨立幾經春有人問我西來意黙黙無言總是真天王山方輿勝覽在府城西北隅城壁繞其上有唐時天王像故名劉涇天王山詩金壁為家定化城書牀南堰畧相迎人間蝶夢正深黒天上木魚初發明半里好峯招隱路一枝枯竹助閒行巳慙懷紱無高致可更標門著姓名桃山崇禎處州府志舊多産桃去郡西五里小栝山真誥小栝山即小栝蒼山在永嘉溪橋之北左慈元放所治栝蒼彚紀衆山環簇狀如蓮花又名蓮城山徑路盤紆亦名九盤嶺唐宋州治皆在焉佛頭巖舊浙江通志下二十里為青田界巄崆巖崇禎處州府志有石洞如屋可坐十許人劉涇巄崆巖詩蒼崖如堂石如踞橋梁如繩水如布下有樵夫踏破雲世間那復知深處三巖栝蒼彚紀距城一里踞西山之垠宋皇祐間知州李堯俞名其右曰清虚中曰白雲左曰朝曦天堂洞崇禎處州府志距城三十五里上有迎天堂下有蟄龍洞祈雨輒應縣東山之最高者碧湖崇禎處州府志鄉人立市於此以丑辰日集諸貨物交易邑西一都㑹也麗陽溪栝蒼彚紀在麗陽山下源出練水舊浙江通志栝城之水止麗陽溪一源溪設二閘旱則閘入溪之水以灌城潦則閘入城之水以歸溪趙汝迕栝溪停舟詩樹古半成槎溪邊厯厯斜寒林欲無路小塢不多家去客背流葉停舟見暮鴉朝朝省秋水頻減一痕沙好溪名勝志即東溪也自縉雲大盆山西流為東渡東折於大程經石口秋塘諸渡達於洞溪浯溪崇禎處州府志在太平渡洞溪栝蒼彚紀在東溪東二里方干洞溪詩氣象四時清無人畫得成衆山寒疊翠兩派緑分聲坐月何曽夜聴松不似晴混元融結後便有此溪名大溪名勝志亦名洄溪源自龍泉來入縣界東南流逕青田至永嘉入海突星瀨栝蒼彚紀在縣東四十五里一名惡溪晉王右軍游惡溪歎其奇絶書突星瀨於石後里人苦州縣摹打之繁推石墮水中猫兒潭崇禎處州府志昔有術者檄龍於百尺潭以禱雨龍奔化為猫入潭故名石牛潭栝蒼彚紀一名鏡潭為上游諸邑要津有通濟橋維舟為梁縉雲縣翠微山名勝志縣治所倚即李陽冰以中峯名之者金紫山名勝志在南溪與縣治對麓有毛翁巖宋毛維瞻為尉暇則飲此湧翠山名勝志在縣西里許一名西巖雲塘山崇禎處州府志在縣北朝京門外雲峯山縉雲縣志在縣西五十里巖有飛泉如白練大小君子山崇禎處州府志在縣北十五里吏隱山方輿勝覽在州東北五十里瀑布飛泉灑落三百餘丈上有四井周囘四丈栝蒼彚紀一名窪尊山李陽冰篆吏隱山三字於壁鑿巖為窪尊而飲之竒跡尚存作忘歸臺窪尊二銘刻於石李陽氷窪尊銘舉瓢自挹既挹曰再方飲曰舉飲卒曰罄不再有觥忘歸臺銘疊嶂迴抱中心翠微隔山見川溝塍如棋環溪石林春迷四時曲成吏隱可以忘歸朱彝尊忘歸臺詩連山積翠深白日空林廣落景不逢人長歌自來往仙都山仙都山志古名縉雲山按道書洞天三十六所仙都第二十九名元都祁先洞天周回三百里黄帝駕火龍上升處山巔有石屋世傳為洞天之門史記載縉雲本黄帝夏官之名張守節云栝蒼縉雲縣其所封也太平寰宇記云唐置縉雲縣又以栝州為縉雲郡葢以其地有縉雲山故也今縣在山之西二十三里圖經云唐天寶七年六月八日彩雲起於李溪源覆繞縉雲山獨峯之頂雲中仙樂響亮鸞鶴飛舞俄聞山呼萬嵗者九諸山皆應自申至亥乃息刺史苗奉倩上其事於朝勅改今名元豐九域志一名朋峯山韋翃仙都山銘亭亭仙都峻極維嵩屹立溟右削成浙東發地直方摩霄穹崇靈沼在上祥雲積中目視不及翰飛靡窮軒后攸訪碧峯是冲萬夀報響九成來空籙作懲止年祈感通莫高匪慈造化之功曹唐仙都即景詩黄帝登真處青青不記年孤峯應礙日一柱自擎天石怪常棲鶴雲閒若有仙鼎湖看不見零落數枝蓮吳説仙都山詩佳處從來説鼎湖兹遊直欲到清都參天玉笋千尋許墮地金蓮十丈無江觀便思眠一柱海山今喜識方壺直須買取鵞溪絹要畫滄洲水墨圖獨峯山仙都山志一名仙都石謝靈運名山記云縉雲山旁有孤石屹然干雲高二百丈頂有湖生蓮花舊東陽記一名丹峯山步虛山仙都山志在仙都山前疊嶂倚空羣峯掩映又有小峯列如北斗名曰斗巖古老云黄帝常煉丹於此好山仙都山志在仙都山西初暘谷宋紹興間轉運使李士舉常遊仙都有華屋重重對好山之句由是得名李上舉過仙都徐氏山居詩四海無塵戰馬閒稻梁桑柘綠回環不知盡是君王力華屋重重對好山大象山縉雲縣志在縣西南二十里形如卧象大姥山崇禎處州府志在縣西南三十五里姑婦山嘉靖浙江通志在小蓬萊山之東五里上有二石相上下又名母子山萬松山縉雲縣志在縣東五里山勢盤旋林巒森秀括蒼山崇禎處州府志一名蒼嶺圖經十大洞天此為第十道書名成徳隱真洞天周迥三百里東跨仙居南控臨海五岳圖序括蒼山東岳之佐命抱朴子按仙經可以合藥者大小天台山四望山葢竹山括蒼山皆是正神在其中上皆生芝草有道者登之神助為福藥必成劉昭禹括蒼山詩盡日行方半諸山直下看白雲隨步起危徑直天盤瀑頂橋形小溪邊釣影寒註成空太息元鬚改非難靈龜山嘉靖浙江通志在縣東三十五里左曰東山右曰西山山之中有石狀如龜其背有紋官山舊浙江通志在縣東七十里嘉靖浙江通志接台州境薪竹之饒民利賴之大㟄山縉雲縣志在十四都上有七十二洞界青田黄龍山栝蒼彚紀四圍陡絶池水潔清相傳有龍潛此葢縣北之控阨也厯山縉雲縣志在縣西北四十里有摧車坑架鼓巖上有舜廟下有龍津漦山崇禎處州府志在縣西北二十五里舊傳有龍遺漦於此因名仁夀山舊浙江通志在縣西北五十里瀑布山崇禎處州府志在縣北三十五里飛泉灑落二百餘丈葛竹山栝蒼彚紀在縣西北五十里世傳葛洪煉丹於此遺筆化笋成竹人取其笋可書數十字大盤山崇禎處州府志在縣東北一百二十里水源從此出與東陽界小仙都山澄懷録縉雲南峯之東謂之小仙都有二石如人形俯而相先後俗呼新婦石小蓬萊仙都山志在仙都之西潭心有小島上多怪石竒樹潭之南有石壁高可百仞四明樓鑰大書小蓬萊三字刋於壁以亭覆之岱嶺崇禎處州府志在縣北一里嶺左之水流於好溪厯麗水青田以達溫州入海嶺右之水流於龜溪厯永康蘭谿以達杭州入江三嶺崇禎處州府志在縣西南三十五里麗水界高峻難陟明耿再成築寨於此茭嶺崇禎處州府志在縣西北四十里界於武義邑之要害處馮公嶺栝蒼彚紀善士馮大杲所鑿宋楊億比於蜀劍閣云謝公巖縉雲縣志在縣南五里謝靈運常遊此故名徐徳輝初夏游謝公巖詩又取紗衣換天時起細風清隂花落後長日鳥啼中水國乘舟樂巖扉有路通州民多到此猶自憶髯公仙榜巖崇禎處州府志在縣東十五里峭壁千仭色頳一名小赤壁隱真洞仙都山志在步虛山巔巖石玲瓏宛若窗牖唐劉隱真先生修煉之所仙水洞仙都山志在步虛山麓郡志一名鏡巖唐周景復先生修煉之所陸龜䝉寄題鏡巖周尊師所居詩見説身輕鶴不如石房無侣共雲居清晨自削靈香柹獨夜空吟碧落書十洞飛精應遍吸一簪秋髪未曽梳知君便入懸珠㑹早晚來騎白鯉魚初暘谷洞仙都山志在仙都山西有石室洞房虛敞可居以東向先得日故名崖上有三大字或云李陽氷篆金龍洞仙都山志在步虛山東深不可測道家所稱洞天者此也宋天禧四年投金簡於中阮客洞栝蒼彚紀在縣治東一百五十里唐李陽氷題洞額鐫於石上歐陽修李陽氷題洞額鐫石跋阮客者不見其名氏蓋縉雲之隠者也陽氷篆字世傳多矣此磨滅而僅存尤可惜也鼎湖仙都山志即獨峯頂上湖也常生蓮花按唐宋以來名公題咏並以鼎湖稱之好溪崇禎處州府志在縣治前源出大盤山山横亘縉雲東陽永康仙居四縣源深流長厯麗水達溫州輿地廣紀處州惡溪舊多水怪唐刺史段成式有善政怪自去改名好溪鍊金溪仙都山志源出大盆山至仙都則名鍊金水中有石與獨峯之根連續一片其平如砥兩岸相望濶三十餘丈而水深僅尺許唐隱真先生元墟志曰鍊金溪畔足以濯纓則鍊金之名古矣管溪縉雲縣志在縣東七十里百丈潭崇禎處州府志在縣東一百二十里有三潭周回皆石各百餘丈水深莫測巖瀑瀉練時有龍潛昔周闍黎取雨於此曾有神應金花潭仙都山志在練溪暘谷洞前世