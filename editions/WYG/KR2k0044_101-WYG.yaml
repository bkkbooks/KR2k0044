body:
  text: 浙江通志卷一百二物産二嘉興府嘉禾至元嘉禾志序嘉禾在春秋為檇李呉黄龍三禩以禾生由拳野故名至元嘉禾志是郡號為澤國原野衍沃田宜麥禾陸宜麻豆其他有資於民生日用者煮水成鹽殖蘆為薪地饒蔬茹水富魚蟹而已至若草木禽獸果實藥品之𩔖亦他郡所有絲綿絹帛視苕霅則次之稻萬歴嘉興府志地宜稻其品香粳稻粒瘦長雪色味香甘又名紅蓮稻紫芒稻紫殻白粒雪裏揀色白粒大稈軟有芒蘆花白即晩白稻早白稻中秋熟皮芒白米赤揀選稻色㣲黄鵲不知秋初熟又名麻子烏海鹽縣圖經凡種稻先擇種立夏糞秧田浸種浸五日始秧撒之秧田又五日秧始齊芒種後夏至前為黴時多雨墾田平之又碌之且糞之乃㧞秧栽之無雨則􅆽水為之用桔橰其糞也以猪灰以豆餅或以草入之河泥爛而用之栽秧二十日乃盪盪以木板叢釘於上柄以長竹以疏苗之行令根易行也又五六日乃耘耘者去草也爬苗之肋置所去草於下助糞力也耘凡三再耘為下農一之多茀矣耘之服曰馬曰盪胷曰臂簏曰指篐皆以竹為之苗葉利懼傷膚也跪而耘膝故無蔽多傷矣稻水種也天澤未易常徼桔橰力居多惟立秋前十日宜稍乾之令根固餘日水晝夜不得乏絶收穫多寡壹視􅆽水勤惰凡稻處暑而胎白露而秀秋分而秀齊寒露而盡實霜降而黄立冬盡刈矣刈稻有䥛形如鈎稍濶打稻有床以竹為櫺取其易落磨稻有礱用木或用土而齒之輕則不能去殻重則懼傷米也凡田一畝用種七升或八升顆六為肋肋八為箇畝穫稻為箇者三百六十上農遇歲箇可得米七合畝可得米二石五斗也近水者單車水稍逺者雙車悉用人力高阜者􅆽水間用牛車而耕仍用人云糯石門縣志穀中糯盛行有早糯旱糯中秋糯猪血糯晩秋糯矮脚糯香粳糯鴨嘴糯羊須糯泥裏變天啟平湖縣志糯之品金釵糯粒長鵝脂糯一名羊脂虎皮糯色斑十月熟馬鬃糯榧子糯白殻糯西洋糯竈王糯羊鬚糯蘆花糯禾錄糯宜釀酒禾地多植糯而作釀不敵西呉東越者此水性之異也謹按嘉郡古稱嘉禾其土原屬膏腴而治田亦得良法几傍田之處必開漊蕩又必開塍以通溝洫如遇旱歲車灌之方亦備勤農遇熟年每畝之穫可得二石餘除食足外皆集於震澤鄉鎮而糶之惟勸農之方自不可怠穎實之後收割宜早納場之後攤晾宜時又在長民者之督率爾麥嘉興府志大麥不甚適用漬之可為餳小麥即為麪者麥在北方花晝開且冬入窖出汗去濕氣故益人南方則否藟麥無芒色黄可作飯及餅餌酒家蒸之成酒名燒酒味最烈又有糯粟此種北地最多呼為髙梁江浙則僅於墩岸問植之豆萬歴嘉善縣志菽也小者曰豌豆長者曰豇豆香者曰香珠豆以形而論如刀者曰刀豆長而如帶者曰裙帶豆曲如爪者曰龍爪豆似羊目者曰羊眼豆以色而論白曰白豆赤曰赤豆綠曰綠豆黄曰黄豆黑曰烏豆緇者曰僧衣豆斑者曰瑪瑙豆以時而論當蠶時生者曰蠶豆黄梅時生者曰梅豆胥五奉九南田髙不宜水稻多種白豆天啟平湖縣志白扁豆一名延籬豆又名羊眼豆諺云延籬花開挾纊子來長者名龍爪小者名一茶匙扁青豆色綠者名鸚哥綠香珠豆緇色而香大者名僧衣豆黑豆細者名馬料豆豌豆一名小寒豆豇豆一種名裙帶豆刀豆以形名菜萬歴嘉善縣志禾人以此為業白曰白菜青曰青菜似波者曰波菜生可噉者曰生菜甘者曰甜菜不植而野穫者曰薺菜古者菜亞於穀故穀不熟曰饑菜不熟曰饉誠重之也薹心菜嘉興府志冬種春生其蕋始發摘食之禾人稱薹心取其子搗作油名菜油冬菜嘉興府志一名白菜夏種冬收禾人以鹽貯之名鹽虀菜以供一冬及初春莧菜萬歴嘉善縣志有紅白二種芥菜之屬也斷鼈肉為塊以莧覆之則活故忌莧與鼈同食瓜萬歴嘉善縣志瓜𩔖有八一曰甜瓜其形圓而有稜生時堅脆可入醬為菹俗呼醬瓜熟則酥美俗稱熟瓜二曰冬瓜大如枕可煮為羮亦宜蜜浸三曰西瓜其種傳自西域故名本地間有之多販自蘇松四曰筲瓜即生啖亦宜醃藏五曰王瓜如生瓜而色黄即王善菜也六曰絲瓜嫩時可食老則筋頑難食惟取穰去垢而已七曰壺蘆即匏也有甘苦二種大者形如冬瓜而過之八曰苦瓜嘉興府志西瓜色有青白質有長圓沙瓜味最佳又甜瓜一名香瓜小者名金鵝蛋芋本草綱目出自海鹽苗髙三四尺莖赤葉似石榴而短厚又似石南葉開細白花葱天啟平湖縣志地種香細過於太湖粗種又一種名龍爪葱筍天啟平湖縣志家園所産有杜筍鞭筍燕來筍茶筍貝瓊遊山記殳山巨竹千挺醢筍而食肉雖美不能過也香蕈乍浦九山補志松花蕈山之有松者皆産惟陳山東麓為多三月間松花入土至四五月經雨後即生至八九月又生鮮肥滑嫩素品之上味也他如玉蕈松蕈雷蕈胭脂蕈味皆不及惟笑蕈牛矢蕈不可食土人能辨之茶食嘉興府志補食品中有茶食糖纒髓餅春餅桑石門縣志其屬有晩青桑白皮桑荷葉桑鷄脚桑扯皮桑尖葉桑火桑山桑紅頭桑槐頭青鷄窠桑水竹青鳥桑萬歴嘉善縣志南鄉有桑不及桐鄉之盛種法有七一收椹二播種三置棚四灑澆五耨耘六割桑七移栽嘉興府圖記濮院鎮流水環遶土沃宜桑柘閒窗括異志柘湖中小山生柘樹因以為名松柏貝瓊遊山記殳山松柏萬株環合無路俛首松下雲氣相盪不啻魚泳波濤中槵朱彞尊鴛鴦湖櫂歌注城東北隅有槵子樹傳自西竺來者穀嘉興府志榖樹賤而易生土人取其汁以書金字水楊本草綱目楊樹葉短柳樹葉長又一種曰蟠楊耐水隄涯間多植之西河柳本草綱目一曰檉嘉興産陸絳所謂皮赤如絳者也檇李花史嘉興城西南地産佳李因名檇李嘉興府志相傳淨相寺僧坊舊栽真檇李其種漸絶今惟有徐園李甘脆埒名然亦不可多得朱彞尊鴛鴦湖櫂歌注徐園李核小如豆絲懸其中相傳即檇李也張堯同淨相佳李詩地重因名果如分沆瀣漿因思呉越戰未敢盡情嘗朱彞尊檇李詩佳果先秋熟來禽也不如瑶光珠斗散青簡素王書瘦地翻宜嫁柔條亦易舒最防黄霧塞務使綠隂疎暑暍漿偏潤風吹粉未除豐肌須小摘纎核乃中虚銷夏吾鄉好分甘佛寺初曾留西子掐當食轉憐渠李桐鄉縣志出濮院鎮之南名柏家李萬歴嘉善縣志嘉善李不甚佳有青梢黄姑二種梨侯鯖錄語兒梨果實之珍因其地名耳秀水縣志禦兒産玉乳梨陸埈題醜梨詩并序醜梨出邑之東貎雖惡而風味絶勝聞嘗進御因賦五言灰貎凝清古霜津溢脆甜面嫌湯後白心慰邑中黔美實鍾寒谷珍嘗近御奩彼姝徒冠玉爭得似無鹽桃嘉興府志五月桃小八月桃大有合盤桃形扁似合又李公桃無毛而色紅然終不及北産之佳白楊梅朱彞尊鴛鴦湖櫂歌注超山産棗正德崇德志縣北錢林村為呉越錢王舊舘後為證聖院園多無核棗與語兒梨歲獻錢王瑣瑣葡萄紫桃軒雜綴神農九草之一中土久有不俟博望従西域帶來也吾里東塔朱買臣墓有之蘡薁石門縣志野葡萄也菱芰萬歴秀水縣志秀水水實之品菱紅有三種沙角環菱鍋窑蕩青有二種餛飩菱尖角菱紫桃軒雜綴兩角而彎者為菱四角而芒者為芰吾地小青菱被水而生味甘美熟之可代飡飯其花鮮白幽香與蘋蓼同時正所謂芰也春秋時吾地入楚屈到所嗜其即此耶此物東不至魏塘西不踰􅈝門南不及半路北不過平望週遮止百里内耳芡萬歴嘉善縣志俗呼鷄頭葉似荷而大苞莖皆有刺苞内著子多其實補精小兒食之易長故有延年之説地蒲嘉興府志地蒲出嘉興又一種屋蒲可以為匏梅嘉興府志江梅最多綠蕚為佳又有紅梅玉疊諸種山茶嘉興府圖記海鹽常氏園有滇茶一本丹葩吐熖照五里外玉蘭羣芳譜五代時南湖中建烟雨樓樓前玉蘭花瑩潔清麗與翠柏相掩映挺出樓外紫藤朱彞尊鴛鴦湖櫂歌注城南西板橋至項襄毅墓下紫藤花最盛錦帶嘉興府志錦帶河傍植錦帶花多題詠金雀嘉興府志一名飛來鳳鹽浸可以㸃茶蓮嘉興府圖記祥符蕩芰荷甚饒𢎞治嘉興府志嘉善縣蓮花涇多植蓮花千葉蓮正德崇德志錢林村證聖院前有池種千葉蓮野蓮續澉水志永安湖中央有土方數畝髙出如臺産紅白蓮蘋花芡實𩔖皆野生木芙蓉嘉興府圖記芙蓉洲在青鎮秋光漸老芙蓉盛開風景襲人殊為佳致蘆𢎞治嘉興府志嘉善縣蘆墟塘多産蘆葦海鹽縣圖經邑中諸湖惟鸕鷀湖與賁湖為大横湖長湖上谷湖差小岸曲彌望生荻葦深秋白花雪映水色蕭逺竹萬歴嘉善縣志竹十有二種一曰淡竹其葉入藥性涼二曰水䈥竹言其韌也三曰䕶居竹葉大隂濃亦名哺雞言其筍如雞卵之多四曰燕竹燕來時筍生五曰斑竹稱湘妃竹以其斑如淚痕也六曰紫竹可為笛簫其粗者為傘柄之用初解籜色猶青到冬色乃變七曰慈竹又名慈孝竹其筍一年兩生冬則外生夏則内生有子母相顧之義八曰王莽竹最大二十餘節後方生枝葉近根有一錢痕俗傳其根堅猛諸竹莫能當故以莽比之九曰黄菰竹一作黄篐節目疎平皮黄力韌為篾器最良十曰石竹其中實而不虛十一曰黄金間碧玉逐節青黄相間筍最遲十二曰鳳尾竹以其形似也水竹嘉興府志竹生於水髙不盈尺可供盆玩筆竹𢎞治嘉興府志竹𩔖有筆竹茶貝瓊逰山記鷹窠山嶄然中髙旁殺樹皆合抱産茶𩔖武夷酒名酒記秀州月波酒談薈秀州酒有清若空蓮花白正德嘉善縣志臘月以麯釀秫作酒煮而藏之曰煮酒其隨時而釀者曰蓮花白三白萬歴秀水縣志以白麯為之不入草藥露透無麯氣白米白水故名三白鹽太平寰宇記海濱廣斥鹽田相望即海鹽與鹽官之地同也𢎞治海鹽縣志本邑僻臨大海斥鹵之民率多煮海為鹽見只編凡煮鹽俗曰趂海一則謂趂潮可漉一則謂趂天晴可曬也趂海先佃海塲塲一丁其横九弓長倍之開潭貯潮鑿溝築塍為界分塲為上中下三節近海為下塲以潮水時浸不易乗日曬也其中為中塲以潮至即退夏秋皆恒受日易成鹽也逺於海為上塲潮小至所不及必擔水灑灌方可曬也凡潮汛上半月以十三日為起水至十八日止下半月以二十七日為起水初二日止潮各以此六日大滿故當潮大三塲皆没自初二十八日已後潮勢日減先曬上塲次曬中塲最後下塲故上中每月得曬二塲下塲或僅得其一也凡曬鹽俗曰曬灰言其土之細如灰也侵曉先合力用削刀削灰使鬆隨以碌扒碌碎更用篠竿攬使極細極平方擔潭中海水以木瓢灑潑如雨使之匀透曬至晡時仍以削刀收邊用板推夾灰成一長埂以防夜雨明早仍用翻扒推埂使平更用碌扒碌之篠竿潑水夾板推聚如前盛夏二日或三日秋冬四日曬力方足冬則西北風尤勝日曬也先此周築土圏如櫃長八九尺濶五六尺髙二尺深三尺名曰溜溜傍即開一井深八尺溜底用短木數叚平鋪木上更鋪細竹數十根復覆之以柴冒以草灰然後取塲灰填實溜中用足􅂿實再以稻草覆灰仍挑潭中海水多潑草上使緩緩潛滲入井中成醎滷可汲煎矣大約一溜之滷可得二十餘擔滷之上者視水百觔加重觔三十上滷況下次漸在上以石蓮子最重者一粒次重一粒又次重一粒擲滷中驗之上滷則最重者浮否則最重者況次重者浮也煎法用大鑊二具中鑊一具中鑊逺於火停頓冷滷使熱逐漸添入大鑊取惜薪也俗呼滷二大鑊為一盪用滷六擔可得鹽百四十觔云大較鹽之盈縮擊乎雨暘貴賤視乎薪價晴久得鹽多雨久得鹽少薪貴鹽價貴薪賤鹽價賤必然之數矣削刀長一尺五寸濶二寸一面口薄如刀用方木一塊鑿口含刀木上著六尺竹柄用以削泥碌扒頭長二尺著齒十四柄長六尺用以碌泥篠竿用細石竹為之夾扒用杉木板長七尺濶一尺裝一木鏑子一人用力持鏑一人用繩捉夾使成灰埂木瓢用以挹滷弔子用竹為柄以汲滷大鐵鏟用以鏟鹽鑊謹按嘉屬産鹽最廣如西路鮑郎等塲其色多白海沙蘆瀝等塲其色多青青者粒麤且凝成氷塊其味最鹹呉郡造醬者多利此取其質重而味厚也藥草嘉興府志補藥品有蒲公英旱蓮艾火炊草夏枯草葳茹草仙茅海藥本草仙茅生西域今浙西諸州亦有之葉青如茅而軟有縱文又似初生㯶櫚春初乃生三月有花如梔子其根獨莖而直大如小指八月采根曝乾以為藥龍骨嘉興府志秀水縣穆溪通太湖水中多龍骨俗傳龍蛻於此甘菊萬歴嘉善縣志花黄梗紫為甘菊最良野菊叢生花小性凉家菊修摘花大氣弗聚矣紫蘇至元嘉禾志海鹽出者佳枸杞石門縣志方書云出崇邑牢牆上者佳今絶少馬兜鈴圖經本草浙西皆有之生苗作蔓繞樹而生蓬莪荗圖經本草浙西或有之三月生苗在田野中其莖如錢大髙二三尺葉青白色頗𩔖蘘荷燈草嘉興府志其皮可以織簔翠雲草嘉興府志生隂地翠色可愛茜草名勝志嘉善縣茜溪出茜草故名藍草萬歴嘉善縣志本縣遷南胥五髙鄉種藍呼為澱染草也馬蘭頭嘉興府志可作菜食花如小菊紫荷花朱彞尊鴛鴦湖櫂歌注草生田中花開如茵可坐臥遊人每藉此泥飲嘉興府志又名孩兒草田家蒔以壅田菖蒲嘉興府志嘉善縣東西菖蒲涇多産菖蒲鶴明一統志鶴湖在嘉善縣其中多蘆葦或以舊嘗産鶴故名天啟平湖縣志鶴本産此今多來自他所青􅝄萬歴嘉善縣志生北鄉湖蕩中頗肥俗言水裏鯧岸上􅝄鴛鴦名勝志宋聞人滋南湖紀畧云欈李東南皆陂湖而南湖尤大其禽多鴛鴦故名鴛湖鷗萬歴嘉興府志小鳥色白在湖蕩中隨波上下常以三月風至乃還洲嶼錦鳬貝瓊遊山記殳山下有三湖青停黛蓄與天一色錦鳬往來可畫黄雀乍浦九山補志雅山之北有紫蕩皆黄茅白葦秋間黄雀不知其何來飛集其間至夜深土人以網張四圍逐得之有二種一名蘆雀味少劣石門縣志黄雀出排頭者蠟塗軟脚為勝朱彞尊鴛鴦湖櫂歌注黄雀味甚腴産陶莊馬疃呉地記云海邊小魚所化秋鳥乍浦九山補志秋鳥亦非山産八月中乗西北風起迎風而來此鳥成羣飛每下土人網取之凡山林園囿樹木茂盛處百十為羣一網可得兩隻者名畫鶘雄名青鳩雌名雌搏四隻者名花鷄八隻者名鑚籬至春時又復囘至山間復網之名囘春味頗劣惟秋鳥價頗貴餽遺者以為珍品海鹽縣圖經屠墳林木甚茂秋月多東南風時有鳥大如鳩者忽乘風來集信宿向内地分飛至春又復集此渡海歸味極腴美為時饌雅貴名曰秋烏初来時刳其腹有青胡椒因驗是日本來也菜鷄嘉興府志青色似青又一種名䳓皆田間食穀之鳥人捕食之紥山看火朱彞尊鴛鴦湖櫂歌注鳥名鳴則桑葉貴透倉鳥舊浙江通志出嘉興俗名十姊妹籠其一則羣皆來鴨樂府阿子歌注嘉興人養鴨兒因作此歌鴨餛飩方囘竹杖詩秀州門外鴨餛飩朱彞尊鴨餛飩詩注鄉人目曰喜彈朱彞尊賦鴨餛飩詩禾俗養鴨兒樂府歌阿子一雄挾五雌累百唼長水方春鷇將出生意不可止要術啄菢宜匝月雛定起淺夫計欲速火攻迭運徙半體形已呈忽焉混沌死他邦盡棄擲吾黨獨見喜鉶童屑椒桂竈妾洗毛髓色淆黄白斑候歛漿汁滓鴨簽哂東京鴨㔅屏南史既免治刀砧兼弗齼牙齒以之號餛飩莫審所自始得非飲食人桐江方萬里記取秀州門竹杖扶入市至今七七十坊饌法傳伍氏物㣲愛贈殊留賓姑舍是二子下箸貪謂足勝羊豕作詩賞逸味虚谷同一揆不知天地間何者真好美試問厨烟生曾否動食指牛嘉興府志本地惟牛最貴豬萬歴嘉善縣志正德中禁天下養豬一時埋棄俱盡本邑下保民陳氏穴地養之遂傳其種獺萬歴嘉善縣志他處獺祭魚則四方陳之避而弗食惟本縣近河多小廟獺必進魚於廟祭之金魚名勝志秀水縣月波樓下為金魚池唐刺史丁延贊得金鯽於此後為放生池方輿勝覽云在城外呉陸瑁池即今之南湖也陸蒙老金魚池詩池上春風動白蘋池邊清淺見金鱗新波已縱遊魚樂調笑江頭結網人鯽魚天啟平湖縣志烏背者佳出本縣塔院南刀鱭朱彞尊鴛鴦湖櫂歌注鱭亦作鰶春初肥美白魚萬歴嘉善縣志葉氏避暑錄云太湖白魚實魁天下今本縣到處有之但來有定期必成羣而過異色魚朱彞尊鴛鴦湖櫂歌注隠真院在城東昔有方士於此修煉化去中有一池生魚多異色銀魚萬歴嘉善縣志色白如銀大者如箸細者如鍼北鄉蕩中有之斑魚萬歴嘉善縣志似河豚而小怒則腹脹如鼓色斑有㸃味亦美肺尤佳前人有詩云忽憶夏湖風味美斑魚黄雀寄來無黄魚天啟平湖縣志本縣例該歲進黄魚三百尾每年僉役解貢嘉靖三十年糧長與蘇州氷厰相爭訴􅃺遂免魚貢河魨天啟平湖縣志鮧魚即河魨湖中間亦網得薰鰌嘉興府志補食之品有薰鰌海族海鹽縣圖經鱗之品有黄魚鰵魚鱸魚鯔魚鱭魚鯋魚魚鰳魚梅魚鰣魚魚馬臯魚比目魚河魨魚青蝦白蝦黄蝦海蝦及水母介之品有鱟蝤蛑白蟹蟛蚏瑟蟹蟶白蜆白蛤黄蛤土蛈見只編海上業捕魚者約二百家名魚户户納魚課始得捕捕之法有有關網有石斷有退箓及鈎墾等法逺捕用舩近捕用箄並櫓摇櫓亦能破浪行也箄以大竹貫疊以篾絞草札縛成之亦網𩔖口濶二丈口周方綠著四竹先以大木穿竹索搥入海底二文許索浮海面必長八丈方足擊與潮極滿之勢等潮至口東向退又西向隨潮迎去受魚最多張近者得魚少必逺置乍浦鬭牛山東大海中此山洋水至深水族所聚魚船日乗潮一往謂之撈鬭牛之以十月始張六月乃撤海物著網即死夏秋道逺多臭腐不可市耳惟近海所得魚鮮好足趂人口四時不撤矣又有草但以草繩結張近處用捕海月關網以竹綴網簽著淺水處髙四尺餘長百丈空其一面潮至網没潮退截水得魚也石斷疊石如城髙丈許為費頗多大小惟人力是視所謂扈也得魚因潮猶之關網斷多在秦山左右惟關網在近郭三四里間家户買鮮必問關斷則又勝於近海之矣取近之魚用箄退箓用竹織成口大底尖長二三尺千百連帶以竹插置塗泥上惟鯔魚嗜泥自入箓中尤多鈎用雙鬚者長三尺許以鈎蟶墾用銕沙虎穴最深須田家大四齒鐵蜆與蛤蜊黄蛤用小四齒大較海物亦按時見美如正月則貴河魨徃時人罕食者漁人得此棄不顧今則珍為名饌價亦璔貴蜆生沙塗中殻如蛤而薄惟春月肉圓肥無沙梅魚長不過五寸𩔖小黄魚然别是一種也二月鱭魚長尺餘有子者佳稍不及江産鮮蛤一云黄蛤形小味鮮入土甚深墾得㨗捉遲即縮入泥中至六月便不可食三月板魚扁薄𩔖板一名箬鰈四月鯧魚馬皐魚二魚皆無鱗鮮而易潰馬皐多烘以為腊貯罌餉逺此時白蝦以朱腦菊花心見稱葢子在腹間如黄粟然用椒酒烹口咋肉脱名酒發蝦五月黄魚雖盛自從洋山網捕鹽則不能多得鯊魚犁頭燕尾有翅無鱗周身裹沙齒鋒利得魚必向空戲擲而後食常有嚙人一髀一足去者土人罵箄户曰鯊魚殘最所啣恨此魚入石斷乃為人所捕又有虎頭鯊身黑尾尖得之惟堪炙油不中食葢即江豚𩔖矣魚圓大如箕腥而骨嫩尾長端有銛刺人以手捉能運尾擊之口刺毒腐至骨乃已至鰣魚最稱上品但一二見不能與江産爭多六月黄甲即蝤蛑兩螯極大得即𦂳縛蒸食美緩縦則介裹腥水較讓明州殻中黄實也鰳魚㗖雄白殊勝腹子者鱘魚鼻與身等帶甲愈佳而脆美黄膩不減婁東􅔉城七月白蟹形似蝤蛑稍白食泥而肥海蟄身圓白頭戴壘塊而赤浮水蠕動得之易而且多質成於水乾之正復無幾八月青蝦隻有重三四兩者漁者腊之曰對蝦凡蝦自四月至此為盛人家烘貯以飣盤案又銀魚細短不若産於河者九月土蛈自八月至此月不復食泥吐白脂晶瑩塗上比他月稍佳貧兒手拾盈桶不過三四錢十月沙虎即蟛蚏一𩔖獨深居沙土約一二尺故殻軟而肥然墾得不易至貿錢隻四五也惟蟛蚏雖穴處而散出聽人攫拾十一月蛤蜊亦墾沙而取肥大少遜通州蟶處深穴故必鈎取以大者為美十二月鱸魚狀與䲄相似味不大佳若四時皆有莫若鯔魚蛇頭鯶身味甘骨鬆俗稱海蔗子最細美熏制薄切明如琥珀片比明海雜著他子散細腥黄美惡自判也他如䲄魚亦時時有大者與鯊二種有重百觔者又比目與箬鰈彷彿不見貴重惟海鰻肥者可角河鰻其他若孱魚之軟爛瑟蟹之細碎封皮魚之瘠薄蝦塗之作醬鱟之多殻皆下品不足言也大都蟹蛤蟶蚏月滿漸瘦月黑乃肥介屬隂𩔖隨月之暗體為消長耳又水族雖逐時見珍然春夏秋三時種種各具但冬春之際多食泥率皆色黑腴减不中盤餐也蟹正德嘉善縣志汾湖半屬呉江一名分湖周二十餘里中産蟹紫螯殊美陶振汾湖賦紫蟹剖呉下之膏腴注各處蟹皆白須惟汾湖紫須蝦名勝志嘉善縣祥符蕩中産巨蝦螺明一統志螺潭在府城南相傳有白色細螺生其中嘉興府圖記范蠡湖有西施粧臺池産異螺隂雨輙舒五采張堯同范蠡湖詩少伯曾居此螺紋吐綵絲一奩秋鏡好猶可照西施牡礪萬歴嘉善縣志北鄉湖蕩多蠣其首向左者為牡礪沙虎乍浦九山補志産高宫山南不甚大與蟛蚏等糟食甚美又呼為沙狗海蜇爾雅翼䖳一名水母又曰鮓魚又名樗蒲魚今浙西通呼蝦䖳又名海靻俗云潮之來也䖳隨之而來羣蝦擁之若竹槎然槎者障塞之名潮退則蝦棄之陸故為人所獲或曰在海中不浄海神惡焉驅與人食之天啟平湖縣志一名海月俗呼海蜇蠶萬歴秀水縣志三月蠶婦浴種及桑齊養蠶謂之蠶月三眠作繭繅絲次為綿諺云江村四月閒人少纔了蠶桑又插秧海鹽縣圖經蠶之初收也以衣衾覆之晝夜程其寒煖之節不使有過過則有傷是為䕶種其初生也則以桃葉火炙之散其上候其蠕蠕而動濈濈而食然後以鵝羽拂之是為攤烏其既食也乃熾炭於筐下并其四周剉桑葉如縷者而謹食之又上下抽番晝夜廵視火不可烈葉不可缺火烈而葉缺則蠶饑而傷火致病之源也然又不可太緩緩則有漫漶不齊之患矣編絰曰蠶薦用以圍火恐其氣之散也束秸曰葉墩用以承刀惡其聲之著也是為看火食三四日而眠眠則擿眠一二日而起起則餧是為初眠自初而之二自二而之三其法盡同而用力益勞為務益廣是為出火葢自此蠶離於火而葉不資於刀矣又四五日為大起大起則薙薙則分箔薙早則足傷而絲不光瑩薙遲則氣蒸而蠶多濕疾又六七日為熟巧為登簇巧以葉葢曰貼巧驗其猶食者也簇以藁覆曰冐山濟其不及者也風雨而寒則貯火其下曰炙山晴暖則否三日而闢户曰亮山五日而去藉曰除托七日而採絸為落山矣每蠶忙時有小鳥連叫曰撒山看火蠶室用火育者倦極常患失火鳥葢警之也山者用柴帚以禾草為之長尺有咫大可一握散布登蠶其上有至二三重者凡蠶之性喜温和惡寒熱太寒則悶而加火太熱則疏而受風蠶房宜卑卑則温蠶簇宜高高則爽又其收種時須在清明後穀雨前大起須在立夏前過此不宜也至於桑葉尤宜乾而忌濕少則布挹之多則箔晞之能節其寒暖時其饑飽調其氣息常使先不踰時後不失期而舉得其宜故所收率倍常數時謂得養蠶術焉促織朱彞尊鴛鴦湖櫂歌注嚴將軍墓前每年産一促織為冠里人爭取之佳者名為紫金翅嘉錦嘉興府志嘉興出錦名嘉錦雲絹嘉靖浙江通志嘉興出畫絹杜氏畫譜密機絹極匀淨出魏塘趙子昻多用此作畫濮院紬桐鄉縣志花紡紬出濮院名色甚多遍行天下謹按嘉錦之名頗著而實不稱惟濮院所産紡紬與西機綾練絲熟淨組織亦工是以濮院一鎮之内坐賈持衡行商麕至終歲貿易不下數十萬金居民藉此為利葢由勤以致之也杜紗萬歴嘉善縣志出縣思四等區隨用染色但比官紗可浣濯至於綿紗窮民無本不能成布日賣紗數兩以給食故諺云買不盡松江布收不盡魏塘紗桐鄉絹布桐鄉縣志邑人工於紡織絹有花素官絹籮筐絹素絹帳絹畫絹綾有花綾錦綾素綾羅有三梭五梭花羅素羅紗有花紗脚􅂿紗縐紗布有龍潭布桐鄉布眉公布麻布陡門布建莊布烏鎮布簆布苧布綿紬桐鄉縣志出青鎮細布天啟平湖縣志靈溪水秀沙明産細布人爭市之木棉紗布萬歴嘉善縣志木棉本出閩廣宋時始傳種種於松江之烏泥涇今南鄉高田種之湧幢小品地産木棉花甚少而紡之為紗織之為布者家户習為恒業不止鄉落雖城中亦然往往商賈從旁郡販綿花列肆吾土小民以紡織所成或紗或布侵晨入市易綿花以歸仍治而紡織之明旦復持以易無頃刻間紡者日可得紗四五兩織者日成布一疋㸐脂夜作男婦或通宵不寐田家收穫輸官償債外卒歲室廬已空其衣食全賴此澉浦俗善績苧更以織苧布為業然地實不産苧市之他方布亦不大精非貴人所御也香嘉興府志補有合香帶梅花笑蘭衣香薔薇露朱彞尊鴛鴦湖櫂歌注蠶月最多野薔薇開白花田家籬落間處處有之蒸成香露可以澤髮墨春渚紀聞沈珪禾人善製墨諺云沈珪對膠十年如石髹器輟耕錄嘉善斜塘楊滙髹工鎗金鎗銀法以黑􅃮為地鍼刻山水樹石花竹翎毛亭臺屋宇人物調雌黄韶粉以金銀箔傅之春明退朝錄綠髹器始於王冀公家祥符天禧中每為會即盛陳之然製自江南頗質朴慶歴後浙中始造盛行於時銅器嘉興府志補貨之品有走金銅器商嵌銅器郡中者佳銅爐朱彞尊鴛鴦湖櫂歌注里有張鳴岐製銅為薰爐聞於時銀槎輟耕錄浙西銀工之精於手藝者朱碧山在嘉興魏塘朱彞尊鴛鴦湖櫂歌注朱碧山所製銀槎鑿張騫於上以七寳嵌之錫壺朱彞尊鴛鴦湖櫂歌注里中黄元吉冶錫為壺極精緻匏杯秀水縣志邑人周五峯製近日鄉人多用之曹溶匏杯歌郡中攻匏始王氏其後模傚紛然多各能推擇尚堅樸八月九月留霜柯宣武平生誚形似精微以往皆淆訛石佛羣僧稱好手工惟急就虧揩磨流傳空復遍燕粤賤售只辱幽人薖東郊周生最晩出家無尺帛顔常酡思窮莽蒼得奇竅盡刷怪詭還中和終年黯慘與神遇歘起奏月如擲梭不規而成妙天質因物纖巨無偏頗缾罍滿眼總適用譬若聖教陳四科其間卓絶首觴器琴軒書榻光相摩捧之宜俟偓佺輩傍坐可斥妖秦娥愚也好古徹骨髓周生之寳曾經過持贈不惜倒筐篋皜若片月來烟蘿南潘閩堧北沙塞塵坌戛擊催沉疴糟丘已隤謝歡伯不飲柰此匏者何銅漢書食貨志呉東有海鹽章山之銅鐵海鹽縣圖經雅山本産鐵烹冶者以不當爐鞲費幸免傷鑿黄石海鹽縣圖經豐山産石色黄而堅土人採為甃築用磚瓦萬歴嘉善縣志出張涇窰者曰東窰出千家窰者曰北窰東窰土高窰大火足故堅完可用北窰地卑取土他所又窰小悶熟者故脆而易壞陶甓𢎞治嘉興府志嘉善縣甓竈塘居民以陶冶為業湖州府稻𢎞治湖州府志稻之𩔖八月白稻八月熟一名鯉花紅一名觀音稻一名𤓰熟稻趕冬舂稻言其早熟可接陳米雁來枯稻雁來時即枯綻來烏稻其色初白至熟即烏三穗千稻其穗長一穗三百餘粒㤗州種自㤗州來其米紅色下馬看稻其色齊熟言其好看也野雉斑稻色如雉雞之斑斕麻子烏稻米粒如麻子而色烏鵝脚黄稻色如鵝掌老赤鬚稻至熟時芒赤師姑粳稻言其無芒黄梗鮮稻其梗黄胭脂糯稻其色紅羊鬚糯稻芒長而白其稻早熟即早糯也馬鬃糯稻芒如馬鬃而色赤懶曬糯稻色易變不曬而變也烏香糯稻色烏而香鐵梗糯稻其梗硬而不倒趕陳糯稻早糯也泥裏變糯稻其米不待曬而變長興縣志稻屬有宜興白宣州白七月白三朝齊鵝子黄戤塘青武康縣志有大黃稻小白稻紅稑晩稻金裹銀稻吳興掌故湖耕深而種稀其土力本饒沃種不稀者至秋多病蟲嘗見老僧言吾田先用人耕繼用牛耕大率深至八寸故倍收又湖之老農言下糞不可太早太早而後力不接交秋多縮而不秀初種時必以河泥作底其力雖慢而長伏暑時稍下灰或菜餅其力亦慢而不迅疾立秋後交處暑始下大肥其力倍而穗長矣旱稻崇禎烏程縣志即占城稻自宋真宗取於福建者湖人因有占米之稱名曰旱稻呉興掌故山中往往旱荒乞得旱稻種耐旱而繁實且可久蓄高原種之歲歲足食種法大率如種麥治地畢豫浸一宿然後打潭下子用稻草灰和水澆之每鋤草一次澆糞水一次至於三即秀矣黄龍稻崇禎烏程縣志郡大水陳郡侯幼學訪有黄龍稻可播購求以濟潘士達詩云相傳白鳥能招水却道黄龍可濟民麥𢎞治湖州府志大麥即麰麥也早熟而粒大小麥有赤白二色又有無芒者名火燒頭麥即落麥也􅢸麥粒如大麥即穬麥也菜𢎞治湖州府志大頭菜其頭白甘軟可食亦宜醃藏禦冬脆嫩味佳西呉里語湖州白菜出郡城東門外者嫩白甚佳移種他處則為青菜油菜其品味變矣與郡之溪中鯿魚同稱謂之大頭菜小頭魚萬歴湖州府志長興有爼中山菹醃藏菜也昔呉王於山中種蔬為軍人冬食之備西呉枝乗呉興槎頭鯿為海内佳味東門外之葫茯與之齊名土人稱大頭菜小頭魚云謹按湖地宜菜四時皆有冬春為市而冬月尤多聞之諺云冬月菜莖小雪小行大雪大行冬至不行今則竟有三熟直至臘盡青青滿畦湖民資其利者溥矣烏菘菜𢎞治湖州府志青菜亦名烏菘菜春間煮曬為乾蔬薺菜呉興掌故湖人不甚食薺薺和肝氣明目夜則血歸於肝肝氣和則血脈流通津液暢潤東坡與徐十三薺羮書以為天然之珍雖不甘於五味而有味外之美天生此物以為幽人山居之祿蘿蔔崇禎烏程縣志一名蘆菔一名蔓菁春末生者謂之楊花蘿蔔形細長夏生者為夏菘蘿蔔形圓秋生者為秋菘蘿蔔形長而大俱出太湖旁諺云太湖蘿蔔賽過金壇藕蔓菁吳興掌故蔓菁根能濟饑若蘿菔止主消食蔓菁薹苗可作菜子可作油諸葛種之蜀中有自也謹按本草諸書蘿蔔與蔓菁皆並載是屬二物烏程志謂蘿蔔一名蔓菁者誤也生𤓰𢎞治湖州府志嘗𤓰一名生𤓰可糟醃出太湖傍山藥呉興掌故山藥本名薯蕷以山土所宜故名山藥然黒土不如黄沙土平地種者無益予以供早旦下食兼作東坡玉糝羮及作酒方在本草薑蔬譜出太湖傍者枝紅茄呉興掌故湖中諸佳蔬易辦而美惟茄不如松江之肥大其餘皆可以養老省擊鮮也葱蔬譜出太湖傍者為湖葱頭白而長筍萬歴湖州府志筍出棲賢山者佳崇禎烏程縣志棲賢康山之間專種猫竹笱有重至二三十觔者其種法稀留竹本每年鋤二次並無草根清明前後見地有氣眼即知下有大筍用力掘出其白如玉立夏後漸無剛竹筍夏出邊筍秋出團筍冬出呉興掌故筍亦有毒須用薑或茱萸醬制之一説滑利大腸而益於肺謂之刮腸笓一云竹實少陽之氣而尅脾土筍脯筍譜天目山生筍其色黄今人以天目筍脯見饋其色綠少有黄者聞其煮法旋湯使急轉下筍再不犯器即綠矣酸筍呉興掌故深山梅溪以上皆荒山筍然路逺不能及時逺致作筍虀賣之極軟滑可供盤飱名酸筍山家清供嘗見山僧作筍粥幽尚可愛其煮筍用大塊云薄則味脱大塊久煮其味自全蓴太平寰宇記長興縣西湖一名呉城湖湖中出佳蓴嘗貢𢎞治湖州府志莖葉如小荇但莖上有氷涎滑澤可食出烏程蘇灣者佳呉興掌故湖中多蓴鎦孟希云永興湘湖蓴菜三月盡採賣至秋則無人採矣孟希此語止一方之見耳春蓴如亂髪成本此則猶常菜不足異秋蓴長丈許中止一二尺生氷甚滑一二尺外皆棄物且春蓴嫩不可作羮秋風之思在此一二尺間耳以菜體計之宜永興之不知採也蕈呉興掌故湖中大旱乏食采菌蕈食之山人云凡色大紅及黑白色者俱不可食惟淡紅色者無毒葢蕈受濕熱之氣謹疾者宜詳之兩河初夏生麻菰即蕈也極大者亦不可食惟種出者無毒種以爛楮木數寸碎之埋土中以米泔灌即生石耳名勝志安吉州梅溪石門中産石耳食之止熱蕨粉呉興掌故湖中採蕨其苗曰蕨箕春初可作菜其根深者至三四尺每根二觔搗取粉水澄細者可充一夫一日之食自九月至二月可採至三月穿芽則根虚不可食可救半年荒也桑湧幢小品湖州畜蠶者多自栽桑否則租别姓之桑俗曰抄桑凡蠶一觔用葉百六十觔諺云仙人難斷葉價故栽與抄為最穏否則謂之看空頭蠶有天幸者往往趣之呉興掌故蠶桑之利莫盛於湖大約良地一畝可得葉八十箇計其一歲墾鉏壅培之費大約不過二兩而其利倍之自看蠶之利復稍加贏而其勞固已甚矣俗呼小錄湖州以桑葉二十觔為一箇􅬎述異記顧渚山有􅬎子樹其木如玉色渚人採之以為杖桐柳吳興記烏程縣南百里有桐墟百五十里有柳墟又有柳湖楓櫟太平寰宇記長興縣飛雲山多産楓櫟檀萬歴湖州府志生罨畫溪旁有連理枝者苔梅梅譜苔梅惟呉興有之他雖花盛開苔皆剝落惟自武康即不變移呉興掌故其枝虬曲萬狀蒼蘇鱗皴封滿花身又有苔鬚垂於枝間或長數寸風至綠絲飄飄可玩初謂古木久歴風日致然詳考所産雖小株亦有苔痕葢别是一種予從會稽移植十本一年後花雖盛苔皆剝落殆盡惟湖之武康所得者即不變此風土使然會稽隔一江湖蘇接壤土宜亦異則同也馮子振苔梅詩姑射仙人翳翠鸞濛濛香霧濕飛翰夜深舞罷霓裳落留得䓤裾䕶曉寒消梅𢎞治湖州府志出道塲山下青脆殊甚其實尤早烏梅嘉靖浙江通志湖州出呉興掌故安吉之梅溪以梅得名而烏梅特為名産他方所製取自殘落安吉特摘完好者為之楊梅元豐九域志長興縣石槨山生楊梅愼䝉逰黄龍洞記自府城出北門至弁山之下楊梅樹以數萬計青翠滿林不減閩之荔枝自是沃壤又一奇觀也羣芳譜呉中楊梅種𩔖甚多名大葉者最早熟味甚佳次則卞山本出苕溪移植光福山中尤勝西呉枝乗果實芰藕菱芡皆佳而楊梅殊絶出太子灣者大幾如卵甘不勝口櫻桃成化湖州府志一名含桃出道塲山下者最佳木瓜太平寰宇記呉興土産木瓜糝煎重杬子長興縣志木瓜出長興者其實大牛巘四安道中所見詩木𤓰已過折山來黄帕封林未敢開想見白沙紅照裏繡紋磊落見奇瑰注木𤓰園入折山數里供進後方敢賣土人取𤓰埋其半於沙中以紙鏤花貼上以溪水灑之日曬乃紅梨𢎞治湖州府志出安吉名金花梨佳栗萬歴湖州府志出安吉孝豐橘避暑錄話惟洞庭山最盛近處好事者園圃移植之橘比田利數倍而培治之功亦數倍於田橘下之土幾於用節不使見纎草地必面南為層級次第使受日每歲大寒則於上風焚糞壤以温之橙崇禎烏程縣志味酸極香用糖製成小餅或用鹽配桂花入茶香櫞亦可切片糖製西𤓰崇禎烏程縣志出太湖傍地不若常州來者今山地有沙𤓰亦佳藕崇禎烏程縣志出桑瀆者佳以紅荷蓮白荷藕為貴花紅者蓮腴而藕硬花白者蓮嫩而藕甜風菱崇禎烏程縣志出菱湖秋晚採入竹箔曝乾為風菱𢎞治湖州府志菱湖人焙乾食之可療饑謂之曰菱米洛如花就印錄呉興山中有一樹𩔖竹而有實似莢狀鄉人見之以問陸澄澄曰名洛如花郡有文士則生珠藤太平寰宇記長興縣紫花澗生珠藤至三月紫花滿澗重臺蓮平泉草木記其水物之美者有白蘋洲之重臺蓮太平寰宇記白蘋洲舊有千葉蓮李德裕重臺芙蓉賦并序呉興郡南白蘋亭有重臺芙蓉本生於長城章后舊居之側移植蘋洲至今滋茂余頃歲徙根於金陵桂亭奇秀芬芳非世間之物因為此賦以代美人託意焉昔柳惲為呉興太守顧座客而嘆曰遊汀洲以採蘋憶瀟湘之故人見白日之已晩惜靑春之不返且欲捨瓊蘂於桂山折瑶華於蘭畹客乃稱曰彼有清川爰生瑞蓮紅葩煒而畢曅翠葉小而田田願得薦佳名於君子悦麗色於當年於是縱蘭棹泛淪漣吟朱鷺於邃管鳴鵾雞於瑟絃臨漪瀾以逺望嘆華艶之何鮮是日際海澄廓微風不起涵麗景於碧湍爛朝霞於清沚鮮膚秀穎攢立叢倚疑西子之顔酡自館娃而戾止逺以意之若珠闕玲瓏疊映崑峯聚玉女之光色抗霓旗以相從廹而察之若桂裳重復鬱撓丹谷思江妃之窈窕發紅羅之芬郁爾其映蘭芷出蘋萍掩萋萋之衆色挺嫋嫋之修莖泫清露以濯秀流鮮飈而發精雖草木之無情亦獨立而傾城若乃行潦既收秋光始静見凉野之夕隂悵囘塘之餘景思摘芳以贈逺更臨流而引領翡翠失其輝鮮珠璣奪其光頴惟斯物之特麗宜獨秀於寥天在靈境而向降居下澤而何偏有繁華而不實嗟淑𩔖而莫傳念莊姜之無子非巧笑之未妍彼天意之所屬諒難得而知焉刀為歌曰呉山秀兮烟景媚因淑女兮感斯瑞蓮雖多兮無厥𩔖蘭徒芳兮何足貴人已去兮代一不留獨含情兮託兹地五花蓮咸淳臨安志淳熙中孝宗同太上至德壽宫冷泉堂時蓮花盛開太上指池心云此種五花同幹近伯圭自湖州進來前此未見也蘆方輿勝覽苕溪兩岸多生蘆葦秋時則花荻名勝志荻塘産荻花最茂白蘋呉興志白蘋洲乃越女采蘋處梁柳惲為呉興守賦汀洲采白蘋詩即此筀竹𢎞治湖州府志其篾柔韌可為器用避暑錄話筀竹色深而葉密始得此山即散植竹畧有三四十竿雜衆色有之數年後所向皆竹矣有告予種竹法者但取大竹善掘其鞭無使殘折從根斷取其三節就竹林燒其斷處使無泄氣種之一年即發細筍掘去勿存次年出筍便可及母插柳者燒其上一頭則抽條倍長鬻牡丹者燒其柄或蠟封即不蔫葢一術也種竹須當五六月世言五月十三為竹醉日不必此日凡夏皆可種也箬竹崇禎烏程縣志其葉大可編篷徑尺竹竹譜可為甑出湖州箭箬太平寰宇記長興縣箬溪夾溪悉生箭箬荈茶經呉興記烏程縣有温山出御荈顧渚茶茶經浙西茶以湖州為上太平寰宇記長興縣金沙泉每歲造茶所也茶産在邑界有生顧渚中者與峽州光州同生山桑儒師二塢白茆山懸脚山嶺者與襄荆申三州同生雁亭山伏翼澗飛雲曲水二寺青峴啄木二嶺者與壽州同天中記明月峽在顧渚側二山相對石壁峭立大澗中流茶生其間尤為絶品張文規所謂明月峽中茶始生是也國史補唐時以宜興造數多命長興均貢限清明日到京謂之急程茶避暑錄話顧渚在長興縣所謂吉祥寺也其半為今劉侍郎希范家所有兩地所産歲止五六觔余求於劉氏過半觔則不復佳葢茶味精者在嫩取其初萌如雀舌者謂之槍梢敷而葉者謂之旗旗非所貴不得已取一槍一旗猶可過是則老茶譜袁州界橋其名甚著不若湖州之研膏紫筍有綠脚垂下故公淑賦云雲垂綠脚呉興掌故今茶品已定與唐不同大抵南産優而絶無用團者紫筍旗牙雀牙之品大著矣陸羽所謂常州即陽羡也與顧渚故同而湖茶必先顧渚云蔡寛夫詩話湖州紫筍入貢每歲以清明日貢到先薦宗廟後賜近臣其生顧渚在湖常之間以其萌茁紫而似筍故曰紫筍茶脞説湖州長興縣啄木嶺金沙泉每歲造茶之所泉處沙中居常無水湖常二郡太守至於境㑹亭具犧牲拜勅祭泉其夕水溢造御茶畢水即微減供堂者畢水已半之太守造畢即涸矣守咸還斾晚時則有風雷之變杜牧題茶山詩山實東吳秀茶稱瑞草魁剖符雖俗吏修貢亦仙才溪盡停蠻櫂旗張卓翠苔柳村穿窈窕松澗渡喧豗等級雲峯峻寛平洞府開拂天聞笑語特地見樓臺泉嫩黄金湧牙香紫璧裁拜章期沃日輕騎疾奔雷舞袖嵐侵潤歌聲谷答迴磬音蔵葉鳥雪艶照潭梅好是全家到兼為奉詔來樹隂香作帳花徑落成堆景物殘三月登臨愴一盃重遊難自尅俛首入塵埃王十朋謝章季子惠顧渚茶詩白齒新芽不出山青囊誰遣到人間午忩驚覺還鄉夢紗帽籠頭捧班自注季子以青囊紗盛二兩乃其顧渚零陵佩不出山絶品也􅔩茶茶疏長興之羅􅔩疑即古人顧渚紫筍也介於山中謂之􅔩羅氏隠焉故名羅姚伯道云明月之峽厥有佳茗是名上乗要之採之以時製之盡法無不佳者其韻致清逺滋味甘香清肺除煩足稱仙品此自一種也若在顧渚亦有佳者人但以水口茶名之全與􅔩别矣西呉枝乗湖人於茗不數顧渚而數羅􅔩然顧渚之佳者其風味已逺出龍井下􅔩稍清雋然葉粗而作草氣嘉靖長興縣志羅嶰在互通山西土地廟後産茶最佳呉人珍重之凡茶以初出雨前者佳惟羅嶰立夏開園梗粗葉厚微有蕭箬之氣還是夏前六七日如雀舌者最不易得然廟後山西向故稱佳總不如洞山南向獨受陽氣専稱仙品只數十畝而已凡茶産平地多受土氣故其質濁羅茗産高山巖石渾是風露清虗之氣故可尚烏程酒西呉里語秦有烏氏程氏各善造酒合其姓為烏程縣烏氏名巾程氏名林張景暘七命云酒則荆南烏程是也名酒記湖州酒碧瀾堂又霅溪箬酒元和郡縣志長城縣箬溪水釀酒最釅稱箬下酒呉錄長城箬下酒出箬溪南曰上箬北曰下箬村人取水以釀酒醇美勝雲陽呉興記下箬釀酒尤佳唐劉禹錫詩鸚鵡杯中箬下春白居易詩勞將箬下忘憂物寄與江城愛酒翁三白酒西呉枝乗今烏程釀亦寖薄邇來沈氏三白乃甲江南崇禎烏程縣志湖人好飲白酒暑月開尊熟或入竹葉或荷葉芳烈而清名碧香清又有茅柴酒以茅易燎而白酒易醒今造三白酒特勝謂白米白麴白水也百花春楊誠齋集有謝湖州太守王誠之送百花春詩呉术西呉里語孝豐天目山有仙丈峯産呉术名雞腿术藥品特佳龍膽本草綱目一名陵游以呉興者為勝根狀如牛膝其味甚苦紫苑太平寰宇記長興縣紫花澗芳蕪中出紫苑黄精西呉里語菁山産成化湖州府志菁山舊傳葛洪種黄精於此至今多黄菁松黃呉興掌故松之精有三用茯苓松脂與松黃也松黄酒服之輕身療病與脂苓之功相上下養老新書松蕋去赤皮取嫩白者蜜漬之畧燒令蜜透勿太熟極香脆王履吉謝劉司空自吕山寄松英藥餌詩坦林晝永團松葢弁壑春英長藥苗寄我逺從丹洞口報君惟有白雲謡石菖蒲山家清供呉興多石菖蒲可栽為盆玩呉興掌故山澗幽僻處多石菖蒲性幽不可近塵土及烟氣養老新書云夜檠間置一兩盆可以收烟不薰眼此非知蒲性者一經油烟則色暗無光久則浥爛塵土著亦能憔悴天暖常以清泉濯之無清泉則承黃梅雨水大缸置之幽處時時濯洗冬則置淨室三月下句方可移置庭除覆蔽日色然後茂美本草云久服輕身聰明不忘延年藥也茱萸崇禎烏程縣志土産者湖人用以作羮俗名榝火前胡名醫别錄各處皆有出呉興者為勝根似柴胡而柔軟本經上品有茈胡而無此晩來醫用之素伏翼萬厯湖州府志長興西山伏翼澗中多産伏翼有素翼赤腹十載倒掛者紫石英西呉里語烏程縣壟山産自然銅萬厯湖州府志藥之屬出安吉石鍾乳萬厯湖州府志出黄龍洞金剛纂嘉靖安吉州志出天目其樹長不滿三四尺多屈曲春夏亦無葉每觸其枝曳裾不前相傳剉其末漬水水必毒曰人瘴薤談薈孝豐彭祖墓有薤刀鐮犯之輒有暴風疾雨嘉靖安吉州志世傳是薤春不種而生秋不收而枯鴨𢎞治湖州府志水鄉人家蓄之者甚多野鴨崇禎烏程縣志鳬俗名野鴨冬月野鳬成羣而來動盈千萬聲如疾風報春鳥顧渚山茶記山中有鳥每至正月鳴云春起也至四月云春去也采茶者咸呼為報春鳥黄雀嘉靖浙江通志出德清形似雀而小惟冬春間有之萬歴湖州府志出德清十三都蘆渚冬月肥美可食謂之披綿豪豬𢎞治湖州府志俗呼野豬脊有長鬛三四寸利如錐今山間有之猴𢎞治湖州府志孝豐天目山多有之白魚魚經太湖出白魚梅後十有五日入時白魚最盛謂之時裏白西呉枝乗五月夏至前五日呉興太湖中白魚向湖側淺水菰蒲之上産子民得採之隋時貢於洛西呉里語白魚惟湖州有之蘇常郡則無也四五月間水漲其味尤佳葉氏避暑錄云太湖白魚冠天下即此也蘇人於此時以氷函之歸賣為佳品鯿魚崇禎烏程縣志湖魚之最佳者所謂小頭魚出太湖者鱗白出龍溪者鱗黑更肥美呉興掌故湖魚佳者莫過於魴土名鯿魚大風起湖中即網得之郭西大龍溪中得者最佳鮆魚太平寰宇記浮玉之山苕水出其隂中多鮆魚崇禎烏程縣志鱭一作鮆出太湖大者名刀鱭甚肥美小者亦可為鮓郭璞浮玉山鮆魚讚陽鑒動日土蛇致宵微哉鮆魚食則不驕物在所感其用無標鱖魚歸安縣志三月間肥美可食不減銀鯿鯽魚𢎞治湖州府志出湖蕩最肥冬月尤美銀魚魚經其形纎細明瑩如銀太湖之人多鱐以鬻焉長者不過三寸呉興掌故出安吉州梅溪之下其品上美崇禎烏程縣志銀魚在蜆蚌上寄生者甚小色白如銀東坡贈孫莘老詩今日駱駝橋又謂麫條魚泊試看修網出銀刀一名鱠殘魚傳呉王食鱠棄其餘水中又名王餘大者有尺許長名串子銀魚小魴魚呉興掌故春三月有一種小魴名鰟沽大者三寸烏鱧呉興掌故烏鱧極多湖人少食者葆光集載霅人漁者將箄籃捕魚往收之際見一鱧長數尺枕箄上將鐵义射之不中看箄内有小鱧漁者知其子也隠候之良久復至漁者悟而祝云若有變當放爾子魚乃吐黄氣一條上有一僧長數寸頃乃没漁者駭而放之湖人好傳其事故鮮食者鰻呉興掌故鰻乃寄生非胎卵物也烏鱧鬛上春深有細蟲即鰻也稍能游泳即脱去松江秋深鰻始盛謂之落鰻湖中止食春鰻鰻至秋凉始去湖入海異形魚西呉里語孝豐天目山上有兩池其泉甚美有異形之魚魚鮓王羲之呉興鮓帖今作北方脯二夾呉興鮓二器蒜條四千二百蔡寛夫詩話呉中作鮓多就溪池中蓮葉包為之味比缾缶中者尤佳張文規詩云食有呉興鮓白居易詩云就荷葉上包魚鮓是也鋪花鱸鱠西呉里語鱸鱠唐呉德昭善造時人嘲之曰繪若遇呉縷細花鋪若非遇呉費醋及萌江東呼蒜為葫蘇東坡云呉興庖人斫鱸鱠亦足一笑鄉土以此為盛饌製時鋪成花草鸞鳯或詩句詞章務臻其妙造虀亦甚得法謂之金虀玉鱠綠蛇談薈顧渚山頳石洞有綠蛇長三尺大𩔖小豬好棲樹杪視之若鞏帶無毒能飛蟹成化湖州府志蟹在九十月間甚肥美出曹溪者尤佳呉興掌故相傳太湖産紫鬚蟹自爛溪以東至分湖皆可得之昔人謂蟹腹有真稻芒霜降後入海輸與海神此大誕妄蟹子未成時曰黄黄中有細骨黃依以生非稻芒也入海則黄化為子而芒亦漸長至春深散子則芒亦輸出蟹腐矣好事者傅會大率如此不但蟹芒也蝦𢎞治湖州府志出太湖色白軟而味鮮蟶西呉里語德清長橋下蟶味特佳蠶呉興掌故湖人養蠶看火都聽命於天時而古法則以人力勝之古人立蠶室甚密藁簾重蔽之南風則閉南窗北風則閉北窗内設火阬五處蠶姑以單衣為寒煖之節單衣覺寒則添火覺熱則減火一室之内自地至屋無不暖之處故天時不能損其利也又飼蠶備葉荒有二法葉少時以白米粉摻於葉上餌之其絲更光白而紉又秋葉未落時採完好者曬乾為細末常置暖處蠶時遇雨葉濕則以乾末摻葉上均其水氣兼乾葉易飽難饑西呉枝乗呉興以四月為蠶月是月也有烏飛其聲曰著山看火湖民謂之蠶烏又有小蝦亦以蠶時出市民謂之蠶花蠶熟則絶無矣謹按蠶桑之法莫勤於湖民蠶月之際合村閉户婦女蓬垢曉夜不眠良可憫也惜湖民不善組織絲成多貿别郡是以資其利者薄焉田雞崇禎烏程縣志鼃𩔖不一色青而花者至秋肥美可食俗名稻花田雞又名水雞綾西呉里語唐湖州貢烏眼綾𢎞治湖州府志湖綾唐時充貢謂之呉綾今有二等散絲織者名為紕綾合線織者名為線綾其綾練染光彩異於他處惟郡城織之其外俱無紗崇禎烏程縣志呉興紡紗無花者曰真紗最白者曰銀條紗有花者曰葵紗軟紗縐紗又有夾織紗又有包頭紗惟雙林一方織之絹萬歴湖州府志有官絹有生絹惟局絹有五色可同嘉興紬萬歴湖州府志有水紬有紡絲紬出菱湖者佳苧布𢎞治湖州府志白編布即今白苧布又有麻布黃草布𢎞治湖州府志出璉市有極細者暑月可為衣今所出止可作帳不堪服苧太平寰宇記德清縣苧溪以貢苧為名絲西呉里語湖州蠶絲有頭蠶二蠶頭蠶為上細而白者謂之合羅稍粗者謂之串五又粗者謂之肥光合郡皆有而獨盛於歸安西呉枝乗其絲以三繭抽者謂合羅絲歲以充御服見聞雜記湖絲絶海内歸安為最次德清其次嘉之崇德桐鄉杭之仁和同功緜西呉枝乗以兩蠶共作繭者為同功緜値即倍常鵝脂緜舊浙江通志武康出香太平寰宇記長興縣藝香山昔西施種香之所筆西呉枝乗呉興毛穎之技甲天下元時馮應科者擅長至與子昻舜舉並名今世猶相沿尚之皆㕙毫也𢎞治湖州府志出歸安善璉村崇禎烏程縣志湖筆著名時製有蘭蕋為最勝葉石林云製筆之法桀者居前毳者居後强者為刀耎者為輔叅之以麻束之以管固以漆液澤以海藻濡墨而試直中繩勾中鈎方圓中規矩終日握而不敗故妙硯呉興掌故思陵翰墨志云宋虞龢論文房之用有呉興青石圓硯質滑而渟墨殊勝南方瓦石今苕霅問不聞有此石或無好事者發之毛扇嵇含羽扇賦序呉楚之士多執鶴翅以為扇今湖城人製鵝毛扇頗可却暑其柄即將羽管劈絲編織大抵皆用鵝羽其貴重者用鶴羽餙柄用瑪瑙檀香揀銅絲為釘鉸其價有至數金者鏡西呉枝乗鏡以呉興為良其水清冽能發光也最知名者薛氏崇禎烏程縣志湖之薛鏡馳名薛杭人而業於湖以磨鏡必用湖水郡舊有鏡坑工人鑄鏡得訣大小方圓照鑒若一靈壽杖孝豐縣志天目山仙丈峯産靈壽木可為杖銅錫明一統志武康安吉長興出銅安吉出錫桐油𢎞治湖州府志安吉山中多桐其子可榨為油卞山石雲林石譜湖州卞山在羣山最為􅒞崒奇巧羅布山間嵌空礧磈色𩔖靈璧而潤青尤勝葉少藴葢堂以就其景故號石林石上有李唐遊人題字自顔魯公而下悉署焉武康石宣和石譜湖州武康石出土中一青色一黃黑而斑其質頗燥不堅而渾然巉巖峯巒雖多透空渲眼亦不甚宛轉採人入穴石多臥生甚廣濶度奇巧處以鐵鏨榻取之或多細碎大抵石性扁側多刷道摺疊勢浙中假山藉此為山脚石座間有險怪尖鋭者即側立為峯巒頗勝青州穿眼宛轉渾然可觀春風堂隨筆武康石色黑而潤文如波浪人家園池疊假山以此為奇大至尋文者絶少桃花石呉興掌故安吉在唐武德中改名桃州皎然送安吉康丞詩云君吏桃州尚寄迹桃州採得桃花石則名州之義本以桃花石為當時所重又皎然有桃花石枕歌云卞山幽石産奇璞荆人至今采不著則桃花石又出卞山碑石呉興記白鶴山石堪為碑材江乗記云負丘山石精好不藉呉興礪石名勝志歸安縣仁王山隔水有一小山山石可以作礪紙帳嘉靖安吉州志荻浦多桑皮紙疊而為帳有若魚鱗正所謂梅花紙帳也然亦不甚佳麻屨舊浙江通志湖州出絧麻潔白如苧質少脆鄉人取以捆屨焙籠嘉靖安吉州志土人仿杭製為之用大竹則堅細則弱或織為花鳥形狀亦可觀蘆席崇禎烏程縣志蘆溪岸多有土人採之織為席丹礶萬歴湖州府志葛仙翁遺製出長興方山窑水碓嘉靖安吉州志惟孝豐以上有之中虚可容黍數斗不人而運或截竹置其中待水自舂搗爛如泥輒用竹簾撈起堆積蒸曝便可成紙今之黄紙白紙是也魚籠嘉靖安吉州志笑灘者土人取魚别名也黃梅雨溢魚自太湖逆上探其往來處破竹横溪中下置竹籠有倒絲水風相激則竹鳴魚疑其鳴者避之不知籠之不鳴者有機巧伏焉進不能出一笑而取故名又有網斗撈之者謂之魚媒鹿網嘉靖安吉州志鹿網出青松里者為上有生致之者虎箭嘉靖安吉州志出孝豐有無名藥草土人取草熬膏用以㸃鐵箭之首遇虎發之無不中者鉗鍋明一統志長興縣出礦灰明一統志長興縣出苕帚呉興記葦花蘭心曰苕呉興溪傍多生苕草可作帚俗呼為苕帚浙江通志卷一百二
