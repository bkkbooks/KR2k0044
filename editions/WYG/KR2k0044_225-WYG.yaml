在九溪十八澗南通徐村北達龍井七峯環遶雙澗合流境地幽勝視兩峯三竺又一竒矣呉越錢王建宋理宗時為祝國泰民安改名理安寺明𢎞治四年廢萬歴甲午佛石禪師重建王穉登訪理安方丈詩廢寺荒蕪已百年師今結屋更安禪林如支遁堪棲鶴社似廬山喜種蓮巖畔伐薪嘗易米石邊接竹每供泉詩成盡是雲霞色不數清江與皎然李流芳遊理安寺詩草深沙徑樵夫引苔厚石橋麋鹿行坐久忽聞松籟響此心已敵鏡池清虎窟禪棲二十年飯松煮石看雲眠人來聞道何須問領取泉聲竹色邊國朝康熙五十三年聖祖仁皇帝發帑重建賜理安寺額又御書石磬正音四字并對聨二副賜佛像大鐘供器等皆内府製造雍正五年十一月住持僧實慧奉御書慈悲自在扁額恭懸藏經樓又賜曹溪人瑞四字御製對聨二副奉懸方丈雍正十一年奉㫖重修永興寺西溪梵隱志在西溪市杪安樂山下唐貞觀間悟明尊者開山宋鐵牛印禪師重葺後燬明斷臂道者増建小庵旋廢萬歴初馮太史夢禎延僧真麟新之手植緑蕚梅二本題其堂曰二雪上有樓可逺眺報先寺咸淳臨安志在西溪宋建隆二年呉越王建治平二年改報先明覺院西溪梵隱志嵗久傾圯明萬歴間里人萬某等重募建佛殿併像飾龍華寺萬厯錢塘縣志在柵外一啚西湖遊覽志舊名龍華寶乗院呉越王以端萼園建鐵圍山叢談錢塘龍華寺有傅大士真身及藏敲門槌誦金剛經拍板與藕絲燈三物昔錢王從婺女雙林取來藕絲燈乃梁武帝時物也政和後索入禁内謹案元世祖本紀至元二十二年僧格言錢塘有龍華寺宋毁之以為南郊勝地宜復為寺復勅毁郊天臺建寺焉攷舊志皆失載今補入天龍禪寺天龍寺志在慈雲嶺之南宋郊臺之右唐天龍和尚開山宋乾徳三年呉越王錢氏拓新宋大中祥符九年改名感業建炎中燬巋然出於火者木觀音像也特著靈異紹興十三年既置圜丘以淨名為齋宫以感業居從官由此僧徒漸散而寺亦圯元延祐間僧善平精勤恢復泰定三年遷寺舊址之南百步許明洪武初僧行滿重興天真禪寺十國春秋舊名登雲臺亦名拜郊臺西湖遊覽志梁龍徳間呉越王建武林梵志明成化年毒峯善禪師重建開化寺錢塘縣志在月輪山即六和塔院東坡詩注宋開寶三年建太平興國五年改開化寺六和塔霏雪録在龍山月輪峯武林梵志宋開寶三年智覺禪師建以鎮江潮高九級五十餘丈撐空突兀跨陸俯川宣和中燬紹興二十二年僧智曇重建七級而止塔中有湯思退等彚寫佛說四十二章經李伯時石刻觀音像嘉靖三年燬萬厯間袾宏重修張翥登六和塔詩江上浮圖快一登望中煙火是西興日生滄海横流外人立青㝠最上層潮落逺沙羣下雁樹欹髙壁獨巢鷹百年等是繁華盡怕聽興亡懶問僧國朝雍正十三年八月三十日奉㫖令織造隆昇動支内庫銀兩重建七層并重修開化寺雲栖寺武林梵志在梵村天柱寺旁禪師袾宏伐茅建菴於此為逺近宗仰後掘地有碑即古雲棲寺也釋袾宏雲棲寺記溯江西上行二十里山名五雲先是山巔有五色雲盤旋其上因以名山而五雲飛集山西塢中經久不散時人異之號為雲棲塢宋乾徳五年有僧結庵以居塢多虎僧至虎輒馴服世稱伏虎禪師者也吴越王錢氏為之建寺而雲棲於是創始禪師一號大扇和尚今曰雲棲者復古也雲棲居五雲之西徑曲林幽四山圍合荒僻寥落人跡罕至隆慶五年宏行脚南還愛其岑寂孤行隻鉢趺坐圯壁間環村四十里嵗傷於虎者不下二十人宏設瑜伽施津濟之自是虎不傷人嵗旱禱於山而兩霔村民大悦相與鼎新寺之遺址百日而成蘭若外無崇門中無大殷惟禪堂處僧法堂以奉經律而已宏因與二三同志砥礪力行古道盟而後進犯則必退大都主之以淨土而冬專坐禪餘兼謀論日有程月有稽嵗有表凜凛乎使無賴者不得㕘乎其間雖於法門無大禆益庶幾飭未學之弊以俟後之知識云爾國朝康熙二十八年聖祖仁皇帝南巡幸寺御製五言詩一首恭紀首卷三十八年聖駕再幸御書雲栖二字扁額又賜松雲間三字建亭崇奉四十二年再幸御製七言詩一首恭紀首卷四十四年四十六年又兩次巡幸寺有大竹一竿賜名皇竹隨建皇竹亭雍正七年錢塘縣知縣李惺恭修御書亭接待寺咸淳臨安志在湖墅左家橋西宋大觀間喻彌陀開山錢塘縣志即舊妙行寺彌陀飯僧至三萬衆故名接待院當時郡移為妙行院元季燬明宣徳二年重建寺内有雙井號志書泉成化時修郡志開局寺中夏時正云余修志於此而與泉名適合然其名志書之由已無攷矣崇禎九年雪關智誾復鼎新焉施樞宿接待寺詩梵境忽巍峩門前對市河有心𢎞誓願於此接經過郭近人聲雜簷髙雨氣多規模踰百載猶説喻彌陀聶大年遊妙行寺詩妙行禪寺夾城隈穀雨乾時偶獨來一榻白雲松子落滿園黄蝶菜花開聞看物態隂晴變老被鐘聲旦暮催客有可人期不至步隨斜日下蒼苔國朝康熙二十六年僧性統重新寺殿四十二年聖祖仁皇帝南巡御書聖因二字復賜御書心經一部心經塔一軸普明寺普明寺志在西馬塍寺基乃鄭和王夫人所捨也唐太宗時創建名普曜院太尉張承士更建改普明寺後廢宋紹興庚戍僧正岑復建庵曰普明其徒徳謙徳茂冶鐵為佛嘉定十三年請復廢寺之額賜庵為院元末僧若山重葺明天順間賜額萬歴辛巳火壬子僧朗鑑重建國朝順治六年洞宗石照開法遐邇嚮風成一大叢席焉真寂寺武林梵志在八都下九啚宋寶慶間建明萬歴甲寅僧廣印移建瓶窑明真宫咸淳臨安志舊在九里松嘉定中建寧宗御書明真二字萬厯杭州府志今移建錢塘倉北神霄雷院萬厯錢塘縣志在上扇二啚西湖遊覽志宋咸淳間羽士陳崇真者自閩來卜居於此善雷法因勅建雷院以居之賜號沖素真人六月二十四日郡人雲集設醮捨貲至今不廢浙江通志卷二百二十六
