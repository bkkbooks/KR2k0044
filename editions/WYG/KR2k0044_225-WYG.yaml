body:
  text: 浙江通志卷二百二十六寺觀一攷前代五山十刹隷浙者過半而洞霄金庭之屬久標靈蹟琳宮梵宇稱極盛焉我朝賜額捐金屢有興建盖上以祝鴻祚下以祐民生也苐漢晉以來千有餘載二氏之居不可殫述謹擇其最著者詳於篇志寺觀杭州府錢塘仁和二縣附郭積善海會寺咸淳臨安志在吳山吳越王錢氏建舊名石佛宋大中祥符中改賜今額嘉泰間燬武林梵志元至正間重建平章庫庫子山書大海會寺額御史大夫强通書觀音寶殿額錢塘縣志明成化十年燬踰年僧浩中重建國朝康熈三十七年住持皈一復募新之寺踞吳山東南岡號稱勝地每逢水旱必迎上天竺寺觀音大士於此祈禱雨𤾉無不立應雍正九年總督臣李衛飭屬重修十三年御書寶月清光四字額賜懸正殿定水寺西湖遊覽志宋乾道八年建於萬松嶺嘉定八年移清波門外元至元十三年築城徙建七寶山雲居聖水寺錢塘縣志在雲居山西湖遊覽志雲居庵者宋元祐間僧了元建聖水寺者元元貞間僧明本建明洪武二十四年併聖水於雲居賜額曰雲居聖水寺太平清話雲居寺有中峯竹爐麻鞋鞋長尺四五許及半身相成化間僧文紳修張翥秋日遊聖水寺詩髙處見滄溟西風吹酒醒潮來一片白山擁萬重青草木如浮動煙塵忽杳㝠登臨不可極吟思滿秋汀國朝康熙五十三年僧維新及其徒西銘重修百法寺明一統志在呉山下武林梵志宋建炎初僧寶寧建有大佛半身依山鑿石為之淳熙十四年賜額廣潤元時改額百法趙子昻書元末燬明天順元年僧道沖重建開寶仁王寺咸淳臨安志在七寶山宋僧慧照紹興五年奏建紹熙二年始賜勅額嘉泰甲子紹定辛卯一再燬僧祖仁重建景定五年又燬尋復建周文璞歸憇仁王寺詩重到招提未覺遲缽單初副祫衣時僧房齋院門門閉杏子枇杷樹樹垂蟻䕃經幡求托化龍纒佛座學慈悲長年無事間來此坐對空山賦小詩勅賜永夀寺在東園舊名永夀菴為南海普濟寺下院國朝康熙四十三年聖祖仁皇帝賜額永夀寺僊林慈恩普濟教寺武林梵志在安國坊今羲同坊僊林橋西宋紹興三十二年洪濟大師智卿建嘉靖仁和縣志隨築戒壇具奏請額勅賜僊林孝宗踐阼扁賜隆興萬善戒壇理宗改今額淳祐三年賜飛天法輪寶藏額併御書鐘銘元至正癸未延燎復建王禕僊林寺戒壇記杭州僊林大慈恩普濟教寺有萬善戒壇普為四衆傳授三聚淨戒之所也至正三年寺厄於火壇亦就燬就公來領寺事以興廢起墜為已任之始克裒衆施建大佛殿繼又建三門兩廡及選佛選僧二堂惟戒壇未及興建為費最鉅郡人顧君天祐父子者嘗與就公論道而有契焉慨然樂為之造乃損金榖購木石卜吉而庀工始於十一年正月日至明年十月而訖工竊惟就公務隆祖道載楊宗風圓機應人能無留礙而顧君宿植徳本雅慕真乗於世有為一無吝惜宜乎兹壇之建以壊為成有所不難也張氏以寺為軍器局明洪武四年重建立僧綱司仁和縣志天啓間燬頴生宣法師及里人王兆京等捐資募建國朝雍正十一年重修大殿天王殿天長淨心寺成化杭州府志在仁和北壁後洋街今竹竿巷咸淳臨安志晉天福四年錢氏建舊名天長宋大中祥符元年改賜今額武林梵志南渡後析其地為軍寨咸淳元年興復元季燬明景泰間重建國朝順治癸巳顧大觀等重修大雄寶殿庚子陳爾琳姚元瑛建彌陀殿白衣觀音殿康熙五年兵備道熊光裕建賜予觀音天醫真君殿大中祥符律寺嘉靖仁和縣志在祥符橋祥符寺紀略梁大同二年鮑侃捨宅名𤼵心院唐貞觀中易名衆善神龍元年改中興三年復改龍興武林梵志宋南渡初斥為軍器所元初仍建寺至正末燬明洪武間重建蘇軾祥符寺上元觀燈詩紗籠擎燭迎門入銀葉燒香見客邀金鼎轉丹光吐夜玉珠穿蟻閙連朝波翻焰裏元相激魚舞湯中不畏焦明日酒醒空想像清吟半逐夢魂飄國朝康熙間里人于國樑損貲同僧得中復建潮鳴寺兩湖麈談在郡城東北寺三面皆水水之外皆菜畦而寺獨踞其中成化杭州府志梁貞明元年錢氏建名歸徳院宋髙宗南渡駕幸寺夜聞潮聲遂賜額潮鳴有御書詩刻石立於寺東廡宋髙宗御書詩野寺參差落漲痕疎林欹倒舊霜根扁舟一棹向何處家在江南黄葉村兵燹後重建明洪武二十四年立為叢林謹按此詩載東坡集中舊志作髙宗御製者誤廣夀慧雲禪寺咸淳臨安志在艮山門内白洋池宋張循王之孫鎡捨宅為寺紹熙元年賜今額成化杭州府志俗呼為張家寺有留雲亭白蓮池武林梵志元至正間燬明洪武十七年僧文副重建永樂九年永忠宣徳間廣睿𢎞治元年福海相繼重建白蓮寺仁和縣志在平安坊僊林橋武林梵志石晉開運元年吳越王建名華藏院宋治平間改妙恵院咸淳臨安志白蓮慈雲院嘉泰中重建咸淳間僧祖顯誦經持戒地産白蓮因賜白蓮妙惠寺額陸游慈雲院東􅆤小憇詩乳横閣院東偏脩然拂榻眠香濃煙穗直茶嫩花圓巖倚團團桂筒分細細泉憑誰為題版榜作小壺天國朝康熙十四年燬僧瑞光朗超相繼募建大殿未就僧逸林於五十年間重構落成長明寺萬厯杭州府志在章家橋東宋開寶初錢忠懿王建名法燈治平初改今額元庚子年燬明洪武十八年重建武林梵志𢎞治十五年僧如塤建萬厯庚戌葺治一新興福寺成化杭州府志在仁和縣同徳坊今羲同坊斜橋宋紹興初左丞薛昻以花藥圃施僧築菴曰擇勝續剏寺宇請龍山已廢興福院額今為叢林仁和縣志寺内大雄殿名無塵殿明末天王殿延燎無塵獨存國朝順治間僧玉涵重建天王殿七寶寺咸淳臨安志在鹽橋東梁貞明七年錢氏建舊名上方多福宋大中祥符初改賜今額寺有六游堂臨輝閣靈芝崇福律寺武林梵志在東花園崇新巷俗稱蠟燭菴唐貞觀己酉年郡人施光慶捨宅建名實際院宋佛印禪師重興元季燬元統間僧妙通重建明洪武二十四年立為叢林萬厯壬寅僧如堯重修劉基宿蠟燭庵俊上人房詩城外春江動客愁江邉細草綠悠悠還將短髪臨岐路畏向東風憶舊遊斜日逺天歸雁急薄雲孤館落花稠青燈不放還家夢一夜腸回一萬周慧林寺杭州府志在蒲場巷宋紹興初汴僧惠林禪師隨駕來杭建興國院後改今名元至正間燬明洪武初重建國朝康熙間僧然亮重修報國院仁和縣志在東里坊慶春門内咸淳臨安志舊為香林廨院宋紹定間移請今額淳祐五年重建杭州府志明天啓初燬國朝順治間重新石雨禪師說戒於此蓮居菴武林梵志在土橋東古延夀菴址燬於兵明萬厯六年里人虞淳熙建懴室而加拓之吳從先改額為蓮居佛惠寺成化杭州府志俗呼夀火星庵在仁和縣羲和坊元大徳間建名佛惠後燬明景泰間重建悟空寺武林梵志在淳祐橋東晉天福七年僧齊教建名崇新院宋大中祥符改額淳祐六年法昌重修元末燬明永樂元年徳兼重建相國寺萬厯錢塘縣志在淳祐橋東北武林梵志南齊建唐時燬為鄭景宅園唐景雲初僧慧購為寺唐睿宗由相王即位賜名相國元末燬明洪武初僧大雲重建置僧綱司於内正徳八年僧東明重修覺苑寺嘉靖仁和縣志在豐樂橋東宋嘗徙三聖廟於此改賜額曰旌忠廟武林梵志寺久廢明宣徳中重建崇寧萬夀教寺明一統志在府城南二里武林梵志俗呼姚園寺在髙陽閭巷宋初為姚氏花園紹興初僧慈昌購園結菴乾道初賜額淳祐二年建膺福殿以奉理宗御容元季燬明洪武初僧大雲重建國朝雍正十二年重修慈雲寺慈雲寺志在羊市巷東花園側唐相國李長源興元元年開井建寺題名甘露周顯徳二年僧圓覺建名慈濟宋大中祥符二年公主清裕修光明懴感白鸚翔雲異瑞真宗賜額慈雲武林梵志明洪武二十四年立為叢林沙門延禮重修嘉靖二十年燬僧圓鼎重建吳用先遊慈雲寺詩水綠山青列上方苔深竹暗野花香赤松亭下消餘暑惟有甘泉徹骨凉四圍秋色靄慈門百雉城頭遶白雲莫說蕭然無法侶幽禽危石共為羣金剛廣福教寺錢塘縣志在板兒巷武林梵志後唐天成間善果法師肩負金剛憇息於此夜放光明陳少師感異捨地為寺初名功徳院宋寶祐間理宗賜今額元至正末燬明洪武十八年重建萬厯辛亥僧常秀重修慈光寺武林梵志俗稱鐵佛寺在錢塘芝松坊佑聖橋西晉開運初晤恩禪師建宋寶慶三年名張府功徳庵元至正燬明正統間重建萬厯壬子撤圮殿新之吳用先重建慈光寺碑記武林慈光寺有彌勒尊佛以鐵鑄之俗稱鐵佛寺晉天福間晤恩禪師卓錫於此開運初御書慈光普照四字顔其門法席之盛甲於通都宋寶慶三年清河郡王張魏公復捨基拓而充之元至正燬明正統立中成師重建寺有合抱銀杏五株及放光古井皆宋物井甚甘冽大旱不涸咸稱為慈光甘露泉云殿後漸圯寺僧慧皥矢志鼎新萬厯甲辰鳩工壬子落成其間助成者僧智能䕶法宰官則中丞金學曾太守凌登名孝㢘吳之鯨等贊襄則王介朱佐沈坤戴倫張永年而與會有俞普才者助義田供常住為大殿四時香燈之費噫一念堅持衆緣俱到信非誣矣因書殿額為標而錫之以記真教寺萬厯錢塘縣志在西文錦坊南杭州府志元延祐間回回阿喇卜丹所建内有明永樂勅諭碑景泰中復葺國朝順治三年總兵蘇見樂衢州府知府韓養淳重修慧安寺杭州府志在十三灣巷吳越王建於草橋門外明洪武初移於保安坊東永樂間又移今所開元寺嘉靖浙江通志在府治南清平山麓武林梵志唐𤣥宗時建宋建炎間徙建於西湖元季兵燹復徙故址徐凝開元寺牡丹詩此花南土知難種慙愧僧閒用意栽海燕解憐頻睥睨胡蜂未識暫徘徊虚生芍藥徒勞妬羞殺玫瑰不敢開惟有素苞紅萼在含芳只待舍人來寶奎寺兩湖麈談在吳山下宋丞相喬行簡故第萬厯錢塘縣志内有寶月樓見滄巖洪鐘寶奎寺記錢塘七寶山在吳山之右宋理宗朝丞相喬行簡宅於山麓寶慶丙寅駕幸其地登山東顧江海溟渤御書見滄二字以紀勝并刻崖石迄今見存行簡罷相捨宅為寺寺獲宸翰因題曰寶奎武林梵志元季燬明𢎞治間重建成化時寺跡瓜分僧道澤重建國朝雍正七年因大殿久圮里人汪兆璿潘兆新同僧志仁募建宗陽宮成化杭州府志在新宮橋東宗陽宮志即宋髙宗之徳夀宮也淳熙中更名重華咸淳間改為道院賜今額萬厯杭州府志元初燬於兵延祐間杜南谷真人重建至正末燬明宣徳間重建宗陽宮志宮内有飛來峰登瀛橋太液泉玉蘭居子昻碑及宋賜青銅古鐘白玉笙鐵笛水晶扇辟塵爐等物古蹟有通明殿玉籟閣蘂簡樓道徳講堂長生殿老君臺卧雲樓得月軒壺𨼆橘隱諸勝杭州府志成化間道士沈復純重建楊載老君臺玩月分韻詩老君臺上涼如水坐看氷輪轉二更大地山河微有影九天風露寂無聲蛟龍並出承金榜鸞鳯雙飛載玉笙不信弱流三萬里此身今夕到蓬瀛張昱和楊仲𢎞詩當時諸老宗陽會月與浮雲幾度更丁令豈知為䳽事道人猶作賣花聲天􅄎露色開蟾鏡秋送商音入鳯笙誰道紫薇垣内客今宵又復到蓬瀛國朝康熙間燬住持徐尚麟復剏雍正八年總督臣李衛倡率募修開元宫咸淳臨安志在泰和坊内宋寧宗潛邸嘉靖仁和縣志嘉泰元年詔改為開元宫在秘書省元為中書省至元二十八年省與宫並燬因兼宫地作省時董得時主宫事購故宋理宗端孝公主第為宫正清湖橋西虞集開元宫碑杭故有開元宮唐開元中刺史陸彦恭用詔書所作乾符戊戍毁於火後五十九年吳越文穆王復其舊其臣林鼎記之宋景徳丁未勅改景徳觀後十六年有以私財修之者進士陳戭記之然俱不復存嘉泰甲子寜宗以