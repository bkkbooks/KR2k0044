竹裏仙路入花間斜日明秋水薄烟凝暮山偶探勾漏跡惆悵欲忘還嚴先生祠明徐渭碧水映何深高蹤那可尋不知天子貴自識故人心山靄消春雪江風灑暮林如聞流水引誰聴伯牙琴聚法師將往天台止其徒玉公菴中余為留信宿明徐渭欲向天台去先為剡水尋秋行萬山出夜宿一菴深燕語調花氣猿啼帶講心年年石梁興送爾益沉吟人日峴山遣興明李應徴人日人為客春風春可憐烟波浮宅逺邱壑寄情偏柏葉烏程酒椒盤下若鯿如從習池飲醉卧峴山邊送義公結廬天台明徐桂海上棲禪境披雲訪石橋一瓶依澗壑疎磬落山椒華頂經年雪松門半夜潮預愁支遁去誰與共逍遥由桐廬經釣臺下作明朱國祚藥草仙人錄星文釣客槎祠開髙下屋江溜淺深沙綠樹綿蠻鳥丹崕躑躅花誰歌竹如意懷古一長嗟湖上明朱國祚峰頭寶叔塔湖上水仙王芳草年年綠風荷㟁㟁香靸鞋拚細雨對酒易斜陽不計重門逺𤓰皮上小航西湖春遊詞明吴兆堤暖百花齊湖春萬柳低管絃初沸日羅綺已空閨上已連寒食車輪間馬啼遊人争向處多在斷橋西橋外倚當罏樓隂碧樹扶水筵移㟁酌越女唱吴歈一徑穿孤嶼重光帶兩湖匝波舟楫動處處起鷗鳬晴光上栁條結伴戲花朝歌近舟沿㟁人閒馬度橋雷峰看塔迥葛􅊐弄泉遥日暮争門入衣香滿路飄遊路背湖分林陬復水濆年傳秦代石人拜宋時墳塔影雙峰見松聲九里聞不知天竺近香氣靄成雲苕溪明王心一細雨苕溪曲㣲風泛小航有園多種竹無屋不圍桑語覺吴儂近流分震澤長烏巾春店近白酒熟盈觴東湖雜詩明陳熙昌乍浦瀛壖曲遥連蘆瀝場迎船桑葉白繫纜菜花黄塔影開初地鐘聲落上方孤城非鐵甕先事慎隄防送齊越石守紹興明姚希孟萬壑争流處溪山属剡東扁舟仍雪夜五馬自春風官舍朝嵐滿人烟夕照同蓬萊譲仙吏安坐翠㣲中泛西湖同清照彦叔觀公明吴鼎芳新語報黄鸝捎花坐栁枝山晴意自好湖晚醉相宜風起水香處月來烟滅時同舟貪夜寂移傍白公堤和靖祠前晚坐明吴鼎芳山翠出林杪祠前芳杜洲孤烟生後暝雙鳥去邉秋燈影參差水歌聲逺近舟梅花無復主曽有暗香浮釣臺懷古明鄭士竒擇地逃新室披裘對故人星原占是客帝豈得而臣瀨急迴潮信壇髙費釣緍不知梅福女偕隠幾冬春春曉歸雲菴留題明馮夢禎細草迷巖路平田帶寺門春風遊客少宿鳥見人喧山翠當虚坐花紅落小軒清幽愜所好况對道林言嚴陵城下明江禹奠背郭千村合中流一刹孤輕隂閣秋雨殘照落平蕪入市魚蝦少歸舟雁鶩呼客囊任羞澁解珮問當罏會稽道中少憩明屠本畯鳥道紆迴入千巖綠樹低轉留空翠處少憩石橋西别澗潺湲㵼叢林桑扈啼坐看鳬與鹿引子過前溪錢清夜行明沈瑞徴秋漲乗流好孤村夜泊稀漁榔過橋逺螢火傍舟㣲堤沒聞争渡凉生欲授衣夢歸懐土切山水願多違過桐江明董份薄暮棹歌聲看山不計程江晴船作市地僻縣無城蜃氣連虹暗龍腥雜霧生釣臺猶可望緩楫未須行山隂晚泊明李埈落日山隂道孤舟帶逺汀秋林紅葉重夕浦黑風腥客夢碪前斷漁歌鏡裏聴來朝餘興在何處訪蘭亭嚴州道中明陶汝鼎曲江流不盡寒氣凛初嚴野泊紛漁艇遥帆𩔖酒帘枯河冬雨活濕壁凍雲黏不分多歸思蕭蕭與夢添送友人遊天台明謝夢蓮細雨蘼蕪綠扁舟渡若邪春流飛竹箭暮靄隔桃花佞佛何妨酒遊仙莫問家倘憐人外癖分我赤城霞建徳道中明黄端伯青天霜氣迥匹馬立平沙逺道風千里寒城月萬家亂山盤徑險深樹引隄斜夙昔悲秋意偏於作客賖十六夜湖上望月明魏璧今夜西湖月仍同十五圎徘徊臨碧海依舊上青天何處歌鐘起誰家珠箔懸玲瓏相望裏清嘯不成眠嘉興道中明袁宏道彌野桑成市排溪栁作衙菜香齊吐甲樹煖欲蒸花天色淡如卵江容滑似紗酒帘青帶上三五聚村家靈隠路上明袁宏道柳縷時常罥花谿不斷飛因尋澗底水忽過樹旁扉面熟逢僧問心閒數客歸沿流多石趾儘可作漁磯天真書院陽明講學處明袁宏道百尺頽墻在三千舊事聞野花粘壁粉山鳥煽罏煴江亦學之字田猶畫卦文兒孫空滿眼誰與薦荒芹西陵初晴明陳子龍積雨閒愁滿新晴野望開潮平海門樹春到越王臺江栁含烟細林花入照催物華欣有托盡日此徘徊吴興明陳子龍藹藹吴興郡輝輝震澤隂山川紛斷續浦溆淡浮沉稉稲春田足芙蓉秋嶼深南樓重懷古暇日此登臨捲幔雙溪下清虚出畫圗人烟吹雁鶩城郭入菰蒲暮靄平千嶂秋風落五湖羅衣汀草外何處採明珠飛燕晝初長陌頭行採桑春風一垂手日暮尚擕筐宻繭温如玉新綿白似霜何勞使君問無暇織流黄雨暮過汀洲江深菡蓞秋碧雲天際合青嶂鏡中收菰米侵唇冷菱絲入腕柔更聞西塞下漁唱落輕舟國朝過南屏訪無生上人吴偉業謂此一公住偶來聞午鐘山容參雪嶠佛火隠雷峰路細因留竹雲深好䕶松精廬人不到相對話南宗嵗暮送穆苑先往桐廬二首吴偉業客中經過嵗又上富春船燭影欹寒枕江聲聴夜眠石髙孤㟁迥雪重半帆偏明日停橈處山城落木天知爾貪乗興衝寒蠟屐忙鶴翻松磴雪猿守栗林霜官醖移山榼仙棊響石房嚴光如可作故態客星狂天台黄周星勝蹟天台路移情入杳冥亂泉秋後寺絶壁古時亭槲葉㟁多濕蓮花峰更青白雲吾語汝且向石梁停望天台韓畕望裏天台近羣峰秀幾重回看青嶂斷忽有白雲封絶壁垂橋徑春泥䧟虎蹤石橋今夜月應為照長松釣臺周茂源釣臺髙百尺縹緲客星寒天子平生意幽人物外看千秋違漢臘七里尚嚴灘解識滄洲趣羊裘入夢難雨中泝富春江周茂源烟雨片帆開凌空望釣臺龍湫穿石下鳥道拂雲迴終古滄江色千山木落哀同行驚旅鬢吟眺獨徘徊禾中作王士祿江城還擕李望古一踟蹰老寺裴休宅春沙范蠡湖逺烟明渚鳥斜日冷檣烏太息東流水年年漫綠蕪送同年蔣大參之武林王士禎持節錢塘去金焦二月時江山南渡蹟風物表忠碑河漕勞輸輓朝廷仰度支到逢寒食後槐火試雙旗蔣脩撰述天台之逰王士禎太史三茅隠朱顔薄世榮言尋沃洲路遥向赤霞城語識寒山妙詩同太白清石梁横地底今夜夢經行送劉宰之建徳王士禎送者自崖返君真建徳遊桐廬􅇰蕭瑟水木况清秋橘柚紛千樹漁商聚一洲新安江見厎應見古羊裘送吴園次湖州太守王士禎六代吴興守常須第一流君才如栁惲吟向白蘋洲官閣臨苕霅人烟雜鷺鷗誰言露冕客仍是五湖遊送陳興公歸武康王士禎清絶苕南路歸㠶望已遐寒林孟郊井古屋沈戎家天目羣峰合前溪一水斜烟霞成獨往不羡曲江花送許竹隠之紹興二首王士禎一櫂西陵去名山入剡中放衙臨鑑水行部逐樵風江渚鳶烏集蘇臺麋鹿空沼吴兼覇越懷古意無窮蟬聲集深樹驛路徧槐花黄鵠逝千里浮雲天一涯鶯啼范蠡宅草長謝敷家迢遞相思處春風滿若耶苧蘿山曽畹出郭尋芳草湖田近水濵居然浣紗石曾共沼吴人苔上蛾眉月溪流舞袖春至今山下路猶帶綺羅塵嚴陵山張英千嶂桐廬道清風幾溯洄不知天子貴猶是故人來垂釣本無意披裘亦浪猜翻嫌煩好事髙築子陵臺遊憩南屏寺余懷小雨催孤櫂湖南别有天幾家臨水住一墖倚山懸聲出花邊磬香流樹杪泉絺衣渾欲冷高屐破雲烟常山道中梁佩蘭山氣鴻濛似雲光草樹開逐羣樵斧去報曉寺鐘來鹿跡留乾葉霜痕漬古苔此間宜一憩登眺有髙臺富陽縣梁佩蘭百里錢塘路清江入富陽人家還水曲山勢壓城牆客思天同逺秋來柳漸黄望中風物滿楓葉更含霜桐廬縣梁佩蘭樹色重重隠桐廬入望勞逺山帆影曲争石水聲髙沙嶼排漁籪田溝轉桔槹一羣鷗鷺立瀟灑刷霜毛蕭山道中潘耒溪小恰容舟舟平可潄流近人山色淡侵夜櫓聲柔㟁㟁花欹屋村村樹拂樓都忘行驛路只作輞川遊登吴山過紫陽洞二首宋犖名山今入手長嘯向孱顔城闕烟中出江湖杖底環亭開瞻睿藻路轉得禪闗吴越當年恨消沉磬響間峯亦飛來號耽幽訪洞宫崎嶔藏結構曲折入冥䝉遺像閒雲外疎花斷檻中林鵶催客去馬首月如弓湖舫觀荷驟雨復登孤山尋和靖放鶴處曹爾堪暑退風偏急波回晚漸凉萬花荷影落三韭菜根香龍雨疑游戲鶯簧自短長提壺期再泛綠蟻滿菰蔣過烟霞嶺張競光脩嶺髙無極登臨望漸賖山頭榮桂樹洞口飯胡麻短笛驚飛雁長歌動落鴉淹留君莫問素志托烟霞壑菴訪姚望侯大尹陸世楷别業南山下清隂一徑濃危橋斜渡澗曲磴冷穿松小閣凭虛壁幽亭面逺峰香臺原咫尺坐聴晚堂鐘蘭蕩杜肇勲一艇烟波外川原歴亂過僧歸山寺晚蟬噪夕陽多積水浮城郭薰風拂芰荷滄浪吾有曲擊節為君歌蕺山看梅杜肇勲不淺尋梅興因之冒雪過暗香浮玉樹寒色凍銀河嵗月盤根久風霜吐氣多山靈好呵䕶留勝訪巖阿禹陵杜肇勲振壑松濤滿鳴春谷鳥同山光青抱日林氣綠含風金簡苔痕沒雕梁梅影空夕陽幽照裏樵背杜鵑紅半月泉用蘇公起句嚴我斯偶泛雙溪棹來遊半月泉野橋斜有路秋壑浄無烟客到聴松處僧閒落照邉此中忘世味一坐一冷然重陽菴嚴我斯勝地吴山下招提近可尋虛堂鳴夕磬髙樹坐寒禽瓢笠忘身世鶯花自古今倚闌頻眺望愁絶大江隂中秋日同稼書姪謁宣公祠於奉賢鄉宗人㑹宴即事陸葇爼豆斯文在宗支百世同蒼虬元代樹鶴髮古稀翁竹外香秔綠霜前帶草紅良宵嘉宴永既醉月華中㑹稽道中陸葇未識山隂道東偏出㑹稽山山巒㠋秀㟁㟁水田低畫艇烏篷小長堤石板齊誰家遊冶子盡指若耶西蕭山道中朱彝尊古樹參差暗春禽旦暮鳴東西開水市髙下築山城翠竹千家静清江二月平昔賢栖隠地巖壑有同情上已後三日顧孝㢘之珽招同諸公泛舟西湖即事分韻朱彝尊獨櫂花隂入重湖栁色交斷橋亭葢瓦曲院水通坳楚雀黄猶澁江蓮葉尚包宸遊留翠墨車馬隘春郊若耶溪毛竒齡春水綠紋斜行行度若耶樓頭吹柳絮溪口種荷花翠袖方扶槳明粧出浣紗是誰騎馬去招我過東家題雲門道五松亭毛奇齡偃亞沓柯濃空亭倚衆松山雲飛冉冉溪雨過重重紅羽巢孤鵲青天拔五龍欄杆秦望起無復大夫封蕺山戒珠寺毛奇齡古殿倚嵯峨春風似永和龍歸華藏逺僧把戒珠多舊巷看巢燕清池想浴鵞前王曽採蕺霸業近如何登春江第一樓方士穎憑髙無剰覽獨擅一江名隔樹空支塔臨崖曲抱城潮生吴水濶雨過越山平孰嗣南樓客吟秋嘯月明舟上七里灘方士穎落日憑風駛輕舟逐浪迴㟁移村互出帆轉岫争開亂草參軍墓寒松隠客臺名泉須品試記此碧灘隈嚴州查慎行過城灘更急直下滙分流樹色銜雙塔山形豁一州炭烟濃傍塢樵徑細通舟風日晴􅀹好初冬似晚秋送梅雪坪出宰泰順查慎行行作折腰翁吟邉憶謝公擕家千里近得邑萬山中椒荈通閩賈魚鹽走海童流傳永嘉學亟望起儒風石梁觀瀑朱倫瀚片石憑虚架飛泉落半空穿雲垂匹練奔壑下長虹響疾疑兼雨聲狂忽舞風却愁深夜裏雷電走蛟宫早發新昌朱倫瀚古邑寒烟外輕裝向晚征山圍四面郭水遶半邊城村静啼雞晏秋深落月明穿林緣石磴嵐霧拂衣清西溪雜興釋山曉野風吹厯厯兀坐意能通澗響松濤急山鳴夜雨空雲歸樵路外花落鳥聲中春去知何處啼鵑血正紅早春張玉書宋夀谷見過湖上釋本晝雲起西湖路吾廬蹴水開故人嫌俗縛雙騎出城來春晝散㣲雪鄰家多早梅彈琴徴古調何處可登臺浙江通志卷二百七十四
