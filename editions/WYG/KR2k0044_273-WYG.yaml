body:
  text: 浙江通志卷二百七十四藝文十六詩五言律送楊道士往天台唐張九齡鬼谷還成道天台去學仙行應松子落留與世人傳此地烟波逺何時羽駕旋當頭一把袂城郭共依然寄天台司馬先生唐崔湜聞有三元客祈仙九轉成人間白雲返天上赤龍迎尚惜金芝晚仍攀琪樹榮何年緱嶺上一謝洛陽城送劉少府遊越州唐駱賔王一邱余枕石三越爾懐鉛離亭分鶴葢别岸指龍川露下蟬聲斷寒來雁影連如何溝水上悽斷聽離弦春日登金華觀唐陳子昻白玊仙臺古丹邱别望遥山川亂雲日樓榭入烟霄鶴舞千年樹虹飛百尺橋還疑赤松子天路坐相邀寄天台司馬道士唐張説世上求眞客天台去不還傳聞有仙要夢寐在兹山朱闕青霞斷瑤堂紫月閒何時枉飛鶴笙吹接人間婺州留别鄧使君唐張循之西掖馳名久東陽出守時江山婺女分風月隱侯詩别恨雙溪急留歡五馬遲廻舟映沙嶼未逺剩相思剡谿館聞笛唐丁仙芝夜乆聞羗笛寥寥虚客堂山空響不散谿静曲宜長草木生邊氣城池泛夕凉虛然異風出髣髴宿平陽送蘇倩遊天台唐張子容靈異尋滄海笙歌訪翠微江鷗迎共狎雲鶴待將飛琪樹嘗仙果瓊樓試羽衣遥知神女問獨怪阮郎歸泛永嘉江日暮廻舟唐張子容無雲天欲暮輕鷁大江清歸路烟中逺廻舟月上行傍潭窺竹暗出嶼見沙明更値微風起乘流絲管聲永嘉即事寄贛縣袁少府瓘唐張子容山繞樓臺出谿通里閈斜曾為謝客郡多有逐臣家海氣朝成雨江天晚作霞題書報賈誼地濕似長沙奉和崔司馬遊雲門寺唐孫逖繫馬清谿樹禪門春氣濃香臺花下出講座竹間逢覺路山童引經行谷鳥從更言窮寂滅回䇿上南峯酬萬八賀九雲門下歸溪中作唐孫逖晚從靈境出林壑曙雲飛稍覺清溪近回瞻畫刹微獨園餘興在孤櫂宿心違更憶登攀處天香滿袖歸送邱為落第歸江東唐王維憐君不得意况復栁條春為客黄金盡還家白髪新五湖三畝宅萬里一歸人知爾不能薦羞稱獻納臣寄鏡湖朱處士唐李頎澄霽晚流濶微風吹緑蘋鱗鱗逺峯見淡淡平湖春芳草日堪把白雲心所親何時可為樂夢裏東山人若耶溪逢孔九唐李頎相逢此溪曲託勝在烟霞潭影竹間動巖隂簷外斜人言上皇代犬吠武陵家借問淹留日春風滿若耶送少微上人遊天台唐劉長卿石橋人不到獨往更迢迢乞食山家少尋鐘野路遥松門風自掃瀑布雪難消秋夜聞清梵餘音逐海潮却歸睦州至七里灘下作唐劉長卿南歸猶謫宦獨上子陵灘江樹臨洲晚沙禽對水寒山開斜照在石淺亂流難惆悵梅花發年年此地看送宣尊師醮畢歸越唐劉長卿吹簫江上晚惆悵别茅君踏火能飛雪登山入白雲晨香長日在夜磬滿山聞揮手桐溪路無情水亦分送睦州孫沅歸句章新營所居唐劉長卿故里歸成客新家去未安詩書滿蝸舍征税及漁竿火種山田薄星居海島寒憐君不得已歩歩别離難送齊郎中典括州唐劉長卿星象移何處旌麾獨向東勸耕滄海畔聽訟白雲中樹色雙溪合猿聲萬嶺同石門康樂住幾里挂㠶通送崔處士先適越唐劉長卿山隂好雲物此去又春風越鳥聞花裏曹娥想鏡中小江潮易滿萬井水皆通徒羡扁舟客微官事不同雲門寺訪靈一上人唐劉長卿所思勞日夕惆悵去西東禪客知何在春山到處同獨行殘雪裏相見白雲中請近東林寺窮年事逺公送李評事遊越唐劉長卿未習風塵事初為吴越遊露霑湖色曉月照海門秋梅市人何在蘭亭水尚流西陵待潮處落日滿扁舟宿永嘉江寄山隂崔少府國輔唐孟浩然我行窮水國君使入京華相去日千里孤㠶天一涯卧聞海潮至起視江月斜借問同舟客何時到永嘉江上寄山隂崔少府國輔唐孟浩然春堤楊栁發憶與故人期草木本無意榮枯自有時山隂定逺近江上日相思不及蘭亭㑹空吟祓禊詩寄天台道士唐孟浩然海上求仙客三山望幾時焚香宿華頂裛露采靈芝屢躡莓苔滑將尋汗漫期倘因松子去長與世人辭與杭州薛司户登樟亭作唐孟浩然水樓一登眺半出青林髙幕帟英僚敞芳筵下客叨山藏伯禹穴城壓伍胥濤今日觀溟漲垂綸學釣鼇永嘉上浦館逢張八子容唐孟浩然逆旅相逢處江村日暮時衆山遥對酒孤嶼共題詩廨宇鄰蛟室人烟接島夷鄉園萬餘里失路一相悲對酒憶賀監二首唐李白太子賔客賀公於長安紫極宮一見余呼余為謫仙人因解金龜換酒為樂殁後對酒悵然有懐而作是詩四明有狂客風流賀季眞長安一相見呼我謫仙人昔好杯中物翻為松下塵金龜換酒處却憶淚沾巾狂客歸四明山隂道士迎勅賜鏡湖水為君臺沼榮人亡餘故宅空有荷花生念此杳如夢凄然傷我情送任郎中出守明州唐岑參罷起郎官草初分刺史符城邊樓枕海郭裏樹侵湖郡政旁連楚朝恩獨借吳觀濤秋正好莫不上姑蘇登天目山作唐張萬頃去歲離秦望今冬使楚關淚添天目水髮變海頭山别母烏南逝辭兄雁北還宦遊偏不樂長為憶慈顔送嚴維歸越州唐李嘉祐艱難只用武歸向淛河東松雪千山暮林泉一水通鄉心縁緑草野思看青楓春日偏相憶裁詩寄剡中至七里灘作唐李嘉祐遷客投於越臨江淚滿衣獨隨流水逺轉覺故人稀萬木迎秋序千峯駐晚暉行舟猶未巳惆悵暮潮歸送越州辛法曹之任唐李嘉祐但能一官適莫羡五侯尊山色垂趨府潮聲自到門緣塘剡溪路映竹五湖村王謝登臨處依依今尚存烏程水樓留别唐皇甫曾悠悠千里去惜此一尊同客散髙樓上㠶飛細雨中山程隨逺水楚思在青楓共説前期易滄波處處同送著公歸越唐皇甫曾誰能愁此别到越㑹相逢長憶雲門寺門前千萬峯石牀埋積雪山路倒枯松莫學白居士無人知去蹤送崔功曹赴越唐髙適傳有東南别題詩報客居江山知不厭州縣復何如莫恨吳歈曲嘗看越絶書今朝欲乘興隨爾食鱸魚早發東陽唐錢起信風催過客早發梅花橋數鴈起前渚千艘爭便潮將隨浮雲去日借故山遥惆悵烟波末佳期在碧霄會稽秋晚奉呈于太守唐張繼寂寂訟庭幽森森㦸戸秋山光隱危堞湖色上髙樓禹穴探書罷天台作賦遊雲浮將越客歲晚共淹留題嚴陵釣臺唐張繼舊隱人如在清風亦似秋客星沈夜壑釣石俯春流鳥向喬枝聚魚依淺瀨遊古來芳餌下誰是不吞鉤送金華王明府唐韓翃縣舍江雲裏心閒境又偏家貧陶令酒月俸沈郎錢黄蘖香山路青楓暮雨天時聞引車騎竹外到銅泉徐侍郎素未相識時攜酒命饌兼命諸詩客同訪㑹稽山居唐秦系忽道仙翁至幽人學拜迎華簮窺甕牖珍味代藜羮洗硯魚仍戲移樽鳥不驚蘭亭攀叙却㑹此越中營酬王侍御西陵渡見寄唐嚴維前年萬里别昨日一封書郢曲西陵渡秦官使者車栁塘薫晝日花水溢春渠若不嫌雞黍先令掃敝廬崇德道中唐戴叔倫暖日菜心稠晴烟麥穗抽客心雙去翼歸夢一扁舟廢塔巢雙鶴長波漾白鷗闗山明月到愴惻十年遊題横山寺唐戴叔倫偶入横山寺湖山景最幽露涵松翠濕風湧浪花浮老衲供茶盌斜陽送客舟自縁歸思促不得更遲留婺州路别錄事唐戴叔倫府中相見少江上獨行遥㑹日起離恨新年别舊寮春雲猶伴雪寒渚未通潮回首羣山暝思君轉寂寥寄天台秀師唐司空曙天台瀑布寺傳有白頭師幻跡示羸病空門無住持雪晴看鶴去海夜與龍期永願親缾屨呈功得問疑送侯山人赴㑹稽唐崔峒仙客辭蘿月東來就一官且歸滄海住猶向白雲看猨呌江天暮蟲聲野浦寒時遊鏡湖裏為我把漁竿送薛良史往越州謁從叔唐崔峒辭家年已久與子分偏深易得相思淚難為欲别心孤雲隨浦口幾日到山隂遥想蘭亭下清風滿竹林富陽南樓望浙江風起唐張南史南樓渚風起樹杪見滄波稍覺征㠶上蕭蕭暮雨多沙洲殊未極雲水更相和欲問任公子垂綸意若何西陵懷靈一上人兼寄朱放唐張南史淮海風濤起江闗憂思長同悲鵲繞樹獨坐雁隨陽山晚雲藏雪汀寒月照霜由來濯纓處漁父愛滄浪寄静虛上人初至雲門唐張南史寒蹤白雲裏法侶自提攜竹徑通城下松門隔水西方同沃洲去不似武陵迷髣髴心疑處髙峯是㑹稽經故賀賔客鏡湖道士觀唐朱放已得歸鄉里逍遥一外臣那隨流水去不待鏡湖春雪裏登山屐林間漉酒巾空餘道士觀誰是學仙人送嚴紳遊蘭溪唐武元衡剡嶺窮邉海君遊别嶺西暮雲秋水闊寒雨夜猿啼地僻秦人少山多越路迷蕭蕭驅匹馬何處是蘭溪送寇侍御司馬之明州唐武元衡㪷酒上河梁驚魂去越鄉地窮滄海闊雲入剡山長蓮唱蒲萄熟人烟橘柚香蘭亭應駐楫今古共風光送吳侍御司馬赴台州唐武元衡盧耽佐郡遥川陸共迢迢風景輕吳㑹文章變越謡烟林繁橘柚雲海浩波潮余有靈山夢前君到石橋送台州崔錄事唐權德輿不嫌臨海逺㣲禄代躬耕古郡紀綱職扁舟山水程詩因琪樹麗心與瀑泉清盛府知音在何時薦政成送上虞縣丞唐權德輿越郡佳山水菁江接上虞計程杭一葦試吏佐雙鳬雲壑窺仙籍風謠驗地圖因尋黄絹字為我弔曹旴送盧評事婺州省覲唐權德輿知向東陽去晨裝見綵衣客愁青眼别家喜玊人歸漢漠水烟晚蕭蕭楓葉飛雙溪泊船處候吏拜胡威富陽陸路唐權德輿又入亂峯去逺程殊未歸烟蘿迷客路山果落征衣欹石臨清淺晴雲出翠微漁潭明夜泊心憶謝𤣥暉送越客唐張籍見説孤㠶去東南到會稽春雲剡溪口殘月鏡湖西水鶴沙邉立山鼯竹裏啼謝家曾住處烟洞入應迷舟行寄李湖州唐張籍客愁無次第川路重辛勤藻宻行舟澀灣多轉檝頻薄遊空感惠失計自憐貧賴有汀洲句時時慰逺人送朱慶餘及第歸越唐孟郊東南歸路逺幾日到鄉中有寺山皆遍無家水不通湖聲蓮葉雨野氣稲花風州縣知名乆争邀與客同代杭民荅樂天唐元稹翠幕籠斜日朱衣儼别筵管弦凄欲罷城郭望依然路溢新城市農開舊廢田春坊幸無事何惜借三年郡樓夜宴留客唐白居易北客勞相訪東樓為一開褰簾待月出把火看潮來豔聽竹枝曲香傳蓮子杯寒天殊未曉歸騎且遲廻宿竹閣唐白居易晚坐松簷下宵眠竹閣間清虚當服藥幽獨抵歸山巧未能勝拙忙應不及閒無勞别修道即此是元闗湖亭晚歸唐白居易盡日湖亭卧心閒事亦稀起因殘醉醒坐待晚凉歸松雨飄藤㡌江風透葛衣栁堤行不厭沙軟絮霏霏孤山寺遇雨唐白居易拂波雲色重灑葉雨聲繁水鷺雙飛起風荷一向翻空濛連北岸蕭颯入東軒或擬湖中宿留船在寺門宿天竺寺唐白居易野寺經三宿都城復一還家仍念婚嫁身尚繫官班蕭灑秋臨水沈吟晚下山長閒猶未得逐日且偷閒别州民唐白居易耆老遮歸路壺漿滿别筵甘棠無一樹那得淚澘然税重多貧户農饑足旱田唯留一湖水與汝救凶年杭州郡齋南亭唐姚合符印懸腰下東山不得歸獨行南北近老去往還稀迸笋侵窗長驚蟬出樹飛田田池上葉長是使君衣杭州官舍即事唐姚合臨江府署清閒卧復閒行苔蘚疎塵色梧桐出雨聲漸除身外事暗作道家名更喜仙山近庭前藥自生早春越中留故人唐周賀此行經歲近唯約半年廻野渡人初過前山雲未開鴈羣逢曉斷林色映川來清夜蘆中客嚴家舊釣臺送張諲之睦州唐周賀遥憶新安舊扁舟往復還淺深看水石來往逐雲山到縣餘花在過門五栁閒東征隨子去俱隠薜蘿間送袁肇歸山隂唐鄭巢論文意有違寒雨灑行衣南渡乆誰語後吟今獨歸河㠶因樹落沙鳥背湖飛若值雲門侣多因宿翠微送僧歸富春唐鄭巢憶過僧禪處遥山抱竹門古房關蘚色秋徑掃潮痕石浄聞泉落沙寒見鶴翻終當從此望更與道人言宿天竺寺唐鄭巢暮過潭上寺獨宿白雲間鐘磬遥連樹星河半隔山石中泉暗落松外户初闗却憶終南裏前秋此夕還思越州山水寄朱慶餘唐章孝標窗户潮頭雪雲霞鏡裏天島桐秋送雨江艇暮摇烟藕折蓮芽脆茶挑茗眼鮮還將歐冶劒更淬若耶泉天台晴望唐李敬方天台十二旬一片雨中春林果黄梅盡山苗半夏新陽烏晴展翅隂魄夜飛輪坐冀無雲物分明見北辰經杭州唐顧非熊郡郭遶江濆人家近白雲晚濤臨檻看夜艣隔城聞浦轉山初盡虹斜雨未分有誰知我意心緒逐鷗羣送杭州姚員外唐顧非熊浙江江上郡楊栁到時春塹起背城雁㠶分向海人嶠雲侵寺吐汀月隔樓新静理更何事還應詠白蘋蘇小小墓唐張祜漠漠窮塵地蕭蕭古樹林臉濃花自發眉恨栁長深夜月人何待春風鳥為吟不知誰共穴徒願結同心題樟亭唐張祜曉霽憑虛檻雲山四望通地盤江岸絶天映海門空樹色連秋靄潮聲入夜風年年此光景催盡白頭翁題海鹽南舘唐張祜故人營此地臺舘尚依依黑夜山魈語黄昏海燕歸舊隂蕉葉在殘雨槿花稀無復南亭賞高簷紅燭輝夕次桐廬唐張祜百里清溪口扁舟此去過晚潮風勢急寒葉雨聲多戍出山頭鼓樵通竹裏歌不堪無酒夜迴首夢烟波題餘杭縣龍泉觀唐張祜四迴山一面臺殿已嵯峨中路見山逺上方行石多天晴花氣漫地煖鳥音和徒潄葛仙井此生其奈何秋夜宿靈隠寺師上人居唐張祜月色荒城外江聲野寺中貧知交道薄老信釋門空露葉凋堦蘚風枝戛井桐不妨無酒夜閒話值生公送僧遊温州唐朱慶餘夏滿随所適江湖非繫緣卷經離嶠寺隔葦上秋船水落無風夜猨啼欲雨天石門期獨往謝守有遺篇睦州四韻唐杜牧州在釣臺邊溪山實可憐有家皆掩映無處不潺湲好樹鳴幽鳥晴樓入野烟殘春杜陵客中酒落花前夜泊桐廬先寄蘇臺盧郎中唐杜牧水檻桐廬館歸舟繫石根笛吹孤戍月犬吠隔溪村十載違清望幽懐未一論蘇臺菊花節何處與開樽晚泊七里灘唐許渾天晚日沉沉歸舟繫栁隂江村平見寺山郭逺聞砧樹宻猿聲響波澄雁影深榮華暫時事誰識子陵心九日登樟亭驛樓唐許渾鱸鱠與蓴羮西風片席輕潮回孤島晚雲斂衆山晴丹羽下髙閣黄花垂古城因秋倍多感鄉樹接咸京天竺寺題葛洪井唐許渾羽客鍊丹井井留人已無舊泉青石下餘甃碧山隅雲朗鏡開匣月寒冰在壺仍聞釀仙酒此水過瓊酴送客歸蘭溪唐許渾花下送歸客路長應過秋暮随江鳥宿寒共嶺猿愁衆水喧嚴瀨羣峰抱沈樓因君幾南望曽向此中遊舟次武林寄天竺僧無晝唐許渾谿長山幾重十里萬株松秋日下丹檻暮雲歸碧峰樹棲新放鶴潭隠舊降龍還在孤舟宿卧聞初夜鐘越中寺居唐趙嘏遲客疎林下斜溪小艇通野橋連寺月髙竹半樓風水静魚吹浪枝閒鳥下空數峰相向綠日夕郡城東寄富春縣路處士唐項斯平生醉與吟誰是見君心上國一歸去滄江閒至今鐘緐秋寺近峰濶晚濤深疎放長如此何人長得尋杭州江亭留題唐項斯處處日馳銷憑軒夕似朝漁翁閒鼓櫂沙鳥戲迎潮樹間津亭宻城連塢寺遥因誰報隠者向此得耕樵寄剡中友人唐馬戴故人今在剡秋草意如何嶺暮雲霞雜潮迴島嶼多沃洲僧幾訪天姥客誰過嵗晚偏相憶風生隔楚波題鏡湖野老所居唐馬戴湖裏尋君去樵風往返吹樹喧巢鳥出路細葑田移漚苧成魚網枯根是酒巵老年唯自適生事任羣兒送天台僧唐賈島逺夢歸華頂扁舟背岳陽寒蔬脩浄食夜浪動禪牀雁過孤峰曉猿啼一樹霜身心無别念餘習在詩章喜姚郎中自杭州迴唐賈島路多楓樹林累日泊清隂來去泛流水翛然適此心一披江上作三起月中吟東省期司諌雲門悔不尋贈越僧岳雲二首唐温庭筠世機消已盡巾屨亦飄然一室故山月滿瓶秋澗泉禪菴過㣲雪鄉寺隔寒烟應共白蓮客相期松桂前蘭亭舊都講今日意如何有樹闗深院無塵到淺莎僧居随處好人事出門多不及新春雁年年鏡水波越中行唐李頻越國臨滄海芳洲復暮晴湖通諸浦白日隠亂峰明野宿多無定閒遊竟有情天台聞不逺終到石橋行明州江亭夜别段秀才唐李頻離亭向水開時候復蒸梅霹靂燈燭滅蒹葭風雨來京闗誰共語海嶠不同迴莫為蓴鱸美天涯滯爾才送僧入天台唐李頻一錫随緣赴天台又去登長亭舊别路落日獨行僧夜燒山何處秋帆浪幾層他時授巾拂莫為老無能送台州唐興陳明府唐李頻見説海西隅山川與俗殊宦遊如不到仙分即應無瀑布當公署天台是縣圖遥知為吏去有術字惸孤送顧陶校書歸錢塘唐儲嗣宗清苦月偏知南歸瘦馬遲槖輕緣換酒髮白為吟詩水色西陵渡松聲伍相祠聖朝思直諫不是挂冠時寄永嘉崔道融唐司空圖旅寓雖難定乗閒是勝遊碧雲蕭寺霽紅樹謝邨秋戍鼓和潮暗船燈照島幽詩家多滯此風景似相留旅次錢塘唐方干此地似鄉國堪為朝夕吟雲藏吴相廟樹引越山禽潮落海人散鐘遲秋寺深我來無舊識誰見寂寥心暮發七里灘夜泊嚴光臺下唐方干一瞬即七里箭馳猶是難檣邊走嵐翠枕底失風湍但訝猿鳥定不知霜月寒前賢竟何益此地誤垂竿題雪竇禪寺唐方干飛泉濺禪石缾注亦生苔海上山不淺天邊人自來長年随檜栢獨夜任風雷獵者聞疎磬知師入定迴秋日富春江行唐羅隠逺㟁平如翦澄江静似鋪紫鱗仙客馭金顆李衡奴冷疊羣山濶清涵萬象殊嚴陵亦髙見歸卧是良圗望杭州城唐鄭谷漠漠江天外登臨返照間潮來無别浦木落見他山沙鳥晴飛逺漁人夜唱閒嵗窮歸未得心逐片帆還題越州法華寺唐吴融寺在五峰隂穿緣一徑尋雲藏古殿暗石䕶小房深宿鳥連僧定寒猨應客吟上方應見海月出試登臨婺州水舘重陽日作唐韋莊異國逢佳節憑高獨苦吟一杯今日醉萬里故園心水舘紅蘭合山城紫菊深白衣雖不至鷗鳥自相尋晚泊富春寄友人唐喻坦之江鐘寒夕㣲江鳥望巢飛木落