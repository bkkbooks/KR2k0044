五年始封龍君為淵靈侯紹熙元年四月不雨至於六月睢陽李亶養以才薦畀令事亟走祠下俄有蜿蜒舉體金色見神座上直養迎挹即循其左臂而上至巾幞因請歸醮祠復循而上如初奩中四龍子如粟闔境驚異見所未有閲三日大雨霑洽是嵗詔進封龍君為廣恵淵靈侯龍母為慶善夫人命綍既下神報益彰明年三月直養以祠宇敗撓弗稱神施遂裒衆力為建二大殿鼎新設像且列四神像於後以表四龍子之異頤正櫽括比次如左而系之以迎享送神詞云海波淵淪兮海山巃嵸其下潛通兮神之宫時思其母兮來舂容菖葉生兮杏蔕融神之來兮雷隆隆雨我田兮秋芃芃我之懐兮無初終神税駕兮芬陽斯陳鼓鐘廟享兮列鼎重茵神之宫兮屯雲蕙肴蒸兮芬芬我黍我稌兮抑亦薦其萍芹神明其衷兮無吐芳新吹洞簫兮望極浦神之歸兮雲在下十風兮五雨祐我海邦兮汗萊斥鹵神不來兮使吾心苦千秋萬嵗兮為民所怙齊景公廟明一統志在平湖南一十三里閑窗括異志齊景鄉縣北四十里有廟在焉圖經號齊景公廟一云朱明大王古老相傳齊景公遵海而南觀於轉附朝儛曽遊於此立廟於斯舊有碑今磨滅不存三將軍廟舊嘉興府志在梁莊祀齊田榮田廣田橫馬維銘募建三将軍廟疏吾邑梁荘故有三將軍廟三将軍者為齊義士田横横兄榮廣夫吾邑𨽻吳去齊境二千里梁荘𨽻吾邑即濵海乎去橫之島何啻二千里而遥夫亦謂神則無所不之乎議新其廟重神也亦重義也惟義故雖死而凛然有生氣神之所以無方也居兹土者尚其以義朂焉顯忠廟嘉興府圖記在縣治東一里當湖旁祀漢大将軍霍光閩人英烈錢侯附焉嘉興府志霍廟一在海鹽東北廣陳鎮元至大二年建一在當湖市宋建炎三年建並析屬平湖魯詹顯忠廟碑記吳主孫皓當被疾時有神降於小黃門云華亭鹹塘風濤為害非人力所能防古海鹽縣治一旦䧟為湖無大神䕶臣漢之功臣霍光也臣部黨有力當鎮之可免翼日疾瘳立廟小金山竊嘗謂生為偉人則没為明神必有大功徳於民隨其所向而世奉祀之惟公䇿名孝武擁昭立宣厥功懋焉是時漢都長安距呉㑹遠甚又公之殁更兩漢厯三國已數百年乃托吳王之疾肇建金山之祠如月在天有水則現曾何乆且遠之間耶宣和二年始賜額曰顯忠後三年封忠烈公趙孟堅英烈錢侯廟銘博陸在漢擁昭立宣雖曰世禄不吾以延逮及異朝血食廟祀為禦提封叱捍潮水無使侵齧虧厥疆里至於今世靈畏若存英烈錢侯起身七閩浮舶而商至禮英靈惟公與直志合心傾一誠黙孚旋𨽻部下拱立廟廡杳然㝠化東海之瀕奉祀畢䖍位號封崇若有待然小醜不競東鄙興師惟侯助順若響之隨神兵千萬陰雲擁之宼勢旋靡電掃風披昭靈顯功褒號英烈服爵儀衞一變錦蕞我儕銘石匪事誇雄寓勸若人知孝而忠李東陽霍氏行祠詩霍将軍古祠下揚靈旗躍靈馬神遊四方適余野霍将軍武且神驅逐厲鬼鞭風雲生能安邦死能福我民壯哉将軍死猶存沈懋嘉霍氏行祠詩花街東畔是儂家閒㸔迎神放晚衙拂拂紅旗春賽罷霍王祠下採藤花馮將軍廟𢎞治嘉興府志在縣治南十五里宋端平三年建漢陽夏侯異之廟也白沃使君廟嘉興府圖記在縣治東北三里許閒窗括異志故老相傳當湖初䧟時白沃使君躍馬疾走不及遂駐馬以鞭指得湖東南一角水至不没今此地獨高後人於此立廟一在沙腰一在乍浦皆稱白沃廟也景賢祠平湖縣志在徳藏寺東祀唐相陸忠宣公䞇以宋靖獻先生陸正明徴士陸宗秀程鄉令陸鋹太子太保吏部尚書諡荘簡陸光祖配嵗春秋仲月祭范惟一景賢祠記嘉禾祠宣公者四其一在東湖而廣陳之陳山有靖獻先生書院嘉靖甲寅合宣公與靖獻祠焉題其額曰景賢又七年有司議以徴君宗秀程鄉令鋹入祠配享予按唐書宣公為蘇之嘉興人宋以嘉興𨽻浙西路而宣徳間分鹽官地置縣平湖故陸氏今為平湖人宣公之功在唐社稷而靖獻徴士程鄉諸公又皆能世其徳合而祀之固宜天妃宮嘉興府志在乍浦苦竹山妃閩莆人宋都巡檢林愿女生而神靈没為海神厯代累封至天妃洪武永樂中兩加封號凡邊海處皆祀之忠獻祠舊嘉興府志在東十八都盤字圩里名蒹葭圍祀宋張魏公浚南軒栻南陽判官溥張治洪宗祠記自忠獻公六世孫淮揚通判徳夫遷居於湖處士静菴自獨山繼遷蒹葭圍子孫保聚於斯構祠以奉忠獻公暨右文殿修撰公徳夫静菴二公嵗在庚辰登仕郎完初構椽而落成之庚戌治洪謀之叔伯宣形先兄介眉朗辰共捐田瞻享立碑宗祠撮其要云陸氏先正祠舊嘉興府志在東城内祀象山先生報功祠天啟平湖縣志在兵備司左為禦倭都御史胡宗憲立以禦倭郡守劉慤邑令劉存義配馮汝弼報功祠記嘉靖丙辰總督軍務都察院右僉都御史梅林胡公殱海宼於平湖南郊士民懐公再造功謀諸邑令陳君一謙建祠立碑以垂不朽屬余為記羅侯祠天啟平湖縣志在南司左為知縣羅尚忠立陸荘簡公祠舊嘉興府志在南司右祀陸公光祖懐徳祠平湖縣志在佑聖宮西王世貞懐徳祠記懐徳祠者祠故諌議平湖馮公公為徳於其鄉三老徐燮等請於令願特為祠以報公公居恒謂家居不習計倪不可饒不饒不可以伸志夫人富而仁義附焉故奉羡即以収棄田而治之皆成上腴又以其田入益斥直傍畝亡何邑田皆驟貴於是公喜曰吾可以為徳矣其首施則伯仲子姓次施則五服之親屬最後施則邑之老者疾者無子者不能紼者叩之即響應又推其餘饒築城修土石堰十五石橋三十二浚陳塘為里二十七人環公居而家者可十萬户大半食公恵其自罷官至捐館三十四年如一日公諱汝弼官揚州郡丞忠義節孝祠忠義祠在學宫西節孝祠在治西太平橋之東國朝雍正五年知縣楊克慧奉文建桐鄉縣先農壇在東門外常平倉舊址國朝雍正五年知縣王輅生奉文建立壇宇並置耤田四畝九分社稷壇𢎞治嘉興府志在城隍廟右去縣治西北二百二十歩許風雲雷雨山川壇舊嘉興府志在縣治東南一里邑厲壇𢎞治嘉興府志在北門外去縣治二里許城隍廟嘉興府圖記在縣西北一百八十歩宣徳末知縣趙中建天順初知縣張泰修索度王廟正徳崇徳志即青鎭土地神鎮人飲食必祭水旱疫癘必禱咸若有荅萬珪索度王廟記青墩有上地神祠居宻印寺之東號曰索度明王世祠兹土名位世次不見於載述宣和問起居舍人周離亨謫蒞鎮事一夕夢有神人謁之曰予居敝陋幸恵顧我翼日周訪諸叢祠得王之像適契夢中所見者因為修祠宇獨不為記以傳於後今考諸鎮西南隅有古山廟神曰索靖唐咸通中朱洪所記索靖王者實三國吳王孫權之仲子也按吳書吳王之子七人本傳所稱乃呉王第三子而洪以為仲子不知何據今父老所傳或言王與古山廟神棣萼也或言王即索靖王姑叙其大槩以俟後之博識君子而叅訂焉昌武大王廟檇李詩繫廟在皂林鎭吴士季為吳興令病痁遣人就此乞驅鬼夢一騎縛小鬼去即愈宋志淮海王有三子皆有功於民因祀為土榖神皂林為大龍翔為二爐鎮為三云昌武三王廟嘉興府志宋淮海王第三子廟在車溪九里松之西至和元年五月大風雨擁廟入水漂至車口堰北四里而止感夢於密印寺僧仲翔告以欲遷里人驚異以是年重建故云下廟顯靈廟桐鄉縣志在殳山宋寳慶元年建封周顯靈王祈禱者甚衆程都御史祠嘉興府志在北門内祀明建文時殉節僉都程本立宗将軍祠桐鄉縣志在皂林鎮秀溪橋張定志宗将軍祠碑将軍諱禮嘉靖丙午倭宼入犯所至蹂躪将軍奮勇而前禦宼於皂林市之三里橋三覆賊兵斬首四百餘兵興以來稱血戰第一功今日桐之蒼赤詎非将軍所遺哉廟食兹土而家尸户祝亦不負将軍一死矣胡總制祠嘉興府志在城隍廟前祀總制胡宗憲萬禾胡總制祠田記嘉靖三十五年倭宼圍桐鄉軍門胡公䇿解其圍民建祠肖像醫生姚崑謂有祠無租祠何以守倡捨己田一十五畝以膳守者樹碣祠中名其􅁽曰報功田三公祠桐鄉縣志在城隍廟間壁祀阮公鶚王公三錫金公燕載入祀典忠義節孝祠忠義祠在儒學内節孝祠在縣東南司前國朝雍正六年知縣蔡可遠奉文建浙江通志卷二百十九
