body:
  text: 浙江通志卷二百十九祠祀三嘉興府嘉興縣附郭秀水縣附郭先農壇在東門外白五都地字圩號内國朝雍正五年嘉興縣知縣戈鳴岐秀水縣知縣魏大徳奉文建立壇宇并合置耤田九畝八分社稷壇舊嘉興府志在阜城門外五福鄉西北都嘉秀二縣皆統於府風雲雷雨山川壇嘉興府志在迎薫門外象賢二十二都郡厲壇萬厯嘉興府志在望吳門外即菩提院舊址城隍廟嘉興府圖記在府治西北一里嘉靖丁未知府趙瀛增葺兩廊以居二縣城隍之神賀燦然重修城隍廟碑記廟在郡治西北一修於宣徳壬子再修於嘉靖戊申今且六十餘年矣郡伯新都吳公首捐俸倡諸僚屬於正殿則仍而葺之於殿前之軒則増而昻之於殿後之堂則撤而更新之於大門儀門於寝殿於兩邑城隍之殿及廊廡則丹堊而潤色之經始於萬厯庚戍嘉平月迄辛亥嘉平之望遂告成事順濟龍王廟𢎞治嘉興府志在郡城西通越門外三里景徳禪寺之右三塔灣之左李時習順濟龍王廟記景徳寺前有三塔枕其流流之深倍左右四尺龍之所宅也寺有伽藍祠號順徳龍王淳熙元年夏五月潭之所大雨雹殆陽不克也克必過過則為旱已而不雨至於秋七月取虎顱骨加之於三塔之潭禱畢大雨嵗以大熟乃即廟貌寵新之嘉興府志明洪武三年封順濟龍王宣徳五年知府齊政構祠繪像徐偃王廟至元嘉禾志在縣西二十里偃王逃之會稽王之宗族嘗有㪚在邑者故後世為廟以祀伍王廟舊嘉興府志在嘉興縣東二十七里胥山子胥代越經營於此唐乾寧中勅封為吳安王越相國范公祠嘉興府志在府治西南金明寺後按范蠡嘗居嘉興今稱陶朱公里祠南臨范蠡湖東為范公浜吳偉業金明寺謁范少伯祠詩艤櫂滄江學釣魚五湖何必計然書山川禹穴思文種􅇏火蘇臺弔伍胥浪擲紅顔終是恨拜辭烏喙待何如却憐愛子猶難免霸越平吳事總虗三賢祠嘉靖浙江通志在府治西北元大徳間建祀漢朱買臣唐陸䞇宋陳舜俞羅汝敬重建三賢祠記浙江嘉興古吴郡地漢㑹稽守朱買臣唐宰相陸䞇宋山陰令陳舜俞實生兹土是為三賢元大徳間鄉老以其行義足以淑諸人請祠春波門外以春秋二仲之上丁祀之嵗乆圯於沮洳洪熙紀元初大理卿胡公槩乃治郡西三皇殿之故址重構焉關帝廟嘉興府志在府治北一里跨寳帶河為石梁廟於其上明嘉靖間知縣張烈文建𤣥壇廟舊嘉興府志在嘉興縣王家坊神姓趙名朗字公明趙子龍從兄弟也明萬厯辛亥工部郎中陸基恕建謹按仙都志趙侯廟乃後漢趙炳也今正一宗壇給趙侯禁氣籙即此所謂趙侯禁師者是宋元豐七年封靈順顯佑廣恵威烈王據此𤣥壇神當屬趙炳府志所云趙朗字公明羽士訛傳似未可信許公廟至元嘉禾志在嘉興縣西一里許公名安仁晉黃門侍郎也陳司徒廟名勝志嘉興縣西南陳司徒果仁祠唐咸通中建十國春秋梁封故隋司徒陳果仁為福順王陸宣公祠嘉興府志在城西報忠坊即嘉興縣學故址舊祠在州學中宋建炎三年作書院於鴛湖之東後屢遷吕祖謙陸宣公祠記唐史載陸宣公䞇蘇州嘉興人石晉時吳越王元瓘奏以嘉興置秀州城東橋以宣公名者先老相傳公所生之地郡學故有公祠今郡守直顯謨閣東平吕侯正已復葺而新之維秀陪翼行都典治為天下劇侯獨置迎将期㑹之煩表公以風勵多士其知本務矣金幼孜重修宣公祠記洪武初郡守劉澤民重建於城内實元江南書院之故址嵗乆為有力者所侵奪宣徳二年大理郷胡元節購材鳩工復厥侵地命郡人王愷之董其役薛瑄重修宣公祠記景泰二年知府事江西舒君敬上章以公乃唐之名臣忠節著於當時奏議行於後世其遺廟雖存自昔以來官無祭饗宜量給官錢修舉春秋祀事詔從其請明嘉靖十七年改建於此李曾伯宣公祠詩公不生唐世貞元事若何主恩思報切臣罪忤時多佞舌攻何忍剛腸死不磨倚欄凝望乆一鷺㸃蒼波裴丞相祠舊嘉興府志在秀水縣南真如寺唐大中年裴休捨宅為寺後人立祠祀焉高豐廟名勝志嘉興縣東十八里有高豐廟在雀墓村唐朱士勉主嘉禾屯田有白雀集於高豐里嵗輒大穰遂立祠祀之李翰髙豐廟記浙西有三屯嘉禾為之大乃以大理評事朱士勉主之且揚州在九州之地最廣全吳在揚州之域最大嘉禾在全呉之壌最腴故嘉禾一穰江淮為之康嘉禾一歉江淮為之儉公首選於衆獨當其任自朱公為屯無下嵗朝嘉厥庸授廷尉評楊将軍廟萬厯嘉興府志在治北一里張寧楊将軍廟碑嘉興縣西北五十歩有旌烈楊将軍廟梁乾化中剏置将軍為守将時城䧟不屈赴井死今地故有井嵗旱汲不竭必其生有捍禦功於民又能死事故立廟以祀遺跡具存無可疑者曹使君祠嘉靖浙江通志在府治西北祀吳越曹信及其子珪信仕錢氏守嘉興有恵政而珪為都將拒淮人有功因祀於此曹王廟舊嘉興府志在嘉興縣東南四十里相傳曹武恵王彬宋開寳中帥師平江南不妄殺邦人感而祀之謹按十國春秋梁開平二年封故唐曹王明為昭靈侯注云明為唐太宗子淮人圍姑蘇時守将禱於其廟輒自潰去故加封焉則神為唐曹王李明而非宋曹武恵王彬也特拈出以正其誤蘇公祠萬厯秀水縣志在本覺寺三過堂後萬厯八年郡守龔勉建施府君廟嘉興府志補䕶國鎮海祠在望吳門外二百歩宋景定五年封今額舊嘉興府志一在縣西南六里一在縣北十五里府君名伯成九嵗為神建立廟宇墓在廟中明勅封䕶國鎮海侯張烈侯廟嘉興府圖記在秀水縣北三十里趙龍圖祠明一統志在秀水縣南真如寺中宋建炎初趙叔近以龍圖待制知秀州王淵以私憾害之殯寺中後為立祠吾相公廟嘉興縣志在徳化一鄙宋勅封撥雲吾相尊神祠前有深浜每嵗春日衆魚來朝報恩祠舊浙江通志在秀水城北三十餘里元至元間張穹壽慟父恂為宋進義校尉殉崖山之難捨居為禪院肖像祀之六賢祠舊嘉興府志在仁文書院初祀薛瑄胡居仁陳獻章王守仁後増吳與弼岳元聲楊公祠萬厯嘉興府志在府治西北即招提寺舊址祀知府楊繼宗傳詳名宦遺澤祠舊嘉興府志在景徳寺左祀明太守徐盈何祉劉慤謹按賈名儒嘉興三郡守祠記一貴溪徐盈一進賢何祉一安福王學孔别有郡守劉慤祠記不知何時去王而進劉也仍府志録之以俟考項襄毅公祠嘉興府志在象賢鄉為明兵部尚書項忠立萬厯秀水縣志嘉靖丁亥孫項鏞建馬輿過項襄毅祠詩山河正氣竟何其汗簡芳名千古垂足底蒺藜歸漢日胸中介胄定秦時平沙碧草空殘壘古木黃鸝有舊祠頭白書生雙劍在叅從無地有餘悲三賢祠嘉興縣志在春波坊漏澤寺西偏祀明巡撫都御史胡宗憲兵偹副使劉燾巡按御史龎尚鵬徐太僕祠舊嘉興府志在府治東明徐世淳守隨州死流賊之難贈太僕少卿賜特祠國朝康熙三年復新之其子彬捐田百畝以為祠祭之費傳詳忠臣陸公祠嘉興府志在府學東祀國朝監察御史陸隴其忠義節孝祠嘉興縣忠義祠在本縣學宫節孝祠在東關外蒯搭坊東津亭秀水縣忠義祠在集慶坊節孝祠在鍾秀坊國朝雍正四年知縣劉徳憲董懿奉文建嘉善縣先農壇在東關外玖南區壹豐圩國朝雍正六年知縣郜煜奉文建立壇宇并置耤田四畝九分社稷壇𢎞治嘉興府志在縣治西二里風雲雷雨山川壇嘉興府圖記在華亭塘南去縣治一里邑厲壇𢎞治嘉興府志在縣治北一里城隍廟萬厯嘉善縣志在縣治東中為正殿殿後為堂右為大寤樓左為求嗣神祠祠後為三元樓殿兩翼對峙為六曹神閣南為中門外為廟門門外有井泉孫詢城隍廟碑嘉善在郡治之東三舍許宣徳五年大理胡元節來旬是邦以民夥地廣析之為縣而縣治之外社稷山川風雲雷雨城隍等祠一時咸備前尹山東鄭時倡其事景泰癸酉龍溪林侯𢎞來令是邑復加葺治完舊益新八蜡廟嘉興府圖記在西塘鎮正徳中縣丞倪璣建蒋愷八蜡廟記乙亥秋左司諌倪璣謫丞兹邑嘗於邑治之西見􅁋祠一所撤而更之命之曰八蜡廟一曰神農二曰后稷三曰田畯四曰鄄表畷五曰貓虎六曰坊七曰庸八曰昆蟲悉據禮為之噫嘻數千載而下聿舉曠典有如丞者其亦可嘉也已亞聖廟舊嘉興府志宋南渡時亞聖四十七代孫孟忠厚扈從臨安勅建鄒國公孟子廟於蘇州今地名孟子堂前元末圯五十四代孫孟觀避兵嘉興之清風涇遂居焉明宣徳間分屬嘉善嘉靖三十二年山東教授司查孟氏南支在善移文浙省改建善邑三十六年置祭田十八畝晉江陳道基碑記國朝雍正七年奉上諭往聖先賢祠宇着各省督撫轉飭各屬稽查修葺欽此浙江總督臣程元章檄行嘉興府知府閻堯熙重建於學宫之南太平坊高使君祠檇李詩繫在嘉興府北三十六里使君逸其名晉建武中為嘉興監屯田校尉鎭静其民於此立祠祀之表賢祠正徳嘉善縣志在縣東南六里祀宋山陰令邑人陳舜俞吕㦂表賢祠記我鄉先生賢良陳公舜俞熙寧初令山陰㑹時相王安石行青苗法先生不奉令謫監南康軍星江鹽酒棄官歸日跨犢以竆林塘之趣自號白牛居士去今五百餘年而鄉猶以奉賢名塘猶以白牛名涇猶以清風名郡城有三賢祠以先生配享於宣公也吳興有六客堂以先生友善於蘇軾也其人望之重可想見矣朱相公廟嘉興府志在嘉善縣遷善都江涇塘相傳宋高宗夜寝夢登紫微樓而墜有一力士捧之得不委地問其姓氏則曰秀州朱六郎也既覺體猶濕乃遣使訪之時六郎死已七日矣因勅封為紫㣲侯立祠香火不絶喻楊祠嘉善縣志在縣治北斜塘鎮明嘉靖間知縣于業建祀叅議喻良而以郡守楊􅁇宗配食故合二公為今稱官置田二十二畝瞻祭劉公臺合祠舊嘉興府志在縣治北城外嘉興府志明嘉靖中知府劉慤慮伍子塘水勢築臺障之萬厯二十三年知縣章士雅建祠於臺左左祀胡槩龎尚鵬右祀劉慤彰義祠嘉興府志在東關外明萬厯中知縣金和建祀江西陣亡本縣主簿李錫本邑陣亡福建汀州百户賴恩孫明忠彰義祠記余觀史䇿所載士之以義烈見者肝可納血可藏精誠所激貫虹射斗感動天地二公一命之吏耳先登䧟陣奮不顧身卒使荆棘芟除鯨鯢剪滅鶴湖左右人敦廉節家尚名教未必非二公之貞魂有以啟之也李諱錫字天佑嘉善縣主簿贈嘉善縣知縣河南登封人賴諱恩字英華官百户福建汀州人建室三楹整碑碣治庭除修門廡庀几筵神所慿依将在是矣魏公祠舊嘉興府志在縣治東明崇禎二年為忠節魏大中及子魏學洢建國朝雍正九年總督臣李衞重修忠義節孝祠忠義祠在縣治西學宫内節孝祠在縣治東思賢書院之前國朝雍正四年知縣張鏞奉文建海鹽縣先農壇在城南白啚地方國朝雍正五年知縣王仕正奉文建立壇宇並置耤田四畝九分社稷壇𢎞治嘉興府志在縣北門外西北一里開濟鄉一都風雲雷雨山川壇𢎞治嘉興府志在縣南門外西南一里甘泉鄉十五都邑厲壇𢎞治嘉興府志在縣北門外東北一里海鹽鄉十六都城隍廟舊嘉興府志舊在縣南五十歩元末燬明洪武三年令劉朝英遷於縣西南二百五十歩為風潮傾圯永樂間令畢瑗重建成化中令李雲𢎞治中令王公璽累加整葺海神廟海鹽縣圖經亦名龍王廟永樂三年左通政趙居任築海鹽塘成建景泰六年僉事陳永叅政謝輔重建於東門外海上黃道廟𢎞治海鹽縣志在縣西南四十五里澉浦南長牆山下海鹽縣圖經長牆山之阿有黃道神祠實慶三年都運諸大卿請到廟額稱顯應侯廟廟中有神曰楊太尉尤靈客舟渡海必禱之太公吕望廟至元嘉禾志在縣東一百五十歩海鹽縣圖經吳地志云太公辟