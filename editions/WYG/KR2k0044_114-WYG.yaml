body:
  text: 浙江通志卷一百十五職官五宋下知湖州軍知安吉州王洞梁扆潘慎修見前鄭建張𨼆衛瀆樂和李韶謝泌字宗源歙州人周師望已上太宗時任李範杜唯一髙貽慶蘇為刁衎字元賔昇州人王膺李惟幹李餗鄭天益王文震已上真宗時任髙謹交丁度字公雅祥符人王冕王鬷字總之趙州臨城人王盤栁宏慎鏞葉參鮑當周允廸滕宗諒字子京河南人胡宿見前陳亞字亞之馬尋唐詢字彦猷錢塘人戚舜元張益之章岷楊紘徐起盛申輔再知齊廓字公闢會稽人鮑軻張田字公載澶淵人已上仁宗時任徐仲謀王异已上英宗時任唐詔徐綬孫覺見前王介字元石金華人李常文同字與可梓潼人章惇見前鞠真卿王安禮字和甫臨川人蘇軾見前陳侗唐淑問閭丘孝直滕元𤼵字逹道東陽人呂希道葉祖洽字敦禮卲武人盧秉字仲甫湖州徳清人已上神宗時任林希字子中福州人呂温卿張詢唐坰鍾俊王安上馬瑊一作城余中豐稷見前蔣之幹徐鐸字振文莆田人已上哲宗時任晁補之字旡咎濟州鉅野人呂嘉問李顔王瑛章綡建州浦城人王澤吳絪鮑朝賔王仲薿葉棣章援葉唐稽盛瑜沈鏻王倚周常朝思誠葛勝仲字魯卿丹陽人强休甫已上徽宗時任盧襄字贊元西安人鄭滋趙子漪已上欽宗時任梁端張虞卿趙子嶙汪藻字彦章徳興人陳與義字去非洛陽人再知李光字泰發上虞人方孟卿汪思温宇文時中常同字子正卭州臨卭人蕭振字徳起平陽人朱勝非見前秦梓江寧人周葵字立義宜興人秦棣江寧人張宇王鉄張宜錢堪趙淑涔周奕王㑹郭咸王勃李琳楊揆董萃陳之茂鄭作肅已上髙宗時任王師心字與道金華人王十朋字龜齡樂清人唐瑑林栗字黄中福清人向汋單夔薛季宣字士龍永嘉人趙師夔鞏湘曽逮趙粹中王正已趙彦逾胡南逢趙善杜顔度劉藻趙思張澈已上孝宗時任王信字誠之麗水人王回趙不迹趙充夫潘景珪虞儔已上光宗時任孟浩趙善宣張震李景和富琯陳鈞汪泳賢留祐賢周夢祥王炎見前魏大中楊長孺趙崇規張忠恕林岳趙汝逵趙善湘見前陳汶趙希蓁趙希蒼謝采伯宋濟已上寧宗時任謝周卿王元春梁紘蔣重珍字良貴無錫人知安吉州趙希觀趙汝憚徐愿趙與懽知安吉州萬建林申杜㓜節劉震孫趙希堅俞垓謝奕修王侑黄辰顯王㮚楊瑾周闕趙時詰蔡節徐夢衍莊同孫謝奕勲髙衡孫林存楊纘吳子明何夢桂全清夫謝奕燾史越翁趙時槖已上理宗時任項公澤孔應得趙必槐李庚知安吉州趙良淳字景程知安吉州已上度宗時任陳太素字仲華緱氏人劉越字子長大名人鄧綰字文約成都人已上未審其次知婺州軍閻象張獻可張鑑商致周徐繼宗薛智周刁衎見前馮伉陳靜莆田人已上太宗時任樂和楊坦趙沂髙驤張庶凝劉益李朝安徳輿許載鄭天益辛若沖吳植周歸正已上真宗時任查拱之舒䧺唐冕魏昭慶皇甫泌劉滋林洙再知晁宗簡淳于佺賈守約張倣戚舜舉闗詠花尹陸廣趙温瑜余良孺張子立盧革字仲辛徳清人孫奕徐仲謀已上仁宗時任章峴周復已上英宗時任馮潔已錢藻字純老和州人蘇頌字子容泉州人章汝賢衛淇徐聰鍾離景伯蘇畋范子明燕若拙汪澥字仲容旌徳人已上神宗時任王彭朱服字行中烏程人張夀李皇臣唐彀謝履孫載崑山人畢從周王仲甫已上哲宗時任林可陳知存施結沈錫字子昭真州揚子人周秩詹適字徳逺縉雲人蔣猷金壇人許㡬字先之貴溪人呂淙袁灼劉安上字元禮永嘉人徐敷言黄特許徳之楊應誠范之才呂灝黄權已上徽宗時任孫近欽宗時任蘇遲字伯元眉州人沈晦見前曽開見前傅崧卿字子駿山隂人李光字泰發上虞人歐陽懋王居正字剛中揚州人李擢周綱吳興人再知孟庾張守見前范沖字元長蜀人梁汝嘉見前林季仲曽統孟忠厚字仁仲向宗厚吳表臣字正仲永嘉人林待聘錢端禮見前周三畏湯鵬舉見前趙不羣曹璉季琛李椿年浮梁人辛次膺字起季萊州人汪應辰字聖錫玉山人張綱字彦正丹陽人章复周葵見前吳芾見前陳槖字徳膺餘姚人已上髙宗時任王時升周執羔字表卿趙不猷李茗川王曮李衡字彦平江都人曽懐周淙見前周權韓彦古劉度洪邁見前韓元吉字旡咎潁川人再知鄭伯熊字景望永嘉人張津見前林光朝字謙之莆田人李椿字夀翁永年人王正已張揣蘇嶠眉州人蕭燧字照鄰臨江軍人范成大見前錢佃字仲耕常熟人李彦頴字秀叔徳清人蔣繼周青田人再知趙師揆錢象祖端禮孫已上孝宗時任趙不流尤袤字延之無錫人趙師龍葉翥黄度新昌人已上光宗時任虞儔陳騤字文叔臨海人木待問王恬劉徳秀趙伯璝丁逢曽㮚吳璹李景和張栁吳琯李大異趙思石譙令憲劉頴見前趙善下孟猷林祖洽趙師端丘夀雋林拱辰平陽人陳纘王補之黄灝字商伯都昌人趙㦛夫樓鑰字大防鄞縣人汪綱見前葉時字秀𤼵仁和人俞應符鄭如岡趙師嵓魏豹文徐榮叟字茂翁王伯大徐青叟字真翁已上寧宗時任王夢龍莫澤趙崇模李宗勉字强父富陽人余天錫字純父昌國人趙必愿字立夫餘千人趙汝談字履常餘杭人趙立夫陳康熙吳昌裔中江人趙與懃史彌鞏字南叔陳晉接趙汝騰見前許應龍閩縣人張磻字渭老福州人蔡範蔡抗字子直宋城人陳塏見前再知陳顯伯林彬之章清生謝奕修楊棟字元極青城人杜範見前施退翁李光輔吳勢卿趙希棼孫子秀見前趙崇絢趙希恱黄巖人賈明道已上理宗時任陳綺曹孝慶項公来趙汝楳趙孟傳曹良朋趙與稙已上度宗時任劉怡㳟帝時任知眀州軍知慶元府王素字仲儀徐休復字廣初鄄城人趙易知吳懋錢象先陳矜孫扶丘崇元一作先陳充字若虚成都人胡旦字周父濵州渤海人凌景陽鮑當徐繼宗已上太宗時任丁顧年王膺蘇耆范諷康孝基劉綽李夷庚曽㑹燕肅字穆之益都人郎簡字叔㢘臨安人劉賡已上真宗時任張交李照林殆庶徐起張弇席平李制鮑亞之錢延年陸軫王周范思道沈扶錢塘人孫沔見前安楨呂昌齡沈同齊廓字公闢鮑軻錢公輔字君倚武進人陳襄見前郎玘已上仁宗時任李思道俞昌年苖振王罕字師言華陽人趙誠李綖李定字資深揚州人曽鞏字子固南豐人王誨馬珫已上神宗時任韓晉卿字伯修宻州安丘人王汾韓宗道李萃李閲王子淵張修傅堯俞字欽之鄆州湏城人劉淑呂溫卿姚勔劉珵王子韶葉濤鮑慎由字欽止處州龍泉人韋驤字子駿錢塘人已上哲宗時任陸傳王資深葉棣吕昌齡彭休白同錢景逢宋康年檀宗旦蔡肇李圖南吕宗一作淙周秩周邦彦字美成錢塘人毛友樓異字試可奉化人李友聞再知蔣彞蔣猷金壇人趙億魏憲李弼儒李茂誠綦崇禮見前已上徽宗時任蘇擕金受沈晦見前張汝舟劉洪道向子忞吳懋陳戩陸長民李承造郭仲荀仇悆見前再知周綱潘良貴字子賤金華人梁汝嘉見前莫將秦棣徐琛曹泳韓璡李莊王㑹李㳘方滋王俁姜師仲趙善繼程克俊張偁沈該字約父歸安人韓仲通已上髙宗時任趙子潚見前張津字子問龍泉人趙伯圭再知魏王愷孝宗子范成大見前趙益謝師稷楊獬趙師夔耿秉延璽岳甫林栗見前已上孝宗時任程大昌見前林枅虞儔髙夔朱佺何澹字自然龍泉人已上光宗時任林大中字叔和永康人李大性葉翥吳琚鄭興裔俞豐陳把趙不迹李沐黄由趙彦逾李景和趙善堅傅伯成俞烈字若晦臨安人魯幵程凖王介見前程覃見前韓元禮俞建章良朋趙師嵒齊碩已上寧宗時任胡榘見前鄭損牛大年游九功王定趙與􅊸見前陳䀭鄒應龍字景初趙善湘見前趙以夫余天錫陳愷長樂人黄壯猷趙綸顔頥仲章大醇馬天驥見前蔡節趙與懽見前趙與堅趙汝暨厲文翁見前再知陳昉吳潛見前余晦潘牥見前姚希得字逄原潼川人李曽伯王爚見前楊棟字元極青城人朱熠温州平陽人已上理宗時任葉夢鼎見前謝子强范東叟洪燾見前鮑度劉良貴陳存趙孟𫝊劉黻已上度宗時任陳太素見前沈與求見前已上未審其次知靜海軍知温州軍知應道軍知瑞安府范旻字貴參大名人宋初知靜海軍事呂備宋初知靜海軍事韓甫以下知温州軍呂畋姚克明袁廊臧處田孫蠙何士宗王扶何䝉字叔昭洪州人王贄已上太宗時任楊坦杜夢徴史昭文陳若拙字敏之盧龍人孫諒李徴用李邈胡則見前夏昭文吳耀卿葉温髙謹交耿肱已上真宗時任樂良楊塤劉起邉調苖禎黄禹昌張昷之字景山錢致堯畢世長周世南左瑾孫梁張式劉立言劉述陳求古王孝和沈紳楚建中戚舜舉商臻周延雋黄賁鄭紳已上仁宗時任張倜孫昌齡胡淮董揚休已上英宗時任石牧之字聖咨新昌人李鈞姚元吉劉斁范峋郟亶字正夫太倉人張濟楊蟠字公濟章安人已上神宗時任秦玠石景立已上哲宗時任滕公立章憑呂由誠郭敦實沈延嗣劉既濟王汝眀周煒徐韶美韓思誠已下知應道軍閭丘鶚蘇起莫砥已上徽宗時任唐懌欽宗時任盧知原見前以下仍知温州軍趙億林之平洪擬字成孚丹陽人再知韓肖胄見前程邁趙思誠范宗尹字覺民襄陽鄧城人章誼字宜叟建州浦城人秦檜見前李光見前樓炤字仲輝永康人王居正字剛中揚州人髙世則程邁閭丘昕字逢辰麗水人梁汝嘉見前何鑄字伯夀餘杭人張澄趙不羣見前周奕髙百之張九成字子韶杭州人王大賔字元龜湖州人黄仁榮周綰唐文若字立夫眉山人庚之子徐林莫若虚已上髙宗時任袁孚王恱劉孝韙王逨王之望字瞻叔榖城人劉夙劉敏大曽逮王伯庠鄞人莫濟周􅊹洪邦直韓彦直字子温延安人胡與可陸之淵汪義端見前李棫沈樞字持要安吉州人樓鑰見前湯碩已上孝宗時任趙師龍孫懋謝源明已上光宗時任曽炎潘燾王煥章毛憲奚士遜趙孟極錢仲彪王保大呂友直施椷楊簡字敬仲慈溪人莫子純㽞元剛鞏嶸劉允濟王夢龍趙汝鐺王居安字資道黄巖人已上寧宗時任徐清叟字真翁徐澄宋濟俞建史宜之司馬述潘槱陳塤字和仲鄞人王定史彌忞趙汝談見前吳泳字叔永潼川人趙汝騰見前趙與懽見前趙汝鐩劉竑夫程次中劉漢弼字正甫上虞人謝奕修趙師蔡詧陸徳輿馮去疾葉大有潘大臨見前魏克愚王克謙趙汝楳印應雷程沐王爚見前季鏞林存趙希㤞李芾見前呂有年已上理宗時任江萬頃已下俱知瑞安府國材鮑成祖王亞夫趙崇鐖趙與已上度宗時任陳䝉方洪李珏趙與擇已上恭帝時任趙汝讜字蹈中已上未審其次台州刺史知台州軍余仁徳裴迎錢昱字就之臨安人再任杜叔詹錢郁裴祚王儼王通已上宋初未納土時刺史畢士安見前已下知台州軍韓範鄭元龜王源張蔚渉緯解損上官知闕查陶已上太宗時任曽㑹王有孚曲蘋康秉趙昻康孝基章得象字希言泉州人劉起王式丁顧言劉炤潘華劉有方再知已上真宗時任劉希元畢世長劉嗣隆胡晏范說王蘭李防張益之周越彭思永廬陵人元綘見前闗魯吕士宗馬仲甫字子山廬江人孫礪劉宗孟李頎徐億燕卞已上仁宗時任周延雋葛閎已上英宗時任吳可㡬錢暄惟演子江寛栁安道陳公琰吳安度李撫辰已上神宗時任葉康弼陸長蒨石賡張􅐂沈逈王柄樓常已上哲宗時任楊固李孝節李諤呂康卿李春卿石悈孫實范祖述成都華陽人趙資道李景淵李纁陳敏字伯修無錫人黄滂已上徽宗時任劉光鄒柄字徳久晉陵人段敏學再知謝克家上蔡人方誾晁公為孫近秦梓見前虞沆王昴錢稔劉棐張致逺字子猷南建州沙縣人趙思誠陳槖字徳應餘姚人王居正見前曹戬孫逸黄子游李光見前李彌綸胡交修晉陵人張偁吳似一作以曾惇建昌人宗頴吳溫彦蕭振見前張昌蘇䇿劉景曽㡬