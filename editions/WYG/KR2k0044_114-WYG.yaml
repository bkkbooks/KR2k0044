中錢可則天台人郭自中錢槐卿趙孟議已上理宗時任史胄之楊湖南趙與稙呂直之李莱老方回字萬里歙人已上度宗時任韓贄字獻臣長山人鞠嗣復已上未審其次知秀州軍知嘉興府王恕饒陽人栁植字子春真州人已上太祖時任安徳裕王炳中黄震已上太宗時任元玘劉師道見前羅拯字道濟祥符人耿肱字天来揚州人錢藻字純老和州人葛宫字公雅江隂人已上真宗時任葉清臣見前張㡬聖林希字子中張徳甫錢缺名字集仙令狐挺聶厚載向宗良字景弼已上仁宗時任錢顗字道安無錫人英宗時任周邠吳司文吳安世劉寧止字無虞歸安人韓瓘字徳全開封人已上神宗時任沈括見前李常字公擇張復已上哲宗時任錢遹字徳循浦江人毛滂字澤民江山人姚憲字令則嵊縣人樓异字試可奉化人宋昭年已上徽宗時任趙叔近魏悼王五世孫蔡崈程俱字志道衢州開化人黄灝字裔伯都昌人鄧根字深伯昭武人程少卿方滋字務徳桐廬人蕭祀曽統王禔趙霈秦梓劉阜民王安道李孟堅林衡趙子晝燕懿王後已上髙宗時任張瑜徐蕆字子禮吳人張琯丘崈見前鄭伯英字景元永嘉人陳騤字叔進台州臨海人汪義端見前黄大卿韓彦哲張元成字純一趙善悉字夀卿趙彦瑜孫夢觀字守叔慈溪人唐璘字伯玉古田人已上孝宗時任愈豐龎籍字淳之單州人喬行簡見前趙不迹王介見前已上光宗時任趙希道王補之澶淵人程卓黄大卿岳珂字了山湯隂人商逸卿呂正已字穆叔吳潛見前史宅之倪祖常朱煥潘師旦陳肖孫奉化人鄭一作趙定劉漢弼字正甫上虞人已上寧宗時任莫叔益趙與􅊸見前朱士麟字在樂林良鄭穎黄壯猷俞浙謝子强趙孟善潛說友見前王鑄劉炳吳昌裔見前方岳王起宗趙與訔見前謝瑩天台人張寺丞皮龍榮字起霖醴泉人陳塤見前陳著字子㣲奉化人謝奕燾潘墀已上理宗時任趙景緯字徳夫於潛人王缺名字畬齋已上度宗時任文及翁字時學綿州人金安裕劉漢傑已上恭帝時任李鳴復字成叔瀘州人未審其次兩浙總管幹轄司趙子崧字伯山燕懿王後湯東野張思政史康民李顯忠見前張子盖字徳髙成紀人李寳河北人已上髙宗時任龍大淵曽覿見前姜特立字邦傑麗水人已上孝宗時任吳端光宗時任楊應龍陳源已上理宗時任毛獻忠㳟帝時任何灌字仲源祥符人未審其次兩浙兵馬都監翟守素濟州任城人弭徳超滄州清池人周瑩已上太宗時任蔡遵項坦已上徽宗時任栁約見前吳挺字仲烈隴干人已上髙宗時任王霆字定叟東陽人副監王安節副監已上理宗時任康湑木審其次都廵檢司周瑩瀛州景城人太宗時任楊允恭漢州綿竹人侍其曙字景升已上真宗時任秀州武職王子武秀州統軍徽宗時任朱勝非秀州控扼使王復古澉浦鎮統軍寧宗時任尚景澉浦鎮統軍淳祐五年任邢子政澉浦鎮統軍淳祐七年任胡全澉浦鎮統軍徳祐時任劉英乍浦統制官徳祐時任浙江通志卷一百十五
