body:
  text: 浙江通志卷一百九十九仙釋二嘉興府三國吳康僧㑹陳剛中康僧記康居國人即其所居因謂之康僧吳赤烏十年自其國來抵建業設象教吳主權召問對曰如來聖蹟忽踰千歳遺骨舍利神曜無依吳主曰若得舍利當為起塔乃請期越三七日忽間銅瓦鏗然有聲視之果得舍利吳主驚異為起塔寺海鹽縣圖經兹方金粟亦㑹所建㑹尸解後真身一現水欣再現金粟竒骨瘦露眉間時放光明顯靈異之蹟南北朝陸逸沖海鹽縣圖經字敬游陶隠居弟子誠慤恬澹志逺栖逸齊永明中隱居於西嶺立華陽館七年而後成逸沖之力也隱居嘉其勤勩名為栖靜處士作十賚文䇿之許長史碑隂手書上清衆館弟子亦以海鹽陸逸沖稱首焉張元之茅山志嘉興人建武中敕為宗元館上又於􅌲山澗上築臺以居時有白鶴來止遂名鶴臺法寵海鹽縣圖經姓馮氏納妻半歳捨家入邑之光興寺出都徧學經論探𤣥析奥音吐藴藉名學罕不倒戈號上座法師張融與周顒書法寵法師絶塵如棄唾若斯之志大矣逺矣慧開續髙僧傳姓袁氏吳郡海鹽人初出家為宣武寺寵公弟子仍從學阿毗曇及成實論建武中游學上京住道林寺歴聽藏旻二公經論後移住彭城處衆演教咸慶新聞同寺有曇儁者以游學顯名通貫衆經兼勤禮誦侍中王慈司徒長史江革並與之朋游焉隋慧因續髙僧傳姓干氏吴郡海鹽人晉太常寳之後出家開善寺又造長干辨法師稟學三論踵武傳燈將三十載陳僕射徐陵尚書毛喜咸歸導首隋仁夀三年起禪定事奉為知事上座訓肅禪學以貞觀元年卒於大莊嚴寺春秋八十有九唐徐彎洞仙傳吴郡海鹽人少有道炁錢塘杜氏女患邪彎召魅見著白衣入門彎一叱即成白龜一旦與羣從兄弟數人登石﨑山斫柴日暮不返明旦尋覔見彎在山上腋挾䥥倚而不動或乃抱彎惟有空殻錢朗神仙通鑑字内光師東嶽道士徐鈞得補腦還元服煉長生之術昭宗時彭城王錢鏐慕朗得道長年乃迎就錢塘師事之檇李詩繫唐開耀間居嘉興魏唐鎮之神仙宫年一百五十餘歳尸解去有遺詩於壁法相髙僧傳姓俞氏吴郡長水人大歴中於上京習毗尼道諸部同異無不該綜傳法東歸請學者如林吴郡太守奏於開元寺置戒壇相預臨壇之選㑹昌元年二月十日告弟子清濬清高曰吾當滅矣右脇而逝時衆聞管絃清亮乃天樂也光範續文獻通考為童子時事靈祐師學通經紀初居嘉興空王寺更居靈光寺與其徒講贊數言百流㑹歸之說自吴南北郡邑咸來受法著釋㑹章句十五卷良準海鹽縣圖經大中咸通間法喜寺僧也業四分律慧行精通有塔葬本寺棲鳥不止時放瑞光司空曙有寄準上人詩文喜佛祖通載語溪人姓朱氏開平間進具初習四分律兼講法華嘗徃五臺山禮文殊大士夜投古寺遇老僧問南方佛法住持衆數師皆荅已却問此間佛法如何住持僧曰凡聖同居龍蛇混雜又問多少衆僧曰前三三後三三師惘然茶畢令童子送出門俄失所在但見高林深谷而已後參仰山􅆻悟命為典座一日見文殊跨獅子縁鼐側師訶曰文殊自文殊文喜自文喜遂掌之文殊湧空曰苦瓠連根苦甜𤓰徹蒂甜修行三大刼却被老僧嫌咸通中築室千頃山居之光啟三年錢武肅王請住餘杭慈光院奏賜紫衣及無著號光化三年移住無著院是冬夜半告衆曰三界心盡即是湼槃趺坐而化時方丈發白光垂樹同色建塔靈隱之西塢五代譚峭筆叢字景升唐國子司業洙之子師嵩山道士十餘年得辟榖養氣之術周游無所不之夏則服烏裘冬則緑布袍或臥於風雪霜中經日人謂已斃視之氣咻咻然海鹽縣圖經邑中譚仙嶺相傳是其煉藥得道處仙鑑載峭詩線作長江扇作天靸鞋抛向海東邉蓬萊元是無多地只在譚生拄杖前此尤其寄跡海嶠之證成化間遷善橋居人陸麒樓懸仙翁像一日隣人滕晟見仙從樓牕上冉冉向東北乗雲渡海去虛受髙僧傳嘉禾禦兒人納戒後於上都習學内外博通傳講數本大經論不憚宣導廣明中抵越大善寺講湼槃維摩二經因憤謙雅等師釋崇福疏繁略不中遂撰義評鈔十四卷餘則法華百法惟識各有别行義章武肅王錢氏按部至越遂出謁見王素嚮風乃加優禮言勞再三乾化中於㑹稽開元寺度戒命充監壇選練吴㑹間行此職者自受始王表於朝薦其紫衣至同光乙酉歳終文偃十國春秋嘉興人姓張氏㓜依空王寺志澄律師出家最後抵靈樹參如敏禪師繼如敏開堂高祖親臨請益文偃曰目前無異路高祖大加欣賞文偃倡道靈樹雲門凡三十年機縁語句實立雲門宗之始佛祖統紀乾徳元年雄武推官阮紹莊夣雲門禪師令上奏乞開塔有㫖韶州守臣開視見師真身如生乃迎赴闕供養逾月遣送還山中諡大慈元真宏明禪師國朝雍正十一年明禪師勅封慈雲匡真𢎞皓端髙僧傳姓周氏嘉禾人九歳捨家入靈光精舍師受經法如温舊業於四明阿育王寺遇希覺律師盛揚南山律端一聽旋有通明武肅王錢氏召於羅漢寺演訓復令於真身塔寺宣導於時有台教師元燭者彼宗號為第十祖端依附之果了一心三觀遂撰金光明經隨文釋十卷由是两宗法要一經路塗忠獻王賜紫衣别署大徳號崇法焉後誓約不出門慕逺公之不渡虎溪也著述傳録記讚七十許卷宋李道人續文獻通考紹興初劉延仲寓秀州常有道人過門或求藥則以涕和垢膩為丸與之因目為李鼻涕延仲與坐曰今適無酒為禮道人笑曰牀頭珍珠泉何不出以待客劉大笑呼童取樽道人曰但將一空瓶來瓶至索紙覆之少焉香溢於外座者皆醉明日劉有他客出所謂珍珠泉者中空無涓滴一日請劉别曰後二十年某月日當於真州㑹至期劉卒於真州殳基正徳崇徳志遇異人授以導引之術入千金鄉山原數年趺坐而化名勝志基居山數年坐化其徒收瘞之惟有巾氅故以其姓名山唐介壽名勝志居於蕩岸得異術能役使鬼神咸淳二年海潮衝齧錢塘介壽用朱符投之江患遂却詔授道録以其所居為福源宫萬厯嘉興府志介壽號隱梅西塘人湯道亨萬厯嘉興府志自號赤腳道人宋季引一猱云自金陵來猱大如人能主給使亨夜坐時舒光邦人推異爭飯之豐薄不謝苐言分定云施與日多因構菴以居名曰太古以延竚四方雲水之客久之有軍士戱烹其猱食之亨即齎咨與所親訣别手偈云八十一年饒食終日化縁不歇重陽時節歸家一路清風明月子璿佛祖通載長水法師子璿嘉禾人初依洪敏師學楞嚴至動静之相了然不生有省聞瑯邪惠覺禪道重當世趨徃至其門值其上堂致問豁然大悟覺謂曰汝宗不振久矣宜勵志扶持以報佛恩師如教後住長水衆幾一千以賢首宗㫖述楞嚴經疏十卷真如寺古蹟記師自作䟽文未作夣文殊入口既了夣出於口䟽成紙為之責聽者雲集夏文莊公奏於朝號楞嚴大師智訥徑山志妙空訥禪師秀州人舊嘉興府志住持徑山規律甚嚴嘗執鼔槌以警衆人稱訥鼓槌一日正升座荅問間有僧舉普化和尚話且曰能作如此去否曰如何去不得即於座上合掌端座而逝清辨司馬光法堂記秀州真如草堂僧講堂卑狹不足休學者清辨與同術惠宗治而新之光曰師為是堂將以明佛之道也是以深思於本源而弗放蕩於末流則治斯堂之為益也豈其細哉寳安續文獻通考蘓州人姓夏親運土石於精嚴寺立五臺院時已八十餘歳不依絲縷寢臥亂草深明宗㫖寂後肉身不壊闍維空中盤旋化畢祥雲始散一長老東坡志林秀州本覺寺一長老少蓋有名進士自文字言語悟入至今以筆硯作佛事所與游皆一時文人嘉興府志一長老能談未來事者忽指墖語近寺王生曰煩為守此王哂曰恐冇力負之而趨耶越两日墖自摧壊同時有夏和者近郊人亦在寺容服垢膩嘗瞑目坐人或見和在數十里之外長老與和獨厚見輒握手笑談和後坐亡於墖法常續傳燈録嘉興報恩首座開封人丞相薛居正之後宣和七年自湖湘至萬年謁雪巢機契命掌牋翰後首衆報恩室中惟一矮榻餘無長物庚子九月語寺僧曰一月後不復留此十月二十一將曉書漁父詞於室門就榻收足而逝詞曰此事楞嚴嘗露布梅花雪月交光處一笑寥寥空萬古風甌語廻然銀漢横天宇蝶夣南華方栩栩斑斑誰誇豐千虎而今忘却來時路江山暮天涯目送鴻飛去從進當湖宋元髙僧録妙年聰辨久依超果具得其道出主得藏講訓有法學者歸之作楞嚴觧尤高妙示寂留龕月餘容色不變及從火浴舌根不壊若紅蓮華淨曇五燈㑹元嘉禾人晩住錢塘之法慧紹興丙寅夏辭朝貴歸付院事四衆擁眎揮扇久之書偈曰這漢從來没縫罅五十六年成話欛今朝死去見閻王劔樹刀山得人怕遂打一圓相曰嗄一任諸方鑽龜打瓦收足而化可觀佛祖通載字宜翁華亭戚氏年十六具戒依南屏精㣲師聞車溪擇卿聲振江浙負笈從之一日聞舉唱般若寂寥忽有悟入建炎初主嘉禾壽聖遷當湖徳藏居閱世堂為楞嚴補注乾道七年丞相魏杞請主北禪適當九日指座云胸中一寸火已冷頭上千莖雪未消老歩只宜平地去不知何事又登高復歸當湖竹菴無疾而逝壽九十一慧梵至元嘉禾志字竺卿石門顧氏子受具羔羊澄寂院持守最嚴傳宗㫖於天竺如虎子學詩於石室陸維仲性至孝縳茆奉母扁曰蓬居居側植梅水仙不知數暇日寫二花真亦極其妙得筆法於梵隆茂宗也壽八十九有蓬居集元張與材元史列傳元貞元年與材嗣為三十八代襲掌道教時潮齧鹽官海鹽两州為患特甚與材以術治之一夕大雷電以震明日見有物魚首龜形磔於水裔潮患遂息嫏嬛記與材善畵龍晩年修道嬾於舉筆人有絹素輒呼曰畵龍來頃之忽一龍飛上絹素即成畵矣畵髓元詮與材字國梁號薇山别號廣㣲子封留國公坱圠子两浙名賢外録姓蔣氏嘉興人渉獵經史言辭簡邃鬔首垢面動静不覊元至正初抵松江坐太古圛室已則歴市㕓狂走人呼為風子一夕叩沈蒲團門大呼曰將蒲團來坐我沈異之導詣蔬圃中坐地沈有所省發遂委俗傾身服役為弟子由是四方崇向爭施與以其地為菴嘗有問者曰近思録定然後始有光明是金丹否坱札子曰賢且去味中庸又嘗手書示沈曰不偏不倚立於中不著西邉不著東超出東西南北外一毫頭上釣蒼龍一日語沈曰吾乗化盡矣言絶而蛻䝉潤稽古續集字玉崗海鹽人生時母感異夣禮伽藍土偶皆仆居風篁嶺專精念佛修法華光明大悲淨土以七七為期後示弟子止觀安心之法稱佛而逝清珙當湖宋元髙僧録字石屋常熟人族姓温依崇福永惟出家登天目見高峰授萬法歸一語服勤三年至建陽西峰見及菴豁然有省曰清明時節雨初晴黄鸝枝上語分明菴頷之與衆言曰此子乃法海中透網金鱗也後當湖新創福源禪者刹馳檄敦請為第二代住持大開鑪鞲鍜錬學居七年以老引退元詩選傳至正間朝廷降香幣旌異賜金襴衣所著有石屋詩真諦樂郊私語徳藏寺僧性若戅騃而恪守戒律苐為寺中樵汲而巳時楊璉真伽來寓寺中聲言欲發陸左丞女朱提舉夫人墓真諦聞之怒形於色及楊五鼔肩輿發衆出寺真諦忽起抽􅅊䭾木杵奮擊時衆雖數百皆披蕩不能拒人見真諦於衆中超躍每踰尋丈若凖撇虎騰非人力可到楊大懼謂是韋䭾顯聖遂率衆而去後三年真諦行腳峩􅔞不知所徃僧尚貝瓊髙麗宗主尚希古塔銘族姓浦字希古檇李人生有異質七歳母授孝經一過即成誦不忘十歳好佛書十二歳見紫㣲山惠力僧覺海祝髪為沙彌既長聞景巖福公住崇徳之常樂因徃參焉晝夜究華嚴觀福公恱其頴悟曰異日樹教東南者必尚也及侍福公於杭之髙麗五年昇座說經吐音如雷龍象大駭僉舉為都講天歴戊辰領宣政院劄住常樂至元戊寅還臯亭之崇先益闡其祕名聞於朝賜號慈峰妙辨大師閱七年退處禦溪别峰蘭若至正十年江浙行省太尉丞相尊其道遣使延之高麗特受御製金襕袈裟二十二年冬茶毘於長平鄉之石頭里三夕有神光射天明冷謙廣輿記字啟敬秀水人洪武初為協律郎郊廟樂章皆其所撰有友酷貧謙於壁間畵一門令其友入恣取金錢以出而不覺遺其引他日内庫失金守吏持姓名跡捕之因并執謙謙渴求飲拘者以瓶汲水與之謙躍入瓶中拘者惶急謙曰無害苐持瓶至御前上呼謙瓶中輒應擊碎之片片皆應後有人見謙蜀中泳化𩔖編謙遇異人授中黄大丹傳張氏契真之㫖年百餘歳如童顔謹按謙本武陵人僑居嘉興春波門内今府治東北碧漪坊有謙祠里人祈夣多驗明季楚中傅汝為未第時輒夣謙通名造之後任秀水縣令始悟為葺冷仙亭周元真名山藏居嘉禾紫虛觀從李拱瑞為道士拱瑞南谷杜真人高弟也授元真劾召鬼神之術尋受靈寳大法於曹桂孫郡縣請禱輒有奇應洪武元年京師旱李善長迎元真至設雷壇冶城山硃書鐵符投揚子江中波濤遽興元真夜半斗下存神窈㝠雷電達旦明日握劍上壇召風師霆伯誓之俄隂雨翻盆大風㧞木元真曰未也明晨當再霑足至期黑龍蜿蜒見西方迨午始霽元真不獨有術事父母至孝云張復陽兩浙名賢外録平湖人自言張果老後身棄家為道士妻亦感悟為尼復陽修煉精勤明周易姤復之㫖作復陽圖善詩畵書法遒羙年八十餘顔澤不枯歩履輕㨗卒之日體柔如生檇李詩繋復陽宣徳中為朝天宫道士又主餘杭羽霄宫正統中居郡城南宫一枝堂郡邑志誤入宋人沈嵩高萬厯嘉興府志秀州象賢鄉人㓜從蔣大方學五雷法居清真觀為道士成化間郡大旱知府徐霖召嵩高用虎骨攪龍潭不旋踵大雷雹雨霑足霖喜以詩謝之又范教諭官舍晨夕空中抛擲瓦礫嵩高曰此土怪也温元帥掌之書二符與之即止其他治病伏邪多驗金宗周儁季詩繫字歸儒嘉興玉樞院道士徧游名山歸即樓居寒暑一裘結髪如氊爪如鉤或數日不食或并日而食人呼為金仙能出陽神化形至西湖滸遇唐太史荆川與之化席曰我玉樞院中人唐不荅偶登岸入院見一道士坐定身下席為火所灼後倭寇至見其入定羅拜而去嘉靖中作詩化去徐月汀海鹽縣圖經字湛虛棲真觀道士能詩觀圮壊月汀倒槖興葺其自述有人愚自墮移山計天漏誰傳補石方之句又題自像云我也明知假而何便說真誰教為我者認作是前人明詩綜名淵又字秋沙海鹽人有水月軒集魯質嘉興府志楊匯村民每食餅糗輒碎以飼蟻子家窰多蚊質徃居三年夜不設帷祼以受嘬蚊害頓减一日詣所親客至乏魚質探袖中出魚既而語人曰鶴來我即徃矣一日有鶴翔其上火從口岀自焚徳昂正徳崇徳志號伏菴從親避地石門元末遭兵其母禹氏執節投河其父倉卒葬之鎮側而去未幾父亦歿於兵昂無依出家義烏廣愛寺稍長精通内典為叢林耆碩兵事方殷日夜虞其母墓或毁乃渡江省墓石門修治之㑹修元史昂亟走京師以其母死事告於史氏遂得列傳已還石門治墓扁其居曰白雲先隴里人表曰貞母阡法聚徐滑聚禪師傳姓富氏嘉禾人去俗從師海鹽之資聖寺至金陵參夣居禪師問如何不落人圈繢居與一掌師大悟自是徃湖郡居天池山二十餘年登坐説法趨道者甚衆嘉靖癸亥示㣲疾沭浴更衣履而逝列朝詩集傳號玉芝好為韻語忽自謂出家兒當為身死嗜此何益遂誓志參學觀陽明傳習録謂與禪理不殊乃以偈趨叩陽明以偈荅之西還結廬於澉湖之悟空山中普明檇李詩繫字寂照嘉興人出家嘉善妙常菴後居杭之西山每静坐蛇鼠鳥雀嬉游於前客至輒納諸懐以衣覆之一日歸妙常語弟子曰待桂枝香我西游也届期弟子來送明方埽地曰汝不來吾幾忘矣遂鳴鐘集衆作偈而化藴空舊嘉興府志姓沈嘉定人㓜習儒業十九祝髪苦修梵行諷覽經文鉤深扶㑹極㫖歸著法藏司南四十五卷又謂大般若經有二十萬頌世惟金剛般若一卷餘皆久晦藏函更參酌晉唐著箋注五十五卷嘗兩渉天台一詣徑山恒居裹足杜門未嘗踰户限也一日病篤法軰問師病體何如荅曰薪盡火滅不知所苦遂合掌瞑逝明秀眀詩綜傳字雪江自號石門子海鹽人祝髮天寧寺晚居錢塘勝果山有雪江集王伯安謫龍塲驛丞雪江送以詩云蠻烟瘦馬經山驛瘴雨寒鷄夣早朝一時傳誦之臨終偈云一夜小牀前燈花雨中結我欲照浮生一笑浮生滅寂然舊浙江通志薙染於錢塘老僧月江密雲主育王天童追隨杖履多所印可然意勇好藏不見聲彩於育王掌樵㸑於天童理畚鍤即同參莫測所為也晚卓錫青芝塢結茅種松自號凷菴所著隱菴集選燔剰集及散語行世法嗣炤徳建黙菴閉關三十年不出有水邉居詩稿山中草雪空嘉興府志初為行脚萬歴己未正月至鄉民夏姓家留齋空言今日汝家當有難可亟移夏從之晩火焚其廬空因留寓行堪輿述為主人擇地居半年一夕忽曰吾去矣更衣沐浴而逝逾時復醒曰我誤矣不宜死於汝家即起大歩至聖堂從容謂衆曰我今的去即葬我堂後言畢果死衆具龕殮舉燭者誤以燭油漬空服上空忽作聲曰不小心衆驚肅急閉龕今塔在聖堂田中方澤列朝詩集傳字雲望後稱東谿族姓任嘉善人入精嚴寺薙染嗣法於濟法舟戒學俱高禀性頴㧞日誦萬餘言詩偈文字下筆無碍有華嚴要略二卷内外集八卷智舷明詩綜傳字葦如號秋潭秀水金明寺僧有黄葉菴集上人瓶錫舊地在金明寺湖天海月樓東有老梅横牕日吟詠其下後移郊西之黄葉菴村深水曲物外蕭然善行草書造請滿户限上人亦不憚煩有求者必應破山舊嘉興府志海明禪師蜀蹇氏子住東塔三年百廢具舉靜志居詩話張獻忠殺人之多較黄巢百倍相傳破山嘗勸賊帥李止殺賊帥以羊豕進曰和尚食此吾當封刄破山遂食之三昧舊嘉興府志律師也明季賜紫於金陵來住三塔講䕶國仁王經傾城向慕弟子見月住華山國朝明方舊浙江通志字石雨武塘陳氏子投法相薙染閱楞嚴我真文殊無是文殊義通身汗下參雲門澄得印授以斷拂子一柄遂號為斷拂子主寳慶過龍門戊子春示寂弟子奉其龕丈室中未幾山㓂突至欲燬龍門見師龕儼然舁出之竭百夫力莫能舉驚以為神捨去寺賴以存後闍維牙齒數珠不壊頂糝五色舍利通容舊浙江通志字費隱年十七參湛然和尚於華林寺繼徃廬山謁憨大師反復縱辨震威大喝作偈云吾年二十五氣宇吞佛祖不過古人關豈蹈今時路參天童悟和尚於吼山問覿面相提事凡七打所有知見渙然冰釋四十二繼席黄藥住金粟移大童主徑山國朝順治丁酉住福嚴凡五載殿堂寮舍百廢俱興辛丑示寂㣲笑而逝著有法語十四卷及五燈嚴統湖州府漢薊子訓武康縣志武康人明方術解分身之法後漢書本傳子訓不知所由來建安中客濟隂苑句有神異之道流名京師士大夫皆乘風向慕之後乃駕驢車與諸生共詣許下公卿以下坐上恒數百人皆為致酒脯終日不匱後遁去不知所止去之日惟見白雲騰起從旦至暮如是數十處時有百歳翁自説童兒時見子訓賣藥㑹稽市顔色不異於今後人復於長安東覇城見之與一老翁共摩挲銅人曰適見鑄此已近五百歳矣顧視此人而去猶駕昔所乗驢車也三國吳施淑女真誥山陽人施績女也今在易遷館東廂中謹按施績吴興人孫皓時為驃騎將軍守山陵誥云山陽恐女或出適取夫家郡也晉姚紾括地志村人姚紾嘗採樵遇仙及還家因入甕中隱身謂家人曰可七日弗開日限未至家人開之紾變為白鶴飛向五山沈羲神仙傳吴郡人學道於蜀中但能消災除病救濟百姓不知服食藥物功徳感天有三仙人着羽衣持節以白玉板青玉界丹玉字授羲羲不能讀遂載昇天西湖里語齊永明二年歸訪舊里呼諸孫謂之曰我是汝四世祖在西蜀以符藥治病有活人功上帝授我白玉簡為碧落侍郎今歸以告汝倐忽不見邑人駭異建道觀塑像以奉之宋崇寧大觀間有内庭女道官孫千霞夣一道士披彩霞衣言曰我武康人也在碧落中與子有夙縁及靖康亂千霞避地南依石防禦者家徳清之苕村一日石氏設醮道士姜景良與焉千霞以其夣告景良曰吳邑沈羲也千霞急詣羲祠瞻塑像曰真吾夣中所見遂捐金徧施黄冠而去後千霞於富陽太元山授徒數百人年八十有九忽髭髯叢生越三年而羽化南北朝陸修靜雲笈七籖吳興人生而異俗宋元嘉末因市藥京邑文帝味其風而邀之修靜不顧遂泝江南游嗜匡阜之勝㮣爰構精廬西湖里語修靜字見寂在鄉時嘗沒於烏程縣東水潭數月而出因目為仙潭著道徳雜説靈寳經目序歩虛洞章昇元歩虛章靈寳歩虛詞各一卷法瑤吳興掌故姓楊氏河東人元嘉中過江遇吳興沈臺真請居武康小山寺年過七十永明中勅吳興禮致上京僧喬續髙僧傳姓華氏吳興東遷人出家龍光寺聞僧旻説前修立義有諸同異則忘寢息又聽其語論轉捷則撫掌累歎隆昌之世與同寺僧整等請旻移住於是終晨竟夜一心􅖴求三四年間經論通逹旻曰喬公儒雅清虛履今用古善能讐校莫與争先此乃遺法之所寄也天監初卒隋智永尚書故實右軍孫住吳興永福寺積年學書禿筆頭十甕每甕皆數石人來覔書者如市所居户限為之穿穴乃用鐵葉裏之人謂之鐵門限後取筆頭瘞之號退筆塜自製銘誌書法要録煬帝嘗謂永師云和尚得右軍􅁏智果得右軍骨唐吳嶠龍城録霅溪人年十三作道士隋初過叢中告其令曰中星不守太㣲旺氣流萃於秦地子知之乎令不之信至神堯即位方知不誣嶠精明天文乃袁天綱之師也明道續髙僧傳姓姚氏吳興人隋末出家貞觀初行逹陳州逄勅簡僧歎曰出家𢎞濟務存許道豈以名貫拘滯一方乃棄擲寺宇至爍礪二師座下餐禀幽未盈凉暑聲聞超挺龍朔二年道行夙彰奉勅住東都天宫寺子瑀髙僧傳字真瑛姓沈氏吳興徳清人年未總角辭請出家如意中於洛京大福光寺受戒證聖中歸於大雲道場堅執律柄僧綱釐舉常禮一萬五千佛名兼慈悲懴日夜一匝或二日三日一匝或夜無燈燭心口是念圓光照室如坐月中慨徳清徧邑未有塔寺遂鋭懐營構前後寫經三藏凡一萬六千卷天寳十一年禪坐而終慧明髙僧傳俗姓陳氏年及丱捨俗受具習學律藏天寳五載爰止魚陂道塲登峰頂見東南有山蒼琅獨秀曰吾與此山宿有縁矣八載州將韋南金請𨽻寧化道塲固辭改隸佛川即疇昔魚陂所望之峰有吳王古祠風俗滛祀濫以犧牲明夜泊廟間見一丈夫容衞甚盛明曰居士生為賢人死為明神奈何使蒼生每被血食神曰非弟子本意人自為之因與受菩薩戒神欣然曰弟子願捨此處永奉禪宮後果移寺於祠側獲銅盤之底篆文有慧明二字焉建中元年示寂傳法弟子慧解慧敏如知三人齊翰髙僧傳字等至吳興沈氏子綺歳從父至山寺惻然有宿命之知固請出家至天寳八載奉㫖度名永定寺轉𨽻虎丘迹不近名身不關事長在一室寂如無人大歴十年入流水念佛道場是夜西方念中頓現即以其年終於本院抱玉佛祖綂紀吳興人入京受戒帝夣吳僧誦法華經口出五色光翌旦師入關關吏問何來荅曰善誦法華逺來受戒關吏以聞帝召見果夣中所見者賜坐誦經至隨喜品口角放光五色帝大悦令别築香壇特為受戒賜名大光封天下上座志鴻髙僧傳俗姓錢氏湖州長城下若人少出俗於石門鄉寺則梁静林也削染受具訖徃茂苑親道恒師囊括大慈靈㟧已下四十餘師記鈔之元勒成二十卷號搜元録大歴中華嚴疏主澄觀披尋乃為序冠於首春秋一百有八勅署為長壽大師道遵髙僧傳字宗逹姓張氏吳興人年二十詣天竺義威律師受具戒後學天台一心三觀法居支硎之福地天寳中於靈巖道場行法華三昧又於本寺入法華道場覩此身在空中坐先證者知是滌垢之相以興元元年七月告終猶子靈源樹塔旌徳焉真乗髙僧傳姓沈氏徳清人落髮配住八聖道寺得戒後西上京師雲華寺學法華天台疏義大著聲望貞元十二年徳宗幸安國寺充供奉大徳數焉游五臺山禮文殊後在䕶國寺禮佛名經一百周懴法之餘撰法華經解疏記十卷以元和十五年冬示寂終於本寺清晝研北雜記字皎然謝康樂十世孫釋氏稽古畧晝恥以文章名世嘗歎曰使有宣尼之博識胥臣之多聞矜道侈義適足以擾其性豈若松巖雲月禪坐相偶無言而道合至靜而性同吾將入杼止矣於是裒所著詩文火之髙閑宣和書譜烏程人寓湖州開元寺具戒律善草書宣帝時召對賜以紫袍加大徳號頗為韓愈所知作序送之言其書法出張顛流離顛沛必於草書發之故其變動猶鬼神不可端倪避暑録話唐僧能書者三人智永懐素髙閑也智永書全守逸少家法懐素但傳草書髙閑絶不多見惟錢彦逺家有其寫史書當慎其遺脱八字如掌大神彩超逸自為一家如訥五燈㑹元道場山如訥禪師目有重瞳手垂過膝自翠㣲受訣止於此山薙草卓菴學徒四至廣闡法化遂成叢社焉西吳里語唐中和間如訥出游師曰逄道即止訥經此山山故多虎訥䇿笻直上坐磐石虎伏其側結菴居之名其處曰伏虎巖後起廊廡佛殿塑千羅漢於中宗徹景徳傳燈録吳興人姓吳氏㓜歳出家依年受具參黄蘗希運禪師入室領㫖後至杭州州牧劉彦慕其道立精舍於府西號羅漢院化徒三百上堂僧問如何是南宗北宗師曰心為宗僧曰還看教也無師曰教是心後示疾遷化塔於院之北隅希元西吳里語逹摩嗣十七世居安吉上方寺上堂僧問曰牛頭未見四祖時如何師曰富嫌千口少僧云見後如何師曰貧恨一身多鑒宗五燈㑹元湖州錢氏子依本州開元寺大徳髙閑出家學通淨名師益經後徃鹽官決擇疑滯唐咸通三年住徑山七年示滅諡無上太師洪諲景徳傳燈録吳興人姓吳氏年十九禮開元寺無上大師落髪二十二徃嵩嶽受滿足律議徃謁雲巖後造溈山䝉稚頓除咸通六年上徑山明年衆請繼躅為徑山第三世於法即溈山之嗣光化四年九月白衆而化慧暢西吳里語居長興曲水寺不學於師而契印常織芒屩蒲履於山中一日謂弟子曰吾聞天台山有凱公遺跡思一徃焉言訖便行長城去天台八百里後有人自天台來計暢之程一日而至後忽令門人灑埽曰今日有客至齋訖趺坐而化五代韓必吳崧十國春秋唐末两人與吳珪吳頊皮光業林昇羅隱何肅同居長城八座山號曰八友已而稍稍散去武肅王時两人偕隱於落塢日以煉丹為事遣羅隱招之两人隱入石壁中至今名為二仙石壁令參景徳傳燈録湖州人自雪峰受記止於翠巖大張法席問古人拈槌竪拂意㫖如何師曰邪法難扶問不滯凡聖當機何示師曰莫向人道翠巖靈利錢王嚮師道風請居龍冊寺稱永明大師宋贊寧堯山堂外紀徳清人姓髙氏出家靈隱寺宋初徴入汴京為僧録太祖行香至相國寺問曰朕見佛拜是不拜是對曰現在佛不拜過去佛太祖喜遂為定禮太宗時撰僧史十卷充史館編修壽八十四十國春秋贊寧入天台山受具足戒習四分律通南山律著述毘尼時謂之律虎賜號明義宗文太平興國三年改賜通慧崇寧四年加謚圓明維琳霏雪録徑山長老無畏大士維琳湖之武康人在常州嘗以詩問東坡疾云我口吞文殊千里來問疾若以黙相酬露柱皆笑出淨端羅湖野録西余淨端禪師字表明歸安邱氏子六歳事吳山解空院寶暹為師既而觀弄獅子頓契心法乃從仁岳法師受楞嚴要㫖一日岳以經中疑難十數使其徒荅之端呈偈云七處徴心二不遂懵懂何難不瞥地直饒徴得見無心也是泥中洗土塊岳驚曰子知見髙妙必𢎞頓宗時齊岳禪師住杭之龍華端徃參禮不覺奮迅翻身作狻㹸狀由是叢林號為端獅子僧寳傳端髙自稱譽吐語奇怪病牙久不愈謂衆曰明日化去衆以為戲語請説偈端索筆大書曰端獅子太慵懶未死牙齒先壊爛二時伴衆赴堂粥飯都趕不辦如今得死是便宜長眠百事皆不管五更遂化閱世七十二東吳祠之以為散聖若愚名勝志覺海寺僧與參寥辨才同時有詩名臨寂偈曰本是無家可得歸雲邊雲路許誰知櫓聲揺落溪山月正是三潭夣斷時元頴佛祖綂紀吳興人政和間居智者院撰宋元録道樞續傳燈錄嬾菴道樞禪師吳興四安徐氏子初住何山次移華藏隆興初詔居靈隱孝宗召至内殿問禪道之要荅以此事在陛下堂堂日用應機處本無知見起滅之棼聖凡迷悟之别帝為之首肯後退居水安蘭若有偈題於壁曰雪裏梅花春信息池中月色夜精神年來可是無佳處莫把家風舉似人淳熙丙申示疾書偈而逝若觀西吳里語烏程人俗姓錢立行卓爾四方欽之後坐逝茶毗正值日輪當午舍利迸出光瑩奪目元莫沾乙名山藏湖州人生宋寶慶間從事禪觀脇不帖席者數年已自號月鼎入青城山丈人觀見徐無極授五雷法用是召雷雨破鬼魅動無不驗元世祖召掌道教事以老辭歸嘗與客飲西湖赤日如火客請假片雲覆之月鼎笑捨果殻浮觴面頃之雲自湖畔起翳於日下他日寓蕃釐觀道士中秋㑹飲觴既舉雲蔽月久不解月鼎以手指空雲散如洗人疢疾來告急或出蟹中黄篆符與之或摘草木葉噓氣授徃無不立愈一日召其徒王繼華示以化期及期瞑目而坐夜將半風雲雷電雨交作索筆書偈泊然而逝杜處逸西吳里語號道堅又號南谷子年十四得異書師葛䝉菴為茅山道士居武康計籌山昇元觀元皇慶間授隆道冲真崇正真人創通元觀作覽古樓聚書萬卷其弟子周徳方號廣莫子性好學扁所居曰不自恕齋坐臥一榻積書編閲不出山二十餘年一日手書形離知去同乎大通八字而逝若有異香云斷崖虞集斷崖禪師塔銘俗姓楊氏生湖州徳清縣能食不茹葷酒六歳始能言但從其母誦法華經年十七有禪者過之誦髙峰上堂語曰欲窮千里目更上一層樓忽曰此大善知識必能為人㧞釘去楔耳母異之具衣裝與之行見髙峰於天目山令提萬法歸一一歸何處語因名之曰從一他日過鉢盂塘見松上雪墜有省即詣峰呈頌曰不分南北與西東大地山河一片雪峰痛棒之不覺殞身厓下同學明通捫蘿接磴以救之則已出山半無所苦也還山之西禪菴自誓曰七日不證則決去矣未及所期豁然大悟馳至死關呼曰老和尚今日瞞我不得呈頌曰大地山河一片雪太陽一照便無跡自此不疑諸佛祖更無西東與南北峰歎其俊快歸徳清其母為賣簪珥同入武康上栢山結茅以居越五年還山見峰遂薙落改名了義㤗定三年歸坐祖廷者一載所謂正宗禪寺者也元統元年歳除日與禪者談笑至夜分乃曰老僧明日天台去也翌早跏趺而化二年賜號佛慧圓明正覺普度大師元粹稽古續集苕溪人有圓覺經集註等書行世覺岸稽古續集號寳洲烏程寳相寺沙門也博通古今嘗考釋氏事實年經國緯著為手鑑名釋氏稽古略李桓序云實能補國史之未周葺禪編之大備明沈道寧西吳里語號野雲烏程人居金波樓後隨四十二代天師冲虛子入龍虎山學道法應若神速道寧不習文字惟精於心契故其法異於人明一綂志朝廷累召禱雨皆驗深悅之賜三品告封為志道高士廣潤列朝詩集傳字等慈吳興人俗姓錢氏削髪於雲樓游虞山瞿元初延居拂水之精舍遂老焉臥疾載餘焚誦不輟堅坐念佛而逝葬於破山四髙僧墓國朝通琇江南通志字玉琳江隂人楊姓舊浙江通志石磬山天隱修禪師法嗣也結茅徑山凌霄峰邑中紳士請復歸報恩遂奉母於草菴而身堅守師塔順治十五年世祖章皇帝召見請還山遣官䕶送十七年春勅封大覺禪師屢世祖復念師道髙徳重又遣官再頒紫衣金印加封大覺濟禪師本年八月再召至京演法傳戒重封大覺普濟能仁國師又請還山歸住天目獅子正宗禪寺後十年示寂於淮安慈雲菴歸塔於武康之東塢菴寧波府周鬼谷子成化四眀郡志姓王名詡受道於老君入雲氣山採藥服之顔如童居清溪之鬼谷因以為號嘗游鄞太白山南滄嶴水簾洞名勝志山南懸崖瀑布名水簾洞上有鬼谷先生祠三國吳劉綱四眀洞天丹山圖詠集字伯經任上虞令與夫人樊氏雲翹居四明山皆得仙道一日坐大蘭山上登巨木飛昇太平廣記綱暇日常與夫人較術俱坐堂上綱作火燒客碓屋從東起夫人禁之即滅庭中两株桃各咒一使相鬬擊良久綱所咒者走出籬外綱吐盤中即成鯉魚夫人吐盤中成獺食魚入四明山路阻虎綱禁之虎伏不敢動夫人徑前虎即面向地不敢仰視以繩繫虎於牀腳下綱每共試術事事不勝將昇天縣㕔側先有大皁莢樹綱昇樹數丈方能飛舉夫人平坐冉冉如雲氣之昇晉鮑蓋續文獻通考貿人生時祥光燭室名曰員照後更名蓋嘗為縣吏俾奉牒入京踰月不行縣方詰責則已得報章矣建興四年終於家後三十年其妻子俱夣令啟棺則顔色如生衣服潤潔已而祥雲下迎乘之上界時荷神仙通鑑字道陽鉅鹿人少為道士入四明山遇神人教以胎息衆妙之術用能却􅄰絶粒役使鬼神驅除邪魅㸃化金玉賙濟窮苦惠懐之世聞許真君道法盛行江右徒歩踵門願充弟子真君納之授以祕訣復遣還山教導徒衆寧康二年與陳孝舉執冊從真君昇天竺慧達阿育王山志姓劉本名薩訶并州西河離石人年三十一出家改名慧逹晉寧康中至京師先是長干寺造三層塔塔成之後每夕放光逹乃告人共掘得三石碑中央碑覆中金函裏有三舍利又有一爪甲及一髪髪伸長數尺卷則成螺光色炫燿乃於舊塔之西更立一刹施安舍利達停止通元寺首尾三年晝夜䖍禮未嘗暫廢適㑹稽禮拜鄮縣塔修立龕砌羣鳥無敢棲集卒於本山塔烏石嶴南北朝陶𢎞景南史本傳字通明丹陽秣陵人年十歳得葛洪神仙傳晝夜研尋便有養生之志謂人曰仰青雲覩白日不覺為逺矣未弱冠齊髙帝作相引為諸王侍讀除奉朝請永明十年脱朝服挂神武門上表辭祿詔許之止於句曲山立館自號華陽陶隱居從東陽孫游嶽受符圖經法徧歴名山尋訪仙藥梁武帝早與之游及即位恩禮愈篤國家每有征討大事無不􅖴詢時人謂為山中宰相𢎞景末年一眼有時而方曾夣佛受其菩提記云名為勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒大同二年卒諡曰貞白先生名勝志煉丹山在象山縣西一里梁陶貞白修煉於此其東麓即西谷也中有石牀西麓有簑衣巖巖壁篆書數行了不可識唐葉靜成化四眀郡志有道術嘗講經虛白觀忽有南海龍化一髯叟聽講訴云胡僧咒力甚大欲喝海竭語甚哀切静乃書朱墨符遣門人持徃海上救之海水復還初觀在原上無井汲引逺甚一夕龍於觀左穿一渠泉流不絶遂成大溪因號靜曰仙師溪曰龍溪許碏續仙傳自稱髙陽人累舉不第晩學道於王屋山周遊五嶽抵天台四明仙都委羽皆於懸崖峭壁人不及處題云許碏自峩嵋尋偃月子到此觀壁蹤者莫不歎其神異竟莫詳偃月子也嘗醉吟曰閬苑花前是醉鄉􅂿翻王母九霞觴羣仙拍手嫌輕薄謫向人間作酒狂後當春景插花滿頭把花作舞上酒樓醉歌昇雲而去法睿佛祖綂紀西晉時有僧義興於鄮縣山谷間立佛祠法睿按故跡造精舍於山之東麓祕書萬齊融建多寳塔於西南隅師居其處日誦法華感太白化天童送供夜遶塔行道人見師身與塔齊因號太白禪師名其山曰天童法常景徳傳燈録襄陽人姓鄭氏初參大寂問如何是佛大寂云即心是佛師即大悟唐貞元中居大梅山在鄞縣南七十里大寂聞師住山乃令一僧到問云和尚見馬師得箇什麼便住此山師云馬師向我道即心是佛我便向這裏住僧云馬師近日又道非心非佛師曰任汝非心非佛我只管即心即佛其僧廻舉似馬祖祖云大衆梅子熟也忽一日謂其徒曰來莫可拒徃莫可追吾今逝矣言訖示滅宗亮髙僧傳姓馮氏奉化人家傍月山而居後稱月僧開成中剃落納法國寧寺徴選清髙者隸名亮預住持建造三門藏院諸功徳廊宇晩年專事禪寂不出寺門處士方干贈詩云秋水一泓常見底澗松千尺不生枝空門學佛知多少剃盡心花只有師終於本寺春秋八十藏奐髙僧傳俗姓朱華亭人丱歳出家弱冠詣嵩嶽受具游方訪道復詣五洩山遇靈黙大師一言辨析㫖趣符合大中十二年鄞水任景求捨宅為院迎奐居之剡㓂裘甫率徒二千執兵晝入奐瞑目宴坐盗衆皆悸懾叩頭謝過以咸通七年八月告終謚曰心鑑遂端續文獻通考姓張氏慈溪人投師徳潤寺日誦法華經至老不懈咸通十二年趺坐而化須臾口吐青蓮花七朶芬芳異常窆東山之下二十餘年塜屢發光衆開視之形質如生遂迎還寺漆飾奉之號青蓮法華尊者常通雪竇寺志畧邢州李氏子參長沙岑沙問何處人師曰邢州人沙云我道汝不從彼來師云和尚還曾住此否沙然之乃容入室天祐乙丑七月示寂於雪竇壽七十二建石塔於寺之西南隅為雪竇開山第一祖師五代契此眀州三佛傳不知何許人五季梁時見於明州奉化縣蹙額皤腹常自稱契此若長汀子布袋和尚則以人之所見稱日夕寢食無常處毎以錫杖布袋自隨行聚落田野間見醯醢魚葅物輒入口餘以投袋中所至酒壚屠肆皆恣其飲啖不厭惡謂能使所貨倍售而獲利多也晨起曵髙齒木屐是日必晴繫草屨疾走是日必雨閩中有陳居士者館遇甚謹師荅以偈曰寛却肚皮須忍辱放開笑口暗消磨要使此心無罣碍自然證得六波羅又曰我有一布袋虛空無罣碍展開徧十方入時觀自在貞明三年示寂於岳林寺建塔封山之原晉天偪初蒲田縣令王仁煦遇師於江南天興寺後又遇於福州官舍出懐中圓封書戒王曰我七日不來則開看王如戒所圓封無他語止一偈曰彌勒真彌勒化身千百億時時示時人時人俱不識乃知師是彌勒佛也崇寧中賜號定應大師子麟佛祖綂紀四明人清㤗二年徃髙麗百濟日本諸國傳授天台教法髙麗遣使李仁日送子麟還吴越王錢鏐令於郡城建院以安其衆師􅈯輿地紀勝五代乾祐中於慈溪之白龍慈化院結宇而栖日誦法華經嘗有白龍矯首室外因號白龍院員逺續文獻通考慈溪人戒行清苦吳越時創菴蓀湖講演經法聲浹海隅及示寂舌生蓮花窆於寺南謝寳續文獻通考四明烏巖村人父宗立母董氏禱於真武夣雷震而乳生時有金光燭室年數歳夣真武為浣腸溪上水至今有赤色天旱與羣兒束芻龍祈雨雨下以芻龍放溪上觸石而没成深潭建炎三年三月召鄉里故舊曰吾明日還造化三年後吾復生幸勿葬我次日午果卒越三年忽聞棺中有聲啟視之容貌如生從頂出化焉朱棣成化四明郡志字彦誠鄞人初本江南士子靖康初避難抵明越之界匿石室中望巖竇數有異光因梯竹以上得一黒匣緘鐍甚固一劍横其外啟之中有書與印言役鬼治病之術寇退棣設壇事之自是役鬼神如反掌最異者追魂胗脉合沙鄭瓚嘗記其事宋耕輿地紀勝字耕道號雪溪先生世家雙流遷崇慶紹興中為閬中令以仙去其孫徳之聞其在四明親來訪焉至雪竇山聞諸耆老山後爛坪有二士居焉其一宋君已去不知所終徳之登山十五里果見丹竈而仙蹤不可復尋矣今有宋宣教祠堂法智佛祖統紀知禮法師初與沙門異聞於南湖保恩聚徒講道是年賜額延慶乃作誡誓辭二篇俾長為講貫天台宗教之所天聖六年於元旦建光明懴期至五日趺坐説法驟稱阿彌陀佛數百聲奄然而化闍維之日舍利無數舌根不壊若蓮華然續文獻通考字約言四明金氏子重顯僧寳𫝊字隱之遂州李氏㓜依普安院仁銑落髪受具北游至復州北塔祚禪帥愛之留止五年盡得其道與學士曾公㑹厚善相值淮上問顯何之曰將游錢塘曾曰靈隱天下勝處珊禪師吾故人以書薦顯顯至靈隱三年陸沈衆中俄曾奉使浙西訪顯於靈隱問向所附書顯䄂納之曾大笑珊以是奇之吳江翠峰虛席舉顯出世後住明州雪竇宗風大振暮年悲學者尋流失源作為道日損偈曰三分光隂二早過靈臺一㸃不揩磨貪生逐日區區去喚不廻頭爭奈何皇祐四年側臥而化建塔山中國朝雍正十一年師勅封正智明覺禪懐璉五燈㑹元漳州龍谿陳氏子誕生之夕夣僧伽降室因小字泗州齠齓出家丱角圓頂逺造泐潭法席投機印可皇祐中詔住淨因院賜號大覺禪師至和中進頌賜龍腦鉢謝恩罷遂焚之治平中上疏乞歸留金山西湖四明郡守以育王虛席迎致上堂應物現形如水中月遂拈起拄杖曰這箇不是物即全現形也且道月在甚麼處良久曰長空有路還須透潭底無蹤不用尋啞女戒香寺啞女傳莫詳其氏族熙寧中見於明州之戒香寺狀􅑦惷身服疎布曵手跣足行市井間所至見慘容則其家有凶禍見喜色則其家有福祥人得候之為趨避計中大夫周諤方治舉子業屢至其家一日趣裝應舉女大笑作長短句餞行尋歸寺長吁而逝諤為其棺櫬瘞之桞亭後見之京師驚問曰汝啞女耶揮手不荅驟歩去鄉士衞開邂逅一道人於洛陽謂開曰君鄉里啞女者維衞佛也若歸可徃禮拜歸而訪之戒香一尼曰坐化矣以不及見為恨明年過錢塘見小兒數十擁一尼童入門譁然曰啞女啞女開驚顧啞女索紙筆書曰須彌山上擺鐸大洋海底揺鈴若問啞女姓氏只此便是真名出門徑去開追問小兒忽俱不見普交延祐四眀志鄞縣萬鈴鄉人幼學天台教修懴儀人有問之曰懴罪在己已罪何來若懴他罪汝焉能懴交不能對遂造泐潭入門即訶擬問即杖交不知所以一日潭呼曰交來吾與汝共議古今公案交擬進復喝之由是有省機辨敏發後居天童寺修持清苦其逝也獲五色舍利法忠佛祖通載姓姚鄞縣人依郡中崇教院道英授經業年十九得度即預講肆究天台教㫖於疏議入㣲續傳燈録忠至廬山於同安枯樹中絶食清坐宣和間湘潭大旱禱雨不應師躍入龍淵呼曰當雨一尺雨隨至居南嶽每跨虎出游儒釋望塵而拜上堂語云今朝正月半有事為君斷切忌兩眼晴被他燈火換後示寂塔於香原洞正覺佛祖通載姓李氏母趙隰州人誕師之夕光出於屋人皆異之天童寺志年十一得度十四其戒十八游方時參枯木成禪師一日聞僧誦法華經至父母所生眼悉見三千界句瞥然有省機鋒迅㨗諸方推重建炎末乃徃天童前後凡三十年紹興丁丑十月沐浴端坐書偈示衆曰夣幻空花六十七年白鳥烟沒秋水連天擲筆而逝智朋羅湖野録初為寳峰持鉢至焦山時成枯木與照闡提俱嗣芙蓉楷公先後得法未嘗相識成問朋曰寳峰有何言句朋即自題小像曰雨洗澹紅桃萼嫩風揺淺碧桞絲輕白雲影裏怪石露流水光中枯水㫪成稱賞之曰今日方知寳峰親見先師來又指以問朋曰汝㑹麼朋曰不㑹成曰汝記得法燈擬寒山否朋遂誦至誰人知此意令吾憶南泉於憶字處成遽以手掩朋口曰住住朋豁然有省五燈㑹元四明黄氏子紹興初住婺之天寧後遷清凉退居明之瑞巖建康再以清涼挽之明守亦勉其行師不從作偈送使者曰相煩專使入烟霞灰冷無湯不㸃茶寄語甬東賢太守難教枯木再生花未幾終王闐續文獻通考慈溪人號無功叟凡禪林宗㫖天台教門無不洞逹紹興中一夕忽聞異香趺坐而逝茶毘之日得舍利一百八粒行持老學菴筆記明州人住餘姚法性貧甚有頌曰大樹大皮裹小樹小皮纒庭前紫荆樹無皮也過年後住雪竇雪竇在四明與天童育王俱號名刹一日同見新守守問天童覺老山中幾僧對曰千五百乂問育王諶老對曰千僧末以問持持拱手曰百二十守曰三刹名相亞僧乃如此不同耶持復拱手曰敝院是實數守為撫掌雪竇寺志畧師郡之盧氏子上堂云悟心容易息心難息得心源到處閒斗轉星移天欲曉白雲依舊覆青山妙源延祐四眀志字晉之嘗衣蘆花衣服鐵祴口誦佛號不輟每跣足乞食於道後示寂願以身飼烏鳶善詩人傳誦之善月成化四眀郡志號柏庭居月波寺後主延慶寺續文獻通考定海人居南湖禱雨輒應補左階僧錄史忠獻問何能斷欲荅曰日逺月忘或問以安心曰心本不動天台之學以月為冠元陳可復延祐四眀志定海人越有林生善役雷恣酒自許有問其法輒叱去可復晝夜承事卒得其術至元間大旱禱襘莫應可復精思集雲雲果合須臾雷電大作雨甚遂召為承應法師世祖命治足疾可復曰臣有禁架術願試之試良愈復命止風風返却祈雪雪立至從廵幸幾三十年卒追封誠明翊教太極真人續文獻通考號雷谷嘗主教鄞之𤣥妙觀中秋有方士賞月可復不與戲以墨水噀符頃即烏雲掩月而雨黒雨衆知其所為延之入席雲霧散盡月復朗然張悌續文獻通考字信甫居象山嘗代父受罪得原至武當山拜張真人師焉危坐一榻脇不至席者三十年忽晨起别衆而化人以為尸解云王天助普陀山志字致和嘗修煉普陀山後祈雨輒應聞於朝賜號太虛元静真人四明郡志天助定海之蓬萊鄉人學道於袁松溪覺慶續文獻通考四明人姓毛氏號壽堂自㓜窮究妙典二十載棄俗出家投禮梅峰和尚深入悟門至元初至雲間陳源家端坐而化源改創所居為蘭若漆其身祠之懐信獻徴録字孚中俗姓姜氏奉化人年十五離家從法華院僧子思執童子之役已而祝髪為大僧受具戒於五臺寺渡浙河而西凡遇叢林名碩輒徃參叩華藏竺西垣公遷主天童景徳禪寺師隨質所疑竺西知為法器一日上堂舉興化打克賔公案問荅有契竺西曰俊哉師子兒也天歴己巳遷住補怛洛迦山自持一鉢丐食吳楚間鎮南王具香花迎至府中虛心問道宣讓王亦遣使者奉旃檀香紫迦黎衣姑蘓産竒石師遂購善工造多寳佛塔十三成載歸海東俾信心者禮焉賜號廣慧妙悟智寳𢎞教禪師曇噩續文獻通考號夣堂姓王氏住慈溪東臯寺與金華修道先生胡公游寂時偈曰塊然一物或有或無翻身歸去􅂿破毘盧有詩集行世宋濓為序梵琦獻徴録字楚石象山人姓朱氏母夣日墮懐而生襁褓中有神僧摩其頂曰此佛日也他時能照燭昏衢因名之為曇曜九歳薙染為沙門繼徃杭之昭慶受具足戒年十六聞元叟端公倡道雙徑師徃問言發非聲色前不物其意何如端就以師語詰之師方擬議欲荅端叱之使出㑹元英宗詔書大藏經選入燕都一夕聞西城樓鼔汗如雨下拊几笑曰徑山鼻孔今日入吾手矣泰定中升主永祚造塔婆七級崇二百四十餘尺至正癸卯塔毁於兵師重成之景瓛為鑄寳壺置於顛感天花異香之祥師舉景瓛為代而歸明行丕宋濓清淨境亭銘字大基鄞人宗説兼通行解相應蔚為時之名僧法衡嘉靖寜波府志字允平徐氏子年十一由白巖智門寺祝髪博覽經教於寺南松林結菴以居洪武十年鄞碩儒單仲友以使事止僧舍因問如何是芥子納須彌衡遽荅曰先生讀五車書今安在何處單駭而敬之主寺者置之首座忽㣲疾危坐而寂闍維之後得堅固子光明瑩徹狀如氷雪文沼嘉靖寧波府志字天鏡慈溪孫氏子究本宗三昧戒行精專洪武中興北山寺永樂初以髙僧取赴京校正經典預龍華大㑹七年仍歸北山一日忽告其徒辰省曰吾今與汝訣沐浴更衣口誦法華經趺坐而逝圓悟天童寺志字覺初密雲其别號也宜興蔣氏子父送之龍池山禹門禪院投幻有傳公出家一日過銅棺山頂豁然大悟歸龍池登九華泛普陀陟天台徧歴吳越凡四載傳公入滅師伴龕三載諸檀越力請開法乃繼席龍池崇禎間育王殿落成本郡司理黄端伯奉書迎師遂入山開法師嗣幻有傳公公嗣笑巖寳公遡曹溪為三十四世孫寧波府志天童古刹久廢師因禮育王過此慨然重建營構一新凡六坐道塲法席最盛所囑咐十二人俱出主諸方名刹由是天童法雨徧於宇内示寂於天台通元寺返葬天童有語録十二卷行世國朝道忞舊浙江通志字木陳潮陽林氏子甫冠棄弟子員為天童宻雲悟和尚嗣悟示寂遂繼席天童世祖章順治己亥徴至京住齋宫皇帝遣官萬善殿結冬開堂勅封𢎞覺禪師本晢寧波府志字山曉蜀長壽魏氏子母夣梵僧授如意而生髫年即有出塵之志祝髪於本邑定慧寺參究法華楞嚴宗㫖年十九出蜀至金陵聞密雲悟至徃禮之不㑹所問乃棄教參禪憤悱交集渡錢塘參木陳忞於雲門得契隨結茅東海郁州山中七年忞主席天童招充首座付以衣鉢歴主法席康熙十年繼席天童本晝寧波府志字天岳湖廣羅田蕭氏子十二歳祝髪廬山天林慧公數年出而徧參諸方時雪嶠玉林箬菴木陳皆欲得畫卒受木陳之付始嗣席平陽晚乃主天童席年七十餘示寂通旭寧波府志字潮音華亭愈氏子童子時遇食則以手擊木作梆聲或問之曰吾集衆㑹食耳父即送補陀薙染比長受成具於白龍慧鏡徧參海内名席隨侍嘯堂寒泉悉入堂奥當機不讓旋受天台無礙老人囑開法於慈之壽峰康熙二十八年聖祖仁皇帝南廵特賜補陀前後兩寺金重興佛殿適旭以省祖庭至遂延之主席旭毎事必為持久計百廢其興性統普陀山志字别菴西蜀髙梁龍氏子年十二至髙峰投三山老人薙染二十二受其印可康熙聖祖仁二十四年繼席天童次年住持普陀二十八年有皇帝賜帑金締造殿宇延之主席統為人濶逹賜法兩擔當百年頽廢盡為修舉四十三年蒙寺碑記勒石寺中浙江通志卷一百九十九
