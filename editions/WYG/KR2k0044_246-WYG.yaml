body:
  text: 浙江通志卷二百四十七經籍七子部下兵家大夫種二篇見漢書藝文志風后握奇經一卷書録解題永嘉薛季宣校定握奇經注萬厯錢塘縣志虞舜卿著孫子新畧萬厯温州府志王自中撰孫子㫁注二卷百川書志明錢塘陳珂陳天策㫁注孫子剛領成化四明郡志黄潤玉著孫子解山隂縣志何繼高著孫武子繹嘉禾徵獻録錢繼登著尉繚子解列朝詩集阮漢聞著兵法三卷宋史藝文志夏休撰兵畧十卷續文獻通考李光撰兵書解𢎞治開化縣志鄒補之著兵書南雁蕩志陳堯英著厯代兵制八卷聚樂堂藝文志陳傅良撰漢兵制萬厯温州府志薛季宣撰補漢兵制一卷書録解題錢文子撰中興兵房事𩔖續文獻通考徐次鐸撰武經小學嘉靖寧波府志張楷著武經節要發揮一卷百川書志明錢塘陳瓛陳珂著武經解定海縣志臧應驥著左氏兵法畧三十二卷黄氏書目陳禹謨著木鐘臺未學録一卷黄氏書目唐樞著兵法赤牘尤氏藝文志沈鍊撰兵畧三卷尤氏藝文志錢芹撰古方畧尤氏藝文志余懋衡撰軍法十八卷嘉靖仁和縣志李昂著地水師四卷嘉禾徵獻録潘鳯梧著戎政録分省人物考沈教著武録東陽縣新志蔣瑜著兵臆論山隂縣志劉世鵾著兵畧三十卷明實録𢎞治十二年上虞張津上修城法式條約二卷書録解題沈括吕和卿等修射學指南鄞縣志高武著禽賦一卷黄氏書目趙孟頫著㑹稽兵家術日月占一卷按通志藝文畧不著撰人㑹稽兵術三卷按宋史藝文志不著撰人天文昕天論一卷七録姚信撰安天論六卷七録虞喜撰按唐書藝文志作一卷渾儀圖𢎞治衢州府志宋王沇之著常山人渾天儀説隆慶平陽縣志元陳剛述天文詳辨三卷金華縣志唐仲友撰天文考一卷金華正學編王柏著六經天文編六卷宋史藝文志王應麟撰作按至正四明續志二卷天官書集注成化四明郡志高文虎著革象新書二卷甬上耆舊詩趙友欽著天文二論萬厯崇徳縣志沈宏著星圖證驗三卷括蒼彚紀宋潘翼著觀象玩占四十九卷焦氏經籍志劉基撰畧按黄氏書目又有天文秘一卷天官記事又彗星占驗萬厯嘉善縣志袁祥撰天文便覽台州府志葉秉敬著天文圖學一卷黄氏書目周述學撰天文要義二卷長興縣志吳珫著乾象圖説一卷讀書敏求記王應遴輯渾象析觀萬厯嘉興府志鍾繼元著象緯歌圖一卷崇禎衢州府志葉秉敬著象林一卷秀水縣志陳藎謨著渾蓋通憲圖説二卷黄氏書目李之藻撰窺天録㑹稽縣志陸曽著明紀天文一卷嘉興縣志徐世湜著日蝕測景又漆室末儀台州府志張應魁著分野發一卷烏程董説若雨著中星譜又周天現界圖仁和縣志胡亶著則象考徳清韋人鳯六象著周髀密法又㑹通弧矢又容圜寶絲網嘉興徐善敬可著厯算易律厯一卷隋書經籍志虞翻撰周易日月變例六卷七録虞翻陸績撰熙寧奉元厯一部宋史藝文志沈括撰西國七曜厯一卷刻漏規矩一卷宋史藝文志錢明逸撰洪武戊申大統厯四卷内閣書目劉基撰授時厯法二卷弧矢算術一巻測圓海鏡分𩔖釋衍十卷長興縣志顧應祥著厯宗通議一卷中經測一卷厯草一卷黄氏書目周述學撰厯法新書四巻萬厯嘉善縣志袁黄撰彚選筮吉指南十一卷日家指掌二卷通書纂要六卷黄氏書目萬邦孚著字汝永寧波人勾股算術黄氏書目李瓚著烏程人星厯辨析嘉靖寧波府志陳槐著算法要術又勾股開方法歸安縣志吳延齡著六十甲子解又七十二候解括蒼彚紀毛仲著選擇新書萬厯嘉善縣志袁仁著大統厯法辨四卷時憲厯法解二巻新推交食法一卷圜解一卷割圓八線解一卷授時厯法假如一卷西學厯法假如一卷回回厯法假如一卷餘姚黄宗羲著九章算法嘉靖仁和縣志吳敬著算法要術歸安縣志吳延齡著五行周易集林一卷隋書經籍志虞翻撰稽疑二卷宋史藝文志朱异撰黄金尺一卷嘉靖寧波府志胡宏著鄞人玉洞金書一卷注靈棋經二卷解皇極經世稽覽圖十八卷黄氏書目劉基撰萬物數注甬上耆舊詩趙淵著易占三墳繇辭黄氏書目連城璧著字如白㑹稽人京房康節啓蒙畫前録萬厯嘉興府志鍾繼元著皇極大衍數天啟平湖縣志陸文逺著皇極經世鈐解二卷元元集六卷長興縣志吳珫著古今應驗異夢全書四卷百川書志明揚州指揮浙東張幹山集編易冒四卷錢塘縣志瞽者程良玉元如著右占卜五行秘記一卷寶慶㑹稽續志姚寛著太乙三辰顯異經十卷正徳蘭谿縣志葉容著字可大太乙統宗寶鑑二十卷太乙淘金歌一卷六壬金鑰匙二卷長興縣志吳珫著演禽玉鏡秀水縣志陳懋仁著六壬大全三十六卷萬厯嘉善縣志袁祥撰較六壬天文圖説甬上耆舊詩趙淵著六甲奇書一卷延祐四明志周鍔著捕虎奇門縉雲縣志李邦樑著易運圖畧一卷吳興董説若雨著右壬遁驛馬四位法一卷通志藝文畧虞綽撰怡齋百中經一卷書録解題東陽術士曹東野推算三辰通載三十四卷書録解題嘉禾錢如璧編三命奇談滴天髓一卷黄氏書目劉基撰三命要訣萬厯嘉善縣志袁仁著星卦論萬厯秀水縣志沈啓原著醉醒子集又十段錦太平縣志王佺著號玉田右星命古今識鑒八卷百川書志尚寶少卿四明袁忠徹編輯按黄氏書目又有人象賦神相編萬厯秀水縣志吳緝著水鏡集四卷海寧范棘文園著焉廋集四卷長興縣志臧爾煥著字𢎞舒右相地理五龍祕法一部宋史藝文志毛漸撰隂陽精義二十卷萬厯温州府志風水問答一卷朱震亨彦修著見宋濂丹溪朱公石表辭郭璞葬經注一卷讀書敏求記鄭謐著郭璞葬經注山隂縣志徐渭著葬書演一卷黄氏書目鄭之惠著金彈子三卷披肝露胆一卷一粒粟一卷地理漫興三卷黄氏書目劉基撰尺按讀書敏求記又有平砂玉經解六卷地理節要括蒼彚紀葉子奇著陳氏葬説一卷黄氏書目瞿佑撰地理粹言台州府志葉良珮著地理定宗建徳縣志宋賢著沙滌難經嘉善縣志思賢里人吳澄世𫝊之書風水辨一卷聚樂堂藝文志項喬撰風水説山隂縣志何繼高著葬度一卷續説郛王文禄撰地理簡能集二十四卷山隂宣元仁著右地理醫家了證歌一卷讀書敏求記杜光廷輯東越伍捷補注素問抄十二卷難經本義二卷十四經絡發揮二卷診家樞要一卷醫藏目録滑壽著卷按黄氏書目又有滑氏脈訣一餘姚縣志又有醫學蠢子書五卷素問摘語一卷海鹽鄭曉著素問注山隂縣志徐渭著素問靈樞集要節文仁和縣志太醫院院判沈好問著素問靈樞心得四卷醫藏目録胡文煥著靈樞經摘注十卷鄞縣志高士著按病篇萬厯上虞縣志倪鎧著難素箋釋八卷餘姚縣志黄淵著方脈發䝉六卷萬厯温州府志虞搏著字天民義烏人袁氏脈經二卷嘉善縣志袁顥撰診脈家寶海鹽縣圖經賀岳著字汝瞻脈經採要東陽縣新志孫櫓著號南屏脈經直指七卷黄氏書目方穀著萬厯初錢塘人脈經直指碎金集萬厯義烏縣志徐行著字遜之脈訣山隂縣志黄武著字維周方脈全書黄氏書目劉仕聰著西安人内經抄又素問注又經絡考又正脈論鄞縣志趙獻可著字養葵經絡發明萬厯義烏縣志金孔賢著字希範經絡腧穴歸安縣志吳延齡著字介石靈素合鈔十五卷杭州林瀾觀子著右經脈談道述徐悦體療雜病疾源三卷七録徐叔嚮撰格致餘論一卷朱震亨著見宋濂丹溪朱公石表辭按讀書敏求記又有丹溪手鏡二卷序稱耄年所作聚樂堂藝文志又有丹溪心法三卷丹溪醫案一卷丹溪治法語録一卷丹溪纂要二卷百川書志東陽盧和纂注丹溪金匱鈎元三卷又證治要訣兩浙名賢録戴思恭著字原禮金華人脾胃後論萬厯紹興府志項昕著字彦章温州人僑居餘姚按醫藏目録又有竹齋小稿醫學引彀一卷攖寧生補㵼心要一卷聚樂堂藝文志滑壽撰醫書節要十卷括蒼彚紀葉子奇著運氣𩔖注四卷醫學綱目三十九卷𢎞治紹興府志樓英著明醫雜著六卷百川書志慈谿王綸汝言著一按聚樂堂藝文志又有節齋醫論卷醫論問答一卷杏塢秘訣萬厯錢塘縣志葛林著字茂林醫書㑹要崇禎衢州府志開化吾翕著醫學狐解六卷台州府志黄巖王扆撰醫學正宗八卷金華府志虞搏著醫學統㫖嘉靖仁和縣志太醫院院判葉文齡著醫學大成又活命秘訣東陽縣新志孫櫓著醫學須知東陽縣新志虞洪春著醫學正蒙東陽縣新志李徳孝著字時慕雜病正𫝊又醫性黄氏書目彭浩著字養浩杭州人藎齋醫要十五卷萬厯錢塘縣志陳諌著字直之醫學大原寧邑備考俞橋著要按尤氏藝文志又有廣嗣語一卷醫學碎金四卷聚樂堂藝文志周禮著醫準海寧縣志朱天璧著醫學綱目山隂縣志黄武著名醫抄山隂縣志費傑著字世彦醫學統宗續修嚴州府志吳嘉言著三按分水縣志又有醫經㑹元十卷注解病機賦二卷黄氏書目劉全修著西安人趙氏醫貫又二朱一例鄞縣志趙獻可著子貞觀字如葵又有絳雪丹書羣醫纂集萬厯義烏縣志陳樵著字時彩醫筌萬厯崇徳縣志沈宏著醫案蕭山縣志王應華著字武橋體仁㑹編嘉禾徵獻録陸長庚著醫學質疑歸安縣志吳延齡著醫先一卷續説郛王文禄撰明醫指掌圖後集錢塘皇甫中編集岐黄要㫖建徳縣志宋賢著醫鑑又醫林繩墨天啓平湖縣志唐守元著號吾春折肱漫録六卷評輯薛立齋内科十卷秀水縣志黄承昊著明醫㑹要二卷醫經大㫖四卷海鹽縣圖經賀岳著張氏𩔖經四十二卷山隂縣志張介賔著字景岳醫學問世編定海縣志董一麟著字明野醫説鄞縣志李蘭泉著丹山心術萬厯義烏縣志金孔賢著先醒齋筆記長興縣志丁元薦著醫學經畧又廣嗣全書黄氏書目趙金著烏程人醫經㑹海四十卷萬厯嘉善縣志錢萼輯醫學階梯吳興藝文補吳興半山周氏輯王叔承序運氣定論一卷吳興董説若雨著醫學權輿一卷醫學要數一卷醫藏目録胡文煥著軒岐新意一卷山隂縣志何繼高著攝生要義長興縣志李良棟著號台垣醫學慧業仁和縣志吳嗣昌著醫燈續焰仁和縣志潘楫著字碩甫生生直指八卷錢塘沈太洽愚公著見李流芳沈愚公墓誌右醫術鍼灸要鈔一卷隋書經籍志徐叔嚮撰針灸資生經七卷讀書附志王執中編東嘉人針灸大成字叔雅重注標幽賦正徳蘭谿縣志王鏡澤著語按黄氏書目又有増注醫鏡密一卷注竇太師標幽賦括蒼彚紀麗水祝定著字伯靜元機祕要針灸大成三衢楊濟時家傳著集針灸節要三卷聚英四卷針灸大成四明梅孤高武纂集針灸原樞二卷新修嚴州府志吳嘉言著針經訂驗一卷餘姚縣志黄淵著右針灸桐君藥録三卷見隋書經籍志本草病源合藥要鈔五卷四家體療雜病本草要鈔五卷七録宋大將軍㕘軍徐叔嚮撰本草音義三卷唐書藝文志姚最撰本草拾遺六卷序例一卷解紛三卷宋史藝文志陳藏器撰日華諸家本草二十卷嘉祐本草開寶中明州人撰不著姓名但云日華子大明序本草綱目按千家姓大姓出東萊日華子蓋姓大名明也或云其姓田日用本草八卷本草綱目元海寧醫士胡瑞撰字元瑞文宗時人本草發揮四卷餘姚縣志滑夀著本草衍義補遺百川書志朱震亨著楊珣𩔖集本草發揮三卷本草綱目洪武時丹溪弟子山隂徐彦純用誠集本草節要十卷括蒼彚紀葉子奇著本草集要十二卷黄氏書目方穀著本草集要八卷本草綱目𢎞治中慈谿王綸撰食物本草二卷本草綱目正徳時江陵汪穎撰東陽盧和字廉夫嘗取本草之繫於食品者編次此書穎得其稿分為水穀菜果禽獸魚味八𩔖云本草正譌補遺黄氏書目徐昇泰著字世平㑹稽人補綱目所未備本草攷證二卷餘姚縣志黄淵著本草權度餘姚縣志