body:
  text: 浙江通志卷五十七水利六紹興府山隂會稽二縣附郭府河在府東一里跨山會界河之在市其縱者自江橋南至殖利門北至昌安水門其横者自都泗門至西郭門中間支河甚多皆通舟楫萬厯紹興府志府河為市民所侵漸淤隘嘉靖四年知府南大吉疏闢之後知縣張鑑濬學河民亦便之山隂縣志崇禎癸酉邑人御史金蘭相視淤淺白於有司捐資倡諸紳士分董其役踰月而水道悉通舟楫無阻國朝康熙五十二年知府俞卿令民開濬深必三尺廣必及兩岸始於各城門鱗次遞進以一里為程不一月工竣五十四年又令盡撤城中水閣恐久而漸弛乃琢石碑二一立於府儀門下一立於江橋張神祠山隂縣城外河道西小江在縣西四十五里今為河萬厯紹興府志明正統十二年詔從山隂人王信奏命蕭山山隂兩縣起役濬之天順元年知府彭誼建白馬山閘以遏三江口之潮閘東盡漲為田自是江水不通於海運河在府西一里自西興抵曹娥江亘二百餘里厯三縣界逕府城中嘉泰會稽志晉司徒賀循臨郡鑿此以溉田𢎞治紹興府志宋嘉定十四年郡守汪綱開濬萬厯會稽縣志明嘉靖四年知府南大吉濬之新河在府城西北二里唐書地理志元和十年觀察使孟簡開鏡湖在府城南三里一名長湖又名大湖亦名鑑湖沿湖開水門六十九所溉田萬頃跨山會兩縣周三百五十八里總納兩縣三十六源之水通典漢永和五年太守馬臻始築塘界湖為二溉田九千餘頃紹興府志宋祥符後民漸盜為田二湖合為一南湖屬山隂境東湖屬會稽境熙寧中廬州觀察推官江衍被遣至越不能建議復湖乃立牌於水以牌内之湖聽民入租為田至郡守王仲嶷又并牌外者盡田之占湖為田者二千四百餘頃今則皆為起科之田湖盡廢俗呼白塔洋為鏡湖長十五里葢其一處耳謹按山隂諸湖見萬厯府志者一十五而廢者有十鏡湖之𩔖是也鏡湖開自漢以來為會稽一郡水利攸闗自唐迄宋日侵月削廢為田者屢矣曾鞏有鑑湖序王十朋有鑑湖三説徐次鐸有復湖議及宋史河渠志會稽志皆欲復湖以為瀦水之區明里人張元忭云曾王徐三公之議非不鑿鑿然昔之為湖特以瀦水葢山會蕭三縣之水直㵼於海而無渟蓄故也今既設三江閘則鏡湖之瀦水溉田直可稍緩古今異勢緩急異宜畧載興廢之由以偹考證其曾王徐三公之文具蛓藝文志中菱塘湖在縣西五十里嘉靖山隂縣志湖多菱葑故名廣三千七百餘畝洪武中築隄建閘溉田一萬八千餘畝近被侵佔為田水不甚蓄官塘跨山會兩縣在山隂者為南塘西自廣陵斗門東抵曹娥江百六十里即古鏡湖塘也束漢太守馬臻築以瀦水水髙於田田髙於海各丈餘旱則泄湖之水以溉田潦則泄田之水以入海沿塘置斗門堰閘以時啟閉有十一堰五閘今堰閘或通或塞或為橋往往為居民填佔明嘉靖十七年知府湯紹恩改築水滸東西横亘百餘里遂為通衢中塘即運道塘自迎恩門起至蕭山唐元和十年觀察使孟簡開宋嘉定十四年郡守汪綱増築之明𢎞治間知縣李良重修甃以石萬國朝厯間主事孫如法捐資修築十餘里亦甃以石近康熙間邑庠生余國瑞同僧集忠捐資倡修逺樂翰萬餘金閲八年而功成界塘在府城西五十里唐垂拱二年始築與蕭山縣分界古塘在縣西南二十五里晉太守謝輶築昌安塘在昌安門外直抵三江海口三十里明洪武二十年築西小江塘在府城西北三十里宋嘉定間太守趙彦倓築大江隄在府城西南一百餘里謹按山隂之堰大率皆在鏡湖今湖廢堰亦不存且具載徐次鐸復湖議中已見藝文此不録麻溪壩在縣西南一百二十里明成化間知府戴琥築於天樂鄉四十一都之地以捍外水之入而山會蕭三縣水患始息萬厯十六年蕭山知縣劉會加石重建下開霪洞廣四尺每旱則引水以國朝溉田後霪洞淤塞邑紳余煌廣大之姚啟聖修築康熙二十一年壩毁於潮福建總督改洞為三各廣六尺後復圯五十六年知府俞卿重修臨浦壩在縣南三十里半屬蕭山明宣徳中築以斷西江之水正徳以來商舟欲取便乃開壩建閘甚為害嘉靖十三年知縣王聘塞之三江應宿閘在三江所城西門外明嘉靖十六年知府湯紹恩建凡二十八洞亘堤百餘丈蓄山會蕭三縣之水三縣共徴銀若干兩為啟閉費其上有張大帝祠後為湯侯生祠陶諧建三江應宿閘記紹興屬邑有八惟山隂會稽蕭山之田最下霖雨浸霪則陸地成淵民甚苦之昔之賢守置玉山扁拖二閘以泄其水水潦盛日又設䇿決捍海塘岸數道以疏其流其為水慮悉矣然二閘之口石硤如亹水却行自瀦出浸數百里而田卒汙萊決岸則激湍漂駛決齧流移而田亦淪没其功未全也嘉靖丙申屬篤齋湯公紹恩守兹土相厥地形直走三江江之滸山嘴突然下有石巉然其西北山之址亦有石隠然起者公掘地取驗下及數尺餘果有石如甬道横亘數十丈公曰兩山對峙石脈中聨則閘可基矣遂白其事於巡按御史周公汝員暨諸藩臬長貳僉如議公於是祭告海神又書土方屬賦役規堰瀦授之吏而訪諸同寅孫君全周君表朱君侃陳君讓復命三邑尹方廷璽牛斗暨丞尉等慮財用簡夫數屬工義民百餘十人量事期仭厚薄陳畚挶分任効勞命石工伐石於山且授以方畧牝牡相銜煮秫和灰固之其石激水則剡其首使不與水爭其下有檻其上有梁中授障水之板板横側掩之石刻水平之凖使啟閉維時堤築以土其淖莫測先投以鐵繼用箘簵發北山石投之兩旁甃石彌縫峭格周施隄厚且堅水不得復循故道其近閘罄折參伍之使水循涯以行其財用出於田畝每畝科四釐許計三邑得貲六千餘兩其丁夫起於編氓更番事事部序既定興工方始月夕向晦有神燈數十往來於隄若為指示區盡之狀既役工隄再潰決復有豚魚百餘比次上浮衆疑且懼奔告於公適錢公煥在坐曰是易之中孚豚魚吉利涉大川之義也閘其成矣乎衆心始定經始於丙申秋七月六易朔而告成洞凡二十有八以應天之經宿塘始於丁酉春三月五易朔而告成以丈計長四百丈有竒廣四十丈有竒仍立廟以祀元㝠計其費數千餘兩有贏羨又於塘閘之内置小閘曰涇漊曰撞塘曰平水以節水流以􅊀旱乾云萬厯十二年知府蕭良榦增石修之改其近岸旁四洞為常平閘用洩漲水又置沙田九十二畝草蕩一區徴其租銀於府備異日修治張元忭重修三江應宿閘記前太守富順湯侯之閘三江也葢舉三邑之水而節宣之其為利甚大至今五十年無以苦潦告者水日夜震盪石漸泐水益走罅中且就圯民始苦旱萬厯癸未蕭侯良幹以户部郎來守越忭以閘告侯舉狀白兩臺報可遂以通判楊君莊董其事而佐以縣丞鄭日輝千戸陶邦發銀千三百兩有竒始築堰以障水乃視舊甃所罅泐沃以錫令固其内已又發巨石凹凸其兩巔凸以當上流令殺水怒凹以銜舊甃令水不得内攻石每方丈自下而上以次裒之又竅石及其底悉為牝牡相鈎連令水不得外撼又覆石其上令平衍可馳葢視湯侯所建如車益輔如齒益脣倍壯且久總其費費於築堰者十之六於石若工者十之四凡與直毫髪必躬吏不得有所侵三閱月而事成蕭良幹三江閘見行事宜一閘之啟閉以中田為凖定立水則於三江平瀾處以金木水火土為則如水至金字脚各洞盡開至木字脚開十六洞至水字脚開八洞夏至火字頭築冬至土字頭築閘夫照則啟閉不許稽延時刻仍建水則於府治東佑聖觀并老則水牌上下相同以防欺蔽一閘務俱屬三江巡檢帶管遇水消長即驗則督令閘夫以期啟閉一閘兩旁兩洞向雖設不開葢二十四洞自足洩水近岸善壞故也今築為常平閘兩邊各二洞以水當蓄處為凖水過則任其流庶有雨而水不漲一閘夫山隂八名會稽三名每名工食三兩遇閏加銀二錢五分水洩後閉閘用土築塞每築一洞工食銀八錢凡放閘務到底不許留板凡築閘務堅宻不許滲漏違者扣其工食仍究治一漁户往時率通同閘夫暗起閘板致洩水利及爭執洞口致有磕損今定漁户籍名在官止許於大閘裏河扳罾不許近閘口磕損及暗開作弊逮者漁戸閘夫並治罪仍責令修理漁户定有名籍每名輸銀一錢五分貯司以備整修葢板之用一附閘沙田一百二畝三分三釐九毫坐落山隂四十四都二啚才字號除撥十畝與湯祠僧種收食用外餘俱與閘夫佃種每年納租二十五兩三錢七分五釐三毫於内納糧差八兩外淨銀一十七兩三錢七分五釐三毫又草蕩一所每年納租五兩其銀二十二兩三錢七分五釐三毫徵收府庫另貯一匣以備異日修閘之費積有多餘止供塘閘取用不許别支崇禎六年知府黄絅重修國朝康熙二十一年福建總督姚啟聖重修姜希轍有記二十四年知府胡以渙置田三十畝以嵗入修補閘板鐵環後議改修不果而閘座至今無患山西小閘在郡城北五十里明萬厯間知府蕭良榦既修三江閘復於山西設閘為三洞以殺上流水勢補三江之所不足國朝康熙二十九年大水知府李鐸増立二洞共前五洞復置田二十九畝以資嵗修後為怒潮所激毁其西二洞五十三年知府俞卿遵舊制修葺三洞洞底曳巨石鞏護屹然如金城前後捐銀五百兩五十四年六月告竣設閘夫四名以司啟閉山隂三名蕭山一名玉山陡門閘在府城東北三十三里唐貞元元年觀察使皇甫政建明𢎞治間郡守曾䡵重修國朝康熙六十一年知府俞卿重建髙輝重建玉山陡門閘記玉山陡門閘跨南北中分為二左三洞右四洞納山會蕭三縣之水以時啟閉而達於海自明太守湯公建應宿閘於三江而陡門之啟閉廢舟楫通行呼曰老閘老閘為三江咽喉上控諸河下趨巨壑故址卑狹民船上下稍不戒輒觸壞嵗壬寅郡守俞公議令陞老閘左右各髙三尺復去右四洞中一柱合為三以寛水道增葺其壞且缺者俾可永久經始於六月下旬越六月而工竣扁拖閘在府城北三十里小江之北其閘有二北閘三洞明成化十三年知府戴琥建南閘五洞正徳六年知縣張煥建蔣誼建扁拖閘記山隂會稽蕭山良田千萬頃一遇霪雨則溪水横流勢若建瓴浮梁戴君廷節以御史出守兹土深恤民患以為小江決不可復開磧堰決不可再築故於山隂新竈柘林各置一閘以泄江南之水又於扁拖甲篷各置一閘以泄江北之水復於蕭山之龕山山隂之新河各置一閘以泄湘湖及麻溪之水而後水有所歸三縣之田可以望秋成矣涇漊閘在玉山閘北正德六年知縣張煥建撞塘閘在玉山閘東明嘉靖十七年建平水閘在三江城西門之南明嘉靖十七年建茅山閘在麻溪壩外三里先是天樂四都田截出壩外嵗被江潮淹没明成化間知府戴琥於茅山之西築閘二洞以節宣江潮久之閘圯水患如故崇禎十六年邑紳劉宗周重建劉宗周築茅山閘記自麻溪築壩而溋湖數萬畝之田遂為甌脱天鄉諸山之水既不得越壩以分其漲而小江之水復挾江潮循茅山以入溋湖汪然巨浸矣賢者憂之於茅山之口建一水門山洪并發則啟以洩之潮汐驟沖則扄而拒之遇嵗旱乾溪流枯竭則又節宣湖汐以為數萬畝桔橰地又自茅山至鄭家嘴築大塘使江流不得横溢必逶迤曲折由閘以入而後茅山一閘始屹然孤峙有砥柱之勢天鄉命脈懸於一絲此誠地方一大闗鍵嵗久傾圯塘水潰決天鄉之無收數十年於兹矣余向者著天鄉水利議及茅山閘議惓惓於移壩改壩實足為三縣興永利有志未逮嵗癸未太史余公煌及各長吏走麻溪疏導水源因改修舊壩而廣其霪復顧茅山而謂余曰天樂水利向者先生建三䇿今不能如其上姑用其中乎請先閘茅山潦則洩旱則灌使三邑之民曉然