盡為河瀦渟益巨不惟崇邱永無旱患鄞之七鄉亦胥被其利陞兵部主事改御史陳紀鄞縣志字仲理甌寧人嘉靖三十七年為鄞令邑遭倭冦幕府及諸文武大吏所至如織官私供億紀先期置廨舍凡所需器用及米鹽零雜毫不擾民麻陽兵五百人至令犒各豚首一紀曰城所割日幾豚而需首五百耶不聽軍吏請賦枯魚紀曰奉禁寸板不許下海焉所得魚乃以虀進又需騎五百匹紀曰鄞故澤國舟行無馬官籍額僅四十焉得馬五百乃以芒屩代幕府大恚軍營需餉者故邀糗糧不受鏹下令簽富民運餉至軍所名曰倭米户紀曰此徒為難耳因謬為好於帥以銀易之轉輸者皆得息肩劉世曹天啟慈谿縣志巴縣人以進士為慈谿令省刑緩徵與民休息不事毛舉鷹擊至土豪市猾并奸吏舞文者法按之無貸何愈定海縣志富川人舉人知定海縣靈巖太邱二鄉地瀕海舊設堤四十餘里名千丈塘内占田可數萬畝列碶五久之海水吞囓塘碶相繼圮斥鹵浸淫年比不登愈乃覈占戸量田出貲驗丁發繇修塘及五碶大浚諸渠引以溉田復修靈緒黄河閘舟山平水閘定之水利悉舉霍與瑕天啟慈谿縣志字勉衷南海人進士令慈鋤積梗殲大盜以民和召祥嵗屢稔邑始城形勝多缺相天時地利之便補偏鍾秀遵令丈量田畝過目不爽尺寸吏民詫以為神會鄢懋卿總理鹽法巡行郡國驕恣無度與瑕清鯁無賂遺懋卿怒嗾鹺使者劾之遂落職蕭然出署置書若干盡捐之學官以去周光鎬象山縣志字國祚潮陽人隆慶六年以郡司理署邑篆首謁學宫問其典籍無有即捐月俸購書若干卷貯之時命巾車省阡陌廉知山税病民白之兩臺減山蕩税額千餘兩民慶更生吴道邇舊浙江通志漳州人進士令慈谿邑與姚江錯壤姚江利洩杜白二湖之水以資灌溉建閘於野私啟之湖田盡涸前令霍與瑕議建閘於内地俾不得乗間為奸兩邑訟之不已道邇辨決有方慈民得直楊芳鄞縣志字以德四川巴縣人萬厯丁丑進士知鄞縣廉得彰聖寺所侵學田萬三千餘畝清歸府鄞二庠嵗徵其租徧給貧士俗以斃命誣人先毁掠其家芳峻懲之刁風遂息禁溺女陋習為文徧諭開示惻隱後遂無犯者陞戸科給事中蔡貴易福建通志字邇通同安人隆慶二年進士由户部主事出知寧波府有建開金塘大榭之䇿者謂可墾腴田二萬畝佐軍興貴易曰此國初所徙地也役蒸黔而資巨室庸詎利乎既力白於上官事遂寢寧闗外跨大江為浮梁兩涯隙地為豪家占以築室渡者一日溺百餘人貴易廉得其狀立毁之仍為文祭溺者患遂息擢本省按察使唐師錫象山縣志莆田人萬厯九年知象山布衣蔬食未嘗取民間束菜胥掾皆畏之奉三尺惟謹嵗儉邑多菜色督餉者讓師錫慢期師錫笑曰吾忍以敲扑殘民命耶寧坐催科政拙耳卒以下考去去之日蕭然一槖而已何偉天啟慈谿縣志字汝器涪州人萬厯癸未進士授慈令寛和為治時邑苦災祲道殣相望偉行平糶法發倉作糜以起菜色搜肺石之積買棺葢胔體建東西城義倉各一犯爰書者入粟儲其中備天行之乏邑治冠於山謂形局失宜民請更之偉曰勤民以康吾宇勿為也因材於構因石於址因土於山使朝無烟夕罷炊者借傭資以果其腹指顧而役竣秩滿召拜給事中喬萬里奉化縣志號弦所松江人舉人萬厯十三年任奉化廉以持己勤以恤民尤重學校明倫堂圮即力新之其於逋負令漸次輸納負罪者至庭必哀矜而遣之時偕行定海縣志嘉定人進士授諸暨令調定海萬厯十五年奉詔經量田地山蕩偕行履畝躬親里胥無所容其奸邑大饑設法賑濟全活甚衆至若衛里射圃社學民兵皆其所創舉召補御史崔振臬象山縣志號淑寰番禺人任象山令政平訟簡不事苛察小民戴若慈母值海上戒嚴訓練土著葺除戎具立辦勁弩千餘分給守陴者躬自賈勇為士卒先孤城恃以無恐汪應泰定海縣志臨清人由進士初任諸暨破巨奸剪劇盜有能聲當事以定海為巖邑調應泰來令值大侵之餘多方惠濟飢民賴以存活邑有興作無不力任之時颶風發屋官舍廊廡盡圮應泰曰榱桷不完何以壯國容於是首堂宇及廟獄亭坊溝井次序就理召為刑部主事翁憲祥鄞縣志字兆龍常熟人萬厯壬辰進士為鄞令邑西石塘碶與慈連界慈人旱則決澇則閉鄞受其害憲祥勘定之利害與共鄞人受賜邑賦役條項繁瑣憲祥纂定一編名賦役全書刋行民間傳為治譜邑丞江輔政廉性慈有目疾頗不得於上官憲祥翼之俾得盡職召補給事中黎民表定海縣志號石洲南昌人由舉人知定海萬厯初條鞭之法雖下而郡縣不盡遵行定邑民病雜役里甲弊於催符民表一以條鞭為程凡所徵解皆官自任之百姓惟計畝輸錢而已後令循其法他若置學田完城郭利及邑中久逺者不可勝紀倪甫英象山縣志字華月上海人先令分水有聲會象令闕當路以繁劇調象土瘠民頑甫英一意節嗇拊循見德不事追呼而徵徭樂輸者恐後邑故弊藪奸胥為政甫英歎曰病在版籍廢也乃較定經賦全書上下皆便樊轂奉化縣志進賢人舉人萬厯丁酉任奉化令邑舊仍陋甲嵗致羨餘數百金轂嚴行芟革鐫石垂後催科立限取足不取溢驛傳苦供億不辦上請免編革存銀若干兩立意寛厚不為多事而大事大獄黙幹而徐制之治盜必破離其黨開以自新作興文學講貫不輟多士蔚起仕至知府吴文企舊浙江通志景陵人萬厯中知寧波府郡豪有侵營地為市肆而輸金於守號公用錢文企叱吏無進亟撤其屋時正防倭水陸兵餉多漏巵文企手算支給毫無虛糜士卒感悦魏成忠鄞縣志字藎卿萬厯戊戌進士知鄞縣勤修水利於東岡碶増為十三洞躬挽石運磚以作衆氣節贏金貿田四十餘畝以供守夫補弊之費趙思基定海縣志號雲澗粤人萬厯中令定海先時巡撫視師海上率居臬司行署前令有議毁民廬創開府者市民惴惴不自保思基至曰吾為爾善計之乃周覽城中得城隍廟西蔬圃地遂經營其事府成而閭里安堵如故思基為令廉明善釐夙弊吏胥無所容其奸調去之日民閉城畱之信宿車不得行詹沂奉化縣志號魯泉宣城人萬厯中以進士為給事中左遷奉化令視士民如子嵗旱躬禱郊外雨大至連三日禱皆雨環城十里皆足八鄉之未雨者逺詣縣庭號呼以請沂曰我當復出於是每日大雨如前八鄉霑足黄櫸舊浙江通志金谿人萬厯中為寧波通判軍儲在昌國者多影射櫸渡海親覈之宿弊盡洗海舟闈出莫可詰櫸括其舟悉籍之為什伍相保各有標驗奸宄肅清張似渠天啟慈谿縣志四川人萬厯中以本府推官攝邑篆慈邑舊貢芽茶額二百六十斤日久茶株盡絶胥吏為奸重斂里正似渠盡從官給一毫無所擾於民旋徵為御史黄應明奉化縣志東筦人舉人為奉化令甫至邑出諭俗十五章勸民從化村無怒吏戸無負租訟至立折吏胥無從索一錢持半日糧即得平反時有黄半升之謠鄰邑權貴以骩法事囑峻拒之為所隂中竟以調去仕終漢陽别駕何士晉舊浙江通志宜興人萬厯中為寧郡司理郡中董孝子祠初奉母像於偏隅祀則先神後母士晉非之乃出俸更置後寢以奉母祀則先母後神祀典始正更助之田又恤諸生之貧為置田學宫使邑丞司其出入治獄廉平遇事立剖顧言慈谿縣志字中瑜江隂人由進士令慈谿徵糧惟書花戸應納糧數令按限自封投櫃吏無侵漁而民免追比採礦使至不為禮璫大怒思中之會上官具言令賢不可動乃止遷刑部主事周家椿舊浙江通志同安人萬厯中寧波推官剖決如流嘗攝郡篆兼署鄞邑執要除煩庶務咸理捐俸鍰置田於郡庠士民德之陳茂齡定海縣志溧陽人明經萬厯三十六年為定海丞有惠政董修重邱永濟橋事無鉅細皆以躬親之與士交必敦行誼江秉謙鄞縣志字兆豫歙縣人萬厯庚戌進士為鄞令編審丁田蕩地定由票之式每號開載四至土名與魚鱗黄冊買契相符并填業主姓名詭寄虛契之弊絶賴愈秀奉化縣志江西安義人選貢萬厯甲寅任奉化令通敏練達開萬家河造太平橋剏北渡公館修學宫事事精辦不動聲色在任未久而去人皆惜之張可大王鴻緒張可大傳字觀甫應天人萬厯武進士任浙江都司僉書厯遷舟山㕘將舟山居大海中元時建昌國州為浙東要害可大修軍政自岑港抵厯海三江皆置戍倭犯五罩湖白沙港茶山潭頭連敗之加副總兵城久圮可大與副使蔡獻臣築之兩月訖工城内外田數千畝海潮日害稼可大築碶蓄淡水遂為膏腴居民名之曰張公碶天啟元年以都指揮使掌南京錦衣衞崇禎元年出為登萊總兵官守登州死節沈猶龍鄞縣志字人伯華亭人萬厯丙辰進士為鄞令倣古社倉之法以備凶荒出陳易新一免紅腐民沾實惠長春門外舊有泥塘江流逼城斥鹵易入猶龍甃堰以石鄞民永利擢監察御史至兵部尚書顧宗孟定海縣志號巖叟長洲人由進士莅定海天啟元年部檄定鎮陸卒千餘人援遼時承平久兵皆驕惰一旦開逺調遂於啟行之日大譁縛其本官首領毁民間廬舍勢幾不可遏宗孟挺身慰諭之衆素懾宗孟風裁遂戢徐肅隊而行邑河渠西達慈南達鄞嵗久且淤宗孟并濬之前令黎民表之行條鞭也奸宄無所售衆有異議宗孟不為撓沮一切循其法秩滿以治行髙等徵為御史陳其柱慈谿縣志字元素崑山人由進士令慈谿聽訟不輕加鞭扑至市魁扞網不得已而用之民皆化其德無犯法者時海寇騷擾其柱厯要害増築三壘屹如金湯去之日慈民號泣追送建祠闞峯之麓張伯鯨鄞縣志字瀚伯江都人萬厯進士由歸安調繁鄞縣性清執有幹畧懲奢靡躬行儉約兩鄉水利封洩修築必躬往督察不委佐領嘗斷寃死獄釋盜所株連七十五人遷户部主事厯官兵部尚書何汝賓定海縣志字寅之蘇州衞世襲指揮天啟二年調昌國㕘將先昌國營伍糧多隱佔兵苦陋規謁有贄汛有情解稱有例薪燭竹木鼃魚麞鹿有供汝賓莅任之始一切洗革故士伍感恩用命撲洪宇於石浦覆林洪於近洋蹙林淑舟踣張一老并盡恭化餘黨所至無不奏捷喜文翰嘗著舟山志遷廣東都督僉事潘起鵬象山縣志字以凌廣東新會人天啟七年由舉人知象山縣軫念民瘼釐剔奸弊吏胥畏若神明值海冦攻昌石諸城起鵬率兵𠞰禦獲賊曾伯仁等海疆以寧陳璸名宦留祀冊福建詔安人天啟乙丑進士知慈谿縣有惠政厯湖廣㕘議獻賊陷荆襄死之贈右副都御史諡忠貞慈谿縣志時海冦劉香騷擾瀕海郡縣璸備禦有方冦不犯境斷獄數言立辨濬河渠以溉田畝民䝉其利龔彞定海縣志字和梅滇人由進士崇禎三年知定海以儒術飾吏治老稚莫不懽悦鎮兵以餉愆期脱巾趨郡將閧於府門彞聞單騎追之兵士聞馬鈴聲相謂曰龔侯至矣遂俟於道左彞為開諭隨還歸伍巡撫羅汝元聞之曰令牧民者也而能使悍卒聽約束其居官可知廖鵬舉福建通志字孟博晉江人萬厯已酉舉人為寧波同知寧郡蛟門商舶幅輳鵬舉取舊規例一切革去庭有質斷引情剖決使自悦服民呼為廖外公時石浦諸衛劇冦豨突樓船數百鵬舉單騎慰諭賊遥見曰廖外公來也釋甲而回冦平擢南安郡守林夢官舊浙江通志龍谿人崇禎間守寧波值嵗旱步禱天井龍潭祈龍者隨其所得即奉以為龍得一蛙夢官曰此蛙耳奚名為龍吾將屠之左右皆驚阻夢官曰倘致龍怒而雨我甘以身殉遂磔之少頃雷電驟興滂沱遍浹林元舊浙江通志莆田人崇禎中謫寧波通判性亷静飯蔬飲水甘之若飴其子來省將取一疋布大怒曰亟去毋汙我卒於官同僚為醵資殮之陸自嶽舊浙江通志武進人崇禎中知寧波府郡有巨猾充役廉得其人收捕之猾賄勢豪冀免自嶽曰僕為此方除害公反欲貽患桑梓乎置之法有賊胡乗瓏者倡亂雪竇尅日分犯自嶽捕其内應六人誅之隨發兵直抵賊巢獲其巨魁餘勿問當急變時自嶽募尫羸民兵六百人或曰兵期壯勇奚用是為自嶽曰此饑饉餘生不急收之秖助冦耳其深識如此胡夢泰奉化縣志江西鉛山人崇禎進士其治奉化才甚明決而讞鞫必主寛平睹學宫圮壞給資以新之勸地方輸粟備荒平其直以給民奸吏無敢舞文值米貴𫝊警多訛民志思亂夢泰取其黠者立斃數人衆志遂定尤敦尚理學名節如文靖舒公拾遺戴公極力崇闡捐俸立祠置田以祀黄端伯舊浙江通志江西新城人崇禎中授寧波府推官清介獨立執法不阿布衣蔬食貨利不攖其心人呼為黄佛子李沾舊浙江通志華亭人崇禎時為慈谿令剔除穢弊力行善政民便之以丁憂去任士民攀轅而泣汪偉慈谿縣志字長源休寧人以進士令慈谿嵗侵捐俸市粟勸輸平糴全活甚衆時邊事孔棘部符下郡邑預徵并督累年宿逋偉設法徵解額外無増益後行取授翰林檢討死闖賊難偉與妻耿氏同就縊題壁云身不可辱志不可降夫婦同死節義成雙已耿就右縊以手招偉曰止止雖在顛沛夫婦之倫不可失也卒正左右而絶其從容就義如此國朝順治九年賜諡忠愍崇恩祀鄉賢疊荷綸屡邀憫恤為不媿云國朝陳白輅舊浙江通志字嬰白江南人恩貢生順治六年任象山令象邑懸處海陬值鼎革之初白輅憫其瘡痍曲加軫恤苞苴往來一切謝絶王奐奉化縣志號千峯江南南陵人順治九年任奉化縣始至清積胥之乾沒者訟牒如林讞決必當其情設立綱簿詳載里甲總數田地山蕩丁口按則科糧完欠瞭如指掌上之司部頒其法於各邑十一年值均里令下奐力行之為奉邑永賴大兵平舟山軍需朝至夕發督造戰船運木深山役徒千百計奐必躬親事若游刃奉城傾圮議増築奐區畫興工不日功竣十四年山冦猖獗奐嚴責保甲搜獲真賊訊實斃之又講藝興學築後溪塘捍水以内艱去任後累遷山東鹽法道張秉乾象山縣志字治平江寧人康熙九年由武進士任象協左營守備能詩文兼工書法十年大旱米價騰貴設法賑濟十四年海冦犯象秉乾堅守却之賊再至單騎迎敵遇賊棲霞觀前奮勇驅殺賊勢愈熾乃登城樓大書秉乾死矣四字於壁帶甲觸石死事聞廕一子崇祀名宦邱業名宦留祀冊安陸人康熙十一年知寧波府重士愛民一時沐膏澤者羣比之召父杜母致仕歸囊槖蕭然載菊數本曰非敢效彭澤也聊以免俗而已人益重之李時芳名宦留祀冊由武舉順治十八年任寧協副將康熙十五年海逆連䑸犯象山圍七晝夜時芳以孤城一旅分兵設禦誓死堅守城邑得完以勞瘁卒於官王國祥名宦留祀冊為台協寧海營㕘將康熙十五年賊圍象邑奉檄援𠞰自寧海黄墩直趨石門嶺入界斬闗破竹而來賊始倉皇遁去招集流亡安撫遺黎全活甚衆會李時芳卒即授為城守副將見學宫兩廡傾圮捐俸鼎建親為督理不數月吿成以武臣而加意學校不多覯也何琛寧波府志號西園閩縣舉人令慈谿性慈祥耐煩劇兩造陳辭和顔聽受徐出片語判曲直民無不服者在任五載未嘗輕杖一人李廷機名宦留祀冊瀋陽人官學生康熙十五年知寧波府以愛民為主嚴束胥役不敢為奸杜絶苞苴一時謳頌載途稱賢太守蔡毓秀名宦留祀冊號一􅷜錦縣人康熙十六年任奉化令值嵗暮鄉民以逋課滯獄者數十人悉放寧家約以新正完課民感泣率如約課未嘗虧有盜魁二人以行刼横州里毓秀擒二人磔於市羣盜斂跡遇編審品撘貧富平均徭役詳請免運象協兵米民累得甦嵗大旱禱於柏香巖甘霖立沛又捐俸置田於法海寺以設供龍神學宫傾圮捐資修葺増建講堂射圃周聖化定海縣志字西鐸祥符人康熙壬戌進士二十九年知定海縣邑初設百務未舉聖化至御書建署廨倉厫庫獄及學宫城隍祠籌畫行之初邑樓大綱畢張凡有利於民者悉心民皆葺茅以居多火患首捐俸糾同城文武買瓦易之嵗侵為粥以食飢者治邑三年政簡刑平以卓異陞秦州知州繆燧名宦留祀冊字蓉浦江隂人康熙間知定海縣重葺學宫城隍廟捐建義學買山田以資生徒膏火築蘆花嶴大展嶴社倉以防嵗飢修抝山謝浦等塘青嶴椗齒諸碶以儲水利至海闗𣙜税凡民間日用之物申詳督撫一概免徵邑未有志燧手輯成書考核詳贍馬受曾寜波府志字念功溧陽人康熙己丑進士令象山修葺學宫創建義學疏濬南河纂修縣志酌催科嚴保甲勸農桑崇節儉賑饑荒􅄟暴露在任十三年屢被薦剡竟卒於官士民思之楊懿公舉事實蒲城人舉人雍正四年知鄞縣凡民間爭訟有闗倫理者反覆開諭務期仍歸和好不輕加決罰五年遇水灾履畝親勘詳請蠲租發賑民無失所六年旱米價騰貴詳請發米平糶并開大嵩河工修理城垣使貧民得以力作餬口尤盡心水利一切塘堰碶閘及時修築行順庄嚴保甲矜恤罪囚重造監房增葺新舊倉厫積穀備賑鄞邑學宫頽廢首捐二百金勸輸修葺改城北胡聖諭公書院為義學延師訓課朔朢宣講以堵塞長春廣訓每啚設立鄉耆一人專司講解塘積勞成疾卒於官浙江通志卷一百五十二
