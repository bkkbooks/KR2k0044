body:
  text: 浙江通志卷一百五十二名宦七寧波府三國吳張舉太平御覽字子清為句章令有婦殺夫因焚屋言燒死其弟疑特訟之舉按尸開口視無灰令人取猪二頭殺一生一俱積薪焚之開視其口殺者無灰生者有灰乃明夫先死而後焚婦遂首服政化流行民歌遺澤唐王元緯陸南金唐書地理志開元中元緯令鄮縣開小江湖溉田八百頃民立祠祀之東二十五里有西湖溉田五百頃天寶二年令陸南金開廣之裴儆成化四明郡志河東人大厯間自長安令來刺郡適海冦侵掠井邑焚爇道骸積而不掩生民僅有存者儆推心撫字一年而驚逋以復田疇以闢茨塾以興然後以禮義利物之教教之三年俗為鄒魯長幼各得其宜王密延祐四明志大厯中明州刺史有惠政李舟為碑記李吉甫唐書本傳趙人栖筠子字𢎞憲以䕃補左司禦率府倉曹參軍貞元初出為明州長史元和二年擢中書侍郎同中書門下平章事外遷十餘年究知閭里疾苦常為帝從容言使屬郡刺史得自為政則風化可成帝然之尋為淮南節度使卒贈司空諡忠懿舊浙江通志吉甫為明州有善政王沐成化四明郡志綝之曾孫貞元四年刺郡興廢舉墜政治一新嘗捐俸立夫子廟落成民不吿勞任侗于季友唐書地理志貞元九年侗為明州刺史増修廣德湖溉田四百頃西南四十里有仲夏堰溉田數千頃太和六年刺史于季友築趙察成化四明郡志大梁人元和十二年授奉化令鑿縣北河溉田八百頃因名趙河十四年又開白社河溉田四百餘頃民立祠以祀韓察延祐四明志京兆人滉之孫長慶元年刺史易縣治為州治撤舊城築州城功大而民不知役費廣而用不厲民見韓梓材所撰移城記應彪延祐四明志長慶三年任刺史建浮橋跨江五十五丈宋嗣宗寧波府簡要志字文纘南和人天祐四年為奉化令利澤深厚民甚德之五代黄夷簡十國春秋字明舉福州人為明州判官有聲累遷檢校祕書監平江節度副使宋張潁天啟慈谿縣志端拱元年為慈谿令廉潔自持邑人號為張清清太宗賜詔奬諭云令長之任將以施異政而新吾民也爾膺兹選擇卓著強明勤以奉公廉以守道達於聽覽深所嘆嘉愈勵精勤當俟明陟縣有清清堂以潁名也陳充宋史本傳字若虛益州成都人雍熙中授殿中丞出知明州澹於榮利自號中庸子李夷庚嘉靖寧波府志天禧中守明州精地理學以鎮明嶺為府治案山增髙數丈徙建州學文廟合於子城東北由是賢才輩出市有花樓神郡守初至皆謁奠夷庚獨不屑一日過其市飄瓦中葢左右曰此花樓神之靈也夷庚曰今當毁之靈其何在遂毁之浚東錢廣德二湖大興水利民立祠祀之燕肅宋史本傳字穆之青州益都人舉進士遷侍御史為丁謂所惡出知越州徙明州俗輕悍喜鬬肅下令獨罪先毆者於是鬬者為息官至禮部侍郎致仕在明州為海潮圖著海潮論二篇楊紘宋史本傳字望之以䕃厯官知鄞縣鄞濱海惡少販魚鹽者羣居洲島或掠商人財物入海吏不能禁紘至設方畧使識者致惡少船及歸始給還且戒諭之由是不敢為盜通判越州知筠州提㸃江東刑獄除轉運按察使江東饑開義倉以賑之知湖州復為江東轉運使官至太常少卿仲訥王安石仲訥墓誌字樸翁廣濟軍定陶人景祐元年進士權明州節度推官縣送海賊數十人獄具矣訥獨疑而辨之數十人皆得雪三遷為尚書屯田員外郎顧方嘉靖寧波府志字正夫丹陽人至和四年以進士令象山下車視事日召父老詢民間利病民有善者勸之惡者戒之建學舍率子弟之秀者教之親為講解誘掖使進於學逾年政成士民悦服錢公輔宋史本傳字君倚常州武進人第進士甲科通判越州知明州衙前法以三等差次勞勤應格者聽指酒場以自補富者足欲而貧者日困充募益鮮額有不足至役鄉民破産不供費公輔取酒場官鬻之分輕重以給役者不復調民神宗立拜天章閣待制知諫院林旦寧波府簡要志字士明治平初象山令通海西港築縣城修學宫正社稷壇嘗遘疾民有割股以療之者政成作臺榭以眺覽論者謂其政化可方中牟李承之宋史本傳字章世性嚴重有志節中進士第調明州司法參軍郡守任情骫法人莫敢忤承之毅然力爭之守怒曰曹掾敢如是耶承之曰事始至公自為之則已既下有司則當循三尺法守憚其義嘗建免役議王安石見而稱之熙寜初以為條例司檢詳文字訪淮浙常平農田水利差役事還奏書二十篇加集賢校理遷龍圖閣直學士陳太素宋史本傳字仲華河南維氏人中進士第厯知兖州明州有治跡累官尚書兵部郎中張懿文寧波府志平江人熙寧六年以薦辟授昌國令縣初設政維更始莅民一以和易下車未久治署學宫俱建役不知勞公私之厄於民者悉調停之民愛之如父母虞大寧明一綂志熙寜中知鄞縣興水利繕治堰碶溉田五千五百餘頃傅堯俞宋史新編字欽之濟源人嘉祐末為監察御史轉殿中侍御史遷右司諫哲宗立知明州嘉靖浙江通志堯俞知明州有惠政或問曰公居此何為一言不及御史時事堯俞曰前日言職也今日為郡邑當宣朝廷美意而反沾沾追言前日之闕政與誹謗何異人皆服之吕祉嘉靖浙江通志字安老建州建陽人宣和初上舍釋褐建炎二年為右直言以論事忤執政通判明州奏國家養兵仰給東南數路而已方今財用悉出民力而邑令乃近民之官令得人則一邑足守得人則一郡足漕得人則一路足諸路足則朝廷足矣官至兵部尚書值酈瓊叛被執罵不已遂碎首折齒而死時有得祉括髮之帛歸其家者其妻吴氏持之自盡以殉聞者哀之仇悆宋史本傳字泰然益都人大觀三年進士為沿海制置使明守吏幸相厚善紿言士卒將為變致遣精兵密捕統官徐文覺之初謀縱軍剽掠頃之泛海去呼曰我以仇公故不殺人不焚屋廬一城晏然遂坐削兩官主管太平觀以淮西宣撫知廬州加徽猷閣待制尋詔詣闕改浙東宣撫使知明州以挫豪強奬善良為理吏受賕雖一錢不貸奸猾斂迹州罹兵火悆斥厨錢助其費嵗饑發宦儲損其直民無死徙朝廷聞之進秩一等再召對帝親加褒諭進直學士為湖南安撫使再知明州積官至左朝議大夫爵益都縣伯悆端方挺特自初官迄通顯無所附麗在明州嘗欲薦一幕官問曰君日費幾何對以日用二千悆驚曰吾為郡守費不及此屬僚所費倍之安得不貪遂止鄭耕老葉適鄭耕老墓誌字穀叔莆南湖人中進士第主復州懷安縣簿調温州法曹守故用常平錢物耕老不聽忤守意欲捨去其友知旁郡固止之教授明州學學地陋弗理耕老為講説科舉之外更營學區取田以供鄉飲費召為國子監主簿楊獬嘉靖浙江通志新喻人治興間知吉水救荒有政累官司農少卿知明州沿海有冦獬悉擒之海道晏然方崧卿周必大方崧卿墓誌字季申興化軍人登隆興癸未進士通判明州壬寅秋旱守委三倅分行六邑荒政崧卿主奉化象山獨無饑民定海縣鳯浦沈窖二湖久為浮屠氏擅其利民失灌溉崧卿適被朝命一切正之紹熙二年擢廣東路提㸃刑獄傅伯成宋史本傳字景初察之孫隆興元年進士授明州教授年少嫌以師自居日與諸生論質往復後多成才慶元初召為將作監進太府寺丞言吕祖儉不當以上書貶又言於御史朱熹大儒不可以偽學目之又言朋黨之弊起於人主好惡之偏坐是不合出知漳州嘉定二年除寶謨閣直學士加龍圖閣學士端平三年賜諡忠簡程覃寧波府簡要志字會元嘉定初攝守慶元府盡心水利停海錯果蓏之征循哀之政不可勝紀趙善㬜成化四明郡志嘉定間為象山令勸課農桑治先教化重修大成殿造會源碶四民樂業海邑識禮讓之風多㬜之力也馮多福嘉靖寧波府志無錫人嘉定四年知奉化縣置義倉修學校請蠲夏税治水利惠政甚多立祠於學胡榘嘉靖寧波府志寳慶初知慶元府請得米一萬五千石以浚東錢湖命水軍畨上迭休且募七鄉之食水利者助役又奏以贏錢二萬八千三百四十七緡増置田畝以其入分漁戸人嵗給六石隨菱葑之生則薙而絶其種民懷其惠成四明志二十一卷文獻賴以有澂陳愷嘉靖寧波府志長樂人淳熙初以中大夫祕閣修撰知慶元府兼沿海制置副使興學造士勤恤民隱尤盡心水利建迴沙閘民甚利焉章大醇成化四明郡志以大府卿知慶元府兼制置副使淳祐十年以淘湖濬河竣事特轉朝奉大夫後又以居官不擾海道肅謐水利興修職事振舉除集賢殿修撰梅寛夫嘉靖寜波府志字伯父咸淳七年進士調慈谿尉德祐初攝知縣事率義勇應文天祥至常州戰死嘗師新安滕璘得考亭之學所著有溪堂講義刋於鄉校元哈喇岱元史本傳哈魯氏初從軍攻襄樊䝉古四萬戸府辟為水軍鎮撫至元十二年從丞相阿珠與宋兵戰焦山敗之遂戍澉浦海口行省檄充沿海招討副使引兵至温州青嶴門遣使諭温州守臣家之柄以城降十四年行省檄充沿海經畧副使行元帥府事於慶元鎮守沿海上下南至福建北距許浦六月檄充沿海經畧使兼左副都元帥督造海船千艘十五年擢慶元路總管府達嚕噶齊將所部軍戍海口十六年海賊賀文達顧潤等冦掠海島諭降之得舟六十餘艘授浙東宣慰使擢資德大夫雲南行省右丞皇慶元年贈榮祿大夫平章政事鞏國公諡武惠富德庸成化四明郡志濟南人至元二十五年宰慈谿抑豪強清狴犴民樂耕桑士興孝弟慈湖書院山長曹漢炎作碑頌之察罕成化四明郡志䝉古氏元貞二年授奉化州達嚕噶齊視事初集吏民諭之曰政者正也我懼不能正已以正人耳聞者惕然時民困重役嵗課浩繁温辭勸勵率皆辦集其彰善薙惡修廢舉墜不可殫述李天祐蘇天爵李天祐墓碑字吉甫髙唐人元貞初調慶元路象山縣尹兼勸農事邑有豪民二十輩表號龍虎張其聲威虐民蠧政天祐捕寘於法邑在郡治東南海島中去郡稍逺有盜數十時出剽掠復乗舟入海天祐選邏卒驍勇者親率入海悉擒捕之差次邏卒勞效薦諸大府賜錢賞官而已不自為功民有親喪久不𦵏者以禮勸諭或貧不克舉者分俸助之春秋親行鄉社諭民孝弟忠信察其勤惰而賞罰之月朔帥僚吏入學聽師生講説經訓使知禮義廉恥而習俗亦少變焉會有詔遣使巡行郡國覈吏廉貪同列皆坐免獨天祐廉明著聞在官二年以疾卒阮申之至正四明續志池陽人字周翰泰定元年任鄞縣尹為政廉簡有法興學校增弟子員士知自勵定版籍均義役興水利禁約胥吏不入村落民甚便之郭郁至正四明續志泰定二年任明州路總管有才畧在郡正賦籍定役法措置食鹽綜理倉庫皆有法修孔子廟飭弟子員徵逋租撙浮費至學廩不能容沙木斯鼎至正四明續志至順二年任明州總管秩滿除兩淮都轉運鹽使以吏部侍郎來守飲水食蘗始終一致待人寛隱惡揚善俾自遷改先有司不急細務由是化行民安修築渠陂盜賊帖息訟牒退縮學校興舉異時富商賦貨江浙省分遣屬官監賦事侵牟百出思丁一再監之為設方畧會計悉當每嵗漕運米物十數萬斛筦倉庾者或與漕戸不相謀紛然生事思丁出之如納咸服其便夏旱秋雨禱皆應胡潤祖嘉靖浙江通志廣平人元統初為慶元路推官初積囚滿獄淹至十年潤祖至朝夕審錄不憚寒暑自是訟無滯者丁濟寧波府簡要志字溉之髙郵人尹奉化凡公論所在一判不復改至今人稱曰丁相公判一字王元恭嘉靖寧波府志字居敬真定人後至元六年為明州總管先在他郡能聲赫然郡民聞其至老稚争慶下車問民疾苦寛猛相濟興學校作杏壇詠歸亭飾從祀像學廩不給徵逋贍之舉行鄉飲酒禮貿地為義阡絶火化之俗作石馬道於江次以便漕運復成四明續志十二卷與延祐志並刻以傳寗玉寧波府簡要志至元中以萬户鎮慶元勇智過人民皆安堵海道晏然人稱之何槐孫嘉靖浙江通志至正初慶元路推官申明科條雪寃禁暴首除姦惡吏民畏服巴延徹爾嘉靖寜波府志字彬卿由蒙古胄監至正間主簿慈谿勤於奉公切於愛民嘗三督漕運厯風濤之險事每先集嵗饑勸閭右出粟平糴民無菜色鄰邑冦發掩捕有方阿林成化四明郡志西域人至正癸巳知奉化州下車即汰去冗胥溢卒疏理寃滯詿誤田野絶巡捕之迹時嵗洊飢餓莩載道請米得報亟傾官廩以濟事有利害白大府率多聽許民賴以安濟雅穆爾丹成化四明郡志至正十七年進士授定海令當方氏僭據軍卒驕横剽掠村落謨丁不避豪勢獲其渠魁格殺之餘衆斂跡時政賦煩苛一以公平科辦民無重擾陞奉化州知州尋調昌國許原戴良許原傳閩人授定海縣丞西北用兵未已調發無虛日且地瀕大海嵗修治海舟而官直不時降或降而為吏胥所欺隱每事第差民之中次者一二人以主其出納謂之庫子凡所費用皆令其代輸期會迫促至日受榜笞不恤也原惻然詣府請其直集里役之長分授之俾售其物次第歸之庫吏皆不得有所與僅令治文書以備稽勘縣以業海為生自民船不出海所恃以存者獨田租然民産無制里役無藝而民病原取其田分計之田多者應重差田少者稱其出而不得横擾會慈谿闕令府檄原攝令事治慈谿如定海興利除害不一月而大治每出入月俸必負以自隨一錢之費必已出民以飲食進悉却之有私致一肉於舟者舉而投之江菅屨徒涉不問道里逺近以為常一日臺檄下憲府追原甚急比上道號泣而送者千人且慮乏行資無一人不懷金以獻同官亦割俸馳贈於道左原悉謝遣無所受曰造次顛沛見人之守縱死不易吾心也抵京事白及還以憂去明孔立成化四明郡志廬州人洪武元年知象山縣事歸附之始百廢未興立至庶政遂舉是年夏蘭秀山冦亂民甚驚駭立設計殲其渠魁餘黨悉平他若息虎患弭旱災皆其德化所感冷麟寧波府簡要志山東人洪武七年知鄞縣政務便民時孔立知象山有惠政民以孔冷並稱喬鑑成化四明郡志雲中人洪武八年為奉化縣丞贊佐有方順民之好惡葺宜明樓修進林碶建廣濟諸橋民皆德之何公肅寧波府簡要志河南人洪武十年定海知縣政尚寛平鞭扑不用民從其化余文昇成化四明郡志字子俊鎮江人洪武十一年知寧波府承前守唐蔚嚴峻之後更以寛恕民翕然從化選用廉吏敦勸農桑嚴堂試興水利咸有實效革四明驛船之閒冗者以其夫户付有司别役每坊舊設巡警舖夫以防盜備火多以貧乏者充而不逮富者乃驗丁編排不分役作悉令遇夜上宿質明則從便舊例民輸税糧畸零者併為百十石共一單方與收納致有包攬之弊文昇令民自五斗以上皆自入倉隨到即收躬親驗視即就倉理郡事畧無倦色厯陞工部尚書吴德純天啟慈谿縣志洪武十六年任慈邑丞值嵗旱德純沐浴徒跣詣天井潭致禱甘雨隨應興學校以育賢良表貞節以勵風俗興廢舉墜卓著能聲陳誠遜天啟慈谿縣志廣信永豐人洪武十九年由監生知慈谿時寧波衞旗軍數十假公事至邑四鄉横索民物適鹽禁方嚴輒以私鹽誣民剽取甚酷誠遜悉捕之繩以法有史敬德者交通豪吏持牌巡邏鄰邑民攖其害聞誠遜至不敢入境李子謙成化四明郡志新喻人洪武二十七年由人材為慈谿主簿莅事詳審人不敢欺本府倉厫頽敝上官督責有司違期勿就子謙立成之其他浚河渠修碶堰役雖繁夥而區畫得宜民不知勞許伯原定海縣志樂安人洪武間授定海縣丞以韋製一小圓牌書慎獨二字置之懷中操持清介遇訟則曲為開諭使自相和解縣北有鄣水石堤十餘里年久傾圮度材修治完固民賴之郭麟寧波府簡要志定襄人洪武三十一年知奉化縣剛柔兼濟蒞政五年一邑大治陞刑部主事陸本成化四明郡志字思名長洲人洪武三十一年由人材授寜海令先是瀕海之民塗闕堤圮海潮日浸連嵗無秋民困於逋租且徭役相仍逃亡者衆本莅政月餘推誠招諭復業修築堤岸闕以穀種耕牛俾事農業於是民得安生李亨鄞縣志澤州人洪武三十一年知鄞縣治事明敏人莫能欺民有茄初熟鄰人竊鬻於市民追奪之訴於縣命傾茄於地笑指竊者曰汝真為盜若果為汝茄肯於初熟時摘其小者乎遂服又二軍籠二鵞道逢民家鵞羣竊其二納籠中民來訴亨問飼以何物軍曰糠粃民曰草耳頃之鵞糞庭下糠草異驗二軍不能對其明斷多𩔖此陞蘇州同知梅應魁嘉靖寧波府志威逺人建文三年為寧波推官惟務寛恤聽決獄訟善探情偽時鄞邑民邵觀奴妻陸氏潛之毋家其毋辛匿之反誣壻殺氏觀奴逮捕不勝拷掠遂誣服第無迹可徵久不能決上於府移應魁鞫之乃併繫辛氏於獄未得其情一日辛之少女來饋命收於僻處紿之曰姊何不出令汝來饋至是女懼乃漏言曰姊在某處令某同來探毋消息耳於是亟捕陸氏至辛乃服仕終布政使王璡王鴻緒王璡傳字器之日照人洪武末以賢能薦授寧波知府毁境内滛祠三皇祠亦在毁中或以為疑璡曰不當祠而祠曰淫不得祀而祀曰瀆惟天子得祭三皇於士庶人何預毁之何疑自奉儉約一日饌用魚羮璡怒其妻曰若不憶吾啖草根時耶命撤而埋之人號埋羮太守燕師臨江璡造舟艦謀勤王為衞卒縛至京成祖問造舟何為對曰欲泛海趨𤓰洲阻師南渡耳帝亦不罪放還以壽終魏宗成化四明郡志字本敬南平人由國子生任台州同知陞廣州知府永樂七年調寧波先是守久闕郡政多不舉宗至詢民情察政務利病之緩急而興革之先籍雜役額驗民丁税之數以多寡貧富為差揭示通衢民知定役里胥莫能售其奸嘗置櫝座側訟至則納詞其中以次推理一出已斷輕重不失五邑之民聞風向化訟庭閴然宋真成化四明郡志和州人永樂十三年為象山縣丞壬寅冬倭寇侵縣官民聞風而遁真方出還左右曰賊至當避之真曰吾司民牧當與民同安危民既受患吾將安歸持竿殺賊數人自午至晡更無援者俄竿斷猶赤手搏戰不已賊衆圍之剽七首中脅死蔡海象山縣志閩縣人永樂十四年為象山學諭倭冦犯境軍民奔散一空海獨危坐賊至不忍害海厲聲罵曰醜賊自當稱貢乃敢冦境擾兵耶賊刺之遂飲刃而死田南畝成化四明郡志永豐人由監生永樂十二年任奉化知縣資性寛厚刑罰不妄施惟以禮訓人民日就化鄭珞福建通志字希至閩縣人永樂進士改刑部主事宣德初知寜波府鞫獄片言立決禁絶軍兵邏捕之擾而盜賊亦屏息條減織染弓張二局及諸色嵗辦物價均節賦力汰其浮羨一切老胥猾吏盡束手以避興舉學校以至公署倉塲橋梁碶堰之屬罔不飭治每莅政畢輒至明倫堂與諸生質難可否奬其良而懲其不率即布衣之士識治理者時延訪之治行稱最余斌分省人物考合肥人襲職為處州衛指揮使宣德五年調定海衛建義學延師儒令官家軍民子弟願學者咸肄業焉暇則躬詣考閱而激勵之自撰公勤廉謹四銘書於􅈦事以自勵城南海山有大浹渡常覆舟溺人為文祭其神後遂無患六年仍調處州衞七年陞浙江都指揮僉事胡敏寧波府簡要志字鋭之定逺人宣德六年知鄞縣操守端方臨事剛果陞監察御史周銓寧波府簡要志玉山人進士宣德六年知奉化縣廉以持已惠以養民在任六年百廢具舉陞監察御史終按察使和鵬天啟慈谿縣志字大舉山西人丁未進士令慈谿勞身率下如建學校葺廨宇取材聚甓皆躬為區畫故民不令而自勵廉潔出於天性官久益貧後以母喪去鬻衣以行官至僉事賈奭成化四明郡志巴縣人由進士授慈谿知縣教民樹畜賴以生息興入市貿易之利民甚便之嵗造御茶省節浮費蠧弊剔除民心悦服嘗嵗旱齋禱甘雨隨應以廉能薦拜監察御史龍伯天啟慈谿縣志江西人成化初知慈谿不尚深刻至馭吏則甚嚴革除宿弊簡省徭役境内肅然聽訟止令口訴悉得其情由是囹圄常空朱欽福建通志字懋恭邵武人成化進士授寧波府推官舊浙江通志潔白自持訊讞詳盡巡撫張憲贈之詩曰捍潮有力能迴海立政無私可問天以異等召拜監察御史淩傅江南通志字汝弼句容人舉鄉貢授象山知縣築堤障水民得粒食卒於官立祠祀之姜昂舊浙江通志崑山人知寧波府正直不阿躬率其屬薄賦緩刑與民約信餽遺絶跡門庭如洗鄭琳象山縣志𢎞治四年由舉人知象山剛方廉介執法不阿豪有力者莫敢以私干時人呼為鄭硬頭黄昌嘉靖寧波府志字景文臨川人成化丁未進士𢎞治八年以兩浙轉運判官陞寧波府同知在任清苦勤幹人莫能堪與郡守姜昂同時人稱一臺二妙沈希達嘉靖寜波府志字時用長洲人𢎞治十一年任通判先時倭入貢道寧波郡人利與市易不虞其譎也已而自京師還偽券紛然無所辨希達召倭衆諭以善惡禍福大書天理人心萬里海面八字懸之倭人氣懾吐實乃折偽券償實負丁袍鄞縣志字天衮豐城人由監生任鄞縣丞雪誤罹死獄者七人海運遭風連及數十人頻年拘繫袍得其情為申釋之張津嘉靖寧波府志字廣漢博羅人𢎞治進士正德六年守四明廉仁公直郡嘗大旱屏車葢曝赤日中徒步行六十里詣天井靈湫禱焉比還雨隨車霑足轉而為穰林富獻徵録字守仁莆田人𢎞治壬戌進士授大理評事忤劉瑾降潮陽縣丞瑾誅起袁州府同知陞寧波府知府當道喜事者増募鄉兵命編户輸直富以儉嵗民貧持不可廣德湖自宋為官田輸租特重民陳乞如花嶼湖全折例下所司輒格富憫其困乞與全折丁父憂服闋補處州山民聚徒盜礦富計擒首惡斃之獄其黨怖詣願復業富命代諸邑民兵食其役兵既精礦患亦息孝豐冦湯毛乃倡亂富親抵賊巢擒其魁并黨數百他兵乗之遂殱以盡陞廣西㕘政仕至兵部右侍郎徐相象山縣志江西人正德九年知象山清介絶俗自奉惟蔬素内子不堪相曰為清白吏婦不愈於贓敗為戍卒婦耶後遷州守去今里甲均徭十年一輪者自相立法始瞿唐嘉靖寧波府志字堯佐大名人第進士為御史有聲正德十年蒞寜郡甫下車條布教令以表正風俗為先務性嚴毅不撓於豪猾時市舶太監梁瑤骫法擾民唐舉憲典束持之瑤納賂其黨左遷嵩明州胡瓊天啟慈谿縣志字國華福建延平人進士知慈谿斷獄明審尤振興學校在邑三年賊盜屏跡民皆安堵召為監察御史廖雲翔奉化縣志福建懷安人由舉人正德十年知奉化縣持身廉介不以家累自隨布衣脱粟視民如子嘗有貧民負官錢者以其俸資代之不責其償先是縣官謁鎮守市舶内臣以賄賂其左右乃得通見雲翔曰寧使吾不得為官一錢尺帛皆民脂也寧忍剥吾民以博一見耶入覲人謂當多備行資雲翔曰天下寧有餓死入朝官乎調虹川致仕冦天叙名山藏字子惇榆次人正德三年進士任寧波知府政事之外講明理學士皆興起治行為天下第一遷應天府丞陞刑部侍郎葉竦天啟慈谿縣志字喬新江西撫州人進士授龍泉縣調慈谿杜干謁止饋獻爬剔姦蠧會旱祈雨責躬誓神徒步以禱大雨若注遂有秋市井火發亟走其所長跪籲天火亦隨滅鄭餘慶嘉靖定海縣志字崇善閩人由舉人令定海勞心撫字不務繁苛嘉靖癸未日本入貢搆隙倡亂餘慶嚴為防禦賊退繕城隍除戎器定賴以寧夏值亢旱徒跣拜禱大雨隨渥又大疫捐俸市藥多所全活至冬大侵陳荒政十事不待命下先發庾食其尫羸者纂定海縣志李鳯嘉靖寧波府志祁州人由監生嘉靖三年任象山司訓博學能書坐齋舍中日肅諸生講課多所發明會學使恣睢任意辱鳯