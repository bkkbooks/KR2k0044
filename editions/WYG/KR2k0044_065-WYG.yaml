body:
  text: 浙江通志卷六十六海塘五雍正十一年正月大學士鄂爾泰等為遵㫖議奏事浙江總督程元章奏查勘海塘情形一摺奉㫖大學士鄂爾泰張廷玉朱軾會同總督李衛尹繼善詳議具奏欽此該臣等會議得浙江總督程元章奏稱海寧縣東西各塘近日潮勢危險實有倍於往昔等語查各處海潮俱係暗長獨浙江之海寧縣因江海相交之處尖山入口束隘激起潮頭江水東來海潮西去席捲奔騰逆流而上故與他處情形迥異厯年東西兩塘各處工程因潮汐遷徙靡常故修築堵禦不一今據稱今年夏秋潮勢自東而西竟侵入仁和縣界二十里等語臣等查核檔案寧邑東塘向有修築石草條石塊石各塘西首現衝之仁和縣界内原係土塘厯年未有石草各工此處離杭城後身僅止二三十里且與長安壩下河向北一帶低窪之處相去不逺設有疎虞建瓴而下有闗杭嘉湖蘇松常六郡利害是今日之險以西為急自應速為修築以備春伏大汛但各處塘工止有土石之分獨寧邑又有草工者蓋縁潮勢沙性俱與北首之海鹽平湖南首之蕭山㑹稽山陰餘姚等縣不同其地沙活土浮根脚既不堅實潮頭又從根脚之下横過沖刷來去蕩摇晝夜兩次快水回溜専搜塘脚即使大石鋪砌塘身堅厚而根脚一鬆上重下虚最易傾側故土性堅實之處尚可修築石塘遇沙土浮鬆只得修築草塘暫為堵禦此三項工程在石塘則苦於辦石艱難河海轉運曠日遲久土塘又苦於取土之處逺則工費浩繁近則塘身單薄且多民間農桑廬舍無曠土可採草塘則止堪堵禦一時每年必須加鑲而潮汐鹹水夏秋霉黰數年之後易至墊朽是三者各有難處而因時設法分别緩急隨地制宜又皆必不可少應令逐一詳加查勘趁春間潮小之時將應行補葺修築工段即於藩庫酌動正項錢糧相機儧築多備料物以禦潮汐其通盤相度形勢籌畫機宜應作何修築以垂久逺之處應俟欽簡大臣前往詳細查勘再行定議又據奏稱今嵗増修添築塘工用帑十五六萬晝夜搶修始保無虞庫存捐項用完動支厯年用存恩賞備公現在添築草塘及補修各工動用浩繁莫如照依從前海塘事例仍開捐納以資經費等語查浙江海塘從前原有捐納貢監事例自可循例舉行但若許直省俱赴捐納則於軍前事例有礙若止本省及貢監一途恐捐納既少於事無濟應酌量止許浙江福建二省之人就近赴捐並於貢監之外増添封典加級紀録及雜職吏貟即用令該督酌定條款具題到日再議再查各項工程俱應及時修築所需經費若俟開捐交收動用誠恐緩不濟事應即於藩庫先動正項錢糧一面奏聞一面即行辦理所動藩庫錢糧即以捐納之項抵補又據奏稱塘工尤須熟練強幹之員現任杭捕同知李飛鯤塘工尚屬諳練因委署海寧縣篆不能兼顧臣現在遴貟改署令李飛鯤専管東塘以専責成等語查海寧縣篆該督既稱另行遴委則李飛鯤當在緊要塘工處所辦事今西塘工程甚急李飛鯤應令専管西塘庶為相宜又據奏稱分撥之佐雜千把等貟若臨時委調者非係熟練於事無益今在工數貟再加揀選酌量留工并於通省佐雜揀選發工効力俟有功績另請議敘委用等語查塘工闗係重大該督身任責成一應在工道㕔佐雜千把等官俱聽該督選擇改換委任將來不致推卸庶於工程有益矣為此具奏奉㫖依議着内大臣海望總督李衛馳驛前往浙江㑹同總督程元章將海塘工程通盤相度形勢籌畫事宜應作何修築以垂久逺之處詳細查勘悉心定議具奏其修築工程著大理寺卿汪漋原任内閣學士張坦麟前往承辦仍照舊令程元章總綂料理張坦麟即於本籍前往直隸總督印務著署刑部尚書唐執玉暫行署理營田觀察使顧琮協辦欽此雍正十一年三月内大臣海望等奏為備陳江海情形修築事宜以資保障仰祈睿鑒事臣等欽遵諭㫖馳驛赴浙所有到浙日期及海鹽乍浦先行興工修築接濟民食海寧尖山一帶俟臣等查看明悉再行確議具奏之處業繕摺奏聞外今臣等渡江由紹興府所屬之蕭山縣并河莊山等處將浙省江海情形詳加查閱看得江海之門戸不同水性各異水道之遷徙靡常其中有人力所能為者有人力所不能為者凡人力所能為者自宜分别緩急次第興修今將臣等管見敬為我皇上陳之伏查江海之門戸有三省城東南龕赭兩山之間名曰南大亹禪機河莊兩山之間名曰中小亹河莊之北寧邑海塘之南名曰北大亹此三亹形勢横江截海實為浙省之闗闌也再查江海水性凡海皆有潮潮皆暗長惟浙省之潮與他處不同蓋縁海潮自東而西江水自西而東每遇春秋朔望潮汐盈滿江流陡發之時互相搏擊突起潮頭勢甚雄悍若再遇颶風勢必洶湧故歴來為患者雖在於潮而所以助潮為患者則又在於江與風也再查江海水道惟中小亹適當南北兩㟁之中江水海潮若由此出入則兩㟁無虞但中小亹地面不及南北兩大亹之半且山根餘氣似若綿聯潮過沙淤偶通旋塞所以不徙而南即徙而北然徙南則南㟁尚有龕常等山連絡捍衛蕭山一帶或有沖刷之處為患猶輕若徙北則北㟁僅有塘隄為之備禦倘有潰溢闗係甚鉅今查南大亹早已淤成平陸數十年前尚由中小亹出入嗣後逐漸徙至北大亹故年來北大亹之桑田廬舎己成滄海若欲遏抑江海之狂瀾使其仍歸中道恐非人力所能為者臣等出京時曾面奉諭㫖爾等到浙詳細踏勘如果工程永固可保民生即帑金千萬不必惜費欽此臣等凛遵聖訓細加詳勘凡於海塘有益而人力可施者靡不悉心籌畫以仰副聖懐今公同看得海寧之東南有尖山聳峙鎮鎖海口其西有一小山俗名榻山相去百有餘丈水底根脚相聯尖榻兩山之間相傳向有石壩堵截水道有此壩石北㟁䕶沙時塌時漲後被修塘人役誤取其石修補塘工北㟁之沙至今有坍無漲臣等相度情形現今江水大溜緊貼北塘直趨尖山榻山之間而出引入海潮衝激塘身䕶沙日卸伏思水來沙去水去沙來理固有之若於尖榻兩山之間照舊堵塞使江水海潮仍向外行則北㟁䕶沙可望復漲果能北漲自必南坍水道亦可望其南徙但春夏之交潮汛正大難以興工俟冬初水落擬用石塊設法填塞似猶人力之所能為者至於仁寧二邑海塘所有應修應築工程甚多一時難以並舉自應分别先後逐漸興修其自華家衖以東尖山以西一帶塘工有草塘并條石塊石塘不等内有大學士朱軾於巡撫任内修築之石塘五百丈完固無損又新建之條石塘石塊雖小尚屬整齊均無庸修補其餘塊石柴草各塘以及翁家埠萬家閘去年衝塌之處有已經粘補者有現在動工修築加謹保䕶者但草塘易於朽爛塊石石塘亦易坍塌若使僅僅粘補年年搶修嵗需錢糧盈千累萬積至數年不可勝算而塘工之單薄危險如故非經久奠安之計似應改建大石塘庻可垂諸永逺所需工料約銀一百八十餘萬兩所用夫役木石及運送船隻等項甚多即使用力趲修非歴數年之久不能告竣伏查總督臣程元章業經奏准開捐以資經費若儘其所收銀兩按年動支修築塘工漸次可以告竣而國帑亦不致於糜費且臣等現議堵塞尖山水口若既堵之後果能沙漲䕶塘則石塘可以不必改建倘尖山既堵仍無漲沙再行改建似亦未遲惟是翁家埠一段草塘其地脚係活土浮沙恐難釘樁砌石或仍用草工堵禦雖須時加粘補而地面不過十餘里每年所需無多至塘内地勢低窪及塘背附土單薄之處現今即應培補所需培補之土沿塘或無官地挖取應照河工之例交與地方官逐段確查酌量購買民田應用仍將所買民田額徵錢糧查明題豁又查雍正二年風潮偶大海水漫溢塘面損傷民田廬舎臣等竊思驟雨狂風不能預測若僅此一層隄㟁未為萬全且現在石草各舊塘一時未能改築應請於海塘之後添築土備塘一道比舊塘再髙五六尺務令於今年秋汛以前上緊趲築完工萬一風潮泛溢有此備塘抵禦可以䕶衞再查仁和至乍浦一帶海塘不下三百里若無專管人員將來不無廢弛之患查河工定例專設文武官弁董其責成今浙省海塘亦甚緊要前經題委杭嘉湖道一員帶管工程非其專責所設杭嘉海防同知二員千把總各一員兵二百名亦恐照料難周應請專設道員一員添設同知一員守備二員千總三員把總七員兵八百名所設官兵不無嵗需俸餉之費但查塘工嵗修錢糧現今每年不下數萬兩此後如有粘補工程即以兵丁充夫工築則嵗修錢糧可以少減且設有官兵巡查照看隨時修補既可保固塘工而於工築之暇仍令勤加操演則海疆亦得藉資防禦除現在搶修工程並粘補石草舊塘以及萬家閘外修築衝卸水口所用錢糧仍令於本年嵗修案内核銷外所有堵塞尖山水口約需工料銀六萬二千五百餘兩新築土備塘一道約需工料銀十三萬五千四十餘兩培補舊塘上身約需工料銀二萬一百九十餘兩三項共約需銀二十一萬七千七百三十五兩餘又添設官弁每年約需俸餉等銀一萬三千七百九十八兩餘米二千八百八十石以上議修工程及請設官兵之處如蒙皇上俞允臣等另行逐細核估確議具奏謹將江海情形繪畫圖式恭呈御覽謹奏四月初一日奉㫖此所議俱屬妥協着交部照所奏行朕思尖榻兩山之間建立石壩以堵水勢似𩔖挑水壩之意所見固是若再於中小亹開挖引河一道分江流入海以減水勢似更有益從前雖經開挖旋復壅塞者皆因惜費省工之故今若倍加工力開挖兩工並舉更覺妥備石壩建後即可漲沙而石塘亦當漸次改建以為永久之利其開挖引河之處着程元章會同汪漋張坦麟等相度地勢酌量辦理該部知道雍正十一年四月工部為備陳塘工仰祈睿鑒事該臣等會議得内大臣海望等奏稱雍正十一年三月二十九日臣等將浙省仁寧二邑海塘應修工程繕摺具奏奉㫖准行在案今臣等伏思浙省海塘工鉅費繁闗係重大必須調度有方經理得宜始於塘工有益謹將修築事宜酌議數條恭呈睿覽一分管工程人員宜揀選酌派也查浙省現任佐雜等官各有别項差遣未便全行派撥即從前發往委用人員恐亦不敷調派臣等在浙時有本地廢員及紳衿子弟情願自備資斧呈請効力者其中不無可用之人應令總督程元章詳加驗看如有家道殷實才堪任事者酌量揀選派委果能實心辦事經理得宜工竣之日令該督分别等次出具考語保題請㫖等語應如所奏監督工程除内務府員外郎穆克登額海防同知吳𢎞曾等已經奏明辦理外如不敷再令總督程元章於通省府佐内揀選委用其運送物料催儹夫匠等項亦令該督將現任佐雜及命往試用人員酌派差遣再本省在籍廢員及紳衿子弟有情願自備資斧効力者亦令該督揀選家道殷實才堪辦事之人酌量派委以上各員果能實心辦事經理得宜工竣之日令該督等分别等第出具考語具題請㫖議叙一給發工價銀兩宜採買米石兼放也上年浙省仁寧等縣秋收歉薄現在米價未平今興修大工夫匠雲集恐致市價益昂應令總督程元章即於臣等估計修塘工價銀内酌量動支銀數萬兩遴員於米賤地方採買糧石運送工所搭放做工人夫既得均霑實惠而本地米價不致昂貴等語應如所奏行令該督作速在於修塘工價銀内酌量撥給銀數萬兩委員採買運至工所轉飭承修各員搭放在工夫役仍將搭放銀米數目於題銷册内分晰造報一添設官兵宜專責成也臣等現議設立道員一員應請加以海防兵備副使道職銜並請鑄給闗防以昭信守凡海塘文武官兵俱聽其調用至沿海地方州縣等官亦令兼轄遇有緊急工程需用佐雜夫役庶