原設之兵分散仁寧各地方不過資其防範平穩無事之時未免閒曠今臣等公同酌量擬將額設兵内以四百名派撥引河新工委令守備千把總輪流管束并令引河通判就近督查遇有淤淺之處隨時加濬務使河身暢流以為善後久長之策其餘六百名仍留海塘照舊防範如此則兵丁不致曠惰錢糧亦得節省塘工引河均有裨益再新設兵丁原議沿海蓋造兵房以為棲止今尚未建造既經分撥四百名於引河相應遵照原題按數移造合并聲明等因具奏前來查浙省海塘先經内大臣海望等奏稱臣等議設道員一員凡海防文武官兵聽其調用沿海地方州縣等亦令兼轄遇有緊急工程需用佐雜夫役庶幾呼應得靈設兵一千名分隸二營管轄除原設二百名外其新設八百名召募人材壯健者充當俱令學習工築事務以備修塘之用工築之暇仍令該管官弁訓練武藝以資汛防等因具奏經臣部會同兵部議覆准行在案今該督奏稱額設兵内以四百名派撥引河新工遇有淤淺隨時疏濬等語應如所請准其派撥原議沿海蓋造兵房准其按數移造可也奉㫖依議雍正十三年五月工部為敬陳海塘事宜題請定例以便永逺遵守事議覆總督銜管浙江巡撫事程元章疏稱浙省海塘闗係重大潮汐衝擊晝夜不息全藉塘工堅固以資捍禦兹據布政使張若震條議具詳前來臣詳細籌酌逐一確議敬為我皇上陳之據詳海塘錢糧俱宜分案具領查塘工錢糧重闗國帑而修築工程亦各有段落丈尺若將數案銀兩任由承辦之員一總領回通融辦料則工程逺近不一貯料地方不同那東掩西易滋弊竇應請嗣後凡承修工程務須專案赴司具領不得將數案銀兩彚成一處亦不許借通辦料名色任意那動領回之後已辦何等物料存貯通報上司以便不時委官盤查倘有虧空那掩情弊立即嚴㕘治罪等語應如該撫所議嗣後浙省修築塘工估需銀兩飭令承修之員專案請領不得牽混併領亦不得通融那用領銀之後將辦過物料數目申報委員查驗如堆貯物料與所報相符承查之員加具保結申詳貯用倘有虧缺及那移掩飾情弊立即揭㕘如查驗不實通同狥隱該上司查出將查驗之員一併㕘處又疏稱據詳海塘保固宜分别定限查築塘捍禦潮汐自應明立保固限期以專責成但近日仁和海寧地方江海直逼塘脚潮汐晝夜兩次往回沖刷又加以土鬆沙浮坍卸靡常實屬險要且塘堤有土石鑲草之不同工程有平險最險之各異若不逐一分晰止以平穩險工定一年二年之限尚有疎漏查新築之土備塘係在石塘之内既不攩抵潮汐亦無江水搜刷應照不險工程例保固三年其新築條石塊石各塘皆因海潮江溜日夜衝激塘身坍矬始行改築均係險要處所應仍照原議各保固一年再拆底草塘緣下係活土浮沙不能建築石塘而柴草非木石可比日浸海水易於朽爛勢難經久又附石土塘緊靠塘身每遇夏秋潮湧加以東南風勢猛力潮頭直潑塘面塘身稍有矬卸土塘亦因以坍塌均屬險要工程應各保固半年至搶修之加鑲草塘係江海急流頂衝之地坍矬處所不及拆築應即隨時搶堵補救一時實為最險工程應保固三個月統於收工之日扣起如限内坍塌即着落承修之員賠修如遇異常潮汐非人力可施者查明工程原係堅固錢糧俱歸實用取具保題免其賠補庶工程緩急攸分工員知所遵守等語應如該撫所議嗣後將新築塘工責令承修之員依限保固如限内坍塌即着落賠修如遇有異常潮汐委非人力可施查明工程堅固錢糧俱歸實用者准其取結保題免賠如物料茍簡工程草率錢糧不歸實用以致工程坍塌即照例題㕘着落賠補又疏稱據詳估計册籍宜令承修官會同估造以免推諉查海塘物料册籍向來先由地方官估計後經海防同知領銀辦料承修原因承修之員恐有浮冒是以責令正印官據實估計乃不肖之員或修築不能合式或報竣已逾定限一經上司駁查非稱原估舛錯即稱地方官造册遲延輾轉推卸未免遲誤嗣後一切塘工册籍均令承修之員㑹同地方印官估計查造由兵備道確核轉詳既可杜浮冒之弊而工程亦不致推卸等語應如該撫所請修築塘工飭令地方官會同承修之員估造清册兵備道核詳該撫照例咨部以便工完題銷查核倘有彼此推諉致誤要工者該撫即將地方官及承修各員一併查㕘議處又疏稱據詳搶修工程宜令大員確核興工以杜侵冒查動用錢糧固須慎重但海塘緊要處所一有坍矬亟須搶修以資捍禦實有刻不可緩之勢兵備道管轄全塘相隔一二百里不等若搶修工程必俟申報該道勘明然後興工往返需時設有悮工闗係匪細該司所議尚有未協請嗣後凡緊要工程設有坍矬承修之員即一面督率在塘弁兵上緊搶堵一面飛報兵備道親往查勘核明工價飛馳轉報如非緊工不應搶修希圖冒銷揑稱危險者詳㕘究處等語查河工定例内稱搶修工程原係搶救一時稍遲則工程漸損是以該管㕔員一面詳明一面星飛運料修防彚册題銷海塘工程較河工更屬危險緊要應如該撫所議凡有緊要工程設有坍矬承修之員一面督率上緊搶堵一面飛報兵備道赴工查勘如查非緊要工程揑稱危險希圖冒銷者立即掲報題㕘倘該道有查勘不實狥庇朦混等情將該道一併㕘處又疏稱據詳海塘緊要處所宜酌量預備物料以資接濟查海塘數百里内凡危險處所若不預先購備物料分貯待用一遇坍矬則風濤緊急臨期猝辦未免措手不及應先發銀備料以應急需但同知二員既有工程專責若再委辦物料勢難兼顧應照例酌動銀兩分發産柴各縣上緊購買預期解交塘工委員驗收加謹分貯遇有緊要工程一面詳報一面撥用將所用物料造入搶修案内報銷仍照依原貯之數發銀預備俱責令兵備道不時稽查等語應如該撫所議酌動銀兩給發預辦運交海塘緊要處所加謹分貯如遇急工一面詳報一面撥用如有餘剩扣除現存數目再行核給預備以資應用如短少侵蝕及堆貯不慎以致朽爛不堪應用者立即查㕘治罪追賠又疏稱海寧塘工每遇大汛潮汐洶湧異常所以石塘之下復築有坦水數層以資保䕶若任其坍卸不嵗為修整則潮溜直逼塘脚晝夜沖刷脚根既虚塘身豈能堅固是坦水實為保䕶塘身之根本請嗣後遇有坦水石塊衝卸樁木欹斜承修之員即應詳報兵備道確勘估計轉請興修剋期完固以䕶塘身等語應如該撫所請飭令承修之員據實詳報估修可也奉㫖依議雍正十三年七月十九日欽奉上諭恭紀首卷内閣大學士朱軾總理浙江海塘工程事務雍正十三年八月二十六日奉㫖將浙江海塘工程事務交與内閣大學士江南河道總督嵇曾筠總理雍正十三年十一月大學士總理海塘事務臣嵇曾筠奏為查勘海塘情形請先修築舊塘以資保障仰祈睿鑒事竊臣欽遵恩命總理浙江海塘事務周歴上下各工詳加查勘間於本年九月二十八日接到大學士朱軾寄字内開雍正十三年八月初八日面奉大行皇帝諭㫖浙江海塘闗係民生最為緊要因隆昇與程元章意見不合以致遲悮工程特差爾前往督率之隆昇等聽爾節制如何修築之處爾做過浙江巡撫自必諳練但工程浩大需用錢糧斷斷不可吝惜舊塘先須修築完固以資捍禦切不可因塘身臨水那動尺寸那移一歩即衝塌一歩何時是已至修建魚鱗大石塘乃一勞永逸之計不可因塘外沙漲停止修築縱使沙漲數十百里民人居處耕種亦不可恃必須大工完竣方可垂之久逺於地方有益其石料夫工價值照時給發若扣剋留難則利民之事反以病民如有此等情弊務嚴㕘重處毋得姑容欽此仰見聖謨廣運洞悉機宜伏查海寧縣東西兩塘延袤一百餘里多係海潮江溜瀠洄衝激搜刷塘根在在險要雍正十一年間仰沐大行皇帝欽差内大臣海望等赴浙會勘奏請改建大石塘坦永垂利頼而經始維艱尚未舉行本年六月内風大水湧舊塘坍卸雖經撫臣督臣等分頭搶築堵禦一時但纍石鑲柴暫為粘補現今塘外坦水工程潑卸歪斜比比皆然塘身卑矮單薄背後盡係坑漊内外空虚實屬可虞杭嘉各府襟海帶江所恃以禦水患者惟此一綫殘塘若不速為修治恐轉瞬春潮踵至闗係匪輕查從前估築魚鱗石塘原議將舊塘坍卸之處逐段改建今海潮直逼塘根往來沖刷萬難拆去舊工開槽改築且臨水做工一日兩潮油灰漿汁無所施用斷不能如式堅固臣再四思維惟有循照嵗修之例速將舊塘工程上緊勘估修築以固外面籓籬另於舊塘背後相度基址建築魚鱗石塘方可垂諸久逺其新塘未竣以前數年之内全資舊塘抵禦海潮以便施工砌石即新塘既成之後留作重門外障更屬有備無患除建築魚鱗石塘工程容臣詳勘塘基確估工料酌定章程另行條晰奏陳請㫖訓示遵行外謹將修築舊塘事宜敬為皇上陳之一塘身卑薄宜幫築裏戧也查海寧縣迤西普兒兜至迤東念里亭一帶塘工悉係海潮頂衝必須塘身寛厚方可藉資捍禦雍正十一年奏請加髙附土歴經兩載風雨淋漓漸次塌卸今年又被風潮沖漫現在通身單薄内外受險倘再遇風浪衝擊難免潰決之虞臣請通盤查丈於塘身裏面幫築土戧增卑培薄一律髙寛所需幫戧土方沿塘現無官地且多係坑漊不能取用應照河工例交與地方官按段確查離塘數十丈外酌量可以取土之處購買民地應用即將所買民地額徵錢糧題請豁免一坦水工程宜修補完整也查海寧塘工多屬活土浮沙潮水搜囓脚根易致空虚從前於塘身外面每嵗補釘排樁修砌石塊二三四五層不等名曰坦水賴以攩浪䕶塘立法甚善其如年久樁木損折石塊潑卸近今又乏嵗修猝遇風潮撞擊殘圮殆盡憑何保衞塘根臣請購辦粗大樁石將東西兩塘坦水逐段修補完整以資衞䕶至需用木石等料移催撫臣多募夫匠船隻公平給價星赴各山産地上緊採運以便儹修一塘身石工應擇險修砌也查塊石壘塘既無灰漿灌砌又無錠鋦鉤聯率用零星碎石逐層堆垜一經雨水淋漓處處滲漏脹裂設遇風潮撞擊必致通身矬塌殊屬危險臣請多方購運條塊大石將現在頂衝首險地方所有塌卸塘工分别段落陸續改砌整齊方保無虞又查石工坍裂之後多於塘身上面用柴搶築雖層土層柴加鑲鋪墊而鹽箾枝幹粗浮難於壓實容易漏縫且因下有石工未便簽樁全不聯絡結實勢難經久亟宜擇險拆修仍用大石塊逐層鋪砌庶為穩固一柴草工程宜加鑲髙厚也查海寧縣迤西翁家埠一帶塘根沙土虚浮難以釘樁砌石從前修做掃工用柴堵禦綿亘二十餘里隨修隨墊危險異常現今潮平之時掃工出水僅有一二尺不等設遇伏秋大汛勢必漫掃潰塘甚為可慮臣請購運柴料普例加鑲務與附土塘身一律髙平外用長樁簽釘堅實再於險要處所多貯柴束土方預備搶修以資保䕶一南門石工應早為建築也查海寧縣南門外塘工五百餘丈俯臨江海切近城垣當首險之地受全海之衝工程殘缺難資保障設有疎虞水勢建瓴而下闗係甚大現在三冬水減亟宜及時建築臣請上緊購辦物料既貼近舊塘先築魚鱗石塘五百餘丈遴委幹員分段承辦預為指示做法俾令如式甃砌儹築完竣庶可保固城池以上舊塘工程必須乘此水落潮平頂底畢露之時逐段查勘通盤修築以禦來春潮汛勢難再為遲緩致滋貽悮臣相度情形會同在工諸臣詳悉商酌指示機宜現在逐一飭估辦料鳩工次第興修務期帑不虚糜工收實效臣欽承恩命竭力督催倘有木石柴草船隻不齊并給發夫價虚冒扣剋等弊臣不時查察嚴㕘斷不敢稍有容隱至動用錢糧容臣會同撫臣等核實確估造册題報所有微臣查勘江海情形亟宜修築事宜先行繕摺恭奏伏祈皇上睿鑒訓示遵行謹奏隨經總理事務王大臣等議覆查浙江海塘工程於本年六月風潮坍卸之後亟宜速為修治今大學士嵇曾筠詳勘查議先將舊塘修築再於舊塘背後相度基址建築石塘自應次第辦理除建築石塘俟詳估具題到日另議外其修築舊塘事宜分條酌議甚屬妥協應悉照所奏令督催工員上緊辦理毋得刻遲可也奉㫖知道了雍正十三年十二月二十一日欽奉上諭恭紀首卷大學士嵇曾筠兼管浙江巡撫與海塘事務歸併一手總理監督等照司道例聽其節制浙江通志卷六十六
