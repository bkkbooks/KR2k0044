body:
  text: 浙江通志卷二百十一列女十台州府臨海縣五代賀氏二孝女戴良齊二娥傳臨海賀朔之女大曰英如小曰華如同乳而母卒父以不利棄之三日夜不死隣嫗勸遂舉年十九力過健兒井臼機絲捷便如神長興二年八月一日父漁海溺死二女號泣江滸求父屍不得遂投江其異母弟瑄年十三追至三山巖見所躡履曰二姊逝矣仰天悲號呌父呼姊不絶聲亦投於江次日二姊一弟手足相捥抱父屍而浮至巖下去其父所溺海門外三百餘里里人哀而異之為收葬焉宋朱伯履妻陳氏赤城志臨海人年少夫亡有欲奪其志者陳氏拊膺慟絶旣甦引刀自剄姑亟奪之乃免事父母舅姑至孝舅得風眩疾侍湯藥不懈者八年姑老齒豁手調甘㫖以養壽百有一歲庭有梅實萱穎之祥詔封安人表門閭名其巷曰節孝王夷仲妾唐氏葉適王棐母唐太孺人墓誌臨海王棐之母唐寧海農家女初夷仲貧甚其室賈年已晚猶身治爨滌舅族憐之為致唐氏纔十二歲粗箴細縷釡甑盤筵不唯諾而集後十六年棐生而夷仲與賈相次卒家益衰兄弟析耕不數斛父母迫以嫁不許曰吾必自斷其髪然後止又三十年棐上舍及第登朝出守迎母與俱無纎粟改常度又二十年歿年七十八石墅妻陳氏赤城新志臨海人年十八適墅生二子而夫亡家貧甚守志不移事舅姑甚得婦道咸淳年旌周顒妻李氏嘉靖浙江通志臨海人顒死子敬孫生甫六月氏年二十餘或以家貧子幼議改適者氏抱敬孫泣曰周氏一脉僅此舍此奈宗祀何嫠居四十年如一日卒昌周祀王貞婦宋史本傳臨海人德祐二年冬元兵入浙東婦與其舅姑夫皆被執既而舅姑與夫皆死主將見婦晳美欲内之婦號慟欲自殺為奪挽不得死夜令俘囚婦雜守之婦乃陽謂主將曰若以吾為妻妾者欲令終身善事主君也吾舅姑與夫死而我不為之衰是不天也不天之人將焉用之願請為服期即惟命茍不聽我我終死耳主將恐其誠死許之然防守益嚴明年春師還挈行至嵊青楓嶺下臨絶壑婦待守者少懈嚙指出血書字山石上南望慟哭自投崖下而死後其血皆漬入石間天隂雨即墳起如始書時至治中旌之曰貞婦郡守立石祠嶺上易名曰清風嶺王珏妻張氏臨海縣志徳祐二年元巴延統兵入境珏倡義守城力盡死於左池氏號泣隨其後亦赴水死元章盛妻楊氏台州府志臨海人夫早世氏不再適撫孤成立訓子孫孝友三世不分異年九十二卒延祐間旌表韓戒之妻陳氏赤城新志臨海人名末媯待制剛中女也適戒之及期而寡時年二十二遺孤方四月誓不他適守節三十八年姊大媯適藁城董士楷亦以貞節聞至正中俱旌表其門馬義和妻楊氏赤城新志名善慶臨海人年十六適義和方閲月而義和卒鞠遺腹子應鳳尋卒敗屋數間茹蔬飯糲守志五十年朱谷妻楊氏赤城新志名勤臨海人年十六適谷十載夫與舅相繼歿楊傾貲以奉喪事守志以撫遺孤其父欲奪之嫁楊以死自誓乃止至正丙午旌表張紹大妻謝氏揭徯斯張節婦傳氏二十一而嫁嫁四年生二子而寡家貧姑老誓不再嫁蓬首垢面日夜紡績姑之養必具甘㫖已蔬食而已姑久而憐之語之曰汝生長富貴又方盛年不幸早寡而貧奈何以吾老故久罹此苦氏哭拜曰妾生為名家女長為名家婦志願已足不幸早寡命也况有姑以為依有子以承祭祀天之賜妾大矣而敢以貧故有二心於是姑婦相向大哭姑知婦愈信婦事姑愈謹姑年八十八卒喪葬盡禮教二子夢珍夢瑤邑大夫上其事遂旌其門洪貞女臨海縣志名静媯貢士達善女許字未嫁夫死斷髪誓不再適其姪女名淑年十三曰姑能如是願終身侍姑遂寢食與偕父母諭之終不肯適人相與績麻置田十二畝為贍老計土人相傳為苧絲坵卒後子姓奉其田為祀産祭祀不絶明張遘妻徐氏赤城新志臨海人遘應貢得鎮南學正氏養姑以居遘在任娶周氏生子瑀遘卒遘兄某寘周子母獨舁櫬以還議嗣氏泣語老僕繆軒曰而翁幸有後委而别立忍乎於是治裝戒軒以往而周意臨海惡地且憚逺莫之肯來子亦不遣氏日夜號慟居歲餘覔一莊客輔軒以行至則訴於官得瑀以歸氏喜曰有以見吾夫於地下矣撫愛不翅己出奉姑以壽終娶陳為瑀配遂有孫三人瑀亦早世婦姑相依兩世一節許六妻余氏赤城新志年二十一舅姑與夫相繼喪無子女惟二小姑一小叔曰叔楚氏撫姑教叔既長各與婚配以己奩具分二姑叔得子曰昌鞠育如己子又育二姪女長成嫁之以壽終黄氏二女赤城新志從父姊妹也長名大山適胡宗選次名三奴適吳克表二家相去不數里其夫皆以稅糧就逮其姊遣人戒妹曰若夫罹譴必貽累妻子宜見幾毋玷辱我家時妹已預決於心慰安子女扃戸自縊死既而其姊亦死於舍側池中鄉之士大夫莫不悲之張暹妻陳氏赤城新志年十八適暹暹亡遺腹生子手足皆瘋氏撫育之大興厥家孫一曽孫七元孫十皆富盛節婦年八十八而卒王三茍妻陳氏名山藏名小奴居康功里三茍出傭作日暮未歸氏抱女迎候於門忽聞夫為虎所扼遂棄女於地手執門關追至山足奮身號呌拽持夫足於虎口中提關撃虎虎驚去負夫歸而夫死矣時氏年近二十有色嚴正自持村中呼為女御史有土豪欲娶之不從乃率衆擒迫以歸氏度勢孤難免曰請少待歸奠亡夫除靈即復來豪從之奠畢慟哭出至舍側姜潭上屬襁綴女碎面毁乳投潭而死事在正統時為土豪賄囑不舉成化中乃得旌朱涣妻楊氏臨海縣志年十九歸涣未幾涣卒服闋其兄諷之他適氏泣不從乃潛許鄉之富人氏知事迫遂不復語以裝奩一二物與其伯氏女曰我去後不及送汝于歸也家人莫喻其意至夕猶治女工令其妾先寢遂自經鄭鎮妻高氏臨海縣志年十九歸鎮越七年而鎮逝柩在殯火延其居不能舉泣仆於旁火及身弗去俄而其父至强曳以歸創甚數月而愈食貧撫孤艱苦萬狀年七十五卒金顯台州府志既許配而夫病瘋宗族諷其母議改字女聞之不説託言每夕夢二仙女招與同遊遂自號通真娘子已而衆與母欲奪其志乃泣曰再聘非女道吾惟有死而已乘間入室自經姚氏二節台州府志王氏年十八歸姚篪八年而篪卒無子舅姑早喪㷀然無依與其媵姜氏即殯室坐臥跬步不離正德戊辰隣火將及其廬王與姜伏柩號慟願與俱焚鄉人義之為舁以出嘉靖乙酉並旌焉又數年王以疾卒姜先三日而逝周楞妻應氏名山藏嘉靖中楞以姻屬被累死無子應年二十五即欲同死以姑老無依乃殯夫山坰誅茆荆棘間績作奉姑所居比隣懸逺豺虎出没風雨祁寒或不舉火者累日偶得舉火即以養姑節口忍飢姑卧病十年起坐扶持如一日邑令劉大直歲給粟帛台守譚綸樹其里曰節孝王漳妻金氏舊浙江通志歸未期而漳卒遺腹生一女所親諷之再適氏舉斧欲自戕諷者不敢言撫漳兄之孤如己出為畢婚嫁孤亡復撫孫成立徐氏二節臨海縣志陳氏歸徐暄年十七生子甫週而暄卒任氏歸徐昉年二十昉死止遺腹四月二氏守志撫孤成立年俱七旬而卒昉與暄兄弟也時號一門雙節馮光奴台州府志馮良攀女許字葛坤年十七未嫁嘉靖戊午海倭焚掠女扶祖母陳入將軍山茂林中為倭所獲以手引女臂女奮拳撃倭罵曰便殺我斷不汝從倭揮刀斷其右手五指猶左手提石擊之倭遂三斷其體陳得免倭退父收其屍面色如生廵按上其事旌之范氏二節台州府志張氏范燮妻已納聘而范篤疾將議改婚張聞欲死之父母慰止竟歸范與妾屠氏侍夫湯藥積歲不懈夫卒與屠俱斷髪誓死守嘗兩遭大水不避又鄰火再偪其廬婦撫柩痛哭既而鄰屋俱燼婦所居獨無恙萬厯元年七月初十日忽見舍間石上有光旋繞如篆成齊節二字衆具報府縣為摹刻於石今尚存奉㫖建雙節坊潘汝寧妻王氏臨海縣志王亮女也歸潘十載夫病劇割股救之不起氏即齋沐吿天三斷其喉而殞萬厯時旌表侯良遇妻孫氏臨海縣志年十九適侯次年夫歿妾生一子甫五月氏視如己子舅姑欲奪其志氏嚙血自誓不移舅姑繼死力治三喪子亦成立萬厯間旌表潘貞女臨海縣志潘應化女配陳竒䇿未婚病卒女即絶飲食痛哭七日臨死囑以柩歸陳氏卒與夫合葬焉張宗成妻尹氏王偵妻羅氏林啓章妻楊氏馮九朝妻郭氏楊邦潮妻張氏錢胄妻楊氏董𢎞中妻黄氏侯孜妻陳氏侯思鶴妻董氏余璣妻陶氏王忭妻高氏王玖妻楊氏鄭㫤妻郭氏林濬明妻李氏林克明妻胡氏王宗孝妻趙氏王宗制妻趙氏李源妻沈氏陳普安妾唐氏秦懋述妻金氏應宗旦妻項氏葉紀禮妻侯氏國朝馮氏二節臨海縣志陳氏名珍馮元鼎妻年十九歸馮生三子夫卒時年二十九一夕奸徒利其所有明火入刦陳夜半倉皇起亟趨殯所賊以棍擊之中腦仆地婢子掖之避曰靈在吾何之乃以身伏柩間不去嫠居三十年教養三孤成立媳戴氏名唐徽仲子繼祖妻也年二十一歸馮甫二載生子甦未週而夫以痘亡兩世孀居並以貞節著甦登進士服官行政每事規以大義屢叨進秩㫖建母氏之教為多康熙九年並奉坊旌表何文鉽妻馮氏題旌冊名柔馮甦女文鉽就婚楚雄署中尋歸阻變寶慶而卒時婚甫八月氏年二十一越三月生子又八年亂靖擕子扶櫬歸葬事舅姑如事父母訓子綦嚴康熙四十三㫖建年具題奉坊旌表姚椒姑題旌冊姚際飛女家貧際飛食力於外一日母他出椒姑獨處為强暴所逼力拒得脱奔訴隣嫗持刀欲自殺嫗謹護之母歸泣訴遂不食但曰恨父未歸不得一見也飲泣達曙盥櫛服滷而死年十九時康熙五十八年四月也數日始殮面如生郡人競為詩文以祭之事聞奉㫖建坊旌表党問世妻徐氏題旌冊問世卒氏年二十誓死不二夫鮮兄弟氏仰事俯育遇歲饑自食糠籺而堂上甘㫖無缺子亦有成雍正二年具題奉㫖建坊旌表洪霞起妻潘氏題旌冊霞起卒潘年二十五值耿逆之亂山寇竊發氏懷利刃自隨備歴艱苦勁節不移事姑以壽終教子復為歲貢生守節五十九年洪熙載妻王氏題旌冊年二十四而寡事姑孝謹訓孤有成以上二氏俱雍正四年具㫖建題奉表坊旌秦克元妻馬氏題旌冊克元卒氏年二十六家貧無伯叔仰事俯育一嫠婦肩之朝夕拮据備嘗荼苦而矢志益堅姑安其養壽至九十陳嘉謨妻于氏題旌冊年二十一而寡有欲奪其志者輒自縊鄰嫗救免家貧日夜操作以課子守節四十餘年具題奉以上二氏俱雍正六年㫖建坊旌表徐德昭妻沈氏題旌冊年二十二歸徐二十八而寡訓二子嚴而有法姑亡舅年衰邁父亦老而無依氏俱竭力孝養皆年踰八旬而終殯葬盡禮守節二十八年陳露若妻周氏題旌冊年二十一適陳二十七而寡生子甫週氏事姑甚孝又卜葬三世之未葬者撫子成立守節三十五年侯其美妻王氏題旌冊年十七而嫁生子嘉綖未週歲夫亡氏年十九舅姑老伯叔二人俱嬰廢疾氏隻身持門戸舅病十八年姑病日四十年氏親奉湯藥朝夕扶掖左右勿稍懈守節三㫖建十九年坊旌表以上三氏俱雍正九年具題奉祝維周妻丁氏題旌冊維周台州衛後帮運丁也病夭氏時年二十一撫子成立守節三十年馬吉卿妻盧氏題旌冊年十九夫亡遺一子舅姑早世幼叔年止八歲氏撫長婚娶亦夭其妻病瘋氏親調湯藥櫛髪縫紉十餘年無倦容夫有叔觀覲老而無依氏視之如舅雖親子婦不及也守節三十三年丘拯妻駱氏題旌冊年二十四而寡撫子守節三十八年陳氏二節題旌冊陳維標妻汪氏妾徐氏維標卒汪年二十九徐年二十七遺子成憲甫兩月二氏交撫之每歲時設祭必陳其夫遺書祭畢則舉以示成憲曰此爾父手澤也卒敎其子有成汪年五十七徐年六十一而卒十年具題奉以上五氏俱雍正㫖建坊旌表秦嗣公妻方氏題旌冊年二十五而寡事姑撫子守節四十八年雍正十一年具題奉㫖建坊旌表徐喜姐題旌冊台州衛後帮千總徐宏基女幼許字何珧珧父為雲南昆陽知州珧隨任卒於昆陽喜姐年二十七未婚也訃至登樓自經氣將絶為父母所覺排救之得不死勸之不應遂不食而卒珧族人居蕭山感其竒節咸來拜奠雍正十二年具題奉㫖建坊旌表鄭氏二節題旌冊陳氏鄭良妻王氏良子秉忠妻也良卒陳年二十三遺孤秉忠纔三齡有欲奪其志者不從康熙甲寅土寇抄掠縱火時舅姑柩停於家氏抱柩哀號願與俱焚燄垂及而風返火熄閭里異之秉忠長為娶王氏生一子甫四齡秉忠卒王年二十八毁容自誓孝姑撫子陳守節四十五年卒王守節三十四年何叔才妻余氏題旌冊年二十五夫亡二子俱幼有逼之改適者氏截髪誓死乃止紡績撫子各為娶婦生二孫子俱夭復撫孫成立以節終以上三氏俱雍正十三年具題候旌鄧士鉉妻詹氏台州府志年十八歸士鉉順治丙申正月副將馬信叛遍掠城中婦女入海為贄士鉉先被繋氏投家園井中死之次日賊再至猶疑為詐士鉉舉示其髪冰矣乃去士鉉服其節終身不再娶馮孟浣妻陳氏台州府志年二十二居近江側海賊入掠孟浣扶母出避氏抱女隨行遇賊逼令下船氏抱道旁屋柱不去賊用繩縛其兩手負之而趨氏口咬賊頸賊擲於地取懷中女殺之欲其懼而隨行也氏奮躍大罵曰即殺我死不從賊復咬其手賊怒舉刀連劈之體無完膚三日後就殮面如生趙齊玫妻張氏台州府志年十八適趙次年夫卒氏有孕八月舅姑無他嗣矢志奉養既而産女其姑嘗負宿疾氏左手提幼女右手進湯藥累歲月不憚勞苦李聯芳妻戴氏台州府志年二十三生子國梁甫週歲而夫亡殯時遭火與一老僕一婢悉力扶出三人舉一柩人以為得神助嘗謂子國梁曰人不論窮達顧立身何如耳後國梁多善行鄉里稱之許遂萼妻張氏台州府志遂萼卒張年二十七子甫七齡有二婢年尤少氏謂之曰我生死許門汝當自為計二婢皆感泣願終身無他三人同志操作家政整肅趙銓妻包氏台州府志結褵兩載而銓亡舅姑各欲自盡包以遺孕慰解舅姑心稍安既而果舉一子姑晩年病瘋氏奉湯藥凡十五年卒年七十九王思維妻應氏王德化妻林氏葛元亮妻張氏高德邵妻章氏虞國彩妻包氏周簡妻陶氏徐天祐妾李氏黄巖縣宋佘元卿母吳氏台州府志黄巖人夫死始生元卿慨然曰我不見夫何忍見子因剔其目誓不他適夏孝女湧幢小品字阿九年十五一日隨父與其隣樵於山父前與虎遇隣人懼亟升木避之女見父陷虎口噭號直前執薪鞭虎且鞭且泣踰十步虎棄其父而啖之曹小娥車若水黄巖曹小娥述嘉熙戊戌二月晦麻嶴曹氏女同母范隣屋二十輩採筍陸婆坑范為虎得二十輩悉驚潰女執范手推虎而呌曰舍吾母吾代飼汝也范知不免瞀瞀然命之去呌執愈疾結行數百步虎釋范掉尾拂女踞坐熟視女以身翼范捧之下尚喘息會捄者至布衾裏以歸歸死而尸得完里人弔之不能言徐曰黄虎也吾不得代吾母死也牟琮妻余氏台州府志年二十七而孀遺腹四月旁無伯叔㷀不自存還依母家誓死守志越七月生子异茹苦撫敎逮長乃復故居壽七十八卒陳壽齡妻管氏台州府志年二十四而寡毁容守志有富家請婚曰許我我澤其孤姻黨多勸之氏不可曰我寧死終不易節敎子三人皆有才行云朱仕龍妻蔡氏赤城新志歸五年而仕龍卒常平使者黄唐聞其賢固以請盡室贊之氏拊膺慟曰婦無二夫縱卿相我何顔事之終身蓬首垢而奉舅姑以敎子年七十五而卒蔡原廸妻杜氏台州府志年十七歸原廸越五年原廸卒母勸之改適氏痛憤欲自殺母不復言事姑甚謹嘉泰年旌蔡志伯妻項氏台州府志樂清人歸黄巖蔡志伯志伯死於兵氏年二十一斷髪自誓性聰慧族處子多從講解内則列女傳年六十七卒元黄侃妻夏氏赤城新志名德慧樂清人年二十一歸黄巖黄侃八年侃卒氏號慟幾絶衾斂營葬必盡其力有司以聞旌焉馬彥竒妻盛氏赤城新志名真一讀書通經能詩適馬氏未十年而夫死三女一男家無寸土紡績營生無力延師教子乃口授章句以指取績麻水作㸃畫教之嘗有詩云一燈教子丹心苦半世紉箴白髪新晚年故家士族並迎之至家談論女則比之曹大家云陳文先妻蕭氏赤城新志名菊奴文先以獲賊功授信州廵檢卒於軍初文先與方國珍為仇至正癸巳國珍船至黄巖港擄蕭氏及其子師退次海門將甘心焉蕭氏紿以如厠擕其子同往推之入水身繼之後數日其屍自海門浮於江不逺百里直抵舊居州守以聞旌其門給錢營葬鄭谷祥妻陳氏赤城新志年二十四而谷祥卒媵周福兒生一子一女氏撫之如己出至正年旌表洪貞女嘉靖浙江通志適南塘戴某未至聞戴死弟兄送者皆勸之還洪慟哭曰吾已為戴氏婦矣遂往殯其夫夫先有一妾遺腹生子洪撫教之卒興戴氏王揆妻董氏赤城新志揆為瀋王府敎授卒於官訃至董方剖𤓰輒引刀自刎衆奪止之因慟哭不食而死詹烈婦鄭氏赤城新志夫客四明適兵至婦獨擕其子竄山谷中遇兵欲汚之婦曰寧殺我豈從汝也賊遂斬之其首至地凡三躍丁快妻王氏嘉靖浙江通志盜起海上焚刦居民王氏為賊所得欲掠而東倉皇請於賊曰我幼子在抱且母家甚邇幸還其父即從爾去賊信之如其請王氏望兒入門即投江而死金彥敬母梅氏嘉靖浙江通志彥敬四歲而父喪梅氏不忍夫亡遂裂吭以死其子孫居太平之小溪楊伯瑞妻王氏宋濓王貞婦傳名順榮字静安年十七歸同邑楊伯瑞伯瑞官行樞密院斷事官至正間貓䝤兵侵天台伯瑞遇害婦時年二十七生子慶壽始兩月䕶喪還葬於鄉鄉里欲媚上官以婦美姿容嗾使聘之不從將以威劫婦遽引刀斷髪事遂寢越三年有權貴人聞其賢强委禽焉婦拊膺長號悶絶仆地媵人抉齒以藥灌之移時乃蘇俟間執慶壽手曰吾命婦也不敢虧節以辱汝父將死於汝父之墓言訖泣而行慶壽號訴從母林氏亟往救婦以刀自剄不殊林奪刀挽之歸環守至旦稍懈婦復斷髪如初權貴人悔曰此烈婦不可强也謹按赤城新志載王靜安天台楊伯瑞妻伯瑞為樞密斷事官又載黄巖王順榮楊伯遂妻宋濂為之傳蓋悞分名與字為兩人也舊通志府志俱因之而分載於元明兩朝今從潛溪集改正明程有德妻陳氏續文獻通考名真洪武間有德以軍生至京鎮撫陸林見陳美欲汚之不從百方脅之陳愈嚴厲遂被毆而死夫訴於朝林以罪誅趙叔民妻盧氏赤城新志名津奴生有容色涉畧書史洪武十九年叔民被誣卒於京明年籍其家氏聞官軍至欲與子俱飲藥既而泣曰汝年方七歲萬一得生未可知我寧就死義不受辱遂題詩壁上飲藥仆地而絶官軍入門見壁上詩歎曰好烈婦鄉人至今稱為趙烈婦云王叔英妻女朝野彚編叔英殉節後詔治奸黨其妻繋獄死明實録陳瑛簿録叔英女將給配二女皆筓就錦衣衛獄俱赴井死沈思銳妻林氏台州府志思銳知梧州尋死林氏年二十四擕二子航海歸與妾楊氏同心守節所居里瀕海多寇擕子依外家竭力撫教至老而卒徐宗谷妻張氏嘉靖浙江通志名璩奴宗谷為仇人所害張氏負姑匿巖穴中間道達姻家泣謂姑曰婦不死以仇未復遺娠未分爾既而生女妾生男張撫字無間明年仇以姑訴受戮張始還家招魂而葬之誓死無二年五十四卒謝乾妻趙氏楊守陳貞則堂序謝鐸祖母趙有志操年二十九而寡以鬒美而殷富也多慕覬之乃斷其髪俾媒者杜口散其貲俾貪者革心守正秉節老死無易其媵嚴氏齒方踰弱將嫁之力辭乃與終老余鑾妻龔氏赤城新志鑾年二十餘歸自學舍遭風雨溺涇中氏在母家聞之哭仆於地將絶復蘇至溺所殮其夫屍欲隨以溺家人援之輿歸夫家仍自經而死林汝殷妻王氏嘉靖浙江通志年二十歸林未幾夫卒里人陳文白欲娶之氏斷髪以死自誓其父母防之且勸之力氏佯許焉既久防者少懈乃陰囑侍女分其嫁時服一歸其母一予其妹一以為殮已之具遂自經而死章子行妻林氏赤城新志年二十七而子行卒兄憐其家貧少寡欲奪其志氏斷髪自誓績絍奉姑教二子隆昭知問學台州府志有侍女陳海棠年十六欲遣之即沐浴自經家人救免林哀其志而留之人稱雙節云符松妾真奴湧幢小品真奴媵鍾氏嫁於符松僅十三日松死松母解氏尚存鍾有異志奴諷之鍾怒不省因泣吿於解氏曰安人不幸至此真奴雖欲奉以終身勢不可得惟求他日見安人之子於地下而已言訖血淚俱下是夜沐浴縊死松柩上衆議葬之以從其夫鍾竟焚其尸以去同時邑中有阿菊者從陳嫁於郭崇文生一子而崇文死陳改嫁菊夜竊其子歸於郭謝方石為之傳徐顯妻周氏赤城新志周隨顯為吏於京顯病殁周痛絶欲與俱死衆勸諭之不已卒自縊陳溫妾李氏赤城新志名石溫没其妻應氏將改嫁石所生子纔數月應百方誘脇堅不可奪卒撫其子以終身應後每歸輒歎曰吾愧無以見爾也徐元奴籌海圖編有殊色值母病歸寧賊至元奴抱母慟哭賊欲汚之元奴紿賊轉室持粧奩同往乘間赴井死項巽妻徐氏黄巖縣志年二十七嘉靖壬子倭寇至被執欲汚之氏紿之曰吾裝在窖室内願擕之以從賊縱之入室遂赴井死詔旌其門陳克諧妻解氏黄巖縣志名縑奴年十五字克諧倭寇犯境克諧娶之以逃至邑西霓橋其姑分金授之曰賊至當以贖命解泣曰有死而已及賊至遂投河而死林思貞妻徐氏赤城新志年二十二夫死遺腹生女其兄憐其少寡欲易其志氏以針刺目死以自誓養姑至孝寢食俱與姑同符洪悅妻王氏台州府志年二十七夫亡慟哭幾喪明外家欲延醫治之則曰古有剔目示信者若瞽吾之志也終不見醫者嘉靖間旌謹按舊通志作蔣洪悅今依府縣志作符牟氏二節台州府志俱徐氏一牟從茂妻一牟顯恒妻皆年未三十而寡食貧守志白首不渝王湘妻蘇氏黄巖縣志年二十二生一子而湘亡踰十年子殀有富家欲奪其志氏泣曰吾守志為夫非為子也必相逼吾即為王氏鬼耳竟守一室晨夕悲號兩目並瞽年六十餘卒陳堯還妻孫氏黄巖縣志名端適堯還未幾堯還卒氏年二十三泣血絶粒旬日而死張氏二節台州府志張頡妻王氏頡弟甘妻葉氏兄弟相繼亡王年二十八葉年二十六同心撫孤事老姑克盡孝敬並以完節終孫季益妻應氏台州府志父無子以氏贅季益踰十三年而季益亡季益兄利其産强氏他適不從中分所有以安之兄意猶未愜劫季益柩以歸氏愬之官斷依父母家守志出公門猶强之不已氏歸自經死葉氏二節台州府志胡氏葉備妻盧氏葉洗妻妯娌孀居年俱幼有子俱殀矢志立嗣始終如一徐本妻林氏黄巖縣志年二十而寡誓不他適隣火偪其廬氏閉户哀號火尋熄已值海溢氏抱夫木主待斃卒得免人謂苦節所感柯薊妻厲氏舊浙江通志年十八歸薊越歲生一女三年薊病篤語氏曰吾疾必不起卿年少家又貧其别事人乎厲拊膺曰妾娠兩月若生男則撫之生女則從君地下耳已而薊卒嚙指出血示無他志宗族來弔者出指示之以杜覬覦居七月生子攻苦鞠養雖家無儲粟處之恬如年七十終應文照妻吳氏舊浙江通志歸七月而文照卒遺腹生子錫輅妾楊氏年尚少亦矢志同守十餘年輅出應童子試三擅首選吳氏卒輅痛不及養愈厲攻苦病作而殀楊晚年苦節靡依詔旌雙節蔡子旻妻牟氏黄巖縣志名德助年十八歸蔡生一子而子旻卒德助抱屍痛哭遂不食而死應氏二節黄巖縣志王氏應子美妻年二十七而寡撫子文彬成立娶柯氏歲餘文彬亦亡柯奉姑終身從叔生子甫七日鞠育承繼姑媳一節皆以壽終陳初妻林氏黄巖縣志年十九食貧有志操初入城市氏獨居惡少徐十九欲强汚之堅不從十九捶殺之後抵罪服誅葉某妻鮑氏舊浙江通志適石嶺葉某年十七而寡一子方週隣人勸以他適氏剪髪自誓與妾春梅紡績存活雖日食不繼而節操愈厲楊心疇妻黄氏舊浙江通志姑負重疾醫云不治氏斷小指和羹以進得甦既而舅疾殆又斷無名指救之亦甦獲享遐齡宗族以為美談林景韶妻戴氏余尚再妻鄭氏張世周妻徐氏胡璉妾楊氏王欽妻章氏楊貴心妻趙氏謝綰妻趙氏程宗岳妻陳氏葛永寧妻陳氏應珉妻張氏周如泗妻郟氏盧永桂妻章氏牟尚哲妻楊氏施椿妻郟氏張燮妻楊氏徐鶠妻謝氏牟煓妻解氏張于章妻葉氏陳一經妻楊氏符允方妻周氏施朝妻鍾氏謝世白妻胡氏何鳳妻馮氏王邦宣妻馮氏池仲廣妻何氏施升妻葉氏符舜昭妻陳氏朱世高妻張氏趙貴寧妻陳氏任泮妻何氏葉景韶妻張氏王師表妻黄氏鄭玻妻趙氏李存泮妻鄭氏張鉢妻劉氏李檢妻鄭氏孫天洵妻池氏謝慄妻趙氏徐慶亨妻李氏孫咸妻盛氏孫思禹妻張氏沈興文妻江氏郟貴學妻丁氏王天福妻陳氏蔡德儀妻王氏王玖妻陳氏王堪妻郟氏趙性妻王氏趙琳妻施氏張雍妻朱氏蔡愷妻王氏彭鐩妻周氏解茂標妻蘇氏黄養妻楊氏趙逢眷妻吳氏余日秀妻柯氏余韻妻陳氏汪復禮妻胡氏國朝周斌妻俞氏題旌冊夫亡氏年二十八三子俱幼家極貧氏拮据葬翁姑及夫養庶姑親教三子句讀及長始令就外傅則以針指所入為脩脯費守節二十七載子俱成立蔡元鼎妻余氏題旌冊年二十四而寡無子妾子躍龍甫彌月外侮疊至家計日落氏與妾艱苦撫子守節三十二載五十一年具題奉以上二氏俱康熙㫖建坊旌表牟文賓妻羅氏題旌冊年二十七夫卒冰霜自矢立姪承祧守節三十八年雍正五年具㫖建題奉表坊旌張衡甫妻管氏題旌冊年二十七而寡事姑盡孝敎子有方守節二十七年于爾錫妻蔡氏題旌冊年二十五而寡子甫五齡家貧勤十指以給饔飱守節四十六年蔡文鳴妻應氏題旌冊年二十八而寡事舅姑撫二子守節二十四年以上三氏俱雍㫖建正六年具題奉坊旌表張志廣妻林氏題旌冊夫亡氏年二十一子甫週歲家貧紡織以養翁姑翁没竭蹷營喪㫖建葬事姑益謹訓子為諸生雍正七年具題奉坊旌表楊燿然妻張氏台州府志有殊色適楊生子甫四月順治丁酉八月海艘泊城氏與其夫匿養濟院城陷被逼棄其子自投井中其夫亦投於井鄭文妻丁氏台州府志年二十九丁酉海艘破城氏預為計遍紉衣裳避假山井投刃者將犯之棄其子投井中葉嘉賓妻鄔氏黄巖縣志名純娘丁酉秋海寇犯黄巖氏年少有殊色為所獲不從賊怒刃之何汝滔妻趙氏黄巖縣志丁酉歲寇將入城氏取子泣交於夫誓云設有不測惟以死待未幾寇集氏即投眢井賊以鎗戮氏終不起寇退夫囘收殮身無完膚惟兩目不瞑井水赤湧三日又趙日高妻周氏賊逼之投水死管氏二節黄巖縣志陳氏管士望妻士望卒矢守五十年如一日子景煦娶解氏週歲景煦亦逝越兩月產子廸兩寡孤雛形影相弔邑人咸稱世節蔡氏二節黄巖縣志陳氏蔡德塘妻氏女姪適蔡宗滔德塘姪也壬子寇至德塘被殺氏年二十六急抱子女與女姪俱赴水死黄元卿妻趙氏台州府志生一子一女年二十一夫卒舅姑憐其少每見之淚下趙解其意一日引刀抉一目以示不二後二老繼亡殯葬無失禮敎子遊庠守節五十四年而卒黄嘉文妻蔡氏台州府志名慧康熙乙卯寇變嘉文挈慧匿黄杜嶺為軍士所獲投以文綺欲成婚禮遂於是夜拔刀刺喉死王氏二節黄巖縣志陳氏適王汝陽二十五而寡撫子興麟娶胡氏年十九亦寡陳曰我不幸稱未亡人汝年幼無自誤胡泣曰幸有遺孕且安忍棄姑乎越月生孫輅姑慈媳孝共矢霜節陳貞女台州府志許字胡敏未幾敏卒敏兄世彦部衆搶女歸强欲妻之女誓死不從沐浴着孝衣服滷死邑令甘國輔按世彦罪併為女轉申上臺表其閭童氏二節黄巖縣志王氏適童季龍生一子年二十九而夫死矢志守節子伸娶應氏伸亦早逝撫子朝瓚朝珙錫侯皆邑諸生應氏年古稀孫曽遶膝能世其家蔡氏二節黄巖縣志劉氏適蔡雲客早世無嗣氏年二十九其妾梅氏年二十三矢志同守擇親房子允璜承繼訓之遊庠王興路妻鮑氏公舉事實家於邑之寧溪康熙十四年耿寇至寧溪氏被掠罵賊賊愛其姿不忍殺驅至北門上浮橋氏赴澄江而死逆流三十餘里興路得其屍葬之時年二十四陳朝常妻車氏公舉事實康熙乙卯耿寇至氏年二十二被執抱子泣曰我死兒失乳亦死然無可奈何須㬰寇挾衆婦至趣氏就道氏罵不絶口寇以刃斷其頭血上沖丈許子亦墜地死陳士相妻江氏公舉事實年二十適士相士相弟負罪逃匿縣役戴德捕之瞷氏美姿容遂令士相出捕弟而拘江氏於舟中以言戯之氏急投於江舟人救挽䕶之歸至夜德復潛入其室欲犯之氏持剪自刺其喉而死逺近執瓣香拜奠時年二十二柯時遇妻俞氏楊興麟妻王氏楊祚妻鄭氏黄績妻符氏施楨妻何氏柯瀠妻彭氏蔡道煥妻王氏應時榮妻王氏應仕選妻葉氏王錦心妻張氏何羽岑妻周氏符子重妻張氏沈天象妻吳氏張大麟妻何氏范廷宰妻陳氏顧國妻陶氏郟大霖妻陳氏朱康侯妻陶氏林炳生妻楊氏周琯妻應氏徐大旺妻石氏天台縣宋趙思瞿妻范氏台州府志天台人思瞿卒氏年二十五伯兄念其年少家貧以微詞諷之氏惟誦柏舟之詩繼之以泣兄乃止敎二子咸登第有聲於時元楊善曽妻奚氏台州府志適寧海楊善曽夫亡執節不二勤十指以奉姑至大年旌郭貞婦輟耕録千夫長李某戍天台其部卒妻郭氏有令姿李心慕焉去縣七八十里有盜出没李遣卒往戍而日至卒家調之郭毅然莫犯經丰載夫歸具以白一日李過卒門卒邀入治茶轉身持刀出李脱走訴縣縣捕案議持刀殺本部官罪死桎梏囹圄中郭氏躬餽食於卒久之獄卒葉姓者有意於郭乃顧視卒日飲食之卒感激入髓忽傳有五府官出决􅤾葉報卒知且謂曰汝萬一不保汝妻尚少子女纔八九歲奚以依顧我尚未娶肯俾為我室我視汝子女猶我子女也卒喜諾葉遂令郭氏見卒卒謂郭曰我死有日此葉押獄未有妻汝可嫁之郭曰汝死以我故我能二適以求生乎既歸擕二幼出市召人與之邑人有憐之者納其子女贈錢三十緡郭具酒饌至獄曰君擾押獄多矣可用此少禮答之又有錢若干可收取自給我去一富家執作為口食計恐旬日不及看君也垂泣而出走至仙人渡溪水中危坐而死此處水極險惡竟不為衝激倒仆見者報縣為具棺斂葬於死所之側山下表墓曰貞烈至元丙戌宣撫亷得其事原卒之情釋之邑人亦付還子女卒終身不再娶齊義妻郭氏赤城新志義酗酒刺其千夫長不死事覺當流於廣氏以廣多瘴癘度義不能生還乃歸其女於童氏送義郭門外籲天而哭竟赴水死邑人收其屍則端坐水中顔色不變至正中旌表立祠以祀謹按續文獻通考於郭氏傳末即繋之曰一説郭貞婦齊義妻也疑是一人但嘉靖浙江通志及赤城新志俱兩載天台縣志又載明齊義妻投學前水中死故並存之裘善甫妻周氏赤城新志善甫歿氏年二十九奉姑教子冰蘗自持至正年旌表陳均鼎妻湯氏赤城新志年十九適陳期年而夫亡無子撫姪為嗣至正年旌表許釋可妻徐氏台州府志夫歿氏年二十七子甫四歲以貞自持至正年表其門聞叔寳妻姚氏天台縣志年十八歸聞生二子叔寳歿奉姑孝敬訓子成立夏克復為傳陶氏三烈楊維楨三烈傳天台陶明元之子婦王氏淑孟女宗媛季女宗婉也淑從夫宗儒爵宜人丁未秋兵入台淑屬子傅姆曰汝以歸其父吾誓不兵辱即赴井死年二十八宗媛適里中杜思絅思絅中流矢卒時姑喪在淺土夫又未葬忍死䕶兩柩為游軍所執媛不受廹辱兵加刃脅之大罵曰我若畏殺吾已去久矣請速殺我遂遇害年四十宗婉適里中周本歸未一月兵至擕一婢走池滸阽溺一卒突至引其裙曰妻我免死婉念無以自脱指其婢曰可先妾之俟卒擁婢不為備即投池死年二十二狄恒妻徐氏元史本傳恒早歿徐氏守節不再醮至正二十年鄉民為亂避難於牛囤山為賊所執驅廹以前徐紿之曰渴甚欲求水賊令自汲即投井而死時年十八謹按於越新編載新昌崔恒妻天台徐氏事與此同舊浙江通志因兩載之攷成化新昌縣志亦作狄恒妻徐氏今據元史載入而芟去紹興之重見者明徐敬仲妻王氏赤城新志名愛玉年二十二適徐期年夫喪遺腹生一子家貧甚其姑欲嫁之王慟哭不聽事姑益謹姑亡敎子克㡳成立卒年八十餘戴用輝妻徐氏赤城新志年十八適戴居六年生子宗珍夫疾革顧氏若有所囑氏曰君念父母老及遺孤無托乎吾不即許君死亦以二者恐貽君憂爾用輝頷之而卒氏居貧自力日供甘㫖無怠舅姑没喪祭以禮撫孤成立鄉邦稱之丁守益妻楊氏舊浙江通志生二子俱幼翁與夫以糧長逮死於獄籍其家氏與幼子獲宥父母憐其無依欲再嫁之氏不從姑歿鬻衣供葬事紡績敎子至於成人鄉人稱其賢胡元啓妻趙氏台州府志名瑗夫亡時年二十八無子姑呉氏亦早寡守志不移鄉人稱為二節婦曽棨有傳谷氏舊浙江通志小家婦也夫亡年二十三人欲娶之勿從乃詐為母家召及途舁者語實谷氏號哭自輿墮地身陷汚泥中死不肯往舁者强致之乃紿其人曰欲與君為夫婦須沐浴更衣主者如其言遂閉户縊死孫氏天台縣志失其夫姓名夫亡隣人欲娶之百計不從里有老人年八十餘言頗為人所重隣人令往勸氏氏留之飯曰家貧無以為款養一雞幾二年矣請烹之老人曰吾已持齋數十年安用此氏曰固知持齋今日易之何如老人勿許婦笑曰翁持齋十年尚不肯一日易乃欲移人終身之志乎老人大慚而去邑令陳袞亟加稱賞存恤其家山口婦舊浙江通志失其姓氏居山口年十八夫為竊盜婦數諫不聽所得之物輒不衣食躬自紡績謂其夫曰汝不改行吾有死耳既而夫行不改如初乃以毒置餅中自食而死陳音妻曹氏天台縣志年二十二性嫺靜寡言笑事舅姑孝嘉靖乙卯冬倭寇入境隨姑出避與夫訣曰脱有不虞有死而已既而遇寇度不得全遂投水中死寇驚駭而去其母王氏亦早寡守節龎氏二女天台縣志龎貴女年十六龎豪女年十五嘉靖乙卯冬倭寇殺掠至溪畔逐之急俱投水而死謝栻妻朱氏天台縣志夫早亡撫幼子成家其姑徐亦早寡守志一家雙節周端妻奚氏台州府志年二十二夫亡無子與二妾同甘苦紡績資生年踰七十卒元勲妻邢氏舊浙江通志勲訓蒙以資生母梅氏偶得疾思肉邢氏割股和肉羹以進母疑味異呼邢氏問已血淋漓昏暈矣縣聞申請當道歲賜粟帛給扁旌焉葉銘善妻何氏夏廸母李氏裘崇暘妻曹氏趙彥廣妻曹氏戴欽妻劉氏魯誠妻洪氏王某妻魯氏鮑崇寛妻楊氏陳用儀妻范氏許錢妻陳氏張選妻潘氏許鉟妻陳氏陳游妻張氏張朝貴妻嚴氏陳所聞妻范氏許壙妻丁氏楊文佑妻鄭氏許國臣妻楊氏國朝湯貞女題旌冊天台湯士琰女受王夢雲聘未婚夢雲卒女年十六聞訃奔喪守節立姪為子朝㫖建夕勤十指奉舅姑守節四十年雍正二年具題奉坊旌表潘柟妻葉氏題旌冊年二十二而寡事姑孝姑病篤氏割股療之立愈撫遺子煊嚴加督課㫖建守節三十六年雍正五年具題奉坊旌表湯亨韓妻楊氏題旌冊年二十二夫亡子甫晬事舅姑十餘年先意承志疾則侍湯藥目不交􅊿没喪葬無失禮守節三十八年雍正十二年具題奉㫖建坊旌表横山烈女台州府志失其姓年十七未適人為海寇所掠逼之不從死於嶺上張元心妻楊氏台州府志名聞玉夫卒楊年十九撫前子如己出治家嚴肅事堂上尤謹郡丞李德耀攝篆天台訪節婦請旌氏其首也陳氏二節台州府志楊氏陳啓悟妻歸甫期月而啓悟卒偕其婢雲氏同心立節撫姪四維以繼夫祀課廸有成郡丞李德耀以雙節請旌陸必進妻汪氏台州府志年二十三夫亡二子俱在襁褓矢志守貞孝事舅姑勤織作以供甘㫖同知李德耀旌之王某妻李氏台州府志適王未期王傭象山以疫卒訃聞一慟暈地家人力救始甦是夕遂服滷而死張亨碩妻金氏公舉事實名朝麟讀書能詩嘗兩割股療母姑疾又置田周貧者人稱女丈夫瞿國選妻鮑氏陳期奎妻周氏謝明聳妻林氏齊之仲妻許氏陳治諏妻葉氏張利昭妻范氏桂惟榮妻裘氏范家泰妻陳氏姜人碩妻謝氏陳錫璐妻張氏蕭成標妻姜氏朱楷妻葉氏仙居縣隋杜氏二女赤城志仙居人家鬻湯餅甫笄喪父母庖人挑之二女憤激殺庖人去而之盂溪隱焉㑹溪溢溺死宋吳氏女萬厯仙居縣志年十八有殊色吕思囊亂亡匿山中吕聞其美緝獲之女紿曰大王不棄令辱下陳妾三生幸也然非蠲吉不可吕從之諏日置酒極歡候吕醉挾匕首希斷其喉誤中肩吕寤纒其髪於柱支解之張公德妻彭氏台州府志仙居張華宗之子婦也華宗死臨江學博任公德早世無子彭氏矢志貞守四十餘年㑹詔録忠臣後封孺人表其閭曰忠節世家元吳氏女赤城新志至元丙子兵亂父擕之避於山菴俱被執執者欲脅而私之女力拒不從於是先刃其父以劫之女仰天慟曰吾父死矣我尚從汝耶卒死之明鄭氏二女朝野彚編父恕蕭縣知縣靖難師至被擒死二女當配亦死之仙居建祠祀恕并其女春秋祭焉戴彥信妻沈氏仙居縣志彥信代父死沈氏尚少富家聞其美且有行爭聘之沈曰吾頸可斷頭可碎志不可奪奉姑敎子終其身徐仲成妻裘氏赤城新志仲成死裘年二十一遺腹生子以清節自守終始無二顧烈女應存卓烈女坊記名惜寳仙之懷仁鄉顧宏鈇女嘉靖中島倭入鄉女年十五未字隨其父母離家避之行數里倭追偪之同行骨肉不能相顧女與使女阿香俱被執女美姿色賊操刃驅之甚急女私與阿香語曰予二人不幸罹此訃惟一死耳白璧可碎不受瑕矣乃佯順之以紿倭行百餘步至小桐山側坐口湖層崖百丈旁瞷深淵人不得肩行離倭數尺許女復語阿香曰吾得死所矣阿香曰爾死吾豈獨生乃同投湖中而死萬厯甲午題請樹楔於湖傍應宗儒妻陳氏舊浙江通志宗儒死二子曇昌尚在襁褓有利其財者多方撓之值歲饑氏指倉困歎曰此禍本也悉散之家由是貧而矢操愈勵有司以聞詔表其閭張澄妻王氏仙居縣志時城為倭陷澄以身捍父被難王氏方少艾孤二長榮朝次榮敬遂矢志以守當兵燹後田廬邱墟氏内課農桑外理徭役訓二子成名榮敬之子存泰媳亦王氏泰不禄無嗣王氏亦苦節終其身張惟本妻陸氏仙居縣志名瑛惟本卒氏年甫二十課子宗德宗宏以義方姑吳氏亦少寡撫惟本成立而不禄不勝哀楚陸多方致吳歡令得引餘年其後裔孫鍾碩妻徐氏源慧妻朱氏相圭妻陳氏相組妻應氏並青年苦節有陸氏風而朱食貧守子子死守孫尤稱百錬之金尹德袞妻吳氏台州府志年十九適尹二年袞死遺孤方一歲父母欲奪其志曰是利吾奩耳悉以嫁時衣飾還之以死自誓舅姑繼亡室如懸罄苦節彌堅張源沂妻王氏舊浙江通志年十九源沂死無子立志苦守壽踰八十而卒源沂弟源澧妻林氏姪相道妻蔣氏俱以少寡守節撫孤成立吳炳用妻潘氏台州府志年二十二炳用死一男三歲亦死舅姑欲嫁之曰吾知有夫安知無兒臥夫棺側者二十年侍姑疾手掬臭穢無難色倭寇薄城其兄弟邀與俱逃曰有舅姑在吾忍去乎於是兄弟舁其舅姑行潘徒步從之又炳用族弟炳徵妻金氏炳徵死金年二十三撫遺孤事舅姑盡孝炳用姪時永亦早逝妻金氏年十九遺腹數月撫育成立俱無媿於潘云吳錫年妻王氏仙居縣志年二十五夫卒一慟而絶移時復甦集族長者為夫立嗣事畢從容自經於棺側邑令顧震宇扁其門曰貞烈張元向妻趙氏舊浙江通志明亡被俘至河埠溪兒口聞夫已見殺嚙指血題一絶於衣間遂投河而死曁仁壽妻王氏林世珍妻應氏蔣伸妻王氏蔣弼妻王氏蔣熠妻張氏張桴妻尹氏應賓妻鄭氏王懋統妻朱氏吳元龍妻蔣氏張日煥妻余氏張堂賢妻顧氏蔣漢臣妻李氏王懋學妻余氏張羲時妻吳氏趙佳球妻朱氏趙叔仁妻張氏王懋斗妻余氏朱君偕妻趙氏國朝吳金妻顧氏台州府志仙居顧平泰女年十六甲寅寇變避難湖頭被獲以計紿之得間赴水死又余廣生妹名錦娘被獲自刎死葉茂陵妻余氏與茂陵訣隨以手扼喉而死徐氏二節台州府志張氏徐洪蛟妻家徒四壁洪蛟病革顧謂張曰我死汝青年毋自誤張泣不荅剪髪以示志子秉志妻陳氏亦年少守志邑令鄭錄勲以雙節表其閭趙氏二節台州府志張氏趙廷亨妻年二十八而寡與妾連氏同心守志備極艱苦吳廷蘭妻張氏台州府志歸未期廷蘭卒含殮畢啓篋檢奩具或歸母或奉姑或遺小姑及諸娣姒潛作手書置篋中夜半自經於棺側趙某妻朱氏台州府志朱錫聰妹歸趙年二十五而寡斷髪自矢媳張氏亦早孀事姑孝課子有方年皆七十餘張鼎熹妻徐氏張世楷妻王氏應洪憲妻王氏潘席珍妻李氏應洪翀妻朱氏張悅生妻應氏寧海縣唐汪氏女赤城志寧海人苦節不嫁耡織以奉其親親好飲湖水其家距湖五里女日汲以供之親歿建塔報焉宋周良史妻施氏台州府志四明人歸寧海周良史明年良史侍父適日本三月而子弁生後七年良史訃至氏年二十二先此里閈未知讀書施氏始教其子求良師友訓誨之後舉進士政和年旌元任仲文妻林氏元史本傳家甚貧年二十八而寡姑患風疾不良於行林旦暮扶持惟謹撫育三子皆有成年一百三歲而卒陳公武妻應氏寧海縣志年十七而嫁明年生子而夫亡父母欲奪其志應涕泣不食父母遂不復言子復元長通儒術克紹先業至正間郡守以聞張德逺妻董氏台州府志夫亡不嫁子原度娶陳氏原度早喪陳亦誓不他適姑婦相依族里稱張門二節林可企母方氏宋濓林貞婦墓誌名友弟年二十歸可企之父時舅已歿惟姑存越八載而生四子夫亡里有豪士欲乘其孤嫠凌之氏卒能樹其門弗墜姑年八十氏保之如嬰兒無毫髮忤意訓飭諸子從師問學至成立皆為之授室卒年八十二陳小元二女赤城新志長璹年二十次􅚻年十六皆在室至正十六年盜劫縣治二女皆為所得以刀脇之女大罵賊知不可屈揮刃擊􅚻死璹被重創僵臥畎畝中賊乃退梅霍女赤城新志年二十一未嫁至正十六年賊犯境避難西溪遇賊欲汚之女罵不受辱為其所害明許瑜妻季氏嘉靖浙江通志名添瑜為盜所害氏抱幼兒從舅氏董仲載走慈溪悲號摧毁或累日方一食仲載欲再嫁之氏泣曰吾寧抱兒還許氏使盜殺我不能事異姓也仲載乃不敢復言後三年盜敗氏始歸治田廬資其孤從學為名士年七十卒薛孟釋妻章氏赤城新志洪武中孟釋觸禁逮治京師死獄中婦年二十九聞訃欲死者再已乃躬績紡以養其姑教其子登進士年七十餘而卒方孝孺妻鄭氏遜志齋集外紀寧海處士鄭與㸃女洪武壬戌歸孝孺克循婦道奉祖姑葉至孝生二子長愈次憲生二女長貞次淑建文帝即位馳驛徵孝孺禮遇特隆氏率子女歸里躬紡績以課讀壬午孝孺被難詔收鄭先期自經死方氏二女兩浙名賢録正學先生之二女正學死難時二女未及笄被逮過淮相與投橋下水中死魏氏赤城新志正學先生子婦也洪熙中赦還立方氏祠堂以奉祀冰蘗自守以終其身葉貞女台州府志許聘汪某永樂初某以事械繋至京瀕行葉請於父召某見之某謂曰此去若不還君歸他族矣葉曰還不還汪氏婦也某死京師父逼女他適女曰初欲見者正為此也堅志不從年八十餘卒吳貞女台州府志許字任畧畧以攻苦成瘵吳請於父母命侍女朱氏代候侍寢者數月因娠吳知之私喜既而訃聞請一趨哭遂育孤以終婦道朱亦同心撫育壽七十餘卒曽孫大治登進士上疏請旌郭仁壽妻王氏名山藏名珍仁壽入台城歿旅舍氏聞慟絶數四喪至庭撫棺一號仆地布苫柩側卧不解衣者三月取石為枕石有稜當枕處肌肉成創創液浸滛如是三年在家事父母亦至孝儲觀選妻王氏石簡王氏貞節傳生子綽三歲而寡時年二十二後姑私若女不利有孤父懼弗終欲嫁之氏誓曰儲氏不絶如綫有此孤耳母去孰與撫有死而已父乃已孤嘗兩遭毒皆幾絶復蘇八歲令就傅讀書蚤夜孳孳以禮義廉恥是朂故綽遂以謹愿聞葉氏三節寧海縣志傅氏葉大順妻年二十二夫亡無子媵黄氏有娠數月里中强暴者欲强委禽焉傅與媵同還母家既而媵生子傅抱兒還家徧吿族人曰大順有子矣於是與媵閉門紡績以撫之子彥濟既長走白其母節於郡卒於途傅與媳應氏二世三孀形影相弔聞者哀之章佐妻周氏舊浙江通志倭掠境周擕幼子與夫避山中遇賊刃其夫擄周往不從罵賊死華棟妻陳氏舊浙江通志年二十甫娠四月而棟亡生子瓊撫之成立生孫三人而瓊又卒凡所以鞠其孫者倍瘁於前嘉靖間旌門胡秉色妻鮑氏寧海縣志年二十五夫殞遺孤二一方二齡一僅三月家貧辟纑易粟餌子而自食糠籺或累日飢餓或冬月葛衣晚年尤艱苦勵節六十五年石三妹寧海縣志邳州判官石節女年十四隨父任以艱歸舟出儀眞江口遇賊劫掠檢其行李無所得傷節首欲刃之三妹亟抱父哭悉脱簪珥與賊節獲免執三妹欲汚之大聲罵賊遂投水死儀眞人為之立祠河口祀焉萬厯戊子立坊表曰旌烈胡三姊台州府志許聘奉邑庠生王繼美聞繼美逝即矢志不他適後宋氏子來議婚父母欲允之三姊痛哭曰兄生聘王死從王可也父母姑嫂屢諭之不從日夕飲泣絶粒而逝時年甫十七楊曠妻金氏寧海縣志曠歿無子金時年十九姑令改適氏誓守紡績膳姑迨姑亡淚眥流血死而復甦者數次隣火延燎金撫棺大號忽反風火滅卒年七十四王萬儀妻趙氏舊浙江通志夫歿欲自絶衆憐其娠合力勸甦氏因俟分娩以決死生及彌月生女一慟而絶童釋卿妻羅氏趙文遜妻曹氏朱捨妻徐氏董瑞妻朱氏王良輔妻袁氏吳克亨妻周氏董汗妻陳氏妾金氏胡允偉妻王氏戴欽妻劉氏儲歡妻王氏黄沛妻周氏楊佳妻華氏俞嶧妻陳氏王補妻潘氏王南妻黄氏王柱妻包氏鄭守對妻汪氏鄭允寛妻葉氏趙廷謙妻楊氏金大節妻華氏徐啓妻魏氏鄭浩妻王氏儲世通妻屠氏吕拱妻鄭氏李允誠妻吕氏陳應乾妻王氏董世梧妻吳氏田畫妻王氏孫永灂妻洪氏洪卜觀妻石氏俞適道妻胡氏葛才俊妻馮氏石有聲妻胡氏金文燭妻錢氏金夢環妻李氏穆君英妻王氏國朝董應鯤妻陳氏題旌冊夫卒氏年二十七遺娠兩月生一子㷀㷀無倚艱苦撫育至於成立守節四十餘年錢應㫤妻項氏題旌冊年二十九應㫤客死上有耄姑年九十矣氏迎櫬歸葬勤織絍易粟奉姑扶持左右守節三十餘年雍正二年具題奉以上二氏俱㫖建坊旌表俞氏二節題旌冊俞應宰妻楊氏子昌洽妻章氏楊年三十而夫亡事舅姑撫子昌洽弱冠遊庠章年二十七夫亡遺孤之詢方五齡誓死奉姑撫子人稱雙節吳啓取妻葉氏題旌冊年二十七夫亡上有孀姑下有一子一女孝慈兼盡守節三十六年田汝熙妻王氏題旌冊年二十六夫亡撫子成立守節至八十六歲而卒以上四氏俱㫖建雍正六年具題奉坊旌表戴象彪妻胡氏題旌冊年二十七夫亡舅曰爾青年止生二女家貧無依不如改適氏泣曰夫為獨子夫死則侍奉妾之責也敢有二心於是繼從姪為子紡績養舅舅歿鬻衣飾以營喪葬事畢歸倚母族為子女婚嫁守節四十五載雍正七年具題奉㫖建坊旌表陳一元妻儲氏題旌冊年十六歸一元生子上珍甫數月夫亡氏年十九時姑已早喪舅年七旬母又孀居失明無所依氏忍死終養人稱其孝鞠子有成守節四十年鄔氏四節題旌冊鄔翼翀妻楊氏及其子令申妻石氏孫鑄妻方氏鎔妻陳氏翼翀卒楊年二十九時海氛未靖流離竄匿氏能以智自全撫子孫三世守節六十二年年九十一而終石氏年二十五令申亡遺二子鑄鎔皆幼事孀姑撫後嗣能繼姑志守節五十年年七十五卒方氏二十八而寡陳氏二十一而寡各遺一子鄔氏自翼翀以來三世早夭一堂四寡遺孤孱弱存亡未可知族黨利其産者咸耽耽虎視二氏持己益嚴奉兩世孀姑益謹保䕶兩子益力陳守節三十年先伯姒卒方守節四十五年奉以上五氏俱雍正九年具題㫖建坊旌表錢福臣妻應氏題旌冊年二十九而寡事姑撫子守節二十三年陳苑妻李氏題旌冊年二十六而寡事尊章至孝姑老齒豁氏每食盥潄嚼物以進經七載氏不以為䙝姑亦不以為嫌撫四子俱成立守節四十四年以上二氏俱雍正十年具題奉㫖建坊旌表董佐堯妻徐氏題旌冊年二十夫亡舅早喪姑病奉侍湯藥歴久不懈没則鬻衣飾營喪葬無子撫二歲姪錫圭為後紡績自給守節四十一年雍正十三年具題候旌褚烈女寧海縣志褚宗領女年十六康熙十五年六月海寇掠女與其兄去欲汚之女紿曰釋兄我從汝賊縱兄登陸女厲聲曰吾不即死者欲全兄耳豈從賊耶遂躍入海越三日屍直浮於門前港服飾整然面色如生舁歸葬焉鄔繼運妻楊氏台州府志年二十五夫歿子亡族戚勸之改適楊泣曰寡姑無依亡夫無祀有死而已忍棄乎遂抱夫兄幼子重光撫孤承祀養姑終身歴貧苦變亂而不易邑令旌之儲應參妻蔡氏台州府志年二十五夫亡遺娠五月食無越宿或諭之改志蔡誓死守節紡績以供衣食育子元忍事蔡亦盡孝金城妻郭氏台州府志年十九生子甫四月城卒舅姑欲奪之郭誓不再嫁年六十二卒陳夢龍妻孫氏王廷妻項氏錢子臯妻吕氏太平縣元馬祀妻盛氏台州府志太平人生一子一女而祀死氏年二十八家貧養姑夜無燭常從闇中導其女紡無一縷紊亂子琰僅能言卽口授書句竟至成立明陳舜章妻王氏太平縣志王靖學妹因兄遭革除之難遂自縊死軍其子㤗於羅龍衞舜章亦義不再娶萬厯間巡撫范奏免㤗軍㤗之後裔仍囘居屏下祖宅王氏從祀忠節祠丘鏘妻謝氏太平縣志年二十二鏘卒止一女無子其母欲嫁之氏以死誓妯娌有以利害動之者輒以大義拒之皆愧赧而退家貧甚紡績自給考功郎李茂宏髙其行求其女為子謨妻金如珙妻陳氏赤城新志適如珙七載而寡無子斷髪繋夫臂誓以同穴葉士冕作苦節傳又金敬修妻施氏在室時刲股愈父疾及歸姑遘疾亦刲股以進而愈葉士冕作孝婦傳王義寅妻陳氏蔡潮義虎傳年十七配義寅七載而舅姑與夫相繼卒遺孤雲方在襁褓有豪家欲娶之不從羣不逞利所賂與豪議劫之謀既定夜半將入門忽有兩虎自山而下咆哮震地羣奸各散去兩虎守節婦門天明始去令劉弼上其事於朝旌其閭謹按舊浙江通志及台州府志作王寅良妻王崇仁妻潘氏舊浙江通志生男槐而夫亡潘年二十三撫孤成立婚娶生子已而槐亦亡又撫其孫熖成立年九十九終趙氏偃赤城新志趙貴之妹貴妻梁氏不孝其姑姑將聞之官梁氏懼罪自縊死梁之兄弟大怒將縛貴而甘心焉貴走匿乃逼偃欲奸之偃力拒不獲遂亂毆以死嚴雲太平縣志年十六許嫁鄉人鄭某未婚而夫亡其姑嫜欲以夫弟接婚父母利其貲聽委禽焉歸有日矣雲紿以入内梳櫛遂自經死方景暉記其事葉台妻張氏台州府志張涵女幼許臨海葉台涵死時氏方四歲比年十五台入贅明年挈歸氏兄無賴詐稱妹曽受其妻黨陳閑之聘太平令俞咨益受囑械台至氏因懷孕不至令斷氏歸陳獄成報郡如縣讞台貧無所置辨次日當解氏密藏小刀從容拜辭舅姑解役促之登輿不數武以刀三斷其喉而絶聞者無逺近皆以瓣香弔之即為建祠刻其像眉目清列皆木理自成至喉下木文亦裂深寸許若刀痕狀後燬於火重塑之而裂如故萬厯時事也朱四妻吳氏太平縣志年少寡父母欲奪其志赴水死其里有祠吳材官妻余氏台州府志海䑸至為賊所獲以首觸階而死當事哀之給貲葬焉葉氏二節太平縣志葉應符妻王氏年二十守節其孫恒覽妻陳氏年十七守志有司旌之葉忱妻施氏太平縣志年十九夫亡居貧守志父母勸其改適泣天自誓始終一節年七十一終鄭氏二節太平縣志韓氏適鄭永廣生子懷玉懷瑁而永廣亡自二十五守志四十餘年懷瑁娶金氏年二十七而夫亡其昆弟欲再字之金堅志不從會天大風迅雷聘者折其舟楫遂駭而返邑令顔其門曰雙節蔣江童妻朱氏趙鉾妻葉氏李霞妻趙氏謝興毅妻金氏高瑞表妻陳氏王新妻金氏邱椷妻吳氏項貴妻潘氏劉其妻江氏徐某妻孫氏蔣平夫妻葉氏蔣存清妻林氏柯上妻葉氏妾孫氏趙幢妻林氏陳攀妻朱氏金成岳妻林氏陳繼曽母賞氏柯易妻王氏高于道妻葉氏林世博妻陳氏張大桂妻薛氏金大召妻林氏媳李氏葉思植妻羅氏江聖培妻張氏張元德妻章氏洪某母石氏金大秀妻李氏王惟叟伯母林氏蔡項妻胡氏丘桂妻張氏王擴妻陳氏王朝比妻唐氏丘世汪妻林氏趙順妻金氏趙鈴妻金氏國朝陳君翰妻丘氏台州府志海賊至丘同羣婦匿山中被獲欲汚之不從露刃脅之丘即引刀自刎死猶僵立逾時賊退其夫覔至乃仆林貞女台州府志名月汀許字丘茂匡未幾茂匡卒女聞訃欲自裁父母防守之遂盡散其衣飾請歸邱父母見其志堅許焉時茂匡祖父俱在堂上奉重闈治家嚴肅巡按王元曦表其閭張禹鼎妻段氏王士竒母朱氏吳亷妻張氏王秉太妻蔡氏柳立然妻吳氏浙江通志卷二百十一
