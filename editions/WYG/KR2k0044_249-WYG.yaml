body:
  text: 浙江通志卷二百五十經籍十集部三别集明雪窩遺稿萬厯龍游縣志余黙著字克容己酉鄉貢茁齋集錢塘縣志鄒虞著字天祥仁和人何檢討集富陽縣志何洽著字允仁東濱逸稿一卷又逺逰稿嘉禾徴獻録陸淞著字文東平湖人一菴吟稿檇李詩繋陶照著字時用秀水人壻陸垹序之克齋稿萬厯紹興府志陶懌著字習之㑹稽人夢梅集又南峯稿餘姚縣志汪澤著字公溥東瀛集又九溪吟稿黃氏書目陳珂著嵊縣人寫懐集黄氏書目童琥著字廷瑞蘭溪人蛙鳴集分省人物考鄭瓘著字威甫錡子白露集兩浙名賢錄黃傅著字夢弼金華人南屏遺稿萬厯温州府志髙友璣著以上庚戌進士應酬詩集嘉靖臨安縣志盛杲著字啓東壬子鄉貢北屏存稿嘉靖仁和縣志惠隆著字從直德安行稿二卷太平寳慶雜稿二卷撫蜀雜稿一卷杭州府志胡世寧著字永清仁和人心齋稿六卷嘉靖寧波府志李麟著字仁仲鄞人東泉文集八卷嘉靖慈谿縣志姚鏌著字英之名將題咏又怡老園録山隂縣志髙臺著字居賢弟廪字居豐有探驪三十卷吳舫集明詩綜陸相著字良弼餘姚人詩文啟劄六卷奏議四卷案牘稿十卷䘏刑録二卷明名臣言行畧孫燧著字德成餘姚人濯菴集二卷黃氏書目馮清著宛平籍餘姚人用拙稿台州府志侯溪著臨海人磧東集又關東稿台州府志秦文著字從簡臨海人以上癸丑進士千峯堂稿萬厯温州府志章元梅著字和徳樂清人乙夘鄉貢東溪遺稿四卷又紀行録萬厯秀水縣志陳諮著字汝謀鳴琴稿萬厯象山縣志王渙著字時霖兩溪詩集萬厯上虞縣志葛浩著字天宏含章子集金華先民傳章品著字廷式蘭溪人南川漫逰稿十卷明詩綜陶諧著字世和㑹稽人中按分省人物考又有西行北上洪都州行臺贈遺等稿蕩南集一卷萬厯温州府志朱諫著字君佐永嘉人甌濱集萬厯温州府志王瓚著字思獻永嘉人蛟川集隆慶平陽縣志王朝佐著字廷望以上丙辰進士圭巖稿黃巖縣志牟克鞏著字邦寧黃山稿黄巖縣志余斌著字廷實萃同集太平縣志戴特著字師唐以上戊午鄉貢岫雲稿嘉靖寧波府志張時孜著字惟善鄞人兄時敏字日新有洞雲稿白齋集十卷又竹里館集嘉靖寧波府志張琦著字君玉鄞縣人白菴集又一齋集分省人物考豐熙著字原學鄞人東橋漫稿四卷謫所吟稿二卷天啓慈谿縣志姚丁著字維寧寓亷集又左氏咏又和梅百咏又竹坡稿兩浙名賢録向錦著字中美慈谿人陽明文録二十四卷文成公全書三十卷焦氏經籍志王守仁撰内閣書目正集五卷外集九卷别録十卷宋按陽明又有居夷集三卷陽明寓廣遺稿二卷儀望輯陽明先生文粹十一卷王畿輯陽明文選八卷東川集萬厯温州府志童器著字大用平陽人以上己未進士風木樓集青田縣志留祿著辛酉鄉貢毖齋集海寧縣志查約著字原博水南集十七卷萬厯湖州府志陳霆著字聲伯徳清人論學新稿又發齋集嘉靖寧波府志顧英著字順中慈谿人水衡餘興一卷又夢劍緒言又雪壺唱和又三峯文集萬厯上虞縣志朱衮著字朝章南渠存稿十六卷黃巖縣志王爌著字存約章恭惠集萬厯金華府志章拯著字以道蘭谿人按金陵黃氏書目樸菴文集八卷竹澗集八卷金華先民傳潘希曾著字仲魯金華人三峯集萬厯嚴州府志方天雨著字濟甫淳安人以上壬戌進士玉池稿海寧衛志徐泰著字子元海鹽人東湖文集又吟鞭小稿栝蒼彚紀麗水鄭禧著字宗慶父鑑有竹心亭録蟲技集寓蒲集和杜集各一卷萬厯龍游縣志何晉著字石川墨溪集萬厯温州府志朱文簡著字元可樂清人以上甲子鄉貢南溪集檇李詩繋吳昻著字徳翼海鹽人龍溪藏稿明詩綜孫泰著字時寅歸安人崇雅堂集十四卷又歸田詩選長興縣志顧應祥著字惟賢金陵百咏又半湖集嘉靖寧波府志陳槐著字公輔鄞人松坡集甬上耆舊詩馮應奎著字景神鄞人又有和陸放翁詩二卷和劉松坡詩一卷張文定公集五十卷續文獻通考張邦奇撰人按嘉靖寧波府志字常甫鄞有覲光樓集十卷紓玉樓集十卷環碧堂集十六卷養心亭集八卷靡悔軒集十二卷四友亭集二十卷尤氏藝文志又有甬川集竹莊集奉化縣志孫勝著字敏中中峯集六卷分省人物考童玘著字文玉㑹稽人峯按焦氏經籍志文簡集二卷今本中選集十一卷貽榖堂集萬厯上虞縣志徐子熙著字世昭肥遯齋稿又留園集又濟美集餘姚縣志謝丕著小野集四卷豐富集四卷突兀集四卷餘姚縣志倪宗正著字本端支湖集二十卷黄氏書目胡鐸著字時振餘姚人西浦存稿台州府志徐慶亨著字世嘉黄巖人寧山集六卷黄巖縣志王坊著字崇賢霞山集十卷台州府志蔡潮著字巨源臨海人元峯文集崇禎衢州府志周任著江山人東樓遺稿括蒼彚紀李玠著字朝信縉雲人𤾉谷空音縉雲縣志李寅著字敬之槎溪集括蒼彚紀龍泉葉溥著字時用以上乙丑進士居學齋詩六卷内閣書目錢塘老隱徐逹文穆著春臺集檇季詩繋劉鈗著字蓄之其先關中人以世冑襲海寧衛指揮使竹山小稿檇李詩繋蔣澳著字瞻仲文藻子西村集二卷海鹽文獻志朱朴著字元素許把山序刻勾溪集海鹽文獻志陳鑑著字用明樵樂存稿吳興沈疇遺夫著吳寛序東溟集甬上耆舊詩魏敖著野逸吟稿百川書志山隂髙瑨著樂澹集𢎞治紹興府志夏寅著字正寅山隂人貞晦集四卷兩浙名賢錄徐文彪著字望之上虞人文獻集萬厯上虞縣志薛貴著突兀子集萬厯上虞縣志鍾禮著字欽禮古愚集嵊縣志周嶧著字魯之學吟稿台州府志侯汾著字守一臨海人介軒集台州府志陳寅著字永慎臨海人鶴堂稿十卷台州府志趙璧著守尚全臨海人蓼蟲吟台州府志張尺著字守度黃巖人茅山穢稿赤城新志繆恭著字思敬太平人村居牧唱稿嘉靖太平縣志陳宙著雪按宙同時金如琩有野處集林海有窗稿余敏有卧雲集林倩字應美有竹淨稿林天爵字進修有雕蟲集葉丕字全卿有頤齋存稿石樓山稿萬厯義烏縣志謝愷著字舜卿永思集二卷萬厯龍游縣志方冕著字尚周志善集萬厯温州府志周令著字巽之瑞安人荆西集平陽縣志陳洽著字元悦竹坡律詩稿四卷内閣書目縉雲髙逸歉菴鄭綽撰右𢎞治時人東溪𩔖稿餘姚縣志于震著字孔安九蘭俚稿台州府志蔡紹科著字𢎞哲黄巖人弟紹先字𢎞業有公餘漫興涴牘稿簡齋詩集萬厯上虞縣志顔曅著字文華以上丁夘鄉貢端峯存稿二卷嘉靖仁和縣志邵鋭著字思抑瑞石稿十卷歸田録十卷黄氏書目江曉著字景熙仁和人江樓遺稿兩浙名賢録錢宏著字可容錢塘人臨江遺集十四卷海鹽縣圖經錢𤦺公良著公按明詩綜有東畬集檇李詩繋有良詩選峯溪集五卷萬厯秀水縣志孫璽著字朝信平湖人按兩浙名賢録作雲山履厯稿敝箧留稿二卷分省人物考汪玉著字汝成鄞縣人定齋集明詩綜王應鵬著字天宇鄞縣人稿按嘉靖寧波府志有閩疏稿東臺稿撫畿雜著稿百愚集明詩綜馬録著字君卿山隂人横山集二卷餘姚縣志徐愛著字博仁滄螺集明詩綜田惟祐著字裕夫蕭山人竹江集台州府志趙淵著字𢎞道臨海人漁石集四卷百川書志蘭溪唐龍虞佐著内閣書目又有漁石關中稿按棠陵集三卷焦氏經籍志方豪撰崇禎衢州府志字思道開化人有養餘錄老農編洞庭烟雨編珍憶録奉希集輯按棠陵文選八卷魏憲燕程集又留都拾遺又諌議稿又南巡稿又東巡録又梧山集黃氏書目徐文溥著字可大開化人濬菴稿兩浙名賢録吾翕著字廷順開化人冔子臺南集萬厯温州府志李顯著字崇綱樂清人抱關稿又西巖文集括蒼彚紀麗水汪瑛著字子修以上戊辰進士蓮谷集萬厯夀昌縣志洪鼐著字廷器兄鼒字廷新有毅齋遺稿一峯摘稿崇禎衢州府志周積著字以善江山人民懐集萬厯崇德縣志魏楷著字良模以上庚午鄉貢東濱三集海鹽文獻志徐咸著字子正泰同母弟漸齋集四卷天啓平湖縣志趙漢著字鴻逵卷按尤氏藝文志又有聲承集二南湖文録鄞縣志余本著字子華東洲雜稿又南雍集嘉靖寧波府志屠僑著字安卿鄞縣人西行贅録又隨筆録又中州巡稿又奏議雜稿又旗峯詩集萬厯紹興府志俞集著字汝成新昌人北川文集嘉靖寧波府志吳惠著字仁甫鄞人劉艮所文稿四卷黃氏書目劉棟著山隂人行臺稿又諌垣稿又山南集台州府志葉忠著字一之臨海人倦歌集又筠溪雜稿太平縣志戴顒著字師觀間存集台州府志應良著字元忠仙居人雪崖文集分省人物考戚雄著字世英金華人九峯文集兩浙名賢録胡森著字秀夫湯溪人閒時吟縉雲縣志李長著字復之以上辛未進士白厓詩集五卷黄氏書目張文宿著字拱辰仁和人存疑集仁和縣志許仁著字元夫閩逰倡和又北行野操又南溟存稿諸暨縣志鄭天鵬著二洞小稿黃巖縣志管邦宰著字良卿以上癸酉鄉貢石涇集嘉禾徴獻録陸􅇐著字元望平湖人西臯集八卷檇李詩繋鍾梁著字彦材海鹽人次子夏字時叔有劍津集石窻集鄞縣志華愛著字仁卿果菴集黃氏書目謝汝儀著鄞縣人覃湖小稿一卷百川書志鄞縣張懋賢汝澤著巡東漫集又巡南雜咏分省人物考沈教著字敬甫慈谿人靜菴文録詩録教録山隂縣志蕭鳴鳳著字子雝卷按黄氏書目靜菴文集十五石居漫興稿台州府志陳器著字徳器臨海人一所文集四卷黄氏書目金賁亨著字汝白臨海人一作十二卷圭山稿台州府志張儉著字存禮仙居人芝巖雜稿萬厯義烏縣志虞守隨著字惟貞曉溪文集二卷萬厯龍游縣志祝品著字公叙以上甲戌進士碧里四存全稿分省人物考董穀著字碩甫海鹽人海鹽文獻志前稿王文禄序後稿董鯤序海按焦氏經籍志作漢陽集九卷寧縣志作豢龍子四存田學集樂清縣志陳猷著以上丙子鄉貢亶爰子集二卷外集古文一卷百川書志仁和江暉景孚撰泉亭集六卷外集一卷過庭詩録七卷萬厯錢塘縣志吳鼎著字維新黃門集十四卷海鹽縣圖經許相卿著字台仲海寧人按焦氏經籍志作雲村集一亭集兩浙名賢録金廷瑞著字信夫錢塘人南溪集萬厯崇徳縣志張璵著字叔美天目山房稿明詩綜陳良謨著字中夫安吉人稿按分省人物考有山房摘稿和陶小柴中丞集甬上耆舊詩柴經著字季常東石遺稿八卷兩浙名賢録戴鱀著字時重鄞人拘墟館集五卷續拘墟集二卷石亭文集十二卷焦氏經籍志陳沂撰明詩綜字魯南鄞縣人徙家南京有遂初齋拘墟館二集黄氏書目有詩集五卷紀逰集五卷青華山人集天啓慈谿縣志王鎔著字時化青湖先生文選十四卷列朝詩集汪應軫著字子宿山隂人我齋寓莆集十卷我齋寓莆手簡一卷百川書志山隂蔡宗兖著巵山集録又巵山遺稿萬厯上虞縣志葛木著字仁甫浩子弟臬有一哂齋漫稿雞鳴集餘姚縣志張懐著字徳純百山存稿又解組稿黄氏書目車純著字秉文上虞人沖穆稿萬厯㑹稽縣志沈𢎞道著字伯元鳳林𩔖稿分省人物考姜絅著字幼章蘭谿人雙杉亭草十二卷萬厯義烏縣志李鶴鳴著字九臯大方笑集崇禎衢州府志吾謹著字惟可瑞峯集萬厯温州府志葉式著字成規永嘉人以上丁丑進士鳳山稿明詩綜張鋐著字叔治鄞人陽和稿又需命稿又睦族集建徳縣志魯承恩著字光世以上已夘鄉貢𢎞藝録三十二卷仁和縣志邵經邦著字仲徳卷按黃氏書目又有附録十五和古集檇李詩繋張徽著字徳卿秀水人少石子集十三卷嘉靖寧波府志陸釴著字舉之鄞縣人保和堂集鄞縣志楊言著字惟仁卷按黃氏書目作后江集二叢疣集天啓慈谿縣志劉世龍著字允卿定齋集四卷明詩綜周祚著字