集富陽縣志邵琇著字佩之西陵集明詩綜尤嘉著字子嘉嘉興人言志集擕李詩繋駱驤著字子龍嘉興人文蔚編四卷萬厯秀水縣志吴繼著樵溪集二卷萬厯秀水縣志張服采著九山樵子集明詩綜仲春龍著字元仁秀水人尚元草八卷咏物篇二卷嘉禾徴獻録姚兖著字叔信秀水人子舜聰字伯逹有好古集蠟言汗漫游草檇李詩繫次子舜漁字仲陽有西元草少岳山人詩集萬厯秀水縣志項元淇著孚子瞻和寒山詩一卷檇李詩繫張守約著號梅村秀水人隨遇集檇李詩繋曾丙著字文光秀水人蛩吟稿海鹽文獻志徐定夫著字士安擊壺編海鹽縣圖經彭紹賢著字孔嘉龍池集萬厯嘉善縣志郁天民撰子敦易有斗野山人言志録東齋遺稿萬厯嘉善縣志朱愚著字汝明一螺集十卷萬厯嘉善縣志袁仁詩文鴈湖釣叟自在吟二卷檇李詩繋王周著號質齋嘉善人吳山漫稿一卷檇李詩繋陸道乾著字子勉嘉善人卷按嘉禾徴獻録又有碧蓮叟漫稿一心逸道人吟稿檇李詩繋吳宗漢著字守忠海鹽人鉏餘稿明詩綜陸光宙著字與嘗平湖人舜鳴集檇李詩繋郭球著字友虞平湖人􅂷裕堂集檇李詩繋戈思齊著字子賢平湖人東歸稿一卷海鹽縣圖經祖晟著字廷昭見山樓集又北游稿萬厯崇徳縣志沈如封著字慰先列藝集明詩綜沈堯龍著字易之湖州人水南詞又谷應又和花蕊夫人宫詞兩浙名賢錄王濟著字伯雨烏程人甬東山人集黃氏書目吕時臣著字中甫鄞人豐對樓集四十二卷明詩綜沈明臣著字嘉則鄞縣人石盂集七卷甬上耆舊詩汪坦著字仲安楊伯翼所選定屠長卿序皆非集甬上耆舊詩萬達甫著字仲章表子安分集分省人物考鄭本忠著鄞人面牆小稿薛氏世風刪薛暨著燕游漫稿天啓慈谿縣志秦鍠著字茂𢎞月漁集鄞縣志盧澐著字宗潤包參軍集甬上耆舊詩包大中著字庸之白川集甬上耆舊詩楊明著字誠之蜕巖詩集兩浙名賢録埜著字貞隂人百按萬厯紹興府志又有别詩弦誦新聲浮峯集明詩綜周沛著字允大山隂人海樵全集二十一卷明詩綜陳鶴著字鳴野山隂人櫻桃館集闕篇十卷逸稿二十四卷山隂縣志徐渭著字文長按今本徐文長三集二十九卷㑹稽啇濬刻陶望齡校别本秘集十二卷一枝堂稿三卷思則堂前後稿黃氏書目孫鈺著燧孫今山文集一百卷分省人物考胡瀚著字川甫餘姚人采碧集列朝詩集陳公綸著字渙中臨海人石龍集三十卷兩浙名賢録黄綰著字宗賢黄巖人按焦氏經籍志有乆菴集選十六卷霞溪漫稿黃巖縣志牟嘉叙著字寅定玉芝集萬厯海寧縣志董棟著質疑稿分省人物考李珙著字侯璧永康人徐天民遺稿萬厯龍游縣志字邦中少谷集明詩綜張文介著字惟守龍游人玩梅亭集崇禎衢州府志柴惟道著字允中江山人王宗沐序陽峯詩選萬厯嚴州府志洪試著字時明壽昌人二鴈山人集列朝詩集康從理著字裕卿永嘉人靜修子集萬厯温州府志張遜志著字伯懐孚敬長子鳴玉集又使郢集又甌江集二卷兩浙名賢錄張遜業著字有功孚敬仲子隙覲集兩浙名賢録葉素著字尚文青田人太鶴山人集青田縣志陳中州洛夫著氷蘗集一卷括蒼彚紀青田葉獻著有按獻同縣葉槐有丹崖集劉祥尋樂集朱陽仲詩選五卷遂昌縣志朱應鍾著字陽仲黃氏書目友人黃中刻其集於滇右嘉靖時人浙江通志卷二百五十
