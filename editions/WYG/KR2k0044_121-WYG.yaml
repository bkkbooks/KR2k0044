body:
  text: 浙江通志卷一百二十二職官十二國朝職官姓氏文職下都轉鹽運使司鹽法道康熙四十九年改為鹽驛道潘映婁江南桐城人貢生順治二年任强於義奉天瀋陽人順治三年任李長春奉天遼陽人順治四年任畢元彩滿洲人順治六年任崔源滿洲人順治八年任王宏猷山東平原人順治十一年任曹振彦奉天遼陽人順治十二年任遲日豫奉天廣寧人貢士順治十五年任十八年又任席式字竺來陜西咸寧人順治己丑進士十六年任梁知先字朗公山東鄒平人順治丙戌進士康熙二年任石琳字瑯公滿洲人康熙六年任李月桂奉天正白旗人貢士康熙十二年任閻廷謨字嵩嶽河南孟津人順治丙戌進士康熙十五年任楊茂祖奉天正白旗人康熙二十一年任王國㤗奉天人廕生康熙二十七年任任風厚字清南陜西臨潼人拔貢生康熙二十七年任郎廷極宇紫衡奉天廣寧縣人康熙三十一年任李濤字述齋山東徳州人康熙丙辰進士三十六年任楊聲逺奉天正白旗人康熙三十八年任髙熊徵字渭南廣西岑溪人副榜康熙四十年任李文獻奉天鑲紅旗人康熙四十五年任吕猶龍見前康熙四十八年任鹽驛道吕猶龍見前四十九年併理驛傳改為鹽驛道黄炳奉天正白旗人康熙五十一年任裴􅏍度字香山山西曲沃人貢生康熙五十五年任馬鍾崋字西崖山西介休人貢生康熙五十九年任王鈞見前雍正二年任江承炌字訒菴江南歙縣人雍正九年任張若震見前雍正十年以台州府知府陞任顧濟美江南長洲人貢生雍正十二年陞任海防兵備道王歛福雍正十一年由分巡杭嘉湖道改授成貴滿洲鑲白旗人雍正十二年署任王柔山東福山縣人歳貢雍正十三年任杭州府知府嚴正矩湖廣孝感人進士順治二年任張奇逄直𨽻獲鹿人舉人順治五年任祖龍錦州人貢士順治九年任温啓知陜西三原人副任榜順治十一年張益慶順天大興人舉人順治十三年任丁浴初直𨽻獲鹿人進士順治十八年任弋珽山西安邑人舉人康熙四年任嵇宗孟江南安東人舉人康熙八年任姚平逺人恩貢康熙十三年任張經直𨽻賛皇人抜貢康熙十三年任王樑董安國遼陽鑲紅旗人康熙十七年任鄭聖瑞鑲白旗人廕生康熙十八年任顧岱無錫人進士康熙二十一年任馬如龍見前康熙十四年任魏麟徴江南溧陽人進士康熙二十八年任蘇良嗣奉天遼陽人康熙二十九年任李鐸奉天鐡嶺人廕生康熙三十一年任石文彬滿洲正白旗人廕生康熙三十五年任張恕可字韋存江南丹徒人康熙戊辰進士四十三年任張為政山東蓬萊人舉人康熙五十四年任魏定國江西廣昌人康熙丙戌進士雍正二年任李慎修山東章邱人康熙壬辰進士雍正四年任孫國璽見前雍正五年任喬世臣字丹葵山東滋陽人康熙辛丑進士雍正七年任秦炌字叔子鑲黄旗漢軍康熙丁酉舉人雍正九年任嘉興府知府鍾鼎臣廣東南海人進士順治二年任王爾翼直𨽻南樂人舉人順治三年任李國棟遼東錦州人順治六年任楊士美奉天葢州人順治十一年任史載字筆公陜西蘭州人進士順治十二年任許煥江南太倉人進士順治十四年任劉啟復遼陽人順治十七年任張漢傑江南海州人貢士康熙元年任王鐄深澤人拔貢康熙三年任王師夔江西南城人舉人康熙九年任王章奉天錦州人廕生康熙十二年任周時盛遼東人貢生康熙十三年任盧崇興奉天廣寧人廕生康熙十四年任袁國梓字丹叔江南松江人順治己丑進士康熙十七年任劉星順天大興人歳貢康熙二十二年任佟世俊正藍旗廕生康熙二十五年任張思齊鑲藍旗監生康熙二十七年任閻若琛字沛仲山西太原人進士康熙二十八年任徐崇禮鑲白旗人康熙三十一年任黄家遴鑲白旗舉人康熙三十五年任佟賦偉正藍旗監生康熙三十八年任張鳯翔鑲紅旗恩監康熙四十二年任臧憲祖正紅旗監生康熙四十五年任秦邦英順天宛平人例監康熙四十九年任何鼎字夏九湖廣靖州人舉人康熙五十二年任呉永芳正黄旗官生康熙五十四年任江承炌見前雍正二年任喬世臣見前雍正四年任閻堯熙字涷陽山西夏縣人康熙丙戌進士雍正五年任姚淮字導山江南桐城人例監雍正十二年任湖州府知府姜賜履江西南昌人舉人順治二年任程量奉天錦州人順治五年任張繼孔海州衞人歳貢順治七年任劉愈奇滿洲人貢生順治十四年任張懋官直𨽻肥郷人順治十五年任陳永命遼陽人進士順治十七年任譚希閔江南江都人進士康熙元年任何金城江南丹徒人舉人康熙三年任呉綺字園次江南江都人貢生康熙五年任彭文煒奉天瀋陽人舉人康熙八年任王𢎞仁遼陽人貢士康熙十年任金雲鳯奉天廣寧人康熙十三年任胡瑾奉天廣寧人廕生康熙十四年任王階直𨽻錦州人進士康熙二十二年任康有徳康熙二十六年任潘麒生江南溧陽人進士康熙二十七年任陳一夔福建侯官人廕生康熙三十一年任章紹聖康熙四十四年任洗國幹廣東人進士康熙四十八年任陳一夔康熙四十九年再任王以㢲康熙五十一年任蔣洪澍康熙五十七年任呉簡民康熙六十一年任曹掄彬字炳菴貴州黄平人康熙己丑進士雍正二年任楊夢琰字玉行江南丹徒人康熙辛丑進士雍正四年任唐紹祖字次伊江南江都人康熙己丑進士雍正四年任寧波府知府韋克振湖廣黄岡人順治三年任後人任佟廷獻山東濟寧人順治四年任楊之柄直𨽻良鄉人舉人順治七年任岳登科遼東人拔貢順治十三年任徐化民遼東人貢士順治十八年任崔維雅直𨽻保定人舉人康熙三年任邱業湖廣安陸人康熙十一年任李廷機奉天瀋陽人官學生康熙十五年任李煦正白旗人廕生康熙二十三年任張星耀直𨽻武强