body:
  text: 浙江通志卷二百四十九經籍九集部二别集明覆瓿集二十四卷拾遺二卷犁眉公集四卷百川書志劉基撰列朝詩集基字伯溫青田人自編其詩文曰覆瓿集者元季作也曰犁眉公集者明初作也黄伯生誠意伯劉公行狀長子璉集所遺文稿五卷名犁眉公集焦氏經籍志家集七十二卷按舊刻於栝蒼凡二十卷首蛡運録次郁離子次覆瓿集次冩情集次春秋明經次犁眉公集嘉靖三十五年縉雲樊獻科編次凢十八卷宋學士文集七十五卷百川書志金華宋濓景濓撰鑿坡前集十卷鑿坡後集十卷翰苑續集十卷翰苑别集十卷芝園前集十卷芝園後集十卷芝園續集十卷朝京集五卷王褘宋太史傳别有蘿山吟稿三卷潛溪内外集三十卷鄭楷潛溪先生行狀潛溪集四十卷芝園集五卷已傳於學者翰苑集四十卷芝園集歸田已後所著計四十卷列朝詩集劉誠意選定為文粹十卷門人方孝孺鄭濟等又選續文粹十卷皆孝孺與同門劉剛林靜樓璉手自繕冩刋於義門書墪黄氏書目弋陽黄溥選定潛溪先生集十八巻刋於蜀高淳韓叔陽彚諸家本定為全集三十三卷刋於金華西溪漫稿四卷嘉興府圖記鮑恂著字仲孚崇徳人華川前後集二十五卷玉堂雜著二卷金華先民傳王禕著字子充義烏人編按永樂五年義烏丞鄱陽劉傑輯忠文公集凡二十四巻繼志齋集三十卷分省人物考王紳著字仲溍褘子遣興集明詩綜嚴震直著初名子敏烏程人蘇平仲集十五卷内閣書目金華蘇伯衡著丹崖集八卷焦氏經籍志唐肅著宋濓丹崖集序唐處敬名肅㑹稽人密庵集十卷𢎞治紹興府志謝肅著字原功上虞人清節集又清溪集又春秋詠言又山西集又拄笏集又老拙集又和陶詩又中都紀行成化四明郡志桂彦良著名徳稱以字行慈谿人庸庵集明詩綜宋禧著字无逸餘姚人愚齋集二十卷西吴里語林靜著字子山吴興人宋濓序胡仲子集九卷金華先民傳胡翰著字仲申金華人金按分省人物考有長山先生集嘉靖華縣志有信安集觀海集劉基觀海集序桐江章正則詩文懐歸還鄉等稿二十卷制誥二卷嚴陵志徐尊生著字大年淳安人存齋雜稿金華唐懐徳思誠著見宋濓唐思誠墓銘白雲稿十二卷内閣書目天台朱右詩文朱伯清文集十七卷分省人物考義烏朱亷著蔣録事詩集宋濓蔣録事集後序四明蔣子杰有立録平日所賦并他著餞贈之什南雅集陳大倫彦理著見宋濓諸暨陳府君墓碣訥齋集四卷宋濓訥齋集序栝蒼王毅剛叔著弟存誠輯白石山房稿六卷金華賢逹傳張孟兼著名丁以字行浦江人清江集二十卷正徳崇徳志貝瓊著字廷琚黄氏書目文集三十卷海昌集一卷雲間集七卷兩峯集三卷金陵集十卷中都集九卷歸田集一卷附詩集十卷詩餘一卷附平澹集檇李詩繫貝翺著字季翔瓊第三子草閣集六卷拾遺一卷黄氏書目李曅著字宗表錢塘人集為門人唐光祖仲暹編子轅字公載有筠谷集始豐𩔖稿十五卷嘉興府圖記徐一夔著字大章天台人梓宇集萬厯秀水縣志張翨著字翔南先世建徳徙嘉興樗隠集明詩綜字敬思錢塘人臨安集十卷明一統志錢宰著字子予臨安人和陶集明詩綜童冀著字中州金華人考古餘事明詩綜趙撝謙著名謙一名古則餘姚人按餘姚縣志又有南遊紀詠集五卷菜薖集明詩綜余堯臣著字唐卿永嘉人介石稿赤城新志太平許伯旅廷慎著石門集太平縣志陳鏗翁著字太希慎餘稿台州府志太平邱海朝宗著栗齋集東甌詩集林溫著字伯恭永嘉人鳳臺稿又貴竹稿又東屯稿又南遊稿明詩綜楊彞著字宗彞餘姚人陳潛夫集錢塘縣志字振祖廣莫子稿又和陶集成化杭州府志莫維賢著字景行錢塘人紫薇稿分省人物考桂衡著字孟平仁和人一黙居士集正徳嘉善縣志陳約著字博文竹林集萬厯嘉興府志陳絅著字簡文蘇庵集永嘉縣志梅頥著字昌年秋吟稿又春草齋集十一卷成化四明郡志烏斯道著字繼善慈谿人環洲集明詩綜莘野著字叔畊歸安人青霞集明詩綜王澤著字叔潤天台人僑居山隂介軒集明詩綜戴奎著字文祥台州人靜齋詩集十六卷靜齋文稿二十卷栝蒼彚紀葉子竒著字世傑龍泉人江天集四卷薛氏世風刪薛敬著字原理鄞人濟善集三卷甬上耆舊詩薛服耘著字濟美息耒集又寄我軒集又彀齋稿又萍居稿𢎞治紹興府志唐之淳著字愚士肅子菭軒集𢎞治紹興府志陳韶著字伯善諸暨人柘軒集三卷分省人物考凌雲翰著字彦翀錢塘人斗南老人詩集成化杭州府志胡奎著字虚白海寧人蛾術文集十六卷詩集八卷詞選四卷列朝詩集邵亨貞著字復孺嚴陵人集後有學庵集句詩一卷復孺子伯宣作直正齋集樂清縣志鄭涔著字起深滎陽外史集六十卷成化四明郡志鄭真著字千之鄞縣人自怡集錢塘縣志張時著字敏中春草軒集萬厯金華府志金信著字中孚金華人菌翁集明詩綜季應期著字均饒瑞安人按萬厯溫州府志作恥庵集蘭坡遺集萬厯溫州府志季徳璣著字武抑瑞安人竹所翁集東甌續集季徳珍著字正中徳璣弟玩齋稿錢塘縣志邾經著字仲誼仁和人密庵集明詩綜鄭昻著字處抑平陽人學古齋集明詩綜鄭杕著字叔韡浦江人百一稿無逸齋稿鶴巖集合二十卷東陽縣新志楊芾著字仲彰義烏人青村遺稿萬厯義烏縣志金涓著字徳原靜軒詩集金華賢逹傳張森著字餘之浦江人希言集一卷𢎞治嘉興府志陳世昌著字彦博錢塘人按檇李詩繫作希賢誤完軒集二卷成化杭州府志鄭璧著字伯規仁和人孫環編次委順夫集兩浙名賢録唐光祀著字仲暹武康人兩庵集又和陶集又璧水集又海岱集括蒼彚紀松陽包文舉仕登著龍淵集括蒼彚紀章溢著小齋詩稿成化新昌縣志吕升著字徳升得月稿六卷百川書志南明石鼓聾者吕不用著新昌主簿曹衍序按萬厯紹興府志又有牧坡稿力田稿行吟集萬厯嚴州府志張冠著字士敬桐廬人西崦稿仁和縣志高著更名來字良玉守齋𩔖稿三十卷宋濓守齋𩔖稿序顧徳潤著名輝鄞人分前後外三集純樸翁稿金華先民傳應恂著字子孚永康人桂林一枝稿又崑山片玉稿萬厯義烏縣志馮翊著字原輔四松軒稿金華賢逹傳馮塤著字伯茂義烏人從弟仲庸有梅溪漁隠集蘭渚漁歌正徳蘭谿縣志吴奐著字徳章壺父集成化杭州府志王謙著字自牧錢塘人虚室集成化杭州府志白范著字以中錢塘人按列朝詩集作山隂人退庵集成化杭州府志夏節著字文度錢塘人西崦詩集成化杭州府志周昉著字元亮錢塘人節庵集三卷分省人物考高得𤾉著字孟升錢塘人孫蔗田集兩浙名賢録錢塘隠士不知何名雪崖集嘉靖海寜縣志朱祚著字永年釣鰲海客集又雲間集又清嘯集檇李詩繫陶振著字子莊嘉興人半隠集嘉興府圖記錢鈞著字志衡嘉興人希賢集萬厯秀水縣志沈鉉著足庵集萬厯嘉興府志徐樞著海鹽人朱逢吉文集四卷嘉禾徵獻録字以貞崇徳人韋軒集崇禎烏程縣志陳援著字以道潛齋集𢎞治湖州府志許徳彰著長興人林霖集六卷嘉靖長興縣志吴中著字宗本約庵詩集三卷嘉靖長興縣志韋齡著箬溪集吴興掌故長興華質義伯直著子亷字仲清著翠㣲集樵樂存稿嘉靖長興縣志吴畸著臨清集𢎞治湖州府志車昭著字叔明徳清人書隠西上南游等集成化四明郡志王賓著字用賓鄞縣人雲屋集成化四明郡志胡庚著字文剛鄞縣人芸窗稿兩浙名賢録姚伯良著名驥以字行鄞縣人安分集嘉靖寧波府志鄭本忠著字本忠鄞縣人溪雲稿嘉靖慈谿縣志錢珏著號溪雲夢墨稿十卷嘉靖慈谿縣志時銘著字季照以字行容齋集兩浙名賢録桂同徳著慈谿人視志稿黄氏書目傅淳著字伯厚慈谿人明白先生集兩浙名賢録王桓著字彦貞慈谿人桑榆稿成化四明郡志桂􅚇著字懐英慈谿人東谷集萬厯象山縣志黄思銘著雲屋集嘉靖寧波府志蔣景高著字伯尚象山人雙桂集成化四明郡志袁壆著奉化人南洲集十五卷奉化縣志徐瑾著字大章清軒稿奉化縣志陳協和著字久恒樂良遺稿五十卷黄氏書目定海人慎庵稿𢎞治紹興府志胡春著字元伯山隂人弟槐字粹中有南行集西行集思復齋稿陶鉛集又驢背集又自怡集兩浙名賢録朱純著字克粹山隂人北郭集𢎞治紹興府志毛鉉著字鼎仁山隂人庸庵集𢎞治紹興府志蔡庸著字惟中山隂人閱耕集二十卷𢎞治紹興府志李朂著字文勉山隂人劉考功集萬厯紹興府志劉真著字天錫山隂人蘭坡集十二卷嘉靖山隂縣志羅紘著字孟維子周有梅隠稿十八卷新有介軒稿八卷孫頎字儀甫有核軒集雲航集𢎞治紹興府志張一鳴著字天民餘姚人守墨稿萬厯上虞縣志夏時著字時中葉砥録其文行於世悠然集萬厯上虞縣志葛貞著字原良字按上虞又有姚輯字孟羲有守齋詩稿范彰仲彰有和陶詩守拙稿歸田稿薛文舉字才用有訥齋遺稿柳南字南仲有南軒稿劉鵬字翼南有翼南詩稿伍建有未庵稿徐顒有成玩稿劉履有草澤閒吟退翁集嘉靖餘姚縣志宋棠著字思賢仙巖文集四卷𢎞治紹興府志樓英著蕭山人一名公爽字全善蜩鳴集兩浙名賢録楊立著字大本諸暨人星溪集諸暨縣志郭斯垕著字伯載介石集成化新昌縣志章衡民著翠微漫稿成化新昌縣志董荆著字宗楚南莊詩稿成化新昌縣志隠士章文華著畊讀稿成化新昌縣志章廷端舊名廷瑞字信臣隨寓稿成化新昌縣志俞夀著字本初康山詩集成化新昌縣志丁義著字宜民柿莊集𢎞治紹興府志鄭嘉著南齋稿赤城新志陳徳良著字昌言臨海人蘭莊集兩浙名賢録葉見泰著字夷仲臨海人瞻雲集萬厯臨海縣志王俊華著字名仙林公輔集明詩綜林右著字公輔臨海人汗漫集臨海方克勤去矜著見宋濓方公墓版文靜齋集赤城新志徐宗實著黄巖人使西集赤城新志黄斌著字憲章黄巖人郭元亮詩文集五卷赤城新志黄巖人暢軒稿尊鄉録詳節郭檟著字徳茂黄巖人蒼山集黄巖縣志王文啟著名興以字行湫西集台州府志張由益著名進以字行黄巖人風瓢遺響台州府志蔡阡著號俟軒懐癡子集黄巖縣志童琫著號琴堂訥齋蛙吟十卷黄巖縣志余尚則著名郁以字行采蘭集赤城新志金礎著字廷器澹庵稿台州府志金茂著字敬緒黄巖人老圃詩集台州府志楊偉著字公俊天台人郭太學遺稿萬厯寧海縣志郭濬著字士淵按赤城新志作樗園稿武昌集萬厯寜海縣志鄭好仁著字士元操縵稿赤城新志王𤦺著字備徳寧海人王紀善集寧海縣志王璞著約軒稿寧海縣志方湜著觀樂生集五卷附録一卷百川書志越南隠君子許繼士修撰寧海縣志林昇編石樓文稿赤城新志顧碩著字景蕃仙居人四梅集台州府志葉兌著字良仲寧海人保光集赤城新志張挺著字廷玉翠屏稿又登瀛稿太平縣志黄友誼著藥所稿嘉靖太平縣志李毓著字長民栗山吟稿嘉靖金華縣志吕肅著字伯剛金華人尚拙齋稿金華賢逹傳王杰著字文英金華人南陽山房稿二十卷金華先民傳葉儀著字景翰金華人玉壺詩集金華縣新志滕浩著字至剛雙崖集一卷金華縣新志邢沂著字師魯石溪集嘉靖金華縣志成璿著字茂先𨽻山堂雜稿嘉靖金華縣志邢俛著字敬之存齋稿嘉靖金華縣志汪雨著字潤之中中子集嘉靖金華縣志邵政著字宗政成齋文集嘉靖金華縣志王珹著柏軒集分省人物考范祖幹著字景先金華人醒泉集正徳蘭谿縣志鄭與曽沂父著芻蕘集十五卷正徳蘭谿縣志鄭興誠夫著有讀史餘論獨學稿考志集芻蕘子集子宣孫編白雲山房集正徳蘭谿縣志趙良恭敬徳著吴濬仲序應酬稿