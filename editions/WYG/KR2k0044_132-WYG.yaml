body:
  text: 浙江通志卷一百三十三選舉十一明進士隆慶二年戊辰科羅萬化榜金學曾錢塘人都御史黃金色錢塘人工部主事蔡璧錢塘人翁金堂錢塘人銅陵知縣江圻仁和人廣西提學許亘仁和人沈楠仁和人御史沈文仁和人工部員外祝世喬海寧人刑部主事周啓祥海寧人廣州知府李陽春餘杭人沈思孝嘉興人右都御史許應逵嘉興人㕘政鍾庚陽秀水人刑部員外孫從龍秀水人副使陸志孝秀水人知府沈藻海鹽人副使屠謙平湖人提學副使馬千乗平湖人廣東按察使陸萬垓平湖人都御史沈懋孝平湖人河南廵撫李樂桐鄉人湖廣㕘議馮孜桐鄉人布政使錢拱辰烏程人㕘政胡友信德清人知縣房寰德清人御史徐應奎鄞人沈一貫鄞人少師中極殿大學士邵城鄞人刑部郎中李尚黙鄞人張大器慈谿人姚孟賢慈谿人朱南雍山隂人太僕寺卿朱賡山隂人太子太保文華殿大學士黃猷吉山隂人僉事章禮會稽人㕘議羅萬化會稽人狀元禮部侍郎太子少保張試蕭山人知府何世學蕭山人同知來經濟蕭山人僉事周繼夏諸暨人袁州推官蔣桐諸暨人知縣張堯年餘姚人副使鄒學柱餘姚人叅政沈應文餘姚人叅政邵陛餘姚人刑部左侍郎鄒墀餘姚人布政張葑餘姚人副使孫汝匯餘姚人長史邵一本餘姚人知縣張道明餘姚人孫綜餘姚人布政孫汝賓餘姚人評事趙志􅆏蘭谿人少傅建極殿大學士唐邦佐蘭谿人光州知州杜其驕東陽人余乾貞遂安人御史鄭汝璧縉雲人兵部右侍郎隆慶五年辛未科張元忭榜鐵篆杭州衞人李時英錢塘人禮部郎中諸夢環仁和人通州知州金階仁和人御史汪彥沖仁和人萬安知縣李大吉仁和人工科給事中黃洪憲秀水人少詹事張正鵠秀水人郎中丁賓嘉善人工部尚書賀南儒海鹽人知縣郭子直崇徳人福建副使李華春崇德人知縣洪烝平湖人文選司郎中韓紹烏程人太僕寺卿呉秀烏程人揚州知府丁應詔長興人知縣沈涵德清人沈允成德清人行人趙參魯鄞人尚書錢若賡鄞人臨江知府周保鄞人費標慈谿人同知李應辰慈谿人知府劉伯淵慈谿人江西按察副使孫成名慈谿人馮盛宗慈谿人主事張元忭山隂人狀元左諭德兼侍讀趙楫山隂人㕘議周應中山隂人光禄少卿商為正會稽人大理寺少卿章如鈺會稽人知縣史鈳餘姚人編修陸夢熊餘姚人郎中俞嘉言餘姚人知府周思宸餘姚人知府胡時化餘姚人㕘議黃兆隆餘姚人知府管稷餘姚人副使諸大倫餘姚人主事謝師成上虞人知縣洪聲逺黃巖人中書虞德􅈌義烏人雲南㕘政虞懷忠義烏人御史程正誼永康人徐一檟西安人右通政王良心永康人兵科給事中鄭秉厚遂昌人戸科給事中萬厯二年甲戌科孫繼􅆏榜張振先錢塘人副使陳王庭仁和人布政江鐸仁和人侍郎孫星海寧人刑部主事陳與郊海寧人太常寺少卿阮子孝於潛人給事王家棟嘉興人主事陳竒謀秀水人知府支大綸嘉善人泉州推官張汝賢崇德人知府顧爾行歸安人御史呉仕詮歸安人管大燿鄞人主事徐待鄞人監察御史髙萃鄞人肇慶知府王應選慈谿人探花秦應驄慈谿人同知朱應山隂人主事王泮山隂人布政張一坤山隂人布政陶允誼會稽人會魁黄州同知陳大綂會稽人知州范可竒會稽人副使司馬祉會稽人知府王景星蕭山人知縣孫鑛餘姚人會元南京兵部尚書史元熙餘姚人主事葉遵餘姚人給事中丁懋建餘姚人知縣孫健餘姚人倪涷上虞人員外龔一清義烏人行人徐師張永康人知縣余國賓西安人江西右布政詹思謙常山人㕘政王繼明永嘉人四川副使李誌縉雲人左都御史萬厯五年丁丑科沈懋學榜凌登瀛錢塘人給事中徐三畏錢塘人陳禹謨仁和人刑部侍郎沈瑞臨仁和人四川按察僉事陳與相海寧人㕘政徐桂餘杭人袁州推官馮夢禎秀水人會元南京國子監祭酒沈自邠秀水人修撰屠叔方秀水人山東副使黃正色秀水人漳南副使朱廷益嘉善人通政㕘議沈夢斗嘉善人知州劉世海鹽人主事金枝崇德人主事趙邦秩平湖人知縣孫成泰平湖人按察副使馬應圖平湖人刑部主事曹煒平湖人知縣陳泰來平湖人禮部員外郎沈季文烏程人副都御史王豫烏程人福建僉事張斗烏程人雲南副使楊德政鄞人福建按察使沈九疇鄞人江西左布政屠隆鄞人禮部郎中陳九官鄞人評事董樾鄞人㕘議沈大忠慈谿人知府姚元楨慈谿人推官朱南英山隂人太僕卿郁文山隂人郎中趙夢日山隂人知縣馮景隆山隂人給事中魯錦山隂人主事蔡萬里蕭山人同知陳性學諸暨人布政諸大圭餘姚人主事徐震餘姚人知縣管應鳳餘姚人知縣鄭一麟上虞人知府董子行嵊人御史周汝登嵊人戸部右侍郎王士性臨海人太僕寺少卿王亮臨海人給事中林國材黃巖人御史陸可教蘭谿人禮部侍郎趙崇善蘭谿人太常寺少卿盧洪春東陽人主事黃承讚義烏人知縣黃卷永康人御史鄭有年西安人太僕少卿葉承遇永嘉人江西僉事何懋官永嘉人僉事萬厯八年庚辰科張懋修榜鍾化民仁和人巡撫河南沈修仁和人布政沈堯中嘉興人刑部郎中唐仲寅嘉興人行人王慎德嘉善人御史馬維銘平湖人兵部主事陸長庚平湖人兵部侍郎董嗣成烏程人郎中凌嗣音烏程人廣西㕘政閔一范烏程人巴陵知縣王永寧烏程人廣東副使閔世翔烏程人邵武知府錢士完烏程人都御史沈子來歸安人知府沈儆焞歸安人郎中臧懋循長興人國子監博士孫一俊長興人章嘉禎德清人大理寺丞姜夢龍德清人知縣莫揚安吉人主事余寅鄞人太常寺少卿葉萬景鄞人知府沈一中鄞人呉禮嘉鄞人林可成鄞人周應治鄞人陸應龍鄞人湖廣㕘政向東慈谿人禮部主事黃齊賢山隂人副使馮應鳳山隂人太僕寺卿徐桓山隂人副使葉