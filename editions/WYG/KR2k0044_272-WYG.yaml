body:
  text: 浙江通志卷二百七十三藝文十五詩七言古餘杭醉歌贈呉山人唐丁仙芝曉幕紅襟燕春城白項烏只來梁上語不向府中趨城頭坎坎鼓聲曙滿庭新種櫻桃樹桃花昨夜撩亂開當軒發色映樓臺十千兑得餘杭酒二月春城長命杯酒後留君待明月還將明月送君囬夜宿浙江唐孫逖扁舟夜入江潭泊露白風髙氣蕭索富春渚上潮未還天姥峰邉月初落煙水茫茫多苦辛更聞江上越人吟洛陽城闕何時見西北浮雲朝暝深送孔巢父謝病歸逰江東兼呈李白唐杜甫巢父掉頭不肯住東將入海隨煙霧詩卷長留天地間釣竿欲拂珊瑚樹深山大澤龍蛇逺春寒野隂風景暮蓬萊織女回雲車指㸃虚無是征路自是君身有仙骨世人那得知其故惜君只欲苦死留富貴何如草頭露蔡侯静者意有餘清夜置酒臨前除罷琴惆悵月照席幾嵗寄我空中書南尋禹穴見李白道甫問訊今何如題台州隠静寺唐王建隠静靈仙寺天鑿杯度飛來建巖壑五峰直上插銀河一澗當空㵼寥廓崆峒黯淡碧琉璃白雲吞吐紅蓮閣不知勢壓天幾重鐘聲常聞月中落送山隂姚丞擕妓之任兼寄山隂蘇少府唐韓翃東風香草路南客心容與白晳呉王孫青娥栁家女都門數騎出河口片帆舉夜簟眠橘洲春衫傍楓嶼山隂政簡甚從容到罷惟求物外蹤落日花邉剡溪水晴烟竹裏㑹稽峰才子風流蘇伯玉同官曉暮應相逐加餐共愛鱸魚肥醒酒仍憐甘蔗熟知君鍊思本清新季子如今徳有鄰他日如尋始寜墅題詩早晚寄西人呉興三絶唐張文規蘋洲須覺池沼俗苧布直勝羅紈輕清風樓下草初出明月峽中茶始生呉興三絶不可捨勸子强為呉㑹行酬鄭從事四年九月宴望海亭次用舊韻唐元稹海亭樹木何蘢蔥寒光透坼秋玲瓏湖山四面争氣色曠望不與人間同一拳墺伏東武小兩山鬭構秦望雄嵌空古墓失文種突兀怪石疑防風舟船駢比有宗侶水雲滃泱無始終雪花布徧稻隴白日脚插入秋波紅興餘望劇酒四坐歌聲舞􅃩煙霞中酒酣從事歌送我歌云此樂難再逢良時年少猶健羨使君況是頭白翁我聞此曲深嘆息唧唧不異秋草蟲憶年十五學構厦有意盖覆天下窮安知四十虚富貴朱紫束縛心志空妝梳妓女上樓榭止欲歡樂微茫躬雖無趣尚慕賢聖幸有心目知西東欲將滑甘柔藏府已被鬰噎衝喉嚨君今勸我酒太醉醉語不復能沖融勸君莫學虚富貴不是賢人難變通錢塘曲唐溫庭筠錢塘㟁上春如織淼淼寒潮帶晴色淮南逰客馬連嘶碧草迷人歸不得風飄客意如吹煙纎指殷勤傷鴈弦一曲堂堂紅燭筵長鯨㵼酒如飛泉錢塘對酒曲唐陳陶風天雁悲西陵愁使君紅旗弄濤頭東海神魚騎未得江天大笑閒悠悠嵯峨呉山莫誇碧河陽經年一宵白南州彩鳳為君生古獄愁蛇待恩澤三清羽童來何遲十二玉樓蝴蝶飛炎荒翡翠九門去遼東白鶴無歸期鴟夷公子休悲悄六鼇如鏡大始老尊前事去月團圓琥珀無情憶蘇小明州錢君倚衆樂亭宋王安石使君幕府開東部名髙海曲人知慕艤船談笑政即成洗滌山川作嘉趣平泉浩蕩銀河注想見明星弄機杼載沙築成天上路投虹為橋取孤嶼掃除荆棘水中央碧瓦朱甍隨指顧春風滿城金版舫來看置酒新亭上百女吹笙彩鳳悲一夫伐鼓靈鼉壯安期羡門相與逰方丈蓬萊不更求酒酣忽跨鯨魚去陳迹空令此地留杭州修廣師法喜堂宋王安石浮屠之法與世殊洗滌萬事求空虚師心以此不挂物一堂収身自有餘堂隂置石雙嵽嵲石脚立竹青扶踈一來已覺肝膽豁況乃宴坐窮朝晡憶初救時勇自許壯大看俗尤﨑嶇豐車肥馬載豪傑少得志願多憂虞始知進退各有理造次未可分賢愚㑹將築室返耕釣相與此處吟山湖將之湖州戲贈莘老宋蘇軾餘杭自是山水窟仄聞呉興更清絶湖中橘林新著霜溪上苕花正浮雪顧渚茶芽白於齒梅溪木𤓰紅勝頰呉兒鱠縷薄欲飛未去先説饞涎垂亦知謝公到郡久應怪杜牧尋春遲髩絲只好對禪榻湖亭不用張水嬉法惠寺横翠閣宋蘇軾朝見呉山横暮見呉山縱呉山故多態轉側為君容幽人起朱閣空洞更無物惟有千歩岡東西作簾額春來故國歸無期人言悲秋春更悲已汎平湖思濯錦更看横翠憶蛾眉雕欄能得㡬時好不獨憑欄人易老百年興廢更堪哀懸知草莽化池臺游人尋我舊游處但覓呉山横處來送劉寺丞赴餘姚宋蘇軾中和堂後石楠樹與君對床聴夜雨玉笙哀怨不逢人但見香烟横碧縷謳吟思歸出無計坐想蟋蟀空房語明朝開鎻放觀潮豪氣正與潮争怒銀山動地君不看獨愛清香生雪霧别來聚散如宿昔城郭空存鶴飛去我老人間萬事休君亦洗心從佛祖手香新冩法界觀眼静不覷登伽女餘姚古縣亦何有龍井白泉甘勝乳千金買斷顧渚春似與越人降日注富春行贈范振宋􅄯補之錢塘江北百里餘漲沙不復生菰蒲沙田老桑出葉粗江潮打根根半枯八月九月秋風惡風髙駕潮晚不落鼓聲鼕鼕櫓咿喔争凑富春城下泊君家茅屋並城樓不出山行不記秋越舶呉帆亦何故今年明年來復去苕霅行和於濳令毛國華宋􅄯補之苕溪清霅溪緑溪水灣環繞天目山間古邑三百家日出隔溪聞打衙長官長髯帽烏紗不曽執板謁大尹醉臥紫蘭花影斜紫蘭花開為誰好年年嵗嵗溪南道不見西陵白髮人荆江夜雪唱陽春陽春絶唱和者寡客醉聞之雙淚灑夜來魂夢海中山縹緲雲濤煙浪間雲濤煙浪不可渡睡覺秋風落桐樹秦吉了秦吉了言語無人㑹無人㑹得奈君何且向紫蘭花下醉徑山宋􅄯補之盤崕繞壑歩歩髙僕痡馬乏游人勞五峯崛起干雲霄衆山奔走争來朝我行直欲犯星杓意欲絶頂纔山腰松間鳥語如相招仰見白塔當林梢擔擕上下若桔橰路窮飛樓鬰岧嶤欽翁未來蔽菅茅山精水怪歡逰遨麏馳虺竄狌鼯跳靈景晦昧何由昭忽然飛錫從江臯窮探不憚東峰遥曲腰丈人白絲袍再拜辭前風雹飄三百年來響鐘鐃閩商海賈輸金刀直闌横牖山周遭晨參夜諷聲嘈嘈碧杉紫柏羅旌旄客來六月忘炎歊明月菴前醉松醪白雲峰頂瞰呉郊鵞毛一㸃錢塘潮錢王宫闕如累樵臨之股栗精魄超歸不得寐心摇摇含輝孤亭立嶢崤此地覽景尤難逃五更月落禽嘲嘲陽烏欲上海水燒晦明變化不終朝倐隂倐晴狀莫描夜闌燈青雨飄蕭偶坐兩客論幻泡探元窮妙窺寂寥破除世事無絲毫不奈詩思猶强豪歸時日没江霞消荒崕老木山蟬號錢塘賦水母宋沈與求疾風吹雨回江城艣牙嘔啞潮欲平客居喜無人事攖相與環坐臨前楹眼中水怪狀莫名出没沙觜如浮罌復如緇笠絶多纓渾沌七竅俱未形塊然背負羣蝦行笑其巧以怪自呈凝目􅋏視相將迎老漁旁睨笑發聲曰此水母官何驚江流如奔絶滄瀛潮汐來往月為程藏納衆汙無滿盈浮埃沉滓溷九清結成此物宜昬盲使蝦導迷作雙睛乃能接迹蚪與蟶亦猶巨蛩二體并離則無目為光精江天八月霜葉鳴罟師得蝦供水征水母棄擲羅縱横試令収拾輸庖丁綘礬収涎體紆縈飛刀鏤切武火烹花甆飣餖粲白英不殊冰盤堆水晶稻醯虀寒芼香橙入齒已復能解酲遣漁止矣勿復評嗟哉此性愚不更定矜故態招三彭且摩枵腹甘藜羮過錢塘迎潮宋楊時銀潢翻空際天白鯤怒鵬鶱海波擊湧雲噫氣聲怒號萬馬馳車隨霹靂低昂上下如桔橰頃刻性命輕鴻毛齎囊負笈有夷路一日何事常千艘因思羊腸盤九坂攀援蜀道愁狖猱人生觸處有萬險豈必此地多風濤願言夷險不須問莫負對酒持霜螯二月二日富陽城東宋程俱一春何許最佳處栁色初匀思殺人風搖雨練不可觸明緑映空顔色新舊雨來時花未齊今雨一過花圑枝明朝試踏城西路已復可憐枝上稀六客堂宋王十朋水晶宫中刺史宅月照高堂逰六客中有一客為主人萬卷詩書李公擇元符親揮玉堂手令舉聲蜚制科䇿五勸使君古遺直三為郎官老詞伯眉山有客何等人退之少陵李太白直道髙才時不容天遣數子為逰從呉興清絶山水國五百年過人中龍健峭銀鈎逼顔魯㸃化湖山出竒語高壁白蘋洲上詩更肯區區談小杜端如竹溪逢謫仙並逰逸士名俱傳飄飄乗風鼓長翮兩兩照坐成台躔苕霅交流卞山碧一代名賢已陳迹我後百年登此堂咀嚼姓名牙頰香坐上何曽欠佳客蘇仙一去難再得臘日與守約同舍賞梅西湖宋王十朋西湖處士安在哉湖山依舊梅花開見花如見處士面神清骨冷無纎埃不將時莭較早晚風味自是花中魁暗香和月入佳句壓盡今古無詩才武陵深處境益勝十里眼界多瓊瑰北枝貪睡南枝醒杖履得得攙出來旅中兹逰殊不惡況有佳友含清杯手折林間一枝雪頭上戴得新春囬范文正公祠堂并序宋王十朋寳元間文正范公自潤徙越獲廢井於州治之西澄而新之易舊堂築新亭俱名之曰清白嵗久舊刻弗存紹興戊寅秋吏部尚書王公來帥是邦暇日㑹僚屬於兹堂酌泉煮茗修范公故事嘅然嘆曰自漢迄今守兹土者無慮數百人莫賢於范公泉與堂皆其甘棠也記惡可以不刋又謂公自掾桐川典郡帥邉所至立祠獨越無有於典則缺於是求公遺像得之於其家命工繪之即其堂而祠焉明年閏六月庚申躬率幕僚祀之某作詩以紀其盛堂堂范公真天人配我仁祖為元臣才兼文武懐經綸先憂後樂不為身上與夔契相等倫正色朝端批逆鱗三黜愈光名愈聞一麾東逰禹所廵作詩懐蠡祠季真臥龍山麓井久湮綆而汲之清且新堂於其旁記厥因名標清白垂不冺規爾官師意諄諄洗貪濯盜思還淳人亡迹在嗟已陳斷碑俱已埋荆榛後人不識真天人但能日飲堂中春越以清白堂名酒使君好事賢且仁治民律已公是遵登堂慷慨懐斯文刻石繪像揚清芬躬修祀事率幕賔手酌寒泉羞澗蘋一酌清我僚吏民再爵為國清簮紳要將清白風無垠庻俾范公遺志伸公乎為仙為明神為澤為瑞為星辰當宁焦勞思若人九原喚起清邉塵次韻梁尉秦碑并序宋王十朋秦始皇頌徳碑丞相李斯篆世傳在秦望山莫知其處教授莫君好竒嗜古搜訪尤力有言碑在何山者莫以語某何山見於圖經在秦望東南疑其真秦望也某欣然欲往職有所拘以告㑹稽尉梁君梁君慨然而行登山果見之碑石僅存字磨滅已盡墨片紙而還作古風具記始末因次其韻且見吾三人好事之癖亦以示後人姬嬴遺蹟存者稀世傳石鼓稽山碑石鼓揄揚得韓子文與二雅争驅馳秦碑夸大頌功徳埋没草莽無人知或言山頂石猶在上有虎豹龍蛇螭神藏鬼䕶荆棘蔽崕懸磴絶登無岐廣文好竒穴探禹梅仙喜事僧尋支支遁昔逰越中好山水梅仙宿雲門訪古迹於僧我贊其行要親覩勿受世俗流傳欺望秦秦望兩嶄絶何山壁立東南涯豐碑屹植最髙處不知磨滅自何時剔苔掃墨了無有糢糊片紙亦足竒濃雲霮䨴暗將雨古木槎牙蟠老枝歸來走筆出險語訶政叱斯同小兒詩成得得冩寄我詞嚴意偉法退之我聞秦人滅六國酷似犬磔臨江麋先王法為秦所負負秦況有秦有司五經灰飛儒濺血堯舜周孔何能為上蔡獵師妙小篆奴視俗體徒肥皮東封太山南入越大書深刻光陸離沙邱風腥人事變鬼饑族赤誰嗟咨漢興萬事一掃去惟有篆刻餘刑儀磨崖欲作不朽計其如歴數不及期蚩尤五兵紂漆器人物美惡寜相疵我雖過秦愛遺畫南山入望頻支頤不須嶧陽訪棗刻不用遷史觀雄辭虚堂黙坐對此紙閉眼暗想君勿􅅓要知秦碑没字本却𩔖周雅無辭詩㑹稽三賢祠并序宋王十朋越有三賢祠曰呉先生曰唐侯曰蔡孝子呉先生名孜常事安定胡先生瑗以文行稱捨所居為府學有功於風教為多賢於許詢賀知章輩一等矣唐侯名琦建炎間越帥叛命以城降敵侯奮自行伍袖甎擊酋至死罵不絶口有靖康李忠愍風非僅古刺客比也蔡孝子名定以死贖父罪自沉於河與曹孝女相望於千載某因上丁見西廡有祠詢之莫教授知呉先生事語莫君宜有以記之異日坐幕府吏具嵗所常祀有旌忠愍孝二廟命吏訪其詳得舊越守傅公崧卿祭文及蔡孝子墓誌與越人題䟦奏狀䓁為嘉歎者累日因作三賢詩以紀其大畧庶幾好事君子相繼有作以發揚幽光亦所以助國家旌遺賢奨忠孝激勸風俗之一端也呉先生祠安定先生賢矣哉一時髙弟俱英才詵詵顯逹播廊廟貧賤亦能光蒿萊㑹稽呉君更超絶至今士子猶能説講堂鳴鼓規使君清風真堪聳朝烈求田問舍遺子孫錢愚地僻何紛紛不惜池塘種芹藥一叚竒事前無聞君不見唐室蓬仙稱賀老乞得鑑湖歸去好却將儒服變流沙更遣門䦨盡歸道又不見晉朝名士髙陽公才名上下王謝中乃心欲出三界外山隂宅化瞿曇宮先生識見高流俗不作二公縁禍福寄語多才鄭廣文乞與毫端記高躅旌忠廟國家往往艱難中縉紳莭義掃地空靖康有一忠愍公建炎獨見唐侯忠唐侯爵位何曾隆身居行伍儕羆熊平生經史漫不通嚴霜烈日蘊在𠂻憤然一奮不顧躬太尉奪笏嗟匆匆子房鐵椎計已窮張廵就縛氣尚雄杲卿鋸解罵未終忠血義肉塗地紅烈氣英魂薄蒼穹事驚朝野聞帝聰立廟旌忠浙江東睢陽雙廟同髙風名書青史等岱崧當時開門迎降功貽臭世世如蛆蟲愍孝祠我昔甞讀黄絹碑長嘆越國無男兒孰知種山山下水千載有此一叚竒嗚呼哀哉蔡孝子風烈逺過恢與覊乃翁白首困縲絏半年不脫兒心悲請身荷械代父罪或甘黥湼居軍麾況遇兵興擊叛卒身先矢石死不辭當時非無賢太守孝子抱志終不施人間無路可赴訴投命河伯祈天知自為銘誌及訟牒欲愬以魂贖以屍情哀意切語不怨孝與忠厚俱天姿臨河更效結纓死顛沛於禮更無違父脫纍囚子願畢身在九泉甘若飴名聞九重獲旌表賜廟愍孝風羣黎胡為祠宇乃如許一間破屋河之湄未聞設誄有度尚絶妙更欠邯鄲詞我來贊幕欽孝烈顧瞻廟貌成吁嘻他年太史作嘉傳願於紙尾書吾詩鑑湖行宋王十朋蒼蒼涼涼紅日生葱葱鬰鬰佳氣横鑑湖春色三百里桃花水漲扁舟行花間啼鳥傳春意聲落行舟驚夢寐胡床兀坐心境清轉覺湖山有風味鑑中風物㡬經春身在鑑中思古人禹迹茫茫千載後疏鑿功歸馬太守太守湖成坐鬼責後代風流屬狂客狂客不長主鑑湖惟有漁人至今得日暮東風吹棹回花枝照眼入蓬萊回首湖光何處是欸乃聲中圖畫來過霅川大溪宋楊萬里菰蒲際天青無邉只堪蓮蕩不堪田中有一溪元不逺摺作三百六十灣政如緑錦地衣上玉龍盤屈於其間前船未轉後船隔前灣望得到不得及至前灣到得時只與後灣纔咫尺朝來已度數十里問知徳清猶半百老夫乍喜櫂夫悶自有到時君莫問曉泊蘭溪宋楊萬里金華山髙九天半夜雪裝成珠玉案蘭溪水清千頃强朔風凍作琉璃缸日光雪光兩相射病眼看來忘南北恨身不如波上鷗脚指為楫身為舟恨身不如沙上雁蘆花作家梅作伴折綿冰酒未是寒曉寒真欲冰我肝急閉篛篷擁爐去竹葉梨花十分注泊舟臨平宋楊萬里前窗向市下却簾後窗臨水開却門㟁頭楊栁報春動溪底雲天隨浪翻隔溪數間黄草屋繞屋千竿翠瓊竹三老鳴鉦艤柂樓今宵又向臨平宿癸亥日泊舟呉㑹亭宋范成大去年春盤浙江驛湛湛清波動浮石今年春盤呉㑹亭冥冥細雨濕髙城天邉作客風沙裏去年今年成老矣客心古井冷無波過眼人情亦如水憶昔三生住翠微偶來平地著征衣山中故人應大笑扁舟坐穏何當歸送通守趙積中朝議請祠歸天台宋范成大城頭千峰青繞屋城下灘流三百曲誰云偪仄復偪仄尚有髙軒肻來辱紅梅花下兩芳春春風惠和如主人搶攘塵土簿書裏見此繅藉天球溫厚禄故人車結轍掉頭獨泛清溪月不從世外得超然世間誰肯如公決生平我亦一沙鷗葦白蘆黄今已秋送公使我歸思動破烟衝雨憶扁舟明年想見東山起我亦煎茶石橋水道逢蓑笠把漁竿即是馬曹狂掾史城南上原陳翁以賣花為業得錢悉供酒資又不能獨飲逢人輙强與共醉辛亥九月十二日偶過其門訪之敗屋一間妻子饑寒而此翁已大醉矣殆隠者也為賦一詩宋陸游君不見㑹稽城南賣花翁以花為糧如蜜蜂朝賣一枝紫暮賣一枝紅屋破見青天盎中米常空賣花得錢送酒家取酒盡時還賣花春春花開豈有極日日我醉終無涯亦不知天子殿前宣白麻亦不知相公門前築堤沙客來與語不能答但見醉髮覆面垂髿髿西湖春逰宋陸游靈隠前天竺後鬼削神剜作巖岫冷泉亭中一尊酒一日可敵千年夀清明後上已前千紅百紫争妖妍鼕鼕鼓聲鞠塲起鞦韆一蹴如登仙人生得意須年少白髮龍鍾空自笑君不見㶚亭耐事故將軍醉尉怒訶如不聞予居苕溪上與白石洞天為隣潘徳久字余曰白石道人且以詩見畀其詞曰人間官爵似樗蒱采到枯松亦大夫白石道人新拜號斷無繳駁任稱呼予以長句報貺宋姜夔南山仙人何所食夜夜山中煮白石世人喚作白石仙一生費齒不費錢仙人食罷腹便便七十二峰生肺肝真祖只在南山南我欲從之不憚逺無方煮石何由軟佳名錫我何敢辭但愁自此長苦饑囊中只有轉菴詩便當掬水三嚥之轉菴徳久自號云石門洞宋樓鑰扁舟百里連城囬青山中斷立兩崕清都虎豹隠不見但見閶闔排雲開峰囬失喜大飛瀑聲震萬壑驚春雷掀髯目及九霄外玉虹千丈飛空來一冬青女靳天雪不知聚此山之隈傳聞神龍臥其上寳藏擊碎真瓊瑰胸中先自無塵埃到此更覺心崔嵬天風為我噀空翠春光瀉入騷人懐謫仙曽來寫勝句劉郎又為開天台我慚筆無挽牛力醉墨滿壁誰為裁或言龍湫更竒絶佳山髙處深雲堆我方擕笻往尋訪未知比此何如哉大龍湫宋樓鑰北上大行東禹穴雁蕩山中最竒絶龍湫一𣲖天下無萬象贊揚同一舌行行路入兩山間蹻碎苔㾗地將折山窮路斷脚力盡始見銀河落雙闕矩羅宴坐看不厭騷人弄詞困搜抉謝公千載有遺恨李杜復生吟不徹我逰石門稱勝地未信此湫真卓越一來氣象大不侔石屏倚天驚鬼設飛泉直自天際來來處益髙聲益烈漢地倒㵼三峽流到此誰能定優劣佳山佳趣須要領一日盡游神惡褻驪龍髙臥喚不應自媿筆端無電掣輪囷蕭索湍不怒非霧非烟亦非雪我聞凍雨初霽時噴擊生風散空濶更期雨後再來看洗浄一生煩惱熱㑹稽山中宋戴復古曉風吹斷花梢兩青山白雲無唾處嵐光滴翠濕人衣蹻碎瓊瑶溪上歩人家逺近屋參差半成圖畫半成詩若使山中無杜宇登山臨水定忘歸飛仙引游沃州水簾谷作宋謝翺赤城後門桃花尾濕盡蘼蕪洗蒼耳小支菩提海上來天風吹下谷簾水斜珠界左轉復右華盖懸肝三葉紫内間肉芝承乳流鬼母仙姝臨洗胃蒼龜守闗朝太微色阻讒神誣奏事海桑男子在謫籍驅鹿行車閏年至和靖墓宋謝翺山中處士白麻履死後無書獻天子青童元鶴晝上天夜下玉棺𦵏湖水湖隄四合葑如髮芳樹玲瓏倚春雪百年鳳舞雲霧空玉椀人間出勾越宫嵐塔雨恍如失飛網繞湖冠聚鷸琳宇焚芝秋寂歴斗下無人祠太乙贈鏡湖相士宋文天祥五月五日揚子江心水鑄作道人雙瞳子吾面碟子大安用鏡照二百里自信上歸逰石門訪故人毛儀卿振卿兄弟作長句贈之元戴表元山開未開白雲梯人行未行青麥溪五年清夢隔蟻穴千里飛塵深馬蹄重來交逰亦笑樂但覺几杖煩提擕門間霜葉無數積風定水禽時一啼藥草春暄夜更長木蘭花下聴天鷄善之擕酒招遊西湖值雷雨分韻得杯字元袁桷南山樹影糊輕煤北山雲花玉崔嵬絶憐我輩少姿媚幻此異景窮竒瑰湖光山色兩愁絶更挾新雨除飛埃千年龍公睡忽醒頃刻駕浪鞭春雷我生倦逰端有意陳迹黯淡漫蒼苔擬將鐵笛寫清怨復恐翠袖含餘哀主人似怪不解樂故結勝侣擕尊罍翩翩六鶴舞晴翮華表清唳雲光開絶憐山鷄强聮翼照水寒影空徘徊謝公屐齒殊濟勝偪仄蓬宇徒低摧娟娟新青故隄栁片片輕白孤山梅春風佳逰詎易得相與一笑同銜杯越船行元袁桷越船十丈青如螺小船一丈如飛梭平生不識漂泊苦旬日此地還經過三江潮來日初晚九堰雨慳河未滿當時却解傍朱門醉眼看天話長短年來官府催發綱經月辛苦鬢已霜布裘漫作解貂具入門意氣猶猖狂自古魚鮭厭明越明日今朝莫論說買魚沽酒不計錢被髪江頭傲明月勸君莫作越船婦一去家中有門戸沙上攤錢輸不歸却向鄰船盪雙艣次韻虞彦髙逰陽明洞元楊載憶昔神禹奠九州兹山㑹計功始休諸侯玉帛渺何許但見萬水從東流衣冠永閉陽明洞夜聞鬼哭巖之幽珠宫貝闕號龍瑞天造地設非人謀槎枒怪樹凍不死化作千丈蒼玉虬丹洞呀然仙掌裂翠峰巧矣蛾眉修梅梁飛去鐵鎻斷往往雷雨生靈湫軒轅緱神極秘怪海上笙鶴時相投平生閉門讀史謳子乃探穴先吾逰明當挾子期汗漫題詩更在最上頭不妨山水樂吾樂豈有饑溺憂民憂故家喬木尚可求有子有孫百世留卧横玉簫泛歸舟吹散萬斛江南愁霅溪翁雪霽望弁山圖元錢選至元二十九年余留太湖之濵雪霽舟行溪上西望弁山作此圖且賦詩云弁山之陽冠呉興峮嶙􅏭􅙙望不平煥然仙官隠其下衆山所仰青復青雪花夜積山如換乗興行舟須放緩平生不識五老峰且寫吾鄉一竒觀夜泊釣臺元薩天錫雙崕屹立幾千仞下有一葉之孤舟繁星亂垂光曅曅長藤古木風颼颼荒祠幽黑山鬼集怪石如人水邉立錦峯繡嶺雲氣深萬壑千巖露華滴山僧對話夜未央不知風露滿衣裳喚船振錫渡江去林黑無由歸上方髙寒宇宙無人語亂石灘聲濺飛雨欲從嚴子借羊裘坐待船頭山月吐仙居縣杜氏二真廟詩幷序元納延東陽杜氏二女子蚤䘮父母鬻餅市中厨人挑之二女子憤殺厨人走匿仙居之盂溪夜雨水漲皆溺死其屍閣巨木上蒼藤纒束儼若棺槨時隋大業間也唐令令狐取其遺骨塑像建廟溪上宋令古靈陳襄禱雨屢應刻石祠下國朝至正壬寅東陽陳君元祥以浙省員外督制兹邑水旱之禱顯有竒徵明年君督漕入京請諸中書命太常議封貞惠貞淑二真仙元祥因徵賦詩廟壁云君不見瀟湘江上斑斑竹雨灑踈林淚痕緑又不見金溪縣裏兩嬋娟身化白金金漸復至今九疑山下大江西窈窕祠堂依古木仙居更有杜貞娥千古清風凛相續貞娥鬻餅東陽市厨人相挑憤投齒捉刀夜斷賊奴頭勇力真同丈夫子脱身竄匿來盂溪木食澗飲幽巖栖㷀㷀姊妹自相保天寒愁聼哀猿啼夜雨奔流溢山趾月黑溪深黯無底嗚呼雙娥同溺死玉骨藤纒髙樹裏開兀賢令銜餘哀築祠却傍蒼崕開悲風蕭蕭落山葉精靈日莫猶歸來陳侯自是古靈後來作仙居民父母銜香赤脚禱龍湫秋日甘霖起枯朽去年飛章徹九閽紫綾裁誥褒貞魂鸞車孔盖蔽白日彷彿來謝朝家恩男児堂堂軀七尺忍垢含羞汙簡冊何如貞惠貞淑兩真仙萬古千秋具廟食五洩東原有地度可十數畝後負山前則石河如帶幽敻深窈盖隠居學道者可築室偶賦一詩屬陳彦正元呉萊越中五洩古名山東源峻嶺空雲間老石崚嶒欲見骨天河㵼破莓苔灣蛟龍縮身似蜥蜴魑魅出没司神姦雷公一聲忽下擊鳥跡不到猶重闗青華仙真舊治所碧落侍從登清班穴疑綵狻據一柱戸想銅獸銜雙環鳳馭鸞鞭白羽瓘芝樓菌閣朱莖殷梯梁未絶或可值洞府寖逺多愁顔嚮曽褰衣得揭渉别擬鑿徑通茅菅寛宏頗占十數畝夐静粗覺非人寰澗流帶綰玉繚繞巒翠髻擁花斕斒截斷塵埃與世隔搆成棟宇寜吾慳陳君