body:
  text: 浙江通志卷一百十九職官九明三提學道趙禮洛陽人胡軫豐城人張和字節之崑山人劉釪安福人鄭紀字廷綱仙遊人陳仁字三渠莆田人呉伯通字原明廣安州人趙寛字栗夫吳江人楊旦建安人徐蕃字宣之泰州人劉瑞字德符内江人何瑭如臯人汪文盛字希周崇陽人陸深字子淵上海人陳儒字懋學吉水人張岳字惟喬惠安人薛應旂字仲常武進人阮鶚見前畢鏘石埭人范惟一呉縣人林偕春字孚元蘇濬字君禹晉江人王畿莆田人樊良樞進賢人鄒嘉生武進人王應華已上俱以副使督學花潤生字藴玉邵武人熊鍊字學淵進賢人張悦字時敏華亭人李遜學字希賢上蔡人盛端明字希道海陽人萬潮字汝信進賢人林雲同字汝雨莆田人劉東星字子明沁水人徐階字子升華亭人袁萃呉縣人喬因阜耀州人陳大綬浮梁人洪承疇字亨九泉州人黎元寛見前劉鱗長晉江人許豸字玉斧侯官人已上俱以僉事督學浙西兵備分巡道陳宗夔湖廣人董士𢎞武進人劉燾天津人李璲金鄉人王健漳浦人鄧楚望麻城人黃紀已上嘉靖間任陳善道蠡縣人莊國禎晉江人沈奎字文叔江隂人已上隆慶間任王樵字明逸金壇人張子仁無錫人許一德貴州人曹一夔湖廣人陳用賓晉江人錢順德常熟人史旌賢雲南人鄒迪光無錫人方萬䇿莆田人韓萃善淄川人湯日昭丹陽人劉庚壽光人孫昌裔車大任邵陽人徐禎稷見前王鍾岱已上萬歴間任詹應鵬宣城人趙國琦南昌人已上天啟間任李若訥臨淄人蔡懋德字雲怡崑山人周鼎宜興人李政修懐慶人葉重華崑山人顧燕詒太倉人宋繼登字先之萊陽人張一如蕪湖人侯峒曾見前吳克孝字魯岡太倉人已上崇禎間任浙東備海道兵巡道分守道張鉞字文輔安仁人正德間任沈瀚字原約呉江人丁湛字子一彭澤人李文進字先之巴縣人劉起宗字宗之巴縣人孫宏軾字以瞻資縣人王詢字可庸成都人曹金字汝礪開封人譚綸字子理宜黃人已上嘉靖間備海道許東望字應魯宿松人陳元軻字仲聲懐安人李萬實字少虚南豐人李僑字子髙長清人邵齡休寧人謝鵬舉字仲甫蒲圻人已上嘉靖間兵巡道崔近思字希睿濱州人陳燦字德潤巴陵人郭天祿字子學定興人蘇松字貞卿四川人已上隆慶間任分守道劉宗岱字伯東歴城人余一龍字汝化婺源人徐廷祼字士敏崑山人李勲字世臣德州人唐本堯字世舉上海人李一中字時卿池州建德人朱文科莆田人劉翾周良臣康新民泰州人馮時雨華亭人葉夢熊字男兆歸善人張孫繩髙時劉守志王之屏山西人張國輔丁此吕字右武新建人呉獻台呉鴻洙范淶字原易休寧人王道顯洪啟睿鄒希賢常道立朱應奎秦道顯寗瑞鯉蔡獻臣王應乾龍溪人周繼昌無錫人車大任鄱陽人楊鍾英已上萬歴間任分守道洪承疇見前鄒渼方應明蕭基張魯唯崑山人顧鼎臣已上天啟間任分守道顔欲章張爾基大同人張茂頤林應聚向鼎林日瑞詔安人許豸見前謝雲虬南海人宋基登林銘鼎莆田人盧若騰福建人鄭瑄上官人紀騰蛟余鵾翔辰溪人王鏞廣信人于穎字長公金壇人劉士璉已上崇禎間任分守道都轉鹽運使司運使梁貞新昌人李世傑李信李泰再任夏禮吕本鳯陽壽州人史伯温張眞韓儒陳龔趙彥銘李鎮已上洪武間任李溟王泰韓傑已上永樂間任朱忠司祥已上宣德間任丁鎡字永時南陵人吳方大已上正德間任姚政景泰間任李慶字積善湖廣人李文輝王福已上天順間任張遂朱檼字伯承婺源人徐世安王文已上成化間任晏輅四川人宋明字惟逺大名人梁萬鍾字天賜温江人楊寄字秀夫壺闗人已上𢎞治間任寗舉新城人張吉字克修梁辰廣東人吳大有字元亨崑山人董天錫字壽敷寧都人張偉字汝賢四川人已上正德間任鄭諫李暘棗强人簡沛字一川清江人吳瓚休寧人方仕字克學固始人楊表字汝中龍溪人黃行可字兆見莆田人洪富字國昌晉江人周祖堯字宗道東平人張定代州人黃日敬字時簡莆田人劉㦂萬安人謝教武進人桂嘉孝字純父成都人已上嘉靖間任史桂芳鄱陽人帥機字惟審臨川人朱炳如字仲甫桂陽人已上隆慶間任何御字範之福清人林應雷字宗復閩縣人許天贈字德夫黟縣人游應龍婺源人王命爵南靖人劉自化字伯時高陵人貢靖國字元忠宣城人陸從平字履素華亭人蘇養䝉安邑人柯鳯翔字志德同安人王皥如字翁淳朝邑人陳以躍字司霖泰和人林時喬重慶人已上萬歴間任陳見龍潮陽人泰昌元年任周天允字綿祚安邑人沈仰字士望綿州人已上天啟間任楊湛然字無欲鄖縣人梁招孟興國州人張繼孟字泰巖扶風人已上崇禎間任杭州府知府王興福湖廣隨州人劉文王德宣江西德興人劉勝阮友竹當塗人黃信中已上洪武間任虞謙字伯益金壇人胡勉字志學鹽城人劉福福建人已上永樂間任盧玉潤江西人馬儀已上宣德間任潛溟陳復懐安人髙安已上正統間任龔貴張隆建水人已上景泰間任胡濬字淵深鉛山人天順間任張禧字公錫靈璧人李端興寧人陳讓字德光嘉定人張縉陽曲人已上成化間任梁萬鍾右衛人楊孟瑛字温甫酆都人再知已上𢎞治間任李達固安人吕夔字祖邦永豐人梁材字大用大城人留志淑字克全晉江人再知張芹字文林新淦人已上正德間任查仲道字文夫寧州人陳力内江人婁志德字存仁項城人丁洪鉛山人方岑江都人李冕字端甫章邱人陳仕賢字邦憲福清人陳一貫福清人嚴寛丹徒人孫孟滁州人劉九章衡陽人李景萃任縣人陳柯閩縣人沈應時河南衛人毛鋼太平人已上嘉靖間任吳一介桐城人徐淵南昌人已上隆慶間任吳自新祁門人劉伯縉歴城人方揚字思善歙縣人張振之太倉人余良樞奉新人胡士鰲詔安人朱正色上