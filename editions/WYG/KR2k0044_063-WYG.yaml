body:
  text: 浙江通志卷六十四海塘三國朝順治五年署海鹽縣事嘉興府同知張世榮修築調陽二字號大坍石塘一十八丈順治八年海鹽縣知縣郭尚信修築月字號石塘二十丈倂小修張成等號結面塘石陡門順治十二年嘉興府水利通判韓範海鹽縣知縣毛一駿修築化字草字木字號大坍石塘共三十丈順治十六年禮科給事中張惟赤題為東南財賦所闗捍海最要等事竊惟江浙二省杭嘉湖蘇松常鎮七郡皆瀕於海民之不為魚鼈田土廬舎之不蕩於波臣者以海塘之捍其外也查此塘築自唐開元中至明始易以石編立字號葢因七郡地勢窪下易於湮沒故沿海郡縣皆有築塘至海鹽一處兩山夾峙潮勢尤為洶湧昔之縣治已沒海中葢齧而進者已七十餘里明萬厯十七年崇禎元年屢次衝決七邑之廬舎人民屢遭湮沒不惟國課無資亦且生靈可念此時旋即估修已費金錢十餘萬兩大約逐年修理則易為力俟其大壊而後修則民受害而為費滋大所以明朝特編海塘夫銀以事嵗修他郡無論即就海鹽一處之塘嵗編銀六千九百九十九兩九錢一分内派嘉興縣一千七百五兩一錢零秀水縣一千二十五兩三錢三分零嘉善縣九百三十四兩八錢一分零海鹽縣九百二十三兩六錢三分零平湖縣九百二十三兩七錢二分零石門縣七百八十七兩一分零桐鄉縣七百兩一錢八分零徵貯府庫以為協濟載在賦役全書及海塘録内班班可考近来此銀不知銷歸何地自明末至我朝十六年来並未修築此塘被水衝齧基址盡圯縣治百步外已有坍口倘一旦風濤大作徑從坍口深入則滔天之勢潰於蟻穴將見七郡烟火之墟財賦之地盡付之浩𣺌之鄉矣夫使額無正銀事經創始茍有係於大利大害猶將設法爲之今查每嵗協濟銀共有七千兩即自赦後十二年以至十五年四年之間額該銀二萬八千兩存貯府庫臣竟不知此項作何支銷而竟隔膜視之也臣非獨為臣鄉言也七郡皆濵海則七郡皆有塘七郡皆有額編之銀不以急正務而以填漏巵臣恐為害於七郡者非𣺌小也伏乞皇上乾斷嚴察數年来額編銀兩作何銷算併勅新撫按勒限報竣毋得仍前怠玩仍定限嵗修則防患未然不特東南士民額手呼祝而國本亦已固矣奉㫖該部察議具奏部議覆准隨於本年修築致雨二號大坍石塘二十一丈本府推官尹從王督修完工順治十七年知海鹽縣事雷騰龍修築閏餘二號成嵗二號大坍石塘共六十丈康熙三年八月初三日颶風三日夜海嘯衝潰海寧縣海塘二千三百八十餘丈總督趙廷臣巡撫朱昌祚疏請發帑修築委兵巡道熊光裕督修至次年九月塘成題修石塘并尖山石堤五千餘丈用過料銀二萬七千六百三十七兩零内動支年修塘銀五千八百五十兩各官輸銀五千三百兩紳士人民捐米九千餘石尚欠商價銀七千四百四兩二錢借支驛站給還議將杭州府毎年額編塘工銀一千兩陸續補還沈珩重築捍海塘記康熙甲辰秋八月海寧捍海塘潰勢浸淫無所底下流迄湖嘉常蘇咸震危總督趙公巡撫朱公巡閱諮詢畫籌乃定爰簡􅍯兵熊公来督修十一月隄垂成是時巡撫蔣公甫蒞浙敦厲方畧於是植頽築虚増卑補狭度越舊觀備兵公之来視海也民老幼環車泣曰是役費難工鉅任勞奈何公曰吾奉天子命監兹土民溺則誰溺也敢畏難辭鉅避勞以具文報塞哉爰即決口判列為號若散屬若庶耆分曹置監其材若石槱囤櫃欂櫨竹落其工若礪鍛畚鍤防丁樁戶各懋乃司故隄加廣厚什半於舊按寧塘厯唐宋元明一罹厥災至淪山陷城崩地數十里漂禾稼數郡費金錢或百萬繇役連十餘郡厯十年或二十年猶未盡底所謂難與鉅與勞今且什百倍昔而上不靡帑下無困氓千載之功不日告竣然則常變會乎勢安危係乎人彼難與鉅與勞之倍昔勢也其事半功倍則人也魚腹之遺黎得安堵而康食井耕而土貢者伊誰之力也士民請記之石云康熙四年巡撫蔣國柱委通判殷作霖修築海鹽縣露結盈等號大坍石塘五十三丈土塘六百四十丈康熙六年知縣湯其升修冬字木字號大坍石塘共一十八丈日字號小坍石塘四丈五尺又小修月盈等號結面石塘康熙十一年知縣張素仁修日字大坍石塘九丈月字大坍石塘六丈三尺盈字大坍石塘一十二丈被字大坍石塘一十丈共築三十九丈八尺康熙十四年六月潮大作沿海沙塗坍且垂盡知海寧縣事許三禮日夜竭力保䕶至八月沙漲水平民賴以安范驤海塘議寧邑海患毎東北風漲怒濤乘之大概與海鹽同而鹽塘止一面受敵寧則三面受衝其患與海鹽異其潮患之在東南者潮水朝夕至怒如震雷瀉若建瓴木華所云天輪膠戾而激轉地軸挺拔而爭迴者也水患之在西南者江水出歙縣之玉山東北經建徳又北至新城又東北至富陽過錢塘反濤奔軼水勢折歸故云浙江也龕赭巖門而外江水與東南之水合寧邑獨受其衝枚乘所云似神而非者三疾雷聞百里江水逆流海水上潮日夜不止者是也故寧邑海塘受衝其患倍急於鹽不寧惟是鹽塘隄岸城根半里而近隨決隨築譬如衣敗壊一以相補寧故堤去城根五六十里而逺當其無事亭竈􅆈沙漉白視為沃壤樵者茭芻彌望漁者鯊鱨蠃蛤人人得其所欲如燕巢幕如厝火坐積薪平時築塘工費積之五年十年者那為他費一旦颶風激射木石茫無所措不浹旬而五六十里浮沙潰決驚濤直薄城下浙西之田漸鹵而東吳之地幾壑乃始倉皇議採石蘇湖議發里夫郡丁議徴嵗額議加派田賦議藩餉郵𫝊贏金議七郡贖榖議監築官議倣瓠子宣房下淇園竹楗倣王荆公鄞塘坡陀倣黄僉事幞頭品字勢如救焚議同築舎計已晚矣故鹽塘之患在眉睫寧塘之患在五年十年或二三十年所謂無形之痛一發不相補救當事者必未雨綢繆徴塘工嵗額於無事之時貯木石銀糧為緩急之用海口大決則用黄公縦横之法不可惜小費而妨大功小決則用楊公坡陀之法下石櫃以隄水勢此全浙咽喉東南門户無漫視為一方之利害金錢畚鍤徒苦我父老為也許三禮築塘議築塘之法有一世利之或十世利之百世利之如石囤木櫃隨坍修築取石有術用民不勤此利在一世者也其慎選幹吏如徐撫臣栻者塘式隨宜如楊副使瑄黄僉事光昇者治連平江嘉湖議先修鹹塘淡塘袁花塘以防盤越北向如劉提舉垕者作副堤十里更採石􅍯用歛不及民如錢僉事山者此十世之利也夫先事之圖如額設捍海塘夫嵗編銀三百兩若嚴令寛者城南抽分竹木存留銀七分充工料者徵九郡力役三府工徒如保定侯孟瑛者豈非百世之利乎與驅一方之民為不終食之計以邀一時之功相去葢有間矣康熙二十四年浙江巡撫趙士麟委海鹽縣知縣陳鈍修築石塘一千丈康熙三十八年巡撫張敏具題捐修錢塘縣江塘自望江樓起至雲林下院并古頭埠共三十九丈一尺顯應廟起至大郎巷共六十三丈及梵村蜈蜂嶺等處共三百五十三丈仁和縣江塘自銀杏埠起至大郎巷一百六十二丈五尺自大郎巷起至来家埠景家埠共七十九丈五尺康熙四十年巡撫張志棟具題捐修錢塘縣江塘自三郎廟起至顯應廟中沙井永福橋至節婦牌坊李家橋止及銀杏埠阮家埠等處共二百七十一丈三尺又續報坍塘自凉亭起至中沙井一帶至大郎巷并放生庵至大通庵化智廟止共修二百八十七丈又闗帝廟至福橋大通庵鎮海庵共築子塘五百九十八丈四尺来家埠至中沙井顯應廟共子塘二百九十七丈二尺仁和縣江塘自下泥橋起至廬家橋鎮海庵止共四十一丈三尺康熙五十年浙江巡撫王度昭題准將杭嘉湖三府屬建閘濬河案内承修各官浮銷帑銀追出修築海塘委鹽驛道同海鹽縣知縣修築收字號大坍石塘一十九丈六尺冬字號大坍石塘九丈六尺藏字號大坍石塘七丈四尺餘字號大坍石塘一十五丈四尺嵗字號大坍石塘一十三丈二尺吕字號大坍石塘一十四丈五尺調字號大坍石塘一十六丈四尺雲字號大坍石塘一十六丈露字號大坍石塘五丈一尺結字號大坍石塘三丈為字號大坍石塘一十丈九尺張字陽字出字玉字等號小坍塘二十三丈共修築一百五十四丈用銀一萬六千八百有竒康熙五十四年九月工部為海塘亟須修整事議覆浙江巡撫徐元夢疏稱海寧一縣地居濵海潮汐往来惟恃一帶石塘隄防捍禦今嵗入秋以来潮勢洶湧塘隄坍陷共應修築塘隄三千三百九十七丈五尺實需工料銀三萬八千五百九十三兩零除動支建閘濬河案内追出浮銷銀五千六百四十一兩零以及督撫鹽院司道等官併紳衿士民共捐銀一萬八千七百二十兩修築外尚不敷銀一萬四千二百三十一兩七錢零請先於司庫給濟俟工完之日將俸工補項等因應如所題將前項坍陷塘堤速行堅固修築可也奉㫖依議康熙五十五年三月浙江巡撫徐元夢題為海塘亟須修築等事查寧邑海塘所闗甚鉅經臣具題修築而承修之金衢嚴道賈擴基溺職悞公業經題㕘另委鹽驛道裴􅏍度承修在案今查未完併續坍工程以及賈擴基修完塘身亦皆草率俱須按段找修共需工料銀三萬七百五十一兩零除將賈擴基支剩并商牙等已領未交等項銀三千六百六十七兩零抵用外尚不敷銀二萬七千八十四兩臣率同司道等官捐措濟用等因奉㫖該部知道康熙五十五年七月連雨江漲自徐梵二村至轉堂頭石塘衝壊總督覺羅滿保會同巡撫朱軾委杭州府知府張恕可修築錢塘縣江塘自天字一號起至三十七號止共六百八十一丈六尺潮神廟海月橋籃兒路等處共八十丈二尺龍王廟起并拆砌總管廟老塘共二百二十七丈又三郎廟前子塘二十二丈五尺小橋頭老塘子塘共八十丈一尺兵馬司前十七丈迄工於五十七年三月中間惟三郎廟前子塘尤為險要三築勿成布政司段志熙親勘相度鳩工選石縱横砌築工始堅固民獲安居段志熙修三郎廟子塘法此塘修築三次不成後用一縱一横毎層將石鑿眼貫以木梢合五六塊為一塊以重鎮水勢也又恐水入縫中毎層合縫處用鐵錠横扣又慮面前水入竪立處用鐵錠一尺一錠上下扣住總合二十丈石為一塊石也其石條交搭處即以本石扣筍合縫共塘二十丈用工料價銀一千兩又仁和縣中二下節地方老塘子塘共二百二十九丈康熙五十七年三月工部為寧邑海塘等事議覆浙江巡撫朱軾題前事議得先經御史許惟模以海塘地勢髙峻實踞浙江數郡之上游出城數步即濵大海全賴捍海一塘砌築木石以禦狂瀾康熙五十四年春夏風潮陡發沙奔浪湧塘身坍陷至數千餘丈經陞任撫臣徐元夢估計捐修在案今捐輸難繼修費實難措處查五十一年户部請㫖補足事例内有捐監一條請令寧邑俊秀赴督修道臣處照例捐銀以備修築等因具題奉㫖該部確議具奏欽此臣部覆令浙撫查明具題到日再議去後今據該撫疏稱寧邑海塘委鹽驛道裴􅏍度督修迄今未完工程二百餘丈現在催修惟查沿塘俱屬浮沙塘脚空虚雖有長樁巨石終難一勞永逸臣屢至工所相度情形再四商確惟用木櫃之法實以碎石以固塘根乃用大石髙築塘身附塘另築坦水以䕶塘脚毋使潮水浸沁再塘内向有河道名備塘河居民築壩遂淤為陸今應去壩疏河即以挑河之土培岸是亦有偹無患之一法又石塘三十餘里均須防守不時修築東西土塘現在坍塌更宜及時堵禦但工程浩大鹽驛道裴􅏍度一人實難料理應令布政使段志熙杭州府知府張為政等協同修築其採買木石令糧儲道劉廷琛承辦臣不時赴工督查至嵗修工程既難估計所費錢糧亦難豫定臺臣許惟模所請海寧開例之處應否令杭嘉湖紹等府將現開常平捐監之例停止并歸海塘案内捐納監生聴候部議目前需用錢糧緊急懇祈暫動庫項四萬兩俟開捐抵補再原任金衢嚴道賈擴基情願赴工効力應否令其分工捐資修築工完准予開復如怠玩悞工從重治罪等因前来應如所請暫動庫銀四萬兩交與劉廷琛一面採買木石并令布政使段志熙知府張為政等協同修築堅固可也奉㫖依議康熙五十七年閏八月工部為恭報寧邑海塘工竣等事議覆浙江巡撫朱軾題前事該臣等查寧邑海塘闗係城社民生不便遲延今裴􅏍度接修工程雖經告竣其坍塌塘身坦水土塘及備塘河道俱應疾儧完工至捐監之處應如所題暫停杭嘉湖紹四府常平倉捐監之例俱令赴糧儲道處捐納補還庫銀四萬兩一年期滿停止餘剩銀兩存貯司庫以備修塘之用再原任金衢嚴道賈擴基該撫既稱情願認修石塘三百丈土塘五百丈俱自行捐資修築等語應准其赴工効力勒限修築如限内完工果能堅固合式該撫確查保題到日將開復之處具題請㫖倘怠玩悞工交部從重治罪可也奉㫖依議康熙五十九年正月海寧縣海塘工竣修過石塘九百五十八丈四尺九寸坦水三千九十七丈五尺土塘五千一百六丈開濬備塘河身七千七百五十六丈四尺建閘一座工料銀一十五萬一千三百一兩康熙五十九年七月工部等為請㫖事該臣等會議得先經福浙總督覺羅滿保浙江巡撫朱軾以海寧縣城西老鹽倉之土塘沖没今岸根漸有聚沙可以修築海潮由中小亹入江則南北兩岸無海潮之患上虞縣夏葢山土塘須改用石工等因具題臣部覆令會勘詳議確估具題去後今據該督等疏稱臣等會勘得東自上虞縣之夏葢山起西至雀子村止一帶沿海土塘多被海潮沖坍無存地與海平且沖開缺口數處其南大亹沙漲已久淤成平陸江海不循故道直沖北大亹而東并老鹽倉亦皆坍没入海所有海寧上虞二縣建築石塘土塘工程丈尺并開濬中小亹淤沙及需用錢糧數目調委監工修築官員各事宜謹臚列備陳仰祈聖明指示一議築海寧縣老鹽倉北岸石塘以防海水内灌查老鹽倉一帶正當江海二流今土塘之隨浪坍頽一日不止數尺現在沖開徐家壩一口與内河支港相通已築石壩堵塞且老鹽倉北岸皆係民田廬舎支河汊港甚多俱與上河通聨東即長安鎮與下河官塘僅隔一壩若不於此處急築石塘堵禦萬一土岸坍盡決入上下運河則鹹潮直注嘉湖蘇松列郡闗係甚鉅今擬於老鹽倉北岸東自浦兒兜起西至姚家堰止共一千三百四十丈砌築石塘方可保䕶杭嘉湖三府民田水利除現在採買蘆葦乾柯等料於患口先築草壩又就近開採武康縣大石購買巨木乗此春夏運至工所急築石塘以防潮水泛溢等語查該督撫既經勘明老鹽倉一帶闗係甚鉅應於北岸砌築石塘方可保護應如所題購買木石乗時建築務期堅固一議築石塘之式以防潮水連根搜刷查海寧沿海地方俱係沙土且潮汐往来變遷無定今沿塘一帶漲有微沙乗此新漲時急將石塘砌築将来沙能漸聚便可擁䕶塘根臣與撫臣再四相度商確因地制宜就於塘岸用長五尺濶二尺厚一尺之大石毎塘一丈加作二十層共髙二十尺於石之縦鋪側立兩相交接處上下鑿成槽筍嵌合聨貫使其互相牽制難於動摇又於每石合縫處用油灰抿灌鐵鑻嵌扣以免滲漏散裂塘面之内培築土塘計髙一丈寛二丈使潮汐大時不致泛濫塘基根脚宻排梅花樁三路加石灰沙土用三和土堅築使之稳固總期一木一石皆得實用不敢浮費錢糧亦不致草率修築致貽後患等語應如該督撫所題乗此沙漲之時如式建砌石工仍飭分築之員堅固建砌以垂永久需用木石細數先行造册送部存查一議開中小亹淤沙以復江海故道查赭山以北河莊山以南乃江海故道近因淤塞以致江水海潮盡歸北岸今雖砌築石塘然中小亹淤沙不開則回潮沖北一日兩次土石塘工終難稳固今多僱民夫将中小亹一帶淤沙上緊挑濬計挑過一千九十丈大汛時潮水亦可出入現在將已挑者開濬深濶未挑者兼工開浚使江海盡歸故道則土塘石塘可免潮勢北沖之患等語查中小亹淤沙已挑之處大汛時潮水既可出入則有成效應行該督撫將已挑者再加深寛未挑者速行開濬仍將挑過寛深丈尺用過夫工細數造冊送部查核一議築上虞縣夏蓋山石塘以防南岸潮患查上虞縣原有土塘五千四百一十七丈以障蔽民田夏蓋山之南有夏蓋湖周圍一百五里蓄水注䕃上虞餘姚二縣之田並藉土塘捍禦近年夏蓋山對海中流漲有圓沙數十里潮逼南岸將近海荷花池一帶盡行沖陷并沖開寺前思湖患口數處今先將患口填塞其潮水稍緩之處上虞之民願捐築土塘惟夏蓋山西邊實為最險要衝非建石塘斷難遮䕶隨親勘丈量共長一千七百九十丈今用長五尺寛二尺厚一尺大石於羊山及夏蓋山開採運用隨地勢髙下每丈十三層以至三十四層不等縱横疊砌庶南岸之潮患可禦等語查夏蓋山潮勢稍緩之處土民既願捐築土塘應令其速行建築其西邊最險之處該督撫既經勘明應建石塘應如所題如式建砌仍將需用工料先行造冊送部查核一議實需銀數以濟巨工查沿海塘堤實為各郡保障若不及時修築貽患無窮即或茍簡因循亦恐隨成隨毁今海寧縣老鹽倉北岸新築石塘一千三百四十丈所需工料等項約共銀九萬二千兩可以預為估計惟樁木人工難以預定應俟工完之日查驗另銷上虞縣夏蓋山新築石塘一千七百九十丈共估需用銀五萬八百兩兩處石塘工料共估銀一十四萬二千八百兩除將五十七年海塘捐納案内餘剩銀六萬三千二百九十九兩現在撥用外其不敷銀兩一時難於措處查五十七年海寧建築海塘將杭嘉湖紹四府常平倉捐監之例暫停照五十一年請㫖補足事例捐監濟用在案今兩處石塘俱係急不可緩請將浙省各府屬現行常平倉捐監之例暫停收捐仍照五十一年事例統於海塘案内收捐補用俟工竣足額即行停止仍歸常平倉收捐其現在不敷工料銀兩請於藩庫先行動支俟收捐補項等語查海寧上虞二縣建砌石塘該督撫既經勘明共需銀一十四萬二千八百兩動支海塘捐監餘剰銀兩速行建砌其不敷銀兩應如所題先於藩庫動支暫停常平倉捐監事例統於海塘案内收捐濟用捐足之日即行題明停止一議調委經理各官以專責成查藩司為錢糧總滙兩處塘工凡收貯銀兩支領出入之數俱令布政司傅澤淵總理稽核其海寧縣老鹽倉北岸石塘遴委温處道蒋敷錫親身督修統司稽察并委杭州府總捕同知金上志採辦木植嘉松分司鄭一楓採辦石料處州府同知彭銘寧紹分司徐有緯收支物料發給工銀并分委湖州府同知髙玥原任金華府同知劉汝梅杭州府通判李秉仁寧海縣訓導林蘭等督同安吉州州判楊愷嘉興府經厯徐治逺台州府經厯韓世徳處州府經厯包文琦杭州府前衛千總鄔琪楊世春等員分定號段監修䟎築再委處州府知府蘇稷督築沿塘草壩船政同知陳良策紹協都司孟飛熊等挑濬中小亹淤沙其上虞縣夏蓋山石塘專委紹興府知府俞卿總理督修并採辦物料支給錢糧再委紹興府同知閻紹等各員分任督修其雇募夫匠儹運物料等項仍令海寧上虞二縣知縣專管策應如此則兩處塘工各有專司臣等稽其勤惰如有怠玩悮工侵冒等弊察出即行嚴㕘如經畫得宜功績特著據實薦揚破格擢用勤勞盡職者各予議叙則激勸有方人心自勉等語查調委官員應如所題倘内有怠玩悮工即行嚴㕘至修築工程係地方官專責應將所請破格擢用各予議叙之處毋庸議一議專員嵗修以保永固查沿海潮汐惟浙江為最非有專員經管未見實效請將南岸紹興府之上虞餘姚山會蕭五縣石塘土塘專交紹興府同知閻紹管理北岸杭州府之海寧仁和錢塘三縣石土塘專交原任金華府同知劉汝梅管理嘉興府之海鹽平湖二縣石土塘專交嘉興府同知王沛聞管理各員銜内添入海防字樣專任責成小有損壊即時修砌其屬轄之巡檢場員聽其調委分任惟是閻紹王沛聞俱係現任同知地方原屬管轄其杭郡雖有同知通判各員俱有專責别無閒員可以經理塘務劉汝梅係金華府同知部議降級調用續經題請開復金華府原非劇郡現有通判一員可以佐理請將同知裁去添設杭州府海防同知一員專司其事即将劉汝梅補授任滿之後此三缺即於通省同知通判知縣㨂選調補庶人地相宜於塘工有益至嵗修錢糧現在無項可動查寧邑海塘捐監餘剰銀兩原留藩庫為嵗修之用今動支修築石塘應仍於新工案内照從前餘剰之數捐足還項留貯藩庫為逐年嵗修之用等語應如該督等所題将紹興嘉興同知各分管理銜内添入海防字樣專任責成金華府同知裁去添設杭州府海防同知各處工程交與管理再該督等既稱海塘捐監案内餘剰銀兩原留為嵗修之用今動支修築老鹽倉石塘亦應如所題於新工案内照數捐還貯庫以為嵗修之用可也奉㫖依議康熙五十九年嵗修海塘動用銀一萬六千一百七十九兩康熙六十年海寧縣老鹽倉石塘新工沙塗漸漲水勢瀉注舊工低處受衝逐次修補動用工料銀二萬二千一百七十七兩九分零康熙六十一年二月工部為恭報寧邑海塘新工告竣事議覆浙江巡撫屠沂題前事該臣等會議得先經督臣滿保與前撫臣朱軾題海寧老鹽倉海塘東自浦兒兜起西至姚家堰止建築石塘臣部覆准在案據該撫以海潮遷徙無定修築堤岸必須隨時制宜題請於土浮不能釘樁砌石之處趕築草塘臣部恐草塘不能永久仍令砌築石塘等因在案今准該撫疏稱海寧縣海塘因潮頭沖激将上年勘定實土處所縱横實砌石塘其土鬆之處樁石難施者趕築草塘五百四十丈今春因潮勢洶湧急宜搶築隨接築草塘三百丈仍於實土處又築石塘連前共五百丈并將姚家堰西續坍處所亦築草塘二百一十五丈次第完工等因前來查老鹽倉等處修築草塘原議石工今以實土處所砌石塘其土浮樁木難施之處改築草塘工程雖經報竣但草塘究非石塘可比其中恐係督率承修各官希圖草率完結亦未可定應行該撫仍令督修承修各官保固三年限内如有沖塌責令賠修其分修工段各官職名即行造冊送部可也奉㫖依議康熙六十一年八月工部為報銷海寧上虞二縣塘工事議得浙江巡撫屠沂疏稱海寧縣石塘五百丈草塘一千五十五丈共用過銀九萬一千六百五十兩上虞縣石塘二千二百五十六丈用過銀五萬二千兩共應銷銀一十四萬三千六百五十兩俱係據實開銷並無浮溢至海塘土活沙浮變徙靡定舊工石塘疏内經前撫聲明必須逐年防䕶隨損隨修在案今所築草塘是應一例隨時修防難以責令三年保固至中小亹沙地因北岸沖決甚險題明挑挖以分水勢今北岸塘脚現漲沙塗塘身穩固無庸再為挑濬會同督臣具題前來查海寧上虞二縣石草塘工用過銀兩該撫既稱俱係實銷並無浮溢應准開銷其中小亹淤沙該撫既稱北岸塘脚現漲沙塗塘身穩固無庸挑濬應停其挑挖至老鹽倉工程該撫雖稱土活沙浮變遷靡定難以責令保固但各工俱有保固之例應仍照原題令督修承修各官保固三年速将分修工段造冊送部可也奉㫖依議雍正元年海寧東塘新沙復洗沖決塘身修過工程三千六百一十四丈二尺用工料銀八千六百一兩四錢一分雍正二年七月海寧鄞縣慈谿鎮海象山山隂會稽餘姚等縣海塘被潮沖決奉上諭及時修築動正項錢糧作速興工沿海失業居民藉此傭役日得工價以資餬口欽此欽遵修築過海寧等八縣海塘工料銀共一萬五千七十四兩六錢五分零於雍正四年三月題准報銷雍正三年正月吏部尚書朱軾等題為欽奉上諭事雍正二年十二月初四日臣軾面奉上諭浙江沿海塘工最為緊要署巡撫石文焯前奏必須通用石塊修築後又奏稱不必用石如此全無定見誠恐貽悮塘工朕已批諭令法海佟吉圖作速詳議具奏矣但恐法海等初任不諳練地方情形汝做過浙江巡撫必知海塘緣由着汝馳驛前往浙江将作何修築之處會同法海佟吉圖詳查定議交與法海等修築汝即回京朕思海塘闗係民生必須一勞永逸務要工程堅固不得吝惜錢糧江南海塘亦為緊要汝浙江事竣即至蘇州會同何天培鄂爾泰将查勘蘇松塘工如何修築之處亦定議具奏欽此欽遵臣馳驛至浙會同巡撫臣法海布政使臣佟吉圖至餘姚東自滸山鎮起西至臨山衛六十里舊築土塘三道最内一道為老塘即昔年海岸也今離海三四十里或十餘里不等緣歴年沙塗淤漲百姓陸續開墾報陞自築土塘二道是為外塘詢據土人俱云潮水從不到塘若加髙三四尺加厚五六尺即遇風潮亦不致衝決漫溢查歴來内塘係民戸修築外塘係竈戸修築今被災之後民竈無力應令地方官動用公費興修又自臨山衛起至上虞縣交界烏盆村十五里自烏盆村至會稽縣瀝海所四十五里内石塘二千二百餘丈係康熙五十八年題建至今穩固其石塘東西兩頭共土塘七千丈坍塌甚多沿塘雖有沙塗數里但海潮往來無定不得不豫為防䕶臣等愚見擬於塘底開深二尺填築亂石上鋪大石寛六尺髙六尺以固塘基貼石築土寛二丈髙一丈三四尺塘内令居民栽種榆柳近塘窪下坑䧟一槩築平庶可永固又歴勘杭嘉二府東自仁和縣翁家埠起西至海寧縣城東陳文港七十餘里歴年洪濤衝陷屢經修建石塘題報在案今頼聖主洪福塘外淤沙三四十里不等髙處平塘低處露出塘身三四尺不等毋容議修自陳文港起至尖山二十餘里内草塘七十四丈亂石砌邊土塘三千七百二十六丈塘外淤積沙塗尚薄潮水猶注塘下應將土塘加寛一丈五尺髙三尺頂鋪條石厚一尺以防泛溢其草塘七十四丈並照式改修再塘外原有亂石子塘寛三四尺不等外加排樁因年久欹斜子塘大半零落應修砌完固從前原無子塘之處亦照式興修如此則海寧塘工可無衝決之患矣又海鹽縣東自秦駐山三澗寨起西至演武場止石塘二千八百丈係明時修建塘身髙濶琢石見方縱横合縫通塘連為一塊最為堅固因年久水沁塘根樁木朽壊南頭陸續坍塌八十餘丈今應移就實地修築又去秋風潮衝潰八處共七十丈其附石土塘通身洗刷成坑應照式重修補築自演武場至平湖縣雅山砲臺一帶土塘現在地方官加修月内可以完工以上杭嘉紹等府海塘臣等逐一勘議查估餘姚上虞會稽三縣應修塘工共七千丈每丈用長六尺寛二尺厚一尺五寸條石二十四塊并亂石價銀夫匠土方雜費共用銀十四兩通塘共用銀九萬八千兩海寧加修亂石塘每丈蓋頂小條石連運價用銀一兩共用銀三千七百二十六兩加寛加髙土方并補修子塘約用銀四千兩共用銀七千七百二十六兩二處塘工通共用銀十萬五千七百二十六兩再海鹽縣坍塘據地方官估計用銀七千六百餘兩但應否增添石料難於懸度將來或可節省亦未可定統俟工完核實造冊題銷臣謹具題隨經大學士等議准浙江海塘工程著發往塘工効力之何順髙泓等建修浙江通志卷六十四
