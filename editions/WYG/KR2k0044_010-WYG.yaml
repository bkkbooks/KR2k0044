body:
  text: 浙江通志卷十一山川三嘉興府嘉興秀水二縣附郭缾山嘉靖浙江通志在府治東北高三丈相傳宋時置酒務在此其罌缶所棄積久成山又嘉善縣南亦有缾山五臺山名勝志在府治西北宋寳安禪師來自五臺山躬運土石作山亦名五臺并建五臺院范蠡湖嘉興府志補在澄海門内范蠡橋西約周二十畝湖水繰絲甚白中産五色細螺昔范蠡泛舟五湖從此發櫂朱彛尊鴛鴦湖櫂歌落花三月𦵏西施寂寞城隅范蠡祠水底盡傳螺五色湖邊空挂網千絲臙脂河一名傾脂河檇李詩繫在郡治西經楞嚴寺東北折而過天寧寺前相傳西施傾脂水於此錦帶河嘉興府志補在府治西子城下以其環抱府治故名韭溪名勝志在府城内即南湖之支流經府而達運河至元嘉禾志考虞仲翔川瀆記云太湖東通長洲松江水南通烏程霅溪水西通義興荆溪水北通晉陵滆湖水東通嘉興韭溪水凡五通謂之五湖故嘉興有韭溪焉張堯同韭溪詩終與雙溪接分流入郭來市橋人影合不解洗塵埃謹按晏公類要云川瀆記謂太湖東通嘉興韭溪水今運河西北接太湖則當是東南通韭溪耳金魚池檇李詩繫在郡西北唐刺史丁延贊養金鯽於此靈光井檇李詩繫在郡城内精嚴寺本晉徐熈之别業因夜發光捨為寺成帝賜名靈光嘉興縣城外山川殳山嘉興縣志在縣西南嘉㑹都千金字圩半屬本縣半屬桐鄉胥山𢎞治嘉興府志在縣東二十七里一名張山右有吳王磨劍石閒窗括異志嘉興胥山高一十五丈周二里舊經云伍子胥伐越經營於此朱彛尊周篔沈傅功秋日登胥山聨句秋水日以駛輕船泛清澄流沿轉紆曲櫂急黏菰菱仄峰尚阻樹近寺俄飛棱窅窅梵磬出鱗鱗波雲興流目訝突兀賞心闚崚嶒舟維臥柳渡道失寒瓜塍誰言㟝嶁微曲磴縁百層碣殘蘚欲剥祠古藤交縆緬懐大夫節千秋痛填膺覆楚豈大義忠孝不兩能飲泣蘆中漁悲歌河上朋當其恥已雪屬鏤非所矜慨此空山中遺跡猶可徴刃截兩白石指㸃由孤僧其傍臥石劍霜花常侵凌皜如鋪練帶亘若横舟枰又如常山蛇首尾相為應觀其氣憤激毋乃神式慿常想鞭荆尸壯士心摧崩至今祠下水猶作胥江稱吾徒久于役逺攬岱與恒顧兹百里内屐齒游未曽故鄉洵足慕高興偶此乗寄言同心客暇日期重登謹按水經注云子胥死於吳吳人立祠江上名胥山今杭州吳山名胥山又蘇州吳縣亦有胥山並此而三矣滮湖𢎞治嘉興府志在縣南二里一名馬塲湖檇李詩繫宋志云闊五百丈深三丈北隣城壕東列廛市其西則鴛湖也姚綬馬塲湖詩初見菱葉稀漸見菱葉肥馬塲湖水闊處處采菱歸相家湖𢎞治嘉興府志在縣東北九里靜志居詩話懐悦居在相湖之南曰柳莊亦曰柳溪自號柳溪小隱又號相湖漁隱懐悦游相湖詩雲滿銀壺酒色濃尋春不讓瀼西東波添鴨緑今朝雨花落猩紅此夜風一段好懐凝野望萬家生意荷天工平沙淺渚都經遍吹笛滄浪月滿空雙溪𢎞治嘉興府志在縣東六里以其近漢魏塘故名舟之逹於松江者皆由此溪梅溪舊浙江通志在治南四十里溪傍村落多樹梅故名藕溪嘉興府志補在縣東三十里正統初許職方父號松泉植藕花於上名人多游咏焉漢塘𢎞治嘉興府志在縣東南十五里唐書地理志海鹽注云靣北六十里有漢塘太和七年開詳見水利横塘至元嘉禾志在縣南五里自南滮湖轉路馬塘廟而上南至海鹽謂之横塘劉文房詩云家在横塘曲是也詳見水利練塘𢎞治嘉興府志在縣南二十五里東西通横塘長水塘吳王練兵之所詳見水利長水嘉興縣志在縣南三里水自海寧諸山貫硤石東北流五十里入嘉興縣界合於鴛鴦湖至元嘉禾志始皇東游至長水聞土人謠曰水市出天子從此過見人乗舟交易應其謠遂改為由拳縣馬塘涇檇李詩繫在郡城南七里九域志云始皇至此遏水為堰斬馬祭之鶴渚至元嘉禾志在縣南二里陸宣公舊宅放鶴之所謹按檇李詩繫云鶴洲在嘉興南三里唐裴休放鶴處考休本傳未嘗至禾中至元志作陸宣公為確今從之鳯凰洲檇李詩繫在郡東七里宋隆興元年有五色鳥飲啄其上故名秀水縣城外山川天星湖吳地記嘉興縣東五里有天心池𢎞治嘉興府志天星湖縣東北二里一名天心湖中水草不生大旱不竭舊傳秦始皇發囚所掘張堯同天心湖詩拍岸浮春淥菰蒲四逺生網羅人不見魚鳥亦忘情鴛鴦湖名勝志在治南三里一名南湖其禽多鴛鴦故名或云兩湖相接如鴛鴦然聞人滋南湖草堂記南湖百有二十頃薩天錫過秀州南湖詩三山雲海幾千里十幅蒲帆掛春水吳中過客莫思家江南畵船如屋裏蘆芽短短穿碧沙船頭鯉魚吹浪花吳姬蕩槳入城去細雨小寒生緑紗我歌水調無人續江上月明吹紫竹春風一曲鷓鴣詞花落鶯啼滿城緑胡奎南湖翫月詩團圖三五月挂在鴛鴦東方舟泛平流坐我青天中低頭看月月在水倒影姮娥呼不起三更露下苧袍凉恍然濯足銀河裏城南斗酒眞珠紅與月共醉鮫人宫醒來月落不知處張帆且趁清明風高巽志鴛湖秋月詩雙湖偃長虹月出微瀾靜鼓枻獨沿洄流光蕩空影朱彛尊鴛鴦湖櫂歌二首沙頭宿鷺傍船栖柳外驚烏隔岸啼為愛秋來好明月湖東不住住湖西宣公橋南畵鼔撾酒船風幔玉鴉又碧山銀椀勸郎醉櫂入南湖秋月斜東郭湖𢎞治嘉興府志一名冬瓜湖一名宋郭湖以其在郡城東北故名東郭冬瓜者音之訛宋郭者字之訛也春渚紀聞張祜子䖍望有詩名求濟於嘉興裴𢎞慶署冬瓜堰官䖍望不服曰祜子守冬瓜已過分矣秀水縣志舊置堰其上以蓄西湖之水今開堰置橋幽湖𢎞治嘉興府志在治西四十里支流環錯滙為深源因以為名秀水檇李詩繫在郡城北麗橋東相傳水浮五色見者獲慶亦稱繡水明析邑名因此張堯同秀水詩好景明於畵長浮五色螺一竿吾欲釣來此聽漁歌西溪嘉興府圖記在郡西三里徐一䕫西溪隱居記西溪在嘉禾郡城之西溪流迴合滙而為涇貫而為港微波細漪皆潔妍可愛初郡之置以秀水名志稱秀水在北門外西溪其支流也爽溪萬厯秀水縣志在縣西北闊可二丈其長縈紆半里東通韭溪穆溪名勝志在城東北四里水接上谷湖入太湖中多龍骨俗呼北運河運河秀水縣志在治西北四里舊志隋大業中開江南河自京口至餘杭八百里以通龍舟月河嘉興府圖記在治北一里抱城灣曲如月亦名月壕張堯同月壕詩入徑深於塢滄波近馬蹄每尋蓮社友咫尺走東西青龍港舊浙江通志在治南三里通海鹽塘白龍潭至元嘉禾志在治西南五里景徳禪院前白龍穴於此故行舟飄溺居人作三塔埋舍利以鎭之宋淳熈初歲大旱知縣李時習用南中攬龍法隨車霑霈歲果豐稔螺潭萬厯秀水縣志在縣南五里相傳有白色螺生其中六百畝蕩𢎞治嘉興府志在治東北二十九里廣袤約計六百畝天荒蕩𢎞治嘉興府志在縣東北思賢鄉南接許蕩西接毛頭菜花等蕩皆有菱芡之利王江涇名勝志在漕渠東相傳王氏江氏家於此亦名聞川宋聞人氏家焉檇李詩繋宋武節將軍聞人宣扈蹕南遷定家於此元孫恂為進義校尉死崖山之難嘉善縣胥山正徳嘉善縣志在治西南十三里半屬嘉興縣詳見嘉興縣缾山𢎞治嘉興府志在縣治南高七丈周二百餘歩草木隂翳宋置酒務於此陳鶴缾山詩缾山高閣帶疎星醉倚琵琶倒玉缾落日未迴青雀舫行雲先度白牛涇鶴湖名勝志在縣西北三十里中多蓴菜蘆葦舊常産鶴故名麟湖檇李詩繫在嘉善縣西十三里有東西兩湖界接秀水汾湖𢎞治嘉興府志在縣西北三十六里又名分湖以其半為吳江縣界故名張堯同汾湖詩我是滄浪叟閒來繫釣艭如何一湖水半秀半吳江夏湖檇李詩繫在嘉善治北三十里又曰夏墓蕩魏塘河嘉興府圖記在縣東十二里亦名武塘相傳魏武帝常經此故名文水𢎞治嘉興府志在文廟後環繞黌宮茜溪名勝志在縣北一十二里其地常出茜草故名松溪正徳嘉善縣志在思四都張練塘𢎞治嘉興府志在治北三十里按宋志云吳王權造戰艦於青龍鎮遂張帆練兵於此夏元吉過張練塘詩塘名張練起何時試問村翁盡不知畵舫乗風撾鼔過落花飛絮漫相隨平川舊浙江通志在治北二十四里一名西塘又名斜塘蓮花涇嘉善縣志在奉九北區清風涇嘉興府圖記在治東二十四里舊名白牛塘相傳宋陳舜俞跨白犢往來處王秀涇𢎞治嘉興府志在治西北二十四里東有甎塔祥符蕩檇李詩繫在嘉善北二十里受雙葑南尤北尤并甓溪諸水達青浦界查家蕩檇李詩繫在嘉善縣北多荷花高啟查家蕩詩秋老共溪長游人笑語涼萍開天倒影蓮墜水浮香魚罶和星漉禽罝帶雨張從今搖桂棹不必問瀟湘許巷蕩嘉靖浙江通志在縣西北三十六里詳見水利淨池檇李詩繫在嘉善汾湖之南有淨池蘆墟柳溪諸水楊維楨游淨池詩汾水南頭第幾灣淨池初曉鏡光寒漁舟晒網日將出酒肆招帘露未乾楊柳淡烟迷隔浦桃花新水漫前灘習家回首今何在風物爭如此地看幽瀾泉六硯齋筆記在縣東武水北景徳寺幽瀾井顧孟時幽瀾泉井詩秀水東流入魏塘一泓誰鑿近禪房煮來茗椀清無滓分出花渠細有香海鹽縣秦駐山至元嘉禾志在縣南一十八里樂資九州志云縣有秦逕山秦始皇經此美人𦵏於此山下有美人廟故名水經注云海鹽縣南有秦望山秦始皇登以望海彭紹賢秦駐山詩二首水淺蓬萊歲幾更凡夫那解馭風行空教海外畱徐福一片荒山浪得名翠蓋金支想像間昔時流水尚潺湲美人似念今祠廟死作山花不肯還巫子山朱彛尊鴛鴦湖櫂歌注秦駐山東海口有巫子山白塔山至元嘉禾志在縣東南二十里山上有白塔因名舊有港通魯浦名曰白塔潭海舟多泊焉北户録唐至徳初徐正字薿於海鹽白塔山沙渚之上得一桃核片可貯米一升望虞山至元嘉禾志在縣東南二十二里舊經云隔海可望㑹稽上虞縣因名大歩山小歩山𢎞治嘉興府志俱在縣南二十里陸墓山澉水志在鎭西北五里因姓得名石屋山澉水志在鎭西北五里上有石壘成屋舊傳黄巢時民避兵處青山𢎞治嘉興府志在縣西南三十五里宋志澉浦鎭之主山也山上置烽堠長牆山海鹽縣圖經在縣南三十五里澉水志秦始皇東遊登以望海以其孤聳望如堵牆故名石帆山𢎞治海鹽縣志在縣西南三十餘里海中澉水志在靈潭右聳若帆挂葫蘆山名勝志其山浸在海中潮汐消長如葫蘆出没故名語云潮生潮退葫蘆自若其下有葫蘆寨荆山海鹽縣圖經在治西南四十五里澉水志荆山占永安湖之勝下有悟空寺雞籠山海鹽縣圖經在縣西南六十里澉水續志地名徐灣俗傳有金雞見故名麂山海鹽縣圖經在治西南四十五里澉水續志山在中湖塘西與譚山相連鷹窠頂山海鹽縣圖經在治南三十里明一統志石帆之東有鷹窠頂山一名南陽山貝瓊游鷹窠山記距黄灣二十里大山嶄然中高旁殺巨海滙其陽秦駐亘其隂雲岫菴志山有九曲逕獅頭巖絶頂可望日出朱彛尊鴛鴦湖櫂歌注鷹窠頂在澉浦山椒每十月朔見日月並出海中貝瓊九日遊鷹窠山詩忽忽已九日出門淨無泥地偏實斗絶有山如㑹稽賓客後雜遝僕夫各有擕天風海上來我馬驕且嘶陂陀出險徑窈窕遵迴溪前登郯家嶺始覺翠蓋低作者四五人更托千層栖日午叩其户不愁蒼耳迷欲俯栖鶻巢上凌萬丈梯豈但畏猛虎仿彿聞天雞共燕修竹林落日猶在西相看且一笑四郊多鼔鼙錢籥游鷹窠頂山詩孤峯倚天碧側徑入蒼烟蠟屐還今日題詩自昔年磴雲生古木溜響落寒泉極目滄溟外蓬瀛一㸃烟金牛山至元嘉禾志在縣西南五十里按九州要記古