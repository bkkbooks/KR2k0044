body:
  text: 欽定四庫全書浙江通志卷一圖說易曰在天成象在地成形形象既立而圖史作焉禹得括地象圖以平水土此輿圖所自昉也㑹稽實禹㑹之邦固括地所必先者欽遵聖祖仁皇帝御定皇輿全覽圖首摹兩浙形勢而十一屬以次分列井所屬險要之處名勝之區仿土訓道地圖之義說其梗概冠以星紀所繫仰觀俯察一披卷而盡得之繪圖如左星野圖浙江全省圖㑹城圖杭州府圖嘉興府圖湖州府圖寜波府圖紹興府圖台州府圖金華府圖衢州府圖嚴州府圖溫州府圖處州府圖玉環山圖天目山圖武林山圖四明山圖普陀山圖天台山圖鴈蕩山圖仙霞闗圖錢塘江圖西湖圖南湖圖太湖圖海塘圖上海塘圖下杭州府海防圖嘉興府海防圖寜波府海防圖紹興府海防圖台州府海防圖溫州府海防圖南鎮圖禹陵圖聖因寺圖海神廟圖闗帝廟圖敷文書院圖攷帝王世紀云黄帝受命推分星次以定律度自斗十度至女七度為星紀之次於辰在丑周禮保章氏以分星十二次辨九州封域鄭元注首舉星紀為呉越而星野之論定矣歴代天官家遞相推測顧其言互有異同或以呉越為牛女分屬或以呉越均屬斗分古測今測遂判若河漢要之呉越為星紀之次分野屬丑古今不易也苐星紀在北而呉越在南者孔疏以為受封之日歲星所在之辰為國屬或曰以仰儀之理推之取光之所燭為驗耳按步天歌云斗六星狀似北斗牛六星頭上有兩角女四星如箕三宿俱屬星紀之次故合為一圗依舊志分列古測今測並十一屬分度於其上以俟精甘石之學者折衷而論定焉元至正二十六年置浙江等處行中書省而兩浙始以省稱領府九明洪武九年改浙江承宣布政使司十五年割嘉興湖州二府屬焉領府十一國朝因之省㑹曰杭州次嘉興次湖州凡三府在大江之右是為浙西次寜波次紹興台州金華衢州嚴州溫州處州凡八府皆在大江之左是為浙東十一府所屬為州一為縣七十有六幅員之廣東至於海西至江西南至福建北至江南其形勝阨塞山川雄秀井邑繁庶昔人擬之闗中非虚語也說者謂當秦漢時呉越猶在荒服聲教之開當自魏晉以後是殆不然考禹㑹諸侯於㑹稽執玉帛者萬國聖化廣被葢自三代之初以迄於今何其逺也皇朝聖聖相承徳教洋溢湛恩汪濊漸被於呉山越水之間者百年於兹矣恭逢聖祖仁皇帝省方南巡五次幸浙誠千古未有之隆遇存神過化直邁夏王之軌轍東南兆庶何幸而常被聖人之明徳也猗歟盛哉㑹城左江右湖廣袤四十里贏於南北而縮於東西為門十在東城者四曰候潮曰望江曰清泰曰慶春西城者三曰清波曰湧金曰錢塘正南之門一曰鳯山北門二曰武林曰艮山西南依山為城山曰金地曰寳月曰紫陽曰清平曰雲居而總名曰呉山凡祠廟之有合於祀典者皆在其巔城北有小山曰武林髙不數尋廣不百武説者謂一城之主山而實非也以在武林門之内而近故見稱耳城内之水道凡五曰中河曰東運河曰小河曰清湖河曰運司河皆引西湖之水而達於上塘河以通商賈漕運當呉山之陽面鳯凰山南向為祝釐之所曰萬夀宫文武大小官署以次環列壘甓於城之西北隅為駐防營以屯滿漢官軍其他居民之廬井衢陌坊表㕓市鱗次櫛比登呉山而望西則湖波澄泓金碧輝映東則江濤浩淼萬頃安瀾而闉闍之内肩摩轂擊烟火萬家盛世太平之象畢收於襟帶間矣兩浙為東南奥區領郡十一而杭為首郡九縣屬焉錢塘仁和並附於郭海寜在其東餘杭臨安在其西富陽新城郡西南也於潛昌化郡西北也郡之得名以武林山而山脈發源於天目故以天目為主山跨臨安越於潛而横亘於昌化之北境毘連江省有五闗之險獨松黄花實一郡之門户也縣之得名以錢塘江而江流委注於海故以海為水口潮水逆流而上直趨西陵達漁浦抵富春雷擊霆砰震天沃日龕赭二山實一郡之鎖鑰也形勢阻要風氣完固控扼全浙若裘之有領焉自武肅開鎮建炎定都以來人民之衆財賦之殷盛於他州古稱都督大府為天下甲不信然歟然而習俗工巧民志安逸昔人猶不無土物心臧之慮洪惟聖朝綱紀化導仁漸義摩凡所以厚生正徳者至詳且悉由是省㑹之區蒸蒸向化為十一郡先漢志載用物當足之言隋史有尚禮惇龎之論起視今日之杭殆庶幾焉浙江列郡多倚山負壑獨嘉興四境之内彌望平衍無培塿之觀而南控大海北枕震澤東接淞泖西連苕霅葢古所稱澤國也附郭之縣二嘉興秀水皆與江南蘇州之呉江震澤壤接而桐鄉石門二邑之水亦北流而委輸於具區石門之西曰語溪舊為呉越分疆之地語溪之西則與湖之清溪合流而入於太湖者也府東為嘉善界於朱涇北滙汾湖與江南松江之三泖合直走呉淞濱大海者為海鹽為平湖澉乍二浦均為入海門户而重湖疊漵又與黄浦泖澱瀰漫相接陸游入蜀記云幾日夜行大澤中葢謂是也地既卑濕厥土塗泥介在蘇杭賦役繁重世宗憲皇帝御極之六年俯念浙江浮糧惟嘉興湖州為最重特賜蠲除萬姓䝉恩歡聲雷動自是沮洳之鄉皆成樂土桑麻雞犬無日不在春風化雨中矣而又以乍浦一所為瀕海要地移駐防重兵以鎮之内有葢藏外固封守兵食足而民信孚洵久安長治之道也五湖之表曰湖州山發源於天目澤滙流於具區逶迤盤礴渫泄演漾蘇軾所稱山水清逺地也屬縣六州一附郭者為烏程為歸安郭南有水曰苕出天目之隂入清源門其流濁西南有水曰霅合四水為一入安定門其流清出天目之陽者為餘不溪徳清縣在其南出銅峴山東流四十里為前溪武康縣在其北苕溪之西南為孝豐縣寰宇記所稱横溪是也若夫上若下若源出合溪其西北則為長興故鄣舊縣在焉天目之東北銅峴之西南為苕源所從出者曰安吉明正徳間改縣為州而仍隸於府府瀕太湖地足稻蟹茭菱菰蒲之屬而蠶桑之利嵗入尤多為他郡所莫及國富則示之以禮自安定胡瑗教授湖學以來流風餘韻猶有存者非獨山川清淑之氣有以鍾洩於此也惟是太湖汪洋浩瀚支港繁多萑苻易於叢集而大錢湖小梅港諸口尤為浙西襟喉要地國朝增設汛防以時巡禦有備無患而呉興舊稱釡底者今則如在袵席之上矣句章在越為甬東地海道輻輳之所陸雲謂北接青徐東洞交廣放船長驅一舉而千里者也唐置明州宋為慶元路明改寜波府縁海為郡南界台州西界紹興而東北直與大海為際舊領縣五附郭者曰鄞府西北曰慈谿西南曰奉化東北切於海岸者曰定海東南曰象山國朝康熈二十六年以舊昌國衛經明季遷遣以來地名舟山孤懸海中為海疆門戸展復招徠特命建立縣治增置重兵鎮守彈壓更名定海而以舊定海縣為鎮海並隸於府生聚日久既富且教遂成壯縣而招寳山之外蛟門虎蹲重闗疊戍皆天設之險控制得宜考明洪武時遣信國公湯和經畧邊海於寜郡海濱諸處添設衛所較他郡獨多而扞禦稍弛驛騷滋起今則威以服之恩以懐之鯨氛永息海波不揚鎮定之民與鄞奉諸邑同享魚鹽之利優游化日之舒斥鹵奥區鞏若磐石焉葢聖世之規模宏逺逈越千古云紹興古㑹稽郡舊稱東南大府天下無厹者也宋地理志云帶山傍海膏腴重地以山水為郡有層岡疊巘而無梯磴攀陟之勞有大湖長溪而無衝激漂溺之患領縣八首山隂次㑹稽並附於郭千巖萬壑環列於鑑湖之上次蕭山瀕江負固曰固陵次諸暨處萬山之㑹長江滙之次餘姚壤接四明與上虞皆在曹娥江之左江發源浦陽水經注所謂浦陽江是也次嵊次新昌俱負㑹稽山之陽並帶剡溪擅沃洲天姥之勝與天台争竒競秀於浙東者也郡之北境五縣際海洪濤奔激所恃為内外障䕶者惟沿海一帶石堤百川㑹流所藉為旱澇蓄洩者惟三江應宿一閘他如建麻溪之壩築西江之塘以遏外水之入成茅山之隄置玊山之堰以防内水之出雖昔人著有成迹而興復修舉莫備於國朝水土平成之績神禹而後於今復覩其盛矣台州環山距海環山之縣三曰臨海附於郡治其西南曰仙居西北曰天台距海之縣三曰黄巖曰太平郡治東南曰寜海郡治東北其山皆聳秀插天而天台山為之冠當牛女之分上應台宿故以名州漢為東甌地元封初徙其國於江淮而以地屬㑹稽郡晉地理志止稱其民水耕火耨漁獵山樵飲食麤足自給而他無聞焉魏晉以還人民保聚風氣漸開然必在上者有教化而後在下者多秀民非一朝一夕之故也宋崇寜間朱子以常平使者行部至台闡明性理之學紹濓洛之薪傳一時從游之士如潘時舉趙師䢼杜知仁林恪輩轉相授受師友淵源比於鄒魯迄於今家弦誦而戸詩書彬彬如也則台之異於他郡匪獨如孫綽所云窮山海之環富盡天人之壯麗者矣而探竒選勝者每盛述山川之美謂赤城華頂瓊臺雙闕之間多金庭玉堂仙芝瑤草故髙真羽人徃往而有指為仙佛之國則是邦之擅名區宇者又昔人所稱今古福庭東南佳郡也夫郡名金華肇於陳代其在秦漢時則㑹稽郡之一縣也呉分㑹稽東部立東陽郡梁置婺州以上應婺女星故名唐隸江南東道晉武勝軍宋保寜軍明為寜越府尋改今名領縣八附郭曰金華金華之西曰蘭溪其東曰東陽南曰武義北曰浦江浦江之東曰義烏東陽之南曰永康武義之西蘭溪之南介於金衢處三府之間者曰湯溪明成化間置羣山包絡雙溪夾流凡江湘閩廣車徒之輻輳食貨之轉輸胥由郡以達省㑹而蘭溪其要衝也然郡之擅名於浙東者不以山川不以財賦而以人文顔氏子孝感羣烏古郡所由以烏傷名也龍邱萇抱道自處有伯夷原憲之行自吕成公倡明正學而後何王金許並以道傳晉卿潛溪並以文著道為出治之本文為載道之器也至宋忠簡之力扶宋室王忠文之守節不屈浦江鄭氏之一門義行非皆所以激忠藎而植彞紀者乎他如孝標授詩山留講堂隱侯嘯歌樓名元暢則又風雅之緒餘而為一郡之標表也按圗而求之其人斯在提饒信之肘腋扼甌閩之襟喉控黟歙之項背者厥惟衢州葢巖為浙之上游而衢又居嚴之上游畫山為屛依巖作障稱要地焉領縣五府治為西安東去府治七十里為龍游西去府治八十里為常山西南去府治七十五里為江山西北去府治一百六十里為開化境内之山皆巉削厜㕒而險要最著者在西安則曰峥嶸山曰烏巨山曰巖山在龍游則曰梅嶺曰龍邱山曰紫㣲山常山則曰彤弓山曰木綿嶺開化則曰芹嶺曰遯嶺曰蟠桃山江山則曰江郎山曰星覷山而仙霞一嶺雄踞衆山之上髙峰插天旁臨絶壑昔人所謂一夫當闗萬夫莫開者也惟是衢州一府界連三省實為浙東門戸向設重鎮以資守禦任道員以職分巡自閩寇蕩平之後海宇清寜奉裁既久而戸牖綢繆不忘未雨雍正十三年特允酌復舊制增置官弁誠安益求安之至計也易曰王公設險以守其國得人以守之據有形之險布有孚之徳故往而有功聖人所重固在地利而又在人和洵可見矣嚴州以嚴陵得名始為新都郡隋唐時為睦州宋曰建安曰建徳而或軍或府或路制置不常要為衢婺之襟肘黟歙之吭也領縣六附郡郭者曰建徳面受重江背倚龍山為一郡冠冕東曰桐廬桐君山為之主揖翠㸃蒼浮青潑黛陸龜䝉謂為清凉國西曰淳安青溪環其前蛟峰鎮其後受歙流之水而東注錢塘西北曰遂安有婺峰義山之竒考水經注縣為絶溪之水所從出溪有七十二瀨奔波激湍經縣為長溪西南曰夀昌屛風千仞屼峍天半東北曰分水烏龍馬目錯峙於郡城卯巽之間徽婺二水至縣分流故曰分水六邑俱在萬山之中盤幽宅阻蔡天啟牋云溪壑瀠洄二江合而成字圖經則云錦峰繡嶺峻削囘互杜牧則云呉根越角巖倚溪斜山川清麗如在圗畫中而溯桐江過嚴灘登釣臺緬子陵之髙風則又動人以山髙水長之慕焉溫州古永嘉郡去省㑹千有餘里界於閩括之間依山阻海土宜秔稻有魚鹽之饒商賈交㑹浙東推沃壤焉領縣五永嘉附府山曰華葢水曰甌江有鴈蕩白巖仙溪諸勝聳翠澄瀾實稱佳麗府北為樂清前臨大海九斗蟠其左蕭臺踞其右而後所盤石蒲岐皆海堧要害之處列障戌兵以資控禦府西南為瑞安山有大羅雲峰之竒東涵巨浸北繞雲江甌越之門戸也府西南為平陽九鳯特起障於嶺門而江貫横陽象灣雙鳯蛾眉諸峰並分鴈蕩之秀西北曰泰順飛龍舞鳯兩山為之先後飛龍之右一山特起為閩栝交壌厥名天闗形勝天設晉謝靈運典郡徧歴永嘉諸山賦詩見志迄今讀江中孤嶼登緑嶂山及石門絶頂諸什猶想見當年􅂿屐尋幽之槩惟海中玉環一山為謝公屐齒所未到遷棄已久國朝雍正五年展復招徠設官增戍創建城郭廨宇墾闢土田人民萃居士卒屯聚屹然為海疆屛障云處州古括蒼地南與閩壤相接北界台婺東引甌越西連三衢浙之南鄙也初領縣七一麗水一青田一縉雲一松陽一遂昌一龍泉一慶元後增置雲和宣平景寜為縣十宋楊億守州嘗曰引領西目羣峰倚天清溪南奔深淺見底葢東南名勝之區云明季礦税繁興胥徒雲集往往多不逞之輩嘯聚山谷雖駐道員彈壓而驛騷時聞國朝特嚴開採之禁先事預防改平陽總兵官節鎮於此實久安長治之宏規也自唐刺史李繁建學昌黎韓愈為之記而是邦始尊聖人之教由是兩宋以來以理學名者則有王光祖龔原葉味道尹起華諸人以功業著者則有管師仁鄧熹閭丘觀劉基諸人以忠節顯者則為姜綬朱光梅寛夫劉璟諸人豈非山川光氣有以鍾其靈而洩其竒耶而或者以州因處士星得名舉左慈王方平帛道猷輩以實之然三人皆非州産也姑存其説玉環山舊名木嶼亦名木榴亦名地肺南宋以後改今名山界溫台之間分屬樂清太平二縣延袤七百餘里四面距海外際大洋實溫台之門户全浙之藩維也明洪武時徙其民實内地而是山孤懸海外䝉茸蟠結歴有年所矣雍正五年總督臣李衛題請展復奉命經營相度因山築城因城濬池招徠農氓迺疆迺理曰壇曰廟軍營官廨室廬倉禀悉置如制田從墾藝賦則三壤設官以撫之駐兵以衛之都鄙有章封洫有度魚鹽有定則斥鹵有賸利與夫墩臺烽堠遊巡哨探之方具有成憲由是雞犬桑麻熈熈攘攘而玉環遂為島嶴間沃壤云夫猶是山也置之荒穢則潛匪伏莽隸諸疆索則作鎮為藩幸際盛明之世山效其靈水呈其瑞向等於珠厓之棄者今則為聲明文物之區且四山環拱若白龍湫珠簾島翠雲窩諸勝儼如踴躍奮迅以争竒競秀於天台雁蕩之間世有孫興公謝康樂其人尚當操筆而賦之天目東西兩山太平寰宇記云山髙三千九百丈廣五百五十里水因山曲折東西巨源若兩目然故曰天目咸淳臨安志云一名浮玉山聨亘杭湖宣歙四州周八百里東目之脈萃於餘杭結穴於徑山西目之脈直走錢塘包絡於武林山是天目者杭之主山而形家所謂龍飛鳯舞到錢塘者也山多險潭分上中下三級最上一潭水腥不可觸有犯之者風雨雷電交作葢龍之靈氣也山下有洗眼池相傳梁昭明分經洗眼於此山半有瀋王巖傳是髙麗瀋王參禮中峰處有昇仙峰傳是徐仙鍊形羽化處仙鋸石二十餘扇剖削如鋸或尺許或六七寸一二寸許有未剖者亦繩墨縷縷痕跡宛然神人變化乃爾道藏列之太㣲元葢洞天洵不虛云山愈髙愈寒登蓮花峰者必繩引而上十月後天欲雪羣猿繞屋而啼依人不去蘇軾有云自天目山俯視雷雨但聞嬰兒聲不聞雷震宜寰中裹糧者少也其間仙佛之廬不可勝紀而在西目者莫崇於獅子正宗自佛日開山以來國初大覺能仁國師繼領法度丕揚宗乗雍正十一年奉勅鼎建賜名禪源而福地名藍遂冠於五山十刹之首云杭州舊稱武林以山得名漢地理志云武林山武林水所出舊志以為即靈隱山引宋人樓鑰詩為據明一統志又合靈隱飛來峰為武林山邵穆生辨之詳矣葢武林山者靈隱天竺諸山之總名也自晉僧慧理有天竺國靈鷲山飛來之語而後有靈鷲之名有靈隱之名有天竺之名有飛來之名至蓮花佛國白雲白猿獅子香爐之名皆繼慧理而發者而南髙北髙五雲雙桂乳竇月桂諸名則又衆山之别稱要皆武林之支山也靈隱天竺兩山由一山門入有南北二澗循澗而北經迴龍橋度飛來峰對冷泉亭舊有絶勝覺塲是為靈隱寺國朝康熙二十八年聖祖仁皇帝南巡幸寺御書雲林額遂名雲林循澗而南由下竺達中竺至白雲峯下是為上天竺寺康熙三十八年賜帑金重修雍正十一年奉勅鼎建崇閎瑰麗甲於兩山南澗之水發源於白雲峯北澗之水發源於石人嶺㑹流於合澗橋東注二里許經行春橋而入於西湖是為錢源晏殊類要云錢塘武林山錢源出焉即漢志所謂武林水出武林山是也四明山在鄞縣西南百五十里由天台山發脈東北湧為二百八十峰中三十六峰周囘八百餘里綿亘鄞奉慈三邑及紹興之餘姚上虞􅌘台之寜海諸境上有石窗四面玲瓏望之如牖中通日月星宿之光故曰四明木𤣥虛云天下第九洞天號曰丹山赤水是也山西連脊起狀如奔牛曰奔牛山中有三朶峰宋張平子居焉其支山為杖錫峰為石樓為松巖為大小雷為雞籠為烽火樓為峒山鱉山西山山中常有雲氣覆冒二十里不絶名曰過雲其南曰雲南北曰雲北山隴行三十里有峰曰雲根石屋瀑布如懸河旁曰潺湲洞後漢劉綱為上虞令與妻樊雲翹隱居洞側後人立祠有榭曰樊榭梁孔祐居山中一鹿中箭來投祐為牧豢而愈遂建鹿亭三朶峰少南則芙蓉五峰相望其中峰有漢隸大書深刻曰四明山心其上為騫風巖晉孫綽賦云渉海則有方丈蓬萊登陸則有四明天台葢靈仙之所窟宅也普陀山亦名補陀洛伽山華言小白華山去定海縣約二百里山周圍百里孤懸海中相傳普門大士示現於此善財南詢處也寺舊名寳陀聖祖仁皇帝賜名普濟康熈二十八年勅發帑金重建三十八年聖駕南巡復賜金重修御書普濟羣靈四字額四十三年御製碑文勒石寺中寺東五里光熈峰下舊有海潮寺後名鎮海普陀别院也二十八年與普濟寺同修御題天花法雨額改名法雨禪寺俗稱後寺去普濟東三里為潮音洞又法雨東一里為梵音洞洞顛通穴洪濤衝激噌吰鏜鞳如天樂梵音交作日光穿漏遥望石罅中有白衣化身時隱時現自開山以來無不瞻禮大士然大士無形誠動輒應佑國庇民實相感通雍正八年世宗憲皇帝勅發内帑大新殿宇御製碑記勅諸貞珉昭垂千古凡以為斯民祈福祐而天下之梯山航海奔走祝釐者雲集響應益以信寳祚萬年與佛日永永無量也外更有小洛伽山相望海中亦大士示現地天台山髙一萬八千丈周圍八百里四面如一山不下數十重總以天台名之山巔一峰中有户闥名曰赤城石皆赭色形如雉堞右為玉京洞道書所云第六洞天東為國清寺隋智顗師道塲山多精廬此其絶勝雍正十一年勅賜鼎建北為清溪西有桃源繡壁夾澗十里三折仙踪惝恍難窮其奥西南最髙峰曰華頂自山麓至峰頂凡八重登其巔大海錢江栝蒼鴈蕩俱在目睫俯瞰羣峰或如蓮葉或如花鬚髣髴芙蓉一朶浮動海上真異境也西行為瓊臺有雙闕對峙臺當大壑之心空際石起浮嵐插天狀如削𤓰萬仞卓立森倚相向孫綽所謂雙闕雲竦以界道瓊臺中天而垂居是也中為桐柏山上有崇道觀昔王子晉所治金庭洞天仙人葛翁居之代有興建雍正十一年特命動帑鼎新遣官董視工成鉅麗輪奐逈越前古其北為寒巖上有鵲橋厓石欲接一罅中斷飛泉噴薄猿烏囘蹤循鳥道東折逈絶處為石梁峭壁如劍削雙澗懸流兩厓支石滑不受趾又綽所謂跨穹窿之懸磴臨萬丈之絶溟是也過此則應真五百所棲兜羅示現宫闕縹緲津逮者葢自厓而返矣雁蕩一名鴈湖髙四十里頂上有湖方十里候雁來賓每宿於此故名山之界東至溫嶺西至白巖南至玉環山北至蒼坡山唐一行畫天下山河為南北兩戒以南戒盡於雁蕩葢謂巴蜀湖南之山趨金陵渡錢塘而結束於此也東西内外谷包藏一百一峰而剪刀天柱最勝剪刀峰髙數百丈屹立澗水中神斤劖削兩股呀然而開天柱峰千仞壁立儼如端人正士執笏殿廷令人肅然起敬餘則隨步換形莫可名狀瀑布凡三處而大龍湫自鴈湖合諸溪澗水從㘭中直下疑天上銀潢望空傾瀉砰雷翻轂隨風飛颺沾灑數里外髙約五千餘尺小龍湫上龍湫俱遜之他如石梁之拔地梯天常雲之晴空不散梅雨泉之一絲搖漾人喧則止人寂則飛皆竒幻之尤著者開山為諾詎羅尊者賦斤竹磵石門詩者為謝康樂以遊踪聞者為焦伯强沈存中王龜齡諸人後之遊東甌者可考焉浙為東南屛蔽衢又為浙之重鎮而仙霞嶺又衢州一府之要隘也嶺在江山縣南百里為級三百六十為曲二十有六長亘二十里重厓峭壁因山成塹因勢設闗實稱南服之險云連仙霞之嶺者六曰窰曰茶曰大竿曰小竿曰梨曰楓過楓嶺分浙閩兩省界連仙霞之闗者五曰安民曰六石曰青隖曰木城曰二渡過二渡闗為江西永豐縣界六嶺五闗並在百里内而語絶險者必以仙霞為冠葢浙之有仙霞猶蜀之有劍閣也宋建炎紹興間諸將多轉戰於闗之南北史浩帥閩甃以石路國朝康熈十三年閩逆梗化豕突鴟張謀出仙霞伏遇王師南下重臣秉受廟算提兵鎮守設伏搗虚殱渠剪醜奏凱蕩平由據我之險遏彼之衝乗其勢而直搗之也覽其山川可愾然而賦常武矣兹值太平全盛之期聖化翔洽休養安全商旅不閉闗士卒無烽徼億萬斯年享宇宙清寜之福在徳不在險詎不信夫錢塘江曰浙江一稱浙河山海經云禹治水至於浙河亦名曲江枚乗七發云觀濤於廣陵之曲江以江勢三折故得曲名又桑欽水經作漸江漸字近浙而稍變如邾與鄒之類是也又險不可犯名羅刹江江源發於丹陽歙縣出新安江入嚴州桐江而衢州之水自玉山來與金華之水滙流至蘭溪俱㑹於桐江入杭之富陽曰富春江至錢塘曰錢塘江曲折而東歸於海此由江達海之次第也海潮由鱉子門入受龕赭諸山所廹束蹙不得騁與山争勢抝怒不洩下有沙潬隔礙洪波起而為濤奔騰衝擊逆流數百里越定山經漁浦至富春江始平此由海入江之次第也潮一晝夜再至隨月消長而秋八月更大江岸受囓易致沖潰築隄捍江著於呉越錢氏而强弩之射潮亦為之却避謂非精誠之感歟聖朝至徳懐柔百靈效順既建沿江石隄定為歲修復褒封伍相之神俾素車白馬揚庥於銀濤雪浪之間安瀾胥慶民奠厥居聖澤之長與江流俱永云西湖舊稱明聖湖方廣三十里南西北三面環山而㑹城適障東面之缺水自武林山谿澗縷注下有淵泉百道滙而成湖引水入城分流上下兩塘之河仁錢海寜三縣之民仰溉田畆鹽漕商賈諸艘賴以轉運經國者興水利焉中亘舊堤四曰白沙蘇公趙公楊公新堤一曰金沙跨蘇公堤為外六橋跨楊公堤為裏六橋跨金沙堤為玉帶橋跨白沙堤為斷橋為錦帶橋孤山以東為外湖蘇堤以内為裏湖孤山以北為後湖其間名人之廬仙梵之宫與夫忠臣義士及功徳之在民者祠宇相望他如亭臺錯峙樓館銜接金碧璀燦倒影如畫蓬萊瀛洲近在人世也恭逢聖祖仁皇帝省方南巡駐蹕湖上御題十景曰蘇隄春曉曰雙峯插雲曰柳浪聞鶯曰花港觀魚曰曲院風荷曰平湖秋月曰南屛曉鐘曰三潭印月曰雷峯西照曰斷橋殘雪睿藻奎光照曜萬古而西湖名勝爰甲天下雍正二年世宗憲皇帝軫念西湖重闗東南水利特命督撫㑹勘動帑開濬湖流暢而益深湖堤培而益廣人民嬉遊魚鳥翔泳覽明聖之湖益思仰答聖明之世忠愛之心當油然而興矣南湖一名鴛鴦湖以湖多鴛鴦稱或曰兩湖相並若鴛鴦然稍東為滮湖宋志云廣五百丈深三丈記稱周圍一百二十頃烟瀾渺瀰水天相接為嘉郡城南之勝故曰南湖湖中有洲曰烟雨樓五代時錢元璙建因舊基興復者宋尚書王希吕也前明時知府趙瀛修之兵備沈奎知府龔勉劉應珂相繼修之迨本朝知府許煥重修攷宇内烟雨樓凡四一在竟陵一在桂陽一在栝蒼而在嘉禾者為最著以形勝而言樓固一郡之雄鎮也位當巽離之交得文明之象焉歲久傾廢總督臣李衛撤而新之中為岑樓髙倚天半樓前為臺曰釣鰲磯明守龔勉所作後為放生池明華亭董其昌題曰魚樂國左有亭曰清暉右有亭曰來鳯亭後為凝碧閣悉仍舊名而創建者樓之外澄湖鏡如浮青漾碧萬瓦鱗次雉堞周遭一望繡川如在錦繡若夫晨烟暮雨杳靄空濛漁唱菱歌與欵乃間發萬物滋潤盎然春榮洵晴雨皆宜之境宇宙太和之象於斯可見矣太湖一名震澤一名具區一名笠澤一名五湖古揚州巨浸也跨江南浙江二省於蘇州屬呉縣呉江震澤於常州屬宜興於湖州屬烏程長興湖長五百里周三萬六千頃而烏程長興獨有二萬頃則屬湖州者為尤多云葢州有四水自廣苕山曰苕溪自銅峴山曰前溪自天目山曰餘不溪自徳清縣北流至州南興國寺前曰霅溪霅合四水東北流入太湖復合三州之水由蘇松分流以入於海經所謂三江既入震澤底定是也烏程沿湖水口共三十有九長興沿湖水口共三十有四沿湖堤為漊漊有斗門門置版閘旱則閉之以防溪水之洩瀉澇則封之以禦湖水之漲溢康熈四十六年奉㫖修建閘座以固隄防雍正五年特命増築復添設同知一員專理湖務既以職水利亦以察匪人誠以太湖為兩省重地經畫宜周制防宜宻也中有七十二峯其大者曰東西洞庭西洞庭金房玉柱神仙往來之所也界烏程長興者曰大雷山小雷山浙省瀕海之郡皆設海塘以為障䕶惟杭嘉紹三府之塘屢有修建葢三府適當江海交㑹之處洪濤巨浸衝激不時而杭之海寜工尤險要考鹽官塘之建唐曰捍海宋曰海晏元曰太平唐書地理志云捍海塘開元元年重築曰重築者知不始於開元間也迨宋迄明屢築屢圯揆厥所由一則江流之遷徙不常一則石隄之創建未固葢江流入海有三道在龕赭兩山之間者曰南大亹在禪機山之北河莊山之南者曰中小亹自巖風山至獨山為北大亹亹北數十里則為塘今江流不趨南而趨北海潮逆流而上晝夜汕刷直逼塘身此天時之莫測也歴代以來講求修築之法亦云備矣顧往往狃於目前絀於物力補偏救敝僅為捍禦一時之計此人事之未盡也聖朝軫念海疆勤恤民隱不惜重帑以成經久之圖特以江流未循故道既濬中小亹以分海潮之勢而復興建鉅石塘内築土塘以備冲卸外葺舊塘以固藩籬欽命閣臣綜理經畫選材集事庶民子來行見海若效靈安瀾底績數百里海隄鞏若磐石焉誠萬世無疆之利賴也兩浙瀕海者凡六府杭則錢塘仁和海寜嘉則海鹽平湖寜則奉化以外五縣皆屬海濱而定海一邑則又航海而治矣紹則蕭山山隂㑹稽上虞餘姚台則寜海黄巖太平温則永嘉樂清瑞安平陽皆是也海之有防漢以前無聞陽嘉中始議屯戍宋南渡後漸立禁防明嘉靖中倭人内訌浙東西慬焉而防海之法嚴矣國朝混一區宇鯨波不驚海外諸國皆航琛輦賮重譯而至聲教覃敷無逺弗届矣然氛祲雖息而防制宜周要在守各府之隘口以固門户扞海洋之津要以鞏籓籬置司以巡檢之設衛所以守禦之命提鎮以統領之量地分哨而復㑹哨以聨絡之修戰艦置墩臺謹斥堠而於出口商船又逐汛交替以稽察之此防海之大畧也而地勢之險要杭為鼈子門嘉為澉乍二浦寜為招寳山虎蹲蛟門紹為泗門港台為海門港溫為南麂玉環凡海舶之自浙而達遼海者必經於此均為全浙重地設兵扞衛葢控制得其宜矣㑹稽山夏后氏朝諸侯處也以作鎮揚州周禮職方氏與青之沂山幽之醫無閭冀之霍山並稱鎮山秦漢以來世修秩祀饗格明神典綦重焉隋開皇時立廟於山之隂唐開元間改封㑹稽為南鎮天寳中封南鎮神為永興公宋淳化間詔立夏日祀南鎮迄南宋暨元並加封王號明洪武時正祀典止稱㑹稽山之神每歲有司致祭後禹陵一日遇國家舉大禮則遣官告祭逮我國朝祀典加隆康熈四十二年聖祖仁皇帝御書秀帶巖壑四字懸之廟中以神為海邦重鎮而其位又獨尊於陽方猶南海神祝融在北東西三神河伯之上故昭示寵錫直與五嶽四瀆諸神比埒而四鎮之中南鎮為尤貴也至廟之規制與夫田畆所入歲供圭璧牲帛之用其載碑碣與有司冊籍中觀禮者可考而知焉大禹陵在㑹稽山西北五里山有隴隆然而起隱若劍脊其下有穴西有窆石石髙六尺許形類稱權昔傳禹葬時取此石為窆也陵之左有禹寺前為禹池西為禹廟按司馬遷作史記自敘云予年二十而南逰江淮上㑹稽探禹穴禹穴之在㑹稽信矣考歴代尊禮宋建隆二年詔令州縣視守陵墓乾徳四年詔立廟㑹稽置守陵五户明洪武九年令五百步内禁人樵采復設陵户二人國朝康熈二十八年聖祖仁皇帝南巡親詣陵廟致祭御書扁額對聨奉懸廟中正殿睿藻輝煌照耀萬古雍正元年二年世宗憲皇帝兩次遣官肅將典禮禋祀精誠七年三月復命有司察勘修葺敬謹防䕶十三年九月恭逢皇上嗣極特遣專官於是年十二月祭告葢禹之明徳若此其逺而聖朝之尊崇先聖視前代有加隆也乃明楊慎獨稱禹穴在蜀若㑹稽特神禹得黄帝所藏水經處耳此好竒喜新之論未足據云孤山傑峙湖心攬全湖之勝白居易詩所謂蓬萊宫在水中央是也康熈己巳己卯癸未乙酉丁亥之歲聖祖仁皇帝念切民依屢舉省方之典巡幸至浙駐蹕西湖兩浙臣民欣忭愛戴創建行宫於孤山之上勝地名山遂為宇内之大觀千古之盛事雍正五年世宗憲皇帝俯順浙民慕思無已之誠特允臣李衛之請即其地䖍供法王朝夕焚香祝頌御書聖因寺額於寺中建萬歲樓崇奉聖祖神御龍牌俾萬世臣民恭敬瞻仰正中為大雄寳殿御題曰澤永湖山前為天王殿後為澄觀堂東為攬勝齋稍南為西湖山房西為祖師堂為禪堂為方丈萬歲樓之前為光碧亭亭西為垂釣磯為雙桂軒上為雲岫閣拾級而登為萬竹間亭最上一亭御書曰雲峯四照寳幢金磶上切雲霄珠網綺疏光映巖壑誠天上之琳宫人寰之福地也海為四瀆之長吐納元氣含茹百川實有神以主之浙瀕海之郡六獨杭之海寜當海門之衝民田廬舍惟恃捍海石塘以為障䕶而潮汐沖激唐宋以來屢築屢圮雖由地勢使然亦惟神之黙司其柄也國朝雍正七年秋汛驟至直侵塘岸幾致泛溢吏民震恐已而波恬浪平隄防無患聖心黙契以為神之靈爽赫濯惠我烝黎功徳甚大特頒諭㫖發帑金十萬兩興建廟宇以答神庥而崇秩祀甚盛典也總督臣李衛奉命相度經理於邑治之春熈門内購民地四十畆庀材鳩工揆日集事凡規畫程度皆恭請睿裁欽遵定制中建正殿祀大海之神而以潮神龍神分享配殿左為天后宫右為風神殿為水仙閣齋宿有房牲醴有所丹甍翠桷倚天入雲規制崇閎氣象肅穆洵足以掲䖍妥靈昭示無極奏訖工御製碑文恭摹勒石建亭於廟之正中復親灑宸翰書福寧昭泰四字額懸正殿萬姓瞻仰莫不設誠致敬以迓明神之福永奠海疆於億萬年矣漢忠義侯闗公忠義彪炳默襄聖治庇佑人民雍正三年勅封闗公三代公爵建祠於西湖之金沙澗其地為靈隱天竺諸山溪流入湖之處沙有金色澗因以名數十年來沙淤澗平遂成爽塏前接丁家花家兩山後環烏石峯煙霞嶺南北諸峯横列於右如錦屏繡障東望六橋僅隔一水爰作新隄直接第五橋南與蘇隄合中構玉帶橋以通車馬舟楫循隄而入正中為祠門南向面對層臺臨半月池東西建石坊進祠門為饗堂三楹更進為正殿五楹奉公神牌又進為寢殿上構岑樓後為水軒臨水為廊周以繚垣祠西闢園外為重門中建㕔事三楹後有傑閣髙出雲表前為月臺為露橋凌虚架空不設梯磴由寢殿之樓以登延縁百餘丈髙數十尺圍以石欄倚欄平眺全湖如在襟帶橋盡處疊石為山俯瞰澗水作觀瀾亭循澗而南水流清泚可以垂釣曰垂釣亭山巖􅌄窱穿巖竇而出為舫齋齋北有池一泓流泉㶁㶁作琴筑聲上通畧彴以達於園門地既幽勝結構宏偉洵足以掲䖍妥靈亦將使後之人覩公祠宇之盛益思公功徳於無窮也萬松書院在萬松嶺宋為報恩寺元末廢明𢎞治十一年右叅政周木因寺址改建規制畧如學宫中為大成殿奉宋太學孔子石像前為仰聖門左曾唯亭右顔樂亭後為明道堂毓秀閣東西二齋曰居仁曰由義延孔氏之裔以奉祀事嘉靖間御史潘景哲增置學舍論才選俊肄業其中王守仁為記萬歴五年御史馬應夢於毓秀閣後復建繼道堂益以窮理居敬二齋以祀周程張朱四子嵗久漸圮國朝康熈十年巡撫范承謨重葺三十二年巡撫張鵬翮四十九年巡撫黄秉中相繼増修五十五年聖祖仁皇帝賜御書浙水敷文額因名敷文書院奉御纂周易折中古文淵鑒性理朱子全書淵鑒類函等書藏於院中驛鹽道黄炳捐置學田五十八年巡撫朱軾捐益贍産雍正四年巡撫臣李衛復加修葺前為書院門表以石坊曰太和元氣進内為㦸門拾級而登為正誼堂後為魁星閣左右為齋舍西曰芙蓉巖有亭曰載道又西一亭曰采風偶憇雍正十一十欽奉特㫖賜帑金一千兩以資膏火由是多士嚮風學徒雲集延名師以主教席日有課月有程士風丕振益徴聖朝文教覃敷之盛云浙江通志卷一
