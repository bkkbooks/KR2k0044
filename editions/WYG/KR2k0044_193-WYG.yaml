body:
  text: 浙江通志卷一百九十四寓賢上春秋紀寓公之文遷史著客卿之號非曰借才異地亦以仰止高賢也兩浙夙擅通都人稱樂土或税駕而遊或授㕓而處迹與名留地因人重其流風餘韻雖千百載下穆然猶可髣髴云志寓賢杭州府晉郭文晉書本傳字文舉河内軹人也少愛山水尚嘉遯年十三每遊山林彌旬忘返父母終服畢不娶辭家遊名山入吳興餘杭大滌山中倚木於樹苫覆其上而居焉亦無壁障時猛獸為暴入屋害人而文獨宿十餘年卒無害餘杭令顧颺造之攜與俱歸颺以文山行或須皮衣贈以韋袴褶一具文不納辭歸山中王導聞其名遣人迎之既至置之西園園中果木成林又有鳥獸麋鹿於是朝士咸共觀之文頽然箕踞旁若無人居導園七年未嘗出入一旦忽求還山導不聽逃歸臨安結廬山中南北朝徐儀陳書本傳東海郯人陵第三子少聰警以周易生舉高第為祕書郎出為烏傷令禎明初遷尚書殿中郎尋兼東宮學士陳亡隱於錢塘之赭山徐孝克陳書本傳陵第三弟也少為周易生有口辨能談𤣥理既長徧通五經博覽史籍梁太清初起家為太學博士性至孝侯景亂京邑大饑孝克養母饘粥不能給薙髮為沙門乞食以充給焉後東遊居錢塘之佳義里與諸僧討論釋典遂通三論每日二時旦講佛經晚講禮傳道俗受業者數百人天嘉中除剡令非其好也唐丁飛咸淳臨安志字翰之濟陽人讀老莊書居錢塘龍泓洞蓄妻子事耕稼如常人夜半山靜取琴彈弄少睡寡言與人相接禮簡情至未嘗有罷倦之色又不見有所服餌或問之曰治心修身之外復有何物張祜畿輔通志字承吉貝州清河人稱張公子性高曠工詩雲溪友議祜初與徐凝同赴白居易杭州求解白試之以凝居首次祜祜不服因太息歸自此罷舉謹按祜今多誤作祐祜有子望䖍爲冬𤓰堰官祜自言冬𤓰合出瓠子事見太平廣記此名祜之證宋潘閬兩浙名賢錄字逍遙太谷人寓居錢塘通易詩春秋尤以詩知名所交游皆一時豪俊曹彬奏為四門助敎徐復宋史本傳字復之建州人初游京師舉進士不中退而學易通流衍卦氣自筮知無禄遂無進取意游學淮浙間他日聽其鄉人林洪範説詩且言詩之所以用於樂者忽若有得因以聲氣求之遂悟大樂於七音十二律清濁次序及鐘磬侈弇匏竹高下制度皆洞達范仲淹過潤州見復問曰今以衍卦占之四陲無變異乎復對西方當用兵推其日月後無少差慶厯初與布衣郭京俱召見命為大理評事固以疾辭賜號沖晦處士後居杭州十數年而卒西湖游覽志復居杭州萬松嶺與林逋並稱二處士云晁補之宋史本傳字無咎濟州鉅野人父端友工於詩補之聰敏强記纔解事即善屬文十七歲從父官杭州見山川風物之麗著七述以謁州通判蘇軾軾先欲有所賦讀之歎曰吾可以閣筆矣由是知名舉進士拜國子編修實錄檢討官還家葺歸來園號歸來子洪皓宋史本傳字光弼鄱陽人少有奇節登政和進士為秀州司錄大水皓白郡守發廩以糶浙東綱米過城下白守邀留之守不可皓曰願以一身易十萬人命人感之切骨號洪佛子建炎三年擢徽猷閣待制為大金通問使至雲中尼瑪哈廹使仕劉豫皓曰萬里銜命不得奉兩宮南歸恨力不能磔逆豫忍事之耶尼瑪哈怒將殺之旁一酋曰忠臣也為之請得流遞冷山二帝居五國城皓密遣人奏書聞佑陵訃北嚮泣血旦夕臨金主聞其名欲以為翰林學士皓力辭未幾金大赦許使人還鄉皓與張邵朱弁並遣還留北中凡十五年忠義之名聞於天下既見秦檜語曰張和公金人所憚乃不得用錢塘暫居而景靈宮太廟極土木之華豈非示無中原意乎檜不懌出知饒州尋謫濠州團練副使安置英州居九年始復朝奉郎徙袁州至南雄卒帝聞嗟惜之復徽猷閣學士諡忠宣皓久在北庭不堪其苦然為金人所敬博學强記有文集五十卷燉煌事實紹興十三年皓全節歸朝見内殿求還鄉養母帝曰卿忠不忘君雖蘇武不能過也豈可舍朕去因賜第於錢塘之葛嶺命迎養其親楊由義寧志備考字宜之家世開封建炎初由義父以軍前正將扈駕南渡未幾寇入杭由義奉母避地鹽官寇踵至母妹俱以節死由義抵杭其父適以督運自富陽還父子大慟為母妹成葬禮遂家於鹽官由義幼時頗從事學問久之遂與漕薦丰度俊偉詞翰典麗館於賢士大夫之門者凡二十年晦菴朱子亦其弟子也使金營帥强之拜由義曰本朝見宰相無拜禮此膝詎易屈帥怒械繋月餘守節益堅竟完璧歸孝宗嘉歎遷太府卿兼刑部侍郎卒於鹽官周煇兩浙名賢錄字昭禮淮海人紹煕間居錢塘清波門之南嗜學工文隱身不仕當世名公卿多折節下之而簡亢自高未嘗報謝藏書萬卷父子自相師友撰清波雜志十二卷宋斌萬厯杭州府志字文叔袁州人少從黃榦李燔登朱子之門學禁方嚴羈旅困沮年且八十矣臨安尹趙與懽延之事以父行奏乞用旌禮布衣故事不報卒葬西湖與懽歲一祭焉私諡淳固先生施岳湖山勝槩字仲山吳人僑居武林能詩精於律呂梁棟胡迺梁隆吉詩集序字隆吉其先相州人父安道寓鄂州棟生於鄂弱冠登第初選寶應簿再調錢塘仁和尉一時聲名籍甚入元居武林守道安貧澹如也平居吟咏稿無存者門人問曰先生何故不存稿答曰如吾詩堪傳人將有腹稿在元虞集四川通志仁壽人汲之子西湖遊覽志字伯生少不偶寓居錢塘元詩選傳集從草廬吳澄游大德初薦授大都路儒學敎授累遷奎章閣侍書學士修經世大典進侍講學士至治大厯間宗廟朝廷之典冊公卿大夫之碑版咸出其手粹然成一家言門人訂其在朝應制歸田方外諸稿釐為五十卷曰道園學古錄楊載元史本傳字仲𢎞其先居建之浦城後徙杭因為杭人少孤博涉羣書為文有跌宕氣以布衣召為國史院編修官延祐初以科目取士載首應詔登進士授承務郎遷儒林郎寧國路總管府推官初吳興趙孟頫在翰林得載所為文極推重之由是名動京師凡所撰述人多傳誦之西湖遊覽志載與虞伯生掲曼碩范德機齊名世稱虞楊范掲云鮮于樞西湖遊覽志漁陽郡人為江浙行省都事因居杭風流文雅善歌詩尤工書名在吳興趙文敏伯仲間遷太常簿致仕陳柏輟耕錄字雲嶠泗州人性豪宕祖平章積金七屋不數年散盡嘗為侍儀舍人館閣諸老莫不折輩行與交其妻鐵太保女也恃富貴近戚偶以一言驕之遂終身不見嘗被命鑄祭器於杭無錫倪元鎭慕其名求見之張燕湖山間羅設甚至酒終為别以一帖饋米百石柏舉巨觥顧倪曰吾在京即熟爾名云江南士清無與比其所以章章者以米沽之也請從今日絶其氣節如此張翥兩浙名賢錄字仲舉晉寧人父為吏從征江南調安仁尉又為杭州鈔庫使因家焉翥少豪放不羈好蹴踘走馬不以家業屑意父憂之一旦改業閉門讀書因受業於李存又從仇遠學以詩文名一時累官翰林學士承㫖所著有蜕菴集忠義集劉汶劉濩兩浙名賢錄汶字師魯鄜王六世孫占籍錢塘以文章淑後進德行學術與劉濩齊名濩字聲之莆田人占籍於杭與師魯俱以文行為一時寓賢之首繆倫輟耕錄字叔彜東平人侍父宦游錢塘至正十六年淮兵寇城執其父將殺之倫哀號乞免弗聽傾家貲以贖又弗聽乃自縛請代於是殺倫而釋其父龍廣寒輟耕錄江西人寓居錢塘挾預知之術游湖海間咸推為異人又行服氣導引之法常佩小龜十數於身至晚仍解飼之事母至孝六月一日母生辰方舉觴為壽忽見北牕下梅花一枝盛開遂稱之曰孝梅贈詩者甚多至治初卒年百有八歲猶童顔綠髮云貫雲石兩湖麈談阿爾哈雅之孫父名貫格根因以貫為氏名小雲石酸齋其號也有文武才折節讀書為古文峭厲有法詩歌古樂府慷慨激烈士大夫樂從之游少用父蔭為萬戸府達魯噶齊乃讓與其弟後以文行薦為翰林侍講學士知制誥既又辭疾還江南詭姓名易服色賣藥錢塘市中人無有識之者七修𩔖稿雲石臨終作辭世詩云洞花幽草結良緣被我瞞他四十年今日不留生死相海天明月一般圓洞花幽草二妾名也北山棲雲菴其藏修之所薩都拉兩浙名賢錄字天錫雁門人寓居武林博雅工詩文風流俊逸而性好游每風日晴美輙肩一杖掛瓢笠脚踏雙不借走兩山間凡深巖邃壑人跡所不到者無不窮其幽勝至得意處輙席草坐徘徊終日不能去興至則發為詩歌以品題之今兩山多有遺墨而西湖十景詞尤膾炙人口後莫知所終元詩選傳天錫陟官閩憲往還吳越其過嘉興越臺懷古題爛柯山石橋諸律眞能别開生面鄒世聞杭州府志字聞遠登州黃縣人襲授百户戍海寧遂為海寧人張士誠陷浙西見元官多從賊者世聞切齒罵不絶口元亡不食而死寧志備考世聞管理鹽竈有德於寧後遂屏居硤石其妻李氏亦以知禮聞郭彦澤萬厯杭州府志河南人少有氣節高自稱許有葛先生者神於醫盡以其術授之避地武林自稱洛下遺民貢師泰傳詳名宦寧志備考師泰為戸部尚書轉運南北㑹海上多警遂留海寧寓湖塘村宋鐩家謝肅胡奎皆其友也所居里曰小桃源丘克莊始豐𩔖稿廣陵人至正壬寅大比江浙行省克莊用流寓例以詩經就試預選年甫三十識朗志果初在廣陵時天下承平一時貴游子弟日事娛樂克莊家故饒於貲獨從師友窮經史以問學為事及廣陵被兵一時謀人䇿士乘機遇合以取富貴顧乃入庠序訓生徒取所入以自給可謂士之卓然自立者易貞徐一夔澤存室記字廷榦本荆州人幼從父母避地來浙遂家焉貞天資粹美行甚謹飭選杭學弟子員出入學校非特不為嬉戲徵逐之事亦未始見其笑至矧怒至詈居恒毎有不怡之色人問之則曰貞之從親至浙也日漸長大冀有所成立以養父母今幸父猶强健而吾母竟棄不肖孤而去欲報無地㷀㷀在疚恒讀大戴記至母歿而桮棬不能飲口澤之氣存焉潜然出涕爰就母飲食起居之處顔之曰澤存逯西臯西湖游覽志元左丞相魯曾孫占籍錢塘工文翰仕行省都事後棄官居西湖年八十五卒子宏洪武初選補杭州府學生年十八陳時政得失太祖悦之試秋柳賦稱㫖吏部奏宏年少賜歸卒業尋以鄉貢厯敎松江宏子端舉進士官刑部員外郎永樂中扈從北征死於戰張昱西江志字光弼廬陵人少從虞伯生得詩法楊完者鎭江浙用為參謀行樞密院判官張士誠據吳以禮徵之不屈明太祖召至京師閔其老曰可閒矣厚賜遣還因自號可閒老人七修𩔖稿張昱任浙省員外郎元末政壞遂棄官不仕居西湖以詩酒自娛號一笑居士嘗曰吾死埋骨西湖題曰詩人張員外墓足矣後果如其言海昌胡虛白作詩弔之云二仙坊裏張員外頭白相逢只論詩今日過門君不見小樓春雨燕歸遲西子湖頭碧草春天留山水葬詩人老逋泉下應相見為説梅花寫得眞二仙坊在杭之壽安坊即今之花市也西湖游覽志昱罷官時居室已敝友人凌彦翀募緣以葺之疏云昌黎寄玉川子首稱洛城破屋之數間東坡題綠筠軒終比揚州纒腰之十萬一笑居士詩名優於張籍生計劣於陶潛囊無一錢之留家徒四壁之立若非慷慨而多助安得輪奐之一新即欲取杜工部草堂貲何時可辦儻葺得楊關西槐市塾今歲無憂但不至於虛拘便可謂之實惠此崢嶸事在特達心疏傳交游皆助之其居始就當時傳為盛事明何得舉嘉靖海寜縣志晉江人洪武初登進士第任海寜令德惠及民任滿遂占籍海寧後改寧府紀善致政還卜居於雙仁巷終焉墓在西門外鄧林廣東通志字士齊新㑹人洪武丙子鄉薦授貴縣敎諭素嗜學工古文辭嘗謂學詩於陶韋學文於史漢韓栁學書於晉唐諸名家考績至京大學士楊士奇祭酒李時勉留史館修書尋出敎南昌被薦遷吏部主事宣德四年以事謫杭州士人多從之游所著有退菴集傳於世史鑑獻徵錄字明古吳江人為人志正而直言確而厲於書無所不讀而尤熟於史好着古衣冠曵履揮塵望之者以為神仙嘗與劉僉憲沈石田游寓武林所至為文寄之薛侃兩浙名賢錄字尚謙掲陽人操行醇固嘉靖間成進士官行人司司正素慕餘姚王陽明學遂出其門精思力踐以勇鋭見稱徙家於杭築天眞精舍祠以祀陽明時與同志講學其中且為戒於後曰此講學公所後世王氏薛氏子孫世世無所預張叔維西州合譜虞山人畵宗董北苑吳仲珪游跡多在西湖自號西泠寓客故烟巒出沒善得吳越諸山之神詩才清逸尤工七言絶句程孟陽數稱之為人孤介自守茍非意氣所合雖王公貴人黄金白璧凂焉去之以所作青山賣人即分散貧交或買舟沽酒挈伴湖山間不留一錢宋登春名山藏號海翁趙郡新河人其先世治農饒於貲登春少孤家中落嗜酒慕俠能挽强馳騎通習詩畵囊書遠遊至吳㑹久寓錢塘以詩以酒以畵與一瓢道人兩相得晚依其兄子耕於天鵞池之石田又自號鵞池生祝時泰錢塘縣志閩縣人博雅善詩嘉靖初中鄉舉官員外掛冠歸慕錢塘湖山之勝卜居西湖與郡人沈仕輩結玉岑詩社莫叔明列朝詩集傳字公遠長洲人徙居武林好為詩苦思險詣務出人所不經道貧困益甚游燕齊及楚反葬於武林自伐石為之表曰明詩人莫公遠之墓錢可久江南通志字思畏桐城人詩才俊逸字畵遒潤自言與杭州西湖結物外交駕舟千里訪之扣舷高歌旁若無人一時推為風雅之冠國朝吳紹昌舊浙江通志字有聲歙縣人寓錢塘性孝友與弟紹達相愛賦性嚴重有故人子來謁驕不拜床下紹昌責之曰吾若父友也命之拜而後見之平生立然諾重朋友同里有負人百金迫除夕且死紹昌急以金授之曰金易耳何自輕若是好行其義𩔖如此王猷定舊浙江通志字于一别號軫石南昌人善古文為人倜儻自豪寓居西湖為文鬱勃如殷雷未奮又如崩崖壓樹槎枒盤礴旁枝得隙突然干霄或間露卑率語然蒼骨老氣終不可沒林嗣環舊浙江通志號鐵崖福建晉江人登進士官粤東監司博學善屬文流寓西泠汪之蕚舊浙江通志字含章歙人弱冠時母閔遘危疾之蕚中夜肅衣冠告天願以身代刲臂肉二寸許投藥鐺以進母霍然愈視羣從兄弟如同懷周其有無緩急尤以古人相勉勵不從則閉戸自責嘗語諸子曰以惠及人而期報是交為市也聞西泠山水名勝來錢塘結廬南屏之麓榜曰壑菴父母卒遂葬焉蕚廬墓不復歸未幾亦卒葬於此趙吉士兩浙鹽法志字天羽號恒夫休寧人寄籍仁和中順治辛夘舉人知山西交城縣地僻而山險羣盜盤踞其中吉士申明保甲團練之法奉檄進勦先日置酒張樂越宿復邀賔從剪燭賦詩夜半送客出郭即疾行四十里饗士卒於水泉灘進葫蘆川據三坐崖賊驚逸獲渠魁數十餘黨悉降又開髙離山通水道溉田十萬餘頃治邑五載修學宮立義倉又罰贖令種栁於清源文水間延袤四十里夾道垂陰民號趙公栁陞户部郎𣙜關揚州釐革積弊商民感悦任滿監督京倉充會典命勘纂修官編輯鹽漕二書旋擢户科給事中奉詿誤視河道凡地形水勢堤岸閘口條析無遺以降補國子監學正寓居宣武門西名其園曰寄園以著述終老所著有奏疏序論書記十二卷交山平寇四卷音韻正訛四卷詩詞共數十卷年七十九卒子景從濟寜道景行丁夘舉人中書孫繼抃己丑進士戴大受錢塘縣志字與可號華琳休寧人寄籍錢塘博聞强記經史百家無不覽究而尤切於窮理盡性之學自少至老每十年輙成一編其巳刻行世者曰世寶錄醒心錄蓄德錄皆集古嘉言懿行條分而品節之多與人爲善之意年九十卒嘉興府漢施延海鹽文獻志字君予沛國蘄人少明五經旁通星官風角家貧常任作由拳半路亭食其力以養母人不識也山陰馮敷爲吳郡督郵過亭延持帚往敷望而知其賢者下車謝之推食解衣與之錢不受順帝初徵拜侍郎位至太尉宋錢顗宋史本傳字安道無錫人初爲寜海軍節度推官當官而行無所容撓以金部員外郎爲殿中侍御史裏行二年而貶自衢徙秀州家貧母老至匄貸親舊以給朝晡而怡然無謫官之色蘇軾遺以詩有烏府先生鐵作肝之句世因目爲鐵肝御史李曾伯宋史本傳字長孺覃懷人後居嘉興至元嘉禾志曾伯自登膴仕早以能稱持繡斧督餉運兩分漕節七開大閫宦轍幾徧天下儒而知兵有雅量所至得將士心遠人聞風敬憚有可齋𩔖稿行世厯觀文殿學士贈少保開府儀同三司王昇至元嘉禾志字逸老本京師人草聖奇偉徽宗宣和間被召入御書補右爵高宗南渡寓居崇德之羔羊時上留神翰墨近臣有言其能者召對賜札以書玉音褒賞官至正使朱敦儒宋史本傳字希眞河南人紹興二年賜進士出身爲祕書省正字至元嘉禾志敦儒天資曠達以詞章擅名高宗南渡寓嘉禾嘗為樵歌有讀書堂在天慶觀之西朱楹正德崇德志字濟之濟南人建炎登第授崇德令秩滿民不聽去楹亦安之買屋於市以定居終左朝請大夫謹按至元嘉禾志楹作盈未詳孰是張子修𢎞治嘉興府志字德夫開封人建炎間以父蔭任石門市酒務税因愛其地饒沃遂占籍焉尋擢知施州秩滿陞副總管平生酷愛花木未及引年乞歸石門年八十乃終趙善應萬厯嘉興府志字彥遠漢王元佐之孫建炎間與其父申國避地崇德之洲錢遂家焉善應性純孝嘗刺血和藥愈母疾母畏雷輙走䕶之寒夜歸恐擊門驚母露坐達旦官江西兵馬都監每四方水旱驚報輙不食同官燕會嚬蹙曰此豈為樂時耶尤袤稱為古君子姜處恭葉適姜處恭墓誌字安禮淄州長山人曽祖筠避亂於台州臨海祖仲田簽書南康軍討李成墜馬卒父訦從政郎處恭來秀州嘉興始居之九歲而孤大母父母皆散死他州不能葬君營衣食治墳墓收拾諸櫬見星出入後得聚葬於武康上陌巖山既而頗買田治屋賙䘏窮乏雖不以科目自達而懲渡江凋落之後奮寒士單薄之習積無至有以立家室敎二子煇郜皆成進士時檄正德崇德志字傳之其先彭城大族建炎三年主崇德簿因家焉父紹孫嘗知雷州兄宗道與東坡同年進士相厚善坡詩有贈時同年者是也坡謫嶺表竭囊中以賮人高其義檄厯汀州通判知和州居官廉正惠愛移知峽州有識鑒長女既適于湖張孝祥欲以次女妻邑士莫元忠元忠尚居約以非偶辭檄笑曰莫子豈其不第耶遂妻之孫伸任皆特科補官陸埈檇李詩繫字子高高郵人建炎初與兄塤徙崇德登紹熙元年進士厯祕書郎倅和州議散武定軍諸州遂安攝濠州時寇猖獗埈開示大信以收人心散卒聞埈至受㕓者數千乃悉簡為勁兵改知和州養士厲俗修倉浚湟免歸有益齋集兩浙名賢錄葬縣北六里漫塘劉宰誌其墓顔復舊浙江通志字太初復聖裔厯官禮部尚書建炎南渡家石門鎭北子孫自為村落號陋巷村李正民江南通志揚州人政和二年進士中詞學兼茂科檇李詩繋字方叔官朝奉大夫徽猷閣待制提舉洞霄宮紹興中寓海鹽善屬文邑中碑記多出其手子直養遂為海鹽人張公秀正德崇德志字仲實吳人從石林葉左丞遊風流清雅詞翰尤妙紹興初丞崇德遂居邑郊扁其居曰漁蓑輔逵兩浙名賢錄趙州人寓居崇德乾道間為後軍統制孝宗欲處以邊郡問其能勝任否曰當以家法治之又問何法曰子視軍民愛惜財賦遂除知泰州語竂寀曰吾目不識字手不能書但心能燭理耳能聽訟耳郡中果大治蔡材正德崇德志仙遊人倅平江貧不能歸借屋語溪因占籍焉子熙令孝感稱為廉平識者占其後必昌熙卒於官子四閲開闢闡合詞以同居誓柩前皆以儒業授學者銖積無私橐及貴顯扁堂曰怡終身不變世以孝友推其門趙汝愚至元嘉禾志字子直鄱陽人孝宗乾道間魁多士寓崇德之洲錢官至丞相追封福王諡忠定王明清至元嘉禾志字仲言汝陰人檇李詩繫明清甫十歲朱希眞徐敦立過其父所詢以國史中數事應之無遺由是受知慶元間居甥館於嘉禾官至朝散郎與其父雪溪兄仲信俱有史才當時諸公欲收置史館不果嘗剴切上封事是時南渡以來簡冊散亡老成凋謝明清裒集軼事遺聞編為揮塵錄及玉照新志焦炳炎兩浙名賢錄字濟甫宣州人寓居嘉興舉進士第三理宗朝為諫官論奏累數百章時宰主括田議遠近騷然炳炎痛疏其害面奏懇惻涕淚俱下上為動容然未有寢命炳炎論愈力時宰語人曰焦生非攻括田實攻我也炳炎聞之不爲變必報寢而後已尋除太常少卿疏辭以右文殿修撰致仕李鳴復宋史本傳字成叔瀘州人嘉定二年進士萬厯秀水縣志寓居嘉興之東門理宗朝拜參知政事後為福建安撫使予祠子公夬公晉皆典郡謹按萬厯秀水縣志誤作李鳴字復山今據宋史改正王用享檇李詩繋字子安自開封徙居崇德淳熙間舉進士授丹陽尉嗜學手抄口誦至忘寢食試宏博科分敎襄陽以根柢之學表率士𩔖嘗作二記曰不貪不欺此其行已之實也謹按正德崇德縣志作王用亨未詳孰是岳珂檇李詩繋字肅之彰德人飛季子霖之子嘉定間守嘉興有惠政後家郡治西北金陀坊痛其祖武穆為秦檜所陷作籲天辨誣錄等書總名曰金陀粹編官至寶謨閣學士封鄴侯有玉楮集董健獻徵錄汴人仕至武功大夫扈從南渡家於海鹽之澉浦其後曰仲真者遷海寜之錢山澉浦世𨽻軍籍其子源當往戍弟澐請代之遂復家澉浦陳塏福建通志字子爽侯官人襄之曾孫至元嘉禾志塏寓居崇德以清節稱官至資政殿大學士諡清毅有讀通鑑隨筆藏於家至元間表其里曰清節洪芹兩浙名賢錄尚書僕射适之曾孫以祖蔭入官登進士第厯官將作少監屬詞臣無當上意慨然思得天下士丞相程元鳯言當今地望無踰洪芹者進兼翰林直祕書少監權禮部侍郎中書舍人兵興詔書所至聞者奮激蓋芹所草也遷禮部侍郎帝鋭意嚮用而以論去寓居嘉興怡然自適咸淳初起知寧國府元顧阿瑛殷奎顧阿瑛墓志名德輝字仲瑛崑山人幼警敏善記誦以意氣自豪年三十始折節讀書崇禮文儒喜購古書名畵彜鼎祕玩鑒賞無虛日築園於舊宅西偏名曰玉山佳處日與客酌酒賦詩為樂阿瑛才贍思㨗語笑之頃篇章即就恒屈服其坐人又萃友人名作如張翥李孝光楊維楨張伯雨而下刻梓者數十家總題曰草堂雅集舉茂才署㑹稽敎諭力辭不赴母葬廬墓大閲釋氏書乃謝絶塵事僑居嘉興合溪漁釣五湖三泖間自稱金粟道人以子恩封武畧將軍水軍正千戸飛騎尉錢塘縣男陸德方海鹽縣圖經字顯叔華亭人至正十年登賢書授般陽路學正未幾掛冠歸時平章河南沈照避亂海鹽甘泉鄉德方單貧徒歩傭書於其家俄與談經史論時政沈大驚詢知所自遂以女妻之今梅園陸氏皆其後人也吳森嘉興府志字君茂汝南人徙居嘉興魏塘鎭為管軍千戸饒於貲好施與嘗捐田二頃建塾延師以敎鄉里廉訪使奏森義行表其門閭明牛諒檇李詩繋字士良山東東平州人元末寓居嘉興與鮑恂張翼諸人友善學者多從之遊自顔其堂曰尚友明初應詔除翰林院典簿同學士張以寧使安南御製歌詩賜之厯陞禮部尚書著述甚多高岳萬厯嘉興府志字彦高本畏吾氏高昌裔大父仕元為江南行臺御史中丞岳博洽有才華儀容秀整人望而敬之工書兼通丹藥卜筮之術洪武間薦知雲南免官寓居嘉禾又嘗寓魏塘高巽志明詩綜傳字士敏蕭縣人檇李詩繋元末僑居禾郡嘗受業於宣城貢師泰鄱陽周伯琦遂昌鄭元祐為文深醇典雅成一家言以薦為鄮山書院山長明洪武二年徴修元史入翰林累遷侍講學士未幾引退又召為試吏部侍郎以事去官謫居朐山建文間召為太常少卿壬午靖難兵渡江巽志遯去入永嘉鴈宕山其門人文淵閣侍書蔣兢亦潛踪於此巽志病卒兢為經紀其喪葬芙蓉峯北所著有嗇菴集孟觀舊浙江通志亞聖五十四代孫祖忠厚扈宋南渡封信安郡王賜第姑蘇子孫遂為吳人明初觀應人才詔授永寧知縣有治行陞吳府審理副避兵寓於嘉興之清風涇桑愼兩浙名賢錄字仲修世居常州遷嘉興性孝友苦行力學洪武初為監察御史見事廷諍朋友有過輙靣折之以行部海南奏誅衛使張榮坐不避八議罪謫瓊州安置已而召還施懋萬厯嘉興府志字以德應天人能詩文工書有法授孝豐知縣致仕官無餘貲挈妻子寓秀之醋坊橋嘗從侍御戴簡菴學乃與其子經為忘年交往來益密遂相依而居康大和福建通志字原中莆田人嘉靖乙未進士萬厯秀水縣志大和早負才名官翰林三十年厯南京少宗伯及大司空致政歸避倭僑寓禾郡與吳太宰諸公遊有禾城集邱上儀舊浙江通志字惟正武進人武進士受知川湖總督朱燮元由江西都司厯海鹽參將有惠政陞任不赴隱居邵灣紫雲山中賣漿為生親知贈遺絲粟不受年七十餘子孫家於鹽汪珂玉明詩綜傳字玉水徽州人僑居嘉興崇禎中官山東鹽運使判官留心著述輯珊瑚網一編劉儼海鹽縣圖經字敬先眞定人父貞宦於鹽遂占籍居澉川博學善詩文有古行娶瞽妻終身愛敬如賔門人蕭孚貧卻其贄且周之粟友人死無所歸推田三畝鬻以葬之吳懷賢嘉興府志休寧人僑居嘉興以中書舍人辦事誥勅房中丞楊漣劾魏忠賢二十四大罪懷賢擊節稱嘆加以評注工部員外吳昌期奉差督理惠王府第糾劾侈冐忤璫撤回懷賢遺書稱之有事極必返之語詞多激烈其僕得罪於懷賢遂竊其所評註楊疏及遺昌期札密首厰衛忠賢令校尉百餘縛懷賢及其妾邱氏子道昇送鎭撫司懷賢斃杖下崇禎初子道昇上書訟寃贈工部主事夏允彜嘉禾徵獻錄字彜仲號瑗公華亭人寄籍嘉善萬厯戊午以儒士入試遂中式丁丑成進士授長樂知縣多異政擢吏部考功主事未赴遭國變自沉於河而死彜仲神韻秀奭雖弱不勝衣而意慮深長有表正人倫氣象不獨以文章自見也所著有禹貢合注湖州府漢吳羌西吳里語避王莽之亂隨梅福入吳攜妻子徙於烏程之餘不鄉以溪山紆鬱因遯處焉時稱高士後人名其所居曰吳羌山錢林兩浙名賢錄字元茂徐州人建平中為諫議大夫後王莽專政遂棄官隱於平望鄉陂門里梓山之東子孫遂家焉西吳里語長興有錢林故宅在子山吉祥鄉園林幽趣花石佳致層閣在山高門臨水邱俊吳興掌故漢平帝時持節按撫江南屬王莽專政因留居烏程後其子邱騰隨光武起義南陽累仕至大司馬卒葬於烏程晉庾翼吳興掌故汲郡人仕晉為蘭陵令奮節將軍隨元帝過江為吳興郡丞因居烏程翼生豫章太守鎭鎭生征南司馬建武將軍欽信欽信生宋晉熙王兵曹參軍黯黯生南臺御史高高生齊驃騎大將軍孟眞孟眞生梁散騎侍郎僧朗僧朗生陳給事中五兵尚書宗陳達冊府元龜漢太邱長實之後世居潁川達為長城令悦其山水遂家焉曰此地山川秀麗後當有異人出我子孫必鍾斯運南北朝裴子野萬厯湖州府志河東人少好學善屬文仕齊為江夏王行參軍遭父憂去職後為諸暨令以曾祖松之嘗令故鄣遂留居焉撰宋畧二十卷吳興掌故子野字幾原唐陸龜蒙唐書本傳字魯望舉進士不中往從湖州刺史張摶游摶厯湖蘇二州辟以自佐龜䝉多所論撰雖幽隱疾痛貲無十日計不少輟也嗜茶置園顧渚山下歲取租茶自判品第不喜與流俗交雖造門不肯見設蓬席齎束書茶竈筆床釣具往來時謂江湖散人或號天隨子以高士召不至西吳里語龜䝉吳江人著吳興實錄若干卷今長興有别業在陸羽唐書本傳字鴻漸一名疾字季疵復州竟陵人不知所生或言有僧得諸水濱畜之既長以易自筮得蹇之漸曰鴻漸於陸其羽可用為儀乃以陸為氏名而字之上元初隱苕溪自稱桑苧翁闔門著書或獨行野中誦詩擊木徘徊不得意時謂今接輿也貞元末卒羽嗜茶著經三篇言茶之原之法之具尤備鬻茶者至陶羽形置煬突間祀為茶神崔元亮吳興掌故磁州昭義人元和中為吳興刺史因家於長興縣西之崔灣顧雲全唐詩錄傳字垂象池州人風韻詳整與杜荀鶴殷文珪友善同肄業九華咸通中登第為高駢淮南從事師鐸之亂退居霅川杜門著書執政薦修國史書成加虞部員外郎五代鍾廷翰十國春秋不知何許人流寓湖州素有賢名武肅王命攝安吉主簿牒曰廷翰儒素修身早升官緒寓居霅水累厯星霜克循廉謹之規備顯温恭之道今者願求錄用特議掄材安吉屬城印曹闕吏俾期差攝勉効公方倘聞佐理之能豈恡超遷之奬後不知所終宋葉夢得宋史本傳字少藴蘇州吳縣人嗜學多識紹聖四年進士自婺州敎授召對累遷翰林學士極論士大夫朋黨之弊蔡京欲以童貫宣撫陜西取青唐夢得曰祖宗時宣撫皆是見任執政未有以中人為之五年帥潁昌發常平粟振民常平使者括錢五十萬糴粳米輸後苑夢得上疏極論高宗駐蹕揚州陳待敵之計遷尚書左丞與宰相朱勝非論不協除資政殿學士不拜歸湖州紹興初起知建康府時建康荒殘夢得移統制官分守要害奏防江八事金帥入宼夢得團結民兵數萬分據江津金兵不得渡而去時諸道兵咸集夢得總四路漕計軍用不乏故諸將得悉力以戰移知福州海寇猖獗或招或捕平寇五十餘尋致仕卒湖州贈檢校少保徐一夔柟軒記葉蕡字本蕃世居吳門政和間石林先生夢得始卜葬其先府君於吳興之弁山其地居風氣之會奇石如林有瑰奇絕特之狀因號石林且營别業至蕡因取其先世所植之樹名軒以志之方淑西吳里語字智善汴人年十九登進士紹興初為德清縣丞愛溪山之勝因家焉累遷翰林學士時秦檜當國訪以時事淑直言無諱大忤檜意因罷歸平居常與王洋劉一止徜徉慈相寺中倡酬往返以文墨相娛任仲歸安縣志河南人紹興初以明經進士為仙居令有治績内遷至禮部侍郎後隨駕南渡遂居歸安是為吳興任氏時無俸米頒賜田於本邑南靈山何彦猷兩浙名賢錄字淑遠高唐人紹興中為大理丞時秦檜誣岳飛下獄彦猷與李若璞論其無罪万俟卨劾彦猷等黨奸撓法罪在不赦罷黜寓居德清餘不溪上孝宗即位追贈二階特命其子伯寧為徽州文學蔡洸萬厯湖州府志仙遊人端明殿學士襄之後徙居霅川以父蔭補將仕郎中科除大理評事遷寺丞出知鎭江府會西溪卒移屯建康舳艫相銜時久旱郡民築陂瀦水灌溉漕司檄郡決之父老泣訴洸曰吾不忍獲罪百姓也卒不決已而大雨漕通歲亦大熟除司農少卿請輸絹折納公私皆便以襄未易名力請於朝賜諡忠惠兩浙名賢錄洸字子平李道傳宋史本傳字貫之隆州井研人四川通志徙居吳興讀河南程氏遺書玩索至忘寢食慶元元年登進士第累官著作郎提舉常平茶鹽公事居官以踐履為本為學以踐履為功雖處暗室整襟危坐肅如也卒諡文靖蕭德藻福建通志字東夫閩清人紹興進士嘗令烏程後遂家焉所居屏山千巖競秀自號千巖老人楊萬里稱云近世詩人若范石湖之清新尤梁溪之平淡陸放翁之敷腴蕭千巖之工緻皆余所畏也著有千巖擇稿劉光祖宋史本傳字德修簡州陽安人登進士第吳興掌故紹興間為殿中侍御史極論朋黨偽學之禁言甚剴切寧宗初坐留朱熹罷起居郎管玉虛觀慶元三年言官論列放棄房州後復職厯官顯謨閣學士以蜀地險遠寓居德清之新市市人呼其家曰川劉游似四川通志安漢人仲鴻子德清縣志字景仁由進士厯官知樞密院事淳祐五年入相上問唐太宗貞觀治效之速對以人主一念之烈足以旋乾轉坤及親儒從諫敬畏檢身諸奏上嘉納之累章乞歸御書事君以忠視民如傷行已有耻遯世無悶十六字以賜且慰留之厯階廣平郡公右丞相兼樞密使七年致仕初喜吳興山水嘗寓居德清新市鎭至是遂占籍焉卒諡清獻吳柔勝江南通志寧國人因母家徙溧水故又為溧水人德清縣志字勝之幼聽其父講伊洛書已知有持敬之學人憚其方嚴淳熙八年登進士厯官至祕書閣修撰寓居德清之新市鎭後家焉二子淵潛皆宋末名臣姜夔西江志字堯章德興人學詩於蕭千巖琢句精工楊誠齋謂其嗣伯子曰吾與汝弗如也夔自號白石道人紹興間秦檜當國隱居箬坑之丁山參政張燾累薦不起高宗賜宸翰建御書閣貯之以隱逸終吳興掌故夔少從父宦古沔千巖老人在沔與夔相得遂攜過苕霅以兄之女妻之遂家武康張嵲武康縣志字巨山襄陽人上舍登第居邑之上陌里宋高宗雅知其文辭擢中書舍人官至敷文閣待制有紫薇集子昌詩官至朝議大夫程公許宋史本傳字季與敘州宣化人嘉定四年進士權禮部侍郎鄭清之以少保奉祠侍講幄中批復其子士昌官職與内祠且許侍養行在公許繳奏士昌罪重内祠侍養之命宜與收寢遷中書舍人進禮部侍郎公許自繳士昌之命清之日夜於經筵短公許清之再相公許屏居湖州者四年帝欲召為文字官清之奏已令守婺帝曰朕欲其來乃授權刑部尚書尋授寶章閣學士而公許已卒牟子才吳興掌故字存叟井研人愛吳興山水因家焉自幼從學於魏鶴山嘉定間除史館檢校官對延英殿陳六事受知理宗嘗曰牟子才好箇士大夫官至資政殿學士卒諡清惠所著存齋稿一百卷内外制十卷四朝史稿五卷奏議二十卷經筵講議五卷口義一卷故事三卷四書易編三十卷春秋輪輻稿未就卒王嵎文獻通考字季彜北海人紹淳間名士寓居吳興陸務觀與之厚善三子甲田申皆登科韓元吉西吳里語字旡咎官至尚書常寓德清縣之慈相寺登覽之餘每多吟作東萊呂成公其壻也嘗來訪之相與講讀於寺西之竹林精舍故寺中有東萊書院嘉熙間縣令章鑑剏屋扁曰東萊讀書堂文及翁兩浙名賢錄字時學綿州人徙居吳興厯官資政殿學士景定間言公田事有名朝野宋亡元世祖累徵不起閉門著書有文集二十卷李龍佩楚軒客談吳郡笠澤人僑居烏程三滙效元白歌詩不樂仕進年登耄期自作墓銘趙文曜葬之何道兩山間樹梅百株趙得符題碣曰宋詩人雪林李君之墓元敖繼翁兩浙名賢錄字君善福州人寓居烏程築一小樓冬不爐夏不扇惟事經史湖之名士從之遊者甚衆浙西平章事高彦敬薦授信州敎授有文集二十卷王簡兩浙名賢錄字伯敬霑化縣人父吉昌任濟南府治中元統間簡以薦授祁陽縣尹改烏程因家焉後遷知福寧州至正十二年劇賊王善寇建邵迫州境簡率民力戰馬中流矢被執罵賊死屍不仆頸無血惟涌白沬如流膏次子相亦遇害妻潘氏聞變恐被辱先自縊家奴逃還告其長子楨楨往得父母屍歸葬烏程江浙行省上其事贈奉議大夫濟南路總管上輕車都尉太原郡侯以楨襲父爵除紹興路總管張士誠陷城亦以不屈死張羽西江志字來儀潯陽人吳興掌故元季領鄉薦授安定書院山長卜居吳興遂家烏程之戴山東洪武中召見仕至太常寺丞兼署翰林院同掌文淵閣事羽詩文奇古與姑蘇高啟楊基徐賁齊名所著有靜居集謹按湖州府志因羽為潯陽人遂訛以為南潯人今改入寓賢陸厚江南通志華亭人居城東自號東園散人博學經史尤精孫吳書兵亂往來天目苕霅間將某聞其名覔之不可得兵息返故廬勸之仕不應有詩集號古漁唱郭學乾始豐𩔖稿廬陵人負奇氣精地理學好遊覽名山川至正中縱觀五湖之勝至吳興而止㑹兵亂道梗欲歸不能僑居郡之漣水上漣上之人慕與之遊爭館之久之卒同郡羅孔碩李訥葬之道塲山之阿潯陽張羽為撰行述以揭諸墓陳振吳興掌故字文舉杞縣人宋南渡居錢塘振讀書實踐年二十以詩經舉為蘇州文學掾元末避兵弁山家焉子引為古田敎諭引子敏政成進士官至南康知府明温祥卿兩浙名賢錄大同人精通陰陽術數之學元末避兵家於長興耿炳文初下湖州民心未附祥卿杖策以布衣進謁炳文與語奇之遂留贊軍事為炳文畫策據要害設戰具為守禦計未幾吳平以畫贊功累官兵部尚書徐賁萬厯湖州府志字幼文蜀人工詩在吳與高啟諸人齊名尤善寫山水張士誠據蘇辟為從事固辭不就徙居烏程之蜀山洪武中以薦至京授給事擢河南左布政所著有北郭集孫一元陜西通志字太初平凉人列朝詩集傳太初嘗棲太白山之巔故稱太白山人風儀秀朗𤣥巾白袷以鐵笛鶴瓢自隨善飲酒好談論所至傾動其士大夫嘗南入吳會遂棲遲不去費宏罷相訪之南屏山中値其晝寢就卧内與語送之及門了不酬謝費出語人曰吾一生未嘗見此人也名山藏太初晚居湖州與尚書劉麟孝廉施侃山人吳珫侍御陸崑結社號苕溪五隱年五十餘卒葬道塲山中國寶新編太初性好詩初談導引人疑其仙晚嬰婚娶入湖南社援引儒術皆非其本色也劉麟傳詳名宦西江志麟為紹興知府罷士民為建小劉祠以配漢劉寵寓湖州晚好樓居力不能構懸籃輿於梁曲卧其中名曰神樓文徵明繪圖遺之袁袠兩浙名賢錄字永之長洲人五齡知書七歲賦詩有奇語嘉靖乙酉應天鄉試第一舉進士授武選主事觸忤時貴編戍湖州寓居城南之峴山寺搜奇弔古悠然自適後人以其所寓處稱為胥臺讀書樓胥臺其號也唐志大兩浙名賢錄字子迪上海人嘉靖辛丑進士授南京行人司副便道歸將迎母以行比歸而母病遂乞終養敦行色養之道躬親稼穡以給甘㫖閒居樂志自謂三公不易無復有用世意倭從海上起聞吳興地僻遂奉母與羣從弟妹子壻居焉同郡徐伯臣董子元亦俱至相與結社賦詩有開元之遺音所著有僑居賦及詩文若干卷又輯高廟聖政記二十四卷藏於家韓奕江南通志字公望長洲人博學工詩常浪跡山水間遇山僧野客累月忘返所契王賔素為太守姚善所重善欲因賓致奕奕終不往一日與賓詣奕奕走楞伽山善隨至又泛小舟由太湖入苕霅溪避之善嘆曰韓先生所謂名可得聞身不可得而見也徐獻忠萬厯湖州府志字伯臣華亭人孝友天至博學能文中應天鄉試為奉化令有聲其父病執獻忠手曰吾家三世不益丁得無繋於葬所哉於是偕堪輿家卜地得烏程之福山葬其父遂家焉洪儒歸安縣志字澹寧歙縣人父海容敎授西吳因家焉儒天性孝友言坊行表足為後學儀型學使者屢舉優行表其廬曰世濟名賢黃周星明詩綜傳字凢烟上元人崇禎進士除戸部主事晚居湖州號圃菴布衣素冠寒暑不易嘗賦詩云高山流水詩千軸明月清風酒一船借問阿誰堪作伴美人才子與神仙年七十自撰墓誌作解脱吟與妻孥訣自沉於水國朝王武臣德清縣志字莞菴武昌人由武科厯任遊擊寓居邑之文昌里蕭然齋閣圖書數卷而已所著有四山園稿吳越吟種德錄諸刻寧波府宋祖域嘉靖寧波府志字貞夫建隆中由閩徙奉化仕至殿前司統制平居尚氣節樂施予歲饑發私廩以賑所活以千計里子弟不能學者為招師儒使就學貧不能婚䘮者出財助之既殁民懷其惠立廟以祀方軫福建通志字叔時莆田人以父任太廟齋郎大觀元年蔡京復相軫疏列其過千二百餘言京怒流軫嶺南靖康元年軫詣闕陳訴始得收復後知鄞縣天啟慈谿縣志軫貧不能歸遂家於慈谿之鳴鶴山黃子游傳詳名宦成化四明郡志浦城人徙奉化卞大亨寶慶四明志字嘉甫泰州人由鄉舉入太學升舍有聲靖康中攜二子走行在丞相范宗尹以遺逸薦特恩調懷寧縣簿紹興中隱居象山之錢塘村手植萬松行吟其間自號松隱居士好讀左氏傳及遷固諸史老杜詩素習養生導引術醫藥占算尤極其妙解衣推食賑䘏飢寒手製藥餌惠利甚溥子圜字子車亦有聲太學號卞夫子登紹興三十年第授揚州倅王撝成化四明郡志其先開封人建炎渡江居於鄞幼學於里師樓昉為文醇深善議論壯歲試詞科不中輒棄去後登嘉定進士第同年余天鈞參知政事屬敎其子弟歲終致束修以謝堅不肯受曰吾二兒習詞學鄉里無完書願從公求尺牘天鈞欣然許之後二子應麟應鳯果中詞學科撝嘗預修四朝史為輿服志六卷後直祕閣知温州徐立之寶慶四明志字植夫登州人紹聖初登進士甲科靖康後扈駕南幸丞相呂頤浩最知遇之及秦檜當國丐祠居鄞徜徉里閈三十年積官至朝散大夫年逾八秩手不釋卷累贈開府儀同三司張邵成化四明郡志字才彥和州烏江人宣和三年登上舍第建炎初假禮部尚書使金其弟為明州觀察推官奉母居鄞卒葬鄞之雷峯因家焉邵使還除敷文待制紹興二十五年知池州請祠邵遇事慷慨憤激常以功名自許冒險出使人皆危之及被囚拘畧無悔懼賦詩作文動盈編帙歸獻所聞納忠於朝高宗將進用之而邵無意於仕進矣蔣猷汪藻蔣猷墓志字仲遠金壇人元豐八年進士官徽猷閣直學士提舉嵩山崇福宮建炎三年避地明州卒於昌國縣蓬萊鄉天資渾厚平生未嘗以游辭偽色借人其論事上前不為茍合雖人主盛怒反覆開陳必盡理而後已其論薦皆一時名士平居無嗜好未嘗一日廢書有文集二十卷藏於家高友文成化四明郡志字仲章號寓齋其先汴人建炎間隨駕南渡遂家於郢性瑞謹學問該博舉進士調泰州如臯尉初志欲仕以養親親歿築室墓旁絶口不談名利事客有誚友文者曰子方筮仕正宜樹立以圖顯大何乃獨為況黙友文歎曰仕以求祿祿以養親親亡矣何以仕為屢薦不起郭維嘉靖寜波府志河南人父貫官奉議郎終於長河判官建炎間維徙居四明以北學敎授諸生從者如雲卒葬西湖之原顧主簿容齋三筆不知何許人南渡後寓慈谿安於貧賤不蘄人之知至於踐履雖細事不茍平旦起俟賣菜者過門問菜把値幾何隨所言酬之他飲食布帛亦然久之人皆信服不忍欺茍一日之用足則玩心墳典不事交游里中有不安其分武斷强忮者相與譏之曰汝豈顧主簿耶朱翌延祐四明志字仲新舒州􅈞川人漢桐鄉嗇夫邑之後以太學生賜第初為溧水簿高宗南渡為祕書監屬預修徽宗實錄時范沖領史局翌删潤功居多秦檜逐趙鼎翌以鼎黨貶韶州後召還朝廷憫其飢寒計貶所四十年衣俸悉予之遂卜居鄞嘗作信天緣堂記死自為誌周必大論其詩似杜牧之而出處亦相𩔖號省事老人文集四十四卷李宗質樓鑰李宗質墓誌字文叔世家於濮八歲而孤所生母展氏去紹興八年補將仕郎至江州水南遇展氏於㕓中抱持相哭别十年而得奉色養者二十年赴調監明州大嵩鹽塲因卜居石塘遂為明之鄞人十七年陞遂昌令歲饑寇作於旁郡亟捕首惡斃之羣黨帖息隆興元年改知會稽丁展氏憂服除權通判隆興府時江西大旱宗質賑濟盡力全活者衆改通判鎭江府外臺以清廉公勤引薦於朝差知台州彌事奮勵聽訟必先抑告訐懲奸惡理財精察量入為出帑庾為之充衍増學田以養士者數百畝及調戍兵遣海州號令簡明凛有風采縣吏重足承命而未嘗輕用鞭撻聞者服其平允尋差主管武夷山沖佑觀五轉至朝散郎淳熙十一年卒年七十三黃龜年延祐四明志字德紹其先福州人後葬父於鄞因家焉舉進士第為殿中侍御史與諫官劉棐論秦檜行𩔖莽卓特朝廷未之察檜由是罷相至檜再相龜年寓湖州檜摭其過押使回福州檜死龜年復居於鄞鄭鍔成化四明郡志字剛中由福州徙鄞躬孝友之行貫通經史以詞賦名於時登紹興三十年進士仕至屯田郎寧宗在英邸兼小學教授嘗進勸戒元龜後特加贈且官其子張良臣成化四明郡志字武子一字漢卿家洪州避寇來明州因占籍焉善詩清刻高潔不蹈凡近尤長於唐人絶句語盡而意益遠後宋詩人咸推服之趙粹中成化四明郡志字叔達自密州徙居於鄞登紹興進士孝宗鋭意復北疆粹中進恢復機密十論富强要策十卷孝宗亟喜之一歲九遷由祕書郎權起居郎給事中除吏部侍郎嘗上疏罷王安石父子從祀乞雪岳飛寃狀又集司馬光范縝董弅等奏議正太祖東嚮之位議不行寧宗即位卒如其議後以待制知池州家居十年粹中善筆札子竴書似其父竴幼孤終身不肯仕嘗隱茅山郡守屢薦於朝特許循資竴亦謝不受魏杞成化四明郡志字南夫由焦山徙於鄞登紹興十二年進士第厯縣有能名後遷宗正少卿假禮部尚書使金行次盱眙金人以萬騎脅之把不為動奉禮幣以往至金卒正敵國禮減歲幣舊數以歸孝宗大喜除起居郎遷給事中乾道三年拜同知樞密參知政事明年拜右僕射除觀文殿學士卒諡文節杞能詩居小溪絶不言時政所著有山房集三蘇言行編韓元禮嘉靖寧波府志字敬仲鄴人淳熙九年進士光宗時授中書舍人以言事忤㫖謫象山令開禧二年改松溪黨籍禍起以有惠於象遂泛海至其邑西南鄉居焉元任士林嘉靖寧波府志字叔實其先蜀綿竹人徙居奉化再世又徙埼山幼穎敏六歲能屬文既長喪父廬墓讀書亹亹不倦為文沉厚正大一以理為主而含蓄頓挫讀之有餘味後講道會稽授徒錢塘遠近求請無虛日至大初以薦授安定書院山長所著有中易論語指要及松鄉文集若干卷謝暉嘉靖寧波府志字彦實資陽人徙鄞識見通敏聞武康石塘胡長孺以德學淑後進往受業其門或勸習舉子業答曰學以博通古今資文行耳仕奚所急哉趙文敏授以書法比家居藩帥郡守詣門請交一無所求為詩文簡淡雋永人以得其尺牘片楮為榮暉亦不自祕惜求輒應之有所不可雖貴勢不能動也掲汯天啟慈谿縣志字伯防荆楚人徯斯子少淳樸苦學年十八盡通六經大義工古文辭補太學生端方有威儀六館士敬憚之以蔭補祕書郎遷國史編修厯官至肅政廉訪使守建寧偽漢陳友諒兵寇松關建寜受圍吏民相繼出奔汯與經畧使巴延布哈協謀禦賊設方累復延平等三州改江西行省未赴以工部郎中召時淮浙道不通遂留家四明之慈溪丁鶴年戴良高士傳西域人父職馬祿丁臨川縣簿以治行高等陞武昌縣達嚕噶齊有惠政解官之日愛其土遂家焉子五人鶴年最幼父死鶴年甫十二俗素短喪鶴年以為非古制乃服斬衰三年厲志為學年十七通詩書禮三經淮兵渡江越襲武昌鶴年奉母以行聞從兄吉雅摩迪音避地江上徒歩往依焉遂留四明或旅食海鄉為童子師或寓居僧舍賣藥自給雖久處艱瘁泊如也慈溪縣尹陳林稱賢令四方士大夫多依之鶴年居是邑數載未嘗睹其面嘗自謂曰凡為清士當以廉為主義為輔和為衛三者備庶可免於今之世矣廼賢元詩選傳字易之世居金山之西元興西北諸部多散處内地故易之稱南陽人隨其兄宦遊江浙卜居於鄞再至京師以能文名尤長歌詩每一篇出士大夫輙傳誦之時浙人韓與玉能書王子充善古文易之與二人偕來人目為江東三絶久之歸浙東辟為東湖書院山長以薦授翰林院編修官出參布達實哩軍事所著有金臺集吳志淳成化四明郡志字主一以字行濟南人工詩善草𨽻以父廕厯官靖安都昌二縣簿元季棄官寓鄞之東湖至正末執政奏除待制翰林命下為權倖所匿志淳已在耄耋若不聞焉當時若南昌掲伯防會稽盛景華魏郡邊魯生永嘉柴養吾亦嘗寄跡於鄞至如龍子高之寓慈溪戴叔能之寓定海數君子者或賦詩或作文或論書法各逞所長故詞章翰墨人得之不啻拱璧養吾師米南宮寫雲山烟嵐變滅渾然天成魯生亦善寫水墨花鳥梅石而竹精於鈎勒顫掣之勢則有得於李後主子高後歸於閩張淮中作琴劍歌送之明詩綜傳志淳所著有環碧軒栁南漁隱二集謝昌元兩浙名賢錄字叔敬西蜀資州人𩔖試四川第一調肇慶府敎授除太學博士知封州後為沿海參議官因家於鄞開慶初長子大椿挈其家屬來鄞舟由鄂州世祖駐兵江滸獲其舟以大椿歸甚愛之俾給事殿中命大椿召昌元入朝上深器之呼為南儒預議中書省事為禮部尚書周友常鎭海縣志字景賢其先青州人舉至正乙酉進士授餘姚州學正設科課士井井有條與朱公遷並馳名江左宋文瓚薦其才陞慶元路提舉安民弭盜綽有成績未幾因方國珍擾内地陳救援三䇿弗用掛冠隱定海大浹江之南築室棲遲混跡漁樵子孫世為定海人明李善成化四明郡志字原善東平人父灝仕元為三江巡檢遂家慈谿篤志問學處窮約簞瓢自樂喜怒不形於色人莫得窺其涯涘嘗額所居之室曰人性皆善日吟哦其中人羡其所作豪放目之曰小李白壽七十六所著有崇陽稿賀確陳鎬賀確傳字存誠隴西人洪武初徙家四明少事舉業試有司一不利即棄去遂肆力於古自六經子史以至天文地理醫卜之書無不覽究為文詞下筆輙有古風以菊有隱者操篤愛之别號菊隱學士周敘以其有史才薦修遼金元三史力辭不就有司延為鄉飲大賔幅巾深衣儀度整肅望而知為君子暇則縱尋山水間優游以老年九十三所著友菊詩集一卷陳遠嘉靖寧波府志字中復一字中孚先濮之鄄城人弱冠遊學宣饒間從中書左丞韓伯高授易得專門奥㫖工書法有晉人風度尤善模寫人物過四明愛俗尚淳厚遂家焉洪武中召至闕廷命寫御容賜金帛以文淵閣待詔歸里永樂間遣中貴馳驛召入覲賜賚益厚憫其年老賜歸遠為人清峻剛直毅然不可犯而意度閒雅接之則和氣藹如故士大夫多敬慕焉劉端象山縣志泗州人景泰七年由選貢丞象山以節愛稱令缺署篆久民甚德之雅善堪輿曰象山仁里也遂卜居城北入籍焉子景𢎞治間領鄉薦厯吳縣令陞岳州通判羅心樸奉化縣志字夢章號抱靈四川營山人崇禎丁丑進士仕寧波司李風裁凛然豪猾斂跡明季辭組蜀道阻絶游奉化之小萬竹愛其山水清曠築室居焉浙江通志卷一百九十四
