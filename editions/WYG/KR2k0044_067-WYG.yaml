body:
  text: 浙江通志卷六十八田賦二嘉興府嘉興縣實在田捌千肆拾㭍頃伍拾壹畝叄分壹釐陸毫徵銀㭍萬壹千玖百㭍拾兩貳分㭍毫肆絲陸忽陸微玖塵陸渺捌埃徵米壹拾壹萬叄千陸百壹拾貳石㭍斗陸合叄抄玖撮捌圭貳粟陸粒捌黍四鎮倉基等田陸拾壹畝肆分貳釐玖毫例不起科實在地陸百陸拾捌頃玖拾畝㭍分壹釐玖毫徵銀伍千㭍百玖拾叄兩貳錢壹分叄釐肆毫捌絲㭍微叄塵貳漠徵米玖千叄百伍拾貳石捌斗伍升陸合叄勺貳抄壹撮叄圭㭍粟伍粒伍黍玖粞玖糠叄粃實在山捌拾捌畝肆分叄毫徵銀壹錢玖分陸釐肆毫肆絲叄微陸渺叄漠徴米肆石叄斗陸升玖合玖勺叄抄㭍撮玖粟陸粒實在蕩灘㭍拾頃伍拾捌畝伍分貳釐伍毫徵銀㭍兩肆錢壹分㭍釐肆毫貳絲壹忽㭍微叄渺肆漠陸埃伍纖叄沙徵米叄百肆拾捌石肆斗肆升壹合玖勺壹抄捌撮叄圭貳粟貳粒捌黍壹粞叄糠伍粃以上共額徵銀㭍萬㭍千㭍百㭍拾兩捌錢肆分捌釐捌絲玖忽肆微叄塵陸渺肆埃伍纖叄沙遇閏加銀壹千叄百捌拾㭍兩玖錢捌分玖釐貳毫貳絲伍忽㭍微貳塵壹渺㭍漠貳埃玖纖陸沙共額徵米壹拾貳萬叄千叄百壹拾捌石叄斗㭍升肆合貳勺壹抄陸撮陸圭貳粟壹粒貳黍壹粞貳糠捌粃遇閏加米壹百捌拾石肆斗秀水縣實在田伍千㭍百肆拾肆頃肆拾伍畝叄分肆釐捌毫伍絲徵銀陸萬壹百伍拾壹兩貳錢壹分貳釐伍毫貳微㭍塵陸渺貳漠伍埃徵米玖萬伍千肆百肆拾石貳斗陸升伍合㭍勺陸抄叄撮叄圭陸粟捌粒貳黍叄粞四鎮常平社倉兵營書院漏澤園共田壹頃玖拾叄畝㭍分陸釐例不起科實在地肆百伍拾頃玖拾貳畝貳分貳釐玖毫徵銀肆千陸百貳拾貳兩壹錢肆分玖釐貳毫陸絲捌忽貳微叄塵捌渺玖漠陸埃徵米㭍千陸拾㭍石叄斗肆合㭍勺陸抄肆撮壹圭叄黍義塜地叄畝例不起科實在蕩灘貳百伍拾壹頃陸拾畝肆分叄釐壹毫陸絲徵銀貳拾玖兩陸釐伍毫陸絲㭍忽叄微伍渺伍漠貳埃肆纖徵米壹千貳百玖石陸斗玖升玖合捌勺捌抄貳撮陸粟叄粒壹黍㭍粞告豁無徵虛蕩壹頃陸拾㭍畝陸分㭍毫例不起科以上共額徵銀陸萬肆千捌百貳兩叄錢陸分捌釐叄毫叄絲伍忽捌微貳塵㭍漠叄埃肆纎遇閏加銀玖百陸兩貳錢㭍分陸釐捌毫叄絲肆忽壹微陸塵貳渺壹漠捌埃貳沙共額徵米壹拾萬叄千㭍百壹拾㭍石貳斗㭍升肆勺玖撮伍圭叄粟壹粒㭍黍嘉善縣實在田伍千玖百肆頃㭍拾貳畝伍分壹釐㭍毫徵銀陸萬伍千貳百陸拾叄兩陸錢玖分玖釐壹毫貳絲壹忽壹微㭍塵肆渺陸漠肆埃徵米壹拾壹萬肆千㭍百壹石貳斗壹升捌合叄勺陸抄貳撮壹圭貳粟陸粒壹黍實在地壹百捌頃捌拾肆畝捌分叄釐伍毫徵銀壹千壹百玖拾兩叄分壹釐叄毫玖絲壹忽壹微陸塵伍渺伍漠徵米貳千壹百壹拾叄石捌斗捌升貳抄貳圭壹粟陸粒玖黍實在涇濱蕩貳百伍拾陸頃伍拾陸畝㭍分貳毫徵銀貳拾兩陸錢肆分捌釐伍毫叄絲㭍忽貳微伍塵肆渺陸漠陸埃伍纎徵米壹千叄百壹拾陸石玖斗玖升㭍合陸勺㭍抄捌撮㭍圭捌粟肆粒㭍黍伍粞以上共額徵銀陸萬陸千肆百㭍拾肆兩叄錢㭍分玖釐肆絲玖忽伍微玖塵肆渺捌漠伍纎遇閏加銀捌百捌拾㭍兩肆錢壹分貳釐㭍毫㭍絲㭍忽伍微伍塵陸渺肆漠壹埃貳沙共額徵米壹拾壹萬捌千壹百叄拾貳石玖升陸合陸抄壹撮壹圭貳粟㭍粒㭍黍伍粞遇閏加米㭍拾肆石捌斗海鹽縣實在田伍千貳百肆拾捌頃壹拾陸畝捌分叄釐㭍毫伍絲徵銀肆萬貳千陸百玖拾陸兩肆錢伍釐伍毫捌絲捌忽陸微貳塵叄渺陸漠貳埃伍纎徵米伍萬陸千陸百㭍拾壹石伍斗玖升壹合伍勺玖抄叄撮玖圭陸粟玖粒伍粞實在地㭍百伍拾玖頃肆拾肆畝叄分捌釐貳毫伍絲肆忽徵銀伍千㭍百捌拾肆兩貳錢玖釐㭍毫貳絲伍忽壹微貳塵肆渺㭍漠伍埃肆沙徵米捌千伍拾石貳升叄合陸勺陸抄㭍撮肆圭陸粟壹粒肆黍貳粞實在山壹百㭍拾伍頃玖拾叄畝貳釐玖毫玖絲叄忽徵銀肆拾㭍兩壹錢壹分玖釐伍毫捌絲㭍忽玖微玖塵壹渺捌漠壹埃捌纎叄沙徵米玖百壹拾叄石貳斗玖升壹合壹勺貳抄玖撮貳粟玖粒壹黍伍粞叄糠實在蕩灘濱地漊水面壹百陸拾貳頃叄拾伍畝壹分肆釐捌絲叄忽徵銀貳拾伍兩玖錢肆分捌釐㭍毫捌絲㭍忽玖微叄塵玖渺玖漠玖埃㭍纎叄沙徵米捌百肆拾貳石捌斗貳升貳合㭍勺玖抄㭍撮肆圭叄粟捌粒肆粞叄糠以上共額徵銀肆萬捌千伍百伍拾叄兩陸錢捌分叄釐陸毫捌絲玖忽陸微捌塵壹漠玖埃壹纎遇閏加銀伍百玖拾玖兩貳錢貳分㭍釐玖毫玖絲伍忽㭍微壹渺叄漠伍埃捌纎共額徵米陸萬陸千肆百㭍拾㭍石㭍斗貳升玖合壹勺捌抄㭍撮捌圭玖粟㭍粒陸黍陸粞陸糠遇閏加米叄拾壹石貳斗石門縣實在田貳千玖百貳拾㭍頃捌畝伍分陸釐肆毫徵銀貳萬陸千壹百壹拾肆兩玖錢捌分肆釐伍毫貳絲壹忽捌微壹渺陸漠壹埃伍纎叄沙徵米叄萬陸千貳百㭍拾壹石叄升伍合壹勺闕抄貳撮伍圭肆粟伍粒㭍黍壹粞壹枇實在地貳千陸拾玖頃壹拾捌畝玖分伍釐玖毫㭍絲徵銀壹萬捌千貳百叄拾捌兩玖錢玖分伍釐陸毫叄絲壹忽陸微㭍塵捌渺玖漠叄埃肆纎肆沙徵米貳萬伍千伍百捌拾伍石㭍斗捌升貳合叄勺壹抄肆撮玖粟捌粒壹黍貳粞玖粃實在蕩灘貳拾伍頃玖畝捌分肆釐肆毫徵銀肆拾貳兩貳錢㭍分貳釐玖毫玖絲伍忽壹微伍塵玖渺貳漠㭍埃叄纎㭍沙徵米壹百叄拾伍石壹斗肆升玖合貳勺壹撮玖圭玖粟貳粒叄黍捌粞肆糠以上共額徵銀肆萬肆千叄百玖拾陸兩貳錢伍分叄釐壹毫肆絲捌忽陸微叄塵玖渺捌漠貳埃叄纎肆沙遇閏加銀玖百壹拾捌兩捌分陸釐伍毫叄絲貳忽肆微貳塵壹渺伍漠叄埃捌纎貳沙共額徵米陸萬壹千玖百玖拾壹石玖斗陸升陸合陸勺叄抄捌撮陸圭叄粟陸粒貳黍壹粞伍糠平湖縣實在田肆千肆百肆拾貳頃㭍拾陸畝肆分叄釐㭍毫徵銀肆萬肆千伍百玖拾壹兩㭍錢肆分壹釐伍毫貳絲陸忽伍微壹塵玖渺捌漠壹埃徵米陸萬貳千伍百叄拾石㭍斗㭍合陸勺叄抄伍撮㭍圭玖粟叄粒肆黍實在地捌百貳拾陸頃㭍拾陸畝肆分捌毫捌絲徵銀肆千貳百玖拾捌兩叄錢捌分㭍釐捌毫㭍絲叄忽陸微玖塵捌漠肆埃肆纎徵米陸千叄百㭍拾捌石貳斗陸升壹合叄勺陸抄伍撮壹圭㭍粟㭍粒捌黍實在山蕩玖拾陸頃叄拾捌畝捌分肆釐壹毫徵銀壹百玖拾㭍兩㭍錢貳分伍釐伍毫肆絲叄忽捌塵叄渺肆漠伍埃徵米叄百肆拾壹石捌斗陸升玖合壹勺肆抄陸撮玖圭壹粟捌粒㭍黍以上共額徵銀肆萬玖千捌拾㭍兩捌錢伍分肆釐玖毫肆絲叄忽貳微玖塵肆渺壹漠肆纎遇閏加銀陸百肆拾玖兩壹錢壹分㭍釐伍毫陸絲㭍忽伍微捌塵玖渺捌漠㭍埃壹纖陸沙共額徵米陸萬玖千貳百伍拾石捌斗叄升捌合壹勺肆抄㭍撮捌圭捌粟玖粒玖黍桐鄉縣實在田肆千叄百玖頃㭍拾捌畝伍分貳釐肆毫徵銀叄萬叄千陸拾㭍兩捌錢㭍分肆釐伍毫叄絲壹忽㭍微壹塵叄渺叄漠貳埃徵米肆萬叄千玖百伍拾貳石肆斗㭍升肆合壹勺壹抄伍撮伍圭玖粟貳粒實在地捌百捌拾貳頃㭍畝壹分叄釐陸毫叄絲貳忽徵銀陸千伍百貳拾玖兩㭍錢肆分㭍釐陸毫玖忽肆微貳塵玖渺貳漠伍埃陸沙徵米捌千玖百玖拾伍石陸斗貳升捌合叄勺捌抄叄撮叄圭貳粟貳粒伍黍陸粞義塜地伍拾玖畝捌分伍釐壹毫例不起科實在山叄頃㭍拾玖畝㭍分叄釐徵銀㭍錢貳分肆釐捌毫陸絲陸忽伍微玖塵㭍渺徵米貳拾石肆斗陸升捌合玖勺陸抄伍撮玖圭貳粟實在蕩壹拾貳頃壹拾肆畝㭍分叄釐㭍絲徵銀玖錢㭍釐肆毫叄忽捌微叄塵貳渺玖漠徵米陸拾伍石玖斗伍升捌合陸勺陸抄貳撮貳圭㭍粟玖粒叄黍蕩地壹頃貳拾㭍畝伍分玖釐陸毫徵銀玖分伍釐叄毫壹絲肆忽貳微壹塵貳渺徵米㭍石肆升捌合玖勺壹抄叄撮肆圭貳粟肆粒義塜草蕩肆畝例不起科以上共額徵銀叄萬玖千伍百玖拾玖兩叄錢肆分玖釐㭍毫貳絲伍忽㭍微捌塵肆渺肆漠㭍埃㭍纎陸沙遇閏加銀陸百玖拾㭍兩㭍錢肆分㭍釐壹毫叄絲壹忽壹微壹塵叄渺肆漠捌埃陸纎肆沙共額徵米伍萬叄千肆拾壹石伍斗㭍升玖合肆抄伍圭叄粟㭍粒捌黍陸粞嘉興所屯田壹百壹拾頃陸畝徵銀貳千陸拾伍兩陸錢捌分肆釐貳毫陸絲陸忽通計嘉興府屬七縣并嘉興所田地山蕩等項共肆萬叄千伍百陸拾貳頃貳拾貳畝捌分叄釐伍毫肆絲貳忽其原徵銀兩於雍正六年奉特恩減免肆萬叄千陸百壹拾壹兩肆錢叄分陸釐伍毫叄絲陸忽玖微㭍塵貳渺㭍漠壹埃伍沙今共應徵銀叄拾玖萬貳千㭍百伍拾兩肆錢貳分壹釐貳毫肆絲捌忽貳微伍塵壹漠捌埃叄沙外加収零積餘米改徵銀貳百陸拾玖兩壹錢捌分壹毫貳絲貳忽玖塵陸渺陸漠貳埃叄纎伍沙孤貧口糧米改徵銀叄千㭍百伍拾壹兩玖錢貳分蠟茶折色加價銀壹百壹拾伍兩貳分伍釐玖毫伍忽叄微伍塵匠班銀壹千肆百玖拾兩玖錢捌分叄釐叄毫肆絲肆忽外賦不入地丁科徵銀壹千玖拾兩伍錢㭍分肆釐㭍毫貳絲壹微玖塵肆渺叄漠伍埃捌纎捌沙通共實徵銀叄拾玖萬玖千肆百陸拾捌兩壹錢伍釐叄毫叄絲玖忽捌微玖塵壹渺壹漠陸埃貳纎陸沙遇閏加銀陸千肆拾伍兩捌錢伍分捌釐陸絲肆忽貳微陸塵陸渺伍漠㭍埃肆纎貳沙又外賦加閏銀捌拾伍兩肆錢肆分叄毫肆忽壹微陸塵壹渺貳埃㭍纎貳沙共徵米伍拾玖萬伍千玖百貳拾玖石捌斗伍升叄合㭍勺貳撮貳圭肆粟貳粒叄黍叄糠捌粃内除収零積餘米貳百玖拾玖石捌升玖合貳抄肆撮伍圭伍粟壹粒捌黍叄糠捌粃孤貧口糧米肆千壹百陸拾捌石捌斗通共實徵米伍拾玖萬壹千肆百陸拾壹石玖斗陸升肆合陸勺㭍抄㭍撮陸圭玖粟伍黍遇閏加米貳百捌拾陸石肆斗明舊額洪武永樂年間田地無考玖嘉靖三十二年田地山蕩河灘等共貳萬千壹百㭍頃貳拾貳畝叄分陸釐有竒夏税麥貳萬㭍千陸百叄拾肆石壹斗捌升玖合伍勺起運壹萬㭍千捌百捌拾玖石伍斗壹升餘存留秋糧米陸拾壹萬捌千陸百壹拾壹石壹升陸合㭍勺起運伍拾捌萬捌千玖百捌拾㭍石貳斗玖升叄合有竒餘存留絲綿伍萬肆千捌百伍拾叄兩㭍錢有竒鈔壹千叄百捌拾貳錠貳貫玖百陸拾文農桑絹陸百叄拾叄疋肆尺㭍寸有竒馬草伍拾萬陸千伍百貳拾㭍包有竒起運肆拾捌萬㭍千貳百壹拾伍包餘存留鹽糧貳萬壹千闕㭍拾捌石陸斗伍升叄合有竒有閏加壹千㭍百玖拾捌石貳斗貳升叄合有竒鹽鈔起運存留夲色鈔各貳萬捌千貳百㭍拾伍貫有閏加貳千㭍百伍拾肆貫叄百㭍拾伍文折色錢各伍萬陸千伍百伍拾文有閏加伍千伍百捌文有竒課鈔壹拾壹萬貳千陸拾錠㭍百陸拾叄文有閏加壹萬叄千捌拾錠叄貫肆百陸拾文貳萬厯三十八年田地山蕩河灘等共肆萬叄千百叄拾貳頃玖拾捌畝玖分玖釐壹毫叄絲科銀叄拾陸萬壹千玖百兩陸錢貳分壹釐捌毫貳絲陸忽捌微壹塵肆渺内除優免銀壹千玖百伍拾㭍兩捌錢玖分壹釐肆毫實徵銀叄拾伍萬玖千玖百肆拾貳兩㭍錢叄分肆毫貳絲陸忽捌微壹塵肆渺科米陸拾壹萬㭍千捌百伍拾貳石貳斗陸升捌合壹勺伍抄玖撮壹圭㭍粟陸粒夏税麥貳萬㭍千陸百叄拾肆石壹斗捌升玖合伍勺絲綿㭍萬叄百叄拾貳兩伍分㭍釐租鈔壹千叄百捌拾肆錠捌百伍拾玖文秋糧米陸拾壹萬捌千陸百壹拾壹石壹升陸合㭍勺馬草伍拾萬陸千伍百貳拾㭍包玖觔壹兩叄錢鹽糧米貳萬壹千伍百㭍拾捌石陸斗伍升叄合捌