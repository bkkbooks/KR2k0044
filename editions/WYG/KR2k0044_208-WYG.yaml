body:
  text: 浙江通志卷二百九列女八紹興府山隂縣周越姬後漢書鄧后紀注楚昭王之姬越王句踐女也昭王讌逰越姬從謂姬曰樂乎對曰樂則樂矣而不可久也王曰願與子生死若此姬曰君王樂逰要妾以死不敢聞命後王病有赤雲夾日如飛鳥王問周太史曰是害王身請移於將相王曰將相於孤猶股肱也不聴姬曰大哉君王之徳妾請從王死矣昔日逰樂是以不敢聽命今君王復禮國人且為君王死何况妾乎妾願先驅狐狸於地下遂自殺南北朝朱百年妻孔氏宋書隐逸傳山隂人百年隐迹避人卒山中蔡興宗為會稽太守餉百年妻米百斛遣婢詣郡門奉辭固譲時人美之以比梁鴻妻元俞新之妻聞氏元史本傳大徳四年新之殁聞年尚少父母欲更嫁之聞哭曰一身二夫烈婦所恥妾可無生可無恥乎且姑老子㓜妾去當令誰視即斷髪自誓父知其志篤乃不忍强姑久病風且失明聞氏手滌溷穢不怠時潄口上堂䑛其目目為復明及姑卒家貧無貲傭工與子親負土𦵏之朝夕悲號聞者惨惻鄉里為之語曰欲學孝婦當問俞母朱淑信元史本傳少寡誓不再嫁一女妙淨㓜哭父雙目失明及長擇偶者不至家貧嵗凶母子相依以苦節自勵士子王士貴重其孝乃求娶焉李如忠妻馮氏兩浙名賢錄名淑安字靜君山隂人其夫李如忠東平人為武寧尹僑居越城初娶特黙齊氏生子任後娶淑安生二子仕仗如忠卒淑安年甫二十七長子任乃率特黙齊氏之黨罄其家貲去淑安竟無渝志有强之者輒毁面流血因厝如忠於蕺山下廬墓哭泣居十六年二孤成立始奉柩歸𦵏留仕奉祀東平携仗還越陸裕妻楊氏徐一夔楊貞姬傳吳人母方擇配越人陸裕適逰吳遂嫁之生男三裕病痿氏事之無少懈其母語之曰何用是彼不起矣不若為他適計氏不荅後又數迫之一日氏方食其母怒其不從痛詈之食下咽氣逆上竟憤懣死後五日其夫亦死郁蔡二烈於越新編郁景文妻徐氏蔡彦謙妻楊氏俱居南池村至正十九年越州罹兵二婦被驅迫以行乃紿兵曰願歸取奩資縱之皆投井死徐允譲妻潘氏錢宰徐烈婦傳名妙圎嵗己亥明兵圍越時潘年二十五嫁同邑項里山徐允讓甫三月允讓父安挈家山西避兵居無何㳺兵掠山西安被執允讓奮與之敵兵舍安殺允讓擄潘欲私之潘放聲怒詈頭觸崖石欲自殺兵愛其色乃婉辭誘之潘知不死被汚欲死不得即紿曰我婦人耳夫死勢必汝從但遺屍暴野縱不得殮得焚以火掩以土使我盡一慟從汝無憾矣兵信之率其伍舁屍就塪地拾枯樹焚之火且熾潘擗踊慟哭號天大呼奮投烈熖以死徐慎妻王氏於越新編至正年兵亂被執赴水死張正蒙妻韓氏元史本傳紹興人正蒙嘗為徳清税務提領至正十九年紹興兵變正蒙謂韓氏曰吾為元朝臣子於義當死韓氏曰爾能死忠我必死節遂俱縊死其女池奴年十七泣曰父母既亡吾何獨生亦投崖而死於越新編次女越奴晝匿山夜守屍尋飢死越經歴率衆瘞之明諸娥明列女傳父士吉洪武初為糧長有黠而逋賦者誣士吉於官論死二子炳煥亦罹罪娥方八嵗晝夜號哭與舅陶山長走京師訴寃時有令寃者非卧釘板勿與勘問娥輾轉其上幾斃事乃聞勘之僅戍一兄而止娥傷重卒里人哀之為肖像配祀曹娥錢奎妻張氏明實錄洪武二十年禮部奏奎妻張氏年二十九而奎亡生男始彌月守節不替事姑尤孝後二十七年姑以夀終張氏七十五嵗卒旌表其門姚彦良妻俞氏明實錄洪武二十六年旌表山隂俞氏貞節禮部言俞氏子體原嘗為禮部員外郎坐法死宜停其旌表帝曰豈可以子不肖而沒其母之賢其旌之朱偉妻馬氏續文獻通考名徳真家病疫舅與夫偕亡姑張氏亦病篤徳真艱難萬狀侍姑疾少愈而母家欲奪其志徳真斷指為誓决不肯從及姑殁撫膺大慟明日死之張希勝妻錢氏𢎞治紹興府志名昇年二十而希勝死舅姑欲嫁之昇聞自縊於室救之得不死舅姑乃不之强遂終其志包余二烈續文獻通考包慎妻徐氏歸七年而慎死無子同邑右族欲强娶之徐禿髪毁形以相拒既知不免竟自縊死時又有余亨妻朱氏亨死朱年二十三無子亨既𦵏辭墓慟絶投河死吳善慶妻孫氏續文獻通考名妙吉農家女也適善慶慶死無子邑人有謀為婚者乃厚賄其尊長令奪之孫知有盟紿以供佛飯僧為亡夫福始行既具齋乃更衣禮佛甚恭頃之竟走夫墓縊死丁阿姑山隂縣志貧家婦夫亡遺腹生一女母家欲嫁之已潛受聘乃紿之歸將適其所謀者阿姑覺躍入水中以救免衆懼遂返於故夫家終不能奪吳氏二節兩浙名賢錄吳曇妻嚴氏曇死無貳志子顯舉進士官刑部郎娶曲阜孔氏淑貞顯卒於官孔扶櫬南還舟抵濟寧氷合父母遣車迎之固辭曰夫柩在此義不能舍至於氷解發舟終不履岸比至顯家闔户毁容以苦節終鄭翰卿妻徐氏嘉靖浙江通志適翰卿僅逾月翰卿出逰山右十年不返徐獨奉舅姑姑疾劇龥天請代疾果愈後翰卿歸甫旬日而病卒徐營殮畢嘆曰向不忍死以夫在耳今夫死矣何以生為絶粒七日卒祁鎡妻孟氏萬厯山隂縣志適鎡甫數日鎡死孟年十九父諷之他歸孟閉户將自盡其姑防之乃剪髮破鏡誓無貳志舅姑殁貧不能𦵏盡鬻其衣服以襄事茹苦六十年蔣論妻戴氏兩浙名賢錄名毓齡早寡有節行既老鄉人欲上其事輒止之曰常事耳何煩官府陳溢妻沈氏山隂縣志年十八歸溢甫十八日溢亡終身不踰閾溢從姪陳鎣妻沈氏亦年十八而寡苦志不貳周英妻何氏萬厯紹興府志㓜受英聘未幾英遘癩疾父母欲背盟女曰兒之不幸曷敢二志卒歸英英死何堅操不改七十餘嵗卒徐氏二節於越新編徐文佩妻鄭氏文佩病亟囑鄭曰我死無子汝將若何鄭泣曰倘不幸俟叔有子即吾子也時叔文鼐之妻童氏始姙尋果生子鄭抱示其夫夫以舌䑛兒首而卒明年文鼐亦卒童與鄭共撫遺孤無貳志胡節妻王氏列朝詩集名素娥號蘖屏能詩文尤妙女紅年十七歸節節以吏曹死北畿素娥誓無他志年四十一卒袁妙善萬厯紹興府志父子純没於王事遺㓜子一人宗黨利其貲者甚衆妙善方待年未字矢願保其弟終身不適人姚烈婦徐渭烈婦姚氏記姚忠女嘉靖三十六年年甫十六嫁朱縉縉父故𣙜吏死而家益貧縉嗜酒失業閲四年并其妻自鬻於某宦家將挈以之京妻覺之患曰是將及我吾族儒家也奈何令儒家女蒙嫌至此欲拒知不可乃夜紉其裾袂以自閉懐石沉河死俞氏三節於越新編俞泮妻馮氏子丕妻錢氏孫廷用妻婁氏俱萬歴年旌劉坡妻章氏舊浙江通志年二十七而寡遺腹生宗周其舅貧甚不能自給章依父以活兄為夀昌廣文迎父至任時宗周年十二章令至夀昌讀書不能辦舟車徒步以往凡三上夀昌幾攣一足其不為姑息如此及宗周鄉舉間謁當途章厲色庭詰謂人須有剛骨方能自立宗周不敢失墜萬歴辛丑登進士未聞而卒累贈夫人王慕貞舊浙江通志王子清女許字劉志學未婚客燕十餘載不返移書令他適王不可及劉客死父母議更聘女泣云劉有姑在瞽雙目以乞貸度日世豈有聘媳二十餘年不得一日之養者乎乃侍其姑七年姑殁守墓數月焚香端坐卒盛夏尸香徹里林大茂妻沈氏紹興府志隨夫京邸夫愛摴蒲廢家業沈處之怡然夫病侍藥飲無頃刻離既而謂曰予死不足慮苐念爾無子苦隻身耳沈泣曰尚復何慮君先行妾且隨君逝矣殮夫畢絶飲食卒劉晉嘯妻馬氏明列女傳晉嘯客死馬年二十餘家無立錐伯氏有樓遂與母寄居其上以十指給養不下梯者十餘年常用瓦盆貯土以足附之隣婦問故曰吾以服土氣耳年六十五年陳大熙妻秦氏紹興府志夫死誓守節父母欲奪之遂自經死言應試妻陳氏山隂縣志娶未一月夫因渡水溺死氏抱屍痛暈欲自縊親屬力䕶乃已俄有奸人艶其姿欲强汚之即引刀自刺幾斃趙嘉彦妻孫氏山隂縣志嘉彦入京死於途氏聞報絶粒十四日而死萬歴年建祠邵二姑紹興府志許配張某張留京不歸家人欲更嫁之姑絶粒死葉文傑妻徐氏舊浙江通志文傑死徐撫孤守節親屬貪其産逼以改醮徐乗夜加禮服越牕投河而死趙貞女山隂縣志名邃㓜好讀書善臨池許俞某為妻及笄夫病將易簀姑利其粧促令于歸入門令一女子假新郎拜花燭訖進房告以實即換服治殮事貞女哦詩有簫鼓未完鐃鼓震畫堂方掩孝堂開之句既而兩姓俱貧勸其再適不從宻受聘欲强劫之女持斧厲聲曰有敢入吾室者不論親疎即為斧下鬼乃悉遁去以針指度日年六十卒陳大本妻李氏山隂縣志大本亡氏年二十一誓志靡他耄姑齒落不能噉食醫者曰得乳方瘳李貧無以購服通草七星湯兩乳湩流朝夕哺姑人謂孝感所致曹氏三節山隂縣志陳氏曹憲妻夫早卒氏年二十五撫二子成立長國正次守正又相繼早亡長媳劉氏二十八嵗次媳王氏二十九嵗課訓諸孤一門三節趙璋妻某氏陕西通志趙楫為延綏中路兵憲長子璋以孝行聞比卒婦殉之里中為立節孝祠李貞女紹興府志孝子陸尚質妻萬歴間尚質父登舟為海潮所淹尚質從岸躍入救父父活而尚質死時李年十七未合􅈟聞夫死孤守終身沈伯燮妻王氏明列女傳議婚數年而伯燮病癘手攣髪秃父母有他意女問沈郎病始何日父曰初許時固佳兒今乃病作女曰諱病求婚負在彼既許而病命也違命不祥竟歸之伯燮病且憊奉事無少怠居八年卒嗣其從子舅買妾得子踰年舅姑相繼亡王獨撫二㓜成立平仲昇妻許氏山隂縣志年二十一仲昇病革顧氏而泣曰親老子㓜饘粥不充其早為計氏嚙指誓守仲昇亡氏勵志堅貞事姑孝撫子耕讀寒暑不輟年七十二而卒吳邦璿妻傅氏舊浙江通志邦璿遇亂有職守囑傅從間道去傅曰豈不能先死遂吉服自縊胡圻妻倪氏山隂縣志文正公元璐姊也年十八適圻圻謁選至京卒氏聞訃以頭觸柱流血欲殉元璐泣解之曰古人云死易立孤難姊有子撫之長以吾女配之乃苦志成家訓子以經史年四十卒朱貞女紹興府志㓜許字周沔未婚而卒女聞往持䘮剪髪以誓遂撫姪為子事紡績以自給偶患疾為延醫診脉女曰吾手豈容他人近乎不許夀七十一卒張拱辰妻施氏錢伯顔妻張氏孫華玊妻余氏吕聰妻田氏王曇妻俞氏鄭谷霖妻周氏陳軾妻錢氏金俊妻張氏汪徳聲妻謝氏朱士忞妻孟氏張旭妻錢氏陳周妻戴氏胡燦妻趙氏宋如珪妻丁氏趙容妻余氏潘宋妻王氏繆禹卿妻濮氏周㵢妻趙氏周箎妻朱氏陳潤妻胡氏朱雷妻沈氏包濟妻周氏馮吉妻王氏俞思妻任氏張衡妻孔氏張遯妻錢氏朱濤妻胡氏朱滇妻張氏陳鑰妻金氏陳滋妻吳氏吳克明妻周氏劉澐妾李氏羅光顯妻劉氏言祚庚妻丁氏陸坦如妻章氏王邦妻孫氏丁元勲妻潘氏金廷瑞妻鄭氏金緗妻譚氏金經妻朱氏潘五鳳妻胡氏陳賢十一妻沈氏金一寵妻黄氏邵鈿妻蔣氏邵奎妻徐氏沈嗣鑒妻俞氏徐良生妻嚴氏徐良輔妻何氏王觀洲妻余氏張聖任妻吳氏金起雲妻孫氏吳振先妻錢氏胡墊妻孟氏周志髙妻章氏俞栢妻施氏黄良輔妻商氏祝汝棟妻徐氏葉廷筌妻朱氏何光造妻沈氏陳樞妻髙氏徐鏜妻金氏徐慶妻尹氏陳㓜學妻馮氏陳至謙妻張氏金有徳妻錢氏陳大綺妻婁氏俞大逵妻曹氏金大紳妻祝氏陳其升妻潘氏陳慈妻石氏胡之紀妻陸氏缺姓禹圗妻謝氏葉大器妻曾氏龔邦柱妻裘氏王大杰妻裘氏許三聘妻潘氏陳核妻徐氏沈燮妻張氏劉繼曾妻汪氏俞𢎞和妻馬氏髙應科妻李氏髙岡妻趙氏張孚妻何氏包懋統妻王氏沈浤妻傅氏髙貴珍妻凌氏髙貴津妻汪氏姚用栗妻唐氏髙公懌妻周氏余燦妻倪氏商周稷妻祝氏俞廷祿妻黄氏余崇禮妻宋氏陳之源妻童氏謝朝賔妻沈氏許應遴妻諸氏周廷栻妻李氏王朝京妻倪氏劉宗元妻嚴氏陳其才妻潘氏鄒寰妻盛氏唐國器妻夏氏章養仁妻劉氏劉景堯妻沈氏徐應奎妻陳氏國朝胡一言妻張氏紹興府志夫亡張年十九有娠五月生子名拱樞身紡績以課之順治間㫖建具題奉坊旌表胡廷聘妻許氏山隂縣志廷聘為鄖陽副將順治四年九月楚寇亂被掠氏斷髪毁容抱石投金魚河死順治十三年鄖陽巡撫胡全才具題奉㫖建坊旌表周方蘇妻吳氏山隂縣志眀季氏與夫失散時年二十九子襄緒生纔九月負之航海身㫖建歴艱險百折不回完節以殁康熙七年具題奉坊旌表駱元裕妻俞氏舊浙江通志康熙十年與同里俞一和妻馮氏俱奉㫖建坊旌表胡世賢妻朱氏舊浙江通志夫亡守節康熙十七年具題奉㫖建坊旌表黄良翰妻商氏題旌册早寡守志不二康熙二十一年具題奉㫖建坊旌表何嘉仍妻錢氏紹興府志年二十夫卒投繯者三力救乃免時值兵燹以利刃自衛誓必㫖建死守節三十八年奉坊旌表吳乾復妻朱氏題旌册夫亡守節孝事舅姑姑疾嘗以乳代羮康熙三十四年具題奉㫖建坊旌表盛國賢妻吳氏題旌册年二十四夫卒氏觸堦欲以死殉其姑䕶之謹得不死遂以女紅自給撫二子之隆之竒有成樊良勲妻諸氏題旌册年二十三夫卒事舅姑撫子守節至五十九嵗卒以上二氏俱㫖建康熙三十六年具題奉被旌者又有金大奎妻葉坊旌表時山隂節婦氏趙自成妻金氏祝𢎞載妻謝氏舊册失載見錢塘施元龍妻孫氏節孝錄中任朝縉妻史氏題旌册年二十八夫卒織絍以養舅姑姑患劇疾不可近侍湯藥者相率避去氏晝夜侍之逾月不解衣兩目幾瞽康熙四十五年具題奉㫖建坊旌表張徵錫妻章氏題旌册夫卒孝事舅姑勤撫㓜子自始至終守志不二張鈞孫妻陸氏題旌册夫卒家貧氏辛勤十指以養舅姑鄉黨稱之以上二氏俱康熙㫖建四十六年具題奉坊旌表劉氏三節題旌册劉源逺妻王氏其弟源通妻陳氏源濬妻沈氏皆少寡遺孤㓜無生産可事且舅姑老三婦親操井臼慘淡焦勞俱能不改其志王時履妻劉氏題旌册年二十七夫亡時舅姑已殁遺孤二長濟世甫四嵗次元暹二嵗撫訓成立各為娶婦濟世夫妻相繼殁遺一女劉又撫之長歸邑人李君則未期而寡亦誓死不二人謂具得於大母之教也元暹子霖舉於鄉劉年八十四卒以上四氏俱康熙五十一年具題奉㫖建坊旌表楊貞女題旌册楊徳藻女許字髙其序未婚而夫卒女衰絰往弔遂守靈不返苦節四十餘年劉士茂妻朱氏題旌册甫嫁而夫卒守志不二歴四十三年如一日以上二氏俱康熙㫖建五十二年具題奉坊旌表單瑛妻陳氏題旌册年二十三夫客死鳳陽家貧甚不能迎䘮氏厯劬苦攻紉績代人刺繡積収傭值五年得十金扶柩歸𦵏子稍長俾從師受學能自立卒年五十三康熙五十四年具題奉㫖建坊旌表金一麒妻沈氏題旌册年二十七而寡遺一子家貧無力延師親為課讀事舅姑生養死𦵏咸盡禮姚𢎞俊妻朱氏題旌册年二十九而寡孝事舅姑訓子成立沈奕世妻何氏題旌册年二十五而寡茹素毁容始終一節以上三氏俱康熈五十六㫖建年具題奉坊旌表徐霍􅅢妻葛氏題旌册㓜許字徐及長而夫有狂疾舅姑辭婚父母將許之氏聞即剪髪自縊父母知不可奪乃歸於徐時年十七霍􅅢不能行禮舅姑使人扶掖結花燭氏夜則依姑獨處晝則調湯藥進飲食侍夫八年無少怠及夫卒氏告舅姑立堂姪允文為子守節至五十七嵗以處㫖建子終康熙五十九年具題奉坊旌表謹按徐霍麓一名延喬本籍上虞人胡世賓妻范氏題旌册早寡守志不二勤紡績以養舅姑撫幼子康熙六十一年具題奉㫖建坊旌表張賔如妻周氏題旌冊早寡守志不二治家飭身俱有禮法雍正二年具題奉㫖建坊旌表胡之柱妻祝氏題旌册二十五而寡事舅姑撫子守節三十七年金樞妻魯氏題旌冊年二十八而寡苦節三十年以上二氏俱雍正三年具題奉㫖建坊旌表同時山隂節婦見於總冊而無年嵗事實者更有李應登妻徐氏陳慈妻石氏朱敬勝妻王氏李仲彪妻陳氏趙玊良妻余氏吳伯宗妻沈氏鄭龍山妻嚴氏題旌冊夫亡無子氏服滷以殉人稱其烈王龔乗妻孫氏題旌冊夫亡守志不二罄衣資殯𦵏數棺撫二子成立周中錫妻倪氏題旌冊夫亡奉舅姑甚孝姑病七年奉侍不倦撫遺孤寛嚴並至以上㫖建三氏俱雍正四年具題奉坊旌表余焯文妻王氏題旌冊年二十四夫亡子甫五齡氏撫孤奉老紡績自瞻熒熒一燈常逹丙夜淒風東雨未嘗少輟性嚴靜闔戸獨處閴然莫窺其面宗黨欽之雍正五年具題奉㫖建坊旌表王柱妻陶氏題旌冊夫逰學於外卒於毫氏乏貲奔䘮悉鬻簪珥命僕扶櫬歸如禮殯𦵏二女三子皆在弱齡撫育教誨備嘗辛苦二女俱適士族三子皆克成立毛鳳麟妻朱氏題旌冊夫亡矢志撫孤始終無玷以上二氏俱雍正六年具題奉㫖建坊旌表吳麟生妻丁氏題旌冊年二十九而寡無子夫弟欲奪其志毁容誓死乃止撫姪斌為嗣斌客逰二十年不返撫媳及孫備極荼苦從姪吳振霍早殀無子妻潘年二十四亦矢志守貞丁復収養於家守節至八十六嵗卒劉昌嗣妻裘氏題旌冊年二十二歸劉甫二月而寡撫繼嗣長忽發狂疾死於外後無可繼臨殁以針指所積置田六畆歸祖嗣俾夫得祔祀焉駱禹庭妻吕氏題旌冊年二十四而寡撫遺腹子成立守節六十三年劉光君妻李氏題旌冊二十九而寡守節至七十九嵗撫三子一女子驥早亡媳魯氏亦能繼姑志朱恂士妻周氏題旌冊年二十而寡無子有諷之改適者不從立姪為後撫至八嵗殤又立堂姪莊為後教育有成姑兩目瞽氏侍奉尤謹守節至四十年陳思永妻姜氏題旌冊年二十三而寡撫遺腹子事祖姑舅姑極孝族有鬻祖墓祭産者氏勤䌟績積十餘年贖之守節三十九年六氏俱雍正七年具題奉以上㫖建坊旌表包鎮服妻喻氏題旌冊年二十六夫卒舅姑俱亡旁無伯叔有諷之他適者氏拒絶之辛勤十指數年力舉三世七棺次第營𦵏守節三十五年唐日著妻丁氏題旌冊年二十八而寡有子四人氏紡績針指以給衣食稍長使各執一業守節四十六年子孫同居兩世不分析遵母教也陳元會妻錢氏題旌冊年二十四夫客死京邸無子姑以家貧叔㓜力不能支令氏更適氏誓死不從晝夜勤十指易米養姑及叔而自食糠籺叔長生子文炯即繼為後守節三十年以㫖建上三氏俱雍正八年具題奉坊旌表陳天錫妻張氏禮部照會天錫官雲南司獄逆蠻烏䝉叛天錫同妻張氏死之雍正九年㫖建雲南總督鄂爾泰具題奉坊旌表王聖歴妻樊氏題旌冊年十八歸王二十七而寡欲從死翁曰爾殉吾子褓中兒誰其撫之乃飲泣承命撫孤事翁孝隣婦有不能事其親者聞風而化守節至三十四年而卒何炤妻朱氏題旌冊年十七歸炤時炤已病劇扶掖成禮未嘗同衾枕也逾月夫卒舅姑父母欲嫁之氏誓死不從乃止氏念翁姑無後鬻衣飾為翁納妾生二子翁姑繼殁撫兩叔成立繼叔子為嗣孫曾林立何氏之宗頼以不絶守節七十一年而卒沈世法妻胡氏題旌冊年十九歸沈二十九而寡守志撫孤及孤長逰京師氏一日忽語人曰後二日是吾子生日吾將以是日去使吾子每遇生日即憶吾身也果於是日無疾而逝年五十六韓璜妻陶氏題旌冊年十七歸璜二十九夫亡家徒壁立鬻居室以殯𦵏遺孤僅五齡氏畫夜紡績育之子稍長出就外傅凡修脯無不出自十指間守節三十年施恒妻馮氏題旌冊年二十二適恒二十四而寡子未週嵗家貧藉女紅自給事舅姑孝教其子有樹立守節五十三年周敏公妻柯氏題旌冊柯與周皆紹興後帮運丁也柯年十八適周生四子而夫病於漕艘中氏日則沿途延醫療治夜則龥天祈代夫卒氏年二十八家日落勤織絍以給朝夕撫訓四子有成守節五十五年而卒年具題奉以上六氏俱雍正九㫖建坊旌表丁珏妾吳氏禮部照會珏任雲南揚武壩巡檢管青龍厰事思普叛逆珏陣亡氏為賊所擄賜祭欲汚之不從被殺事聞𦵏胡廷銓妻司馬氏題旌冊年二十八而寡撫子守節三十五年陸元禭妻沈氏題旌冊年二十四而寡撫子守節五十八年以上二氏俱雍正十年具㫖建題奉表坊旌宣有玊妻金氏題旌冊有玊卒氏年二十二舉遺腹子元仁姑葉亦早寡兩世孀居家益貧窶氏奉養惟謹有叔二人皆㓜氏工紡績又善蠶繰嵗鬻可數十金為二叔婚娶子長令從名師學有文行貢入㗖之即愈明年均為士林所重姑患痢割左股作又割右股姑不起氏哀毁彌篤守節五十九年年八十無疾而終沈氏二節題旌冊沈予揚妻丁氏年二十歸沈夫患羸疾懼宗支莫繼鬻簪珥置妾馬氏期年得一子夫亡率妾矢志同守上事耄翁下哺孤雛後翁夀終力營䘮𦵏子長婚配生三孫守節五十六年馬氏事嫡如母訓子不為姑息同丁守節五十六年劉氏二節題旌冊劉逺逵妻薛氏舉子燝纔週嵗而夫殁薛曰一死易撫孤難吾為其難者因上事老姑生養死𦵏咸盡禮撫燝年二十一娶施氏期年生一子而燝卒於沁水訃至施慟不欲生薛謂施曰汝年二十八而寡視吾已踰五載幸而有孫宜善撫之哀慟無益也凡疾痛疴癢防䕶惟謹長而延師課讀俾得樹立薛年五十八嵗而卒施後姑十五年而卒姑媳俱守節三十六年郷里稱為一門雙節奉以上五氏俱雍正十一年具題㫖建坊旌表馮國義妻朱氏題旌冊年二十八夫亡遺腹生子氏閨門整肅居一室中足不出户撫教其子成立守節二十年卒丁勝千妻徐氏題旌冊勝千客死京邸氏時年二十四上有舅姑下有子女二人旁無伯叔氏乃健持門戶以供菽水姑性卞急奉侍尤謹能得其歡舅姑殁力營䘮𦵏子殤撫女長擇婿嫁之守節三十三年胡藎臣妻沈氏題旌冊年二十五夫亡姑得痺疾氏扶持左右數十年無倦色長姒孀居無子繼嗣逺客他郡氏命其子事之如母後卒於武林氏渡江親為殯殮姒所繼姪歸目雙瞽氏養之於家如已子守節六十五年正十二年具題奉以上三氏俱雍㫖建坊旌表胡昇猷妾楊氏題旌冊生而端莊靜一在室時父病常終宵侍側籲天願以身代父遂痊刑部尚書胡昇猷聞其孝納為側室尚書卒氏年二十四扶櫬歸里服闋猶衣縞茹素屏絶膏沐或疑其矯微諷之即勃然變色水霜自矢族黨咸髙其行守節三十四年張經文妻王氏題旌冊年三十而寡撫二子各為娶婦生孫五人子俱殀更撫五孫成立守節四十一年張絲如妻俞氏題旌冊年十九夫亡有勸之改適者氏曰夫婦之義一日百年吾不能為狗彘行也事舅姑備極孝養撫姪懋昭懋禮為子守節二十二年劉視履妻陶氏題旌冊年二十八夫亡遺腹生子事舅姑以孝聞舅姑殁䘮𦵏如禮子稍長氏出夫遺書督課之守節五十三年陳安世繼妻陶氏題旌冊年二十八夫亡前室遺一子一女氏生三子最㓜者生始七日家貧織絍以易衣食夫之叔無子氏以第三子為之後叔客死湖廣命子往扶櫬歸𦵏先塋守節四十一年徐汝檜妻孫氏題旌冊汝檜以家貧餬口京師氏奉養舅姑辛苦食貧夫客死氏時年二十八事舅姑益謹舅姑殁竭蹷營䘮𦵏衣食器用典鬻罄盡家益困卒能撫教二子咸有樹立守節三十三年王文俊妻沈氏題旌冊年二十四夫亡遺子女各一氏孝事舅姑始終不懈撫子女長為婚嫁守節三十五年李繩武妻王氏題旌冊年二十夫亡無子欲以身殉既而曰舅姑止夫一子夫死吾當代子職也遂勉事舅姑克盡孝養舅殁姑常有疾與姑同寢處扶持不離左右守節三十五年以上八氏俱雍正十三年具題候旌丁瑞南妻周氏紹興府志順治初年㳺軍入村落見氏姿美擕其臂去至河干遂躍入水死時年二十三里人立石於死所曰丁烈婦盡節處周振躬妻徐氏舊浙江通志順治初越地新定工寇出没居民率匿水鄉忽聞有衆至徐曰事急矣抱兒赴水死次早屍浮出猶堅抱其兒虞養吾妻王氏山隂縣志居盛塘上埠順治五年羣寇嘯聚氏懼汚沉水而卒又羅紹南妻魏氏居盛塘下埠土寇竊發氏抱子沉河一女九嵗見母溺亦赴水死遺一子君友娶張氏君友早卒張氏亦守節終身朱夀宜妾何氏山隂縣志順治五年土寇擾白洋村氏年三十恐辱身自沉於河又朱文姐名菊秋年十五投池死蔡引翼妻倪氏懼寇追及沉於湖門村之水時湖門村有馬氏者被掠不從死之王某妻楊氏遭寇威脅罵詈弗絶被殺何某妻徐氏紹興府志土寇發徐擕女長姐避山中賊至欲汚之徐罵賊賊以刃刺其腋抱女以去徐大呼曰兒有死無被辱女應聲曰必不負母賊亦刺之又周曰禮妻楊氏許大化妻趙氏王應爵妻蔡氏徐大化妻李氏徐道祿妻董氏嚴文貴妻王氏皆因山寇竊發同時殉節杜文達妻何氏紹興府志年十六山寇至琶山懼為所汚投河死謹按舊浙江通志作杜文逺妻葉氏二節金廷韶葉氏節烈傳璩氏浦江人適山隂葉喬年甫十載喬年殁遺孤三撫教成立明季山寇竊發人民竄山谷間長子為寇所殺氏與寡媳金氏走亂軍中遇賊數騎追至氏知不免遽躍入河金亦隨之順流至淺灘俱得不死事定歸里家業蕩然姑婦相依荼苦拮据以終其身三子俱無嗣鄉里哀之吳大節妻俞氏舊浙江通志丙戌六月遇兵恐其相犯同母沈氏自沉於龍華潭母年三十六女年十七大節亦終身不娶傅五妻某氏舊浙江通志己丑山寇肆掠氏被執上馬至三江閘躍入水中死翁氏二女舊浙江通志翁貞姑良姑同避寇漁後橋寇欲汚之遂挽手投水而死王良臣妻陳氏山隂縣志生子學信氏年二十六良臣死家無宿糧氏紡績為生子長娶媳陳氏生孫方期子又殀姑媳堅守媳年四十八而終㷀㷀老婦年至九十餘郡守給匾曰雙節茹芳妻倪氏舊浙江通志年十七歸芳芳與武弁有隙兵至芳遁掠氏及其子女氏與姑泣訣曰身惟一死弁羈之空舍舍臨龎公池抵暮越窗出投池水死朱振伯妻張氏紹興府志家貧有厮卒慕其色誘其夫貸金後無以償遂勒書賣妻劵劵成即来舁氏氏紿卒至晩抱乳㓜兒束髮縫衣赴水死周逢甲妻吳氏周清原周節母傳年十七師周二十二嵗逢甲卒絶粒三日宗長勉以立孤因漸進湯水子遐祚生甫數月徧體瘡痍奄奄不舉氏艱辛乳哺遂嬰心疾瀕死復甦者再稍長脱簪珥延師課讀俾得樹立翁中瘋疾日侍湯藥夜則禱天祈代竭蹷以供參苓殁則䘮𦵏盡禮事繼姑曲盡孝敬姑患風痺晝夜扶掖代為盥櫛親滌垢穢四十年不少懈年九十而卒遶膝孫曾一堂五世人以為節孝之報康熙三十七年三學公舉旌奬沈大姑王士禎沈烈女傳父達人僑居京師許字同郡朱謙穆謙穆㓜孤母龔氏年十九苦節撫子迄於成立以貧故未能娶無何謙穆病篤大姑聞之自誓歸朱脱夫有不諱願奉孀姑終身言己即日命駕歸朱氏居五日謙穆死大姑撫尸一慟而絶時康熙戊寅六月也年甫十九王汝華妻包氏紹興府志年十九而寡家徒四壁紉衣為生孝養耄姑至百嵗擇宗人五嵗子業滙為嗣撫養成立子亦以孝稱沈鼎猷妻嚴氏山隂縣志年十六適沈七載夫卒家甚貧織絍自給康熙乙巳五月望夜室中火氏驚起倉卒覓衣不得里中趨救者至氏曰吾裸體以生不若死急出其子於門外疾掩門焚死時年二十五周氏二女山隂縣志周氏安貞許配王宗仁未婚聞夫訃親往殯殮矢志不字妹恭貞許配阮廷諭亦未婚廷諭殁於京邸柩回即往哭矢守二氏俱周祖儀女有雙貞集陳氏三節山隂縣志薛氏陳允正妻年二十八守節教子子亡撫兩孫而次孫復殀孫婦全氏甫十八克嗣祖姑志其從妹為堂娣姒亦二十嵗䘮偶守貞完潔人稱一門三節陳氏二節山隂縣志趙氏陳永妻永卒氏年三十妾翁氏年十九同紡績度日辛勤勿懈翁氏無子宗人欲奪其志卒不能移歴六十餘年其苦節尤人所難車安妻鍾氏田軒來車節婦傳吳融村鍾某女年十七歸安甫三月而安逰京師逾年卒翁欲嫁之氏泣曰翁老無子誰供子職頥勿嫁以事翁翁乃不之强懼其父有他意絶不歸寧家赤貧勤十指以奉菽水翁性卞急稍不適輒加詬詈或至箠楚氏委曲承順無幾微倦怠翁歿鬻所居之室以事殯殮躬親負土奉姑柩合𦵏焉身無所歸依其夫之寡姊以居先是有士人某外出數年不返其妻挈㓜子僦居於氏翁之隣或饔飱不給氏每節縮口食以飯其子後士人貴命其子餽以金却不受囑其妻迎養於家氏曰吾孀婦豈可入他人室耶堅拒不往可謂節孝而知禮好義者潘烈女周炳曾詩序山隂潘公調女公調客廣東擕家於粤以女許袁氏子公調殁依孀母劉以居袁嫌其貧將别求婚於張氏欲渝潘盟而不得乃造為穢語潛榜其門潘年已二十矣一夕投井死里巷寃之即其地立祠厲貞女紹興府志許字陳洪濛子仲枚而仲枚不知所之有欲奪之者女誓不從苦節五十年趙貞女紹興府志髙惟良聘妻惟良年十八未婚而死女往持䘮誓死不二期年死陳澍之妻胡氏舊浙江通志與中表沈毓秀妻倪氏俱年二十餘夫死相約曰夫死不殉何以生為遂截指明心苦守不二後死納指棺中目方瞑俞文衡妻陳氏舊浙江通志與妹張汝為妻皆早嫠矢志不二母姑外即昆弟亦罕見其面所居有隻燕来棲並無儔侣世稱節孝者以陳氏雙貞為最著楊霽妻沈氏懿行錄年十六適霽甫八日而霽暴卒欲以身殉水米不進者十餘日以舅姑老夫弟尚㓜强起事舅姑先意承志飲食服御必躬必親朝夕不離左右有疾則衣不解帶焚香告天願以身代及殁哀毁骨立䘮𦵏盡禮撫姪為嗣視如所生荼苦自甘足跡不出户外守節五十五年楊琳妻陳氏懿行録年二十適琳甫一嵗而琳卒遺腹生一子卒勤紡績事耄翁生養死𦵏咸出十指撫孤成立守節五十年傅朝煃妻王氏公舉事實年十七歸朝煃二十六而寡無子繼夫兄朝炯之子綜為嗣家貧日夜紡績撫綜成立為娶其弟之女為婦綜事母甚孝與其婦同刲股以療氏疾氏性嚴厲少不懌輒終日不食綜與婦俱長跪終日亦不食後綜死復無子氏又撫姪綬之子汝璣為孫姑婦相繼守節姑年七十三而卒婦守節亦三十年人稱雙節朱氏二節公舉事實張氏朱書述妻余氏朱式孟妻張年二十五書述亡子㓜舅姑勸其改適張誓死不從日夜紡績以伊甘㫖育㓜子守節三十九年余年二十式孟亡式孟夙患瘋疾余歸後扶持左右者四年無嗣家貧甚同族無肯繼者余哭告宗黨為立應繼以女工餬口守節三十八年賀靖妻凌氏公舉事實靖為衛輝守備卒於官氏年二十七擕孤扶櫬歸𦵏姑陳氏雙目俱瞽性復卞急氏孝事之病則割股以進殁則鬻産營𦵏家益貧紡績課子守節四十六年盧陞寵妻徐氏公舉事實氏㓜䘮父事母孝母病刲股療之年二十七歸陞寵二十九而寡遺孤二嵗家貧舅姑老氏鬻手以給朝夕撫孤成立守節四十五年馮國義妻朱氏公舉事實年二十八而寡撫遺腹子提擕鞠育足不踰戶外苦志二十年唐克信妻趙氏薛化龍妻張氏王資徳妻徐氏髙萬善妻馮氏劉宗祺妻楊氏陶學淵妻謝氏翁嘉引妻胡氏沈翼范妻謝氏陳應魁妻曹氏劉重妻吳氏沈元肇妻髙氏劉竒妻馮氏沈重蔣妻祝氏沈鼎范妻朱氏趙自成妻金氏張麃芳妻陳氏王士璉妻錢氏吳鳳翀妻馬氏馮可信妻王氏沈庠妻魯氏楊大津妻王氏唐瑾妻陳氏俞應衡妻周氏陳澍妻胡氏施元魁妻張氏王漢妻張氏王錫彛妻龔氏沈衮妻韓氏謝啟文妻陸氏妾馬氏譚瞻明妻錢氏胡明試妻丁氏胡徳隆妻龎氏胡懋賞妻王氏謝應京妻王氏劉廷輔妻薛氏朱兆栢妻李氏沈道錦妻劉氏劉互赮妻吳氏劉之佑妻王氏吳允登妻徐氏馮應震妻陳氏沈銘新妻劉氏茹明卿妻陶氏髙恩妻包氏王耀基妻張氏吳霈妻張氏柴明盛妻傅氏張志遂妻袁氏徐慎妻何氏孫萬化妻魯氏周燮儀妻夏氏胡焜妻沈氏馮光禧妻王氏胡清妻魯氏陶某妻朱氏茅伯瀚妻徐氏陳廷傑妻謝氏傅廷諤妻胡氏倪尚鵬妻張氏譚勤和妻俞氏金大經妻徐氏張師栻妻魯氏諸盤如妻相氏俞世實妻周氏沈祖孟妻俞氏王學進妻堵氏金伯鈞妻劉氏張有梅妻吳氏潘鳳林妻朱氏姚元道妻傅氏王錫輿妻周氏金樑妻黄氏潘世式妻酈氏蕭明榮妻王氏謝允元妻王氏俞懋昭妻秦氏茅本竒妻金氏茅彚縁妻金氏王士騶妻舒氏金明宇妻吳氏鄭汝銓妻潘氏鄭懋徳妻陳氏李茂秀妻余氏薛萬鼎妻周氏馮肇權妻沈氏胡靖妻陳氏胡鰲妻賞氏姜宗斌妻王氏李廷瞬妻金氏李籓先妻鍾氏余邦秀妻髙氏陳非熊妻髙氏趙三泉妻薛氏陳錫琳妻姚氏周之尹妻魯氏詹某妻朱氏姚宗虞妻單氏邵承祖妻堵氏許燿明妻王氏秦巽川妻徐氏姚應運妻陳氏施瑞霖妻陳氏蔡思堂妻孫氏王一英妻陳氏沈雲驤妻陳氏李允國妻何氏婁邦憲妻陳氏范某妻謝氏范楚翹母戴氏王三重妻傅氏會稽縣晉王凝之妻謝氏晉書本傳字道韞安西將軍奕之女也聰識有才辨叔父安嘗問毛詩何句最佳道韞稱吉甫作誦穆如清風安謂有雅人深致又嘗内集俄而雪驟下安曰何所似也安兄子朗曰撒鹽空中差可擬道韞曰未若栁絮因風起安大悦適王凝之及遭孫恩之難聞夫及諸子為賊所害命婢肩輿抽刀出門亂兵稍至手殺數人乃被擄其外孫劉濤時年數嵗賊又欲害之道韞曰事在王門何闗他族必其如此寧先見殺恩雖毒虐為之改容乃不害濤自爾嫠居會稽家中莫不嚴肅初同郡張元妺亦有才質適於顧氏有濟尼者逰於二家或問之濟尼答曰王夫人神情散朗故有林下風氣顧家婦清心玊映自是閨房之秀道韞所著詩賦誄頌並傳於世張茂妻陸氏晉書本傳吳郡人也茂為吳郡太守被沈充所害陸氏傾家産率茂部曲為先登以討充充敗陸詣闕上書為茂謝不克之罪詔曰茂夫妻忠誠舉門義烈宜追贈茂太僕謹按張茂會稽郡人傳見忠臣門南北朝陳氏三女南史本傳會稽陳氏有三女祖父母年八九十老無所知父篤癃病母不安其室遇嵗饑三女相率於西湖採菱蓴更日至市貨賣未嘗戯怠里人稱為義門多欲娶為婦長女自傷㷀獨誓不肯行祖父母尋相繼卒三女自營殯𦵏為菴舍居墓側張楚媛梁書張稷傳稷為青冀二州刺史州人徐道角作亂夜襲州城害稷稷長女楚媛適會稽孔氏無子歸宗至稷見害女以身蔽刃先父卒張彪妻楊氏嘉泰會稽志陳文帝入會稽彪與妻楊氏還入若耶山陳遣章昭達領兵購之并購其妻彪見殺進兵迎楊楊便改啼為笑請昭達殯彪既畢還經彪宅謂昭逹曰婦人本在容貌今辛苦日久請暫過宅粧飾昭達許之楊入室割髪毁面哀哭慟絶誓不更行文帝聞之嘆息遂許為尼宋孟道淨於越新編許字章璘未歸而璘卒道淨誓不再嫁未幾兄嫂相繼卒道淨獨事父母無缺撫兄遺孤二人皆成立張孟珪妻方氏於越新編夫卒子甫二嵗方年二十四守節終身元馮道二妻於越新編不知何氏女至正未亂兵至柵頭執道二殺之露刃脇婦婦引頸受刃死明樓可先妻王氏宋濂王貞婦傳名妙清年及笄歸樓生二子而樓亡婦以節自誓朝虀暮鹽或不能給人數有撼之者志如鐵石弗可動舅姑亦憐其少欲俾更適婦不從舅姑義之自是事舅姑益致其恭教二子從良師㳺知問學夫死時年二十七董昇六妻丘氏會稽縣志一子甫週嵗昇六死遂守節昇六兄樵風繫獄死逮及闔門丘氏抱子械至京師發配象奴氏觸階死而復蘇又恐以白刃欣然就之太祖曰真烈婦也命備紅船送回其地賜名全節里范氏二女名山藏長適江氏一月而寡次將歸傅氏而夫亡二女同築一垣圍屋數椽田十畆於内相守以居當種穫時父率傭以入餘日皆閉户雖灌田亦溝引而已如是者三十年復自為塋而合𦵏焉傅樂清妻李氏范欽傅氏族譜序永樂四年樂清由諸暨始遷於府城之南街未幾即世遺子鉞甫生三月氏守志撫孤克勤克儉以養以教家業大起孫曾輩皆砥行讀書克自樹立遂為南街望族宋允中妻魏氏兩浙名賢錄年十六贅允中僅三日而允中歸尋卒其家大之投骸澗水氏奔赴拾骸還瘞家圃中服䘮三年父母欲嫁之受他幣比迓者臨門氏潛之圃中自縊死朱泰妻吳氏萬厯會稽縣志姑唐病痿而性暴時加箠撻已輒起進飲食懽如也既而泰死無後或勸之他適輒號踊欲絶奉姑益謹與姑相繼殁司馬貞女會稽縣志許配董思述未歸而思述訃聞氏遂絶飲食卒兩姓構棚厰以紙俑行婚禮合𦵏珠湖山沈束妻張氏妾潘氏名山蔵嘉靖中束入為禮科張自後隨之時束尚無子張買潘氏女為妾與之俱及至則束下獄張謂潘曰汝年少且未見主公當自審擇之潘曰主公抗節夫人苦節婢獨非人乎與張俱守京師時束父年八十七張伏闕上疏請代夫繫獄放束歸養三上不報乃與潘治女工給橐饘及束出獄得心疾歸而家益落張身執爨而令潘當夕隆慶初復官不就家居十餘年竟卒無子亡何潘亦死山隂徐貞明表之曰一門風節沈袠妻胡氏明列女傳將嫁而袠遘父錬難二兄衮褒杖死塞上袠與兄襄並逮繫宣府獄總督楊順逢嚴嵩意必欲置二子死獄卒知其意虐苦之已令夜分具二子病狀薄暮兩監司視獄呼襄袠出命且緩襄等不測明日問之則順為給事中吳時来所劾就檻車去矣襄等遂得釋然袠自是病嘔血匍匐扶父䘮歸比服闋始婚胡已二十七踰六月袠疾大作將不起呼婦叩之對曰向未婚時吾父及昆弟疑君疾逡巡不欲遣我義不回今日固所甘心袠遂卒婦哭不絶聲盡出奩具治䘮事有他諷者斷髪剺面絶之終日一室中即同産非時不見晚染疾家人將迎醫告其父曰寡婦手豈可令他人視不藥而卒年五十一以襄子嗣王泰妻倪氏會稽縣志泰以白父寃追隨巡按冒雪千里父寃得白而泰卒氏年僅二十餘家貧苦節事姑盡禮教子成名夀至八十八嵗卒羅道妻朱氏明實錄隆慶三年旌表節婦朱氏羅道妻道死朱年二十一父母因其年少無子欲奪其志而道弟謀得兄産亦百端擠之氏以死自誓立道兄子拱璧為嗣年六十二而卒卒後三年其孫萬化以恩例陳請禮部行勘得實故有是命董氏二節會稽縣志吳氏董浦妻生一子而浦卒氏年二十撫子至長娶諸氏未幾子又卒姑婦相守四十年世稱雙節金氏二節會稽縣志陳氏年十七適金勝宗三年勝宗死遺腹子志清娶張氏志清死於京張年二十姑婦并志以守共處一室並九十餘而終毛烈女會稽縣志許配董奕文奕文卒女美姿容求婚者日至女盛粧拜父母曰女生不能為董氏婦死當為董氏鬼矣父母朝夕守之絶飲食卒陶望齡為歌詩以贊之沈夀姐舊浙江通志年十八母早殁父以貿易出依寡居伯母吕氏吕適歸寧姐過其從伯母張氏以宿夜有狂且欲犯之姐驚駭大哭次日服滷死陶尚文妻秦氏會稽縣志年十六歸陶纔十日尚文死踰年舅卒家貧氏與姑日纔一炊以孝養聞氏新寡時父母諷使二適氏閉户自盡救乃免是後母家不敢言以伯氏子本正為後本正亦誠愿力作晚乃饒裕云陶尊道妻李氏會稽縣志嫁五日而尊道病卒家極貧縫紉浣濯析薪釋米靡不躬行居十九嵗伯婦始生子養之為後詔旌其門朱宇周妻楊氏紹興府志夫以株連繫獄氏聲寃莫雪自經於杭州當事聞之宇周得出獄終身不娶章如鍔妻張氏會稽縣志夫蚤殁悲號欲絶及殮畢遂自縊於柩旁族人為之舉䘮陳孔教妻孔氏紹興府志崇禎未孔教任四川僉事以獻賊破蜀死子以衡匿其狀不與母知踰二年氏偶至子書室見兵備道請䘏孔教盡節事讀畢哀號殞地遂引匕首斷喉死金順姐會稽縣志父明惠任保定府通判順姐隨父於宦寓昌平州遇難投井死時年十九揺士忠妻鮑氏舊浙江通志士忠官京師甲申城陷氏同夫暨二女媳趙氏俱縊死次女金哥自縊氣未絶賊欲汚之女㧞劍大罵不屈死黄朝輔妻謝氏紹興府志寓居三江遇寇赴水死葉汝妻某氏紹興府志汝聞甲申寇夑赴水死妻亦同之章憲妻金氏會稽縣志安慶逰撃章方美媳遇兵難脅之不從乃寸磔之兵有以其肉為戲者即譫語死鄭遵謙妾金氏舊浙江通志遵謙為鄭彩所害金氏每祭夫必縛草人書彩姓名寸斬以侑食彩聞之投金氏於海中屢顯靈異人稱小金娘娘蔡貞女紹興府志許聘余金聲未婚而金聲殁女截髪自矢遂歸余苦節終身張裒妻胡氏邵仲文妻張氏金伯珣妻秦氏沈源妻俞氏金雷妻董氏王鑑妻蔡氏章柔妻余氏曹繼祖妻馬氏王之驥妻祝氏馬瓚妻馮氏章楷妻沈氏胡慄妻祝氏錢盛妻李氏韓釋可妻薛氏王金妻張氏葉應暘妻錢氏董和妻姜氏朱大有妻何氏董能八妻黄氏胡詡妻倪氏胡憲妻章氏胡某妻宋氏胡止善妻楊氏施鳳翥妻張氏陳敬山妻張氏薛允勛妻孟氏陳啟新妻俞氏王起錫妻吳氏金應寵妻丁氏姚士錫妻王氏郁逵妾石氏倪濟妻趙氏郁士淇妻王氏陳元隆妻范氏章某妻某氏陶履中母髙氏謝錫衮妻吳氏周伯英妻金氏平昇妻馮氏商周禮妻祁氏王萬栢妻奚氏錢珠妻張氏袁祖烈妻髙氏陳文錦妻李氏金侣仙妻宣氏董栗妻樊氏章旻妻戚氏章懐仁妻陳氏馮秉忠妻魯氏章以裁妻童氏倪元妻胡氏國朝金日昌妻章氏紹興府志年二十而日昌卒氏事姑孝撫孤成立順治十五年具題奉㫖建坊旌表范懐義妻尉氏會稽縣志年二十七而懐義卒氏撫遺孤成立年七十四終戴應龍妻柯氏會稽縣志年二十二而應龍卒氏守節撫孤八十五嵗卒以上二氏俱㫖建奉旌表不詳具題年分坊陳家驊妻蔡氏題旌冊年十九而寡守節至五十四嵗康熈二十三年具題奉㫖建坊旌表倪運采妻徐氏題旌冊年二十二而寡守節至五十三嵗康熙三十五年具題奉㫖建坊旌表范居敬妻陳氏題旌冊居敬客死京邸氏年二十九迎櫬歸𦵏訓子鈺甚嚴守節六十一㫖建年康熙三十八年具題奉坊旌表傅紫樞妻魯氏題旌冊年二十三而寡守節至八十二嵗康熙三十九年具題奉㫖建坊旌表唐祖堯妻劉氏題旌冊年二十四而寡守節至五十九嵗康熙四十四年具題奉㫖建坊旌表章氏三節題旌冊章成化妻張氏年二十三夫亡守節三十四年章志純繼妻陳氏年二十一夫亡撫教前妻二子紳承熙俱得成立守節三十八年其姪章承烈妻嚴氏年十九夫亡與陳氏嚙㫖建指流血守節四十一年康熙四十七年具題奉坊旌表俞徳範妻韓氏題旌冊有韓國英者欲犯之堅拒不從而死康熈四十八年具題奉㫖建坊旌表石珍儒妻陳氏題旌冊年二十九夫亡守節三十三年康熙四十九年具題奉㫖建坊旌表葛三姐題旌冊㓜許配陳再韓為妻及長隨父居京師有江西民楊天錫用强逼娶遂自縊而死㫖建雍正二年具題奉坊旌表朱廷棟妻婁氏題旌冊夫客死粤中氏年二十一家赤貧積錙銖以歸夫柩上事兩代耄姑下撫三齡㓜子守節二十三年孟昇宇妻黄氏題旌冊年十九嵗而寡守節五十四年馬如騂妻王氏題旌冊如騂死氏孝事舅姑撫遺子終始一節以上三氏俱雍正三年㫖建具題奉坊旌表施若耶妻秦氏題旌冊年二十二夫亡截髪矢志事兩孀姑克盡孝敬撫三子敷敞敉俱有成每倚夫墓古栢慟哭樹為之枯守節至六十七嵗而卒嚴禹生妻祝氏題旌冊年二十二而寡或諷之改嫁氏持刀截髪誓不變志守週嵗遺孤成立苦節三十九年嚴聰妻徐氏題旌冊年二十八嵗而寡守節四十六年董鉅徳妻劉氏題旌冊年二十六嵗而鉅徳卒氏矢志撫孤守節四十二年以上四氏㫖建俱雍正四年具題奉坊旌表杜浚英妻魯氏題旌冊年二十四而寡浚英兄弟四人皆早逝惟存氏妯娌二人奉姑以居姑患疽氏撫摩不離左右其姊化之亦不稍懈翁墓為水所浸氏急鬻簪珥遷𦵏撫二子有成守節至七十二嵗而卒王琳妻俞氏題旌冊年二十六嵗而寡守節至七十一蔵以上二氏俱雍正五年具題奉㫖建坊旌表包楩妻藍氏題旌冊年二十而寡守節三十三年撫遺腹以延一綫今孫曾林立有舉科甲㫖建者人謂苦節之報雍正六年具題奉坊旌表馮文燭妻孫氏題旌冊歸馮四年而夫卒時年二十八躬織絍積累數年始得營𦵏其夫課子士坦有成守節五十二年陳泰觀妻夏氏題旌冊年二十九夫亡守志撫二子世統世良俱有成立守節三十一年馮肇權妻沈氏題旌冊年二十三而寡無子繼姪燿為嗣守節四十年沈汝鏡妻章氏題旌冊年二十七而寡家貧紡績撫孤守節四十年以上四氏俱雍正㫖建七年具題奉坊旌表馮錫麟妻吳氏題旌冊年二十九夫客死於粤撫孤成立守節三十二年嚴懿妻王氏題旌冊年二十八而寡守節三十三年以上二氏俱雍正八年具題奉㫖建坊旌表俞元龍妻李氏題旌冊年十八歸俞二十三而寡兩子俱㓜氏奉舅姑二十餘年孝敬不怠舅姑殁䘮𦵏盡禮子亦能自立守節至五十三嵗卒馮文燦妻錢氏題旌冊氏三嵗失恃育於後母以孝聞年二十一適馮二十七夫亡姑繼殁氏事衰翁雖極貧苦而甘㫖未嘗缺教子士珪㳺庠食餼晚嵗子又卒又教其孫守節五十七年㫖建坊以上二氏俱雍正九年具題奉旌表任肇智妻婁氏題旌冊適任九月而夫卒氏决意從死方娠舅姑勉諭乃稍進水漿舉一子事舅姑甚孝比卒猶囑其子曰兒無父能善事祖父母則爾父不死矣年四十五卒守節二十三年謝兼才妻劉氏題旌冊年二十四而寡絶食數日立志撫孤生子全聰又殀與媳王氏同心苦節以撫一孫姑疾篤親為嘗糞以决生死龥天願以身代姑遂愈舟過大樹港烈風陡作隣舟俱溺氏舟亦幾覆忽旋風泊岸人以為節孝所感以上二氏俱雍正十年具題奉㫖建坊旌表王錦妻單氏題旌冊年二十九而錦卒氏撫遺腹子守節二十三年雍正十一年具題奉㫖建坊旌表范士沆妻徐氏題旌冊年二十三夫亡遺孤甫五月舅姑老旁無伯叔氏勤女紅以上事㫖建下撫健持門戸守節五十年雍正十二年具題奉坊旌表秦嘉與妻朱氏題旌冊年二十二夫亡無子事姑孝姑病醫藥罔效氏日夜籲天求代姑逐愈夀至九旬而卒氏哀毁骨立撫族姪為嗣守節四十五年胡其介妻錢氏題旌冊年二十八夫亡上有孀姑下有稚子四衣食不給日夕勤女紅常不就枕四子俱能成立守節四十二年陸天懿妻鍾氏題旌冊結褵甫八月而夫亡時年十七服闋舅姑相繼卒叔㓜氏健持門户𦵏舅姑及夫復以形家言地不吉又擇吉壤遷之叔長為娶婦育其長子為嗣守節四十九年以上三氏俱雍正十三年具題候旌王某妻楊氏舊浙江通志居平水順治丙戌六月聞寇警沉河而死陶氏五烈會稽縣志陶氏童汝茂妻十九而寡無子與弟之妻章氏綜之妻章氏及妹二人同舟避寇寇至氏奮身投河五人遂同死次日得屍握手不觧陳三妻孟氏舊浙江通志丙戌年夫妻姊妹聫臂沉河死李永昌妻張氏會稽縣志永昌卒於京氏奔䘮返𦵏順治戊子土寇作氏謂娣姒曰吾守志垂二十年已􅂸一死比寇漸偪氏潛啟户而出其子急跡之於河濱得一遺帨網其屍弗獲有頃半里外乗流而至舁歸視之衣裾縫紉不可解陶士章妻章氏舊浙江通志戊子年土賊肆掠居民多出匿士章貧無舟匿於近隣賊至兒啼牀下賊曵其髪出之氏且罵且哭賊脅以刃奮身觸刃死趙泰徵妻張氏舊浙江通志年三十遇寇恐不免先誘女至河擠之水氏亦隨死胡百朗妻潘氏舊浙江通志年十九寇至被執行里許至易家橋即從橋上躍入水中死陳肇新妻楊氏舊浙江通志家瀝海城北枕大洋丙申海寇登岸焚劫肇新客江南氏孑身不能避過警投井死又朱某妻余氏亦赴水死王朝恩妻楊氏紹興府志寇警沉河死越三日殮顔色如生吳士標妻傅氏㑹稽縣志士標卒於京氏年二十五時嵗大歉手削木皮劚草根以自給親故屢以改適言氏以死誓卒年七十三王嶙妻張氏會稽縣志嶙早卒氏絶粒數日而卒王某妻任氏舊浙江通志守節三十餘年後有以非禮犯者自縊死沈與參妻王氏紹興府志與參偕氏居京邸夫亡有謀娶之者鄰婦餂以言笑而不答夜自縊於夫柩側董昌十七妻鄭氏會稽縣志年二十四而寡止遺一子夜夢夫語之曰有廹汝者將奈何遂驚寤次日果如夫言氏以刀斷菜即自斷其髪曰少有二心即如此髪辭色凜然人不敢犯居常衣一絮衣及年至六十舉以示媳曰此汝舅在時衣也雖嵗久勿敢易今無愧矣尋卒林占春妻姚氏舊浙江通志占春亡痛哭欲自盡母慰解之明年夫𦵏母亦死姚歎曰吾所以不死者為夫未𦵏母在故也至此復何生為遂以一㓜女托其姑絶食數日死陳貞女舊浙江通志初許姚世治未成婚二姓寄居京師世治南歸父欲改字之氏易粧覓世治於濟寜泣謂曰余固女流違父不孝今見君子事畢矣奮身投河死童氏六節會稽縣志魯氏童祖靖妻早寡有子乾吉坤吉乾吉妻徐氏無子坤吉妻章氏遺孤汝相汝楫汝相妻章氏汝楫妻范氏及妾蔡氏三世俱二十餘嵗而寡苦節數十年而卒此亘古所未有而妾蔡尤為竒特云沈允徳妻李氏會稽縣志農家女歸允徳三載生一女允徳亡婦誓以身殉隣媪勸勉之氏曰恐身存有奪吾志者因乗間投繯而絶距允徳之死僅五日章貞女紹興府志許字王姓後父母嫌其貧欲更之乳媼露其語章截髮不下樓以終徐貞女紹興府志許字趙應奎應奎死女踵趙門易衰絰時年十九父母勸回欲自盡乃止姑病篤刲股以進遂愈守節五十餘年又有車貞女者因兄亡嫂寡不字以處女終駱光裕妻吳氏紹興府志早寡家貧父諭其祝髪為尼泣曰我茍祝髪舅姑以天年終誰帶孝髻耶遂力勤奉養後舅姑殁治䘮𦵏畢遂不食而卒王文燝妻郭氏紹興府志歸文燝數載文燝為吏所誣擬大辟家貧莫為救者氏懐訴狀至縣堂自刎死夫竟得白滕順生妻孟氏紹興府志順生畧識書記為蕪湖闗吏婚月餘即往未幾卒訃至氏號哭覓死父母止之氏乃迎順生柩𦵏之稷山下舟回至周家灣赴水死年十八時康熙三十八年潘思周妻傅氏周紹鈵潘節婦傳名五芳會稽傅統㑹女年二十二歸思周思周父為田州吏目田在南寧泗城間與猺獞襍處去越且萬里婦結褵甫一月即隨夫抵翁任所一年而夫殁僅遺一女適有宦於粤者䘮偶謀娶之婦截髪自誓曰有不終扵潘者如此髪未幾婦之母與兄死又未幾翁之長子長媳死無何翁又死婦以一女子孑身瘴癘間無期功强近之親柩不能歸乃泣血告於上官及州人之有力者得若干金扶六櫬出郭門身服斬衰徒跣號泣隨之獞人猺女莫不籍籍稱孝婦歸家延地師卜𦵏其翁與夫之柩撫翁之㓜子成立嫁其女含哀茹素以終其身袁思妻李氏懿行録年二十一為思繼室思殁於楚子尚孝纔四齡家貧寄居所親小樓日藉針黹撫孤課讀人周之輒不受為娶劉函文女為媳尚孝㳺學京師卒於途無子劉年二十四以孀姑在堂忍死侍奉日夜紡績銖積寸累以迎夫柩歸且營𦵏焉姑疾親嘗湯藥跬步不離姑殁無以為殮夫友義賻卒不取克成姑志李守節三十四年劉守節二十八年宋子諤妻包氏公舉事實年十八歸子諤二十二而寡子甫襁褓氏事孀姑撫㓜子躬勤紡績足跡不踰户外守節三十九年王氏二節公舉事實王永祚妻吳氏王啟祚妻徐氏吳年二十四夫亡守節四十年卒年六十四徐年二十九夫亡守節三十三年卒年六十二陶氏二節公舉事實任氏陶泌妻年二十九而寡無子妾陳氏生一子彬氏撫同已出教以讀書為名諸生翁錕任錦州知府氏生事死𦵏無不合禮治家有法閠門肅然陳氏誓不改適輿嫡矢志同守事主父尤孝謹知府顧濟美給額以旌曰綘幃雙範袁大琰妻沈氏俞士龍妻李氏姜鳳鳴妻鮑氏祝孟鳳妻王氏陸傳妻胡氏王資仁妻金氏王自超妻髙氏謝栢齡妻祁氏陸𤦺妻朱氏禇應麟妻張氏龔翔鴻妻周氏金十九妻張氏陳明生妻金氏葉汝葑妻周氏何天如妻董氏吳肇統妻王氏唐熙堯妻姚氏董懋史妾倪氏陳大經妻余氏陶世名妻王氏姚志潮妻諸氏王貽楷妻董氏汪某妻趙氏姜承勲妻胡氏朱曾奭妻蔡氏胡爾鈿妻陳氏徐汝稽妻宣氏徐守謙妻沈氏王建三妻髙氏徐守道妻陳氏陳國儒妻周氏莫應期妻章氏張元棟妻徐氏陳某妻宋氏張紹墀妻薛氏胡應𤾉妻唐氏陳家驊妻蔡氏童士仁妻錢氏陳國謨妻徐氏陸述妻金氏陸金國妻吳氏陸端妻吳氏章廷相妻陳氏魏兆洪妻詹氏王業偉妻施氏倪士焻妻胡氏陳三徳妻王氏陳繪妾馬氏王傃妻唐氏陶志遂妻柴氏陳邦化妻周氏徐霖妻張氏任重妻陶氏宋景純妻周氏徐萬化妻朱氏葉士栻妻凌氏浙江通志巻二百九
