body:
  text: 浙江通志卷五建置二浙江省尚書舜典肇有十二州釋文冀兖青徐荆揚豫梁雍并幽營尚書禹貢淮海惟揚州通志地理畧北自淮之南東南距於海閩中以東地今廣陵淮隂鍾離夀春山陽厯陽廬江同安蘄春弋陽宣城丹陽晉陵吳郡餘杭新定新安㑹稽餘姚臨海縉雲永嘉東陽信安鄱陽尋陽之東境爾雅江南曰揚州注自江南至海此葢殷制疏禹别九州有青徐梁而無幽并營是夏制也周禮周公所作有青并幽而無徐梁營是周制也此有徐幽營而無青梁并疑是殷制也周禮職方氏東南曰揚州吳越春秋夏禹周行天下歸還大越登茅山以朝四方吳越春秋少康封庶子於越號曰無餘㑹稽記少康封其少子號曰於越越國之稱始此史記吳世家周武王克殷求太伯仲雍之後得周章周章已君吳因而封之謹按嘉興湖州二府俱係春秋時吳地故凡吳地之建置特為備載左傳哀公元年吳王夫差敗越於夫椒遂入越史記吳世家注賈逵曰夫椒越地杜預曰太湖中椒山也索隠賈逵云越地葢近得之然其地闕不知所在杜預以為太湖中椒山非戰所夫椒與椒山不得為一且夫差以報越為志當至越地何乃不離吳境近在太湖中按此則夫椒當是越地以賈注為正左傳哀公二十二年越滅吳史記越世家楚威王大敗越殺王無疆盡取故吳地至浙江北資治通鑑注越初都㑹稽其境北至於禦兒不能全有漢㑹稽一郡地及其滅吳始并有吳地今楚取吳地至於浙江則禦兒亦入於楚矣資治通鑑秦始皇帝二十四年王翦蒙武定楚以其地置楚郡注秦三十六郡無楚郡此葢平楚之時暫置耳後分為九江鄣㑹稽三郡資治通鑑王翦悉定荆江南地降百越之君置㑹稽郡注秦㑹稽郡治吳縣悉有閩越兩浙之地史記貨殖傳注秦置鄣郡正義在湖州長城縣西南八十里鄣郡故城是也文獻通考鄣今宣城新安新定丹陽郡之西境及吳興郡之西境皆是謹按薛應旂通志云㑹稽郡領縣二十四而在今之浙者錢塘富春餘杭山隂諸暨餘槩剡餘姚上虞大末句章鄮鄞烏程由拳海鹽烏傷凢十七縣又鄣郡之故鄣一縣史記灌嬰傳漢髙祖六年灌嬰定㑹稽郡資治通鑑六年以淮東五十三城立從兄賈為荆王十二年立兄子濞為吳王更以荆為吳國資治通鑑孝惠帝三年立閩君搖為東海王都東甌注閩越王無諸髙祖五年受封都冶今福州侯官是也帝又封摇於東海東海即東甌今温州永嘉是也應劭曰搖封東海在吳郡東南濵海此閩越東越所由分也史記吳王濞傳景帝三年削吳㑹稽郡徙汝南王非王吳故地為江都王通鑑綱目建元三年閩越撃東甌遣使發兵救之遂徙其衆於江淮間六年立餘善為東越王元鼎六年遣將軍楊僕等將兵擊東越元封元年東越降徙其民江淮間漢書地理志注元封二年鄣郡更名丹陽嘉靖浙江通志置於潛縣與故鄣歙俱屬之資治通鑑元封五年置十三部皆置刺史嘉靖浙江通志㑹稽丹陽皆屬揚州刺史部嘉靖浙江通志始元二年以閩越地置回浦冶二縣屬㑹稽郡漢書地理志注錢唐西部都尉治回浦南部都尉治洪氏𨽻釋據西漢志㑹稽西部都尉治錢唐南部都尉治回浦李宗諤圖經曰文帝時以山隂為都尉治元狩中徙治錢唐為西部元鼎中又立東部都尉治冶光武改回浦為章安以冶立東侯官吳以會稽東部為臨海郡以㑹稽南部為建安郡沈約宋志曰東陽太守本㑹稽西部都尉臨海太守本㑹稽東部都尉前漢都尉治鄞後漢分㑹稽為吳郡疑是都尉徙治章安又司馬彪云章安是故冶然則臨海亦治地也張勃吳録曰冶分為㑹稽東南二部都尉東部臨海是也南部建安是也杜佑通典曰後漢改冶縣為侯官都尉後分治縣為㑹稽東南二都尉今福州是南部台州是東部又曰二漢㑹稽西部都尉理婺州嘗参訂之自秦置㑹稽郡其治在今吳門至順帝分置吳郡而㑹稽徙郡於山隂以浙江為兩郡之境故錢唐在西漢時屬㑹稽所以為西部冶所及㑹稽移於浙東則西部亦屬於婺回浦後改章安乃㑹稽之東部今台州葢其地冶縣則是南部在吳屬建安郡至唐遂為福州漢書地理志㑹稽郡縣二十六吳曲阿烏傷毗陵餘暨陽羡諸暨無錫山隂丹徒餘姚婁上虞海鹽剡由拳太末烏程句章餘杭鄞錢唐鄮富春冶回浦丹陽郡縣十七宛陵於朁江乗春榖秣陵故鄣句容涇丹陽石城湖孰陵陽蕪湖黟溧陽歙宣城謹按漢揚州部㑹稽郡統縣二十六而在今之浙者烏傷餘暨諸暨山隂餘姚上虞海鹽剡由拳太末烏程句章餘杭鄞錢唐富春鄮回浦凡十八縣丹陽郡統縣十七而在今之浙者於朁故鄣二縣後漢書順帝紀永建四年分㑹稽為吳郡謹按水經注云永建中陽羡周嘉上書以縣逺赴㑹至難求得分置遂分浙江以西為吳浙江以東為㑹稽而吳地記則云山隂縣人殷重獻策於帝請分江置兩浙詔司空王襲封從錢唐江中分向東為㑹稽向西為吳郡又㑹稽典録朱育曰永建四年劉府君上書浙江之北以為吳郡三説不同並載之後漢書郡國志揚州刺史部郡國六丹陽郡十六城宛陵溧陽故鄣丹陽於潛涇歙黟陵陽蕪湖秣陵牛渚湖孰侯國句容江乗春榖石城㑹稽郡十四城山隂鄮烏傷諸暨餘暨大末上虞剡餘姚句章鄞章安永寜東部侯國吳郡十三城吳本國海鹽烏程餘姚毘陵丹徒曲阿由拳安富春陽羡邑無錫侯國婁謹按後漢揚州部統㑹稽丹陽吳豫章九江廬江六郡而在今之浙者吳郡之烏程海鹽餘姚由拳富春五縣㑹稽郡之山隂鄮烏傷諸暨餘暨大末上虞剡餘姚句章鄞章安永寜十三縣丹陽郡之故鄣於潛二縣三國吳志建安十三年權以六縣為新都郡太平寰宇記吳大帝分歙為始新新定黎陽休陽四縣與黟歙凡六縣因立新都郡謹按新都郡即後之徽州府孫吳時所統之六縣内始新即後之淳安縣新定即後之遂安縣嚴州府固與徽州府壤地相錯而建置者也特為錄於總部而條晰其分合於各縣焉三國吳志黄武五年分丹陽吳㑹三郡十縣置東安郡七年罷東安郡三國吳志太平二年以㑹稽東部為臨海郡三國吳志永安三年以㑹稽南部為建安郡謹按自建安立郡而㑹稽郡不復兼閩地矣三國吳志寳鼎元年分㑹稽為東陽郡嘉靖浙江通志長山太末烏傷永康信安吳寧豐安定陽遂昌屬之三國吳志分吳丹陽為吳興郡注吳郡陽羡永安餘杭臨水及丹陽故鄣安吉原鄉於潛諸縣地勢水流之便悉注烏程分此九縣為吳興郡治烏程謹按浙江之屬於丹陽者至是盡歸吳興郡而丹陽别為一郡與今之浙不復相繫矣晉書地理志吳揚州統丹陽吳㑹稽吳興新都東陽臨海建安豫章鄱陽臨川安成廬陵南部十四郡謹按吳揚州十四郡在今之浙者吳興㑹稽東陽臨海四郡又吳郡之嘉興海鹽鹽官錢唐富陽桐廬建徳夀昌八縣新都郡之始新新定二縣晉書地理志改新都曰新安郡資治通鑑永嘉四年琅邪王睿以周玘為吳興太守於其鄉里置義興郡以旌之注時分吳興之陽羡及長城縣之北鄉丹陽之永世為義興郡謹按長城即後之長興縣義興即後之宜興縣壤地相錯自東晉以後時分時合故録分合原始於總部仍於各縣條析分載通典元帝渡江揚州為王畿領江東浙江地晉書地理志太寜元年分臨海立永嘉郡資治通鑑咸和二年徙瑯琊王昱為㑹稽王晉書地理志吳郡統縣吳嘉興海鹽鹽官錢唐富陽桐廬建徳夀昌海虞婁吳興郡統縣烏程臨安餘杭武康東遷於潛故鄣安吉原鄉長城㑹稽郡統縣山隂上虞餘姚句章鄞鄮始寜剡永興諸暨東陽郡統縣長山永康烏傷吳寜太末信安豐安定陽遂昌新安郡統縣始新遂安黟歙海寜黎陽臨海郡統縣章安臨海始豐寜海永嘉郡統縣永寜安固松陽横陽義興郡統縣陽羡義鄉國山臨津平陵永世謹按西晉揚州統丹陽宣城淮南廬江毘陵吳郡吳興㑹稽東陽新安臨海建安晉安豫章臨川鄱陽廬陵南康十八郡而在今之浙者吳興㑹稽東陽臨海四郡又吳郡之嘉興海鹽鹽官錢唐富陽桐廬建徳夀昌八縣新安郡之始新遂安二縣東晉揚州統丹陽吳郡吳興新安東陽臨海永嘉宣城義興晉陵十一郡而以㑹稽郡為王國其在今之浙者吳興東陽臨海永嘉四郡又吳郡之嘉興海鹽鹽官錢唐富陽建徳桐廬夀昌八縣新安郡之始新遂安二縣義興郡之義鄉一縣宋書武帝紀永初二年罷㑹稽郡府資治通鑑元嘉三十年分浙東五郡為㑹州省揚州立司𨽻校尉宋書州郡志孝建元年分揚州之㑹稽東陽新安永嘉臨海五郡為東揚州宋書孝武帝紀大明三年以揚州所統六郡為王畿以東揚州𨽻揚州宋書州郡志大明七年吳郡度屬南徐八年復舊宋書孝武帝紀大明八年以王畿諸郡為揚州以揚州為東揚州宋書州郡志永光元年省東揚州并揚州謹按紹興府志作景和元年考永光元年秋八月改是年為景和元年實一年也宋書州郡志泰始四年義興屬南徐宋書州郡志昇明三年改揚州刺史曰牧領郡十宋書州郡志揚州刺史部㑹稽太守領縣十山隂永興上虞餘姚剡諸暨始寜句章鄮鄞吳郡太守領縣十二吳婁嘉興海虞海鹽鹽官錢唐富陽新城建徳桐廬夀昌新昌吳興太守領縣十烏程東遷武康長城原鄉故鄣安吉餘杭臨安於潛東陽太守領縣九長山太末烏傷永康信安吳寜豐安定陽遂昌臨海太守領縣五章安臨海始豐寜海樂安永嘉太守領縣五永寜安固松陽樂成横陽新安太守領縣五始新遂安歙海寜黟南徐州刺史部義興太守領縣五陽羡臨津義鄉國山綏安謹按劉宋總部屢更而揚州在今之浙者㑹稽吳興東陽臨海永嘉五郡又吳郡之嘉興海鹽鹽官錢唐富陽新城建徳桐廬夀昌新昌十縣新安郡之始新遂安二縣南徐州義興郡之義鄉綏安二縣又按綏安置縣在永初三年分吳興之故鄣長城地而立也南齊書州郡志永明二年義興郡割屬揚州後復舊南齊書州郡志揚州㑹稽郡山隂永興上虞餘姚諸暨剡鄞始寜句章鄮吳郡吳婁海虞嘉興海鹽錢唐富陽鹽官新城建徳夀昌桐廬吳興郡烏程武康餘杭東遷長城於潛臨安故鄣安吉原鄉東陽郡長山太末烏傷永康信安吳寜豐安定陽遂昌新安郡始新黟遂安歙海寜臨海郡章安臨海寜海始豐樂安永嘉郡永寜安固松陽横陽樂成南徐州義興郡陽羡臨津國山義鄉綏安謹按南齊揚州統丹陽㑹稽吳郡吳興東陽新安臨海永嘉八郡而在今之浙者㑹稽吳興東陽臨海永嘉五郡又吳郡之嘉興海鹽錢唐富陽鹽官新城建徳夀昌桐廬九縣新安郡之始新遂安二縣南徐州義興郡之義鄉綏安二縣隋書地理志梁置信義郡𢎞治嘉興府志海鹽縣屬信義郡梁書髙祖紀普通五年分揚州江州置東揚州通典梁置金華郡資治通鑑太清三年置吳州於吳郡梁書太宗紀大寳元年省吳州如先為郡資治通鑑注東陽郡梁置婺州謹按東陽郡之置婺州在梁元帝時後隋文帝罷郡置州固仍舊名耳資治通鑑紹泰元年王僧辯以吳興為震州梁書敬帝紀太平元年罷震州還復吳興郡罷東揚州還復㑹稽郡太平寰宇記陳永定三年於東陽郡置縉州謹按太平寰宇記載置縉州於陳永定三年嘉靖浙江通志因云改東陽郡為縉州乃考通鑑太平元年以留異為縉州刺史陳書留異傳又有紹泰二年異除縉州刺史領東陽太守一事葢太平係敬帝改元在紹泰二年九月實則一年也是敬帝時已有縉州何得移至陳武帝永定三年乎樂史徒見武帝紀永定三年有賑恤縉州一詔遂謂置縉州在於是年不知縉州梁時已置今正之隋書地理志梁立大梁郡又改為陳留咸淳毘陵志太平二年以義興郡之綏安縣置謹按梁代州郡多沿舊制天監後乃有析置太清之季郡縣