役事擇僚属四人助之始作於庚寅孟春畢於首夏材良匠能可支百載夫以天子命郡置學選明師敎士以徳行道藝以培植風化震蕩習俗使人知有禮義乃王道之本生民之命不可一朝緩也兹郡邇辟廱而以水火風旱之相仍補敗不給顧視嘆咨以迄於今又因循而不修守之罪大今捐數千緡而賢士大夫樂與共成豈獨守之責塞實亦成前人之志副多士之願非天子之徳厚而朝廷之化深歟喜其成而推其本言之不足而至於詠歌詩其可無作詩曰有學之宫既久斯圯匪鄉之英孰葺而起伊鄉之英匪為我勞辟雍之化其流滔滔有廡斯修有門斯閌多士復來居移氣壯台山巍巍江水逶迤有學之宫與江山齊既安爾居既鼓爾篋青青子衿曷遜爾業我風斯移我俗斯羙詔爾多士毋負天子大成殿嵗久欲壓開禧元年葉守箋重建嘉定四年黄守㽦作櫺星門創小學十五年齊守碩重建櫺星門葺衆齋赤城新志元至元十三年燬於兵達嚕噶齊總管石國華建大成殿劉克昌朱霽次第増修泰定初總管趙鳳儀建先賢祠元末燬明洪武初郡守范明敬重建正統中壊於風雨周守旭鑑復建成化初阮守勤修易櫺星門以石杜寜為記成化末葉守贄更新之馬守岱悉撤而更作焉嘉靖浙江通志正徳三年燬重建台州府志崇禎間為風所壊巡道盛仲龍攝府事與司理蔣鳴玉重建國朝康熙六年知府王綱肅重葺先師廟十年巡道衛紹芳知府岳貞再葺十六年知府高培建啟聖祠十七年知府鮑復泰同知李徳燿修洪若臯為記四十七年颶風掀掣殿廡諸祠並圮五十一年知府張聨元重建汪漋重建台州府學記台處萬山中風俗樸茂近古唐肅宗初鄭䖍廣文司户此州嘗嘆東魯聖人澤加天下譬之陽春無私其照隂崖獨後因慨然以敎化為己任而士習漸振至宋淳熙間朱子以常平使者行部於州一時從學之盛淵源師友郁郁彬彬有鄒魯遺風厥後漸摩涵浸凡文章黼黻之儒皆能砥立名行亮節清風照映今古者有敎以為之本也今張侯由吏部來刺是邦以興學為先務凡踰年廟貎整飭自殿廊門觀以及講舍射圃次第井井頓易舊觀豈徒以守土之責為然哉葢所以望台之人士而引掖奬勸作新鼓舞俾知激厲以自奮也今國家文敎誕敷化成久道而兹郡又為文獻名區前修在望復得使君邦伯之賢為之薰沐而甄陶則上之所好下有甚焉將見賢才輩出名世挺生嗣宋元明之典型流風而日進逾上此道徳之歸養成之驗豈獨張侯重葺學宫之意可以大慰即余之祇承帝命夙夜冰兢得以一至再至且三四至者與爾諸生拭目以觀其盛矣雍正六年知府江承玠修九年知府張若震重修射圃在文廟西名宦祠祀畢士安以下五十四人鄉賢祠祀羅適以下八十有五人上蔡書院在元妙觀右赤城新志宋上蔡先生謝良佐遭黨禁未解而卒台守黄㽦祀於州學後建書院於東湖上元至元中燬徙建今地明成化初僉事辛訪叅政何宜属知縣阮勤重建鑑溪書院在府城東赤城新志元邑人柯釂建赤城書院在白雲山麓台州府志明知府周志偉同知朱世忠王建幹建并立射圃近聖書院在府學西台州府志康熙五十六年郡守張聨元建臨海縣儒學在縣治東南赤城志廟在縣西南景祐四年令師道即廟建學按職官志景祐間臨海令為范師道而赤城志及嘉靖浙江通志俱無姓台州府志又作趙帥範皆誤崇寜中學徙附於州後乾道五年火淳熙二年趙守汝愚復新之台州府志寳慶間令劉棟移建今地徳祐二年燬於兵元至元間學官梁至道至大間達嚕噶齊馬拜扎納總管王居敬相繼建葺至正末火臨海縣志明洪武三年令王貴敎諭胡繼善重建十三年火令龎惟方重建二十七年又火令段凱重建宣徳時令謝恂修正統二年令劉剛主簿卓宜購地増闢講堂後令李文序孫振望禇祚方進繼修𢎞治間郡守馬岱陳相令陳釗相繼拓治正徳三年火十五年郡守顧璘徙元妙觀地秦文為記嘉靖十八年令胡亷復還舊址國朝順治十一年知縣徐珏康熙十二年敎諭倪堯章二十一年知縣趙之相繼重修康熙四十七年為颶風所圮五十年知縣王郊敎諭錢有煒重建射圃圮名宦祠祀孫綽以下三十二人鄉賢祠祀徐中行以下一十三人社學二所一在縣東一在縣西溪山第一書院在龍顧山側臨海縣志宋建朱子書額尚存白雲書院在府治後龍顧山台州府志明陳檢討璲建東湖書院在舊洪水園台州府志馮侍郎甦建南岡書院在巾子山墖下舊名小寒山臨海縣志洪若臯建東璧書院在縣西臨海縣志洪若臯建黄巖縣儒學在縣治南赤城志廟舊在縣東宋治平三年令許懋即廟建學元豐六年令翁仲通徙今地宣和二年燬於寇五年令王然重建開禧元年火二年令趙湜又新之嘉定九年令陳夢建作直舍赤城新志元至元丙子燬時學官闕學儒徐紹先等修治之舊浙江通志元貞二年陞州學明洪武時復為縣學台州府志宣徳中令周旭鑑重建黄淮為記自是而後令祝茂鄺文李葵王欽皆加拓治嘉靖辛丑廟壊於風令林人紀重建黄綰為記庚戍令高材建明倫堂黄巖縣志嘉靖壬子燬於寇惟存明倫堂令汪汝達重建廟及兩廡啟聖祠應大猷為記崇禎間敎諭費翃重葺廟廡建明倫堂國朝順治間敎諭羅士尤駱維恭相繼修葺康熙九年廟學燬十年知縣張中選敎諭徐光旭建明倫堂二十六年總兵林本直敎諭潘䕃餘訓導何如敎建廟總兵趙宏燦落成之四十七年颶風毁郡守張聯元總兵林達及紳士興建射圃在廟西名宦祠祀范仲淹以下一十七人鄉賢祠祀杜範以下四十八人社學在大寺巷久圮樊川書院在杜家村赤城新志晦菴先生與南湖方山二杜公講學之地回浦書院在縣東五十里續文獻通考元元貞中建久圮文獻書院在委羽山赤城新志元樞密副使劉本仁建以朱文公嘗施敎於台杜清獻公得其傳因祀文公於此而以清獻配焉危素朱右俱有記柔川書院在柔極山中台州府志元黄夀雲子中玊建祀二程子朱子以夀雲配張翥為記九溪書院在茅畬台州府志元牟楷嘗講學於此後人因以祀之天台縣儒學在縣治東南明一統志宋慶歴中建赤城志廟舊在縣西南宋皇祐中令石牧之即廟建學陳襄天台縣文宣王廟記天台縣有孔子廟不修縣令石牧之始至嵗十月相縣之東南隅大作新廟為屋總六十一楹先樹正殿中樹講堂圖輿服禮樂之器於而壁又設學舍師生講習咸有位序祭器在西房庖廚在東房周廻門廊環以牆垣又考古器作籩豆簠簋樽爼罍爵之属十二月廟成明年春釋奠行禮圖像尊嚴籩爼新嘉神明燕喜人物觀化嗟乎石君可謂有志矣區區一邑而制度以禮春秋以時俾民不忘天其欲以斯道覺斯民也石君之志其必有遇矣後三徙淳熙中令趙公植作廊廡齋廬嘉泰二年令丁大榮重新之嘉定元年令詹阜民創明倫堂尊經閣十年丞陳逵重建大成殿赤城新志元至元丙子燬於寇尹張徳進劉慶相繼修復至正末再燬台州府志明洪武中令鄧林因舊址新之按浙江提學胡榮文廟記云成化丙申朱清宰是邑撤其舊宇而新之兼制禮器成化二十二年燬令王凱更建嘉靖浙江通志嘉靖八年復燬十二年令周振揚重建天台縣志萬歴二十一年推官劉啟元徙城南至二十三年張宏代繼任始落成焉二十六年火惟存廟廡張宏代重建國朝順治十六年知縣陳獻可重建胡北龍為記康熙十六年敎諭鄒楷訓導徐徳恂增修敎諭楊王治重葺雍正七年知縣張若震重修射圃在學西名宦祠祀石牧之以下三十八人鄉賢祠祀顧歡以下三十六人社學四所一在桃花街一在小田巷一在平頭潭一在東嶽廟仙居縣儒學在縣治東赤城志廟在縣東宋皇祐初令陳襄即廟建學初天聖中令陳戭止建廟襄既建學且為文勸學者宣和兵火廟獨存淳熙七年以風雨摧壓令莫洸新之十一年令徐柟重建學嘉泰二年令林岳復葺周必大重修仙居縣學記古靈先生陳公襄與陳烈周希孟鄭穆倡道海濵鄉人化之號四先生皇祐中令台州之仙居篤意學校首為文勸人讀書擇明經之士朝夕講説高不躐等卑不流俗示之以方期造於道而進取亦在其中士民懐之奉祠今百五十年矣嘉泰辛酉夏通直郎四明林岳來治兹邑歆慕前哲凡庠序堂廡門觀舉新之學有射圃淪棄榛莽亦加薙葺别市民居創觀徳亭總為錢千二百緡皆出節用籍贜田十八畝輟務場餘財月萬錢以贍生員請尉簿嘉禾錢撫専主敎導夫敎人必以聖人為師古靈學夫子者也林君希古靈者也學者誠能各因其材孜孜弗怠尊所聞而行所知豈特無負賢令亦將無負先聖可不勉歟嘉定元年令姚偓創明倫堂櫺星門台州府志景炎二年廟燬於兵元至元十八年令王徴重建嘉靖浙江通志元末兵燬明洪武初知縣王從古建舊浙江通志嘉靖中學燬同知毛徳京重建仙居縣志崇禎九年知縣蕭鳴鳳重建國朝康熙十八年知縣鄭録勲重建五十四年知縣王觀敎諭卓允基重修射圃在明倫堂西北名宦祠祀羊忻以下一十四人鄉賢祠祀蔣旦以下二十人社學五所一在學西又何埠白墖淨樂界嶺四處桐江書院在縣西四十五里續文獻通考宋方斲唐方干之裔居台州元皇慶中其孫志道建以祀之久圮上蔡書院在縣東仙居縣志宋趙必昇以浙漕引年而歸請於朝為上蔡書院初上蔡謝良佐卒於台台守黄㽦建院以祀必昇倣其例亦稱上蔡焉安洲書院在縣東二十五里赤城志元至元中隠士羅森建蓼溪書院在縣西仙居縣志明刺史吳炳庶建寜海縣儒學在縣治西南赤城志廟舊在縣東宋祥符五年令蘇季成即廟建學嘉祐四年徙縣驛側紹聖四年徙縣治東南紹興六年令錢埈徙今地慶元三年令趙笈夫重建赤城新志元至元二十六年燬於兵判官張謙縣丞張天錫敎諭應同孫相與重建嘉靖浙江通志明永樂九年燬知縣顧諲重建萬歴寜海縣志宣徳間燬敎諭蕭順集義士新之台州府志成化五年提學道劉釪洎阮守勤重作文廟杜寜為記嗣後府判孔彦倫令郭紳張宏宜皆加修葺萬歴辛卯知縣曹學程重修國朝順治丁酉知縣李文重建康熙辛亥訓導朱爾詮率諸生趙應璉等修癸丑知縣崔秉鏡倡建啟聖祠五十六年敎諭朱繼序訓導林蘭重建射圃在學門外名宦祠祀陳長宫以下七人鄉賢祠祀羅適以下二十二人社學在西門外久圮緱城書院在縣東南台州府志明萬歴甲午知縣王演疇建久圯太平縣儒學在縣治東南赤城新志明成化七年知縣常完建袁道丁隆繼之縣丞范亮復繼之太平縣志嘉靖間知縣陶秀建啟聖祠萬歴間知縣陳龍光建尊經閣國朝順治間敎諭張佐極修康熙六年署敎諭龔瑛十年縣丞張光恩皆加修葺四十七年圮五十年署縣事運判鄭一楓訓導金徳培建射圃在西廡西名宦祠祀袁道以下四人鄉賢祠祀王居安以下二十七人社學在城隍廟東方巖書院在方巖山北赤城新志明嘉靖間封翰林編修謝世衍與弟寳慶守省建以敎其鄉族子弟者李東陽為記浙江通志卷二十七
