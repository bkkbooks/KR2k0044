body:
  text: 浙江通志卷二十七學校三書院附寜波府寜波府儒學在府治北延祐四明志唐開元二十六年始治州學寳應廣徳間燬貞元四年王沐建廟宋天禧二年李夷庚移於城東建炎兵燬聖殿獨存郡人林暐捐金至紹興七年仇愈卒成之十九年徐琛建稽古堂後岳甫守郡置成徳齋養正齋至正四明續志景定三年總管郭郁重修袁桷為記成化四明郡志咸淳六年守洪燾更造大成殿王應麟重建寜波府學大成殿記吏部尚書洪公燾以敷文閣學士來牧四明舍奠於學顧瞻禮殿梁棟陊剝喟然曰職在宣化弗惟道原是崇曷克稱明詔若稽郡乗舊夫子廟肇自唐貞元四年至今四百八十餘年矣元氣回復理若有待明年實咸淳紀號之六年迺鳩工飭材而鼎新之穹棟碩楹煥奕嚴敞視昔有加焉以某月日䖍妥用幣衿佩雲集相與端拜而議曰吾邦自慶厯諸老淑艾後進乾淳大儒闡繹正學孝悌修於家而仁遜興齒徳尚於鄉而風俗原理義明於心而賢才盛善信充於已而事業顯聖天子立敎於上而夫子之道益尊賢師帥廸敎於下而夫子之道益彰昔魯僖公能修泮宫威徳所被至於海邦夫子列其詩於頌而先儒傳春秋則曰學校為國之先務雖用民力不可廢也故不與新作南門槩書之䇿今公兹舉合詩春秋之義豐道扶敎作新數百年㡬墜之緒盛徳至善百世不忘也應麟世家於鄞幸得從先生長者後升堂聞金石之音入宫牆而見宗廟之羙惟我同志服膺聖訓陟降庭止昭假不違上以承天子之休徳下以篤師帥之善敎罔俾克廣徳心専羙魯之多士尚其懋哉延祐四明志元至元十九年火二十九年亷訪副使陳祥立尊經閣至大二年副使趙宏偉勸士重建嘉靖浙江通志明正統二年知府鄭珞重建天順八年知府張瓚成化三年知府方達相繼重修嘉靖寜波府志成化間僉事吳璘闢尊經閣甃池築室𢎞治丁巳守伍符嘉靖甲午守鄭威丁巳守張正和重修屠滽王應鵬張時徹各有記寜波府志萬厯四年巡海道劉翾知府周良賓増葺范欽為記三十二年知府鄒希賢重修文昌閣自為記三十六年敎授高明重製神主沈一貫為記崇禎九年知府許捷葺廟堂齋廡知府林夢官卒其工林棟隆為記十三年巡海道王應華改葺沈延嘉為記國朝順治八年巡海道王爾禄重修沈延嘉為記康熙九年知府崔維雅率屬重建明倫堂史大成為記十一年通判郭一鳳重建啟聖祠史大成為記十五年敎授葛衷欽修先師廟同知殷作霖成之三十一年知府張星耀四十三年知府甘國璧五十二年知府李肅先後繼修五十七年知府尚瑤重修先師廟雍正二年學使彭維新重建明倫堂五年知府孫詔重建西廡及名宦鄉賢祠六年重建文昌閣知府曹秉仁成之八年秉仁創省牲所射圃在學西名官祠祀文種以下三十八人鄉賢祠祀黄公以下六十有二人桃源書院在府城西舊浙江通志舊在鄞縣西三十里宋王説家塾也尋廢後人復改築於城西十五里甬東書院在城東五里續文獻通考宋鄭青之建以祀樓昉理宗御書扁賜之久圮東湖書院在城東三十里續文獻通考元時邑人陸天祐建久圯鄮山書院在城西五里嘉靖寜波府志元大徳三年鄉儒趙夀建為祠以祀朱子久圮鄞江書院在府治西續文獻通考元時邑人張式良建今改寜波衛義田書院在郡治月湖西舊浙江通志明廣盈倉基國朝順治十年海道王爾禄建康熙二十五年知府李煦重建改名月湖書院雍正五年知府孫詔修八年知府曹秉仁重修鄞縣儒學在縣治西南成化四明郡志唐元和九年建廟於縣東宋慶歴中王安石宰縣因廟為學延祐四明志崇寜二年移於縣西南燬於建炎中嘉定十三年邑簿吕康年以寳雲寺西創禮殿寳慶二年尚書胡榘守郡經營有成至元十九年儒學提舉田希亮増置二齋二十八年亷訪副使陳祥撤而新之至大二年燬於火縣丞賈思恭以亷訪副使趙宏偉之命經營之尹張繼祖繼之後同知張伯延成之袁桷重建鄞縣學記州郡悉置廟學奠謁講説循襲條制而職敎之道似若有未修焉者鄞舊有學王文公為宰時延㑹稽杜先生醇敎之學者輩出至大二年郡大火學燬主邑之學孔文雋董儒金始建講堂禮殿未完而去皇慶二年三衢姚熙載實來是嵗天子卞科舉詔同知郡事吳郡張伯延率郡官而助之邑令梅君遇春丞簿龎君滋范君祐延曰吾長於是兹役曷可緩嚴工庀程戒肄業者咸輸以佐閲二年學宫之制完且具矣姚君乃曰鄞號多士昉杜先生宜作先賢以祀鄞士之興其自今始乎嘗謂學校宫室循行風俗之使者未嘗不督厲修繕獨敎法未定雖聰明自任獨不敢高下以議今明詔四出郡侯首創其原姚君又能推本前人尊師之㫖庶幾吾里之秀士訽考耆哲篤行於顯㣲内外之實乎成化四明郡志明正統三年知府鄒珞徙建明倫堂於殿西左右建二齋東建文昌祠闢射圃成化初守張瓚割寳雲寺西隙地以廣之嘉靖寜波府志𢎞治乙未提學副使趙寛守伍符徙寺逺之而徙明倫堂於寳雲寺故址建尊經閣陳琳為記後令曽直又復門東侵地楊守阯為記嘉靖辛丑守沈愷立聚奎堂自為記丁巳令曽承芳立名宦鄉賢二祠甲寅令夏儒改創名宦鄉賢二祠周相為記鄞縣志萬厯丙申令翁憲祥江秉謙沈猶龍崇禎甲戍諸生錢肅樂先後繼修國朝順治四年知縣董大翮修康熙三年知縣張幼學重建明倫堂啟聖祠五十二年知府李肅修先師廟櫺星門建兩廡啟聖祠文昌閣仇兆鼇為記雍正五年知府孫詔知縣楊懿敎諭沈廷桂協紳衿重修八年知府曹秉仁又修射圃在文昌祠東北名宦祠祀陸南金以下五人鄉賢祠祀黄公以下一百六十二人社學六所並在城久圮菊坡書院在縣治東鄞縣志宋樞密陳清敏卓建魯齋書院在縣治西成化四明郡志舊在西南隅浙東道都元帥鎻南班建以祀文正公許衡後徙建育才書院在醋坊橋西寜波府志康熙三十六年知府高啟桂建義學在永豐街寜波府志雍正七年知縣楊懿以前巡道胡承祖生祠改建慈谿縣儒學在縣治東南成化四明郡志宋雍熙元年令李昭文建於縣西延祐四明志慶歴八年令林肇徙縣治東南王安石慈谿縣建學記古者井天下之田而黨庠遂序國學之法立乎其中後世無井田之法而學亦或存或廢大抵所以治天下國家者不復皆出於學而學之士羣居族處為師弟子之任者講章句課文字而已至其陵遲之久則四方之學一廢而為廟以祀孔子於天下㫁木摶土如浮屠道士法為王者象州縣吏春秋率其属釋奠於其堂而學者或不預焉葢廟之作出於學廢而近世之法然也今天子即位若干年頗修法度而革近世之不然者當此之時學稍稍立於天下矣猶曰州之士滿二百人乃得立學於是慈溪之士不得有學而為孔子廟如故廟又壊不治令劉君在中言於州使民出錢將修而作之未及為而去時慶歴五年也後林君肇至則曰古之所以為學者吾不得而見而法者吾不可以無循也雖然吾有人民於此不可以無敎即因民錢作孔子廟如今之所云而治其四旁為學舍講堂其中帥縣之子弟起先生杜君醇為之師而興於學噫林君其有道者耶夫吏者無變今之法而不失古之實此有道者之所能也林君之為其㡬於此矣林君固賢令而慈溪小邑無珍産淫貨以來四方游販之民田桑之羙有以自足無水旱之憂也無游販之民故其俗一而不雜有以自足故人慎刑而易治而吾所見其邑之士亦多羙茂之材易成也杜君者越之𨼆君子其學行宜為人師者也夫以小邑得賢令又得宜為人師者為之師而以修醇一易治之俗而進羙茂易成之材雖拘於法限於勢不得盡如古之所為而吾固信其敎化之將行而風俗之成也夫敎化可以羙風俗雖然必久而後至於善而今之吏其勢不能以久也吾雖喜且幸其將行而又憂夫來者之不吾繼也於是本其意以告來者建炎四年燬淳祐間節度推官宋南强重建八年令唐仲温落成至正四明續志元元貞二年燬因舊址建至元五年敎諭季仁夀修成化四明郡志明洪武三十一年典史余琯建梯雲亭架閣庫宣徳六年郡守鄭珞推官吕翺重建明倫堂嘉靖寜波府志正統三年丞劉頤重建兩廡𢎞治庚戍令和鵬復建大成殿周旋為記嘉靖癸卯令陳褒廣明倫堂改㑹膳堂為尊經閣丙辰燬於寇丁巳即其址重建廟學同知侯國治令劉子延踵成之天啟慈谿縣志萬歴十六年令何偉修四十六年令陳其柱重修姚宗文為記天啟二年明倫堂尊經閣燬三年令李逢申重建國朝康熙十年知縣吳殿弼重修射圃在城隍廟西名宦祠祀房琯以下一十三人鄉賢祠祀楊適以下二十人社學十五所並在坊隅久圮慈湖書院在縣治北續文獻通考宋郡守劉黻建以祀楊文元公設山長主之杜州書院在縣西北續文獻通考童居易讀書之所奉化縣儒學在縣治東北延祐四明志宋景祐中令于房廣廟以立學治平初令裴士堯遷廟學州東久而圮宣和初令周因重建燬於建炎中紹興九年榮彛復建慶元二年邑士汪伋撤大成殿及門廡新之樓鑰為記嘉靖寜波府志嘉定七年令馮多福立尚友堂周勉為記延祐四明志元至元二十年堂以颶風仆復建明年新兩廡儀門主維者令李天益也二十九年丁尹濟創養正堂至正四明續志延祐戊午知州馬稱徳葢尊經閣及講堂後軒兩廡六齋倉厫庖溷咸備二年同知哈扎爾重修成化四明郡志明洪武二十年圮於風二十三年知縣章彦淳建講堂三十一年知縣郭麟創㑹膳堂宣徳八年知縣周銓重修大成殿改造明倫堂陳山為記嘉靖寜波府志成化丁未令曹瀾正徳丁丑縣丞黎伸己卯令朱豹嘉靖己丑令陳鎬相繼重修陸瑜王應鵬各有記奉化縣志萬歴中廟燬令汪應嶽重建崇禎己巳明倫堂圮通判林士雅令吳之錦修寜波府志崇禎十二年署令通判蔣中超修國朝康熙十一年知府邱業知縣鄭愫重修十八年令蔡毓秀修大成殿兩廡儀門雍正元年知縣魏大徳王緯敎諭陸鶴訓導周兆馨等重修射圃在學宫名宦祠祀鄭奉以下一十二人鄉賢祠祀祖域以下二十六人社學二所一在連山驛東一在縣南久圮龍津書院在縣治東奉化縣志宋乾道中朱文公奉使至此士人咸留問道遂立書院後遷於學東元達嚕噶齊察罕等興復於寳化山之陽久圮廣平書院在縣治東續文獻通考宋舒璘講學於此登瀛書院在縣治南松林鄉成化四明郡志宋咸淳間鄉人共建松溪書院在縣治東忠義鄉成化四明郡志元至正七年邑人李徳説建鎮海縣儒學在縣治東北延祐四明志宋雍熙二年主簿李齊建於縣東崇寜中廣之紹興八年令章汝翼改建於縣東北嘉靖寜波府志慶元初令韓永徳復建大成殿歴三令始完明倫堂嘉泰初令商逸卿鼎新之邑人胡大任黄君中亦益地拓學嘉定間令崔端學創四齋及兩廡廪庫泮橋八年攝守程覃立直舍小學紹定四年令陳纘淳祐庚戍令范世昌相繼拓舊址胡剛中為記成化四明郡志元至正中令汪以敬増構齋舍置文昌祠光霽亭劉本仁為記明正統十一年知縣戴鍾重建大成殿修明倫堂成化元年縣丞王愉築膳堂嘉靖定海縣志成化六年副使朱紳都指揮張勇重建殿堂兩廡劉紆為記𢎞治初學使鄭紀闢射圃七年巡海副使文貴命知縣李廷儀建饌堂増號舍嘉靖二年令鄭餘慶修謝遷為記三十三年令宋繼祖重修王交為記四十一年令何愈重修張時徹為記寜波府志萬歴二十五年知縣丁鴻陽重修文廟余寅為記三十七年知縣樊王家重建尊經閣薛三省為記舊浙江通志崇禎間巡海道蕭基知縣龔彛重建薛三省為記國朝順治十八年巡按楊旬瑛康熙六年知縣王元士相