body:
  text: 浙江通志卷二百五十二經籍十二集部五制誥西漢詔令三十卷咸淳臨安志洪咨夔撰東漢詔令十一卷書録解題鄞樓昉𤾉叔編吳越石壁記二卷宋史藝文志錢鏐以唐末答詔刻石以上總集元豐聖制三卷續文獻通考舒亶撰掖垣制草嘉靖臨安縣志俞烈著育德堂内制集三卷外制集八卷書録解題永嘉蔡㓜學行之撰西掖制誥三卷宋史藝文志傅崧卿撰杜右相外制三卷續文獻通考杜範撰徐學士内制續文獻通考徐鳳撰以上宋人制誥二卷嚴陵志徐尊生著外制十卷嘉禾徴獻録陳懿典著鑾坡制草五卷焦氏經籍志黄洪憲撰代言録五卷黃氏書目倪元璐著以上明人表奏諫史一百卷宋史藝文志石待問撰厯代奏議十卷國朝名臣奏議十卷書録解題吕祖謙集古奏議選𫝊是樓書目黄汝亨輯明疏議輯畧三十卷聚樂堂藝文志張瀚輯經濟文録四十四卷黃氏書目萬表輯赤城論諫録十卷謝鐸與黃孔昭輯天台人文之有關治道者宋十人明六人浙士讜言萬厯間平湖陸基志輯冇明嘉隆以上浙人奏疏名家表選八卷黃氏書目陳塏著紹興人表衡六卷黃氏書目茅維輯以上總集奏議彈文十五卷梁書孔休源𫝊休源字慶緒㑹稽山隂人著有奏議彈文入道表一卷唐書藝文志賀知章撰陸宣公奏議十二卷郡齋讀書志唐嘉興陸贄敬輿撰又名牓子集萬厯嘉善縣志權徳輿序而傳之稱制誥集十二卷奏草七卷中書奏議七卷又有文賦表狀十五卷徳輿以其不關時政置之别集乆不傳矣考陳氏書目所存惟翰苑集十卷牓子集十二卷牓子集即奏議也元祐中蘇子瞻乞校書進呈改稱宣公奏議宣公奏議詳解十卷嘉靖金華縣志唐仲友著啓事一卷通志藝文畧羅隱撰以上唐人經緯集十四卷書錄解題㑹稽孫沔元規撰石林奏議十五卷書録解題葉夢得撰自序作志媿集十卷陳國佐奏議十二卷書録解題赤城陳公輔國佐撰清獻盡言集二卷南臺諫垣集二卷宋史藝文志趙抃撰若溪奏議一卷書錄解題長城劉珏希范撰諫垣集三十卷諫垣遺稿五卷宋史藝文志錢彦逺撰中丞奏議十卷臺評二卷括蒼彚紀蔣繼周著胡獻簡奏議八卷臺評二卷書録解題㑹稽胡沂撰梅溪奏議三卷書錄解題樂清王十朋龜齡撰齊齋奏議三十卷掖垣繳論四卷銀臺章奏五卷臺諫論二卷書録解題倪思撰奏章三卷萬厯紹興府志姚舜明撰奏議五卷明一統志沈夏著徳清人虞谷奏事六卷餘姚縣志王俁著奏議四十卷續文獻通考劉誼撰長興縣志字宜翁奏議三卷咸淳臨安志洪咨夔著奏議百卷萬厯上虞縣志趙子潚著奏議百篇長興縣志嚴抗著字汝抑奏議五卷嚴陵志方有開著西掖奏稿三卷台州府志謝克家著奏議臨安俞烈著見程珌俞侍郎行狀忠公奏議二十七篇萬厯上虞縣志劉漢弼著奏議十卷兩浙名賢録劉甲著字師文龍游人陳行之奏議括蒼彚紀陳景行著杜右相奏稿十卷續文獻通考杜範撰薛恭翼奏議十卷萬厯温州府志薛叔似著可軒奏議敬卿録王介著奏劄十卷浦陽人物記王萬著奏議三卷萬厯義烏縣志徐邦憲著奏議内外制括蒼彚紀何俌著格菴奏議括蒼彚紀趙順孫著蛟峯奏劄一卷百川書志方逢辰撰資時朴議二十篇嘉興府圖記陳之純字仲誠崇徳人紹熈間作資時朴議二十篇以進以上宋人周顯謨奏議富陽縣志周文著王暹奏議二十卷黃氏書目字景陽山隂人于肅愍公奏疏十卷澹生堂書目于謙撰商文毅公奏議一卷焦氏經籍志商輅撰姚文敏公奏議黃氏書目姚夔撰東湖内奏一卷百川書志平湖屠勲撰桃溪奏議四卷百川書志祭酒謝鐸撰抑齋奏議嘉靖慈谿縣志王來著奏議别稿萬厯上虞縣志潘府著五山奏疏萬厯紹興府志何鑑著章恭惠公奏議萬厯温州府志章綸著南川奏議二卷焦氏經籍志陶諧著青嶼奏議台州府志陳世良著石壁諫垣稿台州府志龎泮著西臺奏疏萬厯象山縣志王渙著論奏遺草嘉靖寧波府志陳槐著徐瓚奏議八卷黃氏書目字朝儀永康人張文忠公奏議七卷内閣書目張孚敬著一按澹生堂書目有文廟集議卷奏對稿十二卷胡端敏公奏議十卷新河初議一卷聚樂堂藝文志胡世寧撰督撫江西奏議二卷總理河道奏議二卷審録江西奏議五卷聚樂堂藝文志翁大立撰雲南奏議一卷江西奏議二卷督府奏議二卷總制奏議十册分省人物考唐龍著撫畿奏稿二卷黃氏書目汪玉撰毅菴孫公奏疏又南垣奏疏黃氏書目孫􅅷著慈谿人臺省疏稿八卷焦氏經籍志張瀚撰十按黄氏書目又有督撫奏議六卷崇藩疏稿萬厯嚴州府志章芸著石龍奏議又雲中奏疏稿又邊事奏稿台州府志黃綰著南渠奏議台州府志王爌著陸琳疏草天啓平湖縣志字文珮巡撫河南奏議一卷聚樂堂藝文志蔡汝楠撰圖治奏疏縉雲縣志施山著掖垣疏草縉雲縣志李長著厯任疏稿十一卷黃氏書目吳鵬撰一作三十卷端簡公奏議十五卷淮揚奏稿十卷黃氏書目鄭曉撰求志齋言草三十卷萬厯秀水縣志陳瀚著字元海警菴書疏六卷括蒼彚紀應檟著西臺奏議二卷括蒼彚紀黃中著南臺奏稿又臺中文議嘉靖寧波府志顧英著琴堂奏草又吏部奏稿嘉靖寧波府志楊子器著西槎疏草二卷黃氏書目龔輝著字實卿餘姚人密勿論一卷黃氏書目茅瓚著奏議八卷崇禎衢州府志江山毛愷著掌銓疏畧天啓平湖縣志陸光祖著趙當湖奏議四卷澹生堂書目趙漢撰葛端肅公輿川奏議尤氏藝文志葛守禮撰卹災疏草又卹刑疏草萬厯上虞縣志葛木著南垣奏疏四卷萬厯嘉興府志張應治著字體徴秀水人皆山堂奏稿七卷黃氏書目吕光洵著巡按萬厯紹興府志又有三奏議奏疏稿一卷金華縣新志馮亮著字執夫諫垣草四卷仁和縣志孫枝著督撫奏議仁和縣志陳洪濛著髙文端公奏議十卷内閣書目大學士髙儀著内附存稿一冊潘大司寇厯官奏議二十卷澹生堂書目潘季馴著巡撫廣東奏議一卷督撫江右奏議四卷兵部奏疏二卷刑部奏議二卷總理漕河奏議前後二集共十一卷趙端肅公奏議九卷黄氏書目趙錦著餘姚人撫晉疏抄銀臺奏議歸安縣志沈子木著字玉陽按陜奏議長興縣志姚一元著奏議八卷黃氏書目沈節甫著烏程人山東奏議分省人物考沈應龍著字翔卿烏程人敬所先生漕撫奏疏十卷黃氏書目王宗沐著滇南奏議又刑名奏議萬厯温州府志王諍著字子孝永嘉人三垣疏草天啓慈谿縣志馮成能著字子經江北題稿又中州奏議又鄖臺奏議天啓慈谿縣志葉照著兩巡奏議杭州府志董鯤著職掌條奏仁和縣志江曉著海石疏草二卷黃氏書目錢薇著北臺奏議海寜縣志朱瑞登著小司馬奏草六卷萬厯秀水縣志項篤壽著瑞山疏議黃巖縣志何贊著掖垣疏畧壽昌縣志李臺著西臺奏議永嘉縣志李光春著字元甫中臺疏草又畿南疏草天啓平湖縣志劉廷元著沈文恭公敬事草十九卷澹生堂書目沈一貫著朱文懿公奏議澹生堂書目朱賡著趙端簡奏疏六卷黄氏書目趙參魯著字宗傳鄞縣人撫閩奏疏六卷黄氏書目金學曾著字子曾錢塘人撫閩疏草三卷尤氏藝文志徐學聚著經畧朝鮮疏天啓平湖縣志馬維銘著王侍御疏稿四卷澹生堂書目王萬祚著疏按分省人物考又有留都草奏議十三卷嘉靖仁和縣志李昻著南臺奏議萬厯秀水縣志陳奇謀著慎菴奏議一卷黃氏書目沈裕著字以寧浙江人掖垣奏草五卷黃氏書目姚文蔚著禄勲疏草青田縣志王一中著三垣摘疏台州府志王士昌著童侍御奏疏錢塘縣志童漢臣著字仲良董侍御疏草甬上耆舊詩董光宏著掖垣疏草黃巖縣志盧明陬著兩臺奏草嘉禾徴獻録黃正色著字貞所秀水人軍門本稿天啓平湖縣志倪壯猷著救荒疏稿天啓平湖縣志過廷訓著中丞疏稿天啓平湖縣志陸萬垓著安攘疏草八卷又留工奏議歸安縣志沈儆炌著字泰垣冊立疏草一卷澹生堂書目朱國祚著三垣疏草東陽縣新志許𢎞綱著撫黔疏稿鄞縣志李橒著西臺疏草諸暨縣志陳性學著西臺奏議萬厯嚴州府志俞稷著字舜牧建徳人兵垣疏畧嘉禾徴獻録賀萬祚著字孝延嘉興人留垣諫草永嘉縣志陳堯言著字汝則中州卹稿歸安縣志嚴錫著字沖涵厯官奏議嘉禾徴獻録姚思仁著綸扉奏草黃氏書目錢士升著韓求仲疏草一卷澹生堂書目韓敬著東曹筆疏日下舊聞朱大啓著理屯疏稿又容臺疏稿又江州計過録永嘉縣志周應期著檀陽公牘又漁陽公牘嘉禾徴獻録項徳楨著字廷堅考功疏草一卷仁和縣志錢養廉著字國維奏議十卷仁和縣志陳禹謨著字孟文奏疏一卷烏程董嗣成著囘奏復社疏一卷黃氏書目倪元珙著奏牘三卷講編附尤氏藝文志倪元璐著諫垣奏議黃氏書目凌義渠著秘垣疏草四卷黄氏書目陳龍正著朗公疏稿四十二篇台州府志呉執御著西臺奏疏建徳縣志宋賢著罷菴奏議二十卷錢塘縣志吳太沖著按蜀疏草鄞縣志陳良謨著字賔日兵部奏議嵊縣志王心純著三垣疏草又秋曹存稿歸安縣志沈允培著字蒼嶼南床疏草長興縣志葉樹聲著以上明人甲乙疏稿四卷杭州府志張右民著河防奏議二十卷杭州府志總河尚書朱之錫著丹墀管議二十卷杭州府志工部尚書陳敳永著顥亭奏疏三卷戸部侍郎餘杭嚴沆著黄門疏稿二卷撫黔奏疏八卷兵部侍郎海寧楊雍建著西臺疏草十卷山隂縣志陳可畏著以上今人啓劄發遣三昧三十五卷嘉靖金華縣志王栢著兩漢書疏八卷百川書志明縉雲周瓘編尺牘筌蹄續文獻通考元陳桱著明七名公尺牘八卷澹生堂書目屠隆輯寸札𩔖選二卷格致叢書錢塘胡文煥德父輯名公翰藻五十二卷黃氏書目凌稚隆著䇿論判䇿府樞要續文獻通考元魯淵撰䇿斷二卷萬厯義烏縣志喻良倚著䇿塲集要括蒼彚紀何琮著字良瑞處州衛人䇿學海鹽縣圖經鄭曉著䇿學㑹元四十卷鄞縣志戴鰲著䇿樞五卷海鹽文獻志王文禄著三狀元䇿一卷崇禎衢州府志西安葉秉敬著應制䇿論一卷宋史藝文志陳舜俞撰進卷五十篇萬厯温州府志林幹撰劉汝一進卷十卷書録解題呉興劉度撰䇿曰𫝊言論曰鑑古各二十五篇䇿論十卷宋史藝文志齊唐撰賢良進卷二帙嘉靖長興縣志嚴抗著字汝益太平十三䇿一卷焦氏經籍志桂彦良撰萬言䇿一卷錢塘李旻著見白鉞李侍郎墓誌待問䇿二卷太和堂書目錢塘茅瓚著論學軌範兩浙名賢録繆主一撰古論十卷南鴈蕩志四溪林逢龍著止齋論祖四卷止齋論訣一卷八面鋒十三卷百川書志陳傅良著永嘉人嚴陵方逢辰批㸃論衡六卷黄氏書目茅維輯四書論三卷十二論二卷崇禎衢州府志葉秉敬著百道判集一卷唐書藝文志駱賔王撰南山日判六卷崇禎衢州府志葉秉敬著判義六卷兩浙名賢録蔡潮著臨海人騷賦離騷章句一卷讀書附志吕成公所分龍岡楚辭説五卷書録解題永嘉林應辰渭起撰離騷審問幷九歌九辨共十卷成化新昌縣志俞浙著騷畧三卷延祐四明志髙似孫著補楚辭一卷萬厯紹興府志姚舜明著變離騷九篇續文獻通考髙元之撰擬離騷二十篇嵊縣志張燦著離騷解萬厯秀水縣志黃洪憲著離騷新疏四卷桐鄉縣志陸時雍著離騷草木史九卷拾細一卷桐鄉縣志周拱辰著後典麗賦四十卷書録解題金華唐仲友與政編古賦正音宋濂著未完見鄭濤宋潛溪小傳賦畧五十卷賦畧外篇十五卷黃氏書目陳山毓輯賦海補遺三十卷梅墟别録周履靖著古賦一卷烏程董斯張輯常侍郎莊忽奇賦十一篇漢書藝文志顔師古注七畧云或言莊夫子或言族家子莊助昆弟也莊夫子賦二十四篇漢書藝文志名忌嚴