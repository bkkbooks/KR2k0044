body:
  text: 浙江通志卷九十七海防三杭州府杭州枕江負海錢塘縣沿江仁和海寜二縣瀕海江口兩山夾峙南曰龕山屬紹興蕭山縣界北曰赭山屬海寧縣界旁有小山曰鼈子山謂之海門江流經府西而南東接海寧縣界出海門以入於海故鼈子門控扼要害乃省會之鎻鑰而海寧則瀕海為縣東達澉浦南臨大洋石墩鳳凰黃灣諸山皆沿海必備之險也石墩山在海寧縣東五十里下有小港外通大洋城鳳凰山直插海中雖為海寧縣之水口實乃省之下關黃灣山在海寧縣東六十五里旁近大海有黄灣浦與澉浦接北通峽石袁花諸處最為險要明洪武初置浙江都指揮使司防守郡城其海口特設錢塘江水兵隸管操都司統轄海寧設千戸所隸海寧備倭把總統轄錢塘江水兵領哨官一員巡船二十隻兵二百名每年春秋二汛出鼈子門赭山海口哨探警息海寧所洪武三年建衞二十年改所在縣治東千户等官十八員旗軍六百九十七名轄寨一曰黃灣山寨在海寧縣東五十里臺六曰下館曰松林曰丁家村曰橫山近海塘曰潘家浦曰褚家團烽堠五曰尖山在海寧縣東六十四里南臨大海曰廟前曰巖門山曰赭山曰石墩巡檢司二曰赭山巡司弓兵一百名元至正間置洪武三年遷陳橋二十年築城赭山曰石墩巡司弓兵一百名洪武二年於峽石開設十二年徙石墩國朝經制額設杭協城守錢塘水師二營城守營副將統轄都司千把外委等官十三員兵八百五十七名俱詳見兵制除分防内地各汛外兼防海寧縣汛水師營都司僉書統轄千把外委等官十一員兵六百五十六名俱詳見兵制除分防内地各汛外兼防鼈子門河莊山汛鼈子門河莊山汛千總及外委把總輪防駐兵八十一名領唬船四隻康熙五十六年福浙總督滿保題請將本營防守運河快唬船十五隻内抽調四隻改為唬船赴本汛巡防雍正五年六月改為大唬船本汛原係杭協城守營海寧汛兼轄康熙五十六年福浙總督滿保題請將本營原防餘杭縣汛歸城守營管轄其海寧汛所轄鼈子門河莊山汛改歸本營管轄海寧縣汛把總及外委千總防守駐兵八十八名轄臺十八潘家壩華家衖將軍殿關帝殿馬牧港牛皮墩秧田廟廟前臺五里亭十里亭廿里亭范家堰周家墩石墩小尖山大尖山談山嶺鳳凰山海寧在城駐防初係督標把總康熙十年改城守營千總管轄小亹河南起至談山嶺止沿海十九處烽臺縣設兵二百名河南砲臺設兵十五名河北砲臺設兵十名五條圩至談家嶺每臺設兵五名名尖山順治二年設營中軍都司一員帶兵五十駐守康熙間巡海大人題定海寜縣撥杭州城守營千總一員帶兵二百各分插沿海一帶將尖山經制官撤赴囘營本朝謹按防海事宜至綱已具見於前惟衞所兵船烽而大備其全省大堠臺寨與營伍之相攝哨守之相聫俱分各府登載但因時制宜皆取前明之制而損益之故仍列聖朝明制於右以見善云規畫損益之盡嘉興府嘉興地處浙西惟平湖海鹽二縣之境東臨大海南澉北乍延袤百七十里相望寧紹諸山隱隱列拱白沙梁莊西海口秦駐山黃道港諸處皆為郡境之衝而乍浦一關尤稱𦂳要控據海岸翼蔽金山外通羊滸大洋實與江省相為脣齒云白沙灣在平湖縣東南五十三里距乍浦二十里濱海乍梁莊在平湖縣東南四十里東去獨山五里距浦一十五里濱海平西海口在海鹽縣東北五十里南通大洋北近湖浙西之咽喉也秦駐山在澉浦鎮東北十五里山下長隄沿海峙黃道廟港濱海與南岸臨觀二衞相極為衝要明洪武初置嘉興千戸所隸蘇州衞防守郡城其沿海特設海寧衞領乍浦澉浦二所隸海寧備倭把總統轄海寧衞洪武十七年建在海鹽縣治西去海半里乃嘉湖二郡之屏蔽南澉北乍各相去四十里東門龍王塘外即大洋直對浙東臨觀等衞迤南半洋即白塔山賊每泊此登岸而南則侵澉浦西有天寧寺為水陸通衢直抵嘉興此縣城之咽喉沿海之要衝也指揮以下等官六十員旗軍闕千四十九名轄寨二曰北舖曰藍田藍田浦在海鹽縣南三里浦口有寨臺六曰南臺去衞六里曰麥莊涇曰朱公亭曰北臺曰九里亭曰三間亭烽堠一曰藍田巡檢司一曰海口鎮巡司弓兵七十名在海鹽縣東北十八里唐時於縣東一里置寧海鎮元置海沙巡司明初因之在縣東門外洪武十九年徙此地名沙腰村乍浦所洪武十七年建在平湖縣東南二十七里去海半里東援金山西衞海鹽内捍平湖浙西之門戸也千户等官二十四員旗軍八百六十名轄寨七曰獨樹林過東五里即金山衞界曰梁莊大寨曰梁莊舊寨去新寨三里曰長沙灣曰蒲山外寨蒲山在平湖縣東南三十里濱海曰金家灣曰唐家灣臺七曰獨樹林曰益山曰西山觜曰蒲西山曰聖妃宫在陳山曰惹山惹山即雅山平湖縣東南十七里曰東山觜烽堠三曰陳山陳山平湖縣東三十里曰髙公山髙公山在陳山南一里曰觀山觀山一名官山平湖縣東南二十八里巡檢司二曰乍浦巡司弓兵七十名在平湖縣東南三十六里舊為顧邑巡司宋元時置於顧邑城内洪武十四年徙置乍浦鎮改今名十九年又移於此曰白沙灣巡司弓兵七十名元置蘆􅅹巡司於廣陳鎮洪武十九年移於白沙灣改今名澉浦所洪武十九年建在海鹽縣南三十六里之澉浦鎮去海一里山灣潮峻為南路之衝千户等官二十二員旗軍五百二十名轄寨四曰西山觜曰南海口在海鹽縣南離海半里與東海口俱為衝要曰混水閘曰葫蘆灣葫蘆山浸海中臺一曰東園烽堠五曰青山青山在澉浦鎮東三里本鎮主山也曰西山曰秦駐曰牆山長牆山鎮東三里橫截海濤若渚牆然曰廟山廟山在鎮西北三里巡檢司一曰澉浦巡司弓兵七十名在海鹽縣東北十八里秦駐山北初在澉浦鎮洪武中徙於此海寧把總統水兵三枝羊游哨許山哨乍浦守關駐劄海寧衞隸分守杭嘉湖參將羊游哨本總督同總哨官一員部領大小戰船二十隻兵四百一十四名汛期泊南羊山聖姑礁東哨至徐公上下川馬蹟等洋馬蹟徐公上川下川四山並在羊山東與定海總官兵會哨南哨至大羊山沙塘嶴衢山鼠狼湖等洋與定海總北哨官兵會哨西哨至灘許與游哨官兵會哨北哨至小羊山大小七山蘇州洋茅草洋與呉淞官兵會哨許山哨總哨官一員部領大小戰船二十隻兵三百七十五名汛期泊許山東哨至大小七山蘓州茅草等洋大七山小七山並在羊山東北與直隸官兵會哨南哨至大羊山沙塘嶴東嶽觜與定海總北左哨官兵㑹哨西哨至北漁山洋面最廣正對錢塘江口西望慈谿後海龍頭山相對與臨觀總後哨官兵會哨北哨至白塔港白塔山在海鹽縣東南二十里海中有港通魯浦名曰白塔潭海舟多泊焉與本關官兵會哨乍浦守關總哨官一員部領大小戰船十八隻兵四百八十八名泊守乍浦西海口外東哨至金山西哨至海鹽澉浦海寧等處海洋杭嘉湖㕘將嘉靖三十八年増設統陸兵四總前營後營左營右營水兵一枝游哨駐劄海鹽縣海寧一總屬其調度前營名色把總一員部領哨官四員兵四百三十七名屯劄乍浦所城汛期劄守乍浦梁莊東哨至大營盤地方與南直隸金山㕘將標兵會哨西哨至乍浦牛橋地方與後營官兵會哨後營官兵同前營屯劄海鹽操練汛期劄守乍浦海口東哨至牛橋地方與前營官兵會哨西哨至海鹽白馬廟地方白馬廟在海鹽縣北十八里沙腰村與左營官兵會哨左營官兵同前營屯劄海鹽縣城汛期劄守東門一帶東哨至白馬廟地方與後營官兵會哨西哨至秦駐山地方與右營官兵會哨右營官兵同前營屯劄澉浦所城汛期劄守南海口東哨至秦駐山地方與左營官兵會哨西哨至海寧黃灣與海寧所官兵會哨游哨中軍名色把總一員部領大小戰船十九隻兵二百五十九名汛期隨㕘將駐白塔山海港巡哨灘許羊山等洋䇿應督察各游哨兵船國朝經制額設嘉協城守營專司陸路兼轄乍澉二城又設乍浦水師營巡防洋汛滿洲水師營駐劄乍浦所城彈壓海疆要地嘉協營副將統轄左右兩營都守千把等官一十四員兵一千四百五十名俱詳見兵制除駐守府城分防内地各汛外其沿海仍設乍浦澉浦二汛乍浦所城右營守備防守駐兵一百五十三名快唬船二隻澉浦所城兩營撥把總輪防駐兵一百名快唬船一隻乍浦水師營㕘將統轄守備千把外委等官七員兵五百名俱詳見兵制戰船十隻内水艍船二隻南􅙔船四隻哨船四隻分防乍浦口址按期酌配官兵編定專汛隨䑸扼守跟䑸更番出洋巡哨乍浦口址天妃宫口轄砲臺一原防嘉協右營兵三十名今撤歸府城汛西山觜口轄砲臺一原防嘉協千總一員兵三十名今撤歸府城汛本營千總防守駐兵六十名乍浦海汛游守千把四員駕船四隻輪巡二月一換轄洋面七大羊山小羊山大小羊山相倚中隔一港三四里許大羊山稍東南小羊山稍近西北正北有小山錯雜交浮洋面正東為上川下川徐公馬蹟東北為大七小七正南雙頭洞姚姓浦長白山正西為滸山灘山西南為大小漁山為東霍西霍閩省商船之收入乍浦者必由東霍西霍之北滸山灘山之南西向入口收入上海者必由大七小七西向入口灘山滸山黃盤山與獨山相對中四嶼山筊杯山乍浦西南與鎮海營接界乍浦滿洲水師營副都統統轄協領佐領防禦驍騎校等官四十二員滿洲䝉古撥什庫等兵一千六百名緑旗水手兵四百名俱詳見兵制戰船二十二隻内大趕􅙔船九隻小趕􅙔船九隻南􅙔船四隻防守乍浦各門兼管西山觜砲臺與緑旗水師營協同教習水師船務寧波府寧波三面際海北面尤孤懸海濱呉淞海門呼吸可接東出鎮海大洋遼闊南連閩粤西通呉會舟山突起中洲延袤四百餘里控扼日本諸蕃厥惟咽喉之地故以要害而論鎮海為寧紹之門户舟山為鎮海之外藩海上設備多途寧波當全浙之衝尤不可不厚集其力也明洪武初置寧波衞防守郡城其沿海特設昌國衞領爵溪錢倉石浦前後諸所隸昌國備倭把總統轄定海衞領大嵩霩􅛾穿山舟山中中中左諸所隸定海備倭把總統轄定海今鎮海昌國衞洪武十二年舟山置千户所十七年改衞二十年徙象山之東門山二十七年又徙後門山在象山縣西南八十里去海三里本衞坐衝大海極為險要石浦關切近壇頭韭山乃倭舶出没咽喉必由之路懸海南北等山設舟師往來巡哨以為東路聲援其西象山縣石浦巡司則恃之以為右翼者也懸海金齒八排朱門等處設舟師往來巡哨以為南路聲援其北牛欄基旦門青門茅海竿門則恃之以為門户者也指揮以下等官七十六員旗軍四千四百八十名轄寨一曰南堡南堡寨在象山縣南三十里近海邊嘉靖中撥本衞并爵溪所兵共八十名委官一員帶領防守烽堠九曰仁義曰赤坎曰黃沙有隘曰前山在衞城内曰後山後門山在象山縣南一百里本衞跨山而成曰﨑頭與海中積谷山相對曰嵩嶴曰何家與海中旦門相對曰烏石烏石山與海中牛欄基相對爵溪所洪武三十一年建在象山縣西五十五里北去府城二百七十里去海一里本所西北阻山東逼大海西並錢倉南以游仙寨為外户北以象山縣為喉舌亦稱要地千户等官一十三員旗軍一千一百二十名轄寨一曰游仙游仙寨在爵溪所南嘉靖中撥昌國衛軍一百名本所軍一百五十名委官一員帶領防守烽堠七曰公嶼在象山縣東十五里與海中鞍子山相對曰沙嶺曰玉泉曰屏風屏風山在象山縣東北三十五里過此為湖頭渡乃鄞奉之境曰外嶺後有鋸門龍洞與游仙寨交界曰趙嶴曰半路巡檢司三曰爵溪巡司弓兵一百名在象山縣西五十五里姜嶼