原任署提臣張溥查議得玉環山雖孤懸海面然由彼而之内地各有港口西則由烏洋進蒲岐所可至樂清縣地方西南則亦由烏洋直過黄華門進盤石口可至溫州府郡西北則由楚門所横渡水面僅有里許即登岸踰嶺直至太平縣城止五十餘里東南則有黄坎二門溫黄二鎮水師廵防出此則為大洋矣此山週圍約計七百餘里其中山嶴多有寛平如砥土性肥饒可耕及各嶴口有潮水浸灌成灘者尚可煎鹽且此地外臨大海内近溫台寔為海疆諸郡之屏障洋面徃來之要區况有山可以暸逺海盗不能掩其形有口可以防查洋匪難以潛其跡查各處水師聞有洋盗而不能即至救䕶者多縁海潮退時船不能出及等潮漲賊已逺颺總由内地口岸遥逺賊艘風㠶迅速追獲維艱職此故耳若設兵此山由黄坎二門出哨追賊則無逺莫能及之慮矣從前督撫諸臣非不見及於此而究未議作何保安者一則恐外來認墾之徒奸良難辨一則恐墾熟之日私米下海一則恐添設官員所費不貲故也臣等愚見以為墾户若聴其四方紛雜而來寔難稽查方今生齒日繁即以浙地溫台而觀良有人多地少之勢莫若就本處近地之人查眀根柢由地方官取結給照徃墾其他閩廣無藉之人槩不收録則奸良不難分晰矣至所收米榖若慮出洋私賣莫若將所墾之田酌定科則輸納本色米榖所有餘米除留為日用之需外止許徃溫郡樂清太平地方運賣必由口岸汛地禀眀給照查驗放行並於黄坎二門隘口設汛嚴防顆粒不許入海則私賣之弊可除矣至于添設文武之處臣等亦為熟籌查守禦之要先門户而後堂奥玊環山寔海口門户此處一設官兵則内地亦可以資藩籬其次不甚衝要處所官兵可以通融稍减就近酌量抽撥即有不足添亦無多文職設同知廵檢二員武職則酌調遊擊一員并守備千把等官水陸分防船隻于溫黄二鎮量為移撥所需俸餉無甚増設且賦税所入及彼地深山樹木亦可抵俸工官署等用不致有糜費之處此雖設官添兵不過調遣料理稍費人力原非大為更張等因於雍正四年十一月二十日定議未敢冐昧具題今年新任提臣石雲倬到任復加商酌意見相同臣等誠恐地聫兩邑墾户紛紜若無専管之員則彼此推諉牽制料理未周且新經開復必查本處地土出息以抵經費未可輕動國家帑項再目前既有墾户則廵查既不可少而將來營伍汛防尤湏勘眀山海形勢以扼要衝正在選擇委調間適有保送引見之桐廬縣知縣張坦熊奉㫖回任以𦂳要員缺補用臣等随會委該員前徃經管清查即令署理太平縣印就近料理咨眀吏部在案一面檄調樂清營副將王璉就近協同查勘撥兵廵查徃來彈壓今已粗定規模臣等又復㑹同詳細商確并於原議斟酌損益謹將所擬各條臚列陳明恭請聖鑒一議得疆域正而後規制可定玉環地方週圍約有七百餘里峙立海中非内地土壤相錯者可比從前分属台州之太平縣溫州之樂清縣各轄其半夫以隔洋之地而使兩縣遥制且有兩府分属殊失其宜今雖志乘尚存兩縣都啚名色而遷棄既乆界址亦難畫分應専設一玉環同知管理毋庸再為分縣庶責成専而事權一至玊環既請展復准墾而附近玊環之山嶴尚多若不一併墾復徒為奸民私墾之資倘仍零星分轄難杜影射牽混之弊查楚門老岸南塘北塘以及芳杜東嶴密溪洞林地方志載太平縣玉環鄉二十四五六都之界又磐石蒲岐等處地方志載樂清縣地界又三盤黄大嶴狀元嶴茅埏等處地方向年悉在玊環轄内與樂清六七都相近俱同玉環一時遷遣現有人民在内偷墾田地今請一併展復開墾盡歸玊環同知管轄則疆域不致𤓰分而草萊亦得墾闢矣一議得職掌定而後法令可行設官分職原當因地制宜臣等伏見雲南䝉化景東及新設之中甸威逺等處皆以同知管轄與内地専設知縣之處不同者盖就其地方大勢而授以控制之權也玉環雖近内地而隔一海渡且地在台溫兩界之間又湏設立營制知縣位卑權輕與叅遊體統不敵于隔属呼應不靈故前條議以同知専管但此地新請展復必湏常川駐劄經理數年而後一切規制始定而台溫二府海防同知海洋俱係𦂳要且又有輪流押運及通省公事差委不能専一料理應另設溫台玊環清軍餉捕同知一員専管查給墾田督修塘壩徴收錢糧審理詞訟給放餉糈彈壓地方其通省别項公務免其差遣仍照雲南等處之例凢命盗事件即令該同知審觧臬司錢糧事件聴藩司考核本管道員盤查其地與溫州郡城相近相應𨽻于溫属有關渉玉環山事務者台溫二府属縣俱聴該同知専行管理所有玊環居住墾民田地人户俟安挿既定之後將田地分立都啚照造鱗册人户查編保甲一體稽察再俟盈寜既慶敎養並興若數年之後人文漸盛另請酌定令該同知考取童生送學臣考試量取數名附入溫州府學以示鼓舞在目前則地處山海之中稽廵防範更宜嚴密除衙役照各府同知衙門數目設立外仍照州縣例設民壯五十名置備器械習練技藝看守倉庫監獄廵查𦂳要隘口再設廵檢一員弓兵三十五名以聴該同知差遣廵緝查樂清縣之嶺店驛地處僻壤實属閒員請將嶺店驛丞裁改又逓送公文之舗兵必不可少應于太平樂清二縣各舗中每縣各酌量抽撥二名共設四名再該地應建倉厫又湏設倉夫四名斗級四名以司其事則防範可以不疎而職掌亦有専責矣一議得給墾清而後奸良不雜查展復玉環原為扼要據衝可扞邉海之門户曠土閒田可資窮民之衣食耳若使外來閩廣無藉之人一例冒墾將來奸良雜處即生事端况耕田必湏住居於此則安土重遷庶可乆而成聚彼富豪勢力之家本土有田可耕有廬可居㫁不肯挾妻子親戚舎舊圖新以實曠閒之地不過假立墾户招僱工人代為力作若輩徃來無常既不同於土著而墾户兼并營私反令無業窮民不得藉力耕以自給殊非廣土利民之意今臣等行令管墾之桐廬縣必查眀實係太平樂清兩邑籍貫無過之人取具本縣族隣保結移送該縣給與印照計口授田一切閩廣㳺惰及曽有過犯者槩不准其保送又恐田多人少若限定二縣之民或致招徠不廣現在酌量如本省各府属縣相近之處有願入籍開墾者照例於本地方官取結移送必湏住居玊環編入保甲毋許徃來不常其外省逺處之人仍行禁止則户口得實而藏奸無所矣一議得私米嚴而後接濟可絶米榖出洋臣等現在嚴行禁止實力堵禦玊環新墾海岸可通且黄坎二門逼臨大洋雖有官兵駐廵尤當加意防範查墾民終嵗勤動糧税衣食無非取給於米榖豈能禁其不賣莫若將所墾田糧照臺灣之例徴收本色完倉惟海濵潮濕米難乆貯應照所定米額每米一斗折榖二斗交倉收貯其餘多之米欲糶賣為日用之需者止許運徃太平樂清二縣及溫州府城仍由口岸汛地禀眀給執照沿途出入汛口照例掛號查驗並於黄坎二門嚴行廵查如有無照米船偷運出口者立即嚴拿照接濟盗賊之罪從重究治再查浙江尚有買補還漕米石毎年俱委員領銀前赴隣省買回乂有備貯各縣之榖出陳易新秋收仍湏買補今玉環既有餘米應于買米欵内每年酌動銀兩給與該同知領回于秋收米榖廣出之時照依時價收買貯倉酌量由海撥運逐年推移循環不絶則可濟本省積貯之需更可與閩省緩急相通甚便而米榖既輸于官自無私販之弊矣一議得水利修而後墾闢可廣玉環山海交錯其中如楊嶴正嶴瑤嶴三峽潭漁嶴塘洋墩東青西青下灣沙嶴蘆嶴等處寛平如砥約可耕之田地三萬餘畆其餘琛浦青塘塘額後峧大小普竹大小麥㠘大小古順等處塗田及附近之楚門老岸玊環鄉地方約田四萬餘畆蒲岐磐石大荆等處亦約田三萬餘畆合之三盤黄大嶴等處共約田地十餘萬畆但其中或近山磧或在海塗向來原有堤塘以為捍䕶因同時遷棄傾圯已乆草萊荒蕪全資人力尤必仍建塘堤以捍其衝激則鹹潮不能入設􅈝閘以時其啟閉則霪雨不為灾若能逐漸興修皆可成田以濟民食但採木購石飯食人工為費不貲赴墾之民率皆無田窮人缺乏工本難以責其盡出己資臣等現在飭令設法招徠寛科則以舒其力籌經費以助其工俱於後條詳議聲眀外其有墾户缺少牛種籽粒及築塘建閘工本情願領帑承墾者酌量動支買榖銀兩借給秋收將所得米榖照價繳還統歸買榖數内銷算則灌溉有資而田疇可廣矣一議得地利盡而後經費可充舉事建功先籌經費必於國家有益無損方為便官便民若因未墾之田土而先動現在之錢糧未為計之善也臣等以為玉環展復設汛置官則俸工役食衙署營房與夫城寨倉庫之建造塘壩堤㟁之興修在在不能無費即同知一官俸銀無多糧既徴收本色又無火耗可收即議有每石官耗三升尚不足以抵存倉折耗之需應照雲南新設威逺同知之例今酌給每年養亷公費銀二千兩心紅紙劄賞賚等項銀六百兩此等經費豈能盡出公帑而墾例初開即有十餘萬田畆亦非一時可以墾完者出入相較目前自多不敷查本地出息尚有可充公用者玉環各嶴向年雖名為奉禁不開而利之所在羣趨如騖多有潛至彼地搭盖棚厰掛網採捕刮土煎鹽私相買賣偷漏課税者每遇廵船徃查或行賄買脱通同朦隱或一時驅逐潛復聚集弁兵既難保其盡不營私廵船亦勢難于周流不息今既設官専管則此等盡當查出充公應請將漁户逐厰挨查取具保結許其採捕循照定海計厰徴收塗税之例酌分上中下三則每處設立官牙厰頭以司稽察所收税銀查眀數目造册申報以備玊環各項公費之需仍通飭閩浙沿海州縣採捕漁船照例取結刋號填給牌照連䑸彚幇赴玉環文武衙門查驗牌照填註採捕處所停泊汛口俟漁汛一畢合幇同返毋許逗留違者照例治罪至玉環既有墾民并文武官兵駐劄則食鹽為必需之物查鹺法雖當配引行銷而溫台兩府各縣票鹽乆有成額玊環係新開之地與舊日引額無關且孤懸海外斥鹵之區變幻靡常煎停不一所出僅供一隅之用不能逺資鄰封肩販非同内地塲竈可以添厰添盤招商配引者可比應將煎鹽之户取具親鄰族保甘結一體編入保甲著令并竈聚煎官收官賣止在本山賣與漁户居民毋許販賣出境其鹽本外所餘者亦查眀數目造册申報暫時留充公用除官兵原議抽調餉銀自有原數抵補并糧米即以所收田糧榖石給發毋庸另議外此數年中凡有前項所指玉環應用公務悉以玉環所收額糧及魚鹽等項出息儘數扺用漸次整頓逐年將出入之數造册送部銷算俟一切完備後另照内地之例糧米魚税編造全書歸入藩司項下充為本省兵餉題銷鹽課亦歸鹽政項下充餉則以地方自有之利為國家經費之助目前不煩公帑而日後咸為正供矣一議得科則平而後賦額無虧查墾復荒蕪原與熟田有間故有認墾之後分别三年六年後方始陞科之例所以紓民力而示招徠也至玉環等處遷棄已乆近山者沙石壅積近海者堤壩圯傾即居中平地之田蒿萊滿徑闢治需工更與内地荒田不同但玉環現在設官分汛需用經費若照舊例遲至數年後陞科則目前數年費用從何而出臣等再四籌畫惟有將玉環地方田地詳加勘丈别其土性之肥磽墾工之難易分為上中下三則仍照前徴收本色之議上則田每畆征條丁米一斗六升中則田每畆征條丁米一斗二升下則田每畆征條丁米七升地每畆征條丁米三升山每畆征條丁米一升以二榖折為一米交納每石另收官耗三升以備存倉黰折䑕耗之費其附近開墾之地除三盤黄大嶴等處與玉環地土不逺應仍照玊環例分上中下三則征收外其楚門老岸及磐石蒲岐等地方土皆瘠薄且修壩疏河嵗嵗皆需人力稍有愆期則鹹潮徃來便難耕蒔若與玊環一例定則勢難急公完清止可照依玊環所議之下則輸納庶能竭蹶完辦至於陞科完糧之期則槩令本年開墾本年起科庶可統濟玊環經費之需除今年已墾田地飭令丈眀秋收照則繳收造冊彚報變價辦公外其餘随墾随報逐年造冊送部則民力易於輸將而經費有所従出矣一議得營制周而後廵防無誤設營立汛原以建威銷萌亦在㨿險扼要溫州水陸地方與閩省接壤故設鎮標三營及城守營之外又有瑞安樂清磐石大荆四大營以為犄角雍正元年前任福建督臣滿保又題請將瑞安改為水師副將磐石改為水司叅將部議准行在案查樂清大荆磐石俱在内地而玊環包乎其外屹峙海中従前棄而不守故不得不以内地三營為門户今玊環既請展復實為三營之外障當溫郡之藩籬應請設立玊環營叅將一員守備二員千總二員把總四員兵九百名分為左右二營以左營為陸路右營為水師使水陸兼防庶扞禦有賴但玊環與磐石近且磐石雖改水師而所轄洋汛東西南北僅及百里今已應歸玊環則磐石一營不但無水師之責即陸路既有外蔽亦居次衝若仍循舊制復設重兵實為虚糜糧餉請將磐石水師叅將一員裁去同守備一員千總一員把總四員兵五百五十名移調玊環營再于内地之樂清營抽兵一百名大荆營抽兵一百名歸于玊環外尚少兵一百五十名查太平營之東嶴現分撥千總一員兵一百十九名駐劄防守但東嶴原係玊環鄉之二十五都向日玉環遷遣楚門一帶地方同時廢棄所以於東嶴地方設立弁兵防守今玊環鄉之二十四五六都與原轄之楚門老岸一帶田畆業經一體展復其東嶴即在玊環鄉之内既有楚門以為外扞請將東嶴千總一員兵一百一十九名移調玊環營酌量𣲖撥分防又溫州城守營與鎮標同駐郡城尚可抽出兵三十一名歸入玉環以足九百名之數玊環既設耑營其從前分𨽻黄磐兩營防守之陸路今應盡歸玊環管轄其水汛除磐石原管洋面仍歸玊環外再有附近玊環舊𨽻黄標右營廵防之女兒洞乾江衝擔嶼沙頭長嶼洋嶼及外洋之披山大鹿小鹿前山等洋汛俱應就近歸玊環營管轄以沙頭長嶼洋嶼東北洋面為黄鎮右營汛地西南洋面為玊環營汛地其外洋則以洞正属之黄標披山属之玊環為界尚少守備一員通省無可抽調應請添設再玊環雖分水陸與鎮海磐石瑞安等營之水陸兼司者事同一例但地方週圍七百餘里㡬與定海相等應查照定鎮標之例于左營量設馬三十五匹即以樂清大荆太平溫城守四營所抽三百五十名之兵内照依馬一歩九之例抽馬三十五匹歸於玊環毋庸另請添設仍將額兵分别馬一歩九戰三守七抽調以符通省兵制其所需戰船即將磐石營原管船八隻全數撥赴玊環照例將備輪廵内唬船一隻平底布帆不能渉歴大洋俟届造年分另行題眀改造沿邉哨廵小船十二隻將原給部價以為所需工費倘有不敷令承辦之溫處道在于玉環糧稅出息銀兩内支取添補開銷其磐石營應仍改為陸路但外有玉環障蔽毋庸再設叅遊大員兵數亦當酌减請設都司一員千總一員把總二員兵三百名防守但該營守備千把兵丁已請移調玊環止留千總一員兵二百七名在營尚缺都司一員把總二員兵九十三名今查有台協撥防太平之金清洋嶼二汛兵丁現議撥歸太湖營此二汛有撤回千把二員内將把總一員撥入磐石其餘官兵在近地俱係水陸要衝難以抽撥惟衢協三營除分防外其在郡城者副將之下尚有都司二員守備二員千總二員把總八員兵八百五十七名原係陸路應將該協右營都司裁去改為磐石都司并于右營存城之内抽調把總一員兵九十三名撥入磐石合原兵二百七名共三百名駐防磐石黄華關岐頭以内港水陸汛地責歸駐防都司防範照舊日營制仍歸樂清營管轄其新設玉環營應附近亦歸溫鎮統轄再磐石原係陸路設有馬匹自改為水師裁馬七十三匹今仍為陸路所有留兵三百名應于原裁馬數内復額三十匹以資馳驅則内外之形勝皆有扼守而水陸之廵防亦無疎悞矣再玊環孤懸海外其耑設文武較之各海防同知與沿海縣營等缺尤為𦂳要且新復之後規模初定必湏常得亷幹之員辦理方克有濟如三年内兵民相安招徠日盛開墾漸増一應事宜實能著有成效臣等會同保題聴部議叙即為分别陞用如不盡心整頓嚴加叅處仍請各頒給關防印信以耑職守嗣後同知叅將守備等官缺出于通省同知通判州縣叅遊等官内㨂選題補其廵檢千把咨部擇調以上各條臣等知識淺陋未能有當是否可行伏祈聖眀指示臣謹會同督臣高其倬提臣石雲倬䕶理浙江觀風整俗使杭嘉湖道叅議臣徐鼎合詞具題伏乞皇上勅部議覆施行奉㫖該部議奏随經户部以應如所請議覆奉㫖依議浙江通志卷八
