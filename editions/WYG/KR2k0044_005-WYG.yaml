body:
  text: 浙江通志卷六建置嘉興府水經注韋昭曰越北鄙在嘉興史記呉世家注檇李越地謹按春秋時檇李之地初為呉越分境後為越境方輿紀要嘉興府戰國時又為楚地清類天文分野之書秦分楚地為會稽郡改長水為由拳縣漢書地理志漢會稽郡海鹽由拳注髙帝六年為荆國十二年更名呉景帝四年會稽郡屬揚州至元嘉禾志東漢屬呉郡謹按呉郡圗經續記云漢順帝永建四年分會稽為呉郡以淛江中流為界與呉興丹陽號為三呉又按呉郡治呉縣其統海鹽由拳二縣則與西漢同續漢志呉大帝黄龍四年嘉禾生於由拳改縣曰禾興後以太子名和改曰嘉興輿地廣記晉宋屬呉郡晉太康元年屬呉郡隸揚州東晉咸和元年改隸呉國宋永初九年呉國罷復隸揚州𢎞治嘉興府志梁天監六年以海鹽縣屬信義郡太清三年析海鹽置前京縣與海鹽嘉興俱屬吳州至元嘉禾志陳武帝割海鹽屬鹽官清類天文分野之書隋罷嘉興縣以其地屬蘇州謹按𢎞治嘉興府志云隋開皇九年廢嘉興入錢唐屬杭州考隋書無明文惟晏殊類要有自呉至唐並為嘉興縣屬蘇州之語今從之舊唐書地理志武德七年分置嘉興縣八年廢嘉興入呉縣唐書地理志嘉興貞觀八年復置海鹽景雲二年復置謹按呉郡圖經續記云西漢之㑹稽郡舉今二浙之地皆在焉東漢之呉郡舉今浙西之地皆在焉晉之呉郡舉今杭秀睦三州之境皆在焉唐之蘇州舉今秀州之地在焉據此則知嘉興一府自唐以前俱屬蘇州審矣𢎞治嘉興府志天寳元年割嘉興之東境海鹽之北境崑山之南境置華亭縣𢎞治嘉興府志乾元元年隸浙江西道節度使永泰元年隸浙江西道觀察使大歴十四年改𨽻浙江都團練觀察使唐書地理志蘇州呉郡上縣嘉興海鹽華亭十國春秋注梁初嘉興縣改屬杭州十國春秋呉越武肅王於嘉興置開元府割華亭海鹽二縣屬焉十國春秋唐長興三年罷開元府謹按方輿紀要嘉興府志云後唐同光二年錢鏐置開元府治嘉興兼領華亭海鹽二縣長興三年府罷按唐制非京尹不得稱府鏐不敢置府於杭州何由置府於嘉興乎開元改府之名誤十國春秋晉天福三年呉越析嘉興為崇徳縣十國春秋晉天福五年呉越奏嘉興縣置秀州以嘉興海鹽華亭崇徳隸焉十國春秋吳越秀州領嘉興海鹽華亭崇徳宋史地理志兩浙路秀州宋史地理志政和七年賜郡名曰嘉禾宋史寧宗紀慶元元年升秀州為嘉興府文獻通考以孝宗誕聖之地升為嘉興府文獻通考秀州屬浙西路宋史地理志嘉興府為西路宋史寧宗紀嘉定元年升嘉興府為嘉興軍宋史地理志嘉興府本秀州軍事縣四嘉興華亭海鹽崇德至元嘉禾志元至元十三年改嘉興府安撫司十四年改為嘉興路總管府元史地理志江浙等處行中書省為路嘉興元史地理志江南浙西道肅政廉訪司嘉興路元史世祖紀至元十五年改華亭縣為松江府元史地理志元貞元年升海鹽崇徳為州元史地理志嘉興路上領縣一嘉興州二海鹽崇徳函史明復為嘉興府續文獻通考洪武二年海鹽崇徳復為縣明一統志浙江等處承宣布政使司領嘉興府謹按嘉興府明初統於南直隸洪武十四年十一月始改隸浙江布政使司史概宣徳五年增置嘉興府秀水嘉善桐鄉平湖四縣𢎞治嘉興府志宣徳四年三月廵撫大理寺卿胡概建議以嘉興海鹽崇徳三縣地廣賦繁分嘉興自郡城之西亘延而北至於呉江之柿涇為秀水自郡城而東北魏塘鎮東涉華亭之楓涇市北薄長洲之蘇來鄉為嘉善又分海鹽之東北為平湖又分崇徳之西北為桐鄉續文獻通考嘉興府領嘉興秀水嘉善海鹽平湖桐鄉崇徳七縣國朝定為嘉興府屬浙江布政使司領縣七嘉興秀水嘉善海鹽崇徳平湖桐鄉康熈元年改崇徳為石門縣嘉興縣輿地廣記故檇李地吳之南境元和郡縣志春秋時長水縣秦為由拳縣太平寰宇記土人謠曰水市出天子始皇東遊從此過見人乘舟交易應其謠遂改由拳縣漢書地理志會稽郡縣由拳後漢書郡國志吳郡城由拳宋書州郡志孫權黄龍四年由拳縣生嘉禾改曰禾興三國呉志赤烏五年立子和為太子改禾興為嘉興縣晉書地理志吳郡統縣嘉興宋書州郡志吳郡太守領嘉興南齊書州郡志吳郡嘉興𢎞治嘉興府志梁太清三年嘉興隸吳州陳永定二年嘉興仍屬吳郡清類天文分野之書隋罷縣以其地屬蘇州唐書地理志武徳七年置嘉興八年省入吳貞觀八年復置𢎞治嘉興府志天寶元年割嘉興之東境入華亭唐書地理志蘇州吳郡嘉興望輿地廣記五代屬杭州五代會要兩浙錢元瓘奏以杭州嘉興縣置秀州十國春秋吳越秀州領縣嘉興注按唐貞觀八年復置嘉興縣屬蘇州梁初改屬杭州未幾置開元府及府罷縣屬中呉軍已又置秀州此諸説所以有隸杭隸蘇之不一也宋史地理志嘉興府嘉興望元史地理志嘉興路領縣嘉興上倚郭舊浙江通志明嘉興縣屬嘉興府國朝嘉興縣屬嘉興府附郭編户二百八十八里秀水縣廣輿記吳嘉興地續文獻通考宣徳四年析嘉興縣置秀水縣玉照新志宣和末曽空青守秀水則宋時嘉興稱秀州亦稱秀水建炎中朱勝非節制平江府秀州著秀水閒居錄秀水在北門外麗橋東相傳天和景明則水漾五色宋時於子城西南建有秀水亨因以名縣舊浙江通志明秀水縣屬嘉興府國朝秀水縣屬嘉興府附郭編户二百里嘉善縣廣輿記古魏塘鎮續文獻通考宣徳五年析嘉興縣置嘉善縣舊浙江通志明嘉善縣屬嘉興府國朝嘉善縣屬嘉興府編户二百里海鹽縣越絶書海鹽縣始為武原鄉謹按呉越春秋越増封北至於平原越語作武原資治通鑑注秦為海鹽縣至元嘉禾志秦屬㑹稽郡漢書地理志會稽郡縣海鹽謹按明一統志云王莽改曰展武縣後䧟為湖移治武原鄉改武