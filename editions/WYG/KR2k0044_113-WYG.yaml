  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0044_WYG_113-1a, image: WYG0521/WYG0521-0731a.png}
body:
  text: 浙江通志卷一百十四職官四宋中撫諭使江端友字子我開封人諭閩浙諸路李正民諭兩浙明槖諭江浙諸路已上髙宗時任金永堅諭浙東恭帝時任兩浙提㸃刑獄呂夷簡字坦夫夀州人真宗時任尹錫孫沔字元規越州㑹稽人鍾離瑾見前林從周潮州人吳昌裔中江人已上仁宗時任張載字子厚鳳翔人黄實字師是陳州人盧秉字仲甫徳清人已上神宗時任楊傑字次公無為州人羅適字正之臨海人白具王祖道已上哲宗時任胡師文程遵彦蔡肇字天啓潤州丹陽人虞謩再任周彦質字文之江山人强浚明祖理黄克俊馬玿董正封錢景逢盛章畢漸朱維蔡安持李景夏周邦式羅選盧天驥張綱字彦正丹陽人李孟傅字文授山隂人姚舜明字廷輝嵊縣人周格處州人蔡佃鄭南張苑楊應誠章綡浦城人髙士瞳王仲閎胡䆳栁宗傑已上徽宗時任李質欽宗時任曽㡬字吉父贛州人再任趙叔近魏悼王五世孫趙哲韓膚胄施坰孫近張宗臣周綱明槖劉一止字行簡歸安人范同字擇善建安人李維宋孝先呂用中吳序賔范振朱敦儒字希真河南人林師說秦昌時宋棐邵大受金安節字彦亭休寜人吳表臣字正仲永嘉人黄仁榮建安人徐度樊光逺字茂實錢塘人曽逮河南人已上髙宗時任王葆字彦先崑山人任文薦張津字子問龍泉人栁大節芮􅂱字國器程大昌字泰之休寧人姚憲字令則嵊縣人龔輿湘隂人張方范成象張綸鄭與裔趙彦端王淮字季海金華人韓俁胡仰吳交如芮輝姚宗之傅自得趙益鞏湘傅琪張詔丘崈見前勾昌泰趙公碩陳舉善延璽趙不違周頡趙伯珪徐本中已上孝宗時任蔡戡林提應孟眀字仲實永康人陳傅良字君舉溫州瑞安人虞儔陳倚陳把喬行簡字夀朋東陽人已上光宗時任李大性謝源眀張伯垓張孝曽俞豐傅伯成范應鈴字旂叟豐城人李鈺孫昭先譙令憲劉爚字晦伯建陽人王渥趙彦倓程覃字㑹元湖州人葉箋沈皥汪綱字仲舉黟縣人王居安字資道黄巖人陳塏見前趙與夫處州人已上寧宗時任麋溧汪統葉棠胡頴李大謙牛大年字隆叟揚州人曹豳字西士溫州人潘剛中杜範字成之黄巖人項溶孫章謙亨馬光祖見前徐鹿卿見前吕午字伯可歙縣人陳晉接趙性夫楊伯嵒錢塘人髙斯得字不妄稼之子洪薿蔡抗袁立儒尤煓汪應元顧嵒何夢祥陳仁至孫子秀字元實餘姚人再任汪立信六安人魏克愚曹孝慶李芾見前朱應元陳宜中字與權永嘉人包恢字宏父建昌人陳塤字和仲鄞人吳淵見前再任趙與􅊸見前再任已上理宗時任唐震家鉉翁見前陳肖孫字伯巖奉化人已上度宗時任徐道隆恭帝時任陳桷字季任温州平陽人洪起畏王鼎見前朱縡馬尋項城人鞠真卿王師愈婺州人趙令譲陳睦劉潁字公實西安人陳太素緱氏人陳良翰字邦彦台州臨海人何異字同叔撫州崇仁人蕭振字徳起温州平陽人已上未審其次兩浙提舉茶鹽司薛映字景陽蜀人雷有終見前胡則見前張秉新安人王子輿字希孟莒人已上太宗時任胡淮宇文昌齡字伯修雙流人趙㞦西安人王子韶太原人舒亶字信道慈溪人已上神宗時任彭戢隣水人曽孝藴河間人張康國字賔老揚州人已上哲宗時任徐鑄吳人孫莊王賜鄭松年耿南仲開封人孫鼛字叔靜錢塘人已上徽宗時任梁汝嘉見前張伯舊李遷王翿蔡向王然韓協韓臨亨胡說修朱縡張宇王砆虞流常夀成髙世定鄭僑年游掞髙百之黄兊趙公稱邵大受都絜顔師魯字㡬聖漳州龍溪人米友仁字元暉襄陽人張廷實喻樗字子才南昌人章服字徳文永康人已上髙宗時任宋藻髙敏信蘇嶠徐蕆字子禮吳人林蕆姚憲字令則嵊縣人唐閟鄭良嗣劉孝韙折知常孫峴陳善何偁姚宗之李宗質鄞人趙韞朱熹字元晦婺源人余禹成勾昌泰岳甫田渭字清伯縉雲人鄭湜袁說友台州人張杓見前已上孝宗時任李沐黄唐陳把應武衛涇字清叔秀州人李謙李大性字伯和端州四㑹人已上光宗時任徐誼字子宜温州人薛紹莫漳歸安人劉誠之趙公豫字仲謙常熟人李洪葉籈張涇李浹字兼善吳興人章燮史彌逺字同叔明州人魯开孟植王遇王渥程覃見前李琪趙沆夫喻珪章良朋齊碩黄灝字商伯都昌人徐天麟字仲祥臨江人程珌字懷古休寧人已上寧宗時任金鑄李夀朋孫夢觀字守叔慈溪人葉棠王棐黄壯猷曽天麟陳振孫安吉人衛洙范鎔馬光祖見前袁立儒童頤章端子趙與杰趙與􅊸見前嚴粲馬天驥謝奕修程沐趙隆孫吳革見前季鏞栝蒼人趙㻀夫趙希槐文佾之孫子秀見前鄭䧺飛林光世錢可則朱應元潘牥字庭堅閩人曹豳字西士溫州人李獻可已上理宗時任潘峙王珏字徳全臨川人朱倬字漢章閩縣人劉棠龍溪人喬行簡見前侯叔獻宜黄人胡堅常見前章綡浦城人劉頴見前留春永春人陳睦莆田人洪适字景伯鄱陽人戴覺民羅㸃字春伯撫州崇仁人詹體仁字元善建寧浦城人已上未審其次兩浙提舉坑冶榮宗範濟州任城人真宗時任孔文仲神宗時任吳淵見前程元鳳見前吳潛見前已上理宗時任兩浙提舉市舶張闡字大猷永嘉人曽開字天游贛州人韓璡提舉學事陸藴徽宗時任知杭州軍知臨安府范旻字貴參大名人翟守素任城人李繼凝劉知信邢州人王化基真定人魏羽婺源人張去華字信臣襄邑人已上太宗時任張詠字復之甄城人宋太初字永初晉城人王仲華再任薛映見前王濟字巨州饒陽人戚綸字仲言楚邱人薛顔萬泉人馬亮字叔明合肥人再知王欽若字定國新喻人王隨字子正河南人已上真宗時任李及字知㡬鄭州人周起字萬卿淄州鄒平人胡則見前再知李諮字仲訽新喻人朱巽天長人陳從易字簡夫泉州人張觀字思正絳州人鄭向陳留人俞獻卿字諌臣歙州人栁植字子春真州人司馬池見前張若谷字徳繇沙縣人鄭戩字天休蘇州吳縣人蔣堂見前宋祁字景文開封人楊偕字次公坊州人方偕字齊古興化莆田人范仲淹字希文蘇州人張方平字安道宋城人呂溱字濟叔揚州人再知孫沔見前再知丁永孫李兌字子西許州臨潁人何中立許州人梅摯字公儀成都人唐詢字彦猷錢塘人施昌言字正臣通州人沈遘字文通錢塘人已上仁宗時任王琪見前蔡襄字君謨仙遊人胡宿見前祖無擇字擇之上蔡人已上英宗時任鄭獬字毅夫安陸人趙抃字閲道西安人再知沈立字立之和州人陳襄字述古福州人楊繪字元素綿竹人再知沈起字興宗明州人蘇頌字子容泉州人章惇字子厚浦城人鄧潤甫字温伯建昌人張詵字樞言建州浦城人吕公孺蒲宗孟閬州人已上神宗時任熊本字伯通鄱陽人再知蘇軾字子瞻一字和仲眉州眉山人林希字子中福州人再知王存字正仲丹陽人陳軒字元輿建陽人再知韓宗道真定人李琮字獻甫江寧人豐稷字相之鄞人呂恵卿字吉甫晉江人凡三知龔原字深父遂昌人鄒浩字志完晉陵人蔣之竒見前宇文昌齡見前鍾傅字弱翁樂平人王寧曽孝廣字仲錫晉江人曽孝藴見前再知朱彦王渙之字彦舟常山人席震蔡薿字文饒開封人再知張商英字天覺新津人劉逵字公路隨州人張閣字䑓卿河陽人龎寅孫董正封李偃徐鑄趙㠓趙霆翁彦國再知虞奕唐恪字欽叟錢塘人王淵熙州人已上徽宗時任毛友一作及葉夢得字少藴吳人已上欽宗時任錢伯言侍其傅鄭瑴建州人康允之劉誨季陵字延仲處州龍泉人胡舜陟字汝明績溪人李光字泰𤼵上虞人孫覿字仲益晉陵人席益宋煇盧知原字行之徳清人梁汝嘉見前汪思温字汝直鄞人李謨呂頤浩見前張澄再知蔣璨宜興人張滙俞侯王㬇華隂人張叔獻沈該字約父歸安人趙不弃湯鵬舉金壇人宋貺趙士㣓曹泳韓仲通榮薿張偁趙子潚見前再知錢端禮見前黄仁榮陳騤字叔進臨海人周必大字子充廬陵人已上髙宗時任林安宅陳輝吳芾字明可仙居人薛良朋韓彦直延安人再知王炎見前周淙見前姚憲字令則嵊縣人後任少尹胡昉韓彦古莫濛字子䝉歸安人後任少尹光宗臨安人晁公武字子止澶淵人少尹沈度少尹沈复字徳之徳清人少尹胡與可趙彦撡李椿字夀翁洛州人趙磻老吳淵見前王佐字宣子山隂人韓彦質再知張杓見前再知趙不流濮安懿王後景秉已上孝宗時任潘景珪謝深甫字子肅臨海人袁說友見前王厚之諸暨人蔡戡徐誼字子宜温州人已上光宗時任錢象祖台州人謝源明王溉趙師􅋷見前凡四知丁逄朱希顔趙善堅再知丁常任李澄陳景思王補之趙彦勵趙善防廖俁史彌堅再知趙善宣趙師石黄犖徐邦憲字文子義烏人王柟字汝良大名人再知趙時侃章良肱湖州人程覃見前陳廣夀袁韶字彦純慶元府人再知已上寧宗時任趙立夫温州人再知林介温州人余天錫字純父慶元人余鑄信州人薛瓊袁肅慶元人顔頤仲漳州人再知趙與懽見前凡三知史巖之慶元人趙與懃處州人吴潛見前趙與􅊸見前余天任慶元人余晦慶元人再知翁甫建寧府人厲文翁婺州人再知曽潁茂建昌人王克仁紹興人再知馬光祖見前徐㮚顧嵒安吉州人何夢祥婺州人葉隆禮台州人陶熾洪燾見前再知趙與訔見前髙衡孫魏克愚卭州人李鏞處州人吳革見前劉良貴瑞安人已上理宗時任孫子秀胡太初紹興人李芾見前潛說友見前趙與稙吴益江州人洪起朱浚建寧府人黄萬石建昌人已上度宗時任曽淵子文天祥見前賈餘慶家鉉翁見前已上㳟帝時任蔡京見前王襄南陽人已上未審其次謹按諸州先後依宋史地理志為次知越州軍知紹興府髙賦中山人錢儀已上宋初任畢士安代州人李凖李孝運髙適江正薛智周韓崇訓字知禮安武人盧文正封遂成王炳郭異元玘已上太宗時任馮勵裴莊康戩王礪張巽王贄李遹皇甫選楊侃字子正錢塘人陳靖字道卿莆田人髙紳盧幹任布字應之河南人燕爾字穆之青州益都人謝濤字濟之富陽人已上真宗時任尹錫宋可觀成恱蘇夀武功人陳覃葉參長洲人趙賀封邱人李照蔣堂見前郎簡字叔亷臨安人范仲淹見前張士遜陸軫龔鼎臣湏城人向𫝊式晁宗簡青豐人馬絳陳亞富嚴楊紘字望之浦城人魏瓘字用之王逵濮陽人李兌許州人許元字子春宣城人張友直字益人陽城人刁約沈遘見前張伯玉已上仁宗時任章珉朱肱吳興人陳升之字暘叔建陽人已上英宗時任鞠真卿元絳見前邵亢丹陽人沈立見前孔延之謝景温富陽人張諷趙抃見前程師孟字公闢蘇州人丁竦鄭穆字閎中侯官人梁彦明穆珣已上神宗時任黄履卲武人章楶字質夫浦城人張詢錢勰字穆父臨安人蔡卞仙遊人楊汲字潛古晉江人章衡字子平浦城人張修胡㢘飛詹康邵材再知翟思再知上官均字彦衡卲武人張琬已上哲宗時任豐稷周常建州人宇文昌齡見前鄒浩字志完鄞人詹文王資深方㑹李圖南呂益柔王仲薿劉韐字仲偃建州崇安人章綡宋昭年張汝舟鄭可簡已上徽宗時任李邴字漢老任城人翟汝文字公巽丹陽人已上欽宗時任葉燠李鄴邴之兄郭仲荀李彌大字似矩蘇州人傅崧卿字子駿山隂人陳汝錫字師二青田人張守字子固常州晉陵人再知朱勝非見前王綯字唐公吳人綦崇禮字叔厚髙宻人孟庾秦檜字㑹之江寧人孫近趙鼎字元鎮解州聞喜人再知周柲韓肖胄字似夫安陽人孟忠厚字仁仲再知樓炤字仲暉永康人詹大方趙令矜燕懿王後張震林待聘趙不弃字徳夫太宗之裔俞俟湯鵬舉見前曹泳趙士璨魏良臣趙令詪字君序燕懿王後再知王師心字與道金華人宋棐周淙見前湯思退字進之處州人吳執中字子權松溪人周葵字立義宜興人吳芾見前徐嚞西安人已上髙宗時任洪适見前史浩字直翁鄞人蔣芾見前方滋錢端禮見前留正字仲至泉州人張宗元張津字子問龍泉人李彦頴字秀叔徳清人張子顔王希呂字仲行宿州人再知鄭丙長安人丘崈見前鄭汝諧見前張杓見前已上孝宗時任洪邁字景盧鄱陽人王信字誠之麗水人趙不流宗室倪思字正甫歸安人葉翥已上光宗時任葛邲字楚輔吳興人單夔劉頴見前張伯垓耿延年汪義端字充之黟縣人沈作賔字賔王歸安人趙不迹袁說友見前李大性見前辛棄疾字幼安歴城人林采周珌錢宏祖趙師􅋷見前錢象祖章燮李珏黄由字子由長洲人留恭字伯禮永春人趙彦倓字安卿葉箋吳恪王補之沈皥汪綱字仲舉黟縣人再知已上寧宗時任汪統薛極武進人葉棠再知程覃見前許極黄壯猷李鳴復字成叔瀘州人魏了翁字華父卭州人潘剛中趙善湘見前余天錫字純父昌國人蔡範游似字景仁仲鴻之子史嵓之童頤史宅之季鏞字伯韶龍泉人趙與􅊸見前包恢字宏甫建昌人趙性夫别之傑字宋才潁川人趙希樸徐清叟字真翁洪薿吳潛見前馬天驥見前樓冶程沐陳顯伯厲文翁見前再知趙汝騰字茂實宗室子史宜之顧嵓謝奕修何夢祥葉隆禮台州人鄭䧺飛謝堂楊瑱馬光祖見前朱應元已上理宗時任張逺猷字辰卿綿竹人言通吳郡人常㮊字長孺臨卭人劉良貴馬廷鸞見前已上度宗時任施昌言字正臣靜海人王渙之字彦舟常山人强淵明字𨼆季錢塘人已上未審其次浙江通志卷一百十四
