body:
  text: 浙江通志卷一百十六職官六元元史百官志世祖定内外官其在外者則有行省行臺有宣慰司有㢘訪司其牧民者則曰路曰府曰州曰縣其長則䝉古人為之而漢人南人貳焉行中書省元史百官志行中書省凡十中統至元間始分立後改為某處行中書省凡錢糧兵甲屯種漕運軍國重事無不領之至元二十四年至大二年改行尚書省尋復如舊每省丞相一員平章二員右丞一員左丞一員㕘知政事二員郎中員外郎各二員都事二員舊制㕘政之下有簽省有同簽之屬後罷不置丞相或置或不置元史百官志江浙等處行中書省至元十三年初置江淮行省治揚州二十一年遷杭州二十二年割江北諸郡𨽻河南改曰江浙行省統有三十路一府元史武宗紀至大三年命江浙行省依前設左丞相餘省唯置平章二員元史百官志至正十二年江浙行省皆除添設平章右丞叅政行御史臺元史百官志江南諸道行御史臺至元十四年始置於揚州㝷徙杭州又徙江州二十三年遷建康統淮東淮西湖北浙東浙西江東江西湖南八道提刑按察司大徳元年定為江南諸道行御史臺設官九員以監江浙江西湖廣三省統江東江西浙西浙東湖南湖北廣東廣西福建海南十道大夫一員中丞二員侍御史二員治書侍御史二員經厯都事照磨架閣庫管勾陳發管勾兼獄丞各有差至正十六年移置行臺於紹興行樞宻院元史百官志行樞宻院有征伐之事則置大征伐則止曰行院為一方一事而設則稱某處行樞宻院或與行省代設事已則罷至元三年巴延奏准江浙置行樞宻院以鎮遏好亂之民四年罷至正十六年置江浙行樞宻院於杭州知院二員同知二員副樞二員僉院二員同僉二員院判二員首領官經厯知事各一員斷事官二員經歴一員行宣政院元史百官志元統二年革罷廣敎總管府一十六處置行宣政院於杭州院使二員同知二員副使二員同僉院判各一員首領官經厯二員都事知事照磨各一員令使八人譯使二人宣使八人至正二年江浙行宣政院設崇敎所擬行中書省理問官以理僧民之事宣撫使續文獻通考元之宣撫職在詢民疾苦體察官吏賢否以行省官或諸部尚書諸院使充之即唐廵察按察等使宣慰司元史百官志宣慰司掌軍民之務分道以總郡縣行省有政令則布於下郡縣有請則為達於省有邊陲軍旅之事則兼元帥府每司宣慰使三員同知一員副使一員經厯都事照磨兼架閣管勾一員元史世祖紀至元十三年立浙東宣慰司於臨安五月罷浙宣慰司設諸路宣慰司以行省官為之並帶相銜其立行省者不立宣慰司十七年定杭州宣慰司官四員十九年徙浙東宣慰司於温州罷宣慰使所帶相銜二十一年徙浙西宣慰司於平江元史百官志浙東宣慰司至正十二年添設宣慰司一員同知一員都事二員延祐四明志元立浙東宣慰司於紹興後徙處復徙婺至元十六年分治於慶元尋併於婺大徳七年立浙東都元帥府即舊府治為之肅政㢘訪司續文獻通考初立提刑按察司至元十三年以省併衙門罷十四年復置増立浙東海右江南浙西等道二十八年改按察司曰肅政廉訪司每道設八員除二使留司以總制一道餘六人分臨所部如民事錢糧官吏一切奸弊悉委之嵗終省臺遣官考其功效江南十道𨽻江南行臺江南浙西道杭州路置司浙東海右道婺州路置司財賦總管府續文獻通考江浙等處財賦都總管府掌江南没入貲産課其所賦以供内儲領提舉司三庫局各一元史百官志財賦總管府達嚕噶齊一員總管一員副總管一員經厯知事照磨提控案牘各一員元史武宗本紀至大元年立江浙財賦總管府提舉司續文獻通考各處行省所署之地皆置儒學提舉司統諸路府州縣學校祭祀敎養錢糧之事及考校呈進著述文字每司置提舉副提舉各一人吏目一人司吏二人元史百官志䝉古提舉學校官提舉一員同提舉一員至元十八年置惟江浙湖廣江西有之餘省不置轉運鹽使司元史百官志兩浙都轉運鹽使司使二員同知二員運判二員經厯知事照磨各一員至元十四年置司於杭州元史世祖本紀至元十六年立諸路轉運鹽使司設提舉同提舉副提舉各一員專領課程二十六年置浙東二鹽司詳見鹽法元史成宗本紀元貞元年罷各處鹽使司鹽塲元史百官志大徳三年定産鹽之地立塲有差元史仁宗本紀延祐元年増置兩浙鹽運司判官一員六年置兩浙鹽倉六所官二員惟杭州嘉興二倉設官三員鹽塲三十四所塲設鹽運一員元史順帝本紀至正二年杭州嘉興紹興温州台州等路各立檢校批驗鹽引所茶園提舉司續文獻通考常湖等處茶園都提舉司掌常湖二路茶園户二萬三千有竒採摘牙茶以供内府至元十三年置司統提領所凡十有三處十六年升都提舉司烏程武康徳清長興安吉歸安提領所各設正同副提領各一員俱授宣徽劄付元史順帝本紀元統元年江浙復立𣙜茶運司寳泉提舉司續文獻通考寶泉提舉司至元十一年置凡九所浙江行省一所所轄有銅冶塲凡三各制提領大使副使一人掌浸銅事市舶提舉司元史世祖本紀至元三十年留夢炎言杭州上海澉浦溫州慶元置市舶司物貨十五抽一從之仍併温州舶司入慶元杭州舶司入税務元史百官志每司提舉同提舉副提舉各二員知事一員都水庸田司元史成宗本紀大徳三年立浙西都水庸田司主水利諸路總管府元史百官志諸路總管府至元初置二十年定為上下路凡上路達嚕噶齊一員總管一員同知治中判官各一員下路不置治中餘悉同至元二十三年置推官二員專治刑獄下路一員經厯知事兼承發架閣並一員司吏無定制随事煩簡以為多寡之額譯史通事各一人其屬儒學敎授及學正學錄各一員其散府上中