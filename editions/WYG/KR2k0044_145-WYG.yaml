body:
  text: 浙江通志卷一百四十六名宦召棠郇雨具載風詩蓋遺愛在民歴久而不能忘也兩浙仕宦後先相望而樹德建功光昭竹帛者正復指不勝屈凛遵聖諭矢公矢慎逺稽近考不敢有善而失載尤不敢無美而濫登至前代有以浙人仕浙者其政績具見人物門無庸複出志名宦總轄周范蠡史記越王句踐世家蠡事越王句踐苦身戮力與句踐深謀二十餘年滅吳報會稽之恥北渡兵於淮以臨齊晉號令中國以尊周室句踐以霸蠡稱上將軍還反國蠡以為大名之下難以久居乃乗舟浮海以行自號鴟夷子皮謹按史記索隐注蠡字少伯楚宛三户人舊浙江通志作吳人非是計然史記貨殖𫝊越王句踐困于會稽之上乃用計然計然曰知鬬則修備時用則知物二者形則萬貨之情可得而觀已平糶齊物闗市不乏治國之道也論其有餘不足則知貴賤貴上極則反賤賤下極則反貴貴出如糞土賤取如珠玉財幣欲其行如流水修之十年國富厚賂戰士赴矢石如渇得飲遂報强吳觀兵中國注徐廣曰計然葵邱濮上人姓辛氏字文子秦王翦史記本傳平陽東鄉人少好兵事秦始皇乘勝畧定荆地城邑因南征百越之君始皇二十六年盡并天下王氏功為多謹按秦始皇本紀二十五年翦遂定荆江南地降越君置會稽郡於浙有平定功當入名宦後灌嬰倣此漢灌嬰漢書本傳睢陽販繒者也髙祖為漢王嬰以御史大夫將車騎别追項籍渡江定吳會稽郡漢王即帝位剖符食潁隂二千五百戸諡懿侯魏相漢書本傳字弱翁濟隂定陶人舉賢良以對䇿髙第為茂陵令遷揚州刺史考按郡國守相多所貶退丙吉與相書曰朝廷已深知弱翁治行方且大用矣願少慎事自重藏器于身相心善其言為霽威嚴居部二嵗徵為諫大夫宣帝即位為丞相封髙平侯謹按漢之揚州刺史及東漢初之揚州牧皆統轄浙郡者也如魏相鮑永諸人舊浙江通志皆失載今補録焉黄霸漢書本傳字次公淮陽陽夏人舉賢良為揚州刺史三嵗宣帝下詔曰制詔御史其以賢良髙第揚州刺史霸為潁川太守霸以外寛内明得吏民心治為天下第一五鳳三年代丙吉為丞相封建成侯自漢興言治民吏以霸為首何武漢書本傳字君公蜀郡郫縣人舉賢良方正徵對策拜為諫大夫遷揚州刺史所舉奏二千石長吏必先露章服罪者為虧除免之而已不服極法奏之抵罪其餘賢不肖敬之如一是以郡國各重其守相州中清平行部必先即學官見諸生試其誦論問以得失然後入𫝊舍出記問墾田頃畝五穀美惡已乃見二千石以為常為刺史五嵗入為丞相司直綏和元年為御史大夫更為大司空封汜鄉侯鮑永後漢書本傳字君長上黨屯留人光武即位遷揚州牧時南土尚多㓂暴永以吏人痍傷之後乃緩其衘轡示誅强横而鎮撫其餘百姓安之後為兖州牧張禹後漢書本傳字伯達趙國襄國人舉孝亷建初中拜揚州刺史當過江行部中土民皆以江有子胥之神難于濟涉禹將渡吏固請不聴厲言曰子胥如有靈知吾志在理察枉訟豈危我哉遂鼓楫而過厯行郡邑深幽之處莫不畢到親録囚徒多所明舉吏民希見使者民懐喜恱怨德美惡莫不自歸焉入為大司農拜太尉馮緄後漢書本傳字鴻卿巴郡宕渠人舉孝亷順帝以緄持節督揚州諸郡軍事與中郎將滕撫擊破羣賊後為廷尉卒于官劉祐後漢書本傳字伯祖中山安國人舉孝亷為揚州刺史時會稽太守梁旻大將軍冀之從弟也祐舉奏其罪旻坐徵遷祐河東太守臧旻後漢書臧洪𫝊洪廣陵射陽人父旻有幹事才熹平元年會稽妖賊許昭起兵句章自稱大將軍攻破城邑衆以萬數拜旻揚州刺史旻率丹陽太守陳夤擊昭破之昭遂復更屯結大為人患旻等進兵連戰三年破平之獲昭父子斬首數千級三國吳蔣欽吳志本傳字公奕九江夀春人孫䇿東渡拜别部司馬遷西部都尉會稽冶賊吕合秦狼等為亂欽將兵討擊遂擒合狼五縣平定徙討越中郎將吕岱吳志本傳字定公廣陵海陵人孫權召署録事出補餘姚長召募精健得千餘人會稽東冶五縣賊吕合秦狼等為亂以岱為督軍校尉與將軍蔣欽等將兵討之遂擒合狼五縣平定拜昭信中郎將嘉禾四年廬陵賊李桓路合會稽東冶賊隨春南海賊羅厲等一時並起權復召岱督劉纂唐咨等分部討擊春首降岱拜春偏將軍使領其衆晉周筵晉書周處傳處義興陽羡人子札札兄子筵卓犖有才幹拜吳興太守遷太子右衛率王敦作難加冠軍將軍都督會稽吳興義興晉陵東陽軍事率水軍三千人討沈充未發聞其叔札開城納敦憤咤慷慨形于辭色尋遇害王舒晉書本傳字處明瑯琊臨沂人丞相導之從弟成帝時授撫軍將軍會稽内史在郡二年而蘇峻作逆假節都督行揚州刺史事庾冰奔舒舒率衆俱渡浙江顧衆顧颺等起義軍以應舒吳興太守虞潭率所領屯烏苞亭不敢進舒遣子允之以精鋭三千邀賊于武康破之時臨海新安諸山縣並應賊舒分兵討之陶侃立行臺上舒監浙江東五郡軍事賊平以功封彭澤縣侯卒贈車騎大將軍儀同三司諡曰穆顧衆晉書本傳字長始吳郡吳人成帝時為義興太守蘇峻反衆還吳潛圖義舉時吳國内史庾冰奔于會稽峻以蔡謨代之前陵江將軍張悊為峻收兵于吳衆遣人喻悊悊從之衆遣郎中徐機告謨謨檄衆為本國督䕶會稽内史王舒吳興内史虞潭並檄衆為五郡大督䕶統諸義軍潭遣將姚休為衆前鋒與賊戰没衆還守紫壁時賊黨方鋭人咸勸衆過浙江衆曰不然今保固紫壁可得全錢唐以南五縣若越他境便為寓軍控引無所非長計也臨平人范明亦謂衆曰此地險要可以制冦不可委也衆乃版明為叅軍復進討賊峻平論功封鄱陽縣伯卒贈光禄大夫諡曰靖蔡謨晉書本傳字道明陳留考城人舉秀才元帝辟為掾轉叅軍後為中書侍郎厯義興太守遷侍中蘇峻搆逆吳國内史庾冰出奔會稽乃以謨為吳國内史謨既至與張闓顧衆顧颺等共起義兵迎冰還郡峻平復為侍中賜爵濟陽男康帝即位代殷浩為揚州刺史卒贈侍中司空諡曰文穆何充晉書本傳字次道廬江灊人成帝時拜散騎常侍出為東陽太守除建威將軍會稽内史在郡甚有德政薦徵士虞喜㧞郡人謝奉魏顗等以為佐吏後去郡除丹陽尹建元初領揚州刺史王述晉書本傳字懷祖太原晉陽人少襲父爵出補臨海太守遷建威將軍會稽内史蒞政清肅終日無事代殷浩為揚州刺史郄愔晉書郄鑒傳鍳髙平金鄉人子愔字方囘為臨海太守在郡復㳺頗稱簡黙簡文帝輔政徵為光禄大夫除太常深抱沖退樂補逺郡出為會稽内史桓温遷愔都督徐兖青幽揚州諸軍事轉會稽内史簡文帝踐阼加都督浙江軍五郡軍事以年老乞骸骨因居會稽徵拜司空詔書優美敦奬慇懃固辭不起王薈晉書王導傳導子薈字敬文少厯清宦除吏部郎侍中吳國内史時年饑粟貴人多餓死薈以私米作饘粥以飼餓者所濟活甚衆徴拜尚書領中䕶軍復為吳國内史轉督浙江東五郡左將軍會稽内史加散騎常侍按薈瑯琊臨沂人劉牢之晉書本傳字道堅彭城人孫恩陷會稽牢之遣將桓寶率師救三吳復遣子敬宣為寳後繼率衆東討至吳與衛將軍謝琰擊賊屢勝徑臨浙江進拜前將軍都督吳郡諸軍事時謝琰屯烏程遣司馬髙素助牢之牢之率衆軍濟浙江恩懼逃于海牢之還鎮恩復入會稽牢之進號鎮北將軍都督會稽五郡率衆東征屯上虞分軍戌諸縣及恩死牢之威名轉振南北朝蔡興宗宋書本傳世祖時為臨海東陽太守遷會稽太守加都督會稽東陽新安永嘉臨海五郡諸軍事會稽多諸豪右又幸臣近習叅半宫省封畧山湖妨民害治興宗皆以法繩之會土全實民物殷阜王公妃主邸舍相望大為民患子息滋長督責無窮興宗悉啟罷省乂陳原諸逋負解遣雜役並見從三吳舊有鄉射禮久不復修興宗行之禮儀甚整尋任荆州刺史封樂安縣伯按興宗濟陽考城人廓子蕭子良南史本傳字雲英武帝第二子宋昇明三年為會稽太守都督五郡封聞喜公子良敦義愛古郡人朱百年有至行朱卒賜其妻米百斛蠲一人給其薪夏禹廟盛有禱祀子良曰禹泣辜表仁菲食旌約服玩果粽足以致誠使嵗獻扇簟而已時有山隂人孔平詣子良訟嫂市米負錢不還子良歎曰昔髙文通與寡嫂訟田義異于此乃賜米錢以償平武帝即位封竟陵郡王蕭映南史本傳字宣光髙帝第三子仕宋位給事黄門侍郎南兖州刺史髙帝踐阼改都督揚州刺史莅事聰敏府州曹局皆重足以奉禁令永明元年為侍中驃騎將軍蕭景南史本傳字子照梁武帝從父弟也仕齊為永寜令政為百城最永嘉太守范述曾居郡號稱亷平雅服景為政乃榜郡門曰諸縣有疑滯者可就永寜令決以疾去官永嘉人胡仲宣等千人詣闕表請景為郡武帝踐阼封吳平縣侯天監十五年詔景為安右將軍監揚州置佐史在州尤稱明斷符教嚴整有田舍老姥訴得符還至縣縣吏未即發姥語曰蕭監州符如火汝手何敢留之其為人所畏敬如此程靈洗陳書本傳字元滌新安海寜人以勇力聞梁末侯景據有新安湘西侯蕭𨼆奔靈洗靈洗奉以主盟劉神茂自東陽建義靈洗與神茂相應元帝授持節通直散騎常侍都督新安郡諸軍事景敗進軍建德擒賊帥率所部下揚州助王僧辯鎮防遷吳興太守陳紹㤗元年授信武將軍封遂安縣侯賀若弼隋書本傳字輔伯河陽雒陽人髙祖拜弼為吳州總管委以平陳之事開皇九年大舉伐陳以弼為行軍總管平陳後帝勞之曰克定三吳卿之功也加上柱國封宋國公楊素隋書本傳字處道𢎞農華隂人為行軍總管浙江賊帥髙智慧自號東揚州刺史船艦千艘屯據要害兵甚勁素擊之自旦至申苦戰而破智慧逃入海素躡之從餘姚泛海趣永嘉智慧來拒戰素擊走之擒獲數千人賊帥汪文進據東陽進討悉平之又破永嘉賊帥沈孝徹于是步道向天台指臨海郡逐捕遺逸冦前後百餘戰智慧遁守閩越詔令馳𫝊入朝素以餘賊未殄恐為後患又自請行乃下詔任以大兵總為元帥素復乗傳至會稽汎海追捕執智慧斬于泉州自餘支黨悉来降附江南大定來䕶兒隋書本傳字崇善江都人平陳之役有功進位上開府從楊素擊髙智慧于浙江而賊據岸為營周亘百餘里船艦被江鼓譟而進素令䕶兒率數百輕艓徑登江岸直掩其營破之智慧窮蹙遁走進位大將軍謹按舊浙江通志名宦總部自周至隋共一十六人重加考訂陳惲當入杭州嚴州祠祀志髙史君當入嘉興陸慧曉當入紹興劉裕即宋武帝不當列于名宦江子一慕容三藏並無政績孫韶係孫䇿之屬籍及沈懷文周文育俱浙江人當入人物志兹從諸史舊志採録凡三十一人唐李大亮唐書本傳京兆涇陽人大亮有文武才畧髙祖擢越州都督貞觀八年為劍南道巡省大使性忠謹外若不能言而内剛烈不可干以非義在越州冩書數百卷及去留都督署龎玉萬厯紹興府志京兆涇陽人魁梧有力明軍法仕隋為監門直閣率萬騎降髙祖以隋舊臣禮之授領軍武衛二大將軍加越州都督威望甚著盗不敢入境卒贈幽州都督工部尚書越人思其遺澤祠為城隍之神狄仁傑唐書本傳字懷英并州太原人髙宗時拜冬官侍郎持節江南巡撫使吳楚俗多滛祠仁傑一禁止凡毁千七百房止留夏禹吳太伯季札伍員四祠而已轉文昌左丞中宗贈司空封梁國公李濬舊唐書良吏傳濬隴西人開元初置諸道按察使盛選能吏以濬為江南東道按察使封真源縣子濬誠信待物稱為良吏去職有遺愛贈戸部尚書諡曰成齊澣嘉靖浙江通志字洗心定州義豐人開元二十六年為江南東道採訪使先是廢鄞州為鄮縣隸越州澣始奏請復為州以境内有四明山故號為明州招集流民五百户安輯之天寶初召為太子詹事劉晏唐書本傳字士安曹州南華人天寶末拜度支郎中兼侍御史領江淮租庸事晏至吳郡而永王璘反採訪使李希言假晏守餘杭晏因發義兵堅壁王聞晏有備遂自晉陵西走終不言功代宗時拜御史大夫領江淮轉運使移書元載陳四利四病載以漕事委晏晏盡其才嵗輸至天子勞曰卿朕酇侯也凡嵗致四十萬斛初晏分置諸道租庸使慎簡臺閣士専之皆新進鋭敏盡當時之選趣督倚辦故能成功王栖曜舊唐書本傳濮州濮陽人上元元年王嶼為浙東節度使奏為馬軍兵馬使廣德中衮晁亂台州盡有浙江之地御史中丞袁傪東討奏栖曜為偏將連日十餘戰生擒袁晁收復郡邑授浙江都知兵馬使李栖筠唐書本傳字貞一世為趙人舉進士代宗時平盧行軍司馬許杲恃功擅留上元有窺江吴意拜栖筠浙西都團練觀察使圖之栖筠至張設武備遣辨士厚齎金幣抵呆軍賞勞使士歆愛奪其謀杲懼悉衆渡江乂増學廬表宿儒河南褚沖吳何員等超拜學官為之師身執經問義逺邇趨慕至徒數百人又奏部豪姓多徙貫京兆河南規脱徭科請量産出賦以杜姦謀詔可尋拜御史大夫韓滉舊唐書本傳字太沖京兆長安人大厯十二年拜浙江東西都團練觀察使尋加鎮海軍節度使滉安輯百姓均其租税未及踰年境内稱理涇師之亂滉以兵三千人臨金山江南兩浙轉輸粟帛府無虚月朝廷賴焉興元二年特封晉國公上以滉浙江東節度素著威名加江淮轉運使尋加度支諸道轉運鹽鐵等使李若初冊府元龜趙郡人貞元中為浙西觀察使善於吏道時錢少貨輕州縣禁錢不出境商賈不通若初始奏縱錢以起萬貨詔可而性剛嚴强力東下吏人畏服皇甫政嘉泰會稽志貞元三年自權知宣州刺史授浙東觀察使紹興府志政在鎮十年多惠蹟修治水利開鑿玉山朱儲二斗門以時蓄洩民甚德之王緯唐書本傳字文卿并州太原人德宗進緯給事中浙西觀察使缺宰相李泌擬緯帝曰黄門要地獨不留議事耶對曰浙西賊入尤劇緯清而忠能惠養民故請遣之制可初州縣有韓滉時罰錢未入者十八萬緡府吏請裒為進奉緯上疏願蠲以紓民詔聴之貞元十年加御史大夫兼諸道鹽鐵轉運使裴肅舊唐書裴休傳休河南濟源人父肅貞元中越州刺史浙東團練觀察等使時山賊栗鍠誘山越為亂陷浙東郡縣肅帥台州兵討平之因紀其事號平戎記上之德宗嘉賞焉閻濟美舊唐書良吏傳濟美登進士第貞元末自婺州刺史為浙西觀察使以簡澹為理常賦之外不知其他入拜右散騎常侍薛戎舊唐書本傳字元夫河中寶鼎人閻濟美為福建觀察使奏充副使又隨濟美移鎮浙東累改衢湖常三州刺史遷浙東觀察使所莅皆以政績聞檢身處約不務虚名俸入之餘散于宗族身殁之後人無譏焉唐書本傳所部州觸酒禁者死橘未貢先鬻者死戎弛其禁楊於陵唐書本傳字達夫𢎞農人貞元末進浙東觀察使越人饑請出米三十萬石撫贍貧民政聲流聞入為京兆尹以尚書左僕射致仕李遜舊唐書本傳字友道趙郡人元和初為衢州刺史以政績殊尤遷越州刺史兼御史大夫浙東都團練觀察使先是貞元初皇甫政鎮浙東福建兵亂逐觀察使吳詵政以所鎮實壓閩境請權益兵三千俟賊平而罷賊平三十年而所益仍舊遜視事數日舉奏停之遜為政以均一貧富扶弱抑强為已任故所至稱理長慶元年進位檢校吏部尚書孟簡嘉靖浙江通志字幾道德州平昌人舉進士為睦州刺史元和中進浙東觀察使于山隂縣北開新河又于縣西北開運道塘與韓愈友善以文學名竇易直唐書本傳字宗元京兆始平人元和中為浙西觀察使長慶二年江淮旱漕物淹積不能前部將王國清指漕貨激衆謀亂易直知之械國清送獄其黨數千羣讙入獄簒取之欲大剽易直登樓令曰能誅亂者一級賞千萬衆喜反縳為亂者三百餘人易直悉斬之入為户部侍郎同平章事諡恭恵薛苹舊唐書良吏傳河東寶鼎人遷浙江東道觀察使以理行遷浙江西道觀察使廉風俗守法度人甚安之理身儉薄常衣緑袍十餘年不易因加賜朱紱然後解去除左散騎常侍致仕元稹白居易元君墓誌字㣲之河南人穆宗時拜浙東觀察使先是明州嵗進海物其程日馳百里稹至郡奏罷之辨沃瘠察貧富均勞逸以完税籍冬築陂塘春貯雨水夏溉旱苗農人賴之無餓殍會稽山水竒秀所辟幕職皆當時文士鏡湖秦望之㳺諷詠詩什動盈卷帙副使竇鞏與之酬唱最多至今稱蘭亭絶唱在越八載政成課髙加檢校禮部尚書入為尚書左丞陸亘唐書本傳字景山蘇州吳人浙東觀察使文明嚴重以善政稱温州瀕海經賊亂奪官吏半禄代民租後相沿更以為奸亘還官全廪繩贓罪吏畏而賴之崔郾舊唐書本傳字廣畧清河武城人舉進士敬宗時浙江西道都團練觀察使用寛政安疲人清簡少事財用有餘卒贈吏部尚書諡曰德丁公著唐書本傳字平子蘇州吳人舉明經髙第穆宗授浙西觀察使徙為河南尹治以清靜聞長慶中浙中災厲拜觀察使詔賜米七萬斛使賑饑民久之入為太常卿李德裕舊唐書本傳字文饒趙郡人穆宗即位召入翰林充學士後為浙西觀察使儉于自奉留州所得盡以贍軍俗信巫祝惑鬼怪冇父母兄弟厲疾者舉室棄之而去德裕擇鄉人之有識者諭之以言繩之以法弊風頓革屬郡祠廟按方志前代名臣賢后則祠之除滛祠一千一十所人樂其政敬宗即位詔浙西造銀盝子粧具二十事進内又詔進可幅盤絛繚綾一千匹徳裕具論奏罷優詔報之德裕身居㢘鎮傾心王室遣使獻丹扆箴宵衣正服罷獻納誨辯邪防㣲六首帝手詔答焉文宗即位加儉校禮部尚書德裕在浙西八年雖逺闕廷每上章言事文宗素知忠藎採朝論徵之太和八年改鎮海軍節度蘇常杭潤觀察等使九年授太子賔客分司明年復浙西觀察使凡三鎮浙西前後十餘年武宗即位授門下侍郎同平章事敬晦唐書本傳字日彰河中河東人進士及第大中中浙西觀察使時南方連饉有詔弛榷酒茗官用告晦處身儉勤貲力遂充徙兖海節度使王式唐書本傳太原人大中中劇賊裘甫亂明越觀察使鄭祗德不能討宰相選式往代懿宗問方畧對曰苐假臣兵寇不足平也詔益許滑淮南兵式發自光福里第麾幟皆東靡獵獵有聲喜曰是謂得天時矣聞賊用騎兵乃閲所部得土畨囘鶻遷𨽻數百發龍陂監牧馬起用之集土團諸兒為鄉導擒甫斬之加檢校右散騎常侍餘姚民徐澤専魚鹽之利慈谿人陳瑊冐名仕至縣令皆豪縱不能制式曰甫竊發不足畏若澤瑊乃巨猾也窮治其姦皆榜死咸通三年徙武寜節度使王龜册府元龜字大年太原人咸通中為浙東觀察使凡天下有倉庫羡餘皆隸于本州名曰賞設庫以備地主之費龜則有給于公者給之或逰客故人皆以已俸奉之初龜為同州刺史有恵政浙人聞其至懽迎焉卒贈工部尚書裴璩嘉靖浙江通志絳州聞喜人乾符四年為浙江鎮海節度使值浙西狼山鎮遏使王郢作亂璩宻招其黨朱實降之散其徒六七千人郢奔明州五年曹師雄冦湖州璩遣兵擊破之官至太子太師謹按舊通志名宦總部唐代一十八人重加考訂汪華當入祠祀李緯當入衢州趙𨼆政績未善而洪經綸臣于朱泚劉巨容髙駢在藩鎮中尤稱悖逆特為刪去又于唐書中補採一十五人共得二十九人蓋髙宗時之江南道𤣥宗時之江南東道肅宗代宗時之江淮轉運使浙江固在統轄内也五代元德昭吳越備史字明逺撫州南城人姓危氏武肅更曰元起家鎮東軍節度巡官錢塘縣令累授睦州軍事判官知台州新亭監文穆襲國遂掌文翰忠獻王時南閩用師凡兵機細務悉以委之尋拜丞相德昭厚重多謀臨事不撓每屬嚴警議者盈庭德昭至則他論皆息軍中有不識理者徳昭以事諭之無不聴服饒景十國春秋青州淄水人唐廣明時杭州建八都景為唐山都將事武肅王為鎮海軍紫溪鎮遏使累有防禦功郭師從嘉靖浙江通志合肥人仕吳越為浙東馬步都虞候從文穆王瓘破廣德征無錫皆有功累遷浙西營田副使忠獻王時以累勲拜同參相府事謹按舊通志名宦總部五代共八人重加考訂黄晟曹信曹仲達俱係浙人當入人物林鼎不當入名宦皮光業沈崧均無在任政績可考故删去外増饒景一人宋范旻宋史本傳字貴參大名宗城人太平興國初錢俶獻地以旻權知兩浙諸州軍事旻上言俶在國日徭賦繁苛凡薪粒蔬果箕帚之屬悉收算欲盡釋不取以蠲其弊從之楊克讓宋史本傳字慶孫同州馮翊人太平興國初為兩浙西南路轉運使居官亷謹幹局有聲每視事自旦至暮或通夕斷決如流無有凝滯當時稱為能吏翟守素宋史本傳濟州任城人太平興國三年錢俶獻浙右之地詔守素為兩浙諸州兵馬都監安撫諸郡人心甚悦即以知杭州守素性謹慎寛仁容衆凡斷大辟獄雖罪狀明白仍徧詢僚宷僉同而後決屬吏有過不面折必因公宴援住事之相類者言其獲咎以微警之周渭宋史本傳字得臣昭州恭城人建隆初上書言時務召試賜同進士出身太平興國中進殿中侍御史改兩浙東路轉運使厯彰信軍節度副使咸平二年真宗聞其清節召還卒貧不克葬賜賻錢十萬樂史嘉靖浙江通志字子正撫州宜黄人南唐進士宋太宗時復登甲科累官兩浙巡撫使釋逋負賑饑民著有太平寰宇記諸書李若拙宋史本傳字藏用京兆萬年人舉進士淳化二年為兩浙轉運使質狀魁偉尚氣有幹才楊允恭宋史本傳漢州綿竹人太宗時命督江南水運以功轉江淮兩浙都大發運擘畫茶鹽捕賊事先是三路轉運使各領其職或廪庾多積而軍士舟楫不給惟以官錢僱丁男挽舟土人憚其役以是嵗上供米三百萬允恭盡籍三路舟卒與所運物數令諸州擇牙吏悉集允恭乃辦數授之江浙所運止于淮泗由淮泗輸京師行之一嵗上供者六百萬咸平初命允恭為荆湖江浙都巡檢使夏侯嶠王惟儉宋史記字峻極鉅野人太平興國進士咸平二年秋江浙饑命為江南巡撫使所過疏理刑訟存問耆老務從寛簡人以為便使還采病民二十餘事上之亟詔釐革劉師道宋史本傳字損之一字宗聖開封東明人雍熙進士咸平三年為淮南江浙荆湖發運使敏于吏事所至有聲吏民畏愛孫冕嘉靖浙江通志字伯純新淦人雍熙進士咸平中為兩浙轉運使治獄不濫斷訟如神弛張在已無所吐茹吏畏而民愛之任中正東都事畧字慶之曹州濟隂人舉進士真宗時擢兩浙轉運使民饑中正發官廪以賑之累遷兵部尚書諡康懿李防宋史本傳字智周大名内黄人舉進士累遷秘書丞二浙民饑建言逃户田宜即召人耕種使人不敗輕去甽畝而官賦常在又請京師置折中倉聴人入粟以江浙荆湖物償之景徳初江南旱與張知白分東西路安撫上言秦羲嘗增江淮兩浙荆湖榷酟錢民頗煩擾詔悉罷之遂為江南轉運累遷兵部郎中擢諫議大夫曹克明宋史本傳字堯卿為温台等七州都巡檢使景德中改供備庫副使知邕州代還真宗問南方事對稱㫖遷江淮兩浙都大提舉捉賊克明使人捕賊輒出私錢資之以故人人盡力視賊中趫勇者釋縳使還捕其黨前後獲千餘人陳堯佐東都事畧字希元閬州閬中人舉進士為兩浙轉運使錢塘江隄以竹籠石而潮齧之不數嵗輒壞而復理堯佐議實薪土以易之或言其不可後隄久不成仍用薪土景祐四年拜同中書平章事諡文惠韓億張方平韓億傳字宗魏真定靈夀人咸平進士除殿中侍御史淮浙饑命億安撫所至先察吏治宣布慈惠救荒之政畢舉景祐二年授參知政事孫長卿宋史本傳字次公揚州人天禧中官浙江荆淮發運使嵗漕米至八百萬或疑其多長卿曰吾非欲事羡贏以備饑嵗爾轉兵部侍郎長卿長于政事為能臣性潔亷不以一毫取諸人張傅宋史本傳字巖卿毫州人進士第累遷兩浙轉運使强力治事審覈簿書勾擿奸𨼆州縣憚之傅曰奚為我憚哉吾所以事事致察者正所以愛州縣也吏不敢慢則州縣不復犯法矣後以工部侍郎致仕鍾離瑾宋史本傳字公瑜廬州合肥人舉進士提㸃兩浙刑獄衢州饑聚餓者食之頗廢農作請發米二萬斛賑給家母過一斛遷尚舊刑部郎中王琪宋史本傳字君玉成都華陽人起進士厯兩浙淮南轉運使入判太常寺出知杭州以禮部侍郎致仕琪性孤介不與時合數臨東南名鎮政尚簡靜毎疾俗吏飾厨𫝊以沽名譽故待賔客頗闊畧間造罪語起謗終不自恤段少連宋史本傳字希逸開封人權杭州觀察判官後為兩浙轉運副使舊使者所至郡縣索簿書不暇殫閲往往委之吏胥吏胥持以為貨少連命郡縣上簿書悉緘識遇事閒指取一二自閲擿其非是者按之餘不及閲者全緘識以還由是吏不能為奸部吏有過召語曰聞子所為若此有之乎有當告我容汝自新茍以為無吾不使善人被謗即為汝辨明矣吏不敢欺皆以實對秀州獄死無罪人時少連在杭吏畏恐聚謀偽為死者服罪欵未及綴屬少連已挐舟入城訊獄吏具服請罪以為神明徙使淮南兼發運司事張夏七脩類藁字伯起雍邱人太宗朝進士景祐中出為兩浙運使杭州江岸率多薪土潮水衝激不過三嵗輒壤夏令作石堤一十二里以防江潮既成杭民德之慶厯中立廟堤上田瑜宋史本傳字忠資河南夀安人舉進士慶厯中為兩浙轉運按察使杭州龍山堤嵗決水冐民居輒賦芻塞之瑜與民約每芻十束更輸石一尺率五嵗得石百萬為石堤堤固而嵗不調民仕至龍圖閣直學士孫瑜宋史本傳字叔禮博平人為兩浙轉運使先是郡縣倉庾以斗斛大小為奸瑜奏均其制黜吏之亡狀者民大喜有言其變新器非便下遷知曹州尋有言瑜所作量法均一誠便者乃還其元資累官工部侍郎葉清臣宋史本傳字道卿蘇州長洲人天聖進士知秀州累遷兩浙轉運副使太湖有民田豪右據上游水不得洩而民不敢訴嘗建請疏盤龍滙滬瀆港入于海民賴其利皇祐元年為侍讀學士知河陽許元歐陽脩許元墓誌字子春宣城人仁宗時京師粟少而江淮嵗漕不給以元為江淮兩浙荆湖發運判官元曰以六路七十二州之粟不能足京師者吾不信也至則治千艘浮江而上所過州縣留三月食其餘悉發而州縣之廪逺近以次相補由是不數月京師足食既而嘆曰此可為於乏時然嵗漕不給者有司之職廢也乃考故事明約信令發斂轉徙至于風波逺近遲速賞罰皆有法凡江湖數千里外談笑治之不擾不勞而用以足官至工部郎中天章閣待制鄭向宋史本傳字公明開封陳留人舉進士為兩浙轉運副使疏漕河抵于江人以為便復為鹽鐵判官以龍圖閣直學士知杭州吳奎宋史新編字長文濰州北海人舉五經皇祐中兩浙轉運使喜奬亷善有所知輒言仕至叅知政事没之日家無餘資孫甫歐陽脩孫甫墓誌字之翰許州陽翟人天聖進士厯兩浙轉運使范文正公守杭州以大臣或便宜行事甫曰范公貴臣也吾屈于此則不得伸于彼矣由是一切繩以法然退而未嘗不稱其賢也嘉祐元年遷河北轉運使林從周嘉靖浙江通志潮州人登進士第累官浙東提㸃刑獄率多平反侯叔獻嘉靖浙江通志字景仁宜黄人慶厯進士累官兩浙常平使者兼都水監建議置提舉淤田司相地利引水灌田四十萬頃治水得性每詔􅅄諭王鼎宋史本傳字鼎臣館陶人進士第提㸃兩浙刑獄累遷淮南兩浙荆湖制置發運副使前使者多漁市南物因奏計京師持遺權貴鼎一無所市獨悉意精吏事事無大小必出于已凡調發綱吏度漕路逺近定先後為成法於是勞逸均吏不能為重輕官舟禁私載舟兵無以自給則盡盗官米為奸有能居販自贍者市人持以法不肯償所逋鼎為移州縣督償之舟人有以自給不為奸而所運米未嘗不足入為三司鹽鐵副使鼎自奉儉約當官明敏强直不可撓所薦士多知名薛向宋史本傳字師正河中人神宗知向才以為浙江荆淮發運使綱舟厯嵗久篙工利于盗貨嘗假風水沉溺以滅迹向募客舟分載以相督察官舟有定數多為主者冐占悉奪畀屬州諸運皆詣本曹受遣以地有美惡利有重輕為立等式用所漕物為誅賞遷天章閣待制李復圭宋史本傳字審言徐州豐人厯兩浙轉運使浙民以給衙前役多破産復圭悉罷遣歸農令出錢助長召人承募民便之瀕海人賴給沙地以生豪家量受税于官而占為已有復圭奏蠲其税分以與民熙寜初進直龍圖閣知慶州沈立宋史本傳字立之厯陽人舉進士累遷兩浙轉運使蘇湖水民艱食縣戒强豪民發粟以賑立亟命還之而勸使自稱貸須嵗稔官為責償茶禁害民山塲榷塲多在部内嵗抵罪者輒數萬而官僅得錢數萬立著茶法要覽乞行通商法如所請召為戸部判官出為江淮發運使知越州杭州張載伊洛淵源錄字子厚世大梁人家鳳翔郿縣嘉祐進士熙寜二年除崇文院校書命案獄浙東或曰張載以道德進不宜使之治獄執政曰淑問如臯陶猶且讞獄此庸何傷明刑弼教多所平反焉蔣之竒東都事畧字穎叔常州宜興人舉進士英宗立擢江淮荆浙等路發運副使元豐六年漕六百二十萬石至京師始建鑿泗州股渠以避長淮之險自是無溺者崇寜九年除觀文殿大學士知杭州以疾告歸韓晉卿宋史循吏傳字伯修宻州安丘人以五經中第厯嘉興主簿元祐初知明州兩浙轉運使時差役法復行諸道處畫多倉卒失叙獨晉卿視民所宜而不戾法指入為大理少卿張康國宋史本傳字賓老揚州人第進士紹聖中提舉兩浙常平豪猾望風斂服發倉救荒江南就食者活數萬口徙福建轉運判官曾孝藴宋史曾公亮傳孝藴字處善泉州晉江人紹聖中提舉浙江常平改轉運判官徽宗時徙江浙荆淮發運以顕謨閣待制知杭州宣和二年知歙州方臘起青溪復改杭州時賊已破杭孝藴單車至城下城既克復軍士多殺人孝藴下令從者得首毋輒殺皆束手不敢驁論功進顕謨閣直學士李椿年西江志字仲永浮梁人政和進士厯官兩浙轉運使檢括𨼆漏别為圖籍凡二十四條該盡田畝形勢閲七月告成陞户部侍郎陳遘宋史本傳字亨伯永州人登進士第宣和二年方臘亂加龍圖閣直學士經制七路治于杭劾越州王仲薿糾市民造金茶器減直買軍粮券而以私錢取之仲薿坐黜杭經巨寇後河渠湮塞邦人以水潦為病遘以冬月檄真揚潤楚諸郡凡所牐􅃠卒悉集治所用其力治河不兩月畢杭人利焉徙河北都轉運使王士言宋史本傳武舉進士累立戰功宣和初方臘為寇詔擇才畧之士馮熙載薦為東南第三將首解嘉興之圍靖康元年詔以浙西兵往河東防秋金人入澤州士言戰死贈拱衛大夫忠州團練使王復蘆浦筆記字景仁淄州淄川人以門䕃補官厯兩浙轉運副使方臘初叛所過守將望風奔駭復下令所部嚴堡壘脩戰備竭力討賊屢戰有功賊平擢徽猷閣待制遷都轉運使朱勔以花石奉艮岳多取漕艦以載號直達綱復曰今冦起倉卒飛輓繁困而佞幸之徒猶欲以苑囿惑上心固執不與復疏奏謂必不可以不急之務疲民費財擢龍圖閣直學士後贈資政殿學士諡壯節栁約宋史本傳字元禮華亭人大觀上舍進士靖康初以直龍圖閣知台州徙嚴州兼浙西兵馬都監節制管内軍馬金人大入列郡震恐約屹保孤城悉力捍禦境内安堵上書請糾合諸郡克復吳會上嘉其忠詔以軍興費出無藝吏慢弗䖍栁約獨謹賦輸率先程督進秩一等又詔約郡當兵衝而能不辭難不避事保綏一方以約充集英殿修撰擢權户部侍郎翟汝文宋史本傳字公巽潤州丹陽人登進士第欽宗即位知越州兼浙東安撫使建炎改元上疏言正供常數後為獻利之臣所増者嘗議裁損如浙東和預買絹嵗九十七萬六千匹獨越州尚如舊今乞視戸等第減罷紹興元年召為翰林學士兼侍講趙叔近宋史本傳魏悼王五世孫建炎元年為秀州守杭卒陳通反抵秀州城下叔近乗城諭以禍福亂兵乃去未幾差擢兩浙提刑叔近招通通聴命叔近以數十人入城衆猶不解甲叔近置酒推誠待之遂皆感服城中稍定紹興九年贈集英殿修撰王淵宋史本傳字幾道熙州人宣和五年劉延慶討方臘以淵為先鋒賊據錢塘淵諭小校韓世忠曰賊謂我逺來必易我明日爾逆戰而偽遁我以强弩伏數百步外必可得志世忠如其言賊果追之伏弩卒發應弦而倒逐北至淳安賊據清溪峒遂圍而平之授閣門宣贊舍人康王即位以淵為制置使平杭賊提兵四出所向皆㨗遷向德軍節度使苗傅劉正彦怨淵及于難贈開府儀同三司吕頤浩宋史本傳字元直齊州人中進士第建炎二年拜同簽書樞宻院事江淮兩浙制置使改江東安撫制置使兼知江寜府時苖傅劉正彦為逆以兵發江寜將至平江張浚乗輕舟迓之相持而泣即舟中草檄進韓世忠為前軍張俊翼之劉光世為遊擊頤浩浚總中軍發平江傅黨託㫖請頤浩單騎入朝頤浩奏所統將士忠義所激可合不可離傅等恐懼乃請髙宗復辟師次臨平苖傅等拒戰頤浩被甲立水次出入行陣督世忠等破賊傅正彦引兵遁頤浩等以勤王兵入城都人夾道聳觀以手加額以頤浩守尚書右僕射中書侍郎兼御營使五年除少保浙西安撫制置大使知臨安府行宫留守明堂禮成進封成國公諡忠穆張浚宋史本傳字德逺漢州綿竹人中進士第建炎三年以浚同節制軍馬會苗傅劉正彥作亂浚起兵討賊會韓世忠舟師抵常熟浚因大犒將士令世忠以兵赴闕世忠至秀大治戰具傅等遣重兵扼臨平會吕頤浩劉光世兵踵至浚乃聲傅正彦罪傳檄中外率諸軍總進髙宗除浚知樞宻院事浚次臨平賊兵拒不得前世忠等摶戰大破之傅正彦走閩中浚命世忠追縳之以獻髙宗以浚為川陜宣撫處置使孝宗即位拜尚書右僕射同中書門下平章事致仕諡忠獻韓世忠宋史本傳字良臣延安人宣和二年方臘反世忠以偏將從王淵討之次杭州賊奄至世忠以兵二千伏北關堰賊過伏處衆譟亂世忠追擊賊敗而遁窮追至睦州清溪峒挺身仗戈直前渡險數里擣其穴擒臘以出建炎二年陞定國軍承宣使三年苖傅劉正彥反世忠舉酒酹神曰誓不與此賊共戴天以所部發至秀州造雲梯置器械次臨平賊將苖翊馬柔吉負山阻河為陣中流植鹿角梗行舟世忠舍舟力戰軍少却世忠復舍馬操戈而前賊列神臂弩持滿以待世忠瞋目大呼挺刅突前賊辟易矢不及發遂敗傅正彦開湧金門遁詔授武勝軍節度使御營左軍都統制請于帝曰賊擁精兵距甌閩甚邇倘成巢窟卒未可滅請討之于是以為江浙制置使自衢信追擊至漁梁驛與賊遇世忠挺戈而前賊望見咋曰此韓將軍也皆驚潰擒正彦及傅弟翊送行在傅亡建康追擒之帝手書忠勇二字掲旗以賜授檢校少保武寜昭慶軍節度使諡忠武張俊宋史本傳字伯英鳳翔成紀人建炎元年為御營前軍統制討陳通于杭州蔣和尚等于蘭溪平之二年破秀州賊數萬縳徐明斬之苖傳劉正彦反張浚諭以起兵問罪韓世忠為前軍俊以精兵翼之戰于臨平傅等兵敗俊入見帝拜御營右軍都統制尋為浙東制置使金人渡江攻浙帝如明州俊自越州引兵至帝御樓船如温州留俊明州拒敵癸夘除夕金兵至城下俊死戰破之戒將士毋驕惰下令清野多以輕舟伏弩閉闗自守四年正旦金人果復攻明州俊遣兵掩繫金人拔砦去未幾江浙羣盗蠭起授俊兩浙西路制置使十月浙西羣盗悉平改江南招討使紹興十二年封清河郡王劉光世宋史本傳字平叔保安軍人以䕃補三班奉職方臘反光世自將一軍趨衢婺出其不意破之建炎二年光世為行在五軍制置使苖劉為亂張浚勤王光世以選卒為逰擊遇苖翊馬柔吉軍于臨平與韓世忠等破之遷太尉御營副使尋授浙西安撫大使後拜少師封榮國公追封鄜王張子益宋史本傳字德髙初從韓世忠討苗傅補承信郎累功遷武功郎紹興十三年授龍神衛四廂都指揮使兩浙西路馬步軍都總管胡唐老宋史忠義傳字俊明晉陵人崇寜進士建炎三年知衢州苗傅以兵犯城唐老拒之以功擢秘閣修撰未幾兼浙西安撫使杜充降金潰卒戚方欲犯臨安妄言赴行在請唐老部衆以行唐老不從諭以逆順禍福方衆環脅之唐老怒罵遂遇害贈徽猷閣直學士諡忠愍李迨宋史本傳東平人以䕃補官建炎三年為御營使司叅議官兼措置軍前財用苗傅劉正彦叛吕頤浩張浚集勤王之師迨流涕謂諸將曰君第行無慮軍食師行所至食皆先具事平除權户部侍郎紹興五年除兩浙轉運使言祖宗都大梁時嵗漕東南六百餘萬斛而六路之民無飛輓之擾蓋所運者官舟所役者兵卒故也今駐驆浙右漕運地里不若中都之逺而公私苦之何也以所用之舟大半取于民間往往鑿井沉舟以避其役如温明䖍吉州等處所置造船塲乞委逐州守臣措置募兵卒牽挽使臣管押庶幾害不及民可以漸復漕運舊制詔工部措置尋加徽猷閣直學士楊存中宋史本傳本名沂中字正甫代州崞縣人宣和末積功至忠翊郎遷閤門祗候建炎二年討賊徐明于嘉興先登主帥將屠城存中力諫止之郡賴以全髙宗南渡以勝㨗軍從張俊守吳門苗劉之變又從俊赴難遷貴州團練使尋為御前右軍統領金人攻明州又從俊與田師中趙宻殊死戰破之以竒功遷文州防禦使御前右軍統制紹興三年嚴州妖賊繆羅據白馬源存中討平之加保信軍承宣使後封同安郡王諡武恭存中御軍寛而有紀所用將士専以才勇選不私部曲之舊夏榮嘉靖浙江通志字子顯大梁人累立戰功建炎間從張俊戰苗劉敗走之遷武經大夫金追帝明州榮從楊沂中迎戰髙橋身中十八鎗甲為赤勇氣益奮陞兩浙節度使封英國公張宗顔宋史本傳字希賢延安人張俊選為統領從俊討浙西冦秀州軍校徐明以城叛宗顔夜襲其城明遁轉忠州刺史遷御前中軍統制金攻明州宗顔破其前軍後擢龍神衛四廂都指揮使王德宋史本傳字子華通逺軍熟羊砦人以武勇聞軍中呼王夜义建炎元年以勤王隸劉光世三年遷前軍統領光世討苗劉苗劉走閩中詔徳追擊德斬苗瑀擒馬柔吉送行在紹興元年平秀州賊邵青初徳與青戰諜言將用火牛徳笑曰是古法也可一不可再命合軍持滿陣始交萬矢齊發牛皆反奔賊衆殱焉青自縳請命獻俘行在封隴西郡侯厯浙江總管李寶宋史本傳河北人金使蘇保衡出海道襲浙江乃授寶浙西路馬步軍副總管令督海舟捍禦次江隂先遣子公佐潛伺動靜虚實公佐已挟魏勝得海州寶喜趣衆乗機進適大風作海濤如山寶神色不為動風少殺始縱舟泊抵東海敵已雲合圍海州旌麾數十里寶麾兵登因握槊前行遇敵奮擊將士賈勇無不一當十敵引去勝出城迎寳奬其忠義遣辨者四出招納降附聲振山東豪傑爭應寶檄所部會宻之膠西命公佐以郡事畀勝與發至膠西石臼島敵引舟握刃持戰寶船鼓聲震疉海波騰躍敵大驚寶亟命火箭環射延燒數百艘斬其帥六人詔奬諭書忠勇李寶四字表其旗幟除靜海軍節度使沿海制置使朱倬宋史本傳字漢章閩縣人宣和進士髙宗時梁汝嘉制置浙東表攝參謀有羣冦就擒屬倬鞫問獨竄二人餘釋不問曰吾大父尉崇安日獲冦二百坐死者七十餘人大父謂此饑民剽食爾烏可盡繩以法悉除其罪不以邀賞吾其可愧大父乎尋除浙西提舉紹興三十一年拜尚書右僕射曾幾宋史本傳字吉甫其先贛州人徙河南府賜上舍出身髙宗時為浙西提刑會兄開與秦檜力爭和議開去幾亦罷檜死起為浙西提刑知台州治尚清靜民安之黄巖令受賄為兩吏所持令械吏置獄一夕皆死幾詰其罪或曰令丞相沈該客也治之益急除直秘閣孝宗初遷通奉大夫致仕諡文靖謹按嘉靖浙江通志云幾起提㸃浙江東路刑獄時已老而精力不衰去大猾吏張鎬一路稱快本傳不載其事附識于此李顯忠宋史本傳初名世輔綏德軍青澗人也初其母當産數日不能免有僧過門曰所孕乃竒男子當以劍矢置母旁即生已而果生顯忠立于蓐咸異之年十七隨父出入行陣補承信郎充隊將烏珠犯河南命顯忠為招撫司前軍都統制與李貴同破靈壁縣太后至臨安顯忠入覲加保信軍節度使浙東副總管因上恢復䇿忤秦檜意遂降官奉祠台州居住復寜國軍節度使金渝盟犯淮西和州失守顯忠選鋭士萬人渡江盡復淮西州郡詔授淮南制置使擢太尉孝宗隆興元年兼淮西招撫使乾道改元復防禦觀察使浙東副總管提舉台州崇道觀召除威武軍節度使賜第京師乞祠提舉興國宫紹興府居住卒諡忠襄謹按舊浙江通志載顯忠為浙東副總管討徐明於嘉興郡頼以全考顕忠于紹興九年歸朝時賊冦已平而本傳又不紀討徐明事所引恐有訛誤附記於此趙子潚宋史宗室傳字清卿秦康惠王後宣和進士調衢州刑曹掾推官胡唐老竒其才任之子潚佐唐老繕完城具苗劉兵至城下不能攻以功進一秩累官至敷文閣知臨安府吏不能欺禁權家僦人子女為僕妾者陞文華閣待制復知臨安府調三衙卒修築都城不擾而辦帝幸建康充行宫留守叅謀官還復知臨安府孝宗嗣位移知明州沿海制置使初海寇以賂通郡胥吏吏反為用匿其踪跡賊熾商舶不通子潚以禮延土豪俾率郡胥分道入海告之曰用命有厚賞否則殺無貸衆震恐争指賊處悉擒獲凡豪猾為賊囊槖者窮治之海道遂平陞龍圖閣直學士王葆周必大王葆墓誌字彦光吳郡崑山人宣和進士隆興元年為浙東提㸃刑獄會稽近行闕政尚姑息葆屢行帥事疾惡彌厲嵗歉請厚捐民租適寢疾主管台州崇道觀金安節宋史本傳字彦亨歙州休寜人宣和進士紹興時知嚴州除浙西提刑入為大理卿首言治民之道先德後刑今守令慮不及逺簿書期會賊税輸納窮日力辦之而無卓然以教化為務願申飭守令俾無専事律法茍可以贊教化必力行之兩浙漕屬王悦道鞫仁和令楊績獄不實事下大理安節并逮悦道悦道幸醫王繼先子也屢因人求免安節不從遷宗正少卿隆興改元拜兵部侍郎王珏洪武蘇州府志字徳全臨川人紹興二年起家鹽官丞秀州嵗以錢給亭民煮鹽至十五年積十九萬七千餘緡不給民訴於朝除珏提舉浙西茶鹽逾年盡償亭民且贏鉅萬開華亭海河三百餘里鹽滋得流通且溢以溉田舊兩浙鹺志經界法行除其害者三百六十餘事其七千二百餘戸為尤病珏奏除之兼提㸃刑獄官至直敷文閣太傅少卿顔師魯宋史本傳字幾聖漳州龍溪人紹興進士除浙東提舉尋改使浙西役法敝甚遇輒破家師魯下教屬邑預正流水籍稽其役之序寛比限免代輸咸便安之鹽課嵗至鉅萬本錢久不給亭竈私鬻禁不可止師魯撙帑緡盡償宿負戒官吏無侵移比旁路課獨最農民有墾曠土成田未及受租者奸豪多為已利師魯奏但當正其租賦不應繩以盗種法失勸農重本意奏可遂著為令入為監察御史朱熹宋史本傳字元晦徽州婺源人紹興進士淳熙五年知南康軍提舉常平茶鹽公事會浙東大饑宰相王淮奏改提舉浙東即日單車就道移書他郡募米商蠲其征及至則客舟之米已輻輳熹日勾訪民𨼆按行境内單車屏徒從所至人不及知郡縣官吏憚其風采至自引去所部肅然凡丁錢和買役法榷酤之政有不便于民者悉釐而革之于救荒之餘隨事處畫必為經久之計舊兩浙鹺志熹提舉浙東下社倉法于諸路條奏救荒事宜諸州利病乞取會福建下四州見行産鹽法于本路沿海四州上謂王淮曰朱熹政事却有可觀張杓宋史張浚傳浚漢州綿竹人子杓字定叟以父恩授承奉郎通判嚴州有能稱浙西使者薦所部吏而不及杓孝宗特令再薦知衢州遷提舉浙西常平督理荒政湖州闕守命兼攝焉有執政姻黨蔽糴杓首治之遷兩浙轉運判官未幾直徽猷閣陞副使知臨安府奏除逋欠四萬緡米八百斛都城浩穣姦盗聚匿杓畫分地以警捕夜戸不閉張師令納女掖廷供給使恃以恣横杓因事痛繩之徙其家信州其類帖服修三牐復六井尋知紹興府光宗即位以刑部侍郎仍為府尹内侍毛伯益冐西湖菱地為亭外戚有殺其僕者獄具夤縁宣諭求免杓皆執奏論如律杓天分髙爽吏材敏給遇事不凝滯多隨宜變通論尹京者以杓為首龔輿嘉靖浙江通志湘隂人乾道進士剛介廉潔為浙東檢法隨憲按部郡饋遺皆不受身後家無擔石之儲劉爚宋史本傳字晦伯建陽人乾道進士浙西提㸃刑獄巡按不避寒暑多所平反有殺人匿權家者吏不敢捕爚竟獲之遷國子司業言浙西根本之地宜詔長吏兼司禁戢强暴撫柔善良務儲積以備凶荒禁科歛以舒民力官至權工部尚書諡文簡鄭興裔周必大鄭興裔神道碑字光錫開封人紹興四年用恩補成忠郎厯提㸃浙東刑獄淳熙元年兼沿海制置使蠲常賦撤私税闔境便之累封郡侯贈太尉孫峴萬厯杭州府志字舉善以詞學擢第拜中書舍人淳熙初為浙西提舉以措置支還亭戸本錢及増買鹽袋興修水利有勞除直敷文閣兩浙轉運使程大昌宋史本傳字泰之徽州休寜人紹興進士除浙東提㸃刑獄會嵗豐酒税踰額有挾朝命請増額者大昌力拒之曰大昌寜罪去不可增也六和塔寺僧以鎮潮為功求内降給賜所置田産仍免科徭大昌奏僧寺既違法置田又移徭于民奈何許之况自修塔之後潮果不齧岸乎寢其命光宗嗣位知明州尋奉祠詹體仁真德秀詹體仁行狀字元善浦城人進士乙科為湖州歸安丞光宗時提舉浙西常平體仁謂浙右之有漕渠非止通餽運資國信往來而已蘇湖常潤田之髙仰者實賴之於是開漕渠浚練湖置斗門為旱澇備又以餘力立舉子倉創安濟院所活不可勝紀官至司農卿陳思誠葉適陳思誠墓志字景思信州弋陽人光宗時為兩浙轉運判官陞副使延問窮民遮道詞牒皆灼見庾𨼆予奪中情為杭學築門設㦸儀比他州置錢塘左選監渡謹視重載覆溺者言紹興府和買重當減國之根本在州縣州縣根本在民欲寛州縣當裕民力進直煥章閣遷太府卿羅㸃萬厯杭州府志字春伯崇仁人淳熙進士由校書郎除浙西提舉規畫荒政凡數十奏躬行􅅵畝施惠甚溥㸃端介不為矯激之行或謂天下事非才不辦曰當論其心心茍不正才雖過人果何取也厯簽書樞宻院事諡文恭李謙江西通志字和卿䖍之興國人淳熙進士累官太常寺丞提舉浙東值嵗饑賑濟有方汪綱函史字仲舉歙人以䕃補官知蘭谿決擿如神嵗旱饑郡倚辦勸分􅃠謂勸分所以助義倉不逮耳一切行之非所以安富厚裕也願假常平錢為糴米使循環迭糴以濟又巡行諸水利可興者勸浚築使饑者得食力全活甚衆而嵗以有秋累遷直秘閣知婺州旱禱雨龍瑞宫有物蜿蜒盤旋壇上綱曰吾欲雨而已毋為異惑衆須㬰雨大至嵗以大熟進直煥章閣知紹興主管浙東安撫司公事兼提㸃刑獄蕭山運河淤久不可舟浚之復創閘江口使淤不可入甃途達城者十里屬邑咸濵海而諸暨十六鄉瀕河蕩饒灌溉之利勢家率封埴埂岸為圩田湖流束陿不得去雨稍多則溢入邑居田廬數為敗綱請治復之郡臨海道招水軍置甲仗威重赫然後以權戸部侍郎致仕牛大年宋史本傳字隆叟揚州人慶元進士厯官浙江提㸃刑獄清操凜然以亷潔自持徐天麟宋史徐夢莘傳天麟字仲祥臨江人開禧進士厯臨安府教授浙江提舉常平司幹官所至興學明教有惠政范應鈴宋史本傳字旂叟豐城人開禧進士為浙東提㸃刑獄開明磊落守正不阿所至無留訟無滯獄繩吏不少貸進修潔案姦贓振樹風聲聞者興起徐鹿卿曰應鈴經術似兒寛決獄似雋不疑治民似龔遂風采似范滂理財似劉晏而正大過之人以為名言劉伯正嘉靖浙江通志字直卿餘干人開禧進士厯浙西轉運使靜重鎮浮不釣名譽後以資政殿學士提舉洞霄宫吕午宋史本傳字伯可歙縣人嘉定進士授烏程主簿郡守置之幕下事一決于午調知餘杭縣以言罷浙東提舉章良明留之幕旋兼沿海制置司事海㓂未平良明問䇿安在午亷知調軍出海糧盡即還軍獲㓂物官盡拘收乃與制置司幹官施一飛議糧盡再給不許擅還賊舟所有悉以給軍海道遂清差兩浙運司主管文字拜監察御史累遷浙江提刑復為監察御史吳潛宋史本傳字毅夫宣州寜國人嘉定進士授承事郎通判嘉興府權發遣嘉興府事端平中知慶元府兼沿海制置使授寶謨閣待制改直學士兼浙西提㸃坑冶權兵部尚書浙西制置使申論防拓江海團結措置等事進吏部尚書兼知臨安府論修德以求亨通之理帝嘉納授寳謨閣學士知紹興府浙東安撫使淳祐年授沿海制置大使判慶元府至官條具軍民久逺之計告于政府奏皆行之又積錢百四十七萬三千八百有竒代民輸帛前後所蠲五百四十九萬一千七百有竒以久任丐祠封榮國公趙與懽宋史本傳字悦道燕懿王八世孫嘉定進士直寶章閣知安吉州設銅鉦懸門以便愬寃有富民愬幼子察之非其本心姑逮其子付獄徐亷之乃二兄强其父析業與懽曉以法開以天理皆忻然感悟又嫠媪僅一子亦以不孝告留之郡􅈦日為饌俾親饋晨昏以禮母子遂如初二家皆畫像事之尋兼知臨安府浙西安撫使招刺三千人為忠毅軍言禁衛虚籍宜募兵財先贍軍餘始上供乞省不急之費遷吏部尚書會潮汐齧隄授端明殿學士知臨安府浙西安撫使江隄竣事獄空力匄罷出闗遣使趣還嵗饑與懽榜諭賑救推誠勸分甘雨隨至米商來集流移者濟之授資政殿學士提舉萬夀觀與懽三為府尹盡力民事都人稱趙端明必以手加額曰趙佛子也久之以舊職知温州政事必親吏不敢欺創水砦修貢院以侍讀召陞大學士後拜少傅追封奉化郡王諡清敏吳淵宋史本傳字道父宣州寧國人嘉定進士提㸃浙西刑獄會衢嚴盗起警報至調遣將士招捕之殱其渠魁散其支黨以功為樞宻院檢詳諸房文字遷太府少卿進權工部侍郎提舉浙西沿海諸州軍許浦澉浦等處兵船嵗大祲因淵全活者六十五萬八千餘人遷兵部尚書知平江府兼浙西兩淮發運使寶祐五年拜叅知政事包恢宋史本傳字宏父建昌人嘉定進士通判台州徐鹿卿討温寇辟兼提㸃刑獄司主管文字議收捕改通判臨安府知台州有妖僧居山中號活佛男女爭視之因為姦利豪貴風靡恢誅其僧累除浙西提㸃刑獄時海㓂為亂恢單車就道調許澉浦分屯建砦一旦集諸軍討平之嘉興吏因和糴受賕百萬恢被㫖慮囚曰吾用此消沴氣乃減死斷其手後以資政殿學士致仕恢破豪猾去奸吏治蠱獄課盆鹽理銀欠政聲赫然諡文肅徐鹿卿宋史本傳字德夫隆興豐城人嘉定進士浙東提㸃刑獄兼提舉常平鹿卿言罷浮鹽經界鹻地先撤相家所築就捕者自言我相府人鹿卿曰行法必自貴近始卒論如法丞相史彌逺之弟通判温州利韓世忠家寶玩籍之鹿卿奏削其官擢太府少卿兼右司居官亷約清峻毫髮不妄取一廬僅庇風雨諡清正姚希得宋史本傳字逢源潼川人嘉定進士理宗時為戸部侍郎帝曰姚希得才望可為閫帥乃進煥章閣待制知慶元府沿海制置使詔増沿海舟師希得為之廣募水軍造戰艦蓄糧食蠲米一萬二千石舊逋一百萬去官庫餘羡悉以代民輸召為工部尚書後以資政殿大學士潼川郡公致仕髙斯得宋史本傳字不妄卭州蒲江人紹定進士通判紹興府台州知嚴州嚴環山為郡雖豐嵗猶仰他州夏旱斯得蠲租發廩招糴勸分請于朝得米萬石以振濟遷浙東提㸃刑獄遂劾知處州趙善瀚知台州沈塈等七人以勢厲民疏上不報改江西轉運判官斯得具辭上奏曰臣劾奏趙善瀚等七人未聞報可祖宗以來未有監司按吏一不施行者臣身為使者劾吏不行反叨易節若貪榮冐拜與頑鈍無耻者無異乞併臣鐫罷以戒奉使無狀者章上七人竟罷去仕至端明殿學士兼叅知政事胡穎宋史本傳字叔獻潭州湘潭人紹定進士厯官浙西提㸃刑獄榮王府十二人行劫穎悉斬之一日輪對理宗曰聞卿好殺意在折獄穎曰臣不敢屈太祖之法以負陛下非嗜殺也帝黙然王積翁黄潛王積翁墓誌字良存福之長溪人用䕃補承務郎調監嚴州都酒務吳潛分閫四明辟奉國軍節度使推官改沿海制置大使司幹辦公事累數十年不決之訟悉以委之凡所剖析三百餘事除浙西安撫使幹辦公事奉朝㫖決六縣獄單車夜至餘杭閲獄囚一百七十悉得其情當坐者僅數人餘皆平民明日召縣官盡釋之所平反他邑疑獄全活甚衆改秩差知富陽縣治辦為諸邑最秩滿除兩浙轉運司主管文字力請寛版曹催科之限東南諸郡咸便之吕沆宋史本傳字叔朝端平三年銓試第一授黄巖縣主簿知於潛縣重囚逸聞沆至自歸通判婺州朱君章訟田四十有二年吳王府争墓二十有九年沆皆決之特差充提領兩浙轉運鹽事使司主管文字賈似道議行公田沆請罷還民似道矯詔廢十七界會行闗子沆力言非便似道大怒調將作監簿久之典靈臺觀德祐九年召赴行在不復出李芾宋史本傳字叔章其先廣平人徙家衡州芾以䕃補差知德清縣屬浙西饑置保伍振民活數萬訃有妖人煽民為亂至數萬人芾討之盗聞其來衆立散除司農寺丞以浙東提刑知温州州瀕海多盗芾至盗息移浙西時浙西亦多盗羣穴太湖中芾跡得其出没按捕之盗亦駭散咸淳元年入知臨安府時賈似道當國前尹事無鉅細先闗白始行芾獨無所聞福王府有迫人死者似道力為營救芾以書往復辯論竟置諸法嘗出閲火具民有不為具者問之似道家人也立杖之似道大怒誣以贓罪罷之起為湖南提刑知潭州兼湖南安撫使元兵入潭死之贈端明殿大學士諡忠節汪立信宋史本傳臨卭人澈從孫也淳祐進士景定初官浙西提㸃刑獄即嘉興治所講行荒政咸淳十年為端明殿學士沿江制置使江淮招討使建康兵潰扼吭而死贈太傅文天祥宋史本傳字宋瑞廬陵人寶祐進士咸淳十年知贛州德祐初元師渡江詔諸路勤王天祥奉詔發郡中豪傑萬人入衛明年除知臨安府尋拜右丞相令詣北軍請和巴延折以危言天祥曰天祥為宋狀元宰相所欠只一死報國耳刀鋸鼎鑊非所懼也巴延挾天祥北行中道計脱泛海至温州晉左丞相仍以都督出江西加少保封信國公兵駐南嶺元兵奄至為所執送燕居兵馬司者四年至元十七年世祖召入問曰汝何願天祥對願賜一死臨刑從容謂吏卒曰吾事畢矣南鄉拜而死衣帶中有贊云孔曰成仁孟曰取義惟其義盡是以仁至讀聖賢書所學何事而今而後庶幾無愧時年四十七吳名揚江西通志字叔瞻金溪人咸淳進士厯官浙西制幹文天祥奏除兵禮二部架閣踴躍赴義傾動一時陳繼周宋史本傳字碩卿寜都人淳祐三年貢于鄉咸淳十年詔徴勤王兵文天祥方守贛州造繼周問訃繼周為言方畧甚詳差充浙江制置司主管機宜所部夜襲元兵南柵門殺傷相當質明猶戰力竭赴水死張世傑宋史本傳范陽人累功至黄州武定諸軍都統制咸淳四年提所部兵入衛加保康軍承宣使總都督府兵遣將四出取浙西諸郡進沿江招討使改制置副使進保康軍節度使元軍迫臨安世傑請背城一戰元兵至臯亭山世傑提兵入定海石國英遣都統卞彪説之使降世傑大怒斷其舌磔之巾子山從二王入福州後崖山舟壞死謹按舊浙江通志名宦總部宋代九十四人重加考訂司馬池周必大趙希言當入杭州趙士醫趙子晝黄幹當入嘉興錢顗程叔達當入湖州宇文昌齡趙鼎當入紹興陸九齡當入台州劉琪常挺張奎當入衢州劉琦秦觀當入處州至王永權邦彦並未宦浙梅堯臣彭戢王倫陳淵陸持之張錤馬廷鸞家鉉翁于浙未有政績李謙亨則本屬元人誤入于宋者也其毛漸田渭唐閲黄黼曹幽鄭穎趙崇潔王埜馬光祖孫子秀常楙葉夢鼎徐道隆皆為浙人當入人物志别採史乗文集并舊志應存者共得一百有二人浙江通志卷一百四十六
