body:
  text: 浙江通志卷二百二十九寺觀四湖州府烏程歸安二縣附郭天寧萬壽禪寺湖州府志在府治東北陳永定三年武帝后捨宅建名龍興寺萬厯湖州府志唐神龍二年改孝義寺呉越錢氏改天寧寺宋紹興七年崇奉徽宗香火賜曰報恩廣孝寺後又改報恩光孝十二年改今額明景㤗四年僧道文増建普覺堂萬厯元年知府栗祁重修鄒緝遊天寧寺詩菰城官暇叩禪關蘭若蕭條屋㡬間石上苔深䨇塔峙山中晝永一僧閒梅風釀雨春常在野樹巢烏晚自還昨日籃輿曽過處不知人世有塵寰飛英教寺嘉靖浙江通志在府治東北二里萬厯湖州府志唐咸通五年忠顗禪師建刺史髙湜表為資聖寺中和五年改為上乘寺宋景德二年改今額初咸通中僧雲皎自長安來得舍利建飛英石塔寺以此名孟淳重修飛英塔院記飛英舍利塔者凡三十層髙六十五丈神光現於絶頂院周於塔肇自唐中和年創名上乘石塔舍利院宋紹興庚午燬嵗久未復端平初沂王夫人俞氏施貲命錢唐妙静禪寺比邱尼密印董其事卒成之减三十層髙半之其後院無常産主僧勿留頽圯荒落不能自振乃請毗山普光蘭若僧慧日住持以圖起廢未遂兹願復還普光其徒妙演繼主斯席立志興修乃悉捐衣鉢倡其役盡瘁營度不為私計爾時施者益衆佛事大集然後木塔之闕者復還山門法堂之仆者復起像設莊嚴墁堊明麗睿居靚深鈴語清越自延祐甲寅迄於戊午五年而成於是演來求記予因謂浮屠氏往往持空言集大緣其所以能然者損已無我勤懇專一有以觸人心之所同故足以來天下之施無難也吾觀妙演勤矣所就亦盛矣故為之記使其徒知所以樹立者有道焉耳矣延祐六年十又一月旦日記明洪武中分寺為二東曰飛英教寺西曰飛英塔院侯鯖錄東坡為呉興守有遊飛英寺詩云微雨止還作小窻幽更妍盆山不見日草木自蒼然非呉越不見此景蘇軾晚入飛英寺分韻詩吏民憐我嬾闘訟日已稀能為無事飲可作不夜歸復尋飛英遊盡此一寸暉撞鐘履聲集顛倒山雲衣我來無時節杖屨自推扉莫作使君㸔外似中已非趙孟頫登飛英塔詩梯颷直上幾百尺俯視層空鳥背過千里湖山秋色净萬家烟火夕陽多魚龍滚滚扶舟楫鴻雁冥冥避網羅誰種山中千樹橘側身東望洞庭波空相講寺萬厯湖州府志府治西北舊彌陀懴院宋治平二年改空相教院今復為講寺天聖寺呉興掌故呉言故宅在府治北唐中和二年捨為寺刺史王鸞表請為景清禪院宋天聖八年改天聖寺萬厯湖州府志宣和中改為神霄玊清萬壽宫建炎元年復改天聖寺寺有古檜元趙孟頫摹為圖因扁其堂曰古檜今檜已枯死而堂與圖俱燬不存矣歸安縣志寺東壁有管夫人竹南壁有子昻山水明萬歴二年知府栗祁重修張應雷重修天聖寺記湖郡長老為予道天聖故事殿左右柱舊刻木為龍盤繞其上不知來自何時忽一日柱龍下飲池水為老僧所見即還殿柱左右錯盤元學士趙松雪有錯龍盤記碑之殿左後忘記年月雲雷之夜二龍遂飛去學士之碑嵗久亦斷失不可讀又謂本殿自來無塵亦名無塵殿又謂學士常讀書本寺就殿壁寫瀟湘烟景二墨竹二為呉中墨妙最予公暇遊本寺錯龍不可見碑且不全矣顧盼兩壁烟景尚存墨竹二壁左存而右圮即三壁且欲圮矣太守栗公東巖悵然修之葢存三壁所以見學士也見學士所以見柱龍與石記也時萬厯甲戍冬十月證通古院歸安縣志舊名證通講寺在縣東人依橋今廢别建於縣南月河旁鐘聲梵響晝夜不息居然城市山林鴻禧教寺呉興掌故在府治西北梁大同二年侍中蕭翼捨為寺舊名寳勝宋大中祥符改為鴻禧鐡佛禪寺崇禎烏程縣志縣治北宋乾興中僧鑑真鑄鐡觀音像因號鐡觀音院湖州府志熙寧元年賜名聖壽觀音院紹興二十二年改廣福觀音院元末燬僅存鐡觀音像明洪武二年以院基地造泰定倉移寺於今所改今額宣德八年僧曇璧又鑄大鐡佛三創慈雲閣慈感講寺烏程縣志向在迎禧門外唐乾元間僧端所建宋嘉祐中號利濟院大觀元年改慈感建炎三年徙置定安門内西呉里語寺舊有珠羅漢眉目偏袒文理畢具漁人得於蚌中寺僧藏之有一郡守心欲取之其珠像躍入寺傍溪中祥光照耀俄頃而没遂不復見明洪武末僧行立建潮音普門二亭永樂間僧虚白復建法堂嘉靖間燬於火萬厯五年番道人募修如舊袁袠僦居慈感寺詩孤居城南寺軒館殊清幽連峯窻外列澄湖檻前流羣魚戱藻岸衆鳥鳴桑洲膏雨原野綠東作集前疇閉户寡人事元典日㝠搜蕭散娱心意焉用懐苦憂陳􅜶湖州慈感寺詩過溪纔百歩橋轉入禪關髙閣斜臨水平林逺見山波光隨鳥渡秋色共雲間深愜幽人趣遲留忘却還𤣥妙觀歸安縣志在府治北萬厯湖州府志梁大同二年建號元風觀唐神龍二年改龍興觀天寳元年改開元觀寳厯初刺史崔元亮於觀修齋羣鶴來翔宋初改為元通大中祥符元年改曰天慶元改今名楊維楨重建元妙觀玉皇殿碑記呉興元妙觀在子城西北一百五十歩為郡官僚祝釐祈禱之所本梁大同二年所建元風觀也今崇建聖殿以居昊天玊皇之帝至正六年殿災主觀師聞人得人覧其敗瓴斷礎不無愴然者乃與其徒施道清壹乃心力勇發𢎞願各竭已資且募檀施得若干緡錢於是首建聖殿經始於七年秋越明年夏六月告成規制氣象視昔有加工徒竣事知觀事者錢道元來請記予惟老氏之道原乎大易故其立教以自然為宗以無為為本宗其教者又隆以昊天上帝之居巍巍觀闕與時王等而王法無所於禁亦以廣好生之仁充𤣥黙之化也為其徒者將推其教以拯世迷則祖師之望又豈直祝釐以壽皇圖而已哉報恩光孝觀湖州府志梁大同二年建唐開元二十六年名曰龍清後居女道士宋元豐元年知州事鞠直卿重修命道士居之崇寧三年改崇寧萬壽觀政和間改天寧萬壽紹興十七年改今名嵗久傾圯明隆慶元年重修烏程縣城外寺觀道塲䕶聖萬壽禪寺明一統志在府城南道塲山唐中和間有訥僧辭師出行師命之曰逢道即止訥經此山遂結菴居之西呉里語呉越時建正真禪院後改為妙覺寺萬歴湖州府志宋元豐三年知府事陳侗奏請賜額改今名元末燬僧正印重建虞集重建䕶聖萬壽禪寺記湖州道塲山重建䕶聖萬壽禪寺寺成住山釋正印求為之記按山在郡城十里曰連峯唐中和中如訥禪師居之頗著靈異五季錢氏始建十聖殿以奉佛謂之正真寺䕶聖萬壽之號則故宋所賜也國家天厯己巳六月既望寺災牧守民庶與為其道者以為非得人不足以更新之乃相與迎印公於何山以為主而寺僧耆年之首希渭佐主僧治凡役乃出財鳩工求施於達官大家作殿閣方丈像設莊嚴俱具完好壯麗有加於昔未及三年而成實至順辛未某月也褒能教寺烏程縣志在南潯南柵宋建炎二年髙宗南幸至此懼追者見及匿嘉應神祠中月下俄見泥馬忽動跨之而行遂入杭州改寺額曰褒能帝舊封康王俗呼康王寺峴山禪寺萬厯湖州府志在縣南峴山晉太守殷康創號施水禪菴咸康八年車騎將軍沈充増建殿宇宋崇寧四年賜名顯化洪武三年改今額楊復重建峴山顯化禪寺記峴山之有寺自廬阜逺弟子道源始也源至文照照至慧明明至慧解再傳至宋慧源師特奉朝㫖賜今額又凡㡬傳及元其間盛衰難以悉舉入國初屢歴兵燹輪奐之規蕩無餘燼永樂改元得顯公者自長興應山來結茅修苦行郡士子敬重相與發檀信真心輸糧委鏹施舍山積公乃謀材鳩工遂剏正殿三間次第作法堂山門長廊以及厨庫倉囷僧竂經藏仍塑佛菩薩伽藍等神若干座金爛玊瑩頓成靈境至使瓦礫之地易為寳坊荆榛之區化為旃檀公之功德有足以感動人天者矣雖然財施為下法施為上公當復以自了之智利他一切則功德益大又可特筆記也正統嵗在辛酉二月福田寺呉興掌故謝靈運故宅在縣東南烏程縣志唐大中間剏建明天順間改今額普静教寺明一統志在府城東九十里西呉里語梁沈約𦵏父於此後遷𦵏以地為寺法華寺石柱記箋釋梁尼道蹟號總持得法於逹摩居卞山晝夜誦法華經二十年不下山後歸寂即𦵏其處大同元年塔内忽生青蓮花道俗異之州郡錄實表奏勅置法華寺烏程縣志或云道蹟每持經時有白雀旋繞作聽法狀又稱白雀寺宋治平間改賜惠覺元季燬明萬厯間僧如松重建仍名法華嘉禾宋旭繪名山十一景於殿壁凡五月而成屠隆重建法華寺碑記有尼總持居呉興弁山幽棲蘭若㡬二十年䖍誦法華滿十萬部滅救靈骨藏之寳龕舌長青蓮經留黄壤自梁至唐總持再來是為抱玉一經未畢五色放光顯化肅宗之朝􅃯賜大光之號呉興法華鬱為名籃矣歴嵗久逺朱宮碧瓦散作寒烟金地寳階鞠為茂草斷碣殘碑漫不可讀荒岡遺塔巋然僅存法音不遐靈氣不歇沙門如松慨然以興復為己任而宰官陸太宰光祖潘司㓂季馴軰咸以名流鉅公淨業檀信相與助成之松公戒德既醇心靈絶巧身歴百苦力勸萬緣凡所經營悉有妙法於是殿堂鼎建僧寮一新拱秀發祥當其旺地含靈納氣繚以周垣光相璀璨金碧兩廊蒼翠蔚然松杉十里俾總持之教久晦而重明西來之傳㡬絶而復續松公之勤亦至矣功亦偉矣壬寅偶客吳興蹔游兹寺松公以碑見屬不辭而為之記釋清晝法華寺詩路入松聲逺更奇水光山色共參差中峰禪寂一僧在坐對梁朝老樹枝姚祚端遊弁山古法華寺詩因愛名山結境幽同來擬續泛觴遊林深日到方知午松䕃風生不待秋徑路㡬曽緣客掃山花今似為人留牢愁至此多消盡還問明朝有酒不國朝康熙間僧戒青募金重修大殿向苦擔汲戒青尋五峰泉源筧引入厨名五靈泉寳積寺萬厯湖州府志縣西南杼山舊名妙喜寺梁大同七年建顔魯公集杼山之陽有妙喜寺梁武帝之所置也唐貞觀六年始移於此周賀寳積寺詩從作兩河客别離經半年却來峰頂宿知廢井南禪積靄沉斜月孤燈照落泉何當閒事盡相伴老溪邊常照寺名勝志縣南菁山宋建炎中僧梵隆建號無住蘭若髙宗南渡嘗駐蹕於此萬厯湖州府志髙宗常夢神人曰陛下請書天申金剛無量壽佛既覺異其事遂秉燭書以賜之後建昭回閣奉藏宸翰乾道三年改今額烏程縣志寺久荒廢寺僧以乘募買范司成陽春樓改造舊賜昭回閣左齋堂右祠范司成像堂前流水淙淙喬松夾道寒梅茂竹蔚薈其間允為叢林精舍資福禪寺烏程縣志在弁山南麓宋中峰普應國師開山明宣德間僧法璘重建後圯萬厯間僧如源重建呉文企題資福寺和韻詩行到寺邊寺坐㸔山外山講堂分户牖野席對溪灣暗水香厨引髙雲絶頂還僧茶與宦味空寂問潺湲國朝康熙間僧慧裔募資歸併為禪院復創禪堂綠筠堂甚幽曠歸雲菴烏程縣志道塲山南麓唐詩人閻士和隱居於此僧清晝懐之有空見歸雲兩三片之句遂以命菴明山人孫一元掛瓢堂在焉孫一元宿歸雲菴詩沙清竹碧鶴出飛野老候予開石扉暮雲卷雨日初落木葉滿山風乍稀酒杯入夜意自好篝燈向人寒相依窮幽覧勝乃吾事坐愛名山忘獨歸佑聖宫西呉里語在弁山南宋紹興初道士沈無礙結菴於此移德清元峰觀廢額揭之後請於朝賜額佑聖白玉蟾佑聖宫詩雲屏烟嶂玉玲瓏中有幽人處玉宫曉檻猿啼松顫雨夜窻鶴唳竹梳風天埀十二闌干角月滿三千世界中此景此時誰得似黄庭誦罷理絲桐歸安縣城外寺觀祗園寺湖州府志在縣西南東林山齊永平三年建號大乘寺宋治平二年改今額鹿苑寺西呉里語在縣南射村萬厯湖州府志梁大同元年建後廢唐大厯間僧明誓重建請