body:
  text: 浙江通志卷九十三兵制四國朝寜波城守營舊隸黄巖鎮雍正七年改歸提督管轄經制額設遊擊一員守備二員千總二員把總四員外委千把總四員雍正五年添設仍在有馬戰兵額内額設馬步戰守兵丁共七百三十名康熙三十五年六月為欽上諭奉裁減步戰守兵四十九名撥赴杭協收伍四十事七年十月為禀報事裁減馬戰兵四名步戰兵四名守兵三十二名撥赴紹協收伍雍正七年十月㫖議為遵裁減京撥戰守兵丁共七名歸杭嘉湖三協覆事募補現存馬步戰守兵丁共六百三十四名内有馬戰兵六十七名無馬戰兵一百一十二名守兵四百五十五名十三年衢恊改鎮添兵本協裁溢額馬四匹改步戰兵四名駐劄寜波府城遊擊一員守備一員千總一員把總一員外委千把總一員馬步戰守兵丁共二百五十六名外委千把總一名在内防守六門各口址分防寜波府浮橋戰守兵丁一十名分防慈谿縣城千把總一員一年輪換馬步戰守兵丁八十名外委千把總一名在内防守七門各口址巡防慈谿縣漁溪三七市等汛千把總一員一年輪換馬步戰守兵丁三十名分防奉化縣城千把總一員一年輪換馬步戰守兵丁一百三十五名外委千把總一名在内防守四門各口址分防奉化新驛千把總一員一年輪換馬步戰守兵丁五十名分防鄞縣横溪汛外委千把總一員一年輪換馬步戰守兵丁五十名外委千把總一名在内遊巡鄞慈二縣沿江口次戰守兵丁二十三名象山城守營隸定海鎮管轄經制額設副將一員原設寜波副將康熙八年移設象山左營都司僉書一員守備一員千總二員把總四員右營都司僉書一員守備一員千總二員把總四員外委千總二員外委把總七員雍正五年添設仍在有馬戰兵額内額設馬步戰守兵丁共一千四百一十六名康熙四十七年為禀報事撥赴大嵐山馬步戰守兵丁六十名雍正四年為請更閩浙等事撥赴乍浦營守兵二十名七年裁減京撥戰守兵丁共一十四名歸杭嘉湖三協募補八年為敬陳管見等事昌石汛陸路改設水師裁去馬步戰守兵丁六十名現存馬步戰守兵丁共一千二百六十二名内有馬戰兵一百三十七名無馬戰兵二百七名守兵九百一十八名十三年衢協改鎮添兵本協裁溢額馬十一匹改步戰兵十一名各官自備坐馬五十二匹兵丁官給馬一百三十七匹哨船四隻駐劄象山縣城副將一員都司二員守備二員千把總共十二員外委千把總共九員輪防各汛存城馬步戰守兵丁共五百四十二名分防爵溪城汛兼顧岳頭口隘并管田灣金并岳頭龍洞屏峯長沙六臺千把總一員輪防汛兵一百二十名毎臺瞭兵五名田灣臺安兵十名錢倉寨汛兼顧塗茨口隘并管鷄報塗茨中堡蒲門四臺輪防都司守備一員千把總一員汛兵一百八十名每臺瞭兵五名朱溪汛并管下章木𤓰二臺輪防千把總一員汛兵五十名每臺瞭兵五名海口汛并管馬嶴口嶼二臺輪防千把總一員汛兵五十名每臺瞭兵五名西周汛并管蝦蟇臺輪防千把總一員汛兵五十名瞭兵五名泗洲頭汛并管靈巖泗洲花牆三臺輪防千把總一員汛兵四十名毎臺瞭兵五名闗頭汛并管黄嶴烏江七里三臺輪防千把總一員汛兵四十名每臺瞭兵五名分防湖頭汛千總一員哨船四隻配水兵六十名又龍嶼口隘安兵二十名康熙二十二年開海二十三年設汛置哨船十隻耑防千總一員管駕兵丁一百五十名毎船捕舵水兵一十五名二十五年裁二隻雍正四年撥入溫州磐石營四隻今實存船四隻昌國營經制額設守備一員雍正九年改守備銜為都司僉書把總一員石蒲汛千總一員外委千總一員外委把總二員雍正五年添設額設馬步戰守兵丁共五百名康熙三十六年為欽奉上諭事裁去戰守兵丁三十名雍正七年為遵等事改㫖議覆事裁京撥兵丁五名八年為敬陳管見設水師添造戰船六隻添設馬步兵丁一百名内於象協抽撥六十名本汛添設四十名實在馬步戰守兵丁共五百六十五名其分防内外汛地詳見海防鎮海營隸定海鎮管轄經制額設叅將一員原係五千户所順治三年改設定海營康熈二十五年改為鎮海營守備一員千總二員把總四員舊設定海水師左右二營遊守等官順治十八年裁雍正二年題改陸路叅將為水師叅將外委千總二員外委把總五員雍正五年添設鎮海水師營額設馬步戰守兵丁共一千二百五十七名康熙三十五年裁戰守兵丁共九十名歸撫標招募雍正二年為請更浙閩等事裁官馬一百二十六匹將有馬戰兵一百二十六名改為水戰兵額設守兵内改二百二十四名為水守兵七年裁減京撥戰守兵丁共一十二名歸杭嘉湖三協募補又為遵㫖議覆事題准復設官馬八十匹現在冇馬戰兵八十名無馬戰兵九十二名水戰兵一百二十六名守兵六百二十三名水守兵二百三十四名共一千一百五十五名戰哨船八隻配兵巡哨詳見海防康熈二十二年本營原防招寳山城兼防鎮城駐劄官一員帶領兵三百四十三名滾江龍汛駐劄官一員帶領兵一百三十四名龍山所汛駐劄官一員帶領兵一百四十名穿山所汛駐劄官一員帶領兵一百七十一名霩􅛾所汛駐劄官一員帶領兵一百四名崑亭寨汛駐劄官一員帶領兵一上諭百七十五名五十六年為欽奉撥歸招寳山汛管事改設笠山城汛將滾江龍汛轄所有該汛官兵移駐笠山城汛已上駐防官共八員將備駐劄鎮城千把駐劄各汛一年一換雍正二年為請更浙閩等事改鎮海營為水師奉文將備督巡洋汛毎年四月一輪千把總防水陸汛口兩月一輪分定鎮海港口虎蹲山蛟門山搗杵山金塘山西首山脚太平山瀝表觜後海東霍西霍七姊妺一帶洋面將原防之陸汛穿山霩􅛾崑亭三汛撥歸提標左營管轄雍正六年間因鎮海闗口出入船隻原係防城千把總稽查縁汛守事繁恐有顧此失彼之虞詳定將鎮海闗口責令經制千把總一員為耑防外委千把總一員為協防其鎮城事務亦令經制千把總一員為耑防外委㫖事千把總一員為協防以耑責成雍正八年為請係凡有城汛兼顧者俱令耑防駐劄查招寳山汛兼顧鎮城是以將招寳山汛着令外委千把總耑防鎮海縣城着令經制千把總耑防現今鎮城防守目兵二百八十七名鎮海闗防守目兵一十三名招寳山汛防守目兵一百五名龍山汛防守目兵一百八十名笠山汛防守目兵二百一十名已上俱係陸汛馬步戰守兵丁共七百九十五名寜波城守營現存紅衣砲二十八位内安設慈谿縣城六位府城二十二位西洋砲二十七位守䕶城池威逺砲六位守䕶城池得勝砲一位守䕶城池靖氛砲四位守䕶城池行營砲四位守䕶城池百子砲一十八門内安設慈奉二縣汛八門新驛四門守䕶府城六門蕩宼砲一百桿俱給兵操演象協城守營現存紅衣砲十二位内安設爵谿城二位存城守䕶十位行營砲九十位内安設錢倉爵谿城十二位存城守䕶七十八位劈山砲四位存城守䕶百子砲二十九位存城守䕶蕩宼砲三百桿給兵操演昌石汛現存紅衣砲六位内安設石蒲汛二位守䕶汛城四位得勝砲四位守䕶汛城行營砲二十三位内安設石蒲汛一十位守䕶汛城一十三位百子砲六位内安設石蒲汛三位守䕶汛城三位蕩宼砲二百桿給兵操演鎮海水師營現存紅衣砲五十五位内安設招寳笠山城九位沿江汛一十二位守䕶城池三十四位劈山砲二十位内安設招寳笠山城一十二位配船八位百子砲三十位内配船二十六位存局四位行營砲一百四十八位内安設砲臺汛口五十一位配船三十九位存局五十八位八節砲一位守䕶城池得勝砲三十位内安設招寳龍山十三位配船八位存局九位蕩宼砲一百桿俱給兵操演又商船繳貯百子砲八位存局銅百子砲二位存局生鐵發熕砲六位内配船四位存局二位寜波府演武塲在東津闗内乂小教塲在府治西管糧㕔右首紹協城守營雍正五年設舊隸定海鎮雍正七年改隸黄巖鎮經制額設副將一員左營都司僉書一員守備一員千總二員把總四員右營都司僉書一員守備一員千總二員把總四員添設把總二員康熙四十七年十月為稟報事添設外委千總四員外委把總九員原額兵丁一千六百一十三名内有馬戰兵一百六十一名無馬戰兵三百一十三名守兵一千一百四十名康熙三十五年六月為欽奉上諭事裁減戰兵五十二名守兵一十八名四十七年十月為稟報事添設馬步戰守兵丁共三百四十㫖議名雍正七年十月為遵丁一十一名歸杭嘉湖三覆事裁減京撥戰守兵協募補實存馬步戰守兵丁共一千八百七十二名十三年衢協改鎮添兵本協裁溢額馬八匹改步戰兵八名各官自備坐馬五十六匹兵丁官給馬一百九十五匹駐劄紹興府城副將一員兼轄左右兩營中軍都司兼管左營事一員係專防山隂縣汛左營中軍守備一員係耑防會稽縣汛左營外委千總一員協防山隂縣汛左營外委把總一員協防㑹稽縣汛左右兩營存城馬步戰守兵丁共五百四十五名左營分防各汛内有官大汛九處兼管臺口小汛二十處防守蕭山縣兼防錢清迎龍閘西興楊新橋種山插尖山龕山行伍山義橋聞家堰西山尾千總一員係千把輪防協防外委把總一員馬步戰守兵丁共一百二十四名内尖山楊新橋二口汛行伍山一臺俱係康熙五十六年為㑹酌陸路營伍等事新設又龕山臺原屬三江汛管轄亦於本案内歸併蕭山汛管轄防守諸暨縣把總一員係千把輪防協防外委千總一員馬步戰守兵丁三十九名防守新昌縣把總一員係千把輪防馬步戰守兵丁三十名防守嵊縣把總一員係千把輪防協防外委把總一員馬步戰守兵丁二十九名防守向天嶺千總一員係千把輪防馬步戰守兵丁五十名防守三江所兼防桑盆宣港龜山黨山䝉池偁浦千總一員係千把輪防馬步戰守兵丁五十名内偁浦口次係康熙五十六年為會酌陸路營伍等事添設又題裁原設烏峯宋家漊鎮塘馬鞍四臺又龕山一臺改歸蕭山汛管轄防守瀝海所兼防西滙觜北門踏浦千總一員係千把輪防協防外委把總一員馬步戰守兵丁九十四名原係右營守備汛地康熙四十七年為題設大嵐官兵案内將守備移駐臨山衛將右營原防滸山所把總一員移駐防守并改歸左營管轄内西滙觜口次係康熙五十六年題請添設并題裁原設判官新砲二臺右營分防各汛内冇官大汛一十一處兼管臺口小汛二十三處駐劄餘姚縣都司一員隨防把總一員協防外委千總一員馬步戰守兵丁共一百四十九名原係千把輪防康熙四十七年為題設大嵐官兵案内將原防臨山衛都司移駐專防仍隨帶輪防把總一員兼管餘姚縣新舊兩城遊巡梁衕中村北溪等汛駐劄臨山衛守備一員協防外委千總一員馬步戰守兵丁共一百五十九名原係都司駐防康熙四十七年將都司移駐餘姚原防瀝海所守備移駐耑防兼防荷花臺顧家臺黄家路口次方家臺夏葢山等汛内黄家路口次係康熙五十六年題請添設并題裁周家路一臺防守夏葢山外委把總一員係臨山衛守備管轄戰守兵丁二十九名防守梁衕汛兼顧夏家嶺丁家畈口次把總一員係千把輪防協防外委把總一員馬步戰守兵丁一百一十九名防守中村汛兼防杖錫上馬岡分水口次把總一員係千把輪防馬步戰守兵丁七十名康熙四十七年福浙總督梁鼐為禀報事題請増設防守上馬岡口次外委把總一員係中村汛經制把總管轄戰守兵丁二十九名防守北溪汛兼防雪竇西嶺口次千總一員係千把輪防馬步戰守兵丁七十名原係寜波城守營汛