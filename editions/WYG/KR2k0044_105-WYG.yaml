body:
  text: 浙江通志卷一百六物産六金華府香粳萬厯金華府志金華府元貢香粳米東陽縣志粟以香秔為上自金華縣外諸縣均無貢由山田多故也其種有秈有糯色有黄有黑有丹其實有堅有疎有長短髙地多種盖山鄉多火種凡山平側而上疏者養柴二三年輙火之乗火氣掘墾撒種殻嘗裂而作聲不移時而長無他工費但拔去其草而所入自倍如是數年即復養柴所謂休其地力也聞之諺曰田荒如草山荒如寳殆甚言之歟又稻種早有六十日嚴州早皆四月種六月收而六十日尤早在田僅六十日此耕農所藉以接乏非食租者所嘗也玉山鄉有仙居早收與平原中稻同中則金成為總名有鐵馬鞭毛棄齊蘭溪矮白枇杷黑枇杷長枇杷矮枇杷鵞黃白落場青諸種而以頭水金成為佳又有長稻湖廣秈味香美而晩收𩔖晩稻有芒皆舊志所謂秔也晚有二種一為秈俗名雪稻有早雪長稈濶邉烏嘴馬頭蘸齊頭黄冷水清諸種俱八月收一為稬有平頭黄殻黑嘴紅皮黃芒烏節胭脂𤓰子白羊草鞋諸種皆性軟而粘用以造酒及作果餅甚佳平頭尤尚𤓰子最晩為山田所種今平原亦有之其早者名趕陳糯種與中稻同而收同早稻又有紅芒雪紅芒糯芒甚尖長山中人謂之野豬哽名雖麤而不可棄也且其粒獨大為諸種所不及别種為旱稻宋時所給占城種也粒似糯㣲小雖大旱有收而所入不多故山鄉有之而平原不種大槩早中二種成熟雖異而取用略同晚二種取用各異而成熟則同平原上暖日蒸稻熟不出八九十日以四月種七月收八月而畢山郷地氣髙寒每日不滿一晷故須百二十日始熟以五月種九月收十月而畢諺云陽鄉一飽七月半山鄉一飽重陽㸑此其常也原田蚤者或以社前浸子立夏前揷秧謂之春田而山田之稻有遲至十一月刈者謂之寒稻久而不落亦地氣然也穄萬厯金華府志黍稷之𩔖山鄉多種之東陽縣志按釋名稷一名粢又名穄中央之穀中央土五行為尊故稷為五穀長今農家於隙地樹之間以作果餅色絳而味甘然不作飯也陶隐居生江南不識穄為何米盖亦廢而不種久矣今祭祀所稱粢盛猶仍其名本草云以早熟且清香因以供祭祀然味極淡諸穀惟此為下種之祗以防荒耳此語頗有異同其别種為早鈴米相𩔖而色白乃是稻種麥正徳蘭谿縣志瑞山産瑞麥東陽縣志其𩔖有大小二種大小中又各有數種惟胡大麥最早即所稱􅜿麥猶之大麥也大蒜紅等次之小有淮麥蠶青三月黄胭脂紅鐵丁頭等名蠶青無芒淮麥不染瘟黄諸病為佳收時多值陰雨宜速不宜遲諺云收麥如救火又云帶青收一半合熟收一半過熟則雖天晴實亦易落别種為蕎麥與二者不同白露前撒子至霜降後收開花結子收刈皆以十八日為期或經霜則敗故俗又名花麥農家以此為救荒之穀嵗旱則此穀易生而有收盖地力未盡故也豆農政全書婺州以南平原有白豆田豆撒豆諸種山鄉惟山豆可蒔東陽縣志白豆喜燥以二月末三月初種六月收亦有遲至四月種者齊民要術云春大豆須植穀之後二月中旬為上時三月上旬為中時四月上旬為下時地不求熟鋤不過再即此𩔖也田豆喜濕早中二稻收後始種頗費工其未收而間撒其種於隙者謂之撒豆工費較省然不甚貴重皆七月種十月收畏霜山豆色黄而粒大以四月種八月收火種者工費更易大槩諸豆工費都省不比稻麥也又大豆俗名園裏豆多於家圃中種之烏豆種塍間俗名田塍豆可入藥亦有白色者與青豆菉豆赤豆虎爪羊賑諸豆皆不多種惟佛豆蠶豆廣種於未熟時刈之以料田不以供食佛豆一名豌豆農政全書曰二豆於百穀中最先登蒸煮皆可食荒年宜多種汜勝之云大豆保嵗易為宜古之所以備凶年也扁豆東陽縣志皆附木而生又一種名雞爪亦名老少年莢肥厚又有紫扁豆花莢皆紫亦勝其别種為刀弰但可糟食麻格物論九穀之一也山鄉多植黑者入藥麻榨油更香烈東陽縣志麻有數種園地多種苧漚治為布堅而耐久精治之作縑絲勝葛芙蓉麻但於水岸田塍植之作䋲索而已又一種名絡麻髙丈許用與芙蓉同按月令仲秋天子食麻今但取皮為布而實皆棄之然亦有無實者傳曰有實名苴無實名枲今所種皆有實而且多詢諸父老云麻子仁入藥病者煮粥食之何得云不可食今以隙地種之刈後更不鋤治來年所發皆夙根安得有佳實哉以一邑推之穀𩔖之最失其本者矣薹菜蔬譜即油菜東陽人謂之芸薹以其交春抽薹也東陽縣志此菜香味鮮美其子榨油取用甚多其查用以料田名油篐勝他物故多留以蓄子窠菜東陽縣志其形似窠托田中土人多連根挑之甜美可食九心菜萬厯金華府志蔓菁之𩔖一顆叢生邑人以法製食辛辣逾薑桂其子入藥東陽縣志蔓菁菜與北方形𩔖不同三春惟此為盛夏月乾之用鹽和蒸香味皆佳瓣濶而白者曰白菜惟九心種生煮最佳争春菜東陽志南鄉有一種柔條木榦先諸卉而萌土人謂之争春菜味苦而清鮮菹皆可啖紅花菜金華府志取嫩苗乾作蔬名紅花菜莙薘菜東陽縣志色白微黃其瓣極濶肥美異常抽心則不可食萵苣東陽縣志萵苣名善菜但食其葉雖抽心亦採心盡乃止莧菜東陽志有紅心菜即莧東陽縣志此菜與映山紅闘色須乗其未開種之則易長最耐人採採盡復生數澆培則𩔖新種老作乾甚佳五六月不可得食更布種亦易生不甚長而味甚鮮别種為馬齒莧生野田中香味更别採作乾兼理腹病南𤓰萬厯金華府志山鄉多植可為蔬東陽縣志此土𤓰也花實皆金色四周有瓣痕其皮色碧緑而光圓者名北𤓰明萬厯末應募諸土兵從邉闗遺種還結實勝土𤓰一本可得十餘顆遂徧種之山鄉尢盛多者薦食外以之飼豬若切而乾之如蒸菜法可久貯禦荒田𤓰金華府志田中所種可生啖不可多食人家以諸色醤醃之為㫖蓄比他處特佳蜜煎亦作果品東陽縣志黃𤓰鮮食不能多醤食不可乆西𤓰東陽縣志紅瓤黑子者佳然紅子為多其佳者産孝徳鄉茄東陽縣志亦名落蘇有紫白二種夏食為宜秋茄則味苦土人以中元和麵為餅名拖茄芋東陽縣志水芋種水田中禾榦紫色為紫芋體潤而滑山芋不甚需水禾榦色黃抽心開黃花謂之黃芋盖農家煮之以飽腹非止作菜也香芋須一二年掘用其子根乃大而香園圃中偶種之薑東陽縣志邑中種薑收數倍之息人多以穀易之擇肥嫩者和以酒糟或米麥醤可久蔵蘿蔔東陽縣志煮食自佳熟而乾之亦可久用鹽壓生乾不及也山鄉𩔖用火種法重至數斤鑢成絲乾之四逺通行野菘山家清供東陽人每用鹽淹菘字義云菘四時常青有松之操此惟野菘為然種則不出也山藥農政全書薯蕷為雜植第一所在居民種之東陽縣志俗謂薯藥另一種為甘藷俗名紅山藥種法鑿坎方廣令深但壅土而已不須鋤治用力少而利多一畝可收數十石蒜苗東陽縣志大為大蒜小為小蒜蒜苗不甚採食俟抽條取浸之用以辟暑善蓄者用糖醋浸之經年愈妙麥葱東陽縣志與麥同收者曰麥葱又有四季葱山間有不種自生者曰胡葱與小蒜相似山粉萬厯金華府志即蕨粉以其出於山故名蕨隨處有土人能淘之成粉功力甚費而所直不多若他處解作粿麵當盛行東陽縣志根可作粉淘汰多者色純白名粉心用作粿麵甚佳每當嵗歉時就山中擇地掘取細舂浸之力加淘洗以菜調之作羮可飽玉山瑞山等郷不荒亦取土商販至蘇杭絹帛行多買以作漿舍此不可用蒲盧食物本草東陽蒲盧有長至二尺者東陽縣志長者曰長蒲短者名𤓰蒲皆甘可食埤雅曰長而痩上者曰瓠短頸大腹曰匏其注云匏苦瓠甘瓠可食匏可繫此與本邑所種不𩔖盖泥論語繫而不食之義耳凡匏皆可食不食則繫以俟其乾老而抉取其瓤以用之聖人之言為人誤解余見説家云匏性輕浮繫之腰可以渡水此言良然嘗詢之農家云種時不可沾指沾則苦不可食但老而剖之為勺器不剖則用以浮水若盛酒醪貯子粒須是甘蒲其細腰蒲有大小二種極似畫家仙人杖頭所掛圓正可愛埤雅云細腰曰蒲即此𩔖也筍武義縣志猫竹未出土曰潭筍味最佳又燕筍乾嫩而淡者佳樹衣霏雪録金華山中多有之僧家以為蔬味極美貫休詩云僧採樹衣臨絶壑指此也襪兒花東陽縣志其形似襪不足供翫好取將開之蘂煮食風味特勝乾之以㸃茶亦佳此惟東邑有之金蜜萬厯金華府志夏取為良不著假者其色如金蠟之佳者其凝如脂冬蜜惟山中有之稍劣腐絲東陽縣志田豆為上山豆白豆次之撒豆為下質性皆受和煙薰作乾香味尤勝但不解作乳近乃切乾成絲其細如縷謂之東陽腐絲云桑農桑譜東陽種比浙西髙大一二倍較湖桑則頗小東陽縣志桑種甚多世所稱者荆與魯也浙西所植枝條柔短魯桑之𩔖也湖桑即荆桑也荆桑飼蠶其絲堅韌本邑頗近之栽接培養皆如法其不接者但以食原蠶不貴也桐方輿勝覽城西寳婺觀古桐森然諺云桐齊簷出狀元檀武義縣志石倉嶺之旁有老檀髙十餘丈年豐則發葉早儉則遲農人占候多驗檮東陽志義烏雲黃山雙檮木傅大士結菴之所櫧東陽續志櫧可作屐惟此達省中裁斲如式而後致之惟正北諸鄉近諸暨水路為然餘不能也實可食水浸去其澁品味最勝乾則僅可作粉檡東陽縣志大者宫室之材未成榦者嫩葉柔條香氣酷烈耕農於三月盡刈之踏入水田中謂之採青乃土功所首藉者又一種名活腦入田力尤厚其實謂之檡子夏採作腐桕東陽縣志俗謂之栚其實名栚子堅白如脂煎燒成燭亦名蠟燭蠟本出義烏今山鄉所産色黃而油少其仁榨油名清油清者為佳其滓成餅以料田其殻燒作炭入爐用亦佳紫石楠平泉草木記東陽之紫石楠楓香木名勝志義烏縣香山産楓香木連理木東陽續志東陽淮巖山産連理木大百拱鐵樹正統義烏縣志雲黃菴前有鐵樹枝葉剥落一榦膚理不腐頑墨如鐵桃東陽志單葉花紅其種最良東陽西鄉髙城廣植呼為髙城桃楊梅正徳蘭谿縣志湛裏源産石榴萬厯浦江縣志鐵甲山多安石榴花開如錦袍裼甲栗東陽縣志出瑞山鄉者佳安文尤著稱安文栗大盈握大小間雜者名五花栗小名毛栗園圃所樹僅供茶果而已一名榛栗風食甚佳柿萬厯義烏縣志有紅珠野猫菉柿小柿油柿數種東陽縣志大者火薰作餅久而凝霜勝呉下所鬻青州餅小而丹者名紅珠柿更勝但不多長而圓者名牛奶柿無核次為牛心柿稍尖又次為雞心柿𩔖牛心而小通謂之柿棗切片者名柿花皆逺致隣郡又一種名羊阿柿細小無皮核最美小兒所食也南棗金華府志出東陽茶塲最有名東陽縣志浙東西諸大郡逺至京師皆珍之猶仍茶塲之名然他處只知此名不能察其樹本之有無也其次謂之魁棗又次名通新棗平民收得一二石者亦自走錢塘得價則還納糧税懽然如諸穀一熟也舊以茶塲所出為佳相傳其大如拳其核尖細如黍決之即脱其甜如蜜香而且脆以此京師皆盛傳之今茶塲漸少惟東南諸郷於阜地上植之頗廣優劣不一大槩未熟輒擊以湯激之使變色謂之湯紅乾則其色紫已熟者名樹頭紅乾則其色丹堪入藥用然不多有過熟者須以所煮餘汁煮之色味皆似蔗糖謂之糖棗此以時食為美不作乾也若其大小則易辨矣棘則小而圓木本不異而性味殊佳者勝棗榧東陽縣志産玉山瑞山等鄉收後將灰拌之令乾謂之灰榧炒食甚香最佳者細而長名蜂兒榧種不多得葉適蜂兒榧歌平林常榧啖俚蠻玉山之産升金盤其中一樹斷崖立石乳蔭根多嵗寒形嫌蜂兒尚粗率味嫌蜂兒少標律昔日取急欲髙比今我細論翻下匹世間異物難並兼百年不許贏栽添餘甘何為滿地澁荔子正復漫天甜浮雲變化空俯仰靈芝醴泉成獨往後來空向玉山求坐對蜂兒還想像蔗義烏縣志向無此種順治年間從温州得種乃競栽種之而地力不稱利頗㣲其製為糖不曉作偽得法者真足稱砂糖耳蓮東陽縣志湖塘平淺者多至十餘畝香聞數里不減西泠其菂甚細僅可鮮食藕作粉甚佳葉則時收貯之芰東陽縣志四角無刺者佳六角多刺為下八九月貧人多就水塘摘而煮之以易穀亦當一熟玉蘭花史蘭谿産玉蘭萬厯金華府志蘭谿香山産玉蘭無葉而花白有香海棠東陽縣志有鐵榦細膚垂絲等種鐵榦以櫻桃接細膚以木𤓰接垂絲以桑樹接玉茗東陽志似玉仙採而乾之夏月㸃茶能解煩熱他種有寳珠石榴湘妃皆假其名紫陽花東陽志紫色鮮妍可愛産石洞書院云是晦菴講學時所植賽洛陽東陽山水記登瀛山産更無雜植好事者多賞之萱東陽山水記東陽東白山有古寺遺址廣延數百畝多生萱花開時居人持筐採之瑞香東陽縣志花如丁香春開次第千朶俗名千頭草婦女以線穿之繞髮髻外謂之花髻蘭方輿勝覽蘭谿一名縠水岸多蘭􅉅正徳蘭谿縣志香溪即蘭溪之下流蘭香至此益清故曰香溪花史蘭溪蘭陰山多蘭􅈍明一統志武義菊妃山多蘭菊麥蘭蘭譜産山谷中香清可愛植則以細沙培之沃以清水即活不畏霜凍亦花中松栢姿也紅蘭蘭譜惟深山中有之其色純紅香少減四季蘭東陽志産自福建今成本産亦有四季開者灌忌井水栽法更艱大槩與麥蘭相反風蘭蘭譜金華山巖壑深處懸根而生但用亂髮襯之空懸自活根即石斛珍珠蘭東陽續志亦名賽蘭本非蘭種以其香氣似蘭而郁也花金色亦名金粟蘭形如魚子名魚子蘭開時如貫珠故名莖以棕絲繫之又名弔蘭用以貯茶香味俱勝名蘭茶瑞蘭蘭谿縣志縣出白瑞蘭雙頭蘭婺蘭紀會宋咸淳中蘭谿之南塘山出瑞蘭叚綺為賛刻石縣治正徳蘭谿縣志金似孫植蘭於庭前號曰蘭庭其蘭忽開花而雙頭水仙永康縣志千瓣者名玉玲瓏茉莉永康縣志有木藤二種又名抹麗謂其能掩衆花也菊菊譜婺州有銷金紫菊銷銀黃菊乾紅菊乃佛頭菊種也東陽山水記武義縣小姬山姬水溪多産美菊竹金華府志筀竹質軟可作器一種皮色純黃間以緑線花圃種之若紫竹斑竹則二美兼之至金竹水竹利用尤多雷竹入藥其方竹鳯尾竹月月竹間有之又别一種為天竹非竹𩔖也毛竹金華府志東陽毛竹可作器東陽縣志竹産不如鄰郡之多而堅厚却過之作器耐久其大者髙五六丈䜿之簷前為夜燈謂之髙燈每冬春之夜逺望如星火又迎神以帛或布繫之名長旗此他處所無新出時可作紙去皮可編筏筍為一春佳㫖未出土者不知掘取盖不曉土鬆則彌盛故耳山竹金華府志出東陽榦細可為筆管筍亦佳箭竹正綂義烏縣志青潭山之東山源之口多箭竹東陽縣志中實如箭葉甚大土人名箭箬石竹武義縣志石竹小而密土人植為籬花節竹金華府續志出東陽金䝉山他處無有其節線連環異於常竹神杖用之茶茶經婺州次東陽縣東白山與荆州同品茶要録補婺州之舉巖碧乳東陽縣志大盆東白二山為最榖雨前採者謂之芽茶更早者謂之毛尖最貴皆挪做謂之挪茶茶客反取粗大但少炊之謂之湯茶轉販西商如法細做用少許撒茶餅中謂之撒花價常數倍正徳蘭谿縣志茶山山谷深􅆼草木森蔚而多茶萬厯浦江縣志二都三都二十四都二十八都出茶酒名酒記金華府有金華酒談薈婺之酒有錯認水東陽酒食物本草東陽酒最佳自古擅名麴本草其水最佳稱之重於他水事林廣記所載醸法今則絶無惟用麩麴蓼汁拌造假其辛辣之力俗人因其水好競造酒味雖少酸一種清香逺達入門就聞好事者清水和麩麴造麴米多水少其味辛而不厲美而不甜色復金黃瑩徹天香風味竒絶此皆水土之美故也東陽縣志水白米白麴白謂之三白此為上品不與姑蘇相襲也次則皮粉合造之麴名常酒又一種人家所造浸米或至一二十日米臭即酒益香麴以諸花及稻苗露為之名花露香味極美又有重之以椒者謂之真珠酒皆不益人别種為白酒夏秋間造隨時食之東邑水源多出山脉米麥之性亦異他處故酒味辛烈舊東陽酒殆以郡得名今惟蘭陵逺販武義次之全與本邑不𩔖錢惟善謝送東陽酒詩故人逺送東陽酒野客新開北海尊不用尋梅溪上路春風吹與滿乾坤瀫溪春談薈蘭有瀫溪春酒香山酒韓翃送金華王明府詩黃蘗香山酒桃花酒永康縣志山中有一種千葉桃花以酒浸飲之除百病名桃花酒花麯酒東陽縣志大者開花入藥小則隨處皆有伏月採之浸造酒麯較他處特勝茯苓永康縣志自生者佳土人以法種之五年掘黃連明一統志各縣出黃連松脂東陽縣志深山老松逺不能取材四周多鑿為穴用竹篛盖之久乃剖取如是一二次皮色皆白體輕易乾伐之為勺器其根枯朽則種茯苓細辛本草衍義東南所用細辛皆杜蘅也名醫别録今用東陽臨海者形叚乃好而辛烈不及雪查萬厯金華府志𩔖蘋菓晩摘者名雪查尤勝香薷永康縣志産山中一名香菜暑月可作蔬香附子永康縣志一名地久薑古謂之雀頭香魏文帝遣使於呉求雀頭香即此天門冬萬厯永康縣志金勝山少竹木惟産天門冬最良放杖木本草拾遺生婺州山中如木天蓼老人服之一月放杖故名氣味温甘無毒治一切風血理腰脚輕身變白不老浸酒服之金星草嘉靖浙江通志味苦寒可辟丹石之毒淡竹葉萬厯金華府志東陽縣元貢淡竹葉理皮藤金華府志皮有文理造紙最堅土人煮竹籜和之東陽永寧鄉白溪能造其地近剡故爾梨藤東陽縣志其條細𢷬如綿取汁作紙膠最良俗以之築地堅如鐵結實如棠梨可啖葉可肥豬黃藤東陽志其花可食又根𩔖蕨可為粉香絲藤東陽志似白藤而脆可雜用其子可食紫河車東陽縣志土名金線重樓可消臃腫白石乳宋濂蘭谿洞巖記洞巖之山玲瓏而鬱紆其靈洞凡六一曰白雲産石乳倒垂逺望縹緲晶熒奪人目睛極可翫金華縣志嘉靖十八年有人鑿石忽露一竅大如缸秉燭進一窟頗覺寛廣上皆石乳多黃色再進深數窟之後懸者皆如氷雪醫云此即石鍾乳也好事者或取為几案間之翫飯石宣和石譜婺州東陽縣雙林寺傅大士道塲山中産石凡有青白紫緑色皆瑩徹謂之飯石質細碎堪治為數珠或作紙鎮嘉泰會稽志即紫石英寺僧以飯石神其説靛青東陽縣志兴葉名蓼兒青不甚佳圓葉者馬蹄靛山鄉皆種發之以染絲布色深碧另一種名菉豆青又一種名鴨綽青靈草萬厯金華府志陽春洞仙壇上多産靈草席草東陽縣志其體三稜善織者價值蘇席之半剪草本草綱目剪草惟婺州者可用今遍訪無有識者或云即茜草定風草武義縣志邑産定風草龍鬚草元和郡縣志出金華山赤松子得道處太平寰宇記又有比龍鬚粗大者名為虎鬚烏東陽縣志顔烏孝子築塜時羣烏啣土故至今多烏其地名鴉塘槖駞鳥嘉靖金華縣志金華山頂有鳥名槖駞羽毛五色長尾媳萬厯義烏縣志鳥有長尾媳白蝙蝠正統義烏縣志黃山洞白蝙蝠有翼盈尺山羊永康縣志永康民有以山羊獻於縣問所從來則曰羊與虎闘不勝匿於隘巷獲之縣令縱之其羊有大力牛身犀蹄頭則羊也血能療創玉面貍東陽縣志俗名柿猫性喜食杮其肉肥美而香脂多不膩舊以充貢竹狗鴨狗萬厯義烏縣志毛之屬有竹狗鴨狗薰蹄東陽縣志俗謂火腿其實煙薰非火也淹曬薰收如法者果勝常品以所淹之鹽必台鹽所薰之煙必松煙氣香烈而善入製之又及時如法故久而彌㫖另一種名風蹄不用鹽漬名曰淡腿浦江為盛本邑不多白魚永康縣志邑産白魚清而肥斑魚東陽縣志如石之斑味𩔖琴魚乾則尤勝神魚成化湯溪縣志白馬潭相傳有白馬潛於水化為巨鰌至今游魚出沒人不可捕或謂神魚楊與立白馬潭觀魚詩溪頭石磑坐盤桓時見修鱗自往還可是水深魚極樂不須妄意一投竿蟹萬厯浦江縣志潮溪出佳蟹紅蟹萬厯金華府志蘭谿縣玉華峯之麓神祠前有池方四五尺中有金色紅蟹羅萬厯金華府志宋貢含春羅花羅浦江元時貢刀羅紅邊羅雞肋編婺州紅邊羅絲縷中細不可與無極鹽禄等比紬東陽縣志絲織明浄謂之東紬織花者名花紬綿絲織者為綿紬皆堅厚清水耐用花布東陽縣志匠織者謂之腰機農家自織者謂之女機黑白相間或成五色謂之花布蠶絲間織名梭布繅入蠶絲為兩梭紡織成文者名斜紋苧織名苧布雜以蠶絲為兼絲皆長四丈濶二尺紙墨藪紙取東陽魚卵虚柔滑浄者嘉靖金華縣志梁山近盤泉舊有紙厰造紙東陽縣志尋常所用皮紙大者名呈文綿紙大㮣皆用桑皮筍殻煮成而以藤汁澆之萬厯浦江縣志興賢鄉出紙藤器東陽縣志利省藤可作大索又一種女藤構房屋用蚌珠成化湯溪縣志白馬潭産蚌有珠紫硃萬厯金華府志蘭谿縣柱竿山多紫石如硃可磨以冩字他山所未有也蠟燭東陽縣志俗以桕子油為蠟塊亦美其名耳燭以蓬稈為心綿花裹之耐照而劣或致省下輒另澆之便發光盖以燈草為心故也仙人麻鄭東白游仙華山寳掌洞記攀援亂石有異草如絲縷狀生峭壁上舊𫝊仙人麻苧之遺白石成化湯溪縣志白沙溪出羊石宣和石譜婺州金華山有石如羊蹲伏角尾足彷彿形似髙六七尺傳云黃初平叱石成之龍石雲林石譜婺州金華縣智者三洞洞中産石巉巖如雪余於洞上獲一石大如拳髙數寸若二龍交尾纒繞鱗鬛爪甲悉備石之中有數竅疑亦鍾乳㸃化五色石武義縣志在白陽山纍纍如欲墜舊傳色隨時換黃則嵗豐儉則或青或白黃隐弗見也涵碧石雲林石譜婺州東陽縣有涵碧池唐令于興宗得其勝槩鑿池面瀑布有二大石魚置沼面魚之前有石一塊髙二尺許嶮巖可觀石之半間凹然如掌羅江東昔避地著書嘗以為研松化石録異記婺州永康縣山亭中有枯松樹因斷之誤堕水中化為石取未化者試於水隨亦化焉其所化者枝榦及皮與松無異有未化者數叚相兼留之以旌異物焉雲林石譜婺州永康縣松林頃因馬自然在上一夕大風雨忽化為石仆地悉皆㫁絶大者徑二三尺尚存松節脂脉紋土人運而為坐具至有小如拳者亦堪置几案間石枕琴薦陸龜䝉二遺詩序二遺詩者何石枕材琴薦也石者何松之所化也東陽多名山永康之地蟬聮其間中饒古松往往化而為石盤根大柯文理曲折好事者得而致於人間以為耳目之異太山羊振文得枕材趙郡李中秀得琴薦皆兹石也陸龜䝉二遺詩誰從毫末見㕘天又到蒼蒼化石年萬古清風吹作籟一條寒溜滴成穿閒追金帶徒勞憶静格朱絲更可憐幸與野人俱散誕不煩良匠更雕鑴礎石金華府志龍鱗山石色皆赤階礎所資石灰萬厯金華府志蘭谿白坑山石皆白可燔為灰炭東陽縣志白炭松炭栗炭皆人家所用煎銀炭舖户買之此與各色材木並堪致逺今惟玉山鄉一二處走紹郡餘不能也衢州府穀衢州府志穀𩔖有建陽早天公早江西早俱六月熟金裹銀太平早七八月熟晩稻十月收俱謂之尖米本郡無所謂團米者萬厯龍游縣志穀之品白禾六十日禾秋初早熟龍泉禾紅禾江山早太平早金裹銀俱早熟浙西謂之尖米價輕於晩禾食者少浙東以供饔飱糯萬厯龍游縣志白殻糯紅殻糯鐵漿糯白芒糯草鞋糯臙脂糯鳥嘴糯俱晩熟用之醸酒有餘則販易他縣黍衢州府志有赤白二種樹髙粒長榦葉可代薪土人不食淘浸磨漉為餜餌粟衢州府志有淮粟蘆粟皆可作酒神仙稻萬厯龍游縣志惟此稻旱地可藝佛豆衢州府志此豆種成即犁去并其莖壅水瀦之以肥田虎斑豆𢎞治衢州府志出江山縣豆芽菜天啟衢州府志黃卷即豆芽菜出常山冬菜西安縣志諸菜皆産近得一種於杭曰冬菜𤓰𢎞治衢州府志開化縣出金𤓰兎頭𤓰天啟江山縣志𤓰之𩔖有兎頭𤓰瓠天啟衢州府志大腹細頸者刳其瓤為葫蘆有一種長身者曰芋瓠蘿蔔稗史彚編衢州最大味甘冬月尤美其魁如六斗斛人家得此不敢賣戚友以鼓樂導迎至家設酒謂之菜玉以為一嵗豐亨之祥赤蘿蔔西安縣志小而赤者曰湖蘿蔔種自湖州得之薯蕷萬厯龍游縣志邑産最多有紫白二種舊志云即山藥非也其種為薷不及北方入藥之品茭白西安縣志近濠田始種頗𩔖杭州産者諸村間有之芋𢎞治衢州府志龍游縣方山産芋大且甘異於他産薑天啟衢州府志薑必取隔年者名曰母薑可食其八月採者曰温薑不可食小筍衢州府志以湖山為佳冬筍西安縣志凡竹皆有筍惟猫竹冬取者佳岑山筍萬厯龍游縣志岑山産竹筍焙蔵最美然不多得蕈太平寰宇記衢州産號曰生子蕈蕨粉天啟衢州府志山中産蕨最廣根可作粉充饑龍游縣志舵樓兴山産蕨及葛可療民饑松龍游縣志楊樹山上有五粒小松數株相傳從華山移植桐萬厯常山縣志有數種梧桐油桐皆結子惟白桐花不結子其材最美可作琴瑟槐萬厯常山縣志有數種葉細而青者土人謂之木槐花可作染烏桕萬厯常山縣志土人取其子榨油栟櫚萬厯常山縣志邑中多産其皮可月一取之以為簑衣為履套為􅇃薦為靸鞋杉崇禎開化縣志開地田少民間惟栽杉木為生三四十年一伐謂之拚山邑之土産杉為上薑漆次之炭又次之合薑漆炭之利只當杉利五之一聞諸故老當杉利盛時嵗不下十萬以故户鮮逋賦然必仰給於徽人之拚本盈而呉下之行貨勿滯也開化縣志明萬厯二十六年礦稅事起有謂開化六都大尖塢八都烏哨塢及四都三處礦洞可開者時採礦曹内監委官馬忠挾諸商至縣起工先挖大尖塢開兩月採礦砂四千斤約百斤烹得銀一兩不償所費於時邑令劉防範周詳奸徙斂戢及内監親臨令不激不隨調停上下然礦利既目擊烏有又不肯空返令不得已議將雲霧山官木召拚得四百金抵充礦價内監既去礦洞仍封民不知役地方晏然仁侯之力也後三十年而有議採木雲霧之事雲霧山者先邑紳宋氏山也在二十四都界徳興延袤頗廣而中阻深嘉靖間有吾氏與宋搆訟吾黠甚揚言此山藪盗為不軌以聳當道而傾宋勘者至則植幟舉煙以惑之宋宦長者不與争入山於官而訟遂息官為令每五年一焚林箐迨萬厯中劉令有拚木抵礦之議土人李辛戒等納價四百拚之盖宋氏所遺盡於此矣不知因何山名四馳奸徒垂涎天啟初有聳兩臺願自備工本採木助餉者事下本邑已而竿牘紛至皆大力者主之王令曰此非躬勘無以塞饞口遂深入其阻據實申報邑人亦始知此山之無木也乃奸徒意未巳竟走京師適大工興旁搜利孔言路遂有摭其説以聞者甚謂山方千里木可楝明堂地可興屯㫖既下浙上下愕眙利害叵測邑巨姓及隣山居民洶洶將逃徙時但令方下車毅然身任之亟往勘如王令言陳七不可一不必侃侃争之未幾巡道孫某郡守舒某覆勘知令議不可奪遂詳巡撫疏請罷採當是時璫鋭意黃山之役以為雲霧即黃支别於是浙縉紳在京者合疏稱雲霧屬浙與黃山了不相干得㫖報罷浙民歡呼若更生云往礦税之使四出在處告變有司不善調停幾至糜爛開邑幸而後先得神君力若此雖然深山金木若有若無㣲奸人搆釁即開人亦未能了然礦洞之無金雲霧之無木也故備志始末使後來者得以考鏡焉謹按開邑木山本為利藪然開民不能自有其山往往貿之他郡商賈所至每因界畫不明以之啟訟如前明伐山之事又出其變幸有良宰以息争端王令名家彦但令名宗臯罷採之力但令居多特為拈出桃𢎞治衢州府志龍游縣龍丘山三疊巖前有一桃樹食甚甘非山中物莫知誰植楊桃𢎞治衢州府志江山縣出石榴西安縣志出峽口者佳衢州府志又一種白者味酸柿衢州府志有一種緑柿小者曰牛乳杮榛𢎞治衢州府志江山縣出核桃𢎞治衢州府志常山縣出落花生衢州府志種自閩中堆沙植之花落沙上結實如蠶梨天啟衢州府志出西安前塢者佳萬厯常山縣志梨有數種有青皮梨糖頭梨櫨梨大而甘脆者雪梨可治傷寒然無真栽自諸梨苞接而成橘衢州府志有朱橘緑橘獅橘豆橘有漆碟紅有金扁有撫州諸種惟朱橘大而盛行故稱衢橘西安縣志邑産在明時惟縣西航埠二十里上下栽橘今近城埠頭及洋村并城中隙地遍栽然數遭凍萎其利尚不及曩時之半諸橘中惟獅橘皮厚耐寒可逹京師而色味逺不逮朱橘近商販多用木桶綑載得免凍麬僅有至京者近日多就園户摘其佳者以充供奉於是朱橘盛行於京師朱彛尊篁步詩江臯有篁步地似果園坊漸逺魚蝦市真成橘柚鄉株株當暑綠顆顆入秋黃輸與村夫子經冬自在嘗黃香橘鄭元祐送毛彦昭歸三衢詩橘熟黃香壓樹低此即蜜橘橙天啟衢州府志出西安石塘西安縣志皮香脆瓤酸香櫞西安縣志黃潤有香可資清供其味稍劣蜜羅柑天啟衢州府志出西安石塘西安縣志香美皮瓤皆可食蔗西安縣志有紫白二種紫者産龍游供咀嚼白者種自閩中來可碾汁煉糖但土人不知以糖為霜耳藕天啟衢州府志出府城内東北隅西安縣志藕細而淡不及杭産芡西安縣志芡實不及杭産逺甚以燥而枯也梅龍游縣志梅嶺多梅花緋桃花江郎山志山多緋桃華而不實真紅桃花名勝志江山縣浮盖山上有仙洞有真紅桃花而不結實蘭西安縣志山蘭正月雪中開春夏之交有九節蘭亦自山中採取城市土性不宜故少種蒔惟建蘭最貴盖閩中氣候暄暖較西安不同難於培養其花自五月至八月清芬相續不㫁然必善為澆灌方可嵗開至閩中所重玉莖蘭西安亦未見也萬厯龍游縣志衢郡接壌閩地氣漸煗建蘭茉莉經冬不萎朱蘭天啟江山縣志花有朱蘭仙蘭閩部疏仙蘭於仙霞嶺得之山鵑衢州府志花千瓣深紅色江南人呼為浙鵑舊志指為杜鵑其實非也杜鵑花出蜀中其花葉俱狹而長先葉後花花單瓣硃砂紅色内一瓣有湘妃淚紋江南人家間有之浙東無此種也茉莉西安縣志夏月放花性畏寒𩔖建蘭木本者佳邑中處處有之桂名勝志開化縣桂巖上有秋香一株自石罅出婆娑掩映與巖相對峙萬厯常山縣志桂巖上有桂樹百餘株不種自生遇秋花發風送清香數里木芙蓉萬厯龍游縣志大者榦如􅇲扶疎可愛碧蓮名勝志江山縣江郎山頂有池生碧蓮青蓮菊西安縣志菊兼衆色培養最難有一種號青蓮者最貴石巖花萬厯常山縣志狀介石竹杜鵑之間支竹水經注定陽縣夾岸縁溪悉生支竹及芳枳木方竹𢎞治衢州府志開化縣出孝義竹𢎞治衢州府志江山縣出鳯尾竹天啟江山縣志邑産鳯尾竹方山早茶𢎞治衢州府志龍游縣方山之陽草坡袤廣不過百餘步出早茶味絶勝可與北苑雙井争衡龍游縣志此茶入貢品葉楘游方山詩方山古刹白雲隈紫茁蒙芽發石苔忽遇道人天外至幽香移入小壺來北山茶西安縣志邑中出茶不多惟北山者佳石室酒周紫芝風流泉銘序石室酒出三衢名傾浙右余得其法於衢人以授富水兵㕑使醸之既成取以酌客無不喜者以為深醇雅健自是一種風流因名以風流泉而為之銘銘徳惡剛暴酒欲媚娬伊何人斯醸此秫黍觀其清醇而近道温厚而不武則含濁醪之妙而嗣元酒之古也至於風流醖藉盖張曲江之為人而若飲醇酎則與周公瑾而語也維彼世人喜飲酷烈太白在手轉喉耳熱謂此君子非我儔列嗟嗟我友妙韻勝絶不險以巇不隙其末誓當忘言以對玉雪芍藥𢎞治衢州府志常山縣出石南本草綱目葉似䒽草凌冬不凋江山以南者葉長大如枇杷葉無氣味草犀本草拾遺生衢婺間苗髙二三尺獨莖生水中者名水犀枳殻西安縣志枳殻枳實此二種即橘之未成者春夏取之向入嵗辦橘樹遭凍以來往往缺少山茨菰天啟衢州府志出開化入藥最良何首烏衢州府志舊志云龜山産佳槩言山之似龜者耳今耑指府治龜峰非也龍腦葉衢州府志山中有之與薄荷性不同借用者誤鍾乳花𢎞治衢州府志常山縣碧玉洞有鍾乳其乳下積如壇有花若雕題紫荷車衢州府志一名金絲重樓土人稱七葉一枝花常山草果舊浙江通志去老痰積飲為治瘧要藥倒生藤名勝志開化縣錢王祖墓上至今倒生藤蔓根皆下垂靈草萬厯龍游縣志野狐墩昔有異人採藥於此相傳其上舊産靈草紫草萬厯常山縣志山産紫草可以染燭馬鞭草萬厯常山縣志草之𩔖有馬鞭草三白草金精草龍鬚草太平寰宇記龍游縣龍丘山生白鷴萬厯常山縣志禽有白鷴鴛鴦萬厯常山縣志水禽有鴛鴦鹿萬厯常山縣志山産雖有難致故祭恒以羊代熊衢州府志深山中間有之有人熊猪熊犬熊竹䶉西安縣志即竹豚肥美稱邑中方物之勝石巖魚𢎞治衢州府志西安縣塘臺山大乗寺有池深不可測中有石巖魚絶大金鯉萬厯常山縣志紅色者謂之金鯉白鯿西安縣志此種魚向來西邑所産惟龍游間一有之今嵗或亦數見信乎地氣之自北而南也石輪魚龍游縣志鱗介之品與他邑同惟山中産石輪魚味稍勝然亦不可多得西安縣志又名石鱗魚深山中有之極肥美方物之佳品也衢州府志形似蛙而大可療疳疾白鰕名勝志開化有白鰕池宋趙抃鎮蜀以白鰕遺余仁合仁合放之池其後生息不絶有他蓄者鰕色輒變遇旱水涸絶而復有野蜂萬厯常山縣志蜜巖半崖其石下窪多野蜂刮蜜紬常山縣志絲粗而寡間有織為開化紬鵞毛素者麻布常山縣志績青麻為之若黃麻只可絞索紙常山縣志大小厚薄名色甚衆曰厯日紙贓罰紙科舉紙册紙三色紙大紗窗大白榜大中夾又曰十九色紙白榜白中夾大開化小開化白綿連三結實連三白連七白綿連四結實連四竹連七竹奏本白楮皮小綿紙毛邊中夾白呈文青奏本又間一用之曰玉版紙簾大料細尤難抄造他若客商所用各隨販賣處所宜名色不可枚舉凡江南河南等處贓罰及湖廣福建大𣲖官紙俱來本縣買納衢州府志藤紙綿紙竹紙三種並皆細品菽園雜記衢之常山開化等縣以造紙為業其法採楮皮蒸過石灰浸三宿揉去灰又浸水七日舂爛漂入胡桃藤等藤以竹簾承之俟其凝結掀置磚板以火乾之燒紙萬厯龍游縣志貨品中惟多燒紙勝於别縣西安縣志邑之紙以草雜竹絲為之色黃粗糙止供楮幣及包裹之用不中書也出南北山上方上輪源諸處松煙墨經古用松煙墨衢州柯山皆産松之所柯山品下癸辛雜識三衢葉茂實造軟煙法近水作暖閣髙足其上以紙􅇁地為悵髙七八尺於閣下用碗數十貯油炷燈閉之宻室油氣透頂與他煤絶異膠法甚竒中用紫礦當歸秦芃腦麝畫燕支没石子之𩔖盖取其活膠而不滿也故經久而色光不少渝金星硯萬厯常山縣志硯山出金星石可為硯四方人多貿易玉帶硯常山縣志有紫石有黑石紫石中有白一條其名曰紫袍玉帶頗貴重然不可得矣草席常山縣志邑産草席棕薦常山縣志邑産棕薦及棕套竹器萬厯龍游縣志南山多猫竹土人用以製器茶籠雞肋編開化山僻人魯而製茶籠鐵鎖亦佳鎖常山縣志銅鎖鐵鎖本邑製造凉靸常山縣志土人用棕或席草製漆西安縣志出南山湖南嶺頭諸處常山縣志十九都有之黃蠟柿漆龍游縣志貨之品有黃蠟柿漆蠟燭常山縣志邑産白蠟造為燭堅凝可當風銅天啟衢州府志銅山在西安縣西舊經云是山出銅常山縣志礦出銅山礦坑盖跨西遂徳常四縣之境先年開礦者礦百觔煎銀三十兩或二十兩後止四五兩脉且盡矣其煎取之法有明爐而又有罐爐作用亦自不同西安縣志銅山在縣西北百里宋時出銅鉛錫今出礦前此徽處二州人羣聚取礦推官劉起宗逐散迄己未春復聚至萬數構廬成市猖獗甚守楊凖患之與同知薛應元通判張澤推官任秀謀議協一具請於監司可之乃調所屬五邑兵閲於教塲凡七日先期移檄諭以干犯禁令散歸從事本業去者不追遣官守衛通衢開其歸路地方毋得乗機殺奪時有感悟而散者中宵火其廬死者千數公甚矜之其頑梗拒命者出師絶其油糧分道進礦徒畏懼修詞服罪潰散不遺一矢旬日班師其後礦徒復聚又行委西安縣知縣俞大有集兵逐散之大抵利之所在民争趋之散而復合理之必然若非防維芟薙處置得宜鮮不至於蔓延滋害流毒地方司民牧者其尚加之意云邑令陳鵬年銅山辨按此山即今所謂銀坑是也銅山則别有一源本名桐山亦非銅也其音地之所以訛者意由初開礦日淘沙挖礦之徒恐干禁網假此名以欺飾觀聽耳明時自世宗至神宗礦厰幾遍天下銀坑盗起蹂躪數邑而西安被害尤甚相傳戚大將軍親率兵定之因於衢州設兵備道置守戍兵千人衢之有兵自礦盗始自萬厯三十二年詔停採礦大吏檄行於銀坑四路皆立碑永禁設防禦甚嚴今諸碑具在夫開採之害其起自公家者則中貴人主之爐頭僉役嗾之因以恣睢暴虐延害生民固已若乃不𨽻公家而私自採取則主之者必地方之巨奸附之者皆異鄉之匪𩔖其為禍更有不可勝言者何則所謂奸民匪𩔖者率皆窮困不能自振之徒竭其智巧機詐無所得財徒欲儌倖於此而甘心焉其心固已不可測矣而父老皆言此礦年久隧道阻塞礦脉細㣲尚不足以充税額一旦舉事而工費不繼心力不一有所得則必争無所得則必散此輩皆一時烏合無能統領而控馭之者争則非刑法之所能平散則非芟薙之所能盡以致蔓延潰決醸為大患若僅作奸以蹈法負税以累官又直其害之㣲焉者也花石名勝志常山縣金川溪中花石如疊常山石宣和石譜常山縣思溪又地名石洪或云崆石出水底側垂如鐘乳雜沙泥不相聮接採人車戽深水甚難得之或大或小不踰數尺竒巧萬狀多是全質一石則有聮續尖銑十數峰髙下峭拔嵌空全若大山氣勢亦有如拳大者有於巉巖嶮怪巖竇中出石筍或欹斜纎細互相撑柱之勢盖石生溪中為風水衝激融結而成竒巧又有峰巒聳秀洞穴委曲相通底坐透空勘施香燼若煙雲縈遶亂峰間一種色深青石理如刷絲捫之輒隐手又一種青而滑或以磁末刷治而然率皆温潤扣之有聲間有質樸全無巧勢此石性稍礦不容人為非靈壁可增嶮怪開化石宣和石譜開化縣龍山深土中出石磊塊或巉巖可觀色稍燥扣之有聲又地鼈灘亦多産石水中色稍青潤石質骨麄而肉細率皆全質間有羣峰前後羅列若大山氣勢比之思溪無崷崪勢扣之亦有聲錦川石萬厯常山縣志石形如山條分縷析各成拱把或三四尺有至一二丈者膚紋粲然有若錦繡詹濤錦川石詩條條石筍短長眠脉絡分明痩且堅人力不須施巧􅅣天工自爾闘鮮妍四圍看似身穿錦三品齊如字冩川誰道古根移不動也應逺索置平泉煤西安縣志明時人家皆用炊㸑今人不復採鬻民間亦不復用然西山南山皆有之土炭西安縣志九仙巖有屋空架石上屋下細土以旋風摶捖皆成毬破之中有細炭可以療疾嚴州府穀嚴陵志秔有早稻晩稻紅稻白稻糯有秋糯晩糯粟有秔粟糯粟麥有大麥小麥蕎麥麻有黃麻白麻豆有黃豆緑豆青豆黑豆蠶豆桐廬縣志洋洲周回十五里其陸地宜麻粟菽麥麵方回次韻張耕道詩麵灘船欲澁茗務井還深自注睦有近城灘民以船載磨治麵城中茶塲大井汲者衆故有麵灘船茗務井之句豆桐廬縣志豆有田豆佛豆虎爪虎斑猫兒蜂兒諸名品不一羊角豆方回治圃雜詩豆莢惡肥田自注羊角諸豆必瘦地乃結烏稗嚴陵志建徳縣黃饒村産烏稗絶佳甲於州境烏麻嘉靖淳安縣志其子名巨勝更有黃白黑三種蔊菜嘉靖浙江通志嚴州蔊菜俗名山芥菜齊民要術蔊菜味辛蔓菁萬厯遂安縣志花果山古有僧化身於此居者不種蔬但焚其地而鋤之蔓菁之𩔖自出茄方回治圃雜詩茄藤宜硬地自注茄須於硬地穴以種緑葱根海瑞濟饑草木氣臭須換水浸洗七十二次不然有毒松花蕊海瑞濟饑草木松花時取其蕊用飲湯調食經久不饑和米麥麵蒸食亦可濟饑蕨粉海瑞濟饑草木蕨根洗浄搗碎用水澄粉自九月至三月粉多四月初抽青粉少兼食嫩莖可濟饑葛粉海瑞濟饑草木搗碎用水洗出澄粉其味勝蕨檡子海瑞濟饑草木曬乾去殻成粉作腐劄扭根海瑞濟饑草木曬乾搗碎成粉煮食可濟饑野苧根海瑞濟饑草木去皮搗碎成粉可濟饑苦株子海瑞濟饑草木可炒食作腐味佳仙遺粉海瑞濟饑草木俗名冷飯塊煮成粉可食榔樹根海瑞濟饑草木其皮根熏燥研末成餅可食山苦藚海瑞濟饑草木山苦藚及苦益菜皆可食布谷柴子海瑞濟饑草木舂成餅煮粥老鴉饅頭海瑞濟饑草木搗碎和水用絹濾汁成腐菉筍桐廬縣志明代嵗辦菉筍桐太平寰宇記桐溪有大猗桐樹垂條偃盖蔭蔽數畝逺望似廬嚴州府志淳安縣桐橋側舊有大桐木故以名橋柳𢎞治嚴州府志朱暟知府事富春驛舊路夾植以柳相望數里梓萬厯嚴州府志遂安雲濛山與梓樹塢相屬楓萬厯嚴州府志建徳縣楓樹嶺上多楓夀昌縣萬松山松楓蒼翠掩映通逵空心木名勝志淳安縣仙居洞其近山木多空心石榴桐廬縣志出孝仁水濵二鄉實甚大舊貢天順中寒甚樹多枯者自此免貢金鈴嘉靖淳安縣志苦楝子名蜜栗子物𩔖相感志出青溪山中形如蜯内有金星外堅如栗色亦如之可食味甘能制五金橘梅堯臣送余少卿知睦州詩種橘收包小雪前仙橘花史嚴州府城南有橘山陰峻不易登上有羅浮橘一株熟時風飄墮地得者傳為仙橘蔗萬厯嚴州府志淳安縣蔗山昔人於此種蔗􅎆粟方回治圃雜詩花有如􅎆粟能同橘不遷自注􅎆粟移即不活桂萬厯嚴州府志淳安縣百桂峰綿亘雄峙香桂叢生環水王氏世居焉萬厯夀昌縣志平巖石上桂樹壁立秋香逺播巨勝葉養䝉題過浴洞詩羣羊吃盡巨勝花不遇初平化為石洞在夀昌縣過浴山鷺鷥菊百菊集譜嚴州多菊此品最貴花如茸毛純白色中心有一叢簇起如鷺鷥頭雙竹新定續志淳安縣雙玉里以里産雙竹因名越王竹北尸録嚴州産狀若荻枝髙尺餘可代酒籌箬嚴陵志閬仙洞産箬即郭文採箬之處鳩坑茶埤雅早取曰茶晩取曰茗又名曰粣有睦州之鳩坑嚴陵志淳安縣鳩坑産茶以鳩坑源水蒸之香味加倍茶經載桐君藥録謂西楊武昌廬江晉陵好茗而不及桐廬又謂凡可飲之物茗取其葉天門冬取子菝葜取根而羽叙茶所出謂浙西以湖州上常州次睦州下生桐廬山谷與衡州同按唐志睦州貢鳩坑茶屬今淳安縣宋朝既罷貢後茶亦不甚稱范仲淹鳩坑茶詩瀟灑桐廬郡春山半是茶輕雷何好事驚起雨前芽分水茶六研齋筆記分水縣天尊巖産茶最芳辣宋時以充貢紫桃軒雜綴分水貢茶出本不多大葉老根潑之不動入水煎成翻有竒味芽茶桐廬縣志明貢芽茶酒六研齋筆記桐廬酒味清美名灑落泉乃嚴瀨水所釀釀泉酒新定續志郡城軍門内曰釀泉今連筒入公庫資嵗釀刺虎圖經本草生睦州凌冬不凋采根葉枝入藥味甘治一切腫痛風疾草龍膽嘉靖浙江通志嚴州草龍膽性苦似膽石乳嚴陵志淳安縣洞深可數里泉溜凝結如乳又桐廬縣閬仙洞石乳滴溜不竭蓮花乳萬厯嚴州府志分水縣揚山洞崖上乳滴如羅漢像如蓮花乳香建徳縣志乳香巖相傳有乳香下垂故名白石英元和郡縣志遂安縣白石山出白石英杜若建徳圖經嚴陵山水稱號率有經據如杜若汀洲見於杜紫薇詩杜若芳洲翠子規汪廣洋過三百六十灘詩催歸不待臨岐語夜夜子規啼到明翠鵲名勝志桐廬縣綰仙洞内有翠鵲畫眉張翥浮山道中詩一溪春水浮黃頰滿樹暄風呌畫眉碧鷄嚴陵志桐廬縣垂雲洞有禽曰碧鷄其大如鵲色如翡翠聲如吹笙仰石以棲每嵗一至哺雛而去黃裳碧鷄詩翠碧笙簧與羽聲有時離合不留情清多本是仙家物長向秋風獨自鳴鴉舅胡宿釣臺詩五更鴉舅最先啼烏雌桐廬縣志舊額貢野味有烏雌雨燕名勝志夀昌縣岑山之北為燕山每遇亢旱羣燕翔集即雨羊嚴陵志趙抃知睦州睦地多羊嵗為杭市抃為文却之仙鼠徐誼洞巖寺靈栖泉詩洞中仙鼠大如鵶黃魚嚴陵志桐廬縣九里臨大江居民駕巨舟泛海捕黃魚至一月二三次往杭貨賣其時鮮號曰小杭州鱸魚李郢過桐廬詩鱸魚鮮美稱蓴羮許渾釣臺詩嚴陵臺下桐江水解釣鱸魚有幾人赤耍魚舒岳祥溪魚詩注此魚俗名赤耍日間見人則驚奔深入石下至夜則駢首沙際人以火照投刀中之即可掩漉也桐廬縣志溪有赤耍魚神魚萬厯嚴州府志遂安靈巖山深潭百丈中有神魚出没金色鯉分水縣志邑東龍潭中有金色鯉魚魚鮓李頻過魏䭾山詩石斑魚鮓香衝鼻山在夀昌縣西魚苗避暑録話浙東嚴灘溪大峻急多灘石魚隨水觸石皆死故有溪無魚土人率以陂塘養魚乗春魚初生時取種於江外長不過半寸以木桶置水中細切草為食謂之魚苗投於陂塘不三年長可盈尺但水不廣魚勞而瘠不能如江湖間美也山蠶李旻嚴州府修路記土不産米民僅以山蠶而入帛較之浙右諸郡其等為最下蟾蠩嚴陵志桐廬縣垂雲洞中有大蟾蠩夜寂月明則出蛙萬厯嚴州府志桐廬學宫前舊有蛙聲有異人朱書符篆於瓦投池中竟不産蛙地傍四靣則蛙聲聒耳矣野蜂名勝志淳安縣仙居洞石隙中多野蜂往往出蜜𢎞治嚴州府志夀昌縣蜜山怪石崔巍中有石窟蜜蜂居之絹方回建徳府節要圖經序皇祐間嵗為婺州輸絹三萬六千匹婺嵗歸本郡米一萬五千石户部督絹本郡以上征下嵗無虧額本郡督婺州米列郡勢相侔負固不償而郡愈不可為矣嚴陵志景定二年户部申照得嚴州代婺州解絹以充上供婺州外撥米還嚴州充軍糧其來非一日矣邇年兩郡互有申請其曲不在嚴而在婺盖嚴代婺解絹乃承户部拘催不可稽違婺還嚴之米既無統攝率是違次甚至開慶年間尚欠二萬餘石宜乎嚴之有請於朝欲將代解之絹從本州折價糴米徑令婺自解絹凖省札行下許令嚴州於代解絹内截留一半計一萬八千疋自市米以充軍食仍以一半絹解赴户部亦令婺州解絹一萬八千疋補足户部元額却與免撥米還嚴州自景定元年始續婺州乞解絹解米各仍舊貫本部又以節次備申續凖行下若婺州欲仍舊貫今項預辦一年之米一萬五千石發還嚴州方可從申續又據婺州申巳樁到米一萬石還嚴州今嚴州又申每嵗差撥人船取米每被坐困乞照近降指揮監婺州解絹容本州自措辦軍糧及謂婺州所報見有米一萬石以待本州取發者平時率是虚紿以脱本州先次解絹本部令與酌可行之説為悠久之計嚴州解本部之絹不患其不足婺州還嚴州之米欲催嚴州之絹當先催婺州之米州郡一也體統一也豈可謂本部可催嚴州之絹而不為嚴州催婺州之米乎况嚴州申請不已者止以婺州之米不還米茍還矣其將何辭所有景定元年互撥米絹嚴州已將合解一半之絹折價糴米以充軍糧况隔一載難於再理當令婺州將合還嚴州景定元年米一萬八千石每石照司農寺折價解部買絹補還元額専官前征守待起發所有景定二年以後年分其婺州還米一萬五千石嚴州解絹一萬八千疋各分作三綱須管婺州先自起發本色米斛至嚴州交管同嚴州絹綱申發赴部第一綱十一月下旬第二綱十二月下旬第三綱次年正月下旬婺米之交管嚴絹之起綱定在如期同時到部仍委各州僉判任責自今後各郡僉判批考及離任須管具本年各處發米發絹數目月日申部㸃對乞劄下嚴婺兩郡遵守施行候指揮照得嚴婺州兩易絹米昨降指揮已自平允今兩郡折申不已區畫悠久之説來上理亦可行仍令各郡正任通判任責催發不許違戾交梭布太平寰宇記睦州産苧布嚴陵志舊貢竹簟十領南渡後貢白苧布十疋以折簟絲綿萬厯桐廬縣志田多瘠薄其地宜桑而産絲綿厯日紙桐廬縣志明代嵗辦厯日紙黃白二色墨煤草紙桐廬縣志貨産墨煤草紙筆萬厯嚴州府志皇甫松大隐賦云書抽虎僕博物志載有獸縁木文似豹名虎僕毛可以為筆今土人名九節狸試之甚佳木竹杖避暑録話淳安木竹杖六節宻而内實畧如天壇藤間有突起如鶴􅂰者非峭勁敵風霜不能爾也槐花萬厯桐廬縣志宋時辦顔料槐花烏梅梔子黃漆明一統志淳安遂安夀昌三縣出漆本草綱目浙東出一種漆樹似小榎而大六月取汁漆物黃澤如金即唐書所謂黃漆也桐油明一統志淳安夀昌二縣出桐油白蠟萬厯嚴州府志睦地産白蠟最行逺本草綱目呉越東南諸郡皆有之蠟樹枝葉狀𩔖冬青四時不凋五月開白花成叢結實纍纍其蟲大如蟣蝨芒種後延縁樹枝食汁吐涎粘於嫩莖化為白脂乃結成蠟狀如凝霜處暑後則剥取謂之蠟渣若過白露即粘住難剖矣其渣煉化濾浄或甑中蒸化􅄋下器中待凝成塊即為蠟也銅晏公𩔖要睦州有銅官山唐時於此置官採銅嚴陵志建徳遂安縣皆産銅何夢桂建徳路罷金課記元跨有東南初𣙜金課盖履山澤之所産而斸取焉睦為古揚州分荆揚貢金在禹貢不廢睦萬岫千峰二江十八瀨意亦璗鏐鈑銑之所生也然考古圖志金非其土産如瑶琨齒貝皆産於揚而睦亡是睦為州最僻陋其土産之數固亦不得與他壌齒考秦漢而下冶山鑄海之利載之史志然自銅錫鉛鐵之外無聞焉唐有陜西暨宣潤等州嵗銀而已近代固常徴陜與宣饒歙撫南安諸州金尋亦中廢試數其地其𨽻於揚者惟饒歙撫南安四州耳而睦不與數兹豈天産而地蔵之睦固不能化無以為有也至元己丑始籍六邑民為金户民剏見且駭方俛首就事官授之方督具器物使之披砂抉石而汰焉民喜殆謂天雨之也初嵗租給再嵗而虧三嵗而竭其故何哉盖睦居歙下流春夏潦漲歙之江濆揚濤吹沙澎湃而下故金之瑣屑如糠粃者遇洄汨而伏焉為洲矗焉為嶼民日爬擿於此所得盖錙銖而已抑不知幾千百年之所積猶不能以供旦夕之所採取欲久而弗窮得乎况逺鄉下邑距江逾絶民棄家輟業裹糧以從畚鍤未至而力已困其所司又重之以掊剋搥剝羈紲笞捶故上下二三年間貧户不足於償而逮及隣比親姻者比比也郡侯為民疾苦無所於愬上之江浙等處行尚書省省聞於朝省官阿喇卜丹平章入覲條奏金課特罷建徳一路今年二月㫖下省檄諸管民官詳究奉行本府總管朝列管侯承命與府長貳率其屬進其民而告之曰是公朝之至恩而省府公之嘉惠也民父老感激歡舞則又曰㣲我侯不及此今而後得釋此以耕鑿飲食作息而免於患者徳至厚也願鑱石以誌不朽雖然兹固幸吾一路之私也天地生物止有此數窮人力以取之木有不受其弊者世有觀民風者推而放之以幸東南庶乎其可謹按嚴州郡邑諸志俱不詳物産僅列一目而已兹博徴羣書兼採篇什以見一物雖㣲皆切民用而徴絹罷金二事尤闗政事之大者故加詳焉鐵新定續志建徳縣五山共一源曰金山相傳石上有金牛足趾曰銀山銅山綠山鐵山皆以地所産得名宋惟鐵山尚資冶課餘皆礦竭坑存錦石嚴陵志淳安縣錦沙村林木森聳波流澄澈映石如錦寰宇記云錦石舒文雲麓漫抄自浙江東南溪行溪水淺澀湍急深五七寸碎石作底小者如彈大者不過盆椀齒齒無數五色可愛青碧石萬厯嚴州府志淳安縣龜鶴二山兩峯相值其山昔産青碧堅石薪方回建徳府節要圖經序物産之宜萬山叢蔽山居八田居二往往樵薪為生萬厯遂安縣志五都民無重資而負薪為業炭桐廬縣志白雲源林麓茂盛鄉民採薪為炭數州烝㸑之用皆取給焉老學菴筆記髙宗詔嚴州進炭止用土産不用琴様胡桃文鵓鴿青浙江通志卷一百六
