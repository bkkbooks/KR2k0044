body:
  text: 浙江通志卷十山川二杭州府下海寧縣花山嘉靖海寧縣志在縣治東五十里高十五丈周回一里菩提山名勝志在縣東六十里晉干寳捨宅為菩提寺故名黄山萬厯杭州府志在縣治東五十二里高六十丈周回七里上有靈泉井錢山名勝志去菩提山東里許蜀山咸淳臨安志在縣西南二十七里隋書地里志餘杭郡鹽官縣有蜀山管山成化杭州府志在縣東六十里高四丈周回半里箬帽山成化杭州府志在縣東六十里高五丈周回半里白鶴山成化杭州府志在縣東六十里高十二丈周回二里近烏龍井葛嶺山成化杭州府志在縣東六十里高四十丈周回四里黄灣山萬厯杭州府志在青陽山西一里高八十九丈周回九里赭山成化杭州府志在縣西南四十五里高七十五丈周三里二百歩其山西南仁和縣界與紹興龕山相對是為海門袁花山咸淳臨安志在縣東六十里嘉靖海寧縣志即妙果之尾因鑿斷名曰龍尾妙果山萬厯杭州府志在縣治東六十里高二十丈周回七里贊山萬厯杭州府志在縣治東北六十里高五丈周回二里深潭奥渫俗稱錢王磨劍之池紫微山咸淳臨安志在縣東北六十里峽川志西山一名紫微山石刻紫微山三字宋右班殿直監澉浦税樊世卿書成化杭州府志硤石山即紫微山也兩山相峙中通河流因名峽石山上有寺山脚連東峯有磨劍池萬厯杭州府志山高三十丈周回一里唐中書舍人白居易登此山望硤石湖中書本紫微省因名章孝標題紫微山上方詩地勢連滄海山名號紫微景閑僧坐久路僻客來稀峽影雲相照河流石自圍聲喧都不到安得此忘歸貝瓊游紫微山詩金利藤蘿外通人一徑微天風鐵鳯語海雨墨龍飛水落仙翁井雲披玉女衣東樓曽玩月夜挾彩鸞歸高啓過硤石詩青山夾長溪溪上有漁市社門閉落日野氣白於水虎行車跡外鳥起鐘聲裏吳語問居人到州還幾里沈山一名審山咸淳臨安志在縣東北六十里高五十三丈周七里二百歩至元嘉禾志舊經云宋臨海南陽二郡太守沈景𦵏於此因名唐屬蘇州海鹽縣昭宗大順中割歸杭州今沈山即鹽官縣硤石鎭之東山峽川志東山一名審山高一百五十丈杭郡志謂漢辟陽侯審食其𦵏此海鹽志謂上有宋臨海南陽二郡太守沈景墓故名俗誤沈為審也張憬登審山詩東山危磴杖藜行霜落天高秋氣清風度曙鐘諸刹近雲開旭日兩峯晴葛洪井上烟霞古顧况臺前草樹平登眺不須傷往事故鄉回首獨含情尖山成化杭州府志在縣治東六十里高九十九丈周回一十里瀕海青陽山成化杭州府志在縣治東六十五里高十九丈周回三里金牛山咸淳臨安志在縣治東高三百丈周回十九里山側有洞深不可測宋建炎初居民避難多藏此太平寰宇記昔吳越間有金牛自毘陵奔此而没因名談家山成化杭州府志在縣治東南七十里高二十丈周回三里烏龍山萬厯杭州府志去談家山東二里高六十丈周回二里壁立昂起若翺若翔上有烏龍井大旱不竭祈禱輒應宋有勅賜烏龍廟石棋山萬厯杭州府志在縣治東北六十五里高四十五丈周回四里葛㠗山萬厯杭州府志在縣西南四十三里高六丈周回三里盤山萬厯杭州府志在葛㠗南八里高七丈周回二里禪機山成化杭州府志去縣西南四十五里高五丈周回五里文堂山成化杭州府志去縣西南四十五里周半里雷山萬厯杭州府志在縣治西南四十三里高七丈周回一里奔潮盪激漸徙入海山形圓小翠鬱可嘉巖門山萬厯杭州府志在縣治西南四十七里高九十九丈周回五里穹窿峭㧞號為主山望夫山嘉靖海寧縣志高七十五丈東抵海鹽縣界周回四里其山即廟山脚在海門廟山嘉靖海寧縣志在縣東南六十八里東至海鹽縣界上有臯蘇二將軍廟宋勅寧祐茗山名勝志在縣西北四十里高十丈周回二里六十歩赤土嶺成化杭州府志在縣東六十里長一里二百歩東南接靈泉井西連黄山脚紫㣲山洞杭州府志在紫微山後深一丈一尺闊四尺馬自然煉丹之所世稱為神仙洞硤石湖硤川志亦稱硤川在縣東北六十里廣三十二丈成化杭州府志其源自茶湖南通麻涇港迤西南流入於洛塘河東逹海鹽縣界黄道湖建興湖成化杭州府志在縣西北二十五里東西十里南北六里深五尺吳建興中開因名高湖海寧縣志在縣東北十七里東西二十八里南北一里三歩放生池杭州府志在縣北一里舊在延恩院東南二百五歩宋慶元四年令施枱改鑿於此白洋池萬厯杭州府志在縣西北二十五里周回五十五丈八尺發源新邱塘靈池萬厯杭州府志在硤石鎭審山上水旱不盈涸烏龍井萬厯杭州府志在縣東七十里濶四尺深四尺冬夏不竭宋邑令胡堅常恕元州判申繼賢皆以旱禱獲雨石井海寧縣志在縣西北十二里徐寛石井記馬自然竒跡不一今故宅莽為荒墟遺井尚在黄灣浦海寧縣志在縣東六十里百尺浦名勝志在縣西四十里輿地志云昔越王起百尺樓望海因名海成化杭州府志在縣治南十里西接浙江潮汐往來坍漲不一今在縣治南半里富陽縣觀山太平寰宇記一名石頭山山有觀濤所咸淳臨安志在縣治東百餘歩一峯高聳横截大江孫氏嘗於山頂建道觀因名又號石頭山縣東以水口蕩滉無際此山為青龍襟抱環合邑賴以立赤松山咸淳臨安志在縣東九里高一百五十丈周回四十里一百歩形孤圓望之如華蓋又名華蓋山一名赤亭山太平寰宇記赤亭山嚴陵釣於此有臺基存謝靈運詩云定山緬雲霧赤亭無淹泊一名雞籠山隋書地理志餘杭郡富陽縣有雞籠山晏公類要赤松子駕鶴時停此山吳鼻山咸淳臨安志在縣東五里山峭峻下瞰大江路狹而險乾道中邑令陸楠鑿路欄石以䕶往來者人以為便寳慶乙酉令趙汝捍易為石壁姥岑山成化杭州府志在縣北二十五里山腹有水沼赤萍生其中山下有廟俗號為姥岑王禱雨必應靈巖山咸淳臨安志一名湖南山在縣南三十里山下有仁惠龍王廟先有僧曇超居杭之靈苑山有龍化為老人詣曇超曰鄉民耕山逼我居室羣龍怒閉膏雨以害稼吾不忍民之苦聞師道行必能化伏諸龍師允其請至觀山結壇戒衆浮舟誦經雨大霑足羣龍復請師居湖南靈巖山峻不能陟龍化白馬載師以登至今石上馬跡尚存巖下有池歲旱禱之則雨賜號靈悟大師而龍以仁惠為額貝山咸淳臨安志在惠愛村去縣西三十里西屬新城界山頂有湖紫微山萬厯杭州府志在縣西五十里其山崛起東浸大江陽平山一名陽城山萬厯杭州府志在縣南十五里後漢孫鍾種瓜其上有異兆鍾卒子堅因𦵏鍾於此常有紫雲蔓延數十里太平御覽董監吳地記富春有陽城山孫氏所葬漢末上有光如雲氣屬天亭山咸淳臨安志在縣南十八里高二百餘丈廣一百五十里晉處士孫文度建亭於此因名小隱山成化杭州府志在縣北一里三十歩為縣治主山宋陽夏公謝絳遷居於此樟巖山咸淳臨安志在縣北五里高出衆峰巖有大樟故名又曰横山世傳赤松子煉丹之所申屠霆樟巖山詩忙底抽身向此遊古樟深徑鎖清幽芝田曉澗潮痕入藥洞春香雨氣浮山揭翠屛舒道眼水鏘瑶瑟應龍湫何時卜宅棲巖下分取青山老一邱白龍山名勝志在縣北二十里山勢如屏西巖山咸淳臨安志在縣北三十里巖下有洞洞口有沼與江潮相應石上有葛仙翁足跡煉丹鼎山下有石扣之鏘然人號石鼓靈峰山萬厯杭州府志在縣東南四十里高出衆峰絶頂平衍有田數畝源泉不竭世傳有宣氏兄弟三人耕山得泗州石佛結菴以奉至今尚存嵗旱禱雨即應因號靈峰楊維楨秋日遊靈峰山詩雲峰何崔巍絶頂有故刹我來試登高石路隂且滑時維八月秋西風轉蕭颯溪深水迂廻雲淨竹周匝行行過短橋峭壁直如削况乃鳥道㣲孤猿度猶狹枯松枝新摧亂石勢將塌古碑已無字空遺緑苔壓對此神氣清力行不知乏中有瀑布泉兩山競相夾樵子日負薪野人時採藥路逢麻姑仙餽我飯一勺遥聞鐘磬聲深林起鏜鎝老僧習禪定口念摩訶薩日暮肯留予為下陳蕃榻烹茶飯疏食喜遂浮生樂夜深月色寒露逼征衣薄起來振長嘯闐然天籟發明朝輒下山芒鞋著雙脚何當駕青鸞乗風入寥廓鹿山咸淳臨安志在縣西南五里其狀如鹿因名世傳有羣龍居之興水旱以為民患因靈悟大師講經其患乃息俗謂之降龍山湖洑山元和郡縣志在縣西南五十里甚幽䆳險逺咸淳臨安志高三百丈廣一百三十五里上有石樓石城侯景之亂里人姓陸者率鄉隣保固之全活萬計錦明山成化杭州府志在縣西南五十里善政村高二十餘丈周回二里其山抵錦溪溪水摇光滉漾石壁如錦繡文因名屠山咸淳臨安志在縣西南五十餘里高三百丈陳剛中屠山記屠山之勝峰巒重疊端若拱揖應接不暇湍水怪石神刻鬼劃千巧萬狀中有平田如設萬席此申屠剛違新室之禍申屠蟠晦黨錮之名避地結廬於今千載子孫家焉泉山富陽縣志在縣東南二十里江隂村山觜一石嵯峨如角下有泉源篠嶺萬厯杭州府志在白昇村去縣二十五里通餘杭縣草鞋嶺杭州府志在惠愛村去縣三十里通新城縣漁嶺萬厯杭州府志在靈峰去縣四十里界蕭山縣鵲嶺萬厯杭州府志在大源去縣四十里通諸暨縣青草嶺萬厯杭州府志在善政村去縣五十里通桐廬縣金沙嶺杭州府志在棲鶴村去縣九十里通浦江縣黄花洞貝瓊鶴山親舍詩序棲鶴村地有黄花洞世傳黄石公所居有石牀尚在每風雨輒聞兵甲聲富春江萬厯杭州府志自桐廬經富春入錢塘昔桑欽水經謂浙江之源西自嚴灘東通海道謝靈運富春渚詩宵濟漁浦潭旦及富春郭定山􅃡雲霧赤亭無淹泊遡流觸驚急臨圻阻參錯亮乏伯昏力險過吕梁壑洊止宜便習兼山貴止托平生協幽期淪躓困微弱久露干禄請始果逺游諾宿心漸申寫萬事但零落懐抱既昭曠外物徒龍蠖喻坦之晚泊富春寄友人詩江鐘寒夕微江鳥望巢飛木落山城出潮生海棹歸獨吟霜島月誰寄雪天衣此别三千里關西信更稀楊維楨富春夜泊寄張伯雨詩春江大汎潮水長布㠶一日上桐廬客星門巷赤松底野市江郊淨雪初柱宿雞籠山頂鶴斗量鮆網壩頭魚來青小閣在林表故人張燈修夜書龔鼎孳富春渚和謝靈運韻詩檣烏正輕飇漸指桐君郭夕暉澹杉崖歸烟散蘭薄觸石鮮幽阻挂席快交錯豈期途百折坦然雲一壑當時棲隱人采山諧雅託􅃡邈景喬柯中奮蔦蘿弱理釣慚遲暮脱屣踐宿諾風塵有磷緇寸心詎摇落將偕海上鷗永固泥中蠖陽陂湖唐書地理志富陽北十四里貞觀十二年令郝砆開萬厯杭州府志在臨湖村周回十六里詳見水利湧泉湖萬厯杭州府志在惠愛橋闊二十丈長四百丈詳見水利小謝湖杭州府志在縣南二十里大江之陰詳見水利錦溪萬厯杭州府志在縣南五十里舊名善政溪其水澄深滉漾遇風清月明波紋若錦故名詳見水利莧浦唐書地理志富陽南七十歩有隄登封元年令李濬時築東自海西至於莧浦以捍水患咸淳臨安志在縣西一里闊六十歩東入浙江一名關浦蛇浦成化杭州府志在普惠寺前有溪入江相傳有巨蛇由此而出其地遂曲為浦龜川萬厯杭州府志在縣東觀山前水經注劉敬叔異苑曰孫權時永康縣有人入山遇一大龜即束之以歸龜便言曰游不量時為君所得擔者怪載出欲上吳王夜宿越里纜船於大桑樹宵中樹忽呼龜曰元緒奚事爾也龜曰行不擇日今方見烹雖盡南山之樵不能潰我樹曰諸葛元遜識性淵長必致相困令求如我之徒計將安泊龜曰子明無多辭既至建業權將煮之燒柴萬車龜猶如故諸葛恪曰然以老桑乃熟權使伐桑取