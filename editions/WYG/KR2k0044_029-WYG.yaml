body:
  text: 浙江通志卷三十公署上命官建事必有視事之所用以出治行政非徒為辨等威肅觀聽而已兩浙官盛事繁廨宇制置悉備要必職思其居而後無曠厥守百爾君子尚其夙夜自公以仰副聖朝設官分職之至意其敢以臨民親切之地而傳舎視諸志公署浙江省城總督部院在斯如坊舊為明總兵府國朝康熙七年浙江總督趙廷臣改建為總督部院署二十三年裁併福浙總督駐劄福建署久空閉日就傾圮雍正五年浙江巡撫臣李衞奉㫖特授浙江總督管巡撫事仍駐劄巡撫衙門因額設公署體統攸闗於雍正九年撥備公銀兩委屬員鼎建署之制正中大堂五間上奉御書岳牧之任扁額前為露臺為甬道為儀門題曰文武總憲正南大門三間署額曰總督部院大堂後為川堂為二堂奉懸御書飬素二字又御書秉鉞巖疆四字為額進内為垂華門門内正樓五間左右翼樓各三間東西廂樓亦如之後樓五間耳房各三間周以繚垣環以羣房川堂之東為簽押堂為書㕔為蓮花幕更東為御書碑亭恭貯歴任督臣所奉宸翰勒之貞珉以埀永久前督臣覺羅滿保捐建今拓而新之視昔加崇焉其後為庖湢為稟廥稍南為吏舎為書冊房更南為内廐川堂之西為西花㕔旁置舫齋有池有亭軒檻玲瓏竹木交映而呉山一帶横列於右如錦屛綺幔朝來爽氣近在几席更西為箭㕔較閲屬員騎射儀門東為土地祠大門外為東西轅門為文武官候㕔左右建二石坊一曰威震東南一曰澄清海甸更東有重樓傑峙曰雄鎮樓巡撫都察院在裕民坊内通江橋東嘉靖浙江通志浙江巡撫舊不常設有事則遣大臣巡視或尚書或大理卿或都御史官無定員治無定所嘉靖三十九年太子太保兵部尚書兼都察院右都御史胡宗憲總督浙江兼巡撫以舊清軍察院改建名總督府萬歴杭州府志舊清軍察院嘉靖二十四年巡視都御史朱紈併倉址改建三十五年燬總督胡宗憲重建添設諸司候㕔庶官分署規制始備遂名總督府云錢塘縣志其北有鎮海樓呉越時為朝天門東為鎮東樓錢鏐平董昌為鎮海鎮東軍節度使兼領兩浙此其遺意也東西二坊曰保障江藩曰澄清海甸國朝為巡撫都察院署雍正五年欽奉特㫖授浙江巡撫臣李衞為兵部右侍郎總督浙江等處軍務兼理糧餉管巡撫事尋陞兵部尚書加太子少保節制江南仍駐劄巡撫衙門署之制中為大堂崇奉聖祖仁皇帝御書宣布徳澤推誠遇人寛簡愛民扁額前為露臺為甬道為儀門為大門後為川堂雍正二年御書公勤亷幹四字賜臣李衞從滇南恭賫至浙敬懸正中川堂後為聖祖仁皇帝御書受祜堂中懸御書五福圖又後為内宅門為三堂雍正四年臣李衞母年八十荷䝉御書永錫康寧四字扁額賜懸其上更後為住房為堂樓西為後㕔為内書室舊有集思堂撮蕉亭後樂亭即其址川堂之東為御書樓恭貯歴年奉賜御製詩文詔諭扁額對聮永􅂷世寶又東為誠本堂稍南為自修堂又東為箭㕔雍正十二年以總督銜管巡撫事臣程元章改建書室三楹凡三進以居幕客又川堂之西臣李衞剏建書樓五間上懸御書治洽東南吏民遵表範誠孚中外政教本公清對聯賜臣李衞中庭設花石清供對㕔五間夾以耳廂左為舫齋小樓更西為箭廰校閲屬員騎射題曰武林矍圃皆雍正七年建西南平房十五間為總督吏書冊房又樓房二十六間為巡撫吏書冊房俱有扃鑰其巡鹽書吏則截外官㕔而扃於儀門之内在東南隅儀門外東為土地祠大門外東西為司道府縣官候㕔將領旗牌巡捕各官㕔左右為各胥役班房東為坊曰海晏河清西為坊曰民安物阜通江橋之西復為大坊以表之曰東南節鉞與鎮東樓相映帶云鎮守杭州等處將軍在駐防城内國朝順治五年設鎮守將軍駐防於杭州築滿洲駐防城以民房大者為衙署小者為兵房康熙十三年添設官員衙署皆係地方官捐造大小官共一百三十七員衙署一百三十七所而將軍署外又專設公衙門在八字橋西署之制中為大堂四十四年聖祖仁皇帝賜御書典戎扁額懸奉正中後為二堂上奉御書冠軍二字額大堂之前為露臺為甬道為儀門為大門東西為轅門樹棹楔外有各官候㕔滿洲左翼副都統在輓鼔橋東西轅門鼓亭各一座大門三間進内為儀門為大堂中懸御書福字扁額堂西為書房迤北為住房西轅門外之西南隅為箭道有箭㕔滿洲右翼副都統移駐乍浦詳兵制其署改為南米倉漢軍左翼副都統在花市街署北向東西轅門鼓亭各一座中為大門進内為儀門為大堂東西耳廂為書室堂後為川堂為二堂中懸御書福字扁額後住房九間左右各有廂漢軍右翼副都統在花市街署北向東西轅門鼓亭各一座大門三間門内即大堂堂後為儀門為住房凡二進東西内外各有廂餘皆羣房東北為蔬圃浙江提督學政舊名校士館今移改都司署在布政司西舊浙江通志校士館在八字橋濱河開元宫故址明成化七年建為三學射圃嘉靖三十三年提學副使阮鶚建為館歲科試諸生國朝順治五年環入駐防營内十四年提學道谷應泰即司花園舊址改建在按察司東康熙十七年燬二十一年提學道楊引祚重建二十四年以江浙二省為人文之藪照直𨽻一體差翰林詹事官一員提督學政在校士館考試雍正二年兵部議准將浙江都使司裁汰雍正四年督學彭維新以舊館窄隘席舎無多考試偪塞擁擠將奉裁都司衙門捐修改建校士館萬歴杭州府志浙江都指揮使元為行宣政院明洪武三年置杭州都指揮使即其地建署領衞十六守禦千户所五正徳五年都指揮僉事陳璠建嚴翼堂嘉靖四十四年張東旭建徳星堂為禮賓之所舊浙江通志順治初改為浙江都使司中為觀成堂前為儀門為大門東西兩廨列士子席舎後為川堂為嚴翼堂又後為學使宅榜曰如玉壺冰大門外為棘門為榜廊地居南北之中邇於學宫街衢寛廣庭宇明敞士子雲集咸沐聖世右文之化云巡鹽察院在芝松坊二啚宗陽宫東北兩浙鹽法志明永樂間始差監察御史給事中一員閘支天下鹽課至正統三年歲差御史於兩淮兩浙等運司領勅巡視禁約及督催鹽課因建院署於浙江布政司東在錢塘縣之興仁坊𢎞治十四年監察御史方溢重修嘉靖二十年監察御史唐臣改傳法寺基重建署之制中為大門曰風紀重地為儀門為甬道為露臺為大堂曰太微執法堂後為川堂東為龍門深處為日新堂西為霜臺别署後有樓曰來鶴東為後樂園為一鑑亭迤北為此君亭為我心亭為虚白堂大門外建二坊東曰激揚西曰貞肅國朝雍正三年巡鹽右副都御史謝賜履於來鶴樓之東改建㕔事五楹書室三楹餘俱重加整葺織造府在太平坊嘉靖浙江通志織造府二並在布政司東旗纛廟西左為東府右為西府以中官掌之洪武二年建織染局於斯如坊永樂中因地勢卑溼分撥工料於湧金門建局織造遂以舊名南局此名北局後南局盡廢工料併歸北局江曉織染局碑記局肇於洪武間在城之南隅鳯山門裏朱家橋僻隘不便正統間奏改此地宋為五顯祠元為御史臺基址經始相度建立大門一座正㕔三間東西二庫提調府㕔局官㕔以下共計房屋七十餘間又置圍牆立中門内有房屋百二十餘間分為織羅二作有古井一避火園二𢎞治間葺東至西河街西至運司河街南至藩司牆北至臺後橋河一帶國朝撤中官而掌以内務府官織造御用袍服順治四年督理杭蘇織造工部右侍郎陳有明重修陳有明織造府碑記織造有東西兩府東府為駐劄之地西府則專設機張兩府圯壞過多悉為整理題其㕔事之顔曰天章首煥復於東府自堂簾卧室之側悉置匠作以供織務荒蕪整頓煥然一新繪圖立碑以識久逺康熙四十五年織造孫文成捐修東府預備聖祖仁皇帝南巡駐蹕繪圖勒石焉復於大門之外購買民地開濬城河以達湧金門大門内為儀門為甬道為大堂康熙九年御書敬慎二字額懸正中三十八年又賜鸞鶴情三字扁額後有二堂四十六年御題竹風清聽堂後為宅門為衙堂為内宅門為住房為大庫府之外復有織染總織西府三局年久傾圯雍正八年織造許夢捐貲重葺北新闗户部分司在武林門外江漲橋北嘉靖浙江通志明初差御史監生閘辦課程或户部官監收船鈔未有定制景泰元年差户部主事於蘓杭二府專掌之始建鈔闗於此六年罷主事歲委府官收鈔成化四年併鈔闗罷之七年復鈔闗故俗稱北新闗云杭州府志署之制濱河為前㕔外為坊為闗闗北為委官小署㕔後為儀門中為正堂後為寅賓所堂左為宅宇為書室折北為拱辰樓為亭沼右為庫房吏書房儀門外為土地祠書冊房國朝康熙五十五年停差户部官北闗錢糧交與巡撫監收雍正七年總督管巡撫事臣李衞題准將南北二闗税務交與織造管理南闗工部分司在芝松二啚巡鹽察院之西萬歴杭州府志明改市舶司為之本宋徳壽宫後囿址永樂中命内臣掌海舶互市成化七年設闗抽分木税建署於候潮門外俗稱南闗嘉靖三十六年燬員外李方至重建改令處國朝康熙五十五年停遣工部分司南闗錢糧交與巡撫監收署遂閒曠雍正四年特設浙江觀風整俗使就南新闗督𣙜衙門駐劄重加修整雍正八年停差觀風整俗使仍稱南闗衙門云其制中為氷玉堂前為露臺為甬道為儀門為大門東西為吏舎堂後為川堂為後堂西為使宅又西為靜觀堂舊名梅花㕔扁曰梅石雙清堂之前有活石亭今圮芙蓉石在焉石出土高丈許巖竇玲瓏蒼潤欲滴篆曰鐵雲傳是宋徳壽宫舊物傍􅆆斷碑刻藍瑛所繪古梅一本枝榦如生迤西為耳房為西廂房為書房西南為書㕔儀門外東為土地祠題曰觀梅古社布政使司在清和坊迤西面蛾眉山嘉靖浙江通志宋南渡初為殿司寨尋改安撫司復改祕書省元至元二十六年自揚州遷江淮行省於此并開元宫址廣之改曰江浙等處行中書省至順壬申重修栁貫重修省府記至元二十六年制改江淮行省為江浙行省自淮徙治錢塘統有兩浙江東而以淮東西分隸河南明年始營宋祕書省故地其制視都省稍殺焉後福建省罷全閩八州亦併來屬地蓋益廣山區海聚民伍兵屯奉賦租受要約者衆以數百萬計出號施令風動雷行東南半壁藩維晏然朝廷常選重臣以臨涖之柄任專則其體貌宜特隆位望尊則其禮制宜特異臺門設樹平津開閤所以辨堂亷而示等威者其品式昭昭具矣宰臣若曰吾為天子專制方面權綱攸繫有翼有嚴其命幕僚相時蠧敗完舊飾新無陋無奢中兹度程乃出緡於府徵材於市工用官傭役甪農隙昉自堂庭達於門闥易刓弊為堅良化茸闒為麗密堦墄瑩浄堊艧鮮新觚稜藻井動采交輝表漢廷之黄閣映中天之紫垣百司庶府奔走承命者咸改視易聽以為士大夫之治於其官猶人之修於其身也身修則心正而物正官治則事治而民安徳則視諸其身政則視諸其官一省署之修舉而元僚學問之素藴畢見於斯觀隅知室聞樂知徳信斯言哉至順壬申記萬歴杭州府志至正初燬三年丞相伯勒齊爾布哈復拓其制明洪武九年改今司署永樂十七年火宣徳間左司黄澤重建嘉靖元年左參政顧璘重建紫薇樓於堂後唐龍重建紫􅅔樓記晉太康初置中書省以平章政事省中植紫􅅔華唐開元中改為紫􅅔省元於外道置中書行省我朝改布政司後有堂重之以樓題曰紫􅅔嘉靖元年顧公璘鼎建而紫􅅔之名不易也國朝順治十五年重建大門曰膏澤門前臨百獅池跨以石梁門以内為甬道為儀門為屏門題曰藩屏重地曰岳牧崇瞻北為露臺正中為紫􅅔堂康熙三十六年聖祖仁皇帝賜額曰承流宣化四十二年御書清慎勤三字奉懸正中後為二堂扁曰行中書省仍元時舊額也旁列東西二坊進東為使宅門榜曰紫薇公署進内為二門為大堂題曰靖共正直中奉御書福字額雍正十年賜布政使臣王紘内為宅門為絜矩堂中奉御書福字額雍正七年賜前布政使臣程元章堂左為㕔事三楹上奉聖祖御書振鷺初飛四字額南為書室更東為舫齋西為一琴書屋舫齋之南有重樓傑峙曰四照樓舊名天香樓絜矩堂之北為正樓五間平房五間左右夾廂東為耳房三間内書室五間後有園舊名後樂有亭曰後樂亭亭下有松化石疊石為山以在使宅之西因稱西山紫薇堂之右為督糧道署儀門之左為經歴司使宅之南為土地祠為照磨所儀門之外東為理問㕔西為寅賓館更南之西為資盈庫規制宏敞實稱東南首藩云按察使司在前洋街紀家橋東嘉靖浙江通志故宋岳武穆王宅也紹興三十一年以宅為太學學燬元大徳中改為肅政亷訪司明洪武初改提刑按察司仍其舊址萬歴杭州府志洪武二十七年重建堂後有一清樓歲久圮成化十年按察司戴珙重建為堂并營夾室徙民居闢道南出規制始稱夏時正按察司修建記司治元江南浙西等處肅政亷訪司舊治也舊址莫詳創始國朝改為是司堂後有樓名一清將壓弗支正堂以下亦復頺敗漶漫弗鮮兩廡逼隘弗容外門低小弗稱皆非所以聳人瞻視成化癸巳戴公來長憲令行政清民物安堵因葺廢舉墜詢之父老謀之竂寀按籍得在官羡餘計若干及令諸道分司亦以羨來計若干盡畀之鳩工集材肇於歲之甲午九月落於丙申四月樓撤為堂仍以樓名名之堂左右為夾室堂之前别為堂曰協恭東西為軒曰蓮桂曰來鶴正堂儀門則増飾之闢廡使東西各丈餘而外門特高大焉門之南去民廬不百十尺氛囂接堂陛遂召民而告之民皆願他徙公盡以地之在官者與易而復給其徙之資於是自甬道南出矢直砥平檜柏夾植蒼然整列設屛以蔽内外建坊以按察司三字題之外則長生街街東西復建坊東曰端本西曰澄源由街東出則睦親坊外臨通衢别建坊曰弼教西抵城址白龜池之上池即唐李泌所置六井之一建坊曰肅政由是堂室門廡髙明朗徹氣象不侔矣使宅之東為嘉湖道宅杭嚴道宅清軍道宅巡視海道宅温處道宅金衢道宅西為水利道宅驛傳道宅提學道宅國朝設按察使司裁併道員其現設者則分設各道署而司署仍其舊署之制中為大堂康熙三十八年聖祖仁皇帝御書亷察之寄四大字賜按察司于凖四十六年聖駕巡幸至浙復御書存素堂扁額俱崇奉正中前為露臺為甬道為儀門為大門東西廊為六房吏舎後為川堂堂勒御製按察使箴川堂之後為同心堂吳伯通同心堂記正統庚戌浙江按察使于大節以凡事務歸於大公至正使同官者皆易知而易從焉更名㕔之堂曰同心更後為使宅二門之外為忠祐忠節二祠西為土地祠為禮賢館大門外東西列二坊曰激揚曰振肅又東為岳忠武王祠為經歴司為照磨所西為司獄司又照磨所之東創為候審所雍正八年糧儲道朱倫瀚捐建朱倫瀚書候審所始末候審所余署臬捐養亷創設也人犯解司文到即投隨發分禁無許時刻逗留法綦嚴矣間或暮夜抵省文不及遞不得已仍帶至客寓門無防禦守土官又不及聞知設有疏脱誰其任之且鋃鐺梏桎或棲廊廡或受羈束聞者不能無動於心去臬署不數武適有官地建屋三楹東西各五楹外為大門周以垣牆不浹月而頓舎有所疏闊無虞又撥民壯十名專司防守其工食歲修則稽官地所餘賃之民間者集其息時給之此又長外臺者之責非署篆所敢知也雍正庚戌八月書糧儲道在布政司南一在司二門内西錢塘縣志在蛾眉山麓與布政司對舊名南堂郭子章題名碑記萬歴己丑冬余由蜀督學稍遷浙藩受檄糧儲兼理漕政分署在司南跨吳山之隂踞蛾眉之椒寶月北連西湖右繞直際其巔則林麓蓊翳禽鳥間闗如坐翠微凝眸逺睇則城市山川臚列在望土方氏謂地不華離若踞而候若攬而有宛委回環宜土樹舎以故髙賢名卿多出署中國朝康熙十二年參議劉昌言重建漸圮雍正九年糧儲副使道朱倫瀚鼎新之朱倫瀚重建南堂記布政司南蛾眉山椒有糧儲道舊署自前道劉君昌言徙藩署之西别建内署而南堂舊廨走鼪鼯叢荆棘廢棄者垂六十餘年内署既偪窄非治事之居而南堂又日就坍圯用所不足而棄所有餘為兩失矣余受任之三年上之制府制府允議遂諏日鳩工葺毁創新緑舊制而參以地勢所宜前為大門與布政司相對迤東為二門門以内為大堂堂之後循階而升有亭一方周設牕櫺俯瞰鱗櫛顔曰光明洞達再上爲聖祖仁内署再上則已躋山巔以後三歴階階率三十級皇帝御碑亭在焉自堂翼以修廊挾以外廡吏直賓次環列有所費不及公役不厲民始事於辛亥之冬閲兩月告成董其事者布政司經歴陳廷訓理問髙鑒千總王惲也又布政司内紫薇堂之西舊有督糧道署因南堂㕔事後逼近山麓廨宇無多故於總司二門之内别建内署而以南堂為外署出而視事焉署門東向題曰紫薇清署進内為二門額曰春臺南向更進為籌國堂上奉聖祖仁皇帝御書朱子書字銘後為衙堂康熙四十六年御題祇勤二字額奉懸其上籌國堂之西為亦軒右有隙地為箭道閲衞官騎射軒之南為舫室顔曰虚舟皆雍正七年督糧道朱倫瀚捐建朱倫瀚亦軒記糧儲道自康熙十二年劉君昌言因南堂逼近山麓遷布政司之西偏為紫薇清署堂廡卑隘每遇兒發之期弁丁擁擠不稱觀瞻脱有他事或僚屬往來求寸隙地容膝不可得也堂之西有屋數椽屋西南則曠為廢圃者幾數十弓謀創為退事之居而圃缺其西偏不能徑直詢之屋外則民間壊牆無所用余遂捐貲購之徹牆得地數尺鳩工掄材結屋三楹雲居月偃不招致而争妍聳秀絡繹簾旌屋角間其南復建舫室以為暇時寧息之所舫室之西則闢箭道是即所為廢圃數十弓也舉眼看青山捲臂作餓鴟聲斗室中具足境界糧儲道始有接見賓客考驗弁員之地然不事雕刻無丹青之飾工竣而顏之曰亦軒昭其儉也衙堂之西為樹滋書屋堂後住宅年久傾圮復捐建凝暉樓五間兩傍俱増置夾室寢處庖湢始備鹽驛道在湧金門内太平坊兩浙鹽法志宋乾徳後增置諸道轉運使太平興國三年開兩浙路轉運使署於鳯凰山雙門内為南北二衙熙寧間移置於湧金門内元至元十三年改為都轉運鹽使司嘉靖浙江通志宋兩浙轉運使職司漕挽諏民利病鹽課特其兼領耳元改都轉運鹽使司專掌鹽課明因之國朝康熙四十九年改為鹽驛道署東瀕湧金河跨石梁為轉運新橋建譙樓其上東向進西南向為計臺門為玉帶橋水通湧金池環署合流曰環帶河入為甬道為儀門為露臺為經略堂左偏為經歴㕔右為照磨所東西廊為六房吏舎堂後為川堂為絜矩堂西為使宅有宅門有堂曰思補内有五間樓西為書㕔後臨湧金池為水閣外有運副運判署分列於二門之内外如左右翼計臺門以東為將盈庫西為架閣庫前對黌宫後連駐防營規制尤整肅云寧紹温台分司在鹽驛道大門内西兩浙鹽法志明置兩浙都轉運鹽使有同知副使判官為之貳又設嘉興松江寧紹温台四分司而以同知領松江以副使領寧紹嘉興温台則兩判官分領之寧紹分司舊在紹興府治之火珠山側即宋録事司故址也元大徳間建明因之國朝康熙二十年裁運判一員并温台分司於運副而紹興之署亦久廢不居今廨在運司計臺門之右門東向進西為二門為作和堂南向後有二堂有三堂迤西為内宅折而西為六潄軒引環帶河水為池運副謝棠題曰瀲灧餘波嘉松分司在鹽驛道二門内東兩浙鹽法志舊制以轉運使同知領松江分司而嘉興分司則運判專領之松江分司署舊在下砂鎮宋建炎中置明嘉靖癸丑毁正統間遷於新塲鎮之北今廢嘉興分司署舊在嘉興府治廣平橋西即招提寺址也南為寶花倉今亦久圮國朝康熈四十三年裁運同以松江分司併運判即遷運判於運同之署在運司二門内之左門西向東入為二門南向有堂曰清鑑後有二堂凡三進制與前堂埒折而東為書冊房又南為書㕔海防兵備道雍正十一年新設駐劄海寧督標中軍杭協水師副將在馨如坊舊浙江通志分守杭嘉湖道國初改為會議府後改為城守副將署舊設浙江督標三營官康熙二十三年裁併福浙總督雍正五年巡撫臣李衞奉特㫖陞授浙江總督題改杭協副將為督標中軍官署門東向題曰杭協鎮進内官㕔三間儀門三間南向居中大堂三間舊額至公堂康熙四十五年杭協副總兵官吳開圻更題曰問心堂堂之東為㕔三間曰思繼堂開圻子進義亦居是職故書是額吳進義思繼堂題額跋曩者家君鎮此三載移節章安今余自章江調任兹土相去二十載每思家聖恩君以右榜一甲第三出典戎務國余媿謭材何能優渥志在潔已愛人忠誠報仰繼惟黽勉職業雖自公之餘亦不敢少圖暇逸爰新斯額漫綴數語以誌吾志云爾堂西箭㕔三間雍正四年陞任崇明總兵官李燦建堂後為宅門門内正樓五間雍正七年九月吳進義捐建題曰湖山湧秀餘為羣房厨房硝房馬房皆先後􅄈葺撫標中軍參將在城隍牌樓内南首夾道浙江撫標兩營舊設游擊一員雍正九年改撫標中軍游擊銜為參將署在紫陽山之左門南向進内為儀門為大堂為住房為書房為羣房去通江橋不百武密邇院署謹按公署與職官相表裏例叙文職於武職之前故省會則先督撫而後駐防都統各郡則先道員而後總鎮先府㕔而後副參游都惟提督總兵官雖駐劄寧郡而統轄全省水陸故特叙於道府之前督撫中權均有表率之任故連叙於道員之後查舊志公署不列武職未免闕略今補載至守千衞所等署既無舊籍可稽其駐劄處所已略載兵制兹不複見貢院在觀橋東萬歴杭州府志宋時在觀橋西新莊橋東元時在祥符橋明洪武初在府學西即仁和學基也其後人才寖盛又以嘉湖二府來屬地狹不足以容席舎天順三年改今所乃仁和倉舊址也成化十年左布政使張瓚􅂶拓而增飾之商輅重修貢院記近世試士之所謂之貢院重垣薦棘防範既密去取尤嚴禮法並行不相悖也浙江東南巨藩人才科目視他邦為盛舊貢院在郡庠西已而遷至東北五里視舊地寛廣幽靜重門髙墉内外謹嚴歲月既久寖至頺圯成化甲午當開科之歲左布政使張公瓚右使甯君良按察使戴君珙圖惟修舉以事白之巡撫劉公敷議克合遂鳩工掄材筮日舉事朽者更之腐者易之卑者崇之隘者廣之廢缺者補之漶漫者增飾之悉從改制工出於在官之役財出於公帑之羨無擾於民經始於是歲春正月至夏六月告成規模宏麗甲於他省馳書來京屬余記予惟科目取士禮也防閑之者法也法輔禮而行禮因法而成此貢院之修建所謂澄源端本急所先務者矣嘉靖四年巡按御史潘倣新選秀堂至公堂拓明逺樓築瞭髙樓規制大備王守仁重建貢院記浙之貢院舊在城西嘗以隘遷藩治之東而茍簡仍其舊嘉靖乙酉復當大比監察御史潘君倣實來監臨與諸司之長佐慎慮其事而預圖之慨規制之弗備弗飭相顧而言曰凡政之施孰有大於舉賢才者而可忽易若是乎於是新選秀堂而軒於其前為三楹新至公堂而軒為五楹庖湢器具無不備又拓明逺樓為三楹而崇其上三簷下疏三道創石臺於四隅而各亭其上以為眺望之所森嚴洞達供事者莫敢有輕忽慢易之心而就試者自消其回僻匪邪之念不大聲色而政行令肅觀向一新是舉也其必有才徳行誼之士如三代之英出而應諸君子之求以成天下之治也二十五年巡按御史楊九澤易南隅民居闢路遷門復加繕治國朝徳教覃敷人文蔚起每舉賓興之典輙加増葺因應試者多至數倍舉子號舎舊設四千八百五十間康熙二十三年巡撫趙士麟増建五千一百二十間猶不敷用􅄈取轎號五十年巡撫王度昭復􅄈建二千三百間共一萬二千二百七十六間直省號舎之多無過於浙者院之制中為至公堂左為監臨别署東為彌封所西為受卷所前南甬路之中為明逺樓東西為文塲號舎四隅為瞭髙樓甬路之南為坊曰龍門又南為儀門為大門至公堂之後為川堂為洗心堂東為監試署文冊庫謄録所西為提調署為掌卷對讀所洗心堂之後為協忠堂更進為聚奎堂為正副考官署為五經房儀門之外東為供給所西為巡綽所大門外東為三司㕔西為外供給所東西長廊為諸生候立處直南表坊曰天開文運東西坊二曰明經取士曰為國求賢迤南而西曰登雲橋立坊曰貢院雍正七年欽奉恩㫖開科總督臣李衞因貢院年逺坍損酌撥備公銀兩飭總理官將聚奎堂明逺樓及四面瞭髙樓重加拆建并葺東西文塲舉子號舎盡甃磚石重修主考房内外整肅規制一新演武塲一在錢塘門内一在候潮門外舊浙江通志宋景靈宫及錢塘縣故基元初改為教塲明因之每三年舉武士試馬步箭及每年按撫練兵都指揮操演官軍之所其制西倚城東南北三面繚以垣墉地廣三百一十六丈東南為門二中為演武堂國朝設滿漢駐防官兵以錢塘門教塲為駐防營較閲之所其督撫操演官兵及武闈大比俱在候潮門外欏木營面南照牆一座將臺一座東西鼓亭二間正中官㕔三間題曰演武㕔進内川堂二間二堂三間額曰耀徳揚威右偏看樓一間左首為厨房為守宿房南為馬王廟北為闗帝廟雍正七年總督臣李衞重建以下各府演武塲俱詳見兵制不重載皇華館舊名虎林書院在清和坊北大街舊浙江通志虎林書院明撫院舊府也萬歴二十七年浙江巡撫甘士价建錢塘縣志明卜講堂於城中得撫院舊府改建前為大門署曰虎林書院中建明賢堂左右為門中為凝道堂堂後為友仁堂左右各建三館以待諸生肄業及四方來學者最後有藏書樓明季已廢人但稱舊府國朝康熙三十二年建敷文書院於萬松嶺士子皆就敷文肄業舊府舎宇傾圯僅存堂屋數楹因地處城市之中人居稠密向為朔望宣講聖諭之所雍正八年四月改為皇華館李衞改舊府為皇華館記大臣受天子命建節一方則官吏之賢否民生之休戚軍政屯牧之整飭廢興人心風俗之表率化導無不舉而責之於身雖竭手足之力耳目心思之用勞神瘁精蚤夜區畫猶慮識見有所未周上無以荅聖天子倚畀之殷下無以慰衆士庶仰望之意其敢優游公府稍自暇逸乎哉余自雍正四年春恩擢始涖浙撫之任五年冬䝉事旋浙江總督仍兼巡撫鹽𣙜命節制江南加兵部尚書太子少保受短汲深而此心國厚恩至深極渥凡地方事宜雖綆不敢不盡數年以來諮諏採訪於江海塘岸之隄防湖河漊堰之修濬田疇水利之蓄洩城郭墩臺之備禦與夫橋梁道路㘰閘營房築壩開渠古蹟賢祠等類凡有益於民生者設法籌畫次第舉行國幸費不浮靡而事得粗辦獨念文之使來兹土者家賓興大典三歲一舉秉尺衡詔㫖向無一定館舎臨時輙借民房以停行李又奉頒或有經由差審事件其星軺暫駐之地亦當為之王重體統肅闗防而民居湫隘喧豗雜沓非所以尊人而慎事機計當專設一館然鳩工庀材動糜帑課存之于心非一日矣鳯山門之北有明時撫院舊署昔人名虎林書院後則用為講約之所夫宣聖諭講令逺近士民無不觀聽今泥於一方就近院署當草率了事則省城周圍數十里土著之人東西散處安能每逢朔望羣趨畢集且近處閭閻朝夕往來不過擔漿負販之徒聽聞歴久漸將視為具文余下車以來酌地遠近分設十門内外以次輪講聖訓俾僻逺細民咸聆以無負聖天子諄諄化導之至意而此處又經年累月鎖鑰塵封矣屋無人居遂成虚設頽殘牆堵剥落簷牙日欽使且益甚因念向為此奚擇而可任其傾圯哉遂筮謀一專設之館舎􅁻日捐公費以集事選屬員以經理毁者復之壞者修之堂若干楹寢若干楹停車馬舎傔從以及吏胥職役居處共若干楹門鑰有禁庖湢具備丹堊粉繪煥然一新而此外於藩伯署前又整修一公所為副使居停之地由是兩浙省會之區緇衣適館不致僱僦民居喧豗雜沓豈非一舉而兩得者乎然創之不易守之更難賓興鉅典例逾三載往來星使亦非久居則此署仍多閒曠恐將來按年修葺又無經費計惟浙省提鎮以及分巡外道多駐劄海濱省城向無行臺議令嗣後公事至省亦得於此二處駐節每次既省僦寓之值亦可量助歲修之資則又人有所止費有所出可以垂之永遠而不廢是亦政修事舉之一也爰誌經理之日月書其事而勒諸石時雍正八年歳次庚戌清和日記杭州府杭州府治在豐寧坊竹園山成化杭州府志漢以來皆治於武林山隋以來始治鳯凰山唐及五代前宋皆因之建炎以後即其地為行宫而守臣始於竹園山建治所嘉靖浙江通志吳越錢氏即州治建國至宋納土以其國為州治髙宗南渡改為臨安府因築行宫於鳯凰山遂徙府治於今所元末為杭州路明洪武初改路為府即舊址以建府治萬歴杭州府志𢎞治十五年知府楊孟瑛修楊孟瑛修府治記予自刑部郎中出守杭郡及門門圯升堂堂敝退食於寓支柱岌岌勢幾仆謀之二守杜君克善告於巡按得報可取資於公帑屬杜君董役樽節費出懲勸惰勤閲十一月訖事表觀望嚴啓閉為重門為楹間者三庋版籍藏貨財為府庫為楹間者亦三罪有重輕故獄有外内為楹間者五十有八羨材無所於委於是貫堂之後以延賓客而守所寓與二守所視事㕔咸更新之費公帑千六百緡有竒用人之力稱是自記顛末著杜君之勤志區區之不得已也嘉靖二十一年知府陳仕賢重修親賢館國朝康熙十三年知府嵇宗孟重建府治二十四年知府馬如龍因川堂久廢重建顔曰越石堂雍正八年知府喬世臣重修正㕔為蘓白堂舊為體仁堂知府馬如龍改今名杭州府志宣化堂元府治正㕔也今體仁堂即其址前為露臺為甬路為戒石亭為儀門東西廊為六房廨為架閣庫儀門之東為經歴司為土地祠西為照磨所正堂之後為川堂為有美堂成化杭州府志宋守梅摰建蔡襄書名勝志在呉山頂今故址不存而府治後堂尚仍其名又後為知府宅題其門曰清惠公署内為敬事堂左有琴鶴堂後有樓曰極髙明内署東為土地祠祀宋蘓文忠公軾正堂之東為清軍同知㕔後堂西北為資盈庫為理事同知㕔為水利通判㕔東西廊後暨清軍㕔東皆吏舎儀門外東為親賢館為司獄司官吏廨大門外為坊一前臨河上跨石梁曰宣化左右石坊二東曰親民西曰平政謹按漢書郡國志沛國有刺史治伏查康熙字典云凡州郡所駐曰治又訓治為理故唐書地理志亦稱州理是理與治即署也猶言出治之所也舊通志凡府縣署皆曰治今從之清軍總捕同知在府二門内東中為理法堂左右為吏廊後為川堂為退思門東為土地祠進内為宅門為衙堂曰比義堂後有樓為寢室為耳房東為書㕔雍正八年同知李飛鯤捐葺大門外有郡司馬坊理事同知在府堂西錢塘縣志舊為理刑推官㕔明萬歴初推官王涖改碧蓮館為之在縣治西國朝康熙六年奉裁今改為理事㕔東塘海防同知雍正十一年新設駐劄海寧西塘海防同知雍正十一年新設駐劄海寧督糧水利通判在府二門内西北杭州府志府後堂西北有局糧水利二通判㕔今局糧改理事同知其糧務歸併水利㕔分署通判㕔在城東北塘棲鎮嘉靖二十五年督撫胡宗憲題請增設主捕盜今奉裁杭協中軍都司在保安坊署東向大門三間左右廂房五間土地祠一間儀門三間大堂五間左右廂房六間川堂二間書房一間二堂五間左右廂房二間後樓五間左右廂房各三間東首馬神廟三間馬房三間右首箭㕔三間康熙七年創建錢塘縣治在府治右萬歴杭州府志魏漢時在靈隱山麓後徙錢湖門外唐武徳四年徙錢塘門内宋南渡後徙紀家橋華嚴寺故址樓鑰錢塘縣題名記錢塘古都會繁華甲於東南髙宗駐蹕於兹民物百倍於舊附郭二邑事體寖重他郡邑莫敢望紹興二十七年有㫖錢塘仁和比開封府祥符兩赤縣中書擇才授任秩滿許以陞擢於是選任又重仁和乃錢塘之分故錢塘尤重焉紹熙二年宋君玠始至興治撥煩坐以無事裒集前任人名字刻石以記之使後有考焉錢塘縣志明洪武四年知府劉文以附府署為便徙今處在城西南之豐寧坊前臨吳山後帶湖水清波門湖水自流福溝入宣化橋國朝因之康熙五十三年燬署縣事樊琳重建正堂曰如保堂甬路南曰戒石亭儀門曰朝宗首縣儀門東為大門堂後曰亦保堂為内衙堂東西為庫又東為典史廨其西為丞廨東西為六房儀門内東為土地祠西為獄儀門外東為寅賓館西曰申明亭旌善亭仁和縣治在府治左嘉靖浙江通志梁龍徳二年析錢塘鹽官置錢江縣宋太平興國四年改今名舊治在武林門内梅家橋西宋徙招賢坊今興賢坊紹定間令胡巨卿重建喬行簡重建縣治記仁和在吳越時為錢塘附郭太平興國三年錢氏奉圖籍入朝改今名建炎南渡邑視赤縣縣宅莫詳締建之始紹定壬辰胡君巨卿來領縣顧瞻庭宇岌岌動搖凛乎將壓京尹余公捐錢四百萬俾更之令承命惟謹度財賦功增庳培薄易湫隘為顯敞自㕔宇廊廡寢處庖湢無不撤其舊而新之率作興事不勞於民不愆於素是可書也萬歴杭州府志元以附府為便徙今處洪武初復遷興賢坊舊浙江通志洪武四年知府劉文改元録事司為今治二十七年燬縣丞邵英重建杭州府志正堂為無倦堂東為丞宅西為典史宅土地祠在儀門外堂東西為六房中為戒石亭後為庫外為申明旌善二亭國朝改無倦堂為明親堂縣門西向雍正九年知縣董怡曾闢東廡南出跨河為梁啓正門而扃其西得嚮明而治之義焉海寧縣治在崇儒坊西三思橋北成化杭州府志宋太平興國四年建七年令王昞重建正㕔紹興元年令陳恕重修元元貞二年縣陞為州㕔仍宋舊延祐二年學士趙孟頫書帥正二字為㕔額元統三年判官任惟勤重修海寧縣志明復為縣洪武三年建官吏宅舎於㕔之後正統九年令伍服重修𢎞治十六年令孫旻重建譙樓至嘉靖十五年隳敝令嚴寛新之萬歴五年令蘓湖重建國朝順治十一年知縣秦嘉系又加葺焉治㕔三楹顏曰節愛明中丞温純書中堂三楹為退思軒今復為清愛堂後堂三楹原額帥正後住房三楹在帥正堂後又耳房三楹陽春堂五楹久廢始復内書室三楹在西側舊書室三楹在直北丞廨在治㕔東典史宅在治㕔西北儀門三楹外譙樓三楹廨宅後舊有圃圃有堂曰平政曰緑繞有亭曰錦香曰仰髙曰梯雲西㕔之後有便室曰讀書林其側曰進徳齋花竹夾徑松檜參天為公餘遊憩之地皆宋時遺蹟云富陽縣治在城東北嘉靖浙江通志唐咸通間縣令趙納建宋嘉定間令吕昭亮重建元末燬明洪武九年知縣楊敬儒建杭州府志吕昭亮始移本處宣徳九年令吳堂更新之國朝順治五年知縣朱陛臣重建康熙元年朱永盛增建譙樓九年知縣牛奐建堂堂之前為軒為甬道為戒石亭為儀門後為川堂為後堂後堂之左曰斐如堂堂後有樓周以新篁曰萬竹樓宋李彌高揭扁於堂後東曰不欺室西曰讀書齋明縣令吳堂作不欺室讀書齋銘堂左為典史宅又東為縣丞宅儀門外為寅賓館土地祠縣門有譙樓餘杭縣治在苕溪之北通濟橋西成化杭州府志按輿地志治舊在溪南後漢嘉平二年縣令陳渾徙於溪北宋宣和中燬縣令江袠重建建炎間燬縣令張永嗣復建乾道四年改創縣門鼓樓紹定癸巳令趙希磐新之元大徳五年達嚕噶齊呼都克婁實克拓廣之延祐二年縣令王昌又新之至正末又燬明洪武二年臨安縣主簿黄思道署縣事重建永樂七年知縣林源重修餘杭縣志正統間縣丞邱熙岳重建川堂衙舎𢎞治元年知縣孫冕以譙樓太偪儀門遷四十步許十五年知縣冉繼志復建後堂嘉靖四年縣丞賈明通重修正堂增置衙舎知縣曾玉山重修大門儀門六年知縣王確仍於後堂東偏建思補亭萬歴三年知縣萬士楨重建譙樓三十一年知縣程汝繼改建譙樓題曰清逺并改堂衙創集瑞樓三十九年知縣戴日强建武林首鎮坊國朝康熙八年知縣張思齊重修内署衙舎添建南北書屋各三楹後建寢室復以主簿舊衙廢址闢為縣圃治㕔東北為丞宅東南為典史宅臨安縣治在東市太廟山右臨安縣志宋以前治建高陸鄉溪東石刻碑尚存宋景定三年令家之巽移建西市保錦山明洪武初知縣袁思謙移置東市國朝因之中為忠愛堂明袁思謙建後燬康熙二年知縣楊琳重建六十年張淑郿重葺堂左為耳房庫右為架閣庫前為戒石亭為儀門為大門上建譙樓堂後為縣衙内㕔樓二所有古柏亭亭參漢堂東北為簿廨奉裁廢東南為典史宅於潛縣治在石柱峰右於潛縣志唐武徳七年以縣置潛州治在豐國後鄉八年州廢復為縣徙治今所宋政和初令韓瓘改㕔事南向隆興初令葉衡於㕔事東築退思堂元慶中衡入相令邵文炳名其堂曰袞繡元至元五年建譙樓明洪武二年知縣梁誠増建門廡官廨吏舎𢎞治十七年知縣嵇鋼重新正堂嘉靖二十四年令陳煊於後園鑿池築亭其上曰後樂二十七年令汪石川改曰培竹國朝順治三年知縣張予信重建治㕔前為戒石為儀門東為幕㕔又東為知縣宅前為典史宅治㕔後為川堂為後堂儀門外為倉為獄南為譙樓門外為保釐坊新城縣治在城南隅成化杭州府志縣治自三國吳黄武五年始置其署因革莫考新城縣志唐長壽中建宋紹定六年邑令陳旼建治㕔丞相鄭清之書縣額咸淳七年邑令陳君寶建縣樓於儀門之南其丞㕔簿尉司皆在治外元至元二十六年縣尹韓復重建縣㕔至正末燬明洪武元年知縣徐弼重建新城縣志𢎞治五年知縣林著建後堂川堂正徳十六年知縣梁相撤譙樓建大門嘉靖四年知縣李應春充拓基址重建譙樓國朝順治十八年知縣吳敏含建正㕔康熙十年知縣張瓚題曰親民前為架閣庫為公生明亭為儀門東為土地祠西為君子堂南為譙樓川堂後曰深清堂堂後為縣宅堂右為典史宅川廊西有種花處上有旌蓮亭前有月池池外半畝花栁鮮妍梅竹娟潔池有紅白蓮中架木橋四洞以通出入昌化縣治在唐山南成化杭州府志唐埀拱三年始置紫溪縣治乃今於潛縣之潛川鄉也萬歲通天元年析紫溪縣地别置武隆縣徙治於唐山之南其後縣名沿革不一而皆治於唐山宋宣和中令錢冰重建㕔署昌化縣志元大徳間達嚕噶齊阿勒坦重建至正末燬明洪武二年令李質徙山趾為儀門治㕔曰應宿堂嘉靖壬寅令馬逢伯改曰牧愛堂㕔事後為清白堂為知縣宅萬歴四十二年令康萬有重構即其内書樓新之曰吏隱齋清白堂之東有耳房庫西有滴翠亭左為架閣庫右為幕宅南為戒石亭前為儀門門左為親賢堂右為土地祠前為譙樓浙江通志卷三十
