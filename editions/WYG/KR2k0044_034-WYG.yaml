body:
  text: 浙江通志卷三十五闗梁三湖州府烏程歸安二縣附郭駱駝橋名勝志在府治前霅溪上以形製而名西吳里語唐初建又名迎春橋以其直迎春門也胥偃迎春橋記横亘溪上三巨橋迎春其甲也驚湍箭馳列柱櫛比覆以飛宇約以雕檻宋慶元間火知州李景和重建舊此橋或摧圮將墜夜遠處聞橋上若有千餘人工作呼聲及旦橋梁之將墜者煥然一新皆商賈船上檣木居處近橋者一無所聞覺或曰此魯般仙也萬厯湖州府志明萬厯元年知府栗祁重修儀鳳橋西吳里語府治西南苕溪之上唐儀鳳年間置因名宋天聖三年知州高慎交重建紹熙三年燬於火易名紹熙崇禎烏程縣志明萬厯三十年耆民鄔佩募修天啓五年知縣馬思理捐俸創修國朝順治十五年知府劉愈奇重修斜橋𢎞治湖州府志在駱駝橋西北以其水出自子城壕而形斜故名望州橋明一統志在府城迎春門内跨運河視衆橋獨高虹橋西吳里語吳人謂虹橋為無星橋眺谷橋崇禎烏程縣志在虹橋南跂足可望城外山谷故名久圮縣丞丁炳捐修長橋吳興掌故宋政和中章援知州事於郡東南重建長橋建炎末郡人易木以石且築渚中流析橋為二南名甘棠高壯可通大舟北仍名長橋明天順四年邱璿知湖州以長橋嵗久圮壞鳩工重建方謨重建長橋記郡城之南有水横貫於南北曰霅溪溪之上游曰長橋舊名伏龍又名東駱駝橋橋之水一自天目之陽出餘杭經德清㑹銅峴諸山水入定安門一自天目之隂入苕溪薄城南入定安門二水合流橋下漫衍為江子滙從臨湖門直趨太湖毎春夏霖潦暴至則深廣倍常故橋屢圮屢修比年來遂偃仆而不可支矣景泰癸酉郡守謀及歸安令役工方興屬時饑工遂輟天順改元河南邱侯來守如前工直俾裕其力橋成三洞覆以砥石翼以闌石其高二十四丈立於水者如之落成之日咸謂太守之功不容無述因紀其本末以告後人人依橋萬厯湖州府志府治東運河上唐元和間刺史辛秘建以集商為市又建樓其上今呼花樓橋西吳里語辛秘去任百姓懷之因名曰辛橋倉橋𢎞治湖州府志在府治東舊名採蘋橋以其在白蘋洲北後人因橋南有倉故名倉橋沈尚書橋崇禎烏程縣志尚書沈介建故名張莊僖公更新之潮音橋湧幢小品慈感寺前橋曰潮音水清澈有蚌浮水面吐珠人皆見之毎風雨即有蛟龍來攫萬厯湖州府志舊為潮音渡在府治南嘉靖十八年知縣魏濟改建崇禎烏程縣志萬厯三十年忽圮知府陳㓜學重建烏程縣城外闗梁迎禧橋萬厯湖州府志即清塘橋在迎禧門外成化九年知府勞鉞建丁澄重建迎禧橋記郡城西北出迎禧門百餘武有溪一帶縈廻數十餘里溪之旁腴田沃壤未易以頃畆計溪之上有橋一洞跨之蓋前人欲便往來者而作初不知其水之難泄也故凡樹藝於田壤之間者屢遭災耗知府勞侯相擇水勢平緩之處距橋之下流八十歩撤其舊而創構之其崇二尋羡二尺廣一尋羡亦如之袤亘五洞而施兩岸為尋二十羡四尺橋之成耕者免水患而獲豐登之利行者免厲揭而無徒渉之憂利濟容有既乎定安橋𢎞治湖州府志即定安門外橋也俗名愈思橋崇禎烏程縣志歳久洪水衝蝕知府陳㓜學葺塘治亭并新之易名定安章喜楨重修定安橋記苕溪出天目之隂東來與餘不前溪北流水諸派合而入郡之定安門經帶包絡乎郡治則定安橋實其咽喉云太守筠塘陳公治郡之四年百廢俱興橋梁之修建如潮音横渚鎻龍雲塘德武諸役靡不尅期以竣乃定安最後有圮徵矣倘將圯之弗慮大壞而後葺之後來者力尤不贍也於是鳩工庀材七閱月而告成是橋一名愈思傳疑莫考俗又呼為驛司因其近驛又沿愈思之訛而名之也郡志曰定安因從郡志之名而為之記青塘橋崇禎烏程縣志在迎禧橋北元至元初縣丞宋文懿捐貲甃石明萬厯間知府李頤重修更名永頼烏程縣志天啓間知縣馬思理修崇禎壬午知府陸自巖重建國朝康熙己未知府胡瑾重修易以石德新橋𢎞治湖州府志在舊舘即高橋也正統間傾頺里人陳孟暹重建有亭於上馬要橋嘉靖浙江通志天順間建烏鎮之水經其下入於太湖潘公橋崇禎烏程縣志尚書潘季馴建于慎行潘公橋記潘公橋者今少保印川潘公奉其先贈尚書僦菴公之命而建也湖之為郡城於震澤之上苕霅之水夾焉兩岸之間雨水時至嵗有覆溺僦菴公戚焉嘗欲橋於二水之會以安里人而齎志以没少保公毎念之轍歔欷涕數行卞也甲申之歸謀諸烏程令楊應聘楊曰輿梁之政職在有司請具畚挶以從公曰不然以里門之有䟦渉戚我先公豈其敢勤𨽻人以及父老繼志謂何禄賜之餘可以施者無敢愛也始於萬厯乙酉三月迨庚寅十月而成橋長百四十尺博二十尺先是楊君被徵且行曰橋成名之曰潘公郡人從之少保衍澤濟美以光前烈可謂永孝矣國朝康熙十一年季馴曾孫𢎞成重修百名橋崇禎烏程縣志舊名通安橋以通定安門故名橋在南塘中内通村落數百故又名百名八里店橋嘉靖浙江通志景泰間建官塘河水經其下東入昇山塘興德橋明一統志在府城東南九十里宋建元末重修黄浦橋吳興掌故妙喜寺前二十歩橋南有亭為梁鮑照送盛侍御及庾中郎賦詩之所石柱記箋釋水自黄檗山出故號黄浦鎻苕橋烏程縣志苕水自南來至此一鎻北入毘山溪故名國朝順治五年里耆方永春鄔天選等重建望仙橋崇禎烏程縣志在烏鎭五代時嘗有異人過酒肆飲醉輙噴酒沫汚髭吻洒壁間結靈芝拂衣而去追跡之至橋所忽不見故名毘山渡萬厯湖州府志在毗山溪通大錢港口歸安縣城外闗梁沙村橋𢎞治湖州府志在崇禮鄉仁壽橋四通橋歸安縣志俱在三都市橋𢎞治湖州府志瑯琊鄉璉市橋有八曰西成仁壽鍾吉連雲安齊東俊太平長慶前溪橋水西橋鳳凰橋萬厯湖州府志俱在二十二都虹橋歸安縣志在十五都舊有嚴素菴還金亭嚴氏烈女井西吳橋𢎞治湖州府志在長壽鄉利渉橋𢎞治湖州府志在八里店高跨大溪𢎞治四年建清風橋明月橋萬厯湖州府志俱在二十七都東老橋歸安縣志在三十三都何㮚題東老橋詩散盡黄金白酒空飄然曾此躡晴虹一䦨秋氣元洲霧兩岸春深赤水風鐡笛已收明月下玉經還擲亂雲中仙家咫尺紅塵外自是人間路不通望仙橋歸安縣志在二十八都西吴里語因馬自然登仙人望之故名東林橋𢎞治湖州府志在樂豐鄉七里渡歸安縣志知縣楊時秀設渡夫二名民不病渉長興縣司馬闗長興縣志去縣治南六十里出烏程地方達妙喜筋竹闗長興縣志去縣治南六十五里出歸安地方達武康飛橋萬厯湖州府志譙樓前相傳葛仙翁在此飛昇喜畵橋長興縣志縣治東北一里分箬流迤邐至東南出光明橋為縣治翼沙兩岸竹樹罨暎人稱小畵溪平政橋𢎞治湖州府志舊名廣利橋又名程氏橋長興縣志宋邑令袁旦名廣利橋嘉祐七年葉斐重建改今名元以長興為州故至今呼州橋祥符橋萬厯湖州府志縣西街長興縣志在義和坊俗呼打鼔橋神武門橋萬厯湖州府志跨城東南濠嘉靖間知縣齊之鸞重建改名望春齊之鸞重建望春橋碑記嘉靖改元壬午全吴秋澇湖州為甚於是邑東門橋圮予初至力弗及也旋以税事臨倉督徵居人駕木渡予月凡數易予曰是可久乎乃謀諸富人得八十金又益以市租五十餘金取松天目伐石武康徵工姑蘇督以耆俊緣以戒僧舉事冬十二月訖工春三月於是東門橋偉然改觀矣舊橋孔偏岸西舟上下不相見往往迎觸多墊没今中流為之隆其中沿以隄防衛以䦨干蓋上可方軌下可並舟而行維暮之春出自東門而吾橋適成因合地與時而名橋曰望春作望春橋記震龍橋萬厯湖州府志便民倉前一名倉橋嘉靖四十六年知縣歸有光創建起龍橋長興縣志縣治東三里俗稱喜郎廟橋國朝康熙三年重建許公橋長興縣志縣北四十三里顧渚山明月峽下舊傳顔真卿與客歩月賦詩宴飲因名夜橋宋邑令許遵尤嗜山水毎遇佳辰率携賔從造顧渚往來不厭重建此橋故名俗呼顔板橋觀卞橋𢎞治湖州府志在陸滙龜蒙有詩云最愛卞峯顔色好晚雲纔散便當門故曰觀卞甫里橋崇禎長興縣志陸龜䝉别業在此故名𢎞治湖州府志一名陸滙橋姚家橋𢎞治湖州府志在縣南十五里跨鴈翎港宋時大學士姚祐建德清縣通濟橋萬厯湖州府志縣治前舊名代輿德清縣志又名通津宋淳熙間縣令楊思濟改今名明正統間圮知縣王敬完修復更名永安今但呼縣橋國朝雍正九年知縣錢學洙捐俸重葺更名富寜自為記阜安橋嘉靖浙江通志縣南三百歩餘不溪經其下北入於太湖德清縣志唐天寳中建初名天寳唐末燬宋宣和間知縣趙嵎改建木橋名曰餘不淳熙間易為石䕶以欄楯參政李彦頴取蘇文忠公風俗阜安之語改今名西吳里語宋淳熈中有錢三翁者衣衲茹素脅不沾席者五十年俗呼布衲翁時德清建阜安橋屬主其事謂其徒曰翌朝有餽醬謹視之明日果有青坡村民獻醬二甕探之得銀二笏以充橋費人異其前知嘗摩挲橋曰此可過五百年寳慶丁亥秋震風霖雨民廬寺觀多壞此橋屹然中流片瓦不搖明𢎞治間大圮知縣王良臣修正德末年通判姚奎修又圮知縣李蘖修隆慶二年知縣陳宣修萬厯十三年知縣陳效大加修葺壯麗較倍於昔國朝康熙年間知縣馮壯因圮修建大虹橋萬厯湖州府志在龜溪東相傳建此以鎭蜃尾龜廻橋德清縣志在内河口孔愉放龜於此龜廻而左顧因名國朝雍正五年知縣朱永齡奉文領帑重修橋内地勢窪下溪漲時必須用板閘住以䕶民田野橋德清縣志在縣北慈相寺上跨古澗下瞰方沼羣峯環秀古木覆䕃為龜溪八景之一沈宗元野橋詩濠上鯈魚樂石梁瀑布新何如野橋雪恍見武陵春曲澗虹朝飲危闌虎夜蹲上方雖咫尺到此坐逡廵平政橋萬厯湖州府志縣東一十五里當杭湖往來之衝德清縣志宋嘉定間建後廢明正德間重建又廢國朝康熙十二年鼎建歩雲橋一名白雲萬厯湖州府志平政橋南為本縣津候之地德清縣志明萬厯三十六年知府陳㓜學重建更名雲塘國朝雍正八年總督臣李衛重修李衛重建歩雲橋記德清縣東南歩雲橋江浙往來取道湖屬者所必經陸通行旅水利舟楫邑之漕艘出入由是隣近州縣率履不越不獨一邑之便實通津焉明萬厯丁未郡守陳㓜學重修去今百二十年不知圮於何時陸行既阻其駕長風縛巨帆者溪流迅駛下復有壞椿舊石誤觸致損過者恒惴惴橋之廢其不便亦不止一邑也天子嵗庚戌署縣事錢學洙詳請重建予奉有便於民命節制江浙凡橋梁津渡堰閘塘岸其率不憚修舉矧兹去不便以就便澤梁不修刺史之過與其償租車何如一舉而永利也爰檄湖守唐紹祖為之經理而令太學生茅瀚董其事經始於是冬十二月閲十月而告成較舊址加廣高稱之向之壞樁舊石沉於淵者悉起佐用而増以新材良工堅役不及民計用帑金一千一百兩有奇而工竣今而後水陸俱便凡江浙往來取道湖屬者皆得出於其途矣豈止為一邑利哉歩雲橋舊名也雲塘前陳守重修而易以新也橋廢久而俗之名橋者仍其舊予亦順民之便而已為作重修歩雲橋記三登橋明一統志在縣東北四十里宋袁説友張嚴王大有皆寓居此相繼登第里人榮之故名菩薩橋德清縣志在新市鎮相傳昔溪漲忽一巨木横於橋下羣視之畧似大士像命工刻成之今覺海寺長觀音是也張敏叔詩云野橋横渡木觀音因名望仙橋德清縣續志即大麻高橋始建無考明成化三年重建歳久圮國朝雍正九年知縣錢學洙詳請重建程元章重修望仙橋碑記王政之