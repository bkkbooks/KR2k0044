萬厯間屋燬崇禎間邑令胡夢泰捐俸募修又燬國朝康熙五年知縣張奎引延僧行純重建仁濟橋嘉靖寜波府志縣東五里新婦湖上名新婦湖橋又名放生湖橋宋紹興中建覆以屋後圮邑人汪伋重修元至元間燬大德中監州察罕立石柱重建未竟受代僧博繼成之西溪橋嘉靖浙江通志在縣南十里奉化縣志跨西溪上向架木柵作橋水漲輙浮民甚病渉天啟間邑人孫若思捐貲鳩工以石板易木柵復置田若干畝為修葺計往來者便之南渡橋成化四明郡志縣東北二十里又名廣濟橋宋建隆二年僧師悟始創土橋後易以木紹興元年鄉人汪汲甃兩岸立石柱亘板其上覆以瓦屋元至元十三年燬至正二十一年簿盧震龍増建屋一十五間又翼以南北二亭嘉靖寜波府志明洪武中縣丞喬鑑重修奉化縣志萬厯間燬天啟間鄉紳何如禮重修張時徹南渡橋詩路出青山峽雲移碧水艖新蒲没洲渚斜日到村家林暝烏翻樹潮來月滿沙緣知丘壑内偏自有烟霞光德橋嘉靖浙江通志在縣北二十里成化四明郡志俗名江口橋宋李珂建後為洪水所圮嘉靖寜波府志紹熈三年李氏重修汪伋贊其役通水九道上覆屋二十六楹元至元十三年燬十九年李以垢等立石重建蓋屋二十一間明洪武十年重修正統十一年知府陸竒命道人李存誠建正德末風水大作橋壞將半里人重修大埠石橋奉化縣志縣北三十里嘉靖寜波府志舊名源泉橋又名泉口大橋鄭復言大埠石橋記縣治北有地曰泉溪散漫四十餘丈古無橋創自宋治平四年由宋迄今屢修屢廢行者病渉里之民相與白於官邑侯裴琚允其請起工於永樂辛邜之正月里人戴邦彦竺大錢大總孫惟堯輩各捐已貲盛召工役以集厥事里閈聞者莫不悦助遂落成於壬辰之九月規模氣象煥立雄壯視前之功不啻十倍由是往來於此者若履坦途靡不踴躍稱快云湖頭渡成化四明郡志縣東一百二十里舊名田下渡鎭海縣定海闗嘉靖定海縣志在南薰門外國朝康熈二十四年重設嘉定橋嘉靖寜波府志縣東北鼔樓前横帶橋鎭海縣志縣治東北一名尚書橋兵部尚書邑人邵輔忠建吏部郎中奉川戴澳題善慶橋嘉靖定海縣志縣治西北今名總舖橋大有橋鎭海縣志向係堰基初設小橋明崇禎丁丑冬邑令張琦改建名大有後圮國朝康熙九年知縣王元士重建長山橋成化四明郡志縣東南二十里洪武間鄞人謝復榮建鎭海縣志即小浹江橋成化時海道朱紳楊瑄相繼建石梁萬厯丙申秋大潦梁堍皆陁邑令丁鴻陽朱一鶚先後葺成之董工者丞陳懋齡也邵輔忠長山橋記長山橋倡始於成化辛卯海憲朱公繼成於楊公瑄閲嵗綿久萬厯丙申秋大滛潦梁南堍先陁司里以告邑令丁侯侯即令民倣成化故事募鏹若干佐以公帑未及為而侯適以艱去己亥春閩漳朱侯至亷其狀遂進陳君謂之曰不一勞者不久逸不暫費者不永寜於是鳩工伐石經始於萬厯己亥落成壬寅春仲跨江南北長二百武廣十有二武上翼扶欄下竇五門其南堍十武甃石井通山源亦以濟民渴也皆陳君之綜理云國朝順治戊戍海㓂從穿山登陸橋燬行者復病渉康熈戊申知縣王元士建議重造僧人募錢甃石邑貢生謝泰履捐金倡之逾二年告竣虹橋明一統志在縣北一十里嘉靖定海縣志又名義慶橋太公橋鎭海縣志在靈巖鄉地名中央岸有田數十頃四面環水農民病渉謝瀚捐貲建橋鄉人德之因名太公橋崇孝東橋崇孝西橋嘉靖定海縣志二橋乃周德建因其事母孝故名新橋鎭海縣志在石秋竹山舊有石橋後圮國朝康熈六年知縣王元士重建大浹渡至正四明續志在縣東南一里嘉靖定海縣志即大浹口為水闗屯泊舟師處蘆浦渡嘉靖定海縣志縣東五十里至正四明續志乘半潮可抵昌國州象山縣縣東橋成化四明郡志縣東半里宋景定三年置永安橋嘉靖寜波府志即西橋跨鳳溪而鎻玉帶一邑風氣之闗迎恩橋象山縣志縣治西南一里舊名南橋以築城毁明嘉靖三十三年毛令德京重建改今名風橋嘉靖寜波府志縣東北三十里有仙巖金峰之勝海口橋嘉靖浙江通志縣東北二十里海潮汐經其下象山縣志明𢎞治六年鄭令琳建嘉靖三十四年毛令德京重修歐陽橋象山縣志縣西四十里舊名儒雅洋橋同知歐陽懋署縣事重修因改歐陽橋太平橋嘉靖寜波府志縣東北四十里洪武三十四年倭賊登刼湯嶴錢倉千戸易紹宗率兵殺賊於此被害其裔孫易寜易顯乃於死節之處壘石為橋號曰太平識其殺賊安民之功也它山橋象山縣志縣南昌國衛治東明嘉靖三十三年倭㓂臨境拆橋以葺城垣賊破城後衆謂此它山風水毁橋所致萬厯三十五年里人應朝佐劉暉張明奉重建南闗橋嘉靖寜波府志縣南九十里邑人侍郎俞士吉奉命諭日本於此發舟因名正德間廢義官王玉重建陳山渡至正四明續志縣東北一十五里自陳山發船經兩潮至奉化州東宿登岸定海縣舟山闗成化四明郡志城南舟山渡邊碇齒隘兩浙海防𩔖考續編與外港相對嘉靖間累被倭賊登刼謹按碇齒隘在舟山所西五十里明嘉靖中為戍守要地總制胡宗憲擊岑江賊分軍出此時賊黨有據烏沙懸山者宗憲䇿其必與岑港宼合陸路則設伏於碇齒水路則設伏於響礁門賊果由二路奔沈家門寨合於岑港官兵討平之監橋成化四明郡志在城南宋熈寜元年建紹熈元年令王阮新之狀元橋嘉靖寜波府志翁洲舊名昌國縣洪武二十年省入定海縣其地故有狀元橋未知所自邑人張信適生橋之所至二十七年信舉狀元及第始符橋名或云宋紹熈三年令王阮立刋其兩傍石䦨云人從橋上行狀元此時生遂以名橋大余橋定海縣志宋丞相余天錫建小余橋定海縣志天錫弟兵部尚書天任建東江橋明一統志在縣東五里定海縣志宋明道初文亮自開封徙居創建五龍橋定海縣志在五條峧中故名郡賔夏國正建曉峯橋成化四明郡志在滃洲宋淳熙十五年西監監鹽鮑渭侈大之大士橋普陀山志在潮音洞上留青日札僧德韶甃石橋宋寜宗題曰大士橋佛書所謂海嵓孤絶處是也劉仁本大士橋詩金碧玲瓏塔影雙綺霞香霧濕踈忩鮫人織浪為華盖龍女持珠獻寳幢震海風雷音縹緲瀰山潮汐響舂撞願求現示將軍相一鼔羣魔盡聶降舟山渡延祐四明志去縣五里趨城由此塗出令趙大忠創隄岸浙江通志卷三十五
