body:
  text: 欽定四庫全書浙江通志卷二百二十七寺觀二仁和縣城外寺觀勅賜圓照寺在天開河國朝順治年間臨濟正宗􅟏溪森開山世祖章皇帝賜名圓照寺後森歸隱華嚴菴圓寂建墖寺内雍正十一年奉勅追封明道正覺禪師設立牌位供奉墖院奉㫖動帑重修十二年御書法輪𢎞轉扁額報國寺武林梵志在鳯凰山麓即南宋垂拱殿基仁和縣志按胡僧楊璉真伽即宋故内建五寺曰興元曰報國曰般若曰小仙林曰尊勝今止存報國一寺尊勝舊址改為法華菴餘俱不存元至元十一年賜額禪宗大報國寺妙濟禪師開山延祐六年燬僧大新重建元末燬明洪武二十四年立為叢林萬厯丙午僧海音新葺梵天講寺嘉靖浙江通志在鳯凰山西湖遊覽志宋乾徳中吳越王建名南墖吳越備史錢武肅王於明州育王寺迎釋迦舍利建墖於城南治平中改今額元元統中燬明永樂十五年重建内有石墖二靈鰻井金井釋守詮梵天寺晚歸詩落日寒蟬鳴獨歸林下寺柴扉夜未掩片月隨雲屨惟聞犬吠聲又入青蘿去蘇軾梵天寺見僧守詮小詩清婉可愛次韻詩但聞煙外鐘不見煙中寺幽人行未已草露溼芒屨惟應山頭月夜夜照來去朱子梵天寺觀雨詩持身乏古節寸祿久棲遲蹔寄靈山寺空吟招隱詩讀書清磬外看雨暮鐘時漸喜凉秋近滄洲去有期勝果禪寺武林舊事在包家山勝果寺志隋開皇二年建唐無着禪師重興宋慶厯中郡守鄭戩奏賜額曰崇聖仁和縣志元至正間重建明永樂十五年復建釋處黙至勝果寺詩路自中峯上盤迴出薜蘿到江吳地盡隔岸越山多古木叢青靄遙天浸白波下方城郭近鐘聲襍笙歌王安石遊勝果寺詩登髙見山水身在水中央下視樓臺處空多樹木蒼浮雲連海氣落日動湖光偶坐吹横笛殘聲入富陽王守仁移居勝果寺詩江上但知山色好峯迴始見寺門開半空虚閣有雲住六月深松無暑來病肺正思移枕簟洗心兼得逺塵埃富春咫尺煙濤外時倚層霞望釣臺朱朴勝果寺詩下界聞鐘梵中峯隱薜蘿海門朝日近沙市暮帆多鳯去山空老龍蟠井不波宋家宮樹在啼鳥學笙歌福田慶夀寺萬厯杭州府志在候潮門外羅木橋宋寶祐二年徐路鈐捨宅建寺請福田額元至正間燬泰定間重建復請額加慶夀二字武林梵志明洪武二十四年立為叢林蔡充宗福田寺詩江村開佛地樓閣倚清暉響近風生海隂森竹覆扉慈航能載客溽暑不蒸衣疎雨隨秋至殘蟬已息機定香寺武林梵志在艮山門外宋乾徳四年建於西湖定香橋名香積院治平二年改今額寶慶間建旌徳觀移建今所香積寺萬厯杭州府志在江漲橋北宋太平興國三年柯氏捨宅為寺舊名興福大中祥符間改今名仁和縣志元末燬明洪武辛亥重建為叢林武林梵志香積寺門臨官河帆檣往來者日百千計秉燭猶喧一徑蜿蜒茂林䕃密隱然城市異藪也佛日淨慧寺嘉靖仁和縣志在城東北五十里黄鶴山之隂石晉天福七年吳越王建號佛日院宋大中祥符元年改今額周必大奏事錄寺有清冷一擊等軒庫堂後有池池中有渥洼泉出石罅中堂上有蘇軾熙寧七年八月送陳述古赴南京時留題真蹟仁和縣志寺久廢明萬厯間雲棲金臺掄法師重建蘇軾宿佛日榮長老方丈詩陶令思歸久未成逺公不出但聞名山中只有蒼髯叟數里蕭蕭管送迎日射西廊午枕明水沉燒盡碧烟横山人睡覺無人見惟有飛蚊遶􅁂鳴崇先顯孝華嚴教寺武林梵志在臯亭山之陽宋紹興十九年建二十八年賜崇先顯孝禪寺額寧宗改禪為教御書臯亭山三字及崇先顯孝華嚴教寺八字以賜元末燬明洪武十二年重建仁和縣志嵗久傾廢萬厯間雪松法師重新國朝順治丙申僧覺浪住持重興大殿崇聖院崇聖紀事在鳯凰山之東一名般若菴創始於吳越王宋淳熙間更為親藩香火歴元至明古風行素二上人更新之院有竹千餘竿獨一莖秀出人呼為竹尊者釋覺範竹尊者詩髙節長身老不枯平生風骨自清癯愛君修竹為尊者却笑寒松作大夫未見同叅木上座空餘聽法石於莵戲将秋色供齋鉢林月批風得飽無永慶禪寺武林梵志在黄鶴山之陽今稱龍居灣唐清㤗間建元燬明萬厯間僧如艮等就故址構禪堂殿宇前有沼後有泉方伯吳公書永慶禪林額李流芳宿永慶禪院詩二首歸裝出西湖問道向黄鶴屢愆桐塢期偶遂龍居諾輕舟凌晨風遙山滿晴郭丹林尚可數寒條紛無托披松指㣲徑聽水捫暗壑新構爭逺勢平臺攬搖落霜後山容淺天清海氣薄暫憩塵勞心始知寂靜樂每多方外遊見僧即如故燈明一龕下夜深愜深晤不知山月上千林已流素出門㝷舊溪愛踏松影路氣和空字澄寒魄如春露去寺不數武冋曯驚莽互幽泉洗我心㣲鐘杳然度化度寺神州古史攷在江漲橋梁天監間朱异捨宅為寺名衆安隋改衆善唐改重雲再改承雲仁和縣志宋治平二年改今額元至元間兵燹至正間僧若金重建安隱寺咸淳臨安志在臨平山之南後唐清泰元年吳越王建舊名安平或謂安平以前又名永興寺外冇石幢鐫云永興寺前建墖宋治平二年改今額地生曲竹僧多取以為杖故老相傳唐邱隱士丹成羽化植杖於此其竹皆曲竹間有丹井井旁有池名安平泉極甘冽仁和縣志元至正末燬隨建明洪武二十四年立為叢林永樂初重建張丹過安隱寺詩古刹松嵐下相􅂝一徑清山鐘雲裏斷庭鳥竹間鳴落水猶春色晴溪帶雨聲不須頻禮佛吾意得無生承天宮成化杭州府志在城北三十里赤岸宋嘉泰中建寧宗御書承天宮三字為額海寧縣安國寺嘉靖浙江通志在縣治西俗名北寺武林梵志唐開元二年建名鎮國海昌院㑹昌五年廢大中四年復置名齊豐宋大中祥符元年改今額寺有大悲閣蘇軾大悲閣記杭州鹽官安國寺僧居則自九嵗出家十年而得惡疾垂死自誓於佛願持律終身且造千手眼觀世音像而誦其名千萬聲病巳而力不給則縮衣節食三十餘年銖積寸絫以迄於成其髙數仞為大屋四重以居之而求文以為記予喜則之勤苦從事於有為篤志守節老而不衰異夫為大言以欺佛者故為之記安國寺志寺有禪門大師墖藏齊安國師真身舍利墖前有雙檜蘇軾詩當年雙檜是雙童後為朱勔移去宋理宗御書妙智之閣賜之元至正元年重建海寧縣志明洪武八年真价建雲堂十一年至大建懺堂三十年惠燈拓大殿為四天王殿永樂十三年似葵建三解脫門天順間大殿燬𢎞治元年宗逺文寧重建殿後甃石為九蓮池萬厯間真慈改妙智閣為千手眼觀音殿改西方池為藏經閣崇禎甲戍鐘樓不戒於火丁丑受汰重建國朝康熙六年里人張行極倡緣買隙地構屋四十餘楹供奉五百羅漢寺為寧邑叢林之首凡雨𤾉祈禱祝聖習儀皆在於是稱海上第一名山云延恩寺杭州府志在縣西北二百六十歩俗名西寺舊為安國寺藏院海寧縣志宋建炎四年建寺元祐四年勅賜今額明洪武二十四年立成叢林釋晦山延恩寺詩名藍何代昉屬自古鹽官此日分齋鼔當年共刹竿堂標龍藏逺樹映蠏峯寒喜得門前水重開一鏡看國朝康熙八年僧岳教等募修金佛寺武林梵志在縣西松林舖東宋紹興年間建名上乗院乾道間改今額元末燬重建海寧縣志明洪武二十四年立成叢林吳本泰重遊金佛寺詩草没禪宮路不分上方仙梵若為聞僧曾識面惟留影樹可齊眉已拂雲蘚碣半欹蝸補篆風箏不語鳥呼羣友生話舊渾如夣落盡棠棃又夕曛覺王寺海寧縣志在縣西北長安鎮唐長興四年建舊名正覺宋治平二年改今額元末兵燬明洪武初重建二十四年立成叢林僧惟肅覺王結大界碑記浙西杭為巨藩鹽官為杭所屬之邑長安復為鹽官所屬之鎮覺王寺在鎮之西始乎李唐有正覺寺名逮錢氏之世屋宇墮廢但存堦基蓮花幢石尊像而已是時文穆王為太史令公判府事有邑民盛瑫吳廼者具狀陳乞欲就舊址重建藍宇公從其請實寶正六年十月也至宋治平二年改賜今額自寶正距今元豐九年一百五十有七載矣雖山門佛殿法堂方丈僧房廊宇悉備惟大界未結尚存自然之地是猶基址不築欲棟宇安立其可得乎子嘉祐庚子嵗為主僧惠嵩請居方丈尸講席凡十載未嘗一日不思結界焉無何以師老却歸因而弗果越十五年又為主僧智淵敦勉復來方丈繇是準毘尼秉羯磨立標相以結之即元豐丙辰嵗正乎月十一日也噫予之往來此寺也二紀有餘矣攷再創僅二百年而結界之務今纔成辦乃知劫大不壊之法豈偶然而得行與太平廣福寺成化杭州府志在縣東黄岡市唐齊安寺基宋建隆中有僧結茅棲止歴四十年乾徳二年額曰太平菴熙寧元年賜今額明洪武二十四年立成叢林海寧縣志明末漸圮台宗法師靈聞重開方丈像飾一新寺有老栢半枯蒼枝古幹唐宋間遺植也崇惠寺硤川志在縣東北硤石紫薇山東麓俗稱北寺元至大間僧西巖建明洪武十八年增建法堂二十四年立成叢林永樂初海鹽大理少卿朱逢吉為記惠力寺萬厯杭州府志在縣東北硤石紫薇山下硤川志畧東晉寧康間尚書張延光捨宅建初名志願唐乾元元年勅支本縣稅錢修飭唐末燬宋乾徳二年營將吳仁受捐資復建大中祥符二年賜額惠力寺宋季又燬重建於元至正二年明洪武二十四年拓為叢林嘉靖三十七年僧惠銘仍庀材鳩葺周肇引惠力寺詩侵晨入古寺山色靄㣲茫巒峯䕃喬木清樾生夏涼老僧聞客到掃徑開松堂治廚接檻溜烹茗兼蕨香啣花想鹿女獻果擬雁王假榻倚空翠流夢聞松篁竹風何泠泠吹潤滿衣裳樂此清供因不知山日長崇教寺海寧縣志在縣東北妙果山前五代長興二年建梁江州刺史戚衮夫人捨園為寺宋末廢元至順四年重修明洪武二十四年立成叢林西山廣福院武林梵志在縣東北硤石紫薇山頂宋天禧五年邑人宋坦捨宅建熙寧元年賜夀聖額隆興元年改今額兵燬元大徳間重建硤川志寺有宋李肩白碑記趙子昻篆額殿外東南隅有鐘委地青翠斑駁古色照人唐時物也今作亭懸之章孝標西山廣福院詩野寺孤峯上危樓聳翠㣲捲簾滄海近洗鉢白雲飛竹影臨經案松花㸃衲衣日斜登望處湖畔一僧歸院後舊有五顯祠國朝康熙二十三年改為文昌殿雍正八年重修里人於廣福院前建魁星閣懸崖疊石榱桷凌虚俯瞰南湖澄泓如鏡逺眺海上諸山環列几席洵硤川之大觀也碧雲寺硤川志在沈山東北缽盂嶺下竹樹森密泉石幽峭舊多合抱大樹三伏如清秋也唐大厯三年俱胝禪師開山創元末燬明洪武二年僧懐宗建殿宇齋堂萬厯四十四年僧雲浪重建佛殿僧竂拓為叢林雄壯修潔遂擅一方蘭若之勝崇禎八年僧通秀建藏經閣於俱胝巖下朱朴宿碧雲寺詩墖影蕭蕭夕照間碧雲黄葉滿秋山空堂夜冷無燈火惟有貧僧乞米還楊汝允碧雲寺詩何年卓錫寄遐踪巖壑廻看紫翠重地僻故應無暑到林深當自有雲封千山夜雨聞飛瀑半壁朝隂翳古松已覺人天坐超忽況餘清籟度疎鐘國朝順治間僧漢文募建併禪堂僧竂俱新之真如寺萬厯杭州府志在縣東黄灣菩提山東晉干寶捨宅為寺周顯徳二年建輪藏武林梵志宋治平二年賜今額海寧縣志明洪武二十四年立成叢林張九成遊南路菩提山寺次刁文叔韻詩髙僧超物外有户晝常扄海濶如天大泉甘識地靈一簾春月靜數㸃越山青便卜歸與計移文休勒銘智標墖院硤川志在東山絶頂宋僧智標建故名下有墖院明嘉靖間燬萬厯四十三年蜀僧瑞林募修唐俞登智標墖詩古墖盤空山天風吹髩寒山河開世界日月到闌千氣欲凌霄漢身疑生羽翰雲深徒極目何處是長安潘廷章登沈山智標墖詩浩劫凌虚上鴻濛足