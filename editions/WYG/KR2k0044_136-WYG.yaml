body:
  text: 浙江通志卷一百三十七選舉十五明舉人𢎞治二年己酉科陸淞平湖人庚戌進士魏忠麗水人侯汾臨海人魯府長史黄瓛餘姚人陳元會稽人癸丑進士陳槐鄞人乙丑進士姚相仁和人吳英臨安人癸丑進士王子言淳安人丙辰進士葛浩上虞人丙辰進士程銈永康人己未進士夏雷嵊人羅田知縣鄭惟欽常山人南昌教授沈煉平湖人己未進士吳照鄞人知縣裘仁麗水人錢鈍餘姚人廣州教授趙堦鄞儒士教諭孫璉慈谿人庚戌進士蔣欽夫鄞人主事姚鏌慈谿人癸丑進士王欽烏程人己未進士徐清江山人桂林推官錢瓚鄞人己未進士施佐歸安人知州李洪繁太平人楊垠會稽人知府虞岳縉雲人己未進士俞諫桐廬人庚戌進士徐璁西安人丙戌進士邵坤餘姚人丙辰進士孫景雲上虞人己未進士沈珂湖州人推官金謐山隂人知縣胡懋欽錢塘人荆府長史秦煜慈谿儒士王府長史舒聰餘姚儒士連州知州馮洙金華人甲戌進士王僖寜波人黄雄烏程人戊辰進士王珏海寧人鄭珣仁和人施奎黄巖人訓導邱吕臨海人大冶教諭葉蓁西安人梁鎛宣平人安順知府何詔山隂人丙辰進士胡昉蕭山人癸丑進士黄傳蘭谿人庚戌進士秦碧慈谿儒士通判吕浩嘉興人壬戌進士陶照秀水人庚戌進士徐珪開化人教諭姚鳳崇徳人陽江知縣髙友璣樂清人庚戌進士朱彩蕭山儒士推官江京開化人教諭金淮餘姚人吳便山隂儒士汪集餘姚儒士南安通判葉徳麗水人丙辰進士羅仕黄巖人梁寵新昌人童器平陽人己未進士裘瓖慈谿人癸丑進士陸紳慈谿人同知汪惠奉化人吉安教授胡鉞新昌人陸震蘭溪人戊辰進士陸相餘姚儒士癸丑進士張居敬新昌人教諭商汝頤淳安人禮部郎中楊清山隂人長史孫鍔鄞人戚熙金華人潘溥新昌人國子監助教陶煦秀水人庚戌進士劉光定海人丙辰進士韓華嵊人丹徒訓導鄒軒餘姚儒士丙辰會魁葉浤臨海人彰徳教授韓憲蕭山人知縣孫文原慈谿儒士教諭周任江山人乙丑進士沈俅山隂人萬載知縣吳紳平湖人朱導山隂儒士知縣余黙龍㳺人夀府長史宋溥青田人陳徴黄巖人陳良心長興人丹徒教諭以下四人順天中式馮清餘姚人癸丑進士周訓遂安人鄖陽推官陳福永嘉人侯官知縣髙靖仁和人應天中式鄭瓘寧波人福建中式董俊鄞人癸丑進士湖廣中式尚絅嘉興人癸丑進士河南中式沈峻德慈谿人廣西中式平紞仁和人雲南中式𢎞治五年壬子科秦文臨海人癸丑進士胡世寧仁和人癸丑進士孫燧餘姚人癸丑進士韓亷餘姚人丙辰進士張聰仁和人教諭髙臺山隂人癸丑進士李堦永嘉人辛未進士張文淵上虞人己未會魁徐憲嚴州人姜榮餘姚人壬戌進士鄭宣麗水人癸丑進士錢暉會稽人己未進士魏朝端餘姚人思恩同知朱憲山隂儒士同知屠奎平湖人己未進士吳天祐餘姚人癸丑進士諸文實餘姚人徐沂永康人癸丑進士郭楫海寜人乙丑進士陸儞鄞人癸丑進士方廷憲慈谿儒士鮑璋鄞人丙辰進士周記樂清人蔡春西安人葛廷輔慈谿人陸璥蘭谿人許性天台人馬敬會稽人推官周淵臨海人濵州學正常龍嘉興人夀州知州楊抃餘姚儒士長洲教諭盧楫東陽人趙萱桐鄉人國子助教鄭滿慈谿儒士賈璋金華人廣西布政司龔侃上虞人通判陸唐餘姚人吳熙黄巖人王潮鄞人知縣葉抃金華人趙崇賢太平人訓導潘龍仙居人教諭錢玹蕭山人乙丑進士季一聰臨海人御史吾翁開化人戊辰進士陳大紀上虞人丙辰進士陳觀湖州人亳州學正周沂慈谿人儒士朱珙蕭山人程鄉知縣黄巽鄞人壬戌進士趙鑑臨安人潮州通判鄭恭常山人沭陽教諭張維慈谿人施徳禎餘姚人辛未進士項匡臨海人壬戌進士盛杲臨安人膠州知州李寅縉雲人乙丑進士聞人才餘姚人儒士孫球臨海人袁州推官葉鳳靈太平人壬戌進士徐瑤常山人癸丑進士張實蕭山人教諭章文韜黄巖人己未進士陳璠上虞人長史陸嵩歸安人丙辰進士程文楷淳安人司馬公銍山隂人訓導周謨杭州人御史田惟立山隂人知州王守仁餘姚人己未會魁錢榮桐郷人霸州知州李享太平人陳垣臨海人儒士蔣誼鄞人教諭陸崑歸安人丙辰進士任山慈谿人知縣宋躍餘姚人儒士王朝佐平陽人丙辰進士吳杲山隂人唐珉仁和人興國知縣楊佑餘姚人沈暕雲和人乙丑進士孫懋慈谿人辛未進士胡悊紹興人孝感知縣范璘臨海人丙辰進士沈賚慈谿人丙辰進士李瑾麗水人徐冕山隂人運同徐潭錢塘人丙辰進士項綱嘉興人鄧鑾仁和人乙丑進士方璽餘姚人經魁以下六人順天中式蔡栻錢塘人丙辰進士恵隆仁和人癸丑進士姚僖德清人戊辰進士汪獲麟山隂人癸丑進士諸忠餘姚人知縣施學古安吉人知縣以式下四人應天中楊梁餘姚人知縣吳夔西安人永嘉教諭鄭瓛平陽人己未進士傅乾鄞人廣西中式尚繻嘉興人以下二人河南中式婁睿嘉興人𢎞治八年乙夘科陶諧會稽人丙辰進士楊叔通鄞人戊辰進士王瓚永嘉人丙辰榜眼馮安慈谿人儒士任德和上虞人姜芳蘭谿人大理司務黄堂餘姚人金逵鄞儒士丙辰進士陶璐會稽人知縣袁一誠仁和人星子教諭汪獻錢塘人壬戌進士吕廷簡新昌人長史朱諫樂清人丙辰進士葉良麗水人壬戌進士黄章黄巖人豐熙鄞人己未榜眼楊欽建德人知州葉逢春淳安人莒州學政向錦慈谿人己未進士陳恩西安人戊辰進士徐瓚蕭山人知縣應鳳慈谿人教諭夏釜餘姚人知州周禎山隂人壬戌進士陳諮秀水人丙辰進士錢士宜會稽人同知秦禮臨海人己未會魁盛夏餘杭人倪宗正餘姚儒士乙丑進士沈文滂蕭山人靈璧教諭陳元昭諸暨人長史蔡中孚德清人丙辰進士沈欽山隂人壬戌進士徐黼山隂人州同朱佐鄞儒士杜欽餘姚人西