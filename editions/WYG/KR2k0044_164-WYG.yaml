body:
  text: 浙江通志卷一百六十五人物二忠臣三台州府三國呉張悌兩浙名賢録字巨先臨海人厯官丞相天紀四年晉師伐呉孫皓使悌督沈瑩諸葛靚師渡江逆戰呉軍大敗諸葛靚與五百人退走使人迎悌悌不肯去靚自往牽之謂曰國家存亡自有大數豈卿一人所支何自取死為悌曰我童兒時便為卿家丞相所拔常恐不得其死負名賢知顧今以身殉社稷復何遁邪靚流涕放之去百餘步已見為晉軍所殺謹按三國志注襄陽記悌襄陽人而赤城志及府縣諸志俱以為臨海人存以俟考宋江仲明宋史詹良臣傳仲明台州人宣和寇亂載老母逃山澗中猝遇寇於東城之岡逼使就降仲明義不辱奮起罵賊死之丞相吕頤浩誄以文蔣煜赤城志仙居人有文學宣和寇亂與煜遇欲妻以女煜拒之脅以拜亦不從寇曰吾戮汝矣煜伸頸就刄詈聲不絶煜性滑稽其臨事有立如此王衡赤城志字平仲臨海人大觀中舉八行歳貢後死方臘之亂賊首聞之自戮其黨數人曰何敢殺王佛子張埏徐一夔張氏家譜臨海人靖康之亂從參政謝克家與金人戰江上死節左㻫赤城志字文琰黄巖人璠之弟為賀正書狀官死於難陳克台州府志字子髙臨海人貽序子博學能詩薦為删定官尚書吕祉帥建康辟致為屬後祉參督府謀議復從至淮西紹興間酈瓊叛殺祉克奮勇出戰兵敗就擒叱令屈膝克曰吾宋臣也寧為珠碎不為瓦全賊積薪焚之克罵不絶口聲如震雷衆懼羅拜舉酒酹曰真忠臣也軍民聞之號慟如喪所親張玘台州府志字子佩寧海人嘉熙進士厯官浙西憲幹伏闕三上書言天下計斥死嶺表張華宗仙居縣志字君實寶祐間以明經補國學除杭州教授轉揚州臨江謹身率士所至有聲開慶元年元兵壓境翼同官拒守久之臨江陷元兵火文廟大呼曰不降者我也當速殺曷為令先聖無依耶遂遇害詔諡忠烈賜大夫秩杜滸宋史鄒㵯傳滸字貴卿丞相範從子徳祐元年有詔勤王滸時宰縣糾集民兵得四千人文天祥開閫平江往附焉時陳志道等贊天祥出使滸力爭不可已而天祥北行無敢從者滸獨慨然請行特改兵部架閣從京口以計賂守夜劉千戸得官鐙脱天祥偕走淮甸由海道以達永嘉益王即位授司農卿尋往溫台招集兵財福安陷與天祥相失久之奉命復入天祥幕及空坑兵敗又與跋涉以出徑趨厓山兵潰被執以憂憤卒王珏赤城新志字叔寶仙居人咸淳進士徳祐初以太學博士權知台州與陳仁玉築城浚濠堅壁以守城陷赴泮水死寇兵至取首級以獻功其姪賔服珏衣冠自殘以全珏遺體邵囦赤城新志字叔魯臨海人咸淳進士厯本州教授元兵臨城火學宫端坐而死牟大昌台州府志字逢明黄巖人宋末應文天祥檄與姪天與聚義兵勤王浙東提刑杜淵辟大昌為都將天與副之元兵陷台州率衆禦之題其幟曰大宋臣牟大昌義兵力戰而死從妹則娘投崖死兄士伯二女皆自經宗族男女死者不可勝訃趙時栗仙居縣志字寛甫咸淳進士授海鹽主簿募民與元兵對壘者二旬食盡度不能支遂䇿馬突入敵營手刄數騎而死丁衡台州府志天台人咸淳辛未進士赴江西提刑任途遇元兵不屈而死弟衛亦辛未進士厯官校書郎以賈似道當國致仕宋亡縞素終身累召不起髙申甫舊浙江通志字宣卿仙居人由武科除景陵令多恵政元兵至率民力戰死之徐副尉天台縣志失其名元兵破臨安宋幼主由慶元南奔元兵追弗及分兵經天台趨寧海邀之副尉率鄉兵拒於關嶺元兵不能度宋主得浮海去元兵怒從别道抵台邑徐氏男女無少長皆被害鄉人作大墓瘞之獨乳母王氏抱所乳兒歸寧得免三傳至善述始大顯張和孫兩浙名賢録字哲齊臨海人文天祥自通州泛海過其家約舉義兵將取明州不果後張𢎞範入寇見壁間檄捕得之哲齋知不免語𢎞範曰吾生為宋民死為宋鬼何怪我為遂遇害趙孟僴嘉靖浙江通志宋宗室家黄巖文天祥見之曰瑚璉器也後天祥開閫江東浙西俱辟以行及召赴闕孟僴留呉中宋亡元兵執孟僴欲官之固辭以疾遂去呉依親友以居絶口不談宋事及天祥卒為文祭之慟絶復蘇臨終口占曰王室之懿文山之客一朝從容千古忠赤端坐拱手而逝所著詩文名湖山汗漫集元林夢正輟耕録字古泉黄巖人以著述薦擢溧陽教授賊寇溧陽獲賊魁張某問之曰我父為軍千户紅巾入境逼我父為帥父以年老令我代之夢正罵曰爾祖父世為國臣而爾忍從賊耶既而賊勢復盛竟奪張去下令曰生得林教授者有賞夢正匿他處搜得之張曰前日罵我者非爾耶降我則俾爾為元帥夢正終不屈縛於樹殺之潘伯修赤城新志字省中黄巖人嘗三舉於鄉試春官卒不遇遂𨼆居教授以著書為事旁通天文地理律厯之學為詩文皆寓微意曰文章不關濟世教雖工無益也方國珍寇海上浙江參政多爾巴勒總兵至將盡屠邊海之民伯修挺身率父老詣軍前力爭曰倡亂者獨國珍爾吾民無罪也乃得免後竟為國珍所害台州府志方氏刼致慶元欲使長幕府力辭歸使盜待諸隘殺之陳恢兩浙名賢録字仲廣黄巖人至正庚寅方國珍寇海上境内騷動恢所居僅一里聚其族人及鄉之好義者禦之不克寇以利誘之恢輒罵不從既而與戰於白楓河宗族死者八十餘人寇勢益盛恢自度終不能敵逃入山中以憂憤卒洪世安臨海縣志字用之至正十三年方國珍陷台州世安率鄉勇阻守三江賊猝至寡不敵衆乃夜縛田中粟桿萬餘各挿火炬賊疑為兵至遂退世安率衆追十餘里後賊知悉衆來攻遂被執臨死罵不絶口明太祖遣朱亮祖平國珍至台訪世安忠義欲官其子檥百戸辭不受遂世免其徭台哈布哈元史本傳字兼善巴約特氏初名達布哈文宗賜今名父塔布台仕台州録事判官遂居於台年十七浙江鄉試第一明年對䇿賜進士及第授集賢修撰順帝即位出僉河南司事轉江浙行省左右司郎中浙西大水害稼台哈布哈力言於中書免其租至正元年除紹興路總管革吏弊除沒官牛租令民自實田以均賦役行鄉飲酒布禮教民興讓越俗大治黄巖民方國珍為亂台哈哈上招捕之䇿不聽除江東亷訪使國珍入海燒掠沿海州郡十一年詔博囉特穆爾為江浙行省左丞總兵至慶元以台哈布哈諗知賊情狀遷浙東道宣慰使都元帥分兵於温州使夾攻之國珍寇温台哈布哈縱火筏焚之遁去既而博囉特穆爾戰潰被執為國珍飾詞上聞遣大司農達實特穆爾等至黄巖招之國珍兄弟皆羅拜退止民間小樓詔台哈布哈欲命壯士襲殺之達實特穆爾曰我受招降公欲擅命耶乃止檄台哈布哈親至海濵散其徒衆拘其海舟兵器國珍兄弟授官有差遷台哈布哈台州路達嚕噶齊十二年國珍復入海以叛台哈布哈自分以死報國發兵扼黄巖之澄江而遣義士王大用抵國珍示約信使之來歸國珍拘大用不遣以小舸二百突海門入州港犯馬鞍諸山時國珍黨陳仲達往來計議陳其可降狀台哈布哈率部衆張受降旗乗潮而前船觸沙不能行與國珍遇呼仲達申前議仲達目動氣索台哈布哈覺其心異手斬之即前搏賊船射死五人賊躍入船復斫死二人賊舉槊來刺輒斫折之賊羣至欲抱持過人國珍船台哈布哈瞋目叱之脱起奪賊刀又殺二賊攢槊刺之中頸死猶植立不朴投其屍海中僮名抱琴及臨海尉李輔徳千戸持嘉義士張君璧皆死之追贈江浙行省平章政事封魏國公諡忠介立廟台州賜額崇節呉揚台州府志字仲修仙居人少負大志好騎射至正間郡監亷其才擢署黄巖州判會睦溪盜犯仙居遂陞州同知率部兵逆戰於羅漢潭挫其鋒有鄉民陰為賊導賊掩其後揚格鬭大創而死長子熅襲職與弟燾炘等涕泣誓師趨搗賊巢獲其渠魁并向導者剖肝以祭之朝嘉其父子忠孝廟祀揚并官燾炘應允中台州府志字徳聞方國珍反允中與宋俌潘義和等募壯勇萬餘人戰於半野橋墮水遇害贈臨海尉陳宣太平縣志字欽召至正間方國珍寇海上郭仁本與之通宣令鄉民禦之仁本焚其廬宣自剄張維賢仙居縣志字允徳維大弟虬髭猿臂至正間薦授南漳監鎮累勲擢武徳將軍晉爵侯食邑萬戸與明兵戰於蘭谿失利被獲初劉基與之善至是劉如械所説之降維賢曰吾非不知若主長者顧吾弟兄並開府受國恩不忍背也洎就刑劉與太祖曰主上掃平六合不宜使天下有殺義士名太祖頷之謫戍武林不食七日死明葉伯巨方孝孺葉伯巨傳字居升寧海人入太學未久詔諸生分教河北弟子伯巨得平遥縣洪武九年星變下詔求言伯巨為書言三事曰分封太侈求治太急用刑太煩其語皆切直上大怒曰小子何敢疎間吾骨肉速取以來吾將啖其肉伯巨至丞相乗上喜乃敢奏詔繫刑曹問狀死獄中葉良器台州府志寧海人慷慨有大節元末擾攘能保障鄉里歳已亥總制官胡深薦為千戸勦山寇及征方國珍克平陽城陞萬戸深入敵境被獲不屈遇害詔存䘏其家方孝孺朝野彚編字希直一字希古寧海人年十四事父克孝從宋濓遊盡得其所學以明王道闢異端為己任洪武十五年以呉沈薦召見上喜謂太子曰此端士也當老其才輔汝遣還鄉二十五年召至擢漢中府學教授蜀獻王聞其賢聘為世子師名其讀書之廬曰正學太孫即位召為翰林博士進侍講學士備顧問改文學博士北兵起日召謀議詔檄皆出孝孺手北兵既渡江畫䇿堅守誓死社稷建文遜去孝孺衰服晝夜慟哭姚廣孝謂成祖曰陞下至京幸全方孝孺若殺此人則天下讀書種子絶矣乃使廖鏞兄弟召之孝孺不肯屈令鎮撫伍雲收孝孺繫獄猶遣人諭之再三不從因使孝孺草詔乃召見孝孺號慟聲徹殿陛上降榻勞曰先生何自苦余欲法周公輔成王耳孝孺曰成王何在上曰渠自焚死孝孺曰何不立成王子上曰國賴長君曰何不立成王之弟上曰朕家事先生何自苦遂授筆札曰詔天下非先生草不可孝孺投筆於地曰死即死詔不可草上曰汝不顧九族乎孝孺奮然曰即殺十族亦無如何且罵且哭上大怒令以刀抉其口兩旁至耳磔之聚寶門外罵聲不絶時年四十六詔收其妻妻鄭巳先縊籍九族皆誅上怒不已必欲誅十族乃以門人廖鏞等為一族誅之凡坐死者八百四十七人謫戍死者復數百人典史魏澤為匿其幼子洪熙初仁宗嘗諭羣臣曰若孝孺輩皆忠臣也詔從寛典方氏遺族始有赦還者因立祠堂祀之成化初遺文始出王叔英名山藏字原采黄巖人洪武初與楊太中葉見太方孝孺林右並徴辭還久之薦授仙居訓導陞漢陽知縣建文初召拜翰林編修言太祖除奸剔穢抑强鋤梗若醫去疾若農去草急於去病或傷體膚嚴於去草或傷禾稼疾去宜燮其血氣草去宜培其根苗又論行限田以數千百言靖難師渡江叔英募兵廣徳聞都城破仰天慟哭夜留題几上沐浴衣冠書絶命詞衣裾間自經元妙觀銀杏樹下妻金死獄二女死井中弟元黙變姓名匿市賈為鄉人金寛所識告成祖捕斬之剉其屍鄭華獻徴録字思孝臨海人洪武丁丑進士授行人奉使川廣有聲譽建文中詿誤謫東平州吏目靖難兵起謂其妻蕭曰吾義必死奈親老汝少何妻泣對曰君能為國妾獨不能為君乎華乃稱疾尋醫攜家托其友無錫丞趙次進馳還東平時州長貳盡棄城走華獨率吏民死守水漿不入口者三四日北將朱能攻陷東阿分兵取東平華曰守土之臣義不茍生請援不至力疾戰不屈死之時年甫三十祀八忠祠鄭恕備遺録字本忠仙居人由訓導陞蕭縣知縣靖難師至竭力拒守被擒而死二女當配亦死之子濓湜亦從坐盧原質續文獻通考字希魯寧海人母方孝孺姑也任太常少卿事建文君屢有建白靖難後召見不屈死之弟原樸亦論死族其家林嘉猷嘉靖浙江通志名昇以字行寧海人始師事同邑王琦𤦺坐累徙雲南姻族無一人顧恤者嘉猷徙步千里追送涕泣與别人髙其義後復行六千里至漢中求方孝孺而師焉方氏之門嗜學之士至者無虚席而孝孺獨以得嘉猷及鄭叔貞為善朂之使進乎聖賢之道曰匡我者二子也洪武二十九年以儒士校文四川蜀王謂其名字不相䝉乃更其名曰良顯由薦辟為史官累遷至陜西按察司僉事嘗被燕邸召入居處最久得𨼆以告孝孺内難平坐孝孺黨逮至京死之鄭公智吾學編字叔貞寧海人力學嗜古工文辭方孝孺薦之蜀獻王王與語經史公智數稱述河間東平賢行王説之建文初侍孝孺至京尋舉賢良為監察御史持法不阿靖難後坐方黨論死葉恵仲吾學編名見恭以字行臨海人與兄見太並有文名稱二葉初任廣武衞知事陞知縣建文初充史官修髙廟實録二年同考禮部陞知府永樂元年坐修實録時書靖難事為逆黨論死籍其家盧迥朝野彚編仙居人建文三年為戸部侍郎少喜飲酒酒酣輒長歌人或謂狂既仕折節恭慎靖難後不屈就刑長謳而死張岵台州府志字原望洪武乙丑進士任監察御史丁父母憂廬墓家居聞建文祚移自溺雙溪鬭巖潭而死兄弟五人皆坐方氏黨編發邊衞徐垕獻徴録字宗實黄巖人洪武初薦除銅陵簿擢蘇州府通判奏發粟二十萬以活飢民春漲堤壊垕相度原隰大興築捍之役屬邑有樓貞婦奏乞旌表禮部謂前朝事不允垕言比干之墓誰封禮官不能奪從之厯官兵部侍郎靖難師起奉命招集兩浙義勇會建文遜位被逮至京不屈死籍其家石允常獻徴録字恆徳寧海人洪武甲戌進士厯官河南按察司僉事廉介有聲人稱石清潭靖難師起允常棄官歸文皇即位逮至繫獄謫戍中屯衞林右世法録字公輔臨海人洪武初為中書舍人奉璽書行邊有功進春坊大學士命輔導皇太孫以事謫中都教授尋挂冠歸靖難師入聞方孝孺族誅為位以哭永樂戊子賊訌海上台被其毒監司聞右才請為閭里計右勉起視兵督郡子弟勦平之上以此知右遣使召之不赴令武士械至京師猶以温語相慰勞右對曰罪人逃死已久藉令可任當與方孝孺同朝矣上怒命劓之竟死朱思平天台縣志字廷準洪武丁丑進士除中書舍人建文朝命為翰林院侍書親老乞歸靖難時在籍聞變長號涕泣作哀詞飲藥而卒髙昕台州府志字彦容以掾考需次銓曹忤權官謫戌大同時英宗北狩總兵定襄侯郭登聞其行能使進衣行在且覘敵情比還大同被寇登問計昕以彼懸騎深入利在速戰但堅壁勿與交鋒彼食盡將自遁選輕騎躡其後則敵不足破也已而果遁追至沙窩敗之獲人馬無算陞鴻臚寺序班寇突至復力戰却之中流矢卒齊汪天台縣志字源澄正統丙辰進士累官車駕司郎中土木之變文武官軍踰山而逃或勸汪亟回汪曰吾聞扈駕而出未聞先駕而入也竟死其難鄔中涵寧海縣志字世元兩登副榜嘉靖壬子貢於京授福清訓導倭寇福清邑故無城令是邑者以單弱莫守委之而去中涵曰一命之臣皆有封疆之責況我官訓導當以忠孝為訓而顧可自叛名教乎爰鼓士氣集鄉勇樹髙栅身冒失石與賊對壘待援及督撫兵至而中涵已中飛矢死矣聞於朝加贈䘏命祀於學宫張約台州府志字存博仙居人邑諸生嘉靖丙辰倭寇犯境率家人禦於光山之麓為賊所執脇導入城不從賊刳其舌猶噴血罵不絶口劉國賔閩書以台州衞指揮任烽火把總萬厯元年海寇林鳳數十船突入港國賔檄協總刻期同勦至斤竹洋與賊遇協總後期不至人勸之避曰死吾分也轉戰至寨前發銃反風焚舟戰士俱殲國賔死之巡按劉良弼題請䘏録陳函煇台州府志字木叔臨海人母應氏誕時夢寒山子至家因號小寒山崇禎甲戌進士授靖江令開月河八十八里直達維揚水利以興庚辰奉㫖視師海上渠魁就擒擢兵科給事為忌者所抑罷官居里甲申聞變從郡大夫為位以哭慟不能起徑上雲峯自擇六月庚寅日死時尚隔旬餘自序小寒山子年譜作自祭文雲峯埋骨記絶命詩十章及别親友詩數百函届期自經死遂葬於雲峯寺前著有七寒九青諸集行世應昌士舊浙江通志字君寧仙居人崇禎庚辰以特恩賜進士授安定知縣癸未闖賊圍安定昌士倡兵民登陴死守越月城陷被執賊欲降之昌士奮罵不屈妻周氏與女真在旁亦奮罵賊先殺以脇之昌士笑曰各得死所矣終不屈械至蘭州偽帥親釋其縛從容勸曰識時勢者呼俊傑昌士舉杯擊偽帥首即席遇害僕趙登裹屍還安定與周氏合葬於東山國朝許鴻儒舊浙江通志太平人字象垣順治四年歳貢選栁州羅城縣知縣到任日桂林失守羅城勅贈孤立無援被執不屈死弟男五人俱遇害廣西按察司僉事遣使祭葬廕一子入監余煜鄉賢留祀册臨海人康熙甲寅耿逆遣曾養性犯界時寧海將軍統師勦之募敢言之士先往招撫煜毅然應召授知州職銜縋城説賊遂遇害婁汝初旌忠册黄巖人任寧波城守營千總康熙三十六年十一月二十五日捕賊於慈谿之陽覺殿力戰而死營卒梁國棟陳勝朱建侯任吉胡虎臣同被害事聞廕一子以守備用許文爵旌忠册浙江人任黄巖鎮標右營把總康熙五十年十一月出洋巡防二十五日海賊蕭利王突至弔幇文爵及營卒張萬鄭瑞等並力戰陣亡事聞廕一子衞千總張萬等䘏賞銀各五十兩金華府宋梅溶浦陽人物記其先呉興人五代時有諱聳者始遷浦陽遂成巨族以薦為單州助教年七十餘攝松陽丞宣和二年盜發青溪據歙睦遂破杭明年婺衢處相繼陷兵及境溶勢不能敵死之從子執禮言於朝官其二子敦時敦成胡埜金華先民傳金華人事親以孝聞崇寧間應八行舉除婺州教授宣和二年方臘反青溪據歙睦明年兵及婺境官吏皆聞風棄城遁諸生勸埜避難埜曰我先世以武功顯而我應八行舉豈可上負朝廷下辱先世耶城陷闔室皆死之事聞贈朝奉郎官其二子申屠大防金華先民傳東陽人勇果有武藝妙戰法往往為偽遁誘人追之背手取馘其捷如神宣和初睦寇起官吏迸走民竄山谷大防毅然以身禦寇勦除魔賊仙姑邑人賴之時有薛太尉者奉命討賊檄大防權東陽縣事約往永康收方巖賊既行而薛後期大防無援力戰死録其三子邂逖迪承信郎項徳宋史鞫嗣復傳徳武義人郡之禁卒也宣和間盜發幇源陷婺而邑隨沒徳率敗亡百人破賊因據邑之城隍祠東抗江蔡西拒董奉北捍王國大小百餘戰出則居選鋒之先入則殿後俘馘不可勝計賊目為項鷂子聞其鉦則相率遁去方謀復永康諸縣而官兵至徳引其衆欲合會賊盡鋭邀之黄姑嶺下徳戰死邑人哭聲震山谷圖其像歳時祭之許瓊金華先民傳字子英東陽人睦寇竊發瓊集鄉兵捍之民賴以安奉檄援郡城有功補奉義郎攝郡事既而兵食不繼與寇力戰死之屍殭立如生所乗馬馳歸鄉人為立廟祀於巖關之陽梅執禮宋史本傳字和勝浦江人第進士以薦為武學博士厯知滁州集英殿修撰時賦鹽虧額滁亦苦抑配執禮請於朝詔損二十萬欽宗立徙知鎮江召為翰林學士道除吏部尚書改戸部金人圍京都執禮勸帝親征用事者沮之洎失守金人質天子邀金帛以數百千萬訃執禮與同列陳知質程振等窒其求曰臣民皆願致死於金繒何有哉顧比屋枵空無以塞命耳帥怒俄遣還將及門呼下馬撾殺之而梟其首是日天宇晝㝠士庶皆隕涕初車駕再出執禮與宗室子昉諸將呉革等謀集兵萬勝門夜搗金帥帳迎二帝以歸而范瓊泄其謀故不克死時年四十九髙宗即位詔贈通奉大夫資政殿學士陳徳固兩浙名賢録金華人靖康初為京城守禦司屬官嘗獻守禦之䇿朝議沮之及京城失守督士卒與敵力戰而死子巖肖以任子中紹興戊午詞科劉滂宋濓劉滂傳字徳霖武義人與梅執禮同遊學號東梅西劉大觀己丑進士調新昌令豪鄒氏横里中挾貴婣誣人死滂捕致械治之部使為請不聽卒傅以法蔡京與滂祖為布衣交滂至京師京欲挽為黨滂拂衣去建炎中知建昌軍建昌兵習悍驕邀求無度滂至一以法繩之兵不勝忿持㦸入市掠人物即拒者刺傷之滂捕繫追償兵遂為變滂及母妻皆死其妻湯氏侍姑側兵及身猶不去故遇害建昌人聞滂死皆慟哭失聲朝廷既誅始亂者褒滂為朝請大夫官其一子墉應純之金華先民傳字純甫永康人嘉泰三年進士厯知楚州兼京東經畧安撫使收捕李全等所向多捷會李全來歸宻請於朝謂中原指日可復史彌逺鑒開禧事不欲大舉但敕立忠義軍令純之節制既而陞兵部侍郎與金戰沒於陣朝廷嘉其忠遣使葬之吕祖泰宋史本傳字泰然夷簡五世孫慶元初兄祖儉以言事安置韶州祖泰徒步往省之且曰自吾兄之貶諸人箝口我雖無位義必以言報國當少須之今未敢以累吾兄也及祖儉歿貶所嘉泰元年周必大降少保致仕祖泰憤之乃詣登聞鼔院上書論侂胄有無君之心請誅之以防禍亂書出中外大駭拘管連州右諌議大夫程松奏言祖泰有當誅之罪縱不殺猶當杖黥竄逺方侍御史陳讜亦以為言乃杖之百配欽州牢城收管祖泰知必死冀以身悟朝廷無懼色既至府廷尹為好語誘之曰誰教汝祖泰笑曰公何問之愚也吾固知必死而可受教於人且與人議乎尹曰汝病瘋喪心耶祖泰曰以吾觀之若今之附韓氏得美官者乃病瘋喪心耳侂胄誅詔雪其寃特補上州文學改授迪功郎監海嶽廟喪母無以葬得寒疾索紙書曰吾與兄共攻權臣今權臣誅吾死不憾獨吾生還無以報國且未能葬吾母為可恨耳乃卒尹王柟為具棺斂歸葬焉李誠之宋史本傳字茂欽東陽人受業吕祖謙鄉舉第一後入太學舍選亦第一慶元初為饒州教授擢國子學録以言罷起為江西轉運司幹辦使改通判常州知郢州知金人必敗盟大修邊防戰攻守禦之具移知蘄州蘄自南渡以來未嘗被兵誠之相視城壁而增益之嘉定十四年金人犯淮南時誠之已逾滿代者不至欲先遣其孥歸聞難作而止乃選丁壯分守募死士迎擊大破之殺其帥金人屢挫謀益巧攻益力未幾又殺其將卒數十人奪所佩印金人卒不得志會黄州失守倂兵為一凡十餘萬池陽合肥援兵敗走誠之激厲將士勉以忠義城陷率兵巷戰殺傷過當子士允力戰死誠之引刀自剄妻許及婦若孫皆赴水死事聞贈朝散大夫祕閣修撰封正節侯立廟於蘄贈其妻令人士允通直郎子婦及孫女之沒於難者皆贈安人童必大義烏縣志字本厚嘉定丁丑進士授竹山令厯安定知府寇發率民兵捕勦次年寇復圍城嘆曰生死有定忠孝豈能兩全統兵赴敵遇害諭葬銅山樓斌續浦陽人物記字一中浦江人私淑倪文卿氏讀其疏草知兵食戰守之䇿山川險要之處冀旦暮得當以佐恢復每聞雞起舞曰中原陸沈豈丈夫安枕時乎聞史彌逺矯詔殺濟王作詩哭之詩漸傳播逢彌逺意者逮治斌斌不為屈會有解之者得釋登淳祐十年進士累官至翰林説書開慶元年賈似道鄂州乞和以捷聞斌直發其奸章三上似道怒嗾言官劾其誣罔受責傷重賦詩而逝劉仕龍馮夢得劉仕龍墓誌字時甫世家於婺淳祐辛丑進士從戎鄂州秩滿幹辦江陵府御前諸將軍統制公事召試閣職除閤門舍人請外知復州尋守賔繕闗隘飭鬭器未幾易守廉備廉如在賔時數條上邊事時宰忌之徑坐是去景定改元詔知雷州兼理軍務會敵犯疆統領諸將出禦中流矢以歿封武節侯許伯繼金華先民傳字為可東陽人父子良仕至台州守伯繼以廕入官咸淳末差婺州通判時李珏開府處州辟伯繼主管機宜文字未幾移閫永嘉元兵入臨安三宫北遷宰相陳宜中以衞益二王如永嘉元兵追及之力戰數日城破珏降伯繼就縛不屈死之章堉金華先民傳永康人咸淳末都城失守浙東諸郡多陷時衞益二王在福州堉與弟塈捐家資募忠勇得義兵數千收復婺城制置使李珏以聞授堉直祕閣知婺州塈主管官誥院通判衢州與元兵力戰於丁鼠山援絶城陷堉與塈皆死之胡徳廣東陽縣志字及之景定庚申元兵渡江奸人因之為盜徳廣鳩聚鄉兵撫安邑境郡縣上其功特授迪功郎尉仙居縣以親喪不赴徳祐初元兵入臨安宋丞相奉三宫赴燕徳廣曰吾以身許國義當與國存亡遂集義勇日夜訓練之未幾婺州破乃嬰城自守會永康章堉起兵復郡遣人邀徳廣徳廣曰吾去則奸謀復起亂在肘腋遂不往未幾堉敗元兵乗勝至東陽徳廣據險拒之元兵屢挫前謀逆者附於元以間道示之攻其後衆遂潰徳廣不屈死其配朱氏亦自刎死唐元章兩浙名賢録一名太初字子煥蘭谿人韶之弟也為文思院官徳祐失國二王南遷元章與兄韶子良嗣起義興復時元兵壓蘭谿元章與戰於黄湓灘破之斬其將奚達嚕元兵退保桐廬遂進兵拒守嚴州朝廷以元章為朝請大夫知嚴州良嗣加閤門宣贊武翼將軍江淮閩浙都統兵馬使相持二年糧援不繼戰不利將趨閩以圖再舉元兵大至元章戰死於龍游白雲寺前元主帥索多以雙虎符金牌招良嗣不從亦戰死於仙霞嶺徐道隆宋史趙良淳傳道隆字伯謙武義人以任入官累官潭州判官權知全州荆湖制置使汪立信奏辟為參議立信遷兵部尚書趙孟傅為制置使以道隆為提㸃刑獄時文天祥既至平江潰卒四出為浙西患安吉尤甚有㫖命道隆措置乃梟其首亂者於市牛監軍遁范文虎程鵬飛管景模俱遺書誘降道隆焚書斬使元兵至郡守趙良淳既縊死徳祐二年正旦追兵及道隆死戰矢盡槍槊折一軍盡沒道隆見執艦内赴水死長子載孫亦赴水死呉世鳴舊浙江通志蘭谿人厯官提幹終錢塘縣令時元巴延駐軍江沙世鳴挺身出戰死之栁敘浦江人物補遺字元徳貫從父也為蘭谿縣尉宋亡慟哭絶食而卒元胡嘉祐金華先民傳字元祚永康人至正乙未縉雲蒻溪賊剽掠逼境嘉祐白邑令為防禦訃乃散家財集丁壯立保伍大書其幟為義兵賊不敢犯詐降尋復旁出抄擄會官兵至嘉祐率其兵助討之賊退兵駐邑中頗恣睢嘉祐扣軍門白主帥樹旗於鄉約曰敢擾吾民者殺無赦士卒皆如約鄉民安堵令嘉其能上其名於憲府署曰義士俾與方允中合而拒賊賊不敢越鯉溪而西歳丁酉賊寇武平合徳嘉祐與戰大破之戰於前倉又破之遇於占田嘉祐盡鋭與戰顧謂允中曰賊衆我寡惟死鬭耳自辰至午戰酣不解允中歿於陣嘉祐自分不獨生戰益力厲聲罵賊死之唐元嘉金華先民傳字顯徳蘭溪人進士釋褐授仁和縣丞陞浙江行省掾至正末從丞相達爾罕節制金陵兵敗被執不屈死之劉良兩浙名賢録金華人辰之從父也仕元為常州萬戸府知事張士誠圍常州援兵不至良遣其子毅齎蠟書浮江間道抵江浙行省求救未及還而城陷良不屈闔門赴水死者十餘人趙大訥金華先民傳一名良勝字叔敬浦江人起家譯曹掾調泉州録事盜起寧都泉之無賴嘯聚應之遂來攻城大訥作大棚以遏其衝寇退轉興化録事遷龍溪尹俗尚鬼壘石作祠奉紫衣神黠民將為奸大訥棄神江中移石修孔子廟縣多山畬峒獠輒弄兵暴掠大訥調御得術服從如良民調温州永嘉尹遷知永新州鵠湖羅陂皆羣盜淵藪大訥出竒訃翦渠魁餘黨奔散請老加婺州路總管府同知致仕戊戌明兵破睦州至浦江或誘之降大訥曰吾元朝老臣惟有一死報國耳或强之行曰吾不能行使之乗曰吾不能乗刃之不殊病創死陳達兩浙名賢録字元達蘭谿人自中之孫也父萍仕元為宣政院使達自少徴入宿衛學書於康里子山詔書欽安殿榜稱㫖擢端本堂司經正字文學官立朝蹇諤嘗劾圖嚕特穆爾忤㫖賴太子營救得不死辭官歸永嘉從進士陳髙受尚書語及時事輒於邑流涕復召為翰林學士不起明師下温州自沈於淵軍士引出之持佩刀自裁軍士奪之乃斷髮示無用安置濠州遇赦還蘭谿病風痺聞有薦於朝者却藥弗御卒明鄭得續浦陽人物記浦江人龍鳳七年胡大海為江浙行省中書開府金華有薦得才者署為税課使并參軍事用其言約束卒伍加意市㕓四方商賈凑集錢幣倍增次年苗兵蔣英等作亂殺大海守宰咸遁去得急取印劵置他處亂兵索印斮其左手得詈曰首可斷印不可得李右丞在睦爾輩直釡中魚耳賊懼釋之越二日李文忠赴難賊遁得以重傷卒王褘名山藏字子充義烏人善文辭與宋濂並受學於元學士黄溍與濂齊名李文忠守金華用褘為儒士召署中書省掾上常字之授江西儒學提舉司校理除侍禮郎兼引進使遷起居注轉同知南康府事上將即位召議禮忤㫖降漳州府通判天下既定租税未盡減除褘至郡具以均徭薄賦言於上上嘉納之召還與宋濂同修元史書成授翰林待制同知制誥洪武五年使雲南諭降巴咱爾斡爾宻封以梁王褘至雲南延褘為上客會元有後裔自立於漠北使托克托至巴咱爾斡爾宻所求赴兵巴咱爾斡爾宻背之匿褘於春登楊氏家意候其去且議從褘降托克托知之遽問使安在巴咱爾斡爾宻謝無冇托克托動色曰大王與舊君骨肉之親脣齒之勢也當死相守而誓相鬬今國亡不救内靡義旗旋踵外嚮何靣目耶即上馬去巴咱爾斡爾宻畏托克托乃出褘見之托克托怒欲屈褘褘罵曰爾嗣君凉徳作怨民散盜起皇帝神明威武海内歸心登大寶於布衣取天下於羣盜爾孽不自忖量尚欲焰爝火燃死灰三尺童豎知其無能為也托克托怒遂殺之建文時褘子紳言於朝贈翰林學士奉議大夫諡文節成化六年又諡忠文紳子稌以孝稱方孝孺被刑稌與鄭珣私負其骨成祖逮稌繫獄既以褘故宥之予之官辭以疾入青霞山卒門人私諡為孝莊先生王名善邵逺平牟魯傳名善義烏人為髙州通判洪武時海寇何均善被戮其黨羅子仁率衆潛入城執名善不屈死龔泰備遺録字叔安義烏人九歳而孤母傅氏躬教之洪武丙子領鄉薦入太學授戸科給事中遷都給事壬午靖難師駐金川門與妻傅訣曰事至此吾分死矣爾齎敕攜幼穉以歸否則俱溺於井辱可免言未竟火起内廷泰馳赴之道為兵校所執見上以非奸籍釋之泰既得釋遂從城上撲下而死樓璉吾學編字士連金華人嘗從宋濂學洪武中以儒士召厯藍田知縣擢廣東道監察御史謫戌雲南建文嗣位屢下詔求賢璉以文學舉入翰林侍經筵官至侍讀靖難兵入京文皇命方孝孺草詔孝孺不可改命璉璉惶懼不敢辭歸而憤悶自經死楊榮湯溪縣志湯溪人敦尚風節以詩文名洪武間領歳薦任國子助教靖難兵入京棄官歸永樂改元有詔録用舊臣榮與焉辭不赴强至中途嘆曰吾何顔復掛名仕籍乎遂赴水死李任嘉靖浙江通志永康人洪武中襲父爵為燕山右衞指揮永樂初陞遼東都司宣徳元年從征交趾叛賊黎利守昌江城與顧福等率精鋭出擊賊燒其攻具賊又築壘射城中任福夜出襲破賊營賊掘地洞欲潛入城任開横溝用石擊之入者輒死城中士卒初有二千餘人前後三十餘戰死亡過半賊益兵攻圍日急相拒凡九閱月人力疲困芻糧匱乏賊以雲梯登城奪其門任復率死士三戰三敗之後賊擁兵入任與福不能支乃自刎死樓澤萬厯金華府志字濟霖正統乙丑進士授刑部主事十四年扈駕北征師潰於土木死之包良佐湯斌包良佐傳字克忠蘭谿人正統壬戌進士授吏科給事中上言吏治考課未嚴宜選清望大臣巡察又言福建官司貪黷致盜宜正刑章悉從之從駕土木遇難死陸震獻徵録字汝亨號鶴山蘭谿人正徳戊辰進士授泰和縣知縣至即訪求民情吏弊及賦役輕重風俗美惡而一新其政時逆瑾擅政以逋鹺誣民邑中船戸應償銀兩以萬訃干連數百人震極力辨白盡釋之鎮守中貴歳取貢絺亦為告免得減其數民賴以甦秩滿授兵部主事陞員外郎武宗南巡震與武選郎中黄伯固合疏言崇聖學通言路正名號戒遊幸去小人建儲貳疏入詔下錦衣獄三加訊杖及出獄以創重卒臨革索筆作書與諸子曰吾雖死汝等當勉為忠孝庶不負吾教也周煥續浦陽人物記博學能文居家孝友嘉靖戊午由貢士尹福建永福任甫兩月倭寇攻陷城邑煥率民兵督戰斬獲百餘級賊憤併衆來攻煥堅守月餘力竭食盡外援不至披甲巷戰而死家人死者八人福民立祠祀之王鈇萬厯金華府志東陽人嘉靖庚戌進士授常熟令時倭寇充斥鈇豫繕城垣待之寇至境輕舟往覘適與寇值衆皆潰散遂遇害贈太僕少卿立祠祀焉廕子錦衣衞百戸童子明義烏縣志字南川必大裔也嘉靖辛酉倭犯台台巡道趙大河募勇士子明應募遇倭斬馘無算壬戌海寇犯閩沿海興化諸郡縣皆陷檄子明從戚繼光由台抵閩殲其渠搗其穴時山賊與海寇相表裏仙游諸暨尚為所據子明以繼光符返義烏集義勇前驅撲賊至仙游賊四伏競起子明力戰歿於虎嘯潭嗣子文麟廕授金華守禦所世襲百戸張三鳳浦陽人物補遺東陽人從軍以功陞溫州衞指揮使調往朝鮮征倭署為先鋒斬首數十級生俘十餘人乗勝單騎先驅遇伏被擒不屈死之世襲杭州衞百戸龔子敬萬厯義烏縣志由武科以功授金華千戸萬厯二十年陞授陜西甘肅遊擊統兵長驅敵聞風驚遁既又勦賊劉東陽等星夜兼程追至沙湃口殺十餘人賊奔乗勝追之經數百餘戰陣亡贈都督僉事廕一子惟棟金華所正千戸金啓倧崇禎義烏縣志援例丞徳平以薦授永平闕督寧逺餉事天啓六年寧逺攻圍甚急啓倧用礟中火毒卒贈山東布政司參議廕其子玊勝錦衣衞正千戸周鳳岐舊浙江通志字字和永康人萬厯己未進士授中書轉戸部郎中魏忠賢索靴料銀兩厲色拒之放歸崇禎元年起為禮部郎中陞湖廣江防道轉四川兵備蜀苗爭疆為立碑定界以解之陞澧州參政流寇圍荆州當事檄鳳岐應援賊將王老虎襲澧州鳳岐轉戰恢復未幾張獻忠陷長沙轉攻澧州參議陳璸出戰全軍覆沒城陷鳳岐被執賊親解其縛諷之降鳳岐怒罵曰子愧不能為君父報仇誓不與賊同生張奉擊之賊遂斷其臂剖腹而死贈都察院右副都御史賜祭葬廕一子徐學顔續獻徴録字君復永康人性孝友父司城中危禍不得直學顔以臂血濺司寇庭甦其獄崇禎乙夘以貢生拜楚府長史危襟正色王敬憚之凡豪宗不若於訓者理格勢禁弗少阻比攝江夏縣符適寇氛震驚乃築砲臺資捍禦刁斗森嚴世謂有老种小范風壬午補兵備癸未武昌陷學顔與賊格鬭斷左臂尚持刀罵賊遂被支解闔門殉難者二十餘人贈按察司僉事専祠於鄉廕一子施廷賢浦江縣志字元英崇禎丙子副榜授蘄州黄梅縣丞值流寇侵擾廷賢署邑篆增雉堞備軍器庚辰寇泊城見戒嚴引去陞知縣會張獻忠破荆襄數郡圍黄梅月餘不下陽釋去夜偷襲城城陷巷戰被執賊敬禮之廷賢厲聲曰國有民城不能守家有母養不克終上愧君親下負所學從容再拜奪佩刀自刎方應時浦江縣志字朝中由掾曹授江津主簿署縣事張獻忠攻城十月不下後令至城陷應時死之王肇坤金華府志字亦資蘭谿人崇禎辛未進士祖繼泉聞報手書九字箴寄之曰忠事君慈視民清律身肇坤奉訓惟謹授刑部主事清理滯獄以平恕稱擢江西道御史上疏請太子出閣講學巡視兩關簡閲兵馬士卒肅然時羽書告急所在震動或謂閣臣無守土責肇坤厲聲曰同為臣子敢分職守耶即日介馬馳赴時營兵調出無足供干櫓者肇坤以忠義激勸士民咸感奮縁賊衆勢不能支身中四矢兩刄而卒事聞賜祭葬贈大理寺卿封祖父廕一子鄭國祥金華縣志金華人授守備崇禎間東陽許都反出城禦之被害洪希懋湯溪縣志字子修由歳貢授松陽訓導陞江西徳安教諭流賊王瘦子之亂部撫命以教官帶兵守城同僚或有難色希懋曰食人祿者忠其事雖職卑官小而忠君之心則一也領兵守小西門近半載城陷被害傅巖舊浙江通志守野倩義烏人少孤貧及長好讀書作詩賦古文辭皆鐫理刻肌風瀾特妙天啓甲子舉南雍登崇禎甲戌進士知歙縣舉循良第一後以讒去官明亡死於金華子齡發齡熙同死之黄一鵾永康縣志入太學任濟寧州同陞東昌通判流賊圍城一鵾分守擊賊城陷被執罵不絶口遂遇害閤門三十餘口皆殉難妾沈氏匿水溝中賊退始出遍尋死骸認素所繫錦囊得屍葬之傅啓耀義烏縣志字秀巖熹廟時守備山海轉天津鎮海援鮮都司尋以遊擊從征廣東改鎮䖍吉收復江西流寇陞參將癸未移京口明年晉都督同知明亡全家沒於閩朱大典舊浙江通志字延之金華人萬厯丙辰進士授山東章邱知縣陞兵科給事中厯福建參議回籍崇禎四年起山東參政巡撫山東晉少司馬八年流賊陷鳳陽焚陵寢命大典總督漕運兼巡撫破賊於夀州十二月賊攻滁州大典同盧象昇合十道兵馳援賊敗走九年賊犯陵寢大典授計總兵楊御蕃追擊賊宵遁渡河十年賊老回回等分十路焚掠江北大典會諸路軍破走之後罷歸明亡合門自焚死張國維舊浙江通志號玉笥東陽人天啓壬戌進士授番禺令清理沙漲田數萬畝以業貧民擢刑科給事陞太常寺少卿巡撫江南以安慶孤懸江北請増兵戍守又相度繁昌太湖髙淳蕪湖等處皆有興築各郡縣改折及虛糧白糧等項悉清夙弊崇禎八年築九里石塘平望内外塘九年築松江捍海等塘十年築長洲至和等塘濬江陰運河十一年又築鎮江漕渠皆報竣乃輯呉中水利全書晉工部右侍郎總督河道兼提調徐臨通津四鎮漕餉事務值天旱禱於泰山得大雨乃挖浚上下泉源蓄水以濟糧運又先後擒斬逆賊李青山王朋徐見隆張文宇等東境以安晉兵部尚書明亡投水死葉向榮孫治葉向榮墓誌字鍾日金華人萬厯戊午舉人為寧陽令邑有新舊兩城皆頽圮向榮鬻家産倡民助築不數月而崇墉改觀武庫軍器多朽窳急為繕治堅利又募壯士分置各鄉教習稱精兵凡禦寇數次而邑賴以全癸未李闖壓境乃即向所募銅甲軍三百與練習鄉勇三千分布各關堡自為守䕶急則首尾相應賊聞其戒嚴而去明年殲賊黨於烏羊坑臺使者上言治行第一移吉安丞遂歸里明亡肅衣冠北向再拜投項村之崖而死杜學伸東陽縣志字適我以武功厯任都督僉事崇禎十三年陞孝陵參將内監張其藴盜伐陵木學伸發其奸上震怒盡撤天下鎮守内監公卿皆壯之然與宦寺水火遂引退明亡衣冠拜闕死天寧寺中丁文明義烏縣志字􅊩甫由錦衣衞試武闈三科皆雋崇禎六年授直𨽻井陘道中軍守備同總兵鄧玘合兵夜襲張獻忠獲全勝八年又破流寇王剛餘黨厯陞兖州參將叛寇李青山嶟峙山東文明大破之幕府上其功陞副總兵署都督僉事後兖城陷以身殉王猷義烏縣志字廷熙崇禎十三年以將材考授廣東香山守備調防韶州十五年張獻忠掠湖南調往援恢復郴州宜章等處繼調協勦江西撫州建昌等郡土寇陞南韶參將明亡死節國朝周世榜福建名宦册義烏人順治三年任順昌縣典史土寇攻城佐縣令錢嘉倫晝夜捍禦却之尋復來攻城陷不屈死金漢蕙金華府志字湘鄰順治己丑進士授廣西參議分守右江單騎之官馳驅榛莽中招集流亡勸農課學藩撫交薦無何地方反側挈印趨會城者趾錯蕙獨親率士民守禦孤城援絶城陷脇降不屈遂遇害呉尚鉉金華府志字惟鼎浦江庠生有膽畧康熙十三年閩寇猖獗尚鉉率先捍禦與賊戰於松村死之公舉事實尚鉉事母趙氏以孝聞順治三年浦江旱斗米八錢尚鉉出米五十斛賑濟康熙十年又旱出穀四百石煮糜以賑開義館於呉溪延師以教其鄉人宗族聞閩變團練鄉勇守禦與賊戰遂遇害楊三虎義烏縣志義烏人康熙三年授湖廣巡陽府遊擊八年陞陜西靈州參將以功陞秦州副將十八年調征四川十九年攻成都得永寧鎮九月城陷殉難奉㫖諭祭贈左都督傅𢎞基福建名宦册金華人漳州城守遊擊分防長泰縣康熙十六年海寇圍城𢎞基嬰城固守聞䘏城陷被執不屈死事廕一子浙江通志卷一百六十五
