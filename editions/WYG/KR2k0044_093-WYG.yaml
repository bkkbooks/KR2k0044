其缺少之項於奏定公糧内逐件添補并飭水師各鎮協營於出洋兵船分甲學習臣當不時查騐稽考以副皇上整飭營伍至意理合聲明一件為欽奉上諭事准兵部咨子母砲位原係内製不便通給外省定議盛京寜古塔近海黑龍江與鄂羅斯接壌三處仍應照前設立此外各省子母砲位查明送部所有應設砲位除威逺砲外尚有何項衝擊便利於軍務有益詳查造册送部酌撥不足者鄰省移取如仍不足動項製造其沿邉沿海砲臺水師戰船守䕶城池舊有砲位照常存留等因奉㫖依議各處應設砲位俟撥給齊備之後將彼地所有子母砲齎送來京交部欽此臣欽遵諭㫖將浙江各營子母砲除續准部文每營止留一位演習外其餘悉行觧運赴京交部投収但訪之輿論及老於水師各官俱云海洋戰船風浪髙下不齊實賴子母砲攻擊利便重叠施放不須停留裝藥栽碾致有遲滯以之防杜奸究追拿匪𩔖實有裨益可否仰懇聖恩於海疆酌量留用之處伏乞睿鑒理合聲明臣謹具題奉㫖該部知道雍正十二年五月兵部為欽奉上諭事議得浙江總督程元章疏稱各鎮總兵官每年例應巡查營汛欽奉諭㫖着商請督提具本請㫖等因兹據各鎮呈詳提臣咨㑹到臣查定海一鎮孤懸海外向例只督巡本營洋面未嘗遊巡内地今總兵官林君陞呈稱所屬鎮海象協各營汛皆與本標貼近毗連督巡時可以就近考察於舊例稍為變通至黄巖鎮係山海交錯水陸兼防向例水師各營於二月出洋哨捕十月撤巡該鎮督率會哨時自可便道進口查騐至冬季於所轄紹台二協巡查一次并會騐寜波船厰修造戰船往返便㨗兵民不擾其溫州鎮前經議定每年夏秋出洋或冬或春遊巡陸路一年之内共為一周便道察閲自當循照舊例而行至處州鎮並無督巡洋面之任當於春冬二季徧歴查察一年之内兩次巡查各鎮或便道進口或登陸巡查自當減從裹糧不得稍有滋擾汛防各官亦毋得借名供應勒扣弁兵如有前弊立即叅奏議處等因具題前来查雍正十一年十一月二十五日奉上諭嗣後各直省總兵官有巡查營汛之事俱着商請督提具本請㫖欽此欽遵通行在案今應如所請行令該督轉飭各該鎮遵照奉行可也奉㫖依議浙江通志卷九十四
