body:
  text: 浙江通志卷九十四兵制五國朝溫州城守營隸溫鎮管轄額設副將一員原設副將順治十三年裁十八年復設都司僉書一員千總二員把總四員康熙五十年十月為請酌衝緩等事將副將改設遊擊都司改設守備仍駐劄溫州府城額設馬步戰守兵丁共八百九十九名内有馬戰兵九十名無馬戰兵一百七十四名守兵六百三十五名康熙二十四年六月為海氛既靖等事抽撥舟山鎮標有馬戰兵二名無馬戰兵四名守兵十四名又三十五年六月為欽奉上諭事裁減無馬戰兵六十名守兵二十名又雍正六年五月為敬陳查復浙洋等事抽撥玉環營有馬戰兵三名無馬戰兵六名守兵二十二名又七年九月為遵㫖議覆事裁去京撥無馬戰兵二名守兵六名歸杭嘉湖三協募補實存馬步戰守兵丁共七百六十名十三年衢協改鎮添兵本協裁溢額馬九匹改步戰兵九名官自備坐馬三十匹兵丁官給馬一百匹駐劄溫州府城遊擊一員守備一員千總二員把總四員有馬戰兵八十五名無馬戰兵一百二名守兵五百七十三名分防泰順縣把總一員領兵一百五十名防守臺汛五處楊府山臺新埭臺烏牛汛共守兵五十名江心寺西洲村共守兵二十名平陽協營隸溫鎮管轄經制額設副將一員原設總兵官康熙四十九年閩浙總督梁鼐題准將總兵官移駐處州即以處州副將移駐平陽左右兩營各都司一員守備一員千總二員把總四員外委千總三員把總六員雍正五年新設仍在有馬戰兵額内原額馬步戰守兵丁共一千四百八十名内有馬戰兵一百四十名無馬戰兵二百二十名守兵一千一百二十名于康熙五十二年十月為遴補營員事將蒲壯鎮下闗原管兵二百九十五名撥歸處州又雍正七年為遵㫖議覆事將原派塘撥戰兵三名守兵五名開除歸杭嘉湖三協募補實存馬歩戰守兵丁共一千一百七十七名十三年衢協改鎮添兵本營裁溢額馬七匹改步戰兵七名駐劄平陽縣城副將一員左營都司一員把總一員兼防南岸汛務外委千總一員右營守備一員把總一員兼防沙園汛務外委把總一員馬步戰守兵丁共三百七十六名分防江口汛左營把總一員外委把總一員馬步戰守兵丁九十一名分防宋埠汛左營把總一員馬步戰守兵丁四十六名分防墨城汛左營千總一員馬步戰守兵丁四十六名分防南岸汛左營兼防把總一員馬步戰守兵丁三十五名駐防蒲壯寨城左營守備一員千總一員外委千總一員把總一員馬步戰守兵丁共一百四十名分防鎮下闗左營把總一員馬步戰守兵丁四十六名駐防金鄉寨城右營都司一員右營千總一員外委把總一員馬步戰守兵丁共一百六十二名分防橋墩寨右營把總一員外委把總一員馬步戰守兵丁六十六名分防舥艚汛右營千總一員馬步戰守兵丁六十二名分防北港汛右營把總一員馬步戰守兵丁三十四名分防沙園汛右營兼防把總一員馬步戰守兵丁二十二名分防矴埠頭汛右營把總一員馬步戰守兵丁五十名以外題設江口汛砲臺營房巡船詳見海防樂清營隸溫鎮管轄經制額設副將一員守備一員千總二員把總四員額設馬步戰守兵丁共一千一百一十二名内有馬戰兵一百一十一名無馬戰兵二百一十五名守兵七百八十六名康熙二十四年八月為海氛既靖等事裁有馬戰兵五名無馬戰兵一十名守兵三十五名撥歸定海鎮標又三十五年六月為欽奉上諭事裁無馬戰兵四十六名守兵一十六名又雍正六年十月為敬陳查復浙洋等事裁有馬戰兵一十名無馬戰兵二十名守兵七十名撥入新設玉環營又七年十月為遵㫖議覆事裁京撥戰守兵十名歸杭嘉湖三協募補現存馬步戰守兵丁共八百九十名十三年衢協改鎮添兵本營裁溢額馬六匹改步戰兵六名駐劄樂清縣城副將一員守備一員雍正九年改守備銜為都司僉書把總一員一年一換存城有馬戰兵六十名無馬戰兵五十七名守兵二百四十三名分防蒲岐汛兼轄婁嶴山萬橋口竹嶼牛鼻洞白沙嶺白沙山把總一員一年一換有馬戰兵一十六名無馬戰兵二十名守兵九十四名分防大崧汛兼轄鏵鍬山下灣山小崧山大崧山三江口千總一員一年一換有馬戰兵五名無馬戰兵一十二名守兵七十八名分防清江渡汛兼轄梅嶴山江巖山清江嶺江巖汛窰嶴嶺把總一員一年一換有馬戰兵五名無馬戰兵二十名守兵一百五名分防後所汛兼防館頭馬山下印千總一員一年一换有馬戰兵五名無馬戰兵一十五名守兵六十五名分防南岸汛兼轄南岸口南岸山鹽盤沙頭沙頭臺把總一員一年一换有馬戰兵五名無馬戰兵一十二名守兵七十八名上諭康熙五十六年為欽奉二年為請更閩浙等事將事添設後所汛又雍正磐石營原轄西北館頭汛馬山撥下印撥沙頭汛沙頭墩臺撥歸本營管轄併詳設南岸汛將江巖汛歸入清江渡汛總防大荆營隸溫鎮管轄額設叅將一員守備一員千總二員把總四員額設馬步戰守兵丁共八百九十九名内原額有馬戰兵一百名康熙二十三年裁馬一十匹改入無馬戰兵又三十五年為欽奉上諭事裁無馬戰兵五十二名守兵一十八名又雍正二年為請更閩浙等事裁守兵五十六名歸乍浦營召募又六年為敬陳查復浙洋等事裁有馬戰兵一十名無馬戰兵二十名守兵七十名撥歸新㫖議設玉環營又七年為遵八名歸杭嘉湖三協募補覆事裁京撥戰守兵丁現存馬步戰守兵丁共六百七十一名十三年衢協改鎮添兵本營裁溢額馬十四匹改步戰兵十四名駐劄大荆寨城兼管磐山嶺汛黄泥橋汛游擊一員雍正二年題改叅將為游擊千總一員外委千總一員凡外委千把總俱係雍正五年題設馬步戰守兵丁共二百四十五名分防水漲汛兼管陡門草臺火燒潭草臺