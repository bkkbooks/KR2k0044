body:
  text: 浙江通志卷二百五十一經籍十一集部四别集明印湖先生集天啟平湖縣志馬汝賢著習菴文集崇禎衢州府志汪朝士著開化人以上丁夘郷貢繼山草堂集二十卷尤氏藝文志沈思孝撰秀水縣志字純父有行戌稿郊居稿西征稿陸沈稿溪山堂集吾美堂集檇李詩繋子士􅆏字汝邁有滋蘭館集焚餘草檇李詩繋鍾庚陽著字長卿秀水人希髙詩稿天啟平湖縣志陸萬垓字無哇天一山稿萬厯湖州府志胡友信著字成之朱文懿公集十二卷明詩綜朱賡著字少欽山隂人世澤編十六卷明詩綜羅萬化著字一甫㑹稽人趙文懿公集四卷瀫陽詩集五卷黄氏書目趙志皋著字汝邁蘭谿人比部集三卷明詩綜唐邦佐著字惟良蘭谿人由庚堂集三十四卷分省人物考鄭汝璧著字良玉縉雲人以上戊辰進士北征草又南游草又閩中草又氷玉軒集又歸田雜著嘉禾徴獻録夏久安著秀水人漆園歸詠海鹽縣圖經顧所有著字謙叔以上庚午鄉貢不二齋稿十二卷山游漫稿山隂縣志張元忭著字子藎按焦氏經籍志有張陽和集十六卷黄氏書目有陽和文選八卷鄒元標有不二齋文選六卷来鶴軒軼稿天啓平湖縣志洪烝著字惟道牧史放衙集二卷萬厯崇徳縣志李華春著字仲實二京三游草又中林集萬厯崇徳縣志郭子直著字舜舉灌息亭集明詩綜劉伯淵著字静之慈谿人以上辛未進士泮鳴集檇李詩繋周雲石著失名嘉興人調疴集又鶴樓集檇李詩繋薛文炳著字有孚嘉興人崑源藏稿嵊縣志邢徳健著字汝行鍾吾集又荆溪集永嘉縣志陳鳴鳳著右隆慶時人青蓮館集又澄逺堂集又偶寄軒集又藿園集又寄苕漫草又薊易寓言又河梁集又兩都集又汗漫游草明詩綜李應徴著字伯逺嘉興人繹聖堂稿石倉詩選嘉興周從龍彦雲著承菴詩集明詩綜姚舜牧著字虞佐烏程人拙拙集嵊縣志王應昌著字家文星山遯叟文集八卷平陽縣志蔡立身著字師曽以上癸酉鄉貢隅園集十八卷黄門集三卷黄氏書目海寕陳與郊著華苹先生集四十卷檇李詩繋支大綸著字心易六卷按萬厯嘉善縣志有四餘集鏡心堂集十六卷明詩綜陶允宜著字懋中㑹稽人按澹生堂書目有駕部選稿十二卷月峯居業四卷居業次編五卷黄氏書目孫鑛著字文融餘姚人扣聲編八卷黄氏書目龔一清著字貞夫義烏人三游稿又樂泌堂集縉雲縣志李鋕著字廷新詩叢集崇禎衢州府志余國賓著字叔賢二游稿又平苗詩崇禎衢州府志詹思謙著以上甲戌進士盈缶集海寧縣志許聞造著字長孺已午漫草檇李詩繋吳正儒著字醇之嘉興人借竹軒稿又春懐小草檇李詩繋金九成著字伯韶秀水人覆缶集台州府志􅃽承勲著字繼之臨海人醯雞集天啓平湖縣志韓子祁著字心堯少室山房𩔖稿婺書胡應麟著字元瑞蘭谿人詩八十卷文四十卷擬古樂府二卷澹生堂書目外又邯鄲集二卷卧游集二卷華陽集二卷巖棲集二卷雲屏樓詩集永嘉縣志邵倬著以上丙子鄉貢大滌山人詩集十三卷尤氏藝文志徐桂撰錢塘縣志桂字茂吳快雪堂集六十四卷分省人物馮夢禎開之著秀水集人按列朝詩集作真實居士沈修撰詩集明詩綜沈自邠著字茂仁征按萬厯秀水縣志有歸省述清白遺稿两浙名賢録朱廷益著字汝虞嘉善人按秀水縣志作世清堂遺稿員嶠集嘉禾徴獻録陳泰來著字伯符致覺堂集崇禎烏程縣志張斗著字景北屯田稿又随槎集又楚游客問歸安縣志王豫著字介夫夢龍軒稿二卷甬上耆舊詩楊徳政著字叔向鄞縣人霜鏡集又辟塵集又悟香集鄞縣志陸懋龍著號珍所曲轅居詩集十八卷鄞縣志沈九疇著字箕仲棲真館集三十卷由拳集三十一卷白榆集二十卷尤氏藝文志屠隆撰集按黃氏書目又有冷然草橫塘集采真草南游甬上耆舊詩未刻有絳雪樓集紫瑛山藏稿又光裕堂集九卷諸暨縣志陳性學著字寰冲海門先生文録十二卷明詩綜周汝登著字繼元鄞人五嶽游草十二卷台州府志王士性著字恒叔臨海人宗沐子按澹生堂書目有玉硯集六卷王穉玉文集台州府志臨海王亮著以上丁丑進士川流集檇里詩繋陳光贊著字季襄秀水人薄游漫草又兩京浪游集檇李詩繋孫成名著字允仁憑枕編台州府志陳承翁著字乾甫臨海人以上己夘鄉貢沈司㓂集檇李詩繋沈堯中著字執甫朒編又池塘草又得月樓詩草又羼提編又詹詹稿天啓平湖志馬維銘著字新甫青棠集八卷崇禎烏程縣志董嗣成著字伯念卷按黃氏書目又有光祿遺編二寧逺山房存詩歸安縣志沈子來著字汝修負苞堂詩選五卷文選四卷長興縣志臧懋循著字晉叔姑孰集二卷南征集二卷又中林草明詩綜章嘉楨著字元禮徳清人農丈人集二十八卷鄞縣志余寅著字君房梅園集甬上耆舊詩沈一中著字長孺太白樓稿甬上耆舊詩吳禮嘉著字㑹之石倉副墨鄞縣志周應治著字君衡十按尤氏藝文志有玉几山房稿卷羣玉山房集東陽縣志許𢎞綱著字張之蒼蛇館集甬上耆舊詩丁繼嗣著字國雲白華樓集續處州府志李正蒙著字汝明縉雲人醯雞齋稿七卷又問夜草七卷遂昌縣志項應祥元芝著以上庚辰進士賓筵集象山縣志黄士竒著字孺正樗里子集嘉禾徴獻録張應宿著字經野平湖人子龍徳字鯤化有玉樹堂集求我齋𩔖稿續處州府志朱景和著字其順遂昌人以上壬午鄉貴潛初子集十二卷列朝詩集岳元聲著字之初卷按黄氏書目有潛初雜著十菉竹堂遺稿明詩綜姚思仁著字善長秀水人嘉禾徴獻録子以亨字用嘉有西南行草敝篋剰言遵渚萃草介石堂集秀水縣志朱國祚著字兆隆曼寄軒集一卷尤氏藝文志盛萬年撰明詩綜字恭伯秀水人有拙政編董黄門詩集一卷烏程董道醇著菽園詩草二十卷分省人物考茅國縉著字薦卿坤子按黄氏書目又有薦卿集十二卷月波草七卷鄞縣志周應賓著字嘉甫王太史詩草一卷又霱雲館全集黄氏書目王荁著字季孺慈谿人瀛東雜著山隂縣志何繼髙著字泰寧西軺漫稿蕭山縣志來三聘著字任卿游按明詩綜又有祠部南舟豫章蜀游東南華等稿浮弋草又支離集又吏隠集台州府志臨海王士崧著字仲叔以上癸未進士元感軒集甬上耆舊詩陳邦訓著字彞文乙酉鄉貢錢麓屏遺集十卷澹生堂書目錢士鼇撰有薄㳺集似僧草槍榆集退食吟淮上篇釋擔志遺文童子問附録錢塘縣志字季梁仁和人有逍遥集二十卷盟鷗堂集十四卷檇李詩繋黄承元著字履常秀水人毘山堂詩草崇禎烏程縣志潘大復著字徵復薛恭敏公集明詩綜薛三才著字中孺鄞人鐵菴焚餘集鄞縣志全天叙著字伯典鏡園藏草台州府志王士昌著字永叔士性弟鑄文集餘姚縣志吳道光著字孚伯西山遺稿黄巖縣志盧明陬著字君教以上丙戍進士幽湖居士詩草又永和集又敖陽集又芝水集嘉禾徴獻録項良枋著字幼輿嘉興人清酣草嘉禾徴獻録陶涵中著字虚來秀水人竹蘆編三卷長興縣志朱尚賓著字澹營滄浪雜詠崇禎衢州府志王家業著字子立日甓園集甬上耆舊詩葛文炳著字星垣以上戊子鄉貢貽清堂集二十卷仁和縣志錢養亷著字國維適適軒集天啟平湖縣志戈用泰著字來陽鳴缶集明詩綜鄭明選著字侯升歸安人卷按澹生堂書目鄭侯升集四十卷詩文三十秕言十卷二酉集台州府志蔡宗明著號二酉鳯谷集明詩綜徐應簧著字軒卿淳安縣志又士有岝㟧山堂集游覽吟編以上己丑進武林稿又河上篇又落花詩又月令叙事詩錢塘縣志許仲譽著醉匠篇一卷莊舄吟一卷台州府志彭汝賢著號紫雲存笥集太平縣志金孚兑著字吉所以上辛夘鄉貢沈伯含集二十七卷詹生堂書目沈朝煥著亦適編七卷泊如齋六卷馬曹稿五卷勞人草一卷渠陽小草二卷田家雜詠一卷和陶詩一卷北臺賦一卷抱膝長吟賦一卷入蜀詩一卷鍾陵草一卷錢塘縣志字伯含仁和人水部集十三卷秀水縣志范應賓著沈文定公集二十卷黃氏書目沈㴶著何山集六十四卷黄氏書目沈演著字叔敷烏程人節甫子蒿城集歸安縣志嚴廷儀著字景苕恒嶽遺稿明詩綜朱燮元著字懋和山隂人以上壬辰進士五欲軒稿六卷六欲軒稿十八卷秀水縣志賀燦然著字伯闇雙鳬草檇李詩繋陸錫恩著字伯承集按天啓平湖縣志又有傳書堂鳩兹集七卷又逸我堂餘稿鄞縣志徐時進著字見可水月山房集二卷黄氏書目陳之龍著鄞縣人詹炎集三十四卷黄氏書目葉維榮著慈谿人樹瓢鳴二卷分省人物考王萬祚著字君錫臨海人伯子詩草又潄玉堂集台州府志應汝化著號雲溟仙居人以上乙未進士夷白齋鷇音仁和縣志林杞著號夷白赤城山人稿嘉禾徵獻録胡震亨著字孝轅海鹽人遵時堂集鄞縣志莊學曾著字仲肩以上丁酉鄉貢清逺山人漫稿仁和縣志洪瞻祖著字貽孫元暢閣集十二卷海鹽縣圖經沈孝徴著字原萬弟誼徴字公雅有香雲菴稿氷雪軒集天啓平湖縣志曹徴庸著字逺生李按嘉禾徵獻錄又有客語廣陵游記檇詩繋曹隨字是誰初名爾善字令民徴庸弟有壹是山居集大泌山人序然藜閣遺稿明詩綜陳允升著字雲逵烏程人五兼堂稿又漪漪館稿明詩綜張履正著字我先山隂人養初集嵊縣志喻安性著字中卿居雲草又鳴籟草又醉吟草崇禎浦江縣志倪尚忠著字世卿楊翰林賸馥崇禎衢州府志楊希聖著字恒初西安人以上戊戌進士半衲菴集檇李詩繋支如王著字寜瑕大綸長子許靈長詩集四卷澹生堂書目許光祚著錢塘人雙溪草堂集檇李詩繋馮元鑑著字三莪平湖人研寶齋稿十二卷海鹽縣圖經劉世教著字少彛密娯齋集十五卷甬上耆舊詩王嗣奭著字右仲無懐集鄞縣志葛仁美著字無懐以上庚子鄉貢狷石居遺稿八卷檇李詩繋譚昌言著字聖俞嘉興人彭侍御集檇李詩繋彭宗孟著字孟公紹賢子魏齋佚稿九卷澹生堂書目項鼎鉉著秀水人亷善堂集二十卷嘉禾徵獻録孫光裕著字子長嘉善人職方存稿又澹樸齋初集歸安縣志茅瑞徴著字伯符弟琯徵有澗松草寳田堂集去去齋集三卷明詩綜蔡善繼著字伯逵烏程人卷按尤氏藝文志又有空有齋草四笠澤堂文集長興縣志王繼賢著字弓若秋水閣墨副鄞縣志董光宏著字君謨李忠毅公集鄞縣志李橒著蕺山詩集明詩綜劉宗周啓東著山隂人賦集三卷書籍序文一卷詩言志四集共十一卷迴文詩一卷偶牘四卷尺牘二卷崇禎衢州府志葉秉敬著字敬君西安人進以上辛丑士雞肋集秀水縣志卜二南著字太始山居吟又南北游詩集嵊縣志鄭化麟著以上癸夘鄉貢寜澹齋集十卷黄氏書目慈谿楊守勤著浮槎閣集奉化縣志鄔鳴雷著字長豫匡山社集黄氏書目戴九元著字園客新昌人以上甲辰進士虚舟草又蓬門草嘉禾徵獻録馮伯禋著字欽仲敏効子按檇李詩繋又有南歸詩芙蓉鏡巵言崇禎衢州府志江東偉著開化人以上丙午鄉貢靈泉蠃史集明詩綜許令典著字稚則海寜人䍧牱草又闑言又游紀嘉禾徴獻錄包汝楫著字公剡嘉興人徐忠烈公集明詩綜海鹽徐從治著字肩虞槎菴詩集蕭山縣志來斯行著字道之瑞芝堂集又柱下焚餘青田縣志王一中石門著以上丁未進士閬閣詩一卷錢塘縣志呉之鯨著字伯裔己酉鄉貢大業齋集檇李詩繋賀萬祚著字孝延嘉興人西歸雜詠檇李詩繋嘉興邱履嘉原禮著曼寄軒集秀水縣志朱大啓著字君輿憝生集又黔行録山隂縣志陸夢龍著字君啓清嘯集台州府志周頌著字仲美臨海人子卿近業崇禎衢州府志徐日乆著字子卿西安人識匡齋文集永嘉縣志劉康祉著字以吉以上庚戌進士修餘堂稿錢塘縣志卓爾康著