散花灘集錢塘錢鳯綸雲儀著當翠園集錢塘顧姒啟姬著凝香室詩鈔二卷錢塘柴靜儀季嫺著沈鏐室玉牕遺稿二卷海寧葛宜南有著朱爾邁室素賞樓集二卷海寧陳琬永倫光著楊中黙室紉餘集六卷餘杭王芬與芳若著嚴沆室雲和閣集秀水歸淑芬素英著髙陽室同里王庭曹溶序寄雲草山隂祁徳茝湘君著彪佳女沈萃祉室南樓草又紉芝草山隂姜倩徽懿著廷梧女徐都講詩一卷上虞徐昭華著附刻西河合集繡佛齋草天台馮甦母陳氏著以下釋子鷲峯集雲隱釋戒顯願雲著盋後集十卷錢塘釋上緒亦諳著涉江草雲溪釋馮挺俍亭著湘谿集又湘谿别集湘湖釋本圜蛤菴著學園録八卷續集一卷宗門近鈔二卷嘉興釋銘起墨菴著原名沈起字仲方澗菴草秀水釋𢎞言文逺著萍游草海鹽釋行日獨明著寄寄吟平湖釋行深山年著閲世堂稿平湖徳藏寺釋宗泰古笠著擯影集釋惪衛著原名陸競烈平湖人祖華堂集又聽濤稿又寒濤閣稿又墨香幢集又遂清堂集又邃園稿又東峯蘭若集又復古堂稿平湖釋常岫蒼林著髙雲集㑹稽平陽寺釋元𢎞石庭著漁樵集又挂瓢集石門釋通容費隱著黃山草十二卷又西湖詩草又彈指集又桂羅壯游集四卷海寧北寺釋大涵鴈黃著浙江通志卷二百五十一
