body:
  text: 浙江通志卷六十一水利十温州府永嘉縣附郭城内河由會昌湖入永寕門滙為雁池城西河放生池此三處瀦水最寛萬厯温州府志府城四面有濠濠上下岸各有街彼時一渠兩街河邊並無民居宋紹興間居民侵塞舟楫難通火患罔偹葉適開河記淳熈四年户部尚書韓公來守募民舉環城之河取泥出甓兩岸成丘州人刻石記之國朝康熈九年副使許重華委同知張經督民開濬以通舟楫雍正八年知府秦炌永嘉知縣羅秉禮諭居民各濬門前河道禁止私搭浮棚水則在譙樓前五福橋西北第二間石柱上萬厯温州府志永嘉水則至平字諸鄉合宜平字上髙七寸合開陡門平字下低三寸合閉陡門宋元祐三年立永嘉縣城外河道會昌湖在城外西南唐會昌四年重浚因名詳見山川南塘在大南門外路通瑞安宋淳熈十四年郡守沈樞修陳傅良重修南塘記永嘉邑内有宜治者州城外南逹瑞安有石塘百里不知起何時而嵗積壊傾者為嵌䧟者為滙遇時潦咫尺不得進自閩山至於呉會去來者病之呉興沈公治郡之明年有以塘事告公與通判率兩邑大夫即里居謀曰役復有大於此者乎奈何使吾民錙聚銖歛竊自支補甲前而乙却也茍無愆時工勿問庸幾何茍無乏事石勿問價幾何輿匠肻來市無强價自冬十月至今三月而塘成花栁塘在大南門外飛霞洞前石瀬塘在吹臺鄉和尚塘在膺符鄉黄石山南塘在城東南五十里瞿嶼山塘一在山南一在山北福昌埭在鎮海門外外沙新埭在鎮海門外沙浦天寕埭在九都茅竹埭舊名直瀆埭軍前大埭俱在五都茅竹山址朱村埭在鎮海門外朱村浦蒲洲埭在八都去縣十里此埭内蓄河水外障江潮永嘉并瑞邑温衛田畝約計二十四萬悉藉灌溉其長四十一丈明正徳十六年風潮蕩壊推官程資督修萬歴甲戌再圮郡守楊邦憲重修稍髙每遇秋水泛漲各鄉俱被淹没郡守衛承芳乃凖水則國朝復水湫九處蓄洩得宜曦命有司加葺康熈九年順治十四年廵按王元通判施王澤督修黄湖埭在大南門外飛霞洞前東角埭倪家埭俱在八都泄漏埭在六都潭頭陸家北埭在六都中村陸家南埭在六都下村三埭宋乾道丙戌築地形稍髙民居稠宻今下皆漸淤成田東平埭在六都茅竹山東西平埭在茅竹山西舊山北有田地數百頃中有河自一都至郡城舟楫皆通而以軍前大埭北截江潮宋紹興二十四年埭決田地悉坍入江不復有河始分築平水埭於山之東明嘉靖三十三年西埭決縣督民重修周稍埭在黄石山南翁師埭楊家滙埭廟前埭陳大埭陳八河口埭俱在三都倪埭在一都吕家埭在三都榆木埭楓林埭陳家埭俱在建牙鄉上孤埭朱干埭陡門埭俱在清泰鄉法華埭在孝義鄉泉塘埭在仙桂鄉謝婆埭在甌浦下村明萬厯二十五年郡守劉芳譽捐俸重築王叔杲重築謝婆埭記永嘉控山帶海城以南為田數千頃三溪之水紆迴環遶互相流灌徃自南河闢一泓以洩之江故每遇旱乾常苦失潤舊築法華埭以闌之負郭之民相度窽會因廢之而築謝婆埭埭之濶可弓而畫然瀦蓄三溪灌溉萬頃郡頼之嘉靖中駔儈之徒利舟楫之便借堪輿𣺌説惑當事者聽而改築江口之蓮花浦地勢淤卑風潮蕩激輒廢輒修而民竟苦汙萊不獲享蓄洩之利萬厯二十三年劉侯以名御史來守是邦𦙍心民隠而得謝婆埭廢興之故下邑侯林君議林侯悉心籌畫諏日程工選於民得田君諫方准鮑易有黄循日犒督之藉上於淤取石於山不踰時而工告竣黄洲埭在八都宋嶴埭沙河埭俱在華蓋鄉城南新閘在瑞安門外天寕閘在九都乾元閘倉頭閘俱在三都李浦閘應家閘大小頭閘浄居閘俱在二都白木監閘横山閘浄居新閘俱在一都范公閘在二十都廣化陡門在迎恩門外因郭公山麓為之西郭陡門在迎恩門外廣濟橋西海壇陡門在奉恩門即水門中閘也遇旱則開北閘引潮入城潦則盡閘放之以洩城中穢濁明𢎞治庚午郡守文林重濬近復淤塞山前陡門在黄土山前宋紹興國朝間郡守趙不隼築兆甲等呈請重修康熈初年諸生林山後陡門在黄土山後外沙陡門舊名堰頭在鎮海門外徃嵗廢圮潮入内河涸則為浦地成斥􅒾不堪稼穡明成化丁酉令文林礱巨石修築布橋立閘决去福昌黄湖二埭以通花桞塘民甚利之石墩陡門在九都石嶼村明𢎞治間知府陸潤修築瞿嶼陡門在九都瞿嶼村明𢎞治間知府陸潤重修茅竹陡門在五都茅竹山趾鹹田陡門在三都龍灣陡門舊名蠣䗁陡門在四都黄石陡門舊名方􅆜陡門在寕村所城外黄焦陡門在一都芙蓉巖羅浮陡門在三十四都久圮國朝康熈十一年里民公築樂清縣東西兩渠在縣城内萬厯温州府志東西鑿峽以通兩溪旱則蓄潦則􅂥嵗久淤塞元末方氏吏劉敬存攝邑浚治深廣於是兩渠復通仍建寳帶橋其上又濬東小河至白沙以􅂥溪流舟楫可通田得灌溉民甚便之今河存渠塞鄉河在東鄉自黄塘窑嶴諸山溪流出至新市廣七丈分注瑞應一鄉溉田十餘萬畝國朝雍正六年知縣唐𫝊鉎以十四都錢家垟十五都南垟蒲岐等處舊有河道十五里詳請督撫諭民開濬以資灌溉趙公塘在縣治東西兩溪上宋令管滂築令湯又繼築東塘令趙敦臨始合東西築之王賔築趙公塘記紹興十五年四明趙侯敦臨來令樂清邑界兩溪羣山環繞雨暴至則水無所泄溢流於市㕓公私患之熈寕庚辰令管君滂始於東溪築石塘以障之導水自塘南入於海越十有八年民無水患逮元祐丁夘塘壊令湯君又因舊葺之越二十年又壊及今不葺者四十年矣侯來之明年六月乃修築之凡長一百五十丈廣一丈五尺髙稱之為工五十費財百萬益壮固於舊耆老或言舊塘當縣左臂所捍纔三之一若東自溪橋而上至望來橋西循溪曲而南至迎恩橋剪棘除穢増卑培簿俾皆為