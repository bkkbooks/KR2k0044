body:
  text: 浙江通志卷一百十三職官二隋總管通志職官畧隋文帝以并荆益揚四州置大總管其餘總管府置於諸州資治通鑑大業元年廢諸州大總管隋書百官志州置總管者列為上中下三等總管刺史加使持節刺史隋書百官志上上州置刺史長史司馬録事參軍事功曹户兵等曹參軍事法士曹等行參軍行參軍典籖州都光初主簿郡正主簿西曹書佐祭酒從事部郡從事倉督市令丞等員并佐史合三百二十三人上中州減上州吏十二人上下州減上中州十六人中上州減上下州二十九人中中州減中上州二十人中下州減中中州二十人下上州減中下州三十二人下中州減下上州十五人下下州減下中州十二人隋書百官志煬帝即位三年定令刺史十四人廵察畿外諸郡從事四十人副刺史巡察所掌六條每年二月乘軺巡郡縣十月入奏置丞主簿録事各一人郡縣隋書百官志郡置太守丞尉正光初功曹光初主簿縣正功曹主簿西曹金户兵法士等曹佐及市令等員并佐史合一百四十六人上中郡減上上郡吏屬五人上下郡減上中郡四人中上郡減上下郡十九人中中郡減中上郡六人中下郡減中中郡五人下上郡減中下郡十九人下中郡減下上郡五人下下郡減下中郡六人隋書百官志縣置令丞尉正光初功曹光初主簿功曹主簿西曹金户兵法士等曹佐及市令等員合九十九人上中縣減上上縣吏屬四人上下縣減上中縣五人中上縣減上下縣十人中中縣減中上縣五人中下縣減中中縣五人下上縣減中下縣十二人下中縣減下上縣六人下下縣減下中縣十人隋書百官志開皇三年以州統縣改别駕贊務以為長史司馬每歲考殿最刺史縣令三年一遷佐官四年一遷佐官以曹為名者并改為司隋書百官志煬帝即位罷州置郡郡置太守罷長史司馬置贊務一人以貳之次置東西曹掾主簿司功倉户兵法士曹等書佐各因郡之大小而為增減改行倉軍為行書佐其後諸郡各加置通守一人位次太守又改郡贊務為丞位在通守下縣尉為縣正尋改正為戶曹法曹分司以丞學官資治通鑑注隋郡縣皆置博士資治通鑑仁夀元年州縣學並廢隋書劉炫傳煬帝即位諸郡置學官武職隋書百官志鎮置將副戍置主副其制官屬各立三等之差隋書百官志舊有兵處則刺史帶諸軍事以統之至是别置都尉副都尉領兵與郡不相知隋職官姓氏總管秦王俊字阿祗揚州總管賀若弼字輔伯雒陽人吳州總管煬帝諱廣𢎞農華陰人揚州總管楊異字文殊𢎞農華陰人吳州總管于顗字元武吳州總管齊王暕字世胐揚州總管已上文帝時任諸使蘇威字無畏京兆武功人持節巡撫江南過會稽房彦謙字孝沖清河人安撫泉括等州長孫覽字休因河南雒陽人持節使於東南道三十八州刺史郡守李德林字公輔博陵安平人湖州刺史元胄河南洛陽人浙州刺史蘇孝慈扶風人浙州刺史崔曠浙州刺史孫萬安婺州刺史沈法興湖州武康人湖州郡守韋元禮浙州刺史謹按隋書慕容三藏傳亦稱授吳州刺史然開皇九年始平陳而此授在開皇元年地既未入職方官亦恐屬遥授舊杭州府志收入悞今不録唐諸使唐書百官志貞觀初遣大使十三人廵省天下諸州有廵察安撫存撫之名神龍二年以二十人為十道巡察使按舉州縣再周而代景雲三年置都督二十四人察刺史以下善惡置司舉從事二人秩比侍御史當時以為權重難制罷之置十道按察使道各一人開元二年曰十道按察採訪處置使二十年分十五道天寶末又兼黜陟使乾元元年改曰觀察處置使通典唐分天下州縣制為諸道每道置使治於所部即採訪等使其邊地加以旌節謂之節度使景雲二年始以凉州都督充節度使其後諸州因同此號得以軍事專殺外任之重莫比焉通志職官畧本皆兼度支營田使有副使一人行軍司馬一人申習法令判官二人分判倉兵騎胄四曹事副使及行軍司馬通署掌書記一人掌表奏書檄參謀或一人或二人參預謀畫隨軍四人分使出入開元中凡八節度使後更增加兼改名號至德以來諸道皆聚兵璔節度使為二十道舊唐書職官志至徳後大郡要害之地置防禦使以治軍事刺史兼之不賜旌節上元後改防禦使為團練守捉使有副使判官通典採訪處置使置於所部之大郡至德之後改為觀察皆并領都團練使其僚屬隨事增置諸道增減不恒使名沿革不一舉其職則皆古之刺史云唐書百官志乾元二年置團練守捉使元載秉政刺史皆得兼團練守捉使楊綰為相罷之文獻通考先天二年始有發運使名唐書第五琦傳天寶中鹽鐵名使自琦始唐書食貨志初轉運使掌外度支使掌内永泰二年分天下財賦鑄錢常平鹽鐵置二使舊唐書食貨志貞元二十一年鹽鐵度支合為一使浙江西道諸使唐書方鎮表至德元年置江東防禦使治杭州乾元二年置浙江西道節度兼江寧軍使領昇潤宣歙饒江蘇常杭湖十州治昇州尋徙治蘇州未幾罷領宣歙饒三州副使兼餘杭軍使治杭州二年廢浙江西道節度使置觀察處置都團練守捉及本道營田使更領丹陽軍使治蘇州復領宣歙饒三州上元二年浙江西道觀察使徙治宣州罷領昇州杭州刺史領防禦使大厯元年浙江西道觀察使罷領宣歙二州十二年罷領丹陽軍使十四年合浙江東西道置團練觀察使建中元年分使為二道二年合浙江東西道觀察置節度使治潤州尋賜號鎮海軍節度使貞元二年分浙江東西為二道復置浙江西道都團練觀察使領潤江常蘇杭湖睦七州治蘇州四年江州隸江西觀察使元和二年升浙江西道都團練觀察使為鎮海軍節度使四年廢浙江西道節度使復置觀察使領鎮海軍使六年浙西觀察罷領鎮海軍使太和九年復置鎮海軍節度使既而復廢大中十二年復置十三年廢置都團練觀察使咸通三年置鎮海軍節度使八年廢十一年又置文徳元年置忠國軍節度使治湖州龍紀元年置杭州防禦使景福元年賜杭州防禦使號武勝軍防禦使二年升武勝軍防禦使為都團練蘇杭等處觀察使尋廢徙鎮海軍節度使治杭州浙江東道諸使唐書方鎮表乾元二年置浙江東道節度使領越睦衢婺台明處溫八州治越州大厯五年廢浙江東道節度使置都團練守捉及觀察處置等使領州如故十四年廢浙江東道都團練觀察使以所管州𨽻浙江西道建中元年復置浙江東道都團練觀察使二年廢以所管州𨽻浙西道中和三年升浙江東道觀察使為義勝軍節度使光啟三年改為威勝軍節度乾寧三年改威勝軍節度為鎮東軍節度都督通志職官畧唐諸州有總管加號使持節武德七年改總管府為都督府幷揚荆益為四大都督府其餘都督並為上中下等前後置制改易不常舊唐書地理志越州中都督府職官志中都督府督一人别駕一人長史一人司馬一人録事參軍一人録事二人功曹户兵法士六曹參軍事各一人參軍事四人典獄十四人白直二十人市令一人丞一人佐一人史二人帥二人倉督二人經學博士一人助教二人學生六十人醫藥博士一人學生十五人刺史太守舊唐書職官志武德改郡為州州置刺史天寶改州為郡郡置太守乾元元年改郡為州州置刺史通典州郡史守更相為名其實一也開元中定天下州府為雄望𦂳上中下之差至德之後諸州始有兵鎮刺史皆加團練使其任重矣通志職官畧唐州佐史有别駕長史司馬一人録事參軍司功司倉司兵司法司士等六參軍州置一員參軍事各有差博士一員醫博士一員凡以州大小而為增減舊唐書職官志都督刺史掌考覈官吏撫和齊民每嵗一廵屬縣别駕長史司馬掌貳府州之事以綱紀衆務通判列曹司録二事參軍掌勾稽功曹司功倉曹司倉户曹司户兵曹司兵法曹司法士曹司士市令掌市廛經學博士掌教授醫藥博士救民疾病下至執刀白直典獄佐史各有其職縣令通典唐縣有赤畿望𦂳上中下之差縣令各一人通志職官畧唐縣有令而置七司一如郡制丞為副貳如州上佐主簿上轄如録事參軍其曹謂之録事并司功以下謂之録事七司尉分理諸曹如州判司録事省受符厯佐史行其簿書文獻通考開元二十六年敕州縣每鄉之内各置一學仍擇師資令其教授舊唐書職官志諸縣令之職皆掌導揚風化撫字黎甿武職唐書百官志元帥都統招討使掌征伐兵罷則省都統總諸道兵馬不賜旌節天寶末置天下兵馬元帥都統朔方諸道節度使都統之名始於此大厯八年罷黄巢之亂置諸道行營都統天福二年罷諸道兵馬元帥舊唐書職官志諸府凡天下守戍兵不成軍曰牙府有上中下折衝都尉各一人武德中採隋折衝果毅郎將之名改統軍為折衝都尉别將為果毅都尉左右果毅都尉各一人别將各一人長史兵曹參軍録事各一人校尉五人每校尉旅帥二人每旅帥隊正副各二人折衝都尉掌領五校之屬總其戎具資糧差㸃教習之法令凡衛士二百人為一團以校尉領之騎射者為越騎餘為步兵團十人為火火備六䭾三馬每歳十一月以衛士帳上尚書省天下兵馬之數以聞凡兵馬在府每歳季冬折衝都尉率五校之屬以教其軍陳戰鬭之法舊唐書職官志諸鎮隋始置鎮將鎮副之名上鎮將一人鎮副一人倉曹兵曹二參軍中鎮下鎮將一人鎮副一人録事一人兵曹參軍一人諸戍屯兵守境處為戍上戍主一人戍副一人佐一人史一一人中戍主一人下戍主一人唐職官姓氏兩浙諸使李襲譽字重光金州安康人巡察使髙祖時任崔知悌許州鄢陵人知温兄廵撫使狄仁傑字懷英太原巡撫使髙宗任李濬按察使齊澣字洗心定州義豐人採訪處置使已上𤣥宗時任崔渙博陵安平人採訪使李希言採訪使韋陟字殷卿採訪防禦使已上肅宗時任蕭復字履初宣慰使柳渾字惟深黜陟使已上德宗時任王栖曜濮州濮陽人都知兵馬使代宗時任吐突承璀字仁貞閩人行兵招討使張子良兵馬使李奉仙兵馬使田少卿兵馬使已上憲宗時任劉巨容徐州人鎮遏使王郢鎮遏使已上僖宗時任王搏字昭逸咸陽人宣撫使髙傑都知兵馬使阮結字韜文錢塘人都知兵馬使錢爽監陳使駱團遏後使指揮使章可周降將使唐晟降將使王公備降將使崔則江海遊弈使俞浩指揮使馬綽餘杭人指揮使又為浙西營田副使梁從晊指揮使皮光業襄陽人兩浙觀察使沈夏浙西營田副使陳岌浙東安撫副使徐溫王逸嘉興平望戍副文宗時任諸道鹽鐵轉運使第五琦字禹珪京兆長安人吕諲河東人元載字公輔鳳翔岐山人穆寧懷州河中人劉晏字士安曹州南華人再任已上肅宗時任包佶字㓜正潤州延陵人代宗時任元琇岐山人韓滉字太沖京兆長安人張滂李衡王緯字文卿并州太原人李錡淄川王孝同五世孫潘孟陽副使王叔文副使已上德宗時任杜佑字君卿京兆萬年人順宗時任李巽字令叔趙州贊皇人李􅅠字建侯盧坦字保衡河南洛陽人王播字明􅆒揚州人凡三任程异字師舉京兆長安人柳公綽字寛京兆華原人已上憲宗時任王涯字廣津太原人穆宗時任令狐楚字㲄士德棻孫李石字中玉楊嗣復字繼之杜悰字永裕京兆萬年人已上文宗時任崔珙博陵人薛元賞李執方盧𢎞正字子彊河中蒲人已上武宗時任馬植字存之敬晦字日彰河中河東人裴休字公美孟州濟源人柳仲郢字諭䝉京兆華原人夏侯孜字好學亳州譙人已上宣宗時任劉鄴字漢生潤州句容人徐商已上懿宗時任崔彦昭字思文清河人王凝字成庶并州晉陽人髙駢字千里南平郡王崇文孫蕭遘韋昭慶孔緯字化文已上僖宗時任崔昭緯李知柔宣惠太子業之子錢鏐字具美杭州臨