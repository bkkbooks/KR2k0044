山下别來嵗頻易屋廬閑鳥聲冢墓遺獸跡可望不可至空多故鄉憶左溪山崇禎浦江縣志在縣東北二十五里山有唐僧元朗墓在亂石間前有巨石髙一丈相傳卯風太急移石鎮之因名卯風石巖坑山崇禎浦江縣志在縣東北五十里山水分流東曰巖坑北曰湖溪水抵富陽以達於浙江江公山浦江縣志在縣東北六十里山形如鷄足髙出羣峰之表登眺越中諸山在指顧間清逺山洞天福地記第十六福地在浦陽縣篔簹嶺嘉靖浙江通志一名斤竹嶺在縣東北九十五里下有斤竹澗界於富陽浦陽江萬厯金華府志一名浦陽汭在縣南界謝恵連詩昨發浦陽汭今宿浙江湄韻譜云水之相入為汭源出縣西深褭山東北流至諸暨縣又東北流入臨浦灣以入於海按浦陽江本吳越三江之一春秋外傳所謂三江環之者是也江水雖微而與吳松錢塘並稱者獨入海也白麟溪浦江縣志在縣東二十五里其源出金芙蓉山麓東流入浦陽江謹按元義門鄭氏家於溪側其後人名濤者集名賢貽贈詩文為白麟溪集湖溪萬歴金華府志在縣北二十里源出巖坑山北流抵富陽縣界以達於大江月泉崇禎浦江縣志在縣西二里源出縣北仙華山之下其泉視月盈虛為消長宋政和三年知縣孫潮疏為曲池築亭以備逰觀嵗久湮塞嘉定十六年縣尹趙崇萊治之咸淳三年知縣王霖龍築塘以瀦泉東南三十歩有大阜上有亭曰髙逺孝感泉浦江縣志在縣東二十五里按圖經在白麟溪側宋鄭綺母張性嗜溪水值旱鑿數仞不得泉綺乃慟哭三日不息水為湧出人以為孝感所致寳掌冷泉柳貫詩注在寳掌山唐千嵗和尚道塲巖竇出泉極甘寒柳貫寳掌冷泉詩一勺曹溪未是甘剌山容易出飛泉消融太古岷峨雪澄映中秋沆瀣天挂樹青􅆐窺洗缽眠沙白鹿伴安禪巖龕無縫身如石逆數髙僧入定年陳樵寳掌泉詩屋上無端雨亂飄雨留石罅碧寥寥浮光出穴藏丹淺浣水為花到地消石髮年深長滿洞王魚春冷未生苗泉中自是蛟龍窟頃刻隂雲滿樹腰湯溪縣西霞山萬歴金華府志在縣東十五里絣塘遶於其畔吳山金華府志在縣東南二十里山頂有小菴菴前澄潭碧水翠色濃隂為湯邑名山之勝屏風山湯溪縣志在縣東南四十里與香爐山相對福民山名勝志在縣東南四十里髙數百丈林木蓊鬱山頂有廟層樓疊閣逺挹數百里又十里為香爐山狀若匡阜卓然雲表旁列衆峰環列競秀青峰山湯溪縣志在縣南十里白石巖山相連髙五百丈周五十餘里每天隂霧罩則穴中氣騰人多怯行九峰山名勝志在縣南十里髙數百丈峰巒秀㧞巖洞玲瓏唐徐安貞肄業於此石榻猶存萬厯湯溪縣志一名風子山先賢龍邱萇仙人鄷去奢俱家於山下趙抃九峯山詩龍邱石室人難繼安正書堂世莫登欲識松蘿最髙處九峯排列一層層時和山舊浙江通志在縣南二十里嘉靖浙江通志又五里曰淨塘山又五里曰靈泉山曰下甘泉山又南二十里曰眺逺山曰上方山曰金魚山一名魚潭山又十里曰黄甲山曰迴龍山又南十里曰章甫山仙舟山萬厯湯溪縣志在縣南三十里其山四面如一天竺山嘉靖浙江通志在縣西南二十五里又五里曰綵雲山青雲山嘉靖浙江通志一名玉葉山縣西七里又西一里曰古城山迤南二里曰塔山五龍山嘉靖浙江通志在縣北三里又北二里曰擂鼓山野老相傳古勸農時擂鼓督耕之地也梅家山湯溪縣志在縣北五里因梅科兄弟家焉故名紫芝山湯溪縣志在縣北五里有牧雲菴一峰湯溪縣志在縣南十里形如覆盂髙不數丈竒松茂竹可供游玩市聚嶺金華府志在縣東南七十里商旅㑹於此必衆而後行以達於遂昌縣界蘭源萬厯湯溪縣志在縣西南十里其地出玊蘭無葉而香每嵗清明時一發苦竹源萬厯金華府志在縣西南二十里瀫江名勝志在縣北二十里上接盈川下通蘭溪其水縈洄如瀫紋故名金寔瀫江詩鮫人宵織靈虚宫雙垂練帶光涵空王梭飛殘半鈎月千尺平鋪白如雪輕烟緯霧迴煖紋東風翦㫁春無痕逺山飛嵐蘸新緑潛蛟吹濤鈿花簇越羅蜀錦不勝裁夜夜蘭江展銀軸秦松齡瀫溪詩細浪真如瀫清川舊得名斜陽過水碓雜樹間春耕草緑偃王廟雲隂姑蔑城前途灘正急濁酒暫時傾大湖萬歴湯溪縣志在縣北十里計一百八十畝與小湖相接小湖計四十六畝餘白砂溪嘉靖浙江通志在縣東南三十里自遂昌界北流至金華入於永康溪出白石永湖湯溪縣志在縣北二十里寛八百餘畝其中張氏村落在焉湖環繞於旁僅西面有路可通所産菱藕鷄頭之属及所蓄魚尾嵗以數千計居民利之琳湖湯溪縣志在縣北十五里水色蒼瑩如玊環遶數里白龍溪湯溪縣志在邑東自宣平遂昌二縣之水㑹於石阬湍悍澎湃折而北注蕩為巨浸婺衢間一要津也浙江通志卷十七
