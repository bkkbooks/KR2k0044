body:
  text: 浙江通志卷十七山川九金華府金華縣附郭上山萬歴金華府志在縣西北隅太守蘇遲謝政居此今為縣治所倚又縣東南一里為芝麻山一名油麻山望仙嶺金華縣志在旌孝門内登嶺可望赤松山七寳渠金華府志自城北麓八郎塘發源南行穿城入由七寳寺側迤􅆔出祠堂巷經四牌坊永濟倉前至八咏門外從河流入雙溪清渠萬歴金華府志發源隕星塚從景行坊轉入東市街至赤松門外流入大溪西市渠金華府志從景蘇坊合流㑹縣前轉入無相寺巷内穿城西入於濠金華縣城外山川城山聚寳山嘉靖金華縣志俱在縣東三里城山宋王埜所居埜記云予家負城面山在井邑如郊藪西偏隙地由園扉而入名曰城山又曰東溪一曲宛轉來朝溪上諸峰秀潤如玊平蕪逺樹荒碕㫁岸一望無際聚寳山一名商山宋學士商日新居此龍鱗山金華府志在縣東八里一名興敎山山石錯落如龍鱗至道山嘉靖浙江通志在縣東三十里一名覆釜又名積道連屛擁翠石磴縈紆絶頂平坦如掌折而南曰焦巖石壁平峭高可百丈長一里環障溪流人望之如赤壁云東山金華縣志在縣東五十五里自東陽之大盆山迤􅆔而來周三百里其東𨽻東陽南即武義之八素山其高巘曰齊雲岡葛公山金華縣志在縣東七十五里一名葛仙峰五峰卓立霄漢抱朴子煉丹處風門山宋濓風門洞碑在縣東南五十里有山曰風門山有石洞莫測所底風蓬然從中出襲人毛髮屛山名勝志在縣南五里一名琴望山又名赤山沐塵山嘉靖金華縣志在縣南二十五里石門山嘉靖金華縣志在縣南二十五里有石對峙如門黄文獻公集云婺城南有山曰石門水乗髙而下者三級人稱之曰龍山即謂此也銅山太平寰宇記在縣南三十里東陽記云山下有泉水色鮮白號曰銅泉玉笥山萬歴金華府志在縣南三十里山有石人峰高三百丈南山金華府志在縣南三十五里分脉自括蒼山北來凝結於此髙幾倍北山周四百餘里其南為遂昌松陽宣平其東為永康武義其西為龍游其北為縣鄙白原山嘉靖浙江通志在縣南四十五里髙千餘仞列二百餘峰馬秦山舊浙江通志在縣南一百里罘罳山金華府志在縣西南二十五里形如罘罳王魯齋柏講學其中望山金華縣志在縣西南二十五里宋樞宻倪普退隠於此每登之以望臨安故名芙蓉山名勝志在縣北十五里金華縣志一名潛岳又名尖峰山方輿記云孤山秀特狀若芙蓉故名智者山舊浙江通志在縣北十五里方鳯金華逰録智者寺山路有亭扁北山唐乾元二年縉雲令李陽冰篆書赤松山萬歴金華府志在縣北十五里一名卧羊山即黄初平黄一作皇叱石成羊處其山往往白石錯落如羣羊散牧初平號赤松子故山以是名葉審言赤松山詩井竈仙踪在林巒曙色分苔荒一徑雨松隠半峰雲啼鴂催春事歸驂帶夕曛試呼黄道士石几薦桐君吳􅕺奎赤松山詩雙鶴冲天去不回五雲繚繞散花臺山中若見皇初起為問留侯幾度來戴良逰赤松山詩早發東郭門晚憇北山址乍離城市喧益羡邱壑美舍車渉嶇嶔停䇿玩清泚㳺目蒼厓巔放情白雲裏攀林感落英涉澗悲逝水冀慿栖遁踪往遇㝠寂士忽見山阿人彷彿平與起何當乗素烟相與嚼丹蕋牧羊事已乖煉石情徒止長揖謝荒祠永媿爾兄弟梁山金華府志從赤松山進約十里煉丹山舊浙江通志在縣北十八里赤松山志髙數千尋一望數百里近在目睫葢二皇君煉丹之所葉審言煉丹山詩仙家只在白雲堆井竈千年間緑苔安得更如黄犢健五年四度入山來金華山萬歴金華府志在府城北二十里一名長山自天台赤城發脉至東陽之大盆山迤􅆔至此横亘金華蘭谿義烏浦江之境周三百六十里山巔雙巒對矗曰玊壺曰金盆壺中有湖名徐公湖水分兩𣲖而下其瀉乎山之陽者由山橋而達於溪其注乎山之隂者由鹿田而入於洞山前兩崖對峙髙數百仞過脉至芙容峰郡治之主山也世説新語林公見東陽長山曰何其坦迤注引㑹稽土地志云山靡迤而長此縣因山而得名也赤松山志周回數十里即赤松山是也抱朴子云此地可以居神免五嶽洪水之患廣傳物志金華山北有仙洞俗呼為劉先生隠身處其内有三十六室廣三十六里石刻上以松炬照之云劉嚴字仲卿漢室射聲校尉當㳟顯之際極諫被貶於東陬隠迹於此莫知所終即道士蕭至元所記也劉峻山棲志予所居東陽郡金華山東陽實㑹稽西部是生竹箭山川秀麗臯壤坱鬰若其羣峰疊起則接漢連霞喬林布濩則春青冬緑廻溪映流則千仞洞㡳膚寸雲合必千里雨散信卓犖爽嵦神居奥宅曹唐皇初平入金華山詩莫道真游烟景賒瀟湘有路入金華溪頭鶴樹春長在洞口人間日易斜一水暗廻閒繞澗五雲長往不還家白羊成隊難收拾喫盡溪邊巨勝花鹿田山萬歴金華府志在縣北二十五里上有沃野可耕此山多生竒石金華雜識劉宋時有玊女馴鹿耕山中常入城市貿易以物置角間刻期而歸遂名其地為鹿田太陽嶺名勝志在縣東北五十里俗傳嶺與太陽齊髙故名踰嶺即浦江縣界黄姑嶺萬歴金華府志在縣東北五十里宋宣和中方臘冦婺邀項徳於此紫薇嶺方輿勝覽在縣西北二十五里有石室梁劉孝標棄官舍其下撰類苑葉顒登九龍山訪孝標遺跡月下飲酒詩杖藜扶我登九龍輕鞋短袂随天風九龍飛去㡬千載雲開秋老青山空孝標先生骨應朽清名與山同始終荒烟衰草迷古洞唯有皎皎棲青楓酒邊半醉弄明月月光忽落酒杯中舉杯歡笑和月吸清光散入照我突兀礌磈之孤𠂻平生所藴剛毅氣洞然明白無隠容信知古人嗜好不在酒愛其果能助發英鋭志始信醖釀麯蘖有竒功興懷不盡下山去明月又在天南東石碕巖嘉靖金華縣志在縣東三里又名石碕頭下瞰大溪髙十餘丈巖下有洞相傳嘗見梅花泛出故名梅花溪又名梅花洞郡城一帶東偏跨其上折竹巖金華府志在縣北二十里金華山之陽太平寰宇記云赤松羽化處金華洞萬歴金華府志在縣北三十里周五百里道家所稱三十六洞金華洞元之天其洞有三巍然在上去天若尺五者曰朝真冽然在中有泉若撃鼓鼙之聲者曰氷壺豁然在下有石若白龍之升降者曰雙龍赤松山志與赤松山相接分上中下三洞上曰朝真中曰氷壺下曰雙龍上洞有石真人儼然臨跨莫測端倪中洞有水簾直下寒玉横飛其間有石像石笋等下洞有石龍虎獅象麟鳯鐘鼓之類難可枚數下洞門極低非舟不可入非燭不可見此洞天原係赤松所轄硯北雜志金華洞有韓旡咎諸人題云淳熙改元七月既望陳巖子象陳良祐天與黄掞子餘趙師龍徳言韓元吉旡咎觀稼秋郊自智者山來謁雙龍洞篝燈蒲伏徧閲乳石之狀寒氣襲人酌酒竹隂支笻至中洞飲泉乃歸程珌游金華三洞記出蘭溪門行可十餘里至上中下三洞下洞石壁卓立水深三尺人仰卧舟中羣僕岸立用竹竿箭入丈餘乃登岸仰視石門去人面僅四五寸舉火燭四壁壁有題名皆五代國初人不見風日墨跡如新中有搗藥臼臼濶可三尺有泉正滴其中終嵗不滿旁有仙人田邱陌井井有耕犁跡又有仙人衣如摺疊羅帛洞中有蝙蝠大如鴉白如玉正類坡仙所記碧落洞中蝙蝠觀已乃出洞約濶十丈許此下洞也中洞有水簾飛涎濺沫有石壺深不可測足稍不謹則墮其中幸冇石天窓光燭其處此中洞也上洞亦有石天窓其石如亂雲如堆卯崩裂欲落人皆不敢仰視然亦亘古至今終不落也中有洞房側身乃可入上有玊女端坐如觀音纓絡具備觀音之前有泉蜜甘能愈疾人既飲復筥挈以歸偕行者八人其七不能登畏其險也方鳯賦三洞詩金華北山三洞天垂髫欲往金華巔春風吹衣雨洗屐痩笻忽拄蒼山烟山髙地平走幽澗根絡石上森楠楩歩從飛橋瞰石洞厓色閲世知幾年風痕霧迹化異物龍首昻左尾右旋就中暗穴如蟇頤急水瀉碧鳴媧弦溯流束炬照徒渉肩背擦石行拳孿水窮路坦内景得以炬交燭窮幽元細紋蹙波涌浪接皓彩凝雪飛霜鮮大為獅子虎犀象𤨏碎亦復蜂屯然蜿蜒雙蟠角尾具一一玊爪拏蒼堅穿龜負甲色深墨長蛇白質相縈纒鐘能鐘聲鼓能鼓不假樅簴知誰縣直櫺斜檻藏湢室短畦長町移原田青雲白霓五色石笑畫敗絮留丹鉛中途經過最深窅伏身低眺洞口泉空明一隙隔逺見秋蟾浴海光嬋娟左巖架衣額横亘疊摺蹙皺垂蹁躚自餘神怪不可極似鑿非鑿鐫非鐫出登山腰叩中洞外視石井聞潺潺入深蹈險思縋綆長竿掲炬後且先水簾可俯心為掉到此十九歸言遄嗜竒不憚歴磊砢足以目故差輕便翻身却望水簾處銀河天落懸吾前常情疑復下百尺積水定作神龍淵石乾徑闢却易進玉筍㧞地修而圓宜為淵處乃為屋亦或摩蘚題新篇同㳺怪我久未出笑謂豈欲井底眠林幽風起日已晚猶睨髙洞山之巔薪蒸可買樵我導不逺數里仍攀縁傍從石壁入深折如鐵户限瓊為櫋儼然海相挂珠絡熟視始信非夸傳右為朝真正面入便想笙鶴遨羣仙雲霞波濤仙衣袂竒詭豈必下洞専歘然修梁架巖起左右蒼白龍形全望中極底勝漆黒雙扉隠隠起半邊天光一道燭扉内知此明罅從何穿深碧峭不可住安得挿羽如飛鳶嗟余兹逰尚牽俗身所驟歴辭難宣但思乞水學坡老洗眼看字消餘年石室洞赤松山志在螺螄巖之側即赤松子引小皇君入山修道之所九龍洞萬歴金華府志在紫薇巖東洞口傴僂可入中昏黒持炬前進深莫可測去洞數百歩有泉涌出與百盤溪合優㳺洞赤松山志去赤松巖十里洞門髙五尺許自左升梯而入虚曠如大厦數十間又出於三十六洞天之外壺天真人所治之區萬厯金華府志一名上霄洞縣東北三十里金華山之南徐公湖太平寰宇記郡國志云在長山上周圍四百八十六歩昔山下居人徐公登山至湖逢見二人共博自稱赤松子安期先生酌湖中水為酒飲徐公醉及醒不見二人而宿莽攢聚其上徐公乃追悔後因名焉赤松澗太平寰宇記赤松子逰金華山以火自燒而化故山上有赤松祠澗自山出故曰赤松澗雙溪名勝志在城南一曰東港一曰南港東港源出東陽縣大盆山經義烏西行入縣境又滙慈谿白溪玊泉溪坦溪赤松溪經石碕巖下與南港㑹南港源出縉雲黄碧山經永康武義入縣境又合松溪梅溪水遶屛山西北行與東港㑹於城下故名梁安世雙溪詩春霖漲合兩溪平雪浪中浮桑拓青南市喚船撑未到一番簑笠滿津亭潛溪萬歴金華府志發源金華山南流十里入航慈溪梅溪金華府志發源武義大家山東北流合南山之箬陽上干下干及下坂之水入焉又八里為梅灘經赤山潭乃為鸕鷀灘金錢灘達於郡城與東港合是名雙溪疊石架屋為通濟橋以通閩廣諸道長樂溪晏公類要郡國志云郡界有長樂溪葛洪游處坦溪嘉靖金華縣志在縣東三十里發源金華山西南流入雙溪東𣲖與玊泉赤松並稱三溪通元溪金華府志發源赤松鄉玉壺山南流至潛岳東紫巖沙溪東南行環城後諸山葢郡城之左峽水也其地有蔣波灘停為深潭乃造𢎞濟橋維舟於其上西北即抵郡治經八咏灘與南港㑹以通温台諸郡蘭谿縣天福山金華府志在城中距縣半里居民環列山麓縣署正東旋轉南嚮此山擁䕶縣右故風氣完聚民物蕃盛甲於東浙銅山蘭谿縣志在縣東十里接金華山之西山石似銅故名洞巖山一名靈洞名勝志在縣東二十里東北一峰怪石屹立人稱小飛來峰峰下有泉曰天池泉清鑑毫髪沿流而出為桐溪山口有天井山石高百餘丈下有天井龍潭于石洞巖山詩萬疊風光水滴衣清泉白石𤨏烟扉半山落日樵相語一徑寒松僧獨歸葉墜悞驚幽鳥去林空不碍斷