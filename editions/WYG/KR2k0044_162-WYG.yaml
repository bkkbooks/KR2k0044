body:
  text: 浙江通志卷一百六十三人物二忠臣一事君以忠人臣之分也而取義成仁與宣猷佐績者其致身則同而遭遇則異兩浙山川正氣鍾為偉人其間黼黻太平潤色鴻業者固代不乏人而竭忠効命臨難捐軀者亦指不勝屈凜然大節豈非争光日月磊磊軒天地者哉志忠臣杭州府南北朝卜天與南史本傳餘杭人善射宋武帝元嘉中為廣威將軍領左細仗元兇劭事變倉卒舊將羅訓徐罕皆望風屈附天與不暇披甲執刀持弓疾呼左右出戰徐罕曰殿下入汝欲何為天與罵曰只汝是賊手射劭於東堂幾中逆徒擊之臂斷倒地乃見殺孝武即位贈龍驤將軍益州刺史諡壯侯給天與家長廩子伯宗殿中將軍明帝泰始初領幢擊南賊於赭圻戰没隋許善心隋書本傳字務本高陽北新城人祖懋梁散騎常侍父亨在陳厯大中大夫領大著作善心起家除新安王法曹陳亡高祖遣使拜通直散騎常侍有神雀降於含章闥善心於座請紙筆製頌奏之高祖甚悅除祕書丞大業十年駕幸江都授通議大夫十四年化及弑逆隋官盡詣朝謁賀善心獨不至化及執至朝旋令釋之善心不舞蹈而出化及目送之曰此人大負氣遂害之母范氏撫柩曰能死國難我有兒矣因卧不食後十餘日亦終謹按隋書地理志高陽隸河間郡並無新城縣而舊唐書許敬宗傳云敬宗杭州新城人善心子其先自高陽南渡世仕江左是高陽乃善心在北之郡望而南渡後之居於新城無疑矣因從浙江舊志載入并據敬宗本傳為證唐許遠舊唐書本傳善心曾孫鹽官人初從軍河西為磧西支度判官時仇兼瓊鎮劍南辟為從事欲以子妻之逺辭兼瓊怒積他事中傷貶為高要尉後遇赦得還禄山之亂或薦遠素練戎事明皇召見拜睢陽太守累加侍御史本州防禦使及賊將尹子竒攻圍遠與張巡姚誾嬰城拒守經年外救不至兵糧俱盡而城陷子竒執送洛陽害之唐書張巡傳安禄山反巡起兵討賊河南節度使嗣虢王巨假巡先鋒巡至睢陽與逺合禄山死慶緒遣尹子竒將兵十餘萬攻睢陽逺自以材不及巡請禀軍事而居其下專治軍糧戰具初睢陽穀六萬斛可支一歲而巨發其半餫濮陽濟陰遠固争不聽至是食盡士多餓死巡出愛妾殺以大饗逺殺奴僮以哺卒至羅雀掘鼠煑鎧弩以食賊知外援絶圍益急士病不能戰城遂陷巡遇害子竒議生致一人慶緒所乃送遠洛陽至偃師不屈死詔贈遠荆州大都督子玫婺州司馬立廟睢陽歲時致祭大中時圖巡遠像於凌烟閣顔真卿唐書本傳字清臣師古五世從孫開元中進士遷監察御史使河隴時五原有寃獄久不決天且旱真卿辨獄而雨郡人呼御史雨遷殿中侍御史楊國忠惡之出為平原太守安禄山逆狀牙蘖真卿度必反陽託霖雨増陴濬隍日與賓客泛舟飲酒以紓禄山之疑禄山反河朔盡陷獨平原城守具備使㕘軍李平馳奏元宗大喜曰朕不識真卿何如人所為乃若此時平原有静塞兵三千乃益募得萬人饒陽濟南清河鄴郡景城各以衆歸軍聲大震會賊破東都遣段子光傳李憕盧奕蔣清首狥河北真卿恐衆懼紿諸將曰吾素識憕等其首皆非是乃斬子光藏三首他日結芻續體為位哭之是時從父兄杲卿為常山太守斬賊將李欽凑等清土門十七郡同日自歸推真卿為盟主兵二十萬絶燕趙詔拜戸部侍郎加河北招討採訪使清河太守使郡人李㟧來乞師真卿許之檄清河等郡遣李擇交拒戰賊敗斬首萬級肅宗即位禄山急攻河北諸郡復陷獨平原博平清河固守真卿渡河謁帝詔授憲部尚書遷御史大夫方朝廷草昩不暇給而真卿繩治如平日宰相厭其多言出為馮翊太守轉浙西節度使召為刑部侍郎李輔國遷上皇西宫真卿率百官問起居輔國惡之貶蓬州長史代宗立累遷尚書右丞俄以檢校刑部尚書為朔方行營宣慰使未行留知省事更封魯郡公時元載多引私黨畏羣臣論奏請每論事先白長官長官以白宰相宰相詳可否以聞真卿上疏謂塞絶忠諌載以為誹謗貶峽州别駕遷撫湖二州刺史載誅擢吏部尚書楊炎當國以直不容換太子少師猶領使及盧杞益不喜改太子太師并使罷之數遣人問方鎮所便將出之真卿辭曰先中丞傳首平原面流血吾親舌䑛之公忍不見容乎杞矍然下拜而銜恨切骨李希烈陷汝州杞乃遣真卿往諭詔可公卿皆失色既見希烈宣詔㫖希烈養子千餘㧞刀争進真卿顔色不變時朱滔王武俊田悅李納謂希烈曰聞太師名徳久矣欲建大號而太師至求宰相孰先太師者真卿叱曰吾守吾節死而後已豈受若等脅耶希烈乃拘真卿守以甲士掘方丈坎傳將坑之真卿曰死生分矣何多為乃拘送真卿蔡州度必死作遺表墓誌祭文指寢室壁下曰此吾殯所也興元後王師復振賊慮變遣將辛景臻安華至其所積薪於庭曰不能屈節當焚死真卿起赴火景臻等遽止之希烈弟希倩坐朱泚黨誅希烈怒使閹奴害真卿曰有詔真卿再拜奴曰賜卿死曰老臣無狀罪當死然使人何日長安來奴曰從大梁來罵曰乃逆賊耳何詔云遂縊殺之年七十六淮蔡平子頵碩䕶喪還帝廢朝五日贈司徒諡文忠真卿立朝正色剛而有禮天下不以姓名稱而獨曰魯公善正草書筆力遒婉世寶傳之謹按唐書本傳真卿為師古五世從孫而師古則瑯琊臨沂人也成化杭州府志引海寧志以真卿為海寧人萬厯杭州府志云其先瑯琊人祖昌任鹽官州判卒於官父必寧占籍鹽官又海寧縣東一十五里原吉鄉有公墓則家於鹽官無疑矣今仍之五代水邱昭劵兩浙名賢録臨安人事吳越王佐為内都監使佐欲誅程昭悦令昭劵夕率甲士千人圍其第昭劵曰昭悅有罪當顯戮不宜夜興兵未幾佐卒倧嗣與何承訓謀逐胡進思昭劵諫不從謀洩難作昭劵聞變入衛遂被害進思之妻曰他人猶可殺昭劵君子也奈何害之進思後亦悔懼曰我不幸獨害君子孫陟成化杭州府志新城人仕錢氏為尚書任常州防禦時寇盜充斥調兵督戰竟殁於陣吕城為之立廟以䘏禮歸葬墓在所居太平鄉百文村之西復立廟於斯雙楓合抱至今猶存宋鞠嗣復宋史本傳宣和初知休寧縣方臘黨破縣欲逼使降面斬二士以怖之嗣復罵曰自古妖賊豈有長久者爾當去逆從順因我而歸朝官爵尚可得何為脅我降後知必死屢言何不速殺我賊曰我縣人也明府宰邑有善政我不忍殺乃委之而去初嗣復聞難率吏民修城衆樂赴功守備畧就朝廷知之加直祕閣擢知睦州嘗為賊所傷自力渡江乞師於宣撫使未及而卒謹按萬厯杭州府志作錢塘人今從之滕茂實宋史本傳字秀頴臨安人政和八年進士靖康元年以工部員外假工部侍郎副路允迪出使為金人所留金尼瑪哈素聞茂實名乃遷之代州又自京師取其弟華實同居以慰其意欽宗自離都城舊臣無敢候問起居者茂實聞欽宗將至即自為哀辭且篆宋工部侍郎滕茂實墓九字取奉使黄幡裹之以授其友人朔寧府司理董詵欽宗及郊茂實迎謁拜伏號泣金人諭之曰國破主遷所以留公葢將大用廹令易服茂實力拒不從請從舊主行金人不許憂憤成疾卒詵歸録哀辭上其事紹興二年贈龍圖閣直學士官其家三人唐恪宋史本傳字欽叟錢塘人以廕登第調郴尉大觀中䍧牱内附召為屯田員外郎持節招納敵始恫疑衷甲以迎恪盡去兵衛從數十卒單行敵望見懽呼投兵聽命以奉使稱職遷右司員外郎起居舍人迎遼使還言河北邊備弛廢宜及時治之中貴人中以他事降知梓州召拜戸部侍郎京師水暴至汴且溢付恪治之因上疏言水陰𩔖也至犯宫闕天以陰盛之沴儆告陛下願垂意時事益儆天戒靖康初拜同知樞宻院事洎金兵薄城下宻言於帝曰宜舉景徳故事留太子居守而西幸洛連據秦雍領天下親征以圖興復帝曰當以死守社稷何㮚為相京城不守車駕至金營恪曰計失矣既而還宫恪請入覲㮚不可復幸恪曰一之為甚其可再乎及金人逼百官立張邦昌令吳幵莫儔入城取推戴狀恪仰藥而死王禀杭州府志海寜人當靖康之阨以孤軍守太原敵九攻而九拒之援兵不至矢盡糧絶招之卒不屈城陷與其子荀入告原廟抱太宗御容抗辭罵賊父子同赴汾水死建炎四年追封禀為安化郡王諡忠壯茍贈右武大夫恩州刺史召其孫沆襲封楊九鼎咸淳臨安志字叔鎮以父由義任入官帥襄漕夔有善政復易利漕帥天漢敵刼大散闗九鼎復之又復皂郊殺偽元帥完顔阿璘後兵再至九鼎死守清野原除太府少卿總領蜀賦詩都綂吳政戰没麾下兵潰敵據漢中擣大安軍九鼎檄張威何進勦於三泉匹馬不返會蜀有新帥首招潰卒至雞公嶺復叛帥挾兵以遁有勸九鼎遁者答曰九鼎有職守不可去賊至遂遇害贈五官至朝議大夫官其子三人史徽萬厯杭州府志字洵美一云東美鹽官人勤苦力學登崇寧進士累遷戸部郎官出為京西運判徽宗下詔罪已罷西城所督逋賦徽悉焚其租籍進右司郎中以疾致仕高宗即位起為司農少卿建炎三年扈駕至江口遂遇害贈左大中大夫右文殿修撰子龜年岑年皆至員外郎姚興咸淳臨安志舊名叔興新城人有勇力善武藝為統制官隸王權紹興三十一年海陵王南侵兵至和州尉子橋興以一軍三千人力戰權置酒仙宗山上擁羣刀斧自衛殊不援興興殺賊數百以援不至而没朝廷為之立祠以表其忠寧宗朝追贈襲慶軍節度使開府儀同三司謹按宋史以興為相州人今從咸淳臨安志存之趙卯發宋史新編字漢卿昌化人卯一作昻以上舍登第權通判池州元兵渡江守王起宗棄官去卯發攝州事繕壁聚糧為守禦計元兵至都統張林屢諷之降卯發憤氣填膺瞠目視林不能言林以兵出巡江陰降歸而陽助卯發為守兵皆歸林卯發知不可守乃謂其妻雍氏曰城將破吾守臣不當去汝先出走雍氏曰君為忠臣我獨不能為忠臣婦乎兵薄城卯發晨起書几上曰君不可叛城不可降夫妻同死節義成雙與雍氏盛服同縊從容堂卯發始為此堂名以從容及兵至領客堂中指所題扁曰古人慷慨殺身易從容就義難此殆其兆也卯發死元巴延具棺衾合葬於池上祭墓而去事聞贈華文閣待制諡文節雍氏贈順義夫人録二子為京官周宣瞿佑周宣傳字公猷錢塘人仕職方郎中徳祐丙子元師次臯亭宣上表請兵禦之時陳宜中主降議不報因自集族黨家丁為報國計及元兵入臨安帝后遠狩宣乃北面泣拜率衆與戰身被刀矢負痛手格殺數十人隨遇害文天祥以詩哭之曰孤忠莫克挽頽軍一死名高百戰勲總恨權奸多異議難禁玉石不俱焚殺身却羨君先我殉國終當我繼君他日幽魂逢地下血應化碧氣凝雲馮驥兩浙名賢録字徳父富春人性至孝母病刲股和藥以進登景定進士調安吉武康簿有聲累遷大理丞時元兵下襄樊朝廷募豪傑為戰守計驥被薦協張濡守獨松元兵來攻殺其渠帥元將益兵搗之濡遁驥與弟驌力戰死贈集賢殿修撰謝緒錢塘縣志理宗皇后謝氏之族也世居邑之安溪徳祐二年帝北狩謝太皇太后以病請留元兵突入宫舁之而去緒大慟作詩二章與其徒訣曰生不能報國恩死當訴之上帝異日黄河水北流是吾效靈之證遂赴水死時苕水陡湧高丈餘緒尸立而逆流舉葬於金龍山之側元鄒世聞杭州府志字聞遠登州黄縣人襲授百戸戍海寧遂為海寧人張士誠陷浙西見元官從賊者切齒罵不絶口元亡不食而死龔瑾嘉靖海寧縣志海寧人曾任知州死元節葬安國寺後詩稿散逸不傳止存蒼雪軒詩云月浸蒼龍骨雲分翡翠􅁫九疑愁正斷清夢到書齋明袁興萬厯杭州府志錢塘衛千戸諸暨之戰有劉總管者為賊所執興馳騎突入其陣賊衆披靡斬首數十級脫劉還及見主帥劉自以為功興恬不之怪亦未嘗以語人人咸服其量軍士嘗乏食興解銀甲易粟活之及王師進功雲南之龍海興從征慨然曰吾此行不生擒渠魁不返也遂力戰死詔遣使祭贈明威將軍指揮僉事謹按明代指揮千百戸多由世襲隸籍浙江故載入人物傳中其非世襲者仍載名宦後倣此沈道南杭州府志錢塘人建文時為御史金川之變道南死之陳鏞成化杭州府志字叔振錢塘人永樂進士選庶吉士授禮部祠祭司主事宣徳二年征交南兵部尚書李慶賛軍務舉六卿之屬才且賢者自輔遂以鏞與儀制郎中豐城史安同行二人屢進忠益慶與主將初聽之屢勝繼不納竟至敗被執鏞顧安曰吾輩見危授命耳皆不屈死夏誠分省人物考字克誠錢塘人舉人正統初任沙縣敎諭清慎有志操部使者上其賢擢監察御史己巳車駕北征誠扈從至土木乗輿陷敵中誠死於難後朝廷追録死事忠勤官其子繼先撫州知府于謙湯斌于謙𫝊字廷益錢塘人永樂辛丑進士宣徳元年授山西道御史巡按江西辨疑獄出數百人於死從征漢庶人既就縛帝命謙數其罪謙應聲數百言辭嚴義正庶人流汗伏地不敢仰視帝大喜五年超遷兵部右侍郎巡撫河南山西於吏術民事無不精到而尤以足兵食明舉措振綱紀為急當時三楊當國皆重謙所奏請朝上夕報可以是得行其志正統中議事京師薦㕘政孫元貞王來自代時王振用事以謙無所餽嗛之嗾言官劾謙以久不遷怨望擅舉人自代無人臣禮下法司論罪未幾貰出左遷大理寺少卿河南山西民赴闕請留謙者近萬人乃命以少卿復巡撫十二年召入為兵部右侍郎十四年秋額森大舉入寇王振挾帝親征謙與尚書鄺埜諫不聽埜從行而謙留治部事土木師潰帝北陷京師大震皇太后詔郕王監國王御左順門廷臣争言振罪應族王倉卒未有以應衆洶洶捽振黨錦衣指揮馬順及毛貴等捶死之班行亂王懼屢欲起謙直前掖止之請下令曰順等有罪捶死弗論即遣都御史陳鎰籍振家械其姪山磔於市諸臣始退王乃起還宫吏部尚書王直執謙手嘆曰朝廷正藉公耳今日雖百王直何能為皇太后聞之曰國家幸賴斯人尋進兵部尚書委以軍事加太子太保辭不許九月景帝即位十月額森自紫荆闗入殺掠官民警報日急侍講徐珵言宜及時南遷廷臣多和之謙厲聲曰京師天下本宗廟社稷陵寢在焉百官萬姓帑藏儲蓄無恙一動足大勢去矣奈何欲蹈靖康覆轍乎帝是謙言議始定謙乃奏用王通楊善守京城孫鏜衛穎張軓雷通分兵出戰石亨楊洪柳溥為總兵監以給事中王竑葉盛程信姚夔盡移郭外人入城所至堅壁清野勿與戰通州糧百萬悉散給官軍餘令運入城芻茭不及運者焚之勿資敵謙躬擐甲胄慷慨誓師士人皆感奮額森衆薄城下見嚴陣不敢犯要大臣出議和索金帛帝以問謙謙曰臣受命治軍旅他非所敢聞也乃約戰以大礟擊其營死者數千人額森大阻詔進少保謙固辭額森數遣使通欵許歸上皇時大臣王直等請遣迎駕甚力上不懌謙從容進曰天位已定誰敢異議惟君臣大義兄弟至情自當遣使奉迎耳帝改容曰從汝從汝於是遣都御史楊善等往迎上皇還京師當是時額森既屢犯京留師托克托布哈寇遼東布拉珠寇陜西浙江葉宗福建鄧茂七廣東黄蕭養各擁衆僣號南蠻西蕃復乗間蠢動命將出師變在俄頃謙内固京城外籌邊鎮條畫悉中機宜僚吏受成相顧駭服雖宿將勲臣小不中程律即請㫖詰責片紙行萬里外無不惴惴効力帝推誠倚任而口不言功深自斂飭帝嘗賜第闗西謙曰國家多難何以家為取前後所賜璽書袍鎧冠帶弓劍之屬悉加封識歲時一謹視而已謙自奉儉約所居僅蔽風雨平時多宿直房以便朝謁間病痰壅和藥需竹瀝帝為親幸萬歲山伐竹取瀝以賜或言謙柄用太過帝意益堅初徐珵議南遷因謙言為帝所薄後改名有貞深怨謙石亨初坐事繫獄謙請赦而用之亨乃請官謙子冕府軍副千戸謙曰臣欲為子求官當乞恩君父何必假手於亨耶亨聞而慚憾益甚亨從子彪驍雄謙數裁抑出彪為大同遊擊㕘軍於是憾至切骨太監曹吉祥劉永誠皆與謙共事兵間憚謙凌已亦銜之帝不豫有貞與亨吉祥開南城門復上皇位遂誣謙與大學士王文太監舒良等欲盜金符迎立襄世子都御史蕭維禎責簿坐謀反當族廷鞫時文不勝憤仰首辨不已謙曰亨等意如此辨何為獄具英宗猶豫曰謙實有功若何有貞進曰不殺謙今日之事無名帝意乃決遂斬於東市家屬戌邊謙死之日天日陰霾行路涕泣皇太后聞之嗟悼累日帝亦悔之成化元年詔復謙官赦其家遣行人諭祭𢎞治三年贈太傅諡忠愍萬厯中更諡忠肅建祠墓側曰旌功杭州府志冕字景瞻初以父功蔭府軍千戸及謙被譖死冕坐謫龍門屢上書訟父寃憲廟初事白加謙官諡因復冕官冕請改文資授武庫員外郎厯陞應天府尹致仕冕遘家難放徙窮邊而能閉門却掃以讀書纂言為事起謫籍官兩京所在以修謹稱沈敬分省人物考字克欽錢塘人正統進士授兵部主事轉郎中公忠正直為權奸所惡景泰末謫戌遼陽成化改元詔復其官超拜河南㕘政歲飢民流敬及時賑發全活甚衆計處榆林餽餉供用不乏轉廣西左布政使時田州黄明倡亂殺逐知府岑溥敬受督撫檄統衆征勦梟明父子擒斬無算觸險乗瘴深入賊巢中毒死朝廷官其子𤦺何鼎兩浙名賢録餘杭人入内為長隨好讀書知大義𢎞治間見張皇后兄弟出入宫禁心甚忿之以為祖宗法度外人不得至此一日孝宗與張飲偶起如厠除御冠於典冠者張戲之復帶酒汙宫人鼎持金瓜候門欲擊之時太監露其事張僅得脫明日鼎上疏極言之張后大怒捽鼎至撲殺之投屍海子吕忠嘉靖海寧縣志字守誠其先廬州人世襲海寧所副千戸遂為海寧人正徳八年江西姚源洞王浩八作亂流刼浙東當道檄忠率兵勦捕忠辭其母顧妻鄭氏曰吾母在汝謹事之為臣忠吾不暇内顧矣行至開化賊衆突至郡卒勸曰賊勢甚盛可避之忠怒提刀砟其背曰朝廷養兵百餘年一旦忍忘之耶直前酣戰射殺十數人孤軍無援被賊攅刺墜馬死奉㫖陞其子一級林文貴嘉靖海寧縣志台之黄巖騎兵也從千戸吕忠征姚源洞賊賊猝至忠力戰死衆遂奔潰文貴厲聲曰不可負主大呼挺槍刺賊賊擁衆執之脅使降文貴怒罵曰我朝廷命軍豈從爾賊賊縛貴於樹罵不絶口剖腹刳心而死查約閩書字原博海寧人𢎞治進士以南刑部郎出為福建僉事治異等延平邵武暨福州軍相繼煽亂約以單車申諭衆咸戢服擢山東副使進福建左布政使歲洊飢下令諸司掾上納者悉出榖分貯諸倉備賑擢撫山東未行侯官人林汝美以殺妻論死繫獄中又車二小劇盜也與汝美同繫二囚私賂守獄卒寛其械遂藏兵瓜中率衆破狴犴出殺令復破府中獄出衆囚相與趨南門將入海約自以故有徳於閩出為化誨言未脫口而刄已陷胸矣閩人立祠祀之姜楫嘉靖海寧縣志海寧所千戸嘉靖三十二年征倭寇戰死海鹽城外事聞陞其子本所副千戸孫商偉富陽縣志富陽人嘉靖癸丑歲貢授福建寧徳州敎諭倭寇入學宫欲挾商偉行商偉曰我學官也職死學中去此一步非死所矣遂死夫子像前吳懋宣杭州府志杭州衛指揮萬都督表女夫也嘉靖癸丑倭亂海上表聞變命懋宣將之力焚其巢大破之懋宣乗勝逐寇倭偽遁為所扼懋宣曰死吾職也恨不殱此賊耳重創而死姚來舊浙江通志字舜延仁和人萬厯間累著軍功授惠州㕘將泰昌元年秋山賊竊發惠州大震來孤軍深入賊砦戰没奉㫖建祠惠州許當辰舊浙江通志字健菴餘杭人天啟間武進士授廣東旗鼓都司征海寇劉香力戰没於陣趙景和舊浙江通志字萬育天啟舉人為廣徳州守下車甫三月馬士英擁兵南下過廣徳益無紀律横甚景和慮暴兵之害民也諭郭外百姓盡徙入城閉城門不納士英怒縱火破城入殺之百姓悲思立祠以祀妾秦氏投井死于蒼璧僕錢義匿之得脫成壬戌進士祝淵海寧縣志字開美海寧人崇禎舉人時劉宗周負時望䟽救熊開元姜埰上斥其官廷臣無敢言者淵發憤上䟽曰流寇方訌不宜遽斥風憲䟽入下所司切責之問究主者賜廷杖抗聲曰男兒志在報國安有身上書更指他人者金吾亷其詞直上之遂釋獄甫半日而賊陷京師作絶命詞以死許文岐舊浙江通志字我西仁和人崇禎甲戌進士授南京兵部主事進郎中出知黄州府未逾月賊至文岐伏兵以待賊奔潰奪大旗而還擢下江防道駐蘄州十六年賊乗夜急攻會大雪枹皷無聲城陷被執檢其臂得印擁至營不遽加害散繫七十日遇黄州舉人曰賊不過什二三良民被脅者過半耳今以柳圏為約可自投殺賊有王固統者洩謀於賊賊宻探諸營果有柳圏賊怒遂并被害贈太常卿徐餘慶舊浙江通志字兆穀新城人崇禎元年以貢授四川珙縣知縣居官清慎吏民懐之會張獻忠陷蜀所過州縣望風披靡餘慶堅守孤城城陷不屈為賊所害顧王家舊浙江通志字翊明仁和人以鹽漕御史掾授臨汝州吏目臨汝當襄雒之衝王家兼倅事嚴保甲詰奸宄繕城堞調糧餉賊畏莫敢犯署郟城縣新令李貞佐至王家以秩滿遷去汝人伏御史臺乞留請攝監軍司馬崇禎十三年逆闖攻汴不克遂犯郟城圍數重王家率敢死士嬰城固守矢竭城陷賊蜂擁入城褫貞佐衣冠倒懸大樹上將斷其舌磔焉王家瞋目曰賊無道至此恨不斬汝以啖語未畢刄亂下竟同日死子國工詩賦賊盡戮郟人將及國國給賊將以藩邸藏金所在告俟間拾巨石擊賊賊怒支解之汝人收國屍葬峨嵋山翁之琪舊浙江通志字元倩仁和人陜西按察使汝進孫也初為郡諸生名珏三試不利乃投筆從戎中崇禎十二年武榜上親簡將材竒之曰神骨森挺忠孝人也擢第一初任舟山守備平海寇陳虎移守衢州會金陵失守慟哭自沉於蕪湖板子磯驚湍逆流屍不没者三日收其骸如生王寅舊浙江通志山陰人徙居錢塘通韜畧膂力絶人中天啟丁夘武舉以父大經征播功襲紹所千戸崇禎初遷浙撫守備檢軍伍多脆弱不任决拾大詫曰昔南塘戚公練浙兵精鋭莫敢當天下稱為鴛鴦隊於是倣其法訓練一年而精悍猛鷙比節制兵遷龍江都司未任調守泗州陵寢盜屯集磨盤麓寅云彼衆我寡及其未集急擊弗失於是捲甲趨盱眙殺賊先鋒七大王自午戰至申賊益四集矢盡力竭衝陣死贈鎮國將軍賜祭廕一子翁鴻業舊浙江通志字一瓛錢塘人天啟乙丑進士以儀部郎出為廣東右㕘政分守嶺東以平海寇出寃獄稱能吏丁丑補山東督學右㕘政羽書旁午一日十警鴻業分校諸郡間語諸生力學讀書當知世間忠孝事戊寅御史檄鴻業署兵備分守濟南東昌己卯正月大霧晝晦城潰投烈焰以死俞起蛟舊浙江通志字芝雲錢塘人以明經起家拜魯憲王長史憲王薨肅王立欲廢世子起蛟察世子孝從容入告力持得免肅王薨世子立值歳大歉起蛟勸王賑飢自出禄二千石繼之泰山盜李青山聚黨刼掠勢張甚起蛟與范黄門淑泰力戰俘其衆崇禎十五年兖州破魯王死起蛟率家屬二十三人死之陳潛夫舊浙江通志字元倩仁和人崇禎丙子舉人選授開封府推官明亡至山陰抵小赭村謂其妻孟氏曰勉之吾為忠臣而為烈女孟氏笑曰此吾心也與其妾櫛髪更服以待潛夫整衣冠拜祖父像已拜别其母與弟携妻妾至化龍橋皆沉於河王道焜舊浙江通志字昭平錢塘人父國柱以舊厯舉人為廬州推官治獄多所平反道焜辛酉舉於鄉為福寧教官旋令南平邑為閩海孔道道焜至飭保甲練軍實嚴讀法捐倉廪具有方畧遷南雄同知時光澤有妖寇之亂閩父老乞請留道焜加同知銜知光澤縣事道焜單騎入賊營諭以利害賊皆散去一邑以安崇禎時陞兵部職方司主事明亡與陸行人培同日自經死子均崇禎壬午舉人陸培舊浙江通志字鯤庭吉水令運昌之子運昌任永豐吉水多吏蹟培與兄圻弟堦並馳名一時崇禎庚辰成進士授行人南還父卒培自留都奔赴長跪座前以手批頰頰盡腫齧其臂血淋漓聲淚俱下明亡入横山桐塢嶺作絶命詩二章遂自經死著有威鳯堂文集行世姚竒允舊浙江通志字有僕錢塘人崇禎庚辰進士癸未廷對時李闖漸逼京師念時務最急者莫如東宫監國守南京白於都御史李邦華華即拜疏上心動會有沮之者遂不果謁選得南海縣尋以守贛死於贛子端字以式亦死柳州周宗彞舊浙江通志字五重海寧人崇禎己卯舉人少出吳太沖章正宸之門為人有膽決尚氣節太沖正宸數稱之曰周生吾道干城也後殉難妻卜氏二妾朱衣紫衣及弟啟𤦺皆死焉俞元良舊浙江通志字仲驤海寧人崇禎癸未進士明亡與其兄元禮同死之諸復杭州府志字子葭仁和庠生明亡巾服詣欏木營死之錢塘令顧咸建殮其屍葬秦亭山方天眷杭州府志字維嶽仁和庠生安貧力學避居石人塢授徒講讀日採薇蕨以自奉明亡乃正衣冠再拜自剄死國朝高咸臨杭州府志字與侯仁和人讀書負氣節順治乙酉選貢任福建永安令時寇盜四起咸臨下車撫循百姓遠近稍集丁亥賊陷建寧擁衆犯永安咸臨防禦侄顯宗從弟其翰中表吳之璜先後捍賊死相拒五閱月而救不至糧絶隣邑盡陷咸臨奮勇數獲賊磔之城陷被獲脅降不屈死之詔贈福建按察司僉事賜祭葬廕一子鳯采潘名世廣東名宦冊仁和人順治初為保昌令律已以亷愛民如子李成棟未叛之前檄民輸布千匹名世力争成棟怒坐以他事戮於市籍其家無長物百姓莫不流涕吳夢鼎錢塘縣志字仲鎮錢塘歲貢順治二年巡撫張存仁委攝蘭谿縣事遇土寇不屈死父敏惠捐建城東土壩居人呼為吳公壩錢法裕山西名宦冊遼東籍仁和人順治三年任蒲州知州政舉民安姜瓖之亂城陷被執不屈聞贈死事司㕘議布政賜祭葬吳允焞公舉事實字𢎞文仁和人順治三年由貢士隨征福建有功授建寧府壽寧縣知縣四年山寇四起乃招集義勇身先禦寇以衆寡不敵被執腦篐懸樹體無完膚罵不絶口而死妻瞿氏常勸允焞盡恩䘏忠勦寇勿以身家為念聞夫被害投繯死䝉贈廕一子垣潘際昌福建名宦冊仁和人順治三年隨征入閩知永清縣事適土寇蠭起嘯聚攻城際昌率民兵登陴守禦百餘日外援不至城陷投井死胡萬鑑福建名宦冊仁和人順治三年以通判隨征入閩授永清縣學司訓土寇薄城率諸生募民兵登陴捍禦百餘日城陷被執不屈死之沈孚建福建名宦冊錢塘人順治四年知政和縣山寇陷城被執罵不絶口死之鄔象鼎殉難録字符九仁和人順治己丑進士備兵羅定時猺獞反側象鼎提師深入不數月而殱厥渠魁諸砦底定西賊破桂林掠高肇遂逼羅定象鼎率長子元祼侄聨珠元珦伏弩四布砲石並發擒斬二千餘人賊遁既而敗兵旋集悉衆攻圍累月不解糧絶外援不至謂元裸曰死職吾事也爾無官守盍歸元祼泣願賫檄乞援隣封夜縋城出為賊所得攻圍益急象鼎督兩侄攘臂突圍奮力殺賊衆寡不敵亦為賊獲城陷賊縳元祼至前露刃脅降象鼎罵曰吾豈愛吾子以背吾君耶元祼遂遇害象鼎被幽别室抗節不屈絶食七日死聨珠元珦并家屬五十七人咸殉難詔贈光禄寺正卿霖入監諭祭葬廕一子作王起彪江西通志字虎子錢塘人順治丁亥進士戊子授徳興縣知縣值江右有金逆之變起彪隨征南大將軍營次半載己丑江西平就任時饒郡巨寇雖滅而餘孽竄伏山谷者間竊發隣邑董三等賊擁衆猝至起彪率民兵守之寡不敵衆被執幽於天君廟脅之降不屈遂遇害雍正六年詔賜廟祀洪恩宣杭州府志字成之臨安人邑諸生時山寇未靖縣令劉允燦奉文勦撫恩宣願往至賊巢諭以大義不從遂遇害令高其成為之勒碑置田七畝給其子供祀王萬鑑錢塘縣志字人玉其先山陰人四世祖徙錢塘遂為錢塘諸生順治戊子鄉貢授福建藩幕攝將樂縣事土賊吳揚為亂萬鑑下車給帖招徠旬日之間化寇為民尋陞萬年縣知縣值閩逆倡叛萬鑑恢復縣治持守久之赴省請益兵為阻險計甫出北門而賊猝至萬鑑力戰以拒被砲石聞贈擊死事㕘議賜祭葬廕一子國治汪士嵋鄉賢留祀冊錢塘庠生慷慨有志節甲寅閩變獻䇿隨征乙卯奉委招撫直入賊巢為逆黨曾養性所害謹按紹興府志蔡佳傳佳偕同知汪士嵋入賊營不屈被害是殉難時士嵋已授為同知矣謝廷謨公舉事實於潛人順治十三年歲貢授處州雲和訓導課文興行士風丕變康熙十三年耿逆叛攻陷處州廷謨懷印入山號召義勇被執勒授偽銜不屈絶食而死趙燾杭州府志仁和人順治丁亥武進士任象山右營㕘將康熈乙卯勦賊至貓頭洋馘斬偽都督周貴旋因風勢失利左右皆不能為力燾鼓勇當先手刃數人力屈被害賜祭葬贈副將廕一子守備嘉興府五代高渭海鹽縣圖經彦之子初從彦在湖武肅王巡衣錦城會有徐綰之亂焚掠郛郭將及内城彦聞變遣渭赴難渭言今日不利彦曰赴難之急何顧忌辰亟促渭行渭遂率所部徑趨靈𨼆山為賊伏兵所害後淮人檻送綰歸王剖心祭渭屠瓌智皮光業屠瓌智墓志字寶光其先河東人後徙澉川之青山遂為海鹽人乾寧四年遷越州指揮使光化三年調守湖州偕刺史高彦子渭抵賊壘矢盡援絶為伏兵所害贈忠義軍匡國功臣武康節度使宋朱張恂舊浙江通志字宗厚嘉興人試入上選為省元值車駕避元兵於崖山張恂率舟師勤王力戰多所斬獲會風雨大作與樞宻陸秀夫同日溺海元俞庸𢎞治嘉興府志字子中嘉興人為平江路推官淮兵壓境庸募勇士鑰守盤門郡僚高安等謂庸曷不俱竄庸厲聲曰公等以世臣守大城一旦臨利害先民逋逃不顧義與恩耶高安持鐵簡擊庸仆地遂開門兵至城下庸未甦被擒置諸馬上甦以計脫去㣲服間道歸久之太府知其人將授以爵謝之曰吳門之役吾有死所今日之生出不幸耳尚負面授他命見天日乎因痛憤卒黄中玉貝瓊黄中玉哀辭序檇李人以父廕授江山縣尉時海内鼎沸詔徙行臺於紹興以控制閩越至正丁酉擢為㕘謀統鄉兵守衢婺越二年城陷遇害一門十三人俱没長子孟輔出而僅免明金絅萬厯秀水縣志舉元鄉試洪武中厯蘇州守百姓苦官民田輕重不齊里胥夤緣為奸利絅上疏請減重額得罪賜死程本立吾學編字原道桐鄉人明初舉明經秀才洪武九年除秦府引禮舍人補周府禮官進長史從王來朝被累謫雲南馬龍他郎甸長官司吏目從一僕赴任會所部為逆本立單騎入諭順逆利害衆感悅歸附是冬復變帥潘沐英張紞屬本立行縣典兵事且撫且禦本立不避艱險山行野宿自楚雄姚安抵大理永昌鶴慶麗江往來綏輯軍民稍安三十一年奏計入京徵入翰林充纂修官修太祖實録成改江西按察副使未至聞靖難兵入京自縊死所著有巽𨼆集楊任分省人物考嘉興人洪武間由人才擢知袁州黄子澄一見以國士許之靖難兵起引疾歸事定子澄出徵兵往約蘇守姚善航海善不可子澄乃至任家共謀大事事泄任與子澄俱被執至京磔於市子禮亦坐死金鼎舊浙江通志字宗器秀水人厯吏兵二部司務陞工部虞衡員外郎死土木之難滿正嘉禾徵獻録世襲海寧衛左所千戸正徳中解軍械之京適劉六劉七騷亂山東遇之力戰賊數却行次滄州賊大至入見州守欲與嬰城守懦不能戰適胡世寧至滄遂協力禦之賊圍城八晝夜不能破尚書張縉疏上其功即遷本衛指揮僉事調戰桃源賊深入被害有卒倪坦亦死之正贈明威將軍子朝承襲稍遷指揮副使倭寇八大王擁衆踰梁庄朝率千戸玉繼隆等追之與賊對敵賊設伏於古廟中突出被殺孫上林輪刀如飛弓挽二石後逐賊於峽口戰死馬呈圖萬厯嘉興府志世襲海寧衛指揮嘉靖三十一年倭犯海鹽呈圖奮勇攻擊生擒真倭二十四名次年倭首八大王等自青村登岸刼殺所犯官軍俱經摧敗呈圖提兵出城與戰軍潰直入賊圍身被三十餘創殞絶祀英烈祠姚𢎞萬厯嘉興府志世襲海寧衛指揮僉事嘉靖三十二年倭寇侵境督軍防勦屢獲戰功後與賊遇殺賊四十餘賊潰奔𢎞殺入賊巢被賊鏦死祀英烈祠采煉萬厯嘉興府志世襲海寧衛指揮嘉靖三十二年倭寇海鹽馬呈圖先馳煉往䇿應兵潰煉奮不顧身血戰而死祀英烈祠徐行健萬厯嘉興府志世襲海寧衛指揮嘉靖三十二年倭亂身經二十餘戰斬倭首三百餘生擒十餘人後被殺祀英烈祠李元律萬厯嘉興府志世襲海寧衛指揮嘉靖三十三年倭入寇奉調領兵防守富陽等處擒斬倭賊十一人復追戰於孟家堰陣亡祀英烈祠魏大中檇李往哲編字廓園萬厯丙辰進士仕行人擢工科給事中辨析邪正摶擊權要轉禮科晉吏科都給事時南直霍邱令某御史崔呈秀已列薦剡忽饋及大中門大中持疏發覺擊璫不遺餘力諸小人狼顧無措起而媒孽刑科給事中傳櫆首搆汪文言事竄名誣奏文言下鎮撫獄煆煉詞連及大中遂革職杜門讀易傳㫖被逮下獄誣訊榜掠無一語惟指堂中扁謂鎮撫許顯純曰此明心堂莫作昧心堂也未幾斃崇禎登阼白其寃賜祭葬諡忠節建特祠詔長子學洢侍祭焉王允昌嘉興縣志字永叔世居桐鄉萬厯辛卯舉人授思州司理陞貴陽郡丞天啟改元檄川兵援遼奢寧據永寧以叛衛官盡降永寧貴陽屬也允昌度兵寡難拒自誓必死乃以印及錢糧冊遣吏間道上之撫按亡何賊來索印允昌縊死一門十三人悉受屠戮事聞給祭葬贈光禄寺卿世襲錦衣千戸費彦芳嘉禾徵獻録字爾英崇徳人萬厯癸卯舉人知隆徳縣崇禎癸酉海賊入平凉界破静寧州來攻隆徳直薄土城彦芳倉猝為守禦計城無兵乃斷一指瀝血為書乞救於分守固原㕘政陸夢龍夢龍星夜率兵援遇賊於綏徳城下全軍皆没夢龍死之賊遂破隆徳彦芳封印北面再拜欲自經賊掩至被執罵不絶口賊刴殺之詔贈静寧州知州廕一子入監夏祖訓秀水縣志字仲有崇禎間以歲貢薦舉除雲南呈貢令沐藩庄兵雜處久􅔤侵奪祖訓立法嚴禁兵始不擾土人吾必奎叛據楚雄土兵沙定洲隂蓄異志沐藩檄徵不赴及亂平始赴調所過縣邑蹂躪一空祖訓撫馭多方徳威並著沙感愧遣裨將詣謝後沙復勒兵要請加銜不許襲破沐府走楚雄與定洲相持年餘呈貢尤為要地勢孤力盡赴水死徐從治嘉興府志字肩虞海鹽人萬厯進士知桐城築堤一萬七千餘文以息水患居官强直棒殺豪貴蒼頭掠奪民妻者厯陞知濟南府濟南多大盜從治求勇士孫玉增等二十三人厚糈畜之以待用陞副使分巡兖東携玉增等赴沂州白蓮敎徐鴻儒反鄆城攻陷鄒滕嶧縣聚衆數十萬掠漕艘僣服改元從治監諸軍進討大破之檻鴻儒送京師進右㕘政備兵濟南論平賊功加山東右布政使以病歸起山西左布政使備兵薊州喜峰路兵乏餉而譁圍撫道於遵化城從治單車入營變立定薊撫王元雅忌其能因請終養再起山東左布政使武徳兵備道兵叛於吳橋陷登州執巡撫孫元化從治監軍救登州將孫玉增等八十騎而東敵築三臺礟擊城樓一角從治命植柵補壞垣募死士夜斫營焚三臺敵穿地道穴城從治亦穿濠城中以斷之縋絙擲火罌焚穴中臭達於外相持七月餘屍山積從治巡城中飛礟陷顱卒贈兵部尚書賜祭葬立祠廕一子錦衣衛千戸吳麟徵檇李往哲編字磊齋天啟壬戍進士崇禎五年授吏科給事中時諫官章正宸抗言觸王應熊被詔下獄麟徵特疏訟寃又上罷中官疏時行人熊開元上書刺首輔周延儒科臣姜埰繼之皆下獄麟徵申救上盛怒麟徵從容言曰小臣愛君忘所禁忌日者天下􅍅􅍅首輔安所辭其責延儒涊汗伏地謝死罪流寇廹畿甸麟徵奉命守西直門親桴鼓沖矢石蓐宿城上賊數十萬猝至郭外戍卒四散賊圍城數重中夜發礟墮丸火碎几案麟徵神色自若賊偽樹勤王旗叩門請入中官欲納之麟徵不可麾卒推石布土壍塞之俄而兵部騎士持招勤王幟飛至請出麟徵拒之因轉赴徳勝門同守者曰為之奈何麟徵曰事去矣願見天子言狀至午門遇相魏藻徳藻徳曰上入宫誰為趣起今火石轟然城雉嚴峻何遽言事去麟徵度不能達望闕叩顙號泣而去止道旁祠下曰吾國朝得死所矣遂入戸自縊順治間賜諡貞肅徐世淳湖廣通志字中明秀水人萬厯戊午舉人兵部尚書必達之子崇禎問由重慶府推官知隨州時流寇倡亂兵無紀律世淳力為居民保䕶賊羅汝才圍城募士死守親身登陴屢請救不應城陷世淳猶率鄉兵巷戰中數十創罵不絶口賊手刃之妻妾僕婢同時赴難次子肇樑抱父屍且哭且罵賊刃交加臨死告州人以印所藏處事聞詔贈太僕卿諭祭葬肇樑贈國子監助敎湯執中嘉興縣志嘉興人以掾史選江西廬陵丞崇禎壬午粤寇入吉安永豐直抵泰和白羊㘭百戸梁學兵寡被殺漸逼郡城執中率民勇集鄉兵禦賊賊突至殺巡檢龍徳新民家盡被搜掠執中與賊戰於木湖洲奮勇刄賊墜地被害奉㫖褒䘏陸燦嘉興府志字振玉平湖人崇禎甲戍進士授南推官平反寃繫絶饋遺濟人尸祝之己卯陷城死徐一源河南通志字宙盂海鹽人歸徳衛經厯崇禎十五年流寇犯歸徳一源分防北門殺賊甚衆城破猶巷戰被執罵賊而死李士標嘉禾徵獻録字霞舉嘉興人入國學以積分試上等授上林苑丞遷山東寧海州州同崇禎壬午冷口兵入圍州城甚廹厯三月城中食盡士標疾篤臥起於城上督守益力竟卒於雉堞間城遂陷士標妻沈氏率其妾婢僮僕凡二十三人同日死之陸士鉉平湖縣志字古雪八歲能詩性至孝以歲薦授訓導甲申聞變大慟絶粒死彭期生嘉興府志字觀民海鹽人宗孟子萬厯進士為徽州府學敎授厯陞南昌知府巡撫楊邦憲風有司建魏忠賢生祠期生力持不可諸院司捐助數千金檄府董其成卒不發一緡丁憂服闋起濟南知府首罷車戸之役及厲民者數十條一郡若更生因重囚越獄坐謫獻賊陷袁臨吉左都御史李邦華請於朝陞湖西道分巡僉事單車西行黄縠為巾朱絲繩繋劍曰斯二物所以報國而狥身者送者失色已而檄守贛州仍守嶺北贛州被圍滇越兵招之出走期生曰此吾死所將安往乎書絶命詞五紙分授五蒼頭曰五人未必皆生還有一人者歸此即訃音矣徐起自經死李毓新舊浙江通志字喬之自河南徙居嘉興崇禎間以進士授潮州司理上官亷其才令攝四篆時惠潮流寇作亂制府屬毓新監紀卒用其議以平寇攝肇慶篆藩兵與民格鬭寇乗間竊發毓新步行勸諭肇賴以安未幾閩寇姜世英等犯饒平大埔先後十餘戰㨗奏列毓新首功行取未赴明亡遂遇害次子禎先抱父屍死徐石麒舊浙江通志號虞求嘉興人舉進士授營繕主事會逆閹張燄楊左相繼瘐死坐賕各累千石麒約同里為魏大中償所坐黃太僕尊素為石麒鄉舉房師石麒獨力稱貸以輸閹聞而嗛之坐是落職特㫖改考功溫體仁當國石麒斥其私人尋轉應天府丞時大司寇鄭三俊以特讞失上意下於理石麒極陳清直大臣以執法久繫上累至徳上諭羣臣曰非不知三俊清安可自恃析律骫法召入為左通政厯冢宰痛時事不可為引病歸及明亡北面再拜自縊妻孫氏一女在抱棄之赴水死立而不仆吳爾壎舊浙江通志字介之石門人成進士授庶吉士時闖賊警逼召對徳政殿奏聨絡土司撫用義士卓有成畫明亡㧞佩刀斷一指授孝亷祝淵曰願寄吾家為信遂死之陸清原嘉禾徵獻録字嗣白平湖人光祚曽孫崇禎甲戍進士知增城縣地瘠多盜清原至引數騎抵賊巢溫言慰諭賊驚投戈乞命按籍遣歸壬午召對陳時政十事上嘉納之授監察御史條上安攘七議出按福建行部至漳漳故多山寇清原亷得其奸細在城者絶其内應募壯士七百人皷而出獲其渠魁斬以狥明亡自沈於江而死沈方嘉禾徵獻録初名士端字彦方後改名方字大愚桐鄉人崇禎己卯副榜授荆門州同知李自成與羅汝材合兵至白馬渡方下車數日巡按宋一鶴知其才檄調往黄陂適革左六營自鳯皖西上犯黄安方以舟師破之江上一鶴欲留方軍中而賊決河灌汴秦督丁啟睿師潰川兵二萬調過荆門知州以疾去官方馳還攝州事至即詣蜀師勞問開曉大義軍中肅然無犯汝寧陷死之家口十八人皆死胡振芳嘉禾徴獻録字來子嘉興人天啟丁酉舉人授慈谿敎諭遷知嶧縣降漢陽經厯壬午以薦量移蘄水縣流寇聚英霍間遂及蘄州邑距寇不百里振芳早夜防禦凡九十日乗城數十戰不能支為賊所執廹降不從㧞刀斫其肩氣絶復甦舊役徳之力負以趨山中有門生遇之將還家調䕶未幾卒張龍徳嘉禾徵獻録字鯤化以鄉貢為溧陽縣丞地濱大江寇盜充斥條江防十二事上之不報轉湖都司經厯罷歸城破與妻侯氏俱死女適同邑徐世淳子肇樑亦自縊項嘉謨嘉禾徵獻録字君禹嘉興人太學生工詩畫以武健授薊遼守備時事掣肘棄官歸明亡盡束所著詩文於懐率其二子翼心及妾張氏投天星河而死國朝屠洪基廣東通志嘉興人順治八年令陽山西逆馬寶犯城洪基繕糗糧督義勇登陴固守賊不能破總鎮郭升援至洪基出城夾擊圍解截其歸路斬獲甚衆招徠難民還定安集次年寶復與黨曹志建等攻陷連山連州進攻陽山洪基堅守如前賊黨高必正復率步騎萬餘環城夾攻凡四日夜城陷被執不屈罵賊死之逾月郭升督兵至覔洪基遺骸得之河南坪錢楞福建名宦冊字芃生嘉善人中丞士晉子順治三年隨征入閩署將樂令會山寇吳長文謝七寶等竊發建寧失守將樂被圍城中無兵楞與丞方抗督領鄉勇登陴拒之堅守九月城破率家丁夏允中沈貴巷戰手刀二賊馬蹶被殺家丁死者數人雍正五年楞孫禮部侍郎以塏陳情事下閣㫖䘏部查議奉司僉事祀功臣廟廕贈按察張行健表忠冊海鹽人任徽州祁門大洪嶺兼良禾司巡檢康熈十三年饒寇犯境被執賊脅之降大罵不屈賊怒斫其兩臂罵益甚納之坎中以刄剚其腹呼曰我死必為厲鬼以滅汝遂殞胥役方茂胡振並從死湖州府三國吳吾粲三國志本傳字孔休烏程人孫河為縣長粲為小吏河深竒之河後為將軍得自選長史表粲為曲阿丞選為長史治有名績孫權為車騎將軍召為叅軍校尉黄武元年與吕範賀齊等俱以舟師拒魏將曹休於洞口値天雨大風諸船綆紲斷絶漂沒著㟁為魏所獲或覆沒沉溺其大船尚存者水中生人皆攀援呼號他吏士恐船傾没皆以戈矛撞擊不受粲獨令船人取之左右以為船重必敗粲曰船敗當俱死耳人窮奈何棄之所活者百餘人遷會稽太守粲募合人衆與吕岱討平山越入為屯騎校尉少府遷太子太傅適二宫之變抗言執正明嫡庶之分欲使魯王覇出駐夏口遣楊竺不得在都邑又數以消息語陸遜遜時駐武昌連表諫争由此為霸竺等所譖害下獄誅晉沈勁晉書本傳字世堅武康人父充與王敦搆逆為部曲將吳儒所殺勁當坐誅鄉人錢舉匿之得免勁少有節操哀父死於非義志欲立勲雪恥以刑家不得仕進郡將王胡之異之䟽勁清操詔聽之升平中慕容恪侵逼山陵時冠軍將軍陳祐守洛陽勁自表求助効力因以勁補冠軍長史令自募壯士得千餘人助祐擊賊以寡制衆糧盡援絶祐懼不保會賊寇許昌祐因以救許昌為名留勁以五百人守城祐率衆而東會許昌已没祐奔崕塢勁志欲致命欣獲死所尋為恪所攻城陷被執神氣自若恪竒而將宥之中軍將軍慕容䖍曰勁雖竒士觀其志度終不為人用赦之必為後患遂遇害恪還言於慕容暐曰定洛而殺沈勁實有愧於四海南北朝丘冠先南史本傳字道元烏程人少有節義齊永明中位給事中時求使蠕蠕國尚書令王儉言冠先雖名位未升而義行甚重若為行人則蘇武鄭衆之流也於是使蠕蠕蠕蠕逼令拜冠先執節不從以刄臨之冠先曰能殺我者蠕蠕也不能以天子使拜戎狄者我也遂見殺沈浚梁書本傳字叔源武康人厯山陰建康令入為中書郎尚書左丞侯景逼京城遷御史中丞是時外援並至景表求和許之既盟景知城内疾疫復懷奸計遲疑不去皇太子令浚詣景所景曰即已向熱非復行時十萬之師何由可去還欲立効朝廷君見可為申聞浚曰將軍此論意在得城城内兵糧尚支百日將軍儲積内盡國家援軍外集十萬之衆將何所資而反設此言欲脅朝廷耶景横刄於膝瞋目叱之浚正色責景曰明公親是人臣舉兵向闕聖主申恩赦過已共結盟口血未乾而有翻背沈浚六十之年且天子之使死生有命豈畏逆臣之刄乎不顧而出景曰是真司直也然宻銜之及破張嵊乃求浚害之章華南史本傳吳興章華字仲宗家本農人至華獨好學通經史善屬文侯景之亂游嶺南居羅浮山寺歐陽頠為廣州刺史署為南海太守頠子紇敗乃還都後主時除太市令非其所好乃辭以疾禎明初上書極諫其大畧曰陛下即位於今五年不思先帝之艱難不知天命之可畏溺於嬖寵惑於酒色祠七廟而不出拜三妃而臨軒老臣宿將棄之草莽諂佞讒邪升之朝廷今封疆日蹙隋軍壓境陛下如不改絃易張臣見麋鹿復游於姑蘇矣書奏後主大怒即日斬之隋沈光隋書本傳字總持吳興人少驍㨗畧綜書記煬帝徵天下驍勇之士光預焉及從帝攻遼東以衝梯擊城竿長十五文光升其端臨城與戰短兵接殺十數人帝壯異之馳召與語大悦拜朝請大夫未幾為折衝郎及江都之難潛搆義勇將為帝復讐宇文化及以光驍勇方任之令其總統營於禁内時孟才錢傑等隂圖化及因謂光曰俯首事讐有靦面目何用生為吾必欲殺之死無所恨公義士也肯從我乎光泣下霑衿曰僕給使數百人並荷先帝恩遇今在化及營内以此復讐如鷹鸇之逐鳥雀萬世之功在此一舉願將軍勉之孟才領江淮之衆數千人期以營將發時晨起襲化及語洩化及大懼是夜即與腹心走出營外司馬徳戡等遣領兵馬逮捕孟才光聞營内喧聲不及披甲即襲化及營空無所獲值舍人元敏數而斬之遇徳戡兵入四面圍合光大呼潰圍斬首數十級賊皆披靡徳戡輒復遣騎射之光身無介胄遂為所害麾下數百人皆闤而死一無降者唐沈清西吳里語烏程人為婺州刺史大厯中李希烈陷汴州清發兵昇山逐逆黨至汴口力戰而死今昇山有沈將軍廟宋劉士英宋史本傳宣和間為温州敎授方臘陷處州州人争欲遁士英獨身任責推茂才石礪為謀主治兵峙糧籍保伍分其地為八隅委官兵統率以鐘為約令民聞鐘聲則趨所守堞未幾賊來攻拒守凡四十餘日官軍既至賊潰去靖康初通判太原府金人入境帥臣張孝純欲避之士英率通判方笈將官王稟力止及城陷稟赴火死士英持短兵接戰死之謹按宋林景熈永嘉忠烈廟記以士英為霅川人朱蹕宋史本傳安吉人知錢塘縣建炎三年金人陷杭州守臣康允之退保赭山蹕白允之率弓手土軍前後拒敵行二十里遇金兵蹕兩中流矢左右掖至天竺山猶能率鄉兵禦敵後數日遇害章鑄𢎞治湖州府志字子夀吳興人仕忠直郎讜直敢言後以世革歸𨼆元世祖令故宋官納誥勅鑄不肯自以世食宋禄坐未甞北向宋人之仕於元者皆絶之不與往還徐俊𢎞治湖州府志字英父徳清人以明經為國子生率六館諸生抗疏乞誅賈似道疏三上不報國亡不復仕元至元中累召不起言及故宋時政輒泫然流涕死之日門人諡曰安節先生游汶嘉靖浙江通志字魯望徳清人咸淳中厯江西江東福建提㸃刑獄俱有能聲賈似道當國時事日非汶與論事忠誠懇惻至於流涕遂罷官家居元世祖時抗節不仕㕘政蒲大年以遺老奏召為福建總管堅辭不就所衣一布袍書其背曰前宋遺民不問燕居敘會晴雨寒暑未甞脫解陳存嘉靖浙江通志安吉人累官兵部尚書端明制置使宋亡元遣使七徵不起尋遘疾却醫絶食旬有四日卒欽徳載尚友録吳興人仕為都督計議官宋亡徳載不肯送降款元兵帥募生致其人議欲官之徳載裂其板授書即遁𨼆碧巗山中楊維楨作詩弔之元王簡閩書字伯敬霑化人家烏程至正中為信州路推官陞福建都轉運副使將行會紅巾賊警報州民擁馬首拜泣曰賊且至公吾父母忍舍我耶羣詣亷訪使乞留已賊果至簡壘四門募訓練諭鄉民團結各相保頃之賊分道入簡率中子相引兵與戰敗之居數日賊突入簡奮身力戰俄而馬中流矢遂被執賊曰公亷能素著吾屈公仍尹此州簡曰受命守州義當殺賊今有死耳賊强之跪簡曰此膝可斷不跪賊也賊怒毆之簡嚼舌噴血賊面大罵遂殺之立而受刄頸斷湧白液如乳體尚不仆數日面色如生民老稚號哭晝夜不絶簡死相亦被執賊欲官之相曰汝逆君又殺吾父不共戴天而尚爾官耶亦死之相妻潘亦被執賊首欲亂之潘及二幼女皆死焉次子楨襲父爵除紹興路總管張士誠陷郡亦不屈死明郎理嘉靖湖州府志字子中安吉人洪武己巳由舉人授戸部主事山西大歉逋賦上特命理往徵之未行會雷震謹身殿大赦悉免天下逋負尋詔止免三分復命理往陛見從容言曰陛下法堯舜以為治徳敎加於百姓恩澤遍於四海今已布大信而復更之如天下何且山西大飢民皆殍死取非其時似與古兩税三限之法戾矣臣不敢奉命上怒以所持杖撾之致折金鑚左股理弗為動仍命督徵理陳辭益堅上怒叱令棄市已而悔之賜祭焉施仕西江志湖州人任廣信千戸所吏目正徳已卯宸濠之變賊黨數百人過信掠永豐欲從間道趨閩仕時為巡捕追至永豐雙山遇賊力戰不屈死之臧應奎分省人物考字賢徵湖州人正徳丁丑進士授南京兵部車駕司時中官以進貢索多船利私載應奎力為裁抑卒譁焉叱左右執之乃遁去丁内艱起補禮部郎中嘉靖初以争大禮跪門哀慟賜廷杖死於杖下臨絶其從父志觀往視之索筆書云不當與弟應璧異居書罷而逝凌義渠韓襄雙忠傳字駿甫號茗柯歸安人天啟乙丑進士選行人三使不辱命考授禮垣旋都樞垣凡寇敵情形撫鎮功罪口談手畫靡不悉中機宜當事忌之外遷閩中㕘政陞蘇松兵備勦平福山海寇陞山東右藩與勦梁山賊有城守功陞南京光禄寺卿踰年召為北京大理寺卿甲申三月闖寇犯闕夜傳召對疾趨長安門則無人門焉者拱立達曙門竟不啟返就舍城陷義渠舉首觸柱血淋漓沾襟旋易緋袍設香案正笏向闕拜復南望遙拜上父書曰盡忠即所以盡孝男視死如歸含笑入地矣僕請遺命義渠曰可書我柩云死節孤臣凌義渠之柩終無他言遂掩扉投繯而逝國朝賜諡忠介建表忠祠溫璜舊浙江通志字寶忠烏程人舉進士任徽州司李署歙邑篆明亡語妻茅氏曰吾平生學為聖賢不過求今日處死之道時女方寤起璜手刄之茅亦自剄璜抽刀自剄氣未絶復以手抉其喉而死嚴覺江南通志字知非歸安人萬厯丙午舉人知巢縣事崇禎八年流賊陷巢被執不屈闔門罹害吳士義歸安縣志字以行歸安人由例貢仕長沙二尹署縣事崇禎中流賊困城數月城陷賊舉刄相向百姓號慟為請命士義罵不絶口遂遇害全家殉焉事聞贈文林郎國朝黎樹聲舊浙江通志字仲寶烏程人丁卯舉人任福州司李署興化府篆海寇破城樹聲不屈遂聞賜遇害事按察使廕一子祭葬贈徐尚介徳清縣志字干石貢於鄉除靈山令時粤地竊據未下毅然往移署安甫踰月代者至因客羊城幾一年象郡始通乃往象郡而青牛城困尚介戎服登陴躬冒矢石解其圍明年五月赴靈山民皆獸散值歲旱披髮跣禱百姓感其誠稍稍來附守弁不戒於軍民不安寢是以不敢請益兵賊乃乗虛而來城中之人皆敵也賊譟而前曰令何在必殺令尚介厲聲曰我靈山長官徐尚介也遂格以刄刄絶格以手手創汚血濺衣子修跪而泣尚介曰丈夫有死我不能為朝廷捍一邑毋收吾骨也奪刀自刎不得為賊所殺子修及僕朱貴俱死之事聞贈廣東按察司僉事廕一子修妻陳氏守貞數十年人稱一門忠孝節義云尹衡舊浙江通志字平之歸安人順治己丑進士授樂平令時江右伏莽未靖乗夜窺城衡格闤而死祀忠節祠慎淑仞廣東通志歸安人知羅定州西寇吳子聖破城與州同金芳吏目陳炳新各赴連灘溺死芳義烏人炳新山陰人姚延儒湖廣通志字爾真烏程人由㧞貢順治五年任南漳縣有清惠聲逆賊郝搖旗等陷城被賜祭執罵不絶口死之葬贈按察司僉事車君乘公舉事實徳清人由歲貢順治六年選授廣西柳州府武宣縣知縣時草寇未平君乗赴任兩月率弟君稷捍禦力盡罵賊不屈同死之妾陸氏幼子不二僮僕數人盡被難雍正六年奉㫖旌表浙江通志卷一百六十三
