body:
  text: 浙江通志卷六十五海塘四雍正四年二月巡撫浙江都察院右副都御史臣李衛題為奏聞事准工部咨開署浙江巡撫傅敏奏稱杭州嘉興紹興三府海塘闗係民生我皇上特遣大臣議估先發庫銀修築自雍正三年夏秋月興工以來仰頼聖主洪福海不揚波工程易儹現今杭州之海寧等處俱報工完七八分不等紹興之會稽餘姚上虞等處亦報工完五六分但查紹興府海塘原議皆用條石今以條石不易購致恐為期嚴促有悮程限用條石托外亂石填中臣於十月二十六七等日親行踏勘再三詳度切恐一經海潮沖刷仍有坍塌之患隨即飭查去後當據紹興府知府特晉徳等具詳情願悉如原議改用條石甘限於雍正四年二月内完工臣思冬天水涸春初未盈潮不為患若表裏俱用條石實屬一勞永逸不致草率塞責理合據實奏聞奉㫖據奏紹興府海塘工程原議皆用條石後以條石不易購致限期已廹遂用條石托外亂石填中今恐日後坍塌仍改用條石請寛限期等語海塘工程闗係民生最為緊要必須一勞永逸若因條石一時難以購致從前便當聲明緣由奏請展限何得草率從事和順係隆科多結納私人特晉徳曾經隆科多在朕前薦舉此必特晉徳受隆科多之囑託照看和順是以聽其茍且塞責傅敏不早行查奏亦屬狥情着交與新任巡撫李衛悉心查勘指示更改修理務期永逺堅固張楷在江南修理塘工用木樁密釘似為有益可否倣行並令李衛酌量該部知道欽此行文浙撫遵行等因到臣看得浙省沿海地方全頼海塘捍禦潮汐我皇上軫念黎庶惟恐失所命臣查勘現在興工塘堤酌量修理務令永逺堅固臣欽遵諭㫖逐一勘驗查紹興府屬之會稽餘姚上虞等縣一路塘工從前陞任吏部尚書臣朱軾會同前撫臣法海勘議題明修築石塘共七千丈原議塘底開深二尺填築亂石每丈上鋪大條石髙六尺寛六尺貼石築土寛二丈髙一丈三四尺庶可永固等因部覆允准在案後經紹興府知府特晉徳因會稽縣瀝海所西滙嘴應築塘二千七百丈地勢卑下恐亂石起底難以抵禦請改用條石起底将原議之墊底亂石填肚方能堅固當經布政使佟吉圖轉詳前撫臣法海批准於署撫臣傅敏未到任之先已築完工石塘一百五十二丈九尺又起底并鋪砌層數不等共一千五百七十七丈八尺雖係變通似屬有理然未經題咨而管工各官因購取條石路逺難運且並無一尺五寸厚者又兼原估錢糧稍有未敷定限過急即於就近之臨山衛夏蓋湖等處本地所産亂石採買搭砌其工已完五六分頗屬草率後經署撫臣傅敏親往查勘恐不堅固是以一面具奏一面勒令拆毁仍令遵照原題改正用亂石墊底二尺上面俱用條石到頂催促完工及臣到時復又改做過半其餘尚有已完未拆并未曾修齊者然比從前草率完工果屬整齊不同但思淮河工程海江各塘皆當以根脚堅固為主歴來多用木樁釘底可保永逺此江蘇撫臣張楷之奏誠屬至當若止圖上面整齊恐遇風大潮急根脚不穩臣細加查勘幸此處一帶工程底下俱係生成鐵板沙土性堅固毫無軟硬不同之處即亂石在下不用木樁亦屬穩固况塘外漲出沙灘離海邊二三十里以至十餘里不等若非秋汛大潮海水不致到塘即從前土功尚能抵當今用石包砌在外自必更堅臣愚昧之見将署撫臣傳敏已拆改正之工並前撫臣法海任内報完石塘擇其堅固者似毋庸再動其已估未修並攙搭亂石已修未拆之工揭去浮面蓋板将碎小爛石檢出下存墊底石板每層用大條石釘鈐以原議墊底亂石檢有稜角成塊者牽配搭砌隔一層再用整條石鈐制務須横堅勾搭壓縫牽成一處可保永久其檢出之碎石雖微然棄之可惜應罰令紹興府知府特晉徳等賠修未估在内工程倘再不洗心改正修成一勞永逸即據實題㕘治罪誠恐乘臣回省伊等或有陽奉隂違之處當将奏帶來浙備用之雲南教官尹魯留工監看但限期不便過急務令於秋汐之前趕築告竣此紹興府屬會稽餘姚上虞三縣浙東海塘之情形也臣隨又往杭嘉二府屬之寧鹽等縣海塘查勘原題現在修築塘工其水勢與東路逈異而海寧海鹽兩縣城郭皆逼近海邊即不遇潮期城外塘工之下亦無漲沙為之遮䕶緣數十年來海潮不由中小亹湧入但從北大亹往來故此兩縣潮大工險非人力可施其縣治之外離數里許皆有漲沙不等查舊日所修石塘久經告成雖石塊碎雜根脚俱有木樁尚屬堅固獨縣西有老鹽倉一處塘工五百丈石大而堅可保永久緣原修價值比各工不同之故其近今題明加幫陳文港至尖山一帶土塘并補修子塘俱經築完而海鹽之秦駐山至演武塲石工亦已告竣下用木樁釘底石塊亦屬整大臣查驗似可無虞惟近城有老工三四段各長十餘丈不等目今稍覺歪斜因年久根底樁木朽爛現令拆換修整餘工無恙此浙西一路海塘之情形也總之每年秋汐甚大必須時加防範年年嵗修自然無害若將石土各工再加築髙更為有益但錢糧過多無項可支容臣續加調濟因時奏請不敢稍懈以祈仰副皇上軫念海塘有闗民生之至意也所有查勘過全浙兩路海塘緣由理合具題奉㫖該部議奏隨經工部議覆應如所請嚴飭各員将一切塘工務於秋汐之前堅固修築工完造冊具題查核可也奉㫖依議雍正四年七月原任兩淮運使何順等捐資修築海寧海鹽餘姚會稽上虞五縣塘工報竣計修過海寧縣陳文港亂石塘三千八百丈并修補子塘用銀七千六百九十九兩零海鹽縣石塘一百五十丈用銀七千三百一十二兩零餘姚縣石塘一千三百丈用銀一萬八千二百兩會稽縣石塘二千七百丈用銀三萬七千七十三兩零上虞縣石塘二千九百八十七丈用銀四萬一千八百一十八兩通用過銀一十一萬二千八百二兩零自雍正三年開工至是工竣報銷雍正五年二月巡撫浙江都察院右副都御史臣李衛為題明嵗修江海塘工事看得海寧縣海塘自尖山起至老鹽倉石土各塘於康熙五十七五十九等年開捐興築工完報銷題請餘剰銀兩留作嵗修之用歴經遵照在案自雍正二年風潮案内搶修之後䝉皇上軫念沿海民生欽命前陞任吏部尚書朱軾赴浙會勘将迤東一帶塘工勘估加寛加髙并修築子塘於雍正三年十月十二日告竣經臣題報在案其迤西一帶塘工不在勘修之内上年自夏及秋雨水過多有康熙五十九年所建之浦兒兜草壩一座老鹽倉姚家堰草塘一千五十五丈經今年久草爛塘矬亟宜加鑲填補以禦春潮又姚家堰西至草菴止計長七里從前原係土塘近緣沙洗日削僅存土埂一條必須一律改築草塘方資捍禦兹據布政使許容詳稱備查浦兒兜草壩四十丈及老鹽倉草塘一千五十五丈應加修整核實需費銀六千五百八十二兩三錢又姚家堰至草菴一帶改建草塘八百二十六丈四尺核實需銀九千三百五兩三錢六分四釐通共銀一萬五千八百八十七兩六錢六分零查海寧嵗修塘工例動捐監項下支應工完造冊題銷今嵗修前項工料銀兩相應循例於捐監項下動支惟是此番工程需費既繁且土堤改築草塘事同創建應請遵照前批先行題明并據該司詳稱海鹽縣閏字號石塘一十三丈計一十六層底石欹仄拆底全修先給銀三百兩辦料興修等因臣查海塘捐監項下自康熙五十八九等年大工告竣經前陞任撫臣朱軾等會題請將餘剰銀兩逐年隨捐隨修自五十九年起至雍正二年止每年動用或一萬餘兩或二萬餘兩多寡不等逐年嵗修報銷外止存司庫銀六萬三千三百三十二兩八錢零此外尚有追賠塘工認修海塘交完修塘贖罪捐修等項銀兩雖皆實存在庫留充海塘工用但浙省各縣襟江濵海者自北而南則有平湖海鹽海寧會稽上虞餘姚等縣沿海一帶塘堤又海潮由尖山入江自東迤西則有仁和錢塘并紹屬之蕭山山隂等縣沿江近海一帶塘堤其間潮汐沖徙不常若每年隨坍隨補則用費少而保固可久倘因循不修則圯壊漸多工費即鉅從前因軍興裁減嵗修錢糧之後皆坍損於平日而修築於一時以致屢費帑金頻煩睿慮此誠浙省民生利害之所闗也臣上年到任後屢次親往各塘查勘目擊情形并據各地方官先後具詳如海鹽縣拆築收冬藏嵗餘五字號石塘共二十八丈五尺需用工費銀七百兩又木字號石塘以南除先經接築一百丈外今又接築矮塘一百八十丈俱用石砌築方正大石結面估工費銀二千五百六十餘兩又蕭山縣西江塘内堰陡孫槐樹下丫义塘孔家埠談家浦等處土塘加樁加土增髙添濶并鎮潮菴王家池聞家堰一帶石塘應拆造添築數處共估工費銀一千五百二十四兩零又錢塘縣午山一帶葛家墳六和塔等處坍塘二十五丈四尺估工費銀一百一十九兩零善利院左側二郎廟老塘沖坍五丈估工費銀八十九兩零轉塘上首汪家地等處坍塘一十四丈柵外二啚小橋地方坍塘六丈估工費銀一百二兩零又仁和縣總管廟前矬坍江塘七丈又應拆卸補築四丈估工費銀六十五兩零以上海鹽等各縣塘工拆卸補築共應需銀五千一百餘兩皆係緊要工程必須及時搶修臣已飛飭各地方官迅行修築所需工料銀兩俱先行酌量數目設法暫抵應用工完核實銷􅈫以俟嵗修欵内撥補又錢塘縣轉塘至横江埠應築坍塘三百三十三丈零横江埠至曹家埠等處應築坍塘七十五丈以上共估銀六千三百餘兩自康熙五十七年即據地方官勘詳請築因各處塘工浩繁此地秋汛已過尚可緩圖是以尚未修築然貼近省城民田廬舎所闗將來亦不能再緩似此江海各塘延袤千有餘里此修彼圯歴年皆有接續之工今又有寧邑不在新修大工以内之塘應須儹築者為費既鉅為工又甚急誠不得不及時儹修雖有嵗修銀兩存庫然以每年難緩之工程而悉取給於一項之庫銀茍非别籌節省留存正項恐致逐年動支久而易匱臣查前撫臣黄叔琳任内准河臣齊蘇勒移咨浙江原籍搜查原任淮徐道潘尚智家産一案查出當舖本利并田地房屋零星器皿等物約值銀十萬兩有竒可否仰請聖恩准將此項估計抵補海寧海鹽蕭山錢塘仁和各縣雍正四五兩年嵗修銀兩外有餘者變價存為將來嵗修塘工之用其原撥捐監等項留存嵗修之銀仍行歸欵留濟後工則庫銀可以節省而海塘亦得永固矣再查此項捐監銀兩從前諸臣因係海寧築塘所餘故以此銀題為寧邑嵗修之用未將通省塘工聲說在内此外各縣之塘每年若有坍損又另於俸工公項等内動支遇有缺乏即多因循茍且之弊今俸工已經停捐公項亦俱歸出而江海各塘均闗緊要且海鹽石塘更係對面頂沖尤屬危險此時若不陳明將來各縣之塘無項嵗修必致日漸圮損釀成巨工重費臣請嗣後凡有江海塘工應行嵗修者照例一體於此項内動給沿海各縣生民更沐聖慈於不朽矣奉㫖該部議奏隨經工部議覆查海塘闗係重大不便遲緩應令該撫將浦兒兜老鹽倉姚家堰并海鹽蕭山錢塘仁和以及寧邑等處塘工作速將前項存庫銀兩給發修築堅固工完造冊題銷其潘尚智原籍查出家産應令該撫轉飭該地方官嚴查估變以備海塘工程之用不得少有隱漏仍將估變銀兩數目報部可也奉㫖依議雍正五年八月海寧縣浦兒兜草壩老鹽倉草塘姚家堰西至草菴土塘工成又接修塘六十九丈六尺修舊石塘一千二十四丈動用銀一萬五千七百兩老鹽倉浦兒兜草塘長一千九十五丈每丈用柴草六千六百觔用夫二十五名髙八尺寛一丈六尺姚家堰草塘八百九十六丈每丈用柴草一萬二千觔用夫四十五名髙一丈二尺寛二丈雍正五年十月巡撫浙江都察院右副都御史臣李衛為題明勘修塘工事看得海寧縣沿海塘堤東西綿長潮汐晝夜侵齧此完彼缺無有定所是以逐年查勘嵗修前因浦兒兜老鹽倉姚家堰等處塘工嵗修告竣之時臣親往勘驗查有東塘之錢家坂迤西一帶樁板老塘䕶沙洗去直射塘脚板片年久朽爛欹斜亂石沖卸頽廢應行改砌加築及西塘之馬牧港亂石土塘直至大石塘一帶外沙漸髙於塘身大汛漫溢過塘泥土矬陷亦應加石加土培築庶免暴漲泛濫之虞兹據布政使孔毓璞詳稱據海防同知李飛鯤會同該縣勘得錢家坂最險工二十四丈亂石塘内亦有險工六丈應改築堅厚又錢家坂東西各段共樁板塘身一千六十五丈亦應一槩改築亂石塘以固根底又亂石塘西七十五丈應面加條石一層共計應行改築東塘一千一百七十丈應於堤身之下外加坦水一層又西首大石塘五百丈應加培築又馬牧港内五百丈應上加條石一層并增添亂石培土髙濶又五百丈止加條石培土濶厚其餘四百八十八丈止須僱夫加土足可捍禦共計應修西塘一千九百八十八丈通計東西二塘應築應修塘身三千一百五十八丈共需工料銀二萬九千九百五十五兩九錢三分相應照例於海塘嵗修銀兩項下動支給發工完核實報銷等因查前項塘工經臣勘明在先委係緊要工程此時不加修築將來所費更多現在行司將應修各塘動項辦料督工趂此冬季水小潮落之際催儹修築完工查海塘嵗修每年於嵗終報部察核此番改築工程非尋常嵗修整補可比理合題明奉㫖該部議奏隨經工部議覆應如該督所題照例於庫貯海塘捐監銀兩動給興修工完核實造冊報銷可也奉㫖依議雍正五年題修錢塘縣江塘善利院左側三郎廟前坍塘五丈午山一帶葛家墳六和塔等處坍塘二十五丈四尺轉塘頭上首汪家地前二十丈柵外一啚王伯卿地十丈五雲牌坊三十一丈蕭靄然地前四十一丈定北四啚雞鵞塲五十七丈仁和縣江塘總管廟前十一丈化智廟四丈一尺大郎巷前十丈三尺黄童廟十八丈五尺雍正六年三月浙江總督管巡撫事臣李衛為題明勘過老鹽倉海塘近日情形事查得浙省江海塘堤歴來北岸俱極險要惟海寧縣東西各塘更為尤甚今年正月間據府㕔縣各官禀報春汛潮勢甚猛將老鹽倉迤西三官堂地方草塘沖坍五丈裂縫二三十丈臣隨飛飭各員晝夜搶修堵禦已將坍者培築加髙裂者鑲釘牢固彼時塘外䕶沙尚有留至二三丈及十餘丈者塘身猶可藉以捍蔽不意二月十四日至二十二日連朝大汛又兼東南巨颶震撼蕩刷䕶沙卸陷無存塘身根脚搜空不能存站先後坍裂歪斜共計六百六十餘丈臣以塘工闗係重大再三籌畫擬先築迎水壩以分潮勢或於貼塘加築石工為一勞永逸之計隨於三月初四日往海寧地方履勘見該縣塘工從前惟南門外最為險要今自築亂石大塘之後俱有䕶沙包裹雖不甚老而漸次堅實可以捍禦潮汐惟老鹽倉西首一帶塘外沙脚刷盡潮頭之來直射堤身隨後即有軟浪蕩滌及退潮時又為回溜將底沙嚙洗一日之間早晚兩次非如黄河水性徑直可以建壩分勢又此地數里俱係活土浮沙若承載鉅石即將低陷雖用樁木加釘而俄頃之間仍復泛溢不能施工所以從前督撫諸臣幾經籌酌不得不於緊要患口築草壩草塘以為堵禦之計今臣相度形勢猶幸裏塘民田地土尚屬髙阜不致即有内灌之虞現在動支海塘嵗修銀八千兩委員將現坍之六百六十餘丈搶築塘身上下鋪砌堅實以保坍陷一面多備物料以預防梅雨伏秋二汛搶修工程之用惟是沿塘數里沙脚日見衝洗此外再有坍裂難以預定止有上緊保䕶隨坍隨修或於塘内再築一層以固民田或於小汛時將裏塘掘深數尺幫砌䕶塘之處容臣因其地勢潮汛情形悉心籌畫另行定議請㫖所有臣勘過老鹽倉海塘近日情形理合具題奉㫖該部議奏隨經工部議覆應如所題行令該督將前項工程動支海塘嵗修銀兩給發搶築務於塘身上下鋪砌堅固先行確估造冊送部工完彚入雍正六年嵗修案内分晰具題查核奉㫖依議雍正六年題修錢塘縣江塘自曹家埠起至斷塘頭一帶共一百七十四丈諸橋起至新工交界加築石塘四百一丈又坍塘五十丈俞家界牌石前五十三丈一尺葛家地前十八丈八尺午山前四丈張家門首二十三丈五尺諸橋邊十四丈五尺雍正六年十二月題銷仁和錢塘海鹽蕭山等處江海塘工自五年先後興工至本年陸續全完統計修完塘身六千三十九丈八尺長橋一座計長四丈坦水一百七十丈實用銀三萬九千七百三十兩零雍正六年十二月浙江總督管巡撫事臣李衛為題明勘過應修江海塘工事看得海寧縣海塘緣歴年潮汐沖決䕶沙坍徙靡常必須每嵗續漸補修方能保䕶臣屢經前往履勘見南門一帶向有漲沙盡行坍卸潮水照舊直逼塘脚民字阜字二號石塘根脚年久外樁坦水沖洗歪斜塘身傾矬并有倒卸之處又華岳廟前及平橋西小石塘亦有塘身矬陷坦水外卸已飭員搶修此段工程除現修外若冬月䕶沙不能復漲則來嵗俱成險工應即隨坍隨修俟秋汛過後潮落之時再看有無沙起另行酌議又楊家莊一帶亂石塘前經議令加土培濶但塘身原屬低窪本年雖則保固無恙將來再遇夏秋大潮必致漫溢闗係匪輕應加築髙更有馬牧港一帶樁板亂石土塘一千丈前止加條石一層今潮水平塘大汛皆有漫過之處幸而搶救未滋大害亦應酌量再加築髙又翁家埠一帶原無官塘其臨海月牙灣不能保固亦應酌量地勢接建草塘與舊有之草塘相續當即行司確估去後兹據布政使髙斌詳稱寧邑南門外河安民阜等字號及華岳廟平橋西楊家莊馬牧港等處各段工程計勘應修築塘共四百五十三丈坦水四千四百六十四丈三尺估需銀二萬三千一百三十八兩此外又有搶修海寧平橋西等處坍壊殘缺塘身一百三十三丈坦水一百六十三丈用銀八十六兩七錢七分五釐零又海鹽縣請修白馬廟等處加髙土塘一千七百三十餘丈估需銀四百九兩九錢零又南岸會稽縣請修十三都一四兩圖矬坍石塘四十八丈六尺又拆修三十八丈估需銀二百七十六兩二錢五分零又接築錢塘縣斷塘尾江塘一百六十五丈估需銀三千六百五兩五錢零又諸橋一帶江塘加築塘石一層計長四百一丈拆砌江塘一百六十九丈估需銀一千一百八十三兩一錢二分零等因查江海塘工原以保䕶民生而潮汐沖擊月異嵗遷若不逐年預為搶修培築瞬息即成大險之工費多勞倍臣以有闗緊要隨於捐修海塘銀内動支八千兩給發海防同知馬日炳辦料乘此冬令潮小之後興工儹築委杭嘉湖道王溯維稽察錢糧工料總理其事惟是督工辦料僅止海防同知一人恐料理不周非專委數員常住在工難收實效將原任丁憂回籍之杭防同知李飛鯤調浙赴工協辦猶恐不敷請將發浙清查民欠錢糧之候補主事李煚部發南河効力之候選知縣吳𢎞曾行調來浙委之分段經管實力修築臣與布政使髙斌杭嘉湖道王溯維不時親督稽察務期堅固以保安瀾所有工料銀兩完竣之日確核報銷臣謹具題奉㫖王溯維派出稽查松江府積欠錢糧其杭嘉湖道印務着李衛委員署理已有㫖了餘着議奏該部知道欽此隨經工部議覆查浙江海寧等縣塘工該督既經勘明有闗緊要必須修築應如所題行令速飭承修之員儹築堅固如有續坍工程亦即飭令估修工完造冊題銷杭嘉湖道王溯維現奉㫖稽查松江積欠錢糧應令該督另行委員稽察工料錢糧務期實心料理至原任同知李飛鯤亦應如所請令其協辦分管料理可也奉㫖海塘工程照該督所請將王斂福調補杭嘉湖道令其管理已有㫖了餘依議雍正七年十一月浙江總督管巡撫事臣李衛為題明微臣勘過海塘情形酌議修築等事切臣奉㫖回任於本年九月由嘉興府前往海寧查勘海塘情形緣今嵗潮汐夏秋之間較往年更大形勢不同經臣與署督撫二臣屢次題奏勘估報修在案故先於閏七月初旬預發臣任内鹽務公費項下節省銀一萬兩著杭嘉湖道等加意搶修設法堵禦臣回籍之後復經性桂蔡仕􅘎親往查勘又續發銀三萬兩趕辦料物備築凡有沖缺矬裂之處多用柴草樁木隨時搶䕶晝夜隄防其潮溜頂沖地面竭力購備土石幫濶培髙以禦漫溢自閏七月以及八月猶可支持惟九月初二日潮勢更大幾至過塘甚屬危險幸而遵循聖訓先事預防舊塘石土雖大半沖削而新經幫培之所猶能抵禦狂瀾不致潰決今各處工程有已經題報搶修甫完而續被沖卸者有原估應須拆砌而題後即值秋潮洶湧不敢開底砌築暫用柴草搶堵者有於秋汛續坍未經題報而現已修竣者逐段間雜參錯不齊臣隨與性桂蔡仕􅘎程元章方覲王斂福等傳集工員公同確議寧邑沿塘東自尖山西至翁家埠綿亘百里皆臨大海非同從前工段僅止數百餘丈險塘可比若欲盡建鉅石大塘為費實屬不貲是以向來督撫諸臣俱於不用石工之次險處所議築草塘抵禦彼時塘外尚有䕶沙攔擋潮水畧有到岸不致侵齧根底每年嵗修加鑲猶可恃以保䕶今則南岸中間突有漲沙阻阨潮頭直射北面䕶沙洗刷無存岸邊深至二三十丈不等朝衝暮擊一線草塘豈能抵敵全海潮勢若非裏面添砌石工難以保固惟是合式鉅石採辦需時且現在松江塘料半向浙山開採出産一時不敷又兼海河閘壩轉運艱難勢必曠日持久豈有聽其沖卸坐待辦料齊全而後動工之理況此時正當冬汛若不急於設法整備轉瞬春潮坍卸堪虞臣等再四籌思西塘除老鹽倉東原有大石塘五百丈外自此以至翁家埠一帶俱係險工内荆煦廟起至草菴止向有先後修築草塘一千九百餘丈此外俱係土塘今就草塘之内收進二三丈開深根脚用大樁排釘深入沙底儹辦巨料砌築石工一面多備柴草樁木將舊日草塘根脚虛浮者加樁簽釘鑲砌髙厚其原無草塘者酌量增添仗此舊有草塘以䕶其外使内之石工人力可施保至三年之期即草塘或有損壞而石塘亦已告成沿海民生永保安瀾之慶矣至於東塘潮頭自尖山直趨而來勢猛溜急在在危險今於陳文港小墳前薛家壩及念里亭等處分築挑水盤頭大草壩五座週圍簽釘排樁中填塊石竹簍深入軟泥之下作為底脚上加埽料壓蓋堵禦頂衝使水勢稍緩可引漲沙漸聚一面將東西兩塘夏秋坍損等處竭力修補其逺年塊石各塘有不能抵禦者酌量改砌加髙培厚其一切號段工程現在勘估確實造冊另報一面動支塘工本欵銀兩辦料趕築所有勘估現在情形臣謹會題奉㫖該部速議具奏隨經工部議覆應如所題行令該督將前項應修各工一面作速動支銀兩上緊辦料堅固修築一面確估具題查核可也奉㫖依議雍正八年五月浙江總督管巡撫事臣李衛題為恭報勘明海塘近日情形敬陳善後末議仰請聖鑒指示欽遵事看得寧邑海塘綿亘百里工程之緩急大小惟以潮汐為憑非先事綢繆臨期萬難猝辦臣於雍正六年冬間親行查勘除南岸紹興等處漲沙漸逺連年平穩因見北岸海寧城外東西一帶漲沙盡卸潮汐改流誠恐次年更加危險隨於十二月内將應修石土各塘共估銀二萬三千餘兩題請修築并派員分管料理彼時不過先事預防豈意果於七年春間南首海中漸亘巨沙潮逼北岸於臣進京前後夏月沖擊更甚坦水坍卸塘身震撼日有矬陷復經調任布政髙斌五次續估共銀一萬四千餘兩詳請興修及臣回任聞訃丁憂在浙候㫖之時正值秋潮更大塘工危於呼吸署撫臣蔡仕􅘎雖經發銀四千兩備料搶修而東西兩塘道里遼濶實有不敷臣尚在地方何敢坐視將任内鹽務准存公費項下節省銀一萬兩發貯縣庫交杭嘉湖道王斂福等支領辦料先將各處塘身積土加培髙厚暫禦漫溢一面施工隨時搶修以為急則治標之計方始回籍迨臣於十月初三日遵㫖復任先經順途親往查勘於九月初旬潮勢猛急前題之外又多續坍當飭各工員隨坍隨築上緊搶修會同司道商酌先將草塘加厚增築以䕶其外再於草塘之内砌築石工以備後患又相度形勢潮流湍急於近塘往來汕刷潮退露出低窪之處儼若河形非築排水大草壩以分其勢則晝夜搜根塘脚空虛難以存立不敢膠執前見因於陳文港等處議建草盤頭五座堵禦頂衝一面將塊石各塘酌量改砌條石塘坦以期堅固亦經於十一月十五日彚疏具題各在案本年四月初一等日臣親往寧邑沿塘履勘查東塘前題請建盤頭五座内除白牆門念里亭已先建大者二座并錢家爿添一小座外其餘三座今春又經晝夜儹築完工并於小墳前之頂大一座盤頭兩傍増築雁翅使潮頭得以兩面順勢埽出不致壅遏沖擊前之近塘低窪河形亦得漸平現在頗見成效而西塘一帶塘身太直以致溜水往來搜刷如故春汛又多坍損亦應照東塘之例於老鹽倉戴家石橋楊家莊三處添築草盤頭大壩三座抵禦霉夏秋汛所有前題草塘内請建大工石塘之處貼岸目今雖有漸漲微沙聚散無定皆係必不可已之工但一時難以並舉不得不暫為寛期陸續帶辦其東塘自普濟菴至尖山止塘身共二千二百餘丈原係逺年碎石壘砌塘外坦水僅止一層從前尚有漲沙擁䕶得以無恙未及議修今嵗春初潮汛所至直埽塘身報坍數段目今南西二處會合倒捲潮頭雖息中沙漸徙惟有東潮往來誠恐將來伏秋大汛又有衝激頓成險工通塘逼近海邊一時難以搶救現將裏塘酌量簽釘樁木幫濶塘面五六尺窄處幫濶一丈塘外坦水逐段修砌完備其塘身石塊有鬆浮殘缺并現在坍卸者亦加拆築堅固以防秋汛此外有本年春汛東西兩塘陸續坍卸矬裂各塘身及潑動坦水樁石刻不容緩現在一面飭修一面催造估冊及西塘添築盤頭大草壩普濟菴以東修築塘身西新倉加築土堤草壩並上年秋汛續坍議改條石塘坦又前題草塘内石工各項工程確切估冊另咨送部其去嵗秋汛搶修并東塘先後建築大盤頭草壩又上年秋汛本年春汛兩次趕築續坍無脚草塘又西草塘等工俱已完竣當同本年正月内咨送原估續估以及秋汛增添各工料另於題修嵗修搶䕶各案内分别報銷抑臣更有愚昧之見瀆陳於聖主之前者竊見黄運兩河工程特命南化河臣分任總理自道㕔而下及於丞簿現任職官以至河工効力人員統計何止數百餘人一切工程分段承管各有責成且設河營兵丁終年防守一有聲息并力搶䕶其於下樁打埽等事皆自幼至老學習熟練心手相應故能刻期告成寧邑海塘非當年止有數里數十里之險工可比且潮頭一日兩至止有形勢大小之分並無停歇之日其間變幻不測而所設專官惟有海防同知一員遇有工程皆須臨時調委各屬佐雜分管完竣之日即回本任保固稽察仍止同知一人即使往來奔走而百里之遥東坍西卸晝夜靡寧豈能兼顧且做工之際人夫俱從鄉民僱覔來則一時烏合去則四散歸農毋論原係傭身食力工程漫不經心更有正當民間蠶農兩忙或值昏暮風雨巨潮猝至鄉夫僱募不前躭延時日均足貽悮緊工又如沿塘看守不過總甲地保每啚派充老民數人尚有本身應辦地方公私事務安能晝夜在於海濵瞭望巡查及至事後馳報而波濤洶湧患口決開不惟工程多致棘手而且為害匪輕臣再四思維若多設别員勢必另籌經費即外屬遥制亦恐呼應不靈惟杭州尚有捕盜同知管糧通判二員雖各有職守而同駐省城相去海寧不逺可以朝發夕至查有原任海防同知李飛鯤候補主事同知李煚現調海塘辦事皆在工日久諳練塘務仰懇皇上天恩以李飛鯤對補杭捕同知以李煚目前暫署杭州府通判事除海防同知照舊管理全塘外派令二員分管東西兩塘平日輪流赴工稽查夏秋之時親駐工所督率帶辦本等事務仍均聽杭嘉湖道統轄稽察至冬月潮落回杭則於本任職守仍可兼理無悮而塘工不致有乏員之慮至前因草塘盤頭工程浙人皆非素諳曾照往例移咨河臣孔毓珣調取宿虹營効力把總尹世忠百總張明到浙料理教習該弁等於草工既屬諳練又肯盡心竭力不辭勞苦親自帶人在泥水之中釘樁下埽較之塘工派委文官一員實兼數人之勞其教習在工之淮夫鄉夫畧有幾分頭緒但此等人夫去來不常未能專心學習臣愚見似應倣照河營兵丁之例請設海塘千把總二員兵二百名分於東西兩塘常川做工看守以尹世忠授為經制千總張明授為經制把總於現在各夫内挑選諳練者補入兵額内馬戰兵六名歩戰兵十四名守兵一百八十名千總給以馬一守四把總給以馬一守三養膳隨丁外委把總二名百總二名各給以馬戰餉一分管隊四名頭目十名各給以歩戰餉一分其餘皆是守糧仍聽道㕔管轄附入杭協水師營制造報題銷冬月如有閒時亦可操練防䕶海濵私運米鹽等𩔖其一應工程俱着該千把督率各兵專管分段看守則寒暑晝夜可以不致暫離而兄弟子姪兼得互相傳授數年之後多皆諳練之人猝有急工立時堵禦免於稽遲貽悮三年之内勤勞無過千總加以署守備職銜把總加以千總職銜以示鼓勵如有事故即於本營把總外委隊目下以次揀選頂補其官兵俸餉銀兩仍於本項嵗修海塘銀内支給所需米石於鹽義倉米石内闗領各兵在工仍抵為做夫之用較之從前僱募每日每名給銀三分八釐之數所增無多而於海塘實有裨益或亦善後之一策也是否有當伏祈聖鑒指示欽遵奉㫖該部議奏隨經工部議覆應如所題將現今坍卸塘工作速飭令在工人員幫築堅固以資捍禦仍將本年春汛東西兩塘陸續坍矬各塘身及西塘添築盤頭草大壩並上年秋汛續坍議改條石各項工程地段丈尺需用銀兩數目造冊送部其去秋搶修并東塘先後建築大盤頭草壩上年秋汛本年春汛兩次續坍草塘等工既經完竣應行該督於題修嵗修搶䕶各案内造冊具題查核至寧邑海塘原非同知一員所能經管應如所請杭州府同知通判二員除兼理本任事務外令其就近分管東西兩塘夏秋親駐工所督率修理其原任海防同知李飛鯤准其調補捕盜同知候補主事李煚先經該督題調効力之員其借署杭州府通判之處恭候欽定草盤頭工程浙人既非素諳効力把總尹世忠等料理教習已有頭緒應如所請照河員之例准其設立海塘千把總二員兵二百名於東西兩塘常川做工看守尹世忠授為經制千總張明授為經制把總於現在各夫内挑選諳練塘工者照額充補各撥養膳兵糧以資食用仍聽該道㕔管轄附入杭協水師營制造冊題銷在於嵗修海塘銀内支給至所稱官兵所需米石於鹽義倉闗領之處查鹽義倉經九卿議准留貯備賑之項不便支給兵糧應於額徵地丁米内按數支給仍將支過米石彚入題銷冊内報明戸部查核可也奉㫖依議雍正八年九月浙江總督管巡撫事臣李衛為題明勘過老鹽倉海塘近日情形事該臣看得雍正六年先後修築海寧縣老鹽倉迤西三官堂左右一帶草塘并加築盤頭工料銀兩請銷一案連准部駁據前任布政使張元懷查明詳覆前來如部駁工程全憑估冊若估計之後不行題明又復任意增添則動用錢糧何所憑據且修築續坍最險七十餘丈工程係用未築盤頭七十五丈之物料豈有前後相同毫無增減之理等因臣查各項工程一定不移者自當以估計為憑并須題明方敢動用獨至海塘則潮汐靡常東坍西漲頃刻變幻故臣於此案修築六百六十丈之原疏内即經聲明再有坍裂上緊保䕶隨坍隨修其原估内議築盤頭七十五丈因趕築之際潮勢紓緩沙塗並下若必照依估冊則錢糧豈不糜費是以停止不行添築迨夏秋之間潮勢西衝續坍六百一十九丈五尺間有塘外沙刷殆盡潮頭直射塘身變為最險者七十餘丈此時若必待題明部覆行文到浙則往返數月潰決將何底止所以將原題案内估築盤頭七十五丈工料移為續修塘内添築盤頭之用惟其丈尺相同故工料亦無盈縮此實移緩就急因時制宜不得不然之勢從來海塘照河工之例有估修搶修嵗修之分而與别項工程之一定者不可一槩而論也又部駁原估六百六十丈需銀八千兩撙節二千二百一十餘兩實用銀五千七百八十兩零今續添用銀七千一百四十餘兩轉比原估多用且原疏内並未將多用之處聲明等因臣查原估塘工因有添築䕶塘盤頭各項工料故估銀八千兩後將䕶塘盤頭停止不築止築塘外所以有撙節二千二百一十餘兩之數至續修塘工雖比原修計少四十丈五尺而加髙幫濶之處甚多估銀六千九百六十一兩零之内又節省四百三十餘兩惟加移築盤頭工料銀六百一十六兩零所以有續用銀七千一百四十七兩零之數是在原估六百六十丈之外又有增築續坍之六百一十九丈五尺並非不行將多用之處聲明也又部駁原送銷冊盤頭一工每丈用柴草二萬四千觔續補估冊每丈用柴草二萬六千觔今次所送冊内又開每丈用柴草一萬三千二百觔前後互異等因臣查原估塘身内有連盤頭并估之七十五丈每丈共估柴草二萬六千觔此估冊所開之數及將盤頭移築續修塘身七十五丈確加節省每丈止實用過柴草二萬四千觔報銷冊内不敢浮冒是以據實開報至於每丈用柴草一萬三千二百觔一係原題塘工内所築塘身三百一十五丈一係續修塘工内所築塘身五百四十四丈五尺俱無盤頭在内之工登覆冊内開載已明工程各有寛窄髙低形勢不同則柴草多寡自别實無互異通計原估續估共築塘工一千二百七十九丈五尺内築盤頭七十五丈所用工料核之前後估計有省而報銷登荅冊内開報數目俱屬相符並無舛錯揑飾總之錢糧闗係重大而海塘情形不同實難畫一久䝉聖明洞鑒用敢據實具題奉㫖該部察核具奏隨經工部核覆該督既將各欵逐一聲明臣等按冊細查其移工移料之處丈尺相符所開柴草觔數亦經詳晰應將用過銀兩准其開銷可也奉㫖依議雍正八年具題動給恩賞備公銀兩修築仁和縣臨江七啚周家橋一帶官塘里民柴世魁張道濟等捐夫助修雍正九年十一月浙江總督管巡撫事臣李衛題為續修江海塘工事浙省濵海各邑惟海寧潮水横過患在搜刷沙土根脚空虚海鹽潮來對衝患在因風助勢撼擊難禦所以兩縣塘堤時有東修西塌之虞而錢塘大江直接海寧潮頭阻遏江水逆回衝突堤㟁亦與别處不同若非逐年隨時相度修補保䕶稍有因循即成鉅工今詳細履勘見海寧縣鎮海塔前等處塘身低狹俱應幫濶培髙又念里亭等處潮勢甚猛往回汕刷塘脚必須加築坦水以䕶塘身又普濟菴等處應修塘坦其海鹽南首三澗寨一帶為石塘盡頭當海中韭黄門潮汐對衝最稱險汛雍正四年捐築矮石塘一百丈稍為抵禦今大塘脚下沙土被潮洗刷一空樁木露出竟成玲瓏之象危險異常惟有仍照原基接建四十丈方可保此一方民田廬舎又捐築之矮石塘及附石土塘底面窄狹必須因地加濶其北首天字號塘止頭等處海潮直逼土塘每遇東北風髙波浪洶湧土塘潰決可慮急應酌量頂次衝險加築石工此外閏餘二號夏汛裂縫石塘并劉王廟起至朱公亭止及珠稱等號低狹坍壊土塘俱應搶修培䕶又平湖縣獨山東西石土各塘上年毛竹寨等處已經衝坍三百五十餘丈隨飭搶修幸不蔓延今各塘低陷窄狹之處若不早為培修必致又費大工勘明情形不敢因循貽悮隨查寧邑海塘寧西草塘盤頭矬坍塘身一千三十一丈八尺備料儹修外其餘鎮海塔前等處幫濶培髙塘身共一千四十三丈又念里亭草盤頭等處一百五十五丈應加築大條石坦水一層并舊塊石坦水三十五丈應築大條石坦水二層東塘七里廟等處五百餘丈議將中條石築塘身大條石築坦水内有頂險之處塘身亦用大條石砌築又普濟菴迤東梁家池等處塘身二百二十餘丈并西塘唐子千門前五丈仍用塊石修築海鹽縣南首三澗寨改築舊石塘八十丈矮石塘一百丈接建新石塘四十丈北首天字號塘止頭一帶建築石塘共一千三百六十五丈并小陡門一座搶修閏餘二號舊石塘一十一丈又三澗寨塘止頭各附石土塘共四百五丈搶修珠稱珍李等號附石土塘四百一十八丈加髙幫濶劉王廟等處老土塘一千三十丈平湖縣獨山東西拆修石塘九十丈一尺加髙幫濶培厚土塘共一千二百九十一丈八尺并乍浦城西石街等處加髙土塘一千一百四十丈及錢塘縣徐村梵村等處修築坍裂江塘三百五十三丈六尺均屬勘明確核應修應築工程除飭取工料細冊送部一面動項給發工員速行辦料乘此冬令潮小之候預為興工儹辦統於完竣日同上年嵗修已完鹽邑之洪荒等字號報坍附石土塘一千九百六十二丈矮石塘三十丈謝家灣等處加髙幫濶土塘九百一十五丈平邑之毛竹寨黄姑坊沖坍土塘三百五十餘丈等各工一併分别造冊請銷相應具題奉㫖該部議奏隨經工部議覆應如該督所題將海寧海鹽錢塘平湖等四縣鎮海塔前等處應修應築石土各塘共八千二百八十餘丈准其動給速行辦料興修如式堅固工完造冊題銷可也奉㫖依議浙江通志卷六十五
