body:
  text: 浙江通志卷一百十七職官七明督撫大臣明㑹典凡各處巡撫官初遣尚書侍郎都御史少卿等官後專用都御史初名巡撫或名鎮守後定為巡撫兼軍務者加總督贊理掌糧餉者加總督兼理他如整飭邊備提督邊關及撫治流民等項皆随事異名若邊境有事又有總督提督總制叅贊贊理及經略巡視之名列卿年表總督軍務巡撫自永樂以來或以治農或以採木或以賑饑或以督租或以理鹽或以地方有事巡視鎮守但事寜則罷並未專設巡撫至嘉靖二十六年沿海㓂發始命都御史巡視浙江福建二十八年停革三十三年又因倭犯杭城特命尚書張經提督浙江福建南直軍務又專設都御史巡撫三十六年命巡撫浙江都御史仍提督福直軍務四十三年定議總督軍務巡撫浙江等處地方官銜因事欽差大臣萬厯杭州府志差無定職以事至者皆地方重務與撫視並巡按萬厯杭州府志洪武十年詔遣監察御史巡按州縣巡按之設自此始明㑹典凡巡按御史一年已滿差官更代續文獻通考巡按代天子巡狩所按藩服大臣府州縣官諸考察舉劾必專大事奏裁小事立斷按臨所至必先審錄罪囚存恤孤老巡視倉庫勉勵學校表揚善類剪除豪蠧以正風俗振綱紀巡鹽明㑹典永樂十三年差御史給事中各一員於各處閘支鹽課正統元年差侍郎及監察御史巡視各處私鹽三年令兩浙等處運司各差御史一員巡視及催督鹽課景泰元年差侍郎一貟清理兩浙鹽法二年取回兩浙巡鹽御史令鎮守侍郎兼理三年令巡河御史兼理兩浙鹽法裁省巡鹽御史尋又差御史一員於兩浙巡鹽𢎞治元年差侍郎一員兼僉都御史清理兩浙鹽法史槩嘉靖二十年停清理鹽法大臣三十二年革各處巡鹽御史三十九年命副都御史清理各處鹽法南關工部分司兩浙南關𣙜事書太祖酌賦外之征税竹木等物在諸省郡各随地為費故杭之抽分屬城南税課司特三十取一成化辛夘因千户汪禮奏於本地抽分木植以資漕船之用命下部議乃覆題於浙之杭州建抽分凡商販竹木十取其一而是厰遂立每嵗差部臣一人司其事萬厯杭州府志成化二十一年差御史𢎞治五年差太監助辦正徳十年專委工部分司官後仍之北關户部分司萬厯杭州府志國初差御史監收閘辦課程或户部監收船鈔未有定制景泰元年差户部主事於蘇杭二府專掌之始有杭州鈔關六年罷主事嵗委府官收鈔成化四年倂鈔關罷之七年復鈔關𢎞治六年命於南京户部差官遂為定例布政使司續文獻通考初為行中書省洪武九年改浙江諸省為承宣布政使司建文中革左右布政使設布政使一人靖難後復故明㑹典布政使司左右布政使各一貟左右叅政叅議各一員因事添設無定員經厯都事照磨檢校各一員理問副理問各一員提控案牘各一員牘文獻通考布政使掌一邦之政叅政叅議為之貳朝廷有徳澤政令承而播之以先有司三年覲京師十年造户版以登民數田數嵗貢學生三嵗鄉試貢士班祿廩謹時祀賑貧乏有行義者請表揚之鰥寡孤獨有養凡供邦國之貢賦役必均凡出納錢榖必平凡制用必節凡僚屬文武官嵗察其臧否而上下其考以報於撫按以達於部院凡諸政務議定而請於撫按總督曰清軍曰分守曰督糧曰邊備曰撫民各專事焉經厯典出納文移都事佐之照磨典磨勘卷宗檢校佐之理問典刑名副與提控案牘佐之按察使司續文獻通考提刑按察使司太祖置洪武元年浙江提刑按察使李詳充議律官上大明令十四年遂定各道按察分司建文中改為十三道肅政按察司靖難後復故明㑹典按察司按察使一員副使二員因事添設無定員僉事員數不等經厯知事照磨檢校司獄各一員續文獻通考按察使掌一省刑名按劾之事糾察官邪禁詰強暴雪理寃枉以振揚風紀副使僉事為之貳凡僚屬文武官嵗察臧否而上下其考以告撫按以達於部院凡大事暨布政叅議焉副使僉事分巡提學兵備撫民巡海清軍屯田水利治河驛傳各專事焉凡分巡浙江二道浙東浙西經厯典出納文移知事佐之照磨典磨勘卷宗檢校佐之司獄守獄漕運續文獻通考明漕運不設提舉特置總督都御史專理其事總兵官催儹而把總官分任運務其趲運舊用户部郎中後用御史押運舊用叅将協同後以叅政領之各府州縣監兑則用户部主事鹽運司明㑹典洪武元年置兩浙都轉運鹽使司定嵗辦鹽數明㑹典運使一員同知副使各一員判官員數不等經厯知事各一員提舉司提舉同提舉各一員副提舉員數不等吏目一員所屬鹽課司大使副使吾學編轉運使掌鹺事以聽於户部同知副使判官為之貳凡分司鹽課司鹽倉批騐所各以僚屬分任其事而都轉運使總領之糾禁私煎私買賣窩買窩諸奸弊謹受巡鹽御史之政令而申勵焉續文獻通考兩浙都轉運鹽使司轄嘉興松江寜紹温台四分司鹽塲三十五處提舉學事續文獻通考明初以御史提舉學校後改按察司官專督而兩京用御史如故遂為定例凡學政遵卧碑提學憲臣申飭之責提調於府弇州史料宣徳間用少保黄福言添設提學官擢兩浙鹽運同知為副使浙江給勅書提督學校事市舶提舉司續文獻通考洪武初設市舶司於浙江七年罷後復設提舉一人副提舉二人掌海夷朝貢市易之事府明㑹典知府一員同知通判各一員因事添設無定員推官一員經厯知事照磨檢校司獄各一員儒學教授一員訓導四員倉税課司雜造織染局使副各一員巡檢一員隂陽學正術醫學正科各一員僧綱道紀司都副各一員水馬驛丞一員遞運使一員河泊所官一員續文獻通考明初罷各路總管府於各省分置諸府知府掌教養郡民之事同知通判推官為之貳賔興科貢均平賦役崇慎祀典訊刑獄䘏窮困糾察吏治以告於撫按藩臬若籍帳軍匠驛馬倉庫盗賊河渠道路之事雖有專官皆知府領之而總督焉凡屬之政皆受約束於府同知清軍匠或兼巡捕通判管糧緝盗治農修河牧馬推官理刑名分職任事州明會典知州一員同知判官各一員吏目一員儒學學正一員訓導三員隂陽學典術醫學典科各一員税課茶課使副各一員倉使副各一員僧道司正各一員續文獻通考知州掌教養州民之事凡諸州務上視府下視縣同知判官分職任事而領於知州縣明會典知縣一員縣丞主簿各一員典史一員儒學教諭一員訓導二員隂陽學訓術醫學訓科各一員僧道司會各一員續文獻通考知縣掌教養縣民之事凡諸縣務如州而縣尤親民嵗貢學生聽試於提學憲臣三嵗貢士聽選於鄉試嵗攢實徴十嵗造黄册民之賦役必調劑而均節之若嵗大歉請於府省而蠲減焉凡養老祀神表義䘏窮通貨之事時省而敦行之縣丞管馬管河管糧主簿巡捕分職任事而領於知縣鎮守總兵官副總兵叅将逰擊守備明會典凡天下要害處所専設官統兵鎮戍其總領一方者曰鎮守獨守一路者曰分守獨守一城一堡者曰守備有與主将同處一城者曰協守又有備倭提督提調巡視等名其官稱掛印專制者曰總兵次曰副總兵曰叅将曰逰擊将軍全浙兵制總鎮衙門設自嘉靖三十四年駐劄臨山三十五年議以定海為倭貢道改駐彈壓萬厯九年因省城兵變復議汛期移駐定海汛畢移駐省城以節制全省兵官仍巡厯海上備倭都司全浙兵制初設備倭都司一員駐劄定海管轄外海守備一員駐劄温州專防温處地方嘉靖三十一年為倭㓂生發革去備倭都司改設叅将分守寜紹地方駐劄定海三十五年改駐臨山三十八年革去温處守備添設杭嘉湖叅将一員駐劄海鹽縣温處叅将一員駐劄溫州府台金嚴叅将一員駐劄台州府其寜紹叅将移駐舟山悉聽總鎮節制都指揮使司續文獻通考明初為翼元帥府又改為行都督府省城或稱都尉都鎮撫司洪武八年改為都指揮使司都指揮司十六一曰浙江續文獻通考都指揮使一人同知一人僉事四人其屬經厯都事各一人斷事及副各一人吏目司獄各一人都指揮使掌官軍之政令各率其衛所以隸於五府而聽於兵部五嵗考選軍政而廢置之使同知僉事常以一人統司事曰軍政掌印一人練兵一人屯田曰軍政僉書巡捕軍器漕運京操備禦諸雜務並選充之曰見任管事否曰帶俸經厯典文移都事為之貳斷事理刑獄副為之貳吏目佐之司獄守獄外衛指揮使司續文獻通考指揮使一人同知二人僉事四人衛鎮撫二人升授改調增置無定員其屬經厯知事各一人有衛學者教授訓導各一人有驛遞運所隂陽醫學僧道者設官視府指揮使司掌軍旅防禦之事使同知僉事考選掌管衛事每嵗藩臬按察其賢否五嵗一考選軍政廢置之一人統衛軍曰軍政掌印一人練兵一人屯田曰軍政僉書京操巡捕出哨備禦軍器漕運諸雜務曰見任管事編諸行伍曰帶俸差操凡撥軍補軍贊軍選軍募軍並統於掌印鎮撫掌刑獄經厯典文移知事佐之續文獻通考凡軍之政必聽於衛衛下千户所千户督百户百户下總旂小旂率其伍卒以聽於所明職官姓氏督撫大臣胡濙武進人進士永樂年任胡概字元節江西豐城人葉春字景暘海鹽人已上洪熙年任趙倫邠州人舉人成均鹽城人國子生已上宣徳年任王翺字九臯鹽山人進士焦宏葉縣人進士軒輗字惟衡鹿邑人進士已上正統年任孫原貞名瑀以字行徳興人進士劉廣衡萬安人進士已上景泰年任曾翬太和人進士劉敷永新人進士已上成化年任吳原漳浦人進士王璟沂州人進士已上𢎞冶年任陶琰字足信絳州人許廷光湯隂人已上正徳年任王堯封定興人進士胡璉沭陽人進士朱紈字子純長洲人王忬字民應太倉人進士張經字廷彛侯官人進士李天寵孟津人進士楊宜真定人胡宗憲字汝貞績溪人進士阮鶚字應薦桐城人進士趙炳然字子晦劍州人進士劉畿長洲人進士已上嘉靖間任鄒應龍長安人進士趙孔昭字子潛邢臺人進士谷中虚海豐人進士熊汝達進賢人進士郭朝賓汶上人進士鄔璉新昌人進士已上隆慶間任方𢎞靜字定之歙縣人進士謝鵬舉蒲圻人進士徐栻字世寅常熟人進士李世達涇陽人進士吳善言成安人進士張佳𦙍字肖甫銅梁人進士蕭廩字可發萬安人進士溫純三原人進士滕伯輪甌寜人進士傅孟春髙安人進士常居敬江夏人進士王汝訓聊城人進士劉元霖任丘人進士尹應元廬陵人進士甘士价信豐人進士王永光長垣人進士髙舉淄川人進士劉一焜字元丙南昌人進士已上萬厯間任蘇茂相晉江人進士耿庭柏新城人進士王洽臨邑人進士劉可法商城人進士陸卿榮武進人潘汝楨桐城人進士張延登邵平人進士已上天啓間任陸完學武進人進士羅汝元南昌人進士喻思恂榮昌人進士熊奮渭商城人進士董象恒華亭人進上黄鳴俊莆田人進士張秉貞桐城人進士已上崇禎間任因事欽差大臣夏原吉字維喆湘隂人治水江浙劉觀雄縣人木俞士吉象山人賑餞趙居任溧水人築海塘永樂乙已任易英灃州人修築海塘岳福治農黄宗載豐城人名原以字行清軍王譲益都人督浙柤羅汝敬吉水人督漕運周恍字恂如吉水人督杭嘉諸邵糧儲熊概字元節豐城人即胡概復姓治水杭嘉王瀹太康人督浙運王質㤗和人開浙銀塲孫原貞見前平浙鹽魏尚純字嵩麓禹州人張楷字式之慈谿人討處州葉宗畱石璞臨漳人叅贊機務陳詔青田人安撫本郡耿九疇平定州人清理鹽法洪英懷安人考察官吏李顒字忠誠博羅人修築江岸李嗣南海人清理鹽法彭韶字鳯儀莆田人清理鹽法張憲徳興人清理鹽法潘鑑婺源人督木料王瓊字徳華太原人王雲鳯和順