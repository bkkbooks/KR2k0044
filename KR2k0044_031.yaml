body:
  text: 浙江通志卷三十二公署下金華府金華府治在子城内府山南嘉靖浙江通志唐開婺州治宋改保寜軍治元改婺州路總管府明改寜越府尋改金華府萬厯金華府志元置浙東宣慰司於此遂遷婺州路於宋添差通判𪠘址即今府治也成化𢎞治中知府李嗣周宗智韓燾相繼修葺萬厯乙亥黄焯守郡改建府宅於後堂之北丁丑王懋徳守郡重建儀門大門國朝順治十年知府夏之中重建中為宣化堂後為川堂為義理兼制之堂又後為内宅有退省堂正堂之左為軍器庫右為昌濟庫東為經厯司翼以六房西北為架閣庫後為司獄司治北為照磨所堂之前為露臺為甬道為戒石亭又前為儀門為大門大門東為親賢堂為土地祠右為通判㕔糧捕通判在府治大門内之右金華府志大門外西南隅建大觀亭内為儀門為大堂後為川堂為内宅校士館舊察院行臺在府治東北金華府志察院行臺乃宋之州治也元初改浙東道宣慰司大徳六年司徒慶元改按察為肅政㢘訪而徙治其地泰定二年重建元統元年重修明改為察院行臺後壊正徳間知府劉茝建又名大司國朝提督學政校士于此中為㢘威堂舊名澄清後為自公堂為川堂為寢室後有亭前為甬道東西為席厰前為儀門為土地祠為大門為府縣候㕔前有坊表曰浙東第一臺外為譙樓據城上其下為古保寜門金協城守副將在醋坊嶺金華縣志都督府今改為協鎮府協標中軍左營都司駐劄鐡嶺頭協標右營都司駐劄義烏門内金華縣治在府治西二里嘉靖浙江通志舊在府治東唐開元中刺史梁猷徙今所宋皇祐初令沈振重建金華縣志淳熈間木昺來任重修唐仲友重修縣治記金華為婺治其山水清逺土田沃衍物阜而俗美冠于属邑治𪠘創于五代修于皇祐寖就傾陊今宰木君檢漏入約浮費鳩工庀材纎悉計㑹一毫不以煩民葺聴事之堂與西偏便㕔撤中門而新之闢堂之東建齋以便寢處為役盖不細而民不知可謂善矣萬厯金華府志明宣徳八年知縣郭瑛建門廊𢎞治間知縣曹斆林釗繼建萬厯四年知縣張名藩重建内衙㕔樓修大門及外屏墻中為素絲堂後為川堂為後堂又後為退思堂為内宅堂西為耳房庫東為幕㕔幕㕔左為丞𪠘前為尉𪠘堂南前為甬道為戒石亭東西為吏廊又前為儀門門西為喜聞堂後為土地祠前為大門南有坊曰長山古治蘭谿縣治在城東隅嘉靖浙江通志宋宣和四年建元陞為州治明洪武二年仍改為縣治知縣賈存義重建萬厯金華府志成化間知縣范希瑊唐韶増修𢎞治九年燬知縣許翺重建萬厯六年知縣張新重建正㕔中為正堂舊名勤政後堂名清心東為令宅𢎞治十六年知縣蘓琰建西為補過軒樂胥堂桂桃館正堂之左為幕㕔為庫前為甬道為戒石亭東西為吏舎為架閣庫又前為儀門為譙樓儀門外西南為丞𪠘為尉𪠘東陽縣治在城西北隅嘉靖浙江通志宋宣和間令裘移忠建萬厯金華府志元燬至元十五年縣尹王世英重建泰定四年縣尹趙鍾修明永樂元年知縣詹奎彰益加修拓天順二年知縣繆樗重修國朝康熙十四年知縣胡啓甲重建正堂譙樓杜時萼重修東陽縣治記都人請曰非徒建堂是謀而併審向是慮盖斯堂錯向之後邑無寜嵗筮改斯吉乃審察舊向正對婺之二度明末所向誤為四度因仍改向二度堂名琴臺後為川堂為後堂曰内省堂為觀風樓最後為臺曰呉寜臺上有樓名應宿明𢎞治間知縣謝琛建其下清沼環之為亭二曰玊寒曰愛蓮後廢隆慶間知縣鄭凖改治之為水鑑亭為夜告亭鄭凖池亭記維婺上㳺呉寜宅焉山欎而巍水湍以紆環流數百里巉巖䆳洞澄流飛瀑莫可數計而涓流疏于街衢烟霞溢于城郭邱林盟主水石銓衡非假逺取聿臻幽致矣署北有垣垣外有池池隂有臺臺之巔崇樓覆焉臺之四垂喬木交䕃焉乃從署左竟取臺東架木為橋命曰衡橋鑿垣為户因垣施楹雙扉中啓與樓相當臺南夾石梁建雙亭曰水鑑曰夜告池之四隅稍増築之築工甫竣多景旋集草木生色禽魚親人公庭地切靈境天成事非民勤景與人㑹聊湏文墨用代丹青川堂西為葵向堂正堂左為庫為廊廊下為賔館館前為土地祠後堂西為丞𪠘正堂東南為尉𪠘東為幕㕔前為甬道為戒石亭為儀門為大門為鼓樓義烏縣治在繡川門之北萬厯金華府志宋大觀四年知縣徐秉哲建宣和四年知縣裘移治重建南渡後知縣黄袤葉蕃張康徐正卿吕浦趙必升皆新之元至元十四年縣尹蕭玊重建皇慶元年燬二年達嚕噶齊哈干新之至正間又燬明洪武二年知縣張永誠拓基重建王禕義烏縣興造記義武烏自漢以來為烏傷唐徳四年以縣立綢州又置華川縣七年州廢省華川入烏傷而更今名華川故址在今縣南三十里則縣治之在今所舊矣成化十五年知縣趙溥修嘉靖十五年知縣胡橒重建儀門譙樓二十一年知縣梅凌雲重建川堂扁曰靖恭金華府志萬厯十八年燬知縣金繼震重建義烏縣志崇禎十三年知縣熊人霖増建素絲堂國朝康熙十三年㕔𪠘再燬知縣辛國棟重建雍正五年知縣韓慧基重建譙樓中為敬事堂堂後為有孚亭為精誠軒内宅為衙堂為大觀樓川堂西為架閣庫正㕔東為幕㕔西為耳房庫前為甬道為戒石亭東西為吏廊為儀門門東南為尉𪠘前為大門為譙樓永康縣治在華溪之陽嘉靖浙江通志呉赤烏八年創建唐武徳間即其地置麗州徙治于城北八年廢州復為縣萬厯金華府志宋宣和間燬紹興間知縣强友諒宋授相繼新作嘉泰元年知縣陳昌年尹穡復増葺焉元至元十三年燬十七年達嚕噶齊實巴爾尹范儀又拓而新之至正間又燬明洪武四年知縣吕兼明剏建後知縣宋顒魏㢘相繼修之正統十四年燬知縣何宗海重建成化十三年知縣髙鑑新譙樓嘉靖十三年知縣洪垣重建㕔事國朝順治八年知縣張祚先重建大堂康熙七年知縣徐同倫十八年知縣謝雲從三十一年知縣沈藻重修中為道愛堂後為川堂為内省堂為氷心㕔最後有稽古樓有觀徳㕔左為賛政㕔為架閣庫前為甬道為戒石亭為儀門門外右為賔館為土地祠前為丞𪠘為尉𪠘為大門為譙樓武義縣治在城北隅萬厯金華府志唐初建宋宣和六年令徐廣重建元至元十三年燬二十七年監邑竒塔特䝉古即故地復剏丁丑又燬明洪武初知縣趙果重建天順三年知縣康顒建後堂成化六年知縣陳璉建正㕔𢎞治元年知縣曽禄建幕㕔十一年知縣胡秀重建後堂十二年縣丞潘棠建吏𪠘國朝康熙二十二年知縣史大受重修縣治中為忠愛堂舊名徳政後為川堂曰清慎勤左為架閣庫後為内宅為四知堂後有樓曰望台今改望雲樓四知堂右為心閒亭左為尉𪠘正堂東為庫又東為賛政㕔前為甬道為戒石亭東西為吏舎為儀門外為師虞堂左為土地祠前為大門有樓曰保和樓浦江縣治負仙華山萬厯金華府志宋紹興十六年知縣蔣樞建咸淳元年知縣王霖龍増修六年知縣王安仲建公恵堂元至元二十九年縣尹趙泰重建大徳九年縣尹蔣恕重修後至元二年縣尹林以順至正三年張悦相繼修明洪武三年知縣張希賢正統六年丁鋭相繼重修成化十五年知縣秦蕃増新之金華府志正徳七年知縣鄒輗遷建縣衙國朝順治四年知縣韓文明重建康熙八年知縣毛文埜二十二年知縣張時泰重修中為正堂後為川堂為後堂為令宅西為桂花亭西雪亭正堂東為庫為幕㕔西為西園前為甬道為戒石亭為儀門門東為土地祠西為迎賔館為吏舎東為尉𪠘為譙樓外有坊曰文獻名邦湯溪縣治在官山嘉靖浙江通志明成化六年建縣明年知縣宋約設治于官山國朝康熙年間知縣張元會重修正㕔為忠愛堂前為軒為甬道為戒石亭左右為六房後為川堂為燕堂為令宅宅中為敬愛堂東為仕學軒西為慎獨軒又西為尉𪠘正堂左為庫右為賛政㕔儀門左為土地祠為寅賔館前為大門衢州府分廵金衢嚴道在縣治西舊署在府治後明建國朝順治六年守道李際期移署于縣治之西即明守禦千户所康熈五十七年裁雍正十二年總督臣程元章題請復設廵道一員駐劄守道衙門衢州府治在府城東南崢嶸山上嘉靖浙江通志唐武徳四年置衢州治六年治燬州廢為縣乾元元年復為州建治衢州府志宋紹興十七年知州張闕作思政堂舊浙江通志元改為衢州路總管府治𢎞治衢州府志元初燬至元二十二年本路達嚕噶齊本巴重建正㕔至大三年達嚕噶齊薩蘭都總管朱霽重修明郡守張寔宣徳間朱敬天順間唐瑜同知魏安𢎞治十二年守沈杰相繼重修衢州府志嘉靖十六年知府袁城三十八年知府楊凖四十三年知府鄭伯興崇禎八年知府張文達並修葺國朝康熙三十四年知府張琳重修中為平理堂東為經厯司西為照磨所後為川堂為明徳堂舊名思政堂西為内宅為雙桂軒最後為大觀亭舊名平山亭今名遊瞩亭亭東有樓曰望監有館曰公餘憇所儀門之南為譙樓東為迎賔館少前為司獄司西為通判宅治内舊有小峩眉峯龜峯亭雙石堂來月亭雲竹軒今或廢或存分防同知駐劄峽口雍正十二年題設糧捕通判在儀門内西中為正堂後為川堂為後堂為内宅堂前為甬道為儀門東西為吏廊為土地祠為迎賔館為大門校士館明崇禎丙子知府張文達建國朝順治八年因衢與閩接壤移駐總督改為署康熈二十三年裁併福浙總督移駐福建遂改為校士館每遇督學試士有司以嵗時葺治之中有大堂有燕寢有退食所有賔友幕室有梧竹池館庖湢諸舎百有餘楹諸生號坐皆環以檻承以棧甃以瓦不虞浥漏鉅麗冠於浙東鎮守衢州等處總兵官雍正十二年題將衢協副將改為衢州總兵官駐劄府城鎮標城守都司衢州舊有協標中營左營都司二員雍正十二年題將一員改為城守都司駐劄府城西安縣治在府治西仁夀坊嘉靖浙江通志舊為雜造局元改萬户府治至大間又改録事司而縣治在禮賢門外明洪武初知縣曹郁徙今所𢎞治衢州府志二十八年知縣姜仲能増建𪠘舎衢州府志𢎞治十八年知縣戴旦嘉靖二十一年知縣呉徳范四十年知縣俞大有四十三年知縣曹存増修中為堂曰忠愛右為耳房庫後為退堂曰勤慎又後為令宅東為先思軒忠愛堂之前為甬道為戒石亭東西為書吏房西北為土地祠前為儀門門東進迤北為丞𪠘西進迤北為尉𪠘外為縣門為譙樓龍㳺縣治在白蓮橋北𢎞治衢州府志元至元丁丑達嚕噶齊薩木喀爾建後燬癸卯令翟瑛重建明洪武三年令劉庚永樂初知縣祝淵重修天順間令王瓉𢎞治戊午令袁文紀増葺衢州府志嘉靖二十二年燬知縣錢仕重建二十九年知縣甘用世萬厯十一年知縣魯崇賢十四年知縣唐興仁相繼増修國朝康熙十二年知縣許琯修中為思政堂後為川堂為後堂為令宅為寅畏堂川堂西為庫房思敬堂左為幕㕔為丞𪠘丞𪠘前為尉𪠘右為架閣庫前為甬道為戒石亭東西為六房前為儀門左為土地祠為迎賔館前為大門建譙樓其上外為白蓮橋江山縣治城西北通化門内𢎞治衢州府志面景星峯元達嚕噶齊阿哈瑪特修建至元壬辰燬知縣程萬里稍剏嘉靖浙江通志明洪武三年縣丞劉有恒八年知縣劉瓛相繼鼎建衢州府志𢎞治七年知縣楊俊嘉靖二十一年知縣黄綸重修萬厯十九年知縣張斗重建國朝初知縣孫遂重建内衙康熙元年知縣萬里侯建署内書院顔曰明逺堂三十一年知縣楊愙重建兩廊及譙樓又建堂於靜思樓之址曰靜思堂五十二年知縣汪浩作强恕軒中為忠愛堂左右為耳房庫東為賛政㕔架閣庫前為甬道為戒石亭東西為吏廊儀門東南為丞𪠘西為尉𪠘為賔館前