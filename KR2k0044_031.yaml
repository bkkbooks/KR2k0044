寅賔館門上為譙樓遂昌縣治在君子山麓嘉靖浙江通志呉赤烏二年建宋熙寜間令錢長侯重建元末燬明洪武三年知縣魏良忠重建天順元年知縣王貴修葺括蒼彚紀𢎞治末燬知縣邵文忠張鉞相繼成之正徳十三年又燬知縣張淵復建遂昌縣志嵗久圯崇禎二年知縣胡順化重建國朝康熙四十九年知縣繆之弼建内省齋于川堂之東中為居敬臨民堂後為川堂為觸目警心堂西為内省齋宅内有空嘯閣有梅舫有代庫樓堂右為賛政㕔前為甬道為戒石亭東西為廊西南為尉𪠘南為儀門門左為土地祠為寅賔館前為大門為譙樓額曰西栝雄觀協標駐防龍泉汛遊擊駐劄縣城龍泉縣治在九姑山之陽括蒼彚紀宋大觀二年重建嘉靖浙江通志自譙樓而南夾岸皆荷池元燬明洪武元年知縣張政建崇禎處州府志𢎞治三年知縣潘祖紳改建縣宅𢎞治十二年知縣梅秀重修隆慶二年知縣李柷一新之治堂左為賛政㕔右架閣庫東西為吏舎前為甬道為儀門後川堂為後堂左廂房右耳房庫北為知縣宅右為典史宅儀門外東為際留倉前為大門外為三思石橋慶元縣治在城東北嘉靖浙江通志在半月南山溫湯石龍二山之間宋令富嘉謀建富嘉謀建縣治記龍泉距處為綦逺而鄉之松源距龍泉為綦逺地居浙東之極慶元丁巳以松源一鄉益以延慶鄉之半置為邑錫名慶元越明年卜地于兹建縣治若迎詔頒春若庾犴罔不咸具丞𪠘在其東尉𪠘在其西縣學在其北方析邑有木數千章一夕暴流漲溢蔽溪順流而下亦異矣嘉泰元年十月記慶元縣志元至正十五年燬二十六年達嚕噶齊伊徳森重建崇禎處州府志明初改為廵檢司𨽻龍泉縣十四年復立慶元縣知縣董大本重建二十七年知縣李仲仁充拓之慶元縣志𢎞治間知縣沈鶴重修國朝康熙元年知縣高嶙重建四年知縣程維伊重建縣宅中為忠愛堂後為川堂為後堂額曰萬古磨青為耳房庫為内宅忠愛堂左為賛政㕔前為甬道為戒石亭為儀門門外東為寅賔館左為土地祠大門上為譙樓内宅東為尉𪠘舊為丞宅奉裁改建雲和縣治在浮雲街北嘉靖浙江通志明景泰三年置知縣顧立建崇禎處州府志萬厯三十七年水壊知縣丁以聰重建中為治㕔左幕㕔右耳房庫前甬道戒石亭東西吏廊東廊後為預偹倉前為儀門東為迎賔館為土地祠西為獄又前為譙樓治㕔後為川堂為後堂又後為知縣宅右為典史宅舊丞宅奉裁今改建宣平縣治在占鼇山南嘉靖浙江通志舊為鮑村廵檢司景泰三年置縣知縣李葉即司地建今治國朝康熙二十四年知縣魏康孫重建大堂堂後為川堂為後堂為内宅為尉𪠘堂左為幕㕔右為耳房庫前為甬道為戒石亭為儀門門外東為土地祠前為大門上為譙樓景寜縣治在桂山石印下嘉靖浙江通志景泰三年知縣楊殖宗創建國朝康熙二十二年知縣劉宗沛重建大堂四十四年知縣朱軫裔改建中為忠愛堂左賛政㕔右耳房庫前甬道為戒石亭東西為吏廊西為倉又前為儀門為屏門外為大門堂後為川堂顔曰帥正為後堂左為架閣庫又後為知縣宅右為典史宅玉環玉環營叅將駐劄東青山下溫台玊環清軍餉捕同知在玉環山明一統志玊環山在樂清縣東南二百里海中國朝雍正五年總督管巡撫事臣李衛題請専設玊環清軍餉捕同知一員常川駐劄随檄新授同知張坦熊建造衙署面南照牆一座東西轅門一座大門五間儀門三間東面書吏房六間土地祠三間捲篷三間大堂五間内宅門一座二堂三間廂房六間住房五間耳房庖湢共十二間浙江通志卷三十二
