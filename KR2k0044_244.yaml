body:
  text: 浙江通志卷二百四十五經籍五子部上儒家揚子太玄經十四卷七録虞翻注注太玄經十二卷玄賾一卷宋史藝文志徐庸撰太玄補贊𢎞治紹興府志程迥著太玄本旨二卷古栝遺芳龍泉葉子奇著太玄經集解台州府志葉良珮著魏子三卷隋書經籍志後漢會稽人魏朗撰志林新書三十卷隋書經籍志虞喜撰梁有廣林二十四卷後林十卷干子十八卷七録干寶撰卷按唐書藝文志有正言十立言十卷翼善記唐書褚無量傳為太子侍讀撰至性書三卷通志藝文略茅知至撰君臣圖翼二十五卷康教論一卷通志藝文略陸贄撰諸論辨一卷宋史藝文志程迥撰集曽子十八篇杭州府志章樵著儒志一卷宋史藝文志王開祖撰山按萬厯溫州府志作王景吕氏讀書記七卷書録解題吕祖謙撰荀揚問答外稿括蒼彚紀葉適著劉子邇言十二卷兩浙名賢録劉炎著字子宣松陽人李東谷所見一卷百川書志宋永嘉東谷李之彥撰省心詮要一卷百川書志宋錢塘林逋君復著宋濂題後沈道原作困學紀聞二十卷百川書志宋厚齋王應麟著黃氏日抄九十七卷百川書志宋儒慈溪黃震東發編觀頤悟言一卷讀書臆説十卷尚友録王宗道著詮心指要隆慶平陽縣志劉軫著字德輿荀子注兩浙名賢録趙汝談著荀子注成化杭州府志洪咨夔撰類次文中子嘉靖浙江通志陳同父著瘖叟自志一卷萬厯金華府志葉由庚著樞言五十篇萬厯溫州府志蔣行簡著字仲可永嘉人愚書嘉靖金華縣志唐仲友著本治論十卷成化杭州府志沈文通著曽子遺書又中説辨妄赤城新志戴良齊著俟命録宋濂吳思齊傳思齊編聖賢順正考終之事翼善書萬厯錢瑭縣志盧楨著經史補遺萬厯溫州府志蔣焱著經史旁聞十六卷𢎞治嘉興府志聞人宏著經史托微四卷宋史藝文志葛灃撰讀書手抄二卷台州府志黃宜著羣書就正六卷萬厯金華府志李大同著學苑精英三十卷寶慶會稽續志齊唐著崇儒編又斥佛編青田縣志林偉著時習編萬厯金華府志王萬著精覽歸一圖解二卷括蒼彚紀青田季致平著端本書忠報録自警録可可抄書各一卷龍遊徐泰亨著見黃溍徐君墓志董子雅言成化杭州府志元凌緯著管窺外編五卷隆慶平陽縣志史伯璿著孝全托言兩浙名賢録申屠澄著讀經史要略類編萬厯溫州府志曹理孫著字悅道瑞安人存養録十二卷政事書一卷天台張明卿著見宋濂務光先生墓碣潛書一卷嘉靖金華縣志葉儀著華川巵辭一卷焦氏經籍志王禕撰讀書記尤氏藝文志范祖幹撰讀書備忘一百卷括蒼彚紀包瑜撰自省録吾學編黃淮獄中作造化經綸圖一卷餘姚縣志趙謙著古今考議括蒼彚紀練魯著明學録又尊親録兩浙名賢録俞子良著留子九篇黃氏書目留睿著字若愚一字養愚括蒼人南臯子雜言二卷箐齋讀書録二卷黃氏書目周洪謨著古言二卷焦氏經籍志鄭曉撰省已録一卷上虞縣志顧諒著字希武務本録萬厯上虞縣志倪鎧著字右文尊心録十二卷奉化縣志宋佳著説苑要語分省人物考范理著理易又稽古正要成化四明郡志張楷著核充子嘉靖寧波府志魏稱著惜隂録十二卷萬厯湖州府志顧應祥著續西山讀書記吾學編謝鐸著中隱對衢州府志留清卿獻之著西安人讀書備忘萬厯嘉興府志顧蓂著海鹽人誦餘録又意求録兩浙名賢録徐袍著事言統辨萬厯上虞縣志葛臬著自警要語一卷百川書志明勾餘張琳著測蠡管見嘉靖寧波府志馮厚著愛正編嘉興府志沈𢎞光子懋著唐樞序而傳之正教編一卷百川書志永嘉王瓚著校集顔子二卷黃氏書目潘府輯上下八篇顔子彚編秀水縣志高陽著顔子始末又觀物圖台州府志陳紀著文中子裒粹黃氏書目柳文著字少明山隂人士林正鵠四卷黃氏書目徐應乾著字以清遂昌人雲山樵語分省人物考尹道遜著字克誠瑞安人樵問又太元論又憑几論萬厯會稽縣志沈𢎞道著蓮谷析言萬厯壽昌縣志洪鼐著困學托言崇禎衢州府志葉綰著不欺録嘉靖仁和縣志胡世寧著尊本録萬厯溫州府志劉清述測語四卷鹽邑志林錢琦著海沂子五卷求志篇一卷廉矩一卷竹下寤言一卷尤氏藝文志王文祿撰端本要略分省人物考金江著一得子萬厯上虞縣志陳王政著芻蕘子嘉禾徵獻録胡其久著篤終易覽兩浙名賢録駱象賢著自警新編萬厯錢瑭縣志陳善著醒心六集續處州府志何鏜著知非小鑑天啓平湖縣志陸萬垓著省心日記十卷嘉禾徵獻録陳揆著字子衆經史會通二十卷歸安縣志嚴有穀著經史質實海鹽文獻志吳宗佑著字守廉經史典奧二十四卷經史淵源蕭山縣志來斯行著讀書雜記二卷尤氏藝文志胡震亨撰讀書解五卷崇禎衢州府志葉秉敬著庸言録二十四卷錢塘姚際恆著右儒術通書發揮一卷金華正學編何基著通書解續文獻通考陳樵著通書述崇禎烏程縣志王汝源著西銘注成化新昌縣志俞浙著西銘解兩浙名賢録王夢龍著字慶翔新昌人西銘解萬厯錢塘縣志李元綱著西銘解萬厯溫州府志朱謐撰正蒙解黃巖縣志王啓著正蒙解萬厯壽昌縣志劉儓著字伯高正蒙述解續文獻通考朱謐撰正蒙集解鄞縣志余本著正蒙集解遂昌縣志包萬有著正蒙存疑括蒼彚紀陳中州著正蒙發微二卷金華先民傳章品著正蒙通旨崇禎衢州府志開化江樊著經世補遺金華先民傳宋朱中著皇極經世通解兩浙名賢録倪復著皇極經世書內篇注黃氏書目章品著皇極經世集解台州府志葉良珮著皇極經世書疏萬厯義烏縣志沈賔國著皇極經世觀物外篇釋義四卷聚樂堂藝文志余本撰皇極贊數續處州府志鄭補著遂昌人周子全書七卷張子全書十五卷邵子全書二十四卷二程全書六十八卷嘉興府志徐必達輯程門問答録萬厯溫州府志鮑若雨撰程子詳本二十卷檇李往哲續編陳龍正輯玉泉講學書録解題沙隨程迥可久記喻樗子才語無垢先生心傳録十二卷讀書附志張文忠公九成之説也甥于恕編橫浦日新録二卷讀書附志門人郎曅記録無垢先生之説無垢語録十四卷言行編遺文共一卷書録解題徐鹿卿德夫裒輯朱子語録四十三卷括蒼彚紀葉味道輯朱子語録萬厯溫州府志林武編字景文永嘉人朱子語録類要十八卷百川書志括蒼淡軒葉士龍雲叟編次朱子語略二十卷正德蘭溪縣志楊與立輯晦庵語録十卷赤城新志胡常著車若水序池州語録永嘉縣志包定著朱子指要十卷金華正學編王柏著朱文公語後録二十卷讀書附志東陽王佖記三按內閣書目有紫陽宗旨十八卷朱子傳疑𢎞治紹興府志元陳潛著廣雜學辨嚴陵志趙彥肅著朱子晚年定論一卷續文獻通考王守仁撰朱子大全私抄十二卷黃氏書目王宗沐輯朱子摘編兩浙名賢録張元忭著朱子經説語類檇李詩繫陳龍正輯近思録十四卷宋史藝文志朱熹吕祖謙編近思録補注台學源流戴亨著近思録發揮十四卷金華正學編何基著未校正近思録廣輯三卷栁貫著見宋濂栁先生行狀近思録精義趙順孫著見黃溍格齋先生阡表紫薇語録一卷宋史藝文志吕祖謙撰答按百川書志有東萊師友問一卷已易一卷慈湖遺書三卷書録解題楊簡撰記按百川書志簡又有家十卷記先訓一卷心書六卷嘉靖寧波府志舒滸著蒙齋先生番江集內閣書目宋鄞人袁甫講學語録日新録又師訓編嘉靖浙江通志輔廣著聖門事業圖一卷萬厯錢塘縣志李元綱撰周子伊洛精義二卷伊洛指南八卷研幾圖一卷雜志二卷金華正學編王柏著化按黃氏書目又有天地萬物造論一卷理髓三卷嚴陵志胡應璣著字粹翁淳安人語録尊鄉録詳節吳梅卿著朱子詩解又北溪字義辨正尊鄉録詳節戴亨著性理集義萬厯崇德縣志衛富益著性理要旨台學源流車若水著性理本旨孟夢恂輯見元史本傳上蔡師説赤城文獻録元楊琦著自省編黃氏書目許謙著日聞雜記黃氏書目許謙門人記道學發明括蒼彚紀松陽王文煥著聖賢道統圖萬厯溫州府志趙次誠撰聖賢大意又性理大明又答客問又石室新語又鹿皮子陳樵著見宋濂鹿皮子墓志草堂語録兩浙名賢録張輝著永嘉人性理會元二集四十六卷黃氏書目陳剛著字公潛溫州平陽人性理叢説明一統志慈溪傅淳著性理本原三卷上虞縣志朱右著性理發明十卷萬厯溫州府志卓敬撰性理指要內閣書目嘉禾高士明編性理集解崇禎衢州府志方豪著性理集解兩浙名賢録蔣經著性理要刪尤氏藝文志黃洪憲撰性理指歸二十八卷尤氏藝文志姚舜牧撰性理輯略續處州府志縉雲鄭文茂著性理翼天啓平湖縣志陸繡著明性理翼天啓平湖縣志陸基仁著性理輯三卷仁和縣志孫枝著性理明詮東陽縣新志盧洪春著性理明解縉雲縣志李鍵著理數啓鑰古括遺芳松陽毛仲時正著貞字補遺十卷古括遺芳松陽盧璣著圖學蒙談括蒼彚紀遂昌鄭還復正著又有理氣管見説理會編十二卷萬厯紹興府志季本著辨惑續編九卷黃氏書目顧諒著上虞人理學纂言金華先民傳朱廉著理學正義萬厯紹興府志魏驥著理學提綱萬厯金華府志方太古著理氣圖説萬厯溫州府志葉挺著心學圖説嘉靖金華縣志鄭謐著字彥淵從吾心説萬厯紹興府志丁徵著心事圖説又質疑稿東陽縣志盧堯俞著字惟欽克念圖説嘉禾徵獻録李萼著字剛甫定性書克復解萬厯金華府志鄭拯著庸言集萬厯溫州府志朱謐撰九沙草堂雜言分省人物考萬表著陽明傳習録四卷黃氏書目徐愛錢德洪輯傳習録節要一卷聚樂堂藝文志戴經撰傳習辨疑檇李往哲列傳陸垹著陽明傳習録選會稽縣志劉宗周輯陽明則言二卷黃氏書目門人薛侃等輯陽明先生要書八卷檇李詩繫陳龍正輯楓山語録二卷內閣書目章懋著龍溪語録八卷內閣書目王畿講學語卷按尤氏藝文志又有致知議略一良知議辨一卷龍溪會語摘録天啓平湖縣志陸基志著緒山語録一卷尤氏藝文志錢德洪撰道南録五卷象山白沙要語一卷主一辨一卷尤氏藝文志金賁亨著南山録甬上耆舊詩黃潤玉著録按丹鉛總録又有海涵萬象一卷伊洛遺音又四子擇言分省人物考謝鐸著慎獨録括蒼彚紀應檟著為仁録括蒼彚紀陶玻著素言一卷萬厯紹興府志潘府著荷亭辨論八卷聚樂堂藝文志盧格撰觀微子筆要六卷聚樂堂藝文志朱衮撰程朱書類嘉興府圖記沈珒著程張補注萬厯杭州府志王潼撰致良知説一卷尤氏藝文志顧應祥撰困學寡聞録十卷分省人物考楊守址著四聖糟粕十卷明名臣言行略孫燧著朱陸同源錢塘縣志許嶽著字子峻程學管窺鄞縣志范欣著聖功直指又蓮谷知新録萬厯壽昌縣志洪鼐著澧陽答問録天啓慈溪縣志馮成能著薛文清公讀書録抄釋崇禎衢州府志江山毛愷著筆思記嘉靖浙江通志沈槩著冥影契一卷續説郛董穀撰間道録萬厯上虞縣志俞繪著衛道録萬厯上虞縣志張文淵著稽道編萬厯龍遊縣志葉良相著字邦佐攖寧語録台州府志王宗沐著薛陳胡王四氏語録海鹽縣圖經鍾韶輯一庵語録二卷黃氏書目唐樞著卷按聚樂堂藝文志又有三一測一六咨言集一卷禮元剩語一卷五針解一卷崇禎衢州府志吾冔著洙泗言道録嘉靖浙江通志董遵著旦晝録萬厯崇德縣志沈枝著字貫卿道學源又伊蔚子萬厯崇德縣志沈校著字夏卿鴻志編六卷台州府志臨海杜洲亨著表章聖學四卷秀水縣志吳治著經正録又學術書內外篇萬厯湖州府志錢鎮著天全證道圖説一卷天啓平湖縣志陸光宅著聖學範圍圖説一卷黃氏書目嶽元聲著𢎞道録五十七卷仁