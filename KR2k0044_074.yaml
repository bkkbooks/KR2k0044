body:
  text: 浙江通志卷七十五蠲恤一周禮保息之政王者所以養民故鄉師以王命施惠而民鮮囏阨不獨散利薄征為荒政所有事也聖朝重熈累洽固已比戸可封乃猶勤求民瘼時沛恩膏凡所謂養老慈幼安富恤貧者悉著為盛典至偶侵之蠲租賜復浙民沾被尤為深渥已志蠲恤漢後漢書和帝本紀永元十四年四月振貸會稽流民下貧糓有差後漢書安帝本紀元初六年四月會稽大疫遣光禄大夫将太醫循行疾病賜棺木除田租口賦後漢書順帝本紀陽嘉二年二月詔以吴郡會稽饑荒貸人種糧三國吴三國呉志赤烏十三年八月故鄣水溢詔原逋責給貸種食晉晉書成帝本紀咸康二年七月會稽饑開倉振給晉書孝武帝本紀咸安二年三吴旱人多饑死詔所在振給寧康二年四月詔三吴會稽遭水之縣尤甚者全除一年租布其次聽除半年受振貸者即以賜之南北朝南史宋文帝本紀元嘉七年吴興水遣使巡行振恤十二年六月吴興水以米糓賜遭水人八月原除遭水郡諸逋負南史宋武帝本紀孝建二年八月三吴饑詔所在振貸大明元年五月吴興水人饑遣使開倉振恤七年浙江東諸郡旱遣使開倉振恤聽受雜物當租南史齊髙帝本紀建元元年九月詔以二吴義興三郡遭水減今年田租南史齊武帝本紀建元四年六月吴興遭水縣蠲降租調永明九年八月吴興水蠲租梁書髙祖本紀天監二年六月詔以東陽信安豐安三縣水遣使周履量蠲課調陳書髙祖本紀永定三年閏四月詔吴州縉州去歳蝗旱遣中書舍人江德藻銜命東陽與令長二千石問民疾苦仍以入臺倉見米分恤陳書髙宗本紀太建十二年十一月詔吴興等郡即年田税禄秩並各原半其丁租半申至来歳秋登唐唐書髙祖本紀武德七年四月給復揚越一年唐書代宗本紀廣德二年十一月免越州今歳田租之半給復温台明三州一年唐書憲宗本紀元和四年正月免浙東今歳税唐書穆宗本紀長慶三年浙東西旱遣使宣撫理繫囚察官吏唐書武宗本紀開成五年六月浙東蝗疫除其徭唐書宣宗本紀大中九年七月罷浙西冬至元日常貢以代下戸租税唐書僖宗本紀乾符三年五月免浙東西一歲税唐書昭宗本紀景福元年八月免浙西逋負宋宋史太宗本紀太平興國三年五月兩浙給復如漳泉按是年漳泉給復一年六年四月罷湖州織羅放女工七年十二月蠲兩浙諸州太平興國六年以前逋租雍熈二年九月蠲江浙諸州民逋租淳化元年二月除兩浙諸州漁禁四年二月江浙饑遣使巡撫五年七月除兩浙諸州民錢俶日逋負宋史眞宗本紀咸平二年三月江浙發廩振饑四月詔江浙饑民入城池漁採勿禁景德二年正月罷江浙増𣙜酤錢是歳夏兩浙饑遣使分振大中祥符四年七月除閩浙歳丁錢五年五月兩浙旱給占城稻種教民種之七年八月除兩浙被災民租天禧三年江浙饑振之四年二月遣使安撫江浙饑民五年十月蠲淮浙被災民租乾興元年正月蠲秀州水災民租二月蘇湖秀州民饑貸以廩粟宋史仁宗本紀明道元年三月除婺秀州丁身錢五月廢杭秀二州鹽塲景祐四年八月越州水賜被溺民家錢有差皇祐二年三月詔兩浙流民聽人収養三年八月遣使安撫兩浙饑民四年二月蠲湖州民所貸官米嘉祐六年七月詔江浙水災差官體量蠲税宋史英宗本紀治平元年杭州水遣使行視疏治振恤蠲其賦租宋史神宗本紀熈寧八年八月詔發運司體實兩浙米價州縣所存上供米減直予民斗錢勿過八十宋史哲宗本紀元祐六年七月振兩浙水災紹聖四年兩浙旱饑詔行荒政移粟振貸宋史徽宗本紀崇寧四年蘇湖秀三州水賜乏食者粟五年四月停免兩浙水災州郡夏税宣和三年四月擒方臘詔浙江被賊州縣給復三年七月振温處等八州宋史髙宗本紀建炎四年四月振明州被兵民家六月蠲紹興府三縣湖田米按二年五月廢餘姚上虞湖田為湖溉民田紹興元年正月蠲兩浙夏税二年十二月臨安府火振被火家五年十二月振浙東饑民六年正月振浙東饑民八年正月減臨安府夏税折輸錢二月減紹興府和市絹萬匹十三年七月蠲浙西貧民逋負丁鹽錢十四年二月蠲江浙諸路逋欠錢帛三月蠲江浙京湖積欠上供錢米六月蠲江浙州縣酒税坊塲綱運倉庫積年逋負振江浙被水民十五年七月免處州三縣民家綢絹十七年九月減江浙諸州折帛錢十八年十一月振紹興府饑十二月振明越秀婺諸州民借給被災農民春耕費蠲被災下戸積欠租税二十一年三月蠲江浙等路中戸以下積年逋負二十三年七月寛理湖秀二州被水民夏税二十八年九月蠲紹興湖州被水民逋賦二十九年二月振湖秀諸州饑民三月除湖州紹興流民公私逋負閏六月罷江浙沙田蘆塲所増租課九月蠲江浙蝗潦州縣租三十一年正月免湖州増丁所輸絹八月蠲江浙等路上供米宋史孝宗本紀隆興元年兩浙水旱蝗悉蠲其租二年二月蠲秀州貧民逋租乾道元年正月詔兩浙振流民二年二月振兩浙饑九月遣官按視温州水災振貧民四年十二月減兩浙明年夏税和市之半五年四月振恤衢婺州流民十月振温台二州被水貧民淳熈元年十月再蠲臨安府民身丁錢三年三年紹興府台婺州水並振之五年六月蠲秀州民折帛錢六年十月除紹興府民逋賦十二月蠲臨安府征税一年七年三月再蠲臨安府民身丁錢四月除明州積欠諸司錢八年七月紹興水出秀婺州米振糶嚴州水詔被災之家蠲其和買三等以上戸減半八月詔紹興府諸縣夏税和市折帛身丁錢絹之𩔖不以名色截日並令住催十一月蠲富陽新城錢塘夏税己亥振臨安府及嚴州饑民庚子再詔臨安府為粥食饑民九年正月詔江浙旱傷州縣貸民稻種計度不足者貸以樁積錢三月遣使按視江浙振濟六月給臨安府貧民棺瘞錢八月詔紹興民戸去歳已納夏税應減者三十萬緡理為今年之數十年四月再蠲臨安府民丁身錢三年十一年五月蠲崇德等十六縣民淳熈十年欠税十二年九月詔恤湖州台州被水之家十三年十二月振臨安府城内外貧乏老疾之民十四年七月減秀州經總制糴本錢半年除紹興新科下戸今年和市布帛宋史光宗本紀淳熈十六年閏五月蠲臨安第五等戸和買絹一年仍出錢二十三萬緡振臨安貧民八月減兩浙月椿等錢歳二十五萬五千緡九月減紹興和買絹歳額十一月減江浙月樁錢額紹熈元年正月再蠲臨安府民身丁錢三年二年二月振京城貧民三年正月蠲秀州上供米四月蠲臨安民元年二年逋賦四年正月蠲臨安府民身丁錢三年六月振江浙被水貧民蠲臨安増民税錢八月丙申蠲紹興丁鹽茶租錢戊午振浙西旱傷貧民十二月振江浙流民五年五月寛紹興民租税宋史寧宗本紀紹熈五年十月減兩浙路和市折帛錢蠲丁鹽丁身錢一年是歳兩浙水旱振之仍蠲其賦慶元元年正月乙巳蠲台嚴湖三州貧民身丁折帛錢一年詔兩浙収養遺棄小兒辛亥以乆雨振給臨安貧民四月臨安疫出内帑錢為貧民醫藥棺斂費及賜諸軍疫死者家九月壬午蠲臨安府水災貧民賦己酉蠲台嚴湖三州被災民丁絹二年二月再蠲臨安府民身丁錢三年三年十二月蠲紹興府貧民明年身丁折帛綿絹四年正月詔有司寛恤兩浙流民四月蠲臨安紹興二府租税有差十二月再蠲臨安府民身丁錢三年五年五月以乆雨民多疫命臨安府振恤之是歳嚴衢台水振之六年嚴衢婺水振之嘉泰元年三月戊寅臨安大火四月辛巳詔有司振恤甲申内降錢十六萬緡米六萬五千餘石振被災死亡之家七月復振被火貧民十二月復免臨安府民身丁錢是歳浙西旱振之仍蠲其賦四年二月蠲臨安府逋負酒税三月丁夘臨安火庚午命臨安府振焚室七月蠲兩浙闕雨州縣逋租十二月再蠲臨安府民身丁錢三年開禧元年正月蠲臨安府逋負酒税八月蠲兩浙闕雨州縣贓賞錢十二月詔永除兩浙身丁錢絹是歳江浙諸州旱振之二年正月蠲兩浙路身丁綢綿嘉定元年二月詔臨安府振給流民閏四月蠲兩浙闕雨州縣貧民逋賦二年三月庚申命浙西及沿江諸州給流民病者藥壬戍出内庫錢為臨安貧民棺槥費六月命浙西諸州諭民種麻豆毋督其租命江西福建二廣豐稔諸州糴運以給臨安仍償其費三年四月戊辰出内庫二十三萬緡賜臨安軍民己巳詔臨安府給細民病死者棺櫬是歳臨安紹興二府嚴衢二州水振之仍蠲其賦四年三月臨安府振給病民死者賜棺錢六年兩浙諸州水振之七年六月蠲兩浙路諸州贓賞錢十月出内帑錢振臨安府貧民命浙東監司發常平米振災傷州縣八年三月以旱蠲臨安府茶鹽賞錢五月發米振糶臨安府貧民六月詔兩浙路諭民種雜粟麥麻豆有司毋収其賦田主毋責其租七月蠲臨安紹興二府貧民夏税九年六月振恤浙西被水州縣寛其租税九月詔兩浙監司覈州縣被水最甚者蠲其租十年十一月詔浙東提舉司發米十萬石振給貧民十一年六月詔湖州振恤被水貧民十四年浙東旱振之十五年十二月發米振給臨安府貧民十七年二月癸巳蠲台州逋賦甲午命臨安府振糶貧民閏八月申嚴兩浙諸州輸苖過取之禁宋史理宗本紀嘉定十七年十二月雪寒免京城官私房賃地門税等錢自是祥慶災異寒暑皆免寳慶元年二月發廩振在京細民四月振在京細民二年十二月發廩振贍在京細民紹定二年十月詔台州水災除民田租及茶鹽酒酤諸雜税三年十二月振贍在京細民淳祐四年九月臺臣言嚴州及紹興蕭山等縣征商煩苛詔罷之九年正月給官田五百畝命臨安府創慈幼局収養道路遺棄初生嬰兒仍置藥局療貧民疾病十年九月以嚴州水復民田租十二年六月嚴衢婺台處水遣使分行振恤存問除今年田租八月詔以緡錢四十萬振恤在京軍民寳祐元年七月温台處水詔發豐儲倉米并各州義廩振之十月詔出緡錢二百萬振恤京城軍民二年六月罷臨安府臨平鎮税塲九月詔山隂蕭山諸暨會稽四縣水其除今年田租開慶元年二月發平糶倉米減直振在京民五月婺州水發義倉米振之十月詔給還浙西提舉常平司歳収上亭戸沙地租二百萬永勿復徴景定三年二月臨安安吉嘉興屬邑水民溺死者衆詔守臣給槥瘞之閏九月詔紹興府火給貸居民錢今後二載民貧可憫悉除勿徴宋史度宗本紀咸淳元年正月詔臨安免征商四月丁未免徴臨安官私房僦地錢戊申再免在京征商三月發米贍京城民閏五月乙巳乆雨京城減直糶米自是米價髙即發廩平糶以為常丁未發錢贍在京小民丁巳以錢三十萬命臨安府通變平物價二年六月以衢州饑命守令勸分諸藩邸發廩助之六年十月詔台州發義倉豐儲倉米振遭水家閏十月安吉州水免公田租十一月嘉興縣水免田租七年正月諸暨縣湖田水免租五月發米詣衢州振糶六月丙申發米振諸暨縣遭水家戊午紹興府饑振糧萬石八年八月紹興府六邑水災發米振遭水家十月己亥紹興府五縣水詔減田租有差庚戌以秋雨水溢詔減錢塘仁和兩縣民租什二㑹稽湖田租什三諸暨湖田租盡除之元元史世祖本紀至元十三年二月詔諭臨安新附府州司縣官吏凡公私逋欠不得徴理所在山林河泊除巨木花果外餘物權免徴税十二月詔浙東西府州軍縣官吏凡故宋繁冗科差聖節上供經總制錢等百有餘件悉除免之十八年二月浙東饑發粟賑之二十四年十二月免浙西魚課聽民自漁是歳浙西諸路水免今年田租十之二二十五年正月以杭州連歳水賑其尤貧者四月尚書省臣言杭湖秀復大水請輟上供米審其貧者賑之