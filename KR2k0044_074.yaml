糧史槩正統六年二月發官廩三十五萬杭州平糴九年五月免浙江被災糧十四萬六千餘石明實録正統十年七月紹興寧波台州疫蠲死者所負租稅八月蠲嘉湖等府水災田糧十一年五月免台州府去年災傷田糧史槩正統十一年六月免湖州嘉興台州糧十一萬餘石明實録正統十二年三月免杭州湖州嘉興去歳被災稅糧史槩正統十三年四月免浙江江西秋糧六十萬五千餘石明實録景泰元年六月免處州温州金華三府戸口食鹽鈔三年四月免金華處州二府無徴稅糧吾學編景泰三年十一月蠲浙江徭稅明實録景泰四年七月蠲杭州台州寧波諸府去年被災稅糧杭州府志景泰五年六月杭州府奉詔免去年稅糧明實録天順元年四月免杭州等十府屬縣去年無徴糧史槩天順四年免江南浙江糧三十三萬餘石明實録天順五年六月免杭湖寧波嘉興四府去年被災田糧吾學編天順五年九月杭嘉濱海諸縣潮大至賑恤之明實録成化六年四月以水災免烏程歸安長興德清武康仁和六縣稅糧七年八月嘉湖杭紹四府水蠲租賑濟貸以牛種嘉靖浙江通志成化九年八月浙江廵撫劉敷奏奉化山隂蕭山上虞餘姚諸暨臨海七縣被水田畝稅糧所宜蠲免從之明實録成化十年六月以湖州府六縣水災免成化九年秋糧十一月免杭州衛嚴湖二所屯田子粒嘉善縣秋糧以水旱故十三年正月以水免紹興寧波台州杭州四府成化十二年秋糧史槩成化十四年三月杭州等府免糧三十三萬餘石十七年正月免浙西糧二十四萬六千有竒明實録成化十八年九月詔浙江所屬災傷府縣衛所并鹽運司去年秋糧子粒草鹽課量免十分之六二十三年四月以旱免台州等三府所屬二十一縣并台温二衛秋糧按史槩免温台二府糧十六萬五千餘石明實録𢎞治四年十一月以水免嘉湖杭三府屬并杭州二衛湖州所夏稅秋糧有差五年二月以水災免嘉湖等府衛糧草子粒有差其非全災者停徴史槩𢎞治五年七月浙江水命侍郎呉原廵視賑濟八月兩浙災僉都張文昭廵視賑濟九年六月量免山隂蕭山二縣大雨被災人戸徭役給米有差明實録𢎞治十二年以旱免浙江太平縣秋糧史槩𢎞治十六年九月寧波府旱饑遣都御史王璟廵視賑濟明實録𢎞治十七年二月免杭州等五府及寧波衛𢎞治十六年糧子粒有差史槩𢎞治十七年閏四月蠲浙江夏税明實録正德五年三月以水旱免浙江正德三年逋稅十月減湖州嘉興寧波三府夏稅麥及絲綿有差六年十二月以旱免長興􅌘天台蘭谿象山等縣暨昌國衛稅糧有差七年十月以水旱免紹興寧波嘉興金華嚴台温等府所屬縣税糧仍命海潮渰溺地方鎮廵等官區畫賑濟八年十月免開化常山江山西安龍游遂安六縣下戸税以地方被賊及旱災故也十一月免寧波府五縣衢州府四縣及衢州所秋糧十年十一月以水災免杭州府八縣湖州府六縣台州府寧海縣夏稅有差十三年十一月以災免杭嘉湖州縣夏稅有差續文獻通考嘉靖元年蠲浙江舊逋仍免元年田租之半史槩嘉靖元年十二月湖州水災再折糧六萬石發鹽課五千兩賑之三年正月災傷免嘉湖二府糧税明實録嘉靖四年十月免紹興湖州二府存留糧有差五年十月以旱免杭州嘉興湖州紹興金華衢州寧波台州嚴州稅糧有差七年正月免寧波府稅糧有差史槩嘉靖七年九月浙西災折糧加賑明實録嘉靖八年十一月以杭州等府水災免存留稅糧有差仍令賑濟史槩嘉靖十年災免浙直糧稅明實録嘉靖十二年正月以旱免杭紹温處四府田糧有差十八年閏七月以水免杭嚴紹金衢處等府所屬縣稅糧有差二十年九月以災免台州府六縣稅糧如例二十二年八月以水免湖州府稅糧有差二十三年九月免杭嘉湖紹金衢台嚴等府稅糧有差史槩嘉靖二十八年九月嘉湖二府水災免秋糧加賑三十二年十月災傷免浙東秋糧海鹽平湖准折兌仍賑之三十三年七月兵荒量免浙直田糧三十六年十二月浙東水災免税明實録嘉靖三十八年十月免杭嘉湖金等府糧稅有差明實録隆慶二年十月以金衢嚴處四府旱停免稅糧有差十一月以水災免台州府税糧有差續文獻通考隆慶三年以水災免浙江臨海天台黄巖仙居太平寧海上虞餘姚諸暨蕭山􅌘縣山隂㑹稽鄞慈谿奉化定海象山麗水青田龍泉縉雲松陽遂昌雲和等縣存留錢糧紹興府南京倉糧俱改折六錢四年十一月以水災詔免浙江湖州府武康歸安烏程秋糧有差起兌漕糧暫派成熟鄰邑代運仍發倉米賑之明實録隆慶六年十月以台州府水免今年秋糧之半明實録萬厯十三年五月詔改折浙江漕糧十之三并免行糧十五年九月浙江民屯錢糧停免改折十七年六月賑浙江饑二十三年十月以湖州府歸烏長德四縣被災准折漕糧之半二十四年十月杭嘉湖三府水照被災分數全半改折有差續文獻通考萬厯二十六年九月浙江水災戸部覆廵按方元彦廵撫劉元霖奏准除天台仙居黄巖太平各被災三分不准免外将被災十分海寧臨安遂安桐鄉嘉善崇德六縣准免七分被災九分安吉州仁和錢塘富陽新城鄞縣慈谿奉化定海武義湯溪十縣准免六分被災八分餘杭於潛昌化秀水海鹽平湖歸安烏程象山金華蘭谿東陽建德淳安桐廬分水十六縣准免五分被災七分長興德清武康孝豐義烏永康浦江七縣准免四分被災六分嘉興壽昌常山三縣准免三分被災五分龍㳺江山臨海三縣准免二分被災四分寧海西安開化三縣准免一分俱於本年存留糧内照數豁免其免過銀數仍令各府州縣議處無礙官銀抵補其嚴衢二所屯糧照災重例每石折銀三錢二十一年以前八府未完米折鹽鈔等銀悉准蠲免明實録萬厯二十六年九月賑浙西災民三十七年正月以浙西災准海寧餘杭臨安漕糧改折給賑浙西浙江通志卷七十五
