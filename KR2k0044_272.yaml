李孝光越角鑑湖三百曲雨餘曲曲添新緑八月九月風已髙詩人夜借漁船宿漁翁城中沽酒來筐底白魚白勝玉當時賀老狂復狂乞得鑑湖此生足龍湫行送軒宗冕歸山元李孝光大龍湫小龍湫青天倒㵼銀河流海風吹練白杲杲雪花滿面寒颼颼維那大士濯足處碧波下見長黃虯山僧洗鉢白雲動澗猿飲子蒼巖幽神蹤隱見不可測幻境變化誰能求道人此地昔追逰泠然一錫辭神州天香飄飄滿衣袖散作雨露東南陬老夫送别歌龍湫芙蓉花開溪水頭永嘉妙語猶可續永夜松聲消客愁思君何處寄清夢三十六峯明月秋趙李倪三居士建凌霄會元釋行端雙徑在吳浙實為山之雄天目如屏擁其北錢塘如練紆其東重巒疊巘不知幾千萬但見五峯秀色崷崒摩青空下有跋陀神龍窟上有都史夜摩宮晴雲暖靄生巖松朝開暮合無終窮祖師據此鞭麟鳳森羅萬象明真宗納須彌於芥子卷法界兮針鋒本源自性有常分寧須妙用求神通儼如鹿園與鷲嶺紫金光聚人天中説法至今猶未散天華似雨飄空濛宛委山元韓性秦山幾千仞翠入蓬萊城城中望山色明暗分隂晴老夫散䇿山前路為愛看雲不歸去仰看驚怪鷺飛來回頭忽見雲生處崦中孤起如炊煙乘風騰上蒼崕顛崕顛宿雲喜迎接橫空一幅兜羅綿天風吹散銀千縷淡處是煙濃是雨雲師拗怒不肯回露出峰頭尺來許一雨三日溪水肥老夫欲歸不成歸雲師知我慘不樂故出小譎相娛嬉老夫作詩一笑領舉袖收雲散空迥倚松絶呌上下人仰看雲峰起山頂靈山元潘伯修玉環諸山靈山深環以大海根太隂空青水碧淡相映散為風露來蕭森嗟豫賦命落台雁調笑魚鳥成滯淫南遊華蓋動連月勝地在近徒歆歆風帆徑渡不再宿綬裹長劒擕青琴種玉瓊田中吹笙玉山岑吾將於兹養年命岐路四斷誰能尋蘭亭元王冕東晉風流安在哉煙嵐漠漠山崔嵬衰蘭無苗土花盛長松落雪孤猿哀滿地紅陽似無主春風不獨黃鸝語當時諸子巳寂寥真本蘭亭在何許欹簷老樹緣女蘿崩崖斷壁青相磨舊時觴詠行樂地今朝魚鼓瞿曇家荒林晝靜響啄木流水潺潺繞山曲遊人不來芳草多習習餘風度空谷去年載酒誦古詩今年拄杖讀古碑年年慷慨入清夢何事俯仰成傷悲故人不見天地老千古溪山為誰好空亭回首獨凄涼山月無痕修竹少送盧思敏歸天台元貢性之天台山髙四萬八千丈神仙之徒往往窟宅乎其間我嘗探竒恣元覽直上絶壁窮躋攀松風流水聲瑟瑟桃花玉洞春漫漫曽逢兩仙人對奕猶未殘白髮長被耳千二百嵗如童顔手擕緑玉杖劒佩黃金環見我拂衣起念我行路難問我何從來延我啓重關授我長生訣餌我金霞丹餐松齧柏飲沆瀣伐毛洗髓滌肺肝吁嗟凡骨不易脫失身又復歸塵寰始知神仙有術終不可以遽學使我夢寐至今夜夜空與相往還盧郎天台人縳屋天台下年少事逺遊仗劒歷中夏才華擅文藻富貴若土苴曵裾恥王門望雲念親舍浩然欲歸養即日具鞍馬上堂奉旨甘載拜獻杯斚適此舞綵歡勝彼途路者父母見子歸喜氣揚雙眉親戚饋壺漿鄰里將豚雞慰藉逺歸人老幼咸熙熙但諳風俗淳不識亂與離因君重念山中好歸來已覺輸君早汨沒塵埃徒我慚憔悴形容漸枯稿今君往矣誠難留殷勤為謝羣仙道明年二月春正繁期爾山中拾瑶草鴈蕩吟元陳德永鴈之蕩兮乃在甌越之野瀛海之堧有萬菡苕鑱青天東南形勝此其最我嘗著屐周覽於其間厥初宰物孕雄怪元氣混沌何由穿巨靈運斤鑿鬼竅列缺吐火施神鞭遂令後爾萬萬古見此錯愕難為言上疑日車解轡傾側過下恐地軸撓動相鈎牽昨夢尋君拂煙去有擁芝蓋導我前崩崖旁豁瞰空洞回溪不定行蜿蜒狂雷砰訇起何處白龍噴薄飛層巔熊蹲豹擲若怒若啼霞明霧擁倐閃倐開重重掩掩變幻不可以極兮我方矯首倪立乎雲梯南望海水不滿杯灣環下繞山足來仰攀玉女駕笑踏飛鸞低羣仙集倒影雜佩中徘徊聳身直上浩無際海月正挂吹簫臺於焉得深悟扶桑警天雞蘧蘧驚覺在枕席但聞落葉如雨風凄凄君來謝我欲西邁惜此不及窮扶擕我知君身有靈氣世上塵土胡能迷推仁澤物本我事成功斂退真竒哉碧桃花發俟君到勿使引領雙眉摧青蘿山房歌贈宋景濓明劉基若有人兮乃在大江之南浙河之東連山特拔瀛海上上與河鼓天津通憶昔四女下天來遺鬟墮髢根龎鴻仙華傑出最怪異望之如雲浮太空嶔崟峛崺不可上薈蔚雜樹昏朣朧虎龍咆號猿鶴呌山鬼呵歘生悲風嗟哉若人兮何為乎其中梁檀楠兮柱桂楓結青蘿兮以帡幪不翦不伐兮不盬以攻晨嵐暮靄滴晴雨煙條霧葉相蒙籠縿縿兮纚纚菶菶兮蓬蓬繚糾要結兮若蒼龍垂胡降元穹棽麗披離兮若翠鸞振迅飛氋氃鸝黃和鳴桑扈應髣佛牙曠之絲桐幽泉發竇鏘玲瓏六月赤日收藴隆陽凌隂蓄春融融巖花澗草紛白紅有時黃初平清夜騎羊朝帝宫瓊㽔羽蓋氷玉珮華月閃爍光成虹松吹笙兮竹舞翿影斾斾兮聲渢渢娛口悅目兮樂不可言世間塵土何夢夢山有芝隰有蘴石鑿鑿兮水漴漴猗若人兮美且充飢食倦息兮可以保我躬逍遙兮棲遲何必訪廣成於崆洞潛溪歌為宋景濓賦明劉基金華山水天下希潛溪龍門尤絶竒羣峰峻極河漢上一峯獨立芙蓉陂先生結廬在其下文追班揚兼賈馬遂令此山增壯觀野有朴􅈪皆梧檟上清道士來方壺乘興為作潛溪圖丹崕翠麓神仙居東望日出樹如蘇溪流穿林還度谷十里一逵五里伏龍湫吐景生白虹藤蘿振雨松呼風却憶往時清夜月帝女乘雲下天闕鐘鏞鏗鍧簫鼓發霓裳羽衣飄滅沒初平騎羊前啓行長髯鬖髿飛玉霜秦娥吹笙元鶴舞牽牛河鼓凝寒芒相思迢迢頻入夢夢駕兩鸞從一鳳覺來毛髮猶爽淅目送征鴻度空碧山有蔬水有魚幽澗有泉清可㪺何時上疏乞骸骨寄聲先遣雙飛鳬題界畫臥龍山樓閣圖明劉基巍巍乎大海之西浙河之東是曰會稽夏后所封吞雲吐雨隔躔次闔闢光景調春冬地平天成五千載職貢長與中華通洞天石室神仙宫香爐紫氣騰芙蓉禹穴窈窕潛蛟龍玉書金簡今無蹤但見蒼翠松柏暗曖閉白日猿狖呌嘯生悲風臥龍何蜿蜒向前離立如孩童上有朱甍碧瓦縹眇浮元穹流星穿窗月挂户下視水木光玲瓏多年不見嘗膽處野花自落莓苔中緑蘋香飄楊栁濃漁舟一葉波溶溶黃冠賀老已寂寞淡煙細兩空青楓雁山狂客意匠工能以翰墨偷天功對此使我心神融便欲築室依巃嵸短衣瘦䇿尋葛洪咽服石髓餐晴虹翩然逺逐浮邱公不須懷古意慘戚伯夷綺里俱蒿蓬為詹同文題浙江月夜觀潮圖明劉基君不見四時平分成嵗功以秋繼夏獨不同炎官挾長握天柄七月赤日熺元穹蓐收抱鉞蹲白水野氣赫赫攄頳虹陽侯喘汗河伯暍少昊上訴愁天公會須萬物長養遂期以仲月虛宵中此夜姮娥魄正滿命駕四蟾驂兩駥指揮禺強出元渚蕩滌歊熇清霾蒙河漢發源牛斗下曲江上與天津通初看一髮起溟徼如曵組練來於東漸聞殷轔鼉鼓發倐忽萬雷聲撼風天吳掉尾出溟涬馬銜揚鬐招海童霓旌縞帳鷺羽幬瑶臺十二浮空濛蘂珠仙人乘玉輅騰駕鶴鵠飛氋氃長庚歘霍掞光耀電母扶龍嘷戞銅宓妃起舞素女從瓊珮綷䌨雲帡幪冰綃霧縠紛颯纚霜旗雪幡髙翳空鯨魚呀呷鮫鰐遁蒲牢哮吼馮夷宫瞿塘巫峽起平地灔澦若象鏖回潨先驅已過赤亭嶂後從始發龕山谼商聲爽淅合羣籟澤國凛溧寒欲凍先生玩月坐樓上夜氣澄寂神和沖憑欄快覩煩暑退呼兒命酒澆喉嚨自舞自歌歌自作月照白髮三千總歌聲迤揚林壑應竹樹戞擊絲與桐淵魚躍波棲鳥作紫桂繞屋清香融君歌曲終響未終我歌激烈留征鴻瞪眸相視俱老矣況有衆病來交攻聖明天子御宇宙威惠與天相比隆首丘倘許謝鞿絆猶有古月光朣朧行當唱和三百首永與潮汐流無窮蛟門春曉圖歌並序明宋濓勾章王君景行嗜學好修之士子也其所居曰蛟門正臨大海巨濤舂撞頃刻萬變平旦東望霞光燭天紅日大如篩冉冉上升誠海東第一偉觀髙士王叔明作蛟門春曉圖景行出以示豫使人飄飄然有凌三山跨十洲之意為賦長歌一篇其辭曰瀛海無垠波濤吐吞涵浴日月參契鬼神怪石如雲自天墜萬丈壁立蛟為門南有金雞之俯啄北有猛虎之雄蹲值獰飈兮奮揚束怒濤兮騰奔擲玉毬兮干霄灑輕霧兮飛塵雪山氷崕之可怖可愕兮帆檣簸蕩不可遏恍疑上下於星辰晨雞一鳴海色白層霞絢彩光如璊縱橫閃鑠縳不定海神推上黃金盆靈境飄搖在世外髣佛直至扶桑村何人結屋於其間云是甬東才子開瓊關吹簫雙鶴下坐聆環珮聲珊珊有時共談三十六洞之祕笈緑文赤字可以鐫蒼頑猿拾花兮春岸魚泳晝兮晴灣日媚嫣紅桃點點風入涼翠松翻翻胸襟濯盡萬斛之黃埃兮不知聲利是何物便思紫府躋真班黃鶴仙人列仙儒九霞為冠青綃裾手提五色珊瑚株幻出一幅真形圖令人毛骨動颯爽思乘浩氣超清都中有十二樓往來盡是瓊姬儔金符玉莭錦臂韝白台度曲彈箜篌雙成按拍歌莫愁我愁正孤絶我興欲飛越矯首東南望神光應迅發蓬壺春殘瑶草殷麟洲芝生翠環結我愛仙人萼緑華面如蓮花雙鬢鴉幾年相期飯胡麻至今不來雲路遐何須龍虎鼎中求丹砂何須天河穩泛牛斗槎但今坎離交媾翻三車氣母不動生黃芽我賦蛟門歌細看銅狄時摩挲長繩孰為羈羲娥白石應泐金還磨不學長生將奈何不學長生將奈何夢遊秦望山歌送客歸越明貝瓊秦望何崔嵬削如青蓮開下臨七十二湖之浩蕩上接三十六洞之縈回夢中夜度浙江水輕如鶴背乘風來欲求軒轅上天處白雲尚鎖燒丹臺徒知有弱水安可覩蓬萊但聞松聲萬壑兮夾飛湍之喧豗赤日慘淡而無色復殷殷之雄雷踰干盤兮歷百折香爐玉笥左右列山中二女問何遲桃花落盡燕支雪金雞三呌失所在惟想參差白銀之觀闕龍綃寄别淚三載猶未滅有美一人兮佩珊珊昨遊吳門復東還吾願從而上下兮呌安期於雲間回首隔千里可望不可攀雪蓬小朵歌送奎方舟還靈鷲明貝瓊蓬婆雪嶺髙崔嵬橫絶青天飛鳥回山中小朵更竒峭石作蓮花千葉開巨靈擘山斷山脈一峯夜向東南擲千秋乾竺空有名萬里峨嵋盡無色攢青疊翠分西湖洞口白猿猶可呼咸和之年有慧理卓錫尚愛飛來孤木林髙僧兩眉雪身如池水青蓮潔翻經石上不知年桂子年年落秋月鳳凰山歌明貝瓊大城周回三百雉紫薇閣對吳山起天目飛來為鳳凰蒼然不過錢塘水玉輦金輿北去賖行人折盡上陽花杜鵑夜呌葛洪井燕子春歸蘇小家燕歸不識更新主王氣凄涼作風雨城南楊栁鬱金黃一束纎腰為誰舞青蘿山房歌並序明貝瓊青蘿山在仙華之東仙華為黃帝少女升天處其山峭𥪡千仞而支别為青蘿翰林學士宋公景濓讀書其下名其所曰青蘿山房絶嶺雲煙長溪魚鳥皆接於耳目之間公雖去此而眷眷不忘間屬豫賦豫聞適意山林者抗公侯而爭名朝市者譏處士皆得此而失彼惟公不然昔之藏也非必於山林安其時也今之仕也非必於市朝行其道也在青蘿不為損視草北門不為加隱顯一機喧寂同趣孰得而窺其際耶公擅一代之文章多行於世而貯於山房者必有光氣燭天與山之寶玉同不泯矣遂為之歌曰仙華之山何嶄絶插天萬仞青相磨山勢東來忽平地蜿蜒不斷為青蘿青蘿隱隱如崩石夸娥負山山為拆欲呌軒轅向何處千古萬古空遺迹玉女得道登雲車凌空直上太清家雲車不復返落盡金莖花風凄凄兮欲下雨行人慘兮子規語山回路盡或逢花知是青蘿山人結茅宇山人紫府神仙客今年六十頭尚黑胸蟠五色天女絲手煉五色神媧石絲可為君成天章石可為君補天隙一朝置之白玉堂青蘿寂寞頓無光何年借我白石牀臥看明月來東方與君酌酒歌我曲君歸早訪初平羊送迮士林歸天台明貝瓊赤城雲氣神仙家千樹萬樹蟠桃花十二樓臺起苑外石門水長通胡麻當時劉郎亦草草出山始憶山中好莫信丹邱日月長玉人已共桃花老山空水流雲自飛劉郎看花須早歸贈金華隱者明髙啓我聞名山洞府三十六一一靈迹紀真籙金華秀出向東南逺勝陽明與句曲樓臺縹眇開煙霞天帝賜與神仙家靈源有路不可入但見幾片流出雲中花子房之師赤松子三千年前亦居此飛行恍惚誰解尋漫説至今猶不死松花酒熟何處遊瑶草自緑春巖幽羣羊臥地散如石老鹿耕田馴似牛聞有隱君子乃是學仙者自從入山中不曽到山下世人莫知其姓名以山呼之不敢輕樵夫忽見苦未識識疑便是黃初平嗟我胡為在塵網逺望髙峯若天壤茯苓夜煮倘許餐鐵杖來敲石門響湖州樂明孫蕡湖州溪水穿城郭傍水人家起樓閣春風垂栁緑軒窗細雨飛花濕簾幕四月五月南風來當門處處芰荷開吳姬畫舫小於斛蕩漿出城沿月回菰蒲浪深迷白紵有時隔花聞笑語鯉魚風起燕飛斜菱歌聲入鴛鴦渚送鍾欽禮還會稽明王鏊會稽山人其姓鍾丹青之外詩仍工若耶溪上弄雲水誰將姓字徹九重文華殿前見天子受釐三日居齋宫東廂落筆風雨疾指盼屢得回重瞳重瞳一一分甲乙御茟親書為第一峯巒慘淡李營邱煙雲滅沒王摩詰西湖歌寄方思道明皇甫涍西湖窈窕三十里栁絲含煙拂湖水春山蕩漾春風來蘇公堤邉花正開玉缸春酒映江碧幾醉江花栁花白城頭日出照髙樓銀筝翠管喧行舟吳姝如花捲綃幕山水倒入金屏流朝來復脫千金駿還有牀頭紫綺裘人生行樂莫顧惜落日松風吹古丘我憶京華舊逰地漁浦東看動愁思醉裏空歌鏡湖月夢中尚識孤山寺信安使君還舊溪應對花巵惜解擕白沙翠竹無人問湖上孤吟聞馬嘶自錢塘由富春桐江抵七里灘明王叔承鳴榔曉發錢塘江波開緑酒浮春缸江風吹帆三百里春山片片隨船窗山頭挂天根插水兩岸隂森那可已遊郎如望綵雲來人家盡住瑶屏裏三江煙樹嗟空濶誰道瀧中更竒絶陡巖嵐翠寒撲肌拂手藤花灑香雪荆扉女兒揚茜裙映栁窺人半明滅山村酒價不用錢笑減春粳沾竹葉風波相遇皆行邁死生肯付乾坤外采芝昨上桐君廬占星又宿嚴陵瀨西湖舟中明李奎春半出門春可憐黃鸝隔岸啼春煙壚頭沽酒飲不醉更向西湖呼酒船葡萄荔枝酒色紅銀缸金碗須臾空但令一醉臥明月莫使醒來看春風鳯凰山頭春草緑金牛湖上花成簇日落歌聲水面來畫欄笑倚人如玉南明篇為翰撰諸君明徐渭天姥迢迢入太清更分一壁作南明為龍學鳯看俱是削障裁屏望即成别有雙峽中天起青雲不度髙無比嵗嵗開花似畫中年年度月如窗裏含竒吐秀無窮極出雲入雨誰能得疊岫許可作蓮花逺峯翻借蛾眉色里中詞客本神仙去住山中年復年耽逰李白時飛夢乘興王猷每泛船有時引翠來窗牖無日將青去几筵文章本許江山助藻翰元抽草木妍一自山南走燕北露雨文深元豹隔對䇿時成一萬言傳臚竟壓三千客昨日新從杏苑行今朝已得侍承明詞臣舊自推枚乘史筆今來讓長卿賤子逰燕何草草相逢下馬長安道未出家園兩字書却問山靈比前好我欲歸君尚寓君如有字寄山靈為君寄向山靈去蕺南篇為時君明徐渭西施初浣清江水越王愁絶吳王喜一自龍輿返越臺一心欲報行成恥越山髙髙蕺草長越王自採充飢腸至今行人指山路猶識君王采蕺處時君卜居水一涯扉臨戶敞浮光華青山不改當年色蕺草時抽舊日芽更有山池傍山側右軍汲洗毫端墨君今學書逼右軍洗毫亦向池中汲年來束帶復垂纓去越之燕住玉京也應遙憶山南蕺春去秋來長幾莖四月晦日泛若耶至雲門寺以起坐魚鳥間動搖山水影為韻十首選五明陶承學兩崖十里蒼筤根中藏一溪雲月髓嫩粉生香笋出林老枝壓地花成米溪上老翁撑竹船摘米炊枯弄清泚月下何人見往來惟有山猿同坐起結葉垂花老榿樹四山無人午剛挫攀花蔭葉橋畔涼葛屨生衣安穩坐田家初飽麥上場溪雨新過水推磨林間起步餘睡清青梅滿盤雀卵大五雲山前盤古棲曽見前朝老謝敷六寺鐘聲何處盡僧殘惟有粥呼魚筍天已過麥地瘦一飯山厨鮭菜無青鞋布襪客何意擔水揭揭來澆蔬夏首新熱葉氣蒸細路危橋得幽悄榿柯成林已快人況有鳴泉覆深篠松髯石髮雅能淨竹稚烏雛憐最小何時一牀臥僧閣飽聽凌晨醒來鳥雙溪港口泊幽夢石帆山下朝炊動荒村客到松鼠奔小市人喧竹排重我生百事松上針雖有寸長何所用石田千畝雲外間去采靈芝為君種五泄明袁宏道銀河夜長天隄綻空中現出琉璃變雷布雲奔一𣲖垂山都盡吼白龍戰四壁隂隂吹雨足畫巒活舞玲瓏玉天孫夜夜踏歌來一曲飛珠二萬斛國朝三潭採蓴篇施閏章西湖三月蓴始生含花卷葉浮緑莖質柔膚滑不留手白汁盈盈成水晶浸之經宿愈肥美旋摘生新類蘭芷春山雨漲緑波深欲浮不浮難出水故人招我放生池畫船紅袖吹參差神魚撥剌動雷雨馮夷出沒搴旌旗酒闌却向湖心泊緩帶登樓氣磅礴急呼艇子擷蓴絲雪膾鹽豉佐觴酌凝脂膩澤難禁煮玉筍錦葵誰似汝滑翻碧碗匹冰漿清絶香羮酪奴乳嚼腐餐肥良可憎五侯七貴知未曾誰言此物繫歸思千載常懷張季鷹西湖歌送友汪琬君不見西湖流水碧於玉沙草如煙繞湖緑西泠橋邉花正開落花片片隨風來木蘭艇子蜻蜓尾棹入花間三十里壚頭少婦調銀筝嬌歌一曲最有情當窗卷却青綃幕花香水氣傳歌聲行人日午相倚聽勸盡絲繩雙玉瓶仙郎家近西湖住暫乞君恩賦歸去燕臺日落風凄凄道旁相逢惜解擕羡君南行向湖隄向湖隄䇿馬蹄湖水平湖草齊海鹽女陳維嵩海鹽徐氏女許嫁印家兒印家阿翁晝下帷誰何發屋抉扊扅提刀躍入白差差公然竈下橫其尸兒旁驚怖發狂癡喎唆瘲牛羊媼令女嫗來致辭已無婚理休然疑女今決絶勿復遲他家新婦須好為阿女仰天言一一淚作珠子垂女是徐氏女當年許嫁印家兒印家門戶劇破碎亟須健婦相為持登車不返顧入門搰搰操帚箕翁家楄柎何纍纍疊若醬瓿鹽醪瓻一兒臥蓐如死灰舊鬼乞食新鬼飢妾身只十指手築馬鬛為封之上堂奠􅊡􅊡病夫還復待哺糜茹荼雖苦甘若飴鄰娃切莫代妾悲但知同牢誼遑恤闈房私妾年已過而立嵗只今自為畫蛾眉湖心亭大風雨歌王士祿湖樓夢破朝徘徊吳君葉君折簡催欲以勝遊蕩羈思金尊蘭槳容趨陪一醉湖亭好風日四山靜緑如春苔忽忽殷雷起山脊黑雲壓檻聲焞焞夔牛鼓震日月落驅山鐸掣陵巒摧急雨注射激萬弩層波黝黝爭喧豗回風雲旗颯出沒黿鼉鼓沫江妃哀恍如軒轅張樂洞庭野蛟龍雜遝纏尊罍又如神禹行水過桐柏巫支騰踔羣靈猜山脅乍穿怒濤湧危橋欲坼神鞭回狂生顧視臆才豁奴子屏息顔如灰須臾勢過萬態息翠屏玉鑑亭亭開湘靈鼓瑟九疑靜李謨吹笛清風來我醉湖山亦已屢大抵好女臨妝臺久對令人少志意兹來壯觀真竒哉山川情狀出明晦丈夫意氣生風雷歌成長嘯興未巳好呼山月浮深杯登吳山頂放歌嚴我斯鳳凰嶺畔吳山髙鳳凰嶺下翻江濤江雲片片白如練江風五月聲怒號有客攀蘿踞峯頂手弄青霞白日泠嵯峨崇觀連天髙俯瞰鱗鱗千萬井中有道士華陽巾琉璃之盞松花醇拂拭南窗青玉簟殷勤邀我傾干巡回看西湖西子面明粧翠黛光灔灔木蘭雙槳嬌晴波桃花玉勒如飛電須臾黑雲起雷峯吹笙雨腳挂晴空疑是秦王渡海時驅山鞭石形離竒又如萬弩射江潮轟雷蹴浪黿鼉驕於時當筵四顧駭心目淋漓急進杯中緑尊前狂客呼李謨橫吹玉笛撼山木笛聲皎皎動江濆吹破江天萬里雲忽然雲端好月起銀樓玉闕何氤氲君不見蘇公既往風流歇處士亭邉荒草沒湖山變幻在須臾何必滄桑人代殊我今不飲胡為乎城頭落月空啼烏苕溪四時歌余懷蘭苕發春香噴玉風篁拔地敲新竹雪花分水合四溪淺草茸茸遍山谷文舠擁酒看桃花緑葉青青是妾家屋裏鏡奩藏小鳳門前楊栁散啼鴉錦旗霧暖遮團扇膩蘂蟠花覆氷簟燕語雕梁翦緑雲鶯啼别院搖紅線鯿如車輪筍如斗夾山錢山浪西吼栁惲逍遙杜牧狂項王馬埒飛劍光我有玲瓏秋玉佩贈君篋中三尺水桂華爛漫湘娥愁飛入吳潭打蛟起煙梧露井隔銀塘美人彈筝坐曲房倒轉天河寫明鏡碧湖射落青天影冷光融融碎銀浦龍堆積雪鬭哮虎一路荆榛啼午雞小槽滴瀝傾雲母金爐煨芋墨花寒插貂披裘近彩鸞千峯萬峯半夜白賦成枯樹歸未得大滌山行贈余蛟巽李鄴嗣明州城東有余子默坐嶙峋骨常峙素波瀲瀲翦雙瞳異彩離離散五指十年卜築能相傍夜雨燃燈光各向垣衣已蔽幽人門山鬼欲來處士巷翩然一夕辭草堂獨遊問爾真何方春水生矣憶苕水微風導之下禹航禹航苕水須臾度山山浮靄俱相晤谷鳥遙呼籜笠人溪花獨照芒鞋路芒鞋發我入山行大滌晴嵐片片迎金堂窈窕求龍蛻玉室谽谺訪鳳瞑鳳瞑龍蛻求無處玉草叢生竄仙鼠九峰裊裊多歸雲七洞淙淙盡垂乳此地棲真千載聞藏書萬笈覆靈雯元同先生不得見洞霄弟子曽相親何君扶犂耕峭壁呂翁荷斧采嵒礫興來招聼雲璈聲醉後同眠酒甕石聞爾誅茅將不還迷巖詭壑幾流連西洞幽尋亦偶爾東臺回眺終茫然君歸來無徘徊會稽以東接靉靆丹山之天匹元蓋我將結屋芙蓉巔需爾辭名共元對越溪舟中曾燦蕭山縣裏一舟渡衰草寒城天欲暮為語篙師且忍飢我欲黃昏望翠微十年心愛山隂道滅燭看山識山好川橋竹路有幾灣夜靜無人獨往還瓊臺雙闕潘耒瓊臺屹立中天孤削削亭亭不用扶靈芝根莖蒼雪膚台山之心仙所都百神上下風雨俱積髙中央削四隅俯瞰絶壁臨虛無雙闕巖巖夾雲衢靈溪百轉羊腸紆繞溪秀矗千芙蕖雲中之君朝香爐玉女鵠立羣真趨萬玉璀璨萬錦敷老龍守戶垂其胡靈湫百丈山腹刳猿驚鶴立無來途而我闌入心膽粗髙攀天梯捫天呼下搜雲窟餐雲腴曷不少留作仙徒自顧落拓難牽拘仙班禮法當不踈不如逍遙作凡夫問天不答憂狂愚常山山行朱彞尊常山玉山相去百里許山行十人九商賈肩輿出擔走不休四月溫風汗如雨勸客胡不安坐湖口船船客萬斛穩晝眠答云此間苦亦樂且免關吏橫索錢送李司訓之括州朱彞尊我聞括州洞天福地有其四近在縉雲麗水青田間廣文先生此去主郡學芙蕖面面峰回環毋嫌籖程逺毋憚行旅囏揚帆七里瀨舍棹雙溪灣我昔逢雨雪冰膠磴滑不易攀子今乘清秋一日可以超重關惡溪亦不惡終日水潺潺隘口亦不隘終日車班班青襟胄子載酒至往往剝啄鳴樞􅗚龍泉碧碗蛛絲斑香茹菜筍飯赤𦔔全家志在潔白養三簠之祿足以怡慈顔況同此地僻且間有腰免使陶潛彎熱官何如冷官好宴坐但看門前山新詩相憶肯相寄老夫為子方便刪薑堯招登香罏峰絶頂同薑廷梧商徵説毛竒齡秋山崒嵂海日紅浮暉倒映金芙蓉蒼崕負杖招羽客擕我直上香罏峰楓林黃葉下幽壑杖底風吹草衣薄石屋髙看洞鳥翻橫梁斜度山花落秋空望海海色飛赤城萬里煙霏霏越王臺上青磷起夏后祠前白雁稀玉函金簡探難得況蹈嶇嶔未曽息北谷空標承露臺南還竟負凌風翼蒼崕四顧意氣開吹笙跨鶴真仙才何年乞汝盈箱藥共俟安期海上來湘湖採蓴歌毛竒齡鴨烏山前春欲暮阿子前湖採蓴去藕根菱葉生滿湖艇子灣灣不知處畫竿十尺挑碧絲香蓴宛轉生華滋山前山後人難遇採得盈筐欲寄誰金鐶曲為項家婦作洪升王家有女字秀文少小綽約蘭蕙芬項郎名族學詩禮金鐶為聘結昏姻十餘年來人事變富兒那必歸貧賤一朝别字貴豪家三日悲啼淚如霰手摘金鐶自吞食將死未死救不得柔腸九曲斷還連臥地秪存微氣息詎料國工賜靈藥吐出金鐶定魂魄至性由來動彼蒼一夜銀河駕烏鵲嗟哉此女貞且賢項郎對之悲復憐朝來笑倚鏡臺立代繫金鐶雲鬢邉富春道中查慎行烏桕林中霜撒花千樹萬樹圍村家門前紅葉掃還落白子著枝如白花寒鴉成羣啄不盡幾處飛出聲啞啞荒灣敗葦江忽轉雁陳欲落整復斜青山正缺天一面淡入無迹雲拖沙十年夢想富春渚指點圖畫空嗟呀豈知去家才百里足所未到如天涯人情貴逺每忽近往往耳目遺煙霞他年卜居或未穩此際覔句差堪誇江山秀絶客懷俗毋使擾擾同魚蝦七里瀧查慎行瀧中亂峯髙插天瀧中急水折復旋瀧中竹樹青如煙白龍倒垂尾蜿蜒泄雲噴霧為飛泉晴光一線忽射穿雨點白晝打客船船行無風七十里一日看山柁樓底山隂五老歌查升熙朝養老崇膠庠頒賜粟帛嵗有常時維春矣帝省方黃衣皓首拜道旁所過十里或五里老人什伯爭迎喜自言生作堯舜民出作入息蒙皇仁縣家給得黃絲絹由來賜出光明殿頻年被服聖人恩今朝喜識君王面誰與健者山隂民有五兄弟歌莊椿生本同根復同茂其幼七十長九旬五人有婦各偕老弋雁鳴雞賡靜好出腹於今聚一堂孫枝幾輩盈懷抱更有同懷雙女弟結褵嫁得賢夫壻白首相莊十四人修齡屈指盈千計五老匐伏行宫前觀者歡笑聲喧闐黃門陳奏開龍顔擘窠運帚生雲煙如此禎祥世希有一門人瑞登耆耉奎章賜出萬人看溢巷填衢齊額手臣聞漢庭四皓非同生淮安八叟無留名又聞五老浮河應列星傳之載籍誇神靈何似五人一父母嵗月天長復地久微臣竊喜附枌榆願言作歌垂不朽誰云世無真神仙五人皆得全其天自今茀祿尤延綿齊祝我皇億萬年浙江通志卷二百七十三
