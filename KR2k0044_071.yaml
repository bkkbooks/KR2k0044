  text: 浙江通志卷七十二户口二湖州府三國吳萬厯湖州府志寶鼎元年吳興郡户四萬九千六百九口三十一萬六千二百七十二晉舊浙江通志吳興郡户二萬四千口缺唐通典吳興郡户六萬八千五百八十一口四十六萬一千四百七十九元和郡縣志開元户六萬一千一百三十三元和户四萬三千四百六十七宋太平寰宇記湖州吳興郡户主客共三萬八千七百四十八舊浙江通志大中祥符間湖州主客户一十二萬九千五百一十口四十三萬六千三百六十元豐九域志吳興郡户主一十三萬四千六百一十二客一萬五百萬厯湖州府志淳熙九年主客户二十萬四千五百九口五十一萬八千三百五十二元嘉靖浙江通志至元二十七年湖州路南北人户二十三萬六千五百七十七口缺明萬厯湖州府志洪武二十四年湖州府户二十萬四十八口八十一萬二百四十四嘉靖浙江通志湖州府户一十七萬三千七百四十三口四十八萬五千八百四十九國朝舊浙江通志原額人丁二拾捌萬捌千二百二拾丁口康熙二十年實在人丁二拾玖萬二千玖百叄拾一丁口賦役全書康熙四十年實該人丁二拾玖萬叄千一百陸拾捌丁口康熙六十年實在人丁叄拾一萬肆千肆百肆拾肆丁口雍正四年實在人丁叄拾一萬捌千捌百一拾㭍丁口雍正九年實在人丁叄拾二萬一千伍百陸拾伍丁口烏程縣前係照人起丁今改照田起丁原額人丁陸萬玖千一百捌拾叄口康熙二十年實在人丁柒萬叄千陸百捌拾叄丁口康熙六十年原報原額人丁捌萬一千二百肆拾二丁口雍正四年實在人丁捌萬叄千柒百捌拾一丁賦役全書原額田柒千二百捌拾二頃陸拾肆畝叄分一釐玖毫每田二百一畝肆分伍絲叄忽陸塵玖渺陸漠玖埃一纎叄沙𣲖市民人丁一丁每田一拾畝叄分玖釐叄毫捌絲二忽柒微陸塵柒漠捌埃陸纎二沙𣲖鄉民人丁一丁雍正九年編審舊管人丁捌萬叄千柒百捌拾一丁新收人丁一千叄百肆拾一丁開除人丁一千伍拾陸丁實在人丁捌萬肆千陸拾陸丁內實在市民人丁肆千叄百一拾叄丁內除原額完賦人丁叄千陸百一拾陸丁每丁徵銀肆分共徴銀一百肆拾肆兩盛世陸錢肆分外實內别省寄居人丁陸拾二丁浙省滋生增益人丁土著人丁陸百陸拾玖丁共增益人丁柒百叄拾一丁永不加賦實在鄉民人丁柒萬玖千肆百陸拾捌丁內除原額完賦人丁柒萬陸拾柒丁每丁徴銀伍分二釐共徴銀叄千陸百肆拾叄兩肆錢盛世捌分肆釐外實內别省寄居人丁伍百柒拾一丁滋生增益人丁浙省土著人丁玖千捌拾一丁共增益人丁玖千陸百伍拾二丁永不加賦以上共徴銀叄千柒百捌拾捌兩一錢二分肆釐歸安縣係照糧起丁原額人丁陸萬捌千一百一拾一丁口康熙二十年實在人丁陸萬捌千一百一拾一丁口康熙六十年原報原額人丁柒萬二千一百柒拾丁口雍正四年實在人口柒萬叄千一百叄拾一口賦役全書原額田地山蕩等項共實徴銀捌萬玖千肆百二拾肆兩陸錢玖分玖釐肆毫伍絲二忽叄微伍塵柒渺柒埃柒纎陸沙每銀二拾伍兩肆錢叄分叄釐陸毫肆絲陸忽叄塵叄渺玖埃叄纎陸沙𣲖市民人口一口每銀一兩叄錢捌分肆釐叄毫玖絲肆微二塵肆渺二漠一埃柒纎玖沙𣲖鄉民人口一口雍正九年編審舊管人丁柒萬叄千一百叄拾一丁口新收人丁二千柒百一拾叄口開除人丁一千肆百陸拾口實在人丁柒萬肆千叄百捌拾肆口內實在市民人口叄千捌百伍拾陸口內除原額完賦市民人口叄千伍百一拾陸口每口徴銀肆分柒釐共徴銀一百陸拾伍兩二錢伍分二釐外實盛世滋生增益市民人口內别省寄居人口肆拾伍口浙省土著人口叄百陸拾伍口共增益人口肆百一拾口永不加賦實在鄉民人口陸萬玖千二百柒拾伍口內除原額完賦鄉民人口陸萬肆千伍百玖拾伍口每口徴銀陸分叄釐共徴銀肆千陸拾玖兩肆錢捌分伍釐外實盛世滋生增益鄉民人口內别省寄居人口一百二拾玖口浙省土著人口伍千柒百叄拾肆口共增益人口伍千捌百陸拾叄口永不加賦以上共徵銀肆千二百叄拾肆兩柒錢叄分柒釐長興縣照糧起丁原額人丁肆萬捌千伍百伍拾丁口康熙二十年實在人丁肆萬捌千柒百陸拾一丁口康熙六十年原報原額人丁共伍萬一千玖百柒丁口雍正四年實在人丁伍萬二千一百捌拾肆丁口賦役全書原額田地山蕩等項共徴銀陸萬柒千柒百柒拾陸兩二錢叄分肆毫伍忽叄微捌塵捌渺二埃捌沙每銀一百柒拾㭍兩捌錢玖分叄毫陸絲捌忽伍微一塵捌渺柒埃捌纎捌沙𣲖市民一丁口每銀一兩叄錢玖分叄釐柒毫玖絲捌忽叄微玖渺陸漠玖埃一纎玖沙𣲖鄉民一丁口雍正九年編審舊管人丁伍萬二千一百捌拾肆丁口新收人丁二千玖百一拾捌丅口開除人丁二千伍百捌丁口實在人丁伍萬二千伍百玖拾肆丁口內實在市民人丁叄百玖拾叄丁口內除原額完賦人丁叄百捌拾一丁口每丁徴銀叄分伍釐玖毫共徴銀一拾叄兩陸錢柒分柒釐玖毫外實盛世滋生增益人丁內别省寄居人丁一拾一丁口浙省土著人丁二拾叄丁口共增益人丁叄拾肆丁口永不加賦實在鄉民人丁伍萬一千柒百玖拾一丁口內除原額完賦人丁肆萬捌千陸百二拾柒丁口每丁徴銀伍分肆釐捌毫共徴銀二千陸百陸拾肆兩柒錢伍分玖釐陸毫外實盛世滋生增益人丁內别省寄居人丁玖拾二丁口浙省土著人丁叄千肆百陸拾丁口共增益人丁叄千伍百伍拾二丁口永不加賦以上共徴銀二千陸百柒拾捌兩肆錢叄分柒釐伍毫德清縣前係照人起丁今改照糧起丁原額人丁伍萬柒千二拾肆丁口康熙二十年實在人丁伍萬柒千二拾肆丁口康熙六十年原報原額人丁陸萬一千肆百一丁