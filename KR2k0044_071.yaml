  text: 浙江通志卷七十二户口二湖州府三國吴萬厯湖州府志寶鼎元年吴興郡户四萬九千六百九口三十一萬六千二百七十二晉舊浙江通志吴興郡户二萬四千口缺唐通典吴興郡户六萬八千五百八十一口四十六萬一千四百七十九元和郡縣志開元户六萬一千一百三十三元和户四萬三千四百六十七宋太平寰宇記湖州吴興郡户主客共三萬八千七百四十八舊浙江通志大中祥符間湖州主客户一十二萬九千五百一十口四十三萬六千三百六十元豐九域志吴興郡户主一十三萬四千六百一十二客一萬五百萬厯湖州府志淳熈九年主客户二十萬四千五百九口五十一萬八千三百五十二元嘉靖浙江通志至元二十七年湖州路南北人户二十三萬六千五百七十七口缺明萬厯湖州府志洪武二十四年湖州府户二十萬四十八口八十一萬二百四十四嘉靖浙江通志湖州府户一十七萬三千七百四十三口四十八萬五千八百四十九國朝舊浙江通志原額人丁貳拾捌萬捌千貳百貳拾丁口康熈二十年實在人丁貳拾玖萬貳千玖百叄拾壹丁口賦役全書康熈四十年實該人丁貳拾玖萬叄千壹百陸拾捌丁口康熈六十年實在人丁叄拾壹萬肆千肆百肆拾肆丁口雍正四年實在人丁叄拾壹萬捌千捌百壹拾㭍丁口雍正九年實在人丁叄拾貳萬壹千伍百陸拾伍丁口烏程縣前係照人起丁今改照田起丁原額人丁陸萬玖千壹百捌拾叄口康熈二十年實在人丁柒萬叄千陸百捌拾叄丁口康熈六十年原報原額人丁捌萬壹千貳百肆拾貳丁口雍正四年實在人丁捌萬叄千柒百捌拾壹丁賦役全書原額田柒千貳百捌拾貳頃陸拾肆畝叄分壹釐玖毫毎田貳百壹畝肆分伍絲叄忽陸塵玖渺陸漠玖埃壹纎叄沙𣲖市民人丁壹丁每田壹拾畝叄分玖釐叄毫捌絲貳忽柒㣲陸塵柒漠捌埃陸纎貳沙𣲖鄉民人丁一丁雍正九年編審舊管人丁捌萬叄千柒百捌拾壹丁新收人丁壹千叄百肆拾壹丁開除人丁壹千伍拾陸丁實在人丁捌萬肆千陸拾陸丁内實在市民人丁肆千叄百壹拾叄丁内除原額完賦人丁叄千陸百壹拾陸丁每丁徵銀肆分共徴銀壹百肆拾肆兩盛世陸錢肆分外實内别省寄居人丁陸拾貳丁浙省滋生増益人丁土著人丁陸百陸拾玖丁共増益人丁柒百叄拾壹丁永不加賦實在鄉民人丁柒萬玖千肆百陸拾捌丁内除原額完賦人丁柒萬陸拾柒丁每丁徴銀伍分貳釐共徴銀叄千陸百肆拾叄兩肆錢盛世捌分肆釐外實内别省寄居人丁伍百柒拾壹丁滋生増益人丁浙省土著人丁玖千捌拾壹丁共増益人丁玖千陸百伍拾貳丁永不加賦以上共徴銀叄千柒百捌拾捌兩壹錢貳分肆釐歸安縣係照糧起丁原額人丁陸萬捌千壹百壹拾壹丁口康熈二十年實在人丁陸萬捌千壹百壹拾壹丁口康熈六十年原報原額人丁柒萬貳千壹百柒拾丁口雍正四年實在人口柒萬叄千壹百叄拾壹口賦役全書原額田地山蕩等項共實徴銀捌萬玖千肆百貳拾肆兩陸錢玖分玖釐肆毫伍絲貳忽叄㣲伍塵柒渺柒埃柒纎陸沙每銀貳拾伍兩肆錢叄分叄釐陸毫肆絲陸忽叄塵叄𣺌玖埃叄纎陸沙𣲖市民人口壹口每銀壹兩叄錢捌分肆釐叄毫玖絲肆㣲貳塵肆𣺌貳漠壹埃柒纎玖沙𣲖鄉民人口壹口雍正九年編審舊管人丁柒萬叄千壹百叄拾壹丁口新收人丁貳千柒百壹拾叄口開除人丁壹千肆百陸拾口實在人丁柒萬肆千叄百捌拾肆口内實在市民人口叄千捌百伍拾陸口内除原額完賦市民人口叄千伍百壹拾陸口每口徴銀肆分柒釐共徴銀壹百陸拾伍兩貳錢伍分貳釐外實盛世滋生増益市民人口内别省寄居人口肆拾伍口浙省土著人口叄百陸拾伍口共增益人口肆百壹拾口永不加賦實在鄉民人口陸萬玖千貳百柒拾伍口内除原額完賦鄉民人口陸萬肆千伍百玖拾伍口每口徴銀陸分叄釐共徴銀肆千陸拾玖兩肆錢捌分伍釐外實盛世滋生増益鄉民人口内别省寄居人口壹百貳拾玖口浙省土著人口伍千柒百叄拾肆口共増益人口伍千捌百陸拾叄口永不加賦以上共徵銀肆千貳百叄拾肆兩柒錢叄分柒釐長興縣照糧起丁原額人丁肆萬捌千伍百伍拾丁口康熈二十年實在人丁肆萬捌千柒百陸拾壹丁口康熈六十年原報原額人丁共伍萬壹千玖百柒丁口雍正四年實在人丁伍萬貳千壹百捌拾肆丁口賦役全書原額田地山蕩等項共徴銀陸萬柒千柒百柒拾陸兩貳錢叄分肆毫伍忽叄㣲捌塵捌𣺌貳埃捌沙每銀壹百柒拾㭍兩捌錢玖分叄毫陸絲捌忽伍㣲壹塵捌𣺌柒埃捌纎捌沙𣲖市民壹丁口每銀壹兩叄錢玖分叄釐柒毫玖絲捌忽叄㣲玖渺陸漠玖埃壹纎玖沙𣲖鄉民壹丁口雍正九年編審舊管人丁伍萬貳千壹百捌拾肆丁口新收人丁貳千玖百壹拾捌丅口開除人丁貳千伍百捌丁口實在人丁伍萬貳千伍百玖拾肆丁口内實在市民人丁叄百玖拾叄丁口内除原額完賦人丁叄百捌拾壹丁口每丁徴銀叄分伍釐玖毫共徴銀壹拾叄兩陸錢柒分柒釐玖毫外實盛世滋生増益人丁内别省寄居人丁壹拾壹丁口浙省土著人丁貳拾叄丁口共増益人丁叄拾肆丁口永不加賦實在鄉民人丁伍萬壹千柒百玖拾壹丁口内除原額完賦人丁肆萬捌千陸百貳拾柒丁口每丁徴銀伍分肆釐捌毫共徴銀貳千陸百陸拾肆兩柒錢伍分玖釐陸毫外實盛世滋生増益人丁内别省寄居人丁玖拾貳丁口浙省土著人丁叄千肆百陸拾丁口共増益人丁叄千伍百伍拾貳丁口永不加賦以上共徴銀貳千陸百柒拾捌兩肆錢叄分柒釐伍毫徳清縣前係照人起丁今改照糧起丁原額人丁伍萬柒千貳拾肆丁口康熈二十年實在人丁伍萬柒千貳拾肆丁口康熈六十年原報原額人丁陸萬壹千肆百壹丁