body:
  text: 浙江通志卷八十三鹽法上八政以食貨為先鹽居食貨之一考鹽人政令掌於周官而兩浙鹽官之設昉自漢代聖朝酌古宜今立法盡善旣已勅修專志奉為禺筴權輿而睿慮周詳又復隨時損益凡所以惠民恤商者纎悉具備洵足垂憲於萬年矣志鹽法越絶書朱餘者越鹽官也越人謂鹽曰餘史記吳王濞傳髙帝立濞為吳王煮海水為鹽以故無賦國用富饒通鑑綱目武帝元狩四年冬置鹽鐡官漢書地理志㑹稽郡縣海鹽注故武原鄉有鹽官文獻通考鹽官凡二十八郡㑹稽海鹽吳書孫休傳海鹽司鹽校尉駱秀嘉靖浙江通志孫吳置司法都尉權其利晉書王允之傳除錢塘令領司鹽都尉通鑑地理通釋唐天下有鹽之國一百五江南自嘉興至彭水縣十二唐書食貨志負海州歲免租為鹽二萬斛以輸司農青楚海滄棣杭蘇等州以鹽價市輕貨亦輸司農天寳至德間鹽每斗十錢乾元元年鹽鐡鑄錢使第五琦初變鹽法就山海井竈近利之地置監院游民業鹽者為亭户免雜徭盗鬻者論以法及琦為諸州𣙜鹽鐡使盡𣙜天下鹽斗加時價百錢而出之為錢一百一十唐書食貨志鹽鐡使劉晏上鹽法輕重之宜以鹽利多則州縣擾出鹽鄉因舊監置吏亭户糶商人縱其所之江嶺去鹽遠者有常平鹽每商人不至則减價以糶民官收厚利而人不知貴晏又以鹽生霖潦則鹵薄暵乾則土溜墳乃隨時為令遣吏曉導倍於勸農吳越揚楚鹽廩至數千積鹽二萬餘石有漣水湖州越州杭州四場嘉興海陵鹽城新亭臨平蘭亭永嘉大昌侯官富都十監歲得錢百餘萬緡以當百餘州之賦自淮北置巡院十三曰揚州陳許汴州廬壽白沙淮西甬橋浙西宋州泗州嶺南兗鄆鄭滑捕私鹽者姦盗為之衰息然諸道加𣙜鹽錢商人舟所過有税晏奏罷州縣率税禁堰埭邀以利者晏之始至也鹽利歲纔四十萬緡至大厯末六百餘萬緡天下之賦鹽利居半宫闈服御軍饟百官禄俸皆仰給焉舊唐書順宗即位有司重奏鹽法以杜佑判鹽鐡轉運使理於揚州元和二年三月以李巽代之巽大正其事其堰埭先𨽻浙西觀察使者悉歸之因循權置者盡罷之唐書盧商傳商為蘇州刺史吏以鹽法求贏貲民愈困商令計口售鹽無常額人便之歲貲反増宰相上其勞進浙西觀察使吳興掌故宋制兩浙歲計丁口官散食鹽每丁給鹽一斗使輸錢百六十有六謂之丁鹽錢然其原實始於南唐李氏有國時制為鹽丁之額吳越彷之而宋不復改宋史食貨志鬻海為鹽曰京東河北兩浙淮南福建廣南凡六路其鬻鹽之地曰亭場民曰亭户或謂之竈户户有鹽丁歲課入官受錢或折租賦皆無常數兩浙乂役軍士定課鬻焉至道三年鬻錢總一百六十三萬三千餘貫其在兩浙曰杭州場歲鬻七萬七千餘石明州昌國東西兩監二十萬一千餘石秀州場二十萬八千餘石温州天富南北監密鸚永嘉二場七萬四千餘石台州黄巖監一萬五千餘石以給本州及越處衢婺州天聖中杭秀温台明各監一温州又領場三而一路歲課視舊减六萬八千石以給本路及江東之歙州宋史張綸傳綸除江淮制置發運副使奏置鹽場於杭秀海三州歲入課百五十萬宋史食貨志東南鹽利視天下為最厚鹽之入官淮南福建兩浙之温台明斤為錢四杭秀為錢六廣南為錢五其出視去鹽道里逺近而上下其估利有至十倍者宋史仁宗紀明道元年廢杭秀二州鹽場宋史食貨志兩浙轉運使沈立李肅之奏官鹽估髙故私販不止而官課益虧請裁官估罷鹽綱令舖户衙前自趨山場取鹽如此則鹽善而估平人不肯冐禁私售官課必溢詔可宋史食貨志熙寧五年以盧秉權發遣兩浙提㸃刑獄仍專提舉鹽事異時竈户鬻鹽與官為市鹽場不時償其直竈户益困秉先請儲發運使錢及雜錢百萬緡以待償而諸場皆定分數錢塘縣楊村場上接睦歙等州與越州錢清場等水勢稍淺以六分為額楊村下接仁和之湯村為七分鹽官場為八分並海而東為越州餘姚縣石堰場明州慈谿縣鳴鶴場皆九分至岱山昌國又東南為温州雙穗南天富北天富場為十分蓋其分數約得鹽多寡而為之節自岱山以及二天富煉以海水所得為最多由鳴鶴西南及湯村則刮鹻淋滷十得六七鹽官湯村用鐡􅌉故鹽色青自湯村及錢清場織竹為盤塗以石灰故色少黄石堰以東近海水鹹故雖用竹盤而鹽色尤白秉因定㐲火盤數以絶私鬻自三竈至十竈為一甲而鬻鹽地什伍其民以相譏察及募酒坊户願占課額取鹽於官賣之月以錢輸官毋得越所酤地而又嚴捕盗販者罪不至配雖杖者皆同妻子遷五百里宋史食貨志兩浙鹽亭户計丁輸鹽逋負滋廣元祐二年詔蠲之後更積負無以償元符初察訪使以状聞有司乃以朝㫖不行右正言鄒浩極疏其害明州鳴鶴場鹽課弗登撥𨽻越州宣和元年樓异為明州請仍舊且於接近台州給舊鹽五七萬囊詔曰明州鹽場三昨以施置不善以鳴鶴一場隸越客始輻輳猶有二場積鹽以百萬計未見功緒此而不圖東欲取於越西欲取於台改令害法動搖衆情令状析以聞宋史食貨志紹興元年詔臨安府秀州亭户二稅依皇祐法輸鹽立監官下察亭户私煎及巡捕漏泄之法建炎以來朝野雜記東南鹽行於江淮舊為江湖六路漕計蔡京為政始行鈔法取其錢以贍中都自是淮浙鹽則官給亭户本錢諸州置倉許商人買鈔算請舊淮江鹽息歲八百萬緡紹興初才三十五萬緡而已後朝廷益修其政至紹興末年東南歲産鹽二萬七千八百六十萬斤每五十斤為一石六石為一帒鈔錢十有八千紹興四年正月増三千九月以入納遲罷之宋史髙宗紀紹興十三年蠲浙西貧民逋負丁鹽錢九月均科處州丁鹽錢二十八年正月遣户部即中莫濛等檢視淮南浙西江東沙田蘆場六月増浙西江東淮東沙田蘆場租課置提領官田所掌之二十九年六月罷江浙淮東沙田蘆場所増稅課玊海紹興三十二年鹽額浙西路秀州有鹽場十平江四臨安十浙東路紹興府有場四明州有場六台州三温州五建炎以來朝野雜記浙鹽額最多者嘉興八十一萬石慶元三十九萬石浙鹽一場十竈每竈煎鹽晝夜六盤一盤三百斤遇雨則停宋史食貨志乾道六年户部侍郎葉衡奏今日財賦煮海之利居其半年來課入不増商賈不行皆私販害之也且以淮東兩浙鹽出入之數言之鹽額淮東之數多於兩浙五之一以去歲賣鹽錢數論之淮東多於兩浙三之二及以竈之多寡論之兩浙反多淮東四之三蓋兩浙無非私販故也望遣官分路措置宋史寧宗紀嘉定三年遣朝臣二人徃兩浙路與提舉官議收浮鹽七年除兩浙路茶鹽賞錢八年蠲臨安府茶鹽賞錢宋史食貨志紹定元年以侍御史李知孝言罷上虞餘姚海塗地剏立鹽竈元史食貨志兩浙之鹽至元十四年立運司歲辦九萬二千一百四十八引每引分作二帒每帒依宋十八界㑹子折中統鈔九兩十八年増至二十一萬八千五百六十二引十九年每引於舊價之上増鈔四貫元史世祖紀至元十九年五月遣浙西道宣慰司同知劉宣等理算各鹽運司出納之數十二月罷諸鹽司令運官親行調度鹽引二十年四月申私鹽之禁許按察司糾察鹽司二十二年正月立諸路常平鹽鐵都轉運司二十六年十月尚書省臣言沙布迪音以便宜増置浙東二鹽司合浙東西舊所立者為七乞官知鹽法者五十六人從之元史食貨志大德三年立兩浙鹽運司檢校所四五年増額為四十萬引至大元年又増餘鹽五萬引續文獻通考延祐五年曹伯啟遷司農丞奉㫖至江浙議鹽法罷檢校官置六倉於浙東西設運鹽官輸運有期出納有次船户倉吏盗賣漏失有罰著為令元史食貨志至元五年兩浙運司申中書省云本司自至元十三年剏立當時未有定額至十五年始立額辦鹽十五萬九千引自後引増十倍價増三十倍課額愈重煎辦愈難兼以行鹽地界所拘户口有限前時聼從客商就場支給設立檢校所稱檢出場鹽帒又因支查停積延祐七年比兩淮之例改法立倉綱官押船到場運鹽赴倉收貯客旅就倉支鹽始則為便今經二十餘年綱場倉官任非其人惟務掊克况淮浙風土不同兩淮跨涉四省課額雖大地廣民多食之者衆可以辦集本司地界居江枕海煎鹽亭竈散漫海隅行鹽之地裏河則與兩淮隣接海洋則與遼東相通番舶徃來私鹽出没侵礙官課雖有刑禁難盡防禦鹽法隳壞亭民消廢其弊有五如䝉特賜奏聞選委德望重臣與拘該官府叅酌時宜更張法制惠濟黎元庻望大課無虧見為住煎餘鹽三萬引差人齎江浙行省咨文赴中書省請照詳焉元史順帝紀至元元年十二月増設嘉興等處鹽倉二年杭州嘉興紹興温州台州等路各立檢校批騐鹽引所元史食貨志至正二年十月中書右丞相托克托平章特穆爾達實等奏兩浙食鹽害民為甚江浙行省官運司官屢以為言擬合欽依世祖皇帝舊制除近鹽地十里之内令民認賣罷見設鹽倉綱運聼從客商赴運司買引就場支鹽許於行鹽地方發賣革去派散之弊及設檢校批驗所四處選任亷幹之人直隸近司如遇客商載鹽經過依例稱盤均平帒法批驗引目運司官常行體究又自至元十三年歲辦鹽課額少價輕今増至四十五萬額多價重轉運不行今户部定擬自至正二年為始将兩浙額鹽量減一十萬引俟鹽法流通復還原額散派食鹽擬合住罷有㫖從之明㑹典洪武元年置兩浙都轉運鹽使司定歲辦鹽數每引四百斤給工本米一石續文獻通考兩浙都轉運鹽使司轄嘉興松江寧紹温台四分司鹽場三十五處歲辦鹽二十二萬四百五十七引二百斤零嘉靖浙江通志凡為場三十五為團五百有一為丁七萬四千四百四十有六丁皆給灘蕩授煮噐率辦鹽一引給工本米石名山藏兩浙鹽運司鹽課之司二嘉興分司鹽課之司五松江分司鹽課之司八寧紹分司鹽課之司十二溫台分司鹽課之司八批驗之所四杭紹嘉溫行鹽之地杭紹寧台衢處嘉湖嚴金溫蘇松常鎮徽廣信廣德歲解金於太倉所派邉甘肅延綏寧夏固原山西神池等堡明㑹典洪武三年令浙江等布政司併直隸府州縣官民人等户口食鹽各隨地方徴收歲用糧多處徴米用糧少處徴鈔十七年定兩浙鹽工本鈔每引二貫五百文二十三年定兩浙各竈户每丁歲辦小引鹽丁六引引重二百斤復鹽工丁半之其餘工丁四引明世法録洪武二十七年議准兩浙運使石堰場新漲沙地除通洩鹽水併原係辦鹽採薪地畝照舊起科分撥除豁外其上中二則實該陞科田五萬餘畝俱自二十六年為始每畝科糧五升五合折銀三分徴解運司貯庫遇有竈户逃移復業及年時豐歉量支賑恤史槩宣德元年六月仍命中鹽人改鈔輸米六年六月允溫州府商稅收鈔續文獻通考宣德四年令兩浙貧難竈丁輸原額鹽課照舊收納其有餘鹽者不許私賣俱收貯本場運司造册發附近州縣每一小引給米麥二斗明㑹典正統二年裁革寧波府岱山蘆花二場鹽課歸併大嵩場鹽課司催辦舊浙江通志五年併昌國場於穿山設下砂二三場嘉靖浙江通志正統三年用侍即周忱議以竈去場三十里者為水鄉竈户不及三十里者為濱海滷丁水鄉丁歲出米六石給濱海丁代煎明㑹典正統五年令兩淮兩浙長蘆運司每歲額辦鹽課以十分為率八分給與守支客商二分另為收積在官候邉方急缺糧儲召中以所積見鹽人到卽支謂之存積其八分年終挨次給守支客商謂之常股凡中常股價輕存積價重舊兩浙鹺志兩浙年額引鹽四十四萬四千七百六十九引一百四十九斤二兩内常股鹽三十一萬一千三百三十八引一百六十四斤六兩二錢存積鹽一十三萬三千四百三十引一百八十四斤一十一兩八錢明㑹典景泰元年令増兩浙存積鹽為六分又令各處商人引鹽出遷延三月者拘收入官舊兩浙鹺志成化七年令兩浙運司各場存積鹽課仍舊止作四分常股増為六分嘉靖浙江通志成化十年巡撫右副都御史劉敷以濱海逋課累水鄉疏改水鄉鹽引折銀三錢五分場各輸於其長運司㑹而輸户部備邉用此水鄉輸銀之始十二年詔覈水鄉蕩價解運司此草蕩徴銀之始十八年増置天賜溝場嘉靖浙江通志成化二十年御史林誠以厫鹽多耗疏令濱海竈鹽並許輸半價浙西引三錢五分浙東引二錢五分歲十月輸京師此濱海本折色鹽之始二十一年増邉商浙鹽價每大引輸銀一錢六分松江府知府樊瑩疏請以蕩價抵水鄉鹽課之半立蕩户收之餘半於各縣秋糧加耗餘米帶徴而丁盡歸有司應民役此州縣包補水鄉額鹽之始嘉靖浙江通志𢎞治元年侍郎彭韶疏減濱海折半鹽價浙西引輸三錢浙東引一錢七分五釐二年疏鬻兩浙餘鹽引價一錢四分此本處賣鹽之始又疏減水鄉歲課引輸銀三錢濱海歲課常股引輸銀一錢五分存積輸鹽如故三年御史張文疏令濱海竈丁去場三十里内者煎辦三十里外者輸銀視水鄉浙西引三錢浙東引二錢明憲章録𢎞治五年八月令兩淮兩浙鹽運司鹽引俱於運司招商開中納銀𩔖解户部太倉以備邉儲國初鹽課俱於各邉開中上納本色米豆商人於近邉轉運本色以待開中至是户部尚書葉淇因商人赴邉納糧價少而有遠涉之虞在運司納銀價多而得易辦之利遂奏准商人引鹽悉輸銀户部送太倉銀庫收貯分送各邉鹽銀積至一百餘萬兩嘉靖浙江通志𢎞治十二年廢寧台二批驗所御史藍章増餘鹽價引一錢八分都御史王瓊御史邢昭繼増之引價二錢嘉靖浙江通志正德六年増邊商浙鹽價每大引輸銀一錢八分八年減餘鹽價仍一錢八分明世法録正德九年奏准兩浙鹽每引二百斤許帶餘鹽五十斤連包索五十斤共三百斤為一引十三年議准運司所屬許村場額徴本色鹽不及百斤者照浙東西折鹽官價徴銀解部嘉靖浙江通志嘉靖六年増邊商浙鹽價每大引輸銀四錢七年御史王朝用疏令瀕海折色鹽水鄉竈鹽引輸銀二錢三分七釐貯運司而以二錢給商買鹽曰買補其三分七釐曁諸割没餘鹽價仍輸京師此給商買補之始明世法録嘉靖八年題准兩浙每正鹽一引連包索二百五十斤原定四錢近减作三錢五分餘鹽通融二百斤為一引嘉興批驗所銀五錢杭州批驗所四錢五分紹興批驗所四錢溫州批驗所二錢正鹽照舊上納本色糧草餘鹽不必開邊照舊運司納銀解部轉發各邊糴買客兵糧草其甘肅險遠止開淮浙二鹽浙鹽再減五分每引銀三錢明世法録嘉靖十一年奏准浙東鹽額五萬二千五十六引引少鹽多浙西額鹽一十四萬六千四引引多鹽少𣲖場之時於浙西數内改出四萬六千九百七十四引派與浙東疏通鹽法舊兩浙鹺志嘉靖十二年題准清理竈丁均分蕩地將實在鹽課通行各場照依見在丁數均匀辦納其草蕩先爲豪强兼併逐一查出均撥聼廵鹽御史每五年一次親詣各場將竈丁逐一清審事故者開除成丁者僉補先年有將竈蕩丈量入民額者有徴銀充兵餉者有司見蕩成熟輙議陞課今後新漲荒蕩及開墾熟蕩盡數分給各竈煎辦計畝徴銀不許有司容令部民妄行爭奪明世法録嘉靖十三年題准永嘉場衝壞沙灘逃亡竈丁折銀鹽課查槩縣民田地池均派包補隨糧徴收發場起解舊浙江通志嘉靖十六年題准兩浙官商不到之處立爲山商鉛山弋陽貴溪永豐靖江昌化浦江武義東陽義烏湯溪永康建德桐廬夀昌慶元宣平縉雲景寧雲和二十縣每程一張納銀六錢餘杭富陽臨安新城嘉興秀水嘉善崇德桐鄉德清武康諸曁新昌嵊縣奉化泰順青田十七縣每程一張納銀四錢三分其餘坐場縣分容令竈丁肩挑易賣仍修復松江分司令分司官駐劄督課二十年題准台州府長亭黄巖杜凟三場引目一票作為一引每票照鹽三百斤納銀九分舊兩浙鹺志嘉靖二十四年題准兩浙歲辦水鄉鹽課照舊折價解部存留在場鹽課徴收折色解貯運司給商自行下場買鹽聼掣明世法録嘉靖二十六年題准兩浙運司天賜場原額引目俱改派仁和許村二場輪次買補完日就於二場打引截角運赴杭州批驗所掣放史槩嘉靖三十四年十一月減兩浙鹽課舊浙江通志隆慶六年奏准寧波府所轄五縣松江所轄二縣共一十四塲俱無住賣商引又未議行票鹽令僉選牙埠置立簿票每票一張照鹽三百斤納銀一錢二分舊兩浙鹺志萬厯七年十一月户部覆准永嘉等場改認仁許二場買補引目減去引價一錢五分止追銀二錢浦東青浦袁浦改認下砂青村買補引目減去銀三分止追銀一錢四分蘆瀝場改認西路買補引目減去銀四分止追銀八分恐京解不敷将紹所餘鹽每引加銀一分及将續増稅票沙蕩等銀抵補前數題減仁許等場搭派折色銀兩議将浙東場分引目每引加増餘鹽銀一分續據商人吳用和等呈詞将紹所引鹽每引加耗鹽十斤以補多徴餘鹽之數杭州等所不得援此例舊兩浙鹺志萬厯四十二年四月陜西道御史劉廷元疏乞将兩浙新陞蕩稅立賜全免奉㫖令新増蕩稅一萬八千有竒減去一半東陽縣志天啟間尚書許𢎞綱建議将原裁弓兵工食抵扣鹽斤聼民肩挑勿禁於是台鹽盛行而貧民皆得自食其力後邑商以課額具呈所司而復其禁上海縣志崇禎時都運司張繼孟蠲無業丁銀又令水鄉與濱海一體僉充催役國朝順治三年正月户部為禁私鹽以通商定經制以起課等事議覆兩浙巡鹽御史王顯議得鹽法之弊莫甚於私販今議擇亷幹事簡官耑司捕緝嚴防則私鹽可杜應令鹽臣實意舉行至起課經制查兩浙舊額大引四十四萬四千七百六十九引每引原重三百觔今各運司鹽法俱以二百觔為一引則兩浙當以二引分三引共該行小引六十六萬七千一百五十三引一百觔引制旣定則課額亦可因之以定兩浙引價每引三錢五分共銀一十五萬五千六百六十九兩一錢五分又每引納餘鹽課銀一錢八分五釐共銀八萬二千二百八十二兩二錢六分五釐二項通共銀二十三萬七千九百五十一兩四錢一分五釐但查明時額解舊餉原係一十四萬五千兩除将餘課銀八萬二千二百八十二兩二錢六分五釐起解外尚缺額銀六萬二千七百一十七兩七錢三分五釐向以雜項凑解補足此外又有給商庫價等項錢糧應各開欵數報部酌奪至於票鹽功績鹽不係額引之内所當照例改票行引以杜奸弊以上鹽觔額例新定經制開載甚明自宜照例奉行可也奉㫖是依議行順治三年九月户部為申明掣驗之規等事覆兩浙巡鹽御史王顯題稱浙鹽濱海私販繁多舊設杭嘉紹溫等四所四季委官專司掣驗杜絶私鹽一切夾帶有禁影射有禁越渡漏掣有禁借引重照有禁以及觀望躭延違限停泊莫不有禁孟起季竣過限銃毁法綦嚴也今各商急公者固多而營私者亦復不少每遇掣期或觀望以待市價之高或漏掣以釀重照之弊或越渡以開影射之門一繩以銃毁之法則藉口傷本不加以懲創之規則挨季墮壓今臣立法掣鹽過限半月者銃引目十分之二過限一月者銃引目十分之五此外免銃則各商旣憚銃毁之法又懷免銃之仁庻掣放依期等因到部查鹽引掣驗原有定期過限卽為銃毁此舊例也今鹽臣酌定日期分别銃毁以示招徠相應允從奉㫖依議順治四年六月兩浙巡鹽御史王燮題為引課規制未定欵項宜清等事臣查部劄開兩浙引價銀一十五萬五千六百六十九兩一錢五分又開舊餉銀一十四萬五千兩新舊叅差致有缺額夫引額鹽觔旣已奉行新制而餘鹽加課仍欲取盈舊數此固不能臣謂欲求畫一總不越部劄中引制旣定課銀亦可因之以定二語夫每引三錢五分為率此無論四十四萬與六十六萬俱可按引而計也就中分别正雜二項不因引課起者應列為雜項因引課起者總歸於正項除明季續加各欵遵奉恩詔蠲免外如各縣場課税銀一萬八千八百四十一兩五分係給商庫價之餘又功績鹽銀七千三百一十五兩船物銀四百兩水手銀一百兩係派之各州縣者應作雜項如庫價銀九萬六千九百五十九兩六錢四分二釐卽各場竈水鄉蕩價銀兩舊例邊商中粟於邊支鹽於場每引各竈給鹽二百觔各竈折價以給邊商原屬引課應歸正項引價銀四萬四千四百七十六兩九錢原屬引課應歸正項餘鹽銀八萬二千二百八十二兩二錢六分五釐原屬加鹽八十觔者今已減觔増引應作引課以歸正項加餘銀一萬四千九百二十七兩六錢四釐亦屬加鹽者應作引課以歸正項代票引銀一萬四千四百五十九兩四錢五分係代票行引者今票已盡草原屬引課應歸正項溧課銀四千兩因溧陽原食淮鹽後改食浙鹽而増者亦屬引課應歸正項靖江包課銀一百八十兩四錢三分原屬引課應歸正項合計正項銀共二十五萬七千二百八十八兩零即以六十六萬七千有竒之引計之尚有浮額與其頭緒紛繁多開名目曷若統歸畫一總撒相符臣謹具題奉㫖該部知道順治十三年五月兩浙巡鹽御史石維崑題為改設批驗所官稽覈引目事松江所原名蒋涇埠向係行銷票引故未設有批驗所官今皇清鼎建以來釐剔漏弊裁票行引凡引鹽必由各所驗掣方許運賣所以杜重照影射之奸前鹽臣祖建明疏内有松江批驗所地隣産鹽之鄉各場所官斷難乏員之語今查下砂場原設大使副使各一員該場催課撫竈留大使一員已堪足用副使似屬贅員今擬将副使改為批驗所大使庻地無曠官官無曠職轉移之間而鹽法大有禆益矣奉㫖依議順治十七年五月兩浙巡鹽御史余司仁題為懇准援例變通等事兩浙額行小引六十六萬七千一百五十三引近復加引十萬道若必按引辦課則額引不能全銷額課奚從取足今各商援兩淮減觔銷引之例行之兩浙其法納兩引之課止行引半之鹽以引半之鹽併作一包以一包之鹽兼銷兩引則鹽少易銷在各商鹽減雖有虛賠之課而包併亦省脚價之費公私兩利似可允從奉㫖該部議奏隨經户部覆准奉㫖依議康熙十三年二月户部為巡鹽例有罪贖等事議覆兩浙巡鹽御史胡三祝查贓罰銀兩鹽法考内刋定額數各差御史将此項銀兩每年俱照定額全完但私鹽犯多則罪贖銀多犯少則罪贖銀少儻以定額追徴所差之官恐碍考成以致派徴亦未可定嗣後各差不必額定起追惟照現獲私販之多寡㨿實題報如有獲多報少情弊或被督撫查明題叅或被科道指實糾劾即治以貪贓之罪可也奉㫖依議康熙十八年户部為請定遇閏増課等事議覆給事中余國柱條奏以遇閏月加引増課等因准行在案康熙十七年閏月十九年閏月兩浙引課遵照循例徴解康熙二十年十二月欽奉恩詔嗣後閏月増課停其徴收康熙二十六年十一月户部為攤課代輸年久等事覆兩浙巡鹽御史常翼聖疏稱兩浙温台寧各場遷置界外課銀無着部議将無徴銀暫令内地各場均攤徴補厯經多年今值大赦凡康熙十三年以後加増稅銀槩蒙豁免伏乞恩詔普頒将攤課悉與減除等因相應悉與減除可也奉㫖依議康熙三十四年十二月户部為謹就管見等事議覆江西道御史任觀瀛以票引改行正引一疏行令浙閩總督浙江巡撫㑹同巡鹽御史查明定議去後隨經總督郭世隆等疏稱仁錢二十二縣皆縁逼近場竈不便槩行正引沿海窮黎皆無耕種恒産又無别業謀生惟頼領引貨賣易米度日今若議設鹽店槩改商銷則數萬貧民謀生乏策相應仍循舊制等因前來應将御史任觀瀛條奏票引改行正引之處無庸議可也奉㫖依議康熙三十八年四月浙閩總督郭世隆為萬商感沐皇仁等事查兩浙鹽課額徴銀四十萬兩自康熙十六年奉文加増銀六萬二千七百餘兩歴年照額徴解今兩淮加増鹽課䝉皇上軫念商民恐致匱乏特沛綸音将加増四十萬兩内豁免二十萬兩今兩浙加増課銀應否豁免出自聖恩本月十九日奉㫖這所増銀兩着免一半該部知道康熙五十五年閏三月户部為請嚴保甲等事議覆兩浙巡鹽御史諾米疏稱兩浙州縣現行保甲之法更申以嚴察私鹽之條責任地方官力行查緝使總保里民互相稽察等因應如該御史所題嚴飭所屬行鹽地方該管官員将奸究聚衆興販私鹽者令總保里民互相稽察有能拏獲者照律給賞儻有容隱狥縱等情發覺之日照律治罪可也奉㫖依議雍正二年七月兩江總督查弼納為請将鎮郡改食淮鹽等事竊查鎮江舊食浙鹽浙鹽産於松江沿海鹽臣盤掣之後船載赴鎮六七百里道路旣遠脚費自多官鹽所以價貴淮鹽産於如臯通泰等處去鎮江止隔帶水私販片㠶渡江卽至鎮郡脚價無幾比浙鹽價值甚賤且浙鹽灰多味苦而淡淮鹽味潔而鹹其價乂賤民情惟利是趨避浙鹽之貴而偷買淮私勢所必至淮私至鎮透越甚易大江遼濶稽查甚難鎮江私販既多遂流行内地如句容溧陽髙淳等處無非私鹽充斥矣欲絶鎮江買私莫若将鎮江所屬三縣改食淮鹽鹽臣在儀真盤掣之後船載渡江相隔百有餘里抵鎮甚易則價自賤官鹽旣賤則民不食私梟棍何從射利将不禁而自散矣鎮江旣食淮鹽則鎮江府屬所行鹽引照數即令淮商承充其應納鹽課銀兩即令淮商交納如浙引鹽課與兩淮相同則令各商照浙例完納若浙課比兩淮為輕則令淮商照浙例完納一轉移間於國課民生均有禆益矣奉㫖鎮江之鹽起初舎近而就遠者其中或有不便情由所致爾與謝賜履黄叔琳噶爾泰公同詳確議奏欽此欽遵移咨兩浙鹽政謝賜履浙江巡撫黄叔琳兩淮巡鹽御史噶爾泰㑹同布政司鹽驛道遵照妥議㑹詳隨㨿浙江布政司佟吉圖兩浙鹽驛道王鈞詳稱查兩浙行鹽辦課原以江南鎮江為界鎮屬行鹽隸於浙省者揆厥畫疆之始蓋縁淮以𤓰洲為門户浙以鎮江為咽喉有大江以為之限則彼此不相侵害原屬因地制宜是以京口奉㫖設立盤鹽官㕔耑責防守稽查以杜淮私侵浙之患厯年以來兩浙引課從無虧缺者職是故也今兩江督憲奏請改食淮鹽欽奉俞㫖鎮江之鹽起初舎近而就遠者其中或有不便情由所致仰見聖主睿鑒如神靡遠弗届本司道不揣蠡測竊謂欲禁淮私而将鎮屬三縣改食淮鹽恐販徒借官行私連艘飛越并奸商飛渡夾帶影射重照之弊更難稽查且梟販尚能私渡大江蘇常之地支河小港繁多尤易透入至於價值久經核定飭遵味之鹹淡水土相宜况屢次嚴飭地方文武實力巡查梟販自可屏絶鎮江改食淮鹽在兩淮幅員遼濶増此一府不足見多而在浙地失此大江之界将來蘇常以西淮私透入不無侵越之慮兩淮兩浙總屬引地淮商浙商總屬辦課可否仍循舊界疏引行鹽則淮浙諸商各安其業而永保國餉於無虧矣等因㨿詳移㑹隨准兩淮巡鹽御史移開此案江督已将仍舊行銷浙引毋庸改食淮鹽縁由奏明相應移覆查照施行雍正三年十一月户部為欽奉上諭事覆署理兩浙鹽政浙江布政使佟吉圖疏稱兩浙定例每引行鹽二百五十觔又有鹽差并筆帖式應得公費銀共二錢五分每引予鹽三十五觔前經刑部尚書張廷樞等察審原任鹽差哈爾金一案謂公費出於鹽觔已将加鹽三十五觔之處㨿實奏聞業蒙聖祖仁皇帝俞允部議免其禁革在案臣查每引除充納正課之外再輸鹽差并筆帖式公費分旋資本旣多獲利自少臣仰體恤商至意乞照前部議每引加鹽三十五觔免其禁革具題前來查先經尚書盧詢條奏加引不加額一案行令兩浙御史照長蘆之例每引量加鹽觔之處詳加確議在案又查康熙五十九年刑部尚書張廷樞等審明哈爾金一案經從前臣部議覆将多給商人三十五觔之鹽暫停禁止亦具題在案今旣稱兩浙商人資本微薄若照長蘆之例每引加鹽五十觔誠恐引課有虧請照從前部議每引加鹽三十五觔等語應如所奏准其每引仍舊加鹽三十五觔仍行該鹽政将地方之大小銷鹽之多寡㨿實查明酌量配銷造册報部查核如有鹽多引壅銷不能完之處亦㨿實題報可也奉㫖依議浙江通志卷八十三
