body:
  text: 浙江通志卷四建置一由封建而郡縣理勢相因兩浙木㑹稽郡迨後有州有道有軍有路其間或省或置或併或分稱名不一因革互殊聖朝化被八紘東南版圖式廓如定海之設縣玊環之開山規模逈越前代書曰帝光天之下至于海隅蒼生於今㐲睹其盛矣志建置建置表浙江布政使司聖祖仁皇帝御綦皇輿表式以全浙所屬分列經緯作建置表而仍以厯代沿革源流條繋於右以合志體云浙江通志卷四
  hash: sha256:d02f1947aae5f7deee0511985a0a8f090e8332fefabf6811eee3ad34232806a8
